<style>
  :root {
    --bg: #0a0805;
    --card: #171208;
    --card-border: rgba(255,205,100,.14);
    --text: #f7f0e0;
    --muted: #a89877;
    --gold: #ffcf5c;
    --gold2: #ffa72e;
    --amber: #ff7e3d;
    --chip: rgba(255,207,92,.13);
    --chip-text: #ffd97e;
    --thumb-bg: #120d06;
    --hdr: rgba(10,8,5,.9);
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #faf6ec;
      --card: #ffffff;
      --card-border: rgba(140,100,20,.16);
      --text: #2a2110;
      --muted: #8a7a55;
      --chip: rgba(190,130,20,.12);
      --chip-text: #8a6410;
      --thumb-bg: #efe8d8;
      --hdr: rgba(250,246,236,.9);
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background:
      radial-gradient(900px 500px at 85% -5%, rgba(255,167,46,.14), transparent 60%),
      radial-gradient(700px 450px at -10% 25%, rgba(255,207,92,.09), transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
    min-height: 100vh;
  }
  header {
    position: sticky; top: 0; z-index: 30;
    padding: 14px max(24px, calc((100% - 1180px) / 2)) 10px;
    background: var(--hdr);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--card-border);
  }
  .toprow { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .logo { width: 46px; height: 46px; flex: none; border-radius: 14px;
    background: linear-gradient(145deg, var(--gold), var(--gold2) 55%, var(--amber));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 22px rgba(255,167,46,.35);
  }
  .logo svg { width: 26px; height: 26px; display: block; }
  .brand {
    font-size: clamp(21px, 3.6vw, 30px); font-weight: 800; letter-spacing: 3px;
    background: linear-gradient(92deg, var(--gold) 0%, #ffe9b0 45%, var(--amber) 85%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    white-space: nowrap;
  }
  .sub { color: var(--muted); font-size: 13px; letter-spacing: 3px; margin-top: 2px; }
  .backlink { margin-left: auto; color: var(--muted); text-decoration: none; font-size: 13.5px;
    border: 1px solid var(--card-border); border-radius: 999px; padding: 8px 18px; transition: color .2s, border-color .2s; }
  .backlink:hover { color: var(--gold); border-color: var(--gold); }
  .toolrow { display: flex; align-items: center; gap: 12px; margin-top: 14px; flex-wrap: wrap; }
  .stat { background: var(--card); border: 1px solid var(--card-border); border-radius: 999px; padding: 7px 16px; font-size: 13px; color: var(--muted); white-space: nowrap; }
  .stat b { color: var(--text); font-size: 14px; margin-left: 4px; }
  a.stat { text-decoration: none; cursor: pointer; }
  a.stat:hover { border-color: var(--gold); color: var(--text); }
  .sec { scroll-margin-top: 132px; }
  .dchips { display: inline-flex; gap: 6px; }
  .dchip {
    background: var(--card); border: 1px solid var(--card-border); color: var(--muted);

  .datehead { grid-column: 1 / -1; display: flex; align-items: center; gap: 10px; margin: 8px 0 2px; font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: 1px; }
  .datehead::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--card-border), transparent); }

  #player { position: fixed; inset: 0; background: rgba(6,4,0,.96); display: none; flex-direction: column; z-index: 50; }
  #player.open { display: flex; }
  #player .bar { display: flex; align-items: center; gap: 12px; padding: 12px 18px; color: #fff; }

  #player .bar button.vote:disabled { opacity: .55; cursor: default; }
  #player .bar button.copied { background: #2f9e63; border-color: transparent; }
  #player .bar .ptabs { display: inline-flex; gap: 0; border: 1px solid rgba(255,255,255,.2); border-radius: 12px; overflow: hidden; }
  #player .bar .ptabs button { border: none; border-radius: 0; background: transparent; padding: 8px 16px; }
  #player .bar .ptabs button.on { background: linear-gradient(92deg, var(--gold), var(--gold2)); color: #241a05; font-weight: 700; }
  .thumb .trbadge { position: absolute; bottom: 10px; right: 10px; z-index: 2; font-size: 10.5px; font-weight: 700; letter-spacing: 1px; border-radius: 999px; padding: 3px 10px; color: #241a05; background: linear-gradient(92deg, #ffd97e, var(--amber)); box-shadow: 0 4px 12px rgba(255,167,46,.35); }

  @media (max-width: 560px) {

</style>

<script>
let DATA = { games: [], videos: [] };

// 分界日寫死：7/10 當天建立的算「7/10」，之前的全部併入「7/8」
// （不可用 new Date()，否則隔天檢視時 7/10 作品會被錯誤歸到 7/8）
const DAY_NEW = '2026-07-10';
function dateGroup(d) {
  return d === DAY_NEW ? '7/10' : '7/8';
}
function dateLabel(g) {
  return g === '7/10' ? '🗓 7/10' : '🗓 7/8';
}
let DATEFILTER = '';
function setDateFilter(v, btn) {
  DATEFILTER = v;
  document.querySelectorAll('.dchip').forEach(b => b.classList.toggle('on', b === btn));
  render(document.getElementById('search').value);
}

/* ===== 複製程式碼 ===== */
async function copyCode(src, btn) {
  const original = btn.textContent;
  try {
    const r = await fetch(src);
    if (!r.ok) throw new Error(r.status);
    const code = await r.text();
    try {
      await navigator.clipboard.writeText(code);
    } catch (e) {
      // 剪貼簿 API 被擋時的備援
      const ta = document.createElement('textarea');
      ta.value = code;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
    }
    btn.classList.add('copied');
    btn.textContent = '已複製！';
  } catch (e) {
    btn.textContent = '複製失敗';
  }
  setTimeout(() => { btn.classList.remove('copied'); btn.textContent = original; }, 1800);
}


// 預告片配對：影片標題是「遊戲名-預告片 / 遊戲名預告」時，掛進同名遊戲卡片（播放器內切換），動畫區不重複顯示
function buildTrailerMap() {
  const map = {}, hidden = new Set();
  const gameTitles = new Set((DATA.games || []).map(g => g.title || g.file.replace(/\.html?$/i, '')));
  for (const v of (DATA.videos || [])) {
    const t = v.title || v.file.replace(/\.html?$/i, '');
    const m = t.match(/^(.+?)[\s\-–—－]*(預告片|預告|介紹影片|介紹)$/);
    if (!m) continue;
    const base = m[1].trim();
    if (gameTitles.has(base)) {
      map[base] = { src: 'pro/videos/' + v.file, key: 'pro-' + (v.thumb || t).replace(/\.(png|jpe?g)$/i, '') };
      hidden.add(v.file);
    }
  }
  return { map, hidden };
}

function render(filter) {
  const q = (filter || '').trim().toLowerCase();
  const trailers = buildTrailerMap();
  const conf = [
    { id: 'games',  dir: 'pro/games',  tag: '遊戲' },
    { id: 'videos', dir: 'pro/videos', tag: '動畫' },
  ];
  for (const c of conf) {
    const grid = document.getElementById(c.id);
    grid.innerHTML = '';
    let list = (DATA[c.id] || []).filter(it => {
      const t = it.title || it.file;
      if (c.id === 'videos' && trailers.hidden.has(it.file)) return false; // 已併入遊戲卡片
      if (DATEFILTER && dateGroup(it.created) !== DATEFILTER) return false;
      return !q || t.toLowerCase().includes(q);
    });
    if (!list.length) {
      grid.innerHTML = '<div class="empty">' + (q ? '沒有符合的作品' : '專業版製作中，稍後就會出現') + '</div>';
      continue;
    }
    list = list.slice().sort((a, b) => (dateGroup(a.created) === '7/10' ? 0 : 1) - (dateGroup(b.created) === '7/10' ? 0 : 1));
    let lastDate = null;
    for (const item of list) {
      if (DATEFILTER === 'all' && dateGroup(item.created) !== lastDate) {
        lastDate = dateGroup(item.created);
        const head = document.createElement('div');
        head.className = 'datehead';
        head.innerHTML = dateLabel(lastDate);
        grid.appendChild(head);
      }
      const title = item.title || item.file.replace(/\.html?$/i, '');
      const src = c.dir + '/' + item.file;
      const thumbSrc = item.thumb ? 'thumbs/' + c.dir + '/' + item.thumb : '';
      const key = 'pro-' + (item.thumb || title).replace(/\.(png|jpe?g)$/i, '');
      const trailer = (c.id === 'games' && trailers.map[title]) || null;
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML =
        '<div class="thumb">' +
          '<div class="fallback"></div>' +
          (thumbSrc ? '<img loading="lazy" alt="">' : '') +
          '<span class="probadge">PRO</span>' +
          (dateGroup(item.created) === '7/10' ? '<span class="newbadge">NEW</span>' : '') +
          (trailer ? '<span class="trbadge">含預告片</span>' : '') +
          '<span class="tag-on">' + c.tag + '</span>' +
          '<div class="playbtn"><span>▶</span></div>' +
        '</div>' +
        '<div class="meta"><div class="info">' +
          '<div class="name"></div>' +
          '<div class="sub2"></div>' +
          '<div class="nums" data-key="' + key + '"></div>' +
        '</div></div>' +
        '<div class="actions"><button class="copybtn">複製程式碼</button></div>';
      card.querySelector('.name').textContent = title;
      card.querySelector('.fallback').textContent = title.charAt(0);
      card.querySelector('.sub2').innerHTML = [
        [item.author ? '作者 ' + item.author : '', item.coauthor ? '協作者 ' + item.coauthor : ''].filter(Boolean).join(' · '),
        item.updated ? '更新 ' + item.updated : ''
      ].filter(Boolean).map(t => '<div>' + t + '</div>').join('');
      const img = card.querySelector('img');
      if (img) {
        // 優先用內嵌封面（隨資料一起載入，不需下載圖片檔，不會被網路閘道器擋）
        let retries = 0;
        img.onerror = () => {
          if (retries < 2) {
            retries++;
            setTimeout(() => { img.src = encodeURI(thumbSrc) + '?r=' + retries; }, 700 * retries);
          } else {
            img.remove();
          }
        };
        img.src = item.preview || encodeURI(thumbSrc);
        img.alt = title;
      }
      card.querySelector('.copybtn').addEventListener('click', e => {
        e.stopPropagation();
        copyCode(src, e.currentTarget);
      });
      card.onclick = () => openPlayer(title, src, key, c.id === 'games', trailer);
      card.dataset.key = key; // 分頁代號：供網址 #代號 直接開啟
      grid.appendChild(card);
      countObserver.observe(card.querySelector('.nums'));
    }
  }
  const g = DATA.games || [], v = DATA.videos || [];
  document.getElementById('gcount').textContent = g.length;
  document.getElementById('vcount').textContent = v.length;
  document.getElementById('gcount2').textContent = g.length + ' 個作品';
  document.getElementById('vcount2').textContent = v.length + ' 個作品';
}

document.getElementById('search').addEventListener('input', e => render(e.target.value));

/* ===== 瀏覽 / 遊玩次數（雙計數服務備援） ===== */
const COUNTER_NS = 'ai-future-camp';
const PAGE_KEY_PREFIX = 'pro-';
const countCache = {};
const countCacheAt = {};
const PROVIDERS = [
  {
    // Abacus：實測讀寫皆可、CORS 全開（404 = 計數器還沒建立，視為 0）
    read: n => fetch('https://abacus.jasoncameron.dev/get/' + COUNTER_NS + '/' + n, { signal: AbortSignal.timeout(5000) }),
    bump: n => fetch('https://abacus.jasoncameron.dev/hit/' + COUNTER_NS + '/' + n),
  },
];

// 請求排隊＋節流：整頁一次載入會爆出上百個計數查詢，超過服務的速率限制就會被拒，
// 導致某些卡片沒數字。限制同時最多 4 個、每 130ms 才放行一個（約每秒 8 個），
// 被拒(429)或失敗自動重試最多 2 次——每張卡最終都拿得到數字。
const _cq = []; let _cqActive = 0; const _CQ_MAX = 4; let _cqLast = 0; const _CQ_GAP = 130;
function queuedFetch(fn) {
  return new Promise((resolve, reject) => { _cq.push({ fn, resolve, reject }); _cqPump(); });
}
function _cqPump() {
  if (_cqActive >= _CQ_MAX || !_cq.length) return;
  const wait = Math.max(0, _cqLast + _CQ_GAP - Date.now());
  if (wait > 0) { setTimeout(_cqPump, wait); return; }
  _cqLast = Date.now();
  const job = _cq.shift();
  _cqActive++;
  job.fn().then(job.resolve, job.reject).finally(() => { _cqActive--; _cqPump(); });
  _cqPump();
}

// 同一個 key 查詢中就共用同一個 Promise，避免重複請求
const _inflight = {};
async function readCount(name) {
  // 快取 45 秒過期，讓其他人的投票/遊玩數字也能更新
  if (name in countCache && Date.now() - (countCacheAt[name] || 0) < 45000) return countCache[name];
  if (_inflight[name]) return _inflight[name];
  _inflight[name] = (async () => {
    for (let attempt = 0; attempt < 3; attempt++) {
      if (attempt > 0) await new Promise(res => setTimeout(res, 1500 * attempt)); // 被拒後退避重試
      for (const p of PROVIDERS) {
        try {
          const r = await queuedFetch(() => p.read(name));
          if (r.status === 404) { countCache[name] = 0; countCacheAt[name] = Date.now(); return 0; } // 尚未有人計數
          if (r.ok) {
            const j = await r.json();
            const n = j.value ?? j.count ?? 0;
            countCache[name] = n;
            countCacheAt[name] = Date.now();
            return n;
          }
        } catch (e) {}
      }
    }
    countCache[name] = null;
    return null;
  })();
  try { return await _inflight[name]; } finally { delete _inflight[name]; }
}

async function bumpCount(name) {
  for (const p of PROVIDERS) {
    try { const r = await p.bump(name); if (r.ok) return; } catch (e) {}
  }
}

// 統計快照：GitHub Actions 每 10 分鐘把全部計數器抓成 stats.json。
// 頁面先用快照瞬間顯示所有數字，15 秒後可見卡片自動切換成即時查詢——又快又即時。
const statsReady = (async () => {
  try {
    const r = await fetch('stats.json', { cache: 'no-cache' });
    if (!r.ok) return;
    const s = await r.json();
    const at = Date.now() - 30000; // 標記為 30 秒前的資料：先用快照，很快就會被即時數字取代
    for (const [k, w] of Object.entries(s.works || {})) {
      for (const [name, val] of [[k + '-v', w.v], [k + '-p', w.p], [k + '-love', w.love], [k + '-love-c', 0], [k + '-like', w.like], [k + '-like-c', 0]]) {
        if (!(name in countCache)) { countCache[name] = val; countCacheAt[name] = at; }
      }
    }
    if (typeof s.total === 'number' && !('site-total-plays' in countCache)) {
      countCache['site-total-plays'] = s.total; countCacheAt['site-total-plays'] = at;
      document.getElementById('tplays').textContent = s.total;
      document.getElementById('tplaysWrap').style.display = '';
    }
  } catch (e) {}
})();

// 頁面頂部的總遊玩次數
statsReady.then(() => readCount('site-total-plays')).then(n => {
  if (n !== null) {
    document.getElementById('tplays').textContent = n;
    document.getElementById('tplaysWrap').style.display = '';
  }
});

const NUM_ICONS = {
  v: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 5c-5 0-9 4.5-10 7 1 2.5 5 7 10 7s9-4.5 10-7c-1-2.5-5-7-10-7zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/></svg>',
  p: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 7h12a4 4 0 0 1 4 4v3a3 3 0 0 1-5.6 1.5L15 14H9l-1.4 1.5A3 3 0 0 1 2 14v-3a4 4 0 0 1 4-4zm1 2v2H5v2h2v2h2v-2h2v-2H9V9H7zm9 .5a1.4 1.4 0 1 0 0 2.8 1.4 1.4 0 0 0 0-2.8zm3 3a1.4 1.4 0 1 0 0 2.8 1.4 1.4 0 0 0 0-2.8z"/></svg>',
  love: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-8-5.3-8-11a4.6 4.6 0 0 1 8-3 4.6 4.6 0 0 1 8 3c0 5.7-8 11-8 11z"/></svg>',
  like: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 10h4v11H2V10zm6 11h8.5a3 3 0 0 0 2.9-2.2l1.5-6A3 3 0 0 0 18 9h-4V5A2.5 2.5 0 0 0 11.5 2.5L8 10v11z"/></svg>',
};
function numSpan(type, label, n) {
  return '<span class="numit ' + type + '" title="' + label + '">' + NUM_ICONS[type] + Math.max(0, parseInt(n) || 0) + '</span>';
}

async function fillNums(el, force) {
  const key = el.dataset.key;
  if (!key) return;
  if (el.dataset.done && !force) return;
  el.dataset.done = '1';
  await statsReady; // 先等快照載好，卡片數字直接秒開
  if (force) {
    ['-v','-p','-love','-love-c','-like','-like-c'].forEach(sfx => { delete countCache[key + sfx]; delete countCacheAt[key + sfx]; });
  }
  if (!el.innerHTML) el.innerHTML = '<span style="opacity:.5">統計載入中…</span>'; // 佔位，避免看起來沒有統計
  // 兩段式：先查瀏覽/遊玩（2個查詢，很快亮出來），評分票數隨後補上
  const [views, plays] = await Promise.all([readCount(key + '-v'), readCount(key + '-p')]);
  if (views === null && plays === null) { el.innerHTML = ''; return; } // 統計服務連不上才隱藏
  const paint = (nl, ng) => {
    el.innerHTML = numSpan('v', '瀏覽', views || 0) + numSpan('p', '遊玩', plays || 0) +
      numSpan('love', '非常好玩', nl) + numSpan('like', '好玩', ng);
  };
  paint(0, 0);
  const [love, loveC, like, likeC] = await Promise.all([
    readCount(key + '-love'), readCount(key + '-love-c'),
    readCount(key + '-like'), readCount(key + '-like-c'),
  ]);
  paint(Math.max(0, (love || 0) - (loveC || 0)), Math.max(0, (like || 0) - (likeC || 0)));
}

const visibleNums = new Set();
const countObserver = new IntersectionObserver(entries => {
  for (const en of entries) {
    if (en.isIntersecting) { fillNums(en.target); visibleNums.add(en.target); }
    else { visibleNums.delete(en.target); }
  }
}, { rootMargin: '120px' });

// 即時統計：每 30 秒刷新可見卡片數字
setInterval(() => {
  if (document.hidden) return;
  for (const el of visibleNums) if (el.isConnected) fillNums(el, true);
  delete countCache['site-total-plays']; delete countCacheAt['site-total-plays'];
  readCount('site-total-plays').then(n => {
    if (n !== null) {
      document.getElementById('tplays').textContent = n;
      document.getElementById('tplaysWrap').style.display = '';
    }
  });
}, 30000);

/* ===== 播放器（含自動縮放與複製按鈕） ===== */
function resetFrame() { document.getElementById('pframe').style.cssText = ''; }

function fitFrame() {
  const wrap = document.getElementById('pstage');
  const f = document.getElementById('pframe');
  let doc;
  try { doc = f.contentDocument; } catch (e) { return; }
  if (!doc || !doc.documentElement) return;
  const de = doc.documentElement, b = doc.body || de;
  const w = Math.max(de.scrollWidth, b.scrollWidth);
  const h = Math.max(de.scrollHeight, b.scrollHeight);
  const cw = wrap.clientWidth, ch = wrap.clientHeight;
  if (!w || !h || !cw || !ch) return;
  if (w <= cw + 4 && h <= ch + 4) { resetFrame(); return; }
  let s = Math.min(cw / w, ch / h, 1);
  // 長捲軸頁面（高遠大於寬）：整頁塞進視窗會縮成一條，改成只符合寬度、保留上下捲動
  if (h > w * 1.5 && h > ch * 1.5) {
    s = Math.min(cw / w, 1);
    if (s >= 0.999) { resetFrame(); return; }
    f.style.width = w + 'px';
    f.style.height = (ch / s) + 'px';
    f.style.transform = 'scale(' + s + ')';
    f.style.transformOrigin = 'top left';
    f.style.position = 'absolute';
    f.style.left = Math.max(0, (cw - w * s) / 2) + 'px';
    f.style.top = '0px';
    return;
  }
  f.style.width = w + 'px';
  f.style.height = h + 'px';
  f.style.transform = 'scale(' + s + ')';
  f.style.transformOrigin = 'top left';
  f.style.position = 'absolute';
  f.style.left = Math.max(0, (cw - w * s) / 2) + 'px';
  f.style.top = Math.max(0, (ch - h * s) / 2) + 'px';
}

let fitTimers = [];
function scheduleFit() {
  fitTimers.forEach(clearTimeout);
  fitTimers = [200, 700, 1500].map(ms => setTimeout(fitFrame, ms));
}

/* ===== 好玩投票（可取消、可改投；每裝置每作品一票） ===== */
let voteKey = '';
function refreshVoteButtons() {
  const b2 = document.getElementById('pvote2');
  const b1 = document.getElementById('pvote1');
  const voted = voteKey && localStorage.getItem('voted-' + voteKey);
  for (const [btn, suffix, label] of [[b2, '-love', '非常好玩'], [b1, '-like', '好玩']]) {
    btn.disabled = !voteKey;
    btn.classList.toggle('voted', voted === suffix);
    btn.dataset.key = voteKey;
    if (!voteKey) { btn.textContent = label; continue; }
    const base = voted === suffix ? label + '（取消）' : label;
    btn.textContent = base;
    Promise.all([readCount(voteKey + suffix), readCount(voteKey + suffix + '-c')]).then(([n, c]) => {
      if (btn.dataset.key !== voteKey) return;
      const net = Math.max(0, (n || 0) - (c || 0));
      if (net > 0) btn.textContent = base + ' ' + net;
    });
  }
}
function refreshCardNums(key) {
  const el = document.querySelector('.nums[data-key="' + (window.CSS && CSS.escape ? CSS.escape(key) : key) + '"]');
  if (el) { delete el.dataset.done; fillNums(el); }
}
function bumpCache(name) {
  countCache[name] = (countCache[name] || 0) + 1;
  countCacheAt[name] = Date.now();
}
function setupVotes(key) { voteKey = key || ''; refreshVoteButtons(); }
function castVote(suffix) {
  if (!voteKey) return;
  const lsKey = 'voted-' + voteKey;
  const prev = localStorage.getItem(lsKey);
  if (prev === suffix) { // 再點一次同鈕＝取消
    bumpCount(voteKey + suffix + '-c');
    bumpCache(voteKey + suffix + '-c');
    localStorage.removeItem(lsKey);
  } else if (prev) { // 點另一鈕＝改投
    bumpCount(voteKey + prev + '-c');
    bumpCount(voteKey + suffix);
    bumpCache(voteKey + prev + '-c');
    bumpCache(voteKey + suffix);
    localStorage.setItem(lsKey, suffix);
  } else { // 第一次投票
    bumpCount(voteKey + suffix);
    bumpCache(voteKey + suffix);
    localStorage.setItem(lsKey, suffix);
  }
  refreshVoteButtons();
  refreshCardNums(voteKey); // 卡片上的票數即時更新
}
document.getElementById('pvote2').addEventListener('click', () => castVote('-love'));
document.getElementById('pvote1').addEventListener('click', () => castVote('-like'));

let currentSrc = '';
// 遊戲/預告片分頁切換（有預告片的遊戲才顯示）
let TRAILER_CUR = null, trailerCounted = false, baseSrcCur = '';
function setPlayerTab(which) {
  const f = document.getElementById('pframe');
  document.getElementById('ptabGame').classList.toggle('on', which === 'game');
  document.getElementById('ptabTrailer').classList.toggle('on', which === 'trailer');
  const target = (which === 'trailer' && TRAILER_CUR) ? TRAILER_CUR.src : baseSrcCur;
  if (f.getAttribute('src') !== target) { resetFrame(); f.src = target; }
  document.getElementById('popen').href = target;
  // 預告片是動畫：切過去看就計一次瀏覽+遊玩（每次打開作品只計一次）
  if (which === 'trailer' && TRAILER_CUR && !trailerCounted) {
    trailerCounted = true;
    bumpCount(TRAILER_CUR.key + '-v');
    bumpCount(TRAILER_CUR.key + '-p');
  }
}
function openPlayer(title, src, key, isGame, trailer) {
  currentSrc = src;
  TRAILER_CUR = trailer || null; trailerCounted = false; baseSrcCur = src;
  const tabs = document.getElementById('ptabs');
  tabs.style.display = TRAILER_CUR ? 'inline-flex' : 'none';
  document.getElementById('ptabGame').classList.add('on');
  document.getElementById('ptabTrailer').classList.remove('on');
  if (key) { try { history.replaceState(null, '', '#' + encodeURIComponent(key)); } catch (e) {} } // 分頁代號：網址帶 #代號 可直接分享這個作品
  document.getElementById('ptitle').textContent = title;
  setupVotes(key);
  resetFrame();
  const f = document.getElementById('pframe');
  f.onload = () => {
    scheduleFit();
    // 自動把鍵盤焦點交給遊戲，否則要先點一下畫面鍵盤才有反應
    try { f.contentWindow.focus(); } catch (e) {}
    if (key && isGame) {
      try {
        const doc = f.contentDocument;
        const once = () => {
          bumpCount(key + '-p');
          doc.removeEventListener('pointerdown', once);
          doc.removeEventListener('keydown', once);
        };
        doc.addEventListener('pointerdown', once);
        doc.addEventListener('keydown', once);
      } catch (e) {}
    }
  };
  f.src = src;
  document.getElementById('popen').href = src;
  document.getElementById('player').classList.add('open');
  if (key) {
    bumpCount(key + '-v');
    bumpCache(key + '-v');
    if (!isGame) { bumpCount(key + '-p'); bumpCache(key + '-p'); } // 動畫：打開播放就算一次遊玩
    refreshCardNums(key);
  }
  bumpCount('site-total-plays');
}
function closePlayer() {
  document.getElementById('player').classList.remove('open');
  fitTimers.forEach(clearTimeout);
  resetFrame();
  document.getElementById('pframe').src = 'about:blank';
  try { history.replaceState(null, '', location.pathname + location.search); } catch (e) {} // 清掉分頁代號
}

// 網址帶 #分頁代號 時自動打開對應作品（可分享直達連結）
function openFromHash() {
  const h = decodeURIComponent((location.hash || '').slice(1));
  if (!h) return;
  const card = document.querySelector('.card[data-key="' + (window.CSS && CSS.escape ? CSS.escape(h) : h) + '"]');
  if (card) card.click();
}
window.addEventListener('hashchange', openFromHash);

// 分享按鈕：複製這個作品的直達連結（貼給家長，點開直接玩）
document.getElementById('pshare').addEventListener('click', async e => {
  const btn = e.currentTarget;
  const title = document.getElementById('ptitle').textContent;
  const text = '來看看我們在 AI未來創作營隊 做的作品「' + title + '」（JOJO老師升級版）！ ' + location.href;
  try {
    await navigator.clipboard.writeText(text);
  } catch (err) {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); ta.remove();
  }
  const orig = btn.textContent;
  btn.textContent = '已複製連結！';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
});
document.getElementById('pcopy').addEventListener('click', e => {
  if (currentSrc) copyCode(currentSrc, e.currentTarget);
});
window.addEventListener('resize', () => {
  if (document.getElementById('player').classList.contains('open')) fitFrame();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePlayer(); });

/* ===== 資料載入 ===== */
async function loadManifest() {
  try {
    // no-cache = 跟伺服器確認有沒有更新（沒變就回 304 不重傳，比每次整份重載快很多）
    const r = await fetch('manifest.json', { cache: 'no-cache' });
    if (r.ok) {
      const m = await r.json();
      return { games: m['pro/games'] || [], videos: m['pro/videos'] || [] };
    }
  } catch (e) {}
  const out = { games: [], videos: [] };
  for (const [id, dir] of [['games', 'pro/games'], ['videos', 'pro/videos']]) {
    try {
      const r = await fetch('https://api.github.com/repos/zway-education/wowhome-AI/contents/' + dir + '?ref=main');
      if (r.ok) {
        const files = await r.json();
        out[id] = files
          .filter(f => /\.html?$/i.test(f.name))
          .map(f => ({ file: f.name, title: f.name.replace(/\.html?$/i, '') }));
      }
    } catch (e) {}
  }
  return out;
}


/* ===== 熱門排序：載入全部計數後，把熱門作品排到最上面 ===== */
function workKey(item, dirName) {
  return (PAGE_KEY_PREFIX || '') + (item.thumb || (dirName + '-' + (item.title || item.file))).replace(/\.(png|jpe?g)$/i, '');
}
async function hotSort() {
  const jobs = [];
  for (const [listName, dirName] of [['games', 'games'], ['videos', 'videos']]) {
    for (const item of (DATA[listName] || [])) {
      const k = workKey(item, dirName);
      jobs.push(Promise.all([
        readCount(k + '-v'), readCount(k + '-p'),
        readCount(k + '-love'), readCount(k + '-love-c'),
        readCount(k + '-like'), readCount(k + '-like-c'),
      ]).then(([v, p, l, lc, g, gc]) => {
        const nl = Math.max(0, (l || 0) - (lc || 0));
        const ng = Math.max(0, (g || 0) - (gc || 0));
        item._score = nl * 3 + ng * 2 + (p || 0) + (v || 0) * 0.5;
      }).catch(() => { item._score = 0; }));
    }
  }
  await Promise.all(jobs);
  let changed = false;
  for (const listName of ['games', 'videos']) {
    const before = (DATA[listName] || []).map(i => i.file).join('|');
    (DATA[listName] || []).sort((a, b) => (b._score || 0) - (a._score || 0));
    if ((DATA[listName] || []).map(i => i.file).join('|') !== before) changed = true;
  }
  if (changed) render(document.getElementById('search').value);
}

// 先用上次存在本機的清單「秒開畫面」，背景再抓最新清單更新（有新作品時自動補上）
try {
  const cached = localStorage.getItem('manifest-cache-pro');
  if (cached) { DATA = JSON.parse(cached); render(''); }
} catch (e) {}
// 熱門排序延後 4 秒再跑：先讓看得到的卡片查完數字，避免一開頁就塞爆計數服務
loadManifest().then(m => {
  if (m && ((m.games || []).length || (m.videos || []).length)) {
    DATA = m;
    try { localStorage.setItem('manifest-cache-pro', JSON.stringify(m)); } catch (e) {}
    render(document.getElementById('search').value);
  }
  if (!document.getElementById('player').classList.contains('open')) openFromHash(); // 分頁代號直達
  setTimeout(hotSort, 4000);
});
