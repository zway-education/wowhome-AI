<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>史蒂夫 vs 凋零王</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Courier New', monospace;
    background: linear-gradient(#7ec0ee 0%, #a9e0ff 55%, #8fce6b 55%, #6ab84f 100%);
    overflow: hidden;
    image-rendering: pixelated;
  }
  #game {
    position: relative;
    width: 900px;
    height: 500px;
    margin: 20px auto;
    border: 6px solid #4a3b2a;
    background: linear-gradient(#7ec0ee 0%, #cdeeff 60%, #8fce6b 60%, #5a9e3f 100%);
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }
  .cloud {
    position: absolute;
    background: #fff;
    opacity: 0.85;
    border-radius: 20px;
  }
  .grass-block {
    position: absolute;
    bottom: 0;
    width: 40px;
    height: 40px;
    background: #6ab84f;
    border: 2px solid #4a7a35;
  }
  #hud {
    width: 900px;
    margin: 0 auto;
    color: #fff;
    text-shadow: 1px 1px 2px #000;
  }
  .barWrap {
    display: flex;
    align-items: center;
    margin: 4px 0;
    gap: 8px;
  }
  .barLabel { width: 90px; font-weight: bold; font-size: 14px; }
  .barBg {
    flex: 1;
    height: 22px;
    background: #333;
    border: 2px solid #111;
    position: relative;
  }
  .barFill {
    height: 100%;
    transition: width 0.2s ease;
  }
  #steveHpFill { background: linear-gradient(#ff5555, #aa0000); width: 100%; }
  #witherHpFill { background: linear-gradient(#c9c9c9, #3a3a3a); width: 100%; }

  #player {
    position: absolute;
    bottom: 20px;
    left: 80px;
    width: 44px;
    height: 80px;
    transition: left 0.15s linear;
  }
  #player .head {
    position: absolute; top: 0; left: 6px; width: 32px; height: 28px;
    background: #d99a6c; border: 2px solid #7a5233;
  }
  #player .eye { position: absolute; top: 10px; width: 5px; height: 5px; background: #2a5cb8; }
  #player .eyeL { left: 12px; } #player .eyeR { left: 22px; }
  #player .body {
    position: absolute; top: 26px; left: 8px; width: 28px; height: 34px;
    background: #4477cc; border: 2px solid #2a4a88;
  }
  #player .legL, #player .legR {
    position: absolute; top: 58px; width: 12px; height: 22px;
    background: #445599; border: 2px solid #222244;
  }
  #player .legL { left: 8px; } #player .legR { left: 22px; }
  #player .arm {
    position: absolute; top: 28px; width: 10px; height: 30px;
    background: #d99a6c; border: 2px solid #7a5233;
    transform-origin: top center;
  }
  #player .arm.left { left: -6px; }
  #player .arm.right { left: 38px; transition: transform 0.12s ease; }
  #player.attack .arm.right { transform: rotate(-110deg); }
  #player .sword {
    position: absolute; top: -2px; left: 4px; width: 6px; height: 34px;
    background: linear-gradient(#e0ffff, #7fdbff);
    border: 1px solid #2299aa;
  }
  #player .sword::after {
    content: ""; position: absolute; bottom: -6px; left: -3px;
    width: 12px; height: 6px; background: #8a5a2a; border: 1px solid #4a3a1a;
  }

  #wither {
    position: absolute;
    bottom: 40px;
    right: 100px;
    width: 140px;
    height: 160px;
    transition: right 0.25s ease, filter 0.1s;
  }
  #wither.hurt { filter: brightness(2.5) saturate(0); }
  .whead {
    position: absolute; width: 46px; height: 50px; bottom: 90px;
    background: #1b1b1b; border: 2px solid #000;
    border-radius: 6px 6px 14px 14px;
  }
  .whead.center { left: 47px; z-index: 2; }
  .whead.left { left: 0px; bottom: 78px; transform: scale(0.85); z-index: 1; }
  .whead.right { left: 94px; bottom: 78px; transform: scale(0.85); z-index: 1; }
  .whead .weye {
    position: absolute; top: 16px; width: 8px; height: 8px; background: #66ff66;
    box-shadow: 0 0 6px #66ff66;
  }
  .whead .weyeL { left: 8px; } .whead .weyeR { left: 28px; }
  .wtooth {
    position: absolute; bottom: -4px; left: 8px; width: 30px; height: 8px;
    background: repeating-linear-gradient(90deg, #eee 0 4px, #1b1b1b 4px 8px);
  }
  #witherBody {
    position: absolute; left: 30px; bottom: 20px; width: 80px; height: 70px;
    background: #1b1b1b; border: 2px solid #000; border-radius: 10px;
  }
  .wrib {
    position: absolute; bottom: 0; width: 14px; height: 60px;
    background: #2b2b2b; border: 1px solid #000;
    clip-path: polygon(50% 0, 100% 100%, 0 100%);
  }
  .wrib1 { left: 34px; } .wrib2 { left: 55px; } .wrib3 { left: 76px; }

  #skullFx {
    position: absolute;
    width: 20px; height: 20px;
    background: radial-gradient(circle, #eaeaea 30%, #444 70%);
    border-radius: 50%;
    box-shadow: 0 0 10px #ccc;
    display: none;
    z-index: 5;
  }

  #msg {
    position: absolute;
    top: 10px; left: 50%; transform: translateX(-50%);
    color: #fff; font-size: 20px; font-weight: bold;
    text-shadow: 2px 2px 0 #000;
    background: rgba(0,0,0,0.4);
    padding: 6px 16px;
    border-radius: 6px;
    display: none;
  }

  #controls {
    width: 900px;
    margin: 10px auto;
    text-align: center;
    color: #333;
  }
  button {
    font-family: inherit;
    font-size: 16px;
    padding: 10px 20px;
    margin: 4px;
    background: #6ab84f;
    border: 3px solid #3f7a2b;
    color: #fff;
    cursor: pointer;
    border-radius: 4px;
  }
  button:active { transform: translateY(2px); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #atkBtn { background: #4477cc; border-color: #223a66; }
  #blockBtn { background: #b8860b; border-color: #6b4e00; }
  #restartBtn { background: #cc4444; border-color: #661111; }

  #title {
    text-align: center;
    color: #fff;
    text-shadow: 2px 2px 3px #000;
    font-size: 26px;
    margin: 10px 0 0;
  }
  .hint { text-align:center; color:#555; font-size:13px; margin-top:4px; }
</style>
</head>
<body>

<h1 id="title">⚔️ 史蒂夫大戰凋零王 ⚔️</h1>

<div id="hud">
  <div class="barWrap">
    <div class="barLabel">史蒂夫</div>
    <div class="barBg"><div class="barFill" id="steveHpFill"></div></div>
    <div id="steveHpText">20/20</div>
  </div>
  <div class="barWrap">
    <div class="barLabel">凋零王</div>
    <div class="barBg"><div class="barFill" id="witherHpFill"></div></div>
    <div id="witherHpText">300/300</div>
  </div>
</div>

<div id="game">
  <div id="msg"></div>

  <div id="player">
    <div class="head"><div class="eye eyeL"></div><div class="eye eyeR"></div></div>
    <div class="body"></div>
    <div class="arm left"></div>
    <div class="arm right"><div class="sword"></div></div>
    <div class="legL"></div>
    <div class="legR"></div>
  </div>

  <div id="wither">
    <div class="whead left"><div class="weye weyeL"></div><div class="weye weyeR"></div><div class="wtooth"></div></div>
    <div class="whead right"><div class="weye weyeL"></div><div class="weye weyeR"></div><div class="wtooth"></div></div>
    <div class="whead center"><div class="weye weyeL"></div><div class="weye weyeR"></div><div class="wtooth"></div></div>
    <div id="witherBody">
      <div class="wrib wrib1"></div><div class="wrib wrib2"></div><div class="wrib wrib3"></div>
    </div>
  </div>

  <div id="skullFx"></div>
</div>

<div id="controls">
  <button id="atkBtn" onclick="playerAttack()">🗡️ 用鑽石劍攻擊</button>
  <button id="blockBtn" onclick="playerBlock()">🛡️ 防禦</button>
  <button id="restartBtn" onclick="restartGame()" style="display:none;">🔄 重新開始</button>
</div>
<div class="hint">在主世界中，史蒂夫拿著鑽石劍迎戰凋零王！點擊按鈕進行攻擊或防禦，小心凋零王的頭骨彈！</div>

<script>
const STEVE_MAX_HP = 20;
const WITHER_MAX_HP = 300;

let steveHp = STEVE_MAX_HP;
let witherHp = WITHER_MAX_HP;
let blocking = false;
let gameOver = false;
let witherAttackTimer = null;

const steveHpFill = document.getElementById('steveHpFill');
const witherHpFill = document.getElementById('witherHpFill');
const steveHpText = document.getElementById('steveHpText');
const witherHpText = document.getElementById('witherHpText');
const player = document.getElementById('player');
const wither = document.getElementById('wither');
const msg = document.getElementById('msg');
const atkBtn = document.getElementById('atkBtn');
const blockBtn = document.getElementById('blockBtn');
const restartBtn = document.getElementById('restartBtn');
const skullFx = document.getElementById('skullFx');
const game = document.getElementById('game');

function updateBars() {
  steveHpFill.style.width = Math.max(0, (steveHp / STEVE_MAX_HP) * 100) + '%';
  witherHpFill.style.width = Math.max(0, (witherHp / WITHER_MAX_HP) * 100) + '%';
  steveHpText.textContent = Math.max(0, steveHp) + '/' + STEVE_MAX_HP;
  witherHpText.textContent = Math.max(0, witherHp) + '/' + WITHER_MAX_HP;
}

function showMsg(text, duration = 900) {
  msg.textContent = text;
  msg.style.display = 'block';
  clearTimeout(showMsg._t);
  showMsg._t = setTimeout(() => { msg.style.display = 'none'; }, duration);
}

function playerAttack() {
  if (gameOver) return;
  atkBtn.disabled = true;
  blockBtn.disabled = true;
  blocking = false;

  player.classList.add('attack');
  player.style.left = '160px';

  setTimeout(() => {
    const dmg = 15 + Math.floor(Math.random() * 11); // 15-25
    witherHp -= dmg;
    wither.classList.add('hurt');
    showMsg('鑽石劍造成 ' + dmg + ' 傷害！', 700);
    updateBars();

    setTimeout(() => {
      wither.classList.remove('hurt');
      player.classList.remove('attack');
      player.style.left = '80px';

      if (witherHp <= 0) {
        witherHp = 0;
        updateBars();
        endGame(true);
        return;
      }
      setTimeout(witherTurn, 400);
    }, 250);
  }, 200);
}

function playerBlock() {
  if (gameOver) return;
  atkBtn.disabled = true;
  blockBtn.disabled = true;
  blocking = true;
  showMsg('史蒂夫舉起盾牌防禦！', 700);
  setTimeout(witherTurn, 500);
}

function witherTurn() {
  if (gameOver) return;

  skullFx.style.display = 'block';
  const startRect = wither.getBoundingClientRect();
  const gameRect = game.getBoundingClientRect();
  skullFx.style.left = (startRect.left - gameRect.left) + 'px';
  skullFx.style.top = (startRect.top - gameRect.top + 60) + 'px';

  const targetLeft = 100;
  skullFx.style.transition = 'left 0.4s linear, top 0.4s ease-in';

  requestAnimationFrame(() => {
    skullFx.style.left = targetLeft + 'px';
    skullFx.style.top = '220px';
  });

  setTimeout(() => {
    skullFx.style.display = 'none';
    skullFx.style.transition = 'none';

    let dmg = 3 + Math.floor(Math.random() * 4); // 3-6
    if (blocking) {
      dmg = Math.max(0, dmg - 4);
      showMsg(dmg > 0 ? ('盾牌擋下部分傷害，仍受到 ' + dmg + ' 點傷害') : '完全擋下了頭骨彈！', 900);
    } else {
      showMsg('凋零王的頭骨彈擊中了史蒂夫！-' + dmg, 900);
    }
    steveHp -= dmg;
    updateBars();
    blocking = false;

    if (steveHp <= 0) {
      steveHp = 0;
      updateBars();
      endGame(false);
      return;
    }

    atkBtn.disabled = false;
    blockBtn.disabled = false;
  }, 450);
}

function endGame(won) {
  gameOver = true;
  atkBtn.disabled = true;
  blockBtn.disabled = true;
  restartBtn.style.display = 'inline-block';
  if (won) {
    showMsg('🎉 史蒂夫擊敗了凋零王！勝利！', 100000);
  } else {
    showMsg('💀 史蒂夫被凋零王擊倒了……', 100000);
  }
}

function restartGame() {
  steveHp = STEVE_MAX_HP;
  witherHp = WITHER_MAX_HP;
  blocking = false;
  gameOver = false;
  updateBars();
  atkBtn.disabled = false;
  blockBtn.disabled = false;
  restartBtn.style.display = 'none';
  msg.style.display = 'none';
  player.style.left = '80px';
}

updateBars();

for (let i = 0; i < 4; i++) {
  const c = document.createElement('div');
  c.className = 'cloud';
  c.style.width = (60 + Math.random() * 60) + 'px';
  c.style.height = (20 + Math.random() * 15) + 'px';
  c.style.top = (20 + Math.random() * 100) + 'px';
  c.style.left = (Math.random() * 850) + 'px';
  game.appendChild(c);
}
</script>
<script>/* AI-CAMP-STATS-BEACON */
(function(){
  try{ if(window.top!==window.self) return; }catch(e){ return; } /* 在作品館內由作品館計數與投票 */
  var NS="ai-future-camp", K="t-fcf436c1";
  var ABS="//abacus.jasoncameron.dev/"; /* 直連備援 */
  var REL="/abacus/"; /* 同源代理（Vercel 轉發）：學校閘道擋外部網域時仍然通 */
  function ping(n){
    try{
      fetch(REL+"hit/"+NS+"/"+n).then(function(r){
        if(!r||!r.ok){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); }
      }).catch(function(){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); });
    }catch(e){}
  }
  function read(n,cb){
    function via(base,next){ try{ fetch(base+"get/"+NS+"/"+n).then(function(r){ if(r.status===404&&base===ABS) return {value:0}; if(!r.ok) throw 0; return r.json(); }).then(function(j){ cb(j.value||j.count||0); }).catch(next); }catch(e){ next(); } }
    via(REL, function(){ via(ABS, function(){ cb(null); }); });
  }
  ping(K+"-v");
  var done=false;
  function once(){ if(done)return; done=true; ping(K+"-p"); ping("site-total-plays");
    window.removeEventListener("pointerdown",once); window.removeEventListener("keydown",once); }
  window.addEventListener("pointerdown",once,{once:false}); window.addEventListener("keydown",once,{once:false});
  /* 投票鈕：非常好玩/好玩——與作品館同一計數器，任何網頁打開都同步 */
  function initVotes(){
    if(!document.body) return;
    var wrap=document.createElement("div");
    wrap.style.cssText="position:fixed;right:10px;bottom:10px;z-index:99999;display:flex;gap:6px;font-family:sans-serif;opacity:.92";
    var LS="voted-"+K;
    var defs=[["-love","\u2764\uFE0F","\u975e\u5e38\u597d\u73a9","#ff6cc7"],["-like","\ud83d\udc4d","\u597d\u73a9","#38e1ff"]];
    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;
          b.querySelector("i").textContent=Math.max(0,(n||0)-(c||0));
        }); });
      });
    }
    defs.forEach(function(d){
      var b=document.createElement("button");
      b.type="button"; b.title=d[2];
      b.style.cssText="min-height:42px;padding:8px 14px;border:none;border-radius:999px;background:rgba(15,18,32,.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation";
      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";
      b.addEventListener("click",function(){
        var prev=null; try{ prev=localStorage.getItem(LS); }catch(e){}
        if(prev===d[0]){ ping(K+d[0]+"-c"); try{ localStorage.removeItem(LS); }catch(e){} }
        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);
      });
      btns[d[0]]=b; wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    refresh();
    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* 每10秒同步別人投的票 */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
</script>
</body>
</html>
