<title>尻でジョジョをキャッチ！</title>
<meta name="description" content="ORAORAORA — 落ちてくるスタンドを尻で受け止めろ">
<style>
@font-face{
  font-family:'DotGothic';
  src:local('DotGothic16');
}
:root{
  --bg-top:#1a0e2e;
  --bg-bottom:#3d1a4a;
  --gold:#f4c430;
  --magenta:#e8478b;
  --cyan:#3ddad7;
  --ink:#fff6e8;
  --panel:#2a1440cc;
}
:root[data-theme="light"]{
  --bg-top:#f4e9d8;
  --bg-bottom:#f0c9a0;
  --ink:#2a1440;
  --panel:#ffffffcc;
}
*{box-sizing:border-box;}
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:linear-gradient(180deg,var(--bg-top),var(--bg-bottom));
  font-family:"Hiragino Sans","Yu Gothic",-apple-system,sans-serif;
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
.stage{
  position:relative;
  width:100%;
  height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  touch-action:none;
}
.speedlines{
  position:absolute;
  inset:0;
  background:
    repeating-conic-gradient(from 0deg at 50% 40%,
      rgba(244,196,48,0.05) 0deg 6deg,
      transparent 6deg 12deg);
  pointer-events:none;
  animation:spin 40s linear infinite;
}
@media (prefers-reduced-motion:reduce){ .speedlines{animation:none;} }
@keyframes spin{ to{ transform:rotate(360deg); } }

.hud{
  position:relative;
  z-index:3;
  width:min(560px,94vw);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 4px 6px;
  font-family:"Impact","Arial Black",sans-serif;
  letter-spacing:0.5px;
}
.title{
  font-size:clamp(20px,5vw,30px);
  color:var(--gold);
  text-shadow:2px 2px 0 var(--magenta), -1px -1px 0 #000;
  transform:skew(-6deg);
}
.score-box{
  background:var(--panel);
  border:2px solid var(--gold);
  border-radius:4px;
  padding:6px 14px;
  font-size:clamp(16px,4vw,22px);
  min-width:6.5em;
  text-align:right;
  font-variant-numeric:tabular-nums;
}
.score-box span{color:var(--magenta);}
#level{color:var(--cyan);}
#levelBox{transition:transform .15s ease;}
#levelBox.pulse{transform:scale(1.18);}

canvas{
  position:relative;
  z-index:2;
  width:min(560px,94vw);
  aspect-ratio:9/14;
  max-height:calc(100dvh - 130px);
  touch-action:none;
  cursor:none;
  border-radius:8px;
  box-shadow:0 0 0 3px var(--gold), 0 0 40px rgba(232,71,139,0.35);
}

.hint{
  position:relative;
  z-index:3;
  margin-top:8px;
  font-size:13px;
  opacity:0.75;
  text-align:center;
  max-width:520px;
  padding:0 10px;
}

.overlay{
  position:absolute;
  inset:0;
  z-index:5;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:16px;
  background:rgba(10,4,20,0.72);
  text-align:center;
  padding:20px;
}
:root[data-theme="light"] .overlay{ background:rgba(255,248,235,0.85); }
.overlay h1{
  font-family:"Impact","Arial Black",sans-serif;
  font-size:clamp(26px,7vw,42px);
  color:var(--gold);
  text-shadow:3px 3px 0 var(--magenta);
  transform:skew(-5deg);
  margin:0;
  text-wrap:balance;
}
.overlay p{ max-width:380px; line-height:1.6; margin:0; font-size:14px; }
button{
  font-family:inherit;
  font-weight:700;
  font-size:16px;
  padding:12px 30px;
  border-radius:999px;
  border:2px solid var(--gold);
  background:var(--magenta);
  color:#fff;
  cursor:pointer;
  letter-spacing:1px;
  box-shadow:0 4px 0 #8a1f52;
  transition:transform .08s ease;
}
button:active{ transform:translateY(3px); box-shadow:0 1px 0 #8a1f52; }
button:focus-visible{ outline:3px solid var(--cyan); outline-offset:2px; }
.hidden{ display:none !important; }
</style>

<div class="stage">
  <div class="speedlines"></div>

  <div class="hud">
    <div class="title">尻キャッチ</div>
    <div style="display:flex;gap:8px;align-items:center;">
      <div class="score-box" id="levelBox">LV <span id="level">1</span></div>
      <div class="score-box">SCORE <span id="score">0</span></div>
    </div>
  </div>

  <canvas id="game" width="360" height="560" aria-label="落ちてくるジョジョのスタンドを尻でキャッチするゲーム"></canvas>

  <div class="hint" id="hint">← → キー / マウス / 指でお尻を動かす。金のスタンドを受け止めろ。虹色のJOJOを取ると尻が覚醒する。紫の矢を落とすとライフが減る。</div>

  <div class="overlay" id="startScreen">
    <h1>尻でジョジョを<br>受け止めろ</h1>
    <p>降ってくるスタンドの矢を、鍛え上げた尻でキャッチするミニゲーム。逃すたびにライフが減る。3回外すとゲームオーバー。</p>
    <button id="startBtn">ORA と始める</button>
  </div>

  <div class="overlay hidden" id="endScreen">
    <h1 id="endTitle">やれやれだぜ</h1>
    <p id="endText"></p>
    <button id="retryBtn">もう一度</button>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const levelEl = document.getElementById('level');
  const levelBox = document.getElementById('levelBox');
  const startScreen = document.getElementById('startScreen');
  const endScreen = document.getElementById('endScreen');
  const endTitle = document.getElementById('endTitle');
  const endText = document.getElementById('endText');
  const startBtn = document.getElementById('startBtn');
  const retryBtn = document.getElementById('retryBtn');

  const W = canvas.width, H = canvas.height;
  const GROUND_Y = H - 70;
  const MAX_LEVEL = 5;

  let running = false;
  let score = 0;
  let lives = 3;
  let items = [];
  let particles = [];
  let popups = [];
  let spawnTimer = 0;
  let spawnInterval = 70;
  let elapsed = 0;
  let buttX = W/2;
  let squash = 0;
  let shake = 0;
  let buttLevel = 1;
  let levelFlash = 0;
  let rafId = null;

  const COLORS = {
    good: '#f4c430',
    goodEdge: '#a87a0a',
    bad: '#e8478b',
    badEdge: '#8a1f52',
    skin: '#e8a87c',
    skinShade: '#c47f52',
    pants: '#3ddad7'
  };
  const LEVEL_PANTS = ['#3ddad7','#3ddad7','#5be8b0','#f4c430','#e8478b','#ffffff'];

  function reset(){
    score = 0; lives = 3; items = []; particles = []; popups = [];
    spawnTimer = 0; spawnInterval = 70; elapsed = 0;
    buttX = W/2; squash = 0; shake = 0; buttLevel = 1; levelFlash = 0;
    scoreEl.textContent = '0';
    levelEl.textContent = '1';
  }

  function spawnItem(){
    const roll = Math.random();
    const isJojo = roll < 0.06 && buttLevel < MAX_LEVEL;
    const isGood = isJojo ? true : roll < 0.80;
    items.push({
      x: 30 + Math.random()*(W-60),
      y: -20,
      vy: 2.2 + Math.random()*1.4 + Math.min(elapsed/1400, 2.5),
      good: isGood,
      jojo: isJojo,
      rot: (Math.random()-0.5)*0.6,
      vr: (Math.random()-0.5)*0.08,
      caught: false,
      r: 16
    });
  }

  function drawJojoStar(it){
    ctx.save();
    ctx.translate(it.x, it.y);
    ctx.rotate(it.rot*0.6 + elapsed*0.06);
    const spikes = 8;
    const hue = (elapsed*4) % 360;
    ctx.fillStyle = 'hsl(' + hue + ',85%,62%)';
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for(let i=0;i<spikes*2;i++){
      const rad = i%2===0 ? 15 : 6;
      const a = (Math.PI/spikes)*i;
      const px = Math.sin(a)*rad, py = -Math.cos(a)*rad;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }

  function drawArrow(it){
    ctx.save();
    ctx.translate(it.x, it.y);
    ctx.rotate(it.rot);
    const c = it.good ? COLORS.good : COLORS.bad;
    const edge = it.good ? COLORS.goodEdge : COLORS.badEdge;
    ctx.beginPath();
    ctx.moveTo(0,-18);
    ctx.lineTo(9,0);
    ctx.lineTo(3,0);
    ctx.lineTo(3,16);
    ctx.lineTo(-3,16);
    ctx.lineTo(-3,0);
    ctx.lineTo(-9,0);
    ctx.closePath();
    ctx.fillStyle = c;
    ctx.strokeStyle = edge;
    ctx.lineWidth = 2;
    ctx.fill();
    ctx.stroke();
    if(it.good){
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.beginPath();
      ctx.moveTo(-1,-14);
      ctx.lineTo(2,-2);
      ctx.lineTo(-1,-2);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  function drawButt(){
    const bob = Math.sin(elapsed*0.05)*2;
    const sq = 1 + squash;
    const growth = 1 + (buttLevel-1)*0.11;
    ctx.save();
    ctx.translate(buttX, GROUND_Y + bob);

    if(buttLevel > 1){
      const auraR = 46*growth + Math.sin(elapsed*0.08)*3 + levelFlash*20;
      const grad = ctx.createRadialGradient(0,-4,4,0,-4,auraR);
      const hue = 45 - (buttLevel-2)*20;
      grad.addColorStop(0, 'hsla('+hue+',95%,60%,'+(0.28+levelFlash*0.4)+')');
      grad.addColorStop(1, 'hsla('+hue+',95%,60%,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0,-4,auraR,0,Math.PI*2);
      ctx.fill();
    }

    ctx.scale(growth/sq, growth*sq);

    ctx.fillStyle = LEVEL_PANTS[buttLevel-1] || COLORS.pants;
    ctx.beginPath();
    ctx.ellipse(-19, 4, 24, 30, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(19, 4, 24, 30, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.strokeStyle = 'rgba(0,0,0,0.18)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0,-24);
    ctx.quadraticCurveTo(0, 6, 0, 30);
    ctx.stroke();

    ctx.strokeStyle = COLORS.gold;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-40,-14);
    ctx.lineTo(40,-14);
    ctx.stroke();

    ctx.fillStyle = 'rgba(255,255,255,0.16)';
    ctx.beginPath();
    ctx.ellipse(-24,-8,9,14,-0.3,0,Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(14,-8,9,14,-0.3,0,Math.PI*2);
    ctx.fill();

    if(buttLevel >= 3){
      ctx.font = 'bold 13px sans-serif';
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.textAlign = 'center';
      ctx.fillText('★'.repeat(buttLevel-2), 0, -20);
    }

    ctx.restore();
  }

  function drawGround(){
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(0, GROUND_Y+34, W, H-(GROUND_Y+34));
    ctx.fillStyle = 'rgba(244,196,48,0.12)';
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y+34);
    ctx.lineTo(W, GROUND_Y+34);
    ctx.lineTo(W, GROUND_Y+38);
    ctx.lineTo(0, GROUND_Y+38);
    ctx.fill();
  }

  function drawLives(){
    for(let i=0;i<3;i++){
      ctx.beginPath();
      const cx = 22 + i*24, cy = 24;
      ctx.arc(cx, cy, 8, 0, Math.PI*2);
      ctx.fillStyle = i < lives ? COLORS.magenta : 'rgba(255,255,255,0.15)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  function burst(x,y,color){
    for(let i=0;i<10;i++){
      const a = Math.random()*Math.PI*2;
      const sp = 1.5+Math.random()*3;
      particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:26,color});
    }
  }

  function update(){
    elapsed++;
    spawnTimer++;
    if(spawnTimer > spawnInterval){
      spawnTimer = 0;
      spawnInterval = Math.max(26, 70 - elapsed/40);
      spawnItem();
    }

    for(let i=items.length-1;i>=0;i--){
      const it = items[i];
      it.y += it.vy;
      it.rot += it.vr;

      if(!it.caught && it.y > GROUND_Y-30 && it.y < GROUND_Y+10 && Math.abs(it.x-buttX) < 46){
        it.caught = true;
        squash = 0.22;
        shake = it.good ? 4 : 8;
        if(it.jojo){
          buttLevel = Math.min(MAX_LEVEL, buttLevel+1);
          levelEl.textContent = buttLevel;
          levelFlash = 1;
          score += 30;
          scoreEl.textContent = score;
          levelBox.classList.add('pulse');
          setTimeout(()=>levelBox.classList.remove('pulse'), 150);
          burst(it.x, it.y, '#fff');
          burst(it.x, it.y, COLORS.good);
          shake = 10;
          popups.push({x:it.x, y:it.y-10, life:50, text:'尻レベルアップ！'});
        } else if(it.good){
          score += 10;
          scoreEl.textContent = score;
          burst(it.x, it.y, COLORS.gold);
        } else {
          lives -= 1;
          burst(it.x, it.y, COLORS.bad);
          if(lives <= 0){ gameOver(); return; }
        }
        items.splice(i,1);
        continue;
      }
      if(it.y > H+30){
        if(it.good && !it.jojo){
          lives -= 1;
          if(lives <= 0){ gameOver(); return; }
        }
        items.splice(i,1);
      }
    }

    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
      if(p.life<=0) particles.splice(i,1);
    }

    for(let i=popups.length-1;i>=0;i--){
      const p = popups[i];
      p.y -= 0.5; p.life--;
      if(p.life<=0) popups.splice(i,1);
    }

    squash *= 0.85;
    shake *= 0.8;
    levelFlash *= 0.9;
  }

  function draw(){
    ctx.clearRect(0,0,W,H);

    ctx.save();
    if(shake > 0.3){
      ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    }

    drawGround();
    for(const it of items){ it.jojo ? drawJojoStar(it) : drawArrow(it); }
    drawButt();
    for(const p of particles){
      ctx.globalAlpha = Math.max(0,p.life/26);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x,p.y,3,0,Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    for(const p of popups){
      ctx.globalAlpha = Math.max(0, p.life/50);
      ctx.font = 'bold 15px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = COLORS.magenta;
      ctx.lineWidth = 3;
      ctx.strokeText(p.text, p.x, p.y);
      ctx.fillText(p.text, p.x, p.y);
      ctx.globalAlpha = 1;
    }
    drawLives();

    ctx.restore();
  }

  function loop(){
    if(!running) return;
    update();
    draw();
    rafId = requestAnimationFrame(loop);
  }

  function gameOver(){
    running = false;
    cancelAnimationFrame(rafId);
    endTitle.textContent = score >= 150 ? 'GOLD EXPERIENCE!' : 'やれやれだぜ';
    endText.textContent = 'スコア ' + score + ' 點。金のスタンドを尻でキャッチした栄光の記録だ。';
    endScreen.classList.remove('hidden');
  }

  function start(){
    reset();
    startScreen.classList.add('hidden');
    endScreen.classList.add('hidden');
    running = true;
    loop();
  }

  startBtn.addEventListener('click', start);
  retryBtn.addEventListener('click', start);

  function setButtX(clientX){
    const rect = canvas.getBoundingClientRect();
    const x = (clientX - rect.left) * (W/rect.width);
    buttX = Math.max(30, Math.min(W-30, x));
  }
  canvas.addEventListener('mousemove', e => setButtX(e.clientX));
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    setButtX(e.touches[0].clientX);
  }, {passive:false});
  canvas.addEventListener('touchstart', e => {
    setButtX(e.touches[0].clientX);
  }, {passive:false});

  const keys = {};
  window.addEventListener('keydown', e => { keys[e.key]=true; });
  window.addEventListener('keyup', e => { keys[e.key]=false; });
  setInterval(() => {
    if(!running) return;
    if(keys['ArrowLeft']) buttX = Math.max(30, buttX-9);
    if(keys['ArrowRight']) buttX = Math.min(W-30, buttX+9);
  }, 16);

  draw();
})();
</script>
