<!doctype html>
<!-- v2：戶外泳池庭園＋大廳服務人員與電梯＋雙人房（雙床＋衣櫃＋電視＋浴缸） -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>飯店入住體驗 - AMY與RUBY</title>
<meta name="author" content="AI未來創作營隊">
<style>
  :root{
    --cyan:#38e1ff; --blue:#4f7cff; --purple:#9a6bff; --pink:#ff6cc7;
    --bg:#070b14; --card:#101728; --card-b:#28324a; --text:#eaf1ff; --dim:#8ea0c2;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;touch-action:none;
    background:var(--bg);color:var(--text);
    font-family:-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
    -webkit-user-select:none;user-select:none;overscroll-behavior:none}
  #stage{position:relative;width:100%;height:100%}
  canvas#game{display:block;width:100%;height:100%;touch-action:none}

  #hud{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;
    gap:8px;pointer-events:none;display:none;flex-wrap:wrap}
  .panel{background:rgba(16,23,40,.88);border:1px solid var(--card-b);border-radius:12px;
    padding:8px 14px;font-size:13px;box-shadow:0 8px 20px rgba(0,0,0,.4)}
  .panel b{color:var(--cyan)}
  #panelR b{color:var(--pink)}
  #clockPanel b{color:#ffcf5c}
  #areaPanel{position:absolute;top:10px;left:50%;transform:translateX(-50%);pointer-events:none;display:none}
  #areaPanel b{color:var(--purple)}

  #hintBar{position:absolute;top:56px;left:50%;transform:translateX(-50%);
    background:rgba(16,23,40,.9);border:1px solid var(--card-b);color:var(--text);padding:8px 20px;
    border-radius:999px;font-size:13.5px;display:none;pointer-events:none;transition:opacity .5s;white-space:nowrap;
    max-width:90vw;overflow:hidden;text-overflow:ellipsis}

  .ovl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 30%, rgba(30,40,70,.7) 0%, rgba(4,6,14,.92) 100%);z-index:40}
  .ovl .card{background:var(--card);border:1px solid var(--card-b);border-radius:16px;
    padding:26px 32px 22px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.5);
    max-width:min(460px,92vw);max-height:94vh;overflow:auto}
  .brand{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin-bottom:2px}
  .card h1,.card h2{margin:0 0 4px;font-size:26px;
    background:linear-gradient(92deg,var(--cyan),var(--blue),var(--purple));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .rule{width:52px;height:2px;background:linear-gradient(92deg,var(--cyan),var(--purple));margin:10px auto 12px;border-radius:2px}
  .card p{color:var(--dim);font-size:13.5px;line-height:1.7;margin:0 0 12px}
  .keys{font-size:13px;text-align:left;background:#0b1120;border:1px solid var(--card-b);border-radius:10px;
    padding:10px 14px;margin:0 0 14px;line-height:1.9}
  .keys b{color:var(--cyan)}
  .keys .r{color:var(--pink)}
  kbd{background:#1c2740;border:1px solid var(--card-b);border-radius:4px;padding:1px 7px;font-family:inherit;font-size:12px}
  .bigbtn{display:block;width:100%;margin:8px 0 0;font:600 16px inherit;min-height:52px;
    background:linear-gradient(92deg,var(--cyan),var(--blue));color:#04101f;border:none;
    padding:13px 24px;border-radius:999px;cursor:pointer;box-shadow:0 8px 20px rgba(56,225,255,.25)}
  .bigbtn:active{transform:scale(.97)}
  .bigbtn.alt{background:#1c2740;color:var(--text);border:1.5px solid var(--card-b);box-shadow:none}
  #stars{font-size:32px;letter-spacing:6px;color:#ffcf5c;margin:2px 0 6px}
  #endStats{font-size:14px;line-height:1.9;margin:0 0 6px}
  #endStats b{color:var(--cyan)}
  #muteBtn{position:absolute;top:10px;right:10px;width:46px;height:46px;border-radius:50%;
    background:var(--card);border:1px solid var(--card-b);font-size:18px;cursor:pointer;z-index:30;padding:0}
  @media (max-height:520px){ .card h1,.card h2{font-size:21px} .card p{margin-bottom:8px} }
</style>
</head>
<body>
<div id="stage">
  <canvas id="game"></canvas>
  <div id="hud">
    <div id="panelA" class="panel">AMY <b id="taskA">走去撿行李箱</b></div>
    <div id="clockPanel" class="panel">⏱ <b id="clockTxt">0:00</b> ｜ ⭐ <b id="starTxt">0</b>/6</div>
    <div id="panelR" class="panel">RUBY <b id="taskB">走去撿行李箱</b></div>
  </div>
  <div id="areaPanel" class="panel">📍 <b id="areaTxt">飯店庭園</b></div>
  <div id="hintBar"></div>
  <button id="muteBtn" aria-label="切換音效">🔊</button>

  <div class="ovl" id="titleOvl">
    <div class="card">
      <div class="brand">AI未來創作營隊</div>
      <h1>飯店入住體驗</h1>
      <div class="rule"></div>
      <p>AMY 和 RUBY 一起入住飯店！先在庭園撿起行李箱，走進大廳向服務人員辦理入住拿到房卡，
        搭電梯上樓，走進房間、躺上任何一張床就算入住完成。路上順便撿 6 顆星星，
        兩人都可以去浴缸泡澡，也能到衣櫃換上泳裝，搭樓梯到頂樓泳池真的跳下去游泳！</p>
      <div class="keys">
        <b>AMY</b>：<kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 移動<br>
        <span class="r"><b style="color:var(--pink)">RUBY</b></span>：<kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 移動<br>
        📱 平板：畫面左右兩側各自拖曳操作
      </div>
      <button class="bigbtn" id="startBtn">開始遊戲</button>
      <div class="panel" id="bestLine" style="margin-top:12px;display:none"></div>
    </div>
  </div>

  <div class="ovl" id="endOvl" style="display:none">
    <div class="card">
      <div class="brand">Check-in Complete</div>
      <h2>入住成功！</h2>
      <div id="stars">★★★</div>
      <div id="endStats"></div>
      <button class="bigbtn" id="replayBtn">再玩一次</button>
      <button class="bigbtn alt" id="menuBtn">回到標題</button>
    </div>
  </div>
</div>

<script>
'use strict';
(function(){
const $ = id => document.getElementById(id);
const stage = $('stage'), canvas = $('game'), ctx = canvas.getContext('2d');
const clamp = (v,a,b)=> v<a?a:v>b?b:v;
const rnd = (a,b)=> a + Math.random()*(b-a);
const dist = (ax,ay,bx,by)=> Math.hypot(ax-bx,ay-by);

/* ---------- 音效 ---------- */
let AC=null, master=null, muted=false;
try{ muted = localStorage.getItem('hotel2_mute')==='1'; }catch(e){}
const muteBtn = $('muteBtn');
function updateMuteBtn(){ muteBtn.textContent = muted?'🔇':'🔊'; }
updateMuteBtn();
muteBtn.addEventListener('click', e=>{
  e.stopPropagation(); muted=!muted;
  try{ localStorage.setItem('hotel2_mute', muted?'1':'0'); }catch(err){}
  updateMuteBtn(); if(!muted) sfx.blip();
});
function audio(){
  if(!AC){
    try{
      AC = new (window.AudioContext||window.webkitAudioContext)();
      const comp = AC.createDynamicsCompressor();
      comp.threshold.value=-20; comp.knee.value=26; comp.ratio.value=8;
      comp.attack.value=.003; comp.release.value=.22;
      master = AC.createGain(); master.gain.value=.85;
      master.connect(comp); comp.connect(AC.destination);
    }catch(e){}
  }
  if(AC && AC.state==='suspended') AC.resume();
  return AC;
}
addEventListener('pointerdown', audio); addEventListener('keydown', audio);
function beep(freq,dur,type,vol,slide){
  const ac=audio(); if(!ac||muted||!master) return;
  freq *= .97+Math.random()*.06;
  const o=ac.createOscillator(), g=ac.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(freq,ac.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30,freq+slide), ac.currentTime+dur);
  g.gain.setValueAtTime(vol||.1, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.001, ac.currentTime+dur);
  o.connect(g); g.connect(master); o.start(); o.stop(ac.currentTime+dur+.02);
}
function noiseBurst(dur,vol,low){
  const ac=audio(); if(!ac||muted||!master) return;
  const len=Math.max(1,Math.floor(ac.sampleRate*dur));
  const buf=ac.createBuffer(1,len,ac.sampleRate); const d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
  const src=ac.createBufferSource(); src.buffer=buf;
  const f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=low||1200;
  const g=ac.createGain(); g.gain.value=vol||.15;
  src.connect(f); f.connect(g); g.connect(master); src.start();
}
const sfx = {
  blip(){ beep(720,.06,'triangle',.09); },
  step(){ beep(rnd(170,200),.03,'triangle',.03); },
  pickup(){ beep(660,.08,'square',.09); setTimeout(()=>beep(880,.1,'square',.08),70); },
  door(){ beep(300,.12,'square',.06,60); },
  ding(){ beep(1319,.4,'sine',.13); setTimeout(()=>beep(1976,.6,'sine',.08),60); },
  elevator(){ beep(440,.5,'sine',.08,220); },
  dropoff(){ beep(523,.12,'triangle',.1); setTimeout(()=>beep(784,.16,'triangle',.11),90); },
  star(){ beep(1046,.08,'square',.08); setTimeout(()=>beep(1318,.1,'square',.07),60); },
  splash(){ noiseBurst(.3,.18,700); beep(280,.2,'sine',.08,-100); },
  sleep(){ beep(392,.18,'sine',.1,-60); setTimeout(()=>beep(330,.3,'sine',.08,-40),150); },
  win(){ [523,659,784,1047,784,1047,1319].forEach((f,i)=>setTimeout(()=>beep(f,.2,'triangle',.11), i*110)); }
};

/* ---------- 世界（三個場景：庭園／大廳／客房） ---------- */
const WORLD = { w: 900, h: 560 };
const AREA_LABEL = { outdoor:'飯店庭園', lobby:'大廳', room:'雙人客房', rooftop:'頂樓泳池' };

const AREAS = {
  outdoor: {
    doors: [ {x:706,y:230,w:56,h:90,to:'lobby',ex:110,ey:470,label:'飯店大門'} ],
    trees: [ [40,60],[90,110],[860,70],[820,130],[40,480],[860,470],[20,300],[870,300] ],
    pool: { x:80, y:330, w:270, h:170 },
    building: { x:660, y:60, w:200, h:280 },
    suitcaseSpots: [ {x:120,y:250}, {x:170,y:200} ],
    stars: [ {x:250,y:420},{x:400,y:480},{x:500,y:130},{x:610,y:420} ]
  },
  lobby: {
    doors: [
      {x:16,y:420,w:56,h:80,to:'outdoor',ex:400,ey:480,label:'走出大門'},
      {x:760,y:190,w:90,h:160,to:'room',ex:110,ey:470,label:'搭電梯上樓'}
    ],
    counter: { x:340, y:60, w:220, h:100 },
    staff: { x:450, y:80 },
    stars: [ {x:200,y:260},{x:620,y:420} ]
  },
  room: {
    doors: [
      {x:16,y:440,w:56,h:80,to:'lobby',ex:400,ey:300,label:'搭電梯下樓'},
      {x:812,y:472,w:60,h:66,to:'rooftop',ex:150,ey:520,label:'樓梯上頂樓'}
    ],
    wallX: 450, doorGapY: [200,270],
    bedA: { x:60, y:330, w:150, h:110 },
    wardrobe: { x:60, y:90, w:90, h:130 },
    bedB: { x:700, y:330, w:150, h:110 },
    tv: { x:820, y:110, w:60, h:50 },
    bathtub: { x:670, y:90, w:150, h:110 }
  },
  rooftop: {
    doors: [ {x:410,y:470,w:80,h:70,to:'room',ex:600,ey:300,label:'樓梯下樓'} ],
    pool: { x:220, y:150, w:460, h:260 },
    sunbeds: [ [120,200],[120,280],[740,200],[740,280] ]
  }
};

let suitcases = [], starObjs = [];
function loadAreaObjects(area){
  const A = AREAS[area];
  if(area==='outdoor'){
    suitcases = A.suitcaseSpots.map(s=>({x:s.x,y:s.y,taken:false}));
  }
}
starObjs = [];
function rebuildStars(){
  starObjs = [];
  for(const key of ['outdoor','lobby']) AREAS[key].stars.forEach(s=> starObjs.push({area:key,x:s.x,y:s.y,taken:false,phase:Math.random()*6}));
}

function makePlayer(idx, ctrl){
  return {
    idx, ctrl,
    name: idx===0 ? 'AMY':'RUBY',
    color: idx===0 ? '#ff6cc7' : '#38e1ff',
    hair: idx===0 ? '#7a3a5a' : '#2a3a6a',
    x: idx===0 ? 640:700, y: idx===0 ? 480:480,
    dir: 1, moving:false, walk:0, speed: 150,
    hasSuitcase:false, hasKey:false,
    stage: 0,        // 0 撿行李 1 拿房卡 2 回房休息 3 完成
    lying:false, bathing:false, swimming:false, nearWardrobe:false,
    outfit:'normal', // 'normal' | 'swim'
    squash:0
  };
}
let p1 = makePlayer(0,'wasd'), p2 = makePlayer(1,'arrows');
let players = [p1,p2];

const S = { scene:'title', area:'outdoor', time:0, starsGot:0, over:false, doneCount:0, staffLine:0, staffTalkT:0, doorCooldown:0 };
let best = null;
try{ best = JSON.parse(localStorage.getItem('hotel2_best')||'null'); }catch(e){}

function resetGame(){
  S.time=0; S.starsGot=0; S.over=false; S.doneCount=0; S.scene='play'; S.area='outdoor';
  p1 = makePlayer(0,'wasd'); p2 = makePlayer(1,'arrows'); players=[p1,p2];
  loadAreaObjects('outdoor'); rebuildStars();
  confetti.length=0; floats.length=0; bubbles.length=0;
  $('starTxt').textContent='0';
  $('areaTxt').textContent = AREA_LABEL['outdoor'];
  updateTaskLabels();
  showHint('先在庭園撿起行李箱吧！');
}
function taskLabel(p){
  return ['去庭園撿行李箱','走進大廳辦理入住','搭電梯回房休息','入住完成！'][p.stage];
}
function updateTaskLabels(){
  $('taskA').textContent = taskLabel(p1);
  $('taskB').textContent = taskLabel(p2);
}
let hintFade=null;
function showHint(text){
  const el=$('hintBar');
  el.textContent=text; el.style.display='block'; el.style.opacity='1';
  clearTimeout(hintFade);
  hintFade=setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>{el.style.display='none';},600); }, 4200);
}
function fmtTime(t){ const m=Math.floor(t/60), s=Math.floor(t%60); return m+':'+(s<10?'0':'')+s; }

function enterTitle(){
  S.scene='title';
  $('titleOvl').style.display='flex'; $('endOvl').style.display='none';
  $('hud').style.display='none'; $('hintBar').style.display='none'; $('areaPanel').style.display='none';
  if(best){ $('bestLine').style.display='block';
    $('bestLine').innerHTML = '🏆 最佳紀錄：<b>'+fmtTime(best.time)+'</b>（'+'★'.repeat(best.stars)+'）'; }
}
function enterPlay(){
  resetGame();
  $('titleOvl').style.display='none'; $('endOvl').style.display='none';
  $('hud').style.display='flex'; $('areaPanel').style.display='block';
}
function calcStars(){
  let s=1;
  if(S.starsGot>=6) s++;
  if(S.time<=70) s++;
  return s;
}
function showEnd(){
  S.scene='end';
  const stars_ = calcStars();
  $('stars').textContent = '★'.repeat(stars_)+'☆'.repeat(3-stars_);
  $('endStats').innerHTML = '入住時間 <b>'+fmtTime(S.time)+'</b> ｜ 星星 <b>'+S.starsGot+'/6</b>';
  const rec={ time:Math.round(S.time), stars:stars_ };
  if(!best || stars_>best.stars || (stars_===best.stars && rec.time<best.time)){
    best=rec; try{ localStorage.setItem('hotel2_best', JSON.stringify(best)); }catch(e){}
  }
  $('endOvl').style.display='flex'; $('hud').style.display='none'; $('areaPanel').style.display='none';
}
function endGame(){
  if(S.over) return;
  S.over=true; sfx.win();
  const cx=stage.clientWidth/2, cy=stage.clientHeight/2;
  for(let i=0;i<3;i++) setTimeout(()=>burstConfetti(rnd(cx-200,cx+200), rnd(cy-140,cy+40), 24), i*160);
  setTimeout(showEnd, 900);
}

$('startBtn').addEventListener('click', ()=>{ sfx.blip(); enterPlay(); });
$('replayBtn').addEventListener('click', ()=>{ sfx.blip(); enterPlay(); });
$('menuBtn').addEventListener('click', ()=>{ sfx.blip(); enterTitle(); });

/* ---------- 輸入 ---------- */
const keys = {};
addEventListener('keydown', e=>{
  keys[e.code]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
  if(S.scene==='title' && e.code==='Space'){ enterPlay(); return; }
  if(S.scene==='end' && e.code==='Space'){ enterPlay(); return; }
});
addEventListener('keyup', e=>{ keys[e.code]=false; });

/* ---------- 觸控（左右半螢幕各自搖桿） ---------- */
const sticks = {};
canvas.addEventListener('pointerdown', e=>{
  if(S.scene!=='play' || e.pointerType==='mouse') return;
  e.preventDefault();
  const who = e.clientX < stage.clientWidth/2 ? 'wasd':'arrows';
  for(const id in sticks) if(sticks[id].who===who) return;
  sticks[e.pointerId] = { who, bx:e.clientX, by:e.clientY, dx:0, dy:0 };
});
canvas.addEventListener('pointermove', e=>{
  const st=sticks[e.pointerId]; if(!st) return;
  e.preventDefault();
  let dx=e.clientX-st.bx, dy=e.clientY-st.by;
  const len=Math.hypot(dx,dy), DEAD=9, R=50;
  if(len<DEAD){ st.dx=st.dy=0; return; }
  if(len>R){ st.bx=e.clientX-dx/len*R; st.by=e.clientY-dy/len*R; }
  const n=Math.min(len,R)/R; st.dx=dx/len*n; st.dy=dy/len*n;
});
function endStick(e){ delete sticks[e.pointerId]; }
canvas.addEventListener('pointerup', endStick);
canvas.addEventListener('pointercancel', endStick);
canvas.addEventListener('contextmenu', e=>e.preventDefault());
function stickDir(who){ for(const id in sticks) if(sticks[id].who===who) return sticks[id]; return null; }

/* ---------- 畫布尺寸與世界->螢幕 ---------- */
let scale=1, offX=0, offY=0;
function resize(){
  const dpr = Math.min(devicePixelRatio||1, 2);
  canvas.width = stage.clientWidth*dpr; canvas.height = stage.clientHeight*dpr;
  canvas.style.width = stage.clientWidth+'px'; canvas.style.height = stage.clientHeight+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  scale = Math.min(stage.clientWidth/WORLD.w, stage.clientHeight/WORLD.h);
  offX = (stage.clientWidth - WORLD.w*scale)/2;
  offY = (stage.clientHeight - WORLD.h*scale)/2;
}
addEventListener('resize', resize);
resize();
function toScreen(x,y){ return [x*scale+offX, y*scale+offY]; }

/* ---------- 更新 ---------- */
function movePlayer(p, dx, dy, dt){
  if(p.stage>=3){ p.moving=false; p.squash=Math.max(0,p.squash-dt*2.2); return; } // 入住完成後安穩躺著
  const len = Math.hypot(dx,dy);
  const wasMoving = p.moving;
  p.moving = len > .05;
  if(p.moving && (p.lying||p.bathing)){ p.lying=false; p.bathing=false; }
  if(p.moving){
    dx/=len; dy/=len;
    const spd = p.swimming ? p.speed*.6 : p.speed;
    let nx = clamp(p.x + dx*spd*dt, 24, WORLD.w-24);
    let ny = clamp(p.y + dy*spd*dt, 24, WORLD.h-24);
    // 客房場景牆壁碰撞（僅允許從門縫穿過）
    if(S.area==='room'){
      const A = AREAS.room, wx = A.wallX, gap = A.doorGapY;
      const crossing = (p.x - wx) * (nx - wx) < 0;
      if(crossing && !(ny > gap[0]-14 && ny < gap[1]+14)) nx = p.x;
    }
    p.x = nx; p.y = ny;
    p.dir = dx>=0 ? 1 : -1;
    p.walk += dt*8;
    p.stepT = (p.stepT||0) - dt;
    if(p.stepT<=0){ p.stepT=.28; sfx.step(); }
  }
  p.squash = Math.max(0, p.squash - dt*2.2);
}
function inZone(p, z){ return p.x>z.x && p.x<z.x+z.w && p.y>z.y && p.y<z.y+z.h; }

function changeArea(to, ex, ey){
  S.area = to;
  $('areaTxt').textContent = AREA_LABEL[to];
  loadAreaObjects(to);
  players.forEach((p,i)=>{ p.x = ex + i*40; p.y = ey; p.lying=false; p.bathing=false; p.swimming=false; });
  S.doorCooldown = 0.6;
  sfx.door();
  showHint('來到了「'+AREA_LABEL[to]+'」');
}
function updateDoors(){
  if(S.doorCooldown>0) return;
  const A = AREAS[S.area];
  for(const d of A.doors){
    for(const p of players){
      if(inZone(p,d)){
        if(d.to==='room' || d.to==='lobby') sfx.elevator();
        changeArea(d.to, d.ex, d.ey);
        return;
      }
    }
  }
}

function updateTasks(p){
  if(S.area==='outdoor' && p.stage===0){
    for(const s of suitcases){
      if(!s.taken && dist(p.x,p.y,s.x,s.y)<34){
        s.taken=true; p.hasSuitcase=true; p.stage=1; p.squash=1;
        sfx.pickup(); floatText(p.x,p.y,'拿起行李箱！','#ffcf5c');
        updateTaskLabels(); showHint(p.name+'：走進大廳辦理入住！');
      }
    }
  }else if(S.area==='lobby' && p.stage===1){
    const c = AREAS.lobby.counter;
    if(dist(p.x,p.y, c.x+c.w/2, c.y+c.h+10) < 60){
      p.hasKey=true; p.stage=2; p.squash=1;
      S.staffLine = (S.staffLine+1)%3; S.staffTalkT = 2.4;
      sfx.ding(); floatText(p.x,p.y,'拿到房卡了！','#38e1ff');
      updateTaskLabels(); showHint(p.name+'：搭電梯回房休息吧！');
    }
  }else if(S.area==='room' && p.stage===2){
    if(inZone(p,AREAS.room.bedA) || inZone(p,AREAS.room.bedB)){
      p.lying=true; p.stage=3; p.squash=1; p.moving=false;
      sfx.sleep(); floatText(p.x,p.y,'入住完成！','#ff6cc7');
      updateTaskLabels();
    }
  }
  if(S.area==='room'){
    const bt = AREAS.room.bathtub;
    if(!p.bathing && inZone(p,bt) && dist(p.x,p.y, bt.x+bt.w/2, bt.y+bt.h/2) < 60){
      p.bathing = true; p.moving=false; sfx.splash();
      floatText(p.x,p.y,'泡澡好舒服～','#38e1ff');
    }
    updateWardrobe(p);
  }
  if(S.area==='rooftop') updateSwim(p);
}
function updateWardrobe(p){
  const wd = AREAS.room.wardrobe;
  const near = p.x>wd.x-24 && p.x<wd.x+wd.w+24 && p.y>wd.y-24 && p.y<wd.y+wd.h+24;
  if(near && !p.nearWardrobe){
    p.outfit = p.outfit==='swim' ? 'normal' : 'swim';
    sfx.blip();
    floatText(p.x,p.y, p.outfit==='swim' ? '換上泳裝！':'換回便服', '#9a6bff');
  }
  p.nearWardrobe = near;
}
function updateSwim(p){
  const pl = AREAS.rooftop.pool;
  const inPool = p.x>pl.x && p.x<pl.x+pl.w && p.y>pl.y && p.y<pl.y+pl.h;
  if(inPool && !p.swimming){
    p.swimming = true; sfx.splash();
    floatText(p.x,p.y,'跳進泳池游泳！','#38e1ff');
  }else if(!inPool && p.swimming){
    p.swimming = false;
  }
}
function updateStars(){
  starObjs.forEach(st=>{
    if(st.taken || st.area!==S.area) return;
    players.forEach(p=>{
      if(st.taken) return;
      if(dist(p.x,p.y,st.x,st.y)<30){
        st.taken=true; S.starsGot++;
        $('starTxt').textContent = S.starsGot;
        sfx.star(); floatText(st.x,st.y,'⭐+1','#ffcf5c');
      }
    });
  });
}

function update(dt){
  if(S.scene!=='play' || S.over){ updateConfetti(dt); updateFloats(dt); updateBubbles(dt); return; }
  S.time += dt;
  $('clockTxt').textContent = fmtTime(S.time);
  S.staffTalkT = Math.max(0, S.staffTalkT - dt);
  S.doorCooldown = Math.max(0, S.doorCooldown - dt);

  let dx1=0,dy1=0;
  if(keys['KeyW']) dy1--; if(keys['KeyS']) dy1++;
  if(keys['KeyA']) dx1--; if(keys['KeyD']) dx1++;
  const st1 = stickDir('wasd'); if(st1){ dx1+=st1.dx; dy1+=st1.dy; }
  movePlayer(p1, dx1, dy1, dt);

  let dx2=0,dy2=0;
  if(keys['ArrowUp']) dy2--; if(keys['ArrowDown']) dy2++;
  if(keys['ArrowLeft']) dx2--; if(keys['ArrowRight']) dx2++;
  const st2 = stickDir('arrows'); if(st2){ dx2+=st2.dx; dy2+=st2.dy; }
  movePlayer(p2, dx2, dy2, dt);

  updateDoors();
  updateTasks(p1); updateTasks(p2);
  S.doneCount = players.filter(p=>p.stage>=3).length;
  if(S.doneCount>=2 && !S.over) endGame();
  updateStars();
  updateConfetti(dt); updateFloats(dt); updateBubbles(dt);
}

/* ---------- 粒子 ---------- */
const confetti=[];
const CONF_COLORS=['#38e1ff','#4f7cff','#9a6bff','#ff6cc7','#ffcf5c'];
function burstConfetti(sx,sy,n){
  for(let i=0;i<n;i++){
    if(confetti.length>220) return;
    confetti.push({x:sx,y:sy,vx:rnd(-130,130),vy:rnd(-240,-60),rot:rnd(0,6),vr:rnd(-8,8),
      life:rnd(.8,1.4),max:1.4,color:CONF_COLORS[i%CONF_COLORS.length],w:rnd(4,7),h:rnd(2,4)});
  }
}
function updateConfetti(dt){
  for(let i=confetti.length-1;i>=0;i--){
    const c=confetti[i]; c.x+=c.vx*dt; c.y+=c.vy*dt; c.vy+=420*dt; c.rot+=c.vr*dt; c.life-=dt;
    if(c.life<=0){ confetti[i]=confetti[confetti.length-1]; confetti.pop(); }
  }
}
function drawConfetti(){
  for(const c of confetti){
    ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.rot);
    ctx.globalAlpha=clamp(c.life/c.max*1.6,0,1); ctx.fillStyle=c.color;
    ctx.fillRect(-c.w/2,-c.h/2,c.w,c.h); ctx.restore();
  }
  ctx.globalAlpha=1;
}
const floats=[];
function floatText(wx,wy,text,color){ floats.push({wx,wy,dy:0,text,color,life:1.3}); }
function updateFloats(dt){
  for(let i=floats.length-1;i>=0;i--){
    const f=floats[i]; f.dy-=28*dt; f.life-=dt;
    if(f.life<=0){ floats[i]=floats[floats.length-1]; floats.pop(); }
  }
}
function drawFloats(){
  ctx.font='bold 14px "PingFang TC","Microsoft JhengHei",sans-serif'; ctx.textAlign='center';
  for(const f of floats){
    const [sx,sy]=toScreen(f.wx,f.wy);
    ctx.globalAlpha=clamp(f.life,0,1);
    ctx.fillStyle='#04101f'; ctx.fillText(f.text, sx+1, sy-40+f.dy+1);
    ctx.fillStyle=f.color; ctx.fillText(f.text, sx, sy-40+f.dy);
  }
  ctx.globalAlpha=1;
}
const bubbles=[];
function updateBubbles(dt){
  if(S.scene==='play' && S.area==='room'){
    players.forEach(p=>{
      if(p.bathing && Math.random()<.12) bubbles.push({x:p.x+rnd(-10,10),y:p.y,life:1,max:1});
    });
  }
  for(let i=bubbles.length-1;i>=0;i--){
    const b=bubbles[i]; b.y-=18*dt; b.life-=dt*.7;
    if(b.life<=0){ bubbles[i]=bubbles[bubbles.length-1]; bubbles.pop(); }
  }
}
function drawBubbles(){
  bubbles.forEach(b=>{
    const [sx,sy]=toScreen(b.x,b.y);
    ctx.globalAlpha = clamp(b.life/b.max,0,1)*.8;
    ctx.strokeStyle='#eaffff'; ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.arc(sx,sy-20*scale,3*scale,0,Math.PI*2); ctx.stroke();
  });
  ctx.globalAlpha=1;
}

/* ---------- 繪製角色 ---------- */
function drawPlayer(p, t){
  if(p.bathing) return; // 泡澡時改由浴缸場景繪製半身
  if(p.swimming){ drawSwimmer(p,t); return; }
  const [sx,sy] = toScreen(p.x,p.y);
  const sc = scale;
  ctx.save();
  ctx.translate(sx,sy);
  if(p.lying){
    ctx.rotate(p.dir>=0 ? Math.PI/2 : -Math.PI/2);
    ctx.translate(0,-6*sc);
  }
  // 陰影
  ctx.beginPath(); ctx.ellipse(0, 26*sc, 20*sc, 7*sc, 0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,.3)'; ctx.fill();

  ctx.scale(p.dir,1);
  const walkA = p.moving ? Math.sin(p.walk)*14 : 0;
  const sq = p.squash>0 ? 1-Math.sin(p.squash*Math.PI)*.14 : 1;

  // 腳
  ctx.fillStyle = p.outfit==='swim' ? '#f0c8a0' : '#2a3346';
  ctx.fillRect(-9*sc, (10+Math.max(0,walkA*.3))*sc, 7*sc, 16*sc);
  ctx.fillRect(2*sc, (10+Math.max(0,-walkA*.3))*sc, 7*sc, 16*sc);

  // 身體
  const bodyH = (p.outfit==='swim' ? 17 : 24) * sc * sq;
  ctx.fillStyle=p.color;
  ctx.beginPath();
  ctx.roundRect(-13*sc, -10*sc, 26*sc, bodyH, 8*sc);
  ctx.fill();

  // 手臂
  const armSwing = p.moving ? Math.sin(p.walk)*10 : 0;
  ctx.fillStyle=p.color;
  ctx.save(); ctx.translate(-13*sc, -2*sc); ctx.rotate((armSwing)*Math.PI/180);
  ctx.fillRect(-4*sc,0,8*sc,16*sc); ctx.restore();
  ctx.save(); ctx.translate(13*sc, -2*sc); ctx.rotate((-armSwing)*Math.PI/180);
  ctx.fillRect(-4*sc,0,8*sc,16*sc); ctx.restore();

  // 提著的物品
  if(!p.lying && p.hasSuitcase && p.stage<3){
    ctx.save(); ctx.translate(15*sc, 12*sc);
    ctx.fillStyle='#a5732e'; ctx.strokeStyle='#5a3c17'; ctx.lineWidth=1.5*sc;
    ctx.beginPath(); ctx.roundRect(-8*sc,-6*sc,16*sc,12*sc,3*sc); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#e8c98a'; ctx.fillRect(-2*sc,-8*sc,4*sc,3*sc);
    ctx.restore();
  }else if(!p.lying && p.hasKey && !p.hasSuitcase){
    ctx.save(); ctx.translate(15*sc, 10*sc); ctx.rotate(Math.sin(t*4)*.2);
    ctx.fillStyle='#ffcf5c'; ctx.strokeStyle='#c98d1f'; ctx.lineWidth=1*sc;
    ctx.beginPath(); ctx.roundRect(-6*sc,-8*sc,12*sc,16*sc,2*sc); ctx.fill(); ctx.stroke();
    ctx.restore();
  }

  // 頭
  ctx.fillStyle='#f0c8a0';
  ctx.beginPath(); ctx.arc(0, (-20)*sc*sq, 12*sc, 0, Math.PI*2); ctx.fill();
  // 頭髮
  ctx.fillStyle=p.hair;
  ctx.beginPath();
  ctx.arc(0, (-24)*sc*sq, 13*sc, Math.PI, 0);
  ctx.fill();
  ctx.fillRect(-13*sc, (-24)*sc*sq, 5*sc, 14*sc);
  ctx.fillRect(8*sc, (-24)*sc*sq, 5*sc, 14*sc);
  // 眼睛
  ctx.fillStyle='#20242e';
  if(p.lying){
    ctx.beginPath(); ctx.arc(-4*sc, (-20)*sc*sq, 1.2*sc, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4*sc, (-20)*sc*sq, 1.2*sc, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='#20242e'; ctx.lineWidth=1*sc;
    ctx.beginPath(); ctx.moveTo(-6*sc,(-22)*sc*sq); ctx.lineTo(-2*sc,(-22)*sc*sq); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(2*sc,(-22)*sc*sq); ctx.lineTo(6*sc,(-22)*sc*sq); ctx.stroke();
  }else{
    ctx.beginPath(); ctx.arc(-4*sc, (-20)*sc*sq, 1.6*sc, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4*sc, (-20)*sc*sq, 1.6*sc, 0, Math.PI*2); ctx.fill();
  }
  // 嘴巴
  ctx.strokeStyle='#a55a4a'; ctx.lineWidth=1.4*sc; ctx.beginPath();
  ctx.arc(0, (-15)*sc*sq, 3*sc, .2, Math.PI-.2); ctx.stroke();

  ctx.restore();

  if(!p.lying){
    ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
    ctx.fillStyle='rgba(255,255,255,.85)';
    ctx.fillText(p.name, sx, sy-46*sc);
  }
}

function drawSwimmer(p, t){
  const [sx,sy] = toScreen(p.x,p.y);
  const sc = scale;
  ctx.save();
  ctx.globalAlpha=.5; ctx.strokeStyle='#eaffff'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(sx,sy,16*sc,6*sc,0,0,Math.PI*2); ctx.stroke();
  ctx.restore();
  const stroke = Math.sin(t*6+p.x)*8;
  ctx.strokeStyle=p.color; ctx.lineWidth=4*sc; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(sx-9*sc,sy); ctx.lineTo(sx-17*sc, sy+stroke*sc*.35); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx+9*sc,sy); ctx.lineTo(sx+17*sc, sy-stroke*sc*.35); ctx.stroke();
  ctx.fillStyle=p.color; ctx.beginPath(); ctx.ellipse(sx,sy,12*sc,7*sc,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#f0c8a0'; ctx.beginPath(); ctx.arc(sx, sy-9*sc, 8*sc,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=p.hair; ctx.beginPath(); ctx.arc(sx, sy-12*sc, 8.5*sc, Math.PI,0); ctx.fill();
  ctx.fillStyle='#20242e';
  ctx.beginPath(); ctx.arc(sx-3*sc, sy-9*sc, 1*sc,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx+3*sc, sy-9*sc, 1*sc,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#a55a4a'; ctx.lineWidth=1*sc;
  ctx.beginPath(); ctx.arc(sx, sy-5*sc, 2.4*sc, .2, Math.PI-.2); ctx.stroke();
  ctx.font='bold 11px sans-serif'; ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,.85)';
  ctx.fillText(p.name, sx, sy-28*sc);
}

/* ---------- 服務人員 ---------- */
function drawStaff(t){
  const s = AREAS.lobby.staff;
  const [sx,sy] = toScreen(s.x, s.y+30);
  const sc = scale;
  ctx.save(); ctx.translate(sx,sy);
  ctx.beginPath(); ctx.ellipse(0,26*sc,18*sc,6*sc,0,0,Math.PI*2); ctx.fillStyle='rgba(0,0,0,.3)'; ctx.fill();
  ctx.fillStyle='#4f5f8a';
  ctx.beginPath(); ctx.roundRect(-12*sc,-8*sc,24*sc,22*sc,7*sc); ctx.fill();
  ctx.fillStyle='#f0c8a0'; ctx.beginPath(); ctx.arc(0,-18*sc,11*sc,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#2a2118';
  ctx.beginPath(); ctx.arc(0,-22*sc,12*sc,Math.PI,0); ctx.fill();
  ctx.fillStyle='#20242e';
  ctx.beginPath(); ctx.arc(-4*sc,-18*sc,1.4*sc,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4*sc,-18*sc,1.4*sc,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#a55a4a'; ctx.lineWidth=1.2*sc;
  ctx.beginPath(); ctx.arc(0,-13*sc,2.6*sc,.2,Math.PI-.2); ctx.stroke();

  ctx.fillStyle='#ffcf5c'; ctx.fillRect(-7*sc,-30*sc,14*sc,3.5*sc);

}
function drawSpeechBubble(wx,wy,text){
  const [sx0,sy0] = toScreen(wx,wy);
  const sy = sy0 - 56*scale;
  ctx.font='12.5px -apple-system,"PingFang TC",sans-serif';
  const w = ctx.measureText(text).width+22, h=26, left=sx0-w/2, r=8;
  ctx.beginPath();
  ctx.moveTo(left+r,sy); ctx.arcTo(left+w,sy,left+w,sy+h,r); ctx.arcTo(left+w,sy+h,left,sy+h,r);
  ctx.arcTo(left,sy+h,left,sy,r); ctx.arcTo(left,sy,left+w,sy,r); ctx.closePath();
  ctx.moveTo(sx0-6,sy+h); ctx.lineTo(sx0,sy+h+7); ctx.lineTo(sx0+6,sy+h);
  ctx.fillStyle='#101728'; ctx.fill(); ctx.strokeStyle='#38e1ff'; ctx.lineWidth=1.2; ctx.stroke();
  ctx.fillStyle='#eaf1ff'; ctx.textAlign='center'; ctx.fillText(text, sx0, sy+h/2+4.5);
}

/* ---------- 場景：庭園 ---------- */
function drawOutdoor(t){
  const [ox,oy] = toScreen(0,0);
  // 天空
  const skyH = 190*scale;
  const grad = ctx.createLinearGradient(0,oy,0,oy+skyH);
  grad.addColorStop(0,'#4f9fff'); grad.addColorStop(1,'#bfe8ff');
  ctx.fillStyle=grad; ctx.fillRect(ox,oy,WORLD.w*scale,skyH);
  // 太陽
  ctx.fillStyle='#ffe98a'; ctx.beginPath(); ctx.arc(ox+WORLD.w*scale-70*scale, oy+50*scale, 28*scale,0,Math.PI*2); ctx.fill();
  // 雲
  [[150,60],[420,90],[560,40]].forEach(([cx,cy])=>{
    const [sx,sy]=toScreen(cx,cy);
    ctx.fillStyle='rgba(255,255,255,.9)';
    [0,1,2].forEach(i=>{ ctx.beginPath(); ctx.ellipse(sx+i*16*scale, sy, 16*scale, 11*scale,0,0,Math.PI*2); ctx.fill(); });
  });
  // 草地
  ctx.fillStyle='#3f8f4f'; ctx.fillRect(ox, oy+skyH, WORLD.w*scale, WORLD.h*scale-skyH);
  ctx.strokeStyle='rgba(0,0,0,.05)';
  for(let gx=0; gx<=WORLD.w; gx+=50){
    const [x1,y1]=toScreen(gx,190), [x2,y2]=toScreen(gx,WORLD.h);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }
  // 樹
  AREAS.outdoor.trees.forEach(([tx,ty])=>{
    const [sx,sy]=toScreen(tx,ty);
    ctx.fillStyle='#6b4a2c'; ctx.fillRect(sx-4*scale, sy, 8*scale, 26*scale);
    ctx.fillStyle='#2f7a42';
    ctx.beginPath(); ctx.arc(sx, sy-8*scale, 20*scale, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#3c9552';
    ctx.beginPath(); ctx.arc(sx-8*scale, sy-14*scale, 12*scale, 0, Math.PI*2); ctx.fill();
  });
  // 泳池
  const pl = AREAS.outdoor.pool;
  const [px,py] = toScreen(pl.x,pl.y);
  ctx.fillStyle='#cfefff'; ctx.beginPath(); ctx.roundRect(px-4*scale,py-4*scale,pl.w*scale+8*scale,pl.h*scale+8*scale,14*scale); ctx.fill();
  ctx.fillStyle='#2fa8d8'; ctx.beginPath(); ctx.roundRect(px,py,pl.w*scale,pl.h*scale,10*scale); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=1.6;
  for(let i=0;i<3;i++){
    const ph=(t*.5+i/3)%1;
    ctx.globalAlpha=(1-ph)*.7;
    ctx.beginPath(); ctx.ellipse(px+pl.w*scale/2, py+pl.h*scale/2, (pl.w*scale/2)*ph+6, (pl.h*scale/2)*ph+4, 0,0,Math.PI*2); ctx.stroke();
  }
  ctx.globalAlpha=1;
  ctx.font=(20*scale)+'px sans-serif'; ctx.textAlign='center';
  ctx.fillText('🏊', px+pl.w*scale/2, py+pl.h*scale/2+7*scale);
  // 飯店建築
  const b = AREAS.outdoor.building;
  const [bx,by] = toScreen(b.x,b.y);
  ctx.fillStyle='#d8cfa8'; ctx.fillRect(bx,by,b.w*scale,b.h*scale);
  ctx.fillStyle='#a9986a'; ctx.fillRect(bx,by,b.w*scale,10*scale);
  ctx.font=(13*scale)+'px sans-serif'; ctx.fillStyle='#5a4a2c'; ctx.textAlign='center';
  ctx.fillText('WOWHOME HOTEL', bx+b.w*scale/2, by-6*scale);
  // 窗戶
  for(let wy=0;wy<3;wy++) for(let wx=0;wx<3;wx++){
    ctx.fillStyle='#9fd8f2';
    ctx.fillRect(bx+(24+wx*58)*scale, by+(30+wy*60)*scale, 34*scale, 30*scale);
  }
  // 大門
  const d = AREAS.outdoor.doors[0];
  const [dx,dy] = toScreen(d.x,d.y);
  ctx.fillStyle='#6d4c30'; ctx.beginPath(); ctx.roundRect(dx,dy,d.w*scale,d.h*scale,6*scale); ctx.fill();
  ctx.fillStyle='#ffcf5c'; ctx.beginPath(); ctx.arc(dx+d.w*scale-8*scale, dy+d.h*scale/2, 2.5*scale,0,Math.PI*2); ctx.fill();
  ctx.font=(11*scale)+'px sans-serif'; ctx.fillStyle='#eaf1ff';
  ctx.fillText('大門', dx+d.w*scale/2, dy+d.h*scale+14*scale);
  // 行李箱
  suitcases.forEach(s=>{
    if(s.taken) return;
    const [sx,sy]=toScreen(s.x,s.y);
    ctx.save(); ctx.translate(sx,sy);
    ctx.fillStyle='#a5732e'; ctx.strokeStyle='#5a3c17'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(-14*scale,-11*scale,28*scale,22*scale,5*scale); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#e8c98a'; ctx.fillRect(-4*scale,-15*scale,8*scale,5*scale);
    ctx.restore();
  });
}

/* ---------- 場景：大廳 ---------- */
function drawLobby(){
  const [ox,oy] = toScreen(0,0);
  ctx.fillStyle='#151b2c'; ctx.fillRect(ox,oy,WORLD.w*scale,WORLD.h*scale);
  ctx.fillStyle='#1f2740';
  for(let gx=0; gx<WORLD.w; gx+=60) for(let gy=0; gy<WORLD.h; gy+=60){
    if(((gx/60)+(gy/60))%2===0){ const [x,y]=toScreen(gx,gy); ctx.fillRect(x,y,60*scale,60*scale); }
  }
  // 服務櫃檯
  const c = AREAS.lobby.counter;
  const [cx,cy] = toScreen(c.x,c.y);
  ctx.fillStyle='#3a2c22'; ctx.beginPath(); ctx.roundRect(cx,cy,c.w*scale,c.h*scale,10*scale); ctx.fill();
  ctx.fillStyle='#5a4432'; ctx.fillRect(cx,cy,c.w*scale,12*scale);
  ctx.font=(13*scale)+'px sans-serif'; ctx.fillStyle='#ffcf5c'; ctx.textAlign='center';
  ctx.fillText('櫃檯 Check-in', cx+c.w*scale/2, cy-8*scale);
  drawStaff(performance.now()/1000);
  // 電梯
  const A = AREAS.lobby;
  A.doors.forEach(d=>{
    const [dx,dy]=toScreen(d.x,d.y);
    if(d.to==='room'){
      ctx.fillStyle='#3a4560'; ctx.fillRect(dx,dy,d.w*scale,d.h*scale);
      ctx.fillStyle='#8ea0c2';
      ctx.fillRect(dx+4*scale,dy+4*scale,(d.w/2-6)*scale,(d.h-8)*scale);
      ctx.fillRect(dx+d.w/2*scale+2*scale,dy+4*scale,(d.w/2-6)*scale,(d.h-8)*scale);
      ctx.font=(12*scale)+'px sans-serif'; ctx.fillStyle='#eaf1ff';
      ctx.fillText('電梯', dx+d.w*scale/2, dy-8*scale);
    }else{
      ctx.fillStyle='#5a4432'; ctx.beginPath(); ctx.roundRect(dx,dy,d.w*scale,d.h*scale,6*scale); ctx.fill();
      ctx.font=(11*scale)+'px sans-serif'; ctx.fillStyle='#eaf1ff';
      ctx.fillText('出口', dx+d.w*scale/2, dy+d.h*scale+14*scale);
    }
  });
}

/* ---------- 場景：客房 ---------- */
function drawRoom(t){
  const [ox,oy] = toScreen(0,0);
  ctx.fillStyle='#7a3a44'; ctx.fillRect(ox,oy,WORLD.w*scale,WORLD.h*scale);
  ctx.strokeStyle='rgba(0,0,0,.06)';
  for(let gx=0; gx<=WORLD.w; gx+=40){ const [x1,y1]=toScreen(gx,0),[x2,y2]=toScreen(gx,WORLD.h); ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke(); }
  for(let gy=0; gy<=WORLD.h; gy+=40){ const [x1,y1]=toScreen(0,gy),[x2,y2]=toScreen(WORLD.w,gy); ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke(); }

  const A = AREAS.room;
  // 中央隔牆（留門縫）
  const [wx,wyTop] = toScreen(A.wallX, 0);
  const [,wyGapTop] = toScreen(A.wallX, A.doorGapY[0]);
  const [,wyGapBot] = toScreen(A.wallX, A.doorGapY[1]);
  const [,wyBot] = toScreen(A.wallX, WORLD.h);
  ctx.fillStyle='#3a3244';
  ctx.fillRect(wx-5*scale, wyTop, 10*scale, wyGapTop-wyTop);
  ctx.fillRect(wx-5*scale, wyGapBot, 10*scale, wyBot-wyGapBot);
  ctx.fillStyle='#6d4c30';
  ctx.fillRect(wx-5*scale, wyGapTop, 10*scale, wyGapBot-wyGapTop);
  ctx.strokeStyle='#ffcf5c'; ctx.lineWidth=1.5;
  ctx.strokeRect(wx-5*scale, wyGapTop, 10*scale, wyGapBot-wyGapTop);

  function bedDraw(bed, spread){
    const [bx,by] = toScreen(bed.x,bed.y);
    ctx.fillStyle='#8a6a52'; ctx.beginPath(); ctx.roundRect(bx-4*scale,by-4*scale,bed.w*scale+8*scale,bed.h*scale+10*scale,10*scale); ctx.fill();
    ctx.fillStyle='#f2ead8'; ctx.beginPath(); ctx.roundRect(bx,by,bed.w*scale,bed.h*scale*.7,8*scale); ctx.fill();
    ctx.fillStyle='#e0808f'; ctx.beginPath(); ctx.roundRect(bx,by+bed.h*scale*.35,bed.w*scale,bed.h*scale*.4,8*scale); ctx.fill();
    ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.roundRect(bx+6*scale,by+4*scale,bed.w*scale*.4,16*scale,4*scale); ctx.fill();
    ctx.beginPath(); ctx.roundRect(bx+bed.w*scale-bed.w*scale*.4-6*scale,by+4*scale,bed.w*scale*.4,16*scale,4*scale); ctx.fill();
    ctx.font=(11*scale)+'px sans-serif'; ctx.fillStyle='#eaf1ff'; ctx.textAlign='center';
    ctx.fillText('雙人床', bx+bed.w*scale/2, by-8*scale);
  }
  bedDraw(A.bedA); bedDraw(A.bedB);

  // 衣櫃
  const wd = A.wardrobe; const [wdx,wdy]=toScreen(wd.x,wd.y);
  ctx.fillStyle='#5a4432'; ctx.fillRect(wdx,wdy,wd.w*scale,wd.h*scale);
  ctx.strokeStyle='#2e2114'; ctx.lineWidth=2; ctx.strokeRect(wdx,wdy,wd.w*scale,wd.h*scale);
  ctx.beginPath(); ctx.moveTo(wdx+wd.w*scale/2,wdy); ctx.lineTo(wdx+wd.w*scale/2,wdy+wd.h*scale); ctx.stroke();
  ctx.fillStyle='#ffcf5c'; ctx.beginPath(); ctx.arc(wdx+wd.w*scale*.42, wdy+wd.h*scale/2, 2*scale,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(wdx+wd.w*scale*.58, wdy+wd.h*scale/2, 2*scale,0,Math.PI*2); ctx.fill();
  ctx.font=(11*scale)+'px sans-serif'; ctx.fillStyle='#eaf1ff'; ctx.textAlign='center';
  ctx.fillText('衣櫃', wdx+wd.w*scale/2, wdy+wd.h*scale+14*scale);

  // 電視
  const tv = A.tv; const [tvx,tvy]=toScreen(tv.x,tv.y);
  ctx.fillStyle='#1a1f2c'; ctx.beginPath(); ctx.roundRect(tvx,tvy,tv.w*scale,tv.h*scale,4*scale); ctx.fill();
  const flick = .55+Math.sin(t*6)*.15;
  ctx.fillStyle='rgba(80,190,255,'+flick+')';
  ctx.fillRect(tvx+4*scale,tvy+4*scale,tv.w*scale-8*scale,tv.h*scale-8*scale);
  ctx.fillStyle='#3a3244'; ctx.fillRect(tvx+tv.w*scale/2-3*scale,tvy+tv.h*scale,6*scale,8*scale);

  // 浴缸
  const bt = A.bathtub; const [btx,bty]=toScreen(bt.x,bt.y);
  ctx.fillStyle='#e8f0f2'; ctx.beginPath(); ctx.roundRect(btx,bty,bt.w*scale,bt.h*scale,18*scale); ctx.fill();
  ctx.fillStyle='#8fd0e8'; ctx.beginPath(); ctx.roundRect(btx+8*scale,bty+8*scale,bt.w*scale-16*scale,bt.h*scale-16*scale,12*scale); ctx.fill();
  ctx.font=(11*scale)+'px sans-serif'; ctx.fillStyle='#eaf1ff'; ctx.textAlign='center';
  ctx.fillText('浴缸', btx+bt.w*scale/2, bty-8*scale);
  players.forEach(p=>{
    if(p.bathing && inZone(p, bt)){
      const [sx,sy]=toScreen(p.x, bt.y+bt.h*.55);
      ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(sx,sy,10*scale,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#f0c8a0'; ctx.beginPath(); ctx.arc(sx,sy-10*scale,7*scale,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#20242e';
      ctx.beginPath(); ctx.arc(sx-2.5*scale,sy-10*scale,1*scale,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(sx+2.5*scale,sy-10*scale,1*scale,0,Math.PI*2); ctx.fill();
    }
  });

  // 電梯門（返回大廳）
  const d = A.doors[0];
  const [dx,dy]=toScreen(d.x,d.y);
  ctx.fillStyle='#3a4560'; ctx.fillRect(dx,dy,d.w*scale,d.h*scale);
  ctx.fillStyle='#8ea0c2';
  ctx.fillRect(dx+4*scale,dy+4*scale,(d.w/2-6)*scale,(d.h-8)*scale);
  ctx.fillRect(dx+d.w/2*scale+2*scale,dy+4*scale,(d.w/2-6)*scale,(d.h-8)*scale);
  ctx.font=(11*scale)+'px sans-serif'; ctx.fillStyle='#eaf1ff';
  ctx.fillText('電梯', dx+d.w*scale/2, dy-8*scale);

  // 樓梯（往頂樓泳池）
  const st = A.doors[1];
  const [stx,sty]=toScreen(st.x,st.y);
  ctx.fillStyle='#5a4432'; ctx.beginPath(); ctx.roundRect(stx,sty,st.w*scale,st.h*scale,6*scale); ctx.fill();
  ctx.fillStyle='#3a2c22';
  for(let i=0;i<4;i++) ctx.fillRect(stx+4*scale, sty+(6+i*13)*scale, st.w*scale-8*scale, 4*scale);
  ctx.font=(11*scale)+'px sans-serif'; ctx.fillStyle='#eaf1ff'; ctx.textAlign='center';
  ctx.fillText('樓梯上頂樓', stx+st.w*scale/2, sty-8*scale);
}

/* ---------- 場景：頂樓泳池 ---------- */
function drawRooftop(t){
  const [ox,oy] = toScreen(0,0);
  const skyH = 140*scale;
  const grad = ctx.createLinearGradient(0,oy,0,oy+skyH);
  grad.addColorStop(0,'#5aa8ff'); grad.addColorStop(1,'#cdeeff');
  ctx.fillStyle=grad; ctx.fillRect(ox,oy,WORLD.w*scale,skyH);
  ctx.fillStyle='#ffe98a'; ctx.beginPath(); ctx.arc(ox+80*scale, oy+46*scale, 24*scale,0,Math.PI*2); ctx.fill();
  [[300,60],[560,90],[720,50]].forEach(([cx,cy])=>{
    const [sx,sy]=toScreen(cx,cy);
    ctx.fillStyle='rgba(255,255,255,.9)';
    [0,1,2].forEach(i=>{ ctx.beginPath(); ctx.ellipse(sx+i*15*scale, sy, 15*scale, 10*scale,0,0,Math.PI*2); ctx.fill(); });
  });
  // 頂樓露臺地板
  ctx.fillStyle='#dcd3bd'; ctx.fillRect(ox, oy+skyH, WORLD.w*scale, WORLD.h*scale-skyH);
  ctx.strokeStyle='rgba(0,0,0,.06)';
  for(let gx=0; gx<=WORLD.w; gx+=40){ const [x1,y1]=toScreen(gx,140),[x2,y2]=toScreen(gx,WORLD.h); ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke(); }
  for(let gy=140; gy<=WORLD.h; gy+=40){ const [x1,y1]=toScreen(0,gy),[x2,y2]=toScreen(WORLD.w,gy); ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke(); }
  // 護欄
  ctx.fillStyle='#8ea0c2'; ctx.fillRect(ox, oy+skyH-4*scale, WORLD.w*scale, 6*scale);

  // 泳池
  const pl = AREAS.rooftop.pool;
  const [px,py] = toScreen(pl.x,pl.y);
  ctx.fillStyle='#cfefff'; ctx.beginPath(); ctx.roundRect(px-6*scale,py-6*scale,pl.w*scale+12*scale,pl.h*scale+12*scale,20*scale); ctx.fill();
  ctx.fillStyle='#2fa8d8'; ctx.beginPath(); ctx.roundRect(px,py,pl.w*scale,pl.h*scale,14*scale); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.55)'; ctx.lineWidth=1.6;
  for(let i=0;i<4;i++){
    const ph=(t*.5+i/4)%1;
    ctx.globalAlpha=(1-ph)*.7;
    ctx.beginPath(); ctx.ellipse(px+pl.w*scale/2, py+pl.h*scale/2, (pl.w*scale/2)*ph+8, (pl.h*scale/2)*ph+6, 0,0,Math.PI*2); ctx.stroke();
  }
  ctx.globalAlpha=1;
  ctx.font=(11*scale)+'px sans-serif'; ctx.fillStyle='#0a4a66'; ctx.textAlign='center';
  ctx.fillText('走進水裡就能游泳', px+pl.w*scale/2, py-10*scale);

  // 躺椅
  AREAS.rooftop.sunbeds.forEach(([bx,by])=>{
    const [sx,sy]=toScreen(bx,by);
    ctx.fillStyle='#fffdf7'; ctx.beginPath(); ctx.roundRect(sx-17*scale,sy-9*scale,34*scale,18*scale,5*scale); ctx.fill();
    ctx.strokeStyle='#c9a15a'; ctx.lineWidth=1.4; ctx.strokeRect(sx-17*scale,sy-9*scale,34*scale,18*scale);
  });

  // 樓梯下樓
  const d = AREAS.rooftop.doors[0];
  const [dx,dy]=toScreen(d.x,d.y);
  ctx.fillStyle='#5a4432'; ctx.beginPath(); ctx.roundRect(dx,dy,d.w*scale,d.h*scale,6*scale); ctx.fill();
  ctx.fillStyle='#3a2c22';
  for(let i=0;i<4;i++) ctx.fillRect(dx+4*scale, dy+(6+i*13)*scale, d.w*scale-8*scale, 4*scale);
  ctx.font=(11*scale)+'px sans-serif'; ctx.fillStyle='#eaf1ff'; ctx.textAlign='center';
  ctx.fillText('樓梯下樓', dx+d.w*scale/2, dy-8*scale);
}

function drawSticksVisual(){
  for(const id in sticks){
    const st = sticks[id];
    ctx.globalAlpha=.35; ctx.strokeStyle='#8ea0c2'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(st.bx, st.by, 50, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = st.who==='wasd' ? '#ff6cc7' : '#38e1ff';
    ctx.beginPath(); ctx.arc(st.bx+st.dx*50, st.by+st.dy*50, 25, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
}
function drawStars(t){
  starObjs.forEach(st=>{
    if(st.taken || st.area!==S.area) return;
    const [sx,sy] = toScreen(st.x,st.y);
    const bob = Math.sin(t*2.4+st.phase)*4;
    ctx.save(); ctx.translate(sx, sy+bob); ctx.rotate(Math.sin(t*1.4+st.phase)*.25);
    ctx.fillStyle='#ffcf5c'; ctx.strokeStyle='#c98d1f'; ctx.lineWidth=1.5;
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const a=-Math.PI/2+i*(Math.PI*2/5), a2=a+Math.PI/5;
      ctx.lineTo(Math.cos(a)*11*scale, Math.sin(a)*11*scale);
      ctx.lineTo(Math.cos(a2)*4.5*scale, Math.sin(a2)*4.5*scale);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.restore();
  });
}

function render(t){
  if(S.area==='outdoor') drawOutdoor(t);
  else if(S.area==='lobby') drawLobby(t);
  else if(S.area==='rooftop') drawRooftop(t);
  else drawRoom(t);
  drawStars(t);
  const order = [p1,p2].sort((a,b)=>a.y-b.y);
  order.forEach(p=>drawPlayer(p,t));
  drawBubbles();
  drawFloats();
  drawConfetti();
  if(S.scene==='play') drawSticksVisual();
}

/* ---------- 主迴圈 ---------- */
const STEP=1/60;
let last=performance.now(), acc=0, tGlobal=0;
function frame(now){
  requestAnimationFrame(frame);
  acc += Math.min((now-last)/1000,.1); last=now;
  while(acc>=STEP){ acc-=STEP; tGlobal+=STEP; update(STEP); }
  render(tGlobal);
}
enterTitle();
requestAnimationFrame(frame);

/* ---------- QA 掛鉤 ---------- */
window.__QA = {
  snap(){ return { scene:S.scene, area:S.area, over:S.over, time:S.time, starsGot:S.starsGot,
    p1x:p1.x,p1y:p1.y,p1stage:p1.stage,p1lying:p1.lying,p1bathing:p1.bathing,p1swimming:p1.swimming,p1outfit:p1.outfit,
    p2x:p2.x,p2y:p2.y,p2stage:p2.stage,p2lying:p2.lying,p2bathing:p2.bathing,p2swimming:p2.swimming,p2outfit:p2.outfit,
    doneCount:S.doneCount, confetti:confetti.length }; },
  teleport(idx,x,y){ const p = idx===0?p1:p2; p.x=x; p.y=y; },
  setArea(a,ex,ey){ changeArea(a, ex!=null?ex:60, ey!=null?ey:480); },
  forceStage(idx,s){ const p = idx===0?p1:p2; p.stage=s; if(s>=1) p.hasSuitcase=true; if(s>=2) p.hasKey=true; }
};
})();
</script>
