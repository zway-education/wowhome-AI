<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>暗途 - 恐怖遊戲</title>
<style>
  html, body {
    margin: 0; padding: 0; background: #000; overflow: hidden;
    height: 100%; font-family: "Microsoft YaHei", sans-serif;
  }
  #gameCanvas { display: block; background: #000; cursor: none; }
  #overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #b30000; text-align: center; z-index: 10;
    background: radial-gradient(ellipse at center, rgba(20,0,0,0.9) 0%, rgba(0,0,0,0.98) 100%);
  }
  #overlay h1 { font-size: 3em; letter-spacing: 8px; text-shadow: 0 0 20px #b30000; margin-bottom: 10px; }
  #overlay p { color: #999; max-width: 500px; line-height: 1.6; }
  #overlay button {
    margin-top: 30px; padding: 14px 40px; font-size: 1.2em; letter-spacing: 4px;
    background: transparent; border: 2px solid #b30000; color: #eee; cursor: pointer;
    transition: all 0.3s;
  }
  #overlay button:hover { background: #b30000; color: #fff; box-shadow: 0 0 20px #b30000; }
  #hud {
    position: fixed; top: 10px; left: 10px; color: #ccc; font-size: 14px; z-index: 5;
    text-shadow: 0 0 4px #000;
  }
  #hud .row { margin-bottom: 6px; }
  #interactHint {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    color: #ddd; font-size: 15px; background: rgba(0,0,0,.5); padding: 6px 14px;
    border: 1px solid #555; display: none; z-index: 6;
  }
  #exitHint {
    position: fixed; top: 40px; left: 50%; transform: translateX(-50%);
    color: #e8c840; font-size: 15px; background: rgba(0,0,0,.5); padding: 6px 14px;
    border: 1px solid #e8c840; display: none; z-index: 6;
  }
  #jumpscare {
    position: fixed; top:0; left:0; width:100%; height:100%; z-index: 30;
    background: radial-gradient(ellipse at center, #1c1c30 0%, #0a0a16 100%);
    display: none; flex-direction: column; align-items: center; justify-content: center;
  }
  #jumpscare svg {
    width: min(40vmin, 240px); height: auto;
    /* 加強版：快速放大逼近＋較強抖動，營造「衝到面前」的驚嚇感 */
    animation: scareZoom 0.28s cubic-bezier(.2,.9,.3,1) forwards, scareShake 0.09s linear 4;
  }
  #jumpscare p { color: #cfcaf0; font-size: 22px; letter-spacing: 4px; margin: 14px 0 0; }
  @keyframes scareZoom { from { transform: scale(1.6); } to { transform: scale(2.2); } }
  @keyframes scareShake {
    0% { translate: 0 0; } 25% { translate: -10px 6px; }
    50% { translate: 9px -7px; } 75% { translate: -7px -5px; } 100% { translate: 0 0; }
  }
  #storyBox {
    position: fixed; bottom: 0; left: 0; width: 100%; z-index: 25;
    background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.75));
    color: #ddd; padding: 24px 10%; box-sizing: border-box; display: none;
    border-top: 1px solid #500;
  }
  #storyText { font-size: 1.1em; line-height: 1.7; margin-bottom: 16px; min-height: 2.4em; white-space: pre-wrap; }
  #storyChoices { display: flex; flex-direction: column; gap: 8px; }
  #storyChoices button {
    text-align: left; background: rgba(80,0,0,0.15); border: 1px solid #700; color: #eee;
    padding: 10px 16px; font-size: 1em; cursor: pointer; transition: all .2s;
  }
  #storyChoices button:hover { background: rgba(140,0,0,0.4); border-color: #b30000; }
  .hidden { display: none !important; }

  /* ===== 進入遊戲前的三次驚嚇內容警告（知情同意） ===== */
  #warnOverlay {
    position: fixed; top:0; left:0; width:100%; height:100%; z-index: 40;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; box-sizing: border-box; text-align: center;
    background: radial-gradient(ellipse at center, #2a0505 0%, #0a0000 100%);
  }
  #warnOverlay.show { display: flex; }
  #warnCard {
    max-width: 560px; width: 100%;
    background: rgba(20,0,0,0.72); border: 2px solid #7a0d0d;
    box-shadow: 0 0 40px rgba(160,0,0,0.35); border-radius: 10px;
    padding: 30px 26px; box-sizing: border-box;
  }
  #warnStep { color: #ff9a9a; font-size: 14px; letter-spacing: 3px; margin: 0 0 14px; }
  #warnText {
    color: #f4e6e6; font-size: 19px; line-height: 1.7; margin: 0 0 26px;
  }
  #warnText b { color: #ff5959; }
  #warnBtns { display: flex; flex-direction: column; gap: 12px; }
  #warnBtns button {
    min-height: 48px; font-size: 17px; padding: 12px 20px; cursor: pointer;
    border-radius: 6px; -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  #warnOk {
    background: #8a0f0f; color: #fff; border: 2px solid #ff4d4d; font-weight: bold;
  }
  #warnOk:hover { background: #b31313; }
  #warnLeave {
    background: transparent; color: #cfc2c2; border: 1px solid #666;
  }
  #warnLeave:hover { background: rgba(255,255,255,0.08); }

  #touchControls { display: none; }
  body.touch-mode #gameCanvas { cursor: default; }
  body.touch-mode #touchControls { display: block; }
  #joystickZone {
    position: fixed; left: 0; bottom: 0; width: 50%; height: 55%; z-index: 7;
    touch-action: none;
  }
  #joystickBase {
    position: fixed; width: 130px; height: 130px; border-radius: 50%;
    left: 30px; bottom: 30px;
    background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.4);
    z-index: 8; touch-action: none;
  }
  #joystickKnob {
    position: absolute; width: 54px; height: 54px; border-radius: 50%;
    background: rgba(200,50,50,0.6); border: 2px solid rgba(255,255,255,0.6);
    left: 38px; top: 38px; pointer-events: none;
    transition: left 0.06s linear, top 0.06s linear;
  }
  #lookZone {
    position: fixed; right: 0; top: 0; width: 50%; height: 100%; z-index: 6;
    touch-action: none;
  }
  #interactBtn {
    position: fixed; right: 24px; bottom: 24px; z-index: 9;
    width: 84px; height: 84px; border-radius: 50%;
    background: rgba(179,0,0,0.35); border: 2px solid rgba(255,255,255,0.5);
    color: #fff; font-size: 14px; letter-spacing: 2px;
    display: none; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  body.touch-mode #interactBtn { display: flex; }
</style>
</head>
<body>

<div id="overlay">
  <h1>暗&nbsp;途</h1>
  <p>你在一棟廢棄的療養院中醒來。手電筒是你唯一的光源，也是唯一暴露你的東西。<br>
  黑暗中似乎有什麼東西在盯著你——只有當光照到它們時，你才能看見。<br>
  找到 <b style="color:#eee">3 把鑰匙</b>，再抵達綠色的出口逃出這裡。它能聽見你的腳步，也能在黑暗中看見你——你的選擇將決定你的命運。<br><br>
  電腦：WASD / 方向鍵 移動　　鼠標 控制手電筒方向　　E 互動<br>
  平板/手機：左下搖桿移動　　右側拖動瞄準手電筒　　右下按鈕互動</p>
  <button id="startBtn">開始遊戲</button>
</div>

<canvas id="gameCanvas"></canvas>

<div id="hud" class="hidden">
  <div class="row">鑰匙: <span id="keyCount">0</span> / 3</div>
</div>
<div id="interactHint">按 E 互動</div>
<div id="exitHint">鑰匙已集齊——找到出口逃離這裡</div>
<div id="jumpscare">
  <svg viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <!-- 恐怖版：慘白扭曲鬼臉，黑洞般凹陷眼窩＋血絲、張大的黑口、尖銳裂角，手繪風 -->
    <defs>
      <radialGradient id="jsFace" cx="50%" cy="42%" r="65%">
        <stop offset="0%" stop-color="#f4f1ec"/>
        <stop offset="70%" stop-color="#c9c2b8"/>
        <stop offset="100%" stop-color="#6e6357"/>
      </radialGradient>
      <radialGradient id="jsSocket" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#000"/>
        <stop offset="60%" stop-color="#000"/>
        <stop offset="100%" stop-color="#2a0a0a"/>
      </radialGradient>
    </defs>
    <!-- 扭曲慘白臉輪廓 -->
    <path d="M60 8 C86 8 100 30 100 62 C100 92 84 128 60 132 C36 128 20 92 20 62 C20 30 34 8 60 8 Z"
      fill="url(#jsFace)" stroke="#4a4038" stroke-width="2.5"/>
    <!-- 裂紋 -->
    <path d="M42 20 L48 40 L40 52 M82 26 L74 44 L82 58" fill="none" stroke="#5a4d42" stroke-width="1.6" stroke-linecap="round"/>
    <!-- 黑洞眼窩 -->
    <ellipse cx="43" cy="54" rx="13" ry="16" fill="url(#jsSocket)"/>
    <ellipse cx="77" cy="54" rx="13" ry="16" fill="url(#jsSocket)"/>
    <!-- 血絲 -->
    <path d="M43 40 L41 30 M43 40 L49 32 M77 40 L79 30 M77 40 L71 33" fill="none" stroke="#a30000" stroke-width="1.3" stroke-linecap="round"/>
    <!-- 微光瞳孔（深處盯著你） -->
    <circle cx="43" cy="56" r="3.2" fill="#c40000"/>
    <circle cx="77" cy="56" r="3.2" fill="#c40000"/>
    <circle cx="43" cy="56" r="1.1" fill="#ff6b6b"/>
    <circle cx="77" cy="56" r="1.1" fill="#ff6b6b"/>
    <!-- 皺眉 -->
    <path d="M30 40 L54 48 M90 40 L66 48" fill="none" stroke="#3a322b" stroke-width="2.4" stroke-linecap="round"/>
    <!-- 張大的黑口＋利齒 -->
    <path d="M40 92 C46 84 74 84 80 92 C76 118 44 118 40 92 Z" fill="#0a0000" stroke="#3a0000" stroke-width="2"/>
    <path d="M44 92 L48 102 L52 92 L56 103 L60 92 L64 103 L68 92 L72 102 L76 92" fill="none" stroke="#e8e0d4" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M46 108 L50 100 L54 108 M62 108 L66 100 L70 108" fill="none" stroke="#e8e0d4" stroke-width="1.6"/>
    <!-- 從嘴角滴落的暗紅 -->
    <path d="M78 100 C82 108 82 116 79 120" fill="none" stroke="#8a0000" stroke-width="2.2" stroke-linecap="round"/>
  </svg>
  <p>它抓到你了…</p>
</div>

<div id="warnOverlay">
  <div id="warnCard">
    <p id="warnStep"></p>
    <p id="warnText"></p>
    <div id="warnBtns">
      <button id="warnOk"></button>
      <button id="warnLeave">離開</button>
    </div>
  </div>
</div>

<div id="touchControls">
  <div id="joystickZone"></div>
  <div id="joystickBase"><div id="joystickKnob"></div></div>
  <div id="lookZone"></div>
  <button id="interactBtn">互動</button>
</div>

<div id="storyBox">
  <div id="storyText"></div>
  <div id="storyChoices"></div>
</div>

<script>
(() => {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const hud = document.getElementById('hud');
  const keyCountEl = document.getElementById('keyCount');
  const jumpscareEl = document.getElementById('jumpscare');
  const interactHint = document.getElementById('interactHint');
  const exitHintEl = document.getElementById('exitHint');
  const storyBox = document.getElementById('storyBox');
  const storyText = document.getElementById('storyText');
  const storyChoices = document.getElementById('storyChoices');

  const maskCanvas = document.createElement('canvas');
  const maskCtx = maskCanvas.getContext('2d');

  // ----- Audio (all synthesized via Web Audio API, no external files) -----
  const Audio_ = (() => {
    let actx = null;
    let master = null;
    let droneNodes = null;
    let heartbeatTimer = null;
    let footstepTimer = 0;
    let musicTimer = null;
    let musicDelay = null;

    function ensure() {
      if (actx) return;
      actx = new (window.AudioContext || window.webkitAudioContext)();
      master = actx.createGain();
      master.gain.value = 0.6;
      master.connect(actx.destination);
    }

    function noiseBuffer(duration) {
      const n = actx.sampleRate * duration;
      const buf = actx.createBuffer(1, n, actx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < n; i++) data[i] = Math.random() * 2 - 1;
      return buf;
    }

    function startAmbience() {
      ensure();
      if (droneNodes) return;
      const g = actx.createGain();
      g.gain.value = 0.05;
      g.connect(master);

      const osc1 = actx.createOscillator();
      osc1.type = 'sine';
      osc1.frequency.value = 55;
      const osc2 = actx.createOscillator();
      osc2.type = 'sine';
      osc2.frequency.value = 58;
      osc1.connect(g); osc2.connect(g);
      osc1.start(); osc2.start();

      // slow-moving noise bed for texture
      const noiseSrc = actx.createBufferSource();
      noiseSrc.buffer = noiseBuffer(4);
      noiseSrc.loop = true;
      const noiseFilter = actx.createBiquadFilter();
      noiseFilter.type = 'lowpass';
      noiseFilter.frequency.value = 200;
      const noiseGain = actx.createGain();
      noiseGain.gain.value = 0.02;
      noiseSrc.connect(noiseFilter).connect(noiseGain).connect(master);
      noiseSrc.start();

      droneNodes = { osc1, osc2, g, noiseSrc, noiseGain };
      startMusic();
    }

    // sparse, unsettling piano-like phrases over a D-minor-ish scale, with a slow echo
    const SCALE = [146.83, 155.56, 174.61, 196.00, 220.00, 233.08, 261.63]; // D3..approx, minor/phrygian flavor

    function playMusicNote() {
      const now = actx.currentTime;
      const freq = SCALE[Math.floor(Math.random() * SCALE.length)] * (Math.random() < 0.3 ? 2 : 1);
      const osc = actx.createOscillator();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const g = actx.createGain();
      g.gain.setValueAtTime(0.0001, now);
      g.gain.linearRampToValueAtTime(0.09, now + 0.6);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 3.2);
      osc.connect(g).connect(musicDelay ? musicDelay.input : master);
      osc.start(now);
      osc.stop(now + 3.3);
    }

    function startMusic() {
      if (musicTimer) return;
      const delayNode = actx.createDelay(2);
      delayNode.delayTime.value = 0.65;
      const feedback = actx.createGain();
      feedback.gain.value = 0.35;
      const delayFilter = actx.createBiquadFilter();
      delayFilter.type = 'lowpass';
      delayFilter.frequency.value = 1200;
      delayNode.connect(feedback).connect(delayFilter).connect(delayNode);
      delayNode.connect(master);
      musicDelay = { input: delayNode };

      const schedule = () => {
        playMusicNote();
        musicTimer = setTimeout(schedule, 2200 + Math.random() * 2600);
      };
      schedule();
    }

    function stopMusic() {
      if (musicTimer) { clearTimeout(musicTimer); musicTimer = null; }
      musicDelay = null;
    }

    function playFootstep() {
      ensure();
      const src = actx.createBufferSource();
      src.buffer = noiseBuffer(0.08);
      const filter = actx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 500 + Math.random() * 200;
      const g = actx.createGain();
      g.gain.value = 0.12;
      g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.15);
      src.connect(filter).connect(g).connect(master);
      src.start();
    }

    function playKeyPickup() {
      ensure();
      const now = actx.currentTime;
      [880, 1320, 1760].forEach((freq, i) => {
        const osc = actx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = freq;
        const g = actx.createGain();
        g.gain.value = 0;
        g.gain.setValueAtTime(0, now + i * 0.08);
        g.gain.linearRampToValueAtTime(0.15, now + i * 0.08 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.3);
        osc.connect(g).connect(master);
        osc.start(now + i * 0.08);
        osc.stop(now + i * 0.08 + 0.32);
      });
    }

    function playGlimpseWhisper() {
      ensure();
      const src = actx.createBufferSource();
      src.buffer = noiseBuffer(0.6);
      const filter = actx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 1200;
      filter.Q.value = 0.6;
      const g = actx.createGain();
      g.gain.setValueAtTime(0.0001, actx.currentTime);
      g.gain.linearRampToValueAtTime(0.04, actx.currentTime + 0.1);
      g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.6);
      src.connect(filter).connect(g).connect(master);
      src.start();
    }

    function playHeartbeatPulse(intensity) {
      ensure();
      const now = actx.currentTime;
      [0, 0.13].forEach(offset => {
        const osc = actx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(70, now + offset);
        osc.frequency.exponentialRampToValueAtTime(35, now + offset + 0.12);
        const g = actx.createGain();
        g.gain.setValueAtTime(0.0001, now + offset);
        g.gain.linearRampToValueAtTime(0.25 * intensity, now + offset + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, now + offset + 0.15);
        osc.connect(g).connect(master);
        osc.start(now + offset);
        osc.stop(now + offset + 0.16);
      });
    }

    function setHeartbeat(active) {
      ensure();
      if (active && !heartbeatTimer) {
        playHeartbeatPulse(1);
        heartbeatTimer = setInterval(() => playHeartbeatPulse(1), 550);
      } else if (!active && heartbeatTimer) {
        clearInterval(heartbeatTimer);
        heartbeatTimer = null;
      }
    }

    function playJumpscare() {
      ensure();
      // 加強版：較響亮的「boo」（中通氣音＋正弦下滑＋短促鋸齒），有驚嚇感但不刺耳
      const now = actx.currentTime;
      const src = actx.createBufferSource();
      src.buffer = noiseBuffer(0.5);
      const filter = actx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 1200;
      const g = actx.createGain();
      g.gain.setValueAtTime(0.4, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
      src.connect(filter).connect(g).connect(master);
      src.start();

      const osc = actx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(500, now);
      osc.frequency.exponentialRampToValueAtTime(70, now + 0.4);
      const og = actx.createGain();
      og.gain.setValueAtTime(0.35, now);
      og.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.connect(og).connect(master);
      osc.start(now);
      osc.stop(now + 0.45);

      // 短促高頻鋸齒下滑，讓開頭「銳」一點
      const saw = actx.createOscillator();
      saw.type = 'sawtooth';
      saw.frequency.setValueAtTime(1200, now);
      saw.frequency.exponentialRampToValueAtTime(300, now + 0.1);
      const sg = actx.createGain();
      sg.gain.setValueAtTime(0.15, now);
      sg.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      saw.connect(sg).connect(master);
      saw.start(now);
      saw.stop(now + 0.12);

      setHeartbeat(false);
    }

    function stopAll() {
      setHeartbeat(false);
      stopMusic();
      if (droneNodes) {
        try {
          droneNodes.osc1.stop(); droneNodes.osc2.stop(); droneNodes.noiseSrc.stop();
        } catch (e) {}
        droneNodes = null;
      }
    }

    function tickFootsteps(dt, isMoving) {
      if (!isMoving) { footstepTimer = 0; return; }
      footstepTimer -= dt;
      if (footstepTimer <= 0) {
        footstepTimer = 320;
        playFootstep();
      }
    }

    return { startAmbience, playKeyPickup, playGlimpseWhisper, setHeartbeat, playJumpscare, stopAll, tickFootsteps };
  })();

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // ----- World -----
  const TILE = 48;
  const MAP_W = 34, MAP_H = 24;
  let map = [];
  function generateMap() {
    map = [];
    for (let y = 0; y < MAP_H; y++) {
      const row = [];
      for (let x = 0; x < MAP_W; x++) {
        if (x === 0 || y === 0 || x === MAP_W - 1 || y === MAP_H - 1) {
          row.push(1);
        } else {
          row.push(Math.random() < 0.12 ? 1 : 0);
        }
      }
      map.push(row);
    }
    map[1][1] = 0; map[1][2] = 0; map[2][1] = 0;
    map[MAP_H - 2][MAP_W - 2] = 0; // exit door tile, always reachable
  }

  function isWall(tx, ty) {
    if (tx < 0 || ty < 0 || ty >= map.length || tx >= map[0].length) return true;
    return map[ty][tx] === 1;
  }
  function tileWalkable(tx, ty) { return !isWall(tx, ty); }
  function dist(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }

  function hasLineOfSight(x1, y1, x2, y2) {
    const d = dist(x1, y1, x2, y2);
    const steps = Math.max(1, Math.ceil(d / 16));
    for (let i = 1; i < steps; i++) {
      const t = i / steps;
      const x = x1 + (x2 - x1) * t, y = y1 + (y2 - y1) * t;
      if (isWall(Math.floor(x / TILE), Math.floor(y / TILE))) return false;
    }
    return true;
  }

  // ----- Exit (reachable only once all keys are collected) -----
  const exitTile = { tx: MAP_W - 2, ty: MAP_H - 2 };
  function exitWorldPos() { return { x: exitTile.tx * TILE + TILE / 2, y: exitTile.ty * TILE + TILE / 2 }; }

  // ----- Player -----
  const player = { x: TILE * 1.5, y: TILE * 1.5, r: 12, speed: 2.6, angle: 0 };

  const keys = {};
  window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (e.key.toLowerCase() === 'e') tryInteract();
  });
  window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

  let mouseX = window.innerWidth / 2 + 200, mouseY = window.innerHeight / 2;
  window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

  // ----- Touch controls (virtual joystick + drag-to-aim) for tablets/phones -----
  const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  let touchDX = 0, touchDY = 0; // normalized joystick vector, added to keyboard movement

  if (isTouchDevice) {
    document.body.classList.add('touch-mode');

    const joystickZone = document.getElementById('joystickZone');
    const joystickBase = document.getElementById('joystickBase');
    const joystickKnob = document.getElementById('joystickKnob');
    const lookZone = document.getElementById('lookZone');
    const interactBtn = document.getElementById('interactBtn');

    let joyId = null;
    const JOY_RADIUS = 55; // matches (130 - 54*wiggle)/2 in CSS, knob travel range
    const KNOB_CENTER = 38; // (130 - 54) / 2, resting position of the knob inside the base

    function joyCenterPoint() {
      const r = joystickBase.getBoundingClientRect();
      return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
    }

    function joyStart(e) {
      const t = e.changedTouches[0];
      joyId = t.identifier;
      joyMove(e);
      e.preventDefault();
    }
    function joyMove(e) {
      for (const t of e.changedTouches) {
        if (t.identifier !== joyId) continue;
        const center = joyCenterPoint();
        let dx = t.clientX - center.x, dy = t.clientY - center.y;
        const d = Math.hypot(dx, dy) || 1;
        const clamped = Math.min(d, JOY_RADIUS);
        dx = (dx / d) * clamped; dy = (dy / d) * clamped;
        joystickKnob.style.left = (KNOB_CENTER + dx) + 'px';
        joystickKnob.style.top = (KNOB_CENTER + dy) + 'px';
        touchDX = dx / JOY_RADIUS; touchDY = dy / JOY_RADIUS;
        e.preventDefault();
      }
    }
    function joyEnd(e) {
      for (const t of e.changedTouches) {
        if (t.identifier !== joyId) continue;
        joyId = null;
        touchDX = 0; touchDY = 0;
        joystickKnob.style.left = KNOB_CENTER + 'px';
        joystickKnob.style.top = KNOB_CENTER + 'px';
      }
    }
    joystickZone.addEventListener('touchstart', joyStart, { passive: false });
    window.addEventListener('touchmove', joyMove, { passive: false });
    window.addEventListener('touchend', joyEnd);
    window.addEventListener('touchcancel', joyEnd);

    let lookId = null;
    function lookStart(e) {
      const t = e.changedTouches[0];
      lookId = t.identifier;
      mouseX = t.clientX; mouseY = t.clientY;
      e.preventDefault();
    }
    function lookMove(e) {
      for (const t of e.changedTouches) {
        if (t.identifier !== lookId) continue;
        mouseX = t.clientX; mouseY = t.clientY;
        e.preventDefault();
      }
    }
    function lookEnd(e) {
      for (const t of e.changedTouches) {
        if (t.identifier === lookId) lookId = null;
      }
    }
    lookZone.addEventListener('touchstart', lookStart, { passive: false });
    window.addEventListener('touchmove', lookMove, { passive: false });
    window.addEventListener('touchend', lookEnd);
    window.addEventListener('touchcancel', lookEnd);

    interactBtn.addEventListener('touchstart', e => { e.preventDefault(); tryInteract(); });
  }

  // ----- Items (keys) -----
  let items = [];
  function placeItems() {
    items = [];
    let placed = 0;
    while (placed < 3) {
      const tx = 1 + Math.floor(Math.random() * (MAP_W - 2));
      const ty = 1 + Math.floor(Math.random() * (MAP_H - 2));
      if (!isWall(tx, ty) && !(tx <= 2 && ty <= 2)) {
        items.push({ x: tx * TILE + TILE / 2, y: ty * TILE + TILE / 2, taken: false });
        placed++;
      }
    }
  }
  let keysCollected = 0;

  // ----- Story nodes (fixed narrative triggers) -----
  // Each node has a world position, a flag so it only fires once, and dialogue/choices.
  let storyNodes = [];
  let storyFlags = {}; // remembers player choices
  let storyActive = false;
  let pendingNode = null;
  let nearNode = null;

  function placeStoryNodes() {
    storyNodes = [
      {
        id: 'note1', done: false,
        tx: 4, ty: 4,
        text: '牆上貼著一張泛黑的字條：\n"不要相信手電筒照到的東西——它們會學你的樣子。"\n你可以選擇相信，也可以一笑置之。',
        choices: [
          { label: '把這句話記在心裡（保持警惕）', flag: 'cautious' },
          { label: '這只是瘋子的塗鴉（無視警告）', flag: 'reckless' },
        ],
      },
      {
        id: 'fork1', done: false,
        tx: MAP_W - 5, ty: 4,
        text: '前方走廊分成兩條路：左邊傳來滴水聲，右邊一片死寂。',
        choices: [
          { label: '走左邊（滴水聲的方向）', flag: 'path_left' },
          { label: '走右邊（死寂的方向）', flag: 'path_right' },
        ],
      },
      {
        id: 'mirror', done: false,
        tx: 12, ty: 9,
        text: '一面破碎的鏡子立在房間中央。鏡子裡的你，動作似乎慢了半拍……',
        choices: [
          { label: '打碎鏡子', flag: 'broke_mirror' },
          { label: '轉身離開', flag: 'left_mirror' },
        ],
      },
      {
        id: 'diary', done: false,
        tx: MAP_W - 8, ty: MAP_H - 6,
        text: '一本沾著暗紅汙漬的日記攤開在地上，最後一頁寫著："它曾經也是這裡的病人。手電筒的光，就是它唯一記得的東西。"',
        choices: [
          { label: '帶走日記，留作證據', flag: 'kept_diary' },
          { label: '把日記燒掉，假裝什麼都沒看到', flag: 'burned_diary' },
        ],
      },
    ];
  }

  function nodeWorldPos(n) { return { x: n.tx * TILE + TILE/2, y: n.ty * TILE + TILE/2 }; }

  function tryInteract() {
    if (storyActive) { advanceStoryDialogueClick(); return; }
    if (nearNode && !nearNode.done) {
      openStoryNode(nearNode);
    }
  }

  function openStoryNode(node) {
    storyActive = true;
    pendingNode = node;
    storyText.textContent = node.text;
    storyChoices.innerHTML = '';
    node.choices.forEach(choice => {
      const btn = document.createElement('button');
      btn.textContent = choice.label;
      btn.addEventListener('click', () => resolveChoice(node, choice));
      storyChoices.appendChild(btn);
    });
    storyBox.style.display = 'block';
    interactHint.style.display = 'none';
  }

  function resolveChoice(node, choice) {
    storyFlags[choice.flag] = true;
    node.done = true;
    storyBox.style.display = 'none';
    storyActive = false;
    pendingNode = null;
  }

  function advanceStoryDialogueClick() { /* choices are click-driven; nothing to advance via E */ }

  // ----- Monster (main chaser) -----
  const monster = {
    x: TILE * Math.floor(MAP_W / 2), y: TILE * Math.floor(MAP_H / 2),
    speed: 1.5, wanderSpeed: 1, active: false,
    waypoint: null, facing: 0,
  };

  function pickWanderWaypoint() {
    for (let tries = 0; tries < 20; tries++) {
      const tx = 1 + Math.floor(Math.random() * (MAP_W - 2));
      const ty = 1 + Math.floor(Math.random() * (MAP_H - 2));
      if (tileWalkable(tx, ty)) return { x: tx * TILE + TILE / 2, y: ty * TILE + TILE / 2 };
    }
    return null;
  }

  function moveEntityTowards(ent, tx, ty, spd) {
    const dx = tx - ent.x, dy = ty - ent.y;
    const d = Math.hypot(dx, dy);
    if (d < 1) return;
    const nx = ent.x + (dx / d) * spd;
    const ny = ent.y + (dy / d) * spd;
    if (tileWalkable(Math.floor(nx / TILE), Math.floor(ent.y / TILE))) ent.x = nx;
    if (tileWalkable(Math.floor(ent.x / TILE), Math.floor(ny / TILE))) ent.y = ny;
  }

  // ----- Flashlight creatures (glimpses) -----
  // Short-lived apparitions that appear at the edge of the flashlight cone, then vanish.
  let glimpses = [];
  let glimpseTimer = 8000;

  function spawnGlimpse() {
    // Spawn somewhere ahead of the player, within flashlight range, not too close.
    const spawnDist = 140 + Math.random() * 100;
    const spread = (Math.random() - 0.5) * 1.1; // angle offset from view direction
    const a = player.angle + spread;
    const gx = player.x + Math.cos(a) * spawnDist;
    const gy = player.y + Math.sin(a) * spawnDist;
    glimpses.push({
      x: gx, y: gy,
      life: 900 + Math.random() * 500, // ms visible
      born: performance.now(),
      seen: false,
    });
    Audio_.playGlimpseWhisper();
  }

  function updateGlimpses(dt) {
    glimpseTimer -= dt;
    if (glimpseTimer <= 0 && !storyActive) {
      glimpseTimer = 4000 + Math.random() * 4000; // 加強版：幻影出現間隔縮短，氣氛更緊張
      if (glimpses.length < 1 && Math.random() < 0.85) spawnGlimpse();
    }
    const now = performance.now();
    glimpses = glimpses.filter(g => {
      const age = now - g.born;
      if (age > g.life) {
        // if the player was staring at it when it despawns, it's extra unsettling
        return false;
      }
      return true;
    });
  }

  let gameOver = false;
  let win = false;
  let exitReached = false;
  let keysCompleteAnnounced = false;
  let lastTime = performance.now();
  let playerIsMoving = false;

  function updatePlayer(dt) {
    if (storyActive) { Audio_.tickFootsteps(dt, false); playerIsMoving = false; return; }
    let dx = 0, dy = 0;
    if (keys['w'] || keys['arrowup']) dy -= 1;
    if (keys['s'] || keys['arrowdown']) dy += 1;
    if (keys['a'] || keys['arrowleft']) dx -= 1;
    if (keys['d'] || keys['arrowright']) dx += 1;
    dx += touchDX; dy += touchDY;
    playerIsMoving = Math.hypot(dx, dy) > 0.1;
    const len = Math.max(1, Math.hypot(dx, dy));
    dx = (dx / len) * player.speed;
    dy = (dy / len) * player.speed;

    const nx = player.x + dx, ny = player.y + dy;
    if (!isWall(Math.floor(nx / TILE), Math.floor(player.y / TILE))) player.x = nx;
    if (!isWall(Math.floor(player.x / TILE), Math.floor(ny / TILE))) player.y = ny;

    player.angle = Math.atan2((mouseY - canvas.height/2), (mouseX - canvas.width/2));
    Audio_.tickFootsteps(dt, playerIsMoving);
  }

  function updateItems() {
    if (storyActive) return;
    for (const it of items) {
      if (!it.taken && dist(player.x, player.y, it.x, it.y) < 24) {
        it.taken = true;
        keysCollected++;
        keyCountEl.textContent = keysCollected;
        Audio_.playKeyPickup();
        if (keysCollected >= 3 && !keysCompleteAnnounced) {
          keysCompleteAnnounced = true;
          exitHintEl.style.display = 'block';
        }
      }
    }
  }

  function updateExit() {
    if (storyActive || win) return;
    if (keysCollected < 3) return;
    const p = exitWorldPos();
    if (dist(player.x, player.y, p.x, p.y) < 28) {
      exitReached = true;
      win = true;
    }
  }

  function updateStoryProximity() {
    nearNode = null;
    if (storyActive) { interactHint.style.display = 'none'; return; }
    for (const n of storyNodes) {
      if (n.done) continue;
      const p = nodeWorldPos(n);
      if (dist(player.x, player.y, p.x, p.y) < 40) { nearNode = n; break; }
    }
    interactHint.style.display = nearNode ? 'block' : 'none';
  }

  function updateMonster() {
    if (storyActive) return;
    const d = dist(player.x, player.y, monster.x, monster.y);
    const los = hasLineOfSight(monster.x, monster.y, player.x, player.y);

    if (los) {
      // hearing: footsteps carry further than silence
      const hearingRadius = playerIsMoving ? 260 : 120;
      if (d < hearingRadius) {
        monster.active = true;
      } else if (d < 420) {
        // vision cone: only spots the player if facing roughly their way
        const angToPlayer = Math.atan2(player.y - monster.y, player.x - monster.x);
        let diff = Math.abs(angToPlayer - monster.facing);
        if (diff > Math.PI) diff = Math.PI * 2 - diff;
        if (diff < 0.7) monster.active = true;
      }
    }
    if (d > 550) monster.active = false; // loses the scent once you're far enough away

    const prevX = monster.x, prevY = monster.y;
    if (monster.active) {
      moveEntityTowards(monster, player.x, player.y, monster.speed);
      monster.waypoint = null;
    } else {
      if (!monster.waypoint || dist(monster.x, monster.y, monster.waypoint.x, monster.waypoint.y) < 10) {
        monster.waypoint = pickWanderWaypoint();
      }
      if (monster.waypoint) moveEntityTowards(monster, monster.waypoint.x, monster.waypoint.y, monster.wanderSpeed);
    }
    if (monster.x !== prevX || monster.y !== prevY) {
      monster.facing = Math.atan2(monster.y - prevY, monster.x - prevX);
    }
    Audio_.setHeartbeat(monster.active);
    if (d < 22 && !gameOver) triggerJumpscare('monster');
  }

  function triggerJumpscare(cause) {
    gameOver = true;
    jumpscareEl.style.display = 'flex';
    Audio_.playJumpscare();
    setTimeout(() => {
      jumpscareEl.style.display = 'none';
      showEndScreen('death', cause);
    }, 750); // 加強版：驚嚇畫面延長至 0.75 秒，讓放大逼近效果完整播完
  }

  function computeEndingText() {
    if (storyFlags.broke_mirror && storyFlags.reckless) {
      return { title: '你 迷 失 了', body: '你打碎了鏡子，也打碎了自己的理智。你依然在走廊裡遊蕩，但已經不再是"你"了。', color: '#b33' };
    }
    if (storyFlags.kept_diary && storyFlags.cautious && storyFlags.left_mirror) {
      return { title: '真 相 大 白', body: '你帶著日記逃了出去，把療養院的秘密公之於眾。它的名字，終於被人記住了——不是作為怪物，而是作為受害者。', color: '#8ff' };
    }
    if (storyFlags.burned_diary && storyFlags.reckless) {
      return { title: '你 活 著 逃 了 出 來 ， 但 …', body: '你燒掉了證據，也燒掉了真相。你活了下來，但那張臉會在你每次開燈的瞬間出現。', color: '#dd8' };
    }
    if (storyFlags.cautious && storyFlags.path_left && storyFlags.left_mirror) {
      return { title: '你 逃 出 去 了', body: '你聽從了那張字條的警告，謹慎地穿過黑暗，最終推開了大門。晨光刺眼，但你活了下來。', color: '#8f8' };
    }
    return { title: '你 逃 出 去 了', body: '療養院的秘密將永遠埋藏在黑暗中……你不會再回頭看第二眼。', color: '#8f8' };
  }

  function showEndScreen(kind, cause) {
    Audio_.stopAll();
    overlay.classList.remove('hidden');
    let title, body, color;
    if (kind === 'death') {
      title = '被 抓 到 了 ！'; body = '一隻小幽靈輕輕拍了拍你的肩膀："找到你啦！"別灰心，深呼吸——再試一次，這次一定能逃出去！'; color = '#8ab4ff';
    } else {
      const e = computeEndingText();
      title = e.title; body = e.body; color = e.color;
    }
    overlay.innerHTML = `
      <h1 style="color:${color}">${title}</h1>
      <p>${body}</p>
      <button id="restartBtn">重新開始</button>
    `;
    document.getElementById('restartBtn').addEventListener('click', resetGame);
  }

  function resetGame() {
    generateMap();
    placeItems();
    placeStoryNodes();
    storyFlags = {};
    keysCollected = 0;
    keyCountEl.textContent = 0;
    glimpses = []; glimpseTimer = 8000;
    player.x = TILE * 1.5; player.y = TILE * 1.5;
    monster.x = TILE * Math.floor(MAP_W / 2); monster.y = TILE * Math.floor(MAP_H / 2);
    monster.active = false;
    monster.waypoint = null;
    monster.facing = 0;
    exitReached = false;
    keysCompleteAnnounced = false;
    exitHintEl.style.display = 'none';
    gameOver = false; win = false; storyActive = false;
    storyBox.style.display = 'none';
    overlay.classList.add('hidden');
    hud.classList.remove('hidden');
    lastTime = performance.now();
    Audio_.startAmbience();
    requestAnimationFrame(loop);
  }

  // ----- Rendering -----
  function render() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const camX = player.x - canvas.width / 2;
    const camY = player.y - canvas.height / 2;

    ctx.save();
    ctx.translate(-camX, -camY);

    for (let y = 0; y < MAP_H; y++) {
      for (let x = 0; x < MAP_W; x++) {
        ctx.fillStyle = map[y][x] === 1 ? '#1a1010' : '#141414';
        ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
        ctx.strokeStyle = '#050505';
        ctx.strokeRect(x * TILE, y * TILE, TILE, TILE);
      }
    }

    // exit door
    {
      const ep = exitWorldPos();
      ctx.fillStyle = keysCollected >= 3 ? '#3fae3f' : '#3a2a1a';
      ctx.fillRect(ep.x - TILE/2, ep.y - TILE/2, TILE, TILE);
      ctx.strokeStyle = keysCollected >= 3 ? '#9fff9f' : '#5a4a3a';
      ctx.lineWidth = 2;
      ctx.strokeRect(ep.x - TILE/2, ep.y - TILE/2, TILE, TILE);
    }

    // story node markers (faint)
    for (const n of storyNodes) {
      if (n.done) continue;
      const p = nodeWorldPos(n);
      ctx.fillStyle = 'rgba(200,180,120,0.5)';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
      ctx.fill();
    }

    for (const it of items) {
      if (it.taken) continue;
      ctx.fillStyle = '#e8c840';
      ctx.beginPath();
      ctx.arc(it.x, it.y, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#fff5c0';
      ctx.stroke();
    }

    // flashlight glimpse creatures - only draw if within cone (handled by mask anyway, but
    // we also flicker/distort them for creepiness)
    const now = performance.now();
    for (const g of glimpses) {
      const age = now - g.born;
      // 加強版：深灰紫小幽靈，尖銳裙擺＋發光雙眼，柔和淡入淡出
      ctx.save();
      ctx.globalAlpha = 0.7 * Math.min(1, (g.life - age) / 300, age / 200);
      ctx.fillStyle = '#3a3550';
      ctx.beginPath();
      ctx.arc(g.x, g.y - 6, 9, Math.PI, 0);              // 圓頭
      ctx.lineTo(g.x + 9, g.y + 13);                     // 尖銳鋸齒裙擺
      ctx.lineTo(g.x + 5.5, g.y + 6);
      ctx.lineTo(g.x + 2.5, g.y + 13);
      ctx.lineTo(g.x, g.y + 6);
      ctx.lineTo(g.x - 2.5, g.y + 13);
      ctx.lineTo(g.x - 5.5, g.y + 6);
      ctx.lineTo(g.x - 9, g.y + 13);
      ctx.closePath();
      ctx.fill();
      // 發光雙眼
      ctx.shadowColor = '#bfeaff';
      ctx.shadowBlur = 6;
      ctx.fillStyle = '#d8f4ff';
      ctx.beginPath(); ctx.arc(g.x - 3, g.y - 7, 1.8, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(g.x + 3, g.y - 7, 1.8, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    // monster
    ctx.fillStyle = monster.active ? '#8b0000' : '#440000';
    ctx.beginPath();
    ctx.arc(monster.x, monster.y, 16, 0, Math.PI * 2);
    ctx.fill();

    // player
    ctx.fillStyle = '#c8c8c8';
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // ---- flashlight cone mask (built on an offscreen canvas so destination-out
    // only punches holes in the mask itself, not in the already-rendered scene) ----
    const px = canvas.width / 2, py = canvas.height / 2;
    if (maskCanvas.width !== canvas.width || maskCanvas.height !== canvas.height) {
      maskCanvas.width = canvas.width;
      maskCanvas.height = canvas.height;
    }
    maskCtx.globalCompositeOperation = 'source-over';
    maskCtx.fillStyle = '#000';
    maskCtx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);

    maskCtx.globalCompositeOperation = 'destination-out';
    const grad = maskCtx.createRadialGradient(px, py, 20, px, py, 260);
    grad.addColorStop(0, 'rgba(0,0,0,1)');
    grad.addColorStop(0.6, 'rgba(0,0,0,0.85)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    maskCtx.fillStyle = grad;
    maskCtx.beginPath();
    maskCtx.moveTo(px, py);
    maskCtx.arc(px, py, 260, player.angle - 0.6, player.angle + 0.6);
    maskCtx.closePath();
    maskCtx.fill();

    // small radius always visible around player
    const near = maskCtx.createRadialGradient(px, py, 0, px, py, 50);
    near.addColorStop(0, 'rgba(0,0,0,0.9)');
    near.addColorStop(1, 'rgba(0,0,0,0)');
    maskCtx.fillStyle = near;
    maskCtx.beginPath();
    maskCtx.arc(px, py, 50, 0, Math.PI * 2);
    maskCtx.fill();

    ctx.save();
    ctx.globalCompositeOperation = 'source-over';
    ctx.drawImage(maskCanvas, 0, 0);
    ctx.restore();

    // red vignette when the monster is actively chasing
    if (monster.active) {
      ctx.save();
      ctx.globalCompositeOperation = 'source-over';
      const v = ctx.createRadialGradient(px, py, canvas.height/3, px, py, canvas.height);
      v.addColorStop(0, 'rgba(80,0,0,0)');
      v.addColorStop(1, 'rgba(80,0,0,0.4)');
      ctx.fillStyle = v;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
    }
  }

  function loop(now) {
    if (gameOver) return;
    if (win) { showEndScreen('win'); return; }
    const dt = Math.min(50, now - lastTime);
    lastTime = now;
    updatePlayer(dt);
    updateItems();
    updateExit();
    updateStoryProximity();
    updateMonster();
    updateGlimpses(dt);
    render();
    requestAnimationFrame(loop);
  }

  // ----- 進入遊戲前的三次驚嚇內容警告（知情同意） -----
  const warnOverlay = document.getElementById('warnOverlay');
  const warnStepEl = document.getElementById('warnStep');
  const warnTextEl = document.getElementById('warnText');
  const warnOkEl = document.getElementById('warnOk');
  const warnLeaveEl = document.getElementById('warnLeave');
  const WARN_STEPS = [
    { step: '第 1 / 3 次確認',
      text: '⚠️ 恐怖遊戲警告：本遊戲是恐怖遊戲，過程中有黑暗場景與緊張氣氛。確定要繼續嗎？',
      ok: '我瞭解，繼續' },
    { step: '第 2 / 3 次確認',
      text: '⚠️ 再次確認：遊戲中會出現 <b>突發驚嚇畫面（Jump Scare）</b> 與突然的音效，可能會嚇到你。確定嗎？',
      ok: '我瞭解，繼續' },
    { step: '第 3 / 3 次確認',
      text: '⚠️ 最後確認：被抓到時會有恐怖的鬼臉突然出現。若你會害怕、心臟不適或不想被嚇，請選擇離開。真的要玩嗎？',
      ok: '我準備好了，開始' },
  ];
  let warnIndex = 0;

  function showWarn(i) {
    warnIndex = i;
    const s = WARN_STEPS[i];
    warnStepEl.textContent = s.step;
    warnTextEl.innerHTML = s.text;
    warnOkEl.textContent = s.ok;
    warnOverlay.classList.add('show');
  }
  function leaveWarn() {
    warnOverlay.classList.remove('show');
    overlay.classList.remove('hidden');
  }
  function beginGame() {
    warnOverlay.classList.remove('show');
    generateMap();
    placeItems();
    placeStoryNodes();
    overlay.classList.add('hidden');
    hud.classList.remove('hidden');
    lastTime = performance.now();
    Audio_.startAmbience();
    requestAnimationFrame(loop);
  }

  warnOkEl.addEventListener('click', () => {
    if (warnIndex < WARN_STEPS.length - 1) showWarn(warnIndex + 1);
    else beginGame();
  });
  warnLeaveEl.addEventListener('click', leaveWarn);

  document.getElementById('startBtn').addEventListener('click', () => {
    showWarn(0);
  });
})();
</script>
<script>/* AI-CAMP-STATS-BEACON */
(function(){
  try{ if(window.top!==window.self) return; }catch(e){ return; } /* 在作品館內由作品館計數與投票 */
  var NS="ai-future-camp", K="t-b7371efc";
  var ABS="//abacus.jasoncameron.dev/"; /* 直連備援 */
  var REL="/abacus/"; /* 同源代理（Vercel 轉發）：學校閘道擋外部網域時仍然通 */
  function ping(n){
    try{
      fetch(REL+"hit/"+NS+"/"+n).then(function(r){
        if(!r||!r.ok){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); }
      }).catch(function(){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); });
    }catch(e){}
  }
  function read(n,cb){
    function via(base,next){ try{ fetch(base+"get/"+NS+"/"+n).then(function(r){ if(r.status===404&&base===ABS) return {value:0}; if(!r.ok) throw 0; return r.json(); }).then(function(j){ cb(j.value||j.count||0); }).catch(next); }catch(e){ next(); } }
    via(REL, function(){ via(ABS, function(){ cb(null); }); });
  }
  ping(K+"-v");
  var done=false;
  function once(){ if(done)return; done=true; ping(K+"-p"); ping("site-total-plays");
    window.removeEventListener("pointerdown",once); window.removeEventListener("keydown",once); }
  window.addEventListener("pointerdown",once,{once:false}); window.addEventListener("keydown",once,{once:false});
  /* 投票鈕：非常好玩/好玩——與作品館同一計數器，任何網頁打開都同步 */
  function initVotes(){
    if(!document.body) return;
    var wrap=document.createElement("div");
    wrap.style.cssText="position:fixed;right:10px;bottom:10px;z-index:99999;display:flex;gap:6px;font-family:sans-serif;opacity:.92";
    var LS="voted-"+K;
    var defs=[["-love","\u2764\uFE0F","\u975e\u5e38\u597d\u73a9","#ff6cc7"],["-like","\ud83d\udc4d","\u597d\u73a9","#38e1ff"]];
    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;
          b.querySelector("i").textContent=Math.max(0,(n||0)-(c||0));
        }); });
      });
    }
    defs.forEach(function(d){
      var b=document.createElement("button");
      b.type="button"; b.title=d[2];
      b.style.cssText="min-height:42px;padding:8px 14px;border:none;border-radius:999px;background:rgba(15,18,32,.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation";
      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";
      b.addEventListener("click",function(){
        var prev=null; try{ prev=localStorage.getItem(LS); }catch(e){}
        if(prev===d[0]){ ping(K+d[0]+"-c"); try{ localStorage.removeItem(LS); }catch(e){} }
        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);
      });
      btns[d[0]]=b; wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    refresh();
    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* 每10秒同步別人投的票 */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
</script>
