<title>拆彈行動</title>
<style>
  :root{
    --bg:#0b0e14; --panel:#121826; --panel2:#0e1420; --ink:#e8ecf1; --muted:#7c8798;
    --danger:#ff4444; --danger-dim:#4a1f22; --safe:#33d1a6; --warn:#ffb020;
    --casing:#1b2230; --rivet:#2a3345; --led-off:#3a1414;
    --shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  :root[data-theme="light"]{
    --bg:#eef1f6; --panel:#ffffff; --panel2:#f4f6fa; --ink:#171b22; --muted:#5b6472;
    --danger:#d92626; --danger-dim:#f6d6d6; --safe:#0f9d78; --warn:#c07800;
    --casing:#dde3ee; --rivet:#c3cbdb; --led-off:#e8c9c9;
    --shadow: 0 20px 50px rgba(30,40,70,.12);
  }
  @media (prefers-color-scheme: light){
    :root:not([data-theme="dark"]){
      --bg:#eef1f6; --panel:#ffffff; --panel2:#f4f6fa; --ink:#171b22; --muted:#5b6472;
      --danger:#d92626; --danger-dim:#f6d6d6; --safe:#0f9d78; --warn:#c07800;
      --casing:#dde3ee; --rivet:#c3cbdb; --led-off:#e8c9c9;
      --shadow: 0 20px 50px rgba(30,40,70,.12);
    }
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,"Segoe UI",Roboto,"PingFang TC","Noto Sans TC",sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;overflow-x:hidden;}
  .stage{width:100%;max-width:720px;padding:28px 20px 40px;}

  .eyebrow{font-size:12px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;margin:0 0 6px;text-align:center;}
  h1{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-weight:800;
    font-size:clamp(28px,5vw,40px);letter-spacing:.04em;text-align:center;margin:0 0 4px;text-wrap:balance;}
  .sub{text-align:center;color:var(--muted);font-size:14px;margin:0 0 24px;}

  .case{background:var(--casing);border-radius:22px;padding:22px;box-shadow:var(--shadow);
    border:1px solid rgba(127,127,127,.15);position:relative;}
  .case::before,.case::after{content:"";position:absolute;top:14px;width:10px;height:10px;border-radius:50%;
    background:var(--rivet);box-shadow:inset 0 1px 2px rgba(0,0,0,.4);}
  .case::before{left:14px;} .case::after{right:14px;}

  .hud{display:flex;align-items:center;justify-content:space-between;background:var(--panel);
    border-radius:14px;padding:14px 18px;margin-bottom:16px;gap:12px;}
  .timer{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-size:34px;font-weight:800;
    font-variant-numeric:tabular-nums;color:var(--danger);text-shadow:0 0 16px color-mix(in srgb, var(--danger) 45%, transparent);
    min-width:96px;}
  .stats{display:flex;gap:18px;font-size:13px;color:var(--muted);}
  .stats b{color:var(--ink);font-variant-numeric:tabular-nums;}
  .leds{display:flex;gap:7px;}
  .led{width:10px;height:10px;border-radius:50%;background:var(--led-off);}
  .led.on{background:var(--danger);box-shadow:0 0 8px var(--danger);}

  .clue{background:var(--panel2);border:1px dashed color-mix(in srgb, var(--warn) 55%, transparent);
    border-radius:12px;padding:12px 16px;margin-bottom:20px;font-size:14.5px;line-height:1.55;}
  .clue b{color:var(--warn);}

  .wires{display:flex;flex-direction:column;gap:12px;margin-bottom:6px;}
  .wire-row{display:flex;align-items:center;gap:14px;background:var(--panel);border-radius:12px;padding:10px 16px;
    cursor:pointer;border:1px solid transparent;transition:transform .12s ease, border-color .12s ease;}
  .wire-row:hover{transform:translateX(3px);border-color:color-mix(in srgb, var(--ink) 12%, transparent);}
  .wire-row:focus-visible{outline:3px solid var(--warn);outline-offset:2px;}
  .wire-row[disabled]{pointer-events:none;opacity:.5;}
  .tag{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-weight:700;font-size:15px;
    width:26px;text-align:center;color:var(--muted);}
  .strand{flex:1;height:10px;border-radius:6px;position:relative;}
  .strand::after{content:"";position:absolute;inset:0;border-radius:6px;
    background:linear-gradient(180deg,rgba(255,255,255,.35),transparent 55%);}
  .clipped{position:relative;}
  .clipped::before{content:"";position:absolute;left:50%;top:-6px;bottom:-6px;width:3px;background:var(--bg);
    box-shadow:2px 0 0 var(--bg),-2px 0 0 var(--bg);transform:translateX(-50%);}

  .status{text-align:center;font-size:16px;font-weight:600;min-height:26px;margin:16px 0 4px;}
  .status.safe{color:var(--safe);} .status.danger{color:var(--danger);}

  .actions{display:flex;justify-content:center;margin-top:10px;}
  button.primary{font:inherit;font-weight:700;font-size:14px;letter-spacing:.03em;color:var(--bg);
    background:var(--warn);border:none;border-radius:10px;padding:11px 26px;cursor:pointer;}
  button.primary:hover{filter:brightness(1.08);}
  button.primary:focus-visible{outline:3px solid var(--ink);outline-offset:2px;}

  .flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity .08s ease;z-index:5;}
  .flash.show{opacity:.85;transition:opacity .02s ease;}

  #crowd{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:4;}
  .villager{position:absolute;width:30px;height:44px;opacity:0;}
  .villager .body{position:absolute;bottom:0;left:4px;width:22px;height:26px;border-radius:9px 9px 4px 4px;}
  .villager .head{position:absolute;bottom:22px;left:2px;width:26px;height:22px;border-radius:50%;}
  .villager .earL,.villager .earR{position:absolute;bottom:36px;width:9px;height:12px;border-radius:50%;}
  .villager .earL{left:0;} .villager .earR{left:17px;}
  .villager .wingL,.villager .wingR{position:absolute;bottom:16px;width:14px;height:18px;border-radius:60% 40% 60% 40%;opacity:.85;}
  .villager .wingL{left:-10px;} .villager .wingR{left:26px;}

  @media (prefers-reduced-motion: reduce){
    .wire-row{transition:none;} .flash{transition:none;}
  }
</style>

<div class="stage">
  <p class="eyebrow">案件編號 #07 &middot; 高中生偵探</p>
  <h1>拆彈行動</h1>
  <p class="sub">找出提示指向的那條線，在時間耗盡前剪斷它。剪錯，就結束了。</p>

  <div class="case">
    <div class="hud">
      <div class="timer" id="timer">00:15</div>
      <div class="leds" id="leds"></div>
      <div class="stats">
        <span>關卡 <b id="round">1</b></span>
        <span>連續成功 <b id="streak">0</b></span>
        <span>最佳紀錄 <b id="best">0</b></span>
      </div>
    </div>

    <div class="clue" id="clue">正在載入案件...</div>

    <div class="wires" id="wires"></div>

    <p class="status" id="status">仔細看清楚每條線的線索，再動手。</p>

    <div class="actions">
      <button class="primary" id="actionBtn">開始拆彈</button>
    </div>
  </div>
</div>

<div class="flash" id="flash"></div>
<div id="crowd"></div>

<script>
(function(){
  const COLORS = [
    {name:'紅色', hex:'#ff4d4d'},
    {name:'藍色', hex:'#3d8bff'},
    {name:'黃色', hex:'#ffd23d'},
    {name:'綠色', hex:'#33cc7a'},
    {name:'白色', hex:'#e8ecf1'},
    {name:'紫色', hex:'#b673ff'},
  ];

  const timerEl = document.getElementById('timer');
  const ledsEl = document.getElementById('leds');
  const clueEl = document.getElementById('clue');
  const wiresEl = document.getElementById('wires');
  const statusEl = document.getElementById('status');
  const actionBtn = document.getElementById('actionBtn');
  const roundEl = document.getElementById('round');
  const streakEl = document.getElementById('streak');
  const bestEl = document.getElementById('best');
  const flashEl = document.getElementById('flash');
  const crowdEl = document.getElementById('crowd');

  let round = 1, streak = 0, best = Number(localStorage.getItem('bombgame_best')||0);
  bestEl.textContent = best;

  let wires = [];
  let correctIndex = -1;
  let clueText = '';
  let timeLeft = 15;
  let roundActive = false;
  let rafId = null;
  let lastTs = 0;

  for(let i=0;i<5;i++){
    const l = document.createElement('div');
    l.className='led';
    ledsEl.appendChild(l);
  }
  const ledNodes = ledsEl.querySelectorAll('.led');

  function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

  function buildRound(){
    const wireCount = Math.min(4 + Math.floor((round-1)/2), 6);
    const numbers = new Set();
    while(numbers.size < wireCount) numbers.add(1+Math.floor(Math.random()*9));
    const nums = Array.from(numbers);
    const cols = [];
    for(let i=0;i<wireCount;i++) cols.push(pick(COLORS));

    // ensure at least one duplicate color pair exists so "odd one out" clue is meaningful
    if (Math.random() < 0.5 && wireCount >= 3) {
      cols[1] = cols[0];
    }

    wires = nums.map((n,i)=>({ number:n, color:cols[i] }));

    const clueType = pick(['max','oddcolor']);
    if (clueType === 'max' || countUnique(cols) === cols.length) {
      const maxNum = Math.max(...nums);
      correctIndex = wires.findIndex(w=>w.number===maxNum);
      clueText = `<b>案情提示：</b>剪斷數字<b>最大</b>的那條線。`;
    } else {
      const counts = {};
      cols.forEach(c=>counts[c.name]=(counts[c.name]||0)+1);
      const oddColor = cols.find(c=>counts[c.name]===1);
      correctIndex = wires.findIndex(w=>w.color.name===oddColor.name);
      clueText = `<b>案情提示：</b>剪斷唯一沒有重複顏色的那條線。`;
    }

    clueEl.innerHTML = clueText;
    renderWires();
    timeLeft = Math.max(6, 15 - Math.floor((round-1)*0.7));
    updateTimerDisplay();
    roundEl.textContent = round;
    streakEl.textContent = streak;
  }

  function countUnique(cols){
    return new Set(cols.map(c=>c.name)).size;
  }

  function renderWires(){
    wiresEl.innerHTML = '';
    wires.forEach((w,i)=>{
      const row = document.createElement('button');
      row.className='wire-row';
      row.setAttribute('aria-label', `第${i+1}條線，${w.color.name}，數字${w.number}`);
      row.innerHTML = `<span class="tag">${w.number}</span><span class="strand" style="background:${w.color.hex}"></span><span class="tag">${w.color.name}</span>`;
      row.addEventListener('click', ()=>cutWire(i, row));
      wiresEl.appendChild(row);
    });
  }

  function updateTimerDisplay(){
    const mm = String(Math.floor(timeLeft/60)).padStart(2,'0');
    const ss = String(Math.floor(timeLeft%60)).padStart(2,'0');
    timerEl.textContent = `${mm}:${ss}`;
    const urgent = timeLeft <= 5;
    timerEl.style.color = urgent ? '#fff' : 'var(--danger)';
    ledNodes.forEach((l,i)=>{
      l.classList.toggle('on', urgent ? true : (Math.floor(timeLeft)%5===i));
    });
  }

  function tick(ts){
    if (!roundActive) return;
    if (!lastTs) lastTs = ts;
    const dt = (ts-lastTs)/1000;
    lastTs = ts;
    timeLeft -= dt;
    if (timeLeft <= 0){
      timeLeft = 0;
      updateTimerDisplay();
      endRound(false, '時間到了！炸彈爆炸了。');
      return;
    }
    updateTimerDisplay();
    rafId = requestAnimationFrame(tick);
  }

  function cutWire(i, row){
    if (!roundActive) return;
    row.classList.add('clipped');
    Array.from(wiresEl.children).forEach(c=>c.setAttribute('disabled','true'));
    if (i === correctIndex){
      endRound(true, '成功拆除！');
    } else {
      endRound(false, '剪錯線了...爆炸了！');
    }
  }

  function endRound(success, message){
    roundActive = false;
    cancelAnimationFrame(rafId);
    statusEl.textContent = message;
    statusEl.className = 'status ' + (success ? 'safe' : 'danger');

    if (success){
      streak += 1;
      round += 1;
      if (streak > best){ best = streak; localStorage.setItem('bombgame_best', best); bestEl.textContent = best; }
      streakEl.textContent = streak;
      spawnCrowd();
      actionBtn.textContent = '下一關';
    } else {
      flashEl.classList.add('show');
      setTimeout(()=>flashEl.classList.remove('show'), 220);
      streak = 0;
      round = 1;
      streakEl.textContent = streak;
      actionBtn.textContent = '重新開始';
    }
    actionBtn.disabled = false;
  }

  function spawnCrowd(){
    const furColors = ['#f4c542','#e8846b','#7bc9a3','#8fb4e3','#c98fdc','#e3d38f'];
    const n = 14;
    for(let i=0;i<n;i++){
      const v = document.createElement('div');
      v.className='villager';
      const fur = furColors[i%furColors.length];
      v.innerHTML = `
        <div class="wingL" style="background:${fur};"></div>
        <div class="wingR" style="background:${fur};"></div>
        <div class="earL" style="background:${fur};"></div>
        <div class="earR" style="background:${fur};"></div>
        <div class="head" style="background:${fur};"></div>
        <div class="body" style="background:${fur};filter:brightness(.85);"></div>`;
      const fromLeft = i%2===0;
      const startX = fromLeft ? -60 : window.innerWidth+60;
      const startY = 60 + Math.random()*window.innerHeight*0.5;
      const endX = window.innerWidth*0.15 + Math.random()*window.innerWidth*0.7;
      const endY = 40 + Math.random()*window.innerHeight*0.4;
      v.style.left='0px'; v.style.top='0px';
      v.style.transform = `translate(${startX}px, ${startY}px)`;
      crowdEl.appendChild(v);

      const delay = Math.random()*300;
      setTimeout(()=>{
        v.style.transition = 'transform 1.1s cubic-bezier(.2,.8,.2,1), opacity .4s ease';
        v.style.opacity = '1';
        v.style.transform = `translate(${endX}px, ${endY}px)`;
      }, delay);

      setTimeout(()=>{ v.style.opacity='0'; setTimeout(()=>v.remove(), 500); }, 2600+delay);
    }
  }

  actionBtn.addEventListener('click', ()=>{
    actionBtn.disabled = true;
    statusEl.textContent = '偵測電路中...';
    statusEl.className = 'status';
    roundActive = true;
    lastTs = 0;
    buildRound();
    rafId = requestAnimationFrame(tick);
  });

  clueEl.textContent = '按下「開始拆彈」，看清楚提示再動手。';
})();
</script>

  try{ if(window.top!==window.self) return; }catch(e){ return; } /* 在作品館內由作品館計數 */
  var NS="ai-future-camp", K="t-800daf93";
  function ping(n){ try{ var p=fetch("//abacus.jasoncameron.dev/hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(p&&p.catch) p.catch(function(){}); }catch(e){} }
  ping(K+"-v");
