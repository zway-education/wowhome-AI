<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>詭異飯店 - 雙人走路逃脫遊戲</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: radial-gradient(ellipse at center, #1a0505 0%, #050202 70%, #000 100%);
    color: #d8c9b8;
    font-family: "Noto Serif TC", "PMingLiU", serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #app { max-width: 760px; width: 100%; }
  .panel {
    background: linear-gradient(180deg, #120808 0%, #0a0404 100%);
    border: 1px solid #4a1f1f;
    box-shadow: 0 0 40px rgba(120,0,0,0.35), inset 0 0 60px rgba(0,0,0,0.6);
    border-radius: 6px;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }
  h1 {
    text-align: center;
    color: #a11;
    letter-spacing: 6px;
    text-shadow: 0 0 12px #700, 0 0 2px #000;
    font-size: 1.5em;
    margin: 0 0 6px;
  }
  .sub { text-align: center; color: #7a6a5a; font-size: 0.82em; margin-bottom: 18px; letter-spacing: 2px;}
  .row { display: flex; gap: 10px; margin-bottom: 10px; }
  input[type=text] {
    flex: 1;
    background: #1a0e0e;
    border: 1px solid #5a2a2a;
    color: #e8dcc8;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 1em;
    border-radius: 3px;
  }
  button {
    background: #3a0e0e;
    border: 1px solid #7a1f1f;
    color: #e8c8b8;
    padding: 10px 16px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.95em;
    letter-spacing: 2px;
    border-radius: 3px;
    transition: background 0.2s, transform 0.1s;
  }
  button:hover:not(:disabled) { background: #5a1414; box-shadow: 0 0 10px rgba(200,0,0,0.5); }
  button:active:not(:disabled) { transform: scale(0.97); }
  .full { width: 100%; }
  .status-bar {
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    margin-bottom: 10px; padding: 10px; background: rgba(0,0,0,0.4);
    border: 1px solid #331414; border-radius: 4px; font-size: 0.82em;
  }
  .player-stat { flex: 1; min-width: 140px; }
  .player-stat b { color: #c86; }
  .bar-bg { background: #200; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 3px; border: 1px solid #400; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, #700, #c33); transition: width 0.4s; }
  .bar-fill.sanity { background: linear-gradient(90deg, #135, #37c); }
  .objective { text-align: center; font-size: 0.85em; color: #c8a; margin-bottom: 8px; }
  #canvasWrap { display:flex; justify-content:center; margin-bottom: 12px; }
  canvas { background:#0a0505; border: 2px solid #4a1f1f; border-radius: 4px; box-shadow: inset 0 0 40px rgba(0,0,0,0.8); max-width:100%; }
  .controls-hint { display:flex; justify-content: space-between; font-size: 0.78em; color:#776; margin-bottom: 10px; flex-wrap: wrap; gap:6px;}
  #log {
    background: #0a0505; border: 1px solid #2a1414; border-radius: 4px;
    padding: 10px 14px; min-height: 60px; max-height: 110px; overflow-y: auto;
    line-height: 1.6; font-size: 0.88em; margin-bottom: 10px; white-space: pre-wrap;
  }
  #log .danger { color: #d33; }
  #log .clue { color: #6ac; }
  #log .win { color: #6c6; }
  #log .system { color: #776; font-style: italic; }
  .item-list span {
    display: inline-block; background: #201010; border: 1px solid #4a2222;
    padding: 3px 8px; border-radius: 3px; margin: 2px; font-size: 0.78em; color: #c8a;
  }
  .hidden { display: none !important; }
  .center { text-align: center; }
  #jumpscare {
    position: fixed; inset: 0; background: #000; z-index: 999;
    display: flex; align-items: center; justify-content: center;
    color: #f00; font-size: 3em; font-weight: bold; letter-spacing: 8px;
    text-shadow: 0 0 30px red; text-align: center; padding: 20px;
  }
</style>
</head>
<body>
<div id="app">
  <div class="panel" id="panel">

    <div id="screen-intro">
      <h1>詭 異 飯 店</h1>
      <div class="sub">雙人走路逃脫遊戲 · 用鍵盤操控角色在飯店裡移動</div>
      <p style="color:#a89;">你們兩人為了避雨走進了這間廢棄已久的飯店。大廳昏天暗地，房間門縫下滲出血跡……
      操控你們的角色在飯店裡走動，蒐集 2 把鑰匙，小心躲避在黑暗中遊蕩的「它」，一起走到出口逃出生天。</p>
      <div class="row">
        <input type="text" id="p1name" placeholder="玩家一 名字（藍色角色）" maxlength="10">
      </div>
      <div class="row">
        <input type="text" id="p2name" placeholder="玩家二 名字（綠色角色）" maxlength="10">
      </div>
      <button class="full" id="startBtn">推 門 而 入</button>
    </div>

    <div id="screen-game" class="hidden">
      <h1>詭 異 飯 店</h1>
      <div class="objective" id="objective">目標：蒐集 2 把鑰匙 🔑，兩人一起走到綠色出口逃離飯店</div>
      <div class="status-bar">
        <div class="player-stat">
          <b id="p1label">玩家一</b> HP
          <div class="bar-bg"><div class="bar-fill" id="p1hp" style="width:100%"></div></div>
          理智
          <div class="bar-bg"><div class="bar-fill sanity" id="p1san" style="width:100%"></div></div>
        </div>
        <div class="player-stat">
          <b id="p2label">玩家二</b> HP
          <div class="bar-bg"><div class="bar-fill" id="p2hp" style="width:100%"></div></div>
          理智
          <div class="bar-bg"><div class="bar-fill sanity" id="p2san" style="width:100%"></div></div>
        </div>
      </div>
      <div id="canvasWrap"><canvas id="cv" width="704" height="286"></canvas></div>
      <div class="controls-hint">
        <span>玩家一移動：W A S D</span>
        <span>玩家二移動：方向鍵 ↑ ↓ ← →</span>
      </div>
      <div class="item-list" id="items"></div>
      <div id="log"></div>
    </div>

    <div id="screen-end" class="hidden center">
      <h1 id="endTitle">結局</h1>
      <p id="endText" style="color:#c8a;"></p>
      <button class="full" id="restartBtn">重 新 開 始</button>
    </div>

  </div>
</div>
<div id="jumpscare" class="hidden">它 就 在 你 身 後</div>

<script>
(function(){
  const T = 22; // tile size
  const MAP = [
    "################################",
    "#..............................#",
    "#.######.######..######..#####.#",
    "#.#K...#.#....#..#..K.#..#...#.#",
    "#.#....#.#....#..#....#..#...#.#",
    "#.#....#.#....#..#....#..#...#.#",
    "#.##.###.##.###M.##.###..##.##.#",
    "#......####...#####..#####.....#",
    "#......#.##...##.##..##.##....E#",
    "#.............................E#",
    "#..............................#",
    "#..............................#",
    "################################"
  ];
  const ROWS = MAP.length, COLS = MAP[0].length;

  function tileAt(c, r) {
    if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return '#';
    return MAP[r][c];
  }
  function isWalkable(c, r) {
    const t = tileAt(c, r);
    return t !== '#';
  }

  // find spawn / item positions from map
  let p1Start = {c:1,r:1}, p2Start = {c:COLS-2,r:1};
  let keyPositions = [];
  let exitTiles = [];
  for (let r=0;r<ROWS;r++){
    for (let c=0;c<COLS;c++){
      const ch = MAP[r][c];
      if (ch === 'K') keyPositions.push({c,r,taken:false});
      if (ch === 'E') exitTiles.push({c,r});
      if (ch === 'M') S_monsterStart = {c,r};
    }
  }
  var S_monsterStart = S_monsterStart || {c: Math.floor(COLS/2), r: Math.floor(ROWS/2)};

  const S = {
    p1: {name:'玩家一', hp:100, san:100, c:p1Start.c, r:p1Start.r, hitUntil:0, color:'#3a7bd5'},
    p2: {name:'玩家二', hp:100, san:100, c:p2Start.c, r:p2Start.r, hitUntil:0, color:'#3aa15a'},
    keysCollected: 0,
    inventory: [],
    monster: {c:S_monsterStart.c, r:S_monsterStart.r},
    started: false,
    over: false
  };

  const $ = id => document.getElementById(id);
  const logEl = $('log');
  function log(html, cls) {
    const line = document.createElement('div');
    if (cls) line.className = cls;
    line.innerHTML = html;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }
  function clamp(v){ return Math.max(0, Math.min(100, v)); }

  function updateStatus() {
    $('p1label').textContent = S.p1.name;
    $('p2label').textContent = S.p2.name;
    $('p1hp').style.width = S.p1.hp + '%';
    $('p2hp').style.width = S.p2.hp + '%';
    $('p1san').style.width = S.p1.san + '%';
    $('p2san').style.width = S.p2.san + '%';
    $('items').innerHTML = S.inventory.map(i => `<span>${i}</span>`).join('');
    checkGameOver();
  }

  function damage(p, hp, san) {
    p.hp = clamp(p.hp - hp);
    p.san = clamp(p.san - san);
  }

  function checkGameOver() {
    if (S.over) return;
    if (S.p1.hp <= 0 || S.p2.hp <= 0) {
      S.over = true;
      endGame(false, `${S.p1.hp<=0 ? S.p1.name : S.p2.name} 倒在了冰冷的地板上，再也沒有起來。飯店，又多了一位「房客」。`);
    } else if (S.p1.san <= 0 || S.p2.san <= 0) {
      S.over = true;
      endGame(false, `${S.p1.san<=0 ? S.p1.name : S.p2.name} 的理智徹底崩潰，開始對著空氣尖叫、傻笑……最終消失在無盡的走廊深處。`);
    }
  }

  function endGame(win, customText) {
    S.over = true;
    S.started = false;
    $('screen-game').classList.add('hidden');
    $('screen-end').classList.remove('hidden');
    if (win) {
      $('endTitle').textContent = '生 還';
      $('endText').textContent = `${S.p1.name} 與 ${S.p2.name} 一起走出了飯店大門。回頭望去，那棟建築彷彿從未存在過一般靜靜矗立在雨夜中。你們活著逃了出來——但飯店裡的「它」，似乎已經記住了你們的臉。`;
    } else {
      $('endTitle').textContent = '死 亡 結 局';
      $('endText').textContent = customText || '你們沒能活著離開這間飯店。';
    }
  }

  function jumpscare(cb) {
    const js = $('jumpscare');
    js.classList.remove('hidden');
    setTimeout(() => { js.classList.add('hidden'); if (cb) cb(); }, 900);
  }

  // ---------- Input ----------
  const keys = {};
  window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
  window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

  let p1Cooldown = 0, p2Cooldown = 0;
  const MOVE_DELAY = 140;

  function tryMove(p, dc, dr) {
    const nc = p.c + dc, nr = p.r + dr;
    if (isWalkable(nc, nr)) { p.c = nc; p.r = nr; }
  }

  function handleMovement(dt, now) {
    if (now > p1Cooldown) {
      let moved = false;
      if (keys['w']) { tryMove(S.p1, 0, -1); moved = true; }
      else if (keys['s']) { tryMove(S.p1, 0, 1); moved = true; }
      else if (keys['a']) { tryMove(S.p1, -1, 0); moved = true; }
      else if (keys['d']) { tryMove(S.p1, 1, 0); moved = true; }
      if (moved) p1Cooldown = now + MOVE_DELAY;
    }
    if (now > p2Cooldown) {
      let moved = false;
      if (keys['arrowup']) { tryMove(S.p2, 0, -1); moved = true; }
      else if (keys['arrowdown']) { tryMove(S.p2, 0, 1); moved = true; }
      else if (keys['arrowleft']) { tryMove(S.p2, -1, 0); moved = true; }
      else if (keys['arrowright']) { tryMove(S.p2, 1, 0); moved = true; }
      if (moved) p2Cooldown = now + MOVE_DELAY;
    }
  }

  function checkPickups() {
    keyPositions.forEach(k => {
      if (k.taken) return;
      const onIt = (S.p1.c === k.c && S.p1.r === k.r) || (S.p2.c === k.c && S.p2.r === k.r);
      if (onIt) {
        k.taken = true;
        S.keysCollected++;
        S.inventory.push('🔑 鑰匙 ' + S.keysCollected);
        log('<span class="clue">你們找到了一把鑰匙！(' + S.keysCollected + '/2)</span>', 'clue');
        updateStatus();
      }
    });
  }

  function checkWin() {
    if (S.keysCollected < 2) return;
    const p1OnExit = exitTiles.some(t => t.c===S.p1.c && t.r===S.p1.r);
    const p2OnExit = exitTiles.some(t => t.c===S.p2.c && t.r===S.p2.r);
    if (p1OnExit && p2OnExit) {
      log('<span class="win">兩人一起衝出了出口！</span>', 'win');
      updateStatus();
      endGame(true);
    }
  }

  // ---------- Monster AI ----------
  let lastMonsterMove = 0;
  const MONSTER_INTERVAL = 420;
  function moveMonster(now) {
    if (now - lastMonsterMove < MONSTER_INTERVAL) return;
    lastMonsterMove = now;
    const m = S.monster;
    const d1 = Math.abs(m.c-S.p1.c)+Math.abs(m.r-S.p1.r);
    const d2 = Math.abs(m.c-S.p2.c)+Math.abs(m.r-S.p2.r);
    const target = d1 <= d2 ? S.p1 : S.p2;
    const options = [];
    if (target.c > m.c) options.push([1,0]);
    if (target.c < m.c) options.push([-1,0]);
    if (target.r > m.r) options.push([0,1]);
    if (target.r < m.r) options.push([0,-1]);
    // shuffle preference a bit for wandering
    if (Math.random() < 0.25) options.reverse();
    let moved = false;
    for (const [dc,dr] of options) {
      if (isWalkable(m.c+dc, m.r+dr)) { m.c+=dc; m.r+=dr; moved = true; break; }
    }
    if (!moved) {
      const dirs = [[1,0],[-1,0],[0,1],[0,-1]].filter(([dc,dr]) => isWalkable(m.c+dc,m.r+dr));
      if (dirs.length) { const [dc,dr] = dirs[Math.floor(Math.random()*dirs.length)]; m.c+=dc; m.r+=dr; }
    }
  }

  function checkMonsterCollision(now) {
    [S.p1, S.p2].forEach(p => {
      if (p.c === S.monster.c && p.r === S.monster.r && now > p.hitUntil) {
        p.hitUntil = now + 1800;
        damage(p, 20, 18);
        log('<span class="danger">「它」抓住了 ' + p.name + '！</span>', 'danger');
        updateStatus();
        jumpscare();
        // knockback monster to a random floor tile
        let tries = 0;
        while (tries < 30) {
          const rc = Math.floor(Math.random()*COLS), rr = Math.floor(Math.random()*ROWS);
          if (isWalkable(rc, rr)) { S.monster.c = rc; S.monster.r = rr; break; }
          tries++;
        }
      }
    });
  }

  // ambient sanity drain
  let lastAmbient = 0;
  function ambientDrain(now) {
    if (now - lastAmbient < 4000) return;
    lastAmbient = now;
    const d1 = Math.abs(S.monster.c-S.p1.c)+Math.abs(S.monster.r-S.p1.r);
    const d2 = Math.abs(S.monster.c-S.p2.c)+Math.abs(S.monster.r-S.p2.r);
    damage(S.p1, 0, d1 <= 3 ? 6 : 1);
    damage(S.p2, 0, d2 <= 3 ? 6 : 1);
    updateStatus();
  }

  // ---------- Render ----------
  const cv = $('cv');
  const ctx = cv.getContext('2d');

  function draw() {
    ctx.clearRect(0,0,cv.width,cv.height);
    for (let r=0;r<ROWS;r++){
      for (let c=0;c<COLS;c++){
        const ch = MAP[r][c];
        let color = '#170c0c';
        if (ch === '#') color = '#3a1c1c';
        else if (ch === 'E') color = '#123a1c';
        ctx.fillStyle = color;
        ctx.fillRect(c*T, r*T, T, T);
        ctx.strokeStyle = 'rgba(0,0,0,0.25)';
        ctx.strokeRect(c*T, r*T, T, T);
      }
    }
    // keys
    keyPositions.forEach(k => {
      if (k.taken) return;
      ctx.fillStyle = '#e8c84a';
      ctx.beginPath();
      ctx.arc(k.c*T+T/2, k.r*T+T/2, 9, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#3a2a00';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('K', k.c*T+T/2, k.r*T+T/2+3);
    });
    // exit label
    exitTiles.forEach(t => {
      ctx.fillStyle = '#8fe0a0';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('出口', t.c*T+T/2, t.r*T+T/2+4);
    });
    // monster
    ctx.fillStyle = '#900';
    ctx.beginPath();
    ctx.arc(S.monster.c*T+T/2, S.monster.r*T+T/2, 13, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '14px sans-serif';
    ctx.fillText('👻', S.monster.c*T+T/2, S.monster.r*T+T/2+5);

    // players
    drawPlayer(S.p1, 'P1');
    drawPlayer(S.p2, 'P2');
  }

  function drawPlayer(p, label) {
    const x = p.c*T+T/2, y = p.r*T+T/2;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(x, y, 13, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(label, x, y+4);
  }

  // ---------- Game loop ----------
  let lastTime = 0;
  function loop(ts) {
    if (!S.started) return;
    const now = ts;
    handleMovement(ts-lastTime, now);
    lastTime = ts;
    moveMonster(now);
    checkPickups();
    checkMonsterCollision(now);
    checkWin();
    ambientDrain(now);
    draw();
    if (S.started) requestAnimationFrame(loop);
  }

  // ---------- Init ----------
  $('startBtn').onclick = () => {
    const n1 = $('p1name').value.trim();
    const n2 = $('p2name').value.trim();
    if (n1) S.p1.name = n1;
    if (n2) S.p2.name = n2;
    $('screen-intro').classList.add('hidden');
    $('screen-game').classList.remove('hidden');
    updateStatus();
    log('<span class="system">' + S.p1.name + ' 與 ' + S.p2.name + ' 推開了飯店厚重的大門……用 WASD 與方向鍵移動角色，蒐集鑰匙並一起逃到出口！</span>', 'system');
    S.started = true;
    requestAnimationFrame(loop);
  };

  $('restartBtn').onclick = () => location.reload();

})();
</script>
</body>
</html>
