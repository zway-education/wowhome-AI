<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="author" content="AI未來創作營隊">
<title>體感跑道大冒險</title>
<style>
  html,body{margin:0;height:100%;background:#1a1c2c;overflow:hidden;touch-action:none;
    -webkit-user-select:none;user-select:none;font-family:'PingFang TC','Microsoft JhengHei',sans-serif}
  canvas{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
  #camPreview{position:absolute;width:120px;height:90px;border-radius:10px;border:2px solid #ffcd75;
    opacity:.9;object-fit:cover;transform:scaleX(-1);z-index:5;pointer-events:none;display:none}
  #muteBtn{position:absolute;width:44px;height:44px;border-radius:50%;background:rgba(26,28,44,.7);
    border:2px solid #41a6f6;color:#fcfcfc;font-size:20px;z-index:6;cursor:pointer}
</style>
</head>
<body>
<video id="camVideo" autoplay playsinline muted style="display:none"></video>
<canvas id="camWork" style="display:none"></canvas>
<img id="camPreview" alt="">
<button id="muteBtn">🔊</button>
<canvas id="game"></canvas>
<script>
'use strict';
// ===== 基本設定 =====
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const LANES = 4;
const LANE_W = GAME_W / LANES;
const PALETTE = { bg:'#1a1c2c', purple:'#5d275d', red:'#b13e53', orange:'#ef7d57', yellow:'#ffcd75', cyan:'#41a6f6', white:'#fcfcfc' };

function resize(){
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale;
  const r = canvas.getBoundingClientRect();
  camPreview.style.left = (r.left + 10) + 'px';
  camPreview.style.top = (r.top + 10) + 'px';
  muteBtn.style.left = (r.right - 54) + 'px';
  muteBtn.style.top = (r.top + 10) + 'px';
}
addEventListener('resize', resize);

// ===== 輸入：鍵盤 / 觸控 / 攝影機動作 三合一，統一成「目標跑道」 =====
const input = { targetLane: 1, source:'keyboard' };
addEventListener('keydown', e => {
  if(e.code === 'ArrowLeft' || e.code === 'KeyA'){ input.targetLane = Math.max(0, input.targetLane - 1); input.source='keyboard'; }
  else if(e.code === 'ArrowRight' || e.code === 'KeyD'){ input.targetLane = Math.min(LANES-1, input.targetLane + 1); input.source='keyboard'; }
  else if(e.code === 'Space' || e.code === 'Enter'){ input.actionBuffer = 0.12; }
});
function laneFromX(x){ return Math.max(0, Math.min(LANES-1, Math.floor(x / canvas._scale / LANE_W))); }
canvas.addEventListener('pointerdown', e => {
  const r = canvas.getBoundingClientRect();
  input.targetLane = laneFromX(e.clientX - r.left);
  input.source = 'touch';
  input.actionBuffer = 0.12;
});

// ===== 音效 =====
let AC = null;
function audio(){ if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); return AC; }
let muted = false;
const muteBtn = document.getElementById('muteBtn');
muteBtn.addEventListener('pointerdown', e => { e.stopPropagation(); muted = !muted; muteBtn.textContent = muted ? '🔇' : '🔊'; audio(); });
addEventListener('pointerdown', audio, { once:true });
addEventListener('keydown', audio, { once:true });
function beep(freq = 440, dur = 0.1, type = 'square', vol = 0.15, slide = 0){
  if(muted) return;
  const ac = audio(); if(!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, ac.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), ac.currentTime + dur);
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g).connect(ac.destination);
  o.start(); o.stop(ac.currentTime + dur);
}

// ===== 攝影機動作偵測（零外部函式庫：逐欄像素差異找動作重心）=====
const camVideo = document.getElementById('camVideo');
const camWork = document.getElementById('camWork');
const camPreview = document.getElementById('camPreview');
const camCtx = camWork.getContext('2d', { willReadFrequently:true });
const CAM_W = 64, CAM_H = 48;
camWork.width = CAM_W; camWork.height = CAM_H;
let camReady = false, camPrevFrame = null, camLane = 1, camMotionAmount = 0;

function startCamera(){
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
  navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user', width:320, height:240 }, audio:false })
    .then(stream => {
      camVideo.srcObject = stream;
      camPreview.src = '';
      camPreview.style.display = 'block';
      camReady = true;
    })
    .catch(() => { camReady = false; });
}

function sampleCamera(){
  if(!camReady || camVideo.readyState < 2) return;
  camCtx.drawImage(camVideo, 0, 0, CAM_W, CAM_H);
  const frame = camCtx.getImageData(0, 0, CAM_W, CAM_H).data;
  camPreview.src = camWork.toDataURL();
  if(camPrevFrame){
    const colSum = new Float32Array(CAM_W);
    let total = 0;
    for(let y = 0; y < CAM_H; y++){
      for(let x = 0; x < CAM_W; x++){
        const i = (y * CAM_W + x) * 4;
        const d = Math.abs(frame[i] - camPrevFrame[i]) + Math.abs(frame[i+1] - camPrevFrame[i+1]) + Math.abs(frame[i+2] - camPrevFrame[i+2]);
        if(d > 45){ colSum[x] += d; total += d; }
      }
    }
    if(total > CAM_W * CAM_H * 3){
      let weighted = 0;
      for(let x = 0; x < CAM_W; x++) weighted += x * colSum[x];
      const centroid = weighted / total;
      // 鏡像：攝影機畫面已左右翻轉顯示，玩家往左移動時 centroid 偏低對應畫面右側
      const norm = 1 - (centroid / CAM_W);
      camLane = Math.max(0, Math.min(LANES-1, Math.floor(norm * LANES)));
      camMotionAmount = Math.min(1, total / (CAM_W * CAM_H * 60));
    } else {
      camMotionAmount *= 0.9;
    }
  }
  camPrevFrame = frame;
}

// ===== 遊戲物件 =====
const player = { lane:1, x:0, y:GAME_H - 90, w:56, h:64, sx:1, sy:1, hp:3, invuln:0 };
let entities = [];
let score = 0, best = Number(localStorage.getItem('体感跑道_best') || 0);
let spawnTimer = 0, spawnInterval = 1.1, gameTime = 0;
let shake = 0, freeze = 0;
const parts = [];
function burst(x, y, color, n = 12, speed = 220){
  for(let i = 0; i < n; i++){
    const a = Math.random() * Math.PI * 2, s = speed * (0.3 + Math.random() * 0.7);
    parts.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:0.5, color });
  }
}
function updateParts(dt){
  for(const p of parts){ p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 600*dt; p.life -= dt; }
  for(let i = parts.length-1; i>=0; i--) if(parts[i].life <= 0) parts.splice(i,1);
}
function drawParts(){
  for(const p of parts){
    ctx.globalAlpha = Math.max(0, p.life * 2);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-3, p.y-3, 6, 6);
  }
  ctx.globalAlpha = 1;
}

const floaters = [];
function addFloater(x, y, text, color){
  floaters.push({ x, y, text, color, life:0.6 });
}
function updateFloaters(dt){
  for(const f of floaters){ f.y -= 40*dt; f.life -= dt; }
  for(let i=floaters.length-1;i>=0;i--) if(floaters[i].life<=0) floaters.splice(i,1);
}
function drawFloaters(){
  ctx.textAlign = 'center'; ctx.font = 'bold 22px sans-serif';
  for(const f of floaters){
    ctx.globalAlpha = Math.max(0, f.life / 0.6);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

function laneX(lane){ return lane * LANE_W + LANE_W / 2; }

function spawnEntity(){
  const lane = Math.floor(Math.random() * LANES);
  const isBad = Math.random() < 0.35;
  entities.push({
    lane, x: laneX(lane), y: -30,
    vy: 180 + Math.min(220, gameTime * 6),
    r: 22, bad:isBad, wob: Math.random()*Math.PI*2, dead:false
  });
}

function drawPlayer(){
  ctx.save();
  ctx.translate(player.x, player.y + player.h);
  ctx.scale(player.sx, player.sy);
  const flash = player.invuln > 0 && Math.floor(player.invuln*20)%2===0;
  ctx.fillStyle = flash ? '#ffffff' : PALETTE.cyan;
  ctx.beginPath();
  ctx.roundRect(-player.w/2, -player.h, player.w, player.h, 14);
  ctx.fill();
  // 眼睛
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(-10, -player.h+24, 9, 11, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(10, -player.h+24, 9, 11, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.ellipse(-10, -player.h+26, 4, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(10, -player.h+26, 4, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // 腳下陰影
  ctx.fillStyle = 'rgba(0,0,0,.3)';
  ctx.beginPath(); ctx.ellipse(player.x, player.y + player.h + 6, 24, 7, 0, 0, Math.PI*2); ctx.fill();
}

function drawEntity(e){
  const wob = Math.sin(e.wob) * 3;
  if(!e.bad){
    ctx.fillStyle = PALETTE.yellow;
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const a1 = -Math.PI/2 + i*(Math.PI*2/5);
      const a2 = a1 + Math.PI/5;
      const r1 = e.r, r2 = e.r*0.45;
      if(i===0) ctx.moveTo(e.x + Math.cos(a1)*r1, e.y + wob + Math.sin(a1)*r1);
      else ctx.lineTo(e.x + Math.cos(a1)*r1, e.y + wob + Math.sin(a1)*r1);
      ctx.lineTo(e.x + Math.cos(a2)*r2, e.y + wob + Math.sin(a2)*r2);
    }
    ctx.closePath(); ctx.fill();
  } else {
    ctx.fillStyle = PALETTE.purple;
    ctx.beginPath(); ctx.arc(e.x, e.y + wob, e.r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = PALETTE.red; ctx.lineWidth = 4;
    for(let i=0;i<8;i++){
      const a = i*(Math.PI/4);
      ctx.beginPath();
      ctx.moveTo(e.x + Math.cos(a)*e.r, e.y+wob + Math.sin(a)*e.r);
      ctx.lineTo(e.x + Math.cos(a)*(e.r+8), e.y+wob + Math.sin(a)*(e.r+8));
      ctx.stroke();
    }
  }
}

function drawLanes(){
  for(let i=0;i<LANES;i++){
    ctx.fillStyle = i%2===0 ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.05)';
    ctx.fillRect(i*LANE_W, 0, LANE_W, GAME_H);
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 2;
  for(let i=1;i<LANES;i++){ ctx.beginPath(); ctx.moveTo(i*LANE_W,0); ctx.lineTo(i*LANE_W,GAME_H); ctx.stroke(); }
}

function drawHUD(){
  ctx.textAlign = 'left';
  ctx.fillStyle = PALETTE.white; ctx.font = 'bold 28px sans-serif';
  ctx.fillText('分數 ' + score, 20, 40);
  ctx.font = '18px sans-serif';
  ctx.fillText('最佳 ' + best, 20, 66);
  for(let i=0;i<3;i++){
    ctx.fillStyle = i < player.hp ? PALETTE.red : 'rgba(255,255,255,0.15)';
    ctx.beginPath(); ctx.arc(GAME_W - 30 - i*30, 30, 10, 0, Math.PI*2); ctx.fill();
  }
  if(camReady){
    ctx.textAlign = 'right'; ctx.font = '14px sans-serif';
    ctx.fillStyle = camMotionAmount > 0.15 ? PALETTE.cyan : 'rgba(255,255,255,0.4)';
    ctx.fillText(camMotionAmount > 0.15 ? '● 偵測到動作' : '在鏡頭前左右移動身體', GAME_W - 10, GAME_H - 14);
  }
}

// ===== 狀態機 =====
let state;
function setState(s){ state = s; if(s.enter) s.enter(); }

const menuState = {
  update(dt){
    if(input.actionBuffer > 0){ input.actionBuffer = 0; setState(playState); }
    sampleCamera();
  },
  draw(){
    ctx.fillStyle = PALETTE.bg; ctx.fillRect(0,0,GAME_W,GAME_H);
    drawLanes();
    ctx.textAlign = 'center';
    ctx.fillStyle = PALETTE.white; ctx.font = 'bold 46px sans-serif';
    ctx.fillText('體感跑道大冒險', GAME_W/2, 150);
    ctx.font = '22px sans-serif'; ctx.fillStyle = PALETTE.yellow;
    ctx.fillText('接住金色星星，閃開紫色炸彈', GAME_W/2, 200);
    ctx.font = '18px sans-serif'; ctx.fillStyle = PALETTE.cyan;
    ctx.fillText('🎥 站在鏡頭前，身體左右移動控制跑道', GAME_W/2, 260);
    ctx.fillText('💻 電腦：← → 方向鍵　📱 平板：點左右跑道', GAME_W/2, 290);
    ctx.font = 'bold 24px sans-serif'; ctx.fillStyle = PALETTE.white;
    ctx.fillText('按空白鍵 / 點擊螢幕開始', GAME_W/2, 360);
    if(!camReady){
      ctx.font = '16px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillText('（尚未偵測到攝影機，仍可用鍵盤/觸控遊玩）', GAME_W/2, 400);
    }
  }
};

const playState = {
  enter(){
    player.lane = 1; player.x = laneX(1); player.hp = 3; player.invuln = 0;
    entities = []; score = 0; spawnTimer = 0; spawnInterval = 1.1; gameTime = 0;
    input.targetLane = 1;
  },
  update(dt){
    if(freeze > 0){ freeze -= dt; return; }
    gameTime += dt;
    sampleCamera();
    if(camReady && camMotionAmount > 0.15) input.targetLane = camLane;

    const targetX = laneX(input.targetLane);
    player.x += (targetX - player.x) * (1 - Math.pow(0.001, dt));
    player.sx += (1 - player.sx) * 12 * dt; player.sy += (1 - player.sy) * 12 * dt;
    if(player.invuln > 0) player.invuln -= dt;

    spawnTimer -= dt;
    spawnInterval = Math.max(0.45, 1.1 - gameTime * 0.012);
    if(spawnTimer <= 0){ spawnEntity(); spawnTimer = spawnInterval; }

    for(const e of entities){
      e.y += e.vy * dt; e.wob += dt * 4;
      const laneCloseX = Math.abs(e.x - player.x) < LANE_W * 0.5;
      if(!e.dead && laneCloseX && e.y > player.y - 10 && e.y < player.y + player.h){
        e.dead = true;
        if(!e.bad){
          score += 10; beep(988,0.08,'square',0.14); setTimeout(()=>beep(1319,0.15,'square',0.12),80);
          burst(e.x, e.y, PALETTE.yellow, 14); addFloater(e.x, e.y, '+10', PALETTE.yellow);
          player.sx = 1.25; player.sy = 0.8;
        } else if(player.invuln <= 0){
          player.hp -= 1; player.invuln = 1.1;
          shake = 6; freeze = 0.06; beep(220,0.25,'sawtooth',0.2,-150);
          burst(e.x, e.y, PALETTE.red, 18); addFloater(e.x, e.y, '-1', PALETTE.red);
          player.sx = 0.75; player.sy = 1.3;
          if(player.hp <= 0){ shake = 10; freeze = 0.15; setState(gameOverState); }
        }
      }
      if(e.y > GAME_H + 40) e.dead = true;
    }
    entities = entities.filter(e => !e.dead);
    if(entities.length > 200) entities.length = 200;

    shake *= Math.pow(0.001, dt);
    updateParts(dt); updateFloaters(dt);
  },
  draw(){
    ctx.save();
    ctx.translate((Math.random()*2-1)*shake, (Math.random()*2-1)*shake);
    ctx.fillStyle = PALETTE.bg; ctx.fillRect(0,0,GAME_W,GAME_H);
    drawLanes();
    for(const e of entities) drawEntity(e);
    drawPlayer();
    drawParts(); drawFloaters();
    ctx.restore();
    drawHUD();
  }
};

const gameOverState = {
  enter(){
    this.t = 0;
    best = Math.max(best, score);
    localStorage.setItem('体感跑道_best', String(best));
    beep(660,0.12,'square',0.15); setTimeout(()=>beep(494,0.2,'square',0.12),120);
  },
  update(dt){
    this.t += dt;
    sampleCamera();
    if(this.t > 0.5 && input.actionBuffer > 0){ input.actionBuffer = 0; setState(playState); }
  },
  draw(){
    playState.draw();
    ctx.fillStyle = 'rgba(0,0,0,.55)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.textAlign = 'center';
    ctx.fillStyle = PALETTE.white; ctx.font = 'bold 40px sans-serif';
    ctx.fillText('再挑戰一次！', GAME_W/2, 220);
    ctx.font = '26px sans-serif'; ctx.fillStyle = PALETTE.yellow;
    ctx.fillText('本場分數 ' + score + '　最佳 ' + best, GAME_W/2, 270);
    ctx.font = 'bold 22px sans-serif'; ctx.fillStyle = PALETTE.cyan;
    ctx.fillText('按空白鍵 / 點擊螢幕重新開始', GAME_W/2, 330);
  }
};

// 額外：任意時刻點擊/按空白也視為動作觸發（menu/gameover）
addEventListener('keydown', e => { if(e.code==='Space'||e.code==='Enter') input.actionBuffer = 0.12; });
canvas.addEventListener('pointerdown', () => { input.actionBuffer = 0.12; });

// ===== 主迴圈 =====
const STEP = 1/60;
let last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while(acc >= STEP){
    if(input.actionBuffer !== undefined) input.actionBuffer = Math.max(0, input.actionBuffer - STEP);
    state.update(STEP);
    acc -= STEP;
  }
  state.draw();
}

resize();
input.actionBuffer = 0;
setState(menuState);
requestAnimationFrame(frame);
startCamera();
</script>
</body>
</html>
