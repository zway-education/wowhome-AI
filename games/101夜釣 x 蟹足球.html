<title>101夜釣 x 蟹足球</title>
<style>
:root{
  --ink:#0b1730;
  --ink-2:#122048;
  --panel:#0e1a3a;
  --panel-2:#16254d;
  --gold:#ffb627;
  --gold-2:#ffd77a;
  --teal:#2ec4b6;
  --coral:#ff6b5e;
  --cream:#f3ecd9;
  --dim:#8fa0c9;
  --led-off:#20305f;
}
:root[data-theme="light"]{
  --ink:#eef1fb;
  --ink-2:#dde3f6;
  --panel:#ffffff;
  --panel-2:#f2f4fc;
  --cream:#1c2440;
  --dim:#5b6790;
  --led-off:#c9d1ec;
}
@media (prefers-color-scheme: light){
  :root:not([data-theme="dark"]){
    --ink:#eef1fb;
    --ink-2:#dde3f6;
    --panel:#ffffff;
    --panel-2:#f2f4fc;
    --cream:#1c2440;
    --dim:#5b6790;
    --led-off:#c9d1ec;
  }
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  min-height:100vh;
  background:
    radial-gradient(ellipse at 20% -10%, var(--ink-2), transparent 60%),
    var(--ink);
  color:var(--cream);
  font-family: "Trebuchet MS", "Segoe UI", ui-sans-serif, system-ui, sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px 14px;
  overflow-x:hidden;
}

.cabinet{
  width:min(920px, 100%);
  background:linear-gradient(180deg, var(--panel), var(--panel-2));
  border-radius:28px;
  padding:22px 22px 26px;
  box-shadow:
    0 30px 60px -20px rgba(0,0,0,0.55),
    inset 0 0 0 2px rgba(255,255,255,0.04);
  border:1px solid rgba(255,183,39,0.15);
}

.marquee{
  text-align:center;
  margin-bottom:14px;
}
.marquee h1{
  font-family: "Arial Black", "Segoe UI Black", Impact, sans-serif;
  font-size:clamp(1.5rem, 4vw, 2.3rem);
  letter-spacing:0.04em;
  margin:0;
  text-wrap:balance;
  background:linear-gradient(90deg, var(--gold), var(--coral) 55%, var(--teal));
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,0.3));
}
.marquee p{
  margin:6px 0 0;
  color:var(--dim);
  font-size:0.85rem;
  letter-spacing:0.08em;
  text-transform:uppercase;
}

.tabs{
  display:flex;
  gap:10px;
  justify-content:center;
  margin:16px 0 14px;
}
.tab-btn{
  font:inherit;
  font-weight:700;
  letter-spacing:0.03em;
  padding:10px 20px;
  border-radius:999px;
  border:2px solid transparent;
  cursor:pointer;
  background:var(--led-off);
  color:var(--dim);
  transition:transform 0.15s ease, background 0.2s ease, color 0.2s ease, border-color .2s ease;
}
.tab-btn:hover{transform:translateY(-1px);}
.tab-btn:focus-visible{outline:3px solid var(--gold-2); outline-offset:2px;}
.tab-btn.active{
  color:var(--ink);
  background:linear-gradient(135deg, var(--gold), var(--gold-2));
  border-color:rgba(0,0,0,0.1);
  box-shadow:0 6px 16px -6px rgba(255,183,39,0.6);
}
.tab-btn.crab.active{
  background:linear-gradient(135deg, var(--teal), #7fe6da);
  box-shadow:0 6px 16px -6px rgba(46,196,182,0.6);
}

.screen-wrap{
  position:relative;
  border-radius:18px;
  padding:10px;
  background:#04070f;
  box-shadow:inset 0 0 0 3px rgba(255,255,255,0.05), inset 0 0 40px rgba(0,0,0,0.6);
}
canvas{
  display:block;
  width:100%;
  height:auto;
  border-radius:12px;
  background:#04070f;
  touch-action:none;
}

.hud{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:12px;
  gap:12px;
  flex-wrap:wrap;
}
.led{
  font-family: "Consolas", "SFMono-Regular", Menlo, monospace;
  font-variant-numeric:tabular-nums;
  background:#04070f;
  border-radius:10px;
  padding:8px 14px;
  color:var(--gold-2);
  font-size:0.95rem;
  letter-spacing:0.05em;
  box-shadow:inset 0 0 0 1px rgba(255,183,39,0.25);
}
.led b{color:var(--cream); font-weight:700;}

.controls-hint{
  text-align:center;
  color:var(--dim);
  font-size:0.8rem;
  margin-top:10px;
  letter-spacing:0.02em;
}

.overlay-msg{
  position:absolute;
  inset:10px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
  background:rgba(4,7,15,0.82);
  border-radius:12px;
  text-align:center;
  padding:20px;
}
.overlay-msg.hidden{display:none;}
.overlay-msg h2{
  margin:0;
  font-family:"Arial Black", Impact, sans-serif;
  font-size:1.6rem;
  color:var(--gold-2);
}
.overlay-msg p{margin:0; color:var(--dim); max-width:32ch; line-height:1.5;}
.start-btn{
  font:inherit;
  font-weight:800;
  letter-spacing:0.04em;
  padding:12px 28px;
  border-radius:999px;
  border:none;
  cursor:pointer;
  background:linear-gradient(135deg, var(--coral), var(--gold));
  color:#1c1000;
  box-shadow:0 8px 20px -6px rgba(255,107,94,0.6);
}
.start-btn:hover{filter:brightness(1.08);}
.start-btn:focus-visible{outline:3px solid var(--gold-2); outline-offset:2px;}

.panel{display:none;}
.panel.active{display:block;}

.touchpad{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
  margin-top:14px;
}
.dpad{
  display:grid;
  grid-template-columns:repeat(3, 46px);
  grid-template-rows:repeat(3, 46px);
  gap:4px;
}
.dpad button{
  border:none;
  border-radius:10px;
  background:var(--led-off);
  color:var(--cream);
  font-size:1.1rem;
  cursor:pointer;
  touch-action:none;
  user-select:none;
}
.dpad button:active, .dpad button.pressed{
  background:var(--teal);
  color:#04070f;
}
.dpad button:focus-visible{outline:3px solid var(--gold-2);}
.dpad .up{grid-column:2; grid-row:1;}
.dpad .left{grid-column:1; grid-row:2;}
.dpad .right{grid-column:3; grid-row:2;}
.dpad .down{grid-column:2; grid-row:3;}
.kick-btn{
  font:inherit;
  font-weight:800;
  letter-spacing:0.03em;
  padding:16px 26px;
  border-radius:16px;
  border:none;
  cursor:pointer;
  background:linear-gradient(135deg, var(--coral), var(--gold));
  color:#1c1000;
  touch-action:none;
  user-select:none;
  box-shadow:0 8px 18px -6px rgba(255,107,94,0.55);
}
.kick-btn:active, .kick-btn.pressed{filter:brightness(0.9); transform:translateY(1px);}
.kick-btn:focus-visible{outline:3px solid var(--gold-2); outline-offset:2px;}

@media (prefers-reduced-motion: reduce){
  * { animation-duration: 0.01ms !important; }
}
</style>

<div class="cabinet">
  <div class="marquee">
    <h1>101 夜釣戰隊 × 蟹將盃足球</h1>
    <p>Taipei 101 Mecha Angler &amp; Crab League Cup</p>
  </div>

  <div class="tabs" role="tablist">
    <button class="tab-btn fish active" id="tabFish" role="tab" aria-selected="true">🎣 大樓夜釣</button>
    <button class="tab-btn crab" id="tabCrab" role="tab" aria-selected="false">⚽ 螃蟹足球</button>
  </div>

  <div class="screen-wrap">
    <div class="panel active" id="panelFish">
      <canvas id="fishCanvas" width="820" height="480" aria-label="變形金剛在101大樓上釣魚的遊戲畫面"></canvas>
      <div class="overlay-msg" id="fishOverlay">
        <h2>準備出勤，鐵皮特工！</h2>
        <p>左右移動釣線瞄準魚群，按下「拋線」讓魚鉤垂降，卡進魚群範圍時鬆手收線即可捕獲。60 秒內衝出最高分。</p>
        <button class="start-btn" id="fishStart">開始釣魚</button>
      </div>
    </div>
    <div class="panel" id="panelCrab">
      <canvas id="crabCanvas" width="820" height="480" aria-label="螃蟹足球場踢球遊戲畫面"></canvas>
      <div class="overlay-msg" id="crabOverlay">
        <h2>哨聲響起！</h2>
        <p>方向鍵移動你的紅螃蟹，靠近球自動盤帶，按空白鍵射門。60 秒內比對手多進球獲勝。</p>
        <button class="start-btn" id="crabStart">開賽</button>
      </div>
    </div>
  </div>

  <div class="touchpad" id="crabTouchpad" style="display:none;">
    <div class="dpad" aria-label="移動控制">
      <button class="up" data-key="ArrowUp" aria-label="上">▲</button>
      <button class="left" data-key="ArrowLeft" aria-label="左">◀</button>
      <button class="right" data-key="ArrowRight" aria-label="右">▶</button>
      <button class="down" data-key="ArrowDown" aria-label="下">▼</button>
    </div>
    <button class="kick-btn" id="kickBtn">⚽ 射門</button>
  </div>

  <div class="hud">
    <div class="led" id="hudLeft">分數 <b id="scoreVal">0</b></div>
    <div class="led" id="hudRight">時間 <b id="timeVal">60</b>s</div>
  </div>
  <div class="controls-hint" id="hintText">滑鼠 / 觸控移動瞄準，點擊或空白鍵拋線收線</div>
</div>

<script>
(function(){
  "use strict";

  var tabFish = document.getElementById('tabFish');
  var tabCrab = document.getElementById('tabCrab');
  var panelFish = document.getElementById('panelFish');
  var panelCrab = document.getElementById('panelCrab');
  var scoreVal = document.getElementById('scoreVal');
  var timeVal = document.getElementById('timeVal');
  var hintText = document.getElementById('hintText');
  var hudLeft = document.getElementById('hudLeft');
  var hudRight = document.getElementById('hudRight');
  var crabTouchpad = document.getElementById('crabTouchpad');

  var active = 'fish';

  function switchTo(mode){
    active = mode;
    tabFish.classList.toggle('active', mode==='fish');
    tabCrab.classList.toggle('active', mode==='crab');
    tabFish.setAttribute('aria-selected', mode==='fish');
    tabCrab.setAttribute('aria-selected', mode==='crab');
    panelFish.classList.toggle('active', mode==='fish');
    panelCrab.classList.toggle('active', mode==='crab');
    crabTouchpad.style.display = mode==='crab' ? 'flex' : 'none';
    if(mode==='fish'){
      hintText.textContent = '滑鼠 / 觸控拖曳瞄準，點擊或空白鍵拋線收線';
      scoreVal.textContent = FISH.score;
      timeVal.textContent = FISH.timeLeft;
    } else {
      hintText.textContent = '方向鍵 / WASD / 下方按鈕移動螃蟹，空白鍵或射門鈕出腳';
      scoreVal.textContent = CRAB.playerScore + ' : ' + CRAB.cpuScore;
      timeVal.textContent = CRAB.timeLeft;
      hudLeft.innerHTML = '比分 <b id="scoreVal">'+CRAB.playerScore+' : '+CRAB.cpuScore+'</b>';
      scoreVal = document.getElementById('scoreVal');
    }
  }
  tabFish.addEventListener('click', function(){ switchTo('fish'); });
  tabCrab.addEventListener('click', function(){ switchTo('crab'); });

  /* ---------------- FISHING GAME ---------------- */
  var fishCanvas = document.getElementById('fishCanvas');
  var fctx = fishCanvas.getContext('2d');
  var fishOverlay = document.getElementById('fishOverlay');
  var fishStart = document.getElementById('fishStart');
  var W = fishCanvas.width, H = fishCanvas.height;
  var WATER_Y = 300;
  var TOWER_X = 640;

  var FISH = {
    running:false,
    score:0,
    timeLeft:60,
    hookX: 300,
    hookY: 40,
    lineTargetY: 40,
    dropping:false,
    caught:null,
    caughtTimer:0,
    fishList: [],
    lastTick: null
  };

  function spawnFish(){
    var depth = WATER_Y + 30 + Math.random()*130;
    var dir = Math.random() < 0.5 ? 1 : -1;
    var x = dir === 1 ? -30 : W + 30;
    var kinds = [
      {r:14, color:'#ffd77a', pts:10, speed:1.4},
      {r:10, color:'#ff6b5e', pts:15, speed:2.0},
      {r:20, color:'#2ec4b6', pts:20, speed:1.0}
    ];
    var k = kinds[Math.floor(Math.random()*kinds.length)];
    FISH.fishList.push({
      x:x, y:depth, dir:dir, r:k.r, color:k.color, pts:k.pts,
      speed:k.speed*(0.7+Math.random()*0.6), bob: Math.random()*Math.PI*2
    });
  }

  function resetFish(){
    FISH.score=0; FISH.timeLeft=60; FISH.hookX=W/2-40; FISH.hookY=40;
    FISH.lineTargetY=40; FISH.dropping=false; FISH.caught=null; FISH.caughtTimer=0;
    FISH.fishList=[];
    for(var i=0;i<6;i++) spawnFish();
  }

  function pointerXFromEvent(e){
    var rect = fishCanvas.getBoundingClientRect();
    var clientX = (e.touches && e.touches[0]) ? e.touches[0].clientX : e.clientX;
    var scale = W / rect.width;
    return (clientX - rect.left) * scale;
  }

  fishCanvas.addEventListener('mousemove', function(e){
    if(!FISH.running) return;
    FISH.hookX = Math.max(40, Math.min(TOWER_X-40, pointerXFromEvent(e)));
  });
  fishCanvas.addEventListener('touchmove', function(e){
    if(!FISH.running) return;
    FISH.hookX = Math.max(40, Math.min(TOWER_X-40, pointerXFromEvent(e)));
    e.preventDefault();
  }, {passive:false});
  fishCanvas.addEventListener('touchstart', function(e){
    if(!FISH.running) return;
    FISH.hookX = Math.max(40, Math.min(TOWER_X-40, pointerXFromEvent(e)));
    e.preventDefault();
  }, {passive:false});

  function toggleDrop(){
    if(!FISH.running) return;
    FISH.dropping = !FISH.dropping;
    FISH.lineTargetY = FISH.dropping ? (WATER_Y+420) : 40;
  }
  fishCanvas.addEventListener('click', toggleDrop);
  window.addEventListener('keydown', function(e){
    if(e.code === 'Space'){
      if(active==='fish'){ toggleDrop(); e.preventDefault(); }
    }
  });

  fishStart.addEventListener('click', function(){
    resetFish();
    FISH.running = true;
    fishOverlay.classList.add('hidden');
    FISH.lastTick = null;
    requestAnimationFrame(fishLoop);
  });

  function drawTower(ctx){
    ctx.fillStyle = '#0a1330';
    ctx.fillRect(TOWER_X-46, 60, 92, WATER_Y-60);
    for(var seg=0; seg<8; seg++){
      var y = 60 + seg*((WATER_Y-60)/8);
      ctx.fillStyle = seg%2===0 ? '#132049' : '#0d1938';
      ctx.fillRect(TOWER_X-52, y, 104, 6);
    }
    ctx.fillStyle = '#ffb627';
    for(var r=0;r<10;r++){
      for(var c=0;c<3;c++){
        if(Math.random()<0.85){
          ctx.globalAlpha = 0.5 + Math.random()*0.5;
          ctx.fillRect(TOWER_X-38+c*30, 74+r*(WATER_Y-90)/10, 8, 10);
        }
      }
    }
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.moveTo(TOWER_X, 20);
    ctx.lineTo(TOWER_X, 60);
    ctx.strokeStyle = '#ffd77a';
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  function drawMecha(ctx, x, y){
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = '#c94b3f';
    ctx.fillRect(-16,-34,32,34);
    ctx.fillStyle = '#ffd77a';
    ctx.fillRect(-10,-30,20,10);
    ctx.fillStyle = '#2ec4b6';
    ctx.beginPath(); ctx.arc(-6,-24,3,0,7); ctx.arc(6,-24,3,0,7); ctx.fill();
    ctx.fillStyle = '#8a2f26';
    ctx.fillRect(-20,-4,10,16);
    ctx.fillRect(10,-4,10,16);
    ctx.strokeStyle = '#dfe4f2';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(14,-30);
    ctx.lineTo(60,-46);
    ctx.stroke();
    ctx.restore();
  }

  function fishLoop(ts){
    if(!FISH.running) return;
    if(!FISH.lastTick) FISH.lastTick = ts;
    var dt = Math.min(0.05, (ts - FISH.lastTick)/1000);
    FISH.lastTick = ts;

    FISH.timeLeft -= dt;
    if(FISH.timeLeft <= 0){
      FISH.timeLeft = 0;
      FISH.running = false;
      showFishGameOver();
    }

    if(FISH.hookY < FISH.lineTargetY) FISH.hookY = Math.min(FISH.lineTargetY, FISH.hookY + 360*dt);
    else if(FISH.hookY > FISH.lineTargetY) FISH.hookY = Math.max(FISH.lineTargetY, FISH.hookY - 360*dt);

    if(FISH.caughtTimer > 0){
      FISH.caughtTimer -= dt;
      if(FISH.caughtTimer<=0){ FISH.caught=null; }
    } else if(FISH.dropping){
      for(var i=0;i<FISH.fishList.length;i++){
        var f = FISH.fishList[i];
        var dx = f.x-FISH.hookX, dy=f.y-FISH.hookY;
        if(Math.sqrt(dx*dx+dy*dy) < f.r+12){
          FISH.score += f.pts;
          FISH.caught = f;
          FISH.caughtTimer = 0.5;
          FISH.fishList.splice(i,1);
          FISH.dropping = false;
          FISH.lineTargetY = 40;
          spawnFish();
          scoreVal.textContent = FISH.score;
          break;
        }
      }
    }

    for(var j=0;j<FISH.fishList.length;j++){
      var fi = FISH.fishList[j];
      fi.x += fi.dir*fi.speed;
      fi.bob += dt*2;
      if(fi.dir===1 && fi.x > W+40){ Object.assign(fi, {x:-40, y: WATER_Y+30+Math.random()*130}); }
      if(fi.dir===-1 && fi.x < -40){ Object.assign(fi, {x:W+40, y: WATER_Y+30+Math.random()*130}); }
    }
    if(Math.random()<0.004 && FISH.fishList.length<9) spawnFish();

    timeVal.textContent = Math.ceil(FISH.timeLeft);
    renderFish();
    requestAnimationFrame(fishLoop);
  }

  function renderFish(){
    fctx.clearRect(0,0,W,H);
    var sky = fctx.createLinearGradient(0,0,0,WATER_Y);
    sky.addColorStop(0,'#050915');
    sky.addColorStop(1,'#0d1836');
    fctx.fillStyle = sky;
    fctx.fillRect(0,0,W,WATER_Y);

    fctx.fillStyle = '#f5efe0';
    fctx.globalAlpha = 0.85;
    fctx.beginPath(); fctx.arc(90,60,26,0,7); fctx.fill();
    fctx.globalAlpha = 1;

    drawTower(fctx);
    drawMecha(fctx, TOWER_X+60, 42);

    var water = fctx.createLinearGradient(0,WATER_Y,0,H);
    water.addColorStop(0,'#123a52');
    water.addColorStop(1,'#04101c');
    fctx.fillStyle = water;
    fctx.fillRect(0,WATER_Y,W,H-WATER_Y);
    fctx.strokeStyle = 'rgba(46,196,182,0.35)';
    for(var w=0; w<6; w++){
      fctx.beginPath();
      fctx.moveTo(0, WATER_Y+18+w*22);
      fctx.lineTo(W, WATER_Y+18+w*22);
      fctx.stroke();
    }

    for(var k=0;k<FISH.fishList.length;k++){
      var f = FISH.fishList[k];
      var yy = f.y + Math.sin(f.bob)*4;
      fctx.save();
      fctx.translate(f.x, yy);
      fctx.scale(f.dir, 1);
      fctx.fillStyle = f.color;
      fctx.beginPath();
      fctx.ellipse(0,0,f.r,f.r*0.6,0,0,7);
      fctx.fill();
      fctx.beginPath();
      fctx.moveTo(-f.r,0); fctx.lineTo(-f.r-8,-6); fctx.lineTo(-f.r-8,6); fctx.closePath();
      fctx.fill();
      fctx.restore();
    }

    fctx.strokeStyle = '#dfe4f2';
    fctx.lineWidth = 2;
    fctx.beginPath();
    fctx.moveTo(TOWER_X+60, 42);
    fctx.lineTo(FISH.hookX, FISH.hookY);
    fctx.stroke();
    fctx.fillStyle = '#ffd77a';
    fctx.beginPath();
    fctx.arc(FISH.hookX, FISH.hookY, 6, 0, 7);
    fctx.fill();

    if(FISH.caught){
      fctx.fillStyle = '#ffd77a';
      fctx.font = 'bold 16px "Trebuchet MS", sans-serif';
      fctx.textAlign = 'center';
      fctx.fillText('+' + FISH.caught.pts, FISH.hookX, FISH.hookY-16);
    }
  }
  renderFish();

  function showFishGameOver(){
    fishOverlay.classList.remove('hidden');
    fishOverlay.querySelector('h2').textContent = '任務完成！';
    fishOverlay.querySelector('p').textContent = '本次戰績：' + FISH.score + ' 分。再拚一次刷新紀錄？';
    fishStart.textContent = '再玩一次';
  }

  /* ---------------- CRAB SOCCER GAME ---------------- */
  var crabCanvas = document.getElementById('crabCanvas');
  var cctx = crabCanvas.getContext('2d');
  var crabOverlay = document.getElementById('crabOverlay');
  var crabStart = document.getElementById('crabStart');
  var CW = crabCanvas.width, CH = crabCanvas.height;
  var GOAL_W = 90;

  var CRAB = {
    running:false,
    playerScore:0,
    cpuScore:0,
    timeLeft:60,
    player:{x:CW*0.28, y:CH/2, vx:0, vy:0, r:24},
    cpu:{x:CW*0.72, y:CH/2, vx:0, vy:0, r:24},
    ball:{x:CW/2, y:CH/2, vx:0, vy:0, r:12},
    keys:{},
    lastTick:null,
    goalFlash:0
  };

  function resetCrab(){
    CRAB.playerScore=0; CRAB.cpuScore=0; CRAB.timeLeft=60;
    resetPositions();
  }
  function resetPositions(){
    CRAB.player.x = CW*0.28; CRAB.player.y = CH/2; CRAB.player.vx=0; CRAB.player.vy=0;
    CRAB.cpu.x = CW*0.72; CRAB.cpu.y = CH/2; CRAB.cpu.vx=0; CRAB.cpu.vy=0;
    CRAB.ball.x = CW/2; CRAB.ball.y = CH/2; CRAB.ball.vx=0; CRAB.ball.vy=0;
  }

  window.addEventListener('keydown', function(e){
    if(active!=='crab') return;
    CRAB.keys[e.code] = true;
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].indexOf(e.code)>=0) e.preventDefault();
  });
  window.addEventListener('keyup', function(e){ CRAB.keys[e.code] = false; });

  crabStart.addEventListener('click', function(){
    resetCrab();
    CRAB.running = true;
    crabOverlay.classList.add('hidden');
    CRAB.lastTick = null;
    hudLeft.innerHTML = '比分 <b id="scoreVal">0 : 0</b>';
    scoreVal = document.getElementById('scoreVal');
    requestAnimationFrame(crabLoop);
  });

  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

  function kick(entity, ball, power){
    var dx = ball.x-entity.x, dy = ball.y-entity.y;
    var d = Math.sqrt(dx*dx+dy*dy) || 1;
    ball.vx += (dx/d)*power;
    ball.vy += (dy/d)*power;
  }

  function crabLoop(ts){
    if(!CRAB.running) return;
    if(!CRAB.lastTick) CRAB.lastTick = ts;
    var dt = Math.min(0.05, (ts-CRAB.lastTick)/1000);
    CRAB.lastTick = ts;

    CRAB.timeLeft -= dt;
    if(CRAB.timeLeft<=0){
      CRAB.timeLeft = 0;
      CRAB.running = false;
      showCrabGameOver();
    }

    var p = CRAB.player, k = CRAB.keys;
    var accel = 900;
    var ax=0, ay=0;
    if(k['ArrowLeft']||k['KeyA']) ax -= 1;
    if(k['ArrowRight']||k['KeyD']) ax += 1;
    if(k['ArrowUp']||k['KeyW']) ay -= 1;
    if(k['ArrowDown']||k['KeyS']) ay += 1;
    var mag = Math.sqrt(ax*ax+ay*ay) || 1;
    p.vx += (ax/mag)*accel*dt;
    p.vy += (ay/mag)*accel*dt;
    p.vx *= 0.9; p.vy *= 0.9;
    p.x = clamp(p.x + p.vx*dt, p.r, CW-p.r);
    p.y = clamp(p.y + p.vy*dt, p.r+40, CH-p.r-20);

    var c = CRAB.cpu, b = CRAB.ball;
    var targetX = b.x + (b.x < c.x ? 40 : -10);
    var targetY = b.y;
    var cdx = targetX-c.x, cdy = targetY-c.y;
    var cd = Math.sqrt(cdx*cdx+cdy*cdy)||1;
    var cpuAccel = 620;
    c.vx += (cdx/cd)*cpuAccel*dt;
    c.vy += (cdy/cd)*cpuAccel*dt;
    c.vx *= 0.9; c.vy *= 0.9;
    c.x = clamp(c.x + c.vx*dt, c.r, CW-c.r);
    c.y = clamp(c.y + c.vy*dt, c.r+40, CH-c.r-20);

    var bdxp = b.x-p.x, bdyp = b.y-p.y;
    if(Math.sqrt(bdxp*bdxp+bdyp*bdyp) < p.r+b.r){
      if(k['Space']){ kick(p,b,560); }
      else { b.vx += p.vx*0.4*dt*10; b.vy += p.vy*0.4*dt*10; kick(p,b,60); }
    }
    var bdxc = b.x-c.x, bdyc = b.y-c.y;
    if(Math.sqrt(bdxc*bdxc+bdyc*bdyc) < c.r+b.r){
      kick(c,b, Math.random()<0.02 ? 480 : 40);
    }

    b.x += b.vx*dt; b.y += b.vy*dt;
    b.vx *= 0.985; b.vy *= 0.985;
    if(b.y < 44+b.r){ b.y=44+b.r; b.vy*=-0.6; }
    if(b.y > CH-24-b.r){ b.y=CH-24-b.r; b.vy*=-0.6; }

    if(b.x < 8+b.r){
      if(Math.abs(b.y - CH/2) < GOAL_W/2){
        CRAB.cpuScore++; CRAB.goalFlash=1; resetPositions();
      } else { b.x = 8+b.r; b.vx*=-0.6; }
    }
    if(b.x > CW-8-b.r){
      if(Math.abs(b.y - CH/2) < GOAL_W/2){
        CRAB.playerScore++; CRAB.goalFlash=1; resetPositions();
      } else { b.x = CW-8-b.r; b.vx*=-0.6; }
    }
    if(CRAB.goalFlash>0) CRAB.goalFlash -= dt;

    scoreVal.textContent = CRAB.playerScore + ' : ' + CRAB.cpuScore;
    timeVal.textContent = Math.ceil(CRAB.timeLeft);
    renderCrab();
    requestAnimationFrame(crabLoop);
  }

  function drawCrab(ctx, x, y, color){
    ctx.save();
    ctx.translate(x,y);
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.ellipse(0,2,20,14,0,0,7); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-16,-6); ctx.lineTo(-28,-20); ctx.lineTo(-20,-14); ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(16,-6); ctx.lineTo(28,-20); ctx.lineTo(20,-14); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = color; ctx.lineWidth = 3;
    for(var i=0;i<3;i++){
      ctx.beginPath(); ctx.moveTo(-14+i*2,10); ctx.lineTo(-26+i*4,20); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(14-i*2,10); ctx.lineTo(26-i*4,20); ctx.stroke();
    }
    ctx.fillStyle = '#04070f';
    ctx.beginPath(); ctx.arc(-7,-2,3,0,7); ctx.arc(7,-2,3,0,7); ctx.fill();
    ctx.restore();
  }

  function renderCrab(){
    cctx.clearRect(0,0,CW,CH);
    cctx.fillStyle = '#0d3a24';
    cctx.fillRect(0,0,CW,CH);
    cctx.fillStyle = 'rgba(255,255,255,0.03)';
    for(var s=0;s<CW;s+=60){
      if((s/60)%2===0) cctx.fillRect(s,0,60,CH);
    }
    cctx.strokeStyle = 'rgba(243,236,217,0.55)';
    cctx.lineWidth = 3;
    cctx.strokeRect(20,44,CW-40,CH-64);
    cctx.beginPath(); cctx.moveTo(CW/2,44); cctx.lineTo(CW/2,CH-20); cctx.stroke();
    cctx.beginPath(); cctx.arc(CW/2,CH/2,50,0,7); cctx.stroke();

    cctx.fillStyle = 'rgba(255,183,39,0.18)';
    cctx.fillRect(0, CH/2-GOAL_W/2, 8, GOAL_W);
    cctx.fillRect(CW-8, CH/2-GOAL_W/2, 8, GOAL_W);
    cctx.strokeStyle = '#ffb627';
    cctx.strokeRect(0, CH/2-GOAL_W/2, 8, GOAL_W);
    cctx.strokeRect(CW-8, CH/2-GOAL_W/2, 8, GOAL_W);

    drawCrab(cctx, CRAB.player.x, CRAB.player.y, '#ff6b5e');
    drawCrab(cctx, CRAB.cpu.x, CRAB.cpu.y, '#2ec4b6');

    cctx.fillStyle = '#f3ecd9';
    cctx.beginPath();
    cctx.arc(CRAB.ball.x, CRAB.ball.y, CRAB.ball.r, 0, 7);
    cctx.fill();
    cctx.strokeStyle = '#04070f'; cctx.lineWidth=1.5;
    cctx.stroke();

    if(CRAB.goalFlash>0){
      cctx.fillStyle = 'rgba(255,183,39,' + (0.35*CRAB.goalFlash) + ')';
      cctx.fillRect(0,0,CW,CH);
    }
  }
  renderCrab();

  var dpadButtons = document.querySelectorAll('#crabTouchpad .dpad button');
  dpadButtons.forEach(function(btn){
    var key = btn.getAttribute('data-key');
    var press = function(e){ CRAB.keys[key] = true; btn.classList.add('pressed'); if(e) e.preventDefault(); };
    var release = function(e){ CRAB.keys[key] = false; btn.classList.remove('pressed'); if(e) e.preventDefault(); };
    btn.addEventListener('pointerdown', press);
    btn.addEventListener('pointerup', release);
    btn.addEventListener('pointerleave', release);
    btn.addEventListener('pointercancel', release);
  });

  var kickBtn = document.getElementById('kickBtn');
  var kickPress = function(e){ CRAB.keys['Space'] = true; kickBtn.classList.add('pressed'); if(e) e.preventDefault(); };
  var kickRelease = function(e){ CRAB.keys['Space'] = false; kickBtn.classList.remove('pressed'); if(e) e.preventDefault(); };
  kickBtn.addEventListener('pointerdown', kickPress);
  kickBtn.addEventListener('pointerup', kickRelease);
  kickBtn.addEventListener('pointerleave', kickRelease);
  kickBtn.addEventListener('pointercancel', kickRelease);

  function showCrabGameOver(){
    crabOverlay.classList.remove('hidden');
    var msg;
    if(CRAB.playerScore>CRAB.cpuScore) msg = '恭喜獲勝！';
    else if(CRAB.playerScore<CRAB.cpuScore) msg = '惜敗，再戰一場！';
    else msg = '平手，再拚勝負！';
    crabOverlay.querySelector('h2').textContent = msg;
    crabOverlay.querySelector('p').textContent = '最終比分 ' + CRAB.playerScore + ' : ' + CRAB.cpuScore;
    crabStart.textContent = '再賽一場';
  }

})();
</script>











<script>/* AI-CAMP-STATS-BEACON */
(function(){
  try{ if(window.top!==window.self) return; }catch(e){ return; } /* 在作品館內由作品館計數與投票 */
  var NS="ai-future-camp", K="101-x-5654c296";
  var ABS="//abacus.jasoncameron.dev/"; /* 直連備援 */
  var REL="/abacus/"; /* 同源代理（Vercel 轉發）：學校閘道擋外部網域時仍然通 */
  function ping(n){
    try{
      fetch(REL+"hit/"+NS+"/"+n).then(function(r){
        if(!r||!r.ok){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); }
      }).catch(function(){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); });
    }catch(e){}
  }
  function read(n,cb){
    function via(base,next){ try{ fetch(base+"get/"+NS+"/"+n).then(function(r){ if(r.status===404&&base===ABS) return {value:0}; if(!r.ok) throw 0; return r.json(); }).then(function(j){ cb(j.value||j.count||0); }).catch(next); }catch(e){ next(); } }
    via(REL, function(){ via(ABS, function(){ cb(null); }); });
  }
  ping(K+"-v");
  var done=false;
  function once(){ if(done)return; done=true; ping(K+"-p"); ping("site-total-plays");
    window.removeEventListener("pointerdown",once); window.removeEventListener("keydown",once); }
  window.addEventListener("pointerdown",once,{once:false}); window.addEventListener("keydown",once,{once:false});
  /* 投票鈕：非常好玩/好玩——與作品館同一計數器，任何網頁打開都同步 */
  function initVotes(){
    if(!document.body) return;
    var wrap=document.createElement("div");
    wrap.style.cssText="position:fixed;right:10px;bottom:10px;z-index:99999;display:flex;gap:6px;font-family:sans-serif;opacity:.92";
    var LS="voted-"+K;
    var defs=[["-love","\u2764\uFE0F","\u975e\u5e38\u597d\u73a9","#ff6cc7"],["-like","\ud83d\udc4d","\u597d\u73a9","#38e1ff"]];
    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;
          b.querySelector("i").textContent=Math.max(0,(n||0)-(c||0));
        }); });
      });
    }
    defs.forEach(function(d){
      var b=document.createElement("button");
      b.type="button"; b.title=d[2];
      b.style.cssText="min-height:42px;padding:8px 14px;border:none;border-radius:999px;background:rgba(15,18,32,.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation";
      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";
      b.addEventListener("click",function(){
        var prev=null; try{ prev=localStorage.getItem(LS); }catch(e){}
        if(prev===d[0]){ ping(K+d[0]+"-c"); try{ localStorage.removeItem(LS); }catch(e){} }
        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);
      });
      btns[d[0]]=b; wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    refresh();
    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* 每10秒同步別人投的票 */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
</script>
