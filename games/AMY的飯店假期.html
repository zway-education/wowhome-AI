<!DOCTYPE html>
<!-- AMY的飯店假期 v1：單人 AMY 版（改編自「飯店入住體驗-2」v6 引擎）
     ①單人化：AMY 一人主演，WASD/方向鍵皆可操作，觸控改為全畫面單搖桿
     ②房間改造：參考 2026 飯店設計趨勢（tactile luxury 質感手作風），雙人房改為
       開放式「質感手作套房」——絲絨床頭板、直紋木飾板牆、編織單椅與圓形編織地毯
     ③新場景「B1 餐廳」：大廳樓梯下樓，主廚 NPC、四張圓桌、廚房吧檯、暖色吊燈光池
     ④Day 3 由尋星日改為「美食日」：到 B1 餐廳收集 6 道招牌料理（附蒸氣動畫）
     ⑤新場景「B1 遊戲室」：餐廳旁邊的電玩間——三台發光街機、夾娃娃機、飛鏢靶
     ⑥Day 4 由泡澡日改為「遊戲日」：全飯店找齊 4 枚遊戲代幣 → 遊戲室打街機 → 回房泡澡
     保留 v6 全套系統：烘焙光照/波光/環境粒子/殘響/分場景音景/熱點引導/星等計時 -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>AMY的飯店假期</title>
<meta name="author" content="謝欣倪、陳君茉">
<style>
  :root{
    --cyan:#38e1ff; --blue:#4f7cff; --purple:#9a6bff; --pink:#ff6cc7;
    --gold:#ffcf5c; --bg:#070b14; --card:#101728; --card-b:#28324a;
    --text:#eaf1ff; --dim:#8ea0c2;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;touch-action:none;
    background:var(--bg);color:var(--text);
    font-family:-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
    -webkit-user-select:none;user-select:none;overscroll-behavior:none}
  #stage{position:relative;width:100%;height:100%}
  canvas#game{display:block;width:100%;height:100%;touch-action:none}
  #hud{position:absolute;top:8px;left:8px;right:128px;display:none;justify-content:space-between;
    gap:6px;pointer-events:none;flex-wrap:wrap}
  .panel{background:rgba(16,23,40,.88);border:1px solid var(--card-b);border-radius:12px;
    padding:7px 12px;font-size:13px;box-shadow:0 8px 20px rgba(0,0,0,.4)}
  .panel b{color:var(--cyan)}
  #panelR b{color:var(--pink)}
  #dayPanel b{color:var(--gold)}
  #hintBar{position:absolute;top:54px;left:50%;transform:translateX(-50%);
    background:rgba(16,23,40,.92);border:1px solid var(--card-b);color:var(--text);padding:8px 20px;
    border-radius:999px;font-size:13.5px;display:none;pointer-events:none;transition:opacity .5s;
    white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis;z-index:20}
  .ovl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 30%, rgba(30,40,70,.72) 0%, rgba(4,6,14,.93) 100%);z-index:40}
  .ovl .card{background:var(--card);border:1px solid var(--card-b);border-radius:16px;
    padding:22px 26px 20px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.5);
    max-width:min(520px,94vw);max-height:94vh;overflow-y:auto}
  .brand{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin-bottom:2px}
  .card h1,.card h2{margin:0 0 4px;font-size:26px;
    background:linear-gradient(92deg,var(--cyan),var(--blue),var(--purple));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .rule{width:52px;height:2px;background:linear-gradient(92deg,var(--cyan),var(--purple));margin:8px auto 10px;border-radius:2px}
  .card p{color:var(--dim);font-size:13.5px;line-height:1.7;margin:0 0 10px}
  .keys{font-size:13px;text-align:left;background:#0b1120;border:1px solid var(--card-b);border-radius:10px;
    padding:10px 14px;margin:0 0 12px;line-height:1.9;display:flex;flex-direction:column;gap:2px}
  .keys div{display:flex;align-items:center;gap:8px}
  .keys svg{flex:none}
  .keys b{color:var(--cyan)}
  kbd{background:#1c2740;border:1px solid var(--card-b);border-radius:4px;padding:1px 7px;font-family:inherit;font-size:12px}
  .daygrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:0 0 10px}
  @media (max-width:480px){ .daygrid{grid-template-columns:repeat(3,1fr)} }
  .day{min-height:84px;border-radius:12px;border:2px solid var(--card-b);cursor:pointer;
    background:linear-gradient(180deg,#18213a,#0d1426);color:var(--text);padding:8px 4px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    font-family:inherit;transition:transform .12s ease}
  .day:active{transform:scale(.94)}
  .day b{font-size:13.5px}
  .day small{font-size:11px;color:var(--dim)}
  .day .st{color:var(--gold);font-size:12.5px;letter-spacing:1px}
  .day.lock{opacity:.42;filter:grayscale(.8)}
  .bigbtn{display:inline-block;min-width:150px;margin:6px 4px 0;font:600 15.5px inherit;min-height:50px;
    background:linear-gradient(92deg,var(--cyan),var(--blue));color:#04101f;border:none;
    padding:12px 22px;border-radius:999px;cursor:pointer;box-shadow:0 8px 20px rgba(56,225,255,.25)}
  .bigbtn:active{transform:scale(.97)}
  .bigbtn.alt{background:#1c2740;color:var(--text);border:1.5px solid var(--card-b);box-shadow:none}
  .bigbtn.gold{background:linear-gradient(92deg,var(--gold),#ffa72e);color:#241503}
  #stars{font-size:38px;letter-spacing:7px;color:#4a5468;margin:4px 0 6px;min-height:46px}
  #stars .lit{color:var(--gold);display:inline-block;animation:pop .45s cubic-bezier(.2,2.2,.4,1) backwards}
  #stars .lit:nth-child(2){animation-delay:.16s}
  #stars .lit:nth-child(3){animation-delay:.32s}
  @keyframes pop{from{transform:scale(0) rotate(-40deg)}to{transform:scale(1) rotate(0)}}
  #endStats{font-size:14px;line-height:1.9;margin:0 0 6px}
  #endStats b{color:var(--cyan)}
  #muteBtn{position:absolute;top:8px;right:8px;width:52px;height:52px;border-radius:50%;
    background:var(--card);border:1px solid var(--card-b);cursor:pointer;z-index:45;padding:0;
    color:var(--text);display:flex;align-items:center;justify-content:center}
  #restartBtn{position:absolute;top:8px;right:68px;width:52px;height:52px;border-radius:50%;
    background:var(--card);border:1px solid var(--card-b);cursor:pointer;z-index:45;padding:0;
    color:var(--text);display:none;align-items:center;justify-content:center;font-size:24px;
    font-family:inherit;line-height:1}
  #restartBtn:active{transform:scale(.92)}
  .foot{color:var(--dim);font-size:12px;margin-top:8px}
  /* v5 補強：手機版大螢幕提醒浮層（統一規格，一個 session 只跳一次） */
  #bigScreenHint{position:absolute;inset:0;z-index:999;display:none;align-items:center;justify-content:center;
    background:rgba(7,11,20,.9);padding:20px}
  #bigScreenHint .bscard{background:var(--card);border:1px solid var(--card-b);border-radius:16px;
    padding:28px 22px 24px;text-align:center;max-width:min(380px,92vw);box-shadow:0 24px 60px rgba(0,0,0,.5)}
  #bigScreenHint .bsicon{margin:0 auto 14px;display:block}
  #bigScreenHint h2{margin:0 0 8px;font-size:20px;
    background:linear-gradient(92deg,var(--cyan),var(--blue),var(--purple));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  #bigScreenHint p{margin:0 0 18px;color:var(--dim);font-size:13.5px;line-height:1.7}
  #bigScreenHint button{display:block;width:64%;min-width:200px;min-height:52px;margin:0 auto;
    background:linear-gradient(92deg,var(--cyan),var(--blue),var(--purple));color:#04101f;border:none;
    border-radius:999px;font:700 15px inherit;cursor:pointer;box-shadow:0 8px 20px rgba(56,225,255,.3)}
  #bigScreenHint button:active{transform:scale(.97)}
</style>
</head>
<body>
<div id="stage">
  <canvas id="game"></canvas>
  <div id="hud">
    <div id="panelA" class="panel">AMY <b id="taskA"></b></div>
    <div id="dayPanel" class="panel"><b id="dayTxt"></b>｜<span id="clockTxt">0:00</span>｜<span id="goalTxt"></span></div>
    <div id="panelR" class="panel">MOLLY <b id="taskB"></b></div>
  </div>
  <div id="hintBar"></div>
  <button id="muteBtn" aria-label="切換音效"></button>
  <button id="restartBtn" aria-label="重新開始這天" title="重新開始這天">↺</button>

  <div class="ovl" id="titleOvl">
    <div class="card">
      <div class="brand">AI未來創作營隊</div>
      <h1>AMY的飯店假期</h1>
      <p class="sub" style="margin:0 0 6px;color:var(--pink);font-weight:700">AMY 與 MOLLY 的五日假期</p>
      <div class="rule"></div>
      <p>AMY 和 MOLLY 到 WOWHOME HOTEL 度假五天！住進質感手作套房、頂樓玩泳池、
        到 B1 餐廳讓服務生送餐、再上 5F 遊戲室打街機、溜溜滑梯直達大廳。照著任務提示走，愈快完成星星愈多！</p>
      <div class="keys">
        <div><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#38e1ff" stroke-width="2"><rect x="3" y="5" width="18" height="11" rx="1.5"/><path d="M2 19h20"/></svg>
          <span><b>AMY</b> <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>　<b style="color:var(--pink)">MOLLY</b> <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd></span></div>
        <div><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ff6cc7" stroke-width="2"><rect x="7" y="2" width="10" height="20" rx="2.5"/><circle cx="12" cy="18.4" r="1" fill="#ff6cc7"/></svg>
          <span>平板：左半邊拖曳控制 AMY、右半邊控制 MOLLY</span></div>
        <div><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ffcf5c" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9 12l2 2 4-5"/></svg>
          <span>一根手指也行：沒人操作時 MOLLY 會自動跟著 AMY！</span></div>
      </div>
      <div class="daygrid" id="daygrid"></div>
      <p class="foot" id="footLine"></p>
    </div>
  </div>

  <div class="ovl" id="endOvl" style="display:none">
    <div class="card">
      <div class="brand" id="endBrand">Day Complete</div>
      <h2 id="endTitle">行程完成！</h2>
      <div id="stars"></div>
      <div id="endStats"></div>
      <button class="bigbtn" id="replayBtn">↺ 再玩一次</button>
      <button class="bigbtn gold" id="nextBtn" style="display:none">下一天 ▶</button>
      <button class="bigbtn alt" id="menuBtn">行程表</button>
    </div>
  </div>

  <div id="bigScreenHint">
    <div class="bscard">
      <svg class="bsicon" width="72" height="52" viewBox="0 0 96 68" fill="none">
        <rect x="2" y="8" width="34" height="52" rx="6" stroke="#38e1ff" stroke-width="3"/>
        <circle cx="19" cy="52" r="1.6" fill="#38e1ff"/>
        <path d="M46 34h14m0 0-6-6m6 6-6 6" stroke="#4f7cff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="64" y="4" width="30" height="60" rx="4" stroke="#9a6bff" stroke-width="3"/>
        <path d="M70 58h18" stroke="#9a6bff" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <h2>建議使用大螢幕遊玩</h2>
      <p>用平板或電腦打開，體驗更完整</p>
      <button id="bigScreenHintBtn" type="button">知道了，繼續玩</button>
    </div>
  </div>
</div>

<script>
'use strict';
// v5 補強：手機版大螢幕提醒浮層——只在真手機（非平板/電腦）跳出，一個 session 只跳一次，
// 不攔截遊戲初始化：這是獨立的頂層 IIFE，下面主遊戲照常載入在浮層後面
(function bigScreenHint(){
  try{
    var isPhone = Math.min(screen.width||9999, screen.height||9999) < 600 || innerWidth < 768;
    if(!isPhone) return;
    if(sessionStorage.getItem('bigscreen-hint')) return;
    var el = document.getElementById('bigScreenHint');
    if(!el) return;
    el.style.display = 'flex';
    var btn = document.getElementById('bigScreenHintBtn');
    btn.addEventListener('click', function(){
      try{ sessionStorage.setItem('bigscreen-hint','1'); }catch(e){}
      el.style.transition = 'opacity .35s ease';
      el.style.opacity = '0';
      setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 380);
    });
  }catch(e){}
})();
(function(){
/* =========================================================
   飯店入住體驗 PRO v4（-2 系列：AMY 與 RUBY 的五日假期）
   保留 v2 原作核心：頂視角四場景（庭園/大廳/雙人房/頂樓泳池）、
   撿行李→櫃檯房卡→躺床、衣櫃換泳裝、浴缸泡澡、頂樓跳水游泳。
   升級：五日行程關卡制＋每日星等＋RUBY 跟隨AI＋場景離屏烘焙
   ＋更精緻角色與傢俱＋Compressor 音效匯流排。
   （與 PRO 一代「飯店導覽」不同作品：本作是雙人五日假期行程制）
   ========================================================= */
const $ = id => document.getElementById(id);
const stage = $('stage'), canvas = $('game'), ctx = canvas.getContext('2d');
const clamp = (v,a,b)=> v<a?a:v>b?b:v;
const rnd = (a,b)=> a + Math.random()*(b-a);
const dist = (ax,ay,bx,by)=> Math.hypot(ax-bx,ay-by);
// v5 補強：角色精細化用色彩工具——依百分比加亮/加深十六進位色碼，畫漸層與輪廓線用
function shadeColor(hex, percent){
  const num = parseInt(hex.slice(1),16);
  const r = clamp((num>>16) + Math.round(2.55*percent), 0, 255);
  const g = clamp(((num>>8)&0xff) + Math.round(2.55*percent), 0, 255);
  const b = clamp((num&0xff) + Math.round(2.55*percent), 0, 255);
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

/* ---------- 音效：Compressor 主匯流排＋隨機音高 ---------- */
let AC=null, master=null, muted=false;
try{ muted = localStorage.getItem('hotelamy_mute')==='1'; }catch(e){}
const sndOn = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor"/><path d="M16 8a5 5 0 0 1 0 8M18.5 5.5a9 9 0 0 1 0 13"/></svg>';
const sndOff = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor"/><path d="M16 9l6 6M22 9l-6 6"/></svg>';
const muteBtn = $('muteBtn');
// v5：平板玩家原本卡關/走錯只能硬撐到結算畫面才能重來，補一顆隨時可按的「重來本日」鈕
const restartBtn = $('restartBtn');
restartBtn.addEventListener('click', e=>{
  e.stopPropagation();
  if(S.scene!=='play') return;
  sfx.blip(); startDay(S.day);
});
function updateMuteBtn(){ muteBtn.innerHTML = muted ? sndOff : sndOn; }
updateMuteBtn();
muteBtn.addEventListener('click', e=>{
  e.stopPropagation(); muted=!muted;
  try{ localStorage.setItem('hotelamy_mute', muted?'1':'0'); }catch(err){}
  updateMuteBtn(); updateAmbient(); if(!muted) sfx.blip();
});
let ambGain=null, ambFilter=null, ambSrcGain=null;
function audio(){
  if(!AC){
    try{
      AC = new (window.AudioContext||window.webkitAudioContext)();
      const comp = AC.createDynamicsCompressor();
      comp.threshold.value=-20; comp.knee.value=26; comp.ratio.value=8;
      comp.attack.value=.003; comp.release.value=.22;
      master = AC.createGain(); master.gain.value=.85;
      master.connect(comp); comp.connect(AC.destination);
      // v6 程序化殘響：generated impulse ConvolverNode（飯店室內空間感），母線並聯送入
      try{
        const len = Math.floor(AC.sampleRate*1.3);
        const ir = AC.createBuffer(2,len,AC.sampleRate);
        for(let c=0;c<2;c++){ const d=ir.getChannelData(c);
          for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,3); }
        const conv = AC.createConvolver(); conv.buffer = ir;
        const rev = AC.createGain(); rev.gain.value=.18;
        master.connect(rev); rev.connect(conv); conv.connect(comp);
      }catch(e){}
      // v6 分場景環境音床：噪聲 → bandpass（頻率/音量依場景切換：風聲/水聲/大廳低語）
      try{
        ambGain = AC.createGain(); ambGain.gain.value=0; ambGain.connect(comp);
        const nlen = AC.sampleRate*2, nbuf = AC.createBuffer(1,nlen,AC.sampleRate), nd = nbuf.getChannelData(0);
        for(let i=0;i<nlen;i++) nd[i]=Math.random()*2-1;
        const nsrc = AC.createBufferSource(); nsrc.buffer=nbuf; nsrc.loop=true;
        ambFilter = AC.createBiquadFilter(); ambFilter.type='bandpass'; ambFilter.frequency.value=500; ambFilter.Q.value=.7;
        ambSrcGain = AC.createGain(); ambSrcGain.gain.value=1;
        const lfo = AC.createOscillator(); lfo.frequency.value=.14;
        const lfoG = AC.createGain(); lfoG.gain.value=.35;
        lfo.connect(lfoG); lfoG.connect(ambSrcGain.gain); lfo.start();
        nsrc.connect(ambFilter); ambFilter.connect(ambSrcGain); ambSrcGain.connect(ambGain); nsrc.start();
      }catch(e){ ambGain=null; }
      updateAmbient();
    }catch(e){}
  }
  if(AC && AC.state==='suspended') AC.resume();
  return AC;
}
// v6 音景切換：依場景調整環境音床（進出場景/開始/結束/靜音時呼叫）
function updateAmbient(){
  if(!AC || !ambGain) return;
  let vol=0, freq=500;
  if(!muted && S.scene==='play'){
    if(S.area==='outdoor'){ vol=.045; freq=420; }
    else if(S.area==='rooftop'){ vol=.06; freq=560; }
    else if(S.area==='lobby'){ vol=.03; freq=300; }
    else if(S.area==='restaurant'){ vol=.035; freq=340; }   // 餐廳低語＋餐具聲
    else if(S.area==='gameroom'){ vol=.04; freq=700; }      // 遊戲室電子嗡鳴
    else { vol=.02; freq=260; }
  }
  ambGain.gain.setTargetAtTime(vol, AC.currentTime, .6);
  ambFilter.frequency.setTargetAtTime(freq, AC.currentTime, .6);
}
addEventListener('pointerdown', audio); addEventListener('keydown', audio);
function beep(freq,dur,type,vol,slide){
  const ac=audio(); if(!ac||muted||!master) return;
  freq *= .95+Math.random()*.1;
  const o=ac.createOscillator(), g=ac.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(freq,ac.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30,freq+slide), ac.currentTime+dur);
  g.gain.setValueAtTime(vol||.1, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.001, ac.currentTime+dur);
  o.connect(g); g.connect(master); o.start(); o.stop(ac.currentTime+dur+.02);
}
function noiseBurst(dur,vol,low){
  const ac=audio(); if(!ac||muted||!master) return;
  const len=Math.max(1,Math.floor(ac.sampleRate*dur));
  const buf=ac.createBuffer(1,len,ac.sampleRate); const d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
  const src=ac.createBufferSource(); src.buffer=buf;
  const f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=low||1200;
  const g=ac.createGain(); g.gain.value=vol||.15;
  src.connect(f); f.connect(g); g.connect(master); src.start();
}
const sfx = {
  blip(){ beep(720,.06,'triangle',.09); },
  step(){ beep(rnd(170,200),.03,'triangle',.028); },
  pickup(){ beep(660,.08,'square',.09); setTimeout(()=>beep(880,.1,'square',.08),70); },
  door(){ beep(300,.12,'square',.06,60); },
  ding(){ beep(1319,.4,'sine',.13); setTimeout(()=>beep(1976,.6,'sine',.08),60); },
  elevator(){ beep(440,.5,'sine',.08,220); },
  star(){ beep(1046,.08,'square',.08); setTimeout(()=>beep(1318,.1,'square',.07),60); },
  splash(){ noiseBurst(.3,.18,700); beep(280,.2,'sine',.08,-100); },

/* ---------- 每日任務更新 ---------- */
function updateDayTasks(p, dt){
  const D = S.day;
  // 撿取物（行李/泳圈/代幣）
  for(const it of items){
    if(it.taken || it.area!==S.area) continue;
    if(it.type==='ring' && p.outfit!=='swim') continue;      // 泳圈要換泳裝才撿得到
    if(it.type==='suitcase' && p.hasSuitcase) continue;
    if(dist(p.x,p.y,it.x,it.y) < 36){
      it.taken = true; p.squash = 1;
      if(it.type==='suitcase'){
        p.hasSuitcase = true; sfx.pickup();
        floatText(p.x,p.y,'拿到行李箱！','#ffcf5c');
        if(D===0 && p.step===0){ p.step=1; showHint('走進大廳，到櫃檯辦入住！'); }
        if(D===4 && p.step===0){ p.step=1; showHint('搭電梯到大廳櫃檯還房卡！'); }
      }else if(it.type==='ring'){
        sharedGot++; sfx.star(); S.shake=3;
        floatText(it.x,it.y,'泳圈 +1','#38e1ff');
        burstConfetti2(it.x,it.y,8,'#7fe6ff');
      }else if(it.type==='coin'){
        sharedGot++; sfx.star();
        floatText(it.x,it.y,'代幣 +1','#ffcf5c');
        burstConfetti2(it.x,it.y,8,'#ffcf5c');
        if(sharedGot>=sharedNeed) showHint('代幣到齊！搭電梯上 5F 遊戲室打街機吧～');
      }
      updateTaskLabels();
    }
  }
  checkCollectMilestone();
  if(D===0){
    if(S.area==='lobby' && p.step===1){
      const c = AREAS.lobby.counter;
      if(dist(p.x,p.y, c.x+c.w/2, c.y+c.h+10) < 60){
        p.hasKey=true; p.step=2; p.squash=1;
        S.staffLine=(S.staffLine+1)%3; S.staffTalkT=2.4;
        sfx.ding(); S.shake=3; floatText(p.x,p.y,'拿到房卡！','#38e1ff');
        updateTaskLabels(); showHint('搭電梯上樓，躺上床就入住完成！');
      }
    }
    if(S.area==='room' && p.step===2){
      if(inZone(p,AREAS.room.bedA)){
        p.lying=true; p.step=3; p.squash=1; p.moving=false;
        sfx.sleep(); floatText(p.x,p.y,'入住完成！','#ff6cc7');
        updateTaskLabels();
      }
    }
    if(p1.step>=3 && p2.step>=3) dayComplete();
  }else if(D===1){
    if(p.step===0 && p.outfit==='swim'){ p.step=1; updateTaskLabels(); showHint(p.name+'：換好泳裝了，上頂樓跳進泳池！'); }
    if(p.step===1 && p.swimming){ p.step=2; updateTaskLabels(); }
    if(sharedGot>=sharedNeed && p1.step>=2 && p2.step>=2){
      p1.step=3; p2.step=3; dayComplete();
    }
  }else if(D===2){
    // 美食日：到餐廳入座 → 服務生從廚房端餐到桌 → 吃掉 → 共 3 道（服務生狀態機在 update() 跑一次）
    updateDiningSeat(p);
    if(sharedGot>=sharedNeed && p.step<2){ p.step=2; p.seated=false; updateTaskLabels(); }
    if(p1.step>=2 && p2.step>=2) dayComplete();
  }else if(D===3){
    if(p.step===0 && sharedGot>=sharedNeed){ p.step=1; updateTaskLabels(); }
    // 打街機改為真的可玩的「接星星」小遊戲（updateArcadeTrigger／updateMini），過關才進下一步
    if(p.step===2 && p.bathing){
      p.step=3; floatText(p.x,p.y,'泡澡好舒服～','#38e1ff');
      updateTaskLabels();
    }
    if(p1.step>=3 && p2.step>=3) dayComplete();
  }else if(D===4){
    if(S.area==='lobby' && p.step===1){
      const c = AREAS.lobby.counter;
      if(dist(p.x,p.y, c.x+c.w/2, c.y+c.h+10) < 60){
        p.hasKey=false; p.step=2; p.squash=1;
        S.staffTalkT=2.4; S.staffLine=2;
        sfx.ding(); floatText(p.x,p.y,'還好房卡！','#38e1ff');
        updateTaskLabels(); showHint('走出大門，到庭園門口集合！');
      }
    }
    if(S.area==='outdoor' && p.step===2){
      if(inZone(p, AREAS.outdoor.gate)){
        p.step=3; p.squash=1; floatText(p.x,p.y,'集合！','#ffcf5c');
        updateTaskLabels();
      }
    }
    if(p1.step>=3 && p2.step>=3) dayComplete();
  }
  // 通用互動：衣櫃換裝、浴缸、游泳
  if(S.area==='room'){
    const bt = AREAS.room.bathtub;
    if(!p.bathing && inZone(p,bt) && dist(p.x,p.y, bt.x+bt.w/2, bt.y+bt.h/2) < 60){
      p.bathing = true; p.moving=false; sfx.splash(); S.shake=3;
      splashBurst(p.x, p.y);
    }
    updateWardrobe(p);
  }
  if(S.area==='rooftop') updateSwim(p);
}
// 美食日：入座偵測（每位玩家各自跑）
function updateDiningSeat(p){
  const seat = AREAS.restaurant.seat;
  if(S.area!=='restaurant'){ p.seated=false; return; }
  const nearSeat = dist(p.x,p.y,seat.x,seat.y+40) < 55;
  if(p.step===0 && nearSeat){
    p.seated=true; p.step=1; p.squash=1; sfx.blip();
    updateTaskLabels(); showHint(p.name+' 入座！服務生馬上為您送餐～');
  }else if(p.step===1) p.seated = nearSeat;
}
// 服務生送餐狀態機（每幀只跑一次）：廚房待命→端餐到桌→有人坐著就開動→回廚房拿下一道
let eatT = 0;
function updateWaiter(dt){
  if(S.day!==2 || S.scene!=='play' || S.over) return;
  const seat = AREAS.restaurant.seat;
  const kx=230, ky=150, tx=seat.x, ty=seat.y-36;
  const anySeated = players.some(q=>q.seated);
  if(waiter.state==='idle' && anySeated && sharedGot<sharedNeed){
    waiter.state='carry'; waiter.dish=sharedGot; eatT=0; sfx.blip();
  }
  const spd = 210*dt;   // 送餐節奏明快，孩子不用乾等
  if(waiter.state==='carry'){
    const d=dist(waiter.x,waiter.y,tx,ty);
    if(d<6){ waiter.state='serve'; sfx.ding(); floatText(tx,ty,'上菜囉！','#ffcf5c'); }
    else{
      waiter.dir = tx>waiter.x?1:-1;
      waiter.x += (tx-waiter.x)/d*spd; waiter.y += (ty-waiter.y)/d*spd; waiter.walk += dt*8;
    }
  }else if(waiter.state==='serve'){
    if(anySeated && S.area==='restaurant'){
      eatT += dt;
      if(Math.random()<.2) burstConfetti2(seat.x+rnd(-14,14), seat.y+6, 1, '#ffe4a0');
      if(eatT>=0.9){
        eatT=0; sharedGot++; sfx.pickup();
        players.forEach(q=>{ if(q.seated) q.squash=1; });
        floatText(seat.x,seat.y-10,'好好吃！美食 '+sharedGot+'/'+sharedNeed,'#ff9a3d');
        burstConfetti2(seat.x,seat.y-10,8,'#ff9a3d');
        waiter.state='back'; updateTaskLabels();
      }
    }
  }else if(waiter.state==='back'){
    const d=dist(waiter.x,waiter.y,kx,ky);
    if(d<6){ waiter.state='idle'; waiter.x=kx; waiter.y=ky; }
    else{
      waiter.dir = kx>waiter.x?1:-1;
      waiter.x += (kx-waiter.x)/d*spd; waiter.y += (ky-waiter.y)/d*spd; waiter.walk += dt*8;
    }
  }
}
/* 5F 街機小遊戲「接星星」：走近中間街機就開機，左右移動籃子接住 10 顆星星。
   沒有失敗（漏接不扣分），呼應「失敗不挫折」；Day 4 打贏才算完成打電動任務 */
let mini = null, arcadeCool = 0;
function startMini(){
  mini = { score:0, need:10, px:.5, drops:[], t:0, done:false, doneT:0 };
  sfx.elevator(); showHint('街機開機！左右移動籃子，接住 10 顆星星！');
}
function updateArcadeTrigger(){
  if(mini || S.area!=='gameroom' || S.doorCooldown>0 || arcadeCool>0) return;
  const ar = AREAS.gameroom.arcades[1];
  for(const p of players){
    if(dist(p.x,p.y,ar[0],ar[1]+40) < 50){ startMini(); return; }
  }
}
function updateMini(dt){
  arcadeCool = Math.max(0, arcadeCool-dt);
  if(!mini) return;
  mini.t += dt;
  if(mini.done){
    mini.doneT -= dt;
    if(mini.doneT<=0){ mini=null; arcadeCool=1.4; }
    return;
  }
  // 兩人任一組按鍵/搖桿都能控制籃子
  let dx=0;
  if(keys['KeyA']||keys['ArrowLeft']) dx--;
  if(keys['KeyD']||keys['ArrowRight']) dx++;
  const s1=stickDir('p1'), s2=stickDir('p2');
  if(s1) dx+=s1.dx; if(s2) dx+=s2.dx;
  mini.px = clamp(mini.px + dx*1.15*dt, .06, .94);
  if(Math.random() < dt*2.4 && mini.drops.length<5)
    mini.drops.push({x:rnd(.08,.92), y:-.05, spd:rnd(.4,.6), ph:rnd(0,6)});
  for(let i=mini.drops.length-1;i>=0;i--){
    const d=mini.drops[i]; d.y += d.spd*dt;
    if(d.y>.82 && d.y<.95 && Math.abs(d.x-mini.px)<.1){
      mini.drops.splice(i,1); mini.score++; sfx.star();
      const g=miniGeom(); burstConfetti(g.x+d.x*g.w, g.y+g.h*.85, 6);
    }else if(d.y>1.05) mini.drops.splice(i,1);
  }
  if(!mini.done && mini.score>=mini.need){
    mini.done=true; mini.doneT=1.2;
    sfx.win(); S.shake=6; S.freeze=.08;
    const gg=miniGeom(); burstConfetti(gg.x+gg.w/2, gg.y+gg.h/2, 24);
    if(S.day===3){
      players.forEach(p=>{ if(p.step===1){ p.step=2; p.squash=1; } });
      updateTaskLabels(); showHint('過關！打完電動，回房間泡澡放鬆吧～');
    }else showHint('過關！你是街機高手！');
  }
}
function miniGeom(){
  const W=stage.clientWidth, H=stage.clientHeight;
  const w=Math.min(480, W*.86), h=Math.min(360, H*.72);
  return { x:(W-w)/2, y:(H-h)/2, w, h };
}
function drawMini(t){
  if(!mini) return;
  const g=miniGeom(), x=g.x, y=g.y, w=g.w, h=g.h;
  ctx.save();
  ctx.fillStyle='rgba(4,6,14,.55)'; ctx.fillRect(0,0,stage.clientWidth,stage.clientHeight);
  // 街機螢幕外框（霓虹）
  ctx.fillStyle='#0b0620'; roundRectPath(ctx,x-10,y-10,w+20,h+20,18); ctx.fill();
  ctx.strokeStyle='#9a6bff'; ctx.lineWidth=3; ctx.stroke();
  ctx.strokeStyle='rgba(56,225,255,.5)'; ctx.lineWidth=1.5;
  roundRectPath(ctx,x-4,y-4,w+8,h+8,14); ctx.stroke();
  ctx.save(); roundRectPath(ctx,x,y,w,h,10); ctx.clip();
  const bg=ctx.createLinearGradient(0,y,0,y+h);
  bg.addColorStop(0,'#101736'); bg.addColorStop(1,'#1c1030');
  ctx.fillStyle=bg; ctx.fillRect(x,y,w,h);
  ctx.fillStyle='rgba(255,255,255,.25)';
  for(let i=0;i<24;i++) ctx.fillRect(x+rndSeed(i+9)*w, y+((rndSeed(i+33)*h)+t*22)%h, 2, 2);
  // 落下的星星
  for(const d of mini.drops){
    ctx.save(); ctx.translate(x+d.x*w, y+d.y*h); ctx.rotate(Math.sin(t*2+d.ph)*.4);
    ctx.fillStyle='#ffcf5c'; ctx.strokeStyle='#c98d1f'; ctx.lineWidth=1.5;
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const a=-Math.PI/2+i*(Math.PI*2/5), a2=a+Math.PI/5;
      ctx.lineTo(Math.cos(a)*12, Math.sin(a)*12);
      ctx.lineTo(Math.cos(a2)*5, Math.sin(a2)*5);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.restore();
  }
  // 接星籃（AMY 粉色小籃）
  const bx=x+mini.px*w, by=y+h*.88;
  ctx.fillStyle='#ff6cc7'; roundRectPath(ctx,bx-34,by-10,68,20,9); ctx.fill();
  ctx.strokeStyle='#b43a86'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='#ffd1ec'; roundRectPath(ctx,bx-28,by-7,56,7,4); ctx.fill();
  // 分數與說明
  ctx.textAlign='center';
  ctx.font='bold 22px "PingFang TC","Microsoft JhengHei",sans-serif';
  ctx.fillStyle='#ffcf5c'; ctx.fillText('★ '+mini.score+' / '+mini.need, x+w/2, y+34);
  ctx.font='12.5px sans-serif'; ctx.fillStyle='#8ea0c2';
  ctx.fillText('← → 或 A D 或 拖曳搖桿移動籃子', x+w/2, y+h-14);
  if(mini.done){
    ctx.fillStyle='rgba(4,6,14,.5)'; ctx.fillRect(x,y,w,h);
    ctx.font='bold 34px "PingFang TC","Microsoft JhengHei",sans-serif';
    ctx.fillStyle='#ffcf5c'; ctx.fillText('過關！', x+w/2, y+h/2+10);
  }
  ctx.restore(); ctx.restore();
}
// 5F 遊戲室溜滑梯：走進滑梯口，咻——直接溜回一樓大廳！（任何一天都能玩）
function updateSlide(){
  // 頂樓滑水道：走上平台就滑進泳池正中央（自動觸發跳水音效與泳姿）
  if(S.area==='rooftop' && S.doorCooldown<=0){
    const ws = AREAS.rooftop.slide, pl = AREAS.rooftop.pool;
    for(const p of players){
      if(p.x>ws.x && p.x<ws.x+ws.w && p.y>ws.y && p.y<ws.y+ws.h){
        sfx.elevator(); S.shake=6;
        p.x = pl.x+pl.w*.35+rnd(-20,20); p.y = pl.y+pl.h*.4+rnd(-15,15);
        p.squash = 1;
        burstConfetti2(p.x, p.y, 12, '#bfe8ff');
        floatText(p.x, p.y, '咻——滑進泳池！', '#38e1ff');
      }
    }
  }
  if(S.area!=='gameroom' || S.doorCooldown>0) return;
  const sl = AREAS.gameroom.slide;
  for(const p of players){
    if(p.x>sl.x && p.x<sl.x+sl.w && p.y>sl.y && p.y<sl.y+sl.h){
      sfx.splash(); sfx.elevator(); S.shake=8;
      changeArea('lobby', 700, 430);
      players.forEach(q=>{ q.squash=1; });
      burstConfetti2(720, 430, 14, '#ffcf5c');
      floatText(720, 420, '咻——溜滑梯回大廳！', '#ffcf5c');
      showHint('太好玩了！溜滑梯直達一樓大廳～');
      return;
    }
  }
}
function updateWardrobe(p){
  const wd = AREAS.room.wardrobe;
  const near = p.x>wd.x-24 && p.x<wd.x+wd.w+24 && p.y>wd.y-24 && p.y<wd.y+wd.h+24;
  if(near && !p.nearWardrobe){
    p.outfit = p.outfit==='swim' ? 'normal' : 'swim';
    p.squash = 1; sfx.blip();
    burstConfetti2(p.x, p.y-20, 10, '#9a6bff');
    floatText(p.x,p.y, p.outfit==='swim' ? '換上泳裝！':'換回便服', '#9a6bff');
  }
  p.nearWardrobe = near;
}
function updateSwim(p){
  const pl = AREAS.rooftop.pool;
  const inPool = p.x>pl.x && p.x<pl.x+pl.w && p.y>pl.y && p.y<pl.y+pl.h;
  if(inPool && !p.swimming){
    p.swimming = true; sfx.splash(); S.shake=4;
    splashBurst(p.x, p.y);
    floatText(p.x,p.y,'跳進泳池！','#38e1ff');
  }else if(!inPool && p.swimming) p.swimming = false;
}

// v5：收集類任務（泳圈/星星/小鴨）湊滿的那一刻加重手感——hit-stop＋震動＋三音階慶祝
// 一天只慶祝一次（S.collectDone 在 setupDay 重置），避免同天重複觸發
function checkCollectMilestone(){
  if(sharedNeed>0 && sharedGot>=sharedNeed && !S.collectDone){
    S.collectDone = true;
    S.freeze = 0.08; S.shake = Math.max(S.shake, 7);
    sfx.collectAll();
    const cx = stage.clientWidth/2, cy = stage.clientHeight*0.4;
    burstConfetti(cx, cy, 16);
  }
}
function calcDayStars(){
  const D = DAYS[S.day];
  if(S.time <= D.fast) return 3;
  if(S.time <= D.par) return 2;
  return 1;
}
function dayComplete(){
  if(S.over) return;
  S.over = true; S.freeze = 0.12; S.shake = 5;
  sfx.win();
  const cx=stage.clientWidth/2, cy=stage.clientHeight/2;
  for(let i=0;i<3;i++) setTimeout(()=>burstConfetti(rnd(cx-200,cx+200), rnd(cy-140,cy+40), 22), i*160);
  const st = calcDayStars();
  if(st > dayStars[S.day]){ dayStars[S.day]=st; saveStars(); }
  const t = Math.round(S.time), b = bestOf(S.day);
  if(!b || t < b){ try{ localStorage.setItem('hotelamy_best_'+S.day, String(t)); }catch(e){} }
  setTimeout(()=>showEnd(st), 950);
}
function showEnd(st){
  S.scene='end';
  updateAmbient();
  const allDone = dayStars.every(s=>s>0);
  $('endBrand').textContent = 'Day '+(S.day+1)+' Complete';
  $('endTitle').textContent = (S.day===4 && allDone) ? '五日假期圓滿結束！' : DAYS[S.day].name+'完成！';
  $('stars').innerHTML = '<span class="lit">★</span>'.repeat(st) + '<span>☆</span>'.repeat(3-st);
  const b = bestOf(S.day);
  $('endStats').innerHTML = '花費 <b>'+fmtTime(S.time)+'</b>'+(b?'｜最佳 <b>'+fmtTime(b)+'</b>':'')+
    (st<3 ? '<br>三星條件：'+DAYS[S.day].fast+' 秒內完成' : '<br>三星滿分，太厲害了！')+
    '<br>假期進度 '+dayStars.reduce((a,c)=>a+c,0)+' / 15 顆星';
  $('nextBtn').style.display = (S.day<4) ? 'inline-block' : 'none';
  $('endOvl').style.display='flex'; $('hud').style.display='none';
  restartBtn.style.display='none';
}

/* ---------- 進出場景 ---------- */
function changeArea(to, ex, ey){
  S.area = to;
  players.forEach((p,i)=>{ p.x = ex + i*40; p.y = ey; p.lying=false; p.bathing=false; p.swimming=false; });
  ambParts.length = 0;   // v6 換場景清空環境粒子（落葉/塵埃形態不同）
  S.doorCooldown = 0.6;
  sfx.door();
  bakeArea();
  updateAmbient();
  showHint('來到了「'+AREA_LABEL[to]+'」', 1);
}
function updateDoors(){
  if(S.doorCooldown>0) return;
  for(const d of AREAS[S.area].doors){
    for(const p of players){
      if(inZone(p,d)){
        if(d.to==='room'||d.to==='lobby') sfx.elevator();
        changeArea(d.to, d.ex, d.ey);
        return;
      }
    }
  }
}
function inZone(p,z){ return p.x>z.x && p.x<z.x+z.w && p.y>z.y && p.y<z.y+z.h; }
function fmtTime(t){ const m=Math.floor(t/60), s=Math.floor(t%60); return m+':'+(s<10?'0':'')+s; }

function updateTaskLabels(){
  $('taskA').textContent = stepLabel(p1);
  $('taskB').textContent = stepLabel(p2);
  $('goalTxt').textContent = goalLabel();
}
// v5：提示訊息加優先權——場景切換的「來到了ＯＯ」（低優先）不再蓋掉還沒讀完的任務指示（高優先），
// 孩子常常連續穿門，原本會來不及看到下一步該做什麼
let hintFade=null, hintExpireAt=0, hintPriority=-1;
function showHint(text, priority=2){
  const now = performance.now();
  if(now < hintExpireAt && priority < hintPriority) return; // 低優先權提示不打斷還在顯示的高優先提示
  hintPriority = priority; hintExpireAt = now + 4200;
  const el=$('hintBar');
  el.textContent=text; el.style.display='block'; el.style.opacity='1';
  clearTimeout(hintFade);
  hintFade=setTimeout(()=>{ el.style.opacity='0'; hintPriority=-1; setTimeout(()=>{el.style.display='none';},600); }, 4200);
}

/* ---------- 觸控：左右半屏浮動搖桿（跟隨拇指、含死區） ----------
   v5 觸控稽核（原本已達標，本輪未改動邏輯，僅覆核）：
   - 本作無跳躍/攻擊等額外操作，移動＝唯一操作，雙搖桿已覆蓋 100% 玩法，重來/靜音/選單皆為原生 <button>
   - 搖桿半徑 R=50（直徑100px）、死區 DEAD=9，遠大於 48px 門檻；muteBtn/restartBtn 52×52px、.bigbtn min-height 50px、
     日曆格 min-height 84px，均 ≥48px
   - html/body 與 canvas 皆 touch-action:none，pointerdown/pointermove 皆 preventDefault，遊玩中不會誤觸捲動/縮放
   - 畫布依 stage 尺寸即時 resize()，直向／橫向皆可玩
   - 標題畫面已同時列出電腦按鍵（WASD／方向鍵）與平板觸控（左右半邊拖曳）兩行說明 ---------- */
const sticks = {};
canvas.addEventListener('pointerdown', e=>{
  if(S.scene!=='play' || e.pointerType==='mouse') return;
  e.preventDefault();
  const who = e.clientX < stage.clientWidth/2 ? 'p1':'p2';
  for(const id in sticks) if(sticks[id].who===who) return;
  sticks[e.pointerId] = { who, bx:e.clientX, by:e.clientY, dx:0, dy:0 };
});
canvas.addEventListener('pointermove', e=>{
  const st=sticks[e.pointerId]; if(!st) return;
  e.preventDefault();
  let dx=e.clientX-st.bx, dy=e.clientY-st.by;
  const len=Math.hypot(dx,dy), DEAD=9, R=50;
  if(len<DEAD){ st.dx=st.dy=0; return; }
  if(len>R){ st.bx=e.clientX-dx/len*R; st.by=e.clientY-dy/len*R; }
  const n=Math.min(len,R)/R; st.dx=dx/len*n; st.dy=dy/len*n;
});
function endStick(e){ delete sticks[e.pointerId]; }
canvas.addEventListener('pointerup', endStick);
canvas.addEventListener('pointercancel', endStick);
canvas.addEventListener('contextmenu', e=>e.preventDefault());
function stickDir(who){ for(const id in sticks) if(sticks[id].who===who) return sticks[id]; return null; }

/* ---------- 畫布尺寸、烘焙 ---------- */
let scale=1, offX=0, offY=0, dpr=1;
const bakeCv = document.createElement('canvas');
const bctx = bakeCv.getContext('2d');
function resize(){
  dpr = Math.min(devicePixelRatio||1, 2);
  canvas.width = stage.clientWidth*dpr; canvas.height = stage.clientHeight*dpr;
  canvas.style.width = stage.clientWidth+'px'; canvas.style.height = stage.clientHeight+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  scale = Math.min(stage.clientWidth/WORLD.w, stage.clientHeight/WORLD.h);
  offX = (stage.clientWidth - WORLD.w*scale)/2;
  offY = (stage.clientHeight - WORLD.h*scale)/2;
  bakeArea();
}
addEventListener('resize', resize);
function toScreen(x,y){ return [x*scale+offX, y*scale+offY]; }

/* 靜態場景畫進離屏（每次進場景／改尺寸時重烘焙一次） */
function bakeArea(){
  bakeCv.width = Math.max(2, canvas.width); bakeCv.height = Math.max(2, canvas.height);
  bctx.setTransform(dpr,0,0,dpr,0,0);
  bctx.fillStyle = '#070b14';
  bctx.fillRect(0,0,stage.clientWidth,stage.clientHeight);
  const g = bctx;
  if(S.area==='outdoor') bakeOutdoor(g);
  else if(S.area==='lobby') bakeLobby(g);
  else if(S.area==='rooftop') bakeRooftop(g);
  else if(S.area==='restaurant') bakeRestaurant(g);
  else if(S.area==='gameroom') bakeGameroom(g);
  else bakeRoom(g);
  bakeLighting(g);
}
/* v6 場景光照層：一次烘焙進靜態層——陽光光束／吊燈光池／窗光＋vignette，主迴圈零成本 */
function bakeLighting(g){
  const W = stage.clientWidth, H = stage.clientHeight;
  g.save();
  g.globalCompositeOperation='lighter';
  if(S.area==='outdoor'){
    const [sx,sy]=toScreen(830,50);
    const rg=g.createRadialGradient(sx,sy,10,sx,sy,H*0.95);
    rg.addColorStop(0,'rgba(255,228,150,.22)'); rg.addColorStop(.5,'rgba(255,214,130,.08)'); rg.addColorStop(1,'rgba(255,214,130,0)');
    g.fillStyle=rg; g.fillRect(0,0,W,H);
  }else if(S.area==='rooftop'){
    const [sx,sy]=toScreen(80,46);
    const rg=g.createRadialGradient(sx,sy,10,sx,sy,H*0.9);
    rg.addColorStop(0,'rgba(255,232,160,.25)'); rg.addColorStop(.5,'rgba(255,220,140,.09)'); rg.addColorStop(1,'rgba(255,220,140,0)');
    g.fillStyle=rg; g.fillRect(0,0,W,H);
  }else if(S.area==='lobby'){
    [[250,150],[450,120],[650,150]].forEach(([wx,wy])=>{
      const [sx,sy]=toScreen(wx,wy);
      const rg=g.createRadialGradient(sx,sy,4,sx,sy,170*scale);
      rg.addColorStop(0,'rgba(255,224,150,.16)'); rg.addColorStop(1,'rgba(255,224,150,0)');
      g.fillStyle=rg; g.beginPath(); g.arc(sx,sy,170*scale,0,Math.PI*2); g.fill();
    });
  }else if(S.area==='restaurant'){
    // 餐廳：每桌上方一盞暖黃吊燈光池
    AREAS.restaurant.tables.concat([[AREAS.restaurant.seat.x,AREAS.restaurant.seat.y]]).forEach(([wx,wy])=>{
      const [sx,sy]=toScreen(wx,wy-20);
      const rg=g.createRadialGradient(sx,sy,4,sx,sy,120*scale);
      rg.addColorStop(0,'rgba(255,200,110,.2)'); rg.addColorStop(1,'rgba(255,200,110,0)');
      g.fillStyle=rg; g.beginPath(); g.arc(sx,sy,120*scale,0,Math.PI*2); g.fill();
    });
  }else if(S.area==='gameroom'){
    // 遊戲室：街機霓虹光暈（青/紫/粉）
    AREAS.gameroom.arcades.forEach(([wx,wy],i)=>{
      const [sx,sy]=toScreen(wx,wy+20);
      const cols=['56,225,255','154,107,255','255,108,199'];
      const rg=g.createRadialGradient(sx,sy,4,sx,sy,130*scale);
      rg.addColorStop(0,'rgba('+cols[i%3]+',.2)'); rg.addColorStop(1,'rgba('+cols[i%3]+',0)');
      g.fillStyle=rg; g.beginPath(); g.arc(sx,sy,130*scale,0,Math.PI*2); g.fill();
    });
  }else{
    // 雙人房：兩扇窗光斜灑
    [[230,240],[640,240]].forEach(([wx,wy])=>{
      const [sx,sy]=toScreen(wx,wy);
      const rg=g.createRadialGradient(sx,sy-120*scale,10,sx,sy,240*scale);
      rg.addColorStop(0,'rgba(180,215,255,.14)'); rg.addColorStop(1,'rgba(180,215,255,0)');
      g.fillStyle=rg; g.beginPath(); g.arc(sx,sy,240*scale,0,Math.PI*2); g.fill();
    });
  }
  g.restore();
  const vg=g.createRadialGradient(W/2,H*0.5,Math.min(W,H)*0.46,W/2,H*0.55,Math.max(W,H)*0.82);
  vg.addColorStop(0,'rgba(4,6,14,0)'); vg.addColorStop(1,'rgba(4,6,14,0.44)');
  g.fillStyle=vg; g.fillRect(0,0,W,H);
}

/* ---------- 場景靜態層（畫在離屏 g 上） ---------- */
function bakeOutdoor(g){
  const [ox,oy] = toScreen(0,0);
  const skyH = 190*scale;
  const grad = g.createLinearGradient(0,oy,0,oy+skyH);
  grad.addColorStop(0,'#4f9fff'); grad.addColorStop(1,'#bfe8ff');
  g.fillStyle=grad; g.fillRect(ox,oy,WORLD.w*scale,skyH);
  // 遠景城市剪影（多一層景深）
  g.fillStyle='rgba(90,130,190,.45)';
  for(let i=0;i<9;i++){
    const bw=rndSeed(i)*40+30, bh=rndSeed(i+20)*60+30;
    g.fillRect(ox+(i*105+10)*scale, oy+skyH-bh*scale, bw*scale, bh*scale);
  }
  g.fillStyle='#ffe98a'; g.beginPath(); g.arc(ox+WORLD.w*scale-70*scale, oy+50*scale, 28*scale,0,Math.PI*2); g.fill();

function roundRectPath(g,x,y,w,h,r){
  g.beginPath();
  g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r);
  g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath();
}
function rndSeed(i){ const v = Math.sin(i*127.1+311.7)*43758.5453; return v-Math.floor(v); }

/* ---------- 更新 ---------- */
function movePlayer(p, dx, dy, dt){
  const len = Math.hypot(dx,dy);
  p.moving = len > .05;
  if(p.moving && (p.lying||p.bathing)){ p.lying=false; p.bathing=false; }
  if(p.moving){
    dx/=len; dy/=len;
    const spd = p.swimming ? p.speed*.6 : p.speed;
    let nx = clamp(p.x + dx*spd*dt, 24, WORLD.w-24);
    let ny = clamp(p.y + dy*spd*dt, 24, WORLD.h-24);
    p.x = nx; p.y = ny;
    p.dir = dx>=0 ? 1 : -1;
    p.walk += dt*8;
    p.stepT -= dt;
    if(p.stepT<=0){ p.stepT=.28; sfx.step(); }
  }
  p.squash = Math.max(0, p.squash - dt*2.2);
}
function update(dt){
  clock += dt;
  updateConfetti(dt); updateFloats(dt); updateBubbles(dt); updateAmbParts(dt);
  S.shake = Math.max(0, S.shake - dt*14);
  if(S.scene!=='play' || S.over) return;
  S.time += dt;
  // v6 鳥鳴：戶外場景隨機啁啾
  chirpT -= dt;
  if(chirpT<=0){
    chirpT = 2.5+Math.random()*4;
    if(S.area==='outdoor'||S.area==='rooftop') sfx.chirp();
  }
  const ct = fmtTime(S.time);
  if(ct !== update._ct){
    update._ct = ct;
    const el = $('clockTxt'); el.textContent = ct;
    // v5：計時器依三星/二星門檻即時變色，玩家不用等到結算才知道自己還在不在星等內
    const D = DAYS[S.day];
    el.style.color = S.time<=D.fast ? '#ffcf5c' : (S.time<=D.par ? '#eaf1ff' : '#ff8a8a');
  }
  S.staffTalkT = Math.max(0, S.staffTalkT - dt);
  S.doorCooldown = Math.max(0, S.doorCooldown - dt);
  updateMini(dt);
  if(mini) return;   // 街機小遊戲進行中：兩人暫停移動，輸入交給小遊戲

  let dx1=0,dy1=0;
  if(keys['KeyW']) dy1--; if(keys['KeyS']) dy1++;
  if(keys['KeyA']) dx1--; if(keys['KeyD']) dx1++;
  const st1 = stickDir('p1'); if(st1){ dx1+=st1.dx; dy1+=st1.dy; }
  movePlayer(p1, dx1, dy1, dt);

  let dx2=0,dy2=0;
  if(keys['ArrowUp']) dy2--; if(keys['ArrowDown']) dy2++;
  if(keys['ArrowLeft']) dx2--; if(keys['ArrowRight']) dx2++;
  const st2 = stickDir('p2'); if(st2){ dx2+=st2.dx; dy2+=st2.dy; }
  if(Math.abs(dx2)+Math.abs(dy2) > .05) p2InputT = clock;
  p2.auto = false;
  if(clock - p2InputT > 2.5 && Math.abs(dx2)+Math.abs(dy2) < .05){
    // MOLLY 自動跟隨 AMY（一根手指也能玩）
    const d = dist(p2.x,p2.y,p1.x,p1.y);
    if(d > 74){ dx2 = (p1.x-p2.x)/d; dy2 = (p1.y-p2.y)/d; p2.auto = true; }
  }
  movePlayer(p2, dx2, dy2, dt);

  updateDoors();
  updateSlide();
  updateArcadeTrigger();
  updateDayTasks(p1, dt); updateDayTasks(p2, dt);
  updateWaiter(dt);
}

function updateConfetti(dt){
  for(let i=confetti.length-1;i>=0;i--){
    const c=confetti[i]; c.x+=c.vx*dt; c.y+=c.vy*dt; c.vy+=420*dt; c.rot+=c.vr*dt; c.life-=dt;
    if(c.life<=0){ confetti[i]=confetti[confetti.length-1]; confetti.pop(); }
  }
}

    ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.rot);
    ctx.globalAlpha=clamp(c.life/c.max*1.6,0,1); ctx.fillStyle=c.color;
    ctx.fillRect(-c.w/2,-c.h/2,c.w,c.h); ctx.restore();
  }
  ctx.globalAlpha=1;
}

let cloudX = 0;
function drawDynamic(t){
  const sc = scale;
  if(S.area==='outdoor' || S.area==='rooftop'){
    // 飄動的雲（兩層視差）
    const baseY = S.area==='outdoor' ? 60 : 55;
    for(let i=0;i<3;i++){
      const cx = ((cloudX*(i%2 ? 14 : 8) + i*320) % (WORLD.w+200)) - 100;
      const [sx,sy]=toScreen(cx, baseY + i*28);
      ctx.fillStyle='rgba(255,255,255,.88)';
      [0,1,2].forEach(k=>{ ctx.beginPath(); ctx.ellipse(sx+k*16*sc, sy, 16*sc, 11*sc,0,0,Math.PI*2); ctx.fill(); });
    }
  }
  // 水波
  const pool = S.area==='outdoor' ? AREAS.outdoor.pool : (S.area==='rooftop' ? AREAS.rooftop.pool : null);
  if(pool){
    const [px,py] = toScreen(pool.x,pool.y);
    ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=1.6;
    for(let i=0;i<4;i++){
      const ph=(t*.5+i/4)%1;
      ctx.globalAlpha=(1-ph)*.7;
      ctx.beginPath(); ctx.ellipse(px+pool.w*sc/2, py+pool.h*sc/2, (pool.w*sc/2)*ph+8, (pool.h*sc/2)*ph+6, 0,0,Math.PI*2); ctx.stroke();
    }
    ctx.globalAlpha=1;
    // v6 波光粼粼：additive 閃爍弧線（假日泳池的陽光反光）
    ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.lineCap='round';
    for(let i=0;i<12;i++){
      const tw=Math.sin(t*2.1+i*1.9);
      if(tw<=0.15) continue;
      const gx=pool.x+14+rndSeed(i*3+1)*(pool.w-28), gy=pool.y+14+rndSeed(i*5+2)*(pool.h-28);
      const [cx2,cy2]=toScreen(gx,gy);
      ctx.globalAlpha=(tw-0.15)*.55;
      ctx.strokeStyle='#e8fbff'; ctx.lineWidth=1.6*sc;
      ctx.beginPath(); ctx.moveTo(cx2-6*sc,cy2); ctx.quadraticCurveTo(cx2,cy2-3.5*sc,cx2+6*sc,cy2); ctx.stroke();
    }

  }
  if(S.area==='room'){

    const gw=tv.w*sc*2.4;
    ctx.drawImage(glowTVCv, tvx+tv.w*sc/2-gw/2, tvy+tv.h*sc/2-gw/2, gw, gw);

// v5：互動熱點缺乏視覺引導，孩子要試探才知道哪裡能互動——依當天任務動態算出「下一步該去哪」，
// 疊加脈動光暈+箭頭，讓玩家一眼就看到目標（呼應「一眼看懂」原則）
function hotspotFor(p){
  const D = S.day;
  if(D===0){
    const c = AREAS.lobby.counter, b = AREAS.room.bedA;
    if(p.step===1) return {area:'lobby', x:c.x+c.w/2, y:c.y+c.h+10};
    if(p.step===2) return {area:'room', x:b.x+b.w/2, y:b.y+b.h/2};
  }else if(D===1){
    const wd = AREAS.room.wardrobe, pl = AREAS.rooftop.pool;
    if(p.step===0) return {area:'room', x:wd.x+wd.w/2, y:wd.y+wd.h/2};
    if(p.step===1) return {area:'rooftop', x:pl.x+pl.w/2, y:pl.y+pl.h/2};
  }else if(D===2){
    // 美食日：先引導到大廳的 B1 樓梯，再引導入座
    const bd = AREAS.lobby.doors[2], st = AREAS.restaurant.seat;
    if(p.step===0 && S.area!=='restaurant') return {area:'lobby', x:bd.x+bd.w/2, y:bd.y+bd.h/2};
    if(p.step===0) return {area:'restaurant', x:st.x, y:st.y+40};
  }else if(D===3){
    // 遊戲日：代幣齊→引導 5F 電梯與街機；打完→引導浴缸
    const gd = AREAS.room.doors[1], ar = AREAS.gameroom.arcades[1], bt = AREAS.room.bathtub;
    if(p.step===1 && S.area==='room') return {area:'room', x:gd.x+gd.w/2, y:gd.y+gd.h/2+20};
    if(p.step===1) return {area:'gameroom', x:ar[0], y:ar[1]+40};
    if(p.step===2) return {area:'room', x:bt.x+bt.w/2, y:bt.y+bt.h/2};
  }else if(D===4){
    const c = AREAS.lobby.counter, gt = AREAS.outdoor.gate;
    if(p.step===1) return {area:'lobby', x:c.x+c.w/2, y:c.y+c.h+10};
    if(p.step===2) return {area:'outdoor', x:gt.x+gt.w/2, y:gt.y+gt.h/2};
  }
  return null;
}
function drawHotspots(t){
  if(S.scene!=='play' || S.over) return;
  const sc = scale, seen = new Set();
  for(const p of players){
    const h = hotspotFor(p);
    if(!h || h.area!==S.area) continue;
    const key = h.x+','+h.y;
    if(seen.has(key)) continue;
    seen.add(key);
    const [sx,sy] = toScreen(h.x,h.y);
    const pulse = 0.5 + Math.sin(t*3.4)*0.5;
    ctx.save();
    ctx.globalAlpha = 0.3 + pulse*0.35;
    ctx.strokeStyle = '#ffcf5c'; ctx.lineWidth = 3*sc;
    ctx.beginPath(); ctx.arc(sx, sy, (24+pulse*9)*sc, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha = 1;
    const ay = sy - (44 + Math.sin(t*3.4)*6)*sc;
    ctx.fillStyle = '#ffcf5c'; ctx.strokeStyle='#c98d1f'; ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(sx, ay+13*sc); ctx.lineTo(sx-7*sc, ay); ctx.lineTo(sx+7*sc, ay); ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.restore();
  }
}

/* ---------- 主迴圈：固定時間步進 ---------- */
const STEP=1/60;
let last=performance.now(), acc=0, tGlobal=0;
function frame(now){
  requestAnimationFrame(frame);
  const dtRaw = Math.min((now-last)/1000,.1); last=now;
  if(S.freeze>0){ S.freeze-=dtRaw; render(tGlobal); return; }
  acc += dtRaw;
  while(acc>=STEP){ acc-=STEP; tGlobal+=STEP; cloudX+=STEP; update(STEP); }
  render(tGlobal);
}
resize();
enterTitle();
requestAnimationFrame(frame);

  setMiniScore(n){ if(mini) mini.score=n; }
};
})();
</script>

<script>/* AI-CAMP-STATS-BEACON */
(function(){
  try{ if(window.top!==window.self) return; }catch(e){ return; } /* 在作品館內由作品館計數與投票 */
  var NS="ai-future-camp", K="AMY-ec6c3b41";
  var ABS="//abacus.jasoncameron.dev/"; /* 直連備援 */
  var REL="/abacus/"; /* 同源代理（Vercel 轉發）：學校閘道擋外部網域時仍然通 */
  function ping(n){
    try{
      fetch(REL+"hit/"+NS+"/"+n).then(function(r){
        if(!r||!r.ok){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); }
      }).catch(function(){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); });
    }catch(e){}
  }
  function read(n,cb){
    function via(base,next){ try{ fetch(base+"get/"+NS+"/"+n).then(function(r){ if(r.status===404&&base===ABS) return {value:0}; if(!r.ok) throw 0; return r.json(); }).then(function(j){ cb(j.value||j.count||0); }).catch(next); }catch(e){ next(); } }
    via(REL, function(){ via(ABS, function(){ cb(null); }); });
  }
  ping(K+"-v");
  var done=false;
  function once(){ if(done)return; done=true; ping(K+"-p"); ping("site-total-plays");
    window.removeEventListener("pointerdown",once); window.removeEventListener("keydown",once); }
  window.addEventListener("pointerdown",once,{once:false}); window.addEventListener("keydown",once,{once:false});
  /* 投票鈕：非常好玩/好玩——與作品館同一計數器，任何網頁打開都同步 */
  function initVotes(){
    if(!document.body) return;
    var wrap=document.createElement("div");
    wrap.style.cssText="position:fixed;right:10px;bottom:10px;z-index:99999;display:flex;gap:6px;font-family:sans-serif;opacity:.92";
    var LS="voted-"+K;
    var defs=[["-love","\u2764\uFE0F","\u975e\u5e38\u597d\u73a9","#ff6cc7"],["-like","\ud83d\udc4d","\u597d\u73a9","#38e1ff"]];
    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;
          b.querySelector("i").textContent=Math.max(0,(n||0)-(c||0));
        }); });
      });
    }
    defs.forEach(function(d){
      var b=document.createElement("button");
      b.type="button"; b.title=d[2];
      b.style.cssText="min-height:42px;padding:8px 14px;border:none;border-radius:999px;background:rgba(15,18,32,.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation";
      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";
      b.addEventListener("click",function(){
        var prev=null; try{ prev=localStorage.getItem(LS); }catch(e){}
        if(prev===d[0]){ ping(K+d[0]+"-c"); try{ localStorage.removeItem(LS); }catch(e){} }
        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);
      });
      btns[d[0]]=b; wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    refresh();
    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* 每10秒同步別人投的票 */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
</script>
