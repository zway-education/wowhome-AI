<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貓咪咖啡廳經營模擬</title>
<style>
  :root{
    --bg1:#fff7ef;
    --bg2:#ffe9d6;
    --wood:#c8946b;
    --wood-dark:#a86f45;
    --accent:#ff8fab;
    --accent-dark:#e56a8a;
    --ink:#4a3428;
    --panel:#fffaf3;
    --shadow: rgba(74,52,40,0.15);
    --gold:#e0a72d;
    --green:#7cb87c;
    --red:#e06060;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Microsoft JhengHei","PingFang TC","Helvetica Neue",Arial,sans-serif;
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
    color:var(--ink);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:16px;
  }
  h1{
    margin:6px 0 12px;
    font-size:1.6rem;
    color:var(--wood-dark);
    text-shadow:1px 1px 0 #fff;
  }
  .wrap{
    width:100%;
    max-width:1100px;
  }
  .topbar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin-bottom:12px;
  }
  .stat{
    background:var(--panel);
    border:2px solid var(--wood);
    border-radius:14px;
    padding:8px 14px;
    min-width:92px;
    text-align:center;
    box-shadow:0 3px 0 var(--shadow);
    font-size:0.85rem;
  }
  .stat b{
    display:block;
    font-size:1.15rem;
    color:var(--wood-dark);
  }
  .layout{
    display:grid;
    grid-template-columns: 2fr 1fr;
    gap:14px;
  }
  @media (max-width:820px){
    .layout{grid-template-columns:1fr;}
  }
  .panel{
    background:var(--panel);
    border-radius:18px;
    border:2px solid var(--wood);
    box-shadow:0 4px 0 var(--shadow);
    padding:14px;
    margin-bottom:14px;
  }
  .panel h2{
    margin:0 0 10px;
    font-size:1.05rem;
    color:var(--wood-dark);
    border-bottom:2px dashed var(--wood);
    padding-bottom:6px;
  }
  #cafeArea{
    position:relative;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(255,235,210,0.9), rgba(0,0,0,0) 60%),
      repeating-linear-gradient(90deg, #e6c6a0 0 40px, #dab88f 40px 80px);
    border-radius:14px;
    height:420px;
    overflow:hidden;
    border:3px solid var(--wood-dark);
    box-shadow: inset 0 10px 30px rgba(80,50,20,0.25), inset 0 -14px 24px rgba(80,50,20,0.18);
  }
  .tile{
    position:absolute;
    width:96px;
    text-align:center;
    cursor:pointer;
    user-select:none;
    transition:transform .15s;
  }
  .tile:hover{transform:scale(1.06);}
  .table{
    width:70px;height:70px;
    background:radial-gradient(circle at 35% 30%, #d1a578, #b98a5e 65%, #9c7048 100%);
    border-radius:10px;
    border:3px solid #8c6440;
    margin:0 auto;
    display:flex;align-items:center;justify-content:center;
    font-size:26px;
    box-shadow:0 6px 0 rgba(0,0,0,0.18), 0 10px 14px rgba(0,0,0,0.2);
    position:relative;
  }
  .table.empty{opacity:0.55;}
  .table .badge{
    position:absolute;
    top:-10px;right:-10px;
    background:var(--red);
    color:#fff;
    border-radius:50%;
    width:20px;height:20px;
    font-size:11px;
    display:flex;align-items:center;justify-content:center;
    border:2px solid #fff;
  }
  .patience-bar{
    position:absolute;
    bottom:-6px;left:6px;right:6px;
    height:5px;
    background:#e8d3ba;
    border-radius:3px;
    overflow:hidden;
  }
  .patience-fill{
    height:100%;
    background:var(--green);
    width:100%;
    transition:width .3s linear, background .3s;
  }
  .label{font-size:0.72rem;margin-top:2px;color:var(--wood-dark);}
  .cat{
    position:absolute;
    font-size:30px;
    cursor:pointer;
    transition: left 1.2s ease, top 1.2s ease, transform .2s;
    filter:drop-shadow(0 6px 4px rgba(0,0,0,0.3));
  }
  .cat:hover{transform:scale(1.15) translateY(-2px);}
  .floatText{
    position:absolute;
    font-weight:bold;
    color:var(--gold);
    font-size:14px;
    pointer-events:none;
    animation:floatUp 1.1s ease-out forwards;
  }
  @keyframes floatUp{
    from{opacity:1; transform:translateY(0);}
    to{opacity:0; transform:translateY(-40px);}
  }
  .shopGrid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .shopItem{
    background:#fff;
    border:2px solid var(--wood);
    border-radius:12px;
    padding:8px;
    text-align:center;
    font-size:0.8rem;
  }
  .shopItem img,.shopItem .icon{
    font-size:28px;
    display:block;
    margin-bottom:4px;
  }
  button{
    font-family:inherit;
    border:none;
    border-radius:10px;
    background:var(--accent);
    color:#fff;
    padding:6px 10px;
    font-size:0.78rem;
    cursor:pointer;
    box-shadow:0 3px 0 var(--accent-dark);
    margin-top:6px;
  }
  button:active{
    transform:translateY(2px);
    box-shadow:0 1px 0 var(--accent-dark);
  }
  button:disabled{
    background:#ccc;
    box-shadow:0 3px 0 #999;
    cursor:not-allowed;
  }
  .catList{
    max-height:230px;
    overflow-y:auto;
  }
  .catCard{
    display:flex;
    align-items:center;
    gap:8px;
    background:#fff;
    border:2px solid var(--wood);
    border-radius:12px;
    padding:6px 8px;
    margin-bottom:6px;
    font-size:0.78rem;
  }
  .catCard .icon{font-size:26px;}
  .catCard .bar{
    background:#e8d3ba;
    border-radius:4px;
    height:6px;
    overflow:hidden;
    margin-top:3px;
  }
  .catCard .fill{height:100%;background:var(--accent);}
  .logBox{
    max-height:150px;
    overflow-y:auto;
    font-size:0.78rem;
    line-height:1.5;
  }
  .logBox div{border-bottom:1px dashed #e8d3ba;padding:2px 0;}
  .tabbtn{
    background:var(--wood);
    box-shadow:0 3px 0 var(--wood-dark);
  }
  .tabbtn.active{
    background:var(--accent);
    box-shadow:0 3px 0 var(--accent-dark);
  }
  .modal-bg{
    position:fixed;inset:0;
    background:rgba(0,0,0,0.4);
    display:flex;align-items:center;justify-content:center;
    z-index:50;
  }
  .modal{
    background:var(--panel);
    border-radius:16px;
    padding:20px;
    max-width:340px;
    text-align:center;
    border:3px solid var(--wood);
  }
  .hidden{display:none !important;}
  .small{font-size:0.72rem;color:#8a6f5a;}
  .rushBanner{
    position:absolute;
    top:6px;left:50%;
    transform:translateX(-50%);
    background:var(--red);
    color:#fff;
    padding:4px 14px;
    border-radius:20px;
    font-size:0.8rem;
    font-weight:bold;
    box-shadow:0 3px 0 rgba(0,0,0,0.2);
    z-index:5;
    animation:pulse 1s infinite alternate;
  }
  @keyframes pulse{from{transform:translateX(-50%) scale(1);} to{transform:translateX(-50%) scale(1.06);}}
  .custTag{
    position:absolute;
    top:-24px;left:50%;
    transform:translateX(-50%);
    font-size:15px;
    white-space:nowrap;
  }
  .staffTile{
    position:absolute;
    font-size:26px;
    transition:left 1s ease, top 1s ease;
  }
  .decoTile{
    position:absolute;
    font-size:24px;
    pointer-events:none;
  }
</style>
</head>
<body>

<h1>🐾 貓咪咖啡廳經營模擬 🐾</h1>

<div class="wrap">
  <div class="topbar">
    <div class="stat">💰 金錢<b id="statMoney">0</b></div>
    <div class="stat">⭐ 聲望<b id="statRep">0</b></div>
    <div class="stat">📅 第<b id="statDay">1</b>天</div>
    <div class="stat">⏰ <b id="statTime">08:00</b></div>
    <div class="stat">😻 貓咪數<b id="statCats">0</b></div>
    <div class="stat">🧑 顧客<b id="statCustomers">0</b></div>
    <div class="stat" style="cursor:pointer;" id="musicToggle">🎵 音樂<b id="musicState">關閉</b></div>
  </div>

  <div class="layout">
    <div>
      <div class="panel">
        <h2>咖啡廳大廳（點桌子上餐、點貓咪互動）</h2>
        <div id="cafeArea"></div>
        <div class="small" style="margin-top:6px;">提示：顧客坐下後會顯示耐心條，記得儘快點擊桌子上餐！貓咪心情越高，顧客小費越多。</div>
      </div>
      <div class="panel">
        <h2>📜 經營日誌</h2>
        <div class="logBox" id="logBox"></div>
      </div>
    </div>

    <div>
      <div class="panel">
        <h2>🐱 貓咪招募</h2>
        <div class="shopGrid" id="catShop"></div>
      </div>

      <div class="panel">
        <h2>🏠 我的貓咪 (<span id="catCount">0</span>)</h2>
        <div class="catList" id="catList"></div>
      </div>

      <div class="panel">
        <h2>🛠 升級與裝潢</h2>
        <div class="shopGrid" id="upgradeShop"></div>
      </div>

      <div class="panel">
        <h2>👩‍🍳 員工僱用</h2>
        <div class="shopGrid" id="staffShop"></div>
      </div>

      <div class="panel">
        <h2>🎀 擺飾收藏 (<span id="decoCount">0</span>)</h2>
        <div class="shopGrid" id="decoShop"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-bg hidden" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">第一天結束！</h2>
    <p id="modalBody"></p>
    <button onclick="nextDay()">開始新的一天 ☀️</button>
  </div>
</div>

<script>
(function(){
  // ---------- 遊戲資料 ----------
  const CAT_TYPES = [
    {key:'tabby', name:'虎斑貓', icon:'🐈', cost:80, income:2, cuteness:3},
    {key:'black', name:'黑貓', icon:'🐈‍⬛', cost:120, income:3, cuteness:4},
    {key:'white', name:'白貓', icon:'🐱', cost:150, income:4, cuteness:5},
    {key:'orange', name:'橘貓', icon:'🐯', cost:200, income:5, cuteness:6},
    {key:'siamese', name:'暹羅貓', icon:'😼', cost:280, income:7, cuteness:7},
    {key:'lion', name:'獅子貓(稀有)', icon:'🦁', cost:500, income:12, cuteness:10},
  ];

  const UPGRADES = [
    {key:'table', name:'新增桌子', icon:'🪑', costBase:100, level:0, max:8, desc:'增加座位數'},
    {key:'menu', name:'菜單升級', icon:'📖', costBase:150, level:0, max:5, desc:'提高每筆訂單收入'},
    {key:'deco', name:'裝潢升級', icon:'🎨', costBase:200, level:0, max:5, desc:'提高聲望與貓咪心情回復'},
    {key:'toy', name:'貓咪玩具', icon:'🧶', costBase:80, level:0, max:5, desc:'貓咪心情上限與恢復速度提升'},
  ];

  // 顧客類型：不同客群有不同耐心、小費倍率、離開時的聲望損失、出現機率權重
  const CUSTOMER_TYPES = [
    {key:'student', name:'學生', icon:'🧑‍🎓', weight:35, patienceMult:0.9, tipMult:0.9, repLoss:1, orderCountRange:[1,1]},
    {key:'office', name:'上班族', icon:'🧑‍💼', weight:28, patienceMult:0.75, tipMult:1.1, repLoss:2, orderCountRange:[1,2]},
    {key:'family', name:'親子家庭', icon:'👨‍👩‍👧', weight:16, patienceMult:1.3, tipMult:1.2, repLoss:2, orderCountRange:[2,3]},
    {key:'elder', name:'長輩', icon:'👵', weight:10, patienceMult:1.5, tipMult:1.0, repLoss:1, orderCountRange:[1,1]},
    {key:'tourist', name:'觀光客', icon:'🧑‍🦱', weight:8, patienceMult:1.0, tipMult:1.5, repLoss:2, orderCountRange:[1,2]},
    {key:'vip', name:'VIP名人', icon:'🧑‍🎤', weight:3, patienceMult:0.6, tipMult:2.5, repLoss:5, orderCountRange:[1,1]},
  ];

  const STAFF_TYPES = [
    {key:'barista', name:'咖啡師', icon:'👩‍🍳', cost:200, desc:'定期自動幫忙上餐一桌'},
    {key:'greeter', name:'迎賓員', icon:'🙋', cost:180, desc:'提升顧客上門機率'},
    {key:'groomer', name:'貓咪美容師', icon:'🧑‍🔧', cost:220, desc:'持續恢復所有貓咪心情'},
  ];

  const DECO_TYPES = [
    {key:'plant', name:'盆栽', icon:'🪴', cost:40, rep:1},
    {key:'lamp', name:'吊燈', icon:'💡', cost:60, rep:2},
    {key:'painting', name:'掛畫', icon:'🖼️', cost:80, rep:2},
    {key:'fishtank', name:'魚缸', icon:'🐠', cost:120, rep:3},
    {key:'piano', name:'鋼琴', icon:'🎹', cost:220, rep:5},
    {key:'fireplace', name:'壁爐', icon:'🔥', cost:300, rep:6},
  ];

  let state = {
    money: 150,
    rep: 0,
    day: 1,
    hour: 8,
    minute: 0,
    cats: [], // {id, key, name, mood, x,y, targetX,targetY}
    tables: [], // {id,x,y, occupied:false, customer:null}
    customers: [],
    upgrades: {table:1, menu:0, deco:0, toy:0}, // table level 1 = 3 seats base
    staff: [], // {key, id, x, y}
    decos: [], // {key, id, x, y}
    catIdSeq: 1,
    staffIdSeq: 1,
    decoIdSeq: 1,
    logs: [],
    running: true,
    rushUntil: 0, // game-minutes timestamp when rush hour ends
    spawnTimerMs: 10000,
  };

  const TICK_MS = 1000;
  const cafeArea = document.getElementById('cafeArea');
  const logBox = document.getElementById('logBox');

  function log(msg){
    state.logs.unshift(`[Day${state.day} ${pad(state.hour)}:${pad(state.minute)}] ${msg}`);
    if(state.logs.length>60) state.logs.pop();
    logBox.innerHTML = state.logs.map(l=>`<div>${l}</div>`).join('');
  }
  function pad(n){return n.toString().padStart(2,'0');}

  function initTables(){
    state.tables = [];
    const count = 3 + (state.upgrades.table-1)*2; // level1=3,level2=5...
    const cols = 4;
    for(let i=0;i<count;i++){
      const col = i%cols, row = Math.floor(i/cols);
      state.tables.push({
        id:i,
        x: 40 + col*130,
        y: 40 + row*150,
        occupied:false,
        customer:null,
      });
    }
    renderTables();
  }

  function renderTables(){
    // remove old table elements
    cafeArea.querySelectorAll('.tableTile').forEach(e=>e.remove());
    state.tables.forEach(t=>{
      const div = document.createElement('div');
      div.className='tile tableTile';
      div.style.left=t.x+'px';
      div.style.top=t.y+'px';
      div.dataset.tid = t.id;
      div.innerHTML = `
        <div class="table ${t.occupied?'':'empty'}">
          ${t.occupied ? t.customer.icon : '🪑'}
          ${t.occupied ? `<div class="badge">${t.customer.orderIcon}</div>` : ''}
          ${t.occupied ? `<div class="patience-bar"><div class="patience-fill" id="pf${t.id}"></div></div>` : ''}
        </div>
        <div class="label">桌${t.id+1}${t.occupied?' · '+t.customer.typeName:''}</div>
      `;
      div.onclick = ()=>serveTable(t.id);
      cafeArea.appendChild(div);
    });
  }

  function updatePatienceBars(){
    state.tables.forEach(t=>{
      if(t.occupied){
        const fill = document.getElementById('pf'+t.id);
        if(fill){
          const pct = Math.max(0, t.customer.patience/t.customer.maxPatience*100);
          fill.style.width = pct+'%';
          fill.style.background = pct>50?'#7cb87c':pct>25?'#e0a72d':'#e06060';
        }
      }
    });
  }

  // ---------- 貓咪 ----------
  function renderCatShop(){
    const shop = document.getElementById('catShop');
    shop.innerHTML='';
    CAT_TYPES.forEach(ct=>{
      const div = document.createElement('div');
      div.className='shopItem';
      div.innerHTML = `
        <div class="icon">${ct.icon}</div>
        <div><b>${ct.name}</b></div>
        <div class="small">收益+${ct.income}/單 萌度${ct.cuteness}</div>
        <button data-key="${ct.key}">💰${ct.cost}</button>
      `;
      div.querySelector('button').onclick = ()=>buyCat(ct);
      shop.appendChild(div);
    });
  }

  function buyCat(ct){
    if(state.money < ct.cost){ log(`💸 金錢不足，無法招募 ${ct.name}`); return; }
    if(state.cats.length >= state.tables.length + 3){ log(`🏠 咖啡廳空間不足，請先升級裝潢`); return; }
    state.money -= ct.cost;
    const cat = {
      id: state.catIdSeq++,
      key: ct.key,
      name: ct.name,
      icon: ct.icon,
      income: ct.income,
      cuteness: ct.cuteness,
      mood: 80,
      x: 20+Math.random()*(cafeArea.clientWidth-80),
      y: 260+Math.random()*120,
    };
    state.cats.push(cat);
    log(`🎉 招募了新貓咪：${ct.icon} ${ct.name}！`);
    renderCatList();
    renderCatsOnFloor();
    updateStats();
  }

  function renderCatList(){
    document.getElementById('catCount').textContent = state.cats.length;
    const list = document.getElementById('catList');
    list.innerHTML='';
    state.cats.forEach(c=>{
      const div = document.createElement('div');
      div.className='catCard';
      div.innerHTML = `
        <div class="icon">${c.icon}</div>
        <div style="flex:1;">
          <div><b>${c.name}</b> #${c.id}</div>
          <div class="bar"><div class="fill" style="width:${c.mood}%;"></div></div>
          <div class="small">心情 ${Math.round(c.mood)}% ・ 收益加成 +${c.income}</div>
        </div>
      `;
      list.appendChild(div);
    });
  }

  function renderCatsOnFloor(){
    cafeArea.querySelectorAll('.catTile').forEach(e=>e.remove());
    state.cats.forEach(c=>{
      const div = document.createElement('div');
      div.className='cat catTile';
      div.style.left = c.x+'px';
      div.style.top = c.y+'px';
      div.textContent = c.icon;
      div.title = `${c.name} 心情:${Math.round(c.mood)}%`;
      div.onclick = (e)=>petCat(c, e);
      cafeArea.appendChild(div);
    });
  }

  function petCat(cat, ev){
    cat.mood = Math.min(100 + state.upgrades.toy*5, cat.mood + 15 + state.upgrades.toy*3);
    floatText('+😊', ev.clientX, ev.clientY, '#ff8fab');
    renderCatList();
  }

  function moveCatsRandomly(){
    state.cats.forEach(c=>{
      if(Math.random()<0.35){
        c.x = Math.max(10, Math.min(cafeArea.clientWidth-40, c.x + (Math.random()-0.5)*160));
        c.y = Math.max(230, Math.min(cafeArea.clientHeight-40, c.y + (Math.random()-0.5)*100));
      }
    });
    renderCatsOnFloor();
  }

  // ---------- 顧客 ----------
  const ORDER_TYPES = [
    {icon:'☕', name:'咖啡', base:15},
    {icon:'🍰', name:'蛋糕', base:25},
    {icon:'🥤', name:'飲料', base:12},
    {icon:'🍪', name:'餅乾', base:10},
    {icon:'🥪', name:'三明治', base:22},
    {icon:'🍮', name:'布丁', base:18},
    {icon:'🍦', name:'冰淇淋', base:20},
    {icon:'🥐', name:'可頌', base:16},
  ];

  function pickCustomerType(){
    const total = CUSTOMER_TYPES.reduce((a,c)=>a+c.weight,0);
    let r = Math.random()*total;
    for(const ct of CUSTOMER_TYPES){
      if(r < ct.weight) return ct;
      r -= ct.weight;
    }
    return CUSTOMER_TYPES[0];
  }

  // 來客間隔：平常最長10秒一位，尖峰/高聲望/員工加成後最快2秒一位
  function computeSpawnIntervalMs(){
    let interval = 10000;
    interval -= state.rep * 60;
    interval -= state.upgrades.deco * 400;
    interval -= state.decos.length * 250;
    if(state.staff.some(s=>s.key==='greeter')) interval -= 1500;
    if(isRushHour()) interval *= 0.25;
    return Math.max(2000, Math.min(10000, interval));
  }

  function trySpawnCustomer(){
    const freeTables = state.tables.filter(t=>!t.occupied);
    if(freeTables.length===0) return;
    const table = freeTables[Math.floor(Math.random()*freeTables.length)];
    const ctype = pickCustomerType();
    const orderCount = ctype.orderCountRange[0] + Math.floor(Math.random()*(ctype.orderCountRange[1]-ctype.orderCountRange[0]+1));
    const orders = Array.from({length:orderCount}, ()=>ORDER_TYPES[Math.floor(Math.random()*ORDER_TYPES.length)]);
    const orderBase = orders.reduce((a,o)=>a+o.base,0);
    const avgCuteness = state.cats.length ? state.cats.reduce((a,c)=>a+c.cuteness,0)/state.cats.length : 1;
    const patienceMax = Math.round((18 + state.upgrades.deco*2) * ctype.patienceMult);
    table.occupied = true;
    table.customer = {
      typeKey: ctype.key,
      typeName: ctype.name,
      icon: ctype.icon,
      tipMult: ctype.tipMult,
      repLoss: ctype.repLoss,
      orderIcon: orders.map(o=>o.icon).join(''),
      orderName: orders.map(o=>o.name).join('、'),
      base: orderBase,
      patience: patienceMax,
      maxPatience: patienceMax,
      cutenessBonus: avgCuteness,
    };
    renderTables();
    updateStats();
  }

  function isRushHour(){
    return (state.hour*60+state.minute) < state.rushUntil;
  }

  function maybeTriggerRushHour(){
    if(isRushHour()) return;
    if(Math.random() < 0.02){
      const durMin = 40 + Math.floor(Math.random()*40);
      state.rushUntil = state.hour*60 + state.minute + durMin;
      log(`🔥 尖峰時段開始！顧客流量大增（持續約${durMin}分鐘）`);
      showRushBanner(true);
      setTimeout(()=>{}, 0);
    }
  }

  let rushBannerEl = null;
  function showRushBanner(show){
    if(show){
      if(!rushBannerEl){
        rushBannerEl = document.createElement('div');
        rushBannerEl.className='rushBanner';
        rushBannerEl.textContent='🔥 尖峰時段！顧客湧入中';
        cafeArea.appendChild(rushBannerEl);
      }
    } else if(rushBannerEl){
      rushBannerEl.remove();
      rushBannerEl = null;
    }
  }

  function serveTable(id){
    const t = state.tables.find(x=>x.id===id);
    if(!t || !t.occupied) return;
    const c = t.customer;
    const menuBonus = 1 + state.upgrades.menu*0.15;
    const catMoodAvg = state.cats.length ? state.cats.reduce((a,ct)=>a+ct.mood,0)/state.cats.length/100 : 0.5;
    const tipMultiplier = (1 + (c.cutenessBonus*0.05) + (catMoodAvg*0.4)) * c.tipMult;
    const revenue = Math.round(c.base * menuBonus * tipMultiplier);
    state.money += revenue;
    state.rep += 1;
    log(`✅ ${c.icon}${c.typeName} 在桌${id+1} 點了 ${c.orderIcon}${c.orderName}，收入 💰${revenue}`);
    const tileEl = cafeArea.querySelector(`.tableTile[data-tid="${id}"] .table`);
    if(tileEl){
      const rect = tileEl.getBoundingClientRect();
      floatText('+💰'+revenue, rect.left+30, rect.top, '#e0a72d');
    }
    t.occupied = false;
    t.customer = null;
    renderTables();
    updateStats();
  }

  function autoServeByStaff(){
    if(!state.staff.some(s=>s.key==='barista')) return;
    const occupied = state.tables.filter(t=>t.occupied);
    if(occupied.length===0) return;
    if(Math.random() < 0.35){
      const t = occupied[Math.floor(Math.random()*occupied.length)];
      log(`👩‍🍳 咖啡師自動幫忙服務了桌${t.id+1}`);
      serveTable(t.id);
    }
  }

  function tickCustomerPatience(){
    let leftCount = 0;
    state.tables.forEach(t=>{
      if(t.occupied){
        t.customer.patience -= 1;
        if(t.customer.patience<=0){
          const loss = t.customer.repLoss;
          t.occupied=false;
          t.customer=null;
          state.rep = Math.max(0, state.rep-loss);
          leftCount++;
        }
      }
    });
    if(leftCount>0){
      log(`😠 有 ${leftCount} 位顧客等太久離開了`);
      renderTables();
      updateStats();
    } else {
      updatePatienceBars();
    }
  }

  function floatText(text,pageX,pageY,color){
    const rect = cafeArea.getBoundingClientRect();
    const div = document.createElement('div');
    div.className='floatText';
    div.style.color = color||'#e0a72d';
    div.style.left = (pageX-rect.left)+'px';
    div.style.top = (pageY-rect.top)+'px';
    div.textContent = text;
    cafeArea.appendChild(div);
    setTimeout(()=>div.remove(),1100);
  }

  // ---------- 升級 ----------
  function upgradeCost(u){
    return Math.round(u.costBase * Math.pow(1.6, u.level));
  }

  function renderUpgradeShop(){
    const shop = document.getElementById('upgradeShop');
    shop.innerHTML='';
    UPGRADES.forEach(u=>{
      const level = state.upgrades[u.key];
      const cost = Math.round(u.costBase * Math.pow(1.6, level));
      const maxed = level >= u.max;
      const div = document.createElement('div');
      div.className='shopItem';
      div.innerHTML = `
        <div class="icon">${u.icon}</div>
        <div><b>${u.name}</b></div>
        <div class="small">${u.desc}</div>
        <div class="small">等級 ${level}/${u.max}</div>
        <button ${maxed?'disabled':''}>${maxed?'已滿級':'💰'+cost}</button>
      `;
      div.querySelector('button').onclick = ()=>buyUpgrade(u);
      shop.appendChild(div);
    });
  }

  function buyUpgrade(u){
    const level = state.upgrades[u.key];
    if(level >= u.max) return;
    const cost = Math.round(u.costBase * Math.pow(1.6, level));
    if(state.money < cost){ log(`💸 金錢不足，無法升級 ${u.name}`); return; }
    state.money -= cost;
    state.upgrades[u.key] += 1;
    log(`🔧 升級了「${u.name}」到等級 ${state.upgrades[u.key]}`);
    if(u.key==='table') initTables();
    renderUpgradeShop();
    updateStats();
  }

  // ---------- 員工 ----------
  function renderStaffShop(){
    const shop = document.getElementById('staffShop');
    shop.innerHTML='';
    STAFF_TYPES.forEach(s=>{
      const hired = state.staff.some(x=>x.key===s.key);
      const div = document.createElement('div');
      div.className='shopItem';
      div.innerHTML = `
        <div class="icon">${s.icon}</div>
        <div><b>${s.name}</b></div>
        <div class="small">${s.desc}</div>
        <button ${hired?'disabled':''}>${hired?'已僱用':'💰'+s.cost}</button>
      `;
      div.querySelector('button').onclick = ()=>hireStaff(s);
      shop.appendChild(div);
    });
  }

  function hireStaff(s){
    if(state.staff.some(x=>x.key===s.key)) return;
    if(state.money < s.cost){ log(`💸 金錢不足，無法僱用 ${s.name}`); return; }
    state.money -= s.cost;
    state.staff.push({
      key:s.key, id:state.staffIdSeq++, icon:s.icon,
      x: 20+Math.random()*(cafeArea.clientWidth-80),
      y: 40+Math.random()*100,
    });
    log(`👋 僱用了新員工：${s.icon} ${s.name}！`);
    renderStaffShop();
    renderStaffOnFloor();
    updateStats();
  }

  function renderStaffOnFloor(){
    cafeArea.querySelectorAll('.staffTile').forEach(e=>e.remove());
    state.staff.forEach(s=>{
      const div = document.createElement('div');
      div.className='staffTile';
      div.style.left=s.x+'px';
      div.style.top=s.y+'px';
      div.textContent=s.icon;
      cafeArea.appendChild(div);
    });
  }

  function moveStaffRandomly(){
    state.staff.forEach(s=>{
      if(Math.random()<0.3){
        s.x = Math.max(10, Math.min(cafeArea.clientWidth-40, s.x + (Math.random()-0.5)*140));
        s.y = Math.max(10, Math.min(160, s.y + (Math.random()-0.5)*80));
      }
    });
    renderStaffOnFloor();
  }

  function groomerEffect(){
    if(!state.staff.some(s=>s.key==='groomer')) return;
    state.cats.forEach(c=>{
      c.mood = Math.min(100 + state.upgrades.toy*5, c.mood + 0.8);
    });
  }

  // ---------- 擺飾 ----------
  function renderDecoShop(){
    const shop = document.getElementById('decoShop');
    shop.innerHTML='';
    DECO_TYPES.forEach(d=>{
      const div = document.createElement('div');
      div.className='shopItem';
      div.innerHTML = `
        <div class="icon">${d.icon}</div>
        <div><b>${d.name}</b></div>
        <div class="small">聲望+${d.rep}・提升來客率</div>
        <button>💰${d.cost}</button>
      `;
      div.querySelector('button').onclick = ()=>buyDeco(d);
      shop.appendChild(div);
    });
  }

  function buyDeco(d){
    if(state.money < d.cost){ log(`💸 金錢不足，無法購買 ${d.name}`); return; }
    state.money -= d.cost;
    state.rep += d.rep;
    state.decos.push({
      key:d.key, id:state.decoIdSeq++, icon:d.icon,
      x: 10+Math.random()*(cafeArea.clientWidth-40),
      y: 10+Math.random()*(cafeArea.clientHeight-40),
    });
    log(`🎀 添購了擺飾：${d.icon} ${d.name}，聲望+${d.rep}`);
    document.getElementById('decoCount').textContent = state.decos.length;
    renderDecoOnFloor();
    updateStats();
  }

  function renderDecoOnFloor(){
    cafeArea.querySelectorAll('.decoTile').forEach(e=>e.remove());
    state.decos.forEach(d=>{
      const div = document.createElement('div');
      div.className='decoTile';
      div.style.left=d.x+'px';
      div.style.top=d.y+'px';
      div.textContent=d.icon;
      cafeArea.appendChild(div);
    });
  }

  // ---------- 時間 / 主循環 ----------
  function updateStats(){
    document.getElementById('statMoney').textContent = state.money;
    document.getElementById('statRep').textContent = state.rep;
    document.getElementById('statDay').textContent = state.day;
    document.getElementById('statTime').textContent = `${pad(state.hour)}:${pad(state.minute)}`;
    document.getElementById('statCats').textContent = state.cats.length;
    document.getElementById('statCustomers').textContent = state.tables.filter(t=>t.occupied).length;
    renderCatList();
  }

  function gameTick(){
    if(!state.running) return;
    state.minute += 10;
    if(state.minute>=60){ state.minute=0; state.hour++; }
    // cat mood natural decay slower with toy upgrade
    state.cats.forEach(c=>{
      c.mood = Math.max(0, c.mood - (0.6 - state.upgrades.toy*0.05));
    });
    groomerEffect();
    tickCustomerPatience();
    maybeTriggerRushHour();
    if(!isRushHour()) showRushBanner(false);
    state.spawnTimerMs -= TICK_MS;
    if(state.spawnTimerMs <= 0){
      trySpawnCustomer();
      state.spawnTimerMs = computeSpawnIntervalMs();
    }
    autoServeByStaff();
    moveCatsRandomly();
    moveStaffRandomly();
    updateStats();

    if(state.hour >= 22){
      endDay();
      return;
    }
  }

  function endDay(){
    state.running = false;
    const bonus = 20 + state.rep;
    state.money += bonus;
    document.getElementById('modalTitle').textContent = `第 ${state.day} 天結束！`;
    document.getElementById('modalBody').innerHTML = `今天辛苦了！<br>營業獎金 💰${bonus}<br>目前總金錢：💰${state.money}<br>目前聲望：⭐${state.rep}`;
    document.getElementById('modalBg').classList.remove('hidden');
  }

  window.nextDay = function(){
    document.getElementById('modalBg').classList.add('hidden');
    state.day += 1;
    state.hour = 8;
    state.minute = 0;
    state.tables.forEach(t=>{t.occupied=false; t.customer=null;});
    state.rushUntil = 0;
    state.spawnTimerMs = 10000;
    showRushBanner(false);
    state.running = true;
    renderTables();
    updateStats();
    log(`☀️ 第 ${state.day} 天開始營業！`);
  };

  // ---------- 溫馨背景音樂 (Web Audio 即時合成，無需外部音檔) ----------
  const Music = (function(){
    let ctx = null, master, filter, delay, feedback, playing = false, chordTimer = null, sparkleTimer = null;
    // 溫暖爵士風和絃進行 (Cmaj7 - Am7 - Fmaj7 - G7)，以 Hz 表示
    const CHORDS = [
      [261.63, 329.63, 392.00, 493.88], // Cmaj7
      [220.00, 261.63, 329.63, 392.00], // Am7
      [174.61, 220.00, 261.63, 349.23], // Fmaj7
      [196.00, 246.94, 293.66, 349.23], // G7
    ];
    let chordIndex = 0;

    function ensureCtx(){
      if(ctx) return;
      ctx = new (window.AudioContext||window.webkitAudioContext)();
      master = ctx.createGain();
      master.gain.value = 0.0001;
      filter = ctx.createBiquadFilter();
      filter.type='lowpass';
      filter.frequency.value = 1400;
      delay = ctx.createDelay();
      delay.delayTime.value = 0.38;
      feedback = ctx.createGain();
      feedback.gain.value = 0.28;
      delay.connect(feedback);
      feedback.connect(delay);
      master.connect(filter);
      filter.connect(ctx.destination);
      filter.connect(delay);
      delay.connect(ctx.destination);
    }

    function playPad(freqs, duration){
      const now = ctx.currentTime;
      freqs.forEach((f,i)=>{
        [0.997, 1.003].forEach(detune=>{
          const osc = ctx.createOscillator();
          osc.type = i===0 ? 'sine' : 'triangle';
          osc.frequency.value = f*detune;
          const g = ctx.createGain();
          g.gain.setValueAtTime(0.0001, now);
          g.gain.linearRampToValueAtTime(0.05/freqs.length, now+1.4);
          g.gain.linearRampToValueAtTime(0.0001, now+duration-0.4);
          osc.connect(g);
          g.connect(master);
          osc.start(now);
          osc.stop(now+duration+0.1);
        });
      });
    }

    function playSparkle(){
      if(!playing) return;
      const chord = CHORDS[chordIndex];
      const f = chord[Math.floor(Math.random()*chord.length)]*2;
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      osc.type='sine';
      osc.frequency.value = f;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, now);
      g.gain.linearRampToValueAtTime(0.06, now+0.05);
      g.gain.exponentialRampToValueAtTime(0.0001, now+1.1);
      osc.connect(g);
      g.connect(delay);
      g.connect(master);
      osc.start(now);
      osc.stop(now+1.2);
      sparkleTimer = setTimeout(playSparkle, 900+Math.random()*900);
    }

    function scheduleChord(){
      if(!playing) return;
      const duration = 4.2;
      playPad(CHORDS[chordIndex], duration);
      chordIndex = (chordIndex+1) % CHORDS.length;
      chordTimer = setTimeout(scheduleChord, duration*1000);
    }

    function start(){
      ensureCtx();
      if(ctx.state==='suspended') ctx.resume();
      playing = true;
      master.gain.cancelScheduledValues(ctx.currentTime);
      master.gain.linearRampToValueAtTime(1, ctx.currentTime+1.5);
      scheduleChord();
      playSparkle();
    }

    function stop(){
      playing = false;
      clearTimeout(chordTimer);
      clearTimeout(sparkleTimer);
      if(ctx){
        master.gain.cancelScheduledValues(ctx.currentTime);
        master.gain.linearRampToValueAtTime(0.0001, ctx.currentTime+1);
      }
    }

    function toggle(){
      if(playing){ stop(); return false; }
      start(); return true;
    }

    return { toggle };
  })();

  document.getElementById('musicToggle').onclick = ()=>{
    const on = Music.toggle();
    document.getElementById('musicState').textContent = on ? '播放中' : '關閉';
  };

  // ---------- 初始化 ----------
  function init(){
    initTables();
    renderCatShop();
    renderUpgradeShop();
    renderStaffShop();
    renderDecoShop();
    renderCatList();
    updateStats();
    log('🏪 咖啡廳開張了！招募貓咪並開始經營吧～');
    setInterval(gameTick, TICK_MS);
  }

  init();
})();
</script>
