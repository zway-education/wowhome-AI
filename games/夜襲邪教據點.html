<title>夜襲：邪教據點 — 99 Nights 3D 同人動畫</title>
<style>
  :root{
    --bg-0:#060b08;
    --bg-1:#0c1710;
    --fire:#ef8a3d;
    --fire-hot:#ffd27a;
    --amber:#c9a15a;
    --blood:#8f2f2f;
    --bone:#d9d3c1;
    --hud-line:#2c4432;
    --ink:#e7e2d2;
    --ink-dim:#9fae9c;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg-0);
    color:var(--ink);
    font-family:"Bahnschrift","Segoe UI Semibold","Arial Narrow Bold",Arial,sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
    padding:28px 16px 40px;
    min-height:100vh;
  }
  .frame{
    position:relative;
    width:min(980px,96vw);
    height:min(560px,60vw);
    border:2px solid #000;
    outline:1px solid #3a2c18;
    box-shadow:0 0 0 6px var(--bg-1), 0 0 0 8px #000, 0 30px 70px -18px rgba(0,0,0,.85);
    background:radial-gradient(120% 90% at 50% 20%, #16281a 0%, #0b1610 70%);
    overflow:hidden;
    filter:contrast(1.05) saturate(1.2) brightness(1.28);
  }
  .stage{
    position:absolute; inset:0;
    perspective:1600px;
    perspective-origin:50% 38%;
  }
  .world{
    position:absolute; left:50%; top:62%;
    width:0; height:0;
    transform-style:preserve-3d;
    transform: rotateX(66deg);
  }
  .skybox{
    position:absolute; inset:0;
    transform-style:preserve-3d;
  }
  .stars{position:absolute; inset:0;}
  .moon{
    position:absolute; width:88px; height:88px; border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #fffdf3, #e6e2c9 70%, #cdc7a8 100%);
    box-shadow:0 0 90px 30px rgba(233,230,207,.32);
    top:8%; right:9%;
  }

  /* generic 3D prop wrapper: holds two crossed planes */
  .prop{
    position:absolute; left:0; top:0;
    transform-style:preserve-3d;
  }
  .plane{
    position:absolute; left:0; top:0;
    transform-origin:center bottom;
    background-size:100% 100%;
    background-repeat:no-repeat;
    image-rendering:auto;
    pointer-events:none;
  }

  .ground{
    position:absolute; left:-1200px; top:0; width:2400px; height:2400px;
    transform: rotateX(-90deg) translateZ(0);
  }
  .fog{
    position:absolute; inset:0;
    background:radial-gradient(60% 55% at 50% 55%, rgba(10,18,13,0) 0%, rgba(10,18,13,.18) 72%, rgba(10,18,13,.55) 100%);
    pointer-events:none;
  }
  .grain{
    position:absolute; inset:-40px; pointer-events:none; mix-blend-mode:overlay; opacity:.14;
    background-size:180px 180px;
  }
  .vignette{
    position:absolute; inset:0; pointer-events:none;
    box-shadow: inset 0 0 130px 30px rgba(0,0,0,.5);
  }
  .firelight{
    position:absolute; inset:0; pointer-events:none; mix-blend-mode:soft-light;
    background:radial-gradient(52% 54% at 50% 66%, rgba(255,170,90,.75) 0%, rgba(255,170,90,0) 65%);
  }
  .moonlight{
    position:absolute; inset:0; pointer-events:none; mix-blend-mode:soft-light;
    background:radial-gradient(42% 46% at 82% 12%, rgba(210,220,240,.5) 0%, rgba(210,220,240,0) 70%);
  }

  .hud{
    position:absolute; inset:0; pointer-events:none;
    font-family:"Consolas","Courier New",monospace;
  }
  .hud-top{position:absolute; top:14px; left:16px; right:16px; display:flex; justify-content:space-between; align-items:flex-start;}
  .night-badge{
    background:linear-gradient(180deg, rgba(20,30,20,.85), rgba(6,11,8,.85));
    border:1px solid var(--hud-line); border-top-color:rgba(255,255,255,.08);
    box-shadow:0 2px 8px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06);
    border-radius:2px;
    padding:6px 14px 5px; letter-spacing:.14em; font-size:12px; color:var(--amber);
    text-shadow:0 0 6px rgba(201,161,90,.5);
  }
  .night-badge b{
    display:block; font-family:"Impact","Arial Black",Arial,sans-serif;
    font-size:21px; letter-spacing:.06em; color:var(--bone); -webkit-text-stroke:.6px #000;
  }
  .bars{
    display:flex; flex-direction:column; gap:7px; width:158px;
    background:linear-gradient(180deg, rgba(20,30,20,.85), rgba(6,11,8,.85));
    border:1px solid var(--hud-line); border-top-color:rgba(255,255,255,.08);
    box-shadow:0 2px 8px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06);
    border-radius:2px; padding:9px 11px;
  }
  .bar-row{display:flex; align-items:center; gap:7px; font-size:10px; letter-spacing:.08em; color:var(--ink-dim);}
  .bar-track{
    flex:1; height:8px; background:#050a06; border:1px solid #000; border-radius:1px;
    position:relative; overflow:hidden;
    box-shadow:inset 0 1px 2px rgba(0,0,0,.8);
  }
  .bar-fill{
    position:absolute; inset:0; width:100%; transform-origin:left;
    transition:transform .35s cubic-bezier(.3,.9,.4,1), filter .2s;
  }
  .bar-track::after{
    content:''; position:absolute; inset:0;
    background-image:repeating-linear-gradient(90deg, rgba(0,0,0,.35) 0 1px, transparent 1px 15px);
    pointer-events:none;
  }
  .fill-stam{background:linear-gradient(90deg,#b6e07f,#5aa03e); box-shadow:0 0 6px rgba(140,210,90,.5);}
  .fill-hunger{background:linear-gradient(90deg,var(--fire-hot),var(--fire)); box-shadow:0 0 6px rgba(239,138,61,.5);}
  .fill-stam.low{ filter:hue-rotate(-70deg) saturate(1.6); animation:pulse-warn 0.7s infinite; }
  @keyframes pulse-warn{ 50%{ opacity:.55; } }

  .subtitle-box{
    position:absolute; left:50%; bottom:16px; transform:translateX(-50%);
    max-width:88%; text-align:center;
    background:rgba(6,11,8,.68); border:1px solid var(--hud-line);
    padding:8px 18px; font-size:14px; color:var(--ink);
  }
  .drag-hint{
    position:absolute; top:14px; left:50%; transform:translateX(-50%);
    font-size:10.5px; letter-spacing:.1em; color:var(--ink-dim);
    background:rgba(8,14,10,.55); border:1px solid var(--hud-line); padding:4px 10px;
  }

  h1{
    font-family:"Impact","Arial Narrow Bold",Arial,sans-serif; font-weight:400;
    font-size:clamp(28px,4.4vw,46px); letter-spacing:.03em; margin:0; color:var(--bone);
    text-shadow:0 2px 0 #000, 0 0 22px rgba(239,138,61,.35); text-wrap:balance; text-align:center;
  }
  .kicker{
    font-family:"Consolas","Courier New",monospace; font-size:12px; letter-spacing:.32em;
    text-transform:uppercase; color:var(--amber); text-align:center;
  }
  .caption{max-width:640px; text-align:center; color:var(--ink-dim); font-size:14.5px; line-height:1.7; padding:0 12px;}
  .caption b{color:var(--bone); font-weight:600;}

  .controls{
    position:absolute; bottom:14px; right:14px; pointer-events:auto;
    display:flex; align-items:flex-end; gap:14px;
  }
  .dpad{
    display:grid; grid-template-columns:repeat(3,34px); grid-template-rows:repeat(3,34px); gap:4px;
  }
  .dpad button{
    grid-column:auto; background:rgba(8,14,10,.75); border:1px solid var(--hud-line); color:var(--ink);
    font-family:"Consolas","Courier New",monospace; font-size:14px; border-radius:4px; cursor:pointer;
  }
  .dpad button:active{ background:rgba(201,161,90,.35); }
  .atk-btn{
    width:64px; height:64px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #b5432f, #6d1f1a);
    border:2px solid #2a0f0c; color:#f4ece0; font-weight:700; letter-spacing:.05em;
    font-family:"Consolas","Courier New",monospace; font-size:13px; cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,.5);
  }
  .atk-btn:active{ filter:brightness(1.25); }
  .kbd-hint{
    position:absolute; top:14px; right:14px; text-align:right;
    font-size:10.5px; letter-spacing:.06em; color:var(--ink-dim); line-height:1.6;
    background:rgba(8,14,10,.55); border:1px solid var(--hud-line); padding:6px 10px;
  }
  .objective{
    position:absolute; left:50%; bottom:16px; transform:translateX(-50%);
    max-width:78%; text-align:center;
    background:linear-gradient(180deg, rgba(20,30,20,.85), rgba(6,11,8,.85));
    border:1px solid var(--amber); border-radius:2px;
    box-shadow:0 4px 14px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06);
    padding:8px 22px; font-size:14px; color:var(--ink); letter-spacing:.02em;
    transition:box-shadow .2s;
  }
  .toast{
    position:absolute; left:50%; top:44%; transform:translate(-50%,-50%) scale(0.9);
    font-family:"Impact","Arial Narrow Bold",Arial,sans-serif;
    font-size:34px; color:var(--bone); text-shadow:0 3px 0 #000, 0 0 30px rgba(239,138,61,.6);
    opacity:0; transition:opacity .3s, transform .3s; text-align:center; pointer-events:none;
  }
  .toast.show{ opacity:1; transform:translate(-50%,-50%) scale(1); }

  .stage.shake{ animation:cam-shake .22s ease; }
  @keyframes cam-shake{
    0%{ transform:translate(0,0); } 20%{ transform:translate(-3px,2px); }
    40%{ transform:translate(3px,-2px); } 60%{ transform:translate(-2px,-2px); }
    80%{ transform:translate(2px,2px); } 100%{ transform:translate(0,0); }
  }
  .flash-hit{
    position:absolute; inset:0; pointer-events:none; background:rgba(255,220,180,0);
    transition:background .08s;
  }
</style>

<div class="kicker">Roblox · 99 Nights in the Forest</div>
<h1>夜襲邪教據點（可玩版）</h1>

<div class="frame">
  <div class="stage" id="stage">
    <div class="skybox">
      <div class="moon"></div>
    </div>
    <div class="world" id="world">
      <canvas class="ground" id="groundCanvas"></canvas>
    </div>
    <div class="fog"></div>
    <div class="moonlight"></div>
    <div class="firelight" id="firelight"></div>
    <div class="grain" id="grain"></div>
    <div class="vignette"></div>
    <div class="flash-hit" id="flashHit"></div>
  </div>
  <div class="hud">
    <div class="drag-hint">拖曳畫面旋轉鏡頭</div>
    <div class="hud-top">
      <div class="night-badge">DAY<b id="dayNum">47</b></div>
      <div class="bars">
        <div class="bar-row">體力<div class="bar-track"><div class="bar-fill fill-stam" id="stamBar"></div></div></div>
        <div class="bar-row">飢餓<div class="bar-track"><div class="bar-fill fill-hunger" id="hungerBar"></div></div></div>
      </div>
    </div>
    <div class="kbd-hint">WASD / 方向鍵：移動<br>E / 攻擊鍵：揮砍</div>
    <div class="objective" id="objective">潛入據點，靠近信徒後按 E 攻擊</div>
    <div class="toast" id="toast"></div>
    <div class="controls">
      <div class="dpad">
        <span></span><button id="btnU">▲</button><span></span>
        <button id="btnL">◀</button><span></span><button id="btnR">▶</button>
        <span></span><button id="btnD">▼</button><span></span>
      </div>
      <button class="atk-btn" id="btnAtk">攻擊</button>
    </div>
  </div>
</div>

<p class="caption">
  這次改成<b>可互動的小遊戲</b>：操作玩家潛入邪教據點，靠近信徒後按 <b>E</b>（或點攻擊鈕）揮砍擊倒他們，
  清空據點後前往中央祭壇搶奪戰利品，再撤回森林邊界完成這一夜的突襲——每成功一次，天數就會 +1，
  體力會隨攻擊消耗、飢餓隨時間下降。用 <b>WASD / 方向鍵</b>移動，拖曳畫面可自由旋轉鏡頭視角。
</p>

<script>
(function(){
  const world = document.getElementById('world');
  const SS = Math.min(3, Math.max(2, window.devicePixelRatio||2)); // supersample factor for crisp textures

  // ---------------- film grain texture (generated once) ----------------
  (function paintGrain(){
    const gc = document.createElement('canvas');
    gc.width=180; gc.height=180;
    const g = gc.getContext('2d');
    const id = g.createImageData(180,180);
    for(let i=0;i<id.data.length;i+=4){
      const v = 128 + (Math.random()*255-128)*0.5;
      id.data[i]=v; id.data[i+1]=v; id.data[i+2]=v; id.data[i+3]=255;
    }
    g.putImageData(id,0,0);
    document.getElementById('grain').style.backgroundImage = `url(${gc.toDataURL()})`;
  })();

  // ---------------- ground texture: grass + dirt noise, painted once ----------------
  (function paintGround(){
    const gc = document.getElementById('groundCanvas');
    gc.width = 3000; gc.height = 3000;
    const g = gc.getContext('2d');
    g.scale(2.5,2.5);
    const rad = g.createRadialGradient(600,600,40,600,600,850);
    rad.addColorStop(0,'#375c3c');
    rad.addColorStop(0.45,'#243d29');
    rad.addColorStop(0.8,'#16281a');
    rad.addColorStop(1,'#0c1912');
    g.fillStyle = rad; g.fillRect(0,0,1200,1200);
    // worn dirt path rings near camp center
    g.fillStyle='rgba(120,92,58,0.3)';
    g.beginPath(); g.ellipse(600,600,260,150,0,0,Math.PI*2); g.fill();
    // scattered grass tufts + speckle noise for texture
    let seed=42;
    function rnd(){ seed=(seed*1103515245+12345)&0x7fffffff; return (seed%1000)/1000; }
    for(let i=0;i<3200;i++){
      const a=rnd()*Math.PI*2, r=Math.pow(rnd(),0.5)*860;
      const x=600+Math.cos(a)*r, y=600+Math.sin(a)*r*1.0;
      const shade = rnd();
      g.fillStyle = shade>0.5? 'rgba(120,158,100,0.4)':'rgba(20,34,20,0.3)';
      g.fillRect(x,y,1.6,1.6);
    }
    // subtle grid seams (worn ground boards near camp)
    g.strokeStyle='rgba(0,0,0,0.15)'; g.lineWidth=1;
    for(let i=-8;i<=8;i++){
      g.beginPath(); g.moveTo(600+i*70,0); g.lineTo(600+i*70,1200); g.stroke();
      g.beginPath(); g.moveTo(0,600+i*70); g.lineTo(1200,600+i*70); g.stroke();
    }
  })();

  function makeShadow(x,z,rw,rh){
    const el=document.createElement('div');
    el.style.position='absolute';
    el.style.width=(rw*2)+'px'; el.style.height=(rh*2)+'px';
    el.style.left=(x-rw)+'px'; el.style.top=(z-rh)+'px';
    el.style.transform='rotateX(90deg) translateZ(0.5px)';
    el.style.background='radial-gradient(ellipse, rgba(0,0,0,.55) 0%, rgba(0,0,0,0) 72%)';
    el.style.pointerEvents='none';
    world.appendChild(el);
    return el;
  }

  // ---------------- helpers to build 3D props ----------------
  function makePlaneCanvas(w,h){
    const c = document.createElement('canvas');
    c.width = w*SS; c.height = h*SS;
    c.className = 'plane';
    c.style.width = w+'px';
    c.style.height = h+'px';
    c.style.marginLeft = (-w/2)+'px';
    return c;
  }
  function scaledCtx(c){
    const ctx = c.getContext('2d');
    ctx.scale(SS,SS);
    return ctx;
  }

  // A "billboard cross": two perpendicular textured planes sharing a Y-axis pivot.
  function makeCross(x,z,w,h, drawFn){
    const wrap = document.createElement('div');
    wrap.className='prop';
    wrap.style.transform = `translate3d(${x}px,0px,${z}px)`;
    const c1 = makePlaneCanvas(w,h);
    const c2 = makePlaneCanvas(w,h);
    c2.style.transform = 'rotateY(90deg)';
    wrap.appendChild(c1); wrap.appendChild(c2);
    world.appendChild(wrap);
    const ctx1 = scaledCtx(c1), ctx2 = scaledCtx(c2);
    drawFn(ctx1, w, h);
    drawFn(ctx2, w, h);
    return wrap;
  }

  // ---------------- textures ----------------
  function drawTree(ctx,w,h){
    ctx.clearRect(0,0,w,h);
    // trunk with bark shading
    const trunkG = ctx.createLinearGradient(w*0.4,0,w*0.6,0);
    trunkG.addColorStop(0,'#0a0806'); trunkG.addColorStop(0.5,'#241a10'); trunkG.addColorStop(1,'#0a0806');
    ctx.fillStyle=trunkG;
    ctx.fillRect(w*0.44,h*0.62,w*0.12,h*0.38);
    // three layered canopy blobs, dark base -> moonlit rim on the upper-right
    const layers=[
      {cy:h*0.62, rx:w*0.42, ry:h*0.26, base:'#122015'},
      {cy:h*0.4, rx:w*0.36, ry:h*0.24, base:'#16281a'},
      {cy:h*0.2, rx:w*0.26, ry:h*0.18, base:'#1b301f'},
    ];
    layers.forEach(L=>{
      ctx.fillStyle=L.base;
      ctx.beginPath(); ctx.ellipse(w*0.5,L.cy,L.rx,L.ry,0,0,Math.PI*2); ctx.fill();
      const rim = ctx.createRadialGradient(w*0.72,L.cy-L.ry*0.4,1,w*0.72,L.cy-L.ry*0.4,L.rx*1.1);
      rim.addColorStop(0,'rgba(180,200,140,0.4)');
      rim.addColorStop(1,'rgba(180,200,140,0)');
      ctx.fillStyle=rim;
      ctx.beginPath(); ctx.ellipse(w*0.5,L.cy,L.rx,L.ry,0,0,Math.PI*2); ctx.fill();
    });
  }

  function drawFencePost(ctx,w,h){
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle='#0c0805';
    ctx.fillRect(w*0.28,h*0.16,w*0.44,h*0.84);
    const woodG = ctx.createLinearGradient(w*0.32,0,w*0.68,0);
    woodG.addColorStop(0,'#1c130c'); woodG.addColorStop(0.45,'#3a2a18'); woodG.addColorStop(0.55,'#2a1f14'); woodG.addColorStop(1,'#160f0a');
    ctx.fillStyle=woodG;
    ctx.fillRect(w*0.32,h*0.18,w*0.36,h*0.8);
    ctx.strokeStyle='rgba(0,0,0,.4)'; ctx.lineWidth=1;
    for(let i=0;i<4;i++){ ctx.beginPath(); ctx.moveTo(w*0.32,h*(0.25+i*0.18)); ctx.lineTo(w*0.68,h*(0.25+i*0.18)); ctx.stroke(); }
    ctx.fillStyle='#3a2a18';
    ctx.beginPath(); ctx.moveTo(w*0.28,h*0.16); ctx.lineTo(w*0.5,0); ctx.lineTo(w*0.72,h*0.16); ctx.closePath(); ctx.fill();
    // rope binding + moss patch for weathered look
    ctx.strokeStyle='rgba(70,55,30,.8)'; ctx.lineWidth=w*0.06;
    ctx.beginPath(); ctx.moveTo(w*0.28,h*0.42); ctx.lineTo(w*0.72,h*0.46); ctx.stroke();
    ctx.fillStyle='rgba(70,95,60,.3)';
    ctx.beginPath(); ctx.ellipse(w*0.4,h*0.7,w*0.14,h*0.08,0,0,Math.PI*2); ctx.fill();
  }

  function drawTent(ctx,w,h){
    ctx.clearRect(0,0,w,h);
    // shadowed far side
    ctx.fillStyle='#1c140d';
    ctx.beginPath(); ctx.moveTo(0,h); ctx.lineTo(w*0.5,h*0.06); ctx.lineTo(w,h); ctx.closePath(); ctx.fill();
    // moonlit near face with subtle canvas-fold gradient
    const faceG = ctx.createLinearGradient(w*0.12,0,w*0.5,0);
    faceG.addColorStop(0,'#372716'); faceG.addColorStop(1,'#5a4530');
    ctx.fillStyle=faceG;
    ctx.beginPath(); ctx.moveTo(w*0.12,h); ctx.lineTo(w*0.5,h*0.12); ctx.lineTo(w*0.42,h); ctx.closePath(); ctx.fill();
    // fold lines on the canvas
    ctx.strokeStyle='rgba(0,0,0,.25)'; ctx.lineWidth=1.5;
    for(let i=1;i<4;i++){
      ctx.beginPath();
      ctx.moveTo(w*0.12+i*w*0.075, h);
      ctx.lineTo(w*0.5 - (0.5-0.12-i*0.075)*0.1*w, h*0.12+i*h*0.02);
      ctx.stroke();
    }
    ctx.strokeStyle='#8f2f2f'; ctx.lineWidth=w*0.025;
    ctx.beginPath(); ctx.moveTo(w*0.5,h*0.06); ctx.lineTo(w*0.5,h); ctx.stroke();
    // ground contact shading
    ctx.fillStyle='rgba(0,0,0,.35)';
    ctx.fillRect(0,h*0.94,w,h*0.06);
  }

  function drawTotem(ctx,w,h,t){
    ctx.clearRect(0,0,w,h);
    const poleG = ctx.createLinearGradient(w*0.4,0,w*0.6,0);
    poleG.addColorStop(0,'#0e0a06'); poleG.addColorStop(0.5,'#2e2214'); poleG.addColorStop(1,'#0e0a06');
    ctx.fillStyle=poleG;
    ctx.fillRect(w*0.42,h*0.14,w*0.16,h*0.86);
    const glow = 0.5+0.5*Math.sin((t||0)*3);
    ctx.fillStyle=`rgba(201,80,47,${0.3+0.3*glow})`;
    ctx.beginPath(); ctx.arc(w*0.5,h*0.1,w*0.24+glow*3,0,Math.PI*2); ctx.fill();
    // carved rings down the pole
    ctx.strokeStyle='rgba(0,0,0,.5)'; ctx.lineWidth=2;
    for(let i=0;i<5;i++){ ctx.beginPath(); ctx.moveTo(w*0.4,h*(0.28+i*0.13)); ctx.lineTo(w*0.6,h*(0.28+i*0.13)); ctx.stroke(); }
    const skullG = ctx.createRadialGradient(w*0.44,h*0.07,1,w*0.5,h*0.1,w*0.15);
    skullG.addColorStop(0,'#f2ede0'); skullG.addColorStop(1,'#a8a08a');
    ctx.fillStyle=skullG;
    ctx.beginPath(); ctx.arc(w*0.5,h*0.1,w*0.14,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#241c14';
    ctx.beginPath(); ctx.arc(w*0.44,h*0.09,w*0.035,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(w*0.56,h*0.09,w*0.035,0,Math.PI*2); ctx.fill();
  }

  function drawFire(ctx,w,h,t){
    ctx.clearRect(0,0,w,h);
    const flick = Math.sin(t*14)*3 + Math.sin(t*7)*2;
    const grad = ctx.createRadialGradient(w*0.5,h*0.75,4,w*0.5,h*0.6,w*0.7);
    grad.addColorStop(0,'rgba(255,210,122,0.55)');
    grad.addColorStop(1,'rgba(255,210,122,0)');
    ctx.fillStyle=grad; ctx.fillRect(0,0,w,h);
    // charred logs
    ctx.fillStyle='#1a0f08';
    ctx.beginPath(); ctx.ellipse(w*0.35,h*0.94,w*0.22,h*0.045,0.3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(w*0.65,h*0.95,w*0.22,h*0.045,-0.3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#c9502f';
    ctx.beginPath(); ctx.ellipse(w*0.5,h*0.95,w*0.24,h*0.035,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ef8a3d';
    ctx.beginPath();
    ctx.moveTo(w*0.32,h*0.95);
    ctx.quadraticCurveTo(w*0.38+flick*0.3,h*0.5,w*0.5,h*0.18+flick);
    ctx.quadraticCurveTo(w*0.62-flick*0.3,h*0.5,w*0.68,h*0.95);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ffd27a';
    ctx.beginPath();
    ctx.moveTo(w*0.4,h*0.95);
    ctx.quadraticCurveTo(w*0.44,h*0.65,w*0.5,h*0.42+flick*0.6);
    ctx.quadraticCurveTo(w*0.56,h*0.65,w*0.6,h*0.95);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#fff3c4';
    ctx.beginPath();
    ctx.moveTo(w*0.46,h*0.95);
    ctx.quadraticCurveTo(w*0.48,h*0.78,w*0.5,h*0.65+flick*0.4);
    ctx.quadraticCurveTo(w*0.52,h*0.78,w*0.54,h*0.95);
    ctx.closePath(); ctx.fill();
    // rising sparks
    for(let i=0;i<7;i++){
      const life = (t*0.7+i*0.37)%1;
      const sx = w*0.5 + Math.sin(i*2.1+t*1.3)*w*0.18*(0.4+life);
      const sy = h*0.85 - life*h*0.85;
      ctx.fillStyle = `rgba(255,${170+Math.floor(70*(1-life))},120,${(1-life).toFixed(2)})`;
      ctx.fillRect(sx,sy,2,2);
    }
  }

  // ---------------- humanoid billboard texture ----------------
  function drawFigure(ctx,w,h,opts){
    const {legPhase=0, armSwing=0, color, trim, crouch=0, fallen=0, alert=false, hitFlash=0} = opts;
    ctx.clearRect(0,0,w,h);
    // soft contact shadow at feet before rotation, so it stays grounded when falling
    ctx.save();
    ctx.translate(w*0.5,h);
    ctx.fillStyle='rgba(0,0,0,.4)';
    ctx.beginPath(); ctx.ellipse(0,-2,w*0.26,h*0.035,0,0,Math.PI*2); ctx.fill();
    if(fallen>0){ ctx.rotate(Math.PI/2*fallen); ctx.translate(0,10*fallen); }
    const bh = h*0.66 - crouch*h*0.14;

    // legs with cloth-fold shading (two-tone stroke)
    ctx.lineCap='round';
    ctx.strokeStyle=color; ctx.lineWidth=w*0.11;
    ctx.beginPath();
    ctx.moveTo(-w*0.02, -bh*0.55); ctx.lineTo(-w*0.02+Math.sin(legPhase)*w*0.12, 0);
    ctx.moveTo(w*0.02, -bh*0.55); ctx.lineTo(w*0.02-Math.sin(legPhase)*w*0.12, 0);
    ctx.stroke();
    ctx.strokeStyle='rgba(0,0,0,.25)'; ctx.lineWidth=w*0.11; ctx.globalAlpha=0.5;
    ctx.beginPath();
    ctx.moveTo(w*0.02, -bh*0.55); ctx.lineTo(w*0.02-Math.sin(legPhase)*w*0.12, 0);
    ctx.stroke();
    ctx.globalAlpha=1;

    // cloaked torso (tapered robe shape, shaded)
    const torsoG = ctx.createLinearGradient(-w*0.22,0,w*0.22,0);
    torsoG.addColorStop(0, 'rgba(0,0,0,.35)');
    torsoG.addColorStop(0.45, color);
    torsoG.addColorStop(1, 'rgba(255,255,255,.12)');
    ctx.fillStyle=torsoG;
    ctx.beginPath();
    ctx.moveTo(-w*0.09,-bh*0.55);
    ctx.quadraticCurveTo(-w*0.14,-bh*0.75,-w*0.11,-bh*0.92);
    ctx.lineTo(w*0.11,-bh*0.92);
    ctx.quadraticCurveTo(w*0.14,-bh*0.75,w*0.09,-bh*0.55);
    ctx.closePath(); ctx.fill();

    // arms
    ctx.strokeStyle=trim; ctx.lineWidth=w*0.075;
    ctx.beginPath();
    ctx.moveTo(0,-bh*0.85); ctx.lineTo(w*(0.12+armSwing*0.2), -bh*0.85+h*0.14-armSwing*h*0.14);
    ctx.moveTo(0,-bh*0.85); ctx.lineTo(-w*(0.12+armSwing*0.08), -bh*0.6);
    ctx.stroke();

    // hooded head with shaded underside
    const headG = ctx.createRadialGradient(-w*0.04,-bh-h*0.11,1,0,-bh-h*0.09,w*0.15);
    headG.addColorStop(0, '#efe9d6');
    headG.addColorStop(1, trim);
    ctx.fillStyle=headG;
    ctx.beginPath(); ctx.arc(0,-bh-h*0.09,w*0.135,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(0,0,0,.4)';
    ctx.beginPath(); ctx.ellipse(0,-bh-h*0.03,w*0.15,h*0.03,0,0,Math.PI*2); ctx.fill();

    // weapon blade with metallic gradient + glint
    const wx=w*(0.12+armSwing*0.2), wy=-bh*0.85+h*0.14-armSwing*h*0.14;
    const bx=wx+w*0.32*(0.4+armSwing), by=wy-h*0.24*(0.4+armSwing);
    const bladeG = ctx.createLinearGradient(wx,wy,bx,by);
    bladeG.addColorStop(0,'#9a9488'); bladeG.addColorStop(0.5,'#eae4d2'); bladeG.addColorStop(1,'#c7c0ab');
    ctx.strokeStyle=bladeG; ctx.lineWidth=w*0.055;
    ctx.beginPath(); ctx.moveTo(wx,wy); ctx.lineTo(bx,by); ctx.stroke();
    if(armSwing>0.55){
      ctx.strokeStyle='rgba(255,255,255,.8)'; ctx.lineWidth=w*0.02;
      ctx.beginPath(); ctx.moveTo(wx,wy); ctx.lineTo(bx,by); ctx.stroke();
      // motion-blur swipe arc trailing the blade
      ctx.strokeStyle=`rgba(230,235,240,${(armSwing-0.55)*0.5})`;
      ctx.lineWidth=w*0.16; ctx.lineCap='round';
      ctx.beginPath();
      ctx.arc(0,-bh*0.85, w*0.42, -0.3, 0.9);
      ctx.stroke();
    }
    if(hitFlash>0){
      ctx.globalCompositeOperation='source-atop';
      ctx.globalAlpha = hitFlash*0.85;
      ctx.fillStyle='#fff';
      ctx.fillRect(-w*0.5,-h,w,h);
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation='source-over';
    }
    ctx.restore();

    if(alert){
      ctx.save();
      ctx.font=`bold ${Math.round(w*0.5)}px Georgia, serif`;
      ctx.textAlign='center';
      ctx.fillStyle='rgba(0,0,0,.5)';
      ctx.fillText('!', w*0.5+1, h*0.17);
      ctx.fillStyle='#e2493f';
      ctx.fillText('!', w*0.5, h*0.16);
      ctx.restore();
    }
  }

  // ---------------- populate scene ----------------
  // trees ring
  const fogProps = [];
  const treeCount=16, treeR=380;
  for(let i=0;i<treeCount;i++){
    const a = (i/treeCount)*Math.PI*2;
    const tx=Math.cos(a)*treeR, tz=Math.sin(a)*treeR;
    makeShadow(tx,tz,42,16);
    fogProps.push({el:makeCross(tx, tz, 130, 220, drawTree), x:tx, z:tz});
  }
  // fence ring
  const fenceCount=22, fenceR=270;
  for(let i=0;i<fenceCount;i++){
    const a=(i/fenceCount)*Math.PI*2;
    const fx=Math.cos(a)*fenceR, fz=Math.sin(a)*fenceR;
    fogProps.push({el:makeCross(fx, fz, 26, 60, drawFencePost), x:fx, z:fz});
  }
  // tents
  makeShadow(-180,90,80,34); makeCross(-180, 90, 150, 110, drawTent);
  makeShadow(210,130,90,38); makeCross(210, 130, 170, 125, drawTent);

  // totem & fire (animated textures, redrawn each frame)
  makeShadow(140,-70,34,14);
  const totemProp = makeCross(140,-70,70,140, (c,w,h)=>drawTotem(c,w,h,0));
  const fireProp = makeCross(0,0,110,120, (c,w,h)=>drawFire(c,w,h,0));
  const totemCtxs = [...totemProp.querySelectorAll('canvas')].map(c=>c.getContext('2d'));
  const fireCtxs = [...fireProp.querySelectorAll('canvas')].map(c=>c.getContext('2d'));

  // fire light glow on ground
  const glow = document.createElement('div');
  glow.style.position='absolute';
  glow.style.width='500px'; glow.style.height='500px';
  glow.style.left='-250px'; glow.style.top='-250px';
  glow.style.transform='rotateX(90deg) translateZ(1px)';
  glow.style.background='radial-gradient(circle, rgba(255,180,90,.35), rgba(255,180,90,0) 65%)';
  world.appendChild(glow);

  // ---------------- characters ----------------
  function makeCharacter(x,z,color,trim){
    const wrap=document.createElement('div');
    wrap.className='prop';
    wrap.style.transform=`translate3d(${x}px,0px,${z}px)`;
    const c = makePlaneCanvas(70,110);
    wrap.appendChild(c);
    world.appendChild(wrap);
    return {wrap, ctx:scaledCtx(c)};
  }

  const CULTIST_SPAWNS = [
    {x:60, z:-40, patrol:false},
    {x:-60, z:30, patrol:false},
    {x:150, z:90, patrol:true},
  ];
  function spawnCultists(){
    return CULTIST_SPAWNS.map((s,id)=>({
      ...makeCharacter(s.x,s.z,'#3b2f24','#8f2f2f'),
      id, x:s.x, z:s.z, baseX:s.x, baseZ:s.z, patrol:s.patrol,
      hp:2, alive:true, fallen:0, alertT:0, hitFlash:0
    }));
  }

  // ---------------- combat feedback fx ----------------
  const flashHitEl = document.getElementById('flashHit');
  function screenShake(){
    const st = document.getElementById('stage');
    st.classList.remove('shake'); void st.offsetWidth; st.classList.add('shake');
  }
  function whiteFlash(){
    flashHitEl.style.background='rgba(255,225,190,.22)';
    requestAnimationFrame(()=>{ flashHitEl.style.background='rgba(255,220,180,0)'; });
  }
  function drawSpark(ctx,w,h){
    ctx.clearRect(0,0,w,h);
    for(let i=0;i<10;i++){
      const a=(i/10)*Math.PI*2 + Math.random()*0.3;
      const r=w*(0.15+Math.random()*0.35);
      ctx.strokeStyle=`rgba(255,${210+Math.floor(Math.random()*40)},170,.9)`;
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(w*0.5,h*0.5);
      ctx.lineTo(w*0.5+Math.cos(a)*r, h*0.5+Math.sin(a)*r);
      ctx.stroke();
    }
  }
  function spawnSpark(x,z,y){
    const prop = makeCross(x,z,46,46,drawSpark);
    prop.style.transform += ` translateY(${-(y||55)}px)`;
    let life=1;
    const iv=setInterval(()=>{
      life -= 0.09;
      prop.style.opacity = Math.max(0,life).toFixed(2);
      if(life<=0){ clearInterval(iv); prop.remove(); }
    },30);
  }
  function drawDamageText(ctx,w,h,text){
    ctx.clearRect(0,0,w,h);
    ctx.font=`bold ${Math.round(w*0.42)}px "Impact","Arial Black",Arial,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.lineWidth=w*0.06; ctx.strokeStyle='rgba(0,0,0,.7)';
    ctx.strokeText(text,w*0.5,h*0.5);
    ctx.fillStyle='#ffdf9a';
    ctx.fillText(text,w*0.5,h*0.5);
  }
  function spawnDamageNumber(x,z,text,color){
    const prop = makeCross(x,z,60,40,(ctx,w,h)=>drawDamageText(ctx,w,h,text));
    let rise=0, life=1;
    const iv=setInterval(()=>{
      rise += 1.6; life -= 0.028;
      prop.style.transform = `translate3d(${x}px,${-(70+rise)}px,${z}px)`;
      prop.style.opacity = Math.max(0,life).toFixed(2);
      if(life<=0){ clearInterval(iv); prop.remove(); }
    },16);
  }
  function drawDust(ctx,w,h){
    ctx.clearRect(0,0,w,h);
    const g = ctx.createRadialGradient(w*0.5,h*0.6,2,w*0.5,h*0.6,w*0.45);
    g.addColorStop(0,'rgba(120,110,90,.55)');
    g.addColorStop(1,'rgba(120,110,90,0)');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.ellipse(w*0.5,h*0.6,w*0.45,h*0.28,0,0,Math.PI*2); ctx.fill();
  }
  function spawnDust(x,z){
    const prop = makeCross(x,z,90,60,drawDust);
    let scale=0.6, life=1;
    const iv=setInterval(()=>{
      scale += 0.05; life -= 0.05;
      prop.style.transform = `translate3d(${x}px,0px,${z}px) scale(${scale})`;
      prop.style.opacity = Math.max(0,life).toFixed(2);
      if(life<=0){ clearInterval(iv); prop.remove(); }
    },30);
  }
  function drawRing(ctx,w,h,alpha){
    ctx.clearRect(0,0,w,h);
    ctx.strokeStyle=`rgba(255,205,120,${alpha})`;
    ctx.lineWidth=w*0.04;
    ctx.beginPath(); ctx.ellipse(w*0.5,h*0.5,w*0.42,h*0.42,0,0,Math.PI*2); ctx.stroke();
  }
  function spawnShockwave(x,z){
    let s=0.3, life=1;
    const prop = makeCross(x,z,60,60,(ctx,w,h)=>drawRing(ctx,w,h,1));
    prop.style.transform += ' rotateX(90deg)';
    const iv=setInterval(()=>{
      s += 0.22; life -= 0.045;
      [...prop.querySelectorAll('canvas')].forEach(c=>drawRing(c.getContext('2d'),60,60,Math.max(0,life)));
      prop.style.transform = `translate3d(${x}px,0px,${z}px) rotateX(90deg) scale(${s})`;
      if(life<=0){ clearInterval(iv); prop.remove(); }
    },30);
  }
  let cultists = spawnCultists();
  const player = {...makeCharacter(-340,-260,'#2f4d3a','#c9a15a'), x:-340, z:-260, hp:3};

  const TOTEM_POS = {x:140,z:-70};
  const FENCE_R = 270, ESCAPE_R = 320;
  const ATTACK_RANGE = 78, ATTACK_STAM_COST = 22, ATTACK_COOLDOWN = 0.55;

  // ---------------- game state ----------------
  let day = 47;
  let stamina = 100, hunger = 80;
  let phase = 'raid'; // raid -> loot -> retreat -> success
  let atkCooldown = 0, atkAnim = 0;
  let toastTimer = 0;

  const firelightEl = document.getElementById('firelight');
  const objectiveEl = document.getElementById('objective');
  const toastEl = document.getElementById('toast');
  const dayEl = document.getElementById('dayNum');
  function setObjective(text){ if(objectiveEl.textContent!==text) objectiveEl.textContent = text; }
  function showToast(text, ms){
    toastEl.textContent = text;
    toastEl.classList.add('show');
    toastTimer = ms/1000;
  }

  // ---------------- input ----------------
  const keys = {};
  window.addEventListener('keydown', e=>{
    const k=e.key.toLowerCase();
    if(['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright','e',' '].includes(k)) e.preventDefault();
    keys[k]=true;
    if(k==='e' || k===' ') tryAttack();
  });
  window.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()]=false; });

  function bindHold(id, on, off){
    const el=document.getElementById(id);
    const start=e=>{e.preventDefault(); on();};
    const end=e=>{e.preventDefault(); off();};
    el.addEventListener('pointerdown', start);
    el.addEventListener('pointerup', end);
    el.addEventListener('pointerleave', end);
    el.addEventListener('pointercancel', end);
  }
  bindHold('btnU', ()=>keys['w']=true, ()=>keys['w']=false);
  bindHold('btnD', ()=>keys['s']=true, ()=>keys['s']=false);
  bindHold('btnL', ()=>keys['a']=true, ()=>keys['a']=false);
  bindHold('btnR', ()=>keys['d']=true, ()=>keys['d']=false);
  document.getElementById('btnAtk').addEventListener('pointerdown', e=>{e.preventDefault(); tryAttack();});

  function tryAttack(){
    if(atkCooldown>0 || stamina<ATTACK_STAM_COST) return;
    atkCooldown = ATTACK_COOLDOWN;
    atkAnim = 1;
    stamina = Math.max(0, stamina-ATTACK_STAM_COST);
    if(phase==='raid'){
      let hitSomething=false;
      cultists.forEach(c=>{
        if(!c.alive) return;
        const d = Math.hypot(c.x-player.x, c.z-player.z);
        if(d<ATTACK_RANGE){
          hitSomething=true;
          c.hp -= 1;
          c.alertT = 1.4;
          c.hitFlash = 1;
          spawnSpark(c.x,c.z,60);
          spawnDamageNumber(c.x,c.z,'-1');
          screenShake(); whiteFlash();
          if(c.hp<=0){ c.alive=false; spawnDust(c.x,c.z); }
        }
      });
      if(hitSomething && cultists.every(c=>!c.alive)){
        phase='loot';
        showToast('據點清空！', 1400);
      }
    } else if(phase==='loot'){
      const d = Math.hypot(TOTEM_POS.x-player.x, TOTEM_POS.z-player.z);
      if(d<ATTACK_RANGE+10){
        phase='retreat';
        spawnShockwave(TOTEM_POS.x,TOTEM_POS.z);
        showToast('搶到戰利品！', 1400);
      }
    }
  }

  // ---------------- camera drag/orbit ----------------
  let camAngle=0.6, camTilt=66, autoSpin=true;
  let dragging=false, lastPX=0, lastPY=0;
  const stage=document.getElementById('stage');
  stage.addEventListener('pointerdown', e=>{
    if(e.target.closest('.controls')) return;
    dragging=true; autoSpin=false; lastPX=e.clientX; lastPY=e.clientY; stage.setPointerCapture(e.pointerId);
  });
  stage.addEventListener('pointermove', e=>{
    if(!dragging) return;
    camAngle += (e.clientX-lastPX)*0.006;
    camTilt = Math.max(35, Math.min(85, camTilt - (e.clientY-lastPY)*0.15));
    lastPX=e.clientX; lastPY=e.clientY;
  });
  window.addEventListener('pointerup', ()=>dragging=false);

  const SPEED = 150;
  function resetRun(){
    cultists.forEach(c=>c.wrap.remove());
    cultists = spawnCultists();
    player.x=-340; player.z=-260;
    phase='raid';
    stamina = Math.min(100, stamina+20);
  }

  let last = performance.now();
  function frame(now){
    const dt = Math.min(0.05,(now-last)/1000); last=now;
    const t = now/1000;
    if(autoSpin) camAngle += dt*0.05;
    if(atkCooldown>0) atkCooldown -= dt;
    if(atkAnim>0) atkAnim = Math.max(0, atkAnim-dt*2.6);
    if(toastTimer>0){ toastTimer -= dt; if(toastTimer<=0) toastEl.classList.remove('show'); }

    // resources
    hunger = Math.max(0, hunger - dt*1.1);
    const staminaRegen = hunger>15 ? 16 : 8;
    if(atkAnim<=0) stamina = Math.min(100, stamina + dt*staminaRegen);

    // movement (camera-relative)
    let mx=0, mz=0;
    if(keys['w']||keys['arrowup']){ mx+=Math.sin(camAngle); mz+=Math.cos(camAngle); }
    if(keys['s']||keys['arrowdown']){ mx-=Math.sin(camAngle); mz-=Math.cos(camAngle); }
    if(keys['a']||keys['arrowleft']){ mx-=Math.cos(camAngle); mz+=Math.sin(camAngle); }
    if(keys['d']||keys['arrowright']){ mx+=Math.cos(camAngle); mz-=Math.sin(camAngle); }
    const mlen = Math.hypot(mx,mz);
    let moving=false;
    if(mlen>0.001 && atkAnim<=0){
      moving=true;
      player.x += (mx/mlen)*SPEED*dt;
      player.z += (mz/mlen)*SPEED*dt;
      const r = Math.hypot(player.x,player.z);
      if(r>1050){ const s=1050/r; player.x*=s; player.z*=s; }
    }

    // camera follows player: translate world so player sits at origin, then orbit/tilt
    world.style.transform = `rotateX(${camTilt}deg) rotateY(${camAngle}rad) translate3d(${-player.x}px,0px,${-player.z}px)`;

    // fire / totem animated textures
    fireCtxs.forEach(cx=>drawFire(cx,110,120,t));
    totemCtxs.forEach(cx=>drawTotem(cx,70,140,t));

    // flickering warm light + gentle depth-fog fade on distant props
    const flick = 0.55 + Math.sin(t*9)*0.06 + Math.sin(t*3.3)*0.04;
    firelightEl.style.opacity = flick.toFixed(2);
    fogProps.forEach(p=>{
      const d = Math.hypot(p.x-player.x, p.z-player.z);
      p.el.style.opacity = Math.max(0.25, Math.min(1, 1 - (d-260)/520)).toFixed(2);
    });

    // cultists AI: idle/patrol, or shuffle toward player briefly when alerted
    cultists.forEach(c=>{
      let legPhase = Math.sin(t*2+c.id)*0.3;
      if(c.alertT>0) c.alertT -= dt;
      if(c.hitFlash>0) c.hitFlash = Math.max(0, c.hitFlash-dt*3.5);
      if(c.alive){
        if(c.alertT>0){
          const d = Math.hypot(player.x-c.x, player.z-c.z);
          if(d>10){
            c.x += (player.x-c.x)/d * 30*dt;
            c.z += (player.z-c.z)/d * 30*dt;
            legPhase = Math.sin(t*8)*0.4;
          }
        } else if(c.patrol){
          c.x = c.baseX + Math.sin(t*0.6)*40;
        }
        c.wrap.style.transform = `translate3d(${c.x}px,0px,${c.z}px) rotateY(${-camAngle}rad)`;
      }
      drawFigure(c.ctx,70,110,{legPhase, color:'#3b2f24', trim:'#8f2f2f', fallen:c.alive?0:1, alert:c.alertT>0, hitFlash:c.hitFlash});
    });

    // player render
    const legPhase = moving ? Math.sin(t*10)*0.5 : 0;
    const armSwing = atkAnim>0 ? Math.sin((1-atkAnim)*Math.PI) : 0;
    player.wrap.style.transform = `translate3d(${player.x}px,0px,${player.z}px) rotateY(${-camAngle}rad)`;
    drawFigure(player.ctx,70,110,{legPhase, armSwing, color:'#2f4d3a', trim:'#c9a15a', crouch:0.35});

    // objective + phase transitions
    const aliveCount = cultists.filter(c=>c.alive).length;
    const distToOrigin = Math.hypot(player.x,player.z);
    if(phase==='raid'){
      setObjective(`潛入據點：靠近信徒後按 E／攻擊鈕（剩餘 ${aliveCount} 名）`);
    } else if(phase==='loot'){
      setObjective('全部擊倒！前往中央祭壇按 E／攻擊鈕搶奪戰利品');
    } else if(phase==='retreat'){
      setObjective('戰利品到手！往森林邊界外撤離');
      if(distToOrigin>ESCAPE_R){
        phase='success';
        day += 1;
        dayEl.textContent = day;
        showToast(`夜襲成功！第 ${day} 天`, 2200);
        flashHitEl.style.transition='background .6s';
        flashHitEl.style.background='rgba(255,235,200,.35)';
        setTimeout(()=>{ flashHitEl.style.background='rgba(255,220,180,0)'; },250);
        setTimeout(()=>{ flashHitEl.style.transition='background .08s'; },900);
        setTimeout(resetRun, 2200);
      }
    } else if(phase==='success'){
      setObjective('回營地休整中……');
    }

    const stamBarEl = document.getElementById('stamBar');
    stamBarEl.style.transform = `scaleX(${(stamina/100).toFixed(2)})`;
    stamBarEl.classList.toggle('low', stamina<25);
    document.getElementById('hungerBar').style.transform = `scaleX(${(hunger/100).toFixed(2)})`;

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
