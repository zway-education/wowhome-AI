<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>格子跑酷遊戲（往畫面內跑）</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body {
    width:100vw; height:100vh;
    overflow:hidden;
    font-family: "Microsoft JhengHei", sans-serif;
    background:#000;
  }
  #stage {
    position:relative;
    width:100vw; height:100vh;
    background: linear-gradient(180deg, #6fb8ff 0%, #bfe3ff 40%, #eaf6ff 58%, #eaf6ff 58%);
    perspective: 62vh;
    perspective-origin: 50% 40%;
    overflow:hidden;
  }
  .sun {
    position:absolute; top:5%; left:50%; transform:translateX(-50%); width:10vh; height:10vh;
    border-radius:50%;
    background: radial-gradient(circle at 40% 40%, #fff6c8, #ffd95e 70%, #ffc93c);
    box-shadow: 0 0 6vh 2vh rgba(255,217,94,0.5);
    z-index:1;
  }

  /* the receding ground plane, rotated in 3D so the grid runs toward the horizon */
  #ground-plane {
    position:absolute;
    left:50%;
    top:58%;
    width:220vh;
    height:400vh;
    margin-left:-110vh;
    background:
      repeating-linear-gradient(90deg, rgba(0,0,0,0.28) 0 0.5vh, transparent 0.5vh 17vh),
      linear-gradient(180deg, #d98f4e, #c97a3a);
    background-size: 17vh 100%, 100% 100%;
    transform: rotateX(78deg);
    transform-origin: top center;
    z-index:2;
  }
  #ground-plane .rung {
    position:absolute;
    left:0; width:100%; height:0.5vh;
    background: rgba(0,0,0,0.28);
  }

  #sidegrass-l, #sidegrass-r {
    position:absolute;
    top:58%; height:42%;
    width:40vw;
    background: linear-gradient(180deg, #7cc576, #4f9e4a);
    z-index:1;
  }
  #sidegrass-l { left:0; }
  #sidegrass-r { right:0; }

  #obstacle-layer {
    position:absolute;
    left:0; top:0; width:100%; height:100%;
    z-index:3;
    pointer-events:none;
  }
  .obstacle {
    position:absolute;
    top:58%;
    left:50%;
    width:32vh;
    height:32vh;
    margin-left:-16vh;
    border:0.4vh solid rgba(0,0,0,0.35);
    border-radius:1.2vh;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.35), rgba(255,255,255,0) 30%),
      #e8ad6e;
    box-shadow: 0 0.6vh 0 rgba(0,0,0,0.25), inset 0 0.3vh 0.6vh rgba(255,255,255,0.3);
  }
  .obstacle.gapmark {
    background: radial-gradient(ellipse at center, #1a1a1a 0%, #000 70%);
    border-color: rgba(0,0,0,0.5);
    box-shadow: inset 0 1vh 2vh rgba(0,0,0,0.8);
  }
  .obstacle-num {
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    font-weight:800;
    color:rgba(40,30,20,0.6);
  }

  #runner-wrap {
    position:absolute;
    left:50%;
    bottom:6vh;
    width:16vh;
    height:22vh;
    margin-left:-8vh;
    z-index:5;
    transform-origin:bottom center;
  }

  #hud {
    position:absolute;
    top:4%;
    left:50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.85);
    padding: 1.4vh 3.5vh;
    border-radius: 6vh;
    box-shadow: 0 0.6vh 2vh rgba(0,0,0,0.12);
    font-size:2.6vh;
    font-weight:800;
    color:#2c3e50;
    letter-spacing:0.2vh;
    z-index:6;
  }
  #hint {
    position:absolute;
    bottom:2%;
    left:50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.75);
    padding: 1vh 2.4vh;
    border-radius: 3vh;
    font-size:1.9vh;
    color:#2c3e50;
    z-index:6;
  }
  #gameover {
    position:absolute;
    top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.55);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    color:#fff;
    z-index:10;
    text-align:center;
  }
  #gameover h1 { font-size:5vh; margin-bottom:2vh; }
  #gameover p { font-size:2.4vh; margin-bottom:2vh; }
  #restart-btn {
    font-size:2.2vh;
    padding: 1.2vh 3vh;
    border-radius: 3vh;
    border:none;
    background:#ff7fb3;
    color:#fff;
    font-weight:800;
    cursor:pointer;
  }
</style>
</head>
<body>
<div id="stage">
  <div class="sun"></div>
  <div id="sidegrass-l"></div>
  <div id="sidegrass-r"></div>
  <div id="ground-plane"></div>
  <div id="obstacle-layer"></div>

  <!-- runner viewed from behind, running forward into the screen -->
  <svg id="runner-wrap" viewBox="-50 -112 100 132">
    <defs>
      <linearGradient id="shirtGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#ff9dc9"/>
        <stop offset="100%" stop-color="#f9629e"/>
      </linearGradient>
      <linearGradient id="jeanGradL" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#33538f"/>
        <stop offset="100%" stop-color="#25406f"/>
      </linearGradient>
      <linearGradient id="jeanGradR" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#4a6db4"/>
        <stop offset="100%" stop-color="#33538f"/>
      </linearGradient>
      <radialGradient id="hairGrad" cx="40%" cy="30%" r="75%">
        <stop offset="0%" stop-color="#4a382a"/>
        <stop offset="100%" stop-color="#2a1c14"/>
      </radialGradient>
      <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#ffd9b0"/>
        <stop offset="100%" stop-color="#f2b783"/>
      </linearGradient>
    </defs>
    <ellipse cx="0" cy="25" rx="28" ry="6" fill="rgba(0,0,0,0.22)"/>
    <g id="runner-body">
      <!-- back view legs (blue jeans) with center seam shading -->
      <path id="leg-left" d="M -19 -30 Q -25 -4 -21 21 L -7 21 Q -9 -6 -5 -30 Z" fill="url(#jeanGradL)"/>
      <path id="leg-right" d="M 19 -30 Q 25 -4 21 21 L 7 21 Q 9 -6 5 -30 Z" fill="url(#jeanGradR)"/>
      <path d="M -19 -30 Q -22 -6 -19 18 L -15 18 Q -17 -6 -14 -30 Z" fill="rgba(0,0,0,0.12)"/>
      <path d="M 19 -30 Q 22 -6 19 18 L 15 18 Q 17 -6 14 -30 Z" fill="rgba(255,255,255,0.10)"/>
      <!-- back pockets -->
      <path d="M -17 -22 Q -13 -19 -9 -22 L -9 -16 Q -13 -13 -17 -16 Z" fill="rgba(0,0,0,0.18)"/>
      <path d="M 17 -22 Q 13 -19 9 -22 L 9 -16 Q 13 -13 17 -16 Z" fill="rgba(0,0,0,0.18)"/>
      <!-- sneakers -->
      <ellipse id="shoe-left" cx="-15" cy="22" rx="9" ry="5.5" fill="#2e2e2e"/>
      <ellipse id="shoe-right" cx="15" cy="22" rx="9" ry="5.5" fill="#3a3a3a"/>
      <path d="M -20 22 Q -15 26 -8 22" stroke="#fff" stroke-width="1.6" fill="none" opacity="0.8"/>
      <path d="M 20 22 Q 15 26 8 22" stroke="#fff" stroke-width="1.6" fill="none" opacity="0.8"/>

      <!-- torso back view: pink short sleeve top -->
      <path d="M -19 -70 Q 0 -82 19 -70 L 21 -28 Q 0 -17 -21 -28 Z" fill="url(#shirtGrad)"/>
      <!-- back seam / spine shading -->
      <path d="M -2 -78 Q 0 -50 -1 -20" stroke="rgba(0,0,0,0.10)" stroke-width="3" fill="none"/>
      <!-- side shading for volume -->
      <path d="M -19 -70 Q -21 -48 -21 -28 L -16 -27 Q -16 -48 -14 -68 Z" fill="rgba(0,0,0,0.10)"/>
      <path d="M 19 -70 Q 21 -48 21 -28 L 16 -27 Q 16 -48 14 -68 Z" fill="rgba(255,255,255,0.14)"/>
      <!-- sleeves -->
      <path id="arm-left" d="M -19 -70 Q -33 -61 -33 -39 L -21 -37 Q -21 -55 -11 -63 Z" fill="url(#skinGrad)"/>
      <path id="arm-right" d="M 19 -70 Q 33 -61 33 -39 L 21 -37 Q 21 -55 11 -63 Z" fill="url(#skinGrad)"/>
      <path d="M -19 -70 Q -29 -63 -31 -51 L -21 -47 Q -19 -59 -12 -64 Z" fill="#ff9dc9"/>
      <path d="M 19 -70 Q 29 -63 31 -51 L 21 -47 Q 19 -59 12 -64 Z" fill="#ff9dc9"/>
      <!-- sleeve cuff shadow -->
      <ellipse cx="-32" cy="-40" rx="4" ry="3" fill="rgba(0,0,0,0.15)"/>
      <ellipse cx="32" cy="-40" rx="4" ry="3" fill="rgba(0,0,0,0.15)"/>

      <!-- neck -->
      <rect x="-6" y="-86" width="12" height="12" rx="4" fill="#eeb287"/>

      <!-- head from behind, rounder + glossy hair -->
      <circle cx="0" cy="-98" r="18" fill="url(#hairGrad)"/>
      <!-- hair strand highlights -->
      <path d="M -14 -104 Q -6 -114 4 -113" stroke="rgba(255,255,255,0.18)" stroke-width="2.4" fill="none" stroke-linecap="round"/>
      <path d="M -10 -92 Q -2 -100 8 -98" stroke="rgba(255,255,255,0.10)" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- ears peek -->
      <circle cx="-17" cy="-96" r="3" fill="#eeb287"/>
      <circle cx="17" cy="-96" r="3" fill="#eeb287"/>
      <!-- ponytail -->
      <path d="M 10 -92 Q 22 -82 16 -66 Q 10 -78 4 -88 Z" fill="url(#hairGrad)"/>
    </g>
  </svg>

  <div id="hud">距離: 0 格</div>
  <div id="hint">按 空白鍵 / ↑ 跳躍　－　人物往畫面內自動向前跑</div>

  <div id="gameover">
    <h1>撞到啦！</h1>
    <p id="final-score">跑了 0 格</p>
    <button id="restart-btn">再玩一次</button>
  </div>
</div>

<script>
(function(){
  const groundPlane = document.getElementById('ground-plane');
  const obstacleLayer = document.getElementById('obstacle-layer');
  const runnerWrap = document.getElementById('runner-wrap');
  const runnerBody = document.getElementById('runner-body');
  const legLeft = document.getElementById('leg-left');
  const legRight = document.getElementById('leg-right');
  const armLeft = document.getElementById('arm-left');
  const armRight = document.getElementById('arm-right');
  const hud = document.getElementById('hud');
  const gameover = document.getElementById('gameover');
  const finalScore = document.getElementById('final-score');
  const restartBtn = document.getElementById('restart-btn');

  let running = true;
  let jumping = false;
  let jumpStart = 0;
  const JUMP_DURATION = 480;
  const JUMP_HEIGHT_VH = 9;

  let speed = 0.42;       // progress (0..1 depth) per ms baseline
  let score = 0;
  let runCycle = 0;
  let lastTime = null;
  let spawnTimer = 0;
  let spawnInterval = 1250; // ms between obstacles at current speed
  let bgScroll = 0;

  let obstacles = []; // {el, depth: 1(far,horizon) -> 0(near,player), isGap}

  function vh(v){ return window.innerHeight * v / 100; }

  function spawnObstacle() {
    const isGap = Math.random() < 0.4;
    const el = document.createElement('div');
    el.className = 'obstacle' + (isGap ? ' gapmark' : '');
    if (!isGap) {
      const numSpan = document.createElement('span');
      numSpan.className = 'obstacle-num';
      numSpan.textContent = ++spawnObstacle.count || (spawnObstacle.count = 1);
      el.appendChild(numSpan);
    }
    obstacleLayer.appendChild(el);
    obstacles.push({ el, depth: 1, isGap, passed:false });
  }
  spawnObstacle.count = 0;

  function updateObstacles(dt) {
    spawnTimer += dt;
    if (spawnTimer > spawnInterval) {
      spawnTimer = 0;
      spawnObstacle();
    }
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o = obstacles[i];
      o.depth -= speed * (dt / 16.67) * 0.016;
      const d = Math.max(o.depth, 0.001);
      // perspective mapping: scale + vertical position from horizon (58% top) to near player
      const topPercent = 58 + (1 - d) * (92 - 58) / 1; // approaches 92% as d->0
      const scale = 0.12 + (1 - d) * 1.0;
      const opacity = Math.min(1, (1 - d) * 2.2 + 0.15);
      o.el.style.top = topPercent + '%';
      o.el.style.transform = `translate(-50%,-50%) scale(${scale})`;
      o.el.style.opacity = opacity;
      o.el.style.left = '50%';
      o.el.style.marginLeft = '0';

      if (!o.passed && d < 0.12) {
        o.passed = true;
        if (o.isGap && !jumping) {
          endGame();
          return;
        }
        if (!o.isGap) {
          score++;
          hud.textContent = `距離: ${score} 格`;
        }
      }
      if (d <= 0) {
        o.el.remove();
        obstacles.splice(i, 1);
      }
    }
  }

  function startJump() {
    if (jumping || !running) return;
    jumping = true;
    jumpStart = performance.now();
  }

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      e.preventDefault();
      startJump();
    }
  });
  document.getElementById('stage').addEventListener('mousedown', startJump);
  restartBtn.addEventListener('click', reset);

  function reset() {
    obstacles.forEach(o => o.el.remove());
    obstacles = [];
    spawnObstacle.count = 0;
    speed = 0.42;
    score = 0;
    running = true;
    jumping = false;
    spawnTimer = 0;
    spawnInterval = 1250;
    hud.textContent = '距離: 0 格';
    gameover.style.display = 'none';
    lastTime = null;
    requestAnimationFrame(loop);
  }

  function loop(ts) {
    if (!running) return;
    if (lastTime === null) lastTime = ts;
    const dt = Math.min(ts - lastTime, 40);
    lastTime = ts;

    speed = Math.min(speed + 0.000018 * dt, 1.4);
    spawnInterval = Math.max(1250 - speed * 500, 620);

    bgScroll += speed * (dt / 16.67) * 3.4;
    groundPlane.style.backgroundPosition = `center ${bgScroll}vh, center 0`;

    updateObstacles(dt);
    if (!running) return;

    let jumpProgress = 0;
    if (jumping) {
      const elapsed = ts - jumpStart;
      jumpProgress = elapsed / JUMP_DURATION;
      if (jumpProgress >= 1) { jumping = false; jumpProgress = 0; }
    }
    const jumpArc = jumping ? Math.sin(Math.min(jumpProgress,1) * Math.PI) : 0;
    runnerWrap.style.transform = `translateY(${-vh(JUMP_HEIGHT_VH) * jumpArc}px)`;

    if (!jumping) {
      runCycle += dt * 0.013 * (0.6 + speed*0.6);
      const swing = Math.sin(runCycle) * 26;
      legLeft.style.transform = `rotate(${swing}deg)`;
      legRight.style.transform = `rotate(${-swing}deg)`;
      armLeft.style.transform = `rotate(${-swing*0.7}deg)`;
      armRight.style.transform = `rotate(${swing*0.7}deg)`;
      runnerBody.style.transform = `translateY(${Math.abs(Math.sin(runCycle))*-3}px)`;
    } else {
      legLeft.style.transform = `rotate(14deg)`;
      legRight.style.transform = `rotate(-14deg)`;
      armLeft.style.transform = `rotate(-20deg)`;
      armRight.style.transform = `rotate(20deg)`;
    }

    requestAnimationFrame(loop);
  }

  function endGame() {
    running = false;
    finalScore.textContent = `跑了 ${score} 格`;
    gameover.style.display = 'flex';
  }

  requestAnimationFrame(loop);
})();
</script>
<script>/* AI-CAMP-STATS-BEACON */
(function(){
  try{ if(window.top!==window.self) return; }catch(e){ return; } /* 在作品館內由作品館計數與投票 */
  var NS="ai-future-camp", K="t-148c540d";
  var API="//abacus.jasoncameron.dev/";
  function ping(n){ try{ var p=fetch(API+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(p&&p.catch) p.catch(function(){}); }catch(e){} }
  function read(n,cb){ try{ fetch(API+"get/"+NS+"/"+n).then(function(r){ return r.status===404?{value:0}:r.json(); }).then(function(j){ cb(j.value||j.count||0); }).catch(function(){ cb(null); }); }catch(e){ cb(null); } }
  ping(K+"-v");
  var done=false;
  function once(){ if(done)return; done=true; ping(K+"-p"); ping("site-total-plays");
    window.removeEventListener("pointerdown",once); window.removeEventListener("keydown",once); }
  window.addEventListener("pointerdown",once,{once:false}); window.addEventListener("keydown",once,{once:false});
  /* 投票鈕：非常好玩/好玩——與作品館同一計數器，任何網頁打開都同步 */
  function initVotes(){
    if(!document.body) return;
    var wrap=document.createElement("div");
    wrap.style.cssText="position:fixed;right:10px;bottom:10px;z-index:99999;display:flex;gap:6px;font-family:sans-serif;opacity:.92";
    var LS="voted-"+K;
    var defs=[["-love","\u2764\uFE0F","\u975e\u5e38\u597d\u73a9","#ff6cc7"],["-like","\ud83d\udc4d","\u597d\u73a9","#38e1ff"]];
    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;
          b.querySelector("i").textContent=Math.max(0,(n||0)-(c||0));
        }); });
      });
    }
    defs.forEach(function(d){
      var b=document.createElement("button");
      b.type="button"; b.title=d[2];
      b.style.cssText="min-height:42px;padding:8px 14px;border:none;border-radius:999px;background:rgba(15,18,32,.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation";
      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";
      b.addEventListener("click",function(){
        var prev=null; try{ prev=localStorage.getItem(LS); }catch(e){}
        if(prev===d[0]){ ping(K+d[0]+"-c"); try{ localStorage.removeItem(LS); }catch(e){} }
        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);
      });
      btns[d[0]]=b; wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    refresh();
    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* 每10秒同步別人投的票 */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
</script>
</body>
</html>
