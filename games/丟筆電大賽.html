<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>丟筆電大賽</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  :root {
    --bg-0: #14181c;
    --bg-1: #1c2126;
    --panel: #20262c;
    --line: #333c44;
    --ink: #dfe6ea;
    --ink-dim: #8b98a3;
    --accent: #ffcb3d;
    --accent-ink: #1a1400;
    --danger: #ff6b4a;
    --good: #52d17a;
    --bin-body: #3d6fa8;
    --bin-dark: #274a76;
  }
  :root[data-theme="light"] {
    --bg-0: #eef1f3;
    --bg-1: #e4e9ec;
    --panel: #ffffff;
    --line: #cdd5da;
    --ink: #1c2126;
    --ink-dim: #5b6770;
    --accent: #d99a00;
    --accent-ink: #1a1400;
    --danger: #d94f30;
    --good: #1f9e52;
    --bin-body: #3d6fa8;
    --bin-dark: #274a76;
  }
  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) {
      --bg-0: #eef1f3;
      --bg-1: #e4e9ec;
      --panel: #ffffff;
      --line: #cdd5da;
      --ink: #1c2126;
      --ink-dim: #5b6770;
      --accent: #d99a00;
      --accent-ink: #1a1400;
      --danger: #d94f30;
      --good: #1f9e52;
    }
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg-0);
    color: var(--ink);
    font-family: "Segoe UI", "PingFang TC", "Microsoft JhengHei", -apple-system, sans-serif;
    overflow: hidden;
    touch-action: none;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100vh;
    background:
      radial-gradient(ellipse 900px 500px at 78% 100%, color-mix(in srgb, var(--bin-body) 14%, transparent), transparent 70%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 62%);
  }

  /* HUD */
  .hud {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 18px 20px;
    z-index: 10;
    pointer-events: none;
  }
  .hud-group {
    display: flex;
    flex-direction: column;
    gap: 2px;
    background: color-mix(in srgb, var(--panel) 88%, transparent);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 8px 14px;
    backdrop-filter: blur(6px);
  }
  .hud-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-dim);
    font-weight: 600;
  }
  .hud-value {
    font-family: "Cascadia Code", "SF Mono", Consolas, monospace;
    font-variant-numeric: tabular-nums;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.1;
  }
  .hud-value.accent { color: var(--accent); }

  .title-block {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;
    pointer-events: none;
  }
  .title-block h1 {
    margin: 0;
    font-size: clamp(18px, 3vw, 26px);
    font-weight: 800;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .title-block .sub {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-top: 2px;
  }

  #restartBtn {
    position: fixed;
    top: 18px;
    right: 20px;
    margin-top: 56px;
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--ink-dim);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.04em;
    z-index: 11;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  #restartBtn:hover { color: var(--accent); border-color: var(--accent); }
  #restartBtn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  #message {
    position: fixed;
    top: 42%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 800;
    letter-spacing: -0.01em;
    color: var(--good);
    text-shadow: 0 4px 24px rgba(0,0,0,0.35);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.18s ease, transform 0.18s ease;
    z-index: 20;
    text-align: center;
  }
  #message.show { opacity: 1; transform: translate(-50%, -58%) scale(1); }

  #hint {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--ink-dim);
    font-size: 12.5px;
    letter-spacing: 0.02em;
    z-index: 10;
    text-align: center;
    width: 90%;
    pointer-events: none;
  }
  #hint kbd {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1px 6px;
    font-family: inherit;
    color: var(--ink);
  }

  canvas { display: block; width: 100vw; height: 100vh; cursor: grab; }
  canvas.dragging { cursor: grabbing; }

  @media (prefers-reduced-motion: reduce) {
    #message { transition: none; }
  }
</style>
</head>
<body>
<div class="stage">
  <div class="title-block">
    <h1>丟筆電大賽</h1>
    <div class="sub">Laptop Toss — 拖曳、瞄準、放手</div>
  </div>
  <div class="hud">
    <div class="hud-group">
      <div class="hud-label">得分</div>
      <div class="hud-value accent" id="score">0</div>
    </div>
    <div class="hud-group">
      <div class="hud-label">投擲次數</div>
      <div class="hud-value" id="tries">0</div>
    </div>
  </div>
  <button id="restartBtn" type="button">重新開始</button>
  <div id="message"></div>
  <div id="hint">拖曳筆電、朝垃圾桶方向甩開放手 · 也可用手指操作</div>
  <canvas id="game"></canvas>
</div>

<script>
(function () {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const triesEl = document.getElementById('tries');
  const messageEl = document.getElementById('message');
  const restartBtn = document.getElementById('restartBtn');

  const cs = getComputedStyle(document.documentElement);
  function cssVar(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

  let W, H, DPR;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    layoutBin();
  }

  let score = 0;
  let tries = 0;
  const GRAVITY = 1500;

  const bin = { x: 0, y: 0, w: 90, h: 110 };
  function layoutBin() {
    bin.w = Math.min(120, W * 0.17);
    bin.h = bin.w * 1.3;
    bin.x = W - bin.w - Math.max(36, W * 0.09);
    bin.y = H - bin.h - 22;
  }

  function makeLaptop() {
    const size = Math.min(96, W * 0.16);
    return {
      x: Math.max(64, W * 0.15),
      y: H - size - 32,
      w: size,
      h: size * 0.64,
      vx: 0, vy: 0, rot: 0, vrot: 0,
      thrown: false, settled: false, scored: false,
    };
  }
  let laptop = null;

  let dragging = false;
  let dragPoints = [];

  function resetLaptop() {
    laptop = makeLaptop();
    dragging = false;
    dragPoints = [];
    canvas.classList.remove('dragging');
  }

  function pointerPos(e) {
    const rect = canvas.getBoundingClientRect();
    if (e.touches && e.touches.length) {
      return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
    }
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  function onDown(e) {
    if (laptop.thrown) return;
    const p = pointerPos(e);
    const cx = laptop.x + laptop.w / 2;
    const cy = laptop.y + laptop.h / 2;
    if (Math.hypot(p.x - cx, p.y - cy) < Math.max(laptop.w, laptop.h)) {
      dragging = true;
      dragPoints = [{ x: p.x, y: p.y, t: performance.now() }];
      canvas.classList.add('dragging');
      e.preventDefault();
    }
  }

  function onMove(e) {
    if (!dragging) return;
    const p = pointerPos(e);
    laptop.x = p.x - laptop.w / 2;
    laptop.y = p.y - laptop.h / 2;
    dragPoints.push({ x: p.x, y: p.y, t: performance.now() });
    if (dragPoints.length > 6) dragPoints.shift();
    e.preventDefault();
  }

  function onUp(e) {
    if (!dragging) return;
    dragging = false;
    canvas.classList.remove('dragging');
    let vx = 0, vy = 0;
    if (dragPoints.length >= 2) {
      const first = dragPoints[0];
      const last = dragPoints[dragPoints.length - 1];
      const dt = Math.max(16, last.t - first.t) / 1000;
      vx = (last.x - first.x) / dt;
      vy = (last.y - first.y) / dt;
    }
    laptop.vx = vx;
    laptop.vy = vy;
    laptop.vrot = vx * 0.01;
    laptop.thrown = true;
    tries++;
    triesEl.textContent = tries;
    e && e.preventDefault && e.preventDefault();
  }

  canvas.addEventListener('mousedown', onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
  canvas.addEventListener('touchstart', onDown, { passive: false });
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('touchend', onUp, { passive: false });

  function showMessage(text, color) {
    messageEl.textContent = text;
    messageEl.style.color = color;
    messageEl.classList.add('show');
    setTimeout(() => messageEl.classList.remove('show'), 700);
  }

  function checkScore() {
    if (laptop.scored) return;
    const cx = laptop.x + laptop.w / 2;
    const cy = laptop.y + laptop.h / 2;
    const inX = cx > bin.x + bin.w * 0.15 && cx < bin.x + bin.w * 0.85;
    const inY = cy > bin.y - 10 && cy < bin.y + bin.h * 0.6;
    if (inX && inY && laptop.vy > 0) {
      laptop.scored = true;
      score++;
      scoreEl.textContent = score;
      showMessage('命中！+1', cssVar('--good'));
      laptop.vx *= 0.2;
      laptop.vy = 200;
    }
  }

  function update(dt) {
    if (!laptop.thrown) return;
    laptop.vy += GRAVITY * dt;
    laptop.x += laptop.vx * dt;
    laptop.y += laptop.vy * dt;
    laptop.rot += laptop.vrot * dt;

    checkScore();

    if (laptop.x < 0) { laptop.x = 0; laptop.vx *= -0.4; }
    if (laptop.x + laptop.w > W) { laptop.x = W - laptop.w; laptop.vx *= -0.4; }

    const floorY = H - 22 - laptop.h;
    if (laptop.y > floorY) {
      laptop.y = floorY;
      if (Math.abs(laptop.vy) > 60) {
        laptop.vy *= -0.35;
        laptop.vx *= 0.6;
      } else {
        laptop.vy = 0;
        laptop.vx *= 0.8;
        laptop.vrot *= 0.8;
        if (Math.abs(laptop.vx) < 5 && !laptop.settled) {
          laptop.settled = true;
          if (!laptop.scored) showMessage('沒中，再試一次', cssVar('--danger'));
          setTimeout(resetLaptop, 650);
        }
      }
    }
  }

  function drawFloor() {
    ctx.clearRect(0, 0, W, H);
    const grad = ctx.createLinearGradient(0, H - 22, 0, H);
    grad.addColorStop(0, cssVar('--line'));
    grad.addColorStop(1, cssVar('--bg-0'));
    ctx.fillStyle = grad;
    ctx.fillRect(0, H - 22, W, 22);
    ctx.strokeStyle = cssVar('--line');
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, H - 22);
    ctx.lineTo(W, H - 22);
    ctx.stroke();
  }

  function drawBin() {
    const { x, y, w, h } = bin;
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.beginPath();
    ctx.ellipse(x + w / 2, y + h + 6, w * 0.55, 8, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = cssVar('--bin-body');
    ctx.beginPath();
    ctx.moveTo(x + w * 0.08, y + h * 0.15);
    ctx.lineTo(x + w * 0.92, y + h * 0.15);
    ctx.lineTo(x + w * 0.8, y + h);
    ctx.lineTo(x + w * 0.2, y + h);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = cssVar('--bin-dark');
    ctx.lineWidth = 3;
    ctx.stroke();

    ctx.strokeStyle = 'rgba(255,255,255,0.22)';
    ctx.lineWidth = 2;
    for (let i = 1; i < 4; i++) {
      const yy = y + h * 0.15 + (h * 0.85) * (i / 4);
      ctx.beginPath();
      ctx.moveTo(x + w * (0.1 + i * 0.02), yy);
      ctx.lineTo(x + w * (0.9 - i * 0.02), yy);
      ctx.stroke();
    }

    ctx.fillStyle = cssVar('--bin-dark');
    ctx.beginPath();
    ctx.ellipse(x + w / 2, y + h * 0.15, w * 0.46, h * 0.06, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.ellipse(x + w / 2, y + h * 0.15, w * 0.4, h * 0.045, 0, 0, Math.PI * 2);
    ctx.fill();

    // recycling glyph
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.font = `${w * 0.22}px sans-serif`;
    ctx.fillStyle = cssVar('--accent');
    ctx.textAlign = 'center';
    ctx.fillText('♻', x + w / 2, y + h * 0.62);
    ctx.restore();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawLaptop(l) {
    ctx.save();
    const cx = l.x + l.w / 2;
    const cy = l.y + l.h / 2;
    ctx.translate(cx, cy);
    ctx.rotate(l.rot);
    ctx.translate(-l.w / 2, -l.h / 2);

    ctx.fillStyle = '#aab2b8';
    roundRect(0, l.h * 0.55, l.w, l.h * 0.45, 4);
    ctx.fill();
    ctx.strokeStyle = '#5f6a72';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.fillStyle = '#5f6a72';
    roundRect(l.w * 0.04, 0, l.w * 0.92, l.h * 0.55, 5);
    ctx.fill();

    ctx.fillStyle = cssVar('--bin-body');
    roundRect(l.w * 0.1, l.h * 0.06, l.w * 0.8, l.h * 0.4, 3);
    ctx.fill();

    ctx.fillStyle = cssVar('--accent');
    ctx.beginPath();
    ctx.arc(l.w / 2, l.h * 0.15, 2.6, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawAimLine() {
    if (!dragging || dragPoints.length < 2) return;
    const first = dragPoints[0];
    const last = dragPoints[dragPoints.length - 1];
    ctx.strokeStyle = cssVar('--accent');
    ctx.globalAlpha = 0.55;
    ctx.lineWidth = 3;
    ctx.setLineDash([6, 6]);
    ctx.beginPath();
    ctx.moveTo(last.x, last.y);
    ctx.lineTo(last.x + (last.x - first.x) * 2, last.y + (last.y - first.y) * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
  }

  let lastT = performance.now();
  function loop(t) {
    const dt = Math.min(0.032, (t - lastT) / 1000);
    lastT = t;
    update(dt);
    drawFloor();
    drawBin();
    drawAimLine();
    drawLaptop(laptop);
    requestAnimationFrame(loop);
  }

  restartBtn.addEventListener('click', () => {
    score = 0;
    tries = 0;
    scoreEl.textContent = 0;
    triesEl.textContent = 0;
    resetLaptop();
  });

  window.addEventListener('resize', resize);
  resize();
  resetLaptop();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
