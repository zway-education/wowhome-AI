<!DOCTYPE html>
<!-- 專業AI升級 v6 -->
<!-- v6 升級摘要：夜賽球場全面烘焙升級(照明光束/草皮質地/看板光/暗角vignette)＋觀眾席相機閃光與光束塵埃氛圍層＋進球螢幕閃光與加法光暈球軌跡＋足球改離屏立體精靈；音效新增程序化體育場殘響ConvolverNode與人群嗡嗡氛圍循環(進球swell/失誤ducking)；主迴圈漸層全面快取、零createGradient -->
<!-- v5 升級摘要：修正門框RNG覆蓋完美進球的不公判定／補齊Z-X弧線鍵操作說明／新增直向裝置轉橫提示／加入連續進球combo回饋／鍵盤瞄準補上即時力道條 -->
<!-- v5 補強輪：角色精細化(輪廓線/漸層光影/高光/表情兩態/squash&stretch，Minecraft路人改離屏sprite)／觸控可玩稽核／新增大螢幕提醒浮層 -->
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="author" content="AI未來創作營隊">
<title>梅西世紀任意球</title>
<style>
  html,body{margin:0;height:100%;background:#0d2b12;overflow:hidden;touch-action:none;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;
    font-family:"Noto Sans TC","Microsoft JhengHei","PingFang TC",sans-serif}
  canvas{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);cursor:crosshair;touch-action:none}
  #mute{position:fixed;right:10px;top:10px;width:52px;height:52px;border-radius:50%;
    background:rgba(10,20,10,.72);border:2px solid rgba(56,225,255,.8);color:#eafff5;
    font-size:22px;z-index:10;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:none}
  #hint{position:absolute;left:50%;bottom:12px;transform:translateX(-50%);color:#fffc;
    font-size:13px;letter-spacing:1px;pointer-events:none;text-shadow:0 1px 3px #000;
    opacity:0;transition:opacity .4s;text-align:center;width:96%}
  #hint.show{opacity:1}
  #rotateHint{position:fixed;inset:0;z-index:50;background:rgba(5,15,10,.94);color:#eafff5;
    display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    gap:16px;padding:20px;box-sizing:border-box}
  #rotateHint.show{display:flex}
  #rotateHint .ricon{font-size:54px;animation:rot 1.5s ease-in-out infinite}
  #rotateHint .rtext{font-size:19px;line-height:1.7;font-weight:700}
  #rotateHint button{font-size:16px;font-weight:700;padding:12px 26px;border-radius:30px;
    border:2px solid rgba(56,225,255,.8);background:rgba(56,225,255,.16);color:#eafff5;cursor:pointer;
    min-height:48px}
  @keyframes rot{0%,100%{transform:rotate(0deg)}50%{transform:rotate(90deg)}}
  /* 大螢幕提醒浮層（17款統一規格） */
  #bigscreenHint{position:fixed;inset:0;z-index:9999;background:rgba(7,11,20,.9);
    display:none;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;
    touch-action:none}
  #bigscreenHint.show{display:flex}
  #bigscreenHint.hide{animation:bsFade .28s ease forwards}
  @keyframes bsFade{to{opacity:0}}
  #bigscreenHint .bscard{max-width:420px;width:100%;background:rgba(14,20,34,.94);
    border:1px solid rgba(255,255,255,.16);border-radius:16px;padding:34px 26px 28px;
    text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.55);
    animation:bsPop .35s cubic-bezier(.2,1.5,.4,1)}
  @keyframes bsPop{from{transform:scale(.86);opacity:0}to{transform:scale(1);opacity:1}}
  #bigscreenHint svg{display:block;margin:0 auto 16px}
  #bigscreenHint h2{margin:0 0 10px;font-size:22px;font-weight:900;letter-spacing:.5px;
    background:linear-gradient(92deg,#38e1ff,#4f7cff,#9a6bff);
    -webkit-background-clip:text;background-clip:text;color:transparent}
  #bigscreenHint p{margin:0 0 24px;font-size:15px;line-height:1.7;color:#c8d6e8}
  #bigscreenHint button{min-height:52px;width:66%;border:none;border-radius:30px;
    background:linear-gradient(92deg,#38e1ff,#4f7cff,#9a6bff);color:#07101c;
    font-size:16px;font-weight:900;cursor:pointer;touch-action:none}
</style>
</head>
<body>
<canvas id="game"></canvas>
<button id="mute" aria-label="靜音切換">🔊</button>
<div id="hint"></div>
<div id="rotateHint">
  <div class="ricon">📱</div>
  <div class="rtext">請將裝置轉為橫向<br>畫面與操作會更完整好玩</div>
  <button id="rotateSkip" type="button">仍要直向繼續玩</button>
</div>
<div id="bigscreenHint">
  <div class="bscard">
    <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="bsg" x1="0" y1="0" x2="56" y2="56">
        <stop offset="0" stop-color="#38e1ff"/><stop offset=".5" stop-color="#4f7cff"/><stop offset="1" stop-color="#9a6bff"/>
      </linearGradient></defs>
      <rect x="4" y="9" width="48" height="30" rx="4" stroke="url(#bsg)" stroke-width="3"/>
      <line x1="20" y1="47" x2="36" y2="47" stroke="url(#bsg)" stroke-width="3" stroke-linecap="round"/>
      <line x1="28" y1="39" x2="28" y2="47" stroke="url(#bsg)" stroke-width="3"/>
      <path d="M13 27l6-7 6 5 8-10 8 6" stroke="url(#bsg)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    <h2>建議使用大螢幕遊玩</h2>
    <p>用平板或電腦打開，體驗更完整</p>
    <button id="bigscreenOk" type="button">知道了，繼續玩</button>
  </div>
</div>
<script>
'use strict';
/* =====================================================================
   梅西世紀任意球 PRO v5
   核心：拖曳瞄準射任意球——雙門將「西羅」「卡卡」聯防、獅子巡邏、金色目標區
   v4 進階內容：傳奇模式（進 4 球解鎖）——跳躍人牆＋三獅巡邏＋更小目標
   v5 升級：門框RNG不再吃案完美射門／標題與提示補齊Z-X弧線鍵說明／
            直向裝置轉橫提示／連續進球combo回饋／鍵盤瞄準力道條
   ===================================================================== */
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize(){
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width  = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale;
}
addEventListener('resize', resize); resize();

/* ===== 直向裝置提示（v5 新增）===== */
const rotateEl = document.getElementById('rotateHint');
let rotateSkipped = false;
function checkOrientation(){
  const portrait = innerHeight > innerWidth && innerWidth < 900;
  rotateEl.classList.toggle('show', portrait && !rotateSkipped);
}
document.getElementById('rotateSkip').addEventListener('click', e => {
  e.stopPropagation(); rotateSkipped = true; rotateEl.classList.remove('show');
});
addEventListener('resize', checkOrientation);
addEventListener('orientationchange', () => { rotateSkipped = false; checkOrientation(); });
checkOrientation();

/* ===== 大螢幕提醒浮層（僅手機觸發，一個 session 只跳一次；不攔截遊戲初始化）===== */
(function(){
  const isPhone = Math.min(screen.width, screen.height) < 600 || innerWidth < 768;
  if(!isPhone) return;
  let already = false;
  try{ already = !!sessionStorage.getItem('bigscreen-hint'); }catch(e){}
  if(already) return;
  const el = document.getElementById('bigscreenHint');
  el.classList.add('show');
  document.getElementById('bigscreenOk').addEventListener('click', function(e){
    e.stopPropagation();
    try{ sessionStorage.setItem('bigscreen-hint','1'); }catch(err){}
    el.classList.add('hide');
    setTimeout(()=>{ el.remove(); }, 300);
  });
})();

/* ===== 工具 ===== */
const clamp=(v,a,b)=> v<a?a:v>b?b:v;
const lerp=(a,b,t)=> a+(b-a)*t;
const ss=(t,a,b)=> clamp((t-a)/(b-a),0,1);
const rnd=(a,b)=> a+Math.random()*(b-a);
const TAU = Math.PI*2;
const easeOutBack = t => 1 + 2.7*Math.pow(t-1,3) + 1.7*Math.pow(t-1,2);
const easeOutCubic = t => 1 - Math.pow(1-t,3);
const FONT = '"Noto Sans TC","Microsoft JhengHei",sans-serif';

/* ===== 存檔 ===== */
const LS = {
  get(k,d){ try{ const v = localStorage.getItem(k); return v===null?d:v; }catch(e){ return d; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
};
let best = Number(LS.get('messipro_best',0)) || 0;
let bestLegend = Number(LS.get('messipro_best_legend',0)) || 0;
let legendUnlocked = LS.get('messipro_legend','0') === '1';

/* ===== 音效：Web Audio 合成＋DynamicsCompressor 主匯流排 ===== */
let AC = null, master = null, noiseBuf = null;
let ambGain = null, ambOut = null;
const AMB = 0.05;
let muted = LS.get('messipro_muted','0') === '1';
function initAudio(){
  if(!AC){
    try{
      AC = new (window.AudioContext || window.webkitAudioContext)();
      const comp = AC.createDynamicsCompressor();
      comp.threshold.value = -18; comp.knee.value = 24; comp.ratio.value = 8;
      master = AC.createGain(); master.gain.value = 0.6;
      master.connect(comp); comp.connect(AC.destination);
      /* v6：程序化體育場殘響——generated impulse 的 ConvolverNode（大場館尾音） */
      try{
        const sr = AC.sampleRate, len = Math.floor(sr*1.7);
        const imp = AC.createBuffer(2, len, sr);
        for(let ch=0; ch<2; ch++){
          const d = imp.getChannelData(ch);
          for(let i=0;i<len;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/len, 2.8);
        }
        const conv = AC.createConvolver(); conv.buffer = imp;
        const wet = AC.createGain(); wet.gain.value = 0.24;
        master.connect(conv); conv.connect(wet); wet.connect(comp);
      }catch(e){}
      /* v6：人群氛圍循環層——棕噪聲帶通模擬觀眾嗡嗡＋LFO緩慢起伏；主音效時 ducking */
      try{
        const sr = AC.sampleRate, alen = Math.floor(sr*2.5);
        const abuf = AC.createBuffer(1, alen, sr);
        const ad = abuf.getChannelData(0); let v = 0;
        for(let i=0;i<alen;i++){ v = v*0.985 + (Math.random()*2-1)*0.06; ad[i] = v*2.4; }
        const src = AC.createBufferSource(); src.buffer = abuf; src.loop = true;
        const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 460; bp.Q.value = 0.5;
        ambGain = AC.createGain(); ambGain.gain.value = AMB;
        const lfo = AC.createOscillator(); lfo.frequency.value = 0.11;
        const lg = AC.createGain(); lg.gain.value = AMB*0.4;
        lfo.connect(lg); lg.connect(ambGain.gain);
        ambOut = AC.createGain(); ambOut.gain.value = muted ? 0 : 1;
        src.connect(bp); bp.connect(ambGain); ambGain.connect(ambOut); ambOut.connect(comp);
        src.start(); lfo.start();
      }catch(e){}
    }catch(e){}
  }
  if(AC && AC.state === 'suspended') AC.resume();
}
/* v6：氛圍層 ducking（失誤/撲救時人群安靜一拍）與 swell（進球時歡呼湧起） */
function duckAmb(){
  if(!AC || !ambGain) return;
  const t = AC.currentTime;
  ambGain.gain.cancelScheduledValues(t);
  ambGain.gain.setValueAtTime(Math.max(0.001, ambGain.gain.value), t);
  ambGain.gain.linearRampToValueAtTime(AMB*0.22, t+0.05);
  ambGain.gain.linearRampToValueAtTime(AMB, t+0.9);
}
function swellAmb(){
  if(!AC || !ambGain) return;
  const t = AC.currentTime;
  ambGain.gain.cancelScheduledValues(t);
  ambGain.gain.setValueAtTime(Math.max(0.001, ambGain.gain.value), t);
  ambGain.gain.linearRampToValueAtTime(AMB*3.4, t+0.12);
  ambGain.gain.linearRampToValueAtTime(AMB, t+1.7);
}
addEventListener('pointerdown', initAudio);
addEventListener('keydown', initAudio);
const rp = f => f * (0.94 + Math.random()*0.12);
function beep(freq, dur, type, vol, slide, delay){
  if(muted || !AC || !master) return;
  const t0 = AC.currentTime + (delay||0);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq+slide), t0+dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0+0.012);
  g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  o.connect(g).connect(master);
  o.start(t0); o.stop(t0+dur+0.06);
}
function noise(dur, vol, delay){
  if(muted || !AC || !master) return;
  if(!noiseBuf){
    const len = Math.floor(AC.sampleRate*0.5);
    noiseBuf = AC.createBuffer(1,len,AC.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for(let i=0;i<len;i++) d[i] = (Math.random()*2-1)*(1-i/len);
  }
  const t0 = AC.currentTime + (delay||0);
  const src = AC.createBufferSource(); src.buffer = noiseBuf;
  src.playbackRate.value = 0.5/dur * (0.9+Math.random()*0.2);
  const g = AC.createGain();
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  src.connect(g).connect(master); src.start(t0);
}
const sfx = {
  kick(){ beep(rp(140),0.09,'square',0.18,120); noise(0.08,0.12); },
  goal(){ [523,659,784,1046].forEach((f,i)=> beep(rp(f),0.16,'square',0.15,0,i*0.09)); noise(0.6,0.13,0.05); swellAmb(); },
  perfect(){ [659,784,1046,1319,1568].forEach((f,i)=> beep(rp(f),0.15,'square',0.13,0,i*0.08)); noise(0.7,0.14,0.05); swellAmb(); },
  save(){ beep(rp(180),0.2,'sawtooth',0.16,-100); noise(0.15,0.11,0.02); duckAmb(); },
  crossbar(){ beep(rp(900),0.18,'triangle',0.14); beep(rp(1200),0.12,'triangle',0.1,0,0.05); duckAmb(); },
  whistle(){ beep(rp(1700),0.35,'sine',0.11,-40); },
  roar(){ beep(rp(90),0.35,'sawtooth',0.18,60); noise(0.3,0.14,0.03); duckAmb(); },
  wall(){ beep(rp(240),0.14,'square',0.14,-80); noise(0.1,0.1); duckAmb(); },
  ui(){ beep(rp(660),0.06,'square',0.08); },
  crowd(){ noise(0.8,0.08); },
  end(){ [784,659,523,659,784,1046].forEach((f,i)=> beep(f,0.18,'triangle',0.12,0,i*0.12)); },
  combo(n){ const base = 740 + clamp(n,2,8)*30; [0,1,2].forEach((i)=> beep(rp(base+i*160),0.11,'square',0.13,0,i*0.055)); }
};
const muteBtn = document.getElementById('mute');
function syncMute(){
  muteBtn.textContent = muted ? '🔇' : '🔊';
  if(ambOut) ambOut.gain.value = muted ? 0 : 1;
}
muteBtn.addEventListener('click', e => { e.stopPropagation(); muted = !muted; LS.set('messipro_muted', muted?'1':'0'); syncMute(); });
syncMute();

/* ===== 輸入：拖曳（滑鼠/觸控）＋鍵盤瞄準 ===== */
const input = { dragging:false, sx:0, sy:0, cx:0, cy:0, path:[], released:false,
                confirm:false, kLeft:false, kRight:false, kUp:false, kDown:false, kCurlL:false, kCurlR:false, kShoot:false };
function toLogical(cx, cy){
  const r = canvas.getBoundingClientRect();
  return { x:(cx-r.left)/canvas._scale, y:(cy-r.top)/canvas._scale };
}
function activeButtons(){ return (state && state.buttons) ? state.buttons() : []; }
function hitButton(p){
  for(const b of activeButtons())
    if(p.x>=b.x-8 && p.x<=b.x+b.w+8 && p.y>=b.y-8 && p.y<=b.y+b.h+8 && !b.disabled) return b;
  return null;
}
function dragStart(x,y){
  const b = hitButton({x,y});
  if(b){ sfx.ui(); b.cb(); return; }
  if(state === playState && playState.phase === 'aim'){
    input.dragging = true; input.sx = x; input.sy = y; input.cx = x; input.cy = y; input.path = [{x,y}];
  }
}
function dragMove(x,y){
  if(!input.dragging) return;
  input.cx = x; input.cy = y; input.path.push({x,y});
  if(input.path.length > 40) input.path.shift();
}
function dragEnd(){
  if(input.dragging){ input.dragging = false; input.released = true; }
}
canvas.addEventListener('mousedown', e => { const p = toLogical(e.clientX,e.clientY); dragStart(p.x,p.y); });
addEventListener('mousemove', e => { const p = toLogical(e.clientX,e.clientY); dragMove(p.x,p.y); });
addEventListener('mouseup', dragEnd);
canvas.addEventListener('touchstart', e => { e.preventDefault(); const t=e.changedTouches[0]; const p=toLogical(t.clientX,t.clientY); dragStart(p.x,p.y); }, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); const t=e.touches[0]; if(t){ const p=toLogical(t.clientX,t.clientY); dragMove(p.x,p.y); } }, {passive:false});
canvas.addEventListener('touchend', e => { e.preventDefault(); dragEnd(); }, {passive:false});
canvas.addEventListener('touchcancel', e => { e.preventDefault(); dragEnd(); }, {passive:false});
addEventListener('keydown', e => {
  const map = { ArrowLeft:'kLeft', KeyA:'kLeft', ArrowRight:'kRight', KeyD:'kRight',
                ArrowUp:'kUp', KeyW:'kUp', ArrowDown:'kDown', KeyS:'kDown',
                KeyZ:'kCurlL', KeyX:'kCurlR' };
  if(map[e.code]){ e.preventDefault(); input[map[e.code]] = true; return; }
  if(e.code === 'Space' || e.code === 'Enter'){ e.preventDefault(); if(!e.repeat){ input.confirm = true; input.kShoot = true; } }
  else if(e.code === 'KeyM'){ muted = !muted; LS.set('messipro_muted', muted?'1':'0'); syncMute(); }
});
addEventListener('keyup', e => {
  const map = { ArrowLeft:'kLeft', KeyA:'kLeft', ArrowRight:'kRight', KeyD:'kRight',
                ArrowUp:'kUp', KeyW:'kUp', ArrowDown:'kDown', KeyS:'kDown',
                KeyZ:'kCurlL', KeyX:'kCurlR' };
  if(map[e.code]) input[map[e.code]] = false;
});

/* ===== 粒子（swap-pop）與飄字 ===== */
const MAX_PARTS = 300;
let parts = [];
function burst(x,y,color,n,speed,grav){
  for(let i=0;i<n && parts.length<MAX_PARTS;i++){
    const a = Math.random()*TAU, s = (speed||220)*(0.3+Math.random()*0.7);
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-60,life:rnd(0.4,0.8),max:0.8,color,s:rnd(3,6),g:grav===undefined?500:grav});
  }
}
function updateParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p = parts[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += p.g*dt; p.life -= dt;
    if(p.life<=0){ parts[i]=parts[parts.length-1]; parts.pop(); }
  }
}
function drawParts(){
  for(const p of parts){
    ctx.globalAlpha = clamp(p.life/p.max,0,1);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-p.s/2, p.y-p.s/2, p.s, p.s);
  }
  ctx.globalAlpha = 1;
}
let floats = [];
function floatText(x,y,text,color,big){ floats.push({x,y,text,color,life:0.9,max:0.9,big:big||24}); }
/* v5 新增：連續進球 combo 回饋文案（獎勵大聲、愈連愈熱烈） */
const COMBO_COLORS = ['#38e1ff','#ffcf5c','#ff6cc7','#9a6bff'];
function comboLabel(n){
  if(n>=6) return n+' 連殺！神了！！';
  if(n>=4) return n+' 連殺！太猛了！';
  return n+' 連中！';
}
function updateFloats(dt){
  for(let i=floats.length-1;i>=0;i--){
    const f = floats[i]; f.y -= 42*dt; f.life -= dt;
    if(f.life<=0){ floats[i]=floats[floats.length-1]; floats.pop(); }
  }
}
function drawFloats(){
  ctx.textAlign='center';
  for(const f of floats){
    ctx.font='900 '+f.big+'px '+FONT;
    ctx.globalAlpha = clamp(f.life/f.max,0,1);
    ctx.lineWidth=5; ctx.strokeStyle='rgba(0,0,0,.5)';
    ctx.strokeText(f.text, f.x, f.y); ctx.fillStyle=f.color; ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

/* ===== 場景常數 ===== */
const GOAL = { x1:330, x2:630, y:118, h:78 };
const BALL_START = { x:480, y:462 };

  gr.addColorStop(0,color); gr.addColorStop(1,'rgba(0,0,0,0)');

/* ===== 角色精細化：共用繪圖輔助（描邊/漸層光影/高光/表情）===== */
function oRect(x,y,w,h,fill){
  ctx.beginPath(); ctx.rect(x,y,w,h);

  ctx.lineWidth = 1.4; ctx.strokeStyle = 'rgba(0,0,0,.38)'; ctx.stroke();

function oEllipse(cx,cy,rx,ry,rot,fill){

  ctx.fillStyle = fill; ctx.fill();
  ctx.lineWidth = 1.2; ctx.strokeStyle = 'rgba(0,0,0,.35)'; ctx.stroke();
}
function limbLine(x1,y1,x2,y2,width,color){
  ctx.lineCap = 'round';
  ctx.strokeStyle = 'rgba(12,8,6,.5)'; ctx.lineWidth = width + 1.8;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.strokeStyle = color; ctx.lineWidth = width;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();

/* v6：漸層快取——角色都在自身局部座標繪製，同參數漸層可重用，主迴圈零 createGradient */
const _gradCache = new Map();
function grad2(x0,y0,x1,y1,c0,c1){
  const k = 'L'+x0+','+y0+','+x1+','+y1+','+c0+c1;
  let g = _gradCache.get(k);
  if(!g){
    g = ctx.createLinearGradient(x0,y0,x1,y1);
    g.addColorStop(0,c0); g.addColorStop(1,c1);
    _gradCache.set(k,g);
  }
  return g;
}
function headGrad(cx,cy,r,light,base,dark){
  const k = 'R'+cx+','+cy+','+r+','+light+base+dark;
  let g = _gradCache.get(k);
  if(!g){
    g = ctx.createRadialGradient(cx-r*0.4,cy-r*0.4,r*0.1, cx,cy,r*1.1);
    g.addColorStop(0,light); g.addColorStop(0.55,base); g.addColorStop(1,dark);
    _gradCache.set(k,g);
  }
  return g;
}
function glint(cx,cy,rx,ry,rot){
  ctx.fillStyle = 'rgba(255,255,255,.55)';
  ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,rot||0,0,TAU); ctx.fill();
}
function lighten(hex, amt){
  amt = amt===undefined ? 0.35 : amt;
  const h = hex.replace('#','');
  const full = h.length===3 ? h.split('').map(c=>c+c).join('') : h;
  const num = parseInt(full,16);
  let r=(num>>16)&255, g=(num>>8)&255, b=num&255;
  r = Math.round(r+(255-r)*amt); g = Math.round(g+(255-g)*amt); b = Math.round(b+(255-b)*amt);
  return 'rgb('+r+','+g+','+b+')';
}
/* 通用臉部表情：normal(平常) / happy(開心) / shock(受擊/漏接) / roar(咆哮)——至少兩種狀態 */
function faceFeatures(cx,cy,r,expr){
  expr = expr || 'normal';
  const eyeY = cy - r*0.05, eyeDX = r*0.34;
  if(expr==='happy'){
    ctx.lineWidth = Math.max(1.4,r*0.13); ctx.strokeStyle = '#161010'; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(cx-eyeDX,eyeY+r*0.08,r*0.16,Math.PI,0); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx+eyeDX,eyeY+r*0.08,r*0.16,Math.PI,0); ctx.stroke();
  } else {
    const er = expr==='shock' ? r*0.16 : r*0.115;
    ctx.fillStyle = '#161010';
    ctx.beginPath(); ctx.arc(cx-eyeDX,eyeY,er,0,TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+eyeDX,eyeY,er,0,TAU); ctx.fill();
  }
  if(expr==='happy'){
    ctx.strokeStyle = '#3a1c10'; ctx.lineWidth = Math.max(1.4,r*0.14); ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(cx, cy+r*0.26, r*0.34, 0.12*Math.PI, 0.88*Math.PI); ctx.stroke();
  } else if(expr==='shock'){
    ctx.fillStyle = '#3a1c10';
    ctx.beginPath(); ctx.ellipse(cx, cy+r*0.42, r*0.15, r*0.2, 0,0,TAU); ctx.fill();
  } else {
    ctx.strokeStyle = '#3a1c10'; ctx.lineWidth = Math.max(1.3,r*0.11); ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(cx-r*0.16, cy+r*0.4); ctx.lineTo(cx+r*0.16, cy+r*0.4); ctx.stroke();
  }
}

        this.blockedByWall = false;
        /* 傳奇模式：人牆跳躍 */
        for(const w of this.wall) w.jumpT = 1;
      }
    } else if(this.phase === 'flight'){
      this.flightT += dt;
      const t = clamp(this.flightT/this.flightDur, 0, 1);
      const bx0 = BALL_START.x, by0 = BALL_START.y;
      const straightX = lerp(bx0, this.aimTx, t);
      const bend = this.curve * Math.sin(t*Math.PI) * 40;
      this.ball.x = straightX + bend;
      this.ball.y = lerp(by0, this.aimTy, easeOutCubic(t));
      this.ball.z = Math.sin(t*Math.PI) * lerp(10, 70, this.loft);
      this.ball.spin += dt*20;
      this.trail.push({ x:this.ball.x, y:this.ball.y - this.ball.z, t:0.3 });
      if(this.trail.length > 14) this.trail.shift();
      for(const tr of this.trail) tr.t -= dt;

      for(const k of this.keepers){
        if(!k.reacted && t > 0.18){
          k.reacted = true;
          const noise2 = this.legend ? clamp(0.55 - this.round*0.04, 0.16, 0.55)
                                     : (this.round <= 2 ? 1.15 : clamp(0.9 - this.round*0.05, 0.3, 0.9));
          k.targetX = clamp(this.aimTx + (Math.random()*2-1)*80*noise2, GOAL.x1+20, GOAL.x2-20);
          k.dive = k.targetX > k.x ? 1 : -1;
        }
        if(k.reacted){
          k.diveT = clamp(k.diveT + dt*2.2, 0, 1);
          k.x = lerp(k.x, k.targetX, 1 - Math.pow(0.02, dt));
        }
      }
      /* 傳奇模式：人牆攔截（低平球） */
      if(this.legend && !this.blockedByWall && t > 0.32 && t < 0.42){
        const nearWall = this.wall.some(w => Math.abs(this.wallX + w.off - this.ball.x) < 20);
        if(nearWall && this.ball.z < 34 && this.loft < 0.55){
          this.blockedByWall = true;
        }
      }
      /* 獅子攔截 */
      if(!this.lionChecked && t > 0.3 && t < 0.55){
        this.lionChecked = true;
        const nearLion = this.lions.some(l => Math.abs(l.x - this.ball.x) < 26 && this.ball.z < 40);
        if(nearLion) this.blockedByLion = true;
      }
      if(this.blockedByWall){
        this.resolveShot(); return;
      }
      if(t >= 1) this.resolveShot();
    } else if(this.phase === 'result'){
      this.phaseT += dt;
      if(this.phaseT > 1.0 && (input.released || input.confirm)){
        input.released = false; input.confirm = false; input.kShoot = false;
        this.nextRound();
      }
    }
    input.confirm = false; input.kShoot = false;
  },
  resolveShot(){
    this.attempts++;
    const hitTarget = Math.hypot(this.aimTx-this.target.x, this.aimTy-this.target.y) < this.target.r;
    /* v5 修正：原本 aimTy 最高只會到 134（GOAL.y+16），但門框判定門檻是 GOAL.y+10=128，
       數值範圍根本碰不到——門框特效與音效是永遠不會觸發的死代碼。
       調整門檻到 GOAL.y+20=138，讓「大力抽射門楣」重新變成可能發生的真實風險；
       並加上寬容設計保護：射中金色目標區的完美射門不會被這個RNG吃案。 */
    const crossbarHit = !hitTarget && this.aimTy < GOAL.y + 20 && Math.random() < 0.12;
    const keeperReach = this.legend ? lerp(52, 30, this.loft) : lerp(46, 26, this.loft);
    const savingKeeper = !hitTarget ? this.keepers.find(k => Math.abs(k.x - this.aimTx) < keeperReach) : null;
    const lionBlocked = !hitTarget && this.blockedByLion;
    if(this.blockedByWall){
      this.result = '被人牆擋下！'; this.resultColor = '#ff6cc7';
      sfx.wall();
      shake = Math.max(shake, 5); freeze = Math.max(freeze, 0.06);
      burst(this.ball.x, this.ball.y - this.ball.z, '#e0342e', 16, 220);
      this.streak = 0;
    } else if(crossbarHit){
      this.result = '鏘！打到門框！'; this.resultColor = '#f4f4f4';
      sfx.crossbar();
      shake = Math.max(shake, 6);
      burst(this.aimTx, GOAL.y, '#f4f4f4', 14, 200);
      this.streak = 0;
    } else if(lionBlocked){
      this.result = '被獅子擋下！'; this.resultColor = '#d99a3f';
      sfx.roar();
      shake = Math.max(shake, 5);
      burst(this.ball.x, this.ball.y - this.ball.z, '#d99a3f', 18, 220);
      this.streak = 0;
      this.lionRoarT = 0.6;
    } else if(savingKeeper){
      this.result = '被'+savingKeeper.name+'撲出！'; this.resultColor = '#ff6cc7';
      sfx.save();
      shake = Math.max(shake, 4);
      burst(savingKeeper.x, GOAL.y+40, savingKeeper.jersey, 18, 220);
      this.streak = 0;
      savingKeeper.expr = 'happy';
    } else if(hitTarget){
      this.result = '完美進球！！'; this.resultColor = '#ffcf5c';
      this.goals++; this.perfects++;
      shake = 12; freeze = Math.max(freeze, 0.1);
      this.netRipple = 0.6;
      sfx.perfect(); sfx.crowd();
      burst(this.aimTx, this.aimTy, '#ffcf5c', 30, 300);
      burst(this.aimTx, this.aimTy, '#38e1ff', 16, 220);
      for(let i=0;i<10;i++) burst(rnd(80,880), rnd(20,64), ['#38e1ff','#ff6cc7','#ffcf5c'][i%3], 2, 60, 120);
      floatText(GAME_W/2, 300, '神仙球！', '#ffcf5c', 30);
      this.streak++; if(this.streak > this.bestStreak) this.bestStreak = this.streak;
      for(const k of this.keepers) k.expr = 'shock';
      this.bystanderCheerT = 1.3;
      flashBurst(12); screenFlashT = 0.16;
    } else {
      this.result = '進球！GOAL！'; this.resultColor = '#38e1ff';
      this.goals++;
      shake = 8;
      this.netRipple = 0.6;
      sfx.goal(); sfx.crowd();
      burst(this.aimTx, this.aimTy, '#38e1ff', 22, 260);
      for(let i=0;i<6;i++) burst(rnd(80,880), rnd(20,64), '#fff', 2, 60, 120);
      floatText(GAME_W/2, 300, '+1 進球', '#38e1ff', 26);
      this.streak++; if(this.streak > this.bestStreak) this.bestStreak = this.streak;
      for(const k of this.keepers) k.expr = 'shock';
      this.bystanderCheerT = 1.3;
      flashBurst(8); screenFlashT = 0.11;
    }
    /* v5 新增：連續進球 combo 回饋——愈連愈熱烈的文字/顏色/音效疊層 */
    if(this.streak >= 2){
      const cc = COMBO_COLORS[(this.streak-2) % COMBO_COLORS.length];
      floatText(GAME_W/2, 348, comboLabel(this.streak), cc, Math.min(26 + this.streak*2, 40));
      sfx.combo(this.streak);
      burst(GAME_W/2, 348, cc, Math.min(6 + this.streak*2, 24), 160, 260);
    }
    this.phase = 'result'; this.phaseT = 0;
  },
  nextRound(){
    if(this.attempts >= this.maxAttempts){ endMatch(); return; }
    this.round++;
    this.ball = { x:BALL_START.x, y:BALL_START.y, z:0, spin:0 };
    this.trail.length = 0;
    this.target = this.makeTarget();
    for(const k of this.keepers){ k.x = clamp(k.x + rnd(-20,20), GOAL.x1+30, GOAL.x2-30); k.dive=0; k.diveT=0; k.reacted=false; k.expr='normal'; }
    this.phase = 'aim'; this.phaseT = 0; this.kickPhase = 0;
    this.kCurve = 0;
    sfx.whistle();
  },
  draw(){
    ctx.drawImage(bakedPitch, 0, 0, GAME_W, GAME_H);
    drawFloodlights();
    ctx.save();
    ctx.translate((Math.random()*2-1)*shake, (Math.random()*2-1)*shake);
    drawGoalAndNet(this.netRipple);
    drawTarget(this.target.x, this.target.y, this.target.r, this.phaseT + worldT);
    for(const k of this.keepers) drawKeeper(k.x, GOAL.y+42, 1.05, k.dive, k.diveT, k.number, k.name, k.jersey, k.expr);
    /* 傳奇模式人牆（含落地squash） */
    for(const w of this.wall){
      const jh = Math.sin((1 - w.jumpT) * Math.PI) * (w.jumpT > 0 ? 34 : 0);
      drawWallDefender(this.wallX + w.off, WALL_Y, 0.9, jh, worldT, w.landT/0.16);
    }
    const lionExpr = this.lionRoarT > 0 ? 'roar' : 'normal';
    for(const l of this.lions) drawLion(l.x, LION_Y, 1, l.dir >= 0 ? 1 : -1, worldT, lionExpr);
    const cheer = this.bystanderCheerT > 0;
    drawMinecraftBystander(120, 470, 1.15, worldT*1.3, cheer);
    drawMinecraftBystander(850, 470, 1.15, worldT*1.3 + 1.6, cheer);
    /* 拖曳瞄準預覽 */
    if(this.phase === 'aim' && input.dragging){
      const dx = input.cx - input.sx, dy = input.sy - input.cy;
      const dragLen = Math.hypot(dx,dy);
      const power = clamp(dragLen/230, 0, 1);
      const previewX = clamp(480 + dx*1.6, GOAL.x1+18, GOAL.x2-18);
      const previewY = lerp(GOAL.y+GOAL.h-14, GOAL.y+16, power);
      ctx.strokeStyle = 'rgba(56,225,255,.7)'; ctx.setLineDash([6,6]); ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(BALL_START.x, BALL_START.y);
      ctx.quadraticCurveTo((BALL_START.x+previewX)/2, (BALL_START.y+previewY)/2, previewX, previewY); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = dragLen<18 ? 'rgba(255,108,199,.6)' : 'rgba(56,225,255,.85)';
      ctx.beginPath(); ctx.arc(previewX, previewY, 10, 0, TAU); ctx.fill();
      /* 力道條 */
      ctx.fillStyle = 'rgba(0,0,0,.45)';
      ctx.fillRect(GAME_W/2-90, GAME_H-46, 180, 14);
      ctx.fillStyle = power > 0.75 ? '#ff6cc7' : '#38e1ff';
      ctx.fillRect(GAME_W/2-88, GAME_H-44, 176*power, 10);
    }
    /* 鍵盤瞄準標記 */
    if(this.phase === 'aim' && !input.dragging){
      const py = lerp(GOAL.y+GOAL.h-14, GOAL.y+16, this.kPower);
      ctx.strokeStyle = 'rgba(56,225,255,.55)'; ctx.lineWidth = 2; ctx.setLineDash([4,5]);
      ctx.beginPath(); ctx.moveTo(this.kAimX-16, py); ctx.lineTo(this.kAimX+16, py);
      ctx.moveTo(this.kAimX, py-16); ctx.lineTo(this.kAimX, py+16); ctx.stroke();
      ctx.setLineDash([]);
      ctx.beginPath(); ctx.arc(this.kAimX, py, 9, 0, TAU); ctx.stroke();
      if(Math.abs(this.kCurve) > 0.1){
        ctx.fillStyle = '#38e1ff'; ctx.font='700 13px '+FONT; ctx.textAlign='center';
        ctx.fillText(this.kCurve<0?'↰ 弧線':'弧線 ↱', this.kAimX, py-24);
      }
      /* v5 新增：鍵盤瞄準也補上即時力道條，跟拖曳模式回饋一致 */
      ctx.fillStyle = 'rgba(0,0,0,.45)';
      ctx.fillRect(GAME_W/2-90, GAME_H-46, 180, 14);
      ctx.fillStyle = this.kPower > 0.75 ? '#ff6cc7' : '#38e1ff';
      ctx.fillRect(GAME_W/2-88, GAME_H-44, 176*this.kPower, 10);
      ctx.fillStyle = 'rgba(255,255,255,.7)'; ctx.font='700 11px '+FONT; ctx.textAlign='center';
      ctx.fillText('↑↓ 力道', GAME_W/2, GAME_H-52);
    }
    /* 球員與球（含軌跡）——結算階段梅西也會露出開心／錯愕表情 */
    let messiExpr = 'normal';
    if(this.phase === 'result') messiExpr = this.result.includes('進球') ? 'happy' : 'shock';
    if(this.phase === 'aim' || this.phase === 'kick' || this.phase === 'result'){
      drawMessi(BALL_START.x-14, BALL_START.y, 1.1, this.phase==='result' ? 1 : this.kickPhase, messiExpr);
    }
    if(this.phase === 'aim' || this.phase === 'kick'){
      drawBall(BALL_START.x, BALL_START.y-4, 1, this.ball.spin);
    } else {
      /* v6：球軌跡改加法光暈疊印（烘焙 glow sprite，微 bloom 感） */
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for(const tr of this.trail){
        ctx.globalAlpha = clamp(tr.t/0.3,0,1)*0.75;
        ctx.drawImage(glowBallTrail, tr.x-13, tr.y-13);
      }
      ctx.restore();
      ctx.globalAlpha = 1;
      /* 地面影子 */
      ctx.fillStyle = 'rgba(0,0,0,.25)';
      ctx.beginPath(); ctx.ellipse(this.ball.x, this.ball.y, 8, 3, 0, 0, TAU); ctx.fill();
      const scale = lerp(1, 0.55, clamp(this.flightT/this.flightDur,0,1));
      drawBall(this.ball.x, this.ball.y - this.ball.z, scale, this.ball.spin);
    }
    drawParts();
    ctx.restore();
    drawFloats();
    /* HUD */
    ctx.textAlign='left';
    ctx.font='900 20px '+FONT;
    ctx.lineWidth=4; ctx.strokeStyle='rgba(0,0,0,.5)';
    const hud = '進球 '+this.goals+' / '+this.maxAttempts + (this.perfects>0 ? '　完美×'+this.perfects : '');
    ctx.strokeText(hud, 16, 32);
    ctx.fillStyle='#eafff5'; ctx.fillText(hud, 16, 32);
    ctx.textAlign='right'; ctx.font='900 18px '+FONT;
    ctx.strokeText((this.legend?'傳奇模式　':'')+'第 '+this.round+' 球', GAME_W-72, 32);
    ctx.fillStyle= this.legend ? '#ffcf5c' : '#eafff5';
    ctx.fillText((this.legend?'傳奇模式　':'')+'第 '+this.round+' 球', GAME_W-72, 32);
    if(this.phase === 'aim' && !input.dragging){
      ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,.85)'; ctx.font='700 16px '+FONT;
      ctx.fillText('拖曳瞄準・放開射門　／　←→↑↓瞄準・Z/X弧線・空白鍵射門', GAME_W/2, GAME_H-20);
    }
    if(this.phase === 'result'){
      const isGoal = this.result.includes('進球');
      ctx.fillStyle = this.result.includes('完美') ? 'rgba(255,207,92,.18)' : (isGoal ? 'rgba(56,225,255,.15)' : 'rgba(0,0,0,.4)');
      ctx.fillRect(0,0,GAME_W,GAME_H);
      ctx.textAlign='center';
      const pop = easeOutBack(clamp(this.phaseT*2.5,0,1));
      ctx.save();
      ctx.translate(GAME_W/2, 200); ctx.scale(pop,pop);
      ctx.font='900 44px '+FONT;
      ctx.lineWidth=8; ctx.strokeStyle='rgba(0,0,0,.55)';
      ctx.strokeText(this.result, 0, 0);
      ctx.fillStyle = this.resultColor;
      ctx.fillText(this.result, 0, 0);
      ctx.restore();
      if(this.phaseT > 1.0){
        ctx.fillStyle='#eafff5'; ctx.font='700 19px '+FONT;
        ctx.globalAlpha = 0.6+0.4*Math.sin(worldT*4);
        ctx.fillText('點一下畫面 / 按空白鍵 繼續', GAME_W/2, 250);
        ctx.globalAlpha = 1;
      }
    }
  }
};
/* 結算畫面點擊「繼續」：aim 前的空點擊也當繼續（result 階段） */
canvas.addEventListener('mousedown', e => {
  if(state === playState && playState.phase === 'result' && playState.phaseT > 1.0){
    input.released = true;
  }
});
canvas.addEventListener('touchstart', e => {
  if(state === playState && playState.phase === 'result' && playState.phaseT > 1.0){
    input.released = true;
  }
}, {passive:false});

function endMatch(){
  const p = playState;
  const cleared = p.goals >= 4;
  if(cleared && !legendUnlocked && !p.legend){
    legendUnlocked = true;
    LS.set('messipro_legend','1');
    endState.justUnlocked = true;
  } else endState.justUnlocked = false;
  if(p.legend){ if(p.goals > bestLegend){ bestLegend = p.goals; LS.set('messipro_best_legend', String(bestLegend)); } }
  else { if(p.goals > best){ best = p.goals; LS.set('messipro_best', String(best)); } }
  setState(endState);
}

const endState = {
  name:'end', t:0, justUnlocked:false,
  enter(){
    this.t = 0;
    hintEl.classList.remove('show');
    sfx.end();
    const p = playState;
    const bts = [
      { x:GAME_W/2-250, y:400, w:230, h:60, label:'再玩一次', gold:true, fs:22, cb:()=> startMatch(p.legend) },
      { x:GAME_W/2+20, y:400, w:230, h:60, label: p.legend ? '一般模式' : '傳奇模式', fs:22,
        disabled: !p.legend && !legendUnlocked,
        sub: (!p.legend && !legendUnlocked) ? '單場進 4 球解鎖' : '',
        cb:()=> startMatch(!p.legend) }
    ];
    this._btn = bts;
    for(let i=0;i<4;i++) burst(rnd(200,760), rnd(100,260), ['#38e1ff','#ffcf5c','#ff6cc7','#9a6bff'][i], 14, 260);
  },
  buttons(){ return this.t > 0.5 ? this._btn : []; },
  update(dt){
    this.t += dt; worldT += dt;
    updateParts(dt); updateFloats(dt);
    shake *= Math.pow(0.001, dt);
    if(this.t > 0.5 && input.confirm){ input.confirm = false; startMatch(playState.legend); }
  },
  draw(){
    playState.draw();
    ctx.fillStyle = 'rgba(0,0,0,.62)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.textAlign='center';
    const p = playState;
    const pop = easeOutBack(clamp(this.t*2.2,0,1));
    ctx.save();
    ctx.translate(GAME_W/2, 150); ctx.scale(pop,pop);
    ctx.font='900 46px '+FONT;
    ctx.lineWidth=9; ctx.strokeStyle='#0a2e12';
    const title = p.goals >= 7 ? '世界球王！' : p.goals >= 4 ? '比賽勝利！' : '好球連連！';
    ctx.strokeText(title, 0, 0);
    ctx.fillStyle='#eafff5'; ctx.fillText(title, 0, 0);
    ctx.restore();
    ctx.font='900 30px '+FONT; ctx.fillStyle='#38e1ff';
    ctx.fillText('進球 '+p.goals+' / '+p.maxAttempts+'　完美進球 ×'+p.perfects, GAME_W/2, 224);
    ctx.font='700 20px '+FONT; ctx.fillStyle='#ffcf5c';
    ctx.fillText((p.legend?'傳奇模式':'一般模式')+'　最佳紀錄 '+(p.legend?bestLegend:best)+' 球', GAME_W/2, 264);
    if(p.bestStreak >= 2){
      ctx.font='700 18px '+FONT; ctx.fillStyle='#38e1ff';
      ctx.fillText('本場最高連續進球 '+p.bestStreak+' 球', GAME_W/2, 292);
    }
    if(this.justUnlocked){
      ctx.font='900 24px '+FONT;
      ctx.fillStyle = Math.sin(this.t*5)>0 ? '#ffcf5c' : '#ff7e3d';
      ctx.fillText('恭喜解鎖：傳奇模式！跳躍人牆等你挑戰！', GAME_W/2, 316);
    } else {
      ctx.font='700 18px '+FONT; ctx.fillStyle='#eafff5cc';
      ctx.fillText(p.goals >= 4 ? '你已經是任意球大師了！' : '瞄準門將撲不到的角落，進 4 球就能解鎖傳奇模式！', GAME_W/2, 316);
    }
    for(const b of this.buttons()) drawButton(b, false);
    if(this.t > 0.5){
      ctx.font='700 14px '+FONT; ctx.fillStyle='#ffffff99';
      ctx.fillText('空白鍵＝再玩一次', GAME_W/2, 492);
    }
  }
};

/* ===== 主迴圈 ===== */
const STEP = 1/60;
let last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while(acc >= STEP){
    state.update(STEP);
    updateAtmo(STEP);
    acc -= STEP;
  }
  state.draw();
  /* v6：螢幕後製——暗角 vignette＋進球瞬間短促白閃 */
  ctx.drawImage(vignetteC, 0, 0, GAME_W, GAME_H);
  if(screenFlashT > 0){
    ctx.globalAlpha = clamp(screenFlashT/0.16, 0, 1)*0.4;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    ctx.globalAlpha = 1;
  }
}
setState(titleState);
requestAnimationFrame(frame);

/* ===== 測試掛鉤 ===== */
window.__test = {
  get state(){ return state.name; },
  get phase(){ return playState.phase; },
  get goals(){ return playState.goals; },
  get attempts(){ return playState.attempts; },
  get round(){ return playState.round; },
  get legend(){ return playState.legend; },
  get legendUnlocked(){ return legendUnlocked; },
  get kickPhase(){ return playState.kickPhase; },
  get streak(){ return playState.streak; },
  get bestStreak(){ return playState.bestStreak; },
  get keeperX(){ return playState.keepers.map(k=>k.x); },
  get ball(){ return playState.ball ? { x:playState.ball.x, y:playState.ball.y } : { x:0, y:0 }; },
  get targetX(){ return playState.target ? playState.target.x : 0; },
  get targetY(){ return playState.target ? playState.target.y : 0; },
  get buttons(){ return activeButtons().map(b=>({label:b.label, x:b.x+b.w/2, y:b.y+b.h/2, w:b.w, h:b.h, disabled:!!b.disabled})); },
  startMatch(legend){ startMatch(!!legend); },
  shootAt(x, power, curve){ if(state===playState && playState.phase==='aim') playState.shoot(x, power, curve||0); },
  setGoals(n){ playState.goals = n; },
  setAttempts(n){ playState.attempts = n; },
  clearKeepers(){ for(const k of playState.keepers){ k.x = -999; k.targetX = -999; } },
  clearLions(){ for(const l of playState.lions){ l.x = -999; l.speed = 0; } },
  tick(s){ const n = Math.round((s||1)*60); for(let i=0;i<n;i++) state.update(STEP); }
};
</script>

<script>/* AI-CAMP-STATS-BEACON */
(function(){
  try{ if(window.top!==window.self) return; }catch(e){ return; } /* 在作品館內由作品館計數與投票 */
  var NS="ai-future-camp", K="t-e84b88ae";
  var ABS="//abacus.jasoncameron.dev/"; /* 直連備援 */
  var REL="/abacus/"; /* 同源代理（Vercel 轉發）：學校閘道擋外部網域時仍然通 */
  function ping(n){
    try{
      fetch(REL+"hit/"+NS+"/"+n).then(function(r){
        if(!r||!r.ok){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); }
      }).catch(function(){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); });
    }catch(e){}
  }
  function read(n,cb){
    function via(base,next){ try{ fetch(base+"get/"+NS+"/"+n).then(function(r){ if(r.status===404&&base===ABS) return {value:0}; if(!r.ok) throw 0; return r.json(); }).then(function(j){ cb(j.value||j.count||0); }).catch(next); }catch(e){ next(); } }
    via(REL, function(){ via(ABS, function(){ cb(null); }); });
  }
  ping(K+"-v");
  var done=false;
  function once(){ if(done)return; done=true; ping(K+"-p"); ping("site-total-plays");
    window.removeEventListener("pointerdown",once); window.removeEventListener("keydown",once); }
  window.addEventListener("pointerdown",once,{once:false}); window.addEventListener("keydown",once,{once:false});
  /* 投票鈕：非常好玩/好玩——與作品館同一計數器，任何網頁打開都同步 */
  function initVotes(){
    if(!document.body) return;
    var wrap=document.createElement("div");
    wrap.style.cssText="position:fixed;right:10px;bottom:10px;z-index:99999;display:flex;gap:6px;font-family:sans-serif;opacity:.92";
    var LS="voted-"+K;
    var defs=[["-love","\u2764\uFE0F","\u975e\u5e38\u597d\u73a9","#ff6cc7"],["-like","\ud83d\udc4d","\u597d\u73a9","#38e1ff"]];
    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;
          b.querySelector("i").textContent=Math.max(0,(n||0)-(c||0));
        }); });
      });
    }
    defs.forEach(function(d){
      var b=document.createElement("button");
      b.type="button"; b.title=d[2];
      b.style.cssText="min-height:42px;padding:8px 14px;border:none;border-radius:999px;background:rgba(15,18,32,.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation";
      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";
      b.addEventListener("click",function(){
        var prev=null; try{ prev=localStorage.getItem(LS); }catch(e){}
        if(prev===d[0]){ ping(K+d[0]+"-c"); try{ localStorage.removeItem(LS); }catch(e){} }
        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);
      });
      btns[d[0]]=b; wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    refresh();
    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* 每10秒同步別人投的票 */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
</script>
