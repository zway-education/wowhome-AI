<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="author" content="AI未來創作營隊">
<title>梅西世紀任意球</title>
<style>
  html,body{margin:0;height:100%;background:#0d2b12;overflow:hidden;touch-action:none;
    -webkit-user-select:none;user-select:none;font-family:"PingFang TC","Microsoft JhengHei",sans-serif}
  canvas{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);cursor:crosshair}
  #mute{position:fixed;right:12px;top:12px;width:44px;height:44px;border-radius:50%;
    background:rgba(10,20,10,.55);border:2px solid #38e1ff;color:#eafff5;font-size:20px;
    z-index:10;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<canvas id="game"></canvas>
<button id="mute" aria-label="靜音切換">🔊</button>
<script>
'use strict';
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize(){
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width  = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale;
}
addEventListener('resize', resize); resize();

// ===== 音效（Web Audio 合成，零音檔）=====
let AC = null, muted = false;
function audio(){ if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); return AC; }
addEventListener('pointerdown', audio, { once:true });
addEventListener('keydown', audio, { once:true });
function beep(freq=440, dur=0.1, type='square', vol=0.15, slide=0, delay=0){
  if(muted) return;
  const ac = audio(); if(!ac) return;
  const t0 = ac.currentTime + delay;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq+slide), t0+dur);
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  o.connect(g).connect(ac.destination);
  o.start(t0); o.stop(t0+dur+0.02);
}
function noiseBurst(dur=0.4, vol=0.2, delay=0){
  if(muted) return;
  const ac = audio(); if(!ac) return;
  const t0 = ac.currentTime + delay;
  const n = Math.floor(ac.sampleRate*dur);
  const buf = ac.createBuffer(1, n, ac.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i] = (Math.random()*2-1) * (1 - i/n);
  const src = ac.createBufferSource(); src.buffer = buf;
  const g = ac.createGain(); g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  src.connect(g).connect(ac.destination);
  src.start(t0);
}
function sfxKick(){ beep(140,0.09,'square',0.18,120); noiseBurst(0.08,0.12); }
function sfxGoal(){
  [523,659,784,1046].forEach((f,i)=> beep(f,0.16,'square',0.16,0, i*0.09));
  noiseBurst(0.6,0.15,0.05);
}
function sfxSave(){ beep(180,0.2,'sawtooth',0.18,-100); noiseBurst(0.15,0.12,0.02); }
function sfxCrossbar(){ beep(900,0.18,'triangle',0.15); beep(1200,0.12,'triangle',0.1,0,0.05); }
function sfxWhistle(){ beep(1700,0.35,'sine',0.12,-40); }
function sfxRoar(){ beep(90,0.35,'sawtooth',0.2,60); noiseBurst(0.3,0.16,0.03); }
document.getElementById('mute').addEventListener('click', () => {
  muted = !muted;
  document.getElementById('mute').textContent = muted ? '🔇' : '🔊';
});

// ===== 輸入：拖曳瞄準 + 觸控/滑鼠共用 =====
const input = { dragging:false, sx:0, sy:0, cx:0, cy:0, path:[], released:false };
function toLogical(clientX, clientY){
  const r = canvas.getBoundingClientRect();
  return { x:(clientX-r.left)/canvas._scale, y:(clientY-r.top)/canvas._scale };
}
function dragStart(x,y){
  if(state === playState && playState.phase === 'aim'){
    input.dragging = true; input.sx = x; input.sy = y; input.cx = x; input.cy = y; input.path = [{x,y}];
  }
  input.tapStart = { x, y };
}
function dragMove(x,y){
  if(!input.dragging) return;
  input.cx = x; input.cy = y; input.path.push({x,y});
  if(input.path.length > 40) input.path.shift();
}
function dragEnd(){
  if(input.dragging){
    input.dragging = false;
    input.released = true;
  } else if(input.tapStart){
    // 選單/結算畫面：任意點擊視為「繼續」
    input.released = true;
  }
  input.tapStart = null;
}
canvas.addEventListener('mousedown', e => { const p=toLogical(e.clientX,e.clientY); dragStart(p.x,p.y); });
addEventListener('mousemove', e => { const p=toLogical(e.clientX,e.clientY); dragMove(p.x,p.y); });
addEventListener('mouseup', dragEnd);
canvas.addEventListener('touchstart', e => { e.preventDefault(); const t=e.touches[0]; const p=toLogical(t.clientX,t.clientY); dragStart(p.x,p.y); }, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); const t=e.touches[0]; const p=toLogical(t.clientX,t.clientY); dragMove(p.x,p.y); }, {passive:false});
canvas.addEventListener('touchend', e => { e.preventDefault(); dragEnd(); }, {passive:false});
canvas.addEventListener('touchcancel', e => { e.preventDefault(); dragEnd(); }, {passive:false});

// ===== 視覺輔助 =====
function lerp(a,b,t){ return a+(b-a)*t; }
function easeOutCubic(t){ return 1-Math.pow(1-t,3); }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

let shake = 0;
function applyShake(){
  return { x:(Math.random()*2-1)*shake, y:(Math.random()*2-1)*shake };
}

const parts = [];
function burst(x,y,color,n=14,speed=220,spreadY=1){
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2, s = speed*(0.3+Math.random()*0.7);
    parts.push({ x,y, vx:Math.cos(a)*s, vy:Math.sin(a)*s*spreadY, life:0.5+Math.random()*0.3, color, g:400 });
  }
  if(parts.length > 260) parts.splice(0, parts.length-260);
}
function updateParts(dt){
  for(const p of parts){ p.x += p.vx*dt; p.y += p.vy*dt; p.vy += p.g*dt; p.life -= dt; }
  for(let i=parts.length-1;i>=0;i--) if(parts[i].life<=0) parts.splice(i,1);
}
function drawParts(){
  for(const p of parts){
    ctx.globalAlpha = Math.max(0, p.life*1.6);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-3,p.y-3,6,6);
  }
  ctx.globalAlpha = 1;
}

const floaters = [];
function floatText(x,y,text,color){ floaters.push({x,y,text,color,life:0.9}); }
function updateFloaters(dt){
  for(const f of floaters){ f.y -= 40*dt; f.life -= dt; }
  for(let i=floaters.length-1;i>=0;i--) if(floaters[i].life<=0) floaters.splice(i,1);
}
function drawFloaters(){
  ctx.textAlign='center'; ctx.font='bold 22px sans-serif';
  for(const f of floaters){
    ctx.globalAlpha = clamp(f.life/0.9,0,1);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

// ===== 場景常數（透視球場，球門在上方）=====
const GOAL = { x1:330, x2:630, y:118, h:78 };     // 球門內側範圍
const BALL_START = { x:480, y:462 };
const LION_Y = 300;
const LION_MIN = 290, LION_MAX = 670;

// ===== 記錄最佳分數 =====
const BEST_KEY = 'messi_freekick_best';
function getBest(){ return Number(localStorage.getItem(BEST_KEY) || 0); }
function setBest(v){ if(v > getBest()) localStorage.setItem(BEST_KEY, String(v)); }

// ===== 球員繪製（阿根廷配色，多部件） =====
function drawPlayerAt(x,y,scale,facing,kickPhase,skinColor){
  // facing: 1 面向上(球門), -1 面向下(玩家視角)
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(scale, scale);
  const legSwing = Math.sin(kickPhase*Math.PI) * 22;
  // 陰影
  ctx.fillStyle = 'rgba(0,0,0,.28)';
  ctx.beginPath(); ctx.ellipse(0, 4, 16, 5, 0, 0, Math.PI*2); ctx.fill();
  // 後腳
  ctx.strokeStyle = skinColor; ctx.lineWidth = 6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-5,-18); ctx.lineTo(-5+legSwing*0.2, 2); ctx.stroke();
  // 踢球腳（前腳，隨 kickPhase 擺動）
  ctx.beginPath(); ctx.moveTo(5,-18); ctx.lineTo(5+legSwing, 2 - Math.max(0,legSwing)*0.3); ctx.stroke();
  // 身體：阿根廷條紋
  ctx.fillStyle = '#eef4ff';
  ctx.fillRect(-11,-42,22,26);
  ctx.fillStyle = '#4aa8e0';
  for(let s=-11; s<11; s+=7) ctx.fillRect(s,-42,3.2,26);
  // 手臂
  ctx.strokeStyle = '#eef4ff'; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(-11,-38); ctx.lineTo(-20,-24-Math.max(0,legSwing)*0.15); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(11,-38); ctx.lineTo(20,-24+Math.max(0,legSwing)*0.15); ctx.stroke();
  // 頭
  ctx.fillStyle = '#e8b48c';
  ctx.beginPath(); ctx.arc(0,-50,9,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#3a2416';
  ctx.beginPath(); ctx.arc(0,-54,8,Math.PI,0); ctx.fill();
  // 背號
  ctx.fillStyle = '#4aa8e0'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
  ctx.fillText('10', 0, -28);
  ctx.restore();
}

function drawKeeper(x,y,scale,diveDir,diveT,number,name,jerseyColor){
  ctx.save();
  ctx.translate(x,y);
  const tilt = diveDir * easeOutCubic(diveT) * 60;
  ctx.rotate(tilt * Math.PI/180 * (diveDir!==0?1:0));
  ctx.scale(scale, scale);
  ctx.fillStyle = 'rgba(0,0,0,.25)';
  ctx.beginPath(); ctx.ellipse(0,6,18,5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.fillRect(-6,-16,5,20); ctx.fillRect(1,-16,5,20);
  ctx.fillStyle = jerseyColor;
  ctx.fillRect(-13,-40,26,26);
  const armY = diveDir!==0 ? -40 - easeOutCubic(diveT)*18 : -34;
  ctx.strokeStyle = jerseyColor; ctx.lineWidth = 6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-13,-34); ctx.lineTo(-13 + diveDir*-22*easeOutCubic(diveT), armY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(13,-34); ctx.lineTo(13 + diveDir*-22*easeOutCubic(diveT), armY); ctx.stroke();
  ctx.fillStyle = '#e8b48c';
  ctx.beginPath(); ctx.arc(0,-48,8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(0,-51,7.5,Math.PI,0); ctx.fill();
  // 背號與名字
  ctx.fillStyle = '#fff'; ctx.font='bold 10px sans-serif'; ctx.textAlign='center';
  ctx.fillText(String(number), 0, -22);
  ctx.restore();
  ctx.save();
  ctx.textAlign='center'; ctx.fillStyle='#eafff5'; ctx.font='bold 13px sans-serif';
  ctx.fillText(name, x, y+30);
  ctx.restore();
}

function drawLion(x,y,scale,facing){
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(scale*facing, scale);
  ctx.fillStyle = 'rgba(0,0,0,.25)';
  ctx.beginPath(); ctx.ellipse(0, 20, 22, 6, 0, 0, Math.PI*2); ctx.fill();
  // 身體
  ctx.fillStyle = '#d99a3f';
  ctx.beginPath(); ctx.ellipse(-4, 4, 20, 12, 0, 0, Math.PI*2); ctx.fill();
  // 腿
  ctx.strokeStyle = '#c8862c'; ctx.lineWidth = 6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-14,12); ctx.lineTo(-14,20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(6,12); ctx.lineTo(6,20); ctx.stroke();
  // 尾巴
  ctx.strokeStyle = '#c8862c'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(-22,2); ctx.quadraticCurveTo(-34,-4,-30,-14); ctx.stroke();
  ctx.fillStyle = '#8a5a22';
  ctx.beginPath(); ctx.arc(-30,-15,3.5,0,Math.PI*2); ctx.fill();
  // 鬃毛
  ctx.fillStyle = '#a5591e';
  for(let i=0;i<10;i++){
    const a = i/10*Math.PI*2;
    ctx.beginPath(); ctx.arc(16+Math.cos(a)*11, -10+Math.sin(a)*11, 6, 0, Math.PI*2); ctx.fill();
  }
  // 頭
  ctx.fillStyle = '#e8b45c';
  ctx.beginPath(); ctx.arc(16,-10,11,0,Math.PI*2); ctx.fill();
  // 臉部
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(19,-6,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(21,-6,1.6,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(20,-13,1.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(11,-13,1.4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5c2f0e';
  ctx.beginPath(); ctx.moveTo(24,-3); ctx.lineTo(28,-1); ctx.lineTo(24,1); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawTarget(x,y,r,t){
  ctx.save();
  ctx.translate(x,y);
  const pulse = 1 + Math.sin(t*4)*0.06;
  ctx.scale(pulse, pulse*0.55); // 貼在球門平面上，壓扁成橢圓透視
  ctx.strokeStyle = '#ffcf5c'; ctx.lineWidth = 4; ctx.setLineDash([9,7]);
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeStyle = 'rgba(255,207,92,.5)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0,0,r*0.55,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle = 'rgba(255,207,92,.18)';
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawBall(x,y,scale,spin){
  ctx.save();
  ctx.translate(x,y); ctx.rotate(spin); ctx.scale(scale,scale);
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(0,0,9,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#222';
  for(let i=0;i<5;i++){
    const a = i/5*Math.PI*2;
    ctx.beginPath(); ctx.arc(Math.cos(a)*4.2, Math.sin(a)*4.2, 2.2, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawPitch(t){
  const grd = ctx.createLinearGradient(0,0,0,GAME_H);
  grd.addColorStop(0,'#0a2e12'); grd.addColorStop(1,'#1e5c28');
  ctx.fillStyle = grd; ctx.fillRect(0,0,GAME_W,GAME_H);
  // 觀眾席
  ctx.fillStyle = '#0a1420'; ctx.fillRect(0,0,GAME_W,70);
  for(let i=0;i<40;i++){
    ctx.fillStyle = i%3===0 ? '#38e1ff' : (i%3===1 ? '#ff6cc7' : '#4f7cff');
    ctx.globalAlpha = 0.5;
    ctx.fillRect(i*24 + (t*10)%24, 12 + Math.sin(i+t)*4, 14, 14);
  }
  ctx.globalAlpha = 1;
  // 草地條紋（透視梯形）
  ctx.save();
  ctx.beginPath(); ctx.moveTo(180,540); ctx.lineTo(780,540); ctx.lineTo(620,90); ctx.lineTo(340,90); ctx.closePath(); ctx.clip();
  for(let i=0;i<14;i++){
    ctx.fillStyle = i%2===0 ? 'rgba(255,255,255,.05)' : 'rgba(0,0,0,.05)';
    const y0 = 90 + i*(450/14), y1 = 90 + (i+1)*(450/14);
    ctx.beginPath(); ctx.moveTo(-200,y0); ctx.lineTo(1200,y0); ctx.lineTo(1200,y1); ctx.lineTo(-200,y1); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
  // 球門框
  ctx.strokeStyle = '#f4f4f4'; ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(GOAL.x1, GOAL.y+GOAL.h); ctx.lineTo(GOAL.x1, GOAL.y); ctx.lineTo(GOAL.x2, GOAL.y); ctx.lineTo(GOAL.x2, GOAL.y+GOAL.h);
  ctx.stroke();
  // 球網
  ctx.strokeStyle = 'rgba(255,255,255,.35)'; ctx.lineWidth = 1;
  for(let x=GOAL.x1; x<=GOAL.x2; x+=15){
    ctx.beginPath(); ctx.moveTo(x, GOAL.y); ctx.lineTo(x, GOAL.y+GOAL.h); ctx.stroke();
  }
  for(let y=GOAL.y; y<=GOAL.y+GOAL.h; y+=12){
    ctx.beginPath(); ctx.moveTo(GOAL.x1,y); ctx.lineTo(GOAL.x2,y); ctx.stroke();
  }
  // 禁區弧線
  ctx.strokeStyle = 'rgba(255,255,255,.5)'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.ellipse(480,462,90,26,0,Math.PI,Math.PI*2); ctx.stroke();
}

// ===== 狀態機 =====
let state;
function setState(s){ state = s; if(s.enter) s.enter(); }

const menuState = {
  t:0,
  update(dt){ this.t += dt; if(input.released){ input.released=false; setState(playState); } },
  draw(){
    drawPitch(this.t);
    ctx.fillStyle = 'rgba(5,15,8,.45)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.textAlign='center';
    ctx.fillStyle = '#38e1ff';
    ctx.font = 'bold 46px sans-serif';
    ctx.fillText('梅西世紀任意球', GAME_W/2, 190);
    ctx.fillStyle = '#eafff5';
    ctx.font = '20px sans-serif';
    ctx.fillText('電腦：拖曳滑鼠瞄準射門　　平板：手指拖曳瞄準射門', GAME_W/2, 240);
    ctx.font='16px sans-serif'; ctx.fillStyle='#ffcf5c';
    ctx.fillText('雙門將「西羅」與「卡卡」聯防，草皮上還有獅子巡邏！', GAME_W/2, 270);
    ctx.fillText('射進金色目標區＝完美進球　　拖曳左右彎曲、距離控制高度', GAME_W/2, 296);
    ctx.fillStyle = '#ff6cc7';
    ctx.font = 'bold 22px sans-serif';
    const bounce = 1 + Math.sin(this.t*3)*0.06;
    ctx.save(); ctx.translate(GAME_W/2, 350); ctx.scale(bounce,bounce);
    ctx.fillText('點一下畫面開始比賽！', 0, 0);
    ctx.restore();
    ctx.fillStyle='#9a6bff'; ctx.font='16px sans-serif';
    ctx.fillText('最佳進球數：' + getBest(), GAME_W/2, 400);
    drawPlayerAt(BALL_START.x, BALL_START.y, 1.1, -1, 0, '#3a2416');
    drawBall(BALL_START.x, BALL_START.y-4, 1, this.t*2);
  }
};

const playState = {
  enter(){
    this.round = 1;
    this.score = 0;
    this.attempts = 0;
    this.maxAttempts = 8;
    this.phase = 'aim';       // aim -> flight -> result
    this.phaseT = 0;
    this.ball = { x:BALL_START.x, y:BALL_START.y, z:0, vx:0, vy:0, vz:0, spin:0 };
    this.flightT = 0; this.flightDur = 1;
    this.aimTx = 480; this.aimTy = GOAL.y+GOAL.h/2; this.curve = 0; this.loft = 0;
    this.target = this.makeTarget();
    this.keepers = [
      { name:'西羅', number:1, jersey:'#ff7e3d', x:420, dive:0, diveT:0, targetX:420, reacted:false },
      { name:'卡卡', number:12, jersey:'#9a6bff', x:540, dive:0, diveT:0, targetX:540, reacted:false }
    ];
    this.lions = [
      { x:390, dir:1, speed:44 },
      { x:590, dir:-1, speed:58 }
    ];
    this.msg = ''; this.msgT = 0;
    this.kickPhase = 0;
    this.result = '';
    this.blockedByLion = false; this.lionChecked = false;
    sfxWhistle();
  },
  makeTarget(){
    const r = clamp(46 - this.round*2.2, 20, 46);
    const x = clamp(GOAL.x1 + 30 + Math.random()*(GOAL.x2-GOAL.x1-60), GOAL.x1+r, GOAL.x2-r);
    const y = GOAL.y + 16 + Math.random()*(GOAL.h-32);
    return { x, y, r };
  },
  startAimIfReleased(){
    if(!input.released) return;
    input.released = false;
    const dx = input.cx - input.sx, dy = input.sy - input.cy; // dy positive = drag up = power
    const dragLen = Math.hypot(dx,dy);
    if(dragLen < 18){ return; } // 太短忽略，避免誤觸
    // 路徑彎曲量（取路徑相對起訖直線的最大側偏）
    let curveRaw = 0;
    if(input.path.length > 2){
      const {x:ax,y:ay} = input.path[0], {x:bx,y:by} = input.path[input.path.length-1];
      const len = Math.hypot(bx-ax, by-ay) || 1;
      for(const p of input.path){
        const cross = ((bx-ax)*(p.y-ay) - (by-ay)*(p.x-ax)) / len;
        if(Math.abs(cross) > Math.abs(curveRaw)) curveRaw = cross;
      }
    }
    const power = clamp(dragLen / 230, 0.25, 1);
    const aimX = clamp(480 + dx*1.6, GOAL.x1+18, GOAL.x2-18);
    this.aimTx = aimX;
    this.aimTy = lerp(GOAL.y+GOAL.h-14, GOAL.y+16, power);
    this.loft = power;
    this.curve = clamp(curveRaw/40, -2.4, 2.4);
    this.launch(power);
  },
  launch(power){
    this.phase = 'kick'; this.phaseT = 0; this.kickPhase = 0;
  },
  update(dt){
    updateParts(dt); updateFloaters(dt);
    shake *= Math.pow(0.001, dt);
    this.updateLions(dt);
    if(this.phase === 'aim'){
      this.startAimIfReleased();
    } else if(this.phase === 'kick'){
      this.phaseT += dt;
      this.kickPhase = clamp(this.phaseT/0.22, 0, 1);
      if(this.phaseT >= 0.22){
        sfxKick();
        burst(BALL_START.x, BALL_START.y, '#dcdcdc', 6, 90, 0.4);
        this.phase = 'flight'; this.flightT = 0;
        this.flightDur = lerp(0.75, 1.15, this.loft);
        for(const k of this.keepers){ k.reacted = false; k.diveT = 0; }
        this.blockedByLion = false; this.lionChecked = false;
      }
    } else if(this.phase === 'flight'){
      this.flightT += dt;
      const t = clamp(this.flightT/this.flightDur, 0, 1);
      const et = t;
      const bx0 = BALL_START.x, by0 = BALL_START.y;
      const straightX = lerp(bx0, this.aimTx, et);
      const bend = this.curve * Math.sin(et*Math.PI) * 40;
      this.ball.x = straightX + bend;
      this.ball.y = lerp(by0, this.aimTy, easeOutCubic(et));
      this.ball.z = Math.sin(et*Math.PI) * lerp(10, 70, this.loft);
      this.ball.spin += dt*18;

      // 兩位門將的撲救反應：稍有延遲後各自判斷方向撲出，關卡越高反應越快
      for(const k of this.keepers){
        if(!k.reacted && t > 0.18){
          k.reacted = true;
          const reactionNoise = clamp(0.9 - this.round*0.05, 0.3, 0.9);
          k.targetX = clamp(this.aimTx + (Math.random()*2-1)*80*reactionNoise, GOAL.x1+20, GOAL.x2-20);
          k.dive = k.targetX > k.x ? 1 : -1;
        }
        if(k.reacted){
          k.diveT = clamp(k.diveT + dt*2.2, 0, 1);
          k.x = lerp(k.x, k.targetX, dt*4);
        }
      }

      // 獅子巡邏：球低平飛過草皮時若撞上獅子會被擋下
      if(!this.lionChecked && t > 0.3 && t < 0.55){
        this.lionChecked = true;
        const nearLion = this.lions.some(l => Math.abs(l.x - this.ball.x) < 26 && this.ball.z < 40);
        if(nearLion) this.blockedByLion = true;
      }

      if(t >= 1){
        this.resolveShot();
      }
    } else if(this.phase === 'result'){
      this.phaseT += dt;
      if(this.phaseT > 1.1 && input.released){
        input.released = false;
        this.nextRound();
      }
    }
  },
  resolveShot(){
    this.attempts++;
    const crossbarHit = this.aimTy < GOAL.y + 10 && Math.random() < 0.12;
    const hitTarget = Math.hypot(this.aimTx-this.target.x, this.aimTy-this.target.y) < this.target.r;
    const keeperReach = lerp(46, 26, this.loft); // 球踢得越高越遠，門將越難撲到
    const savingKeeper = !hitTarget ? this.keepers.find(k => Math.abs(k.x - this.aimTx) < keeperReach) : null;
    const lionBlocked = !hitTarget && this.blockedByLion;
    if(crossbarHit){
      this.result = '打到門框！';
      sfxCrossbar();
      burst(this.aimTx, GOAL.y, '#f4f4f4', 14, 180);
    } else if(lionBlocked){
      this.result = '被獅子擋下！';
      sfxRoar();
      burst(this.ball.x, this.ball.y - this.ball.z, '#d99a3f', 18, 200);
    } else if(savingKeeper){
      this.result = '被' + savingKeeper.name + '撲出！';
      sfxSave();
      burst(savingKeeper.x, GOAL.y+40, savingKeeper.jersey, 18, 200);
    } else if(hitTarget){
      this.result = '完美進球！！';
      this.score++;
      shake = 12;
      sfxGoal();
      burst(this.aimTx, this.aimTy, '#ffcf5c', 32, 280);
      burst(this.aimTx, this.aimTy, '#38e1ff', 16, 200);
      floatText(GAME_W/2, 300, '+1 神仙球', '#ffcf5c');
    } else {
      this.result = '進球！';
      this.score++;
      shake = 8;
      sfxGoal();
      burst(this.aimTx, this.aimTy, '#38e1ff', 22, 240);
      floatText(GAME_W/2, 300, '+1 進球', '#38e1ff');
    }
    this.phase = 'result'; this.phaseT = 0;
  },
  nextRound(){
    if(this.attempts >= this.maxAttempts){ setBest(this.score); setState(gameOverState); return; }
    this.round++;
    this.ball = { x:BALL_START.x, y:BALL_START.y, z:0, vx:0,vy:0,vz:0, spin:0 };
    this.target = this.makeTarget();
    for(const k of this.keepers){ k.x += (Math.random()*40-20); k.dive=0; k.diveT=0; k.reacted=false; }
    this.phase = 'aim'; this.phaseT = 0; this.kickPhase = 0;
    sfxWhistle();
  },
  updateLions(dt){
    for(const l of this.lions){
      l.x += l.dir * l.speed * dt;
      if(l.x < LION_MIN){ l.x = LION_MIN; l.dir = 1; }
      if(l.x > LION_MAX){ l.x = LION_MAX; l.dir = -1; }
    }
  },
  draw(){
    const sh = applyShake();
    drawPitch(this.phaseT);
    ctx.save(); ctx.translate(sh.x, sh.y);

    // 金色目標區
    drawTarget(this.target.x, this.target.y, this.target.r, this.phaseT);

    // 巡邏獅子
    for(const l of this.lions) drawLion(l.x, LION_Y, 1, l.dir >= 0 ? 1 : -1);

    // 雙門將
    for(const k of this.keepers) drawKeeper(k.x, GOAL.y+42, 1.05, k.dive, k.diveT, k.number, k.name, k.jersey);

    // 瞄準預覽（僅 aim 階段、拖曳中）
    if(this.phase === 'aim' && input.dragging){
      const dx = input.cx - input.sx, dy = input.sy - input.cy;
      const dragLen = Math.hypot(dx,dy);
      const power = clamp(dragLen/230, 0, 1);
      const previewX = clamp(480 + dx*1.6, GOAL.x1+18, GOAL.x2-18);
      const previewY = lerp(GOAL.y+GOAL.h-14, GOAL.y+16, power);
      ctx.strokeStyle = 'rgba(56,225,255,.7)'; ctx.setLineDash([6,6]); ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(BALL_START.x, BALL_START.y); ctx.quadraticCurveTo((BALL_START.x+previewX)/2 + this.estCurve(dx,dy), (BALL_START.y+previewY)/2, previewX, previewY); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = dragLen<18 ? 'rgba(255,108,199,.6)' : 'rgba(56,225,255,.85)';
      ctx.beginPath(); ctx.arc(previewX, previewY, 10, 0, Math.PI*2); ctx.fill();
    }

    // 球員 + 球
    if(this.phase === 'aim' || this.phase === 'kick'){
      drawPlayerAt(BALL_START.x, BALL_START.y, 1.1, -1, this.kickPhase, '#3a2416');
      drawBall(BALL_START.x, BALL_START.y-4, 1, this.ball.spin);
    } else {
      const scale = lerp(1, 0.55, clamp(this.flightT/this.flightDur,0,1));
      drawBall(this.ball.x, this.ball.y - this.ball.z, scale, this.ball.spin);
    }

    drawParts(); drawFloaters();
    ctx.restore();

    // UI
    ctx.textAlign='left';
    ctx.fillStyle='#eafff5'; ctx.font='bold 20px sans-serif';
    ctx.fillText('進球 ' + this.score + ' / ' + this.maxAttempts, 16, 30);
    ctx.textAlign='right';
    ctx.fillStyle='#ffcf5c';
    ctx.fillText('第 ' + this.round + ' 球', GAME_W-16, 30);

    if(this.phase === 'aim' && !input.dragging){
      ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,.85)'; ctx.font='16px sans-serif';
      ctx.fillText('拖曳瞄準並放開射門', GAME_W/2, GAME_H-22);
    }

    if(this.phase === 'result'){
      const isGoal = this.result.includes('進球');
      ctx.fillStyle = this.result.includes('完美') ? 'rgba(255,207,92,.2)' : (isGoal ? 'rgba(56,225,255,.18)' : 'rgba(0,0,0,.4)');
      ctx.fillRect(0,0,GAME_W,GAME_H);
      ctx.textAlign='center';
      ctx.fillStyle = this.result.includes('完美') ? '#ffcf5c' : (isGoal ? '#38e1ff' : '#ff6cc7');
      ctx.font='bold 42px sans-serif';
      ctx.fillText(this.result, GAME_W/2, 200);
      if(this.phaseT > 1.1){
        ctx.fillStyle='#eafff5'; ctx.font='20px sans-serif';
        ctx.fillText('點一下畫面繼續', GAME_W/2, 250);
      }
    }
  },
  estCurve(dx,dy){ return 0; }
};

const gameOverState = {
  enter(){ this.t = 0; playState.finalScore = playState.score; },
  update(dt){
    this.t += dt;
    if(this.t > 0.5 && input.released){ input.released = false; setState(playState); }
  },
  draw(){
    playState.draw();
    ctx.fillStyle = 'rgba(0,0,0,.6)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.textAlign='center';
    ctx.fillStyle='#38e1ff'; ctx.font='bold 44px sans-serif';
    ctx.fillText('比賽結束！', GAME_W/2, 200);
    ctx.fillStyle='#eafff5'; ctx.font='bold 28px sans-serif';
    ctx.fillText('進球數：' + playState.finalScore + ' / ' + playState.maxAttempts, GAME_W/2, 250);
    ctx.fillStyle='#ffcf5c'; ctx.font='20px sans-serif';
    ctx.fillText('最佳紀錄：' + getBest(), GAME_W/2, 285);
    const bounce = 1+Math.sin(this.t*3)*0.05;
    ctx.save(); ctx.translate(GAME_W/2,340); ctx.scale(bounce,bounce);
    ctx.fillStyle='#ff6cc7'; ctx.font='bold 22px sans-serif';
    ctx.fillText('點一下畫面再挑戰一次！', 0, 0);
    ctx.restore();
  }
};

const STEP = 1/60;
let last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  acc += Math.min((now-last)/1000, 0.1);
  last = now;
  while(acc >= STEP){
    state.update(STEP);
    acc -= STEP;
  }
  state.draw();
}
setState(menuState);
requestAnimationFrame(frame);
</script>
