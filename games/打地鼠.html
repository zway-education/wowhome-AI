<title>打地鼠小遊戲</title>
<style>
:root{
  --bg1:#87c9ff; --bg2:#5aa9f2;
  --dirt:#8b5a2b; --dirt-dark:#6b4423;
  --grass:#6bc44a; --grass-dark:#4fa032;
  --card:#ffffff; --text:#1f2937; --accent:#ff6b35;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg1:#1e293b; --bg2:#0f172a;
    --dirt:#4a3320; --dirt-dark:#2e1f13;
    --grass:#2f6b28; --grass-dark:#1f4a1c;
    --card:#1e2530; --text:#eef2f7; --accent:#ff8a5c;
  }
}
*{box-sizing:border-box;}
body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(to bottom,var(--bg1),var(--bg2));
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  color:var(--text);
  padding:16px;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.wrap{
  width:100%;
  max-width:480px;
}
.hud{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:var(--card);
  border-radius:16px;
  padding:14px 20px;
  margin-bottom:14px;
  box-shadow:0 6px 20px rgba(0,0,0,.15);
}
.hud .stat{text-align:center;}
.hud .label{font-size:12px;opacity:.6;}
.hud .value{font-size:26px;font-weight:800;color:var(--accent);}
#time.warn{color:#e63946;animation:pulse .5s infinite;}
@keyframes pulse{50%{transform:scale(1.15);}}

.board{
  position:relative;
  background:linear-gradient(to bottom,var(--grass) 0%,var(--grass) 15%,var(--dirt) 15%,var(--dirt) 100%);
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}
.hole{
  position:relative;
  aspect-ratio:1/0.85;
  background:radial-gradient(ellipse at center, var(--dirt-dark) 0%, var(--dirt) 70%);
  border-radius:50%;
  overflow:hidden;
  box-shadow:inset 0 8px 14px rgba(0,0,0,.5);
  cursor:pointer;
}
.mole{
  position:absolute;
  left:50%;
  bottom:-100%;
  width:78%;
  transform:translateX(-50%);
  transition:bottom .12s cubic-bezier(.3,1.5,.5,1);
  pointer-events:none;
}
.hole.up .mole{bottom:-6%;}
.hole.hit .mole{animation:hitPop .3s ease-out;}
@keyframes hitPop{
  0%{transform:translateX(-50%) scale(1);}
  40%{transform:translateX(-50%) scale(1.3) rotate(-8deg);}
  100%{transform:translateX(-50%) scale(0.4) rotate(20deg); opacity:0;}
}
.mole svg{width:100%;display:block;}

.score-pop{
  position:absolute;
  top:10%;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
  font-weight:900;
  color:#ffd23f;
  text-shadow:0 2px 3px rgba(0,0,0,.5);
  opacity:0;
  pointer-events:none;
  z-index:5;
}
.score-pop.show{animation:popUp .6s ease-out forwards;}
@keyframes popUp{
  0%{opacity:1; transform:translate(-50%,0) scale(.6);}
  40%{opacity:1; transform:translate(-50%,-20px) scale(1.2);}
  100%{opacity:0; transform:translate(-50%,-45px) scale(1);}
}

.controls{
  text-align:center;
  margin-top:16px;
}
button{
  font-family:inherit;
  font-size:18px;
  font-weight:700;
  padding:12px 32px;
  border:none;
  border-radius:30px;
  background:var(--accent);
  color:#fff;
  cursor:pointer;
  box-shadow:0 6px 16px rgba(255,107,53,.4);
  transition:transform .1s;
}
button:active{transform:scale(.94);}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:20;
}
.overlay.show{display:flex;}
.panel{
  background:var(--card);
  border-radius:20px;
  padding:32px 28px;
  text-align:center;
  max-width:320px;
  box-shadow:0 20px 50px rgba(0,0,0,.4);
}
.panel h2{margin:0 0 8px;font-size:26px;}
.panel .final{font-size:44px;font-weight:900;color:var(--accent);margin:12px 0;}
.panel p{opacity:.7;font-size:14px;margin:0 0 20px;}
</style>

<div class="wrap">
  <div class="hud">
    <div class="stat"><div class="label">分數</div><div class="value" id="score">0</div></div>
    <div class="stat"><div class="label">時間</div><div class="value" id="time">30</div></div>
    <div class="stat"><div class="label">最佳</div><div class="value" id="best">0</div></div>
  </div>

  <div class="board" id="board"></div>

  <div class="controls">
    <button id="startBtn">開始遊戲</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="panel">
    <h2>時間到！</h2>
    <div class="final" id="finalScore">0</div>
    <p id="finalMsg">分</p>
    <button id="againBtn">再玩一次</button>
  </div>
</div>

<script>
const HOLES = 9;
const GAME_TIME = 30;
const board = document.getElementById('board');
const scoreEl = document.getElementById('score');
const timeEl = document.getElementById('time');
const bestEl = document.getElementById('best');
const startBtn = document.getElementById('startBtn');
const overlay = document.getElementById('overlay');
const finalScore = document.getElementById('finalScore');
const againBtn = document.getElementById('againBtn');

const MOLE_SVG = `
<svg viewBox="0 0 100 90">
  <ellipse cx="50" cy="55" rx="42" ry="35" fill="#8b5e3c"/>
  <ellipse cx="50" cy="58" rx="26" ry="20" fill="#c99b6f"/>
  <ellipse cx="26" cy="35" rx="10" ry="12" fill="#8b5e3c"/>
  <ellipse cx="74" cy="35" rx="10" ry="12" fill="#8b5e3c"/>
  <circle cx="34" cy="45" r="7" fill="#1f1f1f"/>
  <circle cx="66" cy="45" r="7" fill="#1f1f1f"/>
  <circle cx="36" cy="43" r="2" fill="#fff"/>
  <circle cx="68" cy="43" r="2" fill="#fff"/>
  <ellipse cx="50" cy="58" rx="9" ry="6" fill="#e8a0a0"/>
  <path d="M38 68 Q50 78 62 68" stroke="#3a2415" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>`;

let holes = [];
for(let i=0;i<HOLES;i++){
  const h = document.createElement('div');
  h.className = 'hole';
  h.innerHTML = `<div class="mole">${MOLE_SVG}</div><div class="score-pop">+1</div>`;
  board.appendChild(h);
  holes.push(h);
}

let score = 0, timeLeft = GAME_TIME, playing = false;
let spawnTimer = null, countdownTimer = null;
let activeHoles = new Set();
let best = Number(localStorage.getItem('whack_best') || 0);
bestEl.textContent = best;

function randomHole(){
  const free = holes.map((h,i)=>i).filter(i=>!activeHoles.has(i));
  if(!free.length) return null;
  return free[Math.floor(Math.random()*free.length)];
}

function popUpMole(){
  if(!playing) return;
  const idx = randomHole();
  if(idx===null) return;
  activeHoles.add(idx);
  const hole = holes[idx];
  hole.classList.add('up');
  const upTime = Math.max(500, 1100 - (GAME_TIME - timeLeft)*20);
  const timeout = setTimeout(()=>{
    hole.classList.remove('up');
    activeHoles.delete(idx);
  }, upTime);
  hole.dataset.timeoutId = timeout;
}

function scheduleSpawn(){
  if(!playing) return;
  const delay = Math.max(280, 750 - (GAME_TIME - timeLeft)*12);
  spawnTimer = setTimeout(()=>{
    popUpMole();
    scheduleSpawn();
  }, delay);
}

holes.forEach((hole,idx)=>{
  hole.addEventListener('click', ()=>{
    if(!playing || !hole.classList.contains('up') || hole.classList.contains('hit')) return;
    hole.classList.add('hit');
    activeHoles.delete(idx);
    clearTimeout(hole.dataset.timeoutId);
    score++;
    scoreEl.textContent = score;
    const pop = hole.querySelector('.score-pop');
    pop.classList.remove('show'); void pop.offsetWidth; pop.classList.add('show');
    if(navigator.vibrate) navigator.vibrate(30);
    setTimeout(()=>{
      hole.classList.remove('up','hit');
    }, 300);
  });
});

function startGame(){
  score = 0; timeLeft = GAME_TIME; playing = true;
  scoreEl.textContent = 0;
  timeEl.textContent = timeLeft;
  timeEl.classList.remove('warn');
  overlay.classList.remove('show');
  startBtn.textContent = '遊戲進行中…';
  startBtn.disabled = true;
  activeHoles.clear();
  holes.forEach(h=>h.classList.remove('up','hit'));

  scheduleSpawn();
  countdownTimer = setInterval(()=>{
    timeLeft--;
    timeEl.textContent = timeLeft;
    if(timeLeft<=5) timeEl.classList.add('warn');
    if(timeLeft<=0) endGame();
  },1000);
}

function endGame(){
  playing = false;
  clearTimeout(spawnTimer);
  clearInterval(countdownTimer);
  holes.forEach(h=>{
    h.classList.remove('up');
    clearTimeout(h.dataset.timeoutId);
  });
  if(score>best){ best=score; localStorage.setItem('whack_best', best); }
  bestEl.textContent = best;
  finalScore.textContent = score;
  overlay.classList.add('show');
  startBtn.textContent = '開始遊戲';
  startBtn.disabled = false;
}

startBtn.addEventListener('click', startGame);
againBtn.addEventListener('click', startGame);
</script>











<script>/* AI-CAMP-STATS-BEACON */
(function(){
  try{ if(window.top!==window.self) return; }catch(e){ return; } /* 在作品館內由作品館計數與投票 */
  var NS="ai-future-camp", K="t-bc6c9085";
  var ABS="//abacus.jasoncameron.dev/"; /* 直連備援 */
  var REL="/abacus/"; /* 同源代理（Vercel 轉發）：學校閘道擋外部網域時仍然通 */
  function ping(n){
    try{
      fetch(REL+"hit/"+NS+"/"+n).then(function(r){
        if(!r||!r.ok){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); }
      }).catch(function(){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); });
    }catch(e){}
  }
  function read(n,cb){
    function via(base,next){ try{ fetch(base+"get/"+NS+"/"+n).then(function(r){ if(r.status===404&&base===ABS) return {value:0}; if(!r.ok) throw 0; return r.json(); }).then(function(j){ cb(j.value||j.count||0); }).catch(next); }catch(e){ next(); } }
    via(REL, function(){ via(ABS, function(){ cb(null); }); });
  }
  ping(K+"-v");
  var done=false;
  function once(){ if(done)return; done=true; ping(K+"-p"); ping("site-total-plays");
    window.removeEventListener("pointerdown",once); window.removeEventListener("keydown",once); }
  window.addEventListener("pointerdown",once,{once:false}); window.addEventListener("keydown",once,{once:false});
  /* 投票鈕：非常好玩/好玩——與作品館同一計數器，任何網頁打開都同步 */
  function initVotes(){
    if(!document.body) return;
    var wrap=document.createElement("div");
    wrap.style.cssText="position:fixed;right:10px;bottom:10px;z-index:99999;display:flex;gap:6px;font-family:sans-serif;opacity:.92";
    var LS="voted-"+K;
    var defs=[["-love","\u2764\uFE0F","\u975e\u5e38\u597d\u73a9","#ff6cc7"],["-like","\ud83d\udc4d","\u597d\u73a9","#38e1ff"]];
    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;
          b.querySelector("i").textContent=Math.max(0,(n||0)-(c||0));
        }); });
      });
    }
    defs.forEach(function(d){
      var b=document.createElement("button");
      b.type="button"; b.title=d[2];
      b.style.cssText="min-height:42px;padding:8px 14px;border:none;border-radius:999px;background:rgba(15,18,32,.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation";
      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";
      b.addEventListener("click",function(){
        var prev=null; try{ prev=localStorage.getItem(LS); }catch(e){}
        if(prev===d[0]){ ping(K+d[0]+"-c"); try{ localStorage.removeItem(LS); }catch(e){} }
        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);
      });
      btns[d[0]]=b; wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    refresh();
    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* 每10秒同步別人投的票 */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
</script>
