<script>
'use strict';
/* ============================================================
   夜襲邪教據點 — 專業AI升級版（99 Nights 同人可玩版）
   月夜潛行：避開信徒的視線錐、繞到背後偷襲、清空據點、
   搶奪祭壇戰利品、撤回森林邊界。每晚信徒更多、更警覺！
   固定時間步進＋狀態機＋視線潛行 AI＋全套手感回饋
   ============================================================ */
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
let ctx = canvas.getContext('2d');
function resize() {
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = GAME_W * scale * dpr; canvas.height = GAME_H * scale * dpr;
  canvas.style.width = GAME_W * scale + 'px'; canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', resize); resize();

// ---------- 調色盤（森林夜色）----------
const PAL = {
  bg: '#060b08', ground: '#16281a', clearing: '#243d29',
  fire: '#ef8a3d', fireHot: '#ffd27a', amber: '#c9a15a',
  blood: '#8f2f2f', bone: '#d9d3c1', ink: '#e7e2d2', dim: '#9fae9c',
  hudLine: '#2c4432', player: '#2f4d3a', playerTrim: '#c9a15a',
  cult: '#3b2f24', cultTrim: '#8f2f2f', bad: '#e2493f', good: '#8fd07a'
};
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const rnd = (a, b) => a + Math.random() * (b - a);
const easeOutBack = t => 1 + 2.7 * Math.pow(t - 1, 3) + 1.7 * Math.pow(t - 1, 2);
const angDiff = (a, b) => { let d = a - b; while (d > Math.PI) d -= 6.2832; while (d < -Math.PI) d += 6.2832; return d; };
function roundRect(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ---------- 音效 ----------
let AC = null, master = null, muted = false;
function audio() {
  if (!AC) {
    try {
      AC = new (window.AudioContext || window.webkitAudioContext)();
      master = AC.createGain(); master.gain.value = muted ? 0 : 0.85;
      // 限制器：多音效齊發不削峰爆音
      const comp = AC.createDynamicsCompressor();
      comp.threshold.value = -12; comp.knee.value = 24; comp.ratio.value = 8;
      comp.attack.value = 0.003; comp.release.value = 0.2;
      master.connect(comp); comp.connect(AC.destination);
    } catch (err) { AC = null; }
  }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function setMuted(m) { muted = m; if (master) master.gain.value = muted ? 0 : 0.85; }
function beep(freq, dur, type, vol, slide) {
  const ac = audio(); if (!ac || muted) return;
  freq *= 1 + (Math.random() * 2 - 1) * 0.04; // ±4% 音高隨機
  type = type || 'square'; vol = vol || 0.13; slide = slide || 0;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, ac.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), ac.currentTime + dur);
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g).connect(master);
  o.start(); o.stop(ac.currentTime + dur);
}
function noise(dur, vol) {
  const ac = audio(); if (!ac || muted) return;
  const len = Math.max(1, Math.floor(ac.sampleRate * dur));
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ac.createBufferSource(), g = ac.createGain();
  src.buffer = buf;
  g.gain.setValueAtTime(vol || 0.09, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  src.connect(g).connect(master);
  src.start();
}
const sfx = {
  click() { beep(520, 0.06, 'square', 0.08); },
  swing() { noise(0.08, 0.07); beep(300, 0.07, 'triangle', 0.05, -120); },
  hit() { beep(210, 0.09, 'square', 0.13, -70); noise(0.05, 0.09); },
  takedown() { beep(140, 0.16, 'sawtooth', 0.14, -60); noise(0.12, 0.11); },
  alert() { beep(660, 0.09, 'square', 0.12, 200); setTimeout(() => beep(880, 0.12, 'square', 0.11), 90); },
  hurt() { beep(230, 0.24, 'sawtooth', 0.14, -140); },
  eat() { beep(330, 0.07, 'triangle', 0.1); setTimeout(() => beep(440, 0.09, 'triangle', 0.1), 80); },
  loot() { [784, 988, 1319].forEach((f, i) => setTimeout(() => beep(f, 0.12, 'square', 0.1), i * 80)); },
  coin() { [660, 880].forEach((f, i) => setTimeout(() => beep(f, 0.08, 'square', 0.09), i * 60)); },
  night() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.14, 'square', 0.1), i * 90)); },
  lose() { [392, 330, 262, 196].forEach((f, i) => setTimeout(() => beep(f, 0.2, 'triangle', 0.12), i * 140)); },
  step() { noise(0.03, 0.03); }
};

// ---------- FX ----------
let shake = 0, freeze = 0;
const parts = [];
function burst(x, y, color, n, speed, up) {
  n = n || 10; speed = speed || 180;
  for (let i = 0; i < n; i++) {
    if (parts.length > 280) break;
    const a = Math.random() * Math.PI * 2, s = speed * (0.3 + Math.random() * 0.7);
    parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - (up || 0), life: rnd(0.3, 0.6), color, size: rnd(2.5, 5), grav: 240 });
  }
}
function updateParts(dt) {
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += p.grav * dt; p.life -= dt;
    if (p.life <= 0) { parts[i] = parts[parts.length - 1]; parts.pop(); } // swap-pop
  }
}
function drawParts() {
  for (const p of parts) {
    ctx.globalAlpha = clamp(p.life * 2.2, 0, 1);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}
const floaters = [];
function addFloat(x, y, text, color, big) { floaters.push({ x, y, text, color, life: 1, big: !!big }); }
function updateFloaters(dt) {
  for (let i = floaters.length - 1; i >= 0; i--) {
    const f = floaters[i];
    f.y -= 42 * dt; f.life -= dt;
    if (f.life <= 0) floaters.splice(i, 1);
  }
}
function drawFloaters() {
  for (const f of floaters) {
    ctx.globalAlpha = clamp(f.life * 1.5, 0, 1);
    ctx.fillStyle = f.color;
    ctx.font = (f.big ? 'bold 24px' : 'bold 17px') + ' sans-serif';
    ctx.textAlign = 'center';
    ctx.strokeStyle = 'rgba(0,0,0,0.8)'; ctx.lineWidth = 3;
    ctx.strokeText(f.text, f.x, f.y);
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

// ---------- 場景 ----------
const CAMP = { x: 480, y: 280 };
const FIRE = { x: 480, y: 290 };
const TOTEM = { x: 575, y: 215 };
const TENTS = [{ x: 355, y: 210, r: 0.4 }, { x: 610, y: 350, r: -0.5 }];
const FENCE_R = 185, ESCAPE_R = 265;
let bgTime = 0;
// 地面預先繪製（草地雜斑、土徑）
const groundCv = document.createElement('canvas');
groundCv.width = GAME_W; groundCv.height = GAME_H;
(function paintGround() {
  const g = groundCv.getContext('2d');
  const rad = g.createRadialGradient(CAMP.x, CAMP.y, 40, CAMP.x, CAMP.y, 560);
  rad.addColorStop(0, '#375c3c'); rad.addColorStop(0.4, PAL.clearing);
  rad.addColorStop(0.75, PAL.ground); rad.addColorStop(1, '#0c1912');
  g.fillStyle = rad;
  g.fillRect(0, 0, GAME_W, GAME_H);
  g.fillStyle = 'rgba(120,92,58,0.28)';
  g.beginPath(); g.ellipse(CAMP.x, CAMP.y + 10, 190, 120, 0, 0, 6.29); g.fill();
  let seed = 42;
  function prng() { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return (seed % 1000) / 1000; }
  for (let i = 0; i < 2600; i++) {
    const x = prng() * GAME_W, y = prng() * GAME_H, s = prng();
    g.fillStyle = s > 0.5 ? 'rgba(120,158,100,0.32)' : 'rgba(10,20,10,0.35)';
    g.fillRect(x, y, 2, 2);
  }
  // 小徑
  g.strokeStyle = 'rgba(120,92,58,0.35)'; g.lineWidth = 26; g.lineCap = 'round';
  g.beginPath(); g.moveTo(90, 500); g.quadraticCurveTo(260, 420, CAMP.x - 60, CAMP.y + 60); g.stroke();
})();
// 樹林（環繞 + 外圍散佈）
const trees = [];
for (let i = 0; i < 15; i++) {
  const a = (i / 15) * 6.2832 + 0.2;
  trees.push({ x: CAMP.x + Math.cos(a) * rnd(245, 290), y: CAMP.y + Math.sin(a) * rnd(200, 240), s: rnd(0.8, 1.25), ph: rnd(0, 6) });
}
for (let i = 0; i < 10; i++) trees.push({ x: rnd(0, GAME_W), y: Math.random() < 0.5 ? rnd(-10, 40) : rnd(GAME_H - 40, GAME_H + 10), s: rnd(0.9, 1.4), ph: rnd(0, 6) });
// 霧氣（雙層視差）與螢火蟲
const fogs = [];
for (let i = 0; i < 7; i++) fogs.push({ x: rnd(0, GAME_W), y: rnd(0, GAME_H), r: rnd(90, 180), v: rnd(6, 14) * (i % 2 ? 1 : 0.5), a: rnd(0.05, 0.11) });
const flies = [];
for (let i = 0; i < 9; i++) flies.push({ x: rnd(0, GAME_W), y: rnd(0, GAME_H), ph: rnd(0, 9), sp: rnd(0.5, 1.2) });

function drawTree(t) {
  const sway = Math.sin(bgTime * 0.7 + t.ph) * 3;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(t.x + 8, t.y + 10, 34 * t.s, 14 * t.s, 0, 0, 6.29); ctx.fill();
  for (const [ox, oy, r, col] of [[0, 0, 30, '#122015'], [-14, -8, 20, '#16281a'], [12 + sway, -10, 18, '#1b301f']]) {
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(t.x + ox * t.s, t.y + oy * t.s, r * t.s, 0, 6.29); ctx.fill();
  }
  // 月光邊緣
  ctx.fillStyle = 'rgba(170,195,150,0.16)';
  ctx.beginPath(); ctx.arc(t.x + (14 + sway) * t.s, t.y - 14 * t.s, 12 * t.s, 0, 6.29); ctx.fill();
}
function drawTent(tn) {
  ctx.save();
  ctx.translate(tn.x, tn.y); ctx.rotate(tn.r);
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.ellipse(6, 10, 56, 30, 0, 0, 6.29); ctx.fill();
  // 帳篷雙面（火光面亮、背光面暗）
  ctx.fillStyle = '#1c140d';
  ctx.beginPath(); ctx.moveTo(-52, 26); ctx.lineTo(0, -34); ctx.lineTo(52, 26); ctx.closePath(); ctx.fill();
  const fg = ctx.createLinearGradient(-40, 0, 30, 26);
  fg.addColorStop(0, '#5a4530'); fg.addColorStop(1, '#372716');
  ctx.fillStyle = fg;
  ctx.beginPath(); ctx.moveTo(-52, 26); ctx.lineTo(0, -34); ctx.lineTo(14, 26); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-52, 26); ctx.lineTo(0, -34); ctx.lineTo(52, 26); ctx.closePath(); ctx.stroke();
  ctx.strokeStyle = PAL.blood; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, -34); ctx.lineTo(0, 26); ctx.stroke();
  // 摺痕
  ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1.5;
  for (let i = 1; i < 4; i++) { ctx.beginPath(); ctx.moveTo(-52 + i * 13, 26); ctx.lineTo(-2, -30 + i * 2); ctx.stroke(); }
  ctx.restore();
}
function drawFence() {
  for (let i = 0; i < 26; i++) {
    const a = (i / 26) * 6.2832;
    if (a > 3.5 && a < 4.4) continue; // 缺口（大門）
    const fx = CAMP.x + Math.cos(a) * FENCE_R, fy = CAMP.y + Math.sin(a) * FENCE_R * 0.82;
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.ellipse(fx + 2, fy + 12, 7, 3, 0, 0, 6.29); ctx.fill();
    const wg = ctx.createLinearGradient(fx - 4, 0, fx + 4, 0);
    wg.addColorStop(0, '#1c130c'); wg.addColorStop(0.5, '#3a2a18'); wg.addColorStop(1, '#160f0a');
    ctx.fillStyle = wg;
    ctx.fillRect(fx - 4, fy - 20, 8, 32);
    ctx.fillStyle = '#3a2a18';
    ctx.beginPath(); ctx.moveTo(fx - 5, fy - 20); ctx.lineTo(fx, fy - 27); ctx.lineTo(fx + 5, fy - 20); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(70,55,30,0.8)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(fx - 5, fy - 6); ctx.lineTo(fx + 5, fy - 4); ctx.stroke();
  }
}
// 預繪光暈/霧/視線錐貼圖：遊玩中不再每幀建 radial gradient（平板 60fps 關鍵）
function makeRadialSprite(size, rgb, a0) {
  const cv = document.createElement('canvas');
  cv.width = size; cv.height = size;
  const c = cv.getContext('2d');
  const g = c.createRadialGradient(size / 2, size / 2, size * 0.04, size / 2, size / 2, size / 2);
  g.addColorStop(0, 'rgba(' + rgb + ',' + a0 + ')'); g.addColorStop(1, 'rgba(' + rgb + ',0)');
  c.fillStyle = g;
  c.fillRect(0, 0, size, size);
  return cv;
}
const fireGlowCv = makeRadialSprite(256, '255,180,90', 1);
const fogCv = makeRadialSprite(128, '160,180,160', 1);
function makeConeSprite(rgb) {
  const cv = document.createElement('canvas');
  cv.width = 256; cv.height = 256;
  const c = cv.getContext('2d');
  const g = c.createRadialGradient(128, 128, 6, 128, 128, 126);
  g.addColorStop(0, 'rgba(' + rgb + ',0.22)'); g.addColorStop(1, 'rgba(' + rgb + ',0)');
  c.fillStyle = g;
  c.beginPath();
  c.moveTo(128, 128);
  c.arc(128, 128, 126, -0.62, 0.62);
  c.closePath(); c.fill();
  return cv;
}
const coneCalm = makeConeSprite('201,161,90');
const coneAlert = makeConeSprite('226,73,63');
function drawFire() {
  const t = bgTime;
  const flick = Math.sin(t * 14) * 3 + Math.sin(t * 7) * 2;
  // 地面光暈（閃爍，貼圖縮放）
  const ga = 0.34 + Math.sin(t * 9) * 0.05;
  const gr = 170 + flick * 4;
  ctx.globalAlpha = ga;
  ctx.drawImage(fireGlowCv, FIRE.x - gr, FIRE.y - gr, gr * 2, gr * 2);
  ctx.globalAlpha = 1;
  // 焦黑柴薪
  ctx.fillStyle = '#1a0f08';
  ctx.beginPath();
  ctx.ellipse(FIRE.x - 12, FIRE.y + 8, 20, 5, 0.3, 0, 6.29);
  ctx.ellipse(FIRE.x + 12, FIRE.y + 9, 20, 5, -0.3, 0, 6.29);
  ctx.fill();
  ctx.fillStyle = '#c9502f';
  ctx.beginPath(); ctx.ellipse(FIRE.x, FIRE.y + 9, 20, 4, 0, 0, 6.29); ctx.fill();
  // 三層火焰
  const fl = (c, wF, hF, dy) => {
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.moveTo(FIRE.x - wF, FIRE.y + 8);
    ctx.quadraticCurveTo(FIRE.x - wF * 0.6 + flick * 0.3, FIRE.y - hF * 0.5, FIRE.x, FIRE.y - hF + flick + dy);
    ctx.quadraticCurveTo(FIRE.x + wF * 0.6 - flick * 0.3, FIRE.y - hF * 0.5, FIRE.x + wF, FIRE.y + 8);
    ctx.closePath(); ctx.fill();
  };
  fl(PAL.fire, 17, 46, 0);
  fl(PAL.fireHot, 11, 30, 2);
  fl('#fff3c4', 5.5, 17, 2);
  // 火星
  for (let i = 0; i < 6; i++) {
    const life = (t * 0.7 + i * 0.37) % 1;
    const sx = FIRE.x + Math.sin(i * 2.1 + t * 1.3) * 16 * (0.4 + life);
    ctx.globalAlpha = 1 - life;
    ctx.fillStyle = '#ffcf8a';
    ctx.fillRect(sx, FIRE.y - 6 - life * 60, 2.5, 2.5);
  }
  ctx.globalAlpha = 1;
}
// 圖騰漸層（座標恆定 → 建一次重用）
const totemPoleGrad = ctx.createLinearGradient(TOTEM.x - 7, 0, TOTEM.x + 7, 0);
totemPoleGrad.addColorStop(0, '#0e0a06'); totemPoleGrad.addColorStop(0.5, '#2e2214'); totemPoleGrad.addColorStop(1, '#0e0a06');
const skullGrad = ctx.createRadialGradient(TOTEM.x - 3, TOTEM.y - 45, 1, TOTEM.x, TOTEM.y - 42, 11);
skullGrad.addColorStop(0, '#f2ede0'); skullGrad.addColorStop(1, '#a8a08a');
function drawTotem(lootGlow) {
  const t = bgTime;
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.ellipse(TOTEM.x + 3, TOTEM.y + 26, 22, 8, 0, 0, 6.29); ctx.fill();
  // 石壇
  ctx.fillStyle = '#2a2a26';
  for (const [ox, oy, r] of [[-16, 20, 8], [16, 21, 7], [0, 24, 9]]) {
    ctx.beginPath(); ctx.arc(TOTEM.x + ox, TOTEM.y + oy, r, 0, 6.29); ctx.fill();
  }
  // 圖騰柱
  ctx.fillStyle = totemPoleGrad;
  ctx.fillRect(TOTEM.x - 7, TOTEM.y - 38, 14, 62);
  ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 2;
  for (let i = 0; i < 4; i++) { ctx.beginPath(); ctx.moveTo(TOTEM.x - 7, TOTEM.y - 26 + i * 13); ctx.lineTo(TOTEM.x + 7, TOTEM.y - 26 + i * 13); ctx.stroke(); }
  // 詭異紅光
  const gl = 0.5 + 0.5 * Math.sin(t * 3);
  ctx.fillStyle = 'rgba(201,80,47,' + (0.25 + 0.25 * gl) + ')';
  ctx.beginPath(); ctx.arc(TOTEM.x, TOTEM.y - 42, 16 + gl * 3, 0, 6.29); ctx.fill();
  // 骷髏
  ctx.fillStyle = skullGrad;
  ctx.beginPath(); ctx.arc(TOTEM.x, TOTEM.y - 42, 10, 0, 6.29); ctx.fill();
  ctx.fillStyle = '#241c14';
  ctx.beginPath();
  ctx.arc(TOTEM.x - 4, TOTEM.y - 44, 2.4, 0, 6.29);
  ctx.arc(TOTEM.x + 4, TOTEM.y - 44, 2.4, 0, 6.29);
  ctx.fill();
  ctx.fillRect(TOTEM.x - 3, TOTEM.y - 37, 6, 2);
  // 戰利品階段：金光召喚
  if (lootGlow) {
    const a = 0.35 + Math.sin(t * 5) * 0.2;
    ctx.strokeStyle = 'rgba(255,205,120,' + a + ')'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.ellipse(TOTEM.x, TOTEM.y + 22, 30 + Math.sin(t * 5) * 4, 12, 0, 0, 6.29); ctx.stroke();
    const lg = ctx.createLinearGradient(0, TOTEM.y - 90, 0, TOTEM.y);
    lg.addColorStop(0, 'rgba(255,220,140,0)'); lg.addColorStop(1, 'rgba(255,220,140,' + (a * 0.5) + ')');
    ctx.fillStyle = lg;
    ctx.fillRect(TOTEM.x - 20, TOTEM.y - 90, 40, 90);
  }
}
const meatGrad = ctx.createLinearGradient(-8, -6, 8, 6);
meatGrad.addColorStop(0, '#b06a3a'); meatGrad.addColorStop(1, '#7a4222');
function drawMeat(m) {
  if (!m.alive) return;
  const bob = Math.sin(bgTime * 3) * 2;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(m.x, m.y + 8, 12, 4, 0, 0, 6.29); ctx.fill();
  ctx.save();
  ctx.translate(m.x, m.y + bob);
  ctx.rotate(0.6);

function tryAttack() {
  if (state !== playState || player.hp <= 0) return;

  if (player.stam < ATK_COST) {
    addFloat(player.x, player.y - 34, '體力不足！', PAL.bad, false);

    if (d < REACH && Math.abs(angDiff(Math.atan2(c.y - player.y, c.x - player.x), player.face)) < 1.3) inConeAny = true;
    if (d < nd) { nd = d; nearest = c; }

      burst(c.x, c.y - 8, '#d8cfb8', 8, 160, 60);
      if (backstab && c.hp <= 0) {

        freeze = 0.08; shake = Math.max(shake, 6);
      } else {
        addFloat(c.x, c.y - 32, '-1', '#ffdf9a', false);
        sfx.hit();
        freeze = 0.04; shake = Math.max(shake, 3.5);
        if (c.alert <= 0) { c.alert = 2.2; sfx.alert(); }
        c.chaseT = 3;
        spotted = true; chain = 0;
      }
      if (c.hp <= 0) {
        c.dead = true; kills++;
        burst(c.x, c.y, '#7a6a52', 14, 190, 60);
        rollGoldDrop(c);
        if (c.leader) {
          bonus += 75;
          if (player.hp < playerMaxHp()) {
            player.hp++;
            addFloat(player.x, player.y - 54, '擊殺頭目！回復 1 HP（+75）', PAL.good, true);
          } else {
            addFloat(c.x, c.y - 54, '擊殺頭目！+75', PAL.amber, true);
          }
          sfx.night();
        }
        // 全部清空 → 搶祭壇
        if (cultists.every(cc => cc.dead)) {
          phase = 'loot';
          addFloat(TOTEM.x, TOTEM.y - 60, '據點清空！去祭壇搶戰利品！', PAL.amber, true);
          sfx.night();
        }
      }
    }
  }
  // 搶奪祭壇
  if (phase === 'loot' && Math.hypot(TOTEM.x - player.x, TOTEM.y - player.y) < ATK_RANGE + 14) {
    phase = 'retreat';
    player.loot = true;
    burst(TOTEM.x, TOTEM.y - 20, PAL.fireHot, 22, 220, 120);
    addFloat(TOTEM.x, TOTEM.y - 60, '搶到戰利品！快撤離！', PAL.fireHot, true);
    sfx.loot();
    shake = Math.max(shake, 5);
  }
  if (!hitAny) burst(player.x + Math.cos(player.face) * 30, player.y + Math.sin(player.face) * 30, 'rgba(200,200,180,0.5)', 3, 90);
}
function hurtPlayer(fromX, fromY) {
  if (player.hurtT > 0 || player.hp <= 0) return;
  player.hp--;
  player.hurtT = 1.4;
  sfx.hurt();
  freeze = 0.07; shake = Math.max(shake, 8);
  burst(player.x, player.y - 8, PAL.bad, 14, 220, 60);
  addFloat(player.x, player.y - 36, '被抓到了！-1', PAL.bad, true);
  const kb = Math.atan2(player.y - fromY, player.x - fromX);
  player.x += Math.cos(kb) * 42;
  player.y += Math.sin(kb) * 42;
  if (player.hp <= 0) {
    finalScore = calcScore();
    if (mode === 'endless') {   // v4：無盡模式分數獨立記錄
      newBest = finalScore > endlessBest;
      if (newBest) { endlessBest = finalScore; try { localStorage.setItem('夜襲邪教據點.endless_best', String(endlessBest)); } catch (err) {} }
    } else if (mode === 'story') {
      newBest = finalScore > best;
      if (newBest) { best = finalScore; try { localStorage.setItem('夜襲邪教據點.best', String(best)); } catch (err) {} }
    }
    sfx.lose();
    setTimeout(() => setState(overState), 900);
  }
}

// ===== 夜襲進行 =====
const playState = {
  enter() { this.banner = 4; this.nightFade = 0; this.elapsed = 0; },
  onKey(code) { if (code === 'KeyE' || code === 'Space' || code === 'KeyJ') tryAttack(); },
  update(dt) {
    fogUpdate(dt);
    this.elapsed += dt;
    if (mode === 'levels' && levelTimeLeft > 0 && phase !== 'success' && this.nightFade <= 0) {
      levelTimeLeft -= dt;
      if (levelTimeLeft <= 0) {
        levelTimeLeft = 0;
        showToastFail();
      }
    }
    if (this.banner > 0) this.banner -= dt;
    if (this.nightFade > 0) {
      this.nightFade -= dt;
      if (this.nightFade <= 0) {
        if (won) { setState(overState); return; }
        if (mode === 'levels') { setState(levelSelectState); return; }
        spawnNight(); this.banner = 2;
      }
      return;
    }
    if (player.hp <= 0) return;
    // 資源
    player.hunger = Math.max(0, player.hunger - dt * 1.1);
    const regen = player.hunger > 15 ? 16 : 6;
    if (player.atkT <= 0) player.stam = Math.min(playerMaxStam(), player.stam + dt * regen);
    player.atkT = Math.max(0, player.atkT - dt);
    player.atkCd = Math.max(0, player.atkCd - dt);
    player.hurtT = Math.max(0, player.hurtT - dt);
    // 移動（鍵盤 + 虛擬搖桿）
    let mx = 0, my = 0;
    if (keys.KeyW || keys.ArrowUp) my -= 1;
    if (keys.KeyS || keys.ArrowDown) my += 1;
    if (keys.KeyA || keys.ArrowLeft) mx -= 1;
    if (keys.KeyD || keys.ArrowRight) mx += 1;
    if (joy && Math.hypot(joy.dx, joy.dy) > 10) { mx = joy.dx; my = joy.dy; }
    const ml = Math.hypot(mx, my);
    player.walk = ml > 0.01 && player.atkT <= 0;
    if (player.walk) {
      const sp = 165 * (player.hunger <= 0 ? 0.7 : 1) * speedMulFromUpgrade();
      player.x = clamp(player.x + mx / ml * sp * dt, 16, GAME_W - 16);
      player.y = clamp(player.y + my / ml * sp * dt, 16, GAME_H - 16);
      player.face = Math.atan2(my, mx);
      player.walkT += dt;
      player.stepT -= dt;
      if (player.stepT <= 0) {
        player.stepT = 0.28;
        sfx.step();
        parts.push({ x: player.x + rnd(-4, 4), y: player.y + 8, vx: rnd(-12, 12), vy: rnd(-8, 0), life: 0.35, color: 'rgba(110,100,80,0.6)', size: 3, grav: 0 });
      }
    }
    // 吃烤肉回飢餓
    if (meat.alive && Math.hypot(meat.x - player.x, meat.y - player.y) < 24) {
      meat.alive = false;
      player.hunger = Math.min(100, player.hunger + 45);
      addFloat(meat.x, meat.y - 20, '吃了烤肉，飢餓 +45', PAL.good, false);
      sfx.eat();
      burst(meat.x, meat.y, PAL.good, 6, 110, 50);
    }
    // 撿祭品金幣（風險回報）
    for (let i = treasures.length - 1; i >= 0; i--) {
      const tr = treasures[i];
      if (Math.hypot(tr.x - player.x, tr.y - player.y) < 26) {
        treasures.splice(i, 1);
        bonus += 25;
        player.stam = Math.min(playerMaxStam(), player.stam + 15);
        addFloat(tr.x, tr.y - 20, '祭品 +25 分', PAL.amber, false);
        sfx.loot();
        burst(tr.x, tr.y, PAL.amber, 10, 150, 60);
      }
    }
    // 撿擊殺掉落的金幣
    updateDrops(dt);
    // 信徒 AI
    for (const c of cultists) {
      if (c.dead) { c.fade = Math.max(0.35, c.fade - dt * 0.6); continue; }
      c.flash = Math.max(0, c.flash - dt);
      c.hitCd = Math.max(0, c.hitCd - dt);
      const dToP = Math.hypot(player.x - c.x, player.y - c.y);
      const dirToP = Math.atan2(player.y - c.y, player.x - c.x);
      // 視線偵測：站著不動更難被看見（潛行教學）
      const seeRange = c.range * (player.walk ? 1 : 0.55);
      const inCone = dToP < seeRange && Math.abs(angDiff(dirToP, c.face)) < 0.62;
      if (inCone && c.chaseT <= 0 && player.hp > 0) {
        c.chaseT = 3.2;
        if (c.alert <= 0) { sfx.alert(); addFloat(c.x, c.y - 40, '發現你了！', PAL.bad, false); }
        c.alert = 2.5;
        spotted = true; chain = 0;
      }
      c.alert = Math.max(0, c.alert - dt);
      if (c.chaseT > 0 && player.hp > 0) {
        // 追擊
        c.chaseT -= dt;
        c.face += angDiff(dirToP, c.face) * 6 * dt;
        if (dToP > 20) {
          c.x += Math.cos(c.face) * c.speed * 1.35 * dt;
          c.y += Math.sin(c.face) * c.speed * 1.35 * dt;
        }
        if (dToP < 24 && c.hitCd <= 0) { c.hitCd = 1.2; hurtPlayer(c.x, c.y); }
      } else if (c.st === 'patrol') {
        // 繞著營地巡邏
        c.wpA += dt * 0.35;
        const tx = CAMP.x + Math.cos(c.wpA) * 120, ty = CAMP.y + Math.sin(c.wpA) * 96;
        const dd = Math.atan2(ty - c.y, tx - c.x);
        c.face += angDiff(dd, c.face) * 4 * dt;
        c.x += Math.cos(c.face) * c.speed * dt;
        c.y += Math.sin(c.face) * c.speed * dt;
      } else {
        // 站哨：緩慢左右張望
        c.wpT += dt;
        c.face += Math.sin(c.wpT * 0.8) * 0.55 * dt * 2;
        const back = Math.hypot(c.baseX - c.x, c.baseY - c.y);
        if (back > 8) {
          const dd = Math.atan2(c.baseY - c.y, c.baseX - c.x);
          c.x += Math.cos(dd) * c.speed * 0.6 * dt;
          c.y += Math.sin(dd) * c.speed * 0.6 * dt;
        }
      }
    }
    // 撤離判定
    if (phase === 'retreat' && Math.hypot(player.x - CAMP.x, (player.y - CAMP.y) * 1.15) > ESCAPE_R) {
      sfx.night();
      try { localStorage.setItem('夜襲邪教據點.gold', String(gold)); } catch (err) {}
      if (mode === 'levels') {
        addFloat(player.x, player.y - 50, '第 ' + currentLevel + ' 關通關！', PAL.fireHot, true);
        if (currentLevel >= levelUnlocked && levelUnlocked < 50) {
          levelUnlocked = currentLevel + 1;
          try { localStorage.setItem('夜襲邪教據點.level_unlocked', String(levelUnlocked)); } catch (err) {}
          addFloat(player.x, player.y - 76, '解鎖第 ' + levelUnlocked + ' 關！', PAL.amber, true);
        } else if (currentLevel >= 50) {
          addFloat(player.x, player.y - 76, '恭喜！50 關全數通關！', PAL.amber, true);
        }
        burst(player.x, player.y - 20, PAL.fireHot, 20, 200, 120);
        this.nightFade = 1.2;
        return;
      }
      day++;
      addFloat(player.x, player.y - 50, '夜襲成功！第 ' + day + ' 天', PAL.fireHot, true);
      if (!spotted) {
        bonus += 150;
        addFloat(player.x, player.y - 76, '完美夜襲！全程未被發現 +150', PAL.amber, true);
      }
      if (player.hp < playerMaxHp()) {
        player.hp++;
        addFloat(player.x, player.y - 100, '夜晚休整 +1 HP', PAL.good, false);
      }
      burst(player.x, player.y - 20, PAL.fireHot, 20, 200, 120);
      player.stam = Math.min(playerMaxStam(), player.stam + 25);
      nights++;
      // 三晚達成 → 勝利結算（僅劇情模式；無盡模式永不結束，撐到被抓為止）
      if (mode === 'story' && nights >= NIGHTS_GOAL) {
        won = true;
        finalScore = calcScore() + 300 + player.hp * 100;
        grade = finalScore >= 1500 ? 'S' : finalScore >= 1200 ? 'A' : finalScore >= 900 ? 'B' : 'C';
        newBest = finalScore > best;
        if (newBest) {
          best = finalScore;
          try { localStorage.setItem('夜襲邪教據點.best', String(best)); } catch (err) {}
        }
        if (!cleared) { cleared = true; try { localStorage.setItem('夜襲邪教據點.cleared', '1'); } catch (err) {} }   // v4：解鎖無盡夜襲與 50 關模式
      }
      this.nightFade = 1.2;
    }
  },
  draw() {
    uiButtons.length = 0;
    ctx.save();
    ctx.translate((Math.random() * 2 - 1) * shake, (Math.random() * 2 - 1) * shake);
    drawScene(phase === 'loot');
    // 視線錐（黃=巡邏、紅=追擊；貼圖旋轉縮放，零每幀漸層）
    for (const c of cultists) {
      if (c.dead) continue;
      const rr = c.range * (player.walk ? 1 : 0.55);
      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.rotate(c.face);
      const sc = rr / 126;
      ctx.scale(sc, sc);
      ctx.drawImage(c.chaseT > 0 ? coneAlert : coneCalm, -128, -128);
      ctx.restore();
    }
    // 撤離提示圈
    if (phase === 'retreat') {
      ctx.strokeStyle = 'rgba(255,210,122,' + (0.3 + Math.sin(bgTime * 4) * 0.15) + ')';
      ctx.lineWidth = 3; ctx.setLineDash([12, 10]);
      ctx.beginPath(); ctx.ellipse(CAMP.x, CAMP.y, ESCAPE_R, ESCAPE_R / 1.15, 0, 0, 6.29); ctx.stroke();
      ctx.setLineDash([]);
    }
    // 角色（依 y 排序偽深度）
    const order = [...cultists.map(c => ({ y: c.y, f: () => drawFigure(c.x, c.y, c.face, { color: c.leader ? '#4a2418' : PAL.cult, trim: c.leader ? '#d8a03a' : PAL.cultTrim, eyes: true, scale: c.leader ? 1.35 : 1, walk: c.chaseT > 0 || c.st === 'patrol', walkT: bgTime + c.ph, alert: c.alert, flash: c.flash, dead: c.dead, fade: c.fade, ph: c.ph }) })),
      { y: player.y, f: () => drawFigure(player.x, player.y, player.face, { color: PAL.player, trim: PAL.playerTrim, walk: player.walk, walkT: player.walkT, swing: player.atkT > 0 ? 1 - player.atkT / 0.28 : 0, flash: player.hurtT, loot: player.loot, skin: '#c8a080' }) },
      { y: FIRE.y, f: drawFire }];
    order.sort((a, b) => a.y - b.y);
    for (const o of order) o.f();
    // 新手指引箭頭：第一晚還沒擊倒人之前，指向最近的信徒
    if (mode === 'story' && nights === 0 && kills === 0 && phase === 'raid' && this.elapsed < 18 && player.hp > 0) {
      let n = null, nd2 = 1e9;
      for (const c of cultists) {
        if (c.dead) continue;
        const d = Math.hypot(c.x - player.x, c.y - player.y);
        if (d < nd2) { nd2 = d; n = c; }
      }
      if (n && nd2 > 70) {
        const a = Math.atan2(n.y - player.y, n.x - player.x);
        const rr = 46 + Math.sin(bgTime * 5) * 6;
        ctx.save();
        ctx.translate(player.x + Math.cos(a) * rr, player.y - 12 + Math.sin(a) * rr);
        ctx.rotate(a);
        ctx.fillStyle = PAL.amber;
        ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(12, 0); ctx.lineTo(-7, -8); ctx.lineTo(-7, 8); ctx.closePath();
        ctx.fill(); ctx.stroke();
        ctx.restore();
      }
    }
    drawParts();
    drawFloaters();
    drawAtmosphere();
    ctx.restore();
    drawHUD(this);
    // 開場/過夜橫幅
    if (this.banner > 0) {
      ctx.globalAlpha = clamp(this.banner, 0, 1);
      ctx.fillStyle = 'rgba(6,11,8,0.75)';
      roundRect(GAME_W / 2 - 270, 82, 540, 70, 6);
      ctx.fill();
      ctx.fillStyle = PAL.bone;
      ctx.font = 'bold 20px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(mode === 'levels' ? ('第 ' + currentLevel + ' 關：站著不動比較不會被看見，繞到背後偷襲！') : ('DAY ' + day + '：站著不動比較不會被看見，繞到背後偷襲！'), GAME_W / 2, 110);
      ctx.fillStyle = PAL.amber;
      ctx.font = 'bold 15px sans-serif';
      ctx.fillText(TOUCH ? '按住畫面拖曳＝移動 · 右下紅鈕＝攻擊' : 'WASD／方向鍵＝移動 · E 或空白鍵＝攻擊', GAME_W / 2, 138);
      ctx.globalAlpha = 1;
    }
    if (this.nightFade > 0) {
      ctx.fillStyle = 'rgba(255,235,200,' + clamp(Math.sin((1.2 - this.nightFade) / 1.2 * Math.PI) * 0.7, 0, 1) + ')';
      ctx.fillRect(0, 0, GAME_W, GAME_H);
    }
  }
};

const barGrads = new Map();
function drawHUD(st) {

  for (let i = 0; i < playerMaxHp(); i++) {

  ctx.strokeStyle = PAL.hudLine; ctx.stroke();
  const bar = (y, label, v, max, c1, c2, warn) => {

    ctx.fillText(label, bx, y + 8);
    ctx.fillStyle = '#050a06';
    ctx.fillRect(bx + 34, y, bw, 9);

      g = ctx.createLinearGradient(bx + 34, 0, bx + 34 + bw, 0);
      g.addColorStop(0, c1); g.addColorStop(1, c2);
      barGrads.set(c1, g);
    }
    ctx.fillStyle = g;
    if (warn && Math.floor(bgTime * 4) % 2) ctx.fillStyle = PAL.bad;
    ctx.fillRect(bx + 34, y, bw * clamp(v / max, 0, 1), 9);
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.strokeRect(bx + 34, y, bw, 9);
  };
  bar(26, '體力', player.stam, playerMaxStam(), '#b6e07f', '#5aa03e', player.stam < 25);
  bar(48, '飢餓', player.hunger, 100, PAL.fireHot, PAL.fire, player.hunger < 15);
  // 進度／金幣
  ctx.fillStyle = PAL.amber;
  ctx.font = 'bold 12px monospace'; ctx.textAlign = 'left';
  const progressText = mode === 'levels' ? ('關卡 ' + currentLevel + '/50' + (levelTimeLeft > 0 ? ('　剩餘 ' + Math.ceil(levelTimeLeft) + ' 秒') : ''))
    : (mode === 'endless' ? ('無盡 · 第 ' + (nights + 1) + ' 晚') : ('夜襲 ' + Math.min(nights + 1, NIGHTS_GOAL) + '/' + NIGHTS_GOAL + ' 晚'));
  ctx.fillText(progressText, 122, 58);
  ctx.fillStyle = PAL.fireHot;
  ctx.font = 'bold 13px monospace'; ctx.textAlign = 'right';
  ctx.fillText('💰 ' + gold, GAME_W - 16, 30);
  // 目標列
  const alive = cultists.filter(c => !c.dead).length;
  const atkWord = TOUCH ? '點「攻擊」鈕' : '按 E';
  let obj = '潛入據點：繞到信徒背後' + atkWord + '偷襲（剩餘 ' + alive + ' 名）';
  if (phase === 'loot') obj = '據點清空！到中央祭壇' + atkWord + '搶奪戰利品';
  if (phase === 'retreat') obj = '戰利品到手！衝出虛線圈撤回森林！';
  ctx.fillStyle = 'rgba(10,18,12,0.85)';

  ctx.fillStyle = PAL.ink;

  ctx.fillStyle = PAL.dim;
  ctx.font = '12px monospace'; ctx.textAlign = 'left';

  if (TOUCH) {

      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;

    ctx.strokeStyle = '#2a0f0c'; ctx.lineWidth = 3; ctx.stroke();

  muteButton();

      bg2.addColorStop(0, endless ? '#3a5a8f' : '#b5432f'); bg2.addColorStop(1, endless ? '#1f2d55' : '#6d1f1a');
      ctx.fillStyle = bg2;
      roundRect(GAME_W / 2 - 110, 348, 220, 52, 12);
      ctx.fill();
      ctx.strokeStyle = '#2a0f0c'; ctx.lineWidth = 3; ctx.stroke();
      ctx.fillStyle = '#f4ece0';
      ctx.font = 'bold 24px sans-serif';
      ctx.fillText(endless ? '再襲一次' : '再玩一次', GAME_W / 2, 382);
    }
    ctx.restore();
    muteButton();
  }
};

// ---------- 主迴圈 ----------
const STEP = 1 / 60;
let last = performance.now(), acc = 0;
function frame(now) {
  requestAnimationFrame(frame);
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while (acc >= STEP) {
    acc -= STEP;
    if (freeze > 0) { freeze -= STEP; continue; }
    shake *= Math.pow(0.001, STEP);
    if (shake < 0.1) shake = 0;
    state.update(STEP);
    updateParts(STEP);
    updateFloaters(STEP);
  }
  state.draw();
}
// 測試掛鉤（自動化冒煙測試用，不影響遊戲）
window.__smoke = () => ({ scene: state === playState ? 'play' : state === overState ? 'over' : (state === levelSelectState ? 'levelSelect' : 'title'), x: player.x, y: player.y, stam: player.stam, atkT: player.atkT, gold, mode, levelUnlocked });
setState(titleState);
requestAnimationFrame(frame);
</script>
