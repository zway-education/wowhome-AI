<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>蒐集金幣</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: linear-gradient(#87ceeb, #e0f7fa);
    overflow: hidden;
    font-family: "Microsoft JhengHei", sans-serif;
  }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 24px;
    color: #333;
    background: rgba(255,255,255,0.7);
    padding: 8px 16px;
    border-radius: 8px;
    z-index: 10;
  }
  #gameCanvas {
    display: block;
    margin: 0 auto;
    background: #cdeffd;
  }
  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 36px;
    color: #d9480f;
    background: rgba(255,255,255,0.9);
    padding: 20px 40px;
    border-radius: 12px;
    display: none;
    text-align: center;
    z-index: 20;
  }
  #restartBtn {
    display: block;
    margin: 16px auto 0;
    font-size: 18px;
    padding: 8px 20px;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="hud">分數：<span id="score">0</span>　時間：<span id="time">30</span></div>
<canvas id="gameCanvas"></canvas>
<div id="message">
  <div id="messageText"></div>
  <button id="restartBtn">再玩一次</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = Math.min(window.innerWidth, 800);
  canvas.height = Math.min(window.innerHeight, 500);
}
resize();
window.addEventListener('resize', resize);

const player = {
  x: 100,
  y: 100,
  size: 30,
  speed: 4,
  color: '#4a90d9'
};

let coins = [];
let score = 0;
let timeLeft = 30;
let gameRunning = true;
const keys = {};

document.addEventListener('keydown', e => keys[e.key] = true);
document.addEventListener('keyup', e => keys[e.key] = false);

function randInt(max) {
  return Math.floor(Math.random() * max);
}

function spawnCoin() {
  coins.push({
    x: randInt(canvas.width - 20) + 10,
    y: randInt(canvas.height - 20) + 10,
    radius: 10,
    angle: 0
  });
}

function initGame() {
  score = 0;
  timeLeft = 30;
  gameRunning = true;
  player.x = canvas.width / 2;
  player.y = canvas.height / 2;
  coins = [];
  for (let i = 0; i < 8; i++) spawnCoin();
  document.getElementById('score').textContent = score;
  document.getElementById('time').textContent = timeLeft;
  document.getElementById('message').style.display = 'none';
}

function update() {
  if (!gameRunning) return;

  if (keys['ArrowUp'] || keys['w']) player.y -= player.speed;
  if (keys['ArrowDown'] || keys['s']) player.y += player.speed;
  if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
  if (keys['ArrowRight'] || keys['d']) player.x += player.speed;

  player.x = Math.max(player.size / 2, Math.min(canvas.width - player.size / 2, player.x));
  player.y = Math.max(player.size / 2, Math.min(canvas.height - player.size / 2, player.y));

  for (let i = coins.length - 1; i >= 0; i--) {
    const c = coins[i];
    c.angle += 0.1;
    const dx = player.x - c.x;
    const dy = player.y - c.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < player.size / 2 + c.radius) {
      coins.splice(i, 1);
      score += 10;
      document.getElementById('score').textContent = score;
      spawnCoin();
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  coins.forEach(c => {
    ctx.save();
    ctx.translate(c.x, c.y);
    const squish = Math.abs(Math.cos(c.angle));
    ctx.scale(squish, 1);
    ctx.beginPath();
    ctx.arc(0, 0, c.radius, 0, Math.PI * 2);
    ctx.fillStyle = '#ffd700';
    ctx.fill();
    ctx.strokeStyle = '#b8860b';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  });

  ctx.beginPath();
  ctx.arc(player.x, player.y, player.size / 2, 0, Math.PI * 2);
  ctx.fillStyle = player.color;
  ctx.fill();
  ctx.strokeStyle = '#2c5f8a';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function endGame() {
  gameRunning = false;
  document.getElementById('messageText').textContent = `時間到！最終分數：${score}`;
  document.getElementById('message').style.display = 'block';
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

let timerInterval = setInterval(() => {
  if (!gameRunning) return;
  timeLeft--;
  document.getElementById('time').textContent = timeLeft;
  if (timeLeft <= 0) {
    endGame();
  }
}, 1000);

document.getElementById('restartBtn').addEventListener('click', initGame);

initGame();
loop();
</script>
</body>
</html>
