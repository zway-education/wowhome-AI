<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">

<title>貓咪餐廳送餐大冒險</title>
<style>
  html,body{margin:0;height:100%;background:#241408;overflow:hidden;touch-action:none;
    -webkit-user-select:none;user-select:none;font-family:"PingFang TC","Microsoft JhengHei",sans-serif}
  canvas{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:block}
  #muteBtn{position:fixed;right:10px;top:10px;width:44px;height:44px;border-radius:50%;
    background:rgba(20,10,5,.55);border:2px solid #ffcf5c;color:#ffcf5c;font-size:20px;
    display:flex;align-items:center;justify-content:center;z-index:20;cursor:pointer}
</style>

<body>
<canvas id="game"></canvas>
<div id="muteBtn">🔊</div>
<script>
'use strict';
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize(){
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width  = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale;
}
addEventListener('resize', resize); resize();

/* ===================== 輸入 ===================== */
const input = { up:false, down:false, left:false, right:false };
const KEYMAP = { ArrowUp:'up', KeyW:'up', ArrowDown:'down', KeyS:'down',
                 ArrowLeft:'left', KeyA:'left', ArrowRight:'right', KeyD:'right' };
let gameStartBuffer = 0;
addEventListener('keydown', e => {
  const a = KEYMAP[e.code];
  if(a){ e.preventDefault(); input[a] = true; }
  if(e.code === 'Space' || e.code === 'Enter'){ gameStartBuffer = 0.2; }
});
addEventListener('keyup', e => { const a = KEYMAP[e.code]; if(a) input[a] = false; });

// 浮動搖桿（觸控自由移動）
const stick = { active:false, id:null, cx:0, cy:0, dx:0, dy:0 };
function touchPos(t){
  const r = canvas.getBoundingClientRect();
  return { x:(t.clientX - r.left) / canvas._scale, y:(t.clientY - r.top) / canvas._scale };
}
function startTouch(e){
  e.preventDefault();
  gameStartBuffer = 0.2;
  for(const t of e.changedTouches){
    if(!stick.active){
      const p = touchPos(t);
      stick.active = true; stick.id = t.identifier; stick.cx = p.x; stick.cy = p.y; stick.dx = 0; stick.dy = 0;
    }
  }
}
function moveTouch(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    if(stick.active && t.identifier === stick.id){
      const p = touchPos(t);
      let dx = p.x - stick.cx, dy = p.y - stick.cy;
      const d = Math.hypot(dx,dy), max = 60;
      if(d > max){ dx = dx/d*max; dy = dy/d*max; }
      stick.dx = dx/max; stick.dy = dy/max;
    }
  }
}
function endTouch(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    if(stick.active && t.identifier === stick.id){
      stick.active = false; stick.dx = 0; stick.dy = 0;
    }
  }
}
canvas.addEventListener('touchstart', startTouch, {passive:false});
canvas.addEventListener('touchmove', moveTouch, {passive:false});
canvas.addEventListener('touchend', endTouch, {passive:false});
canvas.addEventListener('touchcancel', endTouch, {passive:false});

/* ===================== 音效 ===================== */
let AC = null, muted = false;
function audio(){ if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); return AC; }
addEventListener('pointerdown', audio, { once:true });
addEventListener('keydown', audio, { once:true });
function beep(freq=440, dur=0.1, type='square', vol=0.15, slide=0){
  if(muted) return;
  const ac = audio(); if(!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, ac.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq+slide), ac.currentTime+dur);
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+dur);
  o.connect(g).connect(ac.destination);
  o.start(); o.stop(ac.currentTime+dur);
}
function sfxPickup(){ beep(700,0.08,'square',0.12,120); }
function sfxDeliver(combo){
  beep(988,0.08,'square',0.15);
  setTimeout(()=>beep(1319,0.12,'square',0.15),70);
  if(combo>1) setTimeout(()=>beep(1568,0.14,'square',0.15),140);
}
function sfxDeny(){ beep(180,0.08,'sawtooth',0.12); }
function sfxExpire(){ beep(160,0.3,'sawtooth',0.18,-90); }
function sfxGameOver(){ beep(300,0.2,'square',0.15,-150); setTimeout(()=>beep(220,0.3,'square',0.15,-150),180); }
const muteBtn = document.getElementById('muteBtn');
muteBtn.addEventListener('click', ()=>{ muted = !muted; muteBtn.textContent = muted?'🔇':'🔊'; });
muteBtn.addEventListener('touchstart', e=>{ e.preventDefault(); muted = !muted; muteBtn.textContent = muted?'🔇':'🔊'; }, {passive:false});

/* ===================== 世界設定（等角投影） ===================== */
const COLS = 7, ROWS = 6;               // 格子座標範圍 x:0..6 y:0..5
const TILE_W = 112, TILE_H = 56;
const ORIGIN_X = GAME_W/2, ORIGIN_Y = 92;
function projX(gx,gy){ return ORIGIN_X + (gx - gy) * (TILE_W/2); }
function projY(gx,gy){ return ORIGIN_Y + (gx + gy) * (TILE_H/2); }

const FOODS = {
  fish: { color:'#8fd0ff', dark:'#4f9ed6', emoji:'🐟' },
  cake: { color:'#ffb3d6', dark:'#e178a8', emoji:'🍰' },
  tea:  { color:'#c9ffb3', dark:'#7fbf5a', emoji:'🍵' },
};
const STATIONS = [
  { gx:1, gy:0, food:'fish' },
  { gx:3, gy:0, food:'cake' },
  { gx:5, gy:0, food:'tea'  },
];
const TABLE_SPOTS = [
  { gx:1, gy:2 }, { gx:5, gy:2 }, { gx:1, gy:4 },
  { gx:5, gy:4 }, { gx:3, gy:2 }, { gx:3, gy:4 },
];

function makeTable(spot){
  return { gx:spot.gx, gy:spot.gy, active:false, order:null, patience:0, maxPatience:1,
    mood:0, servedFlash:0, catBlink:2+Math.random()*3 };
}

let tables, player, entities, particles, floaters, score, best, hearts, wave, waveTimer,
    spawnTimer, comboCount, comboTimer, shake, camShakeSeed, elapsed;

function resetGame(){
  tables = TABLE_SPOTS.map(makeTable);
  player = { x:3.5, y:3.5, vx:0, vy:0, carrying:null, bob:0, faceX:0, faceY:1, bumpCd:0 };
  particles = [];
  floaters = [];
  score = 0;
  hearts = 5;
  wave = 1;
  waveTimer = 0;
  spawnTimer = 0.6;
  comboCount = 0;
  comboTimer = 0;
  shake = 0;
  elapsed = 0;
  activeTableCount = 2;
}
best = Number(localStorage.getItem('catRestaurant3D_best') || 0);
let activeTableCount = 2;

/* ===================== 碰撞（障礙格子） ===================== */
function obstacleCells(){
  const list = [];
  for(const s of STATIONS) list.push({gx:s.gx, gy:s.gy});
  for(const t of tables) if(t.active) list.push({gx:t.gx, gy:t.gy});
  return list;
}
function moveWithCollision(ent, dx, dy, dt){
  const speed = 4.6, r = 0.34;
  let nx = ent.x + dx*speed*dt;
  const obs = obstacleCells();
  let blocked = false;
  for(const o of obs){
    if(nx > o.gx - r && nx < o.gx+1+r && ent.y > o.gy - r && ent.y < o.gy+1+r){ blocked = true; break; }
  }
  if(!blocked) ent.x = Math.max(-0.4, Math.min(COLS-0.6, nx));
  let ny = ent.y + dy*speed*dt;
  blocked = false;
  for(const o of obs){
    if(ent.x > o.gx - r && ent.x < o.gx+1+r && ny > o.gy - r && ny < o.gy+1+r){ blocked = true; break; }
  }
  if(!blocked) ent.y = Math.max(-0.4, Math.min(ROWS-0.6, ny));
}

/* ===================== 粒子與飄字 ===================== */
function burst(gx, gy, color, n=14, speed=90){
  const px = projX(gx,gy), py = projY(gx,gy);
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2, s = speed*(0.3+Math.random()*0.7);
    particles.push({ x:px, y:py-20, vx:Math.cos(a)*s, vy:Math.sin(a)*s*0.6-40, life:0.6, color });
  }
  if(particles.length>260) particles.splice(0, particles.length-260);
}
function updateParticles(dt){
  for(const p of particles){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=260*dt; p.life-=dt; }
  for(let i=particles.length-1;i>=0;i--) if(particles[i].life<=0) particles.splice(i,1);
}
function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha = Math.max(0, p.life*1.8);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-3, p.y-3, 6, 6);
  }
  ctx.globalAlpha = 1;
}
function floatText(gx, gy, text, color){
  floaters.push({ x:projX(gx,gy), y:projY(gx,gy)-40, text, color, life:0.8 });
}
function updateFloaters(dt){
  for(const f of floaters){ f.y -= 40*dt; f.life -= dt; }
  for(let i=floaters.length-1;i>=0;i--) if(floaters[i].life<=0) floaters.splice(i,1);
}
function drawFloaters(){
  ctx.textAlign = 'center'; ctx.font = 'bold 20px sans-serif';
  for(const f of floaters){
    ctx.globalAlpha = Math.max(0, f.life);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

/* ===================== 繪圖：地板與方塊 ===================== */
function diamondPath(gx,gy){
  ctx.beginPath();
  ctx.moveTo(projX(gx,gy), projY(gx,gy));
  ctx.lineTo(projX(gx+1,gy), projY(gx+1,gy));
  ctx.lineTo(projX(gx+1,gy+1), projY(gx+1,gy+1));
  ctx.lineTo(projX(gx,gy+1), projY(gx,gy+1));
  ctx.closePath();
}
function drawFloor(){
  for(let gy=0; gy<ROWS; gy++){
    for(let gx=0; gx<COLS; gx++){
      const light = (gx+gy)%2===0;
      diamondPath(gx,gy);
      ctx.fillStyle = light ? '#c98a52' : '#b9773f';
      ctx.fill();
      ctx.strokeStyle = 'rgba(60,30,10,.25)'; ctx.lineWidth = 1; ctx.stroke();
    }
  }
}
function drawBox(gx,gy,topColor,leftColor,rightColor,H){
  const p00x=projX(gx,gy), p00y=projY(gx,gy);
  const p10x=projX(gx+1,gy), p10y=projY(gx+1,gy);
  const p11x=projX(gx+1,gy+1), p11y=projY(gx+1,gy+1);
  const p01x=projX(gx,gy+1), p01y=projY(gx,gy+1);
  // 右面 (p10 -> p11)
  ctx.beginPath();
  ctx.moveTo(p10x,p10y); ctx.lineTo(p11x,p11y);
  ctx.lineTo(p11x,p11y-H); ctx.lineTo(p10x,p10y-H);
  ctx.closePath(); ctx.fillStyle = rightColor; ctx.fill();
  // 左面 (p01 -> p11)
  ctx.beginPath();
  ctx.moveTo(p01x,p01y); ctx.lineTo(p11x,p11y);
  ctx.lineTo(p11x,p11y-H); ctx.lineTo(p01x,p01y-H);
  ctx.closePath(); ctx.fillStyle = leftColor; ctx.fill();
  // 頂面
  ctx.beginPath();
  ctx.moveTo(p00x,p00y-H); ctx.lineTo(p10x,p10y-H);
  ctx.lineTo(p11x,p11y-H); ctx.lineTo(p01x,p01y-H);
  ctx.closePath(); ctx.fillStyle = topColor; ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.15)'; ctx.stroke();
}

/* ===================== 貓咪繪製 ===================== */
function drawCat(sx, sy, bodyColor, earColor, blink, holding, bob, scaleX){
  ctx.save();
  ctx.translate(sx, sy);
  // 陰影
  ctx.globalAlpha = 0.35;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(0, 2, 20, 8, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  const by = bob;
  // 身體
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(0, -18+by, 16*scaleX, 20, 0, 0, Math.PI*2);
  ctx.fill();
  // 腹部亮面
  ctx.fillStyle = 'rgba(255,255,255,.35)';
  ctx.beginPath(); ctx.ellipse(0,-12+by,9*scaleX,10,0,0,Math.PI*2); ctx.fill();
  // 尾巴
  ctx.strokeStyle = bodyColor; ctx.lineWidth = 6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(12*scaleX,-14+by); ctx.quadraticCurveTo(24*scaleX,-20+by,20*scaleX,-32+by); ctx.stroke();
  // 頭
  ctx.fillStyle = bodyColor;
  ctx.beginPath(); ctx.arc(0, -40+by, 15, 0, Math.PI*2); ctx.fill();
  // 耳朵
  ctx.fillStyle = earColor;
  ctx.beginPath(); ctx.moveTo(-13,-48+by); ctx.lineTo(-18,-60+by); ctx.lineTo(-5,-52+by); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(13,-48+by); ctx.lineTo(18,-60+by); ctx.lineTo(5,-52+by); ctx.closePath(); ctx.fill();
  ctx.fillStyle = bodyColor;
  ctx.beginPath(); ctx.moveTo(-12,-49+by); ctx.lineTo(-15,-57+by); ctx.lineTo(-7,-51+by); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(12,-49+by); ctx.lineTo(15,-57+by); ctx.lineTo(7,-51+by); ctx.closePath(); ctx.fill();
  // 眼睛
  if(blink < 0.08){
    ctx.strokeStyle = '#22160f'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-8,-40+by); ctx.lineTo(-3,-40+by); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(3,-40+by); ctx.lineTo(8,-40+by); ctx.stroke();
  } else {
    ctx.fillStyle = '#22160f';
    ctx.beginPath(); ctx.arc(-5,-40+by,2.6,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5,-40+by,2.6,0,Math.PI*2); ctx.fill();
  }
  // 鼻子
  ctx.fillStyle = '#e8768f';
  ctx.beginPath(); ctx.moveTo(-2,-34+by); ctx.lineTo(2,-34+by); ctx.lineTo(0,-32+by); ctx.closePath(); ctx.fill();
  // 鬍鬚
  ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-14,-35+by); ctx.lineTo(-24,-36+by); ctx.moveTo(-14,-32+by); ctx.lineTo(-24,-30+by); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(14,-35+by); ctx.lineTo(24,-36+by); ctx.moveTo(14,-32+by); ctx.lineTo(24,-30+by); ctx.stroke();
  ctx.restore();

  if(holding){
    const info = FOODS[holding];
    ctx.save();
    ctx.translate(sx, sy - 66 + by + Math.sin(performance.now()/220)*2);
    ctx.font = '22px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle = 'rgba(0,0,0,.25)'; ctx.beginPath(); ctx.ellipse(0,2,16,7,0,0,Math.PI*2); ctx.fill();
    ctx.fillText(info.emoji, 0, 0);
    ctx.restore();
  }
}

/* ===================== 桌上訂單 UI ===================== */
function drawOrder(t, sx, sy){
  if(!t.order) return;
  const info = FOODS[t.order];
  const pct = Math.max(0, t.patience / t.maxPatience);
  ctx.save();
  ctx.translate(sx, sy - 78);
  // 泡泡
  ctx.fillStyle = t.servedFlash>0 ? '#ffe98a' : '#fff';
  ctx.strokeStyle = '#3a2214'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect ? ctx.roundRect(-20,-20,40,30,8) : ctx.rect(-20,-20,40,30);
  ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-4,10); ctx.lineTo(4,10); ctx.lineTo(0,18); ctx.closePath();
  ctx.fillStyle = t.servedFlash>0 ? '#ffe98a' : '#fff'; ctx.fill(); ctx.stroke();
  ctx.font='20px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(info.emoji, 0, -5);
  // 耐心條
  ctx.fillStyle = 'rgba(0,0,0,.3)'; ctx.fillRect(-20,-30,40,5);
  const barColor = pct>0.5 ? '#7fd858' : pct>0.25 ? '#ffcf5c' : '#ff6b5c';
  ctx.fillStyle = barColor; ctx.fillRect(-20,-30, 40*pct, 5);
  ctx.restore();
}

/* ===================== 狀態機 ===================== */
let state;
function setState(s){ state = s; if(s.enter) s.enter(); }

const menuState = {
  enter(){ resetGame(); },
  update(dt){
    if(gameStartBuffer > 0 || stick.active){ gameStartBuffer = 0; setState(playState); }
  },
  draw(){
    drawSceneBg();
    ctx.save(); ctx.translate(0,0);
    drawFloor();
    for(const s of STATIONS) drawBox(s.gx,s.gy, FOODS[s.food].color, FOODS[s.food].dark, FOODS[s.food].dark, 40);
    ctx.restore();
    ctx.fillStyle = 'rgba(20,10,5,.55)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.textAlign='center';
    ctx.fillStyle = '#ffcf5c';
    ctx.font = 'bold 46px sans-serif';
    ctx.fillText('貓咪餐廳送餐大冒險', GAME_W/2, 190);
    ctx.font = '20px sans-serif'; ctx.fillStyle = '#fff5e6';
    ctx.fillText('電腦：方向鍵 / WASD 移動送餐（走到廚房拿餐、走到桌子送餐）', GAME_W/2, 250);
    ctx.fillText('平板：螢幕任意處拖曳虛擬搖桿移動', GAME_W/2, 278);
    ctx.font = 'bold 22px sans-serif'; ctx.fillStyle = '#8fffb0';
    ctx.fillText('按方向鍵或觸碰螢幕開始！', GAME_W/2, 340);
    ctx.font = '16px sans-serif'; ctx.fillStyle = '#ffd98e';
    ctx.fillText('最佳分數：' + best, GAME_W/2, 380);
  }
};

const playState = {
  enter(){
    resetGame();
    for(let i=0;i<activeTableCount;i++) activateTable(i);
  },
  update(dt){ updatePlay(dt); },
  draw(){ drawPlay(); }
};

const gameOverState = {
  enter(){ this.t = 0; sfxGameOver(); if(score>best){ best=score; localStorage.setItem('catRestaurant3D_best', String(best)); } },
  update(dt){
    this.t += dt;
    if(this.t > 0.6 && (gameStartBuffer > 0 || stick.active)){ gameStartBuffer = 0; setState(playState); }
  },
  draw(){
    drawPlay();
    ctx.fillStyle = 'rgba(20,5,5,.6)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.textAlign='center';
    ctx.fillStyle = '#ff8c7a'; ctx.font='bold 42px sans-serif';
    ctx.fillText('打烊了！再挑戰一次！', GAME_W/2, 230);
    ctx.fillStyle = '#fff'; ctx.font='24px sans-serif';
    ctx.fillText('本場分數：' + score, GAME_W/2, 280);
    ctx.fillStyle = '#ffcf5c';
    ctx.fillText('最佳分數：' + best, GAME_W/2, 315);
    ctx.font='18px sans-serif'; ctx.fillStyle='#8fffb0';
    ctx.fillText('按方向鍵 / 觸碰螢幕重新開始', GAME_W/2, 380);
  }
};

function activateTable(i){
  const t = tables[i];
  if(!t || t.active) return;
  t.active = true;
  newOrder(t);
}
function newOrder(t){
  const foods = Object.keys(FOODS);
  t.order = foods[Math.floor(Math.random()*foods.length)];
  t.maxPatience = Math.max(9, 18 - wave*0.5);
  t.patience = t.maxPatience;
}

function updatePlay(dt){
  elapsed += dt;
  waveTimer += dt;
  if(waveTimer > 22 && activeTableCount < tables.length){
    waveTimer = 0; wave++;
    activateTable(activeTableCount);
    activeTableCount++;
  }

  // 移動
  let dx = 0, dy = 0;
  if(input.up) dy -= 1;
  if(input.down) dy += 1;
  if(input.left) dx -= 1;
  if(input.right) dx += 1;
  if(stick.active){ dx += stick.dx; dy += stick.dy; }
  const len = Math.hypot(dx,dy);
  if(len > 0.01){ dx/=len; dy/=len; player.faceX = dx; player.faceY = dy; }
  moveWithCollision(player, dx, dy, dt);
  player.bob = Math.sin(performance.now()/140) * (len>0.05 ? 3 : 1);

  // 廚房互動：靠近沒拿餐時自動取餐
  if(player.bumpCd > 0) player.bumpCd -= dt;
  if(!player.carrying){
    for(const s of STATIONS){
      const ccx = s.gx+0.5, ccy = s.gy+0.5;
      const d = Math.hypot(player.x-ccx, player.y-ccy);
      if(d < 1.15 && player.bumpCd<=0){
        player.carrying = s.food;
        sfxPickup();
        burst(ccx, ccy, FOODS[s.food].color, 8, 70);
        player.bumpCd = 0.15;
        break;
      }
    }
  } else {
    for(const t of tables){
      if(!t.active || !t.order) continue;
      const ccx = t.gx+0.5, ccy = t.gy+0.5;
      const d = Math.hypot(player.x-ccx, player.y-ccy);
      if(d < 1.15 && player.bumpCd<=0){
        if(t.order === player.carrying){
          comboTimer = comboTimer>0 ? comboTimer : 0;
          comboCount = comboTimer>0 ? comboCount+1 : 1;
          comboTimer = 2.2;
          const gain = 10 + (comboCount-1)*5;
          score += gain;
          floatText(t.gx+0.5, t.gy, '+'+gain + (comboCount>1?(' x'+comboCount):''), '#8fffb0');
          burst(ccx, ccy, '#ffe98a', 18, 110);
          t.servedFlash = 0.5;
          sfxDeliver(comboCount);
          player.carrying = null;
          player.bumpCd = 0.2;
          setTimeout(()=>{ if(t.active) newOrder(t); }, 250);
        } else {
          sfxDeny();
          player.bumpCd = 0.15;
        }
        break;
      }
    }
  }

  if(comboTimer > 0){ comboTimer -= dt; if(comboTimer<=0) comboCount = 0; }

  // 桌子耐心倒數
  for(const t of tables){
    if(!t.active || !t.order) continue;
    t.patience -= dt;
    if(t.servedFlash>0) t.servedFlash -= dt;
    if(t.patience <= 0){
      hearts--;
      shake = 8;
      sfxExpire();
      floatText(t.gx+0.5, t.gy, '客人生氣了！', '#ff6b5c');
      newOrder(t);
      if(hearts <= 0){ setState(gameOverState); return; }
    }
    t.catBlink -= dt;
    if(t.catBlink < -0.1) t.catBlink = 2.5+Math.random()*3;
  }

  shake *= Math.pow(0.001, dt);
  updateParticles(dt);
  updateFloaters(dt);
}

function drawSceneBg(){
  const g = ctx.createLinearGradient(0,0,0,GAME_H);
  g.addColorStop(0,'#3a2412'); g.addColorStop(1,'#241408');
  ctx.fillStyle = g; ctx.fillRect(0,0,GAME_W,GAME_H);
}

function drawPlay(){
  ctx.save();
  const sx = (Math.random()*2-1)*shake, sy = (Math.random()*2-1)*shake;
  ctx.translate(sx, sy);

  drawSceneBg();
  drawFloor();

  // 收集所有需要深度排序的物件
  const drawables = [];
  for(const s of STATIONS){
    drawables.push({ depth:s.gx+s.gy-0.5, draw:()=>{
      drawBox(s.gx,s.gy, FOODS[s.food].color, FOODS[s.food].dark, FOODS[s.food].dark, 46);
      const cx = projX(s.gx+0.5,s.gy+0.5), cy = projY(s.gx+0.5,s.gy+0.5)-46;
      ctx.font='26px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(FOODS[s.food].emoji, cx, cy-10);
      drawCat(cx, cy+14, '#eae2d6', '#d8c9b3', 2, null, Math.sin(performance.now()/300+s.gx)*2, 0.9);
    }});
  }
  for(const t of tables){
    if(!t.active) continue;
    const cx = projX(t.gx+0.5, t.gy+0.5), cy = projY(t.gx+0.5, t.gy+0.5);
    drawables.push({ depth:t.gx+t.gy, draw:()=>{
      drawBox(t.gx,t.gy, '#caa06c', '#8a6640', '#8a6640', 22);
      const catColors = ['#f3b26b','#a98cff','#7fd8c4','#ff9fb3','#c9d97f','#8ec4ff'];
      const cc = catColors[(t.gx*3+t.gy)%catColors.length];
      drawCat(cx, cy-22, cc, cc, t.catBlink, null, Math.sin(performance.now()/260+t.gy)*1.5, 0.85);
      drawOrder(t, cx, cy-22);
    }});
  }
  drawables.push({ depth:player.x+player.y, draw:()=>{
    const px = projX(player.x, player.y), py = projY(player.x, player.y);
    drawCat(px, py, '#fff3d6', '#ffcf5c', 2, player.carrying, player.bob, 1);
  }});
  drawables.sort((a,b)=>a.depth-b.depth);
  for(const d of drawables) d.draw();

  drawParticles();
  drawFloaters();
  ctx.restore();

  // UI（不跟著震動）
  ctx.textAlign='left';
  ctx.font='bold 22px sans-serif'; ctx.fillStyle='#ffcf5c';
  ctx.fillText('分數：'+score, 20, 34);
  ctx.font='16px sans-serif'; ctx.fillStyle='#ffd98e';
  ctx.fillText('最佳：'+best, 20, 56);
  // 愛心
  for(let i=0;i<3;i++){
    ctx.font='24px sans-serif';
    ctx.fillStyle = i<hearts ? '#ff6b8f' : 'rgba(255,255,255,.2)';
    ctx.fillText('♥', GAME_W-110+i*32, 34);
  }
  if(comboCount>1){
    ctx.textAlign='center'; ctx.fillStyle='#8fffb0'; ctx.font='bold 20px sans-serif';
    ctx.fillText('連續出餐 x'+comboCount+'！', GAME_W/2, 36);
  }
  // 觸控搖桿視覺
  if(stick.active){
    ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(stick.cx, stick.cy, 60, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.35)';
    ctx.beginPath(); ctx.arc(stick.cx+stick.dx*60, stick.cy+stick.dy*60, 26, 0, Math.PI*2); ctx.fill();
  }
}

/* ===================== 主迴圈 ===================== */
const STEP = 1/60;
let last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while(acc >= STEP){
    if(gameStartBuffer>0) gameStartBuffer -= STEP;
    state.update(STEP);
    acc -= STEP;
  }
  state.draw();
}
setState(menuState);
requestAnimationFrame(frame);
</script>
