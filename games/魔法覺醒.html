<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="author" content="AI未來創作營隊">
<title>魔法覺醒</title>
<style>
  :root{
    --cyan:#38e1ff; --blue:#4f7cff; --purple:#9a6bff; --pink:#ff6cc7;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:#070b14;
    font-family:"PingFang TC","Microsoft JhengHei",sans-serif;
    touch-action:none; user-select:none;
  }
  #wrap{position:fixed; inset:0; display:flex; align-items:center; justify-content:center;}
  canvas{display:block; background:#070b14;}
  .ui-layer{
    position:fixed; inset:0; pointer-events:none;
    display:flex; align-items:center; justify-content:center;
    z-index:5;
  }
  .panel{
    pointer-events:auto;
    background:rgba(10,14,26,0.86);
    border:1px solid rgba(56,225,255,0.35);
    border-radius:20px;
    padding:28px 30px;
    max-width:min(92vw,480px);
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  .title-grad{
    font-size:clamp(28px,7vw,42px);
    font-weight:900;
    background:linear-gradient(92deg,var(--cyan),var(--blue),var(--purple));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    margin:0 0 6px;
    letter-spacing:2px;
  }
  .subtitle{ color:#9db3d8; font-size:14px; margin:0 0 18px; line-height:1.6;}
  .row{display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin:14px 0;}
  .choice-btn{
    pointer-events:auto;
    width:150px; min-height:132px;
    border-radius:18px;
    border:2px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.04);
    color:#fff; font-size:14px; font-weight:700;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    cursor:pointer; transition:transform .15s, border-color .15s, background .15s;
  }
  .choice-btn:hover, .choice-btn:active{ transform:translateY(-4px) scale(1.03); border-color:var(--cyan); background:rgba(56,225,255,0.1);}
  .choice-btn svg{width:48px; height:48px;}
  .choice-btn .cname{ font-size:15px; font-weight:900; }
  .choice-btn .cmagic{ font-size:12px; font-weight:700; opacity:0.85; }
  .btn{
    pointer-events:auto;
    display:inline-block; margin-top:10px;
    padding:14px 30px; border-radius:14px; border:none;
    background:linear-gradient(92deg,var(--cyan),var(--blue));
    color:#04121c; font-weight:900; font-size:17px;
    cursor:pointer; box-shadow:0 8px 24px rgba(56,225,255,0.35);
    min-height:48px;
  }
  .btn:active{ transform:scale(0.96); }
  .btn.secondary{ background:rgba(255,255,255,0.08); color:#dfe9ff; box-shadow:none; border:1px solid rgba(255,255,255,0.2);}
  .hint{ font-size:12px; color:#7488a8; margin-top:14px; line-height:1.7;}
  .gacha-orb{
    width:150px; height:150px; margin:0 auto 18px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:60px;
    position:relative;
  }
  .gacha-orb.spin{ animation:spin 0.6s linear infinite; }
  @keyframes spin{ from{transform:rotate(0deg) scale(1);} 50%{transform:rotate(180deg) scale(1.15);} to{transform:rotate(360deg) scale(1);} }
  .magic-name{ font-size:26px; font-weight:900; margin:6px 0 2px; }
  .magic-rarity{ font-size:13px; font-weight:700; letter-spacing:3px; margin-bottom:10px; }
  .hidden{ display:none !important; }
  #hud{
    position:fixed; top:0; left:0; right:0; padding:10px 14px;
    display:flex; justify-content:space-between; align-items:flex-start;
    pointer-events:none; z-index:4; font-weight:800; color:#fff;
    font-size:14px;
  }
  #hpbar{
    width:130px; height:14px; border-radius:8px; background:rgba(255,255,255,0.15);
    overflow:hidden; border:1px solid rgba(255,255,255,0.25);
  }
  #hpfill{ height:100%; width:100%; background:linear-gradient(90deg,#ff6cc7,#ff3b6b); transition:width .15s;}
  #hudLeft{ display:flex; flex-direction:column; gap:6px;}
  #hudRight{ text-align:right; display:flex; flex-direction:column; gap:4px;}
  #muteBtn{
    pointer-events:auto; cursor:pointer; background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.25); color:#fff; border-radius:10px;
    width:38px; height:38px; font-size:18px; display:flex; align-items:center; justify-content:center;
    margin-left:auto;
  }
  #joyzone{
    position:fixed; top:0; bottom:0;
    z-index:3; pointer-events:auto;
  }
  #joyBase{
    position:fixed; width:100px; height:100px; border-radius:50%;
    background:rgba(255,255,255,0.08); border:2px solid rgba(255,255,255,0.25);
    display:none; z-index:6; pointer-events:none;
  }
  #joyStick{
    position:fixed; width:46px; height:46px; border-radius:50%;
    background:rgba(56,225,255,0.55); border:2px solid #38e1ff;
    display:none; z-index:7; pointer-events:none;
  }
  .touch-hint{ display:none; }
  @media (pointer:coarse){ .touch-hint{ display:inline; } }
  .kb-hint{ display:inline; }
  @media (pointer:coarse){ .kb-hint{ display:none; } }

  #skillBar{
    position:fixed; left:50%; bottom:14px; transform:translateX(-50%);
    z-index:4; pointer-events:none;
    display:flex; flex-direction:row; align-items:flex-end; gap:10px;
  }
  .skillSlot{
    display:flex; flex-direction:column; align-items:center; gap:3px;
  }
  .skillIconWrap{
    width:54px; height:54px; border-radius:14px;
    background:rgba(10,14,26,0.75); border:2px solid rgba(255,255,255,0.25);
    position:relative; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    font-size:24px; box-shadow:0 6px 18px rgba(0,0,0,0.4);
    transition:transform .11s ease-out;
  }
  .skillIconWrap.ready{ border-color:#ffcf5c; box-shadow:0 0 16px rgba(255,207,92,0.6); }
  .skillCooldownMask{
    position:absolute; inset:0; background:rgba(0,0,0,0.62);
  }
  .skillLabel{ font-size:10px; color:#dfe9ff; font-weight:700; text-align:center; max-width:64px; }
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>

<div id="hud" class="hidden">
  <div id="hudLeft">
    <div id="hpbar"><div id="hpfill"></div></div>
    <div id="magicLabel" style="font-size:12px;"></div>
  </div>
  <div id="hudRight">
    <div id="muteBtn">🔊</div>
    <div id="scoreLabel">分數 0</div>
    <div id="waveLabel">第 1 波</div>
  </div>
</div>

<div id="skillBar" class="hidden"></div>

<div id="joyBase"></div><div id="joyStick"></div>

<div class="ui-layer" id="screenTitle">
  <div class="panel" style="max-width:min(94vw,620px);">
    <div class="title-grad">魔法覺醒</div>
    <p class="subtitle">選擇一位角色，每位角色都有專屬魔法技能！</p>
    <div class="row" id="charRow"></div>
    <div class="hint">
      <span class="kb-hint">電腦：WASD／方向鍵移動，魔法自動鎖定最近敵人施放</span>
      <span class="touch-hint">平板：拖曳畫面移動，魔法自動鎖定最近敵人施放</span>
    </div>
  </div>
</div>

<div class="ui-layer hidden" id="screenGacha">
  <div class="panel">
    <div class="title-grad" style="font-size:26px;">你的魔法技能</div>
    <div class="gacha-orb" id="gachaOrb">🔮</div>
    <div class="magic-name" id="gachaName">準備抽取…</div>
    <div class="magic-rarity" id="gachaRarity"></div>
    <p class="subtitle" id="gachaDesc"></p>
    <button class="btn" id="startBtn">開始冒險</button>
    <button class="btn secondary" id="backBtn">重新選角</button>
  </div>
</div>

<div class="ui-layer hidden" id="screenOver">
  <div class="panel">
    <div class="title-grad" style="font-size:30px;">冒險結束</div>
    <p class="subtitle" id="overStats"></p>
    <button class="btn" id="retryBtn">重新挑戰</button>
    <button class="btn secondary" id="regachaBtn">重新選角</button>
  </div>
</div>

<script>
(function(){
"use strict";

/* ---------- Canvas / DPR ---------- */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2.5);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.floor(W*DPR); canvas.height = Math.floor(H*DPR);
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize);
resize();

/* ---------- Audio ---------- */
let actx=null, muted=false;
function ensureAudio(){
  if(!actx){
    try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
    if(actx) startMusic();
  } else if(actx.state==='suspended'){
    actx.resume();
  }
}
function beep(freq, dur, type, vol, sweep){
  if(muted || !actx) return;
  const t0 = actx.currentTime;
  const osc = actx.createOscillator();
  const gain = actx.createGain();
  osc.type = type||'sine';
  osc.frequency.setValueAtTime(freq, t0);
  if(sweep) osc.frequency.exponentialRampToValueAtTime(Math.max(20,sweep), t0+dur);
  gain.gain.setValueAtTime(0.0001, t0);
  gain.gain.exponentialRampToValueAtTime(vol||0.2, t0+0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  osc.connect(gain); gain.connect(actx.destination);
  osc.start(t0); osc.stop(t0+dur+0.02);
}
const sfx = {
  cast:()=>beep(520,0.16,'triangle',0.22,880),
  hit:()=>beep(160,0.12,'square',0.2,60),
  hurt:()=>beep(140,0.22,'sawtooth',0.25,60),
  score:()=>beep(700,0.1,'sine',0.18,1100),
  gacha:()=>beep(300,0.5,'sine',0.15,1200),
  legendary:()=>{ beep(440,0.3,'sine',0.2,880); setTimeout(()=>beep(660,0.3,'sine',0.2,1200),120); },
  gameover:()=>{ beep(300,0.4,'sawtooth',0.2,80); setTimeout(()=>beep(200,0.5,'sawtooth',0.2,60),180); },
  wave:()=>beep(500,0.25,'triangle',0.2,900),
  heal:()=>{ beep(500,0.15,'sine',0.18,700); setTimeout(()=>beep(700,0.18,'sine',0.16,900),90); },
  shield:()=>beep(380,0.3,'sine',0.2,600),
  burst:()=>{ beep(200,0.28,'sawtooth',0.24,50); setTimeout(()=>beep(120,0.3,'square',0.2,40),80); },
  divine:()=>{
    beep(392,0.3,'sine',0.22,600); setTimeout(()=>beep(523.25,0.3,'sine',0.22,780),150);
    setTimeout(()=>beep(659.25,0.35,'sine',0.24,900),300); setTimeout(()=>beep(783.99,0.5,'sine',0.26,1050),450);
  },
};
document.getElementById('muteBtn').addEventListener('click', ()=>{
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted?'🔇':'🔊';
});

/* ---------- Background music: synthesized looping chiptune ---------- */
const MUSIC_STEP_MS = 220;
const BASS_PATTERN = [110,0,110,0,146.83,0,130.81,110,  98,0,98,0,146.83,0,110,0];
const LEAD_PATTERN  = [0,440,0,523.25,0,440,0,392,  0,349.23,0,440,0,392,0,330];
let musicTimer=null, musicStep=0, musicGain=null;

function startMusic(){
  if(musicTimer || !actx) return;
  musicGain = actx.createGain();
  musicGain.gain.value = 0.0001;
  musicGain.connect(actx.destination);
  musicGain.gain.exponentialRampToValueAtTime(0.16, actx.currentTime+1.5);
  musicStep = 0;
  musicTimer = setInterval(musicTick, MUSIC_STEP_MS);
}

function musicTick(){
  if(muted || !actx || !musicGain) return;
  const t0 = actx.currentTime;
  const bassFreq = BASS_PATTERN[musicStep % BASS_PATTERN.length];
  const leadFreq = LEAD_PATTERN[musicStep % LEAD_PATTERN.length];
  if(bassFreq){
    const o=actx.createOscillator(), g=actx.createGain();
    o.type='triangle'; o.frequency.value=bassFreq;
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(0.55,t0+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+MUSIC_STEP_MS/1000*1.7);
    o.connect(g); g.connect(musicGain);
    o.start(t0); o.stop(t0+MUSIC_STEP_MS/1000*1.8);
  }
  if(leadFreq){
    const o=actx.createOscillator(), g=actx.createGain();
    o.type='square'; o.frequency.value=leadFreq;
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(0.22,t0+0.015);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+MUSIC_STEP_MS/1000*0.85);
    o.connect(g); g.connect(musicGain);
    o.start(t0); o.stop(t0+MUSIC_STEP_MS/1000*0.9);
  }
  musicStep++;
}

/* ---------- Magic definitions ---------- */
const MAGICS = [
  {key:'fire', name:'烈焰魔法', icon:'🔥', color:'#ff7e3d', rarity:'普通', rarityColor:'#9db3d8', desc:'火球灼燒範圍傷害',
    dmg:18, speed:9, radius:9, cooldown:420, projectiles:1, spread:0},
  {key:'ice', name:'寒冰魔法', icon:'❄️', color:'#38e1ff', rarity:'普通', rarityColor:'#9db3d8', desc:'冰錐減速敵人',
    dmg:14, speed:10, radius:8, cooldown:360, projectiles:1, spread:0, slow:true},
  {key:'thunder', name:'雷霆魔法', icon:'⚡', color:'#ffe066', rarity:'稀有', rarityColor:'#38e1ff', desc:'連鎖閃電擊穿敵群',
    dmg:12, speed:14, radius:6, cooldown:260, projectiles:1, spread:0, pierce:true},
  {key:'wind', name:'疾風魔法', icon:'🌪️', color:'#7fffb0', rarity:'稀有', rarityColor:'#38e1ff', desc:'三重風刃扇形齊發',
    dmg:9, speed:11, radius:7, cooldown:380, projectiles:3, spread:0.32},
  {key:'light', name:'聖光魔法', icon:'✨', color:'#ffd9f6', rarity:'傳說', rarityColor:'#ffcf5c', desc:'追蹤光彈自動鎖敵',
    dmg:16, speed:8, radius:9, cooldown:340, projectiles:1, spread:0, homing:true},
  {key:'dark', name:'暗影魔法', icon:'🌑', color:'#9a6bff', rarity:'傳說', rarityColor:'#ffcf5c', desc:'爆裂暗球大範圍傷害',
    dmg:26, speed:7, radius:13, cooldown:520, projectiles:1, spread:0, aoe:true},
];
const RARITY_WEIGHT = {'普通':50,'稀有':32,'傳說':18};
function magicByKey(k){ return MAGICS.find(m=>m.key===k); }

/* ---------- Six selectable characters, each with a fixed magic skill ---------- */
const CHARACTERS = [
  {id:'yan',  name:'小炎', gender:'girl', magicKey:'fire',    outfit:'#ff7e3d', hair:'#8a2b1a'},
  {id:'lan',  name:'小凍', gender:'boy',  magicKey:'ice',     outfit:'#38e1ff', hair:'#1c3a52'},
  {id:'lei',  name:'小雷', gender:'girl', magicKey:'thunder', outfit:'#ffe066', hair:'#7a5c00'},
  {id:'feng', name:'小風', gender:'boy',  magicKey:'wind',    outfit:'#7fffb0', hair:'#245c3a'},
  {id:'guang',name:'小光', gender:'girl', magicKey:'light',   outfit:'#ffd9f6', hair:'#c9a8e0'},
  {id:'ying', name:'小影', gender:'boy',  magicKey:'dark',    outfit:'#9a6bff', hair:'#181022'},
];

/* ---------- Each character has a 4-skill kit: element attack + heal + shield + ultimate ---------- */
function buildSkillKit(magic){
  return [
    {id:'attack', icon:magic.icon, name:magic.name, color:magic.color, cooldown:magic.cooldown, run:castElementAttack},
    {id:'heal',   icon:'💚', name:'治癒術', color:'#7fffb0', cooldown:8000, run:castHeal},
    {id:'shield', icon:'🛡️', name:'護盾術', color:'#38e1ff', cooldown:11000, run:castShield},
    {id:'burst',  icon:'💥', name:'究極爆發', color:'#ffcf5c', cooldown:15000, run:castBurst},
  ];
}

/* ---------- Stages ---------- */
const STAGES = [
  {name:'新手森林', top:'#1b3a2a', bottom:'#0a1810', accent:'#7fffb0', deco:'forest', bossName:'森林領主', bossColor:'#5d8a4a', bossIcon:'🌳'},
  {name:'熔岩地窟', top:'#3a1410', bottom:'#160705', accent:'#ff7e3d', deco:'lava',   bossName:'熔岩魔像', bossColor:'#ff5b3d', bossIcon:'🌋'},
  {name:'極寒冰原', top:'#0d2438', bottom:'#04101c', accent:'#38e1ff', deco:'ice',    bossName:'冰霜巨人', bossColor:'#8fe3ff', bossIcon:'❄️'},
  {name:'虛空深淵', top:'#1c1030', bottom:'#08040f', accent:'#9a6bff', deco:'void',   bossName:'虛空領主', bossColor:'#c58bff', bossIcon:'🌌'},
];
const WAVES_PER_STAGE = 4; // 最後一波為 boss 波

/* ---------- Global state ---------- */
let gender = 'girl';
let chosenMagic = null;
let chosenKit = [];
let chosenChar = CHARACTERS[0];
let state = 'title'; // title, gacha, playing, over
let best = parseInt(localStorage.getItem('mojue_best')||'0',10);

/* ---------- Screens ---------- */
const screenTitle = document.getElementById('screenTitle');
const screenGacha = document.getElementById('screenGacha');
const screenOver = document.getElementById('screenOver');
const hud = document.getElementById('hud');

/* ---------- Build character select cards ---------- */
const charRow = document.getElementById('charRow');
CHARACTERS.forEach(ch=>{
  const m = magicByKey(ch.magicKey);
  const btn = document.createElement('div');
  btn.className = 'choice-btn';
  btn.dataset.charId = ch.id;
  btn.innerHTML = `
    <svg viewBox="0 0 64 64">
      <circle cx="32" cy="24" r="14" fill="#ffd9b3"/>
      ${ch.gender==='girl'
        ? `<path d="M18 22 Q32 4 46 22 Q46 34 32 36 Q18 34 18 22Z" fill="${ch.hair}"/><path d="M14 26 Q10 44 20 54" stroke="${ch.hair}" stroke-width="6" fill="none" stroke-linecap="round"/><path d="M50 26 Q54 44 44 54" stroke="${ch.hair}" stroke-width="6" fill="none" stroke-linecap="round"/>`
        : `<path d="M18 18 Q32 6 46 18 L46 24 Q32 16 18 24Z" fill="${ch.hair}"/>`}
      <rect x="22" y="36" width="20" height="22" rx="6" fill="${ch.outfit}"/>
    </svg>
    <div class="cname">${ch.name}</div>
    <div class="cmagic" style="color:${m.color}">${m.icon} ${m.name}</div>
  `;
  btn.addEventListener('click', ()=>{
    ensureAudio();
    chosenChar = ch;
    gender = ch.gender;
    chosenMagic = m;
    screenTitle.classList.add('hidden');
    screenGacha.classList.remove('hidden');
    const orb = document.getElementById('gachaOrb');
    orb.textContent = m.icon;
    orb.style.background = `radial-gradient(circle, ${m.color}55, #0a0e1a)`;
    orb.style.boxShadow = `0 0 40px ${m.color}88`;
    document.getElementById('gachaName').textContent = ch.name + '・' + m.name;
    const rEl = document.getElementById('gachaRarity');
    rEl.textContent = '★ ' + m.rarity + ' ★';
    rEl.style.color = m.rarityColor;
    document.getElementById('gachaDesc').textContent = m.desc;
    if(m.rarity==='傳說') sfx.legendary(); else sfx.score();
  });
  charRow.appendChild(btn);
});

document.getElementById('backBtn').addEventListener('click', ()=>{
  screenGacha.classList.add('hidden');
  screenTitle.classList.remove('hidden');
});

document.getElementById('startBtn').addEventListener('click', ()=>{
  screenGacha.classList.add('hidden');
  startGame();
});
document.getElementById('retryBtn').addEventListener('click', ()=>{
  screenOver.classList.add('hidden');
  startGame();
});
document.getElementById('regachaBtn').addEventListener('click', ()=>{
  screenOver.classList.add('hidden');
  screenTitle.classList.remove('hidden');
});

/* ---------- Input ---------- */
const keys = {};
window.addEventListener('keydown', e=>{ keys[e.key.toLowerCase()]=true; });
window.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()]=false; });

canvas.addEventListener('mousedown', ()=>{ ensureAudio(); });

// touch joystick (movement, full-screen zone)
let joyActive=false, joyId=null, joyOrigin={x:0,y:0}, joyVec={x:0,y:0};
const joyBase = document.getElementById('joyBase');
const joyStick = document.getElementById('joyStick');

function makeTouchZones(){
  document.querySelectorAll('#joyzone').forEach(z=>z.remove());
  const jz = document.createElement('div'); jz.id='joyzone';
  jz.style.left='0'; jz.style.width='100%'; jz.style.height='100%';
  document.body.appendChild(jz);

  jz.addEventListener('touchstart', e=>{
    e.preventDefault(); ensureAudio();
    const t = e.changedTouches[0];
    joyActive=true; joyId=t.identifier;
    joyOrigin={x:t.clientX,y:t.clientY};
    joyBase.style.display='block'; joyStick.style.display='block';
    joyBase.style.left=(t.clientX-50)+'px'; joyBase.style.top=(t.clientY-50)+'px';
    joyStick.style.left=(t.clientX-23)+'px'; joyStick.style.top=(t.clientY-23)+'px';
  }, {passive:false});
  jz.addEventListener('touchmove', e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      if(t.identifier!==joyId) continue;
      let dx=t.clientX-joyOrigin.x, dy=t.clientY-joyOrigin.y;
      const d = Math.hypot(dx,dy), max=50;
      if(d>max){ dx=dx/d*max; dy=dy/d*max; }
      joyVec.x = dx/max; joyVec.y = dy/max;
      joyStick.style.left=(joyOrigin.x+dx-23)+'px'; joyStick.style.top=(joyOrigin.y+dy-23)+'px';
    }
  }, {passive:false});
  function endJoy(e){
    for(const t of e.changedTouches){
      if(t.identifier!==joyId) continue;
      joyActive=false; joyVec={x:0,y:0};
      joyBase.style.display='none'; joyStick.style.display='none';
    }
  }
  jz.addEventListener('touchend', endJoy, {passive:false});
  jz.addEventListener('touchcancel', endJoy, {passive:false});
}
makeTouchZones();

/* ---------- Game entities ---------- */
let player, enemies, bullets, particles, wave, score, spawnTimer, waveTimer, shakeT, shakeMag, hitstop;
let divineFlashT = 0;
let stageIndex, bossWave, bossSpawned, bannerText, bannerSub, bannerT, decos;

function stagePos(w){ return (w-1) % WAVES_PER_STAGE; }
function stageOf(w){ return Math.floor((w-1)/WAVES_PER_STAGE) % STAGES.length; }

function showBanner(text, sub){
  bannerText = text; bannerSub = sub||''; bannerT = 2200;
}

function buildDecos(){
  decos = [];
  const deco = STAGES[stageIndex].deco;
  const n = 22;
  for(let i=0;i<n;i++){
    decos.push({
      x:Math.random()*W, y:Math.random()*H, s:0.6+Math.random()*1.6,
      drift:(Math.random()-0.5)*0.15, phase:Math.random()*Math.PI*2, kind:deco
    });
  }
}

const skillBar = document.getElementById('skillBar');
let skills = []; // [{def, timer, iconEl, maskEl, wrapEl}]

function buildSkillBarUI(){
  skillBar.innerHTML = '';
  skills = chosenKit.map(def=>{
    const slot = document.createElement('div');
    slot.className = 'skillSlot';
    const wrap = document.createElement('div');
    wrap.className = 'skillIconWrap';
    wrap.style.filter = `drop-shadow(0 0 4px ${def.color})`;
    const iconEl = document.createElement('span');
    iconEl.textContent = def.icon;
    const maskEl = document.createElement('div');
    maskEl.className = 'skillCooldownMask';
    wrap.appendChild(iconEl); wrap.appendChild(maskEl);
    const label = document.createElement('div');
    label.className = 'skillLabel';
    label.textContent = def.name;
    slot.appendChild(wrap); slot.appendChild(label);
    skillBar.appendChild(slot);
    return {def, timer:0, wrapEl:wrap, maskEl};
  });
}

function updateSkillUI(){
  for(const s of skills){
    const pct = Math.max(0, Math.min(1, s.timer / s.def.cooldown));
    s.maskEl.style.height = (pct*100)+'%';
    s.wrapEl.classList.toggle('ready', pct<=0);
  }
}

function pulseSkill(id){
  const s = skills.find(sk=>sk.def.id===id);
  if(!s) return;
  s.wrapEl.style.transform = 'scale(1.15)';
  setTimeout(()=>{ s.wrapEl.style.transform = 'scale(1)'; }, 110);
}

function startGame(){
  hud.classList.remove('hidden');
  skillBar.classList.remove('hidden');
  document.getElementById('magicLabel').textContent = chosenMagic.icon+' '+chosenMagic.name;
  chosenKit = buildSkillKit(chosenMagic);
  buildSkillBarUI();
  player = {
    x:W/2, y:H/2, r:16, hp:100, maxHp:100, invuln:0,
    color: chosenChar.outfit,
    facing:{x:0,y:1}, walkPhase:0, blinkT:120+Math.random()*160,
    divineReady:true, divineBuffT:0
  };
  enemies=[]; bullets=[]; particles=[];
  wave=1; score=0; spawnTimer=0; waveTimer=0; shakeT=0; shakeMag=0; hitstop=0;
  stageIndex=0; bossWave=false; bossSpawned=false;
  divineFlashT=0;
  buildDecos();
  showBanner('第 1 關：'+STAGES[0].name, '存活下去，擊敗魔王過關！');
  updateHud();
  state='playing';
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

function updateHud(){
  document.getElementById('hpfill').style.width = Math.max(0,player.hp/player.maxHp*100)+'%';
  document.getElementById('scoreLabel').textContent = '分數 '+score;
  document.getElementById('waveLabel').textContent = '第 '+(stageIndex+1)+'關 · 第 '+wave+' 波'+(bossWave?'（魔王）':'');
}

function enterWave(){
  stageIndex = stageOf(wave);
  bossWave = stagePos(wave) === WAVES_PER_STAGE-1;
  bossSpawned = false;
  waveTimer = 0;
  if(stagePos(wave)===0){
    buildDecos();
    showBanner('第 '+(stageIndex+1)+' 關：'+STAGES[stageIndex].name, '存活下去，擊敗魔王過關！');
  } else if(bossWave){
    showBanner('魔王出現！', STAGES[stageIndex].bossName);
  }
  sfx.wave();
  updateHud();
}

function spawnEnemy(){
  const edge = Math.floor(Math.random()*4);
  let x,y;
  if(edge===0){ x=-30; y=Math.random()*H; }
  else if(edge===1){ x=W+30; y=Math.random()*H; }
  else if(edge===2){ x=Math.random()*W; y=-30; }
  else { x=Math.random()*W; y=H+30; }
  const hp = 20 + wave*6;
  const speed = 1.1 + Math.min(wave*0.08, 2.2);
  enemies.push({x,y,r:14+Math.random()*4,hp,maxHp:hp,speed,slowT:0,hitT:0,type: Math.random()<0.15+wave*0.01 ? 'tank':'normal'});
}

function spawnBoss(){
  const edge = Math.floor(Math.random()*4);
  let x,y;
  if(edge===0){ x=-40; y=Math.random()*H; }
  else if(edge===1){ x=W+40; y=Math.random()*H; }
  else if(edge===2){ x=Math.random()*W; y=-40; }
  else { x=Math.random()*W; y=H+40; }
  const hp = 260 + stageIndex*180 + wave*20;
  enemies.push({
    x,y,r:34,hp,maxHp:hp,speed:0.85+stageIndex*0.1,slowT:0,hitT:0,
    type:'boss', color:STAGES[stageIndex].bossColor, icon:STAGES[stageIndex].bossIcon
  });
}

function triggerDivine(){
  player.divineReady = false;
  player.divineBuffT = 15000;
  player.hp = Math.min(player.maxHp, player.hp + player.maxHp*0.4);
  player.invuln = Math.max(player.invuln, 2200);
  divineFlashT = 900;
  for(const en of enemies){ en.hp -= 30 + wave*3; en.hitT = 10; }
  spawnParticles(player.x, player.y, '#ffd9a0', 40);
  triggerShake(16);
  sfx.divine();
  showBanner('天神降臨！', '獲得神聖庇護，攻擊力大幅提升！');
  updateHud();
}

function killEnemyAt(j){
  const en = enemies[j];
  if(!en) return;
  if(en.type==='boss'){
    score += 200;
    sfx.legendary();
    spawnParticles(en.x,en.y,en.color,32);
    triggerShake(14);
    enemies.splice(j,1);
    const clearedStage = stageIndex;
    wave++;
    enterWave();
    showBanner('第 '+(clearedStage+1)+' 關過關！', '前往下一關…');
  } else {
    score += en.type==='tank' ? 30:15;
    sfx.score();
    spawnParticles(en.x,en.y,en.type==='tank'?'#ffcf5c':'#38e1ff',10);
    enemies.splice(j,1);
  }
  updateHud();
}

function dmgMult(){ return player.divineBuffT>0 ? 1.6 : 1; }

function fireMagic(dir){
  const m = chosenMagic;
  const n = m.projectiles;
  for(let i=0;i<n;i++){
    let ang = Math.atan2(dir.y,dir.x);
    if(n>1){ ang += (i-(n-1)/2) * m.spread; }
    bullets.push({
      x:player.x, y:player.y,
      vx:Math.cos(ang)*m.speed, vy:Math.sin(ang)*m.speed,
      r:m.radius, dmg:m.dmg*dmgMult(), color:m.color,
      slow:m.slow, pierce:m.pierce, homing:m.homing, aoe:m.aoe,
      life:90
    });
  }
  sfx.cast();
  spawnParticles(player.x,player.y,m.color,6);
}

/* ---------- 4-skill kit effects ---------- */
function castElementAttack(){
  if(!enemies.length) return false;
  let nearest=null, nd=Infinity;
  for(const en of enemies){
    const d = Math.hypot(en.x-player.x, en.y-player.y);
    if(d<nd){ nd=d; nearest=en; }
  }
  const dx=nearest.x-player.x, dy=nearest.y-player.y, d=Math.hypot(dx,dy)||1;
  const aim = {x:dx/d, y:dy/d};
  fireMagic(aim);
  player.facing = aim;
}

function castHeal(){
  if(player.hp >= player.maxHp) return false;
  player.hp = Math.min(player.maxHp, player.hp + player.maxHp*0.22);
  sfx.heal();
  spawnParticles(player.x, player.y, '#7fffb0', 14);
  updateHud();
}

function castShield(){
  player.invuln = Math.max(player.invuln, 1600);
  sfx.shield();
  spawnParticles(player.x, player.y, '#38e1ff', 16);
}

function castBurst(){
  if(!enemies.length) return false;
  const dmg = (34 + wave*3) * dmgMult();
  for(const en of enemies){
    en.hp -= dmg; en.hitT = 8;
  }
  spawnParticles(player.x, player.y, '#ffcf5c', 30);
  triggerShake(10);
  sfx.burst();
}

function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2, sp = 1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:24+Math.random()*10,color,r:2+Math.random()*2});
  }
}

function triggerShake(mag){ shakeMag=Math.max(shakeMag,mag); shakeT=10; }

/* ---------- Loop ---------- */
let lastTime=0, acc=0;
const STEP = 1000/60;

function loop(t){
  if(state!=='playing') return;
  let dt = t-lastTime; lastTime=t;
  if(dt>250) dt=250;
  if(hitstop>0){ hitstop-=dt; requestAnimationFrame(loop); render(); return; }
  acc += dt;
  while(acc>=STEP){ update(STEP); acc-=STEP; }
  render();
  requestAnimationFrame(loop);
}

function update(dt){
  const dts = dt/16.67;

  // movement
  let mx=0,my=0;
  if(keys['a']||keys['arrowleft']) mx-=1;
  if(keys['d']||keys['arrowright']) mx+=1;
  if(keys['w']||keys['arrowup']) my-=1;
  if(keys['s']||keys['arrowdown']) my+=1;
  if(joyActive){ mx += joyVec.x; my += joyVec.y; }
  const mlen = Math.hypot(mx,my);
  if(mlen>0.1){
    mx/=mlen; my/=mlen;
    player.x += mx*4.2*dts; player.y += my*4.2*dts;
    player.facing = {x:mx,y:my};
    player.walkPhase += dts*0.35;
  }
  player.x = Math.max(player.r, Math.min(W-player.r, player.x));
  player.y = Math.max(player.r, Math.min(H-player.r, player.y));
  player.blinkT -= dts;
  if(player.blinkT<0) player.blinkT = 140+Math.random()*180;

  // casting: 4 skills each auto-trigger on their own cooldown
  for(const s of skills){
    s.timer -= dt;
    if(s.timer<=0){
      const fired = s.def.run() !== false;
      s.timer = fired ? s.def.cooldown : 120;
      if(fired) pulseSkill(s.def.id);
    }
  }
  updateSkillUI();

  // spawn
  if(bossWave){
    if(!bossSpawned){ spawnBoss(); bossSpawned=true; }
  } else {
    spawnTimer -= dt;
    const spawnRate = Math.max(1500 - wave*80, 450);
    if(spawnTimer<=0){
      spawnEnemy();
      spawnTimer = spawnRate;
    }
    waveTimer += dt;
    if(waveTimer > 15000){
      wave++;
      enterWave();
    }
  }
  if(bannerT>0) bannerT -= dt;

  // bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b = bullets[i];
    if(b.homing){
      let target=null, bd=Infinity;
      for(const en of enemies){
        const d = Math.hypot(en.x-b.x,en.y-b.y);
        if(d<bd){ bd=d; target=en; }
      }
      if(target){
        const dx=target.x-b.x, dy=target.y-b.y, d=Math.hypot(dx,dy)||1;
        b.vx += (dx/d)*0.6; b.vy += (dy/d)*0.6;
        const sp = Math.hypot(b.vx,b.vy);
        if(sp>0){ b.vx = b.vx/sp*chosenMagic.speed; b.vy=b.vy/sp*chosenMagic.speed; }
      }
    }
    b.x += b.vx*dts; b.y += b.vy*dts;
    b.life -= dts;
    if(b.life<=0 || b.x<-40||b.x>W+40||b.y<-40||b.y>H+40){
      bullets.splice(i,1); continue;
    }
    for(let j=enemies.length-1;j>=0;j--){
      const en = enemies[j];
      if(Math.hypot(en.x-b.x,en.y-b.y) < en.r+b.r){
        en.hp -= b.dmg; en.hitT=6;
        if(b.slow) en.slowT = 90;
        spawnParticles(b.x,b.y,b.color,4);
        sfx.hit();
        if(b.aoe){
          for(const en2 of enemies){
            if(en2!==en && Math.hypot(en2.x-b.x,en2.y-b.y) < 60){
              en2.hp -= b.dmg*0.6; en2.hitT=6;
            }
          }
          triggerShake(4);
        }
        if(en.hp<=0) killEnemyAt(j);
        if(!b.pierce){ bullets.splice(i,1); }
        break;
      }
    }
  }

  // sweep any enemies felled by non-bullet damage (e.g. burst skill)
  for(let i=enemies.length-1;i>=0;i--){
    if(enemies[i].hp<=0) killEnemyAt(i);
  }

  // enemies
  for(let i=enemies.length-1;i>=0;i--){
    const en = enemies[i];
    if(en.slowT>0) en.slowT-=dts;
    if(en.hitT>0) en.hitT-=dts;
    const spd = en.slowT>0 ? en.speed*0.4 : en.speed;
    const dx=player.x-en.x, dy=player.y-en.y, d=Math.hypot(dx,dy)||1;
    en.x += dx/d*spd*dts; en.y += dy/d*spd*dts;
    if(d < en.r+player.r && player.invuln<=0){
      player.hp -= en.type==='tank'?18:10;
      player.invuln = 700;
      sfx.hurt();
      triggerShake(8);
      spawnParticles(player.x,player.y,'#ff3b6b',8);
      updateHud();
      if(player.hp<=0){ gameOver(); return; }
      if(player.divineReady && player.hp <= player.maxHp*0.5){ triggerDivine(); }
    }
  }
  if(!player.divineReady && player.hp > player.maxHp*0.5){ player.divineReady = true; }
  if(player.invuln>0) player.invuln -= dt;
  if(player.divineBuffT>0) player.divineBuffT -= dt;
  if(divineFlashT>0) divineFlashT -= dt;

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.x += p.vx*dts; p.y += p.vy*dts;
    p.vx*=0.92; p.vy*=0.92;
    p.life -= dts;
    if(p.life<=0) particles.splice(i,1);
  }

  if(shakeT>0){ shakeT-=dts; if(shakeT<=0) shakeMag=0; }
}

function gameOver(){
  state='over';
  sfx.gameover();
  hud.classList.add('hidden');
  skillBar.classList.add('hidden');
  if(score>best){ best=score; localStorage.setItem('mojue_best', String(best)); }
  document.getElementById('overStats').innerHTML =
    `${chosenMagic.icon} ${chosenMagic.name}　最終分數 <b style="color:#38e1ff">${score}</b>　撐過 ${wave} 波<br>歷史最高 ${best}`;
  document.getElementById('screenOver').classList.remove('hidden');
}

/* ---------- Background decoration shapes ---------- */
function drawDeco(d, t){
  const x = d.x, y = ((d.y + t*d.drift*20) % (H+80) + (H+80)) % (H+80) - 40;
  const wob = Math.sin(t*0.001 + d.phase)*4;
  ctx.save();
  ctx.translate(x+wob, y);
  ctx.globalAlpha = 0.5;
  if(d.kind==='forest'){
    ctx.fillStyle = '#2f5c3a';
    ctx.beginPath(); ctx.moveTo(0,-14*d.s); ctx.lineTo(10*d.s,8*d.s); ctx.lineTo(-10*d.s,8*d.s); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#4a3324'; ctx.fillRect(-2*d.s,8*d.s,4*d.s,6*d.s);
  } else if(d.kind==='lava'){
    ctx.fillStyle = 'rgba(255,126,61,0.55)';
    ctx.beginPath(); ctx.arc(0,0,6*d.s,0,7); ctx.fill();
  } else if(d.kind==='ice'){
    ctx.strokeStyle = 'rgba(180,230,255,0.6)'; ctx.lineWidth=2;
    ctx.beginPath();
    for(let i=0;i<6;i++){ const a=i/6*Math.PI*2; ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*9*d.s, Math.sin(a)*9*d.s); }
    ctx.stroke();
  } else {
    ctx.fillStyle = 'rgba(197,139,255,0.55)';
    ctx.beginPath(); ctx.arc(0,0,2.2*d.s,0,7); ctx.fill();
  }
  ctx.restore();
}

/* ---------- Render ---------- */
function render(){
  ctx.clearRect(0,0,W,H);
  const stg = STAGES[stageIndex] || STAGES[0];
  const t = performance.now();
  // stage background gradient
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, stg.top); grad.addColorStop(1, stg.bottom);
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
  const vign = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);
  vign.addColorStop(0,'rgba(0,0,0,0)'); vign.addColorStop(1,'rgba(0,0,0,0.45)');
  ctx.fillStyle=vign; ctx.fillRect(0,0,W,H);

  ctx.save();
  if(shakeT>0){
    ctx.translate((Math.random()-0.5)*shakeMag, (Math.random()-0.5)*shakeMag);
  }

  // decorations
  if(decos) for(const d of decos) drawDeco(d, t);

  // grid dots
  ctx.fillStyle='rgba(255,255,255,0.035)';
  const gap=40;
  for(let x=0;x<W;x+=gap) for(let y=0;y<H;y+=gap) ctx.fillRect(x,y,2,2);

  // particles
  for(const p of particles){
    ctx.globalAlpha = Math.max(0,p.life/30);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill();
  }
  ctx.globalAlpha=1;

  // bullets
  for(const b of bullets){
    ctx.fillStyle=b.color;
    ctx.shadowColor=b.color; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,7); ctx.fill();
    ctx.shadowBlur=0;
  }

  // enemies
  for(const en of enemies){
    ctx.save();
    ctx.translate(en.x,en.y);
    if(en.type==='boss'){
      const bodyColor = en.hitT>0 ? '#ffffff' : en.color;
      ctx.shadowColor = en.color; ctx.shadowBlur = 22;
      ctx.fillStyle = bodyColor;
      ctx.beginPath(); ctx.arc(0,0,en.r,0,7); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle='rgba(0,0,0,0.3)';
      ctx.beginPath(); ctx.arc(en.r*0.28,en.r*0.28,en.r*0.7,0,7); ctx.fill();
      ctx.font = (en.r*1.4)+'px sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(en.icon||'👹', 0, 1);
      ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(0,0,en.r+5,0,7); ctx.stroke();
    } else {
      const bodyColor = en.hitT>0 ? '#ffffff' : (en.type==='tank' ? '#9a6bff':'#ff3b6b');
      ctx.fillStyle = bodyColor;
      ctx.beginPath(); ctx.arc(0,0,en.r,0,7); ctx.fill();
      ctx.fillStyle='rgba(0,0,0,0.35)';
      ctx.beginPath(); ctx.arc(en.r*0.3,en.r*0.3,en.r*0.6,0,7); ctx.fill();
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(-en.r*0.3,-en.r*0.1,2.4,0,7); ctx.arc(en.r*0.3,-en.r*0.1,2.4,0,7); ctx.fill();
    }
    ctx.restore();
    // hp bar
    const w = en.r*2;
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(en.x-w/2, en.y-en.r-12, w, 5);
    ctx.fillStyle= en.type==='boss' ? '#ffcf5c' : '#38e1ff';
    ctx.fillRect(en.x-w/2, en.y-en.r-12, w*Math.max(0,en.hp/en.maxHp), 5);
  }

  // divine buff aura
  if(player.divineBuffT>0){
    const pulse = 0.7 + Math.sin(t*0.008)*0.3;
    ctx.save();
    ctx.globalAlpha = 0.35 * Math.min(1, player.divineBuffT/1200);
    const auraR = player.r*2.6 + pulse*6;
    const aura = ctx.createRadialGradient(player.x,player.y,player.r*0.5,player.x,player.y,auraR);
    aura.addColorStop(0,'rgba(255,230,160,0.6)'); aura.addColorStop(1,'rgba(255,230,160,0)');
    ctx.fillStyle=aura;
    ctx.beginPath(); ctx.arc(player.x,player.y,auraR,0,7); ctx.fill();
    ctx.restore();
  }

  // player
  drawPlayer();

  ctx.restore();

  // stage banner
  if(bannerT>0){
    const a = bannerT>1800 ? (2200-bannerT)/400 : (bannerT<400 ? bannerT/400 : 1);
    ctx.save();
    ctx.globalAlpha = Math.max(0,Math.min(1,a));
    ctx.textAlign='center';
    ctx.fillStyle='rgba(5,8,16,0.55)';
    ctx.fillRect(0, H*0.32, W, 84);
    ctx.fillStyle='#fff';
    ctx.font='900 '+Math.min(34,W*0.06)+'px "PingFang TC","Microsoft JhengHei",sans-serif';
    ctx.fillText(bannerText, W/2, H*0.32+36);
    ctx.font='700 '+Math.min(16,W*0.032)+'px "PingFang TC","Microsoft JhengHei",sans-serif';
    ctx.fillStyle='#9db3d8';
    ctx.fillText(bannerSub, W/2, H*0.32+62);
    ctx.restore();
  }

  // divine descent full-screen flash
  if(divineFlashT>0){
    ctx.save();
    ctx.globalAlpha = Math.max(0, divineFlashT/900) * 0.65;
    const flash = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.75);
    flash.addColorStop(0,'rgba(255,244,214,0.9)'); flash.addColorStop(1,'rgba(255,244,214,0)');
    ctx.fillStyle=flash;
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }
}

function drawPlayer(){
  ctx.save();
  ctx.translate(player.x,player.y);
  if(player.invuln>0 && Math.floor(player.invuln/80)%2===0) ctx.globalAlpha=0.4;
  const r = player.r;
  const bob = Math.sin(player.walkPhase*6)*2;
  const swing = Math.sin(player.walkPhase*6)*0.5;
  const facingRight = (player.facing.x||0) >= 0;
  const hairColor = chosenChar.hair;
  const outfitColor = player.color;

  // shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0, r*0.9, r*0.8, r*0.28, 0, 0, 7); ctx.fill();

  ctx.save();
  ctx.translate(0, bob*0.4);

  // cape
  ctx.fillStyle = outfitColor+'aa';
  ctx.beginPath();
  ctx.moveTo(-r*0.5,-r*0.2);
  ctx.quadraticCurveTo(-r*1.3, r*0.6 + swing*4, -r*0.3, r*1.1);
  ctx.quadraticCurveTo(0, r*0.7, 0, -r*0.2);
  ctx.closePath(); ctx.fill();

  // legs
  ctx.strokeStyle = gender==='girl' ? '#4a2f8c' : '#1d2740';
  ctx.lineWidth = r*0.34; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(-r*0.25, r*0.55); ctx.lineTo(-r*0.25+swing*5, r*1.15);
  ctx.moveTo(r*0.25, r*0.55); ctx.lineTo(r*0.25-swing*5, r*1.15);
  ctx.stroke();

  // torso
  ctx.fillStyle = outfitColor;
  ctx.beginPath();
  ctx.moveTo(-r*0.55, r*0.15);
  ctx.quadraticCurveTo(0, r*0.55, r*0.55, r*0.15);
  ctx.lineTo(r*0.45, -r*0.35);
  ctx.quadraticCurveTo(0, -r*0.55, -r*0.45, -r*0.35);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.beginPath(); ctx.ellipse(-r*0.12,-r*0.05,r*0.22,r*0.32,0.3,0,7); ctx.fill();

  // arms
  ctx.strokeStyle = outfitColor;
  ctx.lineWidth = r*0.26; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(-r*0.5,-r*0.15); ctx.lineTo(-r*0.85-swing*3, r*0.15);
  ctx.moveTo(r*0.5,-r*0.15); ctx.lineTo(r*0.85+swing*3, r*0.15);
  ctx.stroke();
  ctx.fillStyle='#ffd9b3';
  ctx.beginPath(); ctx.arc(-r*0.85-swing*3, r*0.15, r*0.14,0,7); ctx.arc(r*0.85+swing*3, r*0.15, r*0.14,0,7); ctx.fill();

  // neck + head
  ctx.fillStyle='#ffd9b3';
  ctx.beginPath(); ctx.arc(0,-r*0.85,r*0.62,0,7); ctx.fill();

  // hair back
  if(gender==='girl'){
    ctx.fillStyle=hairColor;
    ctx.beginPath();
    ctx.moveTo(-r*0.55,-r*1.0);
    ctx.quadraticCurveTo(-r*0.9,-r*0.3,-r*0.6+swing*3,r*0.05);
    ctx.lineTo(-r*0.3,-r*0.15);
    ctx.quadraticCurveTo(-r*0.5,-r*0.7,-r*0.25,-r*1.15);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(r*0.55,-r*1.0);
    ctx.quadraticCurveTo(r*0.9,-r*0.3,r*0.6-swing*3,r*0.05);
    ctx.lineTo(r*0.3,-r*0.15);
    ctx.quadraticCurveTo(r*0.5,-r*0.7,r*0.25,-r*1.15);
    ctx.closePath(); ctx.fill();
  }

  // hair top
  ctx.fillStyle=hairColor;
  ctx.beginPath();
  ctx.arc(0,-r*1.02, r*0.64, Math.PI, 0);
  ctx.quadraticCurveTo(r*0.5,-r*1.5, 0,-r*1.55);
  ctx.quadraticCurveTo(-r*0.5,-r*1.5, -r*0.62,-r*1.02);
  ctx.closePath(); ctx.fill();
  if(gender==='boy'){
    ctx.fillStyle=hairColor;
    ctx.beginPath(); ctx.moveTo(-r*0.5,-r*0.95); ctx.lineTo(r*0.5,-r*0.95); ctx.lineTo(r*0.4,-r*1.15); ctx.lineTo(-r*0.4,-r*1.15); ctx.closePath(); ctx.fill();
  }

  // face
  const blink = player.blinkT < 8;
  ctx.fillStyle='#2b2b3a';
  const eyeDx = facingRight ? r*0.12 : -r*0.12;
  if(!blink){
    ctx.beginPath();
    ctx.arc(-r*0.2+eyeDx*0.3,-r*0.85,r*0.08,0,7);
    ctx.arc(r*0.2+eyeDx*0.3,-r*0.85,r*0.08,0,7);
    ctx.fill();
  } else {
    ctx.strokeStyle='#2b2b3a'; ctx.lineWidth=r*0.05; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(-r*0.28,-r*0.85); ctx.lineTo(-r*0.12,-r*0.85);
    ctx.moveTo(r*0.12,-r*0.85); ctx.lineTo(r*0.28,-r*0.85);
    ctx.stroke();
  }
  ctx.strokeStyle='#c96b52'; ctx.lineWidth=r*0.05; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(0,-r*0.68,r*0.14,0.15*Math.PI,0.85*Math.PI); ctx.stroke();
  ctx.fillStyle='#ff9db3'; ctx.globalAlpha *= 0.6;
  ctx.beginPath(); ctx.arc(-r*0.34,-r*0.72,r*0.09,0,7); ctx.arc(r*0.34,-r*0.72,r*0.09,0,7); ctx.fill();
  ctx.globalAlpha = 1;

  ctx.restore();

  // magic aim indicator
  const fa = Math.atan2(player.facing.y||1, player.facing.x||0);
  ctx.strokeStyle=chosenMagic.color; ctx.lineWidth=3;
  ctx.globalAlpha=0.85;
  ctx.beginPath();
  ctx.moveTo(Math.cos(fa)*(r+2), Math.sin(fa)*(r+2));
  ctx.lineTo(Math.cos(fa)*(r+16), Math.sin(fa)*(r+16));
  ctx.stroke();

  ctx.restore();
  ctx.globalAlpha=1;
}

/* ---------- Boot ---------- */
window.addEventListener('touchmove', e=>{ if(state==='playing') e.preventDefault(); }, {passive:false});
})();
</script>
