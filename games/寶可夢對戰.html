<!-- v5：觸控返回鍵、誤觸提示回饋、直向提示、難度平滑化、低血量脈動、表情系統 -->

<body>
<canvas id="game"></canvas>
<button id="muteBtn" aria-label="靜音切換">

</button>

<script>
'use strict';
/* ============================================================
   寶可夢對戰：路卡利歐大亂鬥 — 專業AI升級 v5
   五大道館聯賽＋屬性相剋＋防禦行動＋專屬大絕演出＋星星評分
   v5 新增：觸控返回鍵（與鍵盤ESC對等）／非回合誤觸「請稍候」回饋
   ／手機直向遊玩提示／道館難度曲線平滑化／低血量脈動警示
   ============================================================ */
/* v5補強：大螢幕提醒浮層——只在手機觸發，一個 session 只跳一次，不攔截遊戲初始化 */
(function(){
  let seen=false;
  try{ seen=!!sessionStorage.getItem('bigscreen-hint'); }catch(e){}
  const isPhone = Math.min(screen.width,screen.height)<600 || innerWidth<768;
  if(!isPhone||seen) return;
  const el=document.getElementById('bigscreenHint');
  if(!el) return;
  el.classList.add('show');
  const btn=document.getElementById('bshOk');
  if(btn) btn.addEventListener('click',()=>{
    try{ sessionStorage.setItem('bigscreen-hint','1'); }catch(e){}
    el.classList.add('hide');
    setTimeout(()=>{ el.remove(); },260);
  });
})();

const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize(){
  const scale = Math.min(innerWidth/GAME_W, innerHeight/GAME_H);
  const dpr = Math.min(devicePixelRatio||1, 2);
  canvas.width = GAME_W*scale*dpr; canvas.height = GAME_H*scale*dpr;
  canvas.style.width = GAME_W*scale+'px'; canvas.style.height = GAME_H*scale+'px';
  ctx.setTransform(scale*dpr,0,0,scale*dpr,0,0);
  canvas._scale = scale;
}
addEventListener('resize', resize); resize();
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

/* ===== 音效：壓縮器母線＋隨機音高 ===== */
let AC=null, master=null, muted=false, revSend=null, ambGain=null;
const ambNodes=[];
function audio(){
  if(!AC){
    AC = new (window.AudioContext||window.webkitAudioContext)();
    const comp = AC.createDynamicsCompressor();
    comp.threshold.value=-16; comp.knee.value=24; comp.ratio.value=8;
    master = AC.createGain(); master.gain.value=muted?0:0.9;
    master.connect(comp).connect(AC.destination);
    // v6：程序化殘響（generated impulse 體育館空間感）
    const conv=AC.createConvolver();
    const n=Math.floor(AC.sampleRate*1.5), buf=AC.createBuffer(2,n,AC.sampleRate);
    for(let ch=0;ch<2;ch++){ const d=buf.getChannelData(ch);
      for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,2.5); }
    conv.buffer=buf;
    revSend=AC.createGain(); revSend.gain.value=0.22;
    revSend.connect(conv); conv.connect(master);
    // v6：觀眾低語氛圍層（主音效觸發 ducking）
    ambGain=AC.createGain(); ambGain.gain.value=1; ambGain.connect(master);
    const n2=AC.sampleRate*2, buf2=AC.createBuffer(1,n2,AC.sampleRate), d2=buf2.getChannelData(0);
    for(let i=0;i<n2;i++) d2[i]=Math.random()*2-1;
    const src=AC.createBufferSource(); src.buffer=buf2; src.loop=true;
    const filt=AC.createBiquadFilter(); filt.type='bandpass'; filt.frequency.value=520; filt.Q.value=0.4;
    const g=AC.createGain(); g.gain.value=0.02;
    const lfo=AC.createOscillator(), lg=AC.createGain();
    lfo.frequency.value=0.17; lg.gain.value=0.008;
    lfo.connect(lg); lg.connect(g.gain);
    src.connect(filt); filt.connect(g); g.connect(ambGain);
    src.start(); lfo.start(); ambNodes.push(src,lfo,g);
  }
  if(AC.state==='suspended') AC.resume();
  return AC;
}
function duckAmb(){
  if(!AC||!ambGain) return;
  const t=AC.currentTime, g=ambGain.gain;
  g.cancelScheduledValues(t); g.setValueAtTime(Math.min(g.value,1),t);
  g.linearRampToValueAtTime(0.15,t+0.05); g.linearRampToValueAtTime(1,t+1);
}
function cheer(big){                    // v6：觀眾歡呼聲浪（絕佳/絕招/勝利）
  if(muted||!AC) return;
  const n=Math.floor(AC.sampleRate*1.2), buf=AC.createBuffer(1,n,AC.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=Math.random()*2-1;
  const s=AC.createBufferSource(); s.buffer=buf; s.loop=true;
  const f=AC.createBiquadFilter(); f.type='bandpass'; f.frequency.value=big?950:820; f.Q.value=0.5;
  const g=AC.createGain();
  const t=AC.currentTime, peak=big?0.12:0.06, dur=big?1.3:0.7;
  g.gain.setValueAtTime(0.001,t);
  g.gain.exponentialRampToValueAtTime(peak,t+0.16);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  s.connect(f); f.connect(g); g.connect(master);
  s.start(); s.stop(t+dur+0.05);
}
addEventListener('pointerdown', audio, {once:true});
addEventListener('keydown', audio, {once:true});
function beep(freq=440,dur=0.1,type='square',vol=0.15,slide=0){
  if(muted||!AC) return;
  const ac=audio(); freq*=0.95+Math.random()*0.1;
  const o=ac.createOscillator(), g=ac.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,ac.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30,freq+slide),ac.currentTime+dur);
  g.gain.setValueAtTime(vol,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
  o.connect(g); g.connect(master); if(revSend) g.connect(revSend);
  o.start(); o.stop(ac.currentTime+dur);
}
function noiseS(dur=0.15,vol=0.12){
  if(muted||!AC) return;
  const ac=audio(), n=Math.floor(ac.sampleRate*dur);
  const buf=ac.createBuffer(1,n,ac.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
  const s=ac.createBufferSource(); s.buffer=buf;
  const g=ac.createGain(); g.gain.value=vol;
  s.connect(g); g.connect(master); if(revSend) g.connect(revSend);
  s.start();
}
const sfxHit=()=>{ beep(160,0.09,'square',0.18,-80); noiseS(0.08,0.1); };
const sfxSpecial=()=>{ duckAmb(); beep(660,0.08,'square',0.16,300); setTimeout(()=>beep(880,0.12,'square',0.16,200),70); noiseS(0.14,0.1); };
const sfxCharge=()=>beep(220,0.3,'sine',0.1,420);
const sfxHeal=()=>{ beep(988,0.09,'sine',0.15); setTimeout(()=>beep(1319,0.15,'sine',0.15),90); };
const sfxGuard=()=>beep(420,0.14,'triangle',0.13,80);
const sfxSelect=()=>beep(500,0.05,'square',0.1);
const sfxDeny=()=>beep(150,0.12,'sawtooth',0.11,-50);
const sfxWin=()=>{ duckAmb(); cheer(true); [523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>beep(f,0.16,'square',0.15),i*110)); };
const sfxLose=()=>{ duckAmb(); beep(300,0.4,'sawtooth',0.16,-220); };
const sfxStar=()=>{ beep(1320,0.12,'triangle',0.14); setTimeout(()=>beep(1760,0.2,'triangle',0.14),90); };
const sfxSuper=()=>{ beep(880,0.1,'square',0.14,300); setTimeout(()=>beep(1175,0.16,'square',0.14),80); };
const sfxWait=()=>beep(280,0.055,'sine',0.07);   // v5：非回合誤觸的輕量「請稍候」提示音（不像sfxDeny那樣刺耳，避免玩家誤以為做錯事）
document.getElementById('muteBtn').addEventListener('click',()=>{
  muted=!muted;
  if(master) master.gain.value=muted?0:0.9;   // v6：靜音同步關掉觀眾氛圍層與殘響尾音
  document.getElementById('icoOn').style.display=muted?'none':'block';
  document.getElementById('icoOff').style.display=muted?'block':'none';
});
/* v5：觸控返回鍵——與鍵盤 ESC 對等，讓平板/手機玩家不需鍵盤也能返回上一頁 */
document.getElementById('backBtn').addEventListener('click',()=>{ sfxSelect(); goBack(); });
/* v5：手機直向遊玩提示（不強制、可關閉），避免小螢幕直向時按鈕縮得過小 */
let rotateDismissed=false;
function checkOrientation(){
  const hint=document.getElementById('rotateHint');
  if(!hint) return;
  const portrait=!rotateDismissed && innerHeight>innerWidth && innerWidth<700;
  hint.classList.toggle('show',portrait);
}
addEventListener('resize',checkOrientation);
addEventListener('orientationchange',checkOrientation);
document.getElementById('rotateOk').addEventListener('click',()=>{
  rotateDismissed=true; checkOrientation(); sfxSelect();
});
checkOrientation();

/* ===== 輸入 ===== */
const input = { down:false, x:0, y:0, justDown:false };
canvas.addEventListener('pointerdown', e=>{
  const r=canvas.getBoundingClientRect();
  input.x=(e.clientX-r.left)/canvas._scale; input.y=(e.clientY-r.top)/canvas._scale;
  input.justDown=true; input.down=true;
  e.preventDefault();
},{passive:false});
canvas.addEventListener('pointerup', e=>{ input.down=false; e.preventDefault(); },{passive:false});
let mouseX=0, mouseY=0;
canvas.addEventListener('pointermove', e=>{
  const r=canvas.getBoundingClientRect();
  mouseX=(e.clientX-r.left)/canvas._scale; mouseY=(e.clientY-r.top)/canvas._scale;
});
canvas.addEventListener('contextmenu', e=>e.preventDefault());
let keyDigit=0;
addEventListener('keydown', e=>{
  if(e.code==='Digit1'||e.code==='Numpad1') keyDigit=1;
  else if(e.code==='Digit2'||e.code==='Numpad2') keyDigit=2;
  else if(e.code==='Digit3'||e.code==='Numpad3') keyDigit=3;
  else if(e.code==='Digit4'||e.code==='Numpad4') keyDigit=4;
  else if(e.code==='Space'||e.code==='Enter') keyDigit=-1;
  else if(e.code==='Escape'){ goBack(); return; }
  if(['Digit1','Digit2','Digit3','Digit4','Space','Enter'].includes(e.code)) e.preventDefault();
});

/* ===== 粒子 / 飄字（swap-pop） ===== */
const parts=[];
function burst(x,y,color,n=14,speed=240,up=0){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=speed*(0.3+Math.random()*0.7);
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-up,life:0.5,max:0.5,color});
  }
}
function updateParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=500*dt; p.life-=dt;
    if(p.life<=0){ parts[i]=parts[parts.length-1]; parts.pop(); }
  }
}
function drawParts(){
  for(const p of parts){
    ctx.globalAlpha=Math.max(0,p.life*2);
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-3,p.y-3,6,6);
  }
  ctx.globalAlpha=1;
}
const floaters=[];
function addFloat(x,y,text,color,big){ floaters.push({x,y,text,color,life:0.95,big}); }
function updateFloats(dt){
  for(let i=floaters.length-1;i>=0;i--){
    const f=floaters[i]; f.y-=42*dt; f.life-=dt;
    if(f.life<=0){ floaters[i]=floaters[floaters.length-1]; floaters.pop(); }
  }
}
function drawFloats(){
  ctx.textAlign='center';
  for(const f of floaters){
    ctx.globalAlpha=Math.max(0,Math.min(1,f.life*1.5));
    ctx.font=(f.big?'bold 30px':'bold 24px')+' sans-serif';
    ctx.strokeStyle='rgba(0,0,0,.6)'; ctx.lineWidth=4; ctx.lineJoin='round';
    ctx.strokeText(f.text,f.x,f.y);
    ctx.fillStyle=f.color; ctx.fillText(f.text,f.x,f.y);
  }
  ctx.globalAlpha=1;
}
let shake=0, freeze=0, whiteFlash=0;

/* ===== 屬性相剋環：波導 ➤ 鋼 ➤ 大地 ➤ 神聖 ➤ 波導 ===== */
const TYPES = {
  '波導':{ color:'#4f9be0', beats:'鋼' },
  '鋼':{ color:'#9a9aa4', beats:'大地' },
  '大地':{ color:'#c07a2e', beats:'神聖' },
  '神聖':{ color:'#d9b23c', beats:'波導' },
};
function typeMul(atkType, defType){
  if(TYPES[atkType].beats===defType) return 1.5;
  if(TYPES[defType].beats===atkType) return 0.7;
  return 1;
}

/* ===== 角色資料 ===== */
const PALETTE = { pink:'#ff2975', cyan:'#00f0ff', yellow:'#fff700', white:'#f6f6f6', ink:'#26324a' };
function drawTextOutline(text,x,y,fillColor,strokeColor,strokeW){
  ctx.lineWidth=strokeW||4; ctx.strokeStyle=strokeColor||'rgba(38,50,74,0.55)';
  ctx.lineJoin='round'; ctx.strokeText(text,x,y);
  ctx.fillStyle=fillColor; ctx.fillText(text,x,y);
}
const FIGHTERS = [
  { id:'lucario', name:'超級路卡利歐', type:'波導', maxHp:120, atk:22,
    special:'波導彈', specialDesc:'蓄力波導氣彈！' },
  { id:'meltan', name:'密勒頓', type:'鋼', maxHp:95, atk:19,
    special:'液態金屬衝', specialDesc:'融化身體高速衝撞！' },
  { id:'gureton', name:'固勒頓', type:'大地', maxHp:110, atk:20,
    special:'大地重擊', specialDesc:'跳起重壓引發震波！' },
  { id:'arceus', name:'阿爾宙斯', type:'神聖', maxHp:130, atk:20,
    special:'裁決之光', specialDesc:'降下千律之光！' },
];

/* ===== 角色繪製（原作可愛比例強化版） ===== */
function eyeSet(cx,cy,r,look,iris){
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(cx,cy,r,r*1.1,0,0,7); ctx.fill();
  ctx.fillStyle=iris||'#111';
  ctx.beginPath(); ctx.arc(cx+look*r*0.28,cy+r*0.05,r*0.62,0,7); ctx.fill();
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(cx+look*r*0.34,cy+r*0.1,r*0.3,0,7); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(cx+look*r*0.1-r*0.18,cy-r*0.35,r*0.22,0,7); ctx.fill();
}
/* v5補強：表情系統——calm(平常)/hurt(受擊)/happy(勝利)三態，眼睛與嘴巴同步切換，取代單一無表情畫法 */
function faceEyes(cx,cy,r,look,iris,expr){
  if(expr==='happy'){
    ctx.strokeStyle=iris||'#111'; ctx.lineWidth=r*0.32; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(cx,cy+r*0.35,r*0.72,Math.PI*1.12,Math.PI*1.88); ctx.stroke();
    return;
  }
  eyeSet(cx,cy,r,look,iris);
  if(expr==='hurt'){
    ctx.strokeStyle='rgba(20,20,30,.55)'; ctx.lineWidth=r*0.24; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(cx-r*0.65,cy-r*1.05); ctx.lineTo(cx+r*0.55,cy-r*0.6); ctx.stroke();
  }
}

let skyCv=null;
function bakeSky(gym){
  skyCv=document.createElement('canvas'); skyCv.width=GAME_W; skyCv.height=GAME_H;
  const c=skyCv.getContext('2d');
  const g=c.createLinearGradient(0,0,0,GAME_H);
  g.addColorStop(0,gym.sky[0]); g.addColorStop(0.55,gym.sky[1]); g.addColorStop(1,gym.sky[2]);
  c.fillStyle=g; c.fillRect(0,0,GAME_W,GAME_H);
  const sg=c.createRadialGradient(GAME_W*0.82,90,10,GAME_W*0.82,90,180);
  sg.addColorStop(0,'rgba(255,246,214,0.9)'); sg.addColorStop(1,'rgba(255,246,214,0)');
  c.fillStyle=sg; c.fillRect(GAME_W*0.82-180,-90,360,360);
  c.fillStyle=gym.sun; c.beginPath(); c.arc(GAME_W*0.82,90,34,0,7); c.fill();
  // 遠山
  c.fillStyle='rgba(60,80,110,.28)';
  for(let i=0;i<5;i++){
    const bx=i*240-60;
    c.beginPath(); c.moveTo(bx,400); c.lineTo(bx+130,300-(i%2)*40); c.lineTo(bx+280,400); c.closePath(); c.fill();
  }
  // 雲
  c.fillStyle='rgba(255,255,255,0.5)';
  [[90,70,46],[150,90,34],[520,50,40],[580,72,28],[300,130,26],[750,150,36]].forEach(([cx,cy,r])=>{
    c.beginPath(); c.ellipse(cx,cy,r,r*0.6,0,0,7); c.fill();
  });
  // v6：烘焙陽光斜射光束＋地平線霞光
  for(const [ang,len,wdt,al] of [[2.5,600,54,0.07],[2.75,520,34,0.055],[2.3,480,28,0.05]]){
    c.save();
    c.translate(GAME_W*0.82,90); c.rotate(ang);
    const bg2=c.createLinearGradient(0,0,len,0);
    bg2.addColorStop(0,'rgba(255,248,220,'+al+')'); bg2.addColorStop(1,'rgba(255,248,220,0)');
    c.fillStyle=bg2;
    c.beginPath(); c.moveTo(38,-wdt*0.28); c.lineTo(len,-wdt); c.lineTo(len,wdt); c.lineTo(38,wdt*0.28);
    c.closePath(); c.fill();
    c.restore();
  }
  const hz=c.createLinearGradient(0,GAME_H-160,0,GAME_H);
  hz.addColorStop(0,'rgba(255,255,255,0)'); hz.addColorStop(1,'rgba(255,255,255,.18)');
  c.fillStyle=hz; c.fillRect(0,GAME_H-160,GAME_W,160);
  moteColor=gym.sun;                       // v6：環境光塵跟著道館主題換色
}

const spotCache=new Map();
function spotOf(color){
  let cv=spotCache.get(color);
  if(!cv){
    cv=document.createElement('canvas'); cv.width=cv.height=48;
    const c=cv.getContext('2d');
    const g=c.createRadialGradient(24,24,0,24,24,24);
    g.addColorStop(0,color); g.addColorStop(1,'rgba(0,0,0,0)');
    c.globalAlpha=0.85; c.fillStyle=g; c.fillRect(0,0,48,48);
    spotCache.set(color,cv);
  }
  return cv;
}
const motes=[];
for(let i=0;i<20;i++) motes.push({x:Math.random()*GAME_W,y:Math.random()*GAME_H,z:0.4+Math.random()*0.6,ph:Math.random()*9});
function drawMotes(dt){
  ctx.globalCompositeOperation='lighter';
  const spr=spotOf(moteColor);
  for(const m of motes){
    m.ph+=dt;
    m.y-=(7+13*m.z)*dt; m.x+=Math.sin(m.ph*1.3)*11*dt;
    if(m.y<-8){ m.y=GAME_H+8; m.x=Math.random()*GAME_W; }
    if(m.x<-8) m.x=GAME_W+8; else if(m.x>GAME_W+8) m.x=-8;
    const k=12*m.z;
    ctx.globalAlpha=(0.14+0.2*m.z)*(0.7+0.3*Math.sin(m.ph*3));
    ctx.drawImage(spr,m.x-k/2,m.y-k/2,k,k);
  }
  ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
}

}

/* ===== 動畫系統（tween 鏈） ===== */
let anim=null;
function tween(dur,update,onDone){ anim={t:0,dur,update,onDone}; turnBusy=true; }
function tickAnim(dt){
  if(!anim) return;
  anim.t+=dt;
  const p=Math.min(1,anim.t/anim.dur);
  if(anim.update) anim.update(p,dt);
  if(p>=1){ const d=anim.onDone; anim=null; if(d) d(); else turnBusy=false; }
}
const fx=[];  // {type:'orb'|'ring'|'beam'|'shield', ...}
function updateFx(dt){
  for(let i=fx.length-1;i>=0;i--){
    const f=fx[i]; f.t+=dt;
    if(f.type==='orb'){
      const p=Math.min(1,f.t/f.dur);
      f.x=f.x0+(f.x1-f.x0)*p; f.y=f.y0+(f.y1-f.y0)*p - Math.sin(p*Math.PI)*30;
      if(Math.random()<0.7) parts.push({x:f.x,y:f.y,vx:(Math.random()*2-1)*40,vy:(Math.random()*2-1)*40,life:0.3,max:0.3,color:f.color});
    }
    if(f.t>=f.dur){ fx[i]=fx[fx.length-1]; fx.pop(); }
  }
}
function drawFx(){
  for(const f of fx){
    const p=Math.min(1,f.t/f.dur);
    if(f.type==='orb'){
      ctx.fillStyle='rgba(127,216,255,.4)';
      ctx.beginPath(); ctx.arc(f.x,f.y,20,0,7); ctx.fill();
      ctx.fillStyle=f.color;
      ctx.beginPath(); ctx.arc(f.x,f.y,12,0,7); ctx.fill();
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(f.x-3,f.y-3,4,0,7); ctx.fill();
    } else if(f.type==='ring'){
      ctx.globalAlpha=1-p;
      ctx.strokeStyle=f.color; ctx.lineWidth=8*(1-p*0.5);
      ctx.beginPath(); ctx.ellipse(f.x,f.y,20+p*f.r,(20+p*f.r)*0.3,0,0,7); ctx.stroke();
      ctx.globalAlpha=1;
    } else if(f.type==='beam'){
      const a=p<0.3?p/0.3:(1-p)/0.7;
      ctx.globalAlpha=a;
      ctx.fillStyle=f.color;
      ctx.fillRect(f.x-f.w/2,0,f.w,f.y);
      ctx.fillStyle='#fff';
      ctx.fillRect(f.x-f.w/6,0,f.w/3,f.y);
      ctx.globalAlpha=1;
    }
  }
}

/* ===== 傷害結算 ===== */
function applyHit(att,def2,base,isSpecial){
  const mul=typeMul(att.def.type,def2.def.type);
  let dmg=base*mul*(0.9+Math.random()*0.2);
  if(def2.guard){ dmg*=0.5; }
  dmg=Math.max(1,Math.round(dmg));
  def2.hp=Math.max(0,def2.hp-dmg);
  def2.flash=0.15; def2.sx=1.3; def2.sy=0.7;
  def2.expr='hurt'; def2.exprT=0.55;   // v5補強：受擊表情
  shake=isSpecial?10:5; freeze=isSpecial?0.1:0.05;
  burst(def2.baseX,def2.y-40,isSpecial?PALETTE.yellow:PALETTE.pink,isSpecial?24:12,isSpecial?300:220);
  fx.push({type:'ring',t:0,dur:0.42,x:def2.baseX,y:def2.y-30,r:isSpecial?230:130,color:TYPES[att.def.type].color});   // v6：屬性色衝擊波
  addFloat(def2.baseX,def2.y-90,'-'+dmg,isSpecial?PALETTE.yellow:'#fff',isSpecial);
  if(mul>1){ addFloat(def2.baseX,def2.y-124,'效果絕佳！',PALETTE.cyan,true); sfxSuper(); cheer(false); }
  else if(mul<1){ addFloat(def2.baseX,def2.y-124,'效果不太好…','#b9b9c9'); }
  if(def2.guard){ addFloat(def2.baseX,def2.y-56,'防禦！',TYPES[def2.def.type].color); sfxGuard(); }
  if(isSpecial) sfxSpecial(); else sfxHit();
  return dmg;
}

/* ===== 招式演出 ===== */
function doAttack(att,def2,onDone){
  const dir=att.isPlayer?1:-1;
  const miss=Math.random()<0.04;
  att.sx=0.75; att.sy=1.25;
  tween(0.16,p=>{ att.offsetX=90*dir*p; },()=>{
    if(miss){ addFloat(def2.baseX,def2.y-80,'閃避！',PALETTE.cyan); beep(300,0.06,'triangle',0.1); }
    else applyHit(att,def2,att.atk,false);
    tween(0.18,p=>{ att.offsetX=90*dir*(1-p); },()=>{ att.offsetX=0; turnBusy=false; onDone(); });
  });
}
function doSpecial(att,def2,onDone){
  const dir=att.isPlayer?1:-1;
  const miss=Math.random()<0.1;
  const id=att.def.id;
  const finish=()=>{ turnBusy=false; onDone(); };
  const impact=()=>{
    if(miss){ addFloat(def2.baseX,def2.y-80,'閃避！',PALETTE.cyan); beep(300,0.06,'triangle',0.1); }
    else applyHit(att,def2,att.atk*1.7,true);
  };
  if(id==='lucario'){
    sfxCharge();
    tween(0.4,p=>{                               // 蓄力
      att.sx=1-p*0.2; att.sy=1+p*0.15;
      if(Math.random()<0.5) parts.push({x:att.baseX+dir*40*Math.random()*2-40,y:att.y-40+(Math.random()*2-1)*50,vx:dir*60,vy:0,life:0.25,max:0.25,color:'#7fd8ff'});
    },()=>{
      fx.push({type:'orb',t:0,dur:0.32,x0:att.baseX+dir*46,y0:att.y-36,x1:def2.baseX,y1:def2.y-36,x:att.baseX,y:att.y-36,color:'#4f9be0'});
      beep(520,0.3,'sine',0.12,500);
      tween(0.32,()=>{},()=>{ impact(); tween(0.15,()=>{},finish); });
    });
  } else if(id==='meltan'){
    tween(0.28,p=>{ att.sy=1-p*0.5; att.sx=1+p*0.4; },()=>{   // 融化
      noiseS(0.2,0.12);
      tween(0.16,p=>{ att.offsetX=(def2.baseX-att.baseX)*p; att.sy=0.5; },()=>{
        impact();
        tween(0.25,p=>{ att.offsetX=(def2.baseX-att.baseX)*(1-p); att.sy=0.5+p*0.5; att.sx=1.4-p*0.4; },finish);
      });
    });
  } else if(id==='gureton'){
    tween(0.3,p=>{ att.offsetY=-110*Math.sin(p*Math.PI/2); },()=>{   // 跳起
      tween(0.12,p=>{ att.offsetY=-110*(1-p); },()=>{
        att.offsetY=0;
        att.sx=1.4; att.sy=0.55;   // v5補強：落地瞬間 squash & stretch
        fx.push({type:'ring',t:0,dur:0.5,x:att.baseX,y:att.y+56,r:320,color:'#ffa72e'});
        shake=13; noiseS(0.3,0.16);
        impact();
        tween(0.2,()=>{},finish);
      });
    });
  } else { // arceus 裁決之光
    sfxCharge(); whiteFlash=0.35;
    tween(0.35,()=>{},()=>{
      for(let i=0;i<3;i++)
        fx.push({type:'beam',t:-i*0.09,dur:0.5,x:def2.baseX+(i-1)*36,y:def2.y+40,w:34,color:'rgba(255,225,120,.85)'});
      beep(1046,0.4,'sine',0.13,-400);
      tween(0.4,()=>{},()=>{ impact(); tween(0.15,()=>{},finish); });
    });
  }
}
function doGuard(f,onDone){
  f.guard=true; f.sx=0.9; f.sy=0.94;
  addFloat(f.baseX,f.y-90,'防禦姿態！',TYPES[f.def.type].color);
  sfxGuard();
  const heal=Math.round(f.maxHp*0.06);
  f.hp=Math.min(f.maxHp,f.hp+heal);
  tween(0.4,()=>{},()=>{ turnBusy=false; onDone(); });
}
function doItem(f,onDone){
  const heal=Math.round(f.maxHp*0.4);
  f.hp=Math.min(f.maxHp,f.hp+heal);
  burst(f.baseX,f.y-30,PALETTE.cyan,16,160);
  addFloat(f.baseX,f.y-90,'+'+heal+' HP',PALETTE.cyan,true);
  sfxHeal();
  f.sx=1.15; f.sy=1.15;
  tween(0.5,()=>{},()=>{ turnBusy=false; onDone(); });
}

const battleState={
  enter(){
    this.playerTurn=true; this.ended=false; this.endTimer=0; this.introT=0;
    this.stars=0; this.shownStars=0; this.btns2=[]; this.waitPulse=0; this.landed=false;
  },
  update(dt){
    // 入場演出　v5補強：緩動＋跳步進場，落地瞬間 squash & stretch（取代原本純線性滑入）
    if(this.introT<1.1){
      this.introT+=dt;
      const p=Math.min(1,this.introT/0.8);
      const ease=1-Math.pow(1-p,3);
      player.offsetX=-(1-ease)*300;
      enemy.offsetX=(1-ease)*300;
      const hop=Math.sin(p*Math.PI*2.5)*Math.max(0,1-p)*16;
      player.offsetY=-hop; enemy.offsetY=-hop;
      if(p>=1&&!this.landed){
        this.landed=true;
        player.sx=1.3; player.sy=0.74; enemy.sx=1.3; enemy.sy=0.74;
        shake=Math.max(shake,3);
      }
      if(this.introT>=1.1){ player.offsetX=0; enemy.offsetX=0; player.offsetY=0; enemy.offsetY=0; }
      input.justDown=false; keyDigit=0;
      return;
    }
    upFighter(player,dt); upFighter(enemy,dt);
    updateParts(dt); updateFloats(dt); updateFx(dt);
    shake*=Math.pow(0.001,dt);
    whiteFlash=Math.max(0,whiteFlash-dt);
    if(freeze>0){ freeze-=dt; return; }
    tickAnim(dt);
    if(this.ended){
      this.endTimer+=dt;
      const target=Math.min(this.stars,Math.floor((this.endTimer-0.5)/0.45)+1);
      if(this.won&&target>this.shownStars&&target>=1){ this.shownStars=target; sfxStar(); burst(GAME_W/2+(this.shownStars-2)*70,236,'#f4c531',14,200); }
      if(this.endTimer>0.6){
        let act=null;
        if(input.justDown){
          for(const b of this.btns2)
            if(input.x>=b.x&&input.x<=b.x+b.w&&input.y>=b.y&&input.y<=b.y+b.h) act=b.fn;
        }
        if(keyDigit===-1) act=this.won?(curGym<4?()=>{curGym++;setState(pickState);}:()=>setState(gymState)):()=>startBattle(FIGHTERS.indexOf(player.def));
        if(act){ input.justDown=false; keyDigit=0; sfxSelect(); act(); return; }
      }
      input.justDown=false; keyDigit=0;
      return;
    }
    this.waitPulse=Math.max(0,(this.waitPulse||0)-dt);
    // v5：即使非玩家回合／演出進行中，也要偵測按鈕命中——避免誤觸完全無回饋（違反「即時回饋」原則）
    {
      const bw=210,bh=66,gap=14;
      const startX=GAME_W/2-(bw*4+gap*3)/2+bw/2, by=478;
      let tapped=-1;
      if(input.justDown){
        battleButtons.forEach((b,i)=>{
          const bx=startX+i*(bw+gap);
          if(Math.abs(input.x-bx)<bw/2&&Math.abs(input.y-by)<bh/2) tapped=i;
        });
      }
      const kd=(keyDigit>=1&&keyDigit<=4)?keyDigit-1:-1;
      const canAct=this.playerTurn&&!turnBusy;
      if(canAct){
        let chosen=tapped>=0?tapped:kd;
        if(chosen===3&&itemUses.player<=0){ if(keyDigit||input.justDown) sfxDeny(); chosen=-1; }
        if(chosen>=0){ sfxSelect(); this.playerAction(chosen); }
      } else if(tapped>=0||kd>=0){
        this.waitPulse=0.3; sfxWait();   // 「請稍候」輕量提示：非回合誤觸不再靜默無反應
      }
    }
    input.justDown=false; keyDigit=0;
  },
  playerAction(c){
    player.guard=false;
    this.playerTurn=false;
    const next=()=>this.checkAndContinue();
    if(c===0){ pushLog(player.def.name+' 使出攻擊！'); doAttack(player,enemy,next); }
    else if(c===1){ pushLog(player.def.name+' 使出「'+player.def.special+'」！'); doSpecial(player,enemy,next); }
    else if(c===2){ pushLog(player.def.name+' 擺出防禦姿態！'); doGuard(player,next); }
    else { itemUses.player--; usedItem=true; pushLog(player.def.name+' 吃下蔥油冰！'); doItem(player,next); }
  },
  checkAndContinue(){
    if(enemy.hp<=0){ this.endBattle(true); return; }
    setTimeout(()=>{ if(state===battleState&&!this.ended) this.enemyAction(); },420);
  },
  enemyAction(){
    enemy.guard=false;
    const smart=curGym>=2;
    let c;
    if(enemy.hp<enemy.maxHp*0.3&&itemUses.enemy>0&&Math.random()<0.7) c=3;
    else if(smart&&enemy.hp<enemy.maxHp*0.5&&Math.random()<0.22) c=2;
    else if(Math.random()<0.3+curGym*0.08) c=1;
    else c=0;
    const next=()=>this.afterEnemy();
    if(c===3){ itemUses.enemy--; pushLog(enemy.def.name+' 吃下蔥油冰！'); doItem(enemy,next); }
    else if(c===2){ pushLog(enemy.def.name+' 擺出防禦姿態！'); doGuard(enemy,next); }
    else if(c===1){ pushLog(enemy.def.name+' 使出「'+enemy.def.special+'」！'); doSpecial(enemy,player,next); }
    else { pushLog(enemy.def.name+' 使出攻擊！'); doAttack(enemy,player,next); }
  },
  afterEnemy(){
    if(player.hp<=0){ this.endBattle(false); return; }
    this.playerTurn=true;
  },
  endBattle(won){
    this.ended=true; this.endTimer=0; this.won=won; this.shownStars=0;
    const loser=won?enemy:player, winner=won?player:enemy;
    loser.koT=0.01;
    winner.expr='happy'; winner.exprT=999; loser.expr='hurt'; loser.exprT=999;   // v5補強：結算表情定格
    pushLog(won?(enemy.def.name+' 倒下了！'+player.def.name+' 獲勝！'):(player.def.name+' 倒下了……'));
    if(won){
      this.stars=1+(player.hp>=player.maxHp*0.5?1:0)+(!usedItem?1:0);
      if(this.stars>save.stars[curGym]){ save.stars[curGym]=this.stars; this.newBest=true; }
      persist();
      sfxWin();
    } else sfxLose();
    burst(loser.baseX,loser.y-30,won?PALETTE.yellow:'#666',30,260);
  },
  draw(){
    ctx.drawImage(skyCv,0,0);
    drawMotes(1/60);
    ctx.save();
    ctx.translate((Math.random()*2-1)*shake,(Math.random()*2-1)*shake);
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(GAME_W/2,420,420,60,0,0,7); ctx.fill();
    // 擂臺圈
    ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.ellipse(GAME_W/2,420,360,46,0,0,7); ctx.stroke();
    // v6：出戰者腳底屬性色光暈（additive，烘焙精靈）
    ctx.globalCompositeOperation='lighter';
    for(const f of [player,enemy]){
      if(f.koT>0) continue;
      const spr=spotOf(TYPES[f.def.type].color);
      const gw=150+Math.sin(f.idleT*2.3)*10;
      ctx.globalAlpha=0.32;
      ctx.drawImage(spr,f.baseX+f.offsetX-gw/2,f.y+40-gw*0.22,gw,gw*0.44);
    }
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
    for(const f of [player,enemy]){
      ctx.save();
      const ko=f.koT>0?Math.min(1,f.koT):0;
      ctx.globalAlpha=(f.flash>0?0.5+0.5*Math.sin(f.flash*80):1)*(1-ko*0.6);
      if(ko>0){ ctx.translate(f.baseX+f.offsetX,f.y+ko*30); ctx.rotate(f.facing*ko*1.2); ctx.translate(-(f.baseX+f.offsetX),-(f.y+ko*30)); }
      // v5補強：待機呼吸擺動＋真正非等比例 squash&stretch（原本 sy 未真正套用到渲染）
      const bob=ko<=0?Math.sin(f.idleT*2.3)*2.4:0;
      const breathe=ko<=0?1+Math.sin(f.idleT*2.3)*0.014:1;
      drawers[f.def.id](f.baseX+f.offsetX,f.y+(f.offsetY||0)+(ko*24)+bob,1.1*f.sx,1.1*f.sy*breathe,f.facing,f.ex,f.expr);
      ctx.restore();
      if(f.guard){                                     // 防禦盾
        ctx.strokeStyle=TYPES[f.def.type].color; ctx.lineWidth=4;
        ctx.globalAlpha=0.6+Math.sin(performance.now()*0.01)*0.2;
        ctx.beginPath(); ctx.arc(f.baseX,f.y-20,62,0,7); ctx.stroke();
        ctx.globalAlpha=1;
      }
    }
    // 回合指示箭頭
    if(!this.ended&&!turnBusy&&this.introT>=1.1){
      const f=this.playerTurn?player:enemy;
      const bob=Math.sin(performance.now()*0.005)*5;
      ctx.fillStyle=this.playerTurn?'#00a844':'#c0392b';
      ctx.beginPath();
      ctx.moveTo(f.baseX-10,f.y-118+bob); ctx.lineTo(f.baseX+10,f.y-118+bob); ctx.lineTo(f.baseX,f.y-102+bob);
      ctx.closePath(); ctx.fill();
    }
    drawFx();
    drawParts();
    drawFloats();
    ctx.restore();
    ctx.drawImage(vigCv,0,0);                        // v6：暗角
    if(whiteFlash>0){ ctx.fillStyle='rgba(255,255,240,'+(whiteFlash*1.4)+')'; ctx.fillRect(0,0,GAME_W,GAME_H); }
    drawHpBar(player,205,52,300);
    drawHpBar(enemy,GAME_W-205,52,300);
    // log
    ctx.fillStyle='rgba(0,0,0,0.5)';
    roundRect(GAME_W/2-380,104,760,56,10); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='16px sans-serif'; ctx.textAlign='center';
    log.slice(-2).forEach((l,i)=>ctx.fillText(l,GAME_W/2,126+i*22));
    // 入場橫幅
    if(this.introT<1.1){
      ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,220,GAME_W,90);
      ctx.textAlign='center'; ctx.font='bold 40px sans-serif';
      drawTextOutline('第'+(curGym+1)+'館　'+GYMS[curGym].name,GAME_W/2,278,'#fff','rgba(31,95,174,0.9)',6);
      return;
    }
    if(!this.ended){
      const bw=210,bh=66,gap=14;
      const startX=GAME_W/2-(bw*4+gap*3)/2+bw/2, by=478;
      battleButtons.forEach((b,i)=>{
        const bx=startX+i*(bw+gap);
        const disabled=(b.key==='item'&&itemUses.player<=0)||!this.playerTurn||turnBusy;
        const hover=!disabled&&Math.abs(mouseX-bx)<bw/2&&Math.abs(mouseY-by)<bh/2;
        ctx.save(); ctx.translate(bx,by);
        ctx.fillStyle=disabled?'rgba(255,255,255,0.18)':(hover?'rgba(255,255,255,0.62)':'rgba(255,255,255,0.4)');
        roundRect(-bw/2,-bh/2,bw,bh,12); ctx.fill();
        ctx.strokeStyle=disabled?'rgba(38,50,74,0.2)':(hover?'#1f5fae':'rgba(38,50,74,0.4)');
        ctx.lineWidth=2; roundRect(-bw/2,-bh/2,bw,bh,12); ctx.stroke();
        ctx.font='bold 19px sans-serif'; ctx.textAlign='center';
        let label=b.label;
        if(b.key==='special') label='② '+player.def.special;
        const tc=disabled?'rgba(38,50,74,0.4)':PALETTE.ink;
        drawTextOutline(label,0,-8,tc,'rgba(255,255,255,0.7)',2);
        ctx.font='12px sans-serif';
        drawTextOutline(b.sub||player.def.specialDesc,0,16,tc,'rgba(255,255,255,0.7)',2);
        if(b.key==='item') drawItem(-bw/2+22,4,0.6);
        ctx.restore();
      });
      if(!this.playerTurn||turnBusy){
        const urgent=this.waitPulse>0;   // v5：誤觸時文字閃色，讓玩家確認「輸入有被收到，只是還沒輪到你」
        ctx.font=(urgent?'bold 17px':'16px')+' sans-serif'; ctx.textAlign='center';
        drawTextOutline(turnBusy?'…':'對手行動中…',GAME_W/2,432,urgent?'#ff2975':PALETTE.ink,'rgba(255,255,255,0.8)',3);
      }
    } else {
      ctx.fillStyle='rgba(0,0,0,0.62)'; ctx.fillRect(0,0,GAME_W,GAME_H);
      ctx.textAlign='center';
      const allClear=save.stars.every(s=>s>0);
      ctx.fillStyle=this.won?PALETTE.yellow:'#ff2975';
      ctx.font='bold 46px sans-serif';
      ctx.fillText(this.won?(curGym===4&&allClear?'聯盟冠軍誕生！':'道館攻略成功！'):'再挑戰一次！',GAME_W/2,150);
      ctx.fillStyle='#fff'; ctx.font='20px sans-serif';
      ctx.fillText(this.won?player.def.name+' 擊敗了 '+(enemy.ex?'冠軍・':'')+enemy.def.name+'！':player.def.name+' 被擊敗了……換個屬性試試？',GAME_W/2,190);
      if(this.won){
        for(let s2=0;s2<3;s2++){
          const lit=s2<this.shownStars;
          const pop=lit&&this.endTimer-(0.5+s2*0.45)<0.25?1.5-(this.endTimer-(0.5+s2*0.45))*2:1;
          drawStar(GAME_W/2+(s2-1)*70,236,26*Math.max(1,pop),lit?'#f4c531':'rgba(255,255,255,0.15)');
        }
        ctx.font='15px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.85)';
        ctx.fillText('剩餘 HP '+Math.ceil(player.hp)+'/'+player.maxHp+'　蔥油冰 '+(usedItem?'已使用':'未使用'),GAME_W/2,296);
        if(this.newBest&&this.endTimer>1.4){ ctx.fillStyle='#f4c531'; ctx.font='bold 19px sans-serif'; ctx.fillText('★ 新紀錄！ ★',GAME_W/2,326); }
      }
      // 按鈕
      this.btns2=[];
      const defs=[];
      if(this.won&&curGym<4) defs.push(['下一道館 ▶',()=>{curGym++;setState(pickState);},'#00f0ff']);
      defs.push(['再戰一次',()=>startBattle(FIGHTERS.indexOf(player.def)),'#f4c531']);
      defs.push(['道館選單',()=>setState(gymState),'rgba(255,255,255,0.85)']);
      const bw=196,bh=56,gap=20,x0=(GAME_W-(bw*defs.length+gap*(defs.length-1)))/2;
      defs.forEach((d,i)=>{
        const x=x0+i*(bw+gap), y=366;
        this.btns2.push({x,y,w:bw,h:bh,fn:d[1]});
        ctx.fillStyle='rgba(20,26,44,0.85)';
        roundRect(x,y,bw,bh,12); ctx.fill();
        ctx.strokeStyle=d[2]; ctx.lineWidth=2.5;
        roundRect(x,y,bw,bh,12); ctx.stroke();
        ctx.fillStyle=d[2]; ctx.font='bold 20px sans-serif';
        ctx.fillText(d[0],x+bw/2,y+36);
      });
      ctx.font='15px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.7)';
      ctx.fillText('💻 空白鍵＝'+(this.won?(curGym<4?'下一道館':'道館選單'):'再戰一次'),GAME_W/2,458);
    }
    drawFooter();
  }
};
function upFighter(f,dt){
  f.sx+=(1-f.sx)*10*dt; f.sy+=(1-f.sy)*10*dt;
  f.dispHp+=(f.hp-f.dispHp)*Math.min(1,8*dt);
  if(f.flash>0) f.flash-=dt;
  if(f.koT>0) f.koT=Math.min(1,f.koT+dt*2);
  f.idleT+=dt;                                             // v5補強：呼吸待機動作時間軸
  if(f.exprT>0){ f.exprT-=dt; if(f.exprT<=0) f.expr='calm'; }
}
function drawHpBar(f,cx,cy,w){
  const pct=Math.max(0,f.hp/f.maxHp), dPct=Math.max(0,f.dispHp/f.maxHp);
  ctx.fillStyle='rgba(0,0,0,0.5)'; roundRect(cx-w/2-6,cy-24,w+12,46,10); ctx.fill();
  if(pct>0&&pct<=0.2){   // v5：低血量脈動警示外框，讓「快輸了」的緊張感看得到而不用一直盯數字
    ctx.save();
    ctx.globalAlpha=0.4+Math.sin(performance.now()*0.012)*0.28;
    ctx.strokeStyle='#ff2975'; ctx.lineWidth=3;
    roundRect(cx-w/2-6,cy-24,w+12,46,10); ctx.stroke();
    ctx.restore();
  }
  ctx.fillStyle='#333'; ctx.fillRect(cx-w/2,cy,w,12);
  ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.fillRect(cx-w/2,cy,w*dPct,12);   // 殘影
  ctx.fillStyle=pct>0.5?'#00a844':pct>0.2?'#ffcf5c':'#b13e53';
  ctx.fillRect(cx-w/2,cy,w*pct,12);
  ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.strokeRect(cx-w/2,cy,w,12);
  ctx.fillStyle='#fff'; ctx.font='bold 14px sans-serif'; ctx.textAlign='center';
  ctx.fillText((f.ex?'冠軍・':'')+f.def.name+'  '+Math.max(0,Math.ceil(f.hp))+'/'+f.maxHp,cx,cy-8);
  ctx.fillStyle=TYPES[f.def.type].color;
  roundRect(cx-w/2-2,cy+16,52,17,8); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 11px sans-serif';
  ctx.fillText(f.def.type,cx-w/2+24,cy+28.5);
}

/* ===== 主迴圈 ===== */
const STEP=1/60;
let last=performance.now(), acc=0;
function frame(now){
  requestAnimationFrame(frame);
  acc+=Math.min((now-last)/1000,0.1);
  last=now;
  while(acc>=STEP){
    state.update(STEP);
    acc-=STEP;
  }
  state.draw();
}
setState(titleState);
requestAnimationFrame(frame);

/* ===== 測試掛鉤（QA 自動化） ===== */
window.__test=()=>({ state:stateName(), gym:curGym, stars:save.stars.slice(), unlocked:unlockedCount(),
  playerHp:player?player.hp:0, playerMax:player?player.maxHp:0, enemyHp:enemy?enemy.hp:0,
  turn:state===battleState?(battleState.playerTurn?'player':'enemy'):'', busy:turnBusy,
  ended:state===battleState?battleState.ended:false, won:state===battleState?!!battleState.won:false,
  itemLeft:itemUses.player, usedItem, ambN:ambNodes.length });
window.__weaken=n=>{ if(enemy) enemy.hp=Math.min(enemy.hp,n||5); };
window.__healP=()=>{ if(player){ player.hp=player.maxHp; } };
</script>
<script>/* AI-CAMP-STATS-BEACON */
(function(){
  try{ if(window.top!==window.self) return; }catch(e){ return; } /* 在作品館內由作品館計數與投票 */
  var NS="ai-future-camp", K="t-0c9bdd44";
  var ABS="//abacus.jasoncameron.dev/"; /* 直連備援 */
  var REL="/abacus/"; /* 同源代理（Vercel 轉發）：學校閘道擋外部網域時仍然通 */
  function ping(n){
    try{
      fetch(REL+"hit/"+NS+"/"+n).then(function(r){
        if(!r||!r.ok){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); }
      }).catch(function(){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); });
    }catch(e){}
  }
  function read(n,cb){
    function via(base,next){ try{ fetch(base+"get/"+NS+"/"+n).then(function(r){ if(r.status===404&&base===ABS) return {value:0}; if(!r.ok) throw 0; return r.json(); }).then(function(j){ cb(j.value||j.count||0); }).catch(next); }catch(e){ next(); } }
    via(REL, function(){ via(ABS, function(){ cb(null); }); });
  }
  ping(K+"-v");
  var done=false;
  function once(){ if(done)return; done=true; ping(K+"-p"); ping("site-total-plays");
    window.removeEventListener("pointerdown",once); window.removeEventListener("keydown",once); }
  window.addEventListener("pointerdown",once,{once:false}); window.addEventListener("keydown",once,{once:false});
  /* 投票鈕：非常好玩/好玩——與作品館同一計數器，任何網頁打開都同步 */
  function initVotes(){
    if(!document.body) return;
    var wrap=document.createElement("div");
    wrap.style.cssText="position:fixed;right:10px;bottom:10px;z-index:99999;display:flex;gap:6px;font-family:sans-serif;opacity:.92";
    var LS="voted-"+K;
    var defs=[["-love","\u2764\uFE0F","\u975e\u5e38\u597d\u73a9","#ff6cc7"],["-like","\ud83d\udc4d","\u597d\u73a9","#38e1ff"]];
    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;
          b.querySelector("i").textContent=Math.max(0,(n||0)-(c||0));
        }); });
      });
    }
    defs.forEach(function(d){
      var b=document.createElement("button");
      b.type="button"; b.title=d[2];
      b.style.cssText="min-height:42px;padding:8px 14px;border:none;border-radius:999px;background:rgba(15,18,32,.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation";
      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";
      b.addEventListener("click",function(){
        var prev=null; try{ prev=localStorage.getItem(LS); }catch(e){}
        if(prev===d[0]){ ping(K+d[0]+"-c"); try{ localStorage.removeItem(LS); }catch(e){} }
        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);
      });
      btns[d[0]]=b; wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    refresh();
    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* 每10秒同步別人投的票 */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
