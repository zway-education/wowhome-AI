<script>
'use strict';
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize(){
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width  = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale;
}
addEventListener('resize', resize); resize();

// ===== 音效 =====
let AC = null;
function audio(){ if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); return AC; }
addEventListener('pointerdown', audio, { once:true });
addEventListener('keydown', audio, { once:true });
let muted = false;
function beep(freq=440, dur=0.1, type='square', vol=0.15, slide=0){
  if(muted) return;
  const ac = audio(); if(!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, ac.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq+slide), ac.currentTime+dur);
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+dur);
  o.connect(g).connect(ac.destination);
  o.start(); o.stop(ac.currentTime+dur);
}
function sfxHit(){ beep(160,0.09,'square',0.18,-80); beep(80,0.12,'sawtooth',0.12,-40); }
function sfxSpecial(){ beep(660,0.08,'square',0.16,300); setTimeout(()=>beep(880,0.12,'square',0.16,200),70); }
function sfxHeal(){ beep(988,0.09,'sine',0.15); setTimeout(()=>beep(1319,0.15,'sine',0.15),90); }
function sfxSelect(){ beep(500,0.05,'square',0.1); }
function sfxWin(){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,0.16,'square',0.16),i*110)); }
function sfxLose(){ beep(300,0.4,'sawtooth',0.16,-220); }

// ===== 輸入 =====
const input = { down:false, x:0, y:0, justDown:false };
function setPointer(x,y,down){
  input.x = x; input.y = y;
  if(down && !input.down) input.justDown = true;
  input.down = down;
}
canvas.addEventListener('pointerdown', e=>{
  const r = canvas.getBoundingClientRect();
  setPointer((e.clientX-r.left)/canvas._scale,(e.clientY-r.top)/canvas._scale,true);
  e.preventDefault();
}, {passive:false});
canvas.addEventListener('pointerup', e=>{ input.down=false; e.preventDefault(); }, {passive:false});
canvas.addEventListener('pointermove', e=>{
  if(!input.down) return;
  const r = canvas.getBoundingClientRect();
  input.x=(e.clientX-r.left)/canvas._scale; input.y=(e.clientY-r.top)/canvas._scale;
}, {passive:false});
canvas.addEventListener('contextmenu', e=>e.preventDefault());

let mouseX=0, mouseY=0;
canvas.addEventListener('pointermove', e=>{
  const r = canvas.getBoundingClientRect();
  mouseX=(e.clientX-r.left)/canvas._scale; mouseY=(e.clientY-r.top)/canvas._scale;
});

let keyDigit = 0; // 1..4 held this frame (justPressed)
addEventListener('keydown', e=>{
  if(e.code==='Digit1'||e.code==='Numpad1') keyDigit=1;
  else if(e.code==='Digit2'||e.code==='Numpad2') keyDigit=2;
  else if(e.code==='Digit3'||e.code==='Numpad3') keyDigit=3;
  else if(e.code==='Digit4'||e.code==='Numpad4') keyDigit=4;
  else if(e.code==='Space'||e.code==='Enter') keyDigit=-1; // confirm/continue
  if(['Digit1','Digit2','Digit3','Digit4','Space','Enter'].includes(e.code)) e.preventDefault();
});

// ===== 粒子 =====
const parts = [];
function burst(x,y,color,n=14,speed=240){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=speed*(0.3+Math.random()*0.7);
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.5,color});
  }
}
function updateParts(dt){
  for(const p of parts){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=500*dt; p.life-=dt; }
  for(let i=parts.length-1;i>=0;i--) if(parts[i].life<=0) parts.splice(i,1);
}
function drawParts(){
  for(const p of parts){
    ctx.globalAlpha = Math.max(0,p.life*2);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-3,p.y-3,6,6);
  }
  ctx.globalAlpha=1;
}

// ===== 飄字 =====
const floaters = [];
function addFloat(x,y,text,color){ floaters.push({x,y,text,color,life:0.9}); }
function updateFloats(dt){
  for(const f of floaters){ f.y -= 40*dt; f.life -= dt; }
  for(let i=floaters.length-1;i>=0;i--) if(floaters[i].life<=0) floaters.splice(i,1);
}
function drawFloats(){
  ctx.textAlign='center'; ctx.font='bold 26px sans-serif';
  for(const f of floaters){
    ctx.globalAlpha = Math.max(0,Math.min(1,f.life*1.5));
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha=1;
}

let freeze = 0;

// ===== 角色繪製（多部件，剪影可辨識） =====
function eyeSet(cx,cy,r,look){
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(cx,cy,r,0,7); ctx.fill();
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(cx+look*r*0.3,cy,r*0.5,0,7); ctx.fill();
}
function drawLucario(x,y,s,facing){
  ctx.save(); ctx.translate(x,y); ctx.scale(s*facing,s);
  // aura glow
  ctx.save(); ctx.globalAlpha=0.25; ctx.fillStyle='#00f0ff';
  ctx.beginPath(); ctx.ellipse(0,-10,58,72,0,0,7); ctx.fill(); ctx.restore();
  // legs
  ctx.fillStyle='#2a2a3a';
  ctx.fillRect(-24,40,16,26); ctx.fillRect(10,40,16,26);
  // body
  ctx.fillStyle='#3a3a4a';
  ctx.beginPath(); ctx.moveTo(-30,10); ctx.quadraticCurveTo(0,-10,30,10);
  ctx.quadraticCurveTo(34,46,0,50); ctx.quadraticCurveTo(-34,46,-30,10); ctx.fill();
  ctx.fillStyle='#f6f6f6';
  ctx.beginPath(); ctx.ellipse(0,26,16,20,0,0,7); ctx.fill();
  // spikes chest
  ctx.fillStyle='#00f0ff';
  ctx.beginPath(); ctx.moveTo(0,4); ctx.lineTo(-8,16); ctx.lineTo(8,16); ctx.fill();
  // arms
  ctx.fillStyle='#2a2a3a';
  ctx.fillRect(-42,6,14,34); ctx.fillRect(28,6,14,34);
  ctx.fillStyle='#00f0ff';
  ctx.fillRect(-46,4,6,10); ctx.fillRect(40,4,6,10);
  // head
  ctx.fillStyle='#3a3a4a';
  ctx.beginPath(); ctx.arc(0,-24,22,0,7); ctx.fill();
  ctx.fillStyle='#f6f6f6';
  ctx.beginPath(); ctx.moveTo(-10,-16); ctx.lineTo(0,4); ctx.lineTo(10,-16); ctx.fill();
  // ears
  ctx.fillStyle='#2a2a3a';
  ctx.beginPath(); ctx.moveTo(-18,-36); ctx.lineTo(-30,-64); ctx.lineTo(-6,-42); ctx.fill();
  ctx.beginPath(); ctx.moveTo(18,-36); ctx.lineTo(30,-64); ctx.lineTo(6,-42); ctx.fill();
  eyeSet(0,-26,7,1);
  // spike behind head
  ctx.fillStyle='#ff2975';
  ctx.beginPath(); ctx.moveTo(-4,-44); ctx.lineTo(0,-60); ctx.lineTo(4,-44); ctx.fill();
  ctx.restore();
}
function drawMeltan(x,y,s,facing){
  ctx.save(); ctx.translate(x,y); ctx.scale(s*facing,s);
  ctx.save(); ctx.globalAlpha=0.3; ctx.fillStyle='#fff700';
  ctx.beginPath(); ctx.ellipse(0,0,50,60,0,0,7); ctx.fill(); ctx.restore();
  // liquid metal blob body
  ctx.fillStyle='#3a3a44';
  ctx.beginPath();
  ctx.moveTo(-30,20);
  ctx.bezierCurveTo(-40,-10,-22,-40,0,-42);
  ctx.bezierCurveTo(22,-40,40,-10,30,20);
  ctx.bezierCurveTo(20,44,-20,44,-30,20);
  ctx.fill();
  // hex nut hole
  ctx.fillStyle='#0d0221';
  ctx.beginPath();
  const hx=0,hy=-2,hr=14;
  ctx.moveTo(hx+hr,hy);
  for(let i=1;i<=6;i++){ const a=i*Math.PI/3; ctx.lineTo(hx+hr*Math.cos(a),hy+hr*Math.sin(a)); }
  ctx.fill();
  // magnet arms
  ctx.fillStyle='#fff700';
  ctx.fillRect(-46,-4,18,10); ctx.fillRect(28,-4,18,10);
  eyeSet(0,-30,6,1);
  ctx.restore();
}
function drawGureton(x,y,s,facing){
  ctx.save(); ctx.translate(x,y); ctx.scale(s*facing,s);
  ctx.save(); ctx.globalAlpha=0.25; ctx.fillStyle='#ffa72e';
  ctx.beginPath(); ctx.ellipse(0,-6,60,74,0,0,7); ctx.fill(); ctx.restore();
  // legs thick
  ctx.fillStyle='#3a2a1a';
  ctx.fillRect(-30,44,20,24); ctx.fillRect(10,44,20,24);
  // body big block
  ctx.fillStyle='#5a4632';
  ctx.beginPath();
  ctx.moveTo(-36,4); ctx.quadraticCurveTo(0,-16,36,4);
  ctx.quadraticCurveTo(42,50,0,54); ctx.quadraticCurveTo(-42,50,-36,4); ctx.fill();
  // stone plating
  ctx.fillStyle='#ffa72e';
  ctx.fillRect(-16,10,10,10); ctx.fillRect(6,10,10,10); ctx.fillRect(-5,26,10,10);
  // arms
  ctx.fillStyle='#3a2a1a';
  ctx.fillRect(-48,4,16,36); ctx.fillRect(32,4,16,36);
  // head
  ctx.fillStyle='#5a4632';
  ctx.beginPath(); ctx.moveTo(-24,-14); ctx.lineTo(0,-42); ctx.lineTo(24,-14); ctx.lineTo(18,4); ctx.lineTo(-18,4); ctx.fill();
  eyeSet(0,-14,7,1);
  ctx.fillStyle='#ff7e3d';
  ctx.beginPath(); ctx.moveTo(-6,-40); ctx.lineTo(0,-56); ctx.lineTo(6,-40); ctx.fill();
  ctx.restore();
}
function drawArceus(x,y,s,facing){
  ctx.save(); ctx.translate(x,y); ctx.scale(s*facing,s);
  ctx.save(); ctx.globalAlpha=0.3; ctx.fillStyle='#ffcf5c';
  ctx.beginPath(); ctx.ellipse(0,-8,64,78,0,0,7); ctx.fill(); ctx.restore();
  // ring
  ctx.strokeStyle='#9a6bff'; ctx.lineWidth=8;
  ctx.beginPath(); ctx.ellipse(0,40,40,12,0,0,7); ctx.stroke();
  // legs
  ctx.fillStyle='#e8e8e8';
  ctx.fillRect(-26,30,14,22); ctx.fillRect(12,30,14,22);
  // body horse-like
  ctx.fillStyle='#f6f6f6';
  ctx.beginPath(); ctx.ellipse(0,10,34,26,0,0,7); ctx.fill();
  ctx.fillStyle='#ffcf5c';
  ctx.fillRect(-30,2,60,8);
  // neck/head
  ctx.fillStyle='#f6f6f6';
  ctx.beginPath(); ctx.moveTo(14,-6); ctx.quadraticCurveTo(30,-30,26,-46);
  ctx.lineTo(44,-40); ctx.quadraticCurveTo(40,-14,20,4); ctx.fill();
  // mane band
  ctx.fillStyle='#9a6bff';
  ctx.beginPath(); ctx.arc(32,-40,9,0,7); ctx.fill();
  eyeSet(36,-40,5,1);
  ctx.restore();
}

const drawers = { lucario:drawLucario, meltan:drawMeltan, gureton:drawGureton, arceus:drawArceus };

// ===== 戰鬥實體 =====
function makeFighterState(def, x, isPlayer){
  return {
    def, x, baseX:x, y:360, hp:def.maxHp, maxHp:def.maxHp,
    sx:1, sy:1, facing: isPlayer?1:-1, flash:0, offsetX:0, isPlayer,
    used_item:false
  };
}

let player, enemy;
let log = [];
let turnBusy = false;
let particlesBlood = PALETTE.pink;

function pickTwoDistinct(){
  const idxs = [0,1,2,3];
  const pi = Math.floor(Math.random()*4);
  let ei = Math.floor(Math.random()*4);
  while(ei===pi) ei = Math.floor(Math.random()*4);
  return [idxs[pi], idxs[ei]];
}

function updateFighterVisual(f, dt){
  f.sx += (1-f.sx)*10*dt; f.sy += (1-f.sy)*10*dt;
  f.offsetX += (0-f.offsetX)*8*dt;
  if(f.flash>0) f.flash -= dt;
}
function drawHpBar(f, cx, cy, w){
  const pct = Math.max(0,f.hp/f.maxHp);
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(cx-w/2-3,cy-3,w+6,18);
  ctx.fillStyle='#333'; ctx.fillRect(cx-w/2,cy,w,12);
  ctx.fillStyle = pct>0.5?'#00a844':pct>0.2?'#ffcf5c':'#b13e53';
  ctx.fillRect(cx-w/2,cy,w*pct,12);
  ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.strokeRect(cx-w/2,cy,w,12);
  ctx.fillStyle='#fff'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
  ctx.fillText(f.def.name+'  '+Math.max(0,Math.ceil(f.hp))+'/'+f.maxHp, cx, cy-8);
}

function attackAnim(attacker, defender, dmg, isSpecial, isMiss){
  turnBusy = true;
  const dir = attacker.isPlayer?1:-1;
  const startX = attacker.baseX;
  attacker.sx=0.7; attacker.sy=1.3;
  const lungeDist = 90*dir;
  let t=0;
  const dur = isSpecial?0.5:0.32;
  function step(){
    t += 1/60;
    const p = Math.min(1, t/dur*2);
    if(t < dur/2){
      attacker.offsetX = lungeDist * (t/(dur/2));
    } else if(!attacker._hitDone){
      attacker._hitDone = true;
      if(isMiss){
        addFloat(defender.x, defender.y-70, '閃避！', PALETTE.cyan);
        beep(300,0.06,'triangle',0.1);
      } else {
        defender.hp = Math.max(0, defender.hp - dmg);
        defender.flash = 0.12;
        defender.sx=1.3; defender.sy=0.7;
        shake = isSpecial?9:4;
        freeze = isSpecial?0.1:0.05;
        burst(defender.x, defender.y-40, isSpecial?PALETTE.yellow:PALETTE.pink, isSpecial?24:12, isSpecial?300:220);
        addFloat(defender.x, defender.y-70, '-'+Math.round(dmg), isSpecial?PALETTE.yellow:'#fff');
        if(isSpecial) sfxSpecial(); else sfxHit();
      }
    }
    if(t < dur){
      if(t > dur*0.6) attacker.offsetX = lungeDist * (1-(t-dur*0.6)/(dur*0.4));
      requestAnimationFrame(step);
    } else {
      attacker.offsetX = 0;
      attacker._hitDone = false;
      turnBusy = false;
      afterAttack();
    }
  }
  step();
}

let pendingAfter = null;
function afterAttack(){
  if(pendingAfter){ const fn = pendingAfter; pendingAfter=null; fn(); }
}

function healAnim(target, amount, cb){
  turnBusy = true;
  target.hp = Math.min(target.maxHp, target.hp + amount);
  burst(target.x, target.y-30, PALETTE.cyan, 16, 160);
  addFloat(target.x, target.y-70, '+'+amount+' HP', PALETTE.cyan);
  sfxHeal();
  target.sx=1.15; target.sy=1.15;
  setTimeout(()=>{ turnBusy=false; cb&&cb(); }, 500);
}

// ===== 狀態機 =====
let state;
function setState(s){ state = s; if(s.enter) s.enter(); }

function makeButton(x,y,w,h,label,sub){ return {x,y,w,h,label,sub}; }

const titleState = {
  enter(){ this.selectIdx = -1; this.buttons = []; this.t=0;
    const cols = 2, bw=280, bh=150, gapx=30, gapy=24;
    const startX = GAME_W/2 - (cols*bw+gapx)/2 + bw/2;
    const startY = 210;
    FIGHTERS.forEach((f,i)=>{
      const col = i%2, row = Math.floor(i/2);
      this.buttons.push({f, x:startX+col*(bw+gapx), y:startY+row*(bh+gapy), w:bw, h:bh});
    });
  },
  update(dt){
    this.t += dt;
    let clickedIdx = -1;
    if(input.justDown){
      this.buttons.forEach((b,i)=>{
        if(Math.abs(input.x-b.x)<b.w/2 && Math.abs(input.y-b.y)<b.h/2) clickedIdx=i;
      });
    }
    if(keyDigit>=1 && keyDigit<=4) clickedIdx = keyDigit-1;
    if(clickedIdx>=0){
      sfxSelect();
      startBattle(clickedIdx);
    }
    input.justDown = false; keyDigit = 0;
  },
  draw(){
    drawBgGradient();
    ctx.textAlign='center';
    ctx.fillStyle=PALETTE.cyan; ctx.font='bold 46px sans-serif';
    ctx.fillText('寶可夢對戰：路卡利歐大亂鬥', GAME_W/2, 70);
    ctx.fillStyle='#fff'; ctx.font='18px sans-serif';
    ctx.fillText('選你的寶可夢！電腦：滑鼠點選或按數字鍵 1-4　　平板：點觸卡片', GAME_W/2, 105);
    ctx.font='15px sans-serif'; ctx.fillStyle=PALETTE.yellow;
    ctx.fillText('對戰中可使用道具「蔥油冰」恢復體力，先擊倒對手的寶可夢獲勝！', GAME_W/2, 130);

    this.buttons.forEach(b=>{
      const hover = Math.abs(mouseX-b.x)<b.w/2 && Math.abs(mouseY-b.y)<b.h/2;
      ctx.save();
      ctx.translate(b.x,b.y);
      ctx.fillStyle = hover?'rgba(0,240,255,0.18)':'rgba(255,255,255,0.06)';
      roundRect(-b.w/2,-b.h/2,b.w,b.h,16); ctx.fill();
      ctx.strokeStyle = hover?PALETTE.cyan:'rgba(255,255,255,0.3)'; ctx.lineWidth=2;
      roundRect(-b.w/2,-b.h/2,b.w,b.h,16); ctx.stroke();
      drawers[b.f.id](0,20,0.75,1);
      ctx.fillStyle='#fff'; ctx.font='bold 20px sans-serif'; ctx.textAlign='center';
      ctx.fillText(b.f.name, 0, b.h/2-14);
      ctx.restore();
    });
    drawFooter();
  }
};

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

function drawBgGradient(){
  const g = ctx.createLinearGradient(0,0,0,GAME_H);
  g.addColorStop(0, PALETTE.bg1); g.addColorStop(1, PALETTE.bg0);
  ctx.fillStyle=g; ctx.fillRect(0,0,GAME_W,GAME_H);
  // stars
  ctx.fillStyle='rgba(255,255,255,0.5)';
  for(let i=0;i<40;i++){
    const sx=(i*137)%GAME_W, sy=(i*89)%260+20;
    ctx.fillRect(sx,sy,2,2);
  }
}
function drawFooter(){
  ctx.textAlign='center'; ctx.font='12px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.fillText('AI未來創作營隊', GAME_W/2, GAME_H-10);
}

let itemUses = { player:1, enemy:1 };

function startBattle(idx){
  const rest = [0,1,2,3].filter(i=>i!==idx);
  const eIdx = rest[Math.floor(Math.random()*rest.length)];
  player = makeFighterState(FIGHTERS[idx], 260, true);
  enemy = makeFighterState(FIGHTERS[eIdx], 700, false);
  itemUses = { player:1, enemy:1 };
  log = [FIGHTERS[idx].name+' 對戰 '+FIGHTERS[eIdx].name+'！'];
  setState(battleState);
}

function pushLog(s){ log.push(s); if(log.length>3) log.shift(); }

const battleButtons = [
  {key:'attack', label:'① 攻擊', sub:'一般招式'},
  {key:'special', label:'② 特殊技', sub:null},
  {key:'item', label:'③ 蔥油冰', sub:'恢復 HP（限1次）'}
];

const battleState = {
  enter(){ this.playerTurn = true; this.ended=false; this.endTimer=0; },
  update(dt){
    updateFighterVisual(player,dt); updateFighterVisual(enemy,dt);
    updateParts(dt); updateFloats(dt);
    shake *= Math.pow(0.001, dt);
    if(freeze>0){ freeze-=dt; return; }

    if(this.ended){
      this.endTimer += dt;
      if(this.endTimer>0.6 && (input.justDown || keyDigit!==0)){
        input.justDown=false; keyDigit=0;
        setState(titleState);
      }
      return;
    }

    if(turnBusy){ input.justDown=false; keyDigit=0; return; }

    if(this.playerTurn){
      const bw=210,bh=64, gap=16;
      const startX = GAME_W/2 - (bw*3+gap*2)/2 + bw/2;
      const by = 470;
      let chosen = -1;
      battleButtons.forEach((b,i)=>{
        const bx = startX + i*(bw+gap);
        if(input.justDown && Math.abs(input.x-bx)<bw/2 && Math.abs(input.y-by)<bh/2) chosen=i;
      });
      if(keyDigit>=1 && keyDigit<=3) chosen = keyDigit-1;
      if(chosen===1) { /* special always available */ }
      if(chosen===2 && itemUses.player<=0) chosen=-1;
      if(chosen>=0){
        sfxSelect();
        this.playerAction(chosen);
      }
    }
    input.justDown=false; keyDigit=0;
  },
  playerAction(choice){
    if(choice===0){
      const dmg = player.def.atk*(0.85+Math.random()*0.3);
      const miss = Math.random()<0.05;
      pushLog(player.def.name+' 使出攻擊！');
      pendingAfter = ()=>this.checkAndContinue();
      attackAnim(player, enemy, dmg, false, miss);
    } else if(choice===1){
      const dmg = player.def.atk*(1.6+Math.random()*0.3);
      const miss = Math.random()<0.1;
      pushLog(player.def.name+' 使出「'+player.def.special+'」！');
      pendingAfter = ()=>this.checkAndContinue();
      attackAnim(player, enemy, dmg, true, miss);
    } else if(choice===2){
      itemUses.player--;
      pushLog(player.def.name+' 吃下蔥油冰，恢復體力！');
      const heal = Math.round(player.maxHp*0.4);
      healAnim(player, heal, ()=>this.checkAndContinue());
    }
  },
  checkAndContinue(){
    if(enemy.hp<=0){ this.endBattle(true); return; }
    this.playerTurn=false;
    setTimeout(()=>this.enemyAction(), 350);
  },
  enemyAction(){
    let choice;
    if(enemy.hp < enemy.maxHp*0.3 && itemUses.enemy>0 && Math.random()<0.7) choice=2;
    else choice = Math.random()<0.35 ? 1 : 0;
    if(choice===2){
      itemUses.enemy--;
      pushLog(enemy.def.name+' 吃下蔥油冰，恢復體力！');
      const heal = Math.round(enemy.maxHp*0.4);
      healAnim(enemy, heal, ()=>this.afterEnemy());
    } else if(choice===1){
      const dmg = enemy.def.atk*(1.6+Math.random()*0.3);
      const miss = Math.random()<0.1;
      pushLog(enemy.def.name+' 使出「'+enemy.def.special+'」！');
      pendingAfter = ()=>this.afterEnemy();
      attackAnim(enemy, player, dmg, true, miss);
    } else {
      const dmg = enemy.def.atk*(0.85+Math.random()*0.3);
      const miss = Math.random()<0.05;
      pushLog(enemy.def.name+' 使出攻擊！');
      pendingAfter = ()=>this.afterEnemy();
      attackAnim(enemy, player, dmg, false, miss);
    }
  },
  afterEnemy(){
    if(player.hp<=0){ this.endBattle(false); return; }
    this.playerTurn=true;
  },
  endBattle(playerWon){
    this.ended = true; this.endTimer=0; this.playerWon = playerWon;
    pushLog(playerWon ? (enemy.def.name+' 倒下了！'+player.def.name+' 獲勝！') : (player.def.name+' 倒下了……'));
    if(playerWon) sfxWin(); else sfxLose();
    burst((playerWon?enemy:player).x, (playerWon?enemy:player).y-30, playerWon?PALETTE.yellow:'#666', 30, 260);
  },
  draw(){
    drawBgGradient();
    // arena floor
    ctx.save();
    ctx.translate((Math.random()*2-1)*shake, (Math.random()*2-1)*shake);
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(GAME_W/2,420,420,60,0,0,7); ctx.fill();
    ctx.save();
    ctx.globalAlpha = player.flash>0 ? 0.5+0.5*Math.sin(player.flash*80) : 1;
    drawers[player.def.id](player.baseX+player.offsetX, player.y, 1.1*player.sx, player.facing);
    ctx.restore();
    ctx.save();
    ctx.globalAlpha = enemy.flash>0 ? 0.5+0.5*Math.sin(enemy.flash*80) : 1;
    drawers[enemy.def.id](enemy.baseX+enemy.offsetX, enemy.y, 1.1*enemy.sx, enemy.facing);
    ctx.restore();
    drawParts();
    drawFloats();
    ctx.restore();

    drawHpBar(player, 200, 60, 300);
    drawHpBar(enemy, GAME_W-200, 60, 300);

    // log box
    ctx.fillStyle='rgba(0,0,0,0.5)';
    roundRect(GAME_W/2-380,110,760,60,10); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='16px sans-serif'; ctx.textAlign='center';
    log.slice(-2).forEach((l,i)=>{ ctx.fillText(l, GAME_W/2, 132+i*22); });

    if(!this.ended){
      const bw=210,bh=64, gap=16;
      const startX = GAME_W/2 - (bw*3+gap*2)/2 + bw/2;
      const by=470;
      battleButtons.forEach((b,i)=>{
        const bx=startX+i*(bw+gap);
        const disabled = (b.key==='item' && itemUses.player<=0) || !this.playerTurn || turnBusy;
        const hover = !disabled && Math.abs(mouseX-bx)<bw/2 && Math.abs(mouseY-by)<bh/2;
        ctx.save(); ctx.translate(bx,by);
        ctx.fillStyle = disabled?'rgba(255,255,255,0.05)':(hover?'rgba(0,240,255,0.22)':'rgba(255,255,255,0.08)');
        roundRect(-bw/2,-bh/2,bw,bh,12); ctx.fill();
        ctx.strokeStyle = disabled?'rgba(255,255,255,0.15)':(hover?PALETTE.cyan:'rgba(255,255,255,0.4)');
        ctx.lineWidth=2; roundRect(-bw/2,-bh/2,bw,bh,12); ctx.stroke();
        ctx.fillStyle = disabled?'rgba(255,255,255,0.35)':'#fff';
        ctx.font='bold 19px sans-serif'; ctx.textAlign='center';
        let label = b.label;
        if(b.key==='special') label = '② '+player.def.special;
        ctx.fillText(label, 0, -6);
        ctx.font='12px sans-serif';
        ctx.fillText(b.sub || player.def.specialDesc, 0, 16);
        if(b.key==='item'){
          drawItem(-bw/2+22, 4, 0.7);
        }
        ctx.restore();
      });
      if(!this.playerTurn || turnBusy){
        ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='16px sans-serif'; ctx.textAlign='center';
        ctx.fillText('對手行動中…', GAME_W/2, 500);
      }
    } else {
      ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,GAME_W,GAME_H);
      ctx.textAlign='center';
      ctx.fillStyle = this.playerWon?PALETTE.yellow:'#ff2975';
      ctx.font='bold 44px sans-serif';
      ctx.fillText(this.playerWon?'勝利！':'再挑戰一次！', GAME_W/2, 250);
      ctx.fillStyle='#fff'; ctx.font='20px sans-serif';
      ctx.fillText(this.playerWon ? player.def.name+' 擊敗了 '+enemy.def.name+'！' : player.def.name+' 被 '+enemy.def.name+' 擊敗了……', GAME_W/2, 290);
      ctx.font='16px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.7)';
      ctx.fillText('點擊畫面 / 按空白鍵 重新選擇寶可夢', GAME_W/2, 330);
    }
    drawFooter();
  }
};

// ===== 主迴圈 =====
const STEP = 1/60;
let last = performance.now(), acc=0;
function frame(now){
  requestAnimationFrame(frame);
  acc += Math.min((now-last)/1000, 0.1);
  last = now;
  while(acc>=STEP){
    state.update(STEP);
    acc -= STEP;
  }
  state.draw();
}
setState(titleState);
requestAnimationFrame(frame);
</script>
</body>
