<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>👻 鬼屋大戰：幽靈 VS 老師</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: radial-gradient(ellipse at center, #241436 0%, #0a0512 70%, #000000 100%);
    font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
    overflow: hidden;
    color: #eee;
  }
  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }
  /* 鬼屋背景元素 */
  .moon {
    position: absolute;
    top: 6%; right: 10%;
    width: 90px; height: 90px;
    background: radial-gradient(circle at 35% 35%, #fffbe0, #d8cf9a 60%, #b3a86a 100%);
    border-radius: 50%;
    box-shadow: 0 0 60px 20px rgba(255, 250, 200, 0.25);
  }
  .bat {
    position: absolute;
    font-size: 22px;
    filter: drop-shadow(0 0 4px #000);
    animation: fly 9s linear infinite;
    opacity: 0.85;
  }
  @keyframes fly {
    0%   { transform: translate(-10vw, 20vh) scale(1); }
    50%  { transform: translate(60vw, 5vh) scale(1.3); }
    100% { transform: translate(120vw, 25vh) scale(1); }
  }
  .haunted-house {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: min(90vw, 900px);
    height: 62%;
  }
  .house-silhouette {
    position: absolute;
    bottom: 0; width: 100%; height: 100%;
    background: #150a22;
    clip-path: polygon(
      0% 100%, 0% 55%, 15% 55%, 15% 30%, 30% 30%, 30% 45%,
      45% 15%, 60% 45%, 60% 30%, 78% 30%, 78% 50%, 100% 50%, 100% 100%
    );
    border-top: 2px solid #3a2555;
  }
  .window {
    position: absolute;
    width: 34px; height: 44px;
    background: radial-gradient(circle, #ffcf4d 0%, #ff9d1f 60%, #7a4a00 100%);
    box-shadow: 0 0 25px 6px rgba(255, 170, 0, 0.6);
    animation: flicker 2.4s infinite ease-in-out;
  }
  .w1 { bottom: 30%; left: 20%; }
  .w2 { bottom: 30%; left: 68%; }
  .w3 { bottom: 12%; left: 44%; width: 46px; height: 60px; border-radius: 40% 40% 0 0; }
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    45% { opacity: 0.55; }
    60% { opacity: 0.9; }
  }
  .ground {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 8%;
    background: linear-gradient(#1a0f28, #05030a);
    border-top: 2px solid #402a5c;
  }
  .fog {
    position: absolute; bottom: 0; left: -20%; width: 140%; height: 14%;
    background: linear-gradient(to top, rgba(200,180,255,0.25), transparent);
    filter: blur(6px);
    animation: drift 14s ease-in-out infinite alternate;
  }
  @keyframes drift {
    from { transform: translateX(-3%); }
    to   { transform: translateX(3%); }
  }

  /* 角色 */
  .fighter {
    position: absolute;
    bottom: 9%;
    font-size: 90px;
    line-height: 1;
    user-select: none;
    transition: left 0.06s linear, transform 0.15s ease;
    filter: drop-shadow(0 8px 6px rgba(0,0,0,0.6));
  }
  #ghost { left: 20%; transform: scaleX(1); }
  #teacher { left: 68%; transform: scaleX(-1); }
  .hit-shake { animation: shake 0.3s; }
  @keyframes shake {
    0%,100% { transform: translateX(0) scaleX(var(--fx,1)); }
    25% { transform: translateX(-10px) scaleX(var(--fx,1)); }
    75% { transform: translateX(10px) scaleX(var(--fx,1)); }
  }
  .attack-pose { transform: scale(1.15) scaleX(var(--fx,1)); }

  .fx-text {
    position: absolute;
    font-size: 28px;
    font-weight: bold;
    color: #ff4d6d;
    text-shadow: 0 0 8px #000, 0 0 4px #ffea00;
    pointer-events: none;
    animation: pop 0.7s ease-out forwards;
  }
  @keyframes pop {
    0% { opacity: 1; transform: translateY(0) scale(0.6); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.4); }
  }

  /* UI */
  #ui {
    position: absolute; top: 0; left: 0; width: 100%;
    padding: 18px 3%;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 10;
  }
  .hp-block { width: 40%; }
  .hp-name {
    font-size: 18px; margin-bottom: 4px; text-shadow: 0 0 6px #000;
    display: flex; justify-content: space-between;
  }
  .hp-bar-bg {
    width: 100%; height: 20px; background: #2a1a3d;
    border: 2px solid #6a4a8f; border-radius: 10px; overflow: hidden;
  }
  .hp-bar {
    height: 100%; width: 100%;
    transition: width 0.25s ease;
  }
  #ghost-hp { background: linear-gradient(90deg, #8be9fd, #50e3c2); }
  #teacher-hp { background: linear-gradient(90deg, #ff6b6b, #ffa94d); }
  .vs {
    font-size: 34px; font-weight: bold; color: #ffea00;
    text-shadow: 0 0 12px #ff4d6d;
  }

  #title {
    position: absolute; top: 70px; width: 100%; text-align: center;
    font-size: 26px; letter-spacing: 4px; color: #d8c6ff;
    text-shadow: 0 0 10px #7a3fff;
    z-index: 5;
  }

  #controls {
    position: absolute; bottom: 14px; width: 100%; text-align: center;
    font-size: 14px; color: #b3a3d9; z-index: 10;
  }
  #controls kbd {
    background: #241436; border: 1px solid #6a4a8f; border-radius: 4px;
    padding: 2px 6px; margin: 0 2px; color: #fff;
  }

  #banner {
    position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
    font-size: 64px; font-weight: bold; color: #ffea00;
    text-shadow: 0 0 20px #ff4d6d, 0 0 40px #ff4d6d;
    opacity: 0; pointer-events: none; z-index: 20;
    text-align: center;
  }
  #banner.show { animation: bannerPop 1.8s ease forwards; }
  @keyframes bannerPop {
    0% { opacity: 0; transform: translate(-50%,-50%) scale(0.3); }
    20% { opacity: 1; transform: translate(-50%,-50%) scale(1.1); }
    35% { transform: translate(-50%,-50%) scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(1); }
  }

  #restart {
    position: absolute; top: 56%; left: 50%; transform: translateX(-50%);
    padding: 10px 22px; font-size: 16px; border-radius: 8px; border: none;
    background: #7a3fff; color: white; cursor: pointer; z-index: 20;
    display: none;
  }
  #restart:hover { background: #9a63ff; }
</style>
</head>
<body>
<div id="stage">
  <div class="moon"></div>
  <div class="bat" style="animation-delay:0s;">🦇</div>
  <div class="bat" style="animation-delay:-3s; top:10vh;">🦇</div>
  <div class="bat" style="animation-delay:-6s; top:2vh;">🦇</div>

  <div class="haunted-house">
    <div class="house-silhouette"></div>
    <div class="window w1"></div>
    <div class="window w2"></div>
    <div class="window w3"></div>
  </div>
  <div class="fog"></div>
  <div class="ground"></div>

  <div id="title">🏚️ 鬼屋大戰：幽靈 VS 老師 🏚️</div>

  <div id="ui">
    <div class="hp-block">
      <div class="hp-name"><span>👻 幽靈</span><span id="ghost-hp-num">100</span></div>
      <div class="hp-bar-bg"><div class="hp-bar" id="ghost-hp"></div></div>
    </div>
    <div class="vs">VS</div>
    <div class="hp-block">
      <div class="hp-name"><span id="teacher-hp-num">100</span><span>👩‍🏫 老師</span></div>
      <div class="hp-bar-bg"><div class="hp-bar" id="teacher-hp"></div></div>
    </div>
  </div>

  <div class="fighter" id="ghost">👻</div>
  <div class="fighter" id="teacher">👩‍🏫</div>

  <div id="banner"></div>
  <button id="restart" onclick="restartGame()">再打一場</button>

  <div id="controls">
    幽靈操作： <kbd>A</kbd>/<kbd>D</kbd> 移動　<kbd>SPACE</kbd> 攻擊　|
    老師操作： <kbd>←</kbd>/<kbd>→</kbd> 移動　<kbd>ENTER</kbd> 攻擊
  </div>
</div>

<script>
const stage = document.getElementById('stage');
const ghostEl = document.getElementById('ghost');
const teacherEl = document.getElementById('teacher');
const ghostHpBar = document.getElementById('ghost-hp');
const teacherHpBar = document.getElementById('teacher-hp');
const ghostHpNum = document.getElementById('ghost-hp-num');
const teacherHpNum = document.getElementById('teacher-hp-num');
const banner = document.getElementById('banner');
const restartBtn = document.getElementById('restart');

let state;

function resetState() {
  state = {
    ghostX: 20, teacherX: 68,
    ghostHp: 100, teacherHp: 100,
    ghostCooldown: false, teacherCooldown: false,
    over: false
  };
}
resetState();

const SPEED = 1.2;
const ATTACK_RANGE = 22;
const DAMAGE = [8, 10, 12, 15];

function clampX(x) { return Math.max(4, Math.min(88, x)); }

function render() {
  ghostEl.style.left = state.ghostX + '%';
  teacherEl.style.left = state.teacherX + '%';
  ghostHpBar.style.width = Math.max(0, state.ghostHp) + '%';
  teacherHpBar.style.width = Math.max(0, state.teacherHp) + '%';
  ghostHpNum.textContent = Math.max(0, Math.round(state.ghostHp));
  teacherHpNum.textContent = Math.max(0, Math.round(state.teacherHp));
  // face each other
  ghostEl.style.setProperty('--fx', state.ghostX <= state.teacherX ? 1 : -1);
  teacherEl.style.setProperty('--fx', state.teacherX <= state.ghostX ? 1 : -1);
  ghostEl.style.transform = `scaleX(${state.ghostX <= state.teacherX ? 1 : -1})`;
  teacherEl.style.transform = `scaleX(${state.teacherX <= state.ghostX ? 1 : -1})`;
}
render();

function spawnFx(text, xPercent) {
  const el = document.createElement('div');
  el.className = 'fx-text';
  el.textContent = text;
  el.style.left = xPercent + '%';
  el.style.bottom = '32%';
  stage.appendChild(el);
  setTimeout(() => el.remove(), 700);
}

function distance() { return Math.abs(state.ghostX - state.teacherX) * (stage.clientWidth / 100); }

function attack(attacker) {
  if (state.over) return;
  const isGhost = attacker === 'ghost';
  if (isGhost && state.ghostCooldown) return;
  if (!isGhost && state.teacherCooldown) return;

  const el = isGhost ? ghostEl : teacherEl;
  el.classList.add('attack-pose');
  setTimeout(() => el.classList.remove('attack-pose'), 150);

  if (isGhost) { state.ghostCooldown = true; setTimeout(() => state.ghostCooldown = false, 500); }
  else { state.teacherCooldown = true; setTimeout(() => state.teacherCooldown = false, 500); }

  if (distance() < ATTACK_RANGE) {
    const dmg = DAMAGE[Math.floor(Math.random() * DAMAGE.length)];
    if (isGhost) {
      state.teacherHp -= dmg;
      spawnFx('-' + dmg, state.teacherX);
      teacherEl.classList.add('hit-shake');
      setTimeout(() => teacherEl.classList.remove('hit-shake'), 300);
    } else {
      state.ghostHp -= dmg;
      spawnFx('-' + dmg, state.ghostX);
      ghostEl.classList.add('hit-shake');
      setTimeout(() => ghostEl.classList.remove('hit-shake'), 300);
    }
    checkWin();
    render();
  } else {
    spawnFx('MISS', isGhost ? state.ghostX + 6 : state.teacherX - 6);
  }
}

function checkWin() {
  if (state.ghostHp <= 0 || state.teacherHp <= 0) {
    state.over = true;
    const msg = state.ghostHp <= 0 && state.teacherHp <= 0
      ? '同歸於盡！🤝'
      : state.ghostHp <= 0
        ? '👩‍🏫 老師獲勝！鬼屋恢復平靜…'
        : '👻 幽靈獲勝！老師落荒而逃！';
    banner.textContent = msg;
    banner.classList.add('show');
    setTimeout(() => { restartBtn.style.display = 'block'; }, 900);
  }
}

function restartGame() {
  resetState();
  banner.classList.remove('show');
  banner.textContent = '';
  restartBtn.style.display = 'none';
  render();
}

const keys = {};
window.addEventListener('keydown', (e) => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ') { e.preventDefault(); attack('ghost'); }
  if (e.key === 'Enter') { e.preventDefault(); attack('teacher'); }
});
window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

function loop() {
  if (!state.over) {
    if (keys['a']) state.ghostX = clampX(state.ghostX - SPEED * 0.3);
    if (keys['d']) state.ghostX = clampX(state.ghostX + SPEED * 0.3);
    if (keys['arrowleft']) state.teacherX = clampX(state.teacherX - SPEED * 0.3);
    if (keys['arrowright']) state.teacherX = clampX(state.teacherX + SPEED * 0.3);
    render();
  }
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
