const GAME_W = 960, GAME_H = 540;

const ctx = canvas.getContext('2d');
function resize(){
  const scale = Math.min(innerWidth/GAME_W, innerHeight/GAME_H);
  const dpr = Math.min(devicePixelRatio||1, 2);
  canvas.width = GAME_W*scale*dpr; canvas.height = GAME_H*scale*dpr;
  canvas.style.width = GAME_W*scale+'px'; canvas.style.height = GAME_H*scale+'px';
  ctx.setTransform(scale*dpr,0,0,scale*dpr,0,0);
  canvas._scale = scale;
}

/* ===== 音效：壓縮器母線＋隨機音高 ===== */
let AC=null, master=null, muted=false;
function audio(){
  if(!AC){
    AC = new (window.AudioContext||window.webkitAudioContext)();
    const comp = AC.createDynamicsCompressor();
    comp.threshold.value=-16; comp.knee.value=24; comp.ratio.value=8;
    master = AC.createGain(); master.gain.value=0.9;
    master.connect(comp).connect(AC.destination);
  }
  if(AC.state==='suspended') AC.resume();
  return AC;
}
addEventListener('pointerdown', audio, {once:true});
addEventListener('keydown', audio, {once:true});
function beep(freq=440,dur=0.1,type='square',vol=0.15,slide=0){
  if(muted||!AC) return;
  const ac=audio(); freq*=0.95+Math.random()*0.1;
  const o=ac.createOscillator(), g=ac.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,ac.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30,freq+slide),ac.currentTime+dur);
  g.gain.setValueAtTime(vol,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
  o.connect(g).connect(master); o.start(); o.stop(ac.currentTime+dur);
}
function noiseS(dur=0.15,vol=0.12){
  if(muted||!AC) return;
  const ac=audio(), n=Math.floor(ac.sampleRate*dur);
  const buf=ac.createBuffer(1,n,ac.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
  const s=ac.createBufferSource(); s.buffer=buf;
  const g=ac.createGain(); g.gain.value=vol;
  s.connect(g).connect(master); s.start();
}

/* ===== 粒子 / 飄字（swap-pop） ===== */
const parts=[];
function burst(x,y,color,n=14,speed=240,up=0){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=speed*(0.3+Math.random()*0.7);
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-up,life:0.5,max:0.5,color});
  }
}
function updateParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=500*dt; p.life-=dt;
    if(p.life<=0){ parts[i]=parts[parts.length-1]; parts.pop(); }
  }
}
function drawParts(){
  for(const p of parts){
    ctx.globalAlpha=Math.max(0,p.life*2);
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-3,p.y-3,6,6);
  }
  ctx.globalAlpha=1;
}
const floaters=[];
function addFloat(x,y,text,color,big){ floaters.push({x,y,text,color,life:0.95,big}); }
function updateFloats(dt){
  for(let i=floaters.length-1;i>=0;i--){
    const f=floaters[i]; f.y-=42*dt; f.life-=dt;
    if(f.life<=0){ floaters[i]=floaters[floaters.length-1]; floaters.pop(); }
  }
}
function drawFloats(){
  ctx.textAlign='center';
  for(const f of floaters){
    ctx.globalAlpha=Math.max(0,Math.min(1,f.life*1.5));
    ctx.font=(f.big?'bold 30px':'bold 24px')+' sans-serif';
    ctx.strokeStyle='rgba(0,0,0,.6)'; ctx.lineWidth=4; ctx.lineJoin='round';
    ctx.strokeText(f.text,f.x,f.y);
    ctx.fillStyle=f.color; ctx.fillText(f.text,f.x,f.y);
  }
  ctx.globalAlpha=1;
}

let skyCv=null;
function bakeSky(gym){
  skyCv=document.createElement('canvas'); skyCv.width=GAME_W; skyCv.height=GAME_H;
  const c=skyCv.getContext('2d');
  const g=c.createLinearGradient(0,0,0,GAME_H);
  g.addColorStop(0,gym.sky[0]); g.addColorStop(0.55,gym.sky[1]); g.addColorStop(1,gym.sky[2]);
  c.fillStyle=g; c.fillRect(0,0,GAME_W,GAME_H);
  const sg=c.createRadialGradient(GAME_W*0.82,90,10,GAME_W*0.82,90,180);
  sg.addColorStop(0,'rgba(255,246,214,0.9)'); sg.addColorStop(1,'rgba(255,246,214,0)');
  c.fillStyle=sg; c.fillRect(GAME_W*0.82-180,-90,360,360);
  c.fillStyle=gym.sun; c.beginPath(); c.arc(GAME_W*0.82,90,34,0,7); c.fill();
  // 遠山
  c.fillStyle='rgba(60,80,110,.28)';
  for(let i=0;i<5;i++){
    const bx=i*240-60;
    c.beginPath(); c.moveTo(bx,400); c.lineTo(bx+130,300-(i%2)*40); c.lineTo(bx+280,400); c.closePath(); c.fill();
  }
  // 雲
  c.fillStyle='rgba(255,255,255,0.5)';
  [[90,70,46],[150,90,34],[520,50,40],[580,72,28],[300,130,26],[750,150,36]].forEach(([cx,cy,r])=>{
    c.beginPath(); c.ellipse(cx,cy,r,r*0.6,0,0,7); c.fill();
  });
}

/* ===== 動畫系統（tween 鏈） ===== */
let anim=null;
function tween(dur,update,onDone){ anim={t:0,dur,update,onDone}; turnBusy=true; }
function tickAnim(dt){
  if(!anim) return;
  anim.t+=dt;
  const p=Math.min(1,anim.t/anim.dur);
  if(anim.update) anim.update(p,dt);
  if(p>=1){ const d=anim.onDone; anim=null; if(d) d(); else turnBusy=false; }
}
const fx=[];  // {type:'orb'|'ring'|'beam'|'shield', ...}
function updateFx(dt){
  for(let i=fx.length-1;i>=0;i--){
    const f=fx[i]; f.t+=dt;
    if(f.type==='orb'){
      const p=Math.min(1,f.t/f.dur);
      f.x=f.x0+(f.x1-f.x0)*p; f.y=f.y0+(f.y1-f.y0)*p - Math.sin(p*Math.PI)*30;
      if(Math.random()<0.7) parts.push({x:f.x,y:f.y,vx:(Math.random()*2-1)*40,vy:(Math.random()*2-1)*40,life:0.3,max:0.3,color:f.color});
    }
    if(f.t>=f.dur){ fx[i]=fx[fx.length-1]; fx.pop(); }
  }
}
function drawFx(){
  for(const f of fx){
    const p=Math.min(1,f.t/f.dur);
    if(f.type==='orb'){
      ctx.fillStyle='rgba(127,216,255,.4)';
      ctx.beginPath(); ctx.arc(f.x,f.y,20,0,7); ctx.fill();
      ctx.fillStyle=f.color;
      ctx.beginPath(); ctx.arc(f.x,f.y,12,0,7); ctx.fill();
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(f.x-3,f.y-3,4,0,7); ctx.fill();
    } else if(f.type==='ring'){
      ctx.globalAlpha=1-p;
      ctx.strokeStyle=f.color; ctx.lineWidth=8*(1-p*0.5);
      ctx.beginPath(); ctx.ellipse(f.x,f.y,20+p*f.r,(20+p*f.r)*0.3,0,0,7); ctx.stroke();
      ctx.globalAlpha=1;
    } else if(f.type==='beam'){
      const a=p<0.3?p/0.3:(1-p)/0.7;
      ctx.globalAlpha=a;
      ctx.fillStyle=f.color;
      ctx.fillRect(f.x-f.w/2,0,f.w,f.y);
      ctx.fillStyle='#fff';
      ctx.fillRect(f.x-f.w/6,0,f.w/3,f.y);
      ctx.globalAlpha=1;
    }
  }
}

/* ===== 傷害結算 ===== */
function applyHit(att,def2,base,isSpecial){
  const mul=typeMul(att.def.type,def2.def.type);
  let dmg=base*mul*(0.9+Math.random()*0.2);
  if(def2.guard){ dmg*=0.5; }
  dmg=Math.max(1,Math.round(dmg));
  def2.hp=Math.max(0,def2.hp-dmg);
  def2.flash=0.15; def2.sx=1.3; def2.sy=0.7;
  shake=isSpecial?10:5; freeze=isSpecial?0.1:0.05;
  burst(def2.baseX,def2.y-40,isSpecial?PALETTE.yellow:PALETTE.pink,isSpecial?24:12,isSpecial?300:220);
  addFloat(def2.baseX,def2.y-90,'-'+dmg,isSpecial?PALETTE.yellow:'#fff',isSpecial);
  if(mul>1){ addFloat(def2.baseX,def2.y-124,'效果絕佳！',PALETTE.cyan,true); sfxSuper(); }
  else if(mul<1){ addFloat(def2.baseX,def2.y-124,'效果不太好…','#b9b9c9'); }
  if(def2.guard){ addFloat(def2.baseX,def2.y-56,'防禦！',TYPES[def2.def.type].color); sfxGuard(); }
  if(isSpecial) sfxSpecial(); else sfxHit();
  return dmg;
}

/* ===== 招式演出 ===== */
function doAttack(att,def2,onDone){
  const dir=att.isPlayer?1:-1;
  const miss=Math.random()<0.04;
  att.sx=0.75; att.sy=1.25;
  tween(0.16,p=>{ att.offsetX=90*dir*p; },()=>{
    if(miss){ addFloat(def2.baseX,def2.y-80,'閃避！',PALETTE.cyan); beep(300,0.06,'triangle',0.1); }
    else applyHit(att,def2,att.atk,false);
    tween(0.18,p=>{ att.offsetX=90*dir*(1-p); },()=>{ att.offsetX=0; turnBusy=false; onDone(); });
  });
}
function doSpecial(att,def2,onDone){
  const dir=att.isPlayer?1:-1;
  const miss=Math.random()<0.1;
  const id=att.def.id;
  const finish=()=>{ turnBusy=false; onDone(); };
  const impact=()=>{
    if(miss){ addFloat(def2.baseX,def2.y-80,'閃避！',PALETTE.cyan); beep(300,0.06,'triangle',0.1); }
    else applyHit(att,def2,att.atk*1.7,true);
  };
  if(id==='lucario'){
    sfxCharge();
    tween(0.4,p=>{                               // 蓄力
      att.sx=1-p*0.2; att.sy=1+p*0.15;
      if(Math.random()<0.5) parts.push({x:att.baseX+dir*40*Math.random()*2-40,y:att.y-40+(Math.random()*2-1)*50,vx:dir*60,vy:0,life:0.25,max:0.25,color:'#7fd8ff'});
    },()=>{
      fx.push({type:'orb',t:0,dur:0.32,x0:att.baseX+dir*46,y0:att.y-36,x1:def2.baseX,y1:def2.y-36,x:att.baseX,y:att.y-36,color:'#4f9be0'});
      beep(520,0.3,'sine',0.12,500);
      tween(0.32,()=>{},()=>{ impact(); tween(0.15,()=>{},finish); });
    });
  } else if(id==='meltan'){
    tween(0.28,p=>{ att.sy=1-p*0.5; att.sx=1+p*0.4; },()=>{   // 融化
      noiseS(0.2,0.12);
      tween(0.16,p=>{ att.offsetX=(def2.baseX-att.baseX)*p; att.sy=0.5; },()=>{
        impact();
        tween(0.25,p=>{ att.offsetX=(def2.baseX-att.baseX)*(1-p); att.sy=0.5+p*0.5; att.sx=1.4-p*0.4; },finish);
      });
    });
  } else if(id==='gureton'){
    tween(0.3,p=>{ att.offsetY=-110*Math.sin(p*Math.PI/2); },()=>{   // 跳起
      tween(0.12,p=>{ att.offsetY=-110*(1-p); },()=>{
        att.offsetY=0;
        fx.push({type:'ring',t:0,dur:0.5,x:att.baseX,y:att.y+56,r:320,color:'#ffa72e'});
        shake=13; noiseS(0.3,0.16);
        impact();
        tween(0.2,()=>{},finish);
      });
    });
  } else { // arceus 裁決之光
    sfxCharge(); whiteFlash=0.35;
    tween(0.35,()=>{},()=>{
      for(let i=0;i<3;i++)
        fx.push({type:'beam',t:-i*0.09,dur:0.5,x:def2.baseX+(i-1)*36,y:def2.y+40,w:34,color:'rgba(255,225,120,.85)'});
      beep(1046,0.4,'sine',0.13,-400);
      tween(0.4,()=>{},()=>{ impact(); tween(0.15,()=>{},finish); });
    });
  }
}
function doGuard(f,onDone){
  f.guard=true; f.sx=0.9; f.sy=0.94;
  addFloat(f.baseX,f.y-90,'防禦姿態！',TYPES[f.def.type].color);
  sfxGuard();

}
function doItem(f,onDone){

  burst(f.baseX,f.y-30,PALETTE.cyan,16,160);

}

      roundRect(x-26,y-36,58,20,9); ctx.fill();
      ctx.fillStyle='#fff'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center';
      ctx.fillText(f.type+'屬性',x+3,y-22);
      ctx.textAlign='left'; ctx.font='13px sans-serif';
      drawTextOutline('HP '+f.maxHp+'　攻擊 '+f.atk,x-26,y-2,PALETTE.ink,'rgba(255,255,255,0.8)',3);
      drawTextOutline('絕招：'+f.special,x-26,y+18,PALETTE.ink,'rgba(255,255,255,0.8)',3);
      const mul=typeMul(f.type,foe.type);
      const tag=mul>1?'效果絕佳 ▲':mul<1?'效果不佳 ▼':'普通 ─';
      const tagC=mul>1?'#00a844':mul<1?'#c0392b':'#6a7a94';
      ctx.font='bold 15px sans-serif';
      drawTextOutline(tag,x-26,y+42,tagC,'rgba(255,255,255,0.85)',3);
      ctx.textAlign='center';
    });
    drawFooter();
  }
};

function startBattle(idx){
  const gym=GYMS[curGym];
  player=makeFighter(FIGHTERS[idx],260,true,1,1);
  enemy=makeFighter(FIGHTERS[gym.foe],700,false,gym.hpMul,gym.atkMul);
  enemy.ex=!!gym.ex;
  itemUses={player:1,enemy:1};
  usedItem=false;
  log=[FIGHTERS[idx].name+' 挑戰 '+(gym.ex?'冠軍・':'')+enemy.def.name+'！'];
  parts.length=0; floaters.length=0; fx.length=0; anim=null; turnBusy=false;
  setState(battleState);
}

const battleButtons=[
  {key:'attack', label:'① 攻擊', sub:'一般招式'},
  {key:'special', label:'② 絕招', sub:null},
  {key:'guard', label:'③ 防禦', sub:'傷害減半＋微回復'},
  {key:'item', label:'④ 蔥油冰', sub:'回復40%（限1次）'},
];

const battleState={
  enter(){
    this.playerTurn=true; this.ended=false; this.endTimer=0; this.introT=0;
    this.stars=0; this.shownStars=0; this.btns2=[];
  },
  update(dt){
    // 入場演出
    if(this.introT<1.1){
      this.introT+=dt;
      player.offsetX=-(1-Math.min(1,this.introT/0.8))*300;
      enemy.offsetX=(1-Math.min(1,this.introT/0.8))*300;
      if(this.introT>=1.1){ player.offsetX=0; enemy.offsetX=0; }
      input.justDown=false; keyDigit=0;
      return;
    }
    upFighter(player,dt); upFighter(enemy,dt);
    updateParts(dt); updateFloats(dt); updateFx(dt);
    shake*=Math.pow(0.001,dt);
    whiteFlash=Math.max(0,whiteFlash-dt);
    if(freeze>0){ freeze-=dt; return; }
    tickAnim(dt);
    if(this.ended){
      this.endTimer+=dt;
      const target=Math.min(this.stars,Math.floor((this.endTimer-0.5)/0.45)+1);
      if(this.won&&target>this.shownStars&&target>=1){ this.shownStars=target; sfxStar(); burst(GAME_W/2+(this.shownStars-2)*70,236,'#f4c531',14,200); }
      if(this.endTimer>0.6){
        let act=null;
        if(input.justDown){
          for(const b of this.btns2)
            if(input.x>=b.x&&input.x<=b.x+b.w&&input.y>=b.y&&input.y<=b.y+b.h) act=b.fn;
        }
        if(keyDigit===-1) act=this.won?(curGym<4?()=>{curGym++;setState(pickState);}:()=>setState(gymState)):()=>startBattle(FIGHTERS.indexOf(player.def));
        if(act){ input.justDown=false; keyDigit=0; sfxSelect(); act(); return; }
      }
      input.justDown=false; keyDigit=0;
      return;
    }
    if(turnBusy){ input.justDown=false; keyDigit=0; return; }
    if(this.playerTurn){
      const bw=210,bh=66,gap=14;
      const startX=GAME_W/2-(bw*4+gap*3)/2+bw/2, by=478;
      let chosen=-1;
      battleButtons.forEach((b,i)=>{
        const bx=startX+i*(bw+gap);
        if(input.justDown&&Math.abs(input.x-bx)<bw/2&&Math.abs(input.y-by)<bh/2) chosen=i;
      });
      if(keyDigit>=1&&keyDigit<=4) chosen=keyDigit-1;
      if(chosen===3&&itemUses.player<=0){ if(keyDigit||input.justDown) sfxDeny(); chosen=-1; }
      if(chosen>=0){ sfxSelect(); this.playerAction(chosen); }
    }
    input.justDown=false; keyDigit=0;
  },
  playerAction(c){
    player.guard=false;
    this.playerTurn=false;
    const next=()=>this.checkAndContinue();
    if(c===0){ pushLog(player.def.name+' 使出攻擊！'); doAttack(player,enemy,next); }
    else if(c===1){ pushLog(player.def.name+' 使出「'+player.def.special+'」！'); doSpecial(player,enemy,next); }
    else if(c===2){ pushLog(player.def.name+' 擺出防禦姿態！'); doGuard(player,next); }
    else { itemUses.player--; usedItem=true; pushLog(player.def.name+' 吃下蔥油冰！'); doItem(player,next); }
  },
  checkAndContinue(){
    if(enemy.hp<=0){ this.endBattle(true); return; }
    setTimeout(()=>{ if(state===battleState&&!this.ended) this.enemyAction(); },420);
  },
  enemyAction(){
    enemy.guard=false;
    const smart=curGym>=2;
    let c;
    if(enemy.hp<enemy.maxHp*0.3&&itemUses.enemy>0&&Math.random()<0.7) c=3;
    else if(smart&&enemy.hp<enemy.maxHp*0.5&&Math.random()<0.22) c=2;
    else if(Math.random()<0.3+curGym*0.08) c=1;
    else c=0;
    const next=()=>this.afterEnemy();
    if(c===3){ itemUses.enemy--; pushLog(enemy.def.name+' 吃下蔥油冰！'); doItem(enemy,next); }
    else if(c===2){ pushLog(enemy.def.name+' 擺出防禦姿態！'); doGuard(enemy,next); }
    else if(c===1){ pushLog(enemy.def.name+' 使出「'+enemy.def.special+'」！'); doSpecial(enemy,player,next); }
    else { pushLog(enemy.def.name+' 使出攻擊！'); doAttack(enemy,player,next); }
  },
  afterEnemy(){
    if(player.hp<=0){ this.endBattle(false); return; }
    this.playerTurn=true;
  },
  endBattle(won){
    this.ended=true; this.endTimer=0; this.won=won; this.shownStars=0;
    const loser=won?enemy:player;
    loser.koT=0.01;
    pushLog(won?(enemy.def.name+' 倒下了！'+player.def.name+' 獲勝！'):(player.def.name+' 倒下了……'));
    if(won){
      this.stars=1+(player.hp>=player.maxHp*0.5?1:0)+(!usedItem?1:0);
      if(this.stars>save.stars[curGym]){ save.stars[curGym]=this.stars; this.newBest=true; }
      persist();
      sfxWin();
    } else sfxLose();
    burst(loser.baseX,loser.y-30,won?PALETTE.yellow:'#666',30,260);
  },
  draw(){
    ctx.drawImage(skyCv,0,0);
    ctx.save();
    ctx.translate((Math.random()*2-1)*shake,(Math.random()*2-1)*shake);
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(GAME_W/2,420,420,60,0,0,7); ctx.fill();
    // 擂臺圈
    ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.ellipse(GAME_W/2,420,360,46,0,0,7); ctx.stroke();
    for(const f of [player,enemy]){
      ctx.save();
      const ko=f.koT>0?Math.min(1,f.koT):0;
      ctx.globalAlpha=(f.flash>0?0.5+0.5*Math.sin(f.flash*80):1)*(1-ko*0.6);
      if(ko>0){ ctx.translate(f.baseX+f.offsetX,f.y+ko*30); ctx.rotate(f.facing*ko*1.2); ctx.translate(-(f.baseX+f.offsetX),-(f.y+ko*30)); }
      drawers[f.def.id](f.baseX+f.offsetX,f.y+(f.offsetY||0)+(ko*24),1.1*f.sx,f.facing,f.ex);
      ctx.restore();
      if(f.guard){                                     // 防禦盾
        ctx.strokeStyle=TYPES[f.def.type].color; ctx.lineWidth=4;
        ctx.globalAlpha=0.6+Math.sin(performance.now()*0.01)*0.2;
        ctx.beginPath(); ctx.arc(f.baseX,f.y-20,62,0,7); ctx.stroke();
        ctx.globalAlpha=1;
      }
    }
    // 回合指示箭頭
    if(!this.ended&&!turnBusy&&this.introT>=1.1){
      const f=this.playerTurn?player:enemy;
      const bob=Math.sin(performance.now()*0.005)*5;
      ctx.fillStyle=this.playerTurn?'#00a844':'#c0392b';
      ctx.beginPath();
      ctx.moveTo(f.baseX-10,f.y-118+bob); ctx.lineTo(f.baseX+10,f.y-118+bob); ctx.lineTo(f.baseX,f.y-102+bob);
      ctx.closePath(); ctx.fill();
    }
    drawFx();
    drawParts();
    drawFloats();
    ctx.restore();
    if(whiteFlash>0){ ctx.fillStyle='rgba(255,255,240,'+(whiteFlash*1.4)+')'; ctx.fillRect(0,0,GAME_W,GAME_H); }
    drawHpBar(player,205,52,300);
    drawHpBar(enemy,GAME_W-205,52,300);
    // log
    ctx.fillStyle='rgba(0,0,0,0.5)';
    roundRect(GAME_W/2-380,104,760,56,10); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='16px sans-serif'; ctx.textAlign='center';
    log.slice(-2).forEach((l,i)=>ctx.fillText(l,GAME_W/2,126+i*22));
    // 入場橫幅
    if(this.introT<1.1){
      ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,220,GAME_W,90);
      ctx.textAlign='center'; ctx.font='bold 40px sans-serif';
      drawTextOutline('第'+(curGym+1)+'館　'+GYMS[curGym].name,GAME_W/2,278,'#fff','rgba(31,95,174,0.9)',6);
      return;
    }
    if(!this.ended){
      const bw=210,bh=66,gap=14;
      const startX=GAME_W/2-(bw*4+gap*3)/2+bw/2, by=478;
      battleButtons.forEach((b,i)=>{
        const bx=startX+i*(bw+gap);
        const disabled=(b.key==='item'&&itemUses.player<=0)||!this.playerTurn||turnBusy;
        const hover=!disabled&&Math.abs(mouseX-bx)<bw/2&&Math.abs(mouseY-by)<bh/2;
        ctx.save(); ctx.translate(bx,by);
        ctx.fillStyle=disabled?'rgba(255,255,255,0.18)':(hover?'rgba(255,255,255,0.62)':'rgba(255,255,255,0.4)');
        roundRect(-bw/2,-bh/2,bw,bh,12); ctx.fill();
        ctx.strokeStyle=disabled?'rgba(38,50,74,0.2)':(hover?'#1f5fae':'rgba(38,50,74,0.4)');
        ctx.lineWidth=2; roundRect(-bw/2,-bh/2,bw,bh,12); ctx.stroke();
        ctx.font='bold 19px sans-serif'; ctx.textAlign='center';
        let label=b.label;
        if(b.key==='special') label='② '+player.def.special;
        const tc=disabled?'rgba(38,50,74,0.4)':PALETTE.ink;
        drawTextOutline(label,0,-8,tc,'rgba(255,255,255,0.7)',2);
        ctx.font='12px sans-serif';
        drawTextOutline(b.sub||player.def.specialDesc,0,16,tc,'rgba(255,255,255,0.7)',2);
        if(b.key==='item') drawItem(-bw/2+22,4,0.6);
        ctx.restore();
      });
      if(!this.playerTurn||turnBusy){
        ctx.font='16px sans-serif'; ctx.textAlign='center';
        drawTextOutline(turnBusy?'…':'對手行動中…',GAME_W/2,432,PALETTE.ink,'rgba(255,255,255,0.8)',3);
      }
    } else {
      ctx.fillStyle='rgba(0,0,0,0.62)'; ctx.fillRect(0,0,GAME_W,GAME_H);
      ctx.textAlign='center';
      const allClear=save.stars.every(s=>s>0);
      ctx.fillStyle=this.won?PALETTE.yellow:'#ff2975';
      ctx.font='bold 46px sans-serif';
      ctx.fillText(this.won?(curGym===4&&allClear?'聯盟冠軍誕生！':'道館攻略成功！'):'再挑戰一次！',GAME_W/2,150);
      ctx.fillStyle='#fff'; ctx.font='20px sans-serif';
      ctx.fillText(this.won?player.def.name+' 擊敗了 '+(enemy.ex?'冠軍・':'')+enemy.def.name+'！':player.def.name+' 被擊敗了……換個屬性試試？',GAME_W/2,190);
      if(this.won){
        for(let s2=0;s2<3;s2++){
          const lit=s2<this.shownStars;
          const pop=lit&&this.endTimer-(0.5+s2*0.45)<0.25?1.5-(this.endTimer-(0.5+s2*0.45))*2:1;
          drawStar(GAME_W/2+(s2-1)*70,236,26*Math.max(1,pop),lit?'#f4c531':'rgba(255,255,255,0.15)');
        }
        ctx.font='15px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.85)';
        ctx.fillText('剩餘 HP '+Math.ceil(player.hp)+'/'+player.maxHp+'　蔥油冰 '+(usedItem?'已使用':'未使用'),GAME_W/2,296);
        if(this.newBest&&this.endTimer>1.4){ ctx.fillStyle='#f4c531'; ctx.font='bold 19px sans-serif'; ctx.fillText('★ 新紀錄！ ★',GAME_W/2,326); }
      }
      // 按鈕
      this.btns2=[];
      const defs=[];
      if(this.won&&curGym<4) defs.push(['下一道館 ▶',()=>{curGym++;setState(pickState);},'#00f0ff']);
      defs.push(['再戰一次',()=>startBattle(FIGHTERS.indexOf(player.def)),'#f4c531']);
      defs.push(['道館選單',()=>setState(gymState),'rgba(255,255,255,0.85)']);
      const bw=196,bh=56,gap=20,x0=(GAME_W-(bw*defs.length+gap*(defs.length-1)))/2;
      defs.forEach((d,i)=>{
        const x=x0+i*(bw+gap), y=366;
        this.btns2.push({x,y,w:bw,h:bh,fn:d[1]});
        ctx.fillStyle='rgba(20,26,44,0.85)';
        roundRect(x,y,bw,bh,12); ctx.fill();
        ctx.strokeStyle=d[2]; ctx.lineWidth=2.5;
        roundRect(x,y,bw,bh,12); ctx.stroke();
        ctx.fillStyle=d[2]; ctx.font='bold 20px sans-serif';
        ctx.fillText(d[0],x+bw/2,y+36);
      });
      ctx.font='15px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.7)';
      ctx.fillText('💻 空白鍵＝'+(this.won?(curGym<4?'下一道館':'道館選單'):'再戰一次'),GAME_W/2,458);
    }
    drawFooter();
  }
};
function upFighter(f,dt){
  f.sx+=(1-f.sx)*10*dt; f.sy+=(1-f.sy)*10*dt;
  f.dispHp+=(f.hp-f.dispHp)*Math.min(1,8*dt);
  if(f.flash>0) f.flash-=dt;
  if(f.koT>0) f.koT=Math.min(1,f.koT+dt*2);
}
function drawHpBar(f,cx,cy,w){
  const pct=Math.max(0,f.hp/f.maxHp), dPct=Math.max(0,f.dispHp/f.maxHp);
  ctx.fillStyle='rgba(0,0,0,0.5)'; roundRect(cx-w/2-6,cy-24,w+12,46,10); ctx.fill();
  ctx.fillStyle='#333'; ctx.fillRect(cx-w/2,cy,w,12);
  ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.fillRect(cx-w/2,cy,w*dPct,12);   // 殘影
  ctx.fillStyle=pct>0.5?'#00a844':pct>0.2?'#ffcf5c':'#b13e53';
  ctx.fillRect(cx-w/2,cy,w*pct,12);
  ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.strokeRect(cx-w/2,cy,w,12);
  ctx.fillStyle='#fff'; ctx.font='bold 14px sans-serif'; ctx.textAlign='center';
  ctx.fillText((f.ex?'冠軍・':'')+f.def.name+'  '+Math.max(0,Math.ceil(f.hp))+'/'+f.maxHp,cx,cy-8);
  ctx.fillStyle=TYPES[f.def.type].color;
  roundRect(cx-w/2-2,cy+16,52,17,8); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 11px sans-serif';
  ctx.fillText(f.def.type,cx-w/2+24,cy+28.5);
}

/* ===== 主迴圈 ===== */
const STEP=1/60;
let last=performance.now(), acc=0;
function frame(now){
  requestAnimationFrame(frame);
  acc+=Math.min((now-last)/1000,0.1);
  last=now;
  while(acc>=STEP){
    state.update(STEP);
    acc-=STEP;
  }
  state.draw();
}
setState(titleState);
requestAnimationFrame(frame);

/* ===== 測試掛鉤（QA 自動化） ===== */
window.__test=()=>({ state:stateName(), gym:curGym, stars:save.stars.slice(), unlocked:unlockedCount(),
  playerHp:player?player.hp:0, playerMax:player?player.maxHp:0, enemyHp:enemy?enemy.hp:0,
  turn:state===battleState?(battleState.playerTurn?'player':'enemy'):'', busy:turnBusy,
  ended:state===battleState?battleState.ended:false, won:state===battleState?!!battleState.won:false,
  itemLeft:itemUses.player, usedItem });
window.__weaken=n=>{ if(enemy) enemy.hp=Math.min(enemy.hp,n||5); };
window.__healP=()=>{ if(player){ player.hp=player.maxHp; } };
</script>
