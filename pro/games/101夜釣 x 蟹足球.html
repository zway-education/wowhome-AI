<!doctype html>
<!-- 專業AI升級 v6：離屏烘焙星雲夜景與101、水下月光光柱/深水魚影/流星、足球立體烘焙精靈與草皮質感、進球彩帶＋球網波動、程序化殘響＋場景氛圍音（水波/夜風/人群）與ducking -->
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>101夜釣 x 蟹足球</title>
<style>
  html,body{margin:0;height:100%;background:#070c1d;overflow:hidden;touch-action:none;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
  body{background:radial-gradient(ellipse at 50% -20%, #122048, #070c1d 70%)}
  canvas{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);touch-action:none}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
'use strict';
/* 101 夜釣戰隊 × 蟹將盃足球 —— 專業AI升級版
   雙遊戲街機櫃：🎣 大樓夜釣（鐵皮特工在 101 頂樓夜釣）＋ ⚽ 螃蟹足球（紅蟹 vs 藍蟹 75 秒對決）
   固定時間步進、狀態機、粒子/震動/hit-stop、Web Audio 音效 */
const GAME_W = 960, GAME_H = 540, WATER_Y = 300;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const REDUCED = matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
const TOUCH_DEV = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

function resize(){
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = Math.round(GAME_W * scale * dpr); canvas.height = Math.round(GAME_H * scale * dpr);
  canvas.style.width  = GAME_W * scale + 'px'; canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale;
}
addEventListener('resize', resize); resize();

/* ---------------- 小工具 ---------------- */
const clamp = (v,a,b)=> Math.max(a, Math.min(b, v));
const dist  = (x1,y1,x2,y2)=> Math.hypot(x2-x1, y2-y1);
const easeOutBack  = t => 1 + 2.7*Math.pow(t-1,3) + 1.7*Math.pow(t-1,2);
const easeOutCubic = t => 1 - Math.pow(1-t,3);
function rr(x,y,w,h,r){
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function text(str,x,y,size,color,align,weight,stroke){
  ctx.font = (weight||'bold') + ' ' + size + 'px "Trebuchet MS","Microsoft JhengHei","PingFang TC",sans-serif';
  ctx.textAlign = align || 'center'; ctx.textBaseline = 'middle';
  if(stroke){ ctx.lineWidth = Math.max(2, size/7); ctx.strokeStyle = stroke; ctx.strokeText(str,x,y); }
  ctx.fillStyle = color; ctx.fillText(str,x,y);
}
function makeRand(seed){
  let s = seed;
  return function(){ s = (s*16807) % 2147483647; return s / 2147483647; };
}
function store(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
function load(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }

/* ---------------- 全域回饋層：震動 / hit-stop / 閃光 ---------------- */
let shake = 0, freeze = 0, flash = 0, tGlobal = 0, rdt = 1/60;
function addShake(n){ shake = Math.max(shake, REDUCED ? n*0.3 : n); }
function hitStop(t){ freeze = Math.max(freeze, t); }
function beginShake(){
  ctx.save();
  if(shake > 0.1) ctx.translate((Math.random()*2-1)*shake, (Math.random()*2-1)*shake);
}
function endShake(){ ctx.restore(); }

/* ---------------- 粒子系統 ---------------- */
const parts = [];
function spawnPart(p){ if(parts.length < 420) parts.push(p); }
function burst(x,y,color,n,speed,opt){
  opt = opt || {};
  for(let i=0;i<n;i++){
    const a = opt.arcFrom !== undefined ? opt.arcFrom + Math.random()*(opt.arcTo - opt.arcFrom) : Math.random()*Math.PI*2;
    const s = (speed||220) * (0.3 + Math.random()*0.7);
    spawnPart({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      life: (opt.life||0.5)*(0.7+Math.random()*0.6),
      color: Array.isArray(color) ? color[(Math.random()*color.length)|0] : color,
      size: opt.size||6, g: opt.g!==undefined ? opt.g : 600 });
  }
}
function updateParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p = parts[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += p.g*dt; p.life -= dt;
    if(p.vr) p.rot += p.vr*dt;   // v6：彩帶旋轉
    if(p.life <= 0){ parts[i] = parts[parts.length-1]; parts.pop(); }  // v3：swap-pop 零搬移
  }
}
function drawParts(){
  for(const p of parts){
    ctx.globalAlpha = clamp(p.life*2, 0, 1);
    ctx.fillStyle = p.color;
    if(p.conf){   // v6：長方形彩帶（帶旋轉）
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
      ctx.restore();
    } else {
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
  }
  ctx.globalAlpha = 1;
}
/* v6：進球彩帶 */
function confetti(x,y,n){
  const cols = ['#ffd77a','#ff6b5e','#2ec4b6','#c77dff','#fff5d6'];
  for(let i=0;i<n;i++) spawnPart({x, y, vx:(Math.random()*2-1)*260, vy:-120-Math.random()*220,
    life:0.9+Math.random()*0.7, color:cols[(Math.random()*cols.length)|0], size:8,
    g:420, conf:1, rot:Math.random()*7, vr:(Math.random()*2-1)*10});
}

/* ---------------- 飄字 ---------------- */
const floaters = [];
function floater(x,y,txt,color,size){ floaters.push({x, y, txt, color, size: size||24, t:0, life:0.8}); }
function updateFloaters(dt){
  for(let i=floaters.length-1;i>=0;i--){
    const f = floaters[i];
    f.t += dt; f.y -= 55*dt;
    if(f.t >= f.life) floaters.splice(i,1);
  }
}
function drawFloaters(){
  for(const f of floaters){
    ctx.globalAlpha = clamp(1 - f.t/f.life, 0, 1);
    text(f.txt, f.x, f.y, f.size, f.color, 'center', 'bold', 'rgba(4,7,15,0.8)');
  }
  ctx.globalAlpha = 1;
}

/* ---------------- 音效：Web Audio 合成（零音檔） ---------------- */
let AC = null, MASTER = null, ambSrc = null, ambVol = null, ambDuck = null, ambKind = null, ambDesired = 'night';
let muted = load('wow101v2_mute') === '1';
function audio(){
  if(!AC){
    try{
      AC = new (window.AudioContext || window.webkitAudioContext)();
      // v3：壓縮器主匯流排——多事件齊發不爆音
      MASTER = AC.createDynamicsCompressor();
      MASTER.threshold.value = -18; MASTER.knee.value = 24; MASTER.ratio.value = 8;
      const mg = AC.createGain(); mg.gain.value = 0.9;
      MASTER.connect(mg); mg.connect(AC.destination);
      // v6：程序化殘響——generated impulse 小廳堂，SFX 全體帶空間感
      const ir = AC.createBuffer(2, (AC.sampleRate*1.4)|0, AC.sampleRate);
      for(let ch=0; ch<2; ch++){
        const d = ir.getChannelData(ch);
        for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 2.6);
      }
      const conv = AC.createConvolver(); conv.buffer = ir;
      const wet = AC.createGain(); wet.gain.value = 0.16;
      MASTER.connect(conv); conv.connect(wet); wet.connect(AC.destination);
      // v6：氛圍音母線（主音效觸發時 ducking）
      ambDuck = AC.createGain(); ambDuck.gain.value = 1;
      ambVol = AC.createGain(); ambVol.gain.value = 0;
      ambVol.connect(ambDuck); ambDuck.connect(mg);
    }catch(e){}
  }
  if(AC && AC.state === 'suspended') AC.resume();
  if(AC && ambVol) applyAmb();
  return AC;
}
/* v6：場景氛圍音——水波（夜釣）/ 人群嗡嗡（足球）/ 夜風（選單），程序化 4 秒循環 */
function makeAmbBuf(kind){
  const sr = AC.sampleRate, len = sr*4, buf = AC.createBuffer(1, len, sr), d = buf.getChannelData(0);
  let lp = 0, br = 0;
  for(let i=0;i<len;i++){
    const t = i/sr, w = Math.random()*2-1;
    if(kind === 'water'){ lp += (w-lp)*0.045; d[i] = lp * (0.55 + 0.45*Math.sin(t*Math.PI*1.2) + 0.2*Math.sin(t*7.3)) * 0.9; }
    else if(kind === 'crowd'){ br += (w-br)*0.02; lp += (br-lp)*0.3; d[i] = lp * (0.8 + 0.2*Math.sin(t*3.1) + 0.1*Math.sin(t*13.7)) * 2.2; }
    else { lp += (w-lp)*0.012; d[i] = lp * (0.7 + 0.3*Math.sin(t*1.4)) * 1.4; }
  }
  const f = (sr*0.15)|0;   // 頭尾交叉淡接，循環無接縫
  for(let i=0;i<f;i++){ const a = i/f; d[i] = d[i]*a + d[len-f+i]*(1-a); }
  return buf;
}
function applyAmb(){
  if(!AC || !ambVol) return;
  if(ambKind !== ambDesired){
    if(ambSrc){ try{ ambSrc.stop(); }catch(e){} ambSrc = null; }
    ambKind = ambDesired;
    try{
      ambSrc = AC.createBufferSource();
      ambSrc.buffer = makeAmbBuf(ambKind); ambSrc.loop = true;
      ambSrc.connect(ambVol); ambSrc.start();
    }catch(e){}
  }
  const target = muted ? 0 : (ambKind === 'crowd' ? 0.05 : (ambKind === 'water' ? 0.065 : 0.04));
  ambVol.gain.setTargetAtTime(target, AC.currentTime, 0.4);
}
function setAmb(kind){ ambDesired = kind; if(AC && ambVol) applyAmb(); }
function duckAmb(){
  if(!AC || !ambDuck || muted) return;
  const t = AC.currentTime;
  ambDuck.gain.cancelScheduledValues(t);
  ambDuck.gain.setTargetAtTime(0.35, t, 0.015);
  ambDuck.gain.setTargetAtTime(1, t + 0.12, 0.25);
}
/* v6：人群歡呼（進球/奪冠限定，帶起伏包絡的濾波噪聲） */
function cheer(vol, dur){
  if(muted) return;
  const ac = audio(); if(!ac) return;
  const t0 = ac.currentTime, len = (dur*ac.sampleRate)|0;
  const buf = ac.createBuffer(1, len, ac.sampleRate), d = buf.getChannelData(0);
  let lp = 0;
  for(let i=0;i<len;i++){ const w = Math.random()*2-1; lp += (w-lp)*0.12; d[i] = lp; }
  const s = ac.createBufferSource(); s.buffer = buf;
  const g = ac.createGain();
  g.gain.setValueAtTime(0.001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0 + dur*0.25);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  s.connect(g); g.connect(MASTER); s.start(t0);
}
function beep(freq,dur,type,vol,slide,delay){
  if(muted) return;
  const ac = audio(); if(!ac) return;
  freq *= 0.975 + Math.random()*0.05;   // v3：±2.5% 隨機音高，聽感不機械
  if((vol||0.14) >= 0.1) duckAmb();     // v6：主音效壓低氛圍層
  const t0 = ac.currentTime + (delay||0);
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq+slide), t0+dur);
  g.gain.setValueAtTime(vol || 0.14, t0); g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  o.connect(g).connect(MASTER); o.start(t0); o.stop(t0+dur+0.03);
}
function noise(dur,vol,delay){
  if(muted) return;
  const ac = audio(); if(!ac) return;
  if((vol||0.12) >= 0.1) duckAmb();     // v6
  const t0 = ac.currentTime + (delay||0);
  const len = Math.max(1, (dur*ac.sampleRate)|0);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i] = (Math.random()*2-1) * (1 - i/len);
  const s = ac.createBufferSource(); s.buffer = buf;
  const g = ac.createGain();
  g.gain.setValueAtTime(vol || 0.12, t0); g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  s.connect(g); g.connect(MASTER); s.start(t0);
}
const SFX = {
  click(){ beep(660,0.05,'square',0.1); },
  cast(){ beep(300,0.18,'sine',0.12,-160); noise(0.08,0.06); },
  splash(){ noise(0.22,0.14); beep(160,0.1,'sine',0.06,-60); },
  catchFish(){ beep(880,0.07,'square',0.13); beep(1175,0.12,'square',0.13,0,0.07); },
  golden(){ beep(880,0.08,'square',0.14); beep(1109,0.08,'square',0.14,0,0.08); beep(1319,0.2,'square',0.14,0,0.16); },
  whiff(){ beep(240,0.1,'triangle',0.07,-80); },
  jelly(){ beep(190,0.3,'sawtooth',0.13,-120); noise(0.15,0.09); },
  kick(){ beep(150,0.07,'square',0.15,60); noise(0.05,0.1); },
  swing(){ noise(0.06,0.05); },
  bounce(){ beep(220,0.05,'triangle',0.07); },
  goal(){ beep(523,0.1,'square',0.14); beep(659,0.1,'square',0.14,0,0.1); beep(784,0.1,'square',0.14,0,0.2); beep(1047,0.25,'square',0.15,0,0.3); },
  concede(){ beep(330,0.15,'sawtooth',0.12,-60); beep(220,0.3,'sawtooth',0.12,-70,0.15); },
  whistle(){ beep(2350,0.12,'square',0.055); beep(2350,0.3,'square',0.055,0,0.18); },
  tick(){ beep(1320,0.04,'square',0.07); },
  win(){ [523,659,784,1047,1319].forEach((f,i)=> beep(f,0.16,'square',0.13,0,i*0.11)); },
  lose(){ beep(392,0.2,'triangle',0.12,-40); beep(294,0.35,'triangle',0.12,-40,0.2); },
  spark(){ beep(1568,0.06,'square',0.06); },
  fever(){ [659,784,988,1319].forEach((f,i)=> beep(f,0.09,'square',0.13,0,i*0.06)); },
  boss(){ beep(110,0.4,'sawtooth',0.15,-30); beep(165,0.4,'sawtooth',0.12,-40,0.1); noise(0.2,0.08,0.05); },
  power(){ beep(523,0.07,'square',0.12); beep(784,0.12,'square',0.12,0,0.07); },
  freeze(){ beep(1200,0.18,'triangle',0.12,-700); noise(0.1,0.06); }
};
function toggleMute(){
  muted = !muted;
  store('wow101v2_mute', muted ? '1' : '0');
  if(AC && ambVol) applyAmb();   // v6：靜音同步關閉氛圍層
  if(!muted) SFX.click();
}

/* ---------------- 輸入：鍵盤 + 指標（滑鼠/觸控統一） ---------------- */
const keys = {};
const mouse = {x:-99, y:-99};
const pointers = new Map();
addEventListener('keydown', e=>{
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space','Enter'].indexOf(e.code) >= 0) e.preventDefault();
  audio();
  keys[e.code] = true;
  if(e.repeat) return;
  if(e.code === 'KeyM'){ toggleMute(); return; }
  if(state && state.onKey) state.onKey(e.code);
});
addEventListener('keyup', e=>{ keys[e.code] = false; });
addEventListener('blur', ()=>{ for(const k in keys) keys[k] = false; });  // v4：失焦清鍵，防按鍵卡住

function toXY(e){
  const r = canvas.getBoundingClientRect();
  return { x:(e.clientX - r.left)/canvas._scale, y:(e.clientY - r.top)/canvas._scale };
}
function within(b,p){ return p.x>=b.x && p.x<=b.x+b.w && p.y>=b.y && p.y<=b.y+b.h; }
function activeButtons(){
  const arr = [muteBtn];
  if(state && state.buttons) arr.push.apply(arr, state.buttons);
  return arr;
}
canvas.addEventListener('pointerdown', e=>{
  e.preventDefault(); audio();
  const p = toXY(e);
  mouse.x = p.x; mouse.y = p.y;
  for(const b of activeButtons()){
    if(within(b,p)){ b.press = 1; SFX.click(); b.onClick(); return; }
  }
  pointers.set(e.pointerId, {x:p.x, y:p.y, sx:p.x, sy:p.y, t:tGlobal});
  if(state.pDown) state.pDown(p, e.pointerId);
});
canvas.addEventListener('pointermove', e=>{
  const p = toXY(e);
  mouse.x = p.x; mouse.y = p.y;
  const pt = pointers.get(e.pointerId);
  if(pt){ pt.x = p.x; pt.y = p.y; }
  if(state.pMove) state.pMove(p, e.pointerId, !!pt);
});
function endPtr(e){
  const p = toXY(e);
  const pt = pointers.get(e.pointerId);
  pointers.delete(e.pointerId);
  if(state.pUp) state.pUp(p, e.pointerId, pt);
}
canvas.addEventListener('pointerup', endPtr);
canvas.addEventListener('pointercancel', endPtr);
canvas.addEventListener('contextmenu', e=> e.preventDefault());

/* ---------------- 按鈕系統（畫在 canvas 上，48px 以上可點區） ---------------- */
function button(x,y,w,h,label,onClick,opt){
  opt = opt || {};
  return {x,y,w,h,label,onClick,hot:0,press:0,ghost:!!opt.ghost,
          size:opt.size||24, grad:opt.grad||['#ff6b5e','#ffb627'], fg:opt.fg||'#1c1000'};
}
function drawButton(b){
  b.press = Math.max(0, b.press - rdt*5);
  const hover = within(b, mouse);
  b.hot += ((hover?1:0) - b.hot) * Math.min(1, rdt*12);
  if(b.ghost) return;
  const s = 1 + b.hot*0.045 - b.press*0.08;
  ctx.save();
  ctx.translate(b.x + b.w/2, b.y + b.h/2);
  ctx.scale(s, s);
  if(!b._g){   // v6：按鈕漸層快取
    b._g = ctx.createLinearGradient(-b.w/2, -b.h/2, b.w/2, b.h/2);
    b._g.addColorStop(0, b.grad[0]); b._g.addColorStop(1, b.grad[1]);
  }
  ctx.fillStyle = b._g;
  ctx.shadowColor = b.grad[0]; ctx.shadowBlur = 10 + b.hot*10;
  rr(-b.w/2, -b.h/2, b.w, b.h, b.h/2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 2; ctx.stroke();
  text(b.label, 0, 2, b.size, b.fg);
  ctx.restore();
}
const muteBtn = button(GAME_W-62, 12, 48, 48, '', toggleMute, {ghost:true});
function drawMute(){
  drawButton(muteBtn);
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = 'rgba(4,7,15,0.5)';
  rr(muteBtn.x, muteBtn.y, muteBtn.w, muteBtn.h, 12); ctx.fill();
  ctx.strokeStyle = 'rgba(143,160,201,0.4)'; ctx.lineWidth = 1.5; ctx.stroke();
  text(muted ? '🔇' : '🔊', muteBtn.x+24, muteBtn.y+25, 22, '#f3ecd9');
  ctx.globalAlpha = 1;
}
function pill(x,y,w,h,glow){
  ctx.fillStyle = 'rgba(4,7,15,0.55)';
  rr(x,y,w,h,h/2); ctx.fill();
  ctx.strokeStyle = glow || 'rgba(255,183,39,0.35)';
  ctx.lineWidth = 1.5; ctx.stroke();
}
const VIGN = (function(){
  const g = ctx.createRadialGradient(GAME_W/2, GAME_H/2, GAME_H*0.45, GAME_W/2, GAME_H/2, GAME_H*0.85);
  g.addColorStop(0, 'rgba(0,0,0,0)'); g.addColorStop(1, 'rgba(2,4,12,0.4)');
  return g;
})();
function drawVignette(){ ctx.fillStyle = VIGN; ctx.fillRect(0,0,GAME_W,GAME_H); }
/* v3：靜態漸層預先計算一次（原本每幀重建，平板掉幀主因之一） */
const WATER_G = (function(){ const g = ctx.createLinearGradient(0, WATER_Y, 0, GAME_H);
  g.addColorStop(0,'#14476b'); g.addColorStop(0.5,'#0b2c48'); g.addColorStop(1,'#04101c'); return g; })();
const TURF_G = (function(){ const g = ctx.createLinearGradient(0,0,0,GAME_H);
  g.addColorStop(0,'#0a2e1e'); g.addColorStop(1,'#123f2a'); return g; })();
const FEVER_G = (function(){ const g = ctx.createLinearGradient(0,0,0,GAME_H);
  g.addColorStop(0,'#ffb627'); g.addColorStop(1,'rgba(255,107,94,0)'); return g; })();
/* v6：離屏烘焙工廠＋色彩明暗工具（主迴圈零 createGradient/shadowBlur） */
function bake(w,h,fn){ const c=document.createElement('canvas'); c.width=w; c.height=h; fn(c.getContext('2d')); return c; }
function shade(hex,f){
  const n=parseInt(hex.slice(1),16);
  const r=clamp(Math.round(((n>>16)&255)*f),0,255), g=clamp(Math.round(((n>>8)&255)*f),0,255), b=clamp(Math.round((n&255)*f),0,255);
  return 'rgb('+r+','+g+','+b+')';
}

/* v6：流星（事件式驚喜，非持續閃爍） */
const meteors = []; let meteorT = 4;
function updateMeteors(dt){
  meteorT -= dt;
  if(meteorT <= 0){
    meteorT = 5 + Math.random()*9;
    meteors.push({x:120+Math.random()*600, y:20+Math.random()*90, vx:260+Math.random()*160, vy:90+Math.random()*50, life:0.9});
  }
  for(let i=meteors.length-1;i>=0;i--){
    const m = meteors[i];
    m.x += m.vx*dt; m.y += m.vy*dt; m.life -= dt;
    if(m.life <= 0) meteors.splice(i,1);
  }
}
function drawMeteors(){
  ctx.lineCap = 'round';
  for(const m of meteors){
    const a = clamp(m.life*1.6, 0, 1);
    ctx.strokeStyle = 'rgba(56,225,255,' + (0.28*a).toFixed(3) + ')'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(m.x, m.y); ctx.lineTo(m.x - m.vx*0.09, m.y - m.vy*0.09); ctx.stroke();
    ctx.strokeStyle = 'rgba(243,236,217,' + (0.7*a).toFixed(3) + ')'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(m.x, m.y); ctx.lineTo(m.x - m.vx*0.16, m.y - m.vy*0.16); ctx.stroke();
  }
}

  for(let i=0;i<6;i++){
    const ww = 34 + Math.sin(t*1.7 + i*1.3)*12;

    }

  }
}

  ctx.beginPath(); ctx.arc(-5,-64,2.6,0,7); ctx.arc(5,-64,2.6,0,7); ctx.fill();  // 發光眼
  ctx.strokeStyle = '#ffd77a'; ctx.lineWidth = 2;

  ctx.fillStyle = '#8a2f26'; rr(-30, -48, 12, 24, 5); ctx.fill();  // 手臂
  ctx.restore();
  const hx = bx-26, hy = by-40;  // 釣竿（隨施力彎曲）
  ctx.strokeStyle = '#dfe4f2'; ctx.lineWidth = 3; ctx.lineCap = 'round';

  ctx.stroke();
  ctx.fillStyle = '#ffb627'; ctx.beginPath(); ctx.arc(hx, hy, 5, 0, 7); ctx.fill();
}

const IDLE_Y = 168, HOOK_MAX_Y = 512, AIM_MIN = 50, AIM_MAX = 655;

const fishGame = {
  buttons: [], hard: false,
  enter(){
    this.score = 0; this.dispScore = 0; this.time = 75; this.elapsed = 0; this.prevCeil = 76;  // v3：60→75 秒
    this.combo = 0; this.comboPop = 0;
    this.fever = 0; this.bossCalled = false;   // v2：FEVER 狂熱＋魚王
    this.starsArr = this.hard ? FISH_STARS_HARD : FISH_STARS;   // v4
    this.cast = 'idle';                 // idle → drop → reel
    this.aimX = GAME_W*0.35; this.hookX = this.aimX; this.hookY = IDLE_Y; this.prevHookY = IDLE_Y;
    this.carry = null; this.missed = false; this.rodBend = 0.2; this.mechaSq = 1;
    this.fishes = []; this.jellies = [];
    for(let i=0;i<6;i++) this.spawnFish(false, true);
    this.hint = 6; this.buttons = [];
    setAmb('water');   // v6：水波氛圍
    floater(GAME_W/2, 240, this.hard ? '🌙 夜霧釣場：魚更快、水母成群！' : '瞄準魚群，拋線！', '#ffd77a', 30);
  },
  spawnFish(gold, anywhere){
    const k = gold ? GOLD_KIND : FISH_KINDS[(Math.random()*FISH_KINDS.length)|0];
    const dir = Math.random() < 0.5 ? 1 : -1;
    this.fishes.push({ k, dir,
      x: anywhere ? 60+Math.random()*(GAME_W-120) : (dir===1 ? -40 : GAME_W+40),
      y: k.dMin + Math.random()*(k.dMax-k.dMin),
      sp: k.sp * (0.8+Math.random()*0.5),
      wig: Math.random()*7, sx:1, sy:1 });
  },
  castAction(){
    if(this.cast === 'idle'){
      this.cast = 'drop'; this.missed = false; this.mechaSq = 0.82;
      SFX.cast();
      burst(ROD_TIP.x, ROD_TIP.y, '#dfe4f2', 4, 120, {size:3, g:300, life:0.3});
    } else if(this.cast === 'drop'){ this.cast = 'reel'; }
  },
  onKey(code){
    if(code === 'Space' || code === 'Enter') this.castAction();
    if(code === 'Escape') setState(menuState);
  },
  pMove(p){ this.aimX = clamp(p.x, AIM_MIN, AIM_MAX); },
  pUp(p, id, pt){
    if(pt && dist(p.x,p.y,pt.sx,pt.sy) < 22 && (tGlobal - pt.t) < 0.55){  // v2：更寬容的點擊判定
      this.aimX = clamp(p.x, AIM_MIN, AIM_MAX);
      if(this.cast === 'idle') this.hookX = this.aimX;
      this.castAction();
    }
  },
  update(dt){
    this.elapsed += dt; this.hint -= dt; this.time -= dt;
    if(this.time <= 0){ this.time = 0; this.finish(); return; }
    const ceil = Math.ceil(this.time);
    if(ceil !== this.prevCeil){ this.prevCeil = ceil; if(ceil <= 10) SFX.tick(); }
    // 鍵盤瞄準
    if(keys['ArrowLeft'] || keys['KeyA'])  this.aimX = clamp(this.aimX - 480*dt, AIM_MIN, AIM_MAX);
    if(keys['ArrowRight']|| keys['KeyD'])  this.aimX = clamp(this.aimX + 480*dt, AIM_MIN, AIM_MAX);
    if(this.cast === 'idle') this.hookX += (this.aimX - this.hookX) * (1 - Math.pow(0.0001, dt));
    // 鉤子升降（FEVER 時更俐落）
    this.prevHookY = this.hookY;
    const spdBoost = this.fever > 0 ? 1.25 : 1;
    if(this.cast === 'drop'){
      this.hookY += 640*spdBoost*dt;
      if(this.hookY >= HOOK_MAX_Y){ this.hookY = HOOK_MAX_Y; this.cast = 'reel'; this.missed = true; }
    } else if(this.cast === 'reel'){
      this.hookY -= 860*spdBoost*dt;
      if(this.hookY <= IDLE_Y){
        this.hookY = IDLE_Y;
        if(this.carry){
          burst(this.hookX, this.hookY, ['#ffd77a','#fff5d6'], 8, 150, {size:4, g:200, life:0.4});
          SFX.spark(); this.carry = null;
        } else if(this.missed){
          if(this.combo > 0) floater(this.hookX, this.hookY, '連擊中斷', '#8fa0c9', 18);
          this.combo = 0; SFX.whiff();
        }
        this.cast = 'idle';
      }
    } else {
      this.hookY += (IDLE_Y - this.hookY) * Math.min(1, dt*10);
    }
    // 入水 / 出水水花
    if(this.prevHookY < WATER_Y && this.hookY >= WATER_Y){
      SFX.splash();
      burst(this.hookX, WATER_Y, ['#a8e6e2','#f3ecd9'], 12, 200, {size:4, g:520, life:0.5, arcFrom:-Math.PI*0.85, arcTo:-Math.PI*0.15});
    }
    if(this.prevHookY > WATER_Y && this.hookY <= WATER_Y)
      burst(this.hookX, WATER_Y, '#a8e6e2', 6, 140, {size:3, g:480, life:0.35, arcFrom:-Math.PI*0.8, arcTo:-Math.PI*0.2});
    // 碰撞：魚 / 水母
    const speedMul = (this.hard ? 1.3 : 1) * (1 + Math.min(0.8, this.elapsed/70));   // 難度：魚速漸增（v4：夜霧 +30%）
    if(this.cast === 'drop' && !this.carry){
      for(let i=0;i<this.fishes.length;i++){
        const f = this.fishes[i];
        if(dist(f.x, f.y, this.hookX, this.hookY) < f.k.r + 17){ this.catchFish(f, i); break; }
      }
      for(const j of this.jellies){
        if(j.stun <= 0 && dist(j.x, j.y, this.hookX, this.hookY) < 26){ this.hitJelly(j); break; }
      }
    }
    for(let i=this.fishes.length-1;i>=0;i--){
      const f = this.fishes[i];
      f.x += f.dir * f.sp * speedMul * dt;
      f.wig += dt * (5 + f.sp/25);
      f.sx += (1-f.sx)*Math.min(1,dt*10); f.sy += (1-f.sy)*Math.min(1,dt*10);
      if((f.k.gold || f.k.boss) && Math.random() < 0.14)   // v6：金魚/魚王游動灑金粉
        spawnPart({x:f.x - f.dir*f.k.r, y:f.y, vx:0, vy:-16, life:0.6, color:'#ffd447', size:3, g:-20});
      if(f.k.boss){  // 魚王限時逗留，時間到就溜走（不折返）
        f.bossT -= dt;
        if(f.bossT <= 0){
          if(f.x < -70 || f.x > GAME_W+70){
            this.fishes.splice(i,1);
            floater(GAME_W/2, 250, '魚王溜走了…', '#8fa0c9', 26);
          }
          continue;
        }
      }
      if(f.dir===1 && f.x > GAME_W+50){ f.x = -50; f.y = f.k.dMin + Math.random()*(f.k.dMax-f.k.dMin); }
      if(f.dir===-1 && f.x < -50){ f.x = GAME_W+50; f.y = f.k.dMin + Math.random()*(f.k.dMax-f.k.dMin); }
    }
    // v2：FEVER 倒數＋魚潮
    this.fever = Math.max(0, this.fever - dt);
    const cap = 6 + Math.min(4, Math.floor(this.elapsed/15)) + (this.fever > 0 ? 4 : 0);
    if(this.fishes.length < cap && Math.random() < (this.fever > 0 ? 0.09 : 0.02)){
      const goldChance = Math.min((this.hard ? 0.1 : 0.06) + this.elapsed*0.004, this.hard ? 0.32 : 0.25);
      this.spawnFish(Math.random() < goldChance, false);   // v4：夜霧金魚更多＝高風險高報酬
    }
    // v3：最後 25 秒魚王登場（高潮時刻），逗留 16 秒
    if(!this.bossCalled && this.time <= 25){
      this.bossCalled = true;
      const dir = Math.random() < 0.5 ? 1 : -1;
      this.fishes.push({ k: BOSS_KIND, dir,
        x: dir===1 ? -60 : GAME_W+60,
        y: BOSS_KIND.dMin + Math.random()*(BOSS_KIND.dMax-BOSS_KIND.dMin),
        sp: BOSS_KIND.sp, wig: 0, sx:1, sy:1, bossT: 16 });
      addShake(6); SFX.boss();
      floater(GAME_W/2, 230, '👑 魚王出現！150 分！', '#ff9f1c', 34);
    }
    // 水母（15 秒後 1 隻、35 秒後 2 隻、v3：58 秒後 3 隻收尾張力；v4：夜霧最多 4 隻且更早）
    const jellyCount = this.hard
      ? (this.elapsed > 50 ? 4 : (this.elapsed > 28 ? 3 : (this.elapsed > 10 ? 2 : (this.elapsed > 3 ? 1 : 0))))
      : (this.elapsed > 58 ? 3 : (this.elapsed > 35 ? 2 : (this.elapsed > 15 ? 1 : 0)));
    while(this.jellies.length < jellyCount){
      this.jellies.push({x: 150+Math.random()*450, baseY: 380+Math.random()*90, y:0, t:Math.random()*7, drift:(Math.random()<0.5?-1:1)*22, stun:0});
      floater(GAME_W/2, 200, '⚠ 小心水母！', '#c77dff', 24);
    }
    for(const j of this.jellies){
      j.t += dt; j.stun = Math.max(0, j.stun - dt);
      j.x = clamp(j.x + Math.sin(j.t*0.6)*j.drift*dt, 60, 640);
      j.y = j.baseY + Math.sin(j.t*1.4)*26;
    }
    if(this.carry){ this.carry.x = this.hookX; this.carry.y = this.hookY + 14; this.carry.wig += dt*12; }
    if(Math.random() < 0.05)  // 氣泡氛圍
      spawnPart({x: 40+Math.random()*880, y: GAME_H-10, vx:0, vy:-30-Math.random()*30, life:1.4, color:'rgba(168,230,226,0.5)', size:3, g:-15});
    this.mechaSq += (1 - this.mechaSq)*Math.min(1, dt*9);
    const bendT = this.cast==='drop' ? 1 : (this.cast==='reel' ? 1.5 : 0.2);
    this.rodBend += (bendT - this.rodBend)*Math.min(1, dt*8);
    this.dispScore += (this.score - this.dispScore)*Math.min(1, dt*9);
    this.comboPop = Math.max(0, this.comboPop - dt*3);
  },
  catchFish(f, i){
    this.fishes.splice(i,1);
    this.combo++; this.comboPop = 1;
    const mul = Math.min(this.combo, 5);
    const feverMul = this.fever > 0 ? 2 : 1;
    const gain = f.k.pts * mul * feverMul;
    this.score += gain;
    this.carry = f; f.sx = 1.35; f.sy = 0.65;
    this.cast = 'reel'; this.mechaSq = 1.25;
    const big = f.k.gold || f.k.boss;
    hitStop(f.k.boss ? 0.14 : (big ? 0.1 : 0.05));
    addShake(f.k.boss ? 12 : (big ? 8 : 4));
    if(f.k.boss){ flash = 0.4; SFX.win(); }
    else if(f.k.gold){ flash = 0.25; SFX.golden(); }
    else SFX.catchFish();
    burst(f.x, f.y, [f.k.color, '#fff5d6'], f.k.boss ? 36 : (big ? 22 : 12), f.k.boss ? 340 : 240, {size:5, g:300, life:0.5});
    floater(f.x, f.y - 20, (f.k.boss ? '👑 ' : '') + '+' + gain + (mul>1 ? '（x'+mul+'）' : '') + (feverMul>1 ? ' FEVER!' : ''),
            f.k.boss ? '#ff9f1c' : (f.k.gold ? '#ffd447' : '#ffd77a'), f.k.boss ? 34 : (big ? 30 : 24));
    if(f.k.boss) floater(GAME_W/2, 200, '釣起魚王！太神啦！', '#ffd447', 32);
    if(this.combo === 5 && this.fever <= 0){  // v2：連擊滿 5 → FEVER 狂熱 8 秒
      this.fever = 8;
      flash = Math.max(flash, 0.2); addShake(6); SFX.fever();
      floater(GAME_W/2, 210, '🔥 FEVER！分數 x2！', '#ff6b5e', 36);
    }
  },
  hitJelly(j){
    j.stun = 1.6;
    const pen = this.hard ? 30 : 15;   // v4：夜霧水母扣更多
    this.score = Math.max(0, this.score - pen);
    if(this.combo > 0) floater(this.hookX, this.hookY - 40, '連擊中斷', '#8fa0c9', 18);
    this.combo = 0; this.cast = 'reel'; this.missed = false;
    hitStop(0.08); addShake(7); SFX.jelly();
    burst(j.x, j.y, ['#c77dff','#8b5cf6'], 16, 220, {size:5, g:200, life:0.5});
    floater(j.x, j.y - 20, '-' + pen + ' 好麻！', '#c77dff', 26);
  },
  finish(){
    const key = this.hard ? 'wow101v4_fish_hbest' : 'wow101v2_fish_best';   // v4：困難獨立紀錄
    const best = parseInt(load(key) || '0', 10);
    const newBest = this.score > best;
    if(newBest) store(key, String(this.score));
    if(newBest && this.score > 0) SFX.win(); else SFX.whistle();
    const stars = this.starsArr.filter(s => this.score >= s).length;
    let unlock = null;   // v4：一般模式拿 1★ 解鎖夜霧釣場
    if(!this.hard && stars >= 1 && !unlk.F){ unlk.F = true; store('wow101v4_unlkF','1'); unlock = '🌙 解鎖「夜霧釣場」困難模式！回選單開啟'; }
    showOver({ bg: this, replay: fishGame, title: (this.hard ? '🌙 夜霧任務完成！' : '任務完成，鐵皮特工！'),
      lines: ['本次戰績', this.score + ' 分'], stars, unlock,
      starHint: stars < 3 ? ('下一顆★：' + this.starsArr[stars] + ' 分') : '全星制霸！',
      best: Math.max(best, this.score), newBest: newBest && this.score > 0, win: stars >= 3, color: '#ffd77a' });
  },
  draw(){
    beginShake();
    drawSky(tGlobal); drawCity(tGlobal); drawTower(tGlobal); drawWater(tGlobal);
    drawMecha(tGlobal, this.rodBend, this.mechaSq);
    if(this.cast === 'idle'){  // 瞄準輔助線
      ctx.save();
      ctx.setLineDash([4,10]);
      ctx.strokeStyle = 'rgba(46,196,182,0.3)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(this.hookX, WATER_Y+8); ctx.lineTo(this.hookX, HOOK_MAX_Y); ctx.stroke();
      ctx.restore();
    }
    for(const f of this.fishes) this.drawFish(f);
    for(const j of this.jellies) this.drawJelly(j);
    if(this.hard) drawFog(tGlobal);   // v4：夜霧薄紗遮視線
    // 釣線 + 發光魚鉤
    const sag = this.cast === 'idle' ? 24 : 4;
    ctx.strokeStyle = 'rgba(223,228,242,0.9)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(ROD_TIP.x, ROD_TIP.y);
    ctx.quadraticCurveTo((ROD_TIP.x+this.hookX)/2, (ROD_TIP.y+this.hookY)/2 + sag, this.hookX, this.hookY);
    ctx.stroke();
    // v3：魚鉤光暈改雙筆畫（原 shadowBlur 每幀成本高）
    ctx.lineCap = 'round';
    ctx.globalAlpha = 0.3; ctx.strokeStyle = '#ffd77a'; ctx.lineWidth = 8;
    ctx.beginPath(); ctx.arc(this.hookX, this.hookY+6, 6, -0.5, Math.PI*1.1); ctx.stroke();
    ctx.globalAlpha = 1; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(this.hookX, this.hookY+6, 6, -0.5, Math.PI*1.1); ctx.stroke();
    if(this.carry) this.drawFish(this.carry, true);
    drawParts(); drawFloaters(); drawVignette();
    if(this.fever > 0){  // FEVER 金色氛圍（v3：預計算漸層）
      ctx.globalAlpha = 0.1 + 0.05*Math.sin(tGlobal*8);
      ctx.fillStyle = FEVER_G; ctx.fillRect(0,0,GAME_W,GAME_H);
      ctx.globalAlpha = 1;
    }
    endShake();
    // ---- HUD ----
    pill(14, 12, 190, 42);
    text('分數', 48, 33, 17, '#8fa0c9');
    text(String(Math.round(this.dispScore)), 130, 33, 26, '#ffd77a');
    const gotStars = this.starsArr.filter(s => this.score >= s).length;  // v2：三星目標
    pill(14, 60, 190, 30);
    for(let i=0;i<3;i++) text('★', 48 + i*26, 76, 18, i < gotStars ? '#ffd447' : 'rgba(143,160,201,0.35)');
    if(gotStars < 3) text(String(this.starsArr[gotStars]), 160, 76, 15, '#8fa0c9');
    if(this.hard){ pill(14, 96, 110, 28, 'rgba(154,107,255,0.6)'); text('🌙 夜霧', 69, 110, 15, '#c7a8ff'); }  // v4
    if(this.fever > 0){  // v2：FEVER 倒數膠囊
      const fs = 1 + 0.06*Math.sin(tGlobal*9);
      ctx.save(); ctx.translate(268, 85); ctx.scale(fs, fs);
      pill(-72, -19, 144, 38, 'rgba(255,107,94,0.8)');
      text('🔥FEVER ' + Math.ceil(this.fever), 0, 0, 19, '#ff6b5e');
      ctx.restore();
    }
    if(this.combo >= 2){
      const cs = 1 + this.comboPop*0.25;
      ctx.save(); ctx.translate(268, 33); ctx.scale(cs, cs);
      pill(-52, -21, 104, 42, 'rgba(46,196,182,0.5)');
      text('連擊 x' + Math.min(this.combo,5), 0, 0, 20, '#2ec4b6');
      ctx.restore();
    }
    const tc = Math.ceil(this.time), urgent = tc <= 10;
    const ts = urgent ? 1 + 0.08*Math.sin(tGlobal*10) : 1;
    ctx.save(); ctx.translate(GAME_W/2, 33); ctx.scale(ts, ts);
    pill(-62, -21, 124, 42, urgent ? 'rgba(255,107,94,0.7)' : undefined);
    text('⏱ ' + tc, 0, 0, 24, urgent ? '#ff6b5e' : '#f3ecd9');
    ctx.restore();
    drawMute();
    if(this.hint > 0){
      ctx.globalAlpha = clamp(this.hint, 0, 1);
      pill(GAME_W/2-235, GAME_H-46, 470, 34);
      text(TOUCH_DEV ? '拖曳瞄準 ・ 點一下拋線 / 收線' : '滑鼠或 ←→ 瞄準 ・ 點擊或空白鍵拋線', GAME_W/2, GAME_H-29, 17, '#8fa0c9');
      ctx.globalAlpha = 1;
    }
  },
  drawFish(f, hang){
    const yy = hang ? f.y : f.y + Math.sin(f.wig*0.6)*4;
    if(f.k.boss && !hang){  // v2：魚王皇冠（不隨翻轉鏡像）
      ctx.save();
      ctx.translate(f.x, yy - f.k.r*0.62 - 14);
      ctx.fillStyle = '#ffd447';
      ctx.beginPath();
      ctx.moveTo(-11,8); ctx.lineTo(-11,-2); ctx.lineTo(-5,3); ctx.lineTo(0,-6);
      ctx.lineTo(5,3); ctx.lineTo(11,-2); ctx.lineTo(11,8);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }
    ctx.save();
    ctx.translate(f.x, yy);
    if(hang) ctx.rotate(Math.sin(f.wig)*0.35);
    ctx.scale(f.dir * f.sx, f.sy);
    if(f.k.gold || f.k.boss){  // v3：光暈改半透明色暈（取代每幀 shadowBlur）
      ctx.globalAlpha = 0.3 + 0.12*Math.sin(f.wig*2);
      ctx.fillStyle = f.k.boss ? '#ff9f1c' : '#ffd447';
      ctx.beginPath(); ctx.ellipse(0, 0, f.k.r*1.5, f.k.r*1.05, 0, 0, 7); ctx.fill();
      ctx.globalAlpha = 1;
    }
    if(!f.k._g){   // v6：魚身立體漸層（快取於魚種，主迴圈零 createGradient）
      const g2 = ctx.createLinearGradient(0, -f.k.r*0.7, 0, f.k.r*0.7);
      g2.addColorStop(0, shade(f.k.color, 1.35)); g2.addColorStop(0.5, f.k.color); g2.addColorStop(1, shade(f.k.color, 0.62));
      f.k._g = g2; f.k._dark = shade(f.k.color, 0.72);
    }
    ctx.fillStyle = f.k._g;
    ctx.beginPath(); ctx.ellipse(0, 0, f.k.r, f.k.r*0.62, 0, 0, 7); ctx.fill();
    ctx.fillStyle = f.k.belly;
    ctx.beginPath(); ctx.ellipse(1, f.k.r*0.2, f.k.r*0.7, f.k.r*0.32, 0, 0, 7); ctx.fill();
    ctx.strokeStyle = f.k._dark; ctx.lineWidth = 1; ctx.globalAlpha *= 0.55;  // v6：鱗片弧線
    for(let sc=0; sc<3; sc++){
      ctx.beginPath(); ctx.arc(-f.k.r*0.25 + sc*f.k.r*0.3, -f.k.r*0.05, f.k.r*0.3, -0.9, 0.9); ctx.stroke();
    }
    ctx.globalAlpha = 1;
    const tw = Math.sin(f.wig)*0.5;  // 尾巴擺動
    ctx.fillStyle = f.k._dark;
    ctx.beginPath();
    ctx.moveTo(-f.k.r+2, 0); ctx.lineTo(-f.k.r-9, -7 + tw*6); ctx.lineTo(-f.k.r-9, 7 + tw*6);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();  // 背鰭
    ctx.moveTo(-2,-f.k.r*0.55); ctx.lineTo(4,-f.k.r*0.95); ctx.lineTo(8,-f.k.r*0.5);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(f.k.r*0.45, -f.k.r*0.12, f.k.r*0.24, 0, 7); ctx.fill();
    ctx.fillStyle = '#04070f';
    ctx.beginPath(); ctx.arc(f.k.r*0.5, -f.k.r*0.12, f.k.r*0.12, 0, 7); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.9)';  // v6：眼睛高光
    ctx.beginPath(); ctx.arc(f.k.r*0.46, -f.k.r*0.18, f.k.r*0.05, 0, 7); ctx.fill();
    ctx.restore();
  },
  drawJelly(j){
    ctx.save();
    ctx.translate(j.x, j.y);
    const puls = 1 + Math.sin(j.t*3)*0.08;
    ctx.globalAlpha = j.stun > 0 ? 0.4 + 0.3*Math.sin(tGlobal*20) : 0.9;
    ctx.scale(puls, 2-puls);
    ctx.save(); ctx.globalAlpha *= 0.3;  // v3：色暈取代 shadowBlur
    ctx.fillStyle = '#c77dff';
    ctx.beginPath(); ctx.arc(0, -2, 24, 0, 7); ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#8b5cf6';
    ctx.beginPath(); ctx.arc(0, 0, 17, Math.PI, 0); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#c77dff';
    ctx.beginPath(); ctx.arc(0, -4, 10, Math.PI, 0); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#c77dff'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    for(let i=-2;i<=2;i++){
      ctx.beginPath(); ctx.moveTo(i*6, 2);
      ctx.quadraticCurveTo(i*6 + Math.sin(j.t*4+i)*5, 12, i*6 + Math.sin(j.t*4+i+1)*7, 22);
      ctx.stroke();
    }
    ctx.restore();
    ctx.globalAlpha = 1;
  }
};

/* ================ ⚽ 螃蟹足球 ================ */
const FIELD = {x:34, y:74, w:GAME_W-68, h:GAME_H-114};
const CY = FIELD.y + FIELD.h/2, GOAL_H = 130, GOAL_D = 26;
function makeCrab(x, col, colD){
  return {x, y:CY, vx:0, vy:0, r:24, sx:1, sy:1, legT:0, clawT:0, kickCd:0, face:1, col, colD, hop:0,
          spdT:0, fireN:0, frozT:0};   // v2：道具狀態
}
const POW_TYPES = [
  {icon:'⚡', name:'加速', color:'#ffd447'},
  {icon:'🔥', name:'火力射門', color:'#ff6b5e'},
  {icon:'❄', name:'冰凍對手', color:'#7fd8ff'}
];
const crabGame = {
  buttons: [], hard: false,
  enter(){
    if(this.hard) floater(GAME_W/2, CY - 110, '🏆 冠軍盃：對手火力全開！', '#ffd447', 28);   // v4
    this.pScore = 0; this.cScore = 0; this.time = 75; this.elapsed = 0; this.prevCeil = 76;  // v3：60→75 秒
    this.player = makeCrab(FIELD.x + FIELD.w*0.28, '#ff6b5e', '#c94b3f');
    this.cpu    = makeCrab(FIELD.x + FIELD.w*0.72, '#2ec4b6', '#1a8a80');
    this.ball = {x:GAME_W/2, y:CY, vx:0, vy:0, r:13, rot:0};
    this.joy = null; this.kickBuf = 0; this.pauseT = 1.0; this.msg = {txt:'開賽！', t:0, life:1.1};
    this.hint = 6; this.goalGlow = 0; this.buttons = [];
    this.pows = []; this.powT = 7; this.powHinted = false;   // v2：場中道具
    this.golden = false; this.goldenEnd = false;             // v2：黃金進球加時
    setAmb('crowd');   // v6：夜賽人群氛圍
    SFX.whistle();
  },
  onKey(code){
    if(code === 'Space' || code === 'KeyJ' || code === 'Enter') this.kickBuf = 0.14;
    if(code === 'Escape') setState(menuState);
  },
  pDown(p, id){
    if(p.x < GAME_W*0.5){
      this.joy = {id, cx:p.x, cy:p.y, dx:0, dy:0};
    } else {
      this.kickBuf = 0.14;
      burst(p.x, p.y, 'rgba(255,214,122,0.8)', 5, 90, {size:3, g:0, life:0.25});
    }
  },
  pMove(p, id){
    if(this.joy && this.joy.id === id){
      let dx = p.x - this.joy.cx, dy = p.y - this.joy.cy;
      const d = Math.hypot(dx, dy);
      if(d > 60){ dx = dx/d*60; dy = dy/d*60; }
      this.joy.dx = dx; this.joy.dy = dy;
    }
  },
  pUp(p, id){ if(this.joy && this.joy.id === id) this.joy = null; },
  resetPositions(){
    this.player.x = FIELD.x + FIELD.w*0.28; this.player.y = CY;
    this.cpu.x    = FIELD.x + FIELD.w*0.72; this.cpu.y = CY;
    this.player.vx = this.player.vy = this.cpu.vx = this.cpu.vy = 0;
    this.ball.x = GAME_W/2; this.ball.y = CY; this.ball.vx = this.ball.vy = 0;
  },
  update(dt){
    this.elapsed += dt; this.hint -= dt; this.msg.t += dt;
    this.kickBuf = Math.max(0, this.kickBuf - dt); this.goalGlow = Math.max(0, this.goalGlow - dt);
    const P = this.player, C = this.cpu, B = this.ball;
    for(const c of [P, C]){
      c.sx += (1-c.sx)*Math.min(1,dt*10); c.sy += (1-c.sy)*Math.min(1,dt*10);
      c.clawT = Math.max(0, c.clawT - dt*3);
      c.kickCd = Math.max(0, c.kickCd - dt);
      c.hop = Math.max(0, c.hop - dt*2);
      c.spdT = Math.max(0, c.spdT - dt);
      c.frozT = Math.max(0, c.frozT - dt);
    }
    if(this.pauseT > 0){
      this.pauseT -= dt;
      if(this.pauseT <= 0 && this.goldenEnd) this.finish();  // v2：黃金進球後結算
      return;
    }
    this.time -= dt;
    if(this.time <= 0){ this.time = 0; this.finish(); return; }
    const ceil = Math.ceil(this.time);
    if(ceil !== this.prevCeil){ this.prevCeil = ceil; if(ceil <= 10) SFX.tick(); }
    // ---- 玩家移動（鍵盤 / 虛擬搖桿） ----
    let ax = 0, ay = 0;
    if(keys['ArrowLeft']||keys['KeyA']) ax -= 1;
    if(keys['ArrowRight']||keys['KeyD']) ax += 1;
    if(keys['ArrowUp']||keys['KeyW']) ay -= 1;
    if(keys['ArrowDown']||keys['KeyS']) ay += 1;
    const m = Math.hypot(ax, ay);
    if(m > 0){ ax /= m; ay /= m; }
    if(this.joy){  // v2：8px 死區，避免手指微顫漂移
      const jm = Math.hypot(this.joy.dx, this.joy.dy);
      if(jm < 8){ ax = 0; ay = 0; }
      else { ax = this.joy.dx/60; ay = this.joy.dy/60; }
    }
    if(P.frozT > 0){ ax = 0; ay = 0; P.vx *= Math.pow(0.0001, dt); P.vy *= Math.pow(0.0001, dt); }
    const pAcc = 1500 * (P.spdT > 0 ? 1.45 : 1);
    P.vx += ax*pAcc*dt; P.vy += ay*pAcc*dt;
    const dampP = Math.pow(0.002, dt);
    P.vx *= dampP; P.vy *= dampP;
    P.x = clamp(P.x + P.vx*dt, FIELD.x + P.r, FIELD.x + FIELD.w - P.r);
    P.y = clamp(P.y + P.vy*dt, FIELD.y + P.r, FIELD.y + FIELD.h - P.r);
    P.legT += dt * (2 + Math.hypot(P.vx, P.vy)/28);
    if(Math.abs(P.vx) > 30) P.face = P.vx > 0 ? 1 : -1;
    // ---- 玩家踢球（含射門輔助＋輸入緩衝＋🔥火力射門） ----
    if(this.kickBuf > 0 && P.kickCd <= 0 && P.frozT <= 0){
      this.kickBuf = 0; P.kickCd = 0.3; P.clawT = 1;
      P.sx = 1.25; P.sy = 0.8;
      const bd = dist(P.x, P.y, B.x, B.y);
      if(bd < P.r + B.r + 24){
        let dx = (B.x - P.x)/bd, dy = (B.y - P.y)/bd;
        const gd = dist(B.x, B.y, FIELD.x+FIELD.w, CY) || 1;
        dx = dx*0.68 + (FIELD.x+FIELD.w - B.x)/gd*0.32;
        dy = dy*0.68 + (CY - B.y)/gd*0.32;
        const dm = Math.hypot(dx, dy) || 1;
        const fire = P.fireN > 0;
        if(fire) P.fireN--;
        const pw = fire ? 1020 : 720;
        B.vx = dx/dm*pw + P.vx*0.3;
        B.vy = dy/dm*pw + P.vy*0.3;
        B.fireT = fire ? 0.9 : 0;
        addShake(fire ? 6 : 3.5); hitStop(fire ? 0.06 : 0.035); SFX.kick();
        if(fire) SFX.power();
        burst(B.x, B.y, fire ? ['#ff6b5e','#ffb627','#fff5d6'] : ['#fff5d6','#ffd77a'], fire ? 16 : 8, fire ? 280 : 200, {size:4, g:200, life:0.35});
      } else SFX.swing();
    }
    // ---- CPU（終盤越拚；落後方加速 = 橡皮筋難度，失敗不挫折；v4：冠軍盃不放水） ----
    const learn = this.hard ? 1 : (this.elapsed < 8 ? 0.55 : 1);   // v3：前 8 秒 CPU 放水 = 開場安全學習期
    let cpuAcc = this.hard
      ? clamp(980 + this.elapsed*9 + (this.pScore - this.cScore)*55, 800, 1750)
      : clamp(700 + this.elapsed*7 + (this.pScore - this.cScore)*55, 560, 1400) * learn;
    if(C.spdT > 0) cpuAcc *= 1.35;
    let cdx = B.x + 30 - C.x, cdy = B.y - C.y;
    const cdm = Math.hypot(cdx, cdy) || 1;
    if(C.frozT > 0){ C.vx *= Math.pow(0.0001, dt); C.vy *= Math.pow(0.0001, dt); }
    else { C.vx += cdx/cdm*cpuAcc*dt; C.vy += cdy/cdm*cpuAcc*dt; }
    C.vx *= dampP; C.vy *= dampP;
    C.x = clamp(C.x + C.vx*dt, FIELD.x + C.r, FIELD.x + FIELD.w - C.r);
    C.y = clamp(C.y + C.vy*dt, FIELD.y + C.r, FIELD.y + FIELD.h - C.r);
    C.legT += dt * (2 + Math.hypot(C.vx, C.vy)/28);
    if(Math.abs(C.vx) > 30) C.face = C.vx > 0 ? 1 : -1;
    const cbd = dist(C.x, C.y, B.x, B.y);
    if(cbd < C.r + B.r + 20 && C.kickCd <= 0 && C.frozT <= 0 && Math.random() < (this.hard ? 0.62 : 0.5*learn)){
      C.kickCd = this.hard ? 0.45 : 0.6; C.clawT = 1; C.sx = 1.25; C.sy = 0.8;
      const a = Math.atan2(CY + (Math.random()*2-1)*(this.hard ? 50 : 70) - B.y, FIELD.x - B.x);
      const cFire = C.fireN > 0;
      if(cFire) C.fireN--;
      const pw = (this.hard ? 590 : 470) + Math.random()*180 + this.elapsed*2 + (cFire ? 260 : 0);
      B.vx = Math.cos(a)*pw; B.vy = Math.sin(a)*pw;
      B.fireT = cFire ? 0.9 : 0;
      SFX.kick();
      burst(B.x, B.y, cFire ? ['#2ec4b6','#a8e6e2','#fff'] : '#a8e6e2', cFire ? 14 : 6, 160, {size:4, g:200, life:0.3});
    }
    // ---- v2：場中道具（雙方都能搶） ----
    this.powT -= dt;
    if(this.powT <= 0){
      this.powT = 9;
      if(this.pows.length < 2){
        const tp = POW_TYPES[(Math.random()*POW_TYPES.length)|0];
        this.pows.push({ tp, t:0, life:10,
          x: FIELD.x + 140 + Math.random()*(FIELD.w - 280),
          y: FIELD.y + 70 + Math.random()*(FIELD.h - 140) });
        SFX.spark();
        if(!this.powHinted){ this.powHinted = true; floater(GAME_W/2, CY - 80, '道具出現！快去搶！', '#ffd447', 26); }
      }
    }
    for(let i=this.pows.length-1;i>=0;i--){
      const pw2 = this.pows[i];
      pw2.t += dt; pw2.life -= dt;
      if(pw2.life <= 0){ this.pows.splice(i,1); continue; }
      for(const c of [P, C]){
        if(dist(c.x, c.y, pw2.x, pw2.y) < c.r + 18){
          this.applyPow(c, c === P ? C : P, pw2.tp);
          burst(pw2.x, pw2.y, [pw2.tp.color, '#fff5d6'], 14, 220, {size:5, g:250, life:0.45});
          this.pows.splice(i,1);
          break;
        }
      }
    }
    // ---- 螃蟹互推 ----
    const ccd = dist(P.x, P.y, C.x, C.y);
    if(ccd < P.r + C.r && ccd > 0){
      const push = (P.r + C.r - ccd)/2;
      const nx = (C.x - P.x)/ccd, ny = (C.y - P.y)/ccd;
      P.x -= nx*push; P.y -= ny*push;
      C.x += nx*push; C.y += ny*push;
    }
    // ---- 球物理：碰撞、阻尼、旋轉、拖尾 ----
    for(const c of [P, C]){
      const bd2 = dist(c.x, c.y, B.x, B.y);
      if(bd2 < c.r + B.r && bd2 > 0){
        const nx = (B.x - c.x)/bd2, ny = (B.y - c.y)/bd2;
        B.x = c.x + nx*(c.r + B.r); B.y = c.y + ny*(c.r + B.r);
        B.vx += c.vx*0.5 + nx*70; B.vy += c.vy*0.5 + ny*70;
      }
    }
    B.x += B.vx*dt; B.y += B.vy*dt;
    const dampB = Math.pow(0.4, dt);
    B.vx *= dampB; B.vy *= dampB;
    B.rot += B.vx*dt/B.r;
    B.fireT = Math.max(0, (B.fireT||0) - dt);
    const bSpd = Math.hypot(B.vx, B.vy);
    if(B.fireT > 0)  // 🔥火焰拖尾
      spawnPart({x:B.x + (Math.random()*10-5), y:B.y + (Math.random()*10-5), vx:-B.vx*0.15, vy:-B.vy*0.15 - 40,
                 life:0.35, color: Math.random()<0.5 ? '#ff6b5e' : '#ffb627', size:6, g:-100});
    else if(bSpd > 430)
      spawnPart({x:B.x, y:B.y, vx:-B.vx*0.1, vy:-B.vy*0.1, life:0.3, color:'rgba(243,236,217,0.6)', size:4, g:0});
    if(B.y < FIELD.y + B.r){ B.y = FIELD.y + B.r; B.vy = Math.abs(B.vy)*0.65; if(bSpd>120) SFX.bounce(); }
    if(B.y > FIELD.y + FIELD.h - B.r){ B.y = FIELD.y + FIELD.h - B.r; B.vy = -Math.abs(B.vy)*0.65; if(bSpd>120) SFX.bounce(); }
    const inMouth = Math.abs(B.y - CY) < GOAL_H/2 - 6;
    if(B.x < FIELD.x + B.r){
      if(inMouth && B.x < FIELD.x - 6) this.goalScored(false);
      else if(!inMouth){ B.x = FIELD.x + B.r; B.vx = Math.abs(B.vx)*0.65; if(bSpd>120) SFX.bounce(); }
    }
    if(B.x > FIELD.x + FIELD.w - B.r){
      if(inMouth && B.x > FIELD.x + FIELD.w + 6) this.goalScored(true);
      else if(!inMouth){ B.x = FIELD.x + FIELD.w - B.r; B.vx = -Math.abs(B.vx)*0.65; if(bSpd>120) SFX.bounce(); }
    }
  },
  applyPow(c, foe, tp){   // v2：道具效果（撿到的人受益）
    const isP = c === this.player;
    if(tp.icon === '⚡'){ c.spdT = 5; SFX.power(); }
    else if(tp.icon === '🔥'){ c.fireN = 3; SFX.power(); }
    else { foe.frozT = 1.8; foe.vx = foe.vy = 0; SFX.freeze();
           burst(foe.x, foe.y, ['#7fd8ff','#fff'], 12, 180, {size:4, g:150, life:0.5}); }
    floater(c.x, c.y - 40, tp.icon + ' ' + tp.name + '！', isP ? '#ffd77a' : '#a8e6e2', 24);
  },
  goalScored(byPlayer){
    if(byPlayer){ this.pScore++; SFX.goal(); this.player.hop = 1; }
    else { this.cScore++; SFX.concede(); this.cpu.hop = 1; }
    hitStop(0.1); addShake(byPlayer ? 10 : 6);
    flash = byPlayer ? 0.3 : 0.15; this.goalGlow = 1;
    const gx = byPlayer ? FIELD.x + FIELD.w : FIELD.x;
    burst(gx, CY, byPlayer ? ['#ffd77a','#ff6b5e','#fff5d6'] : ['#a8e6e2','#2ec4b6'], 36, 320, {size:6, g:400, life:0.9});
    confetti(gx, CY - 30, byPlayer ? 44 : 16);   // v6：進球彩帶雨
    if(byPlayer) cheer(0.22, 1.3);               // v6：觀眾歡呼
    if(this.golden){   // v2：黃金進球 = 立刻分勝負
      this.goldenEnd = true;
      this.msg = {txt: byPlayer ? '⚡ 黃金進球！' : '對手黃金進球…', t:0, life:1.4};
      this.pauseT = 1.5; this.resetPositions(); SFX.whistle();
      return;
    }
    this.msg = {txt: byPlayer ? 'GOAL！好球！' : '被進球了！反攻！', t:0, life:1.4};
    this.pauseT = 1.4; this.resetPositions(); SFX.whistle();
  },
  finish(){
    if(this.pScore === this.cScore && !this.golden){   // v2：平手 → 黃金進球加時 20 秒
      this.golden = true;
      this.time = 20; this.prevCeil = 21;
      this.msg = {txt:'⚡ 黃金進球加時！', t:0, life:1.8};
      this.pauseT = 1.6; this.resetPositions();
      this.pows.length = 0; this.powT = 2;
      SFX.whistle(); SFX.fever();
      return;
    }
    const key = this.hard ? 'wow101v4_crab_hbest' : 'wow101v2_crab_best';   // v4：困難獨立紀錄
    const best = parseInt(load(key) || '0', 10);
    const newBest = this.pScore > best;
    if(newBest) store(key, String(this.pScore));
    const won = this.pScore > this.cScore;
    let unlock = null;   // v4：一般模式首勝解鎖冠軍盃
    if(!this.hard && won && !unlk.C){ unlk.C = true; store('wow101v4_unlkC','1'); unlock = '🏆 解鎖「冠軍盃」困難模式！回選單開啟'; }
    let title, color;
    if(won){ title = this.hard ? '冠軍盃制霸！傳奇紅蟹！' : (this.golden ? '黃金進球奪冠！🏆' : '紅蟹奪冠！🏆'); color = '#ffd77a'; SFX.win(); cheer(0.25, 2.0); }
    else if(this.pScore < this.cScore){ title = '雖敗猶榮，再戰！'; color = '#a8e6e2'; SFX.lose(); }
    else { title = '激戰平手，握手言和！'; color = '#f3ecd9'; SFX.whistle(); }
    showOver({ bg: this, replay: crabGame, title, unlock,
      lines: ['最終比分', this.pScore + ' : ' + this.cScore],
      best: Math.max(best, this.pScore), bestLabel: '單場最多進球',
      newBest: newBest && this.pScore > 0, color, win: won });
  },

      pill(GAME_W/2-245, GAME_H-46, 490, 34);
      text(TOUCH_DEV ? '左半邊拖曳移動 ・ 右半邊點擊踢球' : '方向鍵 / WASD 移動 ・ 空白鍵踢球', GAME_W/2, GAME_H-29, 17, '#8fa0c9');
      ctx.globalAlpha = 1;
    }
  },
  drawGoal(gx, color, isTarget){
    const gy = CY - GOAL_H/2;
    if(this.goalGlow > 0){   // v6：進球光暈改半透明疊色（零 shadowBlur）
      ctx.globalAlpha = 0.35*this.goalGlow;
      ctx.fillStyle = color;
      ctx.fillRect(gx-10, gy-10, GOAL_D+20, GOAL_H+20);
      ctx.globalAlpha = 1;
    }
    ctx.fillStyle = 'rgba(4,7,15,0.35)'; ctx.fillRect(gx, gy, GOAL_D, GOAL_H);
    ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.strokeRect(gx, gy, GOAL_D, GOAL_H);
    const wob = this.goalGlow > 0 ? Math.sin(tGlobal*26)*3.5*this.goalGlow : 0;   // v6：進球球網波動
    ctx.strokeStyle = 'rgba(243,236,217,0.22)'; ctx.lineWidth = 1;  // 球網
    for(let i=1;i<4;i++){
      ctx.beginPath(); ctx.moveTo(gx + i*GOAL_D/4, gy);
      ctx.quadraticCurveTo(gx + i*GOAL_D/4 + wob, gy + GOAL_H/2, gx + i*GOAL_D/4, gy + GOAL_H); ctx.stroke();
    }
    for(let i=1;i<7;i++){
      ctx.beginPath(); ctx.moveTo(gx, gy + i*GOAL_H/7);
      ctx.quadraticCurveTo(gx + GOAL_D/2, gy + i*GOAL_H/7 + wob, gx + GOAL_D, gy + i*GOAL_H/7); ctx.stroke();
    }
  },
  drawCrabChar(c){
    const hopY = Math.sin(c.hop*Math.PI)*18;
    ctx.fillStyle = 'rgba(0,0,0,0.3)';  // 影子
    ctx.beginPath(); ctx.ellipse(c.x, c.y + 20, 20 - hopY*0.3, 6, 0, 0, 7); ctx.fill();
    if(c.spdT > 0 && Math.random() < 0.4)  // ⚡加速殘影粒子
      spawnPart({x:c.x + (Math.random()*30-15), y:c.y + 14, vx:-c.vx*0.15, vy:-20, life:0.3, color:'#ffd447', size:4, g:0});
    ctx.save();
    ctx.translate(c.x, c.y + 16 - hopY);
    ctx.scale(c.sx, c.sy);              // squash & stretch（腳底錨點）
    ctx.translate(0, -16);
    ctx.strokeStyle = c.colD; ctx.lineWidth = 3.5; ctx.lineCap = 'round';  // 六足擺動
    for(let i=0;i<3;i++){
      const sw = Math.sin(c.legT*3 + i*2)*5;
      ctx.beginPath(); ctx.moveTo(-13+i*3, 10); ctx.lineTo(-26+i*4 + sw, 20); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(13-i*3, 10); ctx.lineTo(26-i*4 - sw, 20); ctx.stroke();
    }
    const open = 0.3 + c.clawT*0.9;  // 蟹鉗（踢球時張開揮擊）
    for(const s of [-1, 1]){
      ctx.save();
      ctx.translate(s*20, -8);
      ctx.rotate(s * (-0.5 - c.clawT*0.8));
      ctx.fillStyle = c.colD;
      ctx.beginPath(); ctx.ellipse(s*6, -6, 9, 7, s*0.5, 0, 7); ctx.fill();
      ctx.fillStyle = c.col;
      ctx.beginPath();
      ctx.arc(s*8, -9, 7, s>0 ? open : Math.PI - open, s>0 ? Math.PI*2 - open : Math.PI + open, s<0);
      ctx.lineTo(s*8, -9);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }
    if(!c.grad){  // v6：蟹殼漸層快取（頂部受光更亮）
      c.grad = ctx.createLinearGradient(0,-14,0,14);
      c.grad.addColorStop(0, shade(c.col, 1.22)); c.grad.addColorStop(0.45, c.col); c.grad.addColorStop(1, c.colD);
    }
    ctx.fillStyle = c.grad;
    ctx.beginPath(); ctx.ellipse(0, 2, 21, 15, 0, 0, 7); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(0, -1, 15, 9, 0, Math.PI*1.1, Math.PI*1.9); ctx.stroke();
    const B = this.ball;  // 眼睛看向球
    const la = Math.atan2(B.y - c.y, B.x - c.x);
    for(const s of [-1, 1]){
      ctx.strokeStyle = c.colD; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(s*7, -8); ctx.lineTo(s*8, -16); ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(s*8, -18, 5.5, 0, 7); ctx.fill();
      ctx.fillStyle = '#04070f';
      ctx.beginPath(); ctx.arc(s*8 + Math.cos(la)*2.4, -18 + Math.sin(la)*2.4, 2.6, 0, 7); ctx.fill();
    }
    ctx.strokeStyle = c.colD; ctx.lineWidth = 2;  // 嘴
    ctx.beginPath(); ctx.arc(0, 4, 5, 0.3, Math.PI-0.3); ctx.stroke();
    if(c.frozT > 0){  // ❄冰凍外殼
      ctx.globalAlpha = 0.55;
      ctx.fillStyle = '#7fd8ff';
      ctx.beginPath(); ctx.ellipse(0, -2, 26, 22, 0, 0, 7); ctx.fill();
      ctx.globalAlpha = 1;
      text('❄', 0, -30, 18, '#e8f8ff');
    }
    ctx.restore();
  },
  drawBall(){
    const B = this.ball, sp = Math.hypot(B.vx, B.vy);
    if(sp > 420){   // v6：高速殘影
      ctx.globalAlpha = 0.22;
      ctx.drawImage(BALL_SPR, B.x - B.vx*0.03 - 16, B.y - B.vy*0.03 - 16);
      ctx.globalAlpha = 1;
    }
    ctx.save();
    ctx.translate(B.x, B.y);
    ctx.rotate(B.rot);
    ctx.drawImage(BALL_SPR, -16, -16);   // v6：立體烘焙足球（受光高光）
    ctx.restore();
  }
};

/* ================ 結算畫面（共用；再玩一次 <1 秒重開） ================ */
const overState = {
  cfg: null, t: 0, fw: 0,
  buttons: [],
  enter(){
    this.t = 0; this.fw = 0;
    const c = this.cfg, px = GAME_W/2, py = GAME_H/2;

      button(px-150, py+92, 190, 52, '再玩一次', ()=>{ if(this.t > 0.4) setState(c.replay); }, {size:24, grad:['#ff6b5e','#ffb627']}),

    ];
  },
  onKey(code){
    if((code === 'Space' || code === 'Enter') && this.t > 0.4) setState(this.cfg.replay);
    if(code === 'Escape') setState(menuState);
  },
  update(dt){
    this.t += dt;
    const c = this.cfg;
    if(c.newBest || c.win){  // 慶祝煙火
      this.fw -= dt;
      if(this.fw <= 0){
        this.fw = 0.55;
        burst(100 + Math.random()*(GAME_W-200), 60 + Math.random()*160,
              ['#ffd77a','#ff6b5e','#2ec4b6','#fff5d6'], 18, 260, {size:5, g:300, life:0.9});
        if(Math.random() < 0.5) SFX.spark();
      }
    }
  },
  draw(){
    this.cfg.bg.draw();  // 背景維持結束瞬間畫面
    ctx.fillStyle = 'rgba(4,7,15,0.66)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    drawParts();
    const c = this.cfg;
    const s = easeOutBack(clamp(this.t/0.4, 0, 1));
    ctx.save();
    ctx.translate(GAME_W/2, GAME_H/2);
    ctx.scale(s, s);
    const pw = 560, ph = 350;
    const g = ctx.createLinearGradient(0, -ph/2, 0, ph/2);
    g.addColorStop(0, '#16254d'); g.addColorStop(1, '#0e1a3a');

    ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 30;
    rr(-pw/2, -ph/2, pw, ph, 24); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,183,39,0.35)'; ctx.lineWidth = 2; ctx.stroke();
    text(c.title, 0, -118, 36, c.color, 'center', 'bold', 'rgba(4,7,15,0.6)');
    const hasStars = c.stars !== undefined;   // v2：三星評價（逐顆彈出）
    if(hasStars){
      for(let i=0;i<3;i++){
        const st = clamp((this.t - 0.5 - i*0.3)/0.3, 0, 1);
        if(st <= 0) continue;
        ctx.save();
        ctx.translate(-44 + i*44, -76);
        ctx.scale(easeOutBack(st), easeOutBack(st));
        text('★', 0, 0, 34, i < c.stars ? '#ffd447' : 'rgba(143,160,201,0.3)', 'center', 'bold', i < c.stars ? 'rgba(4,7,15,0.6)' : undefined);
        ctx.restore();
      }
    }
    text(c.lines[0], 0, hasStars ? -40 : -62, 20, '#8fa0c9');
    const pop = 1 + 0.05*Math.sin(tGlobal*3);
    ctx.save(); ctx.scale(pop, pop);
    text(c.lines[1], 0, hasStars ? 4 : -14, 54, '#f3ecd9', 'center', 'bold', 'rgba(4,7,15,0.5)');
    ctx.restore();
    if(c.newBest){
      const bs = 1 + 0.1*Math.sin(tGlobal*6);
      ctx.save(); ctx.scale(bs, bs);
      text('🎉 新紀錄！', 0, hasStars ? 54 : 40, 26, '#ffd447', 'center', 'bold', 'rgba(4,7,15,0.6)');
      ctx.restore();
    } else {
      text((c.bestLabel || '最佳紀錄') + '：' + c.best, 0, hasStars ? 54 : 40, 20, '#8fa0c9');
    }
    if(hasStars && c.starHint) text(c.starHint, 0, 78, 15, '#5b6790');
    ctx.restore();
    for(const b of this.buttons) drawButton(b);
    text('空白鍵再玩 ・ ESC 回選單', GAME_W/2, GAME_H-24, 15, '#5b6790');
    drawMute();
  }
};
function showOver(cfg){ overState.cfg = cfg; setState(overState); }

/* ================ 主選單 ================ */
const menuState = {
  t: 0, crabX: -80,
  buttons: [],
  enter(){
    this.t = 0; this.crabX = -80;
    setAmb('night');   // v6：夜風氛圍

      button(78, 226, 380, 240, '', ()=> setState(fishGame), {ghost:true}),

    if(code === 'Digit2') setState(crabGame);
  },

    this.t += dt;
    this.crabX += 65*dt;
    if(this.crabX > GAME_W + 80) this.crabX = -80;

    ctx.save();

    const cards = [  // 兩張遊戲卡（easeOutBack 進場）＋ v2：操作說明直接寫在卡上
      {b:this.buttons[0], emoji:'🎣', name:'大樓夜釣', desc1:'瞄準魚群連擊得分，小心水母！',

      {b:this.buttons[1], emoji:'⚽', name:'螃蟹足球', desc1:'紅蟹 vs 藍蟹，射進金色球門！',
       ctrl1:'💻 WASD/方向鍵 ＋ 空白鍵踢球', ctrl2:'📱 左半拖曳移動 ・ 右半點擊踢', grad:['#2ec4b6','#7fe6da'], delay:0.3}
    ];
    for(const cd of cards){
      const ct = easeOutBack(clamp((this.t - cd.delay)/0.5, 0, 1));
      const b = cd.b;
      ctx.save();
      ctx.globalAlpha = clamp((this.t - cd.delay)/0.3, 0, 1);

      const g = ctx.createLinearGradient(0, -b.h/2, 0, b.h/2);
      g.addColorStop(0, '#1a2a58'); g.addColorStop(1, '#101d44');
      ctx.fillStyle = g;
      ctx.shadowColor = cd.grad[0]; ctx.shadowBlur = 8 + b.hot*22;
      rr(-b.w/2, -b.h/2, b.w, b.h, 20); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = cd.grad[0]; ctx.globalAlpha *= 0.6 + b.hot*0.4;
      ctx.lineWidth = 2.5; ctx.stroke();
      ctx.globalAlpha = clamp((this.t - cd.delay)/0.3, 0, 1);
      text(cd.emoji, 0, -68 + Math.sin(tGlobal*2 + cd.delay*8)*4, 48, '#fff');
      text(cd.name, 0, -18, 29, '#f3ecd9');

      const pg = ctx.createLinearGradient(-70, 0, 70, 0);

      text('開始', 0, 98, 22, '#1c1000');

    ctx.translate(this.crabX, GAME_H - 26);

    ctx.beginPath(); ctx.ellipse(0, 0, 14, 9, 0, 0, 7); ctx.fill();
    ctx.strokeStyle = '#c94b3f'; ctx.lineWidth = 2.5; ctx.lineCap='round';
    for(let i=0;i<3;i++){
      const sw = Math.sin(tGlobal*8 + i*2)*4;
      ctx.beginPath(); ctx.moveTo(-8+i*2, 6); ctx.lineTo(-15+i*3+sw, 13); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(8-i*2, 6); ctx.lineTo(15-i*3-sw, 13); ctx.stroke();

    ctx.fillStyle = '#fff';

    ctx.save();
    ctx.translate(26, 2); ctx.rotate(tGlobal*6);
    ctx.fillStyle = '#f3ecd9'; ctx.beginPath(); ctx.arc(0, 0, 7, 0, 7); ctx.fill();

    ctx.restore();
    ctx.restore();
    drawParts(); drawFloaters();
    text(TOUCH_DEV ? '點選遊戲卡開始 ・ 支援觸控與鍵盤' : '點卡片或按 1 / 2 選擇 ・ M 鍵靜音', GAME_W/2, GAME_H-40, 15, '#5b6790');
    drawVignette();
    drawMute();
  }
};

/* ================ 主迴圈：固定時間步進 60Hz + hit-stop（跳過邏輯照常渲染） ================ */
const STEP = 1/60;
let last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  const ft = Math.min((now - last)/1000, 0.1);
  last = now; rdt = ft;
  acc += ft;
  while(acc >= STEP){
    acc -= STEP;
    if(freeze > 0){ freeze -= STEP; continue; }
    tGlobal += STEP;
    state.update(STEP);
    updateParts(STEP); updateFloaters(STEP); updateMeteors(STEP); updateMeteors(STEP);
    shake *= Math.pow(0.0008, STEP); if(shake < 0.1) shake = 0;
    flash = Math.max(0, flash - STEP*3);
  }
  state.draw();
  if(flash > 0){
    ctx.fillStyle = 'rgba(255,255,255,' + flash.toFixed(3) + ')';
    ctx.fillRect(0,0,GAME_W,GAME_H);
  }
  if(innerHeight > innerWidth*1.15){  // v2：直向持機提示（不阻擋操作）
    ctx.globalAlpha = 0.85;
    pill(GAME_W/2-118, 62, 236, 34, 'rgba(255,183,39,0.5)');
    text('↻ 轉成橫向，畫面更大！', GAME_W/2, 79, 16, '#ffd77a');
    ctx.globalAlpha = 1;
  }
}
setState(menuState);
requestAnimationFrame(frame);
