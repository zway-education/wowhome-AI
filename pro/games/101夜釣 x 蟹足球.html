<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>101夜釣 x 蟹足球</title>
<style>
  html,body{margin:0;height:100%;background:#070c1d;overflow:hidden;touch-action:none;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
  body{background:radial-gradient(ellipse at 50% -20%, #122048, #070c1d 70%)}
  canvas{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);touch-action:none}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
'use strict';
/* 101 夜釣戰隊 × 蟹將盃足球 —— 專業AI升級版
   雙遊戲街機櫃：🎣 大樓夜釣（鐵皮特工在 101 頂樓夜釣）＋ ⚽ 螃蟹足球（紅蟹 vs 藍蟹 60 秒對決）
   固定時間步進、狀態機、粒子/震動/hit-stop、Web Audio 音效 */
const GAME_W = 960, GAME_H = 540, WATER_Y = 300;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const REDUCED = matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
const TOUCH_DEV = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

function resize(){
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = Math.round(GAME_W * scale * dpr); canvas.height = Math.round(GAME_H * scale * dpr);
  canvas.style.width  = GAME_W * scale + 'px'; canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale;
}
addEventListener('resize', resize); resize();

/* ---------------- 小工具 ---------------- */
const clamp = (v,a,b)=> Math.max(a, Math.min(b, v));
const dist  = (x1,y1,x2,y2)=> Math.hypot(x2-x1, y2-y1);
const easeOutBack  = t => 1 + 2.7*Math.pow(t-1,3) + 1.7*Math.pow(t-1,2);
const easeOutCubic = t => 1 - Math.pow(1-t,3);
function rr(x,y,w,h,r){
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function text(str,x,y,size,color,align,weight,stroke){
  ctx.font = (weight||'bold') + ' ' + size + 'px "Trebuchet MS","Microsoft JhengHei","PingFang TC",sans-serif';
  ctx.textAlign = align || 'center'; ctx.textBaseline = 'middle';
  if(stroke){ ctx.lineWidth = Math.max(2, size/7); ctx.strokeStyle = stroke; ctx.strokeText(str,x,y); }
  ctx.fillStyle = color; ctx.fillText(str,x,y);
}
function makeRand(seed){
  let s = seed;
  return function(){ s = (s*16807) % 2147483647; return s / 2147483647; };
}
function store(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
function load(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }

/* ---------------- 全域回饋層：震動 / hit-stop / 閃光 ---------------- */
let shake = 0, freeze = 0, flash = 0, tGlobal = 0, rdt = 1/60;
function addShake(n){ shake = Math.max(shake, REDUCED ? n*0.3 : n); }
function hitStop(t){ freeze = Math.max(freeze, t); }
function beginShake(){
  ctx.save();
  if(shake > 0.1) ctx.translate((Math.random()*2-1)*shake, (Math.random()*2-1)*shake);
}
function endShake(){ ctx.restore(); }

/* ---------------- 粒子系統 ---------------- */
const parts = [];
function spawnPart(p){ if(parts.length < 420) parts.push(p); }
function burst(x,y,color,n,speed,opt){
  opt = opt || {};
  for(let i=0;i<n;i++){
    const a = opt.arcFrom !== undefined ? opt.arcFrom + Math.random()*(opt.arcTo - opt.arcFrom) : Math.random()*Math.PI*2;
    const s = (speed||220) * (0.3 + Math.random()*0.7);
    spawnPart({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      life: (opt.life||0.5)*(0.7+Math.random()*0.6),
      color: Array.isArray(color) ? color[(Math.random()*color.length)|0] : color,
      size: opt.size||6, g: opt.g!==undefined ? opt.g : 600 });
  }
}
function updateParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p = parts[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += p.g*dt; p.life -= dt;
    if(p.life <= 0) parts.splice(i,1);
  }
}
function drawParts(){
  for(const p of parts){
    ctx.globalAlpha = clamp(p.life*2, 0, 1);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

/* ---------------- 飄字 ---------------- */
const floaters = [];
function floater(x,y,txt,color,size){ floaters.push({x, y, txt, color, size: size||24, t:0, life:0.8}); }
function updateFloaters(dt){
  for(let i=floaters.length-1;i>=0;i--){
    const f = floaters[i];
    f.t += dt; f.y -= 55*dt;
    if(f.t >= f.life) floaters.splice(i,1);
  }
}
function drawFloaters(){
  for(const f of floaters){
    ctx.globalAlpha = clamp(1 - f.t/f.life, 0, 1);
    text(f.txt, f.x, f.y, f.size, f.color, 'center', 'bold', 'rgba(4,7,15,0.8)');
  }
  ctx.globalAlpha = 1;
}

/* ---------------- 音效：Web Audio 合成（零音檔） ---------------- */
let AC = null;
let muted = load('wow101v2_mute') === '1';
function audio(){
  if(!AC){ try{ AC = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){} }
  if(AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function beep(freq,dur,type,vol,slide,delay){
  if(muted) return;
  const ac = audio(); if(!ac) return;
  const t0 = ac.currentTime + (delay||0);
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq+slide), t0+dur);
  g.gain.setValueAtTime(vol || 0.14, t0); g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  o.connect(g).connect(ac.destination); o.start(t0); o.stop(t0+dur+0.03);
}
function noise(dur,vol,delay){
  if(muted) return;
  const ac = audio(); if(!ac) return;
  const t0 = ac.currentTime + (delay||0);
  const len = Math.max(1, (dur*ac.sampleRate)|0);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i] = (Math.random()*2-1) * (1 - i/len);
  const s = ac.createBufferSource(); s.buffer = buf;
  const g = ac.createGain();
  g.gain.setValueAtTime(vol || 0.12, t0); g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  s.connect(g).connect(ac.destination); s.start(t0);
}
const SFX = {
  click(){ beep(660,0.05,'square',0.1); },
  cast(){ beep(300,0.18,'sine',0.12,-160); noise(0.08,0.06); },
  splash(){ noise(0.22,0.14); beep(160,0.1,'sine',0.06,-60); },
  catchFish(){ beep(880,0.07,'square',0.13); beep(1175,0.12,'square',0.13,0,0.07); },
  golden(){ beep(880,0.08,'square',0.14); beep(1109,0.08,'square',0.14,0,0.08); beep(1319,0.2,'square',0.14,0,0.16); },
  whiff(){ beep(240,0.1,'triangle',0.07,-80); },
  jelly(){ beep(190,0.3,'sawtooth',0.16,-120); noise(0.15,0.1); },
  kick(){ beep(150,0.07,'square',0.15,60); noise(0.05,0.1); },
  swing(){ noise(0.06,0.05); },
  bounce(){ beep(220,0.05,'triangle',0.07); },
  goal(){ beep(523,0.1,'square',0.14); beep(659,0.1,'square',0.14,0,0.1); beep(784,0.1,'square',0.14,0,0.2); beep(1047,0.25,'square',0.15,0,0.3); },
  concede(){ beep(330,0.15,'sawtooth',0.12,-60); beep(220,0.3,'sawtooth',0.12,-70,0.15); },
  whistle(){ beep(2350,0.12,'square',0.08); beep(2350,0.3,'square',0.08,0,0.18); },
  tick(){ beep(1320,0.04,'square',0.07); },
  win(){ [523,659,784,1047,1319].forEach((f,i)=> beep(f,0.16,'square',0.13,0,i*0.11)); },
  lose(){ beep(392,0.2,'triangle',0.12,-40); beep(294,0.35,'triangle',0.12,-40,0.2); },
  spark(){ beep(1568,0.06,'square',0.06); }
};
function toggleMute(){
  muted = !muted;
  store('wow101v2_mute', muted ? '1' : '0');
  if(!muted) SFX.click();
}

/* ---------------- 輸入：鍵盤 + 指標（滑鼠/觸控統一） ---------------- */
const keys = {};
const mouse = {x:-99, y:-99};
const pointers = new Map();
addEventListener('keydown', e=>{
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space','Enter'].indexOf(e.code) >= 0) e.preventDefault();
  audio();
  keys[e.code] = true;
  if(e.repeat) return;
  if(e.code === 'KeyM'){ toggleMute(); return; }
  if(state && state.onKey) state.onKey(e.code);
});
addEventListener('keyup', e=>{ keys[e.code] = false; });

function toXY(e){
  const r = canvas.getBoundingClientRect();
  return { x:(e.clientX - r.left)/canvas._scale, y:(e.clientY - r.top)/canvas._scale };
}
function within(b,p){ return p.x>=b.x && p.x<=b.x+b.w && p.y>=b.y && p.y<=b.y+b.h; }
function activeButtons(){
  const arr = [muteBtn];
  if(state && state.buttons) arr.push.apply(arr, state.buttons);
  return arr;
}
canvas.addEventListener('pointerdown', e=>{
  e.preventDefault(); audio();
  const p = toXY(e);
  mouse.x = p.x; mouse.y = p.y;
  for(const b of activeButtons()){
    if(within(b,p)){ b.press = 1; SFX.click(); b.onClick(); return; }
  }
  pointers.set(e.pointerId, {x:p.x, y:p.y, sx:p.x, sy:p.y, t:tGlobal});
  if(state.pDown) state.pDown(p, e.pointerId);
});
canvas.addEventListener('pointermove', e=>{
  const p = toXY(e);
  mouse.x = p.x; mouse.y = p.y;
  const pt = pointers.get(e.pointerId);
  if(pt){ pt.x = p.x; pt.y = p.y; }
  if(state.pMove) state.pMove(p, e.pointerId, !!pt);
});
function endPtr(e){
  const p = toXY(e);
  const pt = pointers.get(e.pointerId);
  pointers.delete(e.pointerId);
  if(state.pUp) state.pUp(p, e.pointerId, pt);
}
canvas.addEventListener('pointerup', endPtr);
canvas.addEventListener('pointercancel', endPtr);
canvas.addEventListener('contextmenu', e=> e.preventDefault());

/* ---------------- 按鈕系統（畫在 canvas 上，48px 以上可點區） ---------------- */
function button(x,y,w,h,label,onClick,opt){
  opt = opt || {};
  return {x,y,w,h,label,onClick,hot:0,press:0,ghost:!!opt.ghost,
          size:opt.size||24, grad:opt.grad||['#ff6b5e','#ffb627'], fg:opt.fg||'#1c1000'};
}
function drawButton(b){
  b.press = Math.max(0, b.press - rdt*5);
  const hover = within(b, mouse);
  b.hot += ((hover?1:0) - b.hot) * Math.min(1, rdt*12);
  if(b.ghost) return;
  const s = 1 + b.hot*0.045 - b.press*0.08;
  ctx.save();
  ctx.translate(b.x + b.w/2, b.y + b.h/2);
  ctx.scale(s, s);
  const g = ctx.createLinearGradient(-b.w/2, -b.h/2, b.w/2, b.h/2);
  g.addColorStop(0, b.grad[0]); g.addColorStop(1, b.grad[1]);
  ctx.fillStyle = g;
  ctx.shadowColor = b.grad[0]; ctx.shadowBlur = 10 + b.hot*10;
  rr(-b.w/2, -b.h/2, b.w, b.h, b.h/2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 2; ctx.stroke();
  text(b.label, 0, 2, b.size, b.fg);
  ctx.restore();
}
const muteBtn = button(GAME_W-62, 12, 48, 42, '', toggleMute, {ghost:true});
function drawMute(){
  drawButton(muteBtn);
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = 'rgba(4,7,15,0.5)';
  rr(muteBtn.x, muteBtn.y, muteBtn.w, muteBtn.h, 12); ctx.fill();
  ctx.strokeStyle = 'rgba(143,160,201,0.4)'; ctx.lineWidth = 1.5; ctx.stroke();
  text(muted ? '🔇' : '🔊', muteBtn.x+24, muteBtn.y+23, 22, '#f3ecd9');
  ctx.globalAlpha = 1;
}
function pill(x,y,w,h,glow){
  ctx.fillStyle = 'rgba(4,7,15,0.55)';
  rr(x,y,w,h,h/2); ctx.fill();
  ctx.strokeStyle = glow || 'rgba(255,183,39,0.35)';
  ctx.lineWidth = 1.5; ctx.stroke();
}
const VIGN = (function(){
  const g = ctx.createRadialGradient(GAME_W/2, GAME_H/2, GAME_H*0.45, GAME_W/2, GAME_H/2, GAME_H*0.85);
  g.addColorStop(0, 'rgba(0,0,0,0)'); g.addColorStop(1, 'rgba(2,4,12,0.4)');
  return g;
})();
function drawVignette(){ ctx.fillStyle = VIGN; ctx.fillRect(0,0,GAME_W,GAME_H); }

/* ---------------- 夜空 / 城市 素材（預先生成，避免每幀閃爍） ---------------- */
const rand0 = makeRand(20260709);
const stars = [];
for(let i=0;i<70;i++) stars.push({x:rand0()*GAME_W, y:rand0()*(WATER_Y-60), r:0.6+rand0()*1.6, ph:rand0()*7, sp:0.5+rand0()*2});
const skylineFar = [], skylineNear = [];
(function(){
  let x = -20;
  while(x < GAME_W+40){ const w = 40+rand0()*70, h = 40+rand0()*70; skylineFar.push({x,w,h}); x += w+6; }
  x = -30;
  while(x < GAME_W+40){
    const w = 46+rand0()*80, h = 70+rand0()*120;
    const wins = [];
    for(let r=0;r<Math.floor(h/22);r++)
      for(let c=0;c<Math.floor(w/20);c++)
        if(rand0() < 0.4) wins.push({dx:8+c*20, dy:12+r*22, ph:rand0()*7});
    skylineNear.push({x,w,h,wins});
    x += w+14;
  }
})();
const TX = 812, TOWER_TOP = 96;
const towerWins = [];
for(let r=0;r<14;r++)
  for(let c=0;c<4;c++)
    if(rand0() < 0.82) towerWins.push({x:TX-30+c*18, y:TOWER_TOP+10+r*13, ph:rand0()*7, sp:0.3+rand0()*1.2});

function drawSky(t){
  const sky = ctx.createLinearGradient(0,0,0,WATER_Y);
  sky.addColorStop(0,'#050915'); sky.addColorStop(0.6,'#0b1730'); sky.addColorStop(1,'#14224e');
  ctx.fillStyle = sky; ctx.fillRect(0,0,GAME_W,WATER_Y+4);
  for(const s of stars){
    ctx.globalAlpha = 0.35 + 0.55*Math.abs(Math.sin(t*s.sp + s.ph));
    ctx.fillStyle = '#f3ecd9'; ctx.fillRect(s.x, s.y, s.r*2, s.r*2);
  }
  ctx.globalAlpha = 1;
  ctx.save();  // 月亮
  ctx.shadowColor = '#f5efe0'; ctx.shadowBlur = 30;
  ctx.fillStyle = '#f5efe0';
  ctx.beginPath(); ctx.arc(110, 70, 28, 0, 7); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(11,23,48,0.25)';
  ctx.beginPath(); ctx.arc(102, 62, 7, 0, 7); ctx.arc(122, 80, 5, 0, 7); ctx.fill();
  ctx.restore();
}
function drawCity(t){
  ctx.fillStyle = '#0c1735';
  for(const b of skylineFar) ctx.fillRect(b.x, WATER_Y - b.h*0.6, b.w, b.h*0.6+4);
  ctx.fillStyle = '#101d44';
  for(const b of skylineNear){
    ctx.fillRect(b.x, WATER_Y - b.h, b.w, b.h+4);
    for(const w of b.wins){
      ctx.globalAlpha = 0.25 + 0.45*Math.abs(Math.sin(t*0.7 + w.ph));
      ctx.fillStyle = '#ffb627';
      ctx.fillRect(b.x + w.dx, WATER_Y - b.h + w.dy, 6, 8);
      ctx.fillStyle = '#101d44';
    }
  }
  ctx.globalAlpha = 1;
}
function drawTower(t){
  // 台北 101：八節斗型節節高升 + 尖塔 + 閃爍航空燈
  const segs = 8, baseY = WATER_Y - 30, hSeg = (baseY - TOWER_TOP) / segs;
  ctx.fillStyle = '#0f1c42'; ctx.fillRect(TX-58, WATER_Y-34, 116, 38);
  for(let i=0;i<segs;i++){
    const yB = baseY - i*hSeg, yT = yB - hSeg;
    ctx.fillStyle = i%2 ? '#15234f' : '#101d44';
    ctx.beginPath();
    ctx.moveTo(TX-33, yB); ctx.lineTo(TX-44, yT+3); ctx.lineTo(TX+44, yT+3); ctx.lineTo(TX+33, yB);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#1c2d63'; ctx.fillRect(TX-46, yT, 92, 4);
  }
  for(const w of towerWins){
    ctx.globalAlpha = 0.3 + 0.55*Math.abs(Math.sin(t*w.sp + w.ph));
    ctx.fillStyle = '#ffd77a'; ctx.fillRect(w.x, w.y, 7, 8);
  }
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#162552'; ctx.fillRect(TX-15, TOWER_TOP-18, 30, 20);
  ctx.strokeStyle = '#8fa0c9'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(TX, TOWER_TOP-18); ctx.lineTo(TX, TOWER_TOP-54); ctx.stroke();
  const bl = 0.5 + 0.5*Math.sin(t*4);
  ctx.fillStyle = 'rgba(255,100,100,' + (0.4+0.6*bl) + ')';
  ctx.beginPath(); ctx.arc(TX, TOWER_TOP-54, 3.5 + bl*2.5, 0, 7); ctx.fill();
}
function drawWater(t){
  const water = ctx.createLinearGradient(0, WATER_Y, 0, GAME_H);
  water.addColorStop(0,'#14476b'); water.addColorStop(0.5,'#0b2c48'); water.addColorStop(1,'#04101c');
  ctx.fillStyle = water; ctx.fillRect(0, WATER_Y, GAME_W, GAME_H-WATER_Y);
  ctx.strokeStyle = 'rgba(168,230,226,0.5)'; ctx.lineWidth = 2.5;  // 波浪表面
  ctx.beginPath();
  for(let x=0;x<=GAME_W;x+=16){
    const y = WATER_Y + Math.sin(t*1.8 + x*0.025)*3;
    x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.stroke();
  ctx.globalAlpha = 0.12; ctx.fillStyle = '#f5efe0';  // 月光倒影
  for(let i=0;i<7;i++){
    const yy = WATER_Y + 16 + i*30, ww = 40 + Math.sin(t*1.5+i)*14;
    ctx.fillRect(110-ww/2, yy, ww, 4);
  }
  ctx.globalAlpha = 1;
  ctx.strokeStyle = 'rgba(46,196,182,0.14)'; ctx.lineWidth = 1.5;  // 水中光紋
  for(let w=0;w<5;w++){
    ctx.beginPath();
    for(let x=0;x<=GAME_W;x+=24){
      const y = WATER_Y + 42 + w*42 + Math.sin(t*1.2 + x*0.018 + w*2)*4;
      x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
}

/* ---------------- 鐵皮特工（機甲釣手） ---------------- */
const ROD_TIP = {x:688, y:66};
function drawMecha(t, bend, sq){
  const bx = 748, by = 128 + Math.sin(t*2)*2;
  ctx.save();
  ctx.fillStyle = '#1c2d63'; rr(716, 128, 84, 12, 4); ctx.fill();  // 平台
  ctx.translate(bx, by);
  ctx.scale(1 + (1-sq)*0.5, sq);  // squash & stretch
  ctx.fillStyle = '#8a2f26'; rr(-18, -16, 13, 18, 3); ctx.fill(); rr(5, -16, 13, 18, 3); ctx.fill();  // 腳
  ctx.fillStyle = '#c94b3f'; rr(-20, -52, 40, 38, 7); ctx.fill();  // 身體
  ctx.fillStyle = '#ffb627'; rr(-12, -46, 24, 12, 4); ctx.fill();  // 胸甲
  ctx.fillStyle = '#c94b3f'; rr(-14, -74, 28, 22, 6); ctx.fill();  // 頭
  ctx.fillStyle = '#0b1730'; rr(-10, -69, 20, 10, 4); ctx.fill();
  const gl = 0.6 + 0.4*Math.sin(t*3);
  ctx.fillStyle = 'rgba(46,196,182,' + gl + ')';
  ctx.beginPath(); ctx.arc(-5,-64,2.6,0,7); ctx.arc(5,-64,2.6,0,7); ctx.fill();  // 發光眼
  ctx.strokeStyle = '#ffd77a'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0,-74); ctx.lineTo(0,-82); ctx.stroke();
  ctx.fillStyle = '#ffd77a'; ctx.beginPath(); ctx.arc(0,-84,2.5,0,7); ctx.fill();  // 天線
  ctx.fillStyle = '#8a2f26'; rr(-30, -48, 12, 24, 5); ctx.fill();  // 手臂
  ctx.restore();
  const hx = bx-26, hy = by-40;  // 釣竿（隨施力彎曲）
  ctx.strokeStyle = '#dfe4f2'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(hx, hy);
  ctx.quadraticCurveTo((hx+ROD_TIP.x)/2, (hy+ROD_TIP.y)/2 + bend*22, ROD_TIP.x, ROD_TIP.y);
  ctx.stroke();
  ctx.fillStyle = '#ffb627'; ctx.beginPath(); ctx.arc(hx, hy, 5, 0, 7); ctx.fill();
}

/* ================ 狀態機 ================ */
let state = null;
function setState(s){ state = s; if(s.enter) s.enter(); }

/* ================ 🎣 大樓夜釣 ================ */
const FISH_KINDS = [
  {r:15, color:'#ff6b5e', belly:'#ffd0a0', pts:10, sp:70,  dMin:335, dMax:400},
  {r:20, color:'#2ec4b6', belly:'#a8e6e2', pts:15, sp:52,  dMin:360, dMax:450},
  {r:11, color:'#f4a442', belly:'#ffd98e', pts:20, sp:125, dMin:390, dMax:470},
];
const GOLD_KIND = {r:13, color:'#ffd447', belly:'#fff5d6', pts:50, sp:195, dMin:430, dMax:505, gold:true};
const IDLE_Y = 168, HOOK_MAX_Y = 512, AIM_MIN = 50, AIM_MAX = 655;

const fishGame = {
  buttons: [],
  enter(){
    this.score = 0; this.dispScore = 0; this.time = 60; this.elapsed = 0; this.prevCeil = 61;
    this.combo = 0; this.comboPop = 0;
    this.cast = 'idle';                 // idle → drop → reel
    this.aimX = GAME_W*0.35; this.hookX = this.aimX; this.hookY = IDLE_Y; this.prevHookY = IDLE_Y;
    this.carry = null; this.missed = false; this.rodBend = 0.2; this.mechaSq = 1;
    this.fishes = []; this.jellies = [];
    for(let i=0;i<6;i++) this.spawnFish(false, true);
    this.hint = 6; this.buttons = [];
    floater(GAME_W/2, 240, '瞄準魚群，拋線！', '#ffd77a', 30);
  },
  spawnFish(gold, anywhere){
    const k = gold ? GOLD_KIND : FISH_KINDS[(Math.random()*FISH_KINDS.length)|0];
    const dir = Math.random() < 0.5 ? 1 : -1;
    this.fishes.push({ k, dir,
      x: anywhere ? 60+Math.random()*(GAME_W-120) : (dir===1 ? -40 : GAME_W+40),
      y: k.dMin + Math.random()*(k.dMax-k.dMin),
      sp: k.sp * (0.8+Math.random()*0.5),
      wig: Math.random()*7, sx:1, sy:1 });
  },
  castAction(){
    if(this.cast === 'idle'){
      this.cast = 'drop'; this.missed = false; this.mechaSq = 0.82;
      SFX.cast();
      burst(ROD_TIP.x, ROD_TIP.y, '#dfe4f2', 4, 120, {size:3, g:300, life:0.3});
    } else if(this.cast === 'drop'){ this.cast = 'reel'; }
  },
  onKey(code){
    if(code === 'Space' || code === 'Enter') this.castAction();
    if(code === 'Escape') setState(menuState);
  },
  pMove(p){ this.aimX = clamp(p.x, AIM_MIN, AIM_MAX); },
  pUp(p, id, pt){
    if(pt && dist(p.x,p.y,pt.sx,pt.sy) < 16 && (tGlobal - pt.t) < 0.4){
      this.aimX = clamp(p.x, AIM_MIN, AIM_MAX);
      if(this.cast === 'idle') this.hookX = this.aimX;
      this.castAction();
    }
  },
  update(dt){
    this.elapsed += dt; this.hint -= dt; this.time -= dt;
    if(this.time <= 0){ this.time = 0; this.finish(); return; }
    const ceil = Math.ceil(this.time);
    if(ceil !== this.prevCeil){ this.prevCeil = ceil; if(ceil <= 10) SFX.tick(); }
    // 鍵盤瞄準
    if(keys['ArrowLeft'] || keys['KeyA'])  this.aimX = clamp(this.aimX - 480*dt, AIM_MIN, AIM_MAX);
    if(keys['ArrowRight']|| keys['KeyD'])  this.aimX = clamp(this.aimX + 480*dt, AIM_MIN, AIM_MAX);
    if(this.cast === 'idle') this.hookX += (this.aimX - this.hookX) * (1 - Math.pow(0.0001, dt));
    // 鉤子升降
    this.prevHookY = this.hookY;
    if(this.cast === 'drop'){
      this.hookY += 640*dt;
      if(this.hookY >= HOOK_MAX_Y){ this.hookY = HOOK_MAX_Y; this.cast = 'reel'; this.missed = true; }
    } else if(this.cast === 'reel'){
      this.hookY -= 860*dt;
      if(this.hookY <= IDLE_Y){
        this.hookY = IDLE_Y;
        if(this.carry){
          burst(this.hookX, this.hookY, ['#ffd77a','#fff5d6'], 8, 150, {size:4, g:200, life:0.4});
          SFX.spark(); this.carry = null;
        } else if(this.missed){
          if(this.combo > 0) floater(this.hookX, this.hookY, '連擊中斷', '#8fa0c9', 18);
          this.combo = 0; SFX.whiff();
        }
        this.cast = 'idle';
      }
    } else {
      this.hookY += (IDLE_Y - this.hookY) * Math.min(1, dt*10);
    }
    // 入水 / 出水水花
    if(this.prevHookY < WATER_Y && this.hookY >= WATER_Y){
      SFX.splash();
      burst(this.hookX, WATER_Y, ['#a8e6e2','#f3ecd9'], 12, 200, {size:4, g:520, life:0.5, arcFrom:-Math.PI*0.85, arcTo:-Math.PI*0.15});
    }
    if(this.prevHookY > WATER_Y && this.hookY <= WATER_Y)
      burst(this.hookX, WATER_Y, '#a8e6e2', 6, 140, {size:3, g:480, life:0.35, arcFrom:-Math.PI*0.8, arcTo:-Math.PI*0.2});
    // 碰撞：魚 / 水母
    const speedMul = 1 + Math.min(0.8, this.elapsed/70);   // 難度：魚速漸增
    if(this.cast === 'drop' && !this.carry){
      for(let i=0;i<this.fishes.length;i++){
        const f = this.fishes[i];
        if(dist(f.x, f.y, this.hookX, this.hookY) < f.k.r + 17){ this.catchFish(f, i); break; }
      }
      for(const j of this.jellies){
        if(j.stun <= 0 && dist(j.x, j.y, this.hookX, this.hookY) < 26){ this.hitJelly(j); break; }
      }
    }
    for(const f of this.fishes){
      f.x += f.dir * f.sp * speedMul * dt;
      f.wig += dt * (5 + f.sp/25);
      f.sx += (1-f.sx)*Math.min(1,dt*10); f.sy += (1-f.sy)*Math.min(1,dt*10);
      if(f.dir===1 && f.x > GAME_W+50){ f.x = -50; f.y = f.k.dMin + Math.random()*(f.k.dMax-f.k.dMin); }
      if(f.dir===-1 && f.x < -50){ f.x = GAME_W+50; f.y = f.k.dMin + Math.random()*(f.k.dMax-f.k.dMin); }
    }
    const cap = 6 + Math.min(4, Math.floor(this.elapsed/15));
    if(this.fishes.length < cap && Math.random() < 0.02){
      const goldChance = Math.min(0.06 + this.elapsed*0.004, 0.25);
      this.spawnFish(Math.random() < goldChance, false);
    }
    // 水母（15 秒後 1 隻、35 秒後 2 隻）
    const jellyCount = this.elapsed > 35 ? 2 : (this.elapsed > 15 ? 1 : 0);
    while(this.jellies.length < jellyCount){
      this.jellies.push({x: 150+Math.random()*450, baseY: 380+Math.random()*90, y:0, t:Math.random()*7, drift:(Math.random()<0.5?-1:1)*22, stun:0});
      floater(GAME_W/2, 200, '⚠ 小心水母！', '#c77dff', 24);
    }
    for(const j of this.jellies){
      j.t += dt; j.stun = Math.max(0, j.stun - dt);
      j.x = clamp(j.x + Math.sin(j.t*0.6)*j.drift*dt, 60, 640);
      j.y = j.baseY + Math.sin(j.t*1.4)*26;
    }
    if(this.carry){ this.carry.x = this.hookX; this.carry.y = this.hookY + 14; this.carry.wig += dt*12; }
    if(Math.random() < 0.05)  // 氣泡氛圍
      spawnPart({x: 40+Math.random()*880, y: GAME_H-10, vx:0, vy:-30-Math.random()*30, life:1.4, color:'rgba(168,230,226,0.5)', size:3, g:-15});
    this.mechaSq += (1 - this.mechaSq)*Math.min(1, dt*9);
    const bendT = this.cast==='drop' ? 1 : (this.cast==='reel' ? 1.5 : 0.2);
    this.rodBend += (bendT - this.rodBend)*Math.min(1, dt*8);
    this.dispScore += (this.score - this.dispScore)*Math.min(1, dt*9);
    this.comboPop = Math.max(0, this.comboPop - dt*3);
  },
  catchFish(f, i){
    this.fishes.splice(i,1);
    this.combo++; this.comboPop = 1;
    const mul = Math.min(this.combo, 5);
    const gain = f.k.pts * mul;
    this.score += gain;
    this.carry = f; f.sx = 1.35; f.sy = 0.65;
    this.cast = 'reel'; this.mechaSq = 1.25;
    hitStop(f.k.gold ? 0.1 : 0.05);
    addShake(f.k.gold ? 8 : 4);
    if(f.k.gold){ flash = 0.25; SFX.golden(); } else SFX.catchFish();
    burst(f.x, f.y, [f.k.color, '#fff5d6'], f.k.gold ? 22 : 12, 240, {size:5, g:300, life:0.5});
    floater(f.x, f.y - 20, '+' + gain + (mul>1 ? '（x'+mul+'）' : ''), f.k.gold ? '#ffd447' : '#ffd77a', f.k.gold ? 30 : 24);
  },
  hitJelly(j){
    j.stun = 1.6;
    this.score = Math.max(0, this.score - 15);
    if(this.combo > 0) floater(this.hookX, this.hookY - 40, '連擊中斷', '#8fa0c9', 18);
    this.combo = 0; this.cast = 'reel'; this.missed = false;
    hitStop(0.08); addShake(7); SFX.jelly();
    burst(j.x, j.y, ['#c77dff','#8b5cf6'], 16, 220, {size:5, g:200, life:0.5});
    floater(j.x, j.y - 20, '-15 好麻！', '#c77dff', 26);
  },
  finish(){
    const best = parseInt(load('wow101v2_fish_best') || '0', 10);
    const newBest = this.score > best;
    if(newBest) store('wow101v2_fish_best', String(this.score));
    if(newBest && this.score > 0) SFX.win(); else SFX.whistle();
    showOver({ bg: this, replay: fishGame, title: '任務完成，鐵皮特工！',
      lines: ['本次戰績', this.score + ' 分'],
      best: Math.max(best, this.score), newBest: newBest && this.score > 0, color: '#ffd77a' });
  },
  draw(){
    beginShake();
    drawSky(tGlobal); drawCity(tGlobal); drawTower(tGlobal); drawWater(tGlobal);
    drawMecha(tGlobal, this.rodBend, this.mechaSq);
    if(this.cast === 'idle'){  // 瞄準輔助線
      ctx.save();
      ctx.setLineDash([4,10]);
      ctx.strokeStyle = 'rgba(46,196,182,0.3)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(this.hookX, WATER_Y+8); ctx.lineTo(this.hookX, HOOK_MAX_Y); ctx.stroke();
      ctx.restore();
    }
    for(const f of this.fishes) this.drawFish(f);
    for(const j of this.jellies) this.drawJelly(j);
    // 釣線 + 發光魚鉤
    const sag = this.cast === 'idle' ? 24 : 4;
    ctx.strokeStyle = 'rgba(223,228,242,0.9)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(ROD_TIP.x, ROD_TIP.y);
    ctx.quadraticCurveTo((ROD_TIP.x+this.hookX)/2, (ROD_TIP.y+this.hookY)/2 + sag, this.hookX, this.hookY);
    ctx.stroke();
    ctx.save();
    ctx.shadowColor = '#ffd77a'; ctx.shadowBlur = 8;
    ctx.strokeStyle = '#ffd77a'; ctx.lineWidth = 3; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(this.hookX, this.hookY+6, 6, -0.5, Math.PI*1.1); ctx.stroke();
    ctx.restore();
    if(this.carry) this.drawFish(this.carry, true);
    drawParts(); drawFloaters(); drawVignette();
    endShake();
    // ---- HUD ----
    pill(14, 12, 190, 42);
    text('分數', 48, 33, 17, '#8fa0c9');
    text(String(Math.round(this.dispScore)), 130, 33, 26, '#ffd77a');
    if(this.combo >= 2){
      const cs = 1 + this.comboPop*0.25;
      ctx.save(); ctx.translate(268, 33); ctx.scale(cs, cs);
      pill(-52, -21, 104, 42, 'rgba(46,196,182,0.5)');
      text('連擊 x' + Math.min(this.combo,5), 0, 0, 20, '#2ec4b6');
      ctx.restore();
    }
    const tc = Math.ceil(this.time), urgent = tc <= 10;
    const ts = urgent ? 1 + 0.08*Math.sin(tGlobal*10) : 1;
    ctx.save(); ctx.translate(GAME_W/2, 33); ctx.scale(ts, ts);
    pill(-62, -21, 124, 42, urgent ? 'rgba(255,107,94,0.7)' : undefined);
    text('⏱ ' + tc, 0, 0, 24, urgent ? '#ff6b5e' : '#f3ecd9');
    ctx.restore();
    drawMute();
    if(this.hint > 0){
      ctx.globalAlpha = clamp(this.hint, 0, 1);
      pill(GAME_W/2-235, GAME_H-46, 470, 34);
      text(TOUCH_DEV ? '拖曳瞄準 ・ 點一下拋線 / 收線' : '滑鼠或 ←→ 瞄準 ・ 點擊或空白鍵拋線', GAME_W/2, GAME_H-29, 17, '#8fa0c9');
      ctx.globalAlpha = 1;
    }
  },
  drawFish(f, hang){
    const yy = hang ? f.y : f.y + Math.sin(f.wig*0.6)*4;
    ctx.save();
    ctx.translate(f.x, yy);
    if(hang) ctx.rotate(Math.sin(f.wig)*0.35);
    ctx.scale(f.dir * f.sx, f.sy);
    if(f.k.gold){ ctx.shadowColor = '#ffd447'; ctx.shadowBlur = 14; }
    ctx.fillStyle = f.k.color;
    ctx.beginPath(); ctx.ellipse(0, 0, f.k.r, f.k.r*0.62, 0, 0, 7); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = f.k.belly;
    ctx.beginPath(); ctx.ellipse(1, f.k.r*0.2, f.k.r*0.7, f.k.r*0.32, 0, 0, 7); ctx.fill();
    const tw = Math.sin(f.wig)*0.5;  // 尾巴擺動
    ctx.fillStyle = f.k.color;
    ctx.beginPath();
    ctx.moveTo(-f.k.r+2, 0); ctx.lineTo(-f.k.r-9, -7 + tw*6); ctx.lineTo(-f.k.r-9, 7 + tw*6);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();  // 背鰭
    ctx.moveTo(-2,-f.k.r*0.55); ctx.lineTo(4,-f.k.r*0.95); ctx.lineTo(8,-f.k.r*0.5);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(f.k.r*0.45, -f.k.r*0.12, f.k.r*0.24, 0, 7); ctx.fill();
    ctx.fillStyle = '#04070f';
    ctx.beginPath(); ctx.arc(f.k.r*0.5, -f.k.r*0.12, f.k.r*0.12, 0, 7); ctx.fill();
    ctx.restore();
  },
  drawJelly(j){
    ctx.save();
    ctx.translate(j.x, j.y);
    const puls = 1 + Math.sin(j.t*3)*0.08;
    ctx.globalAlpha = j.stun > 0 ? 0.4 + 0.3*Math.sin(tGlobal*20) : 0.9;
    ctx.scale(puls, 2-puls);
    ctx.shadowColor = '#c77dff'; ctx.shadowBlur = 12;
    ctx.fillStyle = '#8b5cf6';
    ctx.beginPath(); ctx.arc(0, 0, 17, Math.PI, 0); ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#c77dff';
    ctx.beginPath(); ctx.arc(0, -4, 10, Math.PI, 0); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#c77dff'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    for(let i=-2;i<=2;i++){
      ctx.beginPath(); ctx.moveTo(i*6, 2);
      ctx.quadraticCurveTo(i*6 + Math.sin(j.t*4+i)*5, 12, i*6 + Math.sin(j.t*4+i+1)*7, 22);
      ctx.stroke();
    }
    ctx.restore();
    ctx.globalAlpha = 1;
  }
};

/* ================ ⚽ 螃蟹足球 ================ */
const FIELD = {x:34, y:74, w:GAME_W-68, h:GAME_H-114};
const CY = FIELD.y + FIELD.h/2, GOAL_H = 130, GOAL_D = 26;
function makeCrab(x, col, colD){
  return {x, y:CY, vx:0, vy:0, r:24, sx:1, sy:1, legT:0, clawT:0, kickCd:0, face:1, col, colD, hop:0};
}
const crabGame = {
  buttons: [],
  enter(){
    this.pScore = 0; this.cScore = 0; this.time = 60; this.elapsed = 0; this.prevCeil = 61;
    this.player = makeCrab(FIELD.x + FIELD.w*0.28, '#ff6b5e', '#c94b3f');
    this.cpu    = makeCrab(FIELD.x + FIELD.w*0.72, '#2ec4b6', '#1a8a80');
    this.ball = {x:GAME_W/2, y:CY, vx:0, vy:0, r:13, rot:0};
    this.joy = null; this.kickBuf = 0; this.pauseT = 1.0; this.msg = {txt:'開賽！', t:0, life:1.1};
    this.hint = 6; this.goalGlow = 0; this.buttons = [];
    SFX.whistle();
  },
  onKey(code){
    if(code === 'Space' || code === 'KeyJ' || code === 'Enter') this.kickBuf = 0.14;
    if(code === 'Escape') setState(menuState);
  },
  pDown(p, id){
    if(p.x < GAME_W*0.5){
      this.joy = {id, cx:p.x, cy:p.y, dx:0, dy:0};
    } else {
      this.kickBuf = 0.14;
      burst(p.x, p.y, 'rgba(255,214,122,0.8)', 5, 90, {size:3, g:0, life:0.25});
    }
  },
  pMove(p, id){
    if(this.joy && this.joy.id === id){
      let dx = p.x - this.joy.cx, dy = p.y - this.joy.cy;
      const d = Math.hypot(dx, dy);
      if(d > 60){ dx = dx/d*60; dy = dy/d*60; }
      this.joy.dx = dx; this.joy.dy = dy;
    }
  },
  pUp(p, id){ if(this.joy && this.joy.id === id) this.joy = null; },
  resetPositions(){
    this.player.x = FIELD.x + FIELD.w*0.28; this.player.y = CY;
    this.cpu.x    = FIELD.x + FIELD.w*0.72; this.cpu.y = CY;
    this.player.vx = this.player.vy = this.cpu.vx = this.cpu.vy = 0;
    this.ball.x = GAME_W/2; this.ball.y = CY; this.ball.vx = this.ball.vy = 0;
  },
  update(dt){
    this.elapsed += dt; this.hint -= dt; this.msg.t += dt;
    this.kickBuf = Math.max(0, this.kickBuf - dt); this.goalGlow = Math.max(0, this.goalGlow - dt);
    const P = this.player, C = this.cpu, B = this.ball;
    for(const c of [P, C]){
      c.sx += (1-c.sx)*Math.min(1,dt*10); c.sy += (1-c.sy)*Math.min(1,dt*10);
      c.clawT = Math.max(0, c.clawT - dt*3);
      c.kickCd = Math.max(0, c.kickCd - dt);
      c.hop = Math.max(0, c.hop - dt*2);
    }
    if(this.pauseT > 0){ this.pauseT -= dt; return; }
    this.time -= dt;
    if(this.time <= 0){ this.time = 0; this.finish(); return; }
    const ceil = Math.ceil(this.time);
    if(ceil !== this.prevCeil){ this.prevCeil = ceil; if(ceil <= 10) SFX.tick(); }
    // ---- 玩家移動（鍵盤 / 虛擬搖桿） ----
    let ax = 0, ay = 0;
    if(keys['ArrowLeft']||keys['KeyA']) ax -= 1;
    if(keys['ArrowRight']||keys['KeyD']) ax += 1;
    if(keys['ArrowUp']||keys['KeyW']) ay -= 1;
    if(keys['ArrowDown']||keys['KeyS']) ay += 1;
    const m = Math.hypot(ax, ay);
    if(m > 0){ ax /= m; ay /= m; }
    if(this.joy){ ax = this.joy.dx/60; ay = this.joy.dy/60; }
    P.vx += ax*1500*dt; P.vy += ay*1500*dt;
    const dampP = Math.pow(0.002, dt);
    P.vx *= dampP; P.vy *= dampP;
    P.x = clamp(P.x + P.vx*dt, FIELD.x + P.r, FIELD.x + FIELD.w - P.r);
    P.y = clamp(P.y + P.vy*dt, FIELD.y + P.r, FIELD.y + FIELD.h - P.r);
    P.legT += dt * (2 + Math.hypot(P.vx, P.vy)/28);
    if(Math.abs(P.vx) > 30) P.face = P.vx > 0 ? 1 : -1;
    // ---- 玩家踢球（含射門輔助＋輸入緩衝） ----
    if(this.kickBuf > 0 && P.kickCd <= 0){
      this.kickBuf = 0; P.kickCd = 0.3; P.clawT = 1;
      P.sx = 1.25; P.sy = 0.8;
      const bd = dist(P.x, P.y, B.x, B.y);
      if(bd < P.r + B.r + 24){
        let dx = (B.x - P.x)/bd, dy = (B.y - P.y)/bd;
        const gd = dist(B.x, B.y, FIELD.x+FIELD.w, CY) || 1;
        dx = dx*0.68 + (FIELD.x+FIELD.w - B.x)/gd*0.32;
        dy = dy*0.68 + (CY - B.y)/gd*0.32;
        const dm = Math.hypot(dx, dy) || 1;
        B.vx = dx/dm*720 + P.vx*0.3;
        B.vy = dy/dm*720 + P.vy*0.3;
        addShake(3.5); hitStop(0.035); SFX.kick();
        burst(B.x, B.y, ['#fff5d6','#ffd77a'], 8, 200, {size:4, g:200, life:0.35});
      } else SFX.swing();
    }
    // ---- CPU（終盤越拚；落後方加速 = 橡皮筋難度，失敗不挫折） ----
    const cpuAcc = clamp(700 + this.elapsed*7 + (this.pScore - this.cScore)*55, 560, 1400);
    let cdx = B.x + 30 - C.x, cdy = B.y - C.y;
    const cdm = Math.hypot(cdx, cdy) || 1;
    C.vx += cdx/cdm*cpuAcc*dt; C.vy += cdy/cdm*cpuAcc*dt;
    C.vx *= dampP; C.vy *= dampP;
    C.x = clamp(C.x + C.vx*dt, FIELD.x + C.r, FIELD.x + FIELD.w - C.r);
    C.y = clamp(C.y + C.vy*dt, FIELD.y + C.r, FIELD.y + FIELD.h - C.r);
    C.legT += dt * (2 + Math.hypot(C.vx, C.vy)/28);
    if(Math.abs(C.vx) > 30) C.face = C.vx > 0 ? 1 : -1;
    const cbd = dist(C.x, C.y, B.x, B.y);
    if(cbd < C.r + B.r + 20 && C.kickCd <= 0 && Math.random() < 0.5){
      C.kickCd = 0.6; C.clawT = 1; C.sx = 1.25; C.sy = 0.8;
      const a = Math.atan2(CY + (Math.random()*2-1)*70 - B.y, FIELD.x - B.x);
      const pw = 470 + Math.random()*180 + this.elapsed*2;
      B.vx = Math.cos(a)*pw; B.vy = Math.sin(a)*pw;
      SFX.kick();
      burst(B.x, B.y, '#a8e6e2', 6, 160, {size:4, g:200, life:0.3});
    }
    // ---- 螃蟹互推 ----
    const ccd = dist(P.x, P.y, C.x, C.y);
    if(ccd < P.r + C.r && ccd > 0){
      const push = (P.r + C.r - ccd)/2;
      const nx = (C.x - P.x)/ccd, ny = (C.y - P.y)/ccd;
      P.x -= nx*push; P.y -= ny*push;
      C.x += nx*push; C.y += ny*push;
    }
    // ---- 球物理：碰撞、阻尼、旋轉、拖尾 ----
    for(const c of [P, C]){
      const bd2 = dist(c.x, c.y, B.x, B.y);
      if(bd2 < c.r + B.r && bd2 > 0){
        const nx = (B.x - c.x)/bd2, ny = (B.y - c.y)/bd2;
        B.x = c.x + nx*(c.r + B.r); B.y = c.y + ny*(c.r + B.r);
        B.vx += c.vx*0.5 + nx*70; B.vy += c.vy*0.5 + ny*70;
      }
    }
    B.x += B.vx*dt; B.y += B.vy*dt;
    const dampB = Math.pow(0.4, dt);
    B.vx *= dampB; B.vy *= dampB;
    B.rot += B.vx*dt/B.r;
    const bSpd = Math.hypot(B.vx, B.vy);
    if(bSpd > 430)
      spawnPart({x:B.x, y:B.y, vx:-B.vx*0.1, vy:-B.vy*0.1, life:0.3, color:'rgba(243,236,217,0.6)', size:4, g:0});
    if(B.y < FIELD.y + B.r){ B.y = FIELD.y + B.r; B.vy = Math.abs(B.vy)*0.65; if(bSpd>120) SFX.bounce(); }
    if(B.y > FIELD.y + FIELD.h - B.r){ B.y = FIELD.y + FIELD.h - B.r; B.vy = -Math.abs(B.vy)*0.65; if(bSpd>120) SFX.bounce(); }
    const inMouth = Math.abs(B.y - CY) < GOAL_H/2 - 6;
    if(B.x < FIELD.x + B.r){
      if(inMouth && B.x < FIELD.x - 6) this.goalScored(false);
      else if(!inMouth){ B.x = FIELD.x + B.r; B.vx = Math.abs(B.vx)*0.65; if(bSpd>120) SFX.bounce(); }
    }
    if(B.x > FIELD.x + FIELD.w - B.r){
      if(inMouth && B.x > FIELD.x + FIELD.w + 6) this.goalScored(true);
      else if(!inMouth){ B.x = FIELD.x + FIELD.w - B.r; B.vx = -Math.abs(B.vx)*0.65; if(bSpd>120) SFX.bounce(); }
    }
  },
  goalScored(byPlayer){
    if(byPlayer){ this.pScore++; SFX.goal(); this.player.hop = 1; }
    else { this.cScore++; SFX.concede(); this.cpu.hop = 1; }
    hitStop(0.1); addShake(byPlayer ? 10 : 6);
    flash = byPlayer ? 0.3 : 0.15; this.goalGlow = 1;
    const gx = byPlayer ? FIELD.x + FIELD.w : FIELD.x;
    burst(gx, CY, byPlayer ? ['#ffd77a','#ff6b5e','#fff5d6'] : ['#a8e6e2','#2ec4b6'], 36, 320, {size:6, g:400, life:0.9});
    this.msg = {txt: byPlayer ? 'GOAL！好球！' : '被進球了！反攻！', t:0, life:1.4};
    this.pauseT = 1.4; this.resetPositions(); SFX.whistle();
  },
  finish(){
    const best = parseInt(load('wow101v2_crab_best') || '0', 10);
    const newBest = this.pScore > best;
    if(newBest) store('wow101v2_crab_best', String(this.pScore));

    else { title = '平手！再拚勝負！'; color = '#f3ecd9'; SFX.whistle(); }
    showOver({ bg: this, replay: crabGame, title,
      lines: ['最終比分', this.pScore + ' : ' + this.cScore],

    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(GAME_W*0.45,GAME_H); ctx.lineTo(GAME_W*0.2,GAME_H); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(GAME_W,0); ctx.lineTo(GAME_W*0.55,GAME_H); ctx.lineTo(GAME_W*0.8,GAME_H); ctx.closePath(); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = 'rgba(243,236,217,0.55)'; ctx.lineWidth = 3;  // 場線
    ctx.strokeRect(FIELD.x, FIELD.y, FIELD.w, FIELD.h);
    ctx.beginPath(); ctx.moveTo(GAME_W/2, FIELD.y); ctx.lineTo(GAME_W/2, FIELD.y+FIELD.h); ctx.stroke();
    ctx.beginPath(); ctx.arc(GAME_W/2, CY, 56, 0, 7); ctx.stroke();
    ctx.fillStyle = 'rgba(243,236,217,0.55)';
    ctx.beginPath(); ctx.arc(GAME_W/2, CY, 5, 0, 7); ctx.fill();
    this.drawGoal(FIELD.x - GOAL_D, '#2ec4b6', false);       // 球門
    this.drawGoal(FIELD.x + FIELD.w, '#ffb627', true);       // 右側金色 = 得分目標
    if(this.elapsed < 5 && this.pauseT <= 0){
      ctx.globalAlpha = 0.5 + 0.5*Math.sin(tGlobal*4);
      text('→ 射這裡！', FIELD.x + FIELD.w - 90, CY - GOAL_H/2 - 18, 20, '#ffd77a', 'center', 'bold', 'rgba(4,7,15,0.7)');
      ctx.globalAlpha = 1;
    }
    ctx.fillStyle = 'rgba(0,0,0,0.3)';  // 球影
    ctx.beginPath(); ctx.ellipse(this.ball.x, this.ball.y + this.ball.r + 4, this.ball.r*0.9, 4, 0, 0, 7); ctx.fill();
    this.drawCrabChar(this.player);
    this.drawCrabChar(this.cpu);
    this.drawBall();
    drawParts(); drawFloaters();
    if(this.msg.t < this.msg.life){  // 大字訊息（easeOutBack 進場）

      ctx.restore();
    }
    drawVignette();
    endShake();
    // ---- HUD ----
    pill(GAME_W/2 - 110, 12, 220, 42);
    ctx.fillStyle = '#ff6b5e'; ctx.beginPath(); ctx.arc(GAME_W/2 - 80, 33, 9, 0, 7); ctx.fill();
    ctx.fillStyle = '#2ec4b6'; ctx.beginPath(); ctx.arc(GAME_W/2 + 80, 33, 9, 0, 7); ctx.fill();
    text(this.pScore + ' : ' + this.cScore, GAME_W/2, 33, 28, '#f3ecd9');
    const tc = Math.ceil(this.time), urgent = tc <= 10;
    const ts = urgent ? 1 + 0.08*Math.sin(tGlobal*10) : 1;
    ctx.save(); ctx.translate(GAME_W/2 + 190, 33); ctx.scale(ts, ts);
    pill(-58, -21, 116, 42, urgent ? 'rgba(255,107,94,0.7)' : undefined);
    text('⏱ ' + tc, 0, 0, 22, urgent ? '#ff6b5e' : '#f3ecd9');
    ctx.restore();
    drawMute();
    if(this.joy){  // 浮動虛擬搖桿
      ctx.globalAlpha = 0.3;
      ctx.strokeStyle = '#f3ecd9'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(this.joy.cx, this.joy.cy, 52, 0, 7); ctx.stroke();
      ctx.fillStyle = '#f3ecd9';
      ctx.beginPath(); ctx.arc(this.joy.cx + this.joy.dx, this.joy.cy + this.joy.dy, 24, 0, 7); ctx.fill();
      ctx.globalAlpha = 1;
    }
    if(TOUCH_DEV && this.hint > 0){  // 觸控提示圈
      ctx.globalAlpha = clamp(this.hint/2, 0, 0.4);
      ctx.strokeStyle = '#f3ecd9'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(120, GAME_H-90, 48, 0, 7); ctx.stroke();
      text('移動', 120, GAME_H-90, 20, '#f3ecd9');
      ctx.fillStyle = 'rgba(255,183,39,0.25)';
      ctx.beginPath(); ctx.arc(GAME_W-120, GAME_H-90, 48, 0, 7); ctx.fill();
      text('踢！', GAME_W-120, GAME_H-90, 24, '#ffd77a');
      ctx.globalAlpha = 1;
    }
    if(this.hint > 0){
      ctx.globalAlpha = clamp(this.hint, 0, 1);
      pill(GAME_W/2-245, GAME_H-46, 490, 34);
      text(TOUCH_DEV ? '左半邊拖曳移動 ・ 右半邊點擊踢球' : '方向鍵 / WASD 移動 ・ 空白鍵踢球', GAME_W/2, GAME_H-29, 17, '#8fa0c9');
      ctx.globalAlpha = 1;
    }
  },
  drawGoal(gx, color, isTarget){
    const gy = CY - GOAL_H/2;
    ctx.save();
    if(isTarget && this.goalGlow > 0){ ctx.shadowColor = color; ctx.shadowBlur = 24*this.goalGlow; }
    ctx.fillStyle = 'rgba(4,7,15,0.35)'; ctx.fillRect(gx, gy, GOAL_D, GOAL_H);
    ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.strokeRect(gx, gy, GOAL_D, GOAL_H);
    ctx.restore();
    ctx.strokeStyle = 'rgba(243,236,217,0.22)'; ctx.lineWidth = 1;  // 球網
    for(let i=1;i<4;i++){ ctx.beginPath(); ctx.moveTo(gx + i*GOAL_D/4, gy); ctx.lineTo(gx + i*GOAL_D/4, gy+GOAL_H); ctx.stroke(); }
    for(let i=1;i<7;i++){ ctx.beginPath(); ctx.moveTo(gx, gy + i*GOAL_H/7); ctx.lineTo(gx+GOAL_D, gy + i*GOAL_H/7); ctx.stroke(); }
  },
  drawCrabChar(c){
    const hopY = Math.sin(c.hop*Math.PI)*18;
    ctx.fillStyle = 'rgba(0,0,0,0.3)';  // 影子
    ctx.beginPath(); ctx.ellipse(c.x, c.y + 20, 20 - hopY*0.3, 6, 0, 0, 7); ctx.fill();
    ctx.save();
    ctx.translate(c.x, c.y + 16 - hopY);
    ctx.scale(c.sx, c.sy);              // squash & stretch（腳底錨點）
    ctx.translate(0, -16);
    ctx.strokeStyle = c.colD; ctx.lineWidth = 3.5; ctx.lineCap = 'round';  // 六足擺動
    for(let i=0;i<3;i++){
      const sw = Math.sin(c.legT*3 + i*2)*5;
      ctx.beginPath(); ctx.moveTo(-13+i*3, 10); ctx.lineTo(-26+i*4 + sw, 20); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(13-i*3, 10); ctx.lineTo(26-i*4 - sw, 20); ctx.stroke();
    }
    const open = 0.3 + c.clawT*0.9;  // 蟹鉗（踢球時張開揮擊）
    for(const s of [-1, 1]){
      ctx.save();
      ctx.translate(s*20, -8);
      ctx.rotate(s * (-0.5 - c.clawT*0.8));
      ctx.fillStyle = c.colD;
      ctx.beginPath(); ctx.ellipse(s*6, -6, 9, 7, s*0.5, 0, 7); ctx.fill();
      ctx.fillStyle = c.col;
      ctx.beginPath();
      ctx.arc(s*8, -9, 7, s>0 ? open : Math.PI - open, s>0 ? Math.PI*2 - open : Math.PI + open, s<0);
      ctx.lineTo(s*8, -9);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }
    const bodyG = ctx.createLinearGradient(0,-14,0,14);  // 身體
    bodyG.addColorStop(0, c.col); bodyG.addColorStop(1, c.colD);
    ctx.fillStyle = bodyG;
    ctx.beginPath(); ctx.ellipse(0, 2, 21, 15, 0, 0, 7); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(0, -1, 15, 9, 0, Math.PI*1.1, Math.PI*1.9); ctx.stroke();
    const B = this.ball;  // 眼睛看向球
    const la = Math.atan2(B.y - c.y, B.x - c.x);
    for(const s of [-1, 1]){
      ctx.strokeStyle = c.colD; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(s*7, -8); ctx.lineTo(s*8, -16); ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(s*8, -18, 5.5, 0, 7); ctx.fill();
      ctx.fillStyle = '#04070f';
      ctx.beginPath(); ctx.arc(s*8 + Math.cos(la)*2.4, -18 + Math.sin(la)*2.4, 2.6, 0, 7); ctx.fill();
    }
    ctx.strokeStyle = c.colD; ctx.lineWidth = 2;  // 嘴
    ctx.beginPath(); ctx.arc(0, 4, 5, 0.3, Math.PI-0.3); ctx.stroke();
    ctx.restore();
  },
  drawBall(){
    const B = this.ball;
    ctx.save();
    ctx.translate(B.x, B.y);
    ctx.rotate(B.rot);
    ctx.fillStyle = '#f3ecd9';
    ctx.beginPath(); ctx.arc(0, 0, B.r, 0, 7); ctx.fill();
    ctx.strokeStyle = 'rgba(4,7,15,0.7)'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = '#122048';
    ctx.beginPath(); ctx.arc(0, 0, B.r*0.36, 0, 7); ctx.fill();
    for(let i=0;i<5;i++){
      const a = i/5*Math.PI*2;
      ctx.beginPath(); ctx.arc(Math.cos(a)*B.r*0.72, Math.sin(a)*B.r*0.72, B.r*0.2, 0, 7); ctx.fill();
    }
    ctx.restore();
  }
};

      ctx.fillStyle = g;
      ctx.shadowColor = cd.grad[0]; ctx.shadowBlur = 8 + b.hot*22;
      rr(-b.w/2, -b.h/2, b.w, b.h, 20); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = cd.grad[0]; ctx.globalAlpha *= 0.6 + b.hot*0.4;
      ctx.lineWidth = 2.5; ctx.stroke();
      ctx.globalAlpha = clamp((this.t - cd.delay)/0.3, 0, 1);
      text(cd.emoji, 0, -62 + Math.sin(tGlobal*2 + cd.delay*8)*4, 52, '#fff');
      text(cd.name, 0, -4, 30, '#f3ecd9');
      text(cd.desc1, 0, 32, 16, '#8fa0c9', 'center', 'normal');
      text(cd.desc2, 0, 54, 16, '#8fa0c9', 'center', 'normal');
      const pg = ctx.createLinearGradient(-70, 0, 70, 0);
      pg.addColorStop(0, cd.grad[0]); pg.addColorStop(1, cd.grad[1]);
      ctx.fillStyle = pg;
      rr(-70, 76, 140, 40, 20); ctx.fill();
      text('開始', 0, 97, 22, '#1c1000');
      ctx.restore();
      drawButton(b);
    }
    // 帶球散步的小螃蟹
    ctx.save();
    ctx.translate(this.crabX, GAME_H - 26);
    ctx.fillStyle = '#ff6b5e';
    ctx.beginPath(); ctx.ellipse(0, 0, 14, 9, 0, 0, 7); ctx.fill();
    ctx.strokeStyle = '#c94b3f'; ctx.lineWidth = 2.5; ctx.lineCap='round';
    for(let i=0;i<3;i++){
      const sw = Math.sin(tGlobal*8 + i*2)*4;
      ctx.beginPath(); ctx.moveTo(-8+i*2, 6); ctx.lineTo(-15+i*3+sw, 13); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(8-i*2, 6); ctx.lineTo(15-i*3-sw, 13); ctx.stroke();
    }
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-4,-9,3.5,0,7); ctx.arc(4,-9,3.5,0,7); ctx.fill();
    ctx.fillStyle = '#04070f';
    ctx.beginPath(); ctx.arc(-3,-9,1.6,0,7); ctx.arc(5,-9,1.6,0,7); ctx.fill();
    ctx.save();
    ctx.translate(26, 2); ctx.rotate(tGlobal*6);
    ctx.fillStyle = '#f3ecd9'; ctx.beginPath(); ctx.arc(0, 0, 7, 0, 7); ctx.fill();
    ctx.fillStyle = '#122048'; ctx.beginPath(); ctx.arc(3, 0, 2.5, 0, 7); ctx.fill();
    ctx.restore();
    ctx.restore();
    drawParts(); drawFloaters();
    text(TOUCH_DEV ? '點選遊戲卡開始 ・ 支援觸控與鍵盤' : '點卡片或按 1 / 2 選擇 ・ M 鍵靜音', GAME_W/2, GAME_H-40, 15, '#5b6790');
    drawVignette();
    drawMute();
  }
};

/* ================ 主迴圈：固定時間步進 60Hz + hit-stop（跳過邏輯照常渲染） ================ */
const STEP = 1/60;
let last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  const ft = Math.min((now - last)/1000, 0.1);
  last = now; rdt = ft;
  acc += ft;
  while(acc >= STEP){
    acc -= STEP;
    if(freeze > 0){ freeze -= STEP; continue; }
    tGlobal += STEP;
    state.update(STEP);
    updateParts(STEP); updateFloaters(STEP);
    shake *= Math.pow(0.0008, STEP); if(shake < 0.1) shake = 0;
    flash = Math.max(0, flash - STEP*3);
  }
  state.draw();
  if(flash > 0){
    ctx.fillStyle = 'rgba(255,255,255,' + flash.toFixed(3) + ')';
    ctx.fillRect(0,0,GAME_W,GAME_H);
  }
}
setState(menuState);
requestAnimationFrame(frame);
</script>
