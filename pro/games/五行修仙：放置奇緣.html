// ---------- 基本設定 ----------
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize() {

addEventListener('resize', resize);

// ---------- 調色盤 ----------
const PAL = {
  bg0: '#0b1020', bg1: '#1a2140', panel: 'rgba(20,26,52,0.82)',
  line: '#39406e', ink: '#eef1ff', dim: '#9aa3c8',
  gold: '#ffd45e', goldDeep: '#ff9d5e', good: '#6ee7a0', bad: '#ff6b6b',
  qi: '#8be9ff'

const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp = (a, b, t) => a + (b - a) * t;
const rnd = (a, b) => a + Math.random() * (b - a);
const easeOutCubic = t => 1 - Math.pow(1 - t, 3);

function roundRect(x, y, w, h, r) {

  ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
}

// ---------- 音效 ----------
let AC = null, master = null, muted = false, ambDuck = null;
function audio() {
  if (!AC) {
    try {
      AC = new (window.AudioContext || window.webkitAudioContext)();
      master = AC.createGain();
      master.gain.value = muted ? 0 : 1;
      // v3：壓縮器主匯流排——討伐爆音＋升級音齊發不削波
      const comp = AC.createDynamicsCompressor();
      comp.threshold.value = -18; comp.knee.value = 24; comp.ratio.value = 8;
      master.connect(comp); comp.connect(AC.destination);

      const ir = AC.createBuffer(2, (AC.sampleRate * 1.8) | 0, AC.sampleRate);
      for (let ch = 0; ch < 2; ch++) {
        const d = ir.getChannelData(ch);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2.4);
      }

      const wet = AC.createGain(); wet.gain.value = 0.18;
      comp.connect(conv); conv.connect(wet); wet.connect(AC.destination);

      for (let i = 0; i < len; i++) {
        const t = i / sr, w = Math.random() * 2 - 1;
        lp += (w - lp) * 0.012;
        let v = lp * (0.6 + 0.4 * Math.sin(t * 1.1)) * 1.2;
        for (const c of chimes) {
          const dt2 = t - c[0];
          if (dt2 > 0 && dt2 < 1.6) v += Math.sin(2 * Math.PI * c[1] * dt2) * Math.exp(-dt2 * 3.2) * 0.05;
        }
        ad[i] = v;
      }
      const f = (sr * 0.15) | 0;
      for (let i = 0; i < f; i++) { const a = i / f; ad[i] = ad[i] * a + ad[len - f + i] * (1 - a); }

      const ag = AC.createGain(); ag.gain.value = 0.05;
      ambDuck = AC.createGain(); ambDuck.gain.value = 1;
      src.connect(ag); ag.connect(ambDuck); ambDuck.connect(master);

}
function duckAmb() {
  if (!AC || !ambDuck || muted) return;
  const t0 = AC.currentTime;

  ambDuck.gain.setTargetAtTime(1, t0 + 0.12, 0.3);

  type = type || 'square'; vol = vol || 0.14; slide = slide || 0;
  if (vol >= 0.11) duckAmb();   // v6：主音效壓低氛圍層
  freq *= 0.975 + Math.random() * 0.05;   // v3：±2.5% 隨機音高，連點百次不膩
  const t0 = ac.currentTime;

  const o = ac.createOscillator(), g = ac.createGain();

  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0 + atk);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(g).connect(master);
  o.start(t0); o.stop(t0 + dur);

  if (vol >= 0.08) {
    const o2 = ac.createOscillator(), g2 = ac.createGain();
    o2.type = 'sine'; o2.frequency.setValueAtTime(freq * 2, t0);
    if (slide) o2.frequency.exponentialRampToValueAtTime(Math.max(30, (freq + slide) * 2), t0 + dur);
    g2.gain.setValueAtTime(0.0001, t0);
    g2.gain.exponentialRampToValueAtTime(vol * 0.22, t0 + atk);
    g2.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o2.connect(g2).connect(master);

  }
}
function noise(dur, vol) {
  const ac = audio(); if (!ac || muted) return;
  const len = Math.max(1, Math.floor(ac.sampleRate * dur));
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ac.createBufferSource(), g = ac.createGain();
  src.buffer = buf;
  g.gain.setValueAtTime(vol || 0.1, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  src.connect(g).connect(master);
  src.start();
}

  hit() { beep(220, 0.08, 'square', 0.12, -60); },
  crit() { beep(180, 0.14, 'sawtooth', 0.15, -100); noise(0.1, 0.1); },
  die() { noise(0.3, 0.16); beep(140, 0.35, 'sawtooth', 0.14, -90); },
  buy() { beep(784, 0.08, 'square', 0.1); setTimeout(() => beep(1047, 0.14, 'square', 0.1), 70); },
  deny() { beep(160, 0.14, 'sawtooth', 0.1, -40); },
  levelup() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.13, 'square', 0.11), i * 80)); },
  win() { [523, 659, 784, 1047, 1319, 1568].forEach((f, i) => setTimeout(() => beep(f, 0.18, 'square', 0.11), i * 110)); }

// ---------- FX ----------
let shake = 0, freeze = 0;
// v8：里程碑事件式柔光（單次快閃，不持續晃動）
let eventFlash = 0, eventFlashCol = '255,240,200';
function flashScreen(col, amt) { eventFlashCol = col; if (amt > eventFlash) eventFlash = amt; }
const parts = [];
function burst(x, y, color, n, speed, up) {
  n = n || 12; speed = speed || 200;
  for (let i = 0; i < n; i++) {
    if (parts.length > 300) break;
    const a = Math.random() * Math.PI * 2, s = speed * (0.3 + Math.random() * 0.7);
    parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - (up || 0), life: rnd(0.35, 0.7), color, size: rnd(3, 6), rot: rnd(0, 6.28), spin: rnd(-8, 8), grav: 500 });
  }
}
function updateParts(dt) {
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += p.grav * dt; p.rot += p.spin * dt; p.life -= dt;
    if (p.life <= 0) { parts[i] = parts[parts.length - 1]; parts.pop(); }  // v3：swap-pop
  }
}
// v8：additive 柔光貼圖快取（雙層發光粒子/靈氣光珠/標題輝光共用；主迴圈零 createGradient）
function toRGBA(c, a) {
  if (c[0] === '#') {
    let h = c.slice(1);
    if (h.length === 3) h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2];
    const n = parseInt(h, 16);
    return 'rgba(' + ((n >> 16) & 255) + ',' + ((n >> 8) & 255) + ',' + (n & 255) + ',' + a + ')';
  }
  return c;
}
const GLOW_CACHE = {};
function glowSprite(color) {
  let s = GLOW_CACHE[color];
  if (!s) {
    s = bakeCv(64, 64, g => {
      const rg = g.createRadialGradient(32, 32, 0, 32, 32, 32);
      rg.addColorStop(0, toRGBA(color, 1));
      rg.addColorStop(0.35, toRGBA(color, 0.6));
      rg.addColorStop(1, toRGBA(color, 0));
      g.fillStyle = rg; g.fillRect(0, 0, 64, 64);
    });
    GLOW_CACHE[color] = s;
  }
  return s;
}
// v8：粒子改圓形 additive 雙層發光（外柔光＋亮核，隨壽命縮小淡出）
function drawParts() {
  ctx.globalCompositeOperation = 'lighter';
  for (const p of parts) {
    const a = clamp(p.life * 2, 0, 1);
    const sp = glowSprite(p.color);
    const g1 = p.size * 2.6;
    ctx.globalAlpha = 0.42 * a;
    ctx.drawImage(sp, p.x - g1, p.y - g1, g1 * 2, g1 * 2);
    const g2 = p.size * 0.95;
    ctx.globalAlpha = 0.95 * a;
    ctx.drawImage(sp, p.x - g2, p.y - g2, g2 * 2, g2 * 2);
  }
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;
}
const floaters = [];
function addFloat(x, y, text, color, big) { floaters.push({ x, y, text, color, life: 0.95, big: !!big, t: 0 }); }
function updateFloaters(dt) {
  for (let i = floaters.length - 1; i >= 0; i--) {
    const f = floaters[i];
    f.t += dt; f.y -= 48 * dt; f.life -= dt;
    if (f.life <= 0) floaters.splice(i, 1);
  }
}
function drawFloaters() {
  ctx.textAlign = 'center';
  for (const f of floaters) {
    const inS = f.t < 0.28 ? easeOutBack(clamp(f.t / 0.28, 0, 1)) : 1;   // v8：彈跳入場
    ctx.save();
    ctx.globalAlpha = clamp(f.life * 1.7, 0, 1);
    ctx.translate(f.x, f.y); ctx.scale(inS, inS);
    ctx.font = (f.big ? 'bold 26px' : 'bold 18px') + ' sans-serif';
    ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillText(f.text, 1.5, 2);   // v8：柔影提升可讀性
    ctx.fillStyle = f.color; ctx.fillText(f.text, 0, 0);

  }

}
// 靈氣光珠：從來源飛向靈氣計數器（貝茲曲線緩動）
const orbs = [];
function addOrb(x, y, color, big) {
  orbs.push({ x0: x, y0: y, cx: x + rnd(-70, 70), cy: y - rnd(60, 130), t: 0, color: color || PAL.qi, big: !!big });
}
function updateOrbs(dt) {
  for (let i = orbs.length - 1; i >= 0; i--) {

}
function drawOrbs() {

  for (const o of orbs) {
    const t = easeOutCubic(clamp(o.t, 0, 1));
    const x = (1 - t) * (1 - t) * o.x0 + 2 * (1 - t) * t * o.cx + t * t * tx;

const cloudsBG = [];

// v3：靜態漸層預先計算（原本每幀重建，平板掉幀主因之一）
const MTN_GS = {};

        const x = GAME_W / 2 - 230 + i * 250, y = 140, w = 210, h = 250;
        const sel = this.gender === i;
        panel(x, y, w, h, sel);
        if (sel) {
          ctx.fillStyle = 'rgba(255,212,94,0.1)';
          roundRect(x, y, w, h, 12); ctx.fill();
        }
        drawCultivator(x + w / 2, y + 140, 1.5 + (sel ? Math.sin(bgTime * 4) * 0.04 : 0), i === 1, null, bgTime);
        ctx.fillStyle = sel ? PAL.gold : PAL.ink; ctx.font = 'bold 22px sans-serif';
        ctx.textAlign = 'center'; ctx.fillText(labels[i], x + w / 2, y + 226);
        uiButtons.push({ x, y, w, h, cb: (() => { this.gender = i; sfx.click(); }).bind(this) });
      }
      if (this.gender >= 0) button(GAME_W / 2 - 100, 430, 200, 56, '下一步', () => { this.step = 1; this.t = 0; sfx.click(); }, { size: 24 });
      else { ctx.fillStyle = PAL.dim; ctx.font = '15px sans-serif'; ctx.fillText('（點選卡片，或按 1 / 2 選擇）', GAME_W / 2, 460); }
    } else {
      ctx.fillStyle = PAL.gold; ctx.font = 'bold 34px serif';
      ctx.fillText('選擇你的五行靈根', GAME_W / 2, 90); ctx.fillStyle = PAL.dim;
      ctx.font = '16px sans-serif'; ctx.fillText('五行相生相剋，靈根決定你的修煉之路', GAME_W / 2, 118);
      for (let i = 0; i < 5; i++) {
        const x = 60 + i * 172, y = 150, w = 152, h = 230;
        const sel = this.elem === i, E = ELEMS[i];
        panel(x, y, w, h, sel);
        if (sel) {
          ctx.fillStyle = 'rgba(255,212,94,0.1)';
          roundRect(x, y, w, h, 12); ctx.fill();
        }
        drawElemIcon(E.id, x + w / 2, y + 62, 1.6 + (sel ? Math.sin(bgTime * 5) * 0.08 : 0));
        ctx.fillStyle = sel ? PAL.gold : PAL.ink; ctx.font = 'bold 30px serif';
        ctx.textAlign = 'center'; ctx.fillText(E.name, x + w / 2, y + 132);
        ctx.fillStyle = E.color; ctx.font = 'bold 16px sans-serif';
        ctx.fillText(E.desc, x + w / 2, y + 160); ctx.fillStyle = PAL.dim;
        ctx.font = '12px sans-serif';
        const words = E.long.split('，');
        ctx.fillText(words[0], x + w / 2, y + 186);
        if (words[1]) ctx.fillText(words[1], x + w / 2, y + 204);
        uiButtons.push({ x, y, w, h, cb: (() => { this.elem = i; sfx.click(); }).bind(this) });
      }
      if (this.elem >= 0) button(GAME_W / 2 - 130, 420, 260, 56, '進入修仙世界', () => this.begin(), { size: 24 });
      else { ctx.fillStyle = PAL.dim; ctx.font = '15px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('（點選卡片，或按 1 ~ 5 選擇）', GAME_W / 2, 452); }
    }
    ctx.globalAlpha = 1;
    muteButton();
  }
};

// ===== 遊戲主畫面 =====
const CHAR_X = 160, CHAR_Y = 350;
const ARENA = { x: 320, y: 96, w: 620, h: 208 };
const DRAG_X = ARENA.x + 430, DRAG_Y = ARENA.y + 138;
const playState = {
  enter() {
    this.t = 0; parts.length = 0; floaters.length = 0; orbs.length = 0;
    this.cloud = null; this.cloudT = rnd(10, 16);   // v2：幸運祥雲
  },
  tapCloud() {
    const c = this.cloud;
    const bonus = Math.max(25, Math.floor(G.perSecond * 6 + G.perClick * 8));
    gainEnergy(bonus, c.x, c.y, true);
    addFloat(c.x, c.y - 30, '幸運祥雲！+' + bonus + ' 靈氣', PAL.gold, true);
    burst(c.x, c.y, PAL.gold, 18, 240, 120);
    for (let i = 0; i < 3; i++) addOrb(c.x + rnd(-20, 20), c.y + rnd(-10, 10), PAL.gold, true);
    sfx.burst2x();
    this.cloud = null; this.cloudT = rnd(15, 25);
  },
  meditate() {
    let gain = Math.round(G.perClick * rebirthPowerMul()), twice = false;   // v4：轉世加成
    if (ELEMS[G.elemIdx].id === 'fire' && Math.random() < 0.25) { gain *= 2; twice = true; }
    gainEnergy(gain, CHAR_X + rnd(-30, 30), CHAR_Y - rnd(20, 60), twice);
    G.charSx = 1.15; G.charSy = 0.85;
    burst(CHAR_X, CHAR_Y - 10, ELEMS[G.elemIdx].color, 5, 120, 90);
    if (twice) { addFloat(CHAR_X, CHAR_Y - 90, '火靈爆發！×2', PAL.goldDeep, true); sfx.burst2x(); }
    else { addFloat(CHAR_X, CHAR_Y - 90, '+' + gain, PAL.qi, false); sfx.tap(); }
  },
  slash(manual) {
    if (!monster || monster.dead) return;
    if (manual && G.slashCd > 0) return;
    if (manual) G.slashCd = 0.15;   // v2：CD 0.35→0.15，點擊不再被吞
    let dmg = playerPower();
    let comboMul = 1;
    if (manual) {   // v2：連點連擊（每 5 連擊 +25%，上限 x2）
      G.comboN++; G.comboT = 1.2;
      comboMul = Math.min(2, 1 + Math.floor(G.comboN / 5) * 0.25);
      if (G.comboN % 5 === 0 && comboMul < 2) sfx.buy();
    }
    const eMul = elemMulVsMonster();   // v2：五行相剋
    const crit = ELEMS[G.elemIdx].id === 'fire' && Math.random() < 0.2;
    dmg = Math.max(1, Math.round(dmg * comboMul * eMul * (crit ? 2 : 1)));
    monster.hp -= dmg;
    monster.flash = 0.12;
    monster.sx = 1.25; monster.sy = 0.78;
    addSlash(DRAG_X + rnd(-16, 16), DRAG_Y + rnd(-20, 6), crit);
    const tag = crit ? '爆擊 -' + dmg + '！' : (eMul > 1 ? '剋制 -' + dmg + '！' : '-' + dmg);
    addFloat(DRAG_X + rnd(-24, 24), DRAG_Y - 66, tag, crit ? PAL.goldDeep : (eMul > 1 ? PAL.good : '#ffe066'), crit || eMul > 1);
    burst(DRAG_X, DRAG_Y - 10, crit ? PAL.goldDeep : '#ffd0a0', crit ? 14 : 7, 200);
    if (crit) { freeze = 0.07; shake = Math.max(shake, 5); sfx.crit(); }
    else { shake = Math.max(shake, 2); sfx.hit(); }
    sfx.slash();
    if (monster.hp <= 0) this.killDragon();
  },
  killDragon() {
    monster.dead = true;
    monster.deathT = 0;
    G.kills++;
    const reward = Math.floor(monster.hpMax * 0.9);   // v3：0.8→0.9，配合較厚血量維持升級節奏
    freeze = 0.11;
    shake = Math.max(shake, 9);
    sfx.die();
    burst(DRAG_X, DRAG_Y, tierColor(dragonTier(monster.mlv)).body, 30, 300, 120);
    burst(DRAG_X, DRAG_Y, PAL.gold, 14, 220, 160);
    flashScreen('255,220,160', 0.16);   // v8：討伐成功柔光
    addFloat(DRAG_X, DRAG_Y - 80, '討伐成功！+' + reward + ' 靈氣', PAL.gold, true);
    for (let i = 0; i < 6; i++) addOrb(DRAG_X + rnd(-40, 40), DRAG_Y + rnd(-30, 30), PAL.gold, true);
    G.energy += reward; G.totalEnergy += reward;
    gainExp(reward * 0.5);
  },
  buy(i) {
    const u = upgrades[i];
    const cost = currentCost(u);
    if (G.energy < cost) { sfx.deny(); u.pulse = -0.3; return; }
    G.energy -= cost;
    u.count++;
    u.eff();
    u.pulse = 0.35;
    sfx.buy();
    const bx = 320 + (i % 2) * 310 + 150, by = 314 + Math.floor(i / 2) * 106 + 20;
    addFloat(bx, by, u.name + ' Lv.' + u.count + '！', PAL.good, false);
    burst(bx, by + 30, PAL.good, 8, 150, 80);
  },
  onDown(p) {
    // v2：點幸運祥雲（優先判定，目標半徑 48）
    if (this.cloud && Math.hypot(p.x - this.cloud.x, p.y - this.cloud.y) < 48) { this.tapCloud(); return; }
    // 點修士打坐
    if (Math.hypot(p.x - CHAR_X, p.y - (CHAR_Y - 15)) < 95) { this.meditate(); return; }
    // 點妖龍出劍
    if (p.x > ARENA.x && p.x < ARENA.x + ARENA.w && p.y > ARENA.y && p.y < ARENA.y + ARENA.h) this.slash(true);
  },
  onKey(code) {
    if (code === 'Space') this.meditate();
    if (code === 'KeyJ' || code === 'Enter') this.slash(true);
    if (code === 'KeyB') { sfx.click(); setState(battleState); }   // v7：進入BOSS戰
    const n = ['Digit1', 'Digit2', 'Digit3', 'Digit4'].indexOf(code);
    if (n >= 0) this.buy(n);
  },
  update(dt) {
    this.t += dt;
    G.time += dt;
    updateBG(dt);
    G.slashCd = Math.max(0, G.slashCd - dt);
    hudPulse = Math.max(0, hudPulse - dt * 4);
    // v2：連擊計時
    if (G.comboT > 0) { G.comboT -= dt; if (G.comboT <= 0) G.comboN = 0; }
    // v2：幸運祥雲生成與飄移
    if (this.cloud) {
      this.cloud.x += this.cloud.v * dt;
      this.cloud.bob += dt;
      if (this.cloud.x > GAME_W + 70) { this.cloud = null; this.cloudT = rnd(15, 25); }
    } else {
      this.cloudT -= dt;
      if (this.cloudT <= 0) {
        this.cloud = { x: -70, y: rnd(120, 210), v: 62, bob: 0 };
        addFloat(GAME_W / 2, 150, '☁ 幸運祥雲飄來了，快點它！', PAL.gold, false);
      }
    }
    // 顯示數值緩動
    G.dispEnergy += (G.energy - G.dispEnergy) * (1 - Math.pow(0.001, dt));
    G.dispExp += (G.exp / G.expNeeded - G.dispExp) * (1 - Math.pow(0.005, dt));
    G.charSx += (1 - G.charSx) * 10 * dt;
    G.charSy += (1 - G.charSy) * 10 * dt;
    for (const u of upgrades) {
      if (u.pulse > 0) u.pulse = Math.max(0, u.pulse - dt);
      if (u.pulse < 0) u.pulse = Math.min(0, u.pulse + dt);
    }
    // 每秒自動靈氣
    G.tickT += dt;
    if (G.tickT >= 1) {
      G.tickT -= 1;
      if (G.perSecond > 0) gainEnergy(Math.round(G.perSecond * rebirthPowerMul()), CHAR_X + rnd(-50, 50), CHAR_Y + rnd(-40, 20));
    }
    // 妖龍
    if (monster.dead) {
      monster.deathT += dt;
      monster.sy = Math.max(0.01, 1 - monster.deathT * 2.4);
      monster.sx = 1 + monster.deathT * 1.2;
      if (monster.deathT > 0.55) {
        if (monster.mlv >= FINAL_MLV) { this.win(); return; }
        spawnMonster(monster.mlv + 1);
        addFloat(DRAG_X, DRAG_Y - 60, dragonNames[dragonTier(monster.mlv + 1)] + ' 現身！', PAL.bad, false);
      }
    } else {
      monster.born += dt;
      monster.flash = Math.max(0, monster.flash - dt);
      monster.sx += (1 - monster.sx) * 8 * dt;
      monster.sy += (1 - monster.sy) * 8 * dt;
      // v2：龍皇狂怒（最終 Boss 血量 <50% 開始緩慢回血 → 高潮衝刺）
      if (monster.mlv >= FINAL_MLV) {
        if (!monster.enraged && monster.hp < monster.hpMax * 0.5) {
          monster.enraged = true;
          addFloat(DRAG_X, DRAG_Y - 100, '⚠ 龍皇狂怒！會慢慢回血，全力出劍！', PAL.bad, true);
          shake = Math.max(shake, 8); freeze = 0.08;
          burst(DRAG_X, DRAG_Y, PAL.bad, 24, 280, 140);
          sfx.crit();
        }
        if (monster.enraged && monster.hp > 0 && monster.hp < monster.hpMax * 0.5)
          monster.hp = Math.min(monster.hpMax * 0.5, monster.hp + monster.hpMax * 0.005 * dt);
      }
      // 自動攻擊（弟子出手）
      G.autoT += dt;
      if (G.autoT >= 1) { G.autoT -= 1; this.slash(false); }
    }
  },
  win() {
    finalScore = Math.floor((G.totalEnergy + G.kills * 200 + G.level * 500) * rebirthScoreMul());
    newBest = finalScore > best;
    if (newBest) {
      best = finalScore;
      try { localStorage.setItem('五行修仙.best', String(best)); } catch (err) {}
    }
    // v4：飛升即轉世＋1（下一世仙緣更強、妖龍更兇、道行加倍）
    rebirth++;
    try { localStorage.setItem('五行修仙.rebirth', String(rebirth)); } catch (err) {}
    justAscended = true;
    setState(overState);
  },
  draw() {
    uiButtons.length = 0;
    sceneGrade = 'night';   // v8：修煉夜調氛圍
    ctx.save(); ctx.translate((Math.random() * 2 - 1) * shake, (Math.random() * 2 - 1) * shake);
    drawBG();

    // === 修士區 ===
    // 浮空蓮臺
    const hover = Math.sin(bgTime * 1.6) * 5;
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(CHAR_X, CHAR_Y + 52, 62, 10, 0, 0, 6.29); ctx.fill();
    if (!this._lotusG) {   // v6：蓮臺漸層快取（配合 translate 消掉每幀 createGradient）
      this._lotusG = ctx.createLinearGradient(0, CHAR_Y + 26, 0, CHAR_Y + 52);
      this._lotusG.addColorStop(0, '#7a5aa8'); this._lotusG.addColorStop(1, '#4a3570');
    }
    ctx.save(); ctx.translate(0, hover);
    ctx.fillStyle = this._lotusG;
    ctx.beginPath(); ctx.ellipse(CHAR_X, CHAR_Y + 38, 66, 16, 0, 0, 6.29); ctx.fill();
    ctx.restore();
    ctx.strokeStyle = 'rgba(255,212,94,0.5)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(CHAR_X, CHAR_Y + 34 + hover, 58, 12, 0, 0, 6.29); ctx.stroke();
    // 蓮臺花瓣
    ctx.fillStyle = '#9a7ac8';
    for (let i = 0; i < 7; i++) {
      const ang = Math.PI + (i / 6) * Math.PI;
      const px2 = CHAR_X + Math.cos(ang) * 56, py2 = CHAR_Y + 36 + hover + Math.sin(ang) * 10;
      ctx.beginPath(); ctx.ellipse(px2, py2, 9, 5, ang, 0, 6.29); ctx.fill();
    }
    drawCultivator(CHAR_X, CHAR_Y + hover, 1.55, G.gender === 1, ELEMS[G.elemIdx], bgTime, G.charSx, G.charSy);
    // 環繞靈氣光珠
    for (let i = 0; i < 3; i++) {
      const a = bgTime * 1.5 + i * 2.1;
      const ox = CHAR_X + Math.cos(a) * 58, oy = CHAR_Y - 15 + hover + Math.sin(a) * 22;
      ctx.fillStyle = ELEMS[G.elemIdx].color; ctx.globalAlpha = 0.85;
      ctx.beginPath(); ctx.arc(ox, oy, 4, 0, 6.29); ctx.fill(); ctx.globalAlpha = 0.3;
      ctx.beginPath(); ctx.arc(ox, oy, 8, 0, 6.29); ctx.fill();
    }
    ctx.globalAlpha = 1;
    // 打坐提示圈
    const ringR = 92 + Math.sin(bgTime * 3) * 4;
    ctx.strokeStyle = 'rgba(255,212,94,0.4)'; ctx.lineWidth = 2; ctx.setLineDash([8, 8]);
    ctx.beginPath(); ctx.arc(CHAR_X, CHAR_Y - 15, ringR, 0, 6.29); ctx.stroke();
    ctx.setLineDash([]); ctx.fillStyle = PAL.gold; ctx.font = 'bold 19px sans-serif';
    ctx.textAlign = 'center'; ctx.fillText('點我打坐採集靈氣', CHAR_X, CHAR_Y + 92);
    ctx.fillStyle = PAL.dim; ctx.font = '13px sans-serif';
    ctx.fillText(ELEMS[G.elemIdx].name + '靈根 · ' + (G.gender === 1 ? '女修' : '男修') + ' · ' + ELEMS[G.elemIdx].long, CHAR_X, CHAR_Y + 114);

    // v7：進入戰鬥打BOSS 入口（畫面下方）
    const bPulse = 1 + Math.sin(bgTime * 3.2) * 0.025;
    ctx.save();
    ctx.translate(CHAR_X, 506); ctx.scale(bPulse, bPulse); ctx.translate(-CHAR_X, -506);
    button(CHAR_X - 130, 484, 260, 44, '⚔ 進入戰鬥打BOSS (B)', () => { sfx.click(); setState(battleState); }, { size: 19, c1: '#ff8a6b', c2: '#c23b2e', fg: '#fff' });
    ctx.restore();

    // === 妖龍擂臺 ===
    panel(ARENA.x, ARENA.y, ARENA.w, ARENA.h);
    const tier = dragonTier(monster.mlv);
    ctx.fillStyle = PAL.ink; ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(dragonNames[tier] + '（Lv.' + monster.mlv + '）', ARENA.x + 16, ARENA.y + 28);
    // v2：妖龍五行屬性徽章＋相剋關係
    const mE = ELEMS[monster.elemIdx];
    drawElemIcon(mE.id, ARENA.x + 220, ARENA.y + 21, 0.55);
    const eMulNow = elemMulVsMonster();
    ctx.fillStyle = eMulNow > 1 ? PAL.good : (eMulNow < 1 ? PAL.bad : PAL.dim);
    ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(mE.name + '屬性' + (eMulNow > 1 ? '（你剋它 +50%）' : (eMulNow < 1 ? '（它剋你 -15%）' : '')), ARENA.x + 238, ARENA.y + 26);
    ctx.fillStyle = PAL.dim; ctx.font = '13px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText('已討伐 ' + G.kills + ' 隻 · 每擊 ' + playerPower() + ' 傷害 · 點龍出劍！', ARENA.x + ARENA.w - 14, ARENA.y + 28);
    // 血條
    const hbX = ARENA.x + 16, hbY = ARENA.y + 40, hbW = ARENA.w - 32;
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    roundRect(hbX, hbY, hbW, 14, 7); ctx.fill();
    const hpr = clamp(monster.hp / monster.hpMax, 0, 1);
    if (hpr > 0) {
      ctx.fillStyle = HPBAR_G;   // v3：預計算
      roundRect(hbX, hbY, Math.max(8, hbW * hpr), 14, 7); ctx.fill();
    }
    ctx.fillStyle = PAL.ink; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(Math.max(0, Math.ceil(monster.hp)) + ' / ' + monster.hpMax, hbX + hbW / 2, hbY + 11);
    // 擂臺地面
    ctx.fillStyle = 'rgba(70,120,80,0.35)';
    ctx.beginPath(); ctx.ellipse(DRAG_X, DRAG_Y + 44, 120, 18, 0, 0, 6.29); ctx.fill();
    if (monster.enraged && !monster.dead) {   // v2：狂怒紅色氣場（v6：烘焙光暈＋縮放脈動）
      if (!playState._rageSpr) {
        playState._rageSpr = bakeCv(200, 200, g => {
          const rg = g.createRadialGradient(100, 100, 10, 100, 100, 95);
          rg.addColorStop(0, 'rgba(255,60,60,0.3)'); rg.addColorStop(1, 'rgba(255,60,60,0)');
          g.fillStyle = rg; g.fillRect(0, 0, 200, 200);
        });
      }
      const pu = 1 + Math.sin(bgTime * 8) * 0.12;
      ctx.drawImage(playState._rageSpr, DRAG_X - 100 * pu, DRAG_Y - 100 * pu, 200 * pu, 200 * pu);
    }
    if (!monster.dead || monster.deathT < 0.5) {
      drawDragon(DRAG_X, DRAG_Y, 1.15, tier, bgTime, monster.flash, monster.sx, monster.sy);
    }
    // v2：連擊顯示（1.2 秒內連續出劍）
    if (G.comboN >= 3) {
      const cm = Math.min(2, 1 + Math.floor(G.comboN / 5) * 0.25);
      const cs = 1 + Math.max(0, G.comboT - 0.9) * 0.8;
      ctx.save();
      ctx.translate(ARENA.x + ARENA.w - 90, ARENA.y + 84);
      ctx.scale(cs, cs);
      ctx.textAlign = 'center';
      ctx.fillStyle = PAL.goldDeep; ctx.font = 'bold 24px sans-serif';
      ctx.fillText('連擊 ' + G.comboN, 0, 0);
      if (cm > 1) { ctx.fillStyle = PAL.gold; ctx.font = 'bold 15px sans-serif'; ctx.fillText('傷害 x' + cm.toFixed(2).replace(/0+$/, '').replace(/\.$/, ''), 0, 22); }
      ctx.restore();
    }
    // v3：開場前 8 秒脈動提示——新手第一眼就知道妖龍可以點
    if (this.t < 8 && !monster.dead) {
      ctx.globalAlpha = 0.55 + Math.sin(bgTime * 4) * 0.35;
      ctx.fillStyle = PAL.gold; ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('點妖龍出劍攻擊！', DRAG_X, ARENA.y + ARENA.h - 12);
      ctx.globalAlpha = 1;
    }
    // 最終Boss警示
    if (tier === 5 && !monster.dead) {
      ctx.fillStyle = PAL.bad; ctx.font = 'bold 15px sans-serif'; ctx.textAlign = 'center';
      ctx.globalAlpha = 0.6 + Math.sin(bgTime * 6) * 0.4;
      ctx.fillText('⚠ 最終妖王 ⚠', DRAG_X, ARENA.y + 70); ctx.globalAlpha = 1;
    }
    drawSlashes();

    // v2：幸運祥雲（點擊獲得靈氣）
    if (this.cloud) {
      const c = this.cloud, bobY = Math.sin(c.bob * 2.4) * 6;
      ctx.save();
      ctx.translate(c.x, c.y + bobY);
      ctx.globalAlpha = 0.3;   // v3：色暈取代 shadowBlur
      ctx.fillStyle = PAL.gold;
      ctx.beginPath(); ctx.ellipse(0, 0, 52, 26, 0, 0, 6.29); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#fff6d8';
      ctx.beginPath();
      ctx.ellipse(0, 4, 40, 15, 0, 0, 6.29);
      ctx.ellipse(-20, -4, 20, 13, 0, 0, 6.29);
      ctx.ellipse(16, -6, 24, 14, 0, 0, 6.29);
      ctx.fill();
      ctx.strokeStyle = PAL.gold; ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = '#b8862e'; ctx.font = 'bold 15px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('點我！', 0, 4);
      const sp2 = 0.6 + Math.sin(bgTime * 5) * 0.4;
      ctx.globalAlpha = sp2;
      ctx.fillStyle = PAL.gold; ctx.font = 'bold 13px sans-serif';
      ctx.fillText('✨ 幸運靈氣 ✨', 0, -24);
      ctx.restore();
      ctx.globalAlpha = 1;
    }

    // === 商店 ===
    for (let i = 0; i < 4; i++) {
      const u = upgrades[i];
      const x = 320 + (i % 2) * 310, y = 314 + Math.floor(i / 2) * 106, w = 300, h = 98;
      const cost = currentCost(u);
      const can = G.energy >= cost;
      const pl = u.pulse > 0 ? 1 + easeOutBack(1 - u.pulse / 0.35) * 0.02 : 1;
      ctx.save();
      if (u.pulse < 0) ctx.translate(rnd(-2, 2), 0); // 買不起晃動
      ctx.translate(x + w / 2, y + h / 2); ctx.scale(pl, pl);
      ctx.translate(-(x + w / 2), -(y + h / 2));
      panel(x, y, w, h, can);
      ctx.fillStyle = can ? PAL.ink : PAL.dim; ctx.font = 'bold 18px sans-serif';
      ctx.textAlign = 'left'; ctx.fillText(u.name + '　Lv.' + u.count, x + 16, y + 30);
      ctx.fillStyle = PAL.dim; ctx.font = '13px sans-serif';
      ctx.fillText(u.desc, x + 16, y + 52);
      // 價格膠囊
      const capW = 130;
      ctx.fillStyle = can ? PAL.gold : 'rgba(255,255,255,0.08)';
      roundRect(x + 16, y + 62, capW, 26, 13); ctx.fill();
      ctx.fillStyle = can ? '#20140a' : PAL.dim; ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center'; ctx.fillText(cost + ' 靈氣', x + 16 + capW / 2, y + 80);
      ctx.fillStyle = PAL.dim; ctx.font = '12px sans-serif'; ctx.textAlign = 'right';
      ctx.fillText('按 ' + (i + 1), x + w - 14, y + 80); ctx.restore();
      uiButtons.push({ x, y, w, h, cb: (() => this.buy(i)) });
    }
    drawParts();
    drawOrbs();
    drawFloaters();
    ctx.restore();

    // === HUD ===
    // 境界
    panel(12, 10, 250, 62);
    ctx.fillStyle = PAL.ink; ctx.font = 'bold 17px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(realmName(G.level) + '期 · 境界 Lv.' + G.level, 26, 34);
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    roundRect(26, 44, 222, 12, 6); ctx.fill();
    ctx.fillStyle = EXPBAR_G;   // v3：預計算
    roundRect(26, 44, Math.max(6, 222 * clamp(G.dispExp, 0, 1)), 12, 6); ctx.fill();
    // 靈氣
    const hp2 = 1 + hudPulse * 0.1;
    ctx.save(); ctx.translate(GAME_W / 2, 40); ctx.scale(hp2, hp2); ctx.textAlign = 'center';
    ctx.fillStyle = PAL.gold; ctx.font = 'bold 34px sans-serif';
    ctx.fillText(Math.floor(G.dispEnergy) + ' 靈氣', 0, 6); ctx.restore();
    ctx.textAlign = 'center'; ctx.fillStyle = PAL.dim; ctx.font = '13px sans-serif';
    const rTag = rebirth > 0 ? ' · 轉世第' + (rebirth + 1) + '世 仙緣×' + rebirthPowerMul().toFixed(1) : '';
    ctx.fillText('每秒自動 +' + Math.round(G.perSecond * rebirthPowerMul()) + ' · 打坐 +' + Math.round(G.perClick * rebirthPowerMul()) + rTag, GAME_W / 2, 66);
    muteButton();
  }
};

// ===== v7：BOSS 討伐戰（進入戰鬥打BOSS）=====
// 點龍出劍傷害翻倍，但 BOSS 會蓄力噴火——看到警示按「防禦」格擋。
// 贏了拿海量靈氣，輸了不扣任何資源（失敗不挫折，回去升級再來）。
const BT_PX = 210, BT_PY = 385, BT_BX = 660, BT_BY = 300;
const battleState = {
  enter() {
    this.t = 0; parts.length = 0; floaters.length = 0; orbs.length = 0; slashes.length = 0;
    this.bLv = (G.bossWins || 0) + 1;
    this.bHpMax = Math.floor(260 * Math.pow(1.9, this.bLv - 1) * rebirthHpMul());
    this.bHp = this.bHpMax;
    this.pHpMax = 100; this.pHp = 100;
    this.atkT = 2.6; this.tele = 0; this.guard = 0; this.guardCd = 0;
    this.flash = 0; this.bsx = 0.2; this.bsy = 0.2; this.psx = 1; this.psy = 1;
    this.fire = null; this.result = 0; this.resT = 0; this.reward = 0;
    addFloat(GAME_W / 2, 170, '⚔ 戰鬥開始！點龍出劍，看到蓄力就防禦！', PAL.gold, true);
    sfx.crit();
    shake = Math.max(shake, 4);
  },
  attack() {
    if (this.result || G.slashCd > 0) return;
    G.slashCd = 0.15;
    const crit = ELEMS[G.elemIdx].id === 'fire' && Math.random() < 0.2;
    const dmg = Math.max(1, Math.round(playerPower() * 2 * (crit ? 2 : 1)));   // 戰鬥中出劍傷害 ×2
    this.bHp -= dmg;
    this.flash = 0.12; this.bsx = 1.22; this.bsy = 0.8;
    addSlash(BT_BX + rnd(-20, 20), BT_BY + rnd(-30, 10), crit);
    addFloat(BT_BX + rnd(-30, 30), BT_BY - 100, (crit ? '爆擊 -' + dmg + '！' : '-' + dmg), crit ? PAL.goldDeep : '#ffe066', crit);
    burst(BT_BX, BT_BY - 10, crit ? PAL.goldDeep : '#ffd0a0', crit ? 14 : 7, 220);
    if (crit) { freeze = 0.07; shake = Math.max(shake, 5); sfx.crit(); }
    else { shake = Math.max(shake, 2); sfx.hit(); }
    sfx.slash();
    if (this.bHp <= 0) { this.bHp = 0; this.winBattle(); }
  },
  doGuard() {
    if (this.result || this.guardCd > 0) return;
    this.guard = 0.6; this.guardCd = 1.1;
    sfx.click();
    burst(BT_PX + 45, BT_PY - 30, PAL.qi, 6, 120, 40);
  },
  winBattle() {
    this.result = 1; this.resT = 0;
    G.bossWins = (G.bossWins || 0) + 1;
    this.reward = Math.floor(this.bHpMax * 1.2);
    G.energy += this.reward; G.totalEnergy += this.reward;
    gainExp(this.reward * 0.6);
    freeze = 0.12; shake = Math.max(shake, 10);
    sfx.win();
    flashScreen('255,224,150', 0.22);   // v8：BOSS 討伐成功柔光
    burst(BT_BX, BT_BY, PAL.gold, 30, 300, 150);
    burst(BT_BX, BT_BY, '#2c2c3e', 20, 260, 100);
    for (let i = 0; i < 8; i++) addOrb(BT_BX + rnd(-40, 40), BT_BY + rnd(-30, 30), PAL.gold, true);
  },
  loseBattle() {
    this.result = -1; this.resT = 0;
    sfx.die(); shake = Math.max(shake, 8); freeze = 0.08;
    burst(BT_PX, BT_PY - 20, PAL.bad, 20, 240, 120);
  },
  onDown(p) {
    if (this.result) return;   // 結算按鈕交給 uiButtons
    if (Math.hypot(p.x - BT_BX, p.y - BT_BY) < 160) this.attack();
  },
  onKey(code) {
    if (this.result) {
      if ((code === 'Space' || code === 'Enter') && this.resT > 0.6) { sfx.click(); setState(playState); }
      return;
    }
    if (code === 'KeyJ' || code === 'Space' || code === 'Enter') this.attack();
    if (code === 'KeyK') this.doGuard();
    if (code === 'Escape' || code === 'KeyB') { sfx.click(); setState(playState); }
  },
  update(dt) {
    this.t += dt; G.time += dt;
    updateBG(dt);
    G.slashCd = Math.max(0, G.slashCd - dt);
    hudPulse = Math.max(0, hudPulse - dt * 4);
    this.flash = Math.max(0, this.flash - dt);
    this.bsx += (1 - this.bsx) * 8 * dt; this.bsy += (1 - this.bsy) * 8 * dt;
    this.psx += (1 - this.psx) * 10 * dt; this.psy += (1 - this.psy) * 10 * dt;
    this.guard = Math.max(0, this.guard - dt);
    this.guardCd = Math.max(0, this.guardCd - dt);
    if (this.result) { this.resT += dt; return; }
    // BOSS 攻擊循環：蓄力（警示）→ 噴火 → 格擋或受傷
    if (this.fire) {
      this.fire.t += dt * 2;
      if (this.fire.t >= 1) {
        this.fire = null;
        if (this.guard > 0) {
          addFloat(BT_PX, BT_PY - 110, '🛡 格擋成功！', PAL.good, true);
          burst(BT_PX + 45, BT_PY - 35, PAL.qi, 14, 200, 60);
          sfx.hit();
          shake = Math.max(shake, 3);
        } else {
          const dmg = 12 + this.bLv * 3;
          this.pHp -= dmg;
          this.psx = 1.2; this.psy = 0.8;
          addFloat(BT_PX, BT_PY - 110, '-' + dmg, PAL.bad, true);
          burst(BT_PX, BT_PY - 20, PAL.bad, 14, 220, 80);
          shake = Math.max(shake, 6); freeze = 0.05;
          sfx.crit();
          if (this.pHp <= 0) { this.pHp = 0; this.loseBattle(); return; }
        }
      }
    } else if (this.tele > 0) {
      this.tele -= dt;
      if (this.tele <= 0) { this.fire = { t: 0 }; noise(0.14, 0.12); }
    } else {
      this.atkT -= dt;
      if (this.atkT <= 0) {
        this.atkT = Math.max(1.5, 2.7 - this.bLv * 0.12) + rnd(0, 0.6);
        this.tele = 0.75;
        addFloat(BT_BX, BT_BY - 130, '⚠ 蓄力噴火！快防禦！', PAL.bad, true);
        beep(120, 0.3, 'sawtooth', 0.1, 80);
      }
    }
  },
  draw() {
    uiButtons.length = 0;
    sceneGrade = 'danger';   // v8：BOSS 戰危機色溫
    ctx.save(); ctx.translate((Math.random() * 2 - 1) * shake, (Math.random() * 2 - 1) * shake);
    drawBG();
    // 標題與說明
    ctx.textAlign = 'center'; ctx.fillStyle = PAL.gold; ctx.font = 'bold 28px serif';
    ctx.fillText('⚔ BOSS 討伐戰 · ' + dragonNames[5] + ' 第 ' + this.bLv + ' 型態', GAME_W / 2, 42);
    ctx.fillStyle = PAL.dim; ctx.font = '13px sans-serif';
    ctx.fillText('點龍（或 J / 空白鍵）出劍，傷害 ×2 · 看到「蓄力噴火」點防禦（或 K）格擋 · Esc 撤退', GAME_W / 2, 66);
    // BOSS 血條（v7：暗底描邊＋頂部光澤更立體）
    const bw = 400, bx = BT_BX - bw / 2, by = 96;
    ctx.fillStyle = 'rgba(0,0,0,0.45)'; roundRect(bx - 1.5, by - 1.5, bw + 3, 19, 9.5); ctx.fill();
    const bhr = clamp(this.bHp / this.bHpMax, 0, 1);
    if (bhr > 0) { ctx.fillStyle = '#ff6b6b'; roundRect(bx, by, Math.max(10, bw * bhr), 16, 8); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.3)'; roundRect(bx, by, Math.max(10, bw * bhr), 6, 3); ctx.fill(); }
    ctx.strokeStyle = 'rgba(255,255,255,0.28)'; ctx.lineWidth = 1.2;
    roundRect(bx - 1.5, by - 1.5, bw + 3, 19, 9.5); ctx.stroke();
    ctx.fillStyle = PAL.ink; ctx.font = 'bold 12px sans-serif';
    ctx.fillText('BOSS　' + Math.max(0, Math.ceil(this.bHp)) + ' / ' + this.bHpMax, BT_BX, by + 12);
    // 玩家血條（v7：同款質感）
    const pw = 240, pxx = BT_PX - pw / 2, pyy = 96;
    ctx.fillStyle = 'rgba(0,0,0,0.45)'; roundRect(pxx - 1.5, pyy - 1.5, pw + 3, 19, 9.5); ctx.fill();
    const phr = clamp(this.pHp / this.pHpMax, 0, 1);
    if (phr > 0) { ctx.fillStyle = phr > 0.35 ? PAL.good : PAL.bad; roundRect(pxx, pyy, Math.max(10, pw * phr), 16, 8); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.3)'; roundRect(pxx, pyy, Math.max(10, pw * phr), 6, 3); ctx.fill(); }
    ctx.strokeStyle = 'rgba(255,255,255,0.28)'; ctx.lineWidth = 1.2;
    roundRect(pxx - 1.5, pyy - 1.5, pw + 3, 19, 9.5); ctx.stroke();
    ctx.fillStyle = PAL.ink; ctx.font = 'bold 12px sans-serif';
    ctx.fillText('你　' + Math.max(0, Math.ceil(this.pHp)) + ' / ' + this.pHpMax, BT_PX, pyy + 12);
    // 地面
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(BT_PX, BT_PY + 50, 70, 12, 0, 0, 6.29); ctx.fill();
    ctx.beginPath(); ctx.ellipse(BT_BX, BT_BY + 76, 150, 22, 0, 0, 6.29); ctx.fill();
    // 蓄力警示紅圈
    if (this.tele > 0) {
      ctx.globalAlpha = 0.35 + 0.35 * Math.abs(Math.sin(bgTime * 12));
      ctx.strokeStyle = PAL.bad; ctx.lineWidth = 5;
      ctx.beginPath(); ctx.arc(BT_BX, BT_BY, 130, 0, 6.29); ctx.stroke();
      ctx.globalAlpha = 1;
    }
    // BOSS（鏡射面向玩家）
    if (this.result !== 1 || this.resT < 0.4) {
      const dsy = this.result === 1 ? Math.max(0.02, 1 - this.resT * 2.4) : this.bsy;
      drawDragon(BT_BX, BT_BY, 1.75, 5, bgTime, this.flash, -this.bsx, dsy);
    }
    // 噴火火球（BOSS 口 → 玩家）
    if (this.fire) {
      const ft = clamp(this.fire.t, 0, 1);
      const fx = lerp(BT_BX - 70, BT_PX + 20, ft), fy = lerp(BT_BY - 40, BT_PY - 25, ft);
      ctx.fillStyle = '#ffdd66'; ctx.beginPath(); ctx.arc(fx, fy, 10, 0, 6.29); ctx.fill();
      ctx.fillStyle = 'rgba(255,122,77,0.6)';
      ctx.beginPath(); ctx.arc(fx, fy, 17, 0, 6.29); ctx.fill();
      ctx.strokeStyle = 'rgba(255,122,77,0.4)'; ctx.lineWidth = 8; ctx.lineCap = 'round';

    }
    // 玩家（受傷時 squash）
    drawCultivator(BT_PX, BT_PY, 1.5, G.gender === 1, ELEMS[G.elemIdx], bgTime, this.psx, this.psy);
    // 防禦護盾光罩
    if (this.guard > 0) {
      ctx.globalAlpha = 0.5 + 0.3 * Math.sin(bgTime * 14);
      ctx.strokeStyle = PAL.qi; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(BT_PX + 20, BT_PY - 22, 62, -1.4, 1.4); ctx.stroke();
      ctx.globalAlpha = 0.15; ctx.fillStyle = PAL.qi;
      ctx.beginPath(); ctx.arc(BT_PX, BT_PY - 20, 66, 0, 6.29); ctx.fill();
      ctx.globalAlpha = 1;
    }
    drawSlashes();
    drawParts();
    drawOrbs();
    drawFloaters();
    ctx.restore();
    // 操作鈕
    if (!this.result) {
      const gLabel = this.guardCd > 0 && this.guard <= 0 ? '🛡 冷卻中…' : '🛡 防禦 (K)';
      button(BT_PX - 85, 462, 170, 54, gLabel, () => this.doGuard(),
        this.guardCd > 0 && this.guard <= 0 ? { c1: '#5a628a', c2: '#39406e', fg: '#cfd5f2', size: 20 } : { c1: '#8be9ff', c2: '#2e7fb8', fg: '#0a2030', size: 20 });
      button(20, 14, 110, 40, '← 撤退', () => { sfx.click(); setState(playState); }, { size: 17, c1: '#5a628a', c2: '#39406e', fg: '#eef1ff' });
    } else {
      // 結算面板
      const pt = clamp(this.resT / 0.4, 0, 1), ps = easeOutBack(pt);
      ctx.save(); ctx.translate(GAME_W / 2, GAME_H / 2); ctx.scale(ps, ps); ctx.translate(-GAME_W / 2, -GAME_H / 2);
      panel(GAME_W / 2 - 220, 150, 440, 240, true);
      ctx.textAlign = 'center';
      if (this.result === 1) {
        ctx.fillStyle = PAL.gold; ctx.font = 'bold 36px serif';
        ctx.fillText('討伐成功！', GAME_W / 2, 208);
        ctx.fillStyle = PAL.goldDeep; ctx.font = 'bold 24px sans-serif';
        ctx.fillText('+' + this.reward + ' 靈氣', GAME_W / 2, 248);
        ctx.fillStyle = PAL.dim; ctx.font = '14px sans-serif';
        ctx.fillText('龍皇將以第 ' + (this.bLv + 1) + ' 型態捲土重來，血量更厚、噴火更快！', GAME_W / 2, 282);
      } else {
        ctx.fillStyle = PAL.bad; ctx.font = 'bold 36px serif';
        ctx.fillText('敗退……', GAME_W / 2, 208);
        ctx.fillStyle = PAL.ink; ctx.font = '16px sans-serif';
        ctx.fillText('不扣任何資源！回去打坐、升級再來挑戰', GAME_W / 2, 248);
        ctx.fillStyle = PAL.dim; ctx.font = '13px sans-serif';
        ctx.fillText('小訣竅：看到紅圈「蓄力噴火」馬上按防禦（K），穩穩格擋', GAME_W / 2, 278);
      }
      if (this.resT > 0.6) button(GAME_W / 2 - 110, 320, 220, 50, '返回修煉', () => { sfx.click(); setState(playState); }, { size: 22 });
      ctx.restore();
    }
    muteButton();
  }
};

// ---------- 主迴圈 ----------
const STEP = 1 / 60;
let last = performance.now(), acc2 = 0;
function frame(now) {
  requestAnimationFrame(frame);
  acc2 += Math.min((now - last) / 1000, 0.1);
  last = now;
  while (acc2 >= STEP) {
    acc2 -= STEP;
    if (freeze > 0) { freeze -= STEP; continue; }
    shake *= Math.pow(0.001, STEP);
    if (shake < 0.1) shake = 0;
    state.update(STEP);
    updateParts(STEP);
    updateFloaters(STEP);
    updateOrbs(STEP);
    updateSlashes(STEP);
  }
  state.draw();
  if (sceneFade7 > 0) {   // v7：0.3 秒淡入轉場
    sceneFade7 = Math.max(0, sceneFade7 - STEP * 3.4);
    ctx.fillStyle = 'rgba(10,10,26,' + (sceneFade7 * sceneFade7 * 0.9).toFixed(3) + ')';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
  }
  if (eventFlash > 0) {   // v8：里程碑事件式柔光（單次快閃，快速淡出，不造成頭暈）
    eventFlash = Math.max(0, eventFlash - STEP * 3);
    ctx.save(); ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = 'rgba(' + eventFlashCol + ',' + eventFlash.toFixed(3) + ')';
    ctx.fillRect(0, 0, GAME_W, GAME_H); ctx.restore();
  }
  if (innerHeight > innerWidth * 1.15) {   // v2：直向持機提示（不阻擋操作）
    ctx.save();
    ctx.globalAlpha = 0.88;
    ctx.fillStyle = PAL.panel;
    roundRect(GAME_W / 2 - 130, 74, 260, 34, 17);
    ctx.fill();
    ctx.strokeStyle = PAL.gold; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = PAL.gold; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('↻ 轉成橫向，畫面更大！', GAME_W / 2, 96);
    ctx.restore();
  }
}
setState(titleState);
requestAnimationFrame(frame);
</script>
