}
// 顏色明暗調整（角色漸層陰影／高光用）：pct>0 提亮、pct<0 加深
function hexToRgb(hex){
  hex = String(hex).replace('#','');
  if(hex.length===3) hex = hex.split('').map(c=>c+c).join('');
  const num = parseInt(hex,16) || 0;
  return { r:(num>>16)&255, g:(num>>8)&255, b:num&255 };
}
function shade(hex, pct){
  const {r,g,b} = hexToRgb(hex);
  const t = pct<0 ? 0 : 255;
  const p = Math.min(1, Math.abs(pct));
  const nr = Math.round((t-r)*p+r), ng = Math.round((t-g)*p+g), nb = Math.round((t-b)*p+b);
  return 'rgb('+nr+','+ng+','+nb+')';
}

let AC = null, master = null, ambGain = null, ambOut = null;
const AMB_BASE = 0.035;
let muted = localStorage.getItem('catrest2_mute') === '1';
function audio(){
  if(!AC){
    AC = new (window.AudioContext||window.webkitAudioContext)();
    const comp = AC.createDynamicsCompressor();
    comp.threshold.value = -18; comp.knee.value = 24; comp.ratio.value = 6;
    comp.attack.value = 0.003; comp.release.value = 0.2;
    master = AC.createGain(); master.gain.value = 0.9;
    /* v7：音色打磨——高頻柔化 shelf，讓方波不刺耳、整體更溫潤 */
    const shelf = AC.createBiquadFilter();
    shelf.type = 'highshelf'; shelf.frequency.value = 5200; shelf.gain.value = -4.5;
    master.connect(shelf); shelf.connect(comp); comp.connect(AC.destination);
    /* v6：程序化小空間殘響——generated impulse ConvolverNode（溫暖室內尾音） */
    try{
      const sr = AC.sampleRate, len = Math.floor(sr*1.2);
      const imp = AC.createBuffer(2, len, sr);
      for(let ch=0; ch<2; ch++){
        const d = imp.getChannelData(ch);
        for(let i=0;i<len;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/len, 2.6);
      }
      const conv = AC.createConvolver(); conv.buffer = imp;
      const wet = AC.createGain(); wet.gain.value = 0.15;
      master.connect(conv); conv.connect(wet); wet.connect(comp);
    }catch(e){}
    /* v6：廚房氛圍循環——帶通噪聲模擬爐火嘶嘶＋LFO起伏＋隨機鍋碗輕響 */
    try{
      const sr = AC.sampleRate, alen = Math.floor(sr*2.2);
      const abuf = AC.createBuffer(1, alen, sr);
      const ad = abuf.getChannelData(0); let v = 0;
      for(let i=0;i<alen;i++){ v = v*0.975 + (Math.random()*2-1)*0.08; ad[i] = v*1.9; }
      const src = AC.createBufferSource(); src.buffer = abuf; src.loop = true;
      const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 2400; bp.Q.value = 0.35;
      ambGain = AC.createGain(); ambGain.gain.value = AMB_BASE;
      const lfo = AC.createOscillator(); lfo.frequency.value = 0.16;
      const lg = AC.createGain(); lg.gain.value = AMB_BASE*0.45;
      lfo.connect(lg); lg.connect(ambGain.gain);
      ambOut = AC.createGain(); ambOut.gain.value = muted ? 0 : 1;
      src.connect(bp); bp.connect(ambGain); ambGain.connect(ambOut); ambOut.connect(comp);
      src.start(); lfo.start();
      clinkLoop();
    }catch(e){}
  }
  if(AC.state === 'suspended') AC.resume();
  return AC;
}
/* v6：大事件時氛圍 ducking */
function duckAmb(){
  if(!AC || !ambGain) return;
  const t = AC.currentTime;
  ambGain.gain.cancelScheduledValues(t);
  ambGain.gain.setValueAtTime(Math.max(0.001, ambGain.gain.value), t);
  ambGain.gain.linearRampToValueAtTime(AMB_BASE*0.2, t+0.05);
  ambGain.gain.linearRampToValueAtTime(AMB_BASE, t+1.2);
}
/* v6：隨機鍋碗輕響（營業中每 4~9 秒一聲） */
let clinkStarted = false;
function clinkLoop(){
  if(clinkStarted) return; clinkStarted = true;
  (function next(){
    setTimeout(()=>{
      if(state===playState && !muted){
        beep(1700+Math.random()*800, 0.04, 'sine', 0.03);
        if(Math.random()<0.35) setTimeout(()=>beep(2300+Math.random()*600,0.03,'sine',0.02), 70);
      }
      next();
    }, 4000+Math.random()*5000);
  })();
}
addEventListener('pointerdown', audio, { once:true });
addEventListener('keydown', audio, { once:true });
function beep(freq=440, dur=0.1, type='square', vol=0.14, slide=0){
  if(muted || !AC) return;
  const f = freq * (0.94 + Math.random()*0.12);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(f, AC.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, f+slide), AC.currentTime+dur);
  /* v7：起音軟化——3ms 微淡入去除爆音喀噠聲，音色更圓潤（觸發時機不變） */
  g.gain.setValueAtTime(0.0001, AC.currentTime);
  g.gain.linearRampToValueAtTime(vol, AC.currentTime+0.003);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
  o.connect(g).connect(master);
  o.start(); o.stop(AC.currentTime+dur);
}
const sfx = {

               if(c>1) setTimeout(()=>beep(1568,0.14,'square',0.13),140); },
  perfect: ()=>{ [1319,1568,2093].forEach((f,i)=>setTimeout(()=>beep(f,0.1,'square',0.12),i*70)); },
  deny   : ()=>beep(180,0.08,'sawtooth',0.11),
  expire : ()=>{ duckAmb(); beep(160,0.28,'sawtooth',0.15,-90); },
  bump   : ()=>{ beep(120,0.15,'sawtooth',0.14,-60); },
  tick   : ()=>beep(880,0.05,'square',0.08),
  star   : n=>beep(784+n*180,0.18,'square',0.14,120),
  win    : ()=>{ duckAmb(); [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.16,'square',0.13),i*110)); },
  lose   : ()=>{ duckAmb(); beep(300,0.2,'square',0.12,-150); setTimeout(()=>beep(220,0.3,'square',0.12,-150),180); },
};
function toggleMute(){
  muted = !muted; localStorage.setItem('catrest2_mute', muted?'1':'0');
  if(ambOut) ambOut.gain.value = muted ? 0 : 1;   /* v6：氛圍層跟著靜音 */
}

/* ===================== 輸入：鍵盤＋浮動搖桿＋點擊 ===================== */
const input = { up:false, down:false, left:false, right:false };
const KEYMAP = { ArrowUp:'up', KeyW:'up', ArrowDown:'down', KeyS:'down',
                 ArrowLeft:'left', KeyA:'left', ArrowRight:'right', KeyD:'right' };
addEventListener('keydown', e=>{
  const a = KEYMAP[e.code];
  if(a){ e.preventDefault(); input[a] = true; }
  if(e.code==='KeyM'){ toggleMute(); return; }
  if(state===selectState){
    // 方向鍵游標：讓鍵盤玩家也能不看滑鼠選關（呼應畫面上的高亮框）
    if(e.code==='ArrowLeft'||e.code==='KeyA'){ e.preventDefault(); selCursor = Math.max(0, selCursor-1); sfx.tick(); }
    if(e.code==='ArrowRight'||e.code==='KeyD'){ e.preventDefault(); selCursor = Math.min(DAYS.length-1, selCursor+1); sfx.tick(); }
    const n = {Digit1:0,Digit2:1,Digit3:2,Digit4:3,Digit5:4}[e.code];
    if(n!==undefined){ selCursor = n; if(unlockedDay(n)) startLevel(n); else sfx.deny(); }
  }
  if(e.code==='Space' || e.code==='Enter'){
    e.preventDefault();
    if(state===menuState) setState(selectState);
    else if(state===selectState){ if(unlockedDay(selCursor)) startLevel(selCursor); else sfx.deny(); }
    else if(state===resultState && resultState.t>0.6) startLevel(curLevel);
  }
  if(e.code==='Escape'){
    if(state===selectState) setState(menuState);
    else if(state===resultState) setState(selectState);
  }
});
addEventListener('keyup', e=>{ const a = KEYMAP[e.code]; if(a) input[a] = false; });

const stick = { active:false, id:null, cx:0, cy:0, dx:0, dy:0 };
function evPos(t){
  const r = canvas.getBoundingClientRect();
  return { x:(t.clientX-r.left)/canvas._scale, y:(t.clientY-r.top)/canvas._scale };
}
function pointInRect(x,y,r){ return x>=r.x && x<=r.x+r.w && y>=r.y && y<=r.y+r.h; }
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const p = evPos(t);
    if(state===playState && !pointInRect(p.x,p.y,MUTE_BTN)){
      if(!stick.active){
        stick.active = true; stick.id = t.identifier;
        stick.cx = p.x; stick.cy = p.y; stick.dx = 0; stick.dy = 0;
      }
    }
    onTap(p.x, p.y);
  }
}, {passive:false});
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(stick.active && t.identifier===stick.id){
      const p = evPos(t);
      let dx = p.x-stick.cx, dy = p.y-stick.cy;
      const d = Math.hypot(dx,dy), max = 60, dead = 6;
      if(d < dead){ stick.dx = 0; stick.dy = 0; continue; }
      if(d > max){ dx = dx/d*max; dy = dy/d*max; }
      stick.dx = dx/max; stick.dy = dy/max;
    }
  }
}, {passive:false});
function endTouch(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    if(stick.active && t.identifier===stick.id){
      stick.active = false; stick.dx = 0; stick.dy = 0;
    }
  }
}
canvas.addEventListener('touchend', endTouch, {passive:false});
canvas.addEventListener('touchcancel', endTouch, {passive:false});
canvas.addEventListener('mousedown', e=>{ e.preventDefault(); const p=evPos(e); onTap(p.x,p.y); });

function projX(gx,gy){ return ORIGIN_X + (gx-gy)*(TILE_W/2); }
function projY(gx,gy){ return ORIGIN_Y + (gx+gy)*(TILE_H/2); }

/* ===================== 場景烘焙（每關一次） ===================== */
const sceneCv = document.createElement('canvas');
sceneCv.width = GAME_W; sceneCv.height = GAME_H;
function diamondPathOn(g,gx,gy){
  g.beginPath();
  g.moveTo(projX(gx,gy), projY(gx,gy));
  g.lineTo(projX(gx+1,gy), projY(gx+1,gy));
  g.lineTo(projX(gx+1,gy+1), projY(gx+1,gy+1));
  g.lineTo(projX(gx,gy+1), projY(gx,gy+1));
  g.closePath();
}
function bakeScene(day){
  const g = sceneCv.getContext('2d');
  // 溫暖室內漸層
  const bg = g.createLinearGradient(0,0,0,GAME_H);
  bg.addColorStop(0,'#3a2412'); bg.addColorStop(0.55,'#2c1a0c'); bg.addColorStop(1,'#241408');
  g.fillStyle = bg; g.fillRect(0,0,GAME_W,GAME_H);
  // 後牆（左右斜面）
  g.fillStyle='#4a2f18';
  g.beginPath();
  g.moveTo(projX(0,0),projY(0,0)-150); g.lineTo(projX(COLS,0),projY(COLS,0)-150);
  g.lineTo(projX(COLS,0),projY(COLS,0)); g.lineTo(projX(0,0),projY(0,0)); g.closePath(); g.fill();
  g.fillStyle='#41290f';
  g.beginPath();
  g.moveTo(projX(0,0),projY(0,0)-150); g.lineTo(projX(0,ROWS),projY(0,ROWS)-150);
  g.lineTo(projX(0,ROWS),projY(0,ROWS)); g.lineTo(projX(0,0),projY(0,0)); g.closePath(); g.fill();
  // 窗戶（夜空＋月亮）
  for(let i=0;i<2;i++){
    const wx = projX(1.6+i*2.8,0), wy = projY(1.6+i*2.8,0)-108;
    g.fillStyle='#142a4d';
    rr(g,wx-38,wy-34,76,64,8); g.fill();
    g.strokeStyle='#6b4a26'; g.lineWidth=5; rr(g,wx-38,wy-34,76,64,8); g.stroke();
    if(i===1){ g.fillStyle='#ffeeba'; g.beginPath(); g.arc(wx+14,wy-10,11,0,Math.PI*2); g.fill(); }
    g.fillStyle='#e9e2ff';
    g.fillRect(wx-24,wy-20,2,2); g.fillRect(wx-8,wy-4,2,2); g.fillRect(wx+4,wy-24,2,2);
    g.strokeStyle='#6b4a26'; g.lineWidth=3;
    g.beginPath(); g.moveTo(wx-38,wy-2); g.lineTo(wx+38,wy-2); g.stroke();
  }
  // 菜單板
  const mx = projX(5.8,0), my = projY(5.8,0)-104;
  g.fillStyle='#2a180a'; rr(g,mx-34,my-30,68,58,6); g.fill();
  g.strokeStyle='#8a5f30'; g.lineWidth=3; rr(g,mx-34,my-30,68,58,6); g.stroke();
  g.fillStyle='#ffd98e'; g.font='bold 13px sans-serif'; g.textAlign='center';
  g.fillText('本日菜單', mx, my-12);
  g.fillStyle='#fff5e6'; g.font='11px sans-serif';
  day.foods.slice(0,3).forEach((f,i)=>g.fillText(FOODS[f].name, mx, my+6+i*13));
  // 吊燈（烘焙光暈）
  for(let i=0;i<3;i++){
    const lx = 240+i*240, ly = 40;
    g.strokeStyle='#1a0e04'; g.lineWidth=3;
    g.beginPath(); g.moveTo(lx,0); g.lineTo(lx,ly); g.stroke();
    const lg = g.createRadialGradient(lx,ly+12,2,lx,ly+12,52);
    lg.addColorStop(0,'rgba(255,214,130,0.5)'); lg.addColorStop(1,'rgba(255,214,130,0)');
    g.fillStyle=lg; g.beginPath(); g.arc(lx,ly+12,52,0,Math.PI*2); g.fill();
    g.fillStyle='#e8a13c';
    g.beginPath(); g.moveTo(lx-14,ly); g.lineTo(lx+14,ly); g.lineTo(lx+8,ly+14); g.lineTo(lx-8,ly+14); g.closePath(); g.fill();
    g.fillStyle='#ffe9b8'; g.beginPath(); g.arc(lx,ly+17,5,0,Math.PI*2); g.fill();
  }
  // 木地板
  for(let gy=0; gy<ROWS; gy++){
    for(let gx=0; gx<COLS; gx++){
      const light = (gx+gy)%2===0;
      diamondPathOn(g,gx,gy);
      g.fillStyle = light ? '#c98a52' : '#b9773f';
      g.fill();
      g.strokeStyle='rgba(60,30,10,.3)'; g.lineWidth=1; g.stroke();
      // 木紋
      g.strokeStyle='rgba(60,30,10,.12)';
      g.beginPath();
      g.moveTo(projX(gx+0.2,gy+0.5),projY(gx+0.2,gy+0.5));
      g.lineTo(projX(gx+0.8,gy+0.5),projY(gx+0.8,gy+0.5));
      g.stroke();
    }
  }
  // 地板前緣陰影
  const eg = g.createLinearGradient(0,projY(COLS,ROWS)-10,0,GAME_H);
  eg.addColorStop(0,'rgba(0,0,0,0)'); eg.addColorStop(1,'rgba(0,0,0,0.5)');
  g.fillStyle=eg; g.fillRect(0,projY(COLS,ROWS)-10,GAME_W,GAME_H);
  /* v6：地板木紋細點質地（烘焙一次，零運行成本） */
  g.save();
  g.beginPath();
  g.moveTo(projX(0,0),projY(0,0)); g.lineTo(projX(COLS,0),projY(COLS,0));
  g.lineTo(projX(COLS,ROWS),projY(COLS,ROWS)); g.lineTo(projX(0,ROWS),projY(0,ROWS));
  g.closePath(); g.clip();
  for(let i=0;i<520;i++){
    const gx = Math.random()*COLS, gy = Math.random()*ROWS;
    g.fillStyle = Math.random()<0.5 ? 'rgba(255,230,190,.05)' : 'rgba(40,18,4,.09)';
    g.fillRect(projX(gx,gy), projY(gx,gy), 2+Math.random()*6, 1.3);
  }
  g.restore();
}

/* ===================== 粒子（swap-pop）與飄字 ===================== */
const parts = [];
function burst(px,py,color,n=14,speed=90){
  for(let i=0;i<n;i++){
    if(parts.length>=260) break;
    const a=Math.random()*Math.PI*2, s=speed*(0.3+Math.random()*0.7);
    parts.push({x:px,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s*0.6-40,life:0.6,color});
  }
}
function updateParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=260*dt; p.life-=dt;
    if(p.life<=0){ parts[i]=parts[parts.length-1]; parts.pop(); }
  }
}
function drawParts(){
  /* v7：粒子改圓形雙層（外層柔光暈＋內層亮核），質感更精緻 */
  for(const p of parts){
    const a = Math.max(0,p.life*1.8);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = a*0.4;
    ctx.beginPath(); ctx.arc(p.x,p.y,5.2,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = a;
    ctx.beginPath(); ctx.arc(p.x,p.y,2.7,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}
const floats = [];
function floatText(px,py,text,color,big){
  if(floats.length>=48) floats.shift();   // 防止極端連續事件造成陣列無上限增長
  floats.push({x:px,y:py,text,color,life:0.9,big:!!big});
}
function updateFloats(dt){
  for(let i=floats.length-1;i>=0;i--){
    const f=floats[i]; f.y-=42*dt; f.life-=dt;
    if(f.life<=0){ floats[i]=floats[floats.length-1]; floats.pop(); }
  }
}
function drawFloats(){
  ctx.textAlign='center';
  for(const f of floats){
    ctx.font = f.big?'bold 24px sans-serif':'bold 19px sans-serif';
    ctx.globalAlpha = Math.max(0,f.life);
    ctx.fillStyle='#2a1206'; ctx.fillText(f.text,f.x+1.5,f.y+1.5);
    ctx.fillStyle=f.color; ctx.fillText(f.text,f.x,f.y);
  }
  ctx.globalAlpha=1;
}

/* ===== v6：漸層快取＋暖色氛圍（漂浮塵埃/送餐光暈/vignette） ===== */
const _gc = new Map();
function cg(key, maker){
  let g = _gc.get(key);
  if(!g){ g = maker(); _gc.set(key, g); }
  return g;
}

function drawMotes(){

}

function makeTable(spot){
  return { gx:spot.gx, gy:spot.gy, order:null, vip:false, patience:0, maxPatience:1,
    servedFlash:0, emptyT:0.5+Math.random()*1.5, catBlink:2+Math.random()*3,

/* ===================== 障礙與移動 ===================== */
function obstacleCells(){
  const list = [];
  for(const s of stations) list.push(s);
  for(const t of tables) list.push(t);
  return list;
}
function moveWithCollision(ent, dx, dy, dt, speed){
  const r = 0.34;
  const obs = obstacleCells();
  let nx = ent.x + dx*speed*dt;
  let blocked = false;
  for(const o of obs){
    if(nx > o.gx-r && nx < o.gx+1+r && ent.y > o.gy-r && ent.y < o.gy+1+r){ blocked=true; break; }
  }
  if(!blocked) ent.x = clamp(nx, -0.4, COLS-0.6);
  let ny = ent.y + dy*speed*dt;
  blocked = false;
  for(const o of obs){
    if(ent.x > o.gx-r && ent.x < o.gx+1+r && ny > o.gy-r && ny < o.gy+1+r){ blocked=true; break; }
  }
  if(!blocked) ent.y = clamp(ny, 0.7, ROWS-0.6);
}

/* ---------- 遊玩 ---------- */
const playState = {
  update(dt){ updatePlay(dt); },
  draw(){ drawPlay(); }
};
function updatePlay(dt){
  const D = DAYS[curLevel];
  hintT += dt;
  timeLeft -= dt;
  if(timeLeft<=0 || hearts<=0){ setState(resultState); return; }
  if(timeLeft<5.4 && timeLeft+dt>=5.4) sfx.tick();
  if(timeLeft<3 && Math.floor(timeLeft*2)!==Math.floor((timeLeft+dt)*2)) sfx.tick();

  // 玩家移動
  if(player.stun>0) player.stun -= dt;
  if(player.moodT>0) player.moodT -= dt;
  player.sx += (1-player.sx)*14*dt;   // 壓扁與伸展：每幀彈回原尺寸
  player.sy += (1-player.sy)*14*dt;
  let dx=0, dy=0;
  if(player.stun<=0){
    if(input.up){ dx-=1; dy-=1; }
    if(input.down){ dx+=1; dy+=1; }
    if(input.left){ dx-=1; dy+=1; }
    if(input.right){ dx+=1; dy-=1; }
    if(stick.active){
      // 螢幕方向 → 等角格子方向
      const sx = stick.dx, sy = stick.dy;
      dx += (sx/(TILE_W/2) + sy/(TILE_H/2))*30;
      dy += (-sx/(TILE_W/2) + sy/(TILE_H/2))*30;
    }
  }
  const len = Math.hypot(dx,dy);
  if(len>0.01){ dx/=len; dy/=len; }
  moveWithCollision(player, dx, dy, dt, 4.6);
  player.bob = Math.sin(performance.now()/140) * (len>0.05?3:1);
  /* v6：奔跑腳下揚塵——移動中週期性揚起小塵埃 */
  player._dustT = (player._dustT||0) - dt;
  if(len > 0.05 && player._dustT <= 0){
    player._dustT = 0.14;
    if(parts.length < 260)
      parts.push({ x:projX(player.x,player.y)-dx*10, y:projY(player.x,player.y)+2,
        vx:-dx*40+(Math.random()*2-1)*14, vy:-18-Math.random()*18, life:0.35, color:'rgba(230,205,170,.55)' });
  }

  if(player.bumpCd>0) player.bumpCd -= dt;

  // 廚房檯：拿餐 / 換餐（只跟最近的檯互動，避免站中間亂換）
  if(player.bumpCd<=0){
    let near = null, nearD = 1.2;
    for(const s of stations){
      const d = Math.hypot(player.x-(s.gx+0.5), player.y-(s.gy+0.5));
      if(d < nearD){ nearD = d; near = s; }
    }
    if(near){
      if(!player.carrying){
        player.carrying = near.food;
        player.sx = 1.16; player.sy = 0.84;   // 拿餐壓扁回饋
        sfx.pickup();
        burst(projX(near.gx+0.5,near.gy+0.5), projY(near.gx+0.5,near.gy+0.5)-30, FOODS[near.food].color, 8, 70);
        floatText(projX(player.x,player.y), projY(player.x,player.y)-80, '拿到'+FOODS[near.food].name+'！', '#8fffb0');
        player.bumpCd = 0.25;
      } else if(player.carrying !== near.food && nearD < 0.95){
        player.carrying = near.food;
        player.sx = 1.1; player.sy = 0.9;
        sfx.swap();
        floatText(projX(player.x,player.y), projY(player.x,player.y)-80, '換成'+FOODS[near.food].name, '#ffd98e');
        player.bumpCd = 0.3;
      }
    }
  }
  // 桌子：送餐
  if(player.carrying){
    for(const t of tables){
      if(!t.order) continue;
      const d = Math.hypot(player.x-(t.gx+0.5), player.y-(t.gy+0.5));
      if(d < 1.2 && player.bumpCd<=0){
        if(t.order === player.carrying){
          comboCount = comboTimer>0 ? comboCount+1 : 1;
          comboTimer = 2.5;
          const perfect = t.patience/t.maxPatience > 0.7;
          let gain = 10 + (comboCount-1)*5 + (perfect?5:0);
          if(t.vip) gain *= 2;
          score += gain;
          servedCount++; if(perfect) perfectCount++;
          const px = projX(t.gx+0.5,t.gy), py = projY(t.gx+0.5,t.gy);
          floatText(px, py-60, '+'+gain+(comboCount>1?' x'+comboCount:''), t.vip?'#ffcf5c':'#8fffb0', t.vip);
          if(perfect){ floatText(px, py-86, '完美！', '#7fd8ff'); sfx.perfect(); }
          burst(px, py-30, t.vip?'#ffcf5c':'#ffe98a', t.vip?24:16, 110);
          t.servedFlash = 0.6;
          player.sx = 0.8; player.sy = 1.26;    // 送餐成功伸展回饋
          player.moodT = 0.7;                   // 送餐成功：表情切換為開心
          sfx.deliver(comboCount);
          player.carrying = null;
          player.bumpCd = 0.25;
          t.order = null; t.emptyT = 0.8 + Math.random()*1.4;
        } else {
          player.sx = 0.92; player.sy = 1.08;
          sfx.deny();
          floatText(projX(t.gx+0.5,t.gy), projY(t.gx+0.5,t.gy)-56, '點的是'+FOODS[t.order].name+'喔', '#ff9d8a');
          player.bumpCd = 0.4;
        }
        break;
      }
    }
  }
  if(comboTimer>0){ comboTimer-=dt; if(comboTimer<=0) comboCount=0; }

  // 桌子耐心
  for(const t of tables){
    if(t.servedFlash>0) t.servedFlash-=dt;
    t.catBlink -= dt;
    if(t.catBlink < -0.1) t.catBlink = 2.5+Math.random()*3;
    if(!t.order){
      t.emptyT -= dt;
      if(t.emptyT<=0 && timeLeft>4) newOrder(t);
      continue;
    }
    t.patience -= dt;
    if(t.patience<=0){
      hearts--;
      shake = 8;
      freeze = hearts<=0 ? 0.12 : 0.06;   // 打擊停頓：失去愛心更有重量（最後一顆更明顯）
      sfx.expire();
      floatText(projX(t.gx+0.5,t.gy), projY(t.gx+0.5,t.gy)-56, '客人生氣走了…', '#ff6b5c');
      burst(projX(t.gx+0.5,t.gy+0.5), projY(t.gx+0.5,t.gy+0.5)-30, '#ff6b5c', 10, 80);
      t.order = null; t.emptyT = 1.2+Math.random()*1.5;
      if(hearts<=0){ setState(resultState); return; }
    }
  }

  // 掃地機器人
  if(robot){
    robot.spinT += dt*4;
    if(robot.alarmT>0) robot.alarmT -= dt;   // 撞擊警戒表情倒數
    let rx = robot.x + Math.cos(robot.a)*robot.spd*dt;
    let ry = robot.y + Math.sin(robot.a)*robot.spd*dt;
    let bounced = false;
    if(rx<0 || rx>COLS-1){ robot.a = Math.PI-robot.a; bounced=true; }
    if(ry<1.1 || ry>ROWS-1){ robot.a = -robot.a; bounced=true; }
    if(!bounced){
      for(const o of obstacleCells()){
        if(rx>o.gx-0.3 && rx<o.gx+1.3 && ry>o.gy-0.3 && ry<o.gy+1.3){
          robot.a += Math.PI + (Math.random()-0.5)*0.8; bounced=true; break;
        }
      }
    }
    if(!bounced){ robot.x=rx; robot.y=ry; }
    // 撞玩家
    const pd = Math.hypot(player.x-robot.x, player.y-robot.y);
    if(pd < 0.62 && player.stun<=0){
      player.stun = 0.5;
      shake = 7;
      freeze = 0.05;                        // 撞擊停頓：讓碰撞更有重量感
      player.sx = 1.32; player.sy = 0.68;   // 被撞壓扁回饋
      robot.alarmT = 0.6;                   // 機器人切換警戒表情
      sfx.bump();
      const bx = projX(player.x,player.y), by = projY(player.x,player.y);
      if(player.carrying){
        burst(bx, by-40, FOODS[player.carrying].color, 14, 100);
        floatText(bx, by-80, '餐點打翻了！', '#ff9d8a');
        player.carrying = null;
      } else {
        // 空手被撞也要有粒子＋飄字，不能只靠畫面震動（否則玩家會以為是bug）
        burst(bx, by-30, '#cfd8e0', 10, 90);
        floatText(bx, by-70, '被機器人撞到了！', '#cfd8e0');
      }
      robot.a += Math.PI;
    }
  }

  shake *= Math.pow(0.001, dt);
  updateParts(dt); updateFloats(dt);
}

/* ---------- 結算 ---------- */
const BTN_RETRY = { x:GAME_W/2-280, y:406, w:170, h:56 };
const BTN_NEXT  = { x:GAME_W/2-85,  y:406, w:170, h:56 };

const resultState = {
  enter(){
    this.t = 0;
    const D = DAYS[curLevel];
    this.earned = D.targets.filter(t=>score>=t).length;
    this.newRecord = score > bestTotal;
    if(this.newRecord){ bestTotal = score; localStorage.setItem('catrest2_best', String(bestTotal)); }
    if(this.earned > stars[curLevel]){ stars[curLevel] = this.earned; saveStars(); }
    this.starPlayed = 0;
    if(this.earned>0) sfx.win(); else sfx.lose();
  },
  update(dt){
    this.t += dt;
    const should = Math.min(this.earned, Math.floor((this.t-0.4)/0.45)+0);
    while(this.starPlayed < should){ this.starPlayed++; sfx.star(this.starPlayed); burst(GAME_W/2-70+ (this.starPlayed-1)*70, 232, '#ffcf5c', 14, 120); }
    updateParts(dt); updateFloats(dt);
    shake *= Math.pow(0.001, dt);
  },
  draw(){
    drawPlay();
    ctx.fillStyle='rgba(20,8,4,0.75)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    const D = DAYS[curLevel];
    ctx.textAlign='center';
    ctx.font='bold 40px sans-serif';
    const good = this.earned>0;
    ctx.fillStyle='#2a1206'; ctx.fillText(good?'打烊！辛苦了！':'再試一次就會更棒！', GAME_W/2+2, 122);
    ctx.fillStyle= good?'#ffcf5c':'#ff9d8a'; ctx.fillText(good?'打烊！辛苦了！':'再試一次就會更棒！', GAME_W/2, 120);
    ctx.font='17px sans-serif'; ctx.fillStyle='#fff5e6';
    ctx.fillText(D.name, GAME_W/2, 152);
    // 星星
    for(let s=0;s<3;s++){
      const on = s < this.starPlayed;
      const pop = on ? 1+Math.max(0,0.5-(this.t-0.4-s*0.45))*0.8 : 1;
      drawStarBig(GAME_W/2-70+s*70, 232, 26*pop, on?'#ffcf5c':'rgba(255,255,255,0.15)');
    }
    ctx.font='bold 26px sans-serif'; ctx.fillStyle='#fff';
    ctx.fillText('分數 '+score+(this.newRecord?'　新紀錄！':''), GAME_W/2, 300);
    ctx.font='15px sans-serif'; ctx.fillStyle='#ffd98e';
    ctx.fillText('星星門檻：'+D.targets.join(' / ')+'　　送出 '+servedCount+' 份餐・完美 '+perfectCount+' 次', GAME_W/2, 330);
    if(this.earned>=1 && curLevel<DAYS.length-1){
      ctx.font='bold 16px sans-serif'; ctx.fillStyle='#8fffb0';
      ctx.fillText('已解鎖 '+DAYS[curLevel+1].name+'！', GAME_W/2, 362);
    }
    const on = this.t>0.6;
    drawResBtn(BTN_RETRY,'再玩一次','#7fd8ff',on);
    const canNext = curLevel<DAYS.length-1 && unlockedDay(curLevel+1);
    drawResBtn(BTN_NEXT,'下一天','#8fffb0',on&&canNext);
    drawResBtn(BTN_SEL,'選關','#ffcf5c',on);
    drawMuteBtn();
  }
};
function drawStarBig(cx,cy,r,color){
  ctx.save();
  /* v7：點亮的星星帶金色輝光 */
  if(color==='#ffcf5c'){ ctx.shadowColor='rgba(255,207,92,.9)'; ctx.shadowBlur=18; }
  drawStarPath(cx,cy,r);
  ctx.fillStyle=color; ctx.fill();
  ctx.shadowBlur=0;
  drawStarPath(cx,cy,r);
  ctx.strokeStyle='rgba(42,18,6,0.7)'; ctx.lineWidth=2; ctx.stroke();
  ctx.restore();
}
function drawStarPath(cx,cy,r){
  ctx.beginPath();
  for(let i=0;i<10;i++){
    const a=-Math.PI/2 + i*Math.PI/5, rad=i%2===0?r:r*0.45;
    ctx.lineTo(cx+Math.cos(a)*rad, cy+Math.sin(a)*rad);
  }
  ctx.closePath();
}
function drawResBtn(b,label,color,on){
  /* v7：結算按鈕同步立體質感（落影＋漸層＋內緣高光） */
  if(on){
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,.45)'; ctx.shadowBlur=12; ctx.shadowOffsetY=4;
    ctx.fillStyle='rgba(48,26,11,0.9)';
    rr(ctx,b.x,b.y,b.w,b.h,14); ctx.fill();
    ctx.restore();
    const bgr = ctx.createLinearGradient(0,b.y,0,b.y+b.h);
    bgr.addColorStop(0,'rgba(255,255,255,0.16)'); bgr.addColorStop(1,'rgba(255,255,255,0.03)');
    ctx.fillStyle=bgr; rr(ctx,b.x,b.y,b.w,b.h,14); ctx.fill();
  } else {
    ctx.fillStyle='rgba(255,255,255,0.04)';
    rr(ctx,b.x,b.y,b.w,b.h,14); ctx.fill();
  }
  ctx.strokeStyle = on?color:'rgba(255,255,255,0.15)'; ctx.lineWidth=2.5;
  rr(ctx,b.x,b.y,b.w,b.h,14); ctx.stroke();
  if(on){
    ctx.strokeStyle='rgba(255,255,255,.22)'; ctx.lineWidth=1;
    rr(ctx,b.x+3,b.y+3,b.w-6,b.h-6,10); ctx.stroke();
  }
  ctx.font='bold 20px sans-serif'; ctx.textAlign='center';
  if(on){ ctx.fillStyle='rgba(30,14,4,.8)'; ctx.fillText(label, b.x+b.w/2+1.2, b.y+b.h/2+8.2); }
  ctx.fillStyle = on?'#fff':'rgba(255,255,255,0.35)';
  ctx.fillText(label, b.x+b.w/2, b.y+b.h/2+7);
}

/* ===================== 繪圖 ===================== */
function drawBox(gx,gy,topColor,leftColor,rightColor,H){
  const p00x=projX(gx,gy), p00y=projY(gx,gy);
  const p10x=projX(gx+1,gy), p10y=projY(gx+1,gy);
  const p11x=projX(gx+1,gy+1), p11y=projY(gx+1,gy+1);
  const p01x=projX(gx,gy+1), p01y=projY(gx,gy+1);
  ctx.beginPath();
  ctx.moveTo(p10x,p10y); ctx.lineTo(p11x,p11y); ctx.lineTo(p11x,p11y-H); ctx.lineTo(p10x,p10y-H);
  ctx.closePath(); ctx.fillStyle=rightColor; ctx.fill();
  ctx.beginPath();
  ctx.moveTo(p01x,p01y); ctx.lineTo(p11x,p11y); ctx.lineTo(p11x,p11y-H); ctx.lineTo(p01x,p01y-H);
  ctx.closePath(); ctx.fillStyle=leftColor; ctx.fill();
  ctx.beginPath();
  ctx.moveTo(p00x,p00y-H); ctx.lineTo(p10x,p10y-H); ctx.lineTo(p11x,p11y-H); ctx.lineTo(p01x,p01y-H);
  ctx.closePath(); ctx.fillStyle=topColor; ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.2)'; ctx.lineWidth=1; ctx.stroke();
}

// 貓咪 sprite 離屏快取：身體/頭/耳/前掌/漸層陰影/高光/腮紅 一次烘焙，逐幀只 drawImage（避免複雜路徑每幀重算）
const CAT_SPRITE_CACHE = new Map();
function getCatSprite(bodyColor, earColor, apron, scaleX){
  const key = bodyColor+'|'+earColor+'|'+(apron?1:0)+'|'+scaleX.toFixed(2);
  let spr = CAT_SPRITE_CACHE.get(key);
  if(spr) return spr;
  const W=76, H=90, ox=38, oy=70;
  const cv = document.createElement('canvas'); cv.width=W; cv.height=H;
  const g = cv.getContext('2d');
  g.translate(ox, oy);
  // 前掌（四肢：從身體下緣露出兩枚，帶掌肉高光）
  const pawGrad = g.createLinearGradient(0,-4,0,6);
  pawGrad.addColorStop(0, shade(bodyColor,0.1)); pawGrad.addColorStop(1, shade(bodyColor,-0.18));
  g.fillStyle = pawGrad;
  g.beginPath(); g.ellipse(-7*scaleX,3,5*scaleX,4.6,0,0,Math.PI*2); g.fill();
  g.beginPath(); g.ellipse(7*scaleX,3,5*scaleX,4.6,0,0,Math.PI*2); g.fill();
  g.strokeStyle=shade(bodyColor,-0.4); g.lineWidth=1;
  g.beginPath(); g.ellipse(-7*scaleX,3,5*scaleX,4.6,0,0,Math.PI*2); g.stroke();
  g.beginPath(); g.ellipse(7*scaleX,3,5*scaleX,4.6,0,0,Math.PI*2); g.stroke();
  g.fillStyle='rgba(255,255,255,.32)';
  g.beginPath(); g.ellipse(-7*scaleX,3.6,2,1.5,0,0,Math.PI*2); g.fill();
  g.beginPath(); g.ellipse(7*scaleX,3.6,2,1.5,0,0,Math.PI*2); g.fill();
  // 身體（漸層陰影：左上受光／右下背光）
  const bodyGrad = g.createRadialGradient(-6*scaleX,-27,3,0,-16,28*scaleX);
  bodyGrad.addColorStop(0, shade(bodyColor,0.38));
  bodyGrad.addColorStop(0.55, bodyColor);
  bodyGrad.addColorStop(1, shade(bodyColor,-0.3));
  g.fillStyle=bodyGrad;
  g.beginPath(); g.ellipse(0,-18,16*scaleX,20,0,0,Math.PI*2); g.fill();
  g.strokeStyle=shade(bodyColor,-0.55); g.lineWidth=1.5; g.stroke();
  // 圍裙 or 腹部亮面
  if(apron){
    g.fillStyle='#e05a4e';
    g.beginPath(); g.ellipse(0,-11,10*scaleX,11,0,0,Math.PI*2); g.fill();
    g.strokeStyle='#a83a30'; g.lineWidth=1.5; g.stroke();
    g.fillStyle='#fff';
    g.beginPath(); g.ellipse(0,-10,6*scaleX,7,0,0,Math.PI*2); g.fill();
  } else {
    const bellyGrad = g.createLinearGradient(0,-22,0,-2);
    bellyGrad.addColorStop(0,'rgba(255,255,255,.5)'); bellyGrad.addColorStop(1,'rgba(255,255,255,.22)');
    g.fillStyle=bellyGrad;
    g.beginPath(); g.ellipse(0,-12,9*scaleX,10,0,0,Math.PI*2); g.fill();
  }
  // 頭（漸層陰影）
  const headGrad = g.createRadialGradient(-5,-46,2,0,-40,17);
  headGrad.addColorStop(0, shade(bodyColor,0.42));
  headGrad.addColorStop(0.6, bodyColor);
  headGrad.addColorStop(1, shade(bodyColor,-0.26));
  g.fillStyle=headGrad;
  g.beginPath(); g.arc(0,-40,15,0,Math.PI*2); g.fill();
  g.strokeStyle=shade(bodyColor,-0.55); g.lineWidth=1.5; g.stroke();
  // 耳朵
  g.fillStyle=earColor;
  g.beginPath(); g.moveTo(-13,-48); g.lineTo(-18,-60); g.lineTo(-5,-52); g.closePath(); g.fill();
  g.beginPath(); g.moveTo(13,-48); g.lineTo(18,-60); g.lineTo(5,-52); g.closePath(); g.fill();
  g.fillStyle='#ff9db8';
  g.beginPath(); g.moveTo(-12,-49); g.lineTo(-15,-56); g.lineTo(-8,-51); g.closePath(); g.fill();
  g.beginPath(); g.moveTo(12,-49); g.lineTo(15,-56); g.lineTo(8,-51); g.closePath(); g.fill();
  // 高光點（頭頂反光）
  g.fillStyle='rgba(255,255,255,.55)';
  g.beginPath(); g.ellipse(-6,-48,3.4,2.2,-0.5,0,Math.PI*2); g.fill();
  // 腮紅
  g.fillStyle='rgba(255,150,170,.42)';
  g.beginPath(); g.ellipse(-9.5,-33,3.2,2.2,0,0,Math.PI*2); g.fill();
  g.beginPath(); g.ellipse(9.5,-33,3.2,2.2,0,0,Math.PI*2); g.fill();
  spr = { canvas:cv, ox, oy };
  CAT_SPRITE_CACHE.set(key, spr);
  return spr;
}

function drawCat(sx, sy, bodyColor, earColor, blink, holding, bob, scaleX, apron, squashX, squashY, mood){
  squashX = squashX===undefined ? 1 : squashX;
  squashY = squashY===undefined ? 1 : squashY;
  mood = mood || 'normal';
  ctx.save();
  ctx.translate(sx, sy);
  ctx.globalAlpha=0.35; ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(0,2,20,8,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  ctx.save();
  ctx.scale(squashX, squashY);   // 壓扁與伸展：以腳底陰影為錨點縮放
  ctx.translate(0, bob);
  // 身體＋頭＋耳＋前掌：離屏 sprite 快取（漸層陰影／高光／腮紅已烘焙好）
  const spr = getCatSprite(bodyColor, earColor, apron, scaleX);
  ctx.drawImage(spr.canvas, -spr.ox, -spr.oy);
  // 尾巴（動態擺動，畫在 sprite 之上）
  ctx.strokeStyle=bodyColor; ctx.lineWidth=6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(12*scaleX,-14);
  ctx.quadraticCurveTo(24*scaleX,-20+Math.sin(performance.now()/220+sx)*3,20*scaleX,-32); ctx.stroke();
  // 眼睛（眨眼兩態）
  if(blink < 0.08){
    ctx.strokeStyle='#22160f'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-8,-40); ctx.lineTo(-3,-40); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(3,-40); ctx.lineTo(8,-40); ctx.stroke();
  } else {
    ctx.fillStyle='#22160f';
    ctx.beginPath(); ctx.arc(-5,-40,2.6,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5,-40,2.6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(-4.2,-41,0.9,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5.8,-41,0.9,0,Math.PI*2); ctx.fill();
  }
  // 鼻子
  ctx.fillStyle='#e8768f';
  ctx.beginPath(); ctx.moveTo(-2,-34); ctx.lineTo(2,-34); ctx.lineTo(0,-32); ctx.closePath(); ctx.fill();
  // 嘴巴（表情兩態以上：平常 W 型／開心咧嘴／生氣皺眉）
  ctx.strokeStyle='#22160f'; ctx.lineWidth=1.2;
  if(mood==='happy'){
    ctx.beginPath(); ctx.arc(0,-30.5,4.4,0.06*Math.PI,0.94*Math.PI); ctx.stroke();
    ctx.fillStyle='#ff8fa8';
    ctx.beginPath(); ctx.ellipse(0,-28,2.1,1.5,0,0,Math.PI*2); ctx.fill();
  } else if(mood==='upset'){
    ctx.beginPath(); ctx.arc(-2.5,-27.3,2.5,1.1*Math.PI,1.9*Math.PI); ctx.stroke();
    ctx.beginPath(); ctx.arc(2.5,-27.3,2.5,1.1*Math.PI,1.9*Math.PI); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.arc(-2.5,-30.5,2.5,0.1*Math.PI,0.9*Math.PI); ctx.stroke();
    ctx.beginPath(); ctx.arc(2.5,-30.5,2.5,0.1*Math.PI,0.9*Math.PI); ctx.stroke();
  }
  // 鬍鬚
  ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-14,-35); ctx.lineTo(-24,-36); ctx.moveTo(-14,-32); ctx.lineTo(-24,-30); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(14,-35); ctx.lineTo(24,-36); ctx.moveTo(14,-32); ctx.lineTo(24,-30); ctx.stroke();
  ctx.restore();   // 結束 squash 縮放與 bob 位移
  ctx.restore();
  // 端著的餐
  if(holding){
    ctx.save();
    ctx.translate(sx, sy-72+bob+Math.sin(performance.now()/220)*2);
    ctx.fillStyle='rgba(0,0,0,.25)';
    ctx.beginPath(); ctx.ellipse(0,12,17,6,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#f5ecd9';
    ctx.beginPath(); ctx.ellipse(0,10,16,5.5,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#c9b896'; ctx.lineWidth=1.5; ctx.stroke();
    drawFoodIcon(holding, 0, -4, 32);
    ctx.restore();
  }
}

function drawCustomerCat(t, sx, sy){
  const fur = CAT_FURS[t.furIdx];
  const pct = t.order ? t.patience/t.maxPatience : 1;
  const angry = t.order && pct<=0.25;
  const worried = t.order && pct<=0.5 && !angry;
  const bob = Math.sin(performance.now()/260+t.gy+t.gx)*1.5 + (angry?Math.sin(performance.now()/60)*1.4:0);
  const bodyC = t.vip ? '#ffd76b' : fur;
  const mood = t.servedFlash>0.25 ? 'happy' : (angry ? 'upset' : 'normal');
  drawCat(sx, sy, bodyC, bodyC, t.catBlink, null, bob, 0.85, false, undefined, undefined, mood);
  ctx.save();
  ctx.translate(sx, sy);
  if(t.vip){
    // 皇冠
    ctx.fillStyle='#ffcf5c';
    ctx.beginPath();
    ctx.moveTo(-9,-56+bob); ctx.lineTo(-9,-66+bob); ctx.lineTo(-4,-59+bob); ctx.lineTo(0,-68+bob);
    ctx.lineTo(4,-59+bob); ctx.lineTo(9,-66+bob); ctx.lineTo(9,-56+bob); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#b8860b'; ctx.lineWidth=1.5; ctx.stroke();
  }
  if(angry){
    // 生氣紅筋＋蒸氣
    ctx.strokeStyle='#ff5c4a'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(16,-56+bob); ctx.lineTo(21,-61+bob); ctx.moveTo(21,-56+bob); ctx.lineTo(16,-61+bob); ctx.stroke();
  } else if(worried){
    // 汗滴
    ctx.fillStyle='#7fd8ff';
    ctx.beginPath();
    ctx.moveTo(17,-52+bob); ctx.quadraticCurveTo(21,-46+bob,17,-43+bob);
    ctx.quadraticCurveTo(13,-46+bob,17,-52+bob); ctx.fill();
  }
  ctx.restore();
}

function drawOrderBubble(t, sx, sy){
  if(!t.order) return;
  const pct = Math.max(0, t.patience/t.maxPatience);
  ctx.save();
  ctx.translate(sx, sy-84);
  ctx.fillStyle = t.servedFlash>0 ? '#ffe98a' : (t.vip ? '#fff3cf' : '#fff');
  ctx.strokeStyle = t.vip ? '#d9a520' : '#3a2214'; ctx.lineWidth=2;
  /* v7：泡泡柔和落影，浮空感更好 */
  ctx.save();
  ctx.shadowColor='rgba(20,8,2,.4)'; ctx.shadowBlur=7; ctx.shadowOffsetY=3;
  rr(ctx,-22,-22,44,34,9); ctx.fill();
  ctx.restore();
  rr(ctx,-22,-22,44,34,9); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-4,12); ctx.lineTo(4,12); ctx.lineTo(0,20); ctx.closePath();
  ctx.fillStyle = t.servedFlash>0 ? '#ffe98a' : (t.vip ? '#fff3cf' : '#fff'); ctx.fill(); ctx.stroke();
  drawFoodIcon(t.order, 0, -5, 30);

  ctx.fillStyle='rgba(0,0,0,.35)'; rr(ctx,-22,-34,44,6,3); ctx.fill();

  ctx.fillStyle=barColor; if(pct>0){ rr(ctx,-22,-34,44*pct,6,3); ctx.fill(); }

}

function drawRobot(sx, sy){
  const alarmed = robot.alarmT > 0;
  const idleBob = Math.sin(performance.now()/260)*1.3;
  ctx.save();
  ctx.translate(sx, sy+idleBob);
  ctx.globalAlpha=0.35; ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(0,2-idleBob,22,8,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  // 圓盤機身（漸層：上方受光／邊緣背光，模擬金屬感）——v6：局部座標固定 → 快取
  const bodyGrad = cg('robotBody', () => {
    const gr = ctx.createRadialGradient(-7,-15,3,0,-8,27);
    gr.addColorStop(0,'#93a7b6'); gr.addColorStop(0.6,'#5a6b7a'); gr.addColorStop(1,'#333d45');
    return gr;
  });
  ctx.fillStyle = alarmed ? shade('#5a6b7a',-0.1) : bodyGrad;
  ctx.beginPath(); ctx.ellipse(0,-8,22,12,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#232b32'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle = cg('robotTop', () => {
    const gr = ctx.createRadialGradient(-5,-16,2,0,-12,19);
    gr.addColorStop(0,'#b2c4d1'); gr.addColorStop(1,'#6c7f8d');
    return gr;
  });
  ctx.beginPath(); ctx.ellipse(0,-12,18,9,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.ellipse(0,-12,18,9,Math.PI,0,Math.PI); ctx.stroke();  // 上緣高光弧（環境光遮蔽對比）
  // 旋轉刷
  const a = robot.spinT;
  ctx.strokeStyle='#cfd8e0'; ctx.lineWidth=2;
  for(let i=0;i<3;i++){
    const aa = a + i*Math.PI*2/3;
    ctx.beginPath(); ctx.moveTo(0,-12);
    ctx.lineTo(Math.cos(aa)*14, -12+Math.sin(aa)*7); ctx.stroke();
  }
  // 臉部小螢幕（兩態：正常掃描／撞擊警戒）
  ctx.fillStyle = alarmed ? '#2a0a06' : '#0c1b22';
  rr(ctx,-11,-19,22,11,3); ctx.fill();
  ctx.strokeStyle = alarmed ? '#ff5c4a' : '#4fd8ff'; ctx.lineWidth=1.2; rr(ctx,-11,-19,22,11,3); ctx.stroke();
  if(alarmed){
    ctx.strokeStyle='#ff5c4a'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-6,-16); ctx.lineTo(-2,-12); ctx.moveTo(-2,-16); ctx.lineTo(-6,-12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(2,-16); ctx.lineTo(6,-12); ctx.moveTo(6,-16); ctx.lineTo(2,-12); ctx.stroke();
  } else {
    ctx.fillStyle='#4fd8ff';
    ctx.beginPath(); ctx.arc(-4,-14,1.8,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4,-14,1.8,0,Math.PI*2); ctx.fill();
  }
  // 指示燈
  ctx.fillStyle = alarmed ? '#ff5c4a' : (Math.sin(performance.now()/150)>0 ? '#ff5c4a' : '#ffcf5c');
  ctx.beginPath(); ctx.arc(0,-24,3,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(0,-24,3,0,Math.PI*2); ctx.stroke();
  ctx.restore();
}

function drawPlay(){
  ctx.save();
  ctx.translate((Math.random()*2-1)*shake, (Math.random()*2-1)*shake);
  ctx.drawImage(sceneCv,0,0);

  // 深度排序繪製
  const drawables = [];
  for(const s of stations){
    drawables.push({ depth:s.gx+s.gy-0.4, draw:()=>{
      const F = FOODS[s.food];
      drawBox(s.gx,s.gy,F.color,F.dark,shade(F.dark,-0.18),46);
      const cx = projX(s.gx+0.5,s.gy+0.5), cy = projY(s.gx+0.5,s.gy+0.5)-46;
      // 廚師貓
      drawCat(cx, cy+16, '#eae2d6', '#d8c9b3', 2, null, Math.sin(performance.now()/300+s.gx)*2, 0.9, false, undefined, undefined, 'happy');
      // 廚師帽
      ctx.fillStyle='#fff';
      rr(ctx,cx-9,cy-52+Math.sin(performance.now()/300+s.gx)*2,18,9,3); ctx.fill();
      ctx.beginPath(); ctx.arc(cx,cy-52+Math.sin(performance.now()/300+s.gx)*2,9,Math.PI,0); ctx.fill();
      // 檯上料理
      drawFoodIcon(s.food, cx, cy-14, 34);
      // 蒸氣
      const st = (performance.now()/600+s.gx)%1;
      ctx.globalAlpha = 0.35*(1-st);
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(cx+6*Math.sin(st*6), cy-30-st*20, 4+st*3, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }});
  }
  for(const t of tables){
    const cx = projX(t.gx+0.5,t.gy+0.5), cy = projY(t.gx+0.5,t.gy+0.5);
    drawables.push({ depth:t.gx+t.gy, draw:()=>{
      // 桌子（點單中亮桌巾）
      drawBox(t.gx,t.gy, t.order?'#e8c088':'#caa06c', '#8a6640','#7a5734', 22);
      if(t.order){
        ctx.fillStyle='rgba(255,231,138,0.25)';
        diamondPathOn(ctx,t.gx,t.gy); ctx.fill();
      }
      /* v6：送餐成功桌面金色光暈（加法 bloom，隨 servedFlash 淡出） */
      if(t.servedFlash > 0){
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = Math.min(1, t.servedFlash/0.6);
        const gs = 100 + (0.6-t.servedFlash)*90;
        ctx.drawImage(tableGlowC, cx-gs/2, cy-38-gs/2, gs, gs);
        ctx.restore();
        ctx.globalAlpha = 1;
      }
      drawCustomerCat(t, cx, cy-24);
      drawOrderBubble(t, cx, cy-24);
    }});
  }
  drawables.push({ depth:player.x+player.y, draw:()=>{
    const px = projX(player.x,player.y), py = projY(player.x,player.y);
    const mood = player.stun>0 ? 'upset' : (player.moodT>0 ? 'happy' : 'normal');
    if(player.stun>0){
      ctx.save(); ctx.translate(px,py); ctx.rotate(Math.sin(performance.now()/50)*0.12); ctx.translate(-px,-py);
      drawCat(px, py, '#fff3d6', '#ffcf5c', 2, player.carrying, player.bob, 1, true, player.sx, player.sy, mood);
      ctx.restore();
    } else {
      drawCat(px, py, '#fff3d6', '#ffcf5c', 2, player.carrying, player.bob, 1, true, player.sx, player.sy, mood);
    }
  }});
  if(robot){
    drawables.push({ depth:robot.x+robot.y, draw:()=>drawRobot(projX(robot.x,robot.y), projY(robot.x,robot.y)) });
  }
  drawables.sort((a,b)=>a.depth-b.depth);
  for(const d of drawables) d.draw();

  drawMotes();   /* v6：暖色漂浮塵埃 */
  drawParts(); drawFloats();
  ctx.restore();

  if(state===playState) drawPlayHUD();
}

/* v7：HUD 玻璃面板——上亮下暗漸層＋金色髮絲描邊＋柔和落影 */
function hudPanel(x,y,w,h,strokeCol){
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,.35)'; ctx.shadowBlur=8; ctx.shadowOffsetY=3;
  const pg = ctx.createLinearGradient(0,y,0,y+h);
  pg.addColorStop(0,'rgba(40,20,9,0.82)'); pg.addColorStop(1,'rgba(16,7,3,0.78)');
  ctx.fillStyle = pg; rr(ctx,x,y,w,h,12); ctx.fill();
  ctx.restore();
  ctx.strokeStyle = strokeCol; ctx.lineWidth=1.5; rr(ctx,x,y,w,h,12); ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.lineWidth=1;
  rr(ctx,x+2,y+2,w-4,h-4,10); ctx.stroke();
}
function drawPlayHUD(){
  const D = DAYS[curLevel];
  // 分數（左上）
  hudPanel(12,10,180,58,'rgba(255,207,92,0.5)');
  ctx.textAlign='left';
  ctx.font='bold 22px sans-serif'; ctx.fillStyle='#ffcf5c';
  ctx.fillText('分數 '+score, 24, 36);
  // 星星門檻進度
  const next = D.targets.find(t=>score<t);
  ctx.font='12px sans-serif'; ctx.fillStyle='#ffd98e';
  ctx.fillText(next? ('下一顆星 '+next) : '三星達成！', 24, 56);
  const got = D.targets.filter(t=>score>=t).length;
  for(let s=0;s<3;s++) drawStar(140+s*17, 52, 7, s<got?'#ffcf5c':'rgba(255,255,255,0.2)');

  // 時間（中上）——v7：剩 10 秒紅框脈動提醒
  hudPanel(GAME_W/2-105,10,210,40, timeLeft<10 ? 'rgba(255,107,92,'+(0.6+0.4*Math.sin(performance.now()/140))+')' : 'rgba(255,255,255,0.3)');
  ctx.textAlign='center'; ctx.font='bold 18px sans-serif';
  ctx.fillStyle = timeLeft<10 ? '#ff8b7c' : '#fff';
  ctx.fillText(D.name+'　'+Math.ceil(timeLeft)+'s', GAME_W/2, 36);

  // 愛心（右上，靜音鈕左邊）
  for(let i=0;i<3;i++){
    const hx = GAME_W-176+i*36, hy = 30;
    ctx.fillStyle = i<hearts ? '#ff6b8f' : 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.moveTo(hx,hy+9);
    ctx.bezierCurveTo(hx-12,hy-2,hx-8,hy-12,hx,hy-5);
    ctx.bezierCurveTo(hx+8,hy-12,hx+12,hy-2,hx,hy+9);
    ctx.fill();
    if(i<hearts){
      /* v7：愛心描邊＋左上高光點，更立體 */
      ctx.strokeStyle='rgba(120,20,50,.5)'; ctx.lineWidth=1.5; ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,.55)';
      ctx.beginPath(); ctx.ellipse(hx-4,hy-5,2.4,1.8,-0.6,0,Math.PI*2); ctx.fill();
    }
  }
  if(comboCount>1){
    ctx.textAlign='center'; ctx.fillStyle='#8fffb0'; ctx.font='bold 22px sans-serif';
    ctx.fillText('連續出餐 x'+comboCount+'！', GAME_W/2, 82);
  }
  // 搖桿
  if(stick.active){
    ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(stick.cx,stick.cy,60,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.35)';
    ctx.beginPath(); ctx.arc(stick.cx+stick.dx*60, stick.cy+stick.dy*60, 27, 0, Math.PI*2); ctx.fill();
  }
  drawMuteBtn();

  // 開場提示浮層
  if(hintT<5 && curLevel===0){
    const a = hintT<4 ? 1 : (5-hintT);
    ctx.globalAlpha = a*(0.8+0.2*Math.sin(performance.now()/220));
    ctx.fillStyle='rgba(20,8,4,0.72)';
    rr(ctx, GAME_W/2-260, GAME_H-96, 520, 58, 14); ctx.fill();
    ctx.strokeStyle='#ffcf5c'; ctx.lineWidth=2; rr(ctx, GAME_W/2-260, GAME_H-96, 520, 58, 14); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='bold 17px sans-serif'; ctx.textAlign='center';
    ctx.fillText('走到上方廚房檯自動拿餐 → 送到有泡泡的桌子！', GAME_W/2, GAME_H-72);
    ctx.font='14px sans-serif'; ctx.fillStyle='#ffd98e';
    ctx.fillText('拖曳螢幕或按 WASD／方向鍵 移動', GAME_W/2, GAME_H-50);
    ctx.globalAlpha = 1;
  }
}
function drawMuteBtn(){
  ctx.save();
  ctx.fillStyle='rgba(20,8,4,0.75)';
  rr(ctx,MUTE_BTN.x,MUTE_BTN.y,MUTE_BTN.w,MUTE_BTN.h,12); ctx.fill();
  ctx.strokeStyle = muted?'rgba(255,255,255,0.3)':'#ffcf5c'; ctx.lineWidth=2;
  rr(ctx,MUTE_BTN.x,MUTE_BTN.y,MUTE_BTN.w,MUTE_BTN.h,12); ctx.stroke();
  const cx=MUTE_BTN.x+24, cy=MUTE_BTN.y+24;
  ctx.fillStyle = muted?'#888':'#fff';
  ctx.beginPath();
  ctx.moveTo(cx-10,cy-4); ctx.lineTo(cx-4,cy-4); ctx.lineTo(cx+3,cy-11);
  ctx.lineTo(cx+3,cy+11); ctx.lineTo(cx-4,cy+4); ctx.lineTo(cx-10,cy+4); ctx.closePath(); ctx.fill();
  if(muted){
    ctx.strokeStyle='#ff5555'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(cx+6,cy-6); ctx.lineTo(cx+14,cy+6); ctx.moveTo(cx+14,cy-6); ctx.lineTo(cx+6,cy+6); ctx.stroke();
  } else {
    ctx.strokeStyle='#ffcf5c'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(cx+5,cy,6,-0.8,0.8); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx+5,cy,10,-0.7,0.7); ctx.stroke();
  }
  ctx.restore();
}

/* ===================== 點擊處理 ===================== */
function onTap(x,y){
  if(pointInRect(x,y,MUTE_BTN)){ toggleMute(); return; }
  if(state===menuState){
    if(pointInRect(x,y,BTN_OPEN)) setState(selectState);
    return;
  }
  if(state===selectState){
    for(let i=0;i<DAY_CARDS.length;i++){
      if(pointInRect(x,y,DAY_CARDS[i])){
        if(unlockedDay(i)){ selCursor=i; startLevel(i); }
        else { sfx.deny(); floatText(DAY_CARDS[i].x+75, DAY_CARDS[i].y-10, '先在前一天拿 1 星！', '#ff9d8a'); }
        return;
      }
    }
    if(pointInRect(x,y,BTN_BACK_SEL)) setState(menuState);
    return;
  }
  if(state===resultState){
    if(resultState.t<=0.6) return;
    if(pointInRect(x,y,BTN_RETRY)){ startLevel(curLevel); return; }
    if(pointInRect(x,y,BTN_NEXT)){
      if(curLevel<DAYS.length-1 && unlockedDay(curLevel+1)) startLevel(curLevel+1);
      else sfx.deny();
      return;
    }
    if(pointInRect(x,y,BTN_SEL)){ setState(selectState); return; }
    return;
  }
}

/* ===================== 主迴圈（固定時間步進＋打擊停頓＋淡入轉場） ===================== */
const STEP = 1/60;
let last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  const realDt = Math.min((now-last)/1000, 0.1);
  last = now;
  if(freeze > 0){
    // 打擊停頓：用「真實經過時間」扣血，讓凍結感跨越好幾個畫面，而不是在單一幀內瞬間吃完
    freeze -= realDt;
  } else {
    acc += realDt;
    while(acc >= STEP){
      state.update(STEP);
      updateMotes(STEP);
      acc -= STEP;
    }
  }
  state.draw();
  ctx.drawImage(vignetteC, 0, 0, GAME_W, GAME_H);   /* v6：暖色暗角 */
  // 畫面狀態切換淡入（避免標題／選關／遊玩／結算之間的硬切）
  const te = (now - transitionStart) / 1000;
  if(te < 0.22){
    ctx.save();
    /* v7：轉場淡入改緩出曲線（ease-out），起始更沉、收尾更柔 */
    ctx.globalAlpha = Math.pow(Math.max(0, 1 - te/0.22), 1.6);
    ctx.fillStyle = '#0c0602';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    ctx.restore();
  }
}
/* ===================== 大螢幕提醒浮層（手機才顯示，一個 session 一次） ===================== */
function initBigScreenHint(){
  const el = document.getElementById('bigScreenHint');
  if(!el) return;
  const isPhone = Math.min(screen.width,screen.height) < 600 || innerWidth < 768;
  let seen = false;
  try{ seen = !!sessionStorage.getItem('bigscreen-hint'); }catch(e){}
  if(!isPhone || seen) return;
  el.classList.remove('hidden');
  const dismiss = ()=>{
    try{ sessionStorage.setItem('bigscreen-hint','1'); }catch(e){}
    el.classList.add('fade');
    setTimeout(()=>{ el.classList.add('hidden'); el.remove(); }, 280);
  };
  document.getElementById('bshBtn').addEventListener('click', dismiss, { once:true });
}
initBigScreenHint();   // 浮層純 DOM 覆蓋，不影響下方遊戲照常初始化

setState(menuState);
requestAnimationFrame(frame);

/* 測試掛鉤 */
window.__dbg = () => ({
  state: state===menuState?'menu':state===selectState?'select':state===playState?'play':'result',
  score, hearts, level: curLevel, timeLeft: timeLeft||0,
  px: player?player.x:0, py: player?player.y:0,
  carrying: player?player.carrying:null, stars: stars.slice(), muted
});
window.__forceEnd = () => { if(state===playState) timeLeft = 0.001; };
window.__addScore = n => { if(state===playState) score += n; };
window.__tables = () => tables ? tables.map(t=>({gx:t.gx,gy:t.gy,order:t.order})) : [];
window.__setOrder = (i,f) => { if(tables && tables[i]){ tables[i].order=f; tables[i].vip=false; tables[i].maxPatience=20; tables[i].patience=20; } };
</script>


<script>/* AI-CAMP-STATS-BEACON */
