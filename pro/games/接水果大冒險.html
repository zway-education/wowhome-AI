'use strict';
/* =====================================================================
   接水果大冒險 PRO v4
   核心：左右移動籃子接住水果；炸彈臭鼬千萬別接！
   v4 進階內容：5 大果園關卡＋選關畫面＋每關星星評分（localStorage）
   ===================================================================== */
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize(){
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width  = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale;
}
addEventListener('resize', resize); resize();

/* ===== v5：直向手機提示轉橫（不阻擋操作，數秒後自動淡出） ===== */
const rotateHintEl = document.getElementById('rotate-hint');
let rotateHintTimer = null;
function checkOrientation(){
  const portrait = innerHeight > innerWidth && innerWidth < 820;
  clearTimeout(rotateHintTimer);
  if(portrait){
    rotateHintEl.classList.add('show');
    rotateHintTimer = setTimeout(()=> rotateHintEl.classList.remove('show'), 4500);
  } else {
    rotateHintEl.classList.remove('show');
  }
}
addEventListener('resize', checkOrientation);
checkOrientation();

/* ===== 大螢幕提醒浮層：只在手機尺寸跳出、一個 session 只跳一次；不攔截遊戲初始化 ===== */
(function(){
  function isPhoneSize(){
    return Math.min(screen.width, screen.height) < 600 || innerWidth < 768;
  }
  let seen = false;
  try{ seen = !!sessionStorage.getItem('bigscreen-hint'); }catch(e){}
  if(isPhoneSize() && !seen){
    const el = document.getElementById('bigscreen-hint');
    const btn = document.getElementById('bsh-ok');
    if(el && btn){
      el.classList.add('show');
      btn.addEventListener('click', function(){
        try{ sessionStorage.setItem('bigscreen-hint','1'); }catch(e){}
        el.classList.add('fade-out');
        setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); }, 340);
      }, {once:true});
    }
  }
})();

/* ===== 工具 ===== */
const clamp=(v,a,b)=> v<a?a:v>b?b:v;
const lerp=(a,b,t)=> a+(b-a)*t;
const ss=(t,a,b)=> clamp((t-a)/(b-a),0,1);
const rnd=(a,b)=> a+Math.random()*(b-a);
const TAU = Math.PI*2;
const easeOutBack = t => 1 + 2.7*Math.pow(t-1,3) + 1.7*Math.pow(t-1,2);
const FONT = '"Noto Sans TC","Microsoft JhengHei",sans-serif';

/* ===== 存檔 ===== */
const LS = {
  get(k,d){ try{ const v = localStorage.getItem(k); return v===null?d:v; }catch(e){ return d; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
};
let stars = [0,0,0,0,0];
try{ const s = JSON.parse(LS.get('fruitpro_stars','[0,0,0,0,0]')); if(Array.isArray(s)) stars = s.map(n=>clamp(n|0,0,3)).slice(0,5); while(stars.length<5) stars.push(0); }catch(e){}
let best = Number(LS.get('fruitpro_best',0)) || 0;
function saveStars(){ LS.set('fruitpro_stars', JSON.stringify(stars)); }

/* ===== 音效：Web Audio 合成＋DynamicsCompressor 主匯流排 ===== */
let AC = null, master = null, noiseBuf = null;
let muted = LS.get('fruitpro_muted','0') === '1';
function initAudio(){
  if(!AC){
    try{
      AC = new (window.AudioContext || window.webkitAudioContext)();
      const comp = AC.createDynamicsCompressor();
      comp.threshold.value = -18; comp.knee.value = 24; comp.ratio.value = 8;
      master = AC.createGain(); master.gain.value = 0.6;
      master.connect(comp); comp.connect(AC.destination);
      /* v6 戶外程序化殘響：短促 impulse 的 ConvolverNode 濕聲並聯 */
      const rev = AC.createConvolver();
      const rlen = Math.floor(AC.sampleRate*0.8);
      const rbuf = AC.createBuffer(2, rlen, AC.sampleRate);
      for(let ch=0; ch<2; ch++){
        const d = rbuf.getChannelData(ch);
        for(let i=0;i<rlen;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/rlen, 2.8);
      }
      rev.buffer = rbuf;
      const rg = AC.createGain(); rg.gain.value = 0.12;
      master.connect(rev); rev.connect(rg); rg.connect(comp);
      initAmbient();
    }catch(e){}
  }
  if(AC && AC.state === 'suspended') AC.resume();
}
addEventListener('pointerdown', initAudio);
addEventListener('keydown', initAudio);
/* v6 果園氛圍層：風聲 loop＋晝鳥鳴/夜蟋蟀，受擊時 ducking */
let amb = null, ambDuck = 1, chirpT = 4;
function initAmbient(){
  if(!AC || amb) return;
  try{
    const len = AC.sampleRate*2;
    const buf = AC.createBuffer(1, len, AC.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i] = Math.random()*2-1;
    const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
    const f = AC.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 360; f.Q.value = 0.5;
    const g = AC.createGain(); g.gain.value = 0;
    src.connect(f); f.connect(g); g.connect(master); src.start();
    amb = { g };
  }catch(e){ amb = null; }
}
function updateAmbient(dt){
  ambDuck = Math.min(1, ambDuck + dt*0.5);
  if(!AC || !amb) return;
  const on = muted ? 0 : ambDuck;
  const windAmt = 1 + Math.min(1.4, Math.abs(wind)/60);
  amb.g.gain.setTargetAtTime(0.015*on*windAmt*(1+Math.sin(worldT*0.5)*0.35), AC.currentTime, 0.4);
  chirpT -= dt;
  if(chirpT <= 0){
    chirpT = 3.5 + Math.random()*6;
    if(!muted && AC && state && state.name === 'play'){
      if(L().theme === 'night') sfx.cricket();
      else sfx.bird();
    }
  }
}
const rp = f => f * (0.94 + Math.random()*0.12);
function beep(freq, dur, type, vol, slide, delay){
  if(muted || !AC || !master) return;
  const t0 = AC.currentTime + (delay||0);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq+slide), t0+dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0+0.012);
  g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  o.connect(g).connect(master);
  o.start(t0); o.stop(t0+dur+0.06);
}
function noise(dur, vol, delay){
  if(muted || !AC || !master) return;
  if(!noiseBuf){
    const len = Math.floor(AC.sampleRate*0.5);
    noiseBuf = AC.createBuffer(1,len,AC.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for(let i=0;i<len;i++) d[i] = (Math.random()*2-1)*(1-i/len);
  }
  const t0 = AC.currentTime + (delay||0);
  const src = AC.createBufferSource(); src.buffer = noiseBuf;
  src.playbackRate.value = 0.5/dur * (0.9+Math.random()*0.2);
  const g = AC.createGain();
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  src.connect(g).connect(master); src.start(t0);
}

/* =====================================================================
   3D 引擎（Canvas 2D 軟體透視投影，沿用 跑酷火人3D 的作法）
   世界座標：X=左右（籃子移動）、Y=高度（0 為地面）、Z=深度（近小遠大反向：越近 s 越大）

function project(x,y,z){
  const dx=x-cam.x, dy=y-cam.y, dz=z-cam.z;
  const ry = dy*cosA + dz*sinA;
  const rz = dz*cosA - dy*sinA;
  if(rz < 14) return null;
  const s = FOV/rz;
  return { x:CX+dx*s, y:CY-ry*s, s };
}

}

  if(!a||!b||!c||!d) return;

  ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.lineTo(d.x,d.y);

const MAX_PARTS = 320;
let parts = [];
function burst(x,y,color,n,speed){
  for(let i=0;i<n && parts.length<MAX_PARTS;i++){
    const a = Math.random()*TAU, s = (speed||220)*(0.3+Math.random()*0.7);
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-80,life:0.6,max:0.6,color,s:rnd(3,6)});
  }
}
function updateParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p = parts[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 620*dt; p.life -= dt;
    if(p.life<=0){ parts[i]=parts[parts.length-1]; parts.pop(); }
  }
}
function drawParts(){
  ctx.globalCompositeOperation = 'lighter';
  for(const p of parts){
    const a = clamp(p.life/p.max,0,1);
    const r = Math.max(0.8, p.s*(0.5+0.7*a));
    ctx.globalAlpha = a*0.42; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, r*2.4, 0, TAU); ctx.fill();
    ctx.globalAlpha = a*0.95; ctx.fillStyle = '#fff8e6';
    ctx.beginPath(); ctx.arc(p.x, p.y, r*0.72, 0, TAU); ctx.fill();
  }

}

const bakedSkies = {};

function bakeSky(theme){

    g.fillStyle = '#e8ecff';
    for(let i=0;i<60;i++){ const x=(i*191)%GAME_W, y=(i*89)%(HZ-30); g.globalAlpha = 0.25+((i*41)%70)/120; g.fillRect(x,y,2,2); }

  bg.addColorStop(0, T.sun); bg.addColorStop(1, 'rgba(255,240,170,0)');

  g.fillStyle = T.hillFar;
  g.beginPath(); g.moveTo(0,HZ);
  for(let x=0;x<=GAME_W;x+=36) g.lineTo(x, HZ-18 - Math.sin(x*0.009)*20 - Math.cos(x*0.02)*8);
  g.lineTo(GAME_W,HZ+40); g.lineTo(0,HZ+40); g.closePath(); g.fill();
  /* 地平線霧帶 */
  const fogG = g.createLinearGradient(0,HZ-40,0,HZ+20);
  fogG.addColorStop(0,'rgba(0,0,0,0)'); fogG.addColorStop(1, T.fog);
  g.fillStyle = fogG; g.fillRect(0, HZ-40, GAME_W, 60);
  if(T.tint){ g.fillStyle = T.tint; g.fillRect(0,0,GAME_W,GAME_H); }
  bakedSkies[theme] = c; curSky = c;
}

/* ===== 地板（透視網格＋霧化） ===== */
function drawFloor(){
  const T = SKY[curTheme];
  const nFL=project(-FLOORW,0,CATCH_Z-140), nFR=project(FLOORW,0,CATCH_Z-140),
        fFL=project(-FLOORW,0,SPAWN_Z+220), fFR=project(FLOORW,0,SPAWN_Z+220);
  quad(nFL,nFR,fFR,fFL, T.floor1);
  /* 中央跑道稍亮，暗示接取軸線 */
  const rnFL=project(-LANE-30,0,CATCH_Z-140), rnFR=project(LANE+30,0,CATCH_Z-140),
        rfFL=project(-LANE-30,0,SPAWN_Z+80), rfFR=project(LANE+30,0,SPAWN_Z+80);
  ctx.globalAlpha = 0.35; quad(rnFL,rnFR,rfFR,rfFL, T.floor2); ctx.globalAlpha = 1;
  /* 橫向格線（近→遠淡出） */
  ctx.strokeStyle = T.grid; ctx.lineCap='round';
  for(let z=CATCH_Z; z<=SPAWN_Z; z+=70){
    const a=project(-FLOORW,0,z), b=project(FLOORW,0,z);
    if(!a||!b) continue;
    ctx.globalAlpha = clamp(1 - (z-CATCH_Z)/(SPAWN_Z-CATCH_Z), 0.06, 0.7);
    ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  }
  /* 縱向格線 */
  for(let x=-FLOORW;x<=FLOORW;x+=64){
    const a=project(x,0,CATCH_Z), b=project(x,0,SPAWN_Z);
    if(!a||!b) continue;
    ctx.globalAlpha = 0.28;
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

/* ===== 夜間螢火蟲（3D 世界點，billboard） ===== */
let motes = [];
function initMotes(n){ motes = []; for(let i=0;i<n;i++) motes.push({x:rnd(-260,260), y:rnd(40,300), z:rnd(120,700), p:rnd(0,TAU), v:rnd(6,16)}); }
function drawMotes(){
  if(curTheme !== 'night') return;
  ctx.globalCompositeOperation = 'lighter';
  for(const m of motes){
    const p = project(m.x + Math.sin(worldT*m.v*0.1+m.p)*20, m.y + Math.cos(worldT*0.6+m.p)*12, m.z);
    if(!p) continue;
    const a = 0.3 + 0.7*Math.abs(Math.sin(worldT*1.4 + m.p));
    ctx.globalAlpha = a*0.8;
    ctx.fillStyle = '#ffe98a';
    ctx.beginPath(); ctx.arc(p.x, p.y, 2.4*p.s, 0, TAU); ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 1;
}

/* ===== 風（吹葉視覺） ===== */
function drawWind(){
  if(Math.abs(wind) < 12) return;
  ctx.strokeStyle = 'rgba(255,255,255,.3)'; ctx.lineWidth = 2; ctx.lineCap='round';
  const d = Math.sign(wind);
  for(let i=0;i<5;i++){
    const y = 96 + i*54 + Math.sin(worldT*3+i)*10;
    const x = ((worldT*Math.abs(wind)*3 + i*220) % (GAME_W+160)) - 80;
    const px = d>0 ? x : GAME_W-x;
    ctx.beginPath(); ctx.moveTo(px, y);
    ctx.quadraticCurveTo(px+30*d, y-6, px+58*d, y); ctx.stroke();

/* ===== 3D 籃子（逐面受光 + 接地陰影 + 表情） ===== */
const BPAL = { rim:'#eabd7f', front:'#c98a4f', side:'#9a6438', sideDark:'#7c4b2e', back:'#5c3a22', inner:'#3f2a19', edge:'rgba(60,32,8,.55)' };
function drawBasketShadow(){
  const cxz = project(basket.x, 0, CATCH_Z);
  if(!cxz) return;
  const rx = 74*cxz.s*basket.sx, ry = rx*0.34;
  ctx.fillStyle = 'rgba(0,0,0,.32)';
  ctx.beginPath(); ctx.ellipse(cxz.x, cxz.y, rx, ry, 0, 0, TAU); ctx.fill();
}
function drawBasket3D(){
  const bx = basket.x;
  const hw = 58*basket.sx, hd = 40, h = 62*basket.sy;
  const cn = (dx,dy,dz)=> project(bx+dx, dy, CATCH_Z+dz);
  const tFL=cn(-hw,h,-hd), tFR=cn(hw,h,-hd), tBL=cn(-hw,h,hd), tBR=cn(hw,h,hd);
  const bFL=cn(-hw,0,-hd), bFR=cn(hw,0,-hd), bBL=cn(-hw,0,hd), bBR=cn(hw,0,hd);
  /* 內裡（後壁＋底，最暗，先畫） */
  quad(tBL,tBR,bBR,bBL, BPAL.back);
  quad(bFL,bFR,bBR,bBL, BPAL.inner);
  /* 可見外側壁（依籃子位置選朝相機那一側） */
  if(bx > 8){ quad(tFL,tBL,bBL,bFL, BPAL.sideDark); quadStroke(tFL,tBL,bBL,bFL,BPAL.edge,1); }
  else if(bx < -8){ quad(tFR,tBR,bBR,bFR, BPAL.side); quadStroke(tFR,tBR,bBR,bFR,BPAL.edge,1); }
  /* 外前壁（中亮）＋ AO 暗帶 ＋ 編織線 */
  if(quad(tFL,tFR,bFR,bFL, BPAL.front)){
    const mFL={x:tFL.x+(bFL.x-tFL.x)*0.5, y:tFL.y+(bFL.y-tFL.y)*0.5};
    const mFR={x:tFR.x+(bFR.x-tFR.x)*0.5, y:tFR.y+(bFR.y-tFR.y)*0.5};
    quad(mFL,mFR,bFR,bFL,'rgba(20,10,2,0.26)');
    ctx.strokeStyle='rgba(70,40,12,.4)'; ctx.lineWidth=1.4;
    for(let i=1;i<=3;i++){
      const t=i/4;
      const a={x:tFL.x+(bFL.x-tFL.x)*t, y:tFL.y+(bFL.y-tFL.y)*t};
      const b={x:tFR.x+(bFR.x-tFR.x)*t, y:tFR.y+(bFR.y-tFR.y)*t};
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    }
    quadStroke(tFL,tFR,bFR,bFL,BPAL.edge,1.4);
  }
  /* 頂鑲邊（最亮，環狀高光） */
  quadStroke(tFL,tFR,tBR,tBL, BPAL.rim, Math.max(3, 7*(tFR.s||1)/1.8));
  quadStroke(tFL,tFR,tBR,tBL, 'rgba(255,244,214,.5)', Math.max(1.5, 3*(tFR.s||1)/1.8));
  /* 表情（畫在前壁上） */
  drawBasketFace(tFL,tFR,bFL,bFR);
}
function drawBasketFace(tFL,tFR,bFL,bFR){
  if(!tFL||!tFR||!bFL||!bFR) return;
  const ftc={x:(tFL.x+tFR.x)/2, y:(tFL.y+tFR.y)/2};
  const fbc={x:(bFL.x+bFR.x)/2, y:(bFL.y+bFR.y)/2};
  const fw=Math.hypot(tFR.x-tFL.x,tFR.y-tFL.y);
  const fc={x:ftc.x+(fbc.x-ftc.x)*0.42, y:ftc.y+(fbc.y-ftc.y)*0.42};
  const u = fw*0.01;
  const eyeDX = fw*0.2, eyeY = fc.y - fw*0.02;
  const hurt = basket.hurt > 0.3;
  const blink = !hurt && basket.blink < 0.1;
  ctx.save();
  ctx.translate(basket.wobble*fw*0.02, 0);
  for(const side of [-1,1]){
    const ex = fc.x + side*eyeDX;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(ex, eyeY, u*7.4, 0, TAU); ctx.fill();
    ctx.strokeStyle='rgba(40,30,20,.4)'; ctx.lineWidth=u*1.4; ctx.stroke();
    if(hurt){
      ctx.strokeStyle='#c23b2e'; ctx.lineWidth=u*2.6; ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(ex-u*3.6, eyeY-u*3.6); ctx.lineTo(ex+u*3.6, eyeY+u*3.6);
      ctx.moveTo(ex+u*3.6, eyeY-u*3.6); ctx.lineTo(ex-u*3.6, eyeY+u*3.6);
      ctx.stroke();
    } else if(blink){
      ctx.strokeStyle='#2a2016'; ctx.lineWidth=u*2;
      ctx.beginPath(); ctx.moveTo(ex-u*3.4, eyeY); ctx.lineTo(ex+u*3.4, eyeY); ctx.stroke();
    } else {
      ctx.fillStyle='#2a2016';
      ctx.beginPath(); ctx.arc(ex+basket.wobble*u*3, eyeY+u, u*3.6, 0, TAU); ctx.fill();
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(ex+basket.wobble*u*3+u*1.2, eyeY-u*0.4, u*1.2, 0, TAU); ctx.fill();
    }
  }
  ctx.strokeStyle='#2a2016'; ctx.lineWidth=u*2.2; ctx.lineCap='round';
  ctx.beginPath();
  const my = fc.y + fw*0.1;
  if(hurt){ ctx.fillStyle='#5c2f22'; ctx.arc(fc.x, my, u*5, 0, TAU); ctx.fill(); }
  else if(basket.mouth > 0.3){ ctx.fillStyle='#5c2f22'; ctx.arc(fc.x, my, u*(5+basket.mouth*3), 0, Math.PI); ctx.fill(); ctx.stroke(); }
  else { ctx.arc(fc.x, my, u*8, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke(); }
  ctx.restore();
}

/* ===== 3D 水果（billboard SVG + 透視縮放 + 接地陰影 + 霧化 + 受光高光） ===== */
function fruitShadow(e){
  const p = project(e.x, 0, e.z);
  if(!p) return;
  const base = (e.key==='melon'||e.key==='pine') ? 30 : 26;
  const heightFade = clamp(1 - (e.y-CATCH_Y)/300, 0.25, 1);
  const rx = base*p.s*(0.7+0.5*heightFade), ry = rx*0.36;
  ctx.globalAlpha = 0.3*heightFade;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(p.x, p.y, rx, ry, 0, 0, TAU); ctx.fill();
  ctx.globalAlpha = 1;
}
function drawFruit3D(e){
  const p = project(e.x, e.y, e.z);
  if(!p) return;
  const img = IMG[e.def.img];
  const base = (e.key==='melon'||e.key==='pine') ? 50 : 44;
  const size = base * p.s;
  ctx.save();
  ctx.translate(p.x, p.y);
  if(e.def.kind === 'star'){ ctx.globalCompositeOperation='lighter'; ctx.drawImage(glowGold, -size*0.9, -size*0.9, size*1.8, size*1.8); ctx.globalCompositeOperation='source-over'; }
  else if(e.def.kind === 'bad'){ ctx.globalCompositeOperation='lighter'; ctx.drawImage(glowRed, -size*0.85, -size*0.85, size*1.7, size*1.7); ctx.globalCompositeOperation='source-over'; }
  ctx.rotate(e.rot);
  if(img.complete && img.naturalWidth) ctx.drawImage(img, -size/2, -size/2, size, size);
  ctx.restore();
  /* 左上受光高光（additive，讓球體有立體感） */
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.5;
  const hr = size*0.5;
  ctx.drawImage(glowSoft, p.x - size*0.24 - hr*0.5, p.y - size*0.26 - hr*0.5, hr, hr);
  ctx.restore();
  ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 1;
  /* 遠方霧化 */
  const fog = clamp((e.z - 320)/600, 0, 1) * 0.55;
  if(fog > 0.02){
    const T = SKY[curTheme];
    ctx.globalAlpha = fog; ctx.fillStyle = T.fog;
    ctx.beginPath(); ctx.arc(p.x, p.y, size*0.52, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1;
  }
}

/* ===== HUD（玻璃質感） ===== */
function glassPanel(x,y,w,h,r){
  ctx.save();
  const g = ctx.createLinearGradient(0,y,0,y+h);
  g.addColorStop(0,'rgba(30,44,60,.55)'); g.addColorStop(1,'rgba(12,20,30,.62)');
  ctx.fillStyle = g; rrp(x,y,w,h,r); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.22)'; ctx.lineWidth=1.4; rrp(x,y,w,h,r); ctx.stroke();
  ctx.save(); rrp(x,y,w,h,r); ctx.clip();
  ctx.fillStyle='rgba(255,255,255,.12)'; rrp(x+2,y+2,w-4,h*0.4,r*0.7); ctx.fill();
  ctx.restore();
  ctx.restore();
}
function rrp(x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function drawHeart(x,y,s,fill){
  ctx.save(); ctx.translate(x,y); ctx.scale(s,s);
  ctx.beginPath(); ctx.moveTo(0,3);
  ctx.bezierCurveTo(-8,-6,-2,-11,0,-6);
  ctx.bezierCurveTo(2,-11,8,-6,0,3); ctx.closePath();
  ctx.fillStyle = fill; ctx.fill();
  ctx.lineWidth = 1.4; ctx.strokeStyle = 'rgba(0,0,0,.35)'; ctx.stroke();
  ctx.restore();
}
function drawStarShape(x,y,r,fill,rot){
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot||0);
  ctx.beginPath();
  for(let i=0;i<10;i++){
    const rr = i%2===0 ? r : r*0.46;
    const a = -Math.PI/2 + i*Math.PI/5;
    ctx.lineTo(Math.cos(a)*rr, Math.sin(a)*rr);
  }
  ctx.closePath(); ctx.fillStyle = fill; ctx.fill();
  ctx.lineWidth = r*0.14; ctx.strokeStyle = 'rgba(90,60,0,.5)'; ctx.stroke();
  ctx.restore();
}
function drawButton(b, hot){
  ctx.save();
  const g = ctx.createLinearGradient(0, b.y, 0, b.y+b.h);
  if(b.disabled){ g.addColorStop(0,'rgba(70,80,75,.7)'); g.addColorStop(1,'rgba(40,48,44,.7)'); }
  else if(b.gold){ g.addColorStop(0,'#ffcf5c'); g.addColorStop(1,'#ff7e3d'); }
  else { g.addColorStop(0,'rgba(70,150,210,.92)'); g.addColorStop(1,'rgba(36,74,120,.92)'); }
  if(!b.disabled){ ctx.shadowColor = 'rgba(0,0,0,.4)'; ctx.shadowBlur = 10; ctx.shadowOffsetY = 4; }
  ctx.fillStyle = g; rrp(b.x, b.y, b.w, b.h, 14); ctx.fill();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
  ctx.save(); rrp(b.x, b.y, b.w, b.h, 14); ctx.clip();
  ctx.fillStyle = b.disabled ? 'rgba(255,255,255,.07)' : 'rgba(255,255,255,.24)';
  rrp(b.x+3, b.y+3, b.w-6, b.h*0.42, 10); ctx.fill();
  ctx.restore();
  ctx.lineWidth = hot ? 4 : 2.4;
  if(hot){ ctx.shadowColor = b.gold ? 'rgba(255,207,92,.9)' : 'rgba(120,200,255,.85)'; ctx.shadowBlur = 14; }
  ctx.strokeStyle = hot ? '#fff' : 'rgba(240,250,255,.8)';
  rrp(b.x, b.y, b.w, b.h, 14); ctx.stroke();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.font = '900 '+(b.fs||22)+'px '+FONT; ctx.textAlign='center';
  ctx.fillStyle = b.disabled ? 'rgba(230,240,230,.5)' : (b.gold ? '#4a2a00' : '#f4ffe8');
  ctx.fillText(b.label, b.x+b.w/2, b.y+b.h/2+(b.fs||22)*0.36);
  ctx.restore();
}

      ctx.fillStyle='#ffcd75';

  }
};

/* 標題/選單背景的裝飾用飄落水果（不計分） */
let demoFruits = [];
function spawnDemoFruit(){
  if(demoFruits.length > 10) return;
  const keys = ['apple','banana','grapes','melon','berry','peach','star'];
  const key = keys[Math.floor(Math.random()*keys.length)];
  demoFruits.push({ def:DEFS[key], key, x:rnd(-190,190), y:SKY_Y, z:SPAWN_Z, vz:rnd(150,240), rot:rnd(-0.3,0.3), spin:rnd(-1.2,1.2) });
}
function updateDemoFruits(dt){
  for(let i=demoFruits.length-1;i>=0;i--){
    const e = demoFruits[i];
    e.z -= e.vz*dt;
    const p = clamp((SPAWN_Z - e.z)/(SPAWN_Z - CATCH_Z), 0, 1);
    e.y = SKY_Y + (CATCH_Y - SKY_Y)*(p*p);
    e.rot += e.spin*dt;
    if(e.z <= CATCH_Z-40){ demoFruits[i]=demoFruits[demoFruits.length-1]; demoFruits.pop(); }
  }
}
function drawDemoScene(){
  drawBackdrop();
  for(const e of demoFruits) fruitShadow(e);
  drawBasketShadow();
  const sorted = demoFruits.slice().sort((a,b)=> b.z - a.z);
  for(const e of sorted) drawFruit3D(e);
  drawBasket3D();
  if(vigCanvas) ctx.drawImage(vigCanvas, 0, 0, GAME_W, GAME_H);
}

const selectState = {
  name:'select', t:0, sel:0,
  enter(){ this.t = 0;
    this.sel = 0;
    for(let i=4;i>=0;i--) if(unlocked(i)){ this.sel = i; break; }
    const bts = [];

      const x = GAME_W/2 - 5*168/2 + i*168 + 10;
      bts.push({ x, y:180, w:148, h:180, label:'', lv:i, disabled:!unlocked(i), cb:()=>{ if(unlocked(i)) startLevel(i); } });
    }
    bts.push({ x:24, y:GAME_H-76, w:150, h:56, label:'回標題', fs:20, cb:()=> setState(titleState) });
    this._btn = bts;
  },
  buttons(){ return this._btn; },
  update(dt){
    this.t += dt; worldT += dt;

    if(this._demoT === undefined) this._demoT = 0;
    this._demoT -= dt; if(this._demoT <= 0){ this._demoT = 1.1; spawnDemoFruit(); }
    if(input.navL){ input.navL = false; do{ this.sel = (this.sel+4)%5; }while(!unlocked(this.sel)); sfx.ui(); }
    if(input.navR){ input.navR = false;
      let n = this.sel;
      for(let k=1;k<=4;k++){ const c=(this.sel+k)%5; if(unlocked(c)){ n=c; break; } }
      if(n!==this.sel){ this.sel=n; sfx.ui(); } }
    if(input.confirm){ input.confirm = false; if(unlocked(this.sel)){ sfx.ui(); startLevel(this.sel); } }
  },
  draw(){

    ctx.fillStyle = 'rgba(6,14,22,.55)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.textAlign='center';
    ctx.font='900 40px '+FONT;
    ctx.lineWidth=8; ctx.strokeStyle='#16324a';
    ctx.strokeText('選擇果園', GAME_W/2, 92);
    ctx.fillStyle='#f4ffe8'; ctx.fillText('選擇果園', GAME_W/2, 92);
    ctx.font='700 17px '+FONT; ctx.fillStyle='#ffe9b0';
    ctx.fillText('時間內達到目標分數過關；分數愈高星星愈多！', GAME_W/2, 128);
    for(const b of this._btn){
      if(b.lv === undefined){ drawButton(b,false); continue; }
      const i = b.lv, lv = LEVELS[i];
      drawButton(b, this.sel===i && unlocked(i));
      ctx.textAlign='center';
      ctx.font='900 30px '+FONT;
      ctx.fillStyle = b.disabled ? 'rgba(230,240,230,.5)' : '#fff';
      ctx.fillText(String(i+1), b.x+b.w/2, b.y+44);
      ctx.font='900 19px '+FONT;
      ctx.fillText(b.disabled ? '未解鎖' : lv.name, b.x+b.w/2, b.y+76);
      ctx.font='700 13px '+FONT;
      ctx.fillStyle = b.disabled ? 'rgba(230,240,230,.4)' : '#e8f6d8';
      ctx.fillText(b.disabled ? '先通過上一關' : (lv.time+'秒 目標'+lv.target), b.x+b.w/2, b.y+100);
      ctx.fillText(b.disabled ? '' : lv.desc, b.x+b.w/2, b.y+122);
      for(let s2=0;s2<3;s2++){
        const sx = b.x+b.w/2 + (s2-1)*30;
        drawStarShape(sx, b.y+152, 12, s2 < stars[i] ? '#ffcf5c' : 'rgba(255,255,255,.2)');
      }
      if(b.disabled){
        ctx.fillStyle = 'rgba(230,240,235,.75)';
        rrp(b.x+b.w/2-11, b.y+12, 22, 17, 3); ctx.fill();
        ctx.strokeStyle = 'rgba(230,240,235,.75)'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(b.x+b.w/2, b.y+12, 7, Math.PI, 0); ctx.stroke();

    ctx.fillText('← → 選關、空白鍵開始；或直接點關卡', GAME_W/2, GAME_H-18);
  }
};
function unlocked(i){ return i===0 || stars[i-1] > 0; }
function startLevel(i){
  curLevel = clamp(i,0,4);
  curTheme = L().theme;
  bakeSky(curTheme);
  initMotes(curTheme==='night' ? 22 : 0);
  demoFruits = [];
  setState(playState);
}

const playState = {
  name:'play', t:0,
  enter(){
    this.t = 0;
    score = 0; lives = 3; combo = 0; comboTimer = 0;
    entities = []; parts.length = 0; floats.length = 0; rings.length = 0;
    elapsed = 0; spawnTimer = 0.7;
    shake = 0; freeze = 0; flashT = 0; hintT = 4;
    wind = 0; windTarget = 0; windTimer = 0;
    frenzyT = 0; frenzyCooldown = 15; lastTickSec = -1;
    wasBreather = false;
    resetBasket();
    hintEl.textContent = '💻 ← → 移動　📱 手指拖曳｜水果從遠方落下、看準深度接住！';
    hintEl.classList.add('show');
  },
  buttons(){ return []; },
  update(dt){
    this.t += dt; worldT += dt;
    if(hintT > 0){ hintT -= dt; if(hintT <= 0) hintEl.classList.remove('show'); }
    if(freeze > 0){ freeze -= dt; return; }
    const lv = L();
    elapsed += dt;

    const breatherNow = lv.badRate > 0 && inBreather(elapsed);
    if(breatherNow && !wasBreather){
      sfx.breather();
      floatText(GAME_W/2, 170, '安全波動，安心接水果！', '#aee239', 22);
    }
    wasBreather = breatherNow;

    if(lv.wind){
      windTimer -= dt;
      if(windTimer <= 0){ windTimer = rnd(3.5,6); windTarget = rnd(-1,1) > 0 ? rnd(30,80)*lv.wind : -rnd(30,80)*lv.wind; }
      wind += (windTarget - wind) * (1 - Math.pow(0.05, dt));
    } else wind = 0;

    if(lv.frenzy){
      if(frenzyT > 0){ frenzyT -= dt; }
      else if(elapsed >= frenzyCooldown){
        frenzyT = 4; frenzyCooldown += 15;
        sfx.frenzy();
        floatText(GAME_W/2, 200, '黃金果雨開始！', '#ffcf5c', 30);
      }
    }

    /* 籃子移動：鍵盤（世界座標） */
    const ACC = 1500, MAXV = 320, DEC = 2000;
    const usingPointer = input.pointerHeld && input.pointerX !== null && !input.left && !input.right;
    if(input.left && !input.right) basket.vx -= ACC*dt;
    else if(input.right && !input.left) basket.vx += ACC*dt;
    else if(!usingPointer){
      const s = Math.sign(basket.vx);
      basket.vx -= s*Math.min(Math.abs(basket.vx), DEC*dt);
    }
    /* 拖曳跟隨：螢幕 X → 世界 X */
    if(usingPointer){
      const target = clamp(screenToWorldX(input.pointerX), -LANE, LANE);
      basket.vx = clamp((target - basket.x) * 12, -640, 640);
    } else {
      basket.vx = clamp(basket.vx, -MAXV, MAXV);
    }
    basket.x = clamp(basket.x + basket.vx*dt, -LANE, LANE);
    basket.wobble = clamp(basket.vx/MAXV, -1.4, 1.4);
    basket.sx += (1-basket.sx)*10*dt; basket.sy += (1-basket.sy)*10*dt;
    basket.blink -= dt; if(basket.blink < -0.12) basket.blink = rnd(1.6,3.4);
    basket.mouth = Math.max(0, basket.mouth - dt*3);
    basket.hurt = Math.max(0, basket.hurt - dt*2.2);

    /* 出怪 */
    spawnTimer -= dt;
    if(spawnTimer <= 0){
      spawnItem(frenzyT > 0);
      spawnTimer = currentSpawnInterval() * rnd(0.85,1.15);
    }
    if(comboTimer > 0){ comboTimer -= dt; if(comboTimer <= 0) combo = 0; }

    /* 水果更新與接取 */
    for(const e of entities){
      if(e.dead) continue;
      e.z -= e.vz*dt;
      const p = clamp((SPAWN_Z - e.z)/(SPAWN_Z - CATCH_Z), 0, 1);
      e.y = SKY_Y + (CATCH_Y - SKY_Y)*(p*p);
      e.x = clamp(e.x + wind*dt*(e.def.kind==='star'?0.6:1), -(LANE+40), LANE+40);
      e.rot += e.spin*dt; e.wob += dt*3;
      /* 尾跡粒子（螢幕空間，additive） */
      if(e.def.kind === 'star' && Math.random() < dt*22 && parts.length < MAX_PARTS){
        const sp = project(e.x, e.y, e.z);
        if(sp) parts.push({x:sp.x+rnd(-8,8), y:sp.y-10, vx:rnd(-24,24), vy:rnd(-40,-8), life:0.4, max:0.4, color:'#ffe28a', s:rnd(2,3.6)});
      } else if(e.key === 'bomb' && Math.random() < dt*16 && parts.length < MAX_PARTS){
        const sp = project(e.x, e.y, e.z);
        if(sp) parts.push({x:sp.x+8, y:sp.y-12, vx:rnd(-20,20), vy:rnd(-30,0), life:0.3, max:0.3, color:Math.random()<0.5?'#ffd23f':'#ff6b35', s:rnd(1.8,3)});
      }
      /* 抵達接取平面 */
      if(e.z <= CATCH_Z){
        e.dead = true;
        if(Math.abs(e.x - basket.x) < CATCH_HALF){ onCatch(e); }
        else if(e.def.kind !== 'bad'){ onMiss(e); }
        if(state !== playState) return;
      }
    }
    entities = entities.filter(e => !e.dead);

    updateParts(dt); updateFloats(dt);
    shake *= Math.pow(0.001, dt);
    flashT = Math.max(0, flashT - dt*3);

    const remain = lv.time - elapsed;
    if(remain <= 5 && remain > 0){
      const sec = Math.ceil(remain);
      if(sec !== lastTickSec){ lastTickSec = sec; sfx.tick(); }
    }
    if(elapsed >= lv.time){
      if(score >= lv.target){ setState(resultState); }
      else { sfx.fail(); setState(failState); }
    }
    input.confirm = false;
  },
  draw(){
    drawScene(true);
    drawHUD();
    if(flashT > 0){
      ctx.globalAlpha = flashT; ctx.fillStyle = '#ff5a4a';
      ctx.fillRect(0,0,GAME_W,GAME_H); ctx.globalAlpha = 1;
    }
    if(frenzyT > 0){
      ctx.globalAlpha = 0.08 + 0.04*Math.sin(worldT*8);
      ctx.fillStyle = '#ffcf5c'; ctx.fillRect(0,0,GAME_W,GAME_H);
      ctx.globalAlpha = 1;
    }
  }
};

const resultState = {
  name:'result', t:0,
  enter(){
    this.t = 0;
    const [t1,t2,t3] = starThresholds();
    this.starGot = score >= t3 ? 3 : score >= t2 ? 2 : 1;
    sfx.clear(this.starGot);
    this._played = 0;
    if(this.starGot > stars[curLevel]){ stars[curLevel] = this.starGot; saveStars(); }
    if(score > best){ best = score; LS.set('fruitpro_best', String(best)); }
    hintEl.classList.remove('show');
    const hasNext = curLevel < 4;
    const bts = [];
    bts.push({ x:GAME_W/2-250, y:400, w:150, h:58, label:'再玩一次', fs:20, cb:()=> startLevel(curLevel) });
    bts.push({ x:GAME_W/2-70, y:400, w:140, h:58, label:'選關畫面', fs:20, cb:()=> setState(selectState) });
    if(hasNext) bts.push({ x:GAME_W/2+90, y:400, w:160, h:58, label:'下一關 ▶', gold:true, fs:20, cb:()=> startLevel(curLevel+1) });
    this._btn = bts;
    for(let i=0;i<this.starGot;i++) burst(rnd(200,760), rnd(110,260), ['#aee239','#ffcf5c','#ff6cc7'][i], 16 + this.starGot*4, 260);
    if(this.starGot === 3) for(let i=0;i<3;i++) burst(rnd(150,810), rnd(70,180), '#fff5d6', 14, 300);
  },
  buttons(){ return this.t > 0.4 ? this._btn : []; },
  update(dt){
    this.t += dt; worldT += dt;
    updateParts(dt); updateFloats(dt);
    shake *= Math.pow(0.001, dt);
    const n = Math.floor(ss(this.t, 0.4, 1.6) * this.starGot);
    while(this._played < n){ this._played++; sfx.star(this._played); burst(GAME_W/2+(this._played-2)*64, 262, '#ffcf5c', 12, 200); }
    if(this.t > 0.6 && input.confirm){
      input.confirm = false; sfx.ui();
      if(curLevel < 4) startLevel(curLevel+1); else startLevel(curLevel);
    }
  },
  draw(){
    drawScene(false);
    ctx.fillStyle = 'rgba(6,16,22,.62)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.textAlign='center';
    const pop = easeOutBack(clamp(this.t*2.2,0,1));
    ctx.save();
    ctx.translate(GAME_W/2, 150); ctx.scale(pop,pop);
    ctx.font='900 46px '+FONT;
    ctx.lineWidth=9; ctx.strokeStyle='#16324a';
    const msg = curLevel===4 ? '全部通關！豐收大師！' : '第'+(curLevel+1)+'關 豐收成功！';
    ctx.strokeText(msg, 0, 0);
    ctx.fillStyle='#fff5d6'; ctx.fillText(msg, 0, 0);
    ctx.restore();
    ctx.font='700 20px '+FONT; ctx.fillStyle='#e8f6d8';
    ctx.fillText(L().name, GAME_W/2, 192);
    for(let i=0;i<3;i++){
      const on = i < this._played;
      const k = on ? easeOutBack(clamp((this.t-0.4-i*0.4)*3,0,1)) : 1;
      drawStarShape(GAME_W/2+(i-1)*64, 258, on ? 26*k : 24, on ? '#ffcf5c' : 'rgba(255,255,255,.18)', on ? Math.sin(worldT*2+i)*0.1 : 0);
    }
    ctx.font='700 24px '+FONT; ctx.fillStyle='#aee239';
    ctx.fillText('本關分數：'+score, GAME_W/2, 328);
    ctx.fillStyle='#ffcd75';
    ctx.fillText('最佳分數：'+best, GAME_W/2, 362);
    for(const b of this.buttons()) drawButton(b, false);
    if(this.t > 0.6){
      ctx.font='700 14px '+FONT; ctx.fillStyle='#ffffff99';
      ctx.fillText('空白鍵＝'+(curLevel<4?'下一關':'再玩一次'), GAME_W/2, 490);
    }
  }
};

const failState = {
  name:'fail', t:0,
  enter(){
    this.t = 0;
    if(score > best){ best = score; LS.set('fruitpro_best', String(best)); }
    hintEl.classList.remove('show');
    this._btn = [
      { x:GAME_W/2-190, y:388, w:180, h:60, label:'再挑戰一次', gold:true, fs:21, cb:()=> startLevel(curLevel) },
      { x:GAME_W/2+10, y:388, w:180, h:60, label:'選關畫面', fs:21, cb:()=> setState(selectState) }
    ];
  },
  buttons(){ return this.t > 0.5 ? this._btn : []; },
  update(dt){
    this.t += dt; worldT += dt;
    updateParts(dt); updateFloats(dt);
    shake *= Math.pow(0.001, dt);
    if(this.t > 0.5 && input.confirm){ input.confirm = false; startLevel(curLevel); }
  },
  draw(){
    drawScene(false);
    ctx.fillStyle = 'rgba(8,16,20,.62)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.textAlign='center';
    const pop = easeOutBack(clamp(this.t*2.2,0,1));
    ctx.save();
    ctx.translate(GAME_W/2, 196); ctx.scale(pop,pop);
    ctx.font='900 44px '+FONT;
    ctx.lineWidth=8; ctx.strokeStyle='#16324a';
    ctx.strokeText('再挑戰一次！', 0, 0);
    ctx.fillStyle='#fff5d6'; ctx.fillText('再挑戰一次！', 0, 0);
    ctx.restore();
    ctx.font='700 18px '+FONT; ctx.fillStyle='#ffe9b0';
    const diff = L().target - score;
    ctx.fillText(lives<=0 ? '炸彈太調皮了，下次躲開它！' : ('只差 '+diff+' 分就過關，你一定可以！'), GAME_W/2, 244);
    ctx.font='700 24px '+FONT;
    ctx.fillStyle='#aee239'; ctx.fillText('本次分數：'+score+'（目標 '+L().target+'）', GAME_W/2, 296);
    ctx.fillStyle='#ffcd75'; ctx.fillText('最佳分數：'+best, GAME_W/2, 332);
    for(const b of this.buttons()) drawButton(b, false);
  }
};

/* ===== 主迴圈（固定時間步進） ===== */
const STEP = 1/60;
let last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while(acc >= STEP){
    state.update(STEP);
    updateAmbient(STEP);
    updateRings(STEP);
    fadeT = Math.max(0, fadeT - STEP);
    acc -= STEP;
  }
  state.draw();
  if(fadeT > 0){
    ctx.globalAlpha = clamp(fadeT/FADE_LEN, 0, 1)*0.85;
    ctx.fillStyle = '#06121a';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    ctx.globalAlpha = 1;
  }
}
setState(titleState);
requestAnimationFrame(frame);

/* ===== 測試掛鉤 ===== */
window.__test = {
  get state(){ return state.name; },
  get score(){ return score; },
  get lives(){ return lives; },
  get level(){ return curLevel; },
  get elapsed(){ return elapsed; },
  get basketX(){ return basket.x; },
  get stars(){ return stars.slice(); },
  get entityCount(){ return entities.length; },
  get frenzy(){ return frenzyT; },
  get breather(){ return inBreather(elapsed); },
  get buttons(){ return activeButtons().map(b=>({label:b.label, x:b.x+b.w/2, y:b.y+b.h/2, w:b.w, h:b.h, disabled:!!b.disabled})); },
  startLevel(i){ startLevel(i); },
  goSelect(){ setState(selectState); },
  addScore(n){ score += n; },
  dropItem(key, x){ const def = DEFS[key]; entities.push({ def, key, x:x!==undefined?x:basket.x, y:CATCH_Y+40, z:CATCH_Z+80, vz:200, rot:0, spin:0, wob:0, dead:false }); },
  setTime(t){ elapsed = t; },
  tick(s){ const n = Math.round((s||1)*60); for(let i=0;i<n;i++) state.update(STEP); }
};
</script>

  function once(){ if(done)return; done=true; ping(K+"-p"); ping("site-total-plays");
    window.removeEventListener("pointerdown",once); window.removeEventListener("keydown",once); }
  window.addEventListener("pointerdown",once,{once:false}); window.addEventListener("keydown",once,{once:false});
  /* 投票鈕：非常好玩/好玩——與作品館同一計數器，任何網頁打開都同步 */
  function initVotes(){
    if(!document.body) return;
    var wrap=document.createElement("div");
    wrap.style.cssText="position:fixed;right:10px;bottom:10px;z-index:99999;display:flex;gap:6px;font-family:sans-serif;opacity:.92";
    var LS="voted-"+K;
    var defs=[["-love","\u2764\uFE0F","\u975e\u5e38\u597d\u73a9","#ff6cc7"],["-like","\ud83d\udc4d","\u597d\u73a9","#38e1ff"]];
    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;
          b.querySelector("i").textContent=Math.max(0,(n||0)-(c||0));
        }); });
      });
    }
    defs.forEach(function(d){
      var b=document.createElement("button");
      b.type="button"; b.title=d[2];
      b.style.cssText="min-height:42px;padding:8px 14px;border:none;border-radius:999px;background:rgba(15,18,32,.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation";
      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";
      b.addEventListener("click",function(){
        var prev=null; try{ prev=localStorage.getItem(LS); }catch(e){}
        if(prev===d[0]){ ping(K+d[0]+"-c"); try{ localStorage.removeItem(LS); }catch(e){} }
        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);
      });
      btns[d[0]]=b; wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    refresh();
    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* 每10秒同步別人投的票 */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
</script>
