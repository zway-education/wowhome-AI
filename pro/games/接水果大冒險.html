/* =====================================================================
   接水果大冒險 PRO v4
   核心：左右移動籃子接住水果；炸彈臭鼬千萬別接！
   v4 進階內容：5 大果園關卡＋選關畫面＋每關星星評分（localStorage）
   ===================================================================== */
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize(){
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width  = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale;
}
addEventListener('resize', resize); resize();

/* ===== 工具 ===== */
const clamp=(v,a,b)=> v<a?a:v>b?b:v;
const lerp=(a,b,t)=> a+(b-a)*t;
const ss=(t,a,b)=> clamp((t-a)/(b-a),0,1);
const rnd=(a,b)=> a+Math.random()*(b-a);
const TAU = Math.PI*2;
const easeOutBack = t => 1 + 2.7*Math.pow(t-1,3) + 1.7*Math.pow(t-1,2);
const FONT = '"Noto Sans TC","Microsoft JhengHei",sans-serif';

/* ===== 存檔 ===== */
const LS = {
  get(k,d){ try{ const v = localStorage.getItem(k); return v===null?d:v; }catch(e){ return d; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
};
let stars = [0,0,0,0,0];
try{ const s = JSON.parse(LS.get('fruitpro_stars','[0,0,0,0,0]')); if(Array.isArray(s)) stars = s.map(n=>clamp(n|0,0,3)).slice(0,5); while(stars.length<5) stars.push(0); }catch(e){}
let best = Number(LS.get('fruitpro_best',0)) || 0;
function saveStars(){ LS.set('fruitpro_stars', JSON.stringify(stars)); }

/* ===== 音效：Web Audio 合成＋DynamicsCompressor 主匯流排 ===== */
let AC = null, master = null, noiseBuf = null;
let muted = LS.get('fruitpro_muted','0') === '1';
function initAudio(){
  if(!AC){
    try{
      AC = new (window.AudioContext || window.webkitAudioContext)();
      const comp = AC.createDynamicsCompressor();
      comp.threshold.value = -18; comp.knee.value = 24; comp.ratio.value = 8;
      master = AC.createGain(); master.gain.value = 0.6;
      master.connect(comp); comp.connect(AC.destination);
    }catch(e){}
  }
  if(AC && AC.state === 'suspended') AC.resume();
}
addEventListener('pointerdown', initAudio);
addEventListener('keydown', initAudio);
const rp = f => f * (0.94 + Math.random()*0.12);
function beep(freq, dur, type, vol, slide, delay){
  if(muted || !AC || !master) return;
  const t0 = AC.currentTime + (delay||0);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq+slide), t0+dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0+0.012);
  g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  o.connect(g).connect(master);
  o.start(t0); o.stop(t0+dur+0.06);
}
function noise(dur, vol, delay){
  if(muted || !AC || !master) return;
  if(!noiseBuf){
    const len = Math.floor(AC.sampleRate*0.5);
    noiseBuf = AC.createBuffer(1,len,AC.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for(let i=0;i<len;i++) d[i] = (Math.random()*2-1)*(1-i/len);
  }
  const t0 = AC.currentTime + (delay||0);
  const src = AC.createBufferSource(); src.buffer = noiseBuf;
  src.playbackRate.value = 0.5/dur * (0.9+Math.random()*0.2);
  const g = AC.createGain();
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  src.connect(g).connect(master); src.start(t0);
}

const input = { left:false, right:false, pointerX:null, pointerHeld:false,
                confirm:false, navL:false, navR:false };
addEventListener('keydown', e => {
  if(e.code==='ArrowLeft' || e.code==='KeyA'){ e.preventDefault(); input.left = true; input.navL = true; }
  else if(e.code==='ArrowRight' || e.code==='KeyD'){ e.preventDefault(); input.right = true; input.navR = true; }
  else if(['Space','Enter','ArrowUp','KeyW'].includes(e.code)){ e.preventDefault(); if(!e.repeat) input.confirm = true; }
  else if(e.code==='KeyM'){ muted = !muted; LS.set('fruitpro_muted', muted?'1':'0'); syncMute(); }
});
addEventListener('keyup', e => {
  if(e.code==='ArrowLeft' || e.code==='KeyA'){ input.left = false; input.navL = false; }
  if(e.code==='ArrowRight' || e.code==='KeyD'){ input.right = false; input.navR = false; }
});
function toLogical(cx, cy){
  const r = canvas.getBoundingClientRect();
  return { x:(cx-r.left)/canvas._scale, y:(cy-r.top)/canvas._scale };
}
function activeButtons(){ return (state && state.buttons) ? state.buttons() : []; }
function hitButton(p){
  for(const b of activeButtons())
    if(p.x>=b.x-8 && p.x<=b.x+b.w+8 && p.y>=b.y-8 && p.y<=b.y+b.h+8 && !b.disabled) return b;
  return null;
}
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const p = toLogical(t.clientX, t.clientY);
  const b = hitButton(p);
  if(b){ sfx.ui(); b.cb(); return; }
  input.pointerHeld = true; input.pointerX = p.x;
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  if(t){ input.pointerX = toLogical(t.clientX, t.clientY).x; }
}, {passive:false});
for(const ev of ['touchend','touchcancel'])
  canvas.addEventListener(ev, e => { e.preventDefault(); if(e.touches.length===0) input.pointerHeld = false; }, {passive:false});
canvas.addEventListener('mousedown', e => {
  const p = toLogical(e.clientX, e.clientY);
  const b = hitButton(p);
  if(b){ sfx.ui(); b.cb(); return; }
  input.pointerHeld = true; input.pointerX = p.x;
});
addEventListener('mouseup', () => { input.pointerHeld = false; });
canvas.addEventListener('mousemove', e => {
  const p = toLogical(e.clientX, e.clientY);
  input.pointerX = p.x;
});

/* ===== 粒子（swap-pop）與飄字 ===== */
const MAX_PARTS = 300;
let parts = [];
function burst(x,y,color,n,speed){
  for(let i=0;i<n && parts.length<MAX_PARTS;i++){
    const a = Math.random()*TAU, s = (speed||220)*(0.3+Math.random()*0.7);
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-80,life:0.55,max:0.55,color,s:rnd(3,6)});
  }
}
function updateParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p = parts[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 640*dt; p.life -= dt;
    if(p.life<=0){ parts[i]=parts[parts.length-1]; parts.pop(); }
  }
}
function drawParts(){
  for(const p of parts){
    ctx.globalAlpha = Math.max(0, p.life/p.max);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-p.s/2, p.y-p.s/2, p.s, p.s);
  }
  ctx.globalAlpha = 1;
}
let floats = [];
function floatText(x,y,text,color,big){ floats.push({x,y,text,color,life:0.8,max:0.8,big:big||22}); }
function updateFloats(dt){
  for(let i=floats.length-1;i>=0;i--){
    const f = floats[i]; f.y -= 46*dt; f.life -= dt;
    if(f.life<=0){ floats[i]=floats[floats.length-1]; floats.pop(); }
  }
}
function drawFloats(){
  ctx.textAlign='center';
  for(const f of floats){
    ctx.font='900 '+f.big+'px '+FONT;
    ctx.globalAlpha = clamp(f.life/f.max,0,1);
    ctx.lineWidth=4; ctx.strokeStyle='rgba(0,0,0,.45)';
    ctx.strokeText(f.text, f.x, f.y); ctx.fillStyle=f.color; ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

const GROUND_Y = 460;

/* ===== 遊戲狀態 ===== */
let curLevel = 0, score = 0, lives = 3, combo = 0, comboTimer = 0;
let entities = [];
let elapsed = 0, spawnTimer = 0.6;
let shake = 0, freeze = 0, flashT = 0, worldT = 0, hintT = 0;
let wind = 0, windTarget = 0, windTimer = 0;
let frenzyT = 0, frenzyCooldown = 15, lastTickSec = -1;

function spawnItem(forceGood){
  const lv = L();
  const learning = elapsed < 6;                     // 開場安全學習期：無炸彈
  let key;
  const r = Math.random();
  if(!forceGood && !learning && r < lv.badRate) key = Math.random() < 0.6 ? 'bomb' : (curLevel >= 2 ? 'skunk' : 'bomb');
  else if(r > 1 - lv.starRate) key = 'star';
  else key = lv.pool[Math.floor(Math.random()*lv.pool.length)];
  const def = DEFS[key];
  const diffMul = 1 + ss(elapsed, 0, lv.time)*0.3;  // 關卡內緩升
  entities.push({
    def, key, x: rnd(60, GAME_W-60), y: -34,
    vy: 150 * lv.fall * def.speed * diffMul,
    rot: rnd(-0.3,0.3), spin: rnd(-1.6,1.6), wob: rnd(0,TAU), dead:false
  });
}
function currentSpawnInterval(){
  const lv = L();
  let s = lv.spawn * (elapsed < 6 ? 1.5 : 1) * lerp(1, 0.72, ss(elapsed, 0, lv.time));
  if(frenzyT > 0) s /= 3;
  return s;
}
function onCatch(e){
  const bx = basket.x, by = basket.y - basket.h*0.6;
  if(e.def.kind === 'good' || e.def.kind === 'star'){
    combo++; comboTimer = 1.3;
    const comboBonus = combo>=3 ? Math.min(combo-2,5)*5 : 0;
    const gained = e.def.score + comboBonus;
    score += gained;
    basket.mouth = 1;
    if(e.def.kind === 'star'){
      sfx.catchStar();
      burst(bx, by, '#ffcf5c', 20, 260); burst(bx, by, '#fff5d6', 10, 180);
      floatText(bx, by-10, '+'+gained+' 幸運星！', '#ffcf5c', 26);
      basket.sx = 1.35; basket.sy = 0.65;
      shake = Math.max(shake, 5);
    } else {
      sfx.catchGood();
      if(comboBonus > 0) sfx.combo(combo);
      burst(bx, by, '#aee239', 10, 200);
      floatText(bx, by-10, '+'+gained + (comboBonus>0 ? ' 連擊×'+combo : ''), '#fff5d6');
      basket.sx = 1.25; basket.sy = 0.75;
    }
  } else {
    combo = 0;
    lives--;
    sfx.catchBad();
    burst(bx, by, '#d94f45', 18, 260);
    floatText(bx, by-10, e.key==='bomb' ? '砰！炸彈！' : '好臭呀！', '#ff6b5a', 24);
    basket.sx = 0.65; basket.sy = 1.35;
    shake = Math.max(shake, 8);
    freeze = Math.max(freeze, 0.1);
    flashT = 0.45;
    if(lives <= 0){
      sfx.fail();
      setState(failState);
    }
  }
}
function onMiss(e){

}

/* ===== 預先烘焙背景 ===== */
const THEMES = {
  day:  { top:'#8ec9e8', mid:'#bfe3f4', bot:'#e8f6d8', hillFar:'#9cc47c', hillNear:'#6aa04a', ground:'#527f39', trunk:'#7a5230', leaf:'#3f7a34', leaf2:'#5c9e4a', sun:true, stars:false, tint:null },
  dusk: { top:'#4a3a7e', mid:'#b06a9e', bot:'#ffc98a', hillFar:'#7a5a88', hillNear:'#5c4a6a', ground:'#4a5c33', trunk:'#5a3c24', leaf:'#2e5c30', leaf2:'#47804a', sun:'low', stars:false, tint:'rgba(90,50,100,.14)' },
  night:{ top:'#0a1030', mid:'#1c2a55', bot:'#2e3f6e', hillFar:'#232f4a', hillNear:'#1a2438', ground:'#24402a', trunk:'#3a2c1e', leaf:'#1c3a24', leaf2:'#2c5436', sun:'moon', stars:true, tint:'rgba(20,20,60,.2)' }
};
let bakedBG = null, glowGold = null, glowRed = null;
function makeGlow(color, r){
  const c = document.createElement('canvas'); c.width = c.height = r*2;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(r,r,1, r,r,r);
  gr.addColorStop(0,color); gr.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle = gr; g.fillRect(0,0,r*2,r*2);
  return c;
}
glowGold = makeGlow('rgba(255,207,92,.7)', 34);
glowRed = makeGlow('rgba(255,90,74,.55)', 30);
function bakeBG(themeName){
  const T = THEMES[themeName];
  const k = Math.min(devicePixelRatio||1, 2);
  const c = document.createElement('canvas');
  c.width = GAME_W*k; c.height = GAME_H*k;
  const g = c.getContext('2d');
  g.scale(k,k);
  const sky = g.createLinearGradient(0,0,0,GAME_H);
  sky.addColorStop(0,T.top); sky.addColorStop(0.55,T.mid); sky.addColorStop(1,T.bot);
  g.fillStyle = sky; g.fillRect(0,0,GAME_W,GAME_H);
  if(T.stars){
    g.fillStyle = '#e8ecff';
    for(let i=0;i<50;i++){ const x=(i*191)%GAME_W, y=(i*89)%260; g.globalAlpha = 0.3+((i*41)%70)/100; g.fillRect(x,y,2,2); }
    g.globalAlpha = 1;
  }
  if(T.sun === true){ g.fillStyle='#fff3a0'; g.beginPath(); g.arc(150,70,30,0,TAU); g.fill();
    g.globalAlpha=0.3; g.beginPath(); g.arc(150,70,46,0,TAU); g.fill(); g.globalAlpha=1; }
  else if(T.sun === 'low'){ g.fillStyle='#ffcf5c'; g.beginPath(); g.arc(760,180,34,0,TAU); g.fill();
    g.globalAlpha=0.3; g.beginPath(); g.arc(760,180,52,0,TAU); g.fill(); g.globalAlpha=1; }
  else if(T.sun === 'moon'){ g.fillStyle='#f4f0d8'; g.beginPath(); g.arc(780,80,24,0,TAU); g.fill();
    g.fillStyle = T.top; g.beginPath(); g.arc(789,73,19,0,TAU); g.fill(); }
  /* 遠丘（視差遠層） */
  g.fillStyle = T.hillFar;
  g.beginPath(); g.moveTo(0,300);
  for(let x=0;x<=GAME_W;x+=40) g.lineTo(x, 286 - Math.sin(x*0.008)*30 - Math.cos(x*0.02)*10);
  g.lineTo(GAME_W,GAME_H); g.lineTo(0,GAME_H); g.closePath(); g.fill();
  /* 近丘 */
  g.fillStyle = T.hillNear;
  g.beginPath(); g.moveTo(0,360);
  for(let x=0;x<=GAME_W;x+=40) g.lineTo(x, 350 - Math.cos(x*0.01+2)*24);
  g.lineTo(GAME_W,GAME_H); g.lineTo(0,GAME_H); g.closePath(); g.fill();
  /* 果樹兩排（中景） */
  for(const [tx,tscale] of [[80,1.15],[240,0.9],[420,1.05],[600,0.92],[760,1.1],[910,0.88]]){
    const ty = 400;
    g.fillStyle = T.trunk;
    g.fillRect(tx-8*tscale, ty-52*tscale, 16*tscale, 60*tscale);
    g.fillStyle = T.leaf;
    g.beginPath(); g.arc(tx, ty-74*tscale, 40*tscale, 0, TAU); g.fill();
    g.beginPath(); g.arc(tx-30*tscale, ty-56*tscale, 28*tscale, 0, TAU); g.fill();
    g.beginPath(); g.arc(tx+30*tscale, ty-56*tscale, 28*tscale, 0, TAU); g.fill();
    g.fillStyle = T.leaf2;
    g.beginPath(); g.arc(tx-12*tscale, ty-84*tscale, 20*tscale, 0, TAU); g.fill();
    g.beginPath(); g.arc(tx+18*tscale, ty-70*tscale, 16*tscale, 0, TAU); g.fill();
    /* 樹上小果子 */
    g.fillStyle = themeName==='night' ? '#c8a03a' : '#e84a3a';
    for(let f=0;f<5;f++){
      const fa = f*1.3+tx;
      g.beginPath(); g.arc(tx + Math.cos(fa)*26*tscale, ty-70*tscale + Math.sin(fa)*18*tscale, 4*tscale, 0, TAU); g.fill();
    }
  }
  /* 地面 */
  const gg = g.createLinearGradient(0,GROUND_Y,0,GAME_H);
  gg.addColorStop(0, T.ground); gg.addColorStop(1, '#1e3320');
  g.fillStyle = gg; g.fillRect(0, GROUND_Y, GAME_W, GAME_H-GROUND_Y);
  g.fillStyle = 'rgba(0,0,0,.14)'; g.fillRect(0, GROUND_Y, GAME_W, 6);
  g.strokeStyle = 'rgba(255,255,255,.14)'; g.lineWidth = 1.4;
  for(let i=0;i<36;i++){
    const x=(i*167)%GAME_W, y=GROUND_Y+14+(i*53)%58;
    g.beginPath(); g.moveTo(x,y); g.lineTo(x-3,y-7); g.moveTo(x,y); g.lineTo(x+3,y-8); g.stroke();
  }
  if(T.tint){ g.fillStyle = T.tint; g.fillRect(0,0,GAME_W,GAME_H); }
  bakedBG = c;
}

/* ===== 繪圖 ===== */
function rrp(x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function drawBasket(x, y, sx, sy, wobble){
  wobble = wobble || 0;
  ctx.save();
  ctx.translate(x, y + basket.h*0.5);
  ctx.scale(sx, sy);
  ctx.rotate(wobble*0.12);
  ctx.fillStyle = 'rgba(0,0,0,.25)';
  ctx.beginPath(); ctx.ellipse(0, basket.h*0.55, basket.w*0.52, 8, 0, 0, TAU); ctx.fill();
  const bw = basket.w, bh = basket.h*0.64;
  const g = ctx.createLinearGradient(0,-bh/2,0,bh/2);
  g.addColorStop(0,'#c98a4f'); g.addColorStop(1,'#8c5a3c');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(-bw/2, -bh/2); ctx.lineTo(bw/2, -bh/2);
  ctx.lineTo(bw*0.42, bh/2); ctx.lineTo(-bw*0.42, bh/2);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(70,40,10,.5)'; ctx.lineWidth=3; ctx.stroke();
  /* 編織紋 */
  ctx.strokeStyle = 'rgba(70,40,10,.35)'; ctx.lineWidth=1.6;
  for(let i=-2;i<=2;i++){
    ctx.beginPath(); ctx.moveTo(i*bw*0.16, -bh/2+2); ctx.lineTo(i*bw*0.13, bh/2-2); ctx.stroke();
  }
  ctx.beginPath(); ctx.moveTo(-bw*0.46, -bh*0.12); ctx.lineTo(bw*0.46, -bh*0.12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-bw*0.44, bh*0.2); ctx.lineTo(bw*0.44, bh*0.2); ctx.stroke();
  /* 籃口 */
  ctx.fillStyle = '#e8b878';
  ctx.beginPath(); ctx.ellipse(0, -bh/2, bw/2, 9, 0, 0, TAU); ctx.fill();
  ctx.strokeStyle = 'rgba(70,40,10,.5)'; ctx.lineWidth=2.4; ctx.stroke();
  /* 小手臂：接到時舉起 */
  const arm = basket.mouth;
  for(const side of [-1,1]){
    ctx.save();
    ctx.translate(side*bw*0.5, -bh*0.1);
    ctx.rotate(side*(0.5 - arm*1.1));
    ctx.strokeStyle = '#8c5a3c'; ctx.lineWidth = 5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(side*14, -10); ctx.stroke();
    ctx.fillStyle = '#e8b878'; ctx.beginPath(); ctx.arc(side*15, -11, 4.4, 0, TAU); ctx.fill();
    ctx.restore();
  }
  /* 臉：眼睛看移動方向＋眨眼＋接到嘴巴開心 */
  const eyeY = -bh/2 - 3;
  const blink = basket.blink < 0.1;
  for(const side of [-1,1]){
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(side*15, eyeY, 7.4, 0, TAU); ctx.fill();
    ctx.strokeStyle = 'rgba(40,30,20,.4)'; ctx.lineWidth=1.4; ctx.stroke();
    if(blink){
      ctx.strokeStyle = '#2a2016'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(side*15-3.4, eyeY); ctx.lineTo(side*15+3.4, eyeY); ctx.stroke();
    } else {
      ctx.fillStyle = '#2a2016';
      ctx.beginPath(); ctx.arc(side*15 + wobble*3.4, eyeY+1, 3.8, 0, TAU); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(side*15 + wobble*3.4+1.2, eyeY-0.4, 1.2, 0, TAU); ctx.fill();
    }
  }
  ctx.strokeStyle = '#2a2016'; ctx.lineWidth = 2.2; ctx.lineCap='round';
  ctx.beginPath();
  if(basket.mouth > 0.3){
    ctx.fillStyle = '#5c2f22';
    ctx.arc(0, eyeY+7, 5+basket.mouth*3, 0, Math.PI); ctx.fill();
  } else {
    ctx.arc(0, eyeY+6, 8, 0.15*Math.PI, 0.85*Math.PI);
  }
  ctx.stroke();
  ctx.restore();
}
function drawItem(e){
  const img = IMG[e.def.img];
  const size = e.key==='melon' || e.key==='pine' ? 52 : 44;
  /* 地面預測陰影（公平輔助） */
  ctx.fillStyle = 'rgba(0,0,0,.18)';
  const shScale = clamp(1 - (GROUND_Y - e.y)/GROUND_Y, 0.25, 1);
  ctx.beginPath(); ctx.ellipse(e.x, GROUND_Y+6, 16*shScale+6, 4.4*shScale+1.5, 0, 0, TAU); ctx.fill();
  ctx.save();
  ctx.translate(e.x, e.y + Math.sin(e.wob)*3);
  if(e.def.kind === 'star') ctx.drawImage(glowGold, -34, -34);
  else if(e.def.kind === 'bad') ctx.drawImage(glowRed, -30, -30);
  ctx.rotate(e.rot);
  if(img.complete && img.naturalWidth) ctx.drawImage(img, -size/2, -size/2, size, size);
  ctx.restore();
}
function drawHeart(x,y,s,fill){
  ctx.save(); ctx.translate(x,y); ctx.scale(s,s);
  ctx.beginPath();
  ctx.moveTo(0,3);
  ctx.bezierCurveTo(-8,-6,-2,-11,0,-6);
  ctx.bezierCurveTo(2,-11,8,-6,0,3);
  ctx.closePath();
  ctx.fillStyle = fill; ctx.fill();
  ctx.lineWidth = 1.4; ctx.strokeStyle = 'rgba(0,0,0,.35)'; ctx.stroke();
  ctx.restore();
}
function drawStarShape(x,y,r,fill,rot){
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot||0);
  ctx.beginPath();
  for(let i=0;i<10;i++){
    const rr = i%2===0 ? r : r*0.46;
    const a = -Math.PI/2 + i*Math.PI/5;
    ctx.lineTo(Math.cos(a)*rr, Math.sin(a)*rr);
  }
  ctx.closePath();
  ctx.fillStyle = fill; ctx.fill();
  ctx.lineWidth = r*0.14; ctx.strokeStyle = 'rgba(90,60,0,.5)'; ctx.stroke();
  ctx.restore();
}
function drawButton(b, hot){

  else { g.addColorStop(0,'rgba(110,170,80,.95)'); g.addColorStop(1,'rgba(46,86,44,.95)'); }

/* 螢火蟲（夜關）與風葉 */
let motes = [];
function initMotes(n){ motes = []; for(let i=0;i<n;i++) motes.push({x:rnd(0,GAME_W), y:rnd(80,440), p:rnd(0,TAU), v:rnd(6,16)}); }
function drawMotes(){
  if(L().theme !== 'night') return;
  ctx.fillStyle = '#ffe98a';
  for(const m of motes){
    const a = 0.3 + 0.7*Math.abs(Math.sin(worldT*1.4 + m.p));
    ctx.globalAlpha = a*0.8;
    ctx.beginPath(); ctx.arc(m.x + Math.sin(worldT*m.v*0.1+m.p)*20, m.y + Math.cos(worldT*0.6+m.p)*12, 2.2, 0, TAU); ctx.fill();
  }
  ctx.globalAlpha = 1;
}
function drawWind(){
  if(Math.abs(wind) < 12) return;
  ctx.strokeStyle = 'rgba(255,255,255,.35)'; ctx.lineWidth = 2; ctx.lineCap='round';
  const d = Math.sign(wind);
  for(let i=0;i<5;i++){
    const y = 90 + i*70 + Math.sin(worldT*3+i)*10;
    const x = ((worldT*Math.abs(wind)*3 + i*220) % (GAME_W+160)) - 80;
    const px = d>0 ? x : GAME_W-x;
    ctx.beginPath();
    ctx.moveTo(px, y);
    ctx.quadraticCurveTo(px+30*d, y-6, px+58*d, y);
    ctx.stroke();
  }
}
function drawScene(){
  if(bakedBG) ctx.drawImage(bakedBG, 0, 0, GAME_W, GAME_H);
  drawMotes();
  ctx.save();
  ctx.translate((Math.random()*2-1)*shake, (Math.random()*2-1)*shake);
  for(const e of entities) drawItem(e);
  drawBasket(basket.x, basket.y, basket.sx, basket.sy, basket.wobble);
  drawParts();
  ctx.restore();
  drawWind();
  drawFloats();

function drawHUD(){
  const lv = L();
  const [t1,t2,t3] = starThresholds();
  /* 分數進度條 */
  const bx = 20, bw2 = 320, by = 20, bh2 = 22;
  ctx.fillStyle = 'rgba(0,0,0,.4)'; rrp(bx,by,bw2,bh2,11); ctx.fill();
  const prog = clamp(score/t3, 0, 1);
  if(prog > 0){
    const g = ctx.createLinearGradient(bx,0,bx+bw2,0);
    g.addColorStop(0,'#aee239'); g.addColorStop(1,'#ffcf5c');
    ctx.fillStyle = g;
    rrp(bx,by,Math.max(bw2*prog, bh2),bh2,11); ctx.fill();
  }
  for(const [t,i] of [[t1,1],[t2,2],[t3,3]]){
    const mx = bx + bw2 * t/t3;
    drawStarShape(mx-2, by+bh2/2, 8, score>=t ? '#ffcf5c' : 'rgba(255,255,255,.4)');
  }
  ctx.textAlign='left'; ctx.font='900 18px '+FONT;
  ctx.lineWidth=4; ctx.strokeStyle='rgba(0,0,0,.45)';
  ctx.strokeText('分數 '+score+' / 目標 '+t1, bx+4, by+bh2+22);
  ctx.fillStyle='#fff5d6'; ctx.fillText('分數 '+score+' / 目標 '+t1, bx+4, by+bh2+22);
  /* 倒數計時 */
  const remain = Math.max(0, lv.time - elapsed);
  ctx.textAlign='center'; ctx.font='900 30px '+FONT;
  const urgent = remain <= 5.5;
  ctx.lineWidth=5; ctx.strokeStyle='rgba(0,0,0,.45)';
  ctx.strokeText(Math.ceil(remain)+'', GAME_W/2, 44);
  ctx.fillStyle = urgent ? (Math.sin(worldT*10)>0?'#ff6b5a':'#fff') : '#fff';
  ctx.fillText(Math.ceil(remain)+'', GAME_W/2, 44);
  ctx.font='700 14px '+FONT; ctx.fillStyle='#ffffffbb';
  ctx.fillText('第'+(curLevel+1)+'關 '+lv.name, GAME_W/2, 66);
  /* 生命 */
  for(let i=0;i<3;i++) drawHeart(GAME_W-150+i*28, 30, 2.2, i<lives ? '#ff5a6e' : 'rgba(255,255,255,.25)');
  if(combo >= 3){
    ctx.font='900 20px '+FONT; ctx.fillStyle='#aee239';
    ctx.globalAlpha = clamp(comboTimer/1.3,0,1);
    ctx.fillText(combo+' 連擊！', GAME_W/2, 96);
    ctx.globalAlpha = 1;
  }
  if(frenzyT > 0){
    ctx.font='900 26px '+FONT;
    ctx.fillStyle = '#ffcf5c';
    ctx.globalAlpha = 0.7+0.3*Math.sin(worldT*8);
    ctx.fillText('黃金果雨！', GAME_W/2, 130);
    ctx.globalAlpha = 1;
  }
}

/* ===== 狀態機 ===== */
let state = null;
function setState(s){ state = s; if(s.enter) s.enter(); }
const hintEl = document.getElementById('hint');

const titleState = {
  name:'title', t:0,
  enter(){ this.t = 0;
    curLevel = 0;
    bakeBG('day'); initMotes(0);
    entities = []; resetBasket();
    this._btn = [{ x:GAME_W/2-140, y:400, w:280, h:64, label:'開始冒險', gold:true, fs:26, cb:()=> setState(selectState) }];
  },
  buttons(){ return this._btn; },
  update(dt){
    this.t += dt; worldT += dt;
    basket.blink -= dt; if(basket.blink < -0.12) basket.blink = rnd(1.6,3.4);
    if(input.confirm){ input.confirm = false; sfx.ui(); setState(selectState); }
  },
  draw(){
    drawScene();
    ctx.fillStyle = 'rgba(10,20,12,.4)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.textAlign='center';
    const bob = Math.sin(this.t*2)*6;
    ctx.save();
    ctx.translate(GAME_W/2, 120+bob);
    ctx.font='900 58px '+FONT;
    ctx.lineWidth=10; ctx.strokeStyle='#204631';
    ctx.strokeText('接水果大冒險', 0, 0);
    const g = ctx.createLinearGradient(0,-34,0,20);
    g.addColorStop(0,'#fff5d6'); g.addColorStop(1,'#aee239');
    ctx.fillStyle = g; ctx.fillText('接水果大冒險', 0, 0);
    ctx.font='900 22px '+FONT; ctx.fillStyle='#ffcf5c';
    ctx.fillText('PRO 版　5 大果園關卡 × 星星評分 × 黃金果雨', 0, 42);
    ctx.restore();
    /* 掉落預覽 */
    const previews = ['apple','banana','grapes','star'];
    previews.forEach((k,i)=>{
      const img = IMG[k];
      const x = GAME_W/2 - 150 + i*100;
      const y = 262 + Math.sin(this.t*2.4 + i)*10;
      if(k==='star') ctx.drawImage(glowGold, x-34, y-34);
      if(img.complete && img.naturalWidth) ctx.drawImage(img, x-24, y-24, 48, 48);
    });
    ctx.font='700 20px '+FONT; ctx.fillStyle='#f4ffe8';
    ctx.fillText('💻 電腦：← → 移動籃子', GAME_W/2, 324);
    ctx.fillText('📱 平板：手指左右拖曳', GAME_W/2, 352);
    ctx.font='700 16px '+FONT; ctx.fillStyle='#ffe9b0';
    ctx.fillText('接水果得分、接幸運星大加分；炸彈和臭鼬千萬別接！', GAME_W/2, 384);
    const total = stars.reduce((a,b)=>a+b,0);
    if(total > 0 || best > 0){
      ctx.fillStyle='#ffcd75';
      ctx.fillText('累計星星 '+total+' / 15　最佳分數 '+best, GAME_W/2, 486);
    }
    drawButton(this._btn[0], Math.sin(this.t*4)>0);
    ctx.font='700 14px '+FONT; ctx.fillStyle='#ffffff99';
    ctx.fillText('按 M 或右上角按鈕切換音效', GAME_W/2, GAME_H-14);
  }
};

const selectState = {
  name:'select', t:0, sel:0,
  enter(){ this.t = 0;
    this.sel = 0;
    for(let i=4;i>=0;i--) if(unlocked(i)){ this.sel = i; break; }
    const bts = [];
    for(let i=0;i<5;i++){
      const x = GAME_W/2 - 5*168/2 + i*168 + 10;
      bts.push({ x, y:180, w:148, h:180, label:'', lv:i, disabled:!unlocked(i), cb:()=>{ if(unlocked(i)) startLevel(i); } });
    }
    bts.push({ x:24, y:GAME_H-76, w:150, h:56, label:'回標題', fs:20, cb:()=> setState(titleState) });
    this._btn = bts;
  },
  buttons(){ return this._btn; },
  update(dt){
    this.t += dt; worldT += dt;
    if(input.navL){ input.navL = false; do{ this.sel = (this.sel+4)%5; }while(!unlocked(this.sel)); sfx.ui(); }
    if(input.navR){ input.navR = false;
      let n = this.sel;
      for(let k=1;k<=4;k++){ const c=(this.sel+k)%5; if(unlocked(c)){ n=c; break; } }
      if(n!==this.sel){ this.sel=n; sfx.ui(); } }
    if(input.confirm){ input.confirm = false; if(unlocked(this.sel)){ sfx.ui(); startLevel(this.sel); } }
  },
  draw(){
    drawScene();
    ctx.fillStyle = 'rgba(10,20,12,.55)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.textAlign='center';
    ctx.font='900 40px '+FONT;
    ctx.lineWidth=8; ctx.strokeStyle='#204631';
    ctx.strokeText('選擇果園', GAME_W/2, 92);
    ctx.fillStyle='#f4ffe8'; ctx.fillText('選擇果園', GAME_W/2, 92);
    ctx.font='700 17px '+FONT; ctx.fillStyle='#ffe9b0';
    ctx.fillText('時間內達到目標分數過關；分數愈高星星愈多！', GAME_W/2, 128);
    for(const b of this._btn){
      if(b.lv === undefined){ drawButton(b,false); continue; }
      const i = b.lv, lv = LEVELS[i];
      drawButton(b, this.sel===i && unlocked(i));
      ctx.textAlign='center';
      ctx.font='900 30px '+FONT;
      ctx.fillStyle = b.disabled ? 'rgba(230,240,230,.5)' : '#fff';
      ctx.fillText(String(i+1), b.x+b.w/2, b.y+44);
      ctx.font='900 19px '+FONT;
      ctx.fillText(b.disabled ? '未解鎖' : lv.name, b.x+b.w/2, b.y+76);
      ctx.font='700 13px '+FONT;
      ctx.fillStyle = b.disabled ? 'rgba(230,240,230,.4)' : '#e8f6d8';
      ctx.fillText(b.disabled ? '先通過上一關' : (lv.time+'秒 目標'+lv.target), b.x+b.w/2, b.y+100);
      ctx.fillText(b.disabled ? '' : lv.desc, b.x+b.w/2, b.y+122);
      for(let s2=0;s2<3;s2++){
        const sx = b.x+b.w/2 + (s2-1)*30;
        drawStarShape(sx, b.y+152, 12, s2 < stars[i] ? '#ffcf5c' : 'rgba(255,255,255,.2)');
      }
      if(b.disabled){
        ctx.fillStyle = 'rgba(230,240,235,.75)';
        rrp(b.x+b.w/2-11, b.y+12, 22, 17, 3); ctx.fill();
        ctx.strokeStyle = 'rgba(230,240,235,.75)'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(b.x+b.w/2, b.y+12, 7, Math.PI, 0); ctx.stroke();
      }
    }
    ctx.font='700 14px '+FONT; ctx.fillStyle='#ffffff99'; ctx.textAlign='center';
    ctx.fillText('← → 選關、空白鍵開始；或直接點關卡', GAME_W/2, GAME_H-18);
  }
};
function unlocked(i){ return i===0 || stars[i-1] > 0; }
function startLevel(i){
  curLevel = clamp(i,0,4);
  bakeBG(L().theme);
  initMotes(L().theme==='night' ? 18 : 0);
  setState(playState);
}

const playState = {
  name:'play', t:0,
  enter(){
    this.t = 0;
    score = 0; lives = 3; combo = 0; comboTimer = 0;
    entities = []; parts.length = 0; floats.length = 0;
    elapsed = 0; spawnTimer = 0.7;
    shake = 0; freeze = 0; flashT = 0; hintT = 4;
    wind = 0; windTarget = 0; windTimer = 0;
    frenzyT = 0; frenzyCooldown = 15; lastTickSec = -1;
    resetBasket();
    hintEl.textContent = '💻 ← → 移動　📱 手指拖曳｜接水果、避開炸彈臭鼬！';
    hintEl.classList.add('show');
  },
  buttons(){ return []; },
  update(dt){
    this.t += dt; worldT += dt;
    if(hintT > 0){ hintT -= dt; if(hintT <= 0) hintEl.classList.remove('show'); }
    if(freeze > 0){ freeze -= dt; return; }
    const lv = L();
    elapsed += dt;

    /* 風（第4關起） */
    if(lv.wind){
      windTimer -= dt;
      if(windTimer <= 0){ windTimer = rnd(3.5,6); windTarget = rnd(-1,1) > 0 ? rnd(30,80)*lv.wind : -rnd(30,80)*lv.wind; }
      wind += (windTarget - wind) * (1 - Math.pow(0.05, dt));
    } else wind = 0;

    /* 黃金果雨（第5關）：每 15 秒關卡時間觸發一波 */
    if(lv.frenzy){
      if(frenzyT > 0){ frenzyT -= dt; }
      else if(elapsed >= frenzyCooldown){
        frenzyT = 4; frenzyCooldown += 15;
        sfx.frenzy();
        floatText(GAME_W/2, 200, '黃金果雨開始！', '#ffcf5c', 30);
      }
    }

    /* 移動：鍵盤 */
    const ACC = 2600, MAXV = 460, DEC = 3200;
    if(input.left && !input.right) basket.vx -= ACC*dt;
    else if(input.right && !input.left) basket.vx += ACC*dt;
    else if(!(input.pointerHeld && input.pointerX !== null)){
      const s = Math.sign(basket.vx);
      basket.vx -= s*Math.min(Math.abs(basket.vx), DEC*dt);
    }
    /* 移動：拖曳跟隨 */
    if(input.pointerHeld && input.pointerX !== null && !input.left && !input.right){
      const target = clamp(input.pointerX, basket.w/2, GAME_W-basket.w/2);
      basket.vx = clamp((target - basket.x) * 14, -900, 900);
    }
    if(!(input.pointerHeld && input.pointerX !== null)) basket.vx = clamp(basket.vx, -MAXV, MAXV);
    basket.x = clamp(basket.x + basket.vx*dt, basket.w/2, GAME_W-basket.w/2);
    basket.wobble = clamp(basket.vx/MAXV, -1.4, 1.4);
    basket.sx += (1-basket.sx)*10*dt; basket.sy += (1-basket.sy)*10*dt;
    basket.blink -= dt; if(basket.blink < -0.12) basket.blink = rnd(1.6,3.4);
    basket.mouth = Math.max(0, basket.mouth - dt*3);

    /* 出怪 */
    spawnTimer -= dt;
    if(spawnTimer <= 0){
      spawnItem(frenzyT > 0);
      spawnTimer = currentSpawnInterval() * rnd(0.85,1.15);
    }
    if(comboTimer > 0){ comboTimer -= dt; if(comboTimer <= 0) combo = 0; }

    /* 物件更新與接取 */
    const catchY = basket.y - basket.h*0.3;
    const catchHalfW = basket.w*0.46;
    for(const e of entities){
      if(e.dead) continue;
      e.y += e.vy*dt;
      e.x = clamp(e.x + wind*dt*(e.def.kind==='star'?0.6:1), 20, GAME_W-20);
      e.rot += e.spin*dt; e.wob += dt*3;
      if(e.y > catchY-12 && e.y < catchY+36 && Math.abs(e.x - basket.x) < catchHalfW){
        e.dead = true; onCatch(e);
        if(state !== playState) return;
        continue;
      }
      if(e.y > GAME_H+40){
        e.dead = true;
        if(e.def.kind !== 'bad') onMiss(e);
      }
    }
    entities = entities.filter(e => !e.dead);

    updateParts(dt); updateFloats(dt);
    shake *= Math.pow(0.001, dt);
    flashT = Math.max(0, flashT - dt*3);

    /* 最後 5 秒滴答 */
    const remain = lv.time - elapsed;
    if(remain <= 5 && remain > 0){
      const sec = Math.ceil(remain);
      if(sec !== lastTickSec){ lastTickSec = sec; sfx.tick(); }
    }
    /* 時間到：結算 */
    if(elapsed >= lv.time){
      if(score >= lv.target){ setState(resultState); }
      else { sfx.fail(); setState(failState); }
    }
    input.confirm = false;
  },
  draw(){
    drawScene();
    drawHUD();
    if(flashT > 0){
      ctx.globalAlpha = flashT; ctx.fillStyle = '#ff5a4a';
      ctx.fillRect(0,0,GAME_W,GAME_H); ctx.globalAlpha = 1;
    }
    if(frenzyT > 0){
      ctx.globalAlpha = 0.08 + 0.04*Math.sin(worldT*8);
      ctx.fillStyle = '#ffcf5c'; ctx.fillRect(0,0,GAME_W,GAME_H);
      ctx.globalAlpha = 1;
    }
  }
};

const resultState = {
  name:'result', t:0,
  enter(){
    this.t = 0;
    sfx.clear();
    const [t1,t2,t3] = starThresholds();
    this.starGot = score >= t3 ? 3 : score >= t2 ? 2 : 1;
    this._played = 0;
    if(this.starGot > stars[curLevel]){ stars[curLevel] = this.starGot; saveStars(); }
    if(score > best){ best = score; LS.set('fruitpro_best', String(best)); }
    hintEl.classList.remove('show');
    const hasNext = curLevel < 4;
    const bts = [];
    bts.push({ x:GAME_W/2-250, y:400, w:150, h:58, label:'再玩一次', fs:20, cb:()=> startLevel(curLevel) });
    bts.push({ x:GAME_W/2-70, y:400, w:140, h:58, label:'選關畫面', fs:20, cb:()=> setState(selectState) });
    if(hasNext) bts.push({ x:GAME_W/2+90, y:400, w:160, h:58, label:'下一關 ▶', gold:true, fs:20, cb:()=> startLevel(curLevel+1) });
    this._btn = bts;
    /* 慶祝彩帶 */
    for(let i=0;i<3;i++) burst(rnd(200,760), rnd(120,260), ['#aee239','#ffcf5c','#ff6cc7'][i], 16, 260);
  },
  buttons(){ return this.t > 0.4 ? this._btn : []; },
  update(dt){
    this.t += dt; worldT += dt;
    updateParts(dt); updateFloats(dt);
    shake *= Math.pow(0.001, dt);
    const n = Math.floor(ss(this.t, 0.4, 1.6) * this.starGot);
    while(this._played < n){ this._played++; sfx.star(this._played); burst(GAME_W/2+(this._played-2)*64, 262, '#ffcf5c', 12, 200); }
    if(this.t > 0.6 && input.confirm){
      input.confirm = false; sfx.ui();
      if(curLevel < 4) startLevel(curLevel+1); else startLevel(curLevel);
    }
  },
  draw(){
    drawScene();
    ctx.fillStyle = 'rgba(10,22,12,.62)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.textAlign='center';
    const pop = easeOutBack(clamp(this.t*2.2,0,1));
    ctx.save();
    ctx.translate(GAME_W/2, 150); ctx.scale(pop,pop);
    ctx.font='900 46px '+FONT;
    ctx.lineWidth=9; ctx.strokeStyle='#204631';
    const msg = curLevel===4 ? '全部通關！豐收大師！' : '第'+(curLevel+1)+'關 豐收成功！';
    ctx.strokeText(msg, 0, 0);
    ctx.fillStyle='#fff5d6'; ctx.fillText(msg, 0, 0);
    ctx.restore();
    ctx.font='700 20px '+FONT; ctx.fillStyle='#e8f6d8';
    ctx.fillText(L().name, GAME_W/2, 192);
    for(let i=0;i<3;i++){
      const on = i < this._played;
      const k = on ? easeOutBack(clamp((this.t-0.4-i*0.4)*3,0,1)) : 1;
      drawStarShape(GAME_W/2+(i-1)*64, 258, on ? 26*k : 24, on ? '#ffcf5c' : 'rgba(255,255,255,.18)', on ? Math.sin(worldT*2+i)*0.1 : 0);
    }
    ctx.font='700 24px '+FONT; ctx.fillStyle='#aee239';
    ctx.fillText('本關分數：'+score, GAME_W/2, 328);
    ctx.fillStyle='#ffcd75';
    ctx.fillText('最佳分數：'+best, GAME_W/2, 362);
    for(const b of this.buttons()) drawButton(b, false);
    if(this.t > 0.6){
      ctx.font='700 14px '+FONT; ctx.fillStyle='#ffffff99';
      ctx.fillText('空白鍵＝'+(curLevel<4?'下一關':'再玩一次'), GAME_W/2, 490);
    }
  }
};

const failState = {
  name:'fail', t:0,
  enter(){
    this.t = 0;
    if(score > best){ best = score; LS.set('fruitpro_best', String(best)); }
    hintEl.classList.remove('show');
    this._btn = [
      { x:GAME_W/2-190, y:388, w:180, h:60, label:'再挑戰一次', gold:true, fs:21, cb:()=> startLevel(curLevel) },
      { x:GAME_W/2+10, y:388, w:180, h:60, label:'選關畫面', fs:21, cb:()=> setState(selectState) }
    ];
  },
  buttons(){ return this.t > 0.5 ? this._btn : []; },
  update(dt){
    this.t += dt; worldT += dt;
    updateParts(dt); updateFloats(dt);
    shake *= Math.pow(0.001, dt);
    if(this.t > 0.5 && input.confirm){ input.confirm = false; startLevel(curLevel); }
  },
  draw(){
    drawScene();
    ctx.fillStyle = 'rgba(12,20,12,.62)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.textAlign='center';
    const pop = easeOutBack(clamp(this.t*2.2,0,1));
    ctx.save();
    ctx.translate(GAME_W/2, 196); ctx.scale(pop,pop);
    ctx.font='900 44px '+FONT;
    ctx.lineWidth=8; ctx.strokeStyle='#204631';
    ctx.strokeText('再挑戰一次！', 0, 0);
    ctx.fillStyle='#fff5d6'; ctx.fillText('再挑戰一次！', 0, 0);
    ctx.restore();
    ctx.font='700 18px '+FONT; ctx.fillStyle='#ffe9b0';
    const diff = L().target - score;
    ctx.fillText(lives<=0 ? '炸彈太調皮了，下次躲開它！' : ('只差 '+diff+' 分就過關，你一定可以！'), GAME_W/2, 244);
    ctx.font='700 24px '+FONT;
    ctx.fillStyle='#aee239'; ctx.fillText('本次分數：'+score+'（目標 '+L().target+'）', GAME_W/2, 296);
    ctx.fillStyle='#ffcd75'; ctx.fillText('最佳分數：'+best, GAME_W/2, 332);
    for(const b of this.buttons()) drawButton(b, false);
  }
};

/* ===== 主迴圈 ===== */
const STEP = 1/60;
let last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while(acc >= STEP){
    state.update(STEP);
    acc -= STEP;
  }
  state.draw();
}
setState(titleState);
requestAnimationFrame(frame);

/* ===== 測試掛鉤 ===== */
window.__test = {
  get state(){ return state.name; },
  get score(){ return score; },
  get lives(){ return lives; },
  get level(){ return curLevel; },
  get elapsed(){ return elapsed; },
  get basketX(){ return basket.x; },
  get stars(){ return stars.slice(); },
  get entityCount(){ return entities.length; },
  get frenzy(){ return frenzyT; },
  get buttons(){ return activeButtons().map(b=>({label:b.label, x:b.x+b.w/2, y:b.y+b.h/2, w:b.w, h:b.h, disabled:!!b.disabled})); },
  startLevel(i){ startLevel(i); },
  goSelect(){ setState(selectState); },
  addScore(n){ score += n; },
  dropItem(key, x){ const def = DEFS[key]; entities.push({ def, key, x:x!==undefined?x:basket.x, y:basket.y-basket.h*0.3-40, vy:200, rot:0, spin:0, wob:0, dead:false }); },
  setTime(t){ elapsed = t; },
  tick(s){ const n = Math.round((s||1)*60); for(let i=0;i<n;i++) state.update(STEP); }
};
</script>
