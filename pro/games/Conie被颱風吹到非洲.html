<!doctype html>
<!-- 專業AI升級 v2 -->
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Conie 被颱風吹到非洲</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b1020;
    font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", sans-serif;
    -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; touch-action: none; }
  #stage { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
  canvas { display: block; touch-action: none; }
  /* ===== HUD ===== */
  #hud { position: absolute; top: 10px; left: 12px; right: 12px; display: flex; align-items: center; gap: 10px;
    color: #fff; pointer-events: none; text-shadow: 0 1px 3px rgba(0,0,0,.65); font-size: 15px; font-weight: bold; }
  #hudL, #hudR { display: flex; align-items: center; gap: 10px; white-space: nowrap; }
  #barWrap { flex: 1; position: relative; height: 14px; background: rgba(10,16,38,.45);
    border: 1px solid rgba(255,255,255,.35); border-radius: 999px; overflow: visible; }
  #barFill { height: 100%; width: 0%; border-radius: 999px; transition: width .2s ease-out;
    background: linear-gradient(90deg,#7fd1ff,#ffd27f,#ff9f7f,#9be27f); }
  #barIcon { position: absolute; top: 50%; left: 0%; transform: translate(-50%,-54%); font-size: 20px;
    transition: left .2s ease-out; filter: drop-shadow(0 1px 2px rgba(0,0,0,.5)); }
  #barTW { position: absolute; left: 4px;  top: -18px; font-size: 11px; opacity: .9; }
  #barAF { position: absolute; right: 4px; top: -18px; font-size: 11px; opacity: .9; }
  /* ===== 靜音鈕 ===== */
  #muteBtn { position: absolute; right: 10px; bottom: 10px; z-index: 30; width: 48px; height: 48px;
    border-radius: 50%; border: 2px solid rgba(255,255,255,.5); background: rgba(12,18,40,.55); color: #fff;
    font-size: 20px; cursor: pointer; padding: 0; transition: transform .15s ease; }
  #muteBtn:active { transform: scale(.88); }
  /* ===== 覆蓋層（選單 / 結束）===== */
  .ov { position: absolute; inset: 0; z-index: 20; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; color: #fff; gap: 14px; padding: 24px;
    background: radial-gradient(ellipse at center, rgba(10,16,40,.62), rgba(4,7,20,.86));
    opacity: 1; transform: translateY(0) scale(1);
    transition: opacity .35s cubic-bezier(.22,1,.36,1), transform .35s cubic-bezier(.22,1,.36,1); }
  .ov.hidden { opacity: 0; transform: translateY(24px) scale(.97); pointer-events: none; }
  .ov h1 { margin: 0; font-size: clamp(22px, 5vw, 42px); text-shadow: 0 3px 10px rgba(0,0,0,.5); }
  .ov p { margin: 0; font-size: clamp(13px, 2.6vw, 17px); opacity: .92; max-width: 520px; line-height: 1.7; }
  .ov .stats { display: flex; gap: 18px; font-size: clamp(14px, 3vw, 20px);
    background: rgba(255,255,255,.1); padding: 10px 22px; border-radius: 14px; }
  .ov .hint { font-size: 12px; opacity: .65; }
  .ov .ctrlBox { background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25);
    border-radius: 14px; padding: 10px 20px; font-size: clamp(13px, 2.8vw, 16px); line-height: 1.9; }
  .ov .ctrlBox b { color: #ffe08a; }
  .ov .ctrlBox .sub { font-size: clamp(11px, 2.2vw, 13px); opacity: .75; }
  .btn { font-family: inherit; font-size: clamp(16px, 3.4vw, 20px); padding: 13px 34px; border-radius: 999px;
    border: none; border-bottom: 4px solid #c99400; background: linear-gradient(180deg,#ffe08a,#ffce54);
    color: #3a2a00; font-weight: bold; cursor: pointer; box-shadow: 0 6px 18px rgba(255,206,84,.35);
    transition: transform .15s cubic-bezier(.34,1.56,.64,1), box-shadow .15s ease; }
  .btn:hover { transform: translateY(-2px) scale(1.04); box-shadow: 0 9px 22px rgba(255,206,84,.45); }
  .btn:active { transform: translateY(2px) scale(.95); border-bottom-width: 2px; }
  .hiddenEl { display: none !important; }
</style>
</head>
<body>
<div id="stage">
  <canvas id="game"></canvas>
  <div id="hud" class="hiddenEl">
    <div id="hudL"><span id="hearts">❤️❤️❤️</span><span>🪙 <span id="coinN">0</span></span></div>
    <div id="barWrap">
      <span id="barTW">🇹🇼 台灣</span><span id="barAF">非洲 🌍</span>
      <div id="barFill"></div><div id="barIcon">🌀</div>
    </div>
    <div id="hudR"><span>分數 <span id="scoreN">0</span></span></div>
  </div>
  <div id="menuOv" class="ov">
    <h1>🌀 Conie 被颱風吹到非洲</h1>
    <p>
      鍋蓋頭 Conie 被巴威颱風從台灣一路吹向非洲！<br>
      上下移動閃避烏雲、碎片與閃電，順路撿金幣 🪙，<br>
      撐過印度洋、飛越撒哈拉，就能平安降落非洲大陸！
    </p>
    <div class="ctrlBox">
      <div>💻 電腦：<b>↑ ↓ 或 W S</b> 上下移動，空白鍵開始</div>
      <div>📱 平板：<b>手指按住畫面拖曳</b>，Conie 跟著移動</div>
      <div class="sub">閃開烏雲⛈️碎片🪵禿鷹🦅，撿 🪙🛡️⭐　Ｍ鍵靜音</div>
    </div>
    <div class="stats hiddenEl" id="menuBest">🏆 最佳分數：<b id="menuBestN">0</b></div>
    <button class="btn" id="startBtn">開始被吹飛 🚀</button>
  </div>
  <div id="endOv" class="ov hidden">
    <h1 id="endTitle"></h1>
    <p id="endText"></p>
    <div class="stats"><span>🪙 <b id="endCoins">0</b></span><span>分數 <b id="endScore">0</b></span><span>🏆 最佳 <b id="endBest">0</b></span></div>
    <button class="btn" id="againBtn">再玩一次 🔁</button>
  </div>
  <button id="muteBtn" title="靜音">🔊</button>
</div>
<script>
'use strict';
/* =====================================================================
   Conie 被颱風吹到非洲 —— 專業 AI 升級版
   固定時間步進 + 狀態機 + Web Audio 合成音效 + 粒子/震動/hit-stop
   ===================================================================== */

// ---------- 基本設定：邏輯解析度，等比縮放到螢幕 ----------
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const stage = document.getElementById('stage');

function resize(){
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = Math.round(GAME_W * scale * dpr);
  canvas.height = Math.round(GAME_H * scale * dpr);
  canvas.style.width  = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  stage.style.width  = GAME_W * scale + 'px';
  stage.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale;
}
addEventListener('resize', resize); resize();

// ---------- 小工具 ----------
const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
const lerp  = (a, b, t) => a + (b - a) * t;
const rand  = (a, b) => a + Math.random() * (b - a);
const TAU = Math.PI * 2;
function lerpC(a, b, t){ return [Math.round(lerp(a[0],b[0],t)), Math.round(lerp(a[1],b[1],t)), Math.round(lerp(a[2],b[2],t))]; }
function rgb(c){ return 'rgb(' + c[0] + ',' + c[1] + ',' + c[2] + ')'; }
const easeOutBack = t => 1 + 2.7 * Math.pow(t - 1, 3) + 1.7 * Math.pow(t - 1, 2);
const easeOutCubic = t => 1 - Math.pow(1 - t, 3);

// ---------- 音效：Web Audio 合成（零音檔）----------
let AC = null;
let muted = localStorage.getItem('conie_africa_muted') === '1';
function audio(){
  if(!AC){
    try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){ return null; }
  }
  if(AC && AC.state === 'suspended') AC.resume();
  return AC;
}
addEventListener('pointerdown', audio, { once:true });
addEventListener('keydown', audio, { once:true });

function beep(freq, dur, type, vol, slide, delay){
  if(muted) return;
  const ac = audio(); if(!ac) return;
  dur = dur || 0.1; type = type || 'square'; vol = vol || 0.12; slide = slide || 0; delay = delay || 0;
  const t0 = ac.currentTime + delay;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), t0 + dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0 + 0.008);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(g).connect(ac.destination);
  o.start(t0); o.stop(t0 + dur + 0.02);
}
function noiseBurst(dur, vol, cutoff, delay){
  if(muted) return;
  const ac = audio(); if(!ac) return;
  dur = dur || 0.3; vol = vol || 0.25; cutoff = cutoff || 900; delay = delay || 0;
  const n = Math.floor(ac.sampleRate * dur);
  const buf = ac.createBuffer(1, n, ac.sampleRate);
  const d = buf.getChannelData(0);
  for(let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
  const src = ac.createBufferSource(); src.buffer = buf;
  const f = ac.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = cutoff;
  const g = ac.createGain();
  const t0 = ac.currentTime + delay;
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  src.connect(f).connect(g).connect(ac.destination);
  src.start(t0);
}
const sfx = {
  click(){ beep(700, 0.05, 'square', 0.08); },
  whoosh(){ noiseBurst(0.5, 0.18, 700); },
  coin(combo){
    const base = 880 * Math.pow(1.059, Math.min(combo || 0, 12));
    beep(base, 0.07, 'square', 0.1);
    beep(base * 1.335, 0.12, 'square', 0.1, 0, 0.07);
  },
  heart(){ beep(660, 0.1, 'sine', 0.16); beep(880, 0.16, 'sine', 0.16, 0, 0.1); },
  hit(){ beep(200, 0.25, 'sawtooth', 0.2, -140); noiseBurst(0.22, 0.28, 650); },
  thunder(){ noiseBurst(0.45, 0.3, 320); beep(90, 0.3, 'sawtooth', 0.14, -40); },
  milestone(){ beep(523, 0.09, 'square', 0.11); beep(659, 0.09, 'square', 0.11, 0, 0.1); beep(784, 0.16, 'square', 0.11, 0, 0.2); },
  win(){
    const notes = [523, 659, 784, 1047, 1319, 1568];
    notes.forEach((f, i) => beep(f, 0.16, 'square', 0.12, 0, i * 0.12));
    noiseBurst(0.6, 0.1, 2500, 0.5);
  },
  lose(){ beep(300, 0.3, 'sawtooth', 0.16, -180); beep(200, 0.5, 'sawtooth', 0.14, -120, 0.26); }
};

// ---------- DOM 參照 ----------
const hud = document.getElementById('hud');
const heartsEl = document.getElementById('hearts');
const coinNEl = document.getElementById('coinN');
const scoreNEl = document.getElementById('scoreN');
const barFill = document.getElementById('barFill');
const barIcon = document.getElementById('barIcon');
const menuOv = document.getElementById('menuOv');
const endOv = document.getElementById('endOv');
const endTitle = document.getElementById('endTitle');
const endText = document.getElementById('endText');
const endCoins = document.getElementById('endCoins');
const endScore = document.getElementById('endScore');
const endBest = document.getElementById('endBest');
const menuBest = document.getElementById('menuBest');
const menuBestN = document.getElementById('menuBestN');
const startBtn = document.getElementById('startBtn');
const againBtn = document.getElementById('againBtn');
const muteBtn = document.getElementById('muteBtn');

// ---------- 輸入：鍵盤 + 觸控/滑鼠拖曳 ----------
const input = { up:false, down:false
};
const KEYMAP = { ArrowUp:'up', KeyW:'up', ArrowDown:'down', KeyS:'down' };
addEventListener('keydown', e => {
  if(e.code === 'KeyM'){ toggleMute(); return; }
  if((e.code === 'Space' || e.code === 'Enter')){
    if(state === 'menu'){ e.preventDefault(); startBtn.click(); return; }
    if(state === 'end' && endReady){ e.preventDefault(); againBtn.click(); return; }
  }
  const a = KEYMAP[e.code]; if(!a) return;
  e.preventDefault();
  input[a] = true;
});
addEventListener('keyup', e => { const a = KEYMAP[e.code]; if(a) input[a] = false; });

const drag = { active:false, y: GAME_H / 2 };
function pointToLogical(e){
  const r = canvas.getBoundingClientRect();
  return { x:(e.clientX - r.left) / canvas._scale, y:(e.clientY - r.top) / canvas._scale };
}
canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  const pt = pointToLogical(e);
  drag.active = true; drag.y = pt.y;
  if(state === 'play') burst(pt.x, pt.y, 'rgba(255,255,255,0.9)', 5, 110, 0);  // v2：觸碰即時回饋
  canvas.setPointerCapture && canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e => {
  if(drag.active) drag.y = pointToLogical(e).y;
});
addEventListener('pointerup', () => { drag.active = false; });
addEventListener('pointercancel', () => { drag.active = false; });
for(const ev of ['touchstart','touchmove']) canvas.addEventListener(ev, e => e.preventDefault(), { passive:false });

// ---------- 遊戲狀態 ----------
const GOAL = 30000;                  // 抵達非洲需要的距離
let state = 'menu';                  // menu | play | won | dead | end
let endReady = false;
let t = 0;                           // 全域動畫時間
let dist = 0, lives = 3, coins = 0, score = 0, dispScore = 0;
let invuln = 0, combo = 0, comboT = 0;
let shake = 0, freeze = 0, flash = 0, redFlash = 0;
let endTimer = 0, endWon = false;
let best = parseInt(localStorage.getItem('conie_africa_best') || '0', 10) || 0;

const P = { x: 210, y: GAME_H / 2, vy: 0, r: 22, hitR: 14, sx: 1, sy: 1, rot: 0, shield: false, star: 0 };

let obstacles = [], coinsList = [], hearts = [], parts = [], floats = [];
let pows = [];                       // v2：道具（🛡護盾 / ⭐無敵衝刺）
let banner = null;                   // 里程碑大字
let spawnT = 0, coinT = 0, heartT = 0, powT = 0, powIdx = 0;
let playT = 0, finale = false;       // v2：開場提示計時 / 最後衝刺

// 里程碑
let milestones;
function makeMilestones(){
  return [
    { p: 0.26, txt: '飛越印度洋！🌊', done:false },
    { p: 0.52, txt: '進入撒哈拉沙漠！🏜️', done:false },
    { p: 0.80, txt: '非洲草原在望！🦒', done:false }
  ];
}

// 視差雲層（3 層）與速度線
const cloudLayers = [[], [], []];
const LAYER_F = [0.25, 0.55, 1.0];
function initClouds(){
  for(let L = 0; L < 3; L++){
    cloudLayers[L].length = 0;
    for(let i = 0; i < 6 + L * 2; i++){
      cloudLayers[L].push({
        x: Math.random() * (GAME_W + 300) - 150,
        y: Math.random() * GAME_H,
        s: 26 + Math.random() * 46 + L * 12,
        a: 0.1 + L * 0.08 + Math.random() * 0.08
      });
    }
  }
}
const windLines = [];
for(let i = 0; i < 12; i++) windLines.push({ x: Math.random() * GAME_W, y: Math.random() * GAME_H, len: 40 + Math.random() * 90, sp: 1.4 + Math.random() * 1.2 });
initClouds();

// ---------- 進度與速度 ----------
function progress(){ return clamp(dist / GOAL, 0, 1); }
function scrollSpeed(){ return 240 + progress() * 290; }

// ---------- 粒子 ----------
function burst(x, y, color, n, speed, grav){
  n = n || 12; speed = speed || 220; grav = grav === undefined ? 500 : grav;
  for(let i = 0; i < n; i++){
    if(parts.length > 300) break;
    const a = Math.random() * TAU, s = speed * (0.3 + Math.random() * 0.7);
    parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: rand(0.35, 0.65), ttl: 0.65, color, g: grav, sz: rand(3, 6) });
  }
}
function confetti(){
  const colors = ['#ffd23f', '#ff6b6b', '#4ecdc4', '#9be27f', '#c792ea', '#fff'];
  for(let i = 0; i < 4; i++){
    if(parts.length > 300) break;
    parts.push({ x: rand(0, GAME_W), y: -10, vx: rand(-40, 40), vy: rand(60, 180), life: rand(1, 1.8), ttl: 1.8,
      color: colors[Math.floor(Math.random() * colors.length)], g: 120, sz: rand(4, 7) });
  }
}
function updateParts(dt){
  for(const p of parts){ p.x += p.vx * dt; p.y += p.vy * dt; p.vy += p.g * dt; p.life -= dt; }
  for(let i = parts.length - 1; i >= 0; i--) if(parts[i].life <= 0) parts.splice(i, 1);
}
function drawParts(){
  for(const p of parts){
    ctx.globalAlpha = clamp(p.life / p.ttl * 1.6, 0, 1);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.sz / 2, p.y - p.sz / 2, p.sz, p.sz);
  }
  ctx.globalAlpha = 1;
}

// ---------- 飄字 ----------
function addFloat(x, y, txt, color, size){
  floats.push({ x, y, txt, color: color || '#fff', size: size || 18, life: 0.8, ttl: 0.8 });
}
function updateFloats(dt){
  for(const f of floats){ f.y -= 55 * dt; f.life -= dt; }
  for(let i = floats.length - 1; i >= 0; i--) if(floats[i].life <= 0) floats.splice(i, 1);
}
function drawFloats(){
  for(const f of floats){
    ctx.globalAlpha = clamp(f.life / f.ttl * 1.5, 0, 1);
    ctx.font = 'bold ' + f.size + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = f.color;
    ctx.strokeStyle = 'rgba(0,0,0,.4)'; ctx.lineWidth = 3;
    ctx.strokeText(f.txt, f.x, f.y);
    ctx.fillText(f.txt, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

// ---------- 生成 ----------
function pickKind(p){
  const r = Math.random();
  if(p < 0.16) return 'cloud';
  if(p < 0.42) return r < 0.42 ? 'debris' : 'cloud';
  if(p < 0.62) return r < 0.32 ? 'debris' : (r < 0.52 ? 'thunder' : 'cloud');
  return r < 0.26 ? 'vulture' : (r < 0.5 ? 'debris' : (r < 0.68 ? 'thunder' : 'cloud'));
}
function spawnObstacle(){
  const p = progress();
  // 轉折：中後期偶爾出現「烏雲牆」，留一個缺口
  if(p > 0.5 && Math.random() < 0.12){ spawnWall(); return; }
  const kind = pickKind(p);
  const y = rand(60, GAME_H - 100);
  if(kind === 'cloud'){
    obstacles.push({ kind, x: GAME_W + 60, y, r: rand(26, 42), wob: rand(0, TAU), wobSp: rand(1.5, 3), sp: rand(0, 40) });
  } else if(kind === 'debris'){
    obstacles.push({ kind, x: GAME_W + 50, y, r: rand(15, 23), rot: rand(0, TAU), rotSp: rand(-6, 6), sp: rand(60, 140), vy: rand(-50, 50) });
  } else if(kind === 'thunder'){
    obstacles.push({ kind, x: GAME_W + 70, y: rand(50, GAME_H * 0.45), r: rand(32, 44), wob: rand(0, TAU), wobSp: 1.2, sp: 0,
      phase: 'idle', pt: rand(0.2, 0.9), boltLen: rand(150, 230), boomed: false });
  } else { // vulture 禿鷹
    obstacles.push({ kind, x: GAME_W + 50, y, r: 20, flap: rand(0, TAU), sp: rand(90, 150), home: rand(50, 85) });
  }
}
function spawnWall(){
  const gapY = rand(90, GAME_H - 150);
  const gapH = lerp(220, 165, progress());
  for(let y = 46; y < GAME_H - 60; y += 74){
    if(y > gapY - gapH / 2 && y < gapY + gapH / 2) continue;
    obstacles.push({ kind: 'cloud', x: GAME_W + 60 + rand(-8, 8), y, r: 34, wob: rand(0, TAU), wobSp: 1.6, sp: 0 });
  }
  coinsList.push({ x: GAME_W + 64, y: gapY, r: 11, wob: rand(0, TAU) }); // 缺口放金幣引導
}
function spawnCoins(){
  const pat = Math.random();
  const baseY = rand(80, GAME_H - 120);
  const n = 3 + Math.floor(Math.random() * 4);
  for(let i = 0; i < n; i++){
    let y = baseY;
    if(pat < 0.4) y = baseY + Math.sin(i * 0.9) * 70;          // 波浪
    else if(pat < 0.7) y = baseY + (i - n / 2) * 26;            // 斜線
    coinsList.push({ x: GAME_W + 40 + i * 42, y: clamp(y, 60, GAME_H - 90), r: 11, wob: rand(0, TAU) });
  }
}
function spawnHeart(){
  hearts.push({ x: GAME_W + 40, y: rand(80, GAME_H - 120), r: 14, wob: rand(0, TAU) });
}

// ---------- 重設 ----------
function resetGame(){
  dist = 0; lives = 3; coins = 0; score = 0; dispScore = 0;
  invuln = 1.2; combo = 0; comboT = 0;
  shake = 0; freeze = 0; flash = 0; redFlash = 0;
  obstacles = []; coinsList = []; hearts = []; parts = []; floats = [];
  pows = []; powT = 8; powIdx = 0; playT = 0; finale = false;
  banner = null;
  spawnT = 1.4; coinT = 0.8; heartT = 0;
  P.y = GAME_H / 2; P.vy = 0; P.sx = 1; P.sy = 1; P.rot = 0; P.shield = false; P.star = 0;
  milestones = makeMilestones();
  initClouds();
  updateHud(true);
}

// ---------- HUD ----------
function updateHud(force){
  heartsEl.textContent = '❤️'.repeat(lives) + '🖤'.repeat(Math.max(0, 3 - lives));
  coinNEl.textContent = coins;
  const pct = (progress() * 100).toFixed(1) + '%';
  barFill.style.width = pct;
  barIcon.style.left = pct;
  if(force) scoreNEl.textContent = Math.round(dispScore);
}

// ---------- 玩家受擊 ----------
function hitPlayer(){
  if(invuln > 0) return;
  if(P.shield){   // v2：護盾擋下一次
    P.shield = false;
    invuln = 1.2;
    freeze = 0.06; shake = 6;
    burst(P.x, P.y, '#7fd1ff', 18, 260);
    addFloat(P.x, P.y - 40, '🛡️ 護盾擋下！', '#7fd1ff', 22);
    sfx.thunder();
    return;
  }
  lives--;
  combo = 0;
  invuln = 1.6;
  freeze = 0.12; shake = 11; redFlash = 0.35;
  P.sx = 1.45; P.sy = 0.55;
  burst(P.x, P.y, '#ff6b6b', 20, 260);
  burst(P.x, P.y, '#fff', 8, 180);
  sfx.hit();
  addFloat(P.x, P.y - 40, '哎呀！', '#ff9a9a', 22);
  updateHud();
  if(lives <= 0){
    state = 'dead'; endTimer = 0;
    freeze = 0.18; shake = 14;
    burst(P.x, P.y, '#ffd8b0', 26, 320);
    sfx.lose();
  }
}

// ---------- 更新：遊戲中 ----------
function updatePlay(dt){
  const p = progress();
  playT += dt;
  if(P.star > 0) P.star -= dt;
  const starOn = P.star > 0;
  dist += scrollSpeed() * (starOn ? 1.35 : 1) * dt;
  score += scrollSpeed() * dt / 60 * (finale ? 2 : 1);   // 距離分（終盤 x2）
  if(invuln > 0) invuln -= dt;
  if(comboT > 0){ comboT -= dt; if(comboT <= 0) combo = 0; }
  // v2：最後衝刺（82% 起）
  if(!finale && p >= 0.82){
    finale = true;
    banner = { txt: '⚡ 最後衝刺！分數 x2', t: 0 };
    sfx.milestone(); shake = 5;
  }

  // --- 玩家移動 ---
  const topB = P.r + 30, botB = GAME_H - 44 - P.r;
  if(drag.active){
    const target = clamp(drag.y, topB, botB);
    const ny = P.y + (target - P.y) * (1 - Math.pow(0.00005, dt));
    P.vy = clamp((ny - P.y) / Math.max(dt, 0.001), -900, 900);
    P.y = ny;
  } else {
    if(input.up)   P.vy -= 2600 * dt;
    if(input.down) P.vy += 2600 * dt;
    P.vy *= Math.pow(0.004, dt);
    P.vy = clamp(P.vy, -640, 640);
    P.y += P.vy * dt;
  }
  if(P.y < topB){ P.y = topB; P.vy = Math.max(0, P.vy); }
  if(P.y > botB){ P.y = botB; P.vy = Math.min(0, P.vy); }
  P.x = 210 + Math.sin(t * 1.3) * 7;
  // 傾斜 + squash 回彈
  P.rot += (clamp(P.vy / 900, -1, 1) * 0.35 - P.rot) * Math.min(1, 12 * dt);
  P.sx += (1 - P.sx) * Math.min(1, 10 * dt);
  P.sy += (1 - P.sy) * Math.min(1, 10 * dt);
  // 風的尾流粒子（⭐ 無敵時變彩虹尾流）
  if(Math.random() < 40 * dt && parts.length < 280){
    const rainbow = ['#ff6b6b','#ffd23f','#9be27f','#7fd1ff','#c792ea'];
    parts.push({ x: P.x - 24, y: P.y + rand(-12, 12), vx: -scrollSpeed() * 0.7, vy: rand(-15, 15),
      life: rand(0.25, 0.45), ttl: 0.45,
      color: starOn ? rainbow[Math.floor(Math.random() * rainbow.length)] : 'rgba(255,255,255,0.8)',
      g: 0, sz: starOn ? 5 : 3 });
  }

  // --- 生成 ---
  spawnT -= dt;
  if(spawnT <= 0){
    spawnObstacle();
    spawnT = Math.max(0.4, 1.2 - p * 0.72) * rand(0.75, 1.2);
  }
  coinT -= dt;
  if(coinT <= 0){ spawnCoins(); coinT = finale ? rand(0.9, 1.6) : rand(1.7, 3.2); }
  if(lives < 3){
    heartT += dt;
    if(heartT > 9){ heartT = 0; if(Math.random() < 0.6) spawnHeart(); }
  }
  // v2：道具生成（護盾 / 無敵星交替，約 11 秒一顆）
  powT -= dt;
  if(powT <= 0){
    powT = rand(9, 13);
    const kind = (powIdx++ % 2 === 0) ? 'shield' : 'star';
    pows.push({ kind, x: GAME_W + 40, y: rand(90, GAME_H - 130), r: 16, wob: rand(0, TAU) });
  }
  // v2：道具移動與拾取
  for(const pw of pows){
    pw.x -= scrollSpeed() * 1.12 * dt; pw.wob += 4 * dt;
    if(Math.hypot(P.x - pw.x, P.y - pw.y) < pw.r + P.r){
      pw.dead = true;
      if(pw.kind === 'shield'){
        P.shield = true;
        addFloat(pw.x, pw.y - 20, '🛡️ 護盾！', '#7fd1ff', 22);
        burst(pw.x, pw.y, '#7fd1ff', 14, 220, 150);
        sfx.heart();
      } else {
        P.star = 2.8;
        addFloat(pw.x, pw.y - 20, '⭐ 無敵衝刺！', '#ffe08a', 24);
        burst(pw.x, pw.y, '#ffd23f', 18, 260, 100);
        flash = 0.12; sfx.milestone();
      }
    }
    if(pw.x < -40) pw.dead = true;
  }
  pows = pows.filter(pw => !pw.dead);

  // --- 障礙物 ---
  const sc = scrollSpeed();
  for(const o of obstacles){
    o.x -= (sc * 1.12 + (o.sp || 0)) * dt;
    if(o.kind === 'cloud'){ o.wob += o.wobSp * dt; }
    else if(o.kind === 'debris'){ o.rot += o.rotSp * dt; o.y += o.vy * dt; if(o.y < 50 || o.y > GAME_H - 70) o.vy *= -1; }
    else if(o.kind === 'thunder'){
      o.wob += o.wobSp * dt;
      o.pt -= dt;
      if(o.pt <= 0){
        if(o.phase === 'idle'){ o.phase = 'warn'; o.pt = 0.55; }
        else if(o.phase === 'warn'){ o.phase = 'bolt'; o.pt = 0.35; o.boomed = false; }
        else { o.phase = 'idle'; o.pt = rand(1.1, 1.8); }
      }
      if(o.phase === 'bolt' && !o.boomed && o.x > -40 && o.x < GAME_W + 40){
        o.boomed = true;
        if(o.x > 0 && o.x < GAME_W) sfx.thunder();
      }
    } else if(o.kind === 'vulture'){
      o.flap += 9 * dt;
      o.y += clamp(P.y - o.y, -o.home, o.home) * dt;
    }
    o.dead = o.x < -90;
  }
  obstacles = obstacles.filter(o => !o.dead);

  // --- 金幣（含小磁吸）---
  for(const c of coinsList){
    c.x -= sc * 1.12 * dt; c.wob += 6 * dt;
    const dx = P.x - c.x, dy = P.y - c.y, dd = Math.hypot(dx, dy);
    if(dd < 80 && dd > 1){ c.x += dx / dd * 260 * dt; c.y += dy / dd * 260 * dt; }
    if(dd < c.r + P.r * 0.9){
      c.dead = true;
      coins++;
      combo++; comboT = 1.5;
      const bonus = (20 + Math.min(combo, 10) * 3) * (finale ? 2 : 1);
      score += bonus;
      P.sx = 1.14; P.sy = 1.14;
      burst(c.x, c.y, '#ffd23f', 10, 200, 300);
      addFloat(c.x, c.y - 16, '+' + bonus, '#ffd23f', 17);
      if(combo >= 3) addFloat(P.x, P.y - 48, '連擊 x' + combo + '！', '#ffe08a', 20);
      sfx.coin(combo);
    }
    if(c.x < -40) c.dead = true;
  }
  coinsList = coinsList.filter(c => !c.dead);

  // --- 愛心 ---
  for(const h of hearts){
    h.x -= sc * 1.12 * dt; h.wob += 4 * dt;
    if(Math.hypot(P.x - h.x, P.y - h.y) < h.r + P.r){
      h.dead = true;
      if(lives < 3){ lives++; updateHud(); }
      burst(h.x, h.y, '#ff8fab', 14, 220, 200);
      addFloat(h.x, h.y - 18, '❤️ +1', '#ff8fab', 20);
      sfx.heart();
    }
    if(h.x < -40) h.dead = true;
  }
  hearts = hearts.filter(h => !h.dead);

  // --- 碰撞（判定寬容：受擊箱比圖形小）---
  if(starOn){
    // v2：⭐ 無敵衝刺 → 撞碎障礙物得分
    for(const o of obstacles){
      let oy = o.y, or = o.r * 0.85;
      if(o.kind === 'cloud' || o.kind === 'thunder') oy += Math.sin(o.wob) * 6;
      if(Math.hypot(o.x - P.x, oy - P.y) < or + P.r){
        o.dead = true;
        const gain = 30 * (finale ? 2 : 1);
        score += gain;
        addFloat(o.x, oy - 20, '💥 +' + gain, '#ffe08a', 20);
        burst(o.x, oy, '#ffd23f', 14, 280, 250);
        shake = Math.max(shake, 4); freeze = Math.max(freeze, 0.03);
        sfx.coin(6);
      }
    }
    obstacles = obstacles.filter(o => !o.dead);
  } else if(invuln <= 0){
    for(const o of obstacles){
      let ox = o.x, oy = o.y, or = o.r * 0.85;
      if(o.kind === 'cloud' || o.kind === 'thunder') oy += Math.sin(o.wob) * 6;
      if(Math.hypot(ox - P.x, oy - P.y) < or + P.hitR){ hitPlayer(); break; }
      if(o.kind === 'thunder' && o.phase === 'bolt'){
        if(Math.abs(P.x - o.x) < 20 && P.y > oy && P.y < oy + o.boltLen + 10){ hitPlayer(); break; }
      }
      // v2：擦身好險獎勵（貼近但沒撞到）
      if(!o.grazed && o.x < P.x && o.x > P.x - 30){
        o.grazed = true;
        const dd = Math.hypot(ox - P.x, oy - P.y);
        if(dd < or + P.hitR + 22){
          const gain = 5 * (finale ? 2 : 1);
          score += gain;
          addFloat(P.x + 10, P.y - 34, '好險！+' + gain, '#bfe9ff', 16);
        }
      }
    }
  }

  // --- 里程碑 ---
  for(const m of milestones){
    if(!m.done && p >= m.p){
      m.done = true;
      banner = { txt: m.txt, t: 0 };
      sfx.milestone();
      burst(GAME_W / 2, GAME_H * 0.3, '#fff', 16, 260, 100);
    }
  }

  // --- 抵達非洲 ---
  if(dist >= GOAL){
    state = 'won'; endTimer = 0;
    shake = 6;
    sfx.win();
    banner = { txt: '🌍 非洲到了！', t: 0 };
  }
}

// ---------- 更新：勝利 / 死亡 ----------
function updateWon(dt){
  endTimer += dt;
  confetti();
  // Conie 緩緩降落
  const landY = GAME_H - 44 - P.r;
  const prevY = P.y;
  P.y += (landY - P.y) * Math.min(1, 3 * dt);
  P.rot += (0 - P.rot) * Math.min(1, 6 * dt);
  if(prevY < landY - 2 && P.y >= landY - 2){
    P.sx = 1.4; P.sy = 0.6;
    burst(P.x, landY + 16, '#d9c07a', 12, 160, 300);
  }
  P.sx += (1 - P.sx) * Math.min(1, 8 * dt);
  P.sy += (1 - P.sy) * Math.min(1, 8 * dt);
  if(endTimer > 1.5 && !endReady) showEnd(true);
}
function updateDead(dt){
  endTimer += dt;
  P.rot += 7 * dt;
  P.vy += 1300 * dt;
  P.y += P.vy * dt;
  if(endTimer > 0.9 && !endReady) showEnd(false);
}

// ---------- 背景 ----------
const SKY_STOPS = [
  { p: 0,    top:[24, 38, 84],   bot:[64, 104, 160],  ground:[26, 96, 110] },   // 台灣風雨
  { p: 0.3,  top:[46, 84, 150],  bot:[122, 178, 214], ground:[22, 118, 148] },  // 印度洋
  { p: 0.55, top:[233, 130, 60], bot:[255, 208, 130], ground:[212, 158, 78] },  // 撒哈拉
  { p: 0.8,  top:[248, 176, 88], bot:[255, 230, 168], ground:[176, 152, 72] },  // 莽原前
  { p: 1,    top:[116, 178, 232],bot:[255, 240, 200], ground:[108, 158, 66] }   // 非洲草原
];
function skyAt(p){
  let a = SKY_STOPS[0], b = SKY_STOPS[SKY_STOPS.length - 1];
  for(let i = 0; i < SKY_STOPS.length - 1; i++){
    if(p >= SKY_STOPS[i].p && p <= SKY_STOPS[i + 1].p){ a = SKY_STOPS[i]; b = SKY_STOPS[i + 1]; break; }
  }
  const tt = (p - a.p) / Math.max(0.0001, b.p - a.p);
  return { top: lerpC(a.top, b.top, tt), bot: lerpC(a.bot, b.bot, tt), ground: lerpC(a.ground, b.ground, tt) };
}
function stageWeights(p){
  // 海 / 沙漠 / 草原 的權重，用於地面裝飾
  const sea = clamp(1 - (p - 0.4) / 0.15, 0, 1);
  const savanna = clamp((p - 0.75) / 0.15, 0, 1);
  const desert = clamp(1 - sea - savanna, 0, 1);
  return { sea, desert, savanna };
}

function drawBackground(){
  const p = progress();
  const c = skyAt(p);
  const g = ctx.createLinearGradient(0, 0, 0, GAME_H);
  g.addColorStop(0, rgb(c.top));
  g.addColorStop(1, rgb(c.bot));
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // 太陽（沙漠段升起）
  if(p > 0.3){
    const sa = clamp((p - 0.3) / 0.2, 0, 1);
    const sy = lerp(150, 90, sa);
    ctx.save();
    ctx.globalAlpha = sa * 0.9;
    const sg = ctx.createRadialGradient(GAME_W - 170, sy, 10, GAME_W - 170, sy, 90);
    sg.addColorStop(0, 'rgba(255,236,170,0.95)');
    sg.addColorStop(0.4, 'rgba(255,210,110,0.55)');
    sg.addColorStop(1, 'rgba(255,210,110,0)');
    ctx.fillStyle = sg;
    ctx.fillRect(GAME_W - 280, sy - 110, 240, 220);
    ctx.fillStyle = '#fff3c8';
    ctx.beginPath(); ctx.arc(GAME_W - 170, sy, 34, 0, TAU); ctx.fill();
    ctx.restore();
  }

  // 視差雲層（遠 → 近前兩層；最近一層蓋在角色前，於 drawFront 畫）
  for(let L = 0; L < 2; L++) drawCloudLayer(L, p);

  // 速度線（最後衝刺時更強烈）
  ctx.strokeStyle = finale ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.28)';
  ctx.lineWidth = finale ? 3 : 2;
  for(const w of windLines){
    ctx.globalAlpha = 0.15 + 0.2 * Math.sin(w.y) + (finale ? 0.15 : 0);
    ctx.beginPath();
    ctx.moveTo(w.x, w.y);
    ctx.lineTo(w.x + w.len, w.y);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}
function drawCloudLayer(L, p){
  const tint = p > 0.5 ? '255,240,214' : '255,255,255';
  for(const cl of cloudLayers[L]){
    ctx.fillStyle = 'rgba(' + tint + ',' + cl.a.toFixed(2) + ')';
    ctx.beginPath();
    ctx.ellipse(cl.x, cl.y, cl.s, cl.s * 0.52, 0, 0, TAU);
    ctx.ellipse(cl.x - cl.s * 0.55, cl.y + cl.s * 0.12, cl.s * 0.6, cl.s * 0.34, 0, 0, TAU);
    ctx.ellipse(cl.x + cl.s * 0.55, cl.y + cl.s * 0.12, cl.s * 0.6, cl.s * 0.34, 0, 0, TAU);
    ctx.fill();
  }
}
function moveClouds(dt, speedMul){
  const sc = scrollSpeed() * (speedMul === undefined ? 1 : speedMul);
  for(let L = 0; L < 3; L++){
    for(const cl of cloudLayers[L]){
      cl.x -= sc * LAYER_F[L] * dt;
      if(cl.x < -160){ cl.x = GAME_W + rand(60, 220); cl.y = Math.random() * GAME_H; }
    }
  }
  for(const w of windLines){
    w.x -= scrollSpeed() * w.sp * dt * (speedMul === undefined ? 1 : speedMul);
    if(w.x < -w.len){ w.x = GAME_W + rand(0, 120); w.y = Math.random() * GAME_H; }
  }
}

function drawGround(){
  const p = progress();
  const c = skyAt(p);
  const w = stageWeights(p);
  const gy = GAME_H - 40;
  ctx.fillStyle = rgb(c.ground);
  ctx.fillRect(0, gy, GAME_W, 40);
  // 海浪
  if(w.sea > 0.02){
    ctx.globalAlpha = w.sea * 0.7;
    ctx.strokeStyle = '#bfe9ff';
    ctx.lineWidth = 3;
    for(let i = 0; i < 8; i++){
      const wx = ((i * 140 - (dist * 1.2) % 140) + 140) % (GAME_W + 140) - 70;
      ctx.beginPath();
      ctx.arc(wx, gy + 10, 16, Math.PI, TAU);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
  // 沙丘
  if(w.desert > 0.02){
    ctx.globalAlpha = w.desert * 0.5;
    ctx.fillStyle = '#f4d9a0';
    for(let i = 0; i < 5; i++){
      const dx = ((i * 260 - (dist * 0.8) % 260) + 260) % (GAME_W + 260) - 130;
      ctx.beginPath();
      ctx.ellipse(dx, gy + 14, 110, 16, 0, Math.PI, TAU);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  // 草原草叢
  if(w.savanna > 0.02){
    ctx.globalAlpha = w.savanna;
    ctx.strokeStyle = '#4c7a2f';
    ctx.lineWidth = 2.4;
    for(let i = 0; i < 24; i++){
      const gx = ((i * 46 - (dist * 1.4) % 46) + 46) % (GAME_W + 46) - 23 + (i * 17) % 12;
      ctx.beginPath();
      ctx.moveTo(gx, gy + 6);
      ctx.lineTo(gx - 3, gy - 4);
      ctx.moveTo(gx, gy + 6);
      ctx.lineTo(gx + 3, gy - 5);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
}

function drawLandmarks(){
  const p = progress();
  // 台北 101 剪影（出發時）
  const x101 = 240 - dist * 0.12;
  if(x101 > -60){
    ctx.fillStyle = 'rgba(20,30,60,0.55)';
    const gy = GAME_H - 40;
    for(let i = 0; i < 8; i++){
      const wdt = 34 - i * 2.4;
      ctx.fillRect(x101 - wdt / 2, gy - 30 - (i + 1) * 22, wdt, 22);
    }
    ctx.fillRect(x101 - 3, gy - 30 - 9 * 22 - 26, 6, 30);
    ctx.fillRect(x101 - 22, gy - 30, 44, 30);
  }
  // 非洲：金合歡樹 + 長頸鹿剪影（接近終點時迎接）
  const remain = GOAL - dist;
  if(remain < 3200){
    const gy = GAME_H - 40;
    const ax = GAME_W * 0.72 + remain * 0.3;
    ctx.fillStyle = 'rgba(60,45,20,0.75)';
    // 樹幹
    ctx.beginPath();
    ctx.moveTo(ax - 5, gy); ctx.quadraticCurveTo(ax - 2, gy - 60, ax - 14, gy - 92);
    ctx.lineTo(ax - 4, gy - 92); ctx.quadraticCurveTo(ax + 4, gy - 60, ax + 5, gy);
    ctx.closePath(); ctx.fill();
    // 傘狀樹冠
    ctx.beginPath();
    ctx.ellipse(ax - 10, gy - 100, 66, 16, -0.06, 0, TAU);
    ctx.fill();
    // 長頸鹿
    const gx = ax + 120;
    ctx.fillStyle = 'rgba(120,80,30,0.8)';
    ctx.fillRect(gx - 20, gy - 46, 40, 22);                 // 身體
    ctx.fillRect(gx - 18, gy - 26, 6, 26);                  // 腳
    ctx.fillRect(gx + 12, gy - 26, 6, 26);
    ctx.save();
    ctx.translate(gx + 18, gy - 44);
    ctx.rotate(-0.5);
    ctx.fillRect(0, -52, 8, 54);                            // 脖子
    ctx.fillRect(-2, -62, 18, 12);                          // 頭
    ctx.restore();
  }
}

function drawTyphoon(){
  // 追著 Conie 的巴威颱風漩渦（隨進度減弱）
  const p = progress();
  const a = lerp(0.5, 0.12, p);
  const cx = 62, cy = GAME_H / 2 + Math.sin(t * 0.7) * 60;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(t * 2.4);
  ctx.strokeStyle = 'rgba(230,240,255,' + a.toFixed(2) + ')';
  ctx.lineWidth = 7;
  ctx.lineCap = 'round';
  for(let i = 0; i < 3; i++){
    ctx.beginPath();
    ctx.arc(0, 0, 26 + i * 17, i * 2.1, i * 2.1 + 3.6 - i * 0.5);
    ctx.stroke();
  }
  ctx.beginPath();
  ctx.arc(0, 0, 9, 0, TAU);
  ctx.stroke();
  ctx.restore();
}

// ---------- 實體繪製 ----------
function drawObstacles(){
  for(const o of obstacles){
    if(o.kind === 'cloud'){
      const y = o.y + Math.sin(o.wob) * 6;
      ctx.fillStyle = 'rgba(52,54,76,0.92)';
      ctx.beginPath();
      ctx.arc(o.x, y, o.r, 0, TAU);
      ctx.arc(o.x - o.r * 0.62, y + o.r * 0.22, o.r * 0.68, 0, TAU);
      ctx.arc(o.x + o.r * 0.62, y + o.r * 0.22, o.r * 0.68, 0, TAU);
      ctx.fill();
      // 生氣的眼睛（剪影可辨識為敵人）
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(o.x - o.r * 0.3, y - o.r * 0.1, o.r * 0.16, 0, TAU);
      ctx.arc(o.x + o.r * 0.3, y - o.r * 0.1, o.r * 0.16, 0, TAU);
      ctx.fill();
      ctx.fillStyle = '#20222f';
      ctx.beginPath();
      ctx.arc(o.x - o.r * 0.27, y - o.r * 0.08, o.r * 0.08, 0, TAU);
      ctx.arc(o.x + o.r * 0.33, y - o.r * 0.08, o.r * 0.08, 0, TAU);
      ctx.fill();
      ctx.strokeStyle = '#20222f'; ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(o.x - o.r * 0.48, y - o.r * 0.34); ctx.lineTo(o.x - o.r * 0.14, y - o.r * 0.2);
      ctx.moveTo(o.x + o.r * 0.48, y - o.r * 0.34); ctx.lineTo(o.x + o.r * 0.14, y - o.r * 0.2);
      ctx.stroke();
    } else if(o.kind === 'debris'){
      ctx.save();
      ctx.translate(o.x, o.y);
      ctx.rotate(o.rot);
      ctx.fillStyle = '#8a6a4a';
      ctx.fillRect(-o.r, -o.r * 0.32, o.r * 2, o.r * 0.64);
      ctx.fillStyle = '#6f5238';
      ctx.fillRect(-o.r, -o.r * 0.32, o.r * 2, o.r * 0.2);
      ctx.fillStyle = '#a58a68';
      ctx.fillRect(-o.r, o.r * 0.16, o.r * 2, o.r * 0.12);
      ctx.restore();
    } else if(o.kind === 'thunder'){
      const y = o.y + Math.sin(o.wob) * 6;
      const warn = o.phase === 'warn';
      const bolt = o.phase === 'bolt';
      ctx.fillStyle = warn && Math.floor(t * 12) % 2 === 0 ? 'rgba(120,110,160,0.95)' : 'rgba(38,38,60,0.95)';
      ctx.beginPath();
      ctx.arc(o.x, y, o.r, 0, TAU);
      ctx.arc(o.x - o.r * 0.6, y + o.r * 0.25, o.r * 0.66, 0, TAU);
      ctx.arc(o.x + o.r * 0.6, y + o.r * 0.25, o.r * 0.66, 0, TAU);
      ctx.fill();
      // 警告小閃電圖示
      if(warn){
        ctx.fillStyle = '#fff35c';
        drawBoltIcon(o.x, y + o.r * 0.1, 10);
      }
      if(bolt){
        ctx.save();
        ctx.strokeStyle = '#fff35c';
        ctx.lineWidth = 5;
        ctx.lineJoin = 'round';
        ctx.shadowColor = '#fff35c'; ctx.shadowBlur = 14;
        ctx.beginPath();
        let bx = o.x, by = y + o.r * 0.5;
        ctx.moveTo(bx, by);
        const seg = 5;
        for(let i = 1; i <= seg; i++){
          bx = o.x + (i % 2 === 0 ? -8 : 8) + rand(-4, 4);
          by = y + o.r * 0.5 + (o.boltLen / seg) * i;
          ctx.lineTo(bx, by);
        }
        ctx.stroke();
        ctx.restore();
      }
    } else if(o.kind === 'vulture'){
      ctx.save();
      ctx.translate(o.x, o.y);
      const fl = Math.sin(o.flap);
      ctx.fillStyle = '#4a3226';
      // 身體
      ctx.beginPath();
      ctx.ellipse(0, 0, 18, 11, 0, 0, TAU);
      ctx.fill();
      // 翅膀
      ctx.beginPath();
      ctx.moveTo(-2, -4);
      ctx.quadraticCurveTo(-6, -18 - fl * 12, -26, -10 - fl * 16);
      ctx.quadraticCurveTo(-10, -2, -2, 2);
      ctx.closePath(); ctx.fill();
      // 頭 + 喙
      ctx.fillStyle = '#e8c9a8';
      ctx.beginPath(); ctx.arc(-16, -4, 6, 0, TAU); ctx.fill();
      ctx.fillStyle = '#ffb03a';
      ctx.beginPath();
      ctx.moveTo(-21, -5); ctx.lineTo(-28, -2); ctx.lineTo(-21, -1);
      ctx.closePath(); ctx.fill();
      // 眼睛
      ctx.fillStyle = '#20222f';
      ctx.beginPath(); ctx.arc(-18, -5, 1.6, 0, TAU); ctx.fill();
      ctx.restore();
    }
  }
}
function drawBoltIcon(x, y, s){
  ctx.beginPath();
  ctx.moveTo(x + s * 0.2, y - s);
  ctx.lineTo(x - s * 0.4, y + s * 0.15);
  ctx.lineTo(x, y + s * 0.15);
  ctx.lineTo(x - s * 0.2, y + s);
  ctx.lineTo(x + s * 0.5, y - s * 0.1);
  ctx.lineTo(x + s * 0.05, y - s * 0.1);
  ctx.closePath();
  ctx.fill();
}
function drawCoins(){
  for(const c of coinsList){
    const y = c.y + Math.sin(c.wob) * 4;
    const squash = Math.max(0.3, Math.abs(Math.cos(c.wob * 1.2)));
    ctx.save();
    ctx.translate(c.x, y);
    ctx.scale(squash, 1);
    ctx.fillStyle = '#ffd23f';
    ctx.strokeStyle = '#b8860b';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, c.r, 0, TAU); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#b8860b';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('¢', 0, 1);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
  }
}
function drawPows(){   // v2：道具（發光圓泡＋圖示）
  for(const pw of pows){
    const y = pw.y + Math.sin(pw.wob) * 6;
    const col = pw.kind === 'shield' ? '#7fd1ff' : '#ffd23f';
    ctx.save();
    ctx.translate(pw.x, y);
    ctx.shadowColor = col; ctx.shadowBlur = 16;
    ctx.fillStyle = 'rgba(12,18,40,0.5)';
    ctx.beginPath(); ctx.arc(0, 0, pw.r + 5, 0, TAU); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = col; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(0, 0, pw.r + 5, 0, TAU); ctx.stroke();
    ctx.font = '20px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(pw.kind === 'shield' ? '🛡️' : '⭐', 0, 1);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
  }
}
function drawHearts(){
  for(const h of hearts){
    const y = h.y + Math.sin(h.wob) * 5;
    const s = 1 + Math.sin(h.wob * 2) * 0.08;
    ctx.save();
    ctx.translate(h.x, y);
    ctx.scale(s, s);
    ctx.font = '26px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('❤️', 0, 2);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
  }
}

// ---------- 玩家 Conie ----------
function drawPlayer(){
  const flicker = invuln > 0 && P.star <= 0 && state === 'play' && Math.floor(t * 14) % 2 === 0;
  ctx.save();
  ctx.translate(P.x, P.y);
  if(P.star > 0){   // v2：⭐ 無敵金色光環
    const pulse = 1 + Math.sin(t * 12) * 0.08;
    ctx.save();
    ctx.globalAlpha = P.star < 0.8 ? P.star / 0.8 : 1;   // 快結束時淡出提示
    ctx.strokeStyle = '#ffd23f'; ctx.lineWidth = 4;
    ctx.shadowColor = '#ffd23f'; ctx.shadowBlur = 18;
    ctx.beginPath(); ctx.arc(0, 0, 34 * pulse, 0, TAU); ctx.stroke();
    ctx.restore();
  }
  if(P.shield){     // v2：🛡 護盾泡泡
    ctx.save();
    ctx.globalAlpha = 0.55 + Math.sin(t * 5) * 0.15;
    ctx.strokeStyle = '#7fd1ff'; ctx.lineWidth = 3;
    ctx.fillStyle = 'rgba(127,209,255,0.12)';
    ctx.beginPath(); ctx.arc(0, 0, 31, 0, TAU); ctx.fill(); ctx.stroke();
    ctx.restore();
  }
  ctx.rotate(P.rot);
  ctx.scale(P.sx, P.sy);
  ctx.globalAlpha = flicker ? 0.35 : 1;

  // 飄動的紅圍巾
  ctx.strokeStyle = '#e8582f';
  ctx.lineWidth = 7;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-14, 10);
  ctx.quadraticCurveTo(-30, 12 + Math.sin(t * 9) * 6, -46, 6 + Math.sin(t * 9 + 1) * 9);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-14, 12);
  ctx.quadraticCurveTo(-32, 20 + Math.sin(t * 8 + 2) * 6, -50, 18 + Math.sin(t * 8 + 3) * 8);
  ctx.stroke();

  // 臉
  ctx.fillStyle = '#ffd8b0';
  ctx.beginPath(); ctx.arc(0, 0, 20, 0, TAU); ctx.fill();

  // 鍋蓋頭（鍋蓋造型瀏海 + 頂端小圓鈕）
  ctx.fillStyle = '#3a2a1e';
  ctx.beginPath();
  ctx.arc(0, -4, 21, Math.PI, 0);
  ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.arc(0, -26, 4.5, 0, TAU); ctx.fill();
  ctx.strokeStyle = '#3a2a1e';
  ctx.lineWidth = 3.4;
  ctx.beginPath(); ctx.moveTo(-20, -3); ctx.lineTo(20, -3); ctx.stroke();
  // 髮絲反光
  ctx.strokeStyle = 'rgba(255,255,255,0.28)';
  ctx.lineWidth = 2.4;
  ctx.beginPath(); ctx.arc(0, -5, 15, Math.PI * 1.2, Math.PI * 1.5); ctx.stroke();

  // 眼睛（隨移動方向看、會眨眼）
  const blink = (t % 3) > 2.88;
  const lookY = clamp(P.vy / 900, -1, 1) * 2.4;
  ctx.fillStyle = '#3a2a1e';
  if(blink){
    ctx.lineWidth = 2; ctx.strokeStyle = '#3a2a1e';
    ctx.beginPath(); ctx.moveTo(-10, 2); ctx.lineTo(-4, 2); ctx.moveTo(4, 2); ctx.lineTo(10, 2); ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.arc(-7, 2 + lookY, 2.6, 0, TAU);
    ctx.arc(7, 2 + lookY, 2.6, 0, TAU);
    ctx.fill();
  }
  // 腮紅
  ctx.fillStyle = 'rgba(255,120,120,0.5)';
  ctx.beginPath();
  ctx.arc(-13, 8, 3.2, 0, TAU);
  ctx.arc(13, 8, 3.2, 0, TAU);
  ctx.fill();
  // 嘴巴（狀態不同表情不同）
  ctx.strokeStyle = '#7a4a2a';
  ctx.lineWidth = 1.8;
  ctx.beginPath();
  if(state === 'dead'){
    ctx.arc(0, 12, 4.5, 1.15 * Math.PI, 1.85 * Math.PI); // 皺眉嘴
  } else if(invuln > 1 && state === 'play'){
    ctx.ellipse(0, 9, 3, 4, 0, 0, TAU);                  // 驚呼 O 嘴
  } else {
    ctx.arc(0, 8, 5, 0.15 * Math.PI, 0.85 * Math.PI);    // 微笑
  }
  ctx.stroke();

  // 小手（在風中揮舞）
  ctx.fillStyle = '#ffd8b0';
  ctx.beginPath();
  ctx.arc(-17, -8 + Math.sin(t * 10) * 3, 4, 0, TAU);
  ctx.arc(17, -6 + Math.sin(t * 10 + 1.5) * 3, 4, 0, TAU);
  ctx.fill();

  ctx.restore();
}

// ---------- 里程碑大字 ----------
function drawBanner(){
  if(!banner) return;
  const bt = banner.t;
  let s, alpha;
  if(bt < 0.35){ s = easeOutBack(bt / 0.35); alpha = bt / 0.35; }
  else if(bt < 1.6){ s = 1; alpha = 1; }
  else { s = 1; alpha = 1 - (bt - 1.6) / 0.4; }
  ctx.save();
  ctx.translate(GAME_W / 2, GAME_H * 0.3);
  ctx.scale(s, s);
  ctx.globalAlpha = clamp(alpha, 0, 1);
  ctx.font = 'bold 42px sans-serif';
  ctx.textAlign = 'center';
  ctx.strokeStyle = 'rgba(0,0,0,.5)'; ctx.lineWidth = 8;
  ctx.strokeText(banner.txt, 0, 0);
  ctx.fillStyle = '#fff';
  ctx.fillText(banner.txt, 0, 0);
  ctx.restore();
}

// ---------- 全畫面特效 ----------
function drawScreenFx(){
  if(flash > 0){
    ctx.fillStyle = 'rgba(255,255,255,' + (flash * 2).toFixed(2) + ')';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
  }
  if(redFlash > 0){
    const g = ctx.createRadialGradient(GAME_W / 2, GAME_H / 2, GAME_H * 0.3, GAME_W / 2, GAME_H / 2, GAME_H * 0.75);
    g.addColorStop(0, 'rgba(200,30,30,0)');
    g.addColorStop(1, 'rgba(200,30,30,' + (redFlash * 1.4).toFixed(2) + ')');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, GAME_W, GAME_H);
  }
  // 統一氛圍薄紗
  ctx.fillStyle = 'rgba(20,10,60,0.06)';
  ctx.fillRect(0, 0, GAME_W, GAME_H);
}

// ---------- 主繪製 ----------
function draw(){
  ctx.clearRect(0, 0, GAME_W, GAME_H);
  ctx.save();
  if(shake > 0.3) ctx.translate((Math.random() * 2 - 1) * shake, (Math.random() * 2 - 1) * shake);

  drawBackground();
  drawLandmarks();
  drawTyphoon();
  drawGround();
  drawCoins();
  drawHearts();
  drawPows();
  drawObstacles();
  if(!(state === 'dead' && P.y > GAME_H + 60)) drawPlayer();
  drawCloudLayer(2, progress());   // 最近的前景雲，蓋在角色前增加深度
  drawParts();
  drawFloats();
  ctx.restore();

  drawBanner();
  if(state === 'play' && playT < 3.4){   // v2：開場常駐操作提示
    ctx.save();
    ctx.globalAlpha = clamp(3.4 - playT, 0, 1);
    ctx.fillStyle = 'rgba(10,16,38,0.6)';
    const hw = 260;
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(GAME_W/2 - hw, GAME_H - 76, hw*2, 40, 20)
                  : ctx.rect(GAME_W/2 - hw, GAME_H - 76, hw*2, 40);
    ctx.fill();
    ctx.font = 'bold 19px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.fillText('↕ 手指拖曳 或 ↑↓ / W S 上下移動閃避！', GAME_W/2, GAME_H - 56);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
  }
  if(innerHeight > innerWidth * 1.15){   // v2：直向持機提示
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffe08a';
    ctx.strokeStyle = 'rgba(0,0,0,.5)'; ctx.lineWidth = 4;
    ctx.strokeText('↻ 轉成橫向，畫面更大！', GAME_W/2, 66);
    ctx.fillText('↻ 轉成橫向，畫面更大！', GAME_W/2, 66);
    ctx.restore();
  }
  drawScreenFx();
}

// ---------- 主更新 ----------
function update(dt){
  t += dt;
  shake *= Math.pow(0.001, dt);
  if(flash > 0) flash -= dt;
  if(redFlash > 0) redFlash -= dt;
  updateParts(dt);
  updateFloats(dt);
  if(banner){ banner.t += dt; if(banner.t > 2) banner = null; }

  if(state === 'menu'){
    moveClouds(dt, 0.25);
    P.x = 210; P.y = GAME_H / 2 + Math.sin(t * 1.2) * 26;
    P.rot = Math.sin(t * 0.9) * 0.12;
    P.vy = Math.cos(t * 1.2) * 30;
  } else if(state === 'play'){
    moveClouds(dt);
    updatePlay(dt);
  } else if(state === 'won'){
    moveClouds(dt, 0.15);
    updateWon(dt);
  } else if(state === 'dead'){
    updateDead(dt);
  } else if(state === 'end'){
    moveClouds(dt, 0.1);
    if(endWon) confetti();
  }

  // 分數滾動緩動
  dispScore += (score - dispScore) * Math.min(1, 8 * dt);
  if(state === 'play'){
    scoreNEl.textContent = Math.round(dispScore);
    const pct = (progress() * 100).toFixed(1) + '%';
    barFill.style.width = pct;
    barIcon.style.left = pct;
  }
}

// ---------- 主迴圈：固定時間步進 ----------
const STEP = 1 / 60;
let last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while(acc >= STEP){
    acc -= STEP;
    if(freeze > 0){ freeze -= STEP; continue; }   // hit-stop：暫停邏輯照常渲染
    update(STEP);
  }
  draw();
}

// ---------- 結束畫面 ----------
function showEnd(won){
  endReady = true;
  endWon = won;
  state = 'end';
  score = Math.round(score);
  if(score > best){ best = score; localStorage.setItem('conie_africa_best', String(best)); }
  if(won){
    endTitle.textContent = '🌍 咚！Conie 被吹到了非洲！';
    endText.innerHTML = '巴威颱風把 Conie 一路從台灣吹過印度洋、吹過撒哈拉，<br>最後「咻——」一聲降落在非洲大草原，鍋蓋頭都吹歪了 🥢💨<br>長頸鹿都跑來看她了！恭喜完成「Conie 世界巡迴（被迫版）」！';
  } else {
    endTitle.textContent = '💥 Conie 被吹得暈頭轉向…';
    endText.innerHTML = '風力太強，Conie 這次沒撐到非洲。<br>沒關係，再挑戰一次！閃過烏雲、碎片和閃電，<br>小心會追人的禿鷹，把她安全吹到非洲吧！';
  }
  endCoins.textContent = coins;
  endScore.textContent = score;
  endBest.textContent = best;
  endOv.classList.remove('hidden');
}

// ---------- 按鈕 ----------
function startGame(){
  sfx.click(); sfx.whoosh();
  menuOv.classList.add('hidden');
  endOv.classList.add('hidden');
  hud.classList.remove('hiddenEl');
  endReady = false;
  resetGame();
  state = 'play';
}
startBtn.addEventListener('click', startGame);
againBtn.addEventListener('click', startGame);   // <1 秒立即重玩

function toggleMute(){
  muted = !muted;
  localStorage.setItem('conie_africa_muted', muted ? '1' : '0');
  muteBtn.textContent = muted ? '🔇' : '🔊';
  if(!muted) sfx.click();
}
muteBtn.addEventListener('click', toggleMute);
muteBtn.textContent = muted ? '🔇' : '🔊';

// 選單顯示最佳分數
if(best > 0){
  menuBest.classList.remove('hiddenEl');
  menuBestN.textContent = best;
}

// ---------- 啟動 ----------
milestones = makeMilestones();
requestAnimationFrame(frame);
</script>
