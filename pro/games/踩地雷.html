<!DOCTYPE html>
<!-- 專業AI升級 v4 -->
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="author" content="AI未來創作營隊">
<title>恐怖校園：踩地雷</title>
<style>
  :root{
    --cyan:#38e1ff; --blue:#4f7cff; --purple:#9a6bff; --pink:#ff6cc7;
    --gold1:#ffcf5c; --gold2:#ffa72e; --gold3:#ff7e3d;
    --green1:#7fffa0; --green2:#3ddc84;
    --bg:#05080a; --panel:rgba(10,18,14,.92); --edge:rgba(127,255,160,.28);
    --text:#eaffe9; --dim:#8fa596;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);overflow:hidden;touch-action:none;
    -webkit-user-select:none;user-select:none;
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;color:var(--text)}
  #stage{position:fixed;inset:0;display:flex;flex-direction:column}
  #mid{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
  canvas{display:block;touch-action:none}
  button{font-family:inherit;cursor:pointer;touch-action:manipulation}
  .bar{display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:6px 10px;background:linear-gradient(180deg,rgba(10,16,12,.95),rgba(6,10,8,.9));
    border-bottom:1px solid rgba(127,255,160,.14)}
  #botbar{border-bottom:none;border-top:1px solid rgba(127,255,160,.14)}
  .hudtxt{font-weight:700;font-size:19px;display:flex;align-items:center;gap:6px;white-space:nowrap}
  .hudtxt svg{flex:none}
  .btn{min-width:48px;min-height:48px;border-radius:12px;border:2px solid var(--edge);
    background:rgba(20,32,24,.85);color:var(--text);font-size:16px;font-weight:700;
    display:flex;align-items:center;justify-content:center;gap:6px;padding:0 14px;
    transition:transform .12s ease,background .12s ease}
  .btn:active{transform:scale(.94)}
  .btn.gold{border-color:var(--gold2);color:var(--gold1)}
  .btn.gold.on{background:linear-gradient(180deg,var(--gold1),var(--gold2));color:#241503;border-color:var(--gold1)}
  .overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    padding:14px;z-index:10;background:rgba(3,6,4,.55)}
  .panel{max-width:640px;width:100%;max-height:96%;overflow-y:auto;background:var(--panel);
    border:1px solid var(--edge);border-radius:18px;padding:22px 20px;text-align:center;
    box-shadow:0 18px 60px rgba(0,0,0,.6)}
  h1{margin:0 0 2px;font-size:34px;
    background:linear-gradient(92deg,var(--green1),var(--green2),var(--cyan));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:var(--dim);font-size:15px;margin:0 0 14px}
  .how{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:0 0 6px}
  .how div{display:flex;align-items:center;gap:8px;background:rgba(20,32,24,.7);
    border:1px solid rgba(127,255,160,.16);border-radius:12px;padding:8px 12px;
    font-size:14px;color:var(--text)}
  .tip{color:var(--gold1);font-size:13.5px;margin:8px 0 14px}
  .lvgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:4px 0 10px}
  @media (max-width:480px){ .lvgrid{grid-template-columns:repeat(2,1fr)} }
  .lv{position:relative;min-height:86px;border-radius:14px;border:2px solid var(--edge);
    background:linear-gradient(180deg,rgba(28,42,32,.9),rgba(14,22,16,.9));color:var(--text);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 6px;
    transition:transform .12s ease}
  .lv:active{transform:scale(.95)}
  .lv b{font-size:16px}
  .lv small{color:var(--dim);font-size:12px}
  .lv .st{color:var(--gold1);font-size:14px;letter-spacing:2px}
  .lv.lock{opacity:.45;filter:grayscale(.7)}
  .foot{color:var(--dim);font-size:12px;margin-top:10px}
  #hint{position:fixed;left:50%;top:14%;transform:translateX(-50%);z-index:6;pointer-events:none;
    background:rgba(6,12,8,.85);border:1px solid var(--edge);border-radius:14px;padding:10px 18px;
    font-size:15px;text-align:center;line-height:1.6;opacity:0;transition:opacity .5s ease;white-space:nowrap}
  #hint.show{opacity:1}
  .stars{font-size:44px;letter-spacing:8px;color:#4a5a4c;margin:6px 0 2px;min-height:52px}
  .stars .lit{color:var(--gold1);display:inline-block;animation:pop .45s cubic-bezier(.2,2.2,.4,1) backwards}
  .stars .lit:nth-child(2){animation-delay:.18s}
  .stars .lit:nth-child(3){animation-delay:.36s}
  @keyframes pop{from{transform:scale(0) rotate(-40deg)}to{transform:scale(1) rotate(0)}}
  .bigmsg{font-size:28px;font-weight:800;margin:2px 0 4px}
  .bigmsg.win{color:var(--green1)} .bigmsg.lose{color:#ff8a8a}
  .row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px}
  .hide{display:none !important}
  .kbd{display:inline-block;border:1px solid var(--dim);border-radius:5px;padding:0 6px;
    font-size:12px;color:var(--dim);margin:0 1px}
</style>
</head>
<body>
<div id="stage">
  <div class="bar" id="topbar">
    <button class="btn" id="btnBack" aria-label="返回選關">◀ 選關</button>
    <span class="hudtxt" id="hudMine"></span>
    <span class="hudtxt" id="hudCharm"></span>
    <span class="hudtxt" id="hudTime">00:00</span>
  </div>
  <div id="mid"><canvas id="game"></canvas></div>
  <div class="bar" id="botbar">
    <button class="btn gold" id="btnFlag">蠟燭模式：關</button>
    <span style="flex:1"></span>
    <button class="btn" id="btnRetry" aria-label="重新開始">↺ 重來</button>
    <button class="btn" id="btnMute" aria-label="聲音開關"></button>
  </div>
</div>

<div id="hint"></div>

<div class="overlay" id="title">
  <div class="panel">
    <h1>恐怖校園：踩地雷</h1>
    <p class="sub">踩地雷・放學後的探險　—　AI未來創作營隊</p>
    <div class="how">
      <div><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#38e1ff" stroke-width="2"><rect x="3" y="5" width="18" height="11" rx="1.5"/><path d="M2 19h20"/></svg>
        左鍵翻開・右鍵放蠟燭・<span class="kbd">方向鍵</span><span class="kbd">Z</span><span class="kbd">X</span>也能玩</div>
      <div><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ff6cc7" stroke-width="2"><rect x="7" y="2" width="10" height="20" rx="2.5"/><circle cx="12" cy="18.4" r="1" fill="#ff6cc7"/></svg>
        點一下翻開・長按放蠟燭・或開下方「蠟燭模式」</div>
    </div>
    <p class="tip">每關身上帶一張平安符：第一次踩到惡靈會自動封印牠！<br>限時通關＋不用平安符可以拿三顆星。</p>
    <div class="lvgrid" id="lvgrid"></div>
    <div class="row">
      <button class="btn" id="btnMute2"></button>
    </div>
    <p class="foot" id="footStars"></p>
  </div>
</div>

<div class="overlay hide" id="result">
  <div class="panel">
    <div class="bigmsg" id="resMsg"></div>
    <div class="sub" id="resSub"></div>
    <div class="stars" id="resStars"></div>
    <div class="sub" id="resTime"></div>
    <div class="row">
      <button class="btn" id="btnAgain">↺ 再玩一次</button>
      <button class="btn gold hide" id="btnNext">下一關 ▶</button>
      <button class="btn" id="btnMenu">選關</button>
    </div>
  </div>
</div>

<script>
'use strict';
/* ============ 關卡設定（v4：6 關戰役＋星等） ============ */
const LEVELS = [
  { name:'放學教室',   cols:8,  rows:8,  mines:6,  par:40,  light:0   },
  { name:'昏暗走廊',   cols:9,  rows:9,  mines:10, par:60,  light:280 },
  { name:'舊圖書館',   cols:10, rows:10, mines:14, par:75,  light:245 },
  { name:'音樂教室',   cols:11, rows:10, mines:17, par:90,  light:220 },
  { name:'大體育館',   cols:12, rows:11, mines:22, par:105, light:200 },
  { name:'霧夜頂樓',   cols:12, rows:12, mines:26, par:120, light:180 }
];
const CELL = 44, PAD = 14;
const SK_STARS = 'minepro_stars', SK_BEST = 'minepro_best_', SK_MUTE = 'minepro_muted';

let levelStars = [0,0,0,0,0,0];
try{
  const s = JSON.parse(localStorage.getItem(SK_STARS) || '[]');
  if(Array.isArray(s)) for(let i=0;i<LEVELS.length;i++) levelStars[i] = s[i]|0;
}catch(e){}
function saveStars(){ try{ localStorage.setItem(SK_STARS, JSON.stringify(levelStars)); }catch(e){} }
function unlocked(i){ return i === 0 || levelStars[i-1] > 0; }
function bestOf(i){ try{ return Number(localStorage.getItem(SK_BEST+i)) || 0; }catch(e){ return 0; } }

/* ============ 色盤（廢棄校舍・幽暗手電筒風） ============ */
const COL = {
  bg0:'#040605', bg1:'#0b120d',
  cellTop:'#1e2a22', cellBot:'#121810', cellEdge:'#3a4e40', cellHi:'#2a3a2c',
  reveal:'#0d110d', revealEdge:'#263626',
  text:'#eaffe9', dim:'#8fa596',
  gold:'#ffcf5c', gold2:'#ffa72e',
  green:'#7fffa0', green2:'#3ddc84',
  ghost:'#e8fbee', ghostShade:'#9fc3ab',
  nums:['','#6fb1ff','#5be08a','#ff6c6c','#c48cff','#e5c15b','#5be2e2','#eaffe9','#ffa0c8']
};

/* ============ 畫布與縮放 ============ */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let GAME_W = 760, GAME_H = 480;
function resize(){
  const mid = document.getElementById('mid');
  const aw = Math.max(120, mid.clientWidth - 8), ah = Math.max(120, mid.clientHeight - 8);
  const scale = Math.min(aw / GAME_W, ah / GAME_H, 1.6);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = Math.round(GAME_W * scale * dpr);
  canvas.height = Math.round(GAME_H * scale * dpr);
  canvas.style.width = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale;
}
addEventListener('resize', () => { resize(); bakeBg(); });

/* ============ 音效：Web Audio（Compressor 主匯流排＋隨機音高） ============ */
let AC = null, master = null;
let muted = false;
try{ muted = localStorage.getItem(SK_MUTE) === '1'; }catch(e){}
function audio(){
  if(!AC){
    AC = new (window.AudioContext || window.webkitAudioContext)();
    const comp = AC.createDynamicsCompressor();
    comp.threshold.value = -18; comp.knee.value = 24; comp.ratio.value = 8;
    master = AC.createGain(); master.gain.value = 0.9;
    master.connect(comp); comp.connect(AC.destination);
  }
  if(AC.state === 'suspended') AC.resume();
  return AC;
}
addEventListener('pointerdown', audio, { once:true });
addEventListener('keydown', audio, { once:true });
function beep(freq, dur, type, vol, slide){
  if(muted || !AC) return;
  const ac = audio();
  freq *= 0.94 + Math.random() * 0.12;                 // 隨機音高
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, ac.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), ac.currentTime + dur);
  g.gain.setValueAtTime(vol == null ? 0.14 : vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g); g.connect(master);
  o.start(); o.stop(ac.currentTime + dur + 0.02);
}
function noise(dur, vol){
  if(muted || !AC) return;
  const ac = audio();
  const buf = ac.createBuffer(1, Math.floor(ac.sampleRate * dur), ac.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
  const n = ac.createBufferSource(); n.buffer = buf;
  const g = ac.createGain(); g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  n.connect(g); g.connect(master); n.start();
}
const SFX = {
  reveal(n){ beep(240 + n*34, 0.07, 'triangle', 0.09, -25); },
  cascade(i){ beep(320 + i*26, 0.05, 'sine', 0.05); },
  flag(on){ beep(on ? 560 : 320, 0.08, 'sine', 0.09, on ? 90 : -60); },
  charm(){ beep(880, 0.16, 'triangle', 0.14, 220); noise(0.18, 0.1); },
  explode(){ noise(0.45, 0.3); beep(88, 0.35, 'sawtooth', 0.2, -55); },
  win(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.22,'triangle',0.12), i*110)); },
  tick(){ beep(1200, 0.03, 'square', 0.03); },
  ui(){ beep(660, 0.06, 'sine', 0.07); }
};

/* ============ 粒子（swap-pop 移除）與飄字 ============ */
const parts = [];
function burst(x, y, color, n, speed, up){
  n = n || 12; speed = speed || 200;
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2, s = speed*(0.3+Math.random()*0.7);
    parts.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s - (up||0), life:0.6, max:0.6, color, sz:3+Math.random()*3 });
  }
  if(parts.length > 420) parts.length = 420;
}
function updateParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p = parts[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 520*dt; p.life -= dt;
    if(p.life <= 0){ parts[i] = parts[parts.length-1]; parts.pop(); }
  }
}
function drawParts(){
  for(const p of parts){
    ctx.globalAlpha = Math.max(0, p.life/p.max);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-p.sz/2, p.y-p.sz/2, p.sz, p.sz);
  }
  ctx.globalAlpha = 1;
}
const floaters = [];
function floatText(x, y, text, color){ floaters.push({x,y,text,color,life:1,max:1}); }
function updateFloaters(dt){
  for(let i=floaters.length-1;i>=0;i--){
    const f = floaters[i]; f.y -= 34*dt; f.life -= dt;
    if(f.life<=0){ floaters[i]=floaters[floaters.length-1]; floaters.pop(); }
  }
}
function drawFloaters(){
  ctx.textAlign='center'; ctx.font='bold 17px sans-serif';
  for(const f of floaters){
    ctx.globalAlpha = Math.max(0, f.life/f.max);
    ctx.fillStyle = f.color; ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

/* ============ 預烘焙（背景、格磚、光暈、手電筒遮罩） ============ */
let bgCanvas = null, tileHidden = null, tileHi = null, tileOpen = null, glowGold = null, glowGreen = null, lightMask = null;
function makeCanvas(w, h){ const c = document.createElement('canvas'); c.width = w; c.height = h; return c; }
function bakeTiles(){
  tileHidden = makeCanvas(CELL, CELL); tileHi = makeCanvas(CELL, CELL); tileOpen = makeCanvas(CELL, CELL);
  for(const [cv, top] of [[tileHidden, COL.cellTop], [tileHi, COL.cellHi]]){
    const c = cv.getContext('2d');
    const g = c.createLinearGradient(0,0,0,CELL);
    g.addColorStop(0, top); g.addColorStop(1, COL.cellBot);
    c.fillStyle = g; c.fillRect(1,1,CELL-2,CELL-2);
    c.strokeStyle = COL.cellEdge; c.lineWidth = 1.5; c.strokeRect(1.5,1.5,CELL-3,CELL-3);
    c.fillStyle = 'rgba(255,255,255,.06)'; c.fillRect(2,2,CELL-4,4);   // 上緣受光
    c.fillStyle = 'rgba(0,0,0,.28)'; c.fillRect(2,CELL-6,CELL-4,4);    // 下緣陰影
  }
  const c = tileOpen.getContext('2d');
  c.fillStyle = COL.reveal; c.fillRect(1,1,CELL-2,CELL-2);
  c.strokeStyle = COL.revealEdge; c.lineWidth = 1; c.strokeRect(1.5,1.5,CELL-3,CELL-3);
  c.fillStyle = 'rgba(0,0,0,.35)'; c.fillRect(1,1,CELL-2,3);           // 內陷陰影
}
function bakeGlow(color){
  const s = 96, cv = makeCanvas(s, s), c = cv.getContext('2d');
  const g = c.createRadialGradient(s/2,s/2,2, s/2,s/2,s/2);
  g.addColorStop(0, color); g.addColorStop(1, 'rgba(0,0,0,0)');
  c.fillStyle = g; c.fillRect(0,0,s,s);
  return cv;
}
function bakeLightMask(){
  const s = 640; lightMask = makeCanvas(s, s);
  const c = lightMask.getContext('2d');
  const g = c.createRadialGradient(s/2,s/2,s*0.14, s/2,s/2,s/2);
  g.addColorStop(0, 'rgba(2,4,3,0)');
  g.addColorStop(0.55, 'rgba(2,4,3,0.6)');
  g.addColorStop(1, 'rgba(2,4,3,0.96)');
  c.fillStyle = g; c.fillRect(0,0,s,s);
}
function bakeBg(){
  bgCanvas = makeCanvas(Math.max(2, GAME_W), Math.max(2, GAME_H));
  const c = bgCanvas.getContext('2d');
  const g = c.createLinearGradient(0,0,0,GAME_H);
  g.addColorStop(0, COL.bg1); g.addColorStop(1, COL.bg0);
  c.fillStyle = g; c.fillRect(0,0,GAME_W,GAME_H);
  // 月光窗
  c.save(); c.globalAlpha = 0.16;
  const wg = c.createLinearGradient(GAME_W*0.6,0,GAME_W*0.85,GAME_H);
  wg.addColorStop(0,'#bfe8ff'); wg.addColorStop(1,'rgba(191,232,255,0)');
  c.fillStyle = wg;
  c.beginPath(); c.moveTo(GAME_W*0.58,0); c.lineTo(GAME_W*0.72,0);
  c.lineTo(GAME_W*0.95,GAME_H); c.lineTo(GAME_W*0.7,GAME_H); c.closePath(); c.fill();
  c.restore();
  // 走廊置物櫃剪影（遠景層）
  c.save(); c.globalAlpha = 0.5; c.fillStyle = '#020403';
  for(let x=4; x<GAME_W-4; x+=36){
    c.fillRect(x, 0, 28, GAME_H);
    c.globalAlpha = 0.18; c.fillStyle = '#1a2a1e';
    c.fillRect(x+10, GAME_H*0.2, 8, 3);
    c.globalAlpha = 0.5; c.fillStyle = '#020403';
  }
  c.restore();
  // 藤蔓裂縫（中景層）
  c.save(); c.strokeStyle = 'rgba(61,220,132,.12)'; c.lineWidth = 2;
  for(let i=0;i<5;i++){
    const x0 = (i*173 + 40) % GAME_W;
    c.beginPath(); c.moveTo(x0, 0);
    let x = x0;
    for(let y=0; y<GAME_H; y+=26){ x += Math.sin(i*7+y*0.05)*14; c.lineTo(x, y); }
    c.stroke();
  }
  c.restore();
  // 邊緣暗角
  const v = c.createRadialGradient(GAME_W/2,GAME_H/2,Math.min(GAME_W,GAME_H)*0.35, GAME_W/2,GAME_H/2,Math.max(GAME_W,GAME_H)*0.72);
  v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,'rgba(0,0,0,.5)');
  c.fillStyle = v; c.fillRect(0,0,GAME_W,GAME_H);
}
bakeTiles(); bakeLightMask();
glowGold = bakeGlow('rgba(255,207,92,.5)');
glowGreen = bakeGlow('rgba(127,255,160,.4)');

/* ============ 棋盤狀態 ============ */
let L = LEVELS[0], levelIndex = 0;
let board, minesLeft, revealedCount, timer, gameActive, firstClick, exploded, charm, charmUsed;
let hoverCell = null, cursor = { r:0, c:0, on:false };
let shake = 0, freeze = 0, mist = 0;
const light = { x:0, y:0, tx:0, ty:0 };
let boardOX = PAD, boardOY = PAD;

function makeBoard(){
  const b = [];
  for(let r=0;r<L.rows;r++){
    const row = [];
    for(let c=0;c<L.cols;c++) row.push({ mine:false, flag:false, open:false, seal:false, n:0, t:-1 });
    b.push(row);
  }
  return b;
}
function eachCell(fn){ for(let r=0;r<L.rows;r++) for(let c=0;c<L.cols;c++) fn(board[r][c], r, c); }
function nbrs(r, c){
  const out = [];
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
    if(!dr && !dc) continue;
    const nr=r+dr, nc=c+dc;
    if(nr>=0 && nr<L.rows && nc>=0 && nc<L.cols) out.push([nr,nc]);
  }
  return out;
}
function placeMines(er, ec){
  const ban = new Set([er+','+ec]);
  for(const [r,c] of nbrs(er,ec)) ban.add(r+','+c);
  let placed = 0, guard = 0;
  while(placed < L.mines && guard++ < 99999){
    const r = (Math.random()*L.rows)|0, c = (Math.random()*L.cols)|0;
    if(board[r][c].mine || ban.has(r+','+c)) continue;
    board[r][c].mine = true; placed++;
  }
  eachCell((cell,r,c) => {
    if(cell.mine) return;
    let n = 0;
    for(const [nr,nc] of nbrs(r,c)) if(board[nr][nc].mine) n++;
    cell.n = n;
  });
}
/* 連鎖翻開：BFS＋距離延遲（波紋動畫） */
function floodReveal(r0, c0){
  const q = [[r0,c0,0]];
  let opened = 0;
  while(q.length){
    const [r,c,d] = q.shift();
    const cell = board[r][c];
    if(cell.open || cell.flag || cell.seal) continue;
    cell.open = true; cell.t = timer + d*0.035;
    revealedCount++; opened++;
    if(cell.n === 0 && !cell.mine){
      for(const [nr,nc] of nbrs(r,c)){
        const nb = board[nr][nc];
        if(!nb.open && !nb.flag && !nb.seal) q.push([nr,nc,d+1]);
      }
    }
  }
  return opened;
}
function cellCenter(r, c){ return { x: boardOX + c*CELL + CELL/2, y: boardOY + r*CELL + CELL/2 }; }

function hitMine(r, c){
  const p = cellCenter(r,c);
  if(charm > 0){                       // 平安符：封印惡靈，繼續玩
    charm--; charmUsed = true;
    const cell = board[r][c];
    if(!cell.flag) minesLeft--;
    cell.seal = true; cell.flag = false;
    shake = 7; freeze = 0.08;
    SFX.charm();
    burst(p.x, p.y, COL.gold, 20, 240, 80);
    floatText(p.x, p.y - 14, '平安符擋住了惡靈！', COL.gold);
    updateHUD();
    return true;
  }
  exploded = { r, c };
  endGame(false);
  return false;
}
function doReveal(r, c){
  const cell = board[r][c];
  if(cell.flag || cell.open || cell.seal || !gameActive) return;
  if(!firstClick){ placeMines(r, c); firstClick = true; hideHint(); }
  if(cell.mine){ hitMine(r, c); return; }
  const opened = floodReveal(r, c);
  const p = cellCenter(r,c);
  burst(p.x, p.y, 'rgba(160,220,180,.9)', 5, 110);
  if(opened > 3){
    for(let i=0;i<Math.min(opened,6);i++) setTimeout(()=>SFX.cascade(i), i*40);
  } else SFX.reveal(cell.n);
  checkWin();
}
function doFlag(r, c){
  const cell = board[r][c];
  if(cell.open || cell.seal || !gameActive) return;
  cell.flag = !cell.flag;
  minesLeft += cell.flag ? -1 : 1;
  const p = cellCenter(r,c);
  if(cell.flag) burst(p.x, p.y-8, COL.gold, 8, 130, 60);
  SFX.flag(cell.flag);
  updateHUD();
}
function flagsAround(r, c){
  let n = 0;
  for(const [nr,nc] of nbrs(r,c)) if(board[nr][nc].flag || board[nr][nc].seal) n++;
  return n;
}
function doChord(r, c){
  const cell = board[r][c];
  if(!cell.open || cell.n === 0 || !gameActive) return;
  if(flagsAround(r,c) !== cell.n){ SFX.tick(); return; }
  let any = false;
  for(const [nr,nc] of nbrs(r,c)){
    const nb = board[nr][nc];
    if(nb.flag || nb.open || nb.seal) continue;
    if(nb.mine){ if(!hitMine(nr,nc)) return; continue; }
    floodReveal(nr, nc); any = true;
  }
  if(any){ SFX.cascade(2); checkWin(); }
}
function checkWin(){
  if(revealedCount >= L.rows*L.cols - L.mines) endGame(true);
  else updateHUD();
}

function calcStars(t){
  if(t <= L.par && !charmUsed) return 3;
  if(t <= L.par * 1.7) return 2;
  return 1;
}
function endGame(won){
  gameActive = false;
  if(won){
    eachCell(cell => { if(cell.mine && !cell.seal) cell.flag = true; });
    minesLeft = 0;
    SFX.win();
    for(let i=0;i<12;i++){
      setTimeout(() => burst(
        boardOX + Math.random()*L.cols*CELL, boardOY + Math.random()*L.rows*CELL,
        [COL.gold, COL.green, COL.green2, '#38e1ff'][i%4], 12, 200, 60), i*70);
    }
    const t = Math.floor(timer);
    const stars = calcStars(timer);
    if(stars > levelStars[levelIndex]){ levelStars[levelIndex] = stars; saveStars(); }
    const best = bestOf(levelIndex);
    if(!best || t < best){ try{ localStorage.setItem(SK_BEST+levelIndex, String(t)); }catch(e){} }
    setTimeout(() => showResult(true, stars), 850);
  } else {
    eachCell(cell => { if(cell.mine) cell.open = true; });
    shake = 12; freeze = 0.15;
    SFX.explode();
    if(exploded){
      const p = cellCenter(exploded.r, exploded.c);
      burst(p.x, p.y, '#ff6b6b', 30, 280);
      burst(p.x, p.y, COL.gold, 14, 200);
    }
    setTimeout(() => showResult(false, 0), 1000);
  }
  updateHUD();
}

/* ============ 角色繪製 ============ */
function drawGhost(x, y, r, t, mood, seal){
  // mood: 0 平常 1 生氣(爆點) ; 多部件：光暈、身體漸層、波浪裙、眼睛、嘴、腮紅
  const bob = Math.sin(t*3 + x*0.07) * r*0.12;
  ctx.save();
  ctx.translate(x, y + bob);
  ctx.drawImage(mood ? glowGold : glowGreen, -r*1.9, -r*1.9, r*3.8, r*3.8);
  const g = ctx.createLinearGradient(0,-r,0,r);
  if(mood){ g.addColorStop(0,'#ffd9d9'); g.addColorStop(1,'#e08484'); }
  else { g.addColorStop(0,COL.ghost); g.addColorStop(1,COL.ghostShade); }
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(0, -r*0.15, r, Math.PI, 0, false);
  const waves = 4, base = r*0.6;
  ctx.lineTo(r, base);
  for(let i=0;i<waves;i++){
    const x0 = r - (2*r/waves)*i - r/waves;
    const x1 = r - (2*r/waves)*(i+1);
    ctx.quadraticCurveTo(x0, base + r*0.35 + Math.sin(t*6+i)*r*0.06, x1, base);
  }
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(20,40,28,.5)'; ctx.lineWidth = 1.5; ctx.stroke();
  // 小手
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.ellipse(-r*1.02, r*0.05, r*0.24, r*0.15, 0.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( r*1.02, r*0.05, r*0.24, r*0.15, -0.5, 0, Math.PI*2); ctx.fill();
  // 眼睛（眨眼）
  const blink = (Math.sin(t*1.3 + x) > 0.97) ? 0.15 : 1;
  ctx.fillStyle = '#16241a';
  if(mood){
    ctx.save(); ctx.translate(-r*0.34,-r*0.28); ctx.rotate(0.5); ctx.fillRect(-r*0.22,-r*0.07,r*0.44,r*0.14); ctx.restore();
    ctx.save(); ctx.translate( r*0.34,-r*0.28); ctx.rotate(-0.5); ctx.fillRect(-r*0.22,-r*0.07,r*0.44,r*0.14); ctx.restore();
  } else {
    ctx.beginPath(); ctx.ellipse(-r*0.34,-r*0.22, r*0.15, r*0.22*blink, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( r*0.34,-r*0.22, r*0.15, r*0.22*blink, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-r*0.29,-r*0.3, r*0.05, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( r*0.39,-r*0.3, r*0.05, 0, Math.PI*2); ctx.fill();
  }
  // 嘴與腮紅
  ctx.fillStyle = '#16241a';
  ctx.beginPath();
  if(mood) ctx.ellipse(0, r*0.12, r*0.3, r*0.36, 0, 0, Math.PI*2);
  else ctx.ellipse(0, r*0.1, r*0.18, r*0.24, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,130,160,.4)';
  ctx.beginPath(); ctx.arc(-r*0.58, 0, r*0.12, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( r*0.58, 0, r*0.12, 0, Math.PI*2); ctx.fill();
  // 封印符
  if(seal){
    ctx.save(); ctx.rotate(-0.12);
    ctx.fillStyle = '#f6e7b2'; ctx.fillRect(-r*0.32, -r*0.75, r*0.64, r*1.25);
    ctx.strokeStyle = '#b98c2e'; ctx.lineWidth = 1.5; ctx.strokeRect(-r*0.32, -r*0.75, r*0.64, r*1.25);
    ctx.fillStyle = '#b3402e'; ctx.font = 'bold ' + Math.round(r*0.62) + 'px serif';
    ctx.textAlign = 'center'; ctx.fillText('封', 0, r*0.05);
    ctx.restore();
  }
  ctx.restore();
}
function drawCandle(x, y, size, t){
  // 多部件：光暈、蠟身漸層＋蠟滴、燭芯、雙層火焰
  const cx = x + size/2, baseY = y + size*0.86;
  const flick = 1 + Math.sin(t*11 + x*0.5)*0.15 + Math.sin(t*23+x)*0.07;
  ctx.save();
  ctx.drawImage(glowGold, cx - size*0.75, y - size*0.35, size*1.5, size*1.5);
  const bw = size*0.3, bh = size*0.44;
  const g = ctx.createLinearGradient(cx-bw/2,0,cx+bw/2,0);
  g.addColorStop(0,'#cdbd93'); g.addColorStop(0.5,'#f6ecd0'); g.addColorStop(1,'#b3a377');
  ctx.fillStyle = g;
  ctx.fillRect(cx-bw/2, baseY-bh, bw, bh);
  ctx.beginPath(); ctx.ellipse(cx, baseY, bw/2, bw*0.18, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx, baseY-bh, bw/2, bw*0.18, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#f6ecd0';
  ctx.beginPath();
  ctx.moveTo(cx-bw*0.34, baseY-bh);
  ctx.quadraticCurveTo(cx-bw*0.44, baseY-bh+size*0.12, cx-bw*0.3, baseY-bh+size*0.14);
  ctx.quadraticCurveTo(cx-bw*0.2, baseY-bh+size*0.1, cx-bw*0.22, baseY-bh);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#6b5c3a'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(cx, baseY-bh); ctx.lineTo(cx, baseY-bh-size*0.08); ctx.stroke();
  const fy = baseY - bh - size*0.09, fr = size*0.11*flick;
  ctx.fillStyle = COL.gold2;
  ctx.beginPath();
  ctx.moveTo(cx, fy - fr*2.1);
  ctx.quadraticCurveTo(cx + fr, fy - fr*0.6, cx, fy + fr*0.5);
  ctx.quadraticCurveTo(cx - fr, fy - fr*0.6, cx, fy - fr*2.1);
  ctx.fill();
  ctx.fillStyle = '#fff3c4';
  ctx.beginPath();
  ctx.moveTo(cx, fy - fr*1.1);
  ctx.quadraticCurveTo(cx + fr*0.45, fy - fr*0.2, cx, fy + fr*0.4);
  ctx.quadraticCurveTo(cx - fr*0.45, fy - fr*0.2, cx, fy - fr*1.1);
  ctx.fill();
  ctx.restore();
}
function easeOutBack(t){ return 1 + 2.7*Math.pow(t-1,3) + 1.7*Math.pow(t-1,2); }

/* ============ 繪製棋盤 ============ */
function drawBoard(t){
  for(let r=0;r<L.rows;r++){
    for(let c=0;c<L.cols;c++){
      const cell = board[r][c];
      const x = boardOX + c*CELL, y = boardOY + r*CELL;
      const showOpen = cell.open && t >= cell.t;
      if(showOpen){
        ctx.drawImage(tileOpen, x, y);
        let sc = 1;
        const age = t - cell.t;
        if(age < 0.18) sc = Math.max(0.01, easeOutBack(Math.min(1, age/0.18)));
        ctx.save();
        ctx.translate(x + CELL/2, y + CELL/2);
        ctx.scale(sc, sc);
        if(cell.mine){
          const boom = exploded && exploded.r===r && exploded.c===c;
          if(boom){ ctx.fillStyle='rgba(255,90,90,.3)'; ctx.beginPath(); ctx.arc(0,0,CELL*0.56,0,Math.PI*2); ctx.fill(); }
          drawGhost(0, 0, CELL*0.3, t, boom?1:0, false);
        } else if(cell.n > 0){
          ctx.fillStyle = COL.nums[cell.n];
          ctx.font = 'bold 21px sans-serif'; ctx.textAlign = 'center';
          ctx.fillText(cell.n, 0, 7.5);
        }
        ctx.restore();
      } else {
        const isHover = (hoverCell && hoverCell.r===r && hoverCell.c===c) ||
                        (cursor.on && cursor.r===r && cursor.c===c);
        ctx.drawImage((isHover && !cell.open) ? tileHi : tileHidden, x, y);
        if(cell.seal) drawGhost(x+CELL/2, y+CELL/2, CELL*0.3, t, 0, true);
        else if(cell.flag) drawCandle(x, y, CELL, t);
      }
    }
  }
  if(cursor.on){
    const x = boardOX + cursor.c*CELL, y = boardOY + cursor.r*CELL;
    ctx.strokeStyle = COL.gold; ctx.lineWidth = 3;
    ctx.strokeRect(x+1.5, y+1.5, CELL-3, CELL-3);
  }
}
function drawFlashlight(t){
  if(!L.light) return;
  const flick = 1 + Math.sin(t*17)*0.03 + (Math.random() < 0.012 ? -0.15 : 0);
  const R = L.light * flick;
  const x0 = light.x - R, y0 = light.y - R, s = R*2;
  ctx.save();
  ctx.beginPath(); ctx.rect(boardOX-2, boardOY-2, L.cols*CELL+4, L.rows*CELL+4); ctx.clip();
  ctx.drawImage(lightMask, x0, y0, s, s);
  ctx.fillStyle = 'rgba(2,4,3,0.96)';
  ctx.fillRect(boardOX-2, boardOY-2, L.cols*CELL+4, Math.max(0, y0-(boardOY-2)));
  ctx.fillRect(boardOX-2, y0+s, L.cols*CELL+4, Math.max(0, (boardOY+L.rows*CELL+2)-(y0+s)));
  ctx.fillRect(boardOX-2, y0, Math.max(0, x0-(boardOX-2)), s);
  ctx.fillRect(x0+s, y0, Math.max(0, (boardOX+L.cols*CELL+2)-(x0+s)), s);
  ctx.restore();
}
function drawMist(t){
  ctx.save(); ctx.globalAlpha = 0.10;
  const w = GAME_W*0.9;
  const x1 = ((t*14) % (GAME_W + w)) - w;
  const x2 = ((t*8 + GAME_W*0.6) % (GAME_W + w)) - w;
  ctx.drawImage(glowGreen, x1, GAME_H*0.1, w, GAME_H*0.5);
  ctx.drawImage(glowGreen, x2, GAME_H*0.45, w, GAME_H*0.6);
  ctx.restore();
}

const playState = {
  enter(){},
  update(dt){
    if(gameActive && firstClick){ timer += dt; updateClock(); }

    const f = 1 - Math.pow(0.001, dt);
    light.x += (light.tx - light.x) * f;
    light.y += (light.ty - light.y) * f;
  },
  draw(t){

    drawFlashlight(t);
    drawParts(); drawFloaters();
    ctx.restore();
  }
};

    shake *= Math.pow(0.001, dt);
  },
  draw(t){
    ctx.drawImage(bgCanvas, 0, 0);
    ctx.save();
    ctx.translate((Math.random()*2-1)*shake, (Math.random()*2-1)*shake);
    drawBoard(t);
    drawParts(); drawFloaters();

};

function startLevel(i){

  boardOX = PAD; boardOY = PAD;

  minesLeft = L.mines; revealedCount = 0; timer = 0;
  gameActive = true; firstClick = false; exploded = null;
  charm = 1; charmUsed = false;
  hoverCell = null; cursor.on = false;
  cursor.r = (L.rows/2)|0; cursor.c = (L.cols/2)|0;

  $('resMsg').className = 'bigmsg ' + (won ? 'win' : 'lose');
  $('resSub').textContent = won
    ? (allClear && levelIndex === LEVELS.length-1 ? '六個地點全部淨化完成，校園恢復平靜！' : '第 ' + (levelIndex+1) + ' 關　' + L.name + ' 淨化完成')
    : '紅色惡靈就躲在那一格底下，記得用蠟燭標記可疑的格子！';
  $('resStars').innerHTML = won
    ? '<span class="lit">★</span>'.repeat(stars) + '<span>☆</span>'.repeat(3-stars)
    : '';
  const best = bestOf(levelIndex);
  $('resTime').innerHTML = won
    ? '時間 ' + fmtTime(timer) + (best ? '　最佳 ' + fmtTime(best) : '') +
      (stars < 3 ? '<br>三星條件：' + L.par + ' 秒內＋不用平安符' : '') +
      '<br>目前收集 ' + total + ' / 18 顆星'
    : '存活 ' + fmtTime(timer) + '　再挑戰一次！';
  show('result', true);
  const canNext = won && levelIndex < LEVELS.length-1;
  $('btnNext').classList.toggle('hide', !canNext);
  setState(resultState, 'result');
}

$('btnBack').addEventListener('click', () => setState(titleState, 'title'));
$('btnMenu').addEventListener('click', () => setState(titleState, 'title'));
$('btnRetry').addEventListener('click', () => startLevel(levelIndex));
$('btnAgain').addEventListener('click', () => startLevel(levelIndex));
$('btnNext').addEventListener('click', () => startLevel(Math.min(LEVELS.length-1, levelIndex+1)));
$('btnMute').addEventListener('click', toggleMute);
$('btnMute2').addEventListener('click', toggleMute);
let flagMode = false;
const btnFlag = $('btnFlag');
function setFlagMode(on){
  flagMode = on;
  btnFlag.textContent = '蠟燭模式：' + (on ? '開' : '關');
  btnFlag.classList.toggle('on', on);
}
btnFlag.addEventListener('click', () => { setFlagMode(!flagMode); SFX.ui(); });
updateMuteBtns(); updateHUD();

/* ============ 輸入：滑鼠、觸控（長按）、鍵盤 ============ */
function boardPos(cx, cy){
  const r = canvas.getBoundingClientRect();
  return { x:(cx - r.left)/canvas._scale, y:(cy - r.top)/canvas._scale };
}
function cellAt(x, y){
  if(stateName !== 'play') return null;
  const bx = x - boardOX, by = y - boardOY;
  const c = Math.floor(bx/CELL), r = Math.floor(by/CELL);
  // 寬容判定：邊緣 6px 內也算
  if(c < -1 || c > L.cols || r < -1 || r > L.rows) return null;
  const cc = Math.max(0, Math.min(L.cols-1, c)), rr = Math.max(0, Math.min(L.rows-1, r));
  const cxp = boardOX + cc*CELL + CELL/2, cyp = boardOY + rr*CELL + CELL/2;
  if(Math.abs(x-cxp) > CELL/2+6 || Math.abs(y-cyp) > CELL/2+6) return null;
  return { r:rr, c:cc };
}
function tapCell(cell, kind){
  if(!cell || stateName !== 'play' || !gameActive) return;
  cursor.on = false;
  const b = board[cell.r][cell.c];
  if(kind === 'flag'){ if(b.open) doChord(cell.r, cell.c); else doFlag(cell.r, cell.c); }
  else if(b.open) doChord(cell.r, cell.c);
  else if(flagMode) doFlag(cell.r, cell.c);
  else doReveal(cell.r, cell.c);
}
canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('mousedown', e => {
  const p = boardPos(e.clientX, e.clientY);
  if(e.button === 2){ tapCell(cellAt(p.x, p.y), 'flag'); }
});
canvas.addEventListener('mouseup', e => {
  if(e.button !== 0) return;
  const p = boardPos(e.clientX, e.clientY);
  tapCell(cellAt(p.x, p.y), 'tap');
});
canvas.addEventListener('mousemove', e => {
  const p = boardPos(e.clientX, e.clientY);
  hoverCell = cellAt(p.x, p.y);
  light.tx = p.x; light.ty = p.y;
});

let pressTimer = null, pressCell = null, longPressed = false;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const p = boardPos(t.clientX, t.clientY);
  pressCell = cellAt(p.x, p.y);
  longPressed = false;
  hoverCell = pressCell;
  light.tx = p.x; light.ty = p.y;
  clearTimeout(pressTimer);
  pressTimer = setTimeout(() => {
    longPressed = true;
    if(pressCell) tapCell(pressCell, 'flag');
    if(navigator.vibrate) try{ navigator.vibrate(30); }catch(err){}
  }, 400);
}, { passive:false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0]; if(!t) return;
  const p = boardPos(t.clientX, t.clientY);
  const c = cellAt(p.x, p.y);
  if(!c || !pressCell || c.r !== pressCell.r || c.c !== pressCell.c) clearTimeout(pressTimer);
  light.tx = p.x; light.ty = p.y;
  hoverCell = c;
}, { passive:false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  clearTimeout(pressTimer);
  if(!longPressed && pressCell) tapCell(pressCell, 'tap');
  hoverCell = null; pressCell = null;
}, { passive:false });
canvas.addEventListener('touchcancel', e => { e.preventDefault(); clearTimeout(pressTimer); }, { passive:false });

addEventListener('keydown', e => {
  const k = e.code;
  if(k === 'KeyM'){ toggleMute(); return; }
  if(stateName === 'title'){
    const n = 'Digit123456'.indexOf(k.replace('Digit','')) >= 0 ? Number(k.slice(-1)) : 0;
    if(k.startsWith('Digit') && n >= 1 && n <= 6 && unlocked(n-1)){ startLevel(n-1); e.preventDefault(); }
    if(k === 'Enter' || k === 'Space'){ e.preventDefault(); startLevel(latestUnlocked()); }
    return;
  }
  if(stateName === 'result'){
    if(k === 'Enter' || k === 'Space'){
      e.preventDefault();
      if(!$('btnNext').classList.contains('hide')) startLevel(levelIndex+1);
      else startLevel(levelIndex);
    }
    if(k === 'KeyR'){ e.preventDefault(); startLevel(levelIndex); }
    if(k === 'Escape'){ setState(titleState, 'title'); }
    return;
  }
  if(stateName !== 'play') return;
  if(k === 'Escape'){ setState(titleState, 'title'); return; }
  if(k === 'KeyR'){ startLevel(levelIndex); return; }
  const mv = { ArrowUp:[-1,0], KeyW:[-1,0], ArrowDown:[1,0], KeyS:[1,0], ArrowLeft:[0,-1], KeyA:[0,-1], ArrowRight:[0,1], KeyD:[0,1] }[k];
  if(mv){
    e.preventDefault();
    cursor.on = true;
    cursor.r = Math.max(0, Math.min(L.rows-1, cursor.r + mv[0]));
    cursor.c = Math.max(0, Math.min(L.cols-1, cursor.c + mv[1]));
    const p = cellCenter(cursor.r, cursor.c);
    light.tx = p.x; light.ty = p.y;
    SFX.tick();
    return;
  }
  if(!gameActive) return;
  if(k === 'KeyZ' || k === 'Enter' || k === 'Space'){
    e.preventDefault(); cursor.on = true;
    const b = board[cursor.r][cursor.c];
    if(b.open) doChord(cursor.r, cursor.c); else doReveal(cursor.r, cursor.c);
  }
  if(k === 'KeyX' || k === 'KeyF'){
    e.preventDefault(); cursor.on = true;
    doFlag(cursor.r, cursor.c);
  }
});
function latestUnlocked(){
  let i = 0;
  for(let j=0;j<LEVELS.length;j++) if(unlocked(j)) i = j;
  return i;
}

/* ============ 主迴圈：固定時間步進 ============ */
const STEP = 1/60;
let last = performance.now(), acc = 0, clock = 0;
function frame(now){
  requestAnimationFrame(frame);
  const dtRaw = Math.min((now - last)/1000, 0.1);
  last = now;
  if(freeze > 0){ freeze -= dtRaw; state.draw(clock); return; }
  acc += dtRaw;
  while(acc >= STEP){
    clock += STEP;
    state.update(STEP);
    acc -= STEP;
  }
  state.draw(clock);
}
setState(titleState, 'title');
requestAnimationFrame(frame);

/* ============ 測試掛鉤 ============ */
window.__mine = {
  get state(){ return stateName; },
  get revealed(){ return revealedCount; },
  get minesLeft(){ return minesLeft; },
  get gameActive(){ return !!gameActive; },
  get levelStars(){ return levelStars.slice(); },
  get charm(){ return charm; },
  get flagMode(){ return flagMode; },
  get level(){ return levelIndex; },
  startLevel,
  board: () => board
};
</script>
