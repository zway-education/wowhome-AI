<!DOCTYPE html>
<!-- 專業AI升級 v7：僅介面/畫質/質感 — 面板漸層卡片與入場動效、按鈕/選關卡懸停回饋、HP條立體光澤、技能就緒呼吸光暈、虛擬搖桿球帽質感、母線低通音色打磨（玩法與文本不變） -->
<!-- 專業AI升級 v6：關卡主題化烘焙背景（森林/熔岩/冰原/虛空/星空剪影＋中央魔法陣＋星雲染色）、子彈additive拖尾光、玩家元素光環、全螢幕閃光/危險暈影改烘焙快取（主迴圈零即時漸層）；音效新增程序化殘響(ConvolverNode)、配樂加底鼓與噪聲鑔打擊層、低血量心跳聲 -->
<!-- v5 -->
<!-- v5 升級摘要：修復平板橫向/手機寵物面板疊住角色卡片的封鎖級版位衝突（改為收合式設定鈕+置中彈窗）；
     新增擊殺/治療飄字回饋、魔王登場鏡頭震動與色彩閃光、魔王波開場緩衝小怪出生節奏、低血量危險暈影提示 -->
<!-- v5補強：角色精細化（玩家/小怪/魔王全面漸層陰影+輪廓線+高光點+受擊或開心表情狀態，魔王加尖刺/觸手/憤怒臉多部件)；
     觸控可玩性補強（虛擬搖桿死區、canvas touch-action、觸控目標全面≥48px）；新增手機大螢幕提醒浮層（每session一次） -->
<!-- 部分圖示：OpenMoji (CC BY-SA 4.0) openmoji.org -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="author" content="AI未來創作營隊">
<title>魔法覺醒</title>
<style>
  :root{
    --cyan:#38e1ff; --blue:#4f7cff; --purple:#9a6bff; --pink:#ff6cc7; --gold:#ffcf5c;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:#070b14;
    font-family:"PingFang TC","Microsoft JhengHei",sans-serif;
    touch-action:none; user-select:none; -webkit-user-select:none;
  }
  #wrap{position:fixed; inset:0; display:flex; align-items:center; justify-content:center;}
  canvas{display:block; background:#070b14; touch-action:none;}
  .ui-layer{
    position:fixed; inset:0; pointer-events:none;
    display:flex; align-items:center; justify-content:center;
    z-index:5; padding:10px;
  }
  .panel{
    pointer-events:auto;
    background:linear-gradient(180deg,rgba(16,22,40,0.93),rgba(8,11,22,0.9));
    border:1px solid rgba(56,225,255,0.35);
    border-radius:20px;
    padding:24px 26px;
    max-width:min(94vw,520px);
    max-height:94vh; overflow-y:auto;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
    animation:panelIn .38s cubic-bezier(.22,.9,.32,1);
  }
  @keyframes panelIn{ from{opacity:0; transform:translateY(14px) scale(.97);} to{opacity:1; transform:none;} }
  .title-grad{
    font-size:clamp(26px,6vw,40px);
    font-weight:900;
    background:linear-gradient(92deg,var(--cyan),var(--blue),var(--purple));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    margin:0 0 6px; letter-spacing:2px;
  }
  .subtitle{ color:#9db3d8; font-size:14px; margin:0 0 14px; line-height:1.6;}
  .row{display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin:12px 0;}
  .choice-btn{
    pointer-events:auto;
    width:140px; min-height:126px;
    border-radius:18px;
    border:2px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.04);
    color:#fff; font-size:14px; font-weight:700;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    cursor:pointer; transition:transform .15s, border-color .15s, background .15s;
  }
  .choice-btn:hover,.choice-btn:active{ transform:translateY(-4px) scale(1.03); border-color:var(--cyan); background:rgba(56,225,255,0.1);}
  .choice-btn>svg{width:46px; height:46px;}
  .choice-btn .cname{ font-size:15px; font-weight:900; }
  .choice-btn .cmagic{ font-size:12px; font-weight:700; opacity:0.9; display:flex; align-items:center; gap:3px;}
  .cmagic svg{width:16px;height:16px;}
  .btn{
    pointer-events:auto;
    display:inline-block; margin:8px 4px 0;
    padding:13px 26px; border-radius:14px; border:none;
    background:linear-gradient(92deg,var(--cyan),var(--blue));
    color:#04121c; font-weight:900; font-size:16px;
    cursor:pointer; box-shadow:0 8px 24px rgba(56,225,255,0.35);
    min-height:50px; font-family:inherit;
    transition:transform .15s ease, filter .15s ease, box-shadow .15s ease;
  }
  .btn:hover{ transform:translateY(-2px); filter:brightness(1.07); }
  .btn:active{ transform:scale(0.96); }
  .btn.secondary{ background:rgba(255,255,255,0.08); color:#dfe9ff; box-shadow:none; border:1px solid rgba(255,255,255,0.2);}
  .btn.gold{ background:linear-gradient(92deg,var(--gold),#ffa72e); color:#241503; box-shadow:0 8px 24px rgba(255,207,92,0.3);}
  .hint{ font-size:12px; color:#7488a8; margin-top:12px; line-height:1.8;}
  .hint .hrow{ display:flex; align-items:center; gap:6px; justify-content:center;}
  .gacha-orb{
    width:140px; height:140px; margin:0 auto 14px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  .gacha-orb svg{ width:92px; height:92px; }
  .magic-name{ font-size:25px; font-weight:900; margin:6px 0 2px; }
  .magic-rarity{ font-size:13px; font-weight:700; letter-spacing:3px; margin-bottom:8px; }
  .hidden{ display:none !important; }
  #hud{
    position:fixed; top:0; left:0; right:0; padding:10px 14px;
    display:flex; justify-content:space-between; align-items:flex-start;
    pointer-events:none; z-index:4; font-weight:800; color:#fff;
    font-size:14px;
  }
  #hpbar{
    width:130px; height:14px; border-radius:8px; background:rgba(255,255,255,0.15);
    overflow:hidden; border:1px solid rgba(255,255,255,0.25);
    box-shadow:inset 0 1px 3px rgba(0,0,0,0.5);
  }
  #hpfill{ height:100%; width:100%;
    background:linear-gradient(180deg,#ff9ed8 0%,#ff6cc7 45%,#ff3b6b 100%);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.4);
    transition:width .15s;}
  #hudLeft{ display:flex; flex-direction:column; gap:6px;}
  #hudRight{ text-align:right; display:flex; flex-direction:column; gap:4px; align-items:flex-end;}
  #magicLabel{ font-size:12px; display:flex; align-items:center; gap:4px;}
  #magicLabel svg{ width:18px; height:18px; }
  #muteBtn{
    pointer-events:auto; cursor:pointer;
    background:linear-gradient(180deg,rgba(255,255,255,0.14),rgba(255,255,255,0.06));
    border:1px solid rgba(255,255,255,0.25); color:#fff; border-radius:12px;
    width:52px; height:52px; display:flex; align-items:center; justify-content:center;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.15);
    transition:transform .15s ease, border-color .15s ease;
  }
  #muteBtn:hover{ transform:scale(1.07); border-color:var(--cyan); }
  #muteBtn:active{ transform:scale(0.93); }
  #hardTag{ color:#ff6b6b; }
  #joyBase{
    position:fixed; width:100px; height:100px; border-radius:50%;
    background:rgba(255,255,255,0.08); border:2px solid rgba(255,255,255,0.25);
    display:none; z-index:6; pointer-events:none;
  }
  #joyStick{
    position:fixed; width:46px; height:46px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #b8f0ff, rgba(56,225,255,0.6) 72%);
    border:2px solid #38e1ff;
    box-shadow:0 3px 10px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.5);
    display:none; z-index:7; pointer-events:none;
  }
  .touch-hint{ display:none; }
  @media (pointer:coarse){ .touch-hint{ display:flex; } }
  .kb-hint{ display:flex; }
  @media (pointer:coarse){ .kb-hint{ display:none; } }
  #skillBar{
    position:fixed; left:50%; bottom:14px; transform:translateX(-50%);
    z-index:4; pointer-events:none;
    display:flex; flex-direction:row; align-items:flex-end; gap:10px;
  }
  .skillSlot{ display:flex; flex-direction:column; align-items:center; gap:3px; }
  .skillIconWrap{
    width:54px; height:54px; border-radius:14px;
    background:rgba(10,14,26,0.75); border:2px solid rgba(255,255,255,0.25);
    position:relative; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 18px rgba(0,0,0,0.4);
    transition:transform .11s ease-out;
  }
  .skillIconWrap svg{ width:34px; height:34px; }
  .skillIconWrap.ready{ border-color:#ffcf5c; animation:readyPulse 1.2s ease-in-out infinite; }
  @keyframes readyPulse{ 0%,100%{ box-shadow:0 0 12px rgba(255,207,92,0.5);} 50%{ box-shadow:0 0 24px rgba(255,207,92,0.9);} }
  .skillSlot.tappable .skillIconWrap{ width:64px; height:64px; pointer-events:auto; cursor:pointer; }
  .skillSlot.tappable .skillIconWrap svg{ width:40px; height:40px; }
  .skillCooldownMask{ position:absolute; inset:0; background:rgba(0,0,0,0.62); }
  .skillLabel{ font-size:10px; color:#dfe9ff; font-weight:700; text-align:center; max-width:70px; }
  #petPanel{
    position:fixed; top:14px; right:14px; z-index:6;
    width:244px; max-height:84vh; overflow-y:auto;
    background:rgba(10,14,26,0.88); border:1px solid rgba(56,225,255,0.3);
    border-radius:16px; padding:12px; pointer-events:auto;
    box-shadow:0 12px 30px rgba(0,0,0,0.45);
  }
  #petPanel h3{ margin:0 0 6px; font-size:13px; color:#9db3d8; font-weight:800; letter-spacing:1px; }
  #petGrid{ display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:8px; }
  .petCell{
    width:48px; height:48px; border-radius:10px;
    background:rgba(255,255,255,0.05); border:2px solid rgba(255,255,255,0.15);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    transition:transform .12s, border-color .12s, background .12s;
  }
  .petCell svg{ width:32px; height:32px; }
  .petCell:hover{ transform:scale(1.08); }
  .petCell.selected{ border-color:#ffcf5c; background:rgba(255,207,92,0.18); box-shadow:0 0 10px rgba(255,207,92,0.5); }
  #petCount{ font-size:11px; color:#7488a8; margin-bottom:8px; }
  #hardModeRow{ padding-top:8px; border-top:1px solid rgba(255,255,255,0.12); }
  #hardModeRow span{ font-size:12px; font-weight:800; color:#fff; }
  #diffRow{ display:flex; gap:6px; margin-top:6px; }
  .diffBtn{
    flex:1; text-align:center; padding:9px 0; border-radius:8px; font-size:12px; font-weight:800;
    background:rgba(255,255,255,0.06); border:2px solid rgba(255,255,255,0.15); color:#dfe9ff;
    cursor:pointer; transition:border-color .12s, background .12s; min-height:48px;
    display:flex; align-items:center; justify-content:center;
  }
  .diffBtn[data-diff="easy"].selected{ border-color:#7fffb0; background:rgba(127,255,176,0.18); }
  .diffBtn[data-diff="normal"].selected{ border-color:#38e1ff; background:rgba(56,225,255,0.18); }
  .diffBtn[data-diff="hard"].selected{ border-color:#ff6b6b; background:rgba(255,107,107,0.18); }
  .petHint{ font-size:11px; color:#7488a8; margin-top:6px; line-height:1.5; }
  /* v5：寵物／難度面板在窄螢幕（含平板橫向 ~1024px）改成收合式設定鈕＋置中彈窗，
     避免 position:fixed 直接疊在角色選擇卡片上、擋住點擊（實測 <=1130px 寬會遮住角色卡）。 */
  .petCloseRow{ display:none; }
  .petToggleBtn{ display:none; }
  @media (max-width:1150px){
    .petToggleBtn{
      display:flex; align-items:center; gap:6px;
      position:fixed; top:12px; right:12px; z-index:7;
      min-height:48px; padding:0 14px; border-radius:24px;
      background:rgba(10,14,26,0.92); border:1px solid rgba(56,225,255,0.4);
      color:#dfe9ff; font-size:12px; font-weight:800;
      pointer-events:auto; cursor:pointer; box-shadow:0 8px 20px rgba(0,0,0,0.4);
    }
    .petToggleBtn:active{ transform:scale(0.95); }
    #petPanel{
      display:none; position:fixed; inset:0; margin:auto;
      top:50%; left:50%; right:auto; bottom:auto; transform:translate(-50%,-50%);
      width:min(92vw,420px); max-height:82vh; z-index:8;
    }
    #petPanel.open{ display:block; }
    .petCloseRow{
      display:flex; align-items:center; justify-content:space-between;
      margin:-2px 0 10px; gap:8px;
    }
    .petCloseRow span{ font-size:13px; color:#9db3d8; font-weight:800; letter-spacing:1px; }
    #petCloseBtn{
      pointer-events:auto; cursor:pointer; min-width:40px; min-height:40px;
      display:flex; align-items:center; justify-content:center;
      background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.2); border-radius:10px;
    }
  }
  /* 選關畫面 */
  #stageGrid{ display:flex; flex-direction:column; gap:9px; margin:8px 0; }
  .stageBtn{
    pointer-events:auto; display:flex; align-items:center; gap:12px;
    min-height:64px; border-radius:14px; padding:8px 14px;
    background:rgba(255,255,255,0.05); border:2px solid rgba(255,255,255,0.15);
    color:#fff; cursor:pointer; text-align:left; font-family:inherit;
    transition:transform .12s, border-color .12s;
  }
  .stageBtn:active{ transform:scale(0.97); }
  .stageBtn:hover{ border-color:var(--cyan); transform:translateY(-2px); box-shadow:0 8px 20px rgba(56,225,255,0.15); }
  .stageBtn svg{ width:40px; height:40px; flex:none; }
  .stageBtn .sname{ font-size:15px; font-weight:900; }
  .stageBtn .sboss{ font-size:11px; color:#9db3d8; }
  .stageBtn .sstars{ margin-left:auto; color:var(--gold); font-size:15px; letter-spacing:2px; white-space:nowrap;}
  .stageBtn.lock{ opacity:0.42; filter:grayscale(0.8); }
  #overStars{ font-size:40px; letter-spacing:8px; color:#3a4458; min-height:48px; margin:2px 0 4px;}
  #overStars .lit{ color:var(--gold); display:inline-block; animation:starpop .45s cubic-bezier(.2,2.2,.4,1) backwards;}
  #overStars .lit:nth-child(2){ animation-delay:.16s; }
  #overStars .lit:nth-child(3){ animation-delay:.32s; }
  @keyframes starpop{ from{transform:scale(0) rotate(-40deg);} to{transform:scale(1) rotate(0);} }
  /* v5補強：大螢幕提醒浮層（僅手機觸發，一個session只跳一次） */
  #bigscreenHint{
    position:fixed; inset:0; z-index:99999;
    background:rgba(7,11,20,0.9);
    display:flex; align-items:center; justify-content:center;
    padding:20px; opacity:1; transition:opacity .28s ease;
  }
  #bigscreenHint.hidden{ display:none; }
  #bigscreenHint .bsCard{
    max-width:min(88vw,380px); width:100%;
    background:rgba(14,19,32,0.96);
    border:1px solid rgba(56,225,255,0.35);
    border-radius:16px; padding:26px 22px;
    text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.55);
  }
  #bigscreenHint .bsIcon{ margin:0 auto 14px; width:56px; height:56px; }
  #bigscreenHint .bsTitle{
    font-size:clamp(20px,5.6vw,26px); font-weight:900; margin:0 0 10px; letter-spacing:1px;
    background:linear-gradient(92deg,var(--cyan),var(--blue),var(--purple));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  #bigscreenHint .bsSub{ color:#9db3d8; font-size:14px; line-height:1.7; margin:0 0 20px; }
  #bigscreenHint .bsBtn{
    display:block; width:64%; min-width:60%; margin:0 auto; min-height:52px;
    border:none; border-radius:14px; cursor:pointer; font-family:inherit;
    font-size:16px; font-weight:900; color:#04121c;
    background:linear-gradient(92deg,var(--cyan),var(--blue));
    box-shadow:0 8px 24px rgba(56,225,255,0.35);
  }
  #bigscreenHint .bsBtn:active{ transform:scale(0.96); }
</style>
</head>
<body>
<div id="bigscreenHint" class="hidden">
  <div class="bsCard">
    <svg class="bsIcon" viewBox="0 0 24 24" fill="none" stroke="#38e1ff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2.5" y="4" width="19" height="13" rx="1.6"/>
      <path d="M8 20.5h8"/><path d="M12 17v3.5"/>
      <path d="M7 9.5l3 2.7 3.2-3.6 3.8 3"/>
    </svg>
    <p class="bsTitle">建議使用大螢幕遊玩</p>
    <p class="bsSub">用平板或電腦打開，體驗更完整</p>
    <button type="button" class="bsBtn" id="bigscreenHintBtn">知道了，繼續玩</button>
  </div>
</div>
<script>
(function(){
  try{
    var el = document.getElementById('bigscreenHint');
    if(!el) return;
    var isPhone = Math.min(screen.width||9999, screen.height||9999) < 600 || window.innerWidth < 768;
    var seen = false;
    try{ seen = sessionStorage.getItem('bigscreen-hint') === '1'; }catch(e){}
    if(!isPhone || seen){ el.parentNode && el.parentNode.removeChild(el); return; }
    el.classList.remove('hidden');
    var btn = document.getElementById('bigscreenHintBtn');
    btn.addEventListener('click', function(){
      try{ sessionStorage.setItem('bigscreen-hint','1'); }catch(e){}
      el.style.opacity = '0';
      setTimeout(function(){ el.parentNode && el.parentNode.removeChild(el); }, 300);
    });
  }catch(e){}
})();
</script>
<div id="wrap"><canvas id="game"></canvas></div>

<div id="hud" class="hidden">
  <div id="hudLeft">
    <div id="hpbar"><div id="hpfill"></div></div>
    <div id="magicLabel"></div>
  </div>
  <div id="hudRight">
    <div id="muteBtn"></div>
    <div id="scoreLabel">分數 0</div>
    <div id="waveLabel"></div>
    <div id="timeLabel">0.0s</div>
    <div id="hardTag" class="hidden">困難模式</div>
  </div>
</div>

<div id="skillBar" class="hidden"></div>
<div id="joyBase"></div><div id="joyStick"></div>

<div class="ui-layer" id="screenTitle">
  <div class="panel" style="max-width:min(94vw,640px);">
    <div class="title-grad">魔法覺醒</div>
    <p class="subtitle">選擇一位角色，每位角色都有專屬魔法！<br>打倒五大魔王，收集 15 顆星星！</p>
    <div class="row" id="charRow"></div>
    <div class="hint">
      <div class="hrow kb-hint"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#38e1ff" stroke-width="2"><rect x="3" y="5" width="18" height="11" rx="1.5"/><path d="M2 19h20"/></svg>
        電腦：WASD／方向鍵移動・空白鍵手動放究極爆發・M 靜音</div>
      <div class="hrow touch-hint"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ff6cc7" stroke-width="2"><rect x="7" y="2" width="10" height="20" rx="2.5"/><circle cx="12" cy="18.4" r="1" fill="#ff6cc7"/></svg>
        平板：任意處拖曳移動・點爆發大按鈕施放</div>
      <div class="hrow">魔法會自動鎖定最近的敵人施放，專心走位就好！</div>
    </div>
  </div>
</div>

<button id="petToggleBtn" class="petToggleBtn" type="button">
  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#38e1ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="5" y1="21" x2="5" y2="14"/><line x1="5" y1="10" x2="5" y2="3"/>
    <line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/>
    <line x1="19" y1="21" x2="19" y2="16"/><line x1="19" y1="12" x2="19" y2="3"/>
    <circle cx="5" cy="12" r="2" fill="#38e1ff"/><circle cx="12" cy="10" r="2" fill="#38e1ff"/><circle cx="19" cy="14" r="2" fill="#38e1ff"/>
  </svg>
  <span>寵物・難度</span>
</button>

<div id="petPanel">
  <div class="petCloseRow">

/* 給 canvas 用的點陣精靈（SVG 轉 Image；來源移除了命名空間，這裡補回） */
const SPRITES = {};
const XMLNS = ' xmlns="ht' + 'tp://www.w3.org/2000/svg" width="72" height="72"';
for(const k in OM){
  const img = new Image();
  const svg = OM[k].replace('<svg', '<svg' + XMLNS);
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  SPRITES[k] = { img, ok:false };
  img.onload = () => { SPRITES[k].ok = true; };
}
function drawSprite(c, k, x, y, size){
  const s = SPRITES[k];
  if(s && s.ok) c.drawImage(s.img, x-size/2, y-size/2, size, size);
}
/* v5補強：角色精細化共用色階工具──hex色加亮/加暗，供漸層陰影＋輪廓線使用 */
const shadeCache = {};
function shadeColor(hex, pct){
  const key = hex+'|'+pct;
  if(shadeCache[key]) return shadeCache[key];
  let h = (hex||'#999999').replace('#','');
  if(h.length===3) h = h.split('').map(c=>c+c).join('');
  const num = parseInt(h,16)||0x999999;
  let r=(num>>16)&255, g=(num>>8)&255, b=num&255;
  if(pct>=0){ r+=(255-r)*pct; g+=(255-g)*pct; b+=(255-b)*pct; }
  else { r+=r*pct; g+=g*pct; b+=b*pct; }
  const out = 'rgb('+Math.max(0,Math.min(255,Math.round(r)))+','+Math.max(0,Math.min(255,Math.round(g)))+','+Math.max(0,Math.min(255,Math.round(b)))+')';
  shadeCache[key]=out;
  return out;
}
/* 通用圓形立體漸層（受光面亮／背光面暗），r=半徑，需在已 translate 到中心點的座標系呼叫 */
function radialShade(ctx, r, color){
  const g = ctx.createRadialGradient(-r*0.32,-r*0.38,r*0.12, 0,0, r*1.08);
  g.addColorStop(0, shadeColor(color,0.4));
  g.addColorStop(0.55, color);
  g.addColorStop(1, shadeColor(color,-0.38));
  return g;
}

/* ---------- Canvas / DPR ---------- */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.floor(W*DPR); canvas.height = Math.floor(H*DPR);
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  bakeBg();
}
window.addEventListener('resize', resize);

/* ---------- Audio：Compressor 主匯流排＋隨機音高 ---------- */
let actx=null, master=null, muted=false;
try{ muted = localStorage.getItem('mojuepro_mute')==='1'; }catch(e){}
function ensureAudio(){
  if(!actx){
    try{
      actx = new (window.AudioContext||window.webkitAudioContext)();
      const comp = actx.createDynamicsCompressor();
      comp.threshold.value=-18; comp.knee.value=24; comp.ratio.value=8;
      master = actx.createGain(); master.gain.value=0.9;
      /* v7 音色打磨：母線低通 9.5kHz 收掉高頻毛邊，音色更圓潤（觸發語意不變） */
      const toneLP = actx.createBiquadFilter();
      toneLP.type='lowpass'; toneLP.frequency.value=9500; toneLP.Q.value=0.5;
      master.connect(toneLP); toneLP.connect(comp); comp.connect(actx.destination);
      // v6 程序化殘響：generated impulse ConvolverNode（魔法大殿空間感），母線並聯送入
      try{
        const len = Math.floor(actx.sampleRate*1.4);
        const ir = actx.createBuffer(2, len, actx.sampleRate);
        for(let ch=0; ch<2; ch++){
          const d = ir.getChannelData(ch);
          for(let i=0;i<len;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/len, 2.8);
        }
        const conv = actx.createConvolver(); conv.buffer = ir;
        const rev = actx.createGain(); rev.gain.value = 0.16;
        master.connect(rev); rev.connect(conv); conv.connect(comp);
      }catch(e){}
      startMusic();
    }catch(e){}
  } else if(actx.state==='suspended'){ actx.resume(); }
}
function beep(freq, dur, type, vol, sweep){
  if(muted || !actx || !master) return;
  freq *= 0.95 + Math.random()*0.1;
  const t0 = actx.currentTime;
  const osc = actx.createOscillator(), gain = actx.createGain();
  osc.type = type||'sine';
  osc.frequency.setValueAtTime(freq, t0);
  if(sweep) osc.frequency.exponentialRampToValueAtTime(Math.max(20,sweep), t0+dur);
  gain.gain.setValueAtTime(0.0001, t0);
  gain.gain.exponentialRampToValueAtTime(vol||0.2, t0+0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  osc.connect(gain); gain.connect(master);
  osc.start(t0); osc.stop(t0+dur+0.02);
}

/* ---------- 合成循環配樂 ---------- */
const MUSIC_STEP_MS = 220;
const BASS_PATTERN = [110,0,110,0,146.83,0,130.81,110,  98,0,98,0,146.83,0,110,0];
const LEAD_PATTERN  = [0,440,0,523.25,0,440,0,392,  0,349.23,0,440,0,392,0,330];
let musicTimer=null, musicStep=0, musicGain=null;
function startMusic(){
  if(musicTimer || !actx) return;
  musicGain = actx.createGain();
  musicGain.gain.value = 0.0001;
  musicGain.connect(master);
  musicGain.gain.exponentialRampToValueAtTime(0.14, actx.currentTime+1.5);
  musicStep = 0;
  musicTimer = setInterval(musicTick, MUSIC_STEP_MS);
}
function musicTick(){
  if(muted || !actx || !musicGain) return;
  const t0 = actx.currentTime;
  const bassFreq = BASS_PATTERN[musicStep % BASS_PATTERN.length];
  const leadFreq = LEAD_PATTERN[musicStep % LEAD_PATTERN.length];
  if(bassFreq){
    const o=actx.createOscillator(), g=actx.createGain();
    o.type='triangle'; o.frequency.value=bassFreq;
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(0.5,t0+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+MUSIC_STEP_MS/1000*1.7);
    o.connect(g); g.connect(musicGain);
    o.start(t0); o.stop(t0+MUSIC_STEP_MS/1000*1.8);
  }
  if(leadFreq){
    const o=actx.createOscillator(), g=actx.createGain();
    o.type='square'; o.frequency.value=leadFreq;
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(0.2,t0+0.015);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+MUSIC_STEP_MS/1000*0.85);
    o.connect(g); g.connect(musicGain);
    o.start(t0); o.stop(t0+MUSIC_STEP_MS/1000*0.9);
  }
  // v6 打擊層：底鼓（每 4 步，正拍）＋噪聲鑔（反拍），讓配樂有律動骨架
  if(musicStep % 4 === 0){
    const o=actx.createOscillator(), g=actx.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(150, t0);
    o.frequency.exponentialRampToValueAtTime(46, t0+0.11);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(0.55,t0+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+0.13);
    o.connect(g); g.connect(musicGain);
    o.start(t0); o.stop(t0+0.15);
  }
  if(musicStep % 2 === 1){
    if(!musicTick._hat){
      const hl = Math.floor(actx.sampleRate*0.05);
      const hb = actx.createBuffer(1,hl,actx.sampleRate);
      const hd = hb.getChannelData(0);
      for(let i=0;i<hl;i++) hd[i]=(Math.random()*2-1)*(1-i/hl);
      musicTick._hat = hb;
    }
    const src=actx.createBufferSource(); src.buffer=musicTick._hat;
    const hp=actx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=6200;
    const g=actx.createGain(); g.gain.value=0.35;
    src.connect(hp); hp.connect(g); g.connect(musicGain);
    src.start(t0);
  }
  musicStep++;
}

  if(state!=='playing') return;
  e.preventDefault(); ensureAudio();
  const t = e.changedTouches[0];
  joyActive=true; joyId=t.identifier;
  joyOrigin={x:t.clientX,y:t.clientY};
  joyBase.style.display='block'; joyStick.style.display='block';
  joyBase.style.left=(t.clientX-50)+'px'; joyBase.style.top=(t.clientY-50)+'px';
  joyStick.style.left=(t.clientX-23)+'px'; joyStick.style.top=(t.clientY-23)+'px';
}, {passive:false});
canvas.addEventListener('touchmove', e=>{
  if(state!=='playing') return;
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier!==joyId) continue;
    let dx=t.clientX-joyOrigin.x, dy=t.clientY-joyOrigin.y;
    const d = Math.hypot(dx,dy), max=50, deadzone=8;   // v5補強：搖桿死區，避免手指微抖造成誤移動
    if(d>max){ dx=dx/d*max; dy=dy/d*max; }
    if(d<deadzone){ joyVec.x=0; joyVec.y=0; }
    else{ joyVec.x = dx/max; joyVec.y = dy/max; }
    joyStick.style.left=(joyOrigin.x+dx-23)+'px'; joyStick.style.top=(joyOrigin.y+dy-23)+'px';
  }
}, {passive:false});
function endJoy(e){
  for(const t of e.changedTouches){
    if(t.identifier!==joyId) continue;
    joyActive=false; joyVec={x:0,y:0};
    joyBase.style.display='none'; joyStick.style.display='none';
  }
}

let bgCanvas=null;
function bakeBg(){
  if(!W||!H) return;
  bgCanvas = document.createElement('canvas');
  bgCanvas.width = Math.floor(W*DPR); bgCanvas.height = Math.floor(H*DPR);
  const c = bgCanvas.getContext('2d');
  c.setTransform(DPR,0,0,DPR,0,0);
  const stg = STAGES[stageIndex||0] || STAGES[0];
  const grad = c.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, stg.top); grad.addColorStop(1, stg.bottom);
  c.fillStyle=grad; c.fillRect(0,0,W,H);
  // v6 星雲染色（主題色大光斑，柔和打亮場地）
  c.save();
  c.globalCompositeOperation='lighter';
  [[W*0.2,H*0.24,0.06],[W*0.82,H*0.3,0.05],[W*0.5,H*0.78,0.045]].forEach(([nx,ny,na])=>{
    const ng=c.createRadialGradient(nx,ny,10,nx,ny,Math.min(W,H)*0.42);
    ng.addColorStop(0, stg.accent+Math.round(na*255).toString(16).padStart(2,'0'));
    ng.addColorStop(1, stg.accent+'00');
    c.fillStyle=ng;
    c.beginPath(); c.arc(nx,ny,Math.min(W,H)*0.42,0,7); c.fill();
  });
  c.restore();
  c.fillStyle='rgba(255,255,255,0.035)';
  const gap=40;
  for(let x=0;x<W;x+=gap) for(let y=0;y<H;y+=gap) c.fillRect(x,y,2,2);
  // v6 中央魔法陣（雙環＋刻度＋符文點，戰場即法陣）
  c.save();
  c.translate(W/2, H/2);
  const R = Math.min(W,H)*0.3;
  c.strokeStyle='rgba(255,255,255,0.07)';
  c.lineWidth=2;
  c.beginPath(); c.arc(0,0,R,0,7); c.stroke();
  c.beginPath(); c.arc(0,0,R*0.78,0,7); c.stroke();
  c.lineWidth=1;
  c.beginPath(); c.arc(0,0,R*0.45,0,7); c.stroke();
  for(let i=0;i<24;i++){
    const a=i/24*Math.PI*2;
    c.beginPath();
    c.moveTo(Math.cos(a)*R*0.94, Math.sin(a)*R*0.94);
    c.lineTo(Math.cos(a)*R, Math.sin(a)*R);
    c.stroke();
  }
  c.fillStyle='rgba(255,255,255,0.075)';
  for(let i=0;i<8;i++){
    const a=i/8*Math.PI*2 + 0.3;
    c.save();
    c.translate(Math.cos(a)*R*0.885, Math.sin(a)*R*0.885);
    c.rotate(a);
    c.fillRect(-3,-3,6,6);
    c.restore();
  }
  c.strokeStyle = stg.accent+'22';
  c.lineWidth=1.5;
  c.beginPath();
  for(let i=0;i<6;i++){
    const a=i/6*Math.PI*2 - Math.PI/2;
    const x2=Math.cos(a)*R*0.78, y2=Math.sin(a)*R*0.78;
    if(i===0) c.moveTo(x2,y2); else c.lineTo(x2,y2);
  }
  c.closePath(); c.stroke();
  c.restore();
  // v6 關卡主題剪影（底部地景，一眼看出身在哪一關）
  c.save();
  c.globalAlpha=0.5;
  const base=H;
  if(stg.deco==='forest'){
    c.fillStyle='#0c2114';
    for(let x=-20;x<W+40;x+=46){
      const h2=30+((x*7)%38);
      c.beginPath(); c.moveTo(x-24,base); c.lineTo(x,base-h2); c.lineTo(x+24,base); c.closePath(); c.fill();
    }
  }else if(stg.deco==='lava'){
    c.fillStyle='#200705';
    for(let x=-30;x<W+60;x+=90){
      const h2=36+((x*13)%42);
      c.beginPath(); c.moveTo(x-50,base); c.lineTo(x,base-h2); c.lineTo(x+50,base); c.closePath(); c.fill();
      c.fillStyle='rgba(255,110,50,0.5)';
      c.fillRect(x-6,base-h2,12,3);
      c.fillStyle='#200705';
    }
  }else if(stg.deco==='ice'){
    c.fillStyle='#0a1c2c';
    for(let x=-20;x<W+40;x+=58){
      const h2=34+((x*11)%46);
      c.beginPath(); c.moveTo(x-20,base); c.lineTo(x,base-h2); c.lineTo(x+7,base-h2*0.55); c.lineTo(x+22,base); c.closePath(); c.fill();
    }
  }else if(stg.deco==='void'){
    c.fillStyle='#120826';
    for(let x=-20;x<W+40;x+=74){
      const h2=26+((x*17)%40);
      c.beginPath(); c.ellipse(x,base+6,34,h2,0,Math.PI,0); c.fill();
    }
  }else{
    c.fillStyle='#0c1226';
    for(let x=-20;x<W+40;x+=66){
      const h2=30+((x*9)%36);
      c.fillRect(x-10,base-h2,20,h2);
      c.beginPath(); c.moveTo(x-10,base-h2); c.lineTo(x,base-h2-14); c.lineTo(x+10,base-h2); c.closePath(); c.fill();
    }
  }
  c.restore();
  const vign = c.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);
  vign.addColorStop(0,'rgba(0,0,0,0)'); vign.addColorStop(1,'rgba(0,0,0,0.45)');
  c.fillStyle=vign; c.fillRect(0,0,W,H);
  bakeOverlayFX();
}
/* v6 全螢幕閃光／危險暈影 烘焙快取：主迴圈只調 alpha 疊圖，零即時漸層 */
let divineFlashCv=null, redVignCv=null;
const bossFlashCache={};
function bakeRadialFull(inner, outer){
  const cv=document.createElement('canvas');
  cv.width=Math.max(2,Math.floor(W/2)); cv.height=Math.max(2,Math.floor(H/2));
  const c=cv.getContext('2d');
  const g=c.createRadialGradient(cv.width/2,cv.height/2,0,cv.width/2,cv.height/2,Math.max(cv.width,cv.height)*0.75);
  g.addColorStop(0,inner); g.addColorStop(1,outer);
  c.fillStyle=g; c.fillRect(0,0,cv.width,cv.height);
  return cv;
}
function bakeOverlayFX(){
  divineFlashCv = bakeRadialFull('rgba(255,244,214,0.9)','rgba(255,244,214,0)');
  const cv=document.createElement('canvas');
  cv.width=Math.max(2,Math.floor(W/2)); cv.height=Math.max(2,Math.floor(H/2));
  const c=cv.getContext('2d');
  const g=c.createRadialGradient(cv.width/2,cv.height/2,Math.min(cv.width,cv.height)*0.26,cv.width/2,cv.height/2,Math.max(cv.width,cv.height)*0.62);
  g.addColorStop(0,'rgba(255,40,60,0)'); g.addColorStop(1,'rgba(255,20,40,0.85)');
  c.fillStyle=g; c.fillRect(0,0,cv.width,cv.height);
  redVignCv = cv;
  for(const k in bossFlashCache) delete bossFlashCache[k];
}
function bossFlashSprite(color){
  if(!bossFlashCache[color]) bossFlashCache[color] = bakeRadialFull(color+'cc', color+'00');
  return bossFlashCache[color];
}
const glowCache = {};
function glowSprite(color){
  if(glowCache[color]) return glowCache[color];
  const s=64, cv=document.createElement('canvas'); cv.width=s; cv.height=s;
  const c=cv.getContext('2d');
  const g=c.createRadialGradient(s/2,s/2,2,s/2,s/2,s/2);
  g.addColorStop(0,color); g.addColorStop(1,'rgba(0,0,0,0)');
  c.globalAlpha=0.7; c.fillStyle=g; c.fillRect(0,0,s,s);
  glowCache[color]=cv;
  return cv;
}
const auraSprite = (()=>{ // 天神神佑金色光環
  const s=256, cv=document.createElement('canvas'); cv.width=s; cv.height=s;
  const c=cv.getContext('2d');
  const g=c.createRadialGradient(s/2,s/2,s*0.12,s/2,s/2,s/2);
  g.addColorStop(0,'rgba(255,230,160,0.6)'); g.addColorStop(1,'rgba(255,230,160,0)');
  c.fillStyle=g; c.fillRect(0,0,s,s);
  return cv;
})();

/* ---------- 遊戲實體 ---------- */
let player, enemies=[], bullets=[], particles=[], floaters=[], wave, score, spawnTimer, waveTimer, shakeT, shakeMag, hitstop;
let divineFlashT = 0, divineUsedInStage = false;
let bossFlashT = 0, bossFlashColor = '#ffffff';   // v5：魔王登場的鏡頭閃光
let activePets = [];
let stageIndex=0, bossWave, bossSpawned, bannerText, bannerSub, bannerT, decos;
let stageTime = 0, minionTimer = 0;

/* v5：飄字回饋（得分／治療），對應設計文件「飄字：往上飄 40px 並淡出 0.6s」 */
function spawnFloatText(x, y, text, color, big){
  if(floaters.length > 50) floaters.shift();
  floaters.push({ x, y, vy:-1.15, text, color, life:36, maxLife:36, big:!!big });
}

function showBanner(text, sub){ bannerText=text; bannerSub=sub||''; bannerT=2200; }
function buildDecos(){
  decos = [];
  const deco = STAGES[stageIndex].deco;
  for(let i=0;i<22;i++){
    decos.push({ x:Math.random()*W, y:Math.random()*H, s:0.6+Math.random()*1.6,
      drift:(Math.random()-0.5)*0.15, phase:Math.random()*Math.PI*2, kind:deco });
  }
}

/* ---------- 技能列（究極爆發＝可點大按鈕） ---------- */
const skillBar = $id('skillBar');
let skills = [];
function buildSkillBarUI(){
  skillBar.innerHTML = '';
  skills = chosenKit.map(def=>{
    const slot = document.createElement('div');
    slot.className = 'skillSlot' + (def.tappable ? ' tappable' : '');
    const wrap = document.createElement('div');
    wrap.className = 'skillIconWrap';
    wrap.style.filter = `drop-shadow(0 0 4px ${def.color})`;
    wrap.innerHTML = OM[def.icon]||'';
    const maskEl = document.createElement('div');
    maskEl.className = 'skillCooldownMask';
    wrap.appendChild(maskEl);
    const label = document.createElement('div');
    label.className = 'skillLabel';
    label.textContent = def.name + (def.tappable ? '（點我）' : '');
    slot.appendChild(wrap); slot.appendChild(label);
    skillBar.appendChild(slot);
    if(def.tappable){
      wrap.addEventListener('pointerdown', e=>{ e.preventDefault(); tryManualBurst(); });
    }
    return {def, timer:0, wrapEl:wrap, maskEl};
  });
}
function updateSkillUI(){
  for(const s of skills){
    const pct = Math.max(0, Math.min(1, s.timer / s.def.cooldown));
    s.maskEl.style.height = (pct*100)+'%';
    s.wrapEl.classList.toggle('ready', pct<=0);
  }
}
function pulseSkill(id){
  const s = skills.find(sk=>sk.def.id===id);
  if(!s) return;
  s.wrapEl.style.transform = 'scale(1.15)';
  setTimeout(()=>{ s.wrapEl.style.transform = 'scale(1)'; }, 110);
}
function tryManualBurst(){
  if(state!=='playing') return;
  const s = skills.find(sk=>sk.def.id==='burst');
  if(!s || s.timer>0) return;
  const fired = s.def.run() !== false;
  s.timer = fired ? s.def.cooldown : 120;
  if(fired) pulseSkill('burst');
}

/* ---------- 開始關卡 ---------- */
function startStage(i){
  stageIndex = i;
  screenGacha.classList.add('hidden'); screenStage.classList.add('hidden');
  screenOver.classList.add('hidden'); screenTitle.classList.add('hidden');
  petPanel.classList.add('hidden');
  petPanel.classList.remove('open');
  petToggleBtn.classList.add('hidden');
  hud.classList.remove('hidden');
  skillBar.classList.remove('hidden');
  $id('magicLabel').innerHTML = (OM[chosenMagic.key]||'') + ' ' + chosenChar.name + '・' + chosenMagic.name;
  chosenKit = buildSkillKit(chosenMagic);
  buildSkillBarUI();
  player = {
    x:W/2, y:H/2, r:16, hp:100, maxHp:100, invuln:1500,
    color: chosenChar.outfit,
    facing:{x:0,y:1}, walkPhase:0, blinkT:120+Math.random()*160,
    divineReady:true, divineBuffT:0, sx:1, sy:1,
    hurtT:0, happyT:0    // v5補強：受擊／開心兩種臉部表情狀態
  };
  enemies=[]; bullets=[]; particles=[]; floaters=[];
  wave=1; score=0; spawnTimer=(i===0?3000:1800); waveTimer=0; shakeT=0; shakeMag=0; hitstop=0;
  bossWave=false; bossSpawned=false; minionTimer=0;
  divineFlashT=0; divineUsedInStage=false; bossFlashT=0;
  stageTime=0;
  activePets = chosenPets.map((p,idx)=>({def:p, timer:800+idx*400, angle:idx*Math.PI}));
  const hardTag = $id('hardTag');
  hardTag.classList.toggle('hidden', difficulty==='normal');
  hardTag.textContent = difficulty==='hard' ? '困難模式' : (difficulty==='easy' ? '簡單模式' : '');
  hardTag.style.color = difficulty==='hard' ? '#ff6b6b' : '#7fffb0';
  bakeBg(); buildDecos();
  showBanner('第 '+(i+1)+' 關：'+STAGES[i].name,
    i===0 ? '拖曳或按 WASD 移動，魔法會自動施放！' : '撐過三波小怪，打倒 '+STAGES[i].bossName+'！');
  updateHud();
  state='playing';
  lastTime = performance.now();
  requestAnimationFrame(loop);
}
function stopRun(){ state='stopped'; }

function updateHud(){
  $id('hpfill').style.width = Math.max(0,player.hp/player.maxHp*100)+'%';
  $id('scoreLabel').textContent = '分數 '+score;
  $id('waveLabel').textContent = '第 '+(stageIndex+1)+' 關 · 第 '+Math.min(wave,WAVES_PER_STAGE)+'/'+WAVES_PER_STAGE+' 波'+(bossWave?'（魔王）':'');
}

function enterWave(){
  bossWave = wave === WAVES_PER_STAGE;
  bossSpawned = false;
  waveTimer = 0;
  if(bossWave){
    minionTimer = 4200;   // v5：魔王波開場先給玩家幾秒專心面對魔王，不立刻疊加小怪（難度鋸齒喘息段）
    showBanner('魔王出現！', STAGES[stageIndex].bossName);
  }
  sfx.wave();
  updateHud();
}
function diffHpMul(){ return difficulty==='hard' ? 1.6 : (difficulty==='easy' ? 0.8 : 1); }
function diffSpeedMul(){ return difficulty==='hard' ? 1.2 : (difficulty==='easy' ? 0.9 : 1); }

function edgeSpawnPos(m){
  const edge = Math.floor(Math.random()*4);
  if(edge===0) return {x:-m, y:Math.random()*H};
  if(edge===1) return {x:W+m, y:Math.random()*H};
  if(edge===2) return {x:Math.random()*W, y:-m};
  return {x:Math.random()*W, y:H+m};
}
function spawnEnemy(){
  const p = edgeSpawnPos(30);
  const hp = (18 + stageIndex*10 + wave*5) * diffHpMul();
  const speed = (1.05 + stageIndex*0.12 + wave*0.06) * diffSpeedMul();
  enemies.push({x:p.x,y:p.y,r:14+Math.random()*4,hp,maxHp:hp,speed,slowT:0,hitT:0,popT:12,
    type: Math.random()<0.15+stageIndex*0.04 ? 'tank':'normal', wob:Math.random()*6});
}
function spawnBoss(){
  const p = edgeSpawnPos(46);
  const hp = (220 + stageIndex*170) * (difficulty==='hard' ? 1.5 : (difficulty==='easy' ? 0.8 : 1));
  const boss = {
    x:p.x,y:p.y,r:36,hp,maxHp:hp,speed:(0.85+stageIndex*0.1)*diffSpeedMul(),slowT:0,hitT:0,popT:14,
    type:'boss', color:STAGES[stageIndex].bossColor, icon:STAGES[stageIndex].bossIcon, wob:0
  };
  enemies.push(boss);
  // v5：魔王登場要有跟魔王死亡對稱的「大事件」鏡頭感，原本只有一行 banner 文字太平淡
  bossFlashT = 500; bossFlashColor = boss.color;
  triggerShake(14);
  hitstop = 90;
  spawnParticles(boss.x, boss.y, boss.color, 24);
  spawnParticles(boss.x, boss.y, '#ffffff', 10);
}

/* ---------- 天神降臨（保留原作特色） ---------- */
function canTriggerDivine(){
  if(difficulty==='hard') return false;
  if(difficulty==='normal') return !divineUsedInStage;
  return player.divineReady;
}
function triggerDivine(){
  player.divineReady = false;
  divineUsedInStage = true;
  player.divineBuffT = 15000;
  player.hp = Math.min(player.maxHp, player.hp + player.maxHp*0.4);
  player.invuln = Math.max(player.invuln, 2200);
  player.happyT = 1400;
  divineFlashT = 900;
  for(const en of enemies){ en.hp -= 30 + stageIndex*8; en.hitT = 10; }
  spawnParticles(player.x, player.y, '#ffd9a0', 40);
  triggerShake(16);
  sfx.divine();
  showBanner('天神降臨！', '獲得神聖庇護，攻擊力大幅提升！');
  updateHud();
}

function killEnemyAt(j){
  const en = enemies[j];
  if(!en) return;
  if(en.type==='boss'){
    score += 200;
    hitstop = 160;
    sfx.legendary();
    spawnParticles(en.x,en.y,en.color,36);
    spawnParticles(en.x,en.y,'#ffffff',16);
    spawnFloatText(en.x, en.y-en.r-10, '+200', '#ffcf5c', true);
    triggerShake(16);
    enemies.splice(j,1);
    stageClear();
  } else {
    const gain = en.type==='tank' ? 30:15;
    score += gain;
    sfx.score();
    spawnParticles(en.x,en.y,en.type==='tank'?'#ffcf5c':'#38e1ff',10);
    spawnFloatText(en.x, en.y-en.r-6, '+'+gain, en.type==='tank'?'#ffcf5c':'#38e1ff');
    enemies.splice(j,1);
  }
  updateHud();
}
function dmgMult(){ return player.divineBuffT>0 ? 1.6 : 1; }

function fireMagic(dir){
  const m = chosenMagic;
  for(let i=0;i<m.projectiles;i++){
    let ang = Math.atan2(dir.y,dir.x);
    if(m.projectiles>1) ang += (i-(m.projectiles-1)/2) * m.spread;
    bullets.push({
      x:player.x, y:player.y,
      vx:Math.cos(ang)*m.speed, vy:Math.sin(ang)*m.speed,
      r:m.radius, dmg:m.dmg*dmgMult(), color:m.color,
      slow:m.slow, pierce:m.pierce, homing:m.homing, aoe:m.aoe,
      life:90
    });
  }
  sfx.cast();
  player.sx = 1.12; player.sy = 0.9;
  spawnParticles(player.x,player.y,m.color,5);
}
function castElementAttack(){
  if(!enemies.length) return false;
  let nearest=null, nd=Infinity;
  for(const en of enemies){
    const d = Math.hypot(en.x-player.x, en.y-player.y);
    if(d<nd){ nd=d; nearest=en; }
  }
  const dx=nearest.x-player.x, dy=nearest.y-player.y, d=Math.hypot(dx,dy)||1;
  const aim = {x:dx/d, y:dy/d};
  fireMagic(aim);
  player.facing = aim;
}
function castHeal(){
  if(player.hp >= player.maxHp) return false;
  const before = player.hp;
  player.hp = Math.min(player.maxHp, player.hp + player.maxHp*0.22);
  player.happyT = 900;
  sfx.heal();
  spawnParticles(player.x, player.y, '#7fffb0', 14);
  spawnFloatText(player.x, player.y-player.r-14, '+'+Math.round(player.hp-before)+' HP', '#7fffb0');
  updateHud();
}
function castShield(){
  player.invuln = Math.max(player.invuln, 1600);
  sfx.shield();
  spawnParticles(player.x, player.y, '#38e1ff', 16);
}
function castBurst(){
  if(!enemies.length) return false;
  const dmg = (34 + stageIndex*8 + wave*3) * dmgMult();
  for(const en of enemies){ en.hp -= dmg; en.hitT = 8; }
  spawnParticles(player.x, player.y, '#ffcf5c', 30);
  triggerShake(10);
  hitstop = 50;
  sfx.burst();
}

/* ---------- 寵物 ---------- */
const PET_COOLDOWN = {attack:1400, heal:6000, guard:9000};
function petPos(pet, t){
  const r = player.r + 34;
  const a = pet.angle + t*0.0018;
  return {x:player.x+Math.cos(a)*r, y:player.y+Math.sin(a)*r};
}
function runPetEffect(pet, pos){
  if(pet.def.type==='attack'){
    if(!enemies.length) return false;
    let nearest=null, nd=Infinity;
    for(const en of enemies){
      const d = Math.hypot(en.x-pos.x, en.y-pos.y);
      if(d<nd){ nd=d; nearest=en; }
    }
    const dx=nearest.x-pos.x, dy=nearest.y-pos.y, d=Math.hypot(dx,dy)||1;
    bullets.push({x:pos.x, y:pos.y, vx:dx/d*8, vy:dy/d*8, r:6, dmg:8*dmgMult(), color:pet.def.color, life:80});
    spawnParticles(pos.x, pos.y, pet.def.color, 3);
  } else if(pet.def.type==='heal'){
    if(player.hp >= player.maxHp) return false;
    player.hp = Math.min(player.maxHp, player.hp + player.maxHp*0.08);
    spawnParticles(pos.x, pos.y, pet.def.color, 8);
    updateHud();
  } else if(pet.def.type==='guard'){
    player.invuln = Math.max(player.invuln, 900);
    spawnParticles(pos.x, pos.y, pet.def.color, 8);
  }
}

function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++){
    if(particles.length>350) return;
    const a = Math.random()*Math.PI*2, sp = 1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:24+Math.random()*10,color,r:2+Math.random()*2});
  }
}
function triggerShake(mag){ shakeMag=Math.max(shakeMag,mag); shakeT=10; }

/* ---------- 過關與失敗 ---------- */
function calcStageStars(){
  if(stageTime <= STAGES[stageIndex].par && !divineUsedInStage) return 3;
  if(stageTime <= STAGES[stageIndex].par*1.6) return 2;
  return 1;
}
function stageClear(){
  state='over';
  sfx.win();
  const st = calcStageStars();
  if(st > stageStars[stageIndex]){ stageStars[stageIndex]=st; saveStars(); }
  if(score>best){ best=score; try{ localStorage.setItem('mojue_best', String(best)); }catch(e){} }
  hud.classList.add('hidden');
  skillBar.classList.add('hidden');
  const total = stageStars.reduce((a,c)=>a+c,0);
  const isFinal = stageIndex===4;
  $id('overTitle').textContent = isFinal && total>=5 ? '五大魔王全部制霸！' : '第 '+(stageIndex+1)+' 關過關！';
  $id('overStars').innerHTML = '<span class="lit">★</span>'.repeat(st)+'<span>☆</span>'.repeat(3-st);
  $id('overStats').innerHTML =
    chosenChar.name+'・'+chosenMagic.name+'　打倒了 <b style="color:'+STAGES[stageIndex].accent+'">'+STAGES[stageIndex].bossName+'</b><br>'+
    '花費 '+stageTime.toFixed(1)+' 秒　分數 <b style="color:#38e1ff">'+score+'</b>　歷史最高 '+best+'<br>'+
    (st<3 ? '三星條件：'+STAGES[stageIndex].par+' 秒內過關＋不靠天神降臨' : '三星滿分，太神啦！')+
    '<br>目前收集 '+total+' / 15 顆星';
  $id('nextStageBtn').classList.toggle('hidden', stageIndex>=4);
  screenOver.classList.remove('hidden');
}
function gameOver(){
  state='over';
  sfx.gameover();
  hud.classList.add('hidden');
  skillBar.classList.add('hidden');
  if(score>best){ best=score; try{ localStorage.setItem('mojue_best', String(best)); }catch(e){} }
  $id('overTitle').textContent = '被魔物打倒了…';
  $id('overStars').innerHTML = '';
  $id('overStats').innerHTML =
    chosenMagic.name+'　撐到第 '+Math.min(wave,WAVES_PER_STAGE)+' 波　分數 <b style="color:#38e1ff">'+score+'</b><br>'+
    '小訣竅：一直移動別被包圍，護盾亮起時最安全！<br>歷史最高 '+best;
  $id('nextStageBtn').classList.add('hidden');
  screenOver.classList.remove('hidden');
}

/* ---------- 主迴圈：固定時間步進＋hit-stop ---------- */
let lastTime=0, acc=0;
const STEP = 1000/60;
function loop(t){
  if(state!=='playing') return;
  let dt = t-lastTime; lastTime=t;
  if(dt>250) dt=250;
  if(hitstop>0){ hitstop-=dt; render(); requestAnimationFrame(loop); return; }
  acc += dt;
  while(acc>=STEP){ update(STEP); if(state!=='playing') return; acc-=STEP; }
  render();
  requestAnimationFrame(loop);
}

function update(dt){
  const dts = dt/16.67;
  stageTime += dt/1000;
  $id('timeLabel').textContent = stageTime.toFixed(1)+'s';

  // v6 低血量心跳聲：與紅色暈影同步的「咚-咚」，血越少越急
  if(player.hp>0 && player.hp <= player.maxHp*0.3){
    update._hbT = (update._hbT||0) - dt;
    if(update._hbT <= 0){
      update._hbT = player.hp <= player.maxHp*0.15 ? 620 : 900;
      beep(58, 0.1, 'sine', 0.22, 40);
      setTimeout(()=>beep(50, 0.12, 'sine', 0.18, 34), 150);
    }
  }

  let mx=0,my=0;
  if(keys['a']||keys['arrowleft']) mx-=1;
  if(keys['d']||keys['arrowright']) mx+=1;
  if(keys['w']||keys['arrowup']) my-=1;
  if(keys['s']||keys['arrowdown']) my+=1;
  if(joyActive){ mx += joyVec.x; my += joyVec.y; }
  const mlen = Math.hypot(mx,my);
  if(mlen>0.1){
    mx/=mlen; my/=mlen;
    player.x += mx*4.2*dts; player.y += my*4.2*dts;
    player.facing = {x:mx,y:my};
    player.walkPhase += dts*0.35;
  }
  player.x = Math.max(player.r, Math.min(W-player.r, player.x));
  player.y = Math.max(player.r, Math.min(H-player.r, player.y));
  player.blinkT -= dts;
  if(player.blinkT<0) player.blinkT = 140+Math.random()*180;
  player.sx += (1-player.sx)*0.18*dts; player.sy += (1-player.sy)*0.18*dts;

  for(const s of skills){
    s.timer -= dt;
    if(s.timer<=0){
      const fired = s.def.run() !== false;
      s.timer = fired ? s.def.cooldown : 120;
      if(fired) pulseSkill(s.def.id);
    }
  }
  updateSkillUI();

  for(const pet of activePets){
    pet.timer -= dt;
    if(pet.timer<=0){
      const pos = petPos(pet, performance.now());
      const fired = runPetEffect(pet, pos) !== false;
      pet.timer = fired ? PET_COOLDOWN[pet.def.type] : 300;
    }
  }

  // 生怪：三波小怪 → 魔王（魔王戰第 2 關起會零星補小怪）
  if(bossWave){
    if(!bossSpawned){ spawnBoss(); bossSpawned=true; }
    else if(stageIndex>=1){
      minionTimer -= dt;
      if(minionTimer<=0){ spawnEnemy(); minionTimer = 6000; }
    }
  } else {
    spawnTimer -= dt;
    const spawnRate = Math.max(1400 - stageIndex*130 - wave*90, 500) * (difficulty==='hard' ? 0.75 : (difficulty==='easy' ? 1.3 : 1));
    if(spawnTimer<=0){ spawnEnemy(); spawnTimer = spawnRate; }
    waveTimer += dt;
    if(waveTimer > 11000){ wave++; enterWave(); }
  }
  if(bannerT>0) bannerT -= dt;

  // 子彈
  for(let i=bullets.length-1;i>=0;i--){
    const b = bullets[i];
    if(b.homing){
      let target=null, bd=Infinity;
      for(const en of enemies){
        const d = Math.hypot(en.x-b.x,en.y-b.y);
        if(d<bd){ bd=d; target=en; }
      }
      if(target){
        const dx=target.x-b.x, dy=target.y-b.y, d=Math.hypot(dx,dy)||1;
        b.vx += (dx/d)*0.6; b.vy += (dy/d)*0.6;
        const sp = Math.hypot(b.vx,b.vy);
        if(sp>0){ b.vx = b.vx/sp*chosenMagic.speed; b.vy=b.vy/sp*chosenMagic.speed; }
      }
    }
    b.x += b.vx*dts; b.y += b.vy*dts;
    b.life -= dts;
    if(b.life<=0 || b.x<-40||b.x>W+40||b.y<-40||b.y>H+40){
      bullets[i]=bullets[bullets.length-1]; bullets.pop(); continue;
    }
    let removed=false;
    for(let j=enemies.length-1;j>=0;j--){
      const en = enemies[j];
      if(Math.hypot(en.x-b.x,en.y-b.y) < en.r+b.r+4){   // 寬容判定：攻擊判定放大
        en.hp -= b.dmg; en.hitT=6;
        if(b.slow) en.slowT = 90;
        spawnParticles(b.x,b.y,b.color,4);
        sfx.hit();
        if(b.aoe){
          for(const en2 of enemies){
            if(en2!==en && Math.hypot(en2.x-b.x,en2.y-b.y) < 60){ en2.hp -= b.dmg*0.6; en2.hitT=6; }
          }
          triggerShake(4);
        }
        if(en.hp<=0) killEnemyAt(j);
        if(state!=='playing') return;
        if(!b.pierce){ bullets[i]=bullets[bullets.length-1]; bullets.pop(); removed=true; }
        break;
      }
    }
    if(removed) continue;
  }

  // 非子彈傷害（爆發）擊殺結算
  for(let i=enemies.length-1;i>=0;i--){
    if(enemies[i].hp<=0){ killEnemyAt(i); if(state!=='playing') return; }
  }

  // 敵人
  for(let i=enemies.length-1;i>=0;i--){
    const en = enemies[i];
    if(en.slowT>0) en.slowT-=dts;
    if(en.hitT>0) en.hitT-=dts;
    if(en.popT>0) en.popT-=dts;
    const spd = en.slowT>0 ? en.speed*0.4 : en.speed;
    const dx=player.x-en.x, dy=player.y-en.y, d=Math.hypot(dx,dy)||1;
    en.x += dx/d*spd*dts; en.y += dy/d*spd*dts;
    if(d < en.r+player.r-4 && player.invuln<=0){        // 寬容判定：受擊判定縮小
      player.hp -= en.type==='tank'?18:(en.type==='boss'?22:10);
      player.invuln = 700;
      player.hurtT = 520;
      player.sx=1.3; player.sy=0.72;
      hitstop = 40;
      sfx.hurt();
      triggerShake(8);
      spawnParticles(player.x,player.y,'#ff3b6b',8);
      updateHud();
      if(player.hp<=0){ gameOver(); return; }
      if(player.hp <= player.maxHp*0.5 && canTriggerDivine()){ triggerDivine(); }
    }
  }
  if(!player.divineReady && player.hp > player.maxHp*0.5){ player.divineReady = true; }
  if(player.invuln>0) player.invuln -= dt;
  if(player.hurtT>0) player.hurtT -= dt;
  if(player.happyT>0) player.happyT -= dt;
  if(player.divineBuffT>0) player.divineBuffT -= dt;
  if(divineFlashT>0) divineFlashT -= dt;
  if(bossFlashT>0) bossFlashT -= dt;

  // 粒子（swap-pop）
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.x += p.vx*dts; p.y += p.vy*dts;
    p.vx*=0.92; p.vy*=0.92;
    p.life -= dts;
    if(p.life<=0){ particles[i]=particles[particles.length-1]; particles.pop(); }
  }
  // v5：飄字（分數／治療數字），跟粒子一樣用 swap-pop 清除
  for(let i=floaters.length-1;i>=0;i--){
    const f = floaters[i];
    f.y += f.vy*dts;
    f.life -= dts;
    if(f.life<=0){ floaters[i]=floaters[floaters.length-1]; floaters.pop(); }
  }
  if(shakeT>0){ shakeT-=dts; if(shakeT<=0) shakeMag=0; }
}

/* ---------- 背景裝飾 ---------- */
function drawDeco(d, t){
  const x = d.x, y = ((d.y + t*d.drift*20) % (H+80) + (H+80)) % (H+80) - 40;
  const wob = Math.sin(t*0.001 + d.phase)*4;
  ctx.save();
  ctx.translate(x+wob, y);
  ctx.globalAlpha = 0.5;
  if(d.kind==='forest'){
    ctx.fillStyle = '#2f5c3a';
    ctx.beginPath(); ctx.moveTo(0,-14*d.s); ctx.lineTo(10*d.s,8*d.s); ctx.lineTo(-10*d.s,8*d.s); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#4a3324'; ctx.fillRect(-2*d.s,8*d.s,4*d.s,6*d.s);
  } else if(d.kind==='lava'){
    ctx.fillStyle = 'rgba(255,126,61,0.55)';
    ctx.beginPath(); ctx.arc(0,0,6*d.s,0,7); ctx.fill();
  } else if(d.kind==='ice'){
    ctx.strokeStyle = 'rgba(180,230,255,0.6)'; ctx.lineWidth=2;
    ctx.beginPath();
    for(let i=0;i<6;i++){ const a=i/6*Math.PI*2; ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*9*d.s, Math.sin(a)*9*d.s); }
    ctx.stroke();
  } else if(d.kind==='star'){
    ctx.fillStyle = 'rgba(255,207,92,0.7)';
    ctx.beginPath(); ctx.arc(0,0,1.6*d.s,0,7); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillRect(-3.5*d.s,-0.5,7*d.s,1); ctx.fillRect(-0.5,-3.5*d.s,1,7*d.s);
  } else {
    ctx.fillStyle = 'rgba(197,139,255,0.55)';
    ctx.beginPath(); ctx.arc(0,0,2.2*d.s,0,7); ctx.fill();
  }
  ctx.restore();
}

/* ---------- 渲染 ---------- */
function render(){
  const t = performance.now();
  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);
  if(bgCanvas) ctx.drawImage(bgCanvas,0,0);
  ctx.restore();

  ctx.save();
  if(shakeT>0) ctx.translate((Math.random()-0.5)*shakeMag, (Math.random()-0.5)*shakeMag);

  if(decos) for(const d of decos) drawDeco(d, t);

  for(const p of particles){
    ctx.globalAlpha = Math.max(0,p.life/30);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill();
  }
  ctx.globalAlpha=1;

  // 子彈：預烘焙光暈＋實心彈體＋v6 additive 拖尾光
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  for(const b of bullets){
    const g1=glowSprite(b.color);
    ctx.globalAlpha=0.45;
    ctx.drawImage(g1, b.x-b.vx*2.2-b.r*1.9, b.y-b.vy*2.2-b.r*1.9, b.r*3.8, b.r*3.8);
    ctx.globalAlpha=0.28;
    ctx.drawImage(g1, b.x-b.vx*4.4-b.r*1.4, b.y-b.vy*4.4-b.r*1.4, b.r*2.8, b.r*2.8);
  }
  ctx.restore();
  ctx.globalAlpha=1;
  for(const b of bullets){
    ctx.drawImage(glowSprite(b.color), b.x-b.r*2.4, b.y-b.r*2.4, b.r*4.8, b.r*4.8);
    ctx.fillStyle=b.color;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,7); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.75)';
    ctx.beginPath(); ctx.arc(b.x-b.r*0.25,b.y-b.r*0.25,b.r*0.4,0,7); ctx.fill();
  }

  for(const en of enemies) drawEnemy(en, t);

  // v6 玩家元素光環（隨施放魔法屬性著色的地面輝光）
  if(player && chosenMagic){
    const pl = 0.8 + Math.sin(t*0.004)*0.2;
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha=0.4*pl;
    const gr = player.r*3.2;
    ctx.drawImage(glowSprite(chosenMagic.color), player.x-gr, player.y+6-gr*0.5, gr*2, gr);
    ctx.restore();
    ctx.globalAlpha=1;
  }

  if(player.divineBuffT>0){
    const pulse = 0.7 + Math.sin(t*0.008)*0.3;
    const auraR = (player.r*2.6 + pulse*6)*2;
    ctx.globalAlpha = 0.5 * Math.min(1, player.divineBuffT/1200);
    ctx.drawImage(auraSprite, player.x-auraR/2, player.y-auraR/2, auraR, auraR);
    ctx.globalAlpha = 1;
  }

  drawPlayer();

  for(const pet of activePets){
    const pos = petPos(pet, t);
    ctx.drawImage(glowSprite(pet.def.color), pos.x-16, pos.y-16, 32, 32);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(pos.x, pos.y+12, 9, 3, 0, 0, 7); ctx.fill();
    drawSprite(ctx, pet.def.id, pos.x, pos.y + Math.sin(t*0.005+pet.angle)*3, 30);
  }

  // v5：飄字（+分數／+HP），世界座標繪製，跟著鏡頭震動一起晃
  for(const f of floaters){
    const a = Math.max(0, f.life/f.maxLife);
    ctx.globalAlpha = a;
    ctx.textAlign = 'center';
    ctx.font = (f.big ? '900 26px' : '800 17px') + ' "PingFang TC","Microsoft JhengHei",sans-serif';
    ctx.lineWidth = 3;
    ctx.strokeStyle = 'rgba(5,8,16,0.6)';
    ctx.strokeText(f.text, f.x, f.y);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  if(bannerT>0){
    const a = bannerT>1800 ? (2200-bannerT)/400 : (bannerT<400 ? bannerT/400 : 1);
    ctx.save();
    ctx.globalAlpha = Math.max(0,Math.min(1,a));
    ctx.textAlign='center';
    ctx.fillStyle='rgba(5,8,16,0.55)';
    ctx.fillRect(0, H*0.32, W, 84);
    ctx.fillStyle='#fff';
    ctx.font='900 '+Math.min(34,W*0.06)+'px "PingFang TC","Microsoft JhengHei",sans-serif';
    ctx.fillText(bannerText, W/2, H*0.32+36);
    ctx.font='700 '+Math.min(16,W*0.032)+'px "PingFang TC","Microsoft JhengHei",sans-serif';
    ctx.fillStyle='#9db3d8';
    ctx.fillText(bannerSub, W/2, H*0.32+62);
    ctx.restore();
  }
  if(divineFlashT>0 && divineFlashCv){
    ctx.save();
    ctx.globalAlpha = Math.max(0, divineFlashT/900) * 0.65;
    ctx.drawImage(divineFlashCv, 0, 0, W, H);   // v6：烘焙快取，零即時漸層
    ctx.restore();
  }
  // v5：魔王登場閃光（v6 改烘焙快取）
  if(bossFlashT>0){
    ctx.save();
    ctx.globalAlpha = Math.max(0, bossFlashT/500) * 0.55;
    ctx.drawImage(bossFlashSprite(bossFlashColor), 0, 0, W, H);
    ctx.restore();
  }
  // v5：低血量危險暈影（v6 改烘焙快取）
  if(player && player.hp>0 && player.hp <= player.maxHp*0.3 && redVignCv){
    const pulse = 0.5 + 0.5*Math.sin(t*0.006);
    ctx.save();
    ctx.globalAlpha = 0.16 + 0.2*pulse;
    ctx.drawImage(redVignCv, 0, 0, W, H);
    ctx.restore();
  }
}

/* ---------- 敵人繪製（多部件：角、肚皮、表情、腳） ---------- */
function drawEnemy(en, t){
  const pop = en.popT>0 ? 1 - (en.popT/12)*0.6 : 1;
  ctx.save();
  ctx.translate(en.x, en.y);
  ctx.scale(pop, pop);
  if(en.type==='boss'){
    const r = en.r;
    ctx.drawImage(glowSprite(en.color), -r*1.8, -r*1.8, r*3.6, r*3.6);
    const enraged = en.hp/en.maxHp < 0.3;
    const breathe = 1 + Math.sin(t*0.0035)*0.02;
    ctx.save();
    ctx.scale(breathe, breathe);

    // 頭冠尖刺（v5補強：多部件之一，輪廓線＋深淺色階）
    const spikeBase = en.hitT>0 ? '#ffffff' : shadeColor(en.color,-0.25);
    for(let i=-2;i<=2;i++){
      const ang = -Math.PI/2 + i*0.36;
      const len = r*(i===0?0.6:0.42);
      ctx.beginPath();
      ctx.moveTo(Math.cos(ang-0.1)*r*0.75, Math.sin(ang-0.1)*r*0.75);
      ctx.lineTo(Math.cos(ang)*(r+len), Math.sin(ang)*(r+len));
      ctx.lineTo(Math.cos(ang+0.1)*r*0.75, Math.sin(ang+0.1)*r*0.75);
      ctx.closePath();
      ctx.fillStyle = spikeBase; ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth=1.4; ctx.stroke();
    }

    // 側邊觸手／手臂（隨時間輕擺，加強「肢體」可讀性）
    const armColor = en.hitT>0 ? '#ffffff' : shadeColor(en.color,-0.1);
    const armSwing = Math.sin(t*0.0032)*0.12;
    ctx.strokeStyle = armColor; ctx.lineCap='round'; ctx.lineWidth = r*0.24;
    ctx.beginPath();
    ctx.moveTo(-r*0.6, r*0.02);
    ctx.quadraticCurveTo(-r*1.3, r*0.55+armSwing*r, -r*0.95, r*1.08);
    ctx.moveTo(r*0.6, r*0.02);
    ctx.quadraticCurveTo(r*1.3, r*0.55-armSwing*r, r*0.95, r*1.08);
    ctx.stroke();
    ctx.fillStyle = armColor;
    ctx.beginPath(); ctx.arc(-r*0.95,r*1.08,r*0.14,0,7); ctx.arc(r*0.95,r*1.08,r*0.14,0,7); ctx.fill();

    // 身體（漸層陰影：受光面亮／背光面暗＋輪廓線＋環境光遮蔽陰影）
    const bodyColor = en.hitT>0 ? '#ffffff' : en.color;
    ctx.beginPath(); ctx.arc(0,0,r,0,7);
    ctx.fillStyle = radialShade(ctx, r, bodyColor);
    ctx.fill();
    ctx.lineWidth = Math.max(2, r*0.07);
    ctx.strokeStyle = shadeColor(bodyColor,-0.55);
    ctx.stroke();
    ctx.fillStyle='rgba(0,0,0,0.22)';
    ctx.beginPath(); ctx.arc(r*0.3,r*0.32,r*0.62,0,7); ctx.fill();

    // 憤怒雙眼＋眉（第二表情狀態：瀕死 enraged 變紅瞇眼、受擊變白）── 排在臉部上段，與下方徽記/嘴巴分層不重疊
    const ey = -r*0.46;
    ctx.fillStyle = en.hitT>0 ? '#ffffff' : (enraged ? '#ff3b3b' : '#fff4d0');
    ctx.beginPath();
    ctx.ellipse(-r*0.26, ey, r*0.13, enraged?r*0.07:r*0.085, -0.22, 0, 7);
    ctx.ellipse(r*0.26, ey, r*0.13, enraged?r*0.07:r*0.085, 0.22, 0, 7);
    ctx.fill();
    ctx.fillStyle='#170a06';
    ctx.beginPath(); ctx.arc(-r*0.26,ey,r*0.045,0,7); ctx.arc(r*0.26,ey,r*0.045,0,7); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.lineWidth=Math.max(1.5,r*0.05); ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(-r*0.4, ey-r*0.16); ctx.lineTo(-r*0.12, ey-r*0.04);
    ctx.moveTo(r*0.4, ey-r*0.16); ctx.lineTo(r*0.12, ey-r*0.04);
    ctx.stroke();

    // 胸章徽記（保留原關卡魔王圖示，維持辨識度／不換角色只精細化）── 置於臉部中段，與雙眼/嘴巴保留間距不重疊
    ctx.save();
    ctx.translate(0, r*0.08);
    ctx.fillStyle='rgba(8,10,18,0.55)';
    ctx.beginPath(); ctx.arc(0,0,r*0.3,0,7); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1.5; ctx.stroke();
    drawSprite(ctx, en.icon, 0, 0, r*0.42);
    ctx.restore();

    // 獠牙巨口（enraged 時張得更大）── 置於臉部下段，低於徽記
    const mouthY = r*0.46;
    ctx.fillStyle='#170a06';
    ctx.beginPath();
    ctx.moveTo(-r*0.3, mouthY);
    ctx.quadraticCurveTo(0, mouthY+(enraged?r*0.36:r*0.2), r*0.3, mouthY);
    ctx.quadraticCurveTo(0, mouthY+(enraged?r*0.16:r*0.08), -r*0.3, mouthY);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#fff';
    for(const fx of [-r*0.2,-r*0.07,r*0.07,r*0.2]){
      ctx.beginPath(); ctx.moveTo(fx-r*0.055, mouthY); ctx.lineTo(fx+r*0.055, mouthY); ctx.lineTo(fx, mouthY+r*0.1); ctx.closePath(); ctx.fill();
    }

    // 高光點
    ctx.fillStyle='rgba(255,255,255,0.32)';
    ctx.beginPath(); ctx.ellipse(-r*0.38,-r*0.48, r*0.2, r*0.13, -0.4, 0, 7); ctx.fill();

    ctx.restore();
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(0,0,r+5,0,7); ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.22)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,0,r+11+Math.sin(t*0.006)*2,0,7); ctx.stroke();
  } else {
    const tank = en.type==='tank';
    const base = en.hitT>0 ? '#ffffff' : (tank ? '#9a6bff':'#ff3b6b');
    const belly = en.hitT>0 ? '#ffffff' : (tank ? '#c5a3ff':'#ff7d9e');
    const bob = Math.sin(t*0.008 + en.wob)*1.5;
    // 腳
    ctx.fillStyle = shadeColor(base,-0.3);
    ctx.beginPath(); ctx.ellipse(-en.r*0.45, en.r*0.85, en.r*0.3, en.r*0.18, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(en.r*0.45, en.r*0.85, en.r*0.3, en.r*0.18, 0, 0, 7); ctx.fill();
    // 身體（v5補強：漸層陰影＋輪廓線，取代平塗）
    ctx.translate(0, bob);
    ctx.beginPath(); ctx.arc(0,0,en.r,0,7);
    ctx.fillStyle = radialShade(ctx, en.r, base);
    ctx.fill();
    ctx.lineWidth = Math.max(1.2, en.r*0.08);
    ctx.strokeStyle = shadeColor(base,-0.45);
    ctx.stroke();
    // 肚皮
    ctx.fillStyle = belly;
    ctx.beginPath(); ctx.ellipse(0, en.r*0.35, en.r*0.55, en.r*0.45, 0, 0, 7); ctx.fill();
    // 角
    ctx.fillStyle = en.hitT>0 ? '#fff' : (tank ? '#5d3fa8':'#b8204a');
    ctx.beginPath(); ctx.moveTo(-en.r*0.55,-en.r*0.65); ctx.lineTo(-en.r*0.85,-en.r*1.25); ctx.lineTo(-en.r*0.2,-en.r*0.9); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(en.r*0.55,-en.r*0.65); ctx.lineTo(en.r*0.85,-en.r*1.25); ctx.lineTo(en.r*0.2,-en.r*0.9); ctx.closePath(); ctx.fill();
    if(tank){ // 裝甲頭帶
      ctx.fillStyle = en.hitT>0 ? '#fff' : '#5d3fa8';
      ctx.fillRect(-en.r*0.8, -en.r*0.5, en.r*1.6, en.r*0.24);
    }
    // 眼睛（看向玩家）
    const pdx = player ? player.x-en.x : 0, pdy = player ? player.y-en.y : 0;
    const pd = Math.hypot(pdx,pdy)||1;
    const ex = pdx/pd*en.r*0.1, ey = pdy/pd*en.r*0.1;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(-en.r*0.32,-en.r*0.12, en.r*0.2, en.r*0.24, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(en.r*0.32,-en.r*0.12, en.r*0.2, en.r*0.24, 0, 0, 7); ctx.fill();
    ctx.fillStyle='#2b1020';
    ctx.beginPath(); ctx.arc(-en.r*0.32+ex,-en.r*0.12+ey, en.r*0.1,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(en.r*0.32+ex,-en.r*0.12+ey, en.r*0.1,0,7); ctx.fill();
    // 嘴（v5補強：受擊瞬間張口「痛」，平常維持微笑，兩種表情狀態）
    if(en.hitT>0){
      ctx.fillStyle='#2b1020';
      ctx.beginPath(); ctx.ellipse(0, en.r*0.22, en.r*0.16, en.r*0.19, 0, 0, 7); ctx.fill();
    } else {
      ctx.strokeStyle='#2b1020'; ctx.lineWidth=Math.max(1.5,en.r*0.08); ctx.lineCap='round';
      ctx.beginPath(); ctx.arc(0, en.r*0.18, en.r*0.22, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();
    }
    // 減速冰霜
    if(en.slowT>0){
      ctx.strokeStyle='rgba(143,227,255,0.8)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(0,0,en.r+3,0,7); ctx.stroke();
    }
  }
  ctx.restore();
  // 血條
  const w = en.r*2;
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(en.x-w/2, en.y-en.r-12, w, 5);
  ctx.fillStyle= en.type==='boss' ? '#ffcf5c' : '#38e1ff';
  ctx.fillRect(en.x-w/2, en.y-en.r-12, w*Math.max(0,en.hp/en.maxHp), 5);
}

/* ---------- 玩家繪製（斗篷、法帽、眨眼、squash） ---------- */
function drawPlayer(){
  ctx.save();
  ctx.translate(player.x,player.y);
  if(player.invuln>0 && Math.floor(player.invuln/80)%2===0) ctx.globalAlpha=0.4;
  const r = player.r;
  const bob = Math.sin(player.walkPhase*6)*2;
  const swing = Math.sin(player.walkPhase*6)*0.5;
  const facingRight = (player.facing.x||0) >= 0;
  const hairColor = chosenChar.hair;
  const outfitColor = player.color;

  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0, r*0.9, r*0.8, r*0.28, 0, 0, 7); ctx.fill();

  ctx.scale(player.sx, player.sy);
  ctx.save();
  ctx.translate(0, bob*0.4);

  // 斗篷（漸層陰影＋輪廓線）
  ctx.fillStyle = outfitColor+'aa';
  ctx.beginPath();
  ctx.moveTo(-r*0.5,-r*0.2);
  ctx.quadraticCurveTo(-r*1.3, r*0.6 + swing*4, -r*0.3, r*1.1);
  ctx.quadraticCurveTo(0, r*0.7, 0, -r*0.2);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = shadeColor(outfitColor,-0.5); ctx.lineWidth = Math.max(1,r*0.05);
  ctx.globalAlpha *= 0.8; ctx.stroke(); ctx.globalAlpha /= 0.8;

  // 腳
  ctx.strokeStyle = gender==='girl' ? '#4a2f8c' : '#1d2740';
  ctx.lineWidth = r*0.34; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(-r*0.25, r*0.55); ctx.lineTo(-r*0.25+swing*5, r*1.15);
  ctx.moveTo(r*0.25, r*0.55); ctx.lineTo(r*0.25-swing*5, r*1.15);
  ctx.stroke();

  // 身體（漸層陰影：受光面亮／背光面暗＋輪廓線）
  ctx.beginPath();
  ctx.moveTo(-r*0.55, r*0.15);
  ctx.quadraticCurveTo(0, r*0.55, r*0.55, r*0.15);
  ctx.lineTo(r*0.45, -r*0.35);
  ctx.quadraticCurveTo(0, -r*0.55, -r*0.45, -r*0.35);
  ctx.closePath();
  ctx.fillStyle = radialShade(ctx, r*0.55, outfitColor);
  ctx.fill();
  ctx.strokeStyle = shadeColor(outfitColor,-0.5); ctx.lineWidth = Math.max(1,r*0.045);
  ctx.stroke();
  // 高光點
  ctx.fillStyle='rgba(255,255,255,0.22)';
  ctx.beginPath(); ctx.ellipse(-r*0.12,-r*0.05,r*0.22,r*0.32,0.3,0,7); ctx.fill();

  // 手
  ctx.strokeStyle = outfitColor;
  ctx.lineWidth = r*0.26; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(-r*0.5,-r*0.15); ctx.lineTo(-r*0.85-swing*3, r*0.15);
  ctx.moveTo(r*0.5,-r*0.15); ctx.lineTo(r*0.85+swing*3, r*0.15);
  ctx.stroke();
  ctx.fillStyle='#ffd9b3';
  ctx.beginPath(); ctx.arc(-r*0.85-swing*3, r*0.15, r*0.14,0,7); ctx.arc(r*0.85+swing*3, r*0.15, r*0.14,0,7); ctx.fill();

  // 頭（膚色漸層＋輪廓線）
  ctx.save();
  ctx.translate(0,-r*0.85);
  ctx.beginPath(); ctx.arc(0,0,r*0.62,0,7);
  ctx.fillStyle = radialShade(ctx, r*0.62, '#ffd9b3');
  ctx.fill();
  ctx.strokeStyle = shadeColor('#ffd9b3',-0.35); ctx.lineWidth = Math.max(1,r*0.035);
  ctx.stroke();
  ctx.restore();

  // 後髮
  if(gender==='girl'){
    ctx.fillStyle=hairColor;
    ctx.beginPath();
    ctx.moveTo(-r*0.55,-r*1.0);
    ctx.quadraticCurveTo(-r*0.9,-r*0.3,-r*0.6+swing*3,r*0.05);
    ctx.lineTo(-r*0.3,-r*0.15);
    ctx.quadraticCurveTo(-r*0.5,-r*0.7,-r*0.25,-r*1.15);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(r*0.55,-r*1.0);
    ctx.quadraticCurveTo(r*0.9,-r*0.3,r*0.6-swing*3,r*0.05);
    ctx.lineTo(r*0.3,-r*0.15);
    ctx.quadraticCurveTo(r*0.5,-r*0.7,r*0.25,-r*1.15);
    ctx.closePath(); ctx.fill();
  }
  // 頂髮
  ctx.fillStyle=hairColor;
  ctx.beginPath();
  ctx.arc(0,-r*1.02, r*0.64, Math.PI, 0);
  ctx.quadraticCurveTo(r*0.5,-r*1.5, 0,-r*1.55);
  ctx.quadraticCurveTo(-r*0.5,-r*1.5, -r*0.62,-r*1.02);
  ctx.closePath(); ctx.fill();
  if(gender==='boy'){
    ctx.beginPath(); ctx.moveTo(-r*0.5,-r*0.95); ctx.lineTo(r*0.5,-r*0.95); ctx.lineTo(r*0.4,-r*1.15); ctx.lineTo(-r*0.4,-r*1.15); ctx.closePath(); ctx.fill();
  }
  // 法師帽（新增：帽簷＋帽身＋星星）
  ctx.save();
  ctx.translate(0,-r*1.28); ctx.rotate(facingRight?0.1:-0.1);
  ctx.fillStyle = shadeColor(outfitColor,-0.15);
  ctx.strokeStyle = shadeColor(outfitColor,-0.55); ctx.lineWidth = Math.max(1,r*0.035);
  ctx.beginPath(); ctx.ellipse(0, r*0.1, r*0.78, r*0.2, 0, 0, 7); ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-r*0.48, r*0.05);
  ctx.quadraticCurveTo(-r*0.1,-r*0.9, r*0.28,-r*1.0);
  ctx.quadraticCurveTo(r*0.15,-r*0.4, r*0.48, r*0.05);
  ctx.closePath();
  ctx.fillStyle = radialShade(ctx, r*0.7, outfitColor);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(0, r*0.12, r*0.5, r*0.1, 0, 0, 7); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const a=-Math.PI/2+i*(Math.PI*2/5), a2=a+Math.PI/5, sr=r*0.16;
    ctx.lineTo(r*0.05+Math.cos(a)*sr, -r*0.45+Math.sin(a)*sr);
    ctx.lineTo(r*0.05+Math.cos(a2)*sr*0.45, -r*0.45+Math.sin(a2)*sr*0.45);
  }
  ctx.closePath(); ctx.fill();
  ctx.restore();

  // 臉（v5補強：平常／受擊／開心 三種表情狀態，不只眨眼）
  const blink = player.blinkT < 8;
  const isHurt = player.hurtT > 0;
  const isHappy = !isHurt && player.happyT > 0;
  ctx.fillStyle='#2b2b3a';
  const eyeDx = facingRight ? r*0.12 : -r*0.12;
  if(isHurt){
    // 受擊：>.< 皺眼＋擔心眉毛
    ctx.strokeStyle='#2b2b3a'; ctx.lineWidth=r*0.055; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(-r*0.30,-r*0.90); ctx.lineTo(-r*0.10,-r*0.80);
    ctx.moveTo(-r*0.30,-r*0.80); ctx.lineTo(-r*0.10,-r*0.90);
    ctx.moveTo(r*0.10,-r*0.90); ctx.lineTo(r*0.30,-r*0.80);
    ctx.moveTo(r*0.10,-r*0.80); ctx.lineTo(r*0.30,-r*0.90);
    ctx.stroke();
    ctx.strokeStyle='rgba(43,43,58,0.75)'; ctx.lineWidth=r*0.045;
    ctx.beginPath();
    ctx.moveTo(-r*0.32,-r*1.0); ctx.lineTo(-r*0.1,-r*0.96);
    ctx.moveTo(r*0.32,-r*1.0); ctx.lineTo(r*0.1,-r*0.96);
    ctx.stroke();
  } else if(!blink){
    ctx.beginPath();
    ctx.arc(-r*0.2+eyeDx*0.3,-r*0.85,r*0.08,0,7);
    ctx.arc(r*0.2+eyeDx*0.3,-r*0.85,r*0.08,0,7);
    ctx.fill();
    if(isHappy){
      ctx.fillStyle='#fff'; ctx.globalAlpha*=0.85;
      ctx.beginPath();
      ctx.arc(-r*0.2+eyeDx*0.3-r*0.02,-r*0.87,r*0.025,0,7);
      ctx.arc(r*0.2+eyeDx*0.3-r*0.02,-r*0.87,r*0.025,0,7);
      ctx.fill(); ctx.globalAlpha=1;
    }
  } else {
    ctx.strokeStyle='#2b2b3a'; ctx.lineWidth=r*0.05; ctx.lineCap='round';
    ctx.beginPath();
    if(isHappy){
      ctx.arc(-r*0.2,-r*0.82,r*0.09,Math.PI,0);
      ctx.moveTo(r*0.29,-r*0.82); ctx.arc(r*0.2,-r*0.82,r*0.09,Math.PI,0);
    } else {
      ctx.moveTo(-r*0.28,-r*0.85); ctx.lineTo(-r*0.12,-r*0.85);
      ctx.moveTo(r*0.12,-r*0.85); ctx.lineTo(r*0.28,-r*0.85);
    }
    ctx.stroke();
  }
  ctx.strokeStyle='#c96b52'; ctx.lineWidth=r*0.05; ctx.lineCap='round';
  ctx.beginPath();
  if(isHurt){
    ctx.arc(0,-r*0.62,r*0.075,0,7);   // 受擊：小張口「痛」
  } else if(isHappy){
    ctx.arc(0,-r*0.66,r*0.19,0.1*Math.PI,0.9*Math.PI);   // 開心：大大笑容
  } else {
    ctx.arc(0,-r*0.68,r*0.14,0.15*Math.PI,0.85*Math.PI);
  }
  ctx.stroke();
  ctx.fillStyle= isHurt ? '#ff8f8f' : '#ff9db3'; ctx.globalAlpha *= isHurt?0.85:0.6;
  ctx.beginPath(); ctx.arc(-r*0.34,-r*0.72,r*0.09,0,7); ctx.arc(r*0.34,-r*0.72,r*0.09,0,7); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.restore();

  // 瞄準指示
  const fa = Math.atan2(player.facing.y||1, player.facing.x||0);
  ctx.strokeStyle=chosenMagic.color; ctx.lineWidth=3;
  ctx.globalAlpha=0.85;
  ctx.beginPath();
  ctx.moveTo(Math.cos(fa)*(r+2), Math.sin(fa)*(r+2));
  ctx.lineTo(Math.cos(fa)*(r+16), Math.sin(fa)*(r+16));
  ctx.stroke();

  ctx.restore();
  ctx.globalAlpha=1;
}

/* ---------- 啟動 ---------- */
resize();
window.addEventListener('touchmove', e=>{ if(state==='playing') e.preventDefault(); }, {passive:false});

/* ---------- QA 掛鉤 ---------- */
window.__QA = {
  snap(){ return { state, stage:stageIndex, wave, score,
    hp: player?player.hp:0, enemies:enemies.length, bullets:bullets.length,
    stars: stageStars.slice(), time:stageTime, bossWave:!!bossWave,
    px: player?player.x:0, py: player?player.y:0, joy:joyActive,
    floaters:floaters.length, bossFlashT, shakeMag, petPanelOpen: petPanel.classList.contains('open') }; },
  chooseFirst(){ document.querySelector('.choice-btn').click(); },
  startStage,
  toBossWave(){ wave = WAVES_PER_STAGE; enterWave(); },
  nuke(){ for(const en of enemies) en.hp = -1; },
  hurt(n){ if(player){ player.hp -= n; player.hurtT = 6000; updateHud(); if(player.hp<=0) gameOver(); } },
  spritesReady(){ let n=0; for(const k in SPRITES) if(SPRITES[k].ok) n++; return n; },
  togglePetPanel(){ petPanel.classList.toggle('open'); },
  killOne(){                              // QA：即時驗證擊殺飄字（不用等動畫幀）
    enemies.push({x:player.x+40,y:player.y,r:14,hp:1,maxHp:1,speed:0,slowT:0,hitT:0,popT:0,type:'normal',wob:0});
    killEnemyAt(enemies.length-1);
    return { floaters: floaters.length, score };
  },
  forceBoss(){                            // QA：即時驗證魔王登場鏡頭震動/閃光
    spawnBoss();
    return { bossFlashT, shakeMag, enemies: enemies.length };
  },
  freezeForShot(){                        // v5補強QA專用：凍結戰鬥數值方便截圖驗證美術，不影響正式玩法
    for(const en of enemies){ en.hp = en.maxHp = 999999; en.x = W/2; en.y = H*0.32; }
    if(player){ player.x = W/2; player.y = H*0.72; }
  }
};
})();
