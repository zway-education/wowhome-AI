<!DOCTYPE html>
<!-- 專業AI升級 v7：僅介面/畫質/質感——HUD玻璃面板與圓角進度條、動作鈕烘焙光暈+按壓質感、SVG向量喇叭圖示、選單標題漸層字與卡片光澤、三段式暗角+夜空冷氛圍、場景切換淡入（玩法/文本零更動，unstickPlayer保留） -->
<!-- +補強：角色精細化/觸控/大螢幕提醒 -->
<!-- 部分圖示：OpenMoji (CC BY-SA 4.0) openmoji.org -->
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="author" content="人JJ">
<title>JJ蓋房子躲怪獸</title>
<style>
  html,body{margin:0;height:100%;background:#0d0a1f;overflow:hidden;touch-action:none;
    -webkit-user-select:none;user-select:none;font-family:"Microsoft JhengHei",sans-serif}
  canvas{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);touch-action:none}
  #muteBtn{position:fixed;right:12px;top:12px;width:52px;height:52px;border-radius:50%;
    background:linear-gradient(180deg,rgba(46,40,86,.85),rgba(20,20,40,.8));border:2px solid #9a6bff;color:#fff;font-size:24px;
    z-index:10;display:flex;align-items:center;justify-content:center;cursor:pointer;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.22),0 3px 10px rgba(0,0,0,.4);transition:transform .12s ease}
  #muteBtn:active{transform:scale(.9)}
  #muteBtn.isMuted{border-color:#ff6c6c}
  #muteBtn svg{display:block}
  #rotateHint{position:fixed;left:0;right:0;bottom:0;padding:8px 10px;text-align:center;
    background:rgba(20,10,50,.85);color:#ffcf5c;font-size:14px;
    font-family:"Microsoft JhengHei",sans-serif;z-index:9;pointer-events:none;display:none}
  @media (orientation: portrait){ #rotateHint{display:block} }
  #bigscreenHint{position:fixed;inset:0;z-index:100000;display:none;align-items:center;justify-content:center;
    background:rgba(7,11,20,.9);padding:24px;box-sizing:border-box;transition:opacity .35s ease}
  #bigscreenHint.show{display:flex}
  #bigscreenHint.hide{opacity:0;pointer-events:none}
  #bigscreenHint .bsh-card{max-width:360px;width:100%;background:rgba(18,16,36,.94);
    border:1px solid rgba(154,107,255,.45);border-radius:16px;padding:30px 24px;text-align:center;
    box-shadow:0 12px 40px rgba(0,0,0,.5);box-sizing:border-box}
  #bigscreenHint .bsh-title{font-size:20px;font-weight:bold;margin:10px 0 10px;
    background:linear-gradient(92deg,#38e1ff,#4f7cff,#9a6bff);
    -webkit-background-clip:text;background-clip:text;color:transparent}
  #bigscreenHint .bsh-sub{font-size:14px;color:#cfd6e6;margin:0 0 22px;line-height:1.6}
  #bigscreenHint .bsh-btn{display:block;width:100%;min-width:60%;height:52px;min-height:52px;
    border:none;border-radius:12px;font-size:16px;font-weight:bold;color:#0a0716;cursor:pointer;
    background:linear-gradient(92deg,#38e1ff,#4f7cff,#9a6bff);font-family:"Microsoft JhengHei",sans-serif}
</style>
</head>
<body>
<canvas id="game"></canvas>
<button id="muteBtn" aria-label="靜音">🔊</button>
<div id="rotateHint">📱 建議將裝置轉為橫向，畫面更完整好玩！</div>
<div id="bigscreenHint">
  <div class="bsh-card">
    <svg width="48" height="48" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="6" y="8" width="40" height="26" rx="3" stroke="#4f7cff" stroke-width="2.5"/>
      <line x1="18" y1="42" x2="34" y2="42" stroke="#9a6bff" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="26" y1="34" x2="26" y2="42" stroke="#9a6bff" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <p class="bsh-title">建議使用大螢幕遊玩</p>
    <p class="bsh-sub">用平板或電腦打開，體驗更完整</p>
    <button type="button" class="bsh-btn" id="bshOkBtn">知道了，繼續玩</button>
  </div>
</div>
<script>
'use strict';
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize(){
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = Math.round(GAME_W * scale * dpr);
  canvas.height = Math.round(GAME_H * scale * dpr);
  canvas.style.width  = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale;
}
addEventListener('resize', resize); resize();

// ===== 大螢幕提醒浮層（只在手機出現，一個 session 只跳一次，不攔截遊戲初始化）=====
(function(){
  try{
    const already = sessionStorage.getItem('bigscreen-hint');
    const isPhone = Math.min(screen.width, screen.height) < 600 || innerWidth < 768;
    if(!already && isPhone){
      const hint = document.getElementById('bigscreenHint');
      hint.classList.add('show');
      const dismiss = ()=>{
        try{ sessionStorage.setItem('bigscreen-hint','1'); }catch(e){}
        hint.classList.add('hide');
        setTimeout(()=>hint.remove(), 400);
      };
      const btn = document.getElementById('bshOkBtn');
      btn.addEventListener('click', dismiss);
      btn.addEventListener('touchend', e=>{ e.preventDefault(); dismiss(); }, {passive:false});
    } else {
      document.getElementById('bigscreenHint').remove();
    }
  }catch(e){}
})();

  const im = new Image();

  const im = IMG[key];

}

let ambDay = null, ambNight = null, ambDuck = null, ambPhase = 'day';
function makeAmbLoop(kind){
  // v6：程序化氛圍循環——day＝微風+鳥鳴、night＝蟋蟀+暗風（4 秒無縫循環）
  const sr = AC.sampleRate, len = sr*4, buf = AC.createBuffer(1, len, sr), d = buf.getChannelData(0);
  let lp = 0;
  for(let i=0;i<len;i++){
    const t = i/sr, w = Math.random()*2-1;
    lp += (w-lp)*(kind==='day'?0.02:0.012);
    let v = lp*(0.6+0.4*Math.sin(t*1.9))*1.2;
    if(kind==='night'){
      const cyc = t%1.1;                                  // 蟋蟀：每 1.1 秒三連唧
      const pi2 = Math.PI*2;
      for(let c=0;c<3;c++){
        const dt2 = cyc-0.12*c;
        if(dt2>0 && dt2<0.05) v += Math.sin(pi2*4300*t)*Math.sin(dt2/0.05*Math.PI)*0.22;
      }
    } else {
      const bt = t%2.3;                                   // 白天：偶爾一聲鳥啾
      if(bt>0 && bt<0.16) v += Math.sin(Math.PI*2*(2100+900*Math.sin(bt*22))*t)*Math.sin(bt/0.16*Math.PI)*0.1;
    }
    d[i] = v;
  }
  const f = (sr*0.12)|0;
  for(let i=0;i<f;i++){ const a=i/f; d[i]=d[i]*a+d[len-f+i]*(1-a); }
  const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
  const g = AC.createGain(); g.gain.value = 0;
  src.connect(g); g.connect(ambDuck); src.start();
  return g;
}
function setAmbPhase(p){
  ambPhase = p;
  if(!AC || !ambDay) return;
  const t0 = AC.currentTime;
  ambDay.gain.setTargetAtTime(muted?0:(p==='day'?0.05:0), t0, 0.8);
  ambNight.gain.setTargetAtTime(muted?0:(p==='night'?0.045:0), t0, 0.8);
}
function duckAmb(){
  if(!AC || !ambDuck || muted) return;
  const t0 = AC.currentTime;
  ambDuck.gain.cancelScheduledValues(t0);
  ambDuck.gain.setTargetAtTime(0.35, t0, 0.015);
  ambDuck.gain.setTargetAtTime(1, t0+0.12, 0.25);
}
function audio(){
  if(!AC){
    AC = new (window.AudioContext||window.webkitAudioContext)();
    const comp = AC.createDynamicsCompressor();
    comp.threshold.value = -18; comp.knee.value = 24; comp.ratio.value = 6;
    const g = AC.createGain(); g.gain.value = 0.9;
    g.connect(comp).connect(AC.destination);
    master = g;
    // v6：程序化殘響（generated impulse 戶外短殘響）
    try{
      const ir = AC.createBuffer(2, (AC.sampleRate*1.1)|0, AC.sampleRate);
      for(let ch=0;ch<2;ch++){
        const dd = ir.getChannelData(ch);
        for(let i=0;i<dd.length;i++) dd[i] = (Math.random()*2-1)*Math.pow(1-i/dd.length, 3);
      }
      const conv = AC.createConvolver(); conv.buffer = ir;
      const wet = AC.createGain(); wet.gain.value = 0.13;
      comp.connect(conv); conv.connect(wet); wet.connect(AC.destination);
      // v6：日夜氛圍層
      ambDuck = AC.createGain(); ambDuck.gain.value = 1; ambDuck.connect(master);
      ambDay = makeAmbLoop('day');
      ambNight = makeAmbLoop('night');
      setAmbPhase(ambPhase);
    }catch(e){}
  }
  if(AC.state==='suspended') AC.resume();
  return AC;
}
addEventListener('pointerdown', audio, { once:true });
addEventListener('keydown', audio, { once:true });
function beep(freq=440,dur=0.1,type='square',vol=0.15,slide=0){
  if(muted) return;
  const ac = audio(); if(!ac||!master) return;
  if(vol >= 0.12) duckAmb();   // v6：主音效壓低氛圍層
  const f = freq * (0.94 + Math.random()*0.12);   // 隨機音高 ±6%
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.setValueAtTime(f, ac.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide), ac.currentTime+dur);
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+dur);
  o.connect(g).connect(master);
  o.start(); o.stop(ac.currentTime+dur);
}
function noiseBurst(dur=0.2, vol=0.2){
  if(muted) return;
  const ac = audio(); if(!ac||!master) return;
  if(vol >= 0.12) duckAmb();   // v6
  const buf = ac.createBuffer(1, Math.max(1, ac.sampleRate*dur|0), ac.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
  const src = ac.createBufferSource(); src.buffer = buf;
  const g = ac.createGain(); g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+dur);
  src.connect(g).connect(master); src.start();
}
function chord(freqs, gap=80, dur=0.12, type='square', vol=0.12){
  freqs.forEach((f,i)=>setTimeout(()=>beep(f,dur,type,vol), i*gap));
}

// 觸控：左半浮動搖桿、右半＝動作鍵（大按鈕提示）
let joy = { active:false, id:null, cx:0, cy:0, dx:0, dy:0 };
let tapAction = false;
let tapPoint = null;   // 選單點擊用
const JOY_R = 54;
const ACT_CX = GAME_W-96, ACT_CY = GAME_H-108, ACT_R = 52;
function touchPos(t){
  const r = canvas.getBoundingClientRect();
  return { x:(t.clientX-r.left)/canvas._scale, y:(t.clientY-r.top)/canvas._scale };
}
const JOY_DEAD = 10;   // 死區：手指微抖不算移動，避免角色原地漂移
function joyApply(p){
  const dx = p.x-joy.cx, dy = p.y-joy.cy;
  const d = Math.hypot(dx,dy);
  if(d<=JOY_DEAD){ joy.dx=0; joy.dy=0; return; }
  // 死區外重新映射到 0~JOY_R，避免一超過死區就瞬間跳成全速
  const t = Math.min(1, (d-JOY_DEAD)/(JOY_R-JOY_DEAD));
  joy.dx = dx/d*t*JOY_R; joy.dy = dy/d*t*JOY_R;
}
function onTouchStart(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    const p = touchPos(t);
    tapPoint = p;
    if(state!==playState){ tapAction = true; input.actionBuffer = 0.15; continue; }
    if(checkBuildBar(p.x, p.y)) continue;
    if(p.x < GAME_W*0.5 && !joy.active){
      joy.active = true; joy.id = t.identifier;
      joy.cx = clamp(p.x, JOY_R+16, GAME_W*0.5-JOY_R);   // 浮動搖桿：跟隨拇指落點
      joy.cy = clamp(p.y, JOY_R+16, GAME_H-JOY_R-16);
      joyApply(p);
    } else if(p.x >= GAME_W*0.5){
      tapAction = true; input.actionBuffer = 0.15;
    }
  }
}
function onTouchMove(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    if(joy.active && t.identifier===joy.id) joyApply(touchPos(t));
  }
}
function onTouchEnd(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    if(joy.active && t.identifier===joy.id){ joy.active=false; joy.dx=0; joy.dy=0; }
  }
}
canvas.addEventListener('touchstart', onTouchStart, {passive:false});
canvas.addEventListener('touchmove', onTouchMove, {passive:false});
canvas.addEventListener('touchend', onTouchEnd, {passive:false});
canvas.addEventListener('touchcancel', onTouchEnd, {passive:false});

// 滑鼠：選單點擊、遊玩時左半拖曳搖桿 / 右半＝動作
let mouseJoyDown = false;
canvas.addEventListener('mousedown', e=>{
  const r = canvas.getBoundingClientRect();
  const p = { x:(e.clientX-r.left)/canvas._scale, y:(e.clientY-r.top)/canvas._scale };
  tapPoint = p;
  if(state!==playState){ tapAction = true; input.actionBuffer = 0.15; return; }
  if(checkBuildBar(p.x,p.y)) return;
  if(p.x < GAME_W*0.5){
    mouseJoyDown = true; joy.active = true;
    joy.cx = clamp(p.x, JOY_R+16, GAME_W*0.5-JOY_R);
    joy.cy = clamp(p.y, JOY_R+16, GAME_H-JOY_R-16);
    joyApply(p);
  } else {
    tapAction = true; input.actionBuffer = 0.15;
  }
});
addEventListener('mousemove', e=>{
  if(!mouseJoyDown) return;
  const r = canvas.getBoundingClientRect();
  joyApply({ x:(e.clientX-r.left)/canvas._scale, y:(e.clientY-r.top)/canvas._scale });
});
addEventListener('mouseup', ()=>{
  if(mouseJoyDown){ mouseJoyDown=false; joy.active=false; joy.dx=0; joy.dy=0; }
});

function moveVector(){
  let mx=0,my=0;
  if(input.left) mx-=1; if(input.right) mx+=1;
  if(input.up) my-=1; if(input.down) my+=1;
  if(joy.active){ mx += joy.dx/JOY_R; my += joy.dy/JOY_R; }
  const len = Math.hypot(mx,my);
  if(len>1){ mx/=len; my/=len; }
  return {mx,my};
}

function barSlotRects(){
  const total = BUILD_TYPES.length*SLOT + (BUILD_TYPES.length-1)*SLOT_GAP;
  const startX = GAME_W/2 - total/2;
  return BUILD_TYPES.map((b,i)=>({ b, x:startX+i*(SLOT+SLOT_GAP), y:BAR_Y+(BAR_H-SLOT)/2, w:SLOT, h:SLOT }));

function checkBuildBar(x,y){
  if(state!==playState || phase!=='day') return false;
  if(y < BAR_Y) return false;
  for(const s of barSlotRects()){
    if(x>=s.x-6 && x<=s.x+s.w+6 && y>=s.y-6 && y<=s.y+s.h+6){ selectBuild(s.b.id); return true; }
  }
  return true;
}

function hexLerp(a,b,t){
  const pa = parseInt(a.slice(1),16), pb = parseInt(b.slice(1),16);
  const r=Math.round(((pa>>16)&255)+((((pb>>16)&255)-((pa>>16)&255))*t));
  const g=Math.round(((pa>>8)&255)+((((pb>>8)&255)-((pa>>8)&255))*t));
  const bl=Math.round((pa&255)+(((pb&255)-(pa&255))*t));
  return `rgb(${r},${g},${bl})`;
}
function traceRoundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

// ===== v6：離屏烘焙（日/夜背景、草地棋盤、光暈、vignette）——主迴圈零 createGradient =====
function bake(w,h,fn){ const c=document.createElement('canvas'); c.width=w; c.height=h; fn(c.getContext('2d')); return c; }
function bakeBG(night){
  return bake(GAME_W, GAME_H, g=>{
    const sky=g.createLinearGradient(0,0,0,GAME_H);
    sky.addColorStop(0, night?PALETTE.skyNight1:PALETTE.skyDay1);
    sky.addColorStop(1, night?PALETTE.skyNight2:PALETTE.skyDay2);
    g.fillStyle=sky; g.fillRect(0,0,GAME_W,GAME_H);
    if(night){
      for(let i=0;i<48;i++){ const sx=(i*97)%GAME_W, sy=(i*53)%150+8;
        g.globalAlpha=0.5+((i*31)%50)/100; g.fillStyle='#fff'; g.fillRect(sx,sy,2,2); }
      g.globalAlpha=1;
      const mw=g.createLinearGradient(0,0,GAME_W,120);   // 淡淡星河
      mw.addColorStop(0,'rgba(154,107,255,0)'); mw.addColorStop(0.5,'rgba(154,107,255,0.09)'); mw.addColorStop(1,'rgba(56,225,255,0)');
      g.fillStyle=mw; g.fillRect(0,0,GAME_W,170);
    }
    g.fillStyle = night?hexLerp('#79c98f','#1a1440',0.85):'#79c98f';
    g.beginPath(); g.moveTo(0,120);
    for(let x=0;x<=GAME_W;x+=60) g.lineTo(x, 96+Math.sin(x*0.013)*26);
    g.lineTo(GAME_W,140); g.lineTo(GAME_W,GAME_H); g.lineTo(0,GAME_H); g.closePath(); g.fill();
    g.fillStyle = night?'#120e33':'#4c9c63';   // 遠方小樹剪影
    for(let i=0;i<9;i++){
      const tx=40+i*110+((i*37)%23), ty=96+Math.sin(tx*0.013)*26;
      g.beginPath(); g.moveTo(tx-8,ty+4); g.lineTo(tx,ty-14); g.lineTo(tx+8,ty+4); g.closePath(); g.fill();
      g.fillRect(tx-1.5,ty+2,3,5);
    }
    g.fillStyle = night?hexLerp('#5eb877','#171138',0.85):'#5eb877';
    g.beginPath(); g.moveTo(0,160);
    for(let x=0;x<=GAME_W;x+=60) g.lineTo(x, 140+Math.cos(x*0.02)*18);
    g.lineTo(GAME_W,GAME_H); g.lineTo(0,GAME_H); g.closePath(); g.fill();
  });
}

// v6：氛圍粒子層——白天落葉、夜晚螢火蟲
const ambient=[];
function updateAmbient(dt, nightAmt){
  if(ambient.length<14 && Math.random()<dt*3){
    if(nightAmt>0.5) ambient.push({kind:'fly', x:ORIGIN_X+Math.random()*GRID*CELL, y:ORIGIN_Y+Math.random()*GRID*CELL, t:Math.random()*7, life:4+Math.random()*3});
    else ambient.push({kind:'leaf', x:Math.random()*GAME_W, y:-10, t:Math.random()*7, life:7});
  }
  for(let i=ambient.length-1;i>=0;i--){
    const a=ambient[i];
    a.t+=dt; a.life-=dt;
    if(a.kind==='fly'){ a.x+=Math.sin(a.t*1.3)*20*dt; a.y+=Math.cos(a.t*1.7)*15*dt; }
    else { a.y+=36*dt; a.x+=Math.sin(a.t*2)*24*dt; if(a.y>GAME_H-30) a.life=0; }
    if(a.life<=0) ambient.splice(i,1);
  }
}
function drawAmbient(nightAmt){
  for(const a of ambient){
    const fade=Math.min(1,a.life);
    if(a.kind==='fly'){
      const tw=0.35+0.65*Math.abs(Math.sin(a.t*3));
      ctx.globalAlpha=fade*tw*nightAmt;
      ctx.fillStyle='#d8ff8a';
      ctx.fillRect(a.x-3,a.y-3,6,6);
      ctx.globalAlpha*=0.4;
      ctx.fillRect(a.x-6,a.y-6,12,12);
    } else {
      ctx.globalAlpha=fade*(1-nightAmt)*0.8;
      ctx.save(); ctx.translate(a.x,a.y); ctx.rotate(a.t*2.4);
      ctx.fillStyle='#7dbf5a'; ctx.fillRect(-4,-2,8,4);
      ctx.restore();
    }
  }
  ctx.globalAlpha=1;
}

function makeWalls(){
  const out=[]; const seen=new Set(); const N=GRID;
  const push=(gx,gy)=>{ const k=gx+','+gy; if(!seen.has(k)){seen.add(k); out.push({gx,gy,built:0,need:3});} };
  for(let i=0;i<N;i++){ push(i,0); push(i,N-1); push(0,i); push(N-1,i); }
  return out;
}

let wood=0, day=1, phase='day', phaseTimer=0, score=0;
let shake=0, freeze=0, flashT=0;
let walls=[], traps=[], monsters=[], woodNodes=[];
let houseHp=0, houseHpMax=1;
let spawnTimer=0, nightSpawned=0, nightQuota=0;
let nightIsBreather=false;   // v5：鋸齒狀難度的喘息夜
let dangerBeepT=0;           // v5：城牆瀕危警示音節流
let hintT = 0;   // 開場提示浮層

const player = { gx:3, gy:3, x:0, y:0, sx:1, sy:1, facing:1, blinkT:2, bob:0,
                 hp:3, maxHp:3, invuln:0, atkT:0, atkDir:1, mood:'normal', moodT:0 };
function updatePlayerPos(){ player.x = isoX(player.gx, player.gy); player.y = isoY(player.gx, player.gy); }

const FURNITURE = [
  { type:'sofa', gx:1.5, gy:1.5 },
  { type:'bed', gx:5, gy:1.5 },
  { type:'fridge', gx:5, gy:5 },
];
let fridgeCooldown = 0;
const FRIDGE_COOLDOWN = 9;

// 解卡邏輯：玩家若與已完工牆／傢俱重疊（例如牆剛好在玩家腳邊完工，或被硬塞進牆內），
// 以遞增半徑向周圍搜尋最近可行走位置把玩家推出。未重疊時零成本早退。
const PLAYER_R = 0.16;
function isBlockedAt(gx,gy){
  return walls.some(w=>w.built>=w.need
      && Math.abs(w.gx-gx)<0.5+PLAYER_R && Math.abs(w.gy-gy)<0.5+PLAYER_R)
    || FURNITURE.some(f=>Math.abs(f.gx-gx)<0.45+PLAYER_R && Math.abs(f.gy-gy)<0.45+PLAYER_R);
}
function unstickPlayer(){
  if(!isBlockedAt(player.gx, player.gy)) return;
  for(let r=0.1; r<=GRID; r+=0.1){
    for(let i=0;i<16;i++){
      const a = i/16*Math.PI*2;
      const gx = clamp(player.gx+Math.cos(a)*r, 0.3, GRID-1.3);
      const gy = clamp(player.gy+Math.sin(a)*r, 0.3, GRID-1.3);
      if(!isBlockedAt(gx,gy)){ player.gx=gx; player.gy=gy; updatePlayerPos(); return; }
    }
  }
}

const parts = [];
function burst(x,y,color,n=12,speed=180){
  if(parts.length>260) return;
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2, s = speed*(0.3+Math.random()*0.7);
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s*0.6-40,life:0.5,color});
  }
}
function updateParts(dt){
  for(const p of parts){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=300*dt; p.life-=dt; }
  for(let i=parts.length-1;i>=0;i--) if(parts[i].life<=0) parts.splice(i,1);
}
function drawParts(){
  for(const p of parts){
    ctx.globalAlpha = Math.max(0,p.life*2);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-3,p.y-3,6,6);
  }
  ctx.globalAlpha = 1;
}
const floatTexts = [];
function floatText(x,y,text,color='#fff',size=16){
  floatTexts.push({x,y,text,color,size,life:0.9});
}
function updateFloat(dt){
  for(const f of floatTexts){ f.y -= 42*dt; f.life -= dt; }
  for(let i=floatTexts.length-1;i>=0;i--) if(floatTexts[i].life<=0) floatTexts.splice(i,1);
}
function drawFloat(){
  ctx.textAlign='center';
  for(const f of floatTexts){
    ctx.font = `bold ${f.size}px sans-serif`;
    ctx.globalAlpha = Math.max(0,f.life);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha=1;
}

function spawnWoodNodes(){
  woodNodes = [];
  const N = GRID;
  const count = 5 + Math.min(4, Math.floor(day*0.6));
  for(let i=0;i<count;i++){
    let gx,gy,ok,tries=0;
    do{
      gx = 1+Math.random()*(N-2); gy = 1+Math.random()*(N-2);
      ok = Math.hypot(gx-player.gx, gy-player.gy) > 0.9
        && !FURNITURE.some(f=>Math.hypot(f.gx-gx, f.gy-gy) < 1);
    } while(!ok && ++tries<40);
    woodNodes.push({gx,gy,taken:false,bob:Math.random()*10});
  }
}

function resetGame(){
  const L = LEVELS[levelIdx];
  wood = 6; day = 1; phase='day'; phaseTimer = L.dayLen;
  setAmbPhase('day');   // v6
  ambient.length = 0;
  walls = makeWalls();
  houseHpMax = walls.reduce((s,w)=>s+w.need,0);
  houseHp = 0;
  score = 0;
  player.gx=3; player.gy=3; player.hp=3; player.invuln=0; player.atkT=0;
  player.sx=1; player.sy=1;
  updatePlayerPos();
  spawnWoodNodes();
  monsters = []; traps = []; parts.length=0; floatTexts.length=0;
  selectedBuild = 'wall';
  fridgeCooldown = 0;
  shake=0; freeze=0; flashT=0;
  nightIsBreather=false; dangerBeepT=0;
  hintT = 5;
}

// ===== 怪物 =====
const MON_DEF = {
  zombie:{ hp:2, speed:0.5, chew:0.7, dmg:1, score:10, size:52, sprite:'zombie' },
  ghost: { hp:1, speed:0.75, chew:0,   dmg:1, score:15, size:48, sprite:'ghost' },   // 穿牆直追玩家
  alien: { hp:1, speed:1.0, chew:1.4, dmg:1, score:15, size:46, sprite:'alien' },
};
function spawnMonster(){
  const L = LEVELS[levelIdx];
  const pool = L.types.filter((t,i)=> i===0 || day > i);   // 越後面天數才出新怪
  const type = pool[Math.floor(Math.random()*pool.length)];
  const def = MON_DEF[type];
  const N = GRID;
  const edge = Math.floor(Math.random()*4);
  let gx,gy;
  if(edge===0){ gx=-1.6; gy=Math.random()*N; }
  else if(edge===1){ gx=N+0.6; gy=Math.random()*N; }
  else if(edge===2){ gx=Math.random()*N; gy=-1.6; }
  else { gx=Math.random()*N; gy=N+0.6; }
  const speed = def.speed * (1 + day*0.06 + Math.random()*0.12);
  monsters.push({type, gx, gy, speed, hp:def.hp, dead:false, hitFlash:0, target:null, squash:1, wob:Math.random()*6});
  burst(isoX(gx,gy), isoY(gx,gy)-14, '#9a6bff', 8, 130);   // v6：現身煙霧＋低吼預警
  beep(120+Math.random()*40, 0.2, 'sawtooth', 0.08, -40);
}
// 修正原作 BUG：殭屍只鎖定「已經有蓋」的牆；沒牆就直接追玩家（原作會呆站在空牆位）
function nearestBuiltWall(m){
  let best=null, bd=Infinity;
  for(const w of walls){
    if(w.built<=0) continue;
    const d = Math.hypot(w.gx-m.gx, w.gy-m.gy);
    if(d<bd){ bd=d; best=w; }
  }
  return best;
}

// ===== 狀態機 =====
let state;
let sceneFade7 = 0;   // v7：場景切換淡入（僅視覺）
function setState(s){ state = s; sceneFade7 = 1; if(s.enter) s.enter(); }

// ===== 繪圖 =====
function drawBackground(nightAmt){
  // v6：日/夜整幅背景離屏烘焙，夜色用透明度交叉淡入（含星空/星河/樹影）
  ctx.drawImage(BG_DAY, 0, 0);
  if(nightAmt > 0.01){
    ctx.globalAlpha = nightAmt;
    ctx.drawImage(BG_NIGHT, 0, 0);
    ctx.globalAlpha = 1;
  }
  // 太陽 / 月亮沿弧線移動（v6：加烘焙光暈）
  const L = LEVELS[levelIdx];
  const total = phase==='day'?L.dayLen:L.nightLen;
  const t = clamp(phaseTimer/total,0,1);
  const arcX = GAME_W*0.12 + (1-t)*GAME_W*0.76;
  const arcY = 70 - Math.sin((1-t)*Math.PI)*28;
  ctx.drawImage(phase==='day'?GLOW_SUN:GLOW_MOON, arcX-64, arcY-64);
  drawSprite(phase==='day'?'sun':'moon', arcX, arcY, 52);
  // 白天雲朵
  if(nightAmt<0.6){
    ctx.globalAlpha = (1-nightAmt)*0.85;
    const ct = performance.now()/1000;
    for(let i=0;i<3;i++){
      const cx = ((ct*12 + i*340)%(GAME_W+160))-80, cy = 46+i*26;
      ctx.fillStyle='#fff';
      ctx.beginPath();
      ctx.ellipse(cx,cy,34,13,0,0,Math.PI*2);
      ctx.ellipse(cx+24,cy+4,24,10,0,0,Math.PI*2);
      ctx.ellipse(cx-24,cy+5,22,9,0,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;
  }
}
function drawGroundBoard(nightAmt){
  // v6：草地棋盤烘焙成一張圖（含小花/石子），夜色用單筆疊色
  ctx.drawImage(GROUND_SPR, ORIGIN_X-1, ORIGIN_Y-1);
  if(nightAmt > 0.01){
    ctx.globalAlpha = nightAmt*0.55;
    ctx.fillStyle = '#141033';
    ctx.fillRect(ORIGIN_X, ORIGIN_Y, GRID*CELL, GRID*CELL);
    ctx.globalAlpha = 1;
  }
}
function drawWall(w, nightAmt){
  const x = Math.round(isoX(w.gx,w.gy)), y = Math.round(isoY(w.gx,w.gy));
  const ratio = w.built/w.need;
  const h = 8 + ratio*20;
  const color = w.built===0 ? PALETTE.wallEmpty : ratio<1 ? PALETTE.wallHalf : PALETTE.wallDone;
  const half = CELL/2;
  const topH = half*2-h;
  ctx.fillStyle = hexLerp(color,'#000',0.35+nightAmt*0.3);
  ctx.fillRect(x-half, y-half+h-1, CELL+1, topH+1);
  ctx.fillStyle = hexLerp(color,'#fff',0.1);
  ctx.fillRect(x-half, y-half-1, CELL+1, topH+2);
  ctx.strokeStyle = hexLerp(color,'#000',0.18);
  ctx.lineWidth = 1;
  for(let ly=y-half+6; ly<y-half+topH; ly+=7){
    ctx.beginPath(); ctx.moveTo(x-half+2, ly); ctx.lineTo(x+half-2, ly); ctx.stroke();
  }
  if(w.built>0 && w.built>=w.need){
    // 完工牆頂的小尖頂裝飾
    ctx.fillStyle = hexLerp('#d9584a','#3a1210',nightAmt*0.5);
    ctx.fillRect(x-half+4, y-half-5, CELL-8, 5);
  }
  if(w.built<w.need && phase==='day'){
    ctx.fillStyle='#fff'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
    ctx.fillText(`${Math.ceil(w.built)}/${w.need}`, x, y-half-8);
  }
  // v5：牆快被咬穿時（<1/3）畫紅色脈動外框，讓玩家一眼看出哪面牆快破
  if(w.built>0 && w.built<w.need*0.34){
    ctx.save();
    ctx.globalAlpha = 0.45 + Math.sin(performance.now()/170)*0.3;
    ctx.strokeStyle = '#ff3b3b'; ctx.lineWidth = 3;
    ctx.strokeRect(x-half-2, y-half-2, CELL+4, CELL+4);
    ctx.restore();
  }
}
function drawWoodNode(n,t){
  const x = isoX(n.gx,n.gy), y = isoY(n.gx,n.gy) + Math.sin(t*3+n.bob)*5;
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.ellipse(isoX(n.gx,n.gy), isoY(n.gx,n.gy)+10, 14, 5, 0,0,Math.PI*2); ctx.fill();
  drawSprite('wood', x, y-4, 40);
}
function drawTrap(t){
  const x = isoX(t.gx,t.gy), y = isoY(t.gx,t.gy);
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(x,y,17,7,0,0,Math.PI*2); ctx.fill();
  const col = t.charges>1 ? '#c0392b' : '#8b3a62';
  for(const dx of [-9,0,9]){
    const g = ctx.createLinearGradient(x+dx,y-15,x+dx,y+5);
    g.addColorStop(0,'#f2f2f2'); g.addColorStop(0.35,col); g.addColorStop(1,hexLerp(col,'#000',0.4));
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(x+dx-4,y+4); ctx.lineTo(x+dx,y-15); ctx.lineTo(x+dx+4,y+4);
    ctx.closePath(); ctx.fill();
  }
}
function drawFurniture(f){
  const x = isoX(f.gx,f.gy), y = isoY(f.gx,f.gy);
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(x,y+4,26,10,0,0,Math.PI*2); ctx.fill();
  if(f.type==='sofa'){
    drawSprite('sofa', x, y-16, 56);
  } else if(f.type==='bed'){
    drawSprite('bed', x, y-16, 60);
  } else if(f.type==='fridge'){
    const ready = fridgeCooldown<=0 && player.hp<player.maxHp;
    if(ready){ ctx.save(); ctx.shadowColor='#41d6ff'; ctx.shadowBlur=14; }
    ctx.fillStyle = ready ? '#e5fbff' : '#d8e6ea';
    traceRoundRect(x-15,y-46,30,48,4); ctx.fill();
    if(ready) ctx.restore();
    ctx.strokeStyle='#8fa3a8'; ctx.lineWidth=2;
    traceRoundRect(x-15,y-46,30,48,4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x-15,y-28); ctx.lineTo(x+15,y-28); ctx.stroke();
    ctx.fillStyle='#8fa3a8';
    ctx.fillRect(x+7,y-40,3,8); ctx.fillRect(x+7,y-22,3,10);
    drawSprite('cup', x, y-58, 26);
    ctx.fillStyle = ready ? '#41d6ff' : '#9fb3b8';
    ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
    ctx.fillText(ready?'喝飲料回血':'飲料', x, y-72);
  }
}
function drawPlayerJJ(){
  const x = player.x, y = player.y - 5;
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0, 8, 19, 7, 0,0,Math.PI*2); ctx.fill();
  const flash = player.invuln>0 && Math.floor(player.invuln*20)%2===0;
  ctx.scale(player.facing<0?-player.sx:player.sx, player.sy);
  const bobY = Math.sin(player.bob*6)*2;
  ctx.translate(0, bobY);
  const legPh = Math.sin(player.bob*10);
  const skinCol = flash?'#fff':'#ffcf9c';
  const shoeCol = flash?'#ddd':'#3a2a1c';
  // 腳（大腿旋轉擺動＋鞋子，比原本單純上下位移更有走路感）
  for(const side of [-1,1]){
    ctx.save();
    ctx.translate(side*5, -4);
    ctx.rotate(side*legPh*0.28);
    ctx.fillStyle = flash?'#fff':'#4a3728';
    ctx.fillRect(-3,0,6,8);
    ctx.fillStyle = shoeCol;
    traceRoundRect(-3.6,7,7.2,4,1.6); ctx.fill();
    ctx.restore();
  }
  // 身體（漸層上衣＋背光陰影／受光高光帶＋輪廓線）
  const bg = ctx.createLinearGradient(0,-30,0,-4);
  bg.addColorStop(0, flash?'#fff':'#6a92ff'); bg.addColorStop(1, flash?'#fff':'#3f66e0');
  ctx.fillStyle = bg;
  traceRoundRect(-11,-30,22,26,6); ctx.fill();
  if(!flash){
    ctx.save();
    traceRoundRect(-11,-30,22,26,6); ctx.clip();
    ctx.fillStyle='rgba(10,10,45,0.22)'; ctx.fillRect(3,-30,8,26);
    ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.fillRect(-10,-29,5,22);
    ctx.restore();
  }
  ctx.strokeStyle = flash?'#fff':'#2a3d8f'; ctx.lineWidth=1.6;
  traceRoundRect(-11,-30,22,26,6); ctx.stroke();
  // 手臂＋鎚子（攻擊揮動）
  const swing = player.atkT>0 ? Math.sin((0.28-player.atkT)/0.28*Math.PI)*1.6 : 0;
  ctx.save();
  ctx.translate(10,-24);
  ctx.rotate(-0.5 + swing*1.8);
  ctx.fillStyle = skinCol;
  ctx.fillRect(-2,0,5,14);
  ctx.strokeStyle = flash?'#eee':'#c98f5a'; ctx.lineWidth=1; ctx.strokeRect(-2,0,5,14);
  // 鎚子
  ctx.fillStyle = flash?'#eee':'#8c5a3c';
  ctx.fillRect(-1.5,12,3,14);
  const hg = ctx.createLinearGradient(-8,24,8,33);
  hg.addColorStop(0, flash?'#fff':'#c7ccd1'); hg.addColorStop(1, flash?'#ddd':'#84898f');
  ctx.fillStyle = hg;
  traceRoundRect(-8,24,16,9,2); ctx.fill();
  ctx.strokeStyle = flash?'#fff':'#5a5f66'; ctx.lineWidth=1.2; traceRoundRect(-8,24,16,9,2); ctx.stroke();
  ctx.restore();
  // 另一手臂（自然反向擺動，取代原本固定不動的手臂）
  ctx.save();
  ctx.translate(-14,-26);
  ctx.rotate(0.15 - legPh*0.22);
  ctx.fillStyle = skinCol;
  ctx.fillRect(-2.5,0,5,13);
  ctx.strokeStyle = flash?'#eee':'#c98f5a'; ctx.lineWidth=1; ctx.strokeRect(-2.5,0,5,13);
  ctx.restore();
  // 頭（漸層膚色＋輪廓線＋高光點）
  const fg = ctx.createRadialGradient(-4,-42,2,0,-38,13);
  fg.addColorStop(0, flash?'#fff':'#ffdcb0'); fg.addColorStop(1, flash?'#eee':'#e0a878');
  ctx.fillStyle = fg;
  ctx.beginPath(); ctx.arc(0,-38,12,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = flash?'#fff':'#c98f5a'; ctx.lineWidth=1.4;
  ctx.beginPath(); ctx.arc(0,-38,12,0,Math.PI*2); ctx.stroke();
  // 頭髮（底色＋暗部＋高光，取代原本純平塗）
  ctx.fillStyle = flash?'#eee':'#2b2118';
  ctx.beginPath(); ctx.arc(0,-42,12,Math.PI,Math.PI*2); ctx.fill();
  ctx.fillRect(-12,-44,24,4);
  if(!flash){
    ctx.fillStyle='#1a130d';
    ctx.beginPath(); ctx.ellipse(3,-47,5,3.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.beginPath(); ctx.ellipse(-5,-46,3,1.6,-0.4,0,Math.PI*2); ctx.fill();
    // 臉部高光點
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.beginPath(); ctx.ellipse(-4,-42,2.4,1.6,-0.5,0,Math.PI*2); ctx.fill();
  }
  // 眼睛（眨眼＝兩態）
  const blink = player.blinkT<0.1;
  ctx.fillStyle='#222';
  if(!blink){
    ctx.beginPath(); ctx.arc(4,-38,2.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(-3,-38,2.2,0,Math.PI*2); ctx.fill();
  } else {
    ctx.fillRect(1,-38,5,1.5); ctx.fillRect(-6,-38,5,1.5);
  }
  // 腮紅
  ctx.fillStyle='rgba(255,120,120,0.5)';
  ctx.beginPath(); ctx.arc(7,-33,2.5,0,Math.PI*2); ctx.arc(-7,-33,2.5,0,Math.PI*2); ctx.fill();
  // 嘴巴：平常淺笑／受擊「哦」／開心咧嘴（三態表情，取代原本沒有嘴巴的臉）
  ctx.lineCap='round';
  if(player.mood==='hurt'){
    ctx.fillStyle='#7a3020';
    ctx.beginPath(); ctx.ellipse(0,-30,2.3,3,0,0,Math.PI*2); ctx.fill();
  } else if(player.mood==='happy'){
    ctx.strokeStyle='#8a4a3a'; ctx.lineWidth=1.6;
    ctx.beginPath(); ctx.arc(0,-32,4,0.15*Math.PI,0.85*Math.PI); ctx.stroke();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.moveTo(-3,-30.5); ctx.quadraticCurveTo(0,-27.5,3,-30.5); ctx.closePath(); ctx.fill();
  } else {
    ctx.strokeStyle='#8a4a3a'; ctx.lineWidth=1.6;

  }

    ctx.beginPath();
    ctx.arc(0,0, 26+p*10, -1.2*player.facing, 1.0*player.facing, player.facing<0);

function drawMonster(m){
  const def = MON_DEF[m.type];
  const x = isoX(m.gx,m.gy), y = isoY(m.gx,m.gy);
  ctx.save();
  const wob = Math.sin(performance.now()/1000*6 + m.wob);
  const hitJit = m.hitFlash>0 ? Math.sin(performance.now()/22)*0.16*(m.hitFlash/0.15) : 0;
  if(m.type==='ghost'){
    ctx.globalAlpha = 0.85;
    ctx.translate(x, y-14 + wob*4);
  } else {
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(x,y+6,16,5,0,0,Math.PI*2); ctx.fill();
    ctx.translate(x, y-14);
    ctx.rotate(wob*0.08 + hitJit);
  }
  ctx.scale(m.squash, 2-m.squash);
  drawSprite(def.sprite, 0, 0, def.size);
  if(m.hitFlash>0){
    ctx.globalAlpha = 0.7; ctx.globalCompositeOperation='lighter';
    drawSprite(def.sprite, 0, 0, def.size);
  }
  ctx.restore();
  // 血條（受過傷才顯示）
  if(m.hp < def.hp){
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(x-14, y-44, 28, 5);
    ctx.fillStyle='#ff6cc7'; ctx.fillRect(x-14, y-44, 28*Math.max(0,m.hp/def.hp), 5);
  }
}

function drawBuildBar(){

      ctx.fillStyle = s.b.color;
      ctx.fillRect(cx-14, cy-10, 28, 20);
      ctx.strokeStyle = '#5a4326'; ctx.lineWidth=2; ctx.strokeRect(cx-14, cy-10, 28, 20);
      ctx.strokeStyle='#5a4326'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(cx-14,cy); ctx.lineTo(cx+14,cy); ctx.stroke();
    } else if(s.b.id==='trap'){

      for(const dx of [-9,0,9]){
        ctx.beginPath();
        ctx.moveTo(cx+dx-5,cy+9); ctx.lineTo(cx+dx,cy-11); ctx.lineTo(cx+dx+5,cy+9);
        ctx.closePath(); ctx.fill();
      }
    } else {
      ctx.fillStyle = '#c9a876';
      ctx.fillRect(cx-14, cy-10, 28, 20);
      ctx.strokeStyle = '#ff5a5a'; ctx.lineWidth=4;
      ctx.beginPath(); ctx.moveTo(cx-15,cy-13); ctx.lineTo(cx+15,cy+13); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+15,cy-13); ctx.lineTo(cx-15,cy+13); ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.fillStyle = affordable ? '#fff' : '#ff8a8a';
    ctx.font='bold 12px sans-serif';
    ctx.fillText(s.b.cost>0 ? `${s.b.name} 木${s.b.cost}` : s.b.name, cx, s.y+s.h-4);

// ===== 遊玩 =====
const playState = {
  update(dt){
    const L = LEVELS[levelIdx];
    player.blinkT -= dt; if(player.blinkT<0) player.blinkT = 2.5+Math.random();
    player.invuln = Math.max(0, player.invuln-dt);
    player.atkT = Math.max(0, player.atkT-dt);
    player.sx += (1-player.sx)*10*dt; player.sy += (1-player.sy)*10*dt;
    fridgeCooldown = Math.max(0, fridgeCooldown-dt);
    hintT = Math.max(0, hintT-dt);
    player.moodT = Math.max(0, player.moodT-dt);
    if(player.moodT<=0) player.mood = 'normal';

    unstickPlayer(); // 若已重疊在碰撞體內（例如牆剛完工在腳邊），先推回可行走位置
    const {mx,my} = moveVector();
    const spd = 3.3*dt;
    if(mx!==0||my!==0){
      player.bob += dt;
      if(mx>0.05) player.facing=1; else if(mx<-0.05) player.facing=-1;
      const ngx = clamp(player.gx + mx*spd, 0.3, GRID-1.3);
      if(!isBlockedAt(ngx, player.gy)) player.gx = ngx;
      const ngy = clamp(player.gy + my*spd, 0.3, GRID-1.3);
      if(!isBlockedAt(player.gx, ngy)) player.gy = ngy;
      updatePlayerPos();
    }

    if(input.actionBuffer>0 || tapAction){
      input.actionBuffer=0; tapAction=false;
      handleAction();
    }

    if(phase==='day'){
      for(const n of woodNodes){
        if(n.taken) continue;
        if(Math.hypot(n.gx-player.gx, n.gy-player.gy) < 0.62){
          n.taken = true; wood += 2; score += 5;
          player.mood = 'happy'; player.moodT = 0.4;
          floatText(player.x, player.y-72, '+2 木材', '#ffcf5c');
          burst(player.x, player.y-40, '#c9975f', 8, 130);
          beep(700,0.08,'square',0.12); setTimeout(()=>beep(1000,0.1,'square',0.1),70);
        }
      }
      phaseTimer -= dt;
      if(phaseTimer<=0) startNight();
    } else {
      spawnTimer -= dt;
      const spawnRate = Math.max(0.7, L.spawnBase - day*0.14) * (nightIsBreather ? 1.3 : 1);
      if(spawnTimer<=0 && nightSpawned<nightQuota){
        spawnMonster(); nightSpawned++; spawnTimer = spawnRate;
      }
      for(const m of monsters){
        const def = MON_DEF[m.type];
        m.hitFlash = Math.max(0, m.hitFlash-dt);
        m.squash += (1-m.squash)*8*dt;
        let tx, ty;
        if(m.type==='ghost'){
          tx=player.gx; ty=player.gy;   // 鬼魂穿牆直追玩家
        } else {
          if(!m.target || m.target.built<=0) m.target = nearestBuiltWall(m);
          if(m.target){ tx=m.target.gx; ty=m.target.gy; }
          else { tx=player.gx; ty=player.gy; }   // 沒牆可咬 → 追玩家（修正原作呆站BUG）
        }
        const dx=tx-m.gx, dy=ty-m.gy, d=Math.hypot(dx,dy);
        const chewing = m.type!=='ghost' && m.target && d<=0.55;
        if(d>0.5 && !chewing){
          m.gx += dx/d*m.speed*dt; m.gy += dy/d*m.speed*dt;
        } else if(chewing){
          m.target.built = Math.max(0, m.target.built - def.chew*dt);
          if(Math.random()<dt*3) burst(isoX(m.target.gx,m.target.gy), isoY(m.target.gx,m.target.gy)-14, '#caa165', 2, 90);
        }
        // 撞到玩家
        if(player.invuln<=0 && Math.hypot(m.gx-player.gx, m.gy-player.gy)<0.55){
          player.hp -= def.dmg; player.invuln = 1.2;
          player.mood = 'hurt'; player.moodT = 0.6;
          player.sx = 0.72; player.sy = 1.32;
          shake = 8; freeze = 0.08; flashT = 0.1;
          burst(player.x, player.y-30, '#ff6cc7', 16, 200);
          beep(220,0.25,'sawtooth',0.2,-150);
          if(player.hp<=0){ setState(gameOverState); return; }
        }
        // 陷阱（鬼魂飄浮不會踩到）
        if(m.type!=='ghost') for(const trap of traps){
          if(trap.dead) continue;
          if(Math.hypot(m.gx-trap.gx, m.gy-trap.gy) < 0.5){
            trap.charges -= 1; if(trap.charges<=0) trap.dead = true;
            m.hp -= 2; m.hitFlash = 0.15; m.squash = 1.5;
            shake = 5; freeze = 0.05;
            burst(isoX(trap.gx,trap.gy), isoY(trap.gx,trap.gy)-20, '#c0392b', 14, 200);
            beep(900,0.1,'sawtooth',0.15,-300); noiseBurst(0.1,0.12);
            if(m.hp<=0 && !m.dead) killMonster(m);
          }
        }
      }
      traps = traps.filter(t=>!t.dead);
      monsters = monsters.filter(m=>!m.dead);
      houseHp = walls.reduce((s,w)=>s+w.built,0);

      // v5：城牆瀕危警示——任一動工過的牆被咬到剩不到1/3時，畫面閃紅框＋警示音提醒玩家去救
      const wallCritical = walls.some(w=>w.built>0 && w.built<w.need*0.34);
      if(wallCritical){
        dangerBeepT -= dt;
        if(dangerBeepT<=0){ beep(780,0.09,'square',0.11,-40); dangerBeepT = 2.2; }
      } else {
        dangerBeepT = 0;
      }

      phaseTimer -= dt;
      if(phaseTimer<=0 && nightSpawned>=nightQuota && monsters.length===0){
        // 天亮：是否通關
        if(L.days>0 && day>=L.days){ setState(winState); return; }
        startDay();
      } else if(phaseTimer<=-6){
        // 保底：夜晚拖太久（怪剩很少）也天亮，怪物逃走
        for(const m of monsters){ burst(isoX(m.gx,m.gy), isoY(m.gx,m.gy)-20, '#9a6bff', 8, 150); }
        monsters = [];
        if(L.days>0 && day>=L.days){ setState(winState); return; }
        startDay();
      }
    }

    updateParts(dt); updateFloat(dt);
    updateAmbient(dt, phase==='night'?1:0);   // v6
    shake *= Math.pow(0.001, dt);
    flashT = Math.max(0, flashT-dt);
    houseHp = walls.reduce((s,w)=>s+w.built,0);
  },
  draw(){
    ctx.save();
    ctx.translate((Math.random()*2-1)*shake, (Math.random()*2-1)*shake);
    const L = LEVELS[levelIdx];
    const nightAmt = phase==='night' ? 1 : (phaseTimer<3 ? 1-(phaseTimer/3) : 0);
    drawBackground(nightAmt);
    drawGroundBoard(nightAmt);
    const drawables = [];
    for(const w of walls) drawables.push({y:w.gy, draw:()=>drawWall(w,nightAmt)});
    if(phase==='day') for(const n of woodNodes) if(!n.taken) drawables.push({y:n.gy-0.1, draw:()=>drawWoodNode(n,performance.now()/1000)});
    for(const trap of traps) drawables.push({y:trap.gy-0.05, draw:()=>drawTrap(trap)});
    for(const f of FURNITURE) drawables.push({y:f.gy, draw:()=>drawFurniture(f)});
    drawables.push({y:player.gy, draw:drawPlayerJJ});
    for(const m of monsters) drawables.push({y:m.gy, draw:()=>drawMonster(m)});
    drawables.sort((a,b)=>a.y-b.y);
    for(const d of drawables) d.draw();
    drawAmbient(nightAmt);   // v6：螢火蟲/落葉氛圍層
    drawParts();
    ctx.restore();
    if(phase==='night'){
      ctx.fillStyle='rgba(20,10,50,0.14)';
      ctx.fillRect(0,0,GAME_W,GAME_H);
    }
    ctx.drawImage(VIGN_SPR, 0, 0);   // v6：vignette 聚焦
    if(flashT>0){
      ctx.fillStyle=`rgba(255,80,80,${flashT*2.4})`;
      ctx.fillRect(0,0,GAME_W,GAME_H);
    }
    drawFloat();
    drawHud();
    if(phase==='day') drawBuildBar();
    drawJoypad();
    if(hintT>0){
      ctx.globalAlpha = Math.min(1, hintT);
      ctx.fillStyle='rgba(10,8,30,0.6)';
      traceRoundRect(GAME_W/2-260, 116, 520, 34, 10); ctx.fill();
      ctx.fillStyle='#fff'; ctx.font='bold 16px sans-serif'; ctx.textAlign='center';
      ctx.fillText('走到木頭旁撿木材 → 靠近城牆按「建造」把牆蓋滿！', GAME_W/2, 139);
      ctx.globalAlpha=1;
    }
  }
};

function killMonster(m){
  const def = MON_DEF[m.type];
  m.dead = true; score += def.score;
  burst(isoX(m.gx,m.gy), isoY(m.gx,m.gy)-20, m.type==='ghost'?'#cfd8ff':'#8b3a62', 18, 220);
  floatText(isoX(m.gx,m.gy), isoY(m.gx,m.gy)-40, '+'+def.score, '#ff8c61');
  beep(880,0.1,'square',0.15); setTimeout(()=>beep(1200,0.12,'square',0.12),60);
}

function handleAction(){
  const fridge = FURNITURE.find(f=>f.type==='fridge');
  if(fridge && Math.hypot(fridge.gx-player.gx, fridge.gy-player.gy) < 0.8){
    if(player.hp>=player.maxHp){
      floatText(player.x, player.y-64, '血量已滿', '#9a6bff');
    } else if(fridgeCooldown>0){
      floatText(player.x, player.y-64, `冰箱冷卻中 ${Math.ceil(fridgeCooldown)}s`, '#ff6cc7');
    } else {
      player.hp = Math.min(player.maxHp, player.hp+1);
      fridgeCooldown = FRIDGE_COOLDOWN;
      player.sx=1.3; player.sy=0.7;
      player.mood='happy'; player.moodT=0.5;
      floatText(player.x, player.y-64, '+1 HP 喝飲料', '#41d6ff');
      burst(player.x, player.y-30, '#41d6ff', 14, 160);
      beep(700,0.1,'sine',0.15); setTimeout(()=>beep(950,0.12,'sine',0.12),80);
    }
    return;
  }
  // 揮鎚攻擊（白天夜晚都可以）
  player.atkT = 0.28;
  let hitAny=false;
  for(const m of monsters){
    if(Math.hypot(m.gx-player.gx,m.gy-player.gy)<0.9){
      m.hp -= 1; m.hitFlash=0.12; m.squash=1.4; hitAny=true;
      // 擊退
      const kd = Math.hypot(m.gx-player.gx, m.gy-player.gy)||1;
      m.gx += (m.gx-player.gx)/kd*0.35; m.gy += (m.gy-player.gy)/kd*0.35;
      if(m.hp<=0) killMonster(m);
    }
  }
  if(hitAny){ shake=4; freeze=0.05; beep(300,0.06,'square',0.12,-100); noiseBurst(0.06,0.08); return; }

  if(phase==='day'){
    if(selectedBuild==='trap'){ buildTrap(); return; }
    if(selectedBuild==='demolish'){ demolishWall(); return; }
    let best=null, bd=Infinity;
    for(const w of walls){
      if(w.built>=w.need) continue;
      const d = Math.hypot(w.gx-player.gx, w.gy-player.gy);
      if(d<bd){ bd=d; best=w; }
    }
    if(best && bd<0.95 && wood>0){
      best.built = Math.min(best.need, Math.floor(best.built)+1);
      wood -= 1; score += 3;
      player.sx=1.3; player.sy=0.7;
      player.mood='happy'; player.moodT=0.4;
      floatText(isoX(best.gx,best.gy), isoY(best.gx,best.gy)-40, '+1', '#e8c07d');
      burst(isoX(best.gx,best.gy), isoY(best.gx,best.gy)-20, '#e8c07d', 10, 140);
      beep(500,0.08,'square',0.12,120);
      if(best.built>=best.need){ beep(700,0.15,'triangle',0.15,200); floatText(isoX(best.gx,best.gy), isoY(best.gx,best.gy)-58, '完工！', '#7ee27e'); unstickPlayer(); /* 牆在玩家腳邊完工時立刻推開，避免蓋在身上困住 */ }
    } else if(best && bd<0.95 && wood<=0){
      floatText(player.x, player.y-64, '沒有木材了！去撿木頭', '#ff6cc7');
      beep(150,0.1,'sawtooth',0.1);
    } else {
      floatText(player.x, player.y-64, '靠近城牆才能蓋', '#ff6cc7');
      beep(200,0.08,'triangle',0.08);
    }
  } else {
    beep(260,0.05,'triangle',0.07,-60);  // 揮空
  }
}

function buildTrap(){
  const cost = BUILD_TYPES.find(b=>b.id==='trap').cost;
  const gx = Math.round(player.gx), gy = Math.round(player.gy);
  const interior = gx>=1 && gx<=GRID-2 && gy>=1 && gy<=GRID-2;
  const occupied = traps.some(t=>t.gx===gx && t.gy===gy)
    || FURNITURE.some(f=>Math.hypot(f.gx-gx,f.gy-gy)<0.8);
  if(wood<cost){
    floatText(player.x, player.y-64, '木材不夠', '#ff6cc7'); beep(150,0.1,'sawtooth',0.1);
  } else if(!interior){
    floatText(player.x, player.y-64, '要放在屋內空地', '#ff6cc7'); beep(150,0.1,'sawtooth',0.1);
  } else if(occupied){
    floatText(player.x, player.y-64, '這裡放不下', '#ff6cc7'); beep(150,0.1,'sawtooth',0.1);
  } else {
    traps.push({gx,gy,dead:false,charges:2});
    wood -= cost; score += 4;
    player.sx=1.3; player.sy=0.7;
    player.mood='happy'; player.moodT=0.4;
    floatText(player.x, player.y-64, '放置陷阱（可電2次）', '#ff8a8a');
    burst(player.x, player.y-20, '#c0392b', 10, 140);
    beep(400,0.1,'sawtooth',0.12,-80);
  }
}
function demolishWall(){
  let best=null, bd=Infinity;
  for(const w of walls){
    if(w.built<=0) continue;
    const d = Math.hypot(w.gx-player.gx, w.gy-player.gy);
    if(d<bd){ bd=d; best=w; }
  }
  if(!best || bd>=0.95){
    floatText(player.x, player.y-64, '附近沒有牆可以拆', '#ff6cc7');
    return;
  }
  best.built = Math.max(0, Math.ceil(best.built)-1);
  wood += 1;
  player.sx=1.3; player.sy=0.7;
  floatText(isoX(best.gx,best.gy), isoY(best.gx,best.gy)-40, '拆除 +1木材', '#cfd4da');
  burst(isoX(best.gx,best.gy), isoY(best.gx,best.gy)-20, '#9aa0a6', 10, 130);
  beep(300,0.12,'sawtooth',0.12,-200);
}

function startNight(){
  const L = LEVELS[levelIdx];
  setAmbPhase('night');   // v6：切換蟋蟀夜氛圍
  phase='night'; phaseTimer = L.nightLen; spawnTimer = 1.2;
  nightSpawned = 0;
  const baseQuota = 3 + day*2 + (levelIdx===3? Math.floor(day*0.8):levelIdx);
  // v5：難度改成鋸齒狀——每 4 天安排一次「喘息夜」，怪物少三成，玩家能喘口氣再迎接更難的夜晚
  nightIsBreather = day>=4 && day%4===0;
  nightQuota = nightIsBreather ? Math.max(3, Math.round(baseQuota*0.7)) : baseQuota;
  dangerBeepT = 0;
  if(nightIsBreather){
    floatText(GAME_W/2, 160, '今晚怪物比較少，喘口氣！', '#7ee27e', 24);
    chord([659,880],90,0.12,'triangle',0.12);
  } else {
    floatText(GAME_W/2, 160, '夜晚降臨...怪物出沒！', '#ff6cc7', 24);
    beep(220,0.3,'sawtooth',0.15,-80);
  }
  shake = 4;
}
function startDay(){
  const L = LEVELS[levelIdx];
  setAmbPhase('day');   // v6：切回鳥鳴日氛圍
  day += 1; phase='day'; phaseTimer = L.dayLen;
  monsters = [];
  score += 20;  // 撐過一晚獎勵
  spawnWoodNodes();
  floatText(GAME_W/2, 160, `第 ${day} 天開始！+20分`, '#ffcf5c', 24);
  chord([523,659,784,1047],70,0.12,'triangle',0.13);
  if(levelIdx===3 && day>save.best){ save.best = day-1; }
}

// ===== 勝利 =====
const winState = {
  enter(){
    this.t = 0;
    // 星星結算：通關1星、血量≥2再1星、房屋≥60%再1星
    const hpRatio = houseHp/houseHpMax;
    this.stars = 1 + (player.hp>=2?1:0) + (hpRatio>=0.6?1:0);
    if(levelIdx<3 && this.stars > save.stars[levelIdx]){
      save.stars[levelIdx] = this.stars; persist();
    }
    score += this.stars*30;
    chord([523,659,784,1047,1319],90,0.16,'triangle',0.15);
    for(let i=0;i<5;i++) setTimeout(()=>burst(120+Math.random()*(GAME_W-240), 100+Math.random()*220, ['#ffcf5c','#ff6cc7','#38e1ff'][i%3], 16, 240), i*160);
    tapPoint=null; tapAction=false; input.actionBuffer=0;
  },
  update(dt){
    this.t += dt;
    updateParts(dt); updateFloat(dt);
    if(this.t>0.8 && (input.actionBuffer>0 || tapAction)){
      input.actionBuffer=0; tapAction=false;
      setState(menuState);
    }
  },
  draw(){
    playState.draw();
    ctx.fillStyle='rgba(10,6,30,0.72)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.textAlign='center';
    ctx.fillStyle='#ffcf5c'; ctx.font='bold 44px sans-serif';
    ctx.fillText('守住家園了！', GAME_W/2, 180);
    drawStars(GAME_W/2, 232, this.stars, 44, 62);
    ctx.fillStyle='#fff'; ctx.font='22px sans-serif';
    ctx.fillText(`${LEVELS[levelIdx].name} 通關！分數 ${score}`, GAME_W/2, 300);
    ctx.font='15px sans-serif'; ctx.fillStyle='#c9f2ff';
    ctx.fillText('評分：通關 ★｜剩 2 顆心以上 ★｜房屋保存 60% 以上 ★', GAME_W/2, 334);
    if(this.t>0.8){
      ctx.fillStyle='#9a6bff'; ctx.font='bold 20px sans-serif';
      ctx.globalAlpha = 0.7+Math.sin(performance.now()/300)*0.3;
      ctx.fillText('按空白鍵 / 點擊螢幕 回選關', GAME_W/2, 400);
      ctx.globalAlpha=1;
    }
  }
};

// ===== 失敗 =====
const gameOverState = {
  enter(){
    this.t = 0;
    shake = 10; freeze = 0.15;
    burst(player.x, player.y-30, '#ff6cc7', 24, 260);
    beep(180,0.4,'sawtooth',0.2,-120); noiseBurst(0.3,0.18);
    if(levelIdx===3){
      const d = day-1;
      if(d>save.best){ save.best = d; persist(); }
    }
    tapPoint=null; tapAction=false; input.actionBuffer=0;
  },
  update(dt){
    this.t += dt;
    updateParts(dt); updateFloat(dt);
    if(this.t>0.6 && (input.actionBuffer>0 || tapAction)){
      input.actionBuffer=0; tapAction=false;
      if(tapPoint && tapPoint.y>380 && tapPoint.y<440 && Math.abs(tapPoint.x-GAME_W/2)>150){ tapPoint=null; setState(menuState); return; }
      tapPoint=null;
      resetGame(); setState(playState);   // <1 秒重開同一關
    }
  },
  draw(){
    playState.draw();
    ctx.fillStyle='rgba(0,0,0,0.62)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.textAlign='center';
    ctx.fillStyle='#fff'; ctx.font='bold 40px sans-serif';
    ctx.fillText('被怪獸抓到了！', GAME_W/2, 210);
    ctx.font='22px sans-serif';
    ctx.fillText(`撐過 ${day-1} 晚　分數 ${score}`, GAME_W/2, 258);
    if(levelIdx===3){
      ctx.fillStyle='#ffcf5c';
      ctx.fillText(`無盡模式最佳：${save.best} 晚`, GAME_W/2, 292);
    }
    if(this.t>0.6){
      ctx.fillStyle='#ffcf5c'; ctx.font='bold 22px sans-serif';
      ctx.globalAlpha = 0.7+Math.sin(performance.now()/300)*0.3;
      ctx.fillText('按空白鍵 / 點螢幕中央 再挑戰！', GAME_W/2, 350);
      ctx.globalAlpha=1;
      ctx.fillStyle='#9a6bff'; ctx.font='16px sans-serif';
      ctx.fillText('（點畫面左右邊緣回選關）', GAME_W/2, 386);
    }
  }
};

// ===== 主迴圈：固定時間步進 =====
const STEP = 1/60;
let last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  acc += Math.min((now-last)/1000, 0.1);
  last = now;
  try{
    while(acc>=STEP){
      if(freeze>0){ freeze -= STEP; acc -= STEP; continue; }
      input.actionBuffer = Math.max(0, input.actionBuffer-STEP);
      state.update(STEP);
      acc -= STEP;
    }
    state.draw();
    if(sceneFade7 > 0){   // v7：0.3 秒淡入轉場
      sceneFade7 = Math.max(0, sceneFade7 - STEP*3.4);
      ctx.fillStyle = 'rgba(13,10,31,' + (sceneFade7*sceneFade7*0.9).toFixed(3) + ')';
      ctx.fillRect(0,0,GAME_W,GAME_H);
    }
  } catch(err){
    console.error('frame error', err);
    acc = 0;
  }
}
setState(menuState);
requestAnimationFrame(frame);
</script>
