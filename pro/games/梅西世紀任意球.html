     真實 3D 草地球場(逐帶漸遠霧化＋割草條紋)、立體球門(鋁管框+3D 立體球網+進球漣漪)、體素人牆與守門員撲救、
     體素獅子巡邏、體素梅西前景背影；滑動決定力道/方向/弧線，球以拋物線＋Magnus 曲線在 3D 空間飛行，攝影機推軌跟球；
     逐面受光＋接地橢圓漸層陰影＋漸層天空盒＋看台人群＋泛光燈＋暗角 vignette；additive 發光粒子與進球全場歡呼、
     玻璃質感 HUD、easeOutBack 飄字彈跳、命中 hit-stop 與小幅震動、Web Audio 去爆音音效與體育場殘響；
     漸層/精靈全快取、主迴圈零 createGradient、devicePixelRatio 不糊、電腦鍵鼠＋手機觸控雙支援。玩法/數值/計分/勝負與原作一致。 -->
<!-- v7 升級摘要（僅介面/畫質/質感，玩法/數值/文本零更動）：按鈕加投影+頂部光澤層次、HUD計分加半透明圓角底板、力道條改漸層+描邊+圓角質感、標題字加霓虹光暈與金色裝飾線、金色目標區虛線環緩慢旋轉、門框加內側高光立體感、UI/進球音色加低頻厚度與柔和泛音打磨 -->

<style>

<script>
'use strict';
/* =====================================================================
   梅西世紀任意球 PRO v8 3D版
   真 3D 任意球：球員視角、3D 草地球場、立體球門(框+3D 網)、體素人牆/守門員/獅子
   滑動決定力道/方向/弧線，球以拋物線＋Magnus 曲線在 3D 空間飛行，攝影機推軌跟球
   ===================================================================== */
const GAME_W = 960, GAME_H = 540;
const CX = GAME_W/2, CY = GAME_H/2;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize(){
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width  = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale;
}
addEventListener('resize', resize); resize();

/* ===== 直向裝置提示 ===== */
const rotateEl = document.getElementById('rotateHint');
let rotateSkipped = false;
function checkOrientation(){
  const portrait = innerHeight > innerWidth && innerWidth < 900;
  rotateEl.classList.toggle('show', portrait && !rotateSkipped);
}
document.getElementById('rotateSkip').addEventListener('click', e => {
  e.stopPropagation(); rotateSkipped = true; rotateEl.classList.remove('show');
});
addEventListener('resize', checkOrientation);
addEventListener('orientationchange', () => { rotateSkipped = false; checkOrientation(); });
checkOrientation();

/* ===== 大螢幕提醒浮層（僅手機觸發，一個 session 只跳一次；不攔截遊戲初始化）===== */
(function(){
  const isPhone = Math.min(screen.width, screen.height) < 600 || innerWidth < 768;
  if(!isPhone) return;
  let already = false;
  try{ already = !!sessionStorage.getItem('bigscreen-hint'); }catch(e){}
  if(already) return;
  const el = document.getElementById('bigscreenHint');
  el.classList.add('show');
  document.getElementById('bigscreenOk').addEventListener('click', function(e){
    e.stopPropagation();
    try{ sessionStorage.setItem('bigscreen-hint','1'); }catch(err){}
    el.classList.add('hide');
    setTimeout(()=>{ el.remove(); }, 300);
  });
})();

/* ===== 工具 ===== */
const clamp=(v,a,b)=> v<a?a:v>b?b:v;
const lerp=(a,b,t)=> a+(b-a)*t;
const ss=(t,a,b)=> clamp((t-a)/(b-a),0,1);
const rnd=(a,b)=> a+Math.random()*(b-a);
const TAU = Math.PI*2;
const easeOutBack = t => 1 + 2.7*Math.pow(t-1,3) + 1.7*Math.pow(t-1,2);
const easeOutCubic = t => 1 - Math.pow(1-t,3);
const FONT = '"Noto Sans TC","Microsoft JhengHei",sans-serif';
function toRGB(hex){ hex=hex.replace('#',''); if(hex.length===3) hex=hex.split('').map(c=>c+c).join(''); const n=parseInt(hex,16); return [(n>>16)&255,(n>>8)&255,n&255]; }
function rgbStr(a){ return 'rgb('+(a[0]|0)+','+(a[1]|0)+','+(a[2]|0)+')'; }
function mix(a,b,t){ return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t]; }
/* 依主色生成逐面受光調色盤（頂最亮／正面本色／側面暗） */
function pal3(hex){ const b=toRGB(hex); return { top:rgbStr(mix(b,[255,255,255],0.44)), front:rgbStr(b), side:rgbStr(mix(b,[6,10,14],0.46)), rim:rgbStr(mix(b,[255,255,255],0.7)), edge:'rgba(0,0,0,0.42)' }; }

/* ===== 存檔 ===== */
const LS = {
  get(k,d){ try{ const v = localStorage.getItem(k); return v===null?d:v; }catch(e){ return d; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
};
let best = Number(LS.get('messipro_best',0)) || 0;
let bestLegend = Number(LS.get('messipro_best_legend',0)) || 0;
let legendUnlocked = LS.get('messipro_legend','0') === '1';

/* ===== 音效：Web Audio 合成＋DynamicsCompressor 主匯流排 ===== */
let AC = null, master = null, noiseBuf = null;
let ambGain = null, ambOut = null;
const AMB = 0.05;
let muted = LS.get('messipro_muted','0') === '1';
function initAudio(){
  if(!AC){
    try{
      AC = new (window.AudioContext || window.webkitAudioContext)();
      const comp = AC.createDynamicsCompressor();
      comp.threshold.value = -18; comp.knee.value = 24; comp.ratio.value = 8;
      master = AC.createGain(); master.gain.value = 0.6;
      master.connect(comp); comp.connect(AC.destination);
      /* 程序化體育場殘響——generated impulse 的 ConvolverNode（大場館尾音） */
      try{
        const sr = AC.sampleRate, len = Math.floor(sr*1.7);
        const imp = AC.createBuffer(2, len, sr);
        for(let ch=0; ch<2; ch++){
          const d = imp.getChannelData(ch);
          for(let i=0;i<len;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/len, 2.8);
        }
        const conv = AC.createConvolver(); conv.buffer = imp;
        const wet = AC.createGain(); wet.gain.value = 0.24;
        master.connect(conv); conv.connect(wet); wet.connect(comp);
      }catch(e){}
      /* 人群氛圍循環層——棕噪聲帶通模擬觀眾嗡嗡＋LFO緩慢起伏；主音效時 ducking */
      try{
        const sr = AC.sampleRate, alen = Math.floor(sr*2.5);
        const abuf = AC.createBuffer(1, alen, sr);
        const ad = abuf.getChannelData(0); let v = 0;
        for(let i=0;i<alen;i++){ v = v*0.985 + (Math.random()*2-1)*0.06; ad[i] = v*2.4; }
        const src = AC.createBufferSource(); src.buffer = abuf; src.loop = true;
        const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 460; bp.Q.value = 0.5;
        ambGain = AC.createGain(); ambGain.gain.value = AMB;
        const lfo = AC.createOscillator(); lfo.frequency.value = 0.11;
        const lg = AC.createGain(); lg.gain.value = AMB*0.4;
        lfo.connect(lg); lg.connect(ambGain.gain);
        ambOut = AC.createGain(); ambOut.gain.value = muted ? 0 : 1;
        src.connect(bp); bp.connect(ambGain); ambGain.connect(ambOut); ambOut.connect(comp);
        src.start(); lfo.start();
      }catch(e){}
    }catch(e){}
  }
  if(AC && AC.state === 'suspended') AC.resume();
}
function duckAmb(){
  if(!AC || !ambGain) return;
  const t = AC.currentTime;
  ambGain.gain.cancelScheduledValues(t);
  ambGain.gain.setValueAtTime(Math.max(0.001, ambGain.gain.value), t);
  ambGain.gain.linearRampToValueAtTime(AMB*0.22, t+0.05);
  ambGain.gain.linearRampToValueAtTime(AMB, t+0.9);
}
function swellAmb(){
  if(!AC || !ambGain) return;
  const t = AC.currentTime;
  ambGain.gain.cancelScheduledValues(t);
  ambGain.gain.setValueAtTime(Math.max(0.001, ambGain.gain.value), t);
  ambGain.gain.linearRampToValueAtTime(AMB*3.4, t+0.12);
  ambGain.gain.linearRampToValueAtTime(AMB, t+1.7);
}
addEventListener('pointerdown', initAudio);
addEventListener('keydown', initAudio);
const rp = f => f * (0.94 + Math.random()*0.12);
function beep(freq, dur, type, vol, slide, delay){
  if(muted || !AC || !master) return;
  const t0 = AC.currentTime + (delay||0);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq+slide), t0+dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0+0.012);
  g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  o.connect(g).connect(master);
  o.start(t0); o.stop(t0+dur+0.06);
}
function noise(dur, vol, delay){
  if(muted || !AC || !master) return;
  if(!noiseBuf){
    const len = Math.floor(AC.sampleRate*0.5);
    noiseBuf = AC.createBuffer(1,len,AC.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for(let i=0;i<len;i++) d[i] = (Math.random()*2-1)*(1-i/len);
  }
  const t0 = AC.currentTime + (delay||0);
  const src = AC.createBufferSource(); src.buffer = noiseBuf;
  src.playbackRate.value = 0.5/dur * (0.9+Math.random()*0.2);
  const g = AC.createGain();
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  src.connect(g).connect(master); src.start(t0);
}
const sfx = {
  kick(){ beep(rp(140),0.09,'square',0.18,120); noise(0.08,0.12); },
  goal(){ [523,659,784,1046].forEach((f,i)=>{ beep(rp(f),0.16,'square',0.15,0,i*0.09); beep(rp(f/2),0.18,'triangle',0.07,0,i*0.09); }); beep(70,0.32,'sine',0.2,-24); noise(0.6,0.13,0.05); swellAmb(); },
  perfect(){ [659,784,1046,1319,1568].forEach((f,i)=>{ beep(rp(f),0.15,'square',0.13,0,i*0.08); beep(rp(f/2),0.17,'triangle',0.06,0,i*0.08); }); beep(78,0.36,'sine',0.22,-26); noise(0.7,0.14,0.05); swellAmb(); },
  save(){ beep(rp(180),0.2,'sawtooth',0.16,-100); noise(0.15,0.11,0.02); duckAmb(); },
  crossbar(){ beep(rp(900),0.18,'triangle',0.14); beep(rp(1200),0.12,'triangle',0.1,0,0.05); duckAmb(); },
  whistle(){ beep(rp(1700),0.35,'sine',0.11,-40); },
  roar(){ beep(rp(90),0.35,'sawtooth',0.18,60); noise(0.3,0.14,0.03); duckAmb(); },
  wall(){ beep(rp(240),0.14,'square',0.14,-80); noise(0.1,0.1); duckAmb(); },
  ui(){ beep(rp(660),0.06,'triangle',0.1); beep(rp(990),0.05,'sine',0.05,0,0.02); },
  crowd(){ noise(0.8,0.08); },
  end(){ [784,659,523,659,784,1046].forEach((f,i)=> beep(f,0.18,'triangle',0.12,0,i*0.12)); },
  combo(n){ const base = 740 + clamp(n,2,8)*30; [0,1,2].forEach((i)=> beep(rp(base+i*160),0.11,'square',0.13,0,i*0.055)); }
};
const muteBtn = document.getElementById('mute');
function syncMute(){
  muteBtn.textContent = muted ? '🔇' : '🔊';
  if(ambOut) ambOut.gain.value = muted ? 0 : 1;
}
muteBtn.addEventListener('click', e => { e.stopPropagation(); muted = !muted; LS.set('messipro_muted', muted?'1':'0'); syncMute(); });
syncMute();

/* ===================== 3D 投影引擎（Canvas 2D 軟體透視） ===================== */
const FOV = 560, TILT = 0.16;
const cosA = Math.cos(TILT), sinA = Math.sin(TILT);
const cam = { x:0, y:70, z:-250 };
function camReset(){ cam.x = 0; cam.z = -250; }
function project(x,y,z){
  const dx=x-cam.x, dy=y-cam.y, dz=z-cam.z;
  const ry = dy*cosA + dz*sinA;
  const rz = dz*cosA - dy*sinA;
  if(rz < 12) return null;
  const s = FOV/rz;
  return { x:CX+dx*s, y:CY-ry*s, s, rz };
}
function quad(a,b,c,d,color,stroke){
  if(!a||!b||!c||!d) return false;
  ctx.beginPath();
  ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.lineTo(d.x,d.y); ctx.closePath();
  ctx.fillStyle = color; ctx.fill();
  if(stroke){ ctx.lineWidth = 1; ctx.strokeStyle = stroke; ctx.stroke(); }
  return true;
}
/* 立體盒：baseY 為底(地面)，box 由 baseY 往上 h。每面獨立受光＋AO 暗帶＋描邊 */
function box3D(cx, baseY, cz, hw, h, hd, pal, outline){
  const y0=baseY, y1=baseY+h;
  const tFL=project(cx-hw,y1,cz-hd), tFR=project(cx+hw,y1,cz-hd),
        tBL=project(cx-hw,y1,cz+hd), tBR=project(cx+hw,y1,cz+hd),
        bFL=project(cx-hw,y0,cz-hd), bFR=project(cx+hw,y0,cz-hd);
  /* 側面（只畫看得到那側） */
  if(cam.x < cx-hw){ const bBL=project(cx-hw,y0,cz+hd); quad(tFL,tBL,bBL,bFL,pal.side, outline?pal.edge:null); }
  else if(cam.x > cx+hw){ const bBR=project(cx+hw,y0,cz+hd); quad(tFR,tBR,bBR,bFR,pal.side, outline?pal.edge:null); }
  /* 正面：頂部 rim 亮邊 + 下半 AO 暗帶，讓方塊有受光層次不再是死板色塊 */
  if(quad(tFL,tFR,bFR,bFL,pal.front, outline?pal.edge:null) && tFL&&tFR&&bFL&&bFR){
    if(pal.rim){
      const rFL={x:tFL.x+(bFL.x-tFL.x)*0.16, y:tFL.y+(bFL.y-tFL.y)*0.16};
      const rFR={x:tFR.x+(bFR.x-tFR.x)*0.16, y:tFR.y+(bFR.y-tFR.y)*0.16};
      quad(tFL,tFR,rFR,rFL, pal.rim);
    }
    const mFL={x:tFL.x+(bFL.x-tFL.x)*0.55, y:tFL.y+(bFL.y-tFL.y)*0.55};
    const mFR={x:tFR.x+(bFR.x-tFR.x)*0.55, y:tFR.y+(bFR.y-tFR.y)*0.55};
    quad(mFL,mFR,bFR,bFL,'rgba(0,0,0,0.2)');
  }
  /* 頂面（最亮受光面）+ 明確頂邊高光線 */
  quad(tFL,tFR,tBR,tBL,pal.top, outline?pal.edge:null);
  if(tFL&&tFR){ ctx.strokeStyle='rgba(255,255,255,0.28)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(tFL.x,tFL.y); ctx.lineTo(tFR.x,tFR.y); ctx.stroke(); }
}

/* ===== 場景常數（世界座標：x 左右、y 上、z 遠近；球從 z=0 飛向球門 z=GOAL_Z） ===== */
const GOAL_HALF = 150, GOAL_H = 100, GOAL_Z = 900, NET_D = 72, POST = 6;
const BALL_R = 11;
const WALL_Z = 372, LION_Z = 560, KEEP_Z = 866, KICK_Z = -30;
const BEND = 92;
const LION_MIN = -270, LION_MAX = 270;

/* ===== 快取精靈（效能：零運行 createGradient） ===== */
function makeGlow(color, r){
  const c = document.createElement('canvas'); c.width = c.height = r*2;
  const g = c.getContext('2d');

/* ===== 3D 球門：立體球網 + 鋁管框 ===== */
function netNode(x,y,ripple){
  const z = GOAL_Z + NET_D + (ripple>0 ? Math.sin((x+y)*0.06 + ripple*22)*ripple*12 : 0);
  return project(x,y,z);
}
function drawNet(ripple){
  ctx.strokeStyle = 'rgba(230,245,255,.28)'; ctx.lineWidth = 1;
  /* 後網垂直線 */
  for(let x=-GOAL_HALF; x<=GOAL_HALF+0.1; x+=18){
    const a = netNode(x,0,ripple), b = netNode(x,GOAL_H,ripple);
    if(a&&b){ ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }
  }
  /* 後網水平線 */
  for(let y=0; y<=GOAL_H+0.1; y+=16){
    const a = netNode(-GOAL_HALF,y,ripple), b = netNode(GOAL_HALF,y,ripple);
    if(a&&b){ ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }
  }
  /* 頂網（框頂→後網頂） */
  for(let x=-GOAL_HALF; x<=GOAL_HALF+0.1; x+=30){
    const a = project(x,GOAL_H,GOAL_Z), b = netNode(x,GOAL_H,ripple);
    if(a&&b){ ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }
  }
  /* 左右側網 */
  for(let y=0; y<=GOAL_H+0.1; y+=24){
    let a = project(-GOAL_HALF,y,GOAL_Z), b = netNode(-GOAL_HALF,y,ripple);
    if(a&&b){ ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }
    a = project(GOAL_HALF,y,GOAL_Z); b = netNode(GOAL_HALF,y,ripple);
    if(a&&b){ ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }
  }
}

function panelRR(x,y,w,h,r,fill,stroke){

}

function toLogical(cx, cy){
  const r = canvas.getBoundingClientRect();
  return { x:(cx-r.left)/canvas._scale, y:(cy-r.top)/canvas._scale };
}

addEventListener('keydown', e => {

                ArrowUp:'kUp', KeyW:'kUp', ArrowDown:'kDown', KeyS:'kDown',

function ballPos(t, aimX, aimY, loft, curve){
  const z = GOAL_Z * t;
  const x = aimX*t + curve*Math.sin(t*Math.PI)*BEND;
  const baseY = lerp(BALL_R, aimY, t);
  const y = baseY + Math.sin(t*Math.PI)*lerp(30, 150, loft);
  return { x, y, z };
}

function startMatch(legend){ playState.legend = !!legend; setState(playState); }

const playState = {
  name:'play', legend:false,
  enter(){
    camReset();
    this.round = 1; this.goals = 0; this.perfects = 0; this.attempts = 0; this.maxAttempts = 8;
    this.streak = 0; this.bestStreak = 0;
    this.phase = 'aim'; this.phaseT = 0;
    this.ball = { x:0, y:BALL_R, z:0, spin:0 };
    this.trail = [];
    this.flightT = 0; this.flightDur = 1;
    this.aimX = 0; this.aimY = GOAL_H*0.5; this.curve = 0; this.loft = 0;
    this.kAimX = 0; this.kPower = 0.55; this.kCurve = 0;
    this.target = this.makeTarget();
    this.keepers = [
      { name:'西羅', number:1, jersey:'#ff7e3d', x:-58, dive:0, diveT:0, targetX:-58, reacted:false },
      { name:'卡卡', number:12, jersey:'#9a6bff', x:58, dive:0, diveT:0, targetX:58, reacted:false }
    ];
    this.lions = [ { x:-90, dir:1, speed:44 }, { x:110, dir:-1, speed:58 } ];
    if(this.legend) this.lions.push({ x:0, dir:1, speed:72 });
    this.wall = this.legend ? [-42,0,42].map(off => ({ off, jumpT:0 })) : [];
    this.wallX = 0;
    this.netRipple = 0; this.lionRoarT = 0; this.bystanderCheerT = 0;
    this.result = ''; this.resultColor = '#fff'; this.kickPhase = 0;
    this.blockedByLion = false; this.lionChecked = false; this.blockedByWall = false;
    parts.length = 0; floats.length = 0;
    input.released = false; input.dragging = false; input.kShoot = false; input.confirm = false;
    shake = 0; freeze = 0; hintT = 4.5;
    hintEl.classList.remove('show');   /* 操作提示改由畫布玻璃膠囊統一呈現，避免 DOM 與畫布文字重疊 */
    sfx.whistle();
  },
  buttons(){ return []; },
  makeTarget(){
    const shrink = this.legend ? 8 : 0;
    const r = clamp((this.round <= 2 ? 46 : 44 - this.round*2.2) - shrink, 16, 46);
    const x = clamp((Math.random()*2-1)*(GOAL_HALF-40), -(GOAL_HALF-r-6), GOAL_HALF-r-6);
    const y = clamp(GOAL_H*0.5 + (Math.random()*2-1)*(GOAL_H*0.34), r+8, GOAL_H-r-6);
    return { x, y, r };
  },
  shoot(aimX, power, curve){
    this.aimX = clamp(aimX, -(GOAL_HALF-14), GOAL_HALF-14);
    this.aimY = lerp(16, GOAL_H-14, clamp(power,0,1));
    this.loft = clamp(power,0,1);
    this.curve = clamp(curve, -2.4, 2.4);
    this.phase = 'kick'; this.phaseT = 0; this.kickPhase = 0;
    this.wallX = clamp(this.aimX*0.5 + rnd(-14,14), -(GOAL_HALF-40), GOAL_HALF-40);
  },
  startAimIfReleased(){
    if(!input.released) return;
    input.released = false;
    const dx = input.cx - input.sx, dy = input.sy - input.cy;
    const dragLen = Math.hypot(dx,dy);
    if(dragLen < 18) return;
    let curveRaw = 0;
    if(input.path.length > 2){
      const {x:ax,y:ay} = input.path[0], {x:bx,y:by} = input.path[input.path.length-1];
      const len = Math.hypot(bx-ax, by-ay) || 1;
      for(const p of input.path){
        const cross = ((bx-ax)*(p.y-ay) - (by-ay)*(p.x-ax)) / len;
        if(Math.abs(cross) > Math.abs(curveRaw)) curveRaw = cross;
      }
    }
    const power = clamp(dragLen / 230, 0.25, 1);
    this.shoot(dx*1.15, power, curveRaw/40);
  },
  update(dt){
    worldT += dt;
    if(hintT > 0){ hintT -= dt; if(hintT <= 0) hintEl.classList.remove('show'); }
    if(freeze > 0){ freeze -= dt; return; }
    updateParts(dt); updateFloats(dt);
    shake *= Math.pow(0.001, dt);
    this.netRipple = Math.max(0, this.netRipple - dt);
    if(this.lionRoarT > 0) this.lionRoarT = Math.max(0, this.lionRoarT - dt);
    if(this.bystanderCheerT > 0) this.bystanderCheerT = Math.max(0, this.bystanderCheerT - dt);
    for(const l of this.lions){
      l.x += l.dir * l.speed * dt;
      if(l.x < LION_MIN){ l.x = LION_MIN; l.dir = 1; }
      if(l.x > LION_MAX){ l.x = LION_MAX; l.dir = -1; }
    }
    for(const w of this.wall){ w.jumpT = Math.max(0, w.jumpT - dt*2.2); }

    if(this.phase === 'aim'){
      this.phaseT += dt;
      if(input.kLeft) this.kAimX -= 200*dt;
      if(input.kRight) this.kAimX += 200*dt;
      if(input.kUp) this.kPower = clamp(this.kPower + 0.9*dt, 0.25, 1);
      if(input.kDown) this.kPower = clamp(this.kPower - 0.9*dt, 0.25, 1);
      if(input.kCurlL) this.kCurve = clamp(this.kCurve - 3*dt, -2.4, 2.4);
      if(input.kCurlR) this.kCurve = clamp(this.kCurve + 3*dt, -2.4, 2.4);
      this.kAimX = clamp(this.kAimX, -(GOAL_HALF-14), GOAL_HALF-14);
      if(input.kShoot){ input.kShoot = false; input.confirm = false; this.shoot(this.kAimX, this.kPower, this.kCurve); return; }
      this.startAimIfReleased();
    } else if(this.phase === 'kick'){
      this.phaseT += dt;
      this.kickPhase = clamp(this.phaseT/0.22, 0, 1);
      if(this.phaseT >= 0.22){
        sfx.kick();
        freeze = 0.05; shake = Math.max(shake, 3);
        burst(CX-55*2, GAME_H-150, '#dcdcdc', 8, 110, 300);
        this.phase = 'flight'; this.flightT = 0;
        this.flightDur = lerp(0.78, 1.15, this.loft);
        this.trail.length = 0;
        for(const k of this.keepers){ k.reacted = false; k.diveT = 0; }
        this.blockedByLion = false; this.lionChecked = false; this.blockedByWall = false;
        for(const w of this.wall) w.jumpT = 1;
      }
    } else if(this.phase === 'flight'){
      this.flightT += dt;
      const t = clamp(this.flightT/this.flightDur, 0, 1);
      const bp = ballPos(t, this.aimX, this.aimY, this.loft, this.curve);
      this.ball.x = bp.x; this.ball.y = bp.y; this.ball.z = bp.z; this.ball.spin += dt*20;
      /* 攝影機推軌跟球 */
      const foll = 1 - Math.pow(0.015, dt);
      cam.z = lerp(cam.z, Math.min(bp.z - 250, GOAL_Z-300), foll);
      cam.x = lerp(cam.x, bp.x*0.42, foll);
      /* 軌跡（screen-space glow） */
      const sp = project(bp.x, bp.y, bp.z);
      if(sp){ this.trail.push({ x:sp.x, y:sp.y, t:0.3 }); if(this.trail.length > 16) this.trail.shift(); }
      for(const tr of this.trail) tr.t -= dt;
      /* 守門員反應撲救 */
      for(const k of this.keepers){
        if(!k.reacted && t > 0.18){
          k.reacted = true;
          const noise2 = this.legend ? clamp(0.55 - this.round*0.04, 0.16, 0.55)
                                     : (this.round <= 2 ? 1.15 : clamp(0.9 - this.round*0.05, 0.3, 0.9));
          k.targetX = clamp(this.aimX + (Math.random()*2-1)*80*noise2, -(GOAL_HALF-20), GOAL_HALF-20);
          k.dive = k.targetX > k.x ? 1 : -1;
        }
        if(k.reacted){ k.diveT = clamp(k.diveT + dt*2.2, 0, 1); }
      }
      /* 人牆攔截（低平球） */
      if(this.legend && !this.blockedByWall && t > 0.34 && t < 0.46){
        const nearWall = this.wall.some(w => Math.abs(this.wallX + w.off - this.ball.x) < 22);
        if(nearWall && this.ball.y < 40 && this.loft < 0.55) this.blockedByWall = true;
      }
      /* 獅子攔截 */
      if(!this.lionChecked && t > 0.55 && t < 0.68){
        this.lionChecked = true;
        const nearLion = this.lions.some(l => Math.abs(l.x - this.ball.x) < 30 && this.ball.y < 46);
        if(nearLion) this.blockedByLion = true;
      }
      if(this.blockedByWall){ this.resolveShot(); return; }
      if(t >= 1) this.resolveShot();
    } else if(this.phase === 'result'){
      this.phaseT += dt;
      if(this.phaseT > 1.0 && (input.released || input.confirm)){
        input.released = false; input.confirm = false; input.kShoot = false;
        this.nextRound();
      }
    }
    input.confirm = false; input.kShoot = false;
  },
  resolveShot(){
    this.attempts++;
    const hitTarget = Math.hypot(this.aimX-this.target.x, this.aimY-this.target.y) < this.target.r;
    const crossbarHit = !hitTarget && this.aimY > GOAL_H - 18 && Math.random() < 0.12;
    const keeperReach = this.legend ? lerp(52, 30, this.loft) : lerp(46, 26, this.loft);
    const savingKeeper = !hitTarget ? this.keepers.find(k => Math.abs(k.x + k.dive*easeOutCubic(k.diveT)*70 - this.aimX) < keeperReach) : null;
    const lionBlocked = !hitTarget && this.blockedByLion;
    /* 進球畫面座標（3D→screen）供粒子/飄字 */
    const gp = project(this.aimX, this.aimY, GOAL_Z) || { x:CX, y:200, s:0.5 };
    if(this.blockedByWall){
      this.result = '被人牆擋下！'; this.resultColor = '#ff6cc7';
      sfx.wall(); shake = Math.max(shake, 5); freeze = Math.max(freeze, 0.06);
      const wp = project(this.ball.x, this.ball.y, this.ball.z) || gp;
      burst(wp.x, wp.y, '#e0342e', 16, 220); this.streak = 0;
    } else if(crossbarHit){
      this.result = '鏘！打到門框！'; this.resultColor = '#f4f4f4';
      sfx.crossbar(); shake = Math.max(shake, 6);
      burst(gp.x, gp.y-30, '#f4f4f4', 14, 200); this.streak = 0;
    } else if(lionBlocked){
      this.result = '被獅子擋下！'; this.resultColor = '#d99a3f';
      sfx.roar(); shake = Math.max(shake, 5);
      const wp = project(this.ball.x, this.ball.y, this.ball.z) || gp;
      burst(wp.x, wp.y, '#d99a3f', 18, 220); this.streak = 0; this.lionRoarT = 0.6;
    } else if(savingKeeper){
      this.result = '被'+savingKeeper.name+'撲出！'; this.resultColor = '#ff6cc7';
      sfx.save(); shake = Math.max(shake, 4);
      burst(gp.x, gp.y, savingKeeper.jersey, 18, 220); this.streak = 0;
    } else if(hitTarget){
      this.result = '完美進球！！'; this.resultColor = '#ffcf5c';
      this.goals++; this.perfects++;
      shake = 12; freeze = Math.max(freeze, 0.1); this.netRipple = 0.6;
      sfx.perfect(); sfx.crowd();
      burst(gp.x, gp.y, '#ffcf5c', 30, 300); burst(gp.x, gp.y, '#38e1ff', 16, 220);
      for(let i=0;i<12;i++) burst(rnd(80,880), rnd(112,168), ['#38e1ff','#ff6cc7','#ffcf5c'][i%3], 3, 90, 160);
      floatText(GAME_W/2, 300, '神仙球！', '#ffcf5c', 30);
      this.streak++; if(this.streak > this.bestStreak) this.bestStreak = this.streak;
      this.bystanderCheerT = 1.3; flashBurst(12); screenFlashT = 0.16;
    } else {
      this.result = '進球！GOAL！'; this.resultColor = '#38e1ff';
      this.goals++; shake = 8; this.netRipple = 0.6;
      sfx.goal(); sfx.crowd();
      burst(gp.x, gp.y, '#38e1ff', 22, 260);
      for(let i=0;i<8;i++) burst(rnd(80,880), rnd(112,168), '#fff', 3, 90, 160);
      floatText(GAME_W/2, 300, '+1 進球', '#38e1ff', 26);
      this.streak++; if(this.streak > this.bestStreak) this.bestStreak = this.streak;
      this.bystanderCheerT = 1.3; flashBurst(8); screenFlashT = 0.11;
    }
    if(this.streak >= 2){
      const cc = COMBO_COLORS[(this.streak-2) % COMBO_COLORS.length];
      floatText(GAME_W/2, 348, comboLabel(this.streak), cc, Math.min(26 + this.streak*2, 40));
      sfx.combo(this.streak);
      burst(GAME_W/2, 348, cc, Math.min(6 + this.streak*2, 24), 160, 260);
    }
    this.phase = 'result'; this.phaseT = 0;
  },
  nextRound(){
    if(this.attempts >= this.maxAttempts){ endMatch(); return; }
    this.round++;
    camReset();
    this.ball = { x:0, y:BALL_R, z:0, spin:0 };
    this.trail.length = 0;
    this.target = this.makeTarget();
    for(const k of this.keepers){ k.x = clamp(k.x + rnd(-20,20), -(GOAL_HALF-30), GOAL_HALF-30); k.dive=0; k.diveT=0; k.reacted=false; }
    this.phase = 'aim'; this.phaseT = 0; this.kickPhase = 0; this.kCurve = 0;
    sfx.whistle();
  },
  draw(){
    drawBackground();
    ctx.save();
    ctx.translate((Math.random()*2-1)*shake, (Math.random()*2-1)*shake);
    /* 靜態球門背景（最遠） */
    drawNet(this.netRipple); drawGoalFrame();
    /* 動態演員：依 z 由遠到近排序（畫家演算法） */
    const items = [];
    items.push({ z:GOAL_Z-2, fn:()=> drawTarget3D(this.target, worldT) });
    for(const k of this.keepers) items.push({ z:KEEP_Z, fn:()=> drawKeeper3D(k) });
    const lionExpr = this.lionRoarT > 0;
    for(const l of this.lions) items.push({ z:LION_Z, fn:()=> drawLion3D(l.x, l.dir>=0?1:-1, lionExpr) });
    for(const w of this.wall){
      const jh = Math.sin((1 - w.jumpT) * Math.PI) * (w.jumpT > 0 ? 40 : 0);
      const wx = this.wallX + w.off;
      items.push({ z:WALL_Z, fn:()=> drawWallGuy(wx, jh) });
    }
    if(this.phase === 'aim' || this.phase === 'kick' || this.phase === 'result'){
      const kp = this.phase==='result' ? 0 : this.kickPhase;
      items.push({ z:KICK_Z, fn:()=> drawKicker(kp) });
      items.push({ z:0.1, fn:()=> drawBall3D(0, BALL_R, 0, this.ball.spin, 1) });
    }
    if(this.phase === 'flight'){
      items.push({ z:this.ball.z, fn:()=>{
        ctx.save(); ctx.globalCompositeOperation='lighter';
        for(const tr of this.trail){ ctx.globalAlpha = clamp(tr.t/0.3,0,1)*0.7; ctx.drawImage(glowBallTrail, tr.x-14, tr.y-14); }
        ctx.restore(); ctx.globalAlpha = 1;
        drawBall3D(this.ball.x, this.ball.y, this.ball.z, this.ball.spin, 1);
      }});
    }
    items.sort((a,b)=> b.z - a.z);
    for(const it of items) it.fn();
    /* 拖曳瞄準：3D 預測軌跡 */
    if(this.phase === 'aim' && input.dragging){
      const dx = input.cx - input.sx, dy = input.sy - input.cy;
      const dragLen = Math.hypot(dx,dy);
      const power = clamp(dragLen/230, 0, 1);
      let curveRaw = 0;
      if(input.path.length > 2){
        const {x:ax,y:ay} = input.path[0], {x:bx,y:by} = input.path[input.path.length-1];
        const len = Math.hypot(bx-ax, by-ay) || 1;
        for(const p of input.path){ const cross = ((bx-ax)*(p.y-ay)-(by-ay)*(p.x-ax))/len; if(Math.abs(cross)>Math.abs(curveRaw)) curveRaw = cross; }
      }
      const paimX = clamp(dx*1.15, -(GOAL_HALF-14), GOAL_HALF-14);
      const paimY = lerp(16, GOAL_H-14, power);
      const pcurve = clamp(curveRaw/40, -2.4, 2.4);
      ctx.strokeStyle = 'rgba(56,225,255,.7)'; ctx.setLineDash([6,6]); ctx.lineWidth = 2;
      ctx.beginPath(); let st=false;
      for(let i=0;i<=18;i++){
        const tt = i/18; const bp = ballPos(tt, paimX, paimY, power, pcurve);
        const p = project(bp.x, bp.y, bp.z); if(!p) continue;
        if(!st){ ctx.moveTo(p.x,p.y); st=true; } else ctx.lineTo(p.x,p.y);
      }
      ctx.stroke(); ctx.setLineDash([]);
      const lp = project(paimX, paimY, GOAL_Z);
      if(lp){ ctx.fillStyle = dragLen<18 ? 'rgba(255,108,199,.6)' : 'rgba(56,225,255,.85)';
        ctx.beginPath(); ctx.arc(lp.x, lp.y, 9, 0, TAU); ctx.fill(); }
      drawPowerBar(power);
    }
    if(this.phase === 'aim' && !input.dragging){
      const lp = project(this.kAimX, lerp(16, GOAL_H-14, this.kPower), GOAL_Z);
      if(lp){
        ctx.strokeStyle = 'rgba(56,225,255,.6)'; ctx.lineWidth = 2; ctx.setLineDash([4,5]);
        ctx.beginPath(); ctx.moveTo(lp.x-16, lp.y); ctx.lineTo(lp.x+16, lp.y);
        ctx.moveTo(lp.x, lp.y-16); ctx.lineTo(lp.x, lp.y+16); ctx.stroke();
        ctx.setLineDash([]);
        ctx.beginPath(); ctx.arc(lp.x, lp.y, 9, 0, TAU); ctx.stroke();
        if(Math.abs(this.kCurve) > 0.1){ ctx.fillStyle = '#38e1ff'; ctx.font='700 13px '+FONT; ctx.textAlign='center';
          ctx.fillText(this.kCurve<0?'↰ 弧線':'弧線 ↱', lp.x, lp.y-24); }
      }
      drawPowerBar(this.kPower);
    }
    drawParts();
    ctx.restore();
    drawFloats();
    /* HUD */
    const hud = '進球 '+this.goals+' / '+this.maxAttempts + (this.perfects>0 ? '　完美×'+this.perfects : '');
    ctx.font='900 20px '+FONT;
    const hudW = ctx.measureText(hud).width;
    panelRR(8, 10, hudW+20, 32, 10, 'rgba(4,14,10,.52)', 'rgba(56,225,255,.3)');
    ctx.textAlign='left'; ctx.font='900 20px '+FONT;
    ctx.lineWidth=4; ctx.strokeStyle='rgba(0,0,0,.5)'; ctx.strokeText(hud, 18, 33);
    ctx.fillStyle='#eafff5'; ctx.fillText(hud, 18, 33);
    const rhud = (this.legend?'傳奇模式　':'')+'第 '+this.round+' 球';
    ctx.font='900 18px '+FONT;
    const rw = ctx.measureText(rhud).width;
    panelRR(GAME_W-72-rw-14, 11, rw+22, 30, 10, 'rgba(4,14,10,.52)', this.legend ? 'rgba(255,207,92,.4)' : 'rgba(56,225,255,.3)');
    ctx.textAlign='right'; ctx.strokeText(rhud, GAME_W-72, 32);
    ctx.fillStyle= this.legend ? '#ffcf5c' : '#eafff5'; ctx.fillText(rhud, GAME_W-72, 32);
    /* 開賽操作提示：單一玻璃膠囊、置中不與力量條/計分/投票鈕重疊，數秒後淡出保持乾淨構圖 */
    if(this.phase === 'aim' && hintT > 0){
      const alpha = clamp(hintT/1.1, 0, 1);
      ctx.save(); ctx.globalAlpha = alpha;
      ctx.font='700 15px '+FONT; ctx.textAlign='center'; ctx.textBaseline='middle';
      const msg = '拖曳瞄準・放開射門　←→↑↓微調・Z/X弧線・空白鍵射門';
      const tw = ctx.measureText(msg).width;
      panelRR(GAME_W/2-tw/2-18, 66, tw+36, 30, 15, 'rgba(6,16,12,.62)', 'rgba(56,225,255,.42)');
      ctx.fillStyle='rgba(234,255,245,.96)'; ctx.fillText(msg, GAME_W/2, 82);
      ctx.textBaseline='alphabetic';
      ctx.restore();
    }
    if(this.phase === 'result'){
      const isGoal = this.result.includes('進球');
      ctx.fillStyle = this.result.includes('完美') ? 'rgba(255,207,92,.18)' : (isGoal ? 'rgba(56,225,255,.15)' : 'rgba(0,0,0,.4)');
      ctx.fillRect(0,0,GAME_W,GAME_H);
      ctx.textAlign='center';
      const pop = easeOutBack(clamp(this.phaseT*2.5,0,1));
      ctx.save(); ctx.translate(GAME_W/2, 200); ctx.scale(pop,pop);
      ctx.font='900 44px '+FONT; ctx.lineWidth=8; ctx.strokeStyle='rgba(0,0,0,.55)';
      ctx.strokeText(this.result, 0, 0);
      ctx.fillStyle = this.resultColor; ctx.fillText(this.result, 0, 0);
      ctx.restore();
      if(this.phaseT > 1.0){
        ctx.fillStyle='#eafff5'; ctx.font='700 19px '+FONT;
        ctx.globalAlpha = 0.6+0.4*Math.sin(worldT*4);
        ctx.fillText('點一下畫面 / 按空白鍵 繼續', GAME_W/2, 250);
        ctx.globalAlpha = 1;
      }
    }
  }
};
/* 結算畫面點擊「繼續」 */
canvas.addEventListener('mousedown', e => {
  if(state === playState && playState.phase === 'result' && playState.phaseT > 1.0){ input.released = true; }
});
canvas.addEventListener('touchstart', e => {
  if(state === playState && playState.phase === 'result' && playState.phaseT > 1.0){ input.released = true; }
}, {passive:false});

function endMatch(){
  const p = playState;
  const cleared = p.goals >= 4;
  if(cleared && !legendUnlocked && !p.legend){ legendUnlocked = true; LS.set('messipro_legend','1'); endState.justUnlocked = true; }
  else endState.justUnlocked = false;
  if(p.legend){ if(p.goals > bestLegend){ bestLegend = p.goals; LS.set('messipro_best_legend', String(bestLegend)); } }
  else { if(p.goals > best){ best = p.goals; LS.set('messipro_best', String(best)); } }
  setState(endState);
}

const endState = {
  name:'end', t:0, justUnlocked:false,
  enter(){
    this.t = 0; hintEl.classList.remove('show'); sfx.end();
    const p = playState;
    this._btn = [
      { x:GAME_W/2-250, y:410, w:230, h:60, label:'再玩一次', gold:true, fs:22, cb:()=> startMatch(p.legend) },
      { x:GAME_W/2+20, y:410, w:230, h:60, label: p.legend ? '一般模式' : '傳奇模式', fs:22,
        disabled: !p.legend && !legendUnlocked,
        sub: (!p.legend && !legendUnlocked) ? '單場進 4 球解鎖' : '',
        cb:()=> startMatch(!p.legend) }
    ];
    for(let i=0;i<4;i++) burst(rnd(200,760), rnd(100,260), ['#38e1ff','#ffcf5c','#ff6cc7','#9a6bff'][i], 14, 260);
  },
  buttons(){ return this.t > 0.5 ? this._btn : []; },
  update(dt){
    this.t += dt; worldT += dt; updateParts(dt); updateFloats(dt);
    shake *= Math.pow(0.001, dt);
    if(this.t > 0.5 && input.confirm){ input.confirm = false; startMatch(playState.legend); }
  },
  draw(){
    playState.draw();
    ctx.fillStyle = 'rgba(0,0,0,.62)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.textAlign='center';
    const p = playState;
    const pop = easeOutBack(clamp(this.t*2.2,0,1));
    ctx.save(); ctx.translate(GAME_W/2, 150); ctx.scale(pop,pop);
    ctx.font='900 46px '+FONT; ctx.lineWidth=9; ctx.strokeStyle='#0a2e12';
    const title = p.goals >= 7 ? '世界球王！' : p.goals >= 4 ? '比賽勝利！' : '好球連連！';
    ctx.strokeText(title, 0, 0); ctx.fillStyle='#eafff5'; ctx.fillText(title, 0, 0);
    ctx.restore();
    ctx.font='900 30px '+FONT; ctx.fillStyle='#38e1ff';
    ctx.fillText('進球 '+p.goals+' / '+p.maxAttempts+'　完美進球 ×'+p.perfects, GAME_W/2, 224);
    ctx.font='700 20px '+FONT; ctx.fillStyle='#ffcf5c';
    ctx.fillText((p.legend?'傳奇模式':'一般模式')+'　最佳紀錄 '+(p.legend?bestLegend:best)+' 球', GAME_W/2, 264);
    if(p.bestStreak >= 2){ ctx.font='700 18px '+FONT; ctx.fillStyle='#38e1ff';
      ctx.fillText('本場最高連續進球 '+p.bestStreak+' 球', GAME_W/2, 292); }
    if(this.justUnlocked){ ctx.font='900 24px '+FONT; ctx.fillStyle = Math.sin(this.t*5)>0 ? '#ffcf5c' : '#ff7e3d';
      ctx.fillText('恭喜解鎖：傳奇模式！跳躍人牆等你挑戰！', GAME_W/2, 320); }
    else { ctx.font='700 18px '+FONT; ctx.fillStyle='#eafff5cc';
      ctx.fillText(p.goals >= 4 ? '你已經是任意球大師了！' : '瞄準門將撲不到的角落，進 4 球就能解鎖傳奇模式！', GAME_W/2, 320); }
    for(const b of this.buttons()) drawButton(b, false);
    if(this.t > 0.5){ ctx.font='700 14px '+FONT; ctx.fillStyle='#ffffff99';
      ctx.fillText('空白鍵＝再玩一次', GAME_W/2, 496); }
  }
};

/* ===== 主迴圈 ===== */
const STEP = 1/60;
let last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while(acc >= STEP){ state.update(STEP); updateAtmo(STEP); acc -= STEP; }
  state.draw();
  ctx.drawImage(vignetteC, 0, 0, GAME_W, GAME_H);
  if(screenFlashT > 0){
    ctx.globalAlpha = clamp(screenFlashT/0.16, 0, 1)*0.4;
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, GAME_W, GAME_H);
    ctx.globalAlpha = 1;
  }
}
setState(titleState);
requestAnimationFrame(frame);

/* ===== 測試掛鉤 ===== */
window.__test = {
  get state(){ return state.name; },
  get phase(){ return playState.phase; },
  get goals(){ return playState.goals; },
  get attempts(){ return playState.attempts; },
  get round(){ return playState.round; },
  get legend(){ return playState.legend; },
  get legendUnlocked(){ return legendUnlocked; },
  get streak(){ return playState.streak; },
  get bestStreak(){ return playState.bestStreak; },
  get keeperX(){ return playState.keepers.map(k=>k.x); },
  get ball(){ return playState.ball ? { x:playState.ball.x, y:playState.ball.y, z:playState.ball.z } : { x:0, y:0, z:0 }; },
  startMatch(legend){ startMatch(!!legend); },
  shootAt(x, power, curve){ if(state===playState && playState.phase==='aim') playState.shoot(x, power, curve||0); },
  setGoals(n){ playState.goals = n; },
  setAttempts(n){ playState.attempts = n; },
  clearKeepers(){ for(const k of playState.keepers){ k.x = -9999; k.targetX = -9999; } },
  clearLions(){ for(const l of playState.lions){ l.x = -9999; l.speed = 0; } },
  tick(s){ const n = Math.round((s||1)*60); for(let i=0;i<n;i++) state.update(STEP); }
};
</script>


<script>/* AI-CAMP-STATS-BEACON */
(function(){
  try{ if(window.top!==window.self) return; }catch(e){ return; } /* 在作品館內由作品館計數與投票 */
  var NS="ai-future-camp", K="pro-t-e84b88ae";
  var ABS="//abacus.jasoncameron.dev/"; /* 直連備援 */
  var REL="/abacus/"; /* 同源代理（Vercel 轉發）：學校閘道擋外部網域時仍然通 */
  function ping(n){
    try{
      fetch(REL+"hit/"+NS+"/"+n).then(function(r){
        if(!r||!r.ok){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); }
      }).catch(function(){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); });
    }catch(e){}
  }
  function read(n,cb){
    function via(base,next){ try{ fetch(base+"get/"+NS+"/"+n).then(function(r){ if(r.status===404&&base===ABS) return {value:0}; if(!r.ok) throw 0; return r.json(); }).then(function(j){ cb(j.value||j.count||0); }).catch(next); }catch(e){ next(); } }
    via(REL, function(){ via(ABS, function(){ cb(null); }); });
  }
  ping(K+"-v");
  var done=false;
  function once(){ if(done)return; done=true; ping(K+"-p"); ping("site-total-plays");
    window.removeEventListener("pointerdown",once); window.removeEventListener("keydown",once); }
  window.addEventListener("pointerdown",once,{once:false}); window.addEventListener("keydown",once,{once:false});
  /* 投票鈕：非常好玩/好玩——與作品館同一計數器，任何網頁打開都同步 */
  function initVotes(){
    if(!document.body) return;
    var wrap=document.createElement("div");
    wrap.style.cssText="position:fixed;right:10px;bottom:10px;z-index:99999;display:flex;gap:6px;font-family:sans-serif;opacity:.92";
    var LS="voted-"+K;
    var defs=[["-love","\u2764\uFE0F","\u975e\u5e38\u597d\u73a9","#ff6cc7"],["-like","\ud83d\udc4d","\u597d\u73a9","#38e1ff"]];
    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;
          b.querySelector("i").textContent=Math.max(0,(n||0)-(c||0));
        }); });
      });
    }
    defs.forEach(function(d){
      var b=document.createElement("button");
      b.type="button"; b.title=d[2];
      b.style.cssText="min-height:42px;padding:8px 14px;border:none;border-radius:999px;background:rgba(15,18,32,.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation";
      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";
      b.addEventListener("click",function(){
        var prev=null; try{ prev=localStorage.getItem(LS); }catch(e){}
        if(prev===d[0]){ ping(K+d[0]+"-c"); try{ localStorage.removeItem(LS); }catch(e){} }
        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);
      });
      btns[d[0]]=b; wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    refresh();
    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* 每10秒同步別人投的票 */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
</script>
