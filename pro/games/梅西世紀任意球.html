<!DOCTYPE html>
<!-- 專業AI升級 v4 -->
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="author" content="AI未來創作營隊">
<title>梅西世紀任意球</title>
<style>
  html,body{margin:0;height:100%;background:#0d2b12;overflow:hidden;touch-action:none;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;
    font-family:"Noto Sans TC","Microsoft JhengHei","PingFang TC",sans-serif}
  canvas{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);cursor:crosshair}
  #mute{position:fixed;right:10px;top:10px;width:52px;height:52px;border-radius:50%;
    background:rgba(10,20,10,.72);border:2px solid rgba(56,225,255,.8);color:#eafff5;
    font-size:22px;z-index:10;display:flex;align-items:center;justify-content:center;cursor:pointer}
  #hint{position:absolute;left:50%;bottom:12px;transform:translateX(-50%);color:#fffc;
    font-size:13px;letter-spacing:1px;pointer-events:none;text-shadow:0 1px 3px #000;
    opacity:0;transition:opacity .4s;text-align:center;width:96%}
  #hint.show{opacity:1}
</style>
</head>
<body>
<canvas id="game"></canvas>
<button id="mute" aria-label="靜音切換">🔊</button>
<div id="hint"></div>
<script>
'use strict';
/* =====================================================================
   梅西世紀任意球 PRO v4
   核心：拖曳瞄準射任意球——雙門將「西羅」「卡卡」聯防、獅子巡邏、金色目標區
   v4 進階內容：傳奇模式（進 4 球解鎖）——跳躍人牆＋三獅巡邏＋更小目標
   ===================================================================== */
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize(){
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width  = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale;
}
addEventListener('resize', resize); resize();

/* ===== 工具 ===== */
const clamp=(v,a,b)=> v<a?a:v>b?b:v;
const lerp=(a,b,t)=> a+(b-a)*t;
const ss=(t,a,b)=> clamp((t-a)/(b-a),0,1);
const rnd=(a,b)=> a+Math.random()*(b-a);
const TAU = Math.PI*2;
const easeOutBack = t => 1 + 2.7*Math.pow(t-1,3) + 1.7*Math.pow(t-1,2);
const easeOutCubic = t => 1 - Math.pow(1-t,3);
const FONT = '"Noto Sans TC","Microsoft JhengHei",sans-serif';

/* ===== 存檔 ===== */
const LS = {
  get(k,d){ try{ const v = localStorage.getItem(k); return v===null?d:v; }catch(e){ return d; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
};
let best = Number(LS.get('messipro_best',0)) || 0;
let bestLegend = Number(LS.get('messipro_best_legend',0)) || 0;
let legendUnlocked = LS.get('messipro_legend','0') === '1';

/* ===== 音效：Web Audio 合成＋DynamicsCompressor 主匯流排 ===== */
let AC = null, master = null, noiseBuf = null;
let muted = LS.get('messipro_muted','0') === '1';
function initAudio(){
  if(!AC){
    try{
      AC = new (window.AudioContext || window.webkitAudioContext)();
      const comp = AC.createDynamicsCompressor();
      comp.threshold.value = -18; comp.knee.value = 24; comp.ratio.value = 8;
      master = AC.createGain(); master.gain.value = 0.6;
      master.connect(comp); comp.connect(AC.destination);
    }catch(e){}
  }
  if(AC && AC.state === 'suspended') AC.resume();
}
addEventListener('pointerdown', initAudio);
addEventListener('keydown', initAudio);
const rp = f => f * (0.94 + Math.random()*0.12);
function beep(freq, dur, type, vol, slide, delay){
  if(muted || !AC || !master) return;
  const t0 = AC.currentTime + (delay||0);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq+slide), t0+dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0+0.012);
  g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  o.connect(g).connect(master);
  o.start(t0); o.stop(t0+dur+0.06);
}
function noise(dur, vol, delay){
  if(muted || !AC || !master) return;
  if(!noiseBuf){
    const len = Math.floor(AC.sampleRate*0.5);
    noiseBuf = AC.createBuffer(1,len,AC.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for(let i=0;i<len;i++) d[i] = (Math.random()*2-1)*(1-i/len);
  }
  const t0 = AC.currentTime + (delay||0);
  const src = AC.createBufferSource(); src.buffer = noiseBuf;
  src.playbackRate.value = 0.5/dur * (0.9+Math.random()*0.2);
  const g = AC.createGain();
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  src.connect(g).connect(master); src.start(t0);
}
const sfx = {
  kick(){ beep(rp(140),0.09,'square',0.18,120); noise(0.08,0.12); },
  goal(){ [523,659,784,1046].forEach((f,i)=> beep(rp(f),0.16,'square',0.15,0,i*0.09)); noise(0.6,0.13,0.05); },
  perfect(){ [659,784,1046,1319,1568].forEach((f,i)=> beep(rp(f),0.15,'square',0.13,0,i*0.08)); noise(0.7,0.14,0.05); },
  save(){ beep(rp(180),0.2,'sawtooth',0.16,-100); noise(0.15,0.11,0.02); },
  crossbar(){ beep(rp(900),0.18,'triangle',0.14); beep(rp(1200),0.12,'triangle',0.1,0,0.05); },
  whistle(){ beep(rp(1700),0.35,'sine',0.11,-40); },
  roar(){ beep(rp(90),0.35,'sawtooth',0.18,60); noise(0.3,0.14,0.03); },
  wall(){ beep(rp(240),0.14,'square',0.14,-80); noise(0.1,0.1); },
  ui(){ beep(rp(660),0.06,'square',0.08); },
  crowd(){ noise(0.8,0.08); },
  end(){ [784,659,523,659,784,1046].forEach((f,i)=> beep(f,0.18,'triangle',0.12,0,i*0.12)); }
};
const muteBtn = document.getElementById('mute');
function syncMute(){ muteBtn.textContent = muted ? '🔇' : '🔊'; }
muteBtn.addEventListener('click', e => { e.stopPropagation(); muted = !muted; LS.set('messipro_muted', muted?'1':'0'); syncMute(); });
syncMute();

/* ===== 輸入：拖曳（滑鼠/觸控）＋鍵盤瞄準 ===== */
const input = { dragging:false, sx:0, sy:0, cx:0, cy:0, path:[], released:false,
                confirm:false, kLeft:false, kRight:false, kUp:false, kDown:false, kCurlL:false, kCurlR:false, kShoot:false };
function toLogical(cx, cy){
  const r = canvas.getBoundingClientRect();
  return { x:(cx-r.left)/canvas._scale, y:(cy-r.top)/canvas._scale };
}
function activeButtons(){ return (state && state.buttons) ? state.buttons() : []; }
function hitButton(p){
  for(const b of activeButtons())
    if(p.x>=b.x-8 && p.x<=b.x+b.w+8 && p.y>=b.y-8 && p.y<=b.y+b.h+8 && !b.disabled) return b;
  return null;
}
function dragStart(x,y){
  const b = hitButton({x,y});
  if(b){ sfx.ui(); b.cb(); return; }
  if(state === playState && playState.phase === 'aim'){
    input.dragging = true; input.sx = x; input.sy = y; input.cx = x; input.cy = y; input.path = [{x,y}];
  }
}
function dragMove(x,y){
  if(!input.dragging) return;
  input.cx = x; input.cy = y; input.path.push({x,y});
  if(input.path.length > 40) input.path.shift();
}
function dragEnd(){
  if(input.dragging){ input.dragging = false; input.released = true; }
}
canvas.addEventListener('mousedown', e => { const p = toLogical(e.clientX,e.clientY); dragStart(p.x,p.y); });
addEventListener('mousemove', e => { const p = toLogical(e.clientX,e.clientY); dragMove(p.x,p.y); });
addEventListener('mouseup', dragEnd);
canvas.addEventListener('touchstart', e => { e.preventDefault(); const t=e.changedTouches[0]; const p=toLogical(t.clientX,t.clientY); dragStart(p.x,p.y); }, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); const t=e.touches[0]; if(t){ const p=toLogical(t.clientX,t.clientY); dragMove(p.x,p.y); } }, {passive:false});
canvas.addEventListener('touchend', e => { e.preventDefault(); dragEnd(); }, {passive:false});
canvas.addEventListener('touchcancel', e => { e.preventDefault(); dragEnd(); }, {passive:false});
addEventListener('keydown', e => {
  const map = { ArrowLeft:'kLeft', KeyA:'kLeft', ArrowRight:'kRight', KeyD:'kRight',
                ArrowUp:'kUp', KeyW:'kUp', ArrowDown:'kDown', KeyS:'kDown',
                KeyZ:'kCurlL', KeyX:'kCurlR' };
  if(map[e.code]){ e.preventDefault(); input[map[e.code]] = true; return; }
  if(e.code === 'Space' || e.code === 'Enter'){ e.preventDefault(); if(!e.repeat){ input.confirm = true; input.kShoot = true; } }
  else if(e.code === 'KeyM'){ muted = !muted; LS.set('messipro_muted', muted?'1':'0'); syncMute(); }
});
addEventListener('keyup', e => {
  const map = { ArrowLeft:'kLeft', KeyA:'kLeft', ArrowRight:'kRight', KeyD:'kRight',
                ArrowUp:'kUp', KeyW:'kUp', ArrowDown:'kDown', KeyS:'kDown',
                KeyZ:'kCurlL', KeyX:'kCurlR' };
  if(map[e.code]) input[map[e.code]] = false;
});

/* ===== 粒子（swap-pop）與飄字 ===== */
const MAX_PARTS = 300;
let parts = [];
function burst(x,y,color,n,speed,grav){
  for(let i=0;i<n && parts.length<MAX_PARTS;i++){
    const a = Math.random()*TAU, s = (speed||220)*(0.3+Math.random()*0.7);
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-60,life:rnd(0.4,0.8),max:0.8,color,s:rnd(3,6),g:grav===undefined?500:grav});
  }
}
function updateParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p = parts[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += p.g*dt; p.life -= dt;
    if(p.life<=0){ parts[i]=parts[parts.length-1]; parts.pop(); }
  }
}
function drawParts(){
  for(const p of parts){
    ctx.globalAlpha = clamp(p.life/p.max,0,1);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-p.s/2, p.y-p.s/2, p.s, p.s);
  }
  ctx.globalAlpha = 1;
}
let floats = [];
function floatText(x,y,text,color,big){ floats.push({x,y,text,color,life:0.9,max:0.9,big:big||24}); }
function updateFloats(dt){
  for(let i=floats.length-1;i>=0;i--){
    const f = floats[i]; f.y -= 42*dt; f.life -= dt;
    if(f.life<=0){ floats[i]=floats[floats.length-1]; floats.pop(); }
  }
}
function drawFloats(){
  ctx.textAlign='center';
  for(const f of floats){
    ctx.font='900 '+f.big+'px '+FONT;
    ctx.globalAlpha = clamp(f.life/f.max,0,1);
    ctx.lineWidth=5; ctx.strokeStyle='rgba(0,0,0,.5)';
    ctx.strokeText(f.text, f.x, f.y); ctx.fillStyle=f.color; ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

/* ===== 場景常數 ===== */
const GOAL = { x1:330, x2:630, y:118, h:78 };
const BALL_START = { x:480, y:462 };
const LION_Y = 300, LION_MIN = 290, LION_MAX = 670;
const WALL_Y = 236;

/* ===== 預先烘焙球場（效能） ===== */
let bakedPitch = null, glowLight = null, glowGold = null;
function makeGlow(color, r){
  const c = document.createElement('canvas'); c.width = c.height = r*2;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(r,r,1, r,r,r);
  gr.addColorStop(0,color); gr.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle = gr; g.fillRect(0,0,r*2,r*2);
  return c;
}
glowLight = makeGlow('rgba(255,250,220,.85)', 26);
glowGold = makeGlow('rgba(255,207,92,.6)', 30);
function bakePitch(){
  const k = Math.min(devicePixelRatio||1, 2);
  const c = document.createElement('canvas');
  c.width = GAME_W*k; c.height = GAME_H*k;
  const g = c.getContext('2d');
  g.scale(k,k);
  /* 夜空與球場漸層 */
  const sky = g.createLinearGradient(0,0,0,GAME_H);
  sky.addColorStop(0,'#071224'); sky.addColorStop(0.25,'#0a2e12'); sky.addColorStop(1,'#1e5c28');
  g.fillStyle = sky; g.fillRect(0,0,GAME_W,GAME_H);
  /* 觀眾席兩層 */
  g.fillStyle = '#0a1420'; g.fillRect(0,0,GAME_W,74);
  g.fillStyle = '#101c2e'; g.fillRect(0,40,GAME_W,34);
  const cols = ['#38e1ff','#ff6cc7','#4f7cff','#ffcf5c','#9a6bff'];
  for(let row=0; row<3; row++){
    for(let i=0;i<48;i++){
      g.fillStyle = cols[(i+row*2)%5];
      g.globalAlpha = 0.45 + ((i*13+row*7)%30)/100;
      const x = i*20 + (row%2)*10, y = 10 + row*20 + ((i*29)%3)*2;
      g.fillRect(x, y, 9, 9);
    }
  }
  g.globalAlpha = 1;
  /* 照明塔（光暈用預繪 sprite 疊） */
  for(const lx of [60, 900]){
    g.fillStyle = '#2a3a4a';
    g.fillRect(lx-4, 0, 8, 46);
    g.fillStyle = '#38424e';
    g.fillRect(lx-22, 0, 44, 12);
  }
  /* 廣告看板 */
  g.fillStyle = '#122a48'; g.fillRect(0, 74, GAME_W, 18);
  g.fillStyle = '#38e1ff'; g.font = '900 12px '+FONT; g.textAlign='center';
  for(let i=0;i<4;i++) g.fillText('AI未來創作營隊', 130+i*240, 87);
  /* 草皮橫紋（透視梯形內） */
  g.save();
  g.beginPath(); g.moveTo(150,540); g.lineTo(810,540); g.lineTo(640,92); g.lineTo(320,92); g.closePath(); g.clip();
  for(let i=0;i<14;i++){
    g.fillStyle = i%2===0 ? 'rgba(255,255,255,.06)' : 'rgba(0,0,0,.06)';
    const y0 = 92 + i*(448/14), y1 = 92 + (i+1)*(448/14);
    g.fillRect(-200, y0, 1400, y1-y0);
  }
  g.restore();
  /* 禁區與罰球弧 */
  g.strokeStyle = 'rgba(255,255,255,.55)'; g.lineWidth = 3;
  g.beginPath(); g.ellipse(480,462,90,26,0,Math.PI,TAU); g.stroke();
  g.beginPath();
  g.moveTo(300,200); g.lineTo(660,200); g.moveTo(330,196); g.lineTo(316,320); g.moveTo(630,196); g.lineTo(644,320);
  g.stroke();
  g.strokeStyle = 'rgba(255,255,255,.35)';
  g.beginPath(); g.moveTo(380,152); g.lineTo(580,152); g.moveTo(355,150); g.lineTo(348,200); g.moveTo(605,150); g.lineTo(612,200); g.stroke();
  bakedPitch = c;
}
bakePitch();

/* ===== 角色繪製 ===== */
function drawMessi(x,y,scale,kickPhase){
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(scale, scale);
  const legSwing = Math.sin(kickPhase*Math.PI) * 24;
  ctx.fillStyle = 'rgba(0,0,0,.28)';
  ctx.beginPath(); ctx.ellipse(0, 4, 17, 5, 0, 0, TAU); ctx.fill();
  /* 後腳（支撐腳） */
  ctx.strokeStyle = '#e8b48c'; ctx.lineWidth = 6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-5,-18); ctx.lineTo(-6+legSwing*0.15, 2); ctx.stroke();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.ellipse(-6+legSwing*0.15, 3, 5.4, 3, 0, 0, TAU); ctx.fill();
  /* 踢球腳 */
  ctx.strokeStyle = '#e8b48c';
  ctx.beginPath(); ctx.moveTo(5,-18); ctx.lineTo(5+legSwing, 2 - Math.max(0,legSwing)*0.35); ctx.stroke();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.ellipse(5+legSwing+2, 2-Math.max(0,legSwing)*0.35, 5.4, 3, legSwing*0.02, 0, TAU); ctx.fill();
  /* 短褲 */
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(-10,-22,20,8);
  /* 身體：阿根廷條紋＋光影 */
  ctx.fillStyle = '#eef4ff';
  ctx.fillRect(-11,-44,22,24);
  ctx.fillStyle = '#4aa8e0';
  for(let s=-11; s<11; s+=7) ctx.fillRect(s,-44,3.4,24);
  ctx.fillStyle = 'rgba(0,0,0,.1)';
  ctx.fillRect(-11,-26,22,6);
  /* 手臂擺動 */
  ctx.strokeStyle = '#eef4ff'; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(-11,-40); ctx.lineTo(-20,-26-Math.max(0,legSwing)*0.2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(11,-40); ctx.lineTo(20,-26+Math.max(0,legSwing)*0.2); ctx.stroke();
  ctx.fillStyle = '#e8b48c';
  ctx.beginPath(); ctx.arc(-20,-25-Math.max(0,legSwing)*0.2,3,0,TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(20,-25+Math.max(0,legSwing)*0.2,3,0,TAU); ctx.fill();
  /* 頭＋髮＋鬍子 */
  ctx.fillStyle = '#e8b48c';
  ctx.beginPath(); ctx.arc(0,-52,9.4,0,TAU); ctx.fill();
  ctx.fillStyle = '#3a2416';
  ctx.beginPath(); ctx.arc(0,-56,8.6,Math.PI*0.95,Math.PI*0.05); ctx.fill();
  ctx.fillRect(-8.6,-58,17.2,4);
  ctx.fillStyle = 'rgba(90,60,30,.85)';
  ctx.beginPath(); ctx.arc(0,-48,6.4,0.25,Math.PI-0.25); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-3,-53,1.1,0,TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(3,-53,1.1,0,TAU); ctx.fill();
  /* 背號 10 */
  ctx.fillStyle = '#2a6a9a'; ctx.font='900 11px '+FONT; ctx.textAlign='center';
  ctx.fillText('10', 0, -28);
  ctx.restore();
}
function drawKeeper(x,y,scale,diveDir,diveT,number,name,jerseyColor){
  ctx.save();
  ctx.translate(x,y);
  const tilt = diveDir * easeOutCubic(diveT) * 60;
  ctx.rotate(tilt * Math.PI/180);
  ctx.scale(scale, scale);
  ctx.fillStyle = 'rgba(0,0,0,.25)';
  ctx.beginPath(); ctx.ellipse(0,6,18,5,0,0,TAU); ctx.fill();
  /* 腿 */
  ctx.fillStyle = '#222';
  ctx.fillRect(-7,-16,5,20); ctx.fillRect(2,-16,5,20);
  ctx.fillStyle = '#111';
  ctx.fillRect(-9,2,8,4); ctx.fillRect(1,2,8,4);
  /* 身體＋光影 */
  ctx.fillStyle = jerseyColor;
  ctx.fillRect(-13,-42,26,28);
  ctx.fillStyle = 'rgba(255,255,255,.2)';
  ctx.fillRect(-13,-42,26,7);
  /* 手臂＋手套：撲救時伸展 */
  const armY = diveDir!==0 ? -42 - easeOutCubic(diveT)*20 : -36;
  ctx.strokeStyle = jerseyColor; ctx.lineWidth = 6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-13,-36); ctx.lineTo(-13 + diveDir*-24*easeOutCubic(diveT), armY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(13,-36); ctx.lineTo(13 + diveDir*-24*easeOutCubic(diveT), armY); ctx.stroke();
  ctx.fillStyle = '#f4f4f4';
  ctx.beginPath(); ctx.arc(-13 + diveDir*-24*easeOutCubic(diveT), armY, 4.2, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(13 + diveDir*-24*easeOutCubic(diveT), armY, 4.2, 0, TAU); ctx.fill();
  /* 頭 */
  ctx.fillStyle = '#e8b48c';
  ctx.beginPath(); ctx.arc(0,-50,8.4,0,TAU); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(0,-53,7.8,Math.PI,0); ctx.fill();
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath(); ctx.arc(-2.6,-50,1,0,TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(2.6,-50,1,0,TAU); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font='900 10px '+FONT; ctx.textAlign='center';
  ctx.fillText(String(number), 0, -24);
  ctx.restore();
  ctx.textAlign='center'; ctx.fillStyle='#eafff5'; ctx.font='700 13px '+FONT;
  ctx.fillText(name, x, y+30);
}
function drawLion(x,y,scale,facing,t){
  ctx.save();
  ctx.translate(x,y + Math.abs(Math.sin(t*6))* -2);
  ctx.scale(scale*facing, scale);
  ctx.fillStyle = 'rgba(0,0,0,.25)';
  ctx.beginPath(); ctx.ellipse(0, 20, 22, 6, 0, 0, TAU); ctx.fill();
  ctx.fillStyle = '#d99a3f';
  ctx.beginPath(); ctx.ellipse(-4, 4, 20, 12, 0, 0, TAU); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.15)';
  ctx.beginPath(); ctx.ellipse(-4, 0, 18, 6, 0, 0, TAU); ctx.fill();

const playState = {
  name:'play', legend:false,
  enter(){
    this.round = 1;
    this.goals = 0;
    this.perfects = 0;
    this.attempts = 0;
    this.maxAttempts = 8;
    this.phase = 'aim';
    this.phaseT = 0;
    this.ball = { x:BALL_START.x, y:BALL_START.y, z:0, spin:0 };
    this.trail = [];
    this.flightT = 0; this.flightDur = 1;
    this.aimTx = 480; this.aimTy = GOAL.y+GOAL.h/2; this.curve = 0; this.loft = 0;
    this.kAimX = 480; this.kPower = 0.55; this.kCurve = 0;
    this.target = this.makeTarget();
    this.keepers = [
      { name:'西羅', number:1, jersey:'#ff7e3d', x:420, dive:0, diveT:0, targetX:420, reacted:false },
      { name:'卡卡', number:12, jersey:'#9a6bff', x:540, dive:0, diveT:0, targetX:540, reacted:false }
    ];
    this.lions = [
      { x:390, dir:1, speed:44 },
      { x:590, dir:-1, speed:58 }
    ];
    if(this.legend) this.lions.push({ x:480, dir:1, speed:72 });
    this.wall = this.legend ? [-40,0,40].map(off => ({ off, jumpT:0 })) : [];
    this.wallX = 480;
    this.netRipple = 0;
    this.result = ''; this.resultColor = '#fff';
    this.kickPhase = 0;
    this.blockedByLion = false; this.lionChecked = false;
    this.blockedByWall = false;
    parts.length = 0; floats.length = 0;
    input.released = false; input.dragging = false; input.kShoot = false; input.confirm = false;
    shake = 0; freeze = 0; hintT = 5;
    hintEl.textContent = '💻 拖曳滑鼠或 ←→↑↓＋空白鍵　📱 手指拖曳瞄準、放開射門';
    hintEl.classList.add('show');
    sfx.whistle();
  },
  buttons(){ return []; },
  makeTarget(){
    const shrink = this.legend ? 8 : 0;
    const r = clamp((this.round <= 2 ? 48 : 46 - this.round*2.2) - shrink, 16, 48);
    const x = clamp(GOAL.x1 + 30 + Math.random()*(GOAL.x2-GOAL.x1-60), GOAL.x1+r, GOAL.x2-r);
    const y = GOAL.y + 16 + Math.random()*(GOAL.h-32);
    return { x, y, r };
  },
  shoot(aimX, power, curve){
    this.aimTx = clamp(aimX, GOAL.x1+14, GOAL.x2-14);
    this.aimTy = lerp(GOAL.y+GOAL.h-14, GOAL.y+16, clamp(power,0,1));
    this.loft = clamp(power,0,1);
    this.curve = clamp(curve, -2.4, 2.4);
    this.phase = 'kick'; this.phaseT = 0; this.kickPhase = 0;
    this.wallX = clamp(this.aimTx + rnd(-14,14), GOAL.x1+40, GOAL.x2-40);
  },
  startAimIfReleased(){
    if(!input.released) return;
    input.released = false;
    const dx = input.cx - input.sx, dy = input.sy - input.cy;
    const dragLen = Math.hypot(dx,dy);
    if(dragLen < 18) return;
    let curveRaw = 0;
    if(input.path.length > 2){
      const {x:ax,y:ay} = input.path[0], {x:bx,y:by} = input.path[input.path.length-1];
      const len = Math.hypot(bx-ax, by-ay) || 1;
      for(const p of input.path){
        const cross = ((bx-ax)*(p.y-ay) - (by-ay)*(p.x-ax)) / len;
        if(Math.abs(cross) > Math.abs(curveRaw)) curveRaw = cross;
      }
    }
    const power = clamp(dragLen / 230, 0.25, 1);
    this.shoot(480 + dx*1.6, power, curveRaw/40);
  },
  update(dt){
    worldT += dt;
    if(hintT > 0){ hintT -= dt; if(hintT <= 0) hintEl.classList.remove('show'); }
    if(freeze > 0){ freeze -= dt; return; }
    updateParts(dt); updateFloats(dt);
    shake *= Math.pow(0.001, dt);
    this.netRipple = Math.max(0, this.netRipple - dt);
    for(const l of this.lions){
      l.x += l.dir * l.speed * dt;
      if(l.x < LION_MIN){ l.x = LION_MIN; l.dir = 1; }
      if(l.x > LION_MAX){ l.x = LION_MAX; l.dir = -1; }
    }
    for(const w of this.wall) w.jumpT = Math.max(0, w.jumpT - dt*2.2);

    if(this.phase === 'aim'){
      this.phaseT += dt;
      /* 鍵盤瞄準 */
      if(input.kLeft) this.kAimX -= 220*dt;
      if(input.kRight) this.kAimX += 220*dt;
      if(input.kUp) this.kPower = clamp(this.kPower + 0.9*dt, 0.25, 1);
      if(input.kDown) this.kPower = clamp(this.kPower - 0.9*dt, 0.25, 1);
      if(input.kCurlL) this.kCurve = clamp(this.kCurve - 3*dt, -2.4, 2.4);
      if(input.kCurlR) this.kCurve = clamp(this.kCurve + 3*dt, -2.4, 2.4);
      this.kAimX = clamp(this.kAimX, GOAL.x1+14, GOAL.x2-14);
      if(input.kShoot){ input.kShoot = false; input.confirm = false; this.shoot(this.kAimX, this.kPower, this.kCurve); return; }
      this.startAimIfReleased();
    } else if(this.phase === 'kick'){
      this.phaseT += dt;
      this.kickPhase = clamp(this.phaseT/0.22, 0, 1);
      if(this.phaseT >= 0.22){
        sfx.kick();
        freeze = 0.05;                        /* 觸球瞬間 hit-stop */
        shake = Math.max(shake, 3);
        burst(BALL_START.x, BALL_START.y, '#dcdcdc', 8, 110, 300);
        this.phase = 'flight'; this.flightT = 0;
        this.flightDur = lerp(0.72, 1.1, this.loft);
        this.trail.length = 0;
        for(const k of this.keepers){ k.reacted = false; k.diveT = 0; }
        this.blockedByLion = false; this.lionChecked = false;
        this.blockedByWall = false;
        /* 傳奇模式：人牆跳躍 */
        for(const w of this.wall) w.jumpT = 1;
      }
    } else if(this.phase === 'flight'){
      this.flightT += dt;
      const t = clamp(this.flightT/this.flightDur, 0, 1);
      const bx0 = BALL_START.x, by0 = BALL_START.y;
      const straightX = lerp(bx0, this.aimTx, t);
      const bend = this.curve * Math.sin(t*Math.PI) * 40;
      this.ball.x = straightX + bend;
      this.ball.y = lerp(by0, this.aimTy, easeOutCubic(t));
      this.ball.z = Math.sin(t*Math.PI) * lerp(10, 70, this.loft);
      this.ball.spin += dt*20;
      this.trail.push({ x:this.ball.x, y:this.ball.y - this.ball.z, t:0.3 });
      if(this.trail.length > 14) this.trail.shift();
      for(const tr of this.trail) tr.t -= dt;

      for(const k of this.keepers){
        if(!k.reacted && t > 0.18){
          k.reacted = true;
          const noise2 = this.legend ? clamp(0.55 - this.round*0.04, 0.16, 0.55)
                                     : (this.round <= 2 ? 1.15 : clamp(0.9 - this.round*0.05, 0.3, 0.9));
          k.targetX = clamp(this.aimTx + (Math.random()*2-1)*80*noise2, GOAL.x1+20, GOAL.x2-20);
          k.dive = k.targetX > k.x ? 1 : -1;
        }
        if(k.reacted){
          k.diveT = clamp(k.diveT + dt*2.2, 0, 1);
          k.x = lerp(k.x, k.targetX, 1 - Math.pow(0.02, dt));
        }
      }
      /* 傳奇模式：人牆攔截（低平球） */
      if(this.legend && !this.blockedByWall && t > 0.32 && t < 0.42){
        const nearWall = this.wall.some(w => Math.abs(this.wallX + w.off - this.ball.x) < 20);
        if(nearWall && this.ball.z < 34 && this.loft < 0.55){
          this.blockedByWall = true;
        }
      }
      /* 獅子攔截 */
      if(!this.lionChecked && t > 0.3 && t < 0.55){
        this.lionChecked = true;
        const nearLion = this.lions.some(l => Math.abs(l.x - this.ball.x) < 26 && this.ball.z < 40);
        if(nearLion) this.blockedByLion = true;
      }
      if(this.blockedByWall){
        this.resolveShot(); return;
      }
      if(t >= 1) this.resolveShot();
    } else if(this.phase === 'result'){
      this.phaseT += dt;
      if(this.phaseT > 1.0 && (input.released || input.confirm)){
        input.released = false; input.confirm = false; input.kShoot = false;
        this.nextRound();
      }
    }
    input.confirm = false; input.kShoot = false;
  },
  resolveShot(){
    this.attempts++;
    const crossbarHit = this.aimTy < GOAL.y + 10 && Math.random() < 0.12;
    const hitTarget = Math.hypot(this.aimTx-this.target.x, this.aimTy-this.target.y) < this.target.r;
    const keeperReach = this.legend ? lerp(52, 30, this.loft) : lerp(46, 26, this.loft);
    const savingKeeper = !hitTarget ? this.keepers.find(k => Math.abs(k.x - this.aimTx) < keeperReach) : null;
    const lionBlocked = !hitTarget && this.blockedByLion;
    if(this.blockedByWall){
      this.result = '被人牆擋下！'; this.resultColor = '#ff6cc7';
      sfx.wall();
      shake = Math.max(shake, 5); freeze = Math.max(freeze, 0.06);
      burst(this.ball.x, this.ball.y - this.ball.z, '#e0342e', 16, 220);
    } else if(crossbarHit){
      this.result = '鏘！打到門框！'; this.resultColor = '#f4f4f4';
      sfx.crossbar();
      shake = Math.max(shake, 6);
      burst(this.aimTx, GOAL.y, '#f4f4f4', 14, 200);
    } else if(lionBlocked){
      this.result = '被獅子擋下！'; this.resultColor = '#d99a3f';
      sfx.roar();
      shake = Math.max(shake, 5);
      burst(this.ball.x, this.ball.y - this.ball.z, '#d99a3f', 18, 220);
    } else if(savingKeeper){
      this.result = '被'+savingKeeper.name+'撲出！'; this.resultColor = '#ff6cc7';
      sfx.save();
      shake = Math.max(shake, 4);
      burst(savingKeeper.x, GOAL.y+40, savingKeeper.jersey, 18, 220);
    } else if(hitTarget){
      this.result = '完美進球！！'; this.resultColor = '#ffcf5c';
      this.goals++; this.perfects++;
      shake = 12; freeze = Math.max(freeze, 0.1);
      this.netRipple = 0.6;
      sfx.perfect(); sfx.crowd();
      burst(this.aimTx, this.aimTy, '#ffcf5c', 30, 300);
      burst(this.aimTx, this.aimTy, '#38e1ff', 16, 220);
      for(let i=0;i<10;i++) burst(rnd(80,880), rnd(20,64), ['#38e1ff','#ff6cc7','#ffcf5c'][i%3], 2, 60, 120);
      floatText(GAME_W/2, 300, '神仙球！', '#ffcf5c', 30);
    } else {
      this.result = '進球！GOAL！'; this.resultColor = '#38e1ff';
      this.goals++;
      shake = 8;
      this.netRipple = 0.6;
      sfx.goal(); sfx.crowd();
      burst(this.aimTx, this.aimTy, '#38e1ff', 22, 260);
      for(let i=0;i<6;i++) burst(rnd(80,880), rnd(20,64), '#fff', 2, 60, 120);
      floatText(GAME_W/2, 300, '+1 進球', '#38e1ff', 26);
    }
    this.phase = 'result'; this.phaseT = 0;
  },
  nextRound(){
    if(this.attempts >= this.maxAttempts){ endMatch(); return; }
    this.round++;
    this.ball = { x:BALL_START.x, y:BALL_START.y, z:0, spin:0 };
    this.trail.length = 0;
    this.target = this.makeTarget();
    for(const k of this.keepers){ k.x = clamp(k.x + rnd(-20,20), GOAL.x1+30, GOAL.x2-30); k.dive=0; k.diveT=0; k.reacted=false; }
    this.phase = 'aim'; this.phaseT = 0; this.kickPhase = 0;
    this.kCurve = 0;
    sfx.whistle();
  },
  draw(){
    ctx.drawImage(bakedPitch, 0, 0, GAME_W, GAME_H);
    drawFloodlights();
    ctx.save();
    ctx.translate((Math.random()*2-1)*shake, (Math.random()*2-1)*shake);
    drawGoalAndNet(this.netRipple);
    drawTarget(this.target.x, this.target.y, this.target.r, this.phaseT + worldT);
    for(const k of this.keepers) drawKeeper(k.x, GOAL.y+42, 1.05, k.dive, k.diveT, k.number, k.name, k.jersey);
    /* 傳奇模式人牆 */
    for(const w of this.wall){
      const jh = Math.sin((1 - w.jumpT) * Math.PI) * (w.jumpT > 0 ? 34 : 0);
      drawWallDefender(this.wallX + w.off, WALL_Y, 0.9, jh, worldT);
    }
    for(const l of this.lions) drawLion(l.x, LION_Y, 1, l.dir >= 0 ? 1 : -1, worldT);
    drawMinecraftBystander(120, 470, 1.15, worldT*1.3);
    drawMinecraftBystander(850, 470, 1.15, worldT*1.3 + 1.6);
    /* 拖曳瞄準預覽 */
    if(this.phase === 'aim' && input.dragging){
      const dx = input.cx - input.sx, dy = input.sy - input.cy;
      const dragLen = Math.hypot(dx,dy);
      const power = clamp(dragLen/230, 0, 1);
      const previewX = clamp(480 + dx*1.6, GOAL.x1+18, GOAL.x2-18);
      const previewY = lerp(GOAL.y+GOAL.h-14, GOAL.y+16, power);
      ctx.strokeStyle = 'rgba(56,225,255,.7)'; ctx.setLineDash([6,6]); ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(BALL_START.x, BALL_START.y);
      ctx.quadraticCurveTo((BALL_START.x+previewX)/2, (BALL_START.y+previewY)/2, previewX, previewY); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = dragLen<18 ? 'rgba(255,108,199,.6)' : 'rgba(56,225,255,.85)';
      ctx.beginPath(); ctx.arc(previewX, previewY, 10, 0, TAU); ctx.fill();
      /* 力道條 */
      ctx.fillStyle = 'rgba(0,0,0,.45)';
      ctx.fillRect(GAME_W/2-90, GAME_H-46, 180, 14);
      ctx.fillStyle = power > 0.75 ? '#ff6cc7' : '#38e1ff';
      ctx.fillRect(GAME_W/2-88, GAME_H-44, 176*power, 10);
    }
    /* 鍵盤瞄準標記 */
    if(this.phase === 'aim' && !input.dragging){
      const py = lerp(GOAL.y+GOAL.h-14, GOAL.y+16, this.kPower);
      ctx.strokeStyle = 'rgba(56,225,255,.55)'; ctx.lineWidth = 2; ctx.setLineDash([4,5]);
      ctx.beginPath(); ctx.moveTo(this.kAimX-16, py); ctx.lineTo(this.kAimX+16, py);
      ctx.moveTo(this.kAimX, py-16); ctx.lineTo(this.kAimX, py+16); ctx.stroke();
      ctx.setLineDash([]);
      ctx.beginPath(); ctx.arc(this.kAimX, py, 9, 0, TAU); ctx.stroke();
      if(Math.abs(this.kCurve) > 0.1){
        ctx.fillStyle = '#38e1ff'; ctx.font='700 13px '+FONT; ctx.textAlign='center';
        ctx.fillText(this.kCurve<0?'↰ 弧線':'弧線 ↱', this.kAimX, py-24);
      }
    }
    /* 球員與球（含軌跡） */
    if(this.phase === 'aim' || this.phase === 'kick'){
      drawMessi(BALL_START.x-14, BALL_START.y, 1.1, this.kickPhase);
      drawBall(BALL_START.x, BALL_START.y-4, 1, this.ball.spin);
    } else {
      for(const tr of this.trail){
        ctx.globalAlpha = clamp(tr.t/0.3,0,1)*0.4;
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(tr.x, tr.y, 5, 0, TAU); ctx.fill();
      }
      ctx.globalAlpha = 1;
      /* 地面影子 */
      ctx.fillStyle = 'rgba(0,0,0,.25)';
      ctx.beginPath(); ctx.ellipse(this.ball.x, this.ball.y, 8, 3, 0, 0, TAU); ctx.fill();
      const scale = lerp(1, 0.55, clamp(this.flightT/this.flightDur,0,1));
      drawBall(this.ball.x, this.ball.y - this.ball.z, scale, this.ball.spin);
    }
    drawParts();
    ctx.restore();
    drawFloats();
    /* HUD */
    ctx.textAlign='left';
    ctx.font='900 20px '+FONT;
    ctx.lineWidth=4; ctx.strokeStyle='rgba(0,0,0,.5)';
    const hud = '進球 '+this.goals+' / '+this.maxAttempts + (this.perfects>0 ? '　完美×'+this.perfects : '');
    ctx.strokeText(hud, 16, 32);
    ctx.fillStyle='#eafff5'; ctx.fillText(hud, 16, 32);
    ctx.textAlign='right'; ctx.font='900 18px '+FONT;
    ctx.strokeText((this.legend?'傳奇模式　':'')+'第 '+this.round+' 球', GAME_W-72, 32);
    ctx.fillStyle= this.legend ? '#ffcf5c' : '#eafff5';
    ctx.fillText((this.legend?'傳奇模式　':'')+'第 '+this.round+' 球', GAME_W-72, 32);
    if(this.phase === 'aim' && !input.dragging){
      ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,.85)'; ctx.font='700 16px '+FONT;
      ctx.fillText('拖曳瞄準、放開射門（拖愈長球愈高）', GAME_W/2, GAME_H-20);
    }
    if(this.phase === 'result'){
      const isGoal = this.result.includes('進球');
      ctx.fillStyle = this.result.includes('完美') ? 'rgba(255,207,92,.18)' : (isGoal ? 'rgba(56,225,255,.15)' : 'rgba(0,0,0,.4)');
      ctx.fillRect(0,0,GAME_W,GAME_H);
      ctx.textAlign='center';
      const pop = easeOutBack(clamp(this.phaseT*2.5,0,1));
      ctx.save();
      ctx.translate(GAME_W/2, 200); ctx.scale(pop,pop);
      ctx.font='900 44px '+FONT;
      ctx.lineWidth=8; ctx.strokeStyle='rgba(0,0,0,.55)';
      ctx.strokeText(this.result, 0, 0);
      ctx.fillStyle = this.resultColor;
      ctx.fillText(this.result, 0, 0);
      ctx.restore();
      if(this.phaseT > 1.0){
        ctx.fillStyle='#eafff5'; ctx.font='700 19px '+FONT;
        ctx.globalAlpha = 0.6+0.4*Math.sin(worldT*4);
        ctx.fillText('點一下畫面 / 按空白鍵 繼續', GAME_W/2, 250);
        ctx.globalAlpha = 1;
      }
    }
  }
};
/* 結算畫面點擊「繼續」：aim 前的空點擊也當繼續（result 階段） */
canvas.addEventListener('mousedown', e => {
  if(state === playState && playState.phase === 'result' && playState.phaseT > 1.0){
    input.released = true;
  }
});
canvas.addEventListener('touchstart', e => {
  if(state === playState && playState.phase === 'result' && playState.phaseT > 1.0){
    input.released = true;
  }
}, {passive:false});

function endMatch(){
  const p = playState;
  const cleared = p.goals >= 4;
  if(cleared && !legendUnlocked && !p.legend){
    legendUnlocked = true;
    LS.set('messipro_legend','1');
    endState.justUnlocked = true;
  } else endState.justUnlocked = false;
  if(p.legend){ if(p.goals > bestLegend){ bestLegend = p.goals; LS.set('messipro_best_legend', String(bestLegend)); } }
  else { if(p.goals > best){ best = p.goals; LS.set('messipro_best', String(best)); } }
  setState(endState);
}

const endState = {
  name:'end', t:0, justUnlocked:false,
  enter(){
    this.t = 0;
    hintEl.classList.remove('show');
    sfx.end();
    const p = playState;
    const bts = [
      { x:GAME_W/2-250, y:400, w:230, h:60, label:'再玩一次', gold:true, fs:22, cb:()=> startMatch(p.legend) },
      { x:GAME_W/2+20, y:400, w:230, h:60, label: p.legend ? '一般模式' : '傳奇模式', fs:22,
        disabled: !p.legend && !legendUnlocked,
        sub: (!p.legend && !legendUnlocked) ? '單場進 4 球解鎖' : '',
        cb:()=> startMatch(!p.legend) }
    ];
    this._btn = bts;
    for(let i=0;i<4;i++) burst(rnd(200,760), rnd(100,260), ['#38e1ff','#ffcf5c','#ff6cc7','#9a6bff'][i], 14, 260);
  },
  buttons(){ return this.t > 0.5 ? this._btn : []; },
  update(dt){
    this.t += dt; worldT += dt;
    updateParts(dt); updateFloats(dt);
    shake *= Math.pow(0.001, dt);
    if(this.t > 0.5 && input.confirm){ input.confirm = false; startMatch(playState.legend); }
  },
  draw(){
    playState.draw();
    ctx.fillStyle = 'rgba(0,0,0,.62)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.textAlign='center';
    const p = playState;
    const pop = easeOutBack(clamp(this.t*2.2,0,1));
    ctx.save();
    ctx.translate(GAME_W/2, 150); ctx.scale(pop,pop);
    ctx.font='900 46px '+FONT;
    ctx.lineWidth=9; ctx.strokeStyle='#0a2e12';
    const title = p.goals >= 7 ? '世界球王！' : p.goals >= 4 ? '比賽勝利！' : '好球連連！';
    ctx.strokeText(title, 0, 0);
    ctx.fillStyle='#eafff5'; ctx.fillText(title, 0, 0);
    ctx.restore();
    ctx.font='900 30px '+FONT; ctx.fillStyle='#38e1ff';
    ctx.fillText('進球 '+p.goals+' / '+p.maxAttempts+'　完美進球 ×'+p.perfects, GAME_W/2, 224);
    ctx.font='700 20px '+FONT; ctx.fillStyle='#ffcf5c';
    ctx.fillText((p.legend?'傳奇模式':'一般模式')+'　最佳紀錄 '+(p.legend?bestLegend:best)+' 球', GAME_W/2, 264);
    if(this.justUnlocked){
      ctx.font='900 24px '+FONT;
      ctx.fillStyle = Math.sin(this.t*5)>0 ? '#ffcf5c' : '#ff7e3d';
      ctx.fillText('恭喜解鎖：傳奇模式！跳躍人牆等你挑戰！', GAME_W/2, 316);
    } else {
      ctx.font='700 18px '+FONT; ctx.fillStyle='#eafff5cc';
      ctx.fillText(p.goals >= 4 ? '你已經是任意球大師了！' : '瞄準門將撲不到的角落，進 4 球就能解鎖傳奇模式！', GAME_W/2, 316);
    }
    for(const b of this.buttons()) drawButton(b, false);
    if(this.t > 0.5){
      ctx.font='700 14px '+FONT; ctx.fillStyle='#ffffff99';
      ctx.fillText('空白鍵＝再玩一次', GAME_W/2, 492);
    }
  }
};

/* ===== 主迴圈 ===== */
const STEP = 1/60;
let last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while(acc >= STEP){
    state.update(STEP);
    acc -= STEP;
  }
  state.draw();
}
setState(titleState);
requestAnimationFrame(frame);

/* ===== 測試掛鉤 ===== */
window.__test = {
  get state(){ return state.name; },
  get phase(){ return playState.phase; },
  get goals(){ return playState.goals; },
  get attempts(){ return playState.attempts; },
  get round(){ return playState.round; },
  get legend(){ return playState.legend; },
  get legendUnlocked(){ return legendUnlocked; },
  get kickPhase(){ return playState.kickPhase; },
  get ball(){ return playState.ball ? { x:playState.ball.x, y:playState.ball.y } : { x:0, y:0 }; },
  get targetX(){ return playState.target ? playState.target.x : 0; },
  get targetY(){ return playState.target ? playState.target.y : 0; },
  get buttons(){ return activeButtons().map(b=>({label:b.label, x:b.x+b.w/2, y:b.y+b.h/2, w:b.w, h:b.h, disabled:!!b.disabled})); },
  startMatch(legend){ startMatch(!!legend); },
  shootAt(x, power, curve){ if(state===playState && playState.phase==='aim') playState.shoot(x, power, curve||0); },
  setGoals(n){ playState.goals = n; },
  setAttempts(n){ playState.attempts = n; },
  clearKeepers(){ for(const k of playState.keepers){ k.x = -999; k.targetX = -999; } },
  clearLions(){ for(const l of playState.lions){ l.x = -999; l.speed = 0; } },
  tick(s){ const n = Math.round((s||1)*60); for(let i=0;i<n;i++) state.update(STEP); }
};
</script>
