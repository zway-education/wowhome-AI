<!DOCTYPE html>
<!-- 專業AI升級 v6 -->
<!-- 升級摘要：畫面後製（vignette＋烘焙日月光暈）、主題環境層（花瓣/螢火蟲/鳥群/雨面漣漪＋偶發閃電）、夜雨車頭光錐＋列車揚塵；音效新增程序化殘響、風雨氛圍層、火車隆隆＋軌節喀噠聲（事件自動 ducking）、鳥鳴/蟋蟀環境音 -->
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="author" content="AI未來創作營隊">
<title>平交道安全大冒險</title>
<style>
  html,body{margin:0;height:100%;background:#0d1826;overflow:hidden;touch-action:none;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;
    font-family:"Noto Sans TC","Microsoft JhengHei","PingFang TC",sans-serif}
  canvas{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
  #mute{position:fixed;right:10px;top:10px;width:52px;height:52px;border-radius:50%;
    background:rgba(10,22,38,.72);border:2px solid rgba(126,200,248,.8);color:#eaf6ff;
    font-size:22px;z-index:10;display:flex;align-items:center;justify-content:center;cursor:pointer}
  #hint{position:absolute;left:50%;bottom:12px;transform:translateX(-50%);color:#fffc;
    font-size:13px;letter-spacing:1px;pointer-events:none;text-shadow:0 1px 3px #000;
    opacity:0;transition:opacity .4s;text-align:center;width:96%}
  #hint.show{opacity:1}
  /* 直向手機請橫放提示：偵測到窄直向視窗時全螢幕覆蓋，暫停遊戲避免看不到操作 */
  #rotate{position:fixed;inset:0;z-index:20;background:rgba(6,12,22,.94);color:#eaf6ff;
    display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    font-family:"Noto Sans TC","Microsoft JhengHei","PingFang TC",sans-serif;gap:14px;padding:0 24px}
  #rotate.show{display:flex}
  #rotate .icon{width:64px;height:64px;border:4px solid #7ec8f8;border-radius:10px;position:relative;
    animation:rotphone 1.6s ease-in-out infinite}
  #rotate .icon::after{content:'';position:absolute;left:50%;bottom:6px;width:8px;height:8px;
    margin-left:-4px;border-radius:50%;background:#7ec8f8}
  @keyframes rotphone{0%,18%{transform:rotate(0deg)}45%,100%{transform:rotate(90deg)}}
  #rotate b{font-size:20px}
  #rotate span{font-size:14px;color:#ffe9b0}
  /* 大螢幕提醒浮層：只對手機顯示，一個 session 只跳一次（統一規格，17 款一致） */
  #bigscreen{position:fixed;inset:0;z-index:9999;background:rgba(7,11,20,.9);
    display:none;align-items:center;justify-content:center;padding:24px;
    font-family:"Noto Sans TC","Microsoft JhengHei","PingFang TC",sans-serif;
    opacity:1;transition:opacity .35s ease}
  #bigscreen.show{display:flex}
  #bigscreen.fade{opacity:0}
  #bigscreen .card{width:min(420px,100%);background:rgba(16,24,40,.92);border:1px solid rgba(126,200,248,.35);
    border-radius:16px;padding:30px 26px 26px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  #bigscreen .ico{width:60px;height:60px;margin:0 auto 14px}
  #bigscreen h2{margin:0 0 10px;font-size:21px;font-weight:900;
    background:linear-gradient(92deg,#38e1ff,#4f7cff,#9a6bff);-webkit-background-clip:text;
    background-clip:text;color:transparent}
  #bigscreen p{margin:0 0 22px;font-size:14px;line-height:1.6;color:#cfe0f5}
  #bigscreen button{display:block;width:100%;min-height:52px;border:0;border-radius:12px;
    font-size:16px;font-weight:700;color:#0a1220;cursor:pointer;
    background:linear-gradient(92deg,#38e1ff,#4f7cff,#9a6bff)}
</style>
</head>
<body>
<canvas id="game"></canvas>
<button id="mute" aria-label="靜音切換">🔊</button>
<div id="hint"></div>
<div id="rotate"><div class="icon"></div><b>請將裝置橫放遊玩</b><span>平交道大冒險需要橫向畫面才看得清楚喔！</span></div>
<div id="bigscreen" role="dialog" aria-label="建議使用大螢幕遊玩">
  <div class="card">
    <svg class="ico" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="6" y="10" width="52" height="34" rx="4" stroke="#7ec8f8" stroke-width="3"/>
      <path d="M26 50h12" stroke="#7ec8f8" stroke-width="3" stroke-linecap="round"/>
      <path d="M32 44v6" stroke="#7ec8f8" stroke-width="3" stroke-linecap="round"/>
      <path d="M16 27l8 8 16-16" stroke="#4f7cff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h2>建議使用大螢幕遊玩</h2>
    <p>用平板或電腦打開，體驗更完整</p>
    <button id="bigscreenOk">知道了，繼續玩</button>
  </div>
</div>
<script>
'use strict';
/* =====================================================================
   平交道安全大冒險 PRO v4
   核心：按住＝前進，警鈴一響立刻放開；柵欄放下絕不闖越；
        等火車（小心第二班！）通過、左看右看確認安全再通過
   v4 進階內容：5 大關卡＋選關畫面＋每關星星評分（localStorage）
   ===================================================================== */
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize(){
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width  = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale;
  checkOrientation();
}
addEventListener('resize', resize);
addEventListener('orientationchange', resize);

/* ===== 直向手機請橫放：窄直向視窗時全螢幕暫停提示（修：v4 完全沒有此保護，
   手機直放時畫面被壓成中央一條窄帶，虛擬按鈕遠小於 48px 觸控標準） ===== */
const rotateEl = document.getElementById('rotate');
let rotateBlocking = false;
function checkOrientation(){
  const portraitPhone = innerHeight > innerWidth && innerWidth < 820;
  rotateBlocking = portraitPhone;
  rotateEl.classList.toggle('show', portraitPhone);
}
checkOrientation(); resize();

/* ===== 大螢幕提醒浮層：只認手機（不含平板／電腦），一個 session 只跳一次 =====
   不會攔截遊戲初始化——遊戲照常在下方載入，浮層只是蓋在最上層的提示。 */
(function bigscreenHint(){
  const isPhone = Math.min(screen.width, screen.height) < 600 || innerWidth < 768;
  if(!isPhone) return;
  try{ if(sessionStorage.getItem('bigscreen-hint')) return; }catch(e){ return; }
  const el = document.getElementById('bigscreen');
  el.classList.add('show');
  document.getElementById('bigscreenOk').addEventListener('click', () => {
    try{ sessionStorage.setItem('bigscreen-hint', '1'); }catch(e){}
    el.classList.add('fade');
    setTimeout(() => el.remove(), 380);
  }, { once:true });
})();

/* ===== 工具 ===== */
const clamp=(v,a,b)=> v<a?a:v>b?b:v;
const lerp=(a,b,t)=> a+(b-a)*t;
const ss=(t,a,b)=> clamp((t-a)/(b-a),0,1);
const rnd=(a,b)=> a+Math.random()*(b-a);
const TAU = Math.PI*2;
const easeOutBack = t => 1 + 2.7*Math.pow(t-1,3) + 1.7*Math.pow(t-1,2);
const easeOutCubic = t => 1 - Math.pow(1-t,3);
const easeOutBounce = t => { const n=7.5625, d=2.75;
  if(t<1/d) return n*t*t;
  if(t<2/d) return n*(t-=1.5/d)*t+0.75;
  if(t<2.5/d) return n*(t-=2.25/d)*t+0.9375;
  return n*(t-=2.625/d)*t+0.984375; };
const FONT = '"Noto Sans TC","Microsoft JhengHei",sans-serif';

/* ===== 進度存檔 ===== */
const LS = {
  get(k, d){ try{ const v = localStorage.getItem(k); return v===null ? d : v; }catch(e){ return d; } },
  set(k, v){ try{ localStorage.setItem(k, v); }catch(e){} }
};
let stars = [0,0,0,0,0];
try{ const s = JSON.parse(LS.get('railpro_stars','[0,0,0,0,0]')); if(Array.isArray(s)) stars = s.map(n=>clamp(n|0,0,3)).slice(0,5); while(stars.length<5) stars.push(0); }catch(e){}
let best = Number(LS.get('railpro_best', 0)) || 0;
function saveStars(){ LS.set('railpro_stars', JSON.stringify(stars)); }

/* ===== 音效：Web Audio 合成＋DynamicsCompressor 主匯流排 ===== */
let AC = null, master = null, noiseBuf = null;
let muted = LS.get('railpro_muted','0') === '1';
function initAudio(){
  if(!AC){
    try{
      AC = new (window.AudioContext || window.webkitAudioContext)();
      const comp = AC.createDynamicsCompressor();
      comp.threshold.value = -18; comp.knee.value = 24; comp.ratio.value = 8;
      master = AC.createGain(); master.gain.value = 0.6;
      master.connect(comp); comp.connect(AC.destination);
      /* v6 程序化殘響：generated impulse 的 ConvolverNode（小空間），與乾聲並聯 */
      const rev = AC.createConvolver();
      const rlen = Math.floor(AC.sampleRate*1.1);
      const rbuf = AC.createBuffer(2, rlen, AC.sampleRate);
      for(let ch=0; ch<2; ch++){
        const d = rbuf.getChannelData(ch);
        for(let i=0;i<rlen;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/rlen, 2.6);
      }
      rev.buffer = rbuf;
      const revGain = AC.createGain(); revGain.gain.value = 0.14;
      master.connect(rev); rev.connect(revGain); revGain.connect(comp);
      initAmbient();
    }catch(e){}
  }
  if(AC && AC.state === 'suspended') AC.resume();
}
/* ===== v6 氛圍層：風/雨環境音（loop 噪聲＋濾波）＋火車隆隆，主事件時 ducking ===== */
let ambNodes = null, ambDuck = 1, chirpT = 3, clackT = 0, lightT = 9, lightFlash = 0;
function initAmbient(){
  if(!AC || ambNodes) return;
  try{
    const len = AC.sampleRate*2;
    const buf = AC.createBuffer(1, len, AC.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i] = Math.random()*2-1;
    const mk = (type, freq, q) => {
      const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
      const f = AC.createBiquadFilter(); f.type = type; f.frequency.value = freq; f.Q.value = q;
      const g = AC.createGain(); g.gain.value = 0;
      src.connect(f); f.connect(g); g.connect(master); src.start();
      return { src, f, g };
    };
    ambNodes = {
      wind : mk('bandpass', 300, 0.5),
      rain : mk('highpass', 1500, 0.7),
      train: mk('lowpass', 130, 0.9)
    };
  }catch(e){ ambNodes = null; }
}
function updateAmbient(dt){
  ambDuck = Math.min(1, ambDuck + dt*0.45);
  const playing = state && state.name === 'play';
  const th = L().theme;
  if(th === 'rain' && playing){
    lightT -= dt;
    if(lightT <= 0){ lightT = rnd(9,16); lightFlash = 0.5; sfx.thunder(); }
  }
  lightFlash = Math.max(0, lightFlash - dt*1.3);
  if(!AC || !ambNodes) return;
  const base = (muted || !playing) ? 0 : ambDuck;
  const t0 = AC.currentTime;
  const breathe = 1 + Math.sin(worldT*0.6)*0.35;
  ambNodes.wind.g.gain.setTargetAtTime(0.02*base*breathe*(th==='rain'?1.9:1), t0, 0.4);
  ambNodes.rain.g.gain.setTargetAtTime(th==='rain' ? 0.05*base : 0, t0, 0.5);
  const tv = train.active ? clamp(1 - Math.abs(train.x-1500)/2300, 0, 1) : 0;
  ambNodes.train.g.gain.setTargetAtTime(tv*0.32*(muted?0:1), t0, 0.08);
  if(train.active && !muted){                      // 軌節喀噠聲（節奏隨車速）
    clackT -= dt;
    if(clackT <= 0){ clackT = 0.24 - clamp((train.speed-560)/300,0,1)*0.07;
      const v = 0.03 + tv*0.05;
      noise(0.06, v); beep(72+Math.random()*22, 0.05, 'triangle', v*0.8, -30);
    }
  }
  chirpT -= dt;
  if(chirpT <= 0){
    chirpT = rnd(3.5, 7.5);
    if(!muted && playing && !train.active && !bellActive){
      if(th === 'day') sfx.bird();
      else if(th === 'night') sfx.cricket();
      else if(th === 'dusk') (Math.random() < 0.5 ? sfx.bird() : sfx.cricket());
    }
  }
}
addEventListener('pointerdown', initAudio);
addEventListener('keydown', initAudio);
const rp = f => f * (0.94 + Math.random()*0.12);   // 微隨機音高
function beep(freq, dur, type, vol, slide, delay){
  if(muted || !AC || !master) return;
  const t0 = AC.currentTime + (delay||0);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq+slide), t0+dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0+0.012);
  g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  o.connect(g).connect(master);
  o.start(t0); o.stop(t0+dur+0.06);
}
function noise(dur, vol, delay){
  if(muted || !AC || !master) return;
  if(!noiseBuf){
    const len = Math.floor(AC.sampleRate*0.5);
    noiseBuf = AC.createBuffer(1,len,AC.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for(let i=0;i<len;i++) d[i] = (Math.random()*2-1)*(1-i/len);
  }
  const t0 = AC.currentTime + (delay||0);
  const src = AC.createBufferSource(); src.buffer = noiseBuf;
  src.playbackRate.value = 0.5/dur * (0.9+Math.random()*0.2);
  const g = AC.createGain();
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  src.connect(g).connect(master); src.start(t0);
}
const sfx = {
  bell(){ beep(rp(1568),0.13,'square',0.13); },
  step(){ beep(rp(170),0.05,'triangle',0.045,-40); },
  stopGood(){ beep(rp(784),0.1,'square',0.12); beep(rp(1046),0.15,'square',0.11,0,0.1); },
  crash(){ beep(200,0.3,'sawtooth',0.2,-150); noise(0.3,0.18); ambDuck = 0.2; },
  horn(){ beep(rp(440),0.5,'sawtooth',0.12); beep(rp(554),0.5,'sawtooth',0.1,0,0.03); ambDuck = 0.3; },
  bird(){ const b = rp(2100); beep(b,0.09,'sine',0.045,700); beep(b*1.12,0.08,'sine',0.04,550,0.13);
          if(Math.random()<0.5) beep(b*0.94,0.07,'sine',0.035,450,0.26); },
  cricket(){ for(let i=0;i<3;i++) beep(rp(4300),0.03,'square',0.02,0,i*0.07); },
  thunder(){ noise(1.5,0.22); beep(52,1.3,'sine',0.13,-18); ambDuck = 0.3; },
  rumble(){ noise(0.3,0.05); },
  look(){ beep(rp(660),0.08,'square',0.1); },
  lookOK(){ beep(rp(880),0.1,'square',0.12); beep(rp(1174),0.15,'square',0.1,0,0.1); },
  crossClear(){ [523,659,784,1047].forEach((f,i)=> beep(rp(f),0.15,'square',0.11,0,i*0.08)); },
  levelClear(){ [523,659,784,1047,1319,1568].forEach((f,i)=> beep(f,0.18,'square',0.11,0,i*0.1)); },
  star(i){ beep(880+i*220,0.2,'triangle',0.14); },
  ui(){ beep(rp(660),0.06,'square',0.08); },
  gameOver(){ beep(392,0.3,'sawtooth',0.13,-200); beep(261,0.4,'sawtooth',0.11,-150,0.2); ambDuck = 0.25; }
};
const muteBtn = document.getElementById('mute');
function syncMute(){ muteBtn.textContent = muted ? '🔇' : '🔊'; }
muteBtn.addEventListener('click', e => { e.stopPropagation(); muted = !muted; LS.set('railpro_muted', muted?'1':'0'); syncMute(); });
syncMute();

/* ===== 輸入：鍵盤＋觸控＋滑鼠統一 ===== */
const input = { keyWalk:false, mouseWalk:false, touchIds:new Set(), consumed:new Set(),
                leftPress:false, rightPress:false, confirm:false, navL:false, navR:false };
function walking(){ return input.keyWalk || input.mouseWalk || input.touchIds.size > 0; }
addEventListener('keydown', e => {
  if(['Space','ArrowUp','KeyW'].includes(e.code)){ e.preventDefault();
    if(!input.keyWalk) input.confirm = true; input.keyWalk = true; }
  else if(e.code==='Enter'){ e.preventDefault(); if(!e.repeat) input.confirm = true; }
  else if(e.code==='ArrowLeft' || e.code==='KeyA'){ e.preventDefault(); input.leftPress = true; input.navL = true; }
  else if(e.code==='ArrowRight' || e.code==='KeyD'){ e.preventDefault(); input.rightPress = true; input.navR = true; }
  else if(e.code==='KeyM'){ muted = !muted; LS.set('railpro_muted', muted?'1':'0'); syncMute(); }
});
addEventListener('keyup', e => {
  if(['Space','ArrowUp','KeyW'].includes(e.code)) input.keyWalk = false;
  if(e.code==='ArrowLeft' || e.code==='KeyA') input.navL = false;
  if(e.code==='ArrowRight' || e.code==='KeyD') input.navR = false;
});
function toLogical(cx, cy){
  const r = canvas.getBoundingClientRect();
  return { x:(cx-r.left)/canvas._scale, y:(cy-r.top)/canvas._scale };
}
function activeButtons(){ return (state && state.buttons) ? state.buttons() : []; }
function hitButton(p){
  /* 觸控命中容差加大到 12px（原 8px），拇指誤差更寬容，符合平板≥48px觸控標準的緩衝需求 */
  for(const b of activeButtons())
    if(p.x>=b.x-12 && p.x<=b.x+b.w+12 && p.y>=b.y-12 && p.y<=b.y+b.h+12 && !b.disabled) return b;
  return null;
}
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for(const t of e.changedTouches){
    const p = toLogical(t.clientX, t.clientY);
    const b = hitButton(p);
    if(b){ input.consumed.add(t.identifier); sfx.ui(); b.cb(); }
    else input.touchIds.add(t.identifier);
  }
}, {passive:false});
for(const ev of ['touchend','touchcancel'])
  canvas.addEventListener(ev, e => {
    e.preventDefault();
    for(const t of e.changedTouches){ input.touchIds.delete(t.identifier); input.consumed.delete(t.identifier); }
  }, {passive:false});
canvas.addEventListener('touchmove', e => e.preventDefault(), {passive:false});
canvas.addEventListener('mousedown', e => {
  const p = toLogical(e.clientX, e.clientY);
  const b = hitButton(p);
  if(b){ sfx.ui(); b.cb(); return; }
  input.mouseWalk = true;
});
addEventListener('mouseup', () => { input.mouseWalk = false; });

/* ===== 粒子（swap-pop 回收）與飄字 ===== */
const MAX_PARTS = 300;
let parts = [];
function burst(x,y,color,n,speed){
  for(let i=0;i<n && parts.length<MAX_PARTS;i++){
    const a = Math.random()*TAU, s = (speed||200)*(0.3+Math.random()*0.7);
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-70,life:0.55,max:0.55,color,s:rnd(3,6)});
  }
}
function updateParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p = parts[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 600*dt; p.life -= dt;
    if(p.life<=0){ parts[i] = parts[parts.length-1]; parts.pop(); }
  }
}
function drawParts(){
  for(const p of parts){
    ctx.globalAlpha = Math.max(0, p.life/p.max);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-p.s/2, p.y-p.s/2, p.s, p.s);
  }
  ctx.globalAlpha = 1;
}
let floats = [];
function floatText(x,y,text,color,big){ floats.push({x,y,text,color,life:0.9,max:0.9,big:big||24}); }
function updateFloats(dt){
  for(let i=floats.length-1;i>=0;i--){
    const f = floats[i]; f.y -= 42*dt; f.life -= dt;
    if(f.life<=0){ floats[i] = floats[floats.length-1]; floats.pop(); }
  }
}
function drawFloats(){
  ctx.textAlign='center';
  for(const f of floats){
    ctx.font = '900 '+f.big+'px '+FONT;
    ctx.globalAlpha = clamp(f.life/f.max,0,1);
    ctx.lineWidth=5; ctx.strokeStyle='rgba(0,0,0,.5)';
    ctx.strokeText(f.text, f.x, f.y); ctx.fillStyle = f.color; ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}
/* 雨滴粒子（第 5 關） */
let rain = [];
function initRain(){ rain = []; for(let i=0;i<70;i++) rain.push({x:rnd(0,GAME_W), y:rnd(0,GAME_H), v:rnd(560,760), l:rnd(10,18)}); }
function updateRain(dt){
  for(const r of rain){
    r.y += r.v*dt; r.x -= r.v*0.18*dt;
    if(r.y > GAME_H){ r.y = -20; r.x = rnd(0,GAME_W+120); }
  }
}
function drawRain(){
  ctx.strokeStyle = 'rgba(190,220,250,.4)'; ctx.lineWidth = 1.6;
  ctx.beginPath();
  for(const r of rain){ ctx.moveTo(r.x, r.y); ctx.lineTo(r.x - r.l*0.18, r.y - r.l); }
  ctx.stroke();
}
/* ===== v6 雨面漣漪：由 worldT 決定的無狀態程序動畫（零記憶體配置） ===== */
function drawRipples(){
  ctx.lineWidth = 1.3;
  for(let i=0;i<16;i++){
    const t = (worldT*1.4 + i*0.618) % 1;
    const x = (i*233 + 47) % GAME_W, y = 392 + (i*127) % 138;
    ctx.globalAlpha = (1-t)*0.42;
    ctx.strokeStyle = 'rgba(205,232,255,.9)';
    ctx.beginPath(); ctx.ellipse(x, y, 11*t+1, (11*t+1)*0.32, 0, 0, TAU); ctx.stroke();
  }

}
/* ===== v6 主題環境層：鳥群/花瓣（晝、暮）、螢火蟲（暮、夜）——全程序化 ===== */
function drawAmbientLayer(){
  const th = L().theme;
  if(th==='day' || th==='dusk'){
    ctx.strokeStyle = th==='day' ? 'rgba(40,60,80,.5)' : 'rgba(30,26,50,.6)';
    ctx.lineWidth = 2; ctx.lineCap = 'round';
    for(let i=0;i<5;i++){
      const x = ((worldT*(38+i*7) + i*260) % (GAME_W+240)) - 120;
      const y = 52 + (i*37)%108 + Math.sin(worldT*1.3+i*2)*6;
      const f = Math.sin(worldT*9 + i*1.7)*4;
      ctx.beginPath();
      ctx.moveTo(x-7, y-f*0.6); ctx.quadraticCurveTo(x-3, y+f, x, y);
      ctx.quadraticCurveTo(x+3, y+f, x+7, y-f*0.6); ctx.stroke();
    }
    for(let i=0;i<12;i++){
      const sp = 14 + (i%5)*6;
      const x = ((i*181) + worldT*sp) % (GAME_W+30) - 15;
      const y = ((i*97) + worldT*(9+(i%3)*5)) % (GAME_H-170) + 140 + Math.sin(worldT*1.8+i)*10;
      ctx.save(); ctx.translate(x, y); ctx.rotate(worldT*1.5 + i);
      ctx.fillStyle = th==='day' ? 'rgba(255,214,236,.55)' : 'rgba(255,200,150,.5)';
      ctx.beginPath(); ctx.ellipse(0, 0, 3.4, 2, 0, 0, TAU); ctx.fill();
      ctx.restore();
    }
  }
  if(th==='night' || th==='dusk'){
    for(let i=0;i<10;i++){
      const bx = 60 + (i*233)%(GAME_W-120), by = 250 + (i*89)%230;
      const x = bx + Math.sin(worldT*(0.5+(i%3)*0.2) + i*2.1)*26;
      const y = by + Math.cos(worldT*(0.4+(i%2)*0.3) + i*1.3)*14;
      if(Math.abs(x-GAME_W/2) < hw(y)+12 && y > RAIL_TOP-24) continue;
      ctx.globalAlpha = 0.3 + 0.7*Math.max(0, Math.sin(worldT*2.2 + i*2.7));
      ctx.drawImage(bakedGlowFly, x-9, y-9);
      ctx.fillStyle = '#eaffd0'; ctx.fillRect(x-1.2, y-1.2, 2.4, 2.4);
    }
    ctx.globalAlpha = 1;
  }
}
/* ===== v6 列車揚塵（車輪帶起的軟性塵霧＋碎屑，行進感） ===== */
let dust = [], dustT = 0;
function updateDust(dt){
  if(train.active){
    dustT -= dt;
    if(dustT <= 0){
      dustT = 0.06;
      const hx = train.x - 1500 + 900 + rnd(-60, 3*158+120);
      const sx = train.dir < 0 ? GAME_W - hx : hx;
      if(sx > -40 && sx < GAME_W+40){
        dust.push({x:sx, y:RAIL_BOT-6+rnd(-4,6), vx:train.dir*rnd(60,150), vy:-rnd(14,36),
                   r:rnd(3,6), life:rnd(0.5,0.9), max:0.9});
        if(parts.length < MAX_PARTS && Math.random() < 0.55)
          parts.push({x:sx, y:RAIL_BOT+rnd(0,8), vx:train.dir*rnd(140,280), vy:-rnd(20,80),
                      life:0.35, max:0.35, color:'rgba(190,170,130,.7)', s:rnd(2,3.4)});
      }
    }
  }
  for(let i=dust.length-1;i>=0;i--){
    const s = dust[i];
    s.x += s.vx*dt; s.y += s.vy*dt; s.r += 9*dt; s.vx *= (1-1.6*dt); s.life -= dt;
    if(s.life <= 0){ dust[i] = dust[dust.length-1]; dust.pop(); }
  }
}
function drawDust(){
  for(const s of dust){
    ctx.globalAlpha = Math.max(0, s.life/s.max)*0.3;
    ctx.fillStyle = '#cfc4a8';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, TAU); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

/* ===== 關卡定義 ===== */
const LEVELS = [
  { name:'晴天練習日',   theme:'day',   cross:2, react:0.8,  look:1.7, tspd:560, walk:128, double:[0,0],     tip:'警鈴一響，立刻放開停下！' },
  { name:'上學別遲到',   theme:'day',   cross:3, react:0.62, look:1.45, tspd:650, walk:145, double:[0,0,0],   tip:'愈來愈快！保持專心' },
  { name:'雙列車警報',   theme:'dusk',  cross:3, react:0.56, look:1.3, tspd:720, walk:150, double:[0,1,1],   tip:'小心！可能還有第二班列車' },
  { name:'夜間列車',     theme:'night', cross:3, react:0.5,  look:1.15, tspd:790, walk:155, double:[0,0,1],   tip:'天黑了，看清楚車燈再走' },
  { name:'暴雨大考驗',   theme:'rain',  cross:4, double:[0,1,0,1], react:0.44, look:1.0, tspd:860, walk:160, tip:'雨天視線差，全部技巧都用上！' }
];

/* ===== 場景常數 ===== */
const REACT_GRACE = 0.07;   // 反應窗寬容緩衝（秒）：碰撞判定往玩家有利方向作弊
const RAIL_TOP = 300, RAIL_BOT = 368;
const START_Y = 486, FINISH_Y = 148;
function hw(y){ return 20 + Math.max(0,(y-150))*0.30; }
function pscale(y){ return clamp(0.5 + (y-150)/390*0.95, 0.42, 1.55); }

/* ===== 玩家與火車 ===== */
const ped = { y:START_Y, step:0, walking:false, look:0, happy:false, worried:false, bob:0, sx:1, sy:1, blink:0 };
function resetPed(){ Object.assign(ped, { y:START_Y, step:0, walking:false, look:0, happy:false, worried:false, bob:0, sx:1, sy:1 }); }
const train = { x:-600, active:false, speed:900, dir:1 };

/* ===== 回合／關卡狀態 ===== */
let curLevel = 0, score = 0, lives = 3, combo = 0, crossIdx = 0;
let bellActive = false, bellT = 0, barrier = 0, lightPhase = 0;
let shake = 0, freeze = 0, flashT = 0, worldT = 0, hintT = 0;
let stepT = 0;
let round = { phase:'approach', timer:0, bellTriggerY:0, reactWindow:0.6, reactElapsed:0,
              lookWindow:1.2, lookElapsed:0, lookStage:0, msg:'', msgT:0, isDouble:false,
              trainCount:0, violate:0 };
function L(){ return LEVELS[curLevel]; }

function startCrossing(first){
  resetPed();
  bellActive = false; barrier = 0;
  train.active = false; train.x = -600; train.dir = 1;
  const lv = L();
  const react = lv.react * (curLevel===0 && crossIdx===0 ? 1.5 : 1);   // 開場安全學習期
  round = {
    phase:'approach', timer:0,
    bellTriggerY: rnd(RAIL_BOT+30, START_Y-30),   // 永遠留 30px 以上的行走學習距離
    reactWindow: react, reactElapsed:0,
    lookWindow: lv.look, lookElapsed:0, lookStage:0,
    msg: first ? lv.tip : '', msgT: first ? 2.2 : 0,
    isDouble: !!lv.double[crossIdx], trainCount:0, violate:0
  };
}
function setMsg(text, t){ round.msg = text; round.msgT = t||1.2; }

function crashRound(reason){
  lives--; combo = 0;
  ped.walking = false;
  sfx.crash();
  shake = 10; freeze = 0.14; flashT = 0.5;
  burst(GAME_W/2, ped.y - 60*pscale(ped.y), '#ff5a4a', 22, 260);
  floatText(GAME_W/2, ped.y-90, reason, '#ff6b5a', 26);
  ped.sx = 0.6; ped.sy = 1.4;
  if(lives <= 0){
    sfx.gameOver();
    setState(gameOverState);
  } else {
    round.phase = 'crashed'; round.timer = 0;
  }
}

function levelComplete(){
  sfx.levelClear();
  const starGot = clamp(lives, 1, 3);
  if(starGot > stars[curLevel]){ stars[curLevel] = starGot; saveStars(); }
  if(score > best){ best = score; LS.set('railpro_best', String(best)); }
  setState(resultState);
}

function updateRound(dt){
  if(round.msgT > 0) round.msgT -= dt;
  if(bellActive){ bellT -= dt; if(bellT <= 0){ sfx.bell(); bellT = 0.55; } }

  /* 闖越偵測：柵欄放下期間持續按著前進＝闖平交道
     v5：加視覺預警（震動＋角色緊張顫抖），讓死亡原因「一目了然」而非毫無徵兆地突然結束 */
  if(['closing','trainIncoming','gap','opening'].includes(round.phase)){
    if(walking()){
      round.violate += dt;
      const warn = ss(round.violate, 0.1, 0.4);
      shake = Math.max(shake, warn*6);
      ped.sx = 1 - warn*0.12; ped.sy = 1 + warn*0.1;
      if(round.violate > 0.4){ crashRound('柵欄放下不能闖越！'); return; }
      if(round.violate > 0.15 && round.msgT <= 0) setMsg('停！柵欄放下要等待', 0.7);
    } else round.violate = 0;
  }

  if(round.phase === 'crashed'){
    round.timer += dt;
    if(round.timer > 0.7) startCrossing(false);
    return;
  }
  if(round.phase === 'approach'){
    ped.walking = walking();
    if(ped.walking){
      ped.y -= L().walk * dt;
      if(ped.y <= round.bellTriggerY){
        bellActive = true; bellT = 0.55; sfx.bell();
        round.phase = 'react'; round.reactElapsed = 0;
        setMsg('叮叮叮！快放開停下！', 0.9);
        ped.worried = true;
        shake = Math.max(shake, 2);
      }
    }
    return;
  }
  if(round.phase === 'react'){
    round.reactElapsed += dt;
    if(!walking()){
      sfx.stopGood();
      ped.walking = false;
      combo++;
      const speedBonus = Math.round((1 - round.reactElapsed/round.reactWindow) * 20);
      const gained = 15 + Math.max(0, speedBonus);
      score += gained;
      floatText(GAME_W/2, ped.y-90*pscale(ped.y), '+'+gained+' 反應好快！', '#aee239', 22);
      burst(GAME_W/2, ped.y-80*pscale(ped.y), '#aee239', 10, 180);
      round.phase = 'closing'; round.timer = 0;
      return;
    }
    /* 寬容緩衝：判定往玩家有利方向作弊，避免「明明放開了卻算太慢」的挫折感（尤其高關卡窗口僅0.44s） */
    if(round.reactElapsed >= round.reactWindow + REACT_GRACE){ crashRound('太慢了！撞到柵欄！'); return; }
    return;
  }
  if(round.phase === 'closing'){
    round.timer += dt;
    barrier = easeOutBounce(ss(round.timer, 0, 0.9));
    if(round.timer >= 0.9){ barrier = 1; round.phase = 'trainIncoming'; round.timer = 0; }
    return;
  }
  if(round.phase === 'trainIncoming'){
    round.timer += dt;
    if(round.timer > 0.5 && !train.active){
      train.active = true;
      train.dir = round.trainCount === 0 ? 1 : -1;
      train.x = -600;
      train.speed = L().tspd + rnd(-20,20);
      sfx.horn();
      setMsg(round.trainCount===0 ? '轟隆轟隆！火車來了！' : '第二班列車！', 1.2);
      shake = Math.max(shake, 4);
    }
    if(train.active){
      train.x += train.speed * dt;
      shake = Math.max(shake, 2 + Math.sin(worldT*40)*0.6);
      if(train.x > 2700){
        train.active = false;
        round.trainCount++;
        if(round.isDouble && round.trainCount === 1){
          round.phase = 'gap'; round.timer = 0;
          setMsg('等等…警鈴還在響！', 1.4);
        } else { round.phase = 'opening'; round.timer = 0; }
      }
    }
    return;
  }
  if(round.phase === 'gap'){
    round.timer += dt;
    if(round.timer > 1.0){ round.phase = 'trainIncoming'; round.timer = 0.45; }
    return;
  }
  if(round.phase === 'opening'){
    round.timer += dt;
    bellActive = false;
    barrier = 1 - easeOutBounce(ss(round.timer, 0, 0.7));
    if(round.timer >= 0.7){
      barrier = 0; ped.worried = false;
      round.phase = 'lookcheck';
      round.timer = 0; round.lookElapsed = 0; round.lookStage = 0;
      input.leftPress = false; input.rightPress = false;
      setMsg('先左看、再右看！', 1.4);
      sfx.look();
    }
    return;
  }
  if(round.phase === 'lookcheck'){
    round.lookElapsed += dt;
    if(round.lookStage === 0){
      ped.look = -clamp(round.lookElapsed*3, 0, 1) * 0.9;
      if(input.leftPress){ input.leftPress = false; round.lookStage = 1; round.lookElapsed = 0; sfx.look(); }
    } else if(round.lookStage === 1){
      ped.look = lerp(-0.9, 0, clamp(round.lookElapsed*4,0,1));
      if(round.lookElapsed > 0.25) round.lookStage = 2;
    } else if(round.lookStage === 2){
      ped.look = clamp((round.lookElapsed-0.25)*3, 0, 1) * 0.9;
      if(input.rightPress){
        input.rightPress = false;
        combo++; score += 25;
        sfx.lookOK();
        floatText(GAME_W/2, ped.y-100*pscale(ped.y), '+25 確認安全！', '#ffcd75', 22);
        burst(GAME_W/2, ped.y-90*pscale(ped.y), '#ffcd75', 14, 200);
        ped.look = 0;
        round.phase = 'cross'; round.timer = 0;
        return;
      }
    }
    if(round.lookElapsed > round.lookWindow && round.lookStage < 3){
      ped.look = 0;                       // 沒看也放行，不扣分（失敗不挫折）
      round.phase = 'cross'; round.timer = 0;
    }
    return;
  }
  if(round.phase === 'cross'){
    ped.walking = walking();
    if(ped.walking){
      ped.y -= L().walk * dt;
      if(ped.y <= FINISH_Y){
        sfx.crossClear();
        const clearBonus = 40 + curLevel*10;
        score += clearBonus;
        floatText(GAME_W/2, FINISH_Y-20, '安全通過！+'+clearBonus, '#fff5d6', 28);
        burst(GAME_W/2, FINISH_Y, '#fff5d6', 18, 220);
        ped.happy = true;
        ped.sx = 0.82; ped.sy = 1.18;   /* 安全通過的開心小跳彈：squash & stretch */
        crossIdx++;
        round.phase = 'clear'; round.timer = 0;
      }
    }
    return;
  }
  if(round.phase === 'clear'){
    round.timer += dt;
    if(round.timer > 0.9){
      if(crossIdx >= L().cross) levelComplete();
      else { floatText(GAME_W/2, 240, '第 '+(crossIdx+1)+' 次通過，出發！', '#7ec8f8', 22); startCrossing(false); }
    }
    return;
  }
}

/* ===== 預先烘焙靜態背景（效能：零每幀漸層） ===== */
const THEMES = {
  day:   { skyTop:'#5aa8e8', skyMid:'#9ed4f8', skyBot:'#d9f0fc', sun:'#fff3a0', hill:'#88b868', grass1:'#7ec850', grass2:'#417a2c', tint:null, stars:false },
  dusk:  { skyTop:'#4a3a7e', skyMid:'#b06a9e', skyBot:'#ffb27a', sun:'#ffcf5c', hill:'#6a5a80', grass1:'#6aa04a', grass2:'#33522a', tint:'rgba(80,40,90,.16)', stars:false },
  night: { skyTop:'#070d24', skyMid:'#122048', skyBot:'#22355e', sun:'#f4f0d8', hill:'#26324a', grass1:'#3a5c3a', grass2:'#1e3320', tint:'rgba(10,16,50,.28)', stars:true },
  rain:  { skyTop:'#3c4a5c', skyMid:'#5a6a7c', skyBot:'#8494a4', sun:null, hill:'#5a7060', grass1:'#5c8c4c', grass2:'#31502a', tint:'rgba(40,60,80,.22)', stars:false }
};
let bakedBG = null, bakedGlowRed = null, bakedGlowHead = null;
function makeGlow(color, r){
  const c = document.createElement('canvas'); c.width = c.height = r*2;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(r,r,1, r,r,r);
  gr.addColorStop(0, color); gr.addColorStop(1, 'rgba(0,0,0,0)');
  g.fillStyle = gr; g.fillRect(0,0,r*2,r*2);
  return c;
}
function bakeBG(themeName){
  const T = THEMES[themeName];
  const k = Math.min(devicePixelRatio||1, 2);
  const c = document.createElement('canvas');
  c.width = GAME_W*k; c.height = GAME_H*k;
  const g = c.getContext('2d');
  g.scale(k,k);
  /* 天空 */
  const sky = g.createLinearGradient(0,0,0,320);
  sky.addColorStop(0,T.skyTop); sky.addColorStop(0.6,T.skyMid); sky.addColorStop(1,T.skyBot);
  g.fillStyle = sky; g.fillRect(0,0,GAME_W,340);
  if(T.stars){
    g.fillStyle = '#e8ecff';
    for(let i=0;i<46;i++){ const x=(i*197)%GAME_W, y=(i*83)%230; g.globalAlpha = 0.3+((i*37)%70)/100;
      const sz = 1.4 + ((i*13)%3)*0.6; g.fillRect(x,y,sz,sz); }
    g.globalAlpha = 1;
    /* v6 亮星十字閃芒 */
    g.strokeStyle = 'rgba(240,246,255,.75)'; g.lineWidth = 1;
    for(let i=0;i<7;i++){ const x=(i*277+60)%GAME_W, y=(i*131+18)%190;
      g.beginPath(); g.moveTo(x-4,y); g.lineTo(x+4,y); g.moveTo(x,y-4); g.lineTo(x,y+4); g.stroke(); }
  }
  if(T.sun){
    /* v6 烘焙 bloom：日／月大光暈以 additive 疊進背景，主迴圈零成本 */
    const sy = themeName==='dusk' ? 170 : 64;
    const glow = makeGlow(themeName==='dusk' ? 'rgba(255,175,95,.55)'
                        : themeName==='night' ? 'rgba(215,228,255,.4)' : 'rgba(255,244,185,.5)', 92);
    g.globalCompositeOperation = 'lighter';
    g.drawImage(glow, 140-92, sy-92);
    g.globalCompositeOperation = 'source-over';
    g.fillStyle = T.sun;
    g.beginPath(); g.arc(140, sy, themeName==='night'?20:26, 0, TAU); g.fill();
    if(themeName==='night'){ g.fillStyle = T.skyTop; g.beginPath(); g.arc(148, 58, 16, 0, TAU); g.fill(); }
    else { g.globalAlpha = 0.25; g.beginPath(); g.arc(140, sy, 40, 0, TAU); g.fill(); g.globalAlpha = 1; }
  }
  /* 遠山（視差遠層） */
  g.fillStyle = 'rgba(255,255,255,.10)';
  g.beginPath(); g.moveTo(0,240);
  for(let x=0;x<=GAME_W;x+=60) g.lineTo(x, 226 - Math.sin(x*0.011)*26 - Math.cos(x*0.03)*8);
  g.lineTo(GAME_W,260); g.lineTo(0,260); g.closePath(); g.fill();
  /* 城鎮（視差中層）：房屋含門窗 */
  for(const [hx,hs,hc] of [[70,1,'#c8b09a'],[190,0.8,'#b8c8d8'],[320,0.9,'#d8c8a8'],[620,0.95,'#c8b8c8'],[780,1.15,'#b8ccb0'],[905,0.75,'#d0c0b0']]){
    const bw=64*hs, bh=52*hs, by=254;
    g.fillStyle = hc; g.fillRect(hx-bw/2, by-bh, bw, bh);
    g.fillStyle = 'rgba(90,60,40,.85)';
    g.beginPath(); g.moveTo(hx-bw/2-5, by-bh); g.lineTo(hx, by-bh-20*hs); g.lineTo(hx+bw/2+5, by-bh); g.closePath(); g.fill();
    g.fillStyle = themeName==='night' ? '#ffd94d' : 'rgba(70,90,120,.7)';
    g.fillRect(hx-bw*0.28, by-bh*0.72, bw*0.2, bh*0.24);
    g.fillRect(hx+bw*0.08, by-bh*0.72, bw*0.2, bh*0.24);
    g.fillStyle = 'rgba(80,50,30,.8)';
    g.fillRect(hx-bw*0.1, by-bh*0.4, bw*0.2, bh*0.4);
  }
  g.fillStyle = T.hill; g.fillRect(0, 248, GAME_W, 52);
  /* 樹木 */
  for(const [tx,ts] of [[40,0.9],[250,1.1],[430,0.8],[560,1],[700,0.85],[860,1.05]]){
    g.fillStyle = '#6a4a2a'; g.fillRect(tx-3*ts, 236, 6*ts, 18*ts);
    g.fillStyle = themeName==='night' ? '#2c4630' : '#4e8c3a';
    g.beginPath(); g.arc(tx, 228, 14*ts, 0, TAU); g.fill();
    g.beginPath(); g.arc(tx-9*ts, 236, 10*ts, 0, TAU); g.fill();
    g.beginPath(); g.arc(tx+9*ts, 236, 10*ts, 0, TAU); g.fill();
  }
  /* 草地 */
  const gr = g.createLinearGradient(0,290,0,540);
  gr.addColorStop(0,T.grass1); gr.addColorStop(1,T.grass2);
  g.fillStyle = gr; g.fillRect(0, 290, GAME_W, 250);
  /* 草叢細節 */
  g.strokeStyle = 'rgba(255,255,255,.12)'; g.lineWidth = 1.4;

  g.strokeStyle = 'rgba(255,210,60,.85)'; g.lineWidth = 5;
  g.strokeRect(GAME_W/2-hw(RAIL_TOP)-6, RAIL_TOP+8, (hw(RAIL_TOP)+6)*2, RAIL_BOT-RAIL_TOP-14);

/* ===== 繪圖 ===== */
function rrp(x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function drawClouds(){
  const T = THEMES[L().theme] || THEMES.day;

  for(let i=0;i<3;i++){
    const x = ((worldT*(6+i*3) + i*300) % (GAME_W+200)) - 100;
    for(const [ox,oy,r] of [[0,0,20],[18,5,16],[-18,5,14],[6,-9,15]]){

}

/* ===== 火車材質：垂直漸層（車身 y 座標固定，x 沒差──同一組漸層物件可重複貼在
   任意水平位置，不必每幀重建，貼合列車行進時的每一節車廂與車頭） ===== */
const TRAIN_Y = RAIL_BOT - 14;
const TRAIN_MAT = {

};
function drawTrain(){

  ctx.quadraticCurveTo(lx+110, y-84, lx+124, y-50);
  ctx.quadraticCurveTo(lx+132, y-26, lx+128, y-6);

  ctx.fillStyle = TRAIN_MAT.win; rrp(lx+18, y-80, 44, 24, 5); ctx.fill();

function trainCar(x, y, w, rot){
  /* 車身：漸層陰影（受光頂／背光底）＋頂部反光帶＋底部接地陰影，立體感取代單色平塗 */
  ctx.fillStyle = TRAIN_MAT.car; rrp(x, y-86, w, 80, 8); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.18)'; rrp(x, y-86, w, 26, 8); ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,.22)'; ctx.fillRect(x+4, y-12, w-8, 5);
  ctx.lineWidth = 3; ctx.strokeStyle = '#122a48'; rrp(x, y-86, w, 80, 8); ctx.stroke();
  ctx.fillStyle = '#ffd94d'; ctx.fillRect(x, y-40, w, 8);
  /* 車廂鉚釘細節 */
  ctx.fillStyle = 'rgba(10,26,50,.35)';
  for(let ri=0; ri<4; ri++){ ctx.beginPath(); ctx.arc(x+16+ri*(w-32)/3, y-82, 1.6, 0, TAU); ctx.fill(); }
  for(let wi=0; wi<3; wi++){
    const wx = x + 14 + wi*44;
    ctx.fillStyle = TRAIN_MAT.win; rrp(wx, y-76, 30, 24, 4); ctx.fill();
    ctx.strokeStyle = '#122a48'; ctx.lineWidth = 1.6; ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,.55)'; ctx.lineWidth = 2; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(wx+4, y-74); ctx.lineTo(wx+9, y-64); ctx.stroke();

    ctx.fillStyle = '#4a6a8a';
    ctx.beginPath(); ctx.arc(wx+15, y-58, 6, Math.PI, 0); ctx.fill();

}
function trainWheel(x, y, rot){
  ctx.fillStyle = 'rgba(10,14,20,.3)'; ctx.beginPath(); ctx.ellipse(x, y+11, 11, 3, 0, 0, TAU); ctx.fill();
  ctx.fillStyle = '#22222a'; ctx.beginPath(); ctx.arc(x, y, 10, 0, TAU); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,.3)'; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.arc(x, y, 8.6, Math.PI*1.1, Math.PI*1.7); ctx.stroke();
  ctx.fillStyle = '#55555f'; ctx.beginPath(); ctx.arc(x, y, 6.4, 0, TAU); ctx.fill();
  ctx.strokeStyle = '#c8c8d0'; ctx.lineWidth = 1.8;
  for(let i=0;i<3;i++){
    const a = rot + i*Math.PI/3*2;
    ctx.beginPath(); ctx.moveTo(x-Math.cos(a)*5.6, y-Math.sin(a)*5.6); ctx.lineTo(x+Math.cos(a)*5.6, y+Math.sin(a)*5.6); ctx.stroke();
  }

/* ===== 角色材質：漸層物件只建立一次，畫在固定的局部座標系內重複使用
   （效能：避免每幀重建 CanvasGradient；角色一律以 translate 到局部原點後再上色，
   所以同一組漸層無論 ped.y／縮放怎麼變都能正確貼合形狀） ===== */
function vgrad(x0,y0,x1,y1,stops){ const g = ctx.createLinearGradient(x0,y0,x1,y1); for(const [o,c] of stops) g.addColorStop(o,c); return g; }
const PED_MAT = {
  torso : vgrad(-14,-60, 14,-22, [[0,'#8fd4ff'],[0.4,'#4da3e8'],[1,'#1c4d82']]),
  sleeve: vgrad(-3.4,0, 3.4,17,  [[0,'#79c2f2'],[1,'#1a4d80']]),
  leg   : vgrad(-4.2,0, 4.2,20,  [[0,'#3d5872'],[1,'#182330']]),
  skin  : vgrad(-14.5,-13.6, 12,10, [[0,'#ffe9cf'],[0.55,'#ffd9b0'],[1,'#d3986a']]),
  hair  : vgrad(-13,-15, 10,-4,  [[0,'#8a6238'],[1,'#432a12']]),
  cap   : vgrad(0,-21.6, 0,0,    [[0,'#fff2a0'],[0.5,'#ffe14d'],[1,'#e8a80f']]),
  pack  : vgrad(-19,-58, -9,-34, [[0,'#f5877c'],[1,'#a72a22']])
};
function drawPed(){
  const s = pscale(ped.y);
  const px = GAME_W/2, py = ped.y;
  ctx.fillStyle = 'rgba(20,30,10,.32)';
  ctx.beginPath(); ctx.ellipse(px, py+3, 20*s, 5*s, 0, 0, TAU); ctx.fill();
  ctx.save();
  ctx.translate(px, py - ped.bob*s);
  ctx.scale(s*ped.sx, s*ped.sy);
  const skin='#ffd9b0', skinD='#c89060';
  const sw = ped.walking ? Math.sin(ped.step) : 0;
  /* 腿：漸層陰影（左亮右暗）＋鞋頭立體感 */
  for(const side of [1,-1]){
    const lift = ped.walking ? Math.max(0, Math.sin(ped.step)*side)*6 : 0;
    ctx.save(); ctx.translate(side*7 + sw*side*2.4, -24);
    ctx.fillStyle = PED_MAT.leg; rrp(-4.2, 0, 8.4, 20-lift, 4); ctx.fill();
    ctx.fillStyle = '#e84a3a'; rrp(-5.2, 16-lift, 10.4, 6, 3); ctx.fill();
    ctx.fillStyle = '#c22'; rrp(1.4, 16-lift, 3.8, 6, 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.fillRect(-5.2, 16-lift, 10.4, 2);
    ctx.restore();
  }
  /* 書包（背在身後）：漸層＋反光條 */
  ctx.fillStyle = PED_MAT.pack; rrp(-19, -58, 10, 24, 5); ctx.fill();
  ctx.strokeStyle = '#8a2a22'; ctx.lineWidth=1.6; ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,.3)'; rrp(-18, -57, 2.4, 22, 1.2); ctx.fill();
  ctx.fillStyle = '#ffcd75'; rrp(-17.5, -50, 7, 6, 2.4); ctx.fill();
  /* 身體：漸層陰影（受光面／背光面）＋頂部反光帶＋亮邊描線 */
  ctx.fillStyle = PED_MAT.torso; rrp(-14, -60, 28, 38, 9); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.25)'; rrp(-14, -60, 28, 12, 9); ctx.fill();
  ctx.lineWidth = 2.2; ctx.strokeStyle = '#1a365d'; rrp(-14, -60, 28, 38, 9); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,.4)'; ctx.lineWidth = 1.6;
  ctx.beginPath(); ctx.moveTo(-11,-58); ctx.lineTo(-11,-25); ctx.stroke();
  ctx.fillStyle = '#ffcd75'; ctx.fillRect(-14, -34, 28, 4);
  /* 手臂：漸層袖子 */
  for(const side of [1,-1]){
    const swingA = ped.walking ? Math.sin(ped.step + (side>0?0:Math.PI))*0.55 : 0.1*side*Math.sin(worldT*2);
    ctx.save(); ctx.translate(side*13, -52); ctx.rotate(0.2*side + swingA*side);
    ctx.fillStyle = PED_MAT.sleeve; rrp(-3.4, 0, 6.8, 17, 3.4); ctx.fill();
    ctx.fillStyle = skin; ctx.beginPath(); ctx.arc(0, 19, 4.2, 0, TAU); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,.4)'; ctx.beginPath(); ctx.arc(-1.2, 17.4, 1.3, 0, TAU); ctx.fill();
    ctx.restore();
  }
  /* 頭部：漸層膚色＋臉頰高光點＋漸層頭髮 */
  const lk = ped.look;
  ctx.save(); ctx.translate(lk*9, -74); ctx.rotate(lk*0.18);
  ctx.fillStyle = PED_MAT.skin;
  ctx.beginPath(); ctx.ellipse(0, 0, 14.5, 13.6, 0, 0, TAU); ctx.fill();
  ctx.lineWidth = 2; ctx.strokeStyle = skinD; ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,.4)';
  ctx.beginPath(); ctx.ellipse(-7.5, -3.5, 3, 2.1, -0.3, 0, TAU); ctx.fill();
  ctx.fillStyle = PED_MAT.hair;
  ctx.beginPath(); ctx.moveTo(-13+lk*5, -4);
  ctx.quadraticCurveTo(-7+lk*5, -12, 0+lk*5, -8);
  ctx.quadraticCurveTo(7+lk*5, -12, 13+lk*5, -5);
  ctx.quadraticCurveTo(9, -15, 0, -14);
  ctx.quadraticCurveTo(-9, -15, -13+lk*5, -4);
  ctx.closePath(); ctx.fill();
  /* 小黃帽：漸層帽頂＋反光斜線＋陰影帽簷 */
  ctx.save(); ctx.translate(lk*5.5, -9);
  ctx.fillStyle = PED_MAT.cap; ctx.beginPath(); ctx.arc(0, 0, 12.6, Math.PI, 0); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,.55)'; ctx.lineWidth = 1.8; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-6.5,-3.5); ctx.lineTo(-2.5,-9.5); ctx.stroke();
  ctx.fillStyle = '#f2b312';
  ctx.beginPath(); ctx.ellipse(0, 0.5, 15.4, 3.4, 0, 0, Math.PI, true); ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,.14)';
  ctx.beginPath(); ctx.ellipse(0, 1.6, 14.6, 2.2, 0, 0, Math.PI, true); ctx.fill();
  ctx.restore();
  /* 眼睛：眨眼＋擔心/開心表情 */
  const blink = ped.blink < 0.1;
  for(const sd of [1,-1]){
    const exp = sd*6 + lk*7;
    if(ped.happy){
      ctx.strokeStyle = '#3a2a12'; ctx.lineWidth = 2.1;
      ctx.beginPath(); ctx.arc(exp, 1, 3.4, Math.PI*1.1, Math.PI*1.9); ctx.stroke();
    } else if(blink){
      ctx.strokeStyle = '#3a2a12'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(exp-2.4, 1); ctx.lineTo(exp+2.4, 1); ctx.stroke();
    } else {
      ctx.fillStyle = '#3a2a12';
      ctx.beginPath(); ctx.ellipse(exp, 1, 2.4, ped.worried?3.8:3.2, 0, 0, TAU); ctx.fill();
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(exp+0.8, -0.4, 0.9, 0, TAU); ctx.fill();
    }
    if(ped.worried && !ped.happy){
      ctx.strokeStyle = '#3a2a12'; ctx.lineWidth = 1.6;
      ctx.beginPath(); ctx.moveTo(exp-3, -5.4); ctx.lineTo(exp+3, -4); ctx.stroke();
    }
  }
  /* 嘴 */
  ctx.strokeStyle = '#8a4a2a'; ctx.lineWidth = 1.8; ctx.lineCap='round';
  ctx.beginPath();
  if(ped.happy) ctx.arc(lk*5.5, 6.5, 4.2, 0.2, Math.PI-0.2);
  else if(ped.worried) ctx.arc(lk*5.5, 10, 3.2, Math.PI+0.3, TAU-0.3);
  else ctx.arc(lk*5.5, 6, 3.6, 0.3, Math.PI-0.3);
  ctx.stroke();
  ctx.restore();
  /* 左右看的視線箭頭 */
  if(Math.abs(lk) > 0.05){
    const la = clamp(Math.abs(lk),0,1), ld = Math.sign(lk);
    ctx.save(); ctx.globalAlpha = la;
    ctx.translate(ld*42, -80);
    ctx.fillStyle = '#ffe14d'; ctx.strokeStyle = '#8a6a10'; ctx.lineWidth = 1.8; ctx.lineJoin='round';
    for(let i=0;i<2;i++){
      const off = (i*13 + Math.sin(worldT*8)*3) * ld;
      ctx.beginPath();
      ctx.moveTo(off, -8); ctx.lineTo(off+10*ld, 0); ctx.lineTo(off, 8);
      ctx.lineTo(off+4.5*ld, 0); ctx.closePath(); ctx.fill(); ctx.stroke();
    }
    ctx.restore();
  }
  ctx.restore();
}
function drawHeart(x,y,s,fill){
  ctx.save(); ctx.translate(x,y); ctx.scale(s,s);
  ctx.beginPath();
  ctx.moveTo(0,3);
  ctx.bezierCurveTo(-8,-6,-2,-11,0,-6);
  ctx.bezierCurveTo(2,-11,8,-6,0,3);
  ctx.closePath();
  ctx.fillStyle = fill; ctx.fill();
  ctx.lineWidth = 1.4; ctx.strokeStyle = 'rgba(0,0,0,.35)'; ctx.stroke();
  ctx.restore();
}
function drawStar(x,y,r,fill,rot){
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot||0);
  ctx.beginPath();
  for(let i=0;i<10;i++){
    const rr = i%2===0 ? r : r*0.46;
    const a = -Math.PI/2 + i*Math.PI/5;
    ctx.lineTo(Math.cos(a)*rr, Math.sin(a)*rr);
  }
  ctx.closePath();
  ctx.fillStyle = fill; ctx.fill();
  ctx.lineWidth = r*0.14; ctx.strokeStyle = 'rgba(90,60,0,.5)'; ctx.stroke();
  ctx.restore();
}
function drawButton(b, hot){
  const g = ctx.createLinearGradient(0, b.y, 0, b.y+b.h);
  if(b.disabled){ g.addColorStop(0,'rgba(70,80,95,.8)'); g.addColorStop(1,'rgba(40,48,60,.8)'); }
  else if(b.gold){ g.addColorStop(0,'#ffcf5c'); g.addColorStop(1,'#ff7e3d'); }
  else { g.addColorStop(0,'rgba(77,163,232,.95)'); g.addColorStop(1,'rgba(26,54,93,.95)'); }
  ctx.fillStyle = g;
  rrp(b.x, b.y, b.w, b.h, 14); ctx.fill();
  ctx.lineWidth = hot ? 4 : 2.6;
  ctx.strokeStyle = hot ? '#fff' : 'rgba(216,236,255,.8)';
  ctx.stroke();
  ctx.font = '900 '+(b.fs||22)+'px '+FONT; ctx.textAlign='center';
  ctx.fillStyle = b.disabled ? 'rgba(220,230,240,.5)' : (b.gold ? '#4a2a00' : '#eaf6ff');
  ctx.fillText(b.label, b.x+b.w/2, b.y+b.h/2+(b.fs||22)*0.36);
}

/* ===== 場景渲染 ===== */
function drawScene(){
  if(bakedBG) ctx.drawImage(bakedBG, 0, 0, GAME_W, GAME_H);
  drawClouds();
  drawAmbientLayer();
  ctx.save();
  ctx.translate((Math.random()*2-1)*shake, (Math.random()*2-1)*shake);
  if(ped.y < RAIL_TOP+20) drawPed();
  drawCrossbuck(GAME_W/2-72, 288, 0.9, false);
  drawBarrierArm(GAME_W/2-46, 284, 0.86, 122, false);
  drawTrain();
  drawDust();
  drawCrossbuck(GAME_W/2+96, 402, 1.12, true);
  drawBarrierArm(GAME_W/2+66, 398, 1.06, 118, true);
  if(ped.y >= RAIL_TOP+20) drawPed();
  drawParts();
  ctx.restore();
  if(L().theme === 'rain'){ drawRipples(); drawRain(); }
  if(lightFlash > 0){
    ctx.globalAlpha = Math.min(0.26, lightFlash*0.45);
    ctx.fillStyle = '#dde8ff'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.globalAlpha = 1;
  }
  ctx.drawImage(bakedVignette, 0, 0, GAME_W, GAME_H);
  drawFloats();
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,GAME_W,4); ctx.fillRect(0,GAME_H-4,GAME_W,4);
}
function drawHUD(){
  ctx.textAlign='left';
  /* 讀性背板：修 v4 太陽/天空亮部把左上角文字吃掉的問題，不論任何主題背景都能一眼看懂 */
  ctx.fillStyle = 'rgba(6,14,26,.4)';
  rrp(8, 12, 292, 54, 12); ctx.fill();
  ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(255,207,92,.4)';
  rrp(8, 12, 292, 54, 12); ctx.stroke();
  ctx.font='900 24px '+FONT;
  ctx.lineWidth=5; ctx.strokeStyle='rgba(0,0,0,.4)';
  ctx.strokeText('分數 '+score, 18, 36);
  ctx.fillStyle='#fff5d6'; ctx.fillText('分數 '+score, 18, 36);
  ctx.font='700 15px '+FONT; ctx.fillStyle='#ffffffec';
  ctx.fillText('第'+(curLevel+1)+'關 '+L().name+'　通過 '+crossIdx+'/'+L().cross, 18, 58);
  for(let i=0;i<3;i++) drawHeart(GAME_W-140+i*26, 30, 2.1, i<lives ? '#ff5a6e' : 'rgba(255,255,255,.25)');
  if(combo >= 3){
    ctx.textAlign='center'; ctx.font='900 18px '+FONT; ctx.fillStyle='#aee239';
    ctx.fillText(combo+' 連續成功！', GAME_W/2, 60);
  }
  if(round.msgT > 0 && round.msg){
    ctx.textAlign='center';
    ctx.font='900 26px '+FONT;
    ctx.globalAlpha = clamp(round.msgT,0,1);
    ctx.lineWidth=6; ctx.strokeStyle='rgba(0,0,0,.5)';
    ctx.strokeText(round.msg, GAME_W/2, 100);
    ctx.fillStyle = (round.phase==='react'||round.violate>0.15) ? '#ff6a5a' : '#ffe9b0';
    ctx.fillText(round.msg, GAME_W/2, 100);
    ctx.globalAlpha = 1;
  }
  ctx.textAlign='center'; ctx.font='700 16px '+FONT; ctx.fillStyle='#ffffffcc';
  if(round.phase === 'approach') ctx.fillText('按住前進，聽到叮叮聲馬上放開！', GAME_W/2, GAME_H-14);
  else if(round.phase === 'trainIncoming' || round.phase === 'gap' || round.phase === 'closing') ctx.fillText('耐心等待，柵欄放下時不能走！', GAME_W/2, GAME_H-14);
  else if(round.phase === 'cross') ctx.fillText('安全了！按住前進通過平交道', GAME_W/2, GAME_H-14);
  else if(round.phase === 'lookcheck'){
    ctx.fillStyle='#ffe9b0';
    ctx.fillText(round.lookStage===0 ? '左看：按 ← 或點左下按鈕' : '右看：按 → 或點右下按鈕', GAME_W/2, GAME_H-116);
  }
}

function unlocked(i){ return i===0 || stars[i-1] > 0; }
function startLevel(i){

  bakeBG(L().theme);

  setState(playState);
}

const playState = {
  name:'play', t:0,
  enter(){
    this.t = 0;
    score = 0; lives = 3; combo = 0; crossIdx = 0;
    parts.length = 0; floats.length = 0;
    shake = 0; freeze = 0; flashT = 0; hintT = 4;
    startCrossing(true);
    hintEl.textContent = '💻 按住空白鍵前進　📱 按住畫面前進｜警鈴響了立刻放開！';
    hintEl.classList.add('show');
  },
  buttons(){
    if(round.phase !== 'lookcheck') return [];
    const bts = [];
    if(round.lookStage === 0) bts.push({x:26, y:GAME_H-100, w:190, h:70, label:'◀ 左看', fs:24, cb:()=>{ input.leftPress = true; }});
    else if(round.lookStage === 2) bts.push({x:GAME_W-216, y:GAME_H-100, w:190, h:70, label:'右看 ▶', fs:24, cb:()=>{ input.rightPress = true; }});
    return bts;
  },
  update(dt){
    this.t += dt; worldT += dt;
    lightPhase = Math.floor(worldT*2.4) % 2;
    if(hintT > 0){ hintT -= dt; if(hintT <= 0) hintEl.classList.remove('show'); }
    if(freeze > 0){ freeze -= dt; return; }
    updateRound(dt);
    if(ped.walking){
      ped.step += dt*9; ped.bob = Math.abs(Math.sin(ped.step))*5;
      stepT -= dt;
      if(stepT <= 0){ stepT = 0.32; sfx.step(); burst(GAME_W/2, ped.y+2, 'rgba(200,190,160,.8)', 2, 60); }
    }
    else { ped.step = 0; ped.bob = Math.sin(worldT*2.2)*1.2; }
    ped.blink -= dt; if(ped.blink < -0.12) ped.blink = rnd(1.6, 3.6);
    ped.sx += (1-ped.sx)*10*dt; ped.sy += (1-ped.sy)*10*dt;
    updateParts(dt); updateFloats(dt);
    if(L().theme==='rain') updateRain(dt);
    shake *= Math.pow(0.001, dt);
    flashT = Math.max(0, flashT - dt*3);
    input.leftPress = false; input.rightPress = false; input.confirm = false;
  },
  draw(){
    drawScene();
    for(const b of this.buttons()) drawButton(b, Math.sin(worldT*5)>0);
    drawHUD();
    if(flashT > 0){
      ctx.globalAlpha = flashT; ctx.fillStyle = '#ff5a4a';
      ctx.fillRect(0,0,GAME_W,GAME_H); ctx.globalAlpha = 1;
    }
  }
};

/* ===== 主迴圈：固定時間步進 ===== */
const STEP = 1/60;
let last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  if(rotateBlocking){ last = now; acc = 0; return; }   // 直向暫停：不吃輸入、不計時，轉回橫向立刻無縫繼續
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while(acc >= STEP){
    state.update(STEP);
    updateAmbient(STEP);
    updateDust(STEP);
    acc -= STEP;
  }
  state.draw();
}
resetPed();
setState(titleState);
requestAnimationFrame(frame);

/* ===== 測試掛鉤（無頭瀏覽器可玩性驗證用） ===== */
window.__test = {
  get state(){ return state.name; },
  get phase(){ return round.phase; },
  get score(){ return score; },
  get lives(){ return lives; },
  get level(){ return curLevel; },
  get crossIdx(){ return crossIdx; },
  get pedY(){ return ped.y; },
  get stars(){ return stars.slice(); },
  get buttons(){ return activeButtons().map(b=>({label:b.label, x:b.x+b.w/2, y:b.y+b.h/2, w:b.w, h:b.h, disabled:!!b.disabled})); },
  startLevel(i){ startLevel(i); },
  goSelect(){ setState(selectState); },
  forceBell(){ if(round.phase==='approach'){ round.bellTriggerY = ped.y + 1; } },
  tick(s){ const n = Math.round((s||1)*60); for(let i=0;i<n;i++) state.update(STEP); }
};
</script>

<script>/* AI-CAMP-STATS-BEACON */
(function(){
  try{ if(window.top!==window.self) return; }catch(e){ return; } /* 在作品館內由作品館計數與投票 */
  var NS="ai-future-camp", K="pro-t-870d7961";
  var ABS="//abacus.jasoncameron.dev/"; /* 直連備援 */
  var REL="/abacus/"; /* 同源代理（Vercel 轉發）：學校閘道擋外部網域時仍然通 */
  function ping(n){
    try{
      fetch(REL+"hit/"+NS+"/"+n).then(function(r){
        if(!r||!r.ok){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); }
      }).catch(function(){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); });
    }catch(e){}
  }
  function read(n,cb){
    function via(base,next){ try{ fetch(base+"get/"+NS+"/"+n).then(function(r){ if(r.status===404&&base===ABS) return {value:0}; if(!r.ok) throw 0; return r.json(); }).then(function(j){ cb(j.value||j.count||0); }).catch(next); }catch(e){ next(); } }
    via(REL, function(){ via(ABS, function(){ cb(null); }); });
  }
  ping(K+"-v");
  var done=false;
  function once(){ if(done)return; done=true; ping(K+"-p"); ping("site-total-plays");
    window.removeEventListener("pointerdown",once); window.removeEventListener("keydown",once); }
  window.addEventListener("pointerdown",once,{once:false}); window.addEventListener("keydown",once,{once:false});
  /* 投票鈕：非常好玩/好玩——與作品館同一計數器，任何網頁打開都同步 */
  function initVotes(){
    if(!document.body) return;
    var wrap=document.createElement("div");
    wrap.style.cssText="position:fixed;right:10px;bottom:10px;z-index:99999;display:flex;gap:6px;font-family:sans-serif;opacity:.92";
    var LS="voted-"+K;
    var defs=[["-love","\u2764\uFE0F","\u975e\u5e38\u597d\u73a9","#ff6cc7"],["-like","\ud83d\udc4d","\u597d\u73a9","#38e1ff"]];
    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;
          b.querySelector("i").textContent=Math.max(0,(n||0)-(c||0));
        }); });
      });
    }
    defs.forEach(function(d){
      var b=document.createElement("button");
      b.type="button"; b.title=d[2];
      b.style.cssText="min-height:42px;padding:8px 14px;border:none;border-radius:999px;background:rgba(15,18,32,.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation";
      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";
      b.addEventListener("click",function(){
        var prev=null; try{ prev=localStorage.getItem(LS); }catch(e){}
        if(prev===d[0]){ ping(K+d[0]+"-c"); try{ localStorage.removeItem(LS); }catch(e){} }
        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);
      });
      btns[d[0]]=b; wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    refresh();
    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* 每10秒同步別人投的票 */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
</script>
