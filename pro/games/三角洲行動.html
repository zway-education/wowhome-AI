<!DOCTYPE html>
<!-- 專業AI升級 v8 3D版：把《三角洲行動》改寫成真第一人稱 3D 射擊——真透視相機＋畫家演算法深度排序、逐面受光的方塊士兵敵人與掩體、接地陰影、漸層天空＋地平線霧＋暗角、additive 發光粒子、玻璃 HUD、飄字彈跳、命中 hit-stop 與小幅震動、Web Audio 去爆音音效、devicePixelRatio 不糊、電腦鍵鼠與手機觸控通吃。保留原軍事主題/幹員/波次精神與計分/評分/最佳紀錄與檔尾統計信標。 -->
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="author" content="未命名">
<title>三角洲行動｜作戰情報終端 PRO</title>
<style>
  :root{
    color-scheme: dark;
    --accent:#ff7a1a; --olive:#8fae52; --danger:#d64b3f; --ink:#e7e2d2; --ink-dim:#9aa088;
    --font-mono:"Cascadia Mono","SFMono-Regular",Consolas,monospace;
    --font-body:"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; overflow:hidden; background:#0a0d10; }
  body{ color:var(--ink); font-family:var(--font-body); -webkit-font-smoothing:antialiased;
        -webkit-user-select:none; user-select:none; touch-action:none; }
  #c{ position:fixed; inset:0; width:100%; height:100%; display:block; touch-action:none; cursor:crosshair; }

  /* ===== 選單 / 結算浮層（玻璃質感） ===== */
  #menu{
    position:fixed; inset:0; z-index:20; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; padding:24px; text-align:center;
    background:radial-gradient(120% 90% at 50% 12%, rgba(20,26,16,.42), rgba(6,9,6,.86));
    -webkit-backdrop-filter:blur(2px); backdrop-filter:blur(2px);
  }
  #menu.hide{ display:none; }
  .eyebrow{ font-family:var(--font-mono); font-size:12px; letter-spacing:.34em; color:var(--accent);
            text-transform:uppercase; margin:0; }
  .eyebrow::before{ content:"▲ "; }
  h1{ font-family:var(--font-body); font-weight:800; font-size:clamp(40px,10vw,84px);
      line-height:.96; margin:0; letter-spacing:.04em; text-shadow:0 0 34px rgba(255,122,26,.4); }
  h1 b{ color:var(--accent); font-weight:800; }
  #resultLine{ min-height:26px; font-family:var(--font-mono); font-size:clamp(15px,4.4vw,20px);
               color:var(--ink-dim); letter-spacing:.06em; margin:2px 0; }
  #resultLine b{ color:var(--accent); }
  .sub{ max-width:44ch; margin:0 auto; color:var(--ink-dim); font-size:15px; line-height:1.6; }
  .ops{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; max-width:560px; }
  .op{
    position:relative; min-width:120px; flex:1 1 120px; max-width:150px;
    background:linear-gradient(180deg, rgba(28,34,20,.82), rgba(14,17,10,.82));
    border:1px solid rgba(74,85,54,.9); border-radius:12px; padding:14px 12px 12px;
    cursor:pointer; transition:transform .14s, border-color .14s, box-shadow .14s;
  }
  .op:hover{ transform:translateY(-3px); }
  .op.sel{ border-color:var(--_c,var(--accent)); box-shadow:0 0 0 1px var(--_c,var(--accent)), 0 10px 26px rgba(0,0,0,.45); }
  .op .nm{ font-weight:800; font-size:19px; letter-spacing:.02em; }
  .op .rl{ font-family:var(--font-mono); font-size:11px; letter-spacing:.08em; color:var(--_c,var(--accent)); margin:2px 0 8px; text-transform:uppercase; }
  .op .bn{ font-family:var(--font-mono); font-size:11px; color:var(--olive); letter-spacing:.03em; }
  .op.sel::after{ content:"✓"; position:absolute; top:8px; right:10px; color:var(--_c,var(--accent)); font-weight:900; }
  #startBtn{
    font-family:var(--font-mono); font-size:16px; letter-spacing:.14em; text-transform:uppercase;
    color:#14150f; background:linear-gradient(180deg,#ffb15e,var(--accent)); border:none; border-radius:12px;
    padding:16px 40px; min-height:56px; cursor:pointer; font-weight:800;
    box-shadow:0 10px 30px rgba(255,122,26,.32), inset 0 1px 0 rgba(255,255,255,.4);
  }
  #startBtn:active{ transform:translateY(2px); }
  .help{ font-family:var(--font-mono); font-size:12.5px; color:var(--ink-dim); letter-spacing:.04em; line-height:1.9; }
  .help b{ color:var(--ink); }

  /* ===== 手機開火鈕 ===== */
  #fireBtn{
    position:fixed; z-index:15; right:20px; bottom:26px; width:96px; height:96px; border-radius:50%;
    display:none; align-items:center; justify-content:center;
    background:radial-gradient(circle at 38% 32%, rgba(255,160,90,.5), rgba(214,75,63,.32) 70%, rgba(20,14,10,.5));
    border:2px solid rgba(255,122,26,.85); color:#fff; font-weight:800; font-size:15px; letter-spacing:.1em;
    box-shadow:0 8px 26px rgba(0,0,0,.5), inset 0 0 22px rgba(255,122,26,.35); touch-action:none;
  }
  #fireBtn:active{ transform:scale(.93); }
  body.touch #fireBtn.on{ display:flex; }

  #muteBtn{
    position:fixed; z-index:15; left:16px; bottom:16px; width:46px; height:46px; border-radius:10px;
    display:flex; align-items:center; justify-content:center; cursor:pointer; touch-action:manipulation;
    background:rgba(14,17,10,.7); border:1px solid rgba(74,85,54,.9); color:var(--ink-dim); font-size:20px;
  }
  #muteBtn.muted{ color:var(--danger); }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="menu">
  <p class="eyebrow">作戰簡報 · 現正待命</p>
  <h1>三角洲<b>行動</b></h1>
  <div id="resultLine"></div>
  <p class="sub">敵對小隊正從敵後推進。選擇幹員，透過瞄準鏡逐波殲滅方塊士兵，別讓他們突破你的防線——撐越久、打越準，評分越高。</p>
  <div class="ops" id="ops"></div>
  <button id="startBtn">開始行動</button>
  <div class="help">
    💻 <b>滑鼠移動瞄準</b> · <b>點擊/空白鍵</b> 開火 · 也可用 <b>WASD／方向鍵</b> 微調準星<br>
    📱 <b>手指滑動瞄準</b> · 按右下 <b>開火鈕</b> 射擊（或直接點敵人）
  </div>
</div>

<button id="fireBtn">開火</button>
<div id="muteBtn" title="靜音">🔊</div>

<script>
(function(){
  'use strict';
  var cv = document.getElementById('c');
  var ctx = cv.getContext('2d');
  var menuEl = document.getElementById('menu');
  var resultEl = document.getElementById('resultLine');
  var fireBtn = document.getElementById('fireBtn');
  var muteBtn = document.getElementById('muteBtn');
  var REDUCED = matchMedia('(prefers-reduced-motion: reduce)').matches;
  var IS_TOUCH = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  if(IS_TOUCH) document.body.classList.add('touch');

  /* ===================== 畫布尺寸（DPR 不糊） ===================== */
  var CSSW=960, CSSH=600, DPR=1, CX=480, CY=300, FOV=820;
  var SKY_CV=null, GND_CV=null, VIGN_CV=null;
  function bakeScreen(){
    SKY_CV = bakeCv(CSSW, CSSH, function(g){
      var sg = g.createLinearGradient(0,0,0,CSSH);
      sg.addColorStop(0,'#12202b'); sg.addColorStop(0.45,'#20323a'); sg.addColorStop(0.72,'#4a5642'); sg.addColorStop(1,'#7c7f5a');
      g.fillStyle=sg; g.fillRect(0,0,CSSW,CSSH);
      // 遠處太陽暈
      var sun=g.createRadialGradient(CSSW*0.7,CSSH*0.34,10,CSSW*0.7,CSSH*0.34,CSSH*0.5);
      sun.addColorStop(0,'rgba(255,214,150,0.5)'); sun.addColorStop(0.4,'rgba(255,170,90,0.12)'); sun.addColorStop(1,'rgba(255,170,90,0)');
      g.fillStyle=sun; g.fillRect(0,0,CSSW,CSSH);
      // 遠山剪影（多層）
      var horizon=CSSH*0.52;
      function ridge(base,amp,seg,color){
        g.fillStyle=color; g.beginPath(); g.moveTo(0,CSSH);
        g.lineTo(0,base);
        for(var i=0;i<=seg;i++){ var x=CSSW*i/seg; var y=base - (Math.sin(i*1.7+seg)*0.5+0.5)*amp - Math.sin(i*0.6)*amp*0.3; g.lineTo(x,y); }
        g.lineTo(CSSW,CSSH); g.closePath(); g.fill();
      }
      ridge(horizon-6, 42, 9, 'rgba(40,52,44,0.55)');
      ridge(horizon+8, 26, 13, 'rgba(28,38,32,0.7)');
    });
    GND_CV = bakeCv(CSSW, 240, function(g){
      var gg = g.createLinearGradient(0,0,0,240);
      gg.addColorStop(0,'#6f7452'); gg.addColorStop(0.14,'#4c5236'); gg.addColorStop(0.5,'#343b24'); gg.addColorStop(1,'#20261a');
      g.fillStyle=gg; g.fillRect(0,0,CSSW,240);
    });
    VIGN_CV = bakeCv(CSSW, CSSH, function(g){
      var v=g.createRadialGradient(CSSW/2,CSSH*0.46,CSSH*0.34,CSSW/2,CSSH*0.5,CSSH*0.92);
      v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(0.7,'rgba(0,0,0,0.12)'); v.addColorStop(1,'rgba(6,10,6,0.62)');
      g.fillStyle=v; g.fillRect(0,0,CSSW,CSSH);
    });
  }
  function resize(){
    CSSW = Math.max(320, innerWidth);
    CSSH = Math.max(360, innerHeight);
    DPR = Math.min(devicePixelRatio||1, 2);
    cv.width = Math.round(CSSW*DPR); cv.height = Math.round(CSSH*DPR);
    cv.style.width = CSSW+'px'; cv.style.height = CSSH+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    CX = CSSW/2; CY = CSSH*0.5;
    FOV = Math.max(560, CSSW*0.82);
    ch.x = Math.min(ch.x, CSSW-6); ch.y = Math.min(ch.y, CSSH-6);
    bakeScreen();
  }

  /* ===================== 相機 / 投影 ===================== */
  var cam = { x:0, y:56, z:-40, yaw:0, pitch:0 };
  var _cy=1,_sy=0,_cp=1,_sp=0;
  function camUpdate(){ _cy=Math.cos(cam.yaw); _sy=Math.sin(cam.yaw); _cp=Math.cos(cam.pitch); _sp=Math.sin(cam.pitch); }
  function project(x,y,z){
    var dx=x-cam.x, dy=y-cam.y, dz=z-cam.z;
    var rx=dx*_cy - dz*_sy;
    var rz=dx*_sy + dz*_cy;
    var ry=dy*_cp - rz*_sp;
    var rz2=dy*_sp + rz*_cp;
    if(rz2 < 12) return null;
    var s=FOV/rz2;
    return { x:CX+rx*s, y:CY-ry*s, s:s, rz:rz2 };
  }

  /* ===================== 逐面受光立體盒 ===================== */
  var L=[-0.34,0.90,-0.27]; (function(){var m=Math.hypot(L[0],L[1],L[2]);L=[L[0]/m,L[1]/m,L[2]/m];})();
  var AMB=0.42, DIF=0.72, FOGC=[124,127,90];
  function clampi(v){ v=v|0; return v<0?0:v>255?255:v; }
  function shadeCol(rgb,b,fog){
    var r=rgb[0]*b, g=rgb[1]*b, bl=rgb[2]*b;
    if(fog>0){ r+=(FOGC[0]-r)*fog; g+=(FOGC[1]-g)*fog; bl+=(FOGC[2]-bl)*fog; }
    return 'rgb('+clampi(r)+','+clampi(g)+','+clampi(bl)+')';
  }
  var _bf=[];
  function drawBox3D(cx,by,cz,hw,h,hd,rgb,fog,edge){
    var y0=by, y1=by+h;
    var p0=project(cx-hw,y0,cz-hd),p1=project(cx+hw,y0,cz-hd),p2=project(cx+hw,y0,cz+hd),p3=project(cx-hw,y0,cz+hd),
        p4=project(cx-hw,y1,cz-hd),p5=project(cx+hw,y1,cz-hd),p6=project(cx+hw,y1,cz+hd),p7=project(cx-hw,y1,cz+hd);
    var FS=[
      [p4,p5,p6,p7, 0,1,0,  cx,y1,cz],
      [p0,p1,p5,p4, 0,0,-1, cx,(y0+y1)/2,cz-hd],
      [p3,p2,p6,p7, 0,0,1,  cx,(y0+y1)/2,cz+hd],
      [p0,p4,p7,p3, -1,0,0, cx-hw,(y0+y1)/2,cz],
      [p1,p2,p6,p5, 1,0,0,  cx+hw,(y0+y1)/2,cz]
    ];
    _bf.length=0;
    for(var f=0;f<FS.length;f++){
      var q=FS[f]; if(!q[0]||!q[1]||!q[2]||!q[3]) continue;
      var nx=q[4],ny=q[5],nz=q[6];
      var vx=q[7]-cam.x, vy=q[8]-cam.y, vz=q[9]-cam.z;
      if(nx*vx+ny*vy+nz*vz > 0) continue; // 背面剔除
      var br=AMB+DIF*Math.max(0, nx*L[0]+ny*L[1]+nz*L[2]);
      _bf.push([ (q[0].rz+q[2].rz)*0.5, q[0],q[1],q[2],q[3], br ]);
    }
    _bf.sort(function(a,b){return b[0]-a[0];});
    for(var k=0;k<_bf.length;k++){
      var e=_bf[k];
      ctx.fillStyle=shadeCol(rgb,e[5],fog);
      ctx.beginPath(); ctx.moveTo(e[1].x,e[1].y); ctx.lineTo(e[2].x,e[2].y); ctx.lineTo(e[3].x,e[3].y); ctx.lineTo(e[4].x,e[4].y); ctx.closePath(); ctx.fill();
      if(edge){ ctx.strokeStyle=edge; ctx.lineWidth=1; ctx.stroke(); }
    }
  }
  function groundShadow(cx,cz,rw,alpha){
    var p=project(cx,0.6,cz); if(!p) return;
    ctx.save(); ctx.globalAlpha=alpha||0.34; ctx.fillStyle='#000';
    ctx.beginPath(); ctx.ellipse(p.x,p.y,rw*p.s,rw*p.s*0.4,0,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
  function fogOf(rz){ var t=(rz-1400)/2600; return t<0?0:t>0.82?0.82:t; }

  /* ===================== 烘焙精靈 ===================== */
  function bakeCv(w,h,fn){ var c=document.createElement('canvas'); c.width=w; c.height=h; fn(c.getContext('2d')); return c; }
  function glowDot(color){
    return bakeCv(40,40,function(g){
      var r=g.createRadialGradient(20,20,1,20,20,19);
      r.addColorStop(0,'#ffffff'); r.addColorStop(0.28,color); r.addColorStop(1,'rgba(0,0,0,0)');
      g.fillStyle=r; g.fillRect(0,0,40,40);
    });
  }
  var GLOW_WARM=glowDot('#ffd27a'), GLOW_ORANGE=glowDot('#ff8a2a'), GLOW_RED=glowDot('#ff5c3d'), GLOW_GREEN=glowDot('#a7d15a');
  var FLASH_CV=bakeCv(80,80,function(g){
    g.translate(40,40);
    var r=g.createRadialGradient(0,0,2,0,0,38);
    r.addColorStop(0,'rgba(255,247,220,0.98)'); r.addColorStop(0.35,'rgba(255,196,80,0.6)'); r.addColorStop(1,'rgba(255,122,26,0)');
    g.fillStyle=r; g.beginPath();
    for(var i=0;i<10;i++){ var a=i/10*Math.PI*2, rr=i%2===0?38:14; g.lineTo(Math.cos(a)*rr,Math.sin(a)*rr); }
    g.closePath(); g.fill();
  });
  var RED_VIGN=bakeCv(64,64,function(g){
    var r=g.createRadialGradient(32,32,10,32,32,32);
    r.addColorStop(0,'rgba(214,60,50,0)'); r.addColorStop(1,'rgba(214,50,42,0.9)');
    g.fillStyle=r; g.fillRect(0,0,64,64);
  });

  /* ===================== Web Audio 音效（去爆音） ===================== */
  var AC=null, master=null, muted=false, ambGain=null;
  function audioInit(){
    if(AC) return;
    try{
      AC = new (window.AudioContext||window.webkitAudioContext)();
      master = AC.createGain(); master.gain.value = muted?0:0.9; master.connect(AC.destination);
      // 背景音床：低頻風聲
      ambGain = AC.createGain(); ambGain.gain.value = 0.0; ambGain.connect(master);
      var bufSize = 2*AC.sampleRate, nb = AC.createBuffer(1,bufSize,AC.sampleRate), d=nb.getChannelData(0);
      for(var i=0;i<bufSize;i++) d[i]=(Math.random()*2-1)*0.4;
      var src=AC.createBufferSource(); src.buffer=nb; src.loop=true;
      var lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=240;
      src.connect(lp); lp.connect(ambGain); src.start();
      ambGain.gain.setTargetAtTime(0.05, AC.currentTime, 1.2);
    }catch(e){ AC=null; }
  }
  function tone(freq,dur,type,vol,slideTo){
    if(!AC||muted) return;
    var t=AC.currentTime, o=AC.createOscillator(), g=AC.createGain();
    o.type=type||'square'; o.frequency.setValueAtTime(freq,t);
    if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(40,slideTo), t+dur);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(vol||0.14, t+0.006); // 6ms attack 去爆音
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+0.02);
  }
  function noiseBurst(dur,vol,cut){
    if(!AC||muted) return;
    var t=AC.currentTime, n=Math.floor(AC.sampleRate*dur), b=AC.createBuffer(1,n,AC.sampleRate), d=b.getChannelData(0);
    for(var i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
    var s=AC.createBufferSource(); s.buffer=b;
    var f=AC.createBiquadFilter(); f.type='bandpass'; f.frequency.value=cut||1200; f.Q.value=0.8;
    var g=AC.createGain(); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol||0.2,t+0.005); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    s.connect(f); f.connect(g); g.connect(master); s.start(t); s.stop(t+dur+0.02);
  }
  var SFX={
    shot:function(){ tone(320,0.09,'square',0.13,90); noiseBurst(0.09,0.16,1800); },
    hit:function(){ tone(180,0.12,'sawtooth',0.16,70); noiseBurst(0.08,0.14,600); },
    kill:function(){ tone(520,0.1,'square',0.14,300); setTimeout(function(){tone(760,0.12,'square',0.12,420);},50); },
    head:function(){ tone(700,0.09,'square',0.14,520); tone(1040,0.12,'triangle',0.1,700); },
    hurt:function(){ tone(150,0.22,'sawtooth',0.2,60); noiseBurst(0.18,0.16,300); },
    wave:function(){ tone(440,0.14,'square',0.13,260); setTimeout(function(){tone(660,0.16,'square',0.12,200);},110); },
    combo:function(f){ tone(f||760,0.1,'square',0.12,f?f+180:940); },
    win:function(){ [523,659,784,1046].forEach(function(f,i){ setTimeout(function(){tone(f,0.18,'triangle',0.13,f);},i*110); }); },
    lose:function(){ [400,300,200,150].forEach(function(f,i){ setTimeout(function(){tone(f,0.24,'sawtooth',0.15,f*0.7);},i*130); }); },
    click:function(){ tone(600,0.05,'square',0.1,760); }
  };
  muteBtn.addEventListener('click',function(){
    muted=!muted; muteBtn.classList.toggle('muted',muted); muteBtn.textContent=muted?'🔇':'🔊';
    if(master) master.gain.value = muted?0:0.9;
  });

  /* ===================== 幹員 ===================== */
  var OPS=[
    {id:'assault',name:'威龍',role:'突擊 · 前線破門',c:'#ff7a1a',dmg:1.5,scr:1.0,bn:'火力×1.5'},
    {id:'recon',  name:'紅狼',role:'遊擊 · 遠程壓制',c:'#d64b3f',dmg:1.2,scr:1.2,bn:'穩定 均衡'},
    {id:'ghost',  name:'無名',role:'潛行 · 情報蒐集',c:'#8fae52',dmg:1.0,scr:1.5,bn:'計分×1.5'},
    {id:'cryo',   name:'液氮',role:'冷凍 · 戰場控制',c:'#38e1ff',dmg:1.3,scr:1.3,bn:'控場 全能'}
  ];
  var curOp=0;
  var opsWrap=document.getElementById('ops');
  OPS.forEach(function(o,i){
    var d=document.createElement('div');
    d.className='op'+(i===0?' sel':''); d.style.setProperty('--_c',o.c);
    d.innerHTML='<div class="nm">'+o.name+'</div><div class="rl">'+o.role+'</div><div class="bn">'+o.bn+'</div>';
    d.addEventListener('click',function(){
      curOp=i; SFX.click();
      Array.prototype.forEach.call(opsWrap.children,function(el,j){ el.classList.toggle('sel',j===i); });
    });
    opsWrap.appendChild(d);
  });

  /* ===================== 掩體（靜態場景） ===================== */
  var COVERS=[
    {x:-360,z:520,hw:150,h:56,hd:60,rgb:[122,120,78]},
    {x:380,z:640,hw:160,h:60,hd:64,rgb:[116,114,74]},
    {x:-120,z:960,hw:70,h:120,hd:70,rgb:[92,96,66]},
    {x:250,z:1180,hw:150,h:52,hd:60,rgb:[120,118,76]},
    {x:-480,z:1300,hw:80,h:130,hd:80,rgb:[86,90,62]},
    {x:60,z:1620,hw:180,h:64,hd:70,rgb:[110,110,72]},
    {x:520,z:1720,hw:90,h:118,hd:90,rgb:[90,94,64]},
    {x:-300,z:2100,hw:200,h:70,hd:80,rgb:[104,106,70]}
  ];

  /* ===================== 遊戲狀態 ===================== */
  var state='menu';  // menu | play | over
  var enemies=[], parts=[], floats=[], tracers=[];
  var score=0, wave=0, hp=100, kills=0, shots=0, hitsc=0, combo=0, comboMax=0, comboFlashT=0;
  var waveClearT=0, waveBannerT=0, spawnQueue=0, spawnT=0, aliveTarget=0;
  var shake=0, freeze=0, flash=0, recoil=0, hurtT=0, endTime=0;
  var muzzleT=0, muzzleX=0, muzzleY=0;
  var best=null; try{ best=localStorage.getItem('pro_delta3d_best'); }catch(e){}
  var resultData={win:false,rating:'C'};
  var ch={ x:480, y:280 };
  var keys={};
  var KEYMAP={ArrowLeft:'l',KeyA:'l',ArrowRight:'r',KeyD:'r',ArrowUp:'u',KeyW:'u',ArrowDown:'d',KeyS:'d'};

  function resetGame(){
    enemies.length=0; parts.length=0; floats.length=0; tracers.length=0;
    score=0; wave=0; hp=100; kills=0; shots=0; hitsc=0; combo=0; comboMax=0; comboFlashT=0;
    shake=0; freeze=0; flash=0; recoil=0; hurtT=0; muzzleT=0;
    waveClearT=0; waveBannerT=0; spawnQueue=0; spawnT=0; aliveTarget=0;
    startWave(1);
  }
  function startWave(n){
    wave=n;
    spawnQueue = 3 + n + Math.floor(n*0.6);
    aliveTarget = Math.min(6, 3 + Math.floor(n*0.5));
    waveBannerT = 2.2; spawnT = 0.4;
    SFX.wave();
  }
  function spawnEnemy(){
    var z = 1900 + Math.random()*900;
    var x = (Math.random()*2-1) * z*0.42;
    var spd = 74 + wave*10 + Math.random()*40;
    var ehp = 54 + wave*6;
    enemies.push({ x:x, z:z, y:0, spd:spd, hp:ehp, hpMax:ehp, t:Math.random()*6,
      dead:false, hitT:0, fireCd:1.2+Math.random()*1.6, breachT:0, rgb:[104,116,72], scale:0 });
    spawnQueue--;
  }

  /* ===================== 輸入 ===================== */
  function ptFromEvent(e){
    var r=cv.getBoundingClientRect();
    return { x:(e.clientX-r.left), y:(e.clientY-r.top) };
  }
  cv.addEventListener('pointermove',function(e){
    var p=ptFromEvent(e); ch.x=p.x; ch.y=p.y;
  });
  cv.addEventListener('pointerdown',function(e){
    e.preventDefault(); audioInit();
    var p=ptFromEvent(e); ch.x=p.x; ch.y=p.y;
    if(state==='menu') return; // 選單交給 HTML 按鈕
    if(state==='over'){ return; }
    fire();
  });
  fireBtn.addEventListener('pointerdown',function(e){ e.preventDefault(); audioInit(); if(state==='play') fire(); });
  addEventListener('keydown',function(e){
    if(e.code==='Space' || e.code==='Enter'){
      e.preventDefault(); audioInit();
      if(state==='menu'){ beginGame(); return; }
      if(state==='over'){ return; }
      fire(); return;
    }
    var k=KEYMAP[e.code]; if(k){ e.preventDefault(); keys[k]=true; }
  });
  addEventListener('keyup',function(e){ var k=KEYMAP[e.code]; if(k) keys[k]=false; });

  document.getElementById('startBtn').addEventListener('click',function(){ audioInit(); beginGame(); });
  addEventListener('resize',resize);

  function beginGame(){
    resultEl.textContent='';
    menuEl.classList.add('hide');
    if(IS_TOUCH) fireBtn.classList.add('on');
    state='play'; resetGame();
  }
  function endGame(win){
    state='over'; endTime=performance.now();
    var rating = score>=4200?'S':score>=2800?'A':score>=1500?'B':'C';
    resultData={win:win,rating:rating};
    var acc=shots>0?Math.round(hitsc/shots*100):0;
    var rec=rating+' / '+score;
    var prev=0; if(best){ var mm=best.match(/(\d+)/g); if(mm) prev=parseInt(mm[mm.length-1],10)||0; }
    if(score>prev){ best=rec; try{ localStorage.setItem('pro_delta3d_best',rec); }catch(e){} }
    if(win) SFX.win(); else SFX.lose();
    addShake(win?6:8);
    setTimeout(function(){
      menuEl.classList.remove('hide'); fireBtn.classList.remove('on');
      resultEl.innerHTML = (win?'⨀ 防線守住！':'⨀ 防線失守')+' 評分 <b>'+rating+'</b> · 得分 <b>'+score+'</b> · 命中率 '+acc+'% · 波次 '+wave+(best?' · 最佳 '+best:'');
    }, 700);
  }
  function addShake(v){ if(!REDUCED) shake=Math.max(shake,v); }

  /* ===================== 射擊（畫家序命中判定） ===================== */
  function burst(sx,sy,color,n,spd){
    for(var i=0;i<n;i++){ var a=Math.random()*Math.PI*2, s=(spd||160)*(0.3+Math.random()*0.8);
      parts.push({x:sx,y:sy,vx:Math.cos(a)*s,vy:Math.sin(a)*s-40,life:0.5+Math.random()*0.3,max:0.8,color:color,r:2+Math.random()*3}); }
  }
  function floatText(sx,sy,txt,color){ floats.push({x:sx,y:sy,txt:txt,color:color,life:0.9,age:0}); }
  function registerCombo(sx,sy){
    combo++; if(combo>comboMax) comboMax=combo;
    if(combo%5===0){
      var b=Math.round(20*(combo/5)*OPS[curOp].scr);
      score+=b; floatText(sx,sy-40,'連段 ×'+combo+' +'+b,'#ffcf5c');
      SFX.combo(760+combo*6); addShake(3.5); comboFlashT=0.45;
    }
  }
  function fire(){
    if(state!=='play') return;
    shots++; SFX.shot();
    muzzleT=0.09; recoil=1;
    // 曳光：由武器槍口（底部中央）射向準星
    tracers.push({x1:CX,y1:CSSH-52,x2:ch.x,y2:ch.y,life:0.09,player:true});
    // 命中判定：投影每個敵人取準星覆蓋且最近者
    var bi=-1, bd=1e9, head=false;
    var tol = (IS_TOUCH?16:9);
    for(var i=0;i<enemies.length;i++){
      var e=enemies[i]; if(e.dead) continue;
      var pc=project(e.x,58,e.z); if(!pc) continue;
      var rw=26*pc.s + tol;
      var dx=ch.x-pc.x, dy=ch.y-pc.y;
      if(dx*dx+dy*dy < rw*rw && pc.rz<bd){ bd=pc.rz; bi=i;
        var phd=project(e.x,102,e.z);
        head = phd ? ((ch.x-phd.x)*(ch.x-phd.x)+(ch.y-phd.y)*(ch.y-phd.y) < (16*pc.s+tol)*(16*pc.s+tol)) : false;
      }
    }
    if(bi>=0){
      hitsc++;
      var e2=enemies[bi];
      var dmg=34*OPS[curOp].dmg*(head?2.2:1);
      e2.hp-=dmg; e2.hitT=0.14;
      var pc2=project(e2.x,head?102:60,e2.z);
      var sx=pc2?pc2.x:ch.x, sy=pc2?pc2.y:ch.y;
      if(head){ SFX.head(); burst(sx,sy,'#ffe08a',10,200); }
      else { SFX.hit(); burst(sx,sy,'#ff9a4a',7,150); }
      if(e2.hp<=0){
        e2.dead=true; kills++;
        registerCombo(sx,sy);
        var base = head?140:90;
        var gain=Math.round(base*OPS[curOp].scr);
        score+=gain;
        floatText(sx,sy-24,(head?'爆頭 ':'')+'+'+gain,head?'#ffcf5c':'#ff7a1a');
        SFX.kill(); burst(sx,sy,'#ff7a1a',16,240); burst(sx,sy,'#ffd27a',8,120);
        addShake(head?6:4.5); flash=0.05; if(!REDUCED) freeze=0.045;
      } else {
        addShake(2.5); if(!REDUCED) freeze=0.02;
      }
    } else {
      combo=0;
      parts.push({x:ch.x,y:ch.y,vx:0,vy:0,life:0.22,max:0.22,color:'#5a6247',r:3});
      tone(210,0.05,'triangle',0.05);
    }
  }

  /* ===================== 更新 ===================== */
  function update(dt){
    // 準星鍵盤微調（任何狀態都可移動，play 時才有意義）
    var sp=520*dt;
    if(keys.l) ch.x-=sp; if(keys.r) ch.x+=sp;
    if(keys.u) ch.y-=sp; if(keys.d) ch.y+=sp;
    ch.x=Math.max(4,Math.min(CSSW-4,ch.x)); ch.y=Math.max(4,Math.min(CSSH-4,ch.y));

    // 相機隨準星微傾（小幅，避免頭暈）＋呼吸擺動
    var tnyaw = (ch.x/CSSW-0.5)*0.14;
    var tpit  = -(ch.y/CSSH-0.5)*0.06;
    if(!REDUCED){ var tt=performance.now()/1000; tnyaw+=Math.sin(tt*0.6)*0.006; tpit+=Math.sin(tt*0.9)*0.004; }
    cam.yaw += (tnyaw-cam.yaw)*Math.min(1,dt*7);
    cam.pitch += (tpit-cam.pitch)*Math.min(1,dt*7);

    if(state==='play'){
      if(freeze>0){ freeze-=dt; }
      else {
        // 波次生成
        if(spawnQueue>0){
          var alive=0; for(var a=0;a<enemies.length;a++) if(!enemies[a].dead) alive++;
          spawnT-=dt;
          if(spawnT<=0 && alive<aliveTarget){ spawnEnemy(); spawnT=0.7+Math.random()*0.6; }
        }
        waveBannerT=Math.max(0,waveBannerT-dt);

        for(var i=0;i<enemies.length;i++){
          var e=enemies[i]; if(e.dead) continue;
          e.t+=dt; e.hitT=Math.max(0,e.hitT-dt);
          if(e.scale<1) e.scale=Math.min(1,e.scale+dt*3);
          // 前進：z 往鏡頭方向縮小，x 略往中央靠
          e.z -= e.spd*dt;
          e.x += (-e.x*0.12)*dt;
          // 遠程射擊
          e.fireCd-=dt;
          if(e.fireCd<=0 && e.z<1500 && e.z>200){
            e.fireCd=1.4+Math.random()*1.8;
            var pm=project(e.x,60,e.z);
            if(pm){ tracers.push({x1:pm.x,y1:pm.y,x2:CX+(Math.random()*80-40),y2:CSSH-30,life:0.12,player:false}); }
            if(Math.random()<0.5){ hp-=5; hurtT=0.5; combo=0; SFX.hurt(); addShake(3); }
          }
          // 突破防線
          if(e.z<=150){ e.dead=true; hp-=16; hurtT=0.7; combo=0; SFX.hurt(); addShake(7); flash=0.06;
            floatText(CX,CSSH*0.5,'防線遭突破 -16','#ff5c3d'); }
        }
        // 清除死亡
        var still=[]; for(var c2=0;c2<enemies.length;c2++){ if(!enemies[c2].dead) still.push(enemies[c2]); }
        enemies=still;

        // 波次結束判定
        if(spawnQueue<=0 && enemies.length===0 && waveClearT<=0){
          waveClearT=1.6;
          score+=Math.round(120*OPS[curOp].scr) + wave*20;
          floatText(CX,CSSH*0.42,'波次 '+wave+' 肅清！','#a7d15a');
        }
        if(waveClearT>0){ waveClearT-=dt; if(waveClearT<=0) startWave(wave+1); }

        if(hp<=0){ hp=0; endGame(false); }
        if(wave>=8 && spawnQueue<=0 && enemies.length===0 && waveClearT<=0){ endGame(true); }
      }
    }

    // 粒子 / 曳光 / 飄字（各狀態都更新，讓結算殘留特效收尾）
    for(var p=0;p<parts.length;p++){ var q=parts[p]; q.x+=q.vx*dt; q.y+=q.vy*dt; q.vy+=380*dt; q.life-=dt; }
    parts=parts.filter(function(o){return o.life>0;});
    for(var t=tracers.length-1;t>=0;t--){ tracers[t].life-=dt; if(tracers[t].life<=0) tracers.splice(t,1); }
    for(var f=0;f<floats.length;f++){ floats[f].age+=dt; floats[f].y-=32*dt; floats[f].life-=dt; }
    floats=floats.filter(function(o){return o.life>0;});

    shake*=Math.pow(0.0016,dt);
    flash=Math.max(0,flash-dt*3);
    recoil=Math.max(0,recoil-dt*6);
    hurtT=Math.max(0,hurtT-dt);
    comboFlashT=Math.max(0,comboFlashT-dt);
    muzzleT=Math.max(0,muzzleT-dt);
  }

  /* ===================== 繪圖 ===================== */
  function drawSky(){
    ctx.drawImage(SKY_CV,0,0,CSSW,CSSH);
    // 地平線位置：投影正前方地平點
    var hp=project(cam.x, cam.y, cam.z+9000);
    var hy=hp?hp.y:CSSH*0.5; hy=Math.max(CSSH*0.28,Math.min(CSSH*0.72,hy));
    ctx.drawImage(GND_CV,0,0,CSSW,240, 0,hy,CSSW,CSSH-hy);
    // 地面網格（世界線，隨視角轉動）
    ctx.strokeStyle='rgba(150,168,110,0.16)'; ctx.lineWidth=1;
    var GAP=300;
    for(var gx=-2400; gx<=2400; gx+=GAP){
      var pa=project(gx,0,cam.z+220), pb=project(gx,0,cam.z+5200);
      if(pa&&pb){ ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke(); }
    }
    for(var gz=300; gz<=5200; gz+=GAP){
      var pc=project(-2400,0,cam.z+gz), pd=project(2400,0,cam.z+gz);
      if(pc&&pd){ ctx.globalAlpha=Math.max(0.05,1-(gz/5200)); ctx.beginPath(); ctx.moveTo(pc.x,pc.y); ctx.lineTo(pd.x,pd.y); ctx.stroke(); ctx.globalAlpha=1; }
    }
  }

  function drawSoldier(e){
    var fog=fogOf(e.z);
    var bob = REDUCED?0:Math.sin(e.t*7)*3;
    var sw = REDUCED?0:Math.sin(e.t*7)*8; // 腿部擺動
    var sc=e.scale;
    var by = (1-sc)* -20 + bob; // 生成時從地面拉起
    groundShadow(e.x,e.z,30, 0.32*sc);
    var base = e.hitT>0 ? [230,235,220] : e.rgb;
    var dark = e.hitT>0 ? [210,214,200] : [72,82,52];
    var head = e.hitT>0 ? [235,238,224] : [188,168,132];
    // 腿
    drawBox3D(e.x-11, by+0, e.z+sw*0.4, 9, 40, 11, dark, fog, 'rgba(0,0,0,.25)');
    drawBox3D(e.x+11, by+0, e.z-sw*0.4, 9, 40, 11, dark, fog, 'rgba(0,0,0,.25)');
    // 軀幹
    drawBox3D(e.x, by+38, e.z, 24, 40, 16, base, fog, 'rgba(0,0,0,.28)');
    // 戰術背心暗帶
    drawBox3D(e.x, by+40, e.z-15.5, 20, 24, 2, [60,68,44], fog, null);
    // 手臂
    drawBox3D(e.x-27, by+40, e.z, 7, 34, 9, dark, fog, 'rgba(0,0,0,.25)');
    drawBox3D(e.x+22, by+42, e.z-6, 7, 26, 9, dark, fog, 'rgba(0,0,0,.25)');
    // 步槍（朝鏡頭方向的長盒）
    drawBox3D(e.x+22, by+52, e.z-28, 5, 6, 26, [40,40,44], fog, null);
    // 頭
    drawBox3D(e.x, by+80, e.z, 14, 20, 14, head, fog, 'rgba(0,0,0,.3)');
    // 頭盔
    drawBox3D(e.x, by+98, e.z, 16, 9, 16, [70,80,52], fog, 'rgba(0,0,0,.3)');
    // 感應眼（發光）
    var pe=project(e.x, by+90, e.z-14);
    if(pe){ ctx.save(); ctx.globalCompositeOperation='lighter';
      var gs=Math.max(6,14*pe.s); ctx.globalAlpha=0.9;
      ctx.drawImage(e.hitT>0?GLOW_WARM:GLOW_RED, pe.x-gs, pe.y-gs, gs*2, gs*2); ctx.restore(); }
    // 開火閃光（fireCd 剛觸發：quick flash）
    if(e.fireCd>1.3){ var pf=project(e.x+22, by+52, e.z-40); if(pf){ ctx.save(); ctx.globalCompositeOperation='lighter';
      var fs=Math.max(8,20*pf.s); ctx.globalAlpha=0.8; ctx.drawImage(FLASH_CV, pf.x-fs, pf.y-fs, fs*2, fs*2); ctx.restore(); } }
    // 血條（受創時）
    if(e.hp<e.hpMax){
      var ph=project(e.x,by+118,e.z);
      if(ph){ var bw=Math.max(24,40*ph.s), r=e.hp/e.hpMax;
        ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(ph.x-bw/2,ph.y,bw,5);
        ctx.fillStyle=r>0.5?'#a7d15a':r>0.25?'#ffcf5c':'#ff5c3d'; ctx.fillRect(ph.x-bw/2,ph.y,bw*r,5); }
    }
  }

  function drawCover(cvr){
    var fog=fogOf(cvr.z);
    groundShadow(cvr.x,cvr.z,cvr.hw*0.9,0.3);
    drawBox3D(cvr.x,0,cvr.z,cvr.hw,cvr.h,cvr.hd,cvr.rgb,fog,'rgba(20,26,14,.5)');
    // 沙包紋路（頂面幾條）
    // 略：以邊線與受光呈現，維持效能
  }

  function drawWeapon(){
    // 第一人稱武器（螢幕空間，含後座下沉）
    var ky = recoil*14;
    ctx.save();
    ctx.translate(CX, CSSH+ky);
    // 槍身
    ctx.fillStyle='#22261c'; ctx.strokeStyle='#0f120b'; ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(-16,-6); ctx.lineTo(16,-6); ctx.lineTo(20,-96); ctx.lineTo(-8,-150); ctx.lineTo(-20,-120); ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.fillStyle='#2c3120';
    ctx.fillRect(-44,-14,88,16);
    ctx.strokeRect(-44,-14,88,16);
    // 準星護耳
    ctx.strokeStyle='#3a4028'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(-8,-150); ctx.lineTo(-8,-166); ctx.stroke();
    // 槍口閃光
    if(muzzleT>0){
      ctx.globalCompositeOperation='lighter';
      ctx.globalAlpha=muzzleT/0.09;
      var fs=70; ctx.drawImage(FLASH_CV, -8-fs, -160-fs, fs*2, fs*2);
      ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
    }
    ctx.restore();
  }

  function drawCrosshair(){
    // 判斷是否鎖定敵人 → 變紅
    var lock=false;
    for(var i=0;i<enemies.length;i++){ var e=enemies[i]; if(e.dead) continue;
      var pc=project(e.x,58,e.z); if(!pc) continue; var rw=26*pc.s+8;
      var dx=ch.x-pc.x,dy=ch.y-pc.y; if(dx*dx+dy*dy<rw*rw){ lock=true; break; } }
    ctx.save(); ctx.translate(ch.x,ch.y);
    var kick=1+recoil*0.5; ctx.scale(kick,kick);
    ctx.strokeStyle=lock?'#ff4d3d':'#ffb15e'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,0,lock?10:13,0,Math.PI*2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-20,0); ctx.lineTo(-7,0); ctx.moveTo(7,0); ctx.lineTo(20,0);
    ctx.moveTo(0,-20); ctx.lineTo(0,-7); ctx.moveTo(0,7); ctx.lineTo(0,20); ctx.stroke();
    ctx.fillStyle=lock?'#ff4d3d':'#ffb15e'; ctx.fillRect(-1.5,-1.5,3,3);
    ctx.restore();
  }

  function glassPanel(x,y,w,h){
    ctx.fillStyle='rgba(10,14,8,0.52)'; ctx.fillRect(x,y,w,h);
    var g=ctx.createLinearGradient(x,y,x,y+h); // HUD 面板少量，靜態一次可接受
    g.addColorStop(0,'rgba(255,255,255,0.10)'); g.addColorStop(0.5,'rgba(255,255,255,0)');
    ctx.fillStyle=g; ctx.fillRect(x,y,w,h*0.5);
    ctx.strokeStyle='rgba(74,85,54,0.9)'; ctx.lineWidth=1; ctx.strokeRect(x+0.5,y+0.5,w-1,h-1);
    ctx.strokeStyle='#ff7a1a'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x,y+12); ctx.lineTo(x,y); ctx.lineTo(x+12,y); ctx.stroke();
  }

  function drawHUD(){
    // 左上：得分＋連段
    glassPanel(14,14,150,58);
    ctx.textAlign='left'; ctx.fillStyle='#9aa088'; ctx.font='bold 12px '+ 'monospace';
    ctx.fillText('SCORE',24,32);
    ctx.fillStyle='#e7e2d2'; ctx.font='bold 24px monospace'; ctx.fillText(String(score),24,58);
    if(combo>=3){ ctx.save(); var cs=1+comboFlashT*0.5; ctx.translate(24,88); ctx.scale(cs,cs);
      ctx.fillStyle='#ffcf5c'; ctx.font='bold 15px monospace'; ctx.fillText('連段 ×'+combo,0,0); ctx.restore(); }
    // 中上：波次
    glassPanel(CX-70,14,140,36);
    ctx.textAlign='center'; ctx.fillStyle='#ff7a1a'; ctx.font='bold 18px monospace';
    ctx.fillText('WAVE '+wave+' / 8', CX, 38);
    // 右上：幹員
    glassPanel(CSSW-174,14,160,44);
    ctx.textAlign='right'; ctx.fillStyle='#9aa088'; ctx.font='bold 11px monospace'; ctx.fillText('OPERATOR',CSSW-24,32);
    ctx.fillStyle=OPS[curOp].c; ctx.font='bold 17px '+ '"Microsoft JhengHei",sans-serif'; ctx.fillText(OPS[curOp].name,CSSW-24,52);
    // 底部：HP 條（玻璃）
    var bw=Math.min(360,CSSW-40), bx=CX-bw/2, byy=CSSH-30;
    glassPanel(bx-4,byy-6,bw+8,20);
    var r=hp/100;
    var g2=ctx.createLinearGradient(bx,0,bx+bw,0);
    g2.addColorStop(0,'#d64b3f'); g2.addColorStop(0.5,'#ffab5e'); g2.addColorStop(1,'#a7d15a');
    ctx.fillStyle=g2; ctx.fillRect(bx,byy,bw*r,10);
    ctx.fillStyle='rgba(255,255,255,.25)'; ctx.fillRect(bx,byy,bw*r,3);
    ctx.textAlign='center'; ctx.fillStyle='#e7e2d2'; ctx.font='bold 11px monospace';
    ctx.fillText('HP '+Math.ceil(hp),CX,byy+9);
    // 波次橫幅
    if(waveBannerT>0){
      ctx.globalAlpha=Math.min(1,waveBannerT);
      ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(0,CSSH*0.5-50,CSSW,100);
      ctx.textAlign='center'; ctx.fillStyle='#ff7a1a'; ctx.font='bold 40px "Microsoft JhengHei",sans-serif';
      ctx.fillText('波次 '+wave,CX,CSSH*0.5-4);
      ctx.fillStyle='#e7e2d2'; ctx.font='18px "Microsoft JhengHei",sans-serif';
      ctx.fillText('敵對小隊推進中——瞄準爆頭可得雙倍分數',CX,CSSH*0.5+30);
      ctx.globalAlpha=1;
    }
  }

  function drawParticles(){
    ctx.globalCompositeOperation='lighter';
    for(var i=0;i<parts.length;i++){ var p=parts[i];
      var a=Math.max(0,p.life/p.max); var gs=p.r*3;
      ctx.globalAlpha=a*0.7; ctx.drawImage(GLOW_ORANGE,p.x-gs,p.y-gs,gs*2,gs*2);
      ctx.globalAlpha=a; ctx.fillStyle=p.color; ctx.fillRect(p.x-p.r/2,p.y-p.r/2,p.r,p.r);
    }
    ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
  }
  function drawTracers(){
    for(var i=0;i<tracers.length;i++){ var t=tracers[i];
      var a=t.life/0.12;
      ctx.strokeStyle=t.player?'rgba(255,207,92,'+(a*0.85)+')':'rgba(255,90,70,'+(a*0.8)+')';
      ctx.lineWidth=t.player?2:2.5;
      ctx.beginPath(); ctx.moveTo(t.x1,t.y1); ctx.lineTo(t.x2,t.y2); ctx.stroke();
    }
  }
  function easeOutBack(t){ var c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); }
  function drawFloats(){
    ctx.textAlign='center';
    for(var i=0;i<floats.length;i++){ var f=floats[i];
      var pop=Math.max(0,easeOutBack(Math.min(1,f.age/0.28)));
      ctx.save(); ctx.translate(f.x,f.y); ctx.scale(pop,pop);
      ctx.globalAlpha=Math.min(1,f.life*1.6); ctx.fillStyle=f.color; ctx.font='bold 20px monospace';
      ctx.strokeStyle='rgba(0,0,0,.55)'; ctx.lineWidth=3; ctx.strokeText(f.txt,0,0); ctx.fillText(f.txt,0,0);
      ctx.restore();
    }
    ctx.globalAlpha=1;
  }

  function drawMenuScene(){
    // 選單背景：靜態 3D 場景緩慢巡場
    var t=performance.now()/1000;
    cam.yaw=Math.sin(t*0.15)*0.12; cam.pitch=-0.02; camUpdate();
    drawSky();
    // 掩體
    var order=COVERS.slice().sort(function(a,b){return b.z-a.z;});
    for(var i=0;i<order.length;i++) drawCover(order[i]);
    ctx.drawImage(VIGN_CV,0,0,CSSW,CSSH);
  }

  function draw(){
    camUpdate();
    if(state==='menu'){ drawMenuScene(); return; }
    ctx.save();
    if(shake>0.3) ctx.translate((Math.random()*2-1)*shake,(Math.random()*2-1)*shake);
    drawSky();
    // 收集可畫物件（掩體＋敵人）→ 依相機深度由遠到近排序（畫家演算法）
    var draws=[];
    for(var i=0;i<COVERS.length;i++){ var c=COVERS[i]; var p=project(c.x,c.h*0.5,c.z); if(p) draws.push({d:p.rz,k:0,o:c}); }
    for(var j=0;j<enemies.length;j++){ var e=enemies[j]; if(e.dead) continue; var pe=project(e.x,58,e.z); if(pe) draws.push({d:pe.rz,k:1,o:e}); }
    draws.sort(function(a,b){return b.d-a.d;});
    for(var d=0;d<draws.length;d++){ if(draws[d].k===0) drawCover(draws[d].o); else drawSoldier(draws[d].o); }
    drawTracers();
    drawParticles();
    ctx.restore();
    // 命中白閃
    if(flash>0){ ctx.fillStyle='rgba(255,240,210,'+(flash*0.6)+')'; ctx.fillRect(0,0,CSSW,CSSH); }
    // 暗角
    ctx.drawImage(VIGN_CV,0,0,CSSW,CSSH);
    // 受傷紅暈
    if(hurtT>0){ ctx.globalAlpha=Math.min(0.6,hurtT); ctx.drawImage(RED_VIGN,0,0,CSSW,CSSH); ctx.globalAlpha=1; }
    drawWeapon();
    drawFloats();
    drawHUD();
    drawCrosshair();
  }

  /* ===================== 主迴圈（固定時間步進） ===================== */
  var STEP=1/60, last=performance.now(), acc=0;
  function frame(now){
    requestAnimationFrame(frame);
    acc += Math.min((now-last)/1000, 0.1); last=now;
    var guard=0;
    while(acc>=STEP && guard<8){ update(STEP); acc-=STEP; guard++; }
    if(guard>=8) acc=0;
    draw();
  }
  resize();
  requestAnimationFrame(frame);

  // 供自動測試檢查
  window.__sim = { getState:function(){ return {state:state,wave:wave,score:score,hp:hp,enemies:enemies.length}; } };
})();
</script>




<script>/* AI-CAMP-STATS-BEACON */
(function(){

  var NS="ai-future-camp", K="pro-t-19bd2182";

  var REL="/abacus/"; /* 同源代理（Vercel 轉發）：學校閘道擋外部網域時仍然通 */
  function ping(n){
    try{
      fetch(REL+"hit/"+NS+"/"+n).then(function(r){
        if(!r||!r.ok){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); }
      }).catch(function(){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); });
    }catch(e){}
  }
  function read(n,cb){
    function via(base,next){ try{ fetch(base+"get/"+NS+"/"+n).then(function(r){ if(r.status===404&&base===ABS) return {value:0}; if(!r.ok) throw 0; return r.json(); }).then(function(j){ cb(j.value||j.count||0); }).catch(next); }catch(e){ next(); } }
    via(REL, function(){ via(ABS, function(){ cb(null); }); });
  }
  ping(K+"-v");
  var done=false;
  function once(){ if(done)return; done=true; ping(K+"-p"); ping("site-total-plays");
    window.removeEventListener("pointerdown",once); window.removeEventListener("keydown",once); }
  window.addEventListener("pointerdown",once,{once:false}); window.addEventListener("keydown",once,{once:false});
  /* 投票鈕：非常好玩/好玩——與作品館同一計數器，任何網頁打開都同步 */
  function initVotes(){
    if(!document.body) return;
    var wrap=document.createElement("div");
    wrap.style.cssText="position:fixed;right:10px;bottom:10px;z-index:99999;display:flex;gap:6px;font-family:sans-serif;opacity:.92";
    var LS="voted-"+K;
    var defs=[["-love","\u2764\uFE0F","\u975e\u5e38\u597d\u73a9","#ff6cc7"],["-like","\ud83d\udc4d","\u597d\u73a9","#38e1ff"]];
    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;
          b.querySelector("i").textContent=Math.max(0,(n||0)-(c||0));
        }); });
      });
    }
    defs.forEach(function(d){
      var b=document.createElement("button");
      b.type="button"; b.title=d[2];
      b.style.cssText="min-height:42px;padding:8px 14px;border:none;border-radius:999px;background:rgba(15,18,32,.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation";
      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";
      b.addEventListener("click",function(){
        var prev=null; try{ prev=localStorage.getItem(LS); }catch(e){}
        if(prev===d[0]){ ping(K+d[0]+"-c"); try{ localStorage.removeItem(LS); }catch(e){} }
        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);
      });
      btns[d[0]]=b; wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    refresh();
    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* 每10秒同步別人投的票 */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
</script>
