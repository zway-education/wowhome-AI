<!-- 補強輪：角色臉部表情多狀態(平常/受擊/開心)＋離屏烘焙sprite／觸控可玩性複查／大螢幕提醒浮層 -->

<body>

<script>
// 大螢幕提醒：只在手機尺寸、且本次 session 尚未看過時顯示；不阻擋下方遊戲初始化
(function(){
  var isPhone = false;
  try{ isPhone = Math.min(screen.width, screen.height) < 600 || window.innerWidth < 768; }catch(e){}
  if(!isPhone) return;
  var seen = false;
  try{ seen = !!sessionStorage.getItem('bigscreen-hint'); }catch(e){}
  if(seen) return;
  var el = document.getElementById('bigScreenHint');
  el.style.display = 'flex';
  document.getElementById('bshOk').addEventListener('click', function(){
    try{ sessionStorage.setItem('bigscreen-hint','1'); }catch(e){}
    el.classList.add('bsh-hide');
    setTimeout(function(){ if(el && el.parentNode) el.parentNode.removeChild(el); }, 400);
  }, { once:true });
})();

<button id="muteBtn" aria-label="靜音切換">

<script>
'use strict';
// ============ 基本設定 ============
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize(){
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width  = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale;
}
addEventListener('resize', resize); resize();
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));

// ============ 音效：Web Audio 合成（壓縮器母線＋隨機音高） ============
let AC = null, master = null, muted = false, ambGain = null, ambDuck = null, ambLevel = 0.02;
function audio(){
  if(!AC){
    AC = new (window.AudioContext||window.webkitAudioContext)();
    const comp = AC.createDynamicsCompressor();
    comp.threshold.value = -18; comp.knee.value = 24; comp.ratio.value = 8;
    master = AC.createGain(); master.gain.value = 0.9;
    master.connect(comp).connect(AC.destination);
    try{
      // v6：程序化殘響——generated impulse，空曠賽場空間感
      const ir = AC.createBuffer(2, (AC.sampleRate*1.2)|0, AC.sampleRate);
      for(let ch=0;ch<2;ch++){
        const d = ir.getChannelData(ch);
        for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/d.length, 2.8);
      }
      const conv = AC.createConvolver(); conv.buffer = ir;
      const wet = AC.createGain(); wet.gain.value = 0.14;
      comp.connect(conv); conv.connect(wet); wet.connect(AC.destination);
      // v6：城市夜風氛圍層（低通噪聲＋緩慢起伏，4 秒無縫循環）
      const sr = AC.sampleRate, len = sr*4, buf = AC.createBuffer(1, len, sr), ad = buf.getChannelData(0);
      let lp = 0;
      for(let i=0;i<len;i++){
        const t = i/sr, w = Math.random()*2-1;
        lp += (w-lp)*0.018;
        ad[i] = lp*(0.6+0.4*Math.sin(t*2.2)+0.15*Math.sin(t*7.7))*1.5;
      }
      const f = (sr*0.12)|0;
      for(let i=0;i<f;i++){ const a=i/f; ad[i]=ad[i]*a+ad[len-f+i]*(1-a); }
      const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
      ambGain = AC.createGain(); ambGain.gain.value = 0;
      ambDuck = AC.createGain(); ambDuck.gain.value = 1;
      src.connect(ambGain); ambGain.connect(ambDuck); ambDuck.connect(master);
      src.start();
      setAmbLevel(ambLevel);
    }catch(e){}
  }
  if(AC.state === 'suspended') AC.resume();
  return AC;
}
function setAmbLevel(v){
  ambLevel = v;
  if(AC && ambGain) ambGain.gain.setTargetAtTime(muted ? 0 : v, AC.currentTime, 0.6);
}
function duckAmb(){
  if(!AC || !ambDuck || muted) return;
  const t0 = AC.currentTime;
  ambDuck.gain.cancelScheduledValues(t0);
  ambDuck.gain.setTargetAtTime(0.35, t0, 0.015);
  ambDuck.gain.setTargetAtTime(1, t0+0.12, 0.25);
}
addEventListener('pointerdown', audio, { once:true });
addEventListener('keydown', audio, { once:true });
function beep(freq=440, dur=0.1, type='square', vol=0.15, slide=0){
  if(muted || !AC) return;
  const ac = audio();
  if(vol >= 0.12) duckAmb();                       // v6：主音效壓低氛圍層
  freq *= 0.94 + Math.random()*0.12;               // 隨機音高
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, ac.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), ac.currentTime + dur);
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g).connect(master);
  o.start(); o.stop(ac.currentTime + dur);
}
function noise(dur=0.15, vol=0.12){
  if(muted || !AC) return;
  const ac = audio(), n = Math.floor(ac.sampleRate*dur);
  if(vol >= 0.12) duckAmb();                       // v6
  const buf = ac.createBuffer(1, n, ac.sampleRate), d = buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i] = (Math.random()*2-1) * (1 - i/n);
  const s = ac.createBufferSource(); s.buffer = buf;
  const g = ac.createGain(); g.gain.value = vol;
  s.connect(g).connect(master); s.start();
}
const sndJump  = ()=>beep(230, 0.13, 'square', 0.12, +400);
const sndLand  = ()=>{ beep(120, 0.06, 'triangle', 0.09); };
const sndCoin  = ()=>{ beep(990, 0.07, 'square', 0.12); setTimeout(()=>beep(1320,0.13,'square',0.12), 65); };
const sndCheck = ()=>{ [660,880,1108].forEach((f,i)=>setTimeout(()=>beep(f,0.1,'square',0.13), i*85)); };
const sndHurt  = ()=>{ beep(170, 0.24, 'sawtooth', 0.18, -130); noise(0.18, 0.1); };
const sndSpring= ()=>beep(300, 0.2, 'square', 0.14, +620);
const sndCrack = ()=>noise(0.1, 0.08);
const sndWin   = ()=>{ [660,880,1108,1320,1760].forEach((f,i)=>setTimeout(()=>beep(f,0.17,'square',0.14), i*100)); };
const sndUI    = ()=>beep(520, 0.06, 'triangle', 0.1);
const sndDeny  = ()=>beep(150, 0.14, 'sawtooth', 0.12, -60);
const sndStar  = ()=>{ beep(1320,0.12,'triangle',0.14); setTimeout(()=>beep(1760,0.2,'triangle',0.14),90); };
const muteBtn = document.getElementById('muteBtn');
muteBtn.addEventListener('click', ()=>{
  muted = !muted;
  document.getElementById('icoOn').style.display = muted?'none':'block';
  document.getElementById('icoOff').style.display = muted?'block':'none';
  setAmbLevel(ambLevel);   // v6：靜音同步氛圍層
});
// 返回選關鈕（觸控裝置沒有實體 ESC 鍵，遊玩中必須也能一鍵離開關卡）
const backBtn = document.getElementById('backBtn');
backBtn.addEventListener('click', ()=>{
  if(state === playState){ sndUI(); setState(selectState); }
});

// ============ 主題（每關一色系） ============
const THEMES = [
  { name:'新手廣場', sky1:'#0d0221', sky2:'#3b1a63', hill:'rgba(90,63,160,.4)',  bld:'rgba(52,32,96,.55)',  top:'#6a4fc4', side:'#3d2b6b', dark:'#2a1c4e', edge:'rgba(0,240,255,.35)' },
  { name:'移動平臺塔', sky1:'#2b0f3a', sky2:'#c2452f', hill:'rgba(150,60,70,.4)', bld:'rgba(90,30,60,.55)',  top:'#e08a4e', side:'#8a4130', dark:'#5c2a20', edge:'rgba(255,214,110,.4)' },
  { name:'崩塌遺跡', sky1:'#04202c', sky2:'#146b6b', hill:'rgba(30,120,120,.35)', bld:'rgba(15,80,90,.55)',  top:'#54c6b8', side:'#20706e', dark:'#154a4a', edge:'rgba(140,255,230,.35)' },
  { name:'彈跳工廠', sky1:'#170b2e', sky2:'#5a2a8a', hill:'rgba(140,70,190,.35)', bld:'rgba(70,30,120,.55)', top:'#a76ae8', side:'#5d3a94', dark:'#3c2463', edge:'rgba(255,108,199,.4)' },
  { name:'終極試煉', sky1:'#1c0505', sky2:'#7a1f10', hill:'rgba(170,60,30,.4)',  bld:'rgba(100,30,20,.55)', top:'#e06a3c', side:'#7e3020', dark:'#521e14', edge:'rgba(255,207,92,.45)' },
];
const PAL = { accent:'#00f0ff', pink:'#ff2975', gold:'#ffd700', white:'#f6f6f6', green:'#3fe08a' };

// ---- 烘焙天空（避免每幀重算漸層；v6：加主題色星雲、地平線霞光、月面坑洞） ----
let skyCv = null, bldCvs = [], vignCv = null, beamCv = null;
function bakeSky(th){
  skyCv = document.createElement('canvas'); skyCv.width = GAME_W; skyCv.height = GAME_H;
  const c = skyCv.getContext('2d');
  const g = c.createLinearGradient(0,0,0,GAME_H);
  g.addColorStop(0, th.sky1); g.addColorStop(1, th.sky2);
  c.fillStyle = g; c.fillRect(0,0,GAME_W,GAME_H);
  // v6：主題色星雲兩團（頂面色低透明擴散）
  let nb = c.createRadialGradient(GAME_W*0.25, 130, 10, GAME_W*0.25, 130, 300);
  nb.addColorStop(0, th.top); nb.addColorStop(1, 'rgba(0,0,0,0)');
  c.globalAlpha = 0.14; c.fillStyle = nb; c.fillRect(0,0,GAME_W*0.62,GAME_H*0.8);
  nb = c.createRadialGradient(GAME_W*0.62, 60, 10, GAME_W*0.62, 60, 240);
  nb.addColorStop(0, th.side); nb.addColorStop(1, 'rgba(0,0,0,0)');
  c.globalAlpha = 0.18; c.fillStyle = nb; c.fillRect(GAME_W*0.3,0,GAME_W*0.62,GAME_H*0.6);
  c.globalAlpha = 1;
  // 星星與微光（烘焙）
  for(let i=0;i<60;i++){
    const x = (i*173.3)%GAME_W, y = (i*97.7)%(GAME_H*.62), s = 1+(i%3);
    c.globalAlpha = .25 + (i%5)*.12;
    c.fillStyle = '#fff'; c.fillRect(x, y, s, s);
  }
  c.globalAlpha = 1;
  const glow = c.createRadialGradient(GAME_W*.78, 90, 10, GAME_W*.78, 90, 180);
  glow.addColorStop(0,'rgba(255,255,255,.28)'); glow.addColorStop(1,'rgba(255,255,255,0)');
  c.fillStyle = glow; c.fillRect(GAME_W*.78-180, -90, 360, 360);
  c.fillStyle = 'rgba(255,255,240,.9)'; c.beginPath(); c.arc(GAME_W*.78, 90, 26, 0, Math.PI*2); c.fill();
  c.fillStyle = 'rgba(0,0,0,.08)'; c.beginPath(); c.arc(GAME_W*.78-8, 84, 6, 0, Math.PI*2); c.arc(GAME_W*.78+7, 96, 4, 0, Math.PI*2); c.fill();
  // v6：地平線霞光帶
  const hz = c.createLinearGradient(0, GROUND_Y-160, 0, GROUND_Y+60);
  hz.addColorStop(0,'rgba(255,255,255,0)'); hz.addColorStop(1, th.edge);
  c.globalAlpha = 0.5; c.fillStyle = hz; c.fillRect(0, GROUND_Y-160, GAME_W, 220);
  c.globalAlpha = 1;
  // v6：漸層大樓烘焙（三種高度，含受光面/窗燈/屋頂天線）
  bldCvs = [0,1,2].map(v=>{
    const h = 130 + v*40;
    const cv = document.createElement('canvas'); cv.width = 130; cv.height = h + 40;
    const b = cv.getContext('2d');
    b.fillStyle = th.bld; b.fillRect(0, 40, 130, h);
    b.fillStyle = 'rgba(255,255,255,.07)'; b.fillRect(0, 40, 28, h);      // 左受光
    b.fillStyle = 'rgba(0,0,0,.28)'; b.fillRect(102, 40, 28, h);          // 右陰影
    b.fillStyle = 'rgba(255,255,255,.1)'; b.fillRect(0, 40, 130, 4);      // 頂亮
    for(let r=0;r<Math.floor(h/34);r++)                                    // 窗燈（明暗交錯）
      for(let w=0;w<3;w++){
        b.globalAlpha = ((r*3+w+v)%4===0) ? 0.3 : 0.12;
        b.fillStyle = '#ffe9b0';
        b.fillRect(18+w*38, 62+r*34, 18, 18);
      }
    b.globalAlpha = 1;
    b.strokeStyle = 'rgba(255,255,255,.25)'; b.lineWidth = 2;              // 天線
    b.beginPath(); b.moveTo(65, 40); b.lineTo(65, 14); b.stroke();
    b.fillStyle = th.edge; b.beginPath(); b.arc(65, 12, 3, 0, Math.PI*2); b.fill();
    return cv;
  });
  // v6：vignette 與終點光柱（只烘焙一次）
  if(!vignCv){
    vignCv = document.createElement('canvas'); vignCv.width = GAME_W; vignCv.height = GAME_H;
    const v = vignCv.getContext('2d');
    const vg = v.createRadialGradient(GAME_W/2, GAME_H/2, GAME_H*0.5, GAME_W/2, GAME_H/2, GAME_H*1.05);
    vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(5,2,18,0.4)');
    v.fillStyle = vg; v.fillRect(0,0,GAME_W,GAME_H);
    beamCv = document.createElement('canvas'); beamCv.width = 120; beamCv.height = 340;
    const bm = beamCv.getContext('2d');
    const bg2 = bm.createLinearGradient(0,0,0,340);
    bg2.addColorStop(0,'rgba(255,215,0,0)'); bg2.addColorStop(1,'rgba(255,215,0,0.4)');
    bm.fillStyle = bg2;
    bm.beginPath(); bm.moveTo(38,0); bm.lineTo(82,0); bm.lineTo(112,340); bm.lineTo(8,340); bm.closePath(); bm.fill();
  }
}
// v6：霓虹光塵氛圍粒子（隨鏡頭視差漂浮）
const motes = [];
for(let i=0;i<16;i++) motes.push({ x:Math.random()*GAME_W*1.4, y:Math.random()*GAME_H, sp:8+Math.random()*18, ph:Math.random()*7 });
function drawMotes(cx, t){
  ctx.fillStyle = TH.edge;
  for(const m of motes){
    const wx = ((m.x - cx*0.85) % (GAME_W+80) + (GAME_W+80)) % (GAME_W+80) - 40 + cx;
    const wy = (m.y - t*m.sp) % GAME_H;
    const yy = wy < 0 ? wy + GAME_H : wy;
    ctx.globalAlpha = 0.25 + 0.3*Math.abs(Math.sin(t*1.4 + m.ph));
    ctx.fillRect(wx, yy, 3, 3);
  }
  ctx.globalAlpha = 1;
}
// v6：高速殘影
const trail = [];
let trailT = 0, stepT = 0;

// ============ 輸入：鍵盤＋虛擬按鈕觸控 ============
const input = { left:false, right:false, action:false, actionBuffer:0 };
const KEYMAP = { ArrowLeft:'left', KeyA:'left', ArrowRight:'right', KeyD:'right',
                 Space:'action', ArrowUp:'action', KeyW:'action' };
let keyDirs = { left:false, right:false }, keyAction = false;
addEventListener('keydown', e => {
  if(e.code === 'Escape' && state === playState){ setState(selectState); return; }
  if(e.code === 'KeyR' && (state === clearState)){ startLevel(curLevel); return; }
  const a = KEYMAP[e.code];
  if(!a){ if(['Enter'].includes(e.code)){ e.preventDefault(); if(!input.action) input.actionBuffer = 0.14; input.action = true; keyAction = true; } return; }
  e.preventDefault();
  if(a === 'action'){ if(!input.action) input.actionBuffer = 0.14; keyAction = true; }
  else keyDirs[a] = true;
  syncInput();
});
addEventListener('keyup', e => {
  const a = KEYMAP[e.code] || (e.code==='Enter'?'action':null); if(!a) return;
  if(a === 'action') keyAction = false; else keyDirs[a] = false;
  syncInput();
});
// 虛擬按鈕（左下 ◀ ▶、右下 跳）— 觸控目標遠大於 48px
const BTN = {
  left:  { x:80,  y:GAME_H-80, r:52 },
  right: { x:210, y:GAME_H-80, r:52 },
  jump:  { x:GAME_W-95, y:GAME_H-85, r:60 },
};
let touchUsed = ('ontouchstart' in window), touchDirs = { left:false, right:false }, touchAction = false;
function syncInput(){
  input.left  = keyDirs.left  || touchDirs.left;
  input.right = keyDirs.right || touchDirs.right;
  input.action = keyAction || touchAction;
}
function touchPos(t){
  const r = canvas.getBoundingClientRect();
  return { x:(t.clientX - r.left) / canvas._scale, y:(t.clientY - r.top) / canvas._scale };
}
function handleTouches(e){
  e.preventDefault(); touchUsed = true;
  const wasAction = touchAction;
  touchDirs.left = touchDirs.right = false; touchAction = false;
  const splitX = (BTN.left.x + BTN.right.x)/2;   // 左／右移動的分界
  for(const t of e.touches){
    const p = touchPos(t);
    // 畫面對半：左半＝移動（再依落點判左右），右半＝跳；中間不留死區，
    // 確保「任何觸點都有反應」（原本 42%~52% 之間點下去毫無回饋）
    if(p.x < GAME_W*0.5){
      if(p.x < splitX) touchDirs.left = true;
      else touchDirs.right = true;
    } else {
      touchAction = true;
    }
  }
  if(touchAction && !wasAction) input.actionBuffer = 0.14;
  syncInput();
}
for(const ev of ['touchstart','touchmove','touchend','touchcancel'])
  canvas.addEventListener(ev, handleTouches, { passive:false });
// 分頁切走／視窗失焦時鍵盤 keyup 可能永遠不會觸發（如 alt-tab），
// 回來後角色會卡在殘留的移動或跳躍輸入上——切走的當下直接清空所有輸入狀態
function resetInput(){
  keyDirs.left = keyDirs.right = false; keyAction = false;
  touchDirs.left = touchDirs.right = false; touchAction = false;
  input.actionBuffer = 0;
  syncInput();
}
addEventListener('blur', resetInput);
addEventListener('visibilitychange', ()=>{ if(document.hidden) resetInput(); });
// UI 點擊（選單／選關／結算）
canvas.addEventListener('pointerdown', e => {
  const r = canvas.getBoundingClientRect();
  const p = { x:(e.clientX - r.left)/canvas._scale, y:(e.clientY - r.top)/canvas._scale };
  if(state && state.click) state.click(p);
});

// ============ 粒子（swap-pop 池） ============
const parts = [];
function burst(x, y, color, n=12, speed=220, up=0){
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2, s = speed*(0.3+Math.random()*0.7);
    parts.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s - up, life:0.55, max:0.55, color, sz:3+Math.random()*4 });
  }
}
function updateParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p = parts[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 620*dt; p.life -= dt;
    if(p.life<=0){ parts[i] = parts[parts.length-1]; parts.pop(); }
  }
}
function drawParts(){
  for(const p of parts){
    ctx.globalAlpha = Math.max(0, p.life/p.max);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-p.sz/2, p.y-p.sz/2, p.sz, p.sz);
  }
  ctx.globalAlpha = 1;
}
const floaters = [];
function addFloater(x,y,text,color,big){ floaters.push({x,y,text,color,life:0.8,big}); }
function updateFloaters(dt){
  for(let i=floaters.length-1;i>=0;i--){
    const f = floaters[i]; f.y -= 44*dt; f.life -= dt;
    if(f.life<=0){ floaters[i] = floaters[floaters.length-1]; floaters.pop(); }
  }
}
function drawFloaters(){
  ctx.textAlign = 'center';
  for(const f of floaters){
    ctx.font = (f.big?'bold 26px':'bold 18px') + ' sans-serif';
    ctx.globalAlpha = Math.max(0, f.life/0.8);
    ctx.fillStyle = f.color; ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

function makePlayer(){
  return { x:60, y:GROUND_Y-56, w:30, h:56, vx:0, vy:0,
    grounded:false, coyote:0, facing:1, sx:1, sy:1, walkT:0, jumpCut:false,
    respawnX:60, respawnY:GROUND_Y-56, dead:false, deadT:0, riding:null };
}

let cam = { x:0 }, shake = 0, freeze = 0;
let score = { coins:0, total:0 }, deaths = 0, elapsed = 0, hintT = 0;

function movePlatform(p, t){
  if(p.move){
    const off = Math.sin(t*p.move.speed + (p.move.phase||0)) * p.move.range;
    const nx = p.move.axis==='x' ? p.move.base + off : p.x;
    const ny = p.move.axis==='y' ? p.move.base + off : p.y;
    p._dx = nx - p.x; p._dy = ny - p.y; p.x = nx; p.y = ny;
  } else { p._dx = 0; p._dy = 0; }
  if(p.crumble){
    if(p.falling){
      p.fvy = (p.fvy||0) + 1400/60; p.y += p.fvy/60; p.alpha = Math.max(0,(p.alpha??1) - 0.03);
      p.respawnT -= 1/60;
      if(p.respawnT <= 0){ p.falling = false; p.y = p.oy; p.alpha = 1; p.shakeT = 0; p.standT = 0; }
    }
  }
}
function aabb(a,b){ return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }
function killPlayer(){
  if(player.dead) return;
  player.dead = true; player.deadT = 0; deaths++;
  shake = 11; freeze = 0.12;
  burst(player.x+player.w/2, player.y+player.h/2, PAL.pink, 26, 280);
  burst(player.x+player.w/2, player.y+player.h/2, '#fff', 10, 180);
  sndHurt();
}
function respawn(){
  player.x = player.respawnX; player.y = player.respawnY;
  player.vx = 0; player.vy = 0; player.dead = false; player.riding = null;
  for(const p of LV.platforms) if(p.crumble){ p.falling=false; p.y=p.oy; p.alpha=1; p.standT=0; p.shakeT=0; }
  cam.x = clamp(player.x - GAME_W*0.4, 0, LV.len - GAME_W);
}

let state = null;
function setState(s){ state = s; if(s.enter) s.enter(); backBtn.style.display = (s===playState)?'flex':'none'; setAmbLevel(s===playState ? 0.045 : 0.02); }
function stateName(){ return state===menuState?'menu':state===selectState?'select':state===playState?'play':state===clearState?'clear':'?'; }

function startLevel(i){
  curLevel = i; TH = THEMES[i]; bakeSky(TH);
  LV = LEVELS_build(i);
  for(const p of LV.platforms) if(p.crumble){ p.oy = p.y; p.standT = 0; p.shakeT = 0; p.alpha = 1; }
  player = makePlayer();
  score.coins = 0; score.total = LV.coins.length;
  deaths = 0; elapsed = 0; hintT = 0; cam.x = 0;
  parts.length = 0; floaters.length = 0; trail.length = 0;   // v6
  setState(playState);
}

// ---- 選關畫面 ----
const selectState = {
  t:0, sel:0,
  enter(){ this.t = 0; this.sel = Math.min(this.sel, unlockedCount()-1); this.cards = []; },
  update(dt){
    this.t += dt;
    if(keyDirs.left && !this._kl){ this.sel = Math.max(0, this.sel-1); sndUI(); }
    if(keyDirs.right && !this._kr){ this.sel = Math.min(LEVEL_COUNT-1, this.sel+1); sndUI(); }
    this._kl = keyDirs.left; this._kr = keyDirs.right;
    if(input.actionBuffer > 0){
      input.actionBuffer = 0;
      if(this.sel < unlockedCount()) startLevel(this.sel);
      else { sndDeny(); this.shakeSel = 0.3; }
    }
    if(this.shakeSel > 0) this.shakeSel -= dt;
  },
  click(p){
    for(const c of this.cards){
      if(p.x>=c.x && p.x<=c.x+c.w && p.y>=c.y && p.y<=c.y+c.h){
        this.sel = c.i;
        if(c.i < unlockedCount()) startLevel(c.i);
        else { sndDeny(); this.shakeSel = 0.3; }
        return;
      }
    }
  },
  draw(){
    ctx.drawImage(skyCv,0,0);

    ctx.font = 'bold 40px sans-serif'; ctx.fillStyle = PAL.white;

function drawStar(cx, cy, r, color){
  ctx.fillStyle = color; ctx.beginPath();
  for(let i=0;i<10;i++){
    const a = -Math.PI/2 + i*Math.PI/5, rr = i%2===0 ? r : r*0.45;
    ctx.lineTo(cx+Math.cos(a)*rr, cy+Math.sin(a)*rr);
  }
  ctx.closePath(); ctx.fill();
}
function drawLock(cx, cy){
  ctx.fillStyle = 'rgba(255,255,255,.55)';
  ctx.beginPath(); ctx.roundRect(cx-14, cy-6, 28, 22, 4); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,.55)'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(cx, cy-8, 9, Math.PI, 0); ctx.stroke();
}

// ---- 遊玩 ----
const playState = {
  update(dt){
    elapsed += dt; hintT += dt;
    for(const p of LV.platforms) movePlatform(p, elapsed);
    for(const s of LV.saws){
      if(s.move){
        const off = Math.sin(elapsed*s.move.speed) * s.move.range;
        if(s.move.axis==='x'){ if(s.bx===undefined) s.bx = s.x; s.x = s.bx + off; }
        else { if(s.by===undefined) s.by = s.y; s.y = s.by + off; }
      }
    }
    if(player.dead){
      player.deadT += dt;
      if(player.deadT > 0.45) respawn();
      updateParts(dt); updateFloaters(dt);
      return;
    }
    // 被移動平臺載運
    if(player.riding && player.grounded){ player.x += player.riding._dx||0; player.y += player.riding._dy||0; }

    let targetVx = 0;
    if(input.left && !input.right) targetVx = -RUN_SPEED;
    else if(input.right && !input.left) targetVx = RUN_SPEED;
    if(targetVx !== 0) player.facing = targetVx > 0 ? 1 : -1;
    const accel = player.grounded
      ? (Math.sign(targetVx) !== Math.sign(player.vx) && player.vx !== 0 ? TURN_ACC : (targetVx===0?GROUND_DEC:GROUND_ACC))
      : AIR_ACC;
    if(player.vx < targetVx) player.vx = Math.min(targetVx, player.vx + accel*dt);
    else if(player.vx > targetVx) player.vx = Math.max(targetVx, player.vx - accel*dt);
    // 跑步塵土
    if(player.grounded && Math.abs(player.vx) > 200 && Math.random() < dt*8)
      burst(player.x+player.w/2 - player.facing*10, player.y+player.h, 'rgba(255,255,255,.5)', 1, 40, 30);

    if(player.grounded) player.coyote = 0.09; else player.coyote -= dt;
    if(input.actionBuffer > 0 && player.coyote > 0){
      player.vy = V0; player.grounded = false; player.coyote = 0; input.actionBuffer = 0;
      player.sx = 0.7; player.sy = 1.4; player.jumpCut = false; player.riding = null;
      burst(player.x+player.w/2, player.y+player.h, PAL.accent, 6, 120);
      sndJump();
    }
    if(!input.action && player.vy < 0 && !player.jumpCut){ player.vy *= 0.45; player.jumpCut = true; }
    const g = player.vy < 0 ? G_UP : G_DOWN;
    const apex = Math.abs(player.vy) < 40 ? 0.5 : 1;
    player.vy += g * apex * dt;
    player.vy = Math.min(player.vy, MAX_FALL);

    const solid = p => !(p.crumble && p.falling);
    player.x += player.vx * dt;
    const box = ()=>({x:player.x+6,y:player.y,w:player.w-12,h:player.h});
    for(const p of LV.platforms){
      if(solid(p) && aabb(box(), p)){
        if(player.vx > 0) player.x = p.x - player.w + 6;
        else if(player.vx < 0) player.x = p.x + p.w - 6;
      }
    }
    player.x = clamp(player.x, 0, LV.len - player.w);

    const wasGrounded = player.grounded;
    player.grounded = false; let rideNow = null;
    player.y += player.vy * dt;
    const CORNER_FIX = 8;                     // 角落修正：撞天花板邊角時水平推移量在此範圍內就直接放行
    for(const p of LV.platforms){
      if(!solid(p)) continue;
      if(aabb(box(), p)){
        if(player.vy > 0){ player.y = p.y - player.h; player.vy = 0; player.grounded = true; rideNow = p; }
        else if(player.vy < 0){
          const b = box();
          const overlapL = (b.x + b.w) - p.x;      // 玩家右緣伸入平台左邊多少
          const overlapR = (p.x + p.w) - b.x;      // 玩家左緣伸入平台右邊多少
          const minOverlap = Math.min(overlapL, overlapR);
          if(minOverlap <= CORNER_FIX){
            player.x += (overlapL < overlapR) ? -overlapL : overlapR;   // 側推通過邊角，不打斷上升
          } else {
            player.y = p.y + p.h; player.vy = 0;
          }
        }
      }
    }
    player.riding = rideNow;
    player.x = clamp(player.x, 0, LV.len - player.w);   // 角落修正可能小幅位移，重新夾回關卡範圍
    if(player.grounded && !wasGrounded){
      player.sx = 1.4; player.sy = 0.6;
      burst(player.x+player.w/2, player.y+player.h, '#ffffff', 5, 100);
      sndLand();
    }
    // 崩塌磚計時
    for(const p of LV.platforms){
      if(!p.crumble || p.falling) continue;
      if(player.riding === p){
        p.standT += dt; p.shakeT = p.standT;
        if(p.standT > 0.06 && p.standT < 0.1) sndCrack();
        if(p.standT > 0.5){ p.falling = true; p.fvy = 0; p.respawnT = 2.6; burst(p.x+p.w/2, p.y+10, TH.top, 8, 120); sndCrack(); }
      } else if(p.standT > 0){ p.standT = Math.max(0, p.standT - dt*2); p.shakeT = p.standT; }
    }
    // 彈簧
    for(const sp of LV.springs){
      sp.t = Math.max(0, sp.t - dt*3);
      const b = box();
      if(player.vy >= 0 && aabb({x:b.x,y:b.y+b.h-6,w:b.w,h:10}, sp)){
        player.vy = -1030; player.grounded = false; player.jumpCut = true; player.riding = null;
        player.sx = 0.55; player.sy = 1.6; sp.t = 1;
        burst(sp.x+sp.w/2, sp.y, PAL.green, 12, 200, 120);
        sndSpring(); shake = Math.max(shake, 3);
      }
    }
    if(player.y > GAME_H + 100) killPlayer();
    // 尖刺（寬容判定）
    const hurt = { x:player.x+player.w*0.15, y:player.y+player.h*0.15, w:player.w*0.7, h:player.h*0.7 };
    for(const s of LV.spikes){ if(aabb(hurt, s)){ killPlayer(); break; } }
    // 鋸輪（圓形寬容判定）
    if(!player.dead) for(const s of LV.saws){
      const d = Math.hypot(s.x-(player.x+player.w/2), s.y-(player.y+player.h/2));
      if(d < s.r*0.72 + 14){ killPlayer(); break; }
    }
    player.sx += (1 - player.sx) * 12 * dt;
    player.sy += (1 - player.sy) * 12 * dt;
    if(Math.abs(player.vx) > 10 && player.grounded) player.walkT += dt*9; else player.walkT += dt*2;
    // v6：高速殘影取樣（快取 sprite 重繪，近零成本）
    trailT -= dt;
    if((Math.abs(player.vx) > 260 || Math.abs(player.vy) > 560) && trailT <= 0){
      trailT = 0.05;
      trail.push({ x:player.x, y:player.y, facing:player.facing, walkT:player.walkT, air:!player.grounded, t:0.22 });
      if(trail.length > 6) trail.shift();
    }
    for(let i=trail.length-1;i>=0;i--){ trail[i].t -= dt; if(trail[i].t <= 0) trail.splice(i,1); }
    // v6：跑步腳步聲（輕，節流）
    if(player.grounded && Math.abs(player.vx) > 200){
      stepT -= dt;
      if(stepT <= 0){ stepT = 0.24; beep(95, 0.035, 'triangle', 0.045); }
    } else stepT = 0.08;
    // 金幣
    for(const c of LV.coins){
      if(c.taken) continue;
      if(Math.hypot(c.x-(player.x+player.w/2), c.y-(player.y+player.h/2)) < 36){
        c.taken = true; score.coins++;
        burst(c.x, c.y, PAL.gold, 14, 200);
        addFloater(c.x, c.y-12, score.coins===score.total?'金幣全收！':'+1', PAL.gold, score.coins===score.total);
        sndCoin();
      }
    }
    // 檢查點
    for(const cp of LV.checkpoints){
      if(cp.hit) continue;
      if(Math.hypot(cp.x-(player.x+player.w/2), cp.y-(player.y+player.h/2)) < 54){
        cp.hit = true;
        player.respawnX = cp.x - player.w/2; player.respawnY = cp.y - player.h/2;
        addFloater(cp.x, cp.y-36, '檢查點！', PAL.accent);
        burst(cp.x, cp.y, PAL.accent, 14, 160);
        sndCheck();
      }
    }
    // 終點
    if(aabb(box(), LV.goal)){ setState(clearState); return; }
    const targetCamX = clamp(player.x - GAME_W*0.4, 0, LV.len - GAME_W);
    cam.x += (targetCamX - cam.x) * (1 - Math.pow(0.01, dt));
    shake *= Math.pow(0.001, dt);
    updateParts(dt); updateFloaters(dt);
  },
  draw(){
    ctx.drawImage(skyCv,0,0);
    ctx.save();
    ctx.translate((Math.random()*2-1)*shake, (Math.random()*2-1)*shake);
    ctx.translate(-cam.x, 0);
    drawParallaxAt(cam.x);
    drawMotes(cam.x, elapsed);   // v6：霓虹光塵
    for(const p of LV.platforms) drawPlatform(p);
    for(const sp of LV.springs) drawSpring(sp);
    for(const s of LV.spikes) drawSpikes(s);
    for(const s of LV.saws) drawSaw(s);
    for(const c of LV.coins) if(!c.taken) drawCoin(c);
    for(const cp of LV.checkpoints) drawCheckpoint(cp);
    drawGoal(LV.goal);
    for(const g of trail){   // v6：高速殘影（sprite 快取重繪，幾乎零成本）
      ctx.globalAlpha = g.t * 0.9;
      drawCharacter(g.x, g.y, 1, 1, g.facing, g.walkT, '#ff2975', g.air, 'normal');
    }
    ctx.globalAlpha = 1;
    drawParts(); drawFloaters();
    if(!player.dead || player.deadT < 0.25) drawPlayerEnt();
    ctx.restore();
    ctx.drawImage(vignCv, 0, 0);   // v6：vignette
    drawHud();
    if(hintT < 3.2) drawHint();
    drawTouchUI();
  }
};
function drawHint(){
  const a = hintT < 2.6 ? 1 : (3.2-hintT)/0.6;
  ctx.globalAlpha = a*0.9;
  ctx.fillStyle = 'rgba(0,0,0,.55)';
  ctx.beginPath(); ctx.roundRect(GAME_W/2-260, 88, 520, 66, 14); ctx.fill();
  ctx.textAlign = 'center'; ctx.fillStyle = '#fff'; ctx.font = 'bold 20px sans-serif';
  ctx.fillText(touchUsed ? '◀ ▶ 移動　右邊點擊＝跳躍' : '← → 移動　空白鍵＝跳躍', GAME_W/2, 116);
  ctx.font = '16px sans-serif'; ctx.fillStyle = PAL.gold;
  ctx.fillText('收金幣、踩檢查點，衝向終點旗！', GAME_W/2, 142);
  ctx.globalAlpha = 1;
}
function drawTouchUI(){
  if(!touchUsed) return;
  ctx.globalAlpha = 0.4;
  for(const [k,b] of Object.entries(BTN)){
    ctx.fillStyle = '#0a0a1a'; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    const on = (k==='left'&&input.left)||(k==='right'&&input.right)||(k==='jump'&&input.action);
    ctx.strokeStyle = on ? PAL.accent : 'rgba(255,255,255,.7)'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle = on ? PAL.accent : '#fff';
    if(k==='jump'){ ctx.font='bold 26px sans-serif'; ctx.textAlign='center'; ctx.fillText('跳', b.x, b.y+9); }
    else {
      ctx.beginPath();
      const d = k==='left'?-1:1;
      ctx.moveTo(b.x+d*16, b.y); ctx.lineTo(b.x-d*10, b.y-18); ctx.lineTo(b.x-d*10, b.y+18);
      ctx.closePath(); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

// ---- 結算 ----
const clearState = {
  enter(){
    this.t = 0;
    const prevUnlocked = unlockedCount();          // 寫入新星星之前，先記住原本解鎖到第幾關
    this.stars = 1 + (score.coins >= score.total ? 1 : 0) + (deaths <= 2 ? 1 : 0);
    this.newRecord = this.stars > save.stars[curLevel];
    if(this.newRecord){ save.stars[curLevel] = this.stars; persist(); }
    this.justUnlocked = unlockedCount() > prevUnlocked;   // 這次通關剛好解鎖了新關卡
    this.unlockShown = false;
    this.shown = 0;
    sndWin();
    burst(player.x+player.w/2, player.y, PAL.gold, 30, 260);
    this.btns = [];
  },
  update(dt){
    this.t += dt;
    const target = Math.min(this.stars, Math.floor((this.t-0.4)/0.45)+1);
    if(target > this.shown && target >= 1){ this.shown = target; sndStar(); burst(GAME_W/2+(this.shown-2)*70, 260, PAL.gold, 16, 200); }
    if(this.justUnlocked && !this.unlockShown && this.t > 1.15){
      this.unlockShown = true;
      sndCheck();
      burst(GAME_W/2, 352, PAL.accent, 22, 240, 60);
    }
    if(Math.random()<0.12) burst(Math.random()*GAME_W, -10, [PAL.gold,PAL.accent,PAL.pink][Math.floor(Math.random()*3)], 1, 40);
    updateParts(dt); updateFloaters(dt);
    if(this.t > 0.4 && input.actionBuffer > 0){
      input.actionBuffer = 0;
      if(curLevel < LEVEL_COUNT-1) startLevel(curLevel+1); else setState(selectState);
    }
  },
  click(p){
    if(this.t < 0.35) return;
    for(const b of this.btns){
      if(p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h){ sndUI(); b.fn(); return; }
    }
  },
  draw(){
    ctx.drawImage(skyCv,0,0);
    drawParts();
    ctx.textAlign='center';
    const allDone = save.stars.every(s=>s>0);
    ctx.font = 'bold 48px sans-serif'; ctx.fillStyle = PAL.gold;
    ctx.fillText(curLevel===LEVEL_COUNT-1 && allDone ? '全部通關！' : '通關成功！', GAME_W/2, 130);
    ctx.font = 'bold 22px sans-serif'; ctx.fillStyle = PAL.white;
    ctx.fillText('第 '+(curLevel+1)+' 關：'+TH.name, GAME_W/2, 172);
    for(let s=0;s<3;s++){
      const lit = s < this.shown;
      const pop = lit && this.t - (0.4+s*0.45) < 0.25 ? 1.5 - (this.t-(0.4+s*0.45))*2 : 1;
      drawStar(GAME_W/2+(s-1)*70, 250, 28*Math.max(1,pop), lit?PAL.gold:'rgba(255,255,255,.15)');
    }
    ctx.font = '19px sans-serif'; ctx.fillStyle = PAL.white;
    ctx.fillText('金幣 '+score.coins+' / '+score.total+'　　死亡 '+deaths+' 次　　時間 '+elapsed.toFixed(1)+' 秒', GAME_W/2, 320);
    if(this.newRecord && this.t>1.2){
      ctx.fillStyle = PAL.pink; ctx.font='bold 20px sans-serif';
      ctx.fillText('★ 新紀錄！ ★', GAME_W/2, this.justUnlocked ? 344 : 352);
    }
    if(this.justUnlocked && this.t>1.15){                      // 新關卡解鎖：脈動強調＋獨立一行，不與新紀錄疊字
      const pulse = 1 + Math.sin((this.t-1.15)*7) * 0.07;
      ctx.save(); ctx.translate(GAME_W/2, this.newRecord ? 372 : 356); ctx.scale(pulse, pulse);
      ctx.fillStyle = PAL.accent; ctx.font = 'bold 21px sans-serif';
      ctx.fillText('解鎖第 '+(curLevel+2)+' 關！', 0, 0);
      ctx.restore();
    }
    // 按鈕
    this.btns = [];
    const defs = [];
    if(curLevel < LEVEL_COUNT-1) defs.push(['下一關 ▶', ()=>startLevel(curLevel+1), PAL.accent]);
    defs.push(['再玩一次', ()=>startLevel(curLevel), PAL.gold]);
    defs.push(['選關', ()=>setState(selectState), 'rgba(255,255,255,.8)']);
    const bw = 190, bh = 58, gap = 24, x0 = (GAME_W - (bw*defs.length + gap*(defs.length-1)))/2;
    defs.forEach((d,i)=>{
      const x = x0 + i*(bw+gap), y = 396;
      this.btns.push({x,y,w:bw,h:bh,fn:d[1]});
      ctx.fillStyle = 'rgba(10,10,30,.7)'; ctx.beginPath(); ctx.roundRect(x,y,bw,bh,14); ctx.fill();
      ctx.strokeStyle = d[2]; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.roundRect(x,y,bw,bh,14); ctx.stroke();
      ctx.fillStyle = d[2]; ctx.font = 'bold 23px sans-serif'; ctx.fillText(d[0], x+bw/2, y+38);
    });
    ctx.font = '16px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,.7)';
    ctx.fillText('💻 空白鍵＝'+(curLevel<LEVEL_COUNT-1?'下一關':'選關')+'　R＝再玩一次', GAME_W/2, 492);
  }
};

// ============ 繪圖 ============
function drawParallaxAt(cx){
  const th = TH;
  ctx.fillStyle = th.hill;                       // 遠山（視差 0.2）
  for(let i=0;i<4;i++){
    const bx = ((i*500 - cx*0.2) % (GAME_W+500) + GAME_W+500) % (GAME_W+500) - 250 + cx;
    ctx.beginPath();
    ctx.moveTo(bx, GROUND_Y+40); ctx.lineTo(bx+250, GROUND_Y-150); ctx.lineTo(bx+500, GROUND_Y+40);
    ctx.closePath(); ctx.fill();
  }
  // 近景方塊建築（視差 0.5；v6：烘焙漸層大樓精靈——受光面/窗燈/天線）
  for(let i=0;i<6;i++){
    const bx = ((i*320 - cx*0.5) % (GAME_W+320) + GAME_W+320) % (GAME_W+320) - 160 + cx;
    const cv = bldCvs[i%3];
    if(cv) ctx.drawImage(cv, bx, GROUND_Y+80-cv.height);
  }
  ctx.fillStyle = 'rgba(0,0,0,.3)';              // 地平線下方
  ctx.fillRect(cx-50, GROUND_Y+80, GAME_W+100, GAME_H);
}
function drawPlatform(p){
  const th = TH, d = 10;
  ctx.globalAlpha = p.alpha ?? 1;
  const sx2 = p.crumble && p.shakeT>0 ? Math.sin(p.shakeT*55)*Math.min(3,p.shakeT*8) : 0;
  const x = p.x + sx2, y = p.y;
  ctx.fillStyle = th.side; ctx.fillRect(x, y, p.w, p.h);          // 正面
  ctx.fillStyle = th.dark; ctx.fillRect(x+p.w-6, y, 6, p.h);      // 右側暗面
  ctx.fillStyle = th.top;                                          // 頂面（受光）
  ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+d,y-d*0.55); ctx.lineTo(x+p.w+d,y-d*0.55); ctx.lineTo(x+p.w,y); ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.18)'; ctx.fillRect(x, y, p.w, 4);
  ctx.strokeStyle = th.edge; ctx.lineWidth = 2;
  ctx.strokeRect(x+1, y+1, p.w-2, p.h-2);
  if(p.crumble){                                                   // 裂縫
    ctx.strokeStyle = 'rgba(0,0,0,.45)'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x+p.w*0.3, y+2); ctx.lineTo(x+p.w*0.42, y+p.h*0.5); ctx.lineTo(x+p.w*0.32, y+p.h-2);
    ctx.moveTo(x+p.w*0.7, y+2); ctx.lineTo(x+p.w*0.6, y+p.h*0.55); ctx.lineTo(x+p.w*0.72, y+p.h-2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}
function drawSpring(sp){
  const squish = sp.t;
  const h = sp.h + 10 - squish*10;
  ctx.fillStyle = '#2b2b3a'; ctx.fillRect(sp.x, sp.y+sp.h-4, sp.w, 6);
  ctx.strokeStyle = PAL.green; ctx.lineWidth = 3;
  ctx.beginPath();
  for(let i=0;i<3;i++){
    const yy = sp.y+sp.h-4 - (i+1)*(h/4);
    ctx.moveTo(sp.x+6, yy+3); ctx.lineTo(sp.x+sp.w-6, yy);
  }
  ctx.stroke();
  ctx.fillStyle = PAL.green;
  ctx.beginPath(); ctx.roundRect(sp.x-2, sp.y+sp.h-4-h, sp.w+4, 8, 4); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.4)'; ctx.fillRect(sp.x+2, sp.y+sp.h-3-h, sp.w-4, 2);
}
function drawSpikes(s){
  const n = Math.max(1, Math.round(s.w/24)), sw = s.w/n;
  for(let i=0;i<n;i++){
    const bx = s.x+i*sw;
    ctx.fillStyle = PAL.pink;
    ctx.beginPath(); ctx.moveTo(bx, s.y+s.h); ctx.lineTo(bx+sw/2, s.y); ctx.lineTo(bx+sw, s.y+s.h); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,.35)';
    ctx.beginPath(); ctx.moveTo(bx+sw/2, s.y); ctx.lineTo(bx+sw*0.72, s.y+s.h*0.6); ctx.lineTo(bx+sw/2, s.y+s.h*0.5); ctx.closePath(); ctx.fill();
  }
}
function drawSaw(s){
  // v6：危險警示光圈（脈動紅暈，一眼辨識威脅範圍）
  ctx.globalAlpha = 0.12 + 0.07*Math.sin(elapsed*6);
  ctx.fillStyle = '#ff2975';
  ctx.beginPath(); ctx.arc(s.x, s.y, s.r+14, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  const rot = elapsed*5;
  ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(rot);
  ctx.fillStyle = '#c9ccd6';
  ctx.beginPath();
  const teeth = 10;
  for(let i=0;i<teeth;i++){
    const a0 = i/teeth*Math.PI*2, a1 = (i+0.5)/teeth*Math.PI*2, a2 = (i+1)/teeth*Math.PI*2;
    ctx.lineTo(Math.cos(a0)*s.r, Math.sin(a0)*s.r);
    ctx.lineTo(Math.cos(a1)*s.r*0.78, Math.sin(a1)*s.r*0.78);
    ctx.lineTo(Math.cos(a2)*s.r, Math.sin(a2)*s.r);
  }
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#8a8f9e'; ctx.beginPath(); ctx.arc(0,0,s.r*0.55,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5d6270'; ctx.beginPath(); ctx.arc(0,0,s.r*0.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.5)'; ctx.beginPath(); ctx.arc(-s.r*0.22,-s.r*0.22,s.r*0.12,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function drawCoin(c){
  const t = elapsed*4 + c.x*0.01;
  const sx = Math.abs(Math.cos(t));
  const bob = Math.sin(elapsed*3 + c.x*0.02)*4;
  ctx.save(); ctx.translate(c.x, c.y+bob);
  ctx.scale(Math.max(0.15,sx), 1);
  ctx.fillStyle = '#b8860b'; ctx.beginPath(); ctx.arc(1.5,1.5,14,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = PAL.gold; ctx.beginPath(); ctx.arc(0,0,14,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffa72e'; ctx.beginPath(); ctx.arc(0,0,9,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.75)'; ctx.beginPath(); ctx.arc(-4,-5,3,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function drawCheckpoint(cp){
  ctx.strokeStyle = '#8c8ca8'; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(cp.x, cp.y+44); ctx.lineTo(cp.x, cp.y-44); ctx.stroke();
  const wave = cp.hit ? Math.sin(elapsed*6)*4 : 0;
  ctx.fillStyle = cp.hit ? PAL.accent : 'rgba(255,255,255,.3)';
  ctx.beginPath(); ctx.moveTo(cp.x+2, cp.y-44); ctx.lineTo(cp.x+30+wave, cp.y-32); ctx.lineTo(cp.x+2, cp.y-20); ctx.closePath(); ctx.fill();
  if(cp.hit){ ctx.fillStyle = 'rgba(0,240,255,.25)'; ctx.beginPath(); ctx.arc(cp.x, cp.y+44, 12+Math.sin(elapsed*5)*3, 0, Math.PI*2); ctx.fill(); }
}
function drawGoal(g){
  if(beamCv){   // v6：終點光柱（烘焙漸層，脈動呼吸）
    ctx.globalAlpha = 0.5 + 0.2*Math.sin(elapsed*2.4);
    ctx.drawImage(beamCv, g.x+g.w/2-60, g.y+g.h-330, 120, 330);
    ctx.globalAlpha = 1;
  }
  ctx.fillStyle = 'rgba(255,215,0,.12)';
  ctx.beginPath(); ctx.arc(g.x+g.w/2, g.y+g.h/2, 58+Math.sin(elapsed*3)*6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#8c5a3c'; ctx.fillRect(g.x+g.w/2-4, g.y, 8, g.h);
  ctx.fillStyle = '#5c3a24'; ctx.fillRect(g.x+g.w/2+1, g.y, 3, g.h);
  const wave = Math.sin(elapsed*5)*7;
  ctx.fillStyle = PAL.gold;
  ctx.beginPath();
  ctx.moveTo(g.x+g.w/2+4, g.y);
  ctx.quadraticCurveTo(g.x+g.w/2+34, g.y+8+wave*0.4, g.x+g.w/2+56+wave, g.y+18);
  ctx.lineTo(g.x+g.w/2+4, g.y+34);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#c88a1e';
  ctx.font = 'bold 15px sans-serif'; ctx.textAlign='center';
  ctx.fillText('終點', g.x+g.w/2+28, g.y+24);
}
function drawPlayerEnt(){
  // 地面陰影（環境光遮蔽感）
  if(player.grounded){
    ctx.fillStyle = 'rgba(0,0,0,.28)';
    ctx.beginPath(); ctx.ellipse(player.x+player.w/2, player.y+player.h+3, 18, 5, 0, 0, Math.PI*2); ctx.fill();
  }
  // 表情狀態：剛受擊(dead旗標剛翻true的短暫閃現) → 受擊臉；平時 → 平常臉
  const expr = player.dead ? 'hurt' : 'normal';
  drawCharacter(player.x, player.y - (player.sy-1)*10, player.sx, player.sy, player.facing, player.walkT,
    '#ff2975', !player.grounded, expr);
}
// 臉部表情：眼睛＋嘴巴至少兩種狀態（平常／受擊／開心），依 facing 鏡射
// c = 目標 2D context（可以是主畫布，也可以是離屏烘焙用的 sprite context）
function drawFace(c, facing, expr){
  const ex = facing>=0 ? 2 : -8, ex2 = ex + (facing>=0?7:-7), mx = facing>=0?5:-5;
  if(expr === 'hurt'){                                       // 受擊：皺眉＋X眼＋驚呼張口
    c.strokeStyle = '#1a1c2c'; c.lineWidth = 2; c.lineCap = 'round';
    c.beginPath();                                            // 皺起的眉毛
    c.moveTo(ex-1.5,-61); c.lineTo(ex+5,-58);
    c.moveTo(ex2+6.5,-61); c.lineTo(ex2,-58);
    c.stroke();
    c.lineWidth = 1.8;
    c.beginPath();                                            // X 型眼睛
    c.moveTo(ex-0.5,-57); c.lineTo(ex+4.5,-53); c.moveTo(ex+4.5,-57); c.lineTo(ex-0.5,-53);
    c.moveTo(ex2-0.5,-57); c.lineTo(ex2+4.5,-53); c.moveTo(ex2+4.5,-57); c.lineTo(ex2-0.5,-53);
    c.stroke();
    c.fillStyle = '#1a1c2c';                                  // 驚呼張口
    c.beginPath(); c.ellipse(mx,-49.5,3.4,4.4,0,0,Math.PI*2); c.fill();
    c.fillStyle = '#7a2030'; c.beginPath(); c.ellipse(mx,-48.5,1.9,2.6,0,0,Math.PI*2); c.fill();
  } else if(expr === 'happy'){                                // 開心：瞇眼弧線＋咧嘴大笑＋腮紅
    c.strokeStyle = '#1a1c2c'; c.lineWidth = 2.2; c.lineCap = 'round';
    c.beginPath();
    c.arc(ex+2.5,-56.5,3.6,Math.PI*0.08,Math.PI*0.92);
    c.moveTo(ex2+2.5-3.6,-56.5); c.arc(ex2+2.5,-56.5,3.6,Math.PI*0.08,Math.PI*0.92);
    c.stroke();
    c.fillStyle = '#1a1c2c';                                  // 咧嘴大笑
    c.beginPath(); c.arc(mx,-50.5,5,0.05*Math.PI,0.95*Math.PI); c.fill();
    c.fillStyle = '#fff';
    c.beginPath(); c.rect(mx-3.6,-50.5,7.2,2); c.fill();
    c.fillStyle = 'rgba(255,120,150,.55)';                    // 腮紅
    c.beginPath(); c.arc(ex-3.5,-51,2.4,0,Math.PI*2); c.arc(ex2+5.5,-51,2.4,0,Math.PI*2); c.fill();
  } else {                                                    // 平常：睜眼＋微笑
    c.fillStyle = '#1a1c2c';
    c.fillRect(ex,-58,5,6); c.fillRect(ex2,-58,5,6);
    c.fillStyle = '#fff'; c.fillRect(ex+1,-57,2,2); c.fillRect(ex2+1,-57,2,2);
    c.strokeStyle = '#1a1c2c'; c.lineWidth = 2; c.lineCap = 'round';
    c.beginPath(); c.arc(mx, -50, 4.5, 0.15*Math.PI, 0.85*Math.PI); c.stroke();
  }
}
// Roblox 風方塊人本體：頭/軀幹/四肢各自受光面＋多狀態表情（畫在傳入的 context 上，供離屏烘焙重用）
function paintCharacterBody(c, facing, legSwing, armSwing, color, expr){
  const face = (px,py,w,h,base,darkR)=>{           // 方塊：正面＋右暗面＋頂亮面
    c.fillStyle = base; c.fillRect(px,py,w,h);
    c.fillStyle = darkR; c.fillRect(px+w-3,py,3,h);
    c.fillStyle = 'rgba(255,255,255,.28)'; c.fillRect(px,py,w,3);
    c.strokeStyle = 'rgba(0,0,0,.5)'; c.lineWidth = 1.5; c.strokeRect(px+0.5,py+0.5,w-1,h-1);
  };
  // 後腿/後手
  face(-11 + legSwing*0.4, -22, 9, 22, '#23233a', '#15152a');
  face(facing>=0?-21:13, -42 + armSwing*0.4, 8, 21, shade(color,-30), shade(color,-55));
  // 軀幹
  face(-14, -44, 28, 25, color, shade(color,-45));
  c.fillStyle = 'rgba(255,255,255,.2)'; c.fillRect(-14,-44,28,6);
  c.fillStyle = '#fff';                                      // 胸前徽章
  c.beginPath(); c.arc(0,-32,4.5,0,Math.PI*2); c.fill();
  c.fillStyle = color; c.beginPath(); c.arc(0,-32,2.2,0,Math.PI*2); c.fill();
  // 前腿/前手
  face(3 - legSwing*0.4, -22, 9, 22, '#2f2f4a', '#1c1c33');
  face(facing>=0?13:-21, -42 - armSwing*0.4, 8, 21, color, shade(color,-45));
  // 頭
  face(-13, -68, 26, 25, '#ffd9a0', '#d9b070');
  c.fillStyle = '#3a2a1c';                                   // 瀏海
  c.fillRect(-13,-68,26,6);
  c.fillRect(facing>=0?-13:5,-68,8,10);
  drawFace(c, facing, expr || 'normal');
}
// ---- 角色 sprite 離屏快取：走路循環量化成 16 格＋2 方向＋3 表情，烘焙一次重複貼圖 ----
// 避免每幀對每個角色重畫～20 次 fillRect/strokeRect/arc（尤其標題展示角色＋玩家同框時）
const SPR_W = 56, SPR_H = 80, SPR_OX = 28, SPR_OY = 72;
const charSpriteCache = new Map();
function bakeCharSprite(key, facing, legSwing, armSwing, color, expr){
  const cv = document.createElement('canvas'); cv.width = SPR_W; cv.height = SPR_H;
  const c = cv.getContext('2d');
  c.translate(SPR_OX, SPR_OY);
  paintCharacterBody(c, facing, legSwing, armSwing, color, expr);
  charSpriteCache.set(key, cv);
  return cv;
}
function drawCharacter(x, y, sx, sy, facing, walkT, color, airborne, expr){
  expr = expr || 'normal';
  const fdir = facing >= 0 ? 1 : -1;
  let phase, legSwing, armSwing;
  if(airborne){ phase = 'air'; legSwing = 6; armSwing = -14; }
  else {
    const sinV = Math.sin(walkT);
    phase = Math.round((sinV + 1) * 7.5);              // 量化成 0~15，16 格走路循環
    const q = phase / 7.5 - 1;
    legSwing = q * 8; armSwing = -q * 7;
  }
  const key = fdir + '|' + phase + '|' + expr + '|' + color;
  const sprite = charSpriteCache.get(key) || bakeCharSprite(key, fdir, legSwing, armSwing, color, expr);
  ctx.save();
  ctx.translate(x + 15, y + 56);
  ctx.scale(sx, sy);
  ctx.drawImage(sprite, -SPR_OX, -SPR_OY);
  ctx.restore();
}
function shade(hex, amt){
  const n = parseInt(hex.slice(1),16);
  const r = clamp((n>>16)+amt,0,255), g = clamp(((n>>8)&255)+amt,0,255), b = clamp((n&255)+amt,0,255);
  return 'rgb('+r+','+g+','+b+')';
}
function drawHud(){
  ctx.fillStyle = 'rgba(10,10,30,.55)';
  ctx.beginPath(); ctx.roundRect(10,10,240,64,12); ctx.fill();
  drawCoinIcon(34,32);
  ctx.textAlign='left'; ctx.font='bold 20px sans-serif'; ctx.fillStyle=PAL.gold;
  ctx.fillText(score.coins+' / '+score.total, 54, 39);
  ctx.font='15px sans-serif'; ctx.fillStyle='rgba(255,255,255,.85)';
  ctx.fillText('第'+(curLevel+1)+'關 '+TH.name+'　死亡 '+deaths, 22, 63);
  // 進度條
  const pw = 260, px = GAME_W/2-pw/2;
  ctx.fillStyle='rgba(255,255,255,.2)'; ctx.beginPath(); ctx.roundRect(px,18,pw,10,5); ctx.fill();
  ctx.fillStyle=PAL.accent; ctx.beginPath(); ctx.roundRect(px,18,pw*clamp(player.x/(LV.goal.x),0,1),10,5); ctx.fill();
  drawStar(px+pw*clamp(player.x/(LV.goal.x),0,1), 23, 8, PAL.gold);
  ctx.textAlign='right'; ctx.fillStyle='rgba(255,255,255,.8)'; ctx.font='15px sans-serif';
  ctx.fillText(elapsed.toFixed(1)+'s', GAME_W/2+pw/2, 48);
}
function drawCoinIcon(x,y){
  ctx.fillStyle = PAL.gold; ctx.beginPath(); ctx.arc(x,y,11,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffa72e'; ctx.beginPath(); ctx.arc(x,y,7,0,Math.PI*2); ctx.fill();
}

// ============ 主迴圈 ============
const STEP = 1/60;
let last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while(acc >= STEP){
    if(freeze > 0){ freeze -= STEP; acc -= STEP; continue; }
    input.actionBuffer = Math.max(0, input.actionBuffer - STEP);
    state.update(STEP);
    acc -= STEP;
  }
  state.draw();
}
bakeSky(THEMES[0]);
setState(menuState);
requestAnimationFrame(frame);

// 測試掛鉤（QA 自動化用）
window.__test = () => ({ state: stateName(), level: curLevel, px: player.x, py: player.y,
  vx: player.vx, coins: score.coins, deaths, stars: save.stars.slice(), unlocked: unlockedCount(), parts: parts.length });
window.__warp = x => { if(state===playState){ player.x = x; player.y = 100; player.vy = 0; cam.x = clamp(x-GAME_W*0.4,0,LV.len-GAME_W); } };
