<script>

  if(!isPhone) return;

<script>
'use strict';
// ======================================================================
//  Roblox 障礙賽 — 真 3D 版（Canvas 2D 軟體透視投影，零外部資源）
// ======================================================================
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const CX = GAME_W/2, CY = GAME_H*0.42, FOV = GAME_H*0.9;
function resize(){
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = Math.round(GAME_W * scale * dpr);
  canvas.height = Math.round(GAME_H * scale * dpr);
  canvas.style.width  = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale;
}
addEventListener('resize', resize); resize();
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const easeOutBack = x=>{ const c1=1.70158, c3=c1+1; return 1+c3*Math.pow(x-1,3)+c1*Math.pow(x-1,2); };

// ============ 3D 投影引擎（沿用 repo 已驗證的體素投影） ============
const TILT = 0.30, cosA = Math.cos(TILT), sinA = Math.sin(TILT);
const cam = { x:0, y:180, z:-340 };
function project(x,y,z){
  const dx=x-cam.x, dy=y-cam.y, dz=z-cam.z;
  const ry = dy*cosA + dz*sinA;
  const rz = dz*cosA - dy*sinA;
  if(rz < 14) return null;
  const s = FOV/rz;
  return { x:CX+dx*s, y:CY-ry*s, s };
}
function camDepth(y,z){ return (z-cam.z)*cosA - (y-cam.y)*sinA; }
function quad(a,b,c,d,color){
  if(!a||!b||!c||!d) return false;
  ctx.fillStyle=color; ctx.beginPath();
  ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.lineTo(d.x,d.y);
  ctx.closePath(); ctx.fill(); return true;
}
function quadStroke(a,b,c,d,color,w){
  if(!a||!b||!c||!d) return;
  ctx.strokeStyle=color; ctx.lineWidth=w; ctx.beginPath();
  ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.lineTo(d.x,d.y);
  ctx.closePath(); ctx.stroke();
}
// 立體盒：逐面受光（頂最亮／正面中亮／側面暗）＋AO 暗帶＋描邊。y 為頂面高度，h 向下延伸
function drawBox3D(x,y,z,hw,h,hd,pal,glow,outline){
  const tFL=project(x-hw,y,z-hd), tFR=project(x+hw,y,z-hd),
        tBL=project(x-hw,y,z+hd), tBR=project(x+hw,y,z+hd),
        bFL=project(x-hw,y-h,z-hd), bFR=project(x+hw,y-h,z-hd);
  // 側面（只畫看得到的那側）
  if(cam.x < x-hw){ if(quad(tFL,tBL,project(x-hw,y-h,z+hd),bFL,pal.sideDark) && outline) quadStroke(tFL,tBL,project(x-hw,y-h,z+hd),bFL,outline,1); }
  else if(cam.x > x+hw){ if(quad(tFR,tBR,project(x+hw,y-h,z+hd),bFR,pal.side) && outline) quadStroke(tFR,tBR,project(x+hw,y-h,z+hd),bFR,outline,1); }
  // 正面
  if(quad(tFL,tFR,bFR,bFL,pal.front)){
    if(bFL&&bFR&&tFL&&tFR){
      const mFL={x:tFL.x+(bFL.x-tFL.x)*0.55, y:tFL.y+(bFL.y-tFL.y)*0.55};
      const mFR={x:tFR.x+(bFR.x-tFR.x)*0.55, y:tFR.y+(bFR.y-tFR.y)*0.55};
      quad(mFL,mFR,bFR,bFL,'rgba(6,14,26,0.28)');
      if(glow>0){
        const gFL={x:tFL.x+(bFL.x-tFL.x)*0.8, y:tFL.y+(bFL.y-tFL.y)*0.8};
        const gFR={x:tFR.x+(bFR.x-tFR.x)*0.8, y:tFR.y+(bFR.y-tFR.y)*0.8};
        quad(gFL,gFR,bFR,bFL,'rgba(120,220,255,'+(0.28*glow).toFixed(2)+')');
      }
    }
    if(outline) quadStroke(tFL,tFR,bFR,bFL,outline,1);
  }
  // 頂面（受光最亮）
  quad(tFL,tFR,tBR,tBL,pal.top);
  quadStroke(tFL,tFR,tBR,tBL,pal.edge,1.5);
  if(outline) quadStroke(tFL,tFR,tBR,tBL,outline,1);
  return {tFL,tFR,tBL,tBR};
}

// ============ 發光貼圖（快取，用於 additive 粒子與光暈） ============
function makeGlow(color,size){
  const c=document.createElement('canvas'); c.width=c.height=size;
  const g=c.getContext('2d');
  const grad=g.createRadialGradient(size/2,size/2,1,size/2,size/2,size/2);
  grad.addColorStop(0,color); grad.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=grad; g.fillRect(0,0,size,size);
  return c;
}
const glowWhite = makeGlow('rgba(255,255,255,0.85)',48);
const glowCyan  = makeGlow('rgba(90,225,255,0.7)',64);
const glowGold  = makeGlow('rgba(255,210,90,0.75)',64);

// ============ 主題（每關一色系；明亮積木配色） ============
const THEMES = [
  { name:'新手廣場', sky1:'#7fc9ff', sky2:'#dff1ff', fog:'#dff1ff',
    top:'#7fe36b', front:'#49b83f', side:'#38962f', sideDark:'#277021', edge:'rgba(255,255,255,.55)' },
  { name:'移動平臺塔', sky1:'#ffb86b', sky2:'#ffe9cf', fog:'#ffe9cf',
    top:'#ffb454', front:'#e07f2c', side:'#b8611e', sideDark:'#8a4714', edge:'rgba(255,240,200,.55)' },
  { name:'崩塌遺跡', sky1:'#69cfd6', sky2:'#dffaf7', fog:'#dffaf7',
    top:'#63d8c6', front:'#2fa898', side:'#22867a', sideDark:'#175f56', edge:'rgba(230,255,250,.5)' },
  { name:'彈跳工廠', sky1:'#b58bff', sky2:'#efe6ff', fog:'#efe6ff',
    top:'#b678f5', front:'#8a4fd0', side:'#6e3aa8', sideDark:'#4f2880', edge:'rgba(240,225,255,.55)' },
  { name:'終極試煉', sky1:'#ff9a6b', sky2:'#ffe0cf', fog:'#ffe0cf',
    top:'#ff8a54', front:'#e0562c', side:'#b8401e', sideDark:'#8a2c14', edge:'rgba(255,220,190,.55)' },
];
const PAL = { accent:'#35e0ff', pink:'#ff6cc7', gold:'#ffd24a', white:'#f6faff', green:'#4fe08a' };
const PAL_MOVE   = { top:'#ffb454', front:'#e07f2c', side:'#b8611e', sideDark:'#8a4714', edge:'rgba(255,240,200,.6)' };
const PAL_CRUMB  = { top:'#c9b48a', front:'#9a824f', side:'#7a6538', sideDark:'#584826', edge:'rgba(255,255,255,.3)' };
const PAL_BOUNCE = { top:'#ff8cd8', front:'#d64fa0', side:'#a83a7e', sideDark:'#7a2858', edge:'rgba(255,215,245,.7)' };
const PAL_GOAL   = { top:'#5ce8ff', front:'#2aa8e0', side:'#1f86b8', sideDark:'#175f85', edge:'rgba(255,255,255,.7)' };
const PAL_START  = { top:'#a0e8ff', front:'#5aa8d8', side:'#4585b0', sideDark:'#325f80', edge:'rgba(255,255,255,.6)' };
const PAL_ROTOR  = { top:'#ff6a5a', front:'#e0342a', side:'#b8241c', sideDark:'#8a1812', edge:'rgba(255,220,200,.6)' };
const PAL_ROTTIP = { top:'#ffe27a', front:'#f0a828', side:'#c88018', sideDark:'#9a5e10', edge:'rgba(255,255,220,.7)' };
const PAL_HUB    = { top:'#dfe6ee', front:'#9aa6b6', side:'#7a869a', sideDark:'#5a6578', edge:'rgba(255,255,255,.5)' };
const OUTLINE = 'rgba(12,24,40,0.5)';
// 角色配色（明亮 Roblox 風）
const PB_HEAD = { top:'#ffe066', front:'#ffcf33', side:'#e0af1e', sideDark:'#b88a12', edge:'rgba(255,245,190,.55)' };
const PB_BODY = { top:'#5cd4ff', front:'#2aa8e0', side:'#1f86b8', sideDark:'#175f85', edge:'rgba(210,245,255,.5)' };
const PB_ARM  = { top:'#ffe066', front:'#ffcf33', side:'#e0af1e', sideDark:'#b88a12', edge:'rgba(255,245,190,.5)' };
const PB_LEG  = { top:'#4fe08a', front:'#28b06a', side:'#1c8a52', sideDark:'#12633b', edge:'rgba(210,255,225,.45)' };
const OUTLINE_P = 'rgba(10,20,34,0.55)';

// ---- 烘焙天空（漸層＋雲＋太陽＋地平線霧霞；避免每幀重算漸層） ----
let skyCv=null, vignCv=null, TH=THEMES[0];
function bakeSky(th){
  skyCv = document.createElement('canvas'); skyCv.width=GAME_W; skyCv.height=GAME_H;
  const c = skyCv.getContext('2d');
  const g = c.createLinearGradient(0,0,0,GAME_H);
  g.addColorStop(0, th.sky1); g.addColorStop(0.72, th.sky2); g.addColorStop(1, th.fog);
  c.fillStyle=g; c.fillRect(0,0,GAME_W,GAME_H);
  // 太陽光暈
  const glow=c.createRadialGradient(GAME_W*0.76,110,10,GAME_W*0.76,110,220);
  glow.addColorStop(0,'rgba(255,255,245,.85)'); glow.addColorStop(0.4,'rgba(255,250,220,.35)'); glow.addColorStop(1,'rgba(255,255,255,0)');
  c.fillStyle=glow; c.fillRect(GAME_W*0.76-220,-110,440,440);
  c.fillStyle='rgba(255,255,250,.95)'; c.beginPath(); c.arc(GAME_W*0.76,110,30,0,Math.PI*2); c.fill();
  // 蓬鬆雲（烘焙）
  function cloud(cx,cy,s,a){
    c.globalAlpha=a; c.fillStyle='#ffffff';
    for(const o of [[0,0,1],[-1.1,.2,.8],[1.1,.2,.85],[-.5,-.4,.7],[.6,-.35,.72]]){
      c.beginPath(); c.ellipse(cx+o[0]*s, cy+o[1]*s*0.6, s*o[2], s*o[2]*0.62,0,0,Math.PI*2); c.fill();
    }
    c.globalAlpha=1;
  }
  cloud(GAME_W*0.2,120,34,.9); cloud(GAME_W*0.5,80,26,.8); cloud(GAME_W*0.86,175,30,.85);
  cloud(GAME_W*0.35,205,22,.7); cloud(GAME_W*0.66,150,20,.75);
  // 地平線霧霞帶
  const hz=c.createLinearGradient(0,GAME_H*0.5,0,GAME_H*0.86);
  hz.addColorStop(0,'rgba(255,255,255,0)'); hz.addColorStop(1,th.fog);
  c.globalAlpha=0.85; c.fillStyle=hz; c.fillRect(0,GAME_H*0.5,GAME_W,GAME_H*0.42); c.globalAlpha=1;
  // vignette（只烘焙一次）
  if(!vignCv){
    vignCv=document.createElement('canvas'); vignCv.width=GAME_W; vignCv.height=GAME_H;
    const v=vignCv.getContext('2d');
    const vg=v.createRadialGradient(GAME_W/2,GAME_H*0.46,GAME_H*0.42,GAME_W/2,GAME_H/2,GAME_H*1.05);
    vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(0.62,'rgba(6,16,30,0.1)'); vg.addColorStop(1,'rgba(6,16,30,0.42)');
    v.fillStyle=vg; v.fillRect(0,0,GAME_W,GAME_H);
  }
}

// ============ 音效：Web Audio 合成（壓縮母線＋去爆音包絡＋隨機音高） ============
let AC=null, master=null, muted=false, ambGain=null, ambDuck=null;
function audio(){
  if(!AC){
    AC=new (window.AudioContext||window.webkitAudioContext)();
    const comp=AC.createDynamicsCompressor();
    comp.threshold.value=-18; comp.knee.value=24; comp.ratio.value=8; comp.attack.value=0.003; comp.release.value=0.2;
    master=AC.createGain(); master.gain.value=0.9;
    master.connect(comp).connect(AC.destination);
    try{
      const ir=AC.createBuffer(2,(AC.sampleRate*1.1)|0,AC.sampleRate);
      for(let ch=0;ch<2;ch++){ const d=ir.getChannelData(ch); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.8); }
      const conv=AC.createConvolver(); conv.buffer=ir;
      const wet=AC.createGain(); wet.gain.value=0.12; comp.connect(conv); conv.connect(wet); wet.connect(AC.destination);
      // 微風氛圍層
      const sr=AC.sampleRate, len=sr*4, buf=AC.createBuffer(1,len,sr), ad=buf.getChannelData(0); let lp=0;
      for(let i=0;i<len;i++){ const t=i/sr, w=Math.random()*2-1; lp+=(w-lp)*0.02; ad[i]=lp*(0.5+0.4*Math.sin(t*2.0)+0.15*Math.sin(t*6.6))*1.3; }
      const f=(sr*0.12)|0; for(let i=0;i<f;i++){ const a=i/f; ad[i]=ad[i]*a+ad[len-f+i]*(1-a); }
      const src=AC.createBufferSource(); src.buffer=buf; src.loop=true;
      ambGain=AC.createGain(); ambGain.gain.value=0; ambDuck=AC.createGain(); ambDuck.gain.value=1;
      src.connect(ambGain); ambGain.connect(ambDuck); ambDuck.connect(master); src.start();
      setAmbLevel(0.02);
    }catch(e){}
  }
  if(AC.state==='suspended') AC.resume();
  return AC;
}
function setAmbLevel(v){ if(AC&&ambGain) ambGain.gain.setTargetAtTime(muted?0:v, AC.currentTime, 0.6); }
function duckAmb(){ if(!AC||!ambDuck||muted) return; const t0=AC.currentTime; ambDuck.gain.cancelScheduledValues(t0);
  ambDuck.gain.setTargetAtTime(0.35,t0,0.015); ambDuck.gain.setTargetAtTime(1,t0+0.12,0.25); }
addEventListener('pointerdown', audio, { once:true });
addEventListener('keydown', audio, { once:true });
function beep(freq=440,dur=0.1,type='square',vol=0.15,slide=0){
  if(muted||!AC) return;
  const ac=audio(); if(vol>=0.12) duckAmb();
  freq*=0.95+Math.random()*0.1;
  const o=ac.createOscillator(), g=ac.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,ac.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30,freq+slide),ac.currentTime+dur);
  g.gain.setValueAtTime(0.0001,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(vol,ac.currentTime+0.005);   // 去爆音 attack
  g.gain.exponentialRampToValueAtTime(0.0008,ac.currentTime+dur);
  o.connect(g).connect(master); o.start(); o.stop(ac.currentTime+dur+0.02);
}
function noise(dur=0.15,vol=0.12){
  if(muted||!AC) return;
  const ac=audio(), n=Math.floor(ac.sampleRate*dur);
  const buf=ac.createBuffer(1,n,ac.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
  const s=ac.createBufferSource(); s.buffer=buf;
  const g=ac.createGain(); g.gain.setValueAtTime(vol,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
  s.connect(g).connect(master); s.start();
}
const sndJump  = ()=>beep(230,0.13,'square',0.12,+380);
const sndLand  = ()=>beep(120,0.06,'triangle',0.09);

const input = { jumpBuffer:0, jumpHeld:false };
const KEYS = {};
addEventListener('keydown', e=>{
  if(['KeyW','KeyA','KeyS','KeyD','Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter'].includes(e.code)) e.preventDefault();
  const was=KEYS[e.code]; KEYS[e.code]=true;
  if(e.code==='Escape' && state===playState){ setState(selectState); return; }
  if((e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW') && !was){ input.jumpBuffer=0.14; input.jumpHeld=true; }
  if(e.code==='Enter' && !was){ if(state&&state.confirm) state.confirm(); }
  if(e.code==='KeyM') muteBtn.click();
  if(e.code==='KeyR' && state===clearState) startLevel(curLevel);
});
addEventListener('keyup', e=>{ KEYS[e.code]=false; if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW') input.jumpHeld=false; });
function readKeyboardAxes(){
  let mx=0,mz=0;
  if(KEYS.KeyA||KEYS.ArrowLeft) mx-=1;
  if(KEYS.KeyD||KEYS.ArrowRight) mx+=1;
  if(KEYS.KeyW||KEYS.ArrowUp) mz+=1;
  if(KEYS.KeyS||KEYS.ArrowDown) mz-=1;
  return {mx,mz};
}
// 觸控：左半螢幕＝浮動搖桿（觸點即中心）；右半＝跳躍
let touchUsed=('ontouchstart' in window);
const joy = { active:false, id:null, cx:0, cy:0, x:0, y:0 };
const JOY_R=64, JOY_DEAD=6;
let jumpTouchId=null;
function touchPos(t){ const r=canvas.getBoundingClientRect(); return { x:(t.clientX-r.left)/canvas._scale, y:(t.clientY-r.top)/canvas._scale, id:t.identifier }; }
function onTouch(e){
  e.preventDefault(); touchUsed=true;
  for(const t of e.changedTouches){
    const p=touchPos(t);
    if(e.type==='touchstart'){
      if(p.x < GAME_W*0.55 && !joy.active){ joy.active=true; joy.id=p.id; joy.cx=p.x; joy.cy=p.y; joy.x=0; joy.y=0; }
      else if(p.x >= GAME_W*0.55 && jumpTouchId===null){ jumpTouchId=p.id; input.jumpBuffer=0.14; input.jumpHeld=true; }
    }
  }
  // 更新持續中的觸點
  if(e.type==='touchmove'){
    for(const t of e.touches){ const p=touchPos(t); if(p.id===joy.id){ let dx=p.x-joy.cx, dy=p.y-joy.cy; const l=Math.hypot(dx,dy);
      if(l<JOY_DEAD){ joy.x=0; joy.y=0; } else { if(l>JOY_R){ dx=dx/l*JOY_R; dy=dy/l*JOY_R; } joy.x=dx/JOY_R; joy.y=dy/JOY_R; } } }
  }
  if(e.type==='touchend'||e.type==='touchcancel'){
    for(const t of e.changedTouches){ const p=touchPos(t);
      if(p.id===joy.id){ joy.active=false; joy.id=null; joy.x=0; joy.y=0; }
      if(p.id===jumpTouchId){ jumpTouchId=null; input.jumpHeld=false; }
    }
  }
  // 點擊 UI（選單／選關／結算）
  if(e.type==='touchstart' && state && state.click){ const p=touchPos(e.changedTouches[0]); state.click(p); }
}
for(const ev of ['touchstart','touchmove','touchend','touchcancel']) canvas.addEventListener(ev,onTouch,{passive:false});
canvas.addEventListener('pointerdown', e=>{
  if(e.pointerType==='touch') return;
  const r=canvas.getBoundingClientRect();
  const p={ x:(e.clientX-r.left)/canvas._scale, y:(e.clientY-r.top)/canvas._scale };
  if(state && state.click) state.click(p);
});
function resetInput(){ joy.active=false; joy.id=null; joy.x=0; joy.y=0; jumpTouchId=null; input.jumpHeld=false; input.jumpBuffer=0; for(const k in KEYS) KEYS[k]=false; }
addEventListener('blur', resetInput);
addEventListener('visibilitychange', ()=>{ if(document.hidden) resetInput(); });

// ============ 粒子（3D，additive 發光雙層） ============
const parts=[];
function burst3(x,y,z,color,n,speed,life,size){
  for(let i=0;i<n;i++){
    if(parts.length>=300) return;
    const a=Math.random()*Math.PI*2, s=speed*(0.3+Math.random()*0.7);
    parts.push({x,y,z,vx:Math.cos(a)*s,vy:Math.abs(Math.sin(a))*s*0.8+60,vz:Math.sin(a+1.3)*s*0.5,
      life:life*(0.6+Math.random()*0.7), max:life, color, size, glow:Math.random()<0.6});
  }
}
function updateParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.z+=p.vz*dt; p.vy-=520*dt; p.life-=dt;
    if(p.life<=0){ parts[i]=parts[parts.length-1]; parts.pop(); }
  }
}
function drawParts(){
  // additive 發光層
  ctx.save(); ctx.globalCompositeOperation='lighter';
  for(const p of parts){ if(!p.glow) continue;
    const s=project(p.x,p.y,p.z); if(!s) continue;
    const a=Math.max(0,p.life/p.max); const r=Math.max(4,p.size*s.s*2.4);
    ctx.globalAlpha=a*0.6; ctx.drawImage(glowWhite, s.x-r, s.y-r, r*2, r*2);
  }
  ctx.restore();
  // 亮核
  for(const p of parts){
    const s=project(p.x,p.y,p.z); if(!s) continue;
    ctx.globalAlpha=Math.max(0,p.life/p.max); ctx.fillStyle=p.color;
    const sz=Math.max(1.5,p.size*s.s*1.4); ctx.fillRect(s.x-sz/2, s.y-sz/2, sz, sz);
  }
  ctx.globalAlpha=1;
}
// 飄字（螢幕空間，easeOutBack 彈跳）
const floaters=[];
function addFloater3(x,y,z,text,color,big){ const s=project(x,y,z); if(!s) return; floaters.push({x:s.x,y:s.y,text,color,big,life:0.9,age:0}); }
function addFloaterS(sx,sy,text,color,big){ floaters.push({x:sx,y:sy,text,color,big,life:0.9,age:0}); }
function updateFloaters(dt){
  for(let i=floaters.length-1;i>=0;i--){ const f=floaters[i]; f.age+=dt; f.y-=42*dt; f.life-=dt; if(f.life<=0){ floaters[i]=floaters[floaters.length-1]; floaters.pop(); } }
}
function drawFloaters(){
  ctx.textAlign='center';
  for(const f of floaters){
    const pop = f.age<0.3 ? easeOutBack(f.age/0.3) : 1;
    ctx.save(); ctx.translate(f.x,f.y); ctx.scale(pop,pop);
    ctx.font=(f.big?'bold 26px':'bold 19px')+' sans-serif';
    ctx.globalAlpha=Math.min(1,f.life/0.9*1.3);
    ctx.lineWidth=4; ctx.strokeStyle='rgba(8,18,32,0.7)'; ctx.strokeText(f.text,0,0);
    ctx.fillStyle=f.color; ctx.fillText(f.text,0,0);
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

// ============ 關卡（3D 賽道；沿 +z 前進） ============
const DEATH_Y=-150;
let LEVELS=[]; let curLevel=0;
let platforms=[], rotors=[], decos=[], levelCoins=[], GOAL_Z=1;
// 段落 seg：{x,dy,g(間距),w,d,t(型別),mv(移動),cp(檢查點),rot(旋轉障礙),ph}
function buildLevel(idx){
  platforms=[]; rotors=[]; decos=[]; levelCoins=[];
  const segs=LEVELS[idx].segs;
  let z=0, y=0;
  platforms.push({x:0,y:0,z:0,w:170,d:150,type:'start',checkpoint:true,phase:0});
  for(const s of segs){
    z += (s.g||210); y += (s.dy||0);
    const p={ x:s.x||0, y, z, w:s.w||88, d:s.d||66, type:s.t||'normal', phase:(s.ph!==undefined?s.ph:Math.random()*6.28) };
    if(s.mv) p.move=s.mv;
    if(s.cp) p.checkpoint=true;
    if(s.speed) p.speed=s.speed;
    platforms.push(p);
    if(s.rot){ rotors.push({ x:p.x, y:p.y, z:p.z, len:s.rot.len||(p.w*0.92), speed:s.rot.speed||1.4, phase:s.rot.phase||0, arms:s.rot.arms||2 }); p.hasRotor=true; }
  }
  z += 300; y += 0;
  platforms.push({x:0,y,z,w:200,d:180,type:'goal',phase:0});
  GOAL_Z = z;
  // 金幣（非崩塌、非旋轉、非終點的平臺中心上方各放 1 顆）
  for(let i=1;i<platforms.length-1;i++){ const p=platforms[i];
    if(p.type!=='crumble' && p.type!=='goal' && !p.hasRotor) levelCoins.push({x:p.x,y:p.y+46,z:p.z,taken:false}); }
  // 裝飾漂浮方塊（不可碰，加深空間感）
  for(let i=0;i<16;i++){
    decos.push({ x:(Math.random()*2-1)*(560+Math.random()*500), y:-40-Math.random()*180, z:Math.random()*GOAL_Z*1.1, w:26+Math.random()*44, ph:Math.random()*6.28 });
  }
}
function resetCrumbles(){ for(const p of platforms) if(p.type==='crumble'){ p.crumbleT=0; p.crumbling=false; p.gone=false; } }

// ============ 玩家＋物理 ============
const player = { x:0,y:0,z:0, vx:0,vy:0,vz:0, grounded:false, coyote:0, groundPlat:null,
  sx:1,sy:1, running:false, facing:0, dead:false, respawn:{x:0,y:0,z:0} };
const GRAVITY=1660, GRAVITY_FALL=GRAVITY*1.6, MAX_FALL=950, JUMP_V=620;
const MOVE_ACCEL=2600, MOVE_DECEL=3200, MAX_SPEED=300, AIR_MULT=0.65, COYOTE_MAX=0.09;
let elapsed=0, deaths=0, coinsThisRun=0, checkpointIdx=0, hintT=0, shake=0, freeze=0;

function platBox(p,t){
  let px=p.x, py=p.y, pz=p.z;
  if(p.type==='moving' && p.move){
    const off=Math.sin(t*p.move.speed+p.phase)*p.move.range;
    if(p.move.axis==='x') px+=off; else if(p.move.axis==='y') py+=off; else pz+=off;
  }
  return {x:px,y:py,z:pz,w:p.w,d:p.d};
}
function distToSeg(px,pz,ax,az,bx,bz){
  const dx=bx-ax, dz=bz-az; const l2=dx*dx+dz*dz;
  let t=l2? ((px-ax)*dx+(pz-az)*dz)/l2 : 0; t=clamp(t,0,1);
  const cx=ax+dx*t, cz=az+dz*t; return Math.hypot(px-cx,pz-cz);
}
function resetToRespawn(){
  player.x=player.respawn.x; player.y=player.respawn.y; player.z=player.respawn.z;
  player.vx=player.vy=player.vz=0; player.grounded=false; player.coyote=0; player.dead=false;
  resetCrumbles();
}
function die(){
  if(player.dead) return;
  player.dead=true; deaths++; shake=11; freeze=0.12;
  burst3(player.x, player.y+26, player.z, PAL.pink, 24, 280, 0.6, 6);
  burst3(player.x, player.y+26, player.z, '#ffffff', 10, 200, 0.5, 5);
  sndHurt();
  setTimeout(()=>{ if(player.dead) resetToRespawn(); }, 380);
}

let state=null, sceneFade=0;
function setState(s){ state=s; sceneFade=1; if(s.enter) s.enter(); backBtn.style.display=(s===playState)?'flex':'none'; setAmbLevel(s===playState?0.045:0.02); }
function stateName(){ return state===menuState?'menu':state===selectState?'select':state===playState?'play':state===clearState?'clear':'?'; }
function startLevel(i){
  curLevel=i; TH=THEMES[i]; bakeSky(TH);
  buildLevel(i);
  checkpointIdx=0; deaths=0; coinsThisRun=0; elapsed=0; hintT=0; shake=0; freeze=0;

  resetToRespawn();
  cam.x=player.x; cam.y=player.y+180; cam.z=player.z-340;
  parts.length=0; floaters.length=0;
  setState(playState);
}

// ============ 玩家更新（物理） ============
function updatePlayer(dt,t){
  if(player.dead){ return; }
  // 輸入軸（鍵盤或搖桿）
  let mx=0,mz=0; const kb=readKeyboardAxes(); mx=kb.mx; mz=kb.mz;
  if(joy.active && (joy.x||joy.y)){ mx=joy.x; mz=-joy.y; }
  const len=Math.hypot(mx,mz); if(len>1){ mx/=len; mz/=len; }
  const accel=(player.grounded?MOVE_ACCEL:MOVE_ACCEL*AIR_MULT);
  const decel=(player.grounded?MOVE_DECEL:MOVE_DECEL*AIR_MULT);
  const approach=(cur,target)=>{ const rate=Math.abs(target)>0.01?accel:decel; const diff=target-cur, step=rate*dt; return Math.abs(diff)<=step?target:cur+Math.sign(diff)*step; };
  player.vx=approach(player.vx, mx*MAX_SPEED);
  player.vz=approach(player.vz, mz*MAX_SPEED);
  player.running=(Math.abs(player.vx)+Math.abs(player.vz))>12;
  if(mx||mz) player.facing=Math.atan2(mx,mz);

  if(player.grounded) player.coyote=COYOTE_MAX; else player.coyote=Math.max(0,player.coyote-dt);
  if(input.jumpBuffer>0 && player.coyote>0){
    player.vy=JUMP_V; player.grounded=false; player.coyote=0; input.jumpBuffer=0; player.bounceLock=false;
    player.sy=1.35; player.sx=0.72; sndJump();
    burst3(player.x, player.y+4, player.z, PAL.accent, 8, 150, 0.35, 5);
  }
  input.jumpBuffer=Math.max(0,input.jumpBuffer-dt);
  if(!input.jumpHeld && player.vy>0 && !player.bounceLock) player.vy*=(1-6*dt);
  if(player.vy<=0) player.bounceLock=false;
  let g=player.vy>0?GRAVITY:GRAVITY_FALL; if(Math.abs(player.vy)<40) g*=0.5;
  player.vy=Math.max(-MAX_FALL, player.vy-g*dt);

  // 站在移動平臺上：跟著移動
  if(player.grounded && player.groundPlat && player.groundPlat.type==='moving'){
    const p=player.groundPlat, m=p.move;
    const now=Math.sin(t*m.speed+p.phase)*m.range, prev=Math.sin((t-dt)*m.speed+p.phase)*m.range;
    if(m.axis==='x') player.x+=now-prev; else if(m.axis==='y') player.y+=now-prev; else player.z+=now-prev;
  }
  player.x+=player.vx*dt; player.z+=player.vz*dt;
  const prevY=player.y; player.y+=player.vy*dt;

  // 落地判定（寬容 AABB＋角落吸附）
  let landed=false, landedPlat=null;
  for(const p of platforms){
    if(p.gone) continue;
    const b=platBox(p,t); const hw=b.w*1.05, hd=b.d*1.05;
    if(Math.abs(player.x-b.x)<hw && Math.abs(player.z-b.z)<hd){
      if(player.vy<=0 && prevY>=b.y-12 && player.y<=b.y){ player.y=b.y; player.vy=0; landed=true; landedPlat=p; break; }
    }
  }
  const was=player.grounded; player.grounded=landed;
  if(landed){
    player.groundPlat=landedPlat;
    if(!was){ sndLand(); player.sy=0.65; player.sx=1.3; burst3(player.x,player.y+2,player.z,'#ffffff',6,110,0.3,5); shake=Math.min(shake+1.2,4); }
    if(landedPlat.type==='bounce'){
      player.vy=JUMP_V*1.5; player.grounded=false; player.bounceLock=true; landedPlat.pressT=0.25;
      player.sy=1.5; player.sx=0.6; sndSpring(); freeze=0.045; shake=Math.min(shake+3,7);
      burst3(player.x,player.y+4,player.z,PAL.pink,16,220,0.5,6);
      addFloater3(player.x,player.y+70,player.z,'BOING!',PAL.pink,false);
    }
    if(landedPlat.checkpoint && !landedPlat.start){
      const i=platforms.indexOf(landedPlat);
      if(i>checkpointIdx){ checkpointIdx=i; player.respawn={x:landedPlat.x,y:landedPlat.y,z:landedPlat.z};
        sndCheck(); burst3(landedPlat.x,landedPlat.y+30,landedPlat.z,PAL.accent,14,180,0.6,6); addFloater3(landedPlat.x,landedPlat.y+80,landedPlat.z,'檢查點！',PAL.accent,false); }
    }
    if(landedPlat.type==='crumble' && !landedPlat.crumbling){ landedPlat.crumbling=true; landedPlat.crumbleT=0; noise(0.1,0.06); }
    if(landedPlat.type==='goal'){ winLevel(); return; }
  }
  // 金幣
  for(const c of levelCoins){ if(c.taken) continue;
    const dx=player.x-c.x, dy=(player.y+26)-c.y, dz=player.z-c.z;
    if(dx*dx+dy*dy+dz*dz < 42*42){ c.taken=true; coinsThisRun++;
      burst3(c.x,c.y,c.z,PAL.gold,12,170,0.45,5); sndCoin();
      addFloater3(c.x,c.y+16,c.z, coinsThisRun>=levelCoins.length?'金幣全收！':'+1', PAL.gold, coinsThisRun>=levelCoins.length);
    }
  }
  // 旋轉障礙碰撞
  if(!player.dead) for(const r of rotors){
    if(Math.abs(player.y-r.y)>66) continue;   // 跳夠高可越過
    const ang=t*r.speed+r.phase; let hit=false;
    for(let a=0;a<r.arms;a++){ const aa=ang+a*Math.PI*2/r.arms;
      const ex=r.x+Math.cos(aa)*r.len, ez=r.z+Math.sin(aa)*r.len;
      if(distToSeg(player.x,player.z,r.x,r.z,ex,ez) < 20){ hit=true; break; } }
    if(hit){ die(); return; }
  }
  // 崩塌計時
  for(const p of platforms){
    if(p.type==='crumble' && p.crumbling && !p.gone){ p.crumbleT+=dt; if(p.crumbleT>0.55){ p.gone=true; burst3(p.x,p.y-8,p.z,PAL_CRUMB.top,12,150,0.5,6); noise(0.14,0.07); } }
    if(p.pressT>0) p.pressT-=dt;
  }
  if(player.y<DEATH_Y){ die(); return; }

  player.sx+=(1-player.sx)*10*dt; player.sy+=(1-player.sy)*10*dt;
  if(player.running && player.grounded){ player.animT=(player.animT||0)+dt; if(player.animT>0.16){ player.animT=0; sndStep(); burst3(player.x,player.y+2,player.z,'rgba(255,255,255,0.8)',1,60,0.25,4); } }
}
function winLevel(){
  setState(clearState);
}

// ============ 角色（多部件盒體，含表情與接地陰影） ============
function drawShadow(px,py,pz,t){
  let shY=null;
  for(const p of platforms){ if(p.gone) continue; const b=platBox(p,t);
    if(Math.abs(px-b.x)<b.w && Math.abs(pz-b.z)<b.d && b.y<=py+2){ if(shY===null||b.y>shY) shY=b.y; } }
  if(shY===null) return;
  const sp=project(px,shY+1,pz); if(!sp) return;
  const r=Math.max(3, 22*sp.s*(1-Math.min(1,(py-shY)/240)));
  ctx.globalAlpha=0.32; ctx.fillStyle='#0a1420';
  ctx.beginPath(); ctx.ellipse(sp.x,sp.y,r,r*0.42,0,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
}
function drawPlayer(t){
  const px=player.x, py=player.y, pz=player.z, sy=player.sy, sx=player.sx;
  drawShadow(px,py,pz,t);
  const run=player.running&&player.grounded;
  const swing=run?Math.sin(performance.now()/85)*9:(player.grounded?0:6);
  const bob=run?Math.abs(Math.sin(performance.now()/85))*3:0;
  const face=player.dead?'hurt':(state===clearState?'happy':'normal');
  // 腿
  drawBox3D(px-6*sx, py+18*sy+bob, pz+swing*0.6, 4.5,16*sy,4.5, PB_LEG,0,OUTLINE_P);
  drawBox3D(px+6*sx, py+18*sy+bob, pz-swing*0.6, 4.5,16*sy,4.5, PB_LEG,0,OUTLINE_P);
  // 身體
  drawBox3D(px, py+40*sy+bob, pz, 10*sx,22*sy,7, PB_BODY,0,OUTLINE_P);
  // 手臂
  drawBox3D(px-13.5*sx, py+36*sy+bob, pz-swing*0.5, 3.6,15*sy,3.6, PB_ARM,0,OUTLINE_P);
  drawBox3D(px+13.5*sx, py+36*sy+bob, pz+swing*0.5, 3.6,15*sy,3.6, PB_ARM,0,OUTLINE_P);
  // 頭
  drawBox3D(px, py+56*sy+bob, pz, 8*sx,15*sy,8, PB_HEAD,0,OUTLINE_P);
  // 臉
  const fp=project(px, py+49*sy+bob, pz-8.2);
  if(fp){ const s=fp.s, eyeDX=4.6*s, eyeY=fp.y-1.5*s;
    if(face==='happy'){
      ctx.strokeStyle='#2a1a08'; ctx.lineWidth=Math.max(1.2,1.6*s); ctx.lineCap='round';
      [-1,1].forEach(d=>{ ctx.beginPath(); ctx.arc(fp.x+d*eyeDX,eyeY+1.6*s,2*s,Math.PI*1.08,Math.PI*1.92); ctx.stroke(); });
      ctx.fillStyle='rgba(255,120,150,0.6)'; [-1,1].forEach(d=>{ ctx.beginPath(); ctx.ellipse(fp.x+d*eyeDX*1.5,eyeY+4.4*s,1.7*s,1*s,0,0,Math.PI*2); ctx.fill(); });
      ctx.fillStyle='#2a1a08'; ctx.beginPath(); ctx.ellipse(fp.x,fp.y+3.4*s,3.1*s,2.1*s,0,0.05*Math.PI,0.95*Math.PI); ctx.fill();
    } else if(face==='hurt'){
      [-1,1].forEach(d=>{ ctx.strokeStyle='#2a1a08'; ctx.lineWidth=Math.max(1.2,1.7*s); ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(fp.x+d*eyeDX-2*s,eyeY-2*s); ctx.lineTo(fp.x+d*eyeDX+2*s,eyeY+2*s);
        ctx.moveTo(fp.x+d*eyeDX+2*s,eyeY-2*s); ctx.lineTo(fp.x+d*eyeDX-2*s,eyeY+2*s); ctx.stroke(); });
      ctx.fillStyle='#2a1a08'; ctx.beginPath(); ctx.ellipse(fp.x,fp.y+4*s,1.8*s,2.2*s,0,0,Math.PI*2); ctx.fill();
    } else {
      [-1,1].forEach(d=>{ ctx.fillStyle='#fff8ec'; ctx.beginPath(); ctx.ellipse(fp.x+d*eyeDX,eyeY,1.9*s,2.1*s,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#2a1a08'; ctx.beginPath(); ctx.arc(fp.x+d*eyeDX,eyeY+0.5*s,1.1*s,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(fp.x+d*eyeDX-0.5*s,eyeY-0.4*s,0.5*s,0,Math.PI*2); ctx.fill(); });
      ctx.strokeStyle='#2a1a08'; ctx.lineWidth=Math.max(1,1.2*s); ctx.lineCap='round';
      ctx.beginPath(); ctx.arc(fp.x,fp.y+2.4*s,2.5*s,0.15*Math.PI,0.85*Math.PI); ctx.stroke();
    }
  }
}

// ============ 場景繪製 ============
function drawSkyBg(){
  const par=(cam.x*0.05); ctx.drawImage(skyCv,-par,0);
  if(par>0) ctx.drawImage(skyCv,GAME_W-par,0); else ctx.drawImage(skyCv,-GAME_W-par,0);
}
function drawDeco(dc,t){
  const p=project(dc.x,dc.y,dc.z); if(!p) return;
  const dz=camDepth(dc.y,dc.z); if(dz<20||dz>3400) return;
  ctx.globalAlpha=clamp((3400-dz)/1600,0,1)*0.5;
  const pal={ top:TH.top, front:TH.front, side:TH.side, sideDark:TH.sideDark, edge:'rgba(255,255,255,0.2)' };
  drawBox3D(dc.x,dc.y,dc.z,dc.w,dc.w*1.2,dc.w,pal,0,null);
  ctx.globalAlpha=1;
}
function drawPlatform(p,t){
  const b=platBox(p,t); const dz=camDepth(b.y,b.z); if(dz<16||dz>3200) return;
  let pal = p.type==='moving'?PAL_MOVE : p.type==='crumble'?PAL_CRUMB : p.type==='bounce'?PAL_BOUNCE : p.type==='goal'?PAL_GOAL : p.type==='start'?PAL_START : THEMES[curLevel];
  let h=30, yy=b.y;
  // 遠霧：距離越遠越淡（混入亮天空＝霧化）
  const fog=clamp((dz-1500)/1700,0,1);
  ctx.globalAlpha=1-fog*0.72;
  if(p.type==='crumble' && p.crumbling){ const k=p.crumbleT/0.55; yy-=Math.sin(k*40)*2.5; ctx.globalAlpha*= (1-k*0.45); }
  if(p.type==='bounce' && p.pressT>0) h=30-10*(p.pressT/0.25);
  const q=drawBox3D(b.x,yy,b.z,b.w,h,b.d,pal, p.type==='goal'?1:0, null);
  // 頂面裝飾
  if(q && q.tFL){
    if(p.type==='bounce'){ const c=project(b.x,yy,b.z); if(c){ ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.ellipse(c.x,c.y,b.w*0.5*c.s,b.d*0.22*c.s,0,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(c.x,c.y,b.w*0.28*c.s,b.d*0.12*c.s,0,0,Math.PI*2); ctx.stroke(); } }
    else if(p.type==='crumble'){ const c1=project(b.x-b.w*0.4,yy,b.z), c2=project(b.x+b.w*0.3,yy,b.z-b.d*0.35), c3=project(b.x,yy,b.z+b.d*0.4);
      if(c1&&c2&&c3){ ctx.strokeStyle='rgba(40,30,16,0.5)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(c1.x,c1.y); ctx.lineTo(c2.x,c2.y); ctx.lineTo(c3.x,c3.y); ctx.stroke(); } }
    else if(p.type==='goal'){ const c=project(b.x,yy,b.z); if(c){ const r=b.w*1.3*c.s;
      ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.5+0.15*Math.sin(elapsed*3);
      ctx.drawImage(glowCyan,c.x-r,c.y-r*0.5,r*2,r); ctx.restore();
      // 光柱
      const topP=project(b.x,yy+560,b.z);
      if(topP){ ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.32+0.12*Math.sin(elapsed*2.4);
        const w=Math.max(6,b.w*0.4*c.s); ctx.drawImage(glowCyan,c.x-w,topP.y,w*2,Math.max(4,c.y-topP.y)); ctx.restore(); } } }
  }
  ctx.globalAlpha=1;
  if(p.checkpoint && !p.start) drawFlag(b.x-b.w*0.7, b.y, b.z+b.d*0.55, platforms.indexOf(p)<=checkpointIdx, false);
  if(p.type==='goal') drawFlag(b.x, b.y, b.z+40, false, true);
}
function drawFlag(x,y,z,active,big){
  const h=big?120:64;
  drawBox3D(x,y+h,z, big?3:2, h, big?3:2, PAL_HUB, 0, OUTLINE);
  const a=project(x,y+h,z), b=project(x,y+h-(big?34:22),z);
  if(a&&b){ const w=(big?52:30)*a.s, flap=Math.sin(performance.now()/200+x)*4*a.s;
    ctx.fillStyle=active?PAL.gold:(big?PAL.accent:'#9aa6b6');
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(a.x+w,(a.y+b.y)/2+flap); ctx.lineTo(b.x,b.y); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=1; ctx.stroke();
    if(big){ ctx.fillStyle='#08303a'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center'; ctx.fillText('終點',a.x+w*0.5,(a.y+b.y)/2+flap+5); }
  }
}
function drawRotor(r,t){
  const ang=t*r.speed+r.phase;
  // 地面警示光圈
  const gp=project(r.x,r.y+1,r.z);
  if(gp){ ctx.globalAlpha=0.12+0.07*Math.sin(elapsed*6); ctx.fillStyle='#ff3d2a';
    ctx.beginPath(); ctx.ellipse(gp.x,gp.y,(r.len+22)*gp.s,(r.len+22)*gp.s*0.42,0,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
  // 中央柱
  drawBox3D(r.x, r.y+30, r.z, 8,30,8, PAL_HUB,0,OUTLINE);
  // 每支臂：以旋轉位置放數個方塊（自帶前後排序）
  const cubes=[];
  for(let a=0;a<r.arms;a++){ const aa=ang+a*Math.PI*2/r.arms; const dx=Math.cos(aa), dz=Math.sin(aa);
    const seg=4;
    for(let i=1;i<=seg;i++){ const dist=i/seg*r.len; const bx=r.x+dx*dist, bz=r.z+dz*dist;
      cubes.push({x:bx,y:r.y+16,z:bz, pal:i===seg?PAL_ROTTIP:PAL_ROTOR, d:camDepth(r.y+16,bz)}); }
  }
  cubes.sort((A,B)=>B.d-A.d);
  for(const cu of cubes) drawBox3D(cu.x,cu.y,cu.z, 11,13,11, cu.pal,0,OUTLINE);
}
function drawCoin(c,t){
  const bob=Math.sin(t*2.6+c.x*0.05)*5;
  const p=project(c.x,c.y+bob,c.z); if(!p) return;
  const dz=camDepth(c.y,c.z); if(dz<16||dz>3000) return;
  const s=p.s, spin=Math.abs(Math.cos(t*3.2+c.z*0.02));
  ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.4;
  const r=16*s; ctx.drawImage(glowGold,p.x-r,p.y-r,r*2,r*2); ctx.restore();
  ctx.save(); ctx.translate(p.x,p.y); ctx.scale(Math.max(0.18,spin),1);
  ctx.fillStyle='#c88a1e'; ctx.beginPath(); ctx.arc(1.5*s,1.5*s,13*s,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=PAL.gold; ctx.beginPath(); ctx.arc(0,0,13*s,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ffbf3a'; ctx.beginPath(); ctx.arc(0,0,8*s,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.beginPath(); ctx.arc(-4*s,-4*s,2.6*s,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function renderScene(dt,t){
  drawSkyBg();
  let shx=0,shy=0;
  if(shake>0){ shake*=Math.pow(0.001,dt); if(shake<0.1) shake=0; shx=(Math.random()*2-1)*shake; shy=(Math.random()*2-1)*shake; }
  ctx.save(); ctx.translate(shx,shy);
  // 遠景裝飾（先畫）
  const decoItems=decos.map(d=>({d:camDepth(d.y,d.z), dc:d})).sort((a,b)=>b.d-a.d);
  for(const it of decoItems) drawDeco(it.dc,t);
  // 深度排序：平臺＋金幣＋旋轉障礙＋玩家
  const items=[];
  for(const p of platforms){ if(p.gone) continue; const b=platBox(p,t); items.push({d:camDepth(b.y,b.z), k:'p', o:p}); }
  for(const c of levelCoins){ if(c.taken) continue; items.push({d:camDepth(c.y,c.z), k:'c', o:c}); }
  for(const r of rotors){ items.push({d:camDepth(r.y,r.z)-2, k:'r', o:r}); }
  items.push({d:camDepth(player.y,player.z)-4, k:'me'});
  items.sort((a,b)=>b.d-a.d);
  for(const it of items){ if(it.k==='p') drawPlatform(it.o,t); else if(it.k==='c') drawCoin(it.o,t); else if(it.k==='r') drawRotor(it.o,t); else drawPlayer(t); }
  drawParts();
  drawFloaters();
  ctx.restore();
  ctx.drawImage(vignCv,0,0);
}

function glassPanel(x,y,w,h,r){
  ctx.fillStyle='rgba(10,22,40,0.58)'; ctx.beginPath(); ctx.roundRect(x,y,w,h,r); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.07)'; ctx.beginPath(); ctx.roundRect(x+2,y+2,w-4,h*0.4,r-2); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.22)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.roundRect(x,y,w,h,r); ctx.stroke();
}
function drawStar(cx,cy,rr,color){ ctx.fillStyle=color; ctx.beginPath();
  for(let i=0;i<10;i++){ const a=-Math.PI/2+i*Math.PI/5, r=i%2===0?rr:rr*0.45; ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r); } ctx.closePath(); ctx.fill(); }
function drawLock(cx,cy){ ctx.fillStyle='rgba(255,255,255,.6)'; ctx.beginPath(); ctx.roundRect(cx-14,cy-6,28,22,4); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(cx,cy-8,9,Math.PI,0); ctx.stroke(); }

const playState = {
  enter(){},
  update(dt){
    const t=elapsed;
    if(!player.dead){ elapsed+=dt; hintT+=dt; }
    updatePlayer(dt, elapsed);
    updateParts(dt); updateFloaters(dt);
    // 相機緩動追隨（第三人稱）
    const k=1-Math.pow(0.001,dt);
    cam.x+=(player.x*0.85 - cam.x)*k;
    cam.y+=(player.y+180 - cam.y)*k;
    cam.z+=(player.z-340 - cam.z)*k;
  },

    if(hintT<4.2) drawHint();

};
