<!-- 專業AI升級 v8 3D版：Canvas 2D 軟體 3D 投影重製 — 第三人稱格子平台跳躍，真透視相機＋畫家演算法深度排序、逐面受光的體素平台與跑者、接地陰影＋落點預示、漸層天空＋深淵霧化＋暗角、additive 發光粒子、玻璃 HUD、easeOutBack 飄字、命中 hit-stop 與小幅震動、Web Audio 去爆音音效、漸層全快取 ~60fps（玩法/數值/計分/勝負沿用原作） -->

<html lang="zh-Hant">

<style>

<body>
<div id="stage">
  <canvas id="game"></canvas>
  <button id="muteBtn" aria-label="音效開關">🔊</button>

  <div id="titleOverlay" class="overlay">
    <h1>格子跑酷遊戲</h1>
    <div class="sub" style="color:#4a6db4;font-weight:bold;letter-spacing:2px">～ 3D 格子跳台 ～</div>
    <div class="sub">小跑者在懸空格子平台上全速前進！<br>跳過斷裂的深淵、空中收集金幣，<br>吃到 ⭐ 獲得護盾，掉洞免死一次！</div>
    <button id="startBtn" class="bigbtn">開 始</button><button id="hardBtn" class="bigbtn hard">🔥 極速模式</button>

    <div class="sub" style="opacity:0.85">💻 電腦：空白鍵 / ↑＝跳躍（長按跳更高）<br>📱 平板：點螢幕任一處＝跳躍（按住跳更高）<br>✌️ 空中再按一次＝二段跳！<br>🔥 極速模式：起跑更快、峽谷更密，分數 ×2</div>
  </div>

  <div id="overOverlay" class="overlay">
    <h1 style="font-size:30px">掉下去啦！</h1>
    <div id="newBest">🏆 新紀錄！</div>
    <div id="finalScore">0 格</div>
    <div id="bestLine">最佳紀錄：0 格</div>
    <div id="unlockLine" style="display:none;color:#e8582f;font-weight:bold;font-size:17px;margin:6px 0">🔓 解鎖『🔥 極速模式』！回選單挑戰看看</div>
    <button id="restartBtn" class="bigbtn">再玩一次</button><button id="menuBtn" class="bigbtn small">回選單</button>
  </div>

<script>
'use strict';
/* ============================================================
   格子跑酷遊戲（往畫面內跑）— 專業AI升級 v8 3D 版
   Canvas 2D 軟體 3D 投影：真透視相機 + 畫家演算法深度排序
   體素平台/跑者、接地陰影 + 落點預示、第三人稱鏡頭跟隨
   固定時間步進 + 狀態機 + juice 全套（玩法/數值沿用原作）
   ============================================================ */

const GAME_W = 960, GAME_H = 540;
const CX = GAME_W / 2, CY = GAME_H / 2;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize() {
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = Math.round(GAME_W * scale * dpr);
  canvas.height = Math.round(GAME_H * scale * dpr);
  canvas.style.width = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', resize);
resize();

/* ===================== 3D 投影（軟體透視相機） ===================== */
const TILE_D = 90;                 // 每一格在世界 z 軸的深度
const PLAT_HW = 150;               // 平台半寬（x）
const PLAT_HD = 40;                // 平台半深（z），與 TILE_D/2 留縫
const PLAT_H  = 150;               // 平台厚度（往下）
const CAM_BACK = 330, CAM_UP = 150;
const FOV = 430;
const TILT = 0.34;
const cosA = Math.cos(TILT), sinA = Math.sin(TILT);
const HORIZON_Y = 120;             // 背景billboard用的螢幕地平線
const cam = { x: 0, y: CAM_UP, z: -CAM_BACK };
function project(x, y, z) {
  const dx = x - cam.x, dy = y - cam.y, dz = z - cam.z;
  const ry = dy * cosA + dz * sinA;
  const rz = dz * cosA - dy * sinA;
  if (rz < 14) return null;
  const s = FOV / rz;
  return { x: CX + dx * s, y: CY - ry * s, s };
}
function camDepth(y, z) { return (z - cam.z) * cosA - (y - cam.y) * sinA; }
function quad(a, b, c, d, color) {
  if (!a || !b || !c || !d) return false;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.lineTo(c.x, c.y); ctx.lineTo(d.x, d.y);
  ctx.closePath(); ctx.fill();
  return true;
}
function quadStroke(a, b, c, d, color, w) {
  if (!a || !b || !c || !d) return;
  ctx.strokeStyle = color; ctx.lineWidth = w;
  ctx.beginPath();
  ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.lineTo(c.x, c.y); ctx.lineTo(d.x, d.y);
  ctx.closePath(); ctx.stroke();
}
/* 立體盒：每面獨立受光（頂最亮、面向鏡頭正面中亮、側面暗）＋ AO 暗帶 ＋ 邊線描邊 */
function drawBox3D(x, y, z, hw, h, hd, pal, outline) {
  const tFL = project(x - hw, y, z - hd), tFR = project(x + hw, y, z - hd),
        tBL = project(x - hw, y, z + hd), tBR = project(x + hw, y, z + hd),
        bFL = project(x - hw, y - h, z - hd), bFR = project(x + hw, y - h, z - hd),
        bBL = project(x - hw, y - h, z + hd), bBR = project(x + hw, y - h, z + hd);
  // 側面（只畫看得到的那側）
  if (cam.x < x - hw) { quad(tFL, tBL, bBL, bFL, pal.sideDark); if (outline) quadStroke(tFL, tBL, bBL, bFL, outline, 1); }
  else if (cam.x > x + hw) { quad(tFR, tBR, bBR, bFR, pal.side); if (outline) quadStroke(tFR, tBR, bBR, bFR, outline, 1); }
  // 正面
  if (quad(tFL, tFR, bFR, bFL, pal.front)) {
    if (bFL && bFR && tFL && tFR) {
      const mFL = { x: tFL.x + (bFL.x - tFL.x) * 0.55, y: tFL.y + (bFL.y - tFL.y) * 0.55 };
      const mFR = { x: tFR.x + (bFR.x - tFR.x) * 0.55, y: tFR.y + (bFR.y - tFR.y) * 0.55 };
      quad(mFL, mFR, bFR, bFL, 'rgba(6,8,16,0.32)');
    }
    if (outline) quadStroke(tFL, tFR, bFR, bFL, outline, 1);
  }
  // 頂面
  quad(tFL, tFR, tBR, tBL, pal.top);
  quadStroke(tFL, tFR, tBR, tBL, pal.edge, 1.5);
  if (outline) quadStroke(tFL, tFR, tBR, tBL, outline, 1);
}

/* ===================== 色彩工具（霧化混色） ===================== */
function hx(h) { return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)]; }
function mixHex(a, b, t) {
  const A = hx(a), B = hx(b);
  return 'rgb(' + Math.round(A[0] + (B[0] - A[0]) * t) + ',' + Math.round(A[1] + (B[1] - A[1]) * t) + ',' + Math.round(A[2] + (B[2] - A[2]) * t) + ')';
}
function fogHex(hex, fog, t) {
  const A = hx(hex);
  return 'rgb(' + Math.round(A[0] + (fog[0] - A[0]) * t) + ',' + Math.round(A[1] + (fog[1] - A[1]) * t) + ',' + Math.round(A[2] + (fog[2] - A[2]) * t) + ')';
}

/* ----- Web Audio（原作系統原封沿用：去爆音壓縮 + 殘響 + 風聲） ----- */
let AC = null, BUS = null, windGain = null;
let muted = localStorage.getItem('parkour-muted') === '1';
function audio() {
  if (!AC) {
    try {
      AC = new (window.AudioContext || window.webkitAudioContext)();
      const comp = AC.createDynamicsCompressor();
      comp.threshold.value = -14; comp.knee.value = 24; comp.ratio.value = 8;
      comp.attack.value = 0.003; comp.release.value = 0.2;
      BUS = AC.createGain();
      BUS.gain.value = 0.85;
      const tone = AC.createBiquadFilter();
      tone.type = 'lowpass'; tone.frequency.value = 9000; tone.Q.value = 0.5;
      BUS.connect(tone);
      tone.connect(comp);
      comp.connect(AC.destination);
      try {
        const len = Math.floor(AC.sampleRate * 1.1);
        const ir = AC.createBuffer(2, len, AC.sampleRate);
        for (let c = 0; c < 2; c++) {
          const d = ir.getChannelData(c);
          for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 3.2);
        }
        const conv = AC.createConvolver(); conv.buffer = ir;
        const rev = AC.createGain(); rev.gain.value = 0.16;
        BUS.connect(rev); rev.connect(conv); conv.connect(comp);
      } catch (e) {}
      try {
        const wlen = AC.sampleRate * 2;
        const wbuf = AC.createBuffer(1, wlen, AC.sampleRate);
        const wd = wbuf.getChannelData(0);
        for (let i = 0; i < wlen; i++) wd[i] = Math.random() * 2 - 1;
        const wsrc = AC.createBufferSource(); wsrc.buffer = wbuf; wsrc.loop = true;
        const wbp = AC.createBiquadFilter(); wbp.type = 'bandpass'; wbp.frequency.value = 640; wbp.Q.value = 0.6;
        windGain = AC.createGain(); windGain.gain.value = 0;
        wsrc.connect(wbp); wbp.connect(windGain); windGain.connect(comp); wsrc.start();
      } catch (e) { windGain = null; }
    } catch (e) { AC = null; }
  }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
addEventListener('pointerdown', audio, { once: true });
addEventListener('keydown', audio, { once: true });

function beep(freq, dur, type, vol, slide, hum) {
  if (muted) return;
  const ac = audio(); if (!ac) return;
  if (hum) freq *= 1 - hum + Math.random() * hum * 2;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, ac.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), ac.currentTime + dur);
  g.gain.setValueAtTime(0.0001, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(vol || 0.12, ac.currentTime + 0.006);  // 去爆音起音
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g).connect(BUS);
  o.start();
  o.stop(ac.currentTime + dur);
}
function noiseBurst(dur, vol) {
  if (muted) return;
  const ac = audio(); if (!ac) return;
  const len = Math.floor(ac.sampleRate * dur);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ac.createBufferSource(), g = ac.createGain();
  src.buffer = buf;
  g.gain.setValueAtTime(vol || 0.2, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  src.connect(g).connect(BUS);
  src.start();
}
const sfx = {
  jump()  { beep(220, 0.16, 'square', 0.11, 420, 0.04); },
  land()  { beep(130, 0.06, 'triangle', 0.07, 0, 0.05); },
  gap(n)  { const b = 880 + Math.min(4, n) * 110; beep(b, 0.08, 'square', 0.11); setTimeout(() => beep(b * 1.35, 0.13, 'square', 0.11), 70); },
  mile()  { [659, 880, 1109, 1319].forEach((f, i) => setTimeout(() => beep(f, 0.11, 'triangle', 0.12), i * 80)); },
  die()   { beep(300, 0.5, 'sawtooth', 0.15, -220); noiseBurst(0.4, 0.17); },
  coin(n) { beep(940 + Math.min(8, n) * 70, 0.07, 'square', 0.09, 300, 0.03); },
  star()  { [880, 1109, 1319, 1760].forEach((f, i) => setTimeout(() => beep(f, 0.09, 'triangle', 0.12), i * 60)); },
  djump() { beep(330, 0.14, 'square', 0.1, 520, 0.04); },
  rescue(){ beep(180, 0.25, 'sine', 0.16, 480); setTimeout(() => beep(660, 0.15, 'square', 0.1, 220), 120); },
  start() { [523, 659, 784].forEach((f, i) => setTimeout(() => beep(f, 0.1, 'square', 0.1), i * 90)); },
  best()  { [784, 988, 1175, 1568].forEach((f, i) => setTimeout(() => beep(f, 0.14, 'square', 0.12), i * 110)); },
  step(k) { beep(k ? 96 : 84, 0.045, 'triangle', 0.045, -20, 0.08); }
};
const muteBtn = document.getElementById('muteBtn');
function refreshMute() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
muteBtn.addEventListener('click', () => {
  muted = !muted;
  localStorage.setItem('parkour-muted', muted ? '1' : '0');
  refreshMute();
  if (!muted) beep(660, 0.08, 'square', 0.1);
});
refreshMute();

// ----- 遊戲狀態 -----
let mode = 'title';
let dist = 0;
let speed = 5.5;
let gapStreak = 0;
let best = parseInt(localStorage.getItem('parkour-best') || '0', 10) || 0;
let dispScore = 0;
let nextMilestone = 100;
let elapsed = 0;
let shake = 0, freeze = 0, flash = 0;
let deathTimer = -1;
let sinkDepth = 0;
let overCooldown = 0;
let coins = 0, bonus = 0;
let coinChain = 0, coinChainT = 0;
let shield = false;
let items = [];
let lastStarRow = 0;
let tutorialT = 0;
let playT = 0;
let firstGapHint = false;
let hardMode = false;
let hardUnlocked = localStorage.getItem('parkour-hard') === '1';
const HARD_UNLOCK = 100;
const totalScore = () => (Math.floor(dist) + bonus) * (hardMode ? 2 : 1);

let pScreen = { x: CX, y: CY, s: 1 };   // 跑者投影後的螢幕位置（給粒子/飄字用）

// 玩家（垂直跳躍物理，單位為世界座標）
const player = {
  h: 0, vy: 0, grounded: true,
  sx: 1, sy: 1,
  runCycle: 0,
  holdJump: false,
  airJumps: 1, spinT: 0
};
const JUMP_V0 = 560, GRAVITY = 2100;

// 路面生成：rows[i] = {gap:boolean}
let rowData = new Map();
let genRow = 0;
let lastGapRow = -10;
let sideProps = [];
function ensureRows() {
  const target = Math.floor(dist) + 24;
  while (genRow < target) {
    genRow++;
    let gap = false, wide = false;
    if (genRow > (hardMode ? 8 : 16) && genRow - lastGapRow >= (hardMode ? 3 : 4)) {
      const p = hardMode
        ? Math.min(0.44, 0.17 + dist * 0.0005)
        : Math.min(0.36, 0.115 + dist * 0.00045);
      if (Math.random() < p) {
        gap = true;
        wide = hardMode
          ? genRow > 50 && Math.random() < Math.min(0.66, 0.4 + (dist - 50) * 0.0006)
          : genRow > 150 && Math.random() < Math.min(0.62, 0.35 + (dist - 150) * 0.0005);
      }
    }
    rowData.set(genRow, { gap, judged: false });
    const gapStart = genRow;
    if (gap && wide) {
      genRow++;
      rowData.set(genRow, { gap: true, judged: false, partner: true });
    }
    if (gap) {
      lastGapRow = genRow;
      const span = wide ? 1.5 : 0.9;
      items.push({ row: gapStart - 0.25, h: 42, type: 'coin', seed: Math.random() * 7 });
      items.push({ row: gapStart + span * 0.45, h: wide ? 78 : 66, type: 'coin', seed: Math.random() * 7 });
      items.push({ row: gapStart + span, h: 42, type: 'coin', seed: Math.random() * 7 });
    } else if (genRow > 8 && Math.random() < 0.13) {
      for (let c = 0; c < 3; c++) items.push({ row: genRow + c * 0.45, h: 0, type: 'coin', seed: Math.random() * 7 });
    }
    if (genRow > 20 && !gap && genRow - lastStarRow > 60 && Math.random() < 0.06) {
      lastStarRow = genRow;
      items.push({ row: genRow, h: 55, type: 'star', seed: 0 });
    }
    // 平台旁的裝飾（3D 小方塊 / 樹叢），只放在實心平台旁
    if (!gap && Math.random() < 0.55) {
      sideProps.push({
        row: genRow + Math.random(),
        side: Math.random() < 0.5 ? -1 : 1,
        type: Math.random() < 0.5 ? 'tree' : (Math.random() < 0.5 ? 'bush' : 'crystal'),
        seed: Math.random() * 10
      });
    }
  }
  for (const k of rowData.keys()) { if (k < dist - 3) rowData.delete(k); }
  for (let i = sideProps.length - 1; i >= 0; i--) if (sideProps[i].row < dist - 2) sideProps.splice(i, 1);
  for (let i = items.length - 1; i >= 0; i--) if (items[i].row < dist - 2) items.splice(i, 1);
}

const vigCv = document.createElement('canvas');
(function bakeVig() {
  vigCv.width = GAME_W; vigCv.height = GAME_H;
  const g = vigCv.getContext('2d');
  const vg = g.createRadialGradient(GAME_W / 2, GAME_H * 0.46, GAME_H * 0.42, GAME_W / 2, GAME_H * 0.54, GAME_H * 1.05);
  vg.addColorStop(0, 'rgba(4,6,14,0)');

})();
const coinGlowCv = document.createElement('canvas');
(function bakeCoinGlow() {
  coinGlowCv.width = coinGlowCv.height = 44;
  const g = coinGlowCv.getContext('2d');
  const rg = g.createRadialGradient(22, 22, 2, 22, 22, 22);

const fireflyCv = document.createElement('canvas');
(function bakeFirefly() {
  fireflyCv.width = fireflyCv.height = 24;

})();
// 接地陰影（軟橢圓）
const shadowCv = document.createElement('canvas');
(function bakeShadow() {
  shadowCv.width = 128; shadowCv.height = 72;
  const g = shadowCv.getContext('2d');
  const rg = g.createRadialGradient(64, 36, 4, 64, 36, 60);
  rg.addColorStop(0, 'rgba(0,0,0,0.5)');
  rg.addColorStop(0.6, 'rgba(0,0,0,0.28)');
  rg.addColorStop(1, 'rgba(0,0,0,0)');
  g.save(); g.translate(64, 36); g.scale(1, 0.5); g.translate(-64, -36);

// additive 發光粒子（依顏色快取）
const glowCache = new Map();
function glowSprite(color) {
  let cv = glowCache.get(color);
  if (cv) return cv;
  cv = document.createElement('canvas');
  cv.width = cv.height = 32;
  const g = cv.getContext('2d');
  const rg = g.createRadialGradient(16, 16, 1, 16, 16, 16);
  rg.addColorStop(0, color);
  rg.addColorStop(0.4, color);
  rg.addColorStop(1, 'rgba(0,0,0,0)');
  g.globalAlpha = 0.85;
  g.fillStyle = rg; g.fillRect(0, 0, 32, 32);
  glowCache.set(color, cv);
  return cv;
}
let stepPhase = 0;
let glintT = 0.6;

  }

}

function rescue() {

}

function die() {
  deathTimer = 0;

  shake = 9;                     // 小幅震動（不頭暈）
  flash = 0.3;
  burst(pScreen.x, pScreen.y - 30, '#c8a06a', 12, 260, 120);
  burst(pScreen.x, pScreen.y - 30, '#f9629e', 16, 300, 150);

// ----- 更新 -----
function update(dt) {
  elapsed += dt;
  shake *= Math.pow(0.001, dt);
  if (shake < 0.05) shake = 0;
  flash = Math.max(0, flash - dt * 3);
  overCooldown = Math.max(0, overCooldown - dt);
  jumpBuffer = Math.max(0, jumpBuffer - dt);
  tutorialT = Math.max(0, tutorialT - dt);
  player.spinT = Math.max(0, player.spinT - dt);
  coinChainT -= dt;
  if (coinChainT <= 0) coinChain = 0;
  player.sx += (1 - player.sx) * Math.min(1, 12 * dt);
  player.sy += (1 - player.sy) * Math.min(1, 12 * dt);
  dispScore += (totalScore() - dispScore) * Math.min(1, 14 * dt);

  // 相機跟隨（第三人稱，鎖定在跑者後上方）
  cam.z = dist * TILE_D - CAM_BACK;

  for (const p of parts) {
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 700 * dt; p.life -= dt;
  }
  for (let i = parts.length - 1; i >= 0; i--) {
    if (parts[i].life <= 0) { parts[i] = parts[parts.length - 1]; parts.pop(); }
  }
  for (const f of floats) { f.age += dt; f.y -= 46 * dt; f.life -= dt; }
  for (let i = floats.length - 1; i >= 0; i--) if (floats[i].life <= 0) floats.splice(i, 1);
  for (const c of clouds) {
    c.x -= (4 + speed * 0.6) * c.layer * dt;
    if (c.x < -c.w - 30) { c.x = GAME_W + c.w; c.y = 24 + Math.random() * 74; }
  }

  birdTimer -= dt;
  if (birdTimer <= 0 && birds.length < 6 && (!theme || theme.night < 0.4)) {
    birdTimer = 5 + Math.random() * 7;
    const n = 1 + (Math.random() * 3 | 0), by = 30 + Math.random() * 70, sp2 = 34 + Math.random() * 26;
    for (let i = 0; i < n; i++) birds.push({ x: -30 - i * 22, y: by + (i % 2) * 10, vx: sp2, fl: Math.random() * 6.3 });
  }
  for (let i = birds.length - 1; i >= 0; i--) {
    const b = birds[i];
    b.x += b.vx * dt; b.fl += dt * 9;
    if (b.x > GAME_W + 40) birds.splice(i, 1);
  }
  for (const f of fireflies) {
    f.ph += dt * f.sp;
    f.x += Math.sin(f.ph * 1.3) * 12 * dt - speed * 1.5 * dt;
    f.y += Math.cos(f.ph) * 8 * dt;
    if (f.x < -20) f.x = GAME_W + 10;
    if (f.y < HORIZON_Y - 40) f.y = HORIZON_Y - 40;
    if (f.y > GAME_H - 40) f.y = GAME_H - 40;
  }
  if (windGain && AC) {
    const wTarget = (muted || mode !== 'play' || deathTimer >= 0) ? 0 : Math.min(0.13, Math.max(0, (speed - 6) * 0.016));
    windGain.gain.setTargetAtTime(wTarget, AC.currentTime, 0.3);
  }
  glintT -= dt;
  if (glintT <= 0) {
    glintT = 0.5 + Math.random() * 0.7;
    const vis = items.filter(it => it.type === 'coin' && it.row - dist > 1 && it.row - dist < 10);
    if (vis.length) {
      const it = vis[(Math.random() * vis.length) | 0];
      const pI = project(0, it.h, it.row * TILE_D);
      if (pI) addFloat(pI.x + (Math.random() * 18 - 9), pI.y - 18, '✦', '#fff8d0', 13, 0.45);
    }
  }

  // 死亡演出：往洞裡沉
  if (deathTimer >= 0) {
    deathTimer += dt;
    sinkDepth = Math.min(260, sinkDepth + 520 * dt);
    if (deathTimer > 0.85 && mode === 'play') endGame();
    return;
  }
  if (mode === 'over') return;

  // 前進與加速（沿用原作曲線）
  if (mode === 'play') playT += dt;
  const lateRamp = Math.min(2.6, Math.max(0, playT - (hardMode ? 80 : 110)) * 0.026);
  const targetSpeed = (hardMode
    ? Math.min(14.5, 7.5 + dist * 0.014)
    : Math.min(13, 5.5 + dist * 0.012)) + lateRamp;
  speed += (targetSpeed - speed) * Math.min(1, 2 * dt);
  dist += speed * dt;
  ensureRows();

  if (firstGapHint && mode === 'play') {
    for (const [row, data] of rowData) {
      if (data.gap && row - dist > 2 && row - dist < 4.5) {
        firstGapHint = false;
        addFloat(CX, 168, '前方斷裂！', '#fff', 34, 1.7);
        addFloat(CX, 212, '點一下＝跳過去！', '#ffd447', 26, 1.7);
        break;
      }
    }
  }

  // 跳躍物理
  if (player.grounded && jumpBuffer > 0 && mode !== 'over') {
    jumpBuffer = 0;
    player.grounded = false;
    player.vy = JUMP_V0;
    player.sx = 0.72; player.sy = 1.35;
    if (mode === 'play') sfx.jump();
    burst(pScreen.x, pScreen.y, 'rgba(220,220,235,0.9)', 6, 120, 40);
  }
  if (!player.grounded) {
    player.h += player.vy * dt;
    const g = Math.abs(player.vy) < 60 ? GRAVITY * 0.55 : GRAVITY;
    player.vy -= g * dt;
    if (player.h <= 0) {
      player.h = 0;
      player.grounded = true;
      player.airJumps = 1; player.spinT = 0;
      player.sx = 1.3; player.sy = 0.68;
      if (mode === 'play') sfx.land();
      burst(pScreen.x, pScreen.y, 'rgba(220,220,235,0.9)', 7, 140, 30);
    }
  } else {
    player.runCycle += dt * (6 + speed * 0.9);
    const ph = Math.floor(player.runCycle / Math.PI);
    if (ph !== stepPhase) { stepPhase = ph; if (mode === 'play') sfx.step(ph & 1); }
    if (Math.random() < dt * 8) burst(pScreen.x + (Math.random() * 30 - 15), pScreen.y, 'rgba(200,205,225,0.8)', 1, 60, 20);
  }

  // 撿金幣與護盾星星
  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    const d = it.row - dist;
    if (d < -0.45) { items.splice(i, 1); continue; }
    if (d < 0.42 && Math.abs(player.h - it.h) < 30) {
      items.splice(i, 1);
      const pI = project(0, it.h + 10, it.row * TILE_D) || pScreen;
      if (it.type === 'coin') {
        coins++;
        coinChain++; coinChainT = 1.4;
        bonus += 2;
        if (mode === 'play') sfx.coin(coinChain);
        burst(pI.x, pI.y, '#ffd447', 9, 200, 90);
        addFloat(pI.x + 30, pI.y, '+2', '#ffd447', 22);
      } else {
        shield = true;
        bonus += 5;
        if (mode === 'play') sfx.star();
        burst(pI.x, pI.y, '#7fe3ff', 18, 260, 120);
        addFloat(pI.x, pI.y - 30, '⭐ 護盾！', '#7fe3ff', 28);
      }
    }
  }

  // 峽谷判定（寬容：稍微離地就算跳起）
  const airOK = player.h > 12;
  for (const [row, data] of rowData) {
    const rd = row - dist;
    if (!data.judged && rd < 0.35 && rd > -0.6) {
      data.judged = true;
      if (data.gap) {
        if (airOK || !player.grounded) {
          if (!data.partner) {
            gapStreak++;
            addFloat(pScreen.x, pScreen.y - 130, gapStreak > 1 ? '跳過 ×' + gapStreak + '！' : '跳過！', '#ffd447', 28);
            burst(pScreen.x, pScreen.y - 40, '#ffd447', 13, 240, 120);
            sfx.gap(gapStreak);
            if (gapStreak > 0 && gapStreak % 5 === 0) {
              bonus += 10;
              addFloat(pScreen.x, pScreen.y - 172, '🔥 連跳 ' + gapStreak + ' 次！+10', '#ff7043', 30);
            }
          }
        } else {
          if (mode === 'play') {
            if (shield) { rescue(); }
            else { die(); return; }
          }
        }
      }
    }
  }

  // 里程碑＝進入下一關（天色輪換）
  if (Math.floor(dist) >= nextMilestone) {
    addFloat(CX, 200, nextMilestone + ' 格！', '#fff', 40);
    addFloat(CX, 246, '進入第 ' + (nextMilestone / 100 + 1) + ' 關', '#ffd447', 24);
    if (mode === 'play') sfx.mile();
    const confC = ['#ffd447', '#f9629e', '#7fe3ff', '#9ed46a', '#ffb25c'];
    for (let ci = 0; ci < 26; ci++) {
      parts.push({ x: GAME_W * 0.2 + Math.random() * GAME_W * 0.6, y: 90 + Math.random() * 60,
        vx: (Math.random() * 2 - 1) * 120, vy: -60 - Math.random() * 140,
        life: 0.9 + Math.random() * 0.6, maxlife: 1.5, color: confC[ci % confC.length], size: 5 + Math.random() * 4 });
    }
    shake = 4;
    nextMilestone += 100;
  }

  // 展示模式：自動跳
  if (mode === 'title' && player.grounded) {
    for (const [row, data] of rowData) {
      const rd = row - dist;
      if (data.gap && rd > 0.4 && rd < 1.35) { pressJump(); setTimeout(releaseJump, 200); break; }
    }
  }
}

// ----- 繪圖工具 -----
function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ----- 關卡主題（每 100 格輪換：白天→黃昏→夜晚→清晨）-----
const THEMES = [
  { sky: ['#3f86d0', '#8ec9ff', '#dfeeff'], fog: [200, 224, 246], sun: '255,240,190', night: 0,
    plat: { top: '#8fce6a', front: '#5d924a', side: '#4a7a3c', sideDark: '#365c2c', edge: 'rgba(230,255,200,0.55)' } },
  { sky: ['#6a4a92', '#e87a58', '#ffd49a'], fog: [232, 168, 130], sun: '255,150,70', night: 0,
    plat: { top: '#c99a5a', front: '#9a6e3a', side: '#7e572c', sideDark: '#5c3e1e', edge: 'rgba(255,224,170,0.55)' } },
  { sky: ['#0d1636', '#243056', '#3a4a78'], fog: [40, 58, 100], sun: '224,232,255', night: 1,
    plat: { top: '#4a6a9c', front: '#324a72', side: '#283c5c', sideDark: '#1c2c46', edge: 'rgba(150,190,255,0.5)' } },
  { sky: ['#4a6ea0', '#a8c0e0', '#ffe6cc'], fog: [214, 214, 226], sun: '255,224,150', night: 0,
    plat: { top: '#8ec4a0', front: '#5a9070', side: '#48765a', sideDark: '#345844', edge: 'rgba(210,255,230,0.55)' } }
];
let theme = null;
function updateTheme() {
  const seg = 100;
  const idx = Math.floor(dist / seg) % THEMES.length;
  const nxt = (idx + 1) % THEMES.length;
  const local = (dist % seg) / seg;
  const t = local > 0.9 ? (local - 0.9) * 10 : 0;
  const A = THEMES[idx], B = THEMES[nxt];
  const lerpArr = (a, b) => a.map((v, i) => v + (b[i] - v) * t);
  const lerpCS = (a, b) => a.split(',').map((v, i) => +v + (+b.split(',')[i] - +v) * t).join(',');
  theme = {
    sky: [mixHex(A.sky[0], B.sky[0], t), mixHex(A.sky[1], B.sky[1], t), mixHex(A.sky[2], B.sky[2], t)],
    fog: lerpArr(A.fog, B.fog),
    sun: lerpCS(A.sun, B.sun),
    night: A.night + (B.night - A.night) * t,
    plat: {
      top: mixHex(A.plat.top, B.plat.top, t), front: mixHex(A.plat.front, B.plat.front, t),
      side: mixHex(A.plat.side, B.plat.side, t), sideDark: mixHex(A.plat.sideDark, B.plat.sideDark, t),
      edge: A.plat.edge
    }
  };
}

const skyCv = document.createElement('canvas');

const skyG = skyCv.getContext('2d');
let skyKey = '';
function refreshSky() {

function drawSky() {
  ctx.drawImage(skyCv, 0, 0, GAME_W, GAME_H);

  // 夜空星星
  if (theme.night > 0.05) {

    }

  }

  // 太陽／月亮（additive 光暈 + 本體）

  ctx.globalAlpha = 0.5;

  ctx.restore();

  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.arc(CX - 8, HORIZON_Y - 32, 10, 0, Math.PI * 2); ctx.fill();

  // 遠山剪影（兩層，融入霧色）
  const fogc = 'rgb(' + theme.fog.map(Math.round).join(',') + ')';
  ctx.fillStyle = fogHex('#2a3350', theme.fog, 0.35);
  ctx.beginPath(); ctx.moveTo(0, HORIZON_Y);

  ctx.lineTo(GAME_W, HORIZON_Y); ctx.closePath(); ctx.fill();
  ctx.fillStyle = fogc;
  ctx.beginPath(); ctx.moveTo(0, HORIZON_Y);
  for (let x = 0; x <= GAME_W; x += 24) ctx.lineTo(x, HORIZON_Y - 8 - Math.abs(Math.sin(x * 0.017 + 5)) * 18);
  ctx.lineTo(GAME_W, HORIZON_Y); ctx.closePath(); ctx.fill();

  // 飛鳥
  if (birds.length) {
    ctx.strokeStyle = theme.night > 0.4 ? 'rgba(200,210,235,0.5)' : 'rgba(40,50,70,0.6)';
    ctx.lineWidth = 2.4; ctx.lineCap = 'round';

      ctx.beginPath();
      ctx.moveTo(b.x - 8, b.y - w * 0.6);
      ctx.quadraticCurveTo(b.x - 3, b.y, b.x, b.y);
      ctx.quadraticCurveTo(b.x + 3, b.y, b.x + 8, b.y - w * 0.6);

  // 雲朵（兩層視差）
  for (const c of clouds) {
    const a = c.layer < 1 ? 0.5 : 0.78;
    ctx.fillStyle = 'rgba(255,255,255,' + a + ')';

    ctx.ellipse(c.x, c.y, c.w * 0.5, c.w * 0.17, 0, 0, Math.PI * 2);
    ctx.ellipse(c.x + c.w * 0.26, c.y + 4, c.w * 0.32, c.w * 0.13, 0, 0, Math.PI * 2);
    ctx.ellipse(c.x - c.w * 0.28, c.y + 5, c.w * 0.28, c.w * 0.11, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ----- 離屏 sprite（金幣/星星 billboard） -----
function makeSprite(w, h, ox, oy, paint) {
  const c = document.createElement('canvas');
  c.width = w * 2; c.height = h * 2;
  const g = c.getContext('2d');
  g.scale(2, 2);
  g.translate(ox, oy);
  paint(g);
  return { c, w, h, ox, oy };
}
function starShape(g, cx2, cy2, spikes, rOut, rIn) {
  g.beginPath();
  for (let i = 0; i < spikes * 2; i++) {
    const r = i % 2 === 0 ? rOut : rIn;
    const a = i * Math.PI / spikes - Math.PI / 2;
    g.lineTo(cx2 + Math.cos(a) * r, cy2 + Math.sin(a) * r);
  }
  g.closePath();
}

// ----- 落點預示 -----
function predictLandRow() {
  const h = player.h, vy = player.vy;
  const t = (vy + Math.sqrt(Math.max(0, vy * vy + 2 * GRAVITY * h))) / GRAVITY;
  return dist + speed * t;
}

// ----- 3D 跑者（體素，第三人稱背影 + 跑步/跳躍動畫） -----

// ----- 場景 3D 渲染（畫家演算法：由遠到近） -----
function drawScene() {
  const list = [];
  const near = Math.floor(dist) - 1, far = Math.floor(dist) + 18;

  // 平台
  for (let row = near; row <= far; row++) {
    const data = rowData.get(row);
    if (!data || data.gap) continue;
    const z = row * TILE_D;
    const d = row - dist;
    const fogT = Math.max(0, Math.min(0.82, (d - 6) / 13));
    const pal = {
      top: fogHex(theme.plat.top, theme.fog, fogT),
      front: fogHex(theme.plat.front, theme.fog, fogT),
      side: fogHex(theme.plat.side, theme.fog, fogT),
      sideDark: fogHex(theme.plat.sideDark, theme.fog, fogT),
      edge: theme.plat.edge
    };
    list.push({ d: camDepth(0, z), f: () => drawBox3D(0, 0, z, PLAT_HW, PLAT_H, PLAT_HD, pal, 'rgba(15,10,25,0.4)') });
  }

  // 平台旁裝飾
  for (const sp of sideProps) {
    const d = sp.row - dist;
    if (d < -1 || d > 17) continue;
    const z = sp.row * TILE_D;
    const x = sp.side * (PLAT_HW + 34);
    list.push({ d: camDepth(0, z), f: () => {
      if (sp.type === 'tree') {
        drawBox3D(x, 0, z, 5, 26, 5, { top: '#6b4a2e', front: '#523720', side: '#3e2a18', sideDark: '#2c1d10', edge: 'rgba(120,90,60,0.4)' });
        drawBox3D(x, 40, z, 16, 26, 16, { top: '#7fb844', front: '#4f8a34', side: '#3f6e28', sideDark: '#2c521c', edge: 'rgba(180,230,140,0.4)' });
      } else if (sp.type === 'bush') {
        drawBox3D(x, 16, z, 14, 16, 14, { top: '#9ed46a', front: '#6ba848', side: '#548a38', sideDark: '#3e6828', edge: 'rgba(200,240,160,0.4)' });
      } else {
        drawBox3D(x, 30, z, 8, 30, 8, { top: '#a0f0ff', front: '#5ac8e8', side: '#3aa0c8', sideDark: '#2a7ea0', edge: 'rgba(200,250,255,0.6)' });
      }
    }});
  }

  // 金幣 / 星星（billboard）
  for (const it of items) {
    const d = it.row - dist;
    if (d < -0.5 || d > 16) continue;
    const z = it.row * TILE_D;
    const wy = it.h + 12;
    list.push({ d: camDepth(wy, z), f: () => {
      const p = project(0, wy, z); if (!p) return;
      ctx.save();
      ctx.translate(p.x, p.y + Math.sin(elapsed * 5 + it.seed) * 3 * p.s);
      ctx.scale(p.s, p.s);
      if (it.type === 'coin') {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = 0.8;
        ctx.drawImage(coinGlowCv, -22, -22, 44, 44);
        ctx.restore();
        ctx.scale(Math.abs(Math.sin(elapsed * 3.2 + it.seed)) * 0.75 + 0.25, 1);
        ctx.drawImage(SPR.coin.c, -SPR.coin.ox, -SPR.coin.oy, SPR.coin.w, SPR.coin.h);
      } else {
        const pulse = 1 + Math.sin(elapsed * 6) * 0.12;
        ctx.scale(pulse, pulse);
        ctx.rotate(Math.sin(elapsed * 2.2) * 0.25);
        ctx.drawImage(SPR.star.c, -SPR.star.ox, -SPR.star.oy, SPR.star.w, SPR.star.h);
      }
      ctx.restore();
    }});
  }

  // 跑者（含接地陰影 + 落點預示，一起在跑者深度處畫）
  const wz = dist * TILE_D;
  list.push({ d: camDepth(player.h, wz) - 1, f: () => {
    // 接地陰影
    const groundRow = Math.round(dist);
    const gd = rowData.get(groundRow);
    if (!gd || !gd.gap || player.h > 0) {
      const ps = project(0, 0.5, wz);
      if (ps) {
        const sc = Math.max(0.4, 1 - player.h / 200);
        const w = 78 * ps.s * sc, h = 44 * ps.s * sc;
        ctx.globalAlpha = 0.9 * sc;
        ctx.drawImage(shadowCv, ps.x - w / 2, ps.y - h / 2, w, h);
        ctx.globalAlpha = 1;
      }
    }
    // 落點預示（只有明顯離地時）
    if (deathTimer < 0 && player.h > 14 && player.vy < 60) {
      const lr = predictLandRow();
      const lz = lr * TILE_D;
      const pl = project(0, 1, lz);
      if (pl) {
        const rd = rowData.get(Math.round(lr));
        const danger = rd && rd.gap;
        const col = danger ? 'rgba(255,80,70,0.9)' : 'rgba(120,255,160,0.85)';
        const rw = 40 * pl.s, rh = 22 * pl.s;
        ctx.strokeStyle = col; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.ellipse(pl.x, pl.y, rw, rh, 0, 0, Math.PI * 2); ctx.stroke();
        ctx.strokeStyle = danger ? 'rgba(255,80,70,0.4)' : 'rgba(120,255,160,0.35)';
        ctx.beginPath(); ctx.ellipse(pl.x, pl.y, rw * (1.2 + Math.sin(elapsed * 6) * 0.12), rh * (1.2 + Math.sin(elapsed * 6) * 0.12), 0, 0, Math.PI * 2); ctx.stroke();
      }
    }
    drawRunner3D();
  }});

  list.sort((a, b) => b.d - a.d);
  for (const e of list) e.f();
}

// ----- additive 發光粒子（外柔光 + 亮核） -----
function drawParts() {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const p of parts) {
    const a = Math.max(0, Math.min(1, p.life * 2.2));
    ctx.globalAlpha = a * 0.7;
    const gs = glowSprite(p.color);
    const sz = p.size * 2.6;
    ctx.drawImage(gs, p.x - sz / 2, p.y - sz / 2, sz, sz);
  }
  ctx.restore();
  for (const p of parts) {   // 亮核
    ctx.globalAlpha = Math.max(0, Math.min(1, p.life * 2.6));
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}
// easeOutBack 飄字彈跳
function easeOutBack(t) { const c1 = 1.70158, c3 = c1 + 1; return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2); }
function drawFloats() {
  ctx.textAlign = 'center';
  for (const f of floats) {
    const pop = f.age < 0.28 ? easeOutBack(Math.min(1, f.age / 0.28)) : 1;
    ctx.globalAlpha = Math.max(0, Math.min(1, f.life * 1.5));
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.scale(pop, pop);
    ctx.font = 'bold ' + f.size + 'px "Microsoft JhengHei", sans-serif';
    ctx.strokeStyle = 'rgba(20,14,30,0.7)'; ctx.lineWidth = 4;
    ctx.strokeText(f.text, 0, 0);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, 0, 0);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}
function drawSpeedLines() {
  const intensity = (speed - 8) / 5;
  if (intensity <= 0) return;
  ctx.strokeStyle = 'rgba(255,255,255,' + Math.min(0.32, intensity * 0.3) + ')';
  ctx.lineWidth = 2;
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2 + elapsed * 2;
    const r1 = 250 + Math.sin(elapsed * 9 + i * 3) * 40;
    const r2 = r1 + 60 + intensity * 60;
    ctx.beginPath();
    ctx.moveTo(CX + Math.cos(a) * r1, CY + Math.sin(a) * r1 * 0.6);
    ctx.lineTo(CX + Math.cos(a) * r2, CY + Math.sin(a) * r2 * 0.6);
    ctx.stroke();
  }
}

    ctx.textAlign = 'center';
    ctx.font = 'bold 19px "Microsoft JhengHei", sans-serif';
    ctx.strokeStyle = 'rgba(20,14,30,0.6)'; ctx.lineWidth = 4;
    ctx.strokeText('🔥 連跳 ×' + gapStreak, CX, 88);
    ctx.fillStyle = '#ffd447';
    ctx.fillText('🔥 連跳 ×' + gapStreak, CX, 88);
  }

  if (tutorialT > 0 && mode === 'play') {
    ctx.globalAlpha = Math.min(1, tutorialT);
    ctx.textAlign = 'center';
    ctx.font = 'bold 21px "Microsoft JhengHei", sans-serif';
    const tip = '點一下＝跳　長按＝跳更高　空中再點＝二段跳';
    ctx.strokeStyle = 'rgba(10,16,34,0.75)'; ctx.lineWidth = 5;
    ctx.strokeText(tip, CX, GAME_H - 34);
    ctx.fillStyle = '#fff';
    ctx.fillText(tip, CX, GAME_H - 34);
    ctx.globalAlpha = 1;
  }
}

function draw() {
  updateTheme();
  refreshSky();
  // 跑者投影位置（給下一幀 update 的粒子/飄字用）
  const ps = project(0, player.h + 40 - sinkDepth, dist * TILE_D);
  if (ps) pScreen = ps;

  ctx.save();
  if (shake > 0) ctx.translate((Math.random() * 2 - 1) * shake, (Math.random() * 2 - 1) * shake);

  drawSky();
  drawScene();

  // 螢火蟲（夜晚 additive）
  if (theme.night > 0.05) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const f of fireflies) {
      const tw = 0.35 + 0.65 * Math.abs(Math.sin(f.ph * 2.1));
      ctx.globalAlpha = theme.night * tw;
      const sz = 10 + tw * 8;
      ctx.drawImage(fireflyCv, f.x - sz / 2, f.y - sz / 2, sz, sz);
    }
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  drawParts();
  drawFloats();
  drawSpeedLines();

  ctx.restore();

  ctx.drawImage(vigCv, 0, 0, GAME_W, GAME_H);

  drawHUD();

  if (flash > 0) {
    ctx.globalAlpha = flash;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    ctx.globalAlpha = 1;
  }
}

// ----- 主迴圈 -----
const STEP = 1 / 60;
let last = performance.now(), acc = 0;
function frame(now) {
  requestAnimationFrame(frame);
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while (acc >= STEP) {
    if (freeze > 0) { freeze -= STEP; acc -= STEP; continue; }
    update(STEP);
    acc -= STEP;
  }
  draw();
}

resetGame(false);
mode = 'title';
titleOverlay.classList.add('show');
requestAnimationFrame(frame);

// 測試掛鉤（自動化冒煙測試用，不影響遊戲）
window.__test = () => ({ mode, dist, h: player.h, score: totalScore(), speed, hard: hardMode, unlocked: hardUnlocked, parts: parts.length, items: items.length });
</script>
