<!DOCTYPE html>
<!-- 專業AI升級 v7：僅介面/畫質/質感 — 面板漸層卡片與漸層標題字、按鈕懸停動效、HUD膠囊立體陰影、金幣additive光暈、靜音鈕質感、母線低通音色打磨（玩法與文本不變） -->
<!-- 專業AI升級 v6：草地透視條紋、烘焙vignette、飛鳥/夜間螢火蟲環境層、里程碑彩帶、金幣閃光；音效新增程序化殘響(ConvolverNode)、隨速度增強的風聲環境層、腳步聲 -->
<!-- v4 -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>格子跑酷遊戲（往畫面內跑）</title>
<style>
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: #2b4a78;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", sans-serif;
  }
  #stage { position: fixed; inset: 0; }
  canvas {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
  }
  .overlay {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%) scale(0.86);
    width: min(88vw, 440px);
    background: linear-gradient(180deg, rgba(255,255,255,0.97), rgba(240,246,255,0.94));
    border: 1px solid rgba(74,109,180,0.18);
    border-radius: 24px;
    padding: 28px 24px;
    text-align: center;
    color: #2c3e50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.28s ease, transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 16px 50px rgba(20, 40, 80, 0.45);
  }
  .overlay.show {
    opacity: 1;
    pointer-events: auto;
    transform: translate(-50%, -50%) scale(1);
  }
  .overlay h1 {
    margin: 0;
    font-size: 34px;
    background: linear-gradient(92deg, #f9629e, #ff8a5c);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 2px 0 rgba(0,0,0,0.08));
  }
  .overlay .sub { font-size: 15px; opacity: 0.8; margin: 12px 0; line-height: 1.8; }
  .bigbtn {
    display: inline-block;
    margin-top: 10px;
    padding: 14px 48px;
    font-size: 22px;
    font-weight: bold;
    font-family: inherit;
    border: none;
    border-radius: 999px;
    background: linear-gradient(180deg, #ff9dc9, #f9629e);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 5px 0 #c74679, 0 10px 20px rgba(201, 70, 121, 0.35);
    transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
  }
  .bigbtn:hover { transform: translateY(-2px); filter: brightness(1.05); }
  .bigbtn:active {
    transform: translateY(4px);
    box-shadow: 0 1px 0 #c74679, 0 4px 10px rgba(201, 70, 121, 0.3);
  }
  .bigbtn.hard {
    background: linear-gradient(180deg, #ffb25c, #e8582f);
    box-shadow: 0 5px 0 #b03c1a, 0 10px 20px rgba(176, 60, 26, 0.35);
    font-size: 19px;
    padding: 12px 30px;
    margin-left: 10px;
  }
  .bigbtn.hard:active { box-shadow: 0 1px 0 #b03c1a, 0 4px 10px rgba(176, 60, 26, 0.3); }
  .bigbtn.locked {
    background: linear-gradient(180deg, #c8ccd4, #9aa0ab);
    box-shadow: 0 5px 0 #767d88, 0 10px 20px rgba(80, 90, 105, 0.3);
  }
  .bigbtn.small {
    font-size: 16px;
    padding: 10px 26px;
    background: linear-gradient(180deg, #9db8e8, #4a6db4);
    box-shadow: 0 4px 0 #33518c, 0 8px 16px rgba(51, 81, 140, 0.3);
    margin-left: 10px;
  }
  #finalScore { font-size: 44px; font-weight: bold; color: #f9629e; margin: 8px 0 0; }
  #bestLine { font-size: 15px; opacity: 0.85; margin-bottom: 6px; }
  #newBest {
    display: none;
    color: #e8a010; font-weight: bold; font-size: 18px;
    animation: pop 0.6s ease infinite alternate;
  }
  @keyframes pop { from { transform: scale(1); } to { transform: scale(1.12); } }
  #muteBtn {
    position: absolute; right: 12px; top: 12px;
    width: 48px; height: 48px;
    font-size: 22px;
    border: 1px solid rgba(74,109,180,0.25);
    border-radius: 12px;
    background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(235,242,255,0.85));
    color: #2c3e50;
    cursor: pointer;
    z-index: 30;
    box-shadow: 0 3px 10px rgba(20, 40, 80, 0.25), inset 0 1px 0 rgba(255,255,255,0.9);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  #muteBtn:hover { transform: scale(1.07); box-shadow: 0 5px 14px rgba(20, 40, 80, 0.32); }
  #muteBtn:active { transform: scale(0.93); }
</style>
</head>
<body>
<div id="stage">
  <canvas id="game"></canvas>
  <button id="muteBtn" aria-label="音效開關">🔊</button>

  <div id="titleOverlay" class="overlay">
    <h1>格子跑酷遊戲</h1>
    <div class="sub" style="color:#4a6db4;font-weight:bold;letter-spacing:2px">～ 往畫面內跑 ～</div>
    <div class="sub">小跑者在格子路上全速前進！<br>跳過黑色峽谷、空中收集金幣，<br>吃到 ⭐ 獲得護盾，掉洞免死一次！</div>
    <button id="startBtn" class="bigbtn">開 始</button><button id="hardBtn" class="bigbtn hard">🔥 極速模式</button>
    <div id="hardHint" class="sub" style="margin:8px 0 4px;color:#c05621;font-weight:bold"></div>
    <div class="sub" style="opacity:0.85">💻 電腦：空白鍵 / ↑＝跳躍（長按跳更高）<br>📱 平板：點螢幕任一處＝跳躍（按住跳更高）<br>✌️ 空中再按一次＝二段跳！<br>🔥 極速模式：起跑更快、峽谷更密，分數 ×2</div>
  </div>

  <div id="overOverlay" class="overlay">
    <h1 style="font-size:30px">撞到啦！</h1>
    <div id="newBest">🏆 新紀錄！</div>
    <div id="finalScore">0 格</div>
    <div id="bestLine">最佳紀錄：0 格</div>
    <div id="unlockLine" style="display:none;color:#e8582f;font-weight:bold;font-size:17px;margin:6px 0">🔓 解鎖『🔥 極速模式』！回選單挑戰看看</div>
    <button id="restartBtn" class="bigbtn">再玩一次</button><button id="menuBtn" class="bigbtn small">回選單</button>
  </div>
</div>

<script>
'use strict';
/* ============================================================
   格子跑酷遊戲（往畫面內跑）— 專業升級版
   canvas 偽 3D 透視跑道 + 背影小跑者 + 一鍵跳躍
   固定時間步進 + 狀態機 + juice 全套
   ============================================================ */

const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize() {
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = Math.round(GAME_W * scale * dpr);
  canvas.height = Math.round(GAME_H * scale * dpr);
  canvas.style.width = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', resize);
resize();

// ----- 透視投影 -----
const HORIZON_Y = 200;          // 地平線
const NEAR_Y = 560;             // 最近平面（略低於畫面底）
const PERSP_K = 3.4;            // 透視常數
const ROAD_HALF = 240;          // 近端道路半寬
function proj(d) {              // d = 前方幾格（0 = 玩家腳下）
  const s = PERSP_K / (PERSP_K + Math.max(d, -1.2));
  return { y: HORIZON_Y + (NEAR_Y - HORIZON_Y) * s, s };
}

// ----- Web Audio -----
let AC = null, BUS = null, windGain = null;
let muted = localStorage.getItem('parkour-muted') === '1';
function audio() {
  if (!AC) {
    try {
      AC = new (window.AudioContext || window.webkitAudioContext)();
      // 主匯流排：音量 + 壓縮器，多音同時觸發也不削波
      const comp = AC.createDynamicsCompressor();
      comp.threshold.value = -14; comp.knee.value = 24; comp.ratio.value = 8;
      comp.attack.value = 0.003; comp.release.value = 0.2;
      BUS = AC.createGain();
      BUS.gain.value = 0.85;
      /* v7 音色打磨：母線低通 9kHz 收掉方波高頻毛邊，音色更圓潤（觸發語意不變） */
      const tone = AC.createBiquadFilter();
      tone.type = 'lowpass'; tone.frequency.value = 9000; tone.Q.value = 0.5;
      BUS.connect(tone);
      tone.connect(comp);
      comp.connect(AC.destination);
      // v6 程序化殘響：generated impulse ConvolverNode（戶外小空間感），BUS 並聯送入
      try {
        const len = Math.floor(AC.sampleRate * 1.1);
        const ir = AC.createBuffer(2, len, AC.sampleRate);
        for (let c = 0; c < 2; c++) {
          const d = ir.getChannelData(c);
          for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 3.2);
        }
        const conv = AC.createConvolver(); conv.buffer = ir;
        const rev = AC.createGain(); rev.gain.value = 0.16;
        BUS.connect(rev); rev.connect(conv); conv.connect(comp);
      } catch (e) {}
      // v6 風聲環境層：噪聲 → bandpass，音量隨奔跑速度增強（在 update 內調節）
      try {
        const wlen = AC.sampleRate * 2;
        const wbuf = AC.createBuffer(1, wlen, AC.sampleRate);
        const wd = wbuf.getChannelData(0);
        for (let i = 0; i < wlen; i++) wd[i] = Math.random() * 2 - 1;
        const wsrc = AC.createBufferSource(); wsrc.buffer = wbuf; wsrc.loop = true;
        const wbp = AC.createBiquadFilter(); wbp.type = 'bandpass'; wbp.frequency.value = 640; wbp.Q.value = 0.6;
        windGain = AC.createGain(); windGain.gain.value = 0;
        wsrc.connect(wbp); wbp.connect(windGain); windGain.connect(comp); wsrc.start();
      } catch (e) { windGain = null; }
    } catch (e) { AC = null; }
  }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
addEventListener('pointerdown', audio, { once: true });
addEventListener('keydown', audio, { once: true });

function beep(freq, dur, type, vol, slide, hum) {
  if (muted) return;
  const ac = audio(); if (!ac) return;
  if (hum) freq *= 1 - hum + Math.random() * hum * 2;   // 音高微隨機，聽起來更活
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, ac.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), ac.currentTime + dur);
  g.gain.setValueAtTime(vol || 0.12, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g).connect(BUS);
  o.start();
  o.stop(ac.currentTime + dur);
}
function noiseBurst(dur, vol) {
  if (muted) return;
  const ac = audio(); if (!ac) return;
  const len = Math.floor(ac.sampleRate * dur);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ac.createBufferSource(), g = ac.createGain();
  src.buffer = buf;
  g.gain.setValueAtTime(vol || 0.2, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  src.connect(g).connect(BUS);
  src.start();
}
const sfx = {
  jump()  { beep(220, 0.16, 'square', 0.11, 420, 0.04); },
  land()  { beep(130, 0.06, 'triangle', 0.07, 0, 0.05); },
  gap(n)  { const b = 880 + Math.min(4, n) * 110; beep(b, 0.08, 'square', 0.11); setTimeout(() => beep(b * 1.35, 0.13, 'square', 0.11), 70); },
  mile()  { [659, 880, 1109, 1319].forEach((f, i) => setTimeout(() => beep(f, 0.11, 'triangle', 0.12), i * 80)); },
  die()   { beep(300, 0.5, 'sawtooth', 0.15, -220); noiseBurst(0.4, 0.17); },
  coin(n) { beep(940 + Math.min(8, n) * 70, 0.07, 'square', 0.09, 300, 0.03); },
  star()  { [880, 1109, 1319, 1760].forEach((f, i) => setTimeout(() => beep(f, 0.09, 'triangle', 0.12), i * 60)); },
  djump() { beep(330, 0.14, 'square', 0.1, 520, 0.04); },
  rescue(){ beep(180, 0.25, 'sine', 0.16, 480); setTimeout(() => beep(660, 0.15, 'square', 0.1, 220), 120); },
  start() { [523, 659, 784].forEach((f, i) => setTimeout(() => beep(f, 0.1, 'square', 0.1), i * 90)); },
  best()  { [784, 988, 1175, 1568].forEach((f, i) => setTimeout(() => beep(f, 0.14, 'square', 0.12), i * 110)); },
  step(k) { beep(k ? 96 : 84, 0.045, 'triangle', 0.045, -20, 0.08); }   // v6 交替腳步聲
};
const muteBtn = document.getElementById('muteBtn');
function refreshMute() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
muteBtn.addEventListener('click', () => {
  muted = !muted;
  localStorage.setItem('parkour-muted', muted ? '1' : '0');
  refreshMute();
  if (!muted) beep(660, 0.08, 'square', 0.1);
});
refreshMute();

// ----- 遊戲狀態 -----
let mode = 'title';
let dist = 0;                 // 前進的格數（分數）
let speed = 5.5;              // 格/秒
let gapStreak = 0;            // 連續跳過峽谷
let best = parseInt(localStorage.getItem('parkour-best') || '0', 10) || 0;
let dispScore = 0;
let nextMilestone = 100;
let elapsed = 0;
let shake = 0, freeze = 0, flash = 0;
let deathTimer = -1;
let sinkDepth = 0;            // 掉進峽谷的下沉量
let overCooldown = 0;
let coins = 0, bonus = 0;     // 金幣數與獎勵分
let coinChain = 0, coinChainT = 0;
let shield = false;           // 護盾（掉洞免死一次）
let items = [];               // {row, h, type:'coin'|'star', seed}
let lastStarRow = 0;
let tutorialT = 0;
let playT = 0;                // 本場遊玩秒數（時長曲線用）
let firstGapHint = false;     // 首次遊玩：第一個峽谷前的教練提示
let hardMode = false;         // 🔥 極速模式（進階內容：更快更密、分數×2）
let hardUnlocked = localStorage.getItem('parkour-hard') === '1';
const HARD_UNLOCK = 100;      // 一般模式單場 100 分解鎖
const totalScore = () => (Math.floor(dist) + bonus) * (hardMode ? 2 : 1);

// 玩家（垂直跳躍物理）
const player = {
  h: 0, vy: 0, grounded: true,
  sx: 1, sy: 1,               // squash & stretch
  runCycle: 0,
  holdJump: false,
  airJumps: 1, spinT: 0       // 二段跳與翻轉動畫
};
const JUMP_V0 = 560, GRAVITY = 2100;

// 路面生成：rows[i] = {gap:boolean}；用 Map 以行號索引
let rowData = new Map();
let genRow = 0;               // 已生成到的行號
let lastGapRow = -10;
function ensureRows() {
  const target = Math.floor(dist) + 24;
  while (genRow < target) {
    genRow++;
    let gap = false, wide = false;
    // 安全學習期：一般前16格、極速前8格
    if (genRow > (hardMode ? 8 : 16) && genRow - lastGapRow >= (hardMode ? 3 : 4)) {
      const p = hardMode
        ? Math.min(0.44, 0.17 + dist * 0.0005)
        : Math.min(0.36, 0.115 + dist * 0.00045);
      if (Math.random() < p) {
        gap = true;
        // 寬峽谷：後期登場且比例漸增（極速模式提早報到）
        wide = hardMode
          ? genRow > 50 && Math.random() < Math.min(0.66, 0.4 + (dist - 50) * 0.0006)
          : genRow > 150 && Math.random() < Math.min(0.62, 0.35 + (dist - 150) * 0.0005);
      }
    }
    rowData.set(genRow, { gap, judged: false });
    const gapStart = genRow;
    if (gap && wide) {
      genRow++;
      rowData.set(genRow, { gap: true, judged: false, partner: true });
    }
    if (gap) {
      lastGapRow = genRow;
      // 峽谷上方金幣弧線（風險換獎勵）
      const span = wide ? 1.5 : 0.9;
      items.push({ row: gapStart - 0.25, h: 42, type: 'coin', seed: Math.random() * 7 });
      items.push({ row: gapStart + span * 0.45, h: wide ? 78 : 66, type: 'coin', seed: Math.random() * 7 });
      items.push({ row: gapStart + span, h: 42, type: 'coin', seed: Math.random() * 7 });
    } else if (genRow > 8 && Math.random() < 0.13) {
      // 平地金幣列（跑過就吃）
      for (let c = 0; c < 3; c++) items.push({ row: genRow + c * 0.45, h: 0, type: 'coin', seed: Math.random() * 7 });
    }
    if (genRow > 20 && !gap && genRow - lastStarRow > 60 && Math.random() < 0.06) {
      lastStarRow = genRow;
      items.push({ row: genRow, h: 55, type: 'star', seed: 0 });
    }
    // 路旁景物
    if (Math.random() < 0.5) {
      sideProps.push({
        row: genRow + Math.random(),
        side: Math.random() < 0.5 ? -1 : 1,
        off: 1.45 + Math.random() * 0.9,
        type: Math.random() < 0.55 ? 'tree' : (Math.random() < 0.5 ? 'bush' : 'flower'),
        seed: Math.random() * 10
      });
    }
  }
  // 清理走過的資料
  for (const k of rowData.keys()) {
    if (k < dist - 3) rowData.delete(k);
  }
  for (let i = sideProps.length - 1; i >= 0; i--) {
    if (sideProps[i].row < dist - 2) sideProps.splice(i, 1);
  }
  for (let i = items.length - 1; i >= 0; i--) {
    if (items[i].row < dist - 2) items.splice(i, 1);
  }
}
let sideProps = [];

// 雲朵（視差兩層）
let clouds = [];
function seedClouds() {
  clouds = [];
  for (let i = 0; i < 6; i++) {
    clouds.push({
      x: Math.random() * GAME_W,
      y: 30 + Math.random() * 110,
      w: 60 + Math.random() * 70,
      layer: i < 3 ? 0.4 : 1
    });
  }
}
seedClouds();

// ----- v6 環境生命：飛鳥（白天）與螢火蟲（夜晚）＋烘焙 vignette／螢光 -----
const birds = [];
let birdTimer = 3;
const fireflies = [];
for (let i = 0; i < 12; i++) {
  fireflies.push({ x: Math.random() * GAME_W, y: HORIZON_Y - 30 + Math.random() * 160, ph: Math.random() * 6.3, sp: 0.5 + Math.random() * 0.8 });
}
const vigCv = document.createElement('canvas');
(function bakeVig() {
  vigCv.width = GAME_W; vigCv.height = GAME_H;
  const g = vigCv.getContext('2d');
  const vg = g.createRadialGradient(GAME_W / 2, GAME_H * 0.44, GAME_H * 0.5, GAME_W / 2, GAME_H * 0.52, GAME_H * 1.05);
  vg.addColorStop(0, 'rgba(20,20,40,0)');
  vg.addColorStop(1, 'rgba(20,20,40,0.34)');
  g.fillStyle = vg; g.fillRect(0, 0, GAME_W, GAME_H);
})();
/* v7 金幣光暈（烘焙 radial，drawItems 內 additive 疊加） */
const coinGlowCv = document.createElement('canvas');
(function bakeCoinGlow() {
  coinGlowCv.width = coinGlowCv.height = 44;
  const g = coinGlowCv.getContext('2d');
  const rg = g.createRadialGradient(22, 22, 2, 22, 22, 22);
  rg.addColorStop(0, 'rgba(255,228,130,0.6)');
  rg.addColorStop(1, 'rgba(255,200,60,0)');
  g.fillStyle = rg; g.fillRect(0, 0, 44, 44);
})();
const fireflyCv = document.createElement('canvas');
(function bakeFirefly() {
  fireflyCv.width = fireflyCv.height = 24;
  const g = fireflyCv.getContext('2d');
  const rg = g.createRadialGradient(12, 12, 1, 12, 12, 12);
  rg.addColorStop(0, 'rgba(230,255,150,0.95)');
  rg.addColorStop(0.35, 'rgba(190,240,90,0.45)');
  rg.addColorStop(1, 'rgba(190,240,90,0)');
  g.fillStyle = rg; g.fillRect(0, 0, 24, 24);
})();
let stepPhase = 0;   // v6 腳步聲相位
let glintT = 0.6;    // v6 金幣閃光計時

// 粒子與飄字
const parts = [], floats = [];
function burst(x, y, color, n, speedP, up) {
  n = n || 10; speedP = speedP || 200;
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = speedP * (0.3 + Math.random() * 0.7);
    parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - (up || 0), life: 0.4 + Math.random() * 0.4, color, size: 3 + Math.random() * 4 });
  }
  if (parts.length > 260) parts.splice(0, parts.length - 260);
}
function addFloat(x, y, text, color, size, life) {
  floats.push({ x, y, text, color: color || '#fff', life: life || 0.9, size: size || 26 });
}

// ----- 更新 -----
function update(dt) {
  elapsed += dt;
  shake *= Math.pow(0.001, dt);
  if (shake < 0.05) shake = 0;
  flash = Math.max(0, flash - dt * 3);
  overCooldown = Math.max(0, overCooldown - dt);
  jumpBuffer = Math.max(0, jumpBuffer - dt);
  tutorialT = Math.max(0, tutorialT - dt);
  player.spinT = Math.max(0, player.spinT - dt);
  coinChainT -= dt;
  if (coinChainT <= 0) coinChain = 0;
  player.sx += (1 - player.sx) * Math.min(1, 12 * dt);
  player.sy += (1 - player.sy) * Math.min(1, 12 * dt);
  dispScore += (totalScore() - dispScore) * Math.min(1, 14 * dt);

  for (const p of parts) {
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 700 * dt; p.life -= dt;
  }
  for (let i = parts.length - 1; i >= 0; i--) {
    if (parts[i].life <= 0) { parts[i] = parts[parts.length - 1]; parts.pop(); }  // swap-pop 零搬移
  }
  for (const f of floats) { f.y -= 55 * dt; f.life -= dt; }
  for (let i = floats.length - 1; i >= 0; i--) if (floats[i].life <= 0) floats.splice(i, 1);
  for (const c of clouds) {
    c.x -= (4 + speed * 0.6) * c.layer * dt;
    if (c.x < -c.w - 30) { c.x = GAME_W + c.w; c.y = 30 + Math.random() * 110; }
  }

  // v6 飛鳥（白天偶爾飛過）
  birdTimer -= dt;
  if (birdTimer <= 0 && birds.length < 6 && (!theme || theme.night < 0.4)) {
    birdTimer = 5 + Math.random() * 7;
    const n = 1 + (Math.random() * 3 | 0), by = 34 + Math.random() * 100, sp2 = 34 + Math.random() * 26;
    for (let i = 0; i < n; i++) birds.push({ x: -30 - i * 22, y: by + (i % 2) * 10, vx: sp2, fl: Math.random() * 6.3 });
  }
  for (let i = birds.length - 1; i >= 0; i--) {
    const b = birds[i];
    b.x += b.vx * dt; b.fl += dt * 9;
    if (b.x > GAME_W + 40) birds.splice(i, 1);
  }
  // v6 螢火蟲漂移（夜晚才畫）
  for (const f of fireflies) {
    f.ph += dt * f.sp;
    f.x += Math.sin(f.ph * 1.3) * 12 * dt - speed * 1.5 * dt;
    f.y += Math.cos(f.ph) * 8 * dt;
    if (f.x < -20) f.x = GAME_W + 10;
    if (f.y < HORIZON_Y - 60) f.y = HORIZON_Y - 60;
    if (f.y > GAME_H - 40) f.y = GAME_H - 40;
  }
  // v6 風聲隨速度增強（死亡演出與結束畫面靜風）
  if (windGain && AC) {
    const wTarget = (muted || mode !== 'play' || deathTimer >= 0) ? 0 : Math.min(0.13, Math.max(0, (speed - 6) * 0.016));
    windGain.gain.setTargetAtTime(wTarget, AC.currentTime, 0.3);
  }
  // v6 金幣閃光（讓場上金幣不時閃一下星光）
  glintT -= dt;
  if (glintT <= 0) {
    glintT = 0.5 + Math.random() * 0.7;
    const vis = items.filter(it => it.type === 'coin' && it.row - dist > 1 && it.row - dist < 10);
    if (vis.length) {
      const it = vis[(Math.random() * vis.length) | 0];
      const pI = proj(it.row - dist);
      addFloat(GAME_W / 2 + (Math.random() * 18 - 9), pI.y - (14 + it.h * 0.55) * Math.max(pI.s, 0.2) - 8, '✦', '#fff8d0', 13, 0.45);
    }
  }

  // 死亡演出：往洞裡沉
  if (deathTimer >= 0) {
    deathTimer += dt;
    sinkDepth = Math.min(120, sinkDepth + 260 * dt);
    if (deathTimer > 0.85 && mode === 'play') endGame();
    return;
  }
  if (mode === 'over') return;

  // 前進與加速（漸進難度 + 衝刺收尾，讓多數場次在4分內結束；極速模式全面上調）
  if (mode === 'play') playT += dt;
  const lateRamp = Math.min(2.6, Math.max(0, playT - (hardMode ? 80 : 110)) * 0.026);
  const targetSpeed = (hardMode
    ? Math.min(14.5, 7.5 + dist * 0.014)
    : Math.min(13, 5.5 + dist * 0.012)) + lateRamp;
  speed += (targetSpeed - speed) * Math.min(1, 2 * dt);
  dist += speed * dt;
  ensureRows();

  // 首次遊玩：第一個峽谷靠近時給大字提示
  if (firstGapHint && mode === 'play') {
    for (const [row, data] of rowData) {
      if (data.gap && row - dist > 2 && row - dist < 4.5) {
        firstGapHint = false;
        addFloat(GAME_W / 2, 168, '前方有洞！', '#fff', 34, 1.7);
        addFloat(GAME_W / 2, 212, '點一下＝跳過去！', '#ffd447', 26, 1.7);
        break;
      }
    }
  }

  // 跳躍物理（title＝標題展示模式也要能跳，展示才像真的在玩）
  if (player.grounded && jumpBuffer > 0 && mode !== 'over') {
    jumpBuffer = 0;
    player.grounded = false;
    player.vy = JUMP_V0;
    player.sx = 0.72; player.sy = 1.35;
    if (mode === 'play') sfx.jump();
    const p0 = proj(0);
    burst(GAME_W / 2, p0.y - 6, 'rgba(220,190,150,1)', 5, 120, 40);
  }
  if (!player.grounded) {
    player.h += player.vy * dt;
    // 頂點懸浮：接近頂點時重力減半
    const g = Math.abs(player.vy) < 60 ? GRAVITY * 0.55 : GRAVITY;
    player.vy -= g * dt;
    if (player.h <= 0) {
      player.h = 0;
      player.grounded = true;
      player.airJumps = 1; player.spinT = 0;
      player.sx = 1.3; player.sy = 0.68;
      if (mode === 'play') sfx.land();
      const p0 = proj(0);
      burst(GAME_W / 2, p0.y - 6, 'rgba(220,190,150,1)', 6, 140, 30);
    }
  } else {
    player.runCycle += dt * (6 + speed * 0.9);
    // v6 腳步聲：跑步循環每半週期＝踏一步（左右交替音高）
    const ph = Math.floor(player.runCycle / Math.PI);
    if (ph !== stepPhase) { stepPhase = ph; if (mode === 'play') sfx.step(ph & 1); }
    // 跑步塵土
    if (Math.random() < dt * 8) {
      const p0 = proj(0);
      burst(GAME_W / 2 + (Math.random() * 30 - 15), p0.y - 4, 'rgba(215,185,145,0.9)', 1, 60, 20);
    }
  }

  // 撿金幣與護盾星星
  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    const d = it.row - dist;
    if (d < -0.45) { items.splice(i, 1); continue; }
    if (d < 0.42 && Math.abs(player.h - it.h) < 30) {
      items.splice(i, 1);
      const pI = proj(Math.max(d, 0));
      const iy = pI.y - 24 - it.h * 0.55;
      if (it.type === 'coin') {
        coins++;
        coinChain++; coinChainT = 1.4;
        bonus += 2;
        if (mode === 'play') sfx.coin(coinChain);
        burst(GAME_W / 2, iy, '#ffd447', 8, 200, 90);
        addFloat(GAME_W / 2 + 60, iy, '+2', '#ffd447', 22);
      } else {
        shield = true;
        bonus += 5;
        if (mode === 'play') sfx.star();
        burst(GAME_W / 2, iy, '#7fe3ff', 16, 260, 120);
        addFloat(GAME_W / 2, iy - 30, '⭐ 護盾！', '#7fe3ff', 28);
      }
    }
  }

  // 峽谷判定（寬容：稍微離地就算跳起）
  const airOK = player.h > 12;
  for (const [row, data] of rowData) {
    const rd = row - dist;
    if (!data.judged && rd < 0.35 && rd > -0.6) {
      data.judged = true;
      if (data.gap) {
        if (airOK || !player.grounded) {
          if (!data.partner) {
            gapStreak++;
            const p0 = proj(0.3);
            addFloat(GAME_W / 2, p0.y - 130, gapStreak > 1 ? '跳過 ×' + gapStreak + '！' : '跳過！', '#ffd447', 28);
            burst(GAME_W / 2, p0.y - 60, '#ffd447', 12, 240, 120);
            sfx.gap(gapStreak);
            if (gapStreak > 0 && gapStreak % 5 === 0) {
              bonus += 10;
              addFloat(GAME_W / 2, p0.y - 170, '🔥 連跳 ' + gapStreak + ' 次！+10', '#ff7043', 30);
            }
          }
        } else {
          if (mode === 'play') {
            if (shield) { rescue(); }
            else { die(); return; }
          }
          // 展示模式不死
        }
      }
    }
  }

  // 里程碑＝進入下一關（天色輪換）
  if (Math.floor(dist) >= nextMilestone) {
    addFloat(GAME_W / 2, 200, nextMilestone + ' 格！', '#fff', 40);
    addFloat(GAME_W / 2, 246, '進入第 ' + (nextMilestone / 100 + 1) + ' 關', '#ffd447', 24);
    if (mode === 'play') sfx.mile();
    // v6 里程碑彩帶：從畫面上方灑下彩色紙片
    const confC = ['#ffd447', '#f9629e', '#7fe3ff', '#9ed46a', '#ffb25c'];
    for (let ci = 0; ci < 26; ci++) {
      parts.push({ x: GAME_W * 0.2 + Math.random() * GAME_W * 0.6, y: 90 + Math.random() * 60,
        vx: (Math.random() * 2 - 1) * 120, vy: -60 - Math.random() * 140,
        life: 0.9 + Math.random() * 0.6, color: confC[ci % confC.length], size: 4 + Math.random() * 4 });
    }
    shake = 4;
    nextMilestone += 100;
  }

  // 展示模式：自動跳
  if (mode === 'title' && player.grounded) {
    for (const [row, data] of rowData) {
      const rd = row - dist;
      if (data.gap && rd > 0.4 && rd < 1.35) { pressJump(); setTimeout(releaseJump, 200); break; }
    }
  }
}

// ----- 繪圖 -----
function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ----- 關卡色票（每 100 格換一關：白天→黃昏→夜晚→清晨）-----
const THEMES = [
  { top:'#4a9fe8', mid:'#8ecbff', bot:'#eaf6ff', sun:'255,217,94',  m1:'110,160,200', m2:'80,130,175',  g1:'#9ed489', g2:'#4f9e4a', r1:'#e0a468', r2:'#c97a3a', night:0 },
  { top:'#7a4f9e', mid:'#f0846a', bot:'#ffd9a0', sun:'255,156,74',  m1:'150,110,150', m2:'110,80,130',  g1:'#8cb46e', g2:'#3f7a3e', r1:'#d18e56', r2:'#a85f2e', night:0 },
  { top:'#101a3a', mid:'#25335e', bot:'#3a4a78', sun:'232,236,255', m1:'40,60,100',   m2:'25,40,75',    g1:'#3f6e50', g2:'#22492e', r1:'#7a6248', r2:'#54402c', night:1 },
  { top:'#4a6ea0', mid:'#a8c0e0', bot:'#ffe9d0', sun:'255,224,138', m1:'120,140,180', m2:'90,110,150',  g1:'#8cc47e', g2:'#478a44', r1:'#d99a5e', r2:'#b06a34', night:0 }
];
function hex2rgb(h) { return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)]; }
function mixHex(a, b, t) {
  const A = hex2rgb(a), B = hex2rgb(b);
  return 'rgb(' + Math.round(A[0] + (B[0] - A[0]) * t) + ',' + Math.round(A[1] + (B[1] - A[1]) * t) + ',' + Math.round(A[2] + (B[2] - A[2]) * t) + ')';
}
function mixT(a, b, t) {
  const A = a.split(','), B = b.split(',');
  return A.map((v, i) => Math.round(+v + (+B[i] - +v) * t)).join(',');
}
let theme = null;
function updateTheme() {
  const seg = 100;
  const idx = Math.floor(dist / seg) % THEMES.length;
  const nxt = (idx + 1) % THEMES.length;
  const local = (dist % seg) / seg;
  const t = local > 0.9 ? (local - 0.9) * 10 : 0;   // 關卡尾端 10 格漸變
  const A = THEMES[idx], B = THEMES[nxt];
  theme = {
    top: mixHex(A.top, B.top, t), mid: mixHex(A.mid, B.mid, t), bot: mixHex(A.bot, B.bot, t),
    sun: mixT(A.sun, B.sun, t),
    m1: mixT(A.m1, B.m1, t), m2: mixT(A.m2, B.m2, t),
    g1: mixHex(A.g1, B.g1, t), g2: mixHex(A.g2, B.g2, t),
    r1: mixHex(A.r1, B.r1, t), r2: mixHex(A.r2, B.r2, t),
    night: A.night + (B.night - A.night) * t
  };
}
const stars = [];
for (let i = 0; i < 44; i++) stars.push({ x: Math.random() * GAME_W, y: Math.random() * (HORIZON_Y - 24), tw: Math.random() * 6.3 });

// ----- 主題漸層快取（只在主題色變化的過渡10格內重建，平時零配置）-----
const grad = { key: '', sky: null, glow: null, sun: null, grass: null, road: null };
function refreshGrads() {
  const key = theme.top + theme.mid + theme.bot + theme.sun + theme.g1 + theme.g2;
  if (key === grad.key) return;
  grad.key = key;
  const g = ctx.createLinearGradient(0, 0, 0, HORIZON_Y + 60);
  g.addColorStop(0, theme.top); g.addColorStop(0.6, theme.mid); g.addColorStop(1, theme.bot);
  grad.sky = g;
  const sg = ctx.createRadialGradient(GAME_W / 2, 62, 5, GAME_W / 2, 62, 90);
  sg.addColorStop(0, 'rgba(255,246,200,1)');
  sg.addColorStop(0.3, 'rgba(' + theme.sun + ',0.7)');
  sg.addColorStop(1, 'rgba(' + theme.sun + ',0)');
  grad.glow = sg;
  const sc = ctx.createRadialGradient(GAME_W / 2 - 8, 54, 3, GAME_W / 2, 62, 30);
  sc.addColorStop(0, '#fff6c8');
  sc.addColorStop(0.7, 'rgb(' + theme.sun + ')');
  sc.addColorStop(1, 'rgb(' + theme.sun + ')');
  grad.sun = sc;
  const gl = ctx.createLinearGradient(0, HORIZON_Y, 0, GAME_H);
  gl.addColorStop(0, theme.g1); gl.addColorStop(1, theme.g2);
  grad.grass = gl;
  const rg = ctx.createLinearGradient(0, HORIZON_Y, 0, GAME_H);
  rg.addColorStop(0, theme.r1); rg.addColorStop(1, theme.r2);
  grad.road = rg;
  // v6 地平線霧靄帶（快取漸層：柔化天地交界、增加大氣深度）
  const hz = ctx.createLinearGradient(0, HORIZON_Y - 34, 0, HORIZON_Y + 40);
  const bot = theme.bot.match(/\d+/g).slice(0, 3);   // theme.bot 為 rgb(...) 字串
  hz.addColorStop(0, 'rgba(' + bot.join(',') + ',0)');
  hz.addColorStop(0.5, 'rgba(' + bot.join(',') + ',0.5)');
  hz.addColorStop(1, 'rgba(' + bot.join(',') + ',0)');
  grad.haze = hz;
}

function drawSky() {
  ctx.fillStyle = grad.sky;
  ctx.fillRect(0, 0, GAME_W, HORIZON_Y + 60);

  // 夜空星星
  if (theme.night > 0.05) {
    for (const st of stars) {
      ctx.globalAlpha = theme.night * (0.4 + 0.6 * Math.abs(Math.sin(elapsed * 1.8 + st.tw)));
      ctx.fillStyle = '#fff';
      ctx.fillRect(st.x, st.y, 2.4, 2.4);
    }
    ctx.globalAlpha = 1;
  }

  // 太陽／月亮（光暈 + 漸層本體，漸層取自快取）
  ctx.fillStyle = grad.glow;
  ctx.beginPath();
  ctx.arc(GAME_W / 2, 62, 90, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = grad.sun;
  ctx.beginPath();
  ctx.arc(GAME_W / 2, 62, 30, 0, Math.PI * 2);
  ctx.fill();

  // 遠山（兩層剪影）
  ctx.fillStyle = 'rgba(' + theme.m1 + ',0.5)';
  ctx.beginPath();
  ctx.moveTo(0, HORIZON_Y);
  for (let x = 0; x <= GAME_W; x += 24) {
    ctx.lineTo(x, HORIZON_Y - 26 - Math.abs(Math.sin(x * 0.011 + 2)) * 36);
  }
  ctx.lineTo(GAME_W, HORIZON_Y);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = 'rgba(' + theme.m2 + ',0.55)';
  ctx.beginPath();
  ctx.moveTo(0, HORIZON_Y);
  for (let x = 0; x <= GAME_W; x += 24) {
    ctx.lineTo(x, HORIZON_Y - 10 - Math.abs(Math.sin(x * 0.017 + 5)) * 22);
  }
  ctx.lineTo(GAME_W, HORIZON_Y);
  ctx.closePath();
  ctx.fill();

  // v6 飛鳥（簡筆雙翼，拍翅動畫）
  if (birds.length) {
    ctx.strokeStyle = theme.night > 0.4 ? 'rgba(200,210,235,0.5)' : 'rgba(50,60,80,0.75)';
    ctx.lineWidth = 2.4;
    ctx.lineCap = 'round';
    for (const b of birds) {
      const w = 7 + Math.sin(b.fl) * 4;
      ctx.beginPath();
      ctx.moveTo(b.x - 8, b.y - w * 0.6);
      ctx.quadraticCurveTo(b.x - 3, b.y, b.x, b.y);
      ctx.quadraticCurveTo(b.x + 3, b.y, b.x + 8, b.y - w * 0.6);
      ctx.stroke();
    }
  }

  // 雲朵（兩層視差 + 底部陰影）
  for (const c of clouds) {
    const a = c.layer < 1 ? 0.55 : 0.85;
    ctx.fillStyle = 'rgba(255,255,255,' + a + ')';
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.w * 0.5, c.w * 0.17, 0, 0, Math.PI * 2);
    ctx.ellipse(c.x + c.w * 0.26, c.y + 4, c.w * 0.32, c.w * 0.13, 0, 0, Math.PI * 2);
    ctx.ellipse(c.x - c.w * 0.28, c.y + 5, c.w * 0.28, c.w * 0.11, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(150,180,215,' + a * 0.35 + ')';
    ctx.beginPath();
    ctx.ellipse(c.x + 3, c.y + c.w * 0.1, c.w * 0.4, c.w * 0.06, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function roadEdgeX(d, side) {
  const p = proj(d);
  return GAME_W / 2 + side * ROAD_HALF * p.s;
}

function drawGround() {
  // 兩側草地（漸層 + 遠淡近深，隨關卡變色）
  ctx.fillStyle = grad.grass;
  ctx.fillRect(0, HORIZON_Y, GAME_W, GAME_H - HORIZON_Y);

  // v6 草地透視條紋：隨里程流動的明暗帶（強化速度與深度感）
  ctx.fillStyle = 'rgba(255,255,255,0.045)';
  const gRow0 = Math.floor(dist);
  for (let row = gRow0 + ((gRow0 % 2 === 0) ? 0 : 1); row < gRow0 + 20; row += 2) {
    const dNear = row - dist, dFar = dNear + 1;
    if (dFar < -0.5) continue;
    const pn = proj(Math.max(dNear, -1)), pf = proj(dFar);
    ctx.fillRect(0, pf.y, GAME_W, pn.y - pf.y);
  }

  // 道路本體（大梯形）
  ctx.fillStyle = grad.road;
  ctx.beginPath();
  ctx.moveTo(roadEdgeX(60, -1), proj(60).y);
  ctx.lineTo(roadEdgeX(60, 1), proj(60).y);
  ctx.lineTo(roadEdgeX(-1, 1), proj(-1).y);
  ctx.lineTo(roadEdgeX(-1, -1), proj(-1).y);
  ctx.closePath();
  ctx.fill();

  // 路緣白邊
  for (const side of [-1, 1]) {
    ctx.strokeStyle = 'rgba(255,248,230,0.75)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(roadEdgeX(40, side), proj(40).y);
    ctx.lineTo(roadEdgeX(-1, side), proj(-1).y);
    ctx.stroke();
  }

  // 格線橫檔 + 峽谷 + 格號（由遠到近畫）
  const startRow = Math.floor(dist) + 18;
  for (let row = startRow; row >= Math.floor(dist) - 1; row--) {
    const dNear = row - dist, dFar = dNear + 1;
    if (dFar < -0.5 || dNear > 18) continue;
    const pn = proj(Math.max(dNear, -1)), pf = proj(dFar);
    const data = rowData.get(row);

    // 交錯地磚微色差（棋盤感）
    if (row % 2 === 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      ctx.beginPath();
      ctx.moveTo(GAME_W / 2 - ROAD_HALF * pf.s, pf.y);
      ctx.lineTo(GAME_W / 2 + ROAD_HALF * pf.s, pf.y);
      ctx.lineTo(GAME_W / 2 + ROAD_HALF * pn.s, pn.y);
      ctx.lineTo(GAME_W / 2 - ROAD_HALF * pn.s, pn.y);
      ctx.closePath();
      ctx.fill();
    }

    if (data && data.gap) {
      // 峽谷：深洞 + 內壁 + 邊緣碎石
      const inset = 0.06;
      const gy1 = proj(dFar - inset), gy2 = proj(dNear + inset);
      const hw1 = ROAD_HALF * 0.92 * gy1.s, hw2 = ROAD_HALF * 0.92 * gy2.s;
      // 洞口（平色兩層取代每幀重建的漸層：黑底 + 中段微亮）
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.moveTo(GAME_W / 2 - hw1, gy1.y);
      ctx.lineTo(GAME_W / 2 + hw1, gy1.y);
      ctx.lineTo(GAME_W / 2 + hw2, gy2.y);
      ctx.lineTo(GAME_W / 2 - hw2, gy2.y);
      ctx.closePath();
      ctx.fill();
      const my1 = gy1.y + (gy2.y - gy1.y) * 0.28, my2 = gy1.y + (gy2.y - gy1.y) * 0.72;
      const mw1 = hw1 + (hw2 - hw1) * 0.28, mw2 = hw1 + (hw2 - hw1) * 0.72;
      ctx.fillStyle = '#1a1208';
      ctx.beginPath();
      ctx.moveTo(GAME_W / 2 - mw1, my1);
      ctx.lineTo(GAME_W / 2 + mw1, my1);
      ctx.lineTo(GAME_W / 2 + mw2, my2);
      ctx.lineTo(GAME_W / 2 - mw2, my2);
      ctx.closePath();
      ctx.fill();
      // 內壁受光面（上緣）
      ctx.fillStyle = 'rgba(120,70,30,0.85)';
      ctx.beginPath();
      ctx.moveTo(GAME_W / 2 - hw1, gy1.y);
      ctx.lineTo(GAME_W / 2 + hw1, gy1.y);
      ctx.lineTo(GAME_W / 2 + hw1 * 0.97, gy1.y + 6 * gy1.s);
      ctx.lineTo(GAME_W / 2 - hw1 * 0.97, gy1.y + 6 * gy1.s);
      ctx.closePath();
      ctx.fill();
      // 近緣警示碎石
      ctx.fillStyle = 'rgba(90,50,20,0.9)';
      for (let i = 0; i < 6; i++) {
        const fx = GAME_W / 2 - hw2 + (i + 0.5) * (hw2 * 2 / 6);
        ctx.beginPath();
        ctx.arc(fx, gy2.y + 2 * gy2.s, 2.6 * gy2.s, 0, Math.PI * 2);
        ctx.fill();
      }
    } else {
      // 橫格線（有厚度的陰影線）
      ctx.strokeStyle = 'rgba(80,40,10,0.4)';
      ctx.lineWidth = Math.max(1, 3.4 * pn.s);
      ctx.beginPath();
      ctx.moveTo(GAME_W / 2 - ROAD_HALF * pn.s, pn.y);
      ctx.lineTo(GAME_W / 2 + ROAD_HALF * pn.s, pn.y);
      ctx.stroke();
      // 每 10 格畫格號（路面標記，向遠方縮小）
      if (row % 10 === 0 && row > 0) {
        const mid = proj(dNear + 0.5);
        ctx.save();
        ctx.translate(GAME_W / 2, mid.y);
        ctx.scale(mid.s, mid.s * 0.55);
        ctx.fillStyle = 'rgba(60,30,10,0.4)';
        ctx.font = 'bold 46px "Microsoft JhengHei", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(String(row), 0, 16);
        ctx.restore();
      }
    }
  }

  // 直向格線（透視向消失點）
  ctx.strokeStyle = 'rgba(80,40,10,0.28)';
  for (const lx of [-0.5, 0, 0.5]) {
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(GAME_W / 2 + lx * 2 * ROAD_HALF * proj(30).s, proj(30).y);
    ctx.lineTo(GAME_W / 2 + lx * 2 * ROAD_HALF * proj(-1).s, proj(-1).y);
    ctx.stroke();
  }
}

// ----- 離屏 sprite：一次繪製、每幀 drawImage（2x 超取樣近距離不糊）-----
function makeSprite(w, h, ox, oy, paint) {
  const c = document.createElement('canvas');
  c.width = w * 2; c.height = h * 2;
  const g = c.getContext('2d');
  g.scale(2, 2);
  g.translate(ox, oy);
  paint(g);
  return { c, w, h, ox, oy };
}
function paintFlower(g, petalC, seed) {
  g.strokeStyle = '#3f7a2e';
  g.lineWidth = 3;
  g.beginPath();
  g.moveTo(0, 0);
  g.quadraticCurveTo(2, -12, 0, -20);
  g.stroke();
  g.fillStyle = petalC;
  for (let i = 0; i < 5; i++) {
    const a = i * Math.PI * 2 / 5 + seed;
    g.beginPath();
    g.arc(Math.cos(a) * 6, -20 + Math.sin(a) * 6, 4.5, 0, Math.PI * 2);
    g.fill();
  }
  g.fillStyle = '#ffd447';
  g.beginPath();
  g.arc(0, -20, 4, 0, Math.PI * 2);
  g.fill();
}
const SPR = {
  tree: makeSprite(104, 134, 52, 122, g => {
    g.fillStyle = 'rgba(30,60,25,0.25)';
    g.beginPath(); g.ellipse(6, 2, 34, 8, 0, 0, Math.PI * 2); g.fill();
    const tg = g.createLinearGradient(-7, 0, 7, 0);
    tg.addColorStop(0, '#8c5a3c'); tg.addColorStop(0.5, '#6b4028'); tg.addColorStop(1, '#4d2c1a');
    g.fillStyle = tg;

    const blob = (bx, by, r, light) => {
      const lg = g.createRadialGradient(bx - r * 0.35, by - r * 0.4, r * 0.15, bx, by, r);
      lg.addColorStop(0, light ? '#aee239' : '#7fb844');
      lg.addColorStop(1, '#3f7a2e');
      g.fillStyle = lg;
      g.beginPath(); g.arc(bx, by, r, 0, Math.PI * 2); g.fill();
    };
    blob(-20, -66, 26, false);
    blob(20, -68, 24, false);
    blob(0, -88, 30, true);
  }),
  bush: makeSprite(62, 46, 31, 36, g => {
    g.fillStyle = 'rgba(30,60,25,0.25)';
    g.beginPath(); g.ellipse(3, 2, 26, 6, 0, 0, Math.PI * 2); g.fill();
    const bg2 = g.createRadialGradient(-6, -16, 3, 0, -10, 26);
    bg2.addColorStop(0, '#9ed46a'); bg2.addColorStop(1, '#3f7a2e');
    g.fillStyle = bg2;
    g.beginPath();
    g.arc(-12, -10, 14, 0, Math.PI * 2);
    g.arc(0, -16, 16, 0, Math.PI * 2);
    g.arc(13, -9, 13, 0, Math.PI * 2);
    g.fill();
    g.fillStyle = '#d94f45';
    g.beginPath(); g.arc(-6, -14, 2.6, 0, Math.PI * 2); g.fill();

  }),
  flowerW: makeSprite(26, 38, 13, 33, g => paintFlower(g, '#fff', 2)),
  flowerP: makeSprite(26, 38, 13, 33, g => paintFlower(g, '#ff9dc9', 6.5))
};

function drawSideProps() {
  // 由遠到近：陣列本身按 row 遞增生成，反向迭代＝免排序免配置
  for (let i = sideProps.length - 1; i >= 0; i--) {
    const sp = sideProps[i];
    const d = sp.row - dist;
    if (d < -0.8 || d > 17) continue;
    const p = proj(d);
    const x = GAME_W / 2 + sp.side * ROAD_HALF * sp.off * p.s * 1.35;
    ctx.save();
    ctx.translate(x, p.y);
    ctx.scale(p.s, p.s);
    const spr = sp.type === 'tree' ? SPR.tree
      : sp.type === 'bush' ? SPR.bush
      : (sp.seed > 5 ? SPR.flowerP : SPR.flowerW);
    ctx.drawImage(spr.c, -spr.ox, -spr.oy, spr.w, spr.h);
    ctx.restore();
  }
}

// ----- 金幣與護盾星星（離屏 sprite，擺動/旋轉用 transform 保留）-----
function starShape(g, cx2, cy2, spikes, rOut, rIn) {
  g.beginPath();
  for (let i = 0; i < spikes * 2; i++) {
    const r = i % 2 === 0 ? rOut : rIn;
    const a = i * Math.PI / spikes - Math.PI / 2;
    g.lineTo(cx2 + Math.cos(a) * r, cy2 + Math.sin(a) * r);
  }
  g.closePath();
}
SPR.coin = makeSprite(30, 30, 15, 15, g => {
  const cg = g.createRadialGradient(-3, -3, 2, 0, 0, 13);
  cg.addColorStop(0, '#fff2b0');
  cg.addColorStop(0.6, '#ffd447');
  cg.addColorStop(1, '#d99a10');
  g.fillStyle = cg;
  g.beginPath(); g.arc(0, 0, 12, 0, Math.PI * 2); g.fill();
  g.strokeStyle = 'rgba(150,100,10,0.7)';
  g.lineWidth = 2.5;
  g.beginPath(); g.arc(0, 0, 7.5, 0, Math.PI * 2); g.stroke();
});
SPR.star = makeSprite(56, 56, 28, 28, g => {
  const sg3 = g.createRadialGradient(0, 0, 2, 0, 0, 26);
  sg3.addColorStop(0, 'rgba(160,240,255,0.8)');
  sg3.addColorStop(1, 'rgba(120,220,255,0)');
  g.fillStyle = sg3;
  g.beginPath(); g.arc(0, 0, 26, 0, Math.PI * 2); g.fill();
  g.fillStyle = '#7fe3ff';
  starShape(g, 0, 0, 5, 15, 6.5);
  g.fill();
  g.fillStyle = 'rgba(255,255,255,0.85)';
  starShape(g, -2, -2, 5, 7, 3);
  g.fill();
});
function drawItems() {
  for (let i = items.length - 1; i >= 0; i--) {   // 反向＝由遠到近
    const it = items[i];
    const d = it.row - dist;
    if (d < -0.5 || d > 16) continue;
    const p = proj(d);
    const y = p.y - (14 + it.h * 0.55) * Math.max(p.s, 0.2);
    ctx.save();
    ctx.translate(GAME_W / 2, y);
    ctx.scale(p.s, p.s);
    if (it.type === 'coin') {
      ctx.translate(0, Math.sin(elapsed * 5 + it.seed) * 2.5);
      // v7 金幣光暈：烘焙 radial additive 疊底，金幣更醒目發亮
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = 0.75;
      ctx.drawImage(coinGlowCv, -22, -22, 44, 44);
      ctx.restore();
      ctx.scale(Math.abs(Math.sin(elapsed * 3.2 + it.seed)) * 0.75 + 0.25, 1);
      ctx.drawImage(SPR.coin.c, -SPR.coin.ox, -SPR.coin.oy, SPR.coin.w, SPR.coin.h);
    } else {
      const pulse = 1 + Math.sin(elapsed * 6) * 0.12;
      ctx.scale(pulse, pulse);
      ctx.rotate(Math.sin(elapsed * 2.2) * 0.25);
      ctx.drawImage(SPR.star.c, -SPR.star.ox, -SPR.star.oy, SPR.star.w, SPR.star.h);
    }
    ctx.restore();
  }
}

// ----- 背影小跑者（多部件 + 漸層 + 跑步動畫）-----
// 跑者漸層都在局部座標、顏色固定 → 啟動時建一次
const RGRAD = (() => {
  const legL = ctx.createLinearGradient(-8, 0, 8, 0);
  legL.addColorStop(0, '#33538f'); legL.addColorStop(1, '#25406f');
  const legR = ctx.createLinearGradient(-8, 0, 8, 0);
  legR.addColorStop(0, '#4a6db4'); legR.addColorStop(1, '#33538f');
  const torso = ctx.createLinearGradient(0, -75, 0, -25);
  torso.addColorStop(0, '#ff9dc9'); torso.addColorStop(1, '#f9629e');
  const arm = ctx.createLinearGradient(0, 0, 0, 30);
  arm.addColorStop(0, '#ffd9b0'); arm.addColorStop(1, '#f2b783');
  const hair = ctx.createRadialGradient(-6, -104, 3, 0, -98, 20);
  hair.addColorStop(0, '#4a382a'); hair.addColorStop(1, '#2a1c14');
  return { legL, legR, torso, arm, hair };
})();
function drawRunner() {
  const p0 = proj(0);
  const groundY = p0.y - 4;
  const jumpPx = player.h * 0.55;
  const bob = player.grounded ? Math.abs(Math.sin(player.runCycle)) * -4 : 0;
  const swing = player.grounded ? Math.sin(player.runCycle) * 26 : 10;
  const cx = GAME_W / 2;

  // 影子（跳越高越小）
  const shScale = Math.max(0.35, 1 - jumpPx / 160);
  ctx.fillStyle = 'rgba(0,0,0,' + (0.28 * shScale) + ')';
  ctx.beginPath();
  ctx.ellipse(cx, groundY, 34 * shScale, 8 * shScale, 0, 0, Math.PI * 2);

  ctx.save();

    ctx.rotate(Math.min(0.5, deathTimer * 1.2));

    // 二段跳 360° 前空翻（繞身體中心）
    ctx.translate(0, -55);
    ctx.rotate((1 - player.spinT / 0.45) * Math.PI * 2);
    ctx.translate(0, 55);
  }
  ctx.scale(player.sx, player.sy);

  const S = 1.05; // 整體比例

  // === 腿（牛仔褲，後視，擺動）===
  const legSwing = deathTimer >= 0 ? 20 : swing;

    ctx.save();
    ctx.translate(side * 12, -30);
    ctx.rotate(rot * Math.PI / 180);
    ctx.fillStyle = lg;
    ctx.beginPath();
    ctx.moveTo(-7, 0);
    ctx.quadraticCurveTo(-11, 26, -8, 50);
    ctx.lineTo(6, 50);
    ctx.quadraticCurveTo(4, 24, 7, 0);

    ctx.fill();
    ctx.strokeStyle = '#fff';

    ctx.beginPath();
    ctx.moveTo(-9, 54);
    ctx.quadraticCurveTo(-1, 58, 8, 54);
    ctx.stroke();
    ctx.restore();
  };
  drawLeg(-1, legSwing, RGRAD.legL);
  drawLeg(1, -legSwing, RGRAD.legR);

  // === 軀幹（粉色上衣 + 立體陰影）===
  ctx.fillStyle = RGRAD.torso;
  ctx.beginPath();
  ctx.moveTo(-19, -70);
  ctx.quadraticCurveTo(0, -82, 19, -70);
  ctx.lineTo(21, -28);
  ctx.quadraticCurveTo(0, -17, -21, -28);
  ctx.closePath();
  ctx.fill();
  // 背中線 + 側面陰影
  ctx.strokeStyle = 'rgba(0,0,0,0.1)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-1, -78);
  ctx.quadraticCurveTo(0, -50, -1, -20);
  ctx.stroke();
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.beginPath();
  ctx.moveTo(-19, -70);
  ctx.quadraticCurveTo(-21, -48, -21, -28);
  ctx.lineTo(-16, -27);
  ctx.quadraticCurveTo(-16, -48, -14, -68);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.16)';
  ctx.beginPath();
  ctx.moveTo(19, -70);
  ctx.quadraticCurveTo(21, -48, 21, -28);
  ctx.lineTo(16, -27);
  ctx.quadraticCurveTo(16, -48, 14, -68);
  ctx.closePath();
  ctx.fill();
  // 衣襬
  ctx.strokeStyle = 'rgba(0,0,0,0.12)';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(-20, -28);
  ctx.quadraticCurveTo(0, -19, 20, -28);
  ctx.stroke();

  // === 手臂（膚色 + 粉短袖，前後擺）===
  const armSwing = deathTimer >= 0 ? -30 : -swing * 0.7;
  const drawArm = (side, rot) => {
    ctx.save();
    ctx.translate(side * 17, -66);
    ctx.rotate(rot * Math.PI / 180 * side);
    ctx.fillStyle = RGRAD.arm;
    ctx.beginPath();
    ctx.moveTo(-5 * side, 0);
    ctx.quadraticCurveTo(side * 13, 8, side * 12, 28);
    ctx.quadraticCurveTo(side * 8, 32, side * 4, 28);
    ctx.quadraticCurveTo(side * 3, 12, -2 * side, 6);
    ctx.closePath();
    ctx.fill();
    // 短袖
    ctx.fillStyle = '#ff9dc9';
    ctx.beginPath();
    ctx.moveTo(-6 * side, -2);
    ctx.quadraticCurveTo(side * 12, 2, side * 11, 15);
    ctx.quadraticCurveTo(side * 4, 17, side * 1, 10);
    ctx.closePath();
    ctx.fill();
    // 小手（握拳）
    ctx.fillStyle = '#f2b783';
    ctx.beginPath();
    ctx.arc(side * 9, 30, 4.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  };
  drawArm(-1, armSwing);
  drawArm(1, -armSwing);

  // === 脖子與頭（後腦勺 + 亮澤髮絲 + 馬尾）===
  ctx.fillStyle = '#eeb287';
  rr(-6, -88, 12, 12, 4);
  ctx.fill();
  ctx.fillStyle = RGRAD.hair;
  ctx.beginPath();
  ctx.arc(0, -98, 18, 0, Math.PI * 2);
  ctx.fill();
  // 髮絲高光
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 2.4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-14, -104);
  ctx.quadraticCurveTo(-6, -114, 4, -113);
  ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-10, -92);
  ctx.quadraticCurveTo(-2, -100, 8, -98);
  ctx.stroke();
  // 耳朵
  ctx.fillStyle = '#eeb287';
  ctx.beginPath(); ctx.arc(-17, -96, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(17, -96, 3, 0, Math.PI * 2); ctx.fill();
  // 馬尾（隨跑步/跳躍甩動）
  const tailSwing = player.grounded ? Math.sin(player.runCycle) * 6 : -player.vy * 0.02;
  ctx.fillStyle = RGRAD.hair;
  ctx.beginPath();
  ctx.moveTo(10, -92);
  ctx.quadraticCurveTo(24 + tailSwing, -80, 16 + tailSwing * 1.4, -60);
  ctx.quadraticCurveTo(10, -78, 4, -88);
  ctx.closePath();
  ctx.fill();
  // 髮圈
  ctx.fillStyle = '#ffd447';
  ctx.beginPath();
  ctx.arc(12, -89, 3, 0, Math.PI * 2);
  ctx.fill();

  // 護盾泡泡
  if (shield) {
    const pl = 1 + Math.sin(elapsed * 5) * 0.05;
    ctx.beginPath();
    ctx.ellipse(0, -55, 52 * pl, 72 * pl, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(127,227,255,0.12)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(127,227,255,' + (0.55 + Math.sin(elapsed * 5) * 0.2) + ')';
    ctx.lineWidth = 4;
    ctx.stroke();
  }

  ctx.restore();
}

function drawParts() {
  for (const p of parts) {
    ctx.globalAlpha = Math.max(0, Math.min(1, p.life * 2.2));
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}
function drawFloats() {
  ctx.textAlign = 'center';
  for (const f of floats) {
    ctx.globalAlpha = Math.max(0, Math.min(1, f.life * 1.5));
    ctx.font = 'bold ' + f.size + 'px "Microsoft JhengHei", sans-serif';
    ctx.strokeStyle = 'rgba(60,30,10,0.6)';
    ctx.lineWidth = 4;
    ctx.strokeText(f.text, f.x, f.y);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

function drawSpeedLines() {
  const intensity = (speed - 8) / 5;
  if (intensity <= 0) return;
  ctx.strokeStyle = 'rgba(255,255,255,' + Math.min(0.35, intensity * 0.3) + ')';
  ctx.lineWidth = 2;
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2 + elapsed * 2;
    const r1 = 240 + Math.sin(elapsed * 9 + i * 3) * 40;
    const r2 = r1 + 60 + intensity * 60;
    ctx.beginPath();
    ctx.moveTo(GAME_W / 2 + Math.cos(a) * r1, 290 + Math.sin(a) * r1 * 0.6);
    ctx.lineTo(GAME_W / 2 + Math.cos(a) * r2, 290 + Math.sin(a) * r2 * 0.6);
    ctx.stroke();
  }
}

/* v7 HUD 膠囊：陰影＋白底一次畫，介面更有立體卡片感 */
function capsule(x, y, w, h, r, alpha) {
  ctx.fillStyle = 'rgba(20,40,80,0.16)';
  rr(x, y + 3, w, h, r);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
  rr(x, y, w, h, r);
  ctx.fill();
}
function drawHUD() {
  // 白色圓角膠囊（承襲原作 HUD 樣式）
  capsule(GAME_W / 2 - 150, 16, 300, 46, 23, 0.88);
  ctx.fillStyle = '#2c3e50';
  ctx.textAlign = 'center';
  ctx.font = 'bold 24px "Microsoft JhengHei", sans-serif';
  ctx.fillText('分數: ' + Math.round(dispScore), GAME_W / 2, 47);

  // 極速模式徽章
  if (hardMode) {
    ctx.fillStyle = 'rgba(232,88,47,0.92)';
    rr(GAME_W / 2 + 158, 20, 96, 38, 19);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px "Microsoft JhengHei", sans-serif';
    ctx.fillText('🔥 ×2', GAME_W / 2 + 206, 45);
  }

  ctx.textAlign = 'left';
  capsule(16, 16, 150, 40, 20, 0.85);
  ctx.fillStyle = '#2c3e50';
  ctx.font = '16px "Microsoft JhengHei", sans-serif';
  ctx.fillText('🏆 最佳 ' + best, 32, 42);

  // 金幣計數 ＋ 護盾指示
  capsule(16, 62, shield ? 196 : 112, 36, 18, 0.85);
  ctx.fillStyle = '#b07a10';
  ctx.font = 'bold 17px "Microsoft JhengHei", sans-serif';
  ctx.fillText('🪙 × ' + coins, 32, 86);
  if (shield) {
    ctx.fillStyle = '#1e9ec4';
    ctx.fillText('⭐ 護盾', 126, 86);
  }

  // 速度計
  capsule(GAME_W - 166 - 60, 16, 150, 40, 20, 0.85);
  ctx.fillStyle = '#2c3e50';
  ctx.font = '15px "Microsoft JhengHei", sans-serif';
  ctx.fillText('速度', GAME_W - 210, 41);
  const lv = Math.min(8, Math.floor((speed - 5.5) / 1.27));  // 對應新極速 15.6
  for (let i = 0; i < 8; i++) {
    ctx.fillStyle = i <= lv ? (i > 5 ? '#e8582f' : '#f9629e') : 'rgba(44,62,80,0.15)';
    ctx.fillRect(GAME_W - 168 + i * 13, 30 + (7 - i) * 1.2, 9, 14 - (7 - i) * 1.2);
  }

  if (gapStreak > 1 && mode === 'play') {
    ctx.textAlign = 'center';
    ctx.font = 'bold 19px "Microsoft JhengHei", sans-serif';
    ctx.strokeStyle = 'rgba(60,30,10,0.55)';
    ctx.lineWidth = 4;
    ctx.strokeText('🔥 連跳 ×' + gapStreak, GAME_W / 2, 88);
    ctx.fillStyle = '#ffd447';
    ctx.fillText('🔥 連跳 ×' + gapStreak, GAME_W / 2, 88);
  }

  // 首次遊玩教學提示
  if (tutorialT > 0 && mode === 'play') {
    ctx.globalAlpha = Math.min(1, tutorialT);
    ctx.textAlign = 'center';
    ctx.font = 'bold 21px "Microsoft JhengHei", sans-serif';
    const tip = '點一下＝跳　長按＝跳更高　空中再點＝二段跳';
    ctx.strokeStyle = 'rgba(20,40,80,0.7)';
    ctx.lineWidth = 5;
    ctx.strokeText(tip, GAME_W / 2, GAME_H - 34);
    ctx.fillStyle = '#fff';
    ctx.fillText(tip, GAME_W / 2, GAME_H - 34);
    ctx.globalAlpha = 1;
  }
}

function draw() {
  updateTheme();
  refreshGrads();
  ctx.save();
  if (shake > 0) ctx.translate((Math.random() * 2 - 1) * shake, (Math.random() * 2 - 1) * shake);

  drawSky();
  drawGround();

  // v6 地平線霧靄（柔化交界、遠景更有空氣感）
  ctx.fillStyle = grad.haze;
  ctx.fillRect(0, HORIZON_Y - 34, GAME_W, 74);

  drawSideProps();

  // v6 螢火蟲（夜晚限定，additive 光點）
  if (theme.night > 0.05) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const f of fireflies) {
      const tw = 0.35 + 0.65 * Math.abs(Math.sin(f.ph * 2.1));
      ctx.globalAlpha = theme.night * tw;
      const sz = 10 + tw * 8;
      ctx.drawImage(fireflyCv, f.x - sz / 2, f.y - sz / 2, sz, sz);
    }
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  drawItems();
  drawRunner();
  drawParts();
  drawFloats();
  drawSpeedLines();

  ctx.restore();

  // v6 烘焙 vignette：聚焦畫面中心（一次烘焙，零即時漸層）
  ctx.drawImage(vigCv, 0, 0, GAME_W, GAME_H);

  drawHUD();

  if (flash > 0) {
    ctx.globalAlpha = flash;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    ctx.globalAlpha = 1;
  }
}

// ----- 主迴圈 -----
const STEP = 1 / 60;
let last = performance.now(), acc = 0;
function frame(now) {
  requestAnimationFrame(frame);
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while (acc >= STEP) {
    if (freeze > 0) { freeze -= STEP; acc -= STEP; continue; }
    update(STEP);
    acc -= STEP;
  }
  draw();
}

resetGame(false);
mode = 'title';
titleOverlay.classList.add('show');
requestAnimationFrame(frame);

// 測試掛鉤（自動化冒煙測試用，不影響遊戲）
window.__test = () => ({ mode, dist, h: player.h, score: totalScore(), speed, hard: hardMode, unlocked: hardUnlocked, parts: parts.length, items: items.length });
</script>

  ping(K+"-v");

    window.removeEventListener("pointerdown",once); window.removeEventListener("keydown",once); }

  function initVotes(){

    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;

        }); });
      });

    defs.forEach(function(d){

      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";

      });
      btns[d[0]]=b; wrap.appendChild(b);

    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* 每10秒同步別人投的票 */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
