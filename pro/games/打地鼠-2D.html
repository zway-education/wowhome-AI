/* ============================================================
   打地鼠小遊戲 — 專業升級版
   透視草原上的九個地洞：普通地鼠 +10、黃金地鼠 +30 還加時間、
   炸彈千萬別敲！連擊越高倍率越高。固定時間步進＋全套手感。
   ============================================================ */

/* ===== 畫布（v2：直向／橫向雙版面）===== */
let GAME_W = 960, GAME_H = 540, PORTRAIT = false, HORIZON = 210;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let HOLES = [];
let bgCanvas = null, bgDirty = true, bgHasImgs = false;   /* v3：靜態背景快取 */
function layout(){
  PORTRAIT = innerHeight > innerWidth;
  GAME_W = PORTRAIT ? 540 : 960;
  GAME_H = PORTRAIT ? 880 : 540;
  HORIZON = PORTRAIT ? 300 : 210;
  HOLES = [];
  for(let row = 0; row < 3; row++){
    for(let col = 0; col < 3; col++){
      const s = (PORTRAIT ? [0.85, 1, 1.15] : [0.8, 0.96, 1.14])[row];
      const spread = (PORTRAIT ? [140, 158, 176] : [180, 215, 252])[row];
      const y = (PORTRAIT ? [460, 600, 740] : [268, 356, 452])[row];
      HOLES.push({ x: GAME_W / 2 + (col - 1) * spread, y, s });
    }
  }
}
function resize(){
  layout();
  const scale = Math.min((innerWidth - 18) / GAME_W, (innerHeight - 18) / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = Math.round(GAME_W * scale * dpr);
  canvas.height = Math.round(GAME_H * scale * dpr);
  canvas.style.width  = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale;
  canvas._q = scale * dpr;
  bgDirty = true;   /* v3：版面變更時重烘背景 */
}
addEventListener('resize', resize);
resize();

/* ===== 小工具 ===== */
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp  = (a, b, t) => a + (b - a) * t;
const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
const easeOutBack  = t => 1 + 2.7 * Math.pow(t - 1, 3) + 1.7 * Math.pow(t - 1, 2);
function rr(x, y, w, h, r){
  ctx.beginPath(); ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function fill2(fillStyle, lineStyle, lw){
  ctx.fillStyle = fillStyle; ctx.fill();
  ctx.strokeStyle = lineStyle; ctx.lineWidth = lw || 2.5; ctx.stroke();
}

/* ===== 音效 ===== */
let AC = null, master = null, noiseBuf = null;
let muted = false;
try{ muted = localStorage.getItem('whackpro_muted') === '1'; }catch(e){}
function initAudio(){
  if(!AC){
    try{
      AC = new (window.AudioContext || window.webkitAudioContext)();
      /* v6：主控匯流排升級——DynamicsCompressor 防削波＋戶外程序化殘響（短促、低濕度） */
      const comp = AC.createDynamicsCompressor();
      comp.threshold.value = -16; comp.knee.value = 22; comp.ratio.value = 7;
      master = AC.createGain();
      master.gain.value = 0.55;
      master.connect(comp); comp.connect(AC.destination);
      const rev = AC.createConvolver();
      const rlen = Math.floor(AC.sampleRate * 0.7);
      const rbuf = AC.createBuffer(2, rlen, AC.sampleRate);
      for(let ch = 0; ch < 2; ch++){
        const d = rbuf.getChannelData(ch);
        for(let i = 0; i < rlen; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / rlen, 2.8);
      }
      rev.buffer = rbuf;
      const rg = AC.createGain(); rg.gain.value = 0.12;
      master.connect(rev); rev.connect(rg); rg.connect(comp);
      initAmbient();
    }catch(e){}
  }
  if(AC && AC.state === 'suspended') AC.resume();
}
/* v6 草原氛圍層：風聲 loop（濾波噪聲）＋隨機鳥鳴；炸彈爆炸時 ducking */
let amb = null, ambDuck = 1, chirpT = 4;
function initAmbient(){
  if(!AC || amb) return;
  try{
    const len = AC.sampleRate * 2;
    const buf = AC.createBuffer(1, len, AC.sampleRate);
    const d = buf.getChannelData(0);
    for(let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
    const f = AC.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 340; f.Q.value = 0.5;
    const g = AC.createGain(); g.gain.value = 0;
    src.connect(f); f.connect(g); g.connect(master); src.start();
    amb = { g };
  }catch(e){ amb = null; }
}
function updateAmbient(dt){
  ambDuck = Math.min(1, ambDuck + dt * 0.5);
  if(!AC || !amb) return;
  const on = muted ? 0 : ambDuck;
  amb.g.gain.setTargetAtTime(0.016 * on * (1 + Math.sin(T * 0.5) * 0.35), AC.currentTime, 0.4);
  chirpT -= dt;
  if(chirpT <= 0){
    chirpT = 3 + Math.random() * 6;
    if(!muted && AC) sfx.bird();
  }
}
/* v3：微幅隨機音高，連續敲擊不像機關槍 */
const rp = f => f * (0.94 + Math.random() * 0.12);
function beep(freq = 440, dur = 0.1, type = 'square', vol = 0.15, slide = 0){
  if(muted || !AC) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, AC.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), AC.currentTime + dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.connect(g).connect(master);
  o.start(); o.stop(AC.currentTime + dur);
}
function noise(dur = 0.15, vol = 0.2){
  if(muted || !AC) return;
  /* v3：共用一顆噪音 buffer，不每次配置 */
  if(!noiseBuf){
    const len = Math.floor(AC.sampleRate * 0.4);
    noiseBuf = AC.createBuffer(1, len, AC.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for(let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  }
  const src = AC.createBufferSource();
  src.buffer = noiseBuf;
  src.playbackRate.value = 0.4 / dur * (0.9 + Math.random() * 0.2);
  const g = AC.createGain();
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  src.connect(g).connect(master);
  src.start();
}

/* ===== 粒子與飄字 ===== */
let parts = [];
const floaters = [];
function burst(x, y, color, n = 12, speed = 220, life = 0.5){
  for(let i = 0; i < n; i++){
    if(parts.length > 300) return;
    const a = Math.random() * Math.PI * 2;
    const s = speed * (0.3 + Math.random() * 0.7);
    parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 80, life: life * (0.6 + Math.random() * 0.6), max: life, color });
  }
}
function updateParts(dt){
  /* v3：原地 swap-pop 回收，不每幀新建陣列 */
  for(let i = parts.length - 1; i >= 0; i--){
    const p = parts[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 700 * dt; p.life -= dt;
    if(p.life <= 0){
      parts[i] = parts[parts.length - 1];
      parts.pop();
    }
  }
}
function drawParts(){
  /* v7：粒子改圓點＋隨壽命縮小，並疊一層淡白心光 */
  for(const p of parts){
    const a = clamp(p.life / p.max, 0, 1);
    const r = 2 + a * 2.4;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = a * 0.5;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(p.x - r * 0.25, p.y - r * 0.25, r * 0.45, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}
function addFloater(x, y, txt, color, size = 22){
  floaters.push({ x, y, txt, color, size, t: 0 });
}
function updateFloaters(dt){
  for(const f of floaters) f.t += dt;
  for(let i = floaters.length - 1; i >= 0; i--) if(floaters[i].t > 0.8) floaters.splice(i, 1);
}
function drawFloaters(){
  for(const f of floaters){
    const k = f.t / 0.8;
    ctx.globalAlpha = 1 - k;
    /* v7：出現瞬間彈跳放大（easeOutBack），質感更彈 */
    const pop = f.t < 0.18 ? easeOutBack(f.t / 0.18) : 1;
    ctx.font = 'bold ' + Math.round(f.size * pop) + 'px ' + FONT;
    ctx.textAlign = 'center';
    ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(40,25,10,.85)';
    ctx.strokeText(f.txt, f.x, f.y - k * 44);
    ctx.fillStyle = f.color; ctx.fillText(f.txt, f.x, f.y - k * 44);
  }
  ctx.globalAlpha = 1;
}

/* ===== 生成與難度 ===== */
function freeHole(){
  const used = new Set(moles.map(m => m.hole));
  const free = [];
  for(let i = 0; i < 9; i++) if(!used.has(i)) free.push(i);
  if(!free.length) return -1;
  return free[Math.floor(Math.random() * free.length)];
}
function spawnMole(){
  const idx = freeHole();
  if(idx < 0) return;
  const hard = mode === 'hard';
  const roll = Math.random();
  let type = 'normal';
  const goldChance = sprint ? 0.17 : 0.09;
  const helmChance = elapsed > (hard ? 6 : 14) ? (hard ? 0.15 : 0.13) : 0;
  /* v4：瘋狂模式獨家——閃電鼠（超快、+60 分） */
  const zapChance = hard && elapsed > 3 ? 0.09 : 0;
  /* v3：前 8 秒安全學習期——沒有炸彈（瘋狂模式縮短為 3 秒、炸彈更多） */
  const safeT = hard ? 3 : 8;
  const bombChance = (feverOn || elapsed < safeT) ? 0
    : hard ? Math.min(0.3, 0.11 + (elapsed - 3) * 0.005)
    : Math.min(0.22, 0.06 + (elapsed - 8) * 0.004);
  if(roll < goldChance) type = 'gold';
  else if(roll < goldChance + zapChance) type = 'zap';
  else if(roll < goldChance + zapChance + helmChance) type = 'helmet';
  else if(roll < goldChance + zapChance + helmChance + bombChance) type = 'bomb';
  const upTime = type === 'gold' ? 0.7
    : type === 'zap' ? 0.45
    : type === 'helmet' ? (hard ? 1.3 : 1.5)
    : Math.max(hard ? 0.45 : 0.55, (hard ? 1.0 : 1.2) - elapsed * 0.013);
  moles.push({ hole: idx, type, t: 0, upTime, state: 'up', hitT: 0, hp: type === 'helmet' ? 2 : 1 });
  /* v6：冒出時揚起泥土 */
  const sh = HOLES[idx];
  burst(sh.x, sh.y - 6, '#6b4423', 6, 150, 0.4);
}
/* v2：FEVER 量表 */
function addFever(v){
  if(feverOn) return;
  fever = Math.min(1, fever + v);
  if(fever >= 1){
    feverOn = true; feverT = 6;
    addFloater(GAME_W / 2, PORTRAIT ? 380 : 200, 'FEVER！全部雙倍分！', '#ff6b35', 30);
    shake = Math.max(shake, 8);
    sfx.fever();
  }
}

/* ===== 敲擊 ===== */
let totalSwings = 0;
function whackAt(x, y){
  totalSwings++;
  swings.push({ x, y, t: 0 });
  let hit = false;
  for(const m of moles){
    if(m.state !== 'up' && m.state !== 'stay') continue;
    const h = HOLES[m.hole];
    if(Math.abs(x - h.x) < 80 * h.s && y > h.y - 130 * h.s && y < h.y + 26){
      hitMole(m);
      hit = true;
      break;
    }
  }
  /* v2：瞄準輔助——差一點點也算打中（但絕不會把揮空吸到炸彈上） */
  if(!hit){
    let bestM = null, bestD = 1;
    for(const m of moles){
      if(m.state !== 'up' && m.state !== 'stay' || m.type === 'bomb') continue;
      const h = HOLES[m.hole];
      const dx = (x - h.x) / (118 * h.s);
      const dy = (y - (h.y - 55 * h.s)) / (125 * h.s);
      const d = dx * dx + dy * dy;
      if(d < 1 && d < bestD){ bestD = d; bestM = m; }
    }
    if(bestM){ hitMole(bestM); hit = true; }
  }
  if(!hit){
    combo = Math.floor(combo / 2);   /* v2：揮空連擊砍半，不再整個歸零 */
    burst(x, y + 6, 'rgba(160,130,90,.9)', 5, 120, 0.3);
    sfx.whiff();
  }
}
function hitMole(m){
  const h = HOLES[m.hole];
  if(m.type === 'bomb'){
    const hard = mode === 'hard';
    m.state = 'hit'; m.hitT = 0;
    combo = 0; stBombs++;
    fever = Math.max(0, fever - 0.3);
    score = Math.max(0, score - (hard ? 50 : 30));
    timeLeft = Math.max(0, timeLeft - (hard ? 5 : 3));
    freeze = 0.1; shake = 12;
    booms.push({ x: h.x, y: h.y - 60 * h.s, t: 0 });
    burst(h.x, h.y - 55 * h.s, '#ff6b35', 16, 300, 0.55);
    burst(h.x, h.y - 55 * h.s, '#3f3f3f', 10, 220, 0.5);
    addRing(h.x, h.y - 30 * h.s, '#ff6b35');
    addRing(h.x, h.y - 30 * h.s, '#ffd23f');
    addFloater(h.x, h.y - 120 * h.s, hard ? '炸彈！-50分 -5秒' : '炸彈！-30分 -3秒', '#ff5a5a', 24);
    sfx.bomb();
    return;
  }
  /* v2：安全帽地鼠第一擊只敲飛帽子 */
  if(m.type === 'helmet' && m.hp === 2){
    m.hp = 1; m.state = 'stay'; m.t = 0.16; m.upTime = 1.0;
    combo++; comboFlash = 1; stHits++;
    stMaxCombo = Math.max(stMaxCombo, combo);
    addFever(0.06);
    freeze = Math.max(freeze, 0.05); shake = Math.max(shake, 5);
    burst(h.x, h.y - 95 * h.s, '#ffcc00', 9, 220, 0.45);
    addFloater(h.x, h.y - 130 * h.s, '帽子飛了！再敲！', '#ffcc00', 20);
    sfx.clank();
    if(navigator.vibrate) try{ navigator.vibrate(20); }catch(e){}
    return;
  }
  m.state = 'hit'; m.hitT = 0;
  combo++;
  comboFlash = 1;
  stHits++;
  stMaxCombo = Math.max(stMaxCombo, combo);
  const mult = 1 + Math.floor(combo / 5);
  const base = m.type === 'gold' ? 30 : m.type === 'zap' ? 60 : m.type === 'helmet' ? 40 : 10;
  const gain = base * mult * (feverOn ? 2 : 1);
  score += gain;
  addFever(m.type === 'normal' ? 0.09 : m.type === 'zap' ? 0.18 : 0.13);
  freeze = Math.max(freeze, m.type === 'normal' ? 0.04 : 0.07);
  shake = Math.max(shake, m.type === 'normal' ? 4 : 7);
  const col = m.type === 'gold' ? '#ffd23f' : m.type === 'zap' ? '#5ad7ff' : m.type === 'helmet' ? '#ffcc00' : '#c99b6f';
  burst(h.x, h.y - 60 * h.s, col, 12, 240, 0.45);
  burst(h.x, h.y - 60 * h.s, '#fff', 5, 180, 0.35);
  addRing(h.x, h.y - 30 * h.s, col);
  addFloater(h.x, h.y - 120 * h.s, '+' + gain, m.type === 'normal' ? '#fff' : m.type === 'zap' ? '#5ad7ff' : '#ffd23f', m.type === 'normal' ? 22 : 26);
  if(m.type === 'gold'){
    stGold++;
    timeLeft = Math.min(mode === 'hard' ? 60 : 75, timeLeft + 2);
    addFloater(h.x, h.y - 150 * h.s, '+2秒！', '#7ef0a0', 20);
    sfx.gold();
  }else if(m.type === 'zap'){
    addFloater(h.x, h.y - 150 * h.s, '閃電鼠！', '#5ad7ff', 20);
    sfx.gold();
  }else if(m.type === 'helmet') sfx.gold();
  else sfx.whack();
  if(navigator.vibrate) try{ navigator.vibrate(25); }catch(e){}
}

/* ===== 輸入 ===== */
addEventListener('keydown', e => {
  initAudio();
  const c = e.code;
  if(c === 'Space') e.preventDefault();
  if(e.repeat) return;
  if(c === 'KeyM'){ toggleMute(); return; }
  if(stateName === 'title' && (c === 'Enter' || c === 'Space')){ startGame('classic'); return; }
  if(stateName === 'title' && c === 'KeyH' && hardUnlocked){ startGame('hard'); return; }
  if(stateName === 'over' && (c === 'Enter' || c === 'Space' || c === 'KeyR')){
    if(overT > 0.4) startGame();
    return;
  }
  if(stateName === 'play' && phase === 'go'){
    const mDigit = c.match(/^(Digit|Numpad)([1-9])$/);
    if(mDigit){
      const idx = KEY_HOLE[parseInt(mDigit[2], 10)];
      const h = HOLES[idx];
      whackAt(h.x, h.y - 50 * h.s);
    }
  }
});
function evPos(cx, cy){
  const r = canvas.getBoundingClientRect();
  return { x: (cx - r.left) / canvas._scale, y: (cy - r.top) / canvas._scale };
}
canvas.addEventListener('pointerdown', e => {
  initAudio();
  const p = evPos(e.clientX, e.clientY);
  if(e.pointerType !== 'mouse') touchMode = true;
  for(const b of uiButtons){
    /* v2：按鈕命中範圍外加 8px 緩衝，觸控更好按 */
    if(p.x >= b.x - 8 && p.x <= b.x + b.w + 8 && p.y >= b.y - 8 && p.y <= b.y + b.h + 8){
      sfx.ui(); b.cb(); return;
    }
  }
  if(stateName === 'play' && phase === 'go') whackAt(p.x, p.y);
});
canvas.addEventListener('mousemove', e => {
  const p = evPos(e.clientX, e.clientY);
  mouse.x = p.x; mouse.y = p.y;
});
canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

/* ===== play 更新 ===== */
function playUpdate(dt){
  phaseT += dt;
  if(phase === 'ready' && phaseT > 0.9){ phase = 'go'; phaseT = 0; }
  if(phase === 'go'){
    elapsed += dt;
    timeLeft -= dt;
    /* v2：FEVER 倒數 */
    if(feverOn){
      feverT -= dt;
      fever = Math.max(0, feverT / 6);
      if(feverT <= 0){ feverOn = false; fever = 0; }
      if(Math.random() < dt * 6)
        burst(Math.random() * GAME_W, HORIZON + Math.random() * (GAME_H - HORIZON), '#ffd23f', 2, 90, 0.5);
    }
    /* v2：最後 10 秒衝刺 */
    if(!sprint && timeLeft <= 10){
      sprint = true; sprintT = 0;
      addFloater(GAME_W / 2, PORTRAIT ? 380 : 200, '最後衝刺！金鼠加倍出現！', '#7ef0a0', 28);
      sfx.sprint();
    }
    if(sprint) sprintT += dt;
    /* 最後倒數滴答 */
    const sec = Math.ceil(timeLeft);
    if(sec <= 5 && sec >= 1 && sec !== lastTick){ lastTick = sec; sfx.tick(); }
    if(timeLeft <= 0){ timeLeft = 0; phase = 'end'; phaseT = 0; }
    /* 生成（間隔隨時間縮短、同時在場數增加；FEVER／衝刺再加速） */
    spawnTimer -= dt;
    /* v3：同場上限封頂 5（60 秒版後段不爆滿）；v4 瘋狂模式 +1 且更快 */
    const hard = mode === 'hard';
    const maxOnField = 2 + (hard ? 1 : 0) + Math.min(3, Math.floor(elapsed / (hard ? 10 : 14))) + (feverOn ? 2 : 0) + (sprint ? 1 : 0);
    if(spawnTimer <= 0 && moles.length < maxOnField){
      let iv = Math.max(hard ? 0.24 : 0.3, (hard ? 0.66 : 0.82) - elapsed * 0.01);
      if(feverOn) iv = Math.max(0.18, iv * 0.45);
      else if(sprint) iv = Math.max(hard ? 0.22 : 0.26, iv * 0.7);
      spawnTimer = iv;
      spawnMole();
    }
  }
  if(phase === 'end' && phaseT > 1.1) endGame();
  /* 地鼠狀態 */
  for(let i = moles.length - 1; i >= 0; i--){
    const m = moles[i];
    m.t += dt;
    if(m.state === 'hit'){
      m.hitT += dt;
      if(m.hitT > 0.35) moles.splice(i, 1);
    }else if(m.state === 'up' && m.t > 0.16){
      m.state = 'stay';
    }else if(m.state === 'stay' && m.t > 0.16 + m.upTime){
      m.state = 'down'; m.t = 0;
    }else if(m.state === 'down' && m.t > 0.15){
      if(m.type === 'gold'){
        const h = HOLES[m.hole];
        addFloater(h.x, h.y - 50 * h.s, '金鼠溜走了…', 'rgba(255,255,255,.9)', 15);
      }
      moles.splice(i, 1);
    }
  }
  /* 鎚擊與爆炸動畫 */
  for(let i = swings.length - 1; i >= 0; i--){
    swings[i].t += dt;
    if(swings[i].t > 0.22) swings.splice(i, 1);
  }
  for(let i = booms.length - 1; i >= 0; i--){
    booms[i].t += dt;
    if(booms[i].t > 0.35) booms.splice(i, 1);
  }
  comboFlash = Math.max(0, comboFlash - dt * 3);
  scoreShow += (score - scoreShow) * (1 - Math.pow(0.02, dt));
}

/* ===== 背景（v3：靜態層烘焙到離屏 canvas，每幀只 drawImage 一次）===== */
function bakeBG(){
  if(!bgCanvas) bgCanvas = document.createElement('canvas');
  const q = canvas._q || 1;
  bgCanvas.width = Math.max(1, Math.round(GAME_W * q));
  bgCanvas.height = Math.max(1, Math.round(GAME_H * q));
  const c = bgCanvas.getContext('2d');
  c.setTransform(q, 0, 0, q, 0, 0);
  /* v7：天空三段漸層，接近地平線帶暖色 */
  const g = c.createLinearGradient(0, 0, 0, HORIZON);
  g.addColorStop(0, '#4ea6fb'); g.addColorStop(0.62, '#a8d9ff'); g.addColorStop(1, '#e6f4ff');
  c.fillStyle = g; c.fillRect(0, 0, GAME_W, HORIZON);
  /* 太陽 */
  const sunX = GAME_W - 130;
  c.fillStyle = 'rgba(255,236,150,.35)';
  c.beginPath(); c.arc(sunX, 60, 58, 0, Math.PI * 2); c.fill();
  const sg = c.createRadialGradient(sunX - 8, 52, 5, sunX, 60, 36);
  sg.addColorStop(0, '#fff7d8'); sg.addColorStop(1, '#ffd23f');
  c.fillStyle = sg;
  c.beginPath(); c.arc(sunX, 60, 36, 0, Math.PI * 2); c.fill();
  /* v6 太陽 bloom：大範圍 additive 光暈（烘焙一次，主迴圈零成本） */
  c.globalCompositeOperation = 'lighter';
  const bloom = c.createRadialGradient(sunX, 60, 20, sunX, 60, 130);
  bloom.addColorStop(0, 'rgba(255,242,175,.45)'); bloom.addColorStop(1, 'rgba(255,242,175,0)');
  c.fillStyle = bloom;
  c.beginPath(); c.arc(sunX, 60, 130, 0, Math.PI * 2); c.fill();
  /* v7：斜射光束（god rays，烘焙靜態） */
  for(let i = 0; i < 4; i++){
    const ra = 1.9 + i * 0.28;
    const lg = c.createLinearGradient(sunX, 60, sunX + Math.cos(ra) * 340, 60 + Math.sin(ra) * 340);
    lg.addColorStop(0, 'rgba(255,246,200,.16)'); lg.addColorStop(1, 'rgba(255,246,200,0)');
    c.fillStyle = lg;
    c.beginPath();
    c.moveTo(sunX, 60);
    c.lineTo(sunX + Math.cos(ra - 0.05) * 360, 60 + Math.sin(ra - 0.05) * 360);
    c.lineTo(sunX + Math.cos(ra + 0.07) * 360, 60 + Math.sin(ra + 0.07) * 360);
    c.closePath(); c.fill();
  }
  c.globalCompositeOperation = 'source-over';
  /* 遠丘（兩層） */
  c.fillStyle = '#4fa032';
  c.beginPath(); c.moveTo(0, HORIZON);
  for(let x = 0; x <= GAME_W; x += 30)
    c.lineTo(x, HORIZON - 32 + Math.sin(x * 0.008 + 1) * 22);
  c.lineTo(GAME_W, HORIZON); c.closePath(); c.fill();
  c.fillStyle = '#5fb43e';
  c.beginPath(); c.moveTo(0, HORIZON + 4);
  for(let x = 0; x <= GAME_W; x += 30)
    c.lineTo(x, HORIZON - 14 + Math.cos(x * 0.011) * 14);
  c.lineTo(GAME_W, HORIZON + 4); c.closePath(); c.fill();
  /* 木柵欄 */
  c.fillStyle = '#a3703c';
  for(let x = 20; x < GAME_W; x += 68){
    c.beginPath();
    c.moveTo(x + 4, HORIZON - 42);
    c.arcTo(x + 12, HORIZON - 42, x + 12, HORIZON + 4, 4);
    c.arcTo(x + 12, HORIZON + 4, x, HORIZON + 4, 4);
    c.arcTo(x, HORIZON + 4, x, HORIZON - 42, 4);
    c.arcTo(x, HORIZON - 42, x + 12, HORIZON - 42, 4);
    c.closePath(); c.fill();
  }
  c.fillRect(0, HORIZON - 32, GAME_W, 7);
  c.fillRect(0, HORIZON - 14, GAME_W, 7);
  c.fillStyle = 'rgba(0,0,0,.12)';
  c.fillRect(0, HORIZON - 27, GAME_W, 2);
  c.fillRect(0, HORIZON - 9, GAME_W, 2);
  /* 草地（上亮下深的漸層） */
  const gg = c.createLinearGradient(0, HORIZON, 0, GAME_H);
  gg.addColorStop(0, '#7ecf58'); gg.addColorStop(0.5, '#6bc44a'); gg.addColorStop(1, '#4fa032');
  c.fillStyle = gg; c.fillRect(0, HORIZON, GAME_W, GAME_H - HORIZON);
  /* v7：草地柔和光斑（陽光灑落感） */
  for(let i = 0; i < 6; i++){
    const px = (i * 173 + 90) % GAME_W;
    const py = HORIZON + 40 + (i * 131) % (GAME_H - HORIZON - 80);
    const pr = 60 + (i * 37) % 50;
    const pg = c.createRadialGradient(px, py, 4, px, py, pr);
    pg.addColorStop(0, 'rgba(255,255,210,.10)'); pg.addColorStop(1, 'rgba(255,255,210,0)');
    c.fillStyle = pg;
    c.beginPath(); c.ellipse(px, py, pr, pr * 0.45, 0, 0, Math.PI * 2); c.fill();
  }
  /* 草叢 */
  c.strokeStyle = 'rgba(47,107,40,.5)'; c.lineWidth = 2;
  for(let i = 0; i < 22; i++){
    const gx = (i * 157 + 30) % GAME_W;
    const gy = HORIZON + 25 + (i * 97) % (GAME_H - HORIZON - 60);
    c.beginPath();
    c.moveTo(gx, gy); c.lineTo(gx - 4, gy - 9);
    c.moveTo(gx, gy); c.lineTo(gx + 1, gy - 11);
    c.moveTo(gx, gy); c.lineTo(gx + 5, gy - 8);
    c.stroke();
  }
  /* OpenMoji 裝飾：花與蘑菇 */
  const deco = (img, x, y, w, h) => { if(img.complete && img.naturalWidth) c.drawImage(img, x, y, w, h); };
  deco(IMG.flower, 40, HORIZON + 8, 46, 46);
  deco(IMG.flower, GAME_W - 80, HORIZON + 40, 40, 40);
  deco(IMG.flower, 60, GAME_H - 70, 54, 54);
  deco(IMG.mush, GAME_W - 70, GAME_H - 88, 52, 52);
  deco(IMG.mush, 130, HORIZON + 120, 38, 38);
  /* 地洞內部（靜態，一併烘焙） */
  for(const h of HOLES){
    c.fillStyle = '#5a3a1e';
    c.beginPath(); c.ellipse(h.x, h.y, 66 * h.s, 24 * h.s, 0, 0, Math.PI * 2); c.fill();
    const hg = c.createRadialGradient(h.x, h.y, 4, h.x, h.y, 60 * h.s);
    hg.addColorStop(0, '#1f1408'); hg.addColorStop(0.7, '#2e1f13'); hg.addColorStop(1, '#4a3320');
    c.fillStyle = hg;
    c.beginPath(); c.ellipse(h.x, h.y, 58 * h.s, 20 * h.s, 0, 0, Math.PI * 2); c.fill();
    /* v7：洞口內緣受光高光（上緣一彎亮線＋外緣柔和落影） */
    c.strokeStyle = 'rgba(255,235,190,.28)'; c.lineWidth = 2.5 * h.s;
    c.beginPath(); c.ellipse(h.x, h.y - 1.5, 55 * h.s, 18 * h.s, 0, 1.12 * Math.PI, 1.88 * Math.PI); c.stroke();
    c.fillStyle = 'rgba(30,60,20,.14)';
    c.beginPath(); c.ellipse(h.x, h.y + 6 * h.s, 72 * h.s, 24 * h.s, 0, 0, Math.PI); c.fill();
  }
  bgHasImgs = !!(IMG.flower.complete && IMG.flower.naturalWidth && IMG.mush.complete && IMG.mush.naturalWidth);
  /* v6 vignette 同步烘焙（低解析放大＝平滑漸層） */
  if(!vigCanvas) vigCanvas = document.createElement('canvas');
  vigCanvas.width = 240; vigCanvas.height = Math.max(2, Math.round(240 * GAME_H / GAME_W));
  const vc = vigCanvas.getContext('2d');
  const vh = vigCanvas.height;
  const vg = vc.createRadialGradient(120, vh * 0.46, Math.min(110, vh * 0.42), 120, vh * 0.5, Math.max(150, vh * 0.75));
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(14,24,10,.32)');
  vc.fillStyle = vg; vc.fillRect(0, 0, 240, vh);
  bgDirty = false;
}
let vigCanvas = null;
/* v6 環境層：蝴蝶＋飄浮花粉（無狀態程序動畫，零配置） */
function drawAmbientLayer(){
  for(let i = 0; i < 14; i++){
    const sp = 8 + (i % 4) * 5;
    const x = ((i * 191) + T * sp) % (GAME_W + 20) - 10;
    const y = HORIZON - 50 + ((i * 113) + T * (5 + (i % 3) * 4)) % (GAME_H - HORIZON + 30);
    ctx.globalAlpha = 0.3 + 0.28 * Math.sin(T * 2 + i);
    ctx.fillStyle = '#fff8d8';
    ctx.fillRect(x, y, 3, 3);
  }
  ctx.globalAlpha = 1;
  for(let i = 0; i < 3; i++){
    const bx = GAME_W / 2 + Math.sin(T * (0.23 + i * 0.07) + i * 2.1) * (GAME_W * 0.42);
    const by = HORIZON - 58 + Math.sin(T * (0.5 + i * 0.11) + i * 4) * 34 + i * 14;
    const flap = Math.sin(T * 12 + i * 2);
    ctx.save();
    ctx.translate(bx, by);
    ctx.fillStyle = ['#ff9ecf', '#9ecfff', '#ffd23f'][i];
    for(const s of [-1, 1]){
      ctx.beginPath();
      ctx.ellipse(s * 5 * Math.abs(flap), 0, 6 * Math.max(0.3, Math.abs(flap)), 8, s * 0.4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = '#4a2f18';
    ctx.fillRect(-1.2, -6, 2.4, 12);
    ctx.restore();
  }
}
/* v6 命中衝擊波光圈 */
let rings = [];
function addRing(x, y, color){ if(rings.length < 24) rings.push({ x, y, t: 0, color }); }
function updateRings(dt){
  for(let i = rings.length - 1; i >= 0; i--){
    rings[i].t += dt;
    if(rings[i].t > 0.35){ rings[i] = rings[rings.length - 1]; rings.pop(); }
  }
}
function drawRings(){
  for(const r of rings){
    const k = r.t / 0.35;
    ctx.globalAlpha = (1 - k) * 0.7;
    ctx.strokeStyle = r.color;
    ctx.lineWidth = 3 * (1 - k) + 1;
    ctx.beginPath();
    ctx.ellipse(r.x, r.y, 20 + k * 58, (20 + k * 58) * 0.42, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}
function drawBG(){
  if(bgDirty || (!bgHasImgs && IMG.flower.complete && IMG.flower.naturalWidth)) bakeBG();

function moleRise(m){
  if(m.state === 'up') return easeOutBack(clamp(m.t / 0.16, 0, 1));
  if(m.state === 'stay') return 1;
  if(m.state === 'down') return 1 - easeOutCubic(clamp(m.t / 0.15, 0, 1));
  return 1;   // hit：高度保持，另有壓扁
}
function drawMole(m){

  ctx.save();
  ctx.beginPath();
  ctx.rect(h.x - 95 * h.s, h.y - 180 * h.s, 190 * h.s, 180 * h.s + 6);
  ctx.clip();
  ctx.translate(h.x, h.y + 8 - rise);
  let sq = 1;
  if(m.state === 'hit'){
    const k = clamp(m.hitT / 0.35, 0, 1);
    sq = 1 - k * 0.5;
    ctx.globalAlpha = 1 - k * k;
    ctx.scale(1 + k * 0.45, sq);
  }else if(m.state === 'up'){
    ctx.scale(2 - u, u);       // 冒出時的伸展
  }
  ctx.scale(h.s, h.s);
  if(m.type === 'bomb') drawBombMole(m);
  else drawMoleBody(m);
  ctx.restore();
  ctx.globalAlpha = 1;
}

    else{ g.addColorStop(0, '#a5744a'); g.addColorStop(1, '#6b4423'); moleGradNorm = g; }

}

  for(let i = 0; i < 9; i++){
    for(const m of moles) if(m.hole === i) drawMole(m);
    drawHoleFront(HOLES[i]);
  }
  drawRings();          /* v6：命中衝擊波 */
  for(const b of booms){
    const k = clamp(b.t / 0.35, 0, 1);
    ctx.globalAlpha = 1 - k;
    const sz = 90 + k * 70;
    drawImg(IMG.boom, b.x - sz / 2, b.y - sz / 2, sz, sz);
    ctx.globalAlpha = 1;
  }
  drawParts();
  drawFloaters();
  drawSwings();
  ctx.restore();
  if(vigCanvas) ctx.drawImage(vigCanvas, 0, 0, GAME_W, GAME_H);   /* v6：後製 vignette */
}
function titleDraw(){

  ctx.font = 'bold 16px ' + FONT;
  ctx.fillStyle = '#fff';
  ctx.fillText('💻 電腦：滑鼠點地鼠或數字鍵 1～9（Enter 經典・H 瘋狂）', GAME_W / 2, 366);
  ctx.fillText('📱 平板：手指輕點地鼠，點上方按鈕選模式', GAME_W / 2, 394);

}
function spawnMoleDemo(){
  const idx = freeHole();
  if(idx < 0) return;
  moles.push({ hole: idx, type: Math.random() < 0.3 ? 'gold' : 'normal', t: 0, upTime: 1.2, state: 'up', hitT: 0 });
}
function demoUpdate(){
  for(let i = moles.length - 1; i >= 0; i--){
    const m = moles[i];
    m.t += 1 / 60;
    if(m.state === 'up' && m.t > 0.16) m.state = 'stay';
    else if(m.state === 'stay' && m.t > 0.16 + m.upTime){ m.state = 'down'; m.t = 0; }
    else if(m.state === 'down' && m.t > 0.15) moles.splice(i, 1);
  }
}
function playDraw(){
  drawWorld();
  /* v2：FEVER 彩虹色調 */
  if(feverOn){
    ctx.fillStyle = 'hsla(' + ((T * 240) % 360) + ',100%,60%,.08)';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    ctx.strokeStyle = 'hsla(' + ((T * 300) % 360) + ',95%,60%,.85)';
    ctx.lineWidth = 10;
    ctx.strokeRect(5, 5, GAME_W - 10, GAME_H - 10);
  }
  drawHUD();
  if(phase === 'ready'){
    bigText('預備…', 280, 48, '#fff', easeOutBack(Math.min(1, phaseT / 0.4)));
  }else if(phase === 'go' && phaseT < 0.5){
    ctx.globalAlpha = 1 - phaseT / 0.5;
    bigText('開打！', 280, 56, '#ffd23f', 1 + phaseT * 0.6);
    ctx.globalAlpha = 1;
  }else if(phase === 'end'){
    bigText('時間到！', 270, 56, '#ff6b35', easeOutBack(Math.min(1, phaseT / 0.4)));
  }
  drawMuteBtn();
  drawCursorHammer();
}
function overDraw(){
  drawWorld();
  const a = Math.min(0.6, overT * 1.4);
  ctx.fillStyle = 'rgba(20,15,5,' + a + ')';
  ctx.fillRect(0, 0, GAME_W, GAME_H);
  const k = easeOutBack(Math.min(1, overT / 0.55));
  ctx.save();
  ctx.translate(GAME_W / 2, GAME_H / 2 - 20);
  ctx.scale(k, k);
  rr(-230, -140, 460, 280, 20);
  ctx.fillStyle = 'rgba(255,252,244,.97)'; ctx.fill();
  ctx.strokeStyle = '#ff6b35'; ctx.lineWidth = 3; ctx.stroke();
  ctx.textAlign = 'center';
  ctx.font = 'bold 32px ' + FONT;
  ctx.fillStyle = mode === 'hard' ? '#e63946' : '#5a3a1e';
  ctx.fillText(mode === 'hard' ? '瘋狂模式・時間到！' : '時間到！', 0, -100);
  ctx.font = 'bold 48px ' + FONT;
  ctx.fillStyle = '#ff6b35';
  ctx.fillText(score + ' 分', 0, -52);
  /* v2：星級評價（逐顆彈出；v4 瘋狂模式門檻獨立） */
  const stars = mode === 'hard'
    ? (score >= 1100 ? 3 : score >= 650 ? 2 : score >= 280 ? 1 : 0)
    : (score >= 800 ? 3 : score >= 480 ? 2 : score >= 200 ? 1 : 0);
  for(let i = 0; i < 3; i++){
    const pop = clamp((overT - 0.6 - i * 0.28) / 0.3, 0, 1);
    const sc = easeOutBack(pop);
    if(pop > 0){
      ctx.save();
      ctx.translate((i - 1) * 56, -6);
      ctx.scale(sc, sc);
      drawStar5(0, 0, 24, i < stars ? '#ffd23f' : '#d8d2c4', i < stars ? '#b8860b' : '#a8a293');
      ctx.restore();
    }
  }
  /* v2：統計 */
  ctx.font = '15px ' + FONT;
  ctx.fillStyle = '#7a6a55';
  ctx.fillText('最大連擊 ' + stMaxCombo + '　命中 ' + stHits + ' 隻　金鼠 ' + stGold + ' 隻', 0, 42);
  ctx.font = 'bold 19px ' + FONT;
  ctx.fillStyle = newBest ? '#2b9a4f' : '#b8860b';
  ctx.fillText(newBest ? '★ 新紀錄！★' : '最佳紀錄　' + (mode === 'hard' ? bestHard : best) + ' 分', 0, 72);
  ctx.font = '15px ' + FONT;
  ctx.fillStyle = '#7a6a55';
  const TITLES = ['再練練，地鼠還在笑你～', '不錯喔！地鼠開始緊張了', '很強！地鼠聞風喪膽！', '傳說級地鼠剋星！'];
  ctx.fillText(TITLES[stars], 0, 100);
  ctx.restore();
  /* v4：解鎖通知 */
  if(justUnlocked && overT > 1.2){
    const uk = easeOutBack(Math.min(1, (overT - 1.2) / 0.4));
    bigText('瘋狂模式解鎖！回主選單挑戰！', 46, 26, '#ffd23f', uk);
  }
  if(overT > 0.3){
    drawButton(GAME_W / 2 - 120, GAME_H / 2 + 130, 240, 54, '再玩一次', () => startGame(), true);
    drawButton(GAME_W / 2 - 100, GAME_H / 2 + 196, 200, 48, '回主選單', toTitle, false);
  }
  drawMuteBtn();
}

/* ===== 主迴圈：固定時間步進 60Hz ===== */
const STEP = 1 / 60;
let last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while(acc >= STEP){
    acc -= STEP;
    T += STEP;
    stateT += STEP;
    updateAmbient(STEP);   /* v6：氛圍層（不受 hit-stop 影響） */
    if(freeze > 0){ freeze -= STEP; continue; }   // hit-stop
    shake *= Math.pow(0.001, STEP);
    if(stateName === 'play') playUpdate(STEP);
    else if(stateName === 'over') overT += STEP;
    updateParts(STEP);
    updateFloaters(STEP);
    updateRings(STEP);     /* v6：衝擊波 */
  }
  uiButtons = [];
  if(stateName === 'title') titleDraw();
  else if(stateName === 'play') playDraw();
  else overDraw();
}
requestAnimationFrame(frame);
/* 測試掛鉤（唯讀，不影響遊戲） */
window.__test = { get state(){ return stateName; }, get score(){ return score; }, get hits(){ return stHits; }, get swings(){ return totalSwings; }, get T(){ return T; }, get mode(){ return mode; },
  fastEnd(){ if(stateName === 'play'){ timeLeft = 0; phase = 'end'; phaseT = 2; } } };
</script>

        if(!r||!r.ok){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); }
      }).catch(function(){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); });

  }
  function read(n,cb){
    function via(base,next){ try{ fetch(base+"get/"+NS+"/"+n).then(function(r){ if(r.status===404&&base===ABS) return {value:0}; if(!r.ok) throw 0; return r.json(); }).then(function(j){ cb(j.value||j.count||0); }).catch(next); }catch(e){ next(); } }
    via(REL, function(){ via(ABS, function(){ cb(null); }); });

  ping(K+"-v");

  function once(){ if(done)return; done=true; ping(K+"-p"); ping("site-total-plays");
    window.removeEventListener("pointerdown",once); window.removeEventListener("keydown",once); }
  window.addEventListener("pointerdown",once,{once:false}); window.addEventListener("keydown",once,{once:false});
  /* 投票鈕：非常好玩/好玩——與作品館同一計數器，任何網頁打開都同步 */

    var btns={};

      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
