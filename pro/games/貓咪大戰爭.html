<!-- v6 еҚҮзҙҡж‘ҳиҰҒпјҡдә”й—ңдё»йЎҢз’°еўғзІ’еӯҗ(иҚүеҺҹиҠұз“Ј/жЈ®жһ—иһўзҒ«/зҶ”еІ©зҒ«жҳҹ/йӣІз«ҜйўЁзөІ/йӯ”зҺӢеҹҺзҙ«иһў)пјӢиІ“иІ“з ІиЎқж“Ҡжіўе…үз’°иҲҮе°ұз·’и„ҲеӢ•е…үжҡҲпјӢйӯ”зҺӢж“Ҡз ҙе…үз’°пјӢжҡ—и§’vignetteпјӣйҹіж•Ҳж–°еўһзЁӢеәҸеҢ–ж®ҳйҹҝConvolverNodeиҲҮй—ңеҚЎдё»йЎҢз’°еўғйҹіеҫӘз’°(з Іж“Ҡ/йӯ”зҺӢ/еӢқж•—ducking)пјӣи§’иүІиҲҮжЁҷйЎҢжјёеұӨе…Ёйқўеҝ«еҸ–гҖҒдё»иҝҙеңҲйӣ¶createGradient -->

<body>
<canvas id="game"></canvas>
<div id="bigScreenHint" class="bsh-overlay" hidden>

    <button type="button" class="bsh-btn" id="bshBtn">зҹҘйҒ“дәҶпјҢз№јзәҢзҺ©</button>

<script>
'use strict';
// ============================================================
// иІ“е’ӘеӨ§жҲ°зҲӯ вҖ” ж©«еҗ‘жҺЁеЎ”е°ҚжҲ°пјҲе°ҲжҘӯAIеҚҮзҙҡзүҲпјү
// жҙҫеҮәиІ“е’ӘеӨ§и»ҚгҖҒиіәйҢўеҚҮзҙҡгҖҒзҷје°„иІ“иІ“з ІпјҢжҺЁеҖ’е°Қйқўзҡ„жұӘжұӘеҹҺпјҒ
// 5 еӨ§й—ңеҚЎеҗ„жңүзҚЁзү№ж•өж–№йҷЈе®№иҲҮең°ең–гҖҒйҒёй—ңз•«йқўгҖҒжҜҸй—ң 1-3 жҳҹи©•еғ№
// ============================================================
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize(){
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width  = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale;
}
addEventListener('resize', resize); resize();

// ===== еӨ§иһўе№•жҸҗйҶ’жө®еұӨпјҲv5иЈңеј·пјҡеҸӘеңЁжүӢж©ҹи§ёзҷјпјҢдёҖеҖӢ session еҸӘи·ідёҖж¬ЎпјҢдёҚж””жҲӘйҒҠжҲІеҲқе§ӢеҢ–пјү=====
(function bigScreenHint(){
  try{
    const isPhone = Math.min(screen.width, screen.height) < 600 || innerWidth < 768;
    if(!isPhone) return;
    if(sessionStorage.getItem('bigscreen-hint')) return;
    const el = document.getElementById('bigScreenHint');
    const btn = document.getElementById('bshBtn');
    if(!el || !btn) return;
    el.hidden = false;
    btn.addEventListener('click', function(){
      try{ sessionStorage.setItem('bigscreen-hint', '1'); }catch(e){}
      el.classList.add('bsh-fade');
      setTimeout(function(){ el.remove(); }, 320);
    }, { once:true });
  }catch(e){ /* sessionStorage дёҚеҸҜз”ЁжҷӮзӣҙжҺҘз•ҘйҒҺпјҢдёҚеҪұйҹҝйҒҠжҲІијүе…Ҙ */ }
})();

// ===== йҹіж•ҲпјҲWeb Audio еҗҲжҲҗпјҢйӣ¶йҹіжӘ”пјҢе–®дёҖ DynamicsCompressor дё»з·ҡпјү=====
let AC = null, master = null, ambGain = null, ambFilt = null, ambBase = 0.05;
let muted = localStorage.getItem('catwar_mute') === '1';
function audio(){
  if(!AC){
    try{
      AC = new (window.AudioContext || window.webkitAudioContext)();
      master = AC.createGain(); master.gain.value = muted ? 0 : 0.85;
      const comp = AC.createDynamicsCompressor();
      comp.threshold.value = -12; comp.knee.value = 24; comp.ratio.value = 8;
      comp.attack.value = 0.003; comp.release.value = 0.2;
      master.connect(comp); comp.connect(AC.destination);
      /* v6пјҡзЁӢеәҸеҢ–ж®ҳйҹҝвҖ”вҖ”generated impulse ConvolverNodeпјҲжҲ°е ҙй–Ӣй—Ҡе°ҫйҹіпјү */
      try{
        const sr = AC.sampleRate, len = Math.floor(sr*1.4);
        const imp = AC.createBuffer(2, len, sr);
        for(let ch = 0; ch < 2; ch++){
          const d = imp.getChannelData(ch);
          for(let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 2.6);
        }
        const conv = AC.createConvolver(); conv.buffer = imp;
        const wet = AC.createGain(); wet.gain.value = 0.17;
        master.connect(conv); conv.connect(wet); wet.connect(comp);
      }catch(e){}
      /* v6пјҡй—ңеҚЎдё»йЎҢз’°еўғйҹіеҫӘз’°вҖ”вҖ”дҪҺйҖҡжЈ•еҷӘиҒІпјҲиҚүеҺҹйўЁ/зҶ”еІ©йҡҶйҡҶ/еӨңйўЁпјүпјҢиө° master и·ҹйҡЁйқңйҹі */
      try{
        const sr = AC.sampleRate, alen = Math.floor(sr*2.3);
        const abuf = AC.createBuffer(1, alen, sr);
        const ad = abuf.getChannelData(0); let v = 0;
        for(let i = 0; i < alen; i++){ v = v*0.984 + (Math.random()*2-1)*0.06; ad[i] = v*2.3; }
        const src = AC.createBufferSource(); src.buffer = abuf; src.loop = true;
        ambFilt = AC.createBiquadFilter(); ambFilt.type = 'lowpass'; ambFilt.frequency.value = 400; ambFilt.Q.value = 0.4;
        ambGain = AC.createGain(); ambGain.gain.value = ambBase;
        const lfo = AC.createOscillator(); lfo.frequency.value = 0.12;
        const lg = AC.createGain(); lg.gain.value = ambBase*0.4;
        lfo.connect(lg); lg.connect(ambGain.gain);
        src.connect(ambFilt); ambFilt.connect(ambGain); ambGain.connect(master);
        src.start(); lfo.start();
        setAmbTheme();
      }catch(e){}
    }catch(e){ AC = null; }
  }
  if(AC && AC.state === 'suspended') AC.resume();
  return AC;
}
/* v6пјҡдҫқй—ңеҚЎдё»йЎҢиӘҝз’°еўғйҹіпјҲдҪҺйҖҡй »зҺҮиҲҮйҹійҮҸпјү */
function setAmbTheme(){
  if(!AC || !ambFilt) return;
  const kind = LEVELS[curLevel] ? LEVELS[curLevel].bgKind : 'day';
  const cfg = { day:{f:520,g:0.045}, forest:{f:340,g:0.05}, lava:{f:130,g:0.075},
                sky:{f:760,g:0.04}, night:{f:180,g:0.055} }[kind] || {f:400,g:0.05};
  ambBase = cfg.g;
  const t = AC.currentTime;
  ambFilt.frequency.setTargetAtTime(cfg.f, t, 0.4);
  ambGain.gain.setTargetAtTime(cfg.g, t, 0.4);
}
/* v6пјҡеӨ§дәӢд»¶жҷӮж°ӣеңҚ ducking */
function duckAmb(){
  if(!AC || !ambGain) return;
  const t = AC.currentTime;
  ambGain.gain.cancelScheduledValues(t);
  ambGain.gain.setValueAtTime(Math.max(0.001, ambGain.gain.value), t);
  ambGain.gain.linearRampToValueAtTime(ambBase*0.2, t+0.05);
  ambGain.gain.linearRampToValueAtTime(ambBase, t+1.3);
}
function setMuted(m){ muted = m; if(master) master.gain.value = muted ? 0 : 0.85; }
function beep(freq = 440, dur = 0.1, type = 'square', vol = 0.12, slide = 0){
  const ac = audio(); if(!ac) return;
  freq *= 1 + (Math.random()*2-1) * 0.04; // йҡЁж©ҹйҹій«ҳпјҢйҖЈзҷјдёҚе–®иӘҝ
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, ac.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), ac.currentTime + dur);
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g).connect(master);
  o.start(); o.stop(ac.currentTime + dur);
}
function noiseSfx(dur = 0.3, vol = 0.18, cutoff = 900){
  const ac = audio(); if(!ac) return;
  const len = Math.floor(ac.sampleRate * dur);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for(let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ac.createBufferSource(); src.buffer = buf;
  const f = ac.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = cutoff;
  const g = ac.createGain(); g.gain.value = vol;
  src.connect(f); f.connect(g); g.connect(master); src.start();
}
const sfx = {
  deploy(){ beep(320, 0.09, 'square', 0.1, 260); },
  hit(){ beep(170, 0.05, 'square', 0.07); },
  kill(){ beep(988, 0.07, 'square', 0.09); setTimeout(() => beep(1319, 0.12, 'square', 0.09), 70); },
  coin(){ beep(1175, 0.06, 'triangle', 0.1); setTimeout(() => beep(1760, 0.05, 'sine', 0.04), 40); }, /* v7пјҡеҠ й«ҳй »жіӣйҹіпјҢйҮ‘е№ЈйҹіиүІжӣҙжё…и„Ҷ */
  upgrade(){ beep(523, 0.08, 'square', 0.1); setTimeout(() => beep(784, 0.14, 'square', 0.1), 80); },
  cannon(){ duckAmb(); noiseSfx(0.5, 0.2, 700); beep(90, 0.5, 'sawtooth', 0.16, -40); },
  deny(){ beep(140, 0.12, 'sawtooth', 0.08, -60); },
  baseHit(){ noiseSfx(0.2, 0.12, 500); beep(110, 0.15, 'triangle', 0.1); },
  boss(){ duckAmb(); beep(80, 0.7, 'sawtooth', 0.2, 30); noiseSfx(0.6, 0.15, 300); },
  win(){ duckAmb(); [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.18,'square',0.12), i*130)); },
  lose(){ duckAmb(); beep(300, 0.5, 'sawtooth', 0.13, -180); },
  kb(){ beep(240, 0.1, 'triangle', 0.09, -120); },
  star(){ beep(1046, 0.09, 'triangle', 0.1); },
  warn(){ beep(880, 0.08, 'square', 0.1); setTimeout(() => beep(880, 0.08, 'square', 0.1), 150); }
};

// ===== ијёе…Ҙ =====
function evtPos(e){
  const r = canvas.getBoundingClientRect();
  return { x:(e.clientX - r.left) / canvas._scale, y:(e.clientY - r.top) / canvas._scale };
}
function pointerTap(p){
  if(hitBtn(p, muteBtn)){ toggleMute(); return; }
  if(state && state.tap) state.tap(p);
}
canvas.addEventListener('pointerdown', e => { e.preventDefault(); audio(); pointerTap(evtPos(e)); });
for(const ev of ['touchstart','touchmove','touchend','touchcancel'])
  canvas.addEventListener(ev, e => e.preventDefault(), { passive:false });
addEventListener('keydown', e => {
  if(['Space','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
  audio();
  if(e.code === 'KeyM'){ toggleMute(); return; }
  if(state && state.key) state.key(e.code);
});
function toggleMute(){
  muted = !muted;
  setMuted(muted);
  localStorage.setItem('catwar_mute', muted ? '1' : '0');
  if(!muted) sfx.coin();
}
function hitBtn(p, b){
  const pad = 4; // v5иЈңеј·пјҡи§ёжҺ§е‘Ҫдёӯе®№йҢҜпјҲеҜ¬е®№иЁӯиЁҲпјҢйӮҠз·Јд№ҹз®—е‘Ҫдёӯпјү
  return b && p.x >= b.x - pad && p.x <= b.x + b.w + pad && p.y >= b.y - pad && p.y <= b.y + b.h + pad;
}
const muteBtn = { x: GAME_W - 58, y: 10, w: 48, h: 48 };

// ===== е…өзЁ®иіҮж–ҷ =====
const CATS = [
  { id:'cat',  name:'е°ҸиІ“иІ“',   cost:50,  cd:1.5,  hp:110,  atk:24,  speed:72,  range:30,  atkCd:0.9, kb:3, w:34, h:34 },
  { id:'tank', name:'еЈҜеЈҜиІ“',   cost:120, cd:3.5,  hp:520,  atk:14,  speed:42,  range:30,  atkCd:1.4, kb:4, w:42, h:40 },
  { id:'kick', name:'йЈӣиёўиІ“',   cost:180, cd:4.5,  hp:150,  atk:52,  speed:125, range:36,  atkCd:0.8, kb:2, w:36, h:36 },
  { id:'arch', name:'еј“з®ӯиІ“',   cost:250, cd:6,    hp:95,   atk:40,  speed:55,  range:200, atkCd:1.6, kb:2, w:34, h:36, ranged:true },
  { id:'mega', name:'е·Ёз„ЎйңёиІ“', cost:580, cd:14,   hp:1150, atk:170, speed:36,  range:46,  atkCd:2.2, kb:1, w:64, h:62, aoe:true }
];
const FOES = {
  dog:  { id:'dog',  name:'е°ҸжұӘжұӘ',   hp:95,   atk:18,  speed:55,  range:28, atkCd:1.0, kb:2, reward:32,  w:36, h:32 },
  rat:  { id:'rat',  name:'еҝ«еҝ«йј ',   hp:55,   atk:12,  speed:135, range:24, atkCd:0.7, kb:1, reward:26,  w:28, h:24 },
  pig:  { id:'pig',  name:'иӮҘиӮҘиұ¬',   hp:560,  atk:26,  speed:30,  range:30, atkCd:1.5, kb:3, reward:110, w:52, h:44 },
  wolf: { id:'wolf', name:'жҡҙйўЁзӢј',   hp:230,  atk:44,  speed:78,  range:32, atkCd:1.1, kb:2, reward:85,  w:42, h:38 },
  hound:{ id:'hound',name:'зғҲз„°зҠ¬',   hp:340,  atk:52,  speed:96,  range:30, atkCd:0.9, kb:2, reward:130, w:40, h:36 },
  boss: { id:'boss', name:'еӨ§йӯ”зҺӢжұӘ', hp:3400, atk:150, speed:24,  range:64, atkCd:2.0, kb:6, reward:800, w:96, h:88, aoe:true, boss:true }
};

// ===== 5 еӨ§й—ңеҚЎпјҲеҗ„жңүзҚЁзү№йҷЈе®№иҲҮең°ең–пјү=====

let shake = 0, freeze = 0, flashT = 0;
const parts = [], floats = [];
function burst(x, y, color, n = 12, speed = 220){
  for(let i = 0; i < n && parts.length < 300; i++){
    const a = Math.random() * Math.PI * 2, s = speed * (0.3 + Math.random() * 0.7);
    parts.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s - 60, life:0.55, color });
  }
}
function floatText(x, y, txt, color = '#fff', size = 20){
  floats.push({ x, y, txt, color, size, life:0.8 });
}
function updateFx(dt){
  shake *= Math.pow(0.001, dt);
  flashT = Math.max(0, flashT - dt);
  for(let i = parts.length - 1; i >= 0; i--){
    const p = parts[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 620*dt; p.life -= dt;
    if(p.life <= 0){ parts[i] = parts[parts.length - 1]; parts.pop(); }
  }
  for(let i = floats.length - 1; i >= 0; i--){
    const f = floats[i];
    f.y -= 45*dt; f.life -= dt;
    if(f.life <= 0){ floats[i] = floats[floats.length - 1]; floats.pop(); }
  }
}
function drawFx(){
  for(const p of parts){
    ctx.globalAlpha = Math.max(0, p.life * 2);
    ctx.fillStyle = p.color;
    /* v7пјҡзІ’еӯҗж”№ең“еҪўдёҰйҡЁз”ҹе‘ҪйҖұжңҹзё®е°ҸпјҢиіӘж„ҹжӣҙжҹ”е’Ң */
    ctx.beginPath(); ctx.arc(p.x, p.y, 1.4 + 2.4 * Math.max(0, p.life / 0.55), 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  for(const f of floats){
    ctx.globalAlpha = Math.min(1, f.life * 2.2);
    ctx.font = 'bold ' + f.size + 'px "PingFang TC","Microsoft JhengHei",sans-serif';
    ctx.textAlign = 'center';
    ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(0,0,0,.55)';
    ctx.strokeText(f.txt, f.x, f.y);
    ctx.fillStyle = f.color; ctx.fillText(f.txt, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

const _gc = new Map();
function cg(key, maker){
  let g = _gc.get(key);
  if(!g){ g = maker(); _gc.set(key, g); }
  return g;
}
function makeGlowV6(color, r){
  const c = document.createElement('canvas'); c.width = c.height = r*2;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(r,r,1, r,r,r);
  gr.addColorStop(0,color); gr.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle = gr; g.fillRect(0,0,r*2,r*2);
  return c;
}

let envKind = '', envParts = [];
function ensureEnv(kind){
  if(envKind === kind) return;
  envKind = kind; envParts = [];
  const n = kind === 'lava' ? 24 : 16;
  for(let i = 0; i < n; i++){
    envParts.push({
      x: Math.random()*GAME_W, y: Math.random()*(GROUND_Y-30),
      vx: kind === 'sky' ? -(130+Math.random()*90) : (Math.random()<0.5?-1:1)*(6+Math.random()*12),
      vy: kind === 'lava' ? -(34+Math.random()*44) : (12+Math.random()*18),
      ph: Math.random()*Math.PI*2
    });
  }
}
function updateEnvV6(dt){
  for(const p of envParts){
    p.x += p.vx*dt; p.ph += dt;
    if(envKind === 'lava'){ p.y += p.vy*dt; if(p.y < 40){ p.y = GROUND_Y-6; p.x = Math.random()*GAME_W; } }
    else if(envKind === 'day' || envKind === 'forest'){ p.y += (p.vy + Math.sin(p.ph*1.5)*9)*dt; if(p.y > GROUND_Y){ p.y = -8; } }
    else { p.y += Math.sin(p.ph*1.3)*12*dt; if(p.y < 20) p.y = 20; else if(p.y > GROUND_Y-20) p.y = GROUND_Y-20; }
    if(p.x < -14) p.x = GAME_W+14; else if(p.x > GAME_W+14) p.x = -14;
  }
}
function drawEnvV6(){
  if(envKind === 'day'){
    for(const p of envParts){
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(Math.sin(p.ph*2)*0.9);
      ctx.globalAlpha = 0.6;
      ctx.fillStyle = p.ph % 1 < 0.5 ? '#ffd9e8' : '#fff5c8';
      ctx.fillRect(-3, -1.6, 6, 3.2);

    ctx.strokeStyle = 'rgba(255,255,255,.4)'; ctx.lineWidth = 1.6; ctx.lineCap = 'round';
    for(const p of envParts){
      ctx.globalAlpha = 0.18 + 0.2*Math.sin(p.ph*2);
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x+28, p.y+2); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  } else {
    const spr = envKind === 'lava' ? glowEmber : envKind === 'forest' ? glowFirefly : glowViolet;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for(const p of envParts){
      ctx.globalAlpha = 0.35 + 0.35*(0.5+0.5*Math.sin(p.ph*2.4));
      ctx.drawImage(spr, p.x-8+Math.sin(p.ph*1.8)*5, p.y-8);
    }
    ctx.restore();
    ctx.globalAlpha = 1;
  }
}
const ringsV6 = [];
function addRing(x, y, color, maxR){ ringsV6.push({x, y, r: 12, maxR, life: 0.5, max: 0.5, color}); }
function updateRings(dt){
  for(let i = ringsV6.length-1; i >= 0; i--){
    const r = ringsV6[i];
    r.life -= dt; r.r += (r.maxR - r.r)*7*dt;
    if(r.life <= 0){ ringsV6[i] = ringsV6[ringsV6.length-1]; ringsV6.pop(); }
  }
}
function drawRings(){
  for(const r of ringsV6){
    ctx.globalAlpha = Math.max(0, r.life/r.max);
    ctx.strokeStyle = r.color; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.ellipse(r.x, r.y, r.r, r.r*0.45, 0, 0, Math.PI*2); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function spawnUnit(def, side){

function dealDamage(e, dmg, hitX){
  if(e.invuln > 0 || e.dead) return;
  e.hp -= dmg;
  e.flash = 0.1;
  e.sx = 1.3; e.sy = 0.7;
  floatText(e.x, e.y - e.def.h - 14, Math.round(dmg), e.side > 0 ? '#ff8a8a' : '#fff700', 18);
  burst(hitX !== undefined ? hitX : e.x, e.y - e.def.h/2, e.side > 0 ? '#ffcd75' : '#ff2975', 5, 160);
  sfx.hit();
  if(e.hp <= 0){ killUnit(e); return; }
  if(e.hp <= e.nextKb){
    e.nextKb -= e.max / e.def.kb;
    e.vx = -e.side * 190;
    e.vz = -170; e.z = -0.01;
    e.invuln = 0.3; e.windup = 0;
    sfx.kb();
  }
}
function killUnit(e){
  e.dead = true;
  burst(e.x, e.y - e.def.h/2, e.side > 0 ? '#fcfcfc' : '#ef7d57', 18, 240);
  if(e.side < 0){
    money = Math.min(walletCap(), money + e.def.reward);
    floatText(e.x, e.y - e.def.h - 30, '+$' + e.def.reward, '#ffcd75', 22);
    sfx.kill();
    if(e.def.boss){
      freeze = 0.15; shake = 12;
      addRing(e.x, e.y - 40, '#ff2975', 180);   /* v6пјҡйӯ”зҺӢж“Ҡз ҙйӣҷе…үз’° */
      addRing(e.x, e.y - 40, '#ffcd75', 120);
      duckAmb();
    }
    else freeze = Math.max(freeze, 0.04);
  } else {
    sfx.hit();
  }
}
function nearestTarget(e){
  let best = null, bestD = 1e9;
  for(const o of ents){
    if(o.side === e.side || o.dead || o.z < -1) continue;
    const d = (o.x - e.x) * e.side;
    if(d > -14 && d < bestD){ bestD = d; best = o; }
  }
  const baseX = e.side > 0 ? E_BASE_X : P_BASE_X;
  const dBase = (baseX - e.x) * e.side;
  if(dBase < bestD){ bestD = dBase; best = 'base'; }
  return { target: best, dist: bestD };
}
function hitBase(side, dmg){
  const b = side > 0 ? eBase : pBase;
  b.hp = Math.max(0, b.hp - dmg);
  b.shake = 6;
  shake = Math.max(shake, 4);
  sfx.baseHit();
  burst(side > 0 ? E_BASE_X : P_BASE_X, GROUND_Y - 90, side > 0 ? '#ffcd75' : '#ff2975', 10, 200);
}

// ===== е…өзЁ®з№Әең–пјҲеӨҡйғЁд»¶и§’иүІпјү=====
function rr(x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r); ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r); ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}
function drawUnit(e, t){
  const d = e.def, w = d.w, h = d.h;
  const bob = Math.sin(e.walkT * 9) * (e.windup > 0 ? 0 : 2);
  ctx.save();
  const airK = Math.max(0, 1 - Math.abs(e.z) / 80);
  ctx.globalAlpha = 0.25 * airK + 0.05;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(e.x, e.y + 3, w * 0.45 * (airK * 0.6 + 0.4), 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  ctx.translate(e.x, e.y + e.z + bob);
  ctx.scale(e.side, 1);
  const lean = e.windup > 0 ? -0.18 : 0;
  ctx.rotate(lean);
  ctx.scale(e.sx, e.sy);
  ctx.translate(0, -h);
  if(e.invuln > 0 && Math.floor(t * 20) % 2) ctx.globalAlpha = 0.5;

  const isCat = e.side > 0;
  if(isCat) drawCat(d, w, h, t, e);
  else drawFoe(d, w, h, t, e);

  if(e.flash > 0){
    ctx.globalCompositeOperation = 'source-atop';
    ctx.fillStyle = 'rgba(255,255,255,.75)';
    ctx.fillRect(-w, -h, w*2.2, h*2.4);
    ctx.globalCompositeOperation = 'source-over';
  }
  ctx.restore();

  if(e.hp < e.max){
    const bw = Math.max(30, w);
    ctx.fillStyle = 'rgba(0,0,0,.5)';
    ctx.fillRect(e.x - bw/2, e.y - h - e.z - 12, bw, 5);
    ctx.fillStyle = e.side > 0 ? '#41a6f6' : '#ff2975';
    ctx.fillRect(e.x - bw/2, e.y - h - e.z - 12, bw * Math.max(0, e.hp / e.max), 5);
  }
}
function bodyHighlight(w, h, cy, tone){
  // v5иЈңеј·пјҡеҸ—е…үйқўй«ҳе…үж©ўең“пјҢи®“иә«й«”жңүжҳҺзўәе…үжәҗж–№еҗ‘иҲҮз«Ӣй«”ж„ҹпјҲзІҫзҙ°еҢ–пјү
  ctx.save();
  ctx.globalAlpha = tone;
  ctx.fillStyle = cg('hi'+w+','+Math.round(cy), () => {
    const hi = ctx.createRadialGradient(-w*0.16, cy, 1, -w*0.16, cy, w*0.32);
    hi.addColorStop(0, 'rgba(255,255,255,.9)');
    hi.addColorStop(1, 'rgba(255,255,255,0)');
    return hi;
  });
  ctx.beginPath(); ctx.ellipse(-w*0.16, cy, w*0.25, h*0.16, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function catFace(cx, cy, s, t, angry, hurt){
  ctx.fillStyle = '#222';
  if(hurt){ // v5иЈңеј·пјҡеҸ—ж“ҠиЎЁжғ…пјҲX зңјпјүпјҢиҲҮе№іеёёзңЁзңјеҫ®з¬‘еҒҡеҮәеҚҖйҡ”
    ctx.strokeStyle = '#222'; ctx.lineWidth = 1.8*s; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx + 1.5*s, cy - 2.2*s); ctx.lineTo(cx + 6.5*s, cy + 2.2*s);
    ctx.moveTo(cx + 6.5*s, cy - 2.2*s); ctx.lineTo(cx + 1.5*s, cy + 2.2*s);
    ctx.moveTo(cx + 9.5*s, cy - 2.2*s); ctx.lineTo(cx + 14.5*s, cy + 2.2*s);
    ctx.moveTo(cx + 14.5*s, cy - 2.2*s); ctx.lineTo(cx + 9.5*s, cy + 2.2*s);
    ctx.stroke();
  } else {
    const blink = (Math.sin(t * 0.7 + cx) > 0.985);
    if(blink){
      ctx.fillRect(cx + 2*s, cy - 1, 5*s, 2);
      ctx.fillRect(cx + 10*s, cy - 1, 5*s, 2);
    } else {
      ctx.beginPath(); ctx.arc(cx + 4*s, cy, 2.4*s, 0, Math.PI*2); ctx.arc(cx + 12*s, cy, 2.4*s, 0, Math.PI*2); ctx.fill();
    }
  }
  if(angry && !hurt){

    ctx.fillStyle = '#7a3a3a';
    ctx.beginPath(); ctx.ellipse(cx + 8*s, cy + 5*s, 2.4*s, 2.8*s, 0, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.strokeStyle = '#222'; ctx.lineWidth = 1.4;

    ctx.stroke();
  }
  ctx.fillStyle = 'rgba(255,150,160,.55)';
  ctx.beginPath(); ctx.arc(cx + 1*s, cy + 4*s, 2*s, 0, Math.PI*2); ctx.arc(cx + 15*s, cy + 4*s, 2*s, 0, Math.PI*2); ctx.fill();
}
function drawCat(d, w, h, t, e){

// --- йҒҠзҺ© ---
function startLevel(lv){
  curLevel = lv;
  setAmbTheme();   /* v6пјҡеҲҮжҸӣй—ңеҚЎдё»йЎҢз’°еўғйҹі */
  setState(playState, 'play');
}
const playState = {
  enter(){
    const L = LEVELS[curLevel];
    ents = []; arrows = []; parts.length = 0; floats.length = 0;
    money = 120; wallet = 0; cannonT = 0; levelT = 0;
    trickleT = 0; scriptIdx = 0; bossWarnT = 0; endDelay = 0; ending = '';
    shake = 0; freeze = 0; flashT = 0; earnedStars = 0;
    deployedOnce = false; pBaseWarned = false;
    for(let i = 0; i < cds.length; i++) cds[i] = 0;
    pBase = { hp: L.playerHp, max: L.playerHp, shake: 0, disp: L.playerHp };
    eBase = { hp: L.baseHp, max: L.baseHp, shake: 0, disp: L.baseHp };
    hintT = curLevel === 0 ? 7 : 0;
    this.nameT = 2.4;
  },
  key(code){
    const map = { Digit1:0, Digit2:1, Digit3:2, Digit4:3, Digit5:4 };
    if(code in map) tryDeploy(map[code]);
    else if(code === 'KeyE' || code === 'Digit6') tryWallet();
    else if(code === 'Space' || code === 'KeyQ') tryCannon();
  },
  tap(p){
    for(const b of unitBtns) if(hitBtn(p, b)){ tryDeploy(b.idx); return; }
    if(hitBtn(p, walletBtn)){ tryWallet(); return; }
    if(hitBtn(p, cannonBtn)){ tryCannon(); return; }
  },
  update(dt){
    const L = LEVELS[curLevel];
    levelT += dt;
    this.nameT -= dt;
    if(hintT > 0) hintT -= dt;
    money = Math.min(walletCap(), money + walletRate() * dt);
    cannonT = Math.min(CANNON_MAX, cannonT + dt);
    for(let i = 0; i < cds.length; i++) cds[i] = Math.max(0, cds[i] - dt);
    pBase.shake = Math.max(0, pBase.shake - dt * 24);
    eBase.shake = Math.max(0, eBase.shake - dt * 24);
    pBase.disp += (pBase.hp - pBase.disp) * (1 - Math.pow(0.005, dt));
    eBase.disp += (eBase.hp - eBase.disp) * (1 - Math.pow(0.005, dt));
    bossWarnT = Math.max(0, bossWarnT - dt);
    if(!pBaseWarned && pBase.hp > 0 && pBase.hp <= pBase.max * 0.25){ // v5пјҡиІ“иІ“еЎ”иЎҖйҮҸзҖ•еҚұиӯҰзӨә
      pBaseWarned = true;
      sfx.warn();
      shake = Math.max(shake, 3);
    }

    if(!ending){
      while(scriptIdx < L.script.length && levelT >= L.script[scriptIdx].t){
        const type = L.script[scriptIdx].type;
        spawnUnit(FOES[type], -1);
        if(FOES[type].boss){ bossWarnT = 2.2; shake = 14; sfx.boss(); }
        scriptIdx++;
      }
      if(levelT >= L.trickle.start){
        trickleT -= dt;
        if(trickleT <= 0){
          const speedup = Math.min(4, (levelT - L.trickle.start) / 40);
          trickleT = Math.max(L.trickle.min, L.trickle.interval - speedup * 2);
          spawnUnit(FOES[L.trickle.type], -1);
        }
      }
    }

    for(const e of ents){
      if(e.dead) continue;
      e.walkT += dt;
      e.flash = Math.max(0, e.flash - dt);
      e.invuln = Math.max(0, e.invuln - dt);
      e.sx += (1 - e.sx) * 12 * dt; e.sy += (1 - e.sy) * 12 * dt;
      if(e.z < 0 || e.vz !== 0){
        e.vz += 900 * dt; e.z += e.vz * dt;
        e.x += e.vx * dt; e.vx *= Math.pow(0.05, dt);
        if(e.z >= 0){ e.z = 0; e.vz = 0; e.vx = 0; burst(e.x, e.y, 'rgba(200,180,150,1)', 4, 90); }
        continue;
      }
      const { target, dist } = nearestTarget(e);
      const reach = e.def.range + (target !== 'base' && target ? target.def.w * 0.4 : 26);
      if(target && dist <= reach){
        if(e.windup > 0){
          e.windup -= dt;
          if(e.windup <= 0){
            e.sx = 1.25; e.sy = 0.8;
            if(e.def.ranged){
              arrows.push({ x: e.x + e.side * 14, y: e.y - e.def.h * 0.55, vx: e.side * 460, side: e.side, atk: e.def.atk, life: 1.2 });
              beep(600, 0.06, 'triangle', 0.06, 200);
            } else if(e.def.aoe){
              shake = Math.max(shake, e.def.boss ? 8 : 5);
              freeze = Math.max(freeze, 0.05);
              for(const o of ents){
                if(o.side !== e.side && !o.dead && Math.abs(o.x - e.x) < e.def.range + 40) dealDamage(o, e.def.atk, o.x);
              }
              const bx = e.side > 0 ? E_BASE_X : P_BASE_X;
              if(Math.abs(bx - e.x) < e.def.range + 60) hitBase(e.side, e.def.atk);
              burst(e.x + e.side * 30, e.y - 10, '#fff700', 10, 260);
            } else if(target === 'base'){
              hitBase(e.side, e.def.atk);
            } else if(target && !target.dead){
              dealDamage(target, e.def.atk, e.x + e.side * e.def.w * 0.5);
            }
            e.atkT = e.def.atkCd;
          }
        } else if(e.atkT > 0){
          e.atkT -= dt;
        } else {
          e.windup = 0.16;
          e.sx = 0.85; e.sy = 1.15;
        }
      } else {
        e.windup = 0;
        e.x += e.side * e.def.speed * dt;
      }
    }
    for(const a of arrows){
      a.x += a.vx * dt; a.life -= dt;
      if(a.life <= 0){ a.dead = true; continue; }
      for(const o of ents){
        if(o.side === a.side || o.dead || o.z < -40) continue;
        if(Math.abs(o.x - a.x) < o.def.w * 0.5 + 6){ dealDamage(o, a.atk, a.x); a.dead = true; break; }
      }
      if(!a.dead){
        const bx = a.side > 0 ? E_BASE_X : P_BASE_X;
        if((bx - a.x) * a.side < 30){ hitBase(a.side, a.atk); a.dead = true; }
      }
    }
    arrows = arrows.filter(a => !a.dead);
    ents = ents.filter(e => !e.dead);
    updateFx(dt);

    if(!ending){
      if(eBase.hp <= 0){
        ending = 'win'; endDelay = 1.4;
        shake = 12; flashT = 0.3;
        sfx.win();
        earnedStars = computeStars(pBase.hp / pBase.max);
        for(let i = 0; i < 5; i++) setTimeout(() => burst(E_BASE_X - 40 + Math.random()*80, GROUND_Y - 60 - Math.random()*120, ['#ffcd75','#ff2975','#38e1ff','#fff'][i%4], 16, 300), i * 120);
        for(const e of ents) if(e.side < 0) killUnit(e);
      } else if(pBase.hp <= 0){
        ending = 'lose'; endDelay = 0.6; // v5пјҡзё®зҹӯиҗҪж•—иҪүе ҙпјҢз¬ҰеҗҲгҖҢеӨұж•—дёҚжҢ«жҠҳгҖҚ<1з§’йҮҚдҫҶжЁҷжә–
        shake = 10;
        sfx.lose();
        burst(P_BASE_X, GROUND_Y - 80, '#ff8a8a', 24, 280);
      }
    } else {
      endDelay -= dt;
      if(endDelay <= 0){
        if(ending === 'win'){
          if(stars[curLevel] < earnedStars){ stars[curLevel] = earnedStars; saveStars(); }
          if(curLevel + 1 >= unlocked && curLevel < LEVEL_COUNT - 1){
            unlocked = Math.max(unlocked, curLevel + 2);
            localStorage.setItem('catwar_unlock', String(unlocked));
          }
          if(curLevel === LEVEL_COUNT - 1){
            clears++;
            localStorage.setItem('catwar_clears', String(clears));
          }
          setState(winState, 'win');
        } else {
          setState(loseState, 'lose');
        }
      }
    }
  },
  draw(){
    const t = levelT;
    ctx.save();
    ctx.translate((Math.random()*2-1)*shake, (Math.random()*2-1)*shake);
    drawBackground(curLevel, t);
    drawBase(P_BASE_X, true, pBase.hp, pBase.max, pBase.shake, t);
    drawBase(E_BASE_X, false, eBase.hp, eBase.max, eBase.shake, t);
    const sorted = ents.slice().sort((a, b) => a.y - b.y);
    for(const e of sorted) drawUnit(e, t);
    ctx.strokeStyle = '#8c5a3c'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    for(const a of arrows){
      ctx.beginPath(); ctx.moveTo(a.x - a.side*10, a.y); ctx.lineTo(a.x + a.side*8, a.y); ctx.stroke();
      ctx.fillStyle = '#e8e8e8';
      ctx.beginPath(); ctx.moveTo(a.x + a.side*14, a.y); ctx.lineTo(a.x + a.side*6, a.y - 4); ctx.lineTo(a.x + a.side*6, a.y + 4); ctx.closePath(); ctx.fill();
    }
    drawRings();
    drawFx();
    ctx.restore();
    if(flashT > 0){
      ctx.fillStyle = 'rgba(255,255,230,' + (flashT * 2.4) + ')';
      ctx.fillRect(0, 0, GAME_W, GAME_H);
    }
    this.drawHUD(t);
  },
  drawHUD(t){
    drawBaseBar(14, 12, 300, pBase, '#41a6f6', 'иІ“иІ“еЎ”');
    drawBaseBar(GAME_W - 314 - 62, 12, 300, eBase, '#ff2975', 'жұӘжұӘеҹҺ');
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(10,14,30,.72)';
    rr(GAME_W/2 - 120, 8, 240, 40, 12); ctx.fill();
    ctx.strokeStyle = '#ffcd75'; ctx.lineWidth = 2;

function drawBaseBar(x, y, w, base, color, label){
  const danger = base.hp > 0 && base.hp / base.max < 0.25; // v5пјҡиЎҖйҮҸзҖ•еҚұи„ҲеӢ•иӯҰзӨә
  ctx.fillStyle = 'rgba(10,14,30,.72)';
  rr(x, y, w, 40, 12); ctx.fill();
  if(danger){
    const pulse = 0.35 + 0.4 * Math.sin(performance.now() / 170);
    ctx.save();
    ctx.strokeStyle = 'rgba(255,50,60,' + pulse + ')'; ctx.lineWidth = 3;
    rr(x - 1.5, y - 1.5, w + 3, 43, 13); ctx.stroke();
    ctx.restore();
  }
  ctx.font = 'bold 16px "PingFang TC","Microsoft JhengHei",sans-serif'; ctx.textAlign = 'left';

  }
  ctx.font = 'bold 13px "PingFang TC","Microsoft JhengHei",sans-serif'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';

      ctx.shadowColor = 'rgba(0,0,0,.4)'; ctx.shadowBlur = 12; ctx.shadowOffsetY = 4;
      ctx.fillStyle = cg('endbtn' + hot + b.y, () => {
        const g = ctx.createLinearGradient(0, b.y, 0, b.y + b.h);
        if(hot){ g.addColorStop(0, 'rgba(112,58,26,.95)'); g.addColorStop(1, 'rgba(64,30,14,.95)'); }
        else { g.addColorStop(0, 'rgba(32,44,88,.94)'); g.addColorStop(1, 'rgba(14,20,44,.94)'); }
        return g;
      });
      rr(b.x, b.y, b.w, b.h, 14); ctx.fill();
      ctx.restore();
      ctx.lineWidth = 3; ctx.strokeStyle = hot ? '#ffcd75' : '#38e1ff'; ctx.stroke();
      ctx.font = 'bold 24px "PingFang TC","Microsoft JhengHei",sans-serif'; ctx.fillStyle = '#fff';
      ctx.fillText(label, b.x + b.w/2, b.y + 41);
    };
    mk(GAME_W/2 - 240, 230, 'йҰ¬дёҠеҶҚдҫҶпјҒ', () => startLevel(curLevel), true);
    mk(GAME_W/2 + 10, 230, 'еӣһдё»йҒёе–®', () => setState(menuState, 'menu'), false);
    ctx.font = '17px "PingFang TC","Microsoft JhengHei",sans-serif'; ctx.fillStyle = 'rgba(255,255,255,.7)';
    ctx.fillText('пјҲд№ҹеҸҜд»ҘжҢүз©әзҷҪйҚөйҰ¬дёҠйҮҚдҫҶпјү', GAME_W/2, 380);
    drawMuteBtn();
  }
};

// ===== дё»иҝҙеңҲ =====
const STEP = 1/60;
let last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while(acc >= STEP){
    if(freeze > 0){ freeze -= STEP; acc -= STEP; continue; }
    state.update(STEP);
    updateEnvV6(STEP);
    updateRings(STEP);
    acc -= STEP;
  }
  state.draw();
  ctx.drawImage(vignetteC, 0, 0, GAME_W, GAME_H);   /* v6пјҡжҡ—и§’еҫҢиЈҪ */
}
setState(menuState, 'menu');
requestAnimationFrame(frame);

// жё¬и©ҰжҺӣйүӨпјҲз„Ўй ӯзҖҸиҰҪеҷЁеҸҜзҺ©жҖ§й©—иӯүз”Ёпјү
window.__catwar = {
  get state(){ return stateName; },
  get money(){ return money; },
  get ents(){ return ents.length; },
  get level(){ return curLevel; },
  get unlocked(){ return unlocked; },
  get stars(){ return stars.slice(); },
  start: startLevel, deploy: tryDeploy,
  toMenu(){ setState(menuState, 'menu'); }
};

<script>/* AI-CAMP-STATS-BEACON */
(function(){

  var NS="ai-future-camp", K="pro-t-5740cb46";
  var ABS="//abacus.jasoncameron.dev/"; /* зӣҙйҖЈеӮҷжҸҙ */
  var REL="/abacus/"; /* еҗҢжәҗд»ЈзҗҶпјҲVercel иҪүзҷјпјүпјҡеӯёж Ўй–ҳйҒ“ж“ӢеӨ–йғЁз¶ІеҹҹжҷӮд»Қз„¶йҖҡ */
  function ping(n){
    try{
      fetch(REL+"hit/"+NS+"/"+n).then(function(r){
        if(!r||!r.ok){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); }
      }).catch(function(){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); });
    }catch(e){}
  }
  function read(n,cb){
    function via(base,next){ try{ fetch(base+"get/"+NS+"/"+n).then(function(r){ if(r.status===404&&base===ABS) return {value:0}; if(!r.ok) throw 0; return r.json(); }).then(function(j){ cb(j.value||j.count||0); }).catch(next); }catch(e){ next(); } }
    via(REL, function(){ via(ABS, function(){ cb(null); }); });
  }
  ping(K+"-v");
  var done=false;
  function once(){ if(done)return; done=true; ping(K+"-p"); ping("site-total-plays");
    window.removeEventListener("pointerdown",once); window.removeEventListener("keydown",once); }
  window.addEventListener("pointerdown",once,{once:false}); window.addEventListener("keydown",once,{once:false});
  /* жҠ•зҘЁйҲ•пјҡйқһеёёеҘҪзҺ©/еҘҪзҺ©вҖ”вҖ”иҲҮдҪңе“ҒйӨЁеҗҢдёҖиЁҲж•ёеҷЁпјҢд»»дҪ•з¶Ій Ғжү“й–ӢйғҪеҗҢжӯҘ */
  function initVotes(){
    if(!document.body) return;
    var wrap=document.createElement("div");
    wrap.style.cssText="position:fixed;right:10px;bottom:10px;z-index:99999;display:flex;gap:6px;font-family:sans-serif;opacity:.92";
    var LS="voted-"+K;
    var defs=[["-love","\u2764\uFE0F","\u975e\u5e38\u597d\u73a9","#ff6cc7"],["-like","\ud83d\udc4d","\u597d\u73a9","#38e1ff"]];
    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;
          b.querySelector("i").textContent=Math.max(0,(n||0)-(c||0));
        }); });
      });
    }
    defs.forEach(function(d){
      var b=document.createElement("button");
      b.type="button"; b.title=d[2];
      b.style.cssText="min-height:42px;padding:8px 14px;border:none;border-radius:999px;background:rgba(15,18,32,.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation";
      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";
      b.addEventListener("click",function(){
        var prev=null; try{ prev=localStorage.getItem(LS); }catch(e){}
        if(prev===d[0]){ ping(K+d[0]+"-c"); try{ localStorage.removeItem(LS); }catch(e){} }
        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);
      });
      btns[d[0]]=b; wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    refresh();
    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* жҜҸ10з§’еҗҢжӯҘеҲҘдәәжҠ•зҡ„зҘЁ */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
</script>
