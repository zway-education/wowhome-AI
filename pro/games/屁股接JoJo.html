<script>
'use strict';
/* ============================================================
   尻でジョジョをキャッチ！（屁股接JoJo）— 專業升級版
   用鍛鍊過的屁股接住金色替身箭；虹色 JOJO 星讓尻力覺醒，
   紫色邪箭會扣生命。固定時間步進＋狀態機＋全套手感回饋。
   ============================================================ */

/* ===== 畫布與縮放（直式 540×760）===== */
const GAME_W = 540, GAME_H = 760, FEET_Y = 660;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize(){
  const scale = Math.min((innerWidth - 16) / GAME_W, (innerHeight - 16) / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = Math.round(GAME_W * scale * dpr);
  canvas.height = Math.round(GAME_H * scale * dpr);
  canvas.style.width  = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale;
}
addEventListener('resize', resize);
resize();

/* ===== 小工具 ===== */
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp  = (a, b, t) => a + (b - a) * t;
const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
const easeOutBack  = t => 1 + 2.7 * Math.pow(t - 1, 3) + 1.7 * Math.pow(t - 1, 2);
function rr(x, y, w, h, r){
  ctx.beginPath(); ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function fill2(fillStyle, lineStyle, lw){
  ctx.fillStyle = fillStyle; ctx.fill();
  ctx.strokeStyle = lineStyle; ctx.lineWidth = lw || 2.5; ctx.stroke();
}
const FONT = '"Microsoft JhengHei","PingFang TC",sans-serif';
const FONT_HUD = '"Impact","Arial Black",' + FONT;

/* ===== 離屏烘焙（漸層與光暈只算一次；跑動時零 createGradient、零 shadowBlur）===== */
const BK = 2;                             // 烘焙解析度倍率（高 DPI 平板不糊）
function bake(w, h, fn, s = BK){
  const c = document.createElement('canvas');
  c.width = Math.ceil(w * s); c.height = Math.ceil(h * s);
  const g = c.getContext('2d');
  g.scale(s, s);
  fn(g);
  return { c, w, h };
}
/* 天空與地板（純漸層，1x 即可） */
const skyC = bake(GAME_W, GAME_H, g => {
  const gg = g.createLinearGradient(0, 0, 0, GAME_H);
  gg.addColorStop(0, '#1a0e2e'); gg.addColorStop(0.6, '#3d1a4a'); gg.addColorStop(1, '#2a1440');
  g.fillStyle = gg; g.fillRect(0, 0, GAME_W, GAME_H);
}, 1);
const floorC = bake(GAME_W, 92, g => {
  const fg = g.createLinearGradient(0, 0, 0, 92);
  fg.addColorStop(0, '#33184a'); fg.addColorStop(1, '#16081f');
  g.fillStyle = fg; g.fillRect(0, 0, GAME_W, 92);
  g.fillStyle = '#f4c430'; g.fillRect(0, 0, GAME_W, 4);
  g.fillStyle = 'rgba(232,71,139,.5)'; g.fillRect(0, 4, GAME_W, 2);
}, 1);
/* 城市剪影：週期 700px 的長條，捲動時 drawImage 兩張即可 */
function bakeSkyline(color, hScale){
  const H = Math.ceil(130 * hScale) + 2;
  return bake(700, H, g => {
    for(let i = 0; i < 10; i++){
      const bw = 46 + (i * 37) % 30;
      const bh = (55 + (i * 83) % 75) * hScale;
      const bx0 = (i * 92) % 700;
      for(const dx of [-700, 0, 700]){
        const bx = bx0 + dx;
        if(bx + bw < 0 || bx > 700) continue;
        g.fillStyle = color;
        g.fillRect(bx, H - bh, bw, bh);
        g.fillStyle = 'rgba(244,196,48,.16)';
        for(let wY = 0; wY < 3; wY++)
          for(let wX = 0; wX < 2; wX++)
            if((i + wY + wX) % 3 === 0)
              g.fillRect(bx + 8 + wX * 18, H - bh + 12 + wY * 22, 8, 10);
      }
    }
  });
}
const sky1 = bakeSkyline('#241238', 0.9);
const sky2 = bakeSkyline('#180a28', 1.25);
/* 漂浮的ゴ字（遠近兩款） */
function bakeGo(size, cw, fillCol, strokeCol){
  return bake(cw, cw, g => {
    g.font = 'bold ' + size + 'px ' + FONT;
    g.textAlign = 'center'; g.textBaseline = 'middle';
    g.lineWidth = 1.5;
    g.fillStyle = fillCol; g.fillText('ゴ', cw / 2, cw / 2);
    g.strokeStyle = strokeCol; g.strokeText('ゴ', cw / 2, cw / 2);
  });
}
const goFar  = bakeGo(26, 40, 'rgba(232,71,139,.14)', 'rgba(244,196,48,.10)');
const goNear = bakeGo(42, 62, 'rgba(232,71,139,.24)', 'rgba(244,196,48,.18)');
/* 掉落物 sprite（光暈 shadowBlur 一次性烘進圖裡） */
function bakeArrow(good){
  return bake(72, 92, g => {
    g.translate(36, 40);
    g.lineJoin = 'round';
    g.shadowColor = good ? '#f4c430' : '#b04ad0';
    g.shadowBlur = (good ? 12 : 10) * BK;
    const light = good ? '#ffe08a' : '#c86ae0';
    const dark  = good ? '#c89428' : '#7a2f9a';
    const edge  = good ? '#7a5410' : '#3a0a52';
    g.beginPath(); g.moveTo(0, -26); g.lineTo(-12, -2); g.lineTo(0, -6);
    g.closePath(); g.fillStyle = light; g.fill();
    g.beginPath(); g.moveTo(0, -26); g.lineTo(12, -2); g.lineTo(0, -6);
    g.closePath(); g.fillStyle = dark; g.fill();
    g.beginPath(); g.moveTo(0, -26); g.lineTo(-12, -2); g.lineTo(0, -6); g.lineTo(12, -2);
    g.closePath(); g.strokeStyle = edge; g.lineWidth = 2; g.stroke();
    const sg = g.createLinearGradient(-3, 0, 3, 0);
    sg.addColorStop(0, light); sg.addColorStop(1, dark);
    g.fillStyle = sg; g.fillRect(-2.5, -6, 5, 24);
    g.strokeStyle = edge; g.lineWidth = 1.5;
    g.strokeRect(-2.5, -6, 5, 24);
    for(const s of [-1, 1]){
      g.beginPath(); g.moveTo(s * 2.5, 12); g.lineTo(s * 9, 22); g.lineTo(s * 2.5, 20);
      g.closePath();
      g.fillStyle = good ? '#e8478b' : '#4a1060'; g.fill();
      g.strokeStyle = edge; g.lineWidth = 1.5; g.stroke();
    }
    g.shadowBlur = 0;
    g.strokeStyle = good ? 'rgba(122,84,16,.8)' : 'rgba(58,10,82,.8)';
    g.lineWidth = 1.2;
    g.beginPath(); g.arc(0, -13, 3.5, 0, Math.PI * 2); g.stroke();
    if(!good){
      g.fillStyle = '#ff5a5a';
      g.beginPath(); g.arc(0, -13, 1.8, 0, Math.PI * 2); g.fill();
    }
  });
}
const arrowGoldSpr = bakeArrow(true);
const arrowBadSpr  = bakeArrow(false);
const heartSpr = bake(72, 72, g => {
  g.translate(36, 36);
  g.shadowColor = '#ff7ab0'; g.shadowBlur = 16 * BK;
  const s = 16;
  g.beginPath();
  g.moveTo(0, s * 0.35);
  g.bezierCurveTo(-s, -s * 0.4, -s * 0.5, -s, 0, -s * 0.35);
  g.bezierCurveTo(s * 0.5, -s, s, -s * 0.4, 0, s * 0.35);
  g.closePath();
  const hg = g.createLinearGradient(0, -s, 0, s);
  hg.addColorStop(0, '#ffa5c8'); hg.addColorStop(1, '#e8478b');
  g.fillStyle = hg; g.fill();
  g.strokeStyle = '#fff'; g.lineWidth = 2; g.stroke();
  g.shadowBlur = 0;
  g.fillStyle = 'rgba(255,255,255,.6)';
  g.beginPath(); g.arc(-s * 0.35, -s * 0.35, s * 0.18, 0, Math.PI * 2); g.fill();
});
/* JOJO 星：16 個色相影格輪播 */
const JOJO_FR = 16;
const jojoSpr = [];
for(let f = 0; f < JOJO_FR; f++){
  const hue = f * 360 / JOJO_FR;
  jojoSpr.push(bake(96, 96, g => {
    g.translate(48, 48);
    g.shadowColor = 'hsl(' + hue + ',85%,62%)';
    g.shadowBlur = 16 * BK;
    const spikes = 8;
    g.beginPath();
    for(let i = 0; i < spikes * 2; i++){
      const rad = i % 2 === 0 ? 19 : 8.5;
      const a = (Math.PI / spikes) * i;
      const px = Math.sin(a) * rad, py = -Math.cos(a) * rad;
      if(i === 0) g.moveTo(px, py); else g.lineTo(px, py);
    }
    g.closePath();
    const rg = g.createRadialGradient(0, 0, 2, 0, 0, 19);
    rg.addColorStop(0, '#fff');
    rg.addColorStop(0.55, 'hsl(' + hue + ',90%,70%)');
    rg.addColorStop(1, 'hsl(' + ((hue + 60) % 360) + ',85%,52%)');
    g.fillStyle = rg; g.fill();
    g.strokeStyle = '#fff'; g.lineWidth = 2; g.stroke();
    g.shadowBlur = 0;
    g.fillStyle = 'rgba(255,255,255,.85)';
    g.beginPath(); g.arc(-2, -3, 3, 0, Math.PI * 2); g.fill();
  }));
}
/* 覺醒光環（LV2~5 各一張，畫時用 globalAlpha 調強弱） */
const auraSpr = [48, 30, 12, -6].map(h => bake(256, 256, g => {
  const rg = g.createRadialGradient(128, 128, 12, 128, 128, 126);
  rg.addColorStop(0, 'hsla(' + h + ',95%,62%,1)');
  rg.addColorStop(1, 'hsla(' + h + ',95%,62%,0)');
  g.fillStyle = rg;
  g.fillRect(0, 0, 256, 256);
}, 1));
/* 主畫布常駐漸層（一次建立重複使用） */
const FEVER_G = ctx.createLinearGradient(175, 0, 365, 0);
FEVER_G.addColorStop(0, '#e8478b'); FEVER_G.addColorStop(1, '#f4c430');
const HEART_G_ON = ctx.createLinearGradient(0, -12, 0, 12);
HEART_G_ON.addColorStop(0, '#ff7ab0'); HEART_G_ON.addColorStop(1, '#c22568');
const LEG_G = ctx.createLinearGradient(-10, -70, 10, -10);
LEG_G.addColorStop(0, '#e8a87c'); LEG_G.addColorStop(1, '#c47f52');
const HEAD_G = ctx.createRadialGradient(-3, -4, 3, 0, 0, 15);
HEAD_G.addColorStop(0, '#f2c396'); HEAD_G.addColorStop(1, '#d99560');
const cheekGrads = {};
function getCheekGrads(lvl){
  let cgs = cheekGrads[lvl];
  if(!cgs){
    const growth = 1 + (lvl - 1) * 0.1;
    const ry = 33 * growth;
    cgs = cheekGrads[lvl] = [-1, 1].map(side => {
      const cg = ctx.createRadialGradient(side * 20 * growth - 6, -10, 4, side * 20 * growth, 0, ry + 6);
      cg.addColorStop(0, PANTS[lvl - 1]); cg.addColorStop(1, PANTS_DARK[lvl - 1]);
      return cg;
    });
  }
  return cgs;
}

/* ===== 音效（Web Audio 合成：master bus＋壓縮器防爆音）===== */
let AC = null, master = null;
let muted = false;
try{ muted = localStorage.getItem('jojo_muted') === '1'; }catch(e){}
function initAudio(){
  if(!AC){
    try{
      AC = new (window.AudioContext || window.webkitAudioContext)();
      const comp = AC.createDynamicsCompressor();
      comp.threshold.value = -18; comp.knee.value = 24; comp.ratio.value = 12;
      comp.attack.value = 0.003; comp.release.value = 0.25;
      master = AC.createGain();
      master.gain.value = 0.9;
      master.connect(comp);
      comp.connect(AC.destination);
    }catch(e){}
  }
  if(AC && AC.state === 'suspended') AC.resume();
}
function beep(freq = 440, dur = 0.1, type = 'square', vol = 0.15, slide = 0, jit = 0){
  if(muted || !AC) return;
  if(jit) freq *= 1 + (Math.random() * 2 - 1) * jit;   // 重複音效隨機音高防疲勞
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, AC.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), AC.currentTime + dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.connect(g).connect(master);
  o.start(); o.stop(AC.currentTime + dur);
}
function noise(dur = 0.15, vol = 0.2){
  if(muted || !AC) return;
  const len = Math.floor(AC.sampleRate * dur);
  const buf = AC.createBuffer(1, len, AC.sampleRate);
  const d = buf.getChannelData(0);
  for(let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = AC.createBufferSource();
  src.buffer = buf;
  const g = AC.createGain();
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  src.connect(g).connect(master);
  src.start();
}
const sfx = {
  catch(){ beep(988, 0.07, 'square', 0.1, 0, 0.05); setTimeout(() => beep(1319, 0.12, 'square', 0.1, 0, 0.05), 70); },
  jojo(){ [659, 784, 988, 1319, 1568].forEach((f, i) => setTimeout(() => beep(f, 0.13, 'square', 0.1, 0, 0.03), i * 70)); },
  hurt(){ noise(0.12, 0.15); beep(200, 0.25, 'sawtooth', 0.14, -140, 0.08); },
  miss(){ beep(150, 0.2, 'triangle', 0.13, -80, 0.08); },
  ui(){ beep(660, 0.06, 'square', 0.08, 0, 0.04); },
  ora(){ beep(440, 0.05, 'square', 0.09, 200, 0.08); },
  fever(){ noise(0.2, 0.16); [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.12, 'sawtooth', 0.11, 150), i * 80)); },
  heart(){ beep(660, 0.1, 'triangle', 0.12, 220); setTimeout(() => beep(988, 0.16, 'triangle', 0.11), 100); },
  rumble(){ beep(80, 0.5, 'sawtooth', 0.12, 40); noise(0.35, 0.1); },
  lose(){ [392, 330, 262, 196, 147].forEach((f, i) => setTimeout(() => beep(f, 0.22, 'triangle', 0.12), i * 140)); }
};
function toggleMute(){
  muted = !muted;
  try{ localStorage.setItem('jojo_muted', muted ? '1' : '0'); }catch(e){}
}

/* ===== 輸入 ===== */
const keys = {};
addEventListener('keydown', e => {
  initAudio();
  const c = e.code;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(c)) e.preventDefault();
  keys[c] = true;
  if(e.repeat) return;
  if(c === 'KeyM'){ toggleMute(); return; }
  if(stateName === 'title' && (c === 'Enter' || c === 'Space')) startGame('normal');
  else if(stateName === 'over' && (c === 'Enter' || c === 'Space' || c === 'KeyR') && overT > 0.4) startGame(mode);
});
addEventListener('keyup', e => { keys[e.code] = false; });

function evPos(cx, cy){
  const r = canvas.getBoundingClientRect();
  return { x: (cx - r.left) / canvas._scale, y: (cy - r.top) / canvas._scale };
}
let uiButtons = [];
function inButton(p){
  for(const b of uiButtons){
    if(p.x >= b.x && p.x <= b.x + b.w && p.y >= b.y && p.y <= b.y + b.h) return b;
  }
  return null;
}
canvas.addEventListener('pointerdown', e => {
  initAudio();
  const p = evPos(e.clientX, e.clientY);
  const b = inButton(p);
  if(b){ sfx.ui(); b.cb(); return; }
  if(stateName === 'play') player.tx = clamp(p.x, 50, GAME_W - 50);
});
canvas.addEventListener('mousemove', e => {
  if(stateName !== 'play') return;
  const p = evPos(e.clientX, e.clientY);
  player.tx = clamp(p.x, 50, GAME_W - 50);
});
function handleTouches(e){
  e.preventDefault();
  initAudio();
  if(stateName !== 'play') return;
  for(const t of e.touches){
    const p = evPos(t.clientX, t.clientY);
    if(inButton(p)) continue;               // 別讓拖曳蓋到按鈕
    player.tx = clamp(p.x, 50, GAME_W - 50);
    break;
  }
}
for(const ev of ['touchstart','touchmove'])
  canvas.addEventListener(ev, handleTouches, { passive: false });

/* ===== 粒子與飄字（swap-pop 回收，零過濾配置）===== */
let parts = [];
const partPool = [];
const floaters = [];
function pushPart(x, y, vx, vy, life, color){
  const p = partPool.pop() || {};
  p.x = x; p.y = y; p.vx = vx; p.vy = vy;
  p.life = life; p.max = life; p.color = color;
  parts.push(p);
}
function burst(x, y, color, n = 12, speed = 240, life = 0.5){
  for(let i = 0; i < n; i++){
    if(parts.length > 300) return;
    const a = Math.random() * Math.PI * 2;
    const s = speed * (0.3 + Math.random() * 0.7);
    pushPart(x, y, Math.cos(a) * s, Math.sin(a) * s - 60, life * (0.6 + Math.random() * 0.6), color);
  }
}
function updateParts(dt){
  for(let i = parts.length - 1; i >= 0; i--){
    const p = parts[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 650 * dt; p.life -= dt;
    if(p.life <= 0){                    // swap-pop：尾端交換移除
      parts[i] = parts[parts.length - 1];
      parts.pop();
      partPool.push(p);
    }
  }
}
function drawParts(){
  for(const p of parts){
    ctx.globalAlpha = clamp(p.life / p.max, 0, 1);
    ctx.fillStyle = p.color; ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
  }
  ctx.globalAlpha = 1;
}
function addFloater(x, y, txt, color, size = 22){
  floaters.push({ x, y, txt, color, size, t: 0 });
}
function updateFloaters(dt){
  for(const f of floaters) f.t += dt;
  for(let i = floaters.length - 1; i >= 0; i--) if(floaters[i].t > 0.85) floaters.splice(i, 1);
}
function drawFloaters(){
  for(const f of floaters){
    const k = f.t / 0.85;
    ctx.globalAlpha = 1 - k;
    ctx.font = 'bold ' + f.size + 'px ' + FONT;
    ctx.textAlign = 'center';
    ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(20,5,35,.85)';
    ctx.strokeText(f.txt, f.x, f.y - k * 48);
    ctx.fillStyle = f.color; ctx.fillText(f.txt, f.x, f.y - k * 48);
  }
  ctx.globalAlpha = 1;
}

/* ===== 全域狀態 ===== */
let stateName = 'title';
let stateT = 0, T = 0;
let shake = 0, freeze = 0;
let score = 0, scoreShow = 0, best = 0;
try{ best = parseInt(localStorage.getItem('jojo_best') || '0', 10) || 0; }catch(e){}
/* v4 困難模式「黃金狂潮」：達成單場 300 分（黃金體驗）後解鎖，獨立紀錄 */
let mode = 'normal';
let cleared = false;
try{ cleared = localStorage.getItem('jojo_cleared') === '1'; }catch(e){}
let bestHard = 0;
try{ bestHard = parseInt(localStorage.getItem('jojo_best_hard') || '0', 10) || 0; }catch(e){}
let lives = 3, lifeFlash = 0;
let combo = 0, comboFlash = 0;
let elapsed = 0, spawnTimer = 0;
let items = [];
let phase = 'ready', phaseT = 0;     // ready / go / dead
let overT = 0;
let newBest = false;
let fever = 0, feverT = 0, feverCount = 0;   // ORA ORA 時間
let rainT = 18, rainBanner = 0;              // 箭雨事件
let heartT = 12;                             // 補血愛心計時
/* 章節制難度曲線：像 JoJo 一樣一部比一部兇，保證 4 分鐘內自然收尾 */
let stage = 0, stageBanner = 0;
const STAGE_T = [0, 40, 85, 135, 190];
const STAGE_INFO = [
  ['第一部 幻影血脈', '暖身！前幾秒只有金箭'],
  ['第二部 戰鬥潮流', '箭速上升！'],
  ['第三部 星塵鬥士', '邪箭變多，小心！'],
  ['第四部 不滅鑽石', '箭雨更頻繁！'],
  ['第五部 黃金之風', '最終試煉，全力以赴！']
];
const TOUCH = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
const MAX_LVL = 5;
const PANTS = ['#3ddad7', '#5be8b0', '#f4c430', '#e8478b', '#b98cff'];
const PANTS_DARK = ['#1d8f8d', '#2fa06f', '#a87a0a', '#8a1f52', '#6b48b8'];

const player = { x: GAME_W / 2, tx: GAME_W / 2, lvl: 1, sx: 1, sy: 1, hurtT: 0, happyT: 0, starT: 0 };

function startGame(m){
  mode = (m === 'hard') ? 'hard' : 'normal';
  score = 0; scoreShow = 0; lives = 3; combo = 0;
  elapsed = 0; spawnTimer = 0; newBest = false;
  fever = 0; feverT = 0; feverCount = 0;
  rainT = 18; rainBanner = 0; heartT = 12;
  stage = 0; stageBanner = 0;
  items = []; parts = []; floaters.length = 0;
  player.x = player.tx = GAME_W / 2;
  player.lvl = 1; player.sx = player.sy = 1;
  player.hurtT = player.happyT = player.starT = 0;
  phase = 'ready'; phaseT = 0;
  stateName = 'play'; stateT = 0;
  sfx.ora();
}
function endGame(){
  if(mode === 'hard'){
    if(score > bestHard){ bestHard = score; newBest = true;
      try{ localStorage.setItem('jojo_best_hard', String(bestHard)); }catch(e){}
    }
  }else{
    if(score > best){ best = score; newBest = true;
      try{ localStorage.setItem('jojo_best', String(best)); }catch(e){}
    }
  }
  /* 達成黃金體驗 → 解鎖困難模式 */
  if(score >= 300 && !cleared){
    cleared = true;
    try{ localStorage.setItem('jojo_cleared', '1'); }catch(e){}
  }
  stateName = 'over'; stateT = 0; overT = 0;
  sfx.lose();
}
function toTitle(){
  stateName = 'title'; stateT = 0;
  items = []; parts = []; floaters.length = 0;
  player.lvl = 2; player.hurtT = 0;
}

/* ===== 生成與難度曲線 ===== */
function spawnItem(){
  const t = elapsed;
  const hard = mode === 'hard';
  const roll = Math.random();
  const jojoChance = player.lvl < MAX_LVL ? 0.07 : 0.035;
  /* 安全學習期：普通 8 秒、困難 2.5 秒；之後邪箭比例隨時間緩升（困難更兇） */
  const safe = hard ? 2.5 : 8;
  const badChance = t < safe ? 0 : Math.min(hard ? 0.5 : 0.36, (hard ? 0.20 : 0.10) + t * (hard ? 0.004 : 0.0028));
  let type = 'gold';
  if(roll < jojoChance) type = 'jojo';
  else if(roll < jojoChance + badChance) type = 'bad';
  if(feverT > 0) type = 'gold';   // ORA ORA 時間：全是金箭！
  items.push({
    x: 40 + Math.random() * (GAME_W - 80),
    y: -30,
    vy: Math.min(hard ? 780 : 620, (hard ? 220 : 160) + t * (hard ? 4.9 : 3.8)) + Math.random() * 60,
    rot: (Math.random() - 0.5) * 0.6,
    vr: (Math.random() - 0.5) * 2.2,
    type, trailT: 0
  });
}
/* 箭雨事件：橫掃陣列（大多金箭、混入紫箭） */
function spawnRain(){
  const n = 9;
  const flip = Math.random() < 0.5;
  for(let i = 0; i < n; i++){
    const k = flip ? n - 1 - i : i;
    items.push({
      x: 40 + k * (GAME_W - 80) / (n - 1),
      y: -40 - i * 62,
      vy: 300,
      rot: 0, vr: (Math.random() - 0.5) * 1.5,
      type: (i === 3 || i === 6) && feverT <= 0 ? 'bad' : 'gold',
      trailT: 0
    });
  }
}

/* ===== 接住／漏接 ===== */
function addFever(n){
  if(feverT > 0) return;
  fever = Math.min(100, fever + n);
  if(fever >= 100){
    fever = 0; feverT = 6; feverCount++;
    freeze = Math.max(freeze, 0.1);
    shake = Math.max(shake, 10);
    addFloater(player.x, FEET_Y - 220, 'ORA ORA 時間！分數×2！', '#ffe08a', 30);
    for(let i = 0; i < 10; i++) burst(player.x, FEET_Y - 100, 'hsl(' + (i * 36) + ',85%,62%)', 3, 320, 0.6);
    sfx.fever();
  }
}
function catchItem(it){
  const growth = 1 + (player.lvl - 1) * 0.1;
  const mult = feverT > 0 ? 2 : 1;
  player.sx = 1.3; player.sy = 0.72;
  if(it.type === 'heart'){
    if(lives < 3){ lives++; addFloater(it.x, it.y - 12, '回復 1 顆心！', '#ff7ab0', 26); }
    else{ score += 30; addFloater(it.x, it.y - 12, '+30', '#ff7ab0', 22); }
    burst(it.x, it.y, '#ff7ab0', 14, 260, 0.55);
    lifeFlash = 1;
    sfx.heart();
  }else if(it.type === 'jojo'){
    freeze = 0.1; shake = 10;
    burst(it.x, it.y, '#fff', 14, 300, 0.6);
    for(let i = 0; i < 12; i++)
      burst(it.x, it.y, 'hsl(' + (i * 30) + ',85%,62%)', 2, 280, 0.55);
    if(player.lvl < MAX_LVL){
      player.lvl++;
      score += 30 * mult;
      addFloater(it.x, it.y - 12, '尻力覺醒！LV' + player.lvl, '#ffe08a', 26);
    }else{
      score += 50 * mult;
      addFloater(it.x, it.y - 12, '黃金精神！+' + 50 * mult, '#ffe08a', 26);
    }
    player.starT = 0.9;
    combo++;
    addFever(16);
    sfx.jojo();
  }else if(it.type === 'gold'){
    combo++;
    const gain = (10 + Math.min(40, (combo - 1) * 2)) * mult;
    score += gain;
    shake = Math.max(shake, 4);
    burst(it.x, it.y, '#f4c430', 10, 240, 0.45);
    burst(it.x, it.y, '#fff6e8', 4, 180, 0.35);
    addFloater(it.x, it.y - 8, '+' + gain, feverT > 0 ? '#fff' : '#ffe08a', 22);
    player.happyT = 0.5;
    comboFlash = 1;
    addFever(7);
    if(combo > 0 && combo % 10 === 0){
      addFloater(player.x, FEET_Y - 170 * growth, 'ORA ORA ORA！', '#e8478b', 30);
      sfx.jojo();
    }else sfx.catch();
  }else{
    loseLife(it.x, it.y, '好痛！');
    burst(it.x, it.y, '#b04ad0', 12, 260, 0.5);
  }
}
function loseLife(x, y, txt){
  lives--;
  combo = 0;
  lifeFlash = 1;
  freeze = Math.max(freeze, 0.08);
  shake = Math.max(shake, 9);
  player.hurtT = 0.6;
  addFloater(x, y - 10, txt, '#ff7ab0', 24);
  sfx.hurt();
  if(lives <= 0){
    phase = 'dead'; phaseT = 0;
    burst(player.x, FEET_Y - 90, '#e8478b', 26, 320, 0.7);
  }
}

/* ===== play 更新 ===== */
function playUpdate(dt){
  phaseT += dt;
  if(phase === 'ready' && phaseT > 0.9){ phase = 'go'; phaseT = 0; }
  if(phase === 'dead'){
    if(phaseT > 0.9) endGame();
  }else if(phase === 'go'){
    elapsed += dt;
    /* 章節推進（難度曲線可視化：字卡＋HUD 常駐顯示） */
    if(stage < STAGE_T.length - 1 && elapsed >= STAGE_T[stage + 1]){
      stage++;
      stageBanner = 2.2;
      shake = Math.max(shake, 6);
      sfx.rumble();
    }
    if(stageBanner > 0) stageBanner -= dt;
    /* ORA ORA 時間倒數 */
    if(feverT > 0){
      feverT -= dt;
      if(feverT <= 0){ feverT = 0; addFloater(player.x, FEET_Y - 200, '時間結束！', '#3ddad7', 22); }
    }
    /* 生成（間隔隨時間縮短；210 秒後終盤高壓，確保 4 分鐘內收尾；困難模式更密集） */
    const hard = mode === 'hard';
    spawnTimer -= dt;
    if(spawnTimer <= 0){
      spawnTimer = Math.max(hard ? 0.20 : (elapsed > 210 ? 0.24 : 0.30), (hard ? 0.95 : 1.15) - elapsed * (hard ? 0.009 : 0.0075))
                   * (feverT > 0 ? 0.55 : 1);
      spawnItem();
    }
    /* 箭雨事件：先預告再橫掃（後期章節更頻繁） */
    if(rainBanner > 0){
      rainBanner -= dt;
      if(rainBanner <= 0) spawnRain();
    }else{
      rainT -= dt;
      if(rainT <= 0 && feverT <= 0){
        rainT = (hard ? (stage >= 3 ? 8 : 12) : (stage >= 3 ? 12 : 20)) + Math.random() * (hard ? 4 : (stage >= 3 ? 5 : 8));
        rainBanner = 1.3;
        addFloater(GAME_W / 2, 250, 'ゴゴゴゴ… 箭雨來襲！', '#e8478b', 28);
        shake = Math.max(shake, 5);
        sfx.rumble();
      }
    }
    /* 缺血時偶爾掉補血愛心 */
    heartT -= dt;
    if(heartT <= 0){
      heartT = 16 + Math.random() * 8;
      if(lives < 3 && !items.some(i => i.type === 'heart')){
        items.push({ x: 60 + Math.random() * (GAME_W - 120), y: -30, vy: 150, rot: 0, vr: 0, type: 'heart', trailT: 0 });
      }
    }
  }
  /* 鍵盤移動 */
  const mv = (keys.ArrowRight || keys.KeyD ? 1 : 0) - (keys.ArrowLeft || keys.KeyA ? 1 : 0);
  if(mv) player.tx = clamp(player.tx + mv * 540 * dt, 50, GAME_W - 50);
  /* 位置緩動追隨 */
  player.x += (player.tx - player.x) * (1 - Math.pow(0.00004, dt));
  /* squash 回彈與計時器 */
  player.sx += (1 - player.sx) * 11 * dt;
  player.sy += (1 - player.sy) * 11 * dt;
  player.hurtT = Math.max(0, player.hurtT - dt);
  player.happyT = Math.max(0, player.happyT - dt);
  player.starT = Math.max(0, player.starT - dt);
  lifeFlash = Math.max(0, lifeFlash - dt * 2.4);
  comboFlash = Math.max(0, comboFlash - dt * 3);
  /* 物件 */
  const growth = 1 + (player.lvl - 1) * 0.1;
  const catchW = 58 * growth;
  for(let i = items.length - 1; i >= 0; i--){
    const it = items[i];
    it.y += it.vy * dt;
    it.rot += it.vr * dt;
    /* 拖尾 */
    it.trailT -= dt;
    if(it.trailT <= 0 && parts.length < 260){
      it.trailT = 0.06;
      const tc = it.type === 'jojo' ? 'hsl(' + ((T * 300) % 360) + ',85%,62%)'
        : it.type === 'heart' ? 'rgba(255,122,176,.7)'
        : it.type === 'gold' ? 'rgba(244,196,48,.7)' : 'rgba(150,60,190,.6)';
      pushPart(it.x + (Math.random() - 0.5) * 8, it.y - 14, 0, -30, 0.3, tc);
    }
    /* 接住判定（往玩家有利放寬） */
    if(phase !== 'dead' && it.y > FEET_Y - 130 && it.y < FEET_Y - 30 && Math.abs(it.x - player.x) < catchW){
      catchItem(it);
      items.splice(i, 1);
      continue;
    }
    /* 落地 */
    if(it.y > FEET_Y + 20){
      if(it.type === 'gold' && phase !== 'dead'){
        loseLife(it.x, FEET_Y, '漏接！');
        burst(it.x, FEET_Y, '#8a8a9a', 8, 160, 0.4);
      }else{
        burst(it.x, FEET_Y, 'rgba(120,90,150,.8)', 5, 120, 0.3);
        if(it.type === 'bad'){
          sfx.miss();
          /* 驚險閃避：紫箭貼身落地給獎勵 */
          if(phase !== 'dead' && Math.abs(it.x - player.x) < catchW + 46){
            score += 5;
            addFloater(it.x, FEET_Y - 24, '驚險閃避 +5', '#7ad9ff', 18);
          }
        }
      }
      items.splice(i, 1);
    }
  }
  /* 分數緩動 */
  scoreShow += (score - scoreShow) * (1 - Math.pow(0.02, dt));
}

/* ===== 背景（烘焙圖層合成＋輕量動態元素）===== */
function drawBG(){
  ctx.drawImage(skyC.c, 0, 0, GAME_W, GAME_H);
  /* 放射狀速度線（純路徑填色，緩慢旋轉） */
  ctx.save();
  ctx.translate(GAME_W / 2, 290);
  ctx.rotate(T * 0.05);
  ctx.fillStyle = 'rgba(244,196,48,.05)';
  for(let i = 0; i < 12; i++){
    const a0 = i * Math.PI / 6;
    ctx.beginPath(); ctx.moveTo(0, 0);
    ctx.arc(0, 0, 900, a0, a0 + Math.PI / 12);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
  /* 漂浮的ゴ（sprite 版；兩層視差：遠小慢、近大快） */
  for(let i = 0; i < 6; i++){
    const far = i % 2 === 0;
    const sp = far ? 14 : 26;
    const spr = far ? goFar : goNear;
    const gx = (i * 173 + 60 + Math.sin(T * 0.6 + i) * 14) % GAME_W;
    const gy = ((i * 219 + 700 - T * sp) % (GAME_H + 120) + GAME_H + 120) % (GAME_H + 120) - 60;
    ctx.save();
    ctx.translate(gx, gy);
    ctx.rotate(Math.sin(T * 0.8 + i * 2) * 0.2);
    ctx.drawImage(spr.c, -spr.w / 2, -spr.h / 2, spr.w, spr.h);
    ctx.restore();
  }
  /* 城市剪影（烘焙長條，兩層緩慢視差） */
  drawSkyline(sky1, T * 3, FEET_Y + 26);
  drawSkyline(sky2, T * 7, FEET_Y + 34);
  /* 舞臺地板（烘焙） */
  ctx.drawImage(floorC.c, 0, FEET_Y + 8, GAME_W, 92);
  /* 地板菱格 */
  ctx.fillStyle = 'rgba(244,196,48,.07)';
  for(let i = 0; i < 9; i++){
    const dx = i * 68 + ((T * 10) % 68);
    ctx.beginPath();
    ctx.moveTo(dx, FEET_Y + 30); ctx.lineTo(dx + 20, FEET_Y + 48);
    ctx.lineTo(dx, FEET_Y + 66); ctx.lineTo(dx - 20, FEET_Y + 48);
    ctx.closePath(); ctx.fill();
  }
}
function drawSkyline(layer, off, baseY){
  const p = 700;
  const sx = ((off % p) + p) % p;
  ctx.drawImage(layer.c, -sx - 80, baseY - layer.h, layer.w, layer.h);
  ctx.drawImage(layer.c, -sx - 80 + p, baseY - layer.h, layer.w, layer.h);
}

/* ===== 物件繪製 ===== */
function drawItem(it){
  if(it.type === 'jojo') drawJojoStar(it);
  else if(it.type === 'heart') drawHeartItem(it);
  else drawArrow(it, it.type === 'gold');
}
function drawHeartItem(it){
  const pulse = 1 + Math.sin(T * 8) * 0.12;
  const w = heartSpr.w * pulse, h = heartSpr.h * pulse;
  ctx.drawImage(heartSpr.c, it.x - w / 2, it.y - h / 2, w, h);
}
function drawArrow(it, good){
  const spr = good ? arrowGoldSpr : arrowBadSpr;
  ctx.save();
  ctx.translate(it.x, it.y);
  ctx.rotate(it.rot);
  ctx.drawImage(spr.c, -36, -40, spr.w, spr.h);
  ctx.restore();
}
function drawJojoStar(it){
  const spr = jojoSpr[Math.floor(((T * 240) % 360) / (360 / JOJO_FR)) % JOJO_FR];
  const pulse = 1 + Math.sin(T * 9) * 0.1;
  ctx.save();
  ctx.translate(it.x, it.y);
  ctx.rotate(it.rot + T * 2.5);
  ctx.scale(pulse, pulse);
  ctx.drawImage(spr.c, -48, -48, 96, 96);
  ctx.restore();
}

/* ===== 主角（彎腰翹臀的鍛鍊者）===== */
function drawPlayer(demo){
  const p = player;
  const growth = 1 + (p.lvl - 1) * 0.1;
  const bob = Math.sin(T * 3.2) * 2.5;
  const OUT = '#3a1030';
  /* 地面陰影＋聚光燈 */
  ctx.fillStyle = 'rgba(244,196,48,.06)';
  ctx.beginPath(); ctx.ellipse(p.x, FEET_Y + 12, 95 * growth, 18, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,.35)';
  ctx.beginPath(); ctx.ellipse(p.x, FEET_Y + 10, 58 * growth, 10, 0, 0, Math.PI * 2); ctx.fill();
  ctx.save();
  ctx.translate(p.x, FEET_Y);
  /* 覺醒光環（烘焙光暈 sprite，透明度即時調） */
  if(p.lvl > 1){
    const auraR = (86 + p.starT * 40) * growth + Math.sin(T * 5) * 5;
    const spr = auraSpr[p.lvl - 2];
    ctx.globalAlpha = clamp(0.24 + p.starT * 0.35, 0, 1);
    ctx.drawImage(spr.c, -auraR, -80 * growth - auraR, auraR * 2, auraR * 2);
    ctx.globalAlpha = 1;
  }
  ctx.scale(p.sx, p.sy);       // 錨點在腳底的 squash & stretch
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  if(p.hurtT > 0.35){ try{ ctx.filter = 'brightness(1.9)'; }catch(e){} }
  /* 鞋（帥氣厚底靴） */
  rr(-46, -14, 26, 14, 5); fill2('#2a1440', OUT, 2);
  rr(20, -14, 26, 14, 5); fill2('#2a1440', OUT, 2);
  ctx.fillStyle = '#e8478b'; ctx.fillRect(-46, -6, 26, 3); ctx.fillRect(20, -6, 26, 3);
  /* 小腿（膝蓋微彎的健壯腿；快取漸層） */
  rr(-40, -62 - bob * 0.3, 18, 52, 8);
  ctx.fillStyle = LEG_G; ctx.fill();
  ctx.strokeStyle = OUT; ctx.lineWidth = 2.5; ctx.stroke();
  rr(22, -62 - bob * 0.3, 18, 52, 8);
  ctx.fillStyle = LEG_G; ctx.fill();
  ctx.strokeStyle = OUT; ctx.lineWidth = 2.5; ctx.stroke();
  /* 手臂（從後方抓住腳踝，穩住彎腰姿勢） */
  ctx.strokeStyle = OUT; ctx.lineWidth = 11;
  ctx.beginPath(); ctx.moveTo(-52, -74 - bob); ctx.quadraticCurveTo(-58, -40, -50, -16); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(52, -74 - bob); ctx.quadraticCurveTo(58, -40, 50, -16); ctx.stroke();
  ctx.strokeStyle = '#e8a87c'; ctx.lineWidth = 7;
  ctx.beginPath(); ctx.moveTo(-52, -74 - bob); ctx.quadraticCurveTo(-58, -40, -50, -16); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(52, -74 - bob); ctx.quadraticCurveTo(58, -40, 50, -16); ctx.stroke();
  ctx.beginPath(); ctx.arc(-50, -14, 5.5, 0, Math.PI * 2); fill2('#e8a87c', OUT, 2);
  ctx.beginPath(); ctx.arc(50, -14, 5.5, 0, Math.PI * 2); fill2('#e8a87c', OUT, 2);
  /* 屁股（雙球面漸層＋縫線＋亮面；漸層按 LV 快取） */
  const cy = -88 * growth - bob;
  const rx = 27 * growth, ry = 33 * growth;
  const cgs = getCheekGrads(p.lvl);
  ctx.save();
  ctx.translate(0, cy);
  for(const side of [-1, 1]){
    ctx.beginPath(); ctx.ellipse(side * 20 * growth, 0, rx, ry, 0, 0, Math.PI * 2);
    ctx.fillStyle = cgs[side === -1 ? 0 : 1]; ctx.fill();
    ctx.strokeStyle = OUT; ctx.lineWidth = 3; ctx.stroke();
  }
  ctx.restore();
  /* 中央縫線 */
  ctx.strokeStyle = 'rgba(0,0,0,.3)'; ctx.lineWidth = 3.5;
  ctx.beginPath(); ctx.moveTo(0, cy - ry + 6); ctx.quadraticCurveTo(0, cy, 0, cy + ry - 4); ctx.stroke();
  /* 褲頭金腰帶 */
  const beltY = cy - ry + 2;
  rr(-rx - 20 * growth + rx, beltY - 5, 40 * growth + rx * 0.6, 9, 4);
  ctx.beginPath();
  ctx.moveTo(-42 * growth, beltY); ctx.lineTo(42 * growth, beltY);
  ctx.strokeStyle = '#f4c430'; ctx.lineWidth = 6; ctx.stroke();
  ctx.strokeStyle = '#a87a0a'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-42 * growth, beltY + 3); ctx.lineTo(42 * growth, beltY + 3); ctx.stroke();
  ctx.beginPath(); ctx.arc(0, beltY, 5, 0, Math.PI * 2); fill2('#ffe08a', '#a87a0a', 2);
  /* 亮面反光 */
  ctx.fillStyle = 'rgba(255,255,255,.22)';
  ctx.beginPath(); ctx.ellipse(-28 * growth, cy - 10, 9, 15, -0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(13 * growth, cy - 10, 9, 15, -0.3, 0, Math.PI * 2); ctx.fill();
  /* 星星印記（LV3+） */
  if(p.lvl >= 3){
    ctx.font = 'bold ' + Math.round(13 * growth) + 'px ' + FONT;
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(0,0,0,.4)';
    ctx.fillText('★'.repeat(Math.min(3, p.lvl - 2)), 0, cy + ry - 10);
  }
  /* 頭（從雙腿間倒著探出來；快取漸層） */
  const hy = -26 - bob * 0.5;
  ctx.save();
  ctx.translate(0, hy);
  ctx.beginPath(); ctx.arc(0, 0, 13.5, 0, Math.PI * 2);
  ctx.fillStyle = HEAD_G; ctx.fill();
  ctx.strokeStyle = OUT; ctx.lineWidth = 2.5; ctx.stroke();
  /* 倒垂的瀏海 */
  ctx.beginPath(); ctx.arc(0, 6, 12.5, 0.15 * Math.PI, 0.85 * Math.PI);
  fill2('#2a1440', OUT, 2);
  ctx.restore();
  drawFace(hy, demo);
  try{ ctx.filter = 'none'; }catch(e){}
  ctx.restore();
}
function drawFace(hy, demo){
  const p = player;
  ctx.lineCap = 'round';
  if(stateName === 'over' || (phase === 'dead' && !demo)){
    /* 昏倒 XX 眼 */
    ctx.strokeStyle = '#5c2a1a'; ctx.lineWidth = 2;
    for(const ex of [-5, 5]){
      ctx.beginPath();
      ctx.moveTo(ex - 2.5, hy - 6); ctx.lineTo(ex + 2.5, hy - 1);
      ctx.moveTo(ex + 2.5, hy - 6); ctx.lineTo(ex - 2.5, hy - 1);
      ctx.stroke();
    }
    return;
  }
  if(p.hurtT > 0){
    ctx.strokeStyle = '#5c2a1a'; ctx.lineWidth = 2;
    for(const ex of [-5, 5]){
      ctx.beginPath();
      ctx.moveTo(ex - 2.5, hy - 2); ctx.lineTo(ex, hy - 5); ctx.lineTo(ex + 2.5, hy - 2);
      ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(0, hy - 9, 2.5, 0, Math.PI); ctx.stroke();
    /* 汗滴 */
    ctx.fillStyle = '#7ad9ff';
    ctx.beginPath(); ctx.ellipse(10, hy - 12, 2, 3, 0.3, 0, Math.PI * 2); ctx.fill();
    return;
  }
  if(p.starT > 0){
    /* 覺醒星星眼 */
    ctx.fillStyle = '#ffcf4d';
    ctx.font = 'bold 9px ' + FONT; ctx.textAlign = 'center';
    ctx.fillText('★', -5, hy - 1); ctx.fillText('★', 5, hy - 1);
    ctx.fillStyle = '#6b2417';
    ctx.beginPath(); ctx.ellipse(0, hy - 9, 3, 3.5, 0, 0, Math.PI * 2); ctx.fill();
    return;
  }
  if(p.happyT > 0){
    /* 開心 ^^ 眼＋笑口（臉是倒的，嘴在上方） */
    ctx.strokeStyle = '#5c2a1a'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(-5, hy - 3, 3, Math.PI, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(5, hy - 3, 3, Math.PI, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = '#6b2417';
    ctx.beginPath(); ctx.arc(0, hy - 9, 3, 0, Math.PI * 2); ctx.fill();
    return;
  }
  /* 平常：圓眼＋自信笑（眨眼） */
  const blink = (T % 3.1) < 0.12;
  if(blink){
    ctx.strokeStyle = '#5c2a1a'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-8, hy - 4); ctx.lineTo(-2, hy - 4);
    ctx.moveTo(2, hy - 4); ctx.lineTo(8, hy - 4); ctx.stroke();
  }else{
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-5, hy - 4, 3.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(5, hy - 4, 3.2, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#3a1030'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(-5, hy - 4, 3.2, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(5, hy - 4, 3.2, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = '#201530';
    ctx.beginPath(); ctx.arc(-5, hy - 4.8, 1.7, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(5, hy - 4.8, 1.7, 0, Math.PI * 2); ctx.fill();
  }
  ctx.strokeStyle = '#8a4a3a'; ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.arc(0, hy - 8, 3.5, 1.15 * Math.PI, 1.85 * Math.PI); ctx.stroke();
}

/* ===== HUD ===== */
function drawHeart(x, y, s, on){
  ctx.save();
  ctx.translate(x, y);
  if(on && lifeFlash > 0) ctx.scale(1 + lifeFlash * 0.25, 1 + lifeFlash * 0.25);
  ctx.beginPath();
  ctx.moveTo(0, s * 0.35);
  ctx.bezierCurveTo(-s, -s * 0.4, -s * 0.5, -s, 0, -s * 0.35);
  ctx.bezierCurveTo(s * 0.5, -s, s, -s * 0.4, 0, s * 0.35);
  ctx.closePath();
  if(on) ctx.fillStyle = HEART_G_ON;      // 快取漸層（HUD 固定 s=12）
  else ctx.fillStyle = 'rgba(255,255,255,.14)';
  ctx.fill();
  ctx.strokeStyle = on ? '#8a1f52' : 'rgba(255,255,255,.25)';
  ctx.lineWidth = 2; ctx.stroke();
  if(on){
    ctx.fillStyle = 'rgba(255,255,255,.5)';
    ctx.beginPath(); ctx.arc(-s * 0.35, -s * 0.35, s * 0.18, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}
function drawButton(x, y, w, h, label, cb, primary){
  uiButtons.push({ x, y, w, h, cb });
  const pulse = primary ? 1 + Math.sin(T * 3.4) * 0.02 : 1;
  ctx.save();
  ctx.translate(x + w / 2, y + h / 2);
  ctx.scale(pulse, pulse);
  rr(-w / 2, -h / 2, w, h, h / 2);
  ctx.fillStyle = primary ? '#e8478b' : 'rgba(255,255,255,.12)';
  ctx.fill();
  ctx.strokeStyle = '#f4c430'; ctx.lineWidth = 2.5; ctx.stroke();
  ctx.fillStyle = primary ? '#fff' : '#ffe9c4';
  ctx.font = 'bold ' + Math.round(h * 0.42) + 'px ' + FONT;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, 0, 2);
  ctx.restore();
  ctx.textBaseline = 'alphabetic';
}
function drawMuteBtn(){
  /* SVG 式手繪喇叭圖示（UI 不用表情符號）；48×48 觸控目標＋M 鍵 */
  const bx = GAME_W - 58, by = 6, bs = 48;
  uiButtons.push({ x: bx, y: by, w: bs, h: bs, cb: toggleMute });
  rr(bx, by, bs, bs, 12);
  ctx.fillStyle = 'rgba(20,5,35,.7)'; ctx.fill();
  ctx.strokeStyle = muted ? 'rgba(255,255,255,.4)' : '#f4c430';
  ctx.lineWidth = 2; ctx.stroke();
  const cx = bx + bs / 2 - 4, cy = by + bs / 2;
  ctx.beginPath();
  ctx.moveTo(cx - 9, cy - 5); ctx.lineTo(cx - 3, cy - 5); ctx.lineTo(cx + 4, cy - 11);
  ctx.lineTo(cx + 4, cy + 11); ctx.lineTo(cx - 3, cy + 5); ctx.lineTo(cx - 9, cy + 5);
  ctx.closePath();
  ctx.fillStyle = muted ? 'rgba(255,255,255,.55)' : '#ffe9c4'; ctx.fill();
  ctx.lineCap = 'round';
  if(muted){
    ctx.strokeStyle = '#ff5a5a'; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(cx + 8, cy - 6); ctx.lineTo(cx + 16, cy + 6);
    ctx.moveTo(cx + 16, cy - 6); ctx.lineTo(cx + 8, cy + 6);
    ctx.stroke();
  }else{
    ctx.strokeStyle = '#ffe9c4'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(cx + 6, cy, 6, -0.6, 0.6); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx + 6, cy, 11, -0.6, 0.6); ctx.stroke();
  }
}
function drawHUD(){
  /* 生命 */
  for(let i = 0; i < 3; i++) drawHeart(28 + i * 32, 28, 12, i < lives);
  /* 分數面板（斜切風格） */
  ctx.save();
  ctx.translate(GAME_W - 78, 76);
  ctx.transform(1, 0, -0.1, 1, 0, 0);
  rr(-92, -20, 170, 40, 8);
  ctx.fillStyle = 'rgba(42,20,64,.85)'; ctx.fill();
  ctx.strokeStyle = '#f4c430'; ctx.lineWidth = 2; ctx.stroke();
  ctx.textAlign = 'right';
  ctx.font = 'bold 13px ' + FONT_HUD;
  ctx.fillStyle = '#3ddad7'; ctx.fillText('SCORE', 62, -4);
  ctx.font = 'bold 22px ' + FONT_HUD;
  ctx.fillStyle = '#ffe08a'; ctx.fillText(String(Math.round(scoreShow)), 62, 14);
  ctx.restore();
  /* 尻力等級 */
  ctx.save();
  ctx.translate(60, 76);
  const lp = 1 + player.starT * 0.25;
  ctx.scale(lp, lp);
  rr(-44, -20, 88, 40, 8);
  ctx.fillStyle = 'rgba(42,20,64,.85)'; ctx.fill();
  ctx.strokeStyle = '#3ddad7'; ctx.lineWidth = 2; ctx.stroke();
  ctx.textAlign = 'center';
  ctx.font = 'bold 12px ' + FONT_HUD;
  ctx.fillStyle = '#3ddad7'; ctx.fillText('尻力', 0, -4);
  ctx.font = 'bold 19px ' + FONT_HUD;
  ctx.fillStyle = '#fff'; ctx.fillText('LV ' + player.lvl, 0, 14);
  ctx.restore();
  /* 連擊 */
  if(combo >= 3){
    ctx.font = 'bold ' + Math.round(22 + comboFlash * 8) + 'px ' + FONT;
    ctx.textAlign = 'center';
    ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(20,5,35,.85)';
    ctx.strokeText('連擊 ×' + combo, GAME_W / 2, 60);
    ctx.fillStyle = '#e8478b';
    ctx.fillText('連擊 ×' + combo, GAME_W / 2, 60);
  }
  /* ORA 量表（滿了觸發 ORA ORA 時間） */
  const fw = 190, fx = GAME_W / 2 - fw / 2, fy = 84;
  rr(fx, fy, fw, 12, 6);
  ctx.fillStyle = 'rgba(20,5,35,.7)'; ctx.fill();
  if(feverT > 0){
    ctx.fillStyle = 'hsl(' + ((T * 400) % 360) + ',90%,60%)';
    rr(fx, fy, fw * clamp(feverT / 6, 0, 1), 12, 6); ctx.fill();
  }else{
    ctx.fillStyle = FEVER_G;   // 快取漸層（座標固定 175→365）
    if(fever > 0){ rr(fx, fy, Math.max(10, fw * fever / 100), 12, 6); ctx.fill(); }
  }
  rr(fx, fy, fw, 12, 6);
  ctx.strokeStyle = feverT > 0 ? '#fff' : 'rgba(255,255,255,.5)'; ctx.lineWidth = 2; ctx.stroke();
  ctx.font = 'bold 12px ' + FONT;
  ctx.textAlign = 'center';
  ctx.fillStyle = feverT > 0 ? '#ffe08a' : 'rgba(255,255,255,.75)';
  ctx.fillText(feverT > 0 ? 'ORA ORA 時間×2！' : 'ORA 量表（滿了進入狂熱）', GAME_W / 2, fy + 28);
  /* 章節常駐標示（難度曲線可視化） */
  ctx.font = 'bold 13px ' + FONT;
  ctx.textAlign = 'center';
  ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(20,5,35,.8)';
  ctx.strokeText(STAGE_INFO[stage][0], GAME_W / 2, 32);
  ctx.fillStyle = '#ffe08a';
  ctx.fillText(STAGE_INFO[stage][0], GAME_W / 2, 32);
  /* 困難模式徽章 */
  if(mode === 'hard'){
    rr(8, 46, 62, 20, 6);
    ctx.fillStyle = 'rgba(180,30,60,.88)'; ctx.fill();
    ctx.strokeStyle = '#ff6a8a'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.font = 'bold 12px ' + FONT_HUD;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff'; ctx.fillText('困難模式', 39, 57);
    ctx.textBaseline = 'alphabetic';
  }
}
function bigText(txt, y, size, color, scaleK, skew){
  ctx.save();
  ctx.translate(GAME_W / 2, y);
  ctx.scale(scaleK, scaleK);
  if(skew) ctx.transform(1, 0, -0.12, 1, 0, 0);
  ctx.font = 'bold ' + size + 'px ' + FONT;
  ctx.textAlign = 'center';
  ctx.lineWidth = 8; ctx.strokeStyle = '#8a1f52';
  ctx.strokeText(txt, 0, 0);
  ctx.fillStyle = color; ctx.fillText(txt, 0, 0);
  ctx.restore();
}

/* ===== 各狀態繪製 ===== */
function drawWorld(){
  ctx.save();
  ctx.translate((Math.random() * 2 - 1) * shake, (Math.random() * 2 - 1) * shake);
  drawBG();
  for(const it of items) drawItem(it);
  drawPlayer(stateName !== 'play');
  drawParts();
  drawFloaters();
  ctx.restore();
}
function titleDraw(){
  drawWorld();
  ctx.fillStyle = 'rgba(10,4,20,.5)';
  ctx.fillRect(0, 0, GAME_W, GAME_H);
  const k = easeOutBack(Math.min(1, stateT / 0.8));
  bigText('尻でジョジョを', lerp(-40, 130, k), 44, '#f4c430', 1, true);
  bigText('キャッチ！', lerp(-40, 182, k), 44, '#f4c430', 1, true);
  ctx.font = 'bold 24px ' + FONT;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#3ddad7';
  ctx.fillText('— 屁股接JoJo —', GAME_W / 2, 228);
  ctx.font = '16px ' + FONT;
  ctx.fillStyle = '#fff6e8';
  ctx.fillText('接金箭＝得分，虹色 JOJO 星＝尻力覺醒', GAME_W / 2, 292);
  ctx.fillText('紫色邪箭＝扣心，漏接金箭也扣心（共 3 顆）', GAME_W / 2, 316);
  ctx.fillText('接滿 ORA 量表 → ORA ORA 時間，分數×2！', GAME_W / 2, 340);
  /* v4 困難模式解鎖公告 */
  ctx.font = 'bold 15px ' + FONT;
  ctx.fillStyle = cleared ? '#f4c430' : 'rgba(255,246,232,.7)';
  ctx.fillText(cleared ? '★ 困難模式「黃金狂潮」已解鎖！' : '單場達成黃金體驗（300 分）解鎖困難模式', GAME_W / 2, 366);
  if(stateT > 0.35){
    if(cleared){
      drawButton(GAME_W / 2 - 158, 384, 150, 52, '普通開始', () => startGame('normal'), true);
      drawButton(GAME_W / 2 + 8, 384, 150, 52, '困難模式', () => startGame('hard'), false);
    }else{
      drawButton(GAME_W / 2 - 110, 384, 220, 52, '開始', () => startGame('normal'), true);
    }
  }
  /* 操作說明：電腦／平板＋困難模式提示（手繪裝置圖示） */
  rr(GAME_W / 2 - 215, 458, 430, 86, 10);
  ctx.fillStyle = 'rgba(20,5,35,.6)'; ctx.fill();
  ctx.strokeStyle = 'rgba(244,196,48,.55)'; ctx.lineWidth = 1.5; ctx.stroke();
  drawMonitorIcon(GAME_W / 2 - 191, 479);
  drawTabletIcon(GAME_W / 2 - 191, 505);
  ctx.font = 'bold 15px ' + FONT;
  ctx.textAlign = 'left';
  ctx.fillStyle = '#ffe9c4';
  ctx.fillText('電腦：← → 或 A D 移動，也可用滑鼠', GAME_W / 2 - 173, 484);
  ctx.fillText('平板：手指左右拖曳（按 M 或右上鈕靜音）', GAME_W / 2 - 173, 510);
  ctx.fillStyle = '#ff9ab5';
  ctx.font = '14px ' + FONT;
  ctx.fillText('困難模式：邪箭又快又多、箭雨更兇，分數獨立紀錄！', GAME_W / 2 - 191, 534);
  ctx.textAlign = 'center';
  const showBest = best > 0 || bestHard > 0;
  if(showBest){
    ctx.font = '14px ' + FONT;
    ctx.fillStyle = '#ffe08a';
    ctx.fillText('最佳：普通 ' + best + (cleared ? ' · 困難 ' + bestHard : ''), GAME_W / 2, 564);
  }
  drawMuteBtn();
}
function drawMonitorIcon(x, y){
  ctx.strokeStyle = '#3ddad7'; ctx.lineWidth = 2; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  rr(x - 11, y - 9, 22, 14, 2); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x, y + 5); ctx.lineTo(x, y + 8);
  ctx.moveTo(x - 6, y + 9); ctx.lineTo(x + 6, y + 9);
  ctx.stroke();
}
function drawTabletIcon(x, y){
  ctx.strokeStyle = '#3ddad7'; ctx.lineWidth = 2; ctx.lineJoin = 'round';
  rr(x - 8, y - 10, 16, 21, 3); ctx.stroke();
  ctx.fillStyle = '#3ddad7';
  ctx.beginPath(); ctx.arc(x, y + 7, 1.6, 0, Math.PI * 2); ctx.fill();
}
function playDraw(){
  drawWorld();
  /* ORA ORA 時間：金色氛圍 */
  if(feverT > 0){
    ctx.fillStyle = 'rgba(244,196,48,' + (0.07 + Math.sin(T * 10) * 0.03) + ')';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
  }
  drawHUD();
  if(phase === 'ready'){
    bigText('準備…', 300, 46, '#3ddad7', easeOutBack(Math.min(1, phaseT / 0.4)), false);
  }else if(phase === 'go' && phaseT < 0.5 && elapsed < 2){
    ctx.globalAlpha = 1 - phaseT / 0.5;
    bigText('GO！', 300, 56, '#f4c430', 1 + phaseT, true);
    ctx.globalAlpha = 1;
  }
  /* 章節字卡（進入新的一部） */
  if(stageBanner > 0 && stage > 0 && phase === 'go'){
    const kIn = easeOutBack(clamp((2.2 - stageBanner) / 0.4, 0, 1));
    ctx.globalAlpha = clamp(stageBanner / 0.4, 0, 1);
    bigText(STAGE_INFO[stage][0], 250, 38, '#f4c430', kIn, true);
    ctx.font = 'bold 18px ' + FONT;
    ctx.textAlign = 'center';
    ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(20,5,35,.85)';
    ctx.strokeText(STAGE_INFO[stage][1], GAME_W / 2, 286);
    ctx.fillStyle = '#3ddad7';
    ctx.fillText(STAGE_INFO[stage][1], GAME_W / 2, 286);
    ctx.globalAlpha = 1;
  }
  /* 開場操作提示 */
  if(elapsed < 4 && phase !== 'dead'){
    ctx.globalAlpha = elapsed > 3 ? 4 - elapsed : 1;
    ctx.font = 'bold 18px ' + FONT;
    ctx.textAlign = 'center';
    ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(20,5,35,.85)';
    const hint = TOUCH ? '手指在畫面上左右拖曳，移動屁股接金箭！' : '← → 鍵或滑鼠左右移動，接住金箭！';
    ctx.strokeText(hint, GAME_W / 2, 340);
    ctx.fillStyle = '#fff';
    ctx.fillText(hint, GAME_W / 2, 340);
    ctx.font = 'bold 14px ' + FONT;
    ctx.lineWidth = 3;
    ctx.strokeText('開頭是安全練習時間，只會掉金箭', GAME_W / 2, 366);
    ctx.fillStyle = '#3ddad7';
    ctx.fillText('開頭是安全練習時間，只會掉金箭', GAME_W / 2, 366);
    ctx.globalAlpha = 1;
  }
  drawMuteBtn();
}
function overDraw(){
  drawWorld();
  const a = Math.min(0.62, overT * 1.4);
  ctx.fillStyle = 'rgba(10,4,20,' + a + ')';
  ctx.fillRect(0, 0, GAME_W, GAME_H);
  const k = easeOutBack(Math.min(1, overT / 0.55));
  ctx.save();
  ctx.translate(GAME_W / 2, GAME_H / 2 - 40);
  ctx.scale(k, k);
  rr(-210, -150, 420, 300, 18);
  ctx.fillStyle = 'rgba(42,20,64,.95)'; ctx.fill();
  ctx.strokeStyle = '#f4c430'; ctx.lineWidth = 3; ctx.stroke();
  ctx.textAlign = 'center';
  const shownBest = mode === 'hard' ? bestHard : best;
  ctx.font = 'bold 34px ' + FONT;
  ctx.fillStyle = '#f4c430';
  ctx.fillText(score >= 300 ? '黃金體驗！' : '挑戰結束！', 0, -96);
  ctx.font = '16px ' + FONT;
  ctx.fillStyle = 'rgba(255,246,232,.75)';
  ctx.fillText((mode === 'hard' ? '困難模式 · ' : '') + (score >= 300 ? '「GOLD EXPERIENCE！」' : '「やれやれだぜ…」'), 0, -62);
  ctx.font = 'bold 30px ' + FONT;
  ctx.fillStyle = '#ffe08a';
  ctx.fillText('分數　' + score, 0, -8);
  ctx.font = '18px ' + FONT;
  ctx.fillStyle = newBest ? '#3ddad7' : 'rgba(255,255,255,.7)';
  ctx.fillText(newBest ? '新紀錄！' : '最佳紀錄　' + shownBest, 0, 28);
  ctx.font = '16px ' + FONT;
  ctx.fillStyle = 'rgba(255,255,255,.65)';
  ctx.fillText('尻力最終等級 LV ' + player.lvl + ' · ORA ORA 時間 ×' + feverCount, 0, 58);
  ctx.fillText('存活 ' + Math.round(elapsed) + ' 秒 · 到達 ' + STAGE_INFO[stage][0], 0, 84);
  if(mode === 'normal' && score >= 300){
    ctx.font = 'bold 15px ' + FONT;
    ctx.fillStyle = '#3ddad7';
    ctx.fillText('★ 困難模式已解鎖！回主選單挑戰', 0, 114);
  }
  ctx.restore();
  if(overT > 0.3){
    drawButton(GAME_W / 2 - 110, GAME_H / 2 + 130, 220, 54, '再玩一次', () => startGame(mode), true);
    drawButton(GAME_W / 2 - 80, GAME_H / 2 + 194, 160, 48, '回主選單', toTitle, false);
  }
  drawMuteBtn();
}

/* 測試掛鉤（自動化冒煙測試用，不影響遊戲） */
window.__smoke = () => ({ scene: stateName, mode, x: player.x, tx: player.tx, lives, score, fever, feverT, elapsed, stage, lvl: player.lvl, cleared, bestHard, items: items.length, overT });
window.__startMode = m => startGame(m); // 測試專用：直接進入指定模式
window.__test = { hit(){ if(stateName === 'play') loseLife(player.x, 300, '測試'); } };

/* ===== 主迴圈：固定時間步進 60Hz ===== */
const STEP = 1 / 60;
let last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while(acc >= STEP){
    acc -= STEP;
    T += STEP;
    stateT += STEP;
    if(freeze > 0){ freeze -= STEP; continue; }   // hit-stop
    shake *= Math.pow(0.001, STEP);
    if(stateName === 'play') playUpdate(STEP);
    else if(stateName === 'over') overT += STEP;
    updateParts(STEP);
    updateFloaters(STEP);
  }
  uiButtons = [];
  if(stateName === 'title') titleDraw();
  else if(stateName === 'play') playDraw();
  else overDraw();
}
requestAnimationFrame(frame);
