<title>史蒂夫 vs 凋零王</title>
<style>
  html, body {
    margin: 0; height: 100%; background: #1a1c2c; overflow: hidden;
    touch-action: none; -webkit-user-select: none; user-select: none;
    font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
  }
  canvas { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
'use strict';
/* ============================================================
   史蒂夫大戰凋零王 — 專業AI升級版
   即時動作 Boss 戰：移動、跳躍、鑽石劍連斬、舉盾格擋，
   閃避頭骨彈與俯衝，打倒 300 HP 的凋零王！
   體素立體渲染（面向陰影）＋固定時間步進＋狀態機＋全套手感
   ============================================================ */
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize() {
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = GAME_W * scale * dpr; canvas.height = GAME_H * scale * dpr;
  canvas.style.width = GAME_W * scale + 'px'; canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', resize); resize();

// ---------- 調色盤（晴空冒險 / Minecraft 風）----------
const PAL = {
  skyTop: '#5c94fc', skyBot: '#b8e0ff', grass: '#6ab84f', grassDark: '#4a7a35',
  dirt: '#8a5a3c', dirtDark: '#6b4226', ink: '#fcfcfc', dim: '#c8d8ea',
  steveSkin: '#d99a6c', steveSkinD: '#a86e44', steveShirt: '#33aaaa', steveShirtD: '#1f7a7a',
  stevePants: '#4455aa', stevePantsD: '#2c3770', hair: '#4a2c14',
  diamond: '#7fdbff', diamondD: '#2299cc',
  wither: '#2b2b33', witherD: '#141418', witherL: '#44444f',
  eye: '#66ff66', eyeRage: '#bb66ff',
  gold: '#ffcd75', bad: '#ff5555', heart: '#ff3030'
};
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const rnd = (a, b) => a + Math.random() * (b - a);
const easeOutBack = t => 1 + 2.7 * Math.pow(t - 1, 3) + 1.7 * Math.pow(t - 1, 2);
function roundRect(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
// 體素方塊：正面 + 頂面 + 側面（各自明暗，帶外框 → 立體感）
function shade(hex, f) {
  const n = parseInt(hex.slice(1), 16);
  const r = clamp(Math.round(((n >> 16) & 255) * f), 0, 255);
  const g = clamp(Math.round(((n >> 8) & 255) * f), 0, 255);
  const b = clamp(Math.round((n & 255) * f), 0, 255);
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}
function box3d(x, y, w, h, d, col, noAO) {
  // 頂面（最亮）
  ctx.fillStyle = shade(col, 1.28);
  ctx.beginPath();
  ctx.moveTo(x, y); ctx.lineTo(x + d, y - d); ctx.lineTo(x + w + d, y - d); ctx.lineTo(x + w, y);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1.2; ctx.stroke();
  // 側面（最暗）
  ctx.fillStyle = shade(col, 0.62);
  ctx.beginPath();
  ctx.moveTo(x + w, y); ctx.lineTo(x + w + d, y - d); ctx.lineTo(x + w + d, y + h - d); ctx.lineTo(x + w, y + h);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // 正面（中間調 + 底部AO漸層）
  const g = ctx.createLinearGradient(0, y, 0, y + h);
  g.addColorStop(0, col); g.addColorStop(1, shade(col, noAO ? 1 : 0.78));
  ctx.fillStyle = g;
  ctx.fillRect(x, y, w, h);
  ctx.strokeRect(x, y, w, h);
}

// ---------- 音效 ----------
let AC = null, master = null, muted = false;
function audio() {
  if (!AC) {
    try {
      AC = new (window.AudioContext || window.webkitAudioContext)();
      master = AC.createGain(); master.gain.value = muted ? 0 : 1;
      master.connect(AC.destination);
    } catch (err) { AC = null; }
  }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function setMuted(m) { muted = m; if (master) master.gain.value = muted ? 0 : 1; }
function beep(freq, dur, type, vol, slide) {
  const ac = audio(); if (!ac || muted) return;
  type = type || 'square'; vol = vol || 0.14; slide = slide || 0;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, ac.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), ac.currentTime + dur);
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g).connect(master);
  o.start(); o.stop(ac.currentTime + dur);
}
function noise(dur, vol) {
  const ac = audio(); if (!ac || muted) return;
  const len = Math.max(1, Math.floor(ac.sampleRate * dur));
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ac.createBufferSource(), g = ac.createGain();
  src.buffer = buf;
  g.gain.setValueAtTime(vol || 0.1, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  src.connect(g).connect(master);
  src.start();
}
const sfx = {
  click() { beep(520, 0.06, 'square', 0.09); },
  jump() { beep(200, 0.14, 'square', 0.1, 380); },
  land() { beep(120, 0.06, 'triangle', 0.09); },
  swing() { noise(0.09, 0.08); beep(340, 0.08, 'triangle', 0.06, -140); },
  hit(crit) { beep(crit ? 160 : 220, 0.1, 'square', 0.14, -80); noise(0.06, 0.1); },
  skull() { beep(170, 0.2, 'sawtooth', 0.08, -60); },
  boom() { noise(0.28, 0.16); beep(90, 0.3, 'sawtooth', 0.12, -50); },
  block() { beep(880, 0.07, 'triangle', 0.13, -100); },
  parry() { beep(660, 0.07, 'square', 0.12, 500); setTimeout(() => beep(1320, 0.12, 'square', 0.11, 300), 60); },
  eat() { beep(300, 0.08, 'triangle', 0.12, 140); setTimeout(() => beep(520, 0.1, 'triangle', 0.1, 200), 80); },
  combo(n) { beep(440 + Math.min(n, 12) * 40, 0.06, 'square', 0.08, 120); },
  hurt() { beep(240, 0.24, 'sawtooth', 0.14, -140); },
  charge() { beep(110, 0.5, 'sawtooth', 0.1, 160); },
  phase() { [220, 180, 260, 200].forEach((f, i) => setTimeout(() => beep(f, 0.18, 'sawtooth', 0.11), i * 120)); },
  win() { [523, 659, 784, 1047, 1319].forEach((f, i) => setTimeout(() => beep(f, 0.16, 'square', 0.11), i * 100)); },
  lose() { [392, 330, 262, 196].forEach((f, i) => setTimeout(() => beep(f, 0.2, 'triangle', 0.12), i * 140)); }
};

// ---------- FX ----------
let shake = 0, freeze = 0;
const parts = [];
function burst(x, y, color, n, speed, up) {
  n = n || 12; speed = speed || 220;
  for (let i = 0; i < n; i++) {
    if (parts.length > 300) break;
    const a = Math.random() * Math.PI * 2, s = speed * (0.3 + Math.random() * 0.7);
    parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - (up || 0), life: rnd(0.3, 0.65), color, size: rnd(3, 6), grav: 600 });
  }
}
function updateParts(dt) {
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += p.grav * dt; p.life -= dt;
    if (p.life <= 0) parts.splice(i, 1);
  }
}
function drawParts() {
  for (const p of parts) {
    ctx.globalAlpha = clamp(p.life * 2.2, 0, 1);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}
const floaters = [];
function addFloat(x, y, text, color, big) { floaters.push({ x, y, text, color, life: 0.9, big: !!big }); }
function updateFloaters(dt) {
  for (let i = floaters.length - 1; i >= 0; i--) {
    const f = floaters[i];
    f.y -= 52 * dt; f.life -= dt;
    if (f.life <= 0) floaters.splice(i, 1);
  }
}
function drawFloaters() {
  for (const f of floaters) {
    ctx.globalAlpha = clamp(f.life * 1.6, 0, 1);
    ctx.fillStyle = f.color;
    ctx.font = (f.big ? 'bold 28px' : 'bold 20px') + ' monospace';
    ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

// ---------- 背景：方塊世界（視差雲、方塊丘陵、草地）----------
const GROUND_Y = 470;
let bgTime = 0;
const clouds = [];
for (let i = 0; i < 6; i++) clouds.push({ x: rnd(0, GAME_W), y: rnd(30, 150), s: rnd(0.6, 1.3), v: rnd(8, 20) });
function updateBG(dt) {
  bgTime += dt;
  for (const c of clouds) {
    c.x -= c.v * dt;
    if (c.x < -120) { c.x = GAME_W + 120; c.y = rnd(30, 150); }
  }
}
function drawBG() {
  // 天空漸層
  const sky = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  sky.addColorStop(0, PAL.skyTop); sky.addColorStop(1, PAL.skyBot);
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, GAME_W, GROUND_Y);
  // 方形太陽（Minecraft 風）＋光暈
  const sg = ctx.createRadialGradient(120, 80, 10, 120, 80, 90);
  sg.addColorStop(0, 'rgba(255,250,200,0.7)'); sg.addColorStop(1, 'rgba(255,250,200,0)');
  ctx.fillStyle = sg;
  ctx.fillRect(30, -10, 180, 180);
  ctx.fillStyle = '#fff8c8';
  ctx.fillRect(96, 56, 48, 48);
  ctx.strokeStyle = 'rgba(220,190,90,0.8)'; ctx.lineWidth = 3;
  ctx.strokeRect(96, 56, 48, 48);
  // 遠山（方塊剪影，最慢視差）
  ctx.fillStyle = 'rgba(90,130,180,0.5)';
  const off1 = (bgTime * 3) % 160;
  for (let i = -1; i < 8; i++) {
    const bx = i * 160 - off1;
    ctx.fillRect(bx, 330, 80, 140);
    ctx.fillRect(bx + 20, 290, 60, 40);
    ctx.fillRect(bx + 40, 260, 40, 30);
  }
  // 中景樹林（方塊樹，中速視差）
  const off2 = (bgTime * 7) % 220;
  for (let i = -1; i < 6; i++) {
    const tx = i * 220 - off2 + 60;
    ctx.fillStyle = 'rgba(90,60,35,0.75)';
    ctx.fillRect(tx + 18, 400, 14, 70);
    ctx.fillStyle = 'rgba(60,130,60,0.8)';
    ctx.fillRect(tx, 356, 50, 48);
    ctx.fillStyle = 'rgba(80,160,80,0.8)';
    ctx.fillRect(tx + 8, 348, 34, 14);
  }
  // 像素雲（前景視差）
  for (const c of clouds) {
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(c.x, c.y, 70 * c.s, 16 * c.s);
    ctx.fillRect(c.x + 14 * c.s, c.y - 10 * c.s, 40 * c.s, 12 * c.s);
    ctx.fillStyle = 'rgba(200,220,240,0.9)';
    ctx.fillRect(c.x, c.y + 12 * c.s, 70 * c.s, 5 * c.s);
  }
  ctx.globalAlpha = 1;
  // 草地 + 泥土
  ctx.fillStyle = PAL.grass;
  ctx.fillRect(0, GROUND_Y, GAME_W, 18);
  ctx.fillStyle = PAL.dirt;
  ctx.fillRect(0, GROUND_Y + 18, GAME_W, GAME_H - GROUND_Y - 18);
  // 草地方塊格線與草叢
  ctx.strokeStyle = 'rgba(0,0,0,0.18)'; ctx.lineWidth = 1.5;
  for (let x = 0; x < GAME_W; x += 40) {
    ctx.strokeRect(x, GROUND_Y, 40, 18);
    ctx.strokeRect(x + (x / 40 % 2 ? 20 : 0), GROUND_Y + 18, 40, 34);
  }
  // 泥土斑點
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  for (let i = 0; i < 30; i++) {
    const dx = (i * 97) % GAME_W, dy = GROUND_Y + 24 + ((i * 53) % 40);
    ctx.fillRect(dx, dy, 5, 5);
  }
  // 草穗
  ctx.fillStyle = '#4a9e35';
  for (let i = 0; i < 12; i++) {
    const gx = (i * 173 + 40) % GAME_W;
    const sway2 = Math.sin(bgTime * 2 + i) * 2;
    ctx.fillRect(gx + sway2, GROUND_Y - 8, 3, 8);
    ctx.fillRect(gx + 5 + sway2, GROUND_Y - 12, 3, 12);
    ctx.fillRect(gx + 10 + sway2, GROUND_Y - 6, 3, 6);
  }
}

// ---------- 史蒂夫（體素小人：頭/身/四肢 + 走路擺動 + 劍）----------
const steve = {
  x: 180, y: GROUND_Y, vx: 0, vy: 0, w: 34, h: 74,
  hp: 20, face: 1, grounded: true, sx: 1, sy: 1,
  atkT: 0, atkCd: 0, blocking: false, blockT: 9, hurtT: 0, walkT: 0, dead: false
};
function drawSteve(s) {
  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.scale(s.sx * s.face, s.sy);
  if (s.hurtT > 0 && Math.floor(s.hurtT * 16) % 2 === 0) ctx.globalAlpha = 0.45;
  const walk = s.grounded && Math.abs(s.vx) > 20 ? Math.sin(s.walkT * 11) : 0;
  const D = 7; // 體素深度
  // 後臂（持盾手）
  ctx.save();
  ctx.translate(-8, -46);
  ctx.rotate(s.blocking ? -0.9 : walk * 0.5 + 0.1);
  box3d(-5, 0, 10, 26, 5, PAL.steveShirt);
  ctx.fillStyle = PAL.steveSkin;
  ctx.fillRect(-5, 20, 10, 7);
  if (s.blocking) { // 盾牌（木紋 + 鐵框）
    box3d(-14, 18, 26, 32, 5, '#8a5a2a');
    ctx.strokeStyle = '#5a3a15'; ctx.lineWidth = 2;
    ctx.strokeRect(-10, 22, 18, 24);
    ctx.fillStyle = '#c0c8d0';
    ctx.fillRect(-4, 28, 6, 12);
  }
  ctx.restore();
  // 後腿
  ctx.save();
  ctx.translate(-3, -22);
  ctx.rotate(-walk * 0.6);
  box3d(-5, 0, 11, 22, 4, PAL.stevePants);
  ctx.fillStyle = '#666'; ctx.fillRect(-5, 19, 11, 4);
  ctx.restore();
  // 前腿
  ctx.save();
  ctx.translate(6, -22);
  ctx.rotate(walk * 0.6);
  box3d(-5, 0, 11, 22, 4, shade(PAL.stevePants, 1.12));
  ctx.fillStyle = '#777'; ctx.fillRect(-5, 19, 11, 4);
  ctx.restore();
  // 身體
  box3d(-11, -50, 22, 30, D, PAL.steveShirt);
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(-11, -50, 22, 4);
  // 頭（皮膚 + 頭髮 + 臉）
  box3d(-12, -76, 24, 24, D, PAL.steveSkin);
  ctx.fillStyle = PAL.hair;
  ctx.fillRect(-12, -76, 24, 7);
  ctx.beginPath();
  ctx.moveTo(-12, -76); ctx.lineTo(-12 + D, -76 - D); ctx.lineTo(12 + D, -76 - D); ctx.lineTo(12, -76);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = shade(PAL.hair, 0.7);
  ctx.fillRect(12, -76, D, 7);
  // 眼睛（藍瞳，攻擊時瞇眼）
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(2, -66, 7, 6); ctx.fillRect(-9, -66, 7, 6);
  ctx.fillStyle = '#2a5cb8';
  const eo = s.atkT > 0 ? 1 : 0;
  ctx.fillRect(5 + eo, -66, 4, 6); ctx.fillRect(-6 + eo, -66, 4, 6);
  // 嘴與鼻影
  ctx.fillStyle = PAL.steveSkinD;
  ctx.fillRect(-3, -60, 6, 3);
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(-2, -57, 5, 2);
  // 前臂 + 鑽石劍
  ctx.save();
  ctx.translate(8, -46);
  const swing = s.atkT > 0 ? -1.9 * Math.sin((0.3 - s.atkT) / 0.3 * Math.PI) : walk * -0.5 + 0.15;
  ctx.rotate(swing);
  box3d(-5, 0, 10, 26, 5, PAL.steveSkin);
  // 劍：握把、護手、漸層刃、尖端
  ctx.save();
  ctx.translate(0, 26);
  ctx.rotate(0.35);
  ctx.fillStyle = '#5a3a15';
  ctx.fillRect(-2.5, -4, 5, 10);
  ctx.fillStyle = '#8a5a2a';
  ctx.fillRect(-8, 4, 16, 5);
  const bg2 = ctx.createLinearGradient(-3, 8, 3, 46);
  bg2.addColorStop(0, '#eaffff'); bg2.addColorStop(0.5, PAL.diamond); bg2.addColorStop(1, PAL.diamondD);
  ctx.fillStyle = bg2;
  ctx.beginPath();
  ctx.moveTo(-4, 9); ctx.lineTo(4, 9); ctx.lineTo(4, 42); ctx.lineTo(0, 48); ctx.lineTo(-4, 42);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#1b7a99'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillRect(-3, 10, 2, 30);
  ctx.restore();
  ctx.restore();
  ctx.restore();
  // 攻擊劍風弧
  if (s.atkT > 0.12) {
    const p = 1 - (s.atkT - 0.12) / 0.18;
    ctx.save();
    ctx.translate(s.x + s.face * 30, s.y - 44);
    ctx.scale(s.face, 1);
    ctx.globalAlpha = 0.75 * (1 - p);
    ctx.strokeStyle = '#dffcff'; ctx.lineCap = 'round'; ctx.lineWidth = 8 * (1 - p * 0.4);
    ctx.beginPath(); ctx.arc(0, 0, 34 + p * 26, -1.5, 1.15); ctx.stroke();
    ctx.strokeStyle = PAL.diamond; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0, 0, 26 + p * 22, -1.3, 0.95); ctx.stroke();
    ctx.restore();
    ctx.globalAlpha = 1;
  }
  // 影子
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  const airH = clamp((GROUND_Y - s.y) / 200, 0, 1);
  ctx.beginPath();
  ctx.ellipse(s.x, GROUND_Y + 8, 24 * (1 - airH * 0.4), 6, 0, 0, 6.29);
  ctx.fill();
}

// ---------- 凋零王（三顆骷髏頭 + 脊椎肋骨，浮空體素 Boss）----------
const wither = {
  x: 660, y: 300, hp: 300, hpMax: 300, bob: 0, flash: 0, sx: 1, sy: 1,
  fireT: 2.4, chargeT: 6, charging: 0, chargeDir: 0, chargeHit: false,
  phase: 1, dead: false, deathT: 0, tele: 0, rainT: 3
};
function drawWitherHead(hx, hy, s2, big, rage, flash, t) {
  ctx.save();
  ctx.translate(hx, hy);
  ctx.scale(s2, s2);
  const w = big ? 46 : 34, h = big ? 44 : 33, D = big ? 9 : 6;
  // 頭骨方塊
  box3d(-w / 2, -h / 2, w, h, D, flash > 0 ? '#e8e8f4' : PAL.wither);
  // 裂紋
  ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-w * 0.2, -h * 0.5); ctx.lineTo(-w * 0.12, -h * 0.2); ctx.lineTo(-w * 0.28, 0);
  ctx.stroke();
  // 眼睛（發光 + 眨動）
  const blink = (t % 3.7) > 3.55 ? 0.25 : 1;
  const ec = rage ? PAL.eyeRage : PAL.eye;
  ctx.fillStyle = ec;
  ctx.shadowColor = ec; ctx.shadowBlur = 12;
  ctx.fillRect(-w * 0.32, -h * 0.18 , w * 0.2, h * 0.16 * blink);
  ctx.fillRect(w * 0.12, -h * 0.18, w * 0.2, h * 0.16 * blink);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(-w * 0.26, -h * 0.16, w * 0.08, h * 0.1 * blink);
  ctx.fillRect(w * 0.18, -h * 0.16, w * 0.08, h * 0.1 * blink);
  // 鼻孔
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(-w * 0.06, h * 0.02, w * 0.12, h * 0.08);
  // 牙齒
  ctx.fillStyle = '#d8d8e0';
  for (let i = 0; i < 4; i++) ctx.fillRect(-w * 0.3 + i * w * 0.16, h * 0.3, w * 0.09, h * 0.14);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(-w * 0.32, h * 0.28, w * 0.64, 2);
  ctx.restore();
}
function drawWither(wi) {
  const bob = Math.sin(wi.bob) * 12;
  const x = wi.x, y = wi.y + bob;
  const rage = wi.phase >= 2;

// ---------- 頭骨彈 ----------
const skulls = [];
function fireSkull(fromX, fromY, aimX, aimY, fast) {

  sfx.skull();
}
function updateSkulls(dt) {
  for (let i = skulls.length - 1; i >= 0; i--) {
    const k = skulls[i];
    k.x += k.vx * dt; k.y += k.vy * dt;
    if (!k.friendly) k.vy += 90 * dt;
    k.rot += dt * 6;
    k.trailT += dt;
    if (k.trailT > 0.05) {
      k.trailT = 0;
      parts.push({ x: k.x, y: k.y, vx: rnd(-15, 15), vy: rnd(-15, 15), life: 0.35, color: k.friendly ? PAL.gold : k.fast ? '#bb88ff' : '#888899', size: 4, grav: 0 });
    }
    // 反彈頭骨命中凋零王
    if (k.friendly && !wither.dead) {
      const by = wither.y + Math.sin(wither.bob) * 12;
      if (Math.abs(k.x - wither.x) < 88 && Math.abs(k.y - by) < 80) {
        skulls.splice(i, 1);
        damageWither(25, true, k.x, k.y, '反彈 -');
        continue;
      }
    }
    // 命中史蒂夫（可完美反彈）
    if (!k.friendly && !steve.dead && steve.hurtT <= 0 && Math.abs(k.x - steve.x) < 24 && Math.abs(k.y - (steve.y - 38)) < 42) {
      if (steve.blocking && steve.blockT < 0.22) {
        // 完美反彈！時機格擋 → 頭骨飛回去打 Boss
        k.friendly = true;
        const dx = wither.x - k.x, dy = (wither.y - 20) - k.y, d = Math.hypot(dx, dy) || 1;
        k.vx = dx / d * 540; k.vy = dy / d * 540;
        parries++;
        freeze = 0.09; shake = Math.max(shake, 5);
        sfx.parry();
        burst(k.x, k.y, PAL.gold, 16, 260);
        addFloat(steve.x, steve.y - 104, '完美反彈！', PAL.gold, true);
        continue;
      }
      skulls.splice(i, 1);
      hitSteve(k.fast ? rnd(4, 6) : rnd(3, 6), k.x, k.y);
      continue;
    }
    // 落地爆炸
    if (k.y > GROUND_Y - 4 || k.x < -30 || k.x > GAME_W + 30 || k.y < -60) {
      burst(k.x, Math.min(k.y, GROUND_Y), '#555566', 10, 180, 60);
      burst(k.x, Math.min(k.y, GROUND_Y), '#aa8855', 6, 120, 60);
      shake = Math.max(shake, 3);
      sfx.boom();
      skulls.splice(i, 1);
    }
  }
}

function damageWither(dmg, big, hx, hy, label) {

  wither.hp -= dmg; dealt += dmg;
  wither.flash = 0.14;
  wither.sx = 1.12; wither.sy = 0.9;
  freeze = big ? 0.1 : 0.045;

  burst(hx || wither.x, hy || by, '#44444f', big ? 22 : 12, 260);
  burst(wither.x, by, PAL.diamond, 6, 200);
  addFloat((hx || wither.x) + rnd(-20, 20), (hy || by) - 90, (label || '-') + dmg, big ? PAL.gold : '#dffcff', big);
  if (wither.hp <= 150 && wither.phase === 1) {

  if (wither.hp <= 75 && wither.phase === 2) {
    wither.phase = 3;

    sfx.phase();

    addFloat(wither.x, by - 130, '最終狂暴！頭骨雨來襲！', PAL.eyeRage, true);
    burst(wither.x, by, PAL.eyeRage, 40, 360);

  if (wither.hp <= 0) {

}
function drawSkulls() {
  for (const k of skulls) {

    ctx.translate(k.x, k.y);
    ctx.rotate(k.rot);
    const c = k.friendly ? '#8a6a1a' : k.fast ? '#3a2a55' : PAL.wither;

    ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 8;

function hitSteve(dmg, fx, fy) {
  dmg = Math.round(dmg);
  if (steve.blocking) {
    const blocked = Math.max(0, dmg - 4);
    sfx.block();
    burst(steve.x + steve.face * -14, steve.y - 40, '#ffe9a0', 10, 200);
    addFloat(steve.x, steve.y - 96, blocked > 0 ? '格擋！-' + blocked : '完美格擋！', PAL.gold, blocked === 0);
    if (blocked === 0) { shake = Math.max(shake, 2); return; }
    dmg = blocked;
  } else {
    sfx.hurt();
    addFloat(steve.x, steve.y - 96, '-' + dmg, PAL.bad, true);
  }
  steve.hp -= dmg;
  if (combo >= 3) addFloat(steve.x, steve.y - 120, '連擊中斷…', PAL.dim);
  combo = 0; comboT = 0;
  steve.hurtT = 0.9;
  steve.sx = 1.25; steve.sy = 0.8;
  freeze = 0.05;
  shake = Math.max(shake, 6);
  burst(fx || steve.x, fy || steve.y - 40, PAL.bad, 12, 220);
  if (steve.hp <= 0) { steve.hp = 0; steve.dead = true; }
}

function toLogical(e) {
  const r = canvas.getBoundingClientRect();

  return { x: (e.clientX - r.left) / s, y: (e.clientY - r.top) / s };
}
canvas.addEventListener('pointerdown', e => {

}, { passive: false });

    steve.walkT = bgTime;
    drawSteve(steve);
    const ts = easeOutBack(clamp(this.t / 0.7, 0, 1));
    ctx.save();
    ctx.translate(GAME_W / 2, 130);
    ctx.scale(ts, ts);
    ctx.textAlign = 'center';
    ctx.font = 'bold 56px monospace';
    ctx.lineWidth = 8; ctx.strokeStyle = '#1a1c2c';
    ctx.strokeText('史蒂夫大戰凋零王', 0, 0);
    const tg = ctx.createLinearGradient(0, -40, 0, 16);
    tg.addColorStop(0, '#eaffff'); tg.addColorStop(1, PAL.diamond);
    ctx.fillStyle = tg;
    ctx.fillText('史蒂夫大戰凋零王', 0, 0);
    ctx.restore();
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 19px sans-serif';
    ctx.fillText('鑽石劍連斬累積連擊！頭骨彈撞到前一瞬舉盾＝完美反彈回敬！', GAME_W / 2, 180);
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.font = '15px sans-serif';
    ctx.fillText('鍵盤：← → 移動、↑/空白 跳、J 攻擊、K 舉盾　｜　手機：虛擬按鍵　｜　吃金蘋果補血', GAME_W / 2, 210);
    if (best > 0) {
      ctx.fillStyle = PAL.gold;
      ctx.font = 'bold 17px monospace';
      ctx.fillText('最佳戰績：' + best + ' 分', GAME_W / 2, 240);
    }
    const pulse = 1 + Math.sin(bgTime * 3) * 0.03;
    ctx.save();
    ctx.translate(GAME_W / 2, 296);
    ctx.scale(pulse, pulse);
    ctx.translate(-GAME_W / 2, -296);
    button(GAME_W / 2 - 110, 264, 220, 64, '開 始', startGame, 30);
    ctx.restore();
    muteButton();
  }
};
function startGame() { sfx.click(); resetFight(); setState(playState); }

// ===== 戰鬥 =====
const playState = {
  enter() { this.endT = 0; this.banner = 0; this.jumpBuf = 0; },
  onKey(code) {
    if (code === 'KeyJ' || code === 'Enter') this.tryAttack();
    if ((code === 'ArrowUp' || code === 'KeyW' || code === 'Space') && !steve.dead) {
      if (steve.grounded) this.jump();
      else this.jumpBuf = 0.12; // 跳躍緩衝：落地前按也算
    }
  },
  jump() {
    steve.vy = -640; steve.grounded = false;
    steve.sx = 0.75; steve.sy = 1.3;
    burst(steve.x, GROUND_Y, '#c8b898', 4, 90, 40);
    sfx.jump();
  },
  tryAttack() {
    if (steve.dead || wither.dead || steve.atkCd > 0 || steve.blocking) return;
    steve.atkT = 0.3; steve.atkCd = 0.42;
    sfx.swing();
    // 命中判定：面前 95px 範圍
    const hx = steve.x + steve.face * 62;
    const bobY = wither.y + Math.sin(wither.bob) * 12;
    if (Math.abs(hx - wither.x) < 105 && steve.y - 40 > bobY - 130 && steve.y - 110 < bobY + 90) {
      // 連擊：2.5 秒內連續命中，傷害最多 +50%
      combo++; comboT = 2.5; comboPop = 0.25;
      maxCombo = Math.max(maxCombo, combo);
      if (combo >= 2) sfx.combo(combo);
      const mult = 1 + Math.min(combo - 1, 10) * 0.05;
      const crit = Math.random() < 0.15;
      const dmg = Math.round(rnd(15, 25) * mult) * (crit ? 2 : 1);
      damageWither(dmg, crit, wither.x + rnd(-30, 30), bobY + rnd(-30, 10), crit ? '爆擊 -' : '-');
    } else if (missHint < 3) {
      // 揮空教學：告訴新手要再靠近一點
      missHint++;
      addFloat(steve.x + steve.face * 60, steve.y - 90, '太遠了，再靠近！', PAL.dim);
    }
  },
  update(dt) {
    updateBG(dt);
    this.banner += dt;
    const ts = touchState();
    // 勝負判定延遲切換（讓死亡演出播完）
    if (steve.dead || wither.dead) {
      this.endT += dt;
      if (wither.dead) {
        wither.deathT += dt;
        wither.bob += dt * 14;
        wither.y += 50 * dt;
        if (Math.random() < 0.3) burst(wither.x + rnd(-70, 70), wither.y + rnd(-50, 50), ['#44444f', PAL.eye, '#888'][Math.floor(rnd(0, 3))], 6, 200);
      }
      if (this.endT > 1.3) {
        finalScore = wither.dead
          ? Math.max(0, Math.round(3000 - elapsed * 15)) + steve.hp * 150 + 1000 + maxCombo * 50 + parries * 150
          : dealt + parries * 100;
        newBest = wither.dead && finalScore > best;
        if (newBest) {
          best = finalScore;
          try { localStorage.setItem('史蒂夫大戰凋零王.best', String(best)); } catch (err) {}
        }
        if (wither.dead) sfx.win(); else sfx.lose();
        setState(overState);
        return;
      }
    }
    elapsed += dt;
    // --- 史蒂夫 ---
    if (!steve.dead) {
      const left = keys.ArrowLeft || keys.KeyA || ts.left;
      const right = keys.ArrowRight || keys.KeyD || ts.right;
      const wasBlocking = steve.blocking;
      steve.blocking = (keys.KeyK || keys.ShiftLeft || ts.blk) && steve.grounded;
      if (steve.blocking && !wasBlocking) steve.blockT = 0;
      else if (steve.blocking) steve.blockT += dt;
      else steve.blockT = 9;
      const spd = steve.blocking ? 0 : 300;
      if (left && !right) { steve.vx += (-spd - steve.vx) * 12 * dt; steve.face = -1; }
      else if (right && !left) { steve.vx += (spd - steve.vx) * 12 * dt; steve.face = 1; }
      else steve.vx += (0 - steve.vx) * 14 * dt;
      if (ts.jump && !prevTouch.jump && !steve.grounded) this.jumpBuf = 0.12;
      this.jumpBuf = Math.max(0, (this.jumpBuf || 0) - dt);
      if ((ts.jump || this.jumpBuf > 0) && steve.grounded) { this.jumpBuf = 0; this.jump(); }
      if (ts.atk && steve.atkCd <= 0 && !prevTouch.atk) this.tryAttack();
      steve.x = clamp(steve.x + steve.vx * dt, 30, GAME_W - 30);
      steve.vy += 1660 * dt;
      steve.vy = Math.min(steve.vy, 900);
      steve.y += steve.vy * dt;
      if (steve.y >= GROUND_Y) {
        if (!steve.grounded) {
          steve.sx = 1.3; steve.sy = 0.72;
          burst(steve.x, GROUND_Y, '#c8b898', 4, 80, 30);
          sfx.land();
        }
        steve.y = GROUND_Y; steve.vy = 0; steve.grounded = true;
      }
      steve.walkT += dt * clamp(Math.abs(steve.vx) / 300, 0, 1);
      steve.atkT = Math.max(0, steve.atkT - dt);
      steve.atkCd = Math.max(0, steve.atkCd - dt);
      steve.hurtT = Math.max(0, steve.hurtT - dt);
      steve.sx += (1 - steve.sx) * 12 * dt;
      steve.sy += (1 - steve.sy) * 12 * dt;
    }
    prevTouch = ts;
    // 連擊倒數
    if (comboT > 0) { comboT -= dt; if (comboT <= 0) combo = 0; }
    comboPop = Math.max(0, comboPop - dt);
    updateItems(dt);
    updateWarnings(dt);
    // --- 凋零王 AI ---
    if (!wither.dead && !steve.dead) {
      wither.bob += dt * 2;
      wither.flash = Math.max(0, wither.flash - dt);
      wither.sx += (1 - wither.sx) * 8 * dt;
      wither.sy += (1 - wither.sy) * 8 * dt;
      const rage = wither.phase >= 2;
      if (wither.charging === 0) {
        // 緩慢橫移（狂暴時更貼近玩家）
        const targetX = rage ? clamp(steve.x + 260, 420, 840) : 640 + Math.sin(bgTime * 0.4) * 110;
        wither.x += (targetX - wither.x) * 0.5 * dt;
        wither.y += (290 - wither.y) * 2 * dt;
        // 發射頭骨彈（隨血量加速 → 漸進難度）
        wither.fireT -= dt;
        if (wither.fireT <= 0) {
          const hpR = wither.hp / wither.hpMax;
          wither.fireT = (wither.phase === 3 ? 1.0 : rage ? 1.15 : 1.6) + hpR * 1.2 + rnd(-0.15, 0.15);
          const heads = [[-52, -26], [52, -26], [0, -34]];
          const n = rage ? 3 : 1;
          for (let i = 0; i < n; i++) {
            const h = heads[i % 3];
            const lead = steve.x + steve.vx * 0.45 + (i - 1) * 60;
            fireSkull(wither.x + h[0], wither.y + h[1] + Math.sin(wither.bob) * 12, lead, steve.y - 40, rage);
          }
        }
        // 第三階段：頭骨雨（地面紅圈預警 → 天降頭骨）
        if (wither.phase === 3) {
          wither.rainT -= dt;
          if (wither.rainT <= 0 && warnings.length === 0) {
            wither.rainT = rnd(6.5, 8.5);
            sfx.charge();
            addFloat(wither.x, wither.y - 120, '頭骨雨！', PAL.eyeRage, true);
            warnings.push({ x: clamp(steve.x + rnd(-30, 30), 60, GAME_W - 60), t: 1.0 });
            for (let i = 1; i < 5; i++) warnings.push({ x: rnd(60, GAME_W - 60), t: 1.0 + i * 0.14 });
          }
        }
        // 俯衝衝撞（先預告再衝 → 學得會、躲得掉）
        wither.chargeT -= dt;
        if (wither.chargeT <= 0) {
          wither.charging = 1; wither.tele = 0.8; wither.chargeHit = false;
          wither.chargeDir = steve.x < wither.x ? -1 : 1;
          sfx.charge();
        }
      } else if (wither.charging === 1) {
        // 預告：升高蓄力、眼神鎖定
        wither.tele -= dt;
        wither.y += (210 - wither.y) * 6 * dt;
        wither.sx = 1 + Math.sin(bgTime * 30) * 0.04;
        if (wither.tele <= 0) { wither.charging = 2; shake = Math.max(shake, 4); }
      } else if (wither.charging === 2) {
        // 俯衝！
        wither.y += (GROUND_Y - 88 - wither.y) * 8 * dt;
        wither.x += wither.chargeDir * (wither.phase >= 2 ? 560 : 460) * dt;
        if (Math.random() < 0.5) parts.push({ x: wither.x + rnd(-40, 40), y: wither.y + rnd(-20, 40), vx: -wither.chargeDir * 100, vy: rnd(-30, 30), life: 0.3, color: '#55556a', size: 5, grav: 0 });
        if (!wither.chargeHit && !steve.dead && steve.hurtT <= 0 && Math.abs(wither.x - steve.x) < 80 && steve.y > wither.y - 60) {
          wither.chargeHit = true;
          hitSteve(4, steve.x, steve.y - 40);
          steve.vx = wither.chargeDir * 420;
        }
        if (wither.x < 120 || wither.x > GAME_W - 120) {
          wither.charging = 0;
          wither.chargeT = wither.phase >= 2 ? rnd(4.5, 6) : rnd(6.5, 8.5);
          // 俯衝後有機會掉金蘋果（受傷才掉 → 風險回報）
          if (Math.random() < 0.65) spawnApple(rnd(120, GAME_W - 200));
        }
      }
    }
  },
  draw() {
    uiButtons.length = 0;
    ctx.save();
    ctx.translate((Math.random() * 2 - 1) * shake, (Math.random() * 2 - 1) * shake);
    drawBG();
    // 衝撞預告紅線
    if (wither.charging === 1) {
      ctx.globalAlpha = 0.35 + Math.sin(bgTime * 20) * 0.2;
      ctx.fillStyle = PAL.bad;
      ctx.fillRect(0, GROUND_Y - 150, GAME_W, 110);
      ctx.globalAlpha = 1;
      ctx.fillStyle = PAL.bad;
      ctx.font = 'bold 24px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('！！俯衝來襲，快跳開！！', GAME_W / 2, GROUND_Y - 165);
    }
    // 攻擊範圍光圈：在斬擊距離內時 Boss 腳下發光
    if (!wither.dead && !steve.dead && Math.abs(steve.x + steve.face * 62 - wither.x) < 105) {
      ctx.globalAlpha = 0.5 + Math.sin(bgTime * 8) * 0.25;
      ctx.strokeStyle = PAL.diamond; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.ellipse(wither.x, GROUND_Y + 10, 78, 13, 0, 0, 6.29); ctx.stroke();
      ctx.globalAlpha = 1;
    }
    drawWarnings();
    drawItems();
    if (!wither.dead || wither.deathT < 1.1) drawWither(wither);
    drawSkulls();
    if (!steve.dead || Math.floor(bgTime * 10) % 2) drawSteve(steve);
    drawParts();
    drawFloaters();
    ctx.restore();
    // 最終狂暴的紫色氛圍
    if (wither.phase === 3 && !wither.dead) {
      ctx.fillStyle = 'rgba(120,40,180,0.08)';
      ctx.fillRect(0, 0, GAME_W, GAME_H);
    }
    drawHearts();
    drawBossBar(1 / 60);
    drawCombo();
    if (this.banner < 2) {
      ctx.globalAlpha = clamp(2 - this.banner, 0, 1);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 26px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('靠近凋零王，按 J 揮劍！', GAME_W / 2, 120);
      ctx.globalAlpha = 1;
    }
    drawTouchUI();
    muteButton();
  }
};

// ===== 結算 =====
const overState = {
  enter() { this.t = 0; this.confT = 0; },
  onKey(code) { if (this.t > 0.5 && (code === 'Space' || code === 'Enter')) startGame(); },
  update(dt) {
    this.t += dt;
    updateBG(dt);
    if (wither.dead) {
      this.confT -= dt;
      if (this.confT <= 0 && parts.length < 220) {
        this.confT = 0.09;
        parts.push({ x: rnd(0, GAME_W), y: -10, vx: rnd(-30, 30), vy: rnd(60, 150), life: rnd(1.3, 2), color: [PAL.gold, PAL.diamond, '#7ec858', '#fff'][Math.floor(rnd(0, 4))], size: rnd(4, 7), grav: 30 });
      }
    }
  },
  draw() {
    uiButtons.length = 0;
    drawBG();
    if (!wither.dead) drawWither(wither);
    if (wither.dead) drawSteve(steve);
    drawParts();
    ctx.fillStyle = 'rgba(10,12,24,' + (0.55 * clamp(this.t / 0.3, 0, 1)) + ')';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    const ps = easeOutBack(clamp(this.t / 0.45, 0, 1));
    ctx.save();
    ctx.translate(GAME_W / 2, GAME_H / 2);
    ctx.scale(ps, ps);
    ctx.translate(-GAME_W / 2, -GAME_H / 2);
    ctx.fillStyle = 'rgba(26,28,44,0.95)';
    roundRect(GAME_W / 2 - 220, 100, 440, 320, 16);
    ctx.fill();
    ctx.strokeStyle = wither.dead ? PAL.gold : '#555'; ctx.lineWidth = 3; ctx.stroke();
    ctx.textAlign = 'center';
    if (wither.dead) {
      ctx.fillStyle = PAL.gold;
      ctx.font = 'bold 38px monospace';
      ctx.fillText('凋零王被擊敗！', GAME_W / 2, 158);
      if (newBest) {
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 20px sans-serif';
        ctx.fillText('★ 新紀錄 ★', GAME_W / 2, 190);
      }
      ctx.fillStyle = PAL.dim;
      ctx.font = 'bold 14px sans-serif';
      ctx.fillText('戰績分數', GAME_W / 2, 224);
      ctx.fillStyle = PAL.gold;
      ctx.font = 'bold 52px monospace';
      ctx.fillText(String(finalScore), GAME_W / 2, 274);
      ctx.fillStyle = '#fff';
      ctx.font = '15px sans-serif';
      ctx.fillText('用時 ' + Math.round(elapsed) + ' 秒 · 剩餘 ' + steve.hp + ' HP · 最佳 ' + best + ' 分', GAME_W / 2, 302);
      ctx.fillStyle = PAL.diamond;
      ctx.fillText('最大連擊 ' + maxCombo + ' · 完美反彈 ' + parries + ' 次', GAME_W / 2, 324);
    } else {
      ctx.fillStyle = '#c9c9d9';
      ctx.font = 'bold 36px monospace';
      ctx.fillText('史蒂夫倒下了…', GAME_W / 2, 160);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 19px sans-serif';
      ctx.fillText('別氣餒，再挑戰一次！', GAME_W / 2, 200);
      ctx.fillStyle = PAL.dim;
      ctx.font = '15px sans-serif';
      ctx.fillText('本次對凋零王造成 ' + dealt + ' 點傷害 · 完美反彈 ' + parries + ' 次', GAME_W / 2, 240);
      ctx.fillText('絕招：頭骨彈快撞到的瞬間才舉盾 → 完美反彈回去打牠！', GAME_W / 2, 268);
      ctx.fillText('連續砍中不被打斷，連擊會讓傷害越來越痛。', GAME_W / 2, 292);
    }
    if (this.t > 0.5) button(GAME_W / 2 - 110, 340, 220, 56, '再玩一次', startGame, 26);
    ctx.restore();
    muteButton();
  }
};

// ---------- 主迴圈 ----------
const STEP = 1 / 60;
let last = performance.now(), acc = 0;
function frame(now) {
  requestAnimationFrame(frame);
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while (acc >= STEP) {
    acc -= STEP;
    if (freeze > 0) { freeze -= STEP; continue; }
    shake *= Math.pow(0.001, STEP);
    if (shake < 0.1) shake = 0;
    state.update(STEP);
    updateParts(STEP);
    updateFloaters(STEP);
    updateSkulls(STEP);
  }
  state.draw();
}
setState(titleState);
requestAnimationFrame(frame);
</script>
