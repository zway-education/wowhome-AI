/* ============================================================
   史蒂夫大戰凋零王 — 專業AI升級版
   即時動作 Boss 戰：移動、跳躍、鑽石劍連斬、舉盾格擋，

const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize() {
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = GAME_W * scale * dpr; canvas.height = GAME_H * scale * dpr;
  canvas.style.width = GAME_W * scale + 'px'; canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', resize); resize();

// ---------- 調色盤（晴空冒險 / Minecraft 風）----------
const PAL = {
  skyTop: '#5c94fc', skyBot: '#b8e0ff', grass: '#6ab84f', grassDark: '#4a7a35',
  dirt: '#8a5a3c', dirtDark: '#6b4226', ink: '#fcfcfc', dim: '#c8d8ea',
  steveSkin: '#d99a6c', steveSkinD: '#a86e44', steveShirt: '#33aaaa', steveShirtD: '#1f7a7a',
  stevePants: '#4455aa', stevePantsD: '#2c3770', hair: '#4a2c14',
  diamond: '#7fdbff', diamondD: '#2299cc',
  wither: '#2b2b33', witherD: '#141418', witherL: '#44444f',
  eye: '#66ff66', eyeRage: '#bb66ff',
  gold: '#ffcd75', bad: '#ff5555', heart: '#ff3030'
};
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const rnd = (a, b) => a + Math.random() * (b - a);
const easeOutBack = t => 1 + 2.7 * Math.pow(t - 1, 3) + 1.7 * Math.pow(t - 1, 2);
function roundRect(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
// 體素方塊：正面 + 頂面 + 側面（各自明暗，帶外框 → 立體感）
function shade(hex, f) {
  const n = parseInt(hex.slice(1), 16);
  const r = clamp(Math.round(((n >> 16) & 255) * f), 0, 255);
  const g = clamp(Math.round(((n >> 8) & 255) * f), 0, 255);
  const b = clamp(Math.round((n & 255) * f), 0, 255);
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}
const shadeCache = new Map(); // 快取色彩運算，避免每幀重複 parse
function shadeC(hex, f) {
  const key = hex + f;
  let v = shadeCache.get(key);
  if (!v) { v = shade(hex, f); shadeCache.set(key, v); }
  return v;
}
function box3d(x, y, w, h, d, col, noAO) {
  // 頂面（最亮）
  ctx.fillStyle = shadeC(col, 1.28);
  ctx.beginPath();
  ctx.moveTo(x, y); ctx.lineTo(x + d, y - d); ctx.lineTo(x + w + d, y - d); ctx.lineTo(x + w, y);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1.2; ctx.stroke();
  // 側面（最暗）
  ctx.fillStyle = shadeC(col, 0.62);
  ctx.beginPath();
  ctx.moveTo(x + w, y); ctx.lineTo(x + w + d, y - d); ctx.lineTo(x + w + d, y + h - d); ctx.lineTo(x + w, y + h);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // 正面（平面填色 + 底部AO色帶——不再每次建漸層，省效能）
  ctx.fillStyle = col;
  ctx.fillRect(x, y, w, h);
  if (!noAO) {
    ctx.fillStyle = 'rgba(0,0,0,0.16)';
    ctx.fillRect(x, y + h * 0.72, w, h * 0.28);
  }
  ctx.strokeRect(x, y, w, h);
}

// ---------- 音效 ----------
let AC = null, master = null, muted = false, revSend = null, ambGain = null, ambOn = '';
const ambNodes = [];
function audio() {
  if (!AC) {
    try {
      AC = new (window.AudioContext || window.webkitAudioContext)();
      master = AC.createGain(); master.gain.value = muted ? 0 : 0.85;
      // 限制器：多音效同時觸發不削峰爆音
      const comp = AC.createDynamicsCompressor();
      comp.threshold.value = -12; comp.knee.value = 24; comp.ratio.value = 8;
      comp.attack.value = 0.003; comp.release.value = 0.2;
      master.connect(comp); comp.connect(AC.destination);
      // v6：程序化殘響（generated impulse，小空間，所有音效帶空間感）
      const conv = AC.createConvolver();
      const n = Math.floor(AC.sampleRate * 1.2), buf = AC.createBuffer(2, n, AC.sampleRate);
      for (let ch = 0; ch < 2; ch++) { const d = buf.getChannelData(ch);
        for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 3); }
      conv.buffer = buf;
      revSend = AC.createGain(); revSend.gain.value = 0.22;
      revSend.connect(conv); conv.connect(master);
      // v6：氛圍母線（風聲鳥鳴/狂暴低鳴，主音效時 ducking）
      ambGain = AC.createGain(); ambGain.gain.value = 1; ambGain.connect(master);
      setAmbience(wither.phase >= 2 ? 'rage' : 'calm');
    } catch (err) { AC = null; }
  }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function setAmbience(mode) {
  if (!AC || !ambGain || ambOn === mode) return;
  for (const nd of ambNodes) { try { nd.stop(); } catch (e) {} try { nd.disconnect(); } catch (e) {} }
  ambNodes.length = 0; ambOn = mode;
  if (mode === 'calm') {              // 和風：帶通噪聲＋慢速濾波掃頻
    const n = AC.sampleRate * 2, buf = AC.createBuffer(1, n, AC.sampleRate), d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
    const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
    const filt = AC.createBiquadFilter(); filt.type = 'bandpass'; filt.frequency.value = 480; filt.Q.value = 0.6;
    const g = AC.createGain(); g.gain.value = 0.035;
    const lfo = AC.createOscillator(), lg = AC.createGain();
    lfo.frequency.value = 0.11; lg.gain.value = 220;
    lfo.connect(lg); lg.connect(filt.frequency);
    src.connect(filt); filt.connect(g); g.connect(ambGain);
    src.start(); lfo.start(); ambNodes.push(src, lfo, g);
  } else {                            // 狂暴：雙振盪器低鳴＋音量緩慢起伏
    const o1 = AC.createOscillator(), o2 = AC.createOscillator();
    o1.type = 'sawtooth'; o1.frequency.value = 46; o2.type = 'sawtooth'; o2.frequency.value = 69.5;
    const filt = AC.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = 190;
    const g = AC.createGain(); g.gain.value = 0.05;
    const lfo = AC.createOscillator(), lg = AC.createGain();
    lfo.frequency.value = 0.5; lg.gain.value = 0.02;
    lfo.connect(lg); lg.connect(g.gain);
    o1.connect(filt); o2.connect(filt); filt.connect(g); g.connect(ambGain);
    o1.start(); o2.start(); lfo.start(); ambNodes.push(o1, o2, lfo, g);
  }
}
function duckAmb() {
  if (!AC || !ambGain) return;
  const t = AC.currentTime, g = ambGain.gain;
  g.cancelScheduledValues(t); g.setValueAtTime(Math.min(g.value, 1), t);
  g.linearRampToValueAtTime(0.12, t + 0.05); g.linearRampToValueAtTime(1, t + 1.1);
}
function setMuted(m) { muted = m; if (master) master.gain.value = muted ? 0 : 0.85; }
function beep(freq, dur, type, vol, slide) {
  const ac = audio(); if (!ac || muted) return;
  freq *= 1 + (Math.random() * 2 - 1) * 0.04; // ±4% 音高隨機，連發不單調
  type = type || 'square'; vol = vol || 0.14; slide = slide || 0;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, ac.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), ac.currentTime + dur);
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g); g.connect(master); if (revSend) g.connect(revSend);
  o.start(); o.stop(ac.currentTime + dur);
}
function noise(dur, vol) {
  const ac = audio(); if (!ac || muted) return;
  const len = Math.max(1, Math.floor(ac.sampleRate * dur));
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ac.createBufferSource(), g = ac.createGain();
  src.buffer = buf;
  g.gain.setValueAtTime(vol || 0.1, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  src.connect(g); g.connect(master); if (revSend) g.connect(revSend);
  src.start();
}
const sfx = {
  click() { beep(520, 0.06, 'square', 0.09); beep(1040, 0.05, 'sine', 0.035); }, // v7：高頻泛音層，按鍵音更清脆
  jump() { beep(200, 0.14, 'square', 0.1, 380); },
  land() { beep(120, 0.06, 'triangle', 0.09); noise(0.04, 0.04); }, // v7：落地加一絲塵土沙聲
  swing() { noise(0.09, 0.08); beep(340, 0.08, 'triangle', 0.06, -140); },
  hit(crit) { beep(crit ? 160 : 220, 0.1, 'square', 0.14, -80); noise(0.06, 0.1); },
  skull() { beep(170, 0.2, 'sawtooth', 0.08, -60); },
  boom() { duckAmb(); noise(0.28, 0.16); beep(90, 0.3, 'sawtooth', 0.12, -50); },
  block() { beep(880, 0.07, 'triangle', 0.13, -100); },
  parry() { beep(660, 0.07, 'square', 0.12, 500); setTimeout(() => beep(1320, 0.12, 'square', 0.11, 300), 60); },
  eat() { beep(300, 0.08, 'triangle', 0.12, 140); setTimeout(() => beep(520, 0.1, 'triangle', 0.1, 200), 80); },
  combo(n) { beep(440 + Math.min(n, 12) * 40, 0.06, 'square', 0.08, 120); },
  hurt() { duckAmb(); beep(240, 0.24, 'sawtooth', 0.14, -140); },
  charge() { duckAmb(); beep(110, 0.5, 'sawtooth', 0.1, 160); },
  phase() { duckAmb(); [220, 180, 260, 200].forEach((f, i) => setTimeout(() => beep(f, 0.18, 'sawtooth', 0.11), i * 120)); },
  win() { duckAmb(); [523, 659, 784, 1047, 1319].forEach((f, i) => setTimeout(() => beep(f, 0.16, 'square', 0.11), i * 100)); },
  lose() { duckAmb(); [392, 330, 262, 196].forEach((f, i) => setTimeout(() => beep(f, 0.2, 'triangle', 0.12), i * 140)); }
};

// ---------- FX ----------
let shake = 0, freeze = 0;
const parts = [];
function burst(x, y, color, n, speed, up) {
  n = n || 12; speed = speed || 220;
  for (let i = 0; i < n; i++) {
    if (parts.length > 300) break;
    const a = Math.random() * Math.PI * 2, s = speed * (0.3 + Math.random() * 0.7);
    parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - (up || 0), life: rnd(0.3, 0.65), color, size: rnd(3, 6), grav: 600 });
  }
}
function updateParts(dt) {
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += p.grav * dt; p.life -= dt;
    if (p.life <= 0) { parts[i] = parts[parts.length - 1]; parts.pop(); } // swap-pop 免搬移
  }
}
function drawParts() {
  for (const p of parts) {
    ctx.globalAlpha = clamp(p.life * 2.2, 0, 1);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}
const floaters = [];
function addFloat(x, y, text, color, big) { floaters.push({ x, y, text, color, life: 0.9, big: !!big }); }
function updateFloaters(dt) {
  for (let i = floaters.length - 1; i >= 0; i--) {
    const f = floaters[i];
    f.y -= 52 * dt; f.life -= dt;
    if (f.life <= 0) floaters.splice(i, 1);
  }
}
function drawFloaters() {
  for (const f of floaters) {
    ctx.globalAlpha = clamp(f.life * 1.6, 0, 1);
    ctx.fillStyle = f.color;
    ctx.font = (f.big ? 'bold 28px' : 'bold 20px') + ' monospace';
    ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}
// v6：衝擊波圓環（頭骨落地/階段轉換/完美反彈）
const rings = [];
function addRing(x, y, color, maxR, flat) { rings.push({ x, y, color, maxR, t: 0, dur: 0.45, flat: !!flat }); }
function updateRings(dt) {
  for (let i = rings.length - 1; i >= 0; i--) { rings[i].t += dt; if (rings[i].t >= rings[i].dur) rings.splice(i, 1); }
}
function drawRings() {
  for (const r of rings) {
    const p = r.t / r.dur, e = 1 - Math.pow(1 - p, 3);
    ctx.globalAlpha = (1 - p) * 0.8;
    ctx.strokeStyle = r.color; ctx.lineWidth = 3 + (1 - p) * 3;
    ctx.beginPath();
    ctx.ellipse(r.x, r.y, 8 + (r.maxR - 8) * e, (8 + (r.maxR - 8) * e) * (r.flat ? 0.32 : 1), 0, 0, 6.29);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}
// v6：烘焙發光點精靈（bloom 疊加用，主迴圈零漸層建立）
function makeSpot(r, g2, b) {
  const cv = document.createElement('canvas'); cv.width = cv.height = 48;
  const c = cv.getContext('2d');
  const gr = c.createRadialGradient(24, 24, 0, 24, 24, 24);
  gr.addColorStop(0, 'rgba(' + r + ',' + g2 + ',' + b + ',.9)');
  gr.addColorStop(0.5, 'rgba(' + r + ',' + g2 + ',' + b + ',.32)');
  gr.addColorStop(1, 'rgba(' + r + ',' + g2 + ',' + b + ',0)');
  c.fillStyle = gr; c.fillRect(0, 0, 48, 48);
  return cv;
}
const spotGreen = makeSpot(102, 255, 102), spotPurple = makeSpot(187, 102, 255),
      spotGold = makeSpot(255, 205, 117), spotOrange = makeSpot(255, 126, 61);
// v6：環境粒子（平時飄花粉、狂暴期升灰燼）
const ambP = [];
for (let i = 0; i < 24; i++) ambP.push({ x: rnd(0, GAME_W), y: rnd(0, GAME_H - 90), z: rnd(0.4, 1), ph: rnd(0, 9) });
let chirpT = 3;
function updateAmbP(dt) {
  const rage = wither.phase >= 2 && !wither.dead;
  for (const a of ambP) {
    a.ph += dt;
    if (rage) { a.y -= (16 + 26 * a.z) * dt; a.x += Math.sin(a.ph * 2.5) * 12 * dt; if (a.y < -8) { a.y = GAME_H - 60; a.x = rnd(0, GAME_W); } }
    else { a.x -= (8 + 16 * a.z) * dt; a.y += Math.sin(a.ph * 1.3) * 9 * dt; if (a.x < -8) { a.x = GAME_W + 8; a.y = rnd(20, GAME_H - 120); } }
  }
  chirpT -= dt;                       // 平時偶爾遠處鳥鳴（狂暴期不叫）
  if (chirpT <= 0) {
    chirpT = rnd(4, 9);
    if (AC && !muted && !rage && !steve.dead) {
      const f = rnd(1900, 2600);
      beep(f, 0.07, 'sine', 0.028, rnd(200, 500));
      setTimeout(() => beep(f * 1.12, 0.09, 'sine', 0.022, -300), 110);
    }
  }
}
function drawAmbP() {
  const rage = wither.phase >= 2 && !wither.dead;
  ctx.globalCompositeOperation = rage ? 'lighter' : 'source-over';
  for (const a of ambP) {
    const k = (rage ? 15 : 11) * a.z;
    ctx.globalAlpha = rage ? (0.2 + 0.25 * a.z) * (0.7 + 0.3 * Math.sin(a.ph * 5)) : 0.16 + 0.24 * a.z;
    ctx.drawImage(rage ? spotPurple : spotGold, a.x - k / 2, a.y - k / 2, k, k);

// v6：烘焙暗角與狂暴紫霧

// ---------- 背景：方塊世界（視差雲、方塊丘陵、草地）----------
const GROUND_Y = 470;
let bgTime = 0;

for (let i = 0; i < 6; i++) clouds.push({ x: rnd(0, GAME_W), y: rnd(30, 150), s: rnd(0.6, 1.3), v: rnd(8, 20) });

(function () {

  c.fillRect(0, 0, GAME_W, GROUND_Y);
  const sg = c.createRadialGradient(120, 80, 10, 120, 80, 90);
  sg.addColorStop(0, 'rgba(255,250,200,0.7)'); sg.addColorStop(1, 'rgba(255,250,200,0)');
  c.fillStyle = sg;
  c.fillRect(30, 0, 180, 170);
  c.fillStyle = '#fff8c8';
  c.fillRect(96, 56, 48, 48);
  c.strokeStyle = 'rgba(220,190,90,0.8)'; c.lineWidth = 3;
  c.strokeRect(96, 56, 48, 48);
  // v6：烘焙陽光斜射光束＋地平線霞光
  for (const [ang, len, wdt, al] of [[0.5, 560, 46, 0.07], [0.66, 500, 30, 0.055], [0.38, 460, 24, 0.05]]) {

    if (code === 'KeyJ' || code === 'Enter') this.tryAttack();
    if ((code === 'ArrowUp' || code === 'KeyW' || code === 'Space') && !steve.dead) {
      if (steve.grounded) this.jump();
      else this.jumpBuf = 0.12; // 跳躍緩衝：落地前按也算
    }
  },
  jump() {
    steve.vy = -640; steve.grounded = false;
    steve.sx = 0.75; steve.sy = 1.3;
    burst(steve.x, GROUND_Y, '#c8b898', 4, 90, 40);
    sfx.jump();
  },
  tryAttack() {
    if (steve.dead || wither.dead || steve.atkCd > 0 || steve.blocking) return;
    steve.atkT = 0.3; steve.atkCd = 0.42;
    sfx.swing();
    // 命中判定：面前 95px 範圍
    const hx = steve.x + steve.face * 62;
    const bobY = wither.y + Math.sin(wither.bob) * 12;
    if (Math.abs(hx - wither.x) < 105 && steve.y - 40 > bobY - 130 && steve.y - 110 < bobY + 90) {
      // 連擊：2.5 秒內連續命中，傷害最多 +50%
      combo++; comboT = 2.5; comboPop = 0.25;
      maxCombo = Math.max(maxCombo, combo);
      if (combo >= 2) sfx.combo(combo);
      const mult = 1 + Math.min(combo - 1, 10) * 0.05;
      const crit = Math.random() < 0.15;
      // v3 時長調校：單刀 11~17（原 15~25 貼臉 30 秒就殺完），典型勝場約 90~150 秒
      const dmg = Math.round(rnd(11, 17) * mult) * (crit ? 2 : 1);
      damageWither(dmg, crit, wither.x + rnd(-30, 30), bobY + rnd(-30, 10), crit ? '爆擊 -' : '-');
    } else if (missHint < 3) {
      // 揮空教學：告訴新手要再靠近一點
      missHint++;
      addFloat(steve.x + steve.face * 60, steve.y - 90, '太遠了，再靠近！', PAL.dim);
    }
  },
  update(dt) {
    updateBG(dt);
    this.banner += dt;
    const ts = touchState();
    // 勝負判定延遲切換（讓死亡演出播完）
    if (steve.dead || wither.dead) {
      this.endT += dt;
      if (wither.dead) {
        wither.deathT += dt;
        wither.bob += dt * 14;
        wither.y += 50 * dt;
        if (Math.random() < 0.3) burst(wither.x + rnd(-70, 70), wither.y + rnd(-50, 50), ['#44444f', PAL.eye, '#888'][Math.floor(rnd(0, 3))], 6, 200);
      }
      if (this.endT > 1.3) {
        finalScore = wither.dead
          ? Math.max(0, Math.round(3000 - elapsed * 15)) + steve.hp * 150 + 1000 + maxCombo * 50 + parries * 150
          : dealt + parries * 100;
        if (hardMode) finalScore = Math.round(finalScore * 1.5); // 困難模式分數 ×1.5
        justUnlocked = wither.dead && !hardMode && unlockHard();
        if (hardMode) {
          newBest = wither.dead && finalScore > bestHard;
          if (newBest) {
            bestHard = finalScore;
            try { localStorage.setItem('史蒂夫大戰凋零王.bestHard', String(bestHard)); } catch (err) {}
          }
        } else {
          newBest = wither.dead && finalScore > best;
          if (newBest) {
            best = finalScore;
            try { localStorage.setItem('史蒂夫大戰凋零王.best', String(best)); } catch (err) {}
          }
        }
        if (wither.dead) sfx.win(); else sfx.lose();
        setState(overState);
        return;
      }
    }
    elapsed += dt;
    // --- 史蒂夫 ---
    if (!steve.dead) {
      const left = keys.ArrowLeft || keys.KeyA || ts.left;
      const right = keys.ArrowRight || keys.KeyD || ts.right;
      const wasBlocking = steve.blocking;
      steve.blocking = (keys.KeyK || keys.ShiftLeft || ts.blk) && steve.grounded;
      if (steve.blocking && !wasBlocking) steve.blockT = 0;
      else if (steve.blocking) steve.blockT += dt;
      else steve.blockT = 9;
      const spd = steve.blocking ? 0 : 300;
      if (left && !right) { steve.vx += (-spd - steve.vx) * 12 * dt; steve.face = -1; }
      else if (right && !left) { steve.vx += (spd - steve.vx) * 12 * dt; steve.face = 1; }
      else steve.vx += (0 - steve.vx) * 14 * dt;
      if (ts.jump && !prevTouch.jump && !steve.grounded) this.jumpBuf = 0.12;
      this.jumpBuf = Math.max(0, (this.jumpBuf || 0) - dt);
      if ((ts.jump || this.jumpBuf > 0) && steve.grounded) { this.jumpBuf = 0; this.jump(); }
      if (ts.atk && steve.atkCd <= 0 && !prevTouch.atk) this.tryAttack();
      steve.x = clamp(steve.x + steve.vx * dt, 30, GAME_W - 30);
      steve.vy += 1660 * dt;
      steve.vy = Math.min(steve.vy, 900);
      steve.y += steve.vy * dt;
      if (steve.y >= GROUND_Y) {
        if (!steve.grounded) {
          steve.sx = 1.3; steve.sy = 0.72;
          burst(steve.x, GROUND_Y, '#c8b898', 4, 80, 30);
          sfx.land();
        }
        steve.y = GROUND_Y; steve.vy = 0; steve.grounded = true;
      }
      steve.walkT += dt * clamp(Math.abs(steve.vx) / 300, 0, 1);
      steve.atkT = Math.max(0, steve.atkT - dt);
      steve.atkCd = Math.max(0, steve.atkCd - dt);
      steve.hurtT = Math.max(0, steve.hurtT - dt);
      steve.sx += (1 - steve.sx) * 12 * dt;
      steve.sy += (1 - steve.sy) * 12 * dt;
    }
    prevTouch = ts;
    // 連擊倒數
    if (comboT > 0) { comboT -= dt; if (comboT <= 0) combo = 0; }
    comboPop = Math.max(0, comboPop - dt);
    updateItems(dt);
    updateWarnings(dt);
    // --- 凋零王 AI ---
    if (!wither.dead && !steve.dead) {
      wither.bob += dt * 2;
      wither.flash = Math.max(0, wither.flash - dt);
      wither.sx += (1 - wither.sx) * 8 * dt;
      wither.sy += (1 - wither.sy) * 8 * dt;

        // 發射頭骨彈（隨血量加速 → 漸進難度）

        if (wither.fireT <= 0) {

          // 170 秒軟性狂暴：發彈加速，確保多數場次 4 分鐘內收尾

            wither.tired = true;
            addFloat(wither.x, wither.y - 130, '凋零王失去耐心了！', PAL.eyeRage, true);
            sfx.phase();
          }
          wither.fireT = ((wither.phase === 3 ? 1.0 : rage ? 1.15 : 1.6) + hpR * 1.2 + rnd(-0.15, 0.15)) * late * (hardMode ? 0.8 : 1);
          const heads = [[-52, -26], [52, -26], [0, -34]];
          const n = rage ? 3 : 1;
          wither.volley = (wither.volley || 0) + 1;
          for (let i = 0; i < n; i++) {
            const h = heads[i % 3];
            const lead = steve.x + steve.vx * 0.45 + (i - 1) * 60;
            // 困難模式：每第 2 波夾帶一顆熾焰追蹤頭骨（新招式）
            const homing = hardMode && i === n - 1 && wither.volley % 2 === 0;
            fireSkull(wither.x + h[0], wither.y + h[1] + Math.sin(wither.bob) * 12, lead, steve.y - 40, rage, homing);
            if (homing && !homingHint) {
              homingHint = true;
              addFloat(wither.x, wither.y - 120, '熾焰追蹤頭骨！會轉彎追人，快反彈它！', '#ff7e3d', true);
            }
          }
        }
        // 第三階段：頭骨雨（地面紅圈預警 → 天降頭骨）
        if (wither.phase === 3) {
          wither.rainT -= dt;
          if (wither.rainT <= 0 && warnings.length === 0) {
            wither.rainT = rnd(6.5, 8.5);
            sfx.charge();
            addFloat(wither.x, wither.y - 120, '頭骨雨！', PAL.eyeRage, true);
            warnings.push({ x: clamp(steve.x + rnd(-30, 30), 60, GAME_W - 60), t: 1.0 });
            for (let i = 1; i < 5; i++) warnings.push({ x: rnd(60, GAME_W - 60), t: 1.0 + i * 0.14 });
          }
        }
        // 俯衝衝撞（先預告再衝 → 學得會、躲得掉）
        wither.chargeT -= dt;
        if (wither.chargeT <= 0) {
          wither.charging = 1; wither.tele = 0.8; wither.chargeHit = false;
          wither.chargeDir = steve.x < wither.x ? -1 : 1;
          sfx.charge();
        }
      } else if (wither.charging === 1) {
        // 預告：升高蓄力、眼神鎖定
        wither.tele -= dt;
        wither.y += (210 - wither.y) * 6 * dt;
        wither.sx = 1 + Math.sin(bgTime * 30) * 0.04;
        if (wither.tele <= 0) { wither.charging = 2; shake = Math.max(shake, 4); }
      } else if (wither.charging === 2) {
        // 俯衝！
        wither.y += (GROUND_Y - 88 - wither.y) * 8 * dt;
        wither.x += wither.chargeDir * (wither.phase >= 2 ? 560 : 460) * dt;
        if (Math.random() < 0.5) parts.push({ x: wither.x + rnd(-40, 40), y: wither.y + rnd(-20, 40), vx: -wither.chargeDir * 100, vy: rnd(-30, 30), life: 0.3, color: '#55556a', size: 5, grav: 0 });
        if (!wither.chargeHit && !steve.dead && steve.hurtT <= 0 && Math.abs(wither.x - steve.x) < 80 && steve.y > wither.y - 60) {
          wither.chargeHit = true;
          hitSteve(4, steve.x, steve.y - 40);
          steve.vx = wither.chargeDir * 420;
        }
        if (wither.x < 120 || wither.x > GAME_W - 120) {
          wither.charging = 0;
          wither.chargeT = (wither.phase >= 2 ? rnd(4.5, 6) : rnd(6.5, 8.5)) * (hardMode ? 0.8 : 1);

  },
  draw() {

      ctx.fillStyle = PAL.bad;

    if (!wither.dead && !steve.dead && Math.abs(steve.x + steve.face * 62 - wither.x) < 105) {
      ctx.globalAlpha = 0.5 + Math.sin(bgTime * 8) * 0.25;
      ctx.strokeStyle = PAL.diamond; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.ellipse(wither.x, GROUND_Y + 10, 78, 13, 0, 0, 6.29); ctx.stroke();
      ctx.globalAlpha = 1;
    }

    if (dealt === 0 && !wither.dead && !steve.dead && elapsed < 14) {
      const ay = wither.y - 130 + Math.sin(bgTime * 6) * 8;
      ctx.fillStyle = PAL.gold;
      ctx.beginPath();
      ctx.moveTo(wither.x - 16, ay); ctx.lineTo(wither.x + 16, ay); ctx.lineTo(wither.x, ay + 22);
      ctx.closePath(); ctx.fill();
      ctx.font = 'bold 20px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('靠近砍牠！', wither.x, ay - 10);
    }
    drawWarnings();
    drawItems();
    if (!wither.dead || wither.deathT < 1.1) drawWither(wither);
    drawSkulls();
    if (!steve.dead || Math.floor(bgTime * 10) % 2) drawSteve(steve);
    drawParts();
    drawRings();
    // v6：發光體 bloom（頭骨彈/金蘋果，烘焙精靈 additive）
    ctx.globalCompositeOperation = 'lighter';

      const g = k.friendly ? spotGold : k.homing > 0 ? spotOrange : k.fast ? spotPurple : spotGreen;
      ctx.globalAlpha = 0.55;
      ctx.drawImage(g, k.x - 22, k.y - 22, 44, 44);

      ctx.globalAlpha = 0.45 + Math.sin(bgTime * 5) * 0.18;

      ctx.globalAlpha = (wither.phase === 3 ? 0.8 : 0.45) + Math.sin(bgTime * 2.4) * 0.12;

      ctx.globalAlpha = 1;

    drawBossBar(1 / 60);
    drawCombo();
    if (this.banner < 3.5) {
      ctx.globalAlpha = clamp(3.5 - this.banner, 0, 1);
      ctx.fillStyle = '#fff';

      ctx.textAlign = 'center';

// ===== 結算 =====
const overState = {
  enter() { this.t = 0; this.confT = 0; },
  onKey(code) { if (this.t > 0.5 && (code === 'Space' || code === 'Enter')) startGame(); },
  update(dt) {
    this.t += dt;
    updateBG(dt);
    if (wither.dead) {
      this.confT -= dt;
      if (this.confT <= 0 && parts.length < 220) {
        this.confT = 0.09;
        parts.push({ x: rnd(0, GAME_W), y: -10, vx: rnd(-30, 30), vy: rnd(60, 150), life: rnd(1.3, 2), color: [PAL.gold, PAL.diamond, '#7ec858', '#fff'][Math.floor(rnd(0, 4))], size: rnd(4, 7), grav: 30 });
      }
    }
  },
  draw() {
    uiButtons.length = 0;
    drawBG();
    if (!wither.dead) drawWither(wither);
    if (wither.dead) drawSteve(steve);
    drawParts();
    ctx.drawImage(vigCv, 0, 0);
    ctx.fillStyle = 'rgba(10,12,24,' + (0.55 * clamp(this.t / 0.3, 0, 1)) + ')';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    const ps = easeOutBack(clamp(this.t / 0.45, 0, 1));
    ctx.save();
    ctx.translate(GAME_W / 2, GAME_H / 2);
    ctx.scale(ps, ps);
    ctx.translate(-GAME_W / 2, -GAME_H / 2);
    // v7：面板落影＋主體＋內框光邊，層次更立體
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    roundRect(GAME_W / 2 - 216, 108, 440, 320, 16);
    ctx.fill();
    ctx.fillStyle = 'rgba(26,28,44,0.95)';
    roundRect(GAME_W / 2 - 220, 100, 440, 320, 16);
    ctx.fill();
    ctx.strokeStyle = wither.dead ? PAL.gold : '#555'; ctx.lineWidth = 3; ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1.5;
    roundRect(GAME_W / 2 - 214, 106, 428, 308, 12); ctx.stroke();
    ctx.textAlign = 'center';
    if (wither.dead) {
      ctx.fillStyle = PAL.gold;
      ctx.font = 'bold 38px monospace';
      ctx.fillText('凋零王被擊敗！', GAME_W / 2, 158);
      if (newBest) {
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 20px sans-serif';
        ctx.fillText('★ 新紀錄 ★', GAME_W / 2, 190);
      }
      ctx.fillStyle = PAL.dim;
      ctx.font = 'bold 14px sans-serif';
      ctx.fillText('戰績分數', GAME_W / 2, 224);
      ctx.fillStyle = PAL.gold;
      ctx.font = 'bold 52px monospace';
      ctx.fillText(String(finalScore), GAME_W / 2, 274);
      ctx.fillStyle = '#fff';
      ctx.font = '15px sans-serif';
      ctx.fillText('用時 ' + Math.round(elapsed) + ' 秒 · 剩餘 ' + steve.hp + ' HP · 最佳 ' + best + ' 分', GAME_W / 2, 302);
      ctx.fillStyle = PAL.diamond;
      ctx.fillText('最大連擊 ' + maxCombo + ' · 完美反彈 ' + parries + ' 次', GAME_W / 2, 324);
    } else {
      ctx.fillStyle = '#c9c9d9';
      ctx.font = 'bold 36px monospace';
      ctx.fillText('史蒂夫倒下了…', GAME_W / 2, 160);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 19px sans-serif';
      ctx.fillText('別氣餒，再挑戰一次！', GAME_W / 2, 200);
      ctx.fillStyle = PAL.dim;
      ctx.font = '15px sans-serif';
      ctx.fillText('本次對凋零王造成 ' + dealt + ' 點傷害 · 完美反彈 ' + parries + ' 次', GAME_W / 2, 240);
      ctx.fillText('絕招：頭骨彈快撞到的瞬間才舉盾 → 完美反彈回去打牠！', GAME_W / 2, 268);
      ctx.fillText('連續砍中不被打斷，連擊會讓傷害越來越痛。', GAME_W / 2, 292);
    }
    if (this.t > 0.5) button(GAME_W / 2 - 110, 340, 220, 56, '再玩一次', startGame, 26);
    ctx.restore();
    muteButton();
  }
};

// ---------- 主迴圈 ----------
const STEP = 1 / 60;
let last = performance.now(), acc = 0;
function frame(now) {
  requestAnimationFrame(frame);
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while (acc >= STEP) {
    acc -= STEP;
    if (freeze > 0) { freeze -= STEP; continue; }
    shake *= Math.pow(0.001, STEP);
    if (shake < 0.1) shake = 0;
    state.update(STEP);
    updateParts(STEP);
    updateFloaters(STEP);
    updateSkulls(STEP);
  }
  state.draw();
}
// 測試掛鉤（自動化冒煙測試用，不影響遊戲）
window.__smoke = () => ({ scene: state === playState ? 'play' : state === overState ? 'over' : 'title', x: steve.x, atkT: steve.atkT, bossHp: wither.hp, hp: steve.hp, ambN: ambNodes.length, ambOn, phase: wither.phase });
setState(titleState);
requestAnimationFrame(frame);

    wrap.style.cssText="position:fixed;right:10px;bottom:10px;z-index:99999;display:flex;gap:6px;font-family:sans-serif;opacity:.92";
    var LS="voted-"+K;
    var defs=[["-love","\u2764\uFE0F","\u975e\u5e38\u597d\u73a9","#ff6cc7"],["-like","\ud83d\udc4d","\u597d\u73a9","#38e1ff"]];
    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;
          b.querySelector("i").textContent=Math.max(0,(n||0)-(c||0));
        }); });
      });
    }
    defs.forEach(function(d){
      var b=document.createElement("button");
      b.type="button"; b.title=d[2];
      b.style.cssText="min-height:42px;padding:8px 14px;border:none;border-radius:999px;background:rgba(15,18,32,.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation";
      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";
      b.addEventListener("click",function(){
        var prev=null; try{ prev=localStorage.getItem(LS); }catch(e){}
        if(prev===d[0]){ ping(K+d[0]+"-c"); try{ localStorage.removeItem(LS); }catch(e){} }
        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);
      });
      btns[d[0]]=b; wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    refresh();
    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* 每10秒同步別人投的票 */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
</script>
</body>
</html>
