/* ===================== 3D 透視引擎（Canvas 2D 軟體投影） ===================== */
const TILT = 0.30, cosA = Math.cos(TILT), sinA = Math.sin(TILT), FOV = 560;
const cam = { x: 0, y: 150, z: -250 };
// 光源方向（左上前），逐面法線受光用
let LX = -0.35, LY = 0.86, LZ = -0.37;
(function () { const l = Math.hypot(LX, LY, LZ); LX /= l; LY /= l; LZ /= l; })();

function rotPt(p, rot) {
  if (!rot || !rot.ang) return p;
  const c = Math.cos(rot.ang), s = Math.sin(rot.ang);
  let x = p.x, y = p.y, z = p.z;
  if (rot.ax === 'x') { const dy = y - rot.py, dz = z - rot.pz; y = rot.py + dy * c - dz * s; z = rot.pz + dy * s + dz * c; }

// 立體體素方塊：中心(cx,cy,cz)、半尺寸(hx,hy,hz)、基色 hex、可選旋轉 rot、描邊 outline
function drawVoxel(cx, cy, cz, hx, hy, hz, hex, rot, outline) {
  const W = [];
  for (let i = 0; i < 8; i++) {
    const sx = (i & 4) ? 1 : -1, sy = (i & 2) ? 1 : -1, sz = (i & 1) ? 1 : -1;
    W.push(rotPt({ x: cx + sx * hx, y: cy + sy * hy, z: cz + sz * hz }, rot));
  }
  let gx = 0, gy = 0, gz = 0;
  for (let i = 0; i < 8; i++) { gx += W[i].x; gy += W[i].y; gz += W[i].z; }

  for (let i = 0; i < 8; i++) P[i] = project(W[i].x, W[i].y, W[i].z);

  for (let fi = 0; fi < 6; fi++) {
    const f = FACES[fi];
    const a = W[f[0]], b = W[f[1]], c = W[f[2]], e = W[f[3]];
    let nx = (b.y - a.y) * (c.z - a.z) - (b.z - a.z) * (c.y - a.y);
    let ny = (b.z - a.z) * (c.x - a.x) - (b.x - a.x) * (c.z - a.z);
    let nz = (b.x - a.x) * (c.y - a.y) - (b.y - a.y) * (c.x - a.x);
    const fcx = (a.x + b.x + c.x + e.x) / 4, fcy = (a.y + b.y + c.y + e.y) / 4, fcz = (a.z + b.z + c.z + e.z) / 4;

}

// ---------- 烘焙發光精靈（additive bloom / 陰影）----------
function makeSoft(r, g, b, peak) {
  const cv = document.createElement('canvas'); cv.width = cv.height = 48;
  const c = cv.getContext('2d');
  const gr = c.createRadialGradient(24, 24, 0, 24, 24, 24);
  gr.addColorStop(0, 'rgba(' + r + ',' + g + ',' + b + ',' + peak + ')');
  gr.addColorStop(0.5, 'rgba(' + r + ',' + g + ',' + b + ',' + (peak * 0.35).toFixed(3) + ')');
  gr.addColorStop(1, 'rgba(' + r + ',' + g + ',' + b + ',0)');
  c.fillStyle = gr; c.fillRect(0, 0, 48, 48);
  return cv;
}
const spotGreen = makeSoft(102, 255, 102, 0.9), spotPurple = makeSoft(187, 102, 255, 0.9),
      spotGold = makeSoft(255, 205, 117, 0.9), spotOrange = makeSoft(255, 126, 61, 0.9),
      spotWhite = makeSoft(255, 255, 255, 0.9), spotBlue = makeSoft(127, 219, 255, 0.9),
      shadowSprite = makeSoft(0, 0, 0, 0.6);
function groundShadow(wx, wz, rw, alpha) {
  const p = project(wx, 0, wz); if (!p) return;

// ---------- 音效（Web Audio 去爆音＋殘響＋氛圍層）----------
let AC = null, master = null, muted = false, revSend = null, ambGain = null, ambOn = '';

      const comp = AC.createDynamicsCompressor();
      comp.threshold.value = -12; comp.knee.value = 24; comp.ratio.value = 8;
      comp.attack.value = 0.003; comp.release.value = 0.2;

    for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;

function beep(freq, dur, type, vol, slide) {

  g.gain.setValueAtTime(0.0001, ac.currentTime);

// ---------- FX（螢幕空間，由 3D 座標投影後生成）----------
let shake = 0, freeze = 0, bgTime = 0;
const parts = [];
function burst3(wx, wy, wz, color, n, speed, up) {
  const p = project(wx, wy, wz); if (!p) return;
  const sc = clamp(p.s * 0.7, 0.4, 1.5);
  n = n || 12; speed = (speed || 220) * sc; up = (up || 0) * sc;
  for (let i = 0; i < n; i++) {
    if (parts.length > 300) break;
    const a = Math.random() * Math.PI * 2, s = speed * (0.3 + Math.random() * 0.7);
    parts.push({ x: p.x, y: p.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - up, life: rnd(0.3, 0.65), color, size: rnd(3, 6) * sc, grav: 600 });
  }
}
function updateParts(dt) {
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += p.grav * dt; p.life -= dt;
    if (p.life <= 0) { parts[i] = parts[parts.length - 1]; parts.pop(); }

  ctx.globalCompositeOperation = 'lighter';

    ctx.globalAlpha = clamp(p.life * 1.4, 0, 0.5);
    ctx.drawImage(spotWhite, p.x - k / 2, p.y - k / 2, k, k);

  ctx.globalCompositeOperation = 'source-over';

    ctx.globalAlpha = clamp(p.life * 2.2, 0, 1);

function addFloat3(wx, wy, wz, text, color, big) {

  floaters.push({ x: p.x, y: p.y, text, color, life: 0.9, big: !!big });

function updateFloaters(dt) {

// ---------- 頭骨彈（真 3D 飛行）----------
const skulls = [];
function fireSkull(fromX, fromY, fromZ, aimX, aimY, aimZ, fast, homing) {
  const dx = aimX - fromX, dy = aimY - fromY, dz = aimZ - fromZ;
  const d = Math.hypot(dx, dy, dz) || 1;
  const sp = (fast ? 300 : 220) * (hardMode ? 1.12 : 1);
  skulls.push({ x: fromX, y: fromY, z: fromZ, vx: dx / d * sp, vy: dy / d * sp + 90, vz: dz / d * sp, rot: 0, fast, trailT: 0, homing: homing ? 1.3 : 0, friendly: false });
  sfx.skull();
}
function updateSkulls(dt) {
  const sChest = 40;
  for (let i = skulls.length - 1; i >= 0; i--) {
    const k = skulls[i];
    if (k.homing > 0 && !k.friendly && !steve.dead) {
      k.homing -= dt;
      const tx = steve.x - k.x, ty = steve.y + sChest - k.y, tz = steve.z - k.z;
      const hd = Math.hypot(tx, ty, tz) || 1;
      k.vx += tx / hd * 460 * dt; k.vy += ty / hd * 460 * dt; k.vz += tz / hd * 460 * dt;
      const spd = Math.hypot(k.vx, k.vy, k.vz);
      if (spd > 300) { k.vx *= 300 / spd; k.vy *= 300 / spd; k.vz *= 300 / spd; }
    }
    k.x += k.vx * dt; k.y += k.vy * dt; k.z += k.vz * dt;
    if (!k.friendly && !(k.homing > 0)) k.vy -= 90 * dt; // 世界 y 向上，重力向下
    k.rot += dt * 6;
    k.trailT += dt;
    if (k.trailT > 0.05) {
      k.trailT = 0;
      burst3(k.x, k.y, k.z, k.friendly ? PAL.gold : k.homing > 0 ? '#ff7e3d' : k.fast ? '#bb88ff' : '#888899', 1, 40, 0);
    }
    // 反彈頭骨命中凋零王
    if (k.friendly && !wither.dead) {
      const by = wither.y + Math.sin(wither.bob) * 10;
      if (Math.abs(k.x - wither.x) < 90 && Math.abs(k.y - (by + 20)) < 90 && Math.abs(k.z - wither.z) < 100) {
        skulls.splice(i, 1);
        damageWither(25, true, k.x, k.y, k.z, '反彈 -');
        continue;
      }
    }
    // 命中史蒂夫（可完美反彈）
    if (!k.friendly && !steve.dead && steve.hurtT <= 0 &&
        Math.abs(k.x - steve.x) < 26 && Math.abs(k.y - (steve.y + sChest)) < 42 && Math.abs(k.z - steve.z) < 40) {
      if (steve.blocking && steve.blockT < 0.22) {
        k.friendly = true;
        const dx = wither.x - k.x, dy = (wither.y + 20) - k.y, dz = wither.z - k.z, d = Math.hypot(dx, dy, dz) || 1;
        k.vx = dx / d * 500; k.vy = dy / d * 500; k.vz = dz / d * 500;
        parries++;
        freeze = 0.09; shake = Math.max(shake, 5);
        sfx.parry();
        burst3(k.x, k.y, k.z, PAL.gold, 16, 260, 40);
        addRing3(k.x, k.y, k.z, PAL.gold, 64);
        addFloat3(steve.x, steve.y + 100, steve.z, '完美反彈！', PAL.gold, true);
        continue;
      }
      skulls.splice(i, 1);
      hitSteve(k.fast ? rnd(4, 6) : rnd(3, 6), k.x, k.y, k.z);
      continue;
    }
    // 落地爆炸 / 出界
    if (k.y < 2 || k.x < -ARENA_X - 40 || k.x > ARENA_X + 40 || k.z < -120 || k.z > 900 || k.y > 520) {
      const gy = Math.max(k.y, 2);
      burst3(k.x, gy, k.z, '#555566', 10, 180, 60);
      burst3(k.x, gy, k.z, '#aa8855', 6, 120, 60);
      if (k.y < 2) addRing3(k.x, 2, k.z, '#bbaacb', 58, true);
      shake = Math.max(shake, 3);
      sfx.boom();
      skulls.splice(i, 1);
    }
  }
}

  const ents = [];
  if (!wither.dead || wither.deathT < 1.1) ents.push({ d: camDepth(wither.y, wither.z), fn: () => drawWither3D(wither) });

  for (const it of items) ents.push({ d: camDepth(it.y, it.z), fn: () => drawItem3D(it) });

}

const playState = {
  enter() { this.endT = 0; this.banner = 0; this.jumpBuf = 0; },
  onKey(code) {
    if (code === 'KeyJ' || code === 'Enter') this.tryAttack();

      if (steve.grounded) this.jump(); else this.jumpBuf = 0.12;

  },
  jump() {
    steve.vy = 640; steve.grounded = false;

  },
  tryAttack() {
    if (steve.dead || wither.dead || steve.atkCd > 0 || steve.blocking) return;
    steve.atkT = 0.3; steve.atkCd = 0.42;
    sfx.swing();

      combo++; comboT = 2.5; comboPop = 0.25;
      maxCombo = Math.max(maxCombo, combo);
      if (combo >= 2) sfx.combo(combo);
      const mult = 1 + Math.min(combo - 1, 10) * 0.05;
      const crit = Math.random() < 0.15;
      const dmg = Math.round(rnd(11, 17) * mult) * (crit ? 2 : 1);
      const by = wither.y + Math.sin(wither.bob) * 10;
      damageWither(dmg, crit, wither.x + rnd(-30, 30), by + rnd(-10, 30), wither.z, crit ? '爆擊 -' : '-');
    } else if (missHint < 3) {
      missHint++;
      addFloat3(steve.x + steve.face * 40, steve.y + 90, steve.z, '太遠了，再靠近！', PAL.dim);
    }
  },
  update(dt) {
    updateBG(dt); updateCam(dt);
    this.banner += dt;

      this.endT += dt;
      if (wither.dead) {
        wither.deathT += dt; wither.bob += dt * 14; wither.y -= 46 * dt;
        if (Math.random() < 0.3) burst3(wither.x + rnd(-60, 60), wither.y + rnd(-40, 40), wither.z, ['#44444f', PAL.eye, '#888'][Math.floor(rnd(0, 3))], 6, 200, 20);
      }
      if (this.endT > 1.3) {
        finalScore = wither.dead
          ? Math.max(0, Math.round(3000 - elapsed * 15)) + steve.hp * 150 + 1000 + maxCombo * 50 + parries * 150
          : dealt + parries * 100;
        if (hardMode) finalScore = Math.round(finalScore * 1.5);
        justUnlocked = wither.dead && !hardMode && unlockHard();
        if (hardMode) {
          newBest = wither.dead && finalScore > bestHard;
          if (newBest) { bestHard = finalScore; try { localStorage.setItem('史蒂夫大戰凋零王.bestHard', String(bestHard)); } catch (err) {} }
        } else {
          newBest = wither.dead && finalScore > best;
          if (newBest) { best = finalScore; try { localStorage.setItem('史蒂夫大戰凋零王.best', String(best)); } catch (err) {} }
        }
        if (wither.dead) sfx.win(); else sfx.lose();
        setState(overState);
        return;
      }
    }
    elapsed += dt;
    // --- 史蒂夫 ---
    if (!steve.dead) {
      const left = keys.ArrowLeft || keys.KeyA || ts.left;
      const right = keys.ArrowRight || keys.KeyD || ts.right;
      const wasBlocking = steve.blocking;
      steve.blocking = (keys.KeyK || keys.ShiftLeft || ts.blk) && steve.grounded;
      if (steve.blocking && !wasBlocking) steve.blockT = 0;
      else if (steve.blocking) steve.blockT += dt;
      else steve.blockT = 9;
      const spd = steve.blocking ? 0 : 300;
      if (left && !right) { steve.vx += (-spd - steve.vx) * 12 * dt; steve.face = -1; }
      else if (right && !left) { steve.vx += (spd - steve.vx) * 12 * dt; steve.face = 1; }
      else steve.vx += (0 - steve.vx) * 14 * dt;
      if (ts.jump && !prevTouch.jump && !steve.grounded) this.jumpBuf = 0.12;
      this.jumpBuf = Math.max(0, (this.jumpBuf || 0) - dt);
      if ((ts.jump || this.jumpBuf > 0) && steve.grounded) { this.jumpBuf = 0; this.jump(); }
      if (ts.atk && steve.atkCd <= 0 && !prevTouch.atk) this.tryAttack();
      steve.x = clamp(steve.x + steve.vx * dt, -ARENA_X, ARENA_X);
      steve.vy -= 1660 * dt; steve.vy = Math.max(steve.vy, -900);

      steve.sx += (1 - steve.sx) * 12 * dt;
      steve.sy += (1 - steve.sy) * 12 * dt;
    }

    if (comboT > 0) { comboT -= dt; if (comboT <= 0) combo = 0; }
    comboPop = Math.max(0, comboPop - dt);

    // --- 凋零王 AI ---
    if (!wither.dead && !steve.dead) {

      wither.flash = Math.max(0, wither.flash - dt);
      wither.sx += (1 - wither.sx) * 8 * dt;
      wither.sy += (1 - wither.sy) * 8 * dt;
      const rage = wither.phase >= 2;
      if (wither.charging === 0) {
        const targetX = rage ? clamp(steve.x + 260, -120, 400) : 160 + Math.sin(bgTime * 0.4) * 150;
        wither.x += (targetX - wither.x) * 0.5 * dt;
        wither.y += (115 - wither.y) * 2 * dt;
        wither.z += (95 - wither.z) * 2 * dt;
        wither.fireT -= dt;
        if (wither.fireT <= 0) {
          const hpR = wither.hp / wither.hpMax;
          const late = elapsed > 170 ? 0.55 : 1;
          if (elapsed > 170 && !wither.tired) { wither.tired = true; addFloat3(wither.x, wither.y + 110, wither.z, '凋零王失去耐心了！', PAL.eyeRage, true); sfx.phase(); }
          wither.fireT = ((wither.phase === 3 ? 1.0 : rage ? 1.15 : 1.6) + hpR * 1.2 + rnd(-0.15, 0.15)) * late * (hardMode ? 0.8 : 1);
          const heads = [[-60, 20, 8], [60, 20, 8], [0, 34, -6]];
          const n = rage ? 3 : 1;
          wither.volley = (wither.volley || 0) + 1;
          for (let i = 0; i < n; i++) {
            const h = heads[i % 3];
            const lead = steve.x + steve.vx * 0.45 + (i - 1) * 60;
            const homing = hardMode && i === n - 1 && wither.volley % 2 === 0;
            fireSkull(wither.x + h[0], wither.y + h[1] + Math.sin(wither.bob) * 10, wither.z + h[2], lead, steve.y + 40, steve.z, rage, homing);

          }

        if (wither.phase === 3) {
          wither.rainT -= dt;
          if (wither.rainT <= 0 && warnings.length === 0) {
            wither.rainT = rnd(6.5, 8.5); sfx.charge();
            addFloat3(wither.x, wither.y + 100, wither.z, '頭骨雨！', PAL.eyeRage, true);
            warnings.push({ x: clamp(steve.x + rnd(-30, 30), -ARENA_X + 40, ARENA_X - 40), z: steve.z, t: 1.0 });
            for (let i = 1; i < 5; i++) warnings.push({ x: rnd(-ARENA_X + 40, ARENA_X - 40), z: rnd(-20, 80), t: 1.0 + i * 0.14 });
          }
        }
        wither.chargeT -= dt;
        if (wither.chargeT <= 0) { wither.charging = 1; wither.tele = 0.8; wither.chargeHit = false; wither.chargeDir = steve.x < wither.x ? -1 : 1; sfx.charge(); }

        if (!wither.chargeHit && !steve.dead && steve.hurtT <= 0 && Math.abs(wither.x - steve.x) < 80 && Math.abs(wither.z - steve.z) < 60 && wither.y < 110) {

    ctx.drawImage(vigCv, 0, 0);
    ctx.fillStyle = 'rgba(10,12,24,' + (0.55 * clamp(this.t / 0.3, 0, 1)) + ')';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    const ps = easeOutBack(clamp(this.t / 0.45, 0, 1));
    ctx.save();
    ctx.translate(GAME_W / 2, GAME_H / 2); ctx.scale(ps, ps); ctx.translate(-GAME_W / 2, -GAME_H / 2);
    ctx.fillStyle = 'rgba(0,0,0,0.45)'; roundRect(GAME_W / 2 - 216, 108, 440, 320, 16); ctx.fill();
    ctx.fillStyle = 'rgba(26,28,44,0.95)'; roundRect(GAME_W / 2 - 220, 100, 440, 320, 16); ctx.fill();
    ctx.strokeStyle = wither.dead ? PAL.gold : '#555'; ctx.lineWidth = 3; ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1.5;
    roundRect(GAME_W / 2 - 214, 106, 428, 308, 12); ctx.stroke();
    ctx.textAlign = 'center';
    if (wither.dead) {
      ctx.fillStyle = PAL.gold; ctx.font = 'bold 38px monospace';
      ctx.fillText('凋零王被擊敗！', GAME_W / 2, 158);
      if (newBest) { ctx.fillStyle = '#fff'; ctx.font = 'bold 20px sans-serif'; ctx.fillText('★ 新紀錄 ★', GAME_W / 2, 190); }
      ctx.fillStyle = PAL.dim; ctx.font = 'bold 14px sans-serif'; ctx.fillText('戰績分數', GAME_W / 2, 224);
      ctx.fillStyle = PAL.gold; ctx.font = 'bold 52px monospace'; ctx.fillText(String(finalScore), GAME_W / 2, 274);
      ctx.fillStyle = '#fff'; ctx.font = '15px sans-serif';
      ctx.fillText('用時 ' + Math.round(elapsed) + ' 秒 · 剩餘 ' + steve.hp + ' HP · 最佳 ' + best + ' 分', GAME_W / 2, 302);
      ctx.fillStyle = PAL.diamond; ctx.fillText('最大連擊 ' + maxCombo + ' · 完美反彈 ' + parries + ' 次', GAME_W / 2, 324);
    } else {
      ctx.fillStyle = '#c9c9d9'; ctx.font = 'bold 36px monospace'; ctx.fillText('史蒂夫倒下了…', GAME_W / 2, 160);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 19px sans-serif'; ctx.fillText('別氣餒，再挑戰一次！', GAME_W / 2, 200);
      ctx.fillStyle = PAL.dim; ctx.font = '15px sans-serif';
      ctx.fillText('本次對凋零王造成 ' + dealt + ' 點傷害 · 完美反彈 ' + parries + ' 次', GAME_W / 2, 240);
      ctx.fillText('絕招：頭骨彈快撞到的瞬間才舉盾 → 完美反彈回去打牠！', GAME_W / 2, 268);
      ctx.fillText('連續砍中不被打斷，連擊會讓傷害越來越痛。', GAME_W / 2, 292);
    }
    if (this.t > 0.5) button(GAME_W / 2 - 110, 340, 220, 56, '再玩一次', startGame, 26);
    ctx.restore();
    muteButton();
  }
};

// ---------- 主迴圈 ----------
const STEP = 1 / 60;
let last = performance.now(), acc = 0;
function frame(now) {
  requestAnimationFrame(frame);
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while (acc >= STEP) {
    acc -= STEP;
    if (freeze > 0) { freeze -= STEP; continue; }
    shake *= Math.pow(0.001, STEP);
    if (shake < 0.1) shake = 0;
    state.update(STEP);
    updateParts(STEP);
    updateFloaters(STEP);
    updateSkulls(STEP);
  }
  state.draw();
}
window.__smoke = () => ({ scene: state === playState ? 'play' : state === overState ? 'over' : 'title', x: steve.x, atkT: steve.atkT, bossHp: wither.hp, hp: steve.hp, ambN: ambNodes.length, ambOn, phase: wither.phase });
setState(titleState);
requestAnimationFrame(frame);
</script>
<script>/* AI-CAMP-STATS-BEACON */
(function(){

  function ping(n){
    try{
      fetch(REL+"hit/"+NS+"/"+n).then(function(r){
        if(!r||!r.ok){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); }
      }).catch(function(){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); });
    }catch(e){}
  }
  function read(n,cb){
    function via(base,next){ try{ fetch(base+"get/"+NS+"/"+n).then(function(r){ if(r.status===404&&base===ABS) return {value:0}; if(!r.ok) throw 0; return r.json(); }).then(function(j){ cb(j.value||j.count||0); }).catch(next); }catch(e){ next(); } }
    via(REL, function(){ via(ABS, function(){ cb(null); }); });
  }
  ping(K+"-v");
  var done=false;
  function once(){ if(done)return; done=true; ping(K+"-p"); ping("site-total-plays");
    window.removeEventListener("pointerdown",once); window.removeEventListener("keydown",once); }
  window.addEventListener("pointerdown",once,{once:false}); window.addEventListener("keydown",once,{once:false});
  /* 投票鈕：非常好玩/好玩——與作品館同一計數器，任何網頁打開都同步 */
  function initVotes(){
    if(!document.body) return;

    var LS="voted-"+K;
    var defs=[["-love","\u2764\uFE0F","\u975e\u5e38\u597d\u73a9","#ff6cc7"],["-like","\ud83d\udc4d","\u597d\u73a9","#38e1ff"]];
    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;

        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);

      btns[d[0]]=b; wrap.appendChild(b);

  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
