<!DOCTYPE html>
<!-- 專業AI升級 v6：飄落桃花瓣環境粒子、命中/必殺/KO衝擊波圓環、KO鏡頭推近慢演出、烘焙夕陽霞光光束+暗角、低血量血條脈動；程序化殘響ConvolverNode、山風蟲鳴氛圍層+ducking、靜音鈕同步關氛圍 -->
<!-- v4：無盡模式、五回合挑戰、必殺氣力系統、雙人對戰 -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>孫悟空大戰哪吒</title>
<style>
  html,body{
    margin:0;padding:0;height:100%;
    background:radial-gradient(circle at 50% 30%,#241a4d,#120c26 75%);
    overflow:hidden;touch-action:none;
    -webkit-user-select:none;user-select:none;
    font-family:"Microsoft JhengHei","PingFang TC",sans-serif;
  }
  canvas{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    border:3px solid #ffcf4d;border-radius:10px;
    box-shadow:0 0 40px rgba(0,0,0,.7);
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
'use strict';
/* ============================================================
   孫悟空大戰哪吒 — 專業升級版
   花果山之巔的巔峰對決：單人挑戰（AI 哪吒逐回合變強）
   或雙人同機對戰。固定時間步進＋狀態機＋全套手感回饋。
   ============================================================ */

/* ===== 畫布與縮放 ===== */
const GAME_W = 960, GAME_H = 540, GROUND_Y = 468;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize(){
  const scale = Math.min((innerWidth - 18) / GAME_W, (innerHeight - 18) / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = Math.round(GAME_W * scale * dpr);
  canvas.height = Math.round(GAME_H * scale * dpr);
  canvas.style.width  = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale;
}
addEventListener('resize', resize);
resize();

/* ===== 小工具 ===== */
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp  = (a, b, t) => a + (b - a) * t;
const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
const easeOutBack  = t => 1 + 2.7 * Math.pow(t - 1, 3) + 1.7 * Math.pow(t - 1, 2);
function rr(x, y, w, h, r){
  ctx.beginPath(); ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function fill2(fillStyle, lineStyle, lw){
  ctx.fillStyle = fillStyle; ctx.fill();
  ctx.strokeStyle = lineStyle; ctx.lineWidth = lw || 2.5;
  ctx.stroke();
}
const FONT = '"Microsoft JhengHei","PingFang TC",sans-serif';

/* ===== 音效（Web Audio 合成，零音檔）===== */
let AC = null, master = null, revSend = null, ambGain = null, ambOn = false;
const ambNodes = [];
let muted = false;
try{ muted = localStorage.getItem('wn_muted') === '1'; }catch(e){}
function initAudio(){
  if(!AC){
    try{
      AC = new (window.AudioContext || window.webkitAudioContext)();
      // master + 限制器：連擊/必殺多音效齊發不削峰爆音
      master = AC.createGain(); master.gain.value = muted ? 0 : 0.85;
      const comp = AC.createDynamicsCompressor();
      comp.threshold.value = -12; comp.knee.value = 24; comp.ratio.value = 8;
      comp.attack.value = 0.003; comp.release.value = 0.2;
      master.connect(comp); comp.connect(AC.destination);
      /* v6：程序化殘響（generated impulse 山谷空間感） */
      const conv = AC.createConvolver();
      const n = Math.floor(AC.sampleRate * 1.4), buf = AC.createBuffer(2, n, AC.sampleRate);
      for(let ch = 0; ch < 2; ch++){ const d = buf.getChannelData(ch);
        for(let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 2.6); }
      conv.buffer = buf;
      revSend = AC.createGain(); revSend.gain.value = 0.22;
      revSend.connect(conv); conv.connect(master);
      /* v6：山風氛圍層（主音效觸發 ducking） */
      ambGain = AC.createGain(); ambGain.gain.value = 1; ambGain.connect(master);
      startAmbience();
    }catch(e){}
  }
  if(AC && AC.state === 'suspended') AC.resume();
}
function startAmbience(){
  if(!AC || !ambGain || ambOn) return;
  ambOn = true;
  const n = AC.sampleRate * 2, buf = AC.createBuffer(1, n, AC.sampleRate), d = buf.getChannelData(0);
  for(let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
  const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
  const filt = AC.createBiquadFilter(); filt.type = 'bandpass'; filt.frequency.value = 400; filt.Q.value = 0.6;
  const g = AC.createGain(); g.gain.value = 0.03;
  const lfo = AC.createOscillator(), lg = AC.createGain();
  lfo.frequency.value = 0.12; lg.gain.value = 190;
  lfo.connect(lg); lg.connect(filt.frequency);
  src.connect(filt); filt.connect(g); g.connect(ambGain);
  src.start(); lfo.start(); ambNodes.push(src, lfo, g);
}
function duckAmb(){
  if(!AC || !ambGain) return;
  const t = AC.currentTime, g = ambGain.gain;
  g.cancelScheduledValues(t); g.setValueAtTime(Math.min(g.value, 1), t);
  g.linearRampToValueAtTime(0.12, t + 0.05); g.linearRampToValueAtTime(1, t + 1.1);
}
function beep(freq = 440, dur = 0.1, type = 'square', vol = 0.15, slide = 0){
  if(muted || !AC) return;
  freq *= 1 + (Math.random() * 2 - 1) * 0.04; // ±4% 音高隨機，連發不單調
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, AC.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), AC.currentTime + dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.connect(g); g.connect(master); if(revSend) g.connect(revSend);
  o.start();
  o.stop(AC.currentTime + dur);
}
function noise(dur = 0.15, vol = 0.2){
  if(muted || !AC) return;
  const len = Math.floor(AC.sampleRate * dur);
  const buf = AC.createBuffer(1, len, AC.sampleRate);
  const d = buf.getChannelData(0);
  for(let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = AC.createBufferSource();
  src.buffer = buf;
  const g = AC.createGain();
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  src.connect(g); g.connect(master); if(revSend) g.connect(revSend);
  src.start();
}
const sfx = {
  jump(){ beep(230, 0.14, 'square', 0.09, 380); },
  swing(){ beep(340, 0.08, 'sawtooth', 0.06, -170); },
  hit(){ noise(0.1, 0.16); beep(170, 0.12, 'square', 0.13, -70); },
  hurt(){ beep(150, 0.22, 'sawtooth', 0.12, -90); },
  ko(){ duckAmb(); noise(0.4, 0.22); beep(90, 0.5, 'sawtooth', 0.16, -40); },
  ui(){ beep(660, 0.06, 'square', 0.08); },
  round(){
    duckAmb();
    beep(523, 0.1, 'square', 0.1);
    setTimeout(() => beep(659, 0.1, 'square', 0.1), 90);
    setTimeout(() => beep(784, 0.16, 'square', 0.1), 180);
  },
  special(){ duckAmb(); noise(0.25, 0.2); beep(180, 0.4, 'sawtooth', 0.14, 520); setTimeout(() => beep(880, 0.25, 'square', 0.12, 300), 140); },
  spReady(){ beep(880, 0.09, 'square', 0.1, 220); setTimeout(() => beep(1175, 0.14, 'square', 0.09), 90); },
  win(){ duckAmb(); [523, 659, 784, 1047, 1319].forEach((f, i) => setTimeout(() => beep(f, 0.18, 'square', 0.1), i * 110)); },
  lose(){ duckAmb(); [392, 330, 262, 196].forEach((f, i) => setTimeout(() => beep(f, 0.22, 'triangle', 0.12), i * 150)); }
};
function toggleMute(){
  muted = !muted;
  if(master) master.gain.value = muted ? 0 : 0.85;   // v6：靜音同步關掉氛圍層與殘響尾音
  try{ localStorage.setItem('wn_muted', muted ? '1' : '0'); }catch(e){}
}

/* ===== 輸入：鍵盤 + 觸控 + 滑鼠 ===== */
const keys = {};
const in1 = { mx: 0, jumpBuf: 0, atkBuf: 0, spBuf: 0 };
const in2 = { mx: 0, jumpBuf: 0, atkBuf: 0, spBuf: 0 };
let touchMode = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
const touchIn = { left: false, right: false, jump: false, atk: false, sp: false };

addEventListener('keydown', e => {
  initAudio();
  const c = e.code;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(c)) e.preventDefault();
  keys[c] = true;
  if(e.repeat) return;
  if(c === 'KeyM'){ toggleMute(); return; }
  if(stateName === 'title' && (c === 'Enter' || c === 'Space')){ startGame('ai'); return; }
  if(stateName === 'over' && (c === 'Enter' || c === 'Space' || c === 'KeyR')){
    if(overT > 0.4) startGame(mode);
    return;
  }
  if(stateName !== 'play') return;
  if(c === 'KeyW') in1.jumpBuf = 0.12;
  if(c === 'KeyF' || c === 'KeyJ' || c === 'Space') in1.atkBuf = 0.16;
  if(c === 'KeyS') in1.spBuf = 0.2;
  if(mode !== '2p'){
    if(c === 'ArrowUp') in1.jumpBuf = 0.12;
    if(c === 'KeyK') in1.atkBuf = 0.16;
    if(c === 'ArrowDown' || c === 'KeyL') in1.spBuf = 0.2;
  }else{
    if(c === 'ArrowUp') in2.jumpBuf = 0.12;
    if(c === 'KeyK') in2.atkBuf = 0.16;
    if(c === 'ArrowDown' || c === 'KeyL') in2.spBuf = 0.2;
  }
});
addEventListener('keyup', e => { keys[e.code] = false; });

function evPos(cx, cy){
  const r = canvas.getBoundingClientRect();
  return { x: (cx - r.left) / canvas._scale, y: (cy - r.top) / canvas._scale };
}
function handleTouches(e){
  e.preventDefault();
  initAudio();
  touchMode = true;
  const pj = touchIn.jump, pa = touchIn.atk, ps = touchIn.sp;
  touchIn.left = touchIn.right = touchIn.jump = touchIn.atk = touchIn.sp = false;
  for(const t of e.touches){
    const p = evPos(t.clientX, t.clientY);
    if(p.y > GAME_H - 175){
      if(p.x < 150) touchIn.left = true;
      else if(p.x < 300) touchIn.right = true;
      else if(p.x > GAME_W - 150) touchIn.atk = true;
      else if(p.x > GAME_W - 300) touchIn.jump = true;
    }else if(p.y > GAME_H - 290 && p.x > GAME_W - 150){
      touchIn.sp = true; // 「絕」必殺鈕（攻擊鈕上方）
    }
  }
  if(touchIn.jump && !pj) in1.jumpBuf = 0.12;
  if(touchIn.atk && !pa) in1.atkBuf = 0.16;
  if(touchIn.sp && !ps) in1.spBuf = 0.2;
}
for(const ev of ['touchstart','touchmove','touchend','touchcancel'])
  canvas.addEventListener(ev, handleTouches, { passive: false });

/* 畫面上的按鈕（狀態繪製時註冊，pointerdown 檢查） */
let uiButtons = [];
canvas.addEventListener('pointerdown', e => {
  initAudio();
  const p = evPos(e.clientX, e.clientY);
  for(const b of uiButtons){
    if(p.x >= b.x && p.x <= b.x + b.w && p.y >= b.y && p.y <= b.y + b.h){
      sfx.ui();
      b.cb();
      return;
    }
  }
  if(stateName === 'play' && e.pointerType === 'mouse') in1.atkBuf = 0.16;
});

/* ===== 粒子與飄字 ===== */
let parts = [];
const floaters = [];
function burst(x, y, color, n = 12, speed = 240, life = 0.5){
  for(let i = 0; i < n; i++){
    if(parts.length > 300) return;
    const a = Math.random() * Math.PI * 2;
    const s = speed * (0.3 + Math.random() * 0.7);
    parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 60, life: life * (0.6 + Math.random() * 0.6), max: life, color });
  }
}
function updateParts(dt){
  for(let i = parts.length - 1; i >= 0; i--){
    const p = parts[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 700 * dt;
    p.life -= dt;
    if(p.life <= 0){ parts[i] = parts[parts.length - 1]; parts.pop(); } // swap-pop 免建新陣列
  }
}
function drawParts(){
  for(const p of parts){
    ctx.globalAlpha = clamp(p.life / p.max, 0, 1);
    ctx.fillStyle = p.color; ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
  }
  ctx.globalAlpha = 1;
}
function addFloater(x, y, txt, color, size = 24){
  floaters.push({ x, y, txt, color, size, t: 0 });
}
function updateFloaters(dt){
  for(const f of floaters) f.t += dt;
  for(let i = floaters.length - 1; i >= 0; i--) if(floaters[i].t > 0.8) floaters.splice(i, 1);
}
function drawFloaters(){
  for(const f of floaters){
    const k = f.t / 0.8;
    ctx.globalAlpha = 1 - k;
    ctx.font = 'bold ' + f.size + 'px ' + FONT;
    ctx.textAlign = 'center';
    ctx.lineWidth = 4;
    ctx.strokeStyle = 'rgba(20,10,40,.8)';
    ctx.strokeText(f.txt, f.x, f.y - k * 46);
    ctx.fillStyle = f.color;
    ctx.fillText(f.txt, f.x, f.y - k * 46);
  }
  ctx.globalAlpha = 1;
}

/* ===== v6：飄落桃花瓣（花果山氛圍粒子） ===== */
const petals = [];
for(let i = 0; i < 15; i++) petals.push({ x: Math.random() * GAME_W, y: Math.random() * GAME_H, z: 0.4 + Math.random() * 0.6, ph: Math.random() * 9, rot: Math.random() * 6 });
function updatePetals(dt){
  for(const p of petals){
    p.ph += dt; p.rot += dt * (1 + p.z);
    p.y += (16 + 26 * p.z) * dt;
    p.x += Math.sin(p.ph * 1.4) * 22 * dt - 8 * p.z * dt;
    if(p.y > GAME_H + 8){ p.y = -10; p.x = Math.random() * GAME_W; }
    if(p.x < -10) p.x = GAME_W + 10;
  }
}
function drawPetals(){
  for(const p of petals){
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha = 0.5 + 0.3 * p.z;
    ctx.fillStyle = p.z > 0.7 ? '#ffc4d0' : '#e89ab0';
    ctx.beginPath(); ctx.ellipse(0, 0, 4.6 * p.z, 2.6 * p.z, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}
/* ===== v6：衝擊波圓環（命中/必殺/KO） ===== */
const rings = [];
function addRing(x, y, color, maxR, dur){ rings.push({ x, y, color, maxR, t: 0, dur: dur || 0.4 }); }
function updateRings(dt){
  for(let i = rings.length - 1; i >= 0; i--){ rings[i].t += dt; if(rings[i].t >= rings[i].dur) rings.splice(i, 1); }
}
function drawRings(){
  for(const r of rings){
    const p = r.t / r.dur, e = easeOutCubic(p);
    ctx.globalAlpha = (1 - p) * 0.85;
    ctx.strokeStyle = r.color; ctx.lineWidth = 3.5 + (1 - p) * 3.5;
    ctx.beginPath(); ctx.arc(r.x, r.y, 10 + (r.maxR - 10) * e, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}
/* ===== v6：KO 鏡頭推近 ===== */
let koZoom = 0, koZoomX = GAME_W / 2, koZoomY = GAME_H / 2;
/* ===== v6：烘焙暗角 ===== */
const vigCv = document.createElement('canvas');
vigCv.width = GAME_W; vigCv.height = GAME_H;
(function(){
  const c = vigCv.getContext('2d');
  const g = c.createRadialGradient(GAME_W / 2, GAME_H / 2, GAME_H * 0.48, GAME_W / 2, GAME_H / 2, GAME_H * 0.98);
  g.addColorStop(0, 'rgba(18,8,40,0)'); g.addColorStop(1, 'rgba(18,8,40,.42)');
  c.fillStyle = g; c.fillRect(0, 0, GAME_W, GAME_H);
})();
let cricketT = 3;
function updateCrickets(dt){       // v6：黃昏蟲鳴（隨機三連短音）
  cricketT -= dt;
  if(cricketT <= 0){
    cricketT = 2 + Math.random() * 4;
    if(AC && !muted){
      const f = 3600 + Math.random() * 900;
      for(let i = 0; i < 3; i++) setTimeout(() => beep(f, 0.03, 'sine', 0.015), i * 75);
    }
  }
}

/* ===== 全域遊戲狀態 ===== */
let stateName = 'title';
let stateT = 0;
let mode = 'ai';           // 'ai' 單人挑戰 | '2p' 雙人對戰
let T = 0;                 // 全域時間（環境動畫用）
let shake = 0, freeze = 0;
let round = 1;
const FINAL_ROUND = 5; // 五回合挑戰制：全勝即結算，一場約 3 分鐘
let score = 0, scoreShow = 0;
let best = 0;
try{ best = parseInt(localStorage.getItem('wn_best') || '0', 10) || 0; }catch(e){}
/* v4 無盡模式：通關五回合挑戰後解鎖；紀錄最高連勝回合數 */
let cleared = false;
try{ cleared = localStorage.getItem('wn_cleared') === '1'; }catch(e){}
let bestEndless = 0;
try{ bestEndless = parseInt(localStorage.getItem('wn_endless') || '0', 10) || 0; }catch(e){}
let wins1 = 0, wins2 = 0;
let phase = 'intro', phaseT = 0;   // intro / fight / ko / roundwin
let overT = 0, playerWon = false;
let aiThink = 0, aiMx = 0;

/* ===== 角色 ===== */
function createFighter(kind){
  return {
    kind, x: 0, y: GROUND_Y, vy: 0, facing: 1, grounded: true,
    hp: 100, maxHp: 100, hpShow: 100, kb: 0, hurtTimer: 0,
    atkTimer: 0, atkDur: 0.28, atkCd: 0, atkCdMax: 0.45,
    dmg: 9, range: 104, speed: 275,
    sx: 1, sy: 1, walkT: 0, moving: false, hitDone: true,
    dead: false, koT: 0,
    sp: 0, spActive: false, spReadyPing: false, combo: 0, comboT: 0
  };
}
const p1 = createFighter('wukong');
const p2 = createFighter('nezha');
p1.x = 300; p2.x = 660; p2.facing = -1;

function resetRound(healed){
  p1.x = 240; p2.x = 720;
  for(const f of [p1, p2]){
    f.y = GROUND_Y; f.vy = 0; f.kb = 0; f.hurtTimer = 0;
    f.atkTimer = 0; f.atkCd = 0; f.sx = 1; f.sy = 1;
    f.dead = false; f.koT = 0; f.grounded = true; f.walkT = 0;
    f.spActive = false; f.combo = 0; f.comboT = 0;
    if(mode === '2p') f.sp = 0; // 單人／無盡模式的氣跨回合保留
  }
  p1.facing = 1; p2.facing = -1;
  if(mode !== '2p'){
    const r = round;
    const endless = mode === 'endless';
    // v3 時長調校：HP 成長 +25→+15/回合；無盡模式成長更兇、無上限
    p2.maxHp = 90 + (endless ? 18 : 15) * (r - 1);
    p2.hp = p2.hpShow = p2.maxHp;
    p2.speed = Math.min(endless ? 440 : 390, 215 + 30 * (r - 1));
    p2.atkCdMax = Math.max(endless ? 0.42 : 0.5, 1.05 - 0.09 * (r - 1));
    p2.dmg = Math.min(endless ? 22 : 16, 6 + 1.4 * (r - 1));
    if(healed) p1.hp = Math.min(100, p1.hp + (endless ? 28 : 35));
    else p1.hp = 100;
    p1.hpShow = p1.hp;
  }else{
    p1.maxHp = p2.maxHp = 100;
    p1.hp = p2.hp = 100;
    p1.hpShow = p2.hpShow = 100;
    p2.speed = 275; p2.atkCdMax = 0.45; p2.dmg = 9;
  }
  phase = 'intro'; phaseT = 0;
  parts = []; floaters.length = 0;
  aiThink = 0; aiMx = 0;
  sfx.round();
}
function startGame(m){
  mode = m;
  round = 1; score = 0; scoreShow = 0;
  wins1 = 0; wins2 = 0;
  p1.sp = p2.sp = 0;
  p1.spReadyPing = p2.spReadyPing = false;
  resetRound(false);
  stateName = 'play'; stateT = 0;
}
function endGame(won){
  playerWon = won;
  stateName = 'over'; stateT = 0; overT = 0;
  if(mode !== '2p' && score > best){
    best = score;
    try{ localStorage.setItem('wn_best', String(best)); }catch(e){}
  }
  if(mode === 'ai' && won && !cleared){
    cleared = true;
    try{ localStorage.setItem('wn_cleared', '1'); }catch(e){}
  }
  if(mode === 'endless' && wins1 > bestEndless){
    bestEndless = wins1;
    try{ localStorage.setItem('wn_endless', String(bestEndless)); }catch(e){}
  }
  if(won) sfx.win(); else sfx.lose();
}
function toTitle(){

/* ===== 戰鬥邏輯 ===== */
function applyHit(att, def){
  const sp = att.spActive;
  const dmg = sp ? 16 + Math.round(Math.random() * 5) : Math.max(1, Math.round(att.dmg + Math.random() * 3 - 1));
  def.hp = Math.max(0, def.hp - dmg);
  def.hurtTimer = sp ? 0.55 : 0.35;
  def.kb = (sp ? 560 : 340) * att.facing;
  def.sx = 1.25; def.sy = 0.8;
  /* 連擊：連續命中未被反擊 */
  att.combo++; att.comboT = 2;
  def.combo = 0; def.comboT = 0;
  if(att.combo >= 2) addFloater(def.x, def.y - 154, att.combo + ' 連擊！', '#ffd75e', 20);
  /* 氣力：打中大加、捱打小加（必殺本身不回氣） */
  if(!sp) att.sp = Math.min(100, att.sp + 14);
  def.sp = Math.min(100, def.sp + 9);
  const hx = (att.x + def.x) / 2, hy = def.y - 72;
  burst(hx, hy, '#ffd75e', sp ? 22 : 10, sp ? 360 : 270, 0.45);
  burst(hx, hy, '#ff6b4a', sp ? 14 : 6, 220, 0.35);
  addRing(hx, hy, sp ? '#ffcf4d' : '#ffe9ad', sp ? 120 : 62, sp ? 0.5 : 0.35);   // v6：命中衝擊波
  addFloater(def.x, def.y - 128, (sp ? '必殺 -' : '-') + dmg, sp ? '#ffcf4d' : '#ff9a86', sp ? 30 : 24);
  freeze = Math.max(freeze, sp ? 0.12 : 0.05);
  shake = Math.max(shake, sp ? 11 : 6);
  sfx.hit();
  if(mode !== '2p' && att === p1) score += dmg * 10 + Math.max(0, att.combo - 1) * 15;
  if(def.hp <= 0){
    def.dead = true;
    def.hurtTimer = 0.6;
    freeze = 0.14;
    shake = 12;
    burst(def.x, def.y - 60, def === p1 ? '#ff8a5c' : '#7ad1ff', 26, 340, 0.7);
    addRing(def.x, def.y - 60, '#fff', 200, 0.6);                // v6：KO 衝擊波
    koZoom = 1; koZoomX = def.x; koZoomY = def.y - 60;           // v6：KO 鏡頭推近
    sfx.ko();
    phase = 'ko'; phaseT = 0;
  }else if(def === p1){
    sfx.hurt();
  }
}

function updateFighter(f, opp, inp, dt){
  const control = phase === 'fight' && !f.dead && f.hurtTimer <= 0.18;
  if(f.hurtTimer > 0) f.hurtTimer -= dt;
  f.atkCd -= dt;
  if(f.comboT > 0){ f.comboT -= dt; if(f.comboT <= 0) f.combo = 0; }
  if(f.sp >= 100 && !f.spReadyPing){ f.spReadyPing = true; sfx.spReady(); addFloater(f.x, f.y - 150, '氣滿！可放必殺！', '#7ad1ff', 20); }
  if(f.sp < 100) f.spReadyPing = false;
  if(f.dead) f.koT = Math.min(1, f.koT + 3 * dt);
  /* 移動 */
  f.moving = false;
  if(control && inp.mx){
    f.x += inp.mx * f.speed * dt;
    f.walkT += dt;
    f.moving = true;
  }
  f.x += f.kb * dt;
  f.kb *= Math.pow(0.003, dt);
  f.x = clamp(f.x, 50, GAME_W - 50);
  /* 跳躍 */
  if(control && inp.jumpBuf > 0 && f.grounded){
    inp.jumpBuf = 0;
    f.vy = -820;
    f.grounded = false;
    f.sx = 0.72; f.sy = 1.32;
    sfx.jump();
    burst(f.x, GROUND_Y, '#cfc49a', 5, 120, 0.35);
  }
  /* 重力（下落加重，落地乾脆） */
  if(!f.grounded){
    f.vy += 2100 * (f.vy > 0 ? 1.55 : 1) * dt;
    f.vy = Math.min(f.vy, 1200);
    f.y += f.vy * dt;
    if(f.y >= GROUND_Y){
      f.y = GROUND_Y;
      f.grounded = true;
      if(f.vy > 250){
        f.sx = 1.3; f.sy = 0.7;
        burst(f.x, GROUND_Y, '#cfc49a', 5, 130, 0.3);
        beep(120, 0.06, 'triangle', 0.08);
      }
      f.vy = 0;
    }
  }
  /* 必殺技（氣滿觸發：範圍更大、傷害更重） */
  if(control && inp.spBuf > 0 && f.sp >= 100 && f.atkTimer <= 0){
    inp.spBuf = 0;
    f.sp = 0;
    f.spActive = true;
    f.atkDur = 0.5;
    f.atkTimer = f.atkDur;
    f.atkCd = f.atkCdMax + 0.2;
    f.hitDone = false;
    freeze = Math.max(freeze, 0.06);
    shake = Math.max(shake, 5);
    addFloater(f.x, f.y - 150, f.kind === 'wukong' ? '如意棒・橫掃千軍！' : '火尖槍・烈焰突刺！', '#ffcf4d', 24);
    burst(f.x, f.y - 60, f.kind === 'wukong' ? '#ffd75e' : '#ff8c3a', 20, 300, 0.6);
    addRing(f.x, f.y - 60, f.kind === 'wukong' ? '#ffd75e' : '#ff8c3a', 150, 0.55);   // v6：必殺發動衝擊波
    sfx.special();
  }
  /* 一般攻擊 */
  if(control && inp.atkBuf > 0 && f.atkCd <= 0 && f.atkTimer <= 0){
    inp.atkBuf = 0;
    f.spActive = false;
    f.atkDur = 0.28;
    f.atkTimer = f.atkDur;
    f.atkCd = f.atkCdMax;
    f.hitDone = false;
    sfx.swing();
  }
  if(f.atkTimer > 0){
    f.atkTimer -= dt;
    const prog = 1 - f.atkTimer / f.atkDur;
    const w0 = f.spActive ? 0.22 : 0.3, w1 = f.spActive ? 0.75 : 0.65;
    if(!f.hitDone && prog > w0 && prog < w1){
      const dx = (opp.x - f.x) * f.facing;
      const reach = f.range + (f.spActive ? 66 : 0);
      /* 受擊硬直中有短暫喘息（防牆角無限連段） */
      if(dx > 0 && dx < reach && Math.abs(opp.y - f.y) < 92 && !opp.dead && opp.hurtTimer <= 0.1){
        f.hitDone = true;
        applyHit(f, opp);
      }
    }
    if(f.spActive && Math.random() < 0.5){
      burst(f.x + f.facing * 50, f.y - 60, f.kind === 'wukong' ? '#ffd75e' : '#ff8c3a', 2, 180, 0.3);
    }
    if(f.atkTimer <= 0) f.spActive = false;
  }
  /* squash & stretch 回彈 */
  f.sx += (1 - f.sx) * 12 * dt;
  f.sy += (1 - f.sy) * 12 * dt;
  /* 自動面向對手 */
  if(f.atkTimer <= 0 && !f.dead) f.facing = (opp.x > f.x) ? 1 : -1;
}

/* ===== AI（單人模式的哪吒）===== */
function updateAI(dt){
  const f = p2, o = p1;
  aiThink -= dt;
  const dist = o.x - f.x;
  const ad = Math.abs(dist);
  const dir = dist > 0 ? 1 : -1;
  if(aiThink <= 0){
    aiThink = Math.max(0.08, 0.14 + Math.random() * 0.22 - (round - 1) * 0.015);
    const aggr = Math.min(0.92, 0.4 + 0.07 * round);
    if(ad > f.range * 0.8) aiMx = dir;
    else if(Math.random() < 0.22) aiMx = -dir;
    else aiMx = 0;
    if(ad < f.range * 1.05 && f.atkCd <= 0 && Math.random() < aggr) in2.atkBuf = 0.15;
    if(f.sp >= 100 && ad < f.range * 1.5 && f.atkTimer <= 0 && Math.random() < 0.55) in2.spBuf = 0.2;
    if(Math.random() < 0.05 && f.grounded) in2.jumpBuf = 0.12;
    if(o.atkTimer > 0 && Math.random() < 0.22 && f.grounded) in2.jumpBuf = 0.12;
  }
}

/* ===== play 狀態更新 ===== */
function playUpdate(dt){
  phaseT += dt;
  if(phase === 'intro' && phaseT > 1.1){ phase = 'fight'; phaseT = 0; }
  /* 玩家 1 輸入 */
  const l1 = keys.KeyA || (mode !== '2p' && keys.ArrowLeft) || touchIn.left;
  const r1 = keys.KeyD || (mode !== '2p' && keys.ArrowRight) || touchIn.right;
  in1.mx = (r1 ? 1 : 0) - (l1 ? 1 : 0);
  /* 玩家 2 / AI 輸入 */
  if(mode !== '2p'){
    if(phase === 'fight' && !p2.dead && !p1.dead) updateAI(dt);
    in2.mx = (phase === 'fight' && !p2.dead) ? aiMx : 0;
  }else{
    in2.mx = (keys.ArrowRight ? 1 : 0) - (keys.ArrowLeft ? 1 : 0);
  }
  updateFighter(p1, p2, in1, dt);
  updateFighter(p2, p1, in2, dt);
  /* KO 流程 */
  if(phase === 'ko' && phaseT > 1.15){
    if(mode !== '2p'){
      if(p2.dead){
        score += 500 + Math.round(p1.hp) * 5;
        wins1++;
        phase = 'roundwin'; phaseT = 0;
        sfx.win();
      }else{
        endGame(false);
      }
    }else{
      if(p2.dead) wins1++; else wins2++;
      endGame(p2.dead);
    }
  }
  if(phase === 'roundwin' && phaseT > 1.5){
    if(mode === 'ai' && round >= FINAL_ROUND){
      score += 1000; // 完賽獎勵
      endGame(true);
    }else{
      // 無盡模式無回合上限：一路變強直到落敗
      round++;
      resetRound(true);
    }
  }
  /* 數值緩動 */
  const k = 1 - Math.pow(0.02, dt);
  p1.hpShow += (p1.hp - p1.hpShow) * k;
  p2.hpShow += (p2.hp - p2.hpShow) * k;
  scoreShow += (score - scoreShow) * k;
}

function drawPagoda(x, baseY, s){

    ctx.lineTo(x + w / 2 - 8 * s, ry - 34 * s);
    ctx.lineTo(x - w / 2 + 8 * s, ry - 34 * s);

function drawBamboo(x, h, phase){
  const sway = Math.sin(T * 0.8 + phase) * 5;
  const seg = 7;
  ctx.lineCap = 'round';
  for(let i = 0; i < seg; i++){
    const t0 = i / seg, t1 = (i + 1) / seg;
    const x0 = x + sway * t0 * t0, y0 = GROUND_Y + 8 - h * t0;
    const x1 = x + sway * t1 * t1, y1 = GROUND_Y + 8 - h * t1;
    ctx.strokeStyle = '#1d4a30'; ctx.lineWidth = 10 - t0 * 4;
    ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1 + 2); ctx.stroke();
    ctx.strokeStyle = '#356e4b'; ctx.lineWidth = 5 - t0 * 2.5;
    ctx.beginPath(); ctx.moveTo(x0 - 1, y0); ctx.lineTo(x1 - 1, y1 + 2); ctx.stroke();
    ctx.strokeStyle = '#16301f'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x1 - 5, y1); ctx.lineTo(x1 + 5, y1); ctx.stroke();

  /* 竹葉 */
  ctx.fillStyle = '#2f6b45';
  const leaves = [[-12, h * 0.9, -0.5], [10, h * 0.78, 0.4], [-9, h * 0.66, -0.3]];

const hpGrads = new Map();
function drawHpBar(x, y, w, h, f, cTop, cBot, label, alignRight){
  ctx.font = 'bold 15px ' + FONT;
  ctx.textAlign = alignRight ? 'right' : 'left';
  ctx.fillStyle = '#fff';
  ctx.fillText(label, alignRight ? x + w : x, y - 6);
  rr(x, y, w, h, 6);
  ctx.fillStyle = 'rgba(0,0,0,.5)'; ctx.fill();
  /* 傷害殘影（緩動的淡色條） */
  const showW = w * clamp(f.hpShow / f.maxHp, 0, 1);
  const realW = w * clamp(f.hp / f.maxHp, 0, 1);
  ctx.save();
  rr(x, y, w, h, 6);
  ctx.clip();
  ctx.fillStyle = 'rgba(255,120,110,.65)';
  if(alignRight) ctx.fillRect(x + w - showW, y, showW, h);
  else ctx.fillRect(x, y, showW, h);
  let g = hpGrads.get(cTop);
  if(!g){
    g = ctx.createLinearGradient(0, y, 0, y + h);
    g.addColorStop(0, cTop); g.addColorStop(1, cBot);
    hpGrads.set(cTop, g);
  }
  ctx.fillStyle = g;
  if(alignRight) ctx.fillRect(x + w - realW, y, realW, h);
  else ctx.fillRect(x, y, realW, h);
  ctx.restore();
  rr(x, y, w, h, 6);
  /* v6：低血量邊框脈動警示 */
  const low = f.hp > 0 && f.hp / f.maxHp < 0.3;
  ctx.strokeStyle = low && Math.floor(T * 6) % 2 ? '#ff5a5a' : '#fff';
  ctx.lineWidth = low ? 3 : 2;
  ctx.stroke();
}

    ctx.moveTo(cx2 + 17, cy2 - 6); ctx.lineTo(cx2 + 9, cy2 + 6);

  }else{

function drawSpBar(x, y, w, f, alignRight){
  const h = 9;

  ctx.fillStyle = ready ? (Math.floor(T * 6) % 2 ? '#ffef9a' : '#7ad1ff') : '#9a7ce0';
  if(alignRight) ctx.fillRect(x + w - fw, y, fw, h);
  else ctx.fillRect(x, y, fw, h);
  rr(x, y, w, h, 4);
  ctx.strokeStyle = ready ? '#fff' : 'rgba(255,255,255,.55)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.font = 'bold 12px ' + FONT;

/* 測試掛鉤（自動化冒煙測試用，不影響遊戲） */
window.__smoke = () => ({ scene: stateName, phase, mode, round, wins1, score, cleared, bestEndless, x: p1.x, atkT: p1.atkTimer, sp: p1.sp, oppHp: p2.hp, parts: parts.length, ambN: ambNodes.length, koZoom });
window.__startMode = m => startGame(m); // 測試專用：直接進入指定模式

/* ===== 主迴圈：固定時間步進 60Hz ===== */
const STEP = 1 / 60;
let last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while(acc >= STEP){
    acc -= STEP;
    T += STEP;
    stateT += STEP;
    if(freeze > 0){ freeze -= STEP; continue; }   // hit-stop：跳過邏輯照常渲染
    shake *= Math.pow(0.001, STEP);
    for(const i of [in1, in2]){
      i.jumpBuf = Math.max(0, i.jumpBuf - STEP);
      i.atkBuf = Math.max(0, i.atkBuf - STEP);
      i.spBuf = Math.max(0, i.spBuf - STEP);
    }
    if(stateName === 'play') playUpdate(STEP);
    else if(stateName === 'over') overT += STEP;
    updateParts(STEP);
    updateFloaters(STEP);
    updatePetals(STEP);                            // v6：花瓣/圓環/鏡頭/蟲鳴
    updateRings(STEP);
    koZoom = Math.max(0, koZoom - STEP * 0.8);
    updateCrickets(STEP);
  }
  uiButtons = [];
  if(stateName === 'title') titleDraw();
  else if(stateName === 'play') playDraw();
  else overDraw();
}
requestAnimationFrame(frame);
