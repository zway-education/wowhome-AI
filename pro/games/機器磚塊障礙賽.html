<!doctype html>
<!-- 專業AI升級 v6：三主題天空離屏烘焙(星空/夕陽光暈/光帶)＋主題環境粒子(落葉/風絲/熔岩火星)＋金幣與終點旗加法光暈＋奔跑揚塵＋暗角vignette；音效新增程序化殘響ConvolverNode與主題環境音循環(草原風/高空氣流/熔岩隆隆，死亡時ducking)；全部漸層快取、主迴圈零createGradient -->
<!-- v5：觸控暫停/返回選單、移除UI表情符號改SVG圖示、直向裝置轉橫提示、死亡白閃強化打擊感 -->
<!-- +補強：角色精細化（跨步循環/分層陰影/輪廓線/雙表情）、大螢幕提醒浮層（手機一次性） -->
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="author" content="AI未來創作營隊">
<title>機器磚塊障礙賽 PRO</title>
<style>
  html,body{margin:0;height:100%;background:#0b1e3f;overflow:hidden;touch-action:none;
    -webkit-user-select:none;user-select:none;font-family:sans-serif}
  canvas{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);touch-action:none}
  #mute,#pause{position:fixed;top:10px;width:48px;height:48px;border-radius:12px;
    border:2px solid rgba(255,255,255,.5);background:rgba(0,0,0,.45);color:#fff;
    display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;touch-action:manipulation}
  #mute{right:10px}
  #pause{left:10px;display:none}
  #mute svg,#pause svg{width:24px;height:24px;pointer-events:none}
  #mute .wave{display:block}
  #mute.muted .wave{display:none}
  #mute .slash{display:none}
  #mute.muted .slash{display:block}
  #rotateHint{position:fixed;top:8px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.6);color:#fff;padding:6px 14px;border-radius:20px;
    font-size:13px;display:none;align-items:center;gap:6px;z-index:20;pointer-events:none;
    font-family:sans-serif;white-space:nowrap}
  #rotateHint svg{width:16px;height:16px;flex:none}
  #bigscreenHint{position:fixed;inset:0;z-index:9999;background:rgba(7,11,20,.9);
    display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;
    font-family:sans-serif;opacity:1;transition:opacity .35s ease;touch-action:none}
  #bigscreenHint.hide{opacity:0;pointer-events:none}
  #bigscreenHint .card{box-sizing:border-box;max-width:360px;width:100%;background:rgba(16,22,38,.96);
    border:1px solid rgba(255,255,255,.18);border-radius:16px;padding:30px 24px 24px;
    text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.55)}
  #bigscreenHint svg{margin-bottom:12px}
  #bigscreenHint h2{margin:0 0 10px;font-size:21px;font-weight:800;
    background:linear-gradient(92deg,#38e1ff,#4f7cff,#9a6bff);
    -webkit-background-clip:text;background-clip:text;color:transparent}
  #bigscreenHint p{margin:0 0 22px;font-size:14px;color:#cfd4de;line-height:1.6}
  #bigscreenHint button{box-sizing:border-box;width:100%;min-height:52px;border:none;border-radius:12px;
    background:linear-gradient(92deg,#38e1ff,#4f7cff,#9a6bff);color:#0a1020;
    font-size:16px;font-weight:800;cursor:pointer;touch-action:manipulation}
</style>
</head>
<body>
<div id="bigscreenHint" role="dialog" aria-label="建議使用大螢幕遊玩">
  <div class="card">
    <svg viewBox="0 0 24 24" width="42" height="42" fill="none" stroke="#38e1ff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="4" width="20" height="13" rx="2"/><path d="M8 21h8M12 17v4"/>
    </svg>
    <h2>建議使用大螢幕遊玩</h2>
    <p>用平板或電腦打開，體驗更完整</p>
    <button id="bigscreenHintBtn" type="button">知道了，繼續玩</button>
  </div>
</div>
<canvas id="game"></canvas>
<div id="mute" role="button" aria-label="靜音">
  <svg viewBox="0 0 24 24" fill="currentColor">
    <path d="M4 9v6h4l5 5V4L8 9H4z"/>
    <path class="wave" d="M16.5 12c0-1.77-1-3.29-2.5-4.03v8.06c1.5-.74 2.5-2.26 2.5-4.03z" stroke="currentColor" fill="currentColor"/>
    <path class="wave" d="M14 4.02v2.06c2.89.86 5 3.54 5 6.92s-2.11 6.06-5 6.92v2.06c4-.91 7-4.49 7-8.98s-3-8.07-7-8.98z"/>
    <path class="slash" d="M3 3l18 18" stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  </svg>
</div>
<div id="pause" role="button" aria-label="暫停">
  <svg viewBox="0 0 24 24"><rect x="6" y="5" width="4" height="14" rx="1.4" fill="currentColor"/><rect x="14" y="5" width="4" height="14" rx="1.4" fill="currentColor"/></svg>
</div>
<div id="rotateHint">
  <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="7" y="2" width="10" height="16" rx="2"/><path d="M20 8v10a2 2 0 0 1-2 2H9"/><path d="M17 17l3 3 3-3"/>
  </svg>
  請將裝置轉為橫向，體驗更完整
</div>
<script>
'use strict';

// ===== 大螢幕提醒浮層：只在手機顯示、一個 session 只跳一次，不擋遊戲載入 =====
(function(){
  const el = document.getElementById('bigscreenHint');
  try{
    const isPhone = Math.min(screen.width, screen.height) < 600 || innerWidth < 768;
    const seen = sessionStorage.getItem('bigscreen-hint');
    if(!isPhone || seen){ el.remove(); return; }
  }catch(e){ el.remove(); return; }
  document.getElementById('bigscreenHintBtn').addEventListener('pointerdown', e => {
    e.stopPropagation();
    try{ sessionStorage.setItem('bigscreen-hint', '1'); }catch(e2){}
    el.classList.add('hide');
    setTimeout(()=>el.remove(), 400);
  });
})();

const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize(){
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = Math.max(1, Math.round(GAME_W * scale * dpr));
  canvas.height = Math.max(1, Math.round(GAME_H * scale * dpr));
  canvas.style.width  = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale || 1;
  updateOrientHint();
}
// 直向裝置提示（不擋觸控，pointer-events:none）：畫面被過度壓縮時提醒玩家轉橫
const rotateHint = document.getElementById('rotateHint');
function updateOrientHint(){
  rotateHint.style.display = (innerWidth < innerHeight) ? 'flex' : 'none';
}
addEventListener('resize', resize); resize();

// ===== 輸入：鍵盤 + 觸控 =====
const input = { left:false, right:false, action:false, actionBuffer:0 };
const KEYMAP = { ArrowLeft:'left', KeyA:'left', ArrowRight:'right', KeyD:'right',
                 Space:'action', ArrowUp:'action', KeyW:'action' };
addEventListener('keydown', e => {
  if(e.code === 'Escape'){ if(state && state.back) state.back(); return; }
  if(e.code === 'KeyR'){ if(state === playState){ startLevel(curLevel); } return; }
  if(/^Digit[123]$/.test(e.code) && state === selectState){ selectState.pick(Number(e.code.slice(5))-1); return; }
  const a = KEYMAP[e.code]; if(!a) return; e.preventDefault();
  if(a === 'action' && !input.action) input.actionBuffer = 0.13;
  input[a] = true;
});
addEventListener('keyup', e => { const a = KEYMAP[e.code]; if(a) input[a] = false; });

function touchPos(t){
  const r = canvas.getBoundingClientRect();
  return { x:(t.clientX - r.left) / canvas._scale, y:(t.clientY - r.top) / canvas._scale };
}
// 觸控區（比圖示大 1.5 倍）：左下 ◀ ▶、右下大片 = 跳
function handleTouches(e){
  e.preventDefault();
  if(state !== playState){ input.left = input.right = input.action = false; return; }
  const wasAction = input.action;
  let L=false, R=false, J=false;
  for(const t of e.touches){
    const p = touchPos(t);
    if(p.y > GAME_H*0.5){
      if(p.x < GAME_W*0.14) L = true;
      else if(p.x < GAME_W*0.30) R = true;
      else if(p.x > GAME_W*0.55) J = true;
    } else if(p.x > GAME_W*0.55) J = true;
  }
  input.left = L; input.right = R; input.action = J;
  if(input.action && !wasAction) input.actionBuffer = 0.13;
}
for(const ev of ['touchstart','touchmove','touchend','touchcancel'])
  canvas.addEventListener(ev, handleTouches, { passive:false });

// UI 點擊（滑鼠 + 觸控都會觸發 pointerdown）
canvas.addEventListener('pointerdown', e => {
  const p = touchPos(e);
  if(state && state.tap) state.tap(p);
});

// ===== 音效：Web Audio + DynamicsCompressor 母線 =====
let AC = null, BUS = null, ambGain = null, ambOut = null, ambFilt = null;
function audio(){
  if(!AC){
    AC = new (window.AudioContext||window.webkitAudioContext)();
    const comp = AC.createDynamicsCompressor();
    comp.threshold.value = -18; comp.knee.value = 20; comp.ratio.value = 6;
    const master = AC.createGain(); master.gain.value = 0.9;
    comp.connect(master).connect(AC.destination);
    // v6：音效匯入節點 → 乾聲 + 程序化殘響（generated impulse ConvolverNode，小空間）
    const busIn = AC.createGain();
    busIn.connect(comp);
    try{
      const sr = AC.sampleRate, len = Math.floor(sr*1.1);
      const imp = AC.createBuffer(2, len, sr);
      for(let ch=0; ch<2; ch++){
        const d = imp.getChannelData(ch);
        for(let i=0;i<len;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/len, 2.4);
      }
      const conv = AC.createConvolver(); conv.buffer = imp;
      const wet = AC.createGain(); wet.gain.value = 0.16;
      busIn.connect(conv); conv.connect(wet); wet.connect(comp);
    }catch(e){}
    BUS = busIn;
    // v6：主題環境音循環（低通濾波噪聲：草原風/高空氣流/熔岩隆隆）＋LFO起伏
    try{
      const sr = AC.sampleRate, alen = Math.floor(sr*2.2);
      const abuf = AC.createBuffer(1, alen, sr);
      const ad = abuf.getChannelData(0); let v = 0;
      for(let i=0;i<alen;i++){ v = v*0.982 + (Math.random()*2-1)*0.07; ad[i] = v*2.2; }
      const src = AC.createBufferSource(); src.buffer = abuf; src.loop = true;
      ambFilt = AC.createBiquadFilter(); ambFilt.type = 'lowpass'; ambFilt.frequency.value = 420; ambFilt.Q.value = 0.4;
      ambGain = AC.createGain(); ambGain.gain.value = 0.05;
      const lfo = AC.createOscillator(); lfo.frequency.value = 0.14;
      const lg = AC.createGain(); lg.gain.value = 0.02;
      lfo.connect(lg); lg.connect(ambGain.gain);
      ambOut = AC.createGain(); ambOut.gain.value = muted ? 0 : 1;
      src.connect(ambFilt); ambFilt.connect(ambGain); ambGain.connect(ambOut); ambOut.connect(comp);
      src.start(); lfo.start();
      setAmbTheme();
    }catch(e){}
  }
  if(AC.state === 'suspended') AC.resume();
  return AC;
}
// v6：依主題切換環境音特性
function setAmbTheme(){
  if(!AC || !ambFilt) return;
  const t = AC.currentTime;
  const cfg = theme.deco==='lava' ? {f:140, g:0.075} : theme.deco==='cloud' ? {f:720, g:0.038} : {f:420, g:0.045};
  ambFilt.frequency.setTargetAtTime(cfg.f, t, 0.4);
  ambGain.gain.setTargetAtTime(cfg.g, t, 0.4);
}
// v6：主音效瞬間把環境音壓低（ducking），事件結束再回升
function duckAmb(){
  if(!AC || !ambGain) return;
  const t = AC.currentTime;
  const base = theme.deco==='lava' ? 0.075 : theme.deco==='cloud' ? 0.038 : 0.045;
  ambGain.gain.cancelScheduledValues(t);
  ambGain.gain.setValueAtTime(Math.max(0.001, ambGain.gain.value), t);
  ambGain.gain.linearRampToValueAtTime(base*0.2, t+0.05);
  ambGain.gain.linearRampToValueAtTime(base, t+1.1);
}
addEventListener('pointerdown', audio, { once:true });
addEventListener('keydown', audio, { once:true });

let muted = localStorage.getItem('obbyProV4_mute') === '1';
const muteBtn = document.getElementById('mute');
function updateMuteBtn(){
  muteBtn.classList.toggle('muted', muted);
  if(ambOut) ambOut.gain.value = muted ? 0 : 1;
}
updateMuteBtn();
muteBtn.addEventListener('pointerdown', e => {
  e.stopPropagation();
  muted = !muted;
  localStorage.setItem('obbyProV4_mute', muted ? '1' : '0');
  updateMuteBtn();
  if(!muted) beep(660, 0.08, 'square', 0.1);
});

// 暫停鈕（觸控裝置專用入口）：平板玩家沒有鍵盤 Esc/R，靠此鈕才能暫停/重新開始/回選關
const pauseBtn = document.getElementById('pause');
pauseBtn.addEventListener('pointerdown', e => {
  e.stopPropagation();
  if(state === playState){ audio(); beep(440, 0.06, 'square', 0.08); setState(pauseState); }
});

function beep(freq = 440, dur = 0.1, type = 'square', vol = 0.15, slide = 0){
  if(muted) return;
  const ac = audio(); if(!ac || !BUS) return;
  freq *= 1 + (Math.random()*0.08 - 0.04);       // 隨機音高 ±4%
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, ac.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), ac.currentTime + dur);
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g).connect(BUS);
  o.start(); o.stop(ac.currentTime + dur);
}
function noise(dur = 0.2, vol = 0.18){
  if(muted) return;
  const ac = audio(); if(!ac || !BUS) return;
  const n = Math.floor(ac.sampleRate * dur);
  const buf = ac.createBuffer(1, n, ac.sampleRate);
  const d = buf.getChannelData(0);
  for(let i = 0; i < n; i++) d[i] = (Math.random()*2-1) * (1 - i/n);
  const src = ac.createBufferSource(); src.buffer = buf;
  const g = ac.createGain(); g.gain.value = vol;
  src.connect(g).connect(BUS); src.start();
}

// ===== 粒子與飄字 =====
const parts = [];
function burst(x, y, color, n = 12, speed = 220){
  for(let i = 0; i < n && parts.length < 300; i++){
    const a = Math.random() * Math.PI * 2, s = speed * (0.3 + Math.random() * 0.7);
    parts.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s - 60, life:0.55, color });
  }
}
function updateParts(dt){
  for(const p of parts){ p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 600*dt; p.life -= dt; }
  for(let i = parts.length-1; i>=0; i--) if(parts[i].life<=0) parts.splice(i,1);
}
function drawParts(cx){
  for(const p of parts){
    ctx.globalAlpha = Math.max(0, p.life*1.9);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-cx-3, p.y-3, 6, 6);
  }
  ctx.globalAlpha = 1;
}
const floaters = [];
function floatText(x,y,text,color){ floaters.push({x,y,text,color,life:0.7}); }
function updateFloaters(dt){
  for(const f of floaters){ f.y -= 45*dt; f.life -= dt; }
  for(let i=floaters.length-1;i>=0;i--) if(floaters[i].life<=0) floaters.splice(i,1);
}
function drawFloaters(cx){
  ctx.textAlign='center'; ctx.font='bold 22px sans-serif'; ctx.textBaseline='alphabetic';
  for(const f of floaters){
    ctx.globalAlpha = Math.max(0,f.life/0.7);
    ctx.fillStyle = f.color;
    ctx.strokeStyle='rgba(0,0,0,.4)'; ctx.lineWidth=4;
    ctx.strokeText(f.text, f.x-cx, f.y);
    ctx.fillText(f.text, f.x-cx, f.y);
  }
  ctx.globalAlpha=1;
}

// ===== 物理參數（依設計指南反推）=====
const GRAV = 1660, GRAV_FALL = GRAV*1.6, JUMP_V = -630, MAX_FALL = 900;
const RUN_SPEED = 300, ACC = 2400, DEC = 3000, AIR_ACC = ACC*0.65;
const COYOTE = 0.09, PLAYER_W = 30, PLAYER_H = 42;
const SPRING_V = -980;

// ===== 主題（三關三色調）=====
const THEMES = [
  { name:'草原樂園', sky1:'#5c94fc', sky2:'#bfe3ff', hill:'rgba(0,160,80,.3)', hill2:'rgba(0,120,70,.18)',
    top:'#3ecf5a', topLit:'#8af09a', front:'#c9803a', front2:'#8a5424', side:'#6e401a',
    spike:'#5a6270', accent:'#ff6cc7', deco:'tree' },
  { name:'天空之城', sky1:'#2b3a8f', sky2:'#7fb2ff', hill:'rgba(255,255,255,.35)', hill2:'rgba(255,255,255,.18)',
    top:'#cfd8ea', topLit:'#ffffff', front:'#7583a8', front2:'#4a5578', side:'#39415e',
    spike:'#2f3550', accent:'#38e1ff', deco:'cloud' },
  { name:'熔岩挑戰', sky1:'#2a0f1c', sky2:'#7a2c1a', hill:'rgba(255,110,40,.22)', hill2:'rgba(255,80,20,.12)',
    top:'#8f8f9d', topLit:'#d9d9e6', front:'#5b4a52', front2:'#38292f', side:'#251a1f',
    spike:'#ffb02e', accent:'#ff7e3d', deco:'lava' }
];

// ===== v6：漸層快取（區塊/角色/彈簧/金幣都在固定座標系繪製，可重用；主迴圈零 createGradient）=====
const _gc = new Map();
function cg(key, maker){
  let g = _gc.get(key);
  if(!g){ g = maker(); _gc.set(key, g); }
  return g;
}
// v6：光暈 sprite（預繪，加法疊印用）
function makeGlowC(color, r){
  const c = document.createElement('canvas'); c.width = c.height = r*2;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(r,r,1, r,r,r);
  gr.addColorStop(0,color); gr.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle = gr; g.fillRect(0,0,r*2,r*2);
  return c;
}
const coinGlow = makeGlowC('rgba(255,205,117,.55)', 22);
const emberGlow = makeGlowC('rgba(255,150,60,.8)', 8);
const goalGlow = makeGlowC('rgba(255,207,92,.5)', 64);
// v6：三主題天空離屏烘焙（漸層/斜射光帶/太陽光暈/星空一次預繪）
const SKY_BAKES = THEMES.map((th, i) => {
  const c = document.createElement('canvas'); c.width = 960; c.height = 540;
  const g = c.getContext('2d');
  const sky = g.createLinearGradient(0,0,0,540);
  sky.addColorStop(0,th.sky1); sky.addColorStop(1,th.sky2);
  g.fillStyle = sky; g.fillRect(0,0,960,540);
  g.save();
  g.globalCompositeOperation = 'lighter';
  for(let b=0;b<3;b++){
    const lg = g.createLinearGradient(820,70,340+b*130,540);
    lg.addColorStop(0, th.deco==='lava' ? 'rgba(255,120,40,.09)' : 'rgba(255,250,220,.09)');
    lg.addColorStop(1,'rgba(255,255,255,0)');
    g.fillStyle = lg;
    g.beginPath();
    g.moveTo(800+b*24,58); g.lineTo(828+b*24,48);
    g.lineTo(440+b*140,540); g.lineTo(320+b*140,540);
    g.closePath(); g.fill();
  }
  g.restore();
  const sunG = g.createRadialGradient(820,80,10,820,80,60);
  if(th.deco==='lava'){ sunG.addColorStop(0,'#ffd9a0'); sunG.addColorStop(1,'rgba(255,120,40,0)'); }
  else { sunG.addColorStop(0,'#fff8d8'); sunG.addColorStop(1,'rgba(255,240,180,0)'); }
  g.fillStyle = sunG;
  g.beginPath(); g.arc(820,80,60,0,Math.PI*2); g.fill();
  if(i > 0){
    for(let s=0;s<64;s++){
      const x = (s*167)%960, y = (s*97)%250;
      g.globalAlpha = 0.22 + ((s*37)%50)/100;
      g.fillStyle = i===2 ? '#ffd9b0' : '#ffffff';
      const sz = s%11===0 ? 2.4 : 1.6;
      g.fillRect(x,y,sz,sz);
    }
    g.globalAlpha = 1;
  }
  return c;
});
// v6：熔岩海漸層條（烘焙）
const lavaStrip = (function(){
  const c = document.createElement('canvas'); c.width = 8; c.height = 24;
  const g = c.getContext('2d');
  const lg = g.createLinearGradient(0,0,0,24);
  lg.addColorStop(0,'#ff9a3c'); lg.addColorStop(1,'#c22c00');
  g.fillStyle = lg; g.fillRect(0,0,8,24);
  return c;
})();
// v6：暗角 vignette（低解析烘焙）
const vignetteC = (function(){
  const c = document.createElement('canvas'); c.width = 480; c.height = 270;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(240,128,140, 240,135,320);
  gr.addColorStop(0,'rgba(0,0,0,0)'); gr.addColorStop(0.75,'rgba(0,0,0,.08)'); gr.addColorStop(1,'rgba(6,10,20,.32)');
  g.fillStyle = gr; g.fillRect(0,0,480,270);

// v6：主題環境粒子（草原落葉/高空風絲/熔岩火星）——世界座標、鏡頭範圍內循環
let envParts = [];
function initEnv(){
  envParts = [];
  const n = theme.deco==='lava' ? 26 : 18;
  for(let i=0;i<n;i++){
    envParts.push({
      x: Math.random()*(GAME_W+160)-80, y: Math.random()*GAME_H,
      vx: theme.deco==='cloud' ? -(120+Math.random()*90) : -(14+Math.random()*22),
      vy: theme.deco==='lava' ? -(36+Math.random()*46) : (16+Math.random()*22),
      ph: Math.random()*Math.PI*2, s: 2+Math.random()*3
    });
  }
}
function updateEnv(dt){
  const L = cam.x-80, R2 = cam.x+GAME_W+80;
  for(const p of envParts){
    p.x += p.vx*dt; p.ph += dt;
    p.y += (theme.deco==='lava' ? p.vy : p.vy + Math.sin(p.ph*1.6)*8)*dt;
    if(theme.deco==='lava'){ if(p.y < 60){ p.y = GAME_H+8; p.x = L+Math.random()*(R2-L); } }
    else if(p.y > GAME_H+10){ p.y = -10; }
    if(p.x < L) p.x = R2; else if(p.x > R2) p.x = L;
  }
}
function drawEnv(cx){
  if(theme.deco==='lava'){
    ctx.save(); ctx.globalCompositeOperation = 'lighter';
    for(const p of envParts){
      ctx.globalAlpha = 0.5 + 0.4*Math.sin(p.ph*3);
      ctx.drawImage(emberGlow, p.x-cx-8+Math.sin(p.ph*2)*6, p.y-8);
    }
    ctx.restore(); ctx.globalAlpha = 1;
  } else if(theme.deco==='cloud'){
    ctx.strokeStyle = 'rgba(255,255,255,.3)'; ctx.lineWidth = 1.6; ctx.lineCap = 'round';
    for(const p of envParts){
      ctx.globalAlpha = 0.2 + 0.2*Math.sin(p.ph*2);
      ctx.beginPath(); ctx.moveTo(p.x-cx, p.y); ctx.lineTo(p.x-cx+26, p.y+2); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  } else {
    for(const p of envParts){
      ctx.save();
      ctx.translate(p.x-cx, p.y); ctx.rotate(Math.sin(p.ph*2)*0.9);
      ctx.globalAlpha = 0.65;
      ctx.fillStyle = p.s > 3.4 ? '#ff6cc7' : '#7ddc6a';
      ctx.fillRect(-p.s, -p.s*0.5, p.s*2, p.s);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }
}

function aabb(a,b){ return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }

// ===== 美術：偽 3D 磚塊（受光頂面 + 正面漸層 + 暗側面 + 圓豆凸點）=====
const D = 10; // 立體深度
function drawBlock3D(x,y,w,h){
  // 側面（右，最暗）
  ctx.fillStyle = theme.side;
  ctx.beginPath();
  ctx.moveTo(x+w,y); ctx.lineTo(x+w+D,y-D); ctx.lineTo(x+w+D,y+h-D); ctx.lineTo(x+w,y+h);
  ctx.closePath(); ctx.fill();
  // 正面（漸層 + 底部AO）——v6：垂直漸層與 x 無關，依 y/h/主題快取
  ctx.fillStyle = cg('bf'+theme.front+y+','+h, () => {
    const g = ctx.createLinearGradient(0,y,0,y+h);
    g.addColorStop(0, theme.front); g.addColorStop(1, theme.front2);
    return g;
  });
  ctx.fillRect(x,y,w,h);
  ctx.fillStyle = 'rgba(0,0,0,.22)';
  ctx.fillRect(x, y+h-4, w, 4);
  // 磚縫
  ctx.strokeStyle='rgba(0,0,0,.14)'; ctx.lineWidth=2;
  for(let bx=40; bx<w; bx+=40){ ctx.beginPath(); ctx.moveTo(x+bx,y); ctx.lineTo(x+bx,y+h); ctx.stroke(); }
  // 頂面（受光，平行四邊形）
  ctx.fillStyle = cg('bt'+theme.top+y, () => {
    const tg = ctx.createLinearGradient(0,y-D,0,y);
    tg.addColorStop(0, theme.topLit); tg.addColorStop(1, theme.top);
    return tg;
  });
  ctx.beginPath();
  ctx.moveTo(x,y); ctx.lineTo(x+D,y-D); ctx.lineTo(x+w+D,y-D); ctx.lineTo(x+w,y);
  ctx.closePath(); ctx.fill();
  // Roblox 式圓豆
  ctx.fillStyle = 'rgba(255,255,255,.4)';
  for(let bx=24; bx<w-8; bx+=40){
    ctx.beginPath(); ctx.ellipse(x+bx+D/2, y-D/2, 7, 3.4, 0, 0, Math.PI*2); ctx.fill();
  }
}
function drawSpikes3D(x,y,w,h){
  const n = Math.max(1, Math.floor(w/20));
  for(let i=0;i<n;i++){
    const sx = x+i*20;
    ctx.fillStyle = theme.spike;
    ctx.beginPath(); ctx.moveTo(sx,y+h); ctx.lineTo(sx+10,y); ctx.lineTo(sx+20,y+h); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,.35)'; // 受光面
    ctx.beginPath(); ctx.moveTo(sx,y+h); ctx.lineTo(sx+10,y); ctx.lineTo(sx+10,y+h); ctx.closePath(); ctx.fill();
  }
}
function drawSpring(s){
  const squish = s.anim > 0 ? 0.5 : 1;
  const top = s.y + s.h*(1-squish);
  ctx.strokeStyle='#c8ccd8'; ctx.lineWidth=3;
  ctx.beginPath();
  for(let i=0;i<3;i++){
    ctx.moveTo(s.x+6, top+4+i*(s.h*squish-6)/2.4);
    ctx.lineTo(s.x+s.w-6, top+7+i*(s.h*squish-6)/2.4);
  }
  ctx.stroke();
  ctx.fillStyle = cg('sp'+Math.round(top), () => {
    const g = ctx.createLinearGradient(0,top,0,top+6);
    g.addColorStop(0,'#ff9a5c'); g.addColorStop(1,'#e05a1e');
    return g;
  });
  ctx.fillRect(s.x-3, top-6, s.w+6, 8);
  ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.fillRect(s.x-3, top-6, s.w+6, 2);
}
function drawCoin(x,y,t){
  const bob = Math.sin(t*4 + x*0.05)*4;
  const spin = Math.abs(Math.cos(t*3 + x*0.07));
  ctx.save(); ctx.translate(x, y+bob); ctx.scale(Math.max(0.15,spin), 1);
  ctx.fillStyle = cg('coin', () => {
    const g = ctx.createRadialGradient(-4,-4,2,0,0,14);
    g.addColorStop(0,'#fff3c4'); g.addColorStop(0.55,'#ffcd75'); g.addColorStop(1,'#e8981e');
    return g;
  });
  ctx.beginPath(); ctx.arc(0,0,13,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#b06a10'; ctx.lineWidth=2.5; ctx.stroke();
  ctx.fillStyle='#b06a10'; ctx.font='bold 14px sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('$',0,1); ctx.textBaseline='alphabetic';
  ctx.restore();
}
function drawFlag(x,y,color,big,t){
  ctx.strokeStyle = '#7c5236'; ctx.lineWidth = big?6:4;
  ctx.beginPath(); ctx.moveTo(x, y+40); ctx.lineTo(x, y-(big?76:52)); ctx.stroke();
  ctx.fillStyle = '#e8e8f0';
  ctx.beginPath(); ctx.arc(x, y-(big?76:52), big?5:4, 0, Math.PI*2); ctx.fill();
  const wave = Math.sin(t*5 + x)* (big?5:3);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y-(big?74:50));
  ctx.quadraticCurveTo(x+(big?22:14), y-(big?70:46)+wave, x+(big?44:28), y-(big?62:42)+wave);
  ctx.lineTo(x, y-(big?46:32));
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,.15)';
  ctx.beginPath();
  ctx.moveTo(x, y-(big?60:41)); ctx.lineTo(x+(big?30:18), y-(big?58:40)+wave); ctx.lineTo(x, y-(big?46:32));
  ctx.closePath(); ctx.fill();
}

// ===== 角色：偽 3D 方塊機器人（分層部件＋輪廓線＋跨步循環＋雙表情，受光面 + 側面 + 面罩發光）=====
function drawBot(x,y,sx,sy,facing,legPhase,dead){
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(sx*(facing>=0?1:-1), sy);
  const w = PLAYER_W, h = PLAYER_H, d = 5;
  const legSwing = Math.sin(legPhase)*6;
  const strideX  = Math.sin(legPhase)*3.4;      // 前後跨步位移，走路更像真的在邁步
  const OUT = 'rgba(8,12,22,.55)';
  ctx.lineJoin = 'round';

  // 髖部 AO 陰影（腿與軀幹交界處變暗，加強立體銜接）
  ctx.fillStyle = 'rgba(0,0,0,.22)';
  ctx.beginPath(); ctx.ellipse(0, -19, w/2-2, 5, 0, 0, Math.PI*2); ctx.fill();

  // 腿（大腿／小腿分層 + 跨步 + 膝關節暗縫 + 鞋面高光 + 輪廓線）
  for(const [tag, lx, sw] of [['back', -w/2+3, legSwing],['front', w/2-12, -legSwing]]){
    const stride = tag === 'front' ? strideX : -strideX;
    const ly = -17 + sw*0.35;
    ctx.fillStyle = '#151d2b';
    ctx.fillRect(lx+stride, ly, 9, 17);
    ctx.fillStyle = '#3a5273';                  // 大腿（受光）
    ctx.fillRect(lx+stride, ly, 9, 7);
    ctx.fillStyle = 'rgba(0,0,0,.3)';            // 膝關節暗縫
    ctx.fillRect(lx+stride, ly+7, 9, 1.6);
    ctx.strokeStyle = OUT; ctx.lineWidth = 1.2;
    ctx.strokeRect(lx+stride+0.6, ly+0.6, 8, 15.8);
    ctx.fillStyle = '#0e1420';                   // 鞋
    ctx.fillRect(lx+stride-1, -3+sw*0.35, 11, 4);
    ctx.fillStyle = 'rgba(255,255,255,.22)';
    ctx.fillRect(lx+stride-1, -3+sw*0.35, 11, 1.3);
  }

  // 軀幹：正面漸層 + 右側暗面 + 頂面亮 + 輪廓線（v6：局部座標固定 → 快取）
  const bodyY = -h+13, bodyH = h-30;
  const g = cg('botbody', () => {
    const bg = ctx.createLinearGradient(-w/2,bodyY,w/2,bodyY+bodyH);
    bg.addColorStop(0,'#ff5a3c'); bg.addColorStop(0.6,'#f83800'); bg.addColorStop(1,'#a82600');
    return bg;
  });
  ctx.fillStyle = '#7d1c00';
  ctx.beginPath();
  ctx.moveTo(w/2,bodyY); ctx.lineTo(w/2+d,bodyY-d); ctx.lineTo(w/2+d,bodyY+bodyH-d); ctx.lineTo(w/2,bodyY+bodyH);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = g;
  ctx.fillRect(-w/2, bodyY, w, bodyH);
  ctx.strokeStyle = OUT; ctx.lineWidth = 1.4;
  ctx.strokeRect(-w/2+0.7, bodyY+0.7, w-1.4, bodyH-1.4);
  ctx.fillStyle = '#ffb59e';
  ctx.beginPath();
  ctx.moveTo(-w/2,bodyY); ctx.lineTo(-w/2+d,bodyY-d); ctx.lineTo(w/2+d,bodyY-d); ctx.lineTo(w/2,bodyY);
  ctx.closePath(); ctx.fill();
  // 胸前能量核心（光暈 + 核心 + 高光點）
  ctx.fillStyle = 'rgba(56,225,255,.35)';
  ctx.beginPath(); ctx.arc(0, bodyY+bodyH/2, 7, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#38e1ff';
  ctx.beginPath(); ctx.arc(0, bodyY+bodyH/2, 4.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.8)';
  ctx.beginPath(); ctx.arc(-1.5, bodyY+bodyH/2-1.5, 1.8, 0, Math.PI*2); ctx.fill();

  // 手臂（上臂／前臂分層 + 擺動 + 拳頭 + 輪廓線）
  const armSwing = Math.sin(legPhase)*5;
  for(const [ax, sw] of [[-w/2-7, armSwing*0.4],[w/2, -armSwing*0.4]]){
    ctx.fillStyle = '#c22c00';                   // 上臂（受光）
    ctx.fillRect(ax, bodyY+3+sw, 7, 15);
    ctx.fillStyle = '#8f2000';                   // 前臂（背光）
    ctx.fillRect(ax, bodyY+18+sw, 7, 6);
    ctx.strokeStyle = OUT; ctx.lineWidth = 1;
    ctx.strokeRect(ax+0.5, bodyY+3.5+sw, 6, 20);
    ctx.fillStyle = '#5c1400';                   // 拳頭
    ctx.beginPath(); ctx.arc(ax+3.5, bodyY+24+sw, 4, 0, Math.PI*2); ctx.fill();
  }

  // 頭（金屬灰 + 頂面 + 輪廓線 + 發光面罩）
  const headY = -h, headH = 15;
  ctx.fillStyle = '#79808f';
  ctx.beginPath();
  ctx.moveTo(w/2-4,headY); ctx.lineTo(w/2-4+d,headY-d); ctx.lineTo(w/2-4+d,headY+headH-d); ctx.lineTo(w/2-4,headY+headH);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = cg('bothead', () => {
    const hg = ctx.createLinearGradient(0,headY,0,headY+headH);
    hg.addColorStop(0,'#e6eaf2'); hg.addColorStop(1,'#aab2c2');
    return hg;
  });
  ctx.fillRect(-w/2+4, headY, w-8, headH);
  ctx.strokeStyle = OUT; ctx.lineWidth = 1.2;
  ctx.strokeRect(-w/2+4.5, headY+0.5, w-9, headH-1);
  ctx.fillStyle = '#f6f8fc';
  ctx.beginPath();
  ctx.moveTo(-w/2+4,headY); ctx.lineTo(-w/2+4+d,headY-d); ctx.lineTo(w/2-4+d,headY-d); ctx.lineTo(w/2-4,headY);
  ctx.closePath(); ctx.fill();
  // 面罩：兩種表情狀態 —— 平常＝雙眼＋微笑弧線／受擊＝X 眼＋驚呼嘴
  ctx.fillStyle = '#101826';
  ctx.fillRect(-w/2+7, headY+3, w-14, 10);
  if(dead){
    ctx.strokeStyle = '#ff6cc7'; ctx.lineWidth = 1.6;
    for(const ex of [-5, 4]){
      ctx.beginPath();
      ctx.moveTo(ex-2, headY+6); ctx.lineTo(ex+2, headY+10);
      ctx.moveTo(ex+2, headY+6); ctx.lineTo(ex-2, headY+10);
      ctx.stroke();
    }
    ctx.fillStyle = '#ff6cc7';                   // 驚呼嘴（O 形）
    ctx.beginPath(); ctx.ellipse(0, headY+11.4, 2.2, 2.6, 0, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle = '#38e1ff';
    ctx.fillRect(-6, headY+5, 4, 4);
    ctx.fillRect(3, headY+5, 4, 4);
    ctx.strokeStyle = '#38e1ff'; ctx.lineWidth = 1.3; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(0, headY+9.5, 3, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke(); // 微笑嘴
  }
  // 天線
  ctx.strokeStyle = '#79808f'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0,headY); ctx.lineTo(0,headY-7); ctx.stroke();
  ctx.fillStyle = '#ff6cc7';
  ctx.beginPath(); ctx.arc(0,headY-8,2.6,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ===== 背景（視差 + 主題裝飾）=====
function drawBackground(camX, t){
  // v6：整片天空（漸層/光帶/太陽/星空）改離屏烘焙，一次 drawImage
  ctx.drawImage(SKY_BAKES[Math.max(0, THEMES.indexOf(theme))], 0, 0);
  // 遠山（兩層視差）
  for(const [f, col, hgt] of [[0.15, theme.hill2, 200],[0.35, theme.hill, 150]]){
    ctx.fillStyle = col;
    for(let i=-1;i<4;i++){
      const wx = i*420 - (camX*f)%420;
      ctx.beginPath();
      ctx.moveTo(wx,GAME_H); ctx.lineTo(wx+210,GAME_H-hgt); ctx.lineTo(wx+420,GAME_H); ctx.closePath(); ctx.fill();
    }
  }
  // 雲（視差）
  ctx.fillStyle = theme.deco==='lava' ? 'rgba(90,40,50,.5)' : 'rgba(255,255,255,.85)';
  for(let i=0;i<5;i++){
    const wx = ((i*260+70) - camX*0.25) % (GAME_W+200) ;
    const x = wx < -100 ? wx + GAME_W+200 : wx;
    const y = 55+((i*47)%90);
    ctx.beginPath();
    ctx.ellipse(x,y,38,17,0,0,Math.PI*2);
    ctx.ellipse(x+30,y+6,26,13,0,0,Math.PI*2);
    ctx.ellipse(x-30,y+6,24,12,0,0,Math.PI*2);
    ctx.fill();
  }
  // 中景裝飾（樹 / 浮雲柱 / 岩柱）
  for(let i=0;i<8;i++){
    const wx = i*520 - (camX*0.6)%520;
    if(theme.deco==='tree'){
      ctx.fillStyle='rgba(90,55,30,.5)'; ctx.fillRect(wx+8,GAME_H-120,12,60);
      ctx.fillStyle='rgba(20,130,60,.5)';
      ctx.beginPath(); ctx.arc(wx+14,GAME_H-130,32,0,Math.PI*2); ctx.fill();
    } else if(theme.deco==='cloud'){
      ctx.fillStyle='rgba(255,255,255,.3)';
      ctx.beginPath(); ctx.ellipse(wx,GAME_H-100,50,16,0,0,Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle='rgba(40,20,25,.6)';
      ctx.beginPath();
      ctx.moveTo(wx-30,GAME_H); ctx.lineTo(wx,GAME_H-160); ctx.lineTo(wx+30,GAME_H); ctx.closePath(); ctx.fill();
    }
  }
  // 熔岩海（第三關）——v6：漸層條烘焙
  if(theme.deco==='lava'){
    ctx.drawImage(lavaStrip, 0, GAME_H-24, GAME_W, 24);
    ctx.fillStyle = 'rgba(255,220,120,.7)';
    for(let i=0;i<8;i++){
      const bx = (i*140 + t*40)%GAME_W;
      const by = GAME_H-12 + Math.sin(t*3+i)*4;
      ctx.beginPath(); ctx.arc(bx,by,3+((i*7)%4),0,Math.PI*2); ctx.fill();
    }
  }
}

// ===== 世界繪製 =====
function drawWorld(legPhase){
  drawBackground(cam.x, worldT);
  ctx.save();
  ctx.translate((Math.random()*2-1)*shake, (Math.random()*2-1)*shake);
  const cx = cam.x;
  for(const p of lv.plats){
    if(p.x+p.w < cx-40 || p.x > cx+GAME_W+40) continue;
    drawBlock3D(p.x-cx, p.y, p.w, p.h);
  }
  for(const m of lv.movers){
    if(m.x+m.w < cx-60 || m.x > cx+GAME_W+60) continue;
    drawBlock3D(m.x-cx, m.y, m.w, m.h);
    ctx.fillStyle='rgba(255,255,255,.5)'; // 移動平台標記
    ctx.beginPath(); ctx.arc(m.x-cx+m.w/2, m.y+m.h/2, 4, 0, Math.PI*2); ctx.fill();
  }
  for(const s of lv.spikes){
    if(s.x+s.w < cx-40 || s.x > cx+GAME_W+40) continue;
    drawSpikes3D(s.x-cx, s.y, s.w, s.h);
  }
  for(const s of lv.springs){
    if(s.x+s.w < cx-40 || s.x > cx+GAME_W+40) continue;
    drawSpring({...s, x:s.x-cx, anim:s.anim||0});
  }
  // v6：金幣加法光暈（烘焙 sprite 疊印，微 bloom）
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for(const c of lv.coins){
    if(c.taken || c.x < cx-40 || c.x > cx+GAME_W+40) continue;
    ctx.globalAlpha = 0.5 + 0.3*Math.sin(worldT*4 + c.x*0.05);
    ctx.drawImage(coinGlow, c.x-cx-22, c.y-22 + Math.sin(worldT*4 + c.x*0.05)*4);
  }
  ctx.restore(); ctx.globalAlpha = 1;
  for(const c of lv.coins){
    if(c.taken || c.x < cx-40 || c.x > cx+GAME_W+40) continue;
    drawCoin(c.x-cx, c.y, worldT);
  }
  for(const c of lv.cps){
    if(c.x < cx-60 || c.x > cx+GAME_W+60) continue;
    drawFlag(c.x-cx, c.y, c.used ? '#41a6f6' : '#9aa0aa', false, worldT);
  }
  // v6：終點旗金色光暈（脈動）
  if(lv.goalX > cx-120 && lv.goalX < cx+GAME_W+120){
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.55 + 0.3*Math.sin(worldT*2.4);
    ctx.drawImage(goalGlow, lv.goalX-cx-64, 356-64+40);
    ctx.restore(); ctx.globalAlpha = 1;
  }
  drawFlag(lv.goalX-cx, 430, '#ffcf5c', true, worldT);
  drawEnv(cx);
  // 玩家陰影（跳越高越小）
  const shadowW = Math.max(6, 22 - Math.abs(player.vy)/40);
  ctx.fillStyle='rgba(0,0,0,.28)';
  ctx.beginPath();
  ctx.ellipse(player.x+player.w/2-cx, player.y+player.h+3, shadowW, 5, 0,0,Math.PI*2); ctx.fill();
  drawBot(player.x+player.w/2-cx, player.y+player.h, player.sx, player.sy, player.facing, legPhase, player.dead);
  drawParts(cx);
  drawFloaters(cx);
  ctx.restore();
}

}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function drawStar(x,y,r,fill){
  ctx.beginPath();
  for(let i=0;i<10;i++){
    const rr = i%2===0 ? r : r*0.45;
    const a = -Math.PI/2 + i*Math.PI/5;
    ctx[i===0?'moveTo':'lineTo'](x+Math.cos(a)*rr, y+Math.sin(a)*rr);
  }
  ctx.closePath();
  ctx.fillStyle = fill ? '#ffcf5c' : 'rgba(0,0,0,.28)';
  ctx.fill();
  if(fill){ ctx.strokeStyle='#c88a10'; ctx.lineWidth=2; ctx.stroke(); }
}
// 手繪操作圖示（取代 emoji，符合設計語言「圖示用SVG/向量繪製」規範）
function drawKbdIcon(cx, cy){
  ctx.save(); ctx.translate(cx, cy);
  ctx.fillStyle = '#38e1ff'; roundRect(-15,-10,30,20,4); ctx.fill();
  ctx.fillStyle = '#0a1730';
  for(let r=0;r<2;r++) for(let c=0;c<4;c++) ctx.fillRect(-12+c*7.4, -7+r*9, 5.4, 5.4);
  ctx.restore();
}
function drawTabletIcon(cx, cy){
  ctx.save(); ctx.translate(cx, cy);
  ctx.fillStyle = '#9a6bff'; roundRect(-11,-15,22,30,4); ctx.fill();
  ctx.fillStyle = '#0a1730'; ctx.fillRect(-8,-11,16,20);
  ctx.fillStyle = 'rgba(255,255,255,.75)';
  ctx.beginPath(); ctx.arc(0,12,1.8,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
// 圖示＋文字整組置中畫一行（取代原本的 emoji + fillText 寫法）
function drawIconLine(iconFn, text, cx, y, font){
  ctx.font = font; ctx.textAlign = 'left';
  const tw = ctx.measureText(text).width, gap = 34;
  const startX = cx - (tw+gap)/2;
  iconFn(startX + gap/2, y - 7);
  ctx.fillText(text, startX + gap, y);
  ctx.textAlign = 'center';
}

// ===== 狀態機 =====
let state;
function setState(s){
  state = s; if(s.enter) s.enter();
  // 暫停鈕只在遊玩中顯示（平板玩家的暫停/重來/回選關入口）
  pauseBtn.style.display = (s === playState) ? 'flex' : 'none';
}

const selectState = {
  enter(){ this.t = 0; this.cursor = 0;
    while(this.cursor < 2 && !unlocked(this.cursor) ) this.cursor++;
  },
  back(){ setState(menuState); },
  cardRect(i){ return { x: 90 + i*270, y: 170, w: 240, h: 250 }; },
  pick(i){
    if(i<0 || i>2) return;
    if(!unlocked(i)){ beep(180,0.15,'sawtooth',0.12,-60); shake = 4; return; }
    beep(660,0.09,'square',0.12); beep(880,0.09,'square',0.1);
    startLevel(i);
  },
  update(dt){
    worldT += dt; this.t += dt;
    shake *= Math.pow(0.001, dt);
    if(input.left){ input.left=false; this.cursor = Math.max(0, this.cursor-1); beep(440,0.05,'square',0.08); }
    if(input.right){ input.right=false; this.cursor = Math.min(2, this.cursor+1); beep(440,0.05,'square',0.08); }
    if(input.actionBuffer > 0 && this.t > 0.3){ input.actionBuffer = 0; this.pick(this.cursor); }
  },
  tap(p){
    for(let i=0;i<3;i++){
      const r = this.cardRect(i);
      if(p.x>=r.x && p.x<=r.x+r.w && p.y>=r.y && p.y<=r.y+r.h){ this.cursor=i; this.pick(i); return; }
    }
    if(p.y > 460) setState(menuState);
  },
  draw(){
    theme = THEMES[0];
    drawBackground(worldT*30, worldT);
    ctx.save();
    ctx.translate((Math.random()*2-1)*shake, 0);
    ctx.textAlign='center';
    ctx.font='bold 42px sans-serif'; ctx.fillStyle='#fcfcfc';
    ctx.strokeStyle='rgba(20,20,50,.5)'; ctx.lineWidth=7;
    ctx.strokeText('選擇關卡', GAME_W/2, 110);
    ctx.fillText('選擇關卡', GAME_W/2, 110);
    for(let i=0;i<3;i++){
      const r = this.cardRect(i);
      const un = unlocked(i);
      const sel = this.cursor === i;
      const lift = sel ? Math.sin(worldT*4)*4-6 : 0;
      ctx.save();
      ctx.translate(0, lift);
      ctx.fillStyle = un ? 'rgba(10,20,40,.55)' : 'rgba(10,10,15,.7)';
      roundRect(r.x, r.y, r.w, r.h, 16); ctx.fill();
      if(sel){ ctx.strokeStyle='#38e1ff'; ctx.lineWidth=4; roundRect(r.x, r.y, r.w, r.h, 16); ctx.stroke(); }
      // 主題縮圖
      const th = THEMES[LEVELS[i].theme];
      ctx.fillStyle = cg('thumb'+i, () => {
        const tg = ctx.createLinearGradient(0,r.y+16,0,r.y+110);
        tg.addColorStop(0, th.sky1); tg.addColorStop(1, th.sky2);
        return tg;
      });
      roundRect(r.x+14, r.y+16, r.w-28, 94, 10); ctx.fill();
      ctx.fillStyle = th.top;
      ctx.fillRect(r.x+14, r.y+92, r.w-28, 18);
      ctx.fillStyle = th.front;
      ctx.fillRect(r.x+60, r.y+70, 40, 22);
      ctx.fillStyle = th.hill;
      ctx.beginPath();
      ctx.moveTo(r.x+120, r.y+110); ctx.lineTo(r.x+165, r.y+40); ctx.lineTo(r.x+210, r.y+110);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle='#fcfcfc'; ctx.font='bold 24px sans-serif';
      ctx.fillText('第'+(i+1)+'關', r.x+r.w/2, r.y+148);
      ctx.font='bold 20px sans-serif'; ctx.fillStyle = un ? '#ffcf5c' : '#777';
      ctx.fillText(LEVELS[i].name, r.x+r.w/2, r.y+178);
      // 星星
      for(let s=0;s<3;s++)
        drawStar(r.x+r.w/2 + (s-1)*44, r.y+212, 16, un && progress.stars[i] > s);
      if(!un){
        ctx.fillStyle='#cfd4de'; ctx.font='bold 17px sans-serif';
        ctx.fillText('通過前一關解鎖', r.x+r.w/2, r.y+240);
      } else if(progress.bestTime[i] > 0){
        ctx.fillStyle='#9fd8ff'; ctx.font='16px sans-serif';
        ctx.fillText('最佳 '+progress.bestTime[i].toFixed(1)+'s', r.x+r.w/2, r.y+240);
      }
      ctx.restore();
    }
    ctx.fillStyle='#1a1c2c';
    drawIconLine(drawKbdIcon, '← → 選關、空白鍵確認', GAME_W/2-125, 480, 'bold 18px sans-serif');
    drawIconLine(drawTabletIcon, '直接點關卡卡片', GAME_W/2+150, 480, 'bold 18px sans-serif');
    ctx.restore();
  }
};

const playState = {
  enter(){ this.legPhase = 0; },
  back(){ setState(selectState); },
  update(dt){
    elapsed += dt; worldT += dt;
    flashA *= Math.pow(0.0006, dt);   // 打擊白閃快速衰減（約0.12s歸零，呼應hit-stop時長）
    if(hintT > 0) hintT -= dt;
    updateEnv(dt);
    // v6：奔跑揚塵——地面高速移動時週期性揚起小塵埃
    this.dustT = (this.dustT||0) - dt;
    if(player.grounded && Math.abs(player.vx) > 200 && this.dustT <= 0){
      this.dustT = 0.12;
      parts.push({ x:player.x+player.w/2 - player.facing*10, y:player.y+player.h-2,
        vx:-player.facing*(40+Math.random()*50), vy:-(30+Math.random()*40), life:0.4, color:'rgba(255,255,255,.5)' });
    }
    // 移動平台
    for(const m of lv.movers){
      m.px = m.x;
      m.x = m.baseX + Math.sin(worldT*m.speed)*m.range;
    }
    for(const s of lv.springs) if(s.anim > 0) s.anim -= dt;
    if(player.dead){
      updateParts(dt); updateFloaters(dt);
      shake *= Math.pow(0.001, dt);
      this.deadT += dt;
      if(this.deadT > 0.45){ respawn(); }
      return;
    }
    // 被移動平台載著走
    if(player.standOn && lv.movers.includes(player.standOn))
      player.x += player.standOn.x - player.standOn.px;

    const wantDir = (input.left?-1:0) + (input.right?1:0);
    const accel = player.grounded ? ACC : AIR_ACC;
    if(wantDir !== 0){
      const turning = Math.sign(player.vx) !== 0 && Math.sign(player.vx) !== wantDir;
      player.vx += wantDir*accel*(turning?2:1)*dt;
      player.vx = Math.max(-RUN_SPEED, Math.min(RUN_SPEED, player.vx));
      player.facing = wantDir;
      if(player.grounded) this.legPhase += dt*11;
    } else {
      const dec = player.grounded ? DEC : AIR_ACC;
      if(player.vx>0) player.vx = Math.max(0, player.vx-dec*dt);
      else if(player.vx<0) player.vx = Math.min(0, player.vx+dec*dt);
    }
    // 土狼時間 + 跳躍緩衝
    if(player.grounded) player.coyote = COYOTE; else player.coyote -= dt;
    if(input.actionBuffer > 0 && player.coyote > 0){
      player.vy = JUMP_V;
      player.coyote = 0; input.actionBuffer = 0; player.grounded = false; player.standOn = null;
      player.sx = 0.72; player.sy = 1.35;
      burst(player.x+player.w/2, player.y+player.h, 'rgba(255,255,255,.9)', 5, 90);
      beep(200,0.15,'square',0.12,400);
      noise(0.06, 0.05);   // v6：跳躍疊噪聲層，更有蹬地感
    }
    // 可變跳高
    if(!input.action && player.vy < -120) player.vy *= Math.pow(0.02, dt*3);
    // 重力 + 頂點懸浮
    let g = player.vy < 0 ? GRAV : GRAV_FALL;
    if(Math.abs(player.vy) < 40) g *= 0.5;
    player.vy = Math.min(player.vy + g*dt, MAX_FALL);

    const solids = lv.plats.concat(lv.movers);
    // X 軸
    player.x += player.vx*dt;
    if(player.x < 0){ player.x = 0; player.vx = Math.max(0, player.vx); }
    for(const p of solids){
      if(aabb(player,p)){
        if(player.vx > 0) player.x = p.x - player.w;
        else if(player.vx < 0) player.x = p.x + p.w;
        else player.x = (player.x+player.w/2 < p.x+p.w/2) ? p.x - player.w : p.x + p.w;
        player.vx = 0;
      }
    }
    // Y 軸
    const wasGrounded = player.grounded;
    player.grounded = false; player.standOn = null;
    player.y += player.vy*dt;
    for(const p of solids){
      if(aabb(player,p)){
        if(player.vy > 0){
          player.y = p.y - player.h; player.vy = 0;
          player.grounded = true; player.standOn = p;
        } else if(player.vy < 0){
          // 角落修正：撞到天花板邊角時左右推移 ≤8px
          let fixed = false;
          for(const off of [-8,-5,5,8]){
            const test = {x:player.x+off, y:player.y, w:player.w, h:player.h};
            if(!solids.some(s2 => aabb(test,s2))){ player.x += off; fixed = true; break; }
          }
          if(!fixed){ player.y = p.y + p.h; player.vy = 0; }
        }
      }
    }
    if(!wasGrounded && player.grounded){
      player.sx = 1.35; player.sy = 0.65;
      burst(player.x+player.w/2, player.y+player.h, 'rgba(255,255,255,.6)', 4, 80);
      beep(120,0.06,'triangle',0.1);
    }
    player.sx += (1-player.sx)*12*dt; player.sy += (1-player.sy)*12*dt;

    // 彈簧
    for(const s of lv.springs){
      const pad = {x:s.x, y:s.y-6, w:s.w, h:s.h+6};
      if(player.vy >= 0 && aabb(player, pad)){
        player.y = s.y - player.h;
        player.vy = SPRING_V; player.grounded = false; player.standOn = null;
        player.sx = 0.6; player.sy = 1.5;
        s.anim = 0.25;
        burst(s.x+s.w/2, s.y, '#ff9a5c', 10, 200);
        beep(240,0.22,'square',0.14,620);
        beep(480,0.16,'triangle',0.08,700);   // v6：彈簧雙層合成音
        noise(0.08, 0.06);
      }
    }
    // 死亡：掉落 / 尖刺（受擊箱縮小 → 寬容）
    let died = player.y > GAME_H + 60;
    const hb = {x:player.x+6, y:player.y+8, w:player.w-12, h:player.h-12};
    for(const s of lv.spikes) if(aabb(hb,s)) died = true;
    if(died){
      player.dead = true; this.deadT = 0; deaths++;
      freeze = 0.12; shake = 10; flashA = 0.6; flashColor = '255,255,255';
      burst(player.x+player.w/2, player.y+player.h/2, '#f83800', 24, 260);
      burst(player.x+player.w/2, player.y+player.h/2, '#ffcf5c', 10, 200);
      noise(0.25, 0.2);
      beep(220,0.3,'sawtooth',0.18,-150);
      duckAmb();
      return;
    }
    // 金幣
    for(const c of lv.coins){
      if(c.taken) continue;
      const cb = {x:c.x-16, y:c.y-16, w:32, h:32};
      if(aabb(player,cb)){
        c.taken = true; coinCount++;
        burst(c.x, c.y, '#ffcd75', 12, 180);
        floatText(c.x, c.y-8, '+1', '#ffcf5c');
        beep(988,0.08,'square',0.12);
        setTimeout(()=>beep(1319,0.14,'square',0.1), 70);
      }
    }
    // 檢查點
    for(const c of lv.cps){
      if(!c.used && Math.abs(player.x - c.x) < 40 && player.y > c.y - 90 && player.y < c.y + 60){
        c.used = true;
        player.spawnX = c.x; player.spawnY = c.y - 10;
        floatText(c.x, c.y - 60, '檢查點！', '#41a6f6');
        burst(c.x, c.y - 40, '#41a6f6', 10, 160);
        beep(660,0.1,'square',0.1); setTimeout(()=>beep(880,0.12,'square',0.08), 90);
      }
    }
    // 終點
    if(player.x + player.w/2 > lv.goalX){ setState(winState); return; }
    // 鏡頭
    const targetCamX = Math.max(0, Math.min(lv.len-GAME_W, player.x - GAME_W*0.4));
    cam.x += (targetCamX - cam.x) * (1 - Math.pow(0.01, dt));

    updateParts(dt); updateFloaters(dt);
    shake *= Math.pow(0.001, dt);
  },
  draw(){
    drawWorld(this.legPhase||0);
    drawHUD();
    if(flashA > 0.01){ ctx.fillStyle = `rgba(${flashColor},${flashA})`; ctx.fillRect(0,0,GAME_W,GAME_H); }
  }
};

// ===== 暫停狀態（觸控裝置唯一的暫停/重新開始/回選關入口，鍵盤仍可用 Esc/R）=====
const pauseState = {
  enter(){ this.t = 0; },
  back(){ setState(playState); },   // Esc 鍵：暫停中按 Esc＝恢復遊戲
  btnRects(){
    return [
      { x:GAME_W/2-150, y:230, w:300, h:56, label:'▶ 繼續遊戲', act:'resume' },
      { x:GAME_W/2-150, y:300, w:300, h:56, label:'重新開始', act:'retry' },
      { x:GAME_W/2-150, y:370, w:300, h:56, label:'回選關', act:'select' }
    ];
  },
  doAct(act){
    beep(660,0.08,'square',0.1);
    if(act === 'resume') setState(playState);
    else if(act === 'retry') startLevel(curLevel);
    else setState(selectState);
  },
  tap(p){
    for(const b of this.btnRects())
      if(p.x>=b.x && p.x<=b.x+b.w && p.y>=b.y && p.y<=b.y+b.h){ this.doAct(b.act); return; }
  },
  update(dt){
    this.t += dt;
    if(input.actionBuffer > 0 && this.t > 0.15){ input.actionBuffer = 0; this.doAct('resume'); }
  },
  draw(){
    playState.draw();
    ctx.fillStyle = 'rgba(7,11,20,.68)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.textAlign = 'center';
    ctx.font = 'bold 40px sans-serif'; ctx.fillStyle = '#fcfcfc';
    ctx.strokeStyle = 'rgba(0,0,0,.5)'; ctx.lineWidth = 6;
    ctx.strokeText('遊戲暫停', GAME_W/2, 165);
    ctx.fillText('遊戲暫停', GAME_W/2, 165);
    for(const b of this.btnRects()){
      ctx.fillStyle = 'rgba(79,124,255,.85)';
      roundRect(b.x,b.y,b.w,b.h,14); ctx.fill();
      ctx.strokeStyle = '#38e1ff'; ctx.lineWidth = 3;
      roundRect(b.x,b.y,b.w,b.h,14); ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 22px sans-serif';
      ctx.fillText(b.label, b.x+b.w/2, b.y+36);
    }
    ctx.font = '16px sans-serif'; ctx.fillStyle = '#9fb2d8';
    ctx.fillText('空白鍵／Esc＝繼續遊戲', GAME_W/2, 450);
  }
};

const winState = {
  enter(){
    this.t = 0;
    // 星星：通關 1 顆、金幣 ≥80% 加 1、時間 ≤par 加 1
    this.stars = 1;
    if(coinCount >= Math.ceil(totalCoins*0.8)) this.stars++;
    if(elapsed <= lv.par) this.stars++;
    if(this.stars > progress.stars[curLevel]) progress.stars[curLevel] = this.stars;
    if(progress.bestTime[curLevel] === 0 || elapsed < progress.bestTime[curLevel])
      progress.bestTime[curLevel] = Math.round(elapsed*10)/10;
    saveProgress();
    burst(player.x+player.w/2, player.y, '#ffcf5c', 30, 280);
    beep(523,0.12,'square',0.13); setTimeout(()=>beep(659,0.12,'square',0.12),110);
    setTimeout(()=>beep(784,0.12,'square',0.12),220); setTimeout(()=>beep(1046,0.3,'square',0.13),330);
    this.confetti = [];
    for(let i=0;i<70;i++)
      this.confetti.push({ x:Math.random()*GAME_W, y:-20-Math.random()*300,
        vy:120+Math.random()*160, vx:(Math.random()-0.5)*60,
        c:['#38e1ff','#4f7cff','#9a6bff','#ff6cc7','#ffcf5c'][i%5], r:Math.random()*Math.PI });
  },
  back(){ setState(selectState); },
  btnRects(){
    const hasNext = curLevel < 2;
    return hasNext
      ? [ {x:GAME_W/2-260,y:400,w:240,h:56,label:'再玩一次',act:'retry'},
          {x:GAME_W/2+20, y:400,w:240,h:56,label:'下一關 ▶',act:'next'} ]
      : [ {x:GAME_W/2-260,y:400,w:240,h:56,label:'再玩一次',act:'retry'},
          {x:GAME_W/2+20, y:400,w:240,h:56,label:'回選關',act:'select'} ];
  },
  doAct(act){
    beep(660,0.08,'square',0.1);
    if(act==='retry') startLevel(curLevel);
    else if(act==='next') startLevel(curLevel+1);
    else setState(selectState);
  },
  tap(p){
    if(this.t < 0.6) return;
    for(const b of this.btnRects())
      if(p.x>=b.x && p.x<=b.x+b.w && p.y>=b.y && p.y<=b.y+b.h){ this.doAct(b.act); return; }
  },
  update(dt){
    this.t += dt; worldT += dt;
    updateParts(dt);
    shake *= Math.pow(0.001, dt);
    for(const c of this.confetti){
      c.y += c.vy*dt; c.x += c.vx*dt + Math.sin(worldT*3+c.r)*30*dt; c.r += dt*4;
      if(c.y > GAME_H+20){ c.y = -20; c.x = Math.random()*GAME_W; }
    }
    if(this.t > 0.6 && input.actionBuffer > 0){
      input.actionBuffer = 0;
      this.doAct(curLevel < 2 ? 'next' : 'retry');
    }
  },
  draw(){
    drawWorld(0);
    ctx.fillStyle='rgba(7,11,20,.62)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    for(const c of this.confetti){
      ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.r);
      ctx.fillStyle=c.c; ctx.fillRect(-5,-3,10,6); ctx.restore();
    }
    ctx.textAlign='center';
    ctx.font='bold 46px sans-serif'; ctx.fillStyle='#fcfcfc';
    ctx.strokeStyle='rgba(0,0,0,.5)'; ctx.lineWidth=7;
    ctx.strokeText('過關成功！太厲害了！', GAME_W/2, 150);
    ctx.fillText('過關成功！太厲害了！', GAME_W/2, 150);
    // 星星逐顆彈出
    for(let s=0;s<3;s++){
      const show = this.t > 0.3 + s*0.35 && this.stars > s;
      const pop = Math.min(1, Math.max(0, (this.t - (0.3+s*0.35))/0.25));
      const scale = show ? (1 + Math.sin(pop*Math.PI)*0.5) : 1;
      ctx.save();
      ctx.translate(GAME_W/2 + (s-1)*90, 225);
      ctx.scale(scale, scale);
      drawStar(0, 0, 34, show);
      ctx.restore();
    }
    ctx.font='bold 24px sans-serif'; ctx.fillStyle='#ffcf5c';
    ctx.fillText('金幣 '+coinCount+'/'+totalCoins+'　　用時 '+elapsed.toFixed(1)+' 秒（目標 '+lv.par+' 秒內）', GAME_W/2, 310);
    ctx.font='19px sans-serif'; ctx.fillStyle='#cfd4de';
    const tips = [];
    if(coinCount < Math.ceil(totalCoins*0.8)) tips.push('收集 8 成金幣');
    if(elapsed > lv.par) tips.push(lv.par+' 秒內通關');
    ctx.fillText(tips.length ? '拿滿 3 星訣竅：'+tips.join('、') : '3 星滿分！你是障礙賽大師！', GAME_W/2, 345);
    if(this.t > 0.6){
      for(const b of this.btnRects()){
        ctx.fillStyle='rgba(79,124,255,.85)';
        roundRect(b.x,b.y,b.w,b.h,14); ctx.fill();
        ctx.strokeStyle='#38e1ff'; ctx.lineWidth=3;
        roundRect(b.x,b.y,b.w,b.h,14); ctx.stroke();
        ctx.fillStyle='#fff'; ctx.font='bold 24px sans-serif';
        ctx.fillText(b.label, b.x+b.w/2, b.y+37);
      }
      ctx.font='17px sans-serif'; ctx.fillStyle='#9fb2d8';
      ctx.fillText(curLevel<2 ? '空白鍵＝下一關' : '空白鍵＝再玩一次', GAME_W/2, 495);
    }
  }
};

// ===== 主迴圈：固定時間步進 =====
const STEP = 1/60;
let last = performance.now(), acc = 0;
function stepOnce(){
  if(freeze > 0){ freeze -= STEP; return; }
  input.actionBuffer = Math.max(0, input.actionBuffer - STEP);
  state.update(STEP);
}
function frame(now){
  requestAnimationFrame(frame);
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while(acc >= STEP){ stepOnce(); acc -= STEP; }
  state.draw();
  ctx.drawImage(vignetteC, 0, 0, GAME_W, GAME_H);  // v6：暗角後製
}
setState(menuState);
requestAnimationFrame(frame);

// 測試掛鉤（不影響遊戲）
window.__T = {
  input, player, get lv(){ return lv; },
  get solids(){ return lv.plats.concat(lv.movers); },
  get stateName(){ return state===menuState?'menu':state===selectState?'select':state===playState?'play':state===pauseState?'pause':state===winState?'win':'?'; },
  get coinCount(){ return coinCount; },
  get elapsed(){ return elapsed; },
  startLevel, setStateName(n){ setState(n==='menu'?menuState:n==='select'?selectState:n==='pause'?pauseState:playState); },
  step(n){ for(let i=0;i<n;i++) stepOnce(); }
};
</script>
