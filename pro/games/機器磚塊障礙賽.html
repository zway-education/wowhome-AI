<!-- 專業AI升級 v8 3D版：把「機器磚塊障礙賽」改寫成真 3D 第三人稱闖關——Canvas 2D 軟體透視投影(project/drawBox3D/quad 體素引擎)＋畫家演算法深度排序、逐面受光、接地陰影、漸層天空＋霧＋暗角、additive 發光粒子、玻璃 HUD、飄字彈跳、命中 hit-stop 與小幅震動、Web Audio 去爆音音效。工業/機械配色與 Roblox障礙賽 區隔。-->
<!-- v7：僅介面/畫質/質感再優化（不動故事文本與玩法數值）——狀態切換淡入過場、HUD面板描邊高光、按鈕漸層+陰影質感、標題柔光暈、選關卡片投影、金幣高光點、音效攻擊緩衝去爆音 -->
<html lang="zh-Hant">

<title>機器磚塊障礙賽 PRO</title>
<style>
  html,body{margin:0;height:100%;background:#0a1424;overflow:hidden;touch-action:none;
    -webkit-user-select:none;user-select:none;font-family:sans-serif}
  canvas{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);touch-action:none}
  #mute,#pause{position:fixed;top:10px;width:48px;height:48px;border-radius:12px;

  #pause{left:10px;display:none}

  #rotateHint{position:fixed;top:8px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.6);color:#fff;padding:6px 14px;border-radius:20px;

<body>
<div id="bigscreenHint" role="dialog" aria-label="建議使用大螢幕遊玩">
  <div class="card">
    <svg viewBox="0 0 24 24" width="42" height="42" fill="none" stroke="#38e1ff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">

    <path class="wave" d="M14 4.02v2.06c2.89.86 5 3.54 5 6.92s-2.11 6.06-5 6.92v2.06c4-.91 7-4.49 7-8.98s-3-8.07-7-8.98z"/>

  </svg>
  請將裝置轉為橫向，體驗更完整
</div>
<script>
'use strict';

// ===== 大螢幕提醒浮層：只在手機顯示、一個 session 只跳一次 =====
(function(){
  const el = document.getElementById('bigscreenHint');
  try{
    const isPhone = Math.min(screen.width, screen.height) < 600 || innerWidth < 768;
    const seen = sessionStorage.getItem('bigscreen-hint');
    if(!isPhone || seen){ el.remove(); return; }
  }catch(e){ el.remove(); return; }
  document.getElementById('bigscreenHintBtn').addEventListener('pointerdown', e => {
    e.stopPropagation();
    try{ sessionStorage.setItem('bigscreen-hint', '1'); }catch(e2){}
    el.classList.add('hide');
    setTimeout(()=>el.remove(), 400);
  });
})();

const GAME_W = 960, GAME_H = 540;
const CX = 480, CY = 244, FOV = 470;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize(){
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = Math.max(1, Math.round(GAME_W * scale * dpr));
  canvas.height = Math.max(1, Math.round(GAME_H * scale * dpr));
  canvas.style.width  = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale || 1;
  updateOrientHint();
}
const rotateHint = document.getElementById('rotateHint');
function updateOrientHint(){ rotateHint.style.display = (innerWidth < innerHeight) ? 'flex' : 'none'; }
addEventListener('resize', resize); resize();

// ===== 輸入：鍵盤 + 觸控搖桿 =====
const keys = { fwd:false, back:false, left:false, right:false };
const input = { jumpBuffer:0, jumpHeld:false };
const KEYMAP = { ArrowUp:'fwd', KeyW:'fwd', ArrowDown:'back', KeyS:'back',
                 ArrowLeft:'left', KeyA:'left', ArrowRight:'right', KeyD:'right' };
addEventListener('keydown', e => {
  checkKonami(e.code);
  if(e.code === 'Escape'){ if(state && state.back) state.back(); return; }
  if(e.code === 'KeyR'){ if(state === playState){ startLevel(curLevel); } return; }
  if(/^Digit[123]$/.test(e.code) && state === selectState){ selectState.pick(Number(e.code.slice(5))-1); return; }
  if(e.code === 'KeyP' && (state === menuState || state === selectState)){ setState(shopState); return; }
  if(e.code === 'Space' || e.code === 'Enter' || e.code === 'KeyJ' || e.code === 'KeyK'){
    e.preventDefault();
    if(!input.jumpHeld) input.jumpBuffer = 0.14;
    input.jumpHeld = true;
    if(state && state.confirm) state.confirm();
    return;
  }
  const a = KEYMAP[e.code]; if(!a) return; e.preventDefault(); keys[a] = true;
});
addEventListener('keyup', e => {
  if(e.code === 'Space' || e.code === 'Enter' || e.code === 'KeyJ' || e.code === 'KeyK'){ input.jumpHeld = false; return; }
  const a = KEYMAP[e.code]; if(a) keys[a] = false;
});

function touchPos(t){
  const r = canvas.getBoundingClientRect();
  return { x:(t.clientX - r.left) / canvas._scale, y:(t.clientY - r.top) / canvas._scale };
}
// 觸控：左半螢幕虛擬搖桿、右半螢幕點按跳躍
const stick = { active:false, id:-1, ox:0, oy:0, dx:0, dz:0 };
function handleTouchStart(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    const p = touchPos(t);
    if(state !== playState){
      if(state && state.tap) state.tap(p);
      continue;
    }
    if(p.x < GAME_W*0.5 && !stick.active){
      stick.active = true; stick.id = t.identifier; stick.ox = p.x; stick.oy = p.y; stick.dx = 0; stick.dz = 0;
    } else {
      // 右半：跳躍
      if(!input.jumpHeld) input.jumpBuffer = 0.14;
      input.jumpHeld = true; input._touchJump = t.identifier;
      audio();
    }
  }
}
function handleTouchMove(e){
  e.preventDefault();
  for(const t of e.touches){
    if(t.identifier === stick.id){
      const p = touchPos(t);
      let dx = p.x - stick.ox, dy = p.y - stick.oy;
      const mag = Math.hypot(dx, dy), max = 70;
      if(mag > max){ dx = dx/mag*max; dy = dy/mag*max; }
      const dead = 10;
      stick.dx = Math.abs(dx) < dead ? 0 : dx/max;
      stick.dz = Math.abs(dy) < dead ? 0 : -dy/max; // 螢幕上 = 向前 +z
    }
  }
}
function handleTouchEnd(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier === stick.id){ stick.active = false; stick.id = -1; stick.dx = 0; stick.dz = 0; }
    if(t.identifier === input._touchJump){ input.jumpHeld = false; input._touchJump = -1; }
  }
}
canvas.addEventListener('touchstart', handleTouchStart, { passive:false });
canvas.addEventListener('touchmove', handleTouchMove, { passive:false });
canvas.addEventListener('touchend', handleTouchEnd, { passive:false });
canvas.addEventListener('touchcancel', handleTouchEnd, { passive:false });

canvas.addEventListener('pointerdown', e => {
  if(e.pointerType === 'touch') return; // 觸控走上面
  const p = touchPos(e);
  if(state && state.tap) state.tap(p);
});

// ===== 音效：Web Audio + Compressor 母線 + 程序化殘響 + 環境音床 =====
let AC = null, BUS = null, ambGain = null, ambOut = null, ambFilt = null;
function audio(){
  if(!AC){
    AC = new (window.AudioContext||window.webkitAudioContext)();
    const comp = AC.createDynamicsCompressor();
    comp.threshold.value = -18; comp.knee.value = 20; comp.ratio.value = 6;
    const master = AC.createGain(); master.gain.value = 0.9;
    comp.connect(master).connect(AC.destination);
    const busIn = AC.createGain(); busIn.connect(comp);
    try{
      const sr = AC.sampleRate, len = Math.floor(sr*1.0);
      const imp = AC.createBuffer(2, len, sr);
      for(let ch=0; ch<2; ch++){
        const d = imp.getChannelData(ch);
        for(let i=0;i<len;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/len, 2.6);
      }
      const conv = AC.createConvolver(); conv.buffer = imp;
      const wet = AC.createGain(); wet.gain.value = 0.14;
      busIn.connect(conv); conv.connect(wet); wet.connect(comp);
    }catch(e){}
    BUS = busIn;
    // 工廠環境音床：低通噪聲 + 緩慢 LFO 起伏（機械低鳴）
    try{
      const sr = AC.sampleRate, alen = Math.floor(sr*2.2);
      const abuf = AC.createBuffer(1, alen, sr);
      const ad = abuf.getChannelData(0); let v = 0;
      for(let i=0;i<alen;i++){ v = v*0.985 + (Math.random()*2-1)*0.06; ad[i] = v*2.4; }
      const src = AC.createBufferSource(); src.buffer = abuf; src.loop = true;
      ambFilt = AC.createBiquadFilter(); ambFilt.type = 'lowpass'; ambFilt.frequency.value = 260; ambFilt.Q.value = 0.5;
      ambGain = AC.createGain(); ambGain.gain.value = 0.05;
      const lfo = AC.createOscillator(); lfo.frequency.value = 0.12;
      const lg = AC.createGain(); lg.gain.value = 0.02;
      lfo.connect(lg); lg.connect(ambGain.gain);
      ambOut = AC.createGain(); ambOut.gain.value = muted ? 0 : 1;
      src.connect(ambFilt); ambFilt.connect(ambGain); ambGain.connect(ambOut); ambOut.connect(comp);
      src.start(); lfo.start();
      setAmbTheme();
    }catch(e){}
  }
  if(AC.state === 'suspended') AC.resume();
  return AC;
}
function setAmbTheme(){
  if(!AC || !ambFilt) return;
  const t = AC.currentTime;
  const cfg = theme.deco==='lava' ? {f:180, g:0.075} : theme.deco==='circuit' ? {f:340, g:0.04} : {f:260, g:0.05};
  ambFilt.frequency.setTargetAtTime(cfg.f, t, 0.4);
  ambGain.gain.setTargetAtTime(cfg.g, t, 0.4);
}
function duckAmb(){
  if(!AC || !ambGain) return;
  const t = AC.currentTime;
  const base = theme.deco==='lava' ? 0.075 : theme.deco==='circuit' ? 0.04 : 0.05;
  ambGain.gain.cancelScheduledValues(t);
  ambGain.gain.setValueAtTime(Math.max(0.001, ambGain.gain.value), t);
  ambGain.gain.linearRampToValueAtTime(base*0.2, t+0.05);
  ambGain.gain.linearRampToValueAtTime(base, t+1.1);
}
addEventListener('pointerdown', audio, { once:true });
addEventListener('keydown', audio, { once:true });

let muted = localStorage.getItem('obbyProV4_mute') === '1';
const muteBtn = document.getElementById('mute');
function updateMuteBtn(){
  muteBtn.classList.toggle('muted', muted);
  if(ambOut) ambOut.gain.value = muted ? 0 : 1;
}
updateMuteBtn();
muteBtn.addEventListener('pointerdown', e => {
  e.stopPropagation();
  muted = !muted;
  localStorage.setItem('obbyProV4_mute', muted ? '1' : '0');
  updateMuteBtn();
  if(!muted) beep(660, 0.08, 'square', 0.1);
});
const pauseBtn = document.getElementById('pause');
pauseBtn.addEventListener('pointerdown', e => {
  e.stopPropagation();
  if(state === playState){ audio(); beep(440, 0.06, 'square', 0.08); setState(pauseState); }
});

function beep(freq = 440, dur = 0.1, type = 'square', vol = 0.15, slide = 0){
  if(muted) return;
  const ac = audio(); if(!ac || !BUS) return;
  freq *= 1 + (Math.random()*0.08 - 0.04);
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, ac.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), ac.currentTime + dur);
  g.gain.setValueAtTime(0.0001, ac.currentTime);
  g.gain.linearRampToValueAtTime(vol, ac.currentTime + 0.006); // 6ms attack 去爆音
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g).connect(BUS);
  o.start(); o.stop(ac.currentTime + dur);
}
function noise(dur = 0.2, vol = 0.18){
  if(muted) return;
  const ac = audio(); if(!ac || !BUS) return;
  const n = Math.floor(ac.sampleRate * dur);
  const buf = ac.createBuffer(1, n, ac.sampleRate);
  const d = buf.getChannelData(0);
  for(let i = 0; i < n; i++) d[i] = (Math.random()*2-1) * (1 - i/n);
  const src = ac.createBufferSource(); src.buffer = buf;
  const g = ac.createGain();
  g.gain.setValueAtTime(0.0001, ac.currentTime);
  g.gain.linearRampToValueAtTime(vol, ac.currentTime + 0.005);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  src.connect(g).connect(BUS); src.start();
}

// ===== 3D 投影引擎（Canvas 2D 軟體透視，畫家演算法排序）=====
const TILT = 0.36;
const cosA = Math.cos(TILT), sinA = Math.sin(TILT);
const cam = { x:0, y:200, z:-300 };
function project(x,y,z){
  const dx=x-cam.x, dy=y-cam.y, dz=z-cam.z;
  const ry = dy*cosA + dz*sinA;
  const rz = dz*cosA - dy*sinA;
  if(rz < 14) return null;
  const s = FOV/rz;
  return { x:CX+dx*s, y:CY-ry*s, s, rz };
}
function camDepth(y,z){ return (z-cam.z)*cosA - (y-cam.y)*sinA; }
function quad(a,b,c,d,color){
  if(!a||!b||!c||!d) return false;
  ctx.fillStyle=color; ctx.beginPath();
  ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.lineTo(d.x,d.y);
  ctx.closePath(); ctx.fill(); return true;
}
function quadStroke(a,b,c,d,color,w){
  if(!a||!b||!c||!d) return;
  ctx.strokeStyle=color; ctx.lineWidth=w; ctx.beginPath();
  ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.lineTo(d.x,d.y);
  ctx.closePath(); ctx.stroke();
}
function fogAmount(rz){ return Math.max(0, Math.min(0.62, (rz-260)/1000)); }
/* 立體盒：逐面受光（頂最亮、正面中亮、側面暗）＋AO 暗帶＋邊線＋深度霧化
   x,topY,z = 頂面中心；hw,hd = 半寬/半深；h = 高度（往下延伸） */
function drawBox3D(x,topY,z,hw,h,hd,pal,opt){
  opt = opt || {};
  const by = topY - h;
  const tFL=project(x-hw,topY,z-hd), tFR=project(x+hw,topY,z-hd),
        tBL=project(x-hw,topY,z+hd), tBR=project(x+hw,topY,z+hd),
        bFL=project(x-hw,by,z-hd), bFR=project(x+hw,by,z-hd);
  const rz = (z-cam.z)*cosA - (topY-cam.y)*sinA + 300; // 概略深度
  const fog = opt.fog!==false ? fogAmount((z-cam.z)) : 0;
  const fogC = theme.fogRGB;
  // 側面（只畫看得到那側）
  if(cam.x < x-hw*0.6){
    const s1=project(x-hw,topY,z+hd), s2=project(x-hw,by,z+hd);
    if(quad(tFL,s1,s2,bFL,pal.side)){ if(fog>0) quad(tFL,s1,s2,bFL,'rgba('+fogC+','+fog+')'); quadStroke(tFL,s1,s2,bFL,pal.edge,1); }
  } else if(cam.x > x+hw*0.6){
    const s1=project(x+hw,topY,z+hd), s2=project(x+hw,by,z+hd);
    if(quad(tFR,s1,s2,bFR,pal.side)){ if(fog>0) quad(tFR,s1,s2,bFR,'rgba('+fogC+','+fog+')'); quadStroke(tFR,s1,s2,bFR,pal.edge,1); }
  }
  // 正面（面向鏡頭）
  if(quad(tFL,tFR,bFR,bFL,pal.front)){
    if(bFL&&bFR&&tFL&&tFR){
      const mFL={x:tFL.x+(bFL.x-tFL.x)*0.5, y:tFL.y+(bFL.y-tFL.y)*0.5};
      const mFR={x:tFR.x+(bFR.x-tFR.x)*0.5, y:tFR.y+(bFR.y-tFR.y)*0.5};
      quad(mFL,mFR,bFR,bFL,'rgba(6,10,18,0.30)'); // AO 暗帶
      if(opt.glow>0){
        quad(tFL,tFR,bFR,bFL,'rgba('+opt.glowRGB+','+(0.18*opt.glow).toFixed(2)+')');
      }
    }
    if(fog>0) quad(tFL,tFR,bFR,bFL,'rgba('+fogC+','+fog+')');
    quadStroke(tFL,tFR,bFR,bFL,pal.edge,1);
  }
  // 頂面（最亮）
  if(quad(tFL,tFR,tBR,tBL,pal.top)){
    if(fog>0) quad(tFL,tFR,tBR,tBL,'rgba('+fogC+','+(fog*0.85)+')');
    // 機械紋路：頂面中央亮條
    if(opt.stripe && tFL&&tFR&&tBL&&tBR && Math.abs(tFR.x-tFL.x)>40){
      const a={x:tFL.x*0.5+tBL.x*0.5,y:tFL.y*0.5+tBL.y*0.5};
      const b={x:tFR.x*0.5+tBR.x*0.5,y:tFR.y*0.5+tBR.y*0.5};
      ctx.strokeStyle=opt.stripe; ctx.lineWidth=Math.max(1.5,3*(tFR.x-tFL.x)/hw/2);
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    }
    quadStroke(tFL,tFR,tBR,tBL,pal.edgeTop||pal.edge,1.6);
  }
}

// ===== 快取：光暈 sprite / 天空烘焙 / 暗角 =====
function makeGlow(color, r){
  const c = document.createElement('canvas'); c.width = c.height = r*2;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(r,r,1, r,r,r);
  gr.addColorStop(0,color); gr.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle = gr; g.fillRect(0,0,r*2,r*2); return c;
}
const coinGlow = makeGlow('rgba(255,205,117,.75)', 26);
const goalGlow = makeGlow('rgba(120,220,255,.6)', 60);

const parts = [];
function burst3(x,y,z,color,n=12,speed=160){
  for(let i=0;i<n && parts.length<340;i++){
    const a=Math.random()*Math.PI*2, el=(Math.random()-0.2)*1.4, sp=speed*(0.3+Math.random()*0.8);
    parts.push({ x,y,z, vx:Math.cos(a)*sp, vy:Math.sin(el)*sp+80, vz:Math.sin(a)*sp, life:0.6, max:0.6, color });
  }
}
function updateParts(dt){
  for(const p of parts){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.z+=p.vz*dt; p.vy-=520*dt; p.life-=dt; }
  for(let i=parts.length-1;i>=0;i--) if(parts[i].life<=0) parts.splice(i,1);
}
function drawParts(){
  ctx.save(); ctx.globalCompositeOperation='lighter';
  for(const p of parts){
    const pr=project(p.x,p.y,p.z); if(!pr) continue;
    const k=Math.max(0,p.life/p.max);
    ctx.globalAlpha=k;
    const sz=(6+k*6)*Math.min(1.6,pr.s);
    ctx.drawImage(sparkGlow, pr.x-sz, pr.y-sz, sz*2, sz*2);
    ctx.globalAlpha=Math.min(1,k*1.4);
    ctx.fillStyle=p.color;
    ctx.fillRect(pr.x-sz*0.28, pr.y-sz*0.28, sz*0.56, sz*0.56);
  }
  ctx.restore(); ctx.globalAlpha=1;
}

function drawFloaters(){
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  for(const f of floaters){
    const pr=project(f.x,f.y,f.z); if(!pr) continue;
    const k=Math.max(0,f.life/f.max);
    const pop=1+ (1-k)*(1-k)*0.4; // easeOutBack 感
    const fs=Math.max(12, 22*Math.min(1.5,pr.s)*(k>0.7?(1.3-(k-0.7)):1)*pop);
    ctx.globalAlpha=Math.min(1,k*1.6);
    ctx.font='bold '+fs.toFixed(0)+'px sans-serif';
    ctx.lineWidth=4; ctx.strokeStyle='rgba(0,0,0,.5)';
    ctx.strokeText(f.text, pr.x, pr.y); ctx.fillStyle=f.color; ctx.fillText(f.text, pr.x, pr.y);
  }
  ctx.globalAlpha=1;
}

// ===== 關卡建構 =====
function buildLevel(themeIdx, name, par, segs){
  const plats=[], coins=[], hazards=[], cps=[], shields=[];
  let x=0, z=0, y=0;
  plats.push({ x:0, y:0, z:0, hw:120, hd:110, type:'start' });
  cps.push({ x:0, y:0, z:0, used:true });
  for(const s of segs){
    z += s.gap; x = s.abs!==undefined ? s.abs : x + (s.dx||0); y += (s.dy||0);
    const hw = s.hw||70, hd = s.hd||70;
    const p = { x, y, z, hw, hd, type:'normal' };
    if(s.move){ p.type='move'; p.baseX=x; p.amp=s.move.amp; p.speed=s.move.speed; p.phase=s.move.phase||0; p.px=x; }
    plats.push(p);
    // 平台上的機關
    if(s.spike) hazards.push({ type:'spike', x:x+(s.spike.dx||0), y:y, z:z+(s.spike.dz||0), hw:s.spike.hw||40, hd:s.spike.hd||40, h:34 });
    if(s.bar) hazards.push({ type:'bar', x, y:y, z, L:s.bar.L||hw*0.95, by:y+(s.bar.h||18), speed:s.bar.speed||2.2, phase:s.bar.phase||0, thk:16 });
    if(s.piston) hazards.push({ type:'piston', x:x+(s.piston.dx||0), y:y, z:z+(s.piston.dz||0), hw:s.piston.hw||42, hd:s.piston.hd||42, high:y+150, low:y+18, speed:s.piston.speed||1.6, phase:s.piston.phase||0, cy:y+150 });
    if(s.check) cps.push({ x, y, z, used:false });
    if(s.shield) shields.push({ x:x+(s.shield.dx||0), y:y+40, z, taken:false });
    // 金幣（除起點/純機關）
    if(!s.nocoin){
      const cn = s.coins||1;
      for(let i=0;i<cn;i++) coins.push({ x:x+(cn>1?(i-(cn-1)/2)*40:(s.coinDx||0)), y:y+44, z:z+(cn>1?0:(s.coinDz||0)), taken:false });
    }
  }
  z += 260; y += 0;
  const goal = { x:0, y, z, hw:150, hd:140, type:'goal' };
  plats.push(goal);
  return { name, themeIdx, plats, coins, hazards, cps, shields, goal, par, len:z };
}

// ===== 機關更新與碰撞 =====
function updateHazards(dt){
  for(const h of lv.hazards){
    if(h.type==='piston'){
      const s = (Math.sin(worldT*h.speed + h.phase)+1)/2; // 0..1
      h.cy = h.low + (h.high - h.low)*s;
    }
  }
}
function hazardHit(){
  const px=player.x, py=player.y, pz=player.z;
  for(const h of lv.hazards){
    if(h.type==='spike'){
      if(Math.abs(px-h.x)<h.hw+PR && Math.abs(pz-h.z)<h.hd+PR && py < h.y + h.h){ return h; }
    } else if(h.type==='bar'){
      // 旋轉桿：端點在 (x,by,z) 繞中心；求玩家到線段距離
      const ang = worldT*h.speed + h.phase;
      const dxv=Math.cos(ang)*h.L, dzv=Math.sin(ang)*h.L;
      const ex1=h.x-dxv, ez1=h.z-dzv, ex2=h.x+dxv, ez2=h.z+dzv;
      // 垂直重疊
      if(py < h.by + h.thk && py + PH > h.by){
        const vx=ex2-ex1, vz=ez2-ez1, wx=px-ex1, wz=pz-ez1;
        let t=(vx*wx+vz*wz)/(vx*vx+vz*vz+1e-6); t=Math.max(0,Math.min(1,t));
        const cx2=ex1+vx*t, cz2=ez1+vz*t;
        if(Math.hypot(px-cx2, pz-cz2) < PR + 12){ return h; }
      }
    } else if(h.type==='piston'){
      if(Math.abs(px-h.x)<h.hw+PR && Math.abs(pz-h.z)<h.hd+PR){
        // 錘底 = h.cy - 高度56；玩家頭 py+PH。錘壓下且與身體重疊
        const bottom = h.cy - 56;
        if(bottom < py + PH - 4 && h.cy - 56 > py - 60){ return h; }
      }
    }
  }
  return null;
}

function drawCoin3D(x,y,z){
  const bob = Math.sin(worldT*4 + x*0.05)*5;
  const pr = project(x, y+bob, z); if(!pr) return;
  const sc = Math.min(1.8, pr.s);
  ctx.save(); ctx.globalCompositeOperation='lighter';
  ctx.globalAlpha = 0.55+0.3*Math.sin(worldT*4+x*0.05);
  const gs = 26*sc; ctx.drawImage(coinGlow, pr.x-gs, pr.y-gs, gs*2, gs*2);
  ctx.restore(); ctx.globalAlpha=1;
  const spin = Math.abs(Math.cos(worldT*3 + x*0.07));
  const rx = Math.max(2, 12*sc*spin), ry = 12*sc;
  ctx.fillStyle='#ffcd75';
  ctx.beginPath(); ctx.ellipse(pr.x, pr.y, rx, ry, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle='#b06a10'; ctx.lineWidth=2*sc; ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.85)';
  ctx.beginPath(); ctx.ellipse(pr.x-rx*0.3, pr.y-ry*0.35, rx*0.28, ry*0.28, 0,0,Math.PI*2); ctx.fill();
}
function drawShield3D(x,y,z){
  const bob = Math.sin(worldT*3 + x*0.04)*5;
  const pr = project(x, y+bob, z); if(!pr) return;
  const sc = Math.min(1.8, pr.s), r = 16*sc;
  ctx.save(); ctx.globalCompositeOperation='lighter';
  ctx.globalAlpha=0.5+0.3*Math.sin(worldT*3);
  ctx.drawImage(goalGlow, pr.x-r*2, pr.y-r*2, r*4, r*4);
  ctx.restore(); ctx.globalAlpha=1;
  // 齒輪護盾
  ctx.fillStyle=theme.accent;
  ctx.beginPath();
  for(let i=0;i<8;i++){
    const a=i/8*Math.PI*2, rr = i%2? r*0.72 : r;
    ctx[i===0?'moveTo':'lineTo'](pr.x+Math.cos(a)*rr, pr.y+Math.sin(a)*rr);
  }
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='#0a1a24'; ctx.beginPath(); ctx.arc(pr.x,pr.y,r*0.38,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
}
function drawGroundShadow(x, gy, z, rad, alpha){

function drawBar(h){

  const p1=project(h.x-dxv, h.by, h.z-dzv), p2=project(h.x+dxv, h.by, h.z+dzv);
  const pc=project(h.x, h.by, h.z);

  const g1=project(h.x-dxv, h.y+1, h.z-dzv), g2=project(h.x+dxv, h.y+1, h.z+dzv);
  if(g1&&g2){ ctx.strokeStyle='rgba(0,0,0,.28)'; ctx.lineWidth=10; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(g1.x,g1.y); ctx.lineTo(g2.x,g2.y); ctx.stroke(); }

    ctx.strokeStyle=HAZ.front; ctx.lineWidth=12*Math.min(1.4,w);

    ctx.strokeStyle=HAZ.top; ctx.lineWidth=4*Math.min(1.4,w);
    ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
    // 端點警示光暈

const _visorCache={};
function makeVisor(dead){
  const key=dead?'d':'a'; if(_visorCache[key]) return _visorCache[key];

  g.fillStyle=dead?'#ff6cc7':'#38e1ff';
  if(dead){ g.lineWidth=4; g.strokeStyle='#ff6cc7'; g.beginPath(); g.moveTo(18,12);g.lineTo(28,24);g.moveTo(28,12);g.lineTo(18,24);
    g.moveTo(38,12);g.lineTo(48,24);g.moveTo(48,12);g.lineTo(38,24); g.stroke(); }
  else { g.fillRect(16,14,12,10); g.fillRect(36,14,12,10); }
  _visorCache[key]=c; return c;
}

function drawWorld(){
  ctx.drawImage(SKY_BAKES[lv.themeIdx], 0, 0);
  ctx.save();
  ctx.translate((Math.random()*2-1)*shake, (Math.random()*2-1)*shake);
  // 環境粒子（遠景，additive）
  ctx.save(); ctx.globalCompositeOperation='lighter';
  for(const p of envParts){
    const pr=project(cam.x+p.x, p.y, cam.z+340+p.z%1200); if(!pr) continue;
    ctx.globalAlpha=0.3+0.3*Math.sin(p.ph*3);
    const gs=(theme.deco==='lava'?7:5)*Math.min(1.4,pr.s);
    ctx.drawImage(theme.deco==='lava'?hazardGlow:dustGlow, pr.x-gs, pr.y-gs, gs*2, gs*2);
  }
  ctx.restore(); ctx.globalAlpha=1;

  // 收集場景物件 → 依深度排序
  const items = [];
  for(const p of lv.plats){
    const px = p.type==='move' ? p.x : p.x;
    items.push({ d:camDepth(p.y, p.z), fn:()=>drawPlatform(p) });
  }
  for(const h of lv.hazards){
    let hz=h.z, hy=h.type==='piston'?h.cy:h.by||h.y;
    items.push({ d:camDepth(hy, hz), fn:()=>{ if(h.type==='bar') drawBar(h); else if(h.type==='piston') drawPiston(h); } });
  }
  for(const c of lv.coins){ if(c.taken) continue; items.push({ d:camDepth(c.y,c.z), fn:()=>drawCoin3D(c.x,c.y,c.z) }); }
  for(const s of lv.shields){ if(s.taken) continue; items.push({ d:camDepth(s.y,s.z), fn:()=>drawShield3D(s.x,s.y,s.z) }); }
  for(const c of lv.cps){ if(c.used && c.type!=='start') {} items.push({ d:camDepth(c.y,c.z), fn:()=>drawCheckpoint(c) }); }
  items.push({ d:camDepth(lv.goal.y, lv.goal.z), fn:drawGoalGate });
  items.push({ d:camDepth(player.y+20, player.z)+0.1, fn:drawPlayer });
  items.sort((a,b)=>b.d-a.d);
  for(const it of items) it.fn();

  drawParts();
  drawFloaters();
  ctx.restore();
}
function drawPlatform(p){
  const pal = p.type==='goal'?PAL_GOAL : p.type==='move'?PAL_MOVE : theme.plat;
  const h = 46;
  drawBox3D(p.x, p.y, p.z, p.hw, h, p.hd, pal, { stripe: p.type==='move'?'rgba(255,240,190,.5)':theme.accent.replace(')',',0.25)').replace('rgb','rgba'), fog:true, glow: p.type==='goal'?0.6:0, glowRGB:'120,220,255' });
  // 尖刺（畫在該平台頂面上）
  for(const hz of lv.hazards){
    if(hz.type==='spike' && Math.abs(hz.x-p.x)<p.hw+2 && Math.abs(hz.z-p.z)<p.hd+2 && Math.abs(hz.y-p.y)<2){
      drawSpikes(hz);
    }
  }
  if(p.type==='move'){
    const pr=project(p.x,p.y,p.z); if(pr){ ctx.fillStyle='rgba(255,255,255,.6)';
      ctx.beginPath(); ctx.arc(pr.x, pr.y, 4*Math.min(1.5,pr.s),0,Math.PI*2); ctx.fill(); }
  }
}
function drawSpikes(hz){
  const n=3;
  for(let ix=0; ix<n; ix++) for(let iz=0; iz<n; iz++){
    const sx=hz.x+(ix-(n-1)/2)*hz.hw*0.6, sz=hz.z+(iz-(n-1)/2)*hz.hd*0.6;
    const base=project(sx, hz.y, sz), tip=project(sx, hz.y+hz.h, sz);
    const bl=project(sx-8, hz.y, sz), br=project(sx+8, hz.y, sz);
    if(base&&tip&&bl&&br){
      ctx.fillStyle=HAZ.front; ctx.beginPath(); ctx.moveTo(bl.x,bl.y); ctx.lineTo(tip.x,tip.y); ctx.lineTo(br.x,br.y); ctx.closePath(); ctx.fill();
      ctx.fillStyle='rgba(255,220,150,.5)'; ctx.beginPath(); ctx.moveTo(bl.x,bl.y); ctx.lineTo(tip.x,tip.y); ctx.lineTo(base.x,base.y); ctx.closePath(); ctx.fill();
    }
  }
}

const playState = {
  enter(){ this.legPhase=0; },
  back(){ setState(selectState); },
  confirm(){},
  update(dt){
    elapsed+=dt; worldT+=dt;
    flashA*=Math.pow(0.0006,dt);
    if(hintT>0) hintT-=dt;
    updateEnv(dt);
    updateHazards(dt);
    // 移動平台
    for(const p of lv.plats){ if(p.type==='move'){ p.px=p.x; p.x=p.baseX+Math.sin(worldT*p.speed+p.phase)*p.amp; } }

    if(player.dead){
      updateParts(dt); updateFloaters(dt); shake*=Math.pow(0.001,dt);
      this.deadT+=dt; if(this.deadT>0.5) respawn(); return;
    }
    // 被移動平台載走
    if(player.standOn && player.standOn.type==='move') player.x += player.standOn.x - player.standOn.px;

    // 輸入方向
    let mx=0, mz=0;
    if(stick.active){ mx=stick.dx; mz=stick.dz; }
    else { mx=(keys.right?1:0)-(keys.left?1:0); mz=(keys.fwd?1:0)-(keys.back?1:0); }
    const mag=Math.hypot(mx,mz);
    if(mag>1){ mx/=mag; mz/=mag; }
    const tvx=mx*SPEED, tvz=mz*SPEED;
    player.vx += (tvx-player.vx)*Math.min(1, ACC/SPEED*dt* (player.grounded?1:0.6));
    player.vz += (tvz-player.vz)*Math.min(1, ACC/SPEED*dt* (player.grounded?1:0.6));
    if(mag>0.1) player.facing=Math.atan2(mx,mz);
    if(player.grounded && (Math.abs(player.vx)>40||Math.abs(player.vz)>40)) this.legPhase+=dt*11;

    // 跳躍
    if(player.grounded) player.coyote=COYOTE; else player.coyote-=dt;
    if(input.jumpBuffer>0 && player.coyote>0){
      player.vy=JUMP_V; player.coyote=0; input.jumpBuffer=0; player.grounded=false; player.standOn=null;
      player.sx=0.74; player.sy=1.34;
      burst3(player.x, player.y, player.z, 'rgba(255,255,255,.9)', 6, 90);
      beep(200,0.15,'square',0.12,400); noise(0.06,0.05);
    }
    if(!input.jumpHeld && player.vy>120) player.vy*=Math.pow(0.02,dt*3);
    // 重力
    let g = player.vy>0 ? GRAV : GRAV_FALL;
    if(Math.abs(player.vy)<40) g*=0.5;
    player.vy = Math.max(player.vy - g*dt, -MAX_FALL);

    // 移動 x,z
    player.x += player.vx*dt; player.z += player.vz*dt;
    // 垂直與落地
    const prevY = player.y;
    player.y += player.vy*dt;
    const wasGrounded=player.grounded;
    player.grounded=false; player.standOn=null; player.standGY=undefined;
    for(const p of lv.plats){
      if(Math.abs(player.x-p.x)<p.hw+PR && Math.abs(player.z-p.z)<p.hd+PR){
        if(player.vy<=0 && prevY>=p.y-6 && player.y<=p.y){
          player.y=p.y; player.vy=0; player.grounded=true; player.standOn=p; player.standGY=p.y;
        }
      }
    }
    if(!wasGrounded && player.grounded){
      player.sx=1.32; player.sy=0.68;
      burst3(player.x, player.y, player.z, 'rgba(200,220,255,.7)', 5, 80);
      beep(120,0.06,'triangle',0.1);
      if(Math.abs(player.vx)>200||Math.abs(player.vz)>200) noise(0.05,0.04);
    }
    player.sx += (1-player.sx)*12*dt; player.sy += (1-player.sy)*12*dt;

    // 機關碰撞
    const hit = hazardHit();
    if(hit){
      if(player.shield){
        player.shield=false; player.vy=Math.max(player.vy,420);
        freeze=0.08; shake=6; flashA=0.5; flashColor='56,225,255';
        burst3(player.x, player.y+20, player.z, theme.accent, 20, 200);
        floatText3(player.x, player.y+50, player.z, '護盾破碎！', theme.accent);
        noise(0.18,0.16); beep(500,0.16,'square',0.14,-260); duckAmb();
      } else {
        this.die(); return;
      }
    }
    // 掉落
    if(player.y < KILL_Y){ this.die(); return; }

    // 護盾道具
    for(const s of lv.shields){
      if(s.taken) continue;
      if(Math.abs(player.x-s.x)<28 && Math.abs(player.z-s.z)<28 && Math.abs(player.y+20-s.y)<40){
        s.taken=true; player.shield=true;
        burst3(s.x,s.y,s.z,theme.accent,14,180);
        floatText3(s.x,s.y+20,s.z,'護盾 ON！',theme.accent);
        beep(392,0.1,'square',0.12); setTimeout(()=>beep(523,0.12,'square',0.12),80); setTimeout(()=>beep(659,0.16,'square',0.13),160);
      }
    }
    // 金幣
    for(const c of lv.coins){
      if(c.taken) continue;
      if(Math.abs(player.x-c.x)<26 && Math.abs(player.z-c.z)<26 && Math.abs(player.y+22-c.y)<34){
        c.taken=true; coinCount++;
        burst3(c.x,c.y,c.z,'#ffcd75',12,150);
        floatText3(c.x,c.y+6,c.z,'+1','#ffcf5c');
        beep(988,0.08,'square',0.12); setTimeout(()=>beep(1319,0.14,'square',0.1),70);
      }
    }
    // 檢查點
    for(const c of lv.cps){
      if(c.used) continue;
      if(Math.abs(player.x-c.x)<50 && Math.abs(player.z-c.z)<50 && Math.abs(player.y-c.y)<80){
        c.used=true; player.spawn={x:c.x,y:c.y,z:c.z};
        floatText3(c.x,c.y+80,c.z,'檢查點！',theme.accent);
        burst3(c.x,c.y+40,c.z,theme.accent,10,160);
        beep(660,0.1,'square',0.1); setTimeout(()=>beep(880,0.12,'square',0.08),90);
      }
    }
    // 終點
    const g0=lv.goal;
    if(Math.abs(player.x-g0.x)<g0.hw && Math.abs(player.z-g0.z)<g0.hd && player.grounded){ setState(winState); return; }

    // 相機跟隨（第三人稱：後上方）
    cam.x += (player.x - cam.x)*(1-Math.pow(0.008,dt));
    cam.y += (player.y + 200 - cam.y)*(1-Math.pow(0.02,dt));
    cam.z += (player.z - 300 - cam.z)*(1-Math.pow(0.004,dt));

    updateParts(dt); updateFloaters(dt); shake*=Math.pow(0.001,dt);
  },
  die(){
    player.dead=true; this.deadT=0; deaths++;
    freeze=0.12; shake=10; flashA=0.6; flashColor='255,255,255';
    burst3(player.x, player.y+20, player.z, '#f83800', 24, 220);
    burst3(player.x, player.y+20, player.z, '#ffcf5c', 10, 180);
    noise(0.25,0.2); beep(220,0.3,'sawtooth',0.18,-150); duckAmb();
  },
  draw(){
    drawWorld();
    drawHUD();
    if(flashA>0.01){ ctx.fillStyle=`rgba(${flashColor},${flashA})`; ctx.fillRect(0,0,GAME_W,GAME_H); }
  }
};

  doAct(act){ beep(660,0.08,'square',0.1);
    if(act==='retry') startLevel(curLevel); else if(act==='next') startLevel(curLevel+1); else setState(selectState); },
  tap(p){ if(this.t<0.6) return; for(const b of this.btnRects()) if(p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h){ this.doAct(b.act); return; } },
  update(dt){ this.t+=dt; worldT+=dt; updateParts(dt); shake*=Math.pow(0.001,dt);
    for(const c of this.confetti){ c.y+=c.vy*dt; c.x+=c.vx*dt+Math.sin(worldT*3+c.r)*30*dt; c.r+=dt*4; if(c.y>GAME_H+20){ c.y=-20; c.x=Math.random()*GAME_W; } } },
  draw(){
    drawWorld();
    ctx.fillStyle='rgba(7,11,20,.62)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    for(const c of this.confetti){ ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.r); ctx.fillStyle=c.c; ctx.fillRect(-5,-3,10,6); ctx.restore(); }
    ctx.textAlign='center'; ctx.font='bold 46px sans-serif'; ctx.fillStyle='#fcfcfc';
    ctx.strokeStyle='rgba(0,0,0,.5)'; ctx.lineWidth=7; ctx.strokeText('通關成功！太厲害了！', GAME_W/2, 150); ctx.fillText('通關成功！太厲害了！', GAME_W/2, 150);
    for(let s=0;s<3;s++){
      const show=this.t>0.3+s*0.35 && this.stars>s;
      const pop=Math.min(1,Math.max(0,(this.t-(0.3+s*0.35))/0.25));
      const scale=show?(1+Math.sin(pop*Math.PI)*0.5):1;
      ctx.save(); ctx.translate(GAME_W/2+(s-1)*90, 225); ctx.scale(scale,scale); drawStar(0,0,34,show); ctx.restore();
    }
    ctx.font='bold 24px sans-serif'; ctx.fillStyle='#ffcf5c';
    ctx.fillText('金幣 '+coinCount+'/'+totalCoins+'　　用時 '+elapsed.toFixed(1)+' 秒（目標 '+lv.par+' 秒內）', GAME_W/2, 310);
    ctx.font='19px sans-serif'; ctx.fillStyle='#cfd4de';
    const tips=[]; if(coinCount<Math.ceil(totalCoins*0.8)) tips.push('收集 8 成金幣'); if(elapsed>lv.par) tips.push(lv.par+' 秒內通關');
    ctx.fillText(tips.length?'拿滿 3 星訣竅：'+tips.join('、'):'3 星滿分！你是障礙賽大師！', GAME_W/2, 345);
    ctx.font='17px sans-serif'; ctx.fillStyle='#9fd8ff'; ctx.fillText('金幣已存入商店，目前存款 '+progress.bank, GAME_W/2, 372);
    if(this.t>0.6){ for(const b of this.btnRects()){ drawBtn(b); ctx.fillStyle='#fff'; ctx.font='bold 24px sans-serif'; ctx.fillText(b.label, b.x+b.w/2, b.y+37); }
      ctx.font='17px sans-serif'; ctx.fillStyle='#9fb2d8'; ctx.fillText(curLevel<2?'空白鍵＝下一關':'空白鍵＝再玩一次', GAME_W/2, 495); }
  }
};

// ===== 主迴圈：固定時間步進 =====
const STEP = 1/60;
let last = performance.now(), acc = 0;
function stepOnce(){
  fadeT = Math.max(0, fadeT - STEP);
  if(freeze > 0){ freeze -= STEP; return; }
  input.jumpBuffer = Math.max(0, input.jumpBuffer - STEP);
  state.update(STEP);
}
function frame(now){
  requestAnimationFrame(frame);
  acc += Math.min((now - last)/1000, 0.1); last = now;
  let steps=0;
  while(acc >= STEP && steps<5){ stepOnce(); acc -= STEP; steps++; }
  if(acc>STEP) acc=0;
  state.draw();
  ctx.drawImage(vignetteC, 0, 0, GAME_W, GAME_H);
  if(fadeT > 0){ ctx.fillStyle='rgba(7,11,20,'+(fadeT/FADE_DUR*0.8).toFixed(3)+')'; ctx.fillRect(0,0,GAME_W,GAME_H); }
}
setState(menuState);
requestAnimationFrame(frame);

// 測試掛鉤
window.__T = {
  input, keys, player,
  get lv(){ return lv; },
  get stateName(){ return state===menuState?'menu':state===selectState?'select':state===shopState?'shop':state===playState?'play':state===pauseState?'pause':state===winState?'win':'?'; },
  get coinCount(){ return coinCount; }, get elapsed(){ return elapsed; }, get progress(){ return progress; },
  startLevel, setStateName(n){ setState(n==='menu'?menuState:n==='select'?selectState:n==='shop'?shopState:n==='pause'?pauseState:playState); },
  step(n){ for(let i=0;i<n;i++) stepOnce(); }
};
</script>

<script>/* AI-CAMP-STATS-BEACON */
(function(){

      fetch(REL+"hit/"+NS+"/"+n).then(function(r){
        if(!r||!r.ok){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); }
      }).catch(function(){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); });
    }catch(e){}
  }
  function read(n,cb){
    function via(base,next){ try{ fetch(base+"get/"+NS+"/"+n).then(function(r){ if(r.status===404&&base===ABS) return {value:0}; if(!r.ok) throw 0; return r.json(); }).then(function(j){ cb(j.value||j.count||0); }).catch(next); }catch(e){ next(); } }
    via(REL, function(){ via(ABS, function(){ cb(null); }); });
  }
  ping(K+"-v");
  var done=false;
  function once(){ if(done)return; done=true; ping(K+"-p"); ping("site-total-plays");
    window.removeEventListener("pointerdown",once); window.removeEventListener("keydown",once); }
  window.addEventListener("pointerdown",once,{once:false}); window.addEventListener("keydown",once,{once:false});
  /* 投票鈕：非常好玩/好玩——與作品館同一計數器，任何網頁打開都同步 */

    var btns={};

      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){

      btns[d[0]]=b; wrap.appendChild(b);

  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
