<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>蒐集金幣</title>
<!-- 部分圖示：OpenMoji (CC BY-SA 4.0) openmoji.org -->
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;touch-action:none;
    -webkit-user-select:none;user-select:none;font-family:'Microsoft JhengHei','PingFang TC',sans-serif;
    background:linear-gradient(#87ceeb,#3f7d3a)}
  #gameCanvas{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    border-radius:6px;box-shadow:0 10px 40px rgba(0,0,0,.35)}
  #muteBtn{position:fixed;top:10px;right:10px;z-index:30;width:44px;height:44px;border-radius:50%;
    font-size:20px;border:2px solid rgba(255,255,255,.5);background:rgba(30,60,30,.5);color:#fff;cursor:pointer}
  .ovl{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;color:#fff;background:rgba(18,40,22,.72);backdrop-filter:blur(4px);transition:opacity .35s}
  .ovl.hide{opacity:0;pointer-events:none}
  .card{background:linear-gradient(#fffdf2,#ffe9b8);color:#4a3510;border-radius:22px;padding:34px 44px;
    box-shadow:0 12px 0 #c99b3f,0 22px 44px rgba(0,0,0,.45);max-width:82vw;
    animation:pop .45s cubic-bezier(.2,1.6,.4,1)}
  @keyframes pop{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}}
  .card h1{margin:0 0 8px;font-size:min(44px,8vw);letter-spacing:6px;color:#b8741a;
    text-shadow:0 2px 0 #fff}
  .card p{margin:6px 0;line-height:1.8;font-size:15px;color:#6a5220}
  .card .big{font-size:30px;color:#d9480f;font-weight:bold}
  .mainBtn{margin-top:18px;padding:15px 52px;font-size:21px;font-weight:bold;color:#fff;cursor:pointer;
    background:linear-gradient(#ffc24d,#f08c00);border:none;border-radius:14px;font-family:inherit;
    box-shadow:0 6px 0 #b35c00,0 10px 18px rgba(0,0,0,.3);letter-spacing:4px;transition:transform .1s}
  .mainBtn:active{transform:translateY(5px);box-shadow:0 1px 0 #b35c00}
  .hint{font-size:12px;color:#8a7340;margin-top:14px;line-height:1.7}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<button id="muteBtn">🔊</button>
<div id="titleOvl" class="ovl">
  <div class="card">
    <h1>🪙 蒐集金幣</h1>
    <p>限時 30 秒，幫小藍撿起滿地的金幣！<br>
    連續快撿可以疊 <b style="color:#d9480f">COMBO</b> 加倍得分，<br>
    💎 寶石大加分・⏰ 時鐘加時間・🧲 磁鐵吸金幣，<br>
    小心 💣 炸彈會炸掉你的分數！</p>
    <button id="startBtn" class="mainBtn">開始遊戲</button>
    <div class="hint">電腦：WASD / 方向鍵，或按住滑鼠移動<br>手機：手指按住畫面，小藍會跟著跑</div>
  </div>
</div>
<div id="overOvl" class="ovl hide">
  <div class="card">
    <h1>⏰ 時間到！</h1>
    <p class="big">分數 <span id="finalScore">0</span></p>
    <p>🪙 金幣 <span id="statCoins">0</span>　💎 寶石 <span id="statGems">0</span>　🔥 最高 COMBO <span id="statCombo">0</span></p>
    <p>🏆 最佳紀錄 <span id="statBest">0</span> <span id="newBest" style="color:#d9480f;display:none">✨ 新紀錄！</span></p>
    <button id="restartBtn" class="mainBtn">再玩一次</button>
  </div>
</div>

/* ================= 音效 ================= */
let AC=null,muted=false;
function audio(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}return AC;}
addEventListener('pointerdown',audio,{once:true});addEventListener('keydown',audio,{once:true});
function beep(f,d,type,vol,slide){
  const ac=audio();if(!ac||muted)return;
  const o=ac.createOscillator(),g=ac.createGain();
  o.type=type||'square';o.frequency.setValueAtTime(f,ac.currentTime);
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide),ac.currentTime+d);
  g.gain.setValueAtTime(vol||.12,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);
  o.connect(g).connect(ac.destination);o.start();o.stop(ac.currentTime+d);
}
function boom(){
  const ac=audio();if(!ac||muted)return;
  const len=ac.sampleRate*.4,buf=ac.createBuffer(1,len,ac.sampleRate),ch=buf.getChannelData(0);
  for(let i=0;i<len;i++)ch[i]=(Math.random()*2-1)*(1-i/len);
  const src=ac.createBufferSource(),g=ac.createGain(),f=ac.createBiquadFilter();
  src.buffer=buf;f.type='lowpass';f.frequency.value=800;
  g.gain.setValueAtTime(.3,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.4);
  src.connect(f).connect(g).connect(ac.destination);src.start();
  beep(90,.3,'sawtooth',.2,-50);
}

function ptrPos(e){
  const r=cv.getBoundingClientRect();
  ptr.x=(e.clientX-r.left)/cv._scale;ptr.y=(e.clientY-r.top)/cv._scale;
}
cv.addEventListener('pointerdown',e=>{e.preventDefault();ptr.down=true;ptrPos(e);});
cv.addEventListener('pointermove',e=>{if(ptr.down)ptrPos(e);});
addEventListener('pointerup',()=>ptr.down=false);
addEventListener('pointercancel',()=>ptr.down=false);
cv.addEventListener('contextmenu',e=>e.preventDefault());
/* ================= 遊戲狀態 ================= */
let state='title';
let score=0,timeLeft=30,elapsed=0,combo=0,comboT=0,maxCombo=0,coinsGot=0,gemsGot=0;
let shake=0,freeze=0,tGlobal=0,tickAcc=0,hintT=0;
let best=0;try{best=+localStorage.getItem('coincollect.best')||0;}catch(e){}
let dispScore=0,dispTime=30;
const player={x:GAME_W/2,y:GAME_H/2,vx:0,vy:0,r:20,face:1,sx:1,sy:1,blink:rnd(1,3),
  bobT:0,magnetT:0,stunT:0,trailT:0};
let items=[],bombs=[],parts=[],floats=[],sparkles=[];
let bombT=12,clockT=10,magnetT2=16;
/* 背景裝飾（固定隨機） */
const flowers=[],tufts=[],cloudsBG=[];
(function(){
  let seed=7;
  const sr=()=>{seed=(seed*16807)%2147483647;return seed/2147483647;};
  for(let i=0;i<26;i++)flowers.push({x:sr()*GAME_W,y:60+sr()*(GAME_H-80),
    c:['#d94f45','#f2a444','#f6f0d8','#c785d6'][i%4],s:.7+sr()*.7,ph:sr()*6});
  for(let i=0;i<40;i++)tufts.push({x:sr()*GAME_W,y:50+sr()*(GAME_H-60),s:.6+sr()*.9,ph:sr()*6});
  for(let i=0;i<5;i++)cloudsBG.push({x:sr()*GAME_W,y:20+sr()*70,s:.7+sr()*.9,v:6+sr()*10});
})();
/* ================= 生成 ================= */
function spawnItem(kind){
  const margin=44;
  for(let t=0;t<30;t++){
    const x=rnd(margin,GAME_W-margin),y=rnd(70,GAME_H-margin);
    if(Math.hypot(x-player.x,y-player.y)>90){
      items.push({kind,x,y,r:kind==='gem'?15:13,ang:rnd(0,6),bob:rnd(0,6),
        life:kind==='coin'?Infinity:(kind==='gem'?7:9),born:tGlobal,pop:0});
      return;
    }
  }
  items.push({kind,x:rnd(margin,GAME_W-margin),y:rnd(70,GAME_H-margin),r:13,ang:0,bob:0,life:Infinity,born:tGlobal,pop:0});
}
function spawnBomb(){
  const edge=Math.random()*4|0;
  const x=edge===0?-20:edge===1?GAME_W+20:rnd(0,GAME_W);
  const y=edge===2?-20:edge===3?GAME_H+20:rnd(70,GAME_H);
  const a=Math.atan2(rnd(100,GAME_H-100)-y,rnd(100,GAME_W-100)-x);
  bombs.push({x,y,vx:Math.cos(a)*rnd(28,55),vy:Math.sin(a)*rnd(28,55),r:16,wob:rnd(0,6),fuse:0});
}
/* ================= 粒子 / 飄字 ================= */
function burst(x,y,color,n,sp){
  for(let i=0;i<(n||10);i++){
    if(parts.length>260)parts.shift();
    const a=Math.random()*Math.PI*2,s=(sp||160)*(.3+Math.random()*.7);
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-40,life:rnd(.35,.6),max:.6,c:color,sz:rnd(3,6)});
  }
}
function floatTxt(x,y,txt,color,size){
  floats.push({x,y,txt,c:color||'#fff',life:.9,sz:size||18});
}
/* ================= 更新 ================= */
function resetGame(){
  score=0;timeLeft=30;elapsed=0;combo=0;comboT=0;maxCombo=0;coinsGot=0;gemsGot=0;
  dispScore=0;dispTime=30;hintT=4;
  player.x=GAME_W/2;player.y=GAME_H/2;player.vx=0;player.vy=0;
  player.magnetT=0;player.stunT=0;player.sx=1;player.sy=1;
  items=[];bombs=[];parts=[];floats=[];sparkles=[];
  bombT=12;clockT=10;magnetT2=16;tickAcc=0;
  for(let i=0;i<8;i++)spawnItem('coin');
}
function startPlay(){
  resetGame();state='play';sfx.start();
  document.getElementById('titleOvl').classList.add('hide');
  document.getElementById('overOvl').classList.add('hide');
}
function gameOver(){
  state='over';sfx.end();
  const isNew=score>best;
  if(isNew){best=score;try{localStorage.setItem('coincollect.best',best);}catch(e){}
    setTimeout(()=>sfx.best(),600);}
  document.getElementById('finalScore').textContent=score;
  document.getElementById('statCoins').textContent=coinsGot;
  document.getElementById('statGems').textContent=gemsGot;
  document.getElementById('statCombo').textContent=maxCombo;
  document.getElementById('statBest').textContent=best;
  document.getElementById('newBest').style.display=isNew?'inline':'none';
  document.getElementById('overOvl').classList.remove('hide');
}
function update(dt){
  tGlobal+=dt;
  shake*=Math.pow(.001,dt);if(shake<.1)shake=0;
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=500*dt;p.life-=dt;if(p.life<=0)parts.splice(i,1);}
  for(let i=floats.length-1;i>=0;i--){const f=floats[i];f.y-=55*dt;f.life-=dt;if(f.life<=0)floats.splice(i,1);}
  for(let i=sparkles.length-1;i>=0;i--){const s=sparkles[i];s.life-=dt;if(s.life<=0)sparkles.splice(i,1);}
  for(const c of cloudsBG){c.x+=c.v*dt;if(c.x>GAME_W+120)c.x=-120;}
  if(state!=='play')return;
  elapsed+=dt;timeLeft-=dt;
  dispScore+=(score-dispScore)*Math.min(1,dt*8);
  dispTime+=(timeLeft-dispTime)*Math.min(1,dt*8);
  if(timeLeft<=5.2){
    tickAcc+=dt;
    if(tickAcc>1){tickAcc=0;sfx.tick();}
  }
  if(timeLeft<=0){timeLeft=0;gameOver();return;}
  hintT-=dt;
  /* --- 玩家 --- */
  const p=player;
  p.blink-=dt;if(p.blink<-.12)p.blink=rnd(1.6,3.4);
  p.sx+=(1-p.sx)*10*dt;p.sy+=(1-p.sy)*10*dt;
  p.stunT-=dt;
  let ix=0,iy=0;
  if(keys['KeyW']||keys['ArrowUp'])iy-=1;
  if(keys['KeyS']||keys['ArrowDown'])iy+=1;
  if(keys['KeyA']||keys['ArrowLeft'])ix-=1;
  if(keys['KeyD']||keys['ArrowRight'])ix+=1;
  if(ptr.down){
    const dx=ptr.x-p.x,dy=ptr.y-p.y,d=Math.hypot(dx,dy);
    if(d>14){ix+=dx/d;iy+=dy/d;}
  }
  const il=Math.hypot(ix,iy);
  if(il>1){ix/=il;iy/=il;}
  const spd=(p.stunT>0?140:330);
  p.vx+=(ix*spd-p.vx)*Math.min(1,dt*10);
  p.vy+=(iy*spd-p.vy)*Math.min(1,dt*10);
  p.x=clamp(p.x+p.vx*dt,p.r,GAME_W-p.r);
  p.y=clamp(p.y+p.vy*dt,p.r+46,GAME_H-p.r);
  const sp=Math.hypot(p.vx,p.vy);
  if(sp>40){
    if(Math.abs(p.vx)>10)p.face=Math.sign(p.vx);
    p.bobT+=dt*sp*.05;
    p.trailT-=dt;
    if(p.trailT<=0){p.trailT=.05;
      parts.push({x:p.x-p.vx*.02,y:p.y+p.r*.6,vx:-p.vx*.15+rnd(-15,15),vy:rnd(-20,-5),
        life:.35,max:.35,c:'rgba(140,200,255,.7)',sz:5});}
  }
  p.magnetT-=dt;
  /* --- Combo 倒數 --- */
  comboT-=dt;
  if(comboT<=0&&combo>0)combo=0;
  /* --- 道具 --- */
  for(let i=items.length-1;i>=0;i--){
    const it=items[i];
    it.ang+=dt*4;it.pop=Math.max(0,it.pop-dt*4);
    if(it.life!==Infinity){
      it.life-=dt;
      if(it.life<=0){items.splice(i,1);continue;}
    }
    if(p.magnetT>0&&it.kind==='coin'){
      const dx=p.x-it.x,dy=p.y-it.y,d=Math.hypot(dx,dy);
      if(d<200){it.x+=dx/d*380*dt;it.y+=dy/d*380*dt;}
    }
    const d=Math.hypot(p.x-it.x,p.y-it.y);
    if(d<p.r+it.r+4){
      items.splice(i,1);
      if(it.kind==='coin'){
        combo++;comboT=1.6;maxCombo=Math.max(maxCombo,combo);
        const gain=10+Math.min(combo,15)*2;
        score+=gain;coinsGot++;
        sfx.coin(combo);burst(it.x,it.y,'#ffd700',10,150);
        floatTxt(it.x,it.y-16,'+'+gain,combo>=5?'#ff8f1f':'#ffd700',combo>=5?22:18);
        if(combo>0&&combo%5===0)floatTxt(p.x,p.y-40,'COMBO ×'+combo+'！','#ff5722',26);
        p.sx=1.25;p.sy=.8;
        spawnItem(Math.random()<.09?'gem':'coin');
        if(timeLeft<10&&items.filter(x=>x.kind==='coin').length<12)spawnItem('coin');
      }else if(it.kind==='gem'){
        combo++;comboT=1.6;maxCombo=Math.max(maxCombo,combo);
        score+=50;gemsGot++;freeze=.08;shake=Math.max(shake,4);
        sfx.gem();burst(it.x,it.y,'#7fd0ff',18,220);burst(it.x,it.y,'#fff',8,120);
        floatTxt(it.x,it.y-18,'+50 寶石！','#4fc3f7',24);
        p.sx=1.35;p.sy=.7;
      }else if(it.kind==='clock'){
        timeLeft=Math.min(timeLeft+5,60);
        sfx.clock();burst(it.x,it.y,'#a6e26f',12,160);
        floatTxt(it.x,it.y-18,'+5 秒','#7bd346',22);
      }else if(it.kind==='magnet'){
        p.magnetT=6;
        sfx.magnet();burst(it.x,it.y,'#ff7a6a',12,160);
        floatTxt(it.x,it.y-18,'磁鐵 6 秒！','#ff8a80',20);
      }
    }
  }
  /* --- 炸彈 --- */
  bombT-=dt;
  const maxBombs=Math.min(1+Math.floor(elapsed/16),5);
  if(bombT<=0&&bombs.length<maxBombs){bombT=Math.max(7-elapsed*.08,3.5);spawnBomb();}
  for(let i=bombs.length-1;i>=0;i--){
    const b=bombs[i];
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.wob+=dt*5;b.fuse+=dt;
    if(b.x<-40||b.x>GAME_W+40||b.y<-40||b.y>GAME_H+40){bombs.splice(i,1);continue;}
    if(b.fuse>.12){b.fuse=0;
      sparkles.push({x:b.x+10,y:b.y-14,life:.3,c:'#ffb74d'});}
    if(p.stunT<=0&&Math.hypot(p.x-b.x,p.y-b.y)<p.r+b.r-4){
      bombs.splice(i,1);
      const loss=Math.min(score,30);
      score-=loss;combo=0;p.stunT=1;
      freeze=.1;shake=12;boom();
      burst(b.x,b.y,'#ff7043',22,260);burst(b.x,b.y,'#666',14,180);
      floatTxt(p.x,p.y-30,'-'+loss+'！','#ff5252',24);
      p.sx=1.5;p.sy=.5;
    }
  }
  /* --- 定時生成 --- */
  clockT-=dt;
  if(clockT<=0){clockT=11;
    if(!items.some(i=>i.kind==='clock')&&timeLeft<35)spawnItem('clock');}
  magnetT2-=dt;
  if(magnetT2<=0){magnetT2=17;
    if(!items.some(i=>i.kind==='magnet'))spawnItem('magnet');}
}
/* ================= 繪圖 ================= */
function drawBG(){
  const g=ctx.createLinearGradient(0,0,0,GAME_H);
  g.addColorStop(0,'#8ed3f2');g.addColorStop(.16,'#bde8f7');
  g.addColorStop(.17,'#8fca5c');g.addColorStop(1,'#5a9e3e');
  ctx.fillStyle=g;ctx.fillRect(0,0,GAME_W,GAME_H);
  // 太陽
  const sg=ctx.createRadialGradient(860,46,6,860,46,60);
  sg.addColorStop(0,'rgba(255,240,160,.95)');sg.addColorStop(.4,'rgba(255,220,110,.5)');sg.addColorStop(1,'rgba(255,220,110,0)');
  ctx.fillStyle=sg;ctx.fillRect(800,-14,120,120);
  ctx.fillStyle='#ffe9a3';ctx.beginPath();ctx.arc(860,46,20,0,7);ctx.fill();
  // 雲
  ctx.fillStyle='rgba(255,255,255,.9)';
  for(const c of cloudsBG){
    ctx.beginPath();
    ctx.ellipse(c.x,c.y,34*c.s,12*c.s,0,0,7);
    ctx.ellipse(c.x-24*c.s,c.y+5,20*c.s,9*c.s,0,0,7);
    ctx.ellipse(c.x+26*c.s,c.y+4,24*c.s,10*c.s,0,0,7);
    ctx.fill();
  }
  // 遠丘
  ctx.fillStyle='#79b94f';
  ctx.beginPath();ctx.moveTo(0,95);
  ctx.quadraticCurveTo(160,58,340,92);ctx.quadraticCurveTo(520,120,700,84);
  ctx.quadraticCurveTo(840,60,960,92);ctx.lineTo(960,140);ctx.lineTo(0,140);ctx.closePath();ctx.fill();
  // 草地斜紋（割草紋）
  ctx.fillStyle='rgba(255,255,255,.05)';
  for(let i=-1;i<8;i++){
    ctx.beginPath();
    ctx.moveTo(i*160,GAME_H);ctx.lineTo(i*160+120,92);ctx.lineTo(i*160+200,92);ctx.lineTo(i*160+80,GAME_H);
    ctx.closePath();ctx.fill();
  }
  // 草叢與花
  for(const t of tufts){
    const sway=Math.sin(tGlobal*2+t.ph)*2;
    ctx.strokeStyle='rgba(38,90,30,.5)';ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(t.x,t.y);ctx.quadraticCurveTo(t.x+sway,t.y-8*t.s,t.x+sway*1.5,t.y-13*t.s);
    ctx.moveTo(t.x+4,t.y);ctx.quadraticCurveTo(t.x+4+sway,t.y-6*t.s,t.x+5+sway,t.y-10*t.s);
    ctx.stroke();
  }
  for(const f of flowers){
    const sway=Math.sin(tGlobal*1.6+f.ph)*1.5;
    ctx.strokeStyle='#3d7a30';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(f.x,f.y);ctx.quadraticCurveTo(f.x+sway,f.y-7,f.x+sway,f.y-11*f.s);ctx.stroke();
    ctx.fillStyle=f.c;
    for(let i=0;i<5;i++){
      const a=i/5*Math.PI*2+f.ph;
      ctx.beginPath();ctx.ellipse(f.x+sway+Math.cos(a)*4*f.s,f.y-11*f.s+Math.sin(a)*4*f.s,3*f.s,2*f.s,a,0,7);ctx.fill();
    }
    ctx.fillStyle='#ffe082';ctx.beginPath();ctx.arc(f.x+sway,f.y-11*f.s,2.4*f.s,0,7);ctx.fill();
  }
}
function drawItem(it){
  const bob=Math.sin(tGlobal*3+it.bob)*4;
  const x=it.x,y=it.y+bob;
  ctx.fillStyle='rgba(20,60,20,.25)';
  ctx.beginPath();ctx.ellipse(x,it.y+16,12,4,0,0,7);ctx.fill();
  const blink=it.life<2.5&&it.life!==Infinity?(Math.sin(tGlobal*12)>0?1:.25):1;
  ctx.save();ctx.translate(x,y);ctx.globalAlpha=blink;
  const pop=1+it.pop*.4;
  if(it.kind==='coin'){
    const spin=Math.cos(it.ang);
    ctx.scale(Math.max(.15,Math.abs(spin))*pop,pop);
    const gl=ctx.createRadialGradient(0,0,3,0,0,22);
    gl.addColorStop(0,'rgba(255,225,120,.55)');gl.addColorStop(1,'rgba(255,225,120,0)');
    ctx.fillStyle=gl;ctx.fillRect(-22,-22,44,44);
    if(ready(IMG.coin))ctx.drawImage(IMG.coin,-17,-17,34,34);
    else{ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(0,0,13,0,7);ctx.fill();
      ctx.strokeStyle='#b8860b';ctx.lineWidth=2;ctx.stroke();}
  }else if(it.kind==='gem'){
    ctx.scale(pop,pop);ctx.rotate(Math.sin(tGlobal*2+it.bob)*.15);
    const gl=ctx.createRadialGradient(0,0,3,0,0,26);
    gl.addColorStop(0,'rgba(130,210,255,'+(.4+.2*Math.sin(tGlobal*5))+')');gl.addColorStop(1,'rgba(130,210,255,0)');
    ctx.fillStyle=gl;ctx.fillRect(-26,-26,52,52);
    if(ready(IMG.gem))ctx.drawImage(IMG.gem,-19,-19,38,38);
    else{ctx.fillStyle='#61b2e4';ctx.beginPath();ctx.moveTo(-14,-6);ctx.lineTo(14,-6);ctx.lineTo(0,14);ctx.closePath();ctx.fill();}
    ctx.fillStyle='rgba(255,255,255,'+(.5+.5*Math.sin(tGlobal*6+it.bob))+')';
    ctx.beginPath();ctx.arc(-6,-8,2,0,7);ctx.fill();
  }else if(it.kind==='clock'){
    ctx.rotate(Math.sin(tGlobal*6)*.12);
    if(ready(IMG.clock))ctx.drawImage(IMG.clock,-17,-17,34,34);
    else{ctx.fillStyle='#a6e26f';ctx.beginPath();ctx.arc(0,0,13,0,7);ctx.fill();}
  }else if(it.kind==='magnet'){
    ctx.rotate(Math.sin(tGlobal*3+it.bob)*.2);
    if(ready(IMG.magnet))ctx.drawImage(IMG.magnet,-17,-17,34,34);
    else{ctx.fillStyle='#ea5a47';ctx.fillRect(-10,-12,20,24);}
  }
  ctx.restore();ctx.globalAlpha=1;
}
function drawBomb(b){
  ctx.fillStyle='rgba(20,60,20,.3)';
  ctx.beginPath();ctx.ellipse(b.x,b.y+16,13,4,0,0,7);ctx.fill();
  ctx.save();ctx.translate(b.x,b.y);ctx.rotate(Math.sin(b.wob)*.18);
  const danger=Math.hypot(player.x-b.x,player.y-b.y)<110;
  if(danger){
    ctx.fillStyle='rgba(255,60,40,'+(.2+.15*Math.sin(tGlobal*10))+')';
    ctx.beginPath();ctx.arc(0,0,24,0,7);ctx.fill();
  }
  if(ready(IMG.bomb))ctx.drawImage(IMG.bomb,-19,-19,38,38);
  else{ctx.fillStyle='#3f3f3f';ctx.beginPath();ctx.arc(0,2,14,0,7);ctx.fill();}
  ctx.restore();
  for(const s of sparkles){
    ctx.globalAlpha=s.life/.3;
    ctx.fillStyle=s.c;
    ctx.beginPath();ctx.arc(s.x+rnd(-2,2),s.y+rnd(-2,2),2.4,0,7);ctx.fill();
  }
  ctx.globalAlpha=1;
}
function drawPlayer(){
  const p=player;
  ctx.fillStyle='rgba(20,60,20,.3)';
  ctx.beginPath();ctx.ellipse(p.x,p.y+p.r*.95,p.r*.85,5,0,0,7);ctx.fill();
  ctx.save();ctx.translate(p.x,p.y+p.r);
  const hop=Math.abs(Math.sin(p.bobT))*4;
  ctx.translate(0,-hop);
  ctx.scale(p.sx,p.sy);
  const flash=p.stunT>0&&Math.sin(tGlobal*20)>0;
  // 磁鐵光環
  if(p.magnetT>0){
    ctx.strokeStyle='rgba(120,190,255,'+(.4+.2*Math.sin(tGlobal*6))+')';
    ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(0,-p.r,p.r+9+Math.sin(tGlobal*5)*3,0,7);ctx.stroke();
  }
  // 身體：漸層球
  const bg=ctx.createRadialGradient(-p.r*.35,-p.r*1.35,3,0,-p.r,p.r*1.2);
  bg.addColorStop(0,flash?'#fff':'#7db9e8');
  bg.addColorStop(.6,flash?'#eee':'#4a90d9');
  bg.addColorStop(1,flash?'#ccc':'#2c5f8a');
  ctx.fillStyle=bg;
  ctx.beginPath();ctx.ellipse(0,-p.r,p.r,p.r,0,0,7);ctx.fill();
  ctx.strokeStyle='#1e4463';ctx.lineWidth=2.5;ctx.stroke();
  // 高光
  ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.beginPath();ctx.ellipse(-p.r*.4,-p.r*1.4,p.r*.28,p.r*.18,-.5,0,7);ctx.fill();
  // 小腳
  ctx.fillStyle='#2c5f8a';
  const step=Math.sin(p.bobT*2)*3;
  ctx.beginPath();ctx.ellipse(-8,-2+step,6,4,0,0,7);ctx.fill();
  ctx.beginPath();ctx.ellipse(8,-2-step,6,4,0,0,7);ctx.fill();
  // 臉
  const lookX=clamp(p.vx*.012,-3.5,3.5),lookY=clamp(p.vy*.012,-2.5,2.5);
  if(p.blink<0||p.stunT>.5){
    ctx.strokeStyle='#123';ctx.lineWidth=2.4;
    ctx.beginPath();ctx.moveTo(-11,-p.r-4);ctx.lineTo(-4,-p.r-4);
    ctx.moveTo(4,-p.r-4);ctx.lineTo(11,-p.r-4);ctx.stroke();
  }else{
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.ellipse(-7.5+lookX*.4,-p.r-4,5.4,6.2,0,0,7);ctx.fill();
    ctx.beginPath();ctx.ellipse(7.5+lookX*.4,-p.r-4,5.4,6.2,0,0,7);ctx.fill();
    ctx.fillStyle='#16283c';
    ctx.beginPath();ctx.arc(-7+lookX,-p.r-3.4+lookY,2.8,0,7);ctx.fill();
    ctx.beginPath();ctx.arc(8+lookX,-p.r-3.4+lookY,2.8,0,7);ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(-8+lookX,-p.r-4.4+lookY,1,0,7);ctx.fill();
    ctx.beginPath();ctx.arc(7+lookX,-p.r-4.4+lookY,1,0,7);ctx.fill();
  }
  // 腮紅
  ctx.fillStyle='rgba(255,130,130,.45)';
  ctx.beginPath();ctx.ellipse(-13,-p.r+3,3.4,2,0,0,7);ctx.fill();
  ctx.beginPath();ctx.ellipse(13,-p.r+3,3.4,2,0,0,7);ctx.fill();
  // 嘴：combo 高會張大笑
  ctx.strokeStyle='#16283c';ctx.lineWidth=2.2;ctx.lineCap='round';
  if(p.stunT>.5){
    ctx.beginPath();ctx.arc(0,-p.r+8,4,Math.PI*1.15,Math.PI*1.85);ctx.stroke();
  }else if(combo>=5){
    ctx.fillStyle='#16283c';
    ctx.beginPath();ctx.arc(0,-p.r+5,5,0,Math.PI);ctx.closePath();ctx.fill();
    ctx.fillStyle='#ff9a9a';
    ctx.beginPath();ctx.arc(0,-p.r+8,2.6,0,Math.PI);ctx.fill();
  }else{
    ctx.beginPath();ctx.arc(0,-p.r+4,4.5,.15*Math.PI,.85*Math.PI);ctx.stroke();
  }
  ctx.restore();
}
function drawHUD(){
  // 分數板
  ctx.save();
  const panel=(x,y,w,h)=>{
    ctx.fillStyle='rgba(255,253,240,.88)';
    ctx.strokeStyle='#c99b3f';ctx.lineWidth=2;
    ctx.beginPath();
    ctx.roundRect?ctx.roundRect(x,y,w,h,10):ctx.rect(x,y,w,h);
    ctx.fill();ctx.stroke();
  };
  panel(12,10,170,36);
  if(ready(IMG.coin))ctx.drawImage(IMG.coin,20,15,26,26);
  ctx.fillStyle='#7a5a10';ctx.font='bold 21px sans-serif';ctx.textAlign='left';
  ctx.fillText(Math.round(dispScore),54,37);
  ctx.font='12px sans-serif';ctx.fillStyle='#a08040';
  ctx.fillText('最佳 '+best,110,36);
  // Combo
  if(combo>=2){
    const pulse=1+.12*Math.sin(tGlobal*10);
    ctx.save();ctx.translate(97,72);ctx.scale(pulse,pulse);
    ctx.fillStyle=combo>=8?'#ff5722':'#f08c00';
    ctx.font='bold 20px sans-serif';ctx.textAlign='center';
    ctx.strokeStyle='#fff';ctx.lineWidth=4;
    ctx.strokeText('COMBO ×'+combo,0,0);ctx.fillText('COMBO ×'+combo,0,0);
    ctx.restore();
    // combo 倒數條
    ctx.fillStyle='rgba(0,0,0,.2)';ctx.fillRect(52,80,90,5);
    ctx.fillStyle=combo>=8?'#ff5722':'#f0a020';
    ctx.fillRect(52,80,90*clamp(comboT/1.6,0,1),5);
  }
  // 時間條
  const tw=300,tx=GAME_W/2-tw/2;
  panel(tx-8,10,tw+16,30);
  const frac=clamp(dispTime/30,0,1.5);
  const barGrad=ctx.createLinearGradient(tx,0,tx+tw,0);
  if(timeLeft>10){barGrad.addColorStop(0,'#7bd346');barGrad.addColorStop(1,'#4caf50');}
  else{barGrad.addColorStop(0,'#ff8a65');barGrad.addColorStop(1,'#ff5252');}
  ctx.fillStyle='rgba(0,0,0,.12)';ctx.fillRect(tx,17,tw,16);
  ctx.fillStyle=barGrad;ctx.fillRect(tx,17,tw*Math.min(frac,1),16);
  ctx.fillStyle='rgba(255,255,255,.35)';ctx.fillRect(tx,17,tw*Math.min(frac,1),5);
  ctx.fillStyle='#5a4210';ctx.font='bold 15px sans-serif';ctx.textAlign='center';
  const shakeT=timeLeft<=5?Math.sin(tGlobal*14)*2:0;
  ctx.fillText('⏰ '+Math.ceil(dispTime)+' 秒',GAME_W/2,32+shakeT);
  if(timeLeft<=10&&Math.floor(tGlobal*2)%2===0&&state==='play'){
    ctx.fillStyle='#ff5252';ctx.font='bold 17px sans-serif';
    ctx.fillText('⚡ 衝刺時間！',GAME_W/2,62);
  }
  // 磁鐵剩餘
  if(player.magnetT>0){
    panel(GAME_W-118,54,104,26);
    if(ready(IMG.magnet))ctx.drawImage(IMG.magnet,GAME_W-114,57,20,20);
    ctx.fillStyle='rgba(0,0,0,.12)';ctx.fillRect(GAME_W-90,63,70,8);
    ctx.fillStyle='#4a90d9';ctx.fillRect(GAME_W-90,63,70*clamp(player.magnetT/6,0,1),8);
  }
  if(hintT>0&&state==='play'){
    ctx.globalAlpha=clamp(hintT,0,1);
    ctx.fillStyle='#fff';ctx.font='16px sans-serif';ctx.textAlign='center';
    ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=4;
    const msg='移動小藍去撿金幣！連續撿 COMBO 更高分';
    ctx.strokeText(msg,GAME_W/2,GAME_H-24);ctx.fillText(msg,GAME_W/2,GAME_H-24);
    ctx.globalAlpha=1;
  }
  ctx.restore();
}
function draw(){
  ctx.save();
  ctx.translate((Math.random()*2-1)*shake,(Math.random()*2-1)*shake);
  drawBG();
  items.slice().sort((a,b)=>a.y-b.y).forEach(drawItem);
  for(const b of bombs)drawBomb(b);
  drawPlayer();
  for(const p of parts){
    ctx.globalAlpha=clamp(p.life/p.max,0,1);
    ctx.fillStyle=p.c;
    ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
  }
  ctx.globalAlpha=1;
  ctx.font='bold 18px sans-serif';ctx.textAlign='center';
  for(const f of floats){
    ctx.globalAlpha=clamp(f.life*1.5,0,1);
    ctx.font='bold '+f.sz+'px sans-serif';
    ctx.strokeStyle='rgba(60,30,0,.55)';ctx.lineWidth=4;
    ctx.strokeText(f.txt,f.x,f.y);
    ctx.fillStyle=f.c;ctx.fillText(f.txt,f.x,f.y);
  }
  ctx.globalAlpha=1;
  ctx.restore();
  drawHUD();
  if(timeLeft<=5&&state==='play'){
    ctx.fillStyle='rgba(255,40,20,'+(.06+.05*Math.sin(tGlobal*8))+')';
    ctx.fillRect(0,0,GAME_W,GAME_H);
  }
}
/* ================= 主迴圈 ================= */
const STEP=1/60;
let last=performance.now(),acc=0;
function frame(now){
  requestAnimationFrame(frame);
  acc+=Math.min((now-last)/1000,.1);last=now;
  while(acc>=STEP){
    if(freeze>0){freeze-=STEP;acc-=STEP;continue;}
    update(STEP);acc-=STEP;
  }
  draw();
}
document.getElementById('startBtn').addEventListener('click',startPlay);
document.getElementById('restartBtn').addEventListener('click',startPlay);
addEventListener('keydown',e=>{
  if(e.code==='Space'&&state==='over')startPlay();
});
resetGame();
requestAnimationFrame(frame);
</script>
