// ----- Web Audio（v6：壓縮母線＋程序化殘響＋風聲環境層） -----
let AC = null, BUS = null, windGain = null;
let muted = localStorage.getItem('haunt-muted') === '1';
function audio() {
  if (!AC) {
    try {
      AC = new (window.AudioContext || window.webkitAudioContext)();
      const comp = AC.createDynamicsCompressor();
      comp.threshold.value = -16; comp.knee.value = 24; comp.ratio.value = 8;
      comp.attack.value = 0.003; comp.release.value = 0.22;
      BUS = AC.createGain();
      BUS.gain.value = 0.9;
      BUS.connect(comp);
      comp.connect(AC.destination);
      // v6 程序化殘響：generated impulse ConvolverNode（空曠鬼屋回聲）
      try {
        const len = Math.floor(AC.sampleRate * 1.9);
        const ir = AC.createBuffer(2, len, AC.sampleRate);
        for (let c = 0; c < 2; c++) {
          const d = ir.getChannelData(c);
          for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.6);
        }
        const conv = AC.createConvolver(); conv.buffer = ir;
        const rev = AC.createGain(); rev.gain.value = 0.22;
        BUS.connect(rev); rev.connect(conv); conv.connect(comp);
      } catch (e) {}
      // v6 夜風環境層：噪聲 bandpass＋慢速 LFO 起伏（音量依遊戲狀態切換）
      try {
        const wlen = AC.sampleRate * 2;
        const wbuf = AC.createBuffer(1, wlen, AC.sampleRate);
        const wd = wbuf.getChannelData(0);
        for (let i = 0; i < wlen; i++) wd[i] = Math.random() * 2 - 1;
        const wsrc = AC.createBufferSource(); wsrc.buffer = wbuf; wsrc.loop = true;
        const wbp = AC.createBiquadFilter(); wbp.type = 'bandpass'; wbp.frequency.value = 480; wbp.Q.value = 0.5;
        const wg = AC.createGain(); wg.gain.value = 1;
        const lfo = AC.createOscillator(); lfo.frequency.value = 0.11;
        const lfoG = AC.createGain(); lfoG.gain.value = 0.4;
        lfo.connect(lfoG); lfoG.connect(wg.gain); lfo.start();
        windGain = AC.createGain(); windGain.gain.value = 0;
        wsrc.connect(wbp); wbp.connect(wg); wg.connect(windGain); windGain.connect(comp); wsrc.start();
      } catch (e) { windGain = null; }
      updateAmbient();
    } catch (e) { AC = null; }
  }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function updateAmbient() {
  if (!AC || !windGain) return;
  windGain.gain.setTargetAtTime((!muted && mode !== 'title') ? 0.055 : 0, AC.currentTime, 0.6);
}

addEventListener('keydown', audio, { once: true });
function beep(freq, dur, type, vol, slide) {
  if (muted) return;
  const ac = audio(); if (!ac || !BUS) return;
  freq *= 0.96 + Math.random() * 0.08;   // v6 隨機音高 ±4%
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, ac.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), ac.currentTime + dur);
  g.gain.setValueAtTime(vol || 0.12, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g).connect(BUS);
  o.start();
  o.stop(ac.currentTime + dur);
}
function noiseBurst(dur, vol) {
  if (muted) return;
  const ac = audio(); if (!ac || !BUS) return;
  const len = Math.floor(ac.sampleRate * dur);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ac.createBufferSource(), g = ac.createGain();
  src.buffer = buf;
  g.gain.setValueAtTime(vol || 0.2, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  src.connect(g).connect(BUS);
  src.start();
}

function handleTouches(e) {
  if (e.target.closest('button') || e.target.closest('.overlay')) return;
  e.preventDefault();
  const defs = buttonDefs();
  // 每根手指只認「最近的一顆」按鍵（判定半徑寬鬆但不重疊誤觸）
  const now = {};
  for (const t of e.touches) {
    const p = touchPos(t);
    let bestD = btnR * 1.7, bestId = null;
    for (const d of defs) {
      const dd = Math.hypot(p.x - d.x, p.y - d.y);
      if (dd < bestD) { bestD = dd; bestId = d.id; }
    }
    if (bestId) now[bestId] = true;
  }
  // 攻擊／必殺：邊緣觸發（從「沒按」變「按下」的那一刻才觸發一次）
  if (mode === 'play' && koTimer < 0 && introT <= 0) {
    if (now['g-atk'] && !touchHeld['g-atk']) tryAttack(ghost, teacher);
    if (now['g-sp'] && !touchHeld['g-sp']) trySpecial(ghost, teacher);
    if (!vsAI) {

      if (now['t-sp'] && !touchHeld['t-sp']) trySpecial(teacher, ghost);
    }
  }
  for (const k in touchHeld) delete touchHeld[k];

const ATTACK_RANGE = 130;

function tryAttack(atk, def) {
  if (atk.cool > 0 || atk.koFall > 0 || atk.blocking) return;
  if (atk === ghost) attackCount++;
  atk.cool = 0.5;
  atk.lunge = 1;
  atk.sx = 1.2; atk.sy = 0.9;
  const dist = Math.abs(atk.x - def.x);
  if (dist < ATTACK_RANGE) {
    let dmg = DAMAGE[Math.floor(Math.random() * DAMAGE.length)];
    atk.combo = (atk.comboTimer > 0) ? atk.combo + 1 : 1;
    atk.comboTimer = 1.4;
    if (atk.combo >= 3) dmg += 2;
    hurt(def, dmg, atk.dir, atk);
    const mx = (atk.x + def.x) / 2;
    burst(mx, GROUND_Y - 90, atk === ghost ? '#ff6cc7' : '#ffa94d', 12, 260);
    if (atk.combo >= 2 && !def.blocking) addFloat(atk.x, GROUND_Y - 210, atk.combo + ' 連擊！', '#ffea00', 22);
    freeze = Math.max(freeze, 0.05);
    shake = Math.max(shake, 5);
    // 集氣
    if (atk.meter < 100) {
      atk.meter = Math.min(100, atk.meter + 28);
      if (atk.meter >= 100) { addFloat(atk.x, GROUND_Y - 190, '✨ 必殺技就緒！', '#ff6cc7', 20); sfx.meter(); }
    }
  } else {
    addFloat(atk.x + atk.dir * 50, GROUND_Y - 150, 'MISS', '#b3a3d9', 22);
    sfx.miss();
  }
}
function trySpecial(atk, def) {
  if (atk.meter < 100 || atk.cool > 0 || atk.koFall > 0) return;
  atk.meter = 0;
  atk.cool = 0.7;

function hurt(def, dmg, dir, atk) {
  if (def.blocking) {

    dmg = Math.max(2, Math.round(dmg * 0.2));
    def.hp = Math.max(0, def.hp - dmg);
    def.vx += dir * 90;
    def.meter = Math.min(100, def.meter + 8);
    def.sx = 0.92; def.sy = 1.05;
    addFloat(def.x, GROUND_Y - 180, '🛡 格擋！-' + dmg, def === ghost ? '#ff6cc7' : '#ffa94d', 22);
    burst(def.x + dir * -34, GROUND_Y - 100, '#fff', 8, 200);
    sfx.block();
  } else {
    def.hp = Math.max(0, def.hp - dmg);
    def.vx += dir * 320;
    def.hitFlash = 0.18;
    def.sx = 0.82; def.sy = 1.15;
    def.meter = Math.min(100, def.meter + 10);   // 捱打集氣（翻盤機制）
    addFloat(def.x, GROUND_Y - 170, '-' + dmg, '#ff4d6d', 30);

}

// ----- AI（老師）-----
function updateAI(dt) {
  const me = teacher, foe = ghost;
  if (me.koFall > 0 || foe.koFall > 0) return;
  me.aiTimer -= dt;
  const dist = Math.abs(me.x - foe.x);
  const aggression = 0.45 + aiLevel * 0.11;
  // 對飛來的投射物舉盾（等級越高反應越好）
  for (const pr of projectiles) {
    if (pr.owner === foe && Math.sign(me.x - pr.x) === Math.sign(pr.vx) &&
        Math.abs(pr.x - me.x) < 240 && me.blockT <= 0 &&
        Math.random() < (0.25 + aiLevel * 0.12) * dt * 12) {
      me.blockT = 0.55;
    }
  }
  if (me.aiTimer <= 0) {
    me.aiTimer = 0.14 + Math.random() * 0.2 - aiLevel * 0.015;
    if (me.meter >= 100 && dist > 220 && Math.random() < 0.5) {
      trySpecial(me, foe);
      me.aiMove = 0;
    } else if (candy && candy.y > GROUND_Y - 90 && me.hp < 70 && Math.abs(candy.x - me.x) < 300) {
      me.aiMove = candy.x > me.x ? 1 : -1;         // 去搶糖果補血
    } else if (dist > ATTACK_RANGE * 0.8) {
      me.aiMove = foe.x > me.x ? 1 : -1;          // 追
      if (Math.random() < 0.12) me.aiMove *= -1;   // 偶爾猶豫
    } else {
      if (Math.random() < 0.08 + aiLevel * 0.05) me.blockT = 0.45;  // 近身偶爾格擋
      else if (Math.random() < aggression) tryAttack(me, foe);
      me.aiMove = Math.random() < 0.3 ? (foe.x > me.x ? -1 : 1) : 0;  // 打完拉開
    }
  }
  const spd = 195 + aiLevel * 14;
  me.x += me.aiMove * spd * dt * (me.blocking ? 0.25 : 1);
}

// ----- 更新 -----
function update(dt) {
  elapsed += dt;
  shake *= Math.pow(0.001, dt);
  if (shake < 0.05) shake = 0;
  flash = Math.max(0, flash - dt * 3);
  overCooldown = Math.max(0, overCooldown - dt);
  lightning = Math.max(0, lightning - dt * 2.2);
  // v6 鬼火飄浮
  for (const w of wisps) {
    w.ph += dt * w.sp;
    w.x += Math.sin(w.ph * 0.9) * 16 * dt;
    w.y += Math.cos(w.ph * 0.7) * 10 * dt;
    if (w.x < -20) w.x = GAME_W + 10;
    if (w.x > GAME_W + 20) w.x = -10;
    w.y = Math.max(200, Math.min(GROUND_Y - 20, w.y));
  }
  // v6 木屋吱呀聲（隨機氛圍音）
  creakT -= dt;
  if (creakT <= 0) {
    creakT = 6 + Math.random() * 8;
    if (mode === 'play') sfx.creak();
  }
  lightningTimer -= dt;
  if (lightningTimer <= 0) {
    lightningTimer = 8 + Math.random() * 9;
    lightning = 1;
    if (mode !== 'title') sfx.thunder();
  }

  for (const p of parts) {
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 500 * dt; p.life -= dt;
  }
  for (let i = parts.length - 1; i >= 0; i--) if (parts[i].life <= 0) parts.splice(i, 1);
  for (const f of floats) { f.y -= 55 * dt; f.life -= dt; }
  for (let i = floats.length - 1; i >= 0; i--) if (floats[i].life <= 0) floats.splice(i, 1);
  for (const b of bats) b.t += dt;

  for (const f of fighters) {
    f.cool = Math.max(0, f.cool - dt);
    f.lunge = Math.max(0, f.lunge - dt * 5);
    f.hitFlash = Math.max(0, f.hitFlash - dt);
    f.blockT = Math.max(0, f.blockT - dt);
    f.comboTimer = Math.max(0, f.comboTimer - dt);
    if (f.comboTimer <= 0) f.combo = 0;
    f.sx += (1 - f.sx) * Math.min(1, 11 * dt);
    f.sy += (1 - f.sy) * Math.min(1, 11 * dt);
    f.dispHp += (f.hp - f.dispHp) * Math.min(1, 12 * dt);
    f.trailHp += (f.hp - f.trailHp) * Math.min(1, 2.2 * dt);
    // 擊退慣性
    f.x += f.vx * dt;
    f.vx *= Math.pow(0.002, dt);
    f.x = Math.max(70, Math.min(GAME_W - 70, f.x));
    if (f.koFall > 0) f.koFall = Math.min(1.2, f.koFall + dt);
  }
  // 面向對方
  if (ghost.koFall === 0 && teacher.koFall === 0) {
    ghost.dir = ghost.x <= teacher.x ? 1 : -1;
    teacher.dir = teacher.x <= ghost.x ? 1 : -1;
  }

  if (mode !== 'play') return;

  if (koTimer >= 0) {
    koTimer += dt;
    slowmo += (1 - slowmo) * Math.min(1, 1.2 * dt);
    if (koTimer > 1.7) finishKO();
    return;
  }

  // 開場 3-2-1 倒數（期間鎖住操作）
  if (introT > 0) {
    const before = Math.ceil(introT / 0.6);
    introT = Math.max(0, introT - dt);
    const after = introT > 0 ? Math.ceil(introT / 0.6) : 0;
    if (after !== before) {
      if (after > 0) sfx.count(after);
      else { sfx.count(0); addFloat(GAME_W / 2, 240, '開戰！', '#ffea00', 44); }
    }
    return;
  }
  tutorialT = Math.max(0, tutorialT - dt);

  // 格擋狀態（按住即格擋）
  ghost.blockHeld = !!(keys['s'] || touchHeld['g-blk']);
  teacher.blockHeld = !vsAI && !!(keys['arrowup'] || touchHeld['t-blk']);
  for (const f of fighters) f.blocking = (f.blockHeld || f.blockT > 0) && f.koFall === 0;

  // 玩家移動（格擋時移動變慢）
  const gspd = 230 * (ghost.blocking ? 0.35 : 1);
  if (keys['a'] || touchHeld['g-left']) ghost.x -= gspd * dt;
  if (keys['d'] || touchHeld['g-right']) ghost.x += gspd * dt;
  if (!vsAI) {
    const tspd = 230 * (teacher.blocking ? 0.35 : 1);
    if (keys['arrowleft'] || touchHeld['t-left']) teacher.x -= tspd * dt;
    if (keys['arrowright'] || touchHeld['t-right']) teacher.x += tspd * dt;
  } else {
    updateAI(dt);
  }
  ghost.x = Math.max(70, Math.min(GAME_W - 70, ghost.x));
  teacher.x = Math.max(70, Math.min(GAME_W - 70, teacher.x));

  // 空投糖果：撿到回血（滿血改集氣）
  candyTimer -= dt;
  if (!candy && candyTimer <= 0) {
    candy = { x: 160 + Math.random() * (GAME_W - 320), y: -30, life: 7, sway: Math.random() * 6 };
    candyTimer = 9 + Math.random() * 5;
    addFloat(GAME_W / 2, 130, '🍬 糖果空投！', '#ff9dc9', 24);
  }
  if (candy) {
    if (candy.y < GROUND_Y - 16) {
      candy.y += 120 * dt;
      candy.x += Math.sin(elapsed * 3 + candy.sway) * 26 * dt;
    } else {
      candy.life -= dt;
      if (candy.life <= 0) candy = null;
    }
    if (candy && candy.y > GROUND_Y - 110) {
      for (const f of fighters) {
        if (f.koFall === 0 && Math.abs(f.x - candy.x) < 52) {
          if (f.hp < 100) {
            f.hp = Math.min(100, f.hp + 12);
            addFloat(f.x, GROUND_Y - 190, '🍬 +12', '#7cfc9e', 26);
          } else {
            f.meter = Math.min(100, f.meter + 30);
            addFloat(f.x, GROUND_Y - 190, '🍬 能量 +30', '#d8c6ff', 24);
          }
          burst(candy.x, candy.y, '#ff9dc9', 14, 240);
          sfx.candy();
          candy = null;
          break;
        }
      }
    }
  }

  // 投射物
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const pr = projectiles[i];
    pr.x += pr.vx * dt;
    pr.spin += dt * 9;
    if (Math.random() < dt * 30) {
      parts.push({ x: pr.x, y: pr.y + (Math.random() * 16 - 8), vx: -pr.vx * 0.1, vy: Math.random() * 40 - 20, life: 0.35, color: pr.trailC, size: 4 });
    }
    const target = pr.owner === ghost ? teacher : ghost;
    if (target.koFall === 0 && Math.abs(pr.x - target.x) < 46) {
      hurt(target, 18, pr.vx > 0 ? 1 : -1, pr.owner);   // 格擋可大幅減傷
      burst(pr.x, pr.y, pr.trailC, 20, 300);
      burst(pr.x, pr.y, '#fff', 8, 200);
      freeze = Math.max(freeze, 0.1);
      shake = Math.max(shake, 9);
      sfx.boom();
      projectiles.splice(i, 1);
      continue;
    }
    if (pr.x < -60 || pr.x > GAME_W + 60) projectiles.splice(i, 1);
  }
}

// ----- 繪圖 -----
function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawBackground() {
  // v6：整幅夜景取自離屏烘焙（零即時漸層/陰影）
  ctx.drawImage(bgCv, 0, 0, GAME_W, GAME_H);

  // 閃電時整片天空增亮（覆蓋層取代即時漸層重建）
  if (lightning > 0.4) {
    ctx.globalAlpha = (lightning - 0.4) * 0.55;
    ctx.fillStyle = '#4a3a70';
    ctx.fillRect(0, 0, GAME_W, GROUND_Y);
    ctx.globalAlpha = 1;
  }

  // 動態閃爍星星（疊在烘焙星空上）
  for (const s of stars) {
    const tw = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(elapsed * 1.8 + s.tw));
    ctx.globalAlpha = tw;
    ctx.fillStyle = '#d8c6ff';
    ctx.fillRect(s.x, s.y, s.r, s.r);
  }
  ctx.globalAlpha = 1;

  // 蝙蝠（OpenMoji，沿弧線飛）
  for (const b of bats) {
    const bx = ((b.t * b.speed) % (GAME_W + 240)) - 120;
    const by = b.y0 + Math.sin(b.t * 2.2) * 22;
    const flap = 1 + Math.sin(b.t * 12 + b.flap) * 0.18;
    ctx.save();
    ctx.translate(bx, by);
    ctx.scale(1, flap);
    drawSprite(IMG.bat, -16, -16, 32, 32, '🦇');
    ctx.restore();
  }

  // 主樓旗幟（飄動，動態）
  ctx.fillStyle = '#ff6cc7';
  ctx.beginPath();
  ctx.moveTo(480, 165);
  ctx.lineTo(504 + Math.sin(elapsed * 3) * 3, 173);
  ctx.lineTo(480, 181);
  ctx.closePath();
  ctx.fill();

  // v6 窗光：烘焙光暈 additive 閃爍（取代每幀 shadowBlur＋漸層）
  const flick = 0.6 + 0.4 * Math.sin(elapsed * 5.3) * Math.sin(elapsed * 1.7);
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const [wx, wy, ww, wh] of WINDOWS) {
    ctx.globalAlpha = 0.35 + 0.45 * flick;
    const gr = ww * 2.6;
    ctx.drawImage(winGlowCv, wx + ww / 2 - gr, wy + wh / 2 - gr, gr * 2, gr * 2);
  }
  ctx.restore();
  ctx.globalAlpha = 1;
  ctx.fillStyle = 'rgba(255,207,77,' + (0.35 + 0.4 * flick).toFixed(3) + ')';
  for (const [wx, wy, ww, wh] of WINDOWS) ctx.fillRect(wx, wy, ww, wh);

  // v6 幽靈鬼火（additive 飄浮光點）
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const w of wisps) {
    const tw = 0.3 + 0.7 * Math.abs(Math.sin(w.ph * 1.3));
    ctx.globalAlpha = tw * 0.5;
    const sz = 14 + tw * 10;
    ctx.drawImage(wispCv, w.x - sz / 2, w.y - sz / 2, sz, sz);
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawFog() {
  // v6 三層烘焙霧氣條帶：主迴圈只做平移 blit
  ctx.save();
  ctx.globalAlpha = 0.75;
  const o1 = Math.sin(elapsed * 0.25) * 46;
  const o2 = Math.sin(elapsed * 0.4 + 2) * 30;
  const o3 = Math.sin(elapsed * 0.55 + 4) * 24;
  ctx.drawImage(fogCv, o1 - 80, GROUND_Y - 58, GAME_W + 160, 90);
  ctx.globalAlpha = 0.9;
  ctx.drawImage(fogCv, o2 - 80, GROUND_Y - 34, GAME_W + 160, 90);
  ctx.globalAlpha = 0.6;
  ctx.drawImage(fogCv, -o3 - 80, GROUND_Y - 12, GAME_W + 160, 90);
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawFighter(f, foe) {
  const isGhost = f === ghost;
  const size = isGhost ? 120 : 126;
  const bob = isGhost ? Math.sin(elapsed * 2.4) * 8 : (f.vx === 0 ? Math.abs(Math.sin(elapsed * 6)) * -3 : 0);
  const baseY = isGhost ? GROUND_Y - 42 : GROUND_Y - 2;
  const lungeX = f.lunge * f.dir * 34;
  const koT = f.koFall;

  // 影子
  const shA = isGhost ? 0.3 : 0.42;
  ctx.fillStyle = 'rgba(0,0,0,' + shA + ')';
  ctx.beginPath();
  ctx.ellipse(f.x, GROUND_Y + 6, isGhost ? 34 : 40, 9, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.save();
  ctx.translate(f.x + lungeX, baseY + bob);
  if (koT > 0) {
    // KO：旋轉倒下 + 下沉 + 淡出
    ctx.translate(0, koT * 40);
    ctx.rotate(f.dir * -Math.min(1.4, koT * 2.2));
    ctx.globalAlpha = Math.max(0, 1 - koT * 0.7);
  }
  ctx.scale(f.dir * f.sx, f.sy);

  // 幽靈的靈氣 / 老師的氣場
  if (f.meter >= 100) {
    ctx.save();
    ctx.globalAlpha = 0.5 + Math.sin(elapsed * 10) * 0.25;
    ctx.shadowColor = isGhost ? '#ff6cc7' : '#ffa94d';
    ctx.shadowBlur = 30;
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.beginPath();
    ctx.ellipse(0, -size / 2, size * 0.55, size * 0.62, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // 受擊白閃：先畫一層放大的白色剪影
  if (f.hitFlash > 0) {
    ctx.save();
    ctx.globalAlpha = f.hitFlash * 4;
    ctx.filter = 'brightness(0) invert(1)';
    drawSprite(f.img, -size / 2 - 4, -size - 4, size + 8, size + 8, f.emoji);
    ctx.filter = 'none';
    ctx.restore();
  }
  drawSprite(f.img, -size / 2, -size, size, size, f.emoji);
  ctx.restore();

  // 攻擊揮擊弧光
  if (f.lunge > 0.45) {
    const swipeA = (1 - f.lunge) * 2;
    ctx.save();
    ctx.translate(f.x + f.dir * 66, GROUND_Y - 100);
    ctx.rotate(f.dir * (swipeA * 2 - 1.2));
    ctx.strokeStyle = isGhost ? 'rgba(139,233,253,' + (f.lunge * 0.95) + ')' : 'rgba(255,169,77,' + (f.lunge * 0.95) + ')';
    ctx.lineWidth = 7;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(0, 0, 46, -0.9, 0.9);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,' + (f.lunge * 0.7) + ')';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, 46, -0.6, 0.6);
    ctx.stroke();
    ctx.restore();
  }

  // 格擋護盾（面向前方的弧形光罩）
  if (f.blocking && f.koFall === 0) {
    ctx.save();
    ctx.translate(f.x + f.dir * 48, GROUND_Y - 95);
    const a = 0.55 + Math.sin(elapsed * 9) * 0.2;
    ctx.strokeStyle = isGhost ? 'rgba(139,233,253,' + a + ')' : 'rgba(255,169,77,' + a + ')';
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.beginPath();
    if (f.dir > 0) ctx.arc(-20, 0, 52, -1.15, 1.15);
    else ctx.arc(20, 0, 52, Math.PI - 1.15, Math.PI + 1.15);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,' + a * 0.8 + ')';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    if (f.dir > 0) ctx.arc(-20, 0, 44, -0.9, 0.9);
    else ctx.arc(20, 0, 44, Math.PI - 0.9, Math.PI + 0.9);
    ctx.stroke();
    ctx.restore();
  }
}

// 空投糖果
function drawCandy() {
  if (!candy) return;
  ctx.save();
  ctx.translate(candy.x, candy.y);
  if (candy.life < 2) ctx.globalAlpha = 0.35 + 0.65 * Math.abs(Math.sin(elapsed * 8));
  if (candy.y < GROUND_Y - 16) {
    // 小降落傘
    ctx.strokeStyle = 'rgba(216,198,255,0.8)';
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.moveTo(-12, -34); ctx.lineTo(-5, -12);
    ctx.moveTo(12, -34); ctx.lineTo(5, -12);
    ctx.stroke();
    ctx.fillStyle = '#b399c8';
    ctx.beginPath();
    ctx.arc(0, -36, 16, Math.PI, 0);
    ctx.closePath();
    ctx.fill();
  }
  ctx.rotate(Math.sin(elapsed * 2.5) * 0.15);
  ctx.shadowColor = '#ff9dc9';
  ctx.shadowBlur = 14;
  const cg = ctx.createRadialGradient(-4, -4, 2, 0, 0, 13);
  cg.addColorStop(0, '#ffd6e8');
  cg.addColorStop(0.6, '#ff9dc9');
  cg.addColorStop(1, '#e56aa2');
  ctx.fillStyle = cg;
  ctx.beginPath();
  ctx.arc(0, 0, 12, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  // 包裝紙兩端
  ctx.fillStyle = '#e56aa2';
  for (const s of [-1, 1]) {
    ctx.beginPath();
    ctx.moveTo(s * 11, 0);
    ctx.lineTo(s * 20, -8);
    ctx.lineTo(s * 20, 8);
    ctx.closePath();
    ctx.fill();
  }
  // 白色螺旋紋
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 2.4;
  ctx.beginPath();
  ctx.arc(0, 0, 6.5, 0.4, 2.2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, 0, 9.5, 3.4, 5.2);
  ctx.stroke();
  ctx.restore();
}

function drawProjectiles() {
  for (const pr of projectiles) {
    ctx.save();
    ctx.translate(pr.x, pr.y + Math.sin(pr.spin * 2) * 4);
    ctx.rotate(pr.spin);
    ctx.shadowColor = pr.trailC;
    ctx.shadowBlur = 20;
    drawSprite(pr.img, -26, -26, 52, 52, pr.emoji);
    ctx.restore();
  }
}

function drawParts() {
  for (const p of parts) {
    ctx.globalAlpha = Math.max(0, Math.min(1, p.life * 2.2));
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}
function drawFloats() {
  ctx.textAlign = 'center';
  for (const f of floats) {
    ctx.globalAlpha = Math.max(0, Math.min(1, f.life * 1.5));
    ctx.font = 'bold ' + f.size + 'px "Microsoft JhengHei", sans-serif';
    ctx.strokeStyle = 'rgba(0,0,0,0.7)';
    ctx.lineWidth = 4;
    ctx.strokeText(f.text, f.x, f.y);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

function drawHPBar(f, x, mirror) {
  const w = 330, h = 20;
  // 底
  ctx.fillStyle = '#2a1a3d';
  rr(x, 34, w, h, 10);
  ctx.fill();
  // 傷害殘影（白色慢速追）
  const trailW = w * Math.max(0, f.trailHp) / 100;
  const hpW = w * Math.max(0, f.dispHp) / 100;
  ctx.save();
  rr(x, 34, w, h, 10);
  ctx.clip();
  ctx.fillStyle = 'rgba(255,235,120,0.75)';
  if (mirror) ctx.fillRect(x + w - trailW, 34, trailW, h);
  else ctx.fillRect(x, 34, trailW, h);
  const grad = ctx.createLinearGradient(x, 0, x + w, 0);
  if (f === ghost) { grad.addColorStop(0, '#ff6cc7'); grad.addColorStop(1, '#ff3fa0'); }
  else { grad.addColorStop(0, '#ff6b6b'); grad.addColorStop(1, '#ffa94d'); }
  ctx.fillStyle = grad;
  if (mirror) ctx.fillRect(x + w - hpW, 34, hpW, h);
  else ctx.fillRect(x, 34, hpW, h);
  ctx.restore();
  ctx.strokeStyle = '#6a4a8f';
  ctx.lineWidth = 2;
  rr(x, 34, w, h, 10);
  ctx.stroke();

  // 能量條
  ctx.fillStyle = '#1c1030';
  rr(x, 58, w * 0.7, 9, 4);
  ctx.fill();
  const mw = w * 0.7 * f.meter / 100;
  const mg = ctx.createLinearGradient(x, 0, x + w * 0.7, 0);
  mg.addColorStop(0, '#7a3fff');
  mg.addColorStop(1, '#d8c6ff');
  if (f.meter >= 100) ctx.fillStyle = Math.sin(elapsed * 12) > 0 ? '#ffea00' : '#fff';
  else ctx.fillStyle = mg;
  ctx.save();
  rr(x, 58, w * 0.7, 9, 4);
  ctx.clip();
  if (mirror) ctx.fillRect(x + w * 0.7 - mw, 58, mw, 9);
  else ctx.fillRect(x, 58, mw, 9);
  ctx.restore();

  // 名字與數值
  ctx.font = 'bold 17px "Microsoft JhengHei", sans-serif';
  ctx.fillStyle = '#eee';
  if (mirror) {
    ctx.textAlign = 'right';
    ctx.fillText(f.emoji + ' ' + f.name + (vsAI && f === teacher ? '（電腦）' : ''), x + w, 26);
    ctx.textAlign = 'left';
    ctx.fillText(Math.max(0, Math.round(f.dispHp)), x, 26);
  } else {
    ctx.textAlign = 'left';
    ctx.fillText(f.emoji + ' ' + f.name, x, 26);
    ctx.textAlign = 'right';
    ctx.fillText(Math.max(0, Math.round(f.dispHp)), x + w, 26);
  }
}

function drawHUD() {
  drawHPBar(ghost, 24, false);
  drawHPBar(teacher, GAME_W - 24 - 330, true);
  // VS
  ctx.textAlign = 'center';
  ctx.font = 'bold 30px "Microsoft JhengHei", sans-serif';
  ctx.fillStyle = '#ffea00';
  ctx.shadowColor = '#ff4d6d';
  ctx.shadowBlur = 14;
  ctx.fillText('VS', GAME_W / 2, 52);
  ctx.shadowBlur = 0;
  // 戰績 / 生存連勝
  ctx.font = '13px "Microsoft JhengHei", sans-serif';
  ctx.fillStyle = survival ? '#ffd54f' : '#b3a3d9';
  if (survival) ctx.fillText('🏆 第 ' + (streak + 1) + ' 關　連勝 ' + streak + '　最佳 ' + survivalBest, GAME_W / 2, 74);
  else ctx.fillText('👻 ' + wins.ghost + ' 勝　' + wins.teacher + ' 勝 👩‍🏫', GAME_W / 2, 74);

  // 開場教學提示
  if (tutorialT > 0 && mode === 'play' && introT <= 0) {
    ctx.globalAlpha = Math.min(1, tutorialT);
    ctx.textAlign = 'center';
    ctx.font = 'bold 18px "Microsoft JhengHei", sans-serif';
    const tip = '👊 打中對手集能量 → 滿了放 ✨ 必殺！按住 🛡 格擋防禦';
    ctx.strokeStyle = 'rgba(0,0,0,0.75)';
    ctx.lineWidth = 5;
    ctx.strokeText(tip, GAME_W / 2, 110);
    ctx.fillStyle = '#fff';
    ctx.fillText(tip, GAME_W / 2, 110);
    ctx.globalAlpha = 1;
  }
}

function drawTouchButtons() {
  if (!touchUI || mode !== 'play') return;
  for (const d of buttonDefs()) {
    ctx.globalAlpha = touchHeld[d.id] ? 0.65 : 0.3;
    ctx.fillStyle = d.p === 'ghost' ? '#ff6cc7' : '#ffa94d';
    ctx.beginPath();
    ctx.arc(d.x, d.y, btnR, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = touchHeld[d.id] ? 1 : 0.75;
    ctx.fillStyle = '#0a0512';
    ctx.font = '26px "Microsoft JhengHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(d.icon, d.x, d.y + 9);
  }
  ctx.globalAlpha = 1;
}

function draw() {
  ctx.save();
  if (shake > 0) ctx.translate((Math.random() * 2 - 1) * shake, (Math.random() * 2 - 1) * shake);

  drawBackground();
  // 後排角色先畫
  const order = fighters.slice().sort((a, b) => (a.koFall - b.koFall));
  for (const f of order) drawFighter(f, f === ghost ? teacher : ghost);
  drawProjectiles();
  drawCandy();
  drawFog();
  drawParts();
  drawFloats();

  ctx.restore();

  // v6 烘焙 vignette（夜色聚焦擂臺中央）
  ctx.drawImage(vigCv, 0, 0, GAME_W, GAME_H);

  // KO 大字
  if (koTimer >= 0 && koTimer < 1.7) {
    const t = Math.min(1, koTimer * 3);
    const sc = 0.4 + t * (1 + Math.max(0, 1 - koTimer * 3) * 0.6);
    ctx.save();
    ctx.translate(GAME_W / 2, GAME_H * 0.42);
    ctx.scale(sc, sc);
    ctx.textAlign = 'center';
    ctx.font = 'bold 92px "Microsoft JhengHei", sans-serif';
    ctx.strokeStyle = '#ff4d6d';
    ctx.lineWidth = 10;
    ctx.strokeText('K.O.!', 0, 0);
    ctx.fillStyle = '#ffea00';
    ctx.fillText('K.O.!', 0, 0);
    ctx.restore();
  }

  // 開場倒數大字
  if (mode === 'play' && introT > 0) {
    const n = Math.ceil(introT / 0.6);
    const p = (introT % 0.6) / 0.6 || 1;
    ctx.save();
    ctx.translate(GAME_W / 2, GAME_H * 0.4);
    ctx.scale(0.7 + p * 0.5, 0.7 + p * 0.5);
    ctx.globalAlpha = 0.4 + p * 0.6;
    ctx.textAlign = 'center';
    ctx.font = 'bold 110px "Microsoft JhengHei", sans-serif';
    ctx.strokeStyle = '#7a3fff';
    ctx.lineWidth = 10;
    ctx.strokeText(String(n), 0, 40);
    ctx.fillStyle = '#ffea00';
    ctx.fillText(String(n), 0, 40);
    ctx.restore();
  }

  drawHUD();
  drawTouchButtons();

  // 閃電白光
  if (lightning > 0.4) {
    ctx.globalAlpha = (lightning - 0.4) * 0.5;
    ctx.fillStyle = '#e8e0ff';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    ctx.globalAlpha = 1;
  }
  if (flash > 0) {
    ctx.globalAlpha = flash;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    ctx.globalAlpha = 1;
  }
}

// ----- 主迴圈 -----
const STEP = 1 / 60;
let last = performance.now(), acc = 0;
function frame(now) {
  requestAnimationFrame(frame);
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while (acc >= STEP) {
    if (freeze > 0) { freeze -= STEP; acc -= STEP; continue; }  // hit-stop
    update(STEP * slowmo);
    acc -= STEP;
  }
  draw();
}

resetGame();
mode = 'title';
refreshTitle();
titleOverlay.classList.add('show');
requestAnimationFrame(frame);

// 測試掛鉤（自動化冒煙測試用，不影響遊戲）
window.__test = () => ({ mode, x: ghost.x, y: 0, attacked: attackCount, ghostHp: ghost.hp, teacherHp: teacher.hp,
  intro: introT, survival, streak, cleared, survivalBest, aiLevel, wins: wins.ghost + ':' + wins.teacher,
  projectiles: projectiles.length, parts: parts.length, slowmo: +slowmo.toFixed(2) });
</script>
