<!DOCTYPE html>
<!-- 專業AI升級 v7：僅介面/畫質/質感——按鈕頂部光澤與底緣陰影、HUD計分/時間板玻璃質感與時間條光澤、結算面板漸層+雙框+角落飾線、三段式暗角+頂部暖光氛圍、場景切換淡入（玩法/文本零更動） -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>丟筆電大賽</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #14181c;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
  }
  canvas {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    cursor: grab;
  }
  canvas.dragging { cursor: grabbing; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
'use strict';
/* ============================================================
   丟筆電大賽 — 專業AI升級版
   拖曳筆電甩進回收桶。60 秒限時、連擊加分、完美空心加成。
   固定時間步進 + 狀態機 + 粒子/震動/hit-stop + Web Audio 音效
   ============================================================ */

// ---------- 基本設定 ----------
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize() {
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale;
}
addEventListener('resize', resize);
resize();

// ---------- 調色盤（SWEETIE 16 精選）----------
const PAL = {
  bg0: '#1a1c2c', bg1: '#252a3f', wall: '#2b3050', wallLo: '#20243c',
  ink: '#f4f4f4', dim: '#94a0b8', line: '#3a4166',
  accent: '#ffcd75', accentDeep: '#ef7d57',
  good: '#6ee2a0', bad: '#ff6b6b',
  binBody: '#41a6f6', binDark: '#2b6cb0', binLite: '#7cc4ff',
  lapLid: '#5d6b7a', lapBase: '#aab6c2', lapScreen: '#41a6f6',
  sky: '#5c94fc', cloud: '#e8f2ff'
};

// ---------- 小工具 ----------
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp = (a, b, t) => a + (b - a) * t;
const rnd = (a, b) => a + Math.random() * (b - a);
const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
const easeOutBack = t => 1 + 2.7 * Math.pow(t - 1, 3) + 1.7 * Math.pow(t - 1, 2);

function roundRect(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
// v4：逐字換行（中文），需先設定 font 與 textAlign='left'
function wrapText(text, x, y, maxW, lh) {
  let line = '';
  for (const ch of text) {
    if (line && ctx.measureText(line + ch).width > maxW) { ctx.fillText(line, x, y); line = ch; y += lh; }
    else line += ch;
  }
  if (line) ctx.fillText(line, x, y);
}

// ---------- 音效（Web Audio 合成，零音檔）----------
let AC = null, master = null, muted = false, ambDuck = null;
function audio() {
  if (!AC) {
    try {
      AC = new (window.AudioContext || window.webkitAudioContext)();
      master = AC.createGain();
      master.gain.value = muted ? 0 : 1;
      // v3：壓縮器主匯流排——空心四連音＋連擊齊發不削波
      const comp = AC.createDynamicsCompressor();
      comp.threshold.value = -18; comp.knee.value = 24; comp.ratio.value = 8;
      master.connect(comp); comp.connect(AC.destination);
      // v6：程序化殘響（generated impulse 辦公室小房間）
      const ir = AC.createBuffer(2, (AC.sampleRate * 0.9) | 0, AC.sampleRate);
      for (let ch = 0; ch < 2; ch++) {
        const d = ir.getChannelData(ch);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 3.2);
      }
      const conv = AC.createConvolver(); conv.buffer = ir;
      const wet = AC.createGain(); wet.gain.value = 0.12;
      comp.connect(conv); conv.connect(wet); wet.connect(AC.destination);
      // v6：辦公室空調嗡鳴＋偶發鍵盤聲氛圍層（4 秒無縫循環，經 master 受靜音控制）
      const sr = AC.sampleRate, len = sr * 4, buf = AC.createBuffer(1, len, sr), ad = buf.getChannelData(0);
      let lp = 0;
      for (let i = 0; i < len; i++) {
        const t = i / sr, w = Math.random() * 2 - 1;
        lp += (w - lp) * 0.01;
        let v = lp * (0.7 + 0.3 * Math.sin(t * 1.3)) * 1.3 + Math.sin(2 * Math.PI * 58 * t) * 0.02;
        const kt = t % 1.9;                                     // 偶發鍵盤喀喀
        if (kt > 0 && kt < 0.02) v += w * Math.sin(kt / 0.02 * Math.PI) * 0.1;
        if (kt > 0.11 && kt < 0.125) v += w * Math.sin((kt - 0.11) / 0.015 * Math.PI) * 0.07;
        ad[i] = v;
      }
      const f = (sr * 0.12) | 0;
      for (let i = 0; i < f; i++) { const a = i / f; ad[i] = ad[i] * a + ad[len - f + i] * (1 - a); }
      const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
      const ag = AC.createGain(); ag.gain.value = 0.035;
      ambDuck = AC.createGain(); ambDuck.gain.value = 1;
      src.connect(ag); ag.connect(ambDuck); ambDuck.connect(master);
      src.start();
    } catch (err) { AC = null; }
  }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function duckAmb() {
  if (!AC || !ambDuck || muted) return;
  const t0 = AC.currentTime;
  ambDuck.gain.cancelScheduledValues(t0);
  ambDuck.gain.setTargetAtTime(0.35, t0, 0.015);
  ambDuck.gain.setTargetAtTime(1, t0 + 0.12, 0.25);
}
function setMuted(m) {
  muted = m;
  if (master) master.gain.value = muted ? 0 : 1;
}
function beep(freq, dur, type, vol, slide) {
  const ac = audio(); if (!ac || muted) return;
  type = type || 'square'; vol = vol || 0.15; slide = slide || 0;
  if (vol >= 0.11) duckAmb();   // v6：主音效壓低氛圍層
  freq *= 0.975 + Math.random() * 0.05;   // v3：±2.5% 隨機音高，聽感不機械
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, ac.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), ac.currentTime + dur);
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g).connect(master);
  o.start(); o.stop(ac.currentTime + dur);
}
function noise(dur, vol) {
  const ac = audio(); if (!ac || muted) return;
  const len = Math.max(1, Math.floor(ac.sampleRate * dur));
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ac.createBufferSource(), g = ac.createGain();
  src.buffer = buf;
  g.gain.setValueAtTime(vol || 0.12, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  src.connect(g).connect(master);
  src.start();
}
const sfx = {
  throw(p) {   // v6：投擲風聲隨力道變化（p=0~1）
    p = p === undefined ? 0.6 : p;
    noise(0.1 + 0.1 * p, 0.05 + 0.07 * p);
    beep(150 + 90 * p, 0.12 + 0.06 * p, 'triangle', 0.06 + 0.05 * p, 200 + 200 * p);
  },
  rim() { beep(620, 0.07, 'triangle', 0.14, -80); noise(0.04, 0.05); },
  score() { beep(988, 0.08, 'square', 0.13); setTimeout(() => beep(1319, 0.16, 'square', 0.13), 80); },
  perfect() { [1047, 1319, 1568, 2093].forEach((f, i) => setTimeout(() => beep(f, 0.12, 'square', 0.12), i * 70)); },
  combo(n) { beep(660 + n * 80, 0.1, 'square', 0.1, 120); },
  miss() { beep(200, 0.24, 'sawtooth', 0.12, -120); },
  thud() { beep(110, 0.07, 'triangle', 0.1); },
  tick() { beep(1200, 0.04, 'square', 0.07); },
  click() { beep(520, 0.06, 'square', 0.08); },
  over() { [523, 392, 330, 262].forEach((f, i) => setTimeout(() => beep(f, 0.18, 'triangle', 0.12), i * 130)); },
  best() { [523, 659, 784, 1047, 1319].forEach((f, i) => setTimeout(() => beep(f, 0.14, 'square', 0.11), i * 90)); }
};

// ---------- FX：震動 / hit-stop / 粒子 / 飄字 ----------
let shake = 0, freeze = 0;
const parts = [];
function burst(x, y, color, n, speed, up) {
  n = n || 12; speed = speed || 220;
  for (let i = 0; i < n; i++) {
    if (parts.length > 300) break;
    const a = Math.random() * Math.PI * 2;
    const s = speed * (0.3 + Math.random() * 0.7);
    parts.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s - (up || 0),
      life: rnd(0.35, 0.65), max: 0.65,
      color, size: rnd(3, 6), spin: rnd(-8, 8), rot: rnd(0, 6.28)
    });
  }
}
function updateParts(dt) {
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 700 * dt; p.rot += p.spin * dt;
    p.life -= dt;
    if (p.life <= 0) { parts[i] = parts[parts.length - 1]; parts.pop(); }  // v3：swap-pop
  }
}
function drawParts() {
  for (const p of parts) {
    ctx.save();
    ctx.globalAlpha = clamp(p.life * 2.2, 0, 1);
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}
const floaters = [];
function addFloat(x, y, text, color, big) {
  floaters.push({ x, y, text, color, life: 0.9, big: !!big });
}
function updateFloaters(dt) {
  for (let i = floaters.length - 1; i >= 0; i--) {
    const f = floaters[i];
    f.y -= 55 * dt; f.life -= dt;
    if (f.life <= 0) floaters.splice(i, 1);
  }
}
function drawFloaters() {
  for (const f of floaters) {
    ctx.globalAlpha = clamp(f.life * 1.6, 0, 1);
    ctx.fillStyle = f.color;
    ctx.font = (f.big ? 'bold 30px' : 'bold 22px') + ' sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

// ---------- 場景：辦公室背景（視差雲 + 漸層牆）----------
const clouds = [];
for (let i = 0; i < 5; i++) {
  clouds.push({ x: rnd(0, 300), y: rnd(20, 120), s: rnd(0.5, 1.1), v: rnd(6, 16) });
}
let bgTime = 0;
function updateBG(dt) {
  bgTime += dt;
  for (const c of clouds) {
    c.x -= c.v * dt * c.s; // 遠的雲飄得慢 → 視差
    if (c.x < -80) { c.x = 340; c.y = rnd(20, 120); }
  }
}
const FLOOR_Y = GAME_H - 46;
// v3：動態元素仍需的漸層（窗景天空、暗角、葉片）
const BG_SKY_G = (() => { const g = ctx.createLinearGradient(0, 60, 0, 240);
  g.addColorStop(0, PAL.sky); g.addColorStop(1, '#8cc0ff'); return g; })();
const VIG_G = (() => { const g = ctx.createRadialGradient(GAME_W / 2, GAME_H * 0.48, GAME_H * 0.42, GAME_W / 2, GAME_H / 2, GAME_H * 0.98);
  g.addColorStop(0, 'rgba(10,10,30,0)'); g.addColorStop(0.6, 'rgba(10,10,30,0.12)'); g.addColorStop(1, 'rgba(10,10,30,0.38)'); return g; })();   // v7：三段式暗角更沉
const TOPGLOW_G = (() => { const g = ctx.createLinearGradient(0, 0, 0, 110);   // v7：吊燈頂部暖光氛圍
  g.addColorStop(0, 'rgba(255,205,117,0.05)'); g.addColorStop(1, 'rgba(255,205,117,0)'); return g; })();
const LEAF_GS = (() => { const arr = [], px = 330, py = FLOOR_Y;
  for (let i = -2; i <= 2; i++) {
    const ang = -Math.PI / 2 + i * 0.42;
    const lx = px + Math.cos(ang) * 52, ly = py - 44 + Math.sin(ang) * 52;
    const g = ctx.createLinearGradient(px, py - 44, lx, ly);
    g.addColorStop(0, '#2c6e3f'); g.addColorStop(1, '#5fbf6e'); arr.push(g);
  } return arr; })();
// v6：辦公室靜態背景整幅離屏烘焙（牆飾板/海報/時鐘面/地板/盆栽體/吊燈/窗邊光束），窗景與動態另畫
function bakeCv(w, h, fn) { const c = document.createElement('canvas'); c.width = w; c.height = h; fn(c.getContext('2d')); return c; }
const CLOCK_X = 615, CLOCK_Y = 130;
const BG_OFFICE = bakeCv(GAME_W, GAME_H, g => {
  const rr = (x, y, w, h, r) => { r = Math.min(r, w / 2, h / 2); g.beginPath(); g.moveTo(x + r, y);
    g.arcTo(x + w, y, x + w, y + h, r); g.arcTo(x + w, y + h, x, y + h, r);
    g.arcTo(x, y + h, x, y, r); g.arcTo(x, y, x + w, y, r); g.closePath(); };
  // 牆面漸層＋飾板線
  const wallG = g.createLinearGradient(0, 0, 0, FLOOR_Y);
  wallG.addColorStop(0, PAL.wall); wallG.addColorStop(1, PAL.wallLo);
  g.fillStyle = wallG; g.fillRect(0, 0, GAME_W, FLOOR_Y);
  g.strokeStyle = 'rgba(255,255,255,0.035)'; g.lineWidth = 2;
  g.beginPath(); g.moveTo(0, 290); g.lineTo(GAME_W, 290); g.stroke();
  g.beginPath(); g.moveTo(0, 300); g.lineTo(GAME_W, 300); g.stroke();
  // 回收海報
  g.fillStyle = PAL.bg1; rr(430, 80, 120, 150, 8); g.fill();
  g.strokeStyle = PAL.line; g.lineWidth = 3; g.stroke();
  g.fillStyle = PAL.good; g.font = 'bold 52px sans-serif'; g.textAlign = 'center';
  g.fillText('♻', 490, 160);
  g.fillStyle = PAL.dim; g.font = 'bold 18px sans-serif';
  g.fillText('回收愛地球', 490, 205);
  // v6：牆面時鐘（面盤靜態，指針動態另畫）
  g.fillStyle = '#20243c'; g.beginPath(); g.arc(CLOCK_X, CLOCK_Y, 30, 0, 6.29); g.fill();
  g.fillStyle = '#e8ecf4'; g.beginPath(); g.arc(CLOCK_X, CLOCK_Y, 25, 0, 6.29); g.fill();
  g.strokeStyle = '#20243c'; g.lineWidth = 2;
  for (let i = 0; i < 12; i++) {
    const a = i / 12 * Math.PI * 2;
    g.beginPath();
    g.moveTo(CLOCK_X + Math.cos(a) * 20, CLOCK_Y + Math.sin(a) * 20);
    g.lineTo(CLOCK_X + Math.cos(a) * 23, CLOCK_Y + Math.sin(a) * 23);
    g.stroke();
  }
  // 地板＋花紋＋踢腳板
  const floorG = g.createLinearGradient(0, FLOOR_Y, 0, GAME_H);
  floorG.addColorStop(0, '#343a5c'); floorG.addColorStop(1, PAL.bg0);
  g.fillStyle = floorG; g.fillRect(0, FLOOR_Y, GAME_W, GAME_H - FLOOR_Y);
  g.strokeStyle = PAL.line; g.lineWidth = 2;
  g.beginPath(); g.moveTo(0, FLOOR_Y); g.lineTo(GAME_W, FLOOR_Y); g.stroke();
  g.strokeStyle = 'rgba(255,255,255,0.05)';
  for (let i = 1; i < 6; i++) {
    g.beginPath(); g.moveTo(i * 180, FLOOR_Y); g.lineTo(i * 180 + 30, GAME_H); g.stroke();
  }
  g.fillStyle = 'rgba(0,0,0,0.25)'; g.fillRect(0, FLOOR_Y - 10, GAME_W, 10);
  // v6：窗邊斜射光束灑向地板
  const shaft = g.createLinearGradient(360, 120, 560, FLOOR_Y);
  shaft.addColorStop(0, 'rgba(255,244,214,0.10)'); shaft.addColorStop(1, 'rgba(255,244,214,0)');
  g.fillStyle = shaft;
  g.beginPath(); g.moveTo(360, 80); g.lineTo(360, 240); g.lineTo(600, FLOOR_Y); g.lineTo(420, FLOOR_Y); g.closePath(); g.fill();
  // 盆栽本體（葉片動態另畫）
  const px = 330, py = FLOOR_Y;
  g.fillStyle = 'rgba(0,0,0,0.28)';
  g.beginPath(); g.ellipse(px, py + 4, 34, 7, 0, 0, 6.29); g.fill();
  const potG = g.createLinearGradient(px - 26, 0, px + 26, 0);
  potG.addColorStop(0, '#8a4a2c'); potG.addColorStop(0.4, '#c96b3c'); potG.addColorStop(1, '#8a4a2c');
  g.fillStyle = potG;
  g.beginPath();
  g.moveTo(px - 26, py - 40); g.lineTo(px + 26, py - 40);
  g.lineTo(px + 18, py); g.lineTo(px - 18, py);
  g.closePath(); g.fill();
  g.strokeStyle = 'rgba(0,0,0,0.3)'; g.lineWidth = 2; g.stroke();
  g.fillStyle = '#a85835'; g.fillRect(px - 28, py - 46, 56, 9);
  // 吊燈＋光暈
  const lampX = GAME_W / 2 + 130;
  g.strokeStyle = '#444c74'; g.lineWidth = 3;
  g.beginPath(); g.moveTo(lampX, 0); g.lineTo(lampX, 34); g.stroke();
  const lampG = g.createRadialGradient(lampX, 46, 4, lampX, 46, 90);
  lampG.addColorStop(0, 'rgba(255,220,140,0.5)'); lampG.addColorStop(1, 'rgba(255,220,140,0)');
  g.fillStyle = lampG;
  g.beginPath(); g.arc(lampX, 46, 90, 0, 6.29); g.fill();
  g.fillStyle = '#565f8c';
  g.beginPath(); g.moveTo(lampX - 22, 44);
  g.quadraticCurveTo(lampX, 12, lampX + 22, 44);
  g.closePath(); g.fill();
  g.fillStyle = '#ffe9b0';
  g.beginPath(); g.arc(lampX, 46, 7, 0, 6.29); g.fill();
  // 窗框（含框線）後清出窗景透明孔，讓動態窗景從下層透出
  g.strokeStyle = PAL.line; g.lineWidth = 8;
  g.strokeRect(60, 60, 300, 180);
  g.clearRect(64, 64, 292, 172);
});
// v6：窗邊光塵微粒
const dust = [];
for (let i = 0; i < 12; i++) dust.push({ x: rnd(240, 560), y: rnd(120, FLOOR_Y - 30), ph: rnd(0, 7), sp: rnd(4, 10) });
function drawBG() {
  // 窗景（先畫，被烘焙層的透明窗孔露出）
  const wx = 60, wy = 60, ww = 300, wh = 180;
  ctx.fillStyle = BG_SKY_G;
  ctx.fillRect(wx, wy, ww, wh);
  ctx.save();
  ctx.beginPath();
  ctx.rect(wx, wy, ww, wh);
  ctx.clip();
  for (const c of clouds) {
    ctx.fillStyle = PAL.cloud;
    ctx.globalAlpha = 0.5 + c.s * 0.4;
    const cx = wx + c.x, cy = wy + c.y, r = 14 * c.s;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, 6.29);
    ctx.arc(cx + r, cy + r * 0.3, r * 0.8, 0, 6.29);
    ctx.arc(cx - r, cy + r * 0.35, r * 0.75, 0, 6.29);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.fillStyle = 'rgba(60,110,80,0.85)';
  ctx.beginPath();
  ctx.moveTo(wx, wy + wh);
  const off = (bgTime * 2) % 80;
  for (let i = -1; i < 6; i++) {
    ctx.lineTo(wx + i * 80 - off + 40, wy + wh - 46);
    ctx.lineTo(wx + i * 80 - off + 80, wy + wh);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
  // 靜態辦公室整幅烘焙層
  ctx.drawImage(BG_OFFICE, 0, 0);
  // 窗欞十字（在窗景之上）
  ctx.strokeStyle = PAL.line;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(wx + ww / 2, wy); ctx.lineTo(wx + ww / 2, wy + wh);
  ctx.moveTo(wx, wy + wh / 2); ctx.lineTo(wx + ww, wy + wh / 2);
  ctx.stroke();
  // v6：時鐘指針（分針快轉增添生活感）
  ctx.strokeStyle = '#20243c'; ctx.lineCap = 'round';

// v3：筆電漸層預計算（普通 / 金色兩套，76×48 標準座標，繪製時 ctx.scale 正規化）
function makeLapGrads(gold) {
  const w = 76, h = 48;
  const base = ctx.createLinearGradient(0, h * 0.08, 0, h * 0.48);
  if (gold) { base.addColorStop(0, '#fff3c8'); base.addColorStop(0.5, '#ffd77a'); base.addColorStop(1, '#c9992e'); }
  else { base.addColorStop(0, '#cfd8e0'); base.addColorStop(0.5, PAL.lapBase); base.addColorStop(1, '#7e8a96'); }
  const lid = ctx.createLinearGradient(0, -h * 0.5, 0, h * 0.1);
  if (gold) { lid.addColorStop(0, '#e8c25a'); lid.addColorStop(1, '#a8842a'); }
  else { lid.addColorStop(0, '#727f8e'); lid.addColorStop(1, '#48545f'); }
  const scr = ctx.createLinearGradient(-w * 0.4, -h * 0.42, w * 0.4, 0);
  if (gold) { scr.addColorStop(0, '#fff3c8'); scr.addColorStop(0.5, '#ffcd75'); scr.addColorStop(1, '#e09b30'); }
  else { scr.addColorStop(0, '#6fc0ff'); scr.addColorStop(0.5, PAL.lapScreen); scr.addColorStop(1, '#2b7cd0'); }
  return { base, lid, scr };
}
const LAP_GRADS = makeLapGrads(false), LAP_GRADS_GOLD = makeLapGrads(true);
function drawLaptop(l) {

  const r = canvas.getBoundingClientRect();

}

    updateBin(dt, 0);
  },
  onKey(code, down) {
    if (down && (code === 'Space' || code === 'Enter')) startGame();
  },
  draw() {
    uiButtons.length = 0;
    drawBG();
    drawBinShadow();
    drawBinBack();
    // 示範動畫：筆電畫拋物線飛進桶
    const dt2 = this.demoT / 1.4;
    if (dt2 <= 1) {
      const sx = 150, sy = FLOOR_Y - 60;
      const ex = bin.x + bin.w / 2, ey = mouthY();
      const dx = lerp(sx, ex, dt2);
      const dy = lerp(sy, ey, dt2) - Math.sin(dt2 * Math.PI) * 230;
      const demo = { x: dx, y: dy, w: 66, h: 42, rot: dt2 * 5, sx: 1, sy: 1, vx: 0, trail: [], inBin: true };
      drawLaptop(demo);
      if (dt2 > 0.97 && !this.popped) { burst(ex, ey, PAL.accent, 10, 200, 120); this.popped = true; }
    } else this.popped = false;
    drawBinFront();
    drawParts();

    // 標題（彈跳進場）
    const tt = clamp(this.t / 0.6, 0, 1);
    const ts = easeOutBack(tt);
    ctx.save();
    ctx.translate(GAME_W / 2, 150);
    ctx.scale(ts, ts);
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.font = 'bold 64px sans-serif';
    ctx.fillText('丟筆電大賽', 4, 4 + Math.sin(bgTime * 2) * 4);
    ctx.fillStyle = PAL.accent;
    ctx.fillText('丟筆電大賽', 0, Math.sin(bgTime * 2) * 4);
    ctx.restore();
    ctx.textAlign = 'center';
    ctx.fillStyle = PAL.ink;
    ctx.font = '20px sans-serif';
    ctx.fillText('75 秒內把筆電甩進回收桶，穿金環、丟金色筆電賺加倍！', GAME_W / 2, 208);
    ctx.fillStyle = PAL.accent;
    ctx.font = 'bold 16px sans-serif';
    ctx.fillText('📱 平板：手指按住筆電，往回收桶方向快速甩出', GAME_W / 2, 233);
    ctx.fillText('💻 電腦：← → 瞄準，按住空白鍵蓄力、放開投擲', GAME_W / 2, 258);
    // v4：關卡挑戰宣傳
    ctx.fillStyle = PAL.good;
    ctx.font = 'bold 16px sans-serif';
    ctx.fillText('🎯 新增「關卡挑戰」：6 關新機制（陣風／遠距／橫梁…）各關拚三星！', GAME_W / 2, 286);
    if (best > 0) {
      ctx.fillStyle = PAL.dim;
      ctx.font = 'bold 15px sans-serif';
      ctx.fillText('經典模式最佳：' + best + ' 分', GAME_W / 2, 308);
    }
    // 開始按鈕（呼吸縮放）
    const bw = 230, bh = 52;
    const pulse = 1 + Math.sin(bgTime * 3) * 0.03;
    ctx.save();
    ctx.translate(GAME_W / 2, 330 + bh / 2);
    ctx.scale(pulse, pulse);
    ctx.translate(-GAME_W / 2, -(330 + bh / 2));
    button(GAME_W / 2 - bw / 2, 330, bw, bh, '開始（經典 75 秒）', startGame, { size: 24 });
    ctx.restore();
    button(GAME_W / 2 - bw / 2, 392, bw, bh, '🎯 關卡挑戰', openSelect, { size: 24, bg: PAL.good, fg: '#08331d' });
    muteButton();
  }
};
// v4：標題鍵盤——空白/Enter 經典開始，L 進入關卡挑戰
titleState.onKey = function (code, down) {
  if (!down) return;
  if (code === 'Space' || code === 'Enter') startGame();
  else if (code === 'KeyL') openSelect();
};

function startGame() {
  curLevel = -1;
  sfx.click();
  setState(playState);
}
function openSelect() { sfx.click(); setState(selectState); }
function startLevel(i) {
  if (!levelUnlocked(i)) { sfx.miss(); return; }
  curLevel = i;
  sfx.click();
  setState(playState);
}

// ===== 選關畫面 =====
const selectState = {
  enter() { this.t = 0; },
  update(dt) { this.t += dt; updateBG(dt); updateBin(dt, 0); },
  onKey(code, down) {
    if (!down) return;
    if (code === 'Escape' || code === 'Backspace') { setState(titleState); return; }
    const d = { Digit1: 0, Digit2: 1, Digit3: 2, Digit4: 3, Digit5: 4, Digit6: 5 }[code];
    if (d !== undefined) startLevel(d);
  },
  draw() {
    uiButtons.length = 0;
    drawBG();
    ctx.fillStyle = 'rgba(10,12,24,0.5)';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    ctx.textAlign = 'center';
    ctx.fillStyle = PAL.accent;
    ctx.font = 'bold 40px sans-serif';
    ctx.fillText('關卡挑戰', GAME_W / 2, 62);
    ctx.fillStyle = PAL.dim;
    ctx.font = '14px sans-serif';
    ctx.fillText('每關有新機制，通關拿星！　💻 按 1–6 選關、Esc 返回', GAME_W / 2, 88);
    const cols = 3, cw = 270, ch = 134, gapx = 20, gapy = 16;
    const totalW = cols * cw + (cols - 1) * gapx;
    const x0 = (GAME_W - totalW) / 2, y0 = 106;
    for (let i = 0; i < LEVELS.length; i++) {
      const cxi = i % cols, cyi = Math.floor(i / cols);
      const x = x0 + cxi * (cw + gapx), y = y0 + cyi * (ch + gapy);

      ctx.fillStyle = unlocked ? PAL.bg1 : 'rgba(30,34,52,0.7)';
      roundRect(x, y, cw, ch, 14); ctx.fill();
      ctx.strokeStyle = stars === 3 ? PAL.accent : (unlocked ? PAL.line : 'rgba(80,88,120,0.5)');
      ctx.lineWidth = stars === 3 ? 3 : 2; ctx.stroke();
      ctx.textAlign = 'left';
      ctx.fillStyle = unlocked ? PAL.accent : PAL.dim;
      ctx.font = 'bold 20px sans-serif';
      ctx.fillText((i + 1) + '. ' + LEVELS[i].name, x + 16, y + 30);
      ctx.fillStyle = PAL.dim;
      ctx.font = '13px sans-serif';
      wrapText(LEVELS[i].tip, x + 16, y + 52, cw - 32, 17);
      for (let s = 0; s < 3; s++) {
        ctx.fillStyle = s < stars ? PAL.accent : 'rgba(148,160,184,0.28)';
        ctx.font = 'bold 26px sans-serif';
        ctx.fillText('★', x + 16 + s * 30, y + ch - 14);
      }
      if (unlocked) {
        button(x + cw - 96, y + ch - 42, 80, 30, '挑 戰', () => startLevel(i), { size: 16 });
      } else {
        ctx.textAlign = 'right';
        ctx.fillStyle = PAL.dim;
        ctx.font = 'bold 14px sans-serif';
        ctx.fillText('🔒 前關拿★解鎖', x + cw - 16, y + ch - 22);
      }
    }
    button(20, GAME_H - 50, 118, 38, '← 返回', () => setState(titleState), { size: 18, bg: PAL.dim, fg: '#101018' });
    muteButton();
  }
};

// ===== 遊戲進行 =====
const playState = {
  enter() {
    // v4：套用關卡參數（curLevel<0 為經典模式）
    lvl = curLevel >= 0 ? LEVELS[curLevel] : LVL_CLASSIC;
    roundTime = curLevel >= 0 ? lvl.time : ROUND_TIME;
    bin.baseX = lvl.binX;
    windCur = 0; lastStars = 0;
    score = 0; hits = 0; throws = 0; combo = 0;
    timeLeft = roundTime;
    newBest = false;
    lastTickSec = -1;
    respawnT = 0;
    ring = null; ringT = 10;
    bin.t = 0; bin.x = bin.baseX;
    laptop = makeLaptop();
    dragging = false; dragPoints = [];
    kb.charging = false; kb.power = 0; kb.used = false; kb.dir = 0;
    parts.length = 0; floaters.length = 0;
    this.bannerT = 0;
    this.hudScore = 0;
  },
  onDown(p) {
    if (laptop.thrown || laptop.done) return;
    const d = Math.hypot(p.x - laptop.x, p.y - laptop.y);
    if (d < 110) {
      dragging = true;
      dragPoints = [{ x: p.x, y: p.y, t: performance.now() }];
      canvas.classList.add('dragging');
    }
  },
  onMove(p) {
    if (!dragging) return;
    laptop.x = clamp(p.x, 30, GAME_W - 30);
    laptop.y = clamp(p.y, 30, FLOOR_Y - 10);
    dragPoints.push({ x: p.x, y: p.y, t: performance.now() });
    if (dragPoints.length > 6) dragPoints.shift();
  },
  onUp() {
    if (!dragging) return;
    dragging = false;
    canvas.classList.remove('dragging');
    let vx = 0, vy = 0;
    if (dragPoints.length >= 2) {
      const a = dragPoints[0], b = dragPoints[dragPoints.length - 1];
      const dt = Math.max(16, b.t - a.t) / 1000;
      vx = (b.x - a.x) / dt;
      vy = (b.y - a.y) / dt;
    }
    const sp = Math.hypot(vx, vy);
    if (sp < 120) {  // v2：太輕給明確回饋，不再靜默
      addFloat(laptop.x, laptop.y - 44, '太輕了，用力甩！', PAL.dim, false);
      sfx.thud();
      return;
    }
    const cap = 1650;
    if (sp > cap) { vx *= cap / sp; vy *= cap / sp; }
    throwLaptop(vx, vy);
  },
  onKey(code, down) {
    if (laptop.thrown || laptop.done) return;
    if (code === 'ArrowLeft') kb.dir = down ? -1 : (kb.dir === -1 ? 0 : kb.dir);
    if (code === 'ArrowRight') kb.dir = down ? 1 : (kb.dir === 1 ? 0 : kb.dir);
    if (code === 'Space') {
      if (down) { kb.charging = true; kb.power = 0; kb.used = true; }
      else if (kb.charging) {
        kb.charging = false;
        const P = 500 + kb.power * 1100;
        throwLaptop(Math.cos(kb.angle) * P, Math.sin(kb.angle) * P);
      }
    }
  },
  update(dt) {
    updateBG(dt);
    updateBin(dt, hits);
    windCur = lvl.wind ? lvl.wind * Math.sin(bgTime * 0.6) : 0;   // v4：陣風（左右擺動）
    this.bannerT += dt;
    this.hudScore += (score - this.hudScore) * (1 - Math.pow(0.001, dt));

    // 倒數
    timeLeft -= dt;
    const sec = Math.ceil(timeLeft);
    if (timeLeft <= 5.2 && sec !== lastTickSec && sec > 0) { sfx.tick(); lastTickSec = sec; }
    if (timeLeft <= 0) {
      timeLeft = 0;
      endGame();
      return;
    }

    // 鍵盤瞄準
    if (!laptop.thrown && !laptop.done) {
      kb.angle = clamp(kb.angle + kb.dir * 1.6 * dt, -Math.PI * 0.5, -0.06);
      if (kb.charging) {
        kb.power += dt * 1.4;
        if (kb.power > 1) kb.power = 2 - kb.power; // 來回擺盪
        kb.power = clamp(kb.power, 0, 1);
        if (kb.power >= 0.999) kb.power = 0.999;
      }
    }

    // v2：空中加分環（10 秒後出現，穿過該球 x2）
    if (ring) {
      ring.t += dt; ring.life -= dt;
      ring.y = ring.baseY + Math.sin(ring.t * 1.6) * 18;
      if (ring.life <= 0) ring = null;
    } else {
      ringT -= dt;
      if (ringT <= 0 && timeLeft > 6) {
        ring = { x: rnd(430, 660), baseY: rnd(150, 250), y: 0, r: 36, t: rnd(0, 6.28), life: 9 };
        ring.y = ring.baseY;
        ringT = rnd(7, 10);
        addFloat(ring.x, ring.baseY - 50, '穿過金環 x2！', PAL.accent, false);
      }
    }
    // v2：金色筆電限時倒數
    if (laptop.gold && !laptop.thrown && !laptop.done) {
      laptop.goldT -= dt;
      if (Math.random() < 8 * dt) burst(laptop.x + rnd(-30, 30), laptop.y + rnd(-20, 20), '#ffd447', 1, 60, 40);
      if (laptop.goldT <= 0) {
        laptop.gold = false;
        addFloat(laptop.x, laptop.y - 40, '金色時間過了…', PAL.dim, false);
      }
    }

    // 筆電回彈縮放
    laptop.sx += (1 - laptop.sx) * 12 * dt;
    laptop.sy += (1 - laptop.sy) * 12 * dt;

    // 重生計時
    if (laptop.done) {
      respawnT -= dt;
      if (respawnT <= 0) {
        laptop = makeLaptop();
        laptop.sy = 1.3; laptop.sx = 0.75; // 登場彈跳
        if (throws >= 3 && (throws + 1) % 4 === 0) {  // v2：每第 4 球是金色筆電
          laptop.gold = true; laptop.goldT = 3.5;
          burst(laptop.x, laptop.y, '#ffd447', 16, 220, 120);
          sfx.combo(4);
        }
      }
      return;
    }
    if (!laptop.thrown) {
      // 待機呼吸
      if (!dragging) laptop.sy = 1 + Math.sin(bgTime * 4) * 0.03;
      return;
    }

    // --- 投擲物理 ---
    laptop.airTime += dt;
    laptop.vy += GRAVITY * dt;
    if (lvl.wind) laptop.vx += windCur * dt;   // v4：側風推移筆電
    laptop.x += laptop.vx * dt;
    laptop.y += laptop.vy * dt;
    laptop.rot += laptop.vrot * dt;
    laptop.trail.push({ x: laptop.x, y: laptop.y, rot: laptop.rot });
    if (laptop.trail.length > 7) laptop.trail.shift();

    // v2：穿過加分環判定
    if (ring && !laptop.inBin && Math.hypot(laptop.x - ring.x, laptop.y - ring.y) < ring.r - 4) {
      laptop.ringMul = 2;
      burst(ring.x, ring.y, PAL.accent, 20, 240, 140);
      addFloat(ring.x, ring.y - 30, '⭐ 加倍！', PAL.accent, true);
      shake = Math.max(shake, 4);
      sfx.perfect();
      ring = null;
    }

    if (laptop.inBin) {
      // 已進桶：往下掉到桶底就完成
      if (laptop.y > bin.y + bin.h * 0.55) finishThrow(true);
      return;
    }

    // 進桶判定（桶口線 + 往下掉）
    const mY = mouthY();
    if (laptop.vy > 0 &&
        laptop.y > mY - 14 && laptop.y < mY + 26 &&
        laptop.x > bin.x + 14 && laptop.x < bin.x + bin.w - 14) {
      laptop.inBin = true;
      laptop.vx *= 0.15;
      laptop.vy = Math.max(laptop.vy * 0.4, 220);
      laptop.vrot *= 0.3;
      scoreHit();
      return;
    }

    // 桶緣碰撞（左右緣視為小圓）
    const rimR = 9, lapR = laptop.w * 0.36;
    for (const rx of [bin.x + 8, bin.x + bin.w - 8]) {
      const dx = laptop.x - rx, dy = laptop.y - mY;
      const d = Math.hypot(dx, dy);
      if (d < rimR + lapR && d > 0.01) {
        const nx = dx / d, ny = dy / d;
        laptop.x = rx + nx * (rimR + lapR);
        laptop.y = mY + ny * (rimR + lapR);
        const dot = laptop.vx * nx + laptop.vy * ny;
        if (dot < 0) {
          laptop.vx -= 1.5 * dot * nx;
          laptop.vy -= 1.5 * dot * ny;
          laptop.vx *= 0.72; laptop.vy *= 0.72;
          laptop.touchedRim = true;
          sfx.rim();
          shake = Math.max(shake, 3);
          burst(rx, mY, PAL.binLite, 6, 160);
        }
      }
    }

    // v4：橫梁障礙（吊燈橫梁關）——擋住直線路徑，必須拋高越過
    if (lvl.beam && !laptop.inBin) {
      const bm = lvl.beam, lr = laptop.w * 0.34;
      if (laptop.x > bm.x - lr && laptop.x < bm.x + bm.w + lr &&
          laptop.y > bm.y - lr && laptop.y < bm.y + bm.h + lr) {
        if (laptop.vy > 0 && laptop.y < bm.y + bm.h * 0.5) { laptop.y = bm.y - lr; laptop.vy *= -0.4; }
        else { laptop.y = bm.y + bm.h + lr; laptop.vy = Math.max(laptop.vy, 40); }
        laptop.vx *= 0.6; laptop.vrot *= 0.6;
        laptop.touchedRim = true;             // 碰梁後不算完美空心
        sfx.thud(); shake = Math.max(shake, 3);
        burst(laptop.x, laptop.y, '#7a5a2a', 6, 150);
      }
    }

    // 牆壁
    if (laptop.x < 20) { laptop.x = 20; laptop.vx *= -0.45; sfx.thud(); }
    if (laptop.x > GAME_W - 20) { laptop.x = GAME_W - 20; laptop.vx *= -0.45; sfx.thud(); }

    // 地板
    const fy = FLOOR_Y - laptop.h * 0.35;
    if (laptop.y > fy) {
      laptop.y = fy;
      if (Math.abs(laptop.vy) > 90) {
        laptop.vy *= -0.38;
        laptop.vx *= 0.62;
        laptop.vrot *= 0.5;
        laptop.sx = 1.35; laptop.sy = 0.6; // 落地壓扁
        sfx.thud();
        shake = Math.max(shake, 2.5);
        burst(laptop.x, FLOOR_Y, '#6a7290', 5, 130, 60);
      } else {
        laptop.vy = 0;
        laptop.vx *= 0.86;
        laptop.vrot *= 0.8;
        if (Math.abs(laptop.vx) < 8) finishThrow(false);
      }
    }
    if (laptop.airTime > 7) finishThrow(false); // 保險
  },
  draw() {
    uiButtons.length = 0;
    ctx.save();
    ctx.translate((Math.random() * 2 - 1) * shake, (Math.random() * 2 - 1) * shake);
    drawBG();
    if (lvl.beam) drawBeam();
    drawRing();
    drawBinShadow();
    drawBinBack();
    if (laptop.inBin) drawLaptop(laptop);
    drawBinFront();
    if (!laptop.inBin) drawLaptop(laptop);
    drawAim();
    // v3：第一球前，筆電上方畫彈跳指引（首次體驗 10 秒內免閱讀）
    if (throws === 0 && !laptop.thrown && !dragging) {
      const bob = Math.sin(bgTime * 5) * 6;
      ctx.fillStyle = PAL.accent;
      ctx.font = 'bold 19px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('按住我，往桶子甩！', laptop.x + 10, laptop.y - 92 + bob);
      ctx.beginPath();
      ctx.moveTo(laptop.x, laptop.y - 62 + bob);
      ctx.lineTo(laptop.x - 10, laptop.y - 78 + bob);
      ctx.lineTo(laptop.x + 10, laptop.y - 78 + bob);
      ctx.closePath(); ctx.fill();
    }
    drawParts();
    drawFloaters();
    ctx.restore();
    drawHUD(this);
    if (lvl.wind) drawWindGauge();
    if (curLevel >= 0) {   // v4：關卡名稱標籤
      ctx.textAlign = 'left';
      ctx.fillStyle = PAL.good; ctx.font = 'bold 14px sans-serif';
      ctx.fillText('關卡 ' + (curLevel + 1) + '　' + lvl.name, 16, 90);
    }
    muteButton();
    // 開場橫幅
    if (this.bannerT < 1.6) {
      const a = this.bannerT < 1.1 ? 1 : 1 - (this.bannerT - 1.1) / 0.5;
      ctx.globalAlpha = clamp(a, 0, 1);
      ctx.fillStyle = PAL.accent;
      ctx.textAlign = 'center';
      if (curLevel >= 0) {
        ctx.font = 'bold 24px sans-serif';
        ctx.fillText('關卡 ' + (curLevel + 1) + '：' + lvl.tip, GAME_W / 2, 200);
      } else {
        ctx.font = 'bold 34px sans-serif';
        ctx.fillText('把筆電丟進回收桶！', GAME_W / 2, 200);
      }
      ctx.globalAlpha = 1;
    }
  }
};
// v4：橫梁障礙繪製
function drawBeam() {
  const bm = lvl.beam;
  ctx.save();
  ctx.strokeStyle = '#3a4166'; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(bm.x + 30, 0); ctx.lineTo(bm.x + 30, bm.y);
  ctx.moveTo(bm.x + bm.w - 30, 0); ctx.lineTo(bm.x + bm.w - 30, bm.y); ctx.stroke();
  ctx.fillStyle = '#6b7280';
  roundRect(bm.x, bm.y, bm.w, bm.h, 4); ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  roundRect(bm.x, bm.y + bm.h * 0.55, bm.w, bm.h * 0.45, 3); ctx.fill();
  ctx.fillStyle = PAL.accent;
  for (let i = 0; i < 5; i++) ctx.fillRect(bm.x + 14 + i * 34, bm.y + 3, 8, bm.h - 6);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1.5;
  roundRect(bm.x, bm.y, bm.w, bm.h, 4); ctx.stroke();
  ctx.restore();
}
// v4：陣風指示器
function drawWindGauge() {
  const cx = GAME_W / 2, cy = 104, w = windCur / 200;
  const dir = w >= 0 ? 1 : -1, mag = clamp(Math.abs(w), 0.12, 1);
  const col = Math.abs(w) > 0.55 ? PAL.bad : PAL.accent;
  ctx.save();
  ctx.textAlign = 'center';
  ctx.fillStyle = PAL.dim; ctx.font = 'bold 11px sans-serif';
  ctx.fillText('風向', cx, cy - 9);
  ctx.strokeStyle = col; ctx.lineWidth = 4; ctx.lineCap = 'round';
  const len = 42 * mag * dir;
  ctx.beginPath(); ctx.moveTo(cx - len, cy); ctx.lineTo(cx + len, cy); ctx.stroke();
  const tipx = cx + len;
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.moveTo(tipx, cy); ctx.lineTo(tipx - dir * 9, cy - 6); ctx.lineTo(tipx - dir * 9, cy + 6); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function throwLaptop(vx, vy) {
  laptop.vx = vx;
  laptop.vy = vy;
  laptop.vrot = clamp(vx * 0.012, -9, 9);
  laptop.thrown = true;
  laptop.sx = 1.25; laptop.sy = 0.8;
  throws++;
  sfx.throw(clamp(Math.hypot(vx, vy) / 1650, 0.2, 1));   // v6：力道越大風聲越猛
}
function scoreHit() {
  hits++;
  combo++;
  const comboMul = Math.min(combo, 5);
  let pts = 10 * comboMul;
  let perfect = !laptop.touchedRim;
  if (perfect) pts += 10;
  const mul = (laptop.gold ? 2 : 1) * (laptop.ringMul || 1);   // v2：金色 x 金環 疊乘
  pts *= mul;
  score += pts;
  bin.squash = 1.25;
  freeze = perfect ? 0.09 : 0.05;
  shake = Math.max(shake, perfect ? 8 : 5);
  const cx = bin.x + bin.w / 2, cy = mouthY();
  burst(cx, cy, PAL.accent, perfect ? 26 : 14, 260, 180);
  burst(cx, cy, PAL.good, 8, 200, 150);
  if (perfect) {
    timeLeft = Math.min(timeLeft + 2, 99);   // v2：完美空心 +2 秒
    addFloat(cx, cy - 40, '完美空心！+' + pts, PAL.accent, true);
    addFloat(cx, cy - 104, '⏱ +2 秒', PAL.good, false);
    sfx.perfect();
  } else {
    addFloat(cx, cy - 40, '+' + pts, PAL.good, true);
    sfx.score();
  }
  if (mul > 1) addFloat(cx, cy - 134, '加倍 x' + mul + '！', '#ffd447', true);
  if (combo >= 2) {
    addFloat(cx, cy - 74, '連擊 x' + combo, PAL.accentDeep, false);
    sfx.combo(Math.min(combo, 6));
  }
}
function finishThrow(scored) {
  if (laptop.done) return;
  laptop.done = true;
  if (!scored) {
    if (combo >= 2) addFloat(laptop.x, laptop.y - 30, '連擊中斷', PAL.bad, false);
    else addFloat(laptop.x, laptop.y - 30, '沒中，再來！', PAL.bad, false);
    combo = 0;
    sfx.miss();
  }
  respawnT = 0.45; // 不到 1 秒就有新筆電
}
function endGame() {
  if (curLevel >= 0) {
    // v4：關卡模式——依門檻計算三星並存檔（取歷史最高）
    lastStars = LEVELS[curLevel].star.filter(s => score >= s).length;
    newBest = lastStars > getStars(curLevel);
    saveStars(curLevel, lastStars);
  } else if (score > best) {
    best = score;
    newBest = true;
    try { localStorage.setItem('丟筆電大賽.best', String(best)); } catch (err) {}
  } else {
    newBest = false;
  }
  setState(overState);
}

function drawRing() {   // v2：空中加分環（旋轉虛線金環＋星星）
  if (!ring) return;
  const blink = ring.life < 2.5 ? 0.35 + 0.65 * Math.abs(Math.sin(ring.life * 6)) : 1;
  ctx.save();
  ctx.translate(ring.x, ring.y);
  ctx.globalAlpha = blink;
  ctx.rotate(ring.t * 1.2);
  // v3：光暈改雙筆畫（原 shadowBlur 14 每幀成本高）
  ctx.strokeStyle = 'rgba(255,205,117,0.3)';
  ctx.lineWidth = 12;
  ctx.beginPath(); ctx.arc(0, 0, ring.r, 0, 6.29); ctx.stroke();
  ctx.strokeStyle = PAL.accent;
  ctx.lineWidth = 5;
  ctx.setLineDash([12, 9]);
  ctx.beginPath(); ctx.arc(0, 0, ring.r, 0, 6.29); ctx.stroke();
  ctx.setLineDash([]);
  ctx.rotate(-ring.t * 1.2);
  ctx.fillStyle = PAL.accent;
  ctx.font = 'bold 22px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('x2', 0, 1);
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawAim() {
  if (dragging && dragPoints.length >= 2) {
    // 拖曳軌跡預測
    const a = dragPoints[0], b = dragPoints[dragPoints.length - 1];
    const dtm = Math.max(16, b.t - a.t) / 1000;
    let vx = (b.x - a.x) / dtm, vy = (b.y - a.y) / dtm;
    const sp = Math.hypot(vx, vy), cap = 1650;
    if (sp > cap) { vx *= cap / sp; vy *= cap / sp; }
    if (sp > 120) {
      let px = laptop.x, py = laptop.y, pvx = vx, pvy = vy;
      ctx.fillStyle = PAL.accent;
      for (let i = 0; i < 16; i++) {
        pvy += GRAVITY * 0.05;
        px += pvx * 0.05; py += pvy * 0.05;
        if (py > FLOOR_Y) break;
        ctx.globalAlpha = 0.55 * (1 - i / 16);
        ctx.beginPath(); ctx.arc(px, py, 5 - i * 0.2, 0, 6.29); ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
  } else if (kb.used && !laptop.thrown && !laptop.done) {
    // 鍵盤瞄準箭頭 + 力度條
    const len = 60 + kb.power * 70;
    const ex = laptop.x + Math.cos(kb.angle) * len;
    const ey = laptop.y + Math.sin(kb.angle) * len;
    ctx.strokeStyle = PAL.accent; ctx.lineWidth = 4;
    ctx.setLineDash([7, 6]);
    ctx.beginPath(); ctx.moveTo(laptop.x, laptop.y); ctx.lineTo(ex, ey); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = PAL.accent;
    ctx.save();
    ctx.translate(ex, ey);
    ctx.rotate(Math.atan2(ey - laptop.y, ex - laptop.x));
    ctx.beginPath();
    ctx.moveTo(10, 0); ctx.lineTo(-6, -7); ctx.lineTo(-6, 7);
    ctx.closePath(); ctx.fill();
    ctx.restore();
    if (kb.charging) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      roundRect(laptop.x - 40, laptop.y - 70, 80, 12, 6);
      ctx.fill();
      ctx.fillStyle = kb.power > 0.8 ? PAL.bad : PAL.accent;
      roundRect(laptop.x - 38, laptop.y - 68, 76 * kb.power, 8, 4);
      ctx.fill();
    }
  }
}

function drawHUD(st) {
  // 分數板（v7：玻璃質感——頂部光澤）
  ctx.save();
  ctx.fillStyle = 'rgba(26,28,44,0.78)';
  roundRect(14, 12, 150, 58, 12);
  ctx.fill();
  ctx.strokeStyle = PAL.line; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.055)';
  roundRect(16, 14, 146, 24, 10); ctx.fill();
  ctx.fillStyle = PAL.dim;
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('得分', 28, 32);
  ctx.fillStyle = PAL.accent;
  ctx.font = 'bold 28px sans-serif';
  ctx.fillText(String(Math.round(st.hudScore)), 28, 60);
  // 連擊
  if (combo >= 2) {
    const pulse = 1 + Math.sin(bgTime * 10) * 0.08;
    ctx.save();
    ctx.translate(210, 44);
    ctx.scale(pulse, pulse);
    ctx.fillStyle = PAL.accentDeep;
    ctx.font = 'bold 24px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('x' + Math.min(combo, 5), 0, 8);
    ctx.restore();
  }
  // 時間
  const urgent = timeLeft <= 5.2;
  ctx.fillStyle = 'rgba(26,28,44,0.78)';
  roundRect(GAME_W / 2 - 75, 12, 150, 58, 12);
  ctx.fill();
  ctx.strokeStyle = urgent ? PAL.bad : PAL.line;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.055)';   // v7：頂部光澤
  roundRect(GAME_W / 2 - 73, 14, 146, 24, 10); ctx.fill();
  ctx.fillStyle = PAL.dim;
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('時間', GAME_W / 2, 32);
  const tScale = urgent ? 1 + Math.abs(Math.sin(timeLeft * Math.PI)) * 0.15 : 1;
  ctx.save();
  ctx.translate(GAME_W / 2, 54);
  ctx.scale(tScale, tScale);
  ctx.fillStyle = urgent ? PAL.bad : PAL.ink;
  ctx.font = 'bold 28px sans-serif';
  ctx.fillText(String(Math.ceil(timeLeft)), 0, 6);
  ctx.restore();
  // 時間條（v7：暗底＋頂部光澤）
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  roundRect(GAME_W / 2 - 66, 73, 132, 8, 4);
  ctx.fill();
  const tw7 = 130 * clamp(timeLeft / roundTime, 0, 1);
  if (tw7 > 1) {
    ctx.fillStyle = urgent ? PAL.bad : PAL.good;
    roundRect(GAME_W / 2 - 65, 74, tw7, 6, 3);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    roundRect(GAME_W / 2 - 65, 74, tw7, 2.5, 1.2);
    ctx.fill();
  }
  // 操作提示
  ctx.fillStyle = 'rgba(148,160,184,0.85)';
  ctx.font = '13px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('拖曳筆電甩向回收桶　｜　鍵盤：← → 瞄準、空白鍵蓄力', GAME_W / 2, GAME_H - 12);
  ctx.restore();
}

// ===== 結算畫面 =====
const overState = {
  enter() {
    this.t = 0;
    sfx.over();
    if (newBest) setTimeout(() => sfx.best(), 600);
    this.confettiT = 0;
  },
  onKey(code, down) {
    if (!down || this.t <= 0.5) return;
    if (code === 'Space' || code === 'Enter') { if (curLevel >= 0) startLevel(curLevel); else startGame(); }
    else if (code === 'KeyN' && curLevel >= 0 && curLevel + 1 < LEVELS.length && lastStars >= 1) startLevel(curLevel + 1);
    else if (code === 'Escape') { if (curLevel >= 0) openSelect(); else setState(titleState); }
  },
  update(dt) {
    this.t += dt;
    updateBG(dt);
    updateBin(dt, 0);
    if (newBest) {
      this.confettiT -= dt;
      if (this.confettiT <= 0 && parts.length < 240) {
        this.confettiT = 0.12;
        parts.push({
          x: rnd(0, GAME_W), y: -10,
          vx: rnd(-40, 40), vy: rnd(60, 160),
          life: rnd(1.2, 2), max: 2,
          color: [PAL.accent, PAL.good, PAL.binLite, PAL.accentDeep][Math.floor(rnd(0, 4))],
          size: rnd(4, 7), spin: rnd(-10, 10), rot: rnd(0, 6.28)
        });
      }
    }
  },
  draw() {
    uiButtons.length = 0;
    drawBG();
    drawBinShadow();
    drawBinBack();
    drawBinFront();
    drawParts();
    // 暗幕
    ctx.fillStyle = 'rgba(10,12,24,' + (0.6 * clamp(this.t / 0.3, 0, 1)) + ')';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    // 面板彈入
    const pt = clamp(this.t / 0.45, 0, 1);
    const ps = easeOutBack(pt);
    ctx.save();
    ctx.translate(GAME_W / 2, GAME_H / 2);
    ctx.scale(ps, ps);
    ctx.translate(-GAME_W / 2, -GAME_H / 2);
    // v7：結算面板——漸層底＋頂部光澤＋雙框＋角落飾線
    if (!overState._pg) { overState._pg = ctx.createLinearGradient(0, 90, 0, 430);
      overState._pg.addColorStop(0, '#2b3050'); overState._pg.addColorStop(0.12, PAL.bg1); overState._pg.addColorStop(1, '#1e2236'); }
    ctx.fillStyle = overState._pg;
    roundRect(GAME_W / 2 - 220, 90, 440, 340, 18);
    ctx.fill();
    ctx.strokeStyle = newBest ? PAL.accent : PAL.line;
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    roundRect(GAME_W / 2 - 216, 94, 432, 40, 15); ctx.fill();
    ctx.strokeStyle = 'rgba(255,205,117,0.16)'; ctx.lineWidth = 1;
    roundRect(GAME_W / 2 - 214, 96, 428, 328, 14); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,205,117,0.55)'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    for (const [sx7, sy7] of [[-1,-1],[1,-1],[-1,1],[1,1]]) {
      const px7 = GAME_W / 2 + sx7 * 204, py7 = 260 + sy7 * 154;
      ctx.beginPath(); ctx.moveTo(px7, py7 + sy7 * -12); ctx.lineTo(px7, py7); ctx.lineTo(px7 + sx7 * -12, py7); ctx.stroke();
    }
    const inLevel = curLevel >= 0;
    const starT = inLevel ? LEVELS[curLevel].star : OVER_STARS;
    const gotStars = inLevel ? lastStars : starT.filter(s => score >= s).length;
    ctx.textAlign = 'center';
    ctx.fillStyle = PAL.ink;
    ctx.font = 'bold 30px sans-serif';
    ctx.fillText(inLevel ? ('關卡 ' + (curLevel + 1) + '：' + lvl.name) : '時間到！', GAME_W / 2, 138);
    // 三星評價（逐顆彈出）
    for (let i = 0; i < 3; i++) {
      const stp = clamp((this.t - 0.5 - i * 0.3) / 0.3, 0, 1);
      if (stp <= 0) continue;
      ctx.save();
      ctx.translate(GAME_W / 2 - 44 + i * 44, 180);
      ctx.scale(easeOutBack(stp), easeOutBack(stp));
      ctx.fillStyle = i < gotStars ? PAL.accent : 'rgba(148,160,184,0.3)';
      ctx.font = 'bold 36px sans-serif';
      ctx.fillText('★', 0, 12);
      ctx.restore();
    }
    if (newBest) {
      const bp = 1 + Math.sin(bgTime * 6) * 0.06;
      ctx.save();
      ctx.translate(GAME_W / 2, 216);
      ctx.scale(bp, bp);
      ctx.fillStyle = PAL.accent;
      ctx.font = 'bold 20px sans-serif';
      ctx.fillText(inLevel ? '★ 星數刷新！★' : '★ 新紀錄！★', 0, 0);
      ctx.restore();
    } else {
      ctx.fillStyle = PAL.dim;
      ctx.font = '14px sans-serif';
      ctx.fillText(gotStars < 3 ? '下一顆★需要 ' + starT[gotStars] + ' 分' : '全星制霸！', GAME_W / 2, 216);
    }
    ctx.fillStyle = PAL.dim;
    ctx.font = 'bold 15px sans-serif';
    ctx.fillText('得分', GAME_W / 2, 240);
    ctx.fillStyle = PAL.accent;
    ctx.font = 'bold 50px sans-serif';
    ctx.fillText(String(score), GAME_W / 2, 286);
    ctx.fillStyle = PAL.dim;
    ctx.font = '15px sans-serif';
    const acc = throws > 0 ? Math.round(hits / throws * 100) : 0;
    ctx.fillText('命中 ' + hits + ' 球 ／ 投擲 ' + throws + ' 次（命中率 ' + acc + '%）', GAME_W / 2, 312);
    if (this.t > 0.5) {
      if (inLevel) {
        const nxt = curLevel + 1, hasNext = nxt < LEVELS.length, canNext = hasNext && gotStars >= 1;
        button(GAME_W / 2 - 214, 352, 132, 50, '重玩本關', () => startLevel(curLevel), { size: 20 });
        button(GAME_W / 2 - 66, 352, 132, 50, '選關', openSelect, { size: 20, bg: PAL.dim, fg: '#101018' });
        button(GAME_W / 2 + 82, 352, 132, 50, hasNext ? '下一關 ▶' : '已通關 🏆',
          () => { if (canNext) startLevel(nxt); else openSelect(); },
          { size: 20, bg: canNext ? PAL.good : PAL.dim, fg: canNext ? '#08331d' : '#101018' });
        if (hasNext && !canNext) {
          ctx.fillStyle = PAL.dim; ctx.font = '12px sans-serif';
          ctx.fillText('拿 ★ 解鎖下一關', GAME_W / 2 + 148, 344);
        }
      } else {
        ctx.fillStyle = PAL.ink;
        ctx.font = 'bold 15px sans-serif';
        ctx.fillText('最佳紀錄：' + best + ' 分', GAME_W / 2, 338);
        button(GAME_W / 2 - 110, 356, 220, 50, '再玩一次', startGame, { size: 24 });
      }
    }
    ctx.restore();
    muteButton();
  }
};

// ---------- 主迴圈：固定時間步進 ----------
const STEP = 1 / 60;
let last = performance.now(), acc = 0;
function frame(now) {
  requestAnimationFrame(frame);
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while (acc >= STEP) {
    acc -= STEP;
    if (freeze > 0) { freeze -= STEP; continue; }
    shake *= Math.pow(0.001, STEP);
    if (shake < 0.1) shake = 0;
    state.update(STEP);
    updateParts(STEP);
    updateFloaters(STEP);
  }
  state.draw();
  if (sceneFade7 > 0) {   // v7：0.3 秒淡入轉場
    sceneFade7 = Math.max(0, sceneFade7 - STEP * 3.4);
    ctx.fillStyle = 'rgba(20,24,28,' + (sceneFade7 * sceneFade7 * 0.9).toFixed(3) + ')';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
  }
  if (innerHeight > innerWidth * 1.15) {   // v2：直向持機提示（不阻擋操作）
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = 'rgba(26,28,44,0.7)';
    roundRect(GAME_W / 2 - 130, 88, 260, 34, 17);
    ctx.fill();
    ctx.fillStyle = PAL.accent;
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('↻ 轉成橫向，畫面更大！', GAME_W / 2, 110);
    ctx.restore();
  }
}
setState(titleState);
requestAnimationFrame(frame);
</script>
