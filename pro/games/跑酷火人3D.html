<!doctype html>
<!-- 專業AI升級 v4 -->
<html lang="zh-Hant">
<head>
<meta charset="utf-8">

<title>跑酷火人3D</title>
<style>
  :root{
    --brand-cyan:#38e1ff; --brand-blue:#4f7cff; --brand-purple:#9a6bff; --brand-pink:#ff6cc7;
    --gold1:#ffcf5c; --gold2:#ffa72e; --gold3:#ff7e3d; --bg-dark:#070b14;
  }
  html,body{margin:0;height:100%;background:var(--bg-dark);overflow:hidden;touch-action:none;
    -webkit-user-select:none;user-select:none;font-family:"PingFang TC","Microsoft JhengHei",sans-serif}
  #game{position:absolute;inset:0;display:block}
  #hud{position:absolute;inset:0;pointer-events:none}
  .hud-top{position:absolute;top:max(10px,env(safe-area-inset-top));left:0;right:0;
    display:flex;justify-content:space-between;align-items:flex-start;padding:0 12px;gap:8px}
  .pill{background:rgba(7,11,20,.66);border:1px solid rgba(56,225,255,.35);border-radius:14px;
    padding:9px 14px;color:#eaf6ff;font-size:15px;font-weight:700;box-shadow:0 2px 10px rgba(0,0,0,.35)}
  .pill b{background:linear-gradient(92deg,var(--brand-cyan),var(--brand-blue),var(--brand-purple));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  #muteBtn{pointer-events:auto;cursor:pointer;width:48px;height:48px;border-radius:14px;
    background:rgba(7,11,20,.66);border:1px solid rgba(56,225,255,.4);
    display:flex;align-items:center;justify-content:center}
  #muteBtn svg{width:26px;height:26px}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;color:#eaf6ff;background:rgba(7,11,20,.78);pointer-events:auto;gap:13px;padding:16px;box-sizing:border-box;overflow:auto}
  .screen.hidden{display:none}
  .title-logo{font-size:clamp(30px,7vw,52px);font-weight:900;letter-spacing:2px;
    background:linear-gradient(92deg,var(--gold1),var(--gold2),var(--gold3));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 30px rgba(255,140,50,.35)}
  .subtitle{font-size:14px;color:#9fb3d9;margin-top:-8px}
  .howto{background:rgba(255,255,255,.05);border:1px solid rgba(79,124,255,.3);border-radius:14px;
    padding:11px 18px;font-size:14px;line-height:1.7;max-width:460px}
  .howto b{color:var(--brand-cyan)}
  .lvgrid{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:560px}
  .lvbtn{pointer-events:auto;cursor:pointer;width:96px;height:96px;border-radius:16px;border:2px solid var(--gold2);
    background:rgba(255,255,255,.07);color:#eaf6ff;font-weight:800;font-size:15px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
  .lvbtn small{font-size:11px;font-weight:600;color:#9fb3d9}
  .lvbtn .stars{font-size:13px;letter-spacing:2px;color:var(--gold1)}
  .lvbtn.locked{border-color:rgba(255,255,255,.15);color:#5a6a85;background:rgba(0,0,0,.3);cursor:default}
  .lvbtn:not(.locked):active{transform:scale(.95)}
  .bigbtn{pointer-events:auto;cursor:pointer;min-height:54px;min-width:170px;border:none;border-radius:16px;
    font-size:19px;font-weight:800;color:#0a0f1a;
    background:linear-gradient(92deg,var(--brand-cyan),var(--brand-blue));
    box-shadow:0 6px 18px rgba(79,124,255,.4);padding:10px 24px}
  .bigbtn.gold{background:linear-gradient(92deg,var(--gold1),var(--gold3));box-shadow:0 6px 18px rgba(255,140,50,.4)}
  .bigbtn.ghost{background:rgba(255,255,255,.1);color:#eaf6ff;border:1.5px solid rgba(56,225,255,.5)}
  .bigbtn:active{transform:scale(.96)}
  .stat{font-size:15px;color:#cfe0ff}
  .stat b{color:var(--gold2)}
  .winstars{font-size:44px;letter-spacing:8px;color:var(--gold1);text-shadow:0 0 22px rgba(255,180,60,.6)}
  .btnrow{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  #deathFlash{position:absolute;inset:0;background:#ff2d0e;opacity:0;pointer-events:none;transition:opacity .08s}
  #joyZone,#jumpBtn{position:absolute;pointer-events:auto;touch-action:none;display:none}
  body.playing #joyZone, body.playing #jumpBtn{display:block}
  #joyZone{left:18px;bottom:max(18px,env(safe-area-inset-bottom));width:132px;height:132px;
    border-radius:50%;background:rgba(255,255,255,.08);border:2px solid rgba(56,225,255,.35)}
  #joyStick{position:absolute;left:50%;top:50%;width:56px;height:56px;margin:-28px 0 0 -28px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#7fd8ff,var(--brand-blue) 70%);box-shadow:0 3px 10px rgba(0,0,0,.4)}
  #jumpBtn{right:22px;bottom:max(26px,env(safe-area-inset-bottom));width:88px;height:88px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,var(--gold1),var(--gold3) 75%);
    box-shadow:0 4px 14px rgba(255,140,50,.45);color:#3a1500;font-weight:900;font-size:18px;
    display:none;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.3)}
  body.playing #jumpBtn{display:flex}
  #jumpBtn:active,#joyZone.active{filter:brightness(1.18)}
</style>

<body>
<canvas id="game"></canvas>

<div id="hud">
  <div class="hud-top">
    <div class="pill" id="lvPill"><b id="lvTxt">第1關</b></div>

<div id="titleScreen" class="screen">
  <div class="title-logo">跑酷火人3D</div>

  <div class="howto">
    <div>💻 電腦：<b>WASD / 方向鍵</b> 移動、<b>空白鍵</b> 跳躍</div>

  </div>

<div id="joyZone"><div id="joyStick"></div></div>
<div id="jumpBtn">跳</div>

<script>
'use strict';
/* ============================================================
   跑酷火人3D — 專業AI升級版 v4
   手寫 canvas 3D 透視投影：每面獨立受光的立體平台、熔岩海、
   多部件火焰小人。5 大關卡＋選關＋星級（依通關時間）。
   ============================================================ */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let VW = innerWidth, VH = innerHeight, CX = VW/2, CY = VH*0.42, FOV = VH*0.9;

/* ===================== 預烘焙：天空與熔岩漸層 ===================== */
const skyCv = document.createElement('canvas');
const lavaGradCv = document.createElement('canvas');
function bakeSky(){
  skyCv.width = VW; skyCv.height = VH;
  const g = skyCv.getContext('2d');
  const grad = g.createLinearGradient(0,0,0,VH);
  grad.addColorStop(0,'#0d0308'); grad.addColorStop(0.35,'#2a0a0c');
  grad.addColorStop(0.62,'#6b1a10'); grad.addColorStop(0.8,'#c8451a'); grad.addColorStop(1,'#ff7e3d');
  g.fillStyle = grad; g.fillRect(0,0,VW,VH);
  // 星星（上半）
  for(let i=0;i<60;i++){
    const x=Math.random()*VW, y=Math.random()*VH*0.3;
    g.globalAlpha = 0.25+Math.random()*0.5;
    g.fillStyle='#ffd9c0'; g.fillRect(x,y,Math.random()<0.2?2:1,Math.random()<0.2?2:1);
  }
  g.globalAlpha=1;
  // 遠火山剪影兩層（供視差）
  g.fillStyle='#1c0608';
  for(let x=-100;x<VW+200;x+=260){
    const h = 90+((x*7)%60);
    g.beginPath(); g.moveTo(x-140,VH); g.lineTo(x, VH-h-VH*0.42); g.lineTo(x+140,VH); g.closePath(); g.fill();
    // 火山口光
    g.fillStyle='rgba(255,120,40,0.5)';
    g.fillRect(x-10, VH-h-VH*0.42, 20, 4);
    g.fillStyle='#1c0608';
  }
  // 熔岩漸層條（畫熔岩海用）
  lavaGradCv.width = 4; lavaGradCv.height = 256;
  const lg = lavaGradCv.getContext('2d');
  const lgrad = lg.createLinearGradient(0,0,0,256);
  lgrad.addColorStop(0,'#8a1e06'); lgrad.addColorStop(0.3,'#c83a0e');
  lgrad.addColorStop(0.7,'#ff6a1c'); lgrad.addColorStop(1,'#ffb04a');
  lg.fillStyle = lgrad; lg.fillRect(0,0,4,256);
}
function makeGlow(color,size){
  const c=document.createElement('canvas'); c.width=c.height=size;
  const g=c.getContext('2d');
  const grad=g.createRadialGradient(size/2,size/2,1,size/2,size/2,size/2);
  grad.addColorStop(0,color); grad.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=grad; g.fillRect(0,0,size,size);
  return c;
}
const glowFire = makeGlow('rgba(255,170,70,0.65)',64);
const glowCyan = makeGlow('rgba(56,225,255,0.6)',64);

function resize(){
  VW = innerWidth; VH = innerHeight;
  CX = VW/2; CY = VH*0.42; FOV = VH*0.9;
  const dpr = Math.min(devicePixelRatio||1, 2);
  canvas.width = Math.round(VW*dpr); canvas.height = Math.round(VH*dpr);
  canvas.style.width = VW+'px'; canvas.style.height = VH+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  bakeSky();
}
addEventListener('resize', resize); resize();

/* ===================== 音效：Web Audio＋壓縮母線 ===================== */
let AC=null, master=null;
let muted = localStorage.getItem('firerun2_mute')==='1';
function audio(){
  if(!AC){
    AC = new (window.AudioContext||window.webkitAudioContext)();
    const comp = AC.createDynamicsCompressor();
    comp.threshold.value=-18; comp.knee.value=24; comp.ratio.value=6;
    comp.attack.value=0.003; comp.release.value=0.2;
    master = AC.createGain(); master.gain.value=0.9;
    master.connect(comp); comp.connect(AC.destination);
  }
  if(AC.state==='suspended') AC.resume();
  return AC;
}
addEventListener('pointerdown', audio, {once:true});
addEventListener('keydown', audio, {once:true});
function beep(freq=440,dur=0.1,type='square',vol=0.14,slide=0){
  if(muted||!AC) return;
  const f = freq*(0.94+Math.random()*0.12);
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.setValueAtTime(f, AC.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide), AC.currentTime+dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
  o.connect(g).connect(master);
  o.start(); o.stop(AC.currentTime+dur);
}
function noiseBurst(dur=0.3, vol=0.16){
  if(muted||!AC) return;
  const n=Math.floor(AC.sampleRate*dur);
  const buf=AC.createBuffer(1,n,AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
  const src=AC.createBufferSource(); src.buffer=buf;
  const g=AC.createGain(); g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  src.connect(g).connect(master); src.start();
}
const sfx = {
  jump: ()=>beep(220,0.14,'square',0.12,380),
  land: ()=>beep(120,0.07,'triangle',0.1),
  step: ()=>beep(300,0.03,'square',0.028),
  bounce: ()=>{ beep(330,0.16,'square',0.14,520); setTimeout(()=>beep(660,0.1,'square',0.1,300),60); },
  crumble: ()=>{ noiseBurst(0.18,0.08); beep(160,0.12,'sawtooth',0.06,-60); },
  checkpoint: ()=>{ beep(988,0.08,'square',0.13); setTimeout(()=>beep(1319,0.15,'square',0.13),80); },
  death: ()=>{ beep(220,0.28,'sawtooth',0.18,-160); noiseBurst(0.35,0.16); },
  win: ()=>{ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.2,'square',0.14),i*110)); },
  star: n=>beep(784+n*180,0.18,'square',0.14,120),
};
const muteBtn = document.getElementById('muteBtn');
function renderMute(){
  document.getElementById('wave1').style.visibility = muted?'hidden':'visible';
  document.getElementById('wave2').style.visibility = muted?'hidden':'visible';
  document.getElementById('muteX').style.visibility = muted?'visible':'hidden';
}
muteBtn.addEventListener('click', ()=>{ muted=!muted; localStorage.setItem('firerun2_mute',muted?'1':'0'); renderMute(); });
renderMute();

/* ===================== 輸入 ===================== */
const input = { jumpBuffer:0, jumpHeld:false };
const KEYS = {};
addEventListener('keydown', e=>{
  if(['KeyW','KeyA','KeyS','KeyD','Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  const was = KEYS[e.code];
  KEYS[e.code]=true;
  if(e.code==='Space' && !was){ input.jumpBuffer=0.14; input.jumpHeld=true; }
  if(e.code==='KeyM'){ muteBtn.click(); }
  if(e.code==='Enter' && gameState==='title') startGame(pickedLevel);
});
addEventListener('keyup', e=>{ KEYS[e.code]=false; if(e.code==='Space') input.jumpHeld=false; });
function readKeyboardAxes(){
  let mx=0,mz=0;
  if(KEYS.KeyA||KEYS.ArrowLeft) mx-=1;
  if(KEYS.KeyD||KEYS.ArrowRight) mx+=1;
  if(KEYS.KeyW||KEYS.ArrowUp) mz+=1;
  if(KEYS.KeyS||KEYS.ArrowDown) mz-=1;
  return {mx,mz};
}
/* 虛擬搖桿 */
const joyZone=document.getElementById('joyZone'), joyStick=document.getElementById('joyStick');
let joyVec={x:0,y:0}, joyTouchId=null;
function joyFromEvent(t){
  const r=joyZone.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  let dx=t.clientX-cx, dy=t.clientY-cy;
  const max=r.width/2, len=Math.hypot(dx,dy), dead=7;
  if(len<dead){ joyVec.x=0; joyVec.y=0; joyStick.style.transform='translate(0,0)'; return; }
  if(len>max){ dx=dx/len*max; dy=dy/len*max; }
  joyVec.x=dx/max; joyVec.y=dy/max;
  joyStick.style.transform=`translate(${dx}px,${dy}px)`;
}
function resetJoy(){ joyVec.x=0; joyVec.y=0; joyStick.style.transform='translate(0,0)'; joyTouchId=null; joyZone.classList.remove('active'); }
joyZone.addEventListener('touchstart', e=>{
  e.preventDefault(); joyZone.classList.add('active');
  const t=e.changedTouches[0]; joyTouchId=t.identifier; joyFromEvent(t);
},{passive:false});
joyZone.addEventListener('touchmove', e=>{
  e.preventDefault();
  for(const t of e.changedTouches) if(t.identifier===joyTouchId) joyFromEvent(t);
},{passive:false});
joyZone.addEventListener('touchend', e=>{ e.preventDefault(); resetJoy(); },{passive:false});
joyZone.addEventListener('touchcancel', e=>{ e.preventDefault(); resetJoy(); },{passive:false});
/* 跳躍鈕 */
const jumpBtn=document.getElementById('jumpBtn');
function pressJump(){ input.jumpBuffer=0.14; input.jumpHeld=true; audio(); }
function releaseJump(){ input.jumpHeld=false; }
jumpBtn.addEventListener('touchstart', e=>{ e.preventDefault(); pressJump(); },{passive:false});
jumpBtn.addEventListener('touchend', e=>{ e.preventDefault(); releaseJump(); },{passive:false});
jumpBtn.addEventListener('touchcancel', e=>{ e.preventDefault(); releaseJump(); },{passive:false});
jumpBtn.addEventListener('mousedown', e=>{ e.preventDefault(); pressJump(); });
addEventListener('mouseup', releaseJump);

/* ===================== 3D 投影 ===================== */
const TILT = 0.30;
const cosA = Math.cos(TILT), sinA = Math.sin(TILT);
const cam = { x:0, y:170, z:-320 };
function project(x,y,z){
  const dx=x-cam.x, dy=y-cam.y, dz=z-cam.z;
  const ry = dy*cosA + dz*sinA;
  const rz = dz*cosA - dy*sinA;
  if(rz < 14) return null;
  const s = FOV/rz;
  return { x:CX+dx*s, y:CY-ry*s, s };
}
function camDepth(y,z){ return (z-cam.z)*cosA - (y-cam.y)*sinA; }
function quad(a,b,c,d,color){
  if(!a||!b||!c||!d) return false;
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.lineTo(d.x,d.y);
  ctx.closePath(); ctx.fill();
  return true;
}
function quadStroke(a,b,c,d,color,w){
  if(!a||!b||!c||!d) return;
  ctx.strokeStyle=color; ctx.lineWidth=w;
  ctx.beginPath();
  ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.lineTo(d.x,d.y);
  ctx.closePath(); ctx.stroke();
}
/* 立體盒：每面獨立受光（頂最亮、面向鏡頭正面中亮、側面暗）＋熔岩底光 */
function drawBox3D(x,y,z,hw,h,hd,pal,lavaGlow){
  const tFL=project(x-hw,y,z-hd), tFR=project(x+hw,y,z-hd),
        tBL=project(x-hw,y,z+hd), tBR=project(x+hw,y,z+hd),
        bFL=project(x-hw,y-h,z-hd), bFR=project(x+hw,y-h,z-hd),
        bBL=project(x-hw,y-h,z+hd), bBR=project(x+hw,y-h,z+hd);
  // 側面（只畫看得到的那側）
  if(cam.x < x-hw) quad(tFL,tBL,bBL,bFL,pal.sideDark);
  else if(cam.x > x+hw) quad(tFR,tBR,bBR,bFR,pal.side);
  // 正面
  if(quad(tFL,tFR,bFR,bFL,pal.front)){
    // AO 暗帶（下半）
    if(bFL&&bFR&&tFL&&tFR){
      const mFL={x:tFL.x+(bFL.x-tFL.x)*0.55, y:tFL.y+(bFL.y-tFL.y)*0.55};
      const mFR={x:tFR.x+(bFR.x-tFR.x)*0.55, y:tFR.y+(bFR.y-tFR.y)*0.55};
      quad(mFL,mFR,bFR,bFL,'rgba(10,4,2,0.35)');
      if(lavaGlow>0){
        const gFL={x:tFL.x+(bFL.x-tFL.x)*0.78, y:tFL.y+(bFL.y-tFL.y)*0.78};
        const gFR={x:tFR.x+(bFR.x-tFR.x)*0.78, y:tFR.y+(bFR.y-tFR.y)*0.78};
        quad(gFL,gFR,bFR,bFL,'rgba(255,110,30,'+(0.32*lavaGlow).toFixed(2)+')');
      }
    }
  }
  // 頂面
  quad(tFL,tFR,tBR,tBL,pal.top);
  quadStroke(tFL,tFR,tBR,tBL,pal.edge,1.5);
  return {tFL,tFR,tBL,tBR};
}

/* ===================== 關卡資料 ===================== */
const THEMES = [
  { top:'#7a5638', front:'#5a3a22', side:'#4a2e1a', sideDark:'#38200f', edge:'rgba(255,200,140,0.4)' },

function makeBuilder(segs){
  return function(){
    const plats=[]; let z=0, y=0;
    function add(x,dy,gap,hw,hd,opts={}){
      z += gap; y += dy;
      plats.push(Object.assign({x,y,z,w:hw,d:hd,type:'normal',phase:Math.random()*6.28},opts));
    }
    add(0,0,0,150,150,{checkpoint:true,start:true});
    for(const s of segs) add(...s);
    plats.push({x:0,y:y+8,z:z+300,w:220,d:220,type:'goal',phase:0});
    return plats;
  };
}

const LAVA_Y = -80;
const GRAVITY=1660, GRAVITY_FALL=GRAVITY*1.6, MAX_FALL=950, JUMP_V=640;
const MOVE_ACCEL=2600, MOVE_DECEL=3200, MAX_SPEED=310, AIR_MULT=0.65, COYOTE_MAX=0.09;
let curLevel=0, pickedLevel=0;
let platforms=[], GOAL_Z=1, lavaBlobs=[];
let gameState='title'; // title | playing | dead | win
let elapsed=0, shake=0, hintT=0, checkpointIdx=0, deaths=0;

  sx:1,sy:1, animT:0, running:false, faceT:0,
  respawn:{x:0,y:40,z:0},
};

function buildLevel(i){
  platforms = LEVELS[i].builder();
  GOAL_Z = platforms[platforms.length-1].z;
  lavaBlobs = [];
  for(let k=0;k<26;k++){
    lavaBlobs.push({ x:(Math.random()*2-1)*900, z:Math.random()*GOAL_Z*1.1, r:24+Math.random()*46, ph:Math.random()*6.28 });
  }
}
function resetCrumbles(){
  for(const p of platforms) if(p.type==='crumble'){ p.crumbleT=0; p.crumbling=false; p.gone=false; }
}
function resetToRespawn(){
  player.x=player.respawn.x; player.y=player.respawn.y; player.z=player.respawn.z;
  player.vx=player.vy=player.vz=0;
  player.grounded=false; player.coyote=0;
  resetCrumbles();
}
function startGame(i){
  curLevel=i; pickedLevel=i;
  buildLevel(i);
  checkpointIdx=0; deaths=0;
  player.respawn={x:platforms[0].x, y:platforms[0].y+40, z:platforms[0].z};
  resetToRespawn();
  cam.x=player.x; cam.y=player.y+180; cam.z=player.z-340;
  elapsed=0; hintT=0; shake=0;
  parts3.length=0;
  document.getElementById('titleScreen').classList.add('hidden');
  document.getElementById('winScreen').classList.add('hidden');
  document.getElementById('lvTxt').textContent = LEVELS[i].name;
  document.body.classList.add('playing');
  gameState='playing';
}
function die(){
  if(gameState!=='playing') return;
  gameState='dead';
  deaths++;
  sfx.death();
  shake=14;
  spawnParts3(player.x, Math.max(player.y,LAVA_Y+16), player.z, '#ff3d1c', 26, 300, 0.7, 8);
  spawnParts3(player.x, Math.max(player.y,LAVA_Y+16), player.z, '#ffcf5c', 14, 220, 0.6, 6);
  const df=document.getElementById('deathFlash');
  df.style.opacity='0.5';
  setTimeout(()=>{ df.style.opacity='0'; },120);
  setTimeout(()=>{ if(gameState==='dead'){ resetToRespawn(); gameState='playing'; } },380);
}
function winGame(){
  if(gameState!=='playing') return;
  gameState='win';
  sfx.win();
  spawnParts3(player.x, player.y+50, player.z, '#38e1ff', 40, 320, 1, 7);
  spawnParts3(player.x, player.y+70, player.z, '#ffcf5c', 30, 280, 1, 6);
  const t=elapsed, S=LEVELS[curLevel].starT;
  const earned = t<=S[2]?3 : t<=S[1]?2 : 1;
  if(earned>stars[curLevel]){ stars[curLevel]=earned; localStorage.setItem('firerun2_stars',JSON.stringify(stars)); }
  if(!bests[curLevel] || t<bests[curLevel]){ bests[curLevel]=Math.round(t*10)/10; localStorage.setItem('firerun2_bests',JSON.stringify(bests)); }
  document.getElementById('winTime').textContent=t.toFixed(1);
  document.getElementById('star3Req').textContent=S[2];
  document.getElementById('bestTime').textContent=bests[curLevel].toFixed(1);
  const ws=document.getElementById('winStars');
  ws.textContent='';
  for(let k=1;k<=earned;k++) setTimeout(()=>{ ws.textContent='★'.repeat(k)+'☆'.repeat(3-k); sfx.star(k); },500+k*380);
  setTimeout(()=>{ ws.textContent='★'.repeat(earned)+'☆'.repeat(3-earned); },500);
  document.getElementById('nextBtn').style.display = (curLevel<LEVELS.length-1) ? '' : 'none';
  document.body.classList.remove('playing');
  setTimeout(()=>{ document.getElementById('winScreen').classList.remove('hidden'); renderLvGrid(); },550);
}

/* ===================== 物理 ===================== */
function platAABB(p,t){
  let px=p.x, py=p.y, pz=p.z;
  if(p.type==='moving' && p.move){
    const off=Math.sin(t*p.move.speed+p.phase)*p.move.range;
    if(p.move.axis==='x') px+=off; else if(p.move.axis==='y') py+=off; else pz+=off;
  }
  return {x:px,y:py,z:pz,w:p.w,d:p.d};
}
function updatePhysics(dt,t){
  let mx=0,mz=0;
  const kb=readKeyboardAxes();
  mx=kb.mx; mz=kb.mz;
  if(joyVec.x||joyVec.y){ mx=joyVec.x; mz=-joyVec.y; }
  const len=Math.hypot(mx,mz);
  if(len>1){ mx/=len; mz/=len; }
  const accel=(player.grounded?MOVE_ACCEL:MOVE_ACCEL*AIR_MULT);
  const decel=(player.grounded?MOVE_DECEL:MOVE_DECEL*AIR_MULT);
  function approach(cur,target){
    const rate=Math.abs(target)>0.01?accel:decel;
    const diff=target-cur, step=rate*dt;
    return Math.abs(diff)<=step ? target : cur+Math.sign(diff)*step;
  }
  player.vx=approach(player.vx, mx*MAX_SPEED);
  player.vz=approach(player.vz, mz*MAX_SPEED);
  player.running=(Math.abs(player.vx)+Math.abs(player.vz))>10;

  if(player.grounded) player.coyote=COYOTE_MAX;
  else player.coyote=Math.max(0,player.coyote-dt);

  if(input.jumpBuffer>0 && player.coyote>0){
    player.vy=JUMP_V; player.bounceLock=false;
    player.grounded=false; player.coyote=0; input.jumpBuffer=0;
    sfx.jump();
    player.sy=1.35; player.sx=0.72;
    spawnParts3(player.x, player.y+4, player.z, '#ffcf5c', 8, 150, 0.35, 5);
  }
  input.jumpBuffer=Math.max(0,input.jumpBuffer-dt);
  if(!input.jumpHeld && player.vy>0 && !player.bounceLock) player.vy*= (1-6*dt);   // 可變跳高（彈跳墊不剪）
  if(player.vy<=0) player.bounceLock=false;

  // 頂點懸浮 + 上慢下快
  let g = player.vy>0?GRAVITY:GRAVITY_FALL;
  if(Math.abs(player.vy)<40) g*=0.5;
  player.vy=Math.max(-MAX_FALL, player.vy-g*dt);

  // 站在移動平台上：跟著走
  if(player.grounded && player.groundPlat && player.groundPlat.type==='moving'){
    const p=player.groundPlat, m=p.move;
    const now=Math.sin(t*m.speed+p.phase)*m.range;
    const prev=Math.sin((t-dt)*m.speed+p.phase)*m.range;
    if(m.axis==='x') player.x+=now-prev;
    else if(m.axis==='y') player.y+=now-prev;
  }

  player.x+=player.vx*dt;
  player.z+=player.vz*dt;
  const prevY=player.y;
  player.y+=player.vy*dt;

  let landed=false, landedPlat=null;
  for(const p of platforms){
    if(p.gone) continue;
    const box=platAABB(p,t);
    const hw=box.w*1.1, hd=box.d*1.1;      // 寬容判定
    if(Math.abs(player.x-box.x)<hw && Math.abs(player.z-box.z)<hd){
      // 寬容落地：差一點點高度（≤10px）也自動吸上平台（角落修正）
      if(player.vy<=0 && prevY>=box.y-10 && player.y<=box.y){
        player.y=box.y; player.vy=0;
        landed=true; landedPlat=p;
        break;
      }
    }
  }
  const was=player.grounded;
  player.grounded=landed;
  if(landed){
    player.groundPlat=landedPlat;
    if(!was){
      sfx.land();
      player.sy=0.65; player.sx=1.3;
      spawnParts3(player.x, player.y+2, player.z, '#c89060', 6, 110, 0.3, 5);
      shake=Math.min(shake+1.5,4);
    }
    if(landedPlat.type==='bounce'){
      player.vy=JUMP_V*1.42; player.grounded=false; player.bounceLock=true;
      landedPlat.pressT=0.25;
      sfx.bounce();
      player.sy=1.5; player.sx=0.6;
      spawnParts3(player.x, player.y+4, player.z, '#ff6cc7', 16, 220, 0.5, 6);
      shake=Math.min(shake+3,7);
    }
    if(landedPlat.checkpoint){
      const idx=platforms.indexOf(landedPlat);
      if(idx>checkpointIdx){
        checkpointIdx=idx;
        player.respawn={x:landedPlat.x,y:landedPlat.y+40,z:landedPlat.z};
        sfx.checkpoint();
        spawnParts3(landedPlat.x, landedPlat.y+30, landedPlat.z, '#38e1ff', 14, 180, 0.6, 6);
      }
    }
    if(landedPlat.type==='crumble' && !landedPlat.crumbling){
      landedPlat.crumbling=true; landedPlat.crumbleT=0;
      sfx.crumble();
    }
    if(landedPlat.type==='goal') winGame();
  }
  // 崩塌計時
  for(const p of platforms){
    if(p.type==='crumble' && p.crumbling && !p.gone){
      p.crumbleT+=dt;
      if(p.crumbleT>0.55){
        p.gone=true;
        spawnParts3(p.x,p.y-10,p.z,'#8a7a5c',12,160,0.5,7);
      }
    }
    if(p.pressT>0) p.pressT-=dt;
  }
  if(player.y<LAVA_Y+8){ die(); return; }

  player.sx+=(1-player.sx)*10*dt;
  player.sy+=(1-player.sy)*10*dt;

  if(player.running && player.grounded){
    player.animT+=dt;
    if(player.animT>0.15){
      player.animT=0;
      sfx.step();
      spawnParts3(player.x, player.y+2, player.z, '#ff7e3d', 2, 70, 0.3, 4);
    }
  }
  if(!player.grounded && Math.random()<0.5){
    spawnParts3(player.x, player.y+14, player.z, Math.random()<0.5?'#ffcf5c':'#ff5c1c', 1, 40, 0.4, 5);
  }
}

/* ===================== 3D 粒子（swap-pop） ===================== */
const parts3=[];
function spawnParts3(x,y,z,color,n,speed,life,size){
  for(let i=0;i<n;i++){
    if(parts3.length>=280) return;
    const a=Math.random()*Math.PI*2, s=speed*(0.3+Math.random()*0.7);
    parts3.push({x,y,z,vx:Math.cos(a)*s,vy:Math.abs(Math.sin(a))*s*0.8+60,vz:Math.sin(a+1.3)*s*0.5,
      life:life*(0.6+Math.random()*0.7), maxLife:life, color, size});
  }
}
function updateParts3(dt){
  for(let i=parts3.length-1;i>=0;i--){
    const p=parts3[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.z+=p.vz*dt; p.vy-=520*dt; p.life-=dt;
    if(p.life<=0){ parts3[i]=parts3[parts3.length-1]; parts3.pop(); }
  }
}
/* 環境餘燼（螢幕空間） */
const embers=[];
function updateEmbers(dt){
  if(embers.length<40 && Math.random()<0.3)
    embers.push({x:Math.random()*VW, y:VH+10, vy:-(24+Math.random()*40), sway:Math.random()*6.28, sz:2+Math.random()*3, life:6});
  for(let i=embers.length-1;i>=0;i--){
    const e=embers[i];
    e.y+=e.vy*dt; e.sway+=dt*1.6; e.x+=Math.sin(e.sway)*14*dt; e.life-=dt;
    if(e.y<-12||e.life<=0){ embers[i]=embers[embers.length-1]; embers.pop(); }
  }
}

/* ===================== 火焰小人（多部件盒體） ===================== */
const PAL_BODY = { top:'#ffe9a0', front:'#ffb43c', side:'#e08a1e', sideDark:'#b86a12', edge:'rgba(255,240,190,0.5)' };
const PAL_LEG  = { top:'#ff9d3c', front:'#e05c1c', side:'#b8460e', sideDark:'#8a3408', edge:'rgba(255,180,120,0.4)' };
function drawPlayer(t){
  const px=player.x, py=player.y, pz=player.z;
  // 影子：找腳下最近平台
  let shY=null;
  for(const p of platforms){
    if(p.gone) continue;
    const b=platAABB(p,t);
    if(Math.abs(px-b.x)<b.w && Math.abs(pz-b.z)<b.d && b.y<=py+2){
      if(shY===null || b.y>shY) shY=b.y;
    }
  }
  if(shY!==null){
    const sp=project(px,shY+1,pz);
    if(sp){
      const r=Math.max(3, 24*sp.s*(1-Math.min(1,(py-shY)/260)));
      ctx.globalAlpha=0.35;
      ctx.fillStyle='#000';
      ctx.beginPath(); ctx.ellipse(sp.x,sp.y,r,r*0.42,0,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    }
  }
  const swing = player.running&&player.grounded ? Math.sin(performance.now()/85)*10 : (player.grounded?0:6);
  const sy=player.sy, sx=player.sx;
  const bob = player.grounded&&player.running ? Math.abs(Math.sin(performance.now()/85))*3 : 0;
  // 腿（前後擺動）
  drawBox3D(px-6*sx, py+16*sy+bob, pz+swing*0.7, 4.5, 16*sy, 4.5, PAL_LEG, 0);
  drawBox3D(px+6*sx, py+16*sy+bob, pz-swing*0.7, 4.5, 16*sy, 4.5, PAL_LEG, 0);
  // 身體
  drawBox3D(px, py+38*sy+bob, pz, 10*sx, 22*sy, 7, PAL_BODY, 0);
  // 手臂
  drawBox3D(px-14*sx, py+34*sy+bob, pz-swing*0.6, 3.5, 14*sy, 3.5, PAL_LEG, 0);
  drawBox3D(px+14*sx, py+34*sy+bob, pz+swing*0.6, 3.5, 14*sy, 3.5, PAL_LEG, 0);
  // 頭
  drawBox3D(px, py+54*sy+bob, pz, 8*sx, 15*sy, 8, PAL_BODY, 0);
  // 臉（畫在頭正面）
  const face=project(px, py+47*sy+bob, pz-8.2);
  if(face){
    const s=face.s;
    ctx.fillStyle='#3a1a06';
    ctx.beginPath(); ctx.arc(face.x-4.5*s*10/8, face.y-2*s, 1.6*s, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(face.x+4.5*s*10/8, face.y-2*s, 1.6*s, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='#3a1a06'; ctx.lineWidth=Math.max(1,1.2*s);
    ctx.beginPath(); ctx.arc(face.x, face.y+2.5*s, 2.6*s, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();
  }
  // 火焰頭髮（螢幕空間三角形＋光暈）
  const hp=project(px, py+62*sy+bob, pz);
  if(hp){
    const s=hp.s, fl=Math.sin(performance.now()/90);
    ctx.drawImage(glowFire, hp.x-30*s, hp.y-34*s, 60*s, 60*s);
    const flame=(ox,h,w,color)=>{
      ctx.fillStyle=color;
      ctx.beginPath();
      ctx.moveTo(hp.x+(ox-w)*s, hp.y);
      ctx.quadraticCurveTo(hp.x+(ox-w*0.4)*s, hp.y-h*0.55*s, hp.x+(ox+fl*3)*s, hp.y-h*s);
      ctx.quadraticCurveTo(hp.x+(ox+w*0.4)*s, hp.y-h*0.55*s, hp.x+(ox+w)*s, hp.y);
      ctx.closePath(); ctx.fill();
    };
    flame(-6, 18+fl*2, 6, '#ff7e3d');
    flame(6, 16-fl*2, 6, '#ff9d3c');
    flame(0, 26+fl*3, 7, '#ffcf5c');
    flame(0, 14+fl*2, 4, '#fff3c9');
  }
}

/* ===================== 場景繪製 ===================== */
function drawLava(t){
  const horizonY = CY - FOV*Math.tan(TILT) + (cam.y-170)*0.0;
  // 天空（視差：依 cam.x 輕移）
  const par = (cam.x*0.06)%VW;
  ctx.drawImage(skyCv, -par, 0);
  if(par>0) ctx.drawImage(skyCv, VW-par, 0);
  else ctx.drawImage(skyCv, -VW-par, 0);
  // 熔岩海
  const hy = Math.max(40, horizonY);
  ctx.drawImage(lavaGradCv, 0, hy, VW, VH-hy);
  // 熔岩亮斑（投影在 y=LAVA_Y 平面）
  for(const b of lavaBlobs){
    const dz=camDepth(LAVA_Y, b.z);
    if(dz<30 || dz>2600) continue;
    const p=project(b.x, LAVA_Y, b.z);
    if(!p) continue;
    const pulse=0.75+0.25*Math.sin(t*2+b.ph);
    const r=b.r*p.s*8;
    ctx.globalAlpha=0.5*pulse*Math.min(1,(2600-dz)/700);
    ctx.drawImage(glowFire, p.x-r, p.y-r*0.4, r*2, r*0.8);
    ctx.globalAlpha=1;
  }
  // 熔岩面波光線
  ctx.globalAlpha=0.22;
  ctx.strokeStyle='#ffd98e'; ctx.lineWidth=1.5;
  for(let i=0;i<4;i++){
    const zz=cam.z+300+i*380+ (t*40)%380;
    const a=project(cam.x-800,LAVA_Y,zz), b2=project(cam.x+800,LAVA_Y,zz);
    if(a&&b2){ ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b2.x,b2.y); ctx.stroke(); }
  }
  ctx.globalAlpha=1;
}
function drawFlag(x,y,z,active,big){
  const h=big?120:66;
  drawBox3D(x, y+h, z, big?3:2, h, big?3:2, {top:'#eee',front:'#cfd6e0',side:'#aab4c4',sideDark:'#8a94a4',edge:'rgba(255,255,255,0.4)'},0);
  const a=project(x,y+h,z), b=project(x,y+h-(big?34:22),z);
  if(a&&b){
    const w=(big?52:30)*a.s, flap=Math.sin(performance.now()/200+x)*4*a.s;
    ctx.fillStyle = active ? '#ffcf5c' : (big?'#38e1ff':'#8a94a4');
    ctx.beginPath();
    ctx.moveTo(a.x,a.y); ctx.lineTo(a.x+w, (a.y+b.y)/2+flap); ctx.lineTo(b.x,b.y);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1; ctx.stroke();
  }
}
function drawPlatform(p,t){
  const b=platAABB(p,t);
  const dz=camDepth(b.y,b.z);
  if(dz<16 || dz>3000) return;
  let pal = p.type==='moving'?PAL_MOVE : p.type==='crumble'?PAL_CRUMB : p.type==='bounce'?PAL_BOUNCE : p.type==='goal'?PAL_GOAL : THEMES[curLevel];
  let h=30;
  let yy=b.y;
  if(p.type==='crumble' && p.crumbling){
    const k=p.crumbleT/0.55;
    yy -= Math.sin(k*40)*2.5;   // 顫抖
    ctx.globalAlpha = 1-k*0.5;
  }
  if(p.type==='bounce' && p.pressT>0) h = 30-10*(p.pressT/0.25);
  const q = drawBox3D(b.x, yy, b.z, b.w, h, b.d, pal, Math.max(0, 1-(b.y-LAVA_Y)/380));
  ctx.globalAlpha=1;
  // 頂面裝飾
  if(q && q.tFL && q.tBR){
    if(p.type==='crumble'){
      const c1=project(b.x-b.w*0.4, yy, b.z), c2=project(b.x+b.w*0.3, yy, b.z-b.d*0.4), c3=project(b.x, yy, b.z+b.d*0.4);
      if(c1&&c2&&c3){
        ctx.strokeStyle='rgba(40,30,16,0.65)'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.moveTo(c1.x,c1.y); ctx.lineTo(c2.x,c2.y); ctx.lineTo(c3.x,c3.y); ctx.stroke();
      }
    } else if(p.type==='bounce'){
      const c=project(b.x, yy, b.z);
      if(c){
        ctx.strokeStyle='rgba(255,255,255,0.75)'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.ellipse(c.x, c.y, b.w*0.55*c.s, b.d*0.24*c.s, 0, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.ellipse(c.x, c.y, b.w*0.3*c.s, b.d*0.13*c.s, 0, 0, Math.PI*2); ctx.stroke();
      }
    } else if(p.type==='goal'){
      const c=project(b.x, yy, b.z);
      if(c){
        const r=b.w*1.4*c.s;
        ctx.drawImage(glowCyan, c.x-r, c.y-r*0.4, r*2, r*0.8);
      }
    }
  }
  if(p.checkpoint && !p.start){
    drawFlag(b.x-b.w*0.7, b.y, b.z+b.d*0.6, platforms.indexOf(p)<=checkpointIdx, false);
  }
  if(p.type==='goal') drawFlag(b.x, b.y, b.z+30, false, true);
}
function render(dt,t){
  // 相機緩動追隨
  const k = 1-Math.pow(0.001,dt);
  cam.x += (player.x*0.7 - cam.x)*k;
  cam.y += (player.y+180 - cam.y)*k;
  cam.z += (player.z-340 - cam.z)*k;
  let shx=0, shy=0;
  if(shake>0){
    shake*=Math.pow(0.001,dt);
    if(shake<0.1) shake=0;
    shx=(Math.random()*2-1)*shake; shy=(Math.random()*2-1)*shake;
  }
  ctx.save();
  ctx.translate(shx,shy);
  drawLava(t);
  // 深度排序：平台＋玩家＋粒子
  const items=[];
  for(const p of platforms){
    if(p.gone) continue;
    const b=platAABB(p,t);
    items.push({d:camDepth(b.y,b.z), kind:'p', p});
  }
  items.push({d:camDepth(player.y,player.z)-1, kind:'me'});
  items.sort((a,b)=>b.d-a.d);
  for(const it of items){
    if(it.kind==='p') drawPlatform(it.p,t);
    else if(gameState!=='dead') drawPlayer(t);
  }
  // 3D 粒子
  for(const p of parts3){
    const s=project(p.x,p.y,p.z);
    if(!s) continue;
    ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
    ctx.fillStyle=p.color;
    const sz=Math.max(1.5, p.size*s.s*1.5);
    ctx.fillRect(s.x-sz/2, s.y-sz/2, sz, sz);
  }
  ctx.globalAlpha=1;
  // 餘燼
  for(const e of embers){
    ctx.globalAlpha=Math.min(0.8, e.life/3);
    ctx.fillStyle='#ffb04a';
    ctx.fillRect(e.x, e.y, e.sz, e.sz);
  }
  ctx.globalAlpha=1;
  ctx.restore();

  // 開場提示浮層
  if(gameState==='playing' && hintT<5.5 && curLevel===0){
    const a = hintT<4.5?1:(5.5-hintT);
    ctx.globalAlpha=a*(0.8+0.2*Math.sin(performance.now()/220));
    ctx.fillStyle='rgba(7,11,20,0.72)';
    const bw=Math.min(520,VW-30);
    ctx.beginPath(); ctx.roundRect(CX-bw/2, VH*0.68, bw, 62, 14); ctx.fill();
    ctx.strokeStyle='#ffcf5c'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(CX-bw/2, VH*0.68, bw, 62, 14); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='bold 17px sans-serif'; ctx.textAlign='center';
    ctx.fillText('往前走、跳到下一個平台，抵達終點旗！', CX, VH*0.68+26);
    ctx.font='14px sans-serif'; ctx.fillStyle='#ffd98e';
    ctx.fillText('搖桿／WASD 移動・跳躍鈕／空白鍵 跳', CX, VH*0.68+48);
    ctx.globalAlpha=1;
  }
  // HUD 數值
  if(gameState==='playing'){
    elapsed+=dt; hintT+=dt;
    const prog=Math.max(0,Math.min(100,(player.z/GOAL_Z)*100));
    const pTxt=prog.toFixed(0)+'%';
    if(hudCache.p!==pTxt){ hudCache.p=pTxt; document.getElementById('progressTxt').textContent=pTxt; }
    const tTxt=elapsed.toFixed(1);
    if(hudCache.t!==tTxt){ hudCache.t=tTxt; document.getElementById('timeTxt').textContent=tTxt; }
  }
}
const hudCache={p:'',t:''};

/* ===================== 標題／選關 UI ===================== */
const lvGrid=document.getElementById('lvGrid');
function renderLvGrid(){
  lvGrid.innerHTML='';
  LEVELS.forEach((L,i)=>{
    const b=document.createElement('button');
    const open=unlockedLv(i);
    b.className='lvbtn'+(open?'':' locked');
    b.innerHTML = open
      ? `<div>第${i+1}關</div><small>${L.name.split(' ')[1]}</small><div class="stars">${'★'.repeat(stars[i])||'☆☆☆'}</div>`
      : `<div>第${i+1}關</div><small>鎖定中</small><svg width="16" height="16" viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="2.5" fill="#5a6a85"/><path d="M8 10V7a4 4 0 018 0v3" stroke="#5a6a85" stroke-width="2.4" fill="none"/></svg>`;
    if(open) b.addEventListener('click', ()=>{ audio(); startGame(i); });
    else b.addEventListener('click', ()=>beep(150,0.09,'sawtooth',0.1,-40));
    lvGrid.appendChild(b);
  });
  // 開始遊戲＝最新解鎖關
  pickedLevel=0;
  for(let i=LEVELS.length-1;i>=0;i--) if(unlockedLv(i)){ pickedLevel=i; break; }
  document.getElementById('startBtn').textContent = '開始遊戲（'+LEVELS[pickedLevel].name.split(' ')[0]+'）';
}
document.getElementById('startBtn').addEventListener('click', ()=>{ audio(); startGame(pickedLevel); });
document.getElementById('againBtn').addEventListener('click', ()=>{ audio(); startGame(curLevel); });
document.getElementById('nextBtn').addEventListener('click', ()=>{
  audio();
  if(curLevel<LEVELS.length-1 && unlockedLv(curLevel+1)) startGame(curLevel+1);
});
document.getElementById('selectBtn').addEventListener('click', ()=>{
  document.getElementById('winScreen').classList.add('hidden');
  document.getElementById('titleScreen').classList.remove('hidden');
  document.body.classList.remove('playing');
  gameState='title';
  renderLvGrid();
});
renderLvGrid();
buildLevel(0);

/* ===================== 主迴圈 ===================== */
const STEP=1/60;
let last=performance.now(), acc=0;
function frame(now){
  requestAnimationFrame(frame);
  acc+=Math.min((now-last)/1000, 0.1);
  last=now;
  const t=now/1000;
  while(acc>=STEP){
    if(gameState==='playing') updatePhysics(STEP,t);
    updateParts3(STEP);
    updateEmbers(STEP);
    acc-=STEP;
  }
  render(STEP,t);
}
requestAnimationFrame(frame);

/* 測試掛鉤 */
window.__dbg = () => ({
  state: gameState, level: curLevel, elapsed: Math.round(elapsed*10)/10,
  x: Math.round(player.x), y: Math.round(player.y), z: Math.round(player.z),
  vy: Math.round(player.vy), grounded: player.grounded,
  checkpoint: checkpointIdx, deaths, stars: stars.slice(), muted
});
window.__forceWin = () => { if(gameState==='playing') winGame(); };
window.__teleport = (x,y,z) => { player.x=x; player.y=y; player.z=z; player.vx=player.vy=player.vz=0; };
window.__goal = () => { const g=platforms[platforms.length-1]; return { z:g.z, y:g.y }; };
</script>
