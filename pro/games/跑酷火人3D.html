<!doctype html>
<!-- 專業AI升級 v7：新增3關（共8關，含「明滅平臺」新機關）、金幣與加速火焰道具、每關1枚隱藏彩蛋（全收集解鎖標題畫面隱藏徽章與訊息）、後期關卡加快平臺速度與縮小容錯提升難度 -->
<!-- v6：平臺岩石紋理貼圖、熔岩結殼雙層視差＋隨機噴發、雙層火山剪影視差、火山灰雲與地平線輝光、vignette、終點光柱、腳下火光映地；音效新增程序化殘響(ConvolverNode)、火山隆隆環境音層(含ducking)、熔岩泡泡音 -->
<!-- v5：SVG圖示、浮動式虛擬搖桿、hit-stop手感、直向提示、檢查點浮字、角色多部件精細化、大螢幕提醒浮層 -->
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="author" content="AI未來創作營隊">
<title>跑酷火人3D</title>
<style>
  :root{
    --brand-cyan:#38e1ff; --brand-blue:#4f7cff; --brand-purple:#9a6bff; --brand-pink:#ff6cc7;
    --gold1:#ffcf5c; --gold2:#ffa72e; --gold3:#ff7e3d; --bg-dark:#070b14;
  }
  html,body{margin:0;height:100%;background:var(--bg-dark);overflow:hidden;touch-action:none;overscroll-behavior:none;
    -webkit-user-select:none;user-select:none;font-family:"PingFang TC","Microsoft JhengHei",sans-serif}
  #game{position:absolute;inset:0;display:block;touch-action:none}
  #hud{position:absolute;inset:0;pointer-events:none}
  .hud-top{position:absolute;top:max(10px,env(safe-area-inset-top));left:0;right:0;
    display:flex;justify-content:space-between;align-items:flex-start;padding:0 12px;gap:8px}
  .pill{background:rgba(7,11,20,.66);border:1px solid rgba(56,225,255,.35);border-radius:14px;
    padding:9px 14px;color:#eaf6ff;font-size:15px;font-weight:700;box-shadow:0 2px 10px rgba(0,0,0,.35)}
  .pill b{background:linear-gradient(92deg,var(--brand-cyan),var(--brand-blue),var(--brand-purple));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  #muteBtn{pointer-events:auto;cursor:pointer;width:48px;height:48px;border-radius:14px;
    background:rgba(7,11,20,.66);border:1px solid rgba(56,225,255,.4);
    display:flex;align-items:center;justify-content:center}
  #muteBtn svg{width:26px;height:26px}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;color:#eaf6ff;background:rgba(7,11,20,.78);pointer-events:auto;gap:13px;padding:16px;box-sizing:border-box;overflow:auto}
  .screen.hidden{display:none}
  .title-logo{font-size:clamp(30px,7vw,52px);font-weight:900;letter-spacing:2px;
    background:linear-gradient(92deg,var(--gold1),var(--gold2),var(--gold3));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 30px rgba(255,140,50,.35)}
  .subtitle{font-size:14px;color:#9fb3d9;margin-top:-8px}
  .howto{background:rgba(255,255,255,.05);border:1px solid rgba(79,124,255,.3);border-radius:14px;
    padding:11px 18px;font-size:14px;line-height:1.7;max-width:460px}
  .howto b{color:var(--brand-cyan)}
  .lvgrid{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:560px}
  .lvbtn{pointer-events:auto;cursor:pointer;width:96px;height:96px;border-radius:16px;border:2px solid var(--gold2);
    background:rgba(255,255,255,.07);color:#eaf6ff;font-weight:800;font-size:15px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
  .lvbtn small{font-size:11px;font-weight:600;color:#9fb3d9}
  .lvbtn .stars{font-size:13px;letter-spacing:2px;color:var(--gold1)}
  .lvbtn.locked{border-color:rgba(255,255,255,.15);color:#5a6a85;background:rgba(0,0,0,.3);cursor:default}
  .lvbtn:not(.locked):active{transform:scale(.95)}
  .bigbtn{pointer-events:auto;cursor:pointer;min-height:54px;min-width:170px;border:none;border-radius:16px;
    font-size:19px;font-weight:800;color:#0a0f1a;
    background:linear-gradient(92deg,var(--brand-cyan),var(--brand-blue));
    box-shadow:0 6px 18px rgba(79,124,255,.4);padding:10px 24px}
  .bigbtn.gold{background:linear-gradient(92deg,var(--gold1),var(--gold3));box-shadow:0 6px 18px rgba(255,140,50,.4)}
  .bigbtn.ghost{background:rgba(255,255,255,.1);color:#eaf6ff;border:1.5px solid rgba(56,225,255,.5)}
  .bigbtn:active{transform:scale(.96)}
  .stat{font-size:15px;color:#cfe0ff}
  .stat b{color:var(--gold2)}
  .winstars{font-size:44px;letter-spacing:8px;color:var(--gold1);text-shadow:0 0 22px rgba(255,180,60,.6)}
  .btnrow{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  #deathFlash{position:absolute;inset:0;background:#ff2d0e;opacity:0;pointer-events:none;transition:opacity .08s}
  #orientHint{position:absolute;left:0;right:0;top:max(8px,env(safe-area-inset-top));display:flex;
    justify-content:center;pointer-events:none;z-index:40}
  #orientHint.hidden{display:none}
  #orientHint span{background:rgba(7,11,20,.78);border:1px solid rgba(255,207,92,.5);border-radius:12px;
    padding:7px 16px;font-size:12.5px;color:#ffd98e;display:flex;align-items:center;gap:4px;white-space:nowrap}
  #toast{position:absolute;left:50%;top:26%;transform:translate(-50%,6px);pointer-events:none;
    background:rgba(56,225,255,.16);border:1px solid rgba(56,225,255,.55);color:#eaf6ff;font-weight:800;
    font-size:clamp(16px,4vw,22px);padding:8px 22px;border-radius:14px;text-shadow:0 0 10px rgba(56,225,255,.5);
    opacity:0;transition:opacity .22s ease,transform .3s ease;white-space:nowrap;z-index:30}
  #toast.show{opacity:1;transform:translate(-50%,-10px)}
  #joyCapture,#jumpBtn{position:absolute;pointer-events:auto;touch-action:none;display:none}
  body.playing #joyCapture{display:block}
  body.playing #jumpBtn{display:flex}
  #joyCapture{left:0;top:0;width:60%;height:100%}
  #joyZone{position:absolute;pointer-events:none;touch-action:none;width:132px;height:132px;left:0;top:0;
    border-radius:50%;background:rgba(255,255,255,.08);border:2px solid rgba(56,225,255,.35);
    opacity:0;transition:opacity .16s ease;display:none}
  body.playing #joyZone{display:block}
  #joyZone.active{opacity:1}
  #joyStick{position:absolute;left:50%;top:50%;width:56px;height:56px;margin:-28px 0 0 -28px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#7fd8ff,var(--brand-blue) 70%);box-shadow:0 3px 10px rgba(0,0,0,.4)}
  #jumpBtn{right:22px;bottom:max(26px,env(safe-area-inset-bottom));width:88px;height:88px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,var(--gold1),var(--gold3) 75%);
    box-shadow:0 4px 14px rgba(255,140,50,.45);color:#3a1500;font-weight:900;font-size:18px;
    align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.3)}
  #jumpBtn:active,#joyZone.active{filter:brightness(1.18)}

  /* 大螢幕提醒浮層（手機才顯示，統一規格） */
  #bigScreenHint{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
    background:rgba(7,11,20,.9);padding:22px;box-sizing:border-box;opacity:1;transition:opacity .26s ease}
  #bigScreenHint.hidden{display:none}
  #bigScreenHint.fade{opacity:0}
  .bsh-card{max-width:360px;width:100%;background:rgba(15,20,34,.96);border:1px solid rgba(56,225,255,.38);
    border-radius:16px;padding:30px 22px 24px;text-align:center;box-shadow:0 14px 44px rgba(0,0,0,.55);
    box-sizing:border-box}
  .bsh-icon{margin:0 auto 14px;width:46px;height:46px}
  .bsh-title{font-size:20px;font-weight:900;letter-spacing:.5px;line-height:1.4;
    background:linear-gradient(92deg,var(--brand-cyan),var(--brand-blue),var(--brand-purple));
    -webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:9px}
  .bsh-sub{font-size:14px;color:#9fb3d9;line-height:1.65;margin-bottom:22px}
  .bsh-btn{display:block;width:72%;min-width:60%;min-height:52px;margin:0 auto;border:none;border-radius:14px;
    font-size:16px;font-weight:800;color:#0a0f1a;cursor:pointer;
    background:linear-gradient(92deg,var(--brand-cyan),var(--brand-blue),var(--brand-purple));
    box-shadow:0 6px 18px rgba(79,124,255,.4)}
  .bsh-btn:active{transform:scale(.96)}

  /* v7：金幣 HUD、隱藏彩蛋徽章 */
  .pill.coin{color:var(--gold1)}
  .pill.coin b{background:linear-gradient(92deg,var(--gold1),var(--gold3));-webkit-background-clip:text;background-clip:text;color:transparent}
  #eggBadge{display:none;align-items:center;gap:6px;justify-content:center;margin-top:-4px;font-size:12.5px;color:#ffd98e;
    background:rgba(255,207,92,.12);border:1px solid rgba(255,207,92,.45);border-radius:12px;padding:6px 14px}
  #eggBadge.show{display:flex}
  #eggBadge svg{width:16px;height:16px}
</style>

  <div id="eggBadge"><svg viewBox="0 0 24 24" fill="none" stroke="#ffd98e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8 8 6 12 6 15a6 6 0 0012 0c0-3-2-7-6-13z"/></svg><span id="eggBadgeTxt">彩蛋 0/8</span></div>

<script>
'use strict';
/* ============================================================
   跑酷火人3D — 專業AI升級版 v5
   手寫 canvas 3D 透視投影：每面獨立受光的立體平臺、熔岩海、
   多部件火焰小人。5 大關卡＋選關＋星級（依通關時間）。
   v5 升級：SVG 圖示取代表情符號、浮動式虛擬搖桿（觸點即中心，
   容錯更高）、死亡／彈跳／破關凍幀(hit-stop)手感、直向裝置
   提示、檢查點浮字回饋。
   ============================================================ */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let VW = innerWidth, VH = innerHeight, CX = VW/2, CY = VH*0.42, FOV = VH*0.9;

/* 大螢幕提醒浮層：只在手機顯示、一個 session 只跳一次；不擋遊戲初始化 */
(function initBigScreenHint(){
  const isPhone = Math.min(screen.width, screen.height) < 600 || innerWidth < 768;
  if(!isPhone) return;
  let seen=false;
  try{ seen = sessionStorage.getItem('bigscreen-hint')==='1'; }catch(e){}
  if(seen) return;
  const el = document.getElementById('bigScreenHint');
  el.classList.remove('hidden');
  document.getElementById('bshOkBtn').addEventListener('click', ()=>{
    try{ sessionStorage.setItem('bigscreen-hint','1'); }catch(e){}
    el.classList.add('fade');
    setTimeout(()=>{ el.remove(); }, 280);
  });
})();

/* ===================== 預烘焙：天空、熔岩漸層、v6 紋理／視差層／暗角 ===================== */
const skyCv = document.createElement('canvas');
const lavaGradCv = document.createElement('canvas');
const farMtCv = document.createElement('canvas');
const nearMtCv = document.createElement('canvas');
const vignetteCv = document.createElement('canvas');
const crustCv = document.createElement('canvas');
function bakeSky(){
  skyCv.width = VW; skyCv.height = VH;
  const g = skyCv.getContext('2d');
  const grad = g.createLinearGradient(0,0,0,VH);
  grad.addColorStop(0,'#0d0308'); grad.addColorStop(0.35,'#2a0a0c');
  grad.addColorStop(0.62,'#6b1a10'); grad.addColorStop(0.8,'#c8451a'); grad.addColorStop(1,'#ff7e3d');
  g.fillStyle = grad; g.fillRect(0,0,VW,VH);
  const hb = VH*0.142;   // 地平線位置（與 3D 投影一致）
  // 星星（地平線以上才看得到）
  for(let i=0;i<90;i++){
    const x=Math.random()*VW, y=Math.random()*hb*0.92;
    g.globalAlpha = 0.2+Math.random()*0.6;
    g.fillStyle='#ffd9c0'; g.fillRect(x,y,Math.random()<0.2?2:1,Math.random()<0.2?2:1);
  }
  g.globalAlpha=1;
  // v6 火山灰雲：被熔岩由下往上照亮（烘焙 radial-gradient）
  for(let i=0;i<7;i++){
    const cx=Math.random()*VW, cy=hb*(0.22+Math.random()*0.62), rw=90+Math.random()*170, rh=10+Math.random()*18;
    const cg=g.createRadialGradient(cx,cy+rh,2,cx,cy,rw);
    cg.addColorStop(0,'rgba(255,120,50,0.30)');
    cg.addColorStop(0.55,'rgba(130,32,20,0.20)');
    cg.addColorStop(1,'rgba(60,10,14,0)');
    g.fillStyle=cg;
    g.beginPath(); g.ellipse(cx,cy,rw,rh,0,0,Math.PI*2); g.fill();
  }
  // v6 地平線輝光帶（熔岩海環境光暈）
  const hg=g.createLinearGradient(0,hb-VH*0.09,0,hb+VH*0.02);
  hg.addColorStop(0,'rgba(255,120,40,0)'); hg.addColorStop(0.85,'rgba(255,150,60,0.4)'); hg.addColorStop(1,'rgba(255,190,90,0.55)');
  g.fillStyle=hg; g.fillRect(0,hb-VH*0.09,VW,VH*0.11);
  // v6 遠近雙層火山剪影（各自畫布 → 真雙層視差）
  function bakeMts(cv, stripH, step, hMin, hVar, color, crater){
    cv.width=VW; cv.height=Math.ceil(stripH);
    const m=cv.getContext('2d');
    for(let x=-160;x<VW+240;x+=step){
      const h=hMin+(((x*13)%hVar)+hVar)%hVar;
      m.fillStyle=color;
      m.beginPath(); m.moveTo(x-step*0.62,cv.height); m.lineTo(x,cv.height-h); m.lineTo(x+step*0.62,cv.height); m.closePath(); m.fill();
      if(crater){
        m.fillStyle='rgba(255,170,80,0.28)';
        m.fillRect(x-16, cv.height-h-4, 32, 6);
        m.fillStyle='rgba(255,130,45,0.75)';
        m.fillRect(x-9, cv.height-h, 18, 3.5);
      }
    }
  }
  bakeMts(farMtCv, Math.max(50,VH*0.20), 210, VH*0.045, VH*0.06, '#160407', false);
  bakeMts(nearMtCv, Math.max(66,VH*0.26), 300, VH*0.075, VH*0.09, '#20070a', true);
  // v6 暗角（一次烘焙，主迴圈直接疊，零即時漸層）
  vignetteCv.width=VW; vignetteCv.height=VH;
  const vg=vignetteCv.getContext('2d');
  const vgr=vg.createRadialGradient(VW/2,VH*0.46,Math.min(VW,VH)*0.42,VW/2,VH*0.52,Math.max(VW,VH)*0.78);
  vgr.addColorStop(0,'rgba(6,2,8,0)'); vgr.addColorStop(1,'rgba(6,2,8,0.46)');
  vg.fillStyle=vgr; vg.fillRect(0,0,VW,VH);
  // 熔岩漸層條（畫熔岩海用）
  lavaGradCv.width = 4; lavaGradCv.height = 256;
  const lg = lavaGradCv.getContext('2d');
  const lgrad = lg.createLinearGradient(0,0,0,256);
  lgrad.addColorStop(0,'#8a1e06'); lgrad.addColorStop(0.3,'#c83a0e');
  lgrad.addColorStop(0.7,'#ff6a1c'); lgrad.addColorStop(1,'#ffb04a');
  lg.fillStyle = lgrad; lg.fillRect(0,0,4,256);

/* ===================== 音效：Web Audio＋壓縮母線＋v6殘響/環境音 ===================== */
let AC=null, master=null, busComp=null, revGain=null, ambGain=null;
let muted = localStorage.getItem('firerun2_mute')==='1';
function makeImpulse(dur,decay){
  const rate=AC.sampleRate, len=Math.floor(rate*dur);
  const buf=AC.createBuffer(2,len,rate);
  for(let c=0;c<2;c++){
    const d=buf.getChannelData(c);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);
  }
  return buf;
}
/* v6 火山環境音層：低頻隆隆（噪聲+lowpass）＋中頻火山風（bandpass+LFO 起伏） */
function buildAmbient(){
  ambGain=AC.createGain(); ambGain.gain.value=0; ambGain.connect(busComp);
  const len=AC.sampleRate*2, buf=AC.createBuffer(1,len,AC.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  const src=AC.createBufferSource(); src.buffer=buf; src.loop=true;
  const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=95; lp.Q.value=0.8;
  const g=AC.createGain(); g.gain.value=1.7;
  src.connect(lp); lp.connect(g); g.connect(ambGain); src.start();
  const src2=AC.createBufferSource(); src2.buffer=buf; src2.loop=true; src2.playbackRate.value=0.71;
  const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=420; bp.Q.value=1.4;
  const g2=AC.createGain(); g2.gain.value=0.10;
  const lfo=AC.createOscillator(); lfo.frequency.value=0.13;
  const lfoG=AC.createGain(); lfoG.gain.value=0.06;
  lfo.connect(lfoG); lfoG.connect(g2.gain); lfo.start();
  src2.connect(bp); bp.connect(g2); g2.connect(ambGain); src2.start();
}
function updateAmbient(){
  if(!ambGain) return;
  const on = !muted && (gameState==='playing'||gameState==='dead');
  ambGain.gain.setTargetAtTime(on?0.34:0, AC.currentTime, 0.5);
}
/* 主音效時環境音 ducking，事件結束再回復 */
function duckAmbient(){
  if(!ambGain||!AC) return;
  ambGain.gain.cancelScheduledValues(AC.currentTime);
  ambGain.gain.setTargetAtTime(0.05, AC.currentTime, 0.03);
  setTimeout(updateAmbient, 550);
}
function audio(){
  if(!AC){
    AC = new (window.AudioContext||window.webkitAudioContext)();
    busComp = AC.createDynamicsCompressor();
    busComp.threshold.value=-18; busComp.knee.value=24; busComp.ratio.value=6;
    busComp.attack.value=0.003; busComp.release.value=0.2;
    master = AC.createGain(); master.gain.value=0.9;
    master.connect(busComp); busComp.connect(AC.destination);
    /* v6 程序化殘響：generated impulse 的 ConvolverNode（火山洞窟空間感），母線並聯送入 */
    try{
      const conv=AC.createConvolver(); conv.buffer=makeImpulse(1.5,2.6);
      revGain=AC.createGain(); revGain.gain.value=0.22;
      master.connect(revGain); revGain.connect(conv); conv.connect(busComp);
    }catch(e){}
    buildAmbient();
  }
  if(AC.state==='suspended') AC.resume();
  updateAmbient();
  return AC;
}

function beep(freq=440,dur=0.1,type='square',vol=0.14,slide=0){
  if(muted||!AC) return;
  const f = freq*(0.94+Math.random()*0.12);
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.setValueAtTime(f, AC.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide), AC.currentTime+dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
  o.connect(g).connect(master);
  o.start(); o.stop(AC.currentTime+dur);
}
function noiseBurst(dur=0.3, vol=0.16){
  if(muted||!AC) return;
  const n=Math.floor(AC.sampleRate*dur);
  const buf=AC.createBuffer(1,n,AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
  const src=AC.createBufferSource(); src.buffer=buf;
  const g=AC.createGain(); g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  src.connect(g).connect(master); src.start();
}

const JOY_R=66, JOY_DEAD=7;
function placeJoyAt(cx,cy){
  const half=JOY_R;
  const x=Math.min(VW*0.6-half-4, Math.max(half+4, cx));
  const y=Math.min(VH-half-8, Math.max(half+70, cy));

function joyFromEvent(t){
  let dx=t.clientX-joyCenter.x, dy=t.clientY-joyCenter.y;
  const len=Math.hypot(dx,dy);
  if(len<JOY_DEAD){ joyVec.x=0; joyVec.y=0; joyStick.style.transform='translate(0,0)'; return; }
  if(len>JOY_R){ dx=dx/len*JOY_R; dy=dy/len*JOY_R; }
  joyVec.x=dx/JOY_R; joyVec.y=dy/JOY_R;
  joyStick.style.transform=`translate(${dx}px,${dy}px)`;
}
function resetJoy(){ joyVec.x=0; joyVec.y=0; joyStick.style.transform='translate(0,0)'; joyTouchId=null; joyZone.classList.remove('active'); }

/* ===================== 3D 投影 ===================== */
const TILT = 0.30;
const cosA = Math.cos(TILT), sinA = Math.sin(TILT);
const cam = { x:0, y:170, z:-320 };
function project(x,y,z){
  const dx=x-cam.x, dy=y-cam.y, dz=z-cam.z;
  const ry = dy*cosA + dz*sinA;
  const rz = dz*cosA - dy*sinA;
  if(rz < 14) return null;
  const s = FOV/rz;
  return { x:CX+dx*s, y:CY-ry*s, s };
}
function camDepth(y,z){ return (z-cam.z)*cosA - (y-cam.y)*sinA; }
function quad(a,b,c,d,color){
  if(!a||!b||!c||!d) return false;
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.lineTo(d.x,d.y);
  ctx.closePath(); ctx.fill();
  return true;
}
function quadStroke(a,b,c,d,color,w){
  if(!a||!b||!c||!d) return;
  ctx.strokeStyle=color; ctx.lineWidth=w;
  ctx.beginPath();
  ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.lineTo(d.x,d.y);
  ctx.closePath(); ctx.stroke();
}
/* v6 岩石紋理貼圖：以仿射變換把烘焙紋理映射到投影後的四邊形（clip 修正梯形差） */
function texQuad(a,b,c,d,alpha){
  ctx.save();
  ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.lineTo(d.x,d.y); ctx.closePath(); ctx.clip();
  ctx.globalAlpha = ctx.globalAlpha*alpha;
  const W=rockTexCv.width, H=rockTexCv.height;
  ctx.transform((b.x-a.x)/W,(b.y-a.y)/W,(d.x-a.x)/H,(d.y-a.y)/H,a.x,a.y);
  ctx.drawImage(rockTexCv,0,0);
  ctx.restore();
}
/* 立體盒：每面獨立受光（頂最亮、面向鏡頭正面中亮、側面暗）＋熔岩底光
   outline（選用）：額外描邊正面＋側面輪廓線，讓角色部件更立體、識別度更高
   tex（選用）：頂面＋正面疊岩石細節紋理（平臺用） */
function drawBox3D(x,y,z,hw,h,hd,pal,lavaGlow,outline,tex){
  const tFL=project(x-hw,y,z-hd), tFR=project(x+hw,y,z-hd),
        tBL=project(x-hw,y,z+hd), tBR=project(x+hw,y,z+hd),
        bFL=project(x-hw,y-h,z-hd), bFR=project(x+hw,y-h,z-hd),
        bBL=project(x-hw,y-h,z+hd), bBR=project(x+hw,y-h,z+hd);
  // 側面（只畫看得到的那側）
  if(cam.x < x-hw){ quad(tFL,tBL,bBL,bFL,pal.sideDark); if(outline) quadStroke(tFL,tBL,bBL,bFL,outline,1); }
  else if(cam.x > x+hw){ quad(tFR,tBR,bBR,bFR,pal.side); if(outline) quadStroke(tFR,tBR,bBR,bFR,outline,1); }
  // 正面
  if(quad(tFL,tFR,bFR,bFL,pal.front)){
    // AO 暗帶（下半）
    if(bFL&&bFR&&tFL&&tFR){
      const mFL={x:tFL.x+(bFL.x-tFL.x)*0.55, y:tFL.y+(bFL.y-tFL.y)*0.55};
      const mFR={x:tFR.x+(bFR.x-tFR.x)*0.55, y:tFR.y+(bFR.y-tFR.y)*0.55};
      quad(mFL,mFR,bFR,bFL,'rgba(10,4,2,0.35)');
      if(lavaGlow>0){
        const gFL={x:tFL.x+(bFL.x-tFL.x)*0.78, y:tFL.y+(bFL.y-tFL.y)*0.78};
        const gFR={x:tFR.x+(bFR.x-tFR.x)*0.78, y:tFR.y+(bFR.y-tFR.y)*0.78};
        quad(gFL,gFR,bFR,bFL,'rgba(255,110,30,'+(0.32*lavaGlow).toFixed(2)+')');
      }
    }
    if(outline) quadStroke(tFL,tFR,bFR,bFL,outline,1);
  }
  // 頂面
  quad(tFL,tFR,tBR,tBL,pal.top);
  if(tex && tFL&&tFR&&tBR&&tBL && Math.abs(tFR.x-tFL.x)>56) texQuad(tFL,tFR,tBR,tBL,0.85);
  quadStroke(tFL,tFR,tBR,tBL,pal.edge,1.5);
  if(outline) quadStroke(tFL,tFR,tBR,tBL,outline,1);
  return {tFL,tFR,tBL,tBR};
}

function L(name, starT, builder){ return {name, starT, builder}; }
/* v7：builder 現在回傳 {plats, coins}。沿路每個非崩塌平臺上方自動放 1 金幣；
   opts.boost=true 的關卡在中段額外放 1 顆加速火焰道具；
   每關固定生成 1 顆隱藏彩蛋——放在該關「離中軸線最遠」的平臺外側、需刻意往旁邊跳才碰得到，
   不擋主線路徑，純粹給探索玩家的獎勵。 */
function makeBuilder(segs, opts={}){
  return function(){
    const plats=[]; let z=0, y=0;
    function add(x,dy,gap,hw,hd,o={}){
      z += gap; y += dy;
      plats.push(Object.assign({x,y,z,w:hw,d:hd,type:'normal',phase:Math.random()*6.28},o));
    }
    add(0,0,0,150,150,{checkpoint:true,start:true});
    for(const s of segs) add(...s);
    plats.push({x:0,y:y+8,z:z+300,w:220,d:220,type:'goal',phase:0});

    const coins=[];
    let maxAbsX=0, maxIdx=1;
    for(let i=1;i<plats.length-1;i++){
      const p=plats[i];
      if(p.type!=='crumble') coins.push({x:p.x,y:p.y+42,z:p.z,type:'coin'});
      if(Math.abs(p.x)>=maxAbsX){ maxAbsX=Math.abs(p.x); maxIdx=i; }
    }
    if(opts.boost){
      const mid=plats[Math.floor(plats.length/2)];
      coins.push({x:mid.x+36, y:mid.y+42, z:mid.z, type:'boost'});
    }
    const eggP=plats[maxIdx];
    const dir=eggP.x===0?1:Math.sign(eggP.x);
    coins.push({x:eggP.x+dir*68, y:eggP.y+80, z:eggP.z-eggP.d*0.25, type:'egg'});
    return {plats,coins};
  };
}

function buildLevel(i){
  const built = LEVELS[i].builder();
  platforms = built.plats;
  levelCoins = built.coins.map(c=>Object.assign({collected:false},c));
  GOAL_Z = platforms[platforms.length-1].z;
  lavaBlobs = [];
  for(let k=0;k<26;k++){
    lavaBlobs.push({ x:(Math.random()*2-1)*900, z:Math.random()*GOAL_Z*1.1, r:24+Math.random()*46, ph:Math.random()*6.28 });
  }
}
function resetCrumbles(){
  for(const p of platforms) if(p.type==='crumble'){ p.crumbleT=0; p.crumbling=false; p.gone=false; }
}
function resetToRespawn(){
  player.x=player.respawn.x; player.y=player.respawn.y; player.z=player.respawn.z;
  player.vx=player.vy=player.vz=0;
  player.grounded=false; player.coyote=0;
  resetCrumbles();
}
function startGame(i){
  curLevel=i; pickedLevel=i;
  buildLevel(i);
  checkpointIdx=0; deaths=0; coinsThisRun=0; eggFoundThisRun=false;
  player.respawn={x:platforms[0].x, y:platforms[0].y+40, z:platforms[0].z};
  player.boostT=0;
  resetToRespawn();
  cam.x=player.x; cam.y=player.y+180; cam.z=player.z-340;
  elapsed=0; hintT=0; shake=0;
  parts3.length=0;
  document.getElementById('titleScreen').classList.add('hidden');
  document.getElementById('winScreen').classList.add('hidden');
  document.getElementById('lvTxt').textContent = LEVELS[i].name;
  document.getElementById('coinTxt').textContent = '0';
  document.body.classList.add('playing');
  gameState='playing';
  updateAmbient();
  if(typeof updateOrientHint==='function') updateOrientHint();
}
function die(){
  if(gameState!=='playing') return;
  gameState='dead';
  deaths++;
  sfx.death();
  shake=14;
  freeze=0.15;
  spawnParts3(player.x, Math.max(player.y,LAVA_Y+16), player.z, '#ff3d1c', 26, 300, 0.7, 8);
  spawnParts3(player.x, Math.max(player.y,LAVA_Y+16), player.z, '#ffcf5c', 14, 220, 0.6, 6);
  const df=document.getElementById('deathFlash');
  df.style.opacity='0.5';
  setTimeout(()=>{ df.style.opacity='0'; },120);
  setTimeout(()=>{ if(gameState==='dead'){ resetToRespawn(); gameState='playing'; } },380);
}
function winGame(){
  if(gameState!=='playing') return;
  gameState='win';
  sfx.win();
  updateAmbient();
  freeze=0.08;
  spawnParts3(player.x, player.y+50, player.z, '#38e1ff', 40, 320, 1, 7);
  spawnParts3(player.x, player.y+70, player.z, '#ffcf5c', 30, 280, 1, 6);
  const t=elapsed, S=LEVELS[curLevel].starT;
  const earned = t<=S[2]?3 : t<=S[1]?2 : 1;
  if(earned>stars[curLevel]){ stars[curLevel]=earned; localStorage.setItem('firerun2_stars',JSON.stringify(stars)); }
  if(!bests[curLevel] || t<bests[curLevel]){ bests[curLevel]=Math.round(t*10)/10; localStorage.setItem('firerun2_bests',JSON.stringify(bests)); }
  if(coinsThisRun>coinBests[curLevel]){ coinBests[curLevel]=coinsThisRun; localStorage.setItem('firerun2_coins',JSON.stringify(coinBests)); }
  document.getElementById('winTime').textContent=t.toFixed(1);
  document.getElementById('star3Req').textContent=S[2];
  document.getElementById('bestTime').textContent=bests[curLevel].toFixed(1);
  const coinTotal=levelCoins.filter(c=>c.type==='coin').length;
  document.getElementById('winCoins').textContent=coinsThisRun;
  document.getElementById('winCoinsTotal').textContent=coinTotal;
  document.getElementById('winEggLine').style.display = eggFoundThisRun ? 'block' : 'none';
  const ws=document.getElementById('winStars');
  ws.textContent='';
  for(let k=1;k<=earned;k++) setTimeout(()=>{ ws.textContent='★'.repeat(k)+'☆'.repeat(3-k); sfx.star(k); },500+k*380);
  setTimeout(()=>{ ws.textContent='★'.repeat(earned)+'☆'.repeat(3-earned); },500);
  document.getElementById('nextBtn').style.display = (curLevel<LEVELS.length-1) ? '' : 'none';
  document.body.classList.remove('playing');
  setTimeout(()=>{ document.getElementById('winScreen').classList.remove('hidden'); renderLvGrid(); },550);
}

/* ===================== 物理 ===================== */
function platAABB(p,t){
  let px=p.x, py=p.y, pz=p.z;
  if(p.type==='moving' && p.move){
    const off=Math.sin(t*p.move.speed+p.phase)*p.move.range;
    if(p.move.axis==='x') px+=off; else if(p.move.axis==='y') py+=off; else pz+=off;
  }
  return {x:px,y:py,z:pz,w:p.w,d:p.d};
}
/* v7 明滅平臺：sin 相位 >0 時實體，否則會直接落空（跟熔岩噴發共用節奏手法，難度用） */
function blinkSolid(p,t){ return Math.sin(t*(p.speed||1.6)+p.phase) > -0.08; }
function updatePhysics(dt,t){
  if(player.boostT>0) player.boostT=Math.max(0,player.boostT-dt);
  const speedMult = player.boostT>0 ? BOOST_MULT : 1;
  let mx=0,mz=0;
  const kb=readKeyboardAxes();
  mx=kb.mx; mz=kb.mz;
  if(joyVec.x||joyVec.y){ mx=joyVec.x; mz=-joyVec.y; }
  const len=Math.hypot(mx,mz);
  if(len>1){ mx/=len; mz/=len; }
  const accel=(player.grounded?MOVE_ACCEL:MOVE_ACCEL*AIR_MULT)*speedMult;
  const decel=(player.grounded?MOVE_DECEL:MOVE_DECEL*AIR_MULT);
  function approach(cur,target){
    const rate=Math.abs(target)>0.01?accel:decel;
    const diff=target-cur, step=rate*dt;
    return Math.abs(diff)<=step ? target : cur+Math.sign(diff)*step;
  }
  player.vx=approach(player.vx, mx*MAX_SPEED*speedMult);
  player.vz=approach(player.vz, mz*MAX_SPEED*speedMult);
  player.running=(Math.abs(player.vx)+Math.abs(player.vz))>10;

  if(player.grounded) player.coyote=COYOTE_MAX;
  else player.coyote=Math.max(0,player.coyote-dt);

  if(input.jumpBuffer>0 && player.coyote>0){
    player.vy=JUMP_V; player.bounceLock=false;
    player.grounded=false; player.coyote=0; input.jumpBuffer=0;
    sfx.jump();
    player.sy=1.35; player.sx=0.72;
    spawnParts3(player.x, player.y+4, player.z, '#ffcf5c', 8, 150, 0.35, 5);
  }
  input.jumpBuffer=Math.max(0,input.jumpBuffer-dt);
  if(!input.jumpHeld && player.vy>0 && !player.bounceLock) player.vy*= (1-6*dt);   // 可變跳高（彈跳墊不剪）
  if(player.vy<=0) player.bounceLock=false;

  // 頂點懸浮 + 上慢下快
  let g = player.vy>0?GRAVITY:GRAVITY_FALL;
  if(Math.abs(player.vy)<40) g*=0.5;
  player.vy=Math.max(-MAX_FALL, player.vy-g*dt);

  // 站在移動平臺上：跟著走
  if(player.grounded && player.groundPlat && player.groundPlat.type==='moving'){
    const p=player.groundPlat, m=p.move;
    const now=Math.sin(t*m.speed+p.phase)*m.range;
    const prev=Math.sin((t-dt)*m.speed+p.phase)*m.range;
    if(m.axis==='x') player.x+=now-prev;
    else if(m.axis==='y') player.y+=now-prev;
  }

  player.x+=player.vx*dt;
  player.z+=player.vz*dt;
  const prevY=player.y;
  player.y+=player.vy*dt;

  let landed=false, landedPlat=null;
  for(const p of platforms){
    if(p.gone) continue;
    if(p.type==='blink' && !blinkSolid(p,t)) continue;
    const box=platAABB(p,t);
    const hw=box.w*1.1, hd=box.d*1.1;      // 寬容判定
    if(Math.abs(player.x-box.x)<hw && Math.abs(player.z-box.z)<hd){
      // 寬容落地：差一點點高度（≤10px）也自動吸上平臺（角落修正）
      if(player.vy<=0 && prevY>=box.y-10 && player.y<=box.y){
        player.y=box.y; player.vy=0;
        landed=true; landedPlat=p;
        break;
      }
    }
  }
  const was=player.grounded;
  player.grounded=landed;
  if(landed){
    player.groundPlat=landedPlat;
    if(!was){
      sfx.land();
      player.sy=0.65; player.sx=1.3;
      spawnParts3(player.x, player.y+2, player.z, '#c89060', 6, 110, 0.3, 5);
      shake=Math.min(shake+1.5,4);
    }
    if(landedPlat.type==='bounce'){
      player.vy=JUMP_V*1.42; player.grounded=false; player.bounceLock=true;
      landedPlat.pressT=0.25;
      sfx.bounce();
      player.sy=1.5; player.sx=0.6;
      spawnParts3(player.x, player.y+4, player.z, '#ff6cc7', 16, 220, 0.5, 6);
      shake=Math.min(shake+3,7);
      freeze=0.045;
    }
    if(landedPlat.checkpoint){
      const idx=platforms.indexOf(landedPlat);
      if(idx>checkpointIdx){
        checkpointIdx=idx;
        player.respawn={x:landedPlat.x,y:landedPlat.y+40,z:landedPlat.z};
        sfx.checkpoint();
        spawnParts3(landedPlat.x, landedPlat.y+30, landedPlat.z, '#38e1ff', 14, 180, 0.6, 6);
        showToast('檢查點！');
      }
    }
    if(landedPlat.type==='crumble' && !landedPlat.crumbling){
      landedPlat.crumbling=true; landedPlat.crumbleT=0;
      sfx.crumble();
    }
    if(landedPlat.type==='goal') winGame();
  }
  // v7：金幣／道具／彩蛋收集判定（球狀容錯半徑，飛行途中經過就算拿到）
  for(const c of levelCoins){
    if(c.collected) continue;
    const dx=player.x-c.x, dy=(player.y+30)-c.y, dz=player.z-c.z;
    if(dx*dx+dy*dy+dz*dz < 40*40){
      c.collected=true;
      if(c.type==='coin'){
        coinsThisRun++;
        sfx.coin();
        spawnParts3(c.x,c.y,c.z,'#ffcf5c',10,150,0.45,5);
        const ct=document.getElementById('coinTxt');
        if(ct) ct.textContent=String(coinsThisRun);
      } else if(c.type==='boost'){
        player.boostT=BOOST_DUR;
        sfx.boost();
        spawnParts3(c.x,c.y,c.z,'#ff7e3d',18,240,0.6,7);
        showToast('加速火焰！');
        shake=Math.min(shake+2,5);
      } else if(c.type==='egg'){
        eggFoundThisRun=true;
        sfx.egg();
        freeze=0.06;
        spawnParts3(c.x,c.y,c.z,'#ffd98e',22,260,0.8,7);
        spawnParts3(c.x,c.y,c.z,'#38e1ff',14,220,0.7,6);
        showToast('🥚 彩蛋！');
        if(!eggsFound.has(curLevel)){
          eggsFound.add(curLevel);
          localStorage.setItem('firerun2_eggs',JSON.stringify([...eggsFound]));
        }
        updateEggBadge();
      }
    }
  }
  // 崩塌計時
  for(const p of platforms){
    if(p.type==='crumble' && p.crumbling && !p.gone){
      p.crumbleT+=dt;
      if(p.crumbleT>0.55){
        p.gone=true;
        spawnParts3(p.x,p.y-10,p.z,'#8a7a5c',12,160,0.5,7);
      }
    }
    if(p.pressT>0) p.pressT-=dt;
  }
  if(player.y<LAVA_Y+8){ die(); return; }

  player.sx+=(1-player.sx)*10*dt;
  player.sy+=(1-player.sy)*10*dt;

  if(player.running && player.grounded){
    player.animT+=dt;
    if(player.animT>0.15){
      player.animT=0;
      sfx.step();
      spawnParts3(player.x, player.y+2, player.z, '#ff7e3d', 2, 70, 0.3, 4);
    }
  }
  if(!player.grounded && Math.random()<0.5){
    spawnParts3(player.x, player.y+14, player.z, Math.random()<0.5?'#ffcf5c':'#ff5c1c', 1, 40, 0.4, 5);
  }
  /* v6 熔岩噴發：前方隨機亮斑冒出火柱粒子＋泡泡音，讓熔岩海活起來 */
  eruptT-=dt;
  if(eruptT<=0){
    eruptT=1.8+Math.random()*2.4;
    const cands=lavaBlobs.filter(b=>b.z>player.z+250 && b.z<player.z+1500 && Math.abs(b.x)<760);
    if(cands.length){
      const b=cands[(Math.random()*cands.length)|0];
      spawnParts3(b.x, LAVA_Y+6, b.z, '#ff6a1c', 10, 260, 0.9, 8);
      spawnParts3(b.x, LAVA_Y+6, b.z, '#ffcf5c', 5, 200, 0.7, 6);
      sfx.bubble();
    }
  }
}

/* ===================== 3D 粒子（swap-pop） ===================== */
const parts3=[];
function spawnParts3(x,y,z,color,n,speed,life,size){
  for(let i=0;i<n;i++){
    if(parts3.length>=280) return;
    const a=Math.random()*Math.PI*2, s=speed*(0.3+Math.random()*0.7);
    parts3.push({x,y,z,vx:Math.cos(a)*s,vy:Math.abs(Math.sin(a))*s*0.8+60,vz:Math.sin(a+1.3)*s*0.5,
      life:life*(0.6+Math.random()*0.7), maxLife:life, color, size});
  }
}
function updateParts3(dt){
  for(let i=parts3.length-1;i>=0;i--){
    const p=parts3[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.z+=p.vz*dt; p.vy-=520*dt; p.life-=dt;
    if(p.life<=0){ parts3[i]=parts3[parts3.length-1]; parts3.pop(); }
  }
}
/* 環境餘燼（螢幕空間） */
const embers=[];
function updateEmbers(dt){
  if(embers.length<40 && Math.random()<0.3)
    embers.push({x:Math.random()*VW, y:VH+10, vy:-(24+Math.random()*40), sway:Math.random()*6.28, sz:2+Math.random()*3, life:6});
  for(let i=embers.length-1;i>=0;i--){
    const e=embers[i];
    e.y+=e.vy*dt; e.sway+=dt*1.6; e.x+=Math.sin(e.sway)*14*dt; e.life-=dt;
    if(e.y<-12||e.life<=0){ embers[i]=embers[embers.length-1]; embers.pop(); }
  }
}

/* ===================== 火焰小人（多部件盒體） ===================== */
const PAL_BODY = { top:'#ffe9a0', front:'#ffb43c', side:'#e08a1e', sideDark:'#b86a12', edge:'rgba(255,240,190,0.5)' };
const PAL_LEG  = { top:'#ff9d3c', front:'#e05c1c', side:'#b8460e', sideDark:'#8a3408', edge:'rgba(255,180,120,0.4)' };
const PAL_BOOT = { top:'#4a2a14', front:'#331b0c', side:'#26140a', sideDark:'#180c05', edge:'rgba(255,190,130,0.3)' };
const PAL_MITT = { top:'#ffd97c', front:'#ffb43c', side:'#e08a1e', sideDark:'#b86a12', edge:'rgba(255,240,190,0.5)' };
const OUTLINE_FIRE = 'rgba(40,14,4,0.55)';
function drawPlayer(t){
  const px=player.x, py=player.y, pz=player.z;
  // 影子：找腳下最近平臺
  let shY=null;
  for(const p of platforms){
    if(p.gone) continue;
    const b=platAABB(p,t);
    if(Math.abs(px-b.x)<b.w && Math.abs(pz-b.z)<b.d && b.y<=py+2){
      if(shY===null || b.y>shY) shY=b.y;
    }
  }
  if(shY!==null){
    const sp=project(px,shY+1,pz);
    if(sp){
      const r=Math.max(3, 24*sp.s*(1-Math.min(1,(py-shY)/260)));
      ctx.globalAlpha=0.35;
      ctx.fillStyle='#000';
      ctx.beginPath(); ctx.ellipse(sp.x,sp.y,r,r*0.42,0,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
      // v6 火光映地：火人照亮腳下平臺（additive）
      const gr=Math.max(6, 44*sp.s*(1-Math.min(1,(py-shY)/300)));
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      ctx.globalAlpha=0.45;
      ctx.drawImage(glowFire, sp.x-gr, sp.y-gr*0.4, gr*2, gr*0.8);
      ctx.restore();
    }
  }
  const swing = player.running&&player.grounded ? Math.sin(performance.now()/85)*10 : (player.grounded?0:6);
  const sy=player.sy, sx=player.sx;
  const bob = player.grounded&&player.running ? Math.abs(Math.sin(performance.now()/85))*3 : 0;
  const faceState = gameState==='dead' ? 'hurt' : gameState==='win' ? 'happy' : 'normal';
  // 腿（前後擺動）
  drawBox3D(px-6*sx, py+16*sy+bob, pz+swing*0.7, 4.5, 16*sy, 4.5, PAL_LEG, 0, OUTLINE_FIRE);
  drawBox3D(px+6*sx, py+16*sy+bob, pz-swing*0.7, 4.5, 16*sy, 4.5, PAL_LEG, 0, OUTLINE_FIRE);
  // 靴子（腳掌，貼齊腿部底端＝地面接觸點）
  drawBox3D(px-6*sx, py+4*sy+bob, pz+swing*0.7+2.5, 5.5, 4*sy, 6.5, PAL_BOOT, 0, OUTLINE_FIRE);
  drawBox3D(px+6*sx, py+4*sy+bob, pz-swing*0.7+2.5, 5.5, 4*sy, 6.5, PAL_BOOT, 0, OUTLINE_FIRE);
  // 身體
  drawBox3D(px, py+38*sy+bob, pz, 10*sx, 22*sy, 7, PAL_BODY, 0, OUTLINE_FIRE);
  // 手臂
  drawBox3D(px-14*sx, py+34*sy+bob, pz-swing*0.6, 3.5, 14*sy, 3.5, PAL_LEG, 0, OUTLINE_FIRE);
  drawBox3D(px+14*sx, py+34*sy+bob, pz+swing*0.6, 3.5, 14*sy, 3.5, PAL_LEG, 0, OUTLINE_FIRE);
  // 手套（手臂末端，比手臂稍亮，加強部件分層感）
  drawBox3D(px-14*sx, py+22*sy+bob, pz-swing*0.6, 3.2, 4*sy, 3.2, PAL_MITT, 0, OUTLINE_FIRE);
  drawBox3D(px+14*sx, py+22*sy+bob, pz+swing*0.6, 3.2, 4*sy, 3.2, PAL_MITT, 0, OUTLINE_FIRE);
  // 頭
  drawBox3D(px, py+54*sy+bob, pz, 8*sx, 15*sy, 8, PAL_BODY, 0, OUTLINE_FIRE);
  // 頭頂高光點（模擬關鍵光源）
  const hl=project(px-4*sx, py+58*sy+bob, pz-7.5);
  if(hl){ const r=6*hl.s; ctx.globalAlpha=0.85; ctx.drawImage(glowHighlight, hl.x-r, hl.y-r, r*2, r*2); ctx.globalAlpha=1; }
  // 臉（畫在頭正面）——三態表情：一般／受擊(驚訝)／通關(開心)
  const face=project(px, py+47*sy+bob, pz-8.2);
  if(face){
    const s=face.s;
    const eyeDX=4.5*s*10/8, eyeY=face.y-2*s;
    if(faceState==='happy'){
      // 瞇眼笑（^ ^）＋腮紅＋大笑嘴
      ctx.strokeStyle='#3a1a06'; ctx.lineWidth=Math.max(1.2,1.6*s); ctx.lineCap='round';
      [-1,1].forEach(dir=>{
        ctx.beginPath(); ctx.arc(face.x+dir*eyeDX, eyeY+1.7*s, 2*s, Math.PI*1.08, Math.PI*1.92); ctx.stroke();
      });
      ctx.fillStyle='rgba(255,110,140,0.55)';
      [-1,1].forEach(dir=>{
        ctx.beginPath(); ctx.ellipse(face.x+dir*eyeDX*1.55, eyeY+4.6*s, 1.7*s, 1*s, 0, 0, Math.PI*2); ctx.fill();
      });
      ctx.fillStyle='#3a1a06';
      ctx.beginPath(); ctx.ellipse(face.x, face.y+3.6*s, 3.2*s, 2.2*s, 0, 0.05*Math.PI, 0.95*Math.PI); ctx.fill();
      ctx.fillStyle='#ff9d8a';
      ctx.beginPath(); ctx.ellipse(face.x, face.y+4.6*s, 1.8*s, 1*s, 0, 0, Math.PI); ctx.fill();
    } else if(faceState==='hurt'){
      // 驚訝大眼＋皺眉＋O型嘴（受擊回饋，讓死因一目了然）
      [-1,1].forEach(dir=>{
        ctx.fillStyle='#fff8ec';
        ctx.beginPath(); ctx.ellipse(face.x+dir*eyeDX, eyeY, 2.2*s, 2.6*s, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle='#3a1a06';
        ctx.beginPath(); ctx.arc(face.x+dir*eyeDX, eyeY+0.7*s, 1.1*s, 0, Math.PI*2); ctx.fill();
      });
      ctx.strokeStyle='#3a1a06'; ctx.lineWidth=Math.max(1,1.3*s); ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(face.x-eyeDX-2*s, eyeY-3.6*s); ctx.lineTo(face.x-eyeDX+2*s, eyeY-4.9*s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(face.x+eyeDX-2*s, eyeY-4.9*s); ctx.lineTo(face.x+eyeDX+2*s, eyeY-3.6*s); ctx.stroke();
      ctx.fillStyle='#3a1a06';
      ctx.beginPath(); ctx.ellipse(face.x, face.y+4*s, 1.7*s, 2.1*s, 0, 0, Math.PI*2); ctx.fill();
    } else {
      // 一般：眼白＋瞳孔＋高光＋微笑
      [-1,1].forEach(dir=>{
        ctx.fillStyle='#fff8ec';
        ctx.beginPath(); ctx.ellipse(face.x+dir*eyeDX, eyeY, 1.9*s, 2*s, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle='#3a1a06';
        ctx.beginPath(); ctx.arc(face.x+dir*eyeDX, eyeY+0.5*s, 1.15*s, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle='#fff';
        ctx.beginPath(); ctx.arc(face.x+dir*eyeDX-0.5*s, eyeY-0.3*s, 0.5*s, 0, Math.PI*2); ctx.fill();
      });
      ctx.strokeStyle='#3a1a06'; ctx.lineWidth=Math.max(1,1.2*s); ctx.lineCap='round';
      ctx.beginPath(); ctx.arc(face.x, face.y+2.5*s, 2.6*s, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();
    }
  }
  // 火焰頭髮（螢幕空間三角形＋光暈）
  const hp=project(px, py+62*sy+bob, pz);
  if(hp){
    const s=hp.s, fl=Math.sin(performance.now()/90);
    ctx.save(); ctx.globalCompositeOperation='lighter';   // v6 火髮光暈改 additive，發光感更真
    ctx.drawImage(glowFire, hp.x-30*s, hp.y-34*s, 60*s, 60*s);
    ctx.restore();
    const flame=(ox,h,w,color)=>{
      ctx.fillStyle=color;
      ctx.beginPath();
      ctx.moveTo(hp.x+(ox-w)*s, hp.y);
      ctx.quadraticCurveTo(hp.x+(ox-w*0.4)*s, hp.y-h*0.55*s, hp.x+(ox+fl*3)*s, hp.y-h*s);
      ctx.quadraticCurveTo(hp.x+(ox+w*0.4)*s, hp.y-h*0.55*s, hp.x+(ox+w)*s, hp.y);
      ctx.closePath(); ctx.fill();
    };
    flame(-6, 18+fl*2, 6, '#ff7e3d');
    flame(6, 16-fl*2, 6, '#ff9d3c');
    flame(0, 26+fl*3, 7, '#ffcf5c');
    flame(0, 14+fl*2, 4, '#fff3c9');
  }
}

/* ===================== 場景繪製 ===================== */
function drawLava(t){
  const horizonY = CY - FOV*Math.tan(TILT) + (cam.y-170)*0.0;
  // 天空（視差：依 cam.x 輕移）
  const par = (cam.x*0.06)%VW;
  ctx.drawImage(skyCv, -par, 0);
  if(par>0) ctx.drawImage(skyCv, VW-par, 0);
  else ctx.drawImage(skyCv, -VW-par, 0);
  const hy = Math.max(40, horizonY);
  // v6 雙層火山剪影視差（遠慢近快）
  const p1=((cam.x*0.018)%VW+VW)%VW, p2=((cam.x*0.045)%VW+VW)%VW;
  ctx.drawImage(farMtCv, -p1, hy-farMtCv.height+6);
  ctx.drawImage(farMtCv, VW-p1, hy-farMtCv.height+6);
  ctx.drawImage(nearMtCv, -p2, hy-nearMtCv.height+8);
  ctx.drawImage(nearMtCv, VW-p2, hy-nearMtCv.height+8);
  // 熔岩海
  ctx.drawImage(lavaGradCv, 0, hy, VW, VH-hy);
  // v6 熔岩結殼紋理：預合成大圖 1:1 平移 blit（隨移動流動，效能等同單次全幅疊圖）
  const bandH=VH-hy, CW=crustCv.width, CH=crustCv.height;
  const cox=(((cam.x*0.5)%CW)+CW)%CW, coy=(((-cam.z*0.55)%CH)+CH)%CH;
  ctx.save();
  ctx.beginPath(); ctx.rect(0,hy,VW,bandH); ctx.clip();
  ctx.drawImage(crustCv, -cox, hy-coy);
  ctx.drawImage(crustCv, CW-cox, hy-coy);
  ctx.drawImage(crustCv, -cox, hy-coy+CH);
  ctx.drawImage(crustCv, CW-cox, hy-coy+CH);
  if(hy-coy+CH < VH){ ctx.drawImage(crustCv, -cox, hy-coy+CH*2); ctx.drawImage(crustCv, CW-cox, hy-coy+CH*2); }
  ctx.restore();
  // 熔岩亮斑（投影在 y=LAVA_Y 平面）
  for(const b of lavaBlobs){
    const dz=camDepth(LAVA_Y, b.z);
    if(dz<30 || dz>2600) continue;
    const p=project(b.x, LAVA_Y, b.z);
    if(!p) continue;
    const pulse=0.75+0.25*Math.sin(t*2+b.ph);
    const r=b.r*p.s*8;
    ctx.globalAlpha=0.5*pulse*Math.min(1,(2600-dz)/700);
    ctx.drawImage(glowFire, p.x-r, p.y-r*0.4, r*2, r*0.8);
    ctx.globalAlpha=1;
  }
  // 熔岩面波光線
  ctx.globalAlpha=0.22;
  ctx.strokeStyle='#ffd98e'; ctx.lineWidth=1.5;
  for(let i=0;i<4;i++){
    const zz=cam.z+300+i*380+ (t*40)%380;
    const a=project(cam.x-800,LAVA_Y,zz), b2=project(cam.x+800,LAVA_Y,zz);
    if(a&&b2){ ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b2.x,b2.y); ctx.stroke(); }
  }
  ctx.globalAlpha=1;
}
function drawFlag(x,y,z,active,big){
  const h=big?120:66;
  drawBox3D(x, y+h, z, big?3:2, h, big?3:2, {top:'#eee',front:'#cfd6e0',side:'#aab4c4',sideDark:'#8a94a4',edge:'rgba(255,255,255,0.4)'},0);
  const a=project(x,y+h,z), b=project(x,y+h-(big?34:22),z);
  if(a&&b){
    const w=(big?52:30)*a.s, flap=Math.sin(performance.now()/200+x)*4*a.s;
    ctx.fillStyle = active ? '#ffcf5c' : (big?'#38e1ff':'#8a94a4');
    ctx.beginPath();
    ctx.moveTo(a.x,a.y); ctx.lineTo(a.x+w, (a.y+b.y)/2+flap); ctx.lineTo(b.x,b.y);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1; ctx.stroke();
  }
}
/* v7：金幣／加速道具／隱藏彩蛋——旋轉小方塊或發光蛋形，螢幕空間繪製＋additive 光暈 */
function drawItem(c,t){
  const bob=Math.sin(t*2.4+c.x*0.05)*6;
  const p=project(c.x, c.y+bob, c.z);
  if(!p) return;
  const spin=Math.abs(Math.cos(t*3.2+c.z*0.02));
  if(c.type==='egg'){
    const s=p.s, pulse=0.8+0.3*Math.sin(t*4);
    ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.55*pulse;
    const r=26*s; ctx.drawImage(glowCyan, p.x-r, p.y-r, r*2, r*2);
    ctx.restore();
    ctx.fillStyle='#ffe9a0';
    ctx.beginPath(); ctx.ellipse(p.x, p.y, 9*s, 12*s, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='#ffcf5c'; ctx.lineWidth=Math.max(1,1.6*s); ctx.stroke();
    ctx.fillStyle='rgba(56,225,255,0.85)';
    ctx.beginPath(); ctx.ellipse(p.x-2.5*s, p.y-3*s, 2.4*s, 3.2*s, -0.3, 0, Math.PI*2); ctx.fill();
    return;
  }
  const hw=2.6+spin*6.5, pal = c.type==='boost' ? PAL_BOUNCE : { top:'#fff3c9', front:'#ffcf5c', side:'#ffa72e', sideDark:'#c8641e', edge:'rgba(255,255,255,0.8)' };
  drawBox3D(c.x, c.y+bob, c.z, hw, 12, 12, pal, 0, null, false);
  const g=c.type==='boost'?glowFire:glowFire;
  const s=p.s;
  ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.4;
  const r=(c.type==='boost'?26:18)*s;
  ctx.drawImage(g, p.x-r, p.y-r*0.5, r*2, r);
  ctx.restore();
}
function drawPlatform(p,t){
  const b=platAABB(p,t);
  const dz=camDepth(b.y,b.z);
  if(dz<16 || dz>3000) return;
  if(p.type==='blink' && !blinkSolid(p,t)){
    // 明滅平臺熄滅時：只留淡淡的警示輪廓，讓玩家看得出「快亮了/快滅了」而非憑空消失
    const phase=Math.sin(t*(p.speed||1.6)+p.phase);
    const c=project(b.x,b.y,b.z);
    if(c){
      ctx.globalAlpha=0.18+0.12*Math.max(0,phase+1);
      ctx.strokeStyle='rgba(255,210,120,0.8)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.ellipse(c.x,c.y,b.w*0.9*c.s,b.d*0.4*c.s,0,0,Math.PI*2); ctx.stroke();
      ctx.globalAlpha=1;
    }
    return;
  }
  let pal = p.type==='moving'?PAL_MOVE : p.type==='crumble'?PAL_CRUMB : p.type==='bounce'?PAL_BOUNCE : p.type==='goal'?PAL_GOAL : p.type==='blink'?PAL_BLINK : THEMES[curLevel];
  let h=30;
  let yy=b.y;
  if(p.type==='crumble' && p.crumbling){
    const k=p.crumbleT/0.55;
    yy -= Math.sin(k*40)*2.5;   // 顫抖
    ctx.globalAlpha = 1-k*0.5;
  }
  if(p.type==='bounce' && p.pressT>0) h = 30-10*(p.pressT/0.25);
  if(p.type==='blink'){
    // 即將熄滅前 0.35 秒開始閃爍警示，給玩家反應時間（寬容設計）
    const phase=Math.sin(t*(p.speed||1.6)+p.phase);
    if(phase<0.25) ctx.globalAlpha = 0.55+0.45*Math.abs(Math.sin(t*14));
  }
  const q = drawBox3D(b.x, yy, b.z, b.w, h, b.d, pal, Math.max(0, 1-(b.y-LAVA_Y)/380), null, true);
  ctx.globalAlpha=1;
  // 頂面裝飾
  if(q && q.tFL && q.tBR){
    if(p.type==='crumble'){
      const c1=project(b.x-b.w*0.4, yy, b.z), c2=project(b.x+b.w*0.3, yy, b.z-b.d*0.4), c3=project(b.x, yy, b.z+b.d*0.4);
      if(c1&&c2&&c3){
        ctx.strokeStyle='rgba(40,30,16,0.65)'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.moveTo(c1.x,c1.y); ctx.lineTo(c2.x,c2.y); ctx.lineTo(c3.x,c3.y); ctx.stroke();
      }
    } else if(p.type==='bounce'){
      const c=project(b.x, yy, b.z);
      if(c){
        ctx.strokeStyle='rgba(255,255,255,0.75)'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.ellipse(c.x, c.y, b.w*0.55*c.s, b.d*0.24*c.s, 0, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.ellipse(c.x, c.y, b.w*0.3*c.s, b.d*0.13*c.s, 0, 0, Math.PI*2); ctx.stroke();
      }
    } else if(p.type==='goal'){
      const c=project(b.x, yy, b.z);
      if(c){
        const r=b.w*1.4*c.s;
        ctx.drawImage(glowCyan, c.x-r, c.y-r*0.4, r*2, r*0.8);
        // v6 終點光柱（additive bloom）：從遠處就看得到目標
        const topP=project(b.x, yy+560, b.z);
        if(topP){
          ctx.save();
          ctx.globalCompositeOperation='lighter';
          ctx.globalAlpha=0.38+0.14*Math.sin(performance.now()/300);
          const w=Math.max(6, b.w*0.5*c.s);
          ctx.drawImage(glowCyan, c.x-w, topP.y, w*2, Math.max(4, c.y-topP.y));
          ctx.restore();
        }
      }
    }
  }
  if(p.checkpoint && !p.start){
    drawFlag(b.x-b.w*0.7, b.y, b.z+b.d*0.6, platforms.indexOf(p)<=checkpointIdx, false);
  }
  if(p.type==='goal') drawFlag(b.x, b.y, b.z+30, false, true);
}
function render(dt,t){
  // 相機緩動追隨
  const k = 1-Math.pow(0.001,dt);
  cam.x += (player.x*0.7 - cam.x)*k;
  cam.y += (player.y+180 - cam.y)*k;
  cam.z += (player.z-340 - cam.z)*k;
  let shx=0, shy=0;
  if(shake>0){
    shake*=Math.pow(0.001,dt);
    if(shake<0.1) shake=0;
    shx=(Math.random()*2-1)*shake; shy=(Math.random()*2-1)*shake;
  }
  ctx.save();
  ctx.translate(shx,shy);
  drawLava(t);
  // 深度排序：平臺＋玩家＋粒子
  const items=[];
  for(const p of platforms){
    if(p.gone) continue;
    const b=platAABB(p,t);
    items.push({d:camDepth(b.y,b.z), kind:'p', p});
  }
  for(const c of levelCoins){
    if(c.collected) continue;
    items.push({d:camDepth(c.y,c.z), kind:'c', c});
  }
  items.push({d:camDepth(player.y,player.z)-1, kind:'me'});
  items.sort((a,b)=>b.d-a.d);
  for(const it of items){
    if(it.kind==='p') drawPlatform(it.p,t);
    else if(it.kind==='c') drawItem(it.c,t);
    else drawPlayer(t);   // 死亡瞬間也畫出角色（驚訝表情），死因一目了然
  }
  // 3D 粒子
  for(const p of parts3){
    const s=project(p.x,p.y,p.z);
    if(!s) continue;
    ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
    ctx.fillStyle=p.color;
    const sz=Math.max(1.5, p.size*s.s*1.5);
    ctx.fillRect(s.x-sz/2, s.y-sz/2, sz, sz);
  }
  ctx.globalAlpha=1;
  // 餘燼
  for(const e of embers){
    ctx.globalAlpha=Math.min(0.8, e.life/3);
    ctx.fillStyle='#ffb04a';
    ctx.fillRect(e.x, e.y, e.sz, e.sz);
  }
  ctx.globalAlpha=1;
  ctx.restore();

  // v6 螢幕後製：烘焙暗角（聚焦畫面中心，零即時漸層）
  ctx.drawImage(vignetteCv, 0, 0);

  // 開場提示浮層
  if(gameState==='playing' && hintT<5.5 && curLevel===0){
    const a = hintT<4.5?1:(5.5-hintT);
    ctx.globalAlpha=a*(0.8+0.2*Math.sin(performance.now()/220));
    ctx.fillStyle='rgba(7,11,20,0.72)';
    const bw=Math.min(520,VW-30);
    ctx.beginPath(); ctx.roundRect(CX-bw/2, VH*0.68, bw, 62, 14); ctx.fill();
    ctx.strokeStyle='#ffcf5c'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(CX-bw/2, VH*0.68, bw, 62, 14); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='bold 17px sans-serif'; ctx.textAlign='center';
    ctx.fillText('往前走、跳到下一個平臺，抵達終點旗！', CX, VH*0.68+26);
    ctx.font='14px sans-serif'; ctx.fillStyle='#ffd98e';
    ctx.fillText('搖桿／WASD 移動・跳躍鈕／空白鍵 跳', CX, VH*0.68+48);
    ctx.globalAlpha=1;
  }
  // HUD 數值
  if(gameState==='playing'){
    elapsed+=dt; hintT+=dt;
    const prog=Math.max(0,Math.min(100,(player.z/GOAL_Z)*100));
    const pTxt=prog.toFixed(0)+'%';
    if(hudCache.p!==pTxt){ hudCache.p=pTxt; document.getElementById('progressTxt').textContent=pTxt; }
    const tTxt=elapsed.toFixed(1);
    if(hudCache.t!==tTxt){ hudCache.t=tTxt; document.getElementById('timeTxt').textContent=tTxt; }
  }
}
const hudCache={p:'',t:''};

/* ===================== 標題／選關 UI ===================== */
/* 直向裝置提示：只在標題畫面、且偵測到直立時顯示，不擋遊玩 */
const orientHint=document.getElementById('orientHint');
function updateOrientHint(){ orientHint.classList.toggle('hidden', !(gameState==='title' && VW<VH)); }
addEventListener('resize', updateOrientHint);
const lvGrid=document.getElementById('lvGrid');
function renderLvGrid(){
  lvGrid.innerHTML='';
  LEVELS.forEach((L,i)=>{
    const b=document.createElement('button');
    const open=unlockedLv(i);
    b.className='lvbtn'+(open?'':' locked');
    b.innerHTML = open
      ? `<div>第${i+1}關</div><small>${L.name.split(' ')[1]}</small><div class="stars">${'★'.repeat(stars[i])||'☆☆☆'}</div>`
      : `<div>第${i+1}關</div><small>鎖定中</small><svg width="16" height="16" viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="2.5" fill="#5a6a85"/><path d="M8 10V7a4 4 0 018 0v3" stroke="#5a6a85" stroke-width="2.4" fill="none"/></svg>`;
    if(open) b.addEventListener('click', ()=>{ audio(); startGame(i); });
    else b.addEventListener('click', ()=>beep(150,0.09,'sawtooth',0.1,-40));
    lvGrid.appendChild(b);
  });
  // 開始遊戲＝最新解鎖關
  pickedLevel=0;
  for(let i=LEVELS.length-1;i>=0;i--) if(unlockedLv(i)){ pickedLevel=i; break; }
  document.getElementById('startBtn').textContent = '開始遊戲（'+LEVELS[pickedLevel].name.split(' ')[0]+'）';
}
document.getElementById('startBtn').addEventListener('click', ()=>{ audio(); startGame(pickedLevel); });
document.getElementById('againBtn').addEventListener('click', ()=>{ audio(); startGame(curLevel); });
document.getElementById('nextBtn').addEventListener('click', ()=>{
  audio();
  if(curLevel<LEVELS.length-1 && unlockedLv(curLevel+1)) startGame(curLevel+1);
});
document.getElementById('selectBtn').addEventListener('click', ()=>{
  document.getElementById('winScreen').classList.add('hidden');
  document.getElementById('titleScreen').classList.remove('hidden');
  document.body.classList.remove('playing');
  gameState='title';
  updateAmbient();
  renderLvGrid();
  updateOrientHint();
});
renderLvGrid();
buildLevel(0);
updateOrientHint();
updateEggBadge();

/* ===================== 主迴圈 ===================== */
const STEP=1/60;
let last=performance.now(), acc=0;
function frame(now){
  requestAnimationFrame(frame);
  acc+=Math.min((now-last)/1000, 0.1);
  last=now;
  const t=now/1000;
  while(acc>=STEP){
    if(freeze>0){ freeze=Math.max(0,freeze-STEP); acc-=STEP; continue; }  // 命中停頓：關鍵事件短暫凍幀增加重量感
    if(gameState==='playing') updatePhysics(STEP,t);
    updateParts3(STEP);
    updateEmbers(STEP);
    acc-=STEP;
  }
  render(STEP,t);
}
requestAnimationFrame(frame);

/* 測試掛鉤 */
window.__dbg = () => ({
  state: gameState, level: curLevel, elapsed: Math.round(elapsed*10)/10,
  x: Math.round(player.x), y: Math.round(player.y), z: Math.round(player.z),
  vy: Math.round(player.vy), grounded: player.grounded,
  checkpoint: checkpointIdx, deaths, stars: stars.slice(), muted,
  coinsThisRun, coinsTotal: levelCoins.filter(c=>c.type==='coin').length,
  eggFoundThisRun, eggsFound: [...eggsFound], boostT: Math.round(player.boostT*10)/10,
  levelCount: LEVELS.length
});
window.__forceWin = () => { if(gameState==='playing') winGame(); };
window.__teleport = (x,y,z) => { player.x=x; player.y=y; player.z=z; player.vx=player.vy=player.vz=0; };
window.__goal = () => { const g=platforms[platforms.length-1]; return { z:g.z, y:g.y }; };
</script>
<script>/* AI-CAMP-STATS-BEACON */
(function(){
  try{ if(window.top!==window.self) return; }catch(e){ return; } /* 在作品館內由作品館計數與投票 */
  var NS="ai-future-camp", K="pro-3D-5b2d93e1";
  var ABS="//abacus.jasoncameron.dev/"; /* 直連備援 */
  var REL="/abacus/"; /* 同源代理（Vercel 轉發）：學校閘道擋外部網域時仍然通 */
  function ping(n){
    try{
      fetch(REL+"hit/"+NS+"/"+n).then(function(r){
        if(!r||!r.ok){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); }
      }).catch(function(){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); });
    }catch(e){}
  }
  function read(n,cb){
    function via(base,next){ try{ fetch(base+"get/"+NS+"/"+n).then(function(r){ if(r.status===404&&base===ABS) return {value:0}; if(!r.ok) throw 0; return r.json(); }).then(function(j){ cb(j.value||j.count||0); }).catch(next); }catch(e){ next(); } }
    via(REL, function(){ via(ABS, function(){ cb(null); }); });
  }
  ping(K+"-v");
  var done=false;
  function once(){ if(done)return; done=true; ping(K+"-p"); ping("site-total-plays");
    window.removeEventListener("pointerdown",once); window.removeEventListener("keydown",once); }
  window.addEventListener("pointerdown",once,{once:false}); window.addEventListener("keydown",once,{once:false});
  /* 投票鈕：非常好玩/好玩——與作品館同一計數器，任何網頁打開都同步 */
  function initVotes(){
    if(!document.body) return;
    var wrap=document.createElement("div");
    wrap.style.cssText="position:fixed;right:10px;bottom:10px;z-index:99999;display:flex;gap:6px;font-family:sans-serif;opacity:.92";
    var LS="voted-"+K;
    var defs=[["-love","\u2764\uFE0F","\u975e\u5e38\u597d\u73a9","#ff6cc7"],["-like","\ud83d\udc4d","\u597d\u73a9","#38e1ff"]];
    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;
          b.querySelector("i").textContent=Math.max(0,(n||0)-(c||0));
        }); });
      });
    }
    defs.forEach(function(d){
      var b=document.createElement("button");
      b.type="button"; b.title=d[2];
      b.style.cssText="min-height:42px;padding:8px 14px;border:none;border-radius:999px;background:rgba(15,18,32,.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation";
      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";
      b.addEventListener("click",function(){
        var prev=null; try{ prev=localStorage.getItem(LS); }catch(e){}
        if(prev===d[0]){ ping(K+d[0]+"-c"); try{ localStorage.removeItem(LS); }catch(e){} }
        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);
      });
      btns[d[0]]=b; wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    refresh();
    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* 每10秒同步別人投的票 */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
</script>
