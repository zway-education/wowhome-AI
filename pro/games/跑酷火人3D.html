<!doctype html>
<!-- 專業AI升級 v1 -->
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="author" content="AI未來創作營隊">
<title>跑酷火人3D PRO</title>
<style>
  :root{
    --brand-cyan:#38e1ff; --brand-blue:#4f7cff; --brand-purple:#9a6bff; --brand-pink:#ff6cc7;
    --gold1:#ffcf5c; --gold2:#ffa72e; --gold3:#ff7e3d; --bg-dark:#0a0805;
  }
  html,body{margin:0;height:100%;background:var(--bg-dark);overflow:hidden;touch-action:none;
    -webkit-user-select:none;user-select:none;font-family:"PingFang TC","Microsoft JhengHei",sans-serif}
  #stage{position:absolute;inset:0;overflow:hidden}
  #perspective{position:absolute;inset:0;perspective:1400px;perspective-origin:50% 38%;overflow:hidden}
  #sky1,#sky2{position:absolute;inset:0;transition:none}
  #sky1{
    background:
      radial-gradient(ellipse at 50% 100%, #ff7e3d 0%, #ff3d1c 18%, #4a0f08 42%, #180608 65%, #070307 100%),
      radial-gradient(ellipse at 20% 15%, rgba(255,170,80,.25), transparent 55%),
      radial-gradient(ellipse at 80% 10%, rgba(255,90,60,.2), transparent 55%);
  }
  #sky2{
    opacity:0;
    background:
      radial-gradient(ellipse at 50% 100%, #ff8c50 0%, #c8347a 20%, #4a1050 46%, #180a28 68%, #05030a 100%),
      radial-gradient(ellipse at 25% 12%, rgba(255,200,120,.3), transparent 55%),
      radial-gradient(ellipse at 78% 8%, rgba(154,107,255,.28), transparent 55%);
  }
  .starlayer{position:absolute;inset:0;opacity:0;pointer-events:none}
  .star{position:absolute;border-radius:50%;background:#fff;box-shadow:0 0 4px rgba(255,255,255,.8)}
  .ember{position:absolute;bottom:-10px;border-radius:50%;background:radial-gradient(circle,#ffe08a,#ff7e3d 60%,transparent 75%);
    opacity:.85;filter:blur(.3px);animation:emberRise linear infinite}
  @keyframes emberRise{
    0%{transform:translateY(0) translateX(0);opacity:0}
    10%{opacity:.9}
    90%{opacity:.5}
    100%{transform:translateY(-115vh) translateX(var(--drift,20px));opacity:0}
  }
  .shimmer{position:absolute;bottom:0;left:0;right:0;height:38vh;pointer-events:none;
    background:linear-gradient(0deg, rgba(255,140,60,.10), transparent);
    animation:shimmerWave 3.4s ease-in-out infinite}
  @keyframes shimmerWave{0%,100%{opacity:.5;transform:translateY(0)}50%{opacity:.85;transform:translateY(-6px)}}
  #camrig{position:absolute;left:50%;top:50%;transform-style:preserve-3d;will-change:transform}
  #world{position:absolute;left:0;top:0;transform-style:preserve-3d}
  .part{position:absolute;transform-style:preserve-3d;left:0;top:0}
  .face{position:absolute;left:0;top:0;backface-visibility:hidden}
  /* HUD / UI layers: use PRO gold accent system */
  #hud{position:absolute;inset:0;pointer-events:none;font-family:inherit}
  .hud-top{position:absolute;top:max(10px,env(safe-area-inset-top));left:0;right:0;
    display:flex;justify-content:space-between;align-items:flex-start;padding:0 14px;gap:8px;pointer-events:none}
  .hud-left,.hud-right{display:flex;flex-direction:column;gap:6px;align-items:flex-start}
  .hud-right{align-items:flex-end}
  .pill{background:rgba(10,8,5,.66);border:1px solid rgba(255,167,46,.4);border-radius:14px;
    padding:7px 13px;color:#fff3df;font-size:14px;font-weight:700;
    box-shadow:0 2px 10px rgba(0,0,0,.4)}
  .pill b{background:linear-gradient(92deg,var(--gold1),var(--gold2),var(--gold3));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .coinpill{display:flex;align-items:center;gap:6px}
  .coinicon{width:14px;height:14px;border-radius:3px;background:linear-gradient(135deg,var(--gold1),var(--gold3));
    box-shadow:0 0 6px rgba(255,167,46,.7);transform:rotate(45deg)}
  #dots{display:flex;gap:4px}
  .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.25);border:1px solid rgba(255,167,46,.4)}
  .dot.on{background:linear-gradient(135deg,var(--gold1),var(--gold3));box-shadow:0 0 6px rgba(255,167,46,.8)}
  #comboText{position:absolute;left:50%;top:26%;transform:translate(-50%,-50%) scale(.8);
    font-size:20px;font-weight:900;color:var(--gold1);text-shadow:0 0 12px rgba(255,167,46,.8);
    opacity:0;pointer-events:none;transition:opacity .15s, transform .18s}
  #comboText.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
  #biomeText{position:absolute;left:50%;top:14%;transform:translate(-50%,-50%);
    font-size:15px;letter-spacing:3px;color:#fff3df;opacity:0;pointer-events:none;transition:opacity .5s;
    text-shadow:0 2px 10px rgba(0,0,0,.6)}
  #biomeText.show{opacity:1}
  #topBtns{display:flex;gap:8px;pointer-events:auto}
  #muteBtn,#pauseBtn{cursor:pointer;width:44px;height:44px;border-radius:50%;
    background:rgba(10,8,5,.66);border:1px solid rgba(255,167,46,.45);color:#fff3df;font-size:18px;
    display:flex;align-items:center;justify-content:center}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;color:#fff3df;background:radial-gradient(ellipse at 50% 30%, rgba(60,20,10,.55), rgba(10,8,5,.86));
    pointer-events:auto;gap:14px;padding:20px;box-sizing:border-box}
  .screen.hidden{display:none}
  .title-logo{font-size:clamp(30px,7vw,54px);font-weight:900;letter-spacing:2px;
    background:linear-gradient(92deg,var(--gold1),var(--gold2),var(--gold3));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 34px rgba(255,140,50,.45)}
  .prochip{font-size:11px;font-weight:900;letter-spacing:3px;color:#0a0805;background:linear-gradient(92deg,var(--gold1),var(--gold3));
    padding:3px 10px;border-radius:8px;display:inline-block;margin-bottom:2px}
  .subtitle{font-size:14px;color:#e2c9a8;margin-top:-8px}
  .howto{background:rgba(255,255,255,.05);border:1px solid rgba(255,167,46,.3);border-radius:14px;
    padding:12px 18px;font-size:14px;line-height:1.7;max-width:440px}
  .howto b{color:var(--gold1)}
  .bigbtn{cursor:pointer;min-height:52px;min-width:180px;border:none;border-radius:16px;
    font-size:19px;font-weight:800;color:#2a1400;
    background:linear-gradient(92deg,var(--gold1),var(--gold2),var(--gold3));
    box-shadow:0 6px 18px rgba(255,140,50,.4);padding:10px 26px}
  .bigbtn:active{transform:scale(.96)}
  .ghostbtn{cursor:pointer;min-height:44px;min-width:140px;border-radius:14px;font-size:15px;font-weight:700;
    color:#fff3df;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.25);padding:8px 20px}
  .stat{font-size:15px;color:#e9d9c2}
  .stat b{color:var(--gold2)}
  .medal{font-size:38px;margin-top:-4px}
  #deathFlash{position:absolute;inset:0;background:#ff2d0e;opacity:0;pointer-events:none;transition:opacity .08s}
  /* touch controls */
  #joyZone,#jumpBtn{position:absolute;pointer-events:auto;touch-action:none}
  #joyZone{left:18px;bottom:max(18px,env(safe-area-inset-bottom));width:132px;height:132px;
    border-radius:50%;background:rgba(255,255,255,.08);border:2px solid rgba(255,167,46,.4)}
  #joyStick{position:absolute;left:50%;top:50%;width:58px;height:58px;margin:-29px 0 0 -29px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#ffe6ad,var(--gold2) 70%);box-shadow:0 3px 10px rgba(0,0,0,.4)}
  #jumpBtn{right:22px;bottom:max(26px,env(safe-area-inset-bottom));width:84px;height:84px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,var(--gold1),var(--gold3) 75%);
    box-shadow:0 4px 14px rgba(255,140,50,.5);color:#2a1400;font-weight:900;font-size:16px;
    display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.35)}
  #jumpBtn:active,#joyZone.active{filter:brightness(1.15)}
  #touchHint{display:none}
  @media (pointer:coarse){ #touchHint{display:inline} }
  #particleCanvas{position:absolute;inset:0;pointer-events:none}
  #pauseScreen .howto{max-width:300px}
</style>
</head>
<body>
<div id="stage">
  <div id="sky1"></div>
  <div id="sky2"></div>
  <div id="stars" class="starlayer"></div>
  <div id="embers"></div>
  <div class="shimmer"></div>
  <div id="perspective">
    <div id="camrig">
      <div id="world"></div>
    </div>
  </div>
  <canvas id="particleCanvas"></canvas>
</div>

<div id="hud">
  <div class="hud-top">
    <div class="hud-left">
      <div class="pill">進度 <b id="progressTxt">0%</b></div>
      <div class="pill coinpill"><span class="coinicon"></span> <b id="coinTxt">0</b>/<span id="coinTotalTxt">0</span></div>
      <div id="dots"></div>
    </div>
    <div class="hud-right">
      <div id="topBtns">
        <div id="pauseBtn">❚❚</div>
        <div id="muteBtn">🔊</div>
      </div>
      <div class="pill">時間 <b id="timeTxt">0.0</b>s</div>
    </div>
  </div>
  <div id="comboText">COMBO!</div>
  <div id="biomeText">熔岩洞穴</div>
</div>

<div id="deathFlash"></div>

<div id="titleScreen" class="screen">
  <div class="prochip">PRO 升級版</div>
  <div class="title-logo">跑酷火人3D</div>
  <div class="subtitle">AI未來創作營隊 出品 · 雙場景加強版</div>
  <div class="howto">
    <div>💻 電腦：<b>WASD</b> 移動、<b>空白鍵</b> 跳躍</div>
    <div>📱 觸控：左下 <b>虛擬搖桿</b> 移動、右下 <b>跳躍鈕</b></div>
    <div style="margin-top:6px;color:#c9a97e">越過熔岩，踩穩平台，抵達終點旗！沿途蒐集金幣、留意噴發熔岩與強風平台。掉進熔岩會回到最近的檢查點。</div>
  </div>
  <button class="bigbtn" id="startBtn">開始遊戲</button>
  <div class="stat">最佳時間：<b id="titleBest">--</b> 秒　最多金幣：<b id="titleCoins">0</b></div>
</div>

<div id="pauseScreen" class="screen hidden">
  <div class="title-logo" style="font-size:32px">暫停中</div>
  <div class="howto">💻 空白鍵/滑鼠可繼續　📱 點按鈕繼續</div>
  <button class="bigbtn" id="resumeBtn">繼續遊戲</button>
  <button class="ghostbtn" id="quitBtn">回到標題</button>
</div>

<div id="winScreen" class="screen hidden">
  <div class="medal" id="winMedal">🏆</div>
  <div class="title-logo" style="background:linear-gradient(92deg,var(--gold1),var(--gold2),var(--gold3));-webkit-background-clip:text;background-clip:text">通關成功！</div>
  <div class="stat">本次時間：<b id="winTime">0.0</b> 秒</div>
  <div class="stat">最佳時間：<b id="bestTime">--</b> 秒</div>
  <div class="stat">金幣：<b id="winCoins">0</b> / <span id="winCoinsTotal">0</span>　最多金幣：<b id="bestCoins">0</b></div>
  <button class="bigbtn" id="againBtn">再玩一次</button>
</div>

<div id="joyZone"><div id="joyStick"></div></div>
<div id="jumpBtn">跳</div>

<script>
'use strict';
/* ===================== 基本設定 ===================== */
const perspectiveEl = document.getElementById('perspective');
const camrigEl = document.getElementById('camrig');
const worldEl = document.getElementById('world');
const pcanvas = document.getElementById('particleCanvas');
const pctx = pcanvas.getContext('2d');
const sky2El = document.getElementById('sky2');
const starsEl = document.getElementById('stars');
const biomeTextEl = document.getElementById('biomeText');

function resize(){
  const dpr = Math.min(devicePixelRatio||1, 2);
  pcanvas.width = innerWidth*dpr; pcanvas.height = innerHeight*dpr;
  pcanvas.style.width = innerWidth+'px'; pcanvas.style.height = innerHeight+'px';
  pctx.setTransform(dpr,0,0,dpr,0,0);
}
addEventListener('resize', resize); resize();

/* embers background decoration (DOM, cheap, generated once) */
(function makeEmbers(){
  const box = document.getElementById('embers');
  for(let i=0;i<32;i++){
    const e = document.createElement('div');
    e.className='ember';
    const size = 3+Math.random()*6;
    e.style.width=e.style.height=size+'px';
    e.style.left=(Math.random()*100)+'%';
    e.style.setProperty('--drift',(Math.random()*80-40)+'px');
    e.style.animationDuration=(6+Math.random()*8)+'s';
    e.style.animationDelay=(-Math.random()*14)+'s';
    box.appendChild(e);
  }
})();
(function makeStars(){
  for(let i=0;i<50;i++){
    const s = document.createElement('div');
    s.className='star';
    const size = 1+Math.random()*2;
    s.style.width=s.style.height=size+'px';
    s.style.left=(Math.random()*100)+'%';
    s.style.top=(Math.random()*55)+'%';
    s.style.opacity = (0.3+Math.random()*0.7).toFixed(2);
    starsEl.appendChild(s);
  }
})();

/* ===================== 音效 (Web Audio 合成) ===================== */
let AC=null, muted=false, masterGain=null, rumbleStarted=false;
function audio(){ if(!AC){ AC=new (window.AudioContext||window.webkitAudioContext)(); masterGain=AC.createGain(); masterGain.gain.value=1; masterGain.connect(AC.destination); startRumble(); } return AC; }
addEventListener('pointerdown', audio, {once:true});
addEventListener('keydown', audio, {once:true});
function beep(freq=440,dur=0.1,type='square',vol=0.15,slide=0){
  if(muted) return;
  const ac=audio(); if(!ac) return;
  const o=ac.createOscillator(), g=ac.createGain();
  o.type=type; o.frequency.setValueAtTime(freq, ac.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30,freq+slide), ac.currentTime+dur);
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+dur);
  o.connect(g).connect(masterGain);
  o.start(); o.stop(ac.currentTime+dur);
}
function noiseBurst(dur=0.3, vol=0.2){
  if(muted) return;
  const ac=audio(); if(!ac) return;
  const n = Math.floor(ac.sampleRate*dur);
  const buf = ac.createBuffer(1,n,ac.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
  const src = ac.createBufferSource(); src.buffer=buf;
  const g = ac.createGain(); g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+dur);
  src.connect(g).connect(masterGain); src.start();
}
function startRumble(){
  if(rumbleStarted || !AC) return;
  rumbleStarted = true;
  const n = AC.sampleRate*2;
  const buf = AC.createBuffer(1,n,AC.sampleRate);
  const d = buf.getChannelData(0);
  let last=0;
  for(let i=0;i<n;i++){ const white=Math.random()*2-1; d[i]=(last+0.02*white)/1.02; last=d[i]; d[i]*=3.2; }
  const src = AC.createBufferSource(); src.buffer=buf; src.loop=true;
  const lp = AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=140;
  const g = AC.createGain(); g.gain.value=0.05;
  src.connect(lp).connect(g).connect(masterGain);
  src.start();
  window.__rumbleGain = g;
}
let stepParity=0, comboCount=0, comboTimer=0;
const sfx = {
  jump: ()=>beep(220,0.14,'square',0.13,+380),
  land: ()=>beep(120,0.07,'triangle',0.1),
  step: ()=>{ stepParity^=1; beep(280+stepParity*40,0.03,'square',0.03); },
  checkpoint: ()=>{ beep(988,0.08,'square',0.14); setTimeout(()=>beep(1319,0.15,'square',0.14),80); },
  coin: ()=>beep(1400,0.06,'square',0.11,220),
  combo: (n)=>beep(900+Math.min(n,8)*90,0.09,'square',0.13,140),
  eruption: ()=>{ beep(90,0.22,'sawtooth',0.16,-40); noiseBurst(0.2,0.12); },
  death: ()=>{ beep(220,0.28,'sawtooth',0.2,-160); noiseBurst(0.35,0.18); },
  win: ()=>{ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.2,'square',0.15),i*110)); }
};
document.getElementById('muteBtn').addEventListener('click', ()=>{
  muted=!muted;
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
  if(window.__rumbleGain) window.__rumbleGain.gain.value = muted?0:0.05;
});

/* ===================== 輸入：鍵盤 + 觸控搖桿 ===================== */
const input = { mx:0, mz:0, jumpBuffer:0, jumpHeld:false, crouchPulse:false };
const KEYS = {};
addEventListener('keydown', e=>{
  if(['KeyW','KeyA','KeyS','KeyD','Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Escape','KeyP'].includes(e.code)) e.preventDefault();
  const was = KEYS[e.code];
  KEYS[e.code]=true;
  if(e.code==='Space' && !was){ input.jumpBuffer = 0.14; input.crouchPulse = true; }
  if((e.code==='Escape'||e.code==='KeyP') && !was){ togglePause(); }
});
addEventListener('keyup', e=>{ KEYS[e.code]=false; });
function readKeyboardAxes(){
  let mx=0, mz=0;
  if(KEYS.KeyA||KEYS.ArrowLeft) mx-=1;
  if(KEYS.KeyD||KEYS.ArrowRight) mx+=1;
  if(KEYS.KeyW||KEYS.ArrowUp) mz+=1;
  if(KEYS.KeyS||KEYS.ArrowDown) mz-=1;
  return {mx,mz};
}

/* virtual joystick (bottom-left) */
const joyZone = document.getElementById('joyZone');
const joyStick = document.getElementById('joyStick');
let joyActive=false, joyVec={x:0,y:0}, joyTouchId=null;
function joyFromEvent(t){
  const r = joyZone.getBoundingClientRect();
  const cx = r.left+r.width/2, cy = r.top+r.height/2;
  let dx = t.clientX-cx, dy = t.clientY-cy;
  const max = r.width/2;
  const len = Math.hypot(dx,dy);
  if(len>max){ dx=dx/len*max; dy=dy/len*max; }
  joyVec.x = dx/max; joyVec.y = dy/max;
  joyStick.style.transform = `translate(${dx}px,${dy}px)`;
}
function resetJoy(){ joyVec.x=0; joyVec.y=0; joyStick.style.transform='translate(0,0)'; joyActive=false; joyTouchId=null; joyZone.classList.remove('active'); }
joyZone.addEventListener('touchstart', e=>{
  e.preventDefault(); joyActive=true; joyZone.classList.add('active');
  const t=e.changedTouches[0]; joyTouchId=t.identifier; joyFromEvent(t);
}, {passive:false});
joyZone.addEventListener('touchmove', e=>{
  e.preventDefault();
  for(const t of e.changedTouches) if(t.identifier===joyTouchId) joyFromEvent(t);
}, {passive:false});
joyZone.addEventListener('touchend', e=>{ e.preventDefault(); resetJoy(); }, {passive:false});
joyZone.addEventListener('touchcancel', e=>{ e.preventDefault(); resetJoy(); }, {passive:false});

/* jump button (bottom-right) */
const jumpBtn = document.getElementById('jumpBtn');
function pressJump(){ input.jumpBuffer = 0.14; input.jumpHeld=true; input.crouchPulse=true; audio(); }
function releaseJump(){ input.jumpHeld=false; }
jumpBtn.addEventListener('touchstart', e=>{ e.preventDefault(); pressJump(); }, {passive:false});
jumpBtn.addEventListener('touchend', e=>{ e.preventDefault(); releaseJump(); }, {passive:false});
jumpBtn.addEventListener('touchcancel', e=>{ e.preventDefault(); releaseJump(); }, {passive:false});
jumpBtn.addEventListener('mousedown', e=>{ e.preventDefault(); pressJump(); });
addEventListener('mouseup', releaseJump);

document.getElementById('pauseBtn').addEventListener('click', togglePause);

/* ===================== 世界座標 -> CSS 3D ===================== */
function tf(x,y,z, extra=''){ return `translate3d(${x}px, ${-y}px, ${-z}px) ${extra}`; }

/* ===================== 關卡資料（雙場景：熔岩洞穴 -> 火山天橋）===================== */
// platform: {x,y,z,w,d, type:'normal'|'moving'|'crumble'|'rotate'|'geyser'|'wind', biome, checkpoint}
const BIOME_SPLIT = 3000; // z at which biome2 (volcanic sky bridge) visuals take over
function buildLevel(){
  const plats = [];
  function add(x,y,zz,w,d,opts={}){
    const biome = zz>=BIOME_SPLIT-200 ? 2 : 1;
    plats.push(Object.assign({x,y,z:zz,w,d,type:'normal',biome,phase:Math.random()*6.28}, opts));
    return plats[plats.length-1];
  }
  /* ---- 熔岩洞穴 ---- */
  // 起 - 安全學習區 (寬、近)
  add(0,0,0,140,140,{checkpoint:true, start:true});
  add(0,0,260,130,130);
  add(0,10,520,120,120);
  add(60,10,760,110,110);
  add(-40,20,1000,110,110,{checkpoint:true});
  // 承 - 略窄、略遠、開始有落差 + 第一個旋轉平台
  add(40,30,1250,95,95);
  add(-60,40,1490,90,90,{type:'rotate'});
  add(20,30,1730,85,85);
  add(90,45,1960,80,80,{type:'wind', move:{axis:'x', range:70, speed:1.2}});
  add(0,55,2200,80,80,{checkpoint:true});
  // 轉 - 移動平台、噴發熔岩、崩塌平台混合
  add(-80,60,2440,70,70,{type:'moving', move:{axis:'x', range:110, speed:1.1}});
  add(60,70,2680,68,68,{type:'geyser', cycle:2.6, warn:0.7});

const particles = [];
function spawnParticles(sx,sy,sz,color,n,speed,life=0.5,size=6,grav=500){
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2, s = speed*(0.3+Math.random()*0.7);
    particles.push({x:sx,y:sy,z:sz,vx:Math.cos(a)*s,vy:Math.sin(a)*s*0.6+80,vz:Math.sin(a+1.7)*s,life,maxLife:life,color,size,grav});
    if(particles.length>380) particles.shift();
  }
}
function updateParticles(dt){
  for(const p of particles){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.z+=(p.vz||0)*dt; p.vy-=p.grav*dt; p.life-=dt; }
  for(let i=particles.length-1;i>=0;i--) if(particles[i].life<=0) particles.splice(i,1);
}
function worldToScreen(wx,wy,wz){
  const relX = wx - cam.x, relY = wy - cam.y, relZ = wz - cam.z;
  const persp = 900;
  const scale = persp/(persp+relZ*Math.cos(cam.tiltX*Math.PI/180));
  const sx = innerWidth/2 + relX*scale;
  const sy = innerHeight*0.42 - relY*scale*0.9;
  return {x:sx,y:sy,scale};
}
function drawParticles(){
  pctx.clearRect(0,0,innerWidth,innerHeight);
  for(const p of particles){
    const s = worldToScreen(p.x,p.y,p.z);
    const alpha = Math.max(0, p.life/p.maxLife);
    pctx.globalAlpha = alpha;
    pctx.fillStyle = p.color;
    const size = Math.max(1,p.size*s.scale);
    pctx.fillRect(s.x-size/2, s.y-size/2, size, size);
  }
  pctx.globalAlpha=1;
}

/* ===================== 碰撞：AABB 分軸 ===================== */
function platAABB(p, t){
  let px=p.x, py=p.y, pz=p.z;
  if((p.type==='moving'||p.type==='wind') && p.move){
    const off = Math.sin(t*p.move.speed + p.phase)*p.move.range;
    if(p.move.axis==='x') px+=off; else if(p.move.axis==='y') py+=off; else pz+=off;
  }
  let bump = 0;
  if(p.type==='geyser' && p.cycle){
    const ph = ((t + p.phase) % p.cycle) / p.cycle;
    if(ph > 1-p.warn/p.cycle - 0.12/p.cycle) bump = 0; // pre-warn (still flat)
  }
  return {x:px,y:py+bump,z:pz,w:p.w,d:p.d, top:py+bump+11};
}
function geyserState(p,t){
  if(p.type!=='geyser') return 'idle';
  const cyclePos = (t + p.phase) % p.cycle;
  const eruptStart = p.cycle - 0.35;
  if(cyclePos >= eruptStart) return 'erupt';
  if(cyclePos >= eruptStart - p.warn) return 'warn';
  return 'idle';
}

function updatePhysics(dt, t){
  // horizontal input
  let mx=0, mz=0;
  const kb = readKeyboardAxes();
  mx = kb.mx; mz = kb.mz;
  if(joyVec.x||joyVec.y){ mx = joyVec.x; mz = -joyVec.y; }
  const len = Math.hypot(mx,mz);
  if(len>1){ mx/=len; mz/=len; }

  const targetVX = mx*MAX_SPEED, targetVZ = mz*MAX_SPEED;
  const accel = (player.grounded? MOVE_ACCEL : MOVE_ACCEL*AIR_ACCEL_MULT);
  const decel = (player.grounded? MOVE_DECEL : MOVE_DECEL*AIR_ACCEL_MULT);
  function approach(cur,target,a,d){
    const rate = (Math.abs(target)>0.01)? a : d;
    const diff = target-cur;
    const step = rate*dt;
    if(Math.abs(diff)<=step) return target;
    return cur+Math.sign(diff)*step;
  }
  player.vx = approach(player.vx, targetVX, accel, decel);
  player.vz = approach(player.vz, targetVZ, accel, decel);

  // wind conveyor push while grounded on a 'wind' platform
  if(player.grounded && player.groundPlat && player.groundPlat.type==='wind' && player.groundPlat.move){
    const p = player.groundPlat;
    const windVel = Math.cos(t*p.move.speed + p.phase)*p.move.range*p.move.speed;
    if(p.move.axis==='x') player.vx += windVel*0.5*dt*8;
  }

  player.running = (Math.abs(player.vx)+Math.abs(player.vz))>10;
  if(mx!==0 || mz!==0) player.facing = Math.atan2(mx,mz);

  // jump anticipation squash (instant crouch pulse on press, independent of actual jump timing)
  if(input.crouchPulse){
    input.crouchPulse = false;
    if(player.grounded){ player.sx=1.14; player.sy=0.8; player.sz=1.14; }
  }

  // coyote
  if(player.grounded) player.coyote = COYOTE_MAX;
  else player.coyote = Math.max(0, player.coyote-dt);

  // jump buffer
  if(input.jumpBuffer>0){
    if(player.coyote>0){
      player.vy = JUMP_V;
      player.grounded=false; player.coyote=0; input.jumpBuffer=0;
      sfx.jump();
      player.sy=1.35; player.sx=0.72; player.sz=0.72;
      spawnParticles(player.x, player.y+4, player.z, '#ffcf5c', 8, 140, 0.35, 5, 250);
    }
  }
  input.jumpBuffer = Math.max(0, input.jumpBuffer-dt);

  // variable jump height (release early cuts upward velocity)
  if(!input.jumpHeld && !KEYS.Space && player.vy>0){ player.vy *= (1 - 6*dt); }

  // gravity
  const g = player.vy>0 ? GRAVITY : GRAVITY_FALL;
  player.vy = Math.max(-MAX_FALL, player.vy - g*dt);

  // move X then Z then Y
  player.x += player.vx*dt;
  player.z += player.vz*dt;
  const prevY = player.y;
  player.y += player.vy*dt;

  // check landing on any platform under the player
  let landed=false, landedPlat=null;
  for(const p of platforms){
    if(p.type==='crumble' && p.gone) continue;
    const box = platAABB(p, t);
    const halfW = box.w*1.08, halfD = box.d*1.08;
    if(Math.abs(player.x-box.x) < halfW && Math.abs(player.z-box.z) < halfD){
      const top = box.top;
      if(player.vy<=0 && prevY >= top-2 && player.y <= top){
        player.y = top;
        player.vy = 0;
        landed = true; landedPlat = p;
        break;
      }
    }
  }
  const wasGrounded = player.grounded;
  player.grounded = landed;
  if(landed){
    player.groundPlat = landedPlat;
    if(!wasGrounded){
      sfx.land();
      player.sy=0.65; player.sx=1.3; player.sz=1.3;
      spawnParticles(player.x, player.y+2, player.z, '#ffb15c', 6, 100, 0.3, 5, 200);
    }
    if(landedPlat.checkpoint){
      const idx = platforms.indexOf(landedPlat);
      if(landedPlat.z > player.respawnPoint.z || (idx===0 && player.respawnPoint.z!==landedPlat.z)){
        player.respawnPoint = {x:landedPlat.x, y:landedPlat.y+40, z:landedPlat.z};
        sfx.checkpoint();
        refreshDots();
      }
    }
    if(landedPlat.type==='crumble'){
      if(landedPlat.crumbleT===undefined) landedPlat.crumbleT=0;
      landedPlat.crumbling=true;
    }
    if(landedPlat.type==='geyser'){
      const st = geyserState(landedPlat, t);
      if(st==='erupt' && (landedPlat._lastErupt===undefined || t-landedPlat._lastErupt>1)){
        landedPlat._lastErupt = t;
        player.vy = JUMP_V*1.25;
        player.grounded=false;
        sfx.eruption();
        shake = Math.max(shake, 8);
        spawnParticles(landedPlat.x, landedPlat.y+15, landedPlat.z, '#ff5c1c', 16, 200, 0.5, 6, 300);
      }
    }
    if(landedPlat.type==='goal' && gameState==='playing'){
      winGame();
    }
  }

  // crumble timers
  for(const p of platforms){
    if(p.type==='crumble' && p.crumbling && !p.gone){
      p.crumbleT += dt;
      const shrink = Math.min(1, p.crumbleT/0.5);
      if(p.el) p.el.style.opacity = String(1-shrink*0.9);
      if(p.crumbleT>0.5){ p.gone=true; if(p.el) p.el.style.display='none'; }
    }
  }

  // coin pickups
  for(const c of coins){
    if(c.got) continue;
    const dx=player.x-c.x, dy=(player.y+20)-c.y, dz=player.z-c.z;
    if(dx*dx+dy*dy+dz*dz < 42*42){
      c.got = true;
      if(c.el) c.el.style.display='none';
      coinCount++;
      coinTxt.textContent = String(coinCount);
      sfx.coin();
      spawnParticles(c.x, c.y, c.z, '#ffcf5c', 10, 140, 0.4, 5, 200);
      comboTimer = 1.1; comboCount++;
      if(comboCount>=2){
        sfx.combo(comboCount);
        comboTextEl.textContent = 'COMBO x'+comboCount;
        comboTextEl.classList.add('show');
        clearTimeout(window.__comboHideT);
        window.__comboHideT = setTimeout(()=>comboTextEl.classList.remove('show'), 600);
      }
    }
  }
  if(comboTimer>0){ comboTimer -= dt; if(comboTimer<=0) comboCount=0; }

  // fall death (below lava plane)
  if(player.y < -60){
    die();
    return;
  }

  // squash/stretch spring back
  player.sx += (1-player.sx)*10*dt;
  player.sy += (1-player.sy)*10*dt;
  player.sz += (1-player.sz)*10*dt;

  // running dust/fire trail
  if(player.running && player.grounded){
    player.animT += dt;
    if(player.animT>0.14){
      player.animT=0;
      sfx.step();
      spawnParticles(player.x - player.vx*0.02, player.y+2, player.z - player.vz*0.02, '#ff7e3d', 3, 60, 0.28, 4, 150);
    }
  }
  // fire trail while airborne
  if(!player.grounded && Math.random()<0.6){
    spawnParticles(player.x, player.y+10, player.z, Math.random()<0.5?'#ffcf5c':'#ff5c1c', 1, 30, 0.4, 5, 60);
  }
  // heat-shimmer ambient over lava (very light density, only near player height)
  if(Math.random()<0.15){
    spawnParticles(player.x+(Math.random()*300-150), -20, player.z+(Math.random()*200-50), 'rgba(255,140,60,.25)', 1, 10, 1.0, 10, -10);
  }
}

/* ===================== 渲染 ===================== */
let biomeShown1=false, biomeShown2=false;
function render(dt){
  const targetCamZ = player.z - 320;
  const targetCamY = player.y + 130;
  cam.x += (player.x - cam.x) * (1 - Math.pow(0.001, dt));
  cam.z += (targetCamZ - cam.z) * (1 - Math.pow(0.001, dt));
  cam.y += (targetCamY - cam.y) * (1 - Math.pow(0.001, dt));

  let shakeX=0, shakeY=0;
  if(shake>0){
    shake *= Math.pow(0.001, dt);
    if(shake<0.1) shake=0;
    shakeX = (Math.random()*2-1)*shake;
    shakeY = (Math.random()*2-1)*shake;
  }

  camrigEl.style.transform =
    `translate3d(${shakeX}px, ${shakeY}px, 0) rotateX(${cam.tiltX}deg) translate3d(${-cam.x}px, ${cam.y}px, ${cam.z}px)`;

  // biome crossfade based on player's progress through the transition band
  const bandStart = BIOME_SPLIT-500, bandEnd = BIOME_SPLIT+300;
  const bt = Math.max(0, Math.min(1, (player.z-bandStart)/(bandEnd-bandStart)));
  sky2El.style.opacity = String(bt);
  starsEl.style.opacity = String(bt*0.9);
  if(bt<0.5 && !biomeShown1){ biomeShown1=true; biomeShown2=false; biomeTextEl.textContent='熔岩洞穴'; biomeTextEl.classList.add('show'); clearTimeout(window.__biomeT); window.__biomeT=setTimeout(()=>biomeTextEl.classList.remove('show'),1800); }
  if(bt>=0.5 && !biomeShown2){ biomeShown2=true; biomeShown1=false; biomeTextEl.textContent='火山天橋'; biomeTextEl.classList.add('show'); clearTimeout(window.__biomeT); window.__biomeT=setTimeout(()=>biomeTextEl.classList.remove('show'),1800); }

  // player art transform
  playerRoot.style.transform = tf(player.x, player.y, player.z, `rotateY(${player.facing}rad)`);
  const bob = player.grounded ? Math.sin(player.animT*40)*2 : 0;
  parts.torso.style.transform = tf(0,26+bob,0, `scale(${player.sx},${player.sy})`);
  parts.head.style.transform  = tf(0,49+bob,0, `scale(${player.sx*0.98},${player.sy*0.98})`);
  const legSwing = player.running && player.grounded ? Math.sin(performance.now()/90)*22 : 0;
  parts.armL.style.transform = tf(-16,28+bob,0, `rotateX(${-legSwing}deg)`);
  parts.armR.style.transform = tf(16,28+bob,0, `rotateX(${legSwing}deg)`);
  parts.legL.style.transform = tf(-7,9,0, `rotateX(${legSwing}deg)`);
  parts.legR.style.transform = tf(7,9,0, `rotateX(${-legSwing}deg)`);
  const flick = 0.9+Math.sin(performance.now()/120)*0.06;
  parts.torso.style.filter = `brightness(${flick})`;
  parts.head.style.filter = `brightness(${flick})`;

  // platform positions (all platforms, static + moving + rotate + geyser)
  const t = performance.now()/1000;
  for(const p of platforms){
    if(p.type==='crumble' && p.gone) continue;
    const box = platAABB(p,t);
    let extra = '';
    if(p.type==='rotate'){ extra = `rotateY(${(t*40+p.phase*30)%360}deg)`; }
    p.el.style.transform = tf(box.x, box.y, box.z, extra);
    if(p.type==='geyser'){
      const st = geyserState(p,t);
      if(p.topEl) p.topEl.style.filter = st==='warn' ? 'brightness(1.6) saturate(1.4)' : st==='erupt' ? 'brightness(2.2)' : 'brightness(1)';
    }
    if(p.flagEl) p.flagEl.style.transform = tf(box.x, box.y+22, box.z);
  }
  // coins spin
  for(const c of coins){
    if(c.got) continue;
    c.el.style.transform = tf(c.x, c.y + Math.sin(t*2+c.z*0.01)*6, c.z, `rotateY(${(t*90)%360}deg)`);
  }

  drawParticles();

  // HUD
  const progress = Math.max(0, Math.min(100, (player.z/GOAL_Z)*100));
  progressTxt.textContent = progress.toFixed(0)+'%';
  if(gameState==='playing') elapsed += dt;
  timeTxt.textContent = elapsed.toFixed(1);
}

/* ===================== 主迴圈 ===================== */
const STEP = 1/60;
let last = performance.now(), acc=0;
function frame(now){
  requestAnimationFrame(frame);
  acc += Math.min((now-last)/1000, 0.1);
  last = now;
  while(acc>=STEP){
    if(gameState==='playing'){
      updatePhysics(STEP, now/1000);
    }
    updateParticles(STEP);
    acc -= STEP;
  }
  render(STEP);
}
requestAnimationFrame(frame);
</script>
