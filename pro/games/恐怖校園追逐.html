// ---------- OpenMoji inline icons (CC BY-SA 4.0 openmoji.org) ----------
const ICON_DOOR = '<svg viewBox="0 0 72 72" class="icon-inline"><rect x="18" y="9" width="36" height="54" fill="#A57939" stroke="#000" stroke-width="2"/><rect x="24" y="14" width="24" height="16.3" fill="#6A462F" stroke="#000" stroke-width="2"/><rect x="24" y="45.7" width="24" height="11.2" fill="#6A462F" stroke="#000" stroke-width="2"/><ellipse cx="49" cy="36.5" rx="2.5" ry="2" fill="#000"/></svg>';
const ICON_KEY = '<svg viewBox="0 0 72 72" class="icon-inline"><path fill="#F4AA41" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M30.7,34.7L14.3,50.7v7.2h7.6v-4.6h5.1v-5.8h5.1l2.4-2.4v-4.4h2"/><circle cx="48.5" cy="24" r="4" fill="#F4AA41" stroke="#000" stroke-width="2"/></svg>';
const ICON_SKULL = '<svg viewBox="0 0 72 72" class="icon-inline"><path fill="#e8e8e8" stroke="#000" stroke-width="2" d="M36 10c-12 0-20 9-20 20 0 7 3 11 6 14v9h8v-6h4v6h8v-9c3-3 6-7 6-14 0-11-8-20-20-20z"/><circle cx="28" cy="30" r="4" fill="#000"/><circle cx="44" cy="30" r="4" fill="#000"/></svg>';

// ---------- persistence ----------
const SAVE_KEY = 'horrorCampusChasePro.v1';
function loadSave() {
  try {
    const raw = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (raw && Array.isArray(raw.stars) && raw.stars.length === LEVELS.length) return raw;
  } catch (e) {}
  return { stars: LEVELS.map(() => 0), bestTime: LEVELS.map(() => null), unlocked: 1 };
}
function saveSave() { try { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); } catch (e) {} }

// ---------- level definitions (increasing difficulty) ----------
const LEVELS = [
  { name: '教室走廊', cols: 12, rows: 9,  chaserBase: 1.05, chaserRamp: 0.020, viewDist: 10.0, safeTime: 6.0, cabinetDensity: 0.55, par: [20, 32] },
  { name: '置物櫃區', cols: 14, rows: 10, chaserBase: 1.15, chaserRamp: 0.024, viewDist: 9.3,  safeTime: 5.0, cabinetDensity: 0.50, par: [26, 40] },
  { name: '實驗室迷宮', cols: 16, rows: 12, chaserBase: 1.28, chaserRamp: 0.027, viewDist: 8.6, safeTime: 4.0, cabinetDensity: 0.45, par: [32, 48] },
  { name: '舊圖書館', cols: 18, rows: 14, chaserBase: 1.42, chaserRamp: 0.030, viewDist: 7.6,  safeTime: 3.2, cabinetDensity: 0.40, par: [40, 58] },
  { name: '地下儲藏室', cols: 20, rows: 16, chaserBase: 1.58, chaserRamp: 0.033, viewDist: 6.6, safeTime: 2.5, cabinetDensity: 0.35, par: [48, 70] },
];
let save = loadSave();
let curLevel = 0; // 0-indexed

function computeStars(levelIdx, t, closeCalls) {
  const par = LEVELS[levelIdx].par;
  let base = t <= par[0] ? 3 : (t <= par[1] ? 2 : 1);
  if (closeCalls >= 6) base = Math.min(base, 1);
  else if (closeCalls >= 3) base = Math.min(base, 2);
  return Math.max(1, base);
}
function starString(n) {
  let s = '';
  for (let i = 0; i < 3; i++) s += i < n ? '★' : '<span class="starDim">★</span>';
  return s;
}

// ---------- canvas resize (dpr capped at 2) ----------
function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  canvas.width = Math.max(2, Math.floor(window.innerWidth * dpr));
  canvas.height = Math.max(2, Math.floor(window.innerHeight * dpr));
  bakeStaticLayers();
}
window.addEventListener('resize', resize);

// ---------- maze (perfect maze via DFS backtracker) ----------
let MAZE_COLS = 12, MAZE_ROWS = 9;
let maze;

function buildMaze() {
  maze = [];
  for (let r = 0; r < MAZE_ROWS; r++) {
    const row = [];
    for (let c = 0; c < MAZE_COLS; c++) row.push({ N: true, E: true, S: true, W: true, visited: false });
    maze.push(row);
  }
  const stack = [[0, 0]];
  maze[0][0].visited = true;
  while (stack.length) {
    const [r, c] = stack[stack.length - 1];
    const neighbors = [];
    if (r > 0 && !maze[r - 1][c].visited) neighbors.push(['N', r - 1, c]);
    if (r < MAZE_ROWS - 1 && !maze[r + 1][c].visited) neighbors.push(['S', r + 1, c]);
    if (c > 0 && !maze[r][c - 1].visited) neighbors.push(['W', r, c - 1]);
    if (c < MAZE_COLS - 1 && !maze[r][c + 1].visited) neighbors.push(['E', r, c + 1]);
    if (!neighbors.length) { stack.pop(); continue; }
    const [dir, nr, nc] = neighbors[Math.floor(Math.random() * neighbors.length)];
    const opposite = { N: 'S', S: 'N', E: 'W', W: 'E' };
    maze[r][c][dir] = false;
    maze[nr][nc][opposite[dir]] = false;
    maze[nr][nc].visited = true;
    stack.push([nr, nc]);
  }
}

let solid, gridW, gridH, wallSeed;

function buildSolidGrid() {
  gridW = MAZE_COLS * 2 + 1;
  gridH = MAZE_ROWS * 2 + 1;
  solid = Array.from({ length: gridH }, () => new Array(gridW).fill(true));
  wallSeed = Array.from({ length: gridH }, () => new Array(gridW).fill(0).map(() => Math.random()));
  for (let r = 0; r < MAZE_ROWS; r++) {
    for (let c = 0; c < MAZE_COLS; c++) {
      const gy = 2 * r + 1, gx = 2 * c + 1;
      solid[gy][gx] = false;
      const cell = maze[r][c];
      if (!cell.N) solid[gy - 1][gx] = false;
      if (!cell.S) solid[gy + 1][gx] = false;
      if (!cell.W) solid[gy][gx - 1] = false;
      if (!cell.E) solid[gy][gx + 1] = false;
    }
  }
}

function isSolid(x, y) {
  const gx = Math.floor(x), gy = Math.floor(y);
  if (gx < 0 || gy < 0 || gx >= gridW || gy >= gridH) return true;
  return solid[gy][gx];
}
function cellCenter(r, c) { return { x: 2 * c + 1.5, y: 2 * r + 1.5 }; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function worldToCell(x, y) {
  return { r: clamp(Math.floor((y - 1) / 2), 0, MAZE_ROWS - 1), c: clamp(Math.floor((x - 1) / 2), 0, MAZE_COLS - 1) };
}
function connected(r1, c1, r2, c2) {
  if (r2 === r1 - 1 && c2 === c1) return !maze[r1][c1].N;
  if (r2 === r1 + 1 && c2 === c1) return !maze[r1][c1].S;
  if (c2 === c1 - 1 && r2 === r1) return !maze[r1][c1].W;
  if (c2 === c1 + 1 && r2 === r1) return !maze[r1][c1].E;
  return false;
}
function bfsPath(startR, startC, goalR, goalC) {
  const visited = Array.from({ length: MAZE_ROWS }, () => new Array(MAZE_COLS).fill(false));
  const prev = Array.from({ length: MAZE_ROWS }, () => new Array(MAZE_COLS).fill(null));
  const queue = [[startR, startC]];
  visited[startR][startC] = true;
  while (queue.length) {
    const [r, c] = queue.shift();
    if (r === goalR && c === goalC) break;
    const dirs = [[r - 1, c], [r + 1, c], [r, c - 1], [r, c + 1]];
    for (const [nr, nc] of dirs) {
      if (nr < 0 || nr >= MAZE_ROWS || nc < 0 || nc >= MAZE_COLS) continue;
      if (visited[nr][nc]) continue;
      if (!connected(r, c, nr, nc)) continue;
      visited[nr][nc] = true;
      prev[nr][nc] = [r, c];
      queue.push([nr, nc]);
    }
  }
  if (!visited[goalR][goalC]) return null;
  const path = [[goalR, goalC]];
  let cur = [goalR, goalC];
  while (!(cur[0] === startR && cur[1] === startC)) { cur = prev[cur[0]][cur[1]]; path.push(cur); }
  path.reverse();
  return path;
}

function placeCabinets(density) {
  cabinets = [];
  const wc = { r: Math.floor(MAZE_ROWS / 2), c: Math.floor(MAZE_COLS / 2) };
  const candidates = [];
  for (let r = 0; r < MAZE_ROWS; r++) {
    for (let c = 0; c < MAZE_COLS; c++) {
      if (r === 0 && c === 0) continue;
      if (r === MAZE_ROWS - 1 && c === MAZE_COLS - 1) continue;
      if (r === 0 && c === MAZE_COLS - 1) continue;
      if (r === wc.r && c === wc.c) continue;
      candidates.push([r, c]);
    }
  }
  for (let i = candidates.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
  }
  const count = Math.min(candidates.length, Math.max(4, Math.floor(candidates.length * density)));
  for (let i = 0; i < count; i++) {
    const center = cellCenter(candidates[i][0], candidates[i][1]);
    cabinets.push({ x: center.x, y: center.y });
  }
}

function moveWithCollision(entity, nx, ny) {
  if (!isSolid(nx, entity.y)) entity.x = nx;
  if (!isSolid(entity.x, ny)) entity.y = ny;
}

// ---------- particle pool (screen-space, swap-pop) ----------
const MAX_PARTICLES = 160;
const particles = [];
function spawnParticles(cx, cy, color, n, speed, life, grav) {
  for (let i = 0; i < n; i++) {
    if (particles.length >= MAX_PARTICLES) particles.shift();
    const a = Math.random() * Math.PI * 2, s = speed * (0.3 + Math.random() * 0.7);
    particles.push({ x: cx, y: cy, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life, maxLife: life, color, grav: grav || 0, size: 3 + Math.random() * 3 });
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += p.grav * dt; p.life -= dt;
    if (p.life <= 0) { particles[i] = particles[particles.length - 1]; particles.pop(); }
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ---------- audio: single master bus (compressor) ----------
let audioCtx = null, masterGain = null;
function ensureAudio() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.9;
      const comp = audioCtx.createDynamicsCompressor();
      masterGain.connect(comp).connect(audioCtx.destination);
      masterGain._comp = comp;
    } catch (e) {}
  } else if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}
function pitchVar(base) { return base * (0.94 + Math.random() * 0.12); }

function playFootstep() {
  if (!audioCtx || muted) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(pitchVar(110), t);
  gain.gain.setValueAtTime(0.06, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
  osc.connect(gain).connect(masterGain);
  osc.start(t); osc.stop(t + 0.1);
}
function playJumpSound() {
  if (!audioCtx || muted) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(pitchVar(220), t);
  osc.frequency.exponentialRampToValueAtTime(440, t + 0.12);
  gain.gain.setValueAtTime(0.18, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
  osc.connect(gain).connect(masterGain);
  osc.start(t); osc.stop(t + 0.18);
}
function playHitSound() {
  if (!audioCtx || muted) return;
  const t = audioCtx.currentTime;
  const bufferSize = Math.floor(audioCtx.sampleRate * 0.12);
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 3);
  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(1200, t);
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.5, t);
  noise.connect(filter).connect(gain).connect(masterGain);
  noise.start(t);
}
function playPickupSound() {
  if (!audioCtx || muted) return;
  const t = audioCtx.currentTime;
  [660, 880, 1100].forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(pitchVar(f), t + i * 0.06);
    gain.gain.setValueAtTime(0.001, t + i * 0.06);
    gain.gain.exponentialRampToValueAtTime(0.22, t + i * 0.06 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.06 + 0.18);
    osc.connect(gain).connect(masterGain);
    osc.start(t + i * 0.06); osc.stop(t + i * 0.06 + 0.2);
  });
}
function playDoorOpen() {
  if (!audioCtx || muted) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(80, t);
  osc.frequency.exponentialRampToValueAtTime(50, t + 0.5);
  gain.gain.setValueAtTime(0.001, t);
  gain.gain.exponentialRampToValueAtTime(0.12, t + 0.08);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
  osc.connect(gain).connect(masterGain);
  osc.start(t); osc.stop(t + 0.62);
}
function playWinFanfare() {
  if (!audioCtx || muted) return;
  const t = audioCtx.currentTime;
  [523, 659, 784, 1046].forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(f, t + i * 0.12);
    gain.gain.setValueAtTime(0.001, t + i * 0.12);
    gain.gain.exponentialRampToValueAtTime(0.2, t + i * 0.12 + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.3);
    osc.connect(gain).connect(masterGain);
    osc.start(t + i * 0.12); osc.stop(t + i * 0.12 + 0.32);
  });
}
function playHeartbeat(vol) {
  if (!audioCtx || muted) return;
  const t = audioCtx.currentTime;
  [0, 0.14].forEach((delay, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.setValueAtTime(pitchVar(90 - i * 15), t + delay);
    osc.frequency.exponentialRampToValueAtTime(35, t + delay + 0.14);
    gain.gain.setValueAtTime(vol * (i === 0 ? 1 : 0.75), t + delay);
    gain.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.18);
    osc.connect(gain).connect(masterGain);
    osc.start(t + delay); osc.stop(t + delay + 0.2);
  });
}
function playScream() {
  if (!audioCtx || muted) return;
  const t = audioCtx.currentTime;
  const dur = 0.45;
  const bufferSize = Math.floor(audioCtx.sampleRate * dur);
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.setValueAtTime(2000, t);
  filter.frequency.exponentialRampToValueAtTime(500, t + dur);
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.55, t);
  noise.connect(filter).connect(gain).connect(masterGain);
  noise.start(t);
}
function playUiClick() {
  if (!audioCtx || muted) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(pitchVar(500), t);
  gain.gain.setValueAtTime(0.08, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  osc.connect(gain).connect(masterGain);
  osc.start(t); osc.stop(t + 0.09);
}

let lastThumpTime = -Infinity;
let screamedRecently = false;
let footstepTimer = 0;
function updateDreadAudio(dt, dread, chaserDist, moving) {
  if (dread > 0.03) {
    const interval = 1.0 - dread * 0.7;
    if (elapsed - lastThumpTime > interval) {
      playHeartbeat(0.06 + dread * 0.22);
      lastThumpTime = elapsed;
    }
  }
  if (chaserDist < 1.4 && !screamedRecently) {
    screamedRecently = true;
  } else if (chaserDist > 2.6) {
    screamedRecently = false;
  }
  if (moving && !player.hiding) {
    footstepTimer -= dt;
    if (footstepTimer <= 0) { playFootstep(); footstepTimer = 0.32; }
  }
}

function jump() {
  if (gameState !== 'play' || player.hiding) return;
  if (elapsed < player.jumpT + JUMP_DURATION) return;
  player.jumpT = elapsed;
  playJumpSound();
}
function toggleHide() {
  if (gameState !== 'play') return;
  if (player.hiding) {
    player.hiding = false;
    player.hidingCabinet = null;
    hideOverlayEl.style.display = 'none';
    playUiClick();
  } else if (nearCabinet) {
    player.hiding = true;
    player.hidingCabinet = nearCabinet;
    player.lastKnownCell = worldToCell(player.x, player.y);
    hideOverlayEl.style.display = 'flex';
    playUiClick();
    spawnParticles(canvas.width / 2, canvas.height * 0.6, 'rgba(120,100,60,0.8)', 8, 60, 0.5, 40);
  }
}
function swing() {
  if (gameState !== 'play' || !hasWeapon || player.hiding) return;
  if (elapsed - lastSwingTime < SWING_COOLDOWN) return;
  lastSwingTime = elapsed;
  swingFlashUntil = elapsed + 0.15;
  const dist = Math.hypot(chaser.x - player.x, chaser.y - player.y);
  if (dist < SWING_RANGE) {
    chaser.stunnedUntil = elapsed + STUN_DURATION;
    playHitSound();
    freeze = Math.max(freeze, 0.05);
    shakeMag = Math.max(shakeMag, 6);
    spawnParticles(canvas.width / 2, canvas.height * 0.5, 'rgba(255,220,180,0.9)', 14, 180, 0.4, 200);
  }
}

// ---------- static baked layers (perf: no per-frame createGradient) ----------
let bakeBG = document.createElement('canvas');
let vignetteCanvas = document.createElement('canvas');
let fogCanvas = document.createElement('canvas');
function bakeStaticLayers() {
  const w = canvas.width, h = canvas.height;
  if (w < 2 || h < 2) return;
  const horizon = h / 2;
  bakeBG.width = 4; bakeBG.height = h;
  const bctx = bakeBG.getContext('2d');
  let g = bctx.createLinearGradient(0, 0, 0, horizon);
  g.addColorStop(0, '#131007'); g.addColorStop(1, '#1e1a0e');
  bctx.fillStyle = g; bctx.fillRect(0, 0, 4, horizon);
  bctx.fillStyle = 'rgba(240,230,160,0.16)';
  bctx.fillRect(0, horizon * 0.15, 4, 4);
  let g2 = bctx.createLinearGradient(0, horizon, 0, h);
  g2.addColorStop(0, '#2c2411'); g2.addColorStop(1, '#493c1a');
  bctx.fillStyle = g2; bctx.fillRect(0, horizon, 4, h - horizon);
  const BANDS = 14;
  for (let i = 0; i < BANDS; i++) {
    const t = Math.pow(i / BANDS, 1.7);
    const tNext = Math.pow((i + 1) / BANDS, 1.7);
    const fy0 = horizon + (h - horizon) * t;
    const fy1 = horizon + (h - horizon) * tNext;
    if (i % 2 === 0) { bctx.fillStyle = `rgba(15,10,3,${0.14 - i * 0.006})`; bctx.fillRect(0, fy0, 4, Math.max(1, fy1 - fy0)); }
    const cy0 = horizon - horizon * t;
    const cy1 = horizon - horizon * tNext;
    if (i % 2 === 0) { bctx.fillStyle = `rgba(0,0,0,${0.18 - i * 0.007})`; bctx.fillRect(0, cy1, 4, Math.max(1, cy0 - cy1)); }
  }

  fogCanvas.width = w; fogCanvas.height = h;
  const fctx = fogCanvas.getContext('2d');
  const fogGrad = fctx.createLinearGradient(0, horizon - h * 0.05, 0, horizon + h * 0.4);
  fogGrad.addColorStop(0, 'rgba(5,4,3,0)');
  fogGrad.addColorStop(1, 'rgba(5,4,3,0.3)');
  fctx.fillStyle = fogGrad;
  fctx.fillRect(0, 0, w, h);

  vignetteCanvas.width = w; vignetteCanvas.height = h;
  const vctx = vignetteCanvas.getContext('2d');
  const vign = vctx.createRadialGradient(w / 2, h / 2, Math.min(w, h) * 0.16, w / 2, h / 2, Math.max(w, h) * 0.75);
  vign.addColorStop(0, 'rgba(120,0,0,0)');
  vign.addColorStop(1, 'rgba(150,0,0,1)');
  vctx.fillStyle = vign;
  vctx.fillRect(0, 0, w, h);
}

// ---------- minimap bake (per level, static maze layout) ----------
let minimapMazeCanvas = document.createElement('canvas');
function bakeMinimap() {
  const cell = 5;
  const w = MAZE_COLS * cell + 2, h = MAZE_ROWS * cell + 2;
  minimapMazeCanvas.width = w; minimapMazeCanvas.height = h;
  const mc = minimapMazeCanvas.getContext('2d');
  mc.fillStyle = 'rgba(10,15,8,0.9)';
  mc.fillRect(0, 0, w, h);
  mc.strokeStyle = 'rgba(120,255,120,0.85)';
  mc.lineWidth = 1.4;
  mc.beginPath();
  for (let r = 0; r < MAZE_ROWS; r++) {
    for (let c = 0; c < MAZE_COLS; c++) {
      const x0 = c * cell + 1, y0 = r * cell + 1;
      const cell_ = maze[r][c];
      if (cell_.N) { mc.moveTo(x0, y0); mc.lineTo(x0 + cell, y0); }
      if (cell_.W) { mc.moveTo(x0, y0); mc.lineTo(x0, y0 + cell); }
      if (r === MAZE_ROWS - 1 && cell_.S) { mc.moveTo(x0, y0 + cell); mc.lineTo(x0 + cell, y0 + cell); }
      if (c === MAZE_COLS - 1 && cell_.E) { mc.moveTo(x0 + cell, y0); mc.lineTo(x0 + cell, y0 + cell); }
    }
  }
  mc.stroke();
}
function drawMinimap() {
  minimapCanvas.width = MAZE_COLS * 5 + 2;
  minimapCanvas.height = MAZE_ROWS * 5 + 2;
  mctx.clearRect(0, 0, minimapCanvas.width, minimapCanvas.height);
  mctx.drawImage(minimapMazeCanvas, 0, 0);
  const cell = 5;
  // exit marker
  const ec = worldToCell(exitDoor.x, exitDoor.y);
  mctx.fillStyle = '#7fffb0';
  mctx.fillRect(ec.c * cell - 1, ec.r * cell - 1, cell + 2, cell + 2);
  // weapon marker
  if (!weapon.collected) {
    const wc = worldToCell(weapon.x, weapon.y);
    mctx.fillStyle = '#ffd24a';
    mctx.beginPath(); mctx.arc(wc.c * cell + cell / 2 + 1, wc.r * cell + cell / 2 + 1, 1.6, 0, Math.PI * 2); mctx.fill();
  }
  // player marker (triangle showing facing)
  const pc = worldToCell(player.x, player.y);
  const px = pc.c * cell + cell / 2 + 1, py = pc.r * cell + cell / 2 + 1;
  mctx.save();
  mctx.translate(px, py);
  mctx.rotate(player.angle);
  mctx.fillStyle = '#fff';
  mctx.beginPath();
  mctx.moveTo(3, 0); mctx.lineTo(-2.5, -2.2); mctx.lineTo(-2.5, 2.2);
  mctx.closePath(); mctx.fill();
  mctx.restore();
  // chaser marker only if close/sensed
  const cdist = Math.hypot(chaser.x - player.x, chaser.y - player.y);
  if (cdist < DREAD_RANGE * 1.1) {
    const cc = worldToCell(chaser.x, chaser.y);
    const alpha = clamp(1 - cdist / (DREAD_RANGE * 1.1), 0.25, 1);
    mctx.fillStyle = `rgba(255,40,40,${alpha})`;
    mctx.beginPath();
    mctx.arc(cc.c * cell + cell / 2 + 1, cc.r * cell + cell / 2 + 1, 1.8, 0, Math.PI * 2);
    mctx.fill();
  }
}

function renderLevelGrid() {
  levelGridEl.innerHTML = '';
  LEVELS.forEach((lv, i) => {
    const unlocked = i < save.unlocked;
    const card = document.createElement('div');
    card.className = 'levelCard' + (unlocked ? '' : ' locked');
    const stars = save.stars[i] || 0;
    const best = save.bestTime[i];
    card.innerHTML = `<div class="lvName">${unlocked ? (i + 1) + '. ' + lv.name : '🔒 ' + (i + 1)}</div>` +
      (unlocked ? `<div class="lvStars">${starString(stars)}</div><div style="font-size:11px;color:#9fd9a0;">${best !== null && best !== undefined ? '最佳 ' + best.toFixed(1) + 's' : '尚未通關'}</div>` : '<div style="font-size:11px;color:#997;">先過關上一關</div>');
    if (unlocked) {
      card.addEventListener('pointerdown', e => { e.preventDefault(); ensureAudio(); playUiClick(); startLevel(i); });

function togglePause() {
  if (gameState === 'play') { showScreen('paused'); playUiClick(); }
  else if (gameState === 'paused') { showScreen('play'); playUiClick(); }
}

function startLevel(idx) {
  curLevel = idx;
  const lv = LEVELS[idx];
  MAZE_COLS = lv.cols; MAZE_ROWS = lv.rows;
  VIEW_DIST = lv.viewDist;
  SAFE_TIME = lv.safeTime;
  buildMaze();
  buildSolidGrid();
  bakeMinimap();
  placeCabinets(lv.cabinetDensity);

  const start = cellCenter(0, 0);
  player.x = start.x; player.y = start.y;
  // face the maze's first open direction so the player never spawns staring into a blank wall
  const startCell = maze[0][0];
  if (!startCell.E) player.angle = 0;
  else if (!startCell.S) player.angle = Math.PI / 2;
  else if (!startCell.N) player.angle = -Math.PI / 2;
  else player.angle = Math.PI;
  player.hiding = false; player.hidingCabinet = null;
  player.jumpT = -Infinity;
  hideOverlayEl.style.display = 'none';

  const chaserStart = cellCenter(MAZE_ROWS - 1, MAZE_COLS - 1);
  chaser.x = chaserStart.x; chaser.y = chaserStart.y;
  chaser.stunnedUntil = 0;
  chaser.speed = lv.chaserBase;
  chaser.searching = false;
  chaser.searchCabinet = null;
  chaser.pathTimer = 0;
  chaser.cachedPath = null;

  const wc = cellCenter(Math.floor(MAZE_ROWS / 2), Math.floor(MAZE_COLS / 2));
  weapon.x = wc.x; weapon.y = wc.y; weapon.collected = false;
  hasWeapon = false;
  lastSwingTime = -Infinity;
  swingFlashUntil = -Infinity;

  const exitCenter = cellCenter(0, MAZE_COLS - 1);
  exitDoor.x = exitCenter.x; exitDoor.y = exitCenter.y;

  closeCalls = 0; wasInDanger = false;
  particles.length = 0;
  shakeMag = 0; freeze = 0;
  screamedRecently = false;
  footstepTimer = 0;
  dying = false;
  deathTime = -Infinity;
  deathCause = 'open';
  for (const k in keys) keys[k] = false;
  dragging = false;

  startTime = performance.now();
  elapsed = 0;
  hintPhase = 0;
  running = true;
  showScreen('play');
}

function winGame() {
  running = false;
  const t = elapsed;
  const stars = computeStars(curLevel, t, closeCalls);
  if (stars > (save.stars[curLevel] || 0)) save.stars[curLevel] = stars;
  if (save.bestTime[curLevel] == null || t < save.bestTime[curLevel]) save.bestTime[curLevel] = t;
  if (curLevel + 1 >= save.unlocked && curLevel + 1 < LEVELS.length) save.unlocked = curLevel + 2;
  saveSave();
  playWinFanfare();
  playDoorOpen();
  spawnParticles(canvas.width / 2, canvas.height / 2, 'rgba(140,255,170,0.9)', 30, 220, 0.9, -60);
  resultScreenEl.className = 'win';
  resultTitleEl.textContent = '成功逃出！';
  const lvName = LEVELS[curLevel].name;
  resultTextEl.textContent = `【${lvName}】用時 ${t.toFixed(1)} 秒逃出！` + (save.bestTime[curLevel] !== null ? ` 最佳紀錄：${save.bestTime[curLevel].toFixed(1)} 秒` : '');
  resultStarsEl.innerHTML = starString(stars);
  nextBtn.style.display = curLevel + 1 < LEVELS.length ? 'inline-block' : 'none';
  showScreen('result');
}

function loseGame() {
  running = false;
  saveSave();
  resultScreenEl.className = 'lose';
  resultTitleEl.textContent = '再試一次！';
  const line = deathCause === 'cabinet' ? '躲在櫃子裡還是被翻了出來' : '被恐怖阿嬤發現了';
  resultTextEl.textContent = `${line}……你在【${LEVELS[curLevel].name}】撐了 ${deathTime.toFixed(1)} 秒`;
  resultStarsEl.innerHTML = '';
  nextBtn.style.display = 'none';
  showScreen('result');
}

// ---------- fixed-timestep update ----------
const DREAD_RANGE = 4;
function updatePlay(dt) {
  if (!running) return;
  elapsed = (performance.now() - startTime) / 1000;

  if (freeze > 0) { freeze -= dt; return; }

  if (dying) {
    if (elapsed - deathTime > DEATH_ANIM_DURATION) {
      loseGame();
    }
    updateParticles(dt);
    return;
  }

  // hint overlay: safe-learning-period guidance
  if (elapsed < 3) { hintOverlayEl.style.display = 'block'; hintOverlayEl.textContent = '找到地圖對角的 ' + ICON_DOOR + ' 逃生門，先熟悉一下操作吧'; hintOverlayEl.innerHTML = '🚪 找到地圖對角的逃生門，先熟悉一下操作吧'; }
  else if (elapsed < SAFE_TIME) { hintOverlayEl.style.display = 'block'; hintOverlayEl.innerHTML = '⚠️ 恐怖阿嬤快出動了，撿起球棒或找好躲藏點！'; }
  else { hintOverlayEl.style.display = 'none'; }

  nearCabinet = cabinets.find(cb => Math.hypot(player.x - cb.x, player.y - cb.y) < HIDE_RANGE) || null;
  if (player.hiding) {
    interactPromptEl.style.display = 'none';
    if (chaser.searching && chaser.searchCabinet === player.hidingCabinet) {
      hideOverlayTextEl.textContent = '🗄️ 恐怖阿嬤正在翻找這個櫃子……別出聲！';
    } else {
      hideOverlayTextEl.textContent = '🗄️ 躲藏中……恐怖阿嬤找不到你';
    }
  } else if (nearCabinet) {
    interactPromptEl.textContent = '按 E / 「躲」鍵躲進櫃子';
    interactPromptEl.style.display = 'block';
  } else {
    interactPromptEl.style.display = 'none';
  }

  let moving = false;
  if (!player.hiding) {
    if (keys['arrowleft'] || keys['a']) player.angle -= TURN_SPEED * dt;
    if (keys['arrowright'] || keys['d']) player.angle += TURN_SPEED * dt;

    let move = 0;
    if (keys['arrowup'] || keys['w']) move += 1;
    if (keys['arrowdown'] || keys['s']) move -= 1;
    if (move !== 0) {
      moving = true;
      const dirX = Math.cos(player.angle) * move, dirY = Math.sin(player.angle) * move;
      const step = PLAYER_SPEED * dt;
      moveWithCollision(player, player.x + dirX * step, player.y + dirY * step);
    }

    if (!weapon.collected && Math.hypot(player.x - weapon.x, player.y - weapon.y) < player.r + 0.4) {
      weapon.collected = true;
      hasWeapon = true;
      playPickupSound();
      spawnParticles(canvas.width / 2, canvas.height * 0.55, 'rgba(255,210,74,0.9)', 12, 150, 0.6, -30);
    }

    if (Math.hypot(player.x - exitDoor.x, player.y - exitDoor.y) < player.r + 0.5) {
      winGame();
      return;
    }
  }

  // chaser AI (safe-learning period: stays put until SAFE_TIME elapsed)
  const stunned = elapsed < (chaser.stunnedUntil || 0);
  const active = elapsed >= SAFE_TIME;
  if (active && !stunned) {
    if (chaser.searching) {
      if (elapsed >= chaser.searchUntil) {
        const caught = player.hiding && chaser.searchCabinet === player.hidingCabinet;
        chaser.searching = false;
        chaser.searchCabinet = null;
        if (caught) triggerCaught('cabinet');
      }
    } else {
      let targetCabinet = null;
      if (player.hiding && player.hidingCabinet) {
        const hd = Math.hypot(chaser.x - player.hidingCabinet.x, chaser.y - player.hidingCabinet.y);
        if (hd < SEARCH_RANGE) targetCabinet = player.hidingCabinet;
      }
      if (!targetCabinet) {
        for (const cb of cabinets) {
          const d = Math.hypot(chaser.x - cb.x, chaser.y - cb.y);
          if (d < 0.9 && Math.random() < 0.02) { targetCabinet = cb; break; }
        }
      }
      if (targetCabinet) {
        chaser.searching = true;
        chaser.searchCabinet = targetCabinet;
        chaser.searchUntil = elapsed + (targetCabinet === player.hidingCabinet && player.hiding ? 1.1 : 0.6);
      } else {
        chaser.pathTimer -= dt;
        const targetCell = player.hiding ? player.lastKnownCell : worldToCell(player.x, player.y);
        if (chaser.pathTimer <= 0 || !chaser.cachedPath) {
          const cc = worldToCell(chaser.x, chaser.y);
          chaser.cachedPath = bfsPath(cc.r, cc.c, targetCell.r, targetCell.c);
          chaser.pathTimer = 0.22;
        }
        const path = chaser.cachedPath;
        if (path && path.length > 1) {
          const target = cellCenter(path[1][0], path[1][1]);
          const tdx = target.x - chaser.x, tdy = target.y - chaser.y;
          const tdist = Math.hypot(tdx, tdy);
          if (tdist > 0.05) {
            const step = Math.min(chaser.speed * dt, tdist);
            chaser.x += (tdx / tdist) * step;
            chaser.y += (tdy / tdist) * step;
          } else { chaser.pathTimer = 0; }
        }
      }
    }
  }

  chaser.speed = LEVELS[curLevel].chaserBase + elapsed * LEVELS[curLevel].chaserRamp;

  const cdist = Math.hypot(player.x - chaser.x, player.y - chaser.y);
  if (active && !player.hiding && !stunned && cdist < player.r + chaser.r) {
    triggerCaught('open');
  }

  // close-call tracking for star rating
  if (active && cdist < 1.6 && !player.hiding) {
    if (!wasInDanger) { closeCalls++; wasInDanger = true; }
  } else if (cdist > 2.5) wasInDanger = false;

  const dread = active ? clamp(1 - cdist / DREAD_RANGE, 0, 1) : 0;
  shakeMag *= Math.pow(0.001, dt);
  updateDreadAudio(dt, dread, player.hiding ? Infinity : cdist, moving);
  updateParticles(dt);
}

function triggerCaught(cause) {
  dying = true;
  deathTime = elapsed;
  deathCause = cause;
  playScream();
  freeze = Math.max(freeze, 0.12);
  shakeMag = Math.max(shakeMag, 14);
  spawnParticles(canvas.width / 2, canvas.height / 2, 'rgba(180,0,0,0.9)', 26, 260, 0.7, 120);
}

// ---------- raycasting render ----------
const FOV = 1.05;
let flicker = 1;
function normalizeAngle(a) {
  while (a > Math.PI) a -= Math.PI * 2;
  while (a < -Math.PI) a += Math.PI * 2;
  return a;
}
function castRay(rayAngle) {
  const dirX = Math.cos(rayAngle), dirY = Math.sin(rayAngle);
  let mapX = Math.floor(player.x), mapY = Math.floor(player.y);
  const deltaDistX = dirX === 0 ? 1e30 : Math.abs(1 / dirX);
  const deltaDistY = dirY === 0 ? 1e30 : Math.abs(1 / dirY);
  let stepX, stepY, sideDistX, sideDistY;
  if (dirX < 0) { stepX = -1; sideDistX = (player.x - mapX) * deltaDistX; }
  else { stepX = 1; sideDistX = (mapX + 1 - player.x) * deltaDistX; }
  if (dirY < 0) { stepY = -1; sideDistY = (player.y - mapY) * deltaDistY; }
  else { stepY = 1; sideDistY = (mapY + 1 - player.y) * deltaDistY; }
  let side = 0, hitGX = mapX, hitGY = mapY;
  for (let i = 0; i < 64; i++) {
    if (sideDistX < sideDistY) { sideDistX += deltaDistX; mapX += stepX; side = 0; }
    else { sideDistY += deltaDistY; mapY += stepY; side = 1; }
    if (mapX < 0 || mapY < 0 || mapX >= gridW || mapY >= gridH || solid[mapY][mapX]) { hitGX = mapX; hitGY = mapY; break; }
  }
  const perpDist = side === 0 ? (sideDistX - deltaDistX) : (sideDistY - deltaDistY);
  return { dist: Math.max(perpDist, 0.0001), side, gx: hitGX, gy: hitGY };
}

function drawScene() {
  const w = canvas.width, h = canvas.height;
  const jumpPhase = clamp((elapsed - player.jumpT) / JUMP_DURATION, 0, 1);
  const jumpBob = jumpPhase < 1 ? Math.sin(jumpPhase * Math.PI) * h * 0.06 : 0;

  const dyingT = dying ? clamp((elapsed - deathTime) / DEATH_ANIM_DURATION, 0, 1) : 0;
  const chaserDist = dying ? 0.2 : (player.hiding ? Infinity : Math.hypot(chaser.x - player.x, chaser.y - player.y));
  const active = elapsed >= SAFE_TIME;
  const dread = dying ? 1 : (active ? clamp(1 - chaserDist / DREAD_RANGE, 0, 1) : 0);
  const totalShake = Math.max(shakeMag, dread * dread * 10);
  const shakeX = (Math.random() - 0.5) * totalShake;
  const shakeY = (Math.random() - 0.5) * totalShake;
  ctx.save();
  ctx.translate(shakeX, shakeY);

  const horizon = h / 2;
  ctx.drawImage(bakeBG, 0, 0, 4, h, 0, 0, w, h);
  // dynamic flicker overlay (cheap, animated)
  ctx.fillStyle = `rgba(240,230,160,${0.02 + flicker * 0.05})`;
  ctx.fillRect(0, horizon * 0.15 - jumpBob, w, 4);

  const RAY_COUNT = Math.max(110, Math.min(w, 300));
  const colWidth = w / RAY_COUNT;
  const zbuffer = new Array(RAY_COUNT);

  for (let i = 0; i < RAY_COUNT; i++) {
    const rayAngle = player.angle - FOV / 2 + (i / RAY_COUNT) * FOV;
    const hit = castRay(rayAngle);
    const correctedDist = hit.dist * Math.cos(rayAngle - player.angle);
    zbuffer[i] = correctedDist;
    const lineHeight = h / correctedDist;
    const y0 = horizon - lineHeight / 2 - jumpBob;

    const seed = (wallSeed[hit.gy] && wallSeed[hit.gy][hit.gx]) || 0.5;
    const distShade = clamp(1 - correctedDist / VIEW_DIST, 0.12, 1);
    let baseR = 110 + seed * 45, baseG = 92 + seed * 35, baseB = 50 + seed * 20;
    if (hit.side === 1) { baseR *= 0.75; baseG *= 0.75; baseB *= 0.75; }
    const lightMul = distShade * (0.78 + flicker * 0.25);
    ctx.fillStyle = `rgb(${Math.floor(baseR * lightMul)},${Math.floor(baseG * lightMul)},${Math.floor(baseB * lightMul)})`;
    ctx.fillRect(i * colWidth, y0, colWidth + 1, lineHeight);

    if (seed > 0.82) {
      ctx.fillStyle = `rgba(20,15,5,${0.25 * distShade})`;
      ctx.fillRect(i * colWidth, y0 + lineHeight * 0.55, colWidth + 1, lineHeight * 0.35);
    }
  }

  drawSprite(weapon.collected ? null : weapon, zbuffer, RAY_COUNT, colWidth, 'bat');
  drawSprite(exitDoor, zbuffer, RAY_COUNT, colWidth, 'exit');
  for (const cb of cabinets) drawSprite(cb, zbuffer, RAY_COUNT, colWidth, 'cabinet');
  if (dying) {
    drawDeathCloseup(dyingT, w, h, horizon);
  } else {
    drawSprite(chaser, zbuffer, RAY_COUNT, colWidth, 'chaser');
  }

  if (elapsed < swingFlashUntil) {
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.arc(w / 2, h * 0.85, 90, Math.PI, Math.PI * 2);
    ctx.stroke();
  }

  ctx.drawImage(fogCanvas, 0, 0);

  const pulseSpeed = 2.2 + dread * 6;
  const pulse = 0.5 + 0.5 * Math.sin(elapsed * pulseSpeed);
  ctx.globalAlpha = clamp(0.15 + pulse * (0.15 + dread * 0.45), 0, 1);
  ctx.drawImage(vignetteCanvas, 0, 0);
  ctx.globalAlpha = 1;

  drawParticles();
  ctx.restore();
}

function drawDeathCloseup(t, w, h, horizon) {
  const size = h * (1.3 + t * 0.6);
  const lunge = Math.min(1, t / 0.35);
  ctx.save();
  ctx.translate(w / 2, horizon + size * 0.1 - lunge * size * 0.15);
  ctx.fillStyle = `rgba(20,4,4,1)`;
  ctx.beginPath();
  ctx.moveTo(-size * 0.28, size * 0.05);
  ctx.quadraticCurveTo(-size * 0.4, -size * 0.3, -size * 0.08, -size * 0.42);
  ctx.quadraticCurveTo(size * 0.02, -size * 0.48, size * 0.14, -size * 0.4);
  ctx.quadraticCurveTo(size * 0.42, -size * 0.32, size * 0.34, size * 0.05);
  ctx.lineTo(size * 0.4, size * 0.55);
  ctx.lineTo(-size * 0.4, size * 0.55);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.arc(-size * 0.03, -size * 0.5, size * 0.11, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(150,135,110,1)`;
  ctx.fill();
  const eyeGlow = 0.5 + 0.5 * Math.sin(elapsed * 16);
  ctx.fillStyle = `rgba(255,${Math.floor(10 + eyeGlow * 20)},0,1)`;
  ctx.beginPath();
  ctx.arc(-size * 0.07, -size * 0.505, size * 0.02, 0, Math.PI * 2);
  ctx.arc(size * 0.01, -size * 0.505, size * 0.02, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  const strikes = [0.25, 0.55];
  for (const st of strikes) {
    const local = clamp((t - st) / 0.35, 0, 1);
    if (local <= 0 || local >= 1) continue;
    const alpha = Math.sin(local * Math.PI);
    ctx.strokeStyle = `rgba(160,0,0,${alpha * 0.9})`;
    ctx.lineWidth = h * 0.02;
    ctx.beginPath();
    const dir = st === strikes[0] ? 1 : -1;
    ctx.moveTo(w * (0.5 - dir * 0.35), h * 0.15);
    ctx.lineTo(w * (0.5 + dir * 0.35), h * 0.85);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(w * (0.5 - dir * 0.32), h * 0.2);
    ctx.lineTo(w * (0.5 + dir * 0.38), h * 0.8);
    ctx.stroke();
    if (local < 0.25) {
      ctx.fillStyle = `rgba(255,255,255,${(1 - local / 0.25) * 0.7})`;
      ctx.fillRect(0, 0, w, h);
    }
  }
  ctx.fillStyle = `rgba(120,0,0,${0.15 + t * 0.35})`;
  ctx.fillRect(0, 0, w, h);
}

function drawSprite(entity, zbuffer, RAY_COUNT, colWidth, kind) {
  if (!entity) return;
  const dx = entity.x - player.x, dy = entity.y - player.y;
  const dist = Math.hypot(dx, dy);
  if (dist > VIEW_DIST || dist < 0.05) return;
  const angleTo = normalizeAngle(Math.atan2(dy, dx) - player.angle);
  if (Math.abs(angleTo) > FOV / 2 + 0.3) return;

  const screenX = (canvas.width / 2) + (angleTo / (FOV / 2)) * (canvas.width / 2);
  const rayIndex = clamp(Math.floor((screenX / canvas.width) * RAY_COUNT), 0, RAY_COUNT - 1);
  if (dist > zbuffer[rayIndex] + 0.15) return;

  const size = clamp(canvas.height / dist, 10, canvas.height * 2);
  const horizon = canvas.height / 2;
  const shade = clamp(1 - dist / VIEW_DIST, 0.15, 1);

  if (kind === 'chaser') {
    const stunned = elapsed < (chaser.stunnedUntil || 0);
    const twitch = Math.sin(elapsed * 14) * size * 0.01;
    ctx.save();
    ctx.translate(screenX + twitch, horizon + size * 0.18);
    const bodyColor = stunned ? `rgba(150,20,20,${shade})` : `rgba(${Math.floor(28 * shade)},${Math.floor(6 * shade)},${Math.floor(6 * shade)},${shade})`;
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.moveTo(-size * 0.2, size * 0.05);
    ctx.quadraticCurveTo(-size * 0.3, -size * 0.28, -size * 0.06, -size * 0.4);
    ctx.quadraticCurveTo(size * 0.02, -size * 0.46, size * 0.1, -size * 0.38);
    ctx.quadraticCurveTo(size * 0.3, -size * 0.3, size * 0.24, size * 0.05);
    ctx.lineTo(size * 0.3, size * 0.5);
    ctx.lineTo(-size * 0.28, size * 0.5);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = bodyColor;
    ctx.lineWidth = Math.max(1, size * 0.03);
    ctx.beginPath();
    ctx.moveTo(size * 0.2, -size * 0.1);
    ctx.lineTo(size * 0.42, size * 0.05 + twitch);
    ctx.lineTo(size * 0.5, -size * 0.02 + twitch);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(-size * 0.02, -size * 0.5, size * 0.1, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${Math.floor(150 * shade)},${Math.floor(135 * shade)},${Math.floor(110 * shade)},${shade})`;
    ctx.fill();
    const eyeGlow = 0.5 + 0.5 * Math.sin(elapsed * 9);
    ctx.fillStyle = `rgba(255,${stunned ? 200 : Math.floor(20 + eyeGlow * 30)},${stunned ? 200 : 0},${shade})`;
    ctx.beginPath();
    ctx.arc(-size * 0.055, -size * 0.505, size * 0.016, 0, Math.PI * 2);
    ctx.arc(size * 0.01, -size * 0.505, size * 0.016, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.max(10, size * 0.06)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('恐怖阿嬤', 0, -size * 0.64);
    if (stunned) ctx.fillText('暈', 0, -size * 0.7);
    ctx.restore();
  } else if (kind === 'exit') {
    const glow = 0.6 + 0.4 * Math.sin(elapsed * 3);
    ctx.save();
    ctx.translate(screenX, horizon);
    ctx.fillStyle = `rgba(${Math.floor(40 * shade)},${Math.floor(70 * shade)},${Math.floor(40 * shade)},1)`;
    ctx.fillRect(-size * 0.14, -size * 0.5, size * 0.28, size * 0.5);
    ctx.strokeStyle = `rgba(${Math.floor(120 * glow * shade)},255,${Math.floor(120 * glow * shade)},${shade})`;
    ctx.lineWidth = Math.max(1, size * 0.015);
    ctx.strokeRect(-size * 0.14, -size * 0.5, size * 0.28, size * 0.5);
    ctx.fillStyle = `rgba(120,255,140,${0.35 * glow * shade})`;
    ctx.fillRect(-size * 0.14, -size * 0.5, size * 0.28, size * 0.5);
    ctx.fillStyle = `rgba(200,255,210,${shade})`;
    ctx.font = `bold ${Math.max(10, size * 0.05)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('逃生門', 0, -size * 0.55);
    ctx.restore();
  } else if (kind === 'cabinet') {
    ctx.save();
    ctx.translate(screenX, horizon);
    ctx.fillStyle = `rgba(${Math.floor(60 * shade)},${Math.floor(40 * shade)},${Math.floor(20 * shade)},1)`;
    ctx.fillRect(-size * 0.16, -size * 0.02, size * 0.32, size * 0.5);
    ctx.strokeStyle = `rgba(20,14,6,${shade})`;
    ctx.lineWidth = Math.max(1, size * 0.01);
    ctx.strokeRect(-size * 0.16, -size * 0.02, size * 0.32, size * 0.5);
    ctx.beginPath();
    ctx.moveTo(0, -size * 0.02);
    ctx.lineTo(0, size * 0.48);
    ctx.stroke();
    ctx.fillStyle = `rgba(150,120,60,${shade})`;
    ctx.beginPath();
    ctx.arc(-size * 0.04, size * 0.2, size * 0.012, 0, Math.PI * 2);
    ctx.arc(size * 0.04, size * 0.2, size * 0.012, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  } else {
    ctx.save();
    ctx.translate(screenX, horizon + size * 0.42);
    ctx.rotate(Math.PI / 5);
    ctx.fillStyle = `rgba(201,162,106,${shade})`;
    ctx.fillRect(-size * 0.02, -size * 0.16, size * 0.04, size * 0.16);
    ctx.fillStyle = `rgba(90,58,26,${shade})`;
    ctx.fillRect(-size * 0.02, -size * 0.02, size * 0.04, size * 0.045);
    ctx.restore();
  }
}

function updateHud() {
  const t = elapsed.toFixed(1);
  const weaponStatus = hasWeapon ? `${ICON_KEY} 已拿到球棒 (空白鍵/揮擊)` : `${ICON_KEY} 尚未拿到球棒`;
  hudEl.innerHTML = `第 ${curLevel + 1} 關．${LEVELS[curLevel].name}<br>` +
    `${ICON_DOOR} 逃出恐怖校園 · 存活: <b>${t}</b> 秒<br>${weaponStatus}`;
}

// ---------- fixed-timestep main loop (Gaffer-style accumulator) ----------
const STEP = 1 / 60;
let lastNow = null, acc = 0;
function frame(now) {
  requestAnimationFrame(frame);
  if (lastNow === null) lastNow = now;
  let dt = (now - lastNow) / 1000;
  lastNow = now;
  if (dt > 0.1) dt = 0.1;
  acc += dt;
  flicker = 0.85 + Math.random() * 0.15;

  if (gameState === 'play') {
    while (acc >= STEP) {
      updatePlay(STEP);
      acc -= STEP;
    }
    drawScene();
    updateHud();
    drawMinimap();
  } else if (gameState === 'paused') {
    drawScene(); // frozen background
  }
}
requestAnimationFrame(frame);

// ---------- init ----------
resize();
showScreen('title');
</script>
