<script>
'use strict';
/* ============================================================
   иІ“е’ӘеӨ§жҲ°зҲӯпјҲ-2 зі»еҲ—пјүвҖ” е°ҲжҘӯAIеҚҮзҙҡзүҲ v5
   еӨңиүІйң“иҷ№еұӢй Ӯ 4 и·Ҝз·ҡе°ҚжҲ°пјӢиҪүиӣӢж”¶и—ҸгҖӮжҙҫеҮәиІ“е’ӘйғЁйҡҠжҺЁеҖ’иқҷиқ еҹҺпјҢ
   ж“Ҡж•—иқҷиқ зҺӢпјҒйҖҡй—ңдёҖж¬Ўи§ЈйҺ–гҖҢз„ЎзӣЎжЁЎејҸгҖҚгҖӮ
   иҲҮ pro/иІ“е’ӘеӨ§жҲ°зҲӯ.htmlпјҲе–®з·ҡжҺЁеЎ”пјӢдә”й—ңеҚЎпјӢиІ“иІ“з ІпјүзӮәдёҚеҗҢдҪңе“Ғпјҡ
   жң¬дҪңж ёеҝғжҳҜгҖҢеӨҡи·Ҝз·ҡдҪҲйҷЈ Г— иҪүиӣӢзЁҖжңүеәҰйӨҠжҲҗ Г— з„ЎзӣЎжҢ‘жҲ°гҖҚгҖӮ

   v5 йҮқе°ҚжҖ§еҚҮзҙҡпјҲдҝқз•ҷ v4 ж—ўжңүзі»зөұпјҢеҸӘиЈңејұй»һпјүпјҡ
   1. и·Ҝз·ҡзһ„жә–дҪҲйҷЈпјҡv4 еҮәе…өи·Ҝз·ҡжҳҜијӘжөҒеҲҶй…ҚпјҢзҺ©е®¶е®Ңе…Ёз„Ўжі•дё»еӢ•жҢҮе®ҡпјҢ
      иҲҮгҖҢ4 и·Ҝз·ҡеӨ§дҪңжҲ°гҖҚзҡ„иіЈй»һзҹӣзӣҫгҖӮv5 еҠ е…ҘгҖҢе…Ҳй»һжҲ°е ҙи·Ҝз·ҡпјҸйҚөзӣӨвҶ‘вҶ“
      йҒёи·Ҝз·ҡпјҢеҶҚеҮәе…өпјқжҢҮе®ҡдҪҲйҷЈгҖҚпјҢдёҚй»һеүҮз¶ӯжҢҒеҺҹжң¬ијӘжөҒпјҲеҗ‘дёӢзӣёе®№пјүгҖӮ
   2. зӣҙеҗ‘иЈқзҪ®жҸҗзӨәпјҡv4 жІ’жңүиҷ•зҗҶжүӢж©ҹзӣҙж”ҫпјҢеҚЎзүҮи§ёжҺ§й«ҳеәҰжңғиў«еЈ“зё®еҲ°
      йҒ дҪҺж–ј 48px жЁҷжә–гҖӮv5 еҒөжё¬зӣҙеҗ‘дёҰеңЁйҒёе–®/зөҗз®—з•«йқўйЎҜзӨәгҖҢи«Ӣж©«ж”ҫгҖҚ
      жҸҗзӨәпјҲзҙ”з·ҡзЁҝең–зӨәпјҢдёҚз”ЁиЎЁжғ…з¬Ұиҷҹз•¶ең–зӨәпјүгҖӮ
   3. йӣЈеәҰе–ҳжҒҜзҜҖеҘҸпјҡv4 з”ҹжҲҗй »зҺҮе–®иӘҝйҒһеўһпјҢжІ’жңүйӢёйҪ’зӢҖзҡ„ж”ҫй¬Ҷж®өгҖӮ
      v5 еҠ е…ҘйҖұжңҹжҖ§гҖҢз·Ҡз№ғвҶ’е–ҳжҒҜвҶ’жӣҙз·Ҡз№ғгҖҚзҜҖеҘҸпјҢе–ҳжҒҜжҷӮйЎҚеӨ–зөҰйӯҡе№ЈгҖӮ
   4. зӢҖж…ӢиҪүе ҙиҲҮеҲҶж•ёе‘ҲзҸҫпјҡv4 йҒёе–®/жҲ°й¬Ҙ/зөҗз®—/иҪүиӣӢеҲҮжҸӣе…ЁйғЁзһ¬з§»пјҢ
      зөҗз®—еҲҶж•ёд№ҹжҳҜзһ¬й–“и·іеҮәгҖӮv5 еҠ е…Ҙж·Ўе…Ҙж·ЎеҮәиҪүе ҙпјӢеҲҶж•ёж»ҫеӢ•иЁҲж•ёгҖӮ
   5. йҖЈж“Ҡзі»зөұпјҡv4 жҜҸж¬Ўж“Ҡж®әеӣһйҘӢеј·еәҰдёҖиҮҙгҖӮv5 еҠ е…ҘзҹӯжҷӮй–“е…§йҖЈзәҢж“Ҡж®ә
      зҡ„ COMBO еҠ жҲҗпјҲйӯҡе№Ј/еҲҶж•ёеҠ жҲҗпјӢйҹій«ҳйҒһеўһпјӢйЈ„еӯ—пјүпјҢе‘јжҮүгҖҢзҚҺеӢө
      иҰҒеӨ§иҒІгҖҚзҡ„жүӢж„ҹеҺҹеүҮгҖӮ
   ============================================================ */
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

/* ===================== еӨ§иһўе№•жҸҗйҶ’жө®еұӨпјҲжүӢж©ҹжүҚи·ігҖҒдёҖеҖӢ session дёҖж¬Ўпјү ===================== */
(function bigscreenHint(){
  try{
    const isMobile = Math.min(screen.width, screen.height) < 600 || window.innerWidth < 768;
    if(!isMobile) return;
    if(sessionStorage.getItem('bigscreen-hint')) return;
    const el = document.getElementById('bigscreenHint');
    if(!el) return;
    el.hidden = false;
    const btn = document.getElementById('bshOk');
    const dismiss = ()=>{
      try{ sessionStorage.setItem('bigscreen-hint','1'); }catch(e){}
      el.classList.add('bsh-fade');
      setTimeout(()=>{ el.remove(); }, 280);
    };
    if(btn) btn.addEventListener('click', dismiss, { once:true });
  }catch(e){ /* еҒөжё¬еӨұж•—е°ұдёҚж“ӢйҒҠжҲІ */ }
})();
// дёҠйқўйҖҷж®өжҳҜзҚЁз«ӢгҖҒеҗҢжӯҘгҖҒйқһйҳ»еЎһзҡ„ DOM ж“ҚдҪңпјҡдёҚеҪұйҹҝдёӢж–№з•«еёғеҲқе§ӢеҢ–иҲҮйҒҠжҲІдё»иҝҙеңҲзҡ„е•ҹеӢ•жҷӮж©ҹгҖӮ

let isPortrait = false;    // зӣҙеҗ‘иЈқзҪ®еҒөжё¬пјҲжҸҗзӨәзҺ©е®¶ж©«ж”ҫпјҢиҰӢ drawPortraitHintпјү
function resize(){
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = Math.round(GAME_W * scale * dpr);
  canvas.height = Math.round(GAME_H * scale * dpr);
  canvas.style.width  = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale;
  isPortrait = innerHeight > innerWidth * 1.05;
}
addEventListener('resize', resize); resize();

const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const lerp = (a,b,t)=>a+(b-a)*t;
function rr(c,x,y,w,h,r){
  c.beginPath(); c.moveTo(x+r,y);
  c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath();
}

/* ===================== йҹіж•ҲпјҡWeb Audio еҗҲжҲҗпјӢеЈ“зё®жҜҚз·ҡ ===================== */
let AC = null, master = null;
let muted = localStorage.getItem('catwars2_mute') === '1';
function audio(){
  if(!AC){
    AC = new (window.AudioContext||window.webkitAudioContext)();
    const comp = AC.createDynamicsCompressor();
    comp.threshold.value = -18; comp.knee.value = 24; comp.ratio.value = 6;
    comp.attack.value = 0.003; comp.release.value = 0.2;
    master = AC.createGain(); master.gain.value = 0.9;
    master.connect(comp); comp.connect(AC.destination);
  }
  if(AC.state === 'suspended') AC.resume();
  return AC;
}
addEventListener('pointerdown', audio, { once:true });
addEventListener('keydown', audio, { once:true });
function beep(freq=440, dur=0.1, type='square', vol=0.15, slide=0){
  if(muted || !AC) return;
  const f = freq * (0.94 + Math.random()*0.12);        // йҡЁж©ҹйҹій«ҳ
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(f, AC.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, f+slide), AC.currentTime+dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
  o.connect(g).connect(master);
  o.start(); o.stop(AC.currentTime+dur);
}
function noiseHit(dur=0.15, vol=0.14){
  if(muted || !AC) return;
  const n = Math.floor(AC.sampleRate*dur);
  const buf = AC.createBuffer(1,n,AC.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
  const src = AC.createBufferSource(); src.buffer = buf;
  const g = AC.createGain(); g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
  src.connect(g).connect(master); src.start();
}
const sfx = {
  spawn : ()=>beep(500,0.09,'square',0.11,150),
  hit   : ()=>{ beep(190,0.05,'square',0.1,-60); },
  kill  : (m=1)=>{ beep(320*m,0.08,'square',0.12,-120); noiseHit(0.1,0.08); },
  aim   : ()=>beep(520,0.05,'sine',0.08,140),
  shoot : ()=>beep(760,0.06,'square',0.07,220),
  deny  : ()=>beep(150,0.09,'sawtooth',0.1,-40),
  baseHit:()=>{ beep(120,0.12,'sawtooth',0.13,-50); noiseHit(0.12,0.1); },
  boss  : ()=>{ beep(90,0.5,'sawtooth',0.2,-40); noiseHit(0.4,0.16); },
  win   : ()=>{ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.16,'square',0.14),i*110)); },
  lose  : ()=>{ beep(300,0.3,'sawtooth',0.14,-200); setTimeout(()=>beep(210,0.4,'sawtooth',0.12,-150),200); },
  coin  : ()=>{ beep(988,0.06,'square',0.1); setTimeout(()=>beep(1319,0.1,'square',0.1),70); },
  spin  : ()=>beep(320,0.1,'sine',0.09,180),
  reveal: r=>{
    const seq = [[600],[700,950],[800,1050,1300],[900,1150,1400,1750]][r];
    seq.forEach((f,i)=>setTimeout(()=>beep(f,0.12,'square',0.13+r*0.01),i*90));
  }
};

/* ===================== ијёе…Ҙпјҡж»‘йј /и§ёжҺ§ + йҚөзӣӨ ===================== */
function evPos(t){
  const r = canvas.getBoundingClientRect();
  return { x:(t.clientX-r.left)/canvas._scale, y:(t.clientY-r.top)/canvas._scale };
}
function pointInRect(x,y,r){
  // и§ёжҺ§зЁҪж ёпјҡз„Ўи«–зӣ®еүҚз•«еёғзё®ж”ҫжҜ”дҫӢеӨҡе°ҸпјҢе‘ҪдёӯзҶұеҚҖйғҪдҝқиӯүеңЁеҜҰй«”иһўе№•дёҠ вүҘ48pxпјҲеҫҖеӨ–иЈң paddingпјҢдёҚж”№иҰ–иҰәеӨ§е°Ҹпјү
  const scale = canvas._scale || 1;
  const padX = Math.max(0, (48/scale - r.w)/2);
  const padY = Math.max(0, (48/scale - r.h)/2);
  return x>=r.x-padX && x<=r.x+r.w+padX && y>=r.y-padY && y<=r.y+r.h+padY;
}
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); const p=evPos(e.touches[0]); onTap(p.x,p.y); }, {passive:false});
canvas.addEventListener('mousedown', e=>{ e.preventDefault(); const p=evPos(e); onTap(p.x,p.y); });
canvas.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});

addEventListener('keydown', e=>{
  const num = {Digit1:0,Numpad1:0,Digit2:1,Numpad2:1,Digit3:2,Numpad3:2,Digit4:3,Numpad4:3}[e.code];
  if(num!==undefined && state===playState){ trySpawn(num); return; }
  if(e.code==='KeyM'){ toggleMute(); return; }
  if((e.code==='ArrowUp'||e.code==='KeyW') && state===playState){
    e.preventDefault();
    laneCursor = (laneCursor-1+LANES)%LANES; targetLane = laneCursor; targetLaneT = 5;
    sfx.aim(); return;
  }
  if((e.code==='ArrowDown'||e.code==='KeyS') && state===playState){
    e.preventDefault();
    laneCursor = (laneCursor+1)%LANES; targetLane = laneCursor; targetLaneT = 5;
    sfx.aim(); return;
  }
  if(e.code==='Space' || e.code==='Enter'){
    e.preventDefault();
    if(state===menuState) startBattle('normal');
    else if(state===gameOverState && gameOverState.t>0.6) startBattle(lastMode);
    else if(state===gachaState) doGachaPull();
  }
  else if(e.code==='KeyG'){ if(state===menuState||state===gameOverState) setState(gachaState); }
  else if(e.code==='KeyE'){ if(state===menuState && endlessUnlocked) startBattle('endless'); }
  else if(e.code==='Escape'){ if(state===gachaState||state===gameOverState) setState(menuState); }
});
function toggleMute(){
  muted = !muted;
  localStorage.setItem('catwars2_mute', muted?'1':'0');
}
const MUTE_BTN = { x:GAME_W-58, y:10, w:48, h:48 };

/* ===================== зІ’еӯҗпјҲswap-popпјүиҲҮйЈ„еӯ— ===================== */
const parts = [];
function burst(x,y,color,n=12,speed=200,life=0.5){
  for(let i=0;i<n;i++){
    if(parts.length>=300) break;
    const a=Math.random()*Math.PI*2, s=speed*(0.3+Math.random()*0.7);
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:life*(0.7+Math.random()*0.6),maxLife:life,color,sz:3+Math.random()*4});
  }
}
function updateParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=520*dt; p.life-=dt;
    if(p.life<=0){ parts[i]=parts[parts.length-1]; parts.pop(); }
  }
}
function drawParts(){
  for(const p of parts){
    ctx.globalAlpha = Math.max(0,p.life/p.maxLife);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
  }
  ctx.globalAlpha = 1;
}
const floats = [];
function addFloat(x,y,text,color,big){ floats.push({x,y,text,color,life:0.8,big:!!big}); }
function updateFloats(dt){
  for(let i=floats.length-1;i>=0;i--){
    const f=floats[i]; f.y-=36*dt; f.life-=dt;
    if(f.life<=0){ floats[i]=floats[floats.length-1]; floats.pop(); }
  }
}
function drawFloats(){
  ctx.textAlign='center';
  for(const f of floats){
    ctx.font = f.big ? 'bold 26px sans-serif' : 'bold 17px sans-serif';
    ctx.globalAlpha = Math.max(0,f.life/0.8);
    ctx.fillStyle='#000'; ctx.fillText(f.text, f.x+1.5, f.y+1.5);
    ctx.fillStyle=f.color; ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

/* ===================== й җзғҳз„ҷпјҡе…үжҡҲзІҫйқҲ & иғҢжҷҜ ===================== */
function makeGlow(color, size){
  const c = document.createElement('canvas'); c.width=c.height=size;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(size/2,size/2,1,size/2,size/2,size/2);
  grad.addColorStop(0,color); grad.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=grad; g.fillRect(0,0,size,size);
  return c;
}
const glowCyan = makeGlow('rgba(0,240,255,0.55)',64);

const GACHA_COST = 30, WIN_REWARD = 100, LOSE_REWARD = 35, DUP_REFUND = 10;
function rollRarity(){
  let roll = Math.random()*RARITIES.reduce((s,r)=>s+r.weight,0);
  for(let i=0;i<RARITIES.length;i++){ roll -= RARITIES[i].weight; if(roll<=0) return i; }
  return 0;
}

  cans -= GACHA_COST;
  const typeIdx = Math.floor(Math.random()*CAT_TYPES.length);

function unitMult(typeIdx){
  const owned = collection[typeIdx];
  return owned>=0 ? RARITIES[owned].mult : 1;
}
function makeUnit(type, side, lane, hpMult=1){
  let hp = type.hp, atk = type.atk;
  if(side==='player'){
    const m = unitMult(CAT_TYPES.indexOf(type));
    hp = Math.round(type.hp*m); atk = Math.round(type.atk*m*10)/10;
  } else {
    hp = Math.round(hp*hpMult); atk = Math.round(atk*hpMult*10)/10;
  }
  return {
    side, lane, type,
    x: side==='player' ? BASE_X_LEFT+26 : BASE_X_RIGHT-26,
    y: LANE_Y[lane],
    hp, maxHp:hp, atk,
    atkCd: 0, dead:false, hitFlash:0,
    sx:0.3, sy:1.5,            // еҮәе ҙеҪҲи·і
    walkT: Math.random()*6,
    lunge: 0,
  };
}
function trySpawn(slot){
  const t = CAT_TYPES[slot];
  if(!t || state!==playState) return;
  if(coins < t.cost){ sfx.deny(); addFloat(GAME_W/2, FIELD_BOT-6, 'йӯҡе№ЈдёҚеӨ пјҒ', '#ff8c7a'); return; }
  coins -= t.cost;
  let lane;
  if(targetLane>=0 && targetLaneT>0){          // зҺ©е®¶е·Ізһ„жә–и·Ҝз·ҡпјҡе„Әе…ҲжҢҮе®ҡдҪҲйҷЈ
    lane = targetLane; targetLane = -1; targetLaneT = 0;
  } else {                                      // жңӘзһ„жә–пјҡз¶ӯжҢҒ v4 еҺҹжң¬ијӘжөҒеҲҶй…Қ
    lane = playerSpawnCounter % LANES;
    playerSpawnCounter++;
  }
  const u = makeUnit(t, 'player', lane);
  entities.push(u);
  burst(u.x, u.y-24, t.color, 8, 130, 0.4);
  sfx.spawn();
}

}

const playState = {
  enter(){
    entities = []; shots = [];
    coins = 40; coinTimer = 0;
    baseHpLeft = BASE_MAX; baseHpRight = BASE_MAX;
    baseFlashL = baseFlashR = 0;
    spawnTimer = mode==='normal' ? 8 : 6;   // й–Ӣе ҙе®үе…Ёеӯёзҝ’жңҹ
    elapsed = 0; score = 0; kills = 0;
    bossSpawned = false; bossAlive = false;
    endlessWave = 1;
    playerSpawnCounter = 0;
    shake = 0; freeze = 0; hintT = 0;
    targetLane = -1; targetLaneT = 0; laneCursor = 0;
    combo = 0; comboTimer = 0; comboBestRun = 0; wasBreather = false;
    parts.length = 0; floats.length = 0;
  },
  update(dt){
    if(freeze>0){ freeze-=dt; return; }
    elapsed += dt; hintT += dt;
    targetLaneT = Math.max(0, targetLaneT-dt);
    if(targetLaneT<=0) targetLane = -1;
    comboTimer = Math.max(0, comboTimer-dt);
    if(comboTimer<=0) combo = 0;
    const diff = clamp(elapsed/ (mode==='normal'?100:150), 0, 1);

    // йӣЈеәҰйӢёйҪ’зҜҖеҘҸпјҡз·Ҡз№ғдёҖж®өжҷӮй–“еҫҢзөҰдёҖж®өе–ҳжҒҜпјҢеҶҚжӢүеӣһжӣҙй«ҳеЈ“еҠӣ
    // пјҲйҒҠжҲІиЁӯиЁҲжҢҮеҚ—(d)(4)пјҡйӣЈеәҰйӢёйҪ’вҖ”вҖ”йҒҝе…ҚеЈ“еҠӣе–®иӘҝйҒһеўһйҖ жҲҗз–ІеӢһпјү
    const rhythmPeriod = mode==='normal' ? 22 : 18;
    const rhythmPhase = (elapsed % rhythmPeriod) / rhythmPeriod;
    const breatherStart = 0.7;
    const tension = rhythmPhase < breatherStart
      ? 1
      : lerp(1, mode==='normal'?0.35:0.55, (rhythmPhase-breatherStart)/(1-breatherStart));
    const inBreather = tension < 0.85;
    if(inBreather && !wasBreather) addFloat(GAME_W/2, 150, 'е–ҳеҸЈж°ЈпҪһеҠ з·ҠдҪҲйҷЈпјҒ', 'rgba(190,255,220,0.9)');
    wasBreather = inBreather;

    // ж”¶е…ҘпјҲе–ҳжҒҜж®өйЎҚеӨ–еӨҡзөҰйӯҡе№ЈпјҢйј“еӢөи¶Ғж©ҹиЈңеј·йҷЈеһӢвҖ”вҖ”гҖҢзҚҺеӢөеӨ§иҒІгҖҚпјү
    coinTimer += dt;
    if(coinTimer>=1){
      coinTimer-=1;
      coins = Math.min(999, coins + 5 + Math.floor(diff*4) + (inBreather?3:0));
    }

    // ж•өдәәз”ҹжҲҗ
    spawnTimer -= dt;
    if(spawnTimer<=0){
      if(mode==='normal'){
        if(elapsed < 150){
          const localDiff = diff*tension;
          spawnTimer = Math.max(1.25, 3.4 - localDiff*2.1) * (0.8+Math.random()*0.4);
          spawnEnemy(1 + localDiff*0.5);
        } else spawnTimer = 99;   // ж”¶е°ҫпјҡеҒңжӯўз”ҹжҲҗпјҢдҝқиӯүиҮӘз„¶зөҗжқҹ
        if(!bossSpawned && (elapsed>=70 || baseHpRight<=55)){
          bossSpawned = true; spawnBoss(1);
        }
      } else {
        const localDiff = diff*tension;
        spawnTimer = Math.max(0.9, 3.0 - localDiff*2.1) * (0.8+Math.random()*0.4);
        spawnEnemy(1 + elapsed/90*tension);
        if(elapsed > endlessWave*45){
          endlessWave++;
          spawnBoss(0.55 + endlessWave*0.3);
        }
      }
    }

    // е–®дҪҚжӣҙж–°
    for(const e of entities){
      if(e.dead) continue;
      e.hitFlash = Math.max(0, e.hitFlash-dt*4);
      e.sx += (1-e.sx)*10*dt; e.sy += (1-e.sy)*10*dt;
      e.lunge = Math.max(0, e.lunge-dt*5);
      e.atkCd = Math.max(0, e.atkCd-dt);
      e.walkT += dt;
      const dir = e.side==='player' ? 1 : -1;

      // жүҫзӣ®жЁҷ
      let target=null, bestD=Infinity;
      for(const o of entities){
        if(o===e || o.dead || o.side===e.side || o.lane!==e.lane) continue;
        if((dir===1 && o.x>e.x-8) || (dir===-1 && o.x<e.x+8)){
          const d = Math.abs(o.x-e.x);
          if(d<bestD){ bestD=d; target=o; }
        }
      }
      const range = e.type.range + 10;   // еҜ¬е®№еҲӨе®ҡ
      const atBase = (dir===1 && e.x >= BASE_X_RIGHT-46-(e.type.kind==='gunner'?e.type.range-40:0))
                  || (dir===-1 && e.x <= BASE_X_LEFT+46);

      if(target && bestD <= range){
        if(e.atkCd<=0){
          e.atkCd = e.type.cd; e.lunge = 1;
          if(e.type.kind==='gunner'){
            shots.push({x:e.x+14, y:e.y-26, vx:430, lane:e.lane, atk:e.atk, side:e.side, life:1.2});
            sfx.shoot();
          } else {
            hitUnit(target, e.atk, e.side);
          }
        }
      } else if(atBase){
        if(e.atkCd<=0){
          e.atkCd = e.type.cd; e.lunge = 1;
          if(dir===1){
            baseHpRight -= e.atk*0.8; baseFlashR = 1;
            burst(BASE_X_RIGHT-30, e.y-30, COL.pink, 6, 130, 0.35);
          } else {
            baseHpLeft -= e.atk*0.8; baseFlashL = 1;
            burst(BASE_X_LEFT+30, e.y-30, COL.cyan, 6, 130, 0.35);
            shake = Math.min(shake+3, 8);
          }
          sfx.baseHit();
        }
      } else {
        e.x += dir * e.type.spd * dt;
      }
    }

    // з ІеҪҲ
    for(let i=shots.length-1;i>=0;i--){
      const s = shots[i];
      s.x += s.vx*dt; s.life -= dt;
      let gone = s.life<=0 || s.x>GAME_W;
      if(!gone) for(const o of entities){
        if(o.dead || o.side===s.side || o.lane!==s.lane) continue;
        if(Math.abs(o.x-s.x)<24){ hitUnit(o, s.atk, s.side); gone=true; break; }
      }
      if(!gone && s.x >= BASE_X_RIGHT-40){
        baseHpRight -= s.atk*0.8; baseFlashR = 1;
        burst(BASE_X_RIGHT-30, LANE_Y[s.lane]-30, '#c8a8ff', 6, 130, 0.35);
        sfx.baseHit(); gone=true;
      }
      if(gone){ shots[i]=shots[shots.length-1]; shots.pop(); }
    }

    entities = entities.filter(e=>!e.dead);
    baseFlashL = Math.max(0, baseFlashL-dt*3);
    baseFlashR = Math.max(0, baseFlashR-dt*3);
    updateParts(dt); updateFloats(dt);
    shake *= Math.pow(0.001, dt);

    // еӢқиІ 
    if(baseHpLeft<=0){
      sfx.lose(); freeze=0.15; shake=10;
      gameOverState.win = false; setState(gameOverState);
    } else if(mode==='normal' && baseHpRight<=0){
      sfx.win(); freeze=0.1;
      burst(BASE_X_RIGHT, 260, COL.yellow, 40, 300, 0.9);
      gameOverState.win = true; setState(gameOverState);
    }
  },
  draw(){
    ctx.drawImage(bgCanvas,0,0);
    drawSkyMotion(performance.now()/1000);
    ctx.save();
    ctx.translate((Math.random()*2-1)*shake, (Math.random()*2-1)*shake);

    drawBase(BASE_X_LEFT-18, 'player');
    drawBase(BASE_X_RIGHT+18, 'enemy');
    drawLaneAim();

    const sorted = entities.slice().sort((a,b)=>a.y-b.y);
    for(const e of sorted) drawUnit(e);
    for(const s of shots){
      ctx.drawImage(glowGold, s.x-16, s.y-16, 32, 32);
      ctx.fillStyle='#fff3c9';
      ctx.beginPath(); ctx.ellipse(s.x,s.y,9,4,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#d99a2b'; ctx.lineWidth=1.5; ctx.stroke();
    }
    drawParts(); drawFloats();
    ctx.restore();

    drawHUD();

    // й–Ӣе ҙжҸҗзӨәжө®еұӨ
    if(hintT < 6 && mode==='normal'){
      const a = hintT<5 ? 1 : (6-hintT);
      ctx.globalAlpha = a*(0.75+0.25*Math.sin(performance.now()/200));
      ctx.fillStyle='rgba(0,0,0,0.55)';
      rr(ctx, GAME_W/2-260, 196, 520, 92, 14); ctx.fill();
      ctx.strokeStyle=COL.yellow; ctx.lineWidth=2; rr(ctx, GAME_W/2-260, 196, 520, 92, 14); ctx.stroke();
      ctx.fillStyle='#fff'; ctx.font='bold 19px sans-serif'; ctx.textAlign='center';
      ctx.fillText('й»һдёӢж–№еҚЎзүҮжҙҫеҮәиІ“е’ӘпјҢдҝқиӯ·е·ҰйӮҠзҡ„иІ“е’ӘеЎ”пјҒ', GAME_W/2, 222);
      ctx.font='15px sans-serif'; ctx.fillStyle=COL.yellow;
      ctx.fillText('е…Ҳй»һи·Ҝз·ҡеҸҜжҢҮе®ҡдҪҲйҷЈпјҢдёҚй»һеүҮиҮӘеӢ•ијӘжөҒ', GAME_W/2, 248);
      ctx.font='13px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.8)';
      ctx.fillText('в–ј ж•өдәә 8 з§’еҫҢйҖІж”»пјҒйӣ»и…Ұпјҡ1гҖң4 еҮәе…өгҖҒвҶ‘вҶ“ йҒёи·Ҝз·ҡ', GAME_W/2, 272);
      ctx.globalAlpha = 1;
    }
  }
};
function hitUnit(target, atk, side){
  target.hp -= atk;
  target.hitFlash = 1;
  target.sx = 0.8; target.sy = 1.2;
  shake = Math.min(shake+1.5, 6);
  sfx.hit();
  burst(target.x, target.y-26, '#fff', 3, 90, 0.25);
  if(target.hp<=0 && !target.dead){
    target.dead = true;
    kills++;
    freeze = Math.max(freeze, target.type.kind==='boss'?0.14:0.04);
    burst(target.x, target.y-24, side==='player'?COL.pink:COL.cyan, target.type.kind==='boss'?36:16, 200, 0.6);
    if(side==='player'){
      const r = target.type.reward||0;
      // йҖЈж“Ҡзі»зөұпјҡ1.3з§’е…§йҖЈзәҢж“Ҡж®әжңғз–Ҡ comboпјҢ3йҖЈж®әиө·йЎҚеӨ–еҠ жҲҗпјҲзҚҺеӢөиҰҒеӨ§иҒІпјү
      combo++; comboTimer = 1.3;
      comboBestRun = Math.max(comboBestRun, combo);
      const comboBonus = combo>=3 ? Math.min(combo-2, 8) : 0;
      const gained = r + comboBonus;
      coins = Math.min(999, coins+gained);
      score += gained*10 + (combo>=3 ? combo*2 : 0);
      addFloat(target.x, target.y-46, '+'+gained+' йӯҡе№Ј', COL.yellow);
      if(combo>=3) addFloat(target.x, target.y-66, combo+' йҖЈж®әпјҒ', combo>=6?'#ffcf5c':'#ff9dd6', combo>=6);
      sfx.kill(1 + Math.min(combo,8)*0.05);
      if(target.type.kind==='boss'){
        bossAlive = false;
        shake = 12;
        addFloat(target.x, target.y-70, 'ж“Ҡж•—иқҷиқ зҺӢпјҒ', '#d64bff', true);
      }
    } else {
      addFloat(target.x, target.y-46, 'е–өе—ҡвҖҰ', 'rgba(255,255,255,0.8)');
    }
  }
}

    ctx.quadraticCurveTo(72,-110+flap,64,-58); ctx.quadraticCurveTo(52,-66,34,-52); ctx.closePath(); ctx.fill();

function drawLaneAim(){
  // зҺ©е®¶зһ„жә–дёӯзҡ„и·Ҝз·ҡй«ҳдә®пјҲй…ҚеҗҲйҚөзӣӨвҶ‘вҶ“пјҸе…Ҳй»һжҲ°е ҙзҡ„дҪҲйҷЈзһ„жә–пјү
  if(targetLane<0 || targetLaneT<=0) return;
  const y = LANE_Y[targetLane];
  const pulse = 0.5+0.3*Math.sin(performance.now()/120);
  ctx.save();
  ctx.globalAlpha = Math.min(1,targetLaneT)*pulse;
  const grad = ctx.createLinearGradient(BASE_X_LEFT,0,BASE_X_RIGHT,0);
  grad.addColorStop(0,'rgba(255,207,92,0)'); grad.addColorStop(0.5,'rgba(255,207,92,0.55)'); grad.addColorStop(1,'rgba(255,207,92,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(BASE_X_LEFT, y-20, BASE_X_RIGHT-BASE_X_LEFT, 40);
  ctx.globalAlpha = Math.min(1,targetLaneT);
  ctx.fillStyle = COL.yellow;
  ctx.beginPath();
  ctx.moveTo(BASE_X_LEFT+18, y-11); ctx.lineTo(BASE_X_LEFT+34, y); ctx.lineTo(BASE_X_LEFT+18, y+11);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

/* ===================== и§’иүІзІҫзҙ°еҢ–пјҡйӣўеұҸй җзғҳз„ҷ spriteпјҲжјёеұӨеҸ—е…ү/иғҢе…үйҷ°еҪұпјүпјӢйӣҷиЎЁжғ…зӢҖж…Ӣ =====================
   иЁӯиЁҲпјҡиә«й«”/й ӯ/иҖізӯүгҖҢи·ҹи‘— bob ж•ҙй«”з§»еӢ•гҖҒйЎҸиүІеӣәе®ҡгҖҚзҡ„йқңж…ӢйғЁд»¶е…Ҳзғҳз„ҷжҲҗ offscreen canvas spriteпјҲжјёеұӨйҷ°еҪұпјӢијӘ
   е»“з·ҡеҸӘз®—дёҖж¬ЎпјҢжҲ°й¬ҘдёӯеӨ§йҮҸе–®дҪҚеҗҢжЎҶд№ҹдёҚжңғжҜҸе№ҖйҮҚз®—жјёеұӨжӢ–йҖҹеәҰпјүпјӣе°ҫе·ҙ/и…і/зҝ…иҶҖ/иЎЁжғ…зӯүгҖҢжңғж“әеӢ•жҲ–йңҖиҰҒеҚіжҷӮеҸҚжҮүгҖҚ
   зҡ„йғЁд»¶з¶ӯжҢҒеҚіжҷӮи·Ҝеҫ‘з№ӘиЈҪпјҢз–ҠеңЁ sprite дёҠж–№гҖӮиЎЁжғ…дҫқ hitFlash еҲҶгҖҢе№іеёёпјҲеҗ«зңЁзңјпјүпјҸеҸ—ж“ҠпјҲзҡәзңү+й©ҡе‘јеҳҙжҲ–жіӣзҙ…зһӘ
   зңјпјүгҖҚе…©ж…ӢпјҢж»ҝи¶ігҖҢиҮіе°‘е…©зЁ®зӢҖж…ӢгҖҚдё”е‘јжҮүеҸ—ж“ҠеӣһйҘӢгҖӮ */
const spriteCache = new Map();
function lightenColor(hex, amt){
  const n = parseInt(hex.slice(1),16);
  let r=(n>>16)&255, g=(n>>8)&255, b=n&255;
  r=Math.min(255, Math.round(r+(255-r)*amt));
  g=Math.min(255, Math.round(g+(255-g)*amt));
  b=Math.min(255, Math.round(b+(255-b)*amt));
  return 'rgb('+r+','+g+','+b+')';
}
function bakeCatSprite(type, flash){
  const key = 'cat_'+type.name+(flash?'_h':'');
  if(spriteCache.has(key)) return spriteCache.get(key);
  const W=90,H=76,OX=44,OY=58;
  const cv = document.createElement('canvas'); cv.width=W; cv.height=H;
  const g = cv.getContext('2d');
  g.translate(OX,OY);
  const c = flash ? '#ffffff' : type.color;
  const d = flash ? '#dddddd' : type.dark;
  // иә«й«”пјҡе·ҰдёҠеҸ—е…үвҶ’еҸідёӢиғҢе…үжјёеұӨпјҢеҒҡеҮәз«Ӣй«”ж„ҹпјҲеҸ–д»ЈеҺҹжң¬зҡ„е–®иүІе№іеЎ—пјү
  const bodyGrad = g.createLinearGradient(-15,-28,14,-3);
  bodyGrad.addColorStop(0, lightenColor(c,0.3));
  bodyGrad.addColorStop(0.55, c);
  bodyGrad.addColorStop(1, d);
  g.fillStyle = bodyGrad;
  g.beginPath(); g.ellipse(0,-16,15,14,0,0,Math.PI*2); g.fill();
  g.strokeStyle='rgba(0,0,0,0.35)'; g.lineWidth=1.5; g.stroke();
  // иӮҡеӯҗдә®йқў
  g.fillStyle='rgba(255,255,255,0.4)';
  g.beginPath(); g.ellipse(2,-12,7,7,0,0,Math.PI*2); g.fill();
  // й ӯпјҡеҗҢжЁЈзҡ„еҸ—е…ү/иғҢе…үжјёеұӨ
  const headGrad = g.createLinearGradient(-5,-46,19,-22);
  headGrad.addColorStop(0, lightenColor(c,0.32));
  headGrad.addColorStop(0.6, c);
  headGrad.addColorStop(1, d);
  g.fillStyle = headGrad;
  g.beginPath(); g.arc(8,-34,13,0,Math.PI*2); g.fill();
  g.strokeStyle='rgba(0,0,0,0.35)'; g.lineWidth=1.5; g.stroke();
  // иҖіжңө
  g.fillStyle=c; g.strokeStyle='rgba(0,0,0,0.35)'; g.lineWidth=1.5;
  g.beginPath(); g.moveTo(-1,-43); g.lineTo(3,-53); g.lineTo(9,-44); g.closePath(); g.fill(); g.stroke();
  g.beginPath(); g.moveTo(12,-44); g.lineTo(17,-53); g.lineTo(20,-42); g.closePath(); g.fill(); g.stroke();
  g.fillStyle='#ff9db8';
  g.beginPath(); g.moveTo(2,-44); g.lineTo(4,-50); g.lineTo(7,-44); g.closePath(); g.fill();
  const spr = { canvas:cv, ox:OX, oy:OY };
  spriteCache.set(key, spr);
  return spr;
}
function drawCatFace(hurt, seed){
  if(hurt){
    // еҸ—ж“ҠиЎЁжғ…пјҡзҡәзңүпјӢзһҮзңјпјӢй©ҡе‘јеҳҙ
    ctx.strokeStyle='#191919'; ctx.lineWidth=1.6; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(2.5,-38); ctx.lineTo(7,-36);
    ctx.moveTo(15.5,-36); ctx.lineTo(11,-38);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(3,-35); ctx.lineTo(7,-33);

    ctx.fillStyle='#7a1020';
    ctx.beginPath(); ctx.ellipse(9,-29.5,2.2,3,0,0,Math.PI*2); ctx.fill();
  } else {
    // е№іеёёиЎЁжғ…пјҡең“зңјпјӢй«ҳе…үпјҢеҒ¶зҲҫзңЁзңјпјӣеҳҙе·ҙз¶ӯжҢҒеҫ®з¬‘еј§з·ҡ
    const blink = Math.sin(performance.now()/900 + seed*3) > 0.965;
    if(blink){
      ctx.strokeStyle='#191919'; ctx.lineWidth=1.6; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(3,-35); ctx.lineTo(7,-35);
      ctx.moveTo(11,-35); ctx.lineTo(15,-35); ctx.stroke();

      ctx.fillStyle='#191919';

      ctx.beginPath(); ctx.arc(13.8,-35.8,0.8,0,Math.PI*2); ctx.fill();
    }
    ctx.strokeStyle='#191919'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.arc(9,-30,2.6,0.15*Math.PI,0.85*Math.PI); ctx.stroke();
  }
}
function bakeEnemySprite(type, hurt){
  const key = 'enemy_'+type.name+(hurt?'_h':'');
  if(spriteCache.has(key)) return spriteCache.get(key);
  const c = hurt ? '#ffffff' : type.color;
  const d = hurt ? '#e2e2e2' : type.dark;
  let spr;
  if(type.kind==='bat' || type.kind==='boss'){
    const s = type.kind==='boss' ? 2.1 : 1;
    const W=170,H=150,OX=85,OY=90;
    const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
    const g=cv.getContext('2d'); g.translate(OX,OY);
    const bg=g.createLinearGradient(-9*s,-11*s,9*s,11*s);
    bg.addColorStop(0,lightenColor(c,0.32)); bg.addColorStop(0.55,c); bg.addColorStop(1,d);
    g.fillStyle=bg;
    g.beginPath(); g.ellipse(0,0,10*s,12*s,0,0,Math.PI*2); g.fill();
    g.strokeStyle='rgba(0,0,0,0.4)'; g.lineWidth=1.5; g.stroke();
    g.fillStyle=c; g.strokeStyle='rgba(0,0,0,0.35)'; g.lineWidth=1;
    g.beginPath(); g.moveTo(-8*s,-8*s); g.lineTo(-6*s,-16*s); g.lineTo(-2*s,-9*s); g.closePath(); g.fill(); g.stroke();
    g.beginPath(); g.moveTo(8*s,-8*s); g.lineTo(6*s,-16*s); g.lineTo(2*s,-9*s); g.closePath(); g.fill(); g.stroke();
    g.fillStyle='#fff';
    g.beginPath(); g.moveTo(-3*s,4*s); g.lineTo(-2*s,7*s); g.lineTo(-1*s,4*s); g.closePath(); g.fill();
    g.beginPath(); g.moveTo(1*s,4*s); g.lineTo(2*s,7*s); g.lineTo(3*s,4*s); g.closePath(); g.fill();
    if(type.kind==='boss'){
      g.fillStyle='#ffcf5c';
      g.beginPath();
      g.moveTo(-9,-34); g.lineTo(-9,-44); g.lineTo(-4,-37); g.lineTo(0,-46);
      g.lineTo(4,-37); g.lineTo(9,-44); g.lineTo(9,-34); g.closePath(); g.fill();
      g.strokeStyle='#b8860b'; g.lineWidth=1.5; g.stroke();
    }
    spr={canvas:cv,ox:OX,oy:OY};
  } else if(type.kind==='beetle'){
    const W=90,H=90,OX=35,OY=55;
    const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
    const g=cv.getContext('2d'); g.translate(OX,OY);
    const shellGrad=g.createLinearGradient(-15,-24,14,-4);
    shellGrad.addColorStop(0,lightenColor(c,0.3)); shellGrad.addColorStop(0.55,c); shellGrad.addColorStop(1,d);
    g.fillStyle=shellGrad;
    g.beginPath(); g.ellipse(0,-14,17,12,0,0,Math.PI*2); g.fill();
    g.strokeStyle='rgba(0,0,0,0.45)'; g.lineWidth=2; g.stroke();
    g.strokeStyle=d; g.lineWidth=2;
    g.beginPath(); g.moveTo(-14,-18); g.quadraticCurveTo(0,-10,14,-18); g.stroke();
    g.beginPath(); g.moveTo(-15,-12); g.quadraticCurveTo(0,-5,15,-12); g.stroke();
    g.fillStyle='rgba(255,255,255,0.3)';
    g.beginPath(); g.ellipse(-5,-20,6,3.5,-0.4,0,Math.PI*2); g.fill();
    const headGrad=g.createLinearGradient(8,-21,22,-7);
    headGrad.addColorStop(0,lightenColor(d,0.32)); headGrad.addColorStop(1,d);
    g.fillStyle=headGrad;
    g.beginPath(); g.arc(15,-14,7,0,Math.PI*2); g.fill();
    g.strokeStyle=d; g.lineWidth=3;
    g.beginPath(); g.moveTo(19,-18); g.quadraticCurveTo(26,-26,23,-31); g.stroke();
    spr={canvas:cv,ox:OX,oy:OY};
  } else {
    // ж®ӯеұҚйј 
    const W=90,H=90,OX=35,OY=55;
    const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
    const g=cv.getContext('2d'); g.translate(OX,OY);
    const bodyGrad=g.createLinearGradient(-14,-22,13,-2);
    bodyGrad.addColorStop(0,lightenColor(c,0.28)); bodyGrad.addColorStop(0.55,c); bodyGrad.addColorStop(1,d);
    g.fillStyle=bodyGrad;
    g.beginPath(); g.ellipse(0,-12,14,11,0,0,Math.PI*2); g.fill();
    g.strokeStyle='rgba(0,0,0,0.4)'; g.lineWidth=1.5; g.stroke();
    g.strokeStyle='#3f6f3a'; g.lineWidth=1.5;
    g.beginPath(); g.moveTo(-6,-18); g.lineTo(0,-12); g.stroke();
    g.beginPath(); g.moveTo(-5,-16); g.lineTo(-3,-18); g.moveTo(-3,-15); g.lineTo(-1,-17); g.stroke();
    const headGrad=g.createLinearGradient(2,-31,20,-13);
    headGrad.addColorStop(0,lightenColor(c,0.3)); headGrad.addColorStop(0.6,c); headGrad.addColorStop(1,d);
    g.fillStyle=headGrad;
    g.beginPath(); g.arc(11,-22,9,0,Math.PI*2); g.fill();
    g.strokeStyle='rgba(0,0,0,0.4)'; g.stroke();
    g.fillStyle=d;
    g.beginPath(); g.arc(5,-30,4.5,0,Math.PI*2); g.fill();
    g.beginPath(); g.arc(15,-31,4.5,0,Math.PI*2); g.fill();
    g.fillStyle='#e8768f';
    g.beginPath(); g.arc(19.5,-20,2,0,Math.PI*2); g.fill();
    spr={canvas:cv,ox:OX,oy:OY};
  }
  spriteCache.set(key, spr);
  return spr;
}

function drawCatBody(x, y, type, scale, bob, lunge, flash, rarity){
  ctx.save();
  ctx.translate(x + lunge*10, y);
  ctx.scale(scale, scale);
  // зЁҖжңүеәҰе…үз’°пјҲзғҳз„ҷе…үжҡҲпјү
  if(rarity>=1){
    const gl = rarity>=3?glowGold:(rarity>=2?glowPink:glowCyan);
    ctx.globalAlpha = 0.7;
    ctx.drawImage(gl, -30, -18, 60, 26);
    ctx.globalAlpha = 1;
  }
  // еҪұеӯҗ
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(0,2,18,6,0,0,Math.PI*2); ctx.fill();
  const d = flash ? '#dddddd' : type.dark;
  // и…іпјҲзҚЁз«ӢеҪҲи·іпјҢдёҚйҡЁ bobпјҢиө°и·ҜеҫӘз’°зҡ„жҠ¬и…іж„ҹпјү
  ctx.fillStyle=d;
  ctx.beginPath(); ctx.ellipse(-8,-2+Math.abs(Math.sin(performance.now()/110+x))*1.5,5,4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(8,-2+Math.abs(Math.cos(performance.now()/110+x))*1.5,5,4,0,0,Math.PI*2); ctx.fill();

  ctx.save();
  ctx.translate(0, bob);
  // е°ҫе·ҙпјҲйҡЁиә«й«” bobпјӢиҮӘе·ұзҡ„ж“әеӢ•пјү
  ctx.strokeStyle=d; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-14,-14);
  ctx.quadraticCurveTo(-26,-20+Math.sin(performance.now()/200+x)*3,-24,-34); ctx.stroke();
  // иә«й«”пјӢй ӯпјӢиҖіжңөпјҡйӣўеұҸй җзғҳз„ҷ spriteпјҲжјёеұӨеҸ—е…ү/иғҢе…үйҷ°еҪұпјӢијӘе»“з·ҡпјү
  const spr = bakeCatSprite(type, !!flash);
  ctx.drawImage(spr.canvas, -spr.ox, -spr.oy);
  // иЎЁжғ…пјҲе№іеёёзңЁзңјпјҸеҸ—ж“Ҡзҡәзңүй©ҡе‘јпјү
  drawCatFace(!!flash, x);
  // й¬Қй¬ҡ
  ctx.strokeStyle='rgba(255,255,255,0.65)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(18,-33); ctx.lineTo(25,-34); ctx.moveTo(18,-30); ctx.lineTo(25,-29); ctx.stroke();
  // иҒ·жҘӯй…Қд»¶
  if(type.kind==='tank'){
    ctx.fillStyle='#c8d6ff'; ctx.strokeStyle='#3057c0'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(8,-40,11,Math.PI*1.05,Math.PI*1.95); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#8aa8ff'; rr(ctx,16,-28,7,20,3); ctx.fill();
    ctx.strokeStyle='#3057c0'; rr(ctx,16,-28,7,20,3); ctx.stroke();
  } else if(type.kind==='ninja'){
    ctx.fillStyle='#b8286d';
    rr(ctx,-3,-32,22,5,2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-3,-30); ctx.lineTo(-12,-22); ctx.lineTo(-8,-19); ctx.lineTo(-1,-27); ctx.closePath(); ctx.fill();
  } else if(type.kind==='gunner'){
    ctx.fillStyle='#4a3080'; rr(ctx,10,-26,16,9,4); ctx.fill();
    ctx.strokeStyle='#2a1a50'; ctx.lineWidth=1.5; rr(ctx,10,-26,16,9,4); ctx.stroke();
    ctx.fillStyle='#ffcf5c'; ctx.beginPath(); ctx.arc(26,-21.5,3,0,Math.PI*2); ctx.fill();
  } else {
    // дёҖиҲ¬иІ“пјҡжўқзҙӢ
    ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-8,-24); ctx.lineTo(-4,-20); ctx.moveTo(-10,-18); ctx.lineTo(-6,-14); ctx.stroke();
  }
  ctx.restore();
  ctx.restore();
}

function drawEnemyBody(x, y, type, dir, bob, lunge, hurt){
  ctx.save();
  ctx.translate(x + lunge*10*dir, y);
  ctx.scale(-dir, 1);   // ж•өдәәйқўеҗ‘е·Ұ
  const d = hurt ? '#e2e2e2' : type.dark;
  if(type.kind==='bat' || type.kind==='boss'){
    const s = type.kind==='boss' ? 2.1 : 1;
    const fl = Math.sin(performance.now()/90+x)*10;
    ctx.translate(0, -34*s + bob*2);
    // еҪұеӯҗпјҲжө®з©әе°Ҹпјү
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(0,34*s,12*s,4*s,0,0,Math.PI*2); ctx.fill();
    // зҝ…иҶҖпјҲеҚіжҷӮжӢҚеӢ•пјү
    ctx.fillStyle=d;
    ctx.beginPath(); ctx.moveTo(-6*s,0);
    ctx.quadraticCurveTo(-26*s,-14*s+fl,-30*s,4*s); ctx.quadraticCurveTo(-18*s,2*s,-8*s,8*s); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(6*s,0);
    ctx.quadraticCurveTo(26*s,-14*s+fl,30*s,4*s); ctx.quadraticCurveTo(18*s,2*s,8*s,8*s); ctx.closePath(); ctx.fill();
    // иә«й«”пјӢиҖіпјӢзҚ зүҷпјҲпјӢзҺӢиҖ…зҺӢеҶ пјүпјҡйӣўеұҸй җзғҳз„ҷ sprite
    const spr = bakeEnemySprite(type, !!hurt);
    ctx.drawImage(spr.canvas, -spr.ox, -spr.oy);
    // иЎЁжғ…пјҡе№іеёёеҒ¶зҲҫзңЁзңјпјҸеҸ—ж“ҠзһӘеӨ§жіӣзҙ…зңј
    const blink = !hurt && Math.sin(performance.now()/850 + x*2.7) > 0.97;
    if(blink){
      ctx.strokeStyle='#fff700'; ctx.lineWidth=1.4*s; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(-6*s,-3*s); ctx.lineTo(-2*s,-3*s);
      ctx.moveTo(2*s,-3*s); ctx.lineTo(6*s,-3*s); ctx.stroke();
    } else {
      ctx.fillStyle = hurt ? '#ff4d4d' : '#fff700';
      ctx.beginPath(); ctx.arc(-4*s,-3*s,(hurt?2.6:2)*s,0,Math.PI*2); ctx.arc(4*s,-3*s,(hurt?2.6:2)*s,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = hurt ? '#3a0000' : '#191919';
      ctx.beginPath(); ctx.arc(-4.6*s,-3*s,0.9*s,0,Math.PI*2); ctx.arc(3.4*s,-3*s,0.9*s,0,Math.PI*2); ctx.fill();
    }
  } else if(type.kind==='beetle'){
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.ellipse(0,2,17,5,0,0,Math.PI*2); ctx.fill();
    // е…ӯи…і
    ctx.strokeStyle=d; ctx.lineWidth=3; ctx.lineCap='round';
    for(let i=0;i<3;i++){
      const lx=-8+i*8, off=Math.sin(performance.now()/100+i+x)*2;
      ctx.beginPath(); ctx.moveTo(lx,-8); ctx.lineTo(lx-3,0+off); ctx.stroke();
    }
    ctx.save();
    ctx.translate(0, bob);
    // ж®јпјӢй ӯпјӢи§’пјҡйӣўеұҸй җзғҳз„ҷ sprite
    const spr = bakeEnemySprite(type, !!hurt);
    ctx.drawImage(spr.canvas, -spr.ox, -spr.oy);
    // иЎЁжғ…пјҡе–®зңјзҷје…үпјҢе№іеёёеҒ¶зҲҫзңЁпјҸеҸ—ж“Ҡи®ҠеӨ§жіӣзҙ…
    const blink = !hurt && Math.sin(performance.now()/800 + x*2.2) > 0.97;
    if(blink){
      ctx.strokeStyle='#fff700'; ctx.lineWidth=1.4; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(14,-15); ctx.lineTo(20,-15); ctx.stroke();
    } else {
      ctx.fillStyle = hurt ? '#ff4d4d' : '#fff700';
      ctx.beginPath(); ctx.arc(17,-15,hurt?3:2,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  } else {
    // ж®ӯеұҚйј 
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.ellipse(0,2,15,5,0,0,Math.PI*2); ctx.fill();
    // е°ҫе·ҙ
    ctx.strokeStyle='#5e8f58'; ctx.lineWidth=3; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-12,-8+bob);
    ctx.quadraticCurveTo(-24,-4+bob+Math.sin(performance.now()/150+x)*3,-28,-14+bob); ctx.stroke();
    // и…і
    ctx.fillStyle=d;
    ctx.beginPath(); ctx.ellipse(-6,-1+Math.abs(Math.sin(performance.now()/100+x))*1.5,4,3,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(6,-1+Math.abs(Math.cos(performance.now()/100+x))*1.5,4,3,0,0,Math.PI*2); ctx.fill();
    ctx.save();
    ctx.translate(0, bob);
    // иә«й«”пјӢзё«з·ҡпјӢй ӯпјӢең“иҖіпјӢйј»пјҡйӣўеұҸй җзғҳз„ҷ sprite
    const spr = bakeEnemySprite(type, !!hurt);
    ctx.drawImage(spr.canvas, -spr.ox, -spr.oy);
    // зңјпјҲдёҖеҖӢXдёҖеҖӢзҷје…үпјүпјҡеҸ—ж“ҠжҷӮзҷје…үзңји®ҠеӨ§жіӣзҙ…гҖҒX зңјз·ҡжўқеҠ зІ—
    const eyeCol = hurt ? '#ff4d4d' : '#fff700';
    ctx.strokeStyle='#191919'; ctx.lineWidth = hurt?2.2:1.5;
    ctx.beginPath(); ctx.moveTo(6,-25); ctx.lineTo(10,-21); ctx.moveTo(10,-25); ctx.lineTo(6,-21); ctx.stroke();
    ctx.fillStyle=eyeCol;
    ctx.beginPath(); ctx.arc(15,-23,hurt?3.2:2.4,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

function drawUnit(e){
  const bob = Math.sin(e.walkT*9)*2.2;
  ctx.save();
  ctx.translate(e.x, e.y);
  ctx.scale(e.sx, e.sy);
  ctx.translate(-e.x, -e.y);
  if(e.side==='player') drawCatBody(e.x, e.y, e.type, 1, bob, e.lunge, e.hitFlash>0.4, collection[CAT_TYPES.indexOf(e.type)]);
  else drawEnemyBody(e.x, e.y, e.type, -1, bob, e.lunge, e.hitFlash>0.4);
  ctx.restore();
  // иЎҖжўқ
  if(e.hp < e.maxHp){
    const w = e.type.kind==='boss'?56:30;
    const hy = e.type.kind==='boss' ? e.y-96 : (e.type.kind==='bat'? e.y-64 : e.y-58);
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(e.x-w/2, hy, w, 5);
    ctx.fillStyle = e.side==='player'?COL.cyan:COL.pink;
    ctx.fillRect(e.x-w/2, hy, w*clamp(e.hp/e.maxHp,0,1), 5);
  }
}

/* ===================== HUD ===================== */
function drawRotateIcon(cx, cy, s){
  // жүӢз№Әж—ӢиҪүжүӢж©ҹең–зӨәпјҲдёҚз”ЁиЎЁжғ…з¬Ұиҷҹз•¶ең–зӨәпјүпјҡзӣҙеҗ‘ж·ЎеҮәжЎҶ вҶ’ ж—ӢиҪүз®ӯй ӯ вҶ’ ж©«еҗ‘еҜҰжЎҶ
  ctx.save();
  ctx.translate(cx, cy);
  ctx.lineJoin = 'round';
  ctx.globalAlpha = 0.55;
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2*s;
  rr(ctx, -6*s, -10*s, 12*s, 20*s, 3*s); ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.strokeStyle = COL.yellow; ctx.lineWidth = 2.4*s;
  ctx.beginPath(); ctx.arc(0, 0, 15*s, -0.65*Math.PI, 0.55*Math.PI); ctx.stroke();
  const ax = 15*s*Math.cos(0.55*Math.PI), ay = 15*s*Math.sin(0.55*Math.PI);
  ctx.save();
  ctx.translate(ax, ay); ctx.rotate(0.55*Math.PI + Math.PI/2);
  ctx.beginPath(); ctx.moveTo(-4*s,-3.5*s); ctx.lineTo(4*s,0); ctx.lineTo(-4*s,3.5*s); ctx.closePath();
  ctx.fillStyle = COL.yellow; ctx.fill();
  ctx.restore();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2*s;
  rr(ctx, -10*s, -6*s, 20*s, 12*s, 3*s); ctx.stroke();
  ctx.restore();
}
function drawPortraitHint(){
  // зӣҙеҗ‘иЈқзҪ®жҸҗзӨәпјҲйҒҠжҲІиЁӯиЁҲжҢҮеҚ—(f)(5)пјүпјҡеҸӘеңЁйҒёе–®/зөҗз®—з•«йқўйЎҜзӨәпјҢдёҚж“ӢйҒҠзҺ©дёӯзҡ„иҰ–йҮҺ
  if(!isPortrait) return;
  if(state!==menuState && state!==gameOverState) return;
  ctx.save();
  ctx.fillStyle='rgba(4,1,14,0.82)';
  rr(ctx, GAME_W/2-170, 6, 340, 30, 15); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=1.5;
  rr(ctx, GAME_W/2-170, 6, 340, 30, 15); ctx.stroke();
  drawRotateIcon(GAME_W/2-145, 21, 1);
  ctx.fillStyle='#fff'; ctx.font='bold 13px sans-serif'; ctx.textAlign='left';
  ctx.fillText('е»әиӯ°е°ҮиЈқзҪ®ж©«ж”ҫпјҢз•«йқўиҲҮи§ёжҺ§зҜ„еңҚжӣҙеӨ§жӣҙеҘҪзҺ©', GAME_W/2-118, 25);
  ctx.textAlign='center';
  ctx.restore();
}
function drawMuteBtn(){
  ctx.save();
  ctx.fillStyle='rgba(4,1,12,0.7)';
  rr(ctx,MUTE_BTN.x,MUTE_BTN.y,MUTE_BTN.w,MUTE_BTN.h,12); ctx.fill();
  ctx.strokeStyle= muted?'rgba(255,255,255,0.3)':COL.cyan; ctx.lineWidth=2;
  rr(ctx,MUTE_BTN.x,MUTE_BTN.y,MUTE_BTN.w,MUTE_BTN.h,12); ctx.stroke();
  const cx=MUTE_BTN.x+24, cy=MUTE_BTN.y+24;
  ctx.fillStyle = muted?'#888':'#fff';
  ctx.beginPath();
  ctx.moveTo(cx-10,cy-4); ctx.lineTo(cx-4,cy-4); ctx.lineTo(cx+3,cy-11);
  ctx.lineTo(cx+3,cy+11); ctx.lineTo(cx-4,cy+4); ctx.lineTo(cx-10,cy+4); ctx.closePath(); ctx.fill();
  if(muted){
    ctx.strokeStyle='#ff5555'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(cx+6,cy-6); ctx.lineTo(cx+14,cy+6); ctx.moveTo(cx+14,cy-6); ctx.lineTo(cx+6,cy+6); ctx.stroke();
  } else {
    ctx.strokeStyle=COL.cyan; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(cx+5,cy,6,-0.8,0.8); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx+5,cy,10,-0.7,0.7); ctx.stroke();
  }
  ctx.restore();
}
function drawHUD(){
  // й ӮеҲ—
  ctx.fillStyle='rgba(4,1,12,0.7)';
  rr(ctx,12,10,190,40,12); ctx.fill();
  ctx.strokeStyle='rgba(255,247,0,0.5)'; ctx.lineWidth=1.5; rr(ctx,12,10,190,40,12); ctx.stroke();
  // йӯҡе№Јең–зӨә
  ctx.fillStyle=COL.yellow;
  ctx.beginPath(); ctx.ellipse(36,30,11,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#c9a20a';
  ctx.beginPath(); ctx.moveTo(45,30); ctx.lineTo(53,24); ctx.lineTo(53,36); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#191919'; ctx.beginPath(); ctx.arc(32,28,1.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 20px sans-serif'; ctx.textAlign='left';
  ctx.fillText(String(coins), 62, 38);
  ctx.font='12px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.fillText('йӯҡе№ЈпјҲжҜҸз§’пјӢпјү', 118, 36);
  // дёӯеӨ®иіҮиЁҠ
  ctx.textAlign='center';
  ctx.fillStyle='rgba(4,1,12,0.7)'; rr(ctx,GAME_W/2-130,10,260,40,12); ctx.fill();
  ctx.strokeStyle='rgba(0,240,255,0.4)'; rr(ctx,GAME_W/2-130,10,260,40,12); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='bold 17px sans-serif';
  if(mode==='endless') ctx.fillText('з„ЎзӣЎжЁЎејҸгҖҖжіўж¬Ў '+endlessWave+'гҖҖеҲҶж•ё '+ (kills*5+Math.floor(elapsed)*10), GAME_W/2, 36);
  else ctx.fillText('ж”»жү“иқҷиқ еҹҺгҖҖ'+Math.floor(elapsed)+'sгҖҖж“ҠеҖ’ '+kills, GAME_W/2, 36);
  drawMuteBtn();

  // дёӢж–№еҮәе…өеҚЎзүҮ
  const bw = GAME_W/CAT_TYPES.length;
  const cardY = FIELD_BOT+34;
  for(let i=0;i<CAT_TYPES.length;i++){
    const t = CAT_TYPES[i];
    const cx = bw*i+bw/2;
    const ok = coins>=t.cost;
    const owned = collection[i];
    ctx.fillStyle = ok ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.35)';
    rr(ctx,bw*i+6,cardY,bw-12,GAME_H-cardY-6,12); ctx.fill();
    ctx.strokeStyle = owned>=0 ? RARITIES[owned].color : (ok ? t.color : 'rgba(255,255,255,0.15)');
    ctx.lineWidth = owned>=0 ? 3 : 2;
    rr(ctx,bw*i+6,cardY,bw-12,GAME_H-cardY-6,12); ctx.stroke();
    ctx.save();
    if(!ok) ctx.globalAlpha=0.45;
    drawCatBody(cx-52, cardY+52, t, 0.85, 0, 0, false, owned);
    ctx.restore();
    ctx.textAlign='left';
    ctx.fillStyle = ok ? '#fff' : '#888';
    ctx.font='bold 16px sans-serif';
    ctx.fillText(t.name, cx-22, cardY+26);
    ctx.fillStyle = ok ? COL.yellow : '#777';
    ctx.font='bold 15px sans-serif';
    ctx.fillText(t.cost+' йӯҡе№Ј', cx-22, cardY+46);
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.font='12px sans-serif';
    ctx.fillText('йҚөзӣӨ ['+(i+1)+']', cx-22, cardY+64);
    if(owned>=0){
      ctx.fillStyle=RARITIES[owned].color;
      ctx.font='bold 11px sans-serif';
      ctx.fillText(RARITIES[owned].name, cx+38, cardY+26);
    }
  }
  ctx.textAlign='center';
}

/* ===================== й»һж“Ҡиҷ•зҗҶ ===================== */
function onTap(x,y){
  if(pointInRect(x,y,MUTE_BTN)){ toggleMute(); return; }
  if(state===menuState){
    if(pointInRect(x,y,BTN_START)){ startBattle('normal'); return; }
    if(pointInRect(x,y,BTN_ENDLESS)){
      if(endlessUnlocked) startBattle('endless');
      else { sfx.deny(); addFloat(GAME_W/2, BTN_ENDLESS.y-8, 'е…ҲйҖҡй—ңдёҖж¬Ўе°ұиғҪи§ЈйҺ–пјҒ', '#ff8c7a'); }
      return;
    }
    if(pointInRect(x,y,BTN_GACHA_M)){ setState(gachaState); return; }
    return;
  }
  if(state===playState){
    const cardY = FIELD_BOT+34;
    // и§ёжҺ§зЁҪж ёпјҡеҮәе…өеҚЎзүҮзҡ„зёұеҗ‘е‘ҪдёӯзҶұеҚҖдҝқиӯүеңЁеҜҰй«”иһўе№•дёҠ вүҘ48pxпјҲеҫҖдёҠиЈң paddingпјҢдёҚж”№еҚЎзүҮиҰ–иҰәй«ҳеәҰпјү
    const scale = canvas._scale || 1;
    const cardH = GAME_H - cardY - 6;
    const padY = Math.max(0, (48/scale - cardH)/2);
    if(y >= cardY-padY){
      const idx = Math.floor(x/(GAME_W/CAT_TYPES.length));
      if(idx>=0 && idx<CAT_TYPES.length) trySpawn(idx);
    } else if(y >= FIELD_TOP-30){
      // е…Ҳй»һжҲ°е ҙи·Ҝз·ҡпјқзһ„жә–дҪҲйҷЈдҪҚзҪ®пјҢдёӢдёҖж¬ЎеҮәе…өжңғжҢҮе®ҡеҲ°йҖҷжўқи·Ҝз·ҡ
      const lane = nearestLane(y);
      laneCursor = lane; targetLane = lane; targetLaneT = 5;
      sfx.aim();
    }
    return;
  }
  if(state===gameOverState){
    if(gameOverState.t<=0.6) return;
    if(pointInRect(x,y,BTN_AGAIN)){ startBattle(lastMode); return; }
    if(pointInRect(x,y,BTN_GACHA_O)){ setState(gachaState); return; }
    if(pointInRect(x,y,BTN_MENU_O)){ setState(menuState); return; }
    return;
  }
  if(state===gachaState){
    if(pointInRect(x,y,GACHA_PULL_BTN)){ sfx.spin(); doGachaPull(); return; }
    if(pointInRect(x,y,GACHA_BACK_BTN)){ setState(menuState); return; }
    return;
  }
}

/* ===================== дё»иҝҙеңҲ ===================== */
const STEP = 1/60;
let last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  const rdt = Math.min((now-last)/1000, 0.1);
  acc += rdt;
  last = now;
  while(acc >= STEP){
    state.update(STEP);
    acc -= STEP;
  }
  state.draw();
  drawPortraitHint();
  // зӢҖж…ӢеҲҮжҸӣж·Ўе…Ҙж·ЎеҮәпјҡжҜҸж¬Ў setState йғҪжңғжҠҠ transitionT жӢүеӣһ 1пјҢйҖҷиЈЎиІ иІ¬ж·ЎеҮә
  if(transitionT > 0){
    transitionT = Math.max(0, transitionT - rdt*5);
    ctx.fillStyle = 'rgba(4,1,14,'+(transitionT*0.85)+')';
    ctx.fillRect(0,0,GAME_W,GAME_H);
  }
}
setState(menuState);
requestAnimationFrame(frame);

/* жё¬и©ҰжҺӣйүӨпјҲз„ЎеӨ–йғЁеҪұйҹҝпјү */
window.__dbg = () => ({
  state: state===menuState?'menu':state===playState?'play':state===gameOverState?'over':'gacha',
  coins, score, kills, entities: entities.length,
  baseL: baseHpLeft, baseR: baseHpRight, cans, mode, endlessUnlocked, muted,
  combo, comboBestRun, targetLane, isPortrait
});
window.__forceWin = () => { if(state===playState){ baseHpRight = 0; } };
window.__forceLose = () => { if(state===playState){ baseHpLeft = 0; } };
</script>
