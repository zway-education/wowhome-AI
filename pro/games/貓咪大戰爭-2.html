<script>
'use strict';
/* ============================================================
   貓咪大戰爭（-2 系列）— 專業AI升級版 v4
   夜色霓虹屋頂 4 路線對戰＋轉蛋收藏。派出貓咪部隊推倒蝙蝠城，
   擊敗蝙蝠王！通關一次解鎖「無盡模式」。
   與 pro/貓咪大戰爭.html（單線推塔＋五關卡＋貓貓砲）為不同作品：
   本作核心是「多路線佈陣 × 轉蛋稀有度養成 × 無盡挑戰」。
   ============================================================ */
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize(){
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = Math.round(GAME_W * scale * dpr);
  canvas.height = Math.round(GAME_H * scale * dpr);
  canvas.style.width  = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale;
}
addEventListener('resize', resize); resize();

const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const lerp = (a,b,t)=>a+(b-a)*t;
function rr(c,x,y,w,h,r){
  c.beginPath(); c.moveTo(x+r,y);
  c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath();
}

/* ===================== 音效：Web Audio 合成＋壓縮母線 ===================== */
let AC = null, master = null;
let muted = localStorage.getItem('catwars2_mute') === '1';
function audio(){
  if(!AC){
    AC = new (window.AudioContext||window.webkitAudioContext)();
    const comp = AC.createDynamicsCompressor();
    comp.threshold.value = -18; comp.knee.value = 24; comp.ratio.value = 6;
    comp.attack.value = 0.003; comp.release.value = 0.2;
    master = AC.createGain(); master.gain.value = 0.9;
    master.connect(comp); comp.connect(AC.destination);
  }
  if(AC.state === 'suspended') AC.resume();
  return AC;
}
addEventListener('pointerdown', audio, { once:true });
addEventListener('keydown', audio, { once:true });
function beep(freq=440, dur=0.1, type='square', vol=0.15, slide=0){
  if(muted || !AC) return;
  const f = freq * (0.94 + Math.random()*0.12);        // 隨機音高
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(f, AC.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, f+slide), AC.currentTime+dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
  o.connect(g).connect(master);
  o.start(); o.stop(AC.currentTime+dur);
}
function noiseHit(dur=0.15, vol=0.14){
  if(muted || !AC) return;
  const n = Math.floor(AC.sampleRate*dur);
  const buf = AC.createBuffer(1,n,AC.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
  const src = AC.createBufferSource(); src.buffer = buf;
  const g = AC.createGain(); g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
  src.connect(g).connect(master); src.start();
}
const sfx = {
  spawn : ()=>beep(500,0.09,'square',0.11,150),
  hit   : ()=>{ beep(190,0.05,'square',0.1,-60); },
  kill  : ()=>{ beep(320,0.08,'square',0.12,-120); noiseHit(0.1,0.08); },
  shoot : ()=>beep(760,0.06,'square',0.07,220),
  deny  : ()=>beep(150,0.09,'sawtooth',0.1,-40),
  baseHit:()=>{ beep(120,0.12,'sawtooth',0.13,-50); noiseHit(0.12,0.1); },
  boss  : ()=>{ beep(90,0.5,'sawtooth',0.2,-40); noiseHit(0.4,0.16); },
  win   : ()=>{ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.16,'square',0.14),i*110)); },
  lose  : ()=>{ beep(300,0.3,'sawtooth',0.14,-200); setTimeout(()=>beep(210,0.4,'sawtooth',0.12,-150),200); },
  coin  : ()=>{ beep(988,0.06,'square',0.1); setTimeout(()=>beep(1319,0.1,'square',0.1),70); },
  spin  : ()=>beep(320,0.1,'sine',0.09,180),
  reveal: r=>{
    const seq = [[600],[700,950],[800,1050,1300],[900,1150,1400,1750]][r];
    seq.forEach((f,i)=>setTimeout(()=>beep(f,0.12,'square',0.13+r*0.01),i*90));
  }
};

/* ===================== 輸入：滑鼠/觸控 + 鍵盤 ===================== */
function evPos(t){
  const r = canvas.getBoundingClientRect();
  return { x:(t.clientX-r.left)/canvas._scale, y:(t.clientY-r.top)/canvas._scale };
}
function pointInRect(x,y,r){ return x>=r.x && x<=r.x+r.w && y>=r.y && y<=r.y+r.h; }
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); const p=evPos(e.touches[0]); onTap(p.x,p.y); }, {passive:false});
canvas.addEventListener('mousedown', e=>{ e.preventDefault(); const p=evPos(e); onTap(p.x,p.y); });
canvas.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});

addEventListener('keydown', e=>{
  const num = {Digit1:0,Numpad1:0,Digit2:1,Numpad2:1,Digit3:2,Numpad3:2,Digit4:3,Numpad4:3}[e.code];
  if(num!==undefined && state===playState){ trySpawn(num); return; }
  if(e.code==='KeyM'){ toggleMute(); return; }
  if(e.code==='Space' || e.code==='Enter'){
    e.preventDefault();
    if(state===menuState) startBattle('normal');
    else if(state===gameOverState && gameOverState.t>0.6) startBattle(lastMode);
    else if(state===gachaState) doGachaPull();
  }
  else if(e.code==='KeyG'){ if(state===menuState||state===gameOverState) setState(gachaState); }
  else if(e.code==='KeyE'){ if(state===menuState && endlessUnlocked) startBattle('endless'); }
  else if(e.code==='Escape'){ if(state===gachaState||state===gameOverState) setState(menuState); }
});
function toggleMute(){
  muted = !muted;
  localStorage.setItem('catwars2_mute', muted?'1':'0');
}
const MUTE_BTN = { x:GAME_W-58, y:10, w:48, h:48 };

/* ===================== 粒子（swap-pop）與飄字 ===================== */
const parts = [];
function burst(x,y,color,n=12,speed=200,life=0.5){
  for(let i=0;i<n;i++){
    if(parts.length>=300) break;
    const a=Math.random()*Math.PI*2, s=speed*(0.3+Math.random()*0.7);
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:life*(0.7+Math.random()*0.6),maxLife:life,color,sz:3+Math.random()*4});
  }
}
function updateParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=520*dt; p.life-=dt;
    if(p.life<=0){ parts[i]=parts[parts.length-1]; parts.pop(); }
  }
}
function drawParts(){
  for(const p of parts){
    ctx.globalAlpha = Math.max(0,p.life/p.maxLife);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
  }
  ctx.globalAlpha = 1;
}
const floats = [];
function addFloat(x,y,text,color,big){ floats.push({x,y,text,color,life:0.8,big:!!big}); }
function updateFloats(dt){
  for(let i=floats.length-1;i>=0;i--){
    const f=floats[i]; f.y-=36*dt; f.life-=dt;
    if(f.life<=0){ floats[i]=floats[floats.length-1]; floats.pop(); }
  }
}
function drawFloats(){
  ctx.textAlign='center';
  for(const f of floats){
    ctx.font = f.big ? 'bold 26px sans-serif' : 'bold 17px sans-serif';
    ctx.globalAlpha = Math.max(0,f.life/0.8);
    ctx.fillStyle='#000'; ctx.fillText(f.text, f.x+1.5, f.y+1.5);
    ctx.fillStyle=f.color; ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

/* ===================== 預烘焙：光暈精靈 & 背景 ===================== */
function makeGlow(color, size){
  const c = document.createElement('canvas'); c.width=c.height=size;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(size/2,size/2,1,size/2,size/2,size/2);
  grad.addColorStop(0,color); grad.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=grad; g.fillRect(0,0,size,size);
  return c;
}
const glowCyan = makeGlow('rgba(0,240,255,0.55)',64);
const glowPink = makeGlow('rgba(255,41,117,0.55)',64);
const glowGold = makeGlow('rgba(255,207,92,0.6)',64);

const COL = { bg:'#0d0221', bg2:'#261447', pink:'#ff2975', cyan:'#00f0ff', yellow:'#fff700', white:'#f6f6f6' };
const FIELD_TOP = 108, FIELD_BOT = 452;
const LANES = 4;
const LANE_Y = [168, 262, 356, 448];
const BASE_X_LEFT = 78, BASE_X_RIGHT = 882;

const bgCanvas = document.createElement('canvas');
bgCanvas.width = GAME_W; bgCanvas.height = GAME_H;
(function bakeBG(){
  const g = bgCanvas.getContext('2d');
  // 夜空
  const sky = g.createLinearGradient(0,0,0,FIELD_TOP+60);
  sky.addColorStop(0,'#05010f'); sky.addColorStop(0.6,'#1a0b38'); sky.addColorStop(1,'#3b1a5e');
  g.fillStyle = sky; g.fillRect(0,0,GAME_W,FIELD_TOP+60);
  // 星星
  for(let i=0;i<70;i++){
    const x=Math.random()*GAME_W, y=Math.random()*(FIELD_TOP-8), s=Math.random()<0.15?2:1;
    g.globalAlpha = 0.3+Math.random()*0.7;
    g.fillStyle='#e9e2ff'; g.fillRect(x,y,s,s);
  }
  g.globalAlpha = 1;
  // 月亮（含烘焙光暈）
  const mg = g.createRadialGradient(820,44,6,820,44,60);
  mg.addColorStop(0,'rgba(255,244,200,0.5)'); mg.addColorStop(1,'rgba(255,244,200,0)');
  g.fillStyle=mg; g.beginPath(); g.arc(820,44,60,0,Math.PI*2); g.fill();
  g.fillStyle='#ffeeba'; g.beginPath(); g.arc(820,44,22,0,Math.PI*2); g.fill();
  g.fillStyle='#e8d18e'; g.beginPath(); g.arc(813,40,5,0,Math.PI*2); g.arc(827,50,3.4,0,Math.PI*2); g.fill();
  // 遠景大樓（視差層1：淡）
  g.fillStyle='#231045';
  for(let x=0;x<GAME_W;){
    const w=40+Math.random()*60, h=26+Math.random()*46;
    g.fillRect(x, FIELD_TOP-h+14, w, h);
    x+=w+6;
  }
  // 近景大樓（視差層2：深＋亮窗）
  for(let x=-10;x<GAME_W;){
    const w=56+Math.random()*70, h=46+Math.random()*40;
    g.fillStyle='#140630';
    g.fillRect(x, FIELD_TOP-h+26, w, h);
    for(let wy=FIELD_TOP-h+32; wy<FIELD_TOP+18; wy+=10)
      for(let wx=x+5; wx<x+w-6; wx+=11)
        if(Math.random()<0.4){ g.fillStyle=Math.random()<0.5?'rgba(255,231,120,0.75)':'rgba(0,240,255,0.55)'; g.fillRect(wx,wy,4,5); }
    x+=w+4;
  }
  // 屋頂戰場
  const fl = g.createLinearGradient(0,FIELD_TOP,0,FIELD_BOT+30);
  fl.addColorStop(0,'#2b1652'); fl.addColorStop(0.5,'#1c0c3c'); fl.addColorStop(1,'#120627');
  g.fillStyle=fl; g.fillRect(0,FIELD_TOP+20,GAME_W,FIELD_BOT-FIELD_TOP+30);
  // 屋頂邊緣霓虹
  g.fillStyle='rgba(0,240,255,0.5)'; g.fillRect(0,FIELD_TOP+19,GAME_W,2);
  // 地板紋理格
  g.strokeStyle='rgba(255,255,255,0.04)'; g.lineWidth=1;
  for(let x=0;x<GAME_W;x+=64){ g.beginPath(); g.moveTo(x,FIELD_TOP+22); g.lineTo(x,FIELD_BOT+28); g.stroke(); }
  // 路線霓虹分隔線
  for(let i=0;i<LANES;i++){
    const y = LANE_Y[i]+18;
    const lg = g.createLinearGradient(BASE_X_LEFT,0,BASE_X_RIGHT,0);
    lg.addColorStop(0,'rgba(0,240,255,0.35)'); lg.addColorStop(0.5,'rgba(154,107,255,0.28)'); lg.addColorStop(1,'rgba(255,41,117,0.35)');
    g.strokeStyle=lg; g.lineWidth=2;
    g.setLineDash([14,10]);
    g.beginPath(); g.moveTo(BASE_X_LEFT-10,y); g.lineTo(BASE_X_RIGHT+10,y); g.stroke();
    g.setLineDash([]);
  }
  // 下方 UI 面板底
  g.fillStyle='rgba(4,1,12,0.88)';
  g.fillRect(0,FIELD_BOT+28,GAME_W,GAME_H-FIELD_BOT-28);
  g.fillStyle='rgba(0,240,255,0.35)'; g.fillRect(0,FIELD_BOT+28,GAME_W,2);
})();
// 動態雲層（便宜視差）
const clouds = [
  {x:120,y:26,w:130,s:5},{x:520,y:60,w:170,s:8},{x:780,y:16,w:110,s:6}
];
function drawSkyMotion(t){
  ctx.globalAlpha = 0.1;
  ctx.fillStyle='#cfc2ff';
  for(const c of clouds){
    const x = (c.x + t*c.s) % (GAME_W+220) - 110;
    ctx.beginPath();
    ctx.ellipse(x,c.y,c.w/2,13,0,0,Math.PI*2);
    ctx.ellipse(x+c.w*0.26,c.y-8,c.w/3,11,0,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  // 星星閃爍
  ctx.globalAlpha = 0.35+0.3*Math.sin(t*2.4);
  ctx.fillStyle='#fff';
  ctx.fillRect(150,30,2,2); ctx.fillRect(430,52,2,2); ctx.fillRect(650,22,2,2);
  ctx.globalAlpha = 1;
}

/* ===================== 單位資料 ===================== */
const CAT_TYPES = [
  { name:'一般貓', cost:10, hp:34, atk:6,  spd:62, range:42, cd:0.85, color:'#ffcf5c', dark:'#d99a2b', kind:'basic'  },
  { name:'坦克貓', cost:25, hp:115,atk:5,  spd:32, range:42, cd:1.1,  color:'#5c8dff', dark:'#3057c0', kind:'tank'   },
  { name:'刺客貓', cost:20, hp:20, atk:16, spd:98, range:40, cd:0.6,  color:'#ff6cc7', dark:'#c23a90', kind:'ninja'  },
  { name:'砲手貓', cost:35, hp:26, atk:11, spd:42, range:175,cd:1.5,  color:'#9a6bff', dark:'#6a3fd0', kind:'gunner' },
];
const ENEMY_TYPES = [
  { name:'殭屍鼠', hp:24, atk:5,  spd:46, range:38, cd:1.0, color:'#7ddc6f', dark:'#3f9a3a', kind:'rat',    reward:8  },
  { name:'鎧甲蟲', hp:62, atk:6,  spd:26, range:38, cd:1.2, color:'#c8783c', dark:'#8a4a1e', kind:'beetle', reward:14 },
  { name:'飛蝠',   hp:16, atk:7,  spd:72, range:38, cd:0.8, color:'#a86bd6', dark:'#6f3fa0', kind:'bat',    reward:10 },
];
const BOSS_TYPE = { name:'蝙蝠王', hp:420, atk:16, spd:17, range:64, cd:1.3, color:'#d64bff', dark:'#8a1fb8', kind:'boss', reward:80 };

/* ===================== 轉蛋與收藏 ===================== */
const RARITIES = [
  { name:'稀有',     color:'#8fd3ff', mult:1.0,  weight:55 },
  { name:'極稀有',   color:'#9a6bff', mult:1.25, weight:28 },
  { name:'超級稀有', color:'#ff6cc7', mult:1.55, weight:13 },
  { name:'傳奇稀有', color:'#ffcf5c', mult:2.0,  weight:4  },
];
const GACHA_COST = 30, WIN_REWARD = 100, LOSE_REWARD = 35, DUP_REFUND = 10;
function rollRarity(){
  let roll = Math.random()*RARITIES.reduce((s,r)=>s+r.weight,0);
  for(let i=0;i<RARITIES.length;i++){ roll -= RARITIES[i].weight; if(roll<=0) return i; }
  return 0;
}
let cans = Number(localStorage.getItem('catwars2_cans')||0);
let collection = JSON.parse(localStorage.getItem('catwars2_col')||'null') || CAT_TYPES.map(()=>-1);
let bestScore = Number(localStorage.getItem('catwars2_best')||0);
let bestEndless = Number(localStorage.getItem('catwars2_bestEndless')||0);
let endlessUnlocked = localStorage.getItem('catwars2_endless')==='1';
function saveMeta(){
  localStorage.setItem('catwars2_cans', cans);
  localStorage.setItem('catwars2_col', JSON.stringify(collection));
}
let gachaResult = null, gachaAnimT = 0;
function doGachaPull(){
  if(cans < GACHA_COST){ sfx.deny(); addFloat(GAME_W/2, 200, '罐頭不夠！打一場戰鬥賺罐頭', '#ff8c7a'); return; }
  cans -= GACHA_COST;
  const typeIdx = Math.floor(Math.random()*CAT_TYPES.length);
  const rarityIdx = rollRarity();
  const isUpgrade = rarityIdx > collection[typeIdx];
  if(isUpgrade) collection[typeIdx] = rarityIdx;
  else cans += DUP_REFUND;
  saveMeta();
  gachaResult = { typeIdx, rarityIdx, isUpgrade };
  gachaAnimT = 0;
  sfx.reveal(rarityIdx);
  burst(GAME_W/2, 240, RARITIES[rarityIdx].color, 18+rarityIdx*12, 240, 0.7);
  if(rarityIdx>=2){ shake = Math.min(shake+(rarityIdx===3?10:6), 12); freeze = rarityIdx===3?0.1:0.05; }
}

/* ===================== 戰鬥狀態 ===================== */
let entities = [], shots = [];
let coins = 0, coinTimer = 0, coinFloat = 0;
let baseHpLeft = 100, baseHpRight = 100;
const BASE_MAX = 100;
let baseFlashL = 0, baseFlashR = 0;
let spawnTimer = 0, elapsed = 0, score = 0, kills = 0;
let bossSpawned = false, bossAlive = false;
let mode = 'normal', lastMode = 'normal';
let endlessWave = 1;
let shake = 0, freeze = 0;
let playerSpawnCounter = 0;
let hintT = 0;

function unitMult(typeIdx){
  const owned = collection[typeIdx];
  return owned>=0 ? RARITIES[owned].mult : 1;
}
function makeUnit(type, side, lane, hpMult=1){
  let hp = type.hp, atk = type.atk;
  if(side==='player'){
    const m = unitMult(CAT_TYPES.indexOf(type));
    hp = Math.round(type.hp*m); atk = Math.round(type.atk*m*10)/10;
  } else {
    hp = Math.round(hp*hpMult); atk = Math.round(atk*hpMult*10)/10;
  }
  return {
    side, lane, type,
    x: side==='player' ? BASE_X_LEFT+26 : BASE_X_RIGHT-26,
    y: LANE_Y[lane],
    hp, maxHp:hp, atk,
    atkCd: 0, dead:false, hitFlash:0,
    sx:0.3, sy:1.5,            // 出場彈跳
    walkT: Math.random()*6,
    lunge: 0,
  };
}
function trySpawn(slot){
  const t = CAT_TYPES[slot];
  if(!t || state!==playState) return;
  if(coins < t.cost){ sfx.deny(); addFloat(GAME_W/2, FIELD_BOT-6, '魚幣不夠！', '#ff8c7a'); return; }
  coins -= t.cost;
  const lane = playerSpawnCounter % LANES;
  playerSpawnCounter++;
  const u = makeUnit(t, 'player', lane);
  entities.push(u);
  burst(u.x, u.y-24, t.color, 8, 130, 0.4);
  sfx.spawn();
}
function spawnEnemy(hpMult=1, forceIdx=-1){
  let idx = forceIdx;
  if(idx<0){
    const pool = elapsed<20 ? 1 : elapsed<35 ? 2 : 3;
    idx = Math.floor(Math.random()*pool);
  }
  const lane = Math.floor(Math.random()*LANES);
  entities.push(makeUnit(ENEMY_TYPES[idx], 'enemy', lane, hpMult));
}
function spawnBoss(hpMult=1){
  const lane = 1+Math.floor(Math.random()*2);
  const b = makeUnit(BOSS_TYPE, 'enemy', lane, hpMult);
  entities.push(b);
  bossAlive = true;
  sfx.boss();
  shake = 14; freeze = 0.12;
  addFloat(GAME_W/2, 160, '蝙蝠王 登場！', '#d64bff', true);
}

function startBattle(m){
  mode = m; lastMode = m;
  setState(playState);
}

/* ===================== 狀態機 ===================== */
let state = null;

function drawBtn(b, color, label, fs, active){
  ctx.fillStyle = active ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.04)';
  rr(ctx,b.x,b.y,b.w,b.h,14); ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = 2.5;
  rr(ctx,b.x,b.y,b.w,b.h,14); ctx.stroke();
  ctx.fillStyle = active ? '#fff' : 'rgba(255,255,255,0.5)';
  ctx.font = 'bold '+fs+'px sans-serif'; ctx.textAlign='center';
  ctx.fillText(label, b.x+b.w/2, b.y+b.h/2+fs*0.36);
}

/* ---------- 遊玩 ---------- */
const playState = {
  enter(){
    entities = []; shots = [];
    coins = 40; coinTimer = 0;
    baseHpLeft = BASE_MAX; baseHpRight = BASE_MAX;
    baseFlashL = baseFlashR = 0;
    spawnTimer = mode==='normal' ? 8 : 6;   // 開場安全學習期
    elapsed = 0; score = 0; kills = 0;
    bossSpawned = false; bossAlive = false;
    endlessWave = 1;
    playerSpawnCounter = 0;
    shake = 0; freeze = 0; hintT = 0;
    parts.length = 0; floats.length = 0;
  },
  update(dt){
    if(freeze>0){ freeze-=dt; return; }
    elapsed += dt; hintT += dt;
    const diff = clamp(elapsed/ (mode==='normal'?100:150), 0, 1);

    // 收入
    coinTimer += dt;
    if(coinTimer>=1){ coinTimer-=1; coins = Math.min(999, coins + 5 + Math.floor(diff*4)); }

    // 敵人生成
    spawnTimer -= dt;
    if(spawnTimer<=0){
      if(mode==='normal'){
        if(elapsed < 150){
          spawnTimer = Math.max(1.25, 3.4 - diff*2.1) * (0.8+Math.random()*0.4);
          spawnEnemy(1 + diff*0.5);
        } else spawnTimer = 99;   // 收尾：停止生成，保證自然結束
        if(!bossSpawned && (elapsed>=70 || baseHpRight<=55)){
          bossSpawned = true; spawnBoss(1);
        }
      } else {
        spawnTimer = Math.max(0.9, 3.0 - diff*2.1) * (0.8+Math.random()*0.4);
        spawnEnemy(1 + elapsed/90);
        if(elapsed > endlessWave*45){
          endlessWave++;
          spawnBoss(0.55 + endlessWave*0.3);
        }
      }
    }

    // 單位更新
    for(const e of entities){
      if(e.dead) continue;
      e.hitFlash = Math.max(0, e.hitFlash-dt*4);
      e.sx += (1-e.sx)*10*dt; e.sy += (1-e.sy)*10*dt;
      e.lunge = Math.max(0, e.lunge-dt*5);
      e.atkCd = Math.max(0, e.atkCd-dt);
      e.walkT += dt;
      const dir = e.side==='player' ? 1 : -1;

      // 找目標
      let target=null, bestD=Infinity;
      for(const o of entities){
        if(o===e || o.dead || o.side===e.side || o.lane!==e.lane) continue;
        if((dir===1 && o.x>e.x-8) || (dir===-1 && o.x<e.x+8)){
          const d = Math.abs(o.x-e.x);
          if(d<bestD){ bestD=d; target=o; }
        }
      }
      const range = e.type.range + 10;   // 寬容判定
      const atBase = (dir===1 && e.x >= BASE_X_RIGHT-46-(e.type.kind==='gunner'?e.type.range-40:0))
                  || (dir===-1 && e.x <= BASE_X_LEFT+46);

      if(target && bestD <= range){
        if(e.atkCd<=0){
          e.atkCd = e.type.cd; e.lunge = 1;
          if(e.type.kind==='gunner'){
            shots.push({x:e.x+14, y:e.y-26, vx:430, lane:e.lane, atk:e.atk, side:e.side, life:1.2});
            sfx.shoot();
          } else {
            hitUnit(target, e.atk, e.side);
          }
        }
      } else if(atBase){
        if(e.atkCd<=0){
          e.atkCd = e.type.cd; e.lunge = 1;
          if(dir===1){
            baseHpRight -= e.atk*0.8; baseFlashR = 1;
            burst(BASE_X_RIGHT-30, e.y-30, COL.pink, 6, 130, 0.35);
          } else {
            baseHpLeft -= e.atk*0.8; baseFlashL = 1;
            burst(BASE_X_LEFT+30, e.y-30, COL.cyan, 6, 130, 0.35);
            shake = Math.min(shake+3, 8);
          }
          sfx.baseHit();
        }
      } else {
        e.x += dir * e.type.spd * dt;
      }
    }

    // 砲彈
    for(let i=shots.length-1;i>=0;i--){
      const s = shots[i];
      s.x += s.vx*dt; s.life -= dt;
      let gone = s.life<=0 || s.x>GAME_W;
      if(!gone) for(const o of entities){
        if(o.dead || o.side===s.side || o.lane!==s.lane) continue;
        if(Math.abs(o.x-s.x)<24){ hitUnit(o, s.atk, s.side); gone=true; break; }
      }
      if(!gone && s.x >= BASE_X_RIGHT-40){
        baseHpRight -= s.atk*0.8; baseFlashR = 1;
        burst(BASE_X_RIGHT-30, LANE_Y[s.lane]-30, '#c8a8ff', 6, 130, 0.35);
        sfx.baseHit(); gone=true;
      }
      if(gone){ shots[i]=shots[shots.length-1]; shots.pop(); }
    }

    entities = entities.filter(e=>!e.dead);
    baseFlashL = Math.max(0, baseFlashL-dt*3);
    baseFlashR = Math.max(0, baseFlashR-dt*3);
    updateParts(dt); updateFloats(dt);
    shake *= Math.pow(0.001, dt);

    // 勝負
    if(baseHpLeft<=0){
      sfx.lose(); freeze=0.15; shake=10;
      gameOverState.win = false; setState(gameOverState);
    } else if(mode==='normal' && baseHpRight<=0){
      sfx.win(); freeze=0.1;
      burst(BASE_X_RIGHT, 260, COL.yellow, 40, 300, 0.9);
      gameOverState.win = true; setState(gameOverState);
    }
  },
  draw(){
    ctx.drawImage(bgCanvas,0,0);
    drawSkyMotion(performance.now()/1000);
    ctx.save();
    ctx.translate((Math.random()*2-1)*shake, (Math.random()*2-1)*shake);

    drawBase(BASE_X_LEFT-18, 'player');
    drawBase(BASE_X_RIGHT+18, 'enemy');

    const sorted = entities.slice().sort((a,b)=>a.y-b.y);
    for(const e of sorted) drawUnit(e);
    for(const s of shots){
      ctx.drawImage(glowGold, s.x-16, s.y-16, 32, 32);
      ctx.fillStyle='#fff3c9';
      ctx.beginPath(); ctx.ellipse(s.x,s.y,9,4,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#d99a2b'; ctx.lineWidth=1.5; ctx.stroke();
    }
    drawParts(); drawFloats();
    ctx.restore();

    drawHUD();

    // 開場提示浮層
    if(hintT < 6 && mode==='normal'){
      const a = hintT<5 ? 1 : (6-hintT);
      ctx.globalAlpha = a*(0.75+0.25*Math.sin(performance.now()/200));
      ctx.fillStyle='rgba(0,0,0,0.55)';
      rr(ctx, GAME_W/2-250, 200, 500, 62, 14); ctx.fill();
      ctx.strokeStyle=COL.yellow; ctx.lineWidth=2; rr(ctx, GAME_W/2-250, 200, 500, 62, 14); ctx.stroke();
      ctx.fillStyle='#fff'; ctx.font='bold 19px sans-serif'; ctx.textAlign='center';
      ctx.fillText('點下方卡片派出貓咪，保護左邊的貓咪塔！', GAME_W/2, 226);
      ctx.font='15px sans-serif'; ctx.fillStyle=COL.yellow;
      ctx.fillText('▼ 敵人 8 秒後進攻，先佈好陣！（電腦按 1〜4）', GAME_W/2, 250);
      ctx.globalAlpha = 1;
    }
  }
};
function hitUnit(target, atk, side){
  target.hp -= atk;
  target.hitFlash = 1;
  target.sx = 0.8; target.sy = 1.2;
  shake = Math.min(shake+1.5, 6);
  sfx.hit();
  burst(target.x, target.y-26, '#fff', 3, 90, 0.25);
  if(target.hp<=0 && !target.dead){
    target.dead = true;
    kills++;
    freeze = Math.max(freeze, target.type.kind==='boss'?0.14:0.04);
    burst(target.x, target.y-24, side==='player'?COL.pink:COL.cyan, target.type.kind==='boss'?36:16, 200, 0.6);
    if(side==='player'){
      const r = target.type.reward||0;
      coins = Math.min(999, coins+r);
      score += r*10;
      addFloat(target.x, target.y-46, '+'+r+' 魚幣', COL.yellow);
      sfx.kill();
      if(target.type.kind==='boss'){
        bossAlive = false;
        shake = 12;
        addFloat(target.x, target.y-70, '擊敗蝙蝠王！', '#d64bff', true);
      }
    } else {
      addFloat(target.x, target.y-46, '喵嗚…', 'rgba(255,255,255,0.8)');
    }
  }
}

      if(this.win && !endlessUnlocked){ endlessUnlocked = true; localStorage.setItem('catwars2_endless','1'); }

      this.cansEarned = this.win ? WIN_REWARD : LOSE_REWARD;

      if(score>bestEndless){ bestEndless=score; localStorage.setItem('catwars2_bestEndless', bestEndless); }
      this.cansEarned = Math.min(120, 30+Math.floor(score/60));
    }
    cans += this.cansEarned;
    saveMeta();

  update(dt){ this.t += dt; updateParts(dt); updateFloats(dt); shake *= Math.pow(0.001, dt); },

      ctx.fillStyle=COL.yellow; ctx.fillText('勝利！蝙蝠城倒下了！', GAME_W/2, 128);

      ctx.fillStyle='#000'; ctx.fillText(mode==='endless'?'守到最後一刻！':'貓咪塔被攻陷…再戰！', GAME_W/2+3, 131);
      ctx.fillStyle='#fff'; ctx.fillText(mode==='endless'?'守到最後一刻！':'貓咪塔被攻陷…再戰！', GAME_W/2, 128);

    ctx.restore();

function drawGachaMachine(x, y, t){
  ctx.save();
  ctx.translate(x, y);
  const wob = Math.max(0, 0.25-t)*Math.sin(performance.now()/40)*6;
  ctx.rotate(wob*0.02);
  // 底座
  ctx.fillStyle='#3b1a5e'; rr(ctx,-46,10,92,58,10); ctx.fill();
  ctx.strokeStyle='#9a6bff'; ctx.lineWidth=2.5; rr(ctx,-46,10,92,58,10); ctx.stroke();
  ctx.fillStyle='#1c0c3c'; rr(ctx,-16,34,32,24,6); ctx.fill();
  ctx.strokeStyle='#00f0ff'; ctx.lineWidth=1.5; rr(ctx,-16,34,32,24,6); ctx.stroke();
  // 玻璃球
  ctx.fillStyle='rgba(160,220,255,0.18)';
  ctx.beginPath(); ctx.arc(0,-34,52,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#8fd3ff'; ctx.lineWidth=2.5; ctx.stroke();
  // 裡面的蛋
  const eggCols=['#ffcf5c','#ff6cc7','#8fd3ff','#9a6bff','#7ddc6f'];
  for(let i=0;i<5;i++){
    const a=i*1.25+0.5, r=26;
    ctx.fillStyle=eggCols[i];
    ctx.beginPath(); ctx.ellipse(Math.cos(a)*r*0.8, -34+Math.sin(a)*r*0.6+8, 11, 13, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=1.5; ctx.stroke();
  }
  // 高光
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.beginPath(); ctx.ellipse(-20,-56,12,7,-0.6,0,Math.PI*2); ctx.fill();
  // 轉鈕
  ctx.fillStyle='#ffcf5c'; ctx.beginPath(); ctx.arc(0,24,10,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#b8860b'; ctx.lineWidth=2; ctx.stroke();
  ctx.strokeStyle='#7a5a10'; ctx.beginPath(); ctx.moveTo(-6,24); ctx.lineTo(6,24); ctx.stroke();
  ctx.restore();
}

/* ===================== 繪製：基地 / 貓 / 敵人 ===================== */
function drawBase(x, side){
  const isPlayer = side==='player';
  const hp = isPlayer ? baseHpLeft : baseHpRight;
  const flash = isPlayer ? baseFlashL : baseFlashR;
  const col = isPlayer ? COL.cyan : COL.pink;
  ctx.save();
  ctx.translate(x, 300);
  if(flash>0){ ctx.translate((Math.random()*2-1)*flash*4, 0); }
  if(isPlayer){
    // 貓咪塔：罐頭堆＋大貓臉旗
    ctx.fillStyle='#1c3a4d'; rr(ctx,-34,-120,68,240,10); ctx.fill();
    ctx.strokeStyle=flash>0?'#fff':col; ctx.lineWidth=3; rr(ctx,-34,-120,68,240,10); ctx.stroke();
    for(let i=0;i<3;i++){
      ctx.fillStyle=i%2?'#2e5d7a':'#25506b';
      rr(ctx,-26,-96+i*72,52,48,8); ctx.fill();
      ctx.strokeStyle='rgba(0,240,255,0.5)'; ctx.lineWidth=1.5; rr(ctx,-26,-96+i*72,52,48,8); ctx.stroke();
      ctx.fillStyle='rgba(0,240,255,0.7)';
      ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
      ctx.fillText('喵', 0, -68+i*72);
    }
    // 頂上貓耳
    ctx.fillStyle='#1c3a4d';
    ctx.beginPath(); ctx.moveTo(-30,-118); ctx.lineTo(-18,-146); ctx.lineTo(-4,-118); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(4,-118); ctx.lineTo(18,-146); ctx.lineTo(30,-118); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=col; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-30,-118); ctx.lineTo(-18,-146); ctx.lineTo(-4,-118); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(4,-118); ctx.lineTo(18,-146); ctx.lineTo(30,-118); ctx.stroke();
    // 眼睛
    ctx.fillStyle=flash>0?'#fff':col;
    ctx.beginPath(); ctx.arc(-12,-106,4,0,Math.PI*2); ctx.arc(12,-106,4,0,Math.PI*2); ctx.fill();
  } else {
    // 蝙蝠城：尖塔＋翅膀
    ctx.fillStyle='#2c0d3f'; rr(ctx,-34,-120,68,240,10); ctx.fill();
    ctx.strokeStyle=flash>0?'#fff':col; ctx.lineWidth=3; rr(ctx,-34,-120,68,240,10); ctx.stroke();
    // 城磚
    ctx.fillStyle='rgba(255,41,117,0.12)';
    for(let i=0;i<4;i++) rr(ctx,-26,-100+i*56,52,36,6), ctx.fill();
    // 尖頂
    ctx.fillStyle='#43104f';
    ctx.beginPath(); ctx.moveTo(-34,-118); ctx.lineTo(0,-160); ctx.lineTo(34,-118); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=col; ctx.lineWidth=2; ctx.stroke();
    // 翅膀
    ctx.fillStyle='rgba(214,75,255,0.55)';
    const flap = Math.sin(performance.now()/300)*8;
    ctx.beginPath(); ctx.moveTo(-34,-90);
    ctx.quadraticCurveTo(-72,-110+flap,-64,-58); ctx.quadraticCurveTo(-52,-66,-34,-52); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(34,-90);
    ctx.quadraticCurveTo(72,-110+flap,64,-58); ctx.quadraticCurveTo(52,-66,34,-52); ctx.closePath(); ctx.fill();
    // 發光眼
    ctx.fillStyle=flash>0?'#fff':'#ff5cf0';
    ctx.beginPath(); ctx.arc(-11,-100,4.5,0,Math.PI*2); ctx.arc(11,-100,4.5,0,Math.PI*2); ctx.fill();
  }
  // 血條
  ctx.fillStyle='rgba(0,0,0,0.6)'; rr(ctx,-40,-176,80,12,6); ctx.fill();
  const pct = clamp(hp/BASE_MAX,0,1);
  ctx.fillStyle = pct>0.3 ? col : '#ff4444';
  if(pct>0) rr(ctx,-40,-176,80*pct,12,6), ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1; rr(ctx,-40,-176,80,12,6); ctx.stroke();
  const label = isPlayer?'貓咪塔':(mode==='endless'?'蝙蝠傳送門':'蝙蝠城');
  ctx.fillStyle='rgba(4,1,12,0.75)'; rr(ctx,-44,-202,88,20,8); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
  ctx.fillText(label, 0, -187);
  ctx.restore();
}

function drawCatBody(x, y, type, scale, bob, lunge, flash, rarity){
  ctx.save();
  ctx.translate(x + lunge*10, y);
  ctx.scale(scale, scale);
  // 稀有度光環（烘焙光暈）
  if(rarity>=1){
    const gl = rarity>=3?glowGold:(rarity>=2?glowPink:glowCyan);
    ctx.globalAlpha = 0.7;
    ctx.drawImage(gl, -30, -18, 60, 26);
    ctx.globalAlpha = 1;
  }
  // 影子
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(0,2,18,6,0,0,Math.PI*2); ctx.fill();
  const c = flash ? '#ffffff' : type.color;
  const d = flash ? '#dddddd' : type.dark;
  // 尾巴
  ctx.strokeStyle=d; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-14,-14+bob);
  ctx.quadraticCurveTo(-26,-20+bob+Math.sin(performance.now()/200+x)*3,-24,-34+bob); ctx.stroke();
  // 腳
  ctx.fillStyle=d;
  ctx.beginPath(); ctx.ellipse(-8,-2+Math.abs(Math.sin(performance.now()/110+x))*1.5,5,4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(8,-2+Math.abs(Math.cos(performance.now()/110+x))*1.5,5,4,0,0,Math.PI*2); ctx.fill();
  // 身體
  ctx.fillStyle=c;
  ctx.beginPath(); ctx.ellipse(0,-16+bob,15,14,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=1.5; ctx.stroke();
  // 肚子亮面
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.beginPath(); ctx.ellipse(2,-12+bob,7,7,0,0,Math.PI*2); ctx.fill();
  // 頭
  ctx.fillStyle=c;
  ctx.beginPath(); ctx.arc(8,-34+bob,13,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=1.5; ctx.stroke();
  // 耳朵
  ctx.fillStyle=c;
  ctx.beginPath(); ctx.moveTo(-1,-43+bob); ctx.lineTo(3,-53+bob); ctx.lineTo(9,-44+bob); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(12,-44+bob); ctx.lineTo(17,-53+bob); ctx.lineTo(20,-42+bob); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#ff9db8';
  ctx.beginPath(); ctx.moveTo(2,-44+bob); ctx.lineTo(4,-50+bob); ctx.lineTo(7,-44+bob); ctx.closePath(); ctx.fill();
  // 表情
  ctx.fillStyle='#191919';
  ctx.beginPath(); ctx.arc(5,-35+bob,2.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(13,-35+bob,2.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(5.8,-35.8+bob,0.8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(13.8,-35.8+bob,0.8,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#191919'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.arc(9,-30+bob,2.6,0.15*Math.PI,0.85*Math.PI); ctx.stroke();
  // 鬍鬚
  ctx.strokeStyle='rgba(255,255,255,0.65)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(18,-33+bob); ctx.lineTo(25,-34+bob); ctx.moveTo(18,-30+bob); ctx.lineTo(25,-29+bob); ctx.stroke();
  // 職業配件
  if(type.kind==='tank'){
    ctx.fillStyle='#c8d6ff'; ctx.strokeStyle='#3057c0'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(8,-40+bob,11,Math.PI*1.05,Math.PI*1.95); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#8aa8ff'; rr(ctx,16,-28+bob,7,20,3); ctx.fill();
    ctx.strokeStyle='#3057c0'; rr(ctx,16,-28+bob,7,20,3); ctx.stroke();
  } else if(type.kind==='ninja'){
    ctx.fillStyle='#b8286d';
    rr(ctx,-3,-32+bob,22,5,2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-3,-30+bob); ctx.lineTo(-12,-22+bob); ctx.lineTo(-8,-19+bob); ctx.lineTo(-1,-27+bob); ctx.closePath(); ctx.fill();
  } else if(type.kind==='gunner'){
    ctx.fillStyle='#4a3080'; rr(ctx,10,-26+bob,16,9,4); ctx.fill();
    ctx.strokeStyle='#2a1a50'; ctx.lineWidth=1.5; rr(ctx,10,-26+bob,16,9,4); ctx.stroke();
    ctx.fillStyle='#ffcf5c'; ctx.beginPath(); ctx.arc(26,-21.5+bob,3,0,Math.PI*2); ctx.fill();
  } else {
    // 一般貓：條紋
    ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-8,-24+bob); ctx.lineTo(-4,-20+bob); ctx.moveTo(-10,-18+bob); ctx.lineTo(-6,-14+bob); ctx.stroke();
  }
  ctx.restore();
}

function drawEnemyBody(x, y, type, dir, bob, lunge){
  ctx.save();
  ctx.translate(x + lunge*10*dir, y);
  ctx.scale(-dir, 1);   // 敵人面向左
  const c = type.color, d = type.dark;
  if(type.kind==='bat' || type.kind==='boss'){
    const s = type.kind==='boss' ? 2.1 : 1;
    const fl = Math.sin(performance.now()/90+x)*10;
    ctx.translate(0, -34*s + bob*2);
    // 影子（浮空小）
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(0,34*s,12*s,4*s,0,0,Math.PI*2); ctx.fill();
    // 翅膀
    ctx.fillStyle=d;
    ctx.beginPath(); ctx.moveTo(-6*s,0);
    ctx.quadraticCurveTo(-26*s,-14*s+fl,-30*s,4*s); ctx.quadraticCurveTo(-18*s,2*s,-8*s,8*s); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(6*s,0);
    ctx.quadraticCurveTo(26*s,-14*s+fl,30*s,4*s); ctx.quadraticCurveTo(18*s,2*s,8*s,8*s); ctx.closePath(); ctx.fill();
    // 身體
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.ellipse(0,0,10*s,12*s,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1.5; ctx.stroke();
    // 耳
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.moveTo(-8*s,-8*s); ctx.lineTo(-6*s,-16*s); ctx.lineTo(-2*s,-9*s); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(8*s,-8*s); ctx.lineTo(6*s,-16*s); ctx.lineTo(2*s,-9*s); ctx.closePath(); ctx.fill();
    // 眼睛（發光）
    ctx.fillStyle='#fff700';
    ctx.beginPath(); ctx.arc(-4*s,-3*s,2*s,0,Math.PI*2); ctx.arc(4*s,-3*s,2*s,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#191919';
    ctx.beginPath(); ctx.arc(-4.6*s,-3*s,0.9*s,0,Math.PI*2); ctx.arc(3.4*s,-3*s,0.9*s,0,Math.PI*2); ctx.fill();
    // 尖牙
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.moveTo(-3*s,4*s); ctx.lineTo(-2*s,7*s); ctx.lineTo(-1*s,4*s); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(1*s,4*s); ctx.lineTo(2*s,7*s); ctx.lineTo(3*s,4*s); ctx.closePath(); ctx.fill();
    if(type.kind==='boss'){
      // 王冠
      ctx.fillStyle='#ffcf5c';
      ctx.beginPath();
      ctx.moveTo(-9,-34); ctx.lineTo(-9,-44); ctx.lineTo(-4,-37); ctx.lineTo(0,-46);
      ctx.lineTo(4,-37); ctx.lineTo(9,-44); ctx.lineTo(9,-34); ctx.closePath(); ctx.fill();
      ctx.strokeStyle='#b8860b'; ctx.lineWidth=1.5; ctx.stroke();
    }
  } else if(type.kind==='beetle'){
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.ellipse(0,2,17,5,0,0,Math.PI*2); ctx.fill();
    // 六腳
    ctx.strokeStyle=d; ctx.lineWidth=3; ctx.lineCap='round';
    for(let i=0;i<3;i++){
      const lx=-8+i*8, off=Math.sin(performance.now()/100+i+x)*2;
      ctx.beginPath(); ctx.moveTo(lx,-8); ctx.lineTo(lx-3,0+off); ctx.stroke();
    }
    // 殼（分段）
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.ellipse(0,-14+bob,17,12,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.45)'; ctx.lineWidth=2; ctx.stroke();
    ctx.strokeStyle=d; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-14,-18+bob); ctx.quadraticCurveTo(0,-10+bob,14,-18+bob); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-15,-12+bob); ctx.quadraticCurveTo(0,-5+bob,15,-12+bob); ctx.stroke();
    // 亮面
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.beginPath(); ctx.ellipse(-5,-20+bob,6,3.5,-0.4,0,Math.PI*2); ctx.fill();
    // 頭＋角
    ctx.fillStyle=d;
    ctx.beginPath(); ctx.arc(15,-14+bob,7,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=d; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(19,-18+bob); ctx.quadraticCurveTo(26,-26+bob,23,-31+bob); ctx.stroke();
    ctx.fillStyle='#fff700';
    ctx.beginPath(); ctx.arc(17,-15+bob,2,0,Math.PI*2); ctx.fill();
  } else {
    // 殭屍鼠
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.ellipse(0,2,15,5,0,0,Math.PI*2); ctx.fill();
    // 尾巴
    ctx.strokeStyle='#5e8f58'; ctx.lineWidth=3; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-12,-8+bob);
    ctx.quadraticCurveTo(-24,-4+bob+Math.sin(performance.now()/150+x)*3,-28,-14+bob); ctx.stroke();
    // 腳
    ctx.fillStyle=d;
    ctx.beginPath(); ctx.ellipse(-6,-1+Math.abs(Math.sin(performance.now()/100+x))*1.5,4,3,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(6,-1+Math.abs(Math.cos(performance.now()/100+x))*1.5,4,3,0,0,Math.PI*2); ctx.fill();
    // 身體
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.ellipse(0,-12+bob,14,11,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1.5; ctx.stroke();
    // 縫線（殭屍感）
    ctx.strokeStyle='#3f6f3a'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(-6,-18+bob); ctx.lineTo(0,-12+bob); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-5,-16+bob); ctx.lineTo(-3,-18+bob); ctx.moveTo(-3,-15+bob); ctx.lineTo(-1,-17+bob); ctx.stroke();
    // 頭
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.arc(11,-22+bob,9,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.stroke();
    // 圓耳
    ctx.fillStyle=d;
    ctx.beginPath(); ctx.arc(5,-30+bob,4.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(15,-31+bob,4.5,0,Math.PI*2); ctx.fill();
    // 眼（一個X一個亮）
    ctx.strokeStyle='#191919'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(6,-25+bob); ctx.lineTo(10,-21+bob); ctx.moveTo(10,-25+bob); ctx.lineTo(6,-21+bob); ctx.stroke();
    ctx.fillStyle='#fff700';
    ctx.beginPath(); ctx.arc(15,-23+bob,2.4,0,Math.PI*2); ctx.fill();
    // 鼻
    ctx.fillStyle='#e8768f';
    ctx.beginPath(); ctx.arc(19.5,-20+bob,2,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawUnit(e){
  const bob = Math.sin(e.walkT*9)*2.2;
  ctx.save();
  ctx.translate(e.x, e.y);
  ctx.scale(e.sx, e.sy);
  ctx.translate(-e.x, -e.y);
  if(e.side==='player') drawCatBody(e.x, e.y, e.type, 1, bob, e.lunge, e.hitFlash>0.4, collection[CAT_TYPES.indexOf(e.type)]);
  else drawEnemyBody(e.x, e.y, e.type, -1, bob, e.lunge);
  ctx.restore();
  // 血條
  if(e.hp < e.maxHp){
    const w = e.type.kind==='boss'?56:30;
    const hy = e.type.kind==='boss' ? e.y-96 : (e.type.kind==='bat'? e.y-64 : e.y-58);
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(e.x-w/2, hy, w, 5);
    ctx.fillStyle = e.side==='player'?COL.cyan:COL.pink;
    ctx.fillRect(e.x-w/2, hy, w*clamp(e.hp/e.maxHp,0,1), 5);
  }
}

  rr(ctx,MUTE_BTN.x,MUTE_BTN.y,MUTE_BTN.w,MUTE_BTN.h,12); ctx.fill();
  ctx.strokeStyle= muted?'rgba(255,255,255,0.3)':COL.cyan; ctx.lineWidth=2;
  rr(ctx,MUTE_BTN.x,MUTE_BTN.y,MUTE_BTN.w,MUTE_BTN.h,12); ctx.stroke();
  const cx=MUTE_BTN.x+24, cy=MUTE_BTN.y+24;
  ctx.fillStyle = muted?'#888':'#fff';
  ctx.beginPath();
  ctx.moveTo(cx-10,cy-4); ctx.lineTo(cx-4,cy-4); ctx.lineTo(cx+3,cy-11);
  ctx.lineTo(cx+3,cy+11); ctx.lineTo(cx-4,cy+4); ctx.lineTo(cx-10,cy+4); ctx.closePath(); ctx.fill();
  if(muted){
    ctx.strokeStyle='#ff5555'; ctx.lineWidth=2.5;

}
function drawHUD(){
  // 頂列
  ctx.fillStyle='rgba(4,1,12,0.7)';
  rr(ctx,12,10,190,40,12); ctx.fill();
  ctx.strokeStyle='rgba(255,247,0,0.5)'; ctx.lineWidth=1.5; rr(ctx,12,10,190,40,12); ctx.stroke();
  // 魚幣圖示
  ctx.fillStyle=COL.yellow;
  ctx.beginPath(); ctx.ellipse(36,30,11,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#c9a20a';
  ctx.beginPath(); ctx.moveTo(45,30); ctx.lineTo(53,24); ctx.lineTo(53,36); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#191919'; ctx.beginPath(); ctx.arc(32,28,1.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 20px sans-serif'; ctx.textAlign='left';
  ctx.fillText(String(coins), 62, 38);

  ctx.fillText('魚幣（每秒＋）', 118, 36);
  // 中央資訊
  ctx.textAlign='center';
  ctx.fillStyle='rgba(4,1,12,0.7)'; rr(ctx,GAME_W/2-130,10,260,40,12); ctx.fill();
  ctx.strokeStyle='rgba(0,240,255,0.4)'; rr(ctx,GAME_W/2-130,10,260,40,12); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='bold 17px sans-serif';
  if(mode==='endless') ctx.fillText('無盡模式　波次 '+endlessWave+'　分數 '+ (kills*5+Math.floor(elapsed)*10), GAME_W/2, 36);
  else ctx.fillText('攻打蝙蝠城　'+Math.floor(elapsed)+'s　擊倒 '+kills, GAME_W/2, 36);
  drawMuteBtn();

  // 下方出兵卡片
  const bw = GAME_W/CAT_TYPES.length;
  const cardY = FIELD_BOT+34;
  for(let i=0;i<CAT_TYPES.length;i++){
    const t = CAT_TYPES[i];
    const cx = bw*i+bw/2;
    const ok = coins>=t.cost;
    const owned = collection[i];
    ctx.fillStyle = ok ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.35)';
    rr(ctx,bw*i+6,cardY,bw-12,GAME_H-cardY-6,12); ctx.fill();
    ctx.strokeStyle = owned>=0 ? RARITIES[owned].color : (ok ? t.color : 'rgba(255,255,255,0.15)');
    ctx.lineWidth = owned>=0 ? 3 : 2;
    rr(ctx,bw*i+6,cardY,bw-12,GAME_H-cardY-6,12); ctx.stroke();
    ctx.save();
    if(!ok) ctx.globalAlpha=0.45;
    drawCatBody(cx-52, cardY+52, t, 0.85, 0, 0, false, owned);
    ctx.restore();
    ctx.textAlign='left';
    ctx.fillStyle = ok ? '#fff' : '#888';
    ctx.font='bold 16px sans-serif';
    ctx.fillText(t.name, cx-22, cardY+26);
    ctx.fillStyle = ok ? COL.yellow : '#777';
    ctx.font='bold 15px sans-serif';
    ctx.fillText(t.cost+' 魚幣', cx-22, cardY+46);
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.font='12px sans-serif';
    ctx.fillText('鍵盤 ['+(i+1)+']', cx-22, cardY+64);
    if(owned>=0){
      ctx.fillStyle=RARITIES[owned].color;
      ctx.font='bold 11px sans-serif';
      ctx.fillText(RARITIES[owned].name, cx+38, cardY+26);
    }
  }
  ctx.textAlign='center';
}

/* ===================== 點擊處理 ===================== */
function onTap(x,y){
  if(pointInRect(x,y,MUTE_BTN)){ toggleMute(); return; }
  if(state===menuState){
    if(pointInRect(x,y,BTN_START)){ startBattle('normal'); return; }
    if(pointInRect(x,y,BTN_ENDLESS)){
      if(endlessUnlocked) startBattle('endless');
      else { sfx.deny(); addFloat(GAME_W/2, BTN_ENDLESS.y-8, '先通關一次就能解鎖！', '#ff8c7a'); }
      return;
    }
    if(pointInRect(x,y,BTN_GACHA_M)){ setState(gachaState); return; }
    return;
  }
  if(state===playState){
    const cardY = FIELD_BOT+34;
    if(y >= cardY-8){
      const idx = Math.floor(x/(GAME_W/CAT_TYPES.length));
      if(idx>=0 && idx<CAT_TYPES.length) trySpawn(idx);
    }
    return;
  }
  if(state===gameOverState){
    if(gameOverState.t<=0.6) return;
    if(pointInRect(x,y,BTN_AGAIN)){ startBattle(lastMode); return; }
    if(pointInRect(x,y,BTN_GACHA_O)){ setState(gachaState); return; }
    if(pointInRect(x,y,BTN_MENU_O)){ setState(menuState); return; }
    return;
  }
  if(state===gachaState){
    if(pointInRect(x,y,GACHA_PULL_BTN)){ sfx.spin(); doGachaPull(); return; }
    if(pointInRect(x,y,GACHA_BACK_BTN)){ setState(menuState); return; }
    return;
  }
}

/* ===================== 主迴圈 ===================== */
const STEP = 1/60;
let last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  acc += Math.min((now-last)/1000, 0.1);
  last = now;
  while(acc >= STEP){
    state.update(STEP);
    acc -= STEP;
  }
  state.draw();
}
setState(menuState);
requestAnimationFrame(frame);

/* 測試掛鉤（無外部影響） */
window.__dbg = () => ({
  state: state===menuState?'menu':state===playState?'play':state===gameOverState?'over':'gacha',
  coins, score, kills, entities: entities.length,
  baseL: baseHpLeft, baseR: baseHpRight, cans, mode, endlessUnlocked, muted
});
window.__forceWin = () => { if(state===playState){ baseHpRight = 0; } };
window.__forceLose = () => { if(state===playState){ baseHpLeft = 0; } };
</script>
