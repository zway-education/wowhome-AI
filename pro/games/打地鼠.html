<!DOCTYPE html>
<!-- 專業AI升級 v8 3D版 -->
<!-- 3D 化摘要（玩法/計分/連擊/FEVER/模式數值全數保留）：改用 Canvas 2D 軟體透視投影引擎（project/quad/drawBox3D，畫家演算法深度排序、逐面受光），3D 立體草地格網＋遠處霧化＋漸層天空＋暗角；地洞為有深度的凹洞（凹陷內壁＋接地陰影），地鼠改體素 3D 身體＋逐面受光＋接地陰影從洞冒出；命中噴 additive 發光星星粒子、hit-stop 與小幅震動；玻璃質感 HUD、飄字 easeOutBack 彈跳；Web Audio 去爆音音效原樣保留；devicePixelRatio 不糊、隨視窗縮放、電腦鍵鼠＋手機觸控 -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>打地鼠小遊戲</title>

<style>
  html,body{
    margin:0;padding:0;height:100%;
    background:radial-gradient(circle at 50% 22%,#3a5f96 0%,#1d3355 55%,#0b1428 100%);
    overflow:hidden;touch-action:none;overscroll-behavior:none;
    -webkit-user-select:none;user-select:none;
    font-family:"Microsoft JhengHei","PingFang TC",sans-serif;
  }
  #game{position:absolute;inset:0;display:block;touch-action:none;cursor:none;}
</style>

<body>
<canvas id="game"></canvas>
<script>
'use strict';
/* ============================================================
   打地鼠小遊戲 — 專業 3D 升級版（v8）
   真透視相機＋畫家演算法深度排序的 Canvas 2D 體素投影引擎。
   立體草地上的九個凹洞：普通地鼠 +10、黃金地鼠 +30 還加時間、
   炸彈千萬別敲！連擊越高倍率越高。固定時間步進＋全套手感。
   ============================================================ */

/* ===== 畫布（全視窗＋devicePixelRatio）===== */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let VW = innerWidth, VH = innerHeight, CX = VW/2, CY = VH*0.30, FOV = VH*0.98, QDPR = 1;
let U = 1;                     /* UI 縮放（手機用） */
let bgCv = null, vigCv = null, bgDirty = true, bgHasImgs = false;

/* ===== 3D 透視投影（相機固定，畫面可整層快取）===== */
const TILT = 0.62;
const cosA = Math.cos(TILT), sinA = Math.sin(TILT);
const cam = { x:0, y:250, z:-205 };
function project(x,y,z){
  const dx=x-cam.x, dy=y-cam.y, dz=z-cam.z;
  const ry = dy*cosA + dz*sinA;
  const rz = dz*cosA - dy*sinA;
  if(rz < 14) return null;
  const s = FOV/rz;
  return { x:CX+dx*s, y:CY-ry*s, s };
}
function camDepth(y,z){ return (z-cam.z)*cosA - (y-cam.y)*sinA; }
function quad(a,b,c,d,color){
  if(!a||!b||!c||!d) return false;
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.lineTo(d.x,d.y);
  ctx.closePath(); ctx.fill();
  return true;
}
function quadStroke(a,b,c,d,color,w){
  if(!a||!b||!c||!d) return;
  ctx.strokeStyle=color; ctx.lineWidth=w;
  ctx.beginPath();
  ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.lineTo(d.x,d.y);
  ctx.closePath(); ctx.stroke();
}
/* 立體盒：每面獨立受光（頂最亮、正面中亮、側面暗）＋AO 暗帶＋描邊 → 立體感 */
function drawBox3D(x,y,z,hw,h,hd,pal,outline){
  const tFL=project(x-hw,y,z-hd), tFR=project(x+hw,y,z-hd),
        tBL=project(x-hw,y,z+hd), tBR=project(x+hw,y,z+hd),
        bFL=project(x-hw,y-h,z-hd), bFR=project(x+hw,y-h,z-hd);
  if(cam.x < x-hw){ quad(tFL,tBL,project(x-hw,y-h,z+hd),bFL,pal.sideDark); if(outline) quadStroke(tFL,tBL,project(x-hw,y-h,z+hd),bFL,outline,1); }
  else if(cam.x > x+hw){ quad(tFR,tBR,project(x+hw,y-h,z+hd),bFR,pal.side); if(outline) quadStroke(tFR,tBR,project(x+hw,y-h,z+hd),bFR,outline,1); }
  if(quad(tFL,tFR,bFR,bFL,pal.front)){
    if(bFL&&bFR&&tFL&&tFR){
      const mFL={x:tFL.x+(bFL.x-tFL.x)*0.55, y:tFL.y+(bFL.y-tFL.y)*0.55};
      const mFR={x:tFR.x+(bFR.x-tFR.x)*0.55, y:tFR.y+(bFR.y-tFR.y)*0.55};
      quad(mFL,mFR,bFR,bFL,'rgba(10,6,2,0.28)');
    }
    if(outline) quadStroke(tFL,tFR,bFR,bFL,outline,1);
  }
  quad(tFL,tFR,tBR,tBL,pal.top);
  quadStroke(tFL,tFR,tBR,tBL,pal.edge,1.4);
  if(outline) quadStroke(tFL,tFR,tBR,tBL,outline,1);
}
/* 把地面上半徑 R 的圓投影成螢幕橢圓（投影四個基點求中心與半軸） */
function gEll(x,z,R){
  const pL=project(x-R,0,z), pR=project(x+R,0,z), pF=project(x,0,z-R), pB=project(x,0,z+R);
  if(!pL||!pR||!pF||!pB) return null;
  return { cx:(pL.x+pR.x)/2, cy:(pF.y+pB.y)/2, rx:Math.abs(pR.x-pL.x)/2, ry:Math.abs(pF.y-pB.y)/2 };
}

/* ===== 地洞（3D 世界座標；相機固定）===== */
const HR = 54, DEPTH = 40, RISE = 118;
let HOLES = [];
function buildHoles(){
  HOLES = [];
  const xs = [-172, 0, 172];
  const zs = [378, 214, 50];   /* row0=遠、row2=近（配合數字鍵 789/456/123）*/
  for(let row=0; row<3; row++)
    for(let col=0; col<3; col++)
      HOLES.push({ x: xs[col], z: zs[row] });
}

/* ===== 光暈精靈（additive 粒子用，快取）===== */
function makeGlow(color,size){
  const c=document.createElement('canvas'); c.width=c.height=size;
  const g=c.getContext('2d');
  const grad=g.createRadialGradient(size/2,size/2,1,size/2,size/2,size/2);
  grad.addColorStop(0,color); grad.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=grad; g.fillRect(0,0,size,size);
  return c;
}
const glowCache = {};
function getGlow(color){
  if(!glowCache[color]) glowCache[color]=makeGlow(color,64);
  return glowCache[color];
}

function resize(){
  VW = innerWidth; VH = innerHeight;
  CX = VW/2; CY = VH*0.30; FOV = VH*0.98;
  QDPR = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = Math.round(VW * QDPR);
  canvas.height = Math.round(VH * QDPR);
  canvas.style.width  = VW + 'px';
  canvas.style.height = VH + 'px';
  ctx.setTransform(QDPR, 0, 0, QDPR, 0, 0);
  U = clamp(Math.min(VW/720, VH/560), 0.62, 1.15);
  bgDirty = true;
}
addEventListener('resize', resize);

/* ===== 小工具 ===== */
function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }
const lerp  = (a, b, t) => a + (b - a) * t;
const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
const easeOutBack  = t => 1 + 2.7 * Math.pow(t - 1, 3) + 1.7 * Math.pow(t - 1, 2);
const PI = Math.PI;
function rr(x, y, w, h, r){
  ctx.beginPath(); ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function fill2(fillStyle, lineStyle, lw){
  ctx.fillStyle = fillStyle; ctx.fill();
  ctx.strokeStyle = lineStyle; ctx.lineWidth = lw || 2.5; ctx.stroke();
}
const FONT = '"Microsoft JhengHei","PingFang TC",sans-serif';

/* ===== 音效（Web Audio 合成，去爆音；原樣沿用）===== */
let AC = null, master = null, noiseBuf = null;
let muted = false;
try{ muted = localStorage.getItem('whackpro_muted') === '1'; }catch(e){}
function initAudio(){
  if(!AC){
    try{
      AC = new (window.AudioContext || window.webkitAudioContext)();
      const comp = AC.createDynamicsCompressor();
      comp.threshold.value = -16; comp.knee.value = 22; comp.ratio.value = 7;
      master = AC.createGain();
      master.gain.value = 0.55;
      master.connect(comp); comp.connect(AC.destination);
      const rev = AC.createConvolver();
      const rlen = Math.floor(AC.sampleRate * 0.7);
      const rbuf = AC.createBuffer(2, rlen, AC.sampleRate);
      for(let ch = 0; ch < 2; ch++){
        const d = rbuf.getChannelData(ch);
        for(let i = 0; i < rlen; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / rlen, 2.8);
      }
      rev.buffer = rbuf;
      const rg = AC.createGain(); rg.gain.value = 0.12;
      master.connect(rev); rev.connect(rg); rg.connect(comp);
      initAmbient();
    }catch(e){}
  }
  if(AC && AC.state === 'suspended') AC.resume();
}
let amb = null, ambDuck = 1, chirpT = 4;
function initAmbient(){
  if(!AC || amb) return;
  try{
    const len = AC.sampleRate * 2;
    const buf = AC.createBuffer(1, len, AC.sampleRate);
    const d = buf.getChannelData(0);
    for(let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
    const f = AC.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 340; f.Q.value = 0.5;
    const g = AC.createGain(); g.gain.value = 0;
    src.connect(f); f.connect(g); g.connect(master); src.start();
    amb = { g };
  }catch(e){ amb = null; }
}
function updateAmbient(dt){
  ambDuck = Math.min(1, ambDuck + dt * 0.5);
  if(!AC || !amb) return;
  const on = muted ? 0 : ambDuck;
  amb.g.gain.setTargetAtTime(0.016 * on * (1 + Math.sin(T * 0.5) * 0.35), AC.currentTime, 0.4);
  chirpT -= dt;
  if(chirpT <= 0){
    chirpT = 3 + Math.random() * 6;
    if(!muted && AC) sfx.bird();
  }
}
const rp = f => f * (0.94 + Math.random() * 0.12);
function beep(freq = 440, dur = 0.1, type = 'square', vol = 0.15, slide = 0){
  if(muted || !AC) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, AC.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), AC.currentTime + dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.connect(g).connect(master);
  o.start(); o.stop(AC.currentTime + dur);
}
function noise(dur = 0.15, vol = 0.2){
  if(muted || !AC) return;
  if(!noiseBuf){
    const len = Math.floor(AC.sampleRate * 0.4);
    noiseBuf = AC.createBuffer(1, len, AC.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for(let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  }
  const src = AC.createBufferSource();
  src.buffer = noiseBuf;
  src.playbackRate.value = 0.4 / dur * (0.9 + Math.random() * 0.2);
  const g = AC.createGain();
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  src.connect(g).connect(master);
  src.start();
}

/* ===== 3D 粒子（世界座標＋additive 發光；星星噴發）===== */
let parts3 = [];
function burst3(x, y, z, color, n = 12, speed = 200, life = 0.5, size = 5, star = false){
  for(let i = 0; i < n; i++){
    if(parts3.length > 320) return;
    const a = Math.random() * PI * 2, s = speed * (0.3 + Math.random() * 0.7);
    parts3.push({ x, y, z,
      vx: Math.cos(a) * s, vy: Math.abs(Math.sin(a)) * s * 0.85 + 70, vz: Math.sin(a + 1.3) * s * 0.5,
      life: life * (0.6 + Math.random() * 0.7), max: life, color, size, star,
      spin: Math.random() * 6.28 });
  }
}
function updateParts3(dt){
  for(let i = parts3.length - 1; i >= 0; i--){
    const p = parts3[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.z += p.vz * dt; p.vy -= 560 * dt; p.life -= dt;
    p.spin += dt * 9;
    if(p.life <= 0 || p.y < -30){ parts3[i] = parts3[parts3.length - 1]; parts3.pop(); }
  }
}
function drawParts3(){
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for(const p of parts3){
    const P = project(p.x, p.y, p.z);
    if(!P) continue;
    const a = clamp(p.life / p.max, 0, 1);
    const r = (p.size) * P.s * (0.5 + a * 0.7);
    ctx.globalAlpha = a * 0.85;
    const g = getGlow(p.color);
    ctx.drawImage(g, P.x - r * 2.1, P.y - r * 2.1, r * 4.2, r * 4.2);
    ctx.globalAlpha = a;
    if(p.star){
      drawStarAt(P.x, P.y, r * 1.5, p.color, p.spin);
    }else{
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(P.x, P.y, r * 0.55, 0, PI * 2); ctx.fill();
    }
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}

/* ===== 飄字（easeOutBack 彈跳）===== */
const floaters = [];
function addFloater(x, y, txt, color, size = 22){
  floaters.push({ x, y, txt, color, size: size * U, t: 0 });
}
function updateFloaters(dt){
  for(const f of floaters) f.t += dt;
  for(let i = floaters.length - 1; i >= 0; i--) if(floaters[i].t > 0.8) floaters.splice(i, 1);
}
function drawFloaters(){
  for(const f of floaters){
    const k = f.t / 0.8;
    ctx.globalAlpha = 1 - k;
    const pop = f.t < 0.18 ? easeOutBack(f.t / 0.18) : 1;
    ctx.font = 'bold ' + Math.round(f.size * pop) + 'px ' + FONT;
    ctx.textAlign = 'center';
    ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(40,25,10,.85)';
    ctx.strokeText(f.txt, f.x, f.y - k * 46);
    ctx.fillStyle = f.color; ctx.fillText(f.txt, f.x, f.y - k * 46);
  }
  ctx.globalAlpha = 1;
}
/* 命中衝擊波光圈（螢幕空間橢圓）*/
let rings = [];
function addRing(x, y, color){ if(rings.length < 24) rings.push({ x, y, t: 0, color }); }
function updateRings(dt){
  for(let i = rings.length - 1; i >= 0; i--){
    rings[i].t += dt;
    if(rings[i].t > 0.35){ rings[i] = rings[rings.length - 1]; rings.pop(); }
  }
}
function drawRings(){
  for(const r of rings){
    const k = r.t / 0.35;
    ctx.globalAlpha = (1 - k) * 0.7;
    ctx.strokeStyle = r.color;
    ctx.lineWidth = 3 * (1 - k) + 1;
    ctx.beginPath();
    ctx.ellipse(r.x, r.y, 22 + k * 62, (22 + k * 62) * 0.42, 0, 0, PI * 2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}
/* 揮空小噴（螢幕空間）*/
let sparks = [];
function screenBurst(x, y, color, n = 5){
  for(let i = 0; i < n; i++){
    if(sparks.length > 120) return;
    const a = Math.random() * PI * 2, s = 90 * (0.3 + Math.random() * 0.7);
    sparks.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 60, life: 0.3, max: 0.3, color });
  }
}
function updateSparks(dt){
  for(let i = sparks.length - 1; i >= 0; i--){
    const p = sparks[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 520 * dt; p.life -= dt;
    if(p.life <= 0){ sparks[i] = sparks[sparks.length - 1]; sparks.pop(); }
  }
}
function drawSparks(){
  for(const p of sparks){
    const a = clamp(p.life / p.max, 0, 1);
    ctx.globalAlpha = a; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 1.5 + a * 2, 0, PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

/* 鍵盤配置（同數字鍵盤方位）：789 上排、456 中排、123 下排 */
const KEY_HOLE = { 7: 0, 8: 1, 9: 2, 4: 3, 5: 4, 6: 5, 1: 6, 2: 7, 3: 8 };

/* ===== 全域狀態（數值全數保留）===== */
const GAME_TIME = 60;
const HARD_TIME = 45;
let stateName = 'title';
let stateT = 0, T = 0;
let shake = 0, freeze = 0;
let score = 0, scoreShow = 0, best = 0, bestHard = 0;
let mode = 'classic', hardUnlocked = false, justUnlocked = false;
try{
  best = parseInt(localStorage.getItem('whackpro_best') || '0', 10) || 0;
  bestHard = parseInt(localStorage.getItem('whackpro_best_hard') || '0', 10) || 0;
  hardUnlocked = localStorage.getItem('whackpro_hard') === '1';
}catch(e){}
let timeLeft = GAME_TIME;
let elapsed = 0, spawnTimer = 0;
let combo = 0, comboFlash = 0, lastTick = 99;
let fever = 0, feverOn = false, feverT = 0;
let sprint = false, sprintT = 0;
let stHits = 0, stMaxCombo = 0, stGold = 0, stBombs = 0;
let moles = [];
let swings = [];
let booms = [];
let phase = 'ready', phaseT = 0;
let overT = 0, newBest = false;
let touchMode = false;

function startGame(m){
  mode = m === 'hard' ? 'hard' : (m === 'classic' ? 'classic' : mode);
  score = 0; scoreShow = 0; timeLeft = mode === 'hard' ? HARD_TIME : GAME_TIME;
  elapsed = 0; spawnTimer = 0.4; combo = 0; lastTick = 99;
  moles = []; swings = []; booms = []; parts3 = []; sparks = []; floaters.length = 0; rings = [];
  fever = 0; feverOn = false; feverT = 0; sprint = false; sprintT = 0;
  stHits = 0; stMaxCombo = 0; stGold = 0; stBombs = 0;
  shake = 0; freeze = 0;
  newBest = false; justUnlocked = false;
  phase = 'ready'; phaseT = 0;
  stateName = 'play'; stateT = 0;

function endGame(){
  if(mode === 'hard'){
    if(score > bestHard){ bestHard = score; newBest = true;
      try{ localStorage.setItem('whackpro_best_hard', String(bestHard)); }catch(e){}
    }
  }else{
    if(score > best){ best = score; newBest = true;
      try{ localStorage.setItem('whackpro_best', String(best)); }catch(e){}
    }
    if(!hardUnlocked){
      hardUnlocked = true; justUnlocked = true;
      try{ localStorage.setItem('whackpro_hard', '1'); }catch(e){}
    }
  }
  stateName = 'over'; stateT = 0; overT = 0;
  sfx.timeup();
}
function toTitle(){
  stateName = 'title'; stateT = 0;
  moles = []; swings = []; booms = []; parts3 = []; sparks = []; floaters.length = 0; rings = [];
}

/* ===== 生成與難度（數值保留）===== */
function freeHole(){
  const used = new Set(moles.map(m => m.hole));
  const free = [];
  for(let i = 0; i < 9; i++) if(!used.has(i)) free.push(i);
  if(!free.length) return -1;
  return free[Math.floor(Math.random() * free.length)];
}
function spawnMole(){
  const idx = freeHole();
  if(idx < 0) return;
  const hard = mode === 'hard';
  const roll = Math.random();
  let type = 'normal';
  const goldChance = sprint ? 0.17 : 0.09;
  const helmChance = elapsed > (hard ? 6 : 14) ? (hard ? 0.15 : 0.13) : 0;
  const zapChance = hard && elapsed > 3 ? 0.09 : 0;
  const safeT = hard ? 3 : 8;
  const bombChance = (feverOn || elapsed < safeT) ? 0
    : hard ? Math.min(0.3, 0.11 + (elapsed - 3) * 0.005)
    : Math.min(0.22, 0.06 + (elapsed - 8) * 0.004);
  if(roll < goldChance) type = 'gold';
  else if(roll < goldChance + zapChance) type = 'zap';
  else if(roll < goldChance + zapChance + helmChance) type = 'helmet';
  else if(roll < goldChance + zapChance + helmChance + bombChance) type = 'bomb';
  const upTime = type === 'gold' ? 0.7
    : type === 'zap' ? 0.45
    : type === 'helmet' ? (hard ? 1.3 : 1.5)
    : Math.max(hard ? 0.45 : 0.55, (hard ? 1.0 : 1.2) - elapsed * 0.013);
  moles.push({ hole: idx, type, t: 0, upTime, state: 'up', hitT: 0, hp: type === 'helmet' ? 2 : 1 });
  const sh = HOLES[idx];
  burst3(sh.x, 8, sh.z, '#6b4423', 7, 130, 0.4, 4);
}
function addFever(v){
  if(feverOn) return;
  fever = Math.min(1, fever + v);
  if(fever >= 1){
    feverOn = true; feverT = 6;
    addFloater(VW / 2, VH * 0.30, 'FEVER！全部雙倍分！', '#ff6b35', 30);
    shake = Math.max(shake, 7);
    sfx.fever();
  }
}

/* ===== 敲擊（改螢幕空間 → 投影後的地鼠命中）===== */
let totalSwings = 0;
function moleHeadScreen(m){
  const h = HOLES[m.hole];
  const r = moleRise(m);
  const O = (r - 1) * RISE;
  return project(h.x, 74 + O, h.z);
}
function hitScreen(m){
  const h = HOLES[m.hole];
  return project(h.x, 66, h.z) || { x: VW/2, y: VH/2, s: 1 };
}
function whackAt(sx, sy){
  totalSwings++;
  swings.push({ x: sx, y: sy, t: 0 });
  let hit = false;
  /* 直接命中（含炸彈；越近的洞優先）*/
  let target = null, bestD = 1;
  for(const m of moles){
    if(m.state !== 'up' && m.state !== 'stay') continue;
    const P = moleHeadScreen(m); if(!P) continue;
    const R = 62 * P.s;
    const dx = sx - P.x, dy = sy - P.y;
    const d = (dx * dx + dy * dy) / (R * R);
    if(d < 1 && d < bestD){ bestD = d; target = m; }
  }
  if(target){ hitMole(target); hit = true; }
  /* 瞄準輔助——差一點也算（絕不吸到炸彈）*/
  if(!hit){
    let bestM = null, bd = 1;
    for(const m of moles){
      if((m.state !== 'up' && m.state !== 'stay') || m.type === 'bomb') continue;
      const P = moleHeadScreen(m); if(!P) continue;
      const R = 96 * P.s;
      const dx = sx - P.x, dy = sy - P.y;
      const d = (dx * dx + dy * dy) / (R * R);
      if(d < 1 && d < bd){ bd = d; bestM = m; }
    }
    if(bestM){ hitMole(bestM); hit = true; }
  }
  if(!hit){
    combo = Math.floor(combo / 2);
    screenBurst(sx, sy + 6, 'rgba(180,150,110,.9)', 6);
    sfx.whiff();
  }
}
function hitMole(m){
  const h = HOLES[m.hole];
  const S = hitScreen(m);
  if(m.type === 'bomb'){
    const hard = mode === 'hard';
    m.state = 'hit'; m.hitT = 0;
    combo = 0; stBombs++;
    fever = Math.max(0, fever - 0.3);
    score = Math.max(0, score - (hard ? 50 : 30));
    timeLeft = Math.max(0, timeLeft - (hard ? 5 : 3));
    freeze = 0.1; shake = 11;
    booms.push({ x: S.x, y: S.y - 40, t: 0, s: S.s });
    burst3(h.x, 60, h.z, '#ff6b35', 18, 300, 0.55, 6);
    burst3(h.x, 60, h.z, '#3f3f3f', 10, 220, 0.5, 5);
    addRing(S.x, S.y - 20, '#ff6b35');
    addRing(S.x, S.y - 20, '#ffd23f');
    addFloater(S.x, S.y - 90, hard ? '炸彈！-50分 -5秒' : '炸彈！-30分 -3秒', '#ff5a5a', 24);
    sfx.bomb();
    return;
  }
  if(m.type === 'helmet' && m.hp === 2){
    m.hp = 1; m.state = 'stay'; m.t = 0.16; m.upTime = 1.0;
    combo++; comboFlash = 1; stHits++;
    stMaxCombo = Math.max(stMaxCombo, combo);
    addFever(0.06);
    freeze = Math.max(freeze, 0.05); shake = Math.max(shake, 4);
    burst3(h.x, 72, h.z, '#ffcc00', 10, 220, 0.45, 5, true);
    addFloater(S.x, S.y - 96, '帽子飛了！再敲！', '#ffcc00', 20);
    sfx.clank();
    if(navigator.vibrate) try{ navigator.vibrate(20); }catch(e){}
    return;
  }
  m.state = 'hit'; m.hitT = 0;
  combo++;
  comboFlash = 1;
  stHits++;
  stMaxCombo = Math.max(stMaxCombo, combo);
  const mult = 1 + Math.floor(combo / 5);
  const base = m.type === 'gold' ? 30 : m.type === 'zap' ? 60 : m.type === 'helmet' ? 40 : 10;
  const gain = base * mult * (feverOn ? 2 : 1);
  score += gain;
  addFever(m.type === 'normal' ? 0.09 : m.type === 'zap' ? 0.18 : 0.13);
  freeze = Math.max(freeze, m.type === 'normal' ? 0.04 : 0.07);
  shake = Math.max(shake, m.type === 'normal' ? 3 : 6);
  const col = m.type === 'gold' ? '#ffd23f' : m.type === 'zap' ? '#5ad7ff' : m.type === 'helmet' ? '#ffcc00' : '#ffe4a0';
  burst3(h.x, 60, h.z, col, 13, 250, 0.5, 6, true);
  burst3(h.x, 60, h.z, '#ffffff', 6, 190, 0.4, 4);
  addRing(S.x, S.y - 20, col);
  addFloater(S.x, S.y - 90, '+' + gain, m.type === 'normal' ? '#fff' : m.type === 'zap' ? '#5ad7ff' : '#ffd23f', m.type === 'normal' ? 22 : 26);
  if(m.type === 'gold'){
    stGold++;
    timeLeft = Math.min(mode === 'hard' ? 60 : 75, timeLeft + 2);
    addFloater(S.x, S.y - 120, '+2秒！', '#7ef0a0', 20);
    sfx.gold();
  }else if(m.type === 'zap'){
    addFloater(S.x, S.y - 120, '閃電鼠！', '#5ad7ff', 20);
    sfx.gold();
  }else if(m.type === 'helmet') sfx.gold();
  else sfx.whack();
  if(navigator.vibrate) try{ navigator.vibrate(25); }catch(e){}
}

/* ===== 輸入 ===== */
addEventListener('keydown', e => {
  initAudio();
  const c = e.code;
  if(c === 'Space') e.preventDefault();
  if(e.repeat) return;
  if(c === 'KeyM'){ toggleMute(); return; }
  if(stateName === 'title' && (c === 'Enter' || c === 'Space')){ startGame('classic'); return; }
  if(stateName === 'title' && c === 'KeyH' && hardUnlocked){ startGame('hard'); return; }
  if(stateName === 'over' && (c === 'Enter' || c === 'Space' || c === 'KeyR')){
    if(overT > 0.4) startGame();
    return;
  }
  if(stateName === 'play' && phase === 'go'){
    const mDigit = c.match(/^(Digit|Numpad)([1-9])$/);
    if(mDigit){
      const idx = KEY_HOLE[parseInt(mDigit[2], 10)];
      const h = HOLES[idx];
      const P = project(h.x, 60, h.z) || { x: VW/2, y: VH/2 };
      whackAt(P.x, P.y);
    }
  }
});
function evPos(cx, cy){
  const r = canvas.getBoundingClientRect();
  return { x: (cx - r.left) * (VW / r.width), y: (cy - r.top) * (VH / r.height) };
}
canvas.addEventListener('pointerdown', e => {
  initAudio();
  const p = evPos(e.clientX, e.clientY);
  if(e.pointerType !== 'mouse') touchMode = true;
  for(const b of uiButtons){
    if(p.x >= b.x - 8 && p.x <= b.x + b.w + 8 && p.y >= b.y - 8 && p.y <= b.y + b.h + 8){
      sfx.ui(); b.cb(); return;
    }
  }
  if(stateName === 'play' && phase === 'go') whackAt(p.x, p.y);
});
canvas.addEventListener('mousemove', e => {
  const p = evPos(e.clientX, e.clientY);
  mouse.x = p.x; mouse.y = p.y;
});
canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

/* ===== play 更新（數值/時序保留）===== */
function playUpdate(dt){
  phaseT += dt;
  if(phase === 'ready' && phaseT > 0.9){ phase = 'go'; phaseT = 0; }
  if(phase === 'go'){
    elapsed += dt;
    timeLeft -= dt;
    if(feverOn){
      feverT -= dt;
      fever = Math.max(0, feverT / 6);
      if(feverT <= 0){ feverOn = false; fever = 0; }
      if(Math.random() < dt * 6){
        const hh = HOLES[(Math.random() * 9) | 0];
        burst3(hh.x + (Math.random() * 2 - 1) * 60, 20 + Math.random() * 60, hh.z, '#ffd23f', 2, 90, 0.5, 4);
      }
    }
    if(!sprint && timeLeft <= 10){
      sprint = true; sprintT = 0;
      addFloater(VW / 2, VH * 0.30, '最後衝刺！金鼠加倍出現！', '#7ef0a0', 28);
      sfx.sprint();
    }
    if(sprint) sprintT += dt;
    const sec = Math.ceil(timeLeft);
    if(sec <= 5 && sec >= 1 && sec !== lastTick){ lastTick = sec; sfx.tick(); }
    if(timeLeft <= 0){ timeLeft = 0; phase = 'end'; phaseT = 0; }
    spawnTimer -= dt;
    const hard = mode === 'hard';
    const maxOnField = 2 + (hard ? 1 : 0) + Math.min(3, Math.floor(elapsed / (hard ? 10 : 14))) + (feverOn ? 2 : 0) + (sprint ? 1 : 0);
    if(spawnTimer <= 0 && moles.length < maxOnField){
      let iv = Math.max(hard ? 0.24 : 0.3, (hard ? 0.66 : 0.82) - elapsed * 0.01);
      if(feverOn) iv = Math.max(0.18, iv * 0.45);
      else if(sprint) iv = Math.max(hard ? 0.22 : 0.26, iv * 0.7);
      spawnTimer = iv;
      spawnMole();
    }
  }
  if(phase === 'end' && phaseT > 1.1) endGame();
  for(let i = moles.length - 1; i >= 0; i--){
    const m = moles[i];
    m.t += dt;
    if(m.state === 'hit'){
      m.hitT += dt;
      if(m.hitT > 0.35) moles.splice(i, 1);
    }else if(m.state === 'up' && m.t > 0.16){
      m.state = 'stay';
    }else if(m.state === 'stay' && m.t > 0.16 + m.upTime){
      m.state = 'down'; m.t = 0;
    }else if(m.state === 'down' && m.t > 0.15){
      if(m.type === 'gold'){
        const S = hitScreen(m);
        addFloater(S.x, S.y - 30, '金鼠溜走了…', 'rgba(255,255,255,.9)', 15);
      }
      moles.splice(i, 1);
    }
  }
  for(let i = swings.length - 1; i >= 0; i--){
    swings[i].t += dt;
    if(swings[i].t > 0.22) swings.splice(i, 1);
  }
  for(let i = booms.length - 1; i >= 0; i--){
    booms[i].t += dt;
    if(booms[i].t > 0.35) booms.splice(i, 1);
  }
  comboFlash = Math.max(0, comboFlash - dt * 3);
  scoreShow += (score - scoreShow) * (1 - Math.pow(0.02, dt));
}

/* ===== 場景烘焙（相機固定 → 天空／立體草地／凹洞一次烘進離屏）===== */
function ell(c, e){ c.beginPath(); c.ellipse(e.cx, e.cy, e.rx, e.ry, 0, 0, PI * 2); }
function drawHoleBaked(c, hole){
  const hx = hole.x, hz = hole.z;
  const rim = gEll(hx, hz, HR + 16), lip = gEll(hx, hz, HR);
  if(!rim || !lip) return;
  /* 泥土外環（隆起唇口）*/
  const dg = c.createRadialGradient(rim.cx, rim.cy - rim.ry * 0.3, 3, rim.cx, rim.cy, Math.max(rim.rx, rim.ry));
  dg.addColorStop(0, '#9c7642'); dg.addColorStop(1, '#6f5228');
  c.fillStyle = dg; ell(c, rim); c.fill();
  /* 凹洞開口（越深越暗的放射漸層）*/
  const rad = Math.max(lip.rx, lip.ry);
  const og = c.createRadialGradient(lip.cx, lip.cy - lip.ry * 0.15, 2, lip.cx, lip.cy, rad);
  og.addColorStop(0, '#0c0703'); og.addColorStop(0.55, '#1c1108'); og.addColorStop(1, '#3a2612');
  c.fillStyle = og; ell(c, lip); c.fill();
  /* 洞底（沉入 DEPTH，強化凹陷深度）*/
  const fl = project(hx, -DEPTH, hz);
  if(fl){
    c.fillStyle = '#080402';
    c.beginPath();
    c.ellipse(fl.x, lip.cy + lip.ry * 0.22, lip.rx * 0.5, lip.ry * 0.46, 0, 0, PI * 2);
    c.fill();
  }
  /* 近緣受光弧（下半）＋ 遠緣陰影弧（上半）*/
  c.lineWidth = 3;
  c.strokeStyle = 'rgba(255,235,180,.30)';
  c.beginPath(); c.ellipse(lip.cx, lip.cy, lip.rx, lip.ry, 0, 0.08 * PI, 0.92 * PI); c.stroke();
  c.strokeStyle = 'rgba(0,0,0,.30)';
  c.beginPath(); c.ellipse(lip.cx, lip.cy, lip.rx, lip.ry, 0, 1.08 * PI, 1.92 * PI); c.stroke();
}
function bakeScene(){
  if(!bgCv) bgCv = document.createElement('canvas');
  bgCv.width = Math.max(1, Math.round(VW * QDPR));
  bgCv.height = Math.max(1, Math.round(VH * QDPR));
  const c = bgCv.getContext('2d');
  c.setTransform(QDPR, 0, 0, QDPR, 0, 0);
  /* 天空漸層盒 */
  const sg = c.createLinearGradient(0, 0, 0, VH);
  sg.addColorStop(0, '#4c9bf0'); sg.addColorStop(0.42, '#7cc0fb'); sg.addColorStop(0.66, '#bfe4ff'); sg.addColorStop(1, '#e9f6ff');
  c.fillStyle = sg; c.fillRect(0, 0, VW, VH);
  /* 太陽＋bloom（烘焙一次）*/
  const sunX = VW - Math.min(150, VW * 0.2), sunY = VH * 0.14;
  c.save(); c.globalCompositeOperation = 'lighter';
  const bloom = c.createRadialGradient(sunX, sunY, 12, sunX, sunY, 150);
  bloom.addColorStop(0, 'rgba(255,244,190,.6)'); bloom.addColorStop(1, 'rgba(255,244,190,0)');
  c.fillStyle = bloom; c.beginPath(); c.arc(sunX, sunY, 150, 0, PI * 2); c.fill();
  c.restore();
  const sgr = c.createRadialGradient(sunX - 8, sunY - 8, 4, sunX, sunY, 40);
  sgr.addColorStop(0, '#fff8d8'); sgr.addColorStop(1, '#ffd23f');
  c.fillStyle = sgr; c.beginPath(); c.arc(sunX, sunY, 40, 0, PI * 2); c.fill();

  /* 立體草地格網（真透視 → 一眼看出 3D）＋ 遠處霧化 */
  const gx0 = -720, gx1 = 720, gz0 = -140, gz1 = 560;
  const NX = 18, NZ = 15;
  const fog = [214, 236, 252];
  const shade = [[0x74,0xc8,0x50], [0x66,0xbc,0x46]];
  for(let ri = NZ - 1; ri >= 0; ri--){          /* 由遠到近（畫家演算法）*/
    const z0 = gz0 + (gz1 - gz0) * ri / NZ;
    const z1 = gz0 + (gz1 - gz0) * (ri + 1) / NZ;
    const fzt = clamp((z0 - gz0) / (gz1 - gz0), 0, 1);
    const fogT = Math.pow(fzt, 1.4) * 0.82;      /* 遠處混入霧色 */
    for(let ci = 0; ci < NX; ci++){
      const x0 = gx0 + (gx1 - gx0) * ci / NX;
      const x1 = gx0 + (gx1 - gx0) * (ci + 1) / NX;
      const a = project(x0, 0, z1), b = project(x1, 0, z1), d = project(x0, 0, z0), e = project(x1, 0, z0);
      if(!a || !b || !d || !e) continue;
      const base = shade[(ci + ri) & 1];
      /* 近處微暗（下方陰影感）*/
      const dark = 0.82 + 0.18 * fzt;
      const rr2 = lerp(base[0] * dark, fog[0], fogT);
      const gg2 = lerp(base[1] * dark, fog[1], fogT);
      const bb2 = lerp(base[2] * dark, fog[2], fogT);
      c.fillStyle = 'rgb(' + (rr2|0) + ',' + (gg2|0) + ',' + (bb2|0) + ')';
      c.beginPath(); c.moveTo(a.x, a.y); c.lineTo(b.x, b.y); c.lineTo(e.x, e.y); c.lineTo(d.x, d.y); c.closePath(); c.fill();
    }
  }
  /* 細格線（提升 3D 讀感，越遠越淡）*/
  c.lineWidth = 1;
  for(let ri = 0; ri <= NZ; ri++){
    const z = gz0 + (gz1 - gz0) * ri / NZ;
    const a = project(gx0, 0, z), b = project(gx1, 0, z);
    if(!a || !b) continue;
    c.strokeStyle = 'rgba(40,90,36,' + (0.22 * (1 - ri / NZ)).toFixed(2) + ')';
    c.beginPath(); c.moveTo(a.x, a.y); c.lineTo(b.x, b.y); c.stroke();
  }
  for(let ci = 0; ci <= NX; ci++){
    const x = gx0 + (gx1 - gx0) * ci / NX;
    const a = project(x, 0, gz0), b = project(x, 0, gz1);
    if(!a || !b) continue;
    c.strokeStyle = 'rgba(40,90,36,0.14)';
    c.beginPath(); c.moveTo(a.x, a.y); c.lineTo(b.x, b.y); c.stroke();
  }

  /* 裝飾（花／蘑菇，投影為地面立牌）*/
  const deco = (img, wx, wz, size) => {
    if(!(img.complete && img.naturalWidth)) return;
    const p = project(wx, 0, wz); if(!p) return;
    const w = size * p.s;
    c.drawImage(img, p.x - w / 2, p.y - w, w, w);
  };
  deco(IMG.flower, -560, 30, 60); deco(IMG.flower, 540, 120, 56);
  deco(IMG.flower, -360, 470, 90); deco(IMG.mush, 470, 430, 84);
  deco(IMG.mush, 300, -60, 46); deco(IMG.flower, 80, 520, 96);

  /* 凹洞（由遠到近烘焙）*/
  const order = HOLES.map((h, i) => i).sort((a, b) => HOLES[b].z - HOLES[a].z);
  for(const i of order) drawHoleBaked(c, HOLES[i]);

  bgHasImgs = !!(IMG.flower.complete && IMG.flower.naturalWidth && IMG.mush.complete && IMG.mush.naturalWidth);

  /* 暗角（低解析放大＝平滑漸層）*/
  if(!vigCv) vigCv = document.createElement('canvas');
  vigCv.width = 240; vigCv.height = Math.max(2, Math.round(240 * VH / VW));
  const vc = vigCv.getContext('2d');
  const vh = vigCv.height;
  const vg = vc.createRadialGradient(120, vh * 0.44, Math.min(110, vh * 0.42), 120, vh * 0.52, Math.max(150, vh * 0.8));
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(10,20,8,.36)');
  vc.fillStyle = vg; vc.fillRect(0, 0, 240, vh);
  bgDirty = false;
}

/* 逐幀視差雲（唯一逐幀重繪的背景元素）*/
function drawClouds(){
  for(const L of [[T * 10, VH * 0.10, 0.85, 0.5], [T * 20, VH * 0.05, 1.15, 0.8]]){
    ctx.fillStyle = 'rgba(255,255,255,' + L[3] + ')';
    for(let i = 0; i < 3; i++){
      const cx = ((i * 420 + L[0]) % (VW + 300)) - 150;
      const cy = L[1] + (i * 34) % 40;
      ctx.beginPath();
      ctx.ellipse(cx, cy, 66 * L[2], 18 * L[2], 0, 0, PI * 2);

}
/* 環境層：蝴蝶（螢幕空間程序動畫）*/
function drawAmbientLayer(){
  const hb = VH * 0.24;
  for(let i = 0; i < 10; i++){
    const sp = 8 + (i % 4) * 5;
    const x = ((i * 191) + T * sp) % (VW + 20) - 10;
    const y = hb + ((i * 113) + T * (5 + (i % 3) * 4)) % (VH * 0.55);
    ctx.globalAlpha = 0.22 + 0.24 * Math.sin(T * 2 + i);
    ctx.fillStyle = '#fff8d8';
    ctx.fillRect(x, y, 3, 3);
  }
  ctx.globalAlpha = 1;
  for(let i = 0; i < 3; i++){
    const bx = VW / 2 + Math.sin(T * (0.23 + i * 0.07) + i * 2.1) * (VW * 0.4);
    const by = hb + Math.sin(T * (0.5 + i * 0.11) + i * 4) * 30 + i * 16;
    const flap = Math.sin(T * 12 + i * 2);
    ctx.save();
    ctx.translate(bx, by);
    ctx.fillStyle = ['#ff9ecf', '#9ecfff', '#ffd23f'][i];
    for(const s of [-1, 1]){
      ctx.beginPath();
      ctx.ellipse(s * 5 * Math.abs(flap), 0, 6 * Math.max(0.3, Math.abs(flap)), 8, s * 0.4, 0, PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = '#4a2f18';
    ctx.fillRect(-1.2, -6, 2.4, 12);
    ctx.restore();
  }
}

/* ===== 地鼠（3D 體素身體）===== */
function moleRise(m){
  if(m.state === 'up') return easeOutBack(clamp(m.t / 0.16, 0, 1));
  if(m.state === 'stay') return 1;
  if(m.state === 'down') return 1 - easeOutCubic(clamp(m.t / 0.15, 0, 1));
  return 1;
}
const PAL_MOLE  = { top:'#a5744a', front:'#815633', side:'#6b4423', sideDark:'#4f321a', edge:'rgba(255,220,180,.4)' };
const PAL_BELLY = { top:'#dcb488', front:'#c99b6f', side:'#b3855b', sideDark:'#946a44', edge:'rgba(255,240,210,.5)' };
const PAL_GOLD  = { top:'#ffe387', front:'#e8b53a', side:'#d59a20', sideDark:'#b07d12', edge:'rgba(255,245,200,.6)' };
const PAL_GOLDB = { top:'#fff3c4', front:'#ffe08a', side:'#e8c25a', sideDark:'#c79a2e', edge:'rgba(255,250,220,.6)' };
const PAL_ZAP   = { top:'#bdeeff', front:'#5aa3e0', side:'#3a8fd9', sideDark:'#2a6fb0', edge:'rgba(220,245,255,.6)' };
const PAL_ZAPB  = { top:'#e2f6ff', front:'#bfe8ff', side:'#8fd0f7', sideDark:'#5aa3e0', edge:'rgba(235,250,255,.6)' };
const PAL_HELM  = { top:'#ffe066', front:'#ffcc00', side:'#e0a800', sideDark:'#b88600', edge:'rgba(255,245,190,.6)' };
const OUT_MOLE  = 'rgba(40,24,10,.55)';
const OUT_GOLD  = 'rgba(120,80,0,.5)';
const OUT_ZAP   = 'rgba(20,60,110,.5)';

function drawStarAt(x, y, r, color, spin){
  ctx.save();
  ctx.translate(x, y); ctx.rotate(spin || 0);
  ctx.fillStyle = color;
  ctx.beginPath();
  for(let i = 0; i < 10; i++){
    const rad = i % 2 === 0 ? r : r * 0.45;
    const a = i * PI / 5 - PI / 2;
    if(i === 0) ctx.moveTo(Math.cos(a) * rad, Math.sin(a) * rad);
    else ctx.lineTo(Math.cos(a) * rad, Math.sin(a) * rad);
  }
  ctx.closePath(); ctx.fill();
  ctx.restore();
}
function drawStar5(x, y, r, color, line){
  ctx.save();
  ctx.translate(x, y);
  ctx.beginPath();
  for(let i = 0; i < 10; i++){
    const rad = i % 2 === 0 ? r : r * 0.45;
    const a = i * PI / 5 - PI / 2;
    if(i === 0) ctx.moveTo(Math.cos(a) * rad, Math.sin(a) * rad);
    else ctx.lineTo(Math.cos(a) * rad, Math.sin(a) * rad);
  }
  ctx.closePath();
  ctx.fillStyle = color; ctx.fill();
  ctx.strokeStyle = line; ctx.lineWidth = 2.5; ctx.stroke();
  ctx.restore();
}

function drawMole3D(m){
  const hole = HOLES[m.hole];
  const r = moleRise(m);
  let O = (r - 1) * RISE;
  let al = 1;
  if(m.state === 'hit'){ O -= m.hitT * 300; al = clamp(1 - m.hitT / 0.35, 0, 1); }
  const hx = hole.x, hz = hole.z;
  const lip = gEll(hx, hz, HR);
  if(!lip) return;
  const bottomClip = lip.cy + lip.ry + 3;
  /* 接地陰影（洞口內，隨冒出程度加深）*/
  ctx.globalAlpha = 0.34 * clamp(r, 0, 1);
  ctx.fillStyle = '#140c05';
  ctx.beginPath(); ctx.ellipse(lip.cx, lip.cy + lip.ry * 0.1, lip.rx * 0.78, lip.ry * 0.78, 0, 0, PI * 2); ctx.fill();
  ctx.globalAlpha = 1;

  ctx.save();
  ctx.beginPath(); ctx.rect(0, 0, VW, bottomClip); ctx.clip();
  ctx.globalAlpha = al;

  const gold = m.type === 'gold', zap = m.type === 'zap', helm = m.type === 'helmet', bomb = m.type === 'bomb';
  const body = gold ? PAL_GOLD : zap ? PAL_ZAP : bomb ? PAL_MOLE : PAL_MOLE;
  const belly = gold ? PAL_GOLDB : zap ? PAL_ZAPB : PAL_BELLY;
  const out = gold ? OUT_GOLD : zap ? OUT_ZAP : OUT_MOLE;

  if(bomb){
    drawBombMole3D(m, hx, hz, O);
  }else{
    /* 前爪（扒在洞口）*/
    drawBox3D(hx - 20, 22 + O, hz - 14, 8, 10, 7, body, out);
    drawBox3D(hx + 20, 22 + O, hz - 14, 8, 10, 7, body, out);
    /* 身體 */
    drawBox3D(hx, 56 + O, hz, 26, 36, 21, body, out);
    /* 肚皮（較亮的前貼片）*/
    drawBox3D(hx, 44 + O, hz - 19, 15, 22, 3, belly, out);
    /* 手臂 */
    drawBox3D(hx - 27, 46 + O, hz - 4, 5, 18, 5, body, out);
    drawBox3D(hx + 27, 46 + O, hz - 4, 5, 18, 5, body, out);
    /* 頭 */
    drawBox3D(hx, 86 + O, hz, 20, 26, 18, body, out);
    /* 耳朵 */
    drawBox3D(hx - 15, 96 + O, hz + 2, 6, 9, 5, body, out);
    drawBox3D(hx + 15, 96 + O, hz + 2, 6, 9, 5, body, out);
    /* 頭頂配件 */
    if(helm && m.hp === 2) drawBox3D(hx, 96 + O, hz, 21, 9, 19, PAL_HELM, OUT_MOLE);
    /* 臉（畫在頭正面）*/
    drawMoleFace(m, hx, hz, O);
    /* 型別特效（螢幕空間光點）*/
    const head = project(hx, 88 + O, hz);
    if(head){
      if(gold){
        for(let i = 0; i < 3; i++){
          const a = T * 3 + i * 2.1;
          drawStarAt(head.x + Math.cos(a) * 34 * head.s, head.y - 14 * head.s + Math.sin(a * 1.3) * 10 * head.s, 5 * head.s, '#ffec9e', a);
        }
      }else if(zap){
        ctx.fillStyle = '#ffe94a'; ctx.strokeStyle = '#c79a00'; ctx.lineWidth = 2 * head.s;
        const s = head.s, bx = head.x, by = head.y - 34 * s;
        ctx.beginPath();
        ctx.moveTo(bx + 3 * s, by - 16 * s); ctx.lineTo(bx - 7 * s, by); ctx.lineTo(bx - 1 * s, by);
        ctx.lineTo(bx - 6 * s, by + 12 * s); ctx.lineTo(bx + 8 * s, by - 4 * s); ctx.lineTo(bx + 2 * s, by - 4 * s);
        ctx.closePath(); ctx.fill(); ctx.stroke();
      }
    }
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  /* 洞口近緣（前半泥唇）畫在地鼠之上 → 地鼠從洞裡冒出 */
  drawHoleFront3D(hole);
}
function drawMoleFace(m, hx, hz, O){
  const gold = m.type === 'gold', zap = m.type === 'zap', helm = m.type === 'helmet';
  const OUT = gold ? '#8a5f00' : zap ? '#1d4e8f' : '#4a2f18';
  const face = project(hx, 84 + O, hz - 18);
  if(!face) return;
  const s = face.s;
  if(m.state === 'hit'){
    ctx.strokeStyle = '#2a1a0a'; ctx.lineWidth = 3 * s; ctx.lineCap = 'round';
    for(const ex of [-9, 9]){
      ctx.beginPath();
      ctx.moveTo(face.x + (ex - 4) * s, face.y - 3 * s); ctx.lineTo(face.x + (ex + 4) * s, face.y + 4 * s);
      ctx.moveTo(face.x + (ex + 4) * s, face.y - 3 * s); ctx.lineTo(face.x + (ex - 4) * s, face.y + 4 * s);
      ctx.stroke();
    }
    for(let i = 0; i < 3; i++){
      const a = m.hitT * 12 + i * 2.09;
      drawStarAt(face.x + Math.cos(a) * 22 * s, face.y - 22 * s + Math.sin(a) * 6 * s, 5 * s, '#ffd23f', a);
    }
    return;
  }
  /* 眼睛 */
  const blink = ((T + m.hole) % 2.8) < 0.12;
  for(const ex of [-9, 9]){
    if(blink){
      ctx.strokeStyle = OUT; ctx.lineWidth = 2 * s;
      ctx.beginPath(); ctx.moveTo(face.x + (ex - 3) * s, face.y); ctx.lineTo(face.x + (ex + 3) * s, face.y); ctx.stroke();
    }else{
      ctx.beginPath(); ctx.arc(face.x + ex * s, face.y, 4.6 * s, 0, PI * 2);
      ctx.fillStyle = '#fff'; ctx.fill(); ctx.strokeStyle = OUT; ctx.lineWidth = 1.2 * s; ctx.stroke();
      ctx.fillStyle = '#1f1f1f';
      ctx.beginPath(); ctx.arc(face.x + (ex + 1) * s, face.y + 0.5 * s, 2.4 * s, 0, PI * 2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(face.x + (ex + 2) * s, face.y - 1 * s, 1 * s, 0, PI * 2); ctx.fill();
    }
  }
  if(helm && m.hp === 1){
    ctx.strokeStyle = '#2a1a0a'; ctx.lineWidth = 3 * s; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(face.x - 14 * s, face.y - 8 * s); ctx.lineTo(face.x - 5 * s, face.y - 4 * s);
    ctx.moveTo(face.x + 14 * s, face.y - 8 * s); ctx.lineTo(face.x + 5 * s, face.y - 4 * s);
    ctx.stroke();
  }
  /* 鼻吻 */
  ctx.beginPath(); ctx.ellipse(face.x, face.y + 10 * s, 7 * s, 5 * s, 0, 0, PI * 2);
  ctx.fillStyle = '#e8a0a0'; ctx.fill(); ctx.strokeStyle = '#b96a6a'; ctx.lineWidth = 1.5 * s; ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,.6)';
  ctx.beginPath(); ctx.ellipse(face.x - 2 * s, face.y + 8 * s, 2 * s, 1.2 * s, 0, 0, PI * 2); ctx.fill();
  /* 牙齒 */
  ctx.fillStyle = '#fff';
  ctx.fillRect(face.x - 3.5 * s, face.y + 14 * s, 3 * s, 4.5 * s);
  ctx.fillRect(face.x + 0.5 * s, face.y + 14 * s, 3 * s, 4.5 * s);
  /* 微笑 */
  ctx.strokeStyle = '#3a2415'; ctx.lineWidth = 2 * s; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(face.x, face.y + 14 * s, 6 * s, 0.15 * PI, 0.85 * PI); ctx.stroke();
}
function drawBombMole3D(m, hx, hz, O){
  /* 3D 深色炸彈身體 ＋ 引信火花 */
  const PAL_BOMB = { top:'#4a4a4a', front:'#2e2e2e', side:'#242424', sideDark:'#161616', edge:'rgba(120,120,120,.5)' };
  drawBox3D(hx, 60 + O, hz, 24, 44, 22, PAL_BOMB, 'rgba(0,0,0,.6)');
  /* 高光點 */
  const hi = project(hx - 10, 78 + O, hz - 20);
  if(hi){ ctx.globalAlpha = ctx.globalAlpha; ctx.fillStyle = 'rgba(255,255,255,.35)'; ctx.beginPath(); ctx.ellipse(hi.x, hi.y, 7 * hi.s, 4 * hi.s, -0.4, 0, PI * 2); ctx.fill(); }
  const top = project(hx + 8, 66 + O, hz);
  if(top){
    const s = top.s;
    for(let i = 0; i < 2; i++){
      const a = T * 20 + i * 3;
      drawStarAt(top.x + Math.cos(a) * 5 * s, top.y - 22 * s + Math.sin(a) * 5 * s, (5 + Math.sin(T * 30) * 2) * s, i ? '#ffd23f' : '#ff6b35', a);
    }
    ctx.font = 'bold ' + Math.round(13 * s) + 'px ' + FONT;
    ctx.textAlign = 'center';
    ctx.lineWidth = 3 * s; ctx.strokeStyle = 'rgba(0,0,0,.6)';
    ctx.strokeText('別敲我！', top.x, top.y - 32 * s);
    ctx.fillStyle = '#ff5a5a';
    ctx.fillText('別敲我！', top.x, top.y - 32 * s);
  }
}
function drawHoleFront3D(hole){
  const rim = gEll(hole.x, hole.z, HR + 16), lip = gEll(hole.x, hole.z, HR);
  if(!rim || !lip) return;
  /* 前半泥唇（外弧下半 → 內弧下半）*/
  ctx.fillStyle = '#7a5a30';
  ctx.beginPath();
  ctx.ellipse(rim.cx, rim.cy, rim.rx, rim.ry, 0, 0.02 * PI, 0.98 * PI);
  ctx.ellipse(lip.cx, lip.cy, lip.rx, lip.ry, 0, 0.98 * PI, 0.02 * PI, true);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(255,235,180,.35)'; ctx.lineWidth = 2.4;
  ctx.beginPath(); ctx.ellipse(lip.cx, lip.cy, lip.rx, lip.ry, 0, 0.1 * PI, 0.9 * PI); ctx.stroke();
  /* 草叢點綴 */
  ctx.strokeStyle = 'rgba(47,107,40,.8)'; ctx.lineWidth = 2;
  for(const gx of [-0.7, 0.7]){
    const bx = lip.cx + gx * lip.rx, by = lip.cy + lip.ry * 0.7;
    ctx.beginPath();
    ctx.moveTo(bx, by); ctx.lineTo(bx - 4, by - 9);
    ctx.moveTo(bx, by); ctx.lineTo(bx + 3, by - 11);

  }
}

/* ===== HUD ===== */
function drawButton(x, y, w, h, label, cb, primary){
  uiButtons.push({ x, y, w, h, cb });

  rr(-w / 2, -h / 2, w, h, h / 2);
  const bg = ctx.createLinearGradient(0, -h / 2, 0, h / 2);
  if(primary){ bg.addColorStop(0, '#ff8b52'); bg.addColorStop(0.55, '#ff6b35'); bg.addColorStop(1, '#e8541f'); }
  else{ bg.addColorStop(0, 'rgba(255,255,255,.97)'); bg.addColorStop(1, 'rgba(240,230,212,.9)'); }
  ctx.fillStyle = bg; ctx.fill();
  ctx.strokeStyle = primary ? '#c74a1b' : '#a3703c';
  ctx.lineWidth = 2.5; ctx.stroke();
  ctx.globalAlpha = 0.35;
  rr(-w / 2 + 6, -h / 2 + 3, w - 12, h * 0.34, h * 0.17);
  ctx.fillStyle = '#fff'; ctx.fill();

  const order = HOLES.map((h, i) => i).sort((a, b) => HOLES[b].z - HOLES[a].z);
  for(const i of order){
    for(const m of moles) if(m.hole === i) drawMole3D(m);
  }
  drawRings();
  for(const b of booms){
    const k = clamp(b.t / 0.35, 0, 1);

    drawImg(IMG.boom, b.x - sz / 2, b.y - sz / 2, sz, sz);

/* ===== 主迴圈：固定時間步進 60Hz ===== */
const STEP = 1 / 60;
let last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while(acc >= STEP){
    acc -= STEP;
    T += STEP;
    stateT += STEP;
    updateAmbient(STEP);
    if(freeze > 0){ freeze -= STEP; continue; }
    shake *= Math.pow(0.001, STEP);
    if(stateName === 'play') playUpdate(STEP);
    else if(stateName === 'over') overT += STEP;
    updateParts3(STEP);
    updateSparks(STEP);
    updateFloaters(STEP);
    updateRings(STEP);
  }
  uiButtons = [];
  if(stateName === 'title') titleDraw();
  else if(stateName === 'play') playDraw();
  else overDraw();
}
resize();
buildHoles();
mouse.x = VW / 2; mouse.y = VH / 2;
requestAnimationFrame(frame);
/* 測試掛鉤（唯讀，不影響遊戲）*/
window.__test = { get state(){ return stateName; }, get score(){ return score; }, get hits(){ return stHits; }, get swings(){ return totalSwings; }, get T(){ return T; }, get mode(){ return mode; },
  fastEnd(){ if(stateName === 'play'){ timeLeft = 0; phase = 'end'; phaseT = 2; } } };
