<script>
'use strict';
/* ============================================================
   夜襲邪教據點 — 專業AI升級版（99 Nights 同人可玩版）
   月夜潛行：避開信徒的視線錐、繞到背後偷襲、清空據點、
   搶奪祭壇戰利品、撤回森林邊界。每晚信徒更多、更警覺！
   固定時間步進＋狀態機＋視線潛行 AI＋全套手感回饋
   ============================================================ */
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
let ctx = canvas.getContext('2d');
function resize() {
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = GAME_W * scale * dpr; canvas.height = GAME_H * scale * dpr;
  canvas.style.width = GAME_W * scale + 'px'; canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', resize); resize();

// ---------- 調色盤（森林夜色）----------
const PAL = {
  bg: '#060b08', ground: '#16281a', clearing: '#243d29',
  fire: '#ef8a3d', fireHot: '#ffd27a', amber: '#c9a15a',
  blood: '#8f2f2f', bone: '#d9d3c1', ink: '#e7e2d2', dim: '#9fae9c',
  hudLine: '#2c4432', player: '#2f4d3a', playerTrim: '#c9a15a',
  cult: '#3b2f24', cultTrim: '#8f2f2f', bad: '#e2493f', good: '#8fd07a'
};
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const rnd = (a, b) => a + Math.random() * (b - a);
const easeOutBack = t => 1 + 2.7 * Math.pow(t - 1, 3) + 1.7 * Math.pow(t - 1, 2);
const angDiff = (a, b) => { let d = a - b; while (d > Math.PI) d -= 6.2832; while (d < -Math.PI) d += 6.2832; return d; };
function roundRect(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ---------- 音效 ----------
let AC = null, master = null, muted = false, revSend = null, ambGain = null, ambOn = '';
const ambNodes = [];
function audio() {
  if (!AC) {
    try {
      AC = new (window.AudioContext || window.webkitAudioContext)();
      master = AC.createGain(); master.gain.value = muted ? 0 : 0.85;
      // 限制器：多音效齊發不削峰爆音
      const comp = AC.createDynamicsCompressor();
      comp.threshold.value = -12; comp.knee.value = 24; comp.ratio.value = 8;
      comp.attack.value = 0.003; comp.release.value = 0.2;
      master.connect(comp); comp.connect(AC.destination);
      // v6：程序化殘響（generated impulse，夜間野外微空間感）
      const conv = AC.createConvolver();
      const n = Math.floor(AC.sampleRate * 1.1), buf = AC.createBuffer(2, n, AC.sampleRate);
      for (let ch = 0; ch < 2; ch++) { const d = buf.getChannelData(ch);
        for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 3.2); }
      conv.buffer = buf;
      revSend = AC.createGain(); revSend.gain.value = 0.2;
      revSend.connect(conv); conv.connect(master);
      // v6：氛圍母線（夜風/追擊低鳴，主音效觸發 ducking）
      ambGain = AC.createGain(); ambGain.gain.value = 1; ambGain.connect(master);
      setAmbience('night');
    } catch (err) { AC = null; }
  }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function setAmbience(mode) {
  if (!AC || !ambGain || ambOn === mode) return;
  for (const nd of ambNodes) { try { nd.stop(); } catch (e) {} try { nd.disconnect(); } catch (e) {} }
  ambNodes.length = 0; ambOn = mode;
  const n = AC.sampleRate * 2, buf = AC.createBuffer(1, n, AC.sampleRate), d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
  const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
  const filt = AC.createBiquadFilter(); const g = AC.createGain();
  filt.type = 'bandpass'; filt.frequency.value = 330; filt.Q.value = 0.7; g.gain.value = 0.032;
  const lfo = AC.createOscillator(), lg = AC.createGain();
  lfo.frequency.value = 0.1; lg.gain.value = 150;
  lfo.connect(lg); lg.connect(filt.frequency);
  src.connect(filt); filt.connect(g); g.connect(ambGain);
  src.start(); lfo.start(); ambNodes.push(src, lfo, g);
  if (mode === 'danger') {                 // 追擊中：緊張低鳴
    const o1 = AC.createOscillator(), o2 = AC.createOscillator();
    o1.type = 'sawtooth'; o1.frequency.value = 52; o2.type = 'sawtooth'; o2.frequency.value = 78;
    const bf = AC.createBiquadFilter(); bf.type = 'lowpass'; bf.frequency.value = 180;
    const bg2 = AC.createGain(); bg2.gain.value = 0.04;
    const blfo = AC.createOscillator(), blg = AC.createGain();
    blfo.frequency.value = 0.6; blg.gain.value = 0.016;
    blfo.connect(blg); blg.connect(bg2.gain);
    o1.connect(bf); o2.connect(bf); bf.connect(bg2); bg2.connect(ambGain);
    o1.start(); o2.start(); blfo.start(); ambNodes.push(o1, o2, blfo, bg2);
  }
}
function duckAmb() {
  if (!AC || !ambGain) return;
  const t = AC.currentTime, g = ambGain.gain;
  g.cancelScheduledValues(t); g.setValueAtTime(Math.min(g.value, 1), t);
  g.linearRampToValueAtTime(0.12, t + 0.05); g.linearRampToValueAtTime(1, t + 1.1);
}
function setMuted(m) { muted = m; if (master) master.gain.value = muted ? 0 : 0.85; }
function beep(freq, dur, type, vol, slide) {
  const ac = audio(); if (!ac || muted) return;
  freq *= 1 + (Math.random() * 2 - 1) * 0.04; // ±4% 音高隨機
  type = type || 'square'; vol = vol || 0.13; slide = slide || 0;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, ac.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), ac.currentTime + dur);
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g); g.connect(master); if (revSend) g.connect(revSend);
  o.start(); o.stop(ac.currentTime + dur);
}
function noise(dur, vol) {
  const ac = audio(); if (!ac || muted) return;
  const len = Math.max(1, Math.floor(ac.sampleRate * dur));
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ac.createBufferSource(), g = ac.createGain();
  src.buffer = buf;
  g.gain.setValueAtTime(vol || 0.09, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  src.connect(g); g.connect(master); if (revSend) g.connect(revSend);
  src.start();
}
const sfx = {
  click() { beep(520, 0.06, 'square', 0.08); beep(1040, 0.045, 'triangle', 0.035); }, // v7：疊高八度泛音，按鍵音更清脆
  swing() { noise(0.08, 0.07); beep(300, 0.07, 'triangle', 0.05, -120); },
  hit() { beep(210, 0.09, 'square', 0.13, -70); noise(0.05, 0.09); },
  takedown() { duckAmb(); beep(140, 0.16, 'sawtooth', 0.14, -60); noise(0.12, 0.11); },
  alert() { duckAmb(); beep(660, 0.09, 'square', 0.12, 200); setTimeout(() => beep(880, 0.12, 'square', 0.11), 90); },
  hurt() { duckAmb(); beep(230, 0.24, 'sawtooth', 0.14, -140); },
  eat() { beep(330, 0.07, 'triangle', 0.1); setTimeout(() => beep(440, 0.09, 'triangle', 0.1), 80); },
  loot() { duckAmb(); [784, 988, 1319].forEach((f, i) => setTimeout(() => beep(f, 0.12, 'square', 0.1), i * 80)); },
  night() { duckAmb(); [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.14, 'square', 0.1), i * 90)); },
  lose() { duckAmb(); [392, 330, 262, 196].forEach((f, i) => setTimeout(() => beep(f, 0.2, 'triangle', 0.12), i * 140)); },
  step() { noise(0.03, 0.03); }
};

// ---------- FX ----------
let shake = 0, freeze = 0;
const parts = [];
function burst(x, y, color, n, speed, up) {
  n = n || 10; speed = speed || 180;
  for (let i = 0; i < n; i++) {
    if (parts.length > 280) break;
    const a = Math.random() * Math.PI * 2, s = speed * (0.3 + Math.random() * 0.7);
    parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - (up || 0), life: rnd(0.3, 0.6), color, size: rnd(2.5, 5), grav: 240 });
  }
}
function updateParts(dt) {
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += p.grav * dt; p.life -= dt;
    if (p.life <= 0) { parts[i] = parts[parts.length - 1]; parts.pop(); } // swap-pop
  }
}
function drawParts() {
  for (const p of parts) {
    ctx.globalAlpha = clamp(p.life * 2.2, 0, 1);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}
const floaters = [];
function addFloat(x, y, text, color, big) { floaters.push({ x, y, text, color, life: 1, big: !!big }); }
function updateFloaters(dt) {
  for (let i = floaters.length - 1; i >= 0; i--) {
    const f = floaters[i];
    f.y -= 42 * dt; f.life -= dt;
    if (f.life <= 0) floaters.splice(i, 1);
  }
}
function drawFloaters() {
  for (const f of floaters) {
    ctx.globalAlpha = clamp(f.life * 1.5, 0, 1);
    // v7：出現瞬間彈跳緩動（大字彈更大），質感更彈
    const pop = easeOutBack(clamp((1 - f.life) * (f.big ? 5 : 8), 0, 1));
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.scale(pop, pop);
    ctx.fillStyle = f.color;
    ctx.font = (f.big ? 'bold 24px' : 'bold 17px') + ' sans-serif';
    ctx.textAlign = 'center';
    ctx.strokeStyle = 'rgba(0,0,0,0.8)'; ctx.lineWidth = 3;
    ctx.strokeText(f.text, 0, 0);
    ctx.fillText(f.text, 0, 0);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

// ---------- 場景 ----------
const CAMP = { x: 480, y: 280 };
const FIRE = { x: 480, y: 290 };
const TOTEM = { x: 575, y: 215 };
const TENTS = [{ x: 355, y: 210, r: 0.4 }, { x: 610, y: 350, r: -0.5 }];
const FENCE_R = 185, ESCAPE_R = 265;
let bgTime = 0;
// 地面預先繪製（草地雜斑、土徑）
const groundCv = document.createElement('canvas');
groundCv.width = GAME_W; groundCv.height = GAME_H;
(function paintGround() {
  const g = groundCv.getContext('2d');
  const rad = g.createRadialGradient(CAMP.x, CAMP.y, 40, CAMP.x, CAMP.y, 560);
  rad.addColorStop(0, '#375c3c'); rad.addColorStop(0.4, PAL.clearing);
  rad.addColorStop(0.75, PAL.ground); rad.addColorStop(1, '#0c1912');
  g.fillStyle = rad;
  g.fillRect(0, 0, GAME_W, GAME_H);
  g.fillStyle = 'rgba(120,92,58,0.28)';
  g.beginPath(); g.ellipse(CAMP.x, CAMP.y + 10, 190, 120, 0, 0, 6.29); g.fill();
  let seed = 42;
  function prng() { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return (seed % 1000) / 1000; }
  for (let i = 0; i < 2600; i++) {
    const x = prng() * GAME_W, y = prng() * GAME_H, s = prng();
    g.fillStyle = s > 0.5 ? 'rgba(120,158,100,0.32)' : 'rgba(10,20,10,0.35)';
    g.fillRect(x, y, 2, 2);
  }
  // 小徑
  g.strokeStyle = 'rgba(120,92,58,0.35)'; g.lineWidth = 26; g.lineCap = 'round';
  g.beginPath(); g.moveTo(90, 500); g.quadraticCurveTo(260, 420, CAMP.x - 60, CAMP.y + 60); g.stroke();
})();
// 樹林（環繞 + 外圍散佈）
const trees = [];
for (let i = 0; i < 15; i++) {
  const a = (i / 15) * 6.2832 + 0.2;
  trees.push({ x: CAMP.x + Math.cos(a) * rnd(245, 290), y: CAMP.y + Math.sin(a) * rnd(200, 240), s: rnd(0.8, 1.25), ph: rnd(0, 6) });
}
for (let i = 0; i < 10; i++) trees.push({ x: rnd(0, GAME_W), y: Math.random() < 0.5 ? rnd(-10, 40) : rnd(GAME_H - 40, GAME_H + 10), s: rnd(0.9, 1.4), ph: rnd(0, 6) });
// 霧氣（雙層視差）與螢火蟲
const fogs = [];
for (let i = 0; i < 7; i++) fogs.push({ x: rnd(0, GAME_W), y: rnd(0, GAME_H), r: rnd(90, 180), v: rnd(6, 14) * (i % 2 ? 1 : 0.5), a: rnd(0.05, 0.11) });
const flies = [];
for (let i = 0; i < 14; i++) flies.push({ x: rnd(0, GAME_W), y: rnd(0, GAME_H), ph: rnd(0, 9), sp: rnd(0.5, 1.2) });
// v6：營火炊煙
const smokes = [];
let smokeT = 0, crackleT = 1, dangerLvl = 0;

function drawTree(t) {
  const sway = Math.sin(bgTime * 0.7 + t.ph) * 3;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(t.x + 8, t.y + 10, 34 * t.s, 14 * t.s, 0, 0, 6.29); ctx.fill();
  for (const [ox, oy, r, col] of [[0, 0, 30, '#122015'], [-14, -8, 20, '#16281a'], [12 + sway, -10, 18, '#1b301f']]) {
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(t.x + ox * t.s, t.y + oy * t.s, r * t.s, 0, 6.29); ctx.fill();
  }
  // 月光邊緣
  ctx.fillStyle = 'rgba(170,195,150,0.16)';
  ctx.beginPath(); ctx.arc(t.x + (14 + sway) * t.s, t.y - 14 * t.s, 12 * t.s, 0, 6.29); ctx.fill();
}
function drawTent(tn) {
  ctx.save();

  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.ellipse(6, 10, 56, 30, 0, 0, 6.29); ctx.fill();

  ctx.fillStyle = '#1c140d';
  ctx.beginPath(); ctx.moveTo(-52, 26); ctx.lineTo(0, -34); ctx.lineTo(52, 26); ctx.closePath(); ctx.fill();

  ctx.beginPath(); ctx.moveTo(-52, 26); ctx.lineTo(0, -34); ctx.lineTo(14, 26); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-52, 26); ctx.lineTo(0, -34); ctx.lineTo(52, 26); ctx.closePath(); ctx.stroke();
  ctx.strokeStyle = PAL.blood; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, -34); ctx.lineTo(0, 26); ctx.stroke();

function drawFence() {
  for (let i = 0; i < 26; i++) {
    const a = (i / 26) * 6.2832;
    if (a > 3.5 && a < 4.4) continue; // 缺口（大門）
    const fx = CAMP.x + Math.cos(a) * FENCE_R, fy = CAMP.y + Math.sin(a) * FENCE_R * 0.82;
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.ellipse(fx + 2, fy + 12, 7, 3, 0, 0, 6.29); ctx.fill();
    const wg = ctx.createLinearGradient(fx - 4, 0, fx + 4, 0);
    wg.addColorStop(0, '#1c130c'); wg.addColorStop(0.5, '#3a2a18'); wg.addColorStop(1, '#160f0a');
    ctx.fillStyle = wg;
    ctx.fillRect(fx - 4, fy - 20, 8, 32);
    ctx.fillStyle = '#3a2a18';
    ctx.beginPath(); ctx.moveTo(fx - 5, fy - 20); ctx.lineTo(fx, fy - 27); ctx.lineTo(fx + 5, fy - 20); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(70,55,30,0.8)'; ctx.lineWidth = 2;

// 預繪光暈/霧/視線錐貼圖：遊玩中不再每幀建 radial gradient（平板 60fps 關鍵）
function makeRadialSprite(size, rgb, a0) {
  const cv = document.createElement('canvas');
  cv.width = size; cv.height = size;
  const c = cv.getContext('2d');
  const g = c.createRadialGradient(size / 2, size / 2, size * 0.04, size / 2, size / 2, size / 2);
  g.addColorStop(0, 'rgba(' + rgb + ',' + a0 + ')'); g.addColorStop(1, 'rgba(' + rgb + ',0)');
  c.fillStyle = g;
  c.fillRect(0, 0, size, size);
  return cv;
}
const fireGlowCv = makeRadialSprite(256, '255,180,90', 1);
const fogCv = makeRadialSprite(128, '160,180,160', 1);
function makeConeSprite(rgb) {
  const cv = document.createElement('canvas');
  cv.width = 256; cv.height = 256;
  const c = cv.getContext('2d');
  const g = c.createRadialGradient(128, 128, 6, 128, 128, 126);
  g.addColorStop(0, 'rgba(' + rgb + ',0.22)'); g.addColorStop(1, 'rgba(' + rgb + ',0)');
  c.fillStyle = g;
  c.beginPath();
  c.moveTo(128, 128);
  c.arc(128, 128, 126, -0.62, 0.62);
  c.closePath(); c.fill();
  return cv;
}
const coneCalm = makeConeSprite('201,161,90');
const coneAlert = makeConeSprite('226,73,63');
// v6：螢火蟲光暈 / 炊煙 精靈
const flyGlowCv = makeRadialSprite(32, '200,255,140', 0.9);
const smokeCv = makeRadialSprite(64, '125,135,125', 0.5);
function drawFire() {
  const t = bgTime;
  const flick = Math.sin(t * 14) * 3 + Math.sin(t * 7) * 2;
  // 地面光暈（閃爍，貼圖縮放；v6 改 additive 疊加，火光更熱）
  const ga = 0.3 + Math.sin(t * 9) * 0.05;
  const gr = 170 + flick * 4;
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = ga;
  ctx.drawImage(fireGlowCv, FIRE.x - gr, FIRE.y - gr, gr * 2, gr * 2);
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;
  // 焦黑柴薪
  ctx.fillStyle = '#1a0f08';
  ctx.beginPath();
  ctx.ellipse(FIRE.x - 12, FIRE.y + 8, 20, 5, 0.3, 0, 6.29);
  ctx.ellipse(FIRE.x + 12, FIRE.y + 9, 20, 5, -0.3, 0, 6.29);
  ctx.fill();
  ctx.fillStyle = '#c9502f';
  ctx.beginPath(); ctx.ellipse(FIRE.x, FIRE.y + 9, 20, 4, 0, 0, 6.29); ctx.fill();
  // 三層火焰
  const fl = (c, wF, hF, dy) => {

function toLogical(e) {
  const r = canvas.getBoundingClientRect();

  return { x: (e.clientX - r.left) / s, y: (e.clientY - r.top) / s };
}
canvas.addEventListener('pointerdown', e => {
  e.preventDefault(); audio();
  const p = toLogical(e);
  for (const b of uiButtons) {
    if (p.x >= b.x && p.x <= b.x + b.w && p.y >= b.y && p.y <= b.y + b.h) { b.cb(); return; }
  }
  if (state === playState) {
    if (Math.hypot(p.x - ATK_BTN.x, p.y - ATK_BTN.y) < ATK_BTN.r + 14) { tryAttack(); return; }
    if (!joy) { joy = { id: e.pointerId, ox: p.x, oy: p.y, dx: 0, dy: 0 }; return; }
  }
  pointers.set(e.pointerId, p);
  if (state.onDown) state.onDown(p);
}, { passive: false });
addEventListener('pointermove', e => {
  const p = toLogical(e);
  if (joy && e.pointerId === joy.id) {

function tryAttack() {
  if (state !== playState || player.hp <= 0) return;
  if (player.atkCd > 0) return;
  if (player.stam < ATK_COST) {
    addFloat(player.x, player.y - 34, '體力不足！', PAL.bad, false);
    return;
  }
  const w = curWeapon();
  player.atkCd = w.cd;
  player.atkT = 0.28;
  player.stam -= ATK_COST;
  sfx.swing();
  // 瞄準輔助：錐內沒目標時，自動轉向最近的敵人（觸控友善）
  const REACH = ATK_RANGE + w.rangeAdd + 12;
  let inConeAny = false, nearest = null, nd = 1e9;
  for (const c of cultists) {
    if (c.dead) continue;
    const d = Math.hypot(c.x - player.x, c.y - player.y);
    if (d < REACH && Math.abs(angDiff(Math.atan2(c.y - player.y, c.x - player.x), player.face)) < 1.3) inConeAny = true;
    if (d < nd) { nd = d; nearest = c; }
  }
  if (!inConeAny && nearest && nd < REACH) player.face = Math.atan2(nearest.y - player.y, nearest.x - player.x);
  let hitAny = false;
  for (const c of cultists) {
    if (c.dead) continue;
    const d = Math.hypot(c.x - player.x, c.y - player.y);
    const dirTo = Math.atan2(c.y - player.y, c.x - player.x);
    if (d < REACH && Math.abs(angDiff(dirTo, player.face)) < 1.3) {
      hitAny = true;
      // 背後偷襲：信徒沒發現你 → 一擊放倒
      const backstab = c.alert <= 0 && Math.abs(angDiff(c.face, dirTo)) < 1.5;
      c.hp -= (backstab ? w.bdmg : w.dmg) + lvDmgBonus();
      c.flash = 0.5;
      burst(c.x, c.y - 8, '#d8cfb8', 8, 160, 60);
      if (backstab && c.hp <= 0) {
        takedowns++;
        addFloat(c.x, c.y - 36, '偷襲成功！', PAL.amber, true);
        addGold(3); addXp(8);
        // 無聲連殺：整晚沒被發現的連續偷襲，加分越滾越多
        if (!spotted) {
          chain++;
          bonus += chain * 10;
          addFloat(c.x, c.y - 58, '無聲連殺 x' + chain + '（+' + chain * 10 + '）', PAL.fireHot, false);
        }
        sfx.takedown();
        freeze = 0.08; shake = Math.max(shake, 6);
      } else {
        addFloat(c.x, c.y - 32, '-1', '#ffdf9a', false);
        sfx.hit();
        freeze = 0.04; shake = Math.max(shake, 3.5);
        if (c.alert <= 0) { c.alert = 2.2; sfx.alert(); }
        c.chaseT = 3;
        spotted = true; chain = 0;
      }
      if (c.hp <= 0) {
        c.dead = true; kills++;
        burst(c.x, c.y, '#7a6a52', 14, 190, 60);
        addXp(10);
        if (c.leader) {
          bonus += 75;
          addGold(25); addXp(30);
          if (player.hp < maxHP()) {
            player.hp++;
            addFloat(player.x, player.y - 54, '擊殺頭目！回復 1 HP（+75）', PAL.good, true);
          } else {
            addFloat(c.x, c.y - 54, '擊殺頭目！+75', PAL.amber, true);
          }
          sfx.night();
        }
        // 全部清空 → 搶祭壇
        if (cultists.every(cc => cc.dead)) {
          phase = 'loot';
          addFloat(TOTEM.x, TOTEM.y - 60, '據點清空！去祭壇搶戰利品！', PAL.amber, true);
          sfx.night();
        }
      }
    }
  }
  // 搶奪祭壇
  if (phase === 'loot' && Math.hypot(TOTEM.x - player.x, TOTEM.y - player.y) < ATK_RANGE + w.rangeAdd + 14) {
    phase = 'retreat';
    player.loot = true;
    burst(TOTEM.x, TOTEM.y - 20, PAL.fireHot, 22, 220, 120);
    addFloat(TOTEM.x, TOTEM.y - 60, '搶到戰利品！快撤離！', PAL.fireHot, true);
    sfx.loot();
    shake = Math.max(shake, 5);
  }
  if (!hitAny) burst(player.x + Math.cos(player.face) * 30, player.y + Math.sin(player.face) * 30, 'rgba(200,200,180,0.5)', 3, 90);
}
function hurtPlayer(fromX, fromY) {
  if (player.hurtT > 0 || player.hp <= 0) return;
  player.hp--;
  player.hurtT = 1.4;
  sfx.hurt();
  freeze = 0.07; shake = Math.max(shake, 8);
  burst(player.x, player.y - 8, PAL.bad, 14, 220, 60);
  addFloat(player.x, player.y - 36, '被抓到了！-1', PAL.bad, true);
  const kb = Math.atan2(player.y - fromY, player.x - fromX);
  player.x += Math.cos(kb) * 42;
  player.y += Math.sin(kb) * 42;
  if (player.hp <= 0) {
    finalScore = calcScore();
    if (mode === 'endless') {   // v4：無盡模式分數獨立記錄
      newBest = finalScore > endlessBest;
      if (newBest) { endlessBest = finalScore; try { localStorage.setItem('夜襲邪教據點.endless_best', String(endlessBest)); } catch (err) {} }
    } else {
      newBest = finalScore > best;
      if (newBest) { best = finalScore; try { localStorage.setItem('夜襲邪教據點.best', String(best)); } catch (err) {} }
    }
    sfx.lose();
    setTimeout(() => setState(overState), 900);
  }
}

// ===== 夜襲進行 =====
const playState = {
  enter() { this.banner = 4; this.nightFade = 0; this.elapsed = 0; },
  onKey(code) { if (code === 'KeyE' || code === 'Space' || code === 'KeyJ') tryAttack(); },
  update(dt) {
    fogUpdate(dt);
    this.elapsed += dt;
    if (this.banner > 0) this.banner -= dt;
    if (this.nightFade > 0) {
      this.nightFade -= dt;
      if (this.nightFade <= 0) {
        if (won) { setState(overState); return; }
        spawnNight(); this.banner = 2;
      }
      return;
    }
    if (player.hp <= 0) return;
    // 資源
    player.hunger = Math.max(0, player.hunger - dt * 1.1);
    const regen = player.hunger > 15 ? 16 : 6;
    if (player.atkT <= 0) player.stam = Math.min(100, player.stam + dt * regen);
    player.atkT = Math.max(0, player.atkT - dt);
    player.atkCd = Math.max(0, player.atkCd - dt);
    player.hurtT = Math.max(0, player.hurtT - dt);
    // 移動（鍵盤 + 虛擬搖桿）
    let mx = 0, my = 0;
    if (keys.KeyW || keys.ArrowUp) my -= 1;
    if (keys.KeyS || keys.ArrowDown) my += 1;
    if (keys.KeyA || keys.ArrowLeft) mx -= 1;
    if (keys.KeyD || keys.ArrowRight) mx += 1;
    if (joy && Math.hypot(joy.dx, joy.dy) > 10) { mx = joy.dx; my = joy.dy; }
    const ml = Math.hypot(mx, my);
    player.walk = ml > 0.01 && player.atkT <= 0;
    if (player.walk) {
      const sp = 165 * (player.hunger <= 0 ? 0.7 : 1);
      player.x = clamp(player.x + mx / ml * sp * dt, 16, GAME_W - 16);
      player.y = clamp(player.y + my / ml * sp * dt, 16, GAME_H - 16);
      player.face = Math.atan2(my, mx);
      player.walkT += dt;
      player.stepT -= dt;
      if (player.stepT <= 0) {
        player.stepT = 0.28;
        sfx.step();
        parts.push({ x: player.x + rnd(-4, 4), y: player.y + 8, vx: rnd(-12, 12), vy: rnd(-8, 0), life: 0.35, color: 'rgba(110,100,80,0.6)', size: 3, grav: 0 });
      }
    }
    // 吃烤肉回飢餓
    if (meat.alive && Math.hypot(meat.x - player.x, meat.y - player.y) < 24) {
      meat.alive = false;
      player.hunger = Math.min(100, player.hunger + 45);
      addFloat(meat.x, meat.y - 20, '吃了烤肉，飢餓 +45', PAL.good, false);
      sfx.eat();
      burst(meat.x, meat.y, PAL.good, 6, 110, 50);
    }
    // 撿祭品金幣（風險回報）
    for (let i = treasures.length - 1; i >= 0; i--) {
      const tr = treasures[i];
      if (Math.hypot(tr.x - player.x, tr.y - player.y) < 26) {
        treasures.splice(i, 1);
        bonus += 25;
        addGold(8); addXp(6);
        player.stam = Math.min(100, player.stam + 15);
        addFloat(tr.x, tr.y - 20, '祭品 +25 分 +8 金幣', PAL.amber, false);
        sfx.loot();
        burst(tr.x, tr.y, PAL.amber, 10, 150, 60);
      }
    }
    // 信徒 AI
    for (const c of cultists) {
      if (c.dead) { c.fade = Math.max(0.35, c.fade - dt * 0.6); continue; }
      c.flash = Math.max(0, c.flash - dt);
      c.hitCd = Math.max(0, c.hitCd - dt);
      const dToP = Math.hypot(player.x - c.x, player.y - c.y);
      const dirToP = Math.atan2(player.y - c.y, player.x - c.x);
      // 視線偵測：站著不動更難被看見（潛行教學）
      const seeRange = c.range * (player.walk ? 1 : 0.55);
      const inCone = dToP < seeRange && Math.abs(angDiff(dirToP, c.face)) < 0.62;
      if (inCone && c.chaseT <= 0 && player.hp > 0) {
        c.chaseT = 3.2;
        if (c.alert <= 0) { sfx.alert(); addFloat(c.x, c.y - 40, '發現你了！', PAL.bad, false); }
        c.alert = 2.5;
        spotted = true; chain = 0;
      }
      c.alert = Math.max(0, c.alert - dt);
      if (c.chaseT > 0 && player.hp > 0) {
        // 追擊
        c.chaseT -= dt;
        c.face += angDiff(dirToP, c.face) * 6 * dt;
        if (dToP > 20) {
          c.x += Math.cos(c.face) * c.speed * 1.35 * dt;
          c.y += Math.sin(c.face) * c.speed * 1.35 * dt;
        }
        if (dToP < 24 && c.hitCd <= 0) { c.hitCd = 1.2; hurtPlayer(c.x, c.y); }
      } else if (c.st === 'patrol') {
        // 繞著營地巡邏
        c.wpA += dt * 0.35;
        const tx = CAMP.x + Math.cos(c.wpA) * 120, ty = CAMP.y + Math.sin(c.wpA) * 96;
        const dd = Math.atan2(ty - c.y, tx - c.x);
        c.face += angDiff(dd, c.face) * 4 * dt;
        c.x += Math.cos(c.face) * c.speed * dt;
        c.y += Math.sin(c.face) * c.speed * dt;
      } else {
        // 站哨：緩慢左右張望
        c.wpT += dt;
        c.face += Math.sin(c.wpT * 0.8) * 0.55 * dt * 2;
        const back = Math.hypot(c.baseX - c.x, c.baseY - c.y);
        if (back > 8) {
          const dd = Math.atan2(c.baseY - c.y, c.baseX - c.x);
          c.x += Math.cos(dd) * c.speed * 0.6 * dt;
          c.y += Math.sin(dd) * c.speed * 0.6 * dt;
        }
      }
    }
    // v6：警戒等級（紅色暗角脈動＋緊張低鳴氛圍切換）
    const anyChase = player.hp > 0 && cultists.some(c => !c.dead && c.chaseT > 0);
    dangerLvl += ((anyChase ? 1 : 0) - dangerLvl) * 3 * dt;
    setAmbience(anyChase ? 'danger' : 'night');
    // 撤離判定
    if (phase === 'retreat' && Math.hypot(player.x - CAMP.x, (player.y - CAMP.y) * 1.15) > ESCAPE_R) {
      nights++; day++;
      sfx.night();
      addFloat(player.x, player.y - 50, '夜襲成功！第 ' + day + ' 天', PAL.fireHot, true);
      addGold(20); addXp(35);
      if (!spotted) {
        bonus += 150;
        addGold(15);
        addFloat(player.x, player.y - 76, '完美夜襲！全程未被發現 +150', PAL.amber, true);
      }
      if (player.hp < maxHP()) {
        player.hp++;
        addFloat(player.x, player.y - 100, '夜晚休整 +1 HP', PAL.good, false);
      }
      burst(player.x, player.y - 20, PAL.fireHot, 20, 200, 120);
      player.stam = Math.min(100, player.stam + 25);
      // 三晚達成 → 勝利結算（僅劇情模式；無盡模式永不結束，撐到被抓為止）
      if (mode === 'story' && nights >= NIGHTS_GOAL) {
        won = true;
        finalScore = calcScore() + 300 + player.hp * 100;
        grade = finalScore >= 1500 ? 'S' : finalScore >= 1200 ? 'A' : finalScore >= 900 ? 'B' : 'C';
        newBest = finalScore > best;
        if (newBest) {
          best = finalScore;
          try { localStorage.setItem('夜襲邪教據點.best', String(best)); } catch (err) {}
        }
        if (!cleared) { cleared = true; try { localStorage.setItem('夜襲邪教據點.cleared', '1'); } catch (err) {} }   // v4：解鎖無盡夜襲
      }
      this.nightFade = 1.2;
    }
  },
  draw() {
    uiButtons.length = 0;
    ctx.save();
    ctx.translate((Math.random() * 2 - 1) * shake, (Math.random() * 2 - 1) * shake);
    drawScene(phase === 'loot');
    // 視線錐（黃=巡邏、紅=追擊；貼圖旋轉縮放，零每幀漸層）
    for (const c of cultists) {
      if (c.dead) continue;
      const rr = c.range * (player.walk ? 1 : 0.55);
      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.rotate(c.face);
      const sc = rr / 126;
      ctx.scale(sc, sc);
      ctx.drawImage(c.chaseT > 0 ? coneAlert : coneCalm, -128, -128);
      ctx.restore();
    }
    // 撤離提示圈
    if (phase === 'retreat') {
      ctx.strokeStyle = 'rgba(255,210,122,' + (0.3 + Math.sin(bgTime * 4) * 0.15) + ')';
      ctx.lineWidth = 3; ctx.setLineDash([12, 10]);
      ctx.beginPath(); ctx.ellipse(CAMP.x, CAMP.y, ESCAPE_R, ESCAPE_R / 1.15, 0, 0, 6.29); ctx.stroke();
      ctx.setLineDash([]);
    }
    // 角色（依 y 排序偽深度）
    const order = [...cultists.map(c => ({ y: c.y, f: () => drawFigure(c.x, c.y, c.face, { color: c.leader ? '#4a2418' : PAL.cult, trim: c.leader ? '#d8a03a' : PAL.cultTrim, eyes: true, scale: c.leader ? 1.35 : 1, walk: c.chaseT > 0 || c.st === 'patrol', walkT: bgTime + c.ph, alert: c.alert, flash: c.flash, dead: c.dead, fade: c.fade, ph: c.ph }) })),
      { y: player.y, f: () => drawFigure(player.x, player.y, player.face, { color: PAL.player, trim: PAL.playerTrim, walk: player.walk, walkT: player.walkT, swing: player.atkT > 0 ? 1 - player.atkT / 0.28 : 0, flash: player.hurtT, loot: player.loot, skin: '#c8a080' }) },
      { y: FIRE.y, f: drawFire }];
    order.sort((a, b) => a.y - b.y);
    for (const o of order) o.f();
    // 新手指引箭頭：第一晚還沒擊倒人之前，指向最近的信徒
    if (nights === 0 && kills === 0 && phase === 'raid' && this.elapsed < 18 && player.hp > 0) {
      let n = null, nd2 = 1e9;
      for (const c of cultists) {
        if (c.dead) continue;
        const d = Math.hypot(c.x - player.x, c.y - player.y);
        if (d < nd2) { nd2 = d; n = c; }
      }
      if (n && nd2 > 70) {
        const a = Math.atan2(n.y - player.y, n.x - player.x);
        const rr = 46 + Math.sin(bgTime * 5) * 6;
        ctx.save();
        ctx.translate(player.x + Math.cos(a) * rr, player.y - 12 + Math.sin(a) * rr);
        ctx.rotate(a);
        ctx.fillStyle = PAL.amber;
        ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(12, 0); ctx.lineTo(-7, -8); ctx.lineTo(-7, 8); ctx.closePath();
        ctx.fill(); ctx.stroke();
        ctx.restore();
      }
    }
    drawParts();
    drawFloaters();
    drawAtmosphere();
    ctx.restore();
    if (dangerLvl > 0.03) {           // v6：被追擊時紅色警戒暗角脈動
      ctx.globalAlpha = clamp(dangerLvl, 0, 1) * (0.6 + Math.sin(bgTime * 6) * 0.25);
      ctx.drawImage(dangerCv, 0, 0);
      ctx.globalAlpha = 1;
    }
    drawHUD(this);
    // 開場/過夜橫幅
    if (this.banner > 0) {
      ctx.globalAlpha = clamp(this.banner, 0, 1);
      ctx.fillStyle = 'rgba(6,11,8,0.75)';
      roundRect(GAME_W / 2 - 270, 82, 540, 70, 6);
      ctx.fill();
      ctx.fillStyle = PAL.bone;
      ctx.font = 'bold 20px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('DAY ' + day + '：站著不動比較不會被看見，繞到背後偷襲！', GAME_W / 2, 110);
      ctx.fillStyle = PAL.amber;
      ctx.font = 'bold 15px sans-serif';
      ctx.fillText(TOUCH ? '按住畫面拖曳＝移動 · 右下紅鈕＝攻擊' : 'WASD／方向鍵＝移動 · E 或空白鍵＝攻擊', GAME_W / 2, 138);
      ctx.globalAlpha = 1;
    }
    if (this.nightFade > 0) {
      ctx.fillStyle = 'rgba(255,235,200,' + clamp(Math.sin((1.2 - this.nightFade) / 1.2 * Math.PI) * 0.7, 0, 1) + ')';
      ctx.fillRect(0, 0, GAME_W, GAME_H);
    }
  }
};

// ---------- HUD ----------
const barGrads = new Map();
// v7：玻璃質感面板（垂直微漸層＋頂端內光），HUD 統一質感
const panelGrads = new Map();
function panel(x, y, w, h, r) {
  const key = y + 'x' + h;
  let g = panelGrads.get(key);
  if (!g) {
    g = ctx.createLinearGradient(0, y, 0, y + h);
    g.addColorStop(0, 'rgba(20,34,24,0.9)'); g.addColorStop(1, 'rgba(7,13,9,0.87)');
    panelGrads.set(key, g);
  }
  ctx.fillStyle = g;
  roundRect(x, y, w, h, r); ctx.fill();
  ctx.strokeStyle = PAL.hudLine; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x + r, y + 1.5); ctx.lineTo(x + w - r, y + 1.5); ctx.stroke();
}
function drawHUD(st) {
  // DAY 徽章
  panel(14, 12, 92, 52, 6);

  panel(GAME_W / 2 - 250, GAME_H - 40, 500, 30, 6);

  // 觸控 UI
  if (TOUCH) {
    if (joy) {
      ctx.globalAlpha = 0.35;
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(joy.ox, joy.oy, 44, 0, 6.29); ctx.stroke();
      ctx.fillStyle = PAL.amber;
      ctx.beginPath(); ctx.arc(joy.ox + joy.dx * 0.6, joy.oy + joy.dy * 0.6, 20, 0, 6.29); ctx.fill();

    const ag = ctx.createRadialGradient(ATK_BTN.x - 10, ATK_BTN.y - 12, 4, ATK_BTN.x, ATK_BTN.y, ATK_BTN.r);

    ctx.fillText('攻擊', ATK_BTN.x, ATK_BTN.y + 7);
    // v7：冷卻進度環（純視覺回饋，顯示現有 atkCd 剩餘比例）
    if (player.atkCd > 0) {

    }
    ctx.globalAlpha = 1;
  }
  muteButton();
}

      uiButtons.push({ x: GAME_W / 2 - 110, y: 348, w: 220, h: 52, cb: () => startGame(mode) });

      bg2.addColorStop(0, endless ? '#3a5a8f' : '#b5432f'); bg2.addColorStop(1, endless ? '#1f2d55' : '#6d1f1a');
      ctx.fillStyle = bg2;
      roundRect(GAME_W / 2 - 110, 348, 220, 52, 12);
      ctx.fill();
      ctx.strokeStyle = '#2a0f0c'; ctx.lineWidth = 3; ctx.stroke();
      ctx.fillStyle = '#f4ece0';
      ctx.font = 'bold 24px sans-serif';
      ctx.fillText(endless ? '再襲一次' : '再玩一次', GAME_W / 2, 382);
      uiButtons.push({ x: GAME_W / 2 - 90, y: 406, w: 180, h: 34, cb: () => setState(shopState) });
      ctx.fillStyle = 'rgba(10,18,12,0.85)';
      roundRect(GAME_W / 2 - 90, 406, 180, 34, 8);
      ctx.fill();
      ctx.strokeStyle = PAL.hudLine; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.fillStyle = PAL.amber;
      ctx.font = 'bold 14px sans-serif';
      ctx.fillText('⚔ 武器商店 · 金 ' + gold, GAME_W / 2, 428);
    }
    ctx.restore();
    muteButton();
  }
};

// ===== 武器商店 =====
const shopState = {
  enter() { this.t = 0; this.from = state; },
  update(dt) { this.t += dt; fogUpdate(dt); },
  onKey(code) { if (code === 'Escape' || code === 'KeyB') setState(titleState); },
  draw() {
    uiButtons.length = 0;
    drawScene(false);
    drawFire();
    drawAtmosphere();
    ctx.fillStyle = 'rgba(3,6,4,0.72)';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    ctx.textAlign = 'center';
    ctx.fillStyle = PAL.fireHot;
    ctx.font = 'bold 30px serif';
    ctx.fillText('武器商店', GAME_W / 2, 58);
    ctx.fillStyle = PAL.amber;
    ctx.font = 'bold 16px monospace';
    ctx.fillText('金幣 ' + gold + ' · Lv.' + level, GAME_W / 2, 84);
    const cardW = 210, cardH = 300, gap = 18;
    const startX = GAME_W / 2 - (cardW * WEAPONS.length + gap * (WEAPONS.length - 1)) / 2;
    WEAPONS.forEach((w, i) => {
      const cx = startX + i * (cardW + gap), cy = 106;
      const owned = ownedWeapons[i], equipped = weaponIdx === i;
      ctx.fillStyle = equipped ? 'rgba(40,60,32,0.95)' : 'rgba(12,20,14,0.92)';
      roundRect(cx, cy, cardW, cardH, 10);
      ctx.fill();
      ctx.strokeStyle = equipped ? PAL.fireHot : PAL.hudLine; ctx.lineWidth = equipped ? 3 : 1.5; ctx.stroke();
      // 武器圖示
      ctx.save();
      ctx.translate(cx + cardW / 2, cy + 62);
      ctx.rotate(-0.5);
      ctx.strokeStyle = '#c8a080'; ctx.lineWidth = 5; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(-18, 14); ctx.lineTo(6, -6); ctx.stroke();
      ctx.strokeStyle = w.color; ctx.lineWidth = 8;
      ctx.beginPath(); ctx.moveTo(6, -6); ctx.lineTo(34, -30); ctx.stroke();
      ctx.restore();
      ctx.fillStyle = PAL.bone;
      ctx.font = 'bold 19px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(w.name, cx + cardW / 2, cy + 128);
      ctx.fillStyle = PAL.dim;
      ctx.font = '12px sans-serif';
      ctx.fillText(w.desc, cx + cardW / 2, cy + 150);
      ctx.fillStyle = PAL.ink;
      ctx.font = '12px monospace';
      ctx.fillText('觸及 ' + (ATK_RANGE + w.rangeAdd) + ' · 傷害 ' + w.dmg + '/' + w.bdmg + ' · 攻速 ' + w.cd.toFixed(2) + 's', cx + cardW / 2, cy + 176);
      const by = cy + cardH - 54, bh = 40, bx2 = cx + 16, bw2 = cardW - 32;
      if (equipped) {
        ctx.fillStyle = 'rgba(255,210,122,0.25)';
        roundRect(bx2, by, bw2, bh, 8); ctx.fill();
        ctx.strokeStyle = PAL.fireHot; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = PAL.fireHot; ctx.font = 'bold 16px sans-serif';
        ctx.fillText('裝備中', cx + cardW / 2, by + 26);
      } else if (owned) {
        uiButtons.push({ x: bx2, y: by, w: bw2, h: bh, cb: () => { weaponIdx = i; saveWeapon(); sfx.click(); } });
        const g = ctx.createLinearGradient(0, by, 0, by + bh);
        g.addColorStop(0, '#3a5a8f'); g.addColorStop(1, '#1f2d55');
        ctx.fillStyle = g;
        roundRect(bx2, by, bw2, bh, 8); ctx.fill();
        ctx.strokeStyle = '#111'; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = '#f4ece0'; ctx.font = 'bold 16px sans-serif';
        ctx.fillText('裝備', cx + cardW / 2, by + 26);
      } else {
        const canBuy = gold >= w.cost;
        uiButtons.push({ x: bx2, y: by, w: bw2, h: bh, cb: () => {
          if (gold < w.cost) { addFloat(GAME_W / 2, cy + 200, '金幣不足！', PAL.bad, false); sfx.hurt(); return; }
          gold -= w.cost; saveGold();
          ownedWeapons[i] = true; saveOwned();
          weaponIdx = i; saveWeapon();
          sfx.loot();
          addFloat(cx + cardW / 2, cy - 10, '購入 ' + w.name + '！', PAL.amber, true);
        } });
        const g = ctx.createLinearGradient(0, by, 0, by + bh);
        if (canBuy) { g.addColorStop(0, '#b5432f'); g.addColorStop(1, '#6d1f1a'); } else { g.addColorStop(0, '#3a3a34'); g.addColorStop(1, '#1c1c18'); }
        ctx.fillStyle = g;
        roundRect(bx2, by, bw2, bh, 8); ctx.fill();
        ctx.strokeStyle = '#111'; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = canBuy ? '#f4ece0' : PAL.dim; ctx.font = 'bold 16px sans-serif';
        ctx.fillText('購買 · 金 ' + w.cost, cx + cardW / 2, by + 26);
      }
    });
    uiButtons.push({ x: GAME_W / 2 - 90, y: 424, w: 180, h: 44, cb: () => setState(titleState) });
    ctx.fillStyle = 'rgba(10,18,12,0.85)';
    roundRect(GAME_W / 2 - 90, 424, 180, 44, 10);
    ctx.fill();
    ctx.strokeStyle = PAL.hudLine; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = PAL.ink; ctx.font = 'bold 16px sans-serif';
    ctx.fillText('返回（B）', GAME_W / 2, 452);
    muteButton();
  }
};

// ---------- 主迴圈 ----------
const STEP = 1 / 60;
let last = performance.now(), acc = 0;
function frame(now) {
  requestAnimationFrame(frame);
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while (acc >= STEP) {
    acc -= STEP;
    if (freeze > 0) { freeze -= STEP; continue; }
    shake *= Math.pow(0.001, STEP);
    if (shake < 0.1) shake = 0;
    state.update(STEP);
    updateParts(STEP);
    updateFloaters(STEP);
  }
  state.draw();
}
// 測試掛鉤（自動化冒煙測試用，不影響遊戲）
window.__smoke = () => ({ scene: state === playState ? 'play' : state === overState ? 'over' : 'title', x: player.x, y: player.y, stam: player.stam, atkT: player.atkT, ambN: ambNodes.length, ambOn, danger: dangerLvl });
setState(titleState);
requestAnimationFrame(frame);
</script>
<script>/* AI-CAMP-STATS-BEACON */
(function(){
  try{ if(window.top!==window.self) return; }catch(e){ return; } /* 在作品館內由作品館計數與投票 */
  var NS="ai-future-camp", K="pro-t-354c4dec";
  var ABS="//abacus.jasoncameron.dev/"; /* 直連備援 */
  var REL="/abacus/"; /* 同源代理（Vercel 轉發）：學校閘道擋外部網域時仍然通 */
  function ping(n){
    try{
      fetch(REL+"hit/"+NS+"/"+n).then(function(r){
        if(!r||!r.ok){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); }
      }).catch(function(){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); });
    }catch(e){}
  }
  function read(n,cb){
    function via(base,next){ try{ fetch(base+"get/"+NS+"/"+n).then(function(r){ if(r.status===404&&base===ABS) return {value:0}; if(!r.ok) throw 0; return r.json(); }).then(function(j){ cb(j.value||j.count||0); }).catch(next); }catch(e){ next(); } }
    via(REL, function(){ via(ABS, function(){ cb(null); }); });
  }
  ping(K+"-v");
  var done=false;
  function once(){ if(done)return; done=true; ping(K+"-p"); ping("site-total-plays");
    window.removeEventListener("pointerdown",once); window.removeEventListener("keydown",once); }
  window.addEventListener("pointerdown",once,{once:false}); window.addEventListener("keydown",once,{once:false});
  /* 投票鈕：非常好玩/好玩——與作品館同一計數器，任何網頁打開都同步 */
  function initVotes(){
    if(!document.body) return;
    var wrap=document.createElement("div");
    wrap.style.cssText="position:fixed;right:10px;bottom:10px;z-index:99999;display:flex;gap:6px;font-family:sans-serif;opacity:.92";
    var LS="voted-"+K;
    var defs=[["-love","\u2764\uFE0F","\u975e\u5e38\u597d\u73a9","#ff6cc7"],["-like","\ud83d\udc4d","\u597d\u73a9","#38e1ff"]];
    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;
          b.querySelector("i").textContent=Math.max(0,(n||0)-(c||0));
        }); });
      });
    }
    defs.forEach(function(d){
      var b=document.createElement("button");
      b.type="button"; b.title=d[2];
      b.style.cssText="min-height:42px;padding:8px 14px;border:none;border-radius:999px;background:rgba(15,18,32,.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation";
      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";
      b.addEventListener("click",function(){
        var prev=null; try{ prev=localStorage.getItem(LS); }catch(e){}
        if(prev===d[0]){ ping(K+d[0]+"-c"); try{ localStorage.removeItem(LS); }catch(e){} }
        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);
      });
      btns[d[0]]=b; wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    refresh();
    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* 每10秒同步別人投的票 */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
</script>
