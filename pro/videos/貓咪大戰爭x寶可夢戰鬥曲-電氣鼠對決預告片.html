<html lang="zh-Hant">

<style>

<body>
<canvas id="stage"></canvas>
<div id="ui">
  <div class="top">
    <div class="title-chip">
      <div class="title">貓咪大戰爭 x 寶可夢戰鬥曲</div>
      <div class="brand">AI未來創作營隊</div>

<script>
(function(){
"use strict";

// ---------- 畫布縮放 ----------
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W*DPR; canvas.height = H*DPR;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize);
resize();

// ---------- 音效：Web Audio 原創8bit戰鬥曲（風格致敬，非任何既有樂曲抄寫） ----------
let actx=null, masterGain=null, musicGain=null, VERB=null, NOISE_BUF=null, muted=true;
function ensureAudio(){
  if(actx) return;
  actx = new (window.AudioContext||window.webkitAudioContext)();
  // v6 母線：DynamicsCompressor＋程序化殘響＋配樂子匯流排（可 ducking）
  const comp = actx.createDynamicsCompressor();
  comp.threshold.value=-16; comp.knee.value=18; comp.ratio.value=7;
  comp.attack.value=0.004; comp.release.value=0.2;
  comp.connect(actx.destination);
  masterGain = actx.createGain();
  masterGain.gain.value = 0.0;
  masterGain.connect(comp);
  musicGain = actx.createGain(); musicGain.gain.value=1; musicGain.connect(masterGain);
  VERB = actx.createConvolver();
  (function(){
    const rate=actx.sampleRate, len=(rate*1.9)|0, buf=actx.createBuffer(2,len,rate);
    for(let ch=0;ch<2;ch++){ const d=buf.getChannelData(ch);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.7)*0.55; }
    VERB.buffer=buf;
  })();
  const vg = actx.createGain(); vg.gain.value=0.8; VERB.connect(vg); vg.connect(masterGain);
  NOISE_BUF = (function(){
    const rate=actx.sampleRate, len=(rate*1.5)|0, buf=actx.createBuffer(1,len,rate);
    const d=buf.getChannelData(0); for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
    return buf;
  })();
}
function duckMusic(level, hold){
  if(!musicGain) return;
  const g=musicGain.gain, t=actx.currentTime;
  g.cancelScheduledValues(t); g.setValueAtTime(g.value,t);
  g.linearRampToValueAtTime(level, t+0.05);
  g.linearRampToValueAtTime(1, t+(hold||0.8));
}
// v6 braam 衝擊音（碰撞/片尾定格）
function braam(vol){
  if(!actx) return;
  const t0 = actx.currentTime;
  duckMusic(0.3, 1.4);
  [55, 55.8, 27.5].forEach((f,i)=>{
    const o=actx.createOscillator(), g=actx.createGain(), lp=actx.createBiquadFilter();
    o.type='sawtooth'; o.frequency.value=f;
    lp.type='lowpass'; lp.Q.value=3;
    lp.frequency.setValueAtTime(90,t0);
    lp.frequency.exponentialRampToValueAtTime(540,t0+0.26);
    lp.frequency.exponentialRampToValueAtTime(110,t0+1.45);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(vol*(i===2?0.7:0.5), t0+0.06);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+1.55);
    o.connect(lp); lp.connect(g); g.connect(masterGain); g.connect(VERB);
    o.start(t0); o.stop(t0+1.65);
  });
}
// v6 riser（對決前漸強）
function riser(dur){
  if(!actx) return;
  const t0 = actx.currentTime;
  const src=actx.createBufferSource(); src.buffer=NOISE_BUF; src.loop=true;
  const bp=actx.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=1.3;
  bp.frequency.setValueAtTime(240,t0);
  bp.frequency.exponentialRampToValueAtTime(3200,t0+dur);
  const g=actx.createGain();
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(0.16,t0+dur);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur+0.08);
  src.connect(bp); bp.connect(g); g.connect(masterGain); g.connect(VERB);
  src.start(t0); src.stop(t0+dur+0.15);
  const o=actx.createOscillator(), og=actx.createGain();
  o.type='sawtooth';
  o.frequency.setValueAtTime(85,t0);
  o.frequency.exponentialRampToValueAtTime(330,t0+dur);
  og.gain.setValueAtTime(0.0001,t0);
  og.gain.exponentialRampToValueAtTime(0.05,t0+dur);
  og.gain.exponentialRampToValueAtTime(0.0001,t0+dur+0.08);
  o.connect(og); og.connect(masterGain);
  o.start(t0); o.stop(t0+dur+0.15);
}
// v6 小電光劈啪（蓄力期間隨機觸發）
function zapSmall(delay){
  if(!actx) return;
  const t0 = actx.currentTime + (delay||0);
  const src=actx.createBufferSource(); src.buffer=NOISE_BUF; src.loop=true;
  const hp=actx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=2600;
  const g=actx.createGain();
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(0.09,t0+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+0.09);
  src.connect(hp); hp.connect(g); g.connect(masterGain);
  src.start(t0); src.stop(t0+0.12);
  const o=actx.createOscillator(), og=actx.createGain();
  o.type='square';
  o.frequency.setValueAtTime(1500+Math.random()*600,t0);
  o.frequency.exponentialRampToValueAtTime(420,t0+0.08);
  og.gain.setValueAtTime(0.0001,t0);
  og.gain.exponentialRampToValueAtTime(0.05,t0+0.01);
  og.gain.exponentialRampToValueAtTime(0.0001,t0+0.09);
  o.connect(og); og.connect(masterGain);
  o.start(t0); o.stop(t0+0.12);
}
// v6 片尾定格重音
function stinger(){
  if(!actx) return;
  braam(0.5);
  const t0 = actx.currentTime;
  [523.25,783.99,1046.5].forEach((f,i)=>{
    const o=actx.createOscillator(), g=actx.createGain();
    o.type='triangle'; o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,t0+0.12*i);
    g.gain.exponentialRampToValueAtTime(0.1,t0+0.12*i+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+0.12*i+1.1);
    o.connect(g); g.connect(masterGain); g.connect(VERB);
    o.start(t0+0.12*i); o.stop(t0+0.12*i+1.2);
  });
}
function setMuted(m){
  muted = m;
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
  if(masterGain){
    masterGain.gain.cancelScheduledValues(actx.currentTime);
    masterGain.gain.linearRampToValueAtTime(muted?0.0:0.22, actx.currentTime+0.08);
  }
}

const NOTE = {C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392.00,A4:440.00,B4:493.88,
  C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880.00,B5:987.77,
  C6:1046.5, R:0};
const TEMPO = 0.15;
const melody = [
  ['E5',1],['G5',1],['C5',1],['E5',1],
  ['D5',1],['F5',1],['B4',1],['D5',1],
  ['C5',1],['E5',1],['G5',1],['C6',2],
  ['B5',1],['G5',1],['E5',1],['G5',1],
  ['A5',1],['F5',1],['D5',1],['F5',1],
  ['G5',2],['R',1],['E5',1],
  ['C5',1],['D5',1],['E5',1],['F5',1],
  ['G5',1],['A5',1],['B5',1],['C6',3]
];
const bassline = [
  ['C4',2],['G4',2], ['D4',2],['A4',2],
  ['C4',2],['G4',2], ['E4',2],['C4',2],
  ['F4',2],['C4',2], ['D4',2],['G4',2],
  ['C4',4]
];
function playTone(freq, startAt, dur, type, vol){
  if(freq<=0) return;
  const osc = actx.createOscillator();
  const g = actx.createGain();
  const filt = actx.createBiquadFilter();
  filt.type = 'lowpass'; filt.frequency.value = 2600; filt.Q.value = 0.4;
  osc.type = type; osc.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, startAt);
  g.gain.linearRampToValueAtTime(vol, startAt+0.02);
  g.gain.exponentialRampToValueAtTime(Math.max(vol*0.35,0.0005), startAt+dur*0.55);
  g.gain.exponentialRampToValueAtTime(0.0001, startAt+dur*0.95);
  osc.connect(filt); filt.connect(g); g.connect(musicGain);
  osc.start(startAt); osc.stop(startAt+dur+0.03);
}
function playSeq(seq, type, vol, offset){
  let t = actx.currentTime + 0.05;
  for(const [n,beats] of seq){
    const dur = beats*TEMPO;
    if(NOTE[n]) playTone(NOTE[n]*offset, t, dur, type, vol);
    t += dur;
  }
  return t;
}
let musicStarted=false;
function startMusic(){
  if(musicStarted) return;
  musicStarted = true;
  ensureAudio();
  const totalDur = playSeq(melody, 'sine', 0.22, 1);
  playSeq(bassline, 'sine', 0.20, 0.5);
  setTimeout(()=>{ if(!ended){ playSeq(melody,'sine',0.22,1); playSeq(bassline,'sine',0.20,0.5);} }, (totalDur-actx.currentTime)*1000-50);
}
function sfxPounce(){
  if(!actx) return;
  const t = actx.currentTime;
  playTone(200, t, 0.1, 'square', 0.18);
  playTone(120, t+0.02, 0.14, 'sine', 0.16);
}
function sfxThunder(){
  if(!actx) return;
  const t = actx.currentTime;
  [0,0.06,0.12].forEach((delay,i)=>{
    const dur=0.09;
    const bufSize = Math.floor(actx.sampleRate*dur);
    const buf = actx.createBuffer(1,bufSize,actx.sampleRate);
    const data = buf.getChannelData(0);
    for(let j=0;j<bufSize;j++){ data[j]=(Math.random()*2-1)*(1-j/bufSize); }
    const src = actx.createBufferSource(); src.buffer=buf;
    const filt = actx.createBiquadFilter(); filt.type='highpass'; filt.frequency.value=1200+i*400;
    const g = actx.createGain();
    g.gain.setValueAtTime(0.24-i*0.05, t+delay);
    g.gain.exponentialRampToValueAtTime(0.0005, t+delay+dur);
    src.connect(filt); filt.connect(g); g.connect(masterGain);
    src.start(t+delay); src.stop(t+delay+dur+0.02);
  });
  playTone(880, t, 0.2, 'square', 0.16, 700);
  playTone(660, t+0.05, 0.16, 'square', 0.14);
}
function sfxCrunch(){
  if(!actx) return;
  const t = actx.currentTime;
  [0,0.1,0.2].forEach((delay,i)=>{
    const dur=0.08;
    const bufSize = Math.floor(actx.sampleRate*dur);
    const buf = actx.createBuffer(1,bufSize,actx.sampleRate);
    const data = buf.getChannelData(0);
    for(let j=0;j<bufSize;j++){ data[j]=(Math.random()*2-1)*(1-j/bufSize); }
    const src = actx.createBufferSource(); src.buffer=buf;
    const filt = actx.createBiquadFilter(); filt.type='bandpass'; filt.frequency.value=900-i*150; filt.Q.value=1.2;
    const g = actx.createGain();
    g.gain.setValueAtTime(0.28-i*0.05, t+delay);
    g.gain.exponentialRampToValueAtTime(0.0005, t+delay+dur);
    src.connect(filt); filt.connect(g); g.connect(masterGain);
    src.start(t+delay); src.stop(t+delay+dur+0.02);
  });
  playTone(110, t, 0.18, 'sine', 0.16);
}
function sfxWin(){
  if(!actx) return;
  const t = actx.currentTime;
  [523.25,659.25,783.99,1046.5].forEach((f,i)=>playTone(f, t+i*0.09, 0.16, 'sine', 0.2));
}

// ===== v6 烘焙資產與電影感工具 =====
const clamp01v6 = t => Math.max(0, Math.min(1, t));
const lerpv6 = (a,b,t) => a+(b-a)*t;
const easeOutCubicV6 = t => 1 - Math.pow(1-t,3);
const easeOutBackV6 = t => 1 + 2.7*Math.pow(t-1,3) + 1.7*Math.pow(t-1,2);
const easeInOutV6 = t => t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
function bakeTex(w,h,fn){ const c=document.createElement('canvas'); c.width=w; c.height=h; fn(c.getContext('2d'),w,h); return c; }
// 背景整張烘焙（天空/太陽光暈/遠山/山丘/草地/花朵），主迴圈零 createGradient/shadowBlur
let bgTex = null;
function buildBG(){
  bgTex = bakeTex(Math.max(2,W), Math.max(2,H), (g,w,h)=>{
    const sky = g.createLinearGradient(0,0,0,h);
    sky.addColorStop(0,'#5ec8ff'); sky.addColorStop(0.55,'#a9e4ff'); sky.addColorStop(1,'#d9f5d0');
    g.fillStyle=sky; g.fillRect(0,0,w,h);
    const sunX=w*0.85, sunY=h*0.16, sunR=Math.min(w,h)*0.07;
    const halo = g.createRadialGradient(sunX,sunY,sunR*0.4,sunX,sunY,sunR*3);
    halo.addColorStop(0,'rgba(255,244,180,0.85)'); halo.addColorStop(1,'rgba(255,244,180,0)');
    g.fillStyle=halo; g.fillRect(sunX-sunR*3,sunY-sunR*3,sunR*6,sunR*6);
    g.fillStyle='#fff6c9';
    g.beginPath(); g.arc(sunX,sunY,sunR,0,Math.PI*2); g.fill();
    g.fillStyle='rgba(120,195,150,0.45)';
    g.beginPath(); g.moveTo(0,h*0.60);
    for(let x=0;x<=w;x+=w/5){ g.quadraticCurveTo(x+w/10, h*0.52, x+w/5, h*0.60); }
    g.lineTo(w,h*0.64); g.lineTo(0,h*0.64); g.closePath(); g.fill();
    const hillY1 = h*0.62;
    g.fillStyle='#9cd68a';
    g.beginPath(); g.moveTo(0,hillY1);
    for(let x=0;x<=w;x+=w/8){ g.quadraticCurveTo(x+w/16, hillY1-h*0.05, x+w/8, hillY1); }
    g.lineTo(w,h*0.82); g.lineTo(0,h*0.82); g.closePath(); g.fill();
    const floorY = h*0.82;
    const fg = g.createLinearGradient(0,floorY,0,h);
    fg.addColorStop(0,'#79d34f'); fg.addColorStop(1,'#4f9e33');
    g.fillStyle=fg; g.fillRect(0,floorY,w,h-floorY);
    for(let i=0;i<18;i++){
      const fx=(i*137)%w;
      const fy=floorY+14+(i*53)%(h-floorY-14);
      g.fillStyle = i%3===0 ? '#ffe38a' : '#ffffff';
      g.beginPath(); g.arc(fx,fy,2.4,0,Math.PI*2); g.fill();
    }
  });
}
window.addEventListener('resize', buildBG);
buildBG();
const vigTexV6 = bakeTex(480,270,(g,w,h)=>{
  const r = g.createRadialGradient(w/2,h/2,h*0.36,w/2,h/2,h*0.86);
  r.addColorStop(0,'rgba(0,0,0,0)'); r.addColorStop(0.7,'rgba(6,10,22,0.15)'); r.addColorStop(1,'rgba(6,10,22,0.42)');
  g.fillStyle=r; g.fillRect(0,0,w,h);
});
const glowTexV6 = bakeTex(128,128,(g)=>{
  const r = g.createRadialGradient(64,64,0,64,64,64);
  r.addColorStop(0,'rgba(255,250,200,0.95)'); r.addColorStop(0.42,'rgba(255,230,120,0.3)'); r.addColorStop(1,'rgba(255,230,120,0)');
  g.fillStyle=r; g.fillRect(0,0,128,128);
});
const sweepBandV6 = bakeTex(240,60,(g,w,h)=>{
  const lg = g.createLinearGradient(0,0,w,0);
  lg.addColorStop(0,'rgba(255,255,255,0)'); lg.addColorStop(0.5,'rgba(255,255,255,0.85)'); lg.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle = lg; g.fillRect(0,0,w,h);
  const vgrad = g.createLinearGradient(0,0,0,h);
  vgrad.addColorStop(0,'rgba(0,0,0,0)'); vgrad.addColorStop(0.5,'rgba(0,0,0,1)'); vgrad.addColorStop(1,'rgba(0,0,0,0)');
  g.globalCompositeOperation='destination-in';
  g.fillStyle = vgrad; g.fillRect(0,0,w,h);
});
const grainTilesV6 = [0,1,2].map(()=> bakeTex(160,160,(g,w,h)=>{
  const id = g.createImageData(w,h);
  for(let i=0;i<id.data.length;i+=4){
    const v=(Math.random()*255)|0;
    id.data[i]=id.data[i+1]=id.data[i+2]=v; id.data[i+3]=11;
  }
  g.putImageData(id,0,0);
}));
const grainPatsV6 = grainTilesV6.map(tx => ctx.createPattern(tx,'repeat'));
function bakeCharsV6(text, px, colors, glowColor){
  const meas = bakeTex(8,8,()=>{}).getContext('2d');
  meas.font = '900 ' + px + 'px sans-serif';
  return [...text].map((ch,i)=>{
    const w = Math.ceil(meas.measureText(ch).width) + 48;
    const h = px + 56;
    const c = bakeTex(w,h,(g)=>{
      g.font = '900 ' + px + 'px sans-serif';

function drawTitleCharsV6(chars, cx, cy, t, stagger, dur, sweepAt, s){

      minX=Math.min(minX,x); maxX=Math.max(maxX,x+w);

  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-9.5,-2.5,1.1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6.5,-2.5,1.1,0,Math.PI*2); ctx.fill();

  // 鼻嘴
  ctx.fillStyle = accent;
  ctx.beginPath(); ctx.moveTo(-2,5); ctx.lineTo(2,5); ctx.lineTo(0,7); ctx.closePath(); ctx.fill();
  if(pose==='bolt'){
    ctx.fillStyle = '#3a1620';
    ctx.beginPath(); ctx.ellipse(0,12,8,7,0,0,Math.PI*2); ctx.fill();
  } else {
    ctx.strokeStyle='#3a2a20'; ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.moveTo(0,7); ctx.quadraticCurveTo(-4,11,-7,8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,7); ctx.quadraticCurveTo(4,11,7,8); ctx.stroke();
  }
  ctx.restore(); // 頭
  ctx.restore(); // 整體
}

function drawSparkBurst(x,y,t,color){
  ctx.save();
  for(let i=0;i<10;i++){
    const ang = (i/10)*Math.PI*2 + t*2;
    const r = 10+ t*140;
    const a = Math.max(0,1-t*1.4);
    ctx.fillStyle = color.replace('ALPHA', a.toFixed(2));
    ctx.beginPath();
    ctx.arc(x+Math.cos(ang)*r, y+Math.sin(ang)*r, 4*(1-t*0.7), 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawBolt(x1,y1,x2,y2,t){
  const alpha = Math.max(0, 1-t*3);
  if(alpha<=0) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = '#fff7b0';
  ctx.shadowColor = '#ffe97a'; ctx.shadowBlur = 18;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  const segs = 6;
  for(let i=1;i<segs;i++){
    const p = i/segs;
    const mx = x1+(x2-x1)*p + (Math.sin(t*40+i*3)*14);
    const my = y1+(y2-y1)*p + (Math.cos(t*37+i*2)*10);
    ctx.lineTo(mx,my);
  }
  ctx.lineTo(x2,y2);
  ctx.stroke();
  ctx.restore();
}

// ---------- 場景時間軸（三幕：登場→交戰→高潮結尾） ----------
let startTime=null, ended=false;
let camShake=0;
const TOTAL = 30; // 秒

const CAT = {body:'#ffffff', dark:'#e08b2e', light:'#fffdf8', accent:'#ff8a5c'};
const SPARK = {body:'#ffe066', dark:'#e0a020', light:'#fff9d0', accent:'#7a4a10', cheek:'#ff5a4a'};

const captions = [
  {t:0.3, d:3.0, text:'貓咪大戰爭 x 寶可夢戰鬥曲 —— 雙戰士登場！'},
  {t:3.5, d:3.5, text:'白貓戰士蓄力衝拳！'},
  {t:7.2, d:3.5, text:'電氣鼠戰士蓄力放電！'},
  {t:11.0, d:4.5, text:'必殺對決——飛撲咬碎 x 十萬伏特！'},
  {t:16.0, d:4.0, text:'硝煙散去——雙方都拚盡了全力！'},
  {t:21.0, d:4.0, text:'難分高下，惺惺相惜，互相喝采！'},
  {t:26.0, d:4.0, text:'勝利！★ 戰鬥之歌完結 ★'},
];
let captionEl = document.getElementById('caption');
let shownCaption = -1;
function updateCaption(tt){
  let idx=-1;
  for(let i=0;i<captions.length;i++){
    if(tt>=captions[i].t && tt<captions[i].t+captions[i].d){ idx=i; break; }
  }
  if(idx!==shownCaption){
    shownCaption = idx;
    if(idx>=0){ captionEl.textContent = captions[idx].text; captionEl.classList.add('show'); }
    else { captionEl.classList.remove('show'); }
  }
}

let collidedBite=false, collidedBolt=false, clashed=false;
let hitSfxFlags={};
function sfxOnce(key, fn){ if(hitSfxFlags[key]) return; hitSfxFlags[key]=true; fn(); }

function frame(now){
  if(startTime===null) startTime = now;
  const tt = (now-startTime)/1000;
  const dtv6 = Math.max(0, Math.min(0.1, tt - prevTT)); prevTT = tt;
  ctx.clearRect(0,0,W,H);

  // v6 電影運鏡：登場回拉→蓄力左右推鏡→碰撞 zoom-punch→勝利回正
  let zoomV6 = 1.04, oxV6 = 0, oyV6 = 0;
  if(tt < 3.5){
    zoomV6 = lerpv6(1.12, 1.04, easeOutCubicV6(clamp01v6(tt/2.6)));
  } else if(tt < 7.2){
    const p = easeInOutV6(clamp01v6((tt-3.5)/1.2));
    zoomV6 = 1.04 + 0.06*p; oxV6 = -W*0.05*p;
  } else if(tt < 11.0){
    const p = easeInOutV6(clamp01v6((tt-7.2)/1.2));
    zoomV6 = 1.10; oxV6 = lerpv6(-W*0.05, W*0.05, p);
  } else if(tt < 13.2){
    const p = clamp01v6((tt-11.0)/0.5);
    zoomV6 = lerpv6(1.10, 1.20, p); oxV6 = lerpv6(W*0.05, 0, p);
  } else if(tt < 16.0){
    const p = clamp01v6((tt-13.2)/2.2);
    zoomV6 = lerpv6(1.20, 1.06, easeOutCubicV6(p));
  } else {
    zoomV6 = 1.05;
  }
  if(camShake > 0.05){
    zoomV6 += camShake*0.002;
    oxV6 += (Math.random()-0.5)*camShake;
    oyV6 += (Math.random()-0.5)*camShake*0.7;
    camShake *= 0.85;
  }
  const mxV6 = W/2*(1-1/zoomV6)-0.5, myV6 = H/2*(1-1/zoomV6)-0.5;
  oxV6 = Math.max(-mxV6, Math.min(mxV6, oxV6));
  oyV6 = Math.max(-myV6, Math.min(myV6, oyV6));
  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(zoomV6, zoomV6);
  ctx.translate(-W/2 - oxV6, -H/2 - oyV6);

  drawGround(tt);
  updateCaption(tt);

  const floorY = H*0.82;
  const scaleBase = Math.min(W,H)/420;
  const groundY = floorY - 20*scaleBase;

  // 幕一 0-3.5s：雙方從畫面外滑入
  // 幕二 3.5-11s：各自蓄力
  // 幕三 11-16s：飛撲對放電，正面碰撞
  // 幕四 16-21s：火花四射
  // 幕五 21-30s：握手言和、勝利結尾

  const enterT = Math.min(1, tt/2.4);
  const ease = 1-Math.pow(1-enterT,3);
  const catX = -W*0.4 + ease*(W*0.32-(-W*0.4));
  const sparkX = W*1.4 + ease*(W*0.68-W*1.4);

  let catPose='idle', sparkPose='idle';

  if(tt>=3.5 && tt<7.2){
    const p=(tt-3.5)/3.7;
    catPose = (Math.floor(p*6)%2===0)?'charge':'idle';
  }
  if(tt>=7.2 && tt<11.0){
    const p=(tt-7.2)/3.8;
    sparkPose = (Math.floor(p*6)%2===0)?'charge':'idle';
    catPose='charge';
  }
  if(tt>=11.0 && tt<13.2){
    catPose='pounce'; sparkPose='bolt';
    if(!clashed){
      clashed=true; camShake=26;
      sfxOnce('pounce', sfxPounce); sfxOnce('thunder', sfxThunder); setTimeout(()=>sfxOnce('crunch', sfxCrunch), 140);
      braam(0.55); triggerTransV6('flash');
    }
  }
  if(tt>=13.2 && tt<16.0){
    catPose='hit'; sparkPose='hit';
  }
  if(tt>=16.0 && tt<21.0){
    catPose='idle'; sparkPose='idle';
  }
  if(tt>=21.0){
    catPose='win'; sparkPose='win';
  }

  const catScale = 1.9*scaleBase;
  const sparkScale = 1.75*scaleBase;
  drawCat(catX, groundY, catScale, 1, tt, catPose, CAT);
  drawSpark(sparkX, groundY, sparkScale, -1, tt, sparkPose, SPARK);

  // v6 粒子：登場塵土／蓄力電光／碰撞塵爆
  if(tt<2.6 && Math.random()<0.6){
    spawnDust(catX + (Math.random()*40-60)*scaleBase, groundY+44*scaleBase, scaleBase);
    spawnDust(sparkX + (Math.random()*40+20)*scaleBase, groundY+44*scaleBase, scaleBase);
  }
  if(tt>=7.2 && tt<11.9 && Math.random()<0.55){
    spawnZap(sparkX, groundY-40*scaleBase, scaleBase);
  }
  if(tt>=11.0 && tt<11.5 && Math.random()<0.8){
    spawnDust((catX+sparkX)/2 + (Math.random()*80-40)*scaleBase, groundY+40*scaleBase, scaleBase*1.4);
  }

  if(clashed && tt>=11.0 && tt<11.9){
    const midX = (catX+sparkX)/2;
    drawBolt(catX+40*scaleBase, groundY-70*scaleBase, sparkX-40*scaleBase, groundY-70*scaleBase, tt-11.0);
    drawSparkBurst(midX, groundY-70*scaleBase, (tt-11.0), 'rgba(255,206,92,ALPHA)');
    drawSparkBurst(midX, groundY-70*scaleBase, (tt-11.0)*0.7, 'rgba(255,247,176,ALPHA)');
  }

  updatePartsV6(dtv6, tt);
  drawPartsV6();
  ctx.restore();

  drawTitleCardV6(tt);
  drawCinemaV6(tt, dtv6);

  // v6 事件觸發：蓄力音效／對決riser／勝利彩帶／片尾定格重音
  if(!firedV6.catCharge && tt>=3.5){ firedV6.catCharge=true; sfxPounce(); }
  if(!firedV6.sparkCharge && tt>=7.2){
    firedV6.sparkCharge=true;
    [0,0.5,0.9,1.4,1.9,2.5,3.1].forEach(d=>zapSmall(d));
  }
  if(!firedV6.duelRiser && tt>=9.8){ firedV6.duelRiser=true; riser(1.2); }
  if(!firedV6.victory && tt>=21.0){
    firedV6.victory=true; sfxWin();
    spawnConfettiV6(W*0.5, H*0.42, 80, scaleBase);
    spawnConfettiV6(W*0.3, H*0.3, 40, scaleBase);
    spawnConfettiV6(W*0.7, H*0.3, 40, scaleBase);
  }
  if(!firedV6.titleIn && tt>=TITLE_T){ firedV6.titleIn=true; stinger(); triggerTransV6('flash'); camShake=10; }

  if(!ended && tt>=TOTAL){
    ended=true;
    document.getElementById('replayWrap').classList.add('show');
  }
  if(!ended){ requestAnimationFrame(frame); }
}

function startAll(){
  document.getElementById('hint').style.opacity='0';
  ensureAudio();
  if(actx.state==='suspended') actx.resume();
  setMuted(false);
  startMusic();
}

let running=false;
function beginPlayback(){
  if(running) return;
  running=true;
  startTime=null; ended=false; clashed=false; hitSfxFlags={};
  firedV6 = {catCharge:false, sparkCharge:false, duelRiser:false, clashBoom:false, victory:false, titleIn:false};
  partsV6.length = 0; transV6 = {t:99, type:'none'}; prevTT = 0; camShake = 0;
  document.getElementById('replayWrap').classList.remove('show');
  requestAnimationFrame(frame);
}

document.body.addEventListener('pointerdown', function firstTap(){
  startAll();
  beginPlayback();
  document.body.removeEventListener('pointerdown', firstTap);
}, {once:true});

try { startAll(); beginPlayback(); } catch(e) {}

document.getElementById('muteBtn').addEventListener('click', function(e){
  e.stopPropagation();
  ensureAudio();
  if(actx.state==='suspended') actx.resume();
  setMuted(!muted);
});

document.getElementById('replayBtn').addEventListener('click', function(e){
  e.stopPropagation();
  musicStarted=false;
  running=false;
  if(!muted) startMusic();
  beginPlayback();
});

resize();
drawGround(0);
drawCat(W*0.32, H*0.82-20, 1.9*Math.min(W,H)/420, 1, 0, 'idle', CAT);
drawSpark(W*0.68, H*0.82-20, 1.75*Math.min(W,H)/420, -1, 0, 'idle', SPARK);

})();
</script>

<script>/* AI-CAMP-VIDEO-CONTROLS */
(function(){
  var ORAF=window.requestAnimationFrame.bind(window), OST=window.setTimeout.bind(window), OSI=window.setInterval.bind(window);
  var realNow=performance.now.bind(performance), D0=Date.now(), P0=realNow();
  var acc=0, lastReal=P0, paused=false, speed=1;
  function vnow(){ var r=realNow(); if(!paused){ acc+=(r-lastReal)*speed; } lastReal=r; return acc; }
  try{ performance.now=function(){ return vnow(); }; }catch(e){}
  try{ Date.now=function(){ return D0+Math.round(vnow()); }; }catch(e){}
  window.requestAnimationFrame=function(cb){ return ORAF(function tick(){ if(paused){ ORAF(tick); } else { cb(vnow()); } }); };
  window.setTimeout=function(fn,ms){ var a=[].slice.call(arguments,2);
    return OST(function f(){ if(paused){ OST(f,120); } else if(typeof fn==="function"){ fn.apply(null,a); } },ms); };
  window.setInterval=function(fn,ms){ var a=[].slice.call(arguments,2);
    return OSI(function(){ if(!paused&&typeof fn==="function"){ fn.apply(null,a); } },ms); };
  var ctxs=[];
  ["AudioContext","webkitAudioContext"].forEach(function(n){
    var C=window[n]; if(!C) return;
    var W=function(){ var c=new (Function.prototype.bind.apply(C,[null].concat([].slice.call(arguments))))(); ctxs.push(c); return c; };
    W.prototype=C.prototype; window[n]=W;
  });
  function setPaused(p){
    vnow(); paused=p;
    ctxs.forEach(function(c){ try{ p?c.suspend():c.resume(); }catch(e){} });
    [].forEach.call(document.querySelectorAll("audio,video"),function(m){ try{ p?m.pause():m.play(); }catch(e){} });
  }
  function fmt(ms){ var s=Math.floor(ms/1000); return Math.floor(s/60)+":"+("0"+(s%60)).slice(-2); }
  function init(){
    if(!document.body) return;
    var bar=document.createElement("div");
    bar.style.cssText="position:fixed;left:10px;bottom:10px;z-index:99998;display:flex;gap:6px;align-items:center;"+
      "font-family:sans-serif;background:rgba(15,18,32,.88);border-radius:999px;padding:6px 10px;box-shadow:0 2px 10px rgba(0,0,0,.4)";
    function mkbtn(txt,title){ var b=document.createElement("button"); b.type="button"; b.title=title;
      b.style.cssText="min-width:42px;min-height:36px;border:none;border-radius:999px;background:rgba(255,255,255,.12);"+
        "color:#fff;font-size:15px;cursor:pointer;touch-action:manipulation;padding:4px 10px"; b.textContent=txt; return b; }
    var bPlay=mkbtn("\u23F8","\u66AB\u505C/\u7E7C\u7E8C");
    var bRe=mkbtn("\u23EA","\u91CD\u64AD");
    var bSp=mkbtn("1x","\u64AD\u653E\u901F\u5EA6");
    var tEl=document.createElement("span"); tEl.style.cssText="color:#9fd8ff;font-size:13px;min-width:38px;text-align:center"; tEl.textContent="0:00";
    bPlay.addEventListener("click",function(){ setPaused(!paused); bPlay.textContent=paused?"\u25B6":"\u23F8"; });
    bRe.addEventListener("click",function(){ location.reload(); });
    var speeds=[1,2,0.5];
    bSp.addEventListener("click",function(){ vnow(); speed=speeds[(speeds.indexOf(speed)+1)%speeds.length]; bSp.textContent=(speed===0.5?"0.5":speed)+"x"; });
    bar.appendChild(bPlay); bar.appendChild(bRe); bar.appendChild(bSp); bar.appendChild(tEl);
    document.body.appendChild(bar);
    (function upd(){ tEl.textContent=fmt(vnow()); OST(upd,500); })();
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",init); else init();
})();
</script>
