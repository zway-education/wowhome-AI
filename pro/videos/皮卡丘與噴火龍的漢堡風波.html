<script>
'use strict';
/* =====================================================================
   皮卡丘與噴火龍的漢堡風波 ── 專業AI升級版
   三幕劇：Ⅰ 草原與漢堡 → Ⅱ 天降噴火龍 → Ⅲ 噗～與薯條的圓滿結局
   ===================================================================== */
const W = 960, H = 540, CX = 480, CY = 300, GROUND = 432;
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const subEl = document.getElementById('subtitle');
const sndBtn = document.getElementById('sndBtn'), replayBtn = document.getElementById('replayBtn');
function resize(){
  const s = Math.min(innerWidth / W, innerHeight / H), dpr = Math.min(devicePixelRatio || 1, 2);
  cv.width = Math.round(W*s*dpr); cv.height = Math.round(H*s*dpr);
  cv.style.width = W*s+'px'; cv.style.height = H*s+'px';
  cv._base = s*dpr;
  // 畫佈下緣位置 → 字幕、重播鈕貼齊畫面（直式/橫式皆然）
  document.documentElement.style.setProperty('--cvB', Math.max(0,(innerHeight - H*s)/2) + 'px');
  replayBtn.style.top = Math.round(innerHeight/2 + H*s*0.14) + 'px';
}
addEventListener('resize', resize); resize();

/* ---------- OpenMoji 向量圖轉為畫布影像（執行期序列化，零外部資源） ---------- */
function svgImg(id){
  const img = new Image();
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(new XMLSerializer().serializeToString(document.getElementById(id)));
  return img;
}
const IMG = { burger:svgImg('svg-burger'), fries:svgImg('svg-fries'), fly:svgImg('svg-butterfly') };
function drawIMG(img, x, y, w, ang, sx){
  if(!img.complete || !img.naturalWidth) return;
  // 效能：SVG 影像首次成功載入後烘焙到離屏 canvas（SVG 每次 drawImage 都會重新光柵化）
  if(!img._cv){
    const c = document.createElement('canvas'); c.width = c.height = 144;
    c.getContext('2d').drawImage(img, 0, 0, 144, 144); img._cv = c;
  }
  ctx.save(); ctx.translate(x, y); if(ang) ctx.rotate(ang); if(sx) ctx.scale(sx, 1);
  ctx.drawImage(img._cv, -w/2, -w/2, w, w); ctx.restore();
}
/* 漸層快取：座標恆定的漸層只建一次，消除每幀配置 */
const GC = {};
function grd(key, make){ let g = GC[key]; if(!g){ g = make(); GC[key] = g; } return g; }

/* ---------- 緩動與工具 ---------- */
const E = {
  inQuad:t=>t*t, outQuad:t=>1-(1-t)*(1-t), inCubic:t=>t*t*t, outCubic:t=>1-Math.pow(1-t,3),
  inOutCubic:t=> t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2, outQuart:t=>1-Math.pow(1-t,4),
  outBack:t=> 1 + 2.7*Math.pow(t-1,3) + 1.7*Math.pow(t-1,2),
  outElastic:t=> t===0?0 : t===1?1 : Math.pow(2,-10*t)*Math.sin((t*10-0.75)*(Math.PI*2/3))+1,
  inExpo:t=> t===0?0:Math.pow(2,10*t-10)
};
const clamp=(v,a,b)=> v<a?a : v>b?b : v, lerp=(a,b,t)=> a+(b-a)*t;
const ss=(t,a,b)=> clamp((t-a)/(b-a),0,1), rnd=(a,b)=> a+Math.random()*(b-a), TAU=Math.PI*2;

/* ---------- Web Audio（預設靜音） ---------- */
let AC = null, master = null, windGain = null, audioOn = false, nextChirp = 3;
function initAudio(){
  AC = new (window.AudioContext || window.webkitAudioContext)();
  master = AC.createGain(); master.gain.value = 0;
  // 總線壓縮器：放屁三層音＋風聲＋jingle 同時疊加也不削波
  const comp = AC.createDynamicsCompressor();
  comp.threshold.value = -14; comp.knee.value = 22; comp.ratio.value = 9;
  comp.attack.value = 0.003; comp.release.value = 0.24;
  master.connect(comp); comp.connect(AC.destination);
  const len = AC.sampleRate*2, buf = AC.createBuffer(1,len,AC.sampleRate), d = buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i] = Math.random()*2-1;
  const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
  const lp = AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 400;
  windGain = AC.createGain(); windGain.gain.value = 0.03;
  src.connect(lp); lp.connect(windGain); windGain.connect(master); src.start();
}
function tone(freq, dur, type, vol, slide, delay){
  if(!audioOn || !AC) return;
  const t0 = AC.currentTime + (delay||0);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(28, freq+slide), t0+dur);
  g.gain.setValueAtTime(0.0001, t0); g.gain.exponentialRampToValueAtTime(vol, t0+0.012); g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  o.connect(g); g.connect(master); o.start(t0); o.stop(t0+dur+0.05);
}
function noiseBurst(dur, freq, type, vol, delay){
  if(!audioOn || !AC) return;
  const t0 = AC.currentTime + (delay||0);
  const len = Math.max(1, AC.sampleRate*dur)|0, buf = AC.createBuffer(1,len,AC.sampleRate), d = buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i] = Math.random()*2-1;
  const src = AC.createBufferSource(); src.buffer = buf;
  const f = AC.createBiquadFilter(); f.type = type; f.frequency.value = freq;
  const g = AC.createGain();
  g.gain.setValueAtTime(vol, t0); g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  src.connect(f); f.connect(g); g.connect(master); src.start(t0);
}

/* ---------- 粒子・漫畫字 ---------- */
let parts = [], comics = [], fartWave = null;
const MAX_PARTS = 300;   // 粒子硬上限：保 60fps
function pushPart(p){ if(parts.length < MAX_PARTS) parts.push(p); }
function pDust(x,y,n){ for(let i=0;i<n;i++){ const a=rnd(-Math.PI,0);
  pushPart({k:'dust',x:x+rnd(-14,14),y,vx:Math.cos(a)*rnd(20,80),vy:rnd(-60,-16),life:rnd(.35,.7),max:.7,s:rnd(3,8)}); } }
function pSpark(x,y,n,col){ for(let i=0;i<n;i++){ const a=rnd(0,TAU),sp=rnd(16,70);
  pushPart({k:'star',x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-30,life:rnd(.5,.9),max:.9,s:rnd(3,6),col:col||'#fff3b8',rot:rnd(0,TAU)}); } }
function pZap(x,y,n){ for(let i=0;i<n;i++){ const a=rnd(0,TAU),sp=rnd(60,190);
  pushPart({k:'zap',x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:rnd(.15,.34),max:.34,s:rnd(4,9)}); } }
function pFart(x,y,n){ for(let i=0;i<n;i++){ const a=rnd(0,TAU),sp=rnd(20,110);
  pushPart({k:'gas',x:x+rnd(-8,8),y:y+rnd(-8,8),vx:Math.cos(a)*sp-30,vy:Math.sin(a)*sp*0.5-14,life:rnd(.7,1.5),max:1.5,s:rnd(7,16)}); } }
function pHeart(x,y,n){ for(let i=0;i<n;i++){
  pushPart({k:'heart',x:x+rnd(-20,20),y:y+rnd(-10,10),vx:rnd(-14,14),vy:rnd(-70,-40),life:rnd(.8,1.4),max:1.4,s:rnd(6,10)}); } }
function updateParts(dt){
  let n = 0;                            // 就地壓縮：零每幀陣列配置
  for(let i=0;i<parts.length;i++){
    const p = parts[i];
    p.life -= dt; p.x += p.vx*dt; p.y += p.vy*dt;
    if(p.k==='dust'){ p.vx *= (1-2.2*dt); p.vy += 26*dt; }
    if(p.k==='star'){ p.vy += 60*dt; p.rot += dt*4; }
    if(p.k==='gas'){ p.vx *= (1-1.2*dt); p.vy -= 14*dt; }
    if(p.k==='heart'){ p.vy *= (1-0.6*dt); }
    if(p.life > 0) parts[n++] = p;
  }
  parts.length = n;
  n = 0;
  for(let i=0;i<comics.length;i++){ const c = comics[i]; c.t += dt; if(c.t < c.dur) comics[n++] = c; }
  comics.length = n;
}
function drawParts(){
  for(const p of parts){
    const a = clamp(p.life/p.max, 0, 1);
    if(p.k==='dust'){ ctx.fillStyle = 'rgba(150,120,80,'+(a*0.45)+')';
      ctx.beginPath(); ctx.arc(p.x,p.y,p.s*(1.7-a),0,TAU); ctx.fill(); }
    else if(p.k==='star'){ ctx.globalAlpha = a; ctx.fillStyle = p.col;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.beginPath();
      for(let j=0;j<8;j++){ const an=j*Math.PI/4, r=j%2===0?p.s:p.s*0.42;
        j===0?ctx.moveTo(Math.cos(an)*r,Math.sin(an)*r):ctx.lineTo(Math.cos(an)*r,Math.sin(an)*r); }
      ctx.closePath(); ctx.fill(); ctx.restore(); }
    else if(p.k==='zap'){ ctx.globalAlpha = a; ctx.strokeStyle = '#ffe14d'; ctx.lineWidth = 2.4; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(p.x,p.y);
      ctx.lineTo(p.x+p.s, p.y+p.s*0.5); ctx.lineTo(p.x+p.s*0.4, p.y+p.s); ctx.lineTo(p.x+p.s*1.4, p.y+p.s*1.5); ctx.stroke(); }
    else if(p.k==='gas'){ ctx.fillStyle = 'rgba(150,200,90,'+(a*0.5)+')';
      ctx.beginPath(); ctx.arc(p.x,p.y,p.s*(1.8-a),0,TAU); ctx.fill();
      ctx.fillStyle = 'rgba(200,235,140,'+(a*0.3)+')';
      ctx.beginPath(); ctx.arc(p.x-p.s*0.3,p.y-p.s*0.3,p.s*(1.4-a)*0.6,0,TAU); ctx.fill(); }
    else if(p.k==='heart'){ ctx.globalAlpha = a; ctx.fillStyle = '#ff5a8a';
      ctx.save(); ctx.translate(p.x,p.y); ctx.scale(p.s/10,p.s/10);
      ctx.beginPath(); ctx.moveTo(0,4);
      ctx.bezierCurveTo(-8,-4,-3,-10,0,-4); ctx.bezierCurveTo(3,-10,8,-4,0,4); ctx.fill(); ctx.restore(); }
  }
  ctx.globalAlpha = 1;
}
function comic(x,y,text,col,big){
  comics.push({x,y,text,col:col||'#fff',t:0,dur:0.9,ang:rnd(-0.15,0.15),big:big||34});
}
function drawFartWave(){
  if(!fartWave) return;
  const a = clamp(fartWave.life/fartWave.max, 0, 1);
  ctx.strokeStyle = 'rgba(150,210,90,'+(a*0.7)+')'; ctx.lineWidth = 6*a+2;
  ctx.beginPath(); ctx.arc(fartWave.x, fartWave.y, fartWave.r, 0, TAU); ctx.stroke();
  ctx.strokeStyle = 'rgba(210,240,150,'+(a*0.4)+')'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(fartWave.x, fartWave.y, fartWave.r*0.66, 0, TAU); ctx.stroke();
}
function drawComics(){
  for(const c of comics){
    const k = c.t/c.dur, sc = E.outBack(clamp(k*2.4,0,1));
    ctx.save(); ctx.translate(c.x, c.y - k*26); ctx.rotate(c.ang); ctx.scale(sc,sc);
    ctx.globalAlpha = 1 - E.inCubic(ss(k,0.6,1));
    ctx.font = '900 '+c.big+'px "Noto Sans TC","Microsoft JhengHei",sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.lineWidth = 7; ctx.strokeStyle = '#2a3a1a'; ctx.strokeText(c.text, 0, 0);
    ctx.fillStyle = c.col; ctx.fillText(c.text, 0, 0);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function camAt(t){
  let i = 0;
  while(i < camKF.length-1 && camKF[i+1].t <= t) i++;
  const a = camKF[i], b = camKF[Math.min(i+1,camKF.length-1)];
  if(a===b || b.cut) return {x:a.x,y:a.y,z:a.z};
  const k = E.inOutCubic(ss(t,a.t,b.t));
  return {x:lerp(a.x,b.x,k), y:lerp(a.y,b.y,k), z:lerp(a.z,b.z,k)};
}
function layer(p, fn){
  ctx.save();

  fn(); ctx.restore();
}

/* ---------- 編舞 ---------- */
function hopMove(t0, t1, x0, x1, n, hopH){
  const k = ss(T, t0, t1);
  const i = Math.min(n-1, Math.floor(k*n)), f = k*n - i;
  const xa = lerp(x0, x1, i/n), xb = lerp(x0, x1, (i+1)/n);
  return { x: lerp(xa, xb, E.inOutCubic(clamp(f,0,1))), y: -Math.sin(Math.PI*clamp(f,0,1)) * hopH };
}
function choreo(){
  pika.rot = 0; pika.lean = 0; pika.reach = 0; pika.sit = 0; pika.look = 0; pika.spark = 0;
  pika.y = 0; chz.rot = 0; chz.hold = 0; chz.squat = 0; chz.smug = 0;
  if(pika.expr!=='dizzy' || T>27.3) pika.expr = 'calm';
  /* --- 皮卡丘 --- */
  if(T < 5.2){ pika.x = -70; }
  else if(T < 7.2){ const m = hopMove(5.2, 7.2, -70, 250, 4, 26); pika.x = m.x; pika.y = m.y; }
  else if(T < 8.4){ pika.x = 250;
    if(T > 7.25 && T < 7.9){ pika.y = -Math.sin(Math.PI*ss(T,7.3,7.75))*30; pika.expr='shock'; } // 驚喜跳
  }
  else if(T < 10.5){ const m = hopMove(8.4, 10.5, 250, 392, 5, 20); pika.x = m.x; pika.y = m.y; pika.expr='happy'; }
  else if(T < 15.4){ pika.x = 392;
    if(T < 13.2){ pika.reach = E.inOutCubic(ss(T,11.1,12.0)) * (1 - E.inOutCubic(ss(T,12.3,13.0))); }
    pika.look = E.inOutCubic(ss(T,12.2,12.8)) * (1 - 0);          // 抬頭看天
    if(T > 12.2) pika.expr = 'shock';
  }
  else if(T < 24.0){ pika.x = 392 - 20*E.outCubic(ss(T,15.45,15.9));
    if(T < 18.6) pika.expr = 'shock';
    else { pika.expr = 'angry'; pika.spark = 1;
      pika.y = -Math.abs(Math.sin((T-18.6)*5.4))*16;              // 氣得跳腳
      if(pika.y < -14 && Math.random()<0.2) pDust(pika.x, GROUND+4, 2);
      if(T < 21.9 && Math.random() < 0.4) pZap(pika.x+rnd(-32,32), GROUND-92+rnd(-28,20), 2);  // 持續劈啪電花
    }
    pika.look = clamp(ss(T,15.6,16.0),0,1)*0.4;
  }
  else if(T < 27.4){ pika.expr = 'dizzy';                          // 被臭暈
    const k = E.outCubic(ss(T,24.0,24.6));
    pika.x = 372 - 58*k; pika.rot = -0.5*k + 0.5*E.outBack(ss(T,26.6,27.3));
    pika.sit = E.outCubic(ss(T,24.3,24.8));
  }
  else if(T < 31.3){ pika.x = 314; pika.sit = 1 - E.inOutCubic(ss(T,30.6,31.2));
    pika.expr = T<30.2 ? 'sad' : 'shock';
    if(T > 30.4) pika.look = 0.5;
  }
  else { const m = hopMove(31.3, 32.2, 314, 402, 2, 22);
    pika.x = Math.max(m.x, 314); pika.y = T<32.2 ? m.y : -Math.abs(Math.sin((T-32.2)*6))*14;
    pika.expr = 'happy';
    if(T>32.2 && Math.random()<0.1) pSpark(pika.x+rnd(-30,30), GROUND-90+rnd(-30,30), 1, '#fff3b8');
  }
  /* v4 彩蛋觸發中：臉頰持續劈啪、露出得意笑 */
  if(WT < eggUntil){ pika.spark = 1; if(pika.expr !== 'dizzy') pika.expr = 'happy'; }
  /* --- 噴火龍 --- */
  if(T < 13.2){ chz.x = 1080; chz.y = -300; chz.flap = 1; }
  else if(T < 14.72){ const k = ss(T,13.2,14.72);                  // 俯衝進場
    chz.x = lerp(1080, 620, E.inOutCubic(k));
    chz.y = -300 * (1 - E.outCubic(k));
    chz.rot = -0.22 * Math.sin(Math.PI*k); chz.flap = 1;
  }
  else if(T < 25.35){ chz.x = 620; chz.y = 0; chz.onGround = true; chz.flap = 0;
    if(T < 15.7){ chz.rot = 0.3 * E.inOutCubic(ss(T,15.1,15.45)) * (1-E.outBack(ss(T,15.45,15.9))); } // 抓漢堡
    chz.hold = E.outBack(ss(T,15.5,16.1));
    if(T > 18.4 && T < 21.8){ chz.smug = 1; chz.rot = -0.06 + Math.sin((T-18.4)*3.2)*0.03; }
    if(T > 23.3 && T < 24.0) chz.squat = E.inOutCubic(ss(T,23.3,23.9));                      // 蓄屁
    if(T >= 24.0) chz.squat = 1 - E.outBack(ss(T,24.0,24.5));
  }
  else { const k = ss(T,25.35,27.6);                               // 叼著漢堡飛走
    chz.x = lerp(620, 1000, E.inCubic(k)*1.05);
    chz.y = -430 * E.inQuad(k);
    chz.rot = -0.18*E.outCubic(k); chz.flap = 1; chz.hold = 1; chz.onGround = false;
  }
  /* --- 漢堡與薯條 --- */
  burger.bob = burger.held ? 0 : Math.sin(WT*2.6)*4;
  if(burger.held){
    const hx = chz.hold, raise = chz.smug ? 26 : 0;
    const tx = chz.x + chz.dir*(56 + 6*hx);   // 爪子位置（鏡像翻轉已考慮）
    const ty = GROUND + chz.y - 78 - raise*hx - (chz.y<-40 ? 12 : 0);
    const g = E.outCubic(ss(T, 15.45, 15.8)); // 搶奪補間：從草地弧線飛進爪中，不瞬移
    burger.x = lerp(470, tx, g);
    burger.y = lerp(GROUND-16, ty, g) - Math.sin(Math.PI*g)*24;
  }
}

  ctx.restore();

    wrap.style.cssText="position:fixed;right:10px;bottom:10px;z-index:99999;display:flex;gap:6px;font-family:sans-serif;opacity:.92";
    var LS="voted-"+K;
    var defs=[["-love","\u2764\uFE0F","\u975e\u5e38\u597d\u73a9","#ff6cc7"],["-like","\ud83d\udc4d","\u597d\u73a9","#38e1ff"]];
    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;
          b.querySelector("i").textContent=Math.max(0,(n||0)-(c||0));
        }); });
      });
    }
    defs.forEach(function(d){
      var b=document.createElement("button");
      b.type="button"; b.title=d[2];
      b.style.cssText="min-height:42px;padding:8px 14px;border:none;border-radius:999px;background:rgba(15,18,32,.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation";
      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";
      b.addEventListener("click",function(){
        var prev=null; try{ prev=localStorage.getItem(LS); }catch(e){}
        if(prev===d[0]){ ping(K+d[0]+"-c"); try{ localStorage.removeItem(LS); }catch(e){} }
        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);
      });
      btns[d[0]]=b; wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    refresh();
    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* 每10秒同步別人投的票 */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
</script>
</body>
</html>
