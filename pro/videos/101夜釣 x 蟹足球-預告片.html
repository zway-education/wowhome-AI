<!DOCTYPE html>
<!-- 專業AI升級 v6 -->
<!-- v6：電影感運鏡（推鏡/搖鏡/震動）＋letterbox、烘焙夜景與球場、螢火/氣泡/彩帶粒子、bloom光暈、逐字標題＋光掃、預告片配樂（低音鼓點/riser/braam/結尾定音）預設開聲 -->
<!-- v7：畫面擬真重工——直接移植遊戲原始繪製函式（NIGHT_BG 夜景烘焙、機甲釣手、遊戲魚種、頂視蟹足球場、HUD 膠囊），預告片畫面與遊戲實機一致 -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="author" content="AI未來創作營隊">
<title>101夜釣 x 蟹足球 宣傳影片</title>
<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #05070f;
    font-family: "Trebuchet MS","PingFang TC","Microsoft JhengHei",sans-serif;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  canvas { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
  #soundBtn {
    position: fixed; top: max(12px, env(safe-area-inset-top)); right: max(12px, env(safe-area-inset-right)); z-index: 20;
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(11,23,48,0.72); border: 1px solid rgba(255,207,92,0.65);
    color: #f3ecd9; font-size: 20px; cursor: pointer;
    box-shadow: 0 0 14px rgba(255,167,46,0.25);
  }
  #soundBtn:active { transform: scale(.92); }
  #soundHint {
    position: fixed; top: 24px; right: 68px; z-index: 20;
    color: #f3ecd9; font-size: 14px; text-shadow: 0 0 4px #000;
    animation: hintFade 4s ease forwards;
    pointer-events: none;
  }
  @keyframes hintFade { 0%{opacity:0} 15%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
  #replayBtn {
    position: fixed; left: 50%; bottom: 14%; transform: translateX(-50%);
    z-index: 20; display: none;
    padding: 14px 42px; font-size: 20px; min-height: 48px;
    background: linear-gradient(92deg,#ffcf5c,#ffa72e,#ff7e3d);
    color: #0b1730; border: none; border-radius: 999px; cursor: pointer;
    font-family: inherit; font-weight: 800; letter-spacing: .18em;
    box-shadow: 0 0 26px rgba(255,167,46,0.55);
  }
  #replayBtn:active { transform: translateX(-50%) scale(.94); }
</style>
</head>
<body>
<button id="soundBtn">🔊</button>
<div id="soundHint">聲音已開啟</div>
<button id="replayBtn">重新播放</button>
<canvas id="stage"></canvas>

<script>
'use strict';
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const soundBtn = document.getElementById('soundBtn');
const soundHint = document.getElementById('soundHint');
const replayBtn = document.getElementById('replayBtn');

function resize() {
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', resize); resize();

/* ============================================================
   音訊引擎 — 預告片配樂（全程序化合成、零外部資源）
   母線：master → compressor → destination；程序化殘響 send
   聲音預設開啟：載入即建立 AudioContext，被瀏覽器擋下時
   第一次點擊/按鍵自動恢復。
============================================================ */
let AC = null, master = null, verb = null, verbSend = null, soundOn = true;
function makeImpulse(dur, decay) {
  const sr = AC.sampleRate, n = Math.floor(sr * dur);
  const buf = AC.createBuffer(2, n, sr);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, decay);
  }
  return buf;
}
function initAudio() {
  if (AC) return;
  try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; }
  const comp = AC.createDynamicsCompressor();
  comp.threshold.value = -16; comp.knee.value = 24; comp.ratio.value = 6;
  comp.attack.value = 0.004; comp.release.value = 0.24;
  comp.connect(AC.destination);
  master = AC.createGain(); master.gain.value = 0.9; master.connect(comp);
  verb = AC.createConvolver(); verb.buffer = makeImpulse(1.9, 2.6);
  verbSend = AC.createGain(); verbSend.gain.value = 0.9;
  verbSend.connect(verb); verb.connect(master);
}
function out(node, wet) {
  node.connect(master);
  if (wet > 0) { const g = AC.createGain(); g.gain.value = wet; node.connect(g); g.connect(verbSend); }
}
const rnd = (a, b) => a + Math.random() * (b - a);
function sfxBoom(vol) { // 低音鼓點：預告片心跳
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain();
  o.frequency.setValueAtTime(120, t);
  o.frequency.exponentialRampToValueAtTime(36, t + 0.45);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
  o.connect(g); out(g, 0.25); o.start(t); o.stop(t + 0.65);
  const n = AC.createBufferSource(); n.buffer = makeImpulse(0.12, 3);
  const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 220;
  const ng = AC.createGain(); ng.gain.setValueAtTime(vol * 0.6, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  n.connect(f); f.connect(ng); out(ng, 0.2); n.start(t);
}
function sfxBraam(vol, dur) { // 衝擊銅管音
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const f0 = 57.5;
  const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.Q.value = 3;
  lp.frequency.setValueAtTime(180, t);
  lp.frequency.linearRampToValueAtTime(1100, t + dur * 0.35);
  lp.frequency.linearRampToValueAtTime(240, t + dur);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.09);
  g.gain.setValueAtTime(vol, t + dur * 0.55);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  lp.connect(g); out(g, 0.45);
  [1, 1.006, 0.994, 2.003].forEach((m, i) => {
    const o = AC.createOscillator(); o.type = 'sawtooth';
    o.frequency.value = f0 * m * (i === 3 ? 1 : 1);
    o.connect(lp); o.start(t); o.stop(t + dur + 0.05);
  });
  const sub = AC.createOscillator(); sub.frequency.value = f0 / 2;
  const sg = AC.createGain(); sg.gain.setValueAtTime(vol * 0.8, t);
  sg.gain.exponentialRampToValueAtTime(0.001, t + dur);
  sub.connect(sg); out(sg, 0.1); sub.start(t); sub.stop(t + dur + 0.05);
}
function sfxRiser(dur) { // 漸強 riser：接向下一幕
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const n = AC.createBufferSource();
  const sr = AC.sampleRate, len = Math.floor(sr * dur);
  const buf = AC.createBuffer(1, len, sr);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  n.buffer = buf;
  const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.4;
  bp.frequency.setValueAtTime(260, t);
  bp.frequency.exponentialRampToValueAtTime(4200, t + dur);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.3, t + dur);
  g.gain.linearRampToValueAtTime(0.0001, t + dur + 0.06);
  n.connect(bp); bp.connect(g); out(g, 0.35); n.start(t);
  const o = AC.createOscillator(); o.type = 'sawtooth';
  o.frequency.setValueAtTime(110, t);
  o.frequency.exponentialRampToValueAtTime(440, t + dur);
  const og = AC.createGain(); og.gain.setValueAtTime(0.0001, t);
  og.gain.exponentialRampToValueAtTime(0.12, t + dur);
  og.gain.linearRampToValueAtTime(0.0001, t + dur + 0.06);
  o.connect(og); out(og, 0.3); o.start(t); o.stop(t + dur + 0.1);
}
function sfxTick(vol) {
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const n = AC.createBufferSource(); n.buffer = makeImpulse(0.035, 2.2);
  const hp = AC.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 6400;
  const g = AC.createGain(); g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.035);
  n.connect(hp); hp.connect(g); out(g, 0.1); n.start(t);
}
function sfxClap(vol) {
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const n = AC.createBufferSource(); n.buffer = makeImpulse(0.09, 1.6);
  const f = AC.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 1500; f.Q.value = 0.9;
  const g = AC.createGain(); g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  n.connect(f); f.connect(g); out(g, 0.3); n.start(t);
}
function pluck(freq, dur, vol, type, wet) { // 旋律撥弦（隨機音高微變）
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const o = AC.createOscillator(); o.type = type || 'square';
  o.frequency.value = freq * rnd(0.997, 1.003);
  const lp = AC.createBiquadFilter(); lp.type = 'lowpass';
  lp.frequency.setValueAtTime(freq * 6, t);
  lp.frequency.exponentialRampToValueAtTime(freq * 1.5, t + dur);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(lp); lp.connect(g); out(g, wet == null ? 0.2 : wet);
  o.start(t); o.stop(t + dur + 0.03);
}
function sfxChime() {
  if (!AC || !soundOn) return;
  [988, 1244.5, 1568, 1975.5].forEach((fq, i) =>
    setTimeout(() => pluck(fq, 0.35, 0.13, 'triangle', 0.55), i * 70));
}
function sfxSplash() {
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const n = AC.createBufferSource(); n.buffer = makeImpulse(0.35, 1.8);
  const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 0.8;
  bp.frequency.setValueAtTime(1900, t);
  bp.frequency.exponentialRampToValueAtTime(360, t + 0.32);
  const g = AC.createGain(); g.gain.setValueAtTime(0.4, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
  n.connect(bp); bp.connect(g); out(g, 0.4); n.start(t);
  pluck(1320, 0.18, 0.12, 'sine', 0.5);
}
function sfxCheer(vol) { // 觀眾歡呼（濾波噪聲湧起）
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const n = AC.createBufferSource(); n.buffer = makeImpulse(1.4, 1.1);
  const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 900; bp.Q.value = 0.4;
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.18);
  g.gain.exponentialRampToValueAtTime(0.001, t + 1.35);
  n.connect(bp); bp.connect(g); out(g, 0.5); n.start(t);
}
function sfxWhoosh() {
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const n = AC.createBufferSource(); n.buffer = makeImpulse(0.3, 1.5);
  const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.1;
  bp.frequency.setValueAtTime(3000, t);
  bp.frequency.exponentialRampToValueAtTime(500, t + 0.28);
  const g = AC.createGain(); g.gain.setValueAtTime(0.26, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
  n.connect(bp); bp.connect(g); out(g, 0.3); n.start(t);
}
function sfxSting() { // 結尾定格重音
  sfxBoom(0.9); sfxBraam(0.5, 2.2);
  setTimeout(() => sfxChime(), 180);
}

// 聲音預設開啟（自動開聲：載入建立、被擋時首次互動恢復）
initAudio();
function tryResume() { if (AC && AC.state === 'suspended') { const p = AC.resume(); if (p && p.catch) p.catch(() => {}); } }
tryResume();
setTimeout(() => {
  if (AC && AC.state === 'suspended') soundHint.textContent = '點任意處開啟聲音';
}, 300);
addEventListener('pointerdown', tryResume);
addEventListener('keydown', tryResume);
soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? '🔊' : '🔇';
  if (soundOn) { initAudio(); tryResume(); }
});

/* ---------- 緩動 ---------- */
const easeOut = t => 1 - Math.pow(1 - t, 3);
const easeInOut = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
const easeOutBack = t => { const c = 1.70158; return 1 + (c + 1) * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2); };
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

/* ============================================================
   以下畫面素材與繪製函式全部移植自遊戲本體
   「101夜釣 x 蟹足球」——同一套代碼，畫面保證一致
============================================================ */
const WATER_Y = 300;
function rr(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function text(str, x, y, size, color, align, weight, stroke) {
  ctx.font = (weight || 'bold') + ' ' + size + 'px "Trebuchet MS","Microsoft JhengHei","PingFang TC",sans-serif';
  ctx.textAlign = align || 'center'; ctx.textBaseline = 'middle';
  if (stroke) { ctx.lineWidth = Math.max(2, size / 7); ctx.strokeStyle = stroke; ctx.strokeText(str, x, y); }
  ctx.fillStyle = color; ctx.fillText(str, x, y);
}
function makeRand(seed) {
  let s = seed;
  return function () { s = (s * 16807) % 2147483647; return s / 2147483647; };
}
function pill(x, y, w, h, glow) {
  ctx.fillStyle = 'rgba(4,7,15,0.55)';
  rr(x, y, w, h, h / 2); ctx.fill();
  ctx.strokeStyle = glow || 'rgba(255,183,39,0.35)';
  ctx.lineWidth = 1.5; ctx.stroke();
}
function bake(w, h, fn) { const c = document.createElement('canvas'); c.width = w; c.height = h; fn(c.getContext('2d')); return c; }
function shade(hex, f) {
  const n = parseInt(hex.slice(1), 16);
  const r = clamp(Math.round(((n >> 16) & 255) * f), 0, 255), g = clamp(Math.round(((n >> 8) & 255) * f), 0, 255), b = clamp(Math.round((n & 255) * f), 0, 255);
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}

/* ---------------- 夜空 / 城市 素材（與遊戲相同種子，佈局一致） ---------------- */
const rand0 = makeRand(20260709);
const stars = [];
for (let i = 0; i < 70; i++) stars.push({ x: rand0() * GAME_W, y: rand0() * (WATER_Y - 60), r: 0.6 + rand0() * 1.6, ph: rand0() * 7, sp: 0.5 + rand0() * 2 });
const skylineFar = [], skylineNear = [];
(function () {
  let x = -20;
  while (x < GAME_W + 40) { const w = 40 + rand0() * 70, h = 40 + rand0() * 70; skylineFar.push({ x, w, h }); x += w + 6; }
  x = -30;
  while (x < GAME_W + 40) {
    const w = 46 + rand0() * 80, h = 70 + rand0() * 120;
    const wins = [];
    for (let r = 0; r < Math.floor(h / 22); r++)
      for (let c = 0; c < Math.floor(w / 20); c++)
        if (rand0() < 0.4) wins.push({ dx: 8 + c * 20, dy: 12 + r * 22, ph: rand0() * 7 });
    skylineNear.push({ x, w, h, wins });
    x += w + 14;
  }
})();
const TX = 812, TOWER_TOP = 96;
const towerWins = [];
for (let r = 0; r < 14; r++)
  for (let c = 0; c < 4; c++)
    if (rand0() < 0.82) towerWins.push({ x: TX - 30 + c * 18, y: TOWER_TOP + 10 + r * 13, ph: rand0() * 7, sp: 0.3 + rand0() * 1.2 });

/* 整幅夜景（星雲/銀河/月亮/城市剪影/101 主體）離屏烘焙一次 */
const NIGHT_BG = bake(GAME_W, WATER_Y + 6, g => {
  const sky = g.createLinearGradient(0, 0, 0, WATER_Y);
  sky.addColorStop(0, '#050915'); sky.addColorStop(0.6, '#0b1730'); sky.addColorStop(1, '#14224e');
  g.fillStyle = sky; g.fillRect(0, 0, GAME_W, WATER_Y + 6);
  let nb = g.createRadialGradient(640, 90, 10, 640, 90, 260);   // 紫色星雲
  nb.addColorStop(0, 'rgba(154,107,255,0.16)'); nb.addColorStop(1, 'rgba(154,107,255,0)');
  g.fillStyle = nb; g.fillRect(340, 0, 600, 300);
  nb = g.createRadialGradient(300, 180, 10, 300, 180, 300);     // 青色星雲
  nb.addColorStop(0, 'rgba(46,196,182,0.10)'); nb.addColorStop(1, 'rgba(46,196,182,0)');
  g.fillStyle = nb; g.fillRect(0, 0, 640, 320);
  g.save(); g.translate(480, 120); g.rotate(-0.32);              // 銀河斜帶
  const mw = g.createLinearGradient(0, -70, 0, 70);
  mw.addColorStop(0, 'rgba(243,236,217,0)'); mw.addColorStop(0.5, 'rgba(200,214,255,0.07)'); mw.addColorStop(1, 'rgba(243,236,217,0)');
  g.fillStyle = mw; g.fillRect(-560, -70, 1120, 140); g.restore();
  const r2 = makeRand(777);                                      // 微星塵
  for (let i = 0; i < 130; i++) {
    g.globalAlpha = 0.12 + r2() * 0.3;
    g.fillStyle = '#dfe4f2'; g.fillRect(r2() * GAME_W, r2() * (WATER_Y - 40), 1.3, 1.3);
  }
  g.globalAlpha = 1;
  const mg2 = g.createRadialGradient(110, 70, 20, 110, 70, 86);  // 月亮＋大光暈
  mg2.addColorStop(0, 'rgba(245,239,224,0.55)'); mg2.addColorStop(0.55, 'rgba(245,239,224,0.12)'); mg2.addColorStop(1, 'rgba(245,239,224,0)');
  g.fillStyle = mg2; g.fillRect(10, -16, 200, 200);
  g.fillStyle = '#f5efe0'; g.beginPath(); g.arc(110, 70, 28, 0, 7); g.fill();
  g.fillStyle = 'rgba(11,23,48,0.25)';
  g.beginPath(); g.arc(102, 62, 7, 0, 7); g.arc(122, 80, 5, 0, 7); g.fill();
  g.fillStyle = '#0c1735';                                       // 遠景天際線
  for (const b of skylineFar) g.fillRect(b.x, WATER_Y - b.h * 0.6, b.w, b.h * 0.6 + 6);
  for (const b of skylineNear) {                                 // 近景大樓（漸層立面＋樓頂霓虹）
    const bg2 = g.createLinearGradient(0, WATER_Y - b.h, 0, WATER_Y);
    bg2.addColorStop(0, '#152352'); bg2.addColorStop(1, '#0d1837');
    g.fillStyle = bg2; g.fillRect(b.x, WATER_Y - b.h, b.w, b.h + 6);
    g.fillStyle = 'rgba(56,225,255,0.18)'; g.fillRect(b.x, WATER_Y - b.h, b.w, 2);
  }
  const segs = 8, baseY = WATER_Y - 30, hSeg = (baseY - TOWER_TOP) / segs;  // 101 斗型節
  g.fillStyle = '#0f1c42'; g.fillRect(TX - 58, WATER_Y - 34, 116, 38);
  for (let i = 0; i < segs; i++) {
    const yB = baseY - i * hSeg, yT = yB - hSeg;
    const sg = g.createLinearGradient(TX - 44, 0, TX + 44, 0);
    sg.addColorStop(0, '#101d44'); sg.addColorStop(0.5, i % 2 ? '#1c2e64' : '#152452'); sg.addColorStop(1, '#0d1838');
    g.fillStyle = sg;
    g.beginPath(); g.moveTo(TX - 33, yB); g.lineTo(TX - 44, yT + 3); g.lineTo(TX + 44, yT + 3); g.lineTo(TX + 33, yB); g.closePath(); g.fill();
    g.fillStyle = '#1c2d63'; g.fillRect(TX - 46, yT, 92, 4);
    g.fillStyle = 'rgba(56,225,255,0.1)'; g.fillRect(TX - 46, yT + 4, 92, 2);
  }
  g.fillStyle = '#162552'; g.fillRect(TX - 15, TOWER_TOP - 18, 30, 20);
  g.strokeStyle = '#8fa0c9'; g.lineWidth = 3;
  g.beginPath(); g.moveTo(TX, TOWER_TOP - 18); g.lineTo(TX, TOWER_TOP - 54); g.stroke();
});
/* 水下月光光柱（烘焙一次） */
const RAY_SPR = bake(160, 240, g => {
  const lg = g.createLinearGradient(0, 0, 0, 240);
  lg.addColorStop(0, 'rgba(168,230,226,0.30)'); lg.addColorStop(1, 'rgba(168,230,226,0)');
  g.fillStyle = lg;

const cam = { x: 0, y: 0, z: 1, shake: 0, punch: 0 };

/* ---------- 字卡（逐字浮現＋光暈掃過） ---------- */
function drawRevealText(text2, cx, cy, size, t0, t, opts) {
  opts = opts || {};
  const per = opts.per || 0.085, dur = 0.42;
  if (t < t0) return;
  ctx.save();
  ctx.font = `900 ${size}px "Arial Black","PingFang TC","Microsoft JhengHei",sans-serif`;
  const chars = [...text2];
  const widths = chars.map(c => ctx.measureText(c).width);
  const totalW = widths.reduce((a, b) => a + b, 0);
  let x = cx - totalW / 2;
  const grad = ctx.createLinearGradient(cx - totalW / 2, cy - size, cx + totalW / 2, cy);
  grad.addColorStop(0, opts.c0 || '#ffcf5c');
  grad.addColorStop(0.55, opts.c1 || '#ffa72e');
  grad.addColorStop(1, opts.c2 || '#ff7e3d');
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  for (let i = 0; i < chars.length; i++) {
    const p = clamp((t - t0 - i * per) / dur, 0, 1);
    if (p > 0) {
      const e = easeOutBack(p);
      ctx.save();
      ctx.globalAlpha = clamp(p * 1.4, 0, 1) * (opts.alpha == null ? 1 : opts.alpha);
      ctx.translate(x + widths[i] / 2, cy + (1 - e) * size * 0.65);
      ctx.scale(0.6 + e * 0.4, 0.6 + e * 0.4);
      ctx.shadowColor = 'rgba(255,167,46,0.55)'; ctx.shadowBlur = 16;
      ctx.fillStyle = grad;
      ctx.fillText(chars[i], -widths[i] / 2, 0);
      ctx.restore();
    }
    x += widths[i];
  }
  // 光暈掃過
  const inDone = t0 + chars.length * per + dur;
  const sw = (t - inDone) / 0.9;
  if (sw > 0 && sw < 1) {
    const bandX = cx - totalW / 2 - 60 + (totalW + 120) * sw;
    const bg = ctx.createLinearGradient(bandX - 46, 0, bandX + 46, 0);
    bg.addColorStop(0, 'rgba(255,255,255,0)');
    bg.addColorStop(0.5, 'rgba(255,255,255,0.85)');
    bg.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = opts.alpha == null ? 1 : opts.alpha;
    ctx.fillStyle = bg;
    ctx.fillText(text2, cx - totalW / 2, cy);
    ctx.globalCompositeOperation = 'source-over';
  }
  ctx.restore();
}

/* ---------- 時間軸（30 秒、三幕）＋音樂引擎 ---------- */
const DURATION = 30;
const BOUNDS = [6, 14, 22];
let startTime = null, playing = false, lastT = 0;
let firedCues = {};
function cue(id, fn) { if (!firedCues[id]) { firedCues[id] = true; fn(); } }

// 節拍聲部（依幕別變化）：136bpm 八分音
const BEAT = 60 / 136 / 2;
let lastBeat = -1;
const SCALE = [392.0, 440.0, 493.9, 587.3, 659.3, 784.0, 880.0, 987.8];
const MELODY = [0, 2, 4, 7, 4, 2, 1, 3, 5, 7, 5, 3, 0, 2, 4, 6, 4, 2, 2, 4, 6, 7, 6, 4];
const BASSP = [0, 0, 3, 3, 4, 4, 2, 2];
function grooveBeat(bi, t) {
  const act = t < 6 ? 0 : t < 14 ? 1 : t < 22 ? 2 : 3;
  if (act === 0) { // 開場：稀疏心跳
    if (bi % 8 === 0) sfxBoom(0.5);
    if (bi % 4 === 2) sfxTick(0.1);
    return;
  }
  if (act === 3) { // 結尾幕：只留重拍與尾音
    if (t < 25 && bi % 8 === 0) sfxBoom(0.55);
    if (t < 25 && bi % 4 === 2) sfxTick(0.12);
    return;
  }
  const fast = act === 2;
  if (bi % 4 === 0) sfxBoom(fast ? 0.5 : 0.44);
  if (bi % 8 === 4) sfxClap(0.3);
  if (bi % 2 === 1) sfxTick(fast ? 0.14 : 0.09);
  const mi = MELODY[bi % MELODY.length];
  const shift = fast ? 9 / 8 : 1; // 第二關升全音，情緒推高
  pluck(SCALE[mi] * shift, BEAT * 1.7, 0.12, 'square', 0.18);
  if (bi % 2 === 0) {
    const b = BASSP[(bi >> 1) % 8];
    pluck(SCALE[b] * shift / 2, BEAT * 1.6, 0.16, 'sawtooth', 0.06);
  }
}

/* ---------- 夜釣幕的魚群（位置以時間函數推導，可任意快轉） ---------- */

    return { x: AIM_X, y: Math.min(168 + (t - CAST_T) * 153, 428), bend: 0.35, phase: 'drop' };
  }
  if (t < REEL_END) {
    const p = (t - BITE_T) / (REEL_END - BITE_T);
    return { x: AIM_X, y: 420 - easeInOut(p) * 252, bend: 0.85 - p * 0.4, phase: 'reel' };
  }

  } else {
    if (t < 25) {
      drawRevealText('75 秒挑戰', GAME_W / 2, GAME_H * 0.3, 44, 22.3, t, { c0: '#ffcf5c', c1: '#ff8c5c', c2: '#2ec4b6' });
      smallLine('挑戰三星高分！', clamp((t - 23.2) / 0.5, 0, 1), GAME_H * 0.38);
    } else {
      drawRevealText('101 夜釣戰隊', GAME_W / 2, GAME_H * 0.37, 52, 25.1, t);
      drawRevealText('× 蟹將盃足球', GAME_W / 2, GAME_H * 0.49, 42, 25.7, t);
      if (t > 26.8) smallLine('滑鼠／觸控＋鍵盤雙支援 · 立即開玩', clamp((t - 26.8) / 0.7, 0, 1), GAME_H * 0.58);
      if (t > 27.6) smallLine('AI未來創作營隊 出品', clamp((t - 27.6) / 0.7, 0, 1) * 0.8, GAME_H * 0.64);
      cue('sting', () => { sfxSting(); flashA = 0.55; addShake(6); cam.punch = 0.06; });
    }
  }

  /* ---------- 幕間轉場（黑場淡出＋閃白） ---------- */
  let fadeA = 0;
  for (const b of BOUNDS) {
    const d = t - b;
    if (d >= -0.28 && d < 0) fadeA = Math.max(fadeA, (d + 0.28) / 0.28);
    if (d >= 0 && d < 0.3) fadeA = Math.max(fadeA, 1 - d / 0.3);
    if (d >= -0.02 && d < 0.2) cue('whoosh' + b, () => sfxWhoosh());
    if (b !== 6 && d >= -1.3 && d < -1.1) cue('riser' + b, () => sfxRiser(1.25));
  }
  if (t < 0.7) fadeA = Math.max(fadeA, 1 - t / 0.7); // 開場淡入
  if (fadeA > 0) { ctx.fillStyle = `rgba(2,4,10,${clamp(fadeA, 0, 1)})`; ctx.fillRect(0, 0, GAME_W, GAME_H); }
  cue('riser6', () => {}); // 佔位（第一幕轉場只用 whoosh）
  if (t > 4.7 && t < 4.8) cue('riserA1', () => sfxRiser(1.25));

  /* ---------- 閃白 ---------- */
  if (flashA > 0) { ctx.fillStyle = `rgba(255,248,230,${clamp(flashA, 0, 1)})`; ctx.fillRect(0, 0, GAME_W, GAME_H); }

  /* ---------- letterbox ---------- */
  const lb = 54 * easeOut(clamp(t / 1.1, 0, 1));
  ctx.fillStyle = '#020409';
  ctx.fillRect(0, 0, GAME_W, lb);
  ctx.fillRect(0, GAME_H - lb, GAME_W, lb);
  ctx.fillStyle = 'rgba(255,207,92,0.28)';
  ctx.fillRect(0, lb - 1, GAME_W, 1);
  ctx.fillRect(0, GAME_H - lb, GAME_W, 1);
  renderSubtitle();
}

function loop(now) {
  if (!playing) return;
  if (startTime === null) startTime = now;
  const t = (now - startTime) / 1000 * (window.SPEED || 1);
  const dt = clamp(t - lastT, 0, 0.1);
  lastT = t;
  // 節拍引擎（跟著時間軸走，重播自動歸零）
  const bi = Math.floor(t / BEAT);
  if (bi !== lastBeat && AC && soundOn && AC.state === 'running') { lastBeat = bi; grooveBeat(bi, t); }
  updateParticles(dt);
  if (t >= DURATION) {
    draw(DURATION - 0.01, dt);
    playing = false;
    replayBtn.style.display = 'block';
    return;
  }
  draw(t, dt);
  requestAnimationFrame(loop);
}

function play() {
  startTime = null; lastT = 0; lastBeat = -1;
  firedCues = {};
  particles = [];
  cam.shake = 0; cam.punch = 0; flashA = 0;
  playing = true;
  replayBtn.style.display = 'none';
  tryResume();
  requestAnimationFrame(loop);
}
replayBtn.addEventListener('click', play);
play();
</script>
