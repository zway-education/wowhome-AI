<!DOCTYPE html>
<!-- 專業AI升級 v6 -->
<!-- v6：letterbox黑邊＋幕間閃白/淡黑/whoosh轉場、zoom-punch打擊運鏡、大字卡逐字浮現＋光掃、母線壓縮＋程序化殘響、braam/riser/結尾定音，聲音預設開啟 -->
<!-- v7：畫面擬真重工——移植遊戲原始繪製函式（幹員頭像 OperatorArt、模擬行動戰術背景/補給箱/靶機/撤離訊號/準星 HUD），
     內容改為遊戲實際內容：作戰簡報（30:00·13人·零號大壩）、威龍/紅狼/無名幹員檔案、收打撤三階段模擬行動 -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="author" content="Claude">
<title>三角洲行動 預告片</title>
<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #0b0d08;
    font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  canvas { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
  #soundBtn {
    position: fixed; top: 12px; right: 12px; z-index: 20;
    width: 48px; height: 48px; border-radius: 8px;
    background: rgba(18,22,12,0.75); border: 1px solid rgba(143,174,82,0.6);
    color: #e7e2d2; font-size: 20px; cursor: pointer;
  }
  #soundHint {
    position: fixed; top: 20px; right: 70px; z-index: 20;
    color: #d8e6bd; font-size: 14px; text-shadow: 0 0 6px #000;
    animation: hintFade 3.4s ease forwards; pointer-events: none;
  }
  @keyframes hintFade { 0%{opacity:0} 15%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
  #replayBtn {
    position: fixed; left: 50%; bottom: 11%; transform: translateX(-50%);
    z-index: 20; display: none;
    padding: 14px 44px; font-size: 20px; min-height: 48px; letter-spacing: 2px;
    background: linear-gradient(92deg,#2a2410,#3a3013);
    color: #ffd98e; border: 1px solid #ff7a1a; border-radius: 8px; cursor: pointer;
    font-family: inherit; box-shadow: 0 0 18px rgba(255,122,26,0.35);
  }
  #replayBtn:active { transform: translateX(-50%) scale(.94); }
</style>
</head>
<body>
<button id="soundBtn">🔊</button>
<div id="soundHint">聲音已開啟</div>
<button id="replayBtn">重新播放</button>
<canvas id="stage"></canvas>

<script>
'use strict';
const GAME_W = 960, GAME_H = 540;
const W = 960, H = 540;
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const soundBtn = document.getElementById('soundBtn');
const soundHint = document.getElementById('soundHint');
const replayBtn = document.getElementById('replayBtn');

function resize() {
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H) || 1;
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', resize); resize();

/* ============================================================
   音訊引擎 — 預告片配樂（全程序化合成、零外部資源）
============================================================ */
let AC = null, master = null, verb = null, verbSend = null, soundOn = true;
function makeImpulse(dur, decay) {
  const sr = AC.sampleRate, n = Math.floor(sr * dur);
  const buf = AC.createBuffer(2, n, sr);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, decay);
  }
  return buf;
}
function initAudio() {
  if (AC) return;
  try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; }
  const comp = AC.createDynamicsCompressor();
  comp.threshold.value = -16; comp.knee.value = 24; comp.ratio.value = 6;
  comp.attack.value = 0.004; comp.release.value = 0.24;
  comp.connect(AC.destination);
  master = AC.createGain(); master.gain.value = 0.9; master.connect(comp);
  verb = AC.createConvolver(); verb.buffer = makeImpulse(1.9, 2.6);
  verbSend = AC.createGain(); verbSend.gain.value = 0.9;
  verbSend.connect(verb); verb.connect(master);
}
function out(node, wet) {
  node.connect(master);
  if (wet > 0) { const g = AC.createGain(); g.gain.value = wet; node.connect(g); g.connect(verbSend); }
}
const rndF = (a, b) => a + Math.random() * (b - a);
function sfxBoom(vol) {
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain();
  o.frequency.setValueAtTime(120, t);
  o.frequency.exponentialRampToValueAtTime(36, t + 0.45);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
  o.connect(g); out(g, 0.25); o.start(t); o.stop(t + 0.65);
  const n = AC.createBufferSource(); n.buffer = makeImpulse(0.12, 3);
  const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 220;
  const ng = AC.createGain(); ng.gain.setValueAtTime(vol * 0.6, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  n.connect(f); f.connect(ng); out(ng, 0.2); n.start(t);
}
function sfxBraam(vol, dur) {
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const f0 = 57.5;
  const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.Q.value = 3;
  lp.frequency.setValueAtTime(180, t);
  lp.frequency.linearRampToValueAtTime(1100, t + dur * 0.35);
  lp.frequency.linearRampToValueAtTime(240, t + dur);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.09);
  g.gain.setValueAtTime(vol, t + dur * 0.55);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  lp.connect(g); out(g, 0.45);
  [1, 1.006, 0.994, 2.003].forEach((m) => {
    const o = AC.createOscillator(); o.type = 'sawtooth';
    o.frequency.value = f0 * m;
    o.connect(lp); o.start(t); o.stop(t + dur + 0.05);
  });
  const sub = AC.createOscillator(); sub.frequency.value = f0 / 2;
  const sg = AC.createGain(); sg.gain.setValueAtTime(vol * 0.8, t);
  sg.gain.exponentialRampToValueAtTime(0.001, t + dur);
  sub.connect(sg); out(sg, 0.1); sub.start(t); sub.stop(t + dur + 0.05);
}
function sfxRiser(dur) {
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const n = AC.createBufferSource();
  const sr = AC.sampleRate, len = Math.floor(sr * dur);
  const buf = AC.createBuffer(1, len, sr);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  n.buffer = buf;
  const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.4;
  bp.frequency.setValueAtTime(260, t);
  bp.frequency.exponentialRampToValueAtTime(4200, t + dur);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.3, t + dur);
  g.gain.linearRampToValueAtTime(0.0001, t + dur + 0.06);
  n.connect(bp); bp.connect(g); out(g, 0.35); n.start(t);
  const o = AC.createOscillator(); o.type = 'sawtooth';
  o.frequency.setValueAtTime(110, t);
  o.frequency.exponentialRampToValueAtTime(440, t + dur);
  const og = AC.createGain(); og.gain.setValueAtTime(0.0001, t);
  og.gain.exponentialRampToValueAtTime(0.12, t + dur);
  og.gain.linearRampToValueAtTime(0.0001, t + dur + 0.06);
  o.connect(og); out(og, 0.3); o.start(t); o.stop(t + dur + 0.1);
}
function sfxTick(vol) {
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const n = AC.createBufferSource(); n.buffer = makeImpulse(0.035, 2.2);
  const hp = AC.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 6400;
  const g = AC.createGain(); g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.035);
  n.connect(hp); hp.connect(g); out(g, 0.1); n.start(t);
}
function sfxClap(vol) {
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const n = AC.createBufferSource(); n.buffer = makeImpulse(0.09, 1.6);
  const f = AC.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 1500; f.Q.value = 0.9;
  const g = AC.createGain(); g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  n.connect(f); f.connect(g); out(g, 0.3); n.start(t);
}
function sfxShot() { // 槍響：低頻震膛＋高頻噪聲
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const n = AC.createBufferSource(); n.buffer = makeImpulse(0.14, 2.4);
  const hp = AC.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 900;
  const g = AC.createGain(); g.gain.setValueAtTime(0.5, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
  n.connect(hp); hp.connect(g); out(g, 0.3); n.start(t);
  const o = AC.createOscillator(); o.frequency.setValueAtTime(150, t);
  o.frequency.exponentialRampToValueAtTime(50, t + 0.1);
  const og = AC.createGain(); og.gain.setValueAtTime(0.4, t);
  og.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  o.connect(og); out(og, 0.1); o.start(t); o.stop(t + 0.15);
}
function pluck(freq, dur, vol, type, wet) {
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const o = AC.createOscillator(); o.type = type || 'square';
  o.frequency.value = freq * rndF(0.997, 1.003);
  const lp = AC.createBiquadFilter(); lp.type = 'lowpass';
  lp.frequency.setValueAtTime(freq * 6, t);
  lp.frequency.exponentialRampToValueAtTime(freq * 1.5, t + dur);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(lp); lp.connect(g); out(g, wet == null ? 0.2 : wet);
  o.start(t); o.stop(t + dur + 0.03);
}
function sfxChime() {
  if (!AC || !soundOn) return;
  [988, 1244.5, 1568, 1975.5].forEach((fq, i) =>
    setTimeout(() => pluck(fq, 0.35, 0.13, 'triangle', 0.55), i * 70));
}
function sfxWhoosh() {
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const n = AC.createBufferSource(); n.buffer = makeImpulse(0.3, 1.5);
  const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.1;
  bp.frequency.setValueAtTime(3000, t);
  bp.frequency.exponentialRampToValueAtTime(500, t + 0.28);
  const g = AC.createGain(); g.gain.setValueAtTime(0.26, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
  n.connect(bp); bp.connect(g); out(g, 0.3); n.start(t);
}
function sfxSting() {
  sfxBoom(0.9); sfxBraam(0.5, 2.2);
  setTimeout(() => sfxChime(), 180);
}

initAudio();
function tryResume() { if (AC && AC.state === 'suspended') { const p = AC.resume(); if (p && p.catch) p.catch(() => {}); } }
tryResume();
setTimeout(() => {
  if (AC && AC.state === 'suspended') soundHint.textContent = '點任意處開啟聲音';
}, 300);
addEventListener('pointerdown', tryResume);
addEventListener('keydown', tryResume);
soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? '🔊' : '🔇';
  if (soundOn) { initAudio(); tryResume(); }
});

/* ---------- 緩動 ---------- */
const easeOut = t => 1 - Math.pow(1 - t, 3);
const easeInOut = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
const easeOutBack = t => { const c = 1.70158; return 1 + (c + 1) * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2); };
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const clamp01 = v => clamp(v, 0, 1);
const lerp = (a, b, t) => a + (b - a) * t;

/* ============================================================
   遊戲同款色票與素材（移植自遊戲本體「三角洲行動」）
============================================================ */
const COL = {
  bg: '#12140f', card: '#181c13', raised: '#1a1e15',
  ink: '#e7e2d2', dim: '#9aa088', line: '#333a27', lineB: '#4a5536',
  accent: '#ff7a1a', olive: '#8fae52', danger: '#d64b3f'
};
const MONO = 'Consolas, "Cascadia Mono", monospace';
const BODY = '"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif';

function bakeCv(w, h, fn) { const c = document.createElement('canvas'); c.width = w; c.height = h; fn(c.getContext('2d')); return c; }

/* ---------- 模擬行動戰術背景（遊戲同款烘焙） ---------- */
const BG_CV = bakeCv(W, H, function (g) {
  g.fillStyle = '#10130c'; g.fillRect(0, 0, W, H);
  const lit = g.createRadialGradient(W / 2, H / 2, 60, W / 2, H / 2, H * 0.85);
  lit.addColorStop(0, 'rgba(143,174,82,0.10)'); lit.addColorStop(1, 'rgba(0,0,0,0.22)');
  g.fillStyle = lit; g.fillRect(0, 0, W, H);
  g.strokeStyle = 'rgba(143,174,82,.08)'; g.lineWidth = 1;
  for (let x = 0; x <= W; x += 48) { g.beginPath(); g.moveTo(x, 0); g.lineTo(x, H); g.stroke(); }
  for (let y = 0; y <= H; y += 48) { g.beginPath(); g.moveTo(0, y); g.lineTo(W, y); g.stroke(); }
  g.strokeStyle = 'rgba(143,174,82,.1)';
  g.setLineDash([6, 8]);
  [[190, 150, 70], [190, 150, 110], [740, 400, 60], [740, 400, 95], [520, 110, 45]].forEach(function (c) {
    g.beginPath(); g.arc(c[0], c[1], c[2], 0, Math.PI * 2); g.stroke();
  });
  g.setLineDash([]);
  g.globalAlpha = 0.05; g.fillStyle = '#000';
  for (let sy = 0; sy < H; sy += 4) g.fillRect(0, sy, W, 1);
  g.globalAlpha = 1;
  g.strokeStyle = 'rgba(255,122,26,.5)'; g.lineWidth = 2;
  g.strokeRect(6, 6, W - 12, H - 12);
  g.strokeStyle = 'rgba(255,122,26,.9)';
  [[6, 6, 1, 1], [W - 6, 6, -1, 1], [6, H - 6, 1, -1], [W - 6, H - 6, -1, -1]].forEach(function (c) {
    g.beginPath();
    g.moveTo(c[0] + 18 * c[2], c[1]);
    g.lineTo(c[0], c[1]);
    g.lineTo(c[0], c[1] + 18 * c[3]);
    g.stroke();
  });
  const vg = g.createRadialGradient(W / 2, H / 2, H * 0.48, W / 2, H / 2, H * 1.02);
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,0.3)');
  g.fillStyle = vg; g.fillRect(0, 0, W, H);
});
const SWEEP_CV = bakeCv(640, 640, function (g) {   /* 雷達掃描楔形 */
  g.translate(320, 320);
  for (let i = 0; i < 26; i++) {
    g.globalAlpha = 0.028 * (1 - i / 26);
    g.fillStyle = '#8fae52';
    g.beginPath(); g.moveTo(0, 0); g.arc(0, 0, 315, -0.03 - i * 0.05, 0.02 - i * 0.05); g.closePath(); g.fill();
  }
});
function bakeGlowDot(color) {
  return bakeCv(28, 28, function (g) {
    const r = g.createRadialGradient(14, 14, 1.5, 14, 14, 13);
    r.addColorStop(0, '#ffffff'); r.addColorStop(0.35, color); r.addColorStop(1, 'rgba(0,0,0,0)');
    g.fillStyle = r; g.fillRect(0, 0, 28, 28);
  });
}
const GLOW_RED = bakeGlowDot('#ff5c3d'), GLOW_GREEN = bakeGlowDot('#8fae52'), GLOW_WARM = bakeGlowDot('#ffb199');
const FLASH_CV = bakeCv(64, 64, function (g) {     /* 槍口星芒 */
  g.translate(32, 32);
  const r = g.createRadialGradient(0, 0, 2, 0, 0, 30);
  r.addColorStop(0, 'rgba(255,245,214,0.95)'); r.addColorStop(0.4, 'rgba(255,207,92,0.5)'); r.addColorStop(1, 'rgba(255,122,26,0)');
  g.fillStyle = r;
  g.beginPath();
  for (let i = 0; i < 8; i++) {
    const a0 = i / 8 * Math.PI * 2, rr = i % 2 === 0 ? 30 : 10;
    g.lineTo(Math.cos(a0) * rr, Math.sin(a0) * rr);
  }
  g.closePath(); g.fill();
});
function drawBG(t) {
  ctx.drawImage(BG_CV, 0, 0);
  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.rotate(t * 0.7);
  ctx.drawImage(SWEEP_CV, -320, -320);
  ctx.restore();
}
function popScale(age, dur) {
  const t = Math.min(1, Math.max(0, age / (dur || 0.22)));
  const c1 = 1.70158, c3 = c1 + 1;
  return Math.max(0, 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2));
}

/* ---------- 補給箱（遊戲同款） ---------- */
function drawCrate(e) {
  const urgent = e.life < 1.2;
  const blink = urgent && Math.floor(e.t * 8) % 2 === 0;
  const s = popScale(e.t) * (1 + Math.sin(e.t * 5) * 0.04);
  const IX = 10, IY = 7;
  ctx.save();
  ctx.translate(e.x, e.y);
  ctx.globalAlpha = 0.32;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(2, 30, 28, 7, 0, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.scale(s, s);
  ctx.globalAlpha = blink ? 0.4 : 1;
  ctx.fillStyle = '#232a19';
  ctx.beginPath();
  ctx.moveTo(-22, -8); ctx.lineTo(-22 - IX, -8 - IY); ctx.lineTo(-22 - IX, 20 - IY); ctx.lineTo(-22, 20); ctx.closePath();
  ctx.fill();
  if (!drawCrate._g) {
    drawCrate._g = ctx.createLinearGradient(0, -8, 0, 22);
    drawCrate._g.addColorStop(0, '#54643a');
    drawCrate._g.addColorStop(1, '#2e3a20');
  }
  ctx.fillStyle = drawCrate._g;
  ctx.fillRect(-22, -8, 44, 30);
  ctx.strokeStyle = '#ffcf5c';
  ctx.lineWidth = 2;
  ctx.strokeRect(-22, -8, 44, 30);
  ctx.fillStyle = '#7c9152';
  ctx.beginPath();
  ctx.moveTo(-22, -8); ctx.lineTo(-22 - IX, -8 - IY); ctx.lineTo(22 - IX, -8 - IY); ctx.lineTo(22, -8); ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,207,92,.6)';
  ctx.lineWidth = 1.2;
  ctx.stroke();
  ctx.strokeStyle = 'rgba(255,207,92,.8)';
  ctx.lineWidth = 3.5;
  ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(0, 22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-22, 7); ctx.lineTo(22, 7); ctx.stroke();
  ctx.fillStyle = '#161b10';
  [[-16, -3], [16, -3], [-16, 16], [16, 16]].forEach(function (p) {
    ctx.beginPath(); ctx.arc(p[0], p[1], 1.6, 0, Math.PI * 2); ctx.fill();
  });
  ctx.drawImage(urgent ? GLOW_RED : GLOW_GREEN, 14 - IX - 8, -8 - IY + 2 - 8, 16, 16);
  ctx.fillStyle = '#fff5d6';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('補給', 0, 12);
  ctx.restore();
}

/* ---------- 無人靶機（遊戲同款） ---------- */
function drawDrone(e) {
  const wob = Math.sin(e.t * 6) * 4;
  const dir = e.vx >= 0 ? 1 : -1;
  const pop = popScale(e.t);
  ctx.save();
  ctx.globalAlpha = 0.28;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(e.x, e.y + 42, 22, 6, 0, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.translate(e.x, e.y + wob);
  ctx.scale(pop, pop);
  ctx.save();
  ctx.rotate(e.t * 3);
  ctx.strokeStyle = 'rgba(214,75,63,.35)';
  ctx.lineWidth = 6;
  ctx.beginPath(); ctx.arc(0, 0, 32, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();
  ctx.save();
  ctx.rotate(e.t * 2);
  for (let i = 0; i < 4; i++) {
    ctx.rotate(Math.PI / 2);
    ctx.strokeStyle = '#7a2620';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(15, 0); ctx.lineTo(30, 0); ctx.stroke();
    ctx.strokeStyle = 'rgba(214,75,63,.7)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(30, 0, 5, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.restore();
  if (!drawDrone._g) {
    drawDrone._g = ctx.createRadialGradient(-4, -4, 2, 0, 0, 20);
    drawDrone._g.addColorStop(0, '#ff8a72');
    drawDrone._g.addColorStop(.55, '#d64b3f');
    drawDrone._g.addColorStop(1, '#7a2620');
  }
  ctx.fillStyle = drawDrone._g;
  ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#3a1512'; ctx.lineWidth = 1.6; ctx.stroke();

const opCache = {};

    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += (p.g || 0) * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);

    ctx.fillStyle = p.col;
    ctx.fillRect(p.x - p.r / 2, p.y - p.r / 2, p.r, p.r);
  }
  ctx.restore();
}

  ctx.fillStyle = op.color;
  ctx.fillRect(0, 0, 4, h);
  ctx.fillStyle = '#10130c';
  ctx.fillRect(20, 18, 84, 84);
  ctx.strokeStyle = COL.line; ctx.lineWidth = 1; ctx.strokeRect(20, 18, 84, 84);
  ctx.drawImage(opPortrait(op.key, selected ? 'alert' : 'idle'), 24, 22, 76, 76);
  if (selected) {
    ctx.fillStyle = 'rgba(255,122,26,0.16)';
    ctx.fillRect(w - 92, 14, 78, 24);
    ctx.strokeStyle = COL.accent; ctx.strokeRect(w - 92, 14, 78, 24);
    text('✓ 已部署', w - 53, 31, 'bold 12px ' + BODY, COL.accent);
  }
  text(op.name, 120, 48, '800 24px ' + BODY, COL.ink, 'left');
  text(op.role, 120, 72, 'bold 11px ' + MONO, op.color, 'left');
  for (let i = 0; i < 3; i++) {
    const sy = 128 + i * 30;
    text(op.stats[i][0], 20, sy + 4, '11px ' + MONO, COL.dim, 'left');
    ctx.fillStyle = '#10130c';
    ctx.fillRect(62, sy - 5, w - 62 - 46, 8);
    ctx.fillStyle = op.color;
    const bp = clamp01((t - 0.3 - i * 0.15) / 0.6);
    ctx.fillRect(62, sy - 5, (w - 62 - 46) * (op.stats[i][1] / 10) * easeOut(bp), 8);
    text(String(op.stats[i][1]), w - 20, sy + 4, '11px ' + MONO, COL.dim, 'right');
  }
  text('模擬加成：' + op.bonus, 20, 242, '11.5px ' + BODY, COL.dim, 'left');
  ctx.restore();
}
function drawAct2(t) {
  ctx.fillStyle = COL.bg; ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 0.05; ctx.fillStyle = '#000';
  for (let sy = 0; sy < H; sy += 4) ctx.fillRect(0, sy, W, 1);
  ctx.globalAlpha = 1;
  const s = t - 6;
  text('幹員檔案', 40, 132, '800 30px ' + BODY, COL.ink, 'left');
  ctx.strokeStyle = COL.line;
  ctx.strokeRect(190, 108, 176, 28);
  text('3 名可選幹員 · 點擊部署', 278, 127, '12px ' + MONO, COL.dim);
  ctx.beginPath(); ctx.moveTo(380, 122); ctx.lineTo(920, 122); ctx.stroke();
  const selT = 10.8;
  for (let i = 0; i < 3; i++) {
    const inP = easeOutBack(clamp01((s - 0.4 - i * 0.35) / 0.55));
    if (inP <= 0) continue;
    const cw = 284, chh = 262;
    const cx0 = 34 + i * (cw + 20);
    ctx.save();
    ctx.globalAlpha = clamp01(inP * 1.4);
    const yOff = (1 - inP) * 70;
    drawOpCard(OPS[i], cx0, 168 + yOff, cw, chh, i === 0 && t > selT, s - 0.4 - i * 0.35);
    ctx.restore();
  }
  if (t > selT) cue('deploy', () => { sfxChime(); sfxClap(0.4); addShake(3); flashA = 0.2; burstSpark(180, 260, '#ff7a1a', 16); });
  drawParticles();
  drawTerminalFrame('OPERATORS', t);
}

/* ---------- 第三幕：模擬行動（遊戲小遊戲同款畫面） ---------- */
const CRATES = [
  { x: 300, y: 300, born: 15.0, dead: 17.0 },
  { x: 620, y: 220, born: 15.4, dead: 18.3 },
  { x: 450, y: 400, born: 16.0, dead: 99 }
];
function chPos(t) { // 準星走位
  const pts = [[14, 480, 270], [16.9, 300, 296], [18.2, 620, 218], [20.5, 700, 262], [22, 700, 262]];
  for (let i = 0; i < pts.length - 1; i++) {
    if (t >= pts[i][0] && t < pts[i + 1][0]) {
      const u = easeInOut((t - pts[i][0]) / (pts[i + 1][0] - pts[i][0]));
      return { x: lerp(pts[i][1], pts[i + 1][1], u), y: lerp(pts[i][2], pts[i + 1][2], u) };
    }
  }
  return { x: 700, y: 262 };
}
function drawAct3(t) {
  drawBG(t);
  const phase = t < 19 ? 1 : 2;
  for (const c of CRATES) {
    if (t < c.born || t > c.dead) continue;
    drawCrate({ x: c.x, y: c.y, t: t - c.born, life: 20 });
  }
  const droneBorn = 19.2, droneDead = 20.62;
  if (t > droneBorn && t < droneDead) {
    drawDrone({ x: 850 - (t - droneBorn) * 105, y: 250, t: t - droneBorn, life: 5, vx: -105 });
  }
  const shots = [
    { at: 17.0, x: 300, y: 296, gain: '+80' },
    { at: 18.3, x: 620, y: 218, gain: '+80' },
    { at: 20.62, x: 700, y: 255, gain: '+150 連段×3' }
  ];
  let recoil = 0, muzzleT = 0;
  for (const sh of shots) {
    const el = t - sh.at;
    if (el > 0 && el < 0.08) muzzleT = 0.08 - el;
    if (el > 0 && el < 0.25) recoil = 1 - el / 0.25;
    if (el > 0) cue('shot' + sh.at, () => {
      sfxShot(); addShake(6); cam.punch = 0.03;
      burstSpark(sh.x, sh.y, '#ffcf5c', 26);
      floater(sh.x, sh.y - 30, sh.gain, '#ffcf5c');
    });
    if (el > 0 && el < 0.1) {
      ctx.save();
      ctx.globalAlpha = 1 - el / 0.1;
      ctx.strokeStyle = 'rgba(255,207,92,0.9)'; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(sh.x - 60, sh.y + 40); ctx.lineTo(sh.x, sh.y); ctx.stroke();
      ctx.restore();
    }
  }
  const cp = chPos(t);
  drawCrosshair(cp.x, cp.y, recoil, muzzleT);
  drawParticles();
  // ---- 遊戲同款 HUD（下移避開 letterbox）----
  const score = t < 17 ? 0 : t < 18.3 ? 80 : t < 20.62 ? 160 : 310;
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = '#9aa088';
  ctx.fillText('SCORE', 24, 88);
  ctx.fillStyle = '#e7e2d2';
  ctx.font = 'bold 24px monospace';
  ctx.fillText(String(score), 24, 112);
  if (t > 20.62) {
    ctx.fillStyle = '#ffcf5c';
    ctx.font = 'bold 15px monospace';
    ctx.fillText('連段 ×3', 24, 136);
  }
  ctx.textAlign = 'center';
  const phaseT2 = phase === 1 ? 20 - (t - 14) : 28 - (t - 19);
  ctx.fillStyle = '#ff7a1a';
  ctx.font = 'bold 26px monospace';
  ctx.fillText(Math.ceil(phaseT2) + 's', W / 2, 96);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#9aa088';
  ctx.font = 'bold 15px monospace';
  ctx.fillText('STAGE ' + phase + ' · ' + (phase === 1 ? '收 · 搜索物資' : '打 · 交戰壓制'), W - 24, 90);
  // 階段橫幅（遊戲同款）
  const bannerA = phase === 1 ? clamp01(2 - (t - 14.2)) : clamp01(2 - (t - 19));
  if (bannerA > 0) {
    ctx.globalAlpha = Math.min(1, bannerA);
    ctx.fillStyle = 'rgba(0,0,0,.55)';
    ctx.fillRect(0, H / 2 - 52, W, 104);
    ctx.fillStyle = '#ff7a1a';
    ctx.textAlign = 'center';
    ctx.font = 'bold 34px "Microsoft JhengHei", sans-serif';
    ctx.fillText(phase === 1 ? '收 · 搜索物資' : '打 · 交戰壓制', W / 2, H / 2 - 6);
    ctx.fillStyle = '#e7e2d2';
    ctx.font = '18px "Microsoft JhengHei", sans-serif';
    ctx.fillText(phase === 1 ? '點擊補給箱蒐集物資！時間越後密度越高！' : '射擊出現的無人靶機！連續命中疊連段加成！', W / 2, H / 2 + 30);
    ctx.globalAlpha = 1;
  }
  if (t > 19) cue('stage2', () => { sfxWhoosh(); sfxBoom(0.5); });
}

/* ---------- 第四幕：撤離＋CTA ---------- */
function drawAct4(t) {
  drawBG(t);
  const s = t - 22;
  const padProg = clamp(s / 2.3, 0, 1) * 100;
  if (s < 3.4) {
    drawPad({ x: 480, y: 300, r: 90, t }, padProg);
    const tap = Math.sin(s * 9) > 0.4;
    drawCrosshair(480 + Math.sin(s * 2.2) * 16, 300 + Math.cos(s * 1.7) * 10, tap ? 0.5 : 0, 0);
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = '#ff7a1a';
    ctx.font = 'bold 26px monospace';
    ctx.fillText(Math.max(1, Math.ceil(24 - s * 3)) + 's', W / 2, 96);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#9aa088';
    ctx.font = 'bold 15px monospace';
    ctx.fillText('STAGE 3 · 撤 · 撤離充能', W - 24, 90);
    if (s > 2.3) {
      cue('extract', () => { sfxChime(); sfxBoom(0.7); addShake(8); flashA = 0.45; burstSpark(480, 300, '#8fae52', 40); });
      ctx.textAlign = 'center';
      ctx.fillStyle = '#8fae52';
      ctx.font = 'bold 15px monospace';
      ctx.fillText('▲ EXTRACTION COMPLETE', W / 2, 150);
      ctx.fillStyle = '#e7e2d2';
      ctx.font = 'bold 40px "Microsoft JhengHei", sans-serif';
      ctx.fillText('撤 離 成 功', W / 2, 200);
    }
  } else {
    const p = clamp01((s - 3.4) / 0.6);
    ctx.globalAlpha = p * 0.85;
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
    ctx.save();
    ctx.globalAlpha = p;
    ctx.font = '800 64px ' + BODY;
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    const tw = ctx.measureText('三角洲行動').width;
    ctx.textAlign = 'left';
    ctx.fillStyle = COL.ink;
    ctx.fillText('三角洲', W / 2 - tw / 2, 226);
    ctx.fillStyle = COL.accent;
    ctx.fillText('行動', W / 2 - tw / 2 + ctx.measureText('三角洲').width, 226);
    ctx.restore();
    if (s > 4.2) {
      text('收 → 打 → 撤 · 三階段模擬行動', W / 2, 276, 'bold 20px ' + BODY, COL.ink);
      ctx.globalAlpha = clamp01((s - 4.5) / 0.6);
      text('威龍 · 紅狼 · 無名 三名幹員｜零號大壩 · 長弓溪谷 · 航天機密', W / 2, 314, '15px ' + BODY, COL.dim);
      ctx.globalAlpha = clamp01((s - 4.9) / 0.6);
      text('滑鼠／觸控＋鍵盤雙支援 · 立即部署', W / 2, 348, '15px ' + BODY, COL.dim);
      ctx.globalAlpha = 1;
      cue('sting', () => { sfxSting(); flashA = 0.5; addShake(6); });
    }
  }
  drawParticles();
}

function draw(t, dt) {
  ctx.clearRect(0, 0, GAME_W, GAME_H);
  cam.shake = Math.max(0, cam.shake - dt * 26);
  cam.punch = Math.max(0, cam.punch - dt * 0.3);
  flashA = Math.max(0, flashA - dt * 2.6);
  if (t < 6) { cam.z = 1.05 - easeOut(clamp01(t / 6)) * 0.05; cam.x = 0; }
  else if (t < 14) { cam.z = 1.0; cam.x = 0; }
  else if (t < 22) { cam.z = 1.04; cam.x = Math.sin(t * 0.5) * 5; }
  else { cam.z = 1.02; cam.x = 0; }
  cam.y = 0;

  ctx.save();
  applyCam();
  if (t < 6) drawAct1(t);
  else if (t < 14) drawAct2(t);
  else if (t < 22) drawAct3(t);
  else drawAct4(t);
  drawFloats(dt);
  ctx.restore();

  /* ---------- 字幕 ---------- */
  if (t < 6) {
    if (t > 3.6) subtitle('高風險撤離行動 · 時限內活著離場', clamp01((t - 3.6) / 0.6));
  } else if (t < 14) {
    if (t < 10.5) subtitle('三名幹員，三種打法', clamp01((t - 6.5) / 0.6) * clamp01((10.5 - t) / 0.4));
    else subtitle('部署威龍——交戰階段擊靶分數 ×1.5', clamp01((t - 10.8) / 0.6));
  } else if (t < 22) {
    if (t < 18.8) subtitle('STAGE 1 收：點擊補給箱蒐集物資', clamp01((t - 14.6) / 0.6) * clamp01((18.8 - t) / 0.4));
    else subtitle('STAGE 2 打：射擊靶機，連續命中疊連段', clamp01((t - 19) / 0.6));
  } else {
    if (t < 25.4) subtitle('STAGE 3 撤：連點訊號圈充能撤離', clamp01((t - 22.3) / 0.6));
    else subtitle('生存下來的，才是贏家。', clamp01((t - 25.6) / 0.6));
  }

  /* ---------- 幕間轉場 ---------- */
  let fadeA = 0;
  for (const b of BOUNDS) {
    const d = t - b;
    if (d >= -0.28 && d < 0) fadeA = Math.max(fadeA, (d + 0.28) / 0.28);
    if (d >= 0 && d < 0.3) fadeA = Math.max(fadeA, 1 - d / 0.3);
    if (d >= -0.02 && d < 0.2) cue('whoosh' + b, () => sfxWhoosh());
    if (d >= -1.3 && d < -1.1) cue('riser' + b, () => sfxRiser(1.25));
  }
  if (t < 0.7) fadeA = Math.max(fadeA, 1 - t / 0.7);
  if (fadeA > 0) { ctx.fillStyle = `rgba(4,5,3,${clamp01(fadeA)})`; ctx.fillRect(0, 0, GAME_W, GAME_H); }

  /* ---------- 閃白 ---------- */
  if (flashA > 0) { ctx.fillStyle = `rgba(255,240,220,${clamp01(flashA)})`; ctx.fillRect(0, 0, GAME_W, GAME_H); }

  /* ---------- letterbox ---------- */
  const lb = 54 * easeOut(clamp01(t / 1.1));
  ctx.fillStyle = '#060704';
  ctx.fillRect(0, 0, GAME_W, lb);
  ctx.fillRect(0, GAME_H - lb, GAME_W, lb);
  ctx.fillStyle = 'rgba(255,122,26,0.3)';
  ctx.fillRect(0, lb - 1, GAME_W, 1);
  ctx.fillRect(0, GAME_H - lb, GAME_W, 1);
  renderSubtitle();
}

function loop(now) {
  if (!playing) return;
  if (startTime === null) startTime = now;
  const t = (now - startTime) / 1000 * (window.SPEED || 1);
  const dt = clamp(t - lastT, 0, 0.1);
  lastT = t;
  const bi = Math.floor(t / BEAT);
  if (bi !== lastBeat && AC && soundOn && AC.state === 'running') { lastBeat = bi; grooveBeat(bi, t); }
  updateParticles(dt);
  if (t >= DURATION) {
    draw(DURATION - 0.01, dt);
    playing = false;
    replayBtn.style.display = 'block';
    return;
  }
  draw(t, dt);
  requestAnimationFrame(loop);
}

function play() {
  startTime = null; lastT = 0; lastBeat = -1;
  firedCues = {};
  particles = []; floats = [];
  cam.shake = 0; cam.punch = 0; flashA = 0;
  playing = true;
  replayBtn.style.display = 'none';
  tryResume();
  requestAnimationFrame(loop);
}
replayBtn.addEventListener('click', play);
play();
</script>
