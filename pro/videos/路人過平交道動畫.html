<!doctype html>
<!-- 專業AI升級 v4 -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>路人過平交道動畫</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; overflow:hidden; background:radial-gradient(circle at 50% 35%, #1a2c40 0%, #0d1826 60%, #060d15 100%);
    font-family:"Noto Sans TC","Microsoft JhengHei","PingFang TC",sans-serif;
    -webkit-user-select:none; user-select:none; touch-action:manipulation; overscroll-behavior:none;
    -webkit-tap-highlight-color:transparent; }
  #stage{ position:fixed; inset:0; }
  canvas{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); }
  #subtitle{ position:absolute; left:50%; bottom:calc(var(--cvB, 7.5%) + 10px); transform:translate(-50%, 14px) scale(.96); max-width:88%; padding:10px 30px;
    font-size:clamp(15px, 2.6vw, 23px); font-weight:900; letter-spacing:2px; text-align:center; color:#fff; white-space:nowrap;
    background:linear-gradient(180deg, rgba(16,28,44,.92), rgba(8,16,28,.72)); border:1px solid rgba(126,200,248,.6); border-radius:999px;
    box-shadow:0 6px 24px rgba(0,0,0,.55), 0 0 18px rgba(126,200,248,.15) inset; text-shadow:0 2px 6px rgba(0,0,0,.8);
    opacity:0; pointer-events:none; transition:opacity .38s ease, transform .38s cubic-bezier(.22,1.2,.36,1); }
  #subtitle.show{ opacity:1; transform:translate(-50%,0) scale(1); }
  #subtitle.warn{ border-color:rgba(255,90,80,.85); box-shadow:0 6px 24px rgba(0,0,0,.55), 0 0 22px rgba(255,60,50,.35); color:#ffd9d4; }
  #subtitle.gold{ border-color:rgba(255,205,80,.9); box-shadow:0 6px 24px rgba(0,0,0,.55), 0 0 26px rgba(255,176,32,.38); color:#ffe9b0; }
  .uibtn{ position:absolute; z-index:9; font-family:inherit; font-weight:900; letter-spacing:2px; color:#d8ecff; cursor:pointer;
    min-width:48px; min-height:48px;
    background:linear-gradient(180deg, rgba(20,36,56,.88), rgba(10,20,32,.88)); border:1px solid rgba(126,200,248,.55); border-radius:999px;
    text-shadow:0 1px 3px rgba(0,0,0,.7); transition:transform .18s cubic-bezier(.22,1.4,.36,1), box-shadow .18s ease, opacity .3s ease; }
  .uibtn:hover{ transform:scale(1.06); box-shadow:0 0 18px rgba(126,200,248,.4); }
  .uibtn:active{ transform:scale(.94); transition-duration:.05s; box-shadow:0 0 22px rgba(126,200,248,.55); }
  #sndBtn{ top:max(14px, env(safe-area-inset-top)); right:max(14px, env(safe-area-inset-right)); font-size:15px; padding:12px 18px; }
  #replayBtn{ left:50%; top:64%; transform:translate(-50%,0) scale(.6); font-size:clamp(18px,3.2vw,26px); padding:14px 44px;
    background:linear-gradient(180deg,#4da3e8,#2b6cb0); color:#eaf6ff; border:2px solid #d8ecff;
    box-shadow:0 8px 30px rgba(43,108,176,.6); opacity:0; pointer-events:none; }
  #replayBtn.show{ opacity:1; pointer-events:auto; transform:translate(-50%,0) scale(1);
    transition:transform .5s cubic-bezier(.22,1.6,.36,1), opacity .4s ease; }
  #replayBtn:hover{ transform:translate(-50%,0) scale(1.08); }
  #replayBtn:active{ transform:translate(-50%,0) scale(.94); transition-duration:.05s; }
  #replayBtn:focus-visible, #sndBtn:focus-visible, #altBtn:focus-visible{ outline:3px solid #d8ecff; outline-offset:2px; }
  /* v4 第二結局：夜間版重播鈕 */
  #altBtn{ left:50%; top:74%; transform:translate(-50%,0) scale(.6); font-size:clamp(14px,2.4vw,18px); padding:11px 26px;
    background:linear-gradient(180deg, rgba(24,40,64,.94), rgba(12,22,38,.94)); color:#cfe6ff; border:2px solid #7ec8f8;
    box-shadow:0 8px 24px rgba(20,44,78,.55); opacity:0; pointer-events:none; }
  #altBtn.show{ opacity:1; pointer-events:auto; transform:translate(-50%,0) scale(1);
    transition:transform .5s cubic-bezier(.22,1.6,.36,1), opacity .4s ease; }
  #altBtn:hover{ transform:translate(-50%,0) scale(1.06); box-shadow:0 0 18px rgba(126,200,248,.5); }
  #altBtn:active{ transform:translate(-50%,0) scale(.94); transition-duration:.05s; }
  @media (max-width:480px){
    #subtitle{ padding:8px 16px; letter-spacing:1px; max-width:94%; }
  }
  #hint{ position:absolute; z-index:8; left:50%; top:calc(max(14px, env(safe-area-inset-top)) + 58px); transform:translateX(-50%);
    max-width:80%; padding:10px 20px; font-size:clamp(12px,2vw,15px); font-weight:700; letter-spacing:1px; color:#d8ecff; text-align:center;
    background:rgba(10,20,32,.85); border:1px solid rgba(126,200,248,.5); border-radius:999px;
    box-shadow:0 4px 16px rgba(0,0,0,.5); opacity:0; pointer-events:none;
    animation:hintFade 6.5s ease .7s 1 forwards; }
  @keyframes hintFade{ 0%{opacity:0; transform:translateX(-50%) translateY(-10px);}
    7%{opacity:1; transform:translateX(-50%) translateY(0);} 82%{opacity:1;} 100%{opacity:0;} }
</style>
</head>
<body>
<div id="stage">
  <canvas id="cv"></canvas>
  <div id="subtitle"></div>
  <button id="sndBtn" class="uibtn"><svg id="sndIco" width="18" height="18" viewBox="0 0 24 24" style="vertical-align:-3px" aria-hidden="true"><path fill="currentColor" d="M4 9v6h4l5 4V5L8 9H4z"/><path id="sndX" fill="none" d="M16.5 9.5l5 5m0-5l-5 5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/><g id="sndWave" style="display:none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"><path d="M16 9a4.4 4.4 0 0 1 0 6"/><path d="M18.6 7a8 8 0 0 1 0 10"/></g></svg> <span id="sndLbl">聲音：關</span></button>
  <button id="replayBtn" class="uibtn">▶ 重新播放</button>
  <button id="altBtn" class="uibtn"><svg width="16" height="16" viewBox="0 0 24 24" style="vertical-align:-2px" aria-hidden="true"><path fill="currentColor" d="M13 2a10 10 0 1 0 8.5 15.2A8 8 0 0 1 13 2z"/></svg> 夜間版</button>
  <div id="hint">自動播放中 ─ 點右上角「聲音」鈕開啟音效</div>
</div>
<script>
'use strict';
/* =====================================================================
   路人過平交道動畫 ── 專業AI升級版
   三幕劇：Ⅰ 走近平交道 → Ⅱ 柵欄放下・火車呼嘯而過 → Ⅲ 停看聽・安全通過
   ===================================================================== */
const W = 960, H = 540, CX = 480, CY = 300;
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const subEl = document.getElementById('subtitle');
const sndBtn = document.getElementById('sndBtn'), replayBtn = document.getElementById('replayBtn');
const altBtn = document.getElementById('altBtn');
function resize(){
  const s = Math.min(innerWidth / W, innerHeight / H), dpr = Math.min(devicePixelRatio || 1, 2);
  cv.width = Math.round(W*s*dpr); cv.height = Math.round(H*s*dpr);
  cv.style.width = W*s+'px'; cv.style.height = H*s+'px';
  cv._base = s*dpr;
  // 畫佈下緣位置 → 字幕、重播鈕貼齊畫面（直式/橫式皆然）
  document.documentElement.style.setProperty('--cvB', Math.max(0,(innerHeight - H*s)/2) + 'px');
  replayBtn.style.top = Math.round(innerHeight/2 + H*s*0.14) + 'px';
  altBtn.style.top = Math.round(innerHeight/2 + H*s*0.14 + 64) + 'px';
}
addEventListener('resize', resize); resize();

/* ---------- 緩動與工具 ---------- */
const E = {
  inQuad:t=>t*t, outQuad:t=>1-(1-t)*(1-t), inCubic:t=>t*t*t, outCubic:t=>1-Math.pow(1-t,3),
  inOutCubic:t=> t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2,
  outBack:t=> 1 + 2.7*Math.pow(t-1,3) + 1.7*Math.pow(t-1,2),
  outBounce(t){ const n=7.5625, d=2.75;
    if(t<1/d) return n*t*t;
    if(t<2/d) return n*(t-=1.5/d)*t+0.75;
    if(t<2.5/d) return n*(t-=2.25/d)*t+0.9375;
    return n*(t-=2.625/d)*t+0.984375; },
  outElastic:t=> t===0?0 : t===1?1 : Math.pow(2,-10*t)*Math.sin((t*10-0.75)*(Math.PI*2/3))+1
};
const clamp=(v,a,b)=> v<a?a : v>b?b : v, lerp=(a,b,t)=> a+(b-a)*t;
const ss=(t,a,b)=> clamp((t-a)/(b-a),0,1), rnd=(a,b)=> a+Math.random()*(b-a), TAU=Math.PI*2;
/* 漸層快取：座標恆定的漸層只建一次，消除每幀配置 */
const GC = {};
function grd(key, make){ let g = GC[key]; if(!g){ g = make(); GC[key] = g; } return g; }

/* ---------- 時間軸 ---------- */
const TOTAL = 35;
let T = 0, WT = 0, freeze = 0, shake = 0, flash = 0, ended = false;
let night = false;   // v4 第二結局：夜間版
function timeScaleAt(t){
  if(t>15.2 && t<15.7) return 0.5;   // 火車衝入前的懸念慢動作
  return 1;
}

/* ---------- Web Audio（預設靜音） ---------- */
let AC=null, master=null, windGain=null, rumbleGain=null, audioOn=false;
let nextBellT=0, nextStepT=0, nextChirpT=4;
function initAudio(){
  AC = new (window.AudioContext || window.webkitAudioContext)();
  master = AC.createGain(); master.gain.value = 0;
  // 總線壓縮器：火車隆隆＋汽笛＋警鈴同時疊加也不削波
  const comp = AC.createDynamicsCompressor();
  comp.threshold.value = -14; comp.knee.value = 22; comp.ratio.value = 9;
  comp.attack.value = 0.003; comp.release.value = 0.24;
  master.connect(comp); comp.connect(AC.destination);
  const mk = (freq, gv)=>{
    const len = AC.sampleRate*2, buf = AC.createBuffer(1,len,AC.sampleRate), d = buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i] = Math.random()*2-1;
    const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
    const lp = AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = freq;
    const g = AC.createGain(); g.gain.value = gv;
    src.connect(lp); lp.connect(g); g.connect(master); src.start();
    return g;
  };
  windGain = mk(500, 0.02);
  rumbleGain = mk(180, 0);
}
function tone(freq, dur, type, vol, slide, delay){
  if(!audioOn || !AC) return;
  const t0 = AC.currentTime + (delay||0);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(28, freq+slide), t0+dur);
  g.gain.setValueAtTime(0.0001, t0); g.gain.exponentialRampToValueAtTime(vol, t0+0.015); g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  o.connect(g); g.connect(master); o.start(t0); o.stop(t0+dur+0.05);
}
const sfx = {
  bell(){ tone(1568,0.16,'square',0.14); },                 // 平交道警鈴（致敬原作 1600Hz 方波）
  horn(vol){ for(const f of [440,554]) tone(f,0.75,'sawtooth',vol||0.15); },
  motor(up){ tone(up?200:320, 0.7, 'sawtooth', 0.05, up?130:-130); },
  step(){ tone(180,0.05,'triangle',0.05,-40); },
  chirp(){ const f=rnd(2300,3200); tone(f,0.07,'sine',0.045,300); tone(f*1.08,0.06,'sine',0.035,-240,0.09); },
  ok(){ tone(784,0.12,'square',0.1); tone(1046,0.2,'square',0.1,0,0.12); },
  jingle(){ [523,659,784,1047].forEach((f,i)=> tone(f,0.3,'triangle',0.13,0,i*0.14)); }
};

/* ---------- 粒子・漫畫字 ---------- */
let parts = [], comics = [];
const MAX_PARTS = 300;   // 粒子硬上限：保 60fps
function pushPart(p){ if(parts.length < MAX_PARTS) parts.push(p); }
function pDust(x,y,n,dir){ for(let i=0;i<n;i++){
  pushPart({k:'dust',x:x+rnd(-12,12),y:y+rnd(-4,4),vx:rnd(30,160)*(dir||1)+rnd(-20,20),vy:rnd(-46,-8),life:rnd(.3,.7),max:.7,s:rnd(3,8)}); } }
function pLeaf(x,y,dir){ pushPart({k:'leaf',x,y,vx:rnd(120,320)*dir,vy:rnd(-80,20),life:rnd(.5,1.1),max:1.1,s:rnd(3,6),rot:rnd(0,TAU),spin:rnd(4,10)}); }
function pNote(x,y){ pushPart({k:'note',x,y,vx:rnd(-8,14),vy:rnd(-46,-26),life:1.1,max:1.1,s:rnd(13,17),ph:rnd(0,TAU)}); }
function pSpark(x,y,n){ for(let i=0;i<n;i++){ const a=rnd(0,TAU),sp=rnd(20,80);
  pushPart({k:'star',x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-30,life:rnd(.5,.9),max:.9,s:rnd(3,6),rot:rnd(0,TAU)}); } }
function updateParts(dt){
  let n = 0;                            // 就地壓縮：零每幀陣列配置
  for(let i=0;i<parts.length;i++){
    const p = parts[i];
    p.life -= dt; p.x += p.vx*dt; p.y += p.vy*dt;
    if(p.k==='dust'){ p.vx*= (1-2*dt); p.vy += 30*dt; }
    if(p.k==='leaf'){ p.vy += 90*dt; p.rot += p.spin*dt; p.vx *= (1-0.8*dt); }
    if(p.k==='note'){ p.ph += dt*5; p.x += Math.sin(p.ph)*16*dt; }
    if(p.k==='star'){ p.vy += 50*dt; p.rot += 4*dt; }
    if(p.life > 0) parts[n++] = p;
  }
  parts.length = n;
  n = 0;
  for(let i=0;i<comics.length;i++){ const c = comics[i]; c.t += dt; if(c.t < c.dur) comics[n++] = c; }
  comics.length = n;
}
function drawParts(){
  for(const p of parts){
    const a = clamp(p.life/p.max,0,1);
    if(p.k==='dust'){ ctx.fillStyle='rgba(150,130,100,'+(a*0.4)+')';
      ctx.beginPath(); ctx.arc(p.x,p.y,p.s*(1.7-a),0,TAU); ctx.fill(); }
    else if(p.k==='leaf'){ ctx.globalAlpha=a; ctx.fillStyle='#6a9a3a';
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.beginPath(); ctx.ellipse(0,0,p.s,p.s*0.5,0,0,TAU); ctx.fill(); ctx.restore(); }
    else if(p.k==='note'){ ctx.globalAlpha=a; ctx.fillStyle='#3a6ea8';
      ctx.font='900 '+p.s+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('♪', p.x, p.y); }
    else if(p.k==='star'){ ctx.globalAlpha=a; ctx.fillStyle='#ffe27a';
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.beginPath();
      for(let j=0;j<8;j++){ const an=j*Math.PI/4, r=j%2===0?p.s:p.s*0.42;
        j===0?ctx.moveTo(Math.cos(an)*r,Math.sin(an)*r):ctx.lineTo(Math.cos(an)*r,Math.sin(an)*r); }
      ctx.closePath(); ctx.fill(); ctx.restore(); }
  }
  ctx.globalAlpha = 1;
}
function comic(x,y,text,col,big){ comics.push({x,y,text,col:col||'#fff',t:0,dur:0.95,ang:rnd(-0.12,0.12),big:big||30}); }
function drawComics(){
  for(const c of comics){
    const k = c.t/c.dur, sc = E.outBack(clamp(k*2.4,0,1));
    ctx.save(); ctx.translate(c.x, c.y - k*24); ctx.rotate(c.ang); ctx.scale(sc,sc);
    ctx.globalAlpha = 1 - E.inCubic(ss(k,0.6,1));
    ctx.font = '900 '+c.big+'px "Noto Sans TC","Microsoft JhengHei",sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.lineWidth = 6; ctx.strokeStyle = '#1a2a3a'; ctx.strokeText(c.text,0,0);
    ctx.fillStyle = c.col; ctx.fillText(c.text,0,0);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

/* ---------- 鏡頭 ---------- */
const camKF = [
  {t:0, x:480,y:296,z:1.3}, {t:3.6, x:480,y:288,z:1.06},
  {t:4.2, x:480,y:238,z:1.32, cut:true}, {t:8.6, x:480,y:272,z:1.26},
  {t:9.6, x:452,y:292,z:1.24}, {t:12.4, x:452,y:288,z:1.32},
  {t:14.4, x:480,y:308,z:1.06}, {t:19.6, x:480,y:312,z:1.1},
  {t:21.2, x:448,y:292,z:1.26}, {t:23.4, x:474,y:270,z:1.36},
  {t:26.4, x:480,y:330,z:1.16}, {t:30.4, x:480,y:388,z:1.3},
  {t:33.2, x:480,y:300,z:1.05}, {t:35, x:480,y:298,z:1.03}
];
const cam = {x:480,y:296,z:1.3,sx:0,sy:0};
function camAt(t){
  let i=0;
  while(i<camKF.length-1 && camKF[i+1].t <= t) i++;
  const a = camKF[i], b = camKF[Math.min(i+1,camKF.length-1)];
  if(a===b || b.cut) return {x:a.x,y:a.y,z:a.z};
  const k = E.inOutCubic(ss(t,a.t,b.t));
  return {x:lerp(a.x,b.x,k), y:lerp(a.y,b.y,k), z:lerp(a.z,b.z,k)};
}
function layer(p, fn){
  ctx.save();
  const lz = 1 + (cam.z-1)*(0.55+0.45*p);
  ctx.translate(W/2,H/2); ctx.scale(lz,lz);
  ctx.translate(-(CX+(cam.x-CX)*p+cam.sx*p), -(CY+(cam.y-CY)*p+cam.sy*p));
  fn(); ctx.restore();
}

/* ---------- 字幕 ---------- */
const subs = [
  {t0:0.8, t1:3.6,  cls:'',     text:'放學的路上，有一座平交道……'},
  {t0:4.4, t1:7.4,  cls:'',     text:'小路人哼著歌，蹦蹦跳跳地走過來'},
  {t0:9.7, t1:12.3, cls:'warn', text:'叮叮叮！警示燈亮了，柵欄慢慢放下'},
  {t0:12.9,t1:14.7, cls:'',     text:'小路人乖乖停下來，安全等待'},
  {t0:15.7,t1:17.6, cls:'warn', text:'轟隆轟隆──火車來了！'},
  {t0:21.2,t1:23.2, cls:'',     text:'火車過去了，柵欄升起來囉'},
  {t0:23.8,t1:26.2, cls:'gold', text:'先左看、再右看，確認安全！'},
  {t0:27.0,t1:29.6, cls:'',     text:'安全通過平交道～'},
  {t0:30.6,t1:33.6, cls:'gold', text:'停・看・聽 ── 安全最重要！'}
];
let curSub = null;
function updateSubtitle(){
  let hit = null;
  for(const s of subs) if(T>=s.t0 && T<s.t1){ hit = s; break; }
  if(hit !== curSub){
    curSub = hit;
    if(hit){ subEl.textContent = hit.text; subEl.className = hit.cls+' show'; }
    else subEl.classList.remove('show');
  }
}

/* ---------- 場景常數與狀態 ---------- */
const RAIL_TOP = 300, RAIL_BOT = 368;      // 鐵道碴石帶
function hw(y){ return 20 + Math.max(0,(y-150))*0.30; }   // 步道半寬（透視）
function pscale(y){ return clamp(0.5 + (y-150)/390*0.95, 0.4, 1.6); }
const ped = {y:132, step:0, walking:false, look:0, wave:0, brace:0, happy:false, blinkT:0, bob:0};
const train = {x:-400, active:false, speed:0};
let bellActive = false, barrier = 0;        // barrier 0=升起 1=放下
let lightPhase = 0;
const birds = [ {x:400,y:0,fly:false,vx:0,vy:0,ph:rnd(0,TAU)}, {x:560,y:0,fly:false,vx:0,vy:0,ph:rnd(0,TAU)} ];

/* ---------- 事件 ---------- */
let events = [];
function ev(t, fn){ events.push({t, fn, done:false}); }
function buildEvents(){
  events = [];
  ev(9.5, ()=>{ bellActive = true; comic(420, 210, '叮叮叮！', '#ff6a5a', 26); });
  ev(10.0, ()=> sfx.motor(false));
  ev(12.6, ()=> comic(560, 250, '叮叮叮', '#ff6a5a', 22));
  ev(14.5, ()=>{ sfx.horn(0.06); });
  ev(14.55, ()=> comic(150, 262, '嗚──嗚──！', '#d8ecff', 28));   // 汽笛的「聽」有畫面
  ev(14.8, ()=>{ for(const b of birds){ b.fly = true; b.vx = rnd(-90,-40); b.vy = rnd(-120,-70); } });
  ev(15.5, ()=>{ train.active = true; shake = 5; flash = 0.14; });
  ev(16.3, ()=>{ sfx.horn(0.18); comic(300, 250, '轟隆隆！', '#d8ecff', 34); });
  ev(17.8, ()=> comic(660, 250, '轟隆隆', '#d8ecff', 28));
  ev(20.6, ()=>{ bellActive = false; });
  ev(21.0, ()=> sfx.motor(true));
  ev(24.0, ()=> comic(430, 200, '左看', '#ffe27a', 26));
  ev(25.0, ()=> comic(530, 200, '右看', '#ffe27a', 26));
  ev(25.8, ()=>{ comic(480, 180, 'OK！', '#aee239', 30); sfx.ok(); pSpark(480, 220, 8); });

/* ---------- 編舞 ---------- */
function choreo(dt){
  ped.walking = false; ped.brace = 0;
  /* 路人：由遠而近走向平交道 */
  if(T < 4.0){ ped.y = 132; }   // 與 4.0s 起步位置一致，消除跳位
  else if(T < 9.8){ ped.y = lerp(132, 268, E.inOutCubic(ss(T,4.0,9.8))); ped.walking = true; }
  else if(T < 26.0){
    ped.y = 268 + 4*E.outBack(ss(T,9.8,10.3)) - 4;
    if(T > 15.3 && T < 19.6) ped.brace = 1;                  // 強風吹襲，壓帽子
    if(T > 23.4 && T < 24.6) ped.look = -E.inOutCubic(ss(T,23.4,23.9)) * (1-E.inOutCubic(ss(T,24.35,24.6)));
    else if(T >= 24.6 && T < 25.8) ped.look = E.inOutCubic(ss(T,24.6,25.0)) * (1-E.inOutCubic(ss(T,25.5,25.8)));
    else ped.look = 0;
  }
  else if(T < 30.2){ ped.y = lerp(268, 470, E.inOutCubic(ss(T,26.0,30.2))); ped.walking = true; ped.look = 0; }
  else { ped.y = 470; ped.happy = true;
    ped.wave = E.outBack(ss(T,30.6,31.2)) * (T<33.6 ? 1 : 1-E.inOutCubic(ss(T,33.6,34.2)));
  }
  if(ped.walking){ ped.step += dt*9; ped.bob = Math.abs(Math.sin(ped.step))*5; }
  else { ped.step = 0; ped.bob = Math.sin(WT*2.2)*1.2; }
  /* 柵欄 */
  if(T < 10.0) barrier = 0;
  else if(T < 12.2) barrier = E.outBounce(ss(T,10.0,12.2));
  else if(T < 21.0) barrier = 1;
  else if(T < 23.0) barrier = 1 - E.inOutCubic(ss(T,21.0,22.8)) * (1 + 0.06*Math.sin(ss(T,21,23)*Math.PI));
  else barrier = 0;
  barrier = clamp(barrier, 0, 1.05);
  /* 火車 */
  if(train.active){
    train.speed = 730;
    train.x += train.speed * dt;
    if(T > 15.5 && T < 19.6) shake = Math.max(shake, 2.4 + Math.sin(WT*40)*0.5);
    if(train.x > 2400) train.active = false;
    if(Math.random() < 0.3 && train.x > -400 && train.x < 1400){
      pDust(rnd(100,860), RAIL_BOT+6, 1, 1);
      if(Math.random()<0.3) pLeaf(rnd(200,760), rnd(320,360), Math.random()<0.5?-1:1);
    }
  }
  /* 音樂符號（哼歌） */
  if(ped.walking && T < 9.8 && Math.random() < 0.03) pNote(500, ped.y - 90*pscale(ped.y));
  /* 鳥（dt 步進，幀率無關） */
  for(const b of birds){
    if(b.fly){ b.x += b.vx*dt; b.y += b.vy*dt; b.vy -= 36*dt; }
  }
  lightPhase = Math.floor(WT*2.4) % 2;
}

    T = Math.min(T + step, TOTAL);
    for(const e of events) if(!e.done && T >= e.t){ e.done = true; e.fn(); }
    choreo(step);
    updateParts(step);
    // 聲音排程（鈴聲、腳步、鳥鳴、隆隆聲）
    if(audioOn){
      if(bellActive && WT >= nextBellT){ sfx.bell(); nextBellT = WT + 0.42; }

      if(WT >= nextChirpT){ if(!train.active && !bellActive) sfx.chirp(); nextChirpT = WT + rnd(2.5,5.5); }

        else if(T>=19.6 && T<21.2) target = 0.42*(1-ss(T,19.6,21.0));

  function read(n,cb){
