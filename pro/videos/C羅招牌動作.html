<title>SIUUU — C羅招牌動作</title>
<style>
  html,body{margin:0;height:100%;background:#05070f;overflow:hidden;touch-action:none;
    -webkit-user-select:none;user-select:none;font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif}
  #stage{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:block;background:#05070f}
  .btn{position:absolute;z-index:10;border:1px solid rgba(255,255,255,.25);color:#f2ecdc;
    background:rgba(10,14,26,.55);backdrop-filter:blur(4px);border-radius:999px;
    font-family:inherit;font-size:15px;letter-spacing:.12em;padding:12px 20px;cursor:pointer;
    min-height:48px;min-width:48px;transition:all .25s ease}
  .btn{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .btn:hover{border-color:rgba(255,209,102,.8);color:#ffd166;transform:translateY(-1px)}
  .btn:active{transform:scale(.94);background:rgba(255,209,102,.28);border-color:#ffd166;color:#fff;transition:all .06s}
  #replayBtn:active{transform:translate(-50%,0) scale(.94)}
  #soundBtn{top:max(14px, env(safe-area-inset-top));right:max(14px, env(safe-area-inset-right))}
  #replayBtn{left:50%;bottom:12%;transform:translate(-50%,30px);opacity:0;pointer-events:none;
    font-size:18px;font-weight:700;padding:14px 44px;min-height:56px;border:2px solid #ffd166;color:#ffd166;
    background:rgba(20,10,10,.6);box-shadow:0 0 24px rgba(255,209,102,.25);letter-spacing:.3em}
  #replayBtn.show{opacity:1;transform:translate(-50%,0);pointer-events:auto}
  #replayBtn:hover{background:#ffd166;color:#1a0e0e;box-shadow:0 0 40px rgba(255,209,102,.6)}
  #hint{position:absolute;z-index:9;top:max(16px,env(safe-area-inset-top));left:50%;
    background:rgba(10,14,26,.75);border:1px solid rgba(255,209,102,.45);color:#f2ecdc;
    border-radius:999px;padding:10px 20px;font-size:14px;letter-spacing:.06em;
    pointer-events:none;opacity:0;transform:translate(-50%,-8px);white-space:nowrap}
  #hint.run{animation:hintio 5.5s ease .5s 1 both}
  @keyframes hintio{0%{opacity:0;transform:translate(-50%,-8px)}
    9%,82%{opacity:1;transform:translate(-50%,0)}100%{opacity:0;transform:translate(-50%,-6px)}}

<body>
<canvas id="stage"></canvas>
<button class="btn" id="soundBtn" type="button">聲音：關</button>
<button class="btn" id="replayBtn" type="button">重新播放</button>
<div id="hint" class="run">▶ 自動播放中 ・ 點右上「聲音」開啟音效</div>
<script>
'use strict';
/* ============================================================
   SIUUU — C羅招牌動作（專業AI升級版）
   五個招牌時刻的電影化重現：電梯球、滯空頭槌、倒掛金鈎、
   Chop 變向、以及最後的 SIUUU 慶祝。
   ============================================================ */
const W = 960, H = 540, GY = 505;
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
function resize(){
  const s = Math.min(innerWidth / W, innerHeight / H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = Math.max(1, Math.round(W * s * dpr)); canvas.height = Math.max(1, Math.round(H * s * dpr));
  canvas.style.width = W * s + 'px'; canvas.style.height = H * s + 'px';
  ctx.setTransform(s * dpr, 0, 0, s * dpr, 0, 0);
}
addEventListener('resize', resize); resize();

/* ---------- OpenMoji 向量圖示（內嵌 data URI，零外部資源） ---------- */
function svgImg(body, vb){
  const s = '<svg xmlns="ht' + 'tp://www.w3.org/2000/svg" viewBox="' + (vb || '0 0 72 72') + '">' + body + '</svg>';
  const im = new Image();
  im.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(s);
  return im;
}
const IMG_TROPHY = svgImg(`<g id="color"> <path fill="#fcea2b" d="m41.5853,12.081l-21.3404-.1065c.072.333,2.1834,8.7995,3.9434,17.6035.112.562.239,1.1.373,1.616.04.154.084.3.126.451.1.365.207.721.32,1.064.051.154.1.3.156.453.1213.3413.249.6713.383.99.049.117.1.236.147.35.183.413.376.81.582,1.183l.01.019c.2198.3981.4604.7843.721,1.157l.025.034c.2309.3262.4792.6397.744.939.042.047.085.093.128.139.2358.258.4852.5034.747.735.042.037.084.076.127.112,2.0451,1.6637,4.6303,2.5178,7.264,2.4.9852.0032,1.968-.1,2.931-.308,4.4137-10.1309,4.3193-19.5704,2.613-28.831Z"/> <path fill="#f1b31c" d="m41.5853,12.081c.6086,9.4384,1.8951,17.5-3.112,29.828,4.706-1.027,8.576-5.732,9.922-12.46,1.457-7.282,3.1185-16.6378,3.1935-16.9758,0,0-10.0035-.3922-10.0035-.3922Z"/> <path fill="#fcea2b" d="m31.4213,51.333h-3.871v7.167h10.958v-7.167h-7.087Z"/> <path fill="#f1b31c" d="m43.8833,51.333h-5.375v7.167h5.375v-7.167Z"/> <circle cx="36.0373" cy="24.581" r="4" fill="#f1b31c"/> </g> <g id="line"> <path fill="none" stroke="#000" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m52.219,11.832c.1581,0,.275.1446.2389.2984-.2055.8767-.9426,4.2922-3.5876,17.5156-1.588,7.942-5.5,12.572-12.833,12.572s-11.245-4.5-12.833-12.443c-2.414-11.8492-3.667-17.943-3.667-17.943h32.6817Z"/> <path fill="none" stroke="#000" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m23.0443,31.479s.079-.261-5.421-3.928c-2.528-1.683-5.459-3.9-5.459-6.943s2.5-5.11,5.539-5.11h1.513"/> <path fill="none" stroke="#000" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m48.7113,31.766s.079-.261,5.579-3.928c2.528-1.683,5.541-3.9,5.541-6.943-.0146-2.842-2.3303-5.1341-5.1723-5.1196-.0963.0005-.1926.0037-.2887.0096h-2.154"/> <rect x="26.5503" y="50.332" width="18.333" height="9.167" fill="none" stroke="#000" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/> <circle cx="36.0373" cy="24.581" r="5" fill="none" stroke="#000" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/> <line x1="36.0373" x2="36.0373" y1="50.332" y2="42.218" fill="none" stroke="#000" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/> </g>`);

/* ---------- 緩動工具 ---------- */
const clamp01 = x => Math.max(0, Math.min(1, x));
const lerp = (a, b, t) => a + (b - a) * t;
const eIO = t => t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2, eO = t => 1 - Math.pow(1 - t, 3);
const eI = t => t * t * t, eOB = t => 1 + 2.70158 * Math.pow(t - 1, 3) + 1.70158 * Math.pow(t - 1, 2);
function seg(t, a, b, ez){ return (ez || eIO)(clamp01((t - a) / (b - a))); }
function rnd(i){ const x = Math.sin(i * 127.1 + 311.7) * 43758.5453; return x - Math.floor(x); }

/* ---------- 關鍵影格取樣 ---------- */
function kf(t, frames){
  if (t <= frames[0][0]) return Object.assign({}, frames[0][1]);
  const last = frames[frames.length - 1];
  if (t >= last[0]) return Object.assign({}, last[1]);
  for (let i = 0; i < frames.length - 1; i++){
    const A = frames[i], B = frames[i + 1];
    if (t >= A[0] && t <= B[0]){
      const u = (B[2] || eIO)((t - A[0]) / (B[0] - A[0]));
      const o = {};
      for (const k in B[1]){
        const av = (A[1][k] !== undefined) ? A[1][k] : B[1][k];
        o[k] = av + (B[1][k] - av) * u;
      }
      for (const k in A[1]) if (!(k in o)) o[k] = A[1][k];
      return o;
    }
  }
  return Object.assign({}, last[1]);
}

/* ---------- 攝影機 ---------- */
const cam = { x: 0, y: 0, z: 1, tx: 0, ty: 0, tz: 1 };
let shakeMag = 0, shX = 0, shY = 0, flashA = 0;
function camSnap(){ cam.x = cam.tx; cam.y = cam.ty; cam.z = cam.tz; }
function camUpdate(dt){
  const k = 1 - Math.pow(0.02, dt);
  cam.x += (cam.tx - cam.x) * k; cam.y += (cam.ty - cam.y) * k; cam.z += (cam.tz - cam.z) * k;
  shakeMag *= Math.pow(0.0006, dt);
  shX = (Math.random() * 2 - 1) * shakeMag; shY = (Math.random() * 2 - 1) * shakeMag;
  flashA = Math.max(0, flashA - dt * 2.6);
}
function applyCam(f){
  ctx.save();
  ctx.translate(W / 2 + shX * f, H / 2 + shY * f);
  ctx.scale(cam.z, cam.z);
  ctx.translate(-W / 2 - cam.x * f, -H / 2 - cam.y);
}

/* ---------- 音效（Web Audio 合成，預設靜音） ---------- */
let AC = null, master = null, crowdGain = null, soundOn = false;
let excite = 0.25, exciteBoost = 0;
function initAudio(){
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  master = AC.createGain(); master.gain.value = 0; master.connect(AC.destination);
  const len = AC.sampleRate * 2;
  const buf = AC.createBuffer(1, len, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
  const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 480;
  crowdGain = AC.createGain(); crowdGain.gain.value = 0.05;
  src.connect(lp); lp.connect(crowdGain); crowdGain.connect(master); src.start();
}
function setSound(on){
  soundOn = on;
  document.getElementById('soundBtn').textContent = on ? '聲音：開' : '聲音：關';
  if (on){
    initAudio();
    if (AC.state === 'suspended') AC.resume();
    master.gain.setTargetAtTime(0.85, AC.currentTime, 0.2);
  } else if (AC){
    master.gain.setTargetAtTime(0, AC.currentTime, 0.1);
  }
}
document.getElementById('soundBtn').addEventListener('click', () => setSound(!soundOn));
function tone(freq, dur, type, vol, slide){
  if (!AC || !soundOn) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, AC.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), AC.currentTime + dur);
  g.gain.setValueAtTime(vol || 0.12, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.connect(g); g.connect(master);
  o.start(); o.stop(AC.currentTime + dur);
}
function noiseBurst(dur, f0, f1, vol){
  if (!AC || !soundOn) return;
  const len = Math.floor(AC.sampleRate * dur);
  const buf = AC.createBuffer(1, len, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = AC.createBufferSource(); src.buffer = buf;
  const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.1;
  bp.frequency.setValueAtTime(f0, AC.currentTime);
  bp.frequency.exponentialRampToValueAtTime(f1, AC.currentTime + dur);
  const g = AC.createGain(); g.gain.value = vol;
  src.connect(bp); bp.connect(g); g.connect(master);
  src.start();
}
const sfx = {
  thump(){ tone(95, 0.16, 'sine', 0.3, -60); },
  swoosh(){ noiseBurst(0.28, 500, 2400, 0.22); },
  ping(){ tone(1180, 0.09, 'triangle', 0.14); setTimeout(() => tone(1580, 0.14, 'triangle', 0.1), 60); },
  whistle(){ tone(2350, 0.14, 'square', 0.045); setTimeout(() => tone(2350, 0.3, 'square', 0.045), 200); },
  roar(k){ exciteBoost = Math.max(exciteBoost, k); noiseBurst(0.9, 200, 700, 0.12 * k); },
  chant(){ tone(210, 0.45, 'sawtooth', 0.12, -110); noiseBurst(0.5, 300, 900, 0.12); },
  pop(){ noiseBurst(0.12, 900, 2600, 0.18); },
  jump(){ tone(220, 0.18, 'square', 0.06, 340); }
};

/* ---------- 粒子系統 ---------- */
const parts = [];
function spawnDust(x, y, n, spd){
  for (let i = 0; i < n; i++){
    const a = Math.PI + Math.random() * Math.PI;
    const s = (spd || 70) * (0.4 + Math.random() * 0.8);
    parts.push({ k: 'dust', x, y, vx: Math.cos(a) * s * 0.9, vy: Math.sin(a) * s * 0.4 - 22,
      life: 0.55 + Math.random() * 0.3, max: 0.85, r: 3 + Math.random() * 4 });
  }
}
function spawnSpark(x, y, n, spd){
  for (let i = 0; i < n; i++){
    const a = Math.random() * Math.PI * 2, s = (spd || 260) * (0.3 + Math.random() * 0.8);
    parts.push({ k: 'spark', x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: 0.4 + Math.random() * 0.35, max: 0.75,
      c: Math.random() < 0.5 ? '#ffd166' : '#fff6e0' });
  }
}
const CONF = ['#e63946', '#ffd166', '#f7f3e8', '#4cc9f0', '#57cc99', '#ff70a6'];
function spawnConfetti(x, y, n, dir){
  for (let i = 0; i < n; i++){
    const a = -Math.PI / 2 + dir * (0.15 + Math.random() * 0.55);
    const s = 340 + Math.random() * 380;
    parts.push({ k: 'conf', x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: 2.6 + Math.random() * 1.6, max: 4,
      rot: Math.random() * 6.28, vr: (Math.random() * 2 - 1) * 9,
      ph: Math.random() * 6.28, c: CONF[(Math.random() * CONF.length) | 0],
      w: 5 + Math.random() * 4, h: 3 + Math.random() * 3 });
  }
}
function updateParts(dt){
  for (const p of parts){
    p.life -= dt;
    if (p.k === 'conf'){
      p.vy += 240 * dt; p.vx *= Math.pow(0.35, dt); p.vy = Math.min(p.vy, 130);
      p.ph += dt * 7; p.x += (p.vx + Math.sin(p.ph) * 45) * dt; p.y += p.vy * dt;
      p.rot += p.vr * dt;
    } else if (p.k === 'spark'){
      p.vy += 460 * dt; p.x += p.vx * dt; p.y += p.vy * dt;
    } else {
      p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= Math.pow(0.2, dt);
    }
  }
  for (let i = parts.length - 1; i >= 0; i--) if (parts[i].life <= 0) parts.splice(i, 1);
  if (parts.length > 400) parts.splice(0, parts.length - 400);
}
function drawParts(g){
  for (const p of parts){
    const a = clamp01(p.life / (p.max * 0.5));
    if (p.k === 'dust'){
      g.globalAlpha = a * 0.4;
      g.fillStyle = '#c9c2ac';
      g.beginPath(); g.arc(p.x, p.y, p.r * (1.6 - a * 0.6), 0, 6.283); g.fill();
    } else if (p.k === 'spark'){
      g.globalAlpha = a;
      g.strokeStyle = p.c; g.lineWidth = 2; g.lineCap = 'round';
      g.beginPath(); g.moveTo(p.x, p.y);
      g.lineTo(p.x - p.vx * 0.03, p.y - p.vy * 0.03); g.stroke();
    } else {
      g.globalAlpha = Math.min(1, a * 1.4);
      g.save(); g.translate(p.x, p.y); g.rotate(p.rot);
      g.scale(1, Math.abs(Math.sin(p.ph)) * 0.8 + 0.2);
      g.fillStyle = p.c; g.fillRect(-p.w / 2, -p.h / 2, p.w, p.h); g.restore();
    }
  }
  g.globalAlpha = 1;
}

/* ---------- 球場背景（多層視差） ---------- */
let wall = 0;
const bulbs = [];
/* v3：靜態漸層快取（避免每幀重建 ~10 個 gradient） */
let G_sky = null, G_ad = null, G_grass = null, G_pool = null, G_band = null;
const G_cone = {};
function gradInit(){
  if (G_sky) return;
  G_sky = ctx.createLinearGradient(0, 0, 0, 240);
  G_sky.addColorStop(0, '#05070f'); G_sky.addColorStop(1, '#101a33');
  G_ad = ctx.createLinearGradient(0, 372, 0, 402);
  G_ad.addColorStop(0, '#0f2e1d'); G_ad.addColorStop(1, '#0a2013');
  G_grass = ctx.createLinearGradient(0, 430, 0, 540);
  G_grass.addColorStop(0, '#1e6338'); G_grass.addColorStop(1, '#123f26');
  G_pool = ctx.createRadialGradient(480, 470, 40, 480, 470, 460);
  G_pool.addColorStop(0, 'rgba(255,246,214,0.07)'); G_pool.addColorStop(1, 'rgba(255,246,214,0)');
  for (const lx of [-140, 320, 760, 1220]){
    const cg = ctx.createLinearGradient(lx, 30, lx, 430);
    cg.addColorStop(0, 'rgba(255,243,196,0.10)'); cg.addColorStop(1, 'rgba(255,243,196,0)');
    G_cone[lx] = cg;
  }
}
function drawStadium(t){
  gradInit();
  // 天空
  applyCam(0.05);
  ctx.fillStyle = G_sky; ctx.fillRect(-600, -200, 2200, 460);
  for (let i = 0; i < 40; i++){
    const sx = -500 + rnd(i) * 1900, sy = -80 + rnd(i + 50) * 200;
    ctx.globalAlpha = 0.25 + 0.5 * Math.abs(Math.sin(wall * 1.5 + i));
    ctx.fillStyle = '#dfe8ff'; ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.globalAlpha = 1;
  ctx.restore();
  // 照明塔
  applyCam(0.12);
  for (const lx of [-140, 320, 760, 1220]){
    ctx.strokeStyle = '#1d2740'; ctx.lineWidth = 7;
    ctx.beginPath(); ctx.moveTo(lx, 152); ctx.lineTo(lx, 36); ctx.stroke();
    ctx.fillStyle = '#2a3752'; ctx.fillRect(lx - 30, 18, 60, 22);
    ctx.fillStyle = 'rgba(255,243,196,0.35)';
    ctx.fillRect(lx - 30, 18, 60, 14);
    ctx.fillStyle = '#fff3c4';
    for (let i = 0; i < 4; i++) ctx.fillRect(lx - 26 + i * 14, 22, 9, 6);
    ctx.fillStyle = G_cone[lx];
    ctx.beginPath(); ctx.moveTo(lx - 28, 30); ctx.lineTo(lx + 28, 30);
    ctx.lineTo(lx + 130, 430); ctx.lineTo(lx - 130, 430); ctx.closePath(); ctx.fill();
  }
  // 上層看台
  crowdBand(140, 253, 5, 11, ['#232c47', '#2c3550', '#1d2740', '#3a3050'], 0.12, t);
  ctx.restore();
  // 下層看台
  applyCam(0.35);
  crowdBand(255, 370, 5, 77, ['#31406b', '#443454', '#553a45', '#2c3550'], 0.35, t);
  ctx.restore();
  // 廣告看板
  applyCam(0.6);
  ctx.fillStyle = G_ad; ctx.fillRect(-500, 372, 2000, 30);
  ctx.fillStyle = 'rgba(255,209,102,0.75)';
  ctx.font = 'bold 15px "Noto Sans TC",sans-serif'; ctx.textAlign = 'left';
  for (let x = -480; x < 1500; x += 250) ctx.fillText('SIUUU ・ 招牌動作圖鑑', x, 393);
  ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-500, 372); ctx.lineTo(1500, 372); ctx.stroke();
  ctx.restore();
  // 跑道
  applyCam(0.85);
  ctx.fillStyle = '#182236'; ctx.fillRect(-500, 402, 2000, 30);
  ctx.restore();
  // 草皮
  applyCam(1);
  ctx.fillStyle = G_grass; ctx.fillRect(-500, 430, 2000, 230);
  for (let x = -500; x < 1500; x += 96){
    if (((x / 96) | 0) % 2 === 0) continue;
    ctx.fillStyle = 'rgba(255,255,255,0.035)'; ctx.fillRect(x, 430, 96, 220);
  }
  ctx.strokeStyle = 'rgba(244,244,244,0.55)'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(-500, 434); ctx.lineTo(1500, 434); ctx.stroke();
  ctx.fillStyle = G_pool; ctx.fillRect(-500, 420, 2000, 240);
  ctx.restore();
}
function crowdBand(y0, y1, rows, sd, cols, layer, t){
  if (!G_band) G_band = {};
  if (!G_band[y0]){
    const g = ctx.createLinearGradient(0, y0, 0, y1);
    g.addColorStop(0, '#141b2e'); g.addColorStop(1, '#1b2338');
    G_band[y0] = g;
  }
  ctx.fillStyle = G_band[y0]; ctx.fillRect(-500, y0, 2000, y1 - y0);
  const ex = Math.min(1, excite + exciteBoost);
  for (let r = 0; r < rows; r++){
    const y = lerp(y0 + 10, y1 - 12, r / (rows - 1));
    for (let x = -490; x < 1490; x += 17){
      const i = sd + r * 997 + x * 13;
      const hop = (rnd(i + 3) < ex * 0.7) ? Math.abs(Math.sin(wall * 9 + i)) * 4 * ex : 0;
      ctx.fillStyle = cols[(rnd(i) * cols.length) | 0];
      ctx.fillRect(x + rnd(i + 1) * 6, y - hop, 6, 8);
      ctx.fillStyle = 'rgba(232,185,138,0.8)';
      ctx.fillRect(x + rnd(i + 1) * 6 + 1, y - hop - 3, 4, 3);
    }
  }
  // 閃光燈

    bulbs.push({ x: -450 + Math.random() * 1850, y: y0 + Math.random() * (y1 - y0), l: layer, life: 0.3 });

  }

}

let netHit = -9;
function drawGoal(){
  const x = 812, h = 148, d = 66, topBackY = GY - h + 20;
  const k = Math.max(0, 1 - (wall - netHit) * 1.4);
  const amp = k * k * 9;
  ctx.strokeStyle = 'rgba(235,240,248,0.4)'; ctx.lineWidth = 1;
  for (let i = 0; i <= 8; i++){
    const u = i / 8;
    const tx = lerp(x, x + d, u), ty = lerp(GY - h, topBackY, u);
    const bx = lerp(x, x + d, u);
    ctx.beginPath(); ctx.moveTo(tx + Math.sin(i * 2 + wall * 26) * amp, ty);
    ctx.quadraticCurveTo(bx + d * 0.18 + Math.sin(i * 3 + wall * 26) * amp, (ty + GY) / 2, bx, GY);
    ctx.stroke();
  }
  for (let j = 1; j <= 5; j++){
    const v = j / 6;
    ctx.beginPath();
    ctx.moveTo(x + Math.sin(j + wall * 26) * amp * 0.6, lerp(GY - h, GY, v));
    ctx.lineTo(x + d, lerp(topBackY, GY, v));

  ctx.save();
  ctx.shadowColor = 'rgba(255,255,255,0.7)'; ctx.shadowBlur = 6;
  ctx.strokeStyle = '#f4f6f8'; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x, GY); ctx.lineTo(x, GY - h);
  ctx.lineTo(x + d, topBackY); ctx.lineTo(x + d, GY); ctx.stroke();
  ctx.restore();
}
function drawBallPro(g, x, y, r, rot, glow){
  g.save();
  if (glow){ g.shadowColor = 'rgba(255,246,214,0.9)'; g.shadowBlur = 16; }
  const gr = g.createRadialGradient(x - r * 0.4, y - r * 0.45, r * 0.2, x, y, r * 1.15);
  gr.addColorStop(0, '#ffffff'); gr.addColorStop(0.75, '#dde4ee'); gr.addColorStop(1, '#aeb9c9');
  g.fillStyle = gr;
  g.beginPath(); g.arc(x, y, r, 0, 6.283); g.fill();
  g.shadowBlur = 0;
  g.fillStyle = '#28313f';
  for (let i = 0; i < 5; i++){
    const a = rot + i * 1.2566;
    g.beginPath(); g.arc(x + Math.cos(a) * r * 0.58, y + Math.sin(a) * r * 0.58, r * 0.2, 0, 6.283); g.fill();

  g.beginPath(); g.arc(x + Math.cos(rot * 1.7) * r * 0.1, y + Math.sin(rot * 1.7) * r * 0.1, r * 0.24, 0, 6.283); g.fill();

function capSeg(g, x0, y0, x1, y1, w, col, colL){
  g.lineCap = 'round';
  g.strokeStyle = OUT; g.lineWidth = w + 3.4;
  g.beginPath(); g.moveTo(x0, y0); g.lineTo(x1, y1); g.stroke();
  g.strokeStyle = col; g.lineWidth = w;
  g.beginPath(); g.moveTo(x0, y0); g.lineTo(x1, y1); g.stroke();
  g.strokeStyle = colL; g.lineWidth = Math.max(1.6, w * 0.34);
  g.beginPath(); g.moveTo(x0 - w * 0.16, y0 - w * 0.2); g.lineTo(x1 - w * 0.16, y1 - w * 0.2); g.stroke();

function limb(g, x, y, a1, l1, a2, l2, w, c1, c1L, c2, c2L){
  const kx = x + Math.sin(a1) * l1, ky = y + Math.cos(a1) * l1;
  const ex = kx + Math.sin(a1 + a2) * l2, ey = ky + Math.cos(a1 + a2) * l2;
  capSeg(g, x, y, kx, ky, w, c1, c1L);
  capSeg(g, kx, ky, ex, ey, w * 0.86, c2, c2L);
  return [kx, ky, ex, ey, a1 + a2];
}

function shade(hex){
  const n = parseInt(hex.slice(1), 16);
  const r = (n >> 16) * 0.62 | 0, gg = ((n >> 8) & 255) * 0.62 | 0, b = (n & 255) * 0.62 | 0;
  return 'rgb(' + r + ',' + gg + ',' + b + ')';
}
function ball5(g, x, y, r, c){
  g.fillStyle = c; g.strokeStyle = OUT; g.lineWidth = 1.6;
  g.beginPath(); g.arc(x, y, r, 0, 6.283); g.fill(); g.stroke();
}
function boot(g, x, y, a, c){
  const tx = x + Math.sin(a + 1.35) * 9, ty = y + Math.cos(a + 1.35) * 9;
  capSeg(g, x, y, tx, ty, 7.5, c, '#4a5262');
}
function runPose(ph, k){
  const flexL = (Math.max(0, -Math.sin(ph - 0.7)) * 1.15 + 0.12) * k;
  const flexR = (Math.max(0, -Math.sin(ph + Math.PI - 0.7)) * 1.15 + 0.12) * k;
  return {
    lean: 0.24 * k, yOff: -Math.abs(Math.cos(ph)) * 4 * k,
    lL1: Math.sin(ph) * 0.85 * k, lL2: -flexL,
    lR1: Math.sin(ph + Math.PI) * 0.85 * k, lR2: -flexR,
    aL1: Math.sin(ph + Math.PI) * 0.7 * k, aL2: 0.85 * k + 0.15,
    aR1: Math.sin(ph) * 0.7 * k, aR2: 0.85 * k + 0.15
  };
}

  ctx.fillStyle = 'rgba(255,255,255,0.12)'; ctx.fillRect(0, H - 4, W, 4);
  ctx.fillStyle = '#e0b25e'; ctx.fillRect(0, H - 4, W * clamp01((done + Math.min(t, sc.dur)) / total), 4);
  let fade = clamp01(t / 0.45);

    // 防守者：先跟晃、再撲空跌倒
    let dp;
    if (t < 2.5){
      const sway = Math.sin(Math.max(0, t - 1.2) * 9 - 0.6) * 0.18 * seg(t, 1.2, 1.5);
      dp = { x: 580, y: GY - 50, groundY: GY, dir: -1, lean: sway,
        lL1: -0.35, lR1: 0.35, lL2: -0.35, lR2: -0.35,
        aL1: -0.7, aL2: 0.6, aR1: 0.7, aR2: 0.6, face: 'focus' };
    } else {
      const u = seg(t, 2.5, 3.15, eI);
      dp = { x: 580 + u * 90, y: GY - 50 + u * 34, groundY: GY, dir: -1,
        rot: -u * 1.35, lean: 0.2,
        lL1: -0.5 - u * 0.4, lR1: 0.6 + u * 0.3, lL2: -0.5, lR2: -0.4,
        aL1: -1.6, aL2: 0.3, aR1: 1.8, aR2: 0.3, face: 'shout' };
      if (t > 3.15){ dp.rot = -1.35 + Math.sin(t * 3) * 0.04; }
    }
    // C羅帶球
    let p;
    if (t < 1.3){
      const ph = t * 12;
      p = runPose(ph, 0.9);
      p.x = px; p.y = GY - 52 + p.yOff; p.face = 'focus';
    } else if (t < 2.55){
      const ph = (t - 1.3) * 15;
      const sway = Math.sin(ph) * 0.22;
      p = { x: px, y: GY - 50 - Math.abs(Math.sin(ph)) * 3, lean: sway,
        lL1: -0.3 + Math.sin(ph) * 0.4, lL2: -0.3, lR1: 0.3 - Math.sin(ph) * 0.4, lR2: -0.3,
        aL1: -0.5 - Math.sin(ph) * 0.3, aL2: 0.5, aR1: 0.5 + Math.sin(ph) * 0.3, aR2: 0.5, face: 'smile' };
    } else if (t < 3.0){
      const u = eO((t - 2.55) / 0.45);
      p = { x: px, y: GY - 48, lean: lerp(0.2, -0.3, u), sx: 1 - u * 0.12,
        lL1: lerp(-0.3, 0.7, u), lL2: -0.5, lR1: lerp(0.3, -0.7, u), lR2: -0.6,
        aL1: lerp(-0.5, 1.2, u), aL2: 0.4, aR1: lerp(0.5, -1.2, u), aR2: 0.4, face: 'grit' };
    } else {
      const ph = (t - 3.0) * 14;
      p = runPose(ph, 1.1);
      p.x = px; p.y = GY - 52 + p.yOff; p.face = 'smile';
      if (Math.sin(ph) > 0.96) spawnDust(px - 14, GY, 1, 50);
    }
    p.groundY = GY; p.dir = 1;
    // 球的位置
    let bx, by = GY - 8, spin = t * 9;
    if (t < 1.3) bx = px + 26 + Math.sin(t * 12) * 6;
    else if (t < 2.55) bx = px + 20 + Math.sin((t - 1.3) * 15) * 13;
    else if (t < 3.0) bx = lerp(px + 18, px - 14, eO((t - 2.55) / 0.45));
    else bx = px + 30 + Math.sin((t - 3) * 14) * 8;
    // 速度線
    if (t > 3.1){
      ctx.globalAlpha = 0.3;
      ctx.strokeStyle = '#fff6e0'; ctx.lineWidth = 2;
      for (let i = 0; i < 5; i++){
        const ly = GY - 20 - i * 22 - rnd(i) * 10;
        ctx.beginPath(); ctx.moveTo(px - 40 - rnd(i + 9) * 60, ly); ctx.lineTo(px - 110 - rnd(i + 4) * 80, ly); ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }
    drawPlayer(ctx, dp, PAL_DEF);
    drawPlayer(ctx, p, PAL_CR7);
    drawBallPro(ctx, bx, by, 8, spin, false);
    drawParts(ctx);
    ctx.restore();
  }
};
/* --- SIUUU 慶祝 --- */
const s5 = {
  dur: 6.8, act: '第三幕・SIUUU',
  subs: [
    { a: 0.4, b: 1.7, tx: '然後，是那個全世界都認得的瞬間——' },
    { a: 4.2, b: 5.5, zh: '囌兜慶祝式', en: 'Su-Siu Celebration' },
    { a: 5.7, b: 6.5, tx: '全場，同一個聲音。' }
  ],
  init(){ S = {}; cam.tx = 40; cam.ty = 0; cam.tz = 1.04; camSnap(); excite = 0.5; },
  timeScale(t){ return (t > 2.25 && t < 2.95) ? 0.55 : 1; },
  evts: [
    { t: 2.0, fn(){ sfx.jump(); spawnDust(608, GY, 8); } },
    { t: 3.05, fn(){ sfx.thump(); sfx.chant(); sfx.roar(1.4); freeze = 0.11; shakeMag = 11; flashA = 0.55; spawnDust(608, GY, 16, 130); } },
    { t: 3.2, fn(){ sfx.pop(); spawnConfetti(400, 545, 46, 1); spawnConfetti(860, 545, 46, -1); } },
    { t: 3.7, fn(){ sfx.pop(); spawnConfetti(560, 545, 40, 0.2); } },
    { t: 4.2, fn(){ collectBadge(); } },
    { t: 4.4, fn(){ sfx.chant(); } }
  ],
  update(t){
    if (t < 2) { cam.tx = lerp(40, 210, eIO(t / 2)); excite = 0.5 + t * 0.1; }
    else { cam.tx = lerp(210, 250, seg(t, 2, 3)); }
    cam.tz = lerp(1.04, 1.18, seg(t, 2.0, 2.9));
    cam.ty = lerp(0, -28, seg(t, 2.0, 2.9));
    if (t > 3.05){
      // v3：落地瞬間鏡頭猛推近主角，再緩慢拉回
      const pu = seg(t, 3.05, 3.5, eO), back = seg(t, 4.3, 5.7, eIO);
      cam.tz = lerp(lerp(1.18, 1.34, pu), 1.08, back);
      cam.tx = lerp(lerp(250, 165, pu), 230, back);
      cam.ty = lerp(lerp(-28, 92, pu), -4, back);
      excite = 1;
    }
  },
  draw(t){
    drawStadium(t);
    applyCam(1);
    // 角旗
    ctx.strokeStyle = '#f4f6f8'; ctx.lineWidth = 3.5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(806, GY); ctx.lineTo(806, GY - 58); ctx.stroke();
    ctx.fillStyle = '#e63946';
    ctx.beginPath();
    ctx.moveTo(806, GY - 58);
    ctx.quadraticCurveTo(826 + Math.sin(wall * 5) * 4, GY - 52, 834 + Math.sin(wall * 5) * 6, GY - 46);
    ctx.lineTo(806, GY - 40); ctx.closePath(); ctx.fill();
    // C羅：助跑→起跳→空中轉體→落地張臂
    let p;
    if (t < 1.7){
      const ph = t * 12;
      p = runPose(ph, 1);
      p.x = lerp(210, 590, eIO(t / 1.7)); p.y = GY - 52 + p.yOff; p.face = 'smile';
      if (Math.sin(ph) > 0.96) spawnDust(p.x - 12, GY, 1, 45);
    } else {
      const k = kf(t, [
        [1.7, { y: GY - 52, lean: 0.2, lL1: 0.4, lL2: -0.5, lR1: -0.4, lR2: -0.5, aL1: 0.6, aL2: 0.5, aR1: -0.6, aR2: 0.5, x: 590, sy: 1 }],
        [2.0, { y: GY - 38, lean: 0.18, lL1: 0.5, lL2: -0.9, lR1: -0.35, lR2: -0.9, aL1: -1.2, aL2: 0.2, aR1: -1.3, aR2: 0.2, x: 602, sy: 0.8 }, eIO],
        [2.3, { y: GY - 165, lean: -0.06, lL1: 0.35, lL2: -0.7, lR1: -0.4, lR2: -0.6, aL1: 2.5, aL2: 0.3, aR1: 2.7, aR2: 0.3, x: 608, sy: 1.14 }, eO],
        [2.62, { y: GY - 212, lean: -0.1, lL1: 0.3, lL2: -0.5, lR1: -0.35, lR2: -0.45, aL1: 2.2, aL2: 0.4, aR1: 2.4, aR2: 0.4, x: 608, sy: 1.05 }, eO],
        [3.03, { y: GY - 70, lean: -0.16, lL1: 0.52, lL2: -0.3, lR1: -0.52, lR2: -0.3, aL1: -1.7, aL2: 0.15, aR1: 1.7, aR2: 0.15, x: 608, sy: 1 }, eI],
        [3.12, { y: GY - 46, lean: -0.22, lL1: 0.62, lL2: -0.25, lR1: -0.62, lR2: -0.25, aL1: -1.95, aL2: 0.1, aR1: 1.95, aR2: 0.1, x: 608, sy: 0.88 }, eO],
        [3.4, { y: GY - 50, lean: -0.24, lL1: 0.6, lL2: -0.22, lR1: -0.6, lR2: -0.22, aL1: -1.9, aL2: 0.1, aR1: 1.9, aR2: 0.1, x: 608, sy: 1.02 }, eOB],
        [8.9, { y: GY - 50, lean: -0.24, lL1: 0.6, lL2: -0.22, lR1: -0.6, lR2: -0.22, aL1: -1.85, aL2: 0.1, aR1: 1.85, aR2: 0.1, x: 608, sy: 1.02 }]
      ]);
      p = k;
      // 空中 180 度轉體：以水平縮放模擬
      if (t > 2.15 && t < 3.03){
        const su = seg(t, 2.15, 3.0);
        p.sx = Math.cos(su * Math.PI);
        if (Math.abs(p.sx) < 0.18) p.sx = p.sx < 0 ? -0.18 : 0.18;
      } else if (t >= 3.03) p.dir = -1;
      if (t > 3.4) p.sy = (p.sy || 1) + Math.sin(t * 3.4) * 0.015; // 喘息起伏
      p.face = t > 2.9 ? 'shout' : 'grit';
    }
    p.groundY = GY;
    // 空中殘影
    if (t > 2.2 && t < 3.0){
      ctx.globalAlpha = 0.22;
      drawPlayer(ctx, Object.assign({}, p, { x: p.x - 12, y: p.y + 6 }), PAL_CR7);
      ctx.globalAlpha = 1;
    }
    drawPlayer(ctx, p, PAL_CR7);
    drawParts(ctx);
    ctx.restore();
    // SIUUU 大字
    if (t > 3.1 && t < 6.7){
      const su = seg(t, 3.1, 3.55, eOB);
      const fa = Math.min(1, seg(t, 3.1, 3.3), clamp01((6.7 - t) / 0.8));
      ctx.save();
      ctx.globalAlpha = fa;
      ctx.translate(W / 2, 150);
      ctx.rotate(-0.05);
      ctx.scale(lerp(2.6, 1, su), lerp(2.6, 1, su));
      ctx.textAlign = 'center';
      ctx.shadowColor = '#e63946'; ctx.shadowBlur = 40;
      ctx.fillStyle = '#f6f1e3';
      ctx.font = '900 88px "Arial Narrow",sans-serif';
      const pulse = 1 + Math.sin(t * 6) * 0.02;
      ctx.scale(pulse, pulse);
      ctx.fillText('SIUUU!!!', 0, 0);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#e63946'; ctx.lineWidth = 2;
      ctx.strokeText('SIUUU!!!', 0, 0);
      ctx.restore();
    }
  }
};
/* --- 終幕 --- */
const s6 = {
  dur: 4.0, act: '終幕',
  init(){
    S = {}; cam.tx = 0; cam.ty = 0; cam.tz = 1; camSnap(); excite = 0.35;
    spawnConfetti(200, -20, 16, 0.3); spawnConfetti(720, -20, 16, -0.3);
  },
  evts: [
    { t: 0.85, fn(){ sfx.pop(); } }, { t: 1.05, fn(){ sfx.pop(); } },
    { t: 1.25, fn(){ sfx.pop(); } }, { t: 1.45, fn(){ sfx.pop(); } },
    { t: 1.65, fn(){ sfx.pop(); sfx.ping(); } }
  ],
  update(t){ excite = Math.max(0.1, 0.35 - t * 0.05); },
  draw(t){
    const gr = ctx.createLinearGradient(0, 0, 0, H);
    gr.addColorStop(0, '#0a0d1c'); gr.addColorStop(1, '#04050a');
    ctx.fillStyle = gr; ctx.fillRect(0, 0, W, H);
    for (let i = 0; i < 30; i++){
      const sx = rnd(i + 200) * W, sy = rnd(i + 300) * H;
      ctx.globalAlpha = 0.15 + 0.3 * Math.abs(Math.sin(wall * 1.2 + i * 2));
      ctx.fillStyle = '#e0b25e'; ctx.fillRect(sx, sy, 2, 2);
    }
    ctx.globalAlpha = 1;
    drawParts(ctx);
    ctx.textAlign = 'center';
    const a1 = seg(t, 0.3, 1.1, eO);
    ctx.globalAlpha = a1;
    if (IMG_TROPHY.complete && IMG_TROPHY.naturalWidth > 0){
      ctx.save();
      ctx.shadowColor = 'rgba(255,209,102,0.9)'; ctx.shadowBlur = 30;
      const bob = Math.sin(wall * 2) * 4;
      ctx.drawImage(IMG_TROPHY, W / 2 - 38, 34 + (1 - a1) * 20 + bob, 76, 76);
      ctx.restore();
    }
    ctx.save();
    ctx.shadowColor = '#e63946'; ctx.shadowBlur = 26;
    ctx.fillStyle = '#f6f1e3';
    ctx.font = '900 64px "Arial Narrow",sans-serif';
    ctx.fillText('SIUUU', W / 2, 168);
    ctx.restore();
    ctx.fillStyle = '#e0b25e';
    ctx.font = '700 24px "Noto Sans TC",sans-serif';
    ctx.fillText('C 羅 招 牌 動 作', W / 2, 208);
    // v2：集滿五枚招牌動作徽章，逐一蓋章
    for (let i = 0; i < 5; i++){
      const ba = seg(t, 0.7 + i * 0.2, 1.15 + i * 0.2, eOB);
      if (ba <= 0.01) continue;
      const bw = 168, x = W / 2 + (i - 2) * 182;
      ctx.save();
      ctx.globalAlpha = clamp01(ba);
      ctx.translate(x, 252);
      const bs = lerp(1.7, 1, ba);
      ctx.scale(bs, bs);
      ctx.rotate((1 - ba) * 0.25 + (i - 2) * 0.012);
      ctx.fillStyle = 'rgba(193,18,31,0.18)';
      ctx.strokeStyle = '#c1121f'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.roundRect(-bw / 2, -20, bw, 40, 10); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#ffd166'; ctx.font = '900 15px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('✓', -bw / 2 + 20, 5.5);
      ctx.fillStyle = '#f6f1e3'; ctx.font = '700 17px "Noto Sans TC",sans-serif';
      ctx.fillText(BADGE_NAMES[i], 10, 6);
      ctx.restore();
    }
    ctx.globalAlpha = seg(t, 1.7, 2.2);
    ctx.fillStyle = '#e0b25e'; ctx.font = '700 15px "Noto Sans TC",sans-serif';
    ctx.fillText('招牌動作圖鑑 ・ 5 / 5 收集完成！', W / 2, 302);
    const stats = [['900+', '職業生涯進球'], ['5', '金球獎'], ['1', '不可複製的吶喊']];
    for (let i = 0; i < 3; i++){
      const sa = seg(t, 1.9 + i * 0.22, 2.5 + i * 0.22, eO);
      ctx.globalAlpha = sa;
      const x = W / 2 + (i - 1) * 220;
      ctx.fillStyle = '#f6f1e3';
      ctx.font = '900 40px "Arial Narrow",sans-serif';
      ctx.fillText(stats[i][0], x, 358 + (1 - sa) * 16);
      ctx.fillStyle = 'rgba(246,241,227,0.55)';
      ctx.font = '500 14px "Noto Sans TC",sans-serif';
      ctx.fillText(stats[i][1], x, 384 + (1 - sa) * 16);
    }
    ctx.globalAlpha = seg(t, 2.6, 3.3);
    ctx.fillStyle = 'rgba(246,241,227,0.4)';
    ctx.font = '500 13px "Noto Sans TC",sans-serif';
    ctx.fillText('球迷筆記 ・ 足球招牌動作圖鑑', W / 2, 416);
    ctx.globalAlpha = 1;
  }
};

const SCENES = [s0, s1, s2, s3, s4, s5, s6];
let sceneIdx = 0, tS = 0, freeze = 0, ended = false;
function startScene(i){
  sceneIdx = i; tS = 0;
  const sc = SCENES[i];
  sc._evt = 0;
  if (sc.init) sc.init();
}
function showReplay(){ document.getElementById('replayBtn').classList.add('show'); }
document.getElementById('replayBtn').addEventListener('click', function(){
  this.classList.remove('show');
  parts.length = 0; bulbs.length = 0;
  ended = false; freeze = 0; netHit = -9; exciteBoost = 0;
  collected = 0; badgeWall = -9; cine = 0;
  const hint = document.getElementById('hint');
  hint.classList.remove('run'); void hint.offsetWidth; hint.classList.add('run');
  startScene(0); camSnap();
});

let last = performance.now();
function frame(now){
  requestAnimationFrame(frame);
  const dtRaw = Math.min((now - last) / 1000, 0.08);
  last = now;
  wall += dtRaw;
  camUpdate(dtRaw); updateBulbs(dtRaw);
  exciteBoost = Math.max(0, exciteBoost - dtRaw * 0.5);
  if (AC && soundOn) crowdGain.gain.setTargetAtTime(0.04 + Math.min(1, excite + exciteBoost) * 0.13, AC.currentTime, 0.25);
  const sc = SCENES[sceneIdx];
  let eff = 0;
  if (ended){
    eff = dtRaw;
  } else if (freeze > 0){
    freeze -= dtRaw;
  } else {
    const scale = sc.timeScale ? sc.timeScale(tS) : 1;
    eff = dtRaw * scale;
    tS += eff;
    while (sc.evts && sc._evt < sc.evts.length && tS >= sc.evts[sc._evt].t){
      sc.evts[sc._evt].fn(); sc._evt++;
      if (freeze > 0) break;
    }
    if (sc.update) sc.update(Math.min(tS, sc.dur));
    if (tS >= sc.dur){
      if (sceneIdx < SCENES.length - 1) startScene(sceneIdx + 1);
      else { ended = true; tS = sc.dur; showReplay(); }
    }
  }
  updateParts(eff || (ended ? dtRaw : 0));
  // v2：慢動作時的電影黑邊
  const tsNow = (!ended && sc.timeScale) ? sc.timeScale(tS) : 1;
  cine += ((tsNow < 0.95 ? 1 : 0) - cine) * (1 - Math.pow(0.004, dtRaw));
  const scNow = SCENES[sceneIdx];
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#05070f'; ctx.fillRect(0, 0, W, H);
  scNow.draw(Math.min(tS, scNow.dur));
  overlays(scNow, Math.min(tS, scNow.dur));
}
startScene(0);
camSnap();
requestAnimationFrame(frame);
</script>
