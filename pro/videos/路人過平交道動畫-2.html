<script>
'use strict';
/* ============================================================
   路人過平交道動畫（第二部）PRO ── 專業AI升級 v4
   與第一部（俯視・日間/夜間）完全不同的舞臺：
   側面運鏡・黃昏場景・阿公與柴犬小柴的散步故事
   三幕：Ⅰ 傍晚散步 → Ⅱ 警鈴柵欄・火車全側面呼嘯 → Ⅲ 停看聽安全通過
   v4 加料：章節選單（五段劇情直接跳轉）
   ============================================================ */
const W = 960, H = 540, CX = 480, CY = 300;
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const subEl = document.getElementById('subtitle');
const sndLbl = document.getElementById('sndLbl');
const replayBtn = document.getElementById('replayBtn');
const chapBtn = document.getElementById('chapBtn'), chapMenu = document.getElementById('chapMenu');

function resize(){
  const s = Math.min(innerWidth / W, innerHeight / H), dpr = Math.min(devicePixelRatio || 1, 2);
  cv.width = Math.round(W * s * dpr); cv.height = Math.round(H * s * dpr);
  cv.style.width = W * s + 'px'; cv.style.height = H * s + 'px';
  ctx.setTransform(s * dpr, 0, 0, s * dpr, 0, 0);
  document.documentElement.style.setProperty('--cvB', Math.max(0, (innerHeight - H * s) / 2) + 'px');
  replayBtn.style.top = Math.round(innerHeight / 2 + H * s * 0.16) + 'px';
}
addEventListener('resize', resize); resize();

const E = {
  inQuad: t => t * t, outQuad: t => 1 - (1 - t) * (1 - t),
  inCubic: t => t * t * t, outCubic: t => 1 - Math.pow(1 - t, 3),
  inOutCubic: t => t < .5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2,
  inOutSine: t => -(Math.cos(Math.PI * t) - 1) / 2,
  outBack: t => 1 + 2.7 * Math.pow(t - 1, 3) + 1.7 * Math.pow(t - 1, 2),
  outBounce(t){ const n = 7.5625, d = 2.75;
    if(t < 1 / d) return n * t * t;
    if(t < 2 / d) return n * (t -= 1.5 / d) * t + 0.75;
    if(t < 2.5 / d) return n * (t -= 2.25 / d) * t + 0.9375;
    return n * (t -= 2.625 / d) * t + 0.984375; }
};
const clamp = (v, a, b) => v < a ? a : v > b ? b : v, lerp = (a, b, t) => a + (b - a) * t;
const ss = (t, a, b) => clamp((t - a) / (b - a), 0, 1), rnd = (a, b) => a + Math.random() * (b - a), TAU = Math.PI * 2;
const GC = {};
function grd(key, make){ let g = GC[key]; if(!g){ g = make(); GC[key] = g; } return g; }
function rrp(g, x, y, w, h, r){
  g.beginPath(); g.moveTo(x + r, y);
  g.arcTo(x + w, y, x + w, y + h, r); g.arcTo(x + w, y + h, x, y + h, r);
  g.arcTo(x, y + h, x, y, r); g.arcTo(x, y, x + w, y, r); g.closePath();
}
/* OpenMoji 烘焙 */
function svgImg(id){
  const img = new Image();
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(new XMLSerializer().serializeToString(document.getElementById(id)));
  return img;
}
const IMG = { leaf: svgImg('svg-leaf'), fly: svgImg('svg-fly') };
function drawIMG(g, img, x, y, w, ang){
  if(!img.complete || !img.naturalWidth) return;
  if(!img._cv){
    const c = document.createElement('canvas'); c.width = c.height = 144;
    c.getContext('2d').drawImage(img, 0, 0, 144, 144); img._cv = c;
  }
  g.save(); g.translate(x, y); if(ang) g.rotate(ang);
  g.drawImage(img._cv, -w / 2, -w / 2, w, w); g.restore();
}
/* 烘焙光暈（禁 shadowBlur） */
function makeGlow(r, g0, b0){
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(64, 64, 2, 64, 64, 64);
  gr.addColorStop(0, `rgba(${r},${g0},${b0},.95)`);
  gr.addColorStop(0.4, `rgba(${r},${g0},${b0},.32)`);
  gr.addColorStop(1, `rgba(${r},${g0},${b0},0)`);
  g.fillStyle = gr; g.fillRect(0, 0, 128, 128);
  return c;
}
const glowWarm = makeGlow(255, 214, 130), glowRed = makeGlow(255, 60, 45), glowFire = makeGlow(210, 255, 130), glowHead = makeGlow(255, 243, 170);
const vinCv = (() => {
  const c = document.createElement('canvas'); c.width = W; c.height = H;
  const g = c.getContext('2d');
  let gr = g.createRadialGradient(W / 2, H / 2, H * 0.42, W / 2, H / 2, H * 0.86);
  gr.addColorStop(0, 'rgba(0,0,0,0)'); gr.addColorStop(1, 'rgba(10,4,16,.5)');
  g.fillStyle = gr; g.fillRect(0, 0, W, H);
  /* 黃昏暖色調色 */
  gr = g.createLinearGradient(0, 0, 0, H);
  gr.addColorStop(0, 'rgba(120,40,120,.08)'); gr.addColorStop(0.55, 'rgba(255,140,40,.07)'); gr.addColorStop(1, 'rgba(40,16,60,.12)');
  g.fillStyle = gr; g.fillRect(0, 0, W, H);
  return c;
})();

/* ---------- 時間軸 ---------- */
var SPEED = 1;
const TOTAL = 34.5;
let T = 0, WT = 0, lastNow = null, ended = false;
let freeze = 0, shake = 0, flash = 0;
function tsAt(t){ if(t > 15.1 && t < 15.6) return 0.45; return 1; } /* 火車衝入前懸念慢動作 */

/* ---------- Web Audio（預設靜音・總線壓縮） ---------- */
let AC = null, master = null, rumbleGain = null, audioOn = false;
let nextBellT = 0, nextStepT = 0, nextChirpT = 2.5;
function initAudio(){
  AC = new (window.AudioContext || window.webkitAudioContext)();
  master = AC.createGain(); master.gain.value = 0;
  const comp = AC.createDynamicsCompressor();
  comp.threshold.value = -14; comp.knee.value = 22; comp.ratio.value = 9;
  comp.attack.value = 0.003; comp.release.value = 0.24;
  master.connect(comp); comp.connect(AC.destination);
  const mk = (freq, gv) => {
    const len = AC.sampleRate * 2, buf = AC.createBuffer(1, len, AC.sampleRate), d = buf.getChannelData(0);
    for(let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
    const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = freq;
    const g = AC.createGain(); g.gain.value = gv;
    src.connect(lp); lp.connect(g); g.connect(master); src.start();
    return g;
  };
  mk(420, 0.016);           /* 晚風 */
  rumbleGain = mk(160, 0);  /* 火車隆隆（增益隨劇情拉高） */
}
function tone(freq, dur, type, vol, slide, delay){
  if(!audioOn || !AC) return;
  const t0 = AC.currentTime + (delay || 0);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(28, freq + slide), t0 + dur);
  g.gain.setValueAtTime(0.0001, t0); g.gain.exponentialRampToValueAtTime(vol, t0 + 0.015); g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(g); g.connect(master); o.start(t0); o.stop(t0 + dur + 0.05);
}
const sfx = {
  bell(){ tone(1174, 0.15, 'square', 0.13); },
  horn(vol){ for(const f of [311, 392]) tone(f, 0.85, 'sawtooth', vol || 0.14); },
  motor(up){ tone(up ? 190 : 300, 0.7, 'sawtooth', 0.05, up ? 120 : -120); },
  step(){ tone(170, 0.05, 'triangle', 0.045, -40); },
  patter(){ tone(240, 0.03, 'triangle', 0.03, -60); },
  bark(){ tone(520, 0.08, 'square', 0.1, -140); tone(430, 0.1, 'square', 0.09, -160, 0.1); },
  cricket(){ const f = rnd(3400, 4200); for(let i = 0; i < 3; i++) tone(f, 0.035, 'sine', 0.03, 0, i * 0.07); },
  ok(){ tone(784, 0.12, 'square', 0.1); tone(1046, 0.2, 'square', 0.1, 0, 0.12); },
  jingle(){ [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.3, 'triangle', 0.13, 0, i * 0.14)); },
  click(){ tone(880, 0.06, 'triangle', 0.12); },
  whoosh(){ if(!audioOn || !AC) return; const t0 = AC.currentTime;
    const len = AC.sampleRate * 0.3 | 0, buf = AC.createBuffer(1, len, AC.sampleRate), d = buf.getChannelData(0);
    for(let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const src = AC.createBufferSource(); src.buffer = buf;
    const f = AC.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 800;
    const g = AC.createGain();
    g.gain.setValueAtTime(0.0001, t0); g.gain.exponentialRampToValueAtTime(0.13, t0 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.3);
    src.connect(f); f.connect(g); g.connect(master); src.start(t0); src.stop(t0 + 0.35); }
};
function setAudio(on){
  if(on && !AC) initAudio();
  if(AC && AC.state === 'suspended') AC.resume();
  audioOn = on;
  if(master) master.gain.setTargetAtTime(on ? 0.9 : 0, AC.currentTime, 0.06);
  sndLbl.textContent = on ? '聲音：開' : '聲音：關';
  document.getElementById('sndX').style.display = on ? 'none' : '';
  document.getElementById('sndWave').style.display = on ? '' : 'none';
}
document.getElementById('sndBtn').addEventListener('click', () => { setAudio(!audioOn); sfx.click(); });
/* 自動開聲：載入即嘗試開啟；若被瀏覽器政策擋住，第一次互動自動補開 */
try { setAudio(true); } catch(e) {}
(function(){ const unlockAudio = () => { if (AC && AC.state === 'suspended') AC.resume(); };
  addEventListener('pointerdown', unlockAudio, {once:true}); addEventListener('keydown', unlockAudio, {once:true}); })();

/* ---------- 字幕 ---------- */
const SUBS = [
  { t0: 0.8,  t1: 3.6,  cls: '',     text: '傍晚的散步時間，阿公和小柴出門囉' },
  { t0: 4.4,  t1: 7.6,  cls: '',     text: '前面就是平交道，小柴追著蝴蝶跑' },
  { t0: 8.7,  t1: 11.6, cls: 'warn', text: '叮叮叮！警示燈亮了，柵欄放下來' },
  { t0: 12.1, t1: 14.2, cls: '',     text: '阿公拉好牽繩──小柴，我們等等' },

  if(t < 9.0) return 0;

  if(t < 23.0) return 1 - E.inOutCubic(ss(t, 21.0, 22.9));

function trainXAt(t){          /* 車頭 x（由左向右全側面通過） */

  if(t < 9.5) return lerp(WAIT_X, WAIT_X - 16, E.outBack(ss(t, 8.8, 9.5)));  /* 退一步 */

function camAt(t){
  let i = 0;
  while(i < camKF.length - 1 && camKF[i + 1].t <= t) i++;
  const a = camKF[i], b = camKF[Math.min(i + 1, camKF.length - 1)];
  if(a === b) return { x: a.x, y: a.y, z: a.z };
  const k = E.inOutCubic(ss(t, a.t, b.t));
  return { x: lerp(a.x, b.x, k), y: lerp(a.y, b.y, k), z: lerp(a.z, b.z, k) };
}

let parts = [], comics = [];
function pushPart(p){ if(parts.length < 260) parts.push(p); }
function pDust(x, y, n, dir){ for(let i = 0; i < n; i++)

function pLeaf(x, y, dir){ pushPart({ k:'leaf', x, y, vx: rnd(160, 420) * dir, vy: rnd(-70, 30), life: rnd(.5, 1.0), max: 1.0, s: rnd(14, 24), rot: rnd(0, TAU), spin: rnd(4, 10) }); }

function pSpark(x, y, n){ for(let i = 0; i < n; i++){ const a = rnd(0, TAU), sp = rnd(20, 90);
  pushPart({ k:'star', x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 30, life: rnd(.5, .9), max: .9, s: rnd(3, 6), rot: rnd(0, TAU) }); } }
function updParts(dt){
  let n = 0;
  for(let i = 0; i < parts.length; i++){
    const p = parts[i];
    p.life -= dt; p.x += p.vx * dt; p.y += p.vy * dt;
    if(p.k === 'dust'){ p.vx *= (1 - 2 * dt); p.vy += 30 * dt; }
    if(p.k === 'leaf'){ p.vy += 80 * dt; p.rot += p.spin * dt; p.vx *= (1 - 0.7 * dt); }
    if(p.k === 'note'){ p.ph += dt * 5; p.x += Math.sin(p.ph) * 16 * dt; }
    if(p.k === 'star'){ p.vy += 50 * dt; p.rot += 4 * dt; }
    if(p.life > 0) parts[n++] = p;
  }
  parts.length = n;
  n = 0;
  for(let i = 0; i < comics.length; i++){ const c = comics[i]; c.t += dt; if(c.t < c.dur) comics[n++] = c; }

}

      ctx.beginPath(); ctx.arc(p.x, p.y, p.s * (1.7 - a), 0, TAU); ctx.fill(); }
    else if(p.k === 'leaf'){ ctx.globalAlpha = a; drawIMG(ctx, IMG.leaf, p.x, p.y, p.s, p.rot); }
    else if(p.k === 'note'){ ctx.globalAlpha = a; ctx.fillStyle = '#ffd9a0';
      ctx.font = '900 ' + p.s + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('♪', p.x, p.y); }
    else if(p.k === 'star'){ ctx.globalAlpha = a; ctx.fillStyle = '#ffe27a';
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.beginPath();
      for(let j = 0; j < 8; j++){ const an = j * Math.PI / 4, r = j % 2 === 0 ? p.s : p.s * 0.42;
        j === 0 ? ctx.moveTo(Math.cos(an) * r, Math.sin(an) * r) : ctx.lineTo(Math.cos(an) * r, Math.sin(an) * r); }
      ctx.closePath(); ctx.fill(); ctx.restore(); }

/* ---------- 火車（全側面） ---------- */
function drawTrain(t){
  const hx = trainXAt(t);
  if(hx === null) return;
  const y = RAIL_NEAR + 4;         /* 車輪著地線 */
  const rot = hx * 0.05;
  ctx.save();
  /* 車頭在最右，車廂往左接 */
  const CARW = 210, NCAR = 4;
  for(let i = 0; i < NCAR; i++){
    const x = hx - 150 - (i + 1) * CARW - i * 8;
    /* 車廂 */
    ctx.fillStyle = grd('carBody', () => {
      const g = ctx.createLinearGradient(0, y - 108, 0, y);
      g.addColorStop(0, '#e07a3e'); g.addColorStop(0.45, '#b8542a'); g.addColorStop(1, '#6a2c18'); return g;
    });
    rrp(ctx, x, y - 104, CARW, 96, 10); ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = '#401808'; ctx.stroke();
    ctx.fillStyle = '#ffd9a0'; ctx.fillRect(x, y - 48, CARW, 9);
    /* 車窗（映著夕陽） */
    for(let wi = 0; wi < 5; wi++){
      const wx = x + 14 + wi * 39;
      ctx.fillStyle = grd('carWin', () => {
        const g = ctx.createLinearGradient(0, y - 92, 0, y - 62);
        g.addColorStop(0, '#ffe9c0'); g.addColorStop(1, '#c87a50'); return g;
      });
      rrp(ctx, wx, y - 92, 28, 28, 4); ctx.fill();
      ctx.strokeStyle = '#401808'; ctx.lineWidth = 1.8; ctx.stroke();
      if((i * 5 + wi) % 3 !== 1){
        ctx.fillStyle = 'rgba(60,30,20,.8)';
        ctx.beginPath(); ctx.arc(wx + 14, y - 72, 7, Math.PI, 0); ctx.fill();
        ctx.beginPath(); ctx.arc(wx + 14, y - 78, 4.4, 0, TAU); ctx.fill();
      }
    }
    trainWheel(x + 30, y, rot); trainWheel(x + CARW - 30, y, rot);
    trainWheel(x + 72, y, rot); trainWheel(x + CARW - 72, y, rot);
  }

  const lx = hx - 150;
  ctx.fillStyle = grd('locoBody', () => {
    const g = ctx.createLinearGradient(0, y - 116, 0, y);
    g.addColorStop(0, '#f2944e'); g.addColorStop(0.45, '#c45c2c'); g.addColorStop(1, '#702e16'); return g;
  });
  ctx.beginPath();
  ctx.moveTo(lx, y - 8); ctx.lineTo(lx, y - 104);
  ctx.quadraticCurveTo(lx + 12, y - 114, lx + 66, y - 112);
  ctx.quadraticCurveTo(lx + 128, y - 106, lx + 144, y - 62);
  ctx.quadraticCurveTo(lx + 152, y - 32, lx + 148, y - 8);
  ctx.closePath(); ctx.fill();
  ctx.lineWidth = 3; ctx.strokeStyle = '#401808'; ctx.stroke();
  /* 駕駛窗 */
  ctx.fillStyle = '#ffe9c0';
  ctx.beginPath(); ctx.moveTo(lx + 76, y - 104); ctx.quadraticCurveTo(lx + 122, y - 98, lx + 134, y - 64);
  ctx.lineTo(lx + 104, y - 62); ctx.lineTo(lx + 72, y - 66); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#401808'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#ffd94d'; ctx.fillRect(lx, y - 44, 148, 9);
  /* 頭燈（烘焙光暈） */
  ctx.drawImage(glowHead, lx + 146 - 26, y - 26 - 26, 52, 52);
  ctx.fillStyle = '#fff3a0';
  ctx.beginPath(); ctx.arc(lx + 146, y - 26, 6, 0, TAU); ctx.fill();
  ctx.fillStyle = 'rgba(255,240,170,.2)';
  ctx.beginPath(); ctx.moveTo(lx + 150, y - 32); ctx.lineTo(lx + 330, y - 54); ctx.lineTo(lx + 330, y + 2); ctx.lineTo(lx + 150, y - 20);
  ctx.closePath(); ctx.fill();
  /* 排障器 */
  ctx.fillStyle = '#33262a';
  ctx.beginPath(); ctx.moveTo(lx + 120, y - 8); ctx.lineTo(lx + 150, y - 8); ctx.lineTo(lx + 136, y + 6); ctx.lineTo(lx + 124, y + 6); ctx.closePath(); ctx.fill();
  trainWheel(lx + 30, y, rot); trainWheel(lx + 66, y, rot); trainWheel(lx + 116, y, rot);
  /* 速度線 */
  ctx.strokeStyle = 'rgba(255,236,200,.4)'; ctx.lineWidth = 2.4; ctx.lineCap = 'round';
  for(let i = 0; i < 5; i++){
    const sy = y - 96 + i * 20, sx0 = hx - 160 - (WT * 900 + i * 150) % 340;
    ctx.beginPath(); ctx.moveTo(sx0, sy); ctx.lineTo(sx0 - 66, sy); ctx.stroke();
  }
  ctx.restore();
}
function trainWheel(x, y, rot){
  ctx.fillStyle = '#1c1216';
  ctx.beginPath(); ctx.arc(x, y, 12, 0, TAU); ctx.fill();
  ctx.fillStyle = '#4e4048';
  ctx.beginPath(); ctx.arc(x, y, 8, 0, TAU); ctx.fill();
  ctx.strokeStyle = '#c8b8b0'; ctx.lineWidth = 2;
  for(let i = 0; i < 3; i++){
    const a = rot + i * Math.PI / 3 * 2;
    ctx.beginPath(); ctx.moveTo(x - Math.cos(a) * 7, y - Math.sin(a) * 7); ctx.lineTo(x + Math.cos(a) * 7, y + Math.sin(a) * 7); ctx.stroke();
  }
  ctx.fillStyle = '#e8dcd0'; ctx.beginPath(); ctx.arc(x, y, 2.2, 0, TAU); ctx.fill();
}

/* ---------- 阿公（側面多部件） ---------- */
function drawGramps(t){
  const x = grampsXAt(t), y = GY;
  const walking = walkingAt(t);
  const step = walking ? t * 7.4 : 0;
  const bob = walking ? Math.abs(Math.sin(step)) * 3.6 : Math.sin(WT * 2) * 1;
  const look = lookAt(t);
  const hat = hatHoldAt(t);
  const startle = t >= 8.7 && t < 9.4 ? 1 - ss(t, 8.7, 9.4) : 0;
  ctx.fillStyle = 'rgba(30,12,20,.35)';
  ctx.beginPath(); ctx.ellipse(x, y + 3, 24, 5.5, 0, 0, TAU); ctx.fill();
  ctx.save();
  ctx.translate(x, y - bob);
  ctx.scale(1 + startle * 0.06, 1 - startle * 0.08);   /* 驚嚇擠壓 */
  const skin = '#ffd9b0', skinD = '#c89060';
  /* 腿（側面走路循環） */
  for(const side of [1, -1]){
    const ph = step + (side > 0 ? 0 : Math.PI);
    const kx = walking ? Math.sin(ph) * 9 : side * 4;
    const lift = walking ? Math.max(0, -Math.cos(ph)) * 5 : 0;
    ctx.save(); ctx.translate(kx, -30);
    ctx.fillStyle = side > 0 ? '#5a4a3a' : '#4a3c2e';
    rrp(ctx, -4.6, 0, 9.2, 26 - lift, 4); ctx.fill();
    ctx.strokeStyle = '#2e2418'; ctx.lineWidth = 1.8; ctx.stroke();
    ctx.fillStyle = '#7a3c28';
    rrp(ctx, -5.4, 22 - lift, 13, 7, 3); ctx.fill(); ctx.stroke();
    ctx.restore();
  }
  /* 身體：襯衫＋背心 */
  ctx.fillStyle = grd('gShirt', () => {
    const g = ctx.createLinearGradient(0, -72, 0, -28);
    g.addColorStop(0, '#e8e0d0'); g.addColorStop(1, '#c0b4a0'); return g;
  });
  rrp(ctx, -15, -70, 30, 42, 10); ctx.fill();
  ctx.lineWidth = 2.2; ctx.strokeStyle = '#5a4a38'; ctx.stroke();
  ctx.fillStyle = grd('gVest', () => {
    const g = ctx.createLinearGradient(0, -70, 0, -34);
    g.addColorStop(0, '#7a9a5a'); g.addColorStop(1, '#54703c'); return g;
  });
  rrp(ctx, -13, -68, 11, 36, 5); ctx.fill();
  rrp(ctx, 2, -68, 11, 36, 5); ctx.fill();
  ctx.strokeStyle = '#3a5028'; ctx.lineWidth = 1.6;
  rrp(ctx, -13, -68, 11, 36, 5); ctx.stroke();
  rrp(ctx, 2, -68, 11, 36, 5); ctx.stroke();
  /* 後手：持拐杖 */
  ctx.save(); ctx.translate(-11, -58);
  const caneSw = walking ? Math.sin(step) * 0.3 : 0.05 * Math.sin(WT * 2);
  ctx.rotate(0.5 + caneSw);
  ctx.fillStyle = '#c0b4a0';
  rrp(ctx, -3.4, 0, 6.8, 20, 3.4); ctx.fill();
  ctx.strokeStyle = '#5a4a38'; ctx.lineWidth = 1.6; ctx.stroke();
  ctx.fillStyle = skin; ctx.beginPath(); ctx.arc(0, 22, 4.2, 0, TAU); ctx.fill();
  ctx.strokeStyle = skinD; ctx.stroke();
  /* 拐杖 */
  ctx.strokeStyle = '#8a5c2e'; ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0, 24); ctx.lineTo(2, 52); ctx.stroke();
  ctx.restore();
  /* 前手：牽繩，或抓帽子 */
  ctx.save();
  if(hat){ ctx.translate(11, -62); ctx.rotate(-1.9 + Math.sin(WT * 6) * 0.08); }
  else { ctx.translate(11, -58); ctx.rotate(-0.55 + (walking ? Math.sin(step + Math.PI) * 0.25 : 0.04 * Math.sin(WT * 2.2))); }
  ctx.fillStyle = '#c0b4a0';
  rrp(ctx, -3.4, 0, 6.8, 20, 3.4); ctx.fill();
  ctx.strokeStyle = '#5a4a38'; ctx.lineWidth = 1.6; ctx.stroke();
  ctx.fillStyle = skin; ctx.beginPath(); ctx.arc(0, 22, 4.2, 0, TAU); ctx.fill();
  ctx.strokeStyle = skinD; ctx.stroke();
  ctx.restore();
  /* 頭（側面向右，看方向偏轉） */
  ctx.save(); ctx.translate(4 + look * 8, -84); ctx.rotate(look * 0.15);
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.ellipse(0, 0, 14.5, 13.5, 0, 0, TAU); ctx.fill();
  ctx.lineWidth = 2; ctx.strokeStyle = skinD; ctx.stroke();
  /* 鼻子（側面輪廓） */
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.arc(13, 2, 3.6, 0, TAU); ctx.fill();
  ctx.strokeStyle = skinD; ctx.stroke();
  /* 白鬍子 */
  ctx.fillStyle = '#f2ede2';
  ctx.beginPath(); ctx.moveTo(4, 5); ctx.quadraticCurveTo(14, 8, 10, 15);
  ctx.quadraticCurveTo(4, 20, -3, 14); ctx.quadraticCurveTo(-1, 8, 4, 5); ctx.closePath(); ctx.fill();
  /* 耳朵 */
  ctx.fillStyle = skin; ctx.beginPath(); ctx.arc(-9, 2, 3.6, 0, TAU); ctx.fill();
  ctx.strokeStyle = skinD; ctx.stroke();
  /* 眼（單側可見，眨眼） */
  const blink = (Math.sin(WT * 1.1 + 1) > 0.975) ? 0.15 : 1;
  ctx.fillStyle = '#3a2a12';
  ctx.save(); ctx.translate(7, -3); ctx.scale(1, blink);
  ctx.beginPath(); ctx.arc(0, 0, 2.4, 0, TAU); ctx.fill(); ctx.restore();
  /* 白眉 */
  ctx.strokeStyle = '#f2ede2'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(3, -8); ctx.lineTo(11, -7); ctx.stroke();
  /* 草帽（火車來時被手按住） */
  ctx.save(); ctx.translate(0, -8 + hat * 2); ctx.rotate(-0.06 + hat * 0.1 + (windAt(t) ? Math.sin(WT * 18) * 0.05 : 0));
  ctx.fillStyle = grd('gHat', () => {
    const g = ctx.createLinearGradient(0, -10, 0, 2);
    g.addColorStop(0, '#f2d488'); g.addColorStop(1, '#d0a648'); return g;
  });
  ctx.beginPath(); ctx.ellipse(0, 0, 17.5, 4.2, 0, 0, TAU); ctx.fill();
  ctx.strokeStyle = '#a0782a'; ctx.lineWidth = 1.6; ctx.stroke();
  ctx.beginPath(); ctx.arc(0, -2, 10.5, Math.PI, 0); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#8a5c2e'; ctx.fillRect(-10, -4.6, 21, 3);
  ctx.restore();
  ctx.restore();
  ctx.restore();
}
/* ---------- 柴犬小柴 ---------- */
function drawDog(t){
  const gx = grampsXAt(t);
  const x = gx + dogOffAt(t), y = GY + 2;
  const walking = walkingAt(t);
  const trot = walking ? t * 11 : 0;
  const bob = walking ? Math.abs(Math.sin(trot)) * 3 : 0;
  const scared = t >= 8.6 && t < 14.6;
  const braced = t >= 14.6 && t < 20.4;
  const happy = t >= 26.2;
  const sit = t >= 30.4;
  const fp = flyPosAt(t);
  const hop = t >= 8.6 && t < 9.0 ? Math.sin(ss(t, 8.6, 9.0) * Math.PI) * 14 : 0;
  ctx.fillStyle = 'rgba(30,12,20,.32)';
  ctx.beginPath(); ctx.ellipse(x, y + 2, 20, 4.5, 0, 0, TAU); ctx.fill();
  ctx.save();
  ctx.translate(x, y - bob - hop);
  if(sit) ctx.rotate(-0.14);
  const coat = '#e8a45c', coatD = '#c07a34', cream = '#faecd2';
  /* 尾巴（捲尾，開心快搖） */
  ctx.save(); ctx.translate(-16, -22);
  ctx.rotate(Math.sin(WT * (happy ? 16 : 5)) * (happy ? 0.5 : 0.2) - 0.3 + (scared || braced ? 0.7 : 0));
  ctx.fillStyle = coat;
  ctx.beginPath(); ctx.arc(0, -4, 6.5, 0, TAU); ctx.fill();
  ctx.fillStyle = cream; ctx.beginPath(); ctx.arc(1, -5, 3, 0, TAU); ctx.fill();
  ctx.restore();
  /* 腿（小跑四足） */
  for(const [ox, pho] of [[-11, 0], [-6, Math.PI], [7, Math.PI * 0.5], [12, Math.PI * 1.5]]){
    const kx = walking ? Math.sin(trot + pho) * 3.5 : 0;
    const lift = walking ? Math.max(0, -Math.cos(trot + pho)) * 3 : 0;
    ctx.fillStyle = ox < 0 ? coatD : coat;
    rrp(ctx, ox + kx - 2.4, -12, 4.8, (sit && ox < 0 ? 6 : 12) - lift, 2.4); ctx.fill();
  }
  /* 身體 */
  ctx.fillStyle = grd('dogBody', () => {
    const g = ctx.createLinearGradient(0, -34, 0, -6);
    g.addColorStop(0, coat); g.addColorStop(1, coatD); return g;
  });
  ctx.beginPath(); ctx.ellipse(0, -22, 20, 12, sit ? -0.2 : 0, 0, TAU); ctx.fill();
  ctx.fillStyle = cream;
  ctx.beginPath(); ctx.ellipse(2, -16, 13, 6.5, 0, 0, TAU); ctx.fill();
  /* 頭（右向），追蝴蝶時抬頭 */
  const headUp = fp ? clamp((y - 60 - fp.y) * 0.004, -0.3, 0.35) : 0;
  const lookD = lookAt(t);
  ctx.save(); ctx.translate(17 + lookD * 4, -34); ctx.rotate(-headUp + lookD * 0.12 + (scared ? 0.08 : 0));
  /* 耳朵（嚇到往後貼） */
  for(const [eo, ea] of [[-3, -0.5], [6, -0.15]]){
    ctx.save(); ctx.translate(eo, -9);
    ctx.rotate(ea + (scared || braced ? 0.65 : 0) + (windAt(t) ? Math.sin(WT * 20) * 0.12 : 0));
    ctx.fillStyle = coat;
    ctx.beginPath(); ctx.moveTo(-3.5, 2); ctx.lineTo(0, -9); ctx.lineTo(4, 2); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#8a5028';
    ctx.beginPath(); ctx.moveTo(-1.6, 0); ctx.lineTo(0.3, -5.5); ctx.lineTo(2.4, 0); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  ctx.fillStyle = grd('dogHead', () => {
    const g = ctx.createLinearGradient(0, -12, 0, 8);
    g.addColorStop(0, coat); g.addColorStop(1, coatD); return g;
  });
  ctx.beginPath(); ctx.ellipse(0, 0, 11.5, 10, 0, 0, TAU); ctx.fill();
  /* 吻部 */
  ctx.fillStyle = cream;
  ctx.beginPath(); ctx.ellipse(8, 3, 6.5, 5, 0, 0, TAU); ctx.fill();
  ctx.fillStyle = '#241a14';
  ctx.beginPath(); ctx.arc(13, 1.5, 2, 0, TAU); ctx.fill();
  /* 眼睛 */
  const blink = (Math.sin(WT * 1.5) > 0.97) ? 0.15 : 1;
  ctx.fillStyle = '#241a14';
  ctx.save(); ctx.translate(3, -3); ctx.scale(1, scared ? 1.25 : blink);
  ctx.beginPath(); ctx.arc(0, 0, scared ? 2.8 : 2.3, 0, TAU); ctx.fill(); ctx.restore();
  if(!scared){ ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(3.8, -3.8, 0.9, 0, TAU); ctx.fill(); }
  /* 嘴／舌頭 */
  if(happy){
    ctx.strokeStyle = '#5a3018'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(8, 4, 3.4, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke();
    ctx.fillStyle = '#f2766a';
    ctx.beginPath(); ctx.ellipse(9, 8.4 + Math.sin(WT * 10) * 0.7, 2.2, 3.2, 0, 0, TAU); ctx.fill();
  } else {
    ctx.strokeStyle = '#5a3018'; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(6, 5); ctx.quadraticCurveTo(9, 6.4, 12, 5); ctx.stroke();
  }
  /* 項圈 */
  ctx.strokeStyle = '#c04838'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(-2, 8, 8, -0.5, 0.9); ctx.stroke();
  ctx.restore();
  ctx.restore();
  /* 牽繩：阿公前手 → 項圈 */
  const gx2 = grampsXAt(t);
  const hx = gx2 + 13, hy = GY - (walkingAt(t) ? Math.abs(Math.sin(t * 7.4)) * 3.6 : 0) - 40;
  const cx2 = x + 12, cy2 = y - bob - hop - 26;
  ctx.strokeStyle = '#b04838'; ctx.lineWidth = 2.4; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(hx, hy);
  ctx.quadraticCurveTo((hx + cx2) / 2, Math.max(hy, cy2) + 16, cx2, cy2); ctx.stroke();
}
/* 螢火蟲（結尾） */
function drawFireflies(t){
  if(t < 25) return;
  const a0 = ss(t, 25, 27);
  for(let i = 0; i < 8; i++){
    const seed = i * 51.7;
    const fx = 120 + ((Math.sin(WT * 0.22 + seed) * 0.5 + 0.5) * 760 + i * 90) % 800;
    const fy = 330 + Math.sin(WT * 0.5 + seed * 1.3) * 60 + Math.sin(WT * 1.7 + seed) * 14;
    const tw = Math.sin(WT * 2.2 + seed) * 0.5 + 0.5;
    ctx.globalAlpha = a0 * (0.25 + tw * 0.75);
    ctx.drawImage(glowFire, fx - 12, fy - 12, 24, 24);
    ctx.fillStyle = '#eaffb0';
    ctx.beginPath(); ctx.arc(fx, fy, 1.8, 0, TAU); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

  if(trig('bellOn')){ comic(452, 330, '叮叮叮！', '#ff6a5a', 26); }
  if(trig('dogYelp')){ comic(grampsXAt(T) + 70, 420, '汪汪！', '#ffd9a0', 24); sfx.bark(); }
  if(trig('motorDown')) sfx.motor(false);
  if(trig('bell2')) comic(676, 340, '叮叮叮', '#ff6a5a', 20);
  if(trig('hornFar')) sfx.horn(0.06);
  if(trig('hornComic')) comic(120, 380, '嗚──嗚──！', '#ffe3c2', 28);
  if(trig('trainIn')){ shake = 5; flash = 0.14; }
  if(trig('hornLoud')) sfx.horn(0.17);
  if(trig('boomComic1')) comic(330, 350, '轟隆隆！', '#ffe3c2', 34);
  if(trig('boomComic2')) comic(640, 350, '轟隆隆', '#ffe3c2', 26);
  if(trig('bellOff')){}
  if(trig('motorUp')) sfx.motor(true);
  if(trig('lookL')) comic(370, 400, '左看', '#ffe27a', 24);
  if(trig('lookR')) comic(470, 400, '右看', '#ffe27a', 24);
  if(trig('okGo')){ comic(420, 380, 'OK！', '#aee239', 30); sfx.ok(); pSpark(420, 420, 8); }
  if(trig('gold')){ sfx.jingle(); pSpark(W / 2, 220, 14); }
  if(trig('spark2')) pSpark(W / 2 - 60, 260, 8);
  if(trig('fin')){ replayBtn.classList.add('show'); }
  /* 警鈴節奏 */
  if(bellActiveAt(T) && T >= nextBellT){ sfx.bell(); nextBellT = T + 0.42; }
  if(!bellActiveAt(T)) nextBellT = T;
  /* 腳步聲 */
  if(walkingAt(T) && T >= nextStepT){ sfx.step(); sfx.patter(); nextStepT = T + 0.34; }
  if(!walkingAt(T)) nextStepT = T;
  /* 蟋蟀（傍晚氛圍） */
  if(T >= nextChirpT && !windAt(T)){ sfx.cricket(); nextChirpT = T + rnd(1.2, 2.6); }
  /* 火車隆隆聲增益 */
  if(rumbleGain){
    const wind = windAt(T) ? 1 : 0;
    rumbleGain.gain.setTargetAtTime(wind * 0.14, AC.currentTime, 0.15);
  }
  /* 散步音符 */
  if(walkingAt(T) && T < 8 && Math.random() < 0.03) pNote(grampsXAt(T) - 10, GY - 110);
  /* 火車風壓：落葉、塵土、震動 */
  if(windAt(T)){
    shake = Math.max(shake, 2.2 + Math.sin(WT * 40) * 0.5);
    if(Math.random() < 0.5) pDust(rnd(60, 900), RAIL_NEAR + 12, 1, 1);
    if(Math.random() < 0.4) pLeaf(rnd(100, 860), rnd(380, 470), 1);
  }
  /* 柵欄落定塵土 */
  if(T > 11.3 && T < 11.45 && !flags._barDust){ flags._barDust = 1; pDust(560, GY - 26, 6, 1); shake = Math.max(shake, 1.4); }
}

/* ---------- 主迴圈 ---------- */
cam.sx = 0; cam.sy = 0;
function draw(){
  ctx.clearRect(0, 0, W, H);
  const c = camAt(T);
  cam.x = c.x; cam.y = c.y; cam.z = c.z;
  cam.sx = shake > 0 ? rnd(-1, 1) * shake : 0;
  cam.sy = shake > 0 ? rnd(-1, 1) * shake * 0.7 : 0;
  layer(0.15, () => { drawSky(); });
  layer(0.35, () => { drawTown(); });
  layer(0.6, () => { drawPoles(); });
  layer(1, () => {
    drawRailAndRoad(T);
    drawLamp(T);
    drawTrain(T);
    drawCrossing(T);
    const fp = flyPosAt(T);
    if(fp) drawIMG(ctx, IMG.fly, fp.x, fp.y, 34, Math.sin(fp.k * 26) * 0.3);
    drawGramps(T);
    drawDog(T);
    drawFireflies(T);
    drawPartsL();
    drawComics();
  });
  drawForeground(T);   /* 螢幕空間前景邊帶 */
  drawEndCard(T);
  ctx.drawImage(vinCv, 0, 0, W, H);
  if(flash > 0){ ctx.globalAlpha = flash * 0.8; ctx.fillStyle = '#fff0d8'; ctx.fillRect(0, 0, W, H); ctx.globalAlpha = 1; }
  updateSub(T);
}
function frame(now){
  if(lastNow === null) lastNow = now;
  const raw = Math.min(0.05, (now - lastNow) / 1000);
  lastNow = now;
  WT += raw;
  let dt = raw * SPEED;
  if(freeze > 0){ freeze -= raw; dt = 0; }
  if(!ended && dt > 0){
    T += dt * tsAt(T);
    if(T >= TOTAL){ T = TOTAL; ended = true; }
  }
  shake = Math.max(0, shake - raw * 9);
  flash = Math.max(0, flash - raw * 1.6);
  update(dt);
  updParts(Math.max(dt, raw * 0.5));
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ---------- 重播與章節（v4 加料：章節選單） ---------- */
const CHAPTERS = [
  { name: '出門散步', t: 0 },
  { name: '警鈴響起', t: 8.2 },
  { name: '火車通過', t: 14.4 },
  { name: '停・看・聽', t: 23.2 },
  { name: '安全通過', t: 26.2 },
];
function chapterIdxAt(t){
  let idx = 0;
  for(let i = 0; i < CHAPTERS.length; i++) if(t >= CHAPTERS[i].t) idx = i;
  return idx;
}
function markChapter(idx){
  const items = chapMenu.children;
  for(let i = 0; i < items.length; i++) items[i].classList.toggle('cur', i === idx);
}
function restart(toT){
  T = toT || 0; ended = false; freeze = 0; shake = 0; flash = 0;
  parts.length = 0; comics.length = 0;
  syncFlags(T);
  nextBellT = T; nextStepT = T; nextChirpT = T + 1.5;
  curSub = null; subEl.classList.remove('show');
  replayBtn.classList.remove('show');
  markChapter(chapterIdxAt(T));
}
replayBtn.addEventListener('click', () => { sfx.click(); restart(0); });
CHAPTERS.forEach((ch, i) => {
  const b = document.createElement('button');
  b.className = 'chapItem'; b.type = 'button'; b.textContent = ch.name;
  b.addEventListener('click', () => {
    sfx.click(); sfx.whoosh();
    restart(ch.t + 0.001);
    chapMenu.classList.remove('open');
  });
  chapMenu.appendChild(b);
});
chapBtn.addEventListener('click', () => { sfx.click(); chapMenu.classList.toggle('open'); });
/* 章節高亮跟播 */
setInterval(() => { if(!ended) markChapter(chapterIdxAt(T)); }, 800);

window.__dbg = () => ({ T: T, ended: ended, era: chapterIdxAt(T), audioOn: audioOn, parts: parts.length });
</script>
