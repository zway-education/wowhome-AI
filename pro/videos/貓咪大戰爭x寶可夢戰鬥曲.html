<script>
'use strict';
/* ============================================================
   貓咪大戰爭 x 寶可夢戰鬥曲 PRO（專業AI升級 v4）
   三幕：白貓登場＋寶貝球空降 → 衝拳/電擊攻防 → 必殺咬碎勝利
   v4 加料：隱藏彩蛋（播放中點畫面 → 白貓喵喵拳）
   ============================================================ */
const W = 960, H = 540;
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const subEl = document.getElementById('subtitle');
const sndLbl = document.getElementById('sndLbl');
const replayBtn = document.getElementById('replayBtn');

function resize(){
  const s = Math.min(innerWidth / W, innerHeight / H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  cv.width = Math.round(W * s * dpr); cv.height = Math.round(H * s * dpr);
  cv.style.width = W * s + 'px'; cv.style.height = H * s + 'px';
  ctx.setTransform(s * dpr, 0, 0, s * dpr, 0, 0);
  document.documentElement.style.setProperty('--cvB', Math.max(0, (innerHeight - H * s) / 2) + 'px');
  replayBtn.style.top = Math.round(innerHeight / 2 + H * s * 0.22) + 'px';
}
addEventListener('resize', resize); resize();

const E = {
  outQuad: t => 1 - (1 - t) * (1 - t),
  inQuad: t => t * t,
  outCubic: t => 1 - Math.pow(1 - t, 3),
  inOutSine: t => -(Math.cos(Math.PI * t) - 1) / 2,
  outBack: t => 1 + 2.7 * Math.pow(t - 1, 3) + 1.7 * Math.pow(t - 1, 2)
};
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;
const ss01 = (t, a, b) => clamp((t - a) / (b - a), 0, 1);
const rnd = (a, b) => a + Math.random() * (b - a);
const TAU = Math.PI * 2;
function rr(g, x, y, w, h, r){
  g.beginPath(); g.moveTo(x + r, y);
  g.arcTo(x + w, y, x + w, y + h, r); g.arcTo(x + w, y + h, x, y + h, r);
  g.arcTo(x, y + h, x, y, r); g.arcTo(x, y, x + w, y, r); g.closePath();
}
const GC = {};
function grd(key, make){ let g = GC[key]; if(!g){ g = make(); GC[key] = g; } return g; }

/* ---------- OpenMoji 烘焙 ---------- */
function svgImg(id){
  const img = new Image();
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(new XMLSerializer().serializeToString(document.getElementById(id)));
  return img;
}
const IMG = { bolt: svgImg('svg-bolt'), star: svgImg('svg-star'), boom: svgImg('svg-boom') };
function drawIMG(g, img, x, y, w, ang){
  if(!img.complete || !img.naturalWidth) return;
  if(!img._cv){
    const c = document.createElement('canvas'); c.width = c.height = 144;
    c.getContext('2d').drawImage(img, 0, 0, 144, 144); img._cv = c;
  }
  g.save(); g.translate(x, y); if(ang) g.rotate(ang);
  g.drawImage(img._cv, -w / 2, -w / 2, w, w); g.restore();
}
function makeGlow(r, g0, b0){
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(64, 64, 2, 64, 64, 64);
  gr.addColorStop(0, `rgba(${r},${g0},${b0},.9)`);
  gr.addColorStop(0.4, `rgba(${r},${g0},${b0},.3)`);
  gr.addColorStop(1, `rgba(${r},${g0},${b0},0)`);
  g.fillStyle = gr; g.fillRect(0, 0, 128, 128);
  return c;
}
const glowSun = makeGlow(255, 244, 180), glowGold = makeGlow(255, 206, 92), glowZap = makeGlow(255, 240, 120), glowSpirit = makeGlow(190, 225, 255);
const vinCv = (() => {
  const c = document.createElement('canvas'); c.width = W; c.height = H;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(W / 2, H / 2, H * 0.44, W / 2, H / 2, H * 0.86);
  gr.addColorStop(0, 'rgba(0,0,0,0)'); gr.addColorStop(1, 'rgba(0,0,0,.38)');
  g.fillStyle = gr; g.fillRect(0, 0, W, H);
  return c;
})();

/* ---------- Web Audio（預設靜音・總線壓縮） ---------- */
let AC = null, master = null, audioOn = false;
function initAudio(){
  AC = new (window.AudioContext || window.webkitAudioContext)();
  master = AC.createGain(); master.gain.value = 0;
  const comp = AC.createDynamicsCompressor();
  comp.threshold.value = -14; comp.knee.value = 22; comp.ratio.value = 9;
  comp.attack.value = 0.003; comp.release.value = 0.24;
  master.connect(comp); comp.connect(AC.destination);
  const len = AC.sampleRate * 2, buf = AC.createBuffer(1, len, AC.sampleRate), d = buf.getChannelData(0);
  for(let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
  const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 380;
  const wg = AC.createGain(); wg.gain.value = 0.018;
  src.connect(lp); lp.connect(wg); wg.connect(master); src.start();
}
function playTone(freq, dur, type, vol, delay, slide){
  if(!audioOn || !AC || !freq) return;
  const t0 = AC.currentTime + (delay || 0);
  const o = AC.createOscillator(), g = AC.createGain(), f = AC.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = 2600; f.Q.value = 0.4;
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), t0 + dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(Math.max(vol * 0.35, 0.0005), t0 + dur * 0.55);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur * 0.95);
  o.connect(f); f.connect(g); g.connect(master);
  o.start(t0); o.stop(t0 + dur + 0.03);
}
function noiseBurst(dur, freq, type, vol, delay){
  if(!audioOn || !AC) return;
  const t0 = AC.currentTime + (delay || 0);
  const len = Math.max(1, AC.sampleRate * dur) | 0, buf = AC.createBuffer(1, len, AC.sampleRate), d = buf.getChannelData(0);
  for(let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = AC.createBufferSource(); src.buffer = buf;
  const f = AC.createBiquadFilter(); f.type = type; f.frequency.value = freq;
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t0); g.gain.exponentialRampToValueAtTime(vol, t0 + 0.012);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  src.connect(f); f.connect(g); g.connect(master); src.start(t0); src.stop(t0 + dur + 0.05);
}
const sfxHit = () => { playTone(180, 0.12, 'sine', 0.22); playTone(90, 0.15, 'sine', 0.18); noiseBurst(0.08, 900, 'bandpass', 0.16); };
const sfxCrunch = () => {
  [0, 0.1, 0.2].forEach((d, i) => noiseBurst(0.08, 900 - i * 150, 'bandpass', 0.26 - i * 0.05, d));
  playTone(110, 0.18, 'sine', 0.16);
};
const sfxZap = () => { playTone(1400, 0.28, 'sawtooth', 0.07, 0, -1100); noiseBurst(0.22, 3200, 'highpass', 0.1); };
const sfxWin = () => [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => playTone(f, 0.16, 'sine', 0.2, i * 0.09));
const sfxMeow = () => { playTone(700, 0.07, 'triangle', 0.12); playTone(920, 0.12, 'triangle', 0.1, 0.06, -180); };
const sfxDash = () => noiseBurst(0.22, 1200, 'bandpass', 0.12);
const sfxPop = () => { noiseBurst(0.12, 1500, 'highpass', 0.12); playTone(660, 0.18, 'sine', 0.1, 0, 220); };
const sfxThud = () => { playTone(70, 0.2, 'sine', 0.2); noiseBurst(0.1, 240, 'lowpass', 0.18); };
function setAudio(on){
  if(on && !AC) initAudio();
  if(AC && AC.state === 'suspended') AC.resume();
  audioOn = on;
  if(master) master.gain.setTargetAtTime(on ? 0.9 : 0, AC.currentTime, 0.06);
  sndLbl.textContent = on ? '聲音：開' : '聲音：關';
  document.getElementById('sndX').style.display = on ? 'none' : '';
  document.getElementById('sndWave').style.display = on ? '' : 'none';
}
document.getElementById('sndBtn').addEventListener('click', () => { setAudio(!audioOn); playTone(880, 0.06, 'triangle', 0.12); });
/* 自動開聲：載入即嘗試開啟；若被瀏覽器政策擋住，第一次互動自動補開 */
try { setAudio(true); } catch(e) {}
(function(){ const unlockAudio = () => { if (AC && AC.state === 'suspended') AC.resume(); };
  addEventListener('pointerdown', unlockAudio, {once:true}); addEventListener('keydown', unlockAudio, {once:true}); })();

/* ---------- 原創 8bit 戰鬥曲（沿用初版旋律，逐音排程可重播不疊層） ---------- */
const NOTE = {C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392.00,A4:440.00,B4:493.88,
  C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880.00,B5:987.77,C6:1046.5,R:0};
const TEMPO = 0.16;
const melodySrc = [['E5',1],['G5',1],['C5',1],['E5',1],['D5',1],['F5',1],['B4',1],['D5',1],
  ['C5',1],['E5',1],['G5',1],['C6',2],['B5',1],['G5',1],['E5',1],['G5',1],
  ['A5',1],['F5',1],['D5',1],['F5',1],['G5',2],['R',1],['E5',1],
  ['C5',1],['D5',1],['E5',1],['F5',1],['G5',1],['A5',1],['B5',1],['C6',3]];
const bassSrc = [['C4',2],['G4',2],['D4',2],['A4',2],['C4',2],['G4',2],['E4',2],['C4',2],
  ['F4',2],['C4',2],['D4',2],['G4',2],['C4',4]];
function flatten(src, mult){
  const ev = []; let t = 0;
  for(const [n, b] of src){ ev.push([NOTE[n] * mult, t, b * TEMPO]); t += b * TEMPO; }
  return { ev, total: t };
}
const MEL = flatten(melodySrc, 1), BAS = flatten(bassSrc, 0.5);
let melIdx = 0, melBase = 0.3, basIdx = 0, basBase = 0.3;
function updateMusic(t){
  if(!audioOn) return;
  if(t > 25.6){ return; } /* 勝利後改播 jingle */
  let guard = 0;
  while(guard++ < 40 && melBase + MEL.ev[melIdx][1] <= t){
    const [f, , d] = MEL.ev[melIdx];
    if(f) playTone(f, d, 'sine', 0.2);
    if(++melIdx >= MEL.ev.length){ melIdx = 0; melBase += MEL.total; }
  }
  guard = 0;
  while(guard++ < 40 && basBase + BAS.ev[basIdx][1] <= t){
    const [f, , d] = BAS.ev[basIdx];
    if(f) playTone(f, d, 'sine', 0.17);
    if(++basIdx >= BAS.ev.length){ basIdx = 0; basBase += BAS.total; }
  }
}

/* ---------- 字幕（沿用初版四句＋補足新拍點） ---------- */
const CAPS = [
  { a: 0.5,  b: 3.4,  text: '星際白貓戰士登場！' },
  { a: 3.9,  b: 6.4,  text: '寶貝球開啟——電氣鼠參戰！' },
  { a: 8.0,  b: 11.5, text: '蓄力衝拳，氣勢全開！' },
  { a: 12.0, b: 15.0, text: '電氣鼠反擊——十萬電擊！' },
  { a: 15.5, b: 18.2, text: '白貓戰士蓄滿力量…' },
  { a: 18.5, b: 22.5, text: '必殺技——大口咬碎！' },
  { a: 24.5, b: 30.5, text: '勝利！★ 戰鬥之歌完結 ★' },
];
let curSub = null;
function updateSub(t){
  let hit = null;
  for(const s of CAPS){ if(t >= s.a && t < s.b){ hit = s; break; } }
  if(hit !== curSub){
    curSub = hit;
    if(hit){ subEl.textContent = hit.text; subEl.classList.add('show'); }
    else subEl.classList.remove('show');
  }
}

];
function camAt(t){
  let a = CAMK[0], b = CAMK[CAMK.length - 1];
  for(let i = 0; i < CAMK.length - 1; i++){
    if(t >= CAMK[i].t && t <= CAMK[i + 1].t){ a = CAMK[i]; b = CAMK[i + 1]; break; }
  }
  const k = b.t === a.t ? 0 : E.inOutSine(ss01(t, a.t, b.t));
  return { x: lerp(a.x, b.x, k), y: lerp(a.y, b.y, k), z: lerp(a.z, b.z, k) };

function updParts(dt){
  for(let i = parts.length - 1; i >= 0; i--){
    const p = parts[i];
    p.life += dt; p.vy += (p.grav || 0) * dt; p.x += p.vx * dt; p.y += p.vy * dt;
    if(p.vr) p.rot += p.vr * dt;
    if(p.life > p.ttl){ parts[i] = parts[parts.length - 1]; parts.pop(); }
  }
}
function drawParts(g){
  for(const p of parts){
    const a = clamp(1 - p.life / p.ttl, 0, 1);
    g.globalAlpha = a;
    if(p.kind === 'star'){ drawIMG(g, IMG.star, p.x, p.y, p.size, p.rot || 0); }
    else if(p.kind === 'line'){

}

  g.beginPath(); g.arc(0, 0, 24, 0, TAU);

/* ---------- 貓媽媽（背景加油角色，蓄力時登場） ---------- */
const CHARGE_WINS = [[8, 9.2], [16.2, 19.3]];
function mamaAlphaAt(t){
  let a = 0;
  for(const [s, e] of CHARGE_WINS){
    if(t < s - 0.3 || t > e + 0.3) continue;
    let k;
    if(t < s) k = ss01(t, s - 0.3, s);
    else if(t > e) k = 1 - ss01(t, e, e + 0.3);
    else k = 1;
    a = Math.max(a, k);
  }
  return a;
}

  g.beginPath(); g.arc(0, 0, 19, 0, TAU);
  g.fillStyle = grd('mamaHead', () => {

  /* 瞇眼微笑（慈祥表情） */
  g.strokeStyle = 'rgba(70,90,120,.75)'; g.lineWidth = 2; g.lineCap = 'round';
  g.beginPath(); g.moveTo(-11, -2); g.quadraticCurveTo(-7, -6, -3, -2); g.stroke();
  g.beginPath(); g.moveTo(3, -2); g.quadraticCurveTo(7, -6, 11, -2); g.stroke();
  /* 腮紅 */
  g.fillStyle = 'rgba(255,170,190,.4)';
  g.beginPath(); g.arc(-11, 4, 3, 0, TAU); g.fill();
  g.beginPath(); g.arc(11, 4, 3, 0, TAU); g.fill();
  /* 嘴 */
  g.strokeStyle = 'rgba(80,60,70,.7)'; g.lineWidth = 1.4;
  g.beginPath(); g.moveTo(0, 6); g.quadraticCurveTo(-3, 9, -6, 7); g.stroke();
  g.beginPath(); g.moveTo(0, 6); g.quadraticCurveTo(3, 9, 6, 7); g.stroke();
  g.restore();
  g.restore();
}

/* ---------- 電氣鼠（原創風格化對手，非官方素材） ---------- */
function drawMouse(g, x, y, scale, phase, pose, appearK){
  g.save();
  g.translate(x, y);
  const pop = E.outBack(clamp(appearK, 0, 1));
  g.scale(-scale * pop, scale * pop);
  let sqX = 1, sqY = 1, bob = 0, tilt = 0;
  const bounce = Math.sin(phase * 5.4) * 3;
  if(pose === 'idle') bob = bounce;
  if(pose === 'spark'){ sqX = 1.1; sqY = 0.9; bob = bounce * 0.3; }
  if(pose === 'hit'){ sqX = 0.8; sqY = 1.2; tilt = 0.2; }
  if(pose === 'ko'){ tilt = 1.35; bob = 26; }
  g.translate(0, bob); g.rotate(tilt); g.scale(sqX, sqY);
  /* 陰影 */
  g.globalAlpha = 0.28; g.fillStyle = '#000';
  g.save(); g.rotate(-tilt);
  g.beginPath(); g.ellipse(0, 52 - bob, 30, 8, 0, 0, TAU); g.fill();
  g.restore();
  g.globalAlpha = 1;
  /* 閃電尾巴 */
  g.save(); g.translate(-26, 0); g.rotate(Math.sin(phase * 4) * 0.14 - 0.2);
  g.fillStyle = '#f7c948';
  g.beginPath();
  g.moveTo(0, 0); g.lineTo(-14, -10); g.lineTo(-8, -12); g.lineTo(-24, -26);
  g.lineTo(-16, -28); g.lineTo(-30, -42); g.lineTo(-18, -38); g.lineTo(-6, -20);
  g.lineTo(-12, -18); g.lineTo(2, -6); g.closePath(); g.fill();
  g.strokeStyle = '#c99a1e'; g.lineWidth = 1.4; g.stroke();
  g.restore();
  /* 耳朵（長尖，黑尖端） */
  for(const sgn of [-1, 1]){
    g.save(); g.translate(sgn * 13, -26); g.rotate(sgn * 0.35 + Math.sin(phase * 3) * 0.04 * sgn);
    g.fillStyle = grd('mEar', () => {
      const gr = g.createLinearGradient(0, -26, 0, 0);
      gr.addColorStop(0, '#3b3b3b'); gr.addColorStop(0.42, '#3b3b3b'); gr.addColorStop(0.48, '#ffe45c'); gr.addColorStop(1, '#f7c948');
      return gr;
    });
    g.beginPath(); g.ellipse(0, -12, 7, 17, 0, 0, TAU); g.fill();
    g.restore();
  }
  /* 身體 */
  g.beginPath(); g.ellipse(0, 6, 27, 32, 0, 0, TAU);
  g.fillStyle = grd('mBody', () => {
    const gr = g.createRadialGradient(-10, -12, 3, 2, 10, 44);
    gr.addColorStop(0, '#fff3a6'); gr.addColorStop(0.5, '#ffdf4f'); gr.addColorStop(1, '#dfa72e');
    return gr;
  });
  g.fill();
  /* 背紋 */
  g.fillStyle = '#a9762a';
  g.beginPath(); g.ellipse(0, 26, 16, 5, 0, 0, Math.PI); g.fill();
  /* 手腳 */
  g.fillStyle = '#eab53a';
  g.beginPath(); g.ellipse(-22, 12, 7, 10, -0.4, 0, TAU); g.fill();
  g.beginPath(); g.ellipse(22, 12, 7, 10, 0.4, 0, TAU); g.fill();
  g.beginPath(); g.ellipse(-12, 36, 10, 6, 0, 0, TAU); g.fill();
  g.beginPath(); g.ellipse(12, 36, 10, 6, 0, 0, TAU); g.fill();
  /* 臉 */
  const blink = (Math.sin(phase * 2 + 1.3) > 0.96) ? 0.15 : 1;
  if(pose === 'ko'){
    g.strokeStyle = '#5a3a10'; g.lineWidth = 2.6; g.lineCap = 'round';
    for(const exx of [-9, 9]){
      g.beginPath(); g.moveTo(exx - 4, -18); g.lineTo(exx + 4, -10);
      g.moveTo(exx + 4, -18); g.lineTo(exx - 4, -10); g.stroke();
    }
  } else {
    g.fillStyle = '#241f1a';
    for(const exx of [-9, 9]){
      g.save(); g.translate(exx, -14); g.scale(1, blink);
      g.beginPath(); g.arc(0, 0, 4.6, 0, TAU); g.fill(); g.restore();
    }
    g.fillStyle = '#fff';
    g.beginPath(); g.arc(-10.4, -15.6, 1.3, 0, TAU); g.fill();
    g.beginPath(); g.arc(7.6, -15.6, 1.3, 0, TAU); g.fill();
  }
  /* 電氣紅頰（蓄電時發亮） */
  const chg = pose === 'spark' ? 0.6 + 0.4 * Math.sin(phase * 26) : 0;
  if(chg > 0){ g.drawImage(glowZap, -25 - 9, -6 - 9, 18 + chg * 12, 18 + chg * 12); g.drawImage(glowZap, 16 - 9 - chg * 6, -6 - 9, 18 + chg * 12, 18 + chg * 12); }
  g.fillStyle = chg > 0 ? '#ff5b45' : '#e8563f';
  g.beginPath(); g.arc(-16, -5, 5.4, 0, TAU); g.fill();
  g.beginPath(); g.arc(16, -5, 5.4, 0, TAU); g.fill();
  /* 鼻嘴 */
  g.fillStyle = '#241f1a';
  g.beginPath(); g.arc(0, -8, 1.6, 0, TAU); g.fill();
  g.strokeStyle = '#5a3a10'; g.lineWidth = 1.6;
  if(pose === 'ko'){
    g.beginPath(); g.arc(0, 0, 4, 1.1 * Math.PI, 1.9 * Math.PI); g.stroke();
  } else {
    g.beginPath(); g.moveTo(0, -6); g.quadraticCurveTo(-3, -2, -6, -4); g.stroke();
    g.beginPath(); g.moveTo(0, -6); g.quadraticCurveTo(3, -2, 6, -4); g.stroke();
  }
  g.restore();
}

/* ---------- 寶貝球（原創上紅下白圓球） ---------- */
function drawBall(g, x, y, r, openK, rot){
  g.save(); g.translate(x, y); g.rotate(rot || 0);
  const sep = openK * 26;
  /* 下半 */
  g.save(); g.translate(0, sep * 0.6);
  g.fillStyle = grd('ballW', () => {
    const gr = g.createLinearGradient(0, 0, 0, 30);
    gr.addColorStop(0, '#ffffff'); gr.addColorStop(1, '#c9ced8');
    return gr;
  });
  g.beginPath(); g.arc(0, 0, r, 0, Math.PI); g.closePath(); g.fill();
  g.restore();
  /* 上半 */
  g.save(); g.translate(0, -sep);
  g.fillStyle = grd('ballR', () => {
    const gr = g.createLinearGradient(0, -30, 0, 0);
    gr.addColorStop(0, '#ff8a80'); gr.addColorStop(1, '#e0362c');
    return gr;
  });
  g.beginPath(); g.arc(0, 0, r, Math.PI, TAU); g.closePath(); g.fill();
  g.fillStyle = '#20242e';
  g.fillRect(-r, -3, r * 2, 6);
  g.fillStyle = '#fff'; g.beginPath(); g.arc(0, 0, 7, 0, TAU); g.fill();
  g.strokeStyle = '#20242e'; g.lineWidth = 3; g.beginPath(); g.arc(0, 0, 7, 0, TAU); g.stroke();
  g.restore();
  g.restore();
}

/* ---------- HP 條（寶可夢式戰鬥 UI） ---------- */
function drawHP(g, x, y, wBar, name, hp, alignRight){
  g.save();
  g.fillStyle = 'rgba(7,11,20,.62)';
  rr(g, x, y, wBar, 46, 12); g.fill();
  g.strokeStyle = 'rgba(255,255,255,.28)'; g.lineWidth = 1.5;
  rr(g, x, y, wBar, 46, 12); g.stroke();
  g.fillStyle = '#fff'; g.font = 'bold 15px "Noto Sans TC",sans-serif';
  g.textAlign = 'left';
  g.fillText(name, x + 12, y + 19);
  const bx = x + 12, by = y + 26, bw = wBar - 24, bh = 10;
  g.fillStyle = 'rgba(255,255,255,.18)';
  rr(g, bx, by, bw, bh, 5); g.fill();
  const pct = clamp(hp / 100, 0, 1);
  if(pct > 0){
    g.fillStyle = pct > 0.5 ? '#6fe06f' : pct > 0.22 ? '#ffd24a' : '#ff5b45';
    rr(g, bx, by, Math.max(6, bw * pct), bh, 5); g.fill();
  }
  g.restore();
}

/* ---------- 角色運動軌跡 ---------- */
const GY = H * 0.82 - 24, CATX0 = 300, MX = 660;
function catXAt(t){
  if(t < 2.2) return lerp(-90, CATX0, E.outCubic(ss01(t, 0, 2.2)));
  if(t < 9.2) return CATX0;
  if(t < 9.6) return lerp(CATX0, 570, E.inQuad(ss01(t, 9.2, 9.6)));      /* 衝拳 */
  if(t < 10.4) return 570;
  if(t < 11.2) return lerp(570, CATX0, E.outCubic(ss01(t, 10.4, 11.2))); /* 退回 */
  if(t < 19.3) return CATX0;
  if(t < 19.65) return lerp(CATX0, 575, E.inQuad(ss01(t, 19.3, 19.65))); /* 必殺衝刺 */
  if(t < 22.6) return 575;
  if(t < 23.8) return lerp(575, 430, E.inOutSine(ss01(t, 22.6, 23.8)));
  return 430;
}
function catPoseAt(t){
  if(T - eggAt < 0.35) return 'egg';
  if(t < 2.2) return 'dash';
  if(t >= 8 && t < 9.2) return 'charge';
  if(t >= 9.2 && t < 9.6) return 'dash';
  if(t >= 9.6 && t < 10.4) return 'punch';
  if(t >= 13.2 && t < 14.6) return 'hit';
  if(t >= 16.2 && t < 18.5) return 'charge';
  if(t >= 18.5 && t < 19.3) return 'charge';
  if(t >= 19.3 && t < 19.65) return 'dash';
  if(t >= 19.65 && t < 22.2) return 'bite';
  if(t >= 24) return 'win';
  return 'idle';
}
function mousePoseAt(t){
  if(t >= 19.65) return 'ko';
  if(t >= 12 && t < 13.4) return 'spark';
  if(t >= 9.6 && t < 10.5) return 'hit';
  return 'idle';
}
function mouseKnock(t){
  if(t >= 19.65) return lerp(0, 64, E.outCubic(ss01(t, 19.65, 20.3)));
  if(t >= 9.6) return 44 * (1 - E.outCubic(ss01(t, 9.6, 10.6)));
  return 0;
}

/* ---------- 主繪製 ---------- */
function draw(t, dt){
  ctx.clearRect(0, 0, W, H);
  const cam = camAt(t);
  ctx.save();
  if(shake > 0) ctx.translate(rnd(-1, 1) * shake * 16, rnd(-1, 1) * shake * 16);
  ctx.translate(W / 2, H / 2);
  ctx.scale(cam.z, cam.z);
  ctx.translate(-cam.x, -cam.y);

  drawBG(ctx, t, cam);

  /* 寶貝球（2.6 落下 → 3.8 開啟 → 4.6 淡出） */
  if(t >= 2.6 && t < 4.8){
    const dropK = ss01(t, 2.6, 3.1);
    let by = lerp(-60, GY + 8, E.inQuad(dropK));
    if(t >= 3.1){ by = GY + 8 - Math.abs(Math.sin(ss01(t, 3.1, 3.7) * Math.PI)) * 40 * (1 - ss01(t, 3.1, 3.7)); }
    const openK = E.outCubic(ss01(t, 3.8, 4.2));
    ctx.globalAlpha = 1 - ss01(t, 4.4, 4.8);
    drawBall(ctx, MX, by, 22, openK, t < 3.1 ? t * 9 : 0);
    if(openK > 0){
      ctx.globalAlpha = (1 - ss01(t, 3.8, 4.6)) * 0.9;
      ctx.drawImage(glowZap, MX - 70, GY - 90, 140, 140);
    }
    ctx.globalAlpha = 1;
  }
  /* 電氣鼠 */
  if(t >= 3.9){
    drawMouse(ctx, MX + mouseKnock(t), GY - 8, 1.15, t, mousePoseAt(t), ss01(t, 3.9, 4.5));
    /* KO 眩暈星星（環繞頭頂） */
    if(t >= 20.4 && t < 26){
      for(let i = 0; i < 3; i++){
        const a = t * 3.4 + i * TAU / 3;
        drawIMG(ctx, IMG.star, MX + 40 + Math.cos(a) * 26, GY - 30 + Math.sin(a) * 9, 17, a);
      }
    }
  }
  /* 蓄電小閃電（頰邊） */
  if(t >= 12.3 && t < 13.2){
    for(let i = 0; i < 2; i++){
      const a = t * 20 + i * 3;
      drawIMG(ctx, IMG.bolt, MX - 30 + Math.cos(a) * 34, GY - 46 + Math.sin(a * 1.3) * 20, 22, Math.sin(a));
    }
  }
  /* 十萬電擊：天降大閃電打在白貓 */
  if(t >= 13.2 && t < 13.75){
    const zk = ss01(t, 13.2, 13.75);
    ctx.globalAlpha = (Math.sin(t * 60) * 0.5 + 0.5) * (1 - zk) * 0.95 + 0.05;
    drawIMG(ctx, IMG.bolt, catXAt(t) + 6, GY - 150, 210, 0);
    ctx.drawImage(glowZap, catXAt(t) - 90, GY - 130, 180, 180);
    ctx.globalAlpha = 1;
  }
  /* 貓媽媽（蓄力時在後方加油・體型為白貓的2倍） */
  const mamaA = mamaAlphaAt(t);
  if(mamaA > 0) drawMamaCat(ctx, CATX0 - 150, GY + 4, 3.2, t, mamaA);
  /* 白貓戰士 */
  const cx0 = catXAt(t);
  /* 衝刺殘影 */
  const dashing = (t >= 9.2 && t < 9.6) || (t >= 19.3 && t < 19.65);
  if(dashing){
    for(let i = 1; i <= 3; i++){
      ctx.globalAlpha = 0.16 / i;
      drawCat(ctx, cx0 - i * 34, GY, 1.6, 1, t, 'dash', CAT_A);
    }
    ctx.globalAlpha = 1;
  }
  drawCat(ctx, cx0, GY, 1.6, 1, t, catPoseAt(t), CAT_A);
  /* 撞擊爆點（OpenMoji collision） */
  if((t >= 9.6 && t < 10.1) || (t >= 19.65 && t < 20.3)){
    const bt = t >= 19.65 ? ss01(t, 19.65, 20.3) : ss01(t, 9.6, 10.1);
    ctx.globalAlpha = 1 - bt;
    drawIMG(ctx, IMG.boom, MX - 40, GY - 46, 90 + bt * 90, bt * 1.4);
    ctx.globalAlpha = 1;
  }
  drawParts(ctx);
  ctx.restore();

  /* ------ 螢幕空間 UI ------ */
  /* HP 條 */
  if(t >= 6.6){
    const inK = E.outBack(ss01(t, 6.6, 7.4));
    ctx.save();
    ctx.globalAlpha = clamp(inK, 0, 1);
    drawHP(ctx, lerp(-260, 18, inK), 64, 240, '白貓戰士', hpCat);
    drawHP(ctx, lerp(W + 20, W - 258, inK), 64, 240, '電氣鼠', hpMouse, true);
    ctx.restore();
  }
  /* VS 快閃 */
  if(t >= 6.3 && t < 7.9){
    const vk = ss01(t, 6.3, 6.7), vout = ss01(t, 7.4, 7.9);
    ctx.save();
    ctx.globalAlpha = (1 - vout);
    ctx.translate(W / 2, H * 0.4);
    ctx.scale(lerp(2.6, 1, E.outCubic(vk)), lerp(2.6, 1, E.outCubic(vk)));
    ctx.textAlign = 'center';
    ctx.font = 'bold 84px "Noto Sans TC",sans-serif';
    ctx.fillStyle = grd('vs', () => {
      const gr = ctx.createLinearGradient(-70, 0, 70, 0);
      gr.addColorStop(0, '#ffcf5c'); gr.addColorStop(0.5, '#ffa72e'); gr.addColorStop(1, '#ff7e3d');
      return gr;
    });
    ctx.strokeStyle = 'rgba(60,20,0,.8)'; ctx.lineWidth = 8; ctx.strokeText('VS', 0, 30);
    ctx.fillText('VS', 0, 30);
    ctx.restore();
  }
  /* 結尾面板 */
  if(t >= 26){
    const ek = E.outCubic(ss01(t, 26, 26.8));
    ctx.save();
    ctx.globalAlpha = ek * 0.82;
    ctx.fillStyle = '#070b14'; ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = ek;
    ctx.textAlign = 'center';
    ctx.save();
    ctx.translate(W / 2, H * 0.3); ctx.scale(lerp(0.8, 1, E.outBack(ek)), lerp(0.8, 1, E.outBack(ek)));
    ctx.font = 'bold 54px "Noto Sans TC",sans-serif';
    ctx.fillStyle = grd('winTtl', () => {
      const gr = ctx.createLinearGradient(-180, 0, 180, 0);
      gr.addColorStop(0, '#ffcf5c'); gr.addColorStop(0.5, '#ffa72e'); gr.addColorStop(1, '#ff7e3d');
      return gr;
    });
    ctx.fillText('勝 利 ！', 0, 0);
    ctx.restore();
    ctx.fillStyle = '#dfe8ff'; ctx.font = 'bold 20px "Noto Sans TC",sans-serif';
    ctx.fillText('★ 戰鬥之歌完結 ★', W / 2, H * 0.3 + 46);
    ctx.font = '15px "Noto Sans TC",sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,.65)';
    ctx.fillText(eggN > 0 ? ('彩蛋達成：喵喵拳 ×' + eggN + '！') : '隱藏彩蛋：重播時按 Z 鍵，白貓有驚喜…', W / 2, H * 0.3 + 84);
    ctx.font = '13px "Noto Sans TC",sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,.4)';
    ctx.fillText('AI未來創作營隊', W / 2, H - 20);
    ctx.restore();
  }
  ctx.drawImage(vinCv, 0, 0, W, H);
  if(flashW > 0){ ctx.globalAlpha = flashW * 0.75; ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H); ctx.globalAlpha = 1; }
  if(flashY > 0){ ctx.globalAlpha = flashY * 0.5; ctx.fillStyle = '#ffe45c'; ctx.fillRect(0, 0, W, H); ctx.globalAlpha = 1; }
  updateSub(t);
}

/* ---------- 事件與更新 ---------- */
function update(dt){
  /* 登場塵土 */
  if(T > 0.3 && T < 2.2 && Math.random() < 0.5) pDust(catXAt(T) - 20, GY + 46, 1);
  if(trig('land', 2.25)){ pDust(CATX0, GY + 48, 8); sfxThud(); shake = Math.max(shake, 0.14); }
  if(trig('ballDrop', 2.6)) playTone(500, 0.3, 'sine', 0.08, 0, -260);
  if(trig('ballBounce', 3.12)){ pDust(MX, GY + 30, 6); sfxThud(); }
  if(trig('ballOpen', 3.82)){ sfxPop(); flashW = Math.max(flashW, 0.4); pBurst(MX, GY - 20, 20, ['#fff', '#ffe45c', '#8fd3ff'], 260); }
  if(trig('vs', 6.35)){ sfxWin(); flashW = Math.max(flashW, 0.3); }
  if(T >= 8 && T < 9.2 && Math.random() < 0.65) pAura(CATX0, GY - 10);
  if(mamaAlphaAt(T) > 0.5 && Math.random() < 0.25) pAura(CATX0 - 150, GY - 90);
  if(trig('dash1', 9.2)) sfxDash();
  if(T >= 9.2 && T < 9.6 && Math.random() < 0.8) pSpeedline(catXAt(T) - 40, GY - 40);
  if(trig('punch', 9.62)){
    freeze = 0.16; shake = 0.34; sfxHit();
    hpMouseT = 62;
    pBurst(MX - 30, GY - 40, 18, ['#fff', '#ffd76b', '#ff9f5c'], 340);
    pStar(MX - 20, GY - 60, 4, 240);
  }
  if(T >= 12.3 && T < 13.2 && Math.random() < 0.4) pAura(MX, GY - 20);
  if(trig('zap', 13.22)){
    freeze = 0.12; shake = 0.3; flashY = 0.55; sfxZap();
    hpCatT = 70;
    pBurst(CATX0, GY - 30, 16, ['#ffe45c', '#fff', '#ffd24a'], 300);
  }
  if(T >= 16.2 && T < 18.5 && Math.random() < 0.75) pAura(CATX0, GY - 6);
  if(trig('slowmo', 18.5)) playTone(220, 0.5, 'sine', 0.08, 0, -120);
  if(trig('dash2', 19.3)) sfxDash();
  if(T >= 19.3 && T < 19.65 && Math.random() < 0.85) pSpeedline(catXAt(T) - 40, GY - 40);
  if(trig('bite', 19.68)){
    freeze = 0.24; shake = 0.5; flashW = 0.6; sfxCrunch();
    hpMouseT = 0;
    pBurst(MX - 20, GY - 30, 26, ['#fff', '#ffd76b', '#ff9f5c', '#ffe45c'], 400);
    pStar(MX - 10, GY - 50, 7, 320);
  }
  if(trig('winPose', 24.05)){ sfxWin(); pStar(catXAt(T), GY - 90, 8, 300); }
  if(T >= 24 && T < 30 && Math.random() < 0.5) pConfetti();
  if(trig('showReplay', 27)){ replayBtn.classList.add('show'); }
  /* HP 平滑追趕 */
  hpCat += (hpCatT - hpCat) * Math.min(1, dt * 5);
  hpMouse += (hpMouseT - hpMouse) * Math.min(1, dt * 5);
}

function frame(now){
  if(lastNow === null) lastNow = now;
  const raw = Math.min(0.05, (now - lastNow) / 1000);
  lastNow = now;
  let dt = raw * SPEED;
  if(freeze > 0){ freeze -= raw; dt = 0; }
  if(!ended && dt > 0){
    T += dt * tsAt(T);
    if(T >= TOTAL){ T = TOTAL; ended = true; }
  }
  shake = Math.max(0, shake - raw * 1.6);
  flashW = Math.max(0, flashW - raw * 2.4);
  flashY = Math.max(0, flashY - raw * 2.0);
  update(dt);
  updParts(Math.max(dt, raw * 0.5));
  draw(T, dt);
  updateMusic(T);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ---------- 重新播放（完整重置，不留殘影/疊音） ---------- */
function restart(){
  T = 0; ended = false; freeze = 0; shake = 0; flashW = 0; flashY = 0;
  hpCat = hpMouse = hpCatT = hpMouseT = 100;
  flags = {}; parts.length = 0;
