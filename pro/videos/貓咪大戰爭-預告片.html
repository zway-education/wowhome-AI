<!DOCTYPE html>
<!-- 專業AI升級 v6 -->
<!-- v6 摘要：電影運鏡（魔王登場推鏡/衝鋒急推/撞擊zoom-punch）＋letterbox＋閃白轉場＋20秒起逐字大標題與光暈掃過＋烘焙草原背景/暈影/顆粒＋行軍塵土/衝鋒速度線/勝利彩帶粒子＋Web Audio 預告片音效（braam魔王登場/衝鋒riser/撞擊重braam/結尾定格重音＋殘響母線與配樂ducking） -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="author" content="AI未來創作營隊">
<title>貓咪大戰爭 介紹影片</title>
<style>
  :root{
    --cyan:#38e1ff; --blue:#4f7cff; --purple:#9a6bff; --pink:#ff6cc7;
  }
  html,body{
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:#070b14; font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;
    touch-action:none;
  }
  #stage{ position:fixed; inset:0; display:block; }
  #ui{
    position:fixed; inset:0; pointer-events:none;
    display:flex; flex-direction:column; justify-content:space-between;
  }
  .top{
    display:flex; justify-content:space-between; align-items:flex-start;
    padding: max(12px, env(safe-area-inset-top)) 14px 0 14px;
  }
  .title-chip{
    background:rgba(7,11,20,.42); border-radius:12px; padding:6px 12px;
    display:inline-block;
  }
  .title{
    font-weight:800; font-size:clamp(16px,3.2vw,22px); color:#fff;
    background:linear-gradient(92deg,var(--cyan),var(--blue),var(--purple));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    text-shadow:0 0 18px rgba(56,225,255,.25);
  }
  .brand{
    font-size:11px; color:#e8f0ff; opacity:.85; margin-top:2px;
  }
  button{
    pointer-events:auto; border:none; border-radius:14px; cursor:pointer;
    font-weight:700; font-family:inherit;
  }
  #muteBtn{
    width:44px;height:44px;min-width:44px;min-height:44px;
    background:rgba(10,16,30,.65); border:1.5px solid rgba(255,255,255,.18);
    color:#fff; font-size:20px; display:flex; align-items:center; justify-content:center;
  }
  .caption-wrap{
    display:flex; justify-content:center; padding-bottom: max(18px, env(safe-area-inset-bottom));
  }
  .caption{
    pointer-events:none; color:#fff; font-weight:700; font-size:clamp(14px,3.6vw,20px);
    background:rgba(7,11,20,.55); border:1px solid rgba(255,255,255,.12);
    padding:8px 18px; border-radius:999px; max-width:88vw; text-align:center;
    opacity:0; transition:opacity .35s ease;
  }
  .caption.show{ opacity:1; }
  #hint{
    position:absolute; top:56px; left:0; right:0; text-align:center;
    color:#fff6cf; font-size:13px; opacity:.9; pointer-events:none;
    transition:opacity .6s ease;
  }
  #replayWrap{
    position:fixed; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(5,8,16,.55); pointer-events:none;
  }
  #replayWrap.show{ display:flex; pointer-events:auto; }
  #replayBtn{
    padding:14px 30px; font-size:17px; color:#0a0f1c;
    background:linear-gradient(92deg,var(--cyan),var(--blue));
    box-shadow:0 8px 24px rgba(79,124,255,.45);
    min-height:52px;
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div id="ui">
  <div class="top">
    <div class="title-chip">
      <div class="title">貓咪大戰爭 介紹影片</div>
      <div class="brand">AI未來創作營隊</div>
    </div>
    <button id="muteBtn" aria-label="靜音切換">🔇</button>
  </div>
  <div id="hint">點畫面開啟音效與動畫 ▶</div>
  <div class="caption-wrap"><div class="caption" id="caption"></div></div>
</div>
<div id="replayWrap">
  <button id="replayBtn">🔁 重新播放</button>
</div>

<script>
(function(){
"use strict";

// ---------- 畫布縮放 ----------
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W*DPR; canvas.height = H*DPR;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize);
resize();

// ---------- 音效：Web Audio 原創進行曲風配樂 ----------
let actx=null, masterGain=null, musicGain=null, VERB=null, NOISE_BUF=null, muted=true;
function ensureAudio(){
  if(actx) return;
  actx = new (window.AudioContext||window.webkitAudioContext)();
  // v6 母線：DynamicsCompressor＋程序化殘響＋配樂子匯流排（可 ducking）
  const comp = actx.createDynamicsCompressor();
  comp.threshold.value=-16; comp.knee.value=18; comp.ratio.value=7;
  comp.attack.value=0.004; comp.release.value=0.2;
  comp.connect(actx.destination);
  masterGain = actx.createGain();
  masterGain.gain.value = 0.0;
  masterGain.connect(comp);
  musicGain = actx.createGain(); musicGain.gain.value=1; musicGain.connect(masterGain);
  VERB = actx.createConvolver();
  (function(){
    const rate=actx.sampleRate, len=(rate*1.9)|0, buf=actx.createBuffer(2,len,rate);
    for(let ch=0;ch<2;ch++){ const d=buf.getChannelData(ch);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.7)*0.55; }
    VERB.buffer=buf;
  })();
  const vg = actx.createGain(); vg.gain.value=0.8; VERB.connect(vg); vg.connect(masterGain);
  NOISE_BUF = (function(){
    const rate=actx.sampleRate, len=(rate*1.5)|0, buf=actx.createBuffer(1,len,rate);
    const d=buf.getChannelData(0); for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
    return buf;
  })();
}
function duckMusic(level, hold){
  if(!musicGain) return;
  const g=musicGain.gain, t=actx.currentTime;
  g.cancelScheduledValues(t); g.setValueAtTime(g.value,t);
  g.linearRampToValueAtTime(level, t+0.05);
  g.linearRampToValueAtTime(1, t+(hold||0.8));
}
// v6 braam 衝擊音（魔王登場/撞擊/片尾）
function braam(vol){
  if(!actx) return;
  const t0 = actx.currentTime;
  duckMusic(0.3, 1.4);
  [55, 55.8, 27.5].forEach((f,i)=>{
    const o=actx.createOscillator(), g=actx.createGain(), lp=actx.createBiquadFilter();
    o.type='sawtooth'; o.frequency.value=f;
    lp.type='lowpass'; lp.Q.value=3;
    lp.frequency.setValueAtTime(90,t0);
    lp.frequency.exponentialRampToValueAtTime(540,t0+0.26);
    lp.frequency.exponentialRampToValueAtTime(110,t0+1.45);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(vol*(i===2?0.7:0.5), t0+0.06);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+1.55);
    o.connect(lp); lp.connect(g); g.connect(masterGain); g.connect(VERB);
    o.start(t0); o.stop(t0+1.65);
  });
}
// v6 riser（衝鋒漸強）
function riser(dur){
  if(!actx) return;
  const t0 = actx.currentTime;
  const src=actx.createBufferSource(); src.buffer=NOISE_BUF; src.loop=true;
  const bp=actx.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=1.3;
  bp.frequency.setValueAtTime(240,t0);
  bp.frequency.exponentialRampToValueAtTime(3200,t0+dur);
  const g=actx.createGain();
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(0.16,t0+dur);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur+0.08);
  src.connect(bp); bp.connect(g); g.connect(masterGain); g.connect(VERB);
  src.start(t0); src.stop(t0+dur+0.15);
  const o=actx.createOscillator(), og=actx.createGain();
  o.type='sawtooth';
  o.frequency.setValueAtTime(85,t0);
  o.frequency.exponentialRampToValueAtTime(330,t0+dur);
  og.gain.setValueAtTime(0.0001,t0);
  og.gain.exponentialRampToValueAtTime(0.05,t0+dur);
  og.gain.exponentialRampToValueAtTime(0.0001,t0+dur+0.08);
  o.connect(og); og.connect(masterGain);
  o.start(t0); o.stop(t0+dur+0.15);
}
// v6 片尾定格重音
function stinger(){
  if(!actx) return;
  braam(0.5);
  const t0 = actx.currentTime;
  [523.25,783.99,1046.5].forEach((f,i)=>{
    const o=actx.createOscillator(), g=actx.createGain();
    o.type='triangle'; o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,t0+0.12*i);
    g.gain.exponentialRampToValueAtTime(0.1,t0+0.12*i+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+0.12*i+1.1);
    o.connect(g); g.connect(masterGain); g.connect(VERB);
    o.start(t0+0.12*i); o.stop(t0+0.12*i+1.2);
  });
}
function setMuted(m){
  muted = m;
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
  if(masterGain){
    masterGain.gain.cancelScheduledValues(actx.currentTime);
    masterGain.gain.linearRampToValueAtTime(muted?0.0:0.22, actx.currentTime+0.08);
  }
}

const NOTE = {C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392.00,A4:440.00,B4:493.88,
  C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880.00,B5:987.77,
  C6:1046.5, R:0};
const TEMPO = 0.15;
const melody = [
  ['C5',1],['C5',1],['E5',1],['G5',1],
  ['E5',1],['G5',1],['C6',2],
  ['B5',1],['G5',1],['E5',1],['D5',1],
  ['C5',2],['R',1],['G4',1],
  ['A4',1],['C5',1],['E5',1],['G5',1],
  ['F5',1],['D5',1],['B4',1],['G4',1],
  ['C5',1],['E5',1],['G5',1],['C6',3]
];
const bassline = [
  ['C4',2],['C4',2],['F4',2],['F4',2],
  ['G4',2],['G4',2],['C4',4],
  ['A4',2],['A4',2],['F4',2],['G4',2],
  ['C4',4]
];
function playTone(freq, startAt, dur, type, vol){
  if(freq<=0) return;
  const osc = actx.createOscillator();
  const g = actx.createGain();
  const filt = actx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.value = 2800;
  filt.Q.value = 0.4;
  osc.type = type;
  osc.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, startAt);
  g.gain.linearRampToValueAtTime(vol, startAt+0.02);
  g.gain.exponentialRampToValueAtTime(Math.max(vol*0.35,0.0005), startAt+dur*0.55);
  g.gain.exponentialRampToValueAtTime(0.0001, startAt+dur*0.95);
  osc.connect(filt); filt.connect(g); g.connect(musicGain);
  osc.start(startAt); osc.stop(startAt+dur+0.03);
}
function playSeq(seq, type, vol, offset){
  let t = actx.currentTime + 0.05;
  for(const [n,beats] of seq){
    const dur = beats*TEMPO;
    if(NOTE[n]) playTone(NOTE[n]*offset, t, dur, type, vol);
    t += dur;
  }
  return t;
}
let musicStarted=false;
function startMusic(){
  if(musicStarted) return;
  musicStarted = true;
  ensureAudio();
  const totalDur = playSeq(melody, 'square', 0.16, 1);
  playSeq(bassline, 'triangle', 0.18, 0.5);
  startDrums();
  setTimeout(()=>{ if(!ended){ playSeq(melody,'square',0.16,1); playSeq(bassline,'triangle',0.18,0.5);} }, (totalDur-actx.currentTime)*1000-50);
}
function sfxMarch(){
  if(!actx) return;
  const t = actx.currentTime;
  playTone(160, t, 0.08, 'triangle', 0.14);
}
function sfxImpact(){
  if(!actx) return;
  const t = actx.currentTime;
  playTone(150, t, 0.14, 'sine', 0.24);
  playTone(70, t, 0.18, 'sine', 0.2);
  const bufSize = Math.floor(actx.sampleRate*0.12);
  const buf = actx.createBuffer(1, bufSize, actx.sampleRate);
  const data = buf.getChannelData(0);
  for(let j=0;j<bufSize;j++){ data[j] = (Math.random()*2-1) * (1-j/bufSize); }
  const src = actx.createBufferSource();
  src.buffer = buf;
  const filt = actx.createBiquadFilter();
  filt.type='bandpass'; filt.frequency.value=1000; filt.Q.value=1.1;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.26, t);
  g.gain.exponentialRampToValueAtTime(0.0005, t+0.12);
  src.connect(filt); filt.connect(g); g.connect(masterGain);
  src.start(t); src.stop(t+0.14);
}
function sfxWin(){
  if(!actx) return;
  const t = actx.currentTime;
  [523.25,659.25,783.99,1046.5].forEach((f,i)=>playTone(f, t+i*0.09, 0.18, 'square', 0.2));
}

// ---------- 打鼓聲：進行曲鼓點（大鼓+小鼓，Web Audio 合成） ----------
function drumKick(startAt, vol){
  const dur = 0.16;
  const osc = actx.createOscillator();
  const g = actx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(150, startAt);
  osc.frequency.exponentialRampToValueAtTime(48, startAt+dur*0.85);
  g.gain.setValueAtTime(vol, startAt);
  g.gain.exponentialRampToValueAtTime(0.0008, startAt+dur);
  osc.connect(g); g.connect(musicGain);
  osc.start(startAt); osc.stop(startAt+dur+0.02);
}
function drumSnare(startAt, vol){
  const dur = 0.14;
  const bufSize = Math.floor(actx.sampleRate*dur);
  const buf = actx.createBuffer(1, bufSize, actx.sampleRate);
  const data = buf.getChannelData(0);
  for(let j=0;j<bufSize;j++){ data[j] = (Math.random()*2-1) * (1-j/bufSize); }
  const src = actx.createBufferSource();
  src.buffer = buf;
  const filt = actx.createBiquadFilter();
  filt.type='highpass'; filt.frequency.value=1400;
  const g = actx.createGain();
  g.gain.setValueAtTime(vol, startAt);
  g.gain.exponentialRampToValueAtTime(0.0006, startAt+dur);
  src.connect(filt); filt.connect(g); g.connect(musicGain);
  src.start(startAt); src.stop(startAt+dur+0.02);
  // 疊一顆音頭鼓身補上厚度
  const osc = actx.createOscillator();
  const g2 = actx.createGain();
  osc.type='triangle'; osc.frequency.value = 190;
  g2.gain.setValueAtTime(vol*0.6, startAt);
  g2.gain.exponentialRampToValueAtTime(0.0006, startAt+0.06);
  osc.connect(g2); g2.connect(musicGain);
  osc.start(startAt); osc.stop(startAt+0.08);
}
function drumHat(startAt, vol){
  const dur = 0.05;
  const bufSize = Math.floor(actx.sampleRate*dur);
  const buf = actx.createBuffer(1, bufSize, actx.sampleRate);
  const data = buf.getChannelData(0);
  for(let j=0;j<bufSize;j++){ data[j] = (Math.random()*2-1) * (1-j/bufSize); }
  const src = actx.createBufferSource();
  src.buffer = buf;
  const filt = actx.createBiquadFilter();
  filt.type='highpass'; filt.frequency.value=6000;
  const g = actx.createGain();
  g.gain.setValueAtTime(vol, startAt);
  g.gain.exponentialRampToValueAtTime(0.0006, startAt+dur);
  src.connect(filt); filt.connect(g); g.connect(musicGain);
  src.start(startAt); src.stop(startAt+dur+0.01);
}
// 進行曲鼓組節奏：一小節 8 拍＝ 大鼓-鈸-小鼓-鈸-大鼓-大鼓-小鼓-鈸
const DRUM_BEAT = TEMPO*2; // 每鼓拍秒數
const DRUM_PATTERN = ['kick','hat','snare','hat','kick','kick','snare','hat'];
let drumTimer=null;
function scheduleDrumBar(startAt, vol){
  DRUM_PATTERN.forEach((hit,i)=>{
    const t = startAt + i*DRUM_BEAT;
    if(hit==='kick') drumKick(t, vol);
    else if(hit==='snare') drumSnare(t, vol*0.9);
    else drumHat(t, vol*0.5);
  });
  return startAt + DRUM_PATTERN.length*DRUM_BEAT;
}
function startDrums(){
  let next = actx.currentTime + 0.05;
  function loop(){
    if(ended){ return; }
    next = scheduleDrumBar(next, 0.24);
    const waitMs = (next - actx.currentTime)*1000 - 120;
    drumTimer = setTimeout(loop, Math.max(20,waitMs));
  }
  loop();
}
function stopDrums(){ if(drumTimer){ clearTimeout(drumTimer); drumTimer=null; } }

// ===== v6 烘焙資產與電影感工具 =====
const clamp01v6 = t => Math.max(0, Math.min(1, t));
const lerpv6 = (a,b,t) => a+(b-a)*t;
const easeOutCubicV6 = t => 1 - Math.pow(1-t,3);
const easeOutBackV6 = t => 1 + 2.7*Math.pow(t-1,3) + 1.7*Math.pow(t-1,2);
const easeInOutV6 = t => t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
function bakeTex(w,h,fn){ const c=document.createElement('canvas'); c.width=w; c.height=h; fn(c.getContext('2d'),w,h); return c; }
// 背景整張烘焙——「陽光草原」關卡同款（配色與形狀移植自遊戲 bgCache：天空/太陽/圓弧山丘/橘土地面＋草皮頂條）
let bgTex = null;
function buildBG(){
  bgTex = bakeTex(Math.max(2,W), Math.max(2,H), (g,w,h)=>{
    const s = Math.min(w,h)/540;
    const floorY = h*0.8; // 對應遊戲 GROUND_Y=430/540
    const sky = g.createLinearGradient(0,0,0,h);
    sky.addColorStop(0,'#8fd3ff'); sky.addColorStop(1,'#5c94fc');
    g.fillStyle=sky; g.fillRect(0,0,w,h);
    // 太陽（遊戲同款奶油色圓）
    g.fillStyle='rgba(255,245,214,.9)';
    g.beginPath(); g.arc(w*0.875, h*0.148, 30*s, 0, Math.PI*2); g.fill();
    // 圓弧山丘（遊戲同款 #00a844 半透明起伏）
    g.fillStyle='#00a844'; g.globalAlpha=0.55;
    g.beginPath(); g.moveTo(0,floorY);
    for(let x=0;x<=w;x+=60*s) g.lineTo(x, floorY - (60 + 50*Math.abs(Math.sin((x/s)*0.013)))*s);
    g.lineTo(w,floorY); g.closePath(); g.fill();
    g.globalAlpha=1;
    // 橘土地面＋草皮頂條（遊戲同款 #c84c0c / #3fbf5f）
    g.fillStyle='#c84c0c'; g.fillRect(0,floorY,w,h-floorY);
    g.fillStyle='#3fbf5f'; g.fillRect(0,floorY,w,12*s);
    g.fillStyle='rgba(0,0,0,.12)';
    for(let x=20*s; x<w; x+=90*s) g.fillRect(x, floorY + (30 + (Math.round(x/s) % 37))*s, 26*s, 6*s);
  });
}
window.addEventListener('resize', buildBG);
buildBG();
const vigTexV6 = bakeTex(480,270,(g,w,h)=>{
  const r = g.createRadialGradient(w/2,h/2,h*0.36,w/2,h/2,h*0.86);
  r.addColorStop(0,'rgba(0,0,0,0)'); r.addColorStop(0.7,'rgba(6,10,22,0.15)'); r.addColorStop(1,'rgba(6,10,22,0.42)');
  g.fillStyle=r; g.fillRect(0,0,w,h);
});
const glowTexV6 = bakeTex(128,128,(g)=>{
  const r = g.createRadialGradient(64,64,0,64,64,64);
  r.addColorStop(0,'rgba(255,255,255,0.95)'); r.addColorStop(0.42,'rgba(200,235,255,0.3)'); r.addColorStop(1,'rgba(200,235,255,0)');
  g.fillStyle=r; g.fillRect(0,0,128,128);
});
const sweepBandV6 = bakeTex(240,60,(g,w,h)=>{
  const lg = g.createLinearGradient(0,0,w,0);
  lg.addColorStop(0,'rgba(255,255,255,0)'); lg.addColorStop(0.5,'rgba(255,255,255,0.85)'); lg.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle = lg; g.fillRect(0,0,w,h);
  const vgrad = g.createLinearGradient(0,0,0,h);
  vgrad.addColorStop(0,'rgba(0,0,0,0)'); vgrad.addColorStop(0.5,'rgba(0,0,0,1)'); vgrad.addColorStop(1,'rgba(0,0,0,0)');
  g.globalCompositeOperation='destination-in';
  g.fillStyle = vgrad; g.fillRect(0,0,w,h);
});
const grainTilesV6 = [0,1,2].map(()=> bakeTex(160,160,(g,w,h)=>{
  const id = g.createImageData(w,h);
  for(let i=0;i<id.data.length;i+=4){
    const v=(Math.random()*255)|0;
    id.data[i]=id.data[i+1]=id.data[i+2]=v; id.data[i+3]=11;
  }
  g.putImageData(id,0,0);
}));
const grainPatsV6 = grainTilesV6.map(tx => ctx.createPattern(tx,'repeat'));
// 逐字標題烘焙
function bakeCharsV6(text, px, colors, glowColor){
  const meas = bakeTex(8,8,()=>{}).getContext('2d');
  meas.font = '900 ' + px + 'px sans-serif';
  return [...text].map((ch,i)=>{
    const w = Math.ceil(meas.measureText(ch).width) + 48;
    const h = px + 56;
    const c = bakeTex(w,h,(g)=>{
      g.font = '900 ' + px + 'px sans-serif';
      g.textAlign='center'; g.textBaseline='middle';
      g.shadowColor = glowColor; g.shadowBlur = 24;
      g.fillStyle = colors[i % colors.length];
      g.fillText(ch, w/2, h/2);
      g.shadowBlur = 9;
      g.fillText(ch, w/2, h/2);
      g.lineWidth = 2; g.strokeStyle = 'rgba(255,255,255,0.85)';
      g.strokeText(ch, w/2, h/2);
    });
    return {c,w,h};
  });
}
const TITLE_CHARS_V6 = bakeCharsV6('貓咪大戰爭', 76, ['#38e1ff','#4f7cff','#9a6bff','#ff6cc7','#ffd24d'], 'rgba(120,200,255,0.95)');
function drawTitleCharsV6(chars, cx, cy, t, stagger, dur, sweepAt, s){
  s = s || 1;
  let total=0; chars.forEach(sp => total += (sp.w-32)*s);
  let x = cx - total/2;
  let minX=1e9, maxX=-1e9;
  chars.forEach((sp,i)=>{
    const p = clamp01v6((t - i*stagger)/dur);
    const w = (sp.w-32)*s;
    if(p>0){
      const e = easeOutBackV6(p);
      ctx.save();
      ctx.globalAlpha = clamp01v6(p*1.6);
      ctx.translate(x+w/2, cy+(1-e)*40*s);
      ctx.scale((0.6+0.4*e)*s, (0.6+0.4*e)*s);
      ctx.drawImage(sp.c, -sp.w/2, -sp.h/2);
      ctx.restore();
      minX=Math.min(minX,x); maxX=Math.max(maxX,x+w);
    }
    x += w;
  });
  if(sweepAt!==undefined && t>sweepAt && t<sweepAt+0.9 && maxX>minX){
    const p = (t-sweepAt)/0.9;
    const sx = lerpv6(minX-100, maxX+100, easeInOutV6(p));
    ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.85;
    ctx.drawImage(sweepBandV6, sx-70*s, cy-70*s, 140*s, 140*s);
    ctx.restore();
  }
}

let transV6 = {t:99, type:'none'};
function triggerTransV6(type){ transV6 = {t:0, type}; }
let prevTT = 0;
function drawCinemaV6(tt, dt){
  transV6.t += dt;
  if(transV6.type==='flash' && transV6.t<0.4){
    ctx.save(); ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha = (1-transV6.t/0.4)*0.85;
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
    ctx.restore();
  } else if(transV6.type==='fade' && transV6.t<0.7){
    ctx.save(); ctx.globalAlpha = Math.sin(Math.PI*clamp01v6(transV6.t/0.7))*0.8;
    ctx.fillStyle='#070b14'; ctx.fillRect(0,0,W,H);
    ctx.restore();
  }
  ctx.drawImage(vigTexV6, 0, 0, W, H);
  ctx.save(); ctx.globalAlpha=0.5;
  ctx.fillStyle = grainPatsV6[(tt*14|0)%3];
  ctx.fillRect(0,0,W,H);
  ctx.restore();
  const lbMax = Math.min(H*0.075, 62);
  const lb = lbMax * easeOutCubicV6(clamp01v6(tt/1.5));
  ctx.fillStyle='#04070f';
  ctx.fillRect(0,0,W,lb);
  ctx.fillRect(0,H-lb,W,lb);
}

const partsV6 = [];
const CONF_COLORS_V6 = ['#38e1ff','#4f7cff','#9a6bff','#ff6cc7','#ffd24d','#ffffff'];
function spawnDust(x,y,s){
  partsV6.push({kind:'dust', x, y, vx:-(20+Math.random()*40)*s, vy:-(10+Math.random()*30)*s,
    r:(4+Math.random()*7)*s, life:0.6+Math.random()*0.4, maxLife:1});

function spawnConfettiV6(x,y,n,s){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=(90+Math.random()*220)*s;
    partsV6.push({kind:'conf', x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-120*s,
      rot:Math.random()*Math.PI*2, vr:(Math.random()*2-1)*9,
      w:(4+Math.random()*5)*s, h:(2.5+Math.random()*3)*s,
      color:CONF_COLORS_V6[(Math.random()*CONF_COLORS_V6.length)|0],
      life:2+Math.random()*1.4, maxLife:3.4, ph:Math.random()*Math.PI*2});
  }
}
function updatePartsV6(dt, tt){
  for(const p of partsV6){
    if(p.kind==='conf'){
      p.vy += 200*dt; p.vx *= 0.992;
      p.x += p.vx*dt + Math.sin(tt*5+p.ph)*30*dt;
      p.y += p.vy*dt; p.rot += p.vr*dt;
    } else {
      p.x += p.vx*dt; p.y += p.vy*dt; p.r += 14*dt;
    }
    p.life -= dt;
  }
  for(let i=partsV6.length-1;i>=0;i--) if(partsV6[i].life<=0) partsV6.splice(i,1);
}
function drawPartsV6(){
  for(const p of partsV6){
    ctx.save();
    if(p.kind==='conf'){
      ctx.globalAlpha = clamp01v6(p.life/0.8);
      ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.scale(1, 0.4+0.6*Math.abs(Math.sin(p.rot*2+p.ph)));
      ctx.fillStyle=p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    } else {
      ctx.globalAlpha = clamp01v6(p.life)*0.35;
      ctx.fillStyle='#e8d9b0';
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}
// 衝鋒速度線（螢幕空間、事件式短促出現）
function drawSpeedLines(tt){
  if(tt<14 || tt>=15.3) return;
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  for(let i=0;i<12;i++){
    const seed=i*37.7;
    const y = ((seed*53)% (H*0.7)) + H*0.12;
    const len = W*(0.18+((seed*13)%10)/40);
    const x = W - ((tt*1400 + seed*211) % (W+len)) ;
    ctx.globalAlpha = 0.16;
    ctx.fillStyle='#ffffff';
    ctx.fillRect(x, y, len, 2.2);
  }
  ctx.restore();
}

// ---------- 背景：戰場草原 ----------
function drawGround(t){
  ctx.save();
  ctx.drawImage(bgTex, 0, 0, W, H);

  function cloud(cx,cy,s,alpha){
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle='#ffffff';
    ctx.beginPath();
    ctx.ellipse(cx,cy,26*s,14*s,0,0,Math.PI*2);
    ctx.ellipse(cx+22*s,cy-8*s,18*s,12*s,0,0,Math.PI*2);
    ctx.ellipse(cx-24*s,cy-4*s,16*s,11*s,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
  for(let i=0;i<4;i++){
    const cx = ((i*180 + t*14) % (W+160)) - 80;
    const cy = H*(0.12+i*0.08);
    cloud(cx, cy, 1+i*0.15, 0.85-i*0.08);
  }

  // 草緣搖曳（動態保留，其餘已烘焙進 bgTex）
  const floorY = H*0.8;
  ctx.strokeStyle='#3f8a2a'; ctx.lineWidth=3;
  for(let x=0; x<W; x+=14){
    const wob = Math.sin(t*2 + x*0.3)*2;
    ctx.beginPath();
    ctx.moveTo(x, floorY+2);
    ctx.lineTo(x+wob, floorY-8);
    ctx.stroke();
  }
  ctx.restore();
}

// ---------- 以下兵種／基地繪製「直接移植自遊戲《貓咪大戰爭》」，同一套代碼保證畫面一致 ----------
function rr(x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r); ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r); ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}
const _gc = new Map();
function cg(key, maker){
  let g = _gc.get(key);
  if(!g){ g = maker(); _gc.set(key, g); }
  return g;
}
function bodyHighlight(w, h, cy, tone){
  ctx.save();
  ctx.globalAlpha = tone;
  ctx.fillStyle = cg('hi'+w+','+Math.round(cy), () => {
    const hi = ctx.createRadialGradient(-w*0.16, cy, 1, -w*0.16, cy, w*0.32);
    hi.addColorStop(0, 'rgba(255,255,255,.9)');
    hi.addColorStop(1, 'rgba(255,255,255,0)');
    return hi;
  });
  ctx.beginPath(); ctx.ellipse(-w*0.16, cy, w*0.25, h*0.16, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}
function rimLight(w, topY, dipY){
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,.42)'; ctx.lineWidth = 1.6; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-w*0.3, topY);
  ctx.quadraticCurveTo(0, dipY, w*0.3, topY);
  ctx.stroke();
  ctx.restore();
}
function catFace(cx, cy, s, t, angry, hurt){
  ctx.fillStyle = '#222';
  if(hurt){
    ctx.strokeStyle = '#222'; ctx.lineWidth = 1.8*s; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx + 1.5*s, cy - 2.2*s); ctx.lineTo(cx + 6.5*s, cy + 2.2*s);
    ctx.moveTo(cx + 6.5*s, cy - 2.2*s); ctx.lineTo(cx + 1.5*s, cy + 2.2*s);
    ctx.moveTo(cx + 9.5*s, cy - 2.2*s); ctx.lineTo(cx + 14.5*s, cy + 2.2*s);
    ctx.moveTo(cx + 14.5*s, cy - 2.2*s); ctx.lineTo(cx + 9.5*s, cy + 2.2*s);
    ctx.stroke();
  } else {
    const blink = (Math.sin(t * 0.7 + cx) > 0.985);
    if(blink){
      ctx.fillRect(cx + 2*s, cy - 1, 5*s, 2);
      ctx.fillRect(cx + 10*s, cy - 1, 5*s, 2);
    } else {
      ctx.beginPath(); ctx.arc(cx + 4*s, cy, 2.4*s, 0, Math.PI*2); ctx.arc(cx + 12*s, cy, 2.4*s, 0, Math.PI*2); ctx.fill();
    }
  }
  if(angry && !hurt){
    ctx.strokeStyle = '#222'; ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.moveTo(cx + 1*s, cy - 4*s); ctx.lineTo(cx + 6*s, cy - 2*s);
    ctx.moveTo(cx + 15*s, cy - 4*s); ctx.lineTo(cx + 10*s, cy - 2*s); ctx.stroke();
  }
  if(hurt){
    ctx.fillStyle = '#7a3a3a';
    ctx.beginPath(); ctx.ellipse(cx + 8*s, cy + 5*s, 2.4*s, 2.8*s, 0, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.strokeStyle = '#222'; ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.arc(cx + 6*s, cy + 4*s, 2*s, 0.1, Math.PI - 0.1);
    ctx.arc(cx + 10*s, cy + 4*s, 2*s, 0.1, Math.PI - 0.1);
    ctx.stroke();
  }
  ctx.fillStyle = 'rgba(255,150,160,.55)';
  ctx.beginPath(); ctx.arc(cx + 1*s, cy + 4*s, 2*s, 0, Math.PI*2); ctx.arc(cx + 15*s, cy + 4*s, 2*s, 0, Math.PI*2); ctx.fill();
}
function drawCatG(d, w, h, t, e){
  const s = w / 34;
  ctx.strokeStyle = '#e8e8e8'; ctx.lineWidth = 5*s; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-w*0.42, h*0.75);
  ctx.quadraticCurveTo(-w*0.75, h*0.45 + Math.sin(t*6 + e.x)*5, -w*0.62, h*0.2 + Math.sin(t*6 + e.x)*7);
  ctx.stroke();
  const g = cg('cat'+h, () => {
    const gr = ctx.createLinearGradient(0, 0, 0, h);
    gr.addColorStop(0, '#ffffff'); gr.addColorStop(1, '#d8d8de');
    return gr;
  });
  ctx.fillStyle = g; ctx.strokeStyle = '#44464f'; ctx.lineWidth = 2;
  rr(-w/2, h*0.18, w, h*0.82, w*0.3); ctx.fill(); ctx.stroke();
  bodyHighlight(w, h, h*0.42, 0.4);
  ctx.fillStyle = '#fff';
  const step = Math.sin(e.walkT * 12) * 4*s;
  rr(-w*0.3 + step, h*0.86, w*0.24, h*0.18, 3); ctx.fill(); ctx.stroke();
  rr(w*0.08 - step, h*0.86, w*0.24, h*0.18, 3); ctx.fill(); ctx.stroke();
  const hurt = e.flash > 0;
  const headSway = e.windup > 0 ? -0.05 : Math.sin(e.walkT * 9 + 1.4) * 0.045;
  ctx.save();
  ctx.translate(0, h*0.32); ctx.rotate(headSway); ctx.translate(0, -h*0.32);
  ctx.fillStyle = g;
  rr(-w*0.44, -h*0.06, w*0.9, h*0.62, w*0.28); ctx.fill(); ctx.stroke();
  rimLight(w, -h*0.03, -h*0.15);
  ctx.beginPath();
  ctx.moveTo(-w*0.36, 0); ctx.lineTo(-w*0.26, -h*0.26); ctx.lineTo(-w*0.1, -h*0.04);
  ctx.moveTo(w*0.38, 0); ctx.lineTo(w*0.3, -h*0.26); ctx.lineTo(w*0.12, -h*0.04);
  ctx.fillStyle = '#fff'; ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#ffb3c1';
  ctx.beginPath(); ctx.moveTo(-w*0.3, -h*0.05); ctx.lineTo(-w*0.26, -h*0.18); ctx.lineTo(-w*0.16, -h*0.05); ctx.fill();
  catFace(-w*0.24, h*0.22, s, t, d.id === 'mega' || d.id === 'kick', hurt);
  ctx.restore();
  ctx.lineWidth = 2;
  if(d.id === 'tank'){
    ctx.fillStyle = '#8f9bb3'; ctx.strokeStyle = '#44464f';
    ctx.beginPath(); ctx.arc(0, -h*0.02, w*0.42, Math.PI, 0); ctx.fill(); ctx.stroke();
    ctx.fillRect(-w*0.46, -h*0.04, w*0.92, 4);
  } else if(d.id === 'kick'){
    ctx.fillStyle = '#f83800';
    ctx.fillRect(-w*0.44, h*0.02, w*0.9, 6);
    ctx.beginPath(); ctx.moveTo(-w*0.44, h*0.05); ctx.lineTo(-w*0.7, h*0.18); ctx.lineTo(-w*0.62, h*0.02); ctx.fill();
  } else if(d.id === 'arch'){
    ctx.fillStyle = '#00a844'; ctx.strokeStyle = '#44464f';
    ctx.beginPath(); ctx.moveTo(-w*0.5, 0); ctx.lineTo(0, -h*0.34); ctx.lineTo(w*0.5, 0); ctx.closePath(); ctx.fill(); ctx.stroke();
  }
}

const UNIT_DEFS = {
  cat:  { id:'cat',  w:34, h:34 },
  tank: { id:'tank', w:42, h:40 },
  kick: { id:'kick', w:36, h:36 },
  dog:  { id:'dog',  w:36, h:32 },
  boss: { id:'boss', w:96, h:88, boss:true }

// 包裝：把遊戲的單位繪製放到預告片座標（pose 對應遊戲內的行走/蓄力/受擊/勝利姿態）
function drawUnitSprite(x, y, scale, id, t, pose, facing){
  const d = UNIT_DEFS[id];
  const isCat = (id==='cat'||id==='tank'||id==='kick');
  let bobZ = 0, lean = 0, rot = 0, drop = 0;
  const walkT = (pose==='march'||pose==='charge'||pose==='idle'||pose==='rage') ? t : 0;
  if(pose==='win') bobZ = -Math.abs(Math.sin(t*8))*14;
  if(pose==='march') bobZ = Math.sin(walkT*9)*2;
  if(pose==='charge') lean = -0.18;
  if(pose==='rage') rot = Math.sin(t*10)*0.05;
  if(pose==='down'){ rot = Math.PI*0.42*Math.min(1,t) * ((facing||1) < 0 ? -1 : 1); drop = Math.min(1,t)*26; }
  const e = { walkT, windup: pose==='charge'?1:0, flash: (pose==='hit')?1:0, x: x, z: 0 };
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  ctx.globalAlpha = 0.28;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(0, 3, d.w*0.45, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.translate(0, bobZ + drop);
  ctx.scale(facing||1, 1);
  ctx.rotate(lean + rot);
  ctx.translate(0, -d.h);
  if(isCat) drawCatG(d, d.w, d.h, t, e); else drawFoeG(d, d.w, d.h, t, e);
  ctx.restore();
}
// （保留舊介面名稱以維持時間軸呼叫；實際繪製已改用遊戲原版兵種）

function drawSparkBurst(x,y,t,color){
  ctx.save();
  for(let i=0;i<14;i++){
    const ang = (i/14)*Math.PI*2 + t*2;
    const r = 10+ t*160;
    const a = Math.max(0,1-t*1.3);
    ctx.fillStyle = color.replace('ALPHA', a.toFixed(2));
    ctx.beginPath();
    ctx.arc(x+Math.cos(ang)*r, y+Math.sin(ang)*r, 5*(1-t*0.7), 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

let startTime=null, ended=false;
let camShake=0;
const TOTAL = 26; // 秒

const CAT_BASIC = {body:'#ffffff', dark:'#dcdcdc', light:'#ffffff', accent:'#ff8a5c'};
const CAT_TANK  = {body:'#7fb8ff', dark:'#3f6fc0', light:'#e4f2ff', accent:'#ffd24d'};
const CAT_CRAZY = {body:'#ff8a6a', dark:'#c0442a', light:'#ffe0d0', accent:'#ffe14d'};

const captions = [
  {t:0.5, d:3.2, text:'貓咪軍團，集合出擊！'},
  {t:4.2, d:3.6, text:'小貓貓・壯壯貓・飛踢貓，並肩衝鋒！'},
  {t:9.0, d:4.0, text:'大魔王汪率軍擋路，守護汪汪城！'},

let captionEl = document.getElementById('caption');
let shownCaption = -1;

function updateCaption(tt){
  let idx=-1;
  for(let i=0;i<captions.length;i++){
    if(tt>=captions[i].t && tt<captions[i].t+captions[i].d){ idx=i; break; }
  }
  if(idx!==shownCaption){
    shownCaption = idx;
    if(idx>=0){
      captionEl.textContent = captions[idx].text;
      captionEl.classList.add('show');
    } else {
      captionEl.classList.remove('show');
    }
  }
}

let collided=false, bossDown=false, marchSfxAt=0;

function frame(now){
  if(startTime===null) startTime = now;
  const tt = (now-startTime)/1000;
  const dtv6 = Math.max(0, Math.min(0.1, tt - prevTT)); prevTT = tt;
  ctx.clearRect(0,0,W,H);

  // v6 電影運鏡：魔王登場推鏡→對峙緊逼→衝鋒急推→撞擊 zoom-punch→勝利回拉
  let zoomV6 = 1.03, oxV6 = 0, oyV6 = 0;
  if(tt < 7){
    zoomV6 = lerpv6(1.10, 1.03, easeOutCubicV6(clamp01v6(tt/2.4)));
    oxV6 = lerpv6(-W*0.02, 0, easeOutCubicV6(clamp01v6(tt/2.4)));
  } else if(tt < 9){
    const p = (tt-7)/2;
    zoomV6 = 1.03 + 0.05*easeInOutV6(p); oxV6 = W*0.04*p;
  } else if(tt < 14){
    const p = (tt-9)/5;
    zoomV6 = 1.08 + 0.04*p; oxV6 = W*0.04 - W*0.05*p;
  } else if(tt < 15.2){
    const p = (tt-14)/1.2;
    zoomV6 = 1.12 + 0.1*p; oxV6 = -W*0.01 + W*0.03*p;
  } else if(tt < 17.5){
    const p = clamp01v6((tt-15.2)/2.3);
    zoomV6 = lerpv6(1.24, 1.05, easeOutCubicV6(p)); oxV6 = lerpv6(W*0.02, 0, p);
  } else {
    zoomV6 = 1.05;
  }
  if(camShake > 0.05){
    zoomV6 += camShake*0.002;
    oxV6 += (Math.random()-0.5)*camShake;
    oyV6 += (Math.random()-0.5)*camShake*0.7;
    camShake *= 0.85;
  }
  const mxV6 = W/2*(1-1/zoomV6)-0.5, myV6 = H/2*(1-1/zoomV6)-0.5;
  oxV6 = Math.max(-mxV6, Math.min(mxV6, oxV6));
  oyV6 = Math.max(-myV6, Math.min(myV6, oyV6));
  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(zoomV6, zoomV6);
  ctx.translate(-W/2 - oxV6, -H/2 - oyV6);

  drawGround(tt);
  updateCaption(tt);

  const floorY = H*0.8;
  const scaleBase = Math.min(W,H)/420;
  const groundY = floorY - 20*scaleBase;

  // 幕一 0-9s：三隻貓咪出場並排行軍
  // 幕二 9-14s：外星大魔王登場對峙
  // 幕三 14-19.5s：衝撞必殺
  // 幕四 19.5-26s：勝利結尾

  const enterT = Math.min(1, tt/2.4);
  const ease = 1-Math.pow(1-enterT,3);
  const marchX = -W*0.35 + ease*(W*0.32-(-W*0.35));

  if(tt>0.1 && tt-marchSfxAt>0.22 && tt<9){ marchSfxAt=tt; sfxMarch(); }

  if(tt>=14 && tt<15.2){
    const p=(tt-14)/1.2;
    catsX = W*0.32 + p*(W*0.5-W*0.32);
    catsPose='charge';
  }
  if(tt>=15.2 && tt<19.5){ catsPose='win'; catsX = W*0.5; }
  if(tt>=19.5){ catsPose='win'; catsX = W*0.5; }

  // 遊戲同款雙塔：左貓貓塔、右汪汪城（最終一擊時震動＋裂痕）
  const feetY = floorY + 6*scaleBase;

  drawBaseS(W*0.08, feetY, baseScale, true, 1, 0, tt);
  const castleHit = bossDown;
  drawBaseS(W*0.93, feetY, baseScale, false, castleHit ? 0.25 : 1, (castleHit && tt<16.2) ? 5 : 0, tt);

  // 遊戲原版三兵種：小貓貓／壯壯貓／飛踢貓
  drawUnitSprite(catsX-95*scaleBase, feetY, 2.2*scaleBase, 'cat', tt*1.1, catsPose, 1);

  if(catsPose==='charge' && Math.random()<0.85){
    spawnDust(catsX - (40+Math.random()*40)*scaleBase, groundY+42*scaleBase, scaleBase*1.35);
  }

  // 大魔王：9s 後從右側登場
  if(tt>=7){
    const bossEnter = Math.min(1,(tt-7)/2.2);
    const be = 1-Math.pow(1-bossEnter,3);
    let bossX = W*1.15 - be*(W*1.15-W*0.78);
    let bossPose = 'idle';
    if(tt>=9 && tt<14) bossPose='rage';
    if(tt>=14 && tt<15.4){ bossPose='hit'; bossX = W*0.78 - Math.min(1,(tt-14)/1.4)*(W*0.16); }
    if(tt>=15.2 && !bossDown){ bossDown=true; camShake=26; sfxImpact(); braam(0.55); triggerTransV6('flash'); }
    if(tt>=15.2 && tt<20){ bossPose='down'; }

    if(tt>=14 && tt<15.2) dogPose = 'hit';
    if(tt>=15.2) dogPose = 'down';
    drawUnitSprite(bossX - 120*scaleBase, feetY, 2.1*scaleBase, 'dog', tt*1.2, dogPose, -1);
    drawUnitSprite(bossX - 78*scaleBase, feetY+2*scaleBase, 2.1*scaleBase, 'dog', tt*1.2+1.3, dogPose, -1);

    }

  drawPartsV6();
  ctx.restore();

  drawSpeedLines(tt);
  drawTitleCardV6(tt);
  drawCinemaV6(tt, dtv6);

  // v6 事件觸發：魔王登場braam／衝鋒riser／勝利彩帶／片尾定格重音
  if(!firedV6.bossIn && tt>=9){ firedV6.bossIn=true; braam(0.45); triggerTransV6('flash'); camShake=14; }
  if(!firedV6.chargeRiser && tt>=14){ firedV6.chargeRiser=true; riser(1.25); }
  if(!firedV6.victory && tt>=15.4){

    spawnConfettiV6(W*0.28, H*0.3, 40, scaleBase);

  if(!ended && tt>=TOTAL){
    ended=true;
    document.getElementById('replayWrap').classList.add('show');
  }

    requestAnimationFrame(frame);
  }

function startAll(){

}

let running=false;
function beginPlayback(){
  if(running) return;
  running=true;
  startTime=null; ended=false; collided=false; bossDown=false; marchSfxAt=0;
  firedV6 = {bossIn:false, chargeRiser:false, victory:false, titleIn:false};

  }
  function read(n,cb){
    function via(base,next){ try{ fetch(base+"get/"+NS+"/"+n).then(function(r){ if(r.status===404&&base===ABS) return {value:0}; if(!r.ok) throw 0; return r.json(); }).then(function(j){ cb(j.value||j.count||0); }).catch(next); }catch(e){ next(); } }
    via(REL, function(){ via(ABS, function(){ cb(null); }); });
  }
  ping(K+"-v");
  ping(K+"-p"); ping("site-total-plays");
  /* 投票鈕：非常好玩/好玩——與作品館同一計數器，任何網頁打開都同步 */
  function initVotes(){
    if(!document.body) return;
    var wrap=document.createElement("div");
    wrap.style.cssText="position:fixed;right:10px;bottom:10px;z-index:99999;display:flex;gap:6px;font-family:sans-serif;opacity:.92";
    var LS="voted-"+K;
    var defs=[["-love","\u2764\uFE0F","\u975e\u5e38\u597d\u73a9","#ff6cc7"],["-like","\ud83d\udc4d","\u597d\u73a9","#38e1ff"]];
    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;
          b.querySelector("i").textContent=Math.max(0,(n||0)-(c||0));
        }); });
      });
    }
    defs.forEach(function(d){
      var b=document.createElement("button");
      b.type="button"; b.title=d[2];
      b.style.cssText="min-height:42px;padding:8px 14px;border:none;border-radius:999px;background:rgba(15,18,32,.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation";
      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";
      b.addEventListener("click",function(){
        var prev=null; try{ prev=localStorage.getItem(LS); }catch(e){}
        if(prev===d[0]){ ping(K+d[0]+"-c"); try{ localStorage.removeItem(LS); }catch(e){} }
        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);
      });
      btns[d[0]]=b; wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    refresh();
    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* 每10秒同步別人投的票 */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
</script>
