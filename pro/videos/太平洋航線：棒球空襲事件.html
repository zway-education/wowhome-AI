<!doctype html>

<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>太平洋航線：棒球空襲事件</title>
<!-- 部分圖示：OpenMoji (CC BY-SA 4.0) openmoji.org -->
<style>
  /* ============================================================
     太平洋航線：棒球空襲事件 — 專業AI升級版
     橫跨太平洋的長鏡頭：晨昏光影・視差雲海・棒球空襲・鯨魚彩蛋
     ============================================================ */
  :root{
    --bg:#071120; --ink:#f2ecd9; --gold:#f0b429; --accent:#e0553a; --sea:#1c567f;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:radial-gradient(120% 100% at 50% 0%, #10233c 0%, #071120 62%);
    color:var(--ink);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",-apple-system,"Segoe UI",sans-serif;
    -webkit-user-select:none; user-select:none;
    touch-action:none;                     /* 禁止頁面滑動/雙指縮放 */
    -webkit-tap-highlight-color:transparent;
  }
  button{ touch-action:manipulation; }
  #stage-wrap{
    position:relative; line-height:0; border-radius:12px; overflow:hidden;
    box-shadow:0 30px 80px -30px rgba(0,0,0,0.85);
  }
  canvas{ display:block; }

  /* ---- 片頭主標題卡 ---- */
  #titleCard{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;
    pointer-events:none; line-height:1.35; opacity:0; transform:scale(1.04);
    transition:opacity 0.9s ease, transform 1.4s ease; text-align:center; padding:0 8%;
  }
  #titleCard.show{ opacity:1; transform:scale(1); }
  #titleCard::before{
    content:''; position:absolute; inset:-20%;
    background:radial-gradient(58% 58% at 50% 50%, rgba(4,9,20,0.78) 0%, rgba(4,9,20,0.35) 55%, rgba(4,9,20,0) 78%);
    z-index:-1;
  }
  #titleCard .kicker{
    font-size:clamp(10px,1.4vw,13px); letter-spacing:0.42em; color:var(--gold);
    text-transform:uppercase; text-shadow:0 0 18px rgba(240,180,41,0.55);
  }
  #titleCard h1{
    font-size:clamp(24px,4.6vw,50px); font-weight:900; letter-spacing:0.1em;
    text-shadow:0 4px 22px rgba(0,0,0,0.7), 0 0 40px rgba(224,85,58,0.45);
  }
  #titleCard .tagline{ font-size:clamp(12px,1.8vw,16px); letter-spacing:0.22em; opacity:0.8; }

  /* ---- 幕間標題 ---- */
  #act{
    position:absolute; left:0; right:0; top:16%;
    display:flex; flex-direction:column; align-items:center; gap:6px;
    line-height:1.3; pointer-events:none; opacity:0; transform:translateY(-12px);
    transition:opacity 0.6s ease, transform 0.6s ease;
  }
  #act.show{ opacity:1; transform:translateY(0); }
  #act .no{
    font-size:clamp(10px,1.4vw,13px); letter-spacing:0.5em; color:var(--gold);
    text-shadow:0 0 14px rgba(240,180,41,0.6);
  }
  #act .name{
    font-size:clamp(18px,3vw,30px); font-weight:700; letter-spacing:0.24em;
    text-shadow:0 3px 16px rgba(0,0,0,0.8);
  }

  /* ---- 字幕 ---- */
  #subtitle{
    position:absolute; left:50%; bottom:calc(46px + env(safe-area-inset-bottom, 0px)); transform:translate(-50%, 12px);
    line-height:1.5; background:rgba(5,12,24,0.72); border:1px solid rgba(240,180,41,0.28);
    border-radius:10px; padding:9px 22px; font-size:clamp(15px,2.3vw,21px);
    letter-spacing:0.1em; color:var(--ink); text-shadow:0 2px 8px rgba(0,0,0,0.9);
    white-space:normal; text-align:center; max-width:min(92%, 680px); width:max-content;
    opacity:0; transition:opacity 0.4s ease, transform 0.4s ease;
    pointer-events:none; backdrop-filter:blur(2px);
  }
  #subtitle.show{ opacity:1; transform:translate(-50%, 0); }

  /* ---- 聲音切換 ---- */
  #soundBtn{
    position:absolute;
    top:calc(10px + env(safe-area-inset-top, 0px));
    right:calc(10px + env(safe-area-inset-right, 0px));
    line-height:1.2; font:inherit; font-size:14px;
    letter-spacing:0.08em; color:var(--ink); background:rgba(6,14,26,0.62);
    border:1px solid rgba(242,236,217,0.3); border-radius:999px; padding:10px 18px;
    min-height:48px; min-width:48px;
    display:inline-flex; align-items:center; justify-content:center;
    cursor:pointer; transition:background 0.2s ease, border-color 0.2s ease; z-index:5;
  }
  #soundBtn:hover{ background:rgba(224,85,58,0.45); border-color:var(--gold); }
  #soundBtn:active{ transform:scale(0.94); background:rgba(224,85,58,0.65); }
  #soundBtn.on{ border-color:var(--gold); color:var(--gold); }

  /* ---- 開場操作提示 ---- */
  #hint{
    position:absolute;
    top:calc(64px + env(safe-area-inset-top, 0px));
    right:calc(10px + env(safe-area-inset-right, 0px));
    line-height:1.5; font-size:clamp(12px,1.6vw,14px); letter-spacing:0.08em;
    color:var(--gold); background:rgba(5,12,24,0.72);
    border:1px solid rgba(240,180,41,0.35); border-radius:10px; padding:8px 14px;
    pointer-events:none; opacity:0; transform:translateY(-6px);
    transition:opacity 0.5s ease, transform 0.5s ease; z-index:4;
  }
  #hint.show{ opacity:1; transform:translateY(0); }

  /* ---- 片尾 / 重新播放 ---- */
  #endOverlay{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
    line-height:1.4; background:rgba(4,9,18,0.74); backdrop-filter:blur(3px);
    opacity:0; pointer-events:none; transition:opacity 1s ease; text-align:center;
  }
  #endOverlay.show{ opacity:1; pointer-events:auto; }
  #endOverlay .end-icon{
    width:clamp(56px,9vw,88px); height:auto;
    filter:drop-shadow(0 0 22px rgba(240,180,41,0.5));
    animation:planeFloat 3.2s ease-in-out infinite;
  }
  @keyframes planeFloat{
    0%,100%{ transform:translateY(0) rotate(0deg); }
    50%{ transform:translateY(-9px) rotate(2deg); }
  }
  #endOverlay .end-title{
    font-size:clamp(22px,3.6vw,36px); font-weight:900; letter-spacing:0.14em;
    text-shadow:0 0 30px rgba(224,85,58,0.6);
  }
  #endOverlay .end-fin{
    font-size:clamp(12px,1.6vw,15px); letter-spacing:0.6em; color:var(--gold); padding-left:0.6em;
  }
  #replayBtn{
    font:inherit; font-size:clamp(16px,2.2vw,19px); font-weight:700; letter-spacing:0.2em;
    color:var(--gold); background:transparent; border:2px solid var(--gold);
    border-radius:999px; padding:14px 42px; min-height:52px; min-width:200px;
    cursor:pointer; margin-top:8px;
    transition:background 0.25s ease, color 0.25s ease, box-shadow 0.25s ease;
    animation:pulseGlow 2.2s ease-in-out infinite;
  }
  #replayBtn:hover{ background:var(--gold); color:#101418; box-shadow:0 0 34px rgba(240,180,41,0.55); }
  #replayBtn:active{ transform:scale(0.95); background:var(--gold); color:#101418; }
  @keyframes pulseGlow{
    0%,100%{ box-shadow:0 0 10px rgba(240,180,41,0.25); }
    50%{ box-shadow:0 0 26px rgba(240,180,41,0.55); }
  }
</style>
</head>
<body>
<div id="stage-wrap">
  <canvas id="stage"></canvas>
  <div id="titleCard">
    <div class="kicker">TAIWAN → USA · PACIFIC ROUTE</div>
    <h1>太平洋航線：棒球空襲事件</h1>
    <div class="tagline">台灣 → 美國：太平洋上空的意外訪客</div>
  </div>
  <div id="act"><span class="no" id="actNo"></span><span class="name" id="actName"></span></div>
  <div id="subtitle"></div>
  <button id="soundBtn" type="button">♪ 聲音：關</button>
  <div id="hint">自動播放中 · 點「聲音」開啟音效</div>
  <div id="endOverlay">
    <svg class="end-icon" viewBox="0 0 72 72" aria-hidden="true">
      <path fill="#9B9B9A" d="M43.2237,23.5985L37.7003,22.78l-21.3-3.547c-2.5478-0.4214-5.1427,0.4102-6.971,2.234l-3.579,3.573 c-0.3903,0.3907-0.3901,1.0238,0.0005,1.4142c0.114,0.1139,0.2538,0.1986,0.4075,0.2468l20.929,6.568l3.8119,1.1561"/>
      <path fill="#9B9B9A" d="M36.1513,37.924l2.394,6.663l6.575,20.954c0.1654,0.527,0.7266,0.8201,1.2535,0.6548 c0.1538-0.0482,0.2936-0.1329,0.4075-0.2468l3.578-3.578c1.8248-1.8278,2.6569-4.4229,2.235-6.971l-3.549-21.311l-0.893-5.915 L36.1513,37.924z"/>
      <path fill="#D0CFCE" d="M9.3413,49.6l8.619,3.716c0.2418,0.1044,0.4326,0.2998,0.531,0.544l3.5481,8.8l3.9609-4.01l-0.691-5.951 c-0.0351-0.3033,0.0702-0.606,0.286-0.822l28.8-28.794c1.0236-1.2048,1.3221-2.8662,0.782-4.352l0,0l-0.157-0.585 c-0.1859-0.6966-0.7258-1.2433-1.42-1.438l-0.579-0.159c-1.4628-0.5363-3.102-0.2238-4.265,0.813l-28.856,28.812 c-0.2199,0.2198-0.5297,0.3248-0.838,0.284l-5.846-0.776L9.3413,49.6z"/>
      <path fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M48.3723,36.082 l3.243,19.472c0.3715,2.2297-0.3566,4.5016-1.955,6.1l-3.578,3.578l-6.534-20.824"/>
      <path fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M27.2233,32.2 l-20.659-6.482l3.578-3.578c1.5985-1.5984,3.8703-2.3265,6.1001-1.955l19.472,3.243"/>
      <path fill="none" stroke="#000000" stroke-linejoin="round" stroke-width="2" d="M56.1423,18.469l-0.158-0.585 c-0.2797-1.0374-1.0847-1.8511-2.119-2.142l-0.579-0.159c-1.8103-0.6506-3.8324-0.2362-5.241,1.074l-28.853,28.808l-6.339-0.842 l-5.253,5.312l9.964,4.3l0,0l4.1171,10.206l5.371-5.428l-0.747-6.428l28.8-28.795C56.3978,22.3393,56.7954,20.2989,56.1423,18.469z"/>
    </svg>
    <div class="end-title">太平洋航線：棒球空襲事件</div>
    <div class="end-fin">劇 終</div>
    <button id="replayBtn" type="button">↻ 重新播放</button>
  </div>
</div>

<script>
'use strict';
/* ============================================================
   第 1 節　小工具與緩動曲線
   ============================================================ */
const clamp = (v, a, b) => v < a ? a : (v > b ? b : v); const lerp = (a, b, t) => a + (b - a) * t;
const seg = (t, a, b) => clamp((t - a) / (b - a), 0, 1); const TAU = Math.PI * 2;
const easeOutCubic = t => 1 - Math.pow(1 - t, 3); const easeInCubic = t => t * t * t;
const easeInQuad = t => t * t; const easeOutQuad = t => 1 - (1 - t) * (1 - t);
const easeInOutCubic = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
const easeInOutSine = t => -(Math.cos(Math.PI * t) - 1) / 2;
const easeOutBack = t => { const c = 1.70158; return 1 + (c + 1) * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2); };
function hexRgb(h){ return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)]; }
function mixc(h1, h2, t){
  const a = hexRgb(h1), b = hexRgb(h2);
  return 'rgb(' + Math.round(lerp(a[0], b[0], t)) + ',' + Math.round(lerp(a[1], b[1], t)) + ',' + Math.round(lerp(a[2], b[2], t)) + ')';
}

/* ============================================================
   第 2 節　畫布（devicePixelRatio 自適應）
   ============================================================ */
const W = 960, H = 540; const canvas = document.getElementById('stage'); const ctx = canvas.getContext('2d');
function resize(){
  const scale = Math.min(innerWidth / W, innerHeight / H) * 0.96; const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = Math.round(W * scale * dpr); canvas.height = Math.round(H * scale * dpr);
  canvas.style.width = W * scale + 'px'; canvas.style.height = H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', resize); resize();

const titleCard = document.getElementById('titleCard'); const actEl = document.getElementById('act');
const actNoEl = document.getElementById('actNo'); const actNameEl = document.getElementById('actName');
const subtitleEl = document.getElementById('subtitle'); const soundBtn = document.getElementById('soundBtn');
const endOverlay = document.getElementById('endOverlay'); const replayBtn = document.getElementById('replayBtn');
const hintEl = document.getElementById('hint');

/* ============================================================
   第 3 節　時間軸（秒）——三幕結構
   第一幕：啟程（清晨台灣・起飛爬升）
   第二幕：棒球空襲（高空墜球・驚險擦過・墜海）
   第三幕：平安抵達（夕陽・鯨魚彩蛋・美國西岸）
   ============================================================ */
const T = {
  titleHide: 2.8, act2: 7.2, ballIn: 10.2, cross: 11.55, splash: 13.9,
  whale: 15.5, act3: 18.0, fadeOut: 24.6, end: 26.4
};
const HZN = 300;   /* 海平面 */

let tl = 0, rt = 0, last = performance.now();
let shake = 0, flash = 0, alert = 0, zoomP = 0, ended = false;
let splashRT = -99;

/* 慢動作：棒球擦過機鼻的瞬間 */
function timeScaleAt(t){
  if(t > 11.45 && t < 12.15) return 0.32;
  if(t >= 12.15 && t < 12.7) return lerp(0.32, 1, seg(t, 12.15, 12.7));
  return 1;
}

/* ============================================================
   第 4 節　飛機與棒球的航跡（純函式，可重播）
   ============================================================ */
function planePos(t){
  let x, y, pitch = 0;
  if(t < 3){
    const p = seg(t, 0, 3); x = 130 + easeInQuad(p) * 150; y = 290;
    if(t > 2.2){ const q = seg(t, 2.2, 3); y = 290 - easeInQuad(q) * 8; pitch = -0.06 * q; }
  } else if(t < 7){
    const p = seg(t, 3, 7); x = 280 + easeInOutCubic(p) * 630; y = 282 - easeInOutCubic(p) * 110;
    pitch = -0.13 * Math.sin(p * Math.PI);
  } else if(t < 18){
    x = 910 + (t - 7) * 104; y = 172 + Math.sin(t * 0.9) * 5;
  } else if(t < 24.5){
    const p = seg(t, 18, 24.5); x = 2054 + easeInOutSine(p) * 810;
    y = 172 + Math.sin(t * 0.9) * 5 * (1 - p) + easeInOutCubic(p) * 72; pitch = 0.07 * Math.sin(p * Math.PI);
  } else {
    x = 2864 + (t - 24.5) * 30; y = 244;
  }
  if(t >= 11.5 && t <= 12.7){
    const b = Math.sin(seg(t, 11.5, 12.7) * Math.PI); y += b * 26; pitch += b * 0.16;
  }
  return { x, y, pitch };
}
const PP0 = planePos(11.55);
const CROSS = { x: PP0.x + 34, y: PP0.y - 6 };
const SPLASH = { x: CROSS.x - 240, y: 311 };

function ballPos(t){
  if(t < T.ballIn) return null;
  if(t < T.cross){
    const p = seg(t, T.ballIn, T.cross); const pp = p * p * 0.65 + p * 0.35;
    return { x: lerp(CROSS.x + 400, CROSS.x, pp), y: lerp(CROSS.y - 560, CROSS.y, pp), fly: true };
  }
  if(t < T.splash){
    const p = seg(t, T.cross, T.splash); const py = easeInQuad(p) * 0.55 + p * 0.45;
    return { x: lerp(CROSS.x, SPLASH.x, p), y: lerp(CROSS.y, SPLASH.y, py), fly: true };
  }
  return { x: SPLASH.x, y: SPLASH.y, fly: false };
}

/* ============================================================
   第 5 節　聲音引擎（Web Audio 合成・預設靜音）
   ============================================================ */
let AC = null, master = null, engineGain = null, windGain = null; let audioOn = false;
function initAudio(){
  AC = new (window.AudioContext || window.webkitAudioContext)();
  master = AC.createGain(); master.gain.value = 0; master.connect(AC.destination);
  const len = AC.sampleRate * 2; const buf = AC.createBuffer(1, len, AC.sampleRate);
  const d = buf.getChannelData(0); let lv = 0;
  for(let i = 0; i < len; i++){ const w = Math.random() * 2 - 1; lv = (lv + 0.02 * w) / 1.02; d[i] = lv * 3.2; }
  /* 引擎：棕噪音低通 */
  const eSrc = AC.createBufferSource(); eSrc.buffer = buf; eSrc.loop = true;
  const eLp = AC.createBiquadFilter(); eLp.type = 'lowpass'; eLp.frequency.value = 160;
  engineGain = AC.createGain(); engineGain.gain.value = 0;
  eSrc.connect(eLp); eLp.connect(engineGain); engineGain.connect(master); eSrc.start();
  /* 高空風聲：帶通 */
  const wSrc = AC.createBufferSource(); wSrc.buffer = buf; wSrc.loop = true;
  const wBp = AC.createBiquadFilter(); wBp.type = 'bandpass'; wBp.frequency.value = 620; wBp.Q.value = 0.4;
  windGain = AC.createGain(); windGain.gain.value = 0;
  wSrc.connect(wBp); wBp.connect(windGain); windGain.connect(master); wSrc.start();
}
function audioReady(){ return audioOn && AC; }
function beep(freq, dur, type, vol, slide){
  if(!audioReady()) return; const o = AC.createOscillator(), g = AC.createGain();
  o.type = type || 'sine'; o.frequency.setValueAtTime(freq, AC.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), AC.currentTime + dur);
  g.gain.setValueAtTime(vol, AC.currentTime); g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.connect(g); g.connect(master); o.start(); o.stop(AC.currentTime + dur);
}
function noiseBurst(dur, vol, o){
  if(!audioReady()) return; const n = Math.floor(AC.sampleRate * dur);
  const buf = AC.createBuffer(1, n, AC.sampleRate); const d = buf.getChannelData(0);
  for(let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
  const s = AC.createBufferSource(); s.buffer = buf;
  const f = AC.createBiquadFilter(); f.type = (o && o.type) || 'lowpass';
  f.frequency.setValueAtTime((o && o.f0) || 1000, AC.currentTime);
  f.frequency.exponentialRampToValueAtTime(Math.max(40, (o && o.f1) || 400), AC.currentTime + dur);
  const g = AC.createGain(); g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  s.connect(f); f.connect(g); g.connect(master); s.start();
}
const sfxChime = () => { beep(784, 0.25, 'sine', 0.12); setTimeout(() => beep(587, 0.4, 'sine', 0.12), 260); };
const sfxFall = () => beep(1600, 2.4, 'sine', 0.07, -1250);
const sfxWhoosh = () => noiseBurst(0.45, 0.32, { type:'bandpass', f0:900, f1:2800 });
const sfxSplash = () => {
  noiseBurst(0.8, 0.5, { f0:1000, f1:120 });
  setTimeout(() => noiseBurst(0.3, 0.2, { f0:600, f1:200 }), 150);
};
const sfxWhale = () => { beep(130, 1.0, 'sine', 0.16, 100); setTimeout(() => beep(196, 0.8, 'triangle', 0.09, 60), 220); };

function engineLevelAt(t){
  if(t < 2) return 0.06;
  if(t < 3) return lerp(0.06, 0.32, seg(t, 2, 3));
  if(t < 7) return 0.32;
  if(t < 8.5) return lerp(0.32, 0.13, seg(t, 7, 8.5));
  if(t < 18) return 0.13;
  if(t < 24) return 0.17;
  return lerp(0.17, 0, seg(t, 24, 25.8));
}
function updateAudio(){
  if(!AC) return; master.gain.setTargetAtTime(audioOn ? 0.9 : 0, AC.currentTime, 0.08);
  engineGain.gain.setTargetAtTime(engineLevelAt(tl) * 0.55, AC.currentTime, 0.25);
  windGain.gain.setTargetAtTime(tl > 3.5 && tl < 24.5 ? 0.03 : 0.005, AC.currentTime, 0.5);
}
soundBtn.addEventListener('click', () => {
  audioOn = !audioOn; if(audioOn && !AC) initAudio(); if(AC && AC.state === 'suspended') AC.resume();
  soundBtn.textContent = audioOn ? '♪ 聲音：開' : '♪ 聲音：關'; soundBtn.classList.toggle('on', audioOn);
});

/* ============================================================
   第 6 節　粒子與水環（凝結尾・水花・浪沫・鯨魚噴泉）
   ============================================================ */
const parts = []; const rings = []; const trail = [];
function spawnDrops(x, y, n, sp, up){
  for(let i = 0; i < n; i++){
    const a = -Math.PI / 2 + (Math.random() * 2 - 1) * (up ? 0.5 : 1.1);
    const s = sp * (0.35 + Math.random() * 0.65);
    parts.push({
      type:'drop', x: x + (Math.random() * 2 - 1) * 8, y,
      vx: Math.cos(a) * s, vy: Math.sin(a) * s,

function spawnRing(x, y, vr){ rings.push({ x, y, r: 6, vr: vr || 60, a: 0.85 }); }
function updateParticles(dt){
  /* 凝結尾（飛行中） */
  const pl = planePos(tl);
  if(tl > 3.4 && tl < 24.2 && parts.length < 460){
    parts.push({
      type:'puff', x: pl.x - 46 + (Math.random() * 2 - 1) * 3, y: pl.y + 6 + (Math.random() * 2 - 1) * 3,
      vx: -26, vy: (Math.random() * 2 - 1) * 4, g: 0, drag: 1,
      life: 1.5 + Math.random() * 0.7, r: 2.5, grow: 7
    });
  }
  /* 棒球火流星尾跡火花 */
  const b = ballPos(tl);
  if(b && b.fly && Math.random() < 0.75){
    parts.push({
      type:'spark', x: b.x, y: b.y, vx: (Math.random() * 2 - 1) * 36, vy: (Math.random() * 2 - 1) * 36,
      g: 60, drag: 0.92, life: 0.4 + Math.random() * 0.3, color:'#ffb347'
    });
  }
  for(let i = parts.length - 1; i >= 0; i--){
    const p = parts[i]; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += (p.g || 0) * dt;
    if(p.drag && p.drag < 1){ const d = Math.pow(p.drag, dt * 60); p.vx *= d; p.vy *= d; }
    if(p.grow) p.r += p.grow * dt;
    if(p.type === 'drop' && p.y > 316 && p.vy > 0){ p.life = Math.min(p.life, 0.12); p.vy *= 0.3; }
    p.life -= dt; if(p.life <= 0) parts.splice(i, 1);
  }
  for(let i = rings.length - 1; i >= 0; i--){
    const r = rings[i]; r.r += r.vr * dt; r.a -= dt * 0.7; if(r.a <= 0) rings.splice(i, 1);
  }
  if(parts.length > 520) parts.splice(0, parts.length - 520);
}
function drawParticles(){
  for(const p of parts){
    const a = clamp(p.life * 2, 0, 1);
    if(p.type === 'puff'){
      ctx.globalAlpha = a * 0.28; ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, TAU); ctx.fill();
    } else if(p.type === 'spark'){
      ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = a; ctx.strokeStyle = p.color; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - p.vx * 0.03, p.y - p.vy * 0.03); ctx.stroke();
      ctx.globalCompositeOperation = 'source-over';
    } else if(p.type === 'drop'){
      ctx.globalAlpha = a * 0.9; ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, TAU); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
  for(const r of rings){
    ctx.globalAlpha = clamp(r.a, 0, 1); ctx.strokeStyle = '#e6f6ff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(r.x, r.y, r.r, r.r * 0.26, 0, 0, TAU); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

  ctx.save(); ctx.globalAlpha = a * 0.65; ctx.strokeStyle = '#ffffff'; ctx.lineCap = 'round';
  for(let i = 0; i < 5; i++){
    const ly = pl.y - 18 + i * 9; const len = 34 + ((i * 29) % 22) + Math.sin(rt * 26 + i * 2) * 8;
    ctx.lineWidth = 2.2 - i * 0.2;
    ctx.beginPath(); ctx.moveTo(pl.x - 66 - len, ly); ctx.lineTo(pl.x - 66, ly); ctx.stroke();
  }
  /* 驚嚇震顫弧線（機鼻上方） */
  ctx.globalAlpha = a * 0.9; ctx.strokeStyle = '#fff3c4'; ctx.lineWidth = 2;
  for(let i = 0; i < 3; i++){
    ctx.beginPath(); ctx.arc(pl.x + 48, pl.y - 22, 8 + i * 6 + Math.sin(rt * 18) * 2, -1.9, -0.7); ctx.stroke();
  }
  ctx.restore(); ctx.globalAlpha = 1;
}

/* ============================================================
   第 10 節　棒球（火流星）與鯨魚彩蛋
   ============================================================ */
function drawBaseball(x, y, r, rot){
  ctx.save(); ctx.translate(x, y); ctx.rotate(rot);
  const bg = ctx.createRadialGradient(-r * 0.35, -r * 0.35, r * 0.15, 0, 0, r * 1.15);
  bg.addColorStop(0, '#ffffff'); bg.addColorStop(0.65, '#f1ead2'); bg.addColorStop(1, '#c9bd9a');
  ctx.fillStyle = bg; ctx.beginPath(); ctx.arc(0, 0, r, 0, TAU); ctx.fill();
  ctx.strokeStyle = 'rgba(14,27,43,0.55)'; ctx.lineWidth = 0.9; ctx.stroke();
  ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.arc(0, 0, r * 0.98, 0.4, 1.6); ctx.stroke();
  ctx.beginPath(); ctx.arc(0, 0, r * 0.98, Math.PI + 0.4, Math.PI + 1.6); ctx.stroke();
  ctx.restore();
}
function updateTrail(dt){
  const b = ballPos(tl); if(b && b.fly) trail.push({ x: b.x, y: b.y, a: 1 });
  for(const p of trail) p.a -= dt * 1.3;
  while(trail.length && trail[0].a <= 0) trail.shift();
  if(trail.length > 60) trail.shift();
}
function drawBallAndTrail(){
  if(trail.length > 1){
    ctx.save(); ctx.globalCompositeOperation = 'lighter';
    for(let i = 1; i < trail.length; i++){
      const p0 = trail[i - 1], p1 = trail[i];
      ctx.globalAlpha = p1.a * 0.5; ctx.strokeStyle = i % 2 ? '#ffb347' : '#ffe3b0';
      ctx.lineWidth = lerp(1, 7, i / trail.length); ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(p0.x, p0.y); ctx.lineTo(p1.x, p1.y); ctx.stroke();
    }
    ctx.restore(); ctx.globalAlpha = 1;
  }
  const b = ballPos(tl); if(!b) return;
  if(b.fly){
    ctx.save(); ctx.shadowColor = '#ffb347'; ctx.shadowBlur = 16;
    drawBaseball(b.x, b.y, 9, rt * 12); ctx.restore();
  } else {
    /* 落海後：漂浮 → 被浮出的鯨魚托起 → 噴泉頂球雜耍 → 鯨魚下潛、球撲通落回 */
    let bx = SPLASH.x, by = 311 + Math.sin(rt * 2.1) * 2.2, spin = rt * 0.6, wake = true;
    if(tl >= T.whale && tl < 17.55){
      const em = clamp(whaleEmerge(tl), 0, 1); const rise = (1 - em) * 56;
      const h = Math.sin(seg(tl, 16.4, 17.3) * Math.PI);       /* 噴泉高度 */
      bx = lerp(SPLASH.x, SPLASH.x - 66, easeInOutCubic(seg(tl, T.whale, 16.2))) + Math.sin(rt * 6) * 2.5 * h;
      by = Math.min(311 + Math.sin(rt * 2.1) * 2.2,
                    278 + rise - h * 26 + Math.sin(rt * 12) * 2 * h);
      spin = rt * (0.6 + h * 9); wake = by > 305;
    } else if(tl >= 17.55){
      const drop = easeInQuad(seg(tl, 17.55, 17.95));          /* 撲通落回海面 */
      bx = SPLASH.x - 66 + easeOutCubic(seg(tl, 17.55, 18.6)) * 20;
      by = lerp(274, 311, drop) + (tl > 17.95 ? Math.sin(rt * 2.1) * 2.2 : 0);
      wake = tl > 17.9;
    }
    drawBaseball(bx, by, 7, spin);
    if(wake){
      ctx.fillStyle = SKY.oT;
      ctx.beginPath(); ctx.ellipse(bx, by + 4.6, 9.5, 3.4, 0, 0, TAU); ctx.fill();
      ctx.strokeStyle = 'rgba(230,246,255,0.8)'; ctx.lineWidth = 1.4;
      ctx.beginPath(); ctx.ellipse(bx, by + 3.4, 9.5, 3, 0, 0, TAU); ctx.stroke();
    }
  }
}
function whaleEmerge(t){
  return clamp(easeOutBack(seg(t, T.whale, T.whale + 0.7)) - easeInCubic(seg(t, 17.6, 18.3)), 0, 1.05);
}
function drawWhale(){
  const em = whaleEmerge(tl); if(em <= 0.01) return;
  const rise = (1 - em) * 56;
  ctx.save(); ctx.translate(SPLASH.x - 56, 314 + rise);
  /* 身體（上半弧） */
  const bg = ctx.createLinearGradient(0, -40, 0, 6);
  bg.addColorStop(0, '#48709c'); bg.addColorStop(1, '#2a4666');
  ctx.fillStyle = bg; ctx.strokeStyle = 'rgba(12,22,38,0.8)'; ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.ellipse(0, 8, 54, 40, 0, Math.PI, TAU); ctx.closePath(); ctx.fill(); ctx.stroke();
  /* 肚皮紋 */
  ctx.strokeStyle = 'rgba(220,235,250,0.35)'; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.ellipse(0, 8, 44, 30, 0, Math.PI * 1.15, Math.PI * 1.85); ctx.stroke();
  /* 噴氣孔 */
  ctx.fillStyle = '#1d3651'; ctx.beginPath(); ctx.ellipse(-10, -30, 3.6, 2, 0, 0, TAU); ctx.fill();
  /* 眼睛（白+瞳+高光）與微笑 */
  ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(36, -6, 4.4, 0, TAU); ctx.fill();
  ctx.strokeStyle = 'rgba(12,22,38,0.7)'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = '#101820'; ctx.beginPath(); ctx.arc(37.5, -6, 2.2, 0, TAU); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(38.3, -7, 0.8, 0, TAU); ctx.fill();
  ctx.strokeStyle = 'rgba(12,22,38,0.75)'; ctx.lineWidth = 1.6;
  ctx.beginPath(); ctx.arc(38, 2, 8, Math.PI * 0.15, Math.PI * 0.5); ctx.stroke();
  /* 側鰭 */
  ctx.fillStyle = '#33547a';
  ctx.beginPath(); ctx.ellipse(20, 6, 11, 4.5, 0.7, 0, TAU); ctx.fill(); ctx.stroke();
  /* 下潛時的尾鰭 */
  const dive = seg(tl, 17.55, 18.2);
  if(dive > 0.02 && dive < 0.98){
    const ty = 10 - Math.sin(dive * Math.PI) * 34;
    ctx.save(); ctx.translate(66, ty); ctx.rotate(-0.3 + dive * 0.5);
    ctx.fillStyle = '#2a4666';
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(14, -12, 22, -4);
    ctx.quadraticCurveTo(14, 0, 10, 2); ctx.quadraticCurveTo(16, 6, 20, 12);
    ctx.quadraticCurveTo(8, 10, 0, 4); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
  /* 水線泡沫 */
  ctx.fillStyle = 'rgba(230,246,255,0.5)';
  ctx.beginPath(); ctx.ellipse(SPLASH.x - 56, 315, 62 * em, 6, 0, 0, TAU); ctx.fill();
}
/* 鯨魚噴泉（16.4s 起約 0.9 秒） */
function drawSpout(){
  const k = seg(tl, 16.4, 17.3); if(k <= 0 || k >= 1) return;
  const h = Math.sin(k * Math.PI);
  ctx.save(); ctx.translate(SPLASH.x - 66, 284); ctx.strokeStyle = 'rgba(217,242,255,0.8)'; ctx.lineWidth = 2.4; ctx.lineCap = 'round';
  for(let i = -2; i <= 2; i++){
    ctx.beginPath(); ctx.moveTo(0, 8);
    ctx.quadraticCurveTo(i * 7, -14 * h, i * 13, -26 * h + 6);
    ctx.stroke();
  }
  ctx.restore();
}

/* ============================================================
   第 11 節　鏡頭系統（分鏡・追蹤・視差）
   ============================================================ */
const cam = { x: 430, y: 252, zoom: 1.08 }; let curShot = -1;
function shotIdAt(t){
  if(t < 3.2) return 0; if(t < T.act2) return 1; if(t < T.ballIn) return 2;
  if(t < T.splash) return 3; if(t < T.whale) return 4; if(t < T.act3) return 5;
  if(t < T.fadeOut) return 6; return 7;
}
function camTargetAt(t){
  const pl = planePos(t);
  switch(shotIdAt(t)){
    case 0:{ const p = seg(t, 0, 3.2); return { x: 430, y: 252, zoom: 1.08 + easeInOutCubic(p) * 0.1 }; }
    case 1: return { x: pl.x + 130, y: clamp(pl.y + 40, 205, 290), zoom: 1.26 };
    case 2: return { x: pl.x + 90, y: 238, zoom: 1.02 };
    case 3: return { x: pl.x + 70, y: clamp(pl.y + 16, 150, 300), zoom: 1.3 * (1 + zoomP * 0.22) };
    case 4: return { x: SPLASH.x, y: 288, zoom: 1.32 };
    case 5: return { x: SPLASH.x - 20, y: 300, zoom: 1.72 };
    case 6:{ const p = seg(t, T.act3, T.fadeOut); return { x: pl.x + 116, y: clamp(pl.y + 26, 210, 300), zoom: 1.1 - easeInOutCubic(p) * 0.12 }; }
    default: return { x: 2790, y: 252, zoom: 0.98 };
  }
}
function updateCamera(dt){
  const id = shotIdAt(tl); const tgt = camTargetAt(tl);
  if(id !== curShot){ curShot = id; cam.x = tgt.x; cam.y = tgt.y; cam.zoom = tgt.zoom; }
  else {
    const k = 1 - Math.pow(0.002, dt);
    cam.x += (tgt.x - cam.x) * k; cam.y += (tgt.y - cam.y) * k; cam.zoom += (tgt.zoom - cam.zoom) * k;
  }
}
function withParallax(f, fn){
  ctx.save(); ctx.translate((cam.x - W / 2) * (1 - f), (cam.y - H / 2) * (1 - f) * 0.5); fn(); ctx.restore();
}

/* ============================================================
   第 12 節　字幕與幕標題
   ============================================================ */
const SUBS = [
  { a: 0.9, b: 2.9, text: '清晨，班機從台灣起飛。' },
  { a: 3.6, b: 5.9, text: '目的地——太平洋另一端的美國。' },
  { a: 8.0, b: 9.9, text: '航程過半，萬里無雲，一切平靜……' },
  { a: 10.5, b: 11.4, text: '等等——天上那是什麼？！' },
  { a: 11.9, b: 13.5, text: '一顆棒球從高空呼嘯而過！' },
  { a: 14.2, b: 15.7, text: '撲通！墜入太平洋正中央！' },
  { a: 16.1, b: 17.9, text: '據說，那是一記飛得太遠的全壘打……' },
  { a: 19.2, b: 21.4, text: '夕陽下，班機平安飛向美國西岸。' },
  { a: 22.3, b: 24.3, text: '一段關於飛機、棒球，與運氣的旅程。' }
];
const ACTS = [
  { at: 2.95, dur: 2.0, no: '第 一 幕', name: '啟程' },
  { at: 7.25, dur: 1.8, no: '第 二 幕', name: '棒球空襲' },
  { at: 18.05, dur: 2.0, no: '第 三 幕', name: '平安抵達' }
];
let lastSub = '';
function updateOverlays(){
  titleCard.classList.toggle('show', tl > 0.15 && tl < T.titleHide);
  hintEl.classList.toggle('show', !audioOn && tl > 0.6 && tl < 5.2);
  let sub = null;
  for(const s of SUBS){ if(tl >= s.a && tl < s.b){ sub = s; break; } }
  if(sub){
    if(sub.text !== lastSub){ subtitleEl.textContent = sub.text; lastSub = sub.text; }
    subtitleEl.classList.add('show');
  } else { subtitleEl.classList.remove('show'); lastSub = ''; }
  let act = null;
  for(const a of ACTS){ if(tl >= a.at && tl < a.at + a.dur){ act = a; break; } }
  if(act){ actNoEl.textContent = act.no; actNameEl.textContent = act.name; actEl.classList.add('show'); }
  else { actEl.classList.remove('show'); }
}

/* ============================================================
   第 13 節　關鍵事件（一次性）
   ============================================================ */
function onSplash(){
  shake = 12; splashRT = rt; sfxSplash();
  spawnDrops(SPLASH.x, 312, 30, 300, false);
  spawnRing(SPLASH.x, 313, 90); spawnRing(SPLASH.x, 313, 55);
  setTimeout(() => spawnRing(SPLASH.x, 313, 40), 250);
}
const EVENTS = [
  { t: 1.0, fired: false, fn: sfxChime },
  { t: 2.4, fired: false, fn: () => noiseBurst(1.4, 0.18, { f0: 300, f1: 900 }) },
  { t: 10.3, fired: false, fn: () => { alert = 1; sfxFall(); } },
  { t: 11.55, fired: false, fn: () => { zoomP = 1; flash = 0.45; shake = 6; sfxWhoosh(); } },
  { t: 11.62, fired: false, fn: () => { const pl = planePos(tl); spawnDrops(pl.x + 44, pl.y - 12, 6, 180, true); } },
  { t: 13.9, fired: false, fn: onSplash },
  { t: 15.9, fired: false, fn: sfxWhale },
  { t: 16.42, fired: false, fn: () => spawnDrops(SPLASH.x - 66, 286, 14, 190, true) },
  { t: 17.7, fired: false, fn: () => { spawnRing(SPLASH.x - 50, 315, 70); noiseBurst(0.4, 0.2, { f0: 800, f1: 150 }); } },
  { t: 17.95, fired: false, fn: () => { spawnDrops(SPLASH.x - 62, 312, 10, 170, false); spawnRing(SPLASH.x - 62, 313, 46); noiseBurst(0.35, 0.22, { f0: 900, f1: 140 }); } },
  { t: 22.6, fired: false, fn: sfxChime }
];

/* ============================================================
   第 14 節　渲染
   ============================================================ */
function drawSplashColumn(){
  const k = (rt - splashRT) / 0.7; if(k < 0 || k > 1) return;
  const h = Math.sin(Math.min(1, k * 1.4) * Math.PI);
  ctx.save(); ctx.translate(SPLASH.x, 313);
  ctx.fillStyle = 'rgba(226,245,255,0.85)';
  ctx.beginPath();
  ctx.moveTo(-4, 0); ctx.quadraticCurveTo(-9, -30 * h, -16, -52 * h);
  ctx.quadraticCurveTo(0, -40 * h, 16, -52 * h);
  ctx.quadraticCurveTo(9, -30 * h, 4, 0); ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.ellipse(0, 0, 20 + k * 16, 4.5, 0, 0, TAU); ctx.fill();
  ctx.restore();
}
/* 畫面邊緣警示指標：紅色三角追蹤畫外的來球（讓觀眾「看見」威脅） */
function drawWarnIndicator(){
  if(tl < 10.32 || tl > T.cross - 0.06) return;
  const b = ballPos(tl); if(!b) return;
  const sx = (b.x - cam.x) * cam.zoom + W / 2; const sy = (b.y - cam.y) * cam.zoom + H / 2;
  if(sx < W - 34 && sy > 46) return;                     /* 球已進畫面就收掉 */
  const cx = clamp(sx, 60, W - 60), cy = clamp(sy, 72, H - 72);
  const ang = Math.atan2(sy - cy, sx - cx);
  const pu = 0.55 + 0.45 * Math.sin(rt * 11);
  ctx.save(); ctx.translate(cx, cy);
  ctx.save(); ctx.rotate(ang);                           /* 指向來球方向的箭頭 */
  ctx.fillStyle = `rgba(255,70,45,${0.75 + 0.25 * pu})`;
  ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 2; ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.moveTo(26 + pu * 5, 0); ctx.lineTo(10, -9); ctx.lineTo(10, 9); ctx.closePath();
  ctx.fill(); ctx.stroke(); ctx.restore();
  /* 圓形警示牌＋驚嘆號 */
  ctx.fillStyle = `rgba(180,28,18,${0.85})`;
  ctx.strokeStyle = 'rgba(255,255,255,0.95)'; ctx.lineWidth = 2.4;
  ctx.beginPath(); ctx.arc(0, 0, 15 + pu * 2.5, 0, TAU); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#ffffff'; ctx.font = 'bold 20px -apple-system,"Segoe UI",sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('!', 0, 1);
  ctx.textBaseline = 'alphabetic'; ctx.restore();
}
function render(){
  ctx.fillStyle = '#03060c'; ctx.fillRect(0, 0, W, H);
  drawSkyScreen();
  ctx.save();
  const shx = (Math.random() * 2 - 1) * shake; const shy = (Math.random() * 2 - 1) * shake;
  const wob = Math.sin(rt * 1.2) * 1.2 + Math.sin(rt * 2.6) * 0.5;
  ctx.translate(W / 2 + shx, H / 2 + shy + wob * 0.4);
  ctx.scale(cam.zoom, cam.zoom);
  ctx.translate(-cam.x + wob / cam.zoom, -cam.y);
  withParallax(0.35, () => drawCloudLayer(cloudsFar, 0.55));
  withParallax(0.6, () => drawCloudLayer(cloudsMid, 0.75));
  drawOcean(); drawTaiwan(); drawAtoll(); drawUSA(); drawGulls();
  drawWhale(); drawSpout();
  drawSplashColumn();
  /* 深度層次：越過機鼻前球在飛機後方，越過後改到前景 */
  if(tl < T.cross){ drawBallAndTrail(); drawPlane(); }
  else { drawPlane(); drawBallAndTrail(); }
  drawNearMissFX();
  drawParticles();
  withParallax(0.88, () => drawCloudLayer(cloudsNear, 0.95));
  ctx.restore();
  /* --- 螢幕空間層 --- */
  ctx.fillStyle = 'rgba(12,24,52,0.08)'; ctx.fillRect(0, 0, W, H);
  if(sunK > 0.01){ ctx.fillStyle = `rgba(255,140,60,${sunK * 0.08})`; ctx.fillRect(0, 0, W, H); }
  /* 空襲警報紅光 */
  if(alert > 0.02){
    const pu = alert * (0.5 + 0.5 * Math.sin(rt * 9));
    const rg = ctx.createRadialGradient(W / 2, H / 2, H * 0.3, W / 2, H / 2, H * 0.75);
    rg.addColorStop(0, 'rgba(255,60,40,0)'); rg.addColorStop(1, `rgba(255,60,40,${pu * 0.3})`);
    ctx.fillStyle = rg; ctx.fillRect(0, 0, W, H);
  }
  if(flash > 0.01){ ctx.fillStyle = `rgba(255,250,235,${clamp(flash, 0, 1) * 0.85})`; ctx.fillRect(0, 0, W, H); }
  drawWarnIndicator();
  const vg = ctx.createRadialGradient(W / 2, H / 2, H * 0.35, W / 2, H / 2, H * 0.85);
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
  const bar = 34 * easeOutCubic(seg(tl, 0.2, 1.6));
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, bar); ctx.fillRect(0, H - bar, W, bar);
  const fadeIn = 1 - easeOutCubic(seg(tl, 0, 1.2));
  const fadeOut = easeInOutCubic(seg(tl, T.fadeOut, T.end - 0.2)) * 0.85;
  const fade = Math.max(fadeIn, fadeOut);
  if(fade > 0.01){ ctx.fillStyle = `rgba(3,6,12,${fade})`; ctx.fillRect(0, 0, W, H); }
}

/* ============================================================
   第 15 節　主迴圈與重新播放
   ============================================================ */
function frame(now){
  requestAnimationFrame(frame);
  const dt = Math.min((now - last) / 1000, 0.05); last = now; rt += dt;
  if(!ended){
    tl += dt * timeScaleAt(tl);
    if(tl >= T.end){ tl = T.end; ended = true; endOverlay.classList.add('show'); }
  }
  for(const e of EVENTS){ if(!e.fired && tl >= e.t){ e.fired = true; e.fn(); } }
  updateSkyColors(); updateCamera(dt); updateParticles(dt); updateTrail(dt); updateOverlays(); updateAudio();
  shake *= Math.pow(0.001, dt); flash *= Math.pow(0.004, dt);
  alert *= tl > 12.6 ? Math.pow(0.05, dt) : 1;
  zoomP *= Math.pow(0.03, dt);
  render();
}
function replay(){
  tl = 0; shake = 0; flash = 0; alert = 0; zoomP = 0; splashRT = -99;
  ended = false; curShot = -1; lastSub = '';
  parts.length = 0; rings.length = 0; trail.length = 0;
  for(const e of EVENTS) e.fired = false;
  endOverlay.classList.remove('show');
}
replayBtn.addEventListener('click', replay);
requestAnimationFrame(frame);
</script>
