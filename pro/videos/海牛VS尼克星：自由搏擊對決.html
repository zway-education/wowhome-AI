<!doctype html>
<!-- 專業AI升級 v4 -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>海牛 VS 尼克星 自由搏擊對決</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; overflow:hidden; background:radial-gradient(circle at 50% 30%, #1c0b08 0%, #0a0505 55%, #030303 100%);
    font-family:"Noto Sans TC","Microsoft JhengHei","PingFang TC",sans-serif;
    -webkit-user-select:none; user-select:none; touch-action:manipulation; overscroll-behavior:none;
    -webkit-tap-highlight-color:transparent; }
  #stage{ position:fixed; inset:0; }
  canvas{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); }

  /* ---------- 字幕（錨定在畫佈下緣內側，直式/橫式皆貼近畫面） ---------- */
  #subtitle{ position:absolute; left:50%; bottom:calc(var(--cvB, 7.5%) + 10px); transform:translate(-50%, 14px) scale(.96); max-width:86%; padding:10px 30px;
    font-size:clamp(15px, 2.6vw, 23px); font-weight:900; letter-spacing:2px; text-align:center; color:#fff; white-space:nowrap;
    background:linear-gradient(180deg, rgba(16,12,26,.92), rgba(10,8,18,.72)); border:1px solid rgba(255,176,32,.55); border-radius:999px;
    box-shadow:0 6px 24px rgba(0,0,0,.6), 0 0 18px rgba(255,176,32,.18) inset; text-shadow:0 2px 6px rgba(0,0,0,.8);
    opacity:0; pointer-events:none; transition:opacity .38s ease, transform .38s cubic-bezier(.22,1.2,.36,1); }
  #subtitle.show{ opacity:1; transform:translate(-50%,0) scale(1); }
  #subtitle.blue{ border-color:rgba(94,180,255,.75); box-shadow:0 6px 24px rgba(0,0,0,.6), 0 0 22px rgba(63,169,255,.28); color:#cfe9ff; }
  #subtitle.red { border-color:rgba(255,110,90,.75); box-shadow:0 6px 24px rgba(0,0,0,.6), 0 0 22px rgba(255,59,48,.28); color:#ffd9d4; }
  #subtitle.gold{ border-color:rgba(255,205,80,.9);  box-shadow:0 6px 24px rgba(0,0,0,.6), 0 0 26px rgba(255,176,32,.38); color:#ffe9b0; }

  /* ---------- 按鈕（觸控目標 ≥48px、safe-area 邊距、按下立即回饋） ---------- */
  .uibtn{ position:absolute; z-index:9; font-family:inherit; font-weight:900; letter-spacing:2px; color:#ffe9b0; cursor:pointer;
    min-width:48px; min-height:48px;
    background:linear-gradient(180deg, rgba(40,28,16,.85), rgba(20,14,10,.85)); border:1px solid rgba(255,176,32,.5); border-radius:999px;
    text-shadow:0 1px 3px rgba(0,0,0,.7); transition:transform .18s cubic-bezier(.22,1.4,.36,1), box-shadow .18s ease, opacity .3s ease; }
  .uibtn:hover{ transform:scale(1.06); box-shadow:0 0 18px rgba(255,176,32,.35); }
  .uibtn:active{ transform:scale(.94); transition-duration:.05s; box-shadow:0 0 22px rgba(255,176,32,.5); }
  #sndBtn{ top:max(14px, env(safe-area-inset-top)); right:max(14px, env(safe-area-inset-right)); font-size:15px; padding:12px 18px; }
  #replayBtn{ left:50%; top:64%; transform:translate(-50%,0) scale(.6); font-size:clamp(18px,3.2vw,26px); padding:14px 44px;
    background:linear-gradient(180deg,#ffb020,#e8582f); color:#2a1004; border:2px solid #ffe9b0;
    box-shadow:0 8px 30px rgba(232,88,47,.5); opacity:0; pointer-events:none; }
  #replayBtn.show{ opacity:1; pointer-events:auto; transform:translate(-50%,0) scale(1);
    transition:transform .5s cubic-bezier(.22,1.6,.36,1), opacity .4s ease; }
  #replayBtn:hover{ transform:translate(-50%,0) scale(1.08); }
  #replayBtn:active{ transform:translate(-50%,0) scale(.94); transition-duration:.05s; }
  #replayBtn:focus-visible, #sndBtn:focus-visible, .chbtn:focus-visible{ outline:3px solid #ffe9b0; outline-offset:2px; }

  /* ---------- 章節選單（v4 新增：隨時跳看任一幕） ---------- */
  #chapters{ position:absolute; z-index:9; top:max(14px, env(safe-area-inset-top)); left:max(14px, env(safe-area-inset-left)); display:flex; gap:8px; }
  .chbtn{ position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:5px 14px; font-size:17px; line-height:1.15; }
  .chbtn small{ font-size:11px; font-weight:700; letter-spacing:1px; opacity:.85; }
  .chbtn.cur{ background:linear-gradient(180deg,#ffb020,#e8582f); color:#2a1004; border-color:#ffe9b0;
    box-shadow:0 0 16px rgba(255,176,32,.45); }
  @media (max-width:480px){
    #subtitle{ padding:8px 16px; letter-spacing:1px; max-width:94%; }
    .chbtn{ padding:4px 10px; }
  }

  /* ---------- 開場提示：告知自動播放與音效開關 ---------- */
  #hint{ position:absolute; z-index:8; left:50%; top:calc(max(14px, env(safe-area-inset-top)) + 58px); transform:translateX(-50%);
    max-width:80%; padding:10px 20px; font-size:clamp(12px,2vw,15px); font-weight:700; letter-spacing:1px; color:#ffe9b0; text-align:center;
    background:rgba(20,14,10,.82); border:1px solid rgba(255,176,32,.45); border-radius:999px;
    box-shadow:0 4px 16px rgba(0,0,0,.5); opacity:0; pointer-events:none;
    animation:hintFade 6.5s ease .7s 1 forwards; }
  @keyframes hintFade{ 0%{opacity:0; transform:translateX(-50%) translateY(-10px);}
    7%{opacity:1; transform:translateX(-50%) translateY(0);} 82%{opacity:1;} 100%{opacity:0;} }
</style>
</head>
<body>
<div id="stage">
  <canvas id="cv"></canvas>
  <div id="subtitle"></div>
  <button id="sndBtn" class="uibtn"><svg id="sndIco" width="18" height="18" viewBox="0 0 24 24" style="vertical-align:-3px" aria-hidden="true"><path fill="currentColor" d="M4 9v6h4l5 4V5L8 9H4z"/><path id="sndX" fill="none" d="M16.5 9.5l5 5m0-5l-5 5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/><g id="sndWave" style="display:none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"><path d="M16 9a4.4 4.4 0 0 1 0 6"/><path d="M18.6 7a8 8 0 0 1 0 10"/></g></svg> <span id="sndLbl">聲音：關</span></button>
  <button id="replayBtn" class="uibtn">▶ 重新播放</button>
  <div id="chapters">
    <button class="uibtn chbtn" data-act="0">Ⅰ<small>進場</small></button>
    <button class="uibtn chbtn" data-act="1">Ⅱ<small>激戰</small></button>
    <button class="uibtn chbtn" data-act="2">Ⅲ<small>對決</small></button>
  </div>
  <div id="hint">自動播放中 ─ 點右上角「聲音」鈕開啟音效</div>
</div>
<script>
'use strict';
/* =====================================================================
   海牛 VS 尼克星 自由搏擊對決 ── 專業AI升級版
   三幕劇：Ⅰ 開場海報與選手進場 → Ⅱ 擂臺激戰 → Ⅲ 終極對撞與英雄惜英雄
   ===================================================================== */
const W = 960, H = 540, CX = 480, CY = 300, FLOOR = 430;
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const subEl = document.getElementById('subtitle');
const sndBtn = document.getElementById('sndBtn');
const replayBtn = document.getElementById('replayBtn');

/* ---------- 自適應縮放（devicePixelRatio） ---------- */
function resize(){
  const s = Math.min(innerWidth / W, innerHeight / H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  cv.width  = Math.round(W * s * dpr);
  cv.height = Math.round(H * s * dpr);
  cv.style.width  = W * s + 'px';
  cv.style.height = H * s + 'px';
  cv._base = s * dpr;
  // 將畫佈下緣位置寫入 CSS 變數：字幕、重播鈕永遠貼齊畫面而非視窗
  const cvBottom = Math.max(0, (innerHeight - H * s) / 2);
  document.documentElement.style.setProperty('--cvB', cvBottom + 'px');
  replayBtn.style.top = Math.round(innerHeight / 2 + H * s * 0.14) + 'px';
}
addEventListener('resize', resize);
resize();

/* ---------- 緩動函式庫（禁止線性補間） ---------- */
const E = {
  inQuad:t=>t*t, outQuad:t=>1-(1-t)*(1-t), inCubic:t=>t*t*t, outCubic:t=>1-Math.pow(1-t,3),
  inOutCubic:t=> t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2, outQuart:t=>1-Math.pow(1-t,4),
  outBack:t=> 1 + 2.7*Math.pow(t-1,3) + 1.7*Math.pow(t-1,2),
  outElastic:t=> t===0?0 : t===1?1 : Math.pow(2,-10*t)*Math.sin((t*10-0.75)*(Math.PI*2/3))+1,
  inExpo:t=> t===0?0:Math.pow(2,10*t-10), outExpo:t=> t===1?1:1-Math.pow(2,-10*t)
};
const clamp = (v,a,b)=> v<a?a : v>b?b : v;
const lerp = (a,b,t)=> a+(b-a)*t;
const ss = (t,a,b)=> clamp((t-a)/(b-a),0,1);   // 區段進度 0→1
const rnd = (a,b)=> a+Math.random()*(b-a);
const TAU = Math.PI*2;

/* ---------- 全域時間軸 ---------- */
const TOTAL = 34;
let T = 0;        // 劇情時間（可慢動作、可凍結）
let WT = 0;       // 牆鐘時間（環境動畫永遠流動）
let freeze = 0;   // 命中停頓
let shake = 0;    // 鏡頭震動
let flash = 0;    // 白閃
let excite = 0.15;// 觀眾情緒 0~1
let ropeFlexR = 0, ropeFlexL = 0; // 圍繩受撞彈性
let ended = false;

function timeScaleAt(t){
  if(t>20.55 && t<20.8) return 0.45;   // 絕招前慢動作
  if(t>25.35 && t<26.0) return 0.36;   // 終極對撞前的慢動作
  if(t>=26.0 && t<26.6) return 0.6;    // 對撞後餘韻
  return 1;
}

/* =====================================================================
   Web Audio 合成音效（預設靜音，按「聲音」鈕後才建立 AudioContext）
   ===================================================================== */
let AC = null, master = null, crowdGain = null, audioOn = false;
function initAudio(){
  AC = new (window.AudioContext || window.webkitAudioContext)();
  master = AC.createGain(); master.gain.value = 0;
  // 總線壓縮器：多音效同時觸發（鐘聲＋歡呼＋重擊）也不削波
  const comp = AC.createDynamicsCompressor();
  comp.threshold.value = -14; comp.knee.value = 22; comp.ratio.value = 9;
  comp.attack.value = 0.003; comp.release.value = 0.24;
  master.connect(comp); comp.connect(AC.destination);
  // 觀眾環境聲：迴圈噪音 + 帶通濾波
  const len = AC.sampleRate * 2, buf = AC.createBuffer(1, len, AC.sampleRate), d = buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i] = (Math.random()*2-1) * (0.6 + 0.4*Math.sin(i/4000));
  const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
  const bp = AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value = 750; bp.Q.value = 0.5;
  crowdGain = AC.createGain(); crowdGain.gain.value = 0.03;
  src.connect(bp); bp.connect(crowdGain); crowdGain.connect(master); src.start();
}
function noiseBurst(dur, freq, type, vol){
  if(!audioOn || !AC) return;
  const len = Math.max(1, AC.sampleRate * dur) | 0, buf = AC.createBuffer(1, len, AC.sampleRate), d = buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i] = Math.random()*2-1;
  const src = AC.createBufferSource(); src.buffer = buf;
  const f = AC.createBiquadFilter(); f.type = type; f.frequency.value = freq;
  const g = AC.createGain();
  g.gain.setValueAtTime(vol, AC.currentTime); g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  src.connect(f); f.connect(g); g.connect(master); src.start();
}
function tone(freq, dur, type, vol, slide, delay){
  if(!audioOn || !AC) return;
  const t0 = AC.currentTime + (delay||0);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq+slide), t0+dur);
  g.gain.setValueAtTime(0.0001, t0); g.gain.exponentialRampToValueAtTime(vol, t0+0.012); g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  o.connect(g); g.connect(master); o.start(t0); o.stop(t0+dur+0.05);
}
const sfx = {
  bell(n){ for(let i=0;i<(n||1);i++){ tone(1568,1.0,'triangle',0.17,0,i*0.4); tone(1046,1.1,'sine',0.13,0,i*0.4); } },
  thud(p){ const big = p>=40; tone(big?150:170, big?0.3:0.16, 'sine', big?0.4:0.28, big?-110:-120); noiseBurst(big?0.22:0.1, 300, 'lowpass', big?0.35:0.2); },
  whoosh(){ noiseBurst(0.22, 1500, 'bandpass', 0.16); },
  cheer(){ noiseBurst(1.3, 900, 'bandpass', 0.3); },
  ding(){ tone(880,0.35,'sine',0.2); tone(1318,0.5,'sine',0.15,0,0.1); },
  charge(){ tone(90,1.6,'sawtooth',0.1,140); }
};

/* =====================================================================
   粒子・衝擊波・漫畫字
   ===================================================================== */
let parts = [], waves = [], comics = [];
let ilines = null;   // 漫畫集中線（大招/對撞的衝擊框）
const MAX_PARTS = 380;   // 粒子硬上限：保 60fps
function spawnSparks(x,y,n,base){
  for(let i=0;i<n;i++){
    if(parts.length >= MAX_PARTS) return;
    const a = rnd(0,TAU), s = rnd(90,340);
    parts.push({kind:'spark', x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-60, life:rnd(.3,.62), max:.62, size:rnd(2,4.6),
      col: Math.random()<.5 ? '#ffe27a' : (base||'#ff8c42')});
  }
}
function spawnDust(x,y,n){
  for(let i=0;i<n;i++){
    if(parts.length >= MAX_PARTS) return;
    const a = rnd(-Math.PI, 0);
    parts.push({kind:'dust', x:x+rnd(-16,16), y, vx:Math.cos(a)*rnd(20,90), vy:rnd(-70,-20), life:rnd(.4,.8), max:.8, size:rnd(4,9), col:'rgba(200,190,180,'});
  }
}
function spawnAura(x,y,col){
  if(parts.length >= MAX_PARTS) return;
  parts.push({kind:'aura', x:x+rnd(-34,34), y:y+rnd(-8,8), vx:rnd(-12,12), vy:rnd(-140,-70), life:rnd(.4,.75), max:.75, size:rnd(3,7), col});
}
function spawnConfetti(){
  for(let i=0;i<130;i++){
    if(parts.length >= MAX_PARTS) return;
    parts.push({kind:'conf', x:rnd(80,880), y:rnd(-160,-10), vx:rnd(-25,25), vy:rnd(50,130), spin:rnd(2,7)*(Math.random()<.5?-1:1),
      rot:rnd(0,TAU), life:rnd(3.5,6), max:6, size:rnd(5,9), sway:rnd(0,TAU), col:['#ffb020','#ff3b30','#3fa9ff','#41d97a','#ff2975','#fff5d6'][i%6]});
  }
}
function updateParts(dt){
  let n = 0;                            // 就地壓縮：零每幀陣列配置
  for(let i=0;i<parts.length;i++){
    const p = parts[i];
    p.life -= dt;
    if(p.kind==='conf'){
      p.sway += dt*3; p.x += (p.vx + Math.sin(p.sway)*36) * dt; p.y += p.vy * dt; p.rot += p.spin * dt;
      if(p.y > FLOOR+60) p.life = Math.min(p.life, 0.25);
    }else{
      p.x += p.vx*dt; p.y += p.vy*dt;
      if(p.kind==='spark') p.vy += 620*dt;
      if(p.kind==='dust'){ p.vx *= (1-2.2*dt); p.vy += 30*dt; }
    }
    if(p.life > 0) parts[n++] = p;
  }
  parts.length = n;
  n = 0;
  for(let i=0;i<waves.length;i++){ const w = waves[i]; w.r += w.vr*dt; w.life -= dt; if(w.life > 0) waves[n++] = w; }
  waves.length = n;
  n = 0;
  for(let i=0;i<comics.length;i++){ const c = comics[i]; c.t += dt; if(c.t < c.dur) comics[n++] = c; }
  comics.length = n;
}
function drawParts(){
  for(const p of parts){
    const a = clamp(p.life / p.max, 0, 1);
    if(p.kind==='spark'){
      ctx.globalAlpha = a; ctx.fillStyle = p.col;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size*a+0.6, 0, TAU); ctx.fill();
    }else if(p.kind==='dust'){
      ctx.fillStyle = p.col + (a*0.5) + ')';
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size*(1.6-a), 0, TAU); ctx.fill();
    }else if(p.kind==='aura'){
      ctx.globalAlpha = a*0.85; ctx.fillStyle = p.col;
      ctx.beginPath(); ctx.ellipse(p.x, p.y, p.size*0.7, p.size*1.5, 0, 0, TAU); ctx.fill();
    }else if(p.kind==='conf'){
      ctx.globalAlpha = clamp(a*3,0,1);
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.col; ctx.fillRect(-p.size/2, -p.size/3, p.size, p.size*0.66);
      ctx.restore();
    }
  }
  ctx.globalAlpha = 1;
  for(const w of waves){
    const a = clamp(w.life/w.max, 0, 1);
    ctx.strokeStyle = 'rgba(255,220,140,'+ (a*0.8) +')'; ctx.lineWidth = 5*a+1;
    ctx.beginPath(); ctx.arc(w.x, w.y, w.r, 0, TAU); ctx.stroke();
  }
}
function drawImpactLines(){
  if(!ilines) return;
  const a = clamp(ilines.life / ilines.max, 0, 1);
  const sx = (ilines.x - cam.x - cam.sx) * cam.z + W/2;
  const sy = (ilines.y - cam.y - cam.sy) * cam.z + H/2;
  ctx.save();
  ctx.globalAlpha = a * 0.7;
  ctx.strokeStyle = '#fff6dc'; ctx.lineCap = 'round';
  const n = 26;
  for(let i=0;i<n;i++){
    const ang = i/n*TAU + Math.sin(i*13.7)*0.05;
    const r0 = 110 + 46*Math.abs(Math.sin(i*7.3)) + (1-a)*90;
    ctx.lineWidth = 1.5 + (i%3)*1.4;
    ctx.beginPath();
    ctx.moveTo(sx + Math.cos(ang)*r0, sy + Math.sin(ang)*r0);
    ctx.lineTo(sx + Math.cos(ang)*820, sy + Math.sin(ang)*820);
    ctx.stroke();
  }
  ctx.restore();
}
function comic(x,y,text,col){
  comics.push({x, y, text, col:col||'#ffe27a', t:0, dur:0.75, ang:rnd(-0.18,0.18)});
}
function drawComics(){
  for(const c of comics){
    const k = c.t / c.dur;
    const sc = E.outBack(clamp(k*2.6,0,1)) * (1 - E.inCubic(ss(k,0.7,1))*0.4);
    ctx.save();
    ctx.translate(c.x, c.y - k*28); ctx.rotate(c.ang); ctx.scale(sc, sc);
    ctx.globalAlpha = 1 - E.inCubic(ss(k,0.6,1));
    ctx.beginPath();   // 漫畫爆炸底框
    for(let i=0;i<16;i++){
      const ang = i/16*TAU, r = (i%2===0)? 46:30;
      i===0 ? ctx.moveTo(Math.cos(ang)*r*1.25, Math.sin(ang)*r*0.8) : ctx.lineTo(Math.cos(ang)*r*1.25, Math.sin(ang)*r*0.8);
    }
    ctx.closePath();
    ctx.fillStyle = c.col; ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = '#3a1204'; ctx.stroke();
    ctx.fillStyle = '#3a1204';
    ctx.font = '900 30px "Noto Sans TC","Microsoft JhengHei",sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(c.text, 0, 2);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

/* =====================================================================
   觀眾席（兩層視差人群）
   ===================================================================== */
function makeCrowd(y0, n, s0, tones){
  const arr = [];
  for(let i=0;i<n;i++){
    arr.push({ x: 20 + (i+rnd(-0.3,0.3)) * (920/n), y: y0 + rnd(-10,10), s: s0 * rnd(0.85,1.2),
      col: tones[i % tones.length], ph: rnd(0,TAU), spd: rnd(1.6,3),
      jumpy: Math.random(), stick: Math.random()<0.3 ? (Math.random()<.5?'#3fa9ff':'#ff2975') : null });
  }
  return arr;
}
const crowdFar  = makeCrowd(208, 44, 8,  ['#241a33','#1d2338','#2a1d2e','#20263d']);
const crowdMid  = makeCrowd(238, 36, 11, ['#31264a','#28304f','#3a2740','#2d3555']);
const crowdNear = makeCrowd(272, 28, 15, ['#413361','#354068','#4c3355','#3b4674']);
function drawCrowdRow(row, alpha){
  for(const m of row){
    const jump = (m.jumpy < excite) ? Math.abs(Math.sin(WT*5+m.ph)) * 10 * excite : 0;
    const y = m.y + Math.sin(WT*m.spd + m.ph) * 2.2 - jump;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = m.col;                            // 身體（肩）
    ctx.beginPath(); ctx.moveTo(m.x - m.s, y + m.s*2.4);
    ctx.quadraticCurveTo(m.x, y + m.s*0.4, m.x + m.s, y + m.s*2.4);
    ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.arc(m.x, y, m.s*0.72, 0, TAU); ctx.fill();   // 頭
    if(m.stick){                                      // 螢光棒
      const wav = Math.sin(WT*4 + m.ph) * 0.5 * (0.4+excite);
      ctx.strokeStyle = m.stick; ctx.lineWidth = m.s*0.22; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(m.x + m.s*0.8, y + m.s*0.8);
      ctx.lineTo(m.x + m.s*0.8 + Math.sin(wav)*m.s*1.4, y - m.s*1.2*Math.cos(wav));
      ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;
}

const camKF = [

  {t:14.6,x:468,y:352,z:1.27}, {t:17.6,x:490,y:340,z:1.1}, {t:18.6,x:368,y:352,z:1.38},

  {t:33.0,x:480,y:306,z:1.06}, {t:34.0,x:480,y:300,z:1.03}
];
const cam = {x:480, y:308, z:1.5, sx:0, sy:0};
function camAt(t){
  let i = 0;
  while(i < camKF.length-1 && camKF[i+1].t <= t) i++;
  const a = camKF[i], b = camKF[Math.min(i+1, camKF.length-1)];
  if(a===b || b.cut) return {x:a.x, y:a.y, z:a.z};
  const k = E.inOutCubic(ss(t, a.t, b.t));
  return {x:lerp(a.x,b.x,k), y:lerp(a.y,b.y,k), z:lerp(a.z,b.z,k)};
}
function layer(p, fn){
  ctx.save();
  const lz = 1 + (cam.z-1)*(0.55 + 0.45*p);
  const lx = CX + (cam.x-CX)*p + cam.sx*p;
  const ly = CY + (cam.y-CY)*p + cam.sy*p;
  ctx.translate(W/2, H/2);
  ctx.scale(lz, lz);
  ctx.translate(-lx, -ly);
  fn();
  ctx.restore();
}

/* =====================================================================
   編舞：依 T 計算兩位選手的姿態
   ===================================================================== */
function applyPunchBeats(f){
  for(const b of beats){
    if(b.a !== f.id) continue;
    if(T < b.t - 0.6 || T > b.t + 0.8) continue;
    const wu = ss(T, b.t-0.55, b.t-0.16);
    const st = ss(T, b.t-0.16, b.t);
    const rc = ss(T, b.t, b.t+0.7);
    let dx, ext, lean;
    if(T < b.t){
      const back = -32 * E.outCubic(wu);
      const k = E.inCubic(st);
      dx = lerp(back, b.reach, k);
      ext = k;
      lean = lerp(-0.13*E.outCubic(wu), 0.24, k);
      if(st===0) f.sy *= (1 - 0.05*E.outCubic(wu));
    }else{
      const r = E.outBack(rc);
      dx = b.reach * (1-r);
      ext = 1 - E.outCubic(rc);
      lean = 0.24 * (1-r);
    }
    f.dx += dx * f.dir;
    f.ext = Math.max(f.ext, ext);
    f.lean += lean;
    if(T > b.t-0.55 && T < b.t+0.4) f.expr = 'fierce';
  }
}
function choreo(){
  for(const f of [cow, star]){
    f.dx = 0; f.dy = 0; f.rot = 0; f.lean = 0;
    f.ext = 0; f.extUp = 0; f.duck = 0; f.down = 0;
    f.aura = 0; f.dizzy = 0;
    if(f.expr!=='hurt' || f.hurt<0.4) f.expr = 'calm';
    // 待機呼吸與彈跳
    f.dy += Math.sin(WT*2.8 + f.bobPh) * 2;
  }
  /* ---- 第一幕：進場 ---- */
  if(T < 8.8){
    // 海牛耍帥：舉臂 + 小跳
    if(T > 4.6 && T < 6.4){
      const k = ss(T, 4.6, 5.0);
      cow.extUp = E.outBack(k) * Math.abs(Math.sin((T-4.6)*3.4))*0.4 + E.outBack(k)*0.6;
      cow.dy -= Math.abs(Math.sin((T-4.6)*4.4)) * 12 * E.outCubic(k);
      cow.expr = 'fierce';
    }
    // 尼克星旋轉入鏡
    if(T > 6.7 && T < 8.5){
      const k = ss(T, 6.7, 7.6);
      star.rot = TAU * E.outCubic(k) * star.dir;
      star.dy -= Math.sin(Math.PI * ss(T,6.7,7.4)) * 40;
      if(T > 7.6){ star.extUp = E.outBack(ss(T,7.6,8.0)); star.expr = 'fierce'; }
      if(T < 7.5 && Math.random() < 0.3) spawnSparks(star.x+rnd(-30,30), FLOOR-90+rnd(-40,40), 1, '#ffe27a');
    }
  }
  /* ---- 第二幕：戰鬥 ---- */
  if(T >= 8.8 && T < 23.2){
    // 戰鬥站姿：面對面小彈跳
    for(const f of [cow, star]){
      f.dy += Math.abs(Math.sin(WT*4.6 + f.bobPh)) * -3;
    }
    applyPunchBeats(cow);
    applyPunchBeats(star);
    // 尼克星閃避海牛的第 15.1 秒重拳（下蹲壓扁 + 向後側跳，閃避要「看得見」）
    const dk = E.outCubic(ss(T,14.78,15.02)) * (1 - E.inOutCubic(ss(T,15.25,15.6)));
    star.duck = Math.max(star.duck, dk);
    star.dx += 40 * dk;                     // 側跳遠離重拳
    if(dk > 0.5) star.expr = 'fierce';
    // 星星連擊後海牛暈眩搖晃
    if(T > 16.3 && T < 18.3){
      const k = 1 - ss(T,17.6,18.3);
      cow.rot += Math.sin(WT*9) * 0.06 * k;
      cow.dizzy = k > 0.3 ? 1 : 0;
      if(k>0.3) cow.expr = 'hurt';
    }
    // 海牛蓄力「深海衝擊」
    if(T > 18.4 && T < 20.8){
      const k = ss(T, 18.4, 19.2);
      cow.aura = E.outCubic(k);
      cow.sy *= 1 - 0.06*Math.sin(WT*14)*cow.aura;
      cow.lean += -0.1 * cow.aura * (1 - ss(T,20.5,20.8));
      cow.expr = 'fierce';
      if(Math.random() < cow.aura*0.75) spawnAura(cow.x+cow.dx, FLOOR-30, '#5ec8ff');
      // 尼克星挑釁小彈跳
      if(T < 20.3) star.dy -= Math.abs(Math.sin(WT*6))*8;
    }
    // 尼克星被絕招轟飛到圍繩再彈回
    if(T >= 20.8 && T < 23.2){
      const fly = ss(T, 20.8, 21.18);
      const back = ss(T, 21.18, 22.5);
      star.dx += (150*E.outCubic(fly) - 150*E.outElastic(back)*(back>0?1:0)) * 1;
      star.rot += -0.5 * E.outCubic(fly) * (1 - E.outCubic(back)) * star.dir;
      if(fly>0 && fly<1) star.dy -= Math.sin(Math.PI*fly)*34;
      if(T > 21.2 && T < 22.5) star.expr = 'hurt';
    }
    // 22.6~23.2 兩人喘息
    if(T > 22.5){ cow.expr = 'tired'; star.expr = 'tired';
      cow.sy *= 1 + Math.sin(WT*7)*0.025; star.sy *= 1 + Math.sin(WT*7+1)*0.025; }
  }
  /* ---- 第三幕：終極對撞 → 英雄惜英雄 ---- */
  if(T >= 23.2){
    // 蓄勢（後傾、光環）
    if(T > 23.6 && T < 25.05){
      const k = E.outCubic(ss(T,23.6,24.4));
      for(const f of [cow,star]){
        f.dx += -26 * k * f.dir;
        f.lean += -0.18 * k;
        f.sy *= 1 - 0.05*k;
        f.aura = k; f.expr = 'fierce';
      }
      if(Math.random()<0.5) spawnAura(cow.x-26, FLOOR-30, '#5ec8ff');
      if(Math.random()<0.5) spawnAura(star.x+26, FLOOR-30, '#ffd447');
    }
    // 衝刺對撞（慢動作由 timeScaleAt 處理）
    if(T >= 25.05 && T < 26.0){
      const k = E.inCubic(ss(T,25.05,26.0));
      cow.dx  = -26*(1-k) + 110*k;
      star.dx =  26*(1-k) - 110*k;
      cow.ext = E.inCubic(ss(T,25.5,26.0));
      star.ext = cow.ext;
      cow.lean += 0.3*k; star.lean += 0.3*k;
      cow.expr = 'fierce'; star.expr = 'fierce';
      cow.aura = 1-k*0.5; star.aura = 1-k*0.5;
    }
    // 對撞後飛出 → 倒地（倒地點收在畫面內，觀眾看得到兩人躺平）
    if(T >= 26.0 && T < 26.62){
      const fb = E.outCubic(ss(T,26.0,26.62));
      cow.dx  += 110 - 174*fb;
      star.dx += -110 + 174*fb;
      cow.dy  -= Math.sin(Math.PI*clamp(fb,0,1))*66;
      star.dy -= Math.sin(Math.PI*clamp(fb,0,1))*66;
      cow.rot = -1.35*fb; star.rot = 1.35*fb;
      cow.ext = 1-fb; star.ext = 1-fb;
    }
    // 倒地
    if(T >= 26.62 && T < 28.7){
      cow.down = 1; star.down = 1;
      cow.dx -= 64; star.dx += 64;
      cow.dizzy = 1; star.dizzy = 1;
      cow.expr = 'hurt'; star.expr = 'hurt';
    }
    // 起身（outBack 過衝）
    if(T >= 28.7 && T < 30.1){
      const k = E.outBack(ss(T,28.7,29.9));
      cow.down = 1-k; star.down = 1-k;
      cow.dx -= 64*(1-k*0.35); star.dx += 64*(1-k*0.35);
      cow.expr = 'tired'; star.expr = 'tired';
    }
    // 走向中央碰拳
    if(T >= 30.1){
      const wk = E.inOutCubic(ss(T,30.1,31.15));
      cow.dx += lerp(-42, 44, wk); star.dx += lerp(42, -44, wk);
      const reach = E.outCubic(ss(T,30.85,31.2));
      cow.ext = Math.max(cow.ext, reach*0.72);
      star.ext = Math.max(star.ext, reach*0.72);
      // 走路小顛
      if(wk<1){ cow.dy -= Math.abs(Math.sin(WT*9))*4*(1-wk*0.5); star.dy -= Math.abs(Math.sin(WT*9+1))*4*(1-wk*0.5); }
      cow.expr = T>31.1 ? 'happy':'tired';
      star.expr = T>31.1 ? 'happy':'tired';
      // 舉起另一隻手致意
      const up = E.outBack(ss(T,31.7,32.3));
      cow.extUp = up; star.extUp = up;
    }
  }
  // 擊退回彈（阻尼衰減）
  for(const f of [cow, star]){
    f.dx += f.kb;
    if(f.hurt > 0){
      f.rot += Math.sin(WT*26) * 0.05 * f.hurt;
    }
  }
}

/* =====================================================================
   繪圖：拳套、選手、擂臺、場景
   ===================================================================== */
function rr(x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
/* 漸層快取：座標恆定的漸層只建一次，消除每幀配置 */
const GC = {};
function grd(key, make){ let g = GC[key]; if(!g){ g = make(); GC[key] = g; } return g; }
function drawGlove(x, y, ang, col, colDark, s){
  ctx.save();
  ctx.translate(x, y); ctx.rotate(ang); ctx.scale(s, s);
  ctx.fillStyle = '#f2ede4'; rr(-9, 6, 18, 11, 4); ctx.fill();          // 手腕束帶
  ctx.lineWidth = 2; ctx.strokeStyle = colDark; ctx.stroke();
  const g = grd('glove'+col, ()=>{ const t = ctx.createRadialGradient(-5,-7,3, 0,0,20);   // 拳套主體
    t.addColorStop(0, '#ffffff'); t.addColorStop(0.25, col); t.addColorStop(1, colDark); return t; });
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.ellipse(0, -3, 15, 13.5, 0, 0, TAU); ctx.fill();
  ctx.lineWidth = 2.4; ctx.strokeStyle = colDark; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(-11, 1, 6, 5, 0.6, 0, TAU);              // 大拇指
  ctx.fillStyle = g; ctx.fill(); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,.75)'; ctx.lineWidth = 2.4; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(-2, -6, 8, Math.PI*1.05, Math.PI*1.6); ctx.stroke(); // 高光
  ctx.restore();
}
function drawArm(sx, sy, gx, gy, w, col, dark){
  for(const [c, lw] of [[dark, w+3],[col, w]]){
    ctx.strokeStyle = c; ctx.lineWidth = lw; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(sx, sy);
    ctx.quadraticCurveTo((sx+gx)/2, (sy+gy)/2 + 8, gx, gy); ctx.stroke();
  }
}
function drawDizzyStars(x, y){
  for(let i=0;i<3;i++){
    const a = WT*4 + i*TAU/3;
    ctx.save(); ctx.translate(x + Math.cos(a)*26, y + Math.sin(a)*8 - 4); ctx.rotate(a);
    ctx.fillStyle = '#ffe27a'; ctx.beginPath();
    for(let j=0;j<10;j++){
      const ang = -Math.PI/2 + j*Math.PI/5, r = j%2===0?6:2.6;
      j===0?ctx.moveTo(Math.cos(ang)*r,Math.sin(ang)*r):ctx.lineTo(Math.cos(ang)*r,Math.sin(ang)*r);
    }
    ctx.closePath(); ctx.fill(); ctx.restore();
  }
}
/* ---------- 海牛（藍方）：多部件、漸層、表情 ---------- */
function drawCow(f){
  const px = f.x + f.dx, py = FLOOR + f.dy;

/* ---------- 尼克星（紅方）：金色星星、緞帶、表情 ---------- */
function starShape(R, r, rot){
  ctx.beginPath();
  for(let i=0;i<10;i++){
    const ang = -Math.PI/2 + i*Math.PI/5 + (rot||0);
    const rad = i%2===0 ? R : r;
    const px = Math.cos(ang)*rad, py = Math.sin(ang)*rad;
    i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
  }
  ctx.closePath();
}
function drawStar(f){

  ctx.scale(f.sx*f.dir, f.sy);

  ctx.stroke();
  // 嘴
  ctx.lineWidth=3;
  ctx.beginPath();
  if(f.expr==='fierce'){
    ctx.arc(0, 8, 11, 0.25, Math.PI-0.25);
    ctx.stroke();
    ctx.fillStyle='#fff'; rr(-6, 10, 12, 4.6, 2); ctx.fill();  // 牙
    ctx.lineWidth=1.6; ctx.strokeStyle=dark; ctx.stroke();
  }
  else if(f.expr==='hurt'){ ctx.beginPath(); ctx.ellipse(0,12,6,7.5,0,0,TAU); ctx.fillStyle='#5c1408'; ctx.fill(); }
  else if(f.expr==='happy'){ ctx.beginPath(); ctx.arc(0, 6, 12, 0.2, Math.PI-0.2); ctx.stroke(); }
  else if(f.expr==='tired'){ ctx.beginPath(); ctx.arc(0, 16, 7, Math.PI*1.15, Math.PI*1.85); ctx.stroke(); }

}

    const x = 30 + i*118 + Math.sin(i*3.7)*22;
    const y = 560 + Math.sin(WT*1.4+i)*4 - (excite* (i%3===0? 14:6) * Math.abs(Math.sin(WT*4.5+i)));
    ctx.beginPath(); ctx.arc(x, y, 46, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x, y+70, 68, 50, 0, 0, TAU); ctx.fill();
  }
}

/* ---------- 片頭海報卡 / 片尾卡 ---------- */
function drawStripes(y, h, alpha){
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.beginPath(); ctx.rect(0, y, W, h); ctx.clip();
  for(let x=-40; x<W+80; x+=44){
    ctx.fillStyle = (x/44|0)%2===0 ? '#ffb020' : '#141414';
    ctx.save(); ctx.translate(x, y+h/2); ctx.rotate(0.62); ctx.fillRect(-14, -h, 28, h*2); ctx.restore();
  }
  ctx.restore();
}
function drawTitleCard(){
  if(T > 4.6) return;
  const inK = E.outCubic(ss(T, 0.9, 1.7));
  const outK = E.inCubic(ss(T, 3.9, 4.5));
  const a = inK * (1-outK);
  if(a <= 0) return;
  ctx.save();
  ctx.globalAlpha = a * 0.82;
  ctx.fillStyle = '#0a0406'; ctx.fillRect(0,0,W,H);
  ctx.globalAlpha = a;
  // 聚光環（呼應原海報）
  ctx.strokeStyle = 'rgba(255,120,40,.3)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(W/2, H*0.44, 300 + 30*Math.sin(WT*1.5), 0, TAU); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,120,40,.16)';
  ctx.beginPath(); ctx.arc(W/2, H*0.44, 210, 0, TAU); ctx.stroke();
  drawStripes(0, 34, a); drawStripes(H-34, 34, a);
  // 標題
  const ty = lerp(H*0.36+26, H*0.36, E.outBack(ss(T,1.0,1.9)));
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font = '900 66px "Noto Sans TC","Microsoft JhengHei",sans-serif';
  const tg = ctx.createLinearGradient(0, ty-36, 0, ty+36);
  tg.addColorStop(0,'#ffe9b0'); tg.addColorStop(0.5,'#ffb020'); tg.addColorStop(1,'#ff3b30');
  ctx.save();
  ctx.shadowBlur = 26; ctx.shadowColor = 'rgba(255,90,30,.8)';
  ctx.fillStyle = tg;
  ctx.fillText('海牛 VS 尼克星', W/2, ty);
  ctx.restore();
  ctx.lineWidth = 1.6; ctx.strokeStyle='rgba(60,16,4,.9)';
  ctx.strokeText('海牛 VS 尼克星', W/2, ty);
  // 副標
  const sy2 = ss(T, 1.5, 2.2);
  ctx.globalAlpha = a * E.outCubic(sy2);
  ctx.font = '900 30px "Noto Sans TC",sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText('自 由 搏 擊 對 決', W/2, ty + 62 + (1-E.outCubic(sy2))*14);
  ctx.font = '700 15px "Noto Sans TC",sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,.55)';
  ctx.fillText('FREE FIGHT SHOWDOWN ── 傳說實況主系列', W/2, ty + 100);
  // VS 圖章
  const vsK = E.outBack(ss(T, 2.0, 2.6));
  if(vsK > 0){
    ctx.save();
    ctx.globalAlpha = a;
    ctx.translate(W/2, H*0.72); ctx.rotate(-0.1); ctx.scale(vsK, vsK);
    ctx.font = '900 64px "Arial Black",sans-serif';
    ctx.lineWidth = 8; ctx.strokeStyle = '#ffb020'; ctx.strokeText('VS', 0, 0);
    ctx.fillStyle = '#fff'; ctx.fillText('VS', 0, 0);
    ctx.restore();
  }
  ctx.restore();
}
function drawEndCard(){
  const a = E.outCubic(ss(T, 32.6, 33.4));
  if(a <= 0) return;
  ctx.save();
  ctx.globalAlpha = a * 0.62;
  const g = ctx.createRadialGradient(W/2, H/2, 60, W/2, H/2, 560);
  g.addColorStop(0, 'rgba(8,4,8,.3)'); g.addColorStop(1, 'rgba(4,2,6,.95)');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  ctx.globalAlpha = a;
  drawStripes(0, 26, a*0.9); drawStripes(H-26, 26, a*0.9);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const ty = lerp(H*0.30+18, H*0.30, E.outBack(ss(T,32.7,33.5)));
  ctx.font = '900 52px "Noto Sans TC","Microsoft JhengHei",sans-serif';
  const tg = ctx.createLinearGradient(0,ty-30,0,ty+30);
  tg.addColorStop(0,'#ffe9b0'); tg.addColorStop(1,'#ffb020');
  ctx.save(); ctx.shadowBlur=22; ctx.shadowColor='rgba(255,176,32,.7)';
  ctx.fillStyle = tg; ctx.fillText('巔峰對決 ── 全劇終', W/2, ty);
  ctx.restore();
  ctx.font = '700 20px "Noto Sans TC",sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,.7)';
  ctx.fillText('海牛 與 尼克星 ── 平手收場，友誼長存', W/2, ty+52);
  // v4 新功能悄悄告示
  const na = E.outCubic(ss(T, 33.4, 34.0));
  ctx.globalAlpha = a * na * (0.75 + 0.25*Math.sin(WT*2.2));
  ctx.font = '700 16px "Noto Sans TC",sans-serif';
  ctx.fillStyle = 'rgba(143,208,255,.9)';
  ctx.fillText('新功能：左上角 Ⅰ・Ⅱ・Ⅲ 章節鈕，可跳看任一幕', W/2, ty+96);
  ctx.restore();
}

/* =====================================================================
   主渲染
   ===================================================================== */
function render(){
  ctx.setTransform(cv._base, 0, 0, cv._base, 0, 0);
  ctx.fillStyle = '#030204';
  ctx.fillRect(0, 0, W, H);
  layer(0.16, drawBackdrop);
  layer(0.34, ()=> drawCrowdRow(crowdFar, 0.8));
  layer(0.46, ()=> drawCrowdRow(crowdMid, 0.9));
  layer(0.6,  ()=>{ drawCrowdRow(crowdNear, 1); });
  layer(0.72, drawSpotlights);
  layer(1, ()=>{
    drawRing();
    drawCow(cow);
    drawStar(star);
    drawParts();
    drawComics();
  });
  layer(1.25, drawForeground);
  drawImpactLines();          // 漫畫集中線（螢幕空間）
  // 螢幕空間效果：白閃 → 氛圍色 → 暗角 → 電影黑邊
  if(flash > 0){
    ctx.globalAlpha = Math.min(1, flash);
    ctx.fillStyle = '#fff'; ctx.fillRect(0,0,W,H);
    ctx.globalAlpha = 1;
  }
  ctx.fillStyle = 'rgba(40,10,50,.08)'; ctx.fillRect(0,0,W,H);
  const vg = grd('vig', ()=>{ const t = ctx.createRadialGradient(W/2, H/2, H*0.42, W/2, H/2, H*0.95);
    t.addColorStop(0, 'rgba(0,0,0,0)'); t.addColorStop(1, 'rgba(0,0,0,.55)'); return t; });
  ctx.fillStyle = vg; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, 24); ctx.fillRect(0, H-24, W, 24);
  drawTitleCard();
  drawEndCard();
}

/* =====================================================================
   主迴圈
   ===================================================================== */
let last = performance.now();
function frame(now){
  requestAnimationFrame(frame);
  let dt = Math.min((now - last)/1000, 0.05);
  last = now;
  WT += dt;
  if(freeze > 0){
    freeze -= dt;
  }else{
    const sc = timeScaleAt(T);
    const step = dt * sc;
    const prevT = T;
    T = Math.min(T + step, TOTAL);
    for(const e of events){
      if(!e.done && T >= e.t){ e.done = true; e.fn(); }
    }
    choreo();
    updateParts(step);
    // 彈簧回彈
    for(const f of [cow, star]){
      f.sx += (1 - f.sx) * Math.min(1, 10*dt);
      f.sy += (1 - f.sy) * Math.min(1, 10*dt);
      f.kb *= Math.pow(0.004, dt);
      f.hurt = Math.max(0, f.hurt - dt*2.2);
    }
    ropeFlexR *= Math.pow(0.008, dt);
    ropeFlexL *= Math.pow(0.008, dt);
    excite = Math.max(0.15, excite - dt*0.05);
  }
  // 鏡頭（幀率無關的平滑追隨）
  const c = camAt(T), k = 1 - Math.pow(0.002, dt);
  cam.x += (c.x - cam.x) * k; cam.y += (c.y - cam.y) * k; cam.z += (c.z - cam.z) * k;
  shake *= Math.pow(0.0015, dt);
  cam.sx = (Math.random()*2-1) * shake;
  cam.sy = (Math.random()*2-1) * shake;
  flash = Math.max(0, flash - dt*2.6);
  if(ilines){ ilines.life -= dt; if(ilines.life <= 0) ilines = null; }
  // 音訊環境
  if(AC && crowdGain) crowdGain.gain.value = 0.02 + excite*0.08;
  updateSubtitle();
  updateChapterUI();
  render();
}
buildEvents();
requestAnimationFrame(frame);

/* ---------- 控制 ---------- */
sndBtn.addEventListener('click', ()=>{
  if(!AC) initAudio();
  if(AC.state === 'suspended') AC.resume();
  audioOn = !audioOn;
  // 漸變開關避免爆音
  master.gain.cancelScheduledValues(AC.currentTime);
  master.gain.setTargetAtTime(audioOn ? 0.9 : 0, AC.currentTime, 0.06);
  document.getElementById('sndLbl').textContent = audioOn ? '聲音：開' : '聲音：關';
  document.getElementById('sndX').style.display = audioOn ? 'none' : '';
  document.getElementById('sndWave').style.display = audioOn ? '' : 'none';
  document.getElementById('hint').style.display = 'none';
});
/* ---------- 時間軸跳轉（重播＝跳到 0；章節鈕＝跳到該幕起點） ---------- */
function seekTo(t0){
  T = t0; freeze = 0; shake = 0; flash = 0; ended = false;
  excite = t0 >= 23 ? 0.7 : t0 >= 8 ? 0.5 : 0.15;
  parts = []; waves = []; comics = []; ilines = null; ropeFlexR = ropeFlexL = 0;
  for(const f of [cow, star]){
    f.dx=0; f.dy=0; f.rot=0; f.lean=0; f.ext=0; f.extUp=0; f.duck=0;
    f.sx=1; f.sy=1; f.kb=0; f.hurt=0; f.down=0; f.dizzy=0; f.expr='calm';
  }
  const c0 = camAt(t0);
  cam.x = c0.x; cam.y = c0.y; cam.z = c0.z; cam.sx = cam.sy = 0;
  curSub = null; subEl.classList.remove('show'); replayBtn.classList.remove('show');
  buildEvents();
  for(const e of events) if(e.t < t0 - 1e-6) e.done = true;  // 跳過的事件靜默略過
}
replayBtn.addEventListener('click', ()=> seekTo(0));

/* ---------- 章節選單（v4）：Ⅰ 進場 / Ⅱ 激戰 / Ⅲ 對決 ---------- */
const ACTS = [0, 8.72, 23.2];
const chBtns = Array.from(document.querySelectorAll('.chbtn'));
chBtns.forEach((b, i)=> b.addEventListener('click', ()=>{ seekTo(ACTS[i]); sfx.ding(); }));
let curAct = -1;
function updateChapterUI(){
  let a = 0;
  for(let i=0;i<ACTS.length;i++) if(T >= ACTS[i] - 0.01) a = i;
  if(a !== curAct){
    curAct = a;
    for(let i=0;i<chBtns.length;i++) chBtns[i].classList.toggle('cur', i===a);
  }
}
</script>
