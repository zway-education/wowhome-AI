/* ---------- 緩動 ---------- */
const clamp01 = x => Math.max(0, Math.min(1, x));
const lerp = (a, b, t) => a + (b - a) * t;
const eIO = t => t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2, eO = t => 1 - Math.pow(1 - t, 3);
const eI = t => t * t * t, eOB = t => 1 + 2.70158 * Math.pow(t - 1, 3) + 1.70158 * Math.pow(t - 1, 2);
function seg(t, a, b, ez){ return (ez || eIO)(clamp01((t - a) / (b - a))); }
function rnd(i){ const x = Math.sin(i * 127.1 + 311.7) * 43758.5453; return x - Math.floor(x); }

/* ---------- 攝影機 ---------- */
const cam = { x: 0, y: 0, z: 1, tx: 0, ty: 0, tz: 1 };
let shakeMag = 0, shX = 0, shY = 0;
function camSnap(){ cam.x = cam.tx; cam.y = cam.ty; cam.z = cam.tz; }
function camUpdate(dt){
  const k = 1 - Math.pow(0.02, dt);
  cam.x += (cam.tx - cam.x) * k; cam.y += (cam.ty - cam.y) * k; cam.z += (cam.tz - cam.z) * k;
  shakeMag *= Math.pow(0.001, dt);
  shX = (Math.random() * 2 - 1) * shakeMag; shY = (Math.random() * 2 - 1) * shakeMag;
}
function applyCam(f){
  ctx.save();
  ctx.translate(W / 2 + shX * f, H / 2 + shY * f);
  ctx.scale(cam.z, cam.z);
  ctx.translate(-W / 2 - cam.x * f, -H / 2 - cam.y);
}

/* ---------- 音效（Web Audio 合成，預設靜音） ---------- */
let AC = null, master = null, soundOn = false, nextNote = 0, noteI = 0, nextBeat = 0;
const MELODY = [523.25, 659.25, 783.99, 659.25, 587.33, 783.99, 880.0, 659.25];
function initAudio(){
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  master = AC.createGain(); master.gain.value = 0; master.connect(AC.destination);
}
function setSound(on){
  soundOn = on;
  document.getElementById('soundBtn').textContent = on ? '聲音：開' : '聲音：關';
  if (on){
    initAudio();
    if (AC.state === 'suspended') AC.resume();
    nextNote = AC.currentTime + 0.1; nextBeat = AC.currentTime + 0.1;
    master.gain.setTargetAtTime(0.8, AC.currentTime, 0.2);
  } else if (AC) master.gain.setTargetAtTime(0, AC.currentTime, 0.1);
}
document.getElementById('soundBtn').addEventListener('click', () => setSound(!soundOn));
/* 自動開聲：載入即嘗試開啟；若被瀏覽器政策擋住，第一次互動自動補開 */
try { setSound(true); } catch(e) {}
(function(){ const unlockAudio = () => { if (AC && AC.state === 'suspended') AC.resume(); };
  addEventListener('pointerdown', unlockAudio, {once:true}); addEventListener('keydown', unlockAudio, {once:true}); })();
function tone(freq, dur, type, vol, slide, when){
  if (!AC || !soundOn) return;
  const t0 = when || AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, t0);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), t0 + dur);
  g.gain.setValueAtTime(vol || 0.1, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(g); g.connect(master);
  o.start(t0); o.stop(t0 + dur);
}
function noiseBurst(dur, f0, f1, vol){
  if (!AC || !soundOn) return;
  const len = Math.floor(AC.sampleRate * dur);
  const buf = AC.createBuffer(1, len, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = AC.createBufferSource(); src.buffer = buf;
  const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1;
  bp.frequency.setValueAtTime(f0, AC.currentTime);
  bp.frequency.exponentialRampToValueAtTime(f1, AC.currentTime + dur);
  const g = AC.createGain(); g.gain.value = vol;
  src.connect(bp); bp.connect(g); g.connect(master); src.start();
}
const sfx = {
  meow(){ tone(620, 0.28, 'triangle', 0.09, 320); setTimeout(() => tone(860, 0.22, 'triangle', 0.07, -260), 200); },
  growl(){ tone(95, 0.5, 'sawtooth', 0.06, -30); },
  tick(){ tone(1500 + Math.random() * 600, 0.03, 'triangle', 0.05); },
  nom(){ tone(240 + Math.random() * 60, 0.06, 'triangle', 0.05, -60); },
  pop(){ tone(700, 0.09, 'sine', 0.08, 500); },
  chime(){ tone(1046, 0.5, 'sine', 0.05); tone(1318, 0.6, 'sine', 0.04); },
  boing(){ tone(180, 0.22, 'square', 0.05, 260); },
  purr(){ tone(120, 0.5, 'triangle', 0.05, 20); }
};
let danceMode = false;
function musicTick(){
  if (!AC || !soundOn) return;
  const iv = danceMode ? 0.36 : 0.55;
  while (nextNote < AC.currentTime + 0.12){
    const f = MELODY[noteI % MELODY.length];
    tone(f, 0.5, 'sine', 0.045, 0, nextNote);
    tone(f * 2, 0.3, 'sine', 0.015, 0, nextNote);
    if (danceMode && noteI % 2 === 0) tone(90, 0.14, 'sine', 0.09, -40, nextNote);
    noteI++;
    nextNote += iv;
  }
}

/* ---------- 粒子 ---------- */
const parts = [];
function spawnTxt(x, y, txt, c, size){
  parts.push({ k: 'txt', x, y, vx: (Math.random() * 2 - 1) * 12, vy: -28 - Math.random() * 16,
    life: 1.6, max: 1.6, txt, c: c || '#ff8fa0', size: size || 18, ph: Math.random() * 6.28 });
}
function spawnHeart(x, y, big){
  parts.push({ k: 'heart', x, y, vx: (Math.random() * 2 - 1) * 16, vy: -30 - Math.random() * 24,
    life: 1.8, max: 1.8, s: (big ? 9 : 6) + Math.random() * 3, ph: Math.random() * 6.28 });
}
function spawnSpk(x, y){
  parts.push({ k: 'spk', x, y, vx: 0, vy: -8, life: 1.1, max: 1.1, s: 3 + Math.random() * 4, ph: Math.random() * 6.28 });
}
function spawnDust(x, y, n){
  for (let i = 0; i < n; i++) parts.push({ k: 'dustp', x: x + (Math.random() * 2 - 1) * 10, y,
    vx: (Math.random() * 2 - 1) * 40, vy: -20 - Math.random() * 20, life: 0.5, max: 0.5, s: 3 + Math.random() * 3 });
}
function updateParts(dt){
  for (const p of parts){
    p.life -= dt;
    p.ph = (p.ph || 0) + dt * 4;
    p.x += (p.vx + Math.sin(p.ph) * 10) * dt; p.y += p.vy * dt;
    if (p.k === 'dustp') p.vy += 60 * dt;
  }
  for (let i = parts.length - 1; i >= 0; i--) if (parts[i].life <= 0) parts.splice(i, 1);
}
function heartPath(g, x, y, s){
  g.beginPath();
  g.moveTo(x, y + s * 0.9);
  g.bezierCurveTo(x - s * 1.3, y, x - s * 0.7, y - s, x, y - s * 0.3);
  g.bezierCurveTo(x + s * 0.7, y - s, x + s * 1.3, y, x, y + s * 0.9);
  g.closePath();
}
function drawParts(g){
  for (const p of parts){
    const a = clamp01(p.life / (p.max * 0.6));
    g.globalAlpha = a;
    if (p.k === 'txt'){
      g.fillStyle = p.c; g.font = '700 ' + p.size + 'px "Noto Sans TC",sans-serif';
      g.textAlign = 'center'; g.fillText(p.txt, p.x, p.y);
    } else if (p.k === 'heart'){
      g.fillStyle = '#ff8fa0'; heartPath(g, p.x, p.y, p.s); g.fill();
      g.strokeStyle = '#e46a80'; g.lineWidth = 1.2; g.stroke();

function subAlpha(t, a, b){ return clamp01(Math.min((t - (a - 0.35)) / 0.35, ((b + 0.35) - t) / 0.35)); }
function drawSubs(sc, t){

let vg = null;
function overlays(sc, t){
  if (sunset > 0 && G_sun){
    ctx.globalAlpha = sunset * 0.22;
    ctx.fillStyle = G_sun; ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  if (!vg){
    vg = ctx.createRadialGradient(W / 2, H / 2, H * 0.45, W / 2, H / 2, H * 0.98);
    vg.addColorStop(0, 'rgba(42,28,20,0)'); vg.addColorStop(1, 'rgba(42,28,20,0.4)');
  }
  ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#241811';
  ctx.fillRect(0, 0, W, 26); ctx.fillRect(0, H - 26, W, 26);
  if (sc.act){
    ctx.globalAlpha = clamp01(t / 0.8) * 0.9;
    ctx.fillStyle = '#ffcf9e'; ctx.textAlign = 'left';
    ctx.font = '700 12px "Noto Sans TC",sans-serif';
    ctx.fillText(sc.act, 16, 17);
    ctx.globalAlpha = 1;
  }
  const total = SCENES.reduce((a, s) => a + s.dur, 0);
  let done = 0; for (let i = 0; i < sceneIdx; i++) done += SCENES[i].dur;
  ctx.fillStyle = 'rgba(255,244,224,0.2)'; ctx.fillRect(0, H - 4, W, 4);
  ctx.fillStyle = '#ff9a8b'; ctx.fillRect(0, H - 4, W * clamp01((done + Math.min(t, sc.dur)) / total), 4);
  let fade = clamp01(t / 0.45);
  if (sceneIdx < SCENES.length - 1) fade = Math.min(fade, clamp01((sc.dur - t) / 0.45));
  if (fade < 1){
    ctx.globalAlpha = 1 - fade;
    ctx.fillStyle = '#241811'; ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }
  drawPetFx(ctx);
}

        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;
          b.querySelector("i").textContent=Math.max(0,(n||0)-(c||0));
        }); });
      });
    }
    defs.forEach(function(d){
      var b=document.createElement("button");
      b.type="button"; b.title=d[2];
      b.style.cssText="min-height:42px;padding:8px 14px;border:none;border-radius:999px;background:rgba(15,18,32,.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation";
      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";
      b.addEventListener("click",function(){
        var prev=null; try{ prev=localStorage.getItem(LS); }catch(e){}
        if(prev===d[0]){ ping(K+d[0]+"-c"); try{ localStorage.removeItem(LS); }catch(e){} }
        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);
      });
      btns[d[0]]=b; wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    refresh();
    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* 每10秒同步別人投的票 */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
</script>
</body>
</html>
