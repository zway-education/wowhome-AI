<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="author" content="AI未來創作營隊">
<title>暗途 遊戲介紹</title>
<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #000;
    font-family: 'Courier New', monospace;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  canvas { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
  #soundBtn {
    position: fixed; top: 12px; right: 12px; z-index: 20;
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(20,20,20,0.7); border: 1px solid rgba(160,160,160,0.5);
    color: #ddd; font-size: 20px; cursor: pointer;
  }
  #soundHint {
    position: fixed; top: 18px; right: 68px; z-index: 20;
    color: #bbb; font-size: 14px; text-shadow: 0 0 4px #000;
    animation: hintFade 3.2s ease forwards;
    pointer-events: none;
  }
  @keyframes hintFade { 0%{opacity:0} 15%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
  #replayBtn {
    position: fixed; left: 50%; bottom: 12%; transform: translateX(-50%);
    z-index: 20; display: none;
    padding: 14px 42px; font-size: 20px; min-height: 48px;
    background: #300; color: #e8b0b0;
    border: 1px solid #700; border-radius: 6px; cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>
<button id="soundBtn">🔇</button>
<div id="soundHint">點聲音鈕開啟音效 🎧 建議戴耳機</div>
<button id="replayBtn">重新播放</button>
<canvas id="stage"></canvas>

<script>
'use strict';
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const soundBtn = document.getElementById('soundBtn');
const replayBtn = document.getElementById('replayBtn');

function resize() {
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', resize); resize();

// ---------- 音效（預設靜音,合成、零外部資源）----------
let audioCtx = null, soundOn = false;
let ambientNodes = null;
soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? '🔊' : '🔇';
  if (soundOn && !audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  if (soundOn) startAmbient(); else stopAmbient();
});

// 恐怖環境音：失諧雙低音墊＋陰森音樂盒旋律
function startAmbient() {
  if (!audioCtx || ambientNodes) return;
  const t = audioCtx.currentTime;
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0.001, t);
  master.gain.exponentialRampToValueAtTime(0.9, t + 2);
  master.connect(audioCtx.destination);

  const drone = audioCtx.createOscillator();
  drone.type = 'sawtooth'; drone.frequency.setValueAtTime(48, t);
  const drone2 = audioCtx.createOscillator();
  drone2.type = 'sawtooth'; drone2.frequency.setValueAtTime(48.7, t);
  const droneFilter = audioCtx.createBiquadFilter();
  droneFilter.type = 'lowpass'; droneFilter.frequency.setValueAtTime(130, t);
  const droneGain = audioCtx.createGain();
  droneGain.gain.setValueAtTime(0.045, t);
  const lfo = audioCtx.createOscillator();
  lfo.frequency.setValueAtTime(0.17, t);
  const lfoGain = audioCtx.createGain();
  lfoGain.gain.setValueAtTime(7, t);
  lfo.connect(lfoGain).connect(drone.frequency);
  drone.connect(droneFilter); drone2.connect(droneFilter);
  droneFilter.connect(droneGain).connect(master);
  drone.start(t); drone2.start(t); lfo.start(t);

  // 音樂盒旋律：A 小調，緩慢、失諧泛音＋回音
  const MELODY = [
    [220.0, 1.6], [261.63, 1.6], [246.94, 2.4], [0, 1.2],
    [220.0, 1.6], [174.61, 1.6], [164.81, 3.2], [0, 2.4],
    [261.63, 1.6], [246.94, 1.6], [220.0, 2.4], [0, 1.2],
    [146.83, 1.6], [164.81, 1.6], [220.0, 4.0], [0, 3.2],
  ];
  const echo = audioCtx.createDelay(1.2);
  echo.delayTime.setValueAtTime(0.55, t);
  const echoFb = audioCtx.createGain();
  echoFb.gain.setValueAtTime(0.42, t);
  const echoOut = audioCtx.createGain();
  echoOut.gain.setValueAtTime(0.5, t);
  echo.connect(echoFb).connect(echo);
  echo.connect(echoOut).connect(master);
  let noteIdx = 0;
  function pluck(freq, when) {
    for (const [mult, vol] of [[1, 0.055], [2.01, 0.022], [3.02, 0.009]]) {
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq * mult, when);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.0001, when);
      g.gain.exponentialRampToValueAtTime(vol, when + 0.015);
      g.gain.exponentialRampToValueAtTime(0.0001, when + 2.2);
      osc.connect(g);
      g.connect(master);
      g.connect(echo);
      osc.start(when);
      osc.stop(when + 2.3);
    }
  }
  function scheduleNext() {
    if (!ambientNodes) return;
    const [freq, dur] = MELODY[noteIdx % MELODY.length];
    noteIdx++;
    if (freq > 0) pluck(freq, audioCtx.currentTime + 0.05);
    ambientNodes.melodyTimer = setTimeout(scheduleNext, dur * 1000);
  }
  ambientNodes = { drone, drone2, lfo, master, melodyTimer: null };
  setTimeout(scheduleNext, 800);
}
function stopAmbient() {
  if (!ambientNodes) return;
  const t = audioCtx.currentTime;
  clearTimeout(ambientNodes.melodyTimer);
  ambientNodes.master.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
  ambientNodes.drone.stop(t + 0.5);
  ambientNodes.drone2.stop(t + 0.5);
  ambientNodes.lfo.stop(t + 0.5);
  ambientNodes = null;
}
function thump(vol) {
  if (!audioCtx || !soundOn) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine'; o.frequency.setValueAtTime(90, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.35);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.4);
}
function stinger() {
  if (!audioCtx || !soundOn) return;
  const now = audioCtx.currentTime;
  [220, 233, 246].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sawtooth'; o.frequency.value = f;
    g.gain.setValueAtTime(0.001, now);
    g.gain.exponentialRampToValueAtTime(0.22, now + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(now); o.stop(now + 0.6);
  });
}
function chime() {
  if (!audioCtx || !soundOn) return;
  const now = audioCtx.currentTime;
  [660, 880, 990].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'triangle'; o.frequency.value = f;
    g.gain.setValueAtTime(0.0001, now + i * 0.09);
    g.gain.exponentialRampToValueAtTime(0.14, now + i * 0.09 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.09 + 0.5);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(now + i * 0.09); o.stop(now + i * 0.09 + 0.5);
  });
}
function keyPickup() {
  if (!audioCtx || !soundOn) return;
  const now = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'square'; o.frequency.setValueAtTime(520, now);
  o.frequency.exponentialRampToValueAtTime(1040, now + 0.15);
  g.gain.setValueAtTime(0.001, now);
  g.gain.exponentialRampToValueAtTime(0.12, now + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(now); o.stop(now + 0.2);
}

const gameplayImgs = GAMEPLAY_SRCS.map(src => { const im = new Image(); im.src = src; return im; });

function drawGameplayFootage(cx, cy, w, h, localT, fps, alpha, shakeAmt) {
  if (alpha <= 0) return;
  const n = gameplayImgs.length;
  const pos = (localT * fps) % n;
  const i0 = Math.floor(pos);
  const i1 = (i0 + 1) % n;
  const mix = pos - i0;
  const img0 = gameplayImgs[i0], img1 = gameplayImgs[i1];
  ctx.save();
  ctx.globalAlpha = alpha;
  const sx = shakeAmt ? (Math.random() - 0.5) * shakeAmt : 0;
  const sy = shakeAmt ? (Math.random() - 0.5) * shakeAmt : 0;
  ctx.translate(cx + sx, cy + sy);
  ctx.filter = 'brightness(1.7) contrast(1.05)';
  if (img0.complete && img0.naturalWidth) {
    ctx.globalAlpha = alpha * (1 - mix);
    ctx.drawImage(img0, -w / 2, -h / 2, w, h);
  }
  if (img1.complete && img1.naturalWidth) {
    ctx.globalAlpha = alpha * mix;
    ctx.drawImage(img1, -w / 2, -h / 2, w, h);
  }
  ctx.filter = 'none';
  ctx.restore();
}

function gameplayFrameLabel(alpha) {
  if (alpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(200,30,30,0.85)';
  ctx.beginPath();
  ctx.arc(24, 24, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.font = "13px 'Courier New', monospace";
  ctx.fillStyle = 'rgba(230,230,230,0.85)';
  ctx.textAlign = 'left';
  ctx.fillText('REC · 真實遊玩畫面', 38, 29);
  ctx.restore();
}

// ---------- 繪圖工具 ----------
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const easeOut = t => 1 - Math.pow(1 - t, 3);
const easeInOut = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

function drawCorridorBase() {
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0, 0, GAME_W, GAME_H);
  // 走廊透視牆面
  ctx.strokeStyle = 'rgba(60,55,50,0.5)';
  ctx.lineWidth = 2;
  const vx = GAME_W / 2, vy = GAME_H * 0.42;
  for (let i = 0; i < 6; i++) {
    const t = i / 5;
    const w = GAME_W * (0.15 + t * 0.85);
    const h = GAME_H * (0.15 + t * 0.85);
    ctx.strokeRect(vx - w / 2, vy - h / 2, w, h);
  }
  [[-1, -1], [1, -1], [-1, 1], [1, 1]].forEach(([sx, sy]) => {
    ctx.beginPath();
    ctx.moveTo(vx, vy);
    ctx.lineTo(vx + sx * GAME_W, vy + sy * GAME_H);
    ctx.stroke();
  });
}

function drawFlashlightCone(cx, cy, angle, spread, dist, flicker) {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const grad = ctx.createRadialGradient(cx, cy, 4, cx, cy, dist);
  grad.addColorStop(0, `rgba(255,248,220,${0.7 * flicker})`);
  grad.addColorStop(0.5, `rgba(255,235,190,${0.32 * flicker})`);
  grad.addColorStop(1, 'rgba(255,220,160,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, dist, angle - spread, angle + spread);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawDarknessMask(cx, cy, dist) {
  ctx.save();
  const grad = ctx.createRadialGradient(cx, cy, dist * 0.15, cx, cy, GAME_W * 0.75);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(10,8,8,0.9)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);
  ctx.restore();
}

function drawPlayerBack(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.ellipse(0, size * 0.9, size * 0.55, size * 0.9, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, -size * 0.15, size * 0.38, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawKey(x, y, size, glow) {
  ctx.save();
  ctx.translate(x, y);
  ctx.shadowColor = `rgba(255,220,120,${glow})`;
  ctx.shadowBlur = 18 * glow;
  ctx.strokeStyle = `rgba(255,220,120,${0.85 * glow + 0.15})`;
  ctx.lineWidth = size * 0.12;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(0, 0, size * 0.32, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(size * 0.3, 0);
  ctx.lineTo(size * 0.85, 0);
  ctx.moveTo(size * 0.65, 0);
  ctx.lineTo(size * 0.65, size * 0.22);
  ctx.moveTo(size * 0.8, 0);
  ctx.lineTo(size * 0.8, size * 0.22);
  ctx.stroke();
  ctx.restore();
}

function drawStalker(x, y, size, alpha) {
  if (alpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  ctx.fillStyle = '#0c0c0c';
  ctx.beginPath();
  ctx.moveTo(0, size);
  ctx.quadraticCurveTo(-size * 0.6, size * 0.2, -size * 0.3, -size * 0.7);
  ctx.quadraticCurveTo(0, -size * 1.1, size * 0.3, -size * 0.7);
  ctx.quadraticCurveTo(size * 0.6, size * 0.2, 0, size);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = `rgba(200,10,10,${0.85 * alpha})`;
  ctx.beginPath(); ctx.arc(-size * 0.14, -size * 0.55, size * 0.06, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(size * 0.14, -size * 0.55, size * 0.06, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

// 特寫鬼臉：慘白扭曲臉孔＋黑洞眼窩、血絲、獠牙大口（比照遊戲內驚嚇畫面設計）
function drawMonsterFace(cx, cy, scale, alpha, shake) {
  if (alpha <= 0) return;
  ctx.save();

// 逃脫技巧圖示：視線被阻擋（打叉的眼睛連線）
function drawLineOfSightBreak(cx, cy, w, progress) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.strokeStyle = 'rgba(255,90,90,0.8)';
  ctx.lineWidth = 3;
  ctx.setLineDash([8, 6]);
  ctx.beginPath();
  ctx.moveTo(-w / 2, 0);
  ctx.lineTo(w / 2, 0);
  ctx.stroke();
  ctx.setLineDash([]);
  if (progress > 0) {
    ctx.strokeStyle = `rgba(120,255,150,${progress})`;
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    const cutW = 26 * progress;
    ctx.beginPath();

    ctx.lineTo(cutW / 2, 18 * progress);
    ctx.moveTo(cutW / 2, -18 * progress);
    ctx.lineTo(-cutW / 2, 18 * progress);

}

// 幻影：手電筒邊緣一閃而過的半透明人形，會抖動、快速閃爍
function drawGlimpsePhantom(x, y, size, alpha, flickerT) {
  if (alpha <= 0) return;
  const flick = 0.4 + 0.6 * Math.abs(Math.sin(flickerT * 16));
  ctx.save();
  ctx.globalAlpha = alpha * flick;
  ctx.translate(x + Math.sin(flickerT * 22) * 3, y);
  const grad = ctx.createLinearGradient(0, -size, 0, size);
  grad.addColorStop(0, 'rgba(230,225,255,0.75)');
  grad.addColorStop(1, 'rgba(230,225,255,0.05)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(0, -size);
  ctx.quadraticCurveTo(size * 0.5, -size * 0.3, size * 0.32, size * 0.4);
  ctx.quadraticCurveTo(size * 0.5, size * 0.8, 0, size);
  ctx.quadraticCurveTo(-size * 0.5, size * 0.8, -size * 0.32, size * 0.4);
  ctx.quadraticCurveTo(-size * 0.5, -size * 0.3, 0, -size);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = `rgba(40,20,60,${0.7 * alpha})`;
  ctx.beginPath(); ctx.arc(-size * 0.12, -size * 0.5, size * 0.05, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(size * 0.12, -size * 0.5, size * 0.05, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

const TIMELINE = 142;
const firedCues = {};
function cue(id, fn) { if (!firedCues[id]) { firedCues[id] = true; fn(); } }

const LORE_LINES = [
  '多年前，這裡曾是一間療養院',
  '院方口中的「治療」，其實是一場實驗',
  '他們讓病人長時間盯著手電筒的光，一次又一次',

function draw(t) {
  const flicker = 0.85 + Math.random() * 0.15;

  if (t < 7) {
    // Scene 1: 黑暗中甦醒，霧氣與塵埃，標題浮現
    ctx.fillStyle = '#0a0806';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    for (let f = 0; f < 5; f++) {
      const fx = GAME_W * (0.15 + f * 0.18) + Math.sin(t * 0.25 + f * 2.1) * 70;
      const fy = GAME_H * (0.3 + (f % 3) * 0.22) + Math.cos(t * 0.18 + f * 1.4) * 30;
      const fr = 150 + f * 40;
      const fog = ctx.createRadialGradient(fx, fy, 10, fx, fy, fr);
      fog.addColorStop(0, 'rgba(70,60,55,0.10)');
      fog.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = fog;
      ctx.fillRect(fx - fr, fy - fr, fr * 2, fr * 2);
    }
    if (t > 0.6) {
      const halo1 = ctx.createRadialGradient(GAME_W / 2, GAME_H * 0.5, 30, GAME_W / 2, GAME_H * 0.5, 400);
      halo1.addColorStop(0, `rgba(255,220,170,${0.09 * flicker})`);
      halo1.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = halo1;
      ctx.fillRect(0, 0, GAME_W, GAME_H);
    }
    for (let d = 0; d < 14; d++) {
      const dx = (GAME_W * (d * 0.073 % 1) + Math.sin(t * 0.5 + d * 3.3) * 40 + GAME_W) % GAME_W;
      const dy = (GAME_H * (d * 0.137 % 1) + t * (6 + d % 5)) % GAME_H;
      ctx.fillStyle = `rgba(200,190,170,${0.10 + 0.08 * Math.sin(t * 2 + d)})`;
      ctx.beginPath();
      ctx.arc(dx, dy, 1.2 + (d % 3) * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
    if (t > 1.4) titleCard(clamp((t - 1.4) / 1, 0, 1), t < 3 ? 1.5 : 0);
    if (t > 3.0 && t < 5.2) subtitle('你在一棟廢棄的療養院中醒來', clamp((t - 3.0) / 0.6, 0, 1), false);
    if (t > 5.2) subtitle('四周一片漆黑，只剩自己的呼吸聲', clamp((t - 5.2) / 0.6, 0, 1), false);
    cue('c1', () => thump(0.5));

  } else if (t < 15) {
    // Scene 2: 真實遊玩畫面——手電筒是唯一光源，也是唯一暴露你的東西
    ctx.fillStyle = '#0a0806';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    const inA = clamp((t - 7) / 0.4, 0, 1);
    drawGameplayFootage(GAME_W / 2, GAME_H * 0.48, GAME_W, GAME_H * 0.86, t - 7, 0.75, inA, 0);
    gameplayFrameLabel(inA);
    if (t > 7.4 && t < 10) subtitle('手電筒是你唯一的光源', clamp((t - 7.4) / 0.6, 0, 1), false);
    if (t > 10 && t < 12.6) subtitle('也是唯一暴露你的東西——它會被看見', clamp((t - 10) / 0.6, 0, 1), false);
    if (t > 12.6) subtitle('每一步，都要小心翼翼', clamp((t - 12.6) / 0.6, 0, 1), false);

  } else if (t < 54) {
    // Scene 2b: 這裡發生了什麼事——療養院的真相
    const loreT = t - 15;
    const each = 39 / LORE_LINES.length;
    const idx = clamp(Math.floor(loreT / each), 0, LORE_LINES.length - 1);
    const localT = loreT - idx * each;
    ctx.fillStyle = '#080705';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    // 飄動的霧氣，取代走廊格線
    for (let f = 0; f < 5; f++) {
      const fx = GAME_W * (0.15 + f * 0.18) + Math.sin(t * 0.25 + f * 2.1) * 70;
      const fy = GAME_H * (0.3 + (f % 3) * 0.22) + Math.cos(t * 0.18 + f * 1.4) * 30;
      const fr = 150 + f * 40;
      const fog = ctx.createRadialGradient(fx, fy, 10, fx, fy, fr);
      fog.addColorStop(0, 'rgba(70,60,55,0.10)');
      fog.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = fog;
      ctx.fillRect(fx - fr, fy - fr, fr * 2, fr * 2);
    }
    // 微弱的中央燭光氛圍
    const halo = ctx.createRadialGradient(GAME_W / 2, GAME_H * 0.5, 30, GAME_W / 2, GAME_H * 0.5, 380);
    halo.addColorStop(0, `rgba(255,220,170,${0.07 * flicker})`);
    halo.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = halo;
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    // 漂浮塵埃
    for (let d = 0; d < 14; d++) {
      const dx = (GAME_W * (d * 0.073 % 1) + Math.sin(t * 0.5 + d * 3.3) * 40 + GAME_W) % GAME_W;
      const dy = (GAME_H * (d * 0.137 % 1) + t * (6 + d % 5) ) % GAME_H;
      ctx.fillStyle = `rgba(200,190,170,${0.10 + 0.08 * Math.sin(t * 2 + d)})`;
      ctx.beginPath();
      ctx.arc(dx, dy, 1.2 + (d % 3) * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
    if (idx === 0 && localT < 0.6) {
      ctx.save();
      ctx.globalAlpha = clamp(1 - localT / 0.6, 0, 1) * 0;
      ctx.restore();
    }
    ctx.save();
    ctx.globalAlpha = 0.8;
    ctx.textAlign = 'center';
    ctx.font = "bold 20px 'Microsoft JhengHei', 'PingFang TC', sans-serif";
    ctx.fillStyle = '#ffcf5c';
    ctx.fillText('這裡，發生過什麼事？', GAME_W / 2, GAME_H * 0.18);
    ctx.restore();
    const fadeIn = clamp(localT / 0.5, 0, 1);
    const fadeOut = clamp((each - localT) / 0.5, 0, 1);
    loreText(LORE_LINES[idx], Math.min(fadeIn, fadeOut));
    if (idx === 3 || idx === 5) redVignette(clamp(localT / 1, 0, 0.2));
    if (localT < 0.1) cue('lore' + idx, () => thump(0.3));

  } else if (t < 63) {
    // Scene 3: 黑暗中的怪物，光照到才看得見
    drawCorridorBase();
    drawDarknessMask(GAME_W / 2, GAME_H * 0.55, 50);
    const swing = Math.sin((t - 54) * 1.5);
    const angle = -Math.PI / 2 + swing * 0.7;
    drawFlashlightCone(GAME_W / 2, GAME_H * 0.55, angle, 0.5, 260, flicker);
    const stalkerX = GAME_W * 0.7, stalkerY = GAME_H * 0.5;
    const beamHits = angle > -Math.PI / 2 - 0.15 && angle < -Math.PI / 2 + 0.9 && t > 56.5;
    drawStalker(stalkerX, stalkerY, 46, beamHits ? clamp((t - 56.5) / 0.4, 0, 1) : 0);
    drawPlayerBack(GAME_W / 2, GAME_H * 0.86, 34);
    if (t > 54.4 && t < 57) subtitle('黑暗中似乎有什麼東西在盯著你', clamp((t - 54.4) / 0.6, 0, 1), false);
    if (t > 57.2 && t < 60) subtitle('只有光照到它們時，你才能看見', clamp((t - 57.2) / 0.6, 0, 1), false);
    if (t > 60) subtitle('它平時隱身黑暗，一照到光就會現形', clamp((t - 60) / 0.6, 0, 1), false);
    if (beamHits) cue('c3', () => stinger());

  } else if (t < 77) {
    // Scene 3b: 惡夢模式 其一——爬行怪（含身世）
    const revealT = t - 63;
    monsterBackdrop(t, 'rgba(255,90,60,AA)');
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.textAlign = 'center';
    ctx.font = "bold 22px 'Microsoft JhengHei', 'PingFang TC', sans-serif";
    ctx.fillStyle = '#ff7e7e';
    ctx.fillText('惡夢模式・三種怪物', GAME_W / 2, GAME_H * 0.14);
    ctx.restore();
    const zoomIn = clamp(revealT / 0.6, 0, 1);
    const scale = (0.65 + zoomIn * 0.25) * (revealT < 0.6 ? 1 + (Math.random() - 0.5) * 0.03 : 1);
    drawCrawler(GAME_W / 2, GAME_H * 0.4, scale, clamp(revealT / 0.4, 0, 1), t);
    nameTag('其一・爬行怪', '長臂利爪沿路徑接近你，光照到才會現形', clamp((revealT - 1) / 0.5, 0, 1));
    if (revealT > 7.6 && revealT < 10.4) subtitle('他曾是這裡最早的實驗對象', clamp((revealT - 7.6) / 0.6, 0, 1), false);
    if (revealT > 10.6) subtitle('被迫直視光太久，漸漸忘了怎麼站起來', clamp((revealT - 10.6) / 0.6, 0, 1), false);
    cue('c3b', () => stinger());

  } else if (t < 91) {
    // Scene 3c: 惡夢模式 其二——低語者（含身世）
    const gT = t - 77;
    monsterBackdrop(t, 'rgba(200,120,220,AA)');
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.textAlign = 'center';
    ctx.font = "bold 22px 'Microsoft JhengHei', 'PingFang TC', sans-serif";
    ctx.fillStyle = '#ff7e7e';
    ctx.fillText('惡夢模式・三種怪物', GAME_W / 2, GAME_H * 0.14);
    ctx.restore();
    const awake = gT > 3.6;
    drawWraithGhost(GAME_W / 2, GAME_H * 0.44, clamp(gT / 0.5, 0, 1) * 1.15, 1, gT, awake);
    if (awake) redVignette(clamp((gT - 3.6) / 1, 0, 0.22));
    nameTag('其二・低語者', '飄浮的護士幽魂——手電筒別照它太久', clamp((gT - 0.8) / 0.5, 0, 1));
    if (gT > 7.8 && gT < 10.6) subtitle('她是值最後一班的護士', clamp((gT - 7.8) / 0.6, 0, 1), false);
    if (gT > 10.8) subtitle('發現真相的那一晚，她再也沒有離開這裡', clamp((gT - 10.8) / 0.6, 0, 1), false);
    if (awake) cue('c3c', () => stinger());

  } else if (t < 105) {
    // Scene 3d: 惡夢模式 其三——縫合傀儡（含身世）
    const fT = t - 91;
    monsterBackdrop(t, 'rgba(255,190,90,AA)');
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.textAlign = 'center';
    ctx.font = "bold 22px 'Microsoft JhengHei', 'PingFang TC', sans-serif";
    ctx.fillStyle = '#ff7e7e';
    ctx.fillText('惡夢模式・三種怪物', GAME_W / 2, GAME_H * 0.14);
    ctx.restore();
    const watched = Math.sin(fT * 0.9) > 0;
    const creep = watched ? 0 : Math.sin(fT * 5) * 2;
    drawStitchedDoll(GAME_W / 2 + creep, GAME_H * 0.42, clamp(fT / 0.5, 0, 1) * 1.1, 1, watched);
    nameTag('其三・縫合傀儡', '你盯著它，它就僵住——移開視線它才會靠近', clamp((fT - 0.8) / 0.5, 0, 1));
    if (fT > 7.6 && fT < 10.4) subtitle('他被一次次手術縫補，身上滿是針腳', clamp((fT - 7.6) / 0.6, 0, 1), false);
    if (fT > 10.6) subtitle('他學會了：被看著時最安全，沒人看才要靠近', clamp((fT - 10.6) / 0.6, 0, 1), false);
    if (fT > 1) cue('c3d', () => thump(0.3));

  } else if (t < 114) {
    // Scene 3e: 如何逃脫——三種怪物各自的對策
    const tipT = t - 105;
    monsterBackdrop(t, 'rgba(255,207,92,AA)');
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.textAlign = 'center';
    ctx.font = "bold 24px 'Microsoft JhengHei', 'PingFang TC', sans-serif";
    ctx.fillStyle = '#ffcf5c';
    ctx.fillText('如何逃脫它們？', GAME_W / 2, GAME_H * 0.16);
    ctx.restore();
    if (tipT < 3) {
      drawLineOfSightBreak(GAME_W / 2, GAME_H * 0.42, 320, clamp((tipT - 0.3) / 0.6, 0, 1));
      drawCrawler(GAME_W / 2 - 170, GAME_H * 0.42, 0.32, 0.9, t);
      drawPlayerBack(GAME_W / 2 + 160, GAME_H * 0.42, 26);
      subtitle('爬行怪：躲到轉角打斷視線、拉開距離', clamp((tipT - 0.4) / 0.5, 0, 1), false);
    } else if (tipT < 6) {
      const lt = tipT - 3;
      drawWraithGhost(GAME_W / 2, GAME_H * 0.4, 0.55, 0.9, t, false);
      drawFlashlightCone(GAME_W / 2, GAME_H * 0.4, -Math.PI / 2, 0.5, 160, 0.7 + Math.sin(lt * 4) * 0.2);
      subtitle('低語者：光別照它太久，快移開手電筒', clamp((lt - 0.1) / 0.5, 0, 1), false);
    } else {
      const dt2 = tipT - 6;
      const watched = Math.sin(dt2 * 3) > -0.3;
      drawStitchedDoll(GAME_W / 2, GAME_H * 0.42, 0.5, 0.9, watched);
      subtitle('縫合傀儡：緊盯著它，它才不會靠近', clamp((dt2 - 0.1) / 0.5, 0, 1), false);
    }

  } else if (t < 121) {
    // Scene 4: 真實遊玩畫面——被發現後拔腿逃跑
    const runT = t - 114;
    ctx.fillStyle = '#0a0806';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    const shake = clamp(runT / 0.5, 0, 1) * 10;
    drawGameplayFootage(GAME_W / 2, GAME_H * 0.48, GAME_W * 1.06, GAME_H * 0.92, runT, 2.2, 1, shake);
    gameplayFrameLabel(1);
    redVignette(clamp(runT / 2, 0, 0.25));
    if (t > 114.2 && t < 116.2) subtitle('它發現你了——快跑！', clamp((t - 114.2) / 0.5, 0, 1), false);
    if (t > 116.4 && t < 118.8) subtitle('腳步聲、心跳聲，離你越來越近', clamp((t - 116.4) / 0.5, 0, 1), false);
    if (t > 118.8) subtitle('轉個彎，甩開它的視線', clamp((t - 118.8) / 0.5, 0, 1), false);
    cue('c4', () => stinger());

  } else if (t < 128) {
    // Scene 5: 收集鑰匙
    drawCorridorBase();
    drawDarknessMask(GAME_W / 2, GAME_H * 0.55, 60);
    drawFlashlightCone(GAME_W / 2, GAME_H * 0.4, -Math.PI / 2, 0.55, 260, flicker);
    const keys = 3;
    for (let i = 0; i < keys; i++) {
      const kt = clamp((t - 121.6 - i * 1.4) / 0.5, 0, 1);
      if (kt <= 0) continue;
      const kx = GAME_W * (0.32 + i * 0.18);
      const ky = GAME_H * 0.42 - Math.sin(t * 2 + i) * 4;
      drawKey(kx, ky, 30, kt);
      if (kt >= 1) cue('key' + i, () => keyPickup());
    }
    drawPlayerBack(GAME_W / 2, GAME_H * 0.94, 34);
    if (t > 121.8 && t < 125) subtitle('甩開它，找到 3 把鑰匙', clamp((t - 121.8) / 0.6, 0, 1), false);
    if (t > 125) subtitle('才能打開通往自由的門', clamp((t - 125) / 0.6, 0, 1), false);

  } else if (t < 135) {
    // Scene 6: 逃出去
    drawCorridorBase();
    drawDarknessMask(GAME_W / 2, GAME_H * 0.55, 55);
    drawFlashlightCone(GAME_W / 2, GAME_H * 0.55, -Math.PI / 2, 0.55, 260, flicker);
    const glow = 0.6 + Math.sin(t * 3) * 0.4;
    drawExitDoor(GAME_W * 0.5, GAME_H * 0.72, 90, 150, clamp((t - 128) / 0.6, 0, 1) * glow);
    drawPlayerBack(GAME_W / 2, GAME_H * 0.86, 34);
    if (t > 128.4 && t < 131) subtitle('抵達綠色出口，逃離這裡', clamp((t - 128.4) / 0.6, 0, 1), false);
    if (t > 131 && t < 133) subtitle('握緊手電筒，屏住呼吸——', clamp((t - 131) / 0.6, 0, 1), false);
    if (t > 133) redVignette(clamp((t - 133) / 1.5, 0, 0.35));
    if (t > 133) subtitle('你的選擇，將決定你能不能活著看到黎明', clamp((t - 133) / 0.6, 0, 1), false);

  } else {
    // Scene 7: 收尾與行動呼籲
    ctx.fillStyle = '#0f0b08';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    const a = clamp((t - 135) / 1, 0, 1);
    titleCard(a, 0);
    if (t > 136 && t < 138.5) subtitle('你的選擇，將決定你的命運', clamp((t - 136) / 0.8, 0, 1), false);
    if (t > 138.5) subtitle('現在就挑戰《暗途》', clamp((t - 138.5) / 0.8, 0, 1), true);
    cue('cEnd', () => chime());
  }
}

// ---------- 播放控制 ----------
let startTime = null;
let playing = false;

function loop(now) {
  if (!playing) return;
  if (startTime === null) startTime = now;
  const t = (now - startTime) / 1000;
  if (t >= TIMELINE) {
    draw(TIMELINE - 0.01);
    playing = false;
    replayBtn.style.display = 'block';
    return;
  }
  draw(t);
  requestAnimationFrame(loop);
}

function play() {
  startTime = null;
  playing = true;
  replayBtn.style.display = 'none';
  Object.keys(firedCues).forEach(k => delete firedCues[k]);
  requestAnimationFrame(loop);
}

replayBtn.addEventListener('click', play);
play();
</script>
<script>/* AI-CAMP-STATS-BEACON */
(function(){
  try{ if(window.top!==window.self) return; }catch(e){ return; } /* 在作品館內由作品館計數與投票 */
  var NS="ai-future-camp", K="pro-t-bc34f9ec";

  function ping(n){
    try{
      fetch(REL+"hit/"+NS+"/"+n).then(function(r){
        if(!r||!r.ok){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); }
      }).catch(function(){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); });
    }catch(e){}
  }
  function read(n,cb){
    function via(base,next){ try{ fetch(base+"get/"+NS+"/"+n).then(function(r){ if(r.status===404&&base===ABS) return {value:0}; if(!r.ok) throw 0; return r.json(); }).then(function(j){ cb(j.value||j.count||0); }).catch(next); }catch(e){ next(); } }
    via(REL, function(){ via(ABS, function(){ cb(null); }); });
  }
  ping(K+"-v");
  ping(K+"-p"); ping("site-total-plays");
  /* 投票鈕：非常好玩/好玩——與作品館同一計數器，任何網頁打開都同步 */
  function initVotes(){

    var wrap=document.createElement("div");
    wrap.style.cssText="position:fixed;right:10px;bottom:10px;z-index:99999;display:flex;gap:6px;font-family:sans-serif;opacity:.92";
    var LS="voted-"+K;
    var defs=[["-love","\u2764\uFE0F","\u975e\u5e38\u597d\u73a9","#ff6cc7"],["-like","\ud83d\udc4d","\u597d\u73a9","#38e1ff"]];
    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;
          b.querySelector("i").textContent=Math.max(0,(n||0)-(c||0));
        }); });
      });
    }
    defs.forEach(function(d){
      var b=document.createElement("button");
      b.type="button"; b.title=d[2];
      b.style.cssText="min-height:42px;padding:8px 14px;border:none;border-radius:999px;background:rgba(15,18,32,.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation";
      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";
      b.addEventListener("click",function(){
        var prev=null; try{ prev=localStorage.getItem(LS); }catch(e){}
        if(prev===d[0]){ ping(K+d[0]+"-c"); try{ localStorage.removeItem(LS); }catch(e){} }
        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);
      });
      btns[d[0]]=b; wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    refresh();
    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* 每10秒同步別人投的票 */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
