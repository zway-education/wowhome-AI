<canvas id="stage"></canvas>

<script>
'use strict';
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const soundBtn = document.getElementById('soundBtn');
const replayBtn = document.getElementById('replayBtn');

function resize() {
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', resize); resize();

// ---------- йҹіж•ҲпјҲv6 й җиЁӯй–ӢиҒІ,еҗҲжҲҗгҖҒйӣ¶еӨ–йғЁиіҮжәҗпјү----------
let audioCtx = null, soundOn = true, mainBus = null;
let ambientNodes = null;
function ensureAudioCtx() {
  if (audioCtx) return;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; }
  // v6 жҜҚз·ҡпјҡmainBus вҶ’ DynamicsCompressor вҶ’ destination
  const comp = audioCtx.createDynamicsCompressor();
  comp.threshold.value = -14; comp.ratio.value = 5; comp.release.value = 0.25;
  comp.connect(audioCtx.destination);
  mainBus = audioCtx.createGain(); mainBus.gain.value = 1; mainBus.connect(comp);
}
function tryResumeAC() { if (audioCtx && audioCtx.state === 'suspended') { const p = audioCtx.resume(); if (p && p.catch) p.catch(() => {}); } }
/* иҒІйҹій җиЁӯй–Ӣе•ҹпјҡијүе…ҘеҚіе»әз«ӢпјҢиў«иҮӘеӢ•ж’ӯж”ҫж”ҝзӯ–ж“ӢдёӢжҷӮйҰ–ж¬Ўдә’еӢ•жҒўеҫ© */
ensureAudioCtx(); tryResumeAC();
if (audioCtx) startAmbient();
setTimeout(() => {
  const h = document.getElementById('soundHint');
  if (h && audioCtx && audioCtx.state === 'suspended') h.textContent = 'й»һд»»ж„Ҹиҷ•й–Ӣе•ҹиҒІйҹі рҹҺ§';
}, 300);
addEventListener('pointerdown', tryResumeAC);
addEventListener('keydown', tryResumeAC);
soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? 'рҹ”Ҡ' : 'рҹ”Ү';
  if (!audioCtx) ensureAudioCtx();
  tryResumeAC();
  if (soundOn) startAmbient(); else stopAmbient();
});
/* v6 й җе‘ҠзүҮйҮҚйҹі */
function braam(vol, dur) {
  if (!audioCtx || !soundOn) return;
  const t = audioCtx.currentTime;
  const lp = audioCtx.createBiquadFilter(); lp.type = 'lowpass'; lp.Q.value = 3;
  lp.frequency.setValueAtTime(150, t);
  lp.frequency.linearRampToValueAtTime(850, t + dur * 0.35);
  lp.frequency.linearRampToValueAtTime(180, t + dur);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.09);
  g.gain.setValueAtTime(vol, t + dur * 0.55);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  lp.connect(g); g.connect(mainBus);
  [1, 1.008, 0.992, 0.5].forEach(m => {
    const o = audioCtx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = 46 * m;
    o.connect(lp); o.start(t); o.stop(t + dur + 0.05);
  });
}
function riser(dur) {
  if (!audioCtx || !soundOn) return;
  const t = audioCtx.currentTime;
  const n = Math.floor(audioCtx.sampleRate * (dur + 0.1));
  const buf = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.6;
  bp.frequency.setValueAtTime(190, t);
  bp.frequency.exponentialRampToValueAtTime(3000, t + dur);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.2, t + dur);
  g.gain.linearRampToValueAtTime(0.0001, t + dur + 0.06);
  src.connect(bp); bp.connect(g); g.connect(mainBus); src.start(t);
}

// жҒҗжҖ–з’°еўғйҹіпјҡеӨұи«§йӣҷдҪҺйҹіеўҠпјӢйҷ°жЈ®йҹіжЁӮзӣ’ж—ӢеҫӢ
function startAmbient() {
  if (!audioCtx || ambientNodes) return;
  const t = audioCtx.currentTime;
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0.001, t);
  master.gain.exponentialRampToValueAtTime(0.9, t + 2);
  master.connect(mainBus);

  const drone = audioCtx.createOscillator();
  drone.type = 'sawtooth'; drone.frequency.setValueAtTime(48, t);
  const drone2 = audioCtx.createOscillator();
  drone2.type = 'sawtooth'; drone2.frequency.setValueAtTime(48.7, t);
  const droneFilter = audioCtx.createBiquadFilter();
  droneFilter.type = 'lowpass'; droneFilter.frequency.setValueAtTime(130, t);
  const droneGain = audioCtx.createGain();
  droneGain.gain.setValueAtTime(0.045, t);
  const lfo = audioCtx.createOscillator();
  lfo.frequency.setValueAtTime(0.17, t);
  const lfoGain = audioCtx.createGain();
  lfoGain.gain.setValueAtTime(7, t);
  lfo.connect(lfoGain).connect(drone.frequency);
  drone.connect(droneFilter); drone2.connect(droneFilter);
  droneFilter.connect(droneGain).connect(master);
  drone.start(t); drone2.start(t); lfo.start(t);

  // йҹіжЁӮзӣ’ж—ӢеҫӢпјҡA е°ҸиӘҝпјҢз·©ж…ўгҖҒеӨұи«§жіӣйҹіпјӢеӣһйҹі
  const MELODY = [
    [220.0, 1.6], [261.63, 1.6], [246.94, 2.4], [0, 1.2],
    [220.0, 1.6], [174.61, 1.6], [164.81, 3.2], [0, 2.4],
    [261.63, 1.6], [246.94, 1.6], [220.0, 2.4], [0, 1.2],
    [146.83, 1.6], [164.81, 1.6], [220.0, 4.0], [0, 3.2],
  ];
  const echo = audioCtx.createDelay(1.2);
  echo.delayTime.setValueAtTime(0.55, t);
  const echoFb = audioCtx.createGain();
  echoFb.gain.setValueAtTime(0.42, t);
  const echoOut = audioCtx.createGain();
  echoOut.gain.setValueAtTime(0.5, t);
  echo.connect(echoFb).connect(echo);
  echo.connect(echoOut).connect(master);
  let noteIdx = 0;
  function pluck(freq, when) {
    for (const [mult, vol] of [[1, 0.055], [2.01, 0.022], [3.02, 0.009]]) {
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq * mult, when);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.0001, when);
      g.gain.exponentialRampToValueAtTime(vol, when + 0.015);
      g.gain.exponentialRampToValueAtTime(0.0001, when + 2.2);
      osc.connect(g);
      g.connect(master);
      g.connect(echo);
      osc.start(when);
      osc.stop(when + 2.3);
    }
  }
  function scheduleNext() {
    if (!ambientNodes) return;
    const [freq, dur] = MELODY[noteIdx % MELODY.length];
    noteIdx++;
    if (freq > 0) pluck(freq, audioCtx.currentTime + 0.05);
    ambientNodes.melodyTimer = setTimeout(scheduleNext, dur * 1000);
  }
  ambientNodes = { drone, drone2, lfo, master, melodyTimer: null };
  setTimeout(scheduleNext, 800);
}
function stopAmbient() {
  if (!ambientNodes) return;
  const t = audioCtx.currentTime;
  clearTimeout(ambientNodes.melodyTimer);
  ambientNodes.master.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
  ambientNodes.drone.stop(t + 0.5);
  ambientNodes.drone2.stop(t + 0.5);
  ambientNodes.lfo.stop(t + 0.5);
  ambientNodes = null;
}
function thump(vol) {
  if (!audioCtx || !soundOn) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine'; o.frequency.setValueAtTime(90, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.35);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
  o.connect(g); g.connect(mainBus);
  o.start(); o.stop(audioCtx.currentTime + 0.4);
}
function stinger() {
  if (!audioCtx || !soundOn) return;
  const now = audioCtx.currentTime;
  [220, 233, 246].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sawtooth'; o.frequency.value = f;
    g.gain.setValueAtTime(0.001, now);
    g.gain.exponentialRampToValueAtTime(0.22, now + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
    o.connect(g); g.connect(mainBus);
    o.start(now); o.stop(now + 0.6);
  });
}
function chime() {
  if (!audioCtx || !soundOn) return;
  const now = audioCtx.currentTime;
  [660, 880, 990].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'triangle'; o.frequency.value = f;
    g.gain.setValueAtTime(0.0001, now + i * 0.09);
    g.gain.exponentialRampToValueAtTime(0.14, now + i * 0.09 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.09 + 0.5);
    o.connect(g); g.connect(mainBus);
    o.start(now + i * 0.09); o.stop(now + i * 0.09 + 0.5);
  });
}
function keyPickup() {
  if (!audioCtx || !soundOn) return;
  const now = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'square'; o.frequency.setValueAtTime(520, now);
  o.frequency.exponentialRampToValueAtTime(1040, now + 0.15);
  g.gain.setValueAtTime(0.001, now);
  g.gain.exponentialRampToValueAtTime(0.12, now + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
  o.connect(g); g.connect(mainBus);
  o.start(now); o.stop(now + 0.2);
}

const gameplayImgs = GAMEPLAY_SRCS.map(src => { const im = new Image(); im.src = src; return im; });

function drawGameplayFootage(cx, cy, w, h, localT, fps, alpha, shakeAmt) {
  if (alpha <= 0) return;
  const n = gameplayImgs.length;
  const pos = (localT * fps) % n;
  const i0 = Math.floor(pos);
  const img0 = gameplayImgs[i0];
  ctx.save();
  ctx.globalAlpha = alpha;
  const sx = shakeAmt ? (Math.random() - 0.5) * shakeAmt : 0;
  const sy = shakeAmt ? (Math.random() - 0.5) * shakeAmt : 0;
  ctx.translate(cx + sx, cy + sy);
  ctx.filter = 'brightness(1.25) contrast(1.03)';
  if (img0.complete && img0.naturalWidth) {
    ctx.globalAlpha = alpha;
    ctx.drawImage(img0, -w / 2, -h / 2, w, h);
  }
  ctx.filter = 'none';
  ctx.restore();
}

function gameplayFrameLabel(alpha) {
  if (alpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(200,30,30,0.85)';
  ctx.beginPath();
  ctx.arc(24, 62, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.font = "13px 'Courier New', monospace";
  ctx.fillStyle = 'rgba(230,230,230,0.85)';
  ctx.textAlign = 'left';
  ctx.fillText('REC В· зңҹеҜҰйҒҠзҺ©з•«йқў', 38, 67);
  ctx.restore();
}

const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const easeOut = t => 1 - Math.pow(1 - t, 3);
const easeInOut = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

function drawCorridorBase() {
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0, 0, GAME_W, GAME_H);
  // иө°е»ҠйҖҸиҰ–зүҶйқў
  ctx.strokeStyle = 'rgba(60,55,50,0.5)';
  ctx.lineWidth = 2;
  const vx = GAME_W / 2, vy = GAME_H * 0.42;
  for (let i = 0; i < 6; i++) {
    const t = i / 5;
    const w = GAME_W * (0.15 + t * 0.85);
    const h = GAME_H * (0.15 + t * 0.85);
    ctx.strokeRect(vx - w / 2, vy - h / 2, w, h);
  }
  [[-1, -1], [1, -1], [-1, 1], [1, 1]].forEach(([sx, sy]) => {
    ctx.beginPath();
    ctx.moveTo(vx, vy);
    ctx.lineTo(vx + sx * GAME_W, vy + sy * GAME_H);
    ctx.stroke();
  });
}

// ---------- йҒҠжҲІеҗҢж¬ҫдҝҜиҰ–е ҙжҷҜпјҲз№ӘиЈҪзЁӢејҸиҮӘ pro/games/жҡ—йҖ”.html з§»жӨҚпјҢдҝқиӯүиҲҮйҒҠжҲІз•«йқўдёҖиҮҙпјү ----------
const T = 48, TMW = 22, TMH = 13, TOX = -24, TOY = -42;
const tmap = (() => {
  const m = [];
  for (let y = 0; y < TMH; y++) {
    const row = [];
    for (let x = 0; x < TMW; x++) {
      let w = (x === 0 || y === 0 || x === TMW - 1 || y === TMH - 1) ? 1 : 0;
      if (!w && ((x * 13 + y * 29) % 31 === 0)) w = 1;
      if (!w && y === 3 && x >= 3 && x <= 7) w = 1;
      if (!w && y === 9 && x >= 14 && x <= 19) w = 1;
      row.push(w);
    }
    m.push(row);
  }
  return m;
})();
const isTW = (x, y) => (x < 0 || y < 0 || x >= TMW || y >= TMH) ? 1 : tmap[y][x];
const wallFrontCv = (() => {
  const c = document.createElement('canvas'); c.width = 96; c.height = 28;
  const g = c.getContext('2d'); g.setTransform(2, 0, 0, 2, 0, 0);
  const fg = g.createLinearGradient(0, 0, 0, 14);
  fg.addColorStop(0, '#4a3230'); fg.addColorStop(1, '#241614');
  g.fillStyle = fg; g.fillRect(0, 0, 48, 14);
  return c;
})();
function drawTopDownRoom() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, GAME_W, GAME_H);
  // ең°жқҝпјҲйҒҠжҲІеҗҢж¬ҫжЈӢзӣӨиүІе·®пјӢзЈҡзё«пјӢиЈӮзё«пјӢзүҶйӮҠз’°еўғе…үйҒ®и”Ҫпјү
  for (let y = 0; y < TMH; y++) for (let x = 0; x < TMW; x++) {
    if (tmap[y][x] === 1) continue;
    const px = x * T + TOX, py = y * T + TOY, h = Math.sin(x * 127.1 + y * 311.7) * 0.5 + 0.5;
    ctx.fillStyle = h > 0.5 ? '#1d1a18' : '#191614';
    ctx.fillRect(px, py, T, T);
    ctx.strokeStyle = 'rgba(0,0,0,.5)'; ctx.lineWidth = 1; ctx.strokeRect(px + 0.5, py + 0.5, T - 1, T - 1);
    if (h > 0.87) {
      ctx.fillStyle = 'rgba(0,0,0,.3)';
      ctx.fillRect(px + 8 + h * 10, py + 12, 14, 1.6); ctx.fillRect(px + 14 + h * 8, py + 13, 1.6, 10);
    }
    ctx.fillStyle = 'rgba(0,0,0,.35)';
    if (isTW(x, y - 1)) ctx.fillRect(px, py, T, 7);
    if (isTW(x - 1, y)) ctx.fillRect(px, py, 7, T);
    if (isTW(x + 1, y)) ctx.fillRect(px + T - 7, py, 7, T);
    if (isTW(x, y + 1)) ctx.fillRect(px, py + T - 7, T, 7);
  }
  // иЎҖжј¬пјҲйҒҠжҲІеҗҢж¬ҫпјү
  for (const [sx, sy, sr] of [[250, 328, 24], [700, 214, 18], [530, 428, 15]]) {
    ctx.fillStyle = 'rgba(90,10,10,.28)';
    ctx.beginPath(); ctx.ellipse(sx, sy, sr, sr * 0.7, 0.5, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(sx + sr * 0.7, sy + sr * 0.4, sr * 0.25, 0, 7); ctx.fill();
  }
  // з—…еәҠйҒ“е…·пјҲйҒҠжҲІеҗҢж¬ҫпјү
  ctx.save(); ctx.translate(150, 250);
  ctx.fillStyle = '#2c2622'; ctx.fillRect(-16, -30, 34, 58);
  const bedG = ctx.createLinearGradient(-14, -28, 16, -28);
  bedG.addColorStop(0, '#4a4038'); bedG.addColorStop(1, '#332b24');
  ctx.fillStyle = bedG; ctx.fillRect(-14, -28, 30, 54);
  ctx.fillStyle = '#5a5048'; ctx.fillRect(-12, -26, 26, 14);
  ctx.fillStyle = 'rgba(255,255,255,.06)'; ctx.fillRect(-12, -26, 26, 4);
  ctx.strokeStyle = '#1a1512'; ctx.lineWidth = 2; ctx.strokeRect(-16, -30, 34, 58);
  ctx.restore();
  // зүҶпјҲеҒҪ 3DпјҡеүҚз·ЈеҸ—е…үйқўпјӢй ӮйқўпјӢй«ҳе…үпјҢйҒҠжҲІеҗҢж¬ҫпјү
  const WH = 14;
  for (let y = 0; y < TMH; y++) for (let x = 0; x < TMW; x++) {
    if (tmap[y][x] !== 1) continue;
    const px = x * T + TOX, py = y * T + TOY, h = Math.sin(x * 91.3 + y * 151.7) * 0.5 + 0.5;
    if (!isTW(x, y + 1)) {
      ctx.drawImage(wallFrontCv, px, py + T - WH, T, WH);
      ctx.fillStyle = 'rgba(0,0,0,.35)';
      ctx.fillRect(px + 6, py + T - WH + 3, T - 16, 2);
    }
    ctx.fillStyle = h > 0.5 ? '#2e2020' : '#291c1c';
    ctx.fillRect(px, py - 4, T, (isTW(x, y + 1) ? T + 4 : T + 4 - WH));
    ctx.fillStyle = 'rgba(255,255,255,.05)';
    if (!isTW(x, y - 1)) ctx.fillRect(px, py - 4, T, 3);
    if (h > 0.8) { ctx.fillStyle = 'rgba(0,0,0,.25)'; ctx.fillRect(px + 10, py + 8, 16, 10); }
  }
}

function drawPlayerTop(x, y, angle, t, moving) {
  ctx.save(); ctx.translate(x, y);
  ctx.fillStyle = 'rgba(0,0,0,.4)';
  ctx.beginPath(); ctx.ellipse(2, 3, 13, 11, 0, 0, 7); ctx.fill();
  ctx.rotate(angle);

  ctx.fillStyle = '#3a3a42'; ctx.fillRect(10, -3 + bob * 0.4, 14, 6);
  ctx.fillStyle = '#ffe9a3'; ctx.fillRect(23, -3 + bob * 0.4, 3, 6);
  ctx.strokeStyle = '#1a1a20'; ctx.lineWidth = 1.6;
  ctx.fillStyle = '#5a5a68';
  ctx.beginPath(); ctx.ellipse(8, -6 + bob * 0.5, 7, 3.4, -0.35, 0, 7); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(8, 6 - bob * 0.5, 7, 3.4, 0.35, 0, 7); ctx.fill(); ctx.stroke();
  const bg = ctx.createLinearGradient(-8, -9, 4, 9);
  bg.addColorStop(0, '#6e6e80'); bg.addColorStop(1, '#41414e');
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.ellipse(0, 0, 9.5, 11.5, 0, 0, 7); ctx.fill(); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,.12)';
  ctx.beginPath(); ctx.ellipse(-2, -4, 5, 4, 0, 0, 7); ctx.fill();
  ctx.fillStyle = '#e8bd90'; ctx.beginPath(); ctx.arc(1, 0, 6.4, 0, 7); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#3a2c1e';
  ctx.beginPath(); ctx.arc(-0.6, 0, 6.4, Math.PI * 0.62, Math.PI * 1.38);

  ctx.restore();
}

function drawExitTile(cx, cy, t, open) {
  const ex = cx - T / 2, ey = cy - T / 2;
  const gl = ctx.createRadialGradient(cx, cy, 4, cx, cy, 50);
  gl.addColorStop(0, open ? 'rgba(90,255,120,.5)' : 'rgba(90,60,30,.3)'); gl.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = gl; ctx.fillRect(ex - 28, ey - 28, T + 56, T + 56);
  ctx.fillStyle = open ? '#1d4a24' : '#2c2016';
  ctx.fillRect(ex + 6, ey + 2, T - 12, T - 4);
  ctx.strokeStyle = open ? '#5aff78' : '#5a4a3a'; ctx.lineWidth = 2.5;
  ctx.strokeRect(ex + 6, ey + 2, T - 12, T - 4);
  ctx.fillStyle = open ? 'rgba(160,255,180,' + (0.5 + 0.3 * Math.sin(t * 4)) + ')' : '#493a2a';
  ctx.fillRect(cx - 2, ey + 6, 4, T - 12);
  ctx.fillStyle = open ? '#c8ffd4' : '#6a5a48';

function titleCard(alpha, shake, t, t0) {
  if (alpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = "bold 88px 'Microsoft JhengHei', 'PingFang TC', sans-serif";
  ctx.textAlign = 'left';
  const text = 'жҡ—гҖҖйҖ”';
  const chars = [...text];
  const ws = chars.map(c => ctx.measureText(c).width);
  const totalW = ws.reduce((a, b) => a + b, 0);
  let x = GAME_W / 2 - totalW / 2;
  const tt = t0 == null ? 1e9 : t - t0;
  for (let i = 0; i < chars.length; i++) {
    const p = t0 == null ? 1 : clamp((tt - i * 0.3) / 0.5, 0, 1);
    if (p > 0 && chars[i] !== 'гҖҖ') {
      const jx = (Math.random() - 0.5) * (shake + (1 - p) * 6);
      const jy = (Math.random() - 0.5) * (shake + (1 - p) * 6);
      const a2 = alpha * (p < 1 ? p * (0.7 + Math.random() * 0.3) : 1);
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = a2 * 0.9;
      ctx.drawImage(redGlowCv, x + ws[i] / 2 - 96 + jx, GAME_H / 2 - 30 - 96 + jy, 192, 192);
      ctx.restore();
      ctx.globalAlpha = a2;
      ctx.fillStyle = '#c8b98a';
      ctx.fillText(chars[i], x + jx, GAME_H / 2 + jy);
    }
    x += ws[i];
  }
  // е…үжҡҲжҺғйҒҺ
  if (t0 != null) {
    const sw = (tt - 1.4) / 1.1;
    if (sw > 0 && sw < 1) {
      const bandX = GAME_W / 2 - totalW / 2 - 60 + (totalW + 120) * sw;
      const bg = ctx.createLinearGradient(bandX - 50, 0, bandX + 50, 0);
      bg.addColorStop(0, 'rgba(255,240,210,0)');
      bg.addColorStop(0.5, 'rgba(255,240,210,0.55)');
      bg.addColorStop(1, 'rgba(255,240,210,0)');
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = alpha;
      ctx.fillStyle = bg;
      ctx.fillText(text, GAME_W / 2 - totalW / 2, GAME_H / 2);
      ctx.globalCompositeOperation = 'source-over';
    }
  }
  ctx.restore();
}

      const watched = Math.sin(dt2 * 3) > -0.3;
      drawStitchedDoll(GAME_W / 2, GAME_H * 0.42, 0.5, 0.9, watched);
      subtitle('зё«еҗҲеӮҖе„Ўпјҡз·ҠзӣҜи‘—е®ғпјҢе®ғжүҚдёҚжңғйқ иҝ‘', clamp((dt2 - 0.1) / 0.5, 0, 1), false);
    }

  } else if (t < 100) {
    // Scene 4: зңҹеҜҰйҒҠзҺ©з•«йқўвҖ”вҖ”иў«зҷјзҸҫеҫҢжӢ”и…ҝйҖғи·‘
    const runT = t - 93;
    ctx.fillStyle = '#0a0806';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    const shake = clamp(runT / 0.5, 0, 1) * 10;
    drawGameplayFootage(GAME_W / 2, GAME_H / 2, 818 * 1.06, 460 * 1.06, runT, 2.2, 1, shake);
    gameplayFrameLabel(1);
    redVignette(clamp(runT / 2, 0, 0.25));
    if (t > 93.2 && t < 95.2) subtitle('е®ғзҷјзҸҫдҪ дәҶвҖ”вҖ”еҝ«и·‘пјҒ', clamp((t - 93.2) / 0.5, 0, 1), false);
    if (t > 95.4 && t < 97.8) subtitle('и…іжӯҘиҒІгҖҒеҝғи·іиҒІпјҢйӣўдҪ и¶ҠдҫҶи¶Ҡиҝ‘', clamp((t - 95.4) / 0.5, 0, 1), false);
    if (t > 97.8) subtitle('иҪүеҖӢеҪҺпјҢз”©й–Ӣе®ғзҡ„иҰ–з·ҡ', clamp((t - 97.8) / 0.5, 0, 1), false);
    cue('c4', () => { stinger(); braam(0.36, 1.6); punch = 0.07; shakeAmp = 12; flashA = 0.4; });

  } else if (t < 107) {
    // Scene 5: ж”¶йӣҶй‘°еҢҷ
    // йҒҠжҲІеҗҢж¬ҫдҝҜиҰ–е ҙжҷҜпјҡе…үеңҲиЈЎжө®зҸҫ 3 жҠҠй‘°еҢҷ
    drawTopDownRoom();
    const p5x = GAME_W / 2, p5y = GAME_H * 0.78;
    const keys = 3;
    for (let i = 0; i < keys; i++) {
      const kt = clamp((t - 100.6 - i * 1.4) / 0.5, 0, 1);
      if (kt <= 0) continue;
      const kx = p5x + (i - 1) * 105;
      const ky = GAME_H * (i === 1 ? 0.42 : 0.5) - Math.sin(t * 2 + i) * 4;
      drawKey(kx, ky, 26, kt);
      if (kt >= 1) cue('key' + i, () => keyPickup());
    }
    drawPlayerTop(p5x, p5y, -Math.PI / 2, t, true);
    applyGameLight(p5x, p5y, -Math.PI / 2, flicker, 0.75);
    if (t > 100.8 && t < 104) subtitle('з”©й–Ӣе®ғпјҢжүҫеҲ° 3 жҠҠй‘°еҢҷ', clamp((t - 100.8) / 0.6, 0, 1), false);
    if (t > 104) subtitle('жүҚиғҪжү“й–ӢйҖҡеҫҖиҮӘз”ұзҡ„й–Җ', clamp((t - 104) / 0.6, 0, 1), false);

  } else if (t < 114) {
    // Scene 6: йҖғеҮәеҺ»
    // йҒҠжҲІеҗҢж¬ҫдҝҜиҰ–е ҙжҷҜпјҡз¶ иүІеҮәеҸЈй–ҖпјҲйҒҠжҲІеҗҢж¬ҫз№ӘиЈҪпјүеңЁе…үеңҲзӣЎй ӯзҷјдә®
    drawTopDownRoom();
    const p6x = GAME_W / 2, p6y = GAME_H * 0.74;
    drawExitTile(p6x, GAME_H * 0.34, t, t > 107.6);
    drawPlayerTop(p6x, p6y, -Math.PI / 2, t, true);
    applyGameLight(p6x, p6y, -Math.PI / 2, flicker);
    if (t > 107.4 && t < 110) subtitle('жҠөйҒ”з¶ иүІеҮәеҸЈпјҢйҖғйӣўйҖҷиЈЎ', clamp((t - 107.4) / 0.6, 0, 1), false);
    if (t > 110 && t < 112) subtitle('жҸЎз·ҠжүӢйӣ»зӯ’пјҢеұҸдҪҸе‘јеҗёвҖ”вҖ”', clamp((t - 110) / 0.6, 0, 1), false);
    if (t > 112) redVignette(clamp((t - 112) / 1.5, 0, 0.35));
    if (t > 112) subtitle('дҪ зҡ„йҒёж“ҮпјҢе°Үжұәе®ҡдҪ иғҪдёҚиғҪжҙ»и‘—зңӢеҲ°й»ҺжҳҺ', clamp((t - 112) / 0.6, 0, 1), false);

  } else {
    // Scene 7: ж”¶е°ҫиҲҮиЎҢеӢ•е‘јзұІ
    ctx.fillStyle = '#0f0b08';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    titleCard(1, 0, t, 114.3);
    if (t > 115 && t < 117.5) subtitle('дҪ зҡ„йҒёж“ҮпјҢе°Үжұәе®ҡдҪ зҡ„е‘ҪйҒӢ', clamp((t - 115) / 0.8, 0, 1), false);
    if (t > 117.5) subtitle('зҸҫеңЁе°ұжҢ‘жҲ°гҖҠжҡ—йҖ”гҖӢ', clamp((t - 117.5) / 0.8, 0, 1), true);
    cue('cEnd', () => { chime(); braam(0.5, 2.4); thump(0.6); punch = 0.06; shakeAmp = 9; flashA = 0.45; });
  }

  // v6 е…үйҢҗеЎөеҹғпјҲиө°е»Ҡе ҙжҷҜпјү
  if (t < 7 || (t >= 15 && t < 63) || (t >= 100 && t < 114)) drawDust(t, 0.5);

  ctx.restore(); // йҒӢйҸЎзөҗжқҹ

  // v6 е№•й–“иҪүе ҙпјҡй»‘е ҙеҝ«еҲҮпјӢriser
  let fadeA = 0;
  for (const b of [7, 15, 54, 63, 70, 77, 84, 93, 100, 107, 114]) {
    const d = t - b;
    if (d >= -0.22 && d < 0) fadeA = Math.max(fadeA, (d + 0.22) / 0.22 * 0.92);
    if (d >= 0 && d < 0.3) fadeA = Math.max(fadeA, (1 - d / 0.3) * 0.92);
    if (d >= -0.02 && d < 0.2) cue('cut' + b, () => thump(0.3));
  }
  for (const rb of [5.7, 61.7, 91.7, 112.7]) {
    if (t >= rb && t < rb + 0.25) cue('rs' + rb, () => riser(1.3));
  }
  if (t < 0.8) fadeA = Math.max(fadeA, 1 - t / 0.8);
  if (fadeA > 0) { ctx.fillStyle = `rgba(1,1,1,${clamp(fadeA, 0, 1)})`; ctx.fillRect(0, 0, GAME_W, GAME_H); }
  if (flashA > 0) { ctx.fillStyle = `rgba(255,240,228,${clamp(flashA, 0, 1)})`; ctx.fillRect(0, 0, GAME_W, GAME_H); }

  // v6 VHS йЎҶзІ’пјӢжҺғжҸҸз·ҡ
  grainIdx = (grainIdx + 1) % 3;
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.drawImage(grainCvs[grainIdx], Math.random() * -40, Math.random() * -40, GAME_W + 80, GAME_H + 80);
  ctx.restore();
  ctx.drawImage(scanCv, 0, 0);

  // v6 letterbox й»‘йӮҠ
  const lb = 40 * easeOut(clamp(t / 1.4, 0, 1));
  ctx.fillStyle = '#010101';
  ctx.fillRect(0, 0, GAME_W, lb);
  ctx.fillRect(0, GAME_H - lb, GAME_W, lb);
  ctx.fillStyle = 'rgba(150,60,50,0.28)';
  ctx.fillRect(0, lb - 1, GAME_W, 1);
  ctx.fillRect(0, GAME_H - lb, GAME_W, 1);
}

// ---------- ж’ӯж”ҫжҺ§еҲ¶ ----------
let startTime = null;
let playing = false;

function loop(now) {
  if (!playing) return;
  if (startTime === null) startTime = now;
  const t = (now - startTime) / 1000;
  punch = Math.max(0, punch - 0.005);
  flashA = Math.max(0, flashA - 0.045);
  shakeAmp = Math.max(0, shakeAmp - 0.6);
  // v6 еҝғи·ідҪҺйҹіи„ҲиЎқпјҲжҖӘзү©иҲҮиҝҪйҖҗж®өиҗҪпјү
  const hb = Math.floor(t / 0.9);
  if (hb !== lastHb && t >= 54 && t < 114) { lastHb = hb; thump(hb % 2 ? 0.12 : 0.2); }
  if (t >= TIMELINE) {
    draw(TIMELINE - 0.01);
    playing = false;
    replayBtn.style.display = 'block';
    return;
  }
  draw(t);
  requestAnimationFrame(loop);
}

function play() {
  startTime = null;
  playing = true;
  punch = 0; flashA = 0; shakeAmp = 0; lastHb = -1;
  replayBtn.style.display = 'none';
  Object.keys(firedCues).forEach(k => delete firedCues[k]);
  tryResumeAC();
  requestAnimationFrame(loop);
}

replayBtn.addEventListener('click', play);
play();
</script>
