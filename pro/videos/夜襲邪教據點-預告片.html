<!DOCTYPE html>
<!-- 專業AI升級 v6 -->
<!-- v6：自動播放＋letterbox、月光冷色調與飄霧層、逐字標題浮現＋光暈、偷襲zoom-punch/閃白、夜風+蟋蟀環境音與低音鼓點/riser/braam/結尾定音（母線壓縮＋殘響），聲音預設開啟 -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="author" content="AI未來創作營隊">
<title>夜襲：邪教據點 預告片</title>
<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #060b08;
    font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  canvas { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
  #soundBtn {
    position: fixed; top: 12px; right: 12px; z-index: 20;
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(20,30,20,0.7); border: 1px solid rgba(201,161,90,0.7);
    color: #e7e2d2; font-size: 20px; cursor: pointer;
  }
  #soundHint {
    position: fixed; top: 18px; right: 68px; z-index: 20;
    color: #dcd6c2; font-size: 14px; text-shadow: 0 0 4px #000;
    animation: hintFade 3.2s ease forwards;
    pointer-events: none;
  }
  @keyframes hintFade { 0%{opacity:0} 15%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
  #replayBtn {
    position: fixed; left: 50%; bottom: 12%; transform: translateX(-50%);
    z-index: 20; display: none;
    padding: 14px 42px; font-size: 20px; min-height: 48px;
    background: #16281a; color: #e7e2d2;
    border: 1px solid #c9a15a; border-radius: 6px; cursor: pointer;
    font-family: inherit;
  }
  #cover {
    position: fixed; inset: 0; z-index: 30;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #16281a 0%, #060b08 75%);
    cursor: pointer;
  }
  #cover .badge {
    color: #c9a15a; font-size: 14px; letter-spacing: 4px; margin-bottom: 14px;
    text-shadow: 0 0 8px rgba(0,0,0,0.8);
  }
  #cover h1 {
    color: #e7e2d2; font-size: clamp(28px, 6vw, 48px); margin: 0 0 10px;
    text-shadow: 0 0 12px rgba(0,0,0,0.9), 0 0 24px rgba(239,138,61,0.35);
    text-align: center;
  }
  #cover p {
    color: #9fae9c; font-size: clamp(13px, 2.4vw, 17px); margin: 0 0 30px;
    text-align: center; padding: 0 20px;
  }
  #cover .playBtn {
    width: 78px; height: 78px; border-radius: 50%;
    background: rgba(201,161,90,0.15); border: 2px solid #c9a15a;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 24px rgba(201,161,90,0.35);
    transition: transform 0.15s ease;
  }
  #cover:active .playBtn { transform: scale(0.94); }
  #cover .playBtn::after {
    content: ''; width: 0; height: 0; margin-left: 6px;
    border-top: 16px solid transparent; border-bottom: 16px solid transparent;
    border-left: 26px solid #ffd27a;
  }
  #cover .tap { color: #6f7d6c; font-size: 13px; margin-top: 18px; }
</style>
</head>
<body>
<div id="cover">
  <div class="badge">教學影片</div>
  <h1>夜襲：邪教據點</h1>
  <p>月夜潛行教學：怎麼移動、怎麼避開視線錐、怎麼繞背偷襲</p>
  <div class="playBtn"></div>
  <div class="tap">點擊開始播放（含字幕與音效）</div>
</div>
<button id="soundBtn">🔊</button>
<div id="soundHint">聲音已開啟 🎧 建議戴耳機</div>
<button id="replayBtn">重新播放</button>
<canvas id="stage"></canvas>

<script>
'use strict';
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const soundBtn = document.getElementById('soundBtn');
const replayBtn = document.getElementById('replayBtn');
const cover = document.getElementById('cover');

function resize() {
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', resize); resize();

const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const rnd = (a, b) => a + Math.random() * (b - a);
const lerp = (a, b, t) => a + (b - a) * t;
const easeInOut = t => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

// ---------- 音效（沿用遊戲手感）----------
let AC = null, master = null, muted = false;
function audio() {
  if (!AC) {
    try {
      AC = new (window.AudioContext || window.webkitAudioContext)();
      master = AC.createGain(); master.gain.value = muted ? 0 : 0.85;
      const comp = AC.createDynamicsCompressor();
      comp.threshold.value = -12; comp.knee.value = 24; comp.ratio.value = 8;
      comp.attack.value = 0.003; comp.release.value = 0.2;
      master.connect(comp); comp.connect(AC.destination);
      // v6：程序化殘響 send（夜間空曠感）
      const verb = AC.createConvolver();
      const sr = AC.sampleRate, n = Math.floor(sr * 2.0);
      const buf = AC.createBuffer(2, n, sr);
      for (let c = 0; c < 2; c++) { const d = buf.getChannelData(c);
        for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 2.8); }
      verb.buffer = buf;
      const send = AC.createGain(); send.gain.value = 0.24;
      master.connect(send); send.connect(verb); verb.connect(comp);
      startAmbience();
    } catch (err) { AC = null; }
  }
  if (AC && AC.state === 'suspended') { const p = AC.resume(); if (p && p.catch) p.catch(() => {}); }
  return AC;
}
/* v6 夜間環境音：風聲循環＋蟋蟀唧唧 */
let ambienceOn = false, cricketTimer = null;
function startAmbience() {
  if (ambienceOn || !AC) return;
  ambienceOn = true;
  const len = Math.floor(AC.sampleRate * 2.5);
  const buf = AC.createBuffer(1, len, AC.sampleRate);
  const d = buf.getChannelData(0);
  let v = 0;
  for (let i = 0; i < len; i++) { v = v * 0.98 + (Math.random() * 2 - 1) * 0.02; d[i] = v * 8; }
  const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
  const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 420;
  const g = AC.createGain(); g.gain.value = 0.05;
  const lfo = AC.createOscillator(); lfo.frequency.value = 0.13;
  const lfoG = AC.createGain(); lfoG.gain.value = 0.025;
  lfo.connect(lfoG); lfoG.connect(g.gain);
  src.connect(lp); lp.connect(g); g.connect(master);
  src.start(); lfo.start();
  cricketTimer = setInterval(() => {
    if (!AC || muted || Math.random() < 0.35) return;
    const t0 = AC.currentTime;
    for (let k = 0; k < 3 + (Math.random() * 3 | 0); k++) {
      const o = AC.createOscillator(), cg = AC.createGain();
      o.type = 'sine'; o.frequency.value = 4200 + Math.random() * 500;
      const ts = t0 + k * 0.07;
      cg.gain.setValueAtTime(0.0001, ts);
      cg.gain.exponentialRampToValueAtTime(0.022, ts + 0.012);
      cg.gain.exponentialRampToValueAtTime(0.0001, ts + 0.05);
      o.connect(cg); cg.connect(master);
      o.start(ts); o.stop(ts + 0.06);
    }
  }, 1400);
}
/* v6 預告片重音 */
function sfxBoom(vol) {
  const ac = audio(); if (!ac || muted) return;
  const t = ac.currentTime;
  const o = ac.createOscillator(), g = ac.createGain();
  o.frequency.setValueAtTime(110, t);
  o.frequency.exponentialRampToValueAtTime(34, t + 0.45);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
  o.connect(g).connect(master); o.start(t); o.stop(t + 0.65);
}
function sfxBraam(vol, dur) {
  const ac = audio(); if (!ac || muted) return;
  const t = ac.currentTime;
  const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.Q.value = 3;
  lp.frequency.setValueAtTime(160, t);
  lp.frequency.linearRampToValueAtTime(900, t + dur * 0.35);
  lp.frequency.linearRampToValueAtTime(200, t + dur);
  const g = ac.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.09);
  g.gain.setValueAtTime(vol, t + dur * 0.55);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  lp.connect(g); g.connect(master);
  [1, 1.007, 0.993, 2.002].forEach(m => {
    const o = ac.createOscillator(); o.type = 'sawtooth'; o.frequency.value = 52 * m;
    o.connect(lp); o.start(t); o.stop(t + dur + 0.05);
  });
}
function sfxRiser(dur) {
  const ac = audio(); if (!ac || muted) return;
  const t = ac.currentTime;
  const len = Math.floor(ac.sampleRate * (dur + 0.1));
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = ac.createBufferSource(); src.buffer = buf;
  const bp = ac.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.5;
  bp.frequency.setValueAtTime(240, t);
  bp.frequency.exponentialRampToValueAtTime(3600, t + dur);
  const g = ac.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.22, t + dur);
  g.gain.linearRampToValueAtTime(0.0001, t + dur + 0.06);
  src.connect(bp); bp.connect(g); g.connect(master); src.start(t);
}
function sfxSting() { sfxBoom(0.7); sfxBraam(0.42, 2.0); setTimeout(() => sfx.night(), 200); }
function setMuted(m) { muted = m; if (master) master.gain.value = muted ? 0 : 0.85; }
function beep(freq, dur, type, vol, slide) {
  const ac = audio(); if (!ac || muted) return;
  freq *= 1 + (Math.random() * 2 - 1) * 0.04;
  type = type || 'square'; vol = vol || 0.13; slide = slide || 0;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, ac.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), ac.currentTime + dur);
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g).connect(master);
  o.start(); o.stop(ac.currentTime + dur);
}
function noise(dur, vol) {
  const ac = audio(); if (!ac || muted) return;
  const len = Math.max(1, Math.floor(ac.sampleRate * dur));
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ac.createBufferSource(), g = ac.createGain();
  src.buffer = buf;
  g.gain.setValueAtTime(vol || 0.09, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  src.connect(g).connect(master);
  src.start();
}
const sfx = {
  swing() { noise(0.08, 0.07); beep(300, 0.07, 'triangle', 0.05, -120); },
  hit() { beep(210, 0.09, 'square', 0.13, -70); noise(0.05, 0.09); },
  takedown() { beep(140, 0.16, 'sawtooth', 0.14, -60); noise(0.12, 0.11); },
  alert() { beep(660, 0.09, 'square', 0.12, 200); setTimeout(() => beep(880, 0.12, 'square', 0.11), 90); },
  loot() { [784, 988, 1319].forEach((f, i) => setTimeout(() => beep(f, 0.12, 'square', 0.1), i * 80)); },
  night() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.14, 'square', 0.1), i * 90)); },
  step() { noise(0.03, 0.03); },
  gong() { beep(110, 0.6, 'sine', 0.16, -20); noise(0.3, 0.05); },
};

// ---------- 調色盤（沿用遊戲配色）----------
const PAL = {
  bg: '#060b08', ground: '#16281a', clearing: '#243d29',
  fire: '#ef8a3d', fireHot: '#ffd27a', amber: '#c9a15a',
  blood: '#8f2f2f', bone: '#d9d3c1', ink: '#e7e2d2', dim: '#9fae9c',
  player: '#2f4d3a', playerTrim: '#c9a15a',
  cult: '#3b2f24', cultTrim: '#8f2f2f', bad: '#e2493f', good: '#8fd07a'
};

let bgTime = 0;
const CAMP = { x: 480, y: 280 };
const FIRE = { x: 480, y: 290 };
const TOTEM = { x: 575, y: 215 };
const TENTS = [{ x: 355, y: 210, r: 0.4 }, { x: 610, y: 350, r: -0.5 }];
const FENCE_R = 185;

// ---------- 地面預繪 ----------
const groundCv = document.createElement('canvas');
groundCv.width = GAME_W; groundCv.height = GAME_H;
(function paintGround() {
  const g = groundCv.getContext('2d');
  const rad = g.createRadialGradient(CAMP.x, CAMP.y, 40, CAMP.x, CAMP.y, 560);
  rad.addColorStop(0, '#375c3c'); rad.addColorStop(0.4, PAL.clearing);
  rad.addColorStop(0.75, PAL.ground); rad.addColorStop(1, '#0c1912');
  g.fillStyle = rad;
  g.fillRect(0, 0, GAME_W, GAME_H);
  g.fillStyle = 'rgba(120,92,58,0.28)';
  g.beginPath(); g.ellipse(CAMP.x, CAMP.y + 10, 190, 120, 0, 0, 6.29); g.fill();
  let seed = 42;
  function prng() { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return (seed % 1000) / 1000; }
  for (let i = 0; i < 2600; i++) {
    const x = prng() * GAME_W, y = prng() * GAME_H, s = prng();
    g.fillStyle = s > 0.5 ? 'rgba(120,158,100,0.32)' : 'rgba(10,20,10,0.35)';
    g.fillRect(x, y, 2, 2);
  }
  g.strokeStyle = 'rgba(120,92,58,0.35)'; g.lineWidth = 26; g.lineCap = 'round';
  g.beginPath(); g.moveTo(90, 500); g.quadraticCurveTo(260, 420, CAMP.x - 60, CAMP.y + 60); g.stroke();
})();

const trees = [];
for (let i = 0; i < 15; i++) {
  const a = (i / 15) * 6.2832 + 0.2;
  trees.push({ x: CAMP.x + Math.cos(a) * rnd(245, 290), y: CAMP.y + Math.sin(a) * rnd(200, 240), s: rnd(0.8, 1.25), ph: rnd(0, 6) });
}
for (let i = 0; i < 10; i++) trees.push({ x: rnd(0, GAME_W), y: Math.random() < 0.5 ? rnd(-10, 40) : rnd(GAME_H - 40, GAME_H + 10), s: rnd(0.9, 1.4), ph: rnd(0, 6) });
const flies = [];
for (let i = 0; i < 9; i++) flies.push({ x: rnd(0, GAME_W), y: rnd(0, GAME_H), ph: rnd(0, 9), sp: rnd(0.5, 1.2) });

function drawTree(t) {
  const sway = Math.sin(bgTime * 0.7 + t.ph) * 3;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(t.x + 8, t.y + 10, 34 * t.s, 14 * t.s, 0, 0, 6.29); ctx.fill();
  for (const [ox, oy, r, col] of [[0, 0, 30, '#122015'], [-14, -8, 20, '#16281a'], [12 + sway, -10, 18, '#1b301f']]) {
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(t.x + ox * t.s, t.y + oy * t.s, r * t.s, 0, 6.29); ctx.fill();
  }
  ctx.fillStyle = 'rgba(170,195,150,0.16)';
  ctx.beginPath(); ctx.arc(t.x + (14 + sway) * t.s, t.y - 14 * t.s, 12 * t.s, 0, 6.29); ctx.fill();
}
function drawTent(tn) {
  ctx.save();
  ctx.translate(tn.x, tn.y); ctx.rotate(tn.r);
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.ellipse(6, 10, 56, 30, 0, 0, 6.29); ctx.fill();
  ctx.fillStyle = '#1c140d';
  ctx.beginPath(); ctx.moveTo(-52, 26); ctx.lineTo(0, -34); ctx.lineTo(52, 26); ctx.closePath(); ctx.fill();
  const fg = ctx.createLinearGradient(-40, 0, 30, 26);
  fg.addColorStop(0, '#5a4530'); fg.addColorStop(1, '#372716');
  ctx.fillStyle = fg;
  ctx.beginPath(); ctx.moveTo(-52, 26); ctx.lineTo(0, -34); ctx.lineTo(14, 26); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-52, 26); ctx.lineTo(0, -34); ctx.lineTo(52, 26); ctx.closePath(); ctx.stroke();
  ctx.strokeStyle = PAL.blood; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, -34); ctx.lineTo(0, 26); ctx.stroke();
  ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1.5;
  for (let i = 1; i < 4; i++) { ctx.beginPath(); ctx.moveTo(-52 + i * 13, 26); ctx.lineTo(-2, -30 + i * 2); ctx.stroke(); }
  ctx.restore();
}
function drawFence() {
  for (let i = 0; i < 26; i++) {
    const a = (i / 26) * 6.2832;
    if (a > 3.5 && a < 4.4) continue;
    const fx = CAMP.x + Math.cos(a) * FENCE_R, fy = CAMP.y + Math.sin(a) * FENCE_R * 0.82;
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.ellipse(fx + 2, fy + 12, 7, 3, 0, 0, 6.29); ctx.fill();
    const wg = ctx.createLinearGradient(fx - 4, 0, fx + 4, 0);
    wg.addColorStop(0, '#1c130c'); wg.addColorStop(0.5, '#3a2a18'); wg.addColorStop(1, '#160f0a');
    ctx.fillStyle = wg;
    ctx.fillRect(fx - 4, fy - 20, 8, 32);
    ctx.fillStyle = '#3a2a18';
    ctx.beginPath(); ctx.moveTo(fx - 5, fy - 20); ctx.lineTo(fx, fy - 27); ctx.lineTo(fx + 5, fy - 20); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(70,55,30,0.8)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(fx - 5, fy - 6); ctx.lineTo(fx + 5, fy - 4); ctx.stroke();
  }
}
function makeRadialSprite(size, rgb, a0) {
  const cv = document.createElement('canvas');
  cv.width = size; cv.height = size;
  const c = cv.getContext('2d');
  const g = c.createRadialGradient(size / 2, size / 2, size * 0.04, size / 2, size / 2, size / 2);
  g.addColorStop(0, 'rgba(' + rgb + ',' + a0 + ')'); g.addColorStop(1, 'rgba(' + rgb + ',0)');
  c.fillStyle = g;
  c.fillRect(0, 0, size, size);
  return cv;
}
const fireGlowCv = makeRadialSprite(256, '255,180,90', 1);
function makeConeSprite(rgb) {
  const cv = document.createElement('canvas');
  cv.width = 256; cv.height = 256;
  const c = cv.getContext('2d');
  const g = c.createRadialGradient(128, 128, 6, 128, 128, 126);
  g.addColorStop(0, 'rgba(' + rgb + ',0.28)'); g.addColorStop(1, 'rgba(' + rgb + ',0)');
  c.fillStyle = g;
  c.beginPath();
  c.moveTo(128, 128);
  c.arc(128, 128, 126, -0.62, 0.62);
  c.closePath(); c.fill();
  return cv;
}
const coneCalm = makeConeSprite('201,161,90');
const coneAlert = makeConeSprite('226,73,63');

/* ---------- v6 飄霧層（烘焙，多橢圓軟霧） ---------- */
const fogCv = (function () {
  const cv = document.createElement('canvas');
  cv.width = 640; cv.height = 260;
  const c = cv.getContext('2d');
  let seed = 7;
  function prng() { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return (seed % 1000) / 1000; }
  for (let i = 0; i < 26; i++) {
    const x = prng() * 640, y = prng() * 260, r = 40 + prng() * 80;
    const g = c.createRadialGradient(x, y, 2, x, y, r);
    g.addColorStop(0, 'rgba(190,215,205,0.05)');
    g.addColorStop(1, 'rgba(190,215,205,0)');
    c.fillStyle = g;
    c.beginPath(); c.arc(x, y, r, 0, 6.29); c.fill();
  }
  return cv;
})();
function drawFog(t) {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const o1 = (t * 14) % (GAME_W + 640) - 640;
  const o2 = (t * 8 + 500) % (GAME_W + 640) - 640;
  ctx.globalAlpha = 0.75;
  ctx.drawImage(fogCv, o1, GAME_H * 0.34);
  ctx.globalAlpha = 0.55;
  ctx.drawImage(fogCv, o2, GAME_H * 0.62);
  ctx.restore();
}
/* ---------- v6 月光冷色調（烘焙覆層） ---------- */
const moonGradeCv = (function () {
  const cv = document.createElement('canvas');
  cv.width = GAME_W; cv.height = GAME_H;
  const c = cv.getContext('2d');
  const lg = c.createLinearGradient(0, 0, GAME_W * 0.4, GAME_H);
  lg.addColorStop(0, 'rgba(90,130,200,0.16)');

    player.face = Math.atan2(guard.y - player.y, guard.x - player.x);
    camX = guard.x; camY = guard.y - 10; camZoom = 1.25;
  } else if (t < 13.6) {
    const p = easeInOut(clamp((t - 9.4) / 4.2, 0, 1));
    const target = cultActors[0];
    const approachAng = target.face + Math.PI; // 從背後靠近
    const guard = cultActors[1];
    player.x = lerp(guard.x + Math.cos(guard.face + 1.3) * 130, target.x + Math.cos(approachAng) * 44, p);
    player.y = lerp(guard.y + Math.sin(guard.face + 1.3) * 100, target.y + Math.sin(approachAng) * 44, p);
    player.face = Math.atan2(target.y - player.y, target.x - player.x);
    camX = lerp(guard.x, target.x - 10, p);
    camY = lerp(guard.y - 10, target.y - 10, p);
    camZoom = lerp(1.25, 1.7, p);
    if (p > 0.97 && !window._stepSfx) { window._stepSfx = true; sfx.step(); }
  } else if (t < 17.0) {
    const target = cultActors[0];
    camX = target.x - 10; camY = target.y - 10; camZoom = 1.7;
    const p = clamp((t - 15.0) / 1.2, 0, 1);
    player.swing = p > 0 && p < 0.6 ? p / 0.6 : 0;
    if (t > 15.15 && !targetKilled) {
      targetKilled = true;
      target.dead = true;
      burst(target.x, target.y - 8, '#d8cfb8', 14, 190, 60);
      flashWhite = 0.45;
      shake = 10;
      punch = 0.09; // v6 zoom-punch
      sfx.swing(); sfxBoom(0.6); sfxBraam(0.3, 1.0);
      setTimeout(() => sfx.takedown(), 90);
    }
  } else if (t < 19.4) {
    const target = cultActors[0];
    camX = target.x - 10; camY = target.y - 10; camZoom = 1.5;
  } else if (t < 22.2) {
    const p = easeInOut(clamp((t - 19.4) / 2.8, 0, 1));
    camX = lerp(cultActors[0].x, TOTEM.x, p);
    camY = lerp(cultActors[0].y, TOTEM.y, p);
    camZoom = lerp(1.5, 1.3, p);
    if (p > 0.05 && !window._gongSfx) { window._gongSfx = true; sfx.gong(); }
  } else if (t < 25.4) {
    const p = easeInOut(clamp((t - 22.2) / 3.2, 0, 1));
    player.x = lerp(player.x, TOTEM.x + 26, p);
    player.y = lerp(player.y, TOTEM.y + 20, p);
    player.face = Math.atan2(TOTEM.y - player.y, TOTEM.x - player.x);
    camX = TOTEM.x; camY = TOTEM.y - 10; camZoom = 1.3;
    if (p > 0.85 && !window._lootSfx) {
      window._lootSfx = true;
      burst(TOTEM.x, TOTEM.y - 20, PAL.fireHot, 20, 200, 100);
      sfx.loot(); sfxBoom(0.5); punch = 0.06; shake = Math.max(shake, 5);
    }
  } else if (t < 28.4) {
    camX = TOTEM.x; camY = TOTEM.y - 10; camZoom = lerp(1.3, 1.1, clamp((t - 25.4) / 3.0, 0, 1));
    titleT = clamp((t - 25.4) / 1.5, 0, 1);
  } else {
    camX = TOTEM.x; camY = TOTEM.y - 10; camZoom = 1.05;
    titleT = 1;
  }

  if (shake > 0) {
    camX += rnd(-shake, shake) * 0.3; camY += rnd(-shake, shake) * 0.3;
    shake = Math.max(0, shake - 0.5);
  }
  camZoom *= (1 + punch); // v6 zoom-punch

  // v6 音樂導演 cues
  if (t > 0.15 && !window._v6open) { window._v6open = true; sfxBraam(0.34, 1.5); sfxBoom(0.5); }
  if (t > 14.0 && !window._v6riser) { window._v6riser = true; sfxRiser(1.1); }
  if (t > 24.4 && !window._v6riser2) { window._v6riser2 = true; sfxRiser(1.0); }
  if (t > 25.5 && !window._v6sting) { window._v6sting = true; sfxSting(); flashWhite = Math.max(flashWhite, 0.3); punch = Math.max(punch, 0.05); }

  drawWorld(camX, camY, camZoom);

  // 前景角色（跟世界同一變換，手動再畫一次以疊在地景上層）
  ctx.save();
  ctx.translate(GAME_W / 2, GAME_H / 2);
  ctx.scale(camZoom, camZoom);
  ctx.translate(-camX, -camY);
  // 5.6-13.6s：畫出示範用的視線錐
  if (t >= 5.6 && t < 13.6) {
    const guard = cultActors[1];
    drawCone(guard.x, guard.y, guard.face, false);
    const target = cultActors[0];
    if (!target.dead) drawCone(target.x, target.y, target.face, false);
  }
  for (const c of cultActors) {
    if (c.dead) {
      drawFigure(c.x, c.y, c.face, { color: PAL.cult, trim: PAL.cultTrim, dead: true });
    } else {
      drawFigure(c.x, c.y, c.face, { color: PAL.cult, trim: PAL.cultTrim, eyes: true, ph: c.ph });
    }
  }
  drawFigure(player.x, player.y, player.face, { color: PAL.player, trim: PAL.playerTrim, walk: t < 13.6, walkT: t, swing: player.swing });
  updateParts(0.016); drawParts();
  ctx.restore();

  // v6 飄霧層＋月光冷色調
  drawFog(t);
  ctx.drawImage(moonGradeCv, 0, 0);

  // 暗角
  const vg = ctx.createRadialGradient(GAME_W / 2, GAME_H / 2, GAME_H * 0.25, GAME_W / 2, GAME_H / 2, GAME_H * 0.75);
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = vg; ctx.fillRect(0, 0, GAME_W, GAME_H);

  if (flashWhite > 0) {
    ctx.globalAlpha = flashWhite;
    ctx.fillStyle = '#fff3d8';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    ctx.globalAlpha = 1;
    flashWhite = Math.max(0, flashWhite - 0.03);
  }

  // 開場標題（0-2.8s，逐字浮現＋光掃）
  if (t < 2.8) {
    const outA = t < 2.2 ? 1 : clamp(1 - (t - 2.2) / 0.6, 0, 1);
    revealTitle('夜襲：邪教據點', GAME_W / 2, GAME_H * 0.24, 40, 0.1, t, PAL.ink, outA);
    ctx.globalAlpha = outA * clamp((t - 0.9) / 0.5, 0, 1);
    ctx.font = '17px sans-serif'; ctx.fillStyle = PAL.dim; ctx.textAlign = 'center';
    ctx.fillText('新手教學：操作方式與獲勝條件', GAME_W / 2, GAME_H * 0.24 + 30);
    ctx.globalAlpha = 1;
  }

  // 操作提示：移動（2.2-5.6s）、攻擊（13.6-17.0s）
  if (t >= 2.2 && t < 5.6) {
    const a = Math.min(clamp((t - 2.2) / 0.4, 0, 1), clamp((5.6 - t) / 0.4, 0, 1));
    drawMoveHint(a);
  }
  if (t >= 13.6 && t < 17.0) {
    const a = Math.min(clamp((t - 13.6) / 0.4, 0, 1), clamp((17.0 - t) / 0.4, 0, 1));
    drawAttackHint(a);
  }

  // 結尾標題卡（25.4-32.0s）
  if (titleT > 0) {
    ctx.globalAlpha = clamp(titleT, 0, 1);
    ctx.fillStyle = 'rgba(6,11,8,0.55)';
    ctx.fillRect(0, GAME_H * 0.6, GAME_W, GAME_H * 0.28);
    ctx.globalAlpha = 1;
    revealTitle('夜襲：邪教據點', GAME_W / 2, GAME_H * 0.69, 36, 25.7, t, PAL.fireHot, clamp(titleT, 0, 1));
    ctx.globalAlpha = clamp(titleT, 0, 1) * clamp((t - 26.6) / 0.5, 0, 1);
    ctx.font = 'bold 16px sans-serif'; ctx.fillStyle = PAL.ink; ctx.textAlign = 'center';
    ctx.fillText('避開視線錐 · 繞背一擊必殺 · 撐過三個夜晚', GAME_W / 2, GAME_H * 0.69 + 30);
    if (t >= 28.4) {
      const p2 = clamp((t - 28.4) / 1.2, 0, 1);
      ctx.globalAlpha = p2 * clamp(titleT, 0, 1);
      ctx.fillStyle = PAL.amber;
      ctx.font = 'bold 20px sans-serif';
      ctx.fillText('▶ 立即遊玩', GAME_W / 2, GAME_H * 0.69 + 62);
    }
    ctx.globalAlpha = 1;
  }

  // v6 letterbox 黑邊
  const lb = 44 * easeInOut(clamp(t / 1.2, 0, 1));
  ctx.fillStyle = '#030503';
  ctx.fillRect(0, 0, GAME_W, lb);
  ctx.fillRect(0, GAME_H - lb, GAME_W, lb);
  ctx.fillStyle = 'rgba(201,161,90,0.3)';
  ctx.fillRect(0, lb - 1, GAME_W, 1);
  ctx.fillRect(0, GAME_H - lb, GAME_W, 1);

  drawSubtitle(t);
}

let startTime = null;
function frame(now) {
  if (startTime === null) startTime = now;
  const t = (now - startTime) / 1000;
  punch = Math.max(0, punch - 0.005);
  if (t >= TOTAL) {
    scene(TOTAL - 0.001);
    ended = true;
    replayBtn.style.display = 'block';
    return;
  }
  scene(t);
  requestAnimationFrame(frame);
}

// 封面：先畫一張靜態預覽（營地全景），點擊後才開始播放
bgTime = 0;
scene(0);

function startPlayback() {
  cover.style.display = 'none';
  audio(); setMuted(false); soundBtn.textContent = '🔊';
  startTime = null;
  requestAnimationFrame(frame);
}
cover.addEventListener('click', startPlayback, { once: true });
/* v6：自動播放（載入即播）；被自動播放政策擋下時，首次互動自動恢復聲音 */
startPlayback();
function v6Resume() { if (AC && AC.state === 'suspended') { const p = AC.resume(); if (p && p.catch) p.catch(() => {}); } }
setTimeout(() => {
  if (AC && AC.state === 'suspended') {
    const h = document.getElementById('soundHint');
    if (h) h.textContent = '點任意處開啟聲音 🎧';
  }
}, 300);
addEventListener('pointerdown', v6Resume);
addEventListener('keydown', v6Resume);

replayBtn.addEventListener('click', () => {
  audio();
  startTime = null; ended = false;
  targetKilled = false; flashWhite = 0; titleT = 0; shake = 0; punch = 0;
  cultActors[0].dead = false;
  parts.length = 0;
  window._stepSfx = false; window._gongSfx = false; window._lootSfx = false;
  window._v6open = false; window._v6riser = false; window._v6riser2 = false; window._v6sting = false;
  player = { x: 90, y: 470, face: -1.1, swing: 0 };
  replayBtn.style.display = 'none';
  requestAnimationFrame(frame);
});

soundBtn.addEventListener('click', () => {
  audio();
  setMuted(!muted);
  soundBtn.textContent = muted ? '🔇' : '🔊';
});
</script>
