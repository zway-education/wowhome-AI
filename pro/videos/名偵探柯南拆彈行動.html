<title>名偵探柯南拆彈行動</title>
<style>
  html,body{margin:0;height:100%;background:#05070d;overflow:hidden;touch-action:none;
    -webkit-user-select:none;user-select:none;font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif}
  #stage{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:block;background:#05070d}
  .btn{position:absolute;z-index:10;border:1px solid rgba(255,255,255,.25);color:#e8ecf4;
    background:rgba(8,12,22,.6);backdrop-filter:blur(4px);border-radius:999px;

  #soundBtn{top:max(14px,env(safe-area-inset-top));right:max(14px,env(safe-area-inset-right))}

  #chapters .chip:active{transform:scale(.96)}

<body>
<canvas id="stage"></canvas>
<button class="btn" id="soundBtn" type="button">聲音：關</button>
<button class="btn" id="menuBtn" type="button">章節</button>
<div id="chapters"></div>

<script>
'use strict';
/* ============================================================
   名偵探柯南拆彈行動（專業AI升級版）
   深夜倉庫・倒數計時・紅線是陷阱・剪斷藍線——
   真相只有一個！最後全體居民飛來慶祝。
   ============================================================ */
const W = 960, H = 540, FY = 470;
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
function resize(){
  const s = Math.min(innerWidth / W, innerHeight / H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = Math.max(1, Math.round(W * s * dpr)); canvas.height = Math.max(1, Math.round(H * s * dpr));
  canvas.style.width = W * s + 'px'; canvas.style.height = H * s + 'px';
  ctx.setTransform(s * dpr, 0, 0, s * dpr, 0, 0);
}
addEventListener('resize', resize); resize();

/* ---------- OpenMoji 向量圖示（內嵌 data URI，零外部資源） ---------- */
function svgImg(body){
  const s = '<svg xmlns="ht' + 'tp://www.w3.org/2000/svg" viewBox="0 0 72 72">' + body + '</svg>';
  const im = new Image();
  im.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(s);
  return im;
}
const IMG_MAG = svgImg(`<g id="color"> <ellipse cx="29.5854" cy="24.8305" rx="11.1656" ry="11.1657" transform="matrix(0.8006 -0.5992 0.5992 0.8006 -8.979 22.6777)" fill="#FFFFFF" stroke="none"/> <path fill="#92D3F5" stroke="none" d="M39,19c-1.6269-2.1743-5.3114-4.6131-8-5c-1.841-0.2648-5,0-5.3126,1.4508 c2.432,0.2232,6.261,1.3933,9.4483,6.0391c2.7047,3.9427,2.9098,7.2606,2.5092,9.5215C40,31,41.7867,22.7243,39,19z"/> <path fill="#D0CFCE" stroke="none" d="M20.717,13.2532c-3.1395,2.3517-5.1766,5.7832-5.7372,9.6663c-0.5584,3.883,0.4286,7.7514,2.7785,10.8927 c4.8528,6.4827,14.0758,7.8101,20.5595,2.9577c6.4832-4.8514,7.8112-14.073,2.9587-20.5591 c-2.3504-3.1402-5.7839-5.1778-9.6668-5.7362C27.7267,9.9161,23.8587,10.9022,20.717,13.2532z M38.1933,18.3883 c2.2813,3.0482,2.696,6.924,1.4434,10.248c-0.6965,1.8514-1.9113,3.5306-3.6095,4.8016c-4.7463,3.5525-11.498,2.58-15.0496-2.166 c-1.7206-2.2992-2.4437-5.1309-2.0341-7.9731c0.41-2.8429,1.8999-5.3554,4.2002-7.0765c2.2984-1.721,5.1298-2.4433,7.9731-2.0341 C33.9592,14.5969,36.4719,16.0889,38.1933,18.3883z"/> <path fill="#3F3F3F" stroke="none" d="M39,42l10,14c0,0,3,4,5,2s0-5,0-5L43,39L39,42z"/> </g> <g id="line"> <ellipse cx="29.5854" cy="24.8305" rx="14.6372" ry="14.6372" transform="matrix(0.8006 -0.5992 0.5992 0.8006 -8.979 22.6778)" fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/> <ellipse cx="29.5854" cy="24.8305" rx="11.1656" ry="11.1657" transform="matrix(0.8006 -0.5992 0.5992 0.8006 -8.979 22.6777)" fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/> <path fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M38.6805,41.7876l4.1839-3.1316l11.6927,15.622c0.8354,1.1162,0.5758,2.7219-0.5795,3.5867l0,0 c-1.1554,0.8647-2.7691,0.661-3.6045-0.4551L38.6805,41.7876z"/> </g>`);

/* ---------- 緩動 ---------- */
const clamp01 = x => Math.max(0, Math.min(1, x));
const lerp = (a, b, t) => a + (b - a) * t;
const eIO = t => t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2, eO = t => 1 - Math.pow(1 - t, 3);
const eI = t => t * t * t, eOB = t => 1 + 2.70158 * Math.pow(t - 1, 3) + 1.70158 * Math.pow(t - 1, 2);
function seg(t, a, b, ez){ return (ez || eIO)(clamp01((t - a) / (b - a))); }
function rnd(i){ const x = Math.sin(i * 127.1 + 311.7) * 43758.5453; return x - Math.floor(x); }

/* ---------- 攝影機 ---------- */
const cam = { x: 0, y: 0, z: 1, tx: 0, ty: 0, tz: 1 };
let shakeMag = 0, shX = 0, shY = 0, flashA = 0;
function camSnap(){ cam.x = cam.tx; cam.y = cam.ty; cam.z = cam.tz; }
function camUpdate(dt){
  const k = 1 - Math.pow(0.02, dt);
  cam.x += (cam.tx - cam.x) * k; cam.y += (cam.ty - cam.y) * k; cam.z += (cam.tz - cam.z) * k;
  shakeMag *= Math.pow(0.0008, dt);
  shX = (Math.random() * 2 - 1) * shakeMag; shY = (Math.random() * 2 - 1) * shakeMag;
  flashA = Math.max(0, flashA - dt * 2.4);
}
function applyCam(f){
  ctx.save();
  ctx.translate(W / 2 + shX * f, H / 2 + shY * f);
  ctx.scale(cam.z, cam.z);
  ctx.translate(-W / 2 - cam.x * f, -H / 2 - cam.y);
}

/* ---------- 音效（Web Audio 合成，預設靜音） ---------- */
let AC = null, master = null, droneG = null, soundOn = false;
function initAudio(){
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  master = AC.createGain(); master.gain.value = 0; master.connect(AC.destination);
  droneG = AC.createGain(); droneG.gain.value = 0.05; droneG.connect(master);
  for (const f of [55, 55.7, 110.4]){
    const o = AC.createOscillator(); o.type = 'sine'; o.frequency.value = f;
    const g = AC.createGain(); g.gain.value = 0.33;
    o.connect(g); g.connect(droneG); o.start();
  }
}
function setSound(on){
  soundOn = on;
  document.getElementById('soundBtn').textContent = on ? '聲音：開' : '聲音：關';
  if (on){
    initAudio();
    if (AC.state === 'suspended') AC.resume();
    master.gain.setTargetAtTime(0.85, AC.currentTime, 0.2);
  } else if (AC) master.gain.setTargetAtTime(0, AC.currentTime, 0.1);
}
document.getElementById('soundBtn').addEventListener('click', () => setSound(!soundOn));
/* 自動開聲：載入即嘗試開啟；若被瀏覽器政策擋住，第一次互動自動補開 */
try { setSound(true); } catch(e) {}
(function(){ const unlockAudio = () => { if (AC && AC.state === 'suspended') AC.resume(); };
  addEventListener('pointerdown', unlockAudio, {once:true}); addEventListener('keydown', unlockAudio, {once:true}); })();
function tone(freq, dur, type, vol, slide, when){
  if (!AC || !soundOn) return;
  const t0 = when || AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, t0);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), t0 + dur);
  g.gain.setValueAtTime(vol || 0.1, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(g); g.connect(master);
  o.start(t0); o.stop(t0 + dur);
}
function noiseBurst(dur, f0, f1, vol){
  if (!AC || !soundOn) return;
  const len = Math.floor(AC.sampleRate * dur);
  const buf = AC.createBuffer(1, len, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = AC.createBufferSource(); src.buffer = buf;
  const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1;
  bp.frequency.setValueAtTime(f0, AC.currentTime);
  bp.frequency.exponentialRampToValueAtTime(f1, AC.currentTime + dur);
  const g = AC.createGain(); g.gain.value = vol;
  src.connect(bp); bp.connect(g); g.connect(master); src.start();
}
const sfx = {
  tick(){ tone(1900, 0.03, 'square', 0.05); tone(950, 0.04, 'sine', 0.06); },
  sting(){ tone(220, 0.7, 'sawtooth', 0.09, -60); tone(233, 0.7, 'sawtooth', 0.09, -60); },
  heart(){ tone(70, 0.12, 'sine', 0.24, -20); setTimeout(() => tone(60, 0.16, 'sine', 0.2, -15), 180); },
  snip(){ noiseBurst(0.08, 2500, 5000, 0.26); tone(3200, 0.05, 'square', 0.1); },
  alarmOff(){ tone(880, 0.4, 'sine', 0.1); setTimeout(() => tone(1174, 0.6, 'sine', 0.1), 180); },
  fanfare(){ [523, 659, 784, 1046].forEach((f, i) => setTimeout(() => tone(f, 0.4, 'triangle', 0.1), i * 130)); },
  whoosh(){ noiseBurst(0.3, 300, 1800, 0.2); },
  pop(){ noiseBurst(0.1, 800, 2400, 0.16); },
  step(){ tone(150, 0.05, 'triangle', 0.05, -40); }
};

/* ---------- 粒子 ---------- */
const parts = [];
function spawnSpark(x, y, n, spd, col){
  for (let i = 0; i < n; i++){
    const a = Math.random() * 6.283, s = (spd || 240) * (0.3 + Math.random() * 0.8);
    parts.push({ k: 'spark', x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: 0.35 + Math.random() * 0.35, max: 0.7, c: col || (Math.random() < 0.5 ? '#ffd166' : '#fff') });
  }
}
function spawnDust(x, y, n){
  for (let i = 0; i < n; i++) parts.push({ k: 'dust', x: x + (Math.random() * 2 - 1) * 12, y,
    vx: (Math.random() * 2 - 1) * 60, vy: -20 - Math.random() * 30, life: 0.5, max: 0.5, s: 3 + Math.random() * 4 });
}
const CONF = ['#ff5252', '#ffb300', '#4fc3f7', '#69f0ae', '#e040fb'];
function spawnConfetti(x, y, n, dir){
  for (let i = 0; i < n; i++){
    const a = -Math.PI / 2 + dir * (0.1 + Math.random() * 0.6);
    const s = 300 + Math.random() * 380;
    parts.push({ k: 'conf', x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: 2.6 + Math.random() * 1.4, max: 4, rot: Math.random() * 6.28, vr: (Math.random() * 2 - 1) * 9,
      ph: Math.random() * 6.28, c: CONF[(Math.random() * CONF.length) | 0], w: 6 + Math.random() * 4, h: 4 + Math.random() * 3 });
  }
}
function updateParts(dt){
  for (const p of parts){
    p.life -= dt;
    if (p.k === 'conf'){
      p.vy += 240 * dt; p.vx *= Math.pow(0.35, dt); p.vy = Math.min(p.vy, 140);
      p.ph += dt * 7; p.x += (p.vx + Math.sin(p.ph) * 40) * dt; p.y += p.vy * dt; p.rot += p.vr * dt;
    } else if (p.k === 'spark'){
      p.vy += 500 * dt; p.x += p.vx * dt; p.y += p.vy * dt;
    } else { p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= Math.pow(0.2, dt); }
  }
  for (let i = parts.length - 1; i >= 0; i--) if (parts[i].life <= 0) parts.splice(i, 1);
  if (parts.length > 600) parts.splice(0, parts.length - 600);
}
function drawParts(g){
  for (const p of parts){
    const a = clamp01(p.life / (p.max * 0.5));
    if (p.k === 'spark'){
      g.globalAlpha = a; g.strokeStyle = p.c; g.lineWidth = 2; g.lineCap = 'round';
      g.beginPath(); g.moveTo(p.x, p.y); g.lineTo(p.x - p.vx * 0.03, p.y - p.vy * 0.03); g.stroke();
    } else if (p.k === 'conf'){
      g.globalAlpha = Math.min(1, a * 1.4);
      g.save(); g.translate(p.x, p.y); g.rotate(p.rot);
      g.scale(1, Math.abs(Math.sin(p.ph)) * 0.8 + 0.2);
      g.fillStyle = p.c; g.fillRect(-p.w / 2, -p.h / 2, p.w, p.h); g.restore();
    } else {
      g.globalAlpha = a * 0.4; g.fillStyle = '#8b95a8';
      g.beginPath(); g.arc(p.x, p.y, p.s * (1.5 - a * 0.5), 0, 6.283); g.fill();
    }
  }
  g.globalAlpha = 1;
}

/* ---------- 倉庫背景 ---------- */
let wall = 0, alertLv = 0;
/* v3：靜態漸層快取（避免每幀重建 ~12 個 gradient） */
let G_back = null, G_winG = null, G_floor = null, G_lamp = null, G_alert = null;
const G_beam = {}, G_crate = {};
function gradInit(){
  if (G_back) return;
  G_back = ctx.createLinearGradient(0, 0, 0, 420);
  G_back.addColorStop(0, '#101827'); G_back.addColorStop(1, '#1a2233');
  G_winG = ctx.createLinearGradient(0, 42, 0, 168);
  G_winG.addColorStop(0, '#2c3f5e'); G_winG.addColorStop(1, '#18253c');
  for (const wx of [90, 400, 710]){
    const bg = ctx.createLinearGradient(wx + 100, 160, wx + 30, 470);
    bg.addColorStop(0, 'rgba(140,170,220,0.10)'); bg.addColorStop(1, 'rgba(140,170,220,0)');
    G_beam[wx] = bg;
  }
  for (const [bx, by, , bh] of [[60, 330, 120, 96], [150, 366, 100, 60], [806, 340, 130, 86], [742, 384, 96, 42]]){
    const cg = ctx.createLinearGradient(bx, by, bx, by + bh);
    cg.addColorStop(0, '#4a3b28'); cg.addColorStop(1, '#332818');
    G_crate[bx] = cg;
  }
  G_floor = ctx.createLinearGradient(0, 426, 0, 540);
  G_floor.addColorStop(0, '#2b2f38'); G_floor.addColorStop(1, '#171b22');
  G_lamp = ctx.createLinearGradient(0, 104, 0, 470);
  G_lamp.addColorStop(0, 'rgba(255,233,176,0.13)'); G_lamp.addColorStop(1, 'rgba(255,233,176,0)');
  G_alert = ctx.createRadialGradient(W / 2, H / 2, H * 0.3, W / 2, H / 2, H);
  G_alert.addColorStop(0, 'rgba(255,0,0,0)'); G_alert.addColorStop(1, '#ff2222');
}
function drawWarehouse(t){
  gradInit();
  // 後牆
  applyCam(0.85);
  ctx.fillStyle = G_back; ctx.fillRect(-300, -80, 1560, 500);
  // 鐵皮波浪牆
  ctx.strokeStyle = 'rgba(70,86,110,0.35)'; ctx.lineWidth = 3;
  for (let x = -280; x < 1280; x += 42){ ctx.beginPath(); ctx.moveTo(x, -60); ctx.lineTo(x, 300); ctx.stroke(); }
  // 高窗與月光
  for (const wx of [90, 400, 710]){
    ctx.fillStyle = '#0c1420'; ctx.fillRect(wx - 8, 42, 216, 126);
    ctx.fillStyle = G_winG; ctx.fillRect(wx, 50, 200, 110);
    // 警車紅藍光掃過
    const sw = (Math.sin(wall * 1.8 + wx) + 1) / 2;
    ctx.globalAlpha = 0.16 + alertLv * 0.22;
    ctx.fillStyle = sw < 0.5 ? '#e33' : '#39f';
    ctx.fillRect(wx + sw * 150, 50, 50, 110);
    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#0c1420'; ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(wx + 100, 50); ctx.lineTo(wx + 100, 160);
    ctx.moveTo(wx, 105); ctx.lineTo(wx + 200, 105);
    ctx.stroke();
    // 月光斜束
    ctx.fillStyle = G_beam[wx];
    ctx.beginPath(); ctx.moveTo(wx + 8, 160); ctx.lineTo(wx + 192, 160);
    ctx.lineTo(wx + 120, 470); ctx.lineTo(wx - 70, 470); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
  // 中景木箱
  applyCam(0.93);
  for (const [bx, by, bw, bh, tag] of [[60, 330, 120, 96, 0], [150, 366, 100, 60, 1], [806, 340, 130, 86, 0], [742, 384, 96, 42, 0]]){
    ctx.fillStyle = G_crate[bx]; ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = '#241b0f'; ctx.lineWidth = 3; ctx.strokeRect(bx, by, bw, bh);
    ctx.strokeStyle = 'rgba(90,72,46,0.8)'; ctx.lineWidth = 2;
    ctx.strokeRect(bx + 7, by + 7, bw - 14, bh - 14);
    ctx.beginPath(); ctx.moveTo(bx + 7, by + 7); ctx.lineTo(bx + bw - 7, by + bh - 7);
    ctx.moveTo(bx + bw - 7, by + 7); ctx.lineTo(bx + 7, by + bh - 7); ctx.stroke();
    if (tag){
      ctx.fillStyle = '#c9a227'; ctx.font = '700 14px "Noto Sans TC",sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('危險物品', bx + bw / 2, by + bh / 2 + 5);
    }
  }
  ctx.restore();
  // 地面
  applyCam(1);
  ctx.fillStyle = G_floor; ctx.fillRect(-300, 426, 1560, 130);
  ctx.strokeStyle = 'rgba(120,132,150,0.4)'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(-300, 428); ctx.lineTo(1260, 428); ctx.stroke();
  ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1.5;
  for (let i = 0; i < 8; i++){
    const cx0 = -200 + i * 190;
    ctx.beginPath(); ctx.moveTo(cx0, 450 + rnd(i) * 60);
    ctx.lineTo(cx0 + 60, 460 + rnd(i + 4) * 60); ctx.lineTo(cx0 + 110, 445 + rnd(i + 8) * 70); ctx.stroke();
  }
  // 吊燈
  const sw2 = Math.sin(wall * 0.8) * 0.05;
  ctx.save();
  ctx.translate(480, 0); ctx.rotate(sw2);
  ctx.strokeStyle = '#3a4356'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(0, 96); ctx.stroke();
  ctx.fillStyle = '#2c3548';
  ctx.beginPath(); ctx.moveTo(-26, 96); ctx.quadraticCurveTo(0, 76, 26, 96); ctx.lineTo(18, 108); ctx.lineTo(-18, 108); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#1a2233'; ctx.lineWidth = 2; ctx.stroke();

function conanArm(g, p, side){

  const k1x = sx + Math.sin(a) * 17, k1y = sy + Math.cos(a) * 17;

  capC(g, k1x, k1y, hx, hy, 7.5, side === 1 ? '#2255cc' : '#1c48ad', side === 1 ? '#3568e0' : null);
  g.fillStyle = '#ffdcb0'; g.strokeStyle = OUTC; g.lineWidth = 2;

    g.strokeStyle = '#aab4c4'; g.lineWidth = 4; g.lineCap = 'round';

    g.beginPath(); g.moveTo(0, 0); g.lineTo(17, 2 + open * 6); g.stroke();
    g.strokeStyle = '#d33'; g.lineWidth = 5;
    g.beginPath(); g.moveTo(-2, 1); g.lineTo(-10, 6); g.stroke();
    g.restore();

    g.save(); g.translate(hx + 4, hy - 30); g.rotate(-0.5);
    g.drawImage(IMG_MAG, -26, -26, 52, 52);

}

    ctx.globalAlpha = flashA * 0.85;
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }
  if (!vg){

    vg.addColorStop(0, 'rgba(5,7,13,0)'); vg.addColorStop(1, 'rgba(5,7,13,0.55)');

    ctx.globalAlpha = clamp01(t / 0.8) * 0.85;
    ctx.fillStyle = '#4fc3f7'; ctx.textAlign = 'left';
    ctx.font = '700 12px "Noto Sans TC",sans-serif';
    ctx.fillText(sc.act, 16, 17);
    ctx.globalAlpha = 1;
  }
  const total = SCENES.reduce((a, s) => a + s.dur, 0);
  let done = 0; for (let i = 0; i < sceneIdx; i++) done += SCENES[i].dur;
  ctx.fillStyle = 'rgba(255,255,255,0.12)'; ctx.fillRect(0, H - 4, W, 4);
  ctx.fillStyle = '#4fc3f7'; ctx.fillRect(0, H - 4, W * clamp01((done + Math.min(t, sc.dur)) / total), 4);
  let fade = clamp01(t / 0.45);
  if (sceneIdx < SCENES.length - 1) fade = Math.min(fade, clamp01((sc.dur - t) / 0.45));
  if (fade < 1){
    ctx.globalAlpha = 1 - fade;
    ctx.fillStyle = '#03040a'; ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }
}

  { i: 5, label: '第三幕 ・ 全體居民歡慶', tl: 1.2, def: true, hud: true, cut: 1 }
];
const chaptersEl = document.getElementById('chapters');
const menuBtn = document.getElementById('menuBtn');
function closeMenu(){ chaptersEl.classList.remove('open'); }
function jumpTo(ch){
  parts.length = 0;
  ended = false; freeze = 0; lastTickSec = -1; flashA = 0; shakeMag = 0;
  document.getElementById('replayBtn').classList.remove('show');
  startScene(ch.i);
  timeLeft = ch.tl; defused = ch.def; showHud = ch.hud; cutP = ch.cut;
  camSnap();
  closeMenu();
}
CHAPTERS.forEach(ch => {
  const b = document.createElement('button');
  b.className = 'chip'; b.type = 'button'; b.textContent = ch.label;
  b.addEventListener('click', () => jumpTo(ch));
  chaptersEl.appendChild(b);
});
menuBtn.addEventListener('click', () => chaptersEl.classList.toggle('open'));

let last = performance.now();
function frame(now){
  requestAnimationFrame(frame);
  const dtRaw = Math.min((now - last) / 1000, 0.08);
  last = now;
  wall += dtRaw;
  camUpdate(dtRaw);
  const sc = SCENES[sceneIdx];
  let eff = 0;
  if (ended){
    eff = dtRaw;
    if (sc.update) sc.update(sc.dur);
  } else if (freeze > 0){
    freeze -= dtRaw;
  } else {
    const scale = sc.timeScale ? sc.timeScale(tS) : 1;
    eff = dtRaw * scale;
    tS += eff;
    while (sc.evts && sc._evt < sc.evts.length && tS >= sc.evts[sc._evt].t){
      sc.evts[sc._evt].fn(); sc._evt++;
      if (freeze > 0) break;
    }
    if (sc.update) sc.update(Math.min(tS, sc.dur), eff);
    if (tS >= sc.dur){
      if (sceneIdx < SCENES.length - 1) startScene(sceneIdx + 1);
      else { ended = true; tS = sc.dur; document.getElementById('replayBtn').classList.add('show'); }
    }
  }
  updateParts(eff || (ended ? dtRaw : 0));
  const scNow = SCENES[sceneIdx];
  ctx.fillStyle = '#05070d'; ctx.fillRect(0, 0, W, H);
  scNow.draw(Math.min(tS, scNow.dur));
  overlays(scNow, Math.min(tS, scNow.dur));
}
startScene(0);
camSnap();
requestAnimationFrame(frame);
