<!doctype html>
<!-- 專業AI升級 v2 -->
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>名偵探柯南拆彈行動-失敗版</title>
<style>
  html,body{margin:0;height:100%;background:#05070d;overflow:hidden;touch-action:none;
    -webkit-user-select:none;user-select:none;font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif}
  #stage{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:block;background:#05070d}
  .btn{position:absolute;z-index:10;border:1px solid rgba(255,255,255,.25);color:#e8ecf4;
    background:rgba(8,12,22,.6);backdrop-filter:blur(4px);border-radius:999px;
    font-family:inherit;font-size:15px;letter-spacing:.12em;padding:12px 20px;cursor:pointer;
    min-height:48px;min-width:48px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
    transition:all .25s ease}
  .btn:hover{border-color:#ff6b57;color:#ff6b57;transform:translateY(-1px)}
  .btn:active{transform:scale(.94);background:rgba(255,107,87,.3);border-color:#ff6b57;color:#fff;transition:all .06s}
  #soundBtn{top:max(14px,env(safe-area-inset-top));right:max(14px,env(safe-area-inset-right))}
  #replayBtn{left:50%;bottom:12%;transform:translate(-50%,30px);opacity:0;pointer-events:none;
    font-size:18px;font-weight:700;padding:14px 44px;min-height:56px;border:2px solid #ff6b57;color:#ff6b57;
    background:rgba(8,12,22,.8);box-shadow:0 0 24px rgba(255,107,87,.3);letter-spacing:.3em}
  #replayBtn.show{opacity:1;transform:translate(-50%,0);pointer-events:auto}
  #replayBtn:hover{background:#ff6b57;color:#1a0906}
  #replayBtn:active{transform:translate(-50%,0) scale(.94)}
  #hint{position:absolute;z-index:9;top:max(16px,env(safe-area-inset-top));left:50%;
    background:rgba(8,12,22,.8);border:1px solid rgba(255,107,87,.5);color:#e8ecf4;
    border-radius:999px;padding:10px 20px;font-size:14px;letter-spacing:.06em;
    pointer-events:none;opacity:0;transform:translate(-50%,-8px);white-space:nowrap}
  #hint.run{animation:hintio 5.5s ease .5s 1 both}
  @keyframes hintio{0%{opacity:0;transform:translate(-50%,-8px)}
    9%,82%{opacity:1;transform:translate(-50%,0)}100%{opacity:0;transform:translate(-50%,-6px)}}
</style>
</head>
<body>
<canvas id="stage"></canvas>
<button class="btn" id="soundBtn" type="button">聲音：關</button>
<button class="btn" id="replayBtn" type="button">重新播放</button>
<div id="hint" class="run">▶ 自動播放中 ・ 點右上「聲音」開啟音效</div>
<script>
'use strict';
/* ============================================================
   名偵探柯南拆彈行動（失敗版・專業AI升級版）
   同一個倉庫、同一顆炸彈——但這次，名偵探用「點兵點將」
   選了紅線。轟——！搞笑失敗結局，別氣餒，再挑戰一次！
   ============================================================ */
const W = 960, H = 540, FY = 470;
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
function resize(){
  const s = Math.min(innerWidth / W, innerHeight / H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = Math.max(1, Math.round(W * s * dpr)); canvas.height = Math.max(1, Math.round(H * s * dpr));
  canvas.style.width = W * s + 'px'; canvas.style.height = H * s + 'px';
  ctx.setTransform(s * dpr, 0, 0, s * dpr, 0, 0);
}
addEventListener('resize', resize); resize();

/* ---------- 緩動 ---------- */
const clamp01 = x => Math.max(0, Math.min(1, x));
const lerp = (a, b, t) => a + (b - a) * t;
const eIO = t => t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2, eO = t => 1 - Math.pow(1 - t, 3);
const eI = t => t * t * t, eOB = t => 1 + 2.70158 * Math.pow(t - 1, 3) + 1.70158 * Math.pow(t - 1, 2);
function seg(t, a, b, ez){ return (ez || eIO)(clamp01((t - a) / (b - a))); }
function rnd(i){ const x = Math.sin(i * 127.1 + 311.7) * 43758.5453; return x - Math.floor(x); }

/* ---------- 攝影機 ---------- */
const cam = { x: 0, y: 0, z: 1, tx: 0, ty: 0, tz: 1 };
let shakeMag = 0, shX = 0, shY = 0, flashA = 0, flashC = '#fff';
function camSnap(){ cam.x = cam.tx; cam.y = cam.ty; cam.z = cam.tz; }
function camUpdate(dt){
  const k = 1 - Math.pow(0.02, dt);
  cam.x += (cam.tx - cam.x) * k; cam.y += (cam.ty - cam.y) * k; cam.z += (cam.tz - cam.z) * k;
  shakeMag *= Math.pow(0.0008, dt);
  shX = (Math.random() * 2 - 1) * shakeMag; shY = (Math.random() * 2 - 1) * shakeMag;
  flashA = Math.max(0, flashA - dt * 2.0);
}
function applyCam(f){
  ctx.save();
  ctx.translate(W / 2 + shX * f, H / 2 + shY * f);
  ctx.scale(cam.z, cam.z);
  ctx.translate(-W / 2 - cam.x * f, -H / 2 - cam.y);
}

/* ---------- 音效（Web Audio 合成，預設靜音） ---------- */
let AC = null, master = null, soundOn = false;
function initAudio(){
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  master = AC.createGain(); master.gain.value = 0; master.connect(AC.destination);
  const droneG = AC.createGain(); droneG.gain.value = 0.05; droneG.connect(master);
  for (const f of [55, 55.7, 110.4]){
    const o = AC.createOscillator(); o.type = 'sine'; o.frequency.value = f;
    const g = AC.createGain(); g.gain.value = 0.33;
    o.connect(g); g.connect(droneG); o.start();
  }
}
function setSound(on){
  soundOn = on;
  document.getElementById('soundBtn').textContent = on ? '聲音：開' : '聲音：關';
  if (on){
    initAudio();
    if (AC.state === 'suspended') AC.resume();
    master.gain.setTargetAtTime(0.85, AC.currentTime, 0.2);
  } else if (AC) master.gain.setTargetAtTime(0, AC.currentTime, 0.1);
}
document.getElementById('soundBtn').addEventListener('click', () => setSound(!soundOn));
function tone(freq, dur, type, vol, slide, when){
  if (!AC || !soundOn) return;
  const t0 = when || AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, t0);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(20, freq + slide), t0 + dur);
  g.gain.setValueAtTime(vol || 0.1, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(g); g.connect(master);
  o.start(t0); o.stop(t0 + dur);
}
function noiseBurst(dur, f0, f1, vol, type){
  if (!AC || !soundOn) return;
  const len = Math.floor(AC.sampleRate * dur);
  const buf = AC.createBuffer(1, len, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = AC.createBufferSource(); src.buffer = buf;
  const bp = AC.createBiquadFilter(); bp.type = type || 'bandpass'; bp.Q.value = 0.9;
  bp.frequency.setValueAtTime(f0, AC.currentTime);
  bp.frequency.exponentialRampToValueAtTime(f1, AC.currentTime + dur);
  const g = AC.createGain(); g.gain.value = vol;
  src.connect(bp); bp.connect(g); g.connect(master); src.start();
}
const sfx = {
  tick(){ tone(1900, 0.03, 'square', 0.05); tone(950, 0.04, 'sine', 0.06); },
  sting(){ tone(220, 0.7, 'sawtooth', 0.09, -60); tone(233, 0.7, 'sawtooth', 0.09, -60); },
  heart(){ tone(70, 0.12, 'sine', 0.3, -20); setTimeout(() => tone(60, 0.16, 'sine', 0.26, -15), 180); },
  snip(){ noiseBurst(0.08, 2500, 5000, 0.3); tone(3200, 0.05, 'square', 0.1); },
  boom(){ noiseBurst(1.2, 400, 60, 0.5, 'lowpass'); tone(60, 0.9, 'sine', 0.5, -40); tone(38, 1.4, 'sine', 0.4, -15); },
  boing(){ tone(160, 0.3, 'square', 0.07, 320); },
  fall(){ tone(1200, 0.8, 'sine', 0.08, -900); },
  thud(){ tone(90, 0.18, 'sine', 0.35, -50); noiseBurst(0.1, 200, 90, 0.2); },
  err(){ tone(196, 0.25, 'square', 0.1); setTimeout(() => tone(155, 0.4, 'square', 0.1), 260); },
  trombone(){
    [[233, 0], [220, 380], [208, 760], [196, 1140]].forEach(([f, d], i) =>
      setTimeout(() => tone(f, i === 3 ? 1.3 : 0.34, 'sawtooth', 0.1, i === 3 ? -36 : -6), d));
  },
  cough(){ noiseBurst(0.12, 300, 700, 0.18); },
  stamp(){ tone(70, 0.25, 'sine', 0.4, -30); noiseBurst(0.14, 300, 100, 0.25); },
  step(){ tone(150, 0.05, 'triangle', 0.05, -40); },
  question(){ tone(660, 0.16, 'sine', 0.07, 220); }
};

/* ---------- 粒子 ---------- */
const parts = [];
function spawnSpark(x, y, n, spd, col){
  for (let i = 0; i < n; i++){
    const a = Math.random() * 6.283, s = (spd || 240) * (0.3 + Math.random() * 0.8);
    parts.push({ k: 'spark', x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: 0.35 + Math.random() * 0.4, max: 0.75, c: col || (Math.random() < 0.5 ? '#ffd166' : '#fff') });
  }
}
function spawnDust(x, y, n){
  for (let i = 0; i < n; i++) parts.push({ k: 'dust', x: x + (Math.random() * 2 - 1) * 12, y,
    vx: (Math.random() * 2 - 1) * 60, vy: -20 - Math.random() * 30, life: 0.5, max: 0.5, s: 3 + Math.random() * 4 });
}
const DEBC = ['#ff5252', '#ffa726', '#8d6e63', '#bdbdbd', '#37474f'];
function spawnDebris(x, y, n){
  for (let i = 0; i < n; i++){
    const a = -Math.PI + Math.random() * Math.PI * 1.2 - 0.1;
    const s = 180 + Math.random() * 340;
    parts.push({ k: 'deb', x, y, vx: Math.cos(a) * s * (Math.random() < 0.5 ? -1 : 1), vy: -Math.abs(Math.sin(a)) * s - 80,
      life: 2.2 + Math.random(), max: 3, rot: Math.random() * 6.28, vr: (Math.random() * 2 - 1) * 12,
      c: DEBC[(Math.random() * DEBC.length) | 0], s2: 4 + Math.random() * 5 });
  }
}
function spawnSmoke(x, y, n, big){
  for (let i = 0; i < n; i++) parts.push({ k: 'smoke', x: x + (Math.random() * 2 - 1) * 40, y: y + (Math.random() * 2 - 1) * 20,
    vx: (Math.random() * 2 - 1) * 24, vy: -26 - Math.random() * 34,
    life: (big ? 3.2 : 1.6) + Math.random() * 1.6, max: 4.8, s: (big ? 26 : 12) + Math.random() * (big ? 34 : 10) });
}
function spawnTxt(x, y, txt, c, size){
  parts.push({ k: 'txt', x, y, vx: (Math.random() * 2 - 1) * 14, vy: -30, life: 1.3, max: 1.3, txt, c, size: size || 20, ph: Math.random() * 6.28 });
}
function updateParts(dt){
  for (const p of parts){
    p.life -= dt;
    if (p.k === 'deb'){
      p.vy += 620 * dt; p.x += p.vx * dt; p.y += p.vy * dt; p.rot += p.vr * dt;
      if (p.y > FY + 4 && p.vy > 0){ p.y = FY + 4; p.vy *= -0.35; p.vx *= 0.6; }
    } else if (p.k === 'smoke'){
      p.x += p.vx * dt; p.y += p.vy * dt; p.s += dt * 12;
    } else if (p.k === 'spark'){
      p.vy += 500 * dt; p.x += p.vx * dt; p.y += p.vy * dt;
    } else if (p.k === 'txt'){
      p.ph += dt * 4; p.x += (p.vx + Math.sin(p.ph) * 8) * dt; p.y += p.vy * dt;
    } else { p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= Math.pow(0.2, dt); }
  }
  for (let i = parts.length - 1; i >= 0; i--) if (parts[i].life <= 0) parts.splice(i, 1);
  if (parts.length > 600) parts.splice(0, parts.length - 600);
}
function drawParts(g){
  for (const p of parts){
    const a = clamp01(p.life / (p.max * 0.5));
    if (p.k === 'spark'){
      g.globalAlpha = a; g.strokeStyle = p.c; g.lineWidth = 2; g.lineCap = 'round';
      g.beginPath(); g.moveTo(p.x, p.y); g.lineTo(p.x - p.vx * 0.03, p.y - p.vy * 0.03); g.stroke();
    } else if (p.k === 'deb'){
      g.globalAlpha = Math.min(1, a * 1.3);
      g.save(); g.translate(p.x, p.y); g.rotate(p.rot);
      g.fillStyle = p.c; g.fillRect(-p.s2 / 2, -p.s2 / 2, p.s2, p.s2);
      g.strokeStyle = 'rgba(0,0,0,0.4)'; g.lineWidth = 1; g.strokeRect(-p.s2 / 2, -p.s2 / 2, p.s2, p.s2);
      g.restore();
    } else if (p.k === 'smoke'){
      g.globalAlpha = Math.min(0.55, a * 0.55);
      const sg = g.createRadialGradient(p.x, p.y, 1, p.x, p.y, p.s);
      sg.addColorStop(0, 'rgba(120,120,125,0.8)'); sg.addColorStop(1, 'rgba(80,80,85,0)');
      g.fillStyle = sg;
      g.beginPath(); g.arc(p.x, p.y, p.s, 0, 6.283); g.fill();
    } else if (p.k === 'txt'){
      g.globalAlpha = a;
      g.fillStyle = p.c; g.font = '900 ' + p.size + 'px "Noto Sans TC",sans-serif'; g.textAlign = 'center';
      g.fillText(p.txt, p.x, p.y);
    } else {
      g.globalAlpha = a * 0.4; g.fillStyle = '#8b95a8';
      g.beginPath(); g.arc(p.x, p.y, p.s * (1.5 - a * 0.5), 0, 6.283); g.fill();
    }
  }
  g.globalAlpha = 1;
}

/* ---------- 倉庫背景 ---------- */
let wall = 0, alertLv = 0;
function drawWarehouse(t){
  applyCam(0.85);
  let gr = ctx.createLinearGradient(0, 0, 0, 420);
  gr.addColorStop(0, '#101827'); gr.addColorStop(1, '#1a2233');
  ctx.fillStyle = gr; ctx.fillRect(-300, -80, 1560, 500);
  ctx.strokeStyle = 'rgba(70,86,110,0.35)'; ctx.lineWidth = 3;
  for (let x = -280; x < 1280; x += 42){ ctx.beginPath(); ctx.moveTo(x, -60); ctx.lineTo(x, 300); ctx.stroke(); }
  for (const wx of [90, 400, 710]){
    ctx.fillStyle = '#0c1420'; ctx.fillRect(wx - 8, 42, 216, 126);
    gr = ctx.createLinearGradient(0, 42, 0, 168);
    gr.addColorStop(0, '#2c3f5e'); gr.addColorStop(1, '#18253c');
    ctx.fillStyle = gr; ctx.fillRect(wx, 50, 200, 110);
    const sw = (Math.sin(wall * 1.8 + wx) + 1) / 2;
    ctx.globalAlpha = 0.16 + alertLv * 0.22;
    ctx.fillStyle = sw < 0.5 ? '#e33' : '#39f';
    ctx.fillRect(wx + sw * 150, 50, 50, 110);
    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#0c1420'; ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(wx + 100, 50); ctx.lineTo(wx + 100, 160);
    ctx.moveTo(wx, 105); ctx.lineTo(wx + 200, 105);
    ctx.stroke();
    gr = ctx.createLinearGradient(wx + 100, 160, wx + 30, 470);
    gr.addColorStop(0, 'rgba(140,170,220,0.10)'); gr.addColorStop(1, 'rgba(140,170,220,0)');
    ctx.fillStyle = gr;
    ctx.beginPath(); ctx.moveTo(wx + 8, 160); ctx.lineTo(wx + 192, 160);
    ctx.lineTo(wx + 120, 470); ctx.lineTo(wx - 70, 470); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
  applyCam(0.93);
  for (const [bx, by, bw, bh, tag] of [[60, 330, 120, 96, 0], [150, 366, 100, 60, 1], [806, 340, 130, 86, 0], [742, 384, 96, 42, 0]]){
    gr = ctx.createLinearGradient(bx, by, bx, by + bh);
    gr.addColorStop(0, '#4a3b28'); gr.addColorStop(1, '#332818');
    ctx.fillStyle = gr; ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = '#241b0f'; ctx.lineWidth = 3; ctx.strokeRect(bx, by, bw, bh);
    ctx.strokeStyle = 'rgba(90,72,46,0.8)'; ctx.lineWidth = 2;
    ctx.strokeRect(bx + 7, by + 7, bw - 14, bh - 14);
    ctx.beginPath(); ctx.moveTo(bx + 7, by + 7); ctx.lineTo(bx + bw - 7, by + bh - 7);
    ctx.moveTo(bx + bw - 7, by + 7); ctx.lineTo(bx + 7, by + bh - 7); ctx.stroke();
    if (tag){
      ctx.fillStyle = '#c9a227'; ctx.font = '700 14px "Noto Sans TC",sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('危險物品', bx + bw / 2, by + bh / 2 + 5);
    }
  }
  ctx.restore();
  applyCam(1);
  gr = ctx.createLinearGradient(0, 426, 0, 540);
  gr.addColorStop(0, '#2b2f38'); gr.addColorStop(1, '#171b22');
  ctx.fillStyle = gr; ctx.fillRect(-300, 426, 1560, 130);
  ctx.strokeStyle = 'rgba(120,132,150,0.4)'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(-300, 428); ctx.lineTo(1260, 428); ctx.stroke();
  ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1.5;
  for (let i = 0; i < 8; i++){
    const cx0 = -200 + i * 190;
    ctx.beginPath(); ctx.moveTo(cx0, 450 + rnd(i) * 60);
    ctx.lineTo(cx0 + 60, 460 + rnd(i + 4) * 60); ctx.lineTo(cx0 + 110, 445 + rnd(i + 8) * 70); ctx.stroke();
  }
  const sw2 = Math.sin(wall * 0.8) * 0.05 + (shakeMag > 2 ? Math.sin(wall * 30) * 0.1 : 0);
  ctx.save();
  ctx.translate(480, 0); ctx.rotate(sw2);
  ctx.strokeStyle = '#3a4356'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(0, 96); ctx.stroke();
  ctx.fillStyle = '#2c3548';
  ctx.beginPath(); ctx.moveTo(-26, 96); ctx.quadraticCurveTo(0, 76, 26, 96); ctx.lineTo(18, 108); ctx.lineTo(-18, 108); ctx.closePath(); ctx.fill();
  ctx.save(); ctx.shadowColor = '#ffe9b0'; ctx.shadowBlur = 16;
  ctx.fillStyle = '#ffe9b0'; ctx.beginPath(); ctx.arc(0, 104, 7, 0, 6.283); ctx.fill();
  ctx.restore();
  gr = ctx.createLinearGradient(0, 104, 0, 470);
  gr.addColorStop(0, 'rgba(255,233,176,0.13)'); gr.addColorStop(1, 'rgba(255,233,176,0)');
  ctx.fillStyle = gr;
  ctx.beginPath(); ctx.moveTo(-14, 104); ctx.lineTo(14, 104); ctx.lineTo(150, 470); ctx.lineTo(-150, 470); ctx.closePath(); ctx.fill();
  ctx.restore();
  ctx.restore();
}

/* ---------- 炸彈與彈坑 ---------- */
let timeLeft = 20, exploded = false, cutP = 0;
function drawBomb(g, t){
  const bx = 600, by = FY;
  g.save();
  g.translate(bx, by);
  g.globalAlpha = 0.35; g.fillStyle = '#000';
  g.beginPath(); g.ellipse(0, 2, 66, 12, 0, 0, 6.283); g.fill();
  g.globalAlpha = 1;
  const burn = clamp01(1 - timeLeft / 20);
  const fx = -8, fy = -104;
  g.strokeStyle = '#8a6d3b'; g.lineWidth = 6; g.lineCap = 'round';
  g.beginPath(); g.moveTo(0, -96);
  g.quadraticCurveTo(-4, -112, fx + burn * 4, fy + burn * 16);
  g.stroke();
  const sx = fx + burn * 4, sy = fy + burn * 16;
  const fl = 0.8 + 0.25 * Math.sin(wall * 22);
  g.save(); g.shadowColor = '#ff8800'; g.shadowBlur = 18;
  const sg = g.createRadialGradient(sx, sy, 1, sx, sy, 11 * fl);
  sg.addColorStop(0, '#fff'); sg.addColorStop(0.4, '#ffcc00'); sg.addColorStop(0.8, '#ff5500'); sg.addColorStop(1, 'rgba(255,85,0,0)');
  g.fillStyle = sg;
  g.beginPath(); g.arc(sx, sy, 11 * fl, 0, 6.283); g.fill();
  g.restore();
  if (Math.random() < 0.3) spawnSpark(bx + sx, by + sy, 1, 90, '#ffcc00');
  // 球體（剪錯線後會脹大）
  const swell = cutP > 0 ? 1 + eOB(clamp01(cutP)) * 0.1 : 1;
  g.save(); g.scale(swell, swell);
  const bg = g.createRadialGradient(-22, -76, 8, 0, -56, 62);
  bg.addColorStop(0, '#4a4f58'); bg.addColorStop(0.55, '#23262c'); bg.addColorStop(1, '#0c0d10');
  g.fillStyle = bg;
  g.beginPath(); g.arc(0, -52, 56, 0, 6.283); g.fill();
  g.strokeStyle = '#000'; g.lineWidth = 2.5; g.stroke();
  g.fillStyle = 'rgba(255,255,255,0.14)';
  g.beginPath(); g.ellipse(-22, -78, 14, 8, -0.6, 0, 6.283); g.fill();
  g.fillStyle = '#3a3f48';
  g.beginPath(); g.roundRect(-13, -104, 26, 12, 3); g.fill();
  g.strokeStyle = '#14161a'; g.lineWidth = 2; g.stroke();
  g.fillStyle = '#171a20';
  g.beginPath(); g.roundRect(-38, -72, 76, 34, 5); g.fill();
  g.strokeStyle = '#4a5568'; g.lineWidth = 2; g.stroke();
  g.font = '700 20px monospace'; g.textAlign = 'center';
  if (cutP > 0){
    // 面板顯示錯誤
    g.fillStyle = '#ff3333';
    g.save(); g.shadowColor = '#ff3333'; g.shadowBlur = 10;
    g.fillText(['Ｘ Ｘ', '！！', '掰掰'][Math.floor(wall * 4) % 3], 0, -48);
    g.restore();
  } else {
    const mm = Math.floor(Math.max(0, timeLeft) / 60), ss = Math.ceil(Math.max(0, timeLeft)) % 60;
    g.fillStyle = '#ff3333';
    g.save(); g.shadowColor = '#ff3333'; g.shadowBlur = 8;

  }
  const total = SCENES.reduce((a, s) => a + s.dur, 0);
  let done = 0; for (let i = 0; i < sceneIdx; i++) done += SCENES[i].dur;

  ctx.fillStyle = '#ff6b57'; ctx.fillRect(0, H - 4, W * clamp01((done + Math.min(t, sc.dur)) / total), 4);

  if (sceneIdx < SCENES.length - 1) fade = Math.min(fade, clamp01((sc.dur - t) / 0.45));
  if (fade < 1){
    ctx.globalAlpha = 1 - fade;
    ctx.fillStyle = '#03040a'; ctx.fillRect(0, 0, W, H);

  }
}

let sceneIdx = 0, tS = 0, freeze = 0, ended = false;
function startScene(i){
  sceneIdx = i; tS = 0;
  const sc = SCENES[i];
  sc._evt = 0;
  if (sc.init) sc.init();
}
document.getElementById('replayBtn').addEventListener('click', function(){
  this.classList.remove('show');
  parts.length = 0;
  ended = false; freeze = 0; timeLeft = 20; exploded = false; cutP = 0; lastTickSec = -1;
  const hint = document.getElementById('hint');
  hint.classList.remove('run'); void hint.offsetWidth; hint.classList.add('run');
  startScene(0); camSnap();
});

let last = performance.now();
function frame(now){
  requestAnimationFrame(frame);
  const dtRaw = Math.min((now - last) / 1000, 0.08);
  last = now;
  wall += dtRaw;
  camUpdate(dtRaw);
  const sc = SCENES[sceneIdx];
  let eff = 0;
  if (ended){
    eff = dtRaw;
    if (sc.update) sc.update(sc.dur, dtRaw);
  } else if (freeze > 0){
    freeze -= dtRaw;
  } else {
    const scale = sc.timeScale ? sc.timeScale(tS) : 1;
    eff = dtRaw * scale;
    tS += eff;
    while (sc.evts && sc._evt < sc.evts.length && tS >= sc.evts[sc._evt].t){
      sc.evts[sc._evt].fn(); sc._evt++;
      if (freeze > 0) break;
    }
    if (sc.update) sc.update(Math.min(tS, sc.dur), eff);
    if (tS >= sc.dur){
      if (sceneIdx < SCENES.length - 1) startScene(sceneIdx + 1);
      else { ended = true; tS = sc.dur; document.getElementById('replayBtn').classList.add('show'); }
    }
  }
  updateParts(eff || (ended ? dtRaw : 0));
  const scNow = SCENES[sceneIdx];
  ctx.fillStyle = '#05070d'; ctx.fillRect(0, 0, W, H);
  scNow.draw(Math.min(tS, scNow.dur));
  overlays(scNow, Math.min(tS, scNow.dur));
}
startScene(0);
camSnap();
requestAnimationFrame(frame);
</script>
</body>
</html>
