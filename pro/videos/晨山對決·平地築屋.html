<style>

  :root{

<script>
'use strict';
/* ============================================================
   第 1 節　工具與緩動
   ============================================================ */
const clamp = (v, a, b) => v < a ? a : (v > b ? b : v); const lerp = (a, b, t) => a + (b - a) * t;
const seg = (t, a, b) => clamp((t - a) / (b - a), 0, 1); const TAU = Math.PI * 2;
const easeOutCubic = t => 1 - Math.pow(1 - t, 3); const easeInCubic = t => t * t * t;
const easeInQuad = t => t * t; const easeInOutCubic = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
const easeInOutSine = t => -(Math.cos(Math.PI * t) - 1) / 2;
const easeOutBack = t => { const c = 1.70158; return 1 + (c + 1) * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2); };
function hexRgb(h){ return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)]; }
function mixc(h1, h2, t){
  const a = hexRgb(h1), b = hexRgb(h2);
  return 'rgb(' + Math.round(lerp(a[0], b[0], t)) + ',' + Math.round(lerp(a[1], b[1], t)) + ',' + Math.round(lerp(a[2], b[2], t)) + ')';
}

const W = 960, H = 540; const canvas = document.getElementById('stage'); const ctx = canvas.getContext('2d');
function resize(){
  const scale = Math.min(innerWidth / W, innerHeight / H) * 0.96; const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = Math.round(W * scale * dpr); canvas.height = Math.round(H * scale * dpr);
  canvas.style.width = W * scale + 'px'; canvas.style.height = H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', resize); resize();

/* ---- 靜態漸層快取（v3：初始化一次，杜絕每幀配置） ---- */
const G = {};
(function buildGradients(){
  let g;
  g = ctx.createRadialGradient(0, 0, 6, 0, 0, 210); g.addColorStop(0, 'rgba(255,243,208,0.85)');
  g.addColorStop(0.3, 'rgba(255,212,100,0.32)'); g.addColorStop(1, 'rgba(255,212,100,0)'); G.sunGlow = g;
  g = ctx.createRadialGradient(W / 2, H / 2, H * 0.35, W / 2, H / 2, H * 0.85);
  g.addColorStop(0, 'rgba(0,0,0,0)'); g.addColorStop(1, 'rgba(0,0,0,0.42)'); G.vignette = g;
  g = ctx.createRadialGradient(0, 0, 1, 0, 0, 30); g.addColorStop(0, 'rgba(0,0,0,1)');
  g.addColorStop(1, 'rgba(0,0,0,0)'); G.shadow = g;
  G.mist = [];
  for(let i = 0; i < 3; i++){
    const y = 356 + i * 18;
    g = ctx.createLinearGradient(0, y - 10, 0, y + 12); g.addColorStop(0, 'rgba(255,217,160,0)');
    g.addColorStop(0.5, 'rgba(255,217,160,0.16)'); g.addColorStop(1, 'rgba(255,217,160,0)'); G.mist.push(g);
  }
  g = ctx.createLinearGradient(0, 280, 0, 420); g.addColorStop(0, '#6a5a8c');
  g.addColorStop(1, '#4a3d68'); G.farMtn = g;
  g = ctx.createLinearGradient(0, 180, 0, 540); g.addColorStop(0, '#4a3a63');
  g.addColorStop(1, '#241c33'); G.leftMtn = g;
  g = ctx.createLinearGradient(0, 400, 0, 540); g.addColorStop(0, '#c9a06a');
  g.addColorStop(1, '#7a5c38'); G.groundG = g;
  g = ctx.createLinearGradient(0, 356, 0, 400); g.addColorStop(0, '#d9c495');
  g.addColorStop(1, '#b39b6e'); G.brick = g;
  g = ctx.createLinearGradient(-40, 0, 40, 0); g.addColorStop(0, '#8a5a1e');
  g.addColorStop(0.5, '#ffd464'); g.addColorStop(1, '#8a5a1e'); G.staff1 = g;
  g = ctx.createRadialGradient(0, 0, 2, 0, 0, 18); g.addColorStop(0, 'rgba(255,180,80,0.5)');
  g.addColorStop(1, 'rgba(255,138,61,0)'); G.wheelGlow = g;
  g = ctx.createLinearGradient(-9, 0, 10, -22); g.addColorStop(0, '#8f2f1e');
  g.addColorStop(0.5, '#b5432e'); g.addColorStop(1, '#d05a3a'); G.wkRobe = g;
  g = ctx.createRadialGradient(-1, -32, 2, 1, -30, 9); g.addColorStop(0, '#d99b62');
  g.addColorStop(1, '#b5763f'); G.wkHead = g;
  g = ctx.createLinearGradient(-8, 0, 8, -20); g.addColorStop(0, '#b23a52');
  g.addColorStop(0.5, '#d94f6a'); g.addColorStop(1, '#ef6e85'); G.nzTorso = g;
  g = ctx.createRadialGradient(-2, -52, 2, 0, -50, 8.5); g.addColorStop(0, '#fbd9b4');
  g.addColorStop(1, '#f0bd8e'); G.nzHead = g;
  g = ctx.createLinearGradient(-8, 0, 8, -20); g.addColorStop(0, '#245840');
  g.addColorStop(0.5, '#2f6f4e'); g.addColorStop(1, '#3f8a63'); G.hlTorso = g;
  g = ctx.createRadialGradient(-2, -27, 2, 0, -25, 8); g.addColorStop(0, '#ecc39c');
  g.addColorStop(1, '#dba97c'); G.hlHead = g;
  g = ctx.createLinearGradient(-6, -33, 5, -25); g.addColorStop(0, '#e8853c');
  g.addColorStop(1, '#b85c1e'); G.hlCap = g;
  g = ctx.createLinearGradient(-7, -22, 7, -14); g.addColorStop(0, '#aab4c0');
  g.addColorStop(1, '#6e7a88'); G.hammerHead = g;
})();

const titleCard = document.getElementById('titleCard'); const actEl = document.getElementById('act');
const actNoEl = document.getElementById('actNo'); const actNameEl = document.getElementById('actName');

/* ============================================================
   第 2 節　時間軸（秒）——三幕結構
   第一幕：晨光雙景（日出・全景介紹）
   第二幕：山頭對決（揮棒・刺槍・金箍棒變長）
   第三幕：平地築屋（鎚釘・震波搖梯・上樑大吉・晨光大團圓）
   ============================================================ */
const T = {
  titleHide: 2.8, act2: 7.2, clash1: 8.15, thrust: 9.35, clash2: 10.62,
  extend: 12.0, act3: 17.2, wobble: 20.5, cloth: 22.5, finale: 23.2,
  fadeOut: 25.2, end: 26.2
};
const GROUND = 400;                 /* 平地地面 */
const WK = { x: 215, y: 252 };      /* 孫悟空（山頭） */
const NZ = { x: 335, y: 250 };      /* 哪吒（山頭・懸浮） */
const CLASH = { x: 274, y: 224 };   /* 兵器交擊點 */
const NAIL = { x: 712, y: 301 };    /* 屋樑釘點 */
const HITS = [17.9, 18.9, 19.9, 21.9];

let tl = 0, rt = 0, last = performance.now();
let freeze = 0, shake = 0, flash = 0, zoomP = 0, ended = false;
let wobbleRT = -99;

function timeScaleAt(t){
  if(t > T.extend && t < 12.45) return 0.45;
  if(t >= 12.45 && t < 12.8) return lerp(0.45, 1, seg(t, 12.45, 12.8));
  return 1;
}

/* ============================================================
   第 3 節　聲音引擎（Web Audio 合成・預設靜音）
   ============================================================ */
let AC = null, master = null, windGain = null; let audioOn = false;
function initAudio(){
  AC = new (window.AudioContext || window.webkitAudioContext)();
  master = AC.createGain(); master.gain.value = 0;
  /* v3：限幅器——交擊、鎚擊與鐘聲疊加時不削波 */
  const comp = AC.createDynamicsCompressor();
  comp.threshold.value = -18; comp.knee.value = 24; comp.ratio.value = 4;
  comp.attack.value = 0.003; comp.release.value = 0.25;
  master.connect(comp); comp.connect(AC.destination);
  const len = AC.sampleRate * 2; const buf = AC.createBuffer(1, len, AC.sampleRate);
  const d = buf.getChannelData(0); let lv = 0;
  for(let i = 0; i < len; i++){ const w = Math.random() * 2 - 1; lv = (lv + 0.02 * w) / 1.02; d[i] = lv * 3.2; }
  const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
  const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 420; bp.Q.value = 0.4;
  windGain = AC.createGain(); windGain.gain.value = 0.028;
  src.connect(bp); bp.connect(windGain); windGain.connect(master); src.start();
}
function audioReady(){ return audioOn && AC; }
function beep(freq, dur, type, vol, slide){
  if(!audioReady()) return; const o = AC.createOscillator(), g = AC.createGain();
  o.type = type || 'sine'; o.frequency.setValueAtTime(freq, AC.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), AC.currentTime + dur);

  const s = AC.createBufferSource(); s.buffer = buf;
  const f = AC.createBiquadFilter(); f.type = (o && o.type) || 'lowpass';
  f.frequency.setValueAtTime((o && o.f0) || 1000, AC.currentTime);

function updateParticles(dt){
  /* 晨光塵埃（緩慢漂浮的金色微粒） */
  if(parts.length < 300 && Math.random() < 0.3){
    parts.push({
      type:'mote', x: Math.random() * 960, y: 140 + Math.random() * 250,
      vx: 5 + Math.random() * 6, vy: -3 - Math.random() * 3, g: 0, drag: 1,
      life: 3 + Math.random() * 2.5, ph: Math.random() * TAU
    });
  }
  for(let i = parts.length - 1; i >= 0; i--){
    const p = parts[i]; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += (p.g || 0) * dt;
    if(p.drag && p.drag < 1){ const dd = Math.pow(p.drag, dt * 60); p.vx *= dd; p.vy *= dd; }
    if(p.vr) p.rot += p.vr * dt;
    p.life -= dt; if(p.life <= 0) parts.splice(i, 1);
  }
  for(let i = rings.length - 1; i >= 0; i--){
    const r = rings[i]; r.r += r.vr * dt; r.a -= dt * 1.1; if(r.a <= 0) rings.splice(i, 1);
  }
  if(parts.length > 380) parts.splice(0, parts.length - 380);
}
function drawParticles(){
  for(const p of parts){
    const a = clamp(p.life * 2, 0, 1);
    if(p.type === 'spark'){
      ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = a; ctx.strokeStyle = p.color; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - p.vx * 0.03, p.y - p.vy * 0.03); ctx.stroke();
      ctx.globalCompositeOperation = 'source-over';
    } else if(p.type === 'mote'){
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = a * 0.35 * (0.5 + 0.5 * Math.sin(rt * 3 + p.ph));
      ctx.fillStyle = '#ffd9a0'; ctx.beginPath(); ctx.arc(p.x, p.y, 1.6, 0, TAU); ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
    } else if(p.type === 'petal'){
      ctx.globalAlpha = a; ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color; ctx.fillRect(-3, -1.8, 6, 3.6); ctx.restore();
    } else if(p.type === 'drop'){
      ctx.globalAlpha = a; ctx.fillStyle = '#9fd8f0';
      ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, TAU); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
  for(const r of rings){
    ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = clamp(r.a, 0, 1);
    ctx.strokeStyle = '#ffe9a8'; ctx.lineWidth = r.lw;
    ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, TAU); ctx.stroke();

  }

}

/* ============================================================
   第 8 節　孫悟空（紅袍・虎皮裙・金箍棒會變長）
   ============================================================ */
function wukongPose(){
  const P = { staff: -0.55 + Math.sin(rt * 1.8) * 0.05, lean: 0, lunge: 0, crouch: Math.sin(rt * 2.1) * 0.8, len: 1, face: 'focus' };
  if(tl >= 7.45 && tl < 7.95){ const p = easeOutCubic(seg(tl, 7.45, 7.95)); P.staff = lerp(-0.55, -1.35, p); P.lean = -0.16 * p; P.crouch = 3 * p; }
  else if(tl >= 7.95 && tl < T.clash1 + 0.03){ const p = easeInCubic(seg(tl, 7.95, 8.18)); P.staff = lerp(-1.35, 0.75, p); P.lunge = 16 * p; P.lean = lerp(-0.16, 0.18, p); P.face = 'grit'; }
  else if(tl >= T.clash1 + 0.03 && tl < 8.9){ const p = easeOutCubic(seg(tl, 8.2, 8.9)); P.staff = lerp(0.75, -0.55, p); P.lunge = 16 * (1 - p); P.lean = lerp(0.18, 0, p); }
  else if(tl >= 9.25 && tl < 9.9){ const p = Math.sin(seg(tl, 9.25, 9.9) * Math.PI); P.lean = -0.34 * p; P.lunge = -10 * p; P.face = 'grit'; }
  else if(tl >= 10.25 && tl < 10.5){ const p = easeOutCubic(seg(tl, 10.25, 10.5)); P.staff = lerp(-0.55, -1.2, p); P.lean = -0.14 * p; }
  else if(tl >= 10.5 && tl < 10.68){ const p = easeInCubic(seg(tl, 10.5, 10.66)); P.staff = lerp(-1.2, 0.9, p); P.lunge = 18 * p; P.lean = 0.2 * p; P.face = 'grit'; }
  else if(tl >= 10.68 && tl < 11.4){ const p = easeOutCubic(seg(tl, 10.68, 11.4)); P.staff = lerp(0.9, -0.55, p); P.lunge = 18 * (1 - p); P.lean = 0.2 * (1 - p); }
  if(tl >= 11.95){
    const e = seg(tl, T.extend, 12.5); const r = seg(tl, 13.3, 13.8);
    P.len = 1 + (easeOutBack(e) * 1.7) * (1 - easeInOutCubic(r));
    if(e > 0 && r < 1){ P.staff = lerp(0.12, 0.4, easeInOutCubic(seg(tl, 12.05, 12.6))); P.face = 'grit'; P.lean = 0.1; }
  }
  if(tl >= 13.8 && tl < T.finale){ P.staff = -0.55 + Math.sin(rt * 1.8) * 0.05; }
  if(tl >= 14.45 && tl < 16.45){                       /* 「數十回合」：快速連環交擊 */
    const w = Math.sin(rt * 13);
    P.lunge = 7 + w * 8; P.staff = 0.18 + w * 0.5; P.lean = 0.12 + w * 0.05; P.face = 'grit';
  }
  if(tl >= T.finale){ P.staff = -1.4; P.lean = 0; P.lunge = 0; P.face = 'smile'; P.len = 1; }
  return P;
}
function drawStaff(len){
  const L = 40 * len;                     /* 只向前端變長（指向對手），後端握把固定 */
  let g = G.staff1;
  if(len !== 1){                          /* 變長的短暫期間才即時建漸層 */
    g = ctx.createLinearGradient(-40, 0, L, 0);
    g.addColorStop(0, '#8a5a1e'); g.addColorStop(0.5, '#ffd464'); g.addColorStop(1, '#8a5a1e');

  if(len > 1.05){ ctx.shadowColor = '#ffd464'; ctx.shadowBlur = 14; }
  ctx.strokeStyle = OUTLINE; ctx.lineWidth = 9.6; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-40, 0); ctx.lineTo(L, 0); ctx.stroke();
  ctx.strokeStyle = g; ctx.lineWidth = 7;
  ctx.beginPath(); ctx.moveTo(-40, 0); ctx.lineTo(L, 0); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#c62b2b';
  ctx.fillRect(-41, -4.4, 7, 8.8); ctx.fillRect(L - 6, -4.4, 7, 8.8);
  ctx.strokeStyle = OUTLINE; ctx.lineWidth = 1.2;
  ctx.strokeRect(-41, -4.4, 7, 8.8); ctx.strokeRect(L - 6, -4.4, 7, 8.8);
}
function drawWukong(){
  const P = wukongPose();

  ctx.strokeStyle = OUTLINE; ctx.lineWidth = 1.4; ctx.stroke();

  ctx.fillStyle = '#c98a56';
  ctx.beginPath(); ctx.arc(-7.5, -30, 3, 0, TAU); ctx.fill(); ctx.stroke();

  ctx.fillStyle = '#ecd9b8';
  ctx.beginPath(); ctx.ellipse(4, -26.5, 5.5, 4.4, 0.1, 0, TAU); ctx.fill();

  ctx.strokeStyle = '#c62b2b'; ctx.lineWidth = 3.4;
  ctx.beginPath(); ctx.arc(1, -31, 8.2, Math.PI * 1.08, Math.PI * 1.92); ctx.stroke();
  ctx.strokeStyle = '#ffd464'; ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.arc(1, -31, 8.2, Math.PI * 1.08, Math.PI * 1.92); ctx.stroke();

  ctx.strokeStyle = '#8a5a2b'; ctx.lineWidth = 2; ctx.lineCap = 'round';

    ctx.beginPath(); ctx.moveTo(3, -31.6); ctx.lineTo(6.6, -32); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(2.6, -34.2); ctx.lineTo(6.6, -34.8); ctx.stroke();
    ctx.fillStyle = '#5c2a1a'; ctx.beginPath(); ctx.ellipse(4.5, -25.5, 2.4, 1.5, 0, 0, TAU); ctx.fill();

    ctx.beginPath(); ctx.arc(4.5, -26.5, 2.6, Math.PI * 0.1, Math.PI * 0.9); ctx.stroke();
  } else {

    ctx.beginPath(); ctx.moveTo(2.4, -34.6); ctx.lineTo(6.8, -33.8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(3, -25.4); ctx.lineTo(6, -25.6); ctx.stroke();

  ctx.save(); ctx.translate(hx, hy); ctx.rotate(a); drawStaff(P.len); ctx.restore();
  ctx.restore(); ctx.restore();
}

/* ============================================================
   第 9 節　哪吒（雙丸子頭・混天綾・風火輪・三尖槍）
   ============================================================ */
function nezhaPose(){
  const P = { dx: 0, dy: Math.sin(rt * 2.4) * 3, rot: 0, spear: 0, block: 0, face: 'focus' };
  if(tl >= 7.95 && tl < 8.6){ P.block = Math.sin(seg(tl, 7.95, 8.6) * Math.PI); if(tl > T.clash1) P.dx = 8 * easeOutCubic(1 - seg(tl, T.clash1, 8.6)); }
  if(tl >= 9.15 && tl < 9.35){ P.dx = 12 * easeOutCubic(seg(tl, 9.15, 9.35)); P.face = 'grit'; }
  else if(tl >= 9.35 && tl < 9.6){ const p = easeInCubic(seg(tl, 9.35, 9.55)); P.dx = lerp(12, -34, p); P.spear = p; P.face = 'grit'; }
  else if(tl >= 9.6 && tl < 10.15){ const p = easeOutCubic(seg(tl, 9.6, 10.15)); P.dx = lerp(-34, 0, p); P.spear = 1 - p; }
  if(tl >= 10.42 && tl < 10.66){ const p = easeInCubic(seg(tl, 10.42, 10.6)); P.dx = -20 * p; P.spear = 0.7 * p; P.face = 'grit'; }
  else if(tl >= 10.66 && tl < 11.3){ const p = easeOutCubic(seg(tl, 10.66, 11.3)); P.dx = -20 * (1 - p); P.spear = 0.7 * (1 - p); }
  if(tl >= 12.15 && tl < 13.1){
    const p = seg(tl, 12.15, 13.1); P.dx = easeOutCubic(p) * 74;
    P.rot = Math.sin(p * 14) * 0.2 * (1 - p); P.face = 'grit';
  } else if(tl >= 13.1 && tl < T.finale){ P.dx = 74 * (1 - easeInOutCubic(seg(tl, 13.1, 14.2))); }
  if(tl >= 14.45 && tl < 16.45){                       /* 「數十回合」：快速連環交擊 */
    const w = Math.sin(rt * 13 + Math.PI);
    P.dx = -5 + w * 8; P.spear = 0.35 + 0.3 * Math.sin(rt * 13); P.face = 'grit';
  }
  if(tl >= T.finale){ P.face = 'smile'; }
  return P;
}
function drawFireWheel(x, y){
  ctx.save(); ctx.translate(x, y);
  ctx.globalCompositeOperation = 'lighter';
  ctx.fillStyle = G.wheelGlow; ctx.fillRect(-18, -18, 36, 36);
  ctx.globalCompositeOperation = 'source-over';
  ctx.strokeStyle = '#ffd464'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(0, 0, 11, 0, TAU); ctx.stroke();
  ctx.strokeStyle = '#ff8a3d'; ctx.lineWidth = 1.6;
  ctx.beginPath(); ctx.arc(0, 0, 7.5, 0, TAU); ctx.stroke();
  for(let i = 0; i < 5; i++){
    const a = rt * 5 + i * TAU / 5;
    ctx.save(); ctx.rotate(a); ctx.translate(11, 0); ctx.rotate(0.9);
    ctx.fillStyle = i % 2 ? '#ff8a3d' : '#ffd464';
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(7, -2, 10, -8); ctx.quadraticCurveTo(4, -5, 0, -5); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

/* ============================================================
   第 10 節　黑樂（工地師傅：橘帽・綠衫・鎚子・上樑）
   ============================================================ */
function hammerAng(){
  const rest = -0.35;
  for(const h of HITS){
    if(tl >= h - 0.62 && tl < h + 0.32){
      if(tl < h - 0.18) return lerp(rest, -1.5, easeOutCubic(seg(tl, h - 0.62, h - 0.18)));
      if(tl < h - 0.06) return -1.5;                                  /* 蓄力停頓（anticipation） */
      if(tl < h) return lerp(-1.5, 0.55, easeInCubic(seg(tl, h - 0.06, h)));
      return lerp(0.55, rest, easeOutCubic(seg(tl, h, h + 0.32)));
    }
  }
  return rest + Math.sin(rt * 2) * 0.04;
}
function drawHeile(){
  const x = 742, yF = 322;
  /* 震波搖晃 */
  const wk = rt - wobbleRT; const sway = (wk > 0 && wk < 1.6) ? Math.sin(wk * 9) * 0.14 * (1 - wk / 1.6) : 0;
  const cheer = tl >= 22.55 ? easeOutBack(seg(tl, 22.55, 23.1)) : 0;
  const ham = hammerAng();
  ctx.save(); ctx.translate(x, yF); ctx.rotate(sway);
  softShadow(0, 1, 16, 4, 0.3);
  const hipY = -20;
  /* 腿（深灰工作褲＋鞋） */
  limb2(0, hipY, -6, hipY + 10, -8, -2, 5.4, '#33383f');
  limb2(0, hipY, 6, hipY + 10, 9, -2, 5.4, '#33383f');
  ctx.fillStyle = '#241a2e'; ctx.strokeStyle = OUTLINE; ctx.lineWidth = 1.1;
  ctx.beginPath(); ctx.ellipse(-9, -1, 5, 2.6, 0, 0, TAU); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(10, -1, 5, 2.6, 0, 0, TAU); ctx.fill(); ctx.stroke();
  /* 軀幹（綠衫漸層＋工具腰帶） */
  ctx.save(); ctx.translate(0, hipY); ctx.rotate(sway * 0.6);
  ctx.fillStyle = G.hlTorso; ctx.strokeStyle = OUTLINE; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-7.5, 1);
  ctx.quadraticCurveTo(-9, -9, -7.8, -17); ctx.quadraticCurveTo(0, -21, 7.8, -17);
  ctx.quadraticCurveTo(9, -9, 7.5, 1); ctx.quadraticCurveTo(0, 3.4, -7.5, 1); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#6e4a26'; ctx.fillRect(-8, -3, 16, 3.4);
  ctx.fillStyle = '#a9884f'; ctx.fillRect(2, -3.4, 5, 5); ctx.strokeStyle = OUTLINE; ctx.lineWidth = 1; ctx.strokeRect(2, -3.4, 5, 5);
  /* 頭與橘色工帽（面向左邊的屋脊） */
  ctx.beginPath(); ctx.arc(0, -25, 7.2, 0, TAU); ctx.fillStyle = G.hlHead; ctx.fill();
  ctx.strokeStyle = OUTLINE; ctx.lineWidth = 1.3; ctx.stroke();
  ctx.beginPath(); ctx.arc(5.8, -24.6, 2, 0, TAU); ctx.fillStyle = '#dba97c'; ctx.fill(); ctx.stroke();
  ctx.fillStyle = G.hlCap;
  ctx.beginPath(); ctx.arc(0, -26.5, 7.6, Math.PI * 0.98, Math.PI * 2.02); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-5.6, -28); ctx.quadraticCurveTo(-12.5, -27.4, -12, -25);
  ctx.quadraticCurveTo(-7.8, -24.6, -4.8, -26); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.45)'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.arc(-0.6, -27.2, 5, Math.PI * 1.15, Math.PI * 1.5); ctx.stroke();
  /* 表情（面左專注；上樑時大笑） */
  if(cheer > 0.1){
    ctx.strokeStyle = '#3a2417'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(-3.4, -25.8, 1.7, Math.PI * 1.05, Math.PI * 1.95); ctx.stroke();
    ctx.fillStyle = '#8f4030'; ctx.beginPath(); ctx.arc(-2.6, -21.6, 2.2, 0, Math.PI); ctx.closePath(); ctx.fill();
  } else {
    eyeDot(-3.6, -25.6, 1.7);
    ctx.strokeStyle = '#3a2417'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(-5.6, -28.4); ctx.lineTo(-1.8, -28); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-4.6, -21.4); ctx.lineTo(-2, -21.6); ctx.stroke();
  }
  /* 手臂：左手扶樑／揮手，右手掄鎚 */
  if(cheer > 0.1){
    armTo(-4, -16, lerp(-9, -13, cheer), lerp(-8, -30, cheer), -2, 4, '#2f6f4e');
    armTo(4, -16, lerp(9, 13, cheer), lerp(-8, -30, cheer), 2, 4, '#2f6f4e');
    ctx.fillStyle = '#dba97c'; ctx.strokeStyle = OUTLINE; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(lerp(-9, -13, cheer), lerp(-8, -30, cheer), 2.3, 0, TAU); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(lerp(9, 13, cheer), lerp(-8, -30, cheer), 2.3, 0, TAU); ctx.fill(); ctx.stroke();
  } else {
    const arms = (wk > 0 && wk < 1.6);
    if(arms){
      armTo(-4, -16, -14, -14, -2, 4, '#2f6f4e'); armTo(4, -16, 14, -14, 2, 4, '#2f6f4e');
    } else {
      armTo(-4, -16, -13, -8, -2, 4, '#2f6f4e');
      /* 掄鎚手臂（角度驅動） */
      const hx2 = -2 + Math.cos(ham + Math.PI * 0.85) * 13, hy2 = -16 + Math.sin(ham + Math.PI * 0.85) * 13;
      armTo(4, -16, hx2, hy2, 3, 4, '#2f6f4e');
      ctx.save(); ctx.translate(hx2, hy2); ctx.rotate(ham - 1.9);
      /* 鎚柄與鎚頭 */
      ctx.strokeStyle = OUTLINE; ctx.lineWidth = 5.4; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -16); ctx.stroke();
      ctx.strokeStyle = '#a9764a'; ctx.lineWidth = 3.4; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -16); ctx.stroke();
      ctx.fillStyle = G.hammerHead; ctx.strokeStyle = OUTLINE; ctx.lineWidth = 1.3;
      ctx.beginPath(); ctx.moveTo(-7.5, -21); ctx.lineTo(6.5, -21); ctx.quadraticCurveTo(8.5, -18, 6.5, -15);
      ctx.lineTo(-7.5, -15); ctx.quadraticCurveTo(-9.5, -18, -7.5, -21); ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.restore();
    }
  }
  ctx.restore();
  /* 汗滴 */
  if(tl > 20.9 && tl < 21.7){
    const k = seg(tl, 20.9, 21.7);
    ctx.globalAlpha = 1 - k; ctx.fillStyle = '#9fd8f0';
    ctx.beginPath(); ctx.arc(8, -46 + k * 16, 2.2, 0, TAU); ctx.fill(); ctx.globalAlpha = 1;
  }
  ctx.restore();
}

/* ============================================================
   第 11 節　鏡頭（分鏡・視差）
   ============================================================ */
const cam = { x: 480, y: 280, zoom: 1.0 }; let curShot = -1;
function shotIdAt(t){
  if(t < 3.2) return 0; if(t < T.act2) return 1; if(t < 12.2) return 2;
  if(t < 14.0) return 3; if(t < T.act3) return 4; if(t < T.finale) return 5; return 6;
}
function camTargetAt(t){
  switch(shotIdAt(t)){
    case 0:{ const p = seg(t, 0, 3.2); return { x: 480, y: 282, zoom: 1.0 + easeInOutCubic(p) * 0.06 }; }
    case 1:{ const p = easeInOutSine(seg(t, 3.2, T.act2)); return { x: lerp(300, 660, p), y: 300, zoom: 1.16 }; }
    case 2: return { x: 276, y: 244, zoom: 1.9 * (1 + zoomP * 0.16) };
    case 3: return { x: 310, y: 248, zoom: 1.5 };
    case 4: return { x: 278, y: 244, zoom: 1.78 };
    case 5: return { x: 700, y: 330, zoom: 1.72 * (1 + zoomP * 0.1) };
    default:{ const p = seg(t, T.finale, T.fadeOut); return { x: 480, y: 280, zoom: 1.08 - easeInOutCubic(p) * 0.07 }; }
  }
}
function updateCamera(dt){
  const id = shotIdAt(tl); const tgt = camTargetAt(tl);
  if(id !== curShot){ curShot = id; cam.x = tgt.x; cam.y = tgt.y; cam.zoom = tgt.zoom; }
  else {
    const k = 1 - Math.pow(0.002, dt);
    cam.x += (tgt.x - cam.x) * k; cam.y += (tgt.y - cam.y) * k; cam.zoom += (tgt.zoom - cam.zoom) * k;
  }
}
function withParallax(f, fn){
  ctx.save(); ctx.translate((cam.x - W / 2) * (1 - f), (cam.y - H / 2) * (1 - f) * 0.5); fn(); ctx.restore();
}

/* ============================================================
   第 12 節　字幕與幕標題
   ============================================================ */
const SUBS = [
  { a: 0.9, b: 2.8, text: '清晨，太陽正要爬上山頭。' },
  { a: 3.4, b: 6.6, text: '山上有人過招，山下有人起厝。' },
  { a: 8.45, b: 10.1, text: '金箍棒橫掃——哪吒舉槍一擋！' },
  { a: 10.9, b: 11.9, text: '三尖兩刃槍，疾刺而來！' },
  { a: 12.35, b: 14.1, text: '金箍棒——變長！' },
  { a: 14.8, b: 16.7, text: '數十回合，不分勝負。' },
  { a: 17.8, b: 19.5, text: '另一頭，黑樂一早就爬上屋樑。' },
  { a: 20.6, b: 21.9, text: '山上打得再兇，也吵不了認真起厝的人。' },
  { a: 22.55, b: 23.5, text: '上樑大吉！' },
  { a: 23.8, b: 25.5, text: '太陽升起——山上山下，都是認真的清晨。' }
];
const ACTS = [
  { at: 2.95, dur: 2.0, no: '第 一 幕', name: '晨光雙景' },
  { at: 7.25, dur: 1.8, no: '第 二 幕', name: '山頭對決' },
  { at: 17.25, dur: 1.8, no: '第 三 幕', name: '平地築屋' }
];
let lastSub = '', lastChap = -1;
function updateOverlays(){
  titleCard.classList.toggle('show', tl > 0.15 && tl < T.titleHide);
  hintEl.classList.toggle('show', !audioOn && tl > 0.6 && tl < 5.2);
  let sub = null;
  for(const s of SUBS){ if(tl >= s.a && tl < s.b){ sub = s; break; } }
  if(sub){
    if(sub.text !== lastSub){ subtitleEl.textContent = sub.text; lastSub = sub.text; }
    subtitleEl.classList.add('show');
  } else { subtitleEl.classList.remove('show'); lastSub = ''; }
  let act = null;
  for(const a of ACTS){ if(tl >= a.at && tl < a.at + a.dur){ act = a; break; } }
  if(act){ actNoEl.textContent = act.no; actNameEl.textContent = act.name; actEl.classList.add('show'); }
  else { actEl.classList.remove('show'); }
  /* v4：章節選單高亮目前所在幕 */
  const ci = tl < T.act2 ? 0 : (tl < T.act3 ? 1 : 2);
  if(ci !== lastChap){
    lastChap = ci;
    const cb = chaptersEl.children;
    for(let i = 0; i < cb.length; i++) cb[i].classList.toggle('cur', i === ci);
  }
}

/* ============================================================
   第 13 節　關鍵事件
   ============================================================ */
function onClash(power){
  freeze = power > 1 ? 0.22 : 0.14; shake = power > 1 ? 12 : 8; flash = power > 1 ? 0.6 : 0.45;
  zoomP = 1; sfxClang();
  spawnSpark(CLASH.x, CLASH.y, power > 1 ? 30 : 18, 300, ['#ffd464', '#ffffff', '#ff8a3d']);
  spawnRing(CLASH.x, CLASH.y, 240, 3);
}
function miniClash(){
  sfxClang(); shake = Math.max(shake, 3);
  spawnSpark(CLASH.x + 8 + (Math.random() * 2 - 1) * 16, CLASH.y + (Math.random() * 2 - 1) * 12,
    10, 220, ['#ffd464', '#ffffff', '#ff8a3d']);
}
const EVENTS = [
  { t: 1.2, fired: false, fn: sfxBird },
  { t: 4.6, fired: false, fn: sfxBird },
  { t: 7.5, fired: false, fn: () => noiseBurst(0.3, 0.15, { type:'bandpass', f0:500, f1:1600 }) },
  { t: T.clash1, fired: false, fn: () => onClash(1) },
  { t: T.thrust, fired: false, fn: sfxWhoosh },
  { t: T.clash2, fired: false, fn: () => onClash(2) },
  { t: T.extend, fired: false, fn: () => { sfxExtend(); shake = 5; spawnRing(WK.x + 40, WK.y - 40, 420, 4); } },
  { t: 12.2, fired: false, fn: sfxWhoosh },
  { t: 14.6, fired: false, fn: miniClash },
  { t: 15.0, fired: false, fn: miniClash },
  { t: 15.4, fired: false, fn: miniClash },
  { t: 15.8, fired: false, fn: miniClash },
  { t: 16.2, fired: false, fn: miniClash },
  { t: 15.05, fired: false, fn: sfxBird },
  { t: HITS[0], fired: false, fn: () => onHammer() },
  { t: HITS[1], fired: false, fn: () => onHammer() },
  { t: HITS[2], fired: false, fn: () => onHammer() },
  { t: HITS[3], fired: false, fn: () => onHammer() },
  { t: T.wobble, fired: false, fn: () => { spawnRing(CLASH.x, CLASH.y, 620, 5); sfxRumble(); wobbleRT = rt; shake = 4; } },
  { t: T.cloth, fired: false, fn: () => { sfxChime(); spawnPetal(710, 296, 26); } },
  { t: 23.6, fired: false, fn: sfxBird }
];
function onHammer(){
  sfxTock(); shake = Math.max(shake, 2.2);
  spawnSpark(NAIL.x, NAIL.y, 7, 150, ['#ffd464', '#fff3d0']);
}

/* ============================================================
   第 14 節　渲染
   ============================================================ */
function render(){
  ctx.fillStyle = '#0d0a16'; ctx.fillRect(0, 0, W, H);
  drawSkyScreen();
  ctx.save();
  const shx = (Math.random() * 2 - 1) * shake; const shy = (Math.random() * 2 - 1) * shake;
  const wob = Math.sin(rt * 1.2) * 1.2 + Math.sin(rt * 2.7) * 0.5;
  ctx.translate(W / 2 + shx, H / 2 + shy + wob * 0.4);
  ctx.scale(cam.zoom, cam.zoom);
  ctx.translate(-cam.x + wob / cam.zoom, -cam.y);
  withParallax(0.25, drawSunWorld);
  withParallax(0.35, drawClouds);
  withParallax(0.55, drawFarMountains);
  drawBirds();
  drawHouse();
  drawLeftMountain();
  drawMist();
  drawWukong();
  drawNezha();
  drawHeile();
  drawParticles();
  ctx.restore();
  /* --- 螢幕空間層 --- */
  ctx.fillStyle = 'rgba(40,20,60,0.08)'; ctx.fillRect(0, 0, W, H);
  if(mornK > 0.01){ ctx.fillStyle = `rgba(255,200,120,${mornK * 0.06})`; ctx.fillRect(0, 0, W, H); }
  if(flash > 0.01){ ctx.fillStyle = `rgba(255,248,230,${clamp(flash, 0, 1) * 0.85})`; ctx.fillRect(0, 0, W, H); }
  ctx.fillStyle = G.vignette; ctx.fillRect(0, 0, W, H);
  const bar = 34 * easeOutCubic(seg(tl, 0.2, 1.6));
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, bar); ctx.fillRect(0, H - bar, W, bar);
  const fadeIn = 1 - easeOutCubic(seg(tl, 0, 1.2));
  const fadeOut = easeInOutCubic(seg(tl, T.fadeOut, T.end - 0.2)) * 0.85;
  const fade = Math.max(fadeIn, fadeOut);
  if(fade > 0.01){ ctx.fillStyle = `rgba(13,10,22,${fade})`; ctx.fillRect(0, 0, W, H); }
}

/* ============================================================
   第 15 節　主迴圈與重新播放
   ============================================================ */
function frame(now){
  requestAnimationFrame(frame);
  const dt = Math.min((now - last) / 1000, 0.05); last = now; rt += dt;
  if(!ended){
    if(freeze > 0) freeze -= dt;
    else tl += dt * timeScaleAt(tl);
    if(tl >= T.end){ tl = T.end; ended = true; endOverlay.classList.add('show'); chaptersEl.classList.add('gone'); }
  } else {
    updateAudio(); return;   /* v3：片尾卡顯示時凍結世界渲染，省電不發熱 */
  }
  for(const e of EVENTS){ if(!e.fired && tl >= e.t){ e.fired = true; e.fn(); } }
  updateSky(); updateCamera(dt); updateParticles(dt); updateOverlays(); updateAudio();
  shake *= Math.pow(0.001, dt); flash *= Math.pow(0.004, dt); zoomP *= Math.pow(0.03, dt);
  render();
}
/* v4：seekTo 同時服務「重新播放」與「章節跳看」——
   時間軸歸位、清除殘留粒子/衝擊環、把目標點之前的事件標記為已觸發，避免重複音效/閃光。 */
function seekTo(t){
  tl = t; freeze = 0; shake = 0; flash = 0; zoomP = 0; wobbleRT = -99;
  ended = false; curShot = -1; lastSub = ''; lastChap = -1;
  parts.length = 0; rings.length = 0;
  lastDawnK = -1; lastMornK = -1;            /* 強制天色重算 */
  for(const e of EVENTS) e.fired = (e.t < t);
  endOverlay.classList.remove('show'); chaptersEl.classList.remove('gone');
}
function replay(){ seekTo(0); }
replayBtn.addEventListener('click', replay);
chaptersEl.addEventListener('click', (e) => {
  const b = e.target.closest('.chapBtn'); if(!b) return;
  seekTo(parseFloat(b.dataset.t));
});
/* v4：片尾凍結渲染時若縮放視窗，補畫一次凍結畫面，避免畫布被清空留白 */
addEventListener('resize', () => { if(ended) render(); });
requestAnimationFrame(frame);
</script>
