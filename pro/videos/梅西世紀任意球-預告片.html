<!doctype html>
<!-- 專業AI升級 v6 -->
<!-- v6 摘要：電影運鏡（對峙推軌/射門跟拍/進球鏡頭衝擊）＋letterbox＋閃白轉場＋逐字金色標題與光暈掃過＋烘焙夜空星光/草皮/探照燈光束/暈影/顆粒＋球體光尾與彩帶粒子＋Web Audio 預告片音效（心跳鼓點/助跑riser/進球braam/結尾定格重音＋殘響母線） -->
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="author" content="AI未來創作營隊">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>梅西世紀任意球 預告片</title>
<style>
  html,body{margin:0;height:100%;background:#050810;overflow:hidden;touch-action:none;
    -webkit-user-select:none;user-select:none;font-family:"Microsoft JhengHei","PingFang TC",sans-serif}
  canvas{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
  #ui{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none}
  .btn{position:absolute;pointer-events:auto;cursor:pointer;border:none;border-radius:999px;
    font-weight:bold;font-family:inherit;display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 18px rgba(0,0,0,.45);transition:transform .15s}
  .btn:active{transform:scale(0.92)}
  #muteBtn{width:48px;height:48px;top:14px;right:14px;background:rgba(8,12,22,.65);color:#ffd447;font-size:20px;border:2px solid rgba(255,212,71,.45)}
  #replayBtn{left:50%;top:64%;transform:translate(-50%,0);width:190px;height:56px;
    background:linear-gradient(92deg,#ffcf5c,#ffa72e,#ff7e3d);color:#2b1500;font-size:20px;display:none;letter-spacing:1px}
</style>
</head>
<body>
<canvas id="scene"></canvas>
<div id="ui">
  <button id="muteBtn" class="btn">🔊</button>
  <button id="replayBtn" class="btn">重新播放 ▶</button>
</div>
<script>
'use strict';
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('scene');
const ctx = canvas.getContext('2d');

function resize(){
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width  = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', resize); resize();

// ===== 音效：Web Audio 合成，預設開啟，首次互動自動解鎖 =====
// v6：母線加 DynamicsCompressor＋程序化殘響（大球場空間感），新增心跳鼓點/riser/braam/結尾重音
let AC = null, masterGain = null, muted = false, VERB = null, NOISE_BUF = null;
function audio(){
  if(!AC){
    AC = new (window.AudioContext||window.webkitAudioContext)();
    const comp = AC.createDynamicsCompressor();
    comp.threshold.value = -15; comp.knee.value = 18; comp.ratio.value = 7;
    comp.attack.value = 0.004; comp.release.value = 0.22;
    comp.connect(AC.destination);
    masterGain = AC.createGain();
    masterGain.gain.value = muted ? 0 : 1;
    masterGain.connect(comp);
    VERB = AC.createConvolver();
    (function(){
      const rate = AC.sampleRate, len = (rate*2.2)|0, buf = AC.createBuffer(2,len,rate);
      for(let ch=0; ch<2; ch++){ const d = buf.getChannelData(ch);
        for(let i=0;i<len;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/len,2.9)*0.55; }
      VERB.buffer = buf;
    })();
    const vg = AC.createGain(); vg.gain.value = 0.8;
    VERB.connect(vg); vg.connect(masterGain);
    NOISE_BUF = (function(){
      const rate = AC.sampleRate, len = (rate*1.5)|0, buf = AC.createBuffer(1,len,rate);
      const d = buf.getChannelData(0);
      for(let i=0;i<len;i++) d[i] = Math.random()*2-1;
      return buf;
    })();
  }
  return AC;
}
function beep(freq=440, dur=0.15, type='sine', vol=0.18, slide=0, delay=0){
  const ac = audio();
  const t0 = ac.currentTime + delay;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq+slide), t0+dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0+Math.min(0.02,dur*0.2));
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  o.connect(g).connect(masterGain);
  o.start(t0); o.stop(t0+dur+0.02);
}
function noiseBurst(dur=1.2, vol=0.16, delay=0, freq=900, q=0.7){
  const ac = audio();
  const t0 = ac.currentTime + delay;
  const bufSize = Math.floor(ac.sampleRate * dur);
  const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
  const data = buf.getChannelData(0);
  let last = 0;
  for(let i=0;i<bufSize;i++){ const w = Math.random()*2-1; last = (last*0.95)+(w*0.05); data[i]=last; }
  const src = ac.createBufferSource(); src.buffer = buf;
  const g = ac.createGain();
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0+dur*0.3);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  const filt = ac.createBiquadFilter(); filt.type='bandpass'; filt.frequency.value=freq; filt.Q.value=q;
  src.connect(filt).connect(g).connect(masterGain);
  g.connect(VERB);
  src.start(t0); src.stop(t0+dur+0.05);
}
function note(freq, t, dur=0.35, vol=0.11){ beep(freq, dur, 'triangle', vol, 0, t); }

// v6 心跳鼓點（對峙緊張感，越跳越快）
function heartKick(delay, vol){
  const ac = audio();
  const t0 = ac.currentTime + delay;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(130, t0);
  o.frequency.exponentialRampToValueAtTime(40, t0+0.11);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+0.22);
  o.connect(g).connect(masterGain); g.connect(VERB);
  o.start(t0); o.stop(t0+0.26);
}
// v6 助跑 riser（噪音掃頻＋鋸齒滑音，衝向射門瞬間）
function riser(dur, delay){
  const ac = audio();
  const t0 = ac.currentTime + (delay||0);
  const src = ac.createBufferSource(); src.buffer = NOISE_BUF; src.loop = true;
  const bp = ac.createBiquadFilter(); bp.type='bandpass'; bp.Q.value = 1.3;
  bp.frequency.setValueAtTime(220, t0);
  bp.frequency.exponentialRampToValueAtTime(3400, t0+dur);
  const g = ac.createGain();
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(0.17, t0+dur);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur+0.08);
  src.connect(bp).connect(g).connect(masterGain); g.connect(VERB);
  src.start(t0); src.stop(t0+dur+0.15);
  const o = ac.createOscillator(), og = ac.createGain();
  o.type='sawtooth';
  o.frequency.setValueAtTime(80, t0);
  o.frequency.exponentialRampToValueAtTime(330, t0+dur);
  og.gain.setValueAtTime(0.0001, t0);
  og.gain.exponentialRampToValueAtTime(0.05, t0+dur);
  og.gain.exponentialRampToValueAtTime(0.0001, t0+dur+0.08);
  o.connect(og).connect(masterGain);
  o.start(t0); o.stop(t0+dur+0.15);
}
// v6 braam 衝擊音（進球/片尾定格）
function braam(vol, delay){
  const ac = audio();
  const t0 = ac.currentTime + (delay||0);
  [55, 55.8, 27.5].forEach((f,i)=>{
    const o = ac.createOscillator(), g = ac.createGain(), lp = ac.createBiquadFilter();
    o.type = 'sawtooth'; o.frequency.value = f;
    lp.type = 'lowpass'; lp.Q.value = 3;
    lp.frequency.setValueAtTime(90, t0);
    lp.frequency.exponentialRampToValueAtTime(560, t0+0.26);
    lp.frequency.exponentialRampToValueAtTime(110, t0+1.5);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol*(i===2?0.7:0.5), t0+0.06);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+1.6);
    o.connect(lp).connect(g).connect(masterGain); g.connect(VERB);
    o.start(t0); o.stop(t0+1.7);
  });
  heartKick(delay||0, 0.5);
}
function stinger(){
  braam(0.5);
  [523,784,1047].forEach((f,i)=>beep(f, 1.1, 'triangle', 0.09, 0, 0.12*i));
}

// 觀眾聲浪：長時間濾波噪音當底噪，音量曲線隨劇情起伏（起場輕、對峙時緊張、進球爆發）
function crowdSwell(){
  const ac = audio();
  const t0 = ac.currentTime;
  const dur = T.total + 1;
  const bufSize = Math.floor(ac.sampleRate * dur);
  const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
  const data = buf.getChannelData(0);
  let last = 0;
  for(let i=0;i<bufSize;i++){ const w = Math.random()*2-1; last = (last*0.9)+(w*0.1); data[i]=last; }
  const src = ac.createBufferSource(); src.buffer = buf;
  const filt = ac.createBiquadFilter(); filt.type='bandpass'; filt.frequency.value=650; filt.Q.value=0.5;
  const g = ac.createGain();
  const vAt = (sec, v) => g.gain.linearRampToValueAtTime(v, t0+sec);
  g.gain.setValueAtTime(0.05, t0);
  vAt(T.introEnd, 0.06);
  vAt(T.standoffEnd - 0.3, 0.1);        // 對峙後段觀眾屏息期待，聲量微升
  vAt(T.kick - 0.05, 0.04);             // 射門瞬間觀眾安靜一拍
  vAt(T.goal - 0.1, 0.06);
  vAt(T.goal + 0.6, 0.34);              // 進球爆發歡呼
  vAt(T.celebEnd, 0.16);
  vAt(T.total, 0.05);
  src.connect(filt).connect(g).connect(masterGain);
  g.connect(VERB);
  src.start(t0); src.stop(t0+dur);
}

// 踢球聲：低頻悶擊（腳觸球）+ 短促噪音（皮革摩擦感），比單純方波更有重量
function kickThud(delay=0){
  const ac = audio();
  const t0 = ac.currentTime + delay;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = 'triangle';
  o.frequency.setValueAtTime(140, t0);
  o.frequency.exponentialRampToValueAtTime(50, t0+0.09);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(0.28, t0+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+0.14);
  o.connect(g).connect(masterGain); g.connect(VERB);
  o.start(t0); o.stop(t0+0.16);

  const dur = 0.07;
  const bufSize = Math.floor(ac.sampleRate * dur);
  const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<bufSize;i++) data[i] = (Math.random()*2-1) * (1 - i/bufSize);
  const src = ac.createBufferSource(); src.buffer = buf;
  const filt = ac.createBiquadFilter(); filt.type='highpass'; filt.frequency.value=1800;
  const ng = ac.createGain(); ng.gain.setValueAtTime(0.22, t0);
  ng.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  src.connect(filt).connect(ng).connect(masterGain);
  src.start(t0); src.stop(t0+dur+0.02);
}

function applyMuteState(){
  const ac = audio();
  masterGain.gain.setTargetAtTime(muted ? 0 : 1, ac.currentTime, 0.01);
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
}
document.getElementById('muteBtn').addEventListener('click', (e)=>{
  e.stopPropagation();
  muted = !muted;
  const ac = audio();
  if(ac.state === 'suspended') ac.resume();
  applyMuteState();
  if(!muted) beep(880, 0.12, 'sine', 0.15);
});
let unlocked = false;
function unlockAudio(){
  if(unlocked) return; unlocked = true;
  const ac = audio();
  if(ac.state === 'suspended') ac.resume();
  applyMuteState();
}
for(const ev of ['pointerdown','keydown','touchstart']) addEventListener(ev, unlockAudio, { once:true });

// ===== 時間軸（總長 15 秒，三幕：進場／助跑對峙／破網高潮）=====
const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
const easeInCubic  = t => t*t*t;
const easeOutBack  = t => 1 + 2.7*Math.pow(t-1,3) + 1.7*Math.pow(t-1,2);
const easeInOut    = t => t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
const clamp01 = t => Math.max(0, Math.min(1, t));
const lerp = (a,b,t) => a+(b-a)*t;

const T = {
  introEnd: 2.4,
  standoffStart: 2.4,
  standoffEnd: 5.6,
  runStart: 5.6,
  kick: 6.6,
  flightEnd: 9.2,
  goal: 9.3,
  celebEnd: 14.3,
  total: 15.0
};

let elapsed = 0, done = false;
let fired = {crowdAmb:false, whistle:false, tension:false, heart:false, riser:false, kick:false, curl:false, netHit:false, roar:false, chant:false, endHit:false};

// ===== v6 烘焙資產：光暈、暈影、顆粒、光帶 =====
function bakeTex(w,h,fn){ const c = document.createElement('canvas'); c.width=w; c.height=h; fn(c.getContext('2d'),w,h); return c; }
// ===== 以下場景常數與繪製資產「直接移植自遊戲《梅西世紀任意球》」，保證畫面與遊戲一致 =====
const TAU = Math.PI*2;
const clamp = (v,a,b)=> v<a?a:v>b?b:v;
const FONT = '"Noto Sans TC","Microsoft JhengHei",sans-serif';
const GOAL = { x1:330, x2:630, y:118, h:78 };
const BALL_START = { x:480, y:462 };
const LION_Y = 300, WALL_Y = 236;
function makeGlow(color, r){
  const c = document.createElement('canvas'); c.width = c.height = r*2;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(r,r,1, r,r,r);
  gr.addColorStop(0,color); gr.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle = gr; g.fillRect(0,0,r*2,r*2);
  return c;
}
const glowLight = makeGlow('rgba(255,250,220,.85)', 26);
const glowGoldS = makeGlow('rgba(255,207,92,.6)', 30);
/* 遊戲同款：夜賽球場整張烘焙（觀眾席、AI未來創作營隊看板、透視草皮、禁區線、光束） */
const bakedPitch = (function(){
  const k = Math.min(devicePixelRatio||1, 2);
  const c = document.createElement('canvas');
  c.width = GAME_W*k; c.height = GAME_H*k;
  const g = c.getContext('2d');
  g.scale(k,k);
  const sky = g.createLinearGradient(0,0,0,GAME_H);
  sky.addColorStop(0,'#071224'); sky.addColorStop(0.25,'#0a2e12'); sky.addColorStop(1,'#1e5c28');
  g.fillStyle = sky; g.fillRect(0,0,GAME_W,GAME_H);
  g.fillStyle = '#0a1420'; g.fillRect(0,0,GAME_W,74);
  g.fillStyle = '#101c2e'; g.fillRect(0,40,GAME_W,34);
  const cols = ['#38e1ff','#ff6cc7','#4f7cff','#ffcf5c','#9a6bff'];
  for(let row=0; row<3; row++){
    for(let i=0;i<48;i++){
      g.fillStyle = cols[(i+row*2)%5];
      g.globalAlpha = 0.45 + ((i*13+row*7)%30)/100;
      const x = i*20 + (row%2)*10, y = 10 + row*20 + ((i*29)%3)*2;
      g.fillRect(x, y, 9, 9);
    }
  }
  g.globalAlpha = 1;
  for(const lx of [60, 900]){
    g.fillStyle = '#2a3a4a';
    g.fillRect(lx-4, 0, 8, 46);
    g.fillStyle = '#38424e';
    g.fillRect(lx-22, 0, 44, 12);
  }
  g.fillStyle = '#122a48'; g.fillRect(0, 74, GAME_W, 18);
  g.fillStyle = '#38e1ff'; g.font = '900 12px '+FONT; g.textAlign='center';
  for(let i=0;i<4;i++) g.fillText('AI未來創作營隊', 130+i*240, 87);
  g.save();
  g.beginPath(); g.moveTo(150,540); g.lineTo(810,540); g.lineTo(640,92); g.lineTo(320,92); g.closePath(); g.clip();
  for(let i=0;i<14;i++){
    g.fillStyle = i%2===0 ? 'rgba(255,255,255,.06)' : 'rgba(0,0,0,.06)';
    const y0 = 92 + i*(448/14), y1 = 92 + (i+1)*(448/14);
    g.fillRect(-200, y0, 1400, y1-y0);
  }
  g.restore();
  g.save();
  g.beginPath(); g.moveTo(150,540); g.lineTo(810,540); g.lineTo(640,92); g.lineTo(320,92); g.closePath(); g.clip();
  for(let i=0;i<1600;i++){
    const gy = 92 + Math.pow(Math.random(),0.7)*448;
    const gx = 480 + (Math.random()*2-1)*(120 + (gy-92)/448*360);
    g.fillStyle = Math.random()<0.5 ? 'rgba(255,255,255,.05)' : 'rgba(0,20,0,.08)';
    const s = 1 + (gy-92)/448*1.6;
    g.fillRect(gx, gy, s, s*0.6);
  }
  g.restore();
  g.strokeStyle = 'rgba(255,255,255,.55)'; g.lineWidth = 3;
  g.beginPath(); g.ellipse(480,462,90,26,0,Math.PI,TAU); g.stroke();
  g.beginPath();
  g.moveTo(300,200); g.lineTo(660,200); g.moveTo(330,196); g.lineTo(316,320); g.moveTo(630,196); g.lineTo(644,320);
  g.stroke();
  g.strokeStyle = 'rgba(255,255,255,.35)';
  g.beginPath(); g.moveTo(380,152); g.lineTo(580,152); g.moveTo(355,150); g.lineTo(348,200); g.moveTo(605,150); g.lineTo(612,200); g.stroke();
  const boardGlow = g.createLinearGradient(0,92,0,132);
  boardGlow.addColorStop(0,'rgba(56,225,255,.14)'); boardGlow.addColorStop(1,'rgba(56,225,255,0)');
  g.fillStyle = boardGlow; g.fillRect(0,92,GAME_W,40);
  const standShade = g.createLinearGradient(0,0,0,74);
  standShade.addColorStop(0,'rgba(0,0,0,.45)'); standShade.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle = standShade; g.fillRect(0,0,GAME_W,74);
  g.save();
  g.globalCompositeOperation = 'lighter';
  const beam = (x0, tx) => {
    const lg = g.createLinearGradient(x0, 10, tx, 330);
    lg.addColorStop(0,'rgba(200,232,255,.26)'); lg.addColorStop(1,'rgba(200,232,255,0)');
    g.fillStyle = lg;
    g.beginPath(); g.moveTo(x0-16,6); g.lineTo(x0+16,6); g.lineTo(tx+130,360); g.lineTo(tx-130,360); g.closePath(); g.fill();
  };
  beam(60, 350); beam(900, 610);
  const pool = (px, py, pr) => {
    const rg = g.createRadialGradient(px,py,4, px,py,pr);
    rg.addColorStop(0,'rgba(220,255,230,.10)'); rg.addColorStop(1,'rgba(220,255,230,0)');
    g.fillStyle = rg;
    g.save(); g.translate(px,py); g.scale(1,0.45); g.translate(-px,-py);
    g.beginPath(); g.arc(px,py,pr,0,TAU); g.fill(); g.restore();
  };
  pool(370, 320, 170); pool(600, 320, 170); pool(480, 452, 150);
  return c;
})();
/* 遊戲同款：足球離屏精靈 */
const ballSprite = (function(){
  const k = 3, R = 11;
  const c = document.createElement('canvas'); c.width = c.height = R*2*k;
  const g = c.getContext('2d');
  g.translate(R*k, R*k); g.scale(k,k);
  const sh = g.createRadialGradient(-3.2,-3.2,1, 0,0,10.4);
  sh.addColorStop(0,'#ffffff'); sh.addColorStop(0.62,'#eef2f6'); sh.addColorStop(1,'#a9b6c2');
  g.fillStyle = sh;
  g.beginPath(); g.arc(0,0,9,0,TAU); g.fill();
  g.save(); g.beginPath(); g.arc(0,0,9,0,TAU); g.clip();
  g.fillStyle = '#1c232b';
  for(let i=0;i<5;i++){
    const a = i/5*TAU;
    g.beginPath(); g.arc(Math.cos(a)*4.6, Math.sin(a)*4.6, 2.3, 0, TAU); g.fill();
  }
  g.fillStyle = 'rgba(0,0,0,.22)';
  g.beginPath(); g.arc(3,3.4,8.6,Math.PI*1.75,Math.PI*0.78); g.fill();
  g.restore();
  g.strokeStyle = 'rgba(10,16,22,.5)'; g.lineWidth = 1;

function drawTitleChars(chars, cx, cy, t, stagger, dur, sweepAt){
  let total = 0; chars.forEach(s => total += s.w - 30);
  let x = cx - total/2;
  let minX = 1e9, maxX = -1e9;
  chars.forEach((s,i)=>{
    const p = clamp01((t - i*stagger) / dur);
    const w = s.w - 30;
    if(p > 0){

      ctx.scale(0.6 + 0.4*e, 0.6 + 0.4*e);

      minX = Math.min(minX, x); maxX = Math.max(maxX, x + w);
    }

  });
  if(sweepAt !== undefined && t > sweepAt && t < sweepAt + 0.9 && maxX > minX){
    const p = (t - sweepAt) / 0.9;
    const sx = lerp(minX - 100, maxX + 100, easeInOut(p));

function bakeBystanderSprite(cheer){
  const k = 2, lw = 72, lh = 100, ox = 36, oy = 62;
  const c = document.createElement('canvas');
  c.width = lw*k; c.height = lh*k;
  c._lw = lw; c._lh = lh; c._ox = ox; c._oy = oy;
  const g = c.getContext('2d');
  g.scale(k,k); g.translate(ox,oy);
  drawBystanderOn(g, cheer);
  return c;
}
let bystanderIdleSprite = null, bystanderCheerSprite = null;
function drawMinecraftBystander(x,y,scale,bob,cheer){
  if(!bystanderIdleSprite){
    bystanderIdleSprite = bakeBystanderSprite(false);
    bystanderCheerSprite = bakeBystanderSprite(true);
  }
  const spr = cheer ? bystanderCheerSprite : bystanderIdleSprite;
  const w = spr._lw*scale, h = spr._lh*scale;
  ctx.drawImage(spr, x - spr._ox*scale, y + Math.sin(bob)*2 - spr._oy*scale, w, h);
}

  ctx.beginPath(); ctx.arc(0,0,r,0,TAU); ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeStyle = 'rgba(255,207,92,.5)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0,0,r*0.55,0,TAU); ctx.stroke();
  ctx.fillStyle = 'rgba(255,207,92,.16)';

}
function drawBall(x,y,scale,spin){

function drawGoalAndNet(rippleT){
  ctx.strokeStyle = 'rgba(255,255,255,.35)'; ctx.lineWidth = 1;
  const rip = rippleT > 0 ? Math.sin(rippleT*18)*Math.max(0,1.2-rippleT)*6 : 0;
  for(let x=GOAL.x1; x<=GOAL.x2; x+=15){
    ctx.beginPath();
    ctx.moveTo(x, GOAL.y);
    ctx.quadraticCurveTo(x + rip*Math.sin(x*0.2), (GOAL.y+GOAL.y+GOAL.h)/2, x, GOAL.y+GOAL.h);
    ctx.stroke();
  }
  for(let y=GOAL.y; y<=GOAL.y+GOAL.h; y+=12){
    ctx.beginPath();
    ctx.moveTo(GOAL.x1,y);
    ctx.quadraticCurveTo(480, y + rip, GOAL.x2, y);
    ctx.stroke();
  }
  ctx.strokeStyle = '#f4f4f4'; ctx.lineWidth = 5; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(GOAL.x1, GOAL.y+GOAL.h); ctx.lineTo(GOAL.x1, GOAL.y); ctx.lineTo(GOAL.x2, GOAL.y); ctx.lineTo(GOAL.x2, GOAL.y+GOAL.h);
  ctx.stroke();
}

  if(alpha<=0) return;

  ctx.fillStyle = 'rgba(5,8,16,0.68)';
  ctx.fillRect(0, bandY-56, GAME_W, 112);

  ctx.fillRect(0, bandY+53, GAME_W, 3);

// 遊戲同款 HUD（進球數＋傳奇模式回合，字體與描邊同遊戲；置於 letterbox 安全區內）
function drawHUD(t){
  if(t < T.standoffStart || t > T.celebEnd - 0.8) return;

function drawResultText(t){

let ballTrailPrev = null;
const LB_H = 54;

function render(t, dt){
  updateParts(dt);
  updateConfetti(dt, t);
  const flashT = t>T.goal && t<T.goal+0.2 ? 1-(t-T.goal)/0.2 : 0;
  const shakeT = t>T.goal && t<T.goal+0.5 ? 7*(1-(t-T.goal)/0.5) : 0;

  ctx.save();

  // v6 電影運鏡：對峙推軌 → 射門跟拍 → 進球衝擊 zoom-punch → 慶祝緩慢回拉
  let zoom = 1.02, ox = 0, oy = 0;
  if(t < T.standoffStart){
    zoom = lerp(1.10, 1.03, easeOutCubic(clamp01(t/T.introEnd)));
  } else if(t < T.runStart){
    zoom = lerp(1.03, 1.10, easeInOut(clamp01((t-T.standoffStart)/(T.standoffEnd-T.standoffStart))));
    ox = lerp(-14, 6, clamp01((t-T.standoffStart)/(T.standoffEnd-T.standoffStart)));
  } else if(t < T.goal){
    const ft = clamp01((t-T.kick)/(T.flightEnd-T.kick));
    zoom = lerp(1.10, 1.17, ft);
    ox = lerp(6, 26, ft); oy = lerp(0, -14, ft);
  } else {
    const ct = clamp01((t-T.goal)/1.6);
    zoom = lerp(1.22, 1.04, easeOutCubic(ct));
    ox = lerp(30, 0, ct); oy = lerp(-16, 0, ct);
  }
  const mx = GAME_W/2*(1-1/zoom)-0.5, my = GAME_H/2*(1-1/zoom)-0.5;
  ox = Math.max(-mx, Math.min(mx, ox + (Math.random()*2-1)*shakeT*0.4));
  oy = Math.max(-my, Math.min(my, oy + (Math.random()*2-1)*shakeT*0.3));
  ctx.translate(GAME_W/2, GAME_H/2);
  ctx.scale(zoom, zoom);
  ctx.translate(-GAME_W/2 - ox, -GAME_H/2 - oy);

  // ===== 場景全部以遊戲原版繪製函式呈現（同一套代碼、同一個球場）=====
  ctx.drawImage(bakedPitch, 0, 0, GAME_W, GAME_H);
  drawFloodlightGlows();

  const TARGET = { x:386, y:150, r:34 };
  const rippleT = t - T.goal;
  drawGoalAndNet(rippleT);
  drawTarget(TARGET.x, TARGET.y, TARGET.r, t);

  // 雙門將「西羅」「卡卡」：射門後雙雙撲錯邊，進球瞬間錯愕
  const diveT = clamp01((t - (T.kick+0.7))/1.1);
  const keeperExpr = t > T.goal ? 'shock' : 'normal';
  const drift = Math.sin(t*1.3)*10;
  drawKeeper(420 + (t<T.kick? drift:0), GOAL.y+42, 1.05, t>T.kick+0.7?1:0, diveT, 1, '西羅', '#ff7e3d', keeperExpr);
  drawKeeper(540 - (t<T.kick? drift:0), GOAL.y+42, 1.05, t>T.kick+0.7?1:0, diveT*0.85, 12, '卡卡', '#9a6bff', keeperExpr);

  // 傳奇模式跳躍人牆（射門瞬間起跳）
  const wallX = clamp(TARGET.x, GOAL.x1+40, GOAL.x2-40);
  [-40,0,40].forEach((off,i)=>{
    const jt = t > T.kick+0.1 ? clamp01((t-(T.kick+0.1+i*0.05))/0.55) : 0;
    const jh = Math.sin(jt*Math.PI)*34;
    drawWallDefender(wallX + off, WALL_Y, 0.9, jh, t, 0);
  });

  // 獅子巡邏草皮（遊戲同款雙獅）
  const lionX = (base, speed, dir0) => {
    let ph = (base - 330 + dir0*speed*t) % 600;
    if(ph < 0) ph += 600;
    return { x: ph < 300 ? 330+ph : 630-(ph-300), f: ph < 300 ? 1 : -1 };
  };
  const l1 = lionX(390, 44, 1), l2 = lionX(590, 58, -1);
  const lionExpr = (t > T.kick && t < T.goal+0.8) ? 'roar' : 'normal';
  drawLion(l1.x, LION_Y, 1, l1.f, t, lionExpr);
  drawLion(l2.x, LION_Y, 1, l2.f, t, lionExpr);

  // 場邊方塊觀眾（進球歡呼舉手）
  const cheer = t > T.goal;
  drawMinecraftBystander(120, 470, 1.15, t*1.3, cheer);
  drawMinecraftBystander(850, 470, 1.15, t*1.3 + 1.6, cheer);

  // 對峙拍：遊戲同款拖曳瞄準預覽（青色虛線弧＋瞄準點＋力道條）
  if(t >= T.standoffStart && t < T.runStart){
    const p = easeInOut(clamp01((t-T.standoffStart)/(T.standoffEnd-T.standoffStart-0.4)));
    const previewX = lerp(480, TARGET.x, p);
    const previewY = lerp(GOAL.y+GOAL.h-14, TARGET.y, p);
    ctx.strokeStyle = 'rgba(56,225,255,.7)'; ctx.setLineDash([6,6]); ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(BALL_START.x, BALL_START.y);
    ctx.quadraticCurveTo((BALL_START.x+previewX)/2, (BALL_START.y+previewY)/2, previewX, previewY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(56,225,255,.85)';
    ctx.beginPath(); ctx.arc(previewX, previewY, 10, 0, TAU); ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,.45)';
    ctx.fillRect(GAME_W/2-90, 444, 180, 14);
    ctx.fillStyle = p > 0.75 ? '#ff6cc7' : '#38e1ff';
    ctx.fillRect(GAME_W/2-88, 446, 176*p, 10);
    ctx.fillStyle = 'rgba(255,255,255,.7)'; ctx.font='700 11px '+FONT; ctx.textAlign='center';
    ctx.fillText('↑↓ 力道', GAME_W/2, 438);
  }

  // 梅西與球（遊戲同款 drawMessi / 足球精靈）
  if(t < T.kick){
    const kickPhase = t > T.kick-0.42 ? clamp01((t-(T.kick-0.42))/0.5) : 0;
    drawMessi(BALL_START.x-14, BALL_START.y, 1.1, kickPhase, 'normal');
    drawBall(BALL_START.x, BALL_START.y-4, 1, t*2);
  } else if(t < T.goal){
    const ft = clamp01((t-T.kick)/(T.flightEnd-T.kick));
    const fe = easeOutCubic(ft);
    const gx = lerp(BALL_START.x, TARGET.x, fe) + Math.sin(fe*Math.PI)*92;
    const gy = lerp(BALL_START.y-4, TARGET.y, fe);
    const z = Math.sin(fe*Math.PI)*48;
    drawMessi(BALL_START.x-14, BALL_START.y, 1.1, 1, 'normal');
    ctx.fillStyle = 'rgba(0,0,0,.25)';
    ctx.beginPath(); ctx.ellipse(gx, gy, 8, 3, 0, 0, TAU); ctx.fill();
    pushTrail(gx, gy - z);
    drawTrailGlow(dt);
    drawBall(gx, gy - z, lerp(1, 0.55, ft), t*9);
    if(Math.random()<0.7) parts.push({x:gx,y:gy-z,vx:(Math.random()*40-20),vy:(Math.random()*40-20),life:0.22,maxLife:0.22,color:'rgba(255,255,255,0.55)',size:2.5});
  } else {
    const ct = t - T.goal;
    drawTrailGlow(dt);
    // 球落在金色目標圈內、網中滾動
    drawBall(TARGET.x + Math.min(ct*10, 12), TARGET.y + Math.min(ct*6, 8), 0.55, t*4);
    const jump = Math.max(0, Math.sin(clamp01(ct/1.2)*Math.PI))*30;
    drawMessi(BALL_START.x-14, BALL_START.y - jump, 1.1, 1, 'happy');
    if(!fired.netHit && ct>0){
      fired.netHit=true;
      burst(TARGET.x, TARGET.y, '#ffd447', 30, 280, 1.0, 4);
      confettiBurst(TARGET.x, TARGET.y-20, 90);
      confettiBurst(GAME_W*0.3, 110, 40);
      confettiBurst(GAME_W*0.7, 110, 40);
    }
    // 慶祝期間持續飄彩帶
    if(ct>0.5 && ct<4.2 && Math.random()<0.35){
      confetti.push({
        x:Math.random()*GAME_W, y:-12,
        vx:(Math.random()*2-1)*30, vy:60+Math.random()*80,
        rot:Math.random()*Math.PI*2, vr:(Math.random()*2-1)*8,
        w:4+Math.random()*5, h:2.5+Math.random()*3.5,
        color:CONF_COLORS[(Math.random()*CONF_COLORS.length)|0],
        life:3.2, maxLife:3.2, ph:Math.random()*Math.PI*2
      });
    }
  }

  drawParts();
  drawConfetti();
  ctx.restore();

  drawHUD(t);
  drawResultText(t);

  if(flashT>0){
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = `rgba(255,248,225,${flashT*0.65})`;
    ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.restore();
  }

  drawTitle(t);
  if(t>T.celebEnd) drawEndCard(t);

  // v6 後製：暈影＋膠片顆粒＋letterbox 黑邊
  ctx.drawImage(vigTex, 0, 0, GAME_W, GAME_H);
  ctx.save(); ctx.globalAlpha = 0.5;
  ctx.fillStyle = grainPats[(t*14|0) % 3];
  ctx.fillRect(0,0,GAME_W,GAME_H);
  ctx.restore();
  const lb = LB_H * easeOutCubic(clamp01(t/1.3));
  ctx.fillStyle = '#04060c';
  ctx.fillRect(0, 0, GAME_W, lb);
  ctx.fillRect(0, GAME_H - lb, GAME_W, lb);
}

function scheduleSounds(t){
  if(t>0.05 && !fired.crowdAmb){ fired.crowdAmb=true; crowdSwell(); riser(1.6, 0.1); }
  if(t>T.standoffStart+0.1 && !fired.whistle){ fired.whistle=true; beep(1300,0.16,'square',0.11); heartKick(0,0.4); }
  if(t>T.standoffStart+0.3 && !fired.heart){
    fired.heart = true;
    // 心跳鼓點：越跳越快，緊張感直到射門
    [0,0.85,1.65,2.35,2.9,3.3,3.6].forEach((d,i)=>heartKick(d, 0.2+i*0.03));
  }
  if(t>T.standoffEnd-0.6 && !fired.tension){ fired.tension=true; beep(220,0.9,'sine',0.05,60); }
  if(t>T.runStart && !fired.riser){ fired.riser=true; riser(T.kick-T.runStart, 0); }
  if(t>T.kick-0.03 && !fired.kick){ fired.kick=true; kickThud(); }
  if(t>T.kick+0.85 && !fired.curl){ fired.curl=true; beep(950,0.65,'sine',0.05,-560); riser(1.5, 0); }
  if(t>T.goal && !fired.roar){ fired.roar=true; braam(0.5); noiseBurst(2.4,0.24,0,1100,0.6); beep(660,0.3,'triangle',0.13,320); }
  if(t>T.goal+0.15 && !fired.chant){
    fired.chant = true;
    [523,659,784,1047].forEach((f,i)=>note(f, i*0.17));
  }
  if(t>T.celebEnd && !fired.endHit){ fired.endHit=true; stinger(); }
}

let last = null;
function frame(now){
  if(last===null) last = now;
  const dt = Math.min((now-last)/1000, 0.05);
  last = now;
  if(!done){
    elapsed += dt;
    scheduleSounds(elapsed);
    if(elapsed >= T.total){
      done = true;
      document.getElementById('replayBtn').style.display = 'flex';
    }
  }
  ctx.fillStyle = '#050810';
  ctx.fillRect(0,0,GAME_W,GAME_H);
  render(Math.min(elapsed, T.total), dt);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

document.getElementById('replayBtn').addEventListener('click', (e)=>{
  e.stopPropagation();
  elapsed = 0; done = false;
  fired = {crowdAmb:false, whistle:false, tension:false, heart:false, riser:false, kick:false, curl:false, netHit:false, roar:false, chant:false, endHit:false};
  parts.length = 0; confetti.length = 0; trailPts.length = 0; ballTrailPrev = null;
  document.getElementById('replayBtn').style.display = 'none';
});

  var API="//abacus.jasoncameron.dev/";
  function ping(n){ try{ var p=fetch(API+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(p&&p.catch) p.catch(function(){}); }catch(e){} }
  function read(n,cb){ try{ fetch(API+"get/"+NS+"/"+n).then(function(r){ return r.status===404?{value:0}:r.json(); }).then(function(j){ cb(j.value||j.count||0); }).catch(function(){ cb(null); }); }catch(e){ cb(null); } }
  ping(K+"-v");
  ping(K+"-p"); ping("site-total-plays");
  /* 投票鈕：非常好玩/好玩——與作品館同一計數器，任何網頁打開都同步 */
  function initVotes(){
    if(!document.body) return;
    var wrap=document.createElement("div");
    wrap.style.cssText="position:fixed;right:10px;bottom:10px;z-index:99999;display:flex;gap:6px;font-family:sans-serif;opacity:.92";
    var LS="voted-"+K;
    var defs=[["-love","\u2764\uFE0F","\u975e\u5e38\u597d\u73a9","#ff6cc7"],["-like","\ud83d\udc4d","\u597d\u73a9","#38e1ff"]];
    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;
          b.querySelector("i").textContent=Math.max(0,(n||0)-(c||0));
        }); });
      });
    }
    defs.forEach(function(d){
      var b=document.createElement("button");
      b.type="button"; b.title=d[2];
      b.style.cssText="min-height:42px;padding:8px 14px;border:none;border-radius:999px;background:rgba(15,18,32,.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation";
      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";
      b.addEventListener("click",function(){
        var prev=null; try{ prev=localStorage.getItem(LS); }catch(e){}
        if(prev===d[0]){ ping(K+d[0]+"-c"); try{ localStorage.removeItem(LS); }catch(e){} }
        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);
      });
      btns[d[0]]=b; wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    refresh();
    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* 每10秒同步別人投的票 */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
</script>
