<style>

<script>
'use strict';
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const soundBtn = document.getElementById('soundBtn');
const replayBtn = document.getElementById('replayBtn');
const screenStory = document.getElementById('screenStory');
const storyText = document.getElementById('storyText');
const screenTitle = document.getElementById('screenTitle');
const screenCTA = document.getElementById('screenCTA');
const screenPets = document.getElementById('screenPets');
const screenStage = document.getElementById('screenStage');
const hud = document.getElementById('hud');
const skillBar = document.getElementById('skillBar');
const hpfill = document.getElementById('hpfill');
const magicLabel = document.getElementById('magicLabel');
const scoreLabel = document.getElementById('scoreLabel');
const waveLabel = document.getElementById('waveLabel');
const charRow = document.getElementById('charRow');
const petRow = document.getElementById('petRow');
const petTypeDesc = document.getElementById('petTypeDesc');
const stageName = document.getElementById('stageName');
const stageBoss = document.getElementById('stageBoss');

function resize() {
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  document.getElementById('wrap').style.width = GAME_W * scale + 'px';
  document.getElementById('wrap').style.height = GAME_H * scale + 'px';
}
addEventListener('resize', resize); resize();

/* ================= 與遊戲本體完全一致的資料表（照抄 games/魔法覺醒.html）================= */

  {key:'dark', name:'暗影魔法', icon:'🌑', color:'#9a6bff'},

function magicByKey(k){ return MAGICS.find(m=>m.key===k); }

  {id:'p2', icon:'🦉', name:'夜梟',   type:'heal',   color:'#7fffb0'},

const STAGES = [
  {name:'新手森林', top:'#1b3a2a', bottom:'#0a1810', bossName:'森林領主', bossColor:'#5d8a4a', bossIcon:'🌳'},
  {name:'熔岩地窟', top:'#3a1410', bottom:'#160705', bossName:'熔岩魔像', bossColor:'#ff5b3d', bossIcon:'🌋'},
  {name:'極寒冰原', top:'#0d2438', bottom:'#04101c', bossName:'冰霜巨人', bossColor:'#8fe3ff', bossIcon:'❄️'},
  {name:'虛空深淵', top:'#1c1030', bottom:'#08040f', bossName:'虛空領主', bossColor:'#c58bff', bossIcon:'🌌'},
];

/* ================= 音效（Web Audio 合成）================= */
/* v6：聲音預設開啟＋DynamicsCompressor 母線＋程序化殘響＋雙模式配樂（探索琶音/戰鬥鼓組） */
let audioCtx = null, soundOn = true;
let MASTER = null, MUSIC = null, VERB = null, NOISE_BUF = null;
function ensureAudio(){
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const comp = audioCtx.createDynamicsCompressor();
  comp.threshold.value = -16; comp.knee.value = 18; comp.ratio.value = 7;
  comp.attack.value = 0.004; comp.release.value = 0.2;
  comp.connect(audioCtx.destination);
  MASTER = audioCtx.createGain(); MASTER.gain.value = 0.9; MASTER.connect(comp);
  MUSIC = audioCtx.createGain(); MUSIC.gain.value = 1; MUSIC.connect(MASTER);
  VERB = audioCtx.createConvolver();
  (function(){
    const rate = audioCtx.sampleRate, len = (rate*2.1)|0, buf = audioCtx.createBuffer(2,len,rate);
    for(let ch=0;ch<2;ch++){ const d = buf.getChannelData(ch);
      for(let i=0;i<len;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/len,2.8)*0.55; }
    VERB.buffer = buf;
  })();
  const vg = audioCtx.createGain(); vg.gain.value = 0.8; VERB.connect(vg); vg.connect(MASTER);
  NOISE_BUF = (function(){
    const rate = audioCtx.sampleRate, len = (rate*1.5)|0, buf = audioCtx.createBuffer(1,len,rate);
    const d = buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i] = Math.random()*2-1;
    return buf;
  })();
}
soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? '🔊' : '🔇';
  if (soundOn) {
    try { ensureAudio(); } catch (e) {}
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  if (!soundOn && 'speechSynthesis' in window) speechSynthesis.cancel();
});
function beep(freq, dur, type, vol, sweep) {
  if (!soundOn || !audioCtx) return;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, t0);
  if (sweep) osc.frequency.exponentialRampToValueAtTime(sweep, t0 + dur);
  gain.gain.setValueAtTime(vol || 0.2, t0);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  osc.connect(gain); gain.connect(MASTER);
  osc.start(t0); osc.stop(t0 + dur + 0.02);
}
function chime() {
  if (!soundOn || !audioCtx) return;
  const t = audioCtx.currentTime;
  [660, 880, 1100, 1320].forEach((fq, i) => {
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(fq, t + i * 0.08);
    g.gain.setValueAtTime(0.0001, t + i * 0.08);
    g.gain.exponentialRampToValueAtTime(0.18, t + i * 0.08 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.08 + 0.3);
    osc.connect(g).connect(MASTER); g.connect(VERB);
    osc.start(t + i * 0.08); osc.stop(t + i * 0.08 + 0.32);
  });
}
function duckMusic(level, hold){
  if(!MUSIC) return;
  const g = MUSIC.gain, t = audioCtx.currentTime;
  g.cancelScheduledValues(t); g.setValueAtTime(g.value, t);
  g.linearRampToValueAtTime(level, t+0.05);
  g.linearRampToValueAtTime(1, t+(hold||1.0));
}
function braam(vol){
  if(!soundOn || !audioCtx) return;
  const t0 = audioCtx.currentTime;
  duckMusic(0.3, 1.4);
  [55, 55.8, 27.5].forEach((f,i)=>{
    const o = audioCtx.createOscillator(), g = audioCtx.createGain(), lp = audioCtx.createBiquadFilter();
    o.type = 'sawtooth'; o.frequency.value = f;
    lp.type = 'lowpass'; lp.Q.value = 3;
    lp.frequency.setValueAtTime(90, t0);
    lp.frequency.exponentialRampToValueAtTime(540, t0+0.26);
    lp.frequency.exponentialRampToValueAtTime(110, t0+1.45);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol*(i===2?0.7:0.5), t0+0.06);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+1.55);
    o.connect(lp); lp.connect(g); g.connect(MASTER); g.connect(VERB);
    o.start(t0); o.stop(t0+1.65);
  });
}
function riser(dur){
  if(!soundOn || !audioCtx) return;
  const t0 = audioCtx.currentTime;
  const src = audioCtx.createBufferSource(); src.buffer = NOISE_BUF; src.loop = true;
  const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.3;
  bp.frequency.setValueAtTime(240, t0);
  bp.frequency.exponentialRampToValueAtTime(3200, t0+dur);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(0.15, t0+dur);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur+0.08);
  src.connect(bp); bp.connect(g); g.connect(MASTER); g.connect(VERB);
  src.start(t0); src.stop(t0+dur+0.15);
}
function whooshSfx(){
  if(!soundOn || !audioCtx) return;
  const t0 = audioCtx.currentTime;
  const src = audioCtx.createBufferSource(); src.buffer = NOISE_BUF; src.loop = true;
  const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.2;
  bp.frequency.setValueAtTime(2300, t0);
  bp.frequency.exponentialRampToValueAtTime(280, t0+0.4);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(0.18, t0+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+0.4);
  src.connect(bp); bp.connect(g); g.connect(MASTER); g.connect(VERB);
  src.start(t0); src.stop(t0+0.48);
}
function stinger(){
  if(!soundOn || !audioCtx) return;
  braam(0.5);
  const t = audioCtx.currentTime;
  [523, 784, 1046].forEach((fq, i) => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'triangle'; o.frequency.value = fq;
    g.gain.setValueAtTime(0.0001, t+0.12*i);
    g.gain.exponentialRampToValueAtTime(0.1, t+0.12*i+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t+0.12*i+1.1);
    o.connect(g); g.connect(MASTER); g.connect(VERB);
    o.start(t+0.12*i); o.stop(t+0.12*i+1.2);
  });
}
/* v6 全程配樂：探索模式（神祕琶音）／戰鬥模式（鼓組推進），逐拍排程 */
let musicMode = 'calm';
const CALM_ARP  = [220,0,262,330, 392,0,330,262, 220,0,262,392, 440,392,330,262];
const CALM_BASS = [55,0,0,0, 65.4,0,0,0, 55,0,0,0, 73.4,0,65.4,0];
const BATTLE_ARP  = [220,262,330,262, 349,330,262,220, 196,262,330,392, 440,392,330,262];
const BATTLE_BASS = [55,0,55,0, 87.3,0,87.3,0, 49,0,49,0, 65.4,0,65.4,0];
const NOTE_D = 0.21;
let musicTimer = null;
function musicTick(){
  if(!soundOn || !audioCtx || audioCtx.state !== 'running') return;
  const t0 = audioCtx.currentTime;
  musicTick._step = (musicTick._step || 0) + 1;
  const step = musicTick._step % 16;
  const battle = musicMode === 'battle';
  const arp = battle ? BATTLE_ARP : CALM_ARP;
  const bass = battle ? BATTLE_BASS : CALM_BASS;
  if(arp[step]){
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = battle ? 'sawtooth' : 'triangle'; o.frequency.value = arp[step]*2;
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(battle?0.05:0.045, t0+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+NOTE_D*(battle?0.9:1.6));
    o.connect(g); g.connect(MUSIC); g.connect(VERB);
    o.start(t0); o.stop(t0+NOTE_D*2);
  }
  if(bass[step]){
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = bass[step];
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(0.11, t0+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+NOTE_D*3.4);
    o.connect(g); g.connect(MUSIC);
    o.start(t0); o.stop(t0+NOTE_D*3.6);
  }
  const kickOn = battle ? (step % 2 === 0) : (step % 8 === 0);
  if(kickOn){
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(150, t0);
    o.frequency.exponentialRampToValueAtTime(44, t0+0.11);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(battle?0.22:0.13, t0+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+0.2);
    o.connect(g); g.connect(MUSIC);
    o.start(t0); o.stop(t0+0.24);
  }
  if(battle || step % 4 === 2){
    const src = audioCtx.createBufferSource(); src.buffer = NOISE_BUF; src.loop = true;
    const hpf = audioCtx.createBiquadFilter(); hpf.type = 'highpass'; hpf.frequency.value = 6400;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(battle?0.026:0.016, t0);
    g.gain.exponentialRampToValueAtTime(0.0005, t0+0.05);
    src.connect(hpf); hpf.connect(g); g.connect(MUSIC);

  }
}
function startMusicLoop(){
  if(musicTimer) return;

/* ================= 女聲旁白（Web Speech API,系統內建語音合成,零外部資源）================= */
let femaleVoice = null, voicesReady = false;
function pickFemaleVoice() {
  if (!('speechSynthesis' in window)) return;
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return;
  voicesReady = true;
  const zhVoices = voices.filter(v => /zh|cmn|yue/i.test(v.lang));
  const pool = zhVoices.length ? zhVoices : voices;
  femaleVoice =
    pool.find(v => /child|kid|junior|小孩|童/i.test(v.name)) ||
    pool.find(v => /female|女|yating|mei|ting|xiaoxiao|huihui|meijia|shanshan/i.test(v.name)) ||
    pool.find(v => !/male|男/i.test(v.name)) ||
    pool[0] || null;
}
if ('speechSynthesis' in window) {
  pickFemaleVoice();
  speechSynthesis.onvoiceschanged = pickFemaleVoice;
}
function speak(text) {
  if (!soundOn || !('speechSynthesis' in window)) return;
  if (!voicesReady) pickFemaleVoice();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = (femaleVoice && femaleVoice.lang) || 'zh-TW';
  if (femaleVoice) u.voice = femaleVoice;
  u.pitch = 2.0; u.rate = 1.18; u.volume = 1;
  speechSynthesis.speak(u);
}

const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

function bakeTex(w,h,fn){ const c = document.createElement('canvas'); c.width=w; c.height=h; fn(c.getContext('2d'),w,h); return c; }

const grainTiles = [0,1,2].map(()=> bakeTex(160,160,(g,w,h)=>{

const TITLE_CHARS = bakeChars('魔法覺醒', 64, ['#38e1ff','#4f7cff','#9a6bff','#ff6cc7'], 'rgba(140,150,255,0.95)');
function drawTitleChars(chars, cx, cy, t, stagger, dur, sweepAt){
  let total = 0; chars.forEach(s => total += s.w - 32);
  let x = cx - total/2;
  let minX = 1e9, maxX = -1e9;
  chars.forEach((s,i)=>{
    const p = clamp((t - i*stagger)/dur, 0, 1);

      ctx.scale(0.6 + 0.4*e, 0.6 + 0.4*e);
      ctx.drawImage(s.c, -s.w/2, -s.h/2);

function drawCharacter(c, cx, cy, r, gender, outfitColor, hairColor, walkPhase, facingRight, magicColor, aimAngle) {
  c.save();

  c.quadraticCurveTo(0, r * 0.7, 0, -r * 0.2);

  c.lineWidth = r * 0.34; c.lineCap = 'round';

  c.moveTo(r * 0.25, r * 0.55); c.lineTo(r * 0.25 - swing * 5, r * 1.15);

  c.fillStyle = outfitColor;
  c.beginPath();
  c.moveTo(-r * 0.55, r * 0.15);
  c.quadraticCurveTo(0, r * 0.55, r * 0.55, r * 0.15);
  c.lineTo(r * 0.45, -r * 0.35);
  c.quadraticCurveTo(0, -r * 0.55, -r * 0.45, -r * 0.35);
  c.closePath(); c.fill();
  c.fillStyle = 'rgba(255,255,255,0.18)';
  c.beginPath(); c.ellipse(-r * 0.12, -r * 0.05, r * 0.22, r * 0.32, 0.3, 0, 7); c.fill();

  c.strokeStyle = outfitColor;
  c.lineWidth = r * 0.26; c.lineCap = 'round';
  c.beginPath();
  c.moveTo(-r * 0.5, -r * 0.15); c.lineTo(-r * 0.85 - swing * 3, r * 0.15);
  c.moveTo(r * 0.5, -r * 0.15); c.lineTo(r * 0.85 + swing * 3, r * 0.15);
  c.stroke();
  c.fillStyle = '#ffd9b3';
  c.beginPath(); c.arc(-r * 0.85 - swing * 3, r * 0.15, r * 0.14, 0, 7); c.arc(r * 0.85 + swing * 3, r * 0.15, r * 0.14, 0, 7); c.fill();

  c.fillStyle = '#ffd9b3';

  if (gender === 'girl') {
    c.fillStyle = hairColor;

    c.moveTo(-r * 0.55, -r * 1.0);
    c.quadraticCurveTo(-r * 0.9, -r * 0.3, -r * 0.6 + swing * 3, r * 0.05);
    c.lineTo(-r * 0.3, -r * 0.15);
    c.quadraticCurveTo(-r * 0.5, -r * 0.7, -r * 0.25, -r * 1.15);
    c.closePath(); c.fill();
    c.beginPath();
    c.moveTo(r * 0.55, -r * 1.0);
    c.quadraticCurveTo(r * 0.9, -r * 0.3, r * 0.6 - swing * 3, r * 0.05);
    c.lineTo(r * 0.3, -r * 0.15);
    c.quadraticCurveTo(r * 0.5, -r * 0.7, r * 0.25, -r * 1.15);
    c.closePath(); c.fill();
  }

  c.fillStyle = hairColor;

    c.fillStyle = hairColor;
    c.beginPath(); c.moveTo(-r * 0.5, -r * 0.95); c.lineTo(r * 0.5, -r * 0.95); c.lineTo(r * 0.4, -r * 1.15); c.lineTo(-r * 0.4, -r * 1.15); c.closePath(); c.fill();
  }

  const eyeDx = facingRight ? r * 0.12 : -r * 0.12;

  ctx.fillStyle = '#9db3d8';

  ctx.restore();
}
/* 神聖庇護光環：與遊戲本體 divineBuffT 光暈同款畫法 */
function divineAura(x, y, r, t, strength) {
  ctx.save();
  const pulse = 0.7 + Math.sin(t * 8) * 0.3;
  ctx.globalAlpha = 0.35 * strength;
  const auraR = r * 2.6 + pulse * 6;
  const aura = ctx.createRadialGradient(x, y, r * 0.5, x, y, auraR);
  aura.addColorStop(0, 'rgba(255,230,160,0.6)'); aura.addColorStop(1, 'rgba(255,230,160,0)');
  ctx.fillStyle = aura;
  ctx.beginPath(); ctx.arc(x, y, auraR, 0, 7); ctx.fill();
  ctx.restore();
}
/* 天神降臨全螢幕金光閃現：與遊戲本體 divineFlashT 同款畫法 */
function divineFlash(strength) {
  ctx.save();
  ctx.globalAlpha = Math.max(0, strength) * 0.65;
  const flash = ctx.createRadialGradient(GAME_W / 2, GAME_H / 2, 0, GAME_W / 2, GAME_H / 2, Math.max(GAME_W, GAME_H) * 0.75);
  flash.addColorStop(0, 'rgba(255,244,214,0.9)'); flash.addColorStop(1, 'rgba(255,244,214,0)');
  ctx.fillStyle = flash;
  ctx.fillRect(0, 0, GAME_W, GAME_H);
  ctx.restore();
}

/* ================= 場景腳本化模擬（假資料驅動,畫面元素與遊戲本體 100% 同款畫法）================= */
const CHAR = CHARACTERS[0]; // 小炎
const MAGIC = magicByKey(CHAR.magicKey);
const STAGE = STAGES[0];

let enemies = [];
let bullets = [];
let particles = [];
let score = 0, wave = 1, hp = 100;
let rngSeed = 7;
function rnd() { rngSeed = (rngSeed * 16807) % 2147483647; return rngSeed / 2147483647; }

function spawnEnemyAt(x, y, isBoss) {
  enemies.push({
    x, y, r: isBoss ? 62 : 20, type: isBoss ? 'boss' : 'normal',
    hp: isBoss ? 240 : 24, maxHp: isBoss ? 240 : 24, hitT: 0, icon: STAGE.bossIcon,
  });
}
function spawnBulletTowards(px, py, tx, ty, color) {
  const a = Math.atan2(ty - py, tx - px);
  bullets.push({ x: px, y: py, vx: Math.cos(a) * 9, vy: Math.sin(a) * 9, r: 9, color, life: 60 });
}
function burst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = rnd() * Math.PI * 2, sp = 1 + rnd() * 3;
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, r: 2 + rnd() * 2, color, life: 26 });
  }
}
function stepSim() {
  for (const b of bullets) { b.x += b.vx; b.y += b.vy; b.life--; }
  bullets = bullets.filter(b => b.life > 0);
  for (const p of particles) { p.x += p.vx; p.y += p.vy; p.vx *= 0.94; p.vy *= 0.94; p.life--; }
  particles = particles.filter(p => p.life > 0);
  for (const en of enemies) { if (en.hitT > 0) en.hitT--; }
}

/* ================= 時間軸（總長 36 秒,場景切換依真實遊戲畫面呈現）================= */
/* TIMELINE 由下方各幕實際旁白長度動態計算,定義見 drawGameplay 之後 */
let startTime = null, playing = false;
let firedCues = {};
function cue(id, fn) { if (!firedCues[id]) { firedCues[id] = true; fn(); } }
function setLayer(el, on) { el.classList.toggle('show', on); if (!on) el.style.opacity = ''; }

/* ================= 第零幕：故事開場（六元素沉睡＋覺醒的呼喚）================= */
const STORY_STARS = Array.from({ length: 70 }, (_, i) => ({
  x: (i * 137) % GAME_W, y: (i * 251) % GAME_H, r: 0.6 + (i % 3) * 0.5, ph: i * 0.7,
}));
const STORY_LINES = [
  '六種元素之力，沉睡在世界的各個角落……',
  '直到有一天，呼喚聲響起——',
  '魔法覺醒的時刻，到了！',
];
// 每句時長依旁白實際長度估算,確保字幕跟得上語音進度
const storyDurs = cumulativeStarts(STORY_LINES.map(line => Math.max(1.6, estDur(line))));
const STORY_STARTS = storyDurs.starts;
const STORY_DUR = storyDurs.total + 0.4;
function drawStoryBg(t) {
  ctx.drawImage(storyBgTex, 0, 0);
  for (const s of STORY_STARS) {
    const tw = 0.4 + 0.6 * Math.abs(Math.sin(t * 1.1 + s.ph));
    ctx.fillStyle = `rgba(220,235,255,${tw * 0.8})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 7); ctx.fill();
  }
  // 中央甦醒的魔法水晶：六色光芒緩緩旋轉脈動
  const cx = GAME_W / 2, cy = GAME_H * 0.34;
  const pulse = 0.75 + Math.sin(t * 2.2) * 0.25;
  const crystalColors = MAGICS.map(m => m.color);
  ctx.save();
  ctx.translate(cx, cy); ctx.rotate(t * 0.3);
  crystalColors.forEach((c, i) => {
    const a = (i / crystalColors.length) * Math.PI * 2;
    const rr = 70 * pulse;
    const ray = ctx.createRadialGradient(0, 0, 2, Math.cos(a) * rr, Math.sin(a) * rr, rr);
    ray.addColorStop(0, c); ray.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = ray;
    ctx.beginPath(); ctx.arc(Math.cos(a) * rr * 0.5, Math.sin(a) * rr * 0.5, rr * 0.6, 0, 7); ctx.fill();
  });
  ctx.restore();
  ctx.save();
  ctx.globalAlpha = 1;
  const core = ctx.createRadialGradient(cx, cy, 1, cx, cy, 34 * pulse);
  core.addColorStop(0, '#ffffff'); core.addColorStop(0.5, '#9adfff'); core.addColorStop(1, 'rgba(150,220,255,0)');
  ctx.fillStyle = core;
  ctx.beginPath(); ctx.arc(cx, cy, 34 * pulse, 0, 7); ctx.fill();
  ctx.restore();
}
function storyAct(t) {

function hideAll() {

/* ================= 依旁白實際長度估算每段時長,確保字幕/畫面跟得上語音 ================= */
function estDur(text) {
  const len = text.replace(/[，。！？·、\s]/g, '').length;
  return Math.max(1.3, len / 6.2 + 0.4);
}
function phaseIndex(starts, elapsed) {
  let idx = 0;
  for (let i = 0; i < starts.length; i++) if (elapsed >= starts[i]) idx = i;
  return idx;
}
function cumulativeStarts(durs) {
  const starts = []; let acc = 0;
  durs.forEach(d => { starts.push(acc); acc += d; });
  return { starts, total: acc };
}

const TITLE_DUR = Math.max(4, estDur('魔法覺醒！選一位角色，展開專屬的魔法冒險。') + 1);
const COMBAT_DUR = 12;
const PETS_START = TITLE_DUR + COMBAT_DUR;

const PET_TYPE_SEQUENCE = ['attack', 'heal', 'guard'];
const PET_PHASE_LINES = {
  attack: '冒險路上還能帶著寵物夥伴一起戰鬥！攻擊系寵物能追加額外傷害！',
  heal: '治癒系寵物會持續恢復你的生命值！',
  guard: '守護系寵物能幫忙抵擋敵人攻擊！',
};
const petDurs = cumulativeStarts(PET_TYPE_SEQUENCE.map(ty => Math.max(2.4, estDur(PET_PHASE_LINES[ty]))));
const PET_PHASE_STARTS = petDurs.starts;
const PETS_DUR = petDurs.total + 0.5;

const STAGES_START = PETS_START + PETS_DUR;
const STAGE_LINES = STAGES.map((st, i) => (i === 0 ? '四大關卡等你來挑戰！' : '') + '第 ' + (i + 1) + ' 關：' + st.name + '，首領是' + st.bossName + '！');
const stageDurs = cumulativeStarts(STAGE_LINES.map(line => Math.max(1.8, estDur(line))));
const STAGE_STARTS = stageDurs.starts;
const STAGES_DUR = stageDurs.total + 0.5;

const CTA_START = STAGES_START + STAGES_DUR;
const CTA_LINE = '六大元素魔法，十二隻夥伴寵物，四大關卡，快來體驗魔法覺醒吧！';
const CTA_DUR = Math.max(4.5, estDur(CTA_LINE) + 1.6);
const GAMEPLAY_DUR = CTA_START + CTA_DUR;
const TIMELINE = STORY_DUR + GAMEPLAY_DUR;

function drawGameplay(t) {
  if (t < TITLE_DUR) {
    /* ---- 第一幕：選角畫面（與遊戲標題畫面同款 DOM/CSS） ---- */
    drawStageBg(STAGE);
    hideAll(); setLayer(screenTitle, true);
    hud.classList.remove('show'); skillBar.classList.remove('show');
    if (t > 0.2) cue('titleChime', () => chime());
    if (t > 0.3) cue('narrateTitle', () => speak('魔法覺醒！選一位角色，展開專屬的魔法冒險。'));
    const sel = clamp(Math.floor((t / TITLE_DUR) * CHARACTERS.length), 0, CHARACTERS.length - 1);
    [...charRow.children].forEach((el, i) => el.classList.toggle('sel', i === sel));
  } else if (t < PETS_START) {
    /* ---- 第二幕：真實戰鬥畫面重現（森林關卡,小炎主角）---- */
    hideAll();
    hud.classList.add('show'); skillBar.classList.add('show');
    if (t < TITLE_DUR + 0.3) cue('buildSkill', () => { buildSkillBar(MAGIC); magicLabel.textContent = MAGIC.icon + ' ' + MAGIC.name; });
    if (t > TITLE_DUR + 0.4) cue('narrateCombat', () => speak('小炎選擇了烈焰魔法，火球自動鎖定最近的敵人，一擊灼燒！'));
    drawStageBg(STAGE);

    const segT = t - TITLE_DUR;
    // 敵人波次腳本（壓縮至 12 秒內：小怪 → 小怪 → BOSS）
    if (segT > 0.6 && enemies.length === 0) cue('wave1', () => {
      for (let i = 0; i < 4; i++) spawnEnemyAt(680 + (i % 2) * 90, 140 + i * 90, false);
      wave = 1; waveLabel.textContent = '第 ' + wave + ' 波';
    });
    if (segT > 5.4 && enemies.filter(e => e.type !== 'boss').length === 0 && wave === 1) cue('wave2', () => {
      for (let i = 0; i < 3; i++) spawnEnemyAt(700 + (i % 2) * 100, 160 + i * 100, false);
      wave = 2; waveLabel.textContent = '第 ' + wave + ' 波';
    });
    if (segT > 9 && wave < 3) cue('bossWave', () => {
      enemies = [];
      spawnEnemyAt(760, GAME_H / 2, true);
      wave = 3; waveLabel.textContent = '第 3 波（BOSS）';
      braam(0.5); triggerTrans('flash'); camShake = 12; // v6 BOSS 登場衝擊
    });
    if (segT > 5.6 && segT < 9) cue('narrateWave', () => speak('打倒整波敵人，就能晉級下一關！'));

    const px = 220, py = GAME_H / 2;
    const nearest = enemies[0];
    const aimAngle = nearest ? Math.atan2(nearest.y - py, nearest.x - px) : 0;

    // 主角自動攻擊：每 0.42 秒對最近敵人射擊
    if (nearest && Math.floor(segT / 0.42) !== Math.floor((segT - 1 / 60) / 0.42)) {
      spawnBulletTowards(px + Math.cos(aimAngle) * 30, py + Math.sin(aimAngle) * 30, nearest.x, nearest.y, MAGIC.color);
      beep(520, 0.08, 'sine', 0.15, 300);
    }
    // 子彈命中判定
    bullets.forEach(b => {
      enemies.forEach(en => {
        if (en.hp > 0 && Math.hypot(b.x - en.x, b.y - en.y) < en.r + b.r) {
          en.hp -= MAGIC.dmg || 18; en.hitT = 6; b.life = 0;
          burst(en.x, en.y, MAGIC.color, 10);
          score += 10; scoreLabel.textContent = '分數 ' + score;
          if (en.hp <= 0) { burst(en.x, en.y, '#fff', 16); if (soundOn) beep(880, 0.12, 'triangle', 0.2, 440); }
        }
      });
    });
    enemies = enemies.filter(en => en.hp > 0);

    drawGrid();
    for (const p of particles) drawParticle(p.x, p.y, p.r, p.color, Math.max(0, p.life / 26));
    for (const b of bullets) drawBullet(b.x, b.y, b.r, b.color);
    for (const en of enemies) drawEnemy(en.x, en.y, en.r, en.type, en.hitT, en.icon, en.hp, en.maxHp, STAGE.bossColor);

    drawCharacterMain(px, py, 34, CHAR.gender, CHAR.outfit, CHAR.hair, t * 1.4, true, MAGIC.color, aimAngle);

    // 隨行寵物環繞
    PET_POOL.slice(0, 3).forEach((pet, i) => {
      const a = t * 1.2 + i * (Math.PI * 2 / 3);
      const ppx = px + Math.cos(a) * 56, ppy = py + Math.sin(a) * 56 * 0.5 - 30;
      ctx.save();
      ctx.font = '20px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.shadowColor = pet.color; ctx.shadowBlur = 8;
      ctx.fillText(pet.icon, ppx, ppy);
      ctx.restore();
    });

    // 血量腳本：戰鬥中緩降,BOSS 登場時剛好掉到半血觸發「天神降臨」
    const DIVINE_AT = 9;
    const hpPct = segT < DIVINE_AT
      ? clamp(100 - segT * 5.6, 50, 100)
      : Math.min(72, 50 + (segT - DIVINE_AT) * 7);
    hpfill.style.width = hpPct + '%';

    if (segT >= DIVINE_AT) {
      const dt = segT - DIVINE_AT;
      cue('divineDescent', () => {
        beep(200, 0.5, 'sine', 0.3, 900);
        chime();
        camShake = 8; // v6 天神降臨鏡頭震動
        speak('血量掉到一半，天神降臨！攻擊力大幅提升！');
      });
      divineFlash(clamp(1 - dt / 0.9, 0, 1));
      divineAura(px, py, 34, t, clamp(dt / 0.6, 0, 1));
      bannerBig('天神降臨！', '獲得神聖庇護，攻擊力大幅提升！', clamp(dt / 0.4, 0, 1) * clamp((3 - dt) / 0.6, 0, 1));
    }

    if (segT < 5.2) subtitle('WASD／拖曳移動，魔法自動鎖定最近敵人');
    else if (segT < 9) subtitle('打倒整波敵人，晉級下一波！');
    else if (segT < 9.3) subtitle('BOSS 波：' + STAGE.bossName + ' 登場！');
    else if (segT < 12) subtitle('血量過半時會有「天神降臨」神聖庇護！');

    if (segT > 9 && segT < 9.3) cue('bossRoar', () => beep(90, 0.4, 'sawtooth', 0.3, 40));
  } else if (t < STAGES_START) {
    /* ---- 第三幕：寵物圖鑑（同款寵物選單 DOM/CSS）,每段時長依旁白長度自動抓 ---- */
    hideAll(); setLayer(screenPets, true);
    hud.classList.remove('show'); skillBar.classList.remove('show');
    drawStageBg(STAGE); drawGrid();
    const segT = t - PETS_START;
    const phase = phaseIndex(PET_PHASE_STARTS, segT);
    const curType = PET_TYPE_SEQUENCE[phase];
    [...petRow.children].forEach(el => el.classList.toggle('sel', el.dataset.type === curType));
    petTypeDesc.textContent = PET_TYPE_LABEL[curType];
    cue('petPhase' + phase, () => { chime(); speak(PET_PHASE_LINES[curType]); });
  } else if (t < CTA_START) {
    /* ---- 第四幕：四大關卡巡覽,每關時長依旁白長度自動抓 ---- */
    hideAll(); setLayer(screenStage, true);
    hud.classList.remove('show'); skillBar.classList.remove('show');
    const segT = t - STAGES_START;
    const idx = phaseIndex(STAGE_STARTS, segT);
    const st = STAGES[idx];
    drawStageBg(st); drawGrid();
    const bob = Math.sin(t * 2.4) * 6;
    drawEnemy(GAME_W / 2, GAME_H * 0.74 + bob, 86, 'boss', 0, st.bossIcon, 1, 1, st.bossColor);
    stageName.textContent = st.name;
    stageBoss.textContent = '關卡首領：' + st.bossName;
    cue('stageChime' + idx, () => { chime(); speak(STAGE_LINES[idx]); whooshSfx(); triggerTrans('flash'); camShake = 5; });
    subtitle('第 ' + (idx + 1) + ' / ' + STAGES.length + ' 關卡：' + st.name, 1, 36);
  } else {
    /* ---- 第五幕：結算 CTA（同款結束畫面樣式）---- */
    hideAll(); setLayer(screenCTA, true);
    hud.classList.remove('show'); skillBar.classList.remove('show');
    drawStageBg(STAGE);
    drawGrid();
    for (const en of enemies) drawEnemy(en.x, en.y, en.r, en.type, 0, en.icon, en.hp, en.maxHp, STAGE.bossColor);
    const p = clamp((t - CTA_START) / 1.2, 0, 1);
    if (p > 0.05) cue('ctaChime', () => chime());
    if (p > 0.1) cue('narrateCTA', () => speak(CTA_LINE));
    screenCTA.style.opacity = String(easeOut(p));
  }

  // v6：畫面邊緣暗角改由 drawCinema 的烘焙暈影統一處理
}

let lastAct = null;
function draw(t) {
  const dt = Math.max(0, Math.min(0.1, t - prevT)); prevT = t;
  ctx.clearRect(0, 0, GAME_W, GAME_H);
  stepSim();

  // v6 幕別判定＋幕間轉場（whoosh＋閃白/入黑＋鏡頭震動）＋配樂模式
  let act, gt = t - STORY_DUR;
  if (t < STORY_DUR) act = 'story';
  else act = gt < TITLE_DUR ? 'title' : gt < PETS_START ? 'combat' : gt < STAGES_START ? 'pets' : gt < CTA_START ? 'stages' : 'cta';
  if (act !== lastAct) {
    if (lastAct !== null) {
      whooshSfx();
      triggerTrans(act === 'cta' ? 'fade' : 'flash');
      camShake = Math.max(camShake, 6);
      if (act === 'combat') braam(0.45);
      if (act === 'cta') stinger();
    }
    lastAct = act;
  }
  musicMode = act === 'combat' ? 'battle' : 'calm';
  if (act === 'title' && gt > TITLE_DUR - 1.1) cue('riserCombat', () => riser(1.0));
  if (act === 'stages' && gt > CTA_START - 1.1) cue('riserCTA', () => riser(1.0));

  // v6 電影運鏡：水晶推鏡→戰鬥漂移→關卡巡覽搖攝→CTA 收束
  let zoom = 1.03, ox = 0, oy = 0;
  if (act === 'story') {
    const p = easeInOutV(clamp(t / STORY_DUR, 0, 1));
    zoom = lerpV(1.04, 1.13, p); oy = lerpV(4, -8, p);
  } else if (act === 'title') {
    zoom = lerpV(1.10, 1.03, easeOut(clamp(gt / 1.2, 0, 1)));
  } else if (act === 'combat') {
    const segT = gt - TITLE_DUR;
    zoom = 1.05 + 0.02 * Math.sin(segT * 0.7);
    ox = 10 * Math.sin(segT * 0.5);
  } else if (act === 'pets') {
    zoom = 1.04;
  } else if (act === 'stages') {
    const segT = gt - STAGES_START;
    zoom = 1.05 + 0.04 * Math.sin(segT * 0.6);
    ox = 14 * Math.sin(segT * 0.45);
  } else {
    zoom = lerpV(1.10, 1.02, easeOut(clamp((gt - CTA_START) / 1.2, 0, 1)));
  }
  if (camShake > 0.05) {
    zoom += camShake * 0.004;
    ox += (Math.random() - 0.5) * camShake;
    oy += (Math.random() - 0.5) * camShake * 0.7;
    camShake *= 0.86;
  }
  const mx = GAME_W / 2 * (1 - 1 / zoom) - 0.5, my = GAME_H / 2 * (1 - 1 / zoom) - 0.5;
  ox = clamp(ox, -mx, mx); oy = clamp(oy, -my, my);
  ctx.save();
  ctx.translate(GAME_W / 2, GAME_H / 2); ctx.scale(zoom, zoom); ctx.translate(-GAME_W / 2 - ox, -GAME_H / 2 - oy);

  if (t < STORY_DUR) storyAct(t);
  else drawGameplay(gt);

  ctx.restore();
  drawCinema(t, dt);
}

function loop(now) {
  if (!playing) return;
  if (startTime === null) startTime = now;
  const t = (now - startTime) / 1000;
  if (t >= TIMELINE) {
    draw(TIMELINE - 0.01);
    playing = false;
    replayBtn.style.display = 'block';
    if (musicTimer) { clearInterval(musicTimer); musicTimer = null; } // v6 定格時收樂
    return;
  }
  draw(t);
  requestAnimationFrame(loop);
}
function play() {
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  startTime = null;
  firedCues = {};
  enemies = []; bullets = []; particles = [];
  score = 0; wave = 1;
  scoreLabel.textContent = '分數 0'; waveLabel.textContent = '第 1 波';
  hpfill.style.width = '100%';
  playing = true;
  replayBtn.style.display = 'none';
  prevT = 0; camShake = 0; trans = {t:99, type:'none'};
  lastAct = null; musicMode = 'calm'; musicTick._step = 0;
  startMusicLoop();
  requestAnimationFrame(loop);
}
buildCharRow();
buildPetRow();
replayBtn.addEventListener('click', play);

// v6 聲音預設開啟：載入即嘗試出聲；瀏覽器若擋自動播放，首次互動自動解鎖
soundBtn.textContent = '🔊';
try { ensureAudio(); if (audioCtx.state === 'suspended') audioCtx.resume(); } catch (e) {}
(function(){
  const unlock = () => { if (audioCtx && audioCtx.state === 'suspended' && soundOn) audioCtx.resume(); };
  addEventListener('pointerdown', unlock, {once:true});
  addEventListener('keydown', unlock, {once:true});
})();
play();
</script>
