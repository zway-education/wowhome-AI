<!doctype html>
<!-- 專業AI升級 v4 -->
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>大谷翔平：全壘打瞬間</title>
<!-- 部分圖示：OpenMoji (CC BY-SA 4.0) openmoji.org -->
<style>
  /* ============================================================
     大谷翔平：全壘打瞬間 — 專業AI升級版
     電影感三幕劇：鏡頭運動・視差球場・打擊定格・煙火慶典
     ============================================================ */
  :root{
    --bg:#05070d;
    --ink:#f2ecd9;
    --gold:#ffcb3d;
    --blue:#1c4fa1;
    --red:#c0392b;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:radial-gradient(120% 100% at 50% 0%, #0b1226 0%, #05070d 62%);
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",-apple-system,"Segoe UI",sans-serif;
    -webkit-user-select:none;
    user-select:none;
    touch-action:none;                     /* 禁止頁面滑動/雙指縮放 */
    -webkit-tap-highlight-color:transparent;
  }
  button{ touch-action:manipulation; }     /* 按鈕可點、不觸發縮放 */
  #stage-wrap{
    position:relative;
    line-height:0;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 30px 80px -30px rgba(0,0,0,0.85);
  }
  canvas{ display:block; }

  /* ---- 片頭主標題卡 ---- */
  #titleCard{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:12px;
    pointer-events:none;
    line-height:1.35;
    opacity:0;
    transform:scale(1.04);
    transition:opacity 0.9s ease, transform 1.4s ease;
    text-align:center;
    padding:0 8%;
  }
  #titleCard.show{ opacity:1; transform:scale(1); }
  #titleCard::before{
    content:''; position:absolute; inset:-20%;
    background:radial-gradient(58% 58% at 50% 50%, rgba(3,5,12,0.78) 0%, rgba(3,5,12,0.35) 55%, rgba(3,5,12,0) 78%);
    z-index:-1;
  }
  #titleCard .kicker{
    font-size:clamp(10px,1.4vw,13px);
    letter-spacing:0.42em;
    color:var(--gold);
    text-transform:uppercase;
    text-shadow:0 0 18px rgba(255,203,61,0.55);
  }
  #titleCard h1{
    font-size:clamp(26px,5vw,54px);
    font-weight:900;
    letter-spacing:0.12em;
    text-shadow:0 4px 22px rgba(0,0,0,0.7), 0 0 40px rgba(28,79,161,0.5);
  }
  #titleCard .tagline{
    font-size:clamp(12px,1.8vw,16px);
    letter-spacing:0.28em;
    opacity:0.78;
  }

  /* ---- 幕間標題 ---- */
  #act{
    position:absolute; left:0; right:0; top:16%;
    display:flex; flex-direction:column; align-items:center; gap:6px;
    line-height:1.3;
    pointer-events:none;
    opacity:0;
    transform:translateY(-12px);
    transition:opacity 0.6s ease, transform 0.6s ease;
  }
  #act.show{ opacity:1; transform:translateY(0); }
  #act .no{
    font-size:clamp(10px,1.4vw,13px);
    letter-spacing:0.5em;
    color:var(--gold);
    text-shadow:0 0 14px rgba(255,203,61,0.6);
  }
  #act .name{
    font-size:clamp(18px,3vw,30px);
    font-weight:700;
    letter-spacing:0.24em;
    text-shadow:0 3px 16px rgba(0,0,0,0.8);
  }

  /* ---- 字幕（淡入淡出） ---- */
  #subtitle{
    position:absolute; left:50%; bottom:calc(46px + env(safe-area-inset-bottom, 0px));
    transform:translate(-50%, 12px);
    line-height:1.5;
    background:rgba(6,9,18,0.72);
    border:1px solid rgba(255,203,61,0.28);
    border-radius:10px;
    padding:9px 22px;
    font-size:clamp(15px,2.3vw,21px);
    letter-spacing:0.1em;
    color:var(--ink);
    text-shadow:0 2px 8px rgba(0,0,0,0.9);
    white-space:normal;
    text-align:center;
    max-width:min(92%, 680px);
    width:max-content;
    opacity:0;
    transition:opacity 0.4s ease, transform 0.4s ease;
    pointer-events:none;
  }
  #subtitle.show{ opacity:1; transform:translate(-50%, 0); }

  /* ---- 聲音切換 ---- */
  #soundBtn{
    position:absolute;
    top:calc(10px + env(safe-area-inset-top, 0px));
    right:calc(10px + env(safe-area-inset-right, 0px));
    line-height:1.2;
    font:inherit;
    font-size:14px;
    letter-spacing:0.08em;
    color:var(--ink);
    background:rgba(8,12,24,0.62);
    border:1px solid rgba(242,236,217,0.3);
    border-radius:999px;
    padding:10px 18px;
    min-height:48px;
    min-width:48px;
    display:inline-flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition:background 0.2s ease, border-color 0.2s ease;
    z-index:5;
    touch-action:manipulation;
  }
  #soundBtn:hover{ background:rgba(28,79,161,0.55); border-color:var(--gold); }
  #soundBtn:active{ transform:scale(0.94); background:rgba(28,79,161,0.75); }
  #soundBtn.on{ border-color:var(--gold); color:var(--gold); }

  /* ---- 開場操作提示 ---- */
  #hint{
    position:absolute;
    top:calc(64px + env(safe-area-inset-top, 0px));
    right:calc(10px + env(safe-area-inset-right, 0px));
    line-height:1.5;
    font-size:clamp(12px,1.6vw,14px);
    letter-spacing:0.08em;
    color:var(--gold);
    background:rgba(8,12,24,0.72);
    border:1px solid rgba(255,203,61,0.35);
    border-radius:10px;
    padding:8px 14px;
    pointer-events:none;
    opacity:0;
    transform:translateY(-6px);
    transition:opacity 0.5s ease, transform 0.5s ease;
    z-index:4;
  }
  #hint.show{ opacity:1; transform:translateY(0); }

  /* ---- 片尾 / 重新播放 ---- */
  #endOverlay{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:16px;
    line-height:1.4;
    background:rgba(4,6,12,0.82);
    opacity:0;
    pointer-events:none;
    transition:opacity 1s ease;
    text-align:center;
  }
  #endOverlay.show{ opacity:1; pointer-events:auto; }
  #endOverlay .end-trophy{
    width:clamp(56px,9vw,88px);
    height:auto;
    filter:drop-shadow(0 0 22px rgba(255,203,61,0.55));
    animation:trophyFloat 3s ease-in-out infinite;
  }
  @keyframes trophyFloat{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-8px); }
  }
  #endOverlay .end-title{
    font-size:clamp(22px,3.6vw,36px);
    font-weight:900;
    letter-spacing:0.16em;
    text-shadow:0 0 30px rgba(28,79,161,0.7);
  }
  #endOverlay .end-fin{
    font-size:clamp(12px,1.6vw,15px);
    letter-spacing:0.6em;
    color:var(--gold);
    padding-left:0.6em;
  }
  #replayBtn{
    font:inherit;
    font-size:clamp(16px,2.2vw,19px);
    font-weight:700;
    letter-spacing:0.2em;
    color:var(--gold);
    background:transparent;
    border:2px solid var(--gold);
    border-radius:999px;
    padding:14px 42px;
    min-height:52px;
    min-width:200px;
    cursor:pointer;
    margin-top:8px;
    touch-action:manipulation;
    transition:background 0.25s ease, color 0.25s ease, box-shadow 0.25s ease;
    animation:pulseGlow 2.2s ease-in-out infinite;
  }
  #replayBtn:hover{
    background:var(--gold);
    color:#101418;
    box-shadow:0 0 34px rgba(255,203,61,0.55);
  }
  #replayBtn:active{
    transform:scale(0.95);
    background:var(--gold);
    color:#101418;
  }
  @keyframes pulseGlow{
    0%,100%{ box-shadow:0 0 10px rgba(255,203,61,0.25); }
    50%{ box-shadow:0 0 26px rgba(255,203,61,0.55); }
  }

  /* ---- v4：章節選單 ---- */
  #chapterRow{
    display:flex; gap:10px; flex-wrap:wrap;
    justify-content:center;
    margin-top:6px;
    padding:0 6%;
  }
  .chapBtn{
    font:inherit;
    font-size:clamp(12px,1.6vw,14px);
    letter-spacing:0.12em;
    color:var(--ink);
    background:rgba(8,12,24,0.6);
    border:1px solid rgba(242,236,217,0.35);
    border-radius:12px;
    padding:9px 16px;
    min-height:52px;
    min-width:132px;
    cursor:pointer;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:3px;
    line-height:1.3;
    touch-action:manipulation;
    transition:background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
  }
  .chapBtn span{
    font-size:0.82em;
    color:var(--gold);
    letter-spacing:0.18em;
  }
  .chapBtn:hover{ border-color:var(--gold); background:rgba(28,79,161,0.5); transform:translateY(-2px); }
  .chapBtn:active{ transform:scale(0.95); }
  .end-note{
    font-size:clamp(11px,1.4vw,13px);
    letter-spacing:0.14em;
    color:rgba(242,236,217,0.62);
  }
</style>
</head>
<body>
<div id="stage-wrap">
  <canvas id="stage"></canvas>
  <div id="titleCard">
    <div class="kicker">SHOHEI OHTANI · HOME RUN</div>
    <h1>大谷翔平：全壘打瞬間</h1>
    <div class="tagline">一棒轟出全壘打牆</div>
  </div>
  <div id="act"><span class="no" id="actNo"></span><span class="name" id="actName"></span></div>
  <div id="subtitle"></div>
  <button id="soundBtn" type="button">♪ 聲音：關</button>

      <path fill="#f1b31c" d="m41.5853,12.081c.6086,9.4384,1.8951,17.5-3.112,29.828,4.706-1.027,8.576-5.732,9.922-12.46,1.457-7.282,3.1185-16.6378,3.1935-16.9758,0,0-10.0035-.3922-10.0035-.3922Z"/>

      <path fill="none" stroke="#000" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m48.7113,31.766s.079-.261,5.579-3.928c2.528-1.683,5.541-3.9,5.541-6.943-.0146-2.842-2.3303-5.1341-5.1723-5.1196-.0963.0005-.1926.0037-.2887.0096h-2.154"/>
      <rect x="26.5503" y="50.332" width="18.333" height="9.167" fill="none" stroke="#000" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>

    </svg>
    <div class="end-title">大谷翔平：全壘打瞬間</div>
    <div class="end-fin">劇 終</div>
    <button id="replayBtn" type="button">↻ 重新播放</button>
    <div id="chapterRow">
      <button class="chapBtn" type="button" data-t="0">第一幕<span>夜空下的球場</span></button>
      <button class="chapBtn" type="button" data-t="8.3">第二幕<span>決勝一擊</span></button>
      <button class="chapBtn" type="button" data-t="14.3">第三幕<span>英雄時刻</span></button>

<script>
'use strict';
/* ============================================================
   第 1 節　小工具與緩動曲線（絕不使用線性補間）
   ============================================================ */
const clamp = (v, a, b) => v < a ? a : (v > b ? b : v); const lerp  = (a, b, t) => a + (b - a) * t;
const seg   = (t, a, b) => clamp((t - a) / (b - a), 0, 1); const TAU = Math.PI * 2;

const easeOutCubic   = t => 1 - Math.pow(1 - t, 3); const easeInCubic    = t => t * t * t;
const easeInQuad     = t => t * t; const easeOutQuart   = t => 1 - Math.pow(1 - t, 4);
const easeInOutCubic = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
const easeOutBack    = t => {
  const c = 1.70158; return 1 + (c + 1) * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2);
};

function quadY(a, c, b, t){
  return (1 - t) * (1 - t) * a + 2 * (1 - t) * t * c + t * t * b;
}

/* ============================================================
   第 2 節　畫布（devicePixelRatio 自適應）
   ============================================================ */
const W = 960, H = 540; const canvas = document.getElementById('stage'); const ctx = canvas.getContext('2d');

function resize(){
  const scale = Math.min(innerWidth / W, innerHeight / H) * 0.96; const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = Math.round(W * scale * dpr); canvas.height = Math.round(H * scale * dpr);
  canvas.style.width  = W * scale + 'px'; canvas.style.height = H * scale + 'px'; ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', resize); resize();

/* ---- 靜態漸層快取（v3：初始化一次，杜絕每幀配置） ---- */
const MOON = { x:610, y:95, r:25 };
const G = {};
(function buildGradients(){
  let g;
  g = ctx.createLinearGradient(0, -240, 0, 330); g.addColorStop(0, '#060b1e'); g.addColorStop(0.45, '#0d1b3e');
  g.addColorStop(0.8, '#2a4a8f'); g.addColorStop(1, '#e8963f'); G.sky = g;
  g = ctx.createRadialGradient(MOON.x, MOON.y, 6, MOON.x, MOON.y, 118); g.addColorStop(0, 'rgba(246,241,224,0.95)');
  g.addColorStop(0.15, 'rgba(246,241,224,0.5)'); g.addColorStop(1, 'rgba(246,241,224,0)'); G.moon = g;
  g = ctx.createLinearGradient(0, 95, 0, 315); g.addColorStop(0, '#0e1c36'); g.addColorStop(0.55, '#16294a');
  g.addColorStop(1, '#20375e'); G.stands = g;
  g = ctx.createLinearGradient(0, 296, 0, 324); g.addColorStop(0, '#1a5a44'); g.addColorStop(0.5, '#0f3d2e');
  g.addColorStop(1, '#082418'); G.wall = g;
  g = ctx.createLinearGradient(0, 324, 0, 620); g.addColorStop(0, '#3a8a48'); g.addColorStop(1, '#22572d'); G.grass = g;
  g = ctx.createLinearGradient(0, 300, 0, 470); g.addColorStop(0, '#a97b45'); g.addColorStop(0.6, '#c8935a');
  g.addColorStop(1, '#d9a86e'); G.dirt = g;
  G.tower = {};
  for(const x of [60, 900]){
    g = ctx.createRadialGradient(x, 87, 4, x, 87, 90); g.addColorStop(0, 'rgba(255,244,200,0.85)');
    g.addColorStop(0.2, 'rgba(255,244,200,0.28)'); g.addColorStop(1, 'rgba(255,244,200,0)'); G.tower[x] = g;
  }
  g = ctx.createRadialGradient(W / 2, H / 2, H * 0.35, W / 2, H / 2, H * 0.85);
  g.addColorStop(0, 'rgba(0,0,0,0)'); g.addColorStop(1, 'rgba(0,0,0,0.42)'); G.vignette = g;
  g = ctx.createRadialGradient(0, 0, 1, 0, 0, 30); g.addColorStop(0, 'rgba(0,0,0,1)');
  g.addColorStop(1, 'rgba(0,0,0,0)'); G.shadow = g;
  g = ctx.createRadialGradient(0, 0, 2, 0, 0, 26); g.addColorStop(0, 'rgba(255,246,210,0.9)');
  g.addColorStop(0.45, 'rgba(255,203,61,0.4)'); g.addColorStop(1, 'rgba(255,203,61,0)'); G.comet = g;
  G.ball = {};
  for(const r of [3.5, 5.5, 8.5]){
    g = ctx.createRadialGradient(-r * 0.35, -r * 0.35, r * 0.15, 0, 0, r * 1.15); g.addColorStop(0, '#ffffff');
    g.addColorStop(0.65, '#f1ead2'); g.addColorStop(1, '#c9bd9a'); G.ball[r] = g;
  }
  G.bat = {};
  for(const len of [38, 34]){
    g = ctx.createLinearGradient(0, 0, len, 0); g.addColorStop(0, '#8a5a2b'); g.addColorStop(0.45, '#c8985c');
    g.addColorStop(1, '#e2b878'); G.bat[len] = g;
  }
  g = ctx.createLinearGradient(-8, 0, 8, -18); g.addColorStop(0, '#8e9aa7'); g.addColorStop(0.5, '#c9d2da');
  g.addColorStop(1, '#eef3f7'); G.pJersey = g;
  g = ctx.createRadialGradient(-2, -24.5, 1.5, 0.5, -22.5, 7); g.addColorStop(0, '#f2cba0');
  g.addColorStop(1, '#d9a06e'); G.pFace = g;
  g = ctx.createLinearGradient(-5, -29, 4, -22); g.addColorStop(0, '#e05545'); g.addColorStop(0.6, '#c0392b');
  g.addColorStop(1, '#8e2419'); G.pCap = g;
  g = ctx.createLinearGradient(-9, 0, 10, -24); g.addColorStop(0, '#cfc7b2'); g.addColorStop(0.45, '#f6f1e0');
  g.addColorStop(1, '#ffffff'); G.bJersey = g;
  g = ctx.createRadialGradient(-1.5, -35, 1.5, 1, -33, 8.5); g.addColorStop(0, '#f2cba0');
  g.addColorStop(1, '#d9a06e'); G.bFace = g;
  g = ctx.createLinearGradient(-6, -42, 7, -30); g.addColorStop(0, '#3f78d6'); g.addColorStop(0.5, '#1c4fa1');
  g.addColorStop(1, '#0f2d63'); G.bHelmet = g;
})();

/* ============================================================
   第 3 節　DOM 參照
   ============================================================ */
const titleCard  = document.getElementById('titleCard'); const actEl      = document.getElementById('act');
const actNoEl    = document.getElementById('actNo'); const actNameEl  = document.getElementById('actName');
const subtitleEl = document.getElementById('subtitle'); const soundBtn   = document.getElementById('soundBtn');
const hintEl     = document.getElementById('hint');
const endOverlay = document.getElementById('endOverlay'); const replayBtn  = document.getElementById('replayBtn');

/* ============================================================
   第 4 節　時間軸（單位：秒）——三幕結構
   第一幕：夜空下的球場（開場・投手・打者）
   第二幕：決勝一擊（投球・揮棒・定格・飛行）
   第三幕：英雄時刻（煙火・彩帶・謝幕）
   ============================================================ */
const T = {
  titleHide:   2.8,
  shotPitcher: 3.2,
  shotBatter:  6.0,
  act2:        8.62,
  windup:      8.66,
  pitch:       9.0,
  load:        9.15,
  loadEnd:     9.55,
  swing:       9.55,
  hit:         9.82,
  batFlip:     10.85,
  wallCross:   13.2,
  land:        13.6,
  act3:        14.6,
  armsUp:      15.0,
  fadeOut:     21.8,
  end:         23.4
}; const CONTACT = { x: 470, y: 378 };

/* 播放狀態 */
let tl = 0;            // 劇情時間（受慢動作/定格影響）
let rt = 0;            // 真實時間（特效、閃爍用）
let last = performance.now();
let freeze = 0;        // 打擊定格（hit-stop）
let shake = 0;         // 鏡頭震動

/* 慢動作：擊中後子彈時間，再緩緩恢復；劃過明月時再一次微慢動作 */
function timeScaleAt(t){
  if(t > T.hit && t < 10.6) return 0.35; if(t >= 10.6 && t < 11.4) return lerp(0.35, 1, seg(t, 10.6, 11.4));
  if(t >= 11.78 && t < 12.18) return 0.5;   /* 彗星球劃過月亮 */
  return 1;
}

/* ============================================================
   第 5 節　聲音引擎（Web Audio 合成・預設靜音）
   ============================================================ */
let AC = null, master = null, crowdGain = null; let audioOn = false;

function initAudio(){
  AC = new (window.AudioContext || window.webkitAudioContext)(); master = AC.createGain(); master.gain.value = 0;
  /* v3：限幅器——擊球爆音＋煙火＋號角疊加時不削波 */
  const comp = AC.createDynamicsCompressor();
  comp.threshold.value = -18; comp.knee.value = 24; comp.ratio.value = 4;
  comp.attack.value = 0.003; comp.release.value = 0.25;
  master.connect(comp); comp.connect(AC.destination);
  /* 觀眾聲浪：棕色噪音循環 → 帶通濾波 */
  const len = AC.sampleRate * 2; const buf = AC.createBuffer(1, len, AC.sampleRate); const d = buf.getChannelData(0); let lastV = 0;
  for(let i = 0; i < len; i++){
    const w = Math.random() * 2 - 1; lastV = (lastV + 0.02 * w) / 1.02; d[i] = lastV * 3.2;
  }
  const src = AC.createBufferSource(); src.buffer = buf; src.loop = true; const bp = AC.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 520; bp.Q.value = 0.5; crowdGain = AC.createGain();
  crowdGain.gain.value = 0; src.connect(bp); bp.connect(crowdGain); crowdGain.connect(master); src.start();
}
function audioReady(){ return audioOn && AC; }

function beep(freq, dur, type, vol, slide){
  if(!audioReady()) return; const o = AC.createOscillator(), g = AC.createGain(); o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, AC.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(
    Math.max(30, freq + slide), AC.currentTime + dur); g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur); o.connect(g); g.connect(master); o.start(); o.stop(AC.currentTime + dur);
}
function noiseBurst(dur, vol, o){
  if(!audioReady()) return; const n = Math.floor(AC.sampleRate * dur);
  const buf = AC.createBuffer(1, n, AC.sampleRate); const d = buf.getChannelData(0);
  for(let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n); const s = AC.createBufferSource();
  s.buffer = buf; const f = AC.createBiquadFilter(); f.type = (o && o.type) || 'lowpass';
  f.frequency.setValueAtTime((o && o.f0) || 1000, AC.currentTime);
  f.frequency.exponentialRampToValueAtTime(Math.max(40, (o && o.f1) || 400), AC.currentTime + dur);
  const g = AC.createGain(); g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur); s.connect(f); f.connect(g); g.connect(master); s.start();
}
const sfxWhoosh  = () => noiseBurst(0.35, 0.22, { type:'bandpass', f0:700, f1:2600 });
const sfxCrack   = () => {
  noiseBurst(0.12, 0.5, { type:'highpass', f0:2200, f1:400 }); beep(150, 0.2, 'triangle', 0.4, -90); beep(950, 0.06, 'square', 0.18, -600);
}; const sfxDing    = () => beep(1568, 0.5, 'triangle', 0.18, -60); const sfxPop     = () => noiseBurst(0.3, 0.28, { f0:900, f1:110 });
const sfxWhistle = () => beep(480, 0.7, 'sine', 0.07, 720);
const sfxTada    = () => {
  [523, 659, 784, 1047].forEach((f, i) =>
    setTimeout(() => beep(f, 0.3, 'triangle', 0.2), i * 95));
};

/* 觀眾興奮度曲線（推動聲浪與看臺動作） */
function exciteAt(t){
  if(t < T.act2)   return 0.25 + 0.08 * seg(t, 0, 8);
  if(t < T.hit)    return 0.12;                        /* 投球前全場屏息 */
  if(t < T.act3)   return lerp(0.6, 0.95, seg(t, T.hit, T.act3)); if(t < T.fadeOut) return 1; return lerp(1, 0.15, seg(t, T.fadeOut, T.end));
}
let EX = 0.25;

function updateAudio(){
  if(!AC) return; master.gain.setTargetAtTime(audioOn ? 0.85 : 0, AC.currentTime, 0.08);
  crowdGain.gain.setTargetAtTime(0.02 + EX * 0.15, AC.currentTime, 0.3);
}

const parts = []; const trail = []; const born = [];   /* born：共用暫存，避免每幀配置 */
let batProj = null;   /* 甩棒（bat flip）拋物物件 */

function explodeFirework(x, y, color){

function updateParticles(dt){
  /* 慶典期間持續灑彩帶 */
  if(tl > T.armsUp && tl < T.fadeOut - 1 && parts.length < 520){
    for(let i = 0; i < 2; i++){
      parts.push({
        type:'confetti',
        x:-60 + Math.random() * 1080, y:-30 + Math.random() * 20,
        vx:(Math.random() * 2 - 1) * 18, vy:65 + Math.random() * 70,
        g:0, drag:1, life:9,
        rot:Math.random() * TAU, vr:(Math.random() * 2 - 1) * 7,
        ph:Math.random() * TAU,
        color:CONF_COLORS[(Math.random() * CONF_COLORS.length) | 0]
      });
    }
  }
  /* 球飛行時灑金色火花尾跡 */
  const b = ballState(tl);
  if(b && b.phase === 'fly' && Math.random() < 0.6){
    parts.push({
      type:'spark', x:b.x, y:b.y,
      vx:(Math.random() * 2 - 1) * 30, vy:(Math.random() * 2 - 1) * 30,
      g:80, drag:0.92, life:0.4 + Math.random() * 0.3,
      color:'#ffcb3d'
    });
  }
  born.length = 0;
  for(let i = parts.length - 1; i >= 0; i--){
    const p = parts[i]; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += (p.g || 0) * dt;
    if(p.drag && p.drag < 1){
      const d = Math.pow(p.drag, dt * 60); p.vx *= d; p.vy *= d;
    }
    if(p.vr) p.rot += p.vr * dt; if(p.type === 'confetti') p.x += Math.sin(rt * 3 + p.ph) * 26 * dt;
    if(p.type === 'rocket'){
      born.push({
        type:'spark', x:p.x, y:p.y,
        vx:(Math.random() * 2 - 1) * 12, vy:30,
        g:0, drag:0.95, life:0.3, color:'#ffd98e'
      });
      if(p.vy > -60){
        explodeFirework(p.x, p.y, p.color); p.life = 0;
      }
    }
    p.life -= dt; if(p.life <= 0 || p.y > 600) parts.splice(i, 1);
  }
  for(const np of born) parts.push(np); if(parts.length > 620) parts.splice(0, parts.length - 620);
}

function drawParticles(){
  for(const p of parts){
    const a = clamp(p.life * 2, 0, 1);
    if(p.type === 'spark'){
      ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = a; ctx.strokeStyle = p.color; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - p.vx * 0.03, p.y - p.vy * 0.03); ctx.stroke();
      ctx.globalCompositeOperation = 'source-over';
    } else if(p.type === 'dust'){
      ctx.globalAlpha = a * 0.6; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r || 3, 0, TAU); ctx.fill();
    } else if(p.type === 'confetti'){
      ctx.globalAlpha = a; ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot); ctx.fillStyle = p.color;
      ctx.fillRect(-3.5, -2, 7, 4); ctx.restore();
    } else if(p.type === 'fw'){
      ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = a * (0.65 + 0.35 * Math.sin(rt * 22 + p.ph));
      ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 2.2, 0, TAU); ctx.fill(); ctx.globalCompositeOperation = 'source-over';
    } else if(p.type === 'rocket'){
      ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = 1; ctx.fillStyle = '#fff2c8'; ctx.beginPath();
      ctx.arc(p.x, p.y, 2.6, 0, TAU); ctx.fill(); ctx.globalCompositeOperation = 'source-over';
    }
  }
  ctx.globalAlpha = 1;
}

/* ============================================================
   第 7 節　球的運動（投球 → 擊出飛行）與尾跡
   ============================================================ */
function ballState(t){
  if(t < T.pitch) return null;
  if(t < T.hit){
    const p = seg(t, T.pitch, T.hit);
    const pe = Math.pow(p, 1.12);          /* 出手後略為加速 */
    return {
      phase:'pitch',
      x:lerp(483, CONTACT.x, pe),
      y:lerp(306, CONTACT.y, pe) - Math.sin(p * Math.PI) * 10
    };
  }
  if(t < T.land){
    const p = seg(t, T.hit, T.land);
    const px = 1 - Math.pow(1 - p, 1.6);   /* 擊出瞬間最快，逐漸減速 */
    return {
      phase:'fly', p,
      x:lerp(CONTACT.x, 905, px),
      y:lerp(CONTACT.y, 205, p) - Math.sin(p * Math.PI) * 235
    };
  }
  return { phase:'landed', x:905, y:205 };
}

function updateTrail(dt){
  const b = ballState(tl); if(b && b.phase === 'fly') trail.push({ x:b.x, y:b.y, a:1 });
  for(const p of trail) p.a -= dt * 0.9; while(trail.length && trail[0].a <= 0) trail.shift(); if(trail.length > 90) trail.shift();
}

function drawBaseball(x, y, r, rot){
  ctx.save(); ctx.translate(x, y); ctx.rotate(rot);
  ctx.fillStyle = G.ball[r] || '#f1ead2'; ctx.beginPath();
  ctx.arc(0, 0, r, 0, TAU); ctx.fill(); ctx.strokeStyle = 'rgba(14,27,43,0.55)'; ctx.lineWidth = 0.9; ctx.stroke();
  ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 1.1; ctx.beginPath(); ctx.arc(0, 0, r * 0.98, 0.4, 1.6); ctx.stroke();
  ctx.beginPath(); ctx.arc(0, 0, r * 0.98, Math.PI + 0.4, Math.PI + 1.6); ctx.stroke(); ctx.restore();
}

function drawBallAndTrail(){
  /* 金色發光尾跡 */
  if(trail.length > 1){
    ctx.save(); ctx.globalCompositeOperation = 'lighter';
    for(let i = 1; i < trail.length; i++){
      const p0 = trail[i - 1], p1 = trail[i]; ctx.globalAlpha = p1.a * 0.6; ctx.strokeStyle = '#ffcb3d';
      ctx.lineWidth = lerp(1.5, 9, i / trail.length); ctx.lineCap = 'round'; ctx.beginPath(); ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y); ctx.stroke();
    }
    ctx.restore(); ctx.globalAlpha = 1;
  }
  const b = ballState(tl); if(!b || b.phase === 'landed') return;
  if(b.phase === 'pitch'){
    /* 快速球殘影 */
    for(let k = 3; k >= 1; k--){
      const gb = ballState(tl - k * 0.018);
      if(gb){
        ctx.globalAlpha = 0.14 * (4 - k); drawBaseball(gb.x, gb.y, 5.5, rt * 14);
      }
    }
    ctx.globalAlpha = 1; drawBaseball(b.x, b.y, 5.5, rt * 14);
  } else {
    /* 彗星球：大顆＋脈動光暈，飛行全程都看得清楚 */
    ctx.save(); ctx.globalCompositeOperation = 'lighter';
    const gr = 22 + Math.sin(rt * 9) * 4;
    ctx.translate(b.x, b.y); ctx.scale(gr / 26, gr / 26);
    ctx.fillStyle = G.comet; ctx.beginPath(); ctx.arc(0, 0, 26, 0, TAU); ctx.fill();
    ctx.restore();
    ctx.save(); ctx.shadowColor = '#ffcb3d'; ctx.shadowBlur = 18; drawBaseball(b.x, b.y, 8.5, rt * 10); ctx.restore();
  }
}

function drawStands(){
  /* 看臺碗形（上暗下亮的深度漸層） */
  ctx.fillStyle = G.stands; ctx.beginPath(); ctx.moveTo(-280, 150);
  ctx.quadraticCurveTo(480, 95, 1240, 150); ctx.lineTo(1240, 315); ctx.quadraticCurveTo(480, 228, -280, 315); ctx.closePath(); ctx.fill();
  /* 排線 */
  ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.lineWidth = 1;
  for(let r = 0; r < 5; r++){
    ctx.beginPath(); ctx.moveTo(-280, lerp(162, 300, r / 4));
    ctx.quadraticCurveTo(480, lerp(107, 216, r / 4), 1240, lerp(162, 300, r / 4)); ctx.stroke();
  }
  /* 群眾：興奮時跳動；第一幕加人浪（波浪橫掃看臺） */
  const seatCol = ['rgba(240,235,215,0.6)', 'rgba(255,203,61,0.55)', 'rgba(126,200,255,0.5)'];
  const doWave = tl < T.act2;
  for(const s of seats){
    let hop = EX > 0.4 ? Math.abs(Math.sin(rt * 5 + s.ph)) * 5.5 * EX : Math.sin(rt * 1.5 + s.ph) * 0.7;
    if(doWave){
      const w = Math.sin(rt * 2.0 - s.x * 0.007); if(w > 0) hop += w * w * w * 6;
    }
    ctx.fillStyle = seatCol[s.c]; ctx.fillRect(s.x - 2, s.y - 3 - hop, 4, 4.5);
  }
  /* 慶典時的相機閃光 */
  if(EX > 0.75){
    for(let i = 0; i < 3; i++){
      if(Math.random() < 0.35){
        const s = seats[(Math.random() * seats.length) | 0]; ctx.globalAlpha = 0.5 + Math.random() * 0.5;
        ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(s.x, s.y - 4, 1.6 + Math.random() * 2, 0, TAU); ctx.fill();
      }
    }

function batterPose(){
  const P = { torso:-0.05, bat:-2.05, crouch:0, hasBat:true, armsUp:0, jump:0, face:'focus' };
  if(tl < T.load){

    P.crouch = Math.sin(rt * 2.2) * 0.8;                 /* 呼吸 */
    if(tl > 6.25 && tl < 7.7){                           /* 配合字幕：緩緩舉起球棒 */
      const sw = Math.sin(seg(tl, 6.25, 7.7) * Math.PI);
      P.bat -= 0.55 * sw; P.crouch += sw * 2.4; P.torso -= 0.06 * sw;
    }

    const p = easeOutCubic(seg(tl, T.load, T.loadEnd));  /* 預備蓄力（anticipation） */
    P.bat = lerp(-2.05, -1.7, p); P.torso = lerp(-0.05, -0.24, p); P.crouch = lerp(0, 5, p);
  } else if(tl < T.hit){
    const p = easeInCubic(seg(tl, T.swing, T.hit));      /* 加速揮擊 */
    P.bat = lerp(-1.7, -6.2, p); P.torso = lerp(-0.24, 0.3, p); P.crouch = lerp(5, 2, p); P.face = 'grit';
  } else {
    const p = easeOutCubic(seg(tl, T.hit, 10.45));       /* 減速跟隨（follow-through） */
    P.bat = lerp(-6.2, -7.5, p); P.torso = lerp(0.3, 0.12, p); P.face = 'watch';

}

const cam = { x:480, y:258, zoom:1.06 }; let curShot = -1;

function shotIdAt(t){
  if(t < T.shotPitcher) return 0; if(t < T.shotBatter) return 1; if(t < T.act2) return 2; if(t < T.hit) return 3; if(t < T.act3) return 4; return 5;
}
function camTargetAt(t){
  switch(shotIdAt(t)){
    case 0:{ /* 廣角推鏡 */
      const p = seg(t, 0, T.shotPitcher); return { x:480, y:258, zoom:1.04 + easeInOutCubic(p) * 0.12 };
    }
    case 1:{ /* 投手中景 */
      const p = seg(t, T.shotPitcher, T.shotBatter); return { x:483, y:302 - 5 * easeInOutCubic(p), zoom:2.05 + p * 0.18 };
    }
    case 2:{ /* 打者特寫緩推 */
      const p = seg(t, T.shotBatter, T.act2); return { x:452, y:372, zoom:2.25 + easeInOutCubic(p) * 0.28 };
    }
    case 3:  /* 對決雙人鏡頭 */
      return { x:468, y:348, zoom:1.5 };
    case 4:{ /* 追球鏡頭：由特寫拉遠 */
      const b = ballState(t) || { x:CONTACT.x, y:CONTACT.y }; const p = seg(t, T.hit, T.land);
      return {
        x:clamp(b.x, 320, 700),
        y:clamp(b.y + 50, 175, 340),
        zoom:lerp(2.05, 1.18, easeOutCubic(p))
      };
    }
    default:{ /* 慶典廣角緩慢拉出＋輕微搖擺 */
      const p = seg(t, T.act3, T.end);
      return {
        x:480 + Math.sin(rt * 0.5) * 8,
        y:264,
        zoom:1.22 - easeInOutCubic(p) * 0.19
      };
    }
  }
}
function updateCamera(dt){
  const id = shotIdAt(tl); const tgt = camTargetAt(tl);
  if(id !== curShot){
    curShot = id;                 /* 硬切分鏡：直接跳到目標 */
    cam.x = tgt.x; cam.y = tgt.y; cam.zoom = tgt.zoom;
  } else {
    const k = 1 - Math.pow(0.002, dt); cam.x += (tgt.x - cam.x) * k; cam.y += (tgt.y - cam.y) * k; cam.zoom += (tgt.zoom - cam.zoom) * k;
  }
}

function withParallax(f, fn){
  ctx.save(); ctx.translate((cam.x - W / 2) * (1 - f), (cam.y - H / 2) * (1 - f) * 0.6); fn(); ctx.restore();
}

   第 13 節　渲染（世界 → 特效 → 螢幕層調色與電影黑邊）
   ============================================================ */
function drawImpactFX(){
  const k = (rt - hitRT) / 0.6; if(k < 0 || k > 1) return; ctx.save(); ctx.globalCompositeOperation = 'lighter';
  /* 衝擊環 */
  ctx.globalAlpha = (1 - k) * 0.9; ctx.strokeStyle = '#fff2c0'; ctx.lineWidth = 4 * (1 - k) + 1; ctx.beginPath();
  ctx.arc(CONTACT.x, CONTACT.y, easeOutCubic(k) * 95, 0, TAU); ctx.stroke();
  /* 放射速度線 */
  ctx.globalAlpha = (1 - k) * 0.5; ctx.strokeStyle = '#ffcb3d'; ctx.lineWidth = 2;
  for(let i = 0; i < 10; i++){
    const a = (i / 10) * TAU + 0.3; const r0 = 18 + easeOutCubic(k) * 60; const r1 = r0 + 26; ctx.beginPath();
    ctx.moveTo(CONTACT.x + Math.cos(a) * r0, CONTACT.y + Math.sin(a) * r0);
    ctx.lineTo(CONTACT.x + Math.cos(a) * r1, CONTACT.y + Math.sin(a) * r1); ctx.stroke();
  }
  ctx.restore(); ctx.globalAlpha = 1;
}

function render(){
  ctx.fillStyle = '#03050a'; ctx.fillRect(0, 0, W, H); ctx.save(); const shx = (Math.random() * 2 - 1) * shake;
  const shy = (Math.random() * 2 - 1) * shake; const wob = Math.sin(rt * 1.3) * 1.4 + Math.sin(rt * 2.7) * 0.6;
  ctx.translate(W / 2 + shx, H / 2 + shy + wob * 0.4); ctx.scale(cam.zoom, cam.zoom); ctx.translate(-cam.x + wob / cam.zoom, -cam.y);

  withParallax(0.16, drawSky); withParallax(0.5, drawSkyline); withParallax(0.82, drawStands); drawWallAndField();
  drawFielder(); drawPitcher(); drawBatter(); drawMates(); drawBatProj(); drawBallAndTrail(); drawImpactFX(); drawParticles(); withParallax(1.3, drawForeground); ctx.restore();

  /* --- 螢幕空間層 --- */
  /* 統一冷色調 + 擊球後暖色 */
  ctx.fillStyle = 'rgba(20,16,60,0.1)'; ctx.fillRect(0, 0, W, H); const warm = tl > T.hit ? seg(tl, T.hit, T.hit + 0.6) * 0.07 : 0;
  if(warm > 0){
    ctx.fillStyle = `rgba(255,170,90,${warm})`; ctx.fillRect(0, 0, W, H);
  }
  /* 白閃 */
  if(flash > 0.01){
    ctx.fillStyle = `rgba(255,250,235,${clamp(flash, 0, 1) * 0.9})`; ctx.fillRect(0, 0, W, H);
  }
  /* 暗角 */
  ctx.fillStyle = G.vignette; ctx.fillRect(0, 0, W, H);
  /* 電影黑邊 */
  const bar = 34 * easeOutCubic(seg(tl, 0.2, 1.6)); ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, bar); ctx.fillRect(0, H - bar, W, bar);
  /* 開場淡入・片尾淡出 */
  const fadeIn = 1 - easeOutCubic(seg(tl, 0, 1.2));
  const fadeOut = easeInOutCubic(seg(tl, T.fadeOut, T.end - 0.2)) * 0.85; const fade = Math.max(fadeIn, fadeOut);
  if(fade > 0.01){
    ctx.fillStyle = `rgba(3,5,10,${fade})`; ctx.fillRect(0, 0, W, H);
  }
}

/* ============================================================
   第 14 節　主迴圈與重新播放
   ============================================================ */
function frame(now){
  requestAnimationFrame(frame); const dt = Math.min((now - last) / 1000, 0.05); last = now; rt += dt;
  if(!ended){
    if(freeze > 0) freeze -= dt; else tl += dt * timeScaleAt(tl);
    if(tl >= T.end){
      tl = T.end; ended = true; endOverlay.classList.add('show');
    }
  } else {
    updateAudio(); return;   /* v3：片尾卡顯示時凍結世界渲染，省電不發熱 */
  }
  for(const e of EVENTS){
    if(!e.fired && tl >= e.t){ e.fired = true; e.fn(); }
  }
  EX = exciteAt(tl); updateCamera(dt); updateParticles(dt); updateTrail(dt); updateBatProj(dt); updateOverlays();
  updateAudio(); shake *= Math.pow(0.0008, dt); flash *= Math.pow(0.004, dt); wallFlash *= Math.pow(0.03, dt); render();
}

function replay(){
  tl = 0; freeze = 0; shake = 0; flash = 0; wallFlash = 0; hitRT = -99; ended = false; curShot = -1; lastSub = '';
  parts.length = 0; trail.length = 0; batProj = null; for(const e of EVENTS) e.fired = false; endOverlay.classList.remove('show');
