<!DOCTYPE html>
<!-- 專業AI升級 v6 -->
<!-- v6 摘要：自動播放＋電影運鏡（逐幕推鏡/對戰push-in）＋letterbox＋閃白轉場＋開場與片尾逐字標題與光暈掃過＋烘焙星空/星雲/暈影/顆粒＋能量球bloom與音符粒子＋Web Audio 全程配樂（進行曲/戰鬥曲雙主題鼓組、轉幕riser、braam、結尾定格重音＋壓縮殘響母線）＋新增重播鈕 -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="author" content="AI未來創作營隊">
<title>貓咪大戰爭 x 寶可夢戰鬥曲 說明片</title>
<style>
  :root{ --cyan:#38e1ff; --blue:#4f7cff; --purple:#9a6bff; --pink:#ff6cc7; }
  html,body{ margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:#070b14; font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;
    touch-action:none; }
  #stage{ position:fixed; inset:0; display:block; }
  #ui{ position:fixed; inset:0; pointer-events:none; display:flex; flex-direction:column; justify-content:space-between; }
  .top{ display:flex; justify-content:space-between; align-items:flex-start;
    padding: max(12px, env(safe-area-inset-top)) 14px 0 14px; }
  .title-chip{ background:rgba(7,11,20,.42); border-radius:12px; padding:6px 12px; display:inline-block; }
  .title{ font-weight:800; font-size:clamp(15px,3vw,20px); color:#fff;
    background:linear-gradient(92deg,var(--cyan),var(--blue),var(--purple));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    text-shadow:0 0 18px rgba(56,225,255,.25); }
  .brand{ font-size:11px; color:#e8f0ff; opacity:.85; margin-top:2px; }
  button{ pointer-events:auto; border:none; border-radius:14px; cursor:pointer; font-weight:700; font-family:inherit; }
  #muteBtn{ width:44px;height:44px;min-width:44px;min-height:44px; background:rgba(10,16,30,.65);
    border:1.5px solid rgba(255,255,255,.18); color:#fff; font-size:20px;
    display:flex; align-items:center; justify-content:center; }
  .caption-wrap{ display:flex; justify-content:center; padding-bottom: max(18px, env(safe-area-inset-bottom)); }
  .caption{ background:rgba(7,11,20,.55); border:1px solid rgba(255,255,255,.12); border-radius:14px;
    padding:10px 18px; color:#fff; font-weight:700; font-size:clamp(14px,2.6vw,19px);
    max-width:86vw; text-align:center; opacity:0; transform:translateY(8px);
    transition:opacity .25s ease, transform .25s ease; }
  .caption.show{ opacity:1; transform:translateY(0); }
  #startOverlay{ position:fixed; inset:0; background:rgba(4,7,14,.86); display:none;
    flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:10; }
  #startOverlay.show{ display:flex; }
  #startOverlay .big{ font-weight:800; font-size:clamp(20px,5vw,30px); color:#fff; text-align:center;
    background:linear-gradient(92deg,var(--cyan),var(--blue),var(--purple));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  #playBtn{ padding:14px 34px; font-size:17px; min-height:52px; color:#04101c;
    background:linear-gradient(92deg,var(--cyan),var(--blue)); box-shadow:0 8px 24px rgba(56,225,255,.35); }
  #footer{ position:absolute; bottom:6px; width:100%; text-align:center; font-size:11px; color:#9fb0d0; }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div id="ui">
  <div class="top">
    <div class="title-chip">
      <div class="title">貓咪大戰爭 x 寶可夢戰鬥曲</div>
      <div class="brand">AI未來創作營隊 · 說明片</div>
    </div>
    <button id="muteBtn">🔊</button>
  </div>
  <div class="caption-wrap"><div class="caption" id="caption"></div></div>
</div>
<div id="startOverlay">
  <div class="big">貓咪大戰爭 x 寶可夢戰鬥曲<br>說明片</div>
  <button id="playBtn">🔁 重新播放</button>
  <div id="footer">AI未來創作營隊</div>
</div>
<script>
'use strict';
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let W,H,DPR;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W*DPR; canvas.height = H*DPR;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
resize();
window.addEventListener('resize', resize);

// ---------- Web Audio v6：壓縮母線＋程序化殘響＋雙主題鼓組配樂 ----------
let actx=null, muted=false, musicGain=null, masterGain=null, sfxGain=null, VERB=null, NOISE_BUF=null;
function initAudio(){
  if(actx) return;
  actx = new (window.AudioContext||window.webkitAudioContext)();
  const comp = actx.createDynamicsCompressor();
  comp.threshold.value=-16; comp.knee.value=18; comp.ratio.value=7;
  comp.attack.value=0.004; comp.release.value=0.2;
  comp.connect(actx.destination);
  masterGain = actx.createGain(); masterGain.gain.value = 1; masterGain.connect(comp);
  musicGain = actx.createGain(); musicGain.gain.value = 0.22; musicGain.connect(masterGain);
  sfxGain = actx.createGain(); sfxGain.gain.value = 0.9; sfxGain.connect(masterGain);
  VERB = actx.createConvolver();
  (function(){
    const rate=actx.sampleRate, len=(rate*1.9)|0, buf=actx.createBuffer(2,len,rate);
    for(let ch=0;ch<2;ch++){ const d=buf.getChannelData(ch);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.7)*0.55; }
    VERB.buffer=buf;
  })();
  const vg = actx.createGain(); vg.gain.value=0.7; VERB.connect(vg); vg.connect(masterGain);
  NOISE_BUF = (function(){
    const rate=actx.sampleRate, len=(rate*1.5)|0, buf=actx.createBuffer(1,len,rate);
    const d=buf.getChannelData(0); for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
    return buf;
  })();
}
function tone(freq,start,dur,type,vol,detune){
  if(!actx || !freq) return;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = type||'square';
  o.frequency.value = freq;
  if(detune) o.detune.value = detune;
  g.gain.setValueAtTime(0.0001, actx.currentTime+start);
  g.gain.linearRampToValueAtTime(vol||0.5, actx.currentTime+start+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+start+dur);
  o.connect(g); g.connect(musicGain);
  o.start(actx.currentTime+start); o.stop(actx.currentTime+start+dur+0.05);
}
function drumKick(vol){
  if(!actx) return;
  const t0=actx.currentTime;
  const o=actx.createOscillator(), g=actx.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(150,t0);
  o.frequency.exponentialRampToValueAtTime(44,t0+0.11);
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(vol,t0+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+0.22);
  o.connect(g); g.connect(sfxGain); g.connect(VERB);
  o.start(t0); o.stop(t0+0.26);
}
function drumHat(vol){
  if(!actx) return;
  const t0=actx.currentTime;
  const src=actx.createBufferSource(); src.buffer=NOISE_BUF; src.loop=true;
  const hp=actx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=6200;
  const g=actx.createGain();
  g.gain.setValueAtTime(vol,t0);
  g.gain.exponentialRampToValueAtTime(0.0005,t0+0.05);
  src.connect(hp); hp.connect(g); g.connect(sfxGain);
  src.start(t0); src.stop(t0+0.07);
}
function drumSnare(vol){
  if(!actx) return;
  const t0=actx.currentTime;
  const src=actx.createBufferSource(); src.buffer=NOISE_BUF; src.loop=true;
  const bp=actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1800; bp.Q.value=1.1;
  const g=actx.createGain();
  g.gain.setValueAtTime(vol,t0);
  g.gain.exponentialRampToValueAtTime(0.0005,t0+0.12);
  src.connect(bp); bp.connect(g); g.connect(sfxGain); g.connect(VERB);
  src.start(t0); src.stop(t0+0.14);
}
function duckMusic(level, hold){
  if(!musicGain) return;
  const g=musicGain.gain, t=actx.currentTime;
  g.cancelScheduledValues(t); g.setValueAtTime(g.value,t);
  g.linearRampToValueAtTime(muted?0:0.22*level, t+0.05);
  g.linearRampToValueAtTime(muted?0:0.22, t+(hold||0.9));
}
function braam(vol){
  if(!actx) return;
  const t0=actx.currentTime;
  duckMusic(0.3, 1.4);
  [55,55.8,27.5].forEach((f,i)=>{
    const o=actx.createOscillator(), g=actx.createGain(), lp=actx.createBiquadFilter();
    o.type='sawtooth'; o.frequency.value=f;
    lp.type='lowpass'; lp.Q.value=3;
    lp.frequency.setValueAtTime(90,t0);
    lp.frequency.exponentialRampToValueAtTime(540,t0+0.26);
    lp.frequency.exponentialRampToValueAtTime(110,t0+1.45);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(vol*(i===2?0.7:0.5),t0+0.06);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+1.55);
    o.connect(lp); lp.connect(g); g.connect(sfxGain); g.connect(VERB);
    o.start(t0); o.stop(t0+1.65);
  });
  drumKick(0.5);
}
function riser(dur){
  if(!actx) return;
  const t0=actx.currentTime;
  const src=actx.createBufferSource(); src.buffer=NOISE_BUF; src.loop=true;
  const bp=actx.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=1.3;
  bp.frequency.setValueAtTime(240,t0);
  bp.frequency.exponentialRampToValueAtTime(3200,t0+dur);
  const g=actx.createGain();
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(0.15,t0+dur);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur+0.08);
  src.connect(bp); bp.connect(g); g.connect(sfxGain); g.connect(VERB);
  src.start(t0); src.stop(t0+dur+0.15);
}
function stinger(){
  if(!actx) return;
  braam(0.5);
  [523.25,783.99,1046.5].forEach((f,i)=>{
    const t0=actx.currentTime+0.12*i;
    const o=actx.createOscillator(), g=actx.createGain();
    o.type='triangle'; o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(0.1,t0+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+1.1);
    o.connect(g); g.connect(sfxGain); g.connect(VERB);
    o.start(t0); o.stop(t0+1.2);
  });
}
function playVictoryJingle(){
  const notes=[523,659,784,1046];
  notes.forEach((f,i)=> tone(f, i*0.16, 0.35, 'triangle', 0.4));
}

// v6 全程配樂：進行曲（幕一）／戰鬥曲（幕二三）雙主題＋鼓組，逐拍排程
const NOTE_D = 0.16;
const MARCH_MEL  = [392,0,523,587, 523,0,440,392, 392,0,523,659, 587,523,440,0];
const MARCH_BASS = [98,0,0,0, 131,0,0,0, 98,0,0,0, 110,0,131,0];
const BATTLE_MEL  = [330,392,440,494, 523,494,440,392, 330,392,494,523, 587,523,494,440];
const BATTLE_BASS = [82,0,82,0, 110,0,110,0, 82,0,82,0, 123,0,110,0];
let musicBeat = -1;
function updateMusic(t){
  if(!actx || muted) return;
  const beat = Math.floor(t/NOTE_D);
  if(beat === musicBeat) return;
  musicBeat = beat;
  const step = beat % 16;
  if(t < 3.4){
    // 開場：低音脈動＋輕鈸
    if(step % 8 === 0) drumKick(0.22);
    if(step % 4 === 2) drumHat(0.03);
    if(step % 8 === 0) tone(65.4, 0, NOTE_D*7, 'sine', 0.22);
    return;
  }
  if(t < 11.5){
    // 幕一：貓咪進行曲
    tone(MARCH_MEL[step], 0, NOTE_D*0.95, 'square', 0.3);
    tone(MARCH_BASS[step], 0, NOTE_D*3.4, 'triangle', 0.34);
    if(step % 4 === 0) drumKick(0.2);
    if(step % 2 === 1) drumHat(0.035);
    if(step % 8 === 4) drumSnare(0.09);
    return;
  }
  if(t < 25){
    // 幕二三：對戰主題（急促）
    tone(BATTLE_MEL[step], 0, NOTE_D*0.9, 'sawtooth', 0.24);
    tone(BATTLE_BASS[step], 0, NOTE_D*1.8, 'square', 0.2);
    if(step % 2 === 0) drumKick(0.22);
    drumHat(0.03);
    if(step % 4 === 2) drumSnare(0.1);
    return;
  }
  // 結尾：放慢的餘韻
  if(step % 8 === 0) tone(261.6, 0, NOTE_D*7, 'triangle', 0.2);
  if(step % 8 === 0) drumKick(0.14);
}

// ---------- v6 烘焙資產：星空星雲、光暈、暈影、顆粒、光帶 ----------
function bakeTex(w,h,fn){ const c=document.createElement('canvas'); c.width=w; c.height=h; fn(c.getContext('2d'),w,h); return c; }
const clamp01 = t => Math.max(0, Math.min(1, t));
const lerp = (a,b,t) => a+(b-a)*t;
const easeOutCubic = t => 1 - Math.pow(1-t,3);
const easeOutBack = t => 1 + 2.7*Math.pow(t-1,3) + 1.7*Math.pow(t-1,2);
const easeInOut = t => t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
let bgTex = null;
function buildBG(){
  bgTex = bakeTex(Math.max(2,W), Math.max(2,H), (g,w,h)=>{
    const lg = g.createLinearGradient(0,0,0,h);
    lg.addColorStop(0,'#0a1024'); lg.addColorStop(1,'#141034');
    g.fillStyle=lg; g.fillRect(0,0,w,h);
    // 星雲層
    const nebs = [
      [w*0.22,h*0.3,w*0.3,'rgba(79,124,255,0.10)'],
      [w*0.75,h*0.22,w*0.26,'rgba(154,107,255,0.10)'],
      [w*0.55,h*0.7,w*0.34,'rgba(56,225,255,0.06)'],
      [w*0.15,h*0.8,w*0.24,'rgba(255,108,199,0.06)'],
    ];
    for(const [x,y,r,col] of nebs){
      const rg = g.createRadialGradient(x,y,0,x,y,r);
      rg.addColorStop(0,col); rg.addColorStop(1,'rgba(0,0,0,0)');
      g.fillStyle=rg; g.fillRect(x-r,y-r,r*2,r*2);
    }
    // 細碎遠星
    for(let i=0;i<90;i++){
      g.globalAlpha = 0.15+Math.random()*0.4;
      g.fillStyle='#cdd8ff';
      g.fillRect(Math.random()*w, Math.random()*h, 1, 1);
    }
  });
}
buildBG();
window.addEventListener('resize', buildBG);
const vigTex = bakeTex(480,270,(g,w,h)=>{
  const r = g.createRadialGradient(w/2,h/2,h*0.36,w/2,h/2,h*0.86);
  r.addColorStop(0,'rgba(0,0,0,0)'); r.addColorStop(0.7,'rgba(3,6,16,0.18)'); r.addColorStop(1,'rgba(3,6,16,0.5)');
  g.fillStyle=r; g.fillRect(0,0,w,h);
});
const glowTex = bakeTex(128,128,(g)=>{
  const r = g.createRadialGradient(64,64,0,64,64,64);
  r.addColorStop(0,'rgba(255,236,170,0.95)'); r.addColorStop(0.42,'rgba(255,210,100,0.3)'); r.addColorStop(1,'rgba(255,210,100,0)');
  g.fillStyle=r; g.fillRect(0,0,128,128);
});
const glowCool = bakeTex(128,128,(g)=>{
  const r = g.createRadialGradient(64,64,0,64,64,64);
  r.addColorStop(0,'rgba(150,225,255,0.9)'); r.addColorStop(0.45,'rgba(100,160,255,0.25)'); r.addColorStop(1,'rgba(100,160,255,0)');
  g.fillStyle=r; g.fillRect(0,0,128,128);
});
const sweepBand = bakeTex(240,60,(g,w,h)=>{
  const lg = g.createLinearGradient(0,0,w,0);
  lg.addColorStop(0,'rgba(255,255,255,0)'); lg.addColorStop(0.5,'rgba(255,255,255,0.85)'); lg.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle = lg; g.fillRect(0,0,w,h);
  const vgrad = g.createLinearGradient(0,0,0,h);
  vgrad.addColorStop(0,'rgba(0,0,0,0)'); vgrad.addColorStop(0.5,'rgba(0,0,0,1)'); vgrad.addColorStop(1,'rgba(0,0,0,0)');
  g.globalCompositeOperation='destination-in';
  g.fillStyle = vgrad; g.fillRect(0,0,w,h);
});
const grainTiles = [0,1,2].map(()=> bakeTex(160,160,(g,w,h)=>{
  const id = g.createImageData(w,h);
  for(let i=0;i<id.data.length;i+=4){
    const v=(Math.random()*255)|0;
    id.data[i]=id.data[i+1]=id.data[i+2]=v; id.data[i+3]=12;
  }
  g.putImageData(id,0,0);
}));
const grainPats = grainTiles.map(tx => ctx.createPattern(tx,'repeat'));
function bakeChars(text, px, colors, glowColor){
  const meas = bakeTex(8,8,()=>{}).getContext('2d');
  meas.font = '900 ' + px + 'px sans-serif';
  return [...text].map((ch,i)=>{
    const w = Math.ceil(meas.measureText(ch).width) + 48;
    const h = px + 56;
    const c = bakeTex(w,h,(g)=>{
      g.font = '900 ' + px + 'px sans-serif';
      g.textAlign='center'; g.textBaseline='middle';
      g.shadowColor = glowColor; g.shadowBlur = 24;
      g.fillStyle = colors[i % colors.length];
      g.fillText(ch, w/2, h/2);
      g.shadowBlur = 9;
      g.fillText(ch, w/2, h/2);
    });
    return {c,w,h};
  });
}
const TITLE_CHARS = bakeChars('貓咪大戰爭', 66, ['#38e1ff','#4f7cff','#9a6bff','#ff6cc7','#ffd24d'], 'rgba(120,200,255,0.95)');
const SUB_CHARS = bakeChars('寶可夢戰鬥曲', 44, ['#ff6cc7','#ffd24d','#38e1ff','#9a6bff','#4f7cff','#ff8a5c'], 'rgba(255,150,210,0.9)');
function drawTitleChars(chars, cx, cy, t, stagger, dur, sweepAt, s){
  s = s || 1;
  let total=0; chars.forEach(sp => total += (sp.w-32)*s);
  let x = cx - total/2;
  let minX=1e9, maxX=-1e9;
  chars.forEach((sp,i)=>{
    const p = clamp01((t - i*stagger)/dur);
    const w = (sp.w-32)*s;
    if(p>0){
      const e = easeOutBack(p);
      ctx.save();
      ctx.globalAlpha = clamp01(p*1.6);
      ctx.translate(x+w/2, cy+(1-e)*40*s);
      ctx.scale((0.6+0.4*e)*s, (0.6+0.4*e)*s);
      ctx.drawImage(sp.c, -sp.w/2, -sp.h/2);
      ctx.restore();
      minX=Math.min(minX,x); maxX=Math.max(maxX,x+w);
    }
    x += w;
  });
  if(sweepAt!==undefined && t>sweepAt && t<sweepAt+0.9 && maxX>minX){
    const p = (t-sweepAt)/0.9;
    const sx = lerp(minX-100, maxX+100, easeInOut(p));
    ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.85;
    ctx.drawImage(sweepBand, sx-70*s, cy-60*s, 140*s, 120*s);
    ctx.restore();
  }
}
let trans = {t:99, type:'none'};
function triggerTrans(type){ trans = {t:0, type}; }
let camShake = 0, prevT = 0;
function drawCinema(t, dt){
  trans.t += dt;
  if(trans.type==='flash' && trans.t<0.4){
    ctx.save(); ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha = (1-trans.t/0.4)*0.85;
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
    ctx.restore();
  } else if(trans.type==='fade' && trans.t<0.7){
    ctx.save(); ctx.globalAlpha = Math.sin(Math.PI*clamp01(trans.t/0.7))*0.8;
    ctx.fillStyle='#070b14'; ctx.fillRect(0,0,W,H);
    ctx.restore();
  }
  ctx.drawImage(vigTex, 0, 0, W, H);
  ctx.save(); ctx.globalAlpha=0.5;
  ctx.fillStyle = grainPats[(t*14|0)%3];
  ctx.fillRect(0,0,W,H);
  ctx.restore();
  const lbMax = Math.min(H*0.075, 62);
  const lb = lbMax * easeOutCubic(clamp01(t/1.5));
  ctx.fillStyle='#04070f';
  ctx.fillRect(0,0,W,lb);
  ctx.fillRect(0,H-lb,W,lb);
}

// ---------- 星空背景（烘焙底圖＋動態閃爍星） ----------

// ---------- 「陽光草原」關卡背景（配色與形狀移植自遊戲《貓咪大戰爭》bgCache） ----------
let meadowTex = null;
function buildMeadow(){
  meadowTex = bakeTex(Math.max(2,W), Math.max(2,H), (g,w,h)=>{
    const s = Math.min(w,h)/540;
    const floorY = h*0.8;
    const sky = g.createLinearGradient(0,0,0,h);
    sky.addColorStop(0,'#8fd3ff'); sky.addColorStop(1,'#5c94fc');
    g.fillStyle=sky; g.fillRect(0,0,w,h);
    g.fillStyle='rgba(255,245,214,.9)';
    g.beginPath(); g.arc(w*0.875, h*0.148, 30*s, 0, Math.PI*2); g.fill();
    g.fillStyle='#00a844'; g.globalAlpha=0.55;
    g.beginPath(); g.moveTo(0,floorY);
    for(let x=0;x<=w;x+=60*s) g.lineTo(x, floorY - (60 + 50*Math.abs(Math.sin((x/s)*0.013)))*s);
    g.lineTo(w,floorY); g.closePath(); g.fill();
    g.globalAlpha=1;
    g.fillStyle='#c84c0c'; g.fillRect(0,floorY,w,h-floorY);
    g.fillStyle='#3fbf5f'; g.fillRect(0,floorY,w,12*s);
    g.fillStyle='rgba(0,0,0,.12)';
    for(let x=20*s; x<w; x+=90*s) g.fillRect(x, floorY + (30 + (Math.round(x/s) % 37))*s, 26*s, 6*s);
  });
}

function rr(x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r); ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r); ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}
const _gc = new Map();
function cg(key, maker){
  let g = _gc.get(key);
  if(!g){ g = maker(); _gc.set(key, g); }
  return g;
}

    return hi;
  });
  ctx.beginPath(); ctx.ellipse(-w*0.16, cy, w*0.25, h*0.16, -0.3, 0, Math.PI*2); ctx.fill();

}

function drawUnitSprite(x, y, scale, id, t, pose, facing){
  const d = UNIT_DEFS[id];
  const isCat = (id!=='dog');
  let bobZ = 0, lean = 0;
  const walkT = (pose==='march'||pose==='charge'||pose==='idle') ? t : 0;
  if(pose==='win') bobZ = -Math.abs(Math.sin(t*8))*14;
  if(pose==='march') bobZ = Math.sin(walkT*9)*2;
  if(pose==='charge') lean = -0.18;
  const e = { walkT, windup: pose==='charge'?1:0, flash: (pose==='hit')?1:0, x: x, z: 0 };
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  ctx.globalAlpha = 0.28;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(0, 3, d.w*0.45, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.translate(0, bobZ);
  ctx.scale(facing||1, 1);
  ctx.rotate(lean);
  ctx.translate(0, -d.h);
  if(isCat) drawCatG(d, d.w, d.h, t, e); else drawFoeG(d, d.w, d.h, t, e);

function drawScene1(tt){ // 貓咪大戰爭：遊戲同款草原＋雙塔＋貓咪部隊向右推進、撞上小汪汪開打
  drawMeadow(tt);
  const sB = Math.min(W,H)/420;
  const feetY = H*0.8 + 6*sB;
  drawBaseS(W*0.07, feetY, 0.78*sB, true, 1, 0, tt);
  drawBaseS(W*0.94, feetY, 0.78*sB, false, 1, 0, tt);
  // 小汪汪從右側迎面走來；8 秒後與先頭貓咪開打（撞上敵人就開打）
  const fightT = 8.3;
  const meetX = W*0.62;
  const dogX = tt < fightT ? Math.max(meetX + 60*sB, W*1.05 - (tt-3.5)*W*0.09) : meetX + 60*sB;
  const scrollX = tt < fightT ? (W*0.16 + (tt-3.5)*W*0.058) : meetX - 60*sB;
  const fighting = tt >= fightT;
  const ids = ['cat','tank','kick'];
  ids.forEach((id,i)=>{
    const x = scrollX - i*95*sB;
    const pose = fighting ? (i===0 ? 'charge' : 'march') : 'march';
    drawUnitSprite(x, feetY + (i%2)*2*sB, 2.1*sB, id, tt*(1+i*0.12)+i, pose, 1);
  });
  drawUnitSprite(dogX, feetY, 2.1*sB, 'dog', tt*1.2, fighting ? 'hit' : 'march', -1);
  if(fighting){
    // 開打火花（星狀粒子）
    const ft = (tt - fightT) % 0.8;
    ctx.save(); ctx.globalAlpha = Math.max(0, 1-ft*1.6);
    ctx.fillStyle = '#ffd24d';
    for(let i=0;i<6;i++){
      const a = i/6*Math.PI*2 + tt*3;
      const r = (8+ft*54)*sB;
      ctx.beginPath();
      ctx.arc((scrollX+dogX)/2 - 30*sB + Math.cos(a)*r, feetY - 40*sB + Math.sin(a)*r*0.7, 3.4*sB*(1-ft), 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawScene2(tt){ // 寶可夢戰鬥曲：兩訓練家對峙＋能量球＋音符
  const cx = W/2, cy = H*0.58;
  drawTrainerSilhouette(cx-W*0.22, cy, 1.3, true, '#38e1ff', tt);
  drawTrainerSilhouette(cx+W*0.22, cy, 1.3, false, '#ff6cc7', tt);
  drawEnergyBall(cx, cy-30, 22+ (tt%1)*10, tt);
  for(let i=0;i<5;i++){
    const nt = (tt*1.3+i*0.6)%3;
    const ny = cy - 60 - nt*70;
    const nx = cx + Math.sin(tt*2+i)*80;
    const alpha = Math.max(0, 1-nt/3);
    drawNote(nx, ny, 0.9, alpha);
  }
}

function drawScene3(tt){ // 混搭：遊戲同款草原上，貓咪部隊配上戰鬥曲音符全速衝鋒
  drawMeadow(tt);
  const sB = Math.min(W,H)/420;
  const feetY = H*0.8 + 6*sB;
  drawBaseS(W*0.07, feetY, 0.78*sB, true, 1, 0, tt);
  drawBaseS(W*0.94, feetY, 0.78*sB, false, 1, 0, tt);
  const ids = ['cat','tank','kick'];
  ids.forEach((id,i)=>{
    const speed = (W*0.13)+i*(W*0.02);
    const x = ((tt*speed + i*220*sB) % (W+180*sB)) - 90*sB;
    drawUnitSprite(x, feetY + (i%2)*2*sB, 2.1*sB, id, tt*(1.2+i*0.15)+i, 'march', 1);
  });
  // 戰鬥曲音符飄揚（保留跨界主題）
  for(let i=0;i<6;i++){
    const nt = (tt*1.3+i*0.55)%3;
    const ny = H*0.62 - nt*70*sB/1.2;
    const nx = (i/6)*W + Math.sin(tt*2+i)*60*sB/1.2;
    const alpha = Math.max(0, 1-nt/3);
    drawNote(nx, ny, 0.9*sB/1.2, alpha);
  }
  drawEnergyBall(W*0.5, H*0.36, 20*sB/1.2, tt);
}

function drawIntroCard(t){
  const s = Math.min(W,H)/560;
  ctx.save();
  ctx.textAlign='center';
  const preA = clamp01((t-0.15)/0.5) * (t<2.7 ? 1 : clamp01((3.3-t)/0.5));
  ctx.globalAlpha = preA;
  ctx.fillStyle='rgba(232,240,255,0.8)';
  ctx.font = Math.round(16*s)+'px sans-serif';
  ctx.fillText('AI未來創作營隊　呈獻', W/2, H*0.26);
  ctx.restore();
  drawTitleChars(TITLE_CHARS, W/2, H*0.44, t-0.5, 0.12, 0.42, 1.6, s);
  drawTitleChars(SUB_CHARS, W/2, H*0.44 + 84*s, t-1.1, 0.08, 0.38, undefined, s);
}
function drawEndCard(tt){
  const t = tt - 25;
  if(t < 0) return;
  const a = clamp01(t/0.6);
  const s = Math.min(W,H)/560;
  ctx.save();
  ctx.globalAlpha = a*0.66;
  ctx.fillStyle='#070b14';
  ctx.fillRect(0,0,W,H);
  ctx.restore();
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  ctx.globalAlpha = a*0.45;
  ctx.drawImage(glowCool, W/2-260*s, H*0.40-150*s, 520*s, 300*s);
  ctx.restore();
  drawTitleChars(TITLE_CHARS, W/2, H*0.38, t-0.1, 0.08, 0.38, 1.1, s);
  drawTitleChars(SUB_CHARS, W/2, H*0.38 + 80*s, t-0.5, 0.06, 0.35, undefined, s);
  const subA = clamp01((t-1.1)/0.5);
  if(subA>0){
    ctx.save();
    ctx.globalAlpha = subA;
    ctx.textAlign='center';
    ctx.fillStyle='#ffd24d';
    ctx.font = '700 ' + Math.round(22*s) + 'px sans-serif';
    ctx.fillText('感謝觀看！', W/2, H*0.38 + 138*s);
    ctx.fillStyle='rgba(232,240,255,0.7)';
    ctx.font = Math.round(14*s) + 'px sans-serif';
    ctx.fillText('AI未來創作營隊 出品', W/2, H*0.38 + 166*s);
    ctx.restore();
  }
}

function render(ts){
  if(startTime===null) startTime=ts;
  const t = (ts-startTime)/1000;
  const dt = Math.max(0, Math.min(0.1, t - prevT)); prevT = t;

  updateMusic(Math.min(t, TOTAL));

  // v6 幕間事件：轉場閃白／riser／braam／勝利／片尾定格重音
  if(!scheduled.battleRiser && t>=10.4){ scheduled.battleRiser=true; riser(1.1); }
  if(!scheduled.battleIn && t>=11.5){ scheduled.battleIn=true; braam(0.5); triggerTrans('flash'); camShake=12; }
  if(!scheduled.mixRiser && t>=18.5){ scheduled.mixRiser=true; riser(1.0); }
  if(!scheduled.victory && t>=19.5){ scheduled.victory=true; braam(0.4); triggerTrans('flash'); camShake=9; }
  if(!scheduled.endIn && t>=25){ scheduled.endIn=true; stinger(); triggerTrans('flash'); camShake=8; playVictoryJingle(); }

  // v6 電影運鏡
  let zoom = 1.03, ox = 0, oy = 0;
  if(t<3.5){ zoom = lerp(1.10, 1.03, easeOutCubic(clamp01(t/2.6))); }
  else if(t<11.5){ const p=(t-3.5)/8; zoom = 1.03+0.05*p; ox = -W*0.02 + W*0.04*p; }
  else if(t<19.5){ const p=easeInOut(clamp01((t-11.5)/8)); zoom = 1.06+0.08*p; oy = H*0.02*p; }
  else if(t<25){ const p=clamp01((t-19.5)/1.2); zoom = lerp(1.16, 1.04, easeOutCubic(p)); }
  else { zoom = 1.03; }
  if(camShake>0.05){
    zoom += camShake*0.002;
    ox += (Math.random()-0.5)*camShake;
    oy += (Math.random()-0.5)*camShake*0.7;
    camShake *= 0.85;
  }
  const mx = W/2*(1-1/zoom)-0.5, my = H/2*(1-1/zoom)-0.5;
  ox = Math.max(-mx, Math.min(mx, ox));
  oy = Math.max(-my, Math.min(my, oy));
  ctx.save();
  ctx.translate(W/2, H/2); ctx.scale(zoom, zoom); ctx.translate(-W/2-ox, -H/2-oy);

  drawBG(t);

  if(t<3.5){
    // 開場 Logo（場景後面繼續由 drawIntroCard 疊加）
  } else if(t<11.5){
    drawScene1(t);
  } else if(t<19.5){
    drawScene2(t);
  } else {
    drawScene3(t);
  }

  ctx.restore();

  if(t<3.5) drawIntroCard(t);
  drawEndCard(Math.min(t, TOTAL));
  drawCinema(Math.min(t, TOTAL), dt);

  updateCaption(t);

  if(t < TOTAL){
    requestAnimationFrame(render);
  } else if(!ended){
    ended = true;
    rafOn = false;
    captionEl.classList.remove('show');
    // 結尾定格於標題卡，顯示重播鈕
    const ov = document.getElementById('startOverlay');
    ov.querySelector('.big').textContent = '';
    ov.style.background = 'rgba(4,7,14,0)';
    ov.classList.add('show');
  }
}

function startPlayback(){
  if(rafOn) return;
  rafOn = true;
  startTime = null; ended = false; prevT = 0; camShake = 0;
  musicBeat = -1; curCaptionIdx = -1;
  trans = {t:99, type:'none'};
  scheduled = {battleIn:false, mixRiser:false, battleRiser:false, victory:false, endIn:false};
  document.getElementById('startOverlay').classList.remove('show');
  requestAnimationFrame(render);
}

document.getElementById('playBtn').addEventListener('click', (e)=>{
  e.stopPropagation();
  initAudio();
  if(actx.state==='suspended') actx.resume();
  startPlayback();
});
document.getElementById('muteBtn').addEventListener('click', (e)=>{
  muted = !muted;
  e.target.textContent = muted ? '🔇' : '🔊';
  if(musicGain){
    musicGain.gain.value = muted ? 0 : 0.22;
    sfxGain.gain.value = muted ? 0 : 0.9;
  }
});

// v6 自動播放：載入即播（聲音預設開啟），瀏覽器若擋住自動出聲，首次點擊自動解鎖
try { initAudio(); if(actx && actx.state==='suspended') actx.resume(); } catch(e) {}
(function(){
  const unlock = () => { if(actx && actx.state==='suspended') actx.resume(); };
  addEventListener('pointerdown', unlock, {once:true});
  addEventListener('keydown', unlock, {once:true});
})();
startPlayback();

<script>/* AI-CAMP-STATS-BEACON */
(function(){

  var NS="ai-future-camp", K="pro-x-df22fab6";

  function ping(n){

      fetch(REL+"hit/"+NS+"/"+n).then(function(r){
        if(!r||!r.ok){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); }
      }).catch(function(){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); });
    }catch(e){}
  }
  function read(n,cb){
    function via(base,next){ try{ fetch(base+"get/"+NS+"/"+n).then(function(r){ if(r.status===404&&base===ABS) return {value:0}; if(!r.ok) throw 0; return r.json(); }).then(function(j){ cb(j.value||j.count||0); }).catch(next); }catch(e){ next(); } }
    via(REL, function(){ via(ABS, function(){ cb(null); }); });
  }
  ping(K+"-v");
  ping(K+"-p"); ping("site-total-plays");
  /* 投票鈕：非常好玩/好玩——與作品館同一計數器，任何網頁打開都同步 */
  function initVotes(){
    if(!document.body) return;

    var LS="voted-"+K;
    var defs=[["-love","\u2764\uFE0F","\u975e\u5e38\u597d\u73a9","#ff6cc7"],["-like","\ud83d\udc4d","\u597d\u73a9","#38e1ff"]];
    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;
          b.querySelector("i").textContent=Math.max(0,(n||0)-(c||0));
        }); });
      });
    }
    defs.forEach(function(d){
      var b=document.createElement("button");
      b.type="button"; b.title=d[2];
      b.style.cssText="min-height:42px;padding:8px 14px;border:none;border-radius:999px;background:rgba(15,18,32,.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation";
      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";
      b.addEventListener("click",function(){
        var prev=null; try{ prev=localStorage.getItem(LS); }catch(e){}
        if(prev===d[0]){ ping(K+d[0]+"-c"); try{ localStorage.removeItem(LS); }catch(e){} }
        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);
      });
      btns[d[0]]=b; wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    refresh();
    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* 每10秒同步別人投的票 */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
</script>
<script>/* AI-CAMP-VIDEO-CONTROLS */
(function(){
  var ORAF=window.requestAnimationFrame.bind(window), OST=window.setTimeout.bind(window), OSI=window.setInterval.bind(window);
  var realNow=performance.now.bind(performance), D0=Date.now(), P0=realNow();
  var acc=0, lastReal=P0, paused=false, speed=1;
  function vnow(){ var r=realNow(); if(!paused){ acc+=(r-lastReal)*speed; } lastReal=r; return acc; }
  try{ performance.now=function(){ return vnow(); }; }catch(e){}
  try{ Date.now=function(){ return D0+Math.round(vnow()); }; }catch(e){}
  window.requestAnimationFrame=function(cb){ return ORAF(function tick(){ if(paused){ ORAF(tick); } else { cb(vnow()); } }); };
  window.setTimeout=function(fn,ms){ var a=[].slice.call(arguments,2);
    return OST(function f(){ if(paused){ OST(f,120); } else if(typeof fn==="function"){ fn.apply(null,a); } },ms); };
  window.setInterval=function(fn,ms){ var a=[].slice.call(arguments,2);
    return OSI(function(){ if(!paused&&typeof fn==="function"){ fn.apply(null,a); } },ms); };
  var ctxs=[];
  ["AudioContext","webkitAudioContext"].forEach(function(n){
    var C=window[n]; if(!C) return;
    var W=function(){ var c=new (Function.prototype.bind.apply(C,[null].concat([].slice.call(arguments))))(); ctxs.push(c); return c; };
    W.prototype=C.prototype; window[n]=W;
  });
  function setPaused(p){
    vnow(); paused=p;
    ctxs.forEach(function(c){ try{ p?c.suspend():c.resume(); }catch(e){} });
    [].forEach.call(document.querySelectorAll("audio,video"),function(m){ try{ p?m.pause():m.play(); }catch(e){} });
  }
  function fmt(ms){ var s=Math.floor(ms/1000); return Math.floor(s/60)+":"+("0"+(s%60)).slice(-2); }
  function init(){
    if(!document.body) return;
    var bar=document.createElement("div");
    bar.style.cssText="position:fixed;left:10px;bottom:10px;z-index:99998;display:flex;gap:6px;align-items:center;"+
      "font-family:sans-serif;background:rgba(15,18,32,.88);border-radius:999px;padding:6px 10px;box-shadow:0 2px 10px rgba(0,0,0,.4)";
    function mkbtn(txt,title){ var b=document.createElement("button"); b.type="button"; b.title=title;
      b.style.cssText="min-width:42px;min-height:36px;border:none;border-radius:999px;background:rgba(255,255,255,.12);"+
        "color:#fff;font-size:15px;cursor:pointer;touch-action:manipulation;padding:4px 10px"; b.textContent=txt; return b; }
    var bPlay=mkbtn("\u23F8","\u66AB\u505C/\u7E7C\u7E8C");
    var bRe=mkbtn("\u23EA","\u91CD\u64AD");
    var bSp=mkbtn("1x","\u64AD\u653E\u901F\u5EA6");
    var tEl=document.createElement("span"); tEl.style.cssText="color:#9fd8ff;font-size:13px;min-width:38px;text-align:center"; tEl.textContent="0:00";
    bPlay.addEventListener("click",function(){ setPaused(!paused); bPlay.textContent=paused?"\u25B6":"\u23F8"; });
    bRe.addEventListener("click",function(){ location.reload(); });
    var speeds=[1,2,0.5];
    bSp.addEventListener("click",function(){ vnow(); speed=speeds[(speeds.indexOf(speed)+1)%speeds.length]; bSp.textContent=(speed===0.5?"0.5":speed)+"x"; });
    bar.appendChild(bPlay); bar.appendChild(bRe); bar.appendChild(bSp); bar.appendChild(tEl);
    document.body.appendChild(bar);
    (function upd(){ tEl.textContent=fmt(vnow()); OST(upd,500); })();
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",init); else init();
})();
</script>
