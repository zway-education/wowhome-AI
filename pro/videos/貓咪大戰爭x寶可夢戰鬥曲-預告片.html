<script>
'use strict';
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let W,H,DPR;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W*DPR; canvas.height = H*DPR;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}

// ---------- Web Audio v6пјҡеЈ“зё®жҜҚз·ҡпјӢзЁӢеәҸеҢ–ж®ҳйҹҝпјӢйӣҷдё»йЎҢйј“зө„й…ҚжЁӮ ----------
let actx=null, muted=false, musicGain=null, masterGain=null, sfxGain=null, VERB=null, NOISE_BUF=null;
function initAudio(){
  if(actx) return;
  actx = new (window.AudioContext||window.webkitAudioContext)();
  const comp = actx.createDynamicsCompressor();
  comp.threshold.value=-16; comp.knee.value=18; comp.ratio.value=7;
  comp.attack.value=0.004; comp.release.value=0.2;
  comp.connect(actx.destination);
  masterGain = actx.createGain(); masterGain.gain.value = 1; masterGain.connect(comp);
  musicGain = actx.createGain(); musicGain.gain.value = 0.22; musicGain.connect(masterGain);
  sfxGain = actx.createGain(); sfxGain.gain.value = 0.9; sfxGain.connect(masterGain);
  VERB = actx.createConvolver();
  (function(){
    const rate=actx.sampleRate, len=(rate*1.9)|0, buf=actx.createBuffer(2,len,rate);
    for(let ch=0;ch<2;ch++){ const d=buf.getChannelData(ch);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.7)*0.55; }
    VERB.buffer=buf;
  })();
  const vg = actx.createGain(); vg.gain.value=0.7; VERB.connect(vg); vg.connect(masterGain);
  NOISE_BUF = (function(){
    const rate=actx.sampleRate, len=(rate*1.5)|0, buf=actx.createBuffer(1,len,rate);
    const d=buf.getChannelData(0); for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
    return buf;
  })();
}
function tone(freq,start,dur,type,vol,detune){
  if(!actx || !freq) return;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = type||'square';
  o.frequency.value = freq;
  if(detune) o.detune.value = detune;
  g.gain.setValueAtTime(0.0001, actx.currentTime+start);
  g.gain.linearRampToValueAtTime(vol||0.5, actx.currentTime+start+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+start+dur);
  o.connect(g); g.connect(musicGain);
  o.start(actx.currentTime+start); o.stop(actx.currentTime+start+dur+0.05);
}
function drumKick(vol){
  if(!actx) return;
  const t0=actx.currentTime;
  const o=actx.createOscillator(), g=actx.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(150,t0);
  o.frequency.exponentialRampToValueAtTime(44,t0+0.11);
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(vol,t0+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+0.22);
  o.connect(g); g.connect(sfxGain); g.connect(VERB);
  o.start(t0); o.stop(t0+0.26);
}
function drumHat(vol){
  if(!actx) return;
  const t0=actx.currentTime;
  const src=actx.createBufferSource(); src.buffer=NOISE_BUF; src.loop=true;
  const hp=actx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=6200;
  const g=actx.createGain();
  g.gain.setValueAtTime(vol,t0);
  g.gain.exponentialRampToValueAtTime(0.0005,t0+0.05);
  src.connect(hp); hp.connect(g); g.connect(sfxGain);
  src.start(t0); src.stop(t0+0.07);
}
function drumSnare(vol){
  if(!actx) return;
  const t0=actx.currentTime;
  const src=actx.createBufferSource(); src.buffer=NOISE_BUF; src.loop=true;
  const bp=actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1800; bp.Q.value=1.1;
  const g=actx.createGain();
  g.gain.setValueAtTime(vol,t0);
  g.gain.exponentialRampToValueAtTime(0.0005,t0+0.12);
  src.connect(bp); bp.connect(g); g.connect(sfxGain); g.connect(VERB);
  src.start(t0); src.stop(t0+0.14);
}
function duckMusic(level, hold){
  if(!musicGain) return;
  const g=musicGain.gain, t=actx.currentTime;
  g.cancelScheduledValues(t); g.setValueAtTime(g.value,t);
  g.linearRampToValueAtTime(muted?0:0.22*level, t+0.05);
  g.linearRampToValueAtTime(muted?0:0.22, t+(hold||0.9));
}
function braam(vol){
  if(!actx) return;
  const t0=actx.currentTime;
  duckMusic(0.3, 1.4);
  [55,55.8,27.5].forEach((f,i)=>{
    const o=actx.createOscillator(), g=actx.createGain(), lp=actx.createBiquadFilter();
    o.type='sawtooth'; o.frequency.value=f;
    lp.type='lowpass'; lp.Q.value=3;
    lp.frequency.setValueAtTime(90,t0);
    lp.frequency.exponentialRampToValueAtTime(540,t0+0.26);
    lp.frequency.exponentialRampToValueAtTime(110,t0+1.45);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(vol*(i===2?0.7:0.5),t0+0.06);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+1.55);
    o.connect(lp); lp.connect(g); g.connect(sfxGain); g.connect(VERB);
    o.start(t0); o.stop(t0+1.65);
  });
  drumKick(0.5);
}
function riser(dur){
  if(!actx) return;
  const t0=actx.currentTime;
  const src=actx.createBufferSource(); src.buffer=NOISE_BUF; src.loop=true;
  const bp=actx.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=1.3;
  bp.frequency.setValueAtTime(240,t0);
  bp.frequency.exponentialRampToValueAtTime(3200,t0+dur);
  const g=actx.createGain();
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(0.15,t0+dur);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur+0.08);
  src.connect(bp); bp.connect(g); g.connect(sfxGain); g.connect(VERB);
  src.start(t0); src.stop(t0+dur+0.15);
}
function stinger(){
  if(!actx) return;
  braam(0.5);
  [523.25,783.99,1046.5].forEach((f,i)=>{
    const t0=actx.currentTime+0.12*i;
    const o=actx.createOscillator(), g=actx.createGain();
    o.type='triangle'; o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(0.1,t0+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+1.1);
    o.connect(g); g.connect(sfxGain); g.connect(VERB);
    o.start(t0); o.stop(t0+1.2);
  });
}
function playVictoryJingle(){
  const notes=[523,659,784,1046];
  notes.forEach((f,i)=> tone(f, i*0.16, 0.35, 'triangle', 0.4));
}

// v6 е…ЁзЁӢй…ҚжЁӮпјҡйҖІиЎҢжӣІпјҲе№•дёҖпјүпјҸжҲ°й¬ҘжӣІпјҲе№•дәҢдёүпјүйӣҷдё»йЎҢпјӢйј“зө„пјҢйҖҗжӢҚжҺ’зЁӢ
const NOTE_D = 0.16;
const MARCH_MEL  = [392,0,523,587, 523,0,440,392, 392,0,523,659, 587,523,440,0];
const MARCH_BASS = [98,0,0,0, 131,0,0,0, 98,0,0,0, 110,0,131,0];
const BATTLE_MEL  = [330,392,440,494, 523,494,440,392, 330,392,494,523, 587,523,494,440];
const BATTLE_BASS = [82,0,82,0, 110,0,110,0, 82,0,82,0, 123,0,110,0];
let musicBeat = -1;
function updateMusic(t){
  if(!actx || muted) return;
  const beat = Math.floor(t/NOTE_D);
  if(beat === musicBeat) return;
  musicBeat = beat;
  const step = beat % 16;
  if(t < 3.4){
    // й–Ӣе ҙпјҡдҪҺйҹіи„ҲеӢ•пјӢиј•йҲё
    if(step % 8 === 0) drumKick(0.22);
    if(step % 4 === 2) drumHat(0.03);
    if(step % 8 === 0) tone(65.4, 0, NOTE_D*7, 'sine', 0.22);
    return;
  }
  if(t < 11.5){
    // е№•дёҖпјҡиІ“е’ӘйҖІиЎҢжӣІ
    tone(MARCH_MEL[step], 0, NOTE_D*0.95, 'square', 0.3);
    tone(MARCH_BASS[step], 0, NOTE_D*3.4, 'triangle', 0.34);
    if(step % 4 === 0) drumKick(0.2);
    if(step % 2 === 1) drumHat(0.035);
    if(step % 8 === 4) drumSnare(0.09);
    return;
  }
  if(t < 25){
    // е№•дәҢдёүпјҡе°ҚжҲ°дё»йЎҢпјҲжҖҘдҝғпјү
    tone(BATTLE_MEL[step], 0, NOTE_D*0.9, 'sawtooth', 0.24);
    tone(BATTLE_BASS[step], 0, NOTE_D*1.8, 'square', 0.2);
    if(step % 2 === 0) drumKick(0.22);
    drumHat(0.03);
    if(step % 4 === 2) drumSnare(0.1);
    return;
  }
  // зөҗе°ҫпјҡж”ҫж…ўзҡ„йӨҳйҹ»
  if(step % 8 === 0) tone(261.6, 0, NOTE_D*7, 'triangle', 0.2);
  if(step % 8 === 0) drumKick(0.14);
}

// ---------- v6 зғҳз„ҷиіҮз”ўпјҡжҳҹз©әжҳҹйӣІгҖҒе…үжҡҲгҖҒжҡҲеҪұгҖҒйЎҶзІ’гҖҒе…үеё¶ ----------
function bakeTex(w,h,fn){ const c=document.createElement('canvas'); c.width=w; c.height=h; fn(c.getContext('2d'),w,h); return c; }
const clamp01 = t => Math.max(0, Math.min(1, t));
const lerp = (a,b,t) => a+(b-a)*t;
const easeOutCubic = t => 1 - Math.pow(1-t,3);
const easeOutBack = t => 1 + 2.7*Math.pow(t-1,3) + 1.7*Math.pow(t-1,2);
const easeInOut = t => t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
let bgTex = null;
function buildBG(){
  bgTex = bakeTex(Math.max(2,W), Math.max(2,H), (g,w,h)=>{
    const lg = g.createLinearGradient(0,0,0,h);
    lg.addColorStop(0,'#0a1024'); lg.addColorStop(1,'#141034');
    g.fillStyle=lg; g.fillRect(0,0,w,h);
    // жҳҹйӣІеұӨ
    const nebs = [
      [w*0.22,h*0.3,w*0.3,'rgba(79,124,255,0.10)'],
      [w*0.75,h*0.22,w*0.26,'rgba(154,107,255,0.10)'],
      [w*0.55,h*0.7,w*0.34,'rgba(56,225,255,0.06)'],
      [w*0.15,h*0.8,w*0.24,'rgba(255,108,199,0.06)'],
    ];
    for(const [x,y,r,col] of nebs){
      const rg = g.createRadialGradient(x,y,0,x,y,r);
      rg.addColorStop(0,col); rg.addColorStop(1,'rgba(0,0,0,0)');
      g.fillStyle=rg; g.fillRect(x-r,y-r,r*2,r*2);
    }
    // зҙ°зўҺйҒ жҳҹ
    for(let i=0;i<90;i++){
      g.globalAlpha = 0.15+Math.random()*0.4;
      g.fillStyle='#cdd8ff';
      g.fillRect(Math.random()*w, Math.random()*h, 1, 1);
    }
  });
}
buildBG();
window.addEventListener('resize', buildBG);
const vigTex = bakeTex(480,270,(g,w,h)=>{
  const r = g.createRadialGradient(w/2,h/2,h*0.36,w/2,h/2,h*0.86);
  r.addColorStop(0,'rgba(0,0,0,0)'); r.addColorStop(0.7,'rgba(3,6,16,0.18)'); r.addColorStop(1,'rgba(3,6,16,0.5)');
  g.fillStyle=r; g.fillRect(0,0,w,h);
});
const glowTex = bakeTex(128,128,(g)=>{
  const r = g.createRadialGradient(64,64,0,64,64,64);
  r.addColorStop(0,'rgba(255,236,170,0.95)'); r.addColorStop(0.42,'rgba(255,210,100,0.3)'); r.addColorStop(1,'rgba(255,210,100,0)');
  g.fillStyle=r; g.fillRect(0,0,128,128);
});
const glowCool = bakeTex(128,128,(g)=>{
  const r = g.createRadialGradient(64,64,0,64,64,64);
  r.addColorStop(0,'rgba(150,225,255,0.9)'); r.addColorStop(0.45,'rgba(100,160,255,0.25)'); r.addColorStop(1,'rgba(100,160,255,0)');
  g.fillStyle=r; g.fillRect(0,0,128,128);
});
const sweepBand = bakeTex(240,60,(g,w,h)=>{
  const lg = g.createLinearGradient(0,0,w,0);
  lg.addColorStop(0,'rgba(255,255,255,0)'); lg.addColorStop(0.5,'rgba(255,255,255,0.85)'); lg.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle = lg; g.fillRect(0,0,w,h);
  const vgrad = g.createLinearGradient(0,0,0,h);
  vgrad.addColorStop(0,'rgba(0,0,0,0)'); vgrad.addColorStop(0.5,'rgba(0,0,0,1)'); vgrad.addColorStop(1,'rgba(0,0,0,0)');
  g.globalCompositeOperation='destination-in';
  g.fillStyle = vgrad; g.fillRect(0,0,w,h);
});
const grainTiles = [0,1,2].map(()=> bakeTex(160,160,(g,w,h)=>{
  const id = g.createImageData(w,h);
  for(let i=0;i<id.data.length;i+=4){
    const v=(Math.random()*255)|0;
    id.data[i]=id.data[i+1]=id.data[i+2]=v; id.data[i+3]=12;
  }
  g.putImageData(id,0,0);
}));
const grainPats = grainTiles.map(tx => ctx.createPattern(tx,'repeat'));
function bakeChars(text, px, colors, glowColor){
  const meas = bakeTex(8,8,()=>{}).getContext('2d');
  meas.font = '900 ' + px + 'px sans-serif';
  return [...text].map((ch,i)=>{
    const w = Math.ceil(meas.measureText(ch).width) + 48;
    const h = px + 56;
    const c = bakeTex(w,h,(g)=>{
      g.font = '900 ' + px + 'px sans-serif';
      g.textAlign='center'; g.textBaseline='middle';
      g.shadowColor = glowColor; g.shadowBlur = 24;
      g.fillStyle = colors[i % colors.length];
      g.fillText(ch, w/2, h/2);
      g.shadowBlur = 9;
      g.fillText(ch, w/2, h/2);
    });
    return {c,w,h};
  });
}
const TITLE_CHARS = bakeChars('иІ“е’ӘеӨ§жҲ°зҲӯ', 66, ['#38e1ff','#4f7cff','#9a6bff','#ff6cc7','#ffd24d'], 'rgba(120,200,255,0.95)');
const SUB_CHARS = bakeChars('еҜ¶еҸҜеӨўжҲ°й¬ҘжӣІ', 44, ['#ff6cc7','#ffd24d','#38e1ff','#9a6bff','#4f7cff','#ff8a5c'], 'rgba(255,150,210,0.9)');
function drawTitleChars(chars, cx, cy, t, stagger, dur, sweepAt, s){
  s = s || 1;
  let total=0; chars.forEach(sp => total += (sp.w-32)*s);
  let x = cx - total/2;
  let minX=1e9, maxX=-1e9;
  chars.forEach((sp,i)=>{
    const p = clamp01((t - i*stagger)/dur);
    const w = (sp.w-32)*s;
    if(p>0){
      const e = easeOutBack(p);
      ctx.save();
      ctx.globalAlpha = clamp01(p*1.6);
      ctx.translate(x+w/2, cy+(1-e)*40*s);
      ctx.scale((0.6+0.4*e)*s, (0.6+0.4*e)*s);
      ctx.drawImage(sp.c, -sp.w/2, -sp.h/2);
      ctx.restore();
      minX=Math.min(minX,x); maxX=Math.max(maxX,x+w);
    }
    x += w;
  });
  if(sweepAt!==undefined && t>sweepAt && t<sweepAt+0.9 && maxX>minX){
    const p = (t-sweepAt)/0.9;
    const sx = lerp(minX-100, maxX+100, easeInOut(p));
    ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.85;
    ctx.drawImage(sweepBand, sx-70*s, cy-60*s, 140*s, 120*s);
    ctx.restore();
  }
}
let trans = {t:99, type:'none'};
function triggerTrans(type){ trans = {t:0, type}; }
let camShake = 0, prevT = 0;
function drawCinema(t, dt){
  trans.t += dt;
  if(trans.type==='flash' && trans.t<0.4){
    ctx.save(); ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha = (1-trans.t/0.4)*0.85;
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
    ctx.restore();
  } else if(trans.type==='fade' && trans.t<0.7){
    ctx.save(); ctx.globalAlpha = Math.sin(Math.PI*clamp01(trans.t/0.7))*0.8;
    ctx.fillStyle='#070b14'; ctx.fillRect(0,0,W,H);
    ctx.restore();
  }
  ctx.drawImage(vigTex, 0, 0, W, H);
  ctx.save(); ctx.globalAlpha=0.5;
  ctx.fillStyle = grainPats[(t*14|0)%3];
  ctx.fillRect(0,0,W,H);
  ctx.restore();
  const lbMax = Math.min(H*0.075, 62);
  const lb = lbMax * easeOutCubic(clamp01(t/1.5));
  ctx.fillStyle='#04070f';
  ctx.fillRect(0,0,W,lb);
  ctx.fillRect(0,H-lb,W,lb);
}

// ---------- жҳҹз©әиғҢжҷҜпјҲзғҳз„ҷеә•ең–пјӢеӢ•ж…Ӣй–ғзҲҚжҳҹпјү ----------
const stars = Array.from({length:70},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.6+0.4,tw:Math.random()*Math.PI*2}));
function drawBG(t){
  ctx.drawImage(bgTex, 0, 0, W, H);
  stars.forEach(s=>{
    const a = 0.4+0.5*Math.sin(t*1.5+s.tw);
    ctx.fillStyle = `rgba(220,230,255,${Math.max(0.1,a).toFixed(2)})`;
    ctx.beginPath(); ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2); ctx.fill();
  });
}

// ---------- иІ“е’Әз№ӘиЈҪпјҲз°ЎеҢ–еӨҡйғЁд»¶гҖҒз«Ӣй«”ж„ҹпјү ----------
function drawCat(x,y,scale,phase,palette){
  ctx.save(); ctx.translate(x,y); ctx.scale(scale,scale);
  const bob = Math.sin(phase*4)*3;
  ctx.translate(0,bob);
  // еҪұеӯҗ
  ctx.save(); ctx.globalAlpha=0.28; ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(0,50-bob,22,6,0,0,Math.PI*2); ctx.fill(); ctx.restore();
  // иә«й«”
  const bodyGrad = ctx.createLinearGradient(-20,-10,20,30);
  bodyGrad.addColorStop(0,palette.light); bodyGrad.addColorStop(1,palette.dark);
  ctx.fillStyle=bodyGrad;
  ctx.beginPath(); ctx.ellipse(0,20,20,24,0,0,Math.PI*2); ctx.fill();
  // и…іпјҲе·ҰеҸіж“әеӢ•пјү
  ctx.fillStyle=palette.dark;
  const legSwing = Math.sin(phase*4)*8;
  ctx.beginPath(); ctx.ellipse(-10+legSwing*0.3,42,7,8,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(10-legSwing*0.3,42,7,8,0,0,Math.PI*2); ctx.fill();
  // иҖіжңө
  ctx.fillStyle=palette.dark;
  ctx.beginPath(); ctx.moveTo(-16,-18); ctx.lineTo(-24,-36); ctx.lineTo(-4,-24); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(16,-18); ctx.lineTo(24,-36); ctx.lineTo(4,-24); ctx.closePath(); ctx.fill();
  // й ӯ
  const headGrad = ctx.createRadialGradient(-6,-6,2,0,0,22);
  headGrad.addColorStop(0,palette.light); headGrad.addColorStop(1,palette.body);
  ctx.fillStyle=headGrad;
  ctx.beginPath(); ctx.arc(0,-6,20,0,Math.PI*2); ctx.fill();
  // зңјзқӣ
  ctx.fillStyle='#1a1a22';
  ctx.beginPath(); ctx.arc(-7,-8,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7,-8,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-8,-9,1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6,-9,1,0,Math.PI*2); ctx.fill();
  // йј»еҳҙ
  ctx.fillStyle=palette.accent;
  ctx.beginPath(); ctx.moveTo(-2,-1); ctx.lineTo(2,-1); ctx.lineTo(0,2); ctx.closePath(); ctx.fill();
  // й¬Қй¬ҡ
  ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=1;
  [-1,0,1].forEach(i=>{
    ctx.beginPath(); ctx.moveTo(-5,-2+i*2); ctx.lineTo(-18,-4+i*3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5,-2+i*2); ctx.lineTo(18,-4+i*3); ctx.stroke();
  });
  ctx.restore();
}

// ---------- е°ҚжҲ°ијӘе»“пјҲиЁ“з·ҙе®¶еүӘеҪұпјӢиғҪйҮҸзҗғпјү ----------
function drawTrainerSilhouette(x,y,scale,facingRight,palette,phase){
  ctx.save(); ctx.translate(x,y); ctx.scale(facingRight?scale:-scale, scale);
  ctx.fillStyle = palette;
  // иә«й«”
  ctx.beginPath();
  ctx.moveTo(-10,10); ctx.lineTo(-14,44); ctx.lineTo(-4,44); ctx.lineTo(0,20);
  ctx.lineTo(4,44); ctx.lineTo(14,44); ctx.lineTo(10,10); ctx.closePath(); ctx.fill();
  // жүӢиҮӮпјҲжҸ®еӢ•пјү
  const armAngle = Math.sin(phase*3)*0.5;
  ctx.save(); ctx.translate(10,12); ctx.rotate(armAngle);
  ctx.fillRect(0,-3,18,6);
  ctx.restore();
  // й ӯ
  ctx.beginPath(); ctx.arc(0,-2,10,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function drawEnergyBall(x,y,r,t){
  // v6пјҡзғҳз„ҷе…үжҡҲ bloomпјӢйӣ»е…үж ёеҝғ
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  const rr = r*(0.8+0.2*Math.sin(t*8));
  ctx.globalAlpha = 0.9;
  ctx.drawImage(glowTex, x-rr*2.4, y-rr*2.4, rr*4.8, rr*4.8);
  ctx.globalAlpha = 0.6+0.3*Math.sin(t*11);
  ctx.drawImage(glowCool, x-rr*1.2, y-rr*1.2, rr*2.4, rr*2.4);
  ctx.restore();
}
function drawNote(x,y,scale,alpha){
  ctx.save(); ctx.translate(x,y); ctx.scale(scale,scale); ctx.globalAlpha=alpha;
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(0,10,5,3.6,-0.3,0,Math.PI*2); ctx.fill();
  ctx.fillRect(4,-18,2,28);
  ctx.beginPath(); ctx.moveTo(6,-18); ctx.quadraticCurveTo(16,-14,6,-6); ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ---------- е ҙжҷҜжҷӮй–“и»ё ----------
// 0-3.5   й–Ӣе ҙ LogoпјҲйҖҗеӯ—жЁҷйЎҢпјү
// 3.5-11.5 з¬¬дёҖе№•пјҡиІ“е’ӘеӨ§жҲ°зҲӯд»Ӣзҙ№пјҲйҖІиЎҢжӣІпјү
// 11.5-19.5 з¬¬дәҢе№•пјҡеҜ¶еҸҜеӨўжҲ°й¬ҘжӣІд»Ӣзҙ№пјҲе°ҚжҲ°дё»йЎҢпјү
// 19.5-25 з¬¬дёүе№•пјҡж··жҗӯй«ҳжҪ®
// 25-28   зөҗе°ҫе®ҡж јжЁҷйЎҢеҚЎ
const TOTAL = 28;
const CAT_PALETTES = [
  {body:'#ffffff',dark:'#e08b2e',light:'#fffdf8',accent:'#ff8a5c'},
  {body:'#3a3f55',dark:'#20232f',light:'#5c6280',accent:'#38e1ff'},
  {body:'#ff9fc7',dark:'#c65f95',light:'#ffd6ea',accent:'#ff4fa0'},
];

const captions = [
  {t:0.3, d:3.0, text:'д»ҠеӨ©иҰҒд»Ӣзҙ№е…©ж¬ҫи¶…з¶“е…ёзҡ„дҪңе“ҒпјҒ'},
  {t:3.6, d:4.0, text:'иІ“е’ӘеӨ§жҲ°зҲӯпјҡеҸҜж„ӣиІ“е’ӘйғЁйҡҠеҗ‘еүҚжҺЁйҖІзҡ„еЎ”йҳІйҒҠжҲІ'},
  {t:8.0, d:3.2, text:'дёҖзӣҙеҫҖеҸіиө°пјҢж’һдёҠж•өдәәе°ұй–Ӣжү“пјҢжҲ°иЎ“и¶…з°Ўе–®'},
  {t:11.6, d:4.0, text:'еҜ¶еҸҜеӨўжҲ°й¬ҘжӣІпјҡиЁ“з·ҙе®¶е°ҚжҲ°жҷӮжңҖзҶұиЎҖзҡ„иғҢжҷҜйҹіжЁӮ'},
  {t:16.0, d:3.2, text:'зҜҖеҘҸдёҖдёӢеҠ еҝ«пјҢз·Ҡејөж„ҹзһ¬й–“жӢүж»ҝпјҒ'},
  {t:19.5, d:4.0, text:'еҰӮжһңиІ“е’ӘйғЁйҡҠй…ҚдёҠжҲ°й¬ҘжӣІпјҢжңғжңүеӨҡзҶұиЎҖпјҹ'},
  {t:24.0, d:3.5, text:'вҳ… е…©зЁ®з¶“е…ёпјҢдёҖжЁЈи®“дәәзҶұиЎҖжІёйЁ° вҳ…'},
];
let captionEl = document.getElementById('caption');
let curCaptionIdx = -1;
function updateCaption(tt){
  let idx=-1;
  for(let i=0;i<captions.length;i++){
    if(tt>=captions[i].t && tt<captions[i].t+captions[i].d){ idx=i; break; }
  }
  if(idx!==curCaptionIdx){
    curCaptionIdx = idx;
    if(idx>=0){
      captionEl.textContent = captions[idx].text;
      captionEl.classList.add('show');
    } else {
      captionEl.classList.remove('show');
    }
  }
}

let startTime=null, ended=false, rafOn=false;
let scheduled = {battleIn:false, mixRiser:false, battleRiser:false, victory:false, endIn:false};

function drawScene1(tt){ // иІ“е’ӘеӨ§жҲ°зҲӯпјҡдёүйҡ»иІ“йҪҠжӯҘеҗ‘еҸіеүҚйҖІ
  const groundY = H*0.72;
  ctx.fillStyle='rgba(255,255,255,.06)';
  ctx.fillRect(0,groundY+40,W,4);
  CAT_PALETTES.forEach((pal,i)=>{
    const laneY = groundY - i*2;
    const speed = 60+i*8;
    const x = ((tt*speed + i*160) % (W+120)) - 60;
    drawCat(x, laneY, 1.1-i*0.08, tt+i, pal);
  });
}

function drawScene2(tt){ // еҜ¶еҸҜеӨўжҲ°й¬ҘжӣІпјҡе…©иЁ“з·ҙе®¶е°ҚеіҷпјӢиғҪйҮҸзҗғпјӢйҹіз¬Ұ
  const cx = W/2, cy = H*0.58;
  drawTrainerSilhouette(cx-W*0.22, cy, 1.3, true, '#38e1ff', tt);
  drawTrainerSilhouette(cx+W*0.22, cy, 1.3, false, '#ff6cc7', tt);
  drawEnergyBall(cx, cy-30, 22+ (tt%1)*10, tt);
  for(let i=0;i<5;i++){
    const nt = (tt*1.3+i*0.6)%3;
    const ny = cy - 60 - nt*70;
    const nx = cx + Math.sin(tt*2+i)*80;
    const alpha = Math.max(0, 1-nt/3);
    drawNote(nx, ny, 0.9, alpha);
  }
}

function drawScene3(tt){ // ж··жҗӯпјҡиІ“е’ӘйғЁйҡҠиЎқеҗ‘е°ҚжҲ°иҲһеҸ°
  drawScene2(tt);
  const groundY = H*0.9;
  CAT_PALETTES.forEach((pal,i)=>{
    const speed = 140+i*20;
    const x = ((tt*speed + i*200) % (W+120)) - 60;
    drawCat(x, groundY, 0.85, tt+i, pal);
  });
}

function drawIntroCard(t){
  const s = Math.min(W,H)/560;
  ctx.save();
  ctx.textAlign='center';
  const preA = clamp01((t-0.15)/0.5) * (t<2.7 ? 1 : clamp01((3.3-t)/0.5));
  ctx.globalAlpha = preA;
  ctx.fillStyle='rgba(232,240,255,0.8)';
  ctx.font = Math.round(16*s)+'px sans-serif';
  ctx.fillText('AIжңӘдҫҶеүөдҪңзҮҹйҡҠгҖҖе‘ҲзҚ»', W/2, H*0.26);
  ctx.restore();
  drawTitleChars(TITLE_CHARS, W/2, H*0.44, t-0.5, 0.12, 0.42, 1.6, s);
  drawTitleChars(SUB_CHARS, W/2, H*0.44 + 84*s, t-1.1, 0.08, 0.38, undefined, s);
}
function drawEndCard(tt){
  const t = tt - 25;
  if(t < 0) return;
  const a = clamp01(t/0.6);
  const s = Math.min(W,H)/560;
  ctx.save();
  ctx.globalAlpha = a*0.66;
  ctx.fillStyle='#070b14';
  ctx.fillRect(0,0,W,H);
  ctx.restore();
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  ctx.globalAlpha = a*0.45;
  ctx.drawImage(glowCool, W/2-260*s, H*0.40-150*s, 520*s, 300*s);
  ctx.restore();
  drawTitleChars(TITLE_CHARS, W/2, H*0.38, t-0.1, 0.08, 0.38, 1.1, s);
  drawTitleChars(SUB_CHARS, W/2, H*0.38 + 80*s, t-0.5, 0.06, 0.35, undefined, s);
  const subA = clamp01((t-1.1)/0.5);
  if(subA>0){
    ctx.save();
    ctx.globalAlpha = subA;
    ctx.textAlign='center';
    ctx.fillStyle='#ffd24d';
    ctx.font = '700 ' + Math.round(22*s) + 'px sans-serif';
    ctx.fillText('ж„ҹи¬қи§ҖзңӢпјҒ', W/2, H*0.38 + 138*s);
    ctx.fillStyle='rgba(232,240,255,0.7)';
    ctx.font = Math.round(14*s) + 'px sans-serif';
    ctx.fillText('AIжңӘдҫҶеүөдҪңзҮҹйҡҠ еҮәе“Ғ', W/2, H*0.38 + 166*s);
    ctx.restore();
  }
}

function render(ts){
  if(startTime===null) startTime=ts;
  const t = (ts-startTime)/1000;
  const dt = Math.max(0, Math.min(0.1, t - prevT)); prevT = t;

  updateMusic(Math.min(t, TOTAL));

  // v6 е№•й–“дәӢд»¶пјҡиҪүе ҙй–ғзҷҪпјҸriserпјҸbraamпјҸеӢқеҲ©пјҸзүҮе°ҫе®ҡж јйҮҚйҹі
  if(!scheduled.battleRiser && t>=10.4){ scheduled.battleRiser=true; riser(1.1); }
  if(!scheduled.battleIn && t>=11.5){ scheduled.battleIn=true; braam(0.5); triggerTrans('flash'); camShake=12; }
  if(!scheduled.mixRiser && t>=18.5){ scheduled.mixRiser=true; riser(1.0); }
  if(!scheduled.victory && t>=19.5){ scheduled.victory=true; braam(0.4); triggerTrans('flash'); camShake=9; }
  if(!scheduled.endIn && t>=25){ scheduled.endIn=true; stinger(); triggerTrans('flash'); camShake=8; playVictoryJingle(); }

  // v6 йӣ»еҪұйҒӢйҸЎ
  let zoom = 1.03, ox = 0, oy = 0;
  if(t<3.5){ zoom = lerp(1.10, 1.03, easeOutCubic(clamp01(t/2.6))); }
  else if(t<11.5){ const p=(t-3.5)/8; zoom = 1.03+0.05*p; ox = -W*0.02 + W*0.04*p; }
  else if(t<19.5){ const p=easeInOut(clamp01((t-11.5)/8)); zoom = 1.06+0.08*p; oy = H*0.02*p; }
  else if(t<25){ const p=clamp01((t-19.5)/1.2); zoom = lerp(1.16, 1.04, easeOutCubic(p)); }
  else { zoom = 1.03; }
  if(camShake>0.05){
    zoom += camShake*0.002;
    ox += (Math.random()-0.5)*camShake;
    oy += (Math.random()-0.5)*camShake*0.7;
    camShake *= 0.85;
  }
  const mx = W/2*(1-1/zoom)-0.5, my = H/2*(1-1/zoom)-0.5;
  ox = Math.max(-mx, Math.min(mx, ox));
  oy = Math.max(-my, Math.min(my, oy));
  ctx.save();
  ctx.translate(W/2, H/2); ctx.scale(zoom, zoom); ctx.translate(-W/2-ox, -H/2-oy);

  drawBG(t);

  if(t<3.5){
    // й–Ӣе ҙ LogoпјҲе ҙжҷҜеҫҢйқўз№јзәҢз”ұ drawIntroCard з–ҠеҠ пјү
  } else if(t<11.5){
    drawScene1(t);
  } else if(t<19.5){
    drawScene2(t);
  } else {
    drawScene3(t);
  }

  ctx.restore();

  if(t<3.5) drawIntroCard(t);
  drawEndCard(Math.min(t, TOTAL));
  drawCinema(Math.min(t, TOTAL), dt);

  updateCaption(t);

  if(t < TOTAL){
    requestAnimationFrame(render);
  } else if(!ended){
    ended = true;
    rafOn = false;
    captionEl.classList.remove('show');
    // зөҗе°ҫе®ҡж јж–јжЁҷйЎҢеҚЎпјҢйЎҜзӨәйҮҚж’ӯйҲ•
    const ov = document.getElementById('startOverlay');
    ov.querySelector('.big').textContent = '';
    ov.style.background = 'rgba(4,7,14,0)';
    ov.classList.add('show');
  }
}

function startPlayback(){
  if(rafOn) return;
  rafOn = true;
  startTime = null; ended = false; prevT = 0; camShake = 0;
  musicBeat = -1; curCaptionIdx = -1;
  trans = {t:99, type:'none'};
  scheduled = {battleIn:false, mixRiser:false, battleRiser:false, victory:false, endIn:false};
  document.getElementById('startOverlay').classList.remove('show');
  requestAnimationFrame(render);
}

document.getElementById('playBtn').addEventListener('click', (e)=>{
  e.stopPropagation();
  initAudio();
  if(actx.state==='suspended') actx.resume();
