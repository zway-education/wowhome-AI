<!DOCTYPE html>
<!-- 專業AI升級 v6 -->
<!-- v6：電影運鏡（推鏡/zoom-punch/閃白）＋letterbox、鼓組+貝斯配樂與braam/riser/結尾定音、結尾標題卡逐字浮現（自動開聲機制原樣保留） -->
<!-- v7：畫面擬真重工——直接移植兩款遊戲的原始繪製函式：
     凋零王側（PAL 色票/box3d 體素/skyCv/groundCv/drawSteve/drawWither/愛心 HUD/Boss 血條）、
     寶可夢側（鋼鐵道館烘焙天空/drawLucario/drawMeltan/drawHpBar/戰鬥訊息框/招式按鈕），畫面與遊戲實機一致 -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="author" content="AI未來創作營隊">
<title>史蒂夫大戰凋零王 x 寶可夢對戰</title>
<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #05070f;
    font-family: "Trebuchet MS","PingFang TC","Microsoft JhengHei",sans-serif;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  canvas { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
  #soundBtn {
    position: fixed; top: max(12px, env(safe-area-inset-top)); right: max(12px, env(safe-area-inset-right)); z-index: 20;
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(11,23,48,0.72); border: 1px solid rgba(127,219,255,0.65);
    color: #f3ecd9; font-size: 20px; cursor: pointer;
    box-shadow: 0 0 14px rgba(127,219,255,0.25);
  }
  #soundBtn:active { transform: scale(.92); }
  #soundHint {
    position: fixed; top: 24px; right: 68px; z-index: 20;
    color: #f3ecd9; font-size: 14px; text-shadow: 0 0 4px #000;
    animation: hintFade 4s ease forwards;
    pointer-events: none;
  }
  @keyframes hintFade { 0%{opacity:0} 15%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
  #replayBtn {
    position: fixed; left: 50%; bottom: 14%; transform: translateX(-50%);
    z-index: 20; display: none;
    padding: 14px 42px; font-size: 20px; min-height: 48px;
    background: linear-gradient(92deg,#7fdbff,#4f9be0,#9a6bff);
    color: #0b1730; border: none; border-radius: 999px; cursor: pointer;
    font-family: inherit; font-weight: 800; letter-spacing: .18em;
    box-shadow: 0 0 26px rgba(127,219,255,0.55);
  }
  #replayBtn:active { transform: translateX(-50%) scale(.94); }

<body>
<button id="soundBtn">🔊</button>
<div id="soundHint">聲音已開啟</div>
<button id="replayBtn">重新播放</button>
<canvas id="stage"></canvas>

<script>
'use strict';
const GAME_W = 960, GAME_H = 540;
const W = 960, H = 540;
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const soundBtn = document.getElementById('soundBtn');
const soundHint = document.getElementById('soundHint');
const replayBtn = document.getElementById('replayBtn');

function resize() {
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', resize); resize();

/* ============================================================
   音訊引擎 — 預告片配樂（全程序化合成、零外部資源）
============================================================ */
let AC = null, master = null, verb = null, verbSend = null, soundOn = true;
function makeImpulse(dur, decay) {
  const sr = AC.sampleRate, n = Math.floor(sr * dur);
  const buf = AC.createBuffer(2, n, sr);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, decay);
  }
  return buf;
}
function initAudio() {
  if (AC) return;
  try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; }
  const comp = AC.createDynamicsCompressor();
  comp.threshold.value = -16; comp.knee.value = 24; comp.ratio.value = 6;
  comp.attack.value = 0.004; comp.release.value = 0.24;
  comp.connect(AC.destination);
  master = AC.createGain(); master.gain.value = 0.9; master.connect(comp);
  verb = AC.createConvolver(); verb.buffer = makeImpulse(1.9, 2.6);
  verbSend = AC.createGain(); verbSend.gain.value = 0.9;
  verbSend.connect(verb); verb.connect(master);
}
function out(node, wet) {
  node.connect(master);
  if (wet > 0) { const g = AC.createGain(); g.gain.value = wet; node.connect(g); g.connect(verbSend); }
}
const rndF = (a, b) => a + Math.random() * (b - a);
function sfxBoom(vol) {
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain();
  o.frequency.setValueAtTime(120, t);
  o.frequency.exponentialRampToValueAtTime(36, t + 0.45);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
  o.connect(g); out(g, 0.25); o.start(t); o.stop(t + 0.65);
  const n = AC.createBufferSource(); n.buffer = makeImpulse(0.12, 3);
  const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 220;
  const ng = AC.createGain(); ng.gain.setValueAtTime(vol * 0.6, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  n.connect(f); f.connect(ng); out(ng, 0.2); n.start(t);
}
function sfxBraam(vol, dur) {
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const f0 = 57.5;
  const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.Q.value = 3;
  lp.frequency.setValueAtTime(180, t);
  lp.frequency.linearRampToValueAtTime(1100, t + dur * 0.35);
  lp.frequency.linearRampToValueAtTime(240, t + dur);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.09);
  g.gain.setValueAtTime(vol, t + dur * 0.55);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  lp.connect(g); out(g, 0.45);
  [1, 1.006, 0.994, 2.003].forEach((m) => {
    const o = AC.createOscillator(); o.type = 'sawtooth';
    o.frequency.value = f0 * m;
    o.connect(lp); o.start(t); o.stop(t + dur + 0.05);
  });
  const sub = AC.createOscillator(); sub.frequency.value = f0 / 2;
  const sg = AC.createGain(); sg.gain.setValueAtTime(vol * 0.8, t);
  sg.gain.exponentialRampToValueAtTime(0.001, t + dur);
  sub.connect(sg); out(sg, 0.1); sub.start(t); sub.stop(t + dur + 0.05);
}
function sfxRiser(dur) {
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const n = AC.createBufferSource();
  const sr = AC.sampleRate, len = Math.floor(sr * dur);
  const buf = AC.createBuffer(1, len, sr);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  n.buffer = buf;
  const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.4;
  bp.frequency.setValueAtTime(260, t);
  bp.frequency.exponentialRampToValueAtTime(4200, t + dur);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.3, t + dur);
  g.gain.linearRampToValueAtTime(0.0001, t + dur + 0.06);
  n.connect(bp); bp.connect(g); out(g, 0.35); n.start(t);
  const o = AC.createOscillator(); o.type = 'sawtooth';
  o.frequency.setValueAtTime(110, t);
  o.frequency.exponentialRampToValueAtTime(440, t + dur);
  const og = AC.createGain(); og.gain.setValueAtTime(0.0001, t);
  og.gain.exponentialRampToValueAtTime(0.12, t + dur);
  og.gain.linearRampToValueAtTime(0.0001, t + dur + 0.06);
  o.connect(og); out(og, 0.3); o.start(t); o.stop(t + dur + 0.1);
}
function sfxTick(vol) {
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const n = AC.createBufferSource(); n.buffer = makeImpulse(0.035, 2.2);
  const hp = AC.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 6400;
  const g = AC.createGain(); g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.035);
  n.connect(hp); hp.connect(g); out(g, 0.1); n.start(t);
}
function sfxClap(vol) {
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const n = AC.createBufferSource(); n.buffer = makeImpulse(0.09, 1.6);
  const f = AC.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 1500; f.Q.value = 0.9;
  const g = AC.createGain(); g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  n.connect(f); f.connect(g); out(g, 0.3); n.start(t);
}
function sfxSlash() { // 揮劍
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const n = AC.createBufferSource(); n.buffer = makeImpulse(0.18, 1.8);
  const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.2;
  bp.frequency.setValueAtTime(2600, t);
  bp.frequency.exponentialRampToValueAtTime(700, t + 0.16);
  const g = AC.createGain(); g.gain.setValueAtTime(0.35, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
  n.connect(bp); bp.connect(g); out(g, 0.25); n.start(t);
}
function pluck(freq, dur, vol, type, wet) {
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const o = AC.createOscillator(); o.type = type || 'square';
  o.frequency.value = freq * rndF(0.997, 1.003);
  const lp = AC.createBiquadFilter(); lp.type = 'lowpass';
  lp.frequency.setValueAtTime(freq * 6, t);
  lp.frequency.exponentialRampToValueAtTime(freq * 1.5, t + dur);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(lp); lp.connect(g); out(g, wet == null ? 0.2 : wet);
  o.start(t); o.stop(t + dur + 0.03);
}
function sfxChime() {
  if (!AC || !soundOn) return;
  [988, 1244.5, 1568, 1975.5].forEach((fq, i) =>
    setTimeout(() => pluck(fq, 0.35, 0.13, 'triangle', 0.55), i * 70));
}
function sfxWhoosh() {
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const n = AC.createBufferSource(); n.buffer = makeImpulse(0.3, 1.5);
  const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.1;
  bp.frequency.setValueAtTime(3000, t);
  bp.frequency.exponentialRampToValueAtTime(500, t + 0.28);
  const g = AC.createGain(); g.gain.setValueAtTime(0.26, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
  n.connect(bp); bp.connect(g); out(g, 0.3); n.start(t);
}
function sfxZap() { // 波導彈發射
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const o = AC.createOscillator(); o.type = 'sawtooth';
  o.frequency.setValueAtTime(880, t);
  o.frequency.exponentialRampToValueAtTime(160, t + 0.3);
  const g = AC.createGain(); g.gain.setValueAtTime(0.22, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.32);
  o.connect(g); out(g, 0.35); o.start(t); o.stop(t + 0.35);
}
function sfxSting() {
  sfxBoom(0.9); sfxBraam(0.5, 2.2);
  setTimeout(() => sfxChime(), 180);
}

initAudio();
function tryResume() { if (AC && AC.state === 'suspended') { const p = AC.resume(); if (p && p.catch) p.catch(() => {}); } }
tryResume();
setTimeout(() => {
  if (AC && AC.state === 'suspended') soundHint.textContent = '點任意處開啟聲音';
}, 300);
addEventListener('pointerdown', tryResume);
addEventListener('keydown', tryResume);
soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? '🔊' : '🔇';
  if (soundOn) { initAudio(); tryResume(); }
});

/* ---------- 緩動 ---------- */
const easeOut = t => 1 - Math.pow(1 - t, 3);
const easeInOut = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
const easeOutBack = t => { const c = 1.70158; return 1 + (c + 1) * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2); };
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const clamp01 = v => clamp(v, 0, 1);
const lerp = (a, b, t) => a + (b - a) * t;
function roundRect(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

/* ============================================================
   凋零王側素材（全部移植自遊戲「史蒂夫大戰凋零王」）
============================================================ */
const PAL = {
  skyTop: '#5c94fc', skyBot: '#b8e0ff', grass: '#6ab84f', grassDark: '#4a7a35',
  dirt: '#8a5a3c', dirtDark: '#6b4226', ink: '#fcfcfc', dim: '#c8d8ea',
  steveSkin: '#d99a6c', steveSkinD: '#a86e44', steveShirt: '#33aaaa', steveShirtD: '#1f7a7a',
  stevePants: '#4455aa', stevePantsD: '#2c3770', hair: '#4a2c14',
  diamond: '#7fdbff', diamondD: '#2299cc',
  wither: '#2b2b33', witherD: '#141418', witherL: '#44444f',
  eye: '#66ff66', eyeRage: '#bb66ff',
  gold: '#ffcd75', bad: '#ff5555', heart: '#ff3030'
};
function shade(hex, f) {
  const n = parseInt(hex.slice(1), 16);
  const r = clamp(Math.round(((n >> 16) & 255) * f), 0, 255);
  const g = clamp(Math.round(((n >> 8) & 255) * f), 0, 255);
  const b = clamp(Math.round((n & 255) * f), 0, 255);
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}
const shadeCache = new Map();
function shadeC(hex, f) {
  const key = hex + f;
  let v = shadeCache.get(key);
  if (!v) { v = shade(hex, f); shadeCache.set(key, v); }
  return v;
}
function box3d(x, y, w, h, d, col, noAO) {
  ctx.fillStyle = shadeC(col, 1.28);
  ctx.beginPath();
  ctx.moveTo(x, y); ctx.lineTo(x + d, y - d); ctx.lineTo(x + w + d, y - d); ctx.lineTo(x + w, y);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1.2; ctx.stroke();
  ctx.fillStyle = shadeC(col, 0.62);
  ctx.beginPath();
  ctx.moveTo(x + w, y); ctx.lineTo(x + w + d, y - d); ctx.lineTo(x + w + d, y + h - d); ctx.lineTo(x + w, y + h);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle = col;
  ctx.fillRect(x, y, w, h);
  if (!noAO) {
    ctx.fillStyle = 'rgba(0,0,0,0.16)';
    ctx.fillRect(x, y + h * 0.72, w, h * 0.28);
  }
  ctx.strokeRect(x, y, w, h);
}
function makeSpot(r, g2, b) {
  const cv = document.createElement('canvas'); cv.width = cv.height = 48;
  const c = cv.getContext('2d');
  const gr = c.createRadialGradient(24, 24, 0, 24, 24, 24);
  gr.addColorStop(0, 'rgba(' + r + ',' + g2 + ',' + b + ',.9)');
  gr.addColorStop(0.5, 'rgba(' + r + ',' + g2 + ',' + b + ',.32)');
  gr.addColorStop(1, 'rgba(' + r + ',' + g2 + ',' + b + ',0)');
  c.fillStyle = gr; c.fillRect(0, 0, 48, 48);
  return cv;
}
const spotGreen = makeSpot(102, 255, 102), spotPurple = makeSpot(187, 102, 255), spotBlue = makeSpot(79, 155, 224);
const GROUND_Y = 470;
/* 天空＋太陽（遊戲同款烘焙） */
const skyCv = document.createElement('canvas');
skyCv.width = GAME_W; skyCv.height = GROUND_Y;
(function () {
  const c = skyCv.getContext('2d');
  const sky = c.createLinearGradient(0, 0, 0, GROUND_Y);
  sky.addColorStop(0, PAL.skyTop); sky.addColorStop(1, PAL.skyBot);
  c.fillStyle = sky;
  c.fillRect(0, 0, GAME_W, GROUND_Y);
  const sg = c.createRadialGradient(120, 80, 10, 120, 80, 90);
  sg.addColorStop(0, 'rgba(255,250,200,0.7)'); sg.addColorStop(1, 'rgba(255,250,200,0)');
  c.fillStyle = sg;
  c.fillRect(30, 0, 180, 170);
  c.fillStyle = '#fff8c8';
  c.fillRect(96, 56, 48, 48);
  c.strokeStyle = 'rgba(220,190,90,0.8)'; c.lineWidth = 3;
  c.strokeRect(96, 56, 48, 48);
  for (const [ang, len, wdt, al] of [[0.5, 560, 46, 0.07], [0.66, 500, 30, 0.055], [0.38, 460, 24, 0.05]]) {
    c.save();
    c.translate(120, 80); c.rotate(ang);
    const bg2 = c.createLinearGradient(0, 0, len, 0);
    bg2.addColorStop(0, 'rgba(255,250,210,' + al + ')'); bg2.addColorStop(1, 'rgba(255,250,210,0)');
    c.fillStyle = bg2;
    c.beginPath(); c.moveTo(30, -wdt * 0.3); c.lineTo(len, -wdt); c.lineTo(len, wdt); c.lineTo(30, wdt * 0.3);
    c.closePath(); c.fill();
    c.restore();
  }
  const hz = c.createLinearGradient(0, GROUND_Y - 130, 0, GROUND_Y);
  hz.addColorStop(0, 'rgba(255,255,240,0)'); hz.addColorStop(1, 'rgba(255,246,214,.35)');
  c.fillStyle = hz; c.fillRect(0, GROUND_Y - 130, GAME_W, 130);
})();
const groundCv = document.createElement('canvas');
groundCv.width = GAME_W; groundCv.height = GAME_H - GROUND_Y;
(function () {
  const c = groundCv.getContext('2d');
  c.fillStyle = PAL.grass;
  c.fillRect(0, 0, GAME_W, 18);
  c.fillStyle = PAL.dirt;
  c.fillRect(0, 18, GAME_W, GAME_H - GROUND_Y - 18);
  c.strokeStyle = 'rgba(0,0,0,0.18)'; c.lineWidth = 1.5;
  for (let x = 0; x < GAME_W; x += 40) {
    c.strokeRect(x, 0, 40, 18);
    c.strokeRect(x + (x / 40 % 2 ? 20 : 0), 18, 40, 34);
  }
  c.fillStyle = 'rgba(0,0,0,0.15)';
  for (let i = 0; i < 30; i++) {
    const dx = (i * 97) % GAME_W, dy = 24 + ((i * 53) % 40);
    c.fillRect(dx, dy, 5, 5);
  }
})();
const clouds = [];
for (let i = 0; i < 6; i++) clouds.push({ x: (i * 197 + 60) % GAME_W, y: 40 + (i * 37) % 110, s: 0.6 + (i % 3) * 0.3, v: 8 + (i % 4) * 4 });
function drawMcBG(t) {
  ctx.drawImage(skyCv, 0, 0);
  // 遠山（方塊剪影）
  ctx.fillStyle = 'rgba(90,130,180,0.5)';
  const off1 = (t * 3) % 160;
  for (let i = -1; i < 8; i++) {
    const bx = i * 160 - off1;
    ctx.fillRect(bx, 330, 80, 140);
    ctx.fillRect(bx + 20, 290, 60, 40);
    ctx.fillRect(bx + 40, 260, 40, 30);
  }
  // 中景樹林
  const off2 = (t * 7) % 220;
  for (let i = -1; i < 6; i++) {
    const tx = i * 220 - off2 + 60;
    ctx.fillStyle = 'rgba(90,60,35,0.75)';
    ctx.fillRect(tx + 18, 400, 14, 70);
    ctx.fillStyle = 'rgba(60,130,60,0.8)';
    ctx.fillRect(tx, 356, 50, 48);
    ctx.fillStyle = 'rgba(80,160,80,0.8)';
    ctx.fillRect(tx + 8, 348, 34, 14);
  }
  // 像素雲
  for (const c of clouds) {
    const cx0 = ((c.x - t * c.v) % (GAME_W + 240) + GAME_W + 240) % (GAME_W + 240) - 120;
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(cx0, c.y, 70 * c.s, 16 * c.s);
    ctx.fillRect(cx0 + 14 * c.s, c.y - 10 * c.s, 40 * c.s, 12 * c.s);
    ctx.fillStyle = 'rgba(200,220,240,0.9)';
    ctx.fillRect(cx0, c.y + 12 * c.s, 70 * c.s, 5 * c.s);
  }
  ctx.globalAlpha = 1;
  ctx.drawImage(groundCv, 0, GROUND_Y);
  ctx.fillStyle = '#4a9e35';
  for (let i = 0; i < 12; i++) {
    const gx = (i * 173 + 40) % GAME_W;
    const sway2 = Math.sin(t * 2 + i) * 2;
    ctx.fillRect(gx + sway2, GROUND_Y - 8, 3, 8);
    ctx.fillRect(gx + 5 + sway2, GROUND_Y - 12, 3, 12);
    ctx.fillRect(gx + 10 + sway2, GROUND_Y - 6, 3, 6);
  }
}

/* ---------- 粒子 ---------- */
let particles = [];
function spawnP(o) { if (particles.length < 260) particles.push(o); }
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += (p.g || 0) * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const p of particles) {
    const a = clamp01(p.life / p.maxLife);
    ctx.globalAlpha = a * p.a;
    ctx.fillStyle = p.col;
    ctx.fillRect(p.x - p.r / 2, p.y - p.r / 2, p.r, p.r);
  }
  ctx.restore();
}
function burst(x, y, col, n, sp0) {
  for (let i = 0; i < n; i++) {
    const a = rndF(0, Math.PI * 2), sp = rndF(60, sp0 || 260);
    spawnP({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, g: 220, r: rndF(2, 6), a: 0.9, col, life: rndF(0.3, 0.8), maxLife: 0.8 });
  }
}

/* ---------- 攝影機 / 後製 ---------- */
const cam = { x: 0, y: 0, z: 1, shake: 0, punch: 0 };
function addShake(a) { cam.shake = Math.max(cam.shake, a); }
function applyCam() {
  const sx = (Math.random() * 2 - 1) * cam.shake;
  const sy = (Math.random() * 2 - 1) * cam.shake;
  ctx.translate(GAME_W / 2, GAME_H / 2);
  ctx.scale(cam.z + cam.punch, cam.z + cam.punch);
  ctx.translate(-GAME_W / 2 - cam.x + sx, -GAME_H / 2 - cam.y + sy);
}

/* ---------- 字卡 ---------- */
function drawRevealText(text2, cx, cy, size, t0, t, opts) {
  opts = opts || {};
  const per = opts.per || 0.085, dur = 0.42;
  if (t < t0) return;
  ctx.save();
  ctx.font = `900 ${size}px "Arial Black","PingFang TC","Microsoft JhengHei",sans-serif`;
  const chars = [...text2];
  const widths = chars.map(c => ctx.measureText(c).width);
  const totalW = widths.reduce((a, b) => a + b, 0);
  let x = cx - totalW / 2;
  const grad = ctx.createLinearGradient(cx - totalW / 2, cy - size, cx + totalW / 2, cy);
  grad.addColorStop(0, opts.c0 || '#eaffff');
  grad.addColorStop(0.55, opts.c1 || '#7fdbff');
  grad.addColorStop(1, opts.c2 || '#4f9be0');
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  for (let i = 0; i < chars.length; i++) {
    const p = clamp01((t - t0 - i * per) / dur);
    if (p > 0) {
      const e = easeOutBack(p);
      ctx.save();
      ctx.globalAlpha = clamp01(p * 1.4);
      ctx.translate(x + widths[i] / 2, cy + (1 - e) * size * 0.65);
      ctx.scale(0.6 + e * 0.4, 0.6 + e * 0.4);
      ctx.shadowColor = 'rgba(127,219,255,0.55)'; ctx.shadowBlur = 16;
      ctx.fillStyle = grad;
      ctx.fillText(chars[i], -widths[i] / 2, 0);
      ctx.restore();
    }
    x += widths[i];
  }
  ctx.restore();
}

/* ---------- 時間軸（30 秒、四幕）＋音樂 ---------- */
const DURATION = 30;

let startTime = null, playing = false, lastT = 0;
let firedCues = {};
function cue(id, fn) { if (!firedCues[id]) { firedCues[id] = true; fn(); } }

const BEAT = 60 / 136 / 2;
let lastBeat = -1;
const SCALE = [392.0, 440.0, 493.9, 587.3, 659.3, 784.0, 880.0, 987.8];
const MELODY = [0, 2, 4, 7, 4, 2, 1, 3, 5, 7, 5, 3, 0, 2, 4, 6, 4, 2, 2, 4, 6, 7, 6, 4];
const BASSP = [0, 0, 3, 3, 4, 4, 2, 2];
function grooveBeat(bi, t) {
  const act = t < 6 ? 0 : t < 14 ? 1 : t < 22 ? 2 : 3;
  if (act === 0) {
    if (bi % 8 === 0) sfxBoom(0.5);
    if (bi % 4 === 2) sfxTick(0.1);
    return;
  }
  if (act === 3) {
    if (t < 25 && bi % 8 === 0) sfxBoom(0.55);
    if (t < 25 && bi % 4 === 2) sfxTick(0.12);
    return;
  }
  const fast = act === 2;
  if (bi % 4 === 0) sfxBoom(fast ? 0.5 : 0.44);
  if (bi % 8 === 4) sfxClap(0.3);
  if (bi % 2 === 1) sfxTick(fast ? 0.14 : 0.09);
  const mi = MELODY[bi % MELODY.length];
  const shift = fast ? 9 / 8 : 1;
  pluck(SCALE[mi] * shift, BEAT * 1.7, 0.12, 'square', 0.18);
  if (bi % 2 === 0) {
    const b = BASSP[(bi >> 1) % 8];
    pluck(SCALE[b] * shift / 2, BEAT * 1.6, 0.16, 'sawtooth', 0.06);
  }
}

/* ---------- 傷害浮字 ---------- */
let floats = [];
function floater(x, y, txt, col, size) { floats.push({ x, y, txt, col, size: size || 24, t: 0 }); }
function drawFloats(dt) {
  for (let i = floats.length - 1; i >= 0; i--) {
    const f = floats[i];
    f.t += dt;
    if (f.t > 1.0) { floats.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = clamp01(1 - f.t);
    ctx.font = 'bold ' + f.size + 'px sans-serif';

    drawTextOutline(f.txt, f.x, f.y - f.t * 46, f.col, 'rgba(0,0,0,0.6)', 4);
    ctx.restore();
  }
}

function draw(t, dt) {
  ctx.clearRect(0, 0, GAME_W, GAME_H);
  cam.shake = Math.max(0, cam.shake - dt * 26);
  cam.punch = Math.max(0, cam.punch - dt * 0.3);

  if (t < 6) { const p = t / 6; cam.z = 1.08 - easeOut(p) * 0.06; cam.x = 0; cam.y = 6; }
  else if (t < 14) { cam.z = 1.05; cam.x = Math.sin(t * 0.4) * 6; cam.y = 6; }
  else if (t < 22) { cam.z = 1.04; cam.x = -10 + easeInOut(clamp01((t - 14) / 8)) * 20; cam.y = 0; }
  else { const p = (t - 22) / 8; cam.z = 1.0 + easeInOut(p) * 0.05; cam.x = 0; cam.y = 0; }

  ctx.save();
  applyCam();
  if (t < 6) drawAct1(t);
  else if (t < 14) drawAct2(t);
  else if (t < 22) drawAct3(t);
  else drawAct4(t);
  drawFloats(dt);
  ctx.restore();

  /* ---------- 字卡層 ---------- */
  if (t < 6) {
    drawRevealText('史蒂夫大戰凋零王', GAME_W / 2, GAME_H * 0.3, 50, 0.5, t);
    drawRevealText('× 寶可夢對戰', GAME_W / 2, GAME_H * 0.42, 40, 1.4, t, { c0: '#fff', c1: '#ffd166', c2: '#e34c4c' });
    if (t > 2.8) smallLine('AI未來創作營隊 出品 · 兩款對戰一次收錄', clamp01((t - 2.8) / 0.8), GAME_H * 0.5);
    if (t > 3.8) subtitle('方塊世界的 Boss 戰 × 道館回合制對決！', clamp01((t - 3.8) / 0.6));
  } else if (t < 14) {
    // 遊戲同款 HUD（畫在鏡頭外層，避免 letterbox 裁切）
    const hudA = clamp01((t - 6.3) / 0.5);
    ctx.save(); ctx.globalAlpha = hudA;
    drawHearts(20);
    drawBossBar(t < 10.3 ? 300 : t < 12.9 ? 288 : 276, 300, t > 13.2);
    ctx.restore();
    if (t < 10.5) subtitle('←→ 靠近凋零王，按 J 揮劍！', clamp01((t - 6.5) / 0.6) * clamp01((10.5 - t) / 0.4));
    else subtitle('頭骨彈快撞到時按 K＝完美反彈！', clamp01((t - 10.8) / 0.6));
  } else if (t < 22) {
    if (t < 18.5) subtitle('選你的寶可夢，挑戰五大道館', clamp01((t - 14.5) / 0.6) * clamp01((18.5 - t) / 0.4));
    else subtitle('屬性相剋 × 蓄力必殺，回合制對戰！', clamp01((t - 18.7) / 0.6));
  } else {
    if (t < 25) subtitle('一份作品，兩個世界。', clamp01((t - 22.5) / 0.6) * clamp01((25 - t) / 0.4));
  }

  /* ---------- 幕間轉場 ---------- */
  let fadeA = 0;
  for (const b of BOUNDS) {
    const d = t - b;
    if (d >= -0.28 && d < 0) fadeA = Math.max(fadeA, (d + 0.28) / 0.28);
    if (d >= 0 && d < 0.3) fadeA = Math.max(fadeA, 1 - d / 0.3);
    if (d >= -0.02 && d < 0.2) cue('whoosh' + b, () => sfxWhoosh());
    if (d >= -1.3 && d < -1.1) cue('riser' + b, () => sfxRiser(1.25));
  }
  if (t < 0.7) fadeA = Math.max(fadeA, 1 - t / 0.7);
  if (fadeA > 0) { ctx.fillStyle = `rgba(2,4,10,${clamp01(fadeA)})`; ctx.fillRect(0, 0, GAME_W, GAME_H); }

  /* ---------- 閃白 ---------- */
  if (flashA > 0) { ctx.fillStyle = `rgba(255,248,230,${clamp01(flashA)})`; ctx.fillRect(0, 0, GAME_W, GAME_H); }

  /* ---------- 暗角＋letterbox ---------- */
  const vg = ctx.createRadialGradient(GAME_W / 2, GAME_H / 2, GAME_H * 0.42, GAME_W / 2, GAME_H / 2, GAME_W * 0.72);
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(2,4,10,0.42)');
  ctx.fillStyle = vg; ctx.fillRect(0, 0, GAME_W, GAME_H);
  const lb = 54 * easeOut(clamp01(t / 1.1));
  ctx.fillStyle = '#020409';
  ctx.fillRect(0, 0, GAME_W, lb);
  ctx.fillRect(0, GAME_H - lb, GAME_W, lb);
  ctx.fillStyle = 'rgba(127,219,255,0.28)';
  ctx.fillRect(0, lb - 1, GAME_W, 1);
  ctx.fillRect(0, GAME_H - lb, GAME_W, 1);
  renderSubtitle();
}

function loop(now) {
  if (!playing) return;
  if (startTime === null) startTime = now;
  const t = (now - startTime) / 1000 * (window.SPEED || 1);
  const dt = clamp(t - lastT, 0, 0.1);
  lastT = t;
  const bi = Math.floor(t / BEAT);
  if (bi !== lastBeat && AC && soundOn && AC.state === 'running') { lastBeat = bi; grooveBeat(bi, t); }
  updateParticles(dt);
  if (t >= DURATION) {
    draw(DURATION - 0.01, dt);
    playing = false;
    replayBtn.style.display = 'block';
    return;
  }
  draw(t, dt);
  requestAnimationFrame(loop);
}

function play() {
  startTime = null; lastT = 0; lastBeat = -1;
  firedCues = {};
  particles = []; floats = [];
  cam.shake = 0; cam.punch = 0; flashA = 0;
  playing = true;
  replayBtn.style.display = 'none';
  tryResume();
  requestAnimationFrame(loop);
}
replayBtn.addEventListener('click', play);
play();
</script>

      }).catch(function(){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); });
    }catch(e){}
  }
  function read(n,cb){
    function via(base,next){ try{ fetch(base+"get/"+NS+"/"+n).then(function(r){ if(r.status===404&&base===ABS) return {value:0}; if(!r.ok) throw 0; return r.json(); }).then(function(j){ cb(j.value||j.count||0); }).catch(next); }catch(e){ next(); } }
    via(REL, function(){ via(ABS, function(){ cb(null); }); });

    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){

        setTimeout(refresh,600);
