<!DOCTYPE html>
<!-- 專業AI升級 v6 -->
<!-- v6：電影運鏡（推鏡/震動）＋letterbox、SIUUU逐字浮現＋光暈掃過、金塵/彩帶粒子與探照燈、球員精繪（7號球衣）、預告片配樂（boom/riser/braam/結尾定音＋勝利和弦）預設開聲 -->
<!-- v7：畫面擬真重工——直接移植動畫本體的繪製函式（drawStadium 看台/照明塔/廣告板、drawGoal、drawPlayer 多部件角色、drawBallPro、圖鑑徽章 UI、章節字卡），滯空頭槌／倒掛金鈎／SIUUU 三段實景重現 -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="author" content="陳威辰、JOJO">
<title>SIUUU C羅招牌動作 預告片</title>
<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #05070f;
    font-family: "Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  canvas { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
  #soundBtn {
    position: fixed; top: max(12px, env(safe-area-inset-top)); right: max(12px, env(safe-area-inset-right)); z-index: 20;

    background: rgba(10,14,26,0.72); border: 1px solid rgba(255,209,102,0.65);

    animation: hintFade 4s ease forwards;

  }
  @keyframes hintFade { 0%{opacity:0} 15%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
  #replayBtn {
    position: fixed; left: 50%; bottom: 14%; transform: translateX(-50%);
    z-index: 20; display: none;
    padding: 14px 42px; font-size: 20px; min-height: 48px;
    background: linear-gradient(92deg,#ffd166,#e0b25e,#e63946);
    color: #14100a; border: none; border-radius: 999px; cursor: pointer;
    font-family: inherit; font-weight: 800; letter-spacing: .18em;

  #replayBtn:active { transform: translateX(-50%) scale(.94); }

<body>
<button id="soundBtn">🔊</button>
<div id="soundHint">聲音已開啟</div>
<button id="replayBtn">重新播放</button>
<canvas id="stage"></canvas>

<script>
'use strict';
const GAME_W = 960, GAME_H = 540;
const W = 960, H = 540, GY = 505;
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const soundBtn = document.getElementById('soundBtn');
const soundHint = document.getElementById('soundHint');
const replayBtn = document.getElementById('replayBtn');

function resize() {
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', resize); resize();

/* ============================================================
   音訊引擎 — 預告片配樂（全程序化合成、零外部資源）
============================================================ */
let AC = null, master = null, verb = null, verbSend = null, soundOn = true;
function makeImpulse(dur, decay) {
  const sr = AC.sampleRate, n = Math.floor(sr * dur);
  const buf = AC.createBuffer(2, n, sr);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, decay);
  }
  return buf;
}
function initAudio() {
  if (AC) return;
  try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; }
  const comp = AC.createDynamicsCompressor();
  comp.threshold.value = -16; comp.knee.value = 24; comp.ratio.value = 6;
  comp.attack.value = 0.004; comp.release.value = 0.24;
  comp.connect(AC.destination);
  master = AC.createGain(); master.gain.value = 0.9; master.connect(comp);
  verb = AC.createConvolver(); verb.buffer = makeImpulse(1.9, 2.6);
  verbSend = AC.createGain(); verbSend.gain.value = 0.9;
  verbSend.connect(verb); verb.connect(master);
}
function out(node, wet) {
  node.connect(master);
  if (wet > 0) { const g = AC.createGain(); g.gain.value = wet; node.connect(g); g.connect(verbSend); }
}
const rndF = (a, b) => a + Math.random() * (b - a);
function sfxBoom(vol) {
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain();
  o.frequency.setValueAtTime(120, t);
  o.frequency.exponentialRampToValueAtTime(36, t + 0.45);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
  o.connect(g); out(g, 0.25); o.start(t); o.stop(t + 0.65);
  const n = AC.createBufferSource(); n.buffer = makeImpulse(0.12, 3);
  const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 220;
  const ng = AC.createGain(); ng.gain.setValueAtTime(vol * 0.6, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  n.connect(f); f.connect(ng); out(ng, 0.2); n.start(t);
}
function sfxBraam(vol, dur) {
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const f0 = 57.5;
  const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.Q.value = 3;
  lp.frequency.setValueAtTime(180, t);
  lp.frequency.linearRampToValueAtTime(1100, t + dur * 0.35);
  lp.frequency.linearRampToValueAtTime(240, t + dur);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.09);
  g.gain.setValueAtTime(vol, t + dur * 0.55);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  lp.connect(g); out(g, 0.45);
  [1, 1.006, 0.994, 2.003].forEach((m) => {
    const o = AC.createOscillator(); o.type = 'sawtooth';
    o.frequency.value = f0 * m;
    o.connect(lp); o.start(t); o.stop(t + dur + 0.05);
  });
  const sub = AC.createOscillator(); sub.frequency.value = f0 / 2;
  const sg = AC.createGain(); sg.gain.setValueAtTime(vol * 0.8, t);
  sg.gain.exponentialRampToValueAtTime(0.001, t + dur);
  sub.connect(sg); out(sg, 0.1); sub.start(t); sub.stop(t + dur + 0.05);
}
function sfxRiser(dur) {
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const n = AC.createBufferSource();
  const sr = AC.sampleRate, len = Math.floor(sr * dur);
  const buf = AC.createBuffer(1, len, sr);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  n.buffer = buf;
  const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.4;
  bp.frequency.setValueAtTime(260, t);
  bp.frequency.exponentialRampToValueAtTime(4200, t + dur);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.3, t + dur);
  g.gain.linearRampToValueAtTime(0.0001, t + dur + 0.06);
  n.connect(bp); bp.connect(g); out(g, 0.35); n.start(t);
  const o = AC.createOscillator(); o.type = 'sawtooth';
  o.frequency.setValueAtTime(110, t);
  o.frequency.exponentialRampToValueAtTime(440, t + dur);
  const og = AC.createGain(); og.gain.setValueAtTime(0.0001, t);
  og.gain.exponentialRampToValueAtTime(0.12, t + dur);
  og.gain.linearRampToValueAtTime(0.0001, t + dur + 0.06);
  o.connect(og); out(og, 0.3); o.start(t); o.stop(t + dur + 0.1);
}
function sfxTick(vol) {
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const n = AC.createBufferSource(); n.buffer = makeImpulse(0.035, 2.2);
  const hp = AC.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 6400;
  const g = AC.createGain(); g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.035);
  n.connect(hp); hp.connect(g); out(g, 0.1); n.start(t);
}
function sfxClap(vol) {
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const n = AC.createBufferSource(); n.buffer = makeImpulse(0.09, 1.6);
  const f = AC.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 1500; f.Q.value = 0.9;
  const g = AC.createGain(); g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  n.connect(f); f.connect(g); out(g, 0.3); n.start(t);
}
function pluck(freq, dur, vol, type, wet) {
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const o = AC.createOscillator(); o.type = type || 'square';
  o.frequency.value = freq * rndF(0.997, 1.003);
  const lp = AC.createBiquadFilter(); lp.type = 'lowpass';
  lp.frequency.setValueAtTime(freq * 6, t);
  lp.frequency.exponentialRampToValueAtTime(freq * 1.5, t + dur);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(lp); lp.connect(g); out(g, wet == null ? 0.2 : wet);
  o.start(t); o.stop(t + dur + 0.03);
}
function sfxChime() {
  if (!AC || !soundOn) return;
  [988, 1244.5, 1568, 1975.5].forEach((fq, i) =>
    setTimeout(() => pluck(fq, 0.35, 0.13, 'triangle', 0.55), i * 70));
}
function sfxCheer(vol) { // 觀眾歡呼（濾波噪聲湧起）
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const n = AC.createBufferSource(); n.buffer = makeImpulse(1.4, 1.1);
  const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 900; bp.Q.value = 0.4;
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.18);
  g.gain.exponentialRampToValueAtTime(0.001, t + 1.35);
  n.connect(bp); bp.connect(g); out(g, 0.5); n.start(t);
}
function sfxWhoosh() {
  if (!AC || !soundOn) return; const t = AC.currentTime;
  const n = AC.createBufferSource(); n.buffer = makeImpulse(0.3, 1.5);
  const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.1;
  bp.frequency.setValueAtTime(3000, t);
  bp.frequency.exponentialRampToValueAtTime(500, t + 0.28);
  const g = AC.createGain(); g.gain.setValueAtTime(0.26, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
  n.connect(bp); bp.connect(g); out(g, 0.3); n.start(t);
}
function sfxSting() {
  sfxBoom(0.9); sfxBraam(0.5, 2.2);
  setTimeout(() => sfxChime(), 180);
}

initAudio();
function tryResume() { if (AC && AC.state === 'suspended') { const p = AC.resume(); if (p && p.catch) p.catch(() => {}); } }
tryResume();
setTimeout(() => {
  if (AC && AC.state === 'suspended') soundHint.textContent = '點任意處開啟聲音';
}, 300);
addEventListener('pointerdown', tryResume);
addEventListener('keydown', tryResume);
soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? '🔊' : '🔇';
  if (soundOn) { initAudio(); tryResume(); }
});

/* ---------- 緩動 ---------- */
const clamp01 = x => Math.max(0, Math.min(1, x));
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp = (a, b, t) => a + (b - a) * t;
const eIO = t => t < .5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2, eO = t => 1 - Math.pow(1 - t, 3);
const eI = t => t * t * t, eOB = t => 1 + 2.70158 * Math.pow(t - 1, 3) + 1.70158 * Math.pow(t - 1, 2);
function seg(t, a, b, ez) { return (ez || eIO)(clamp01((t - a) / (b - a))); }
function rnd(i) { const x = Math.sin(i * 127.1 + 311.7) * 43758.5453; return x - Math.floor(x); }
function kf(t, frames) {
  if (t <= frames[0][0]) return Object.assign({}, frames[0][1]);
  const last = frames[frames.length - 1];
  if (t >= last[0]) return Object.assign({}, last[1]);
  for (let i = 0; i < frames.length - 1; i++) {
    const A = frames[i], B = frames[i + 1];
    if (t >= A[0] && t < B[0]) {
      const u = (B[2] || eIO)((t - A[0]) / (B[0] - A[0]));
      const o = {};
      for (const k2 in B[1]) {
        const av = (A[1][k2] !== undefined) ? A[1][k2] : B[1][k2];
        o[k2] = lerp(av, B[1][k2], u);
      }
      for (const k2 in A[1]) if (!(k2 in o)) o[k2] = A[1][k2];
      return o;
    }
  }
  return Object.assign({}, last[1]);
}

/* ============================================================
   以下畫面素材與繪製函式全部移植自動畫本體
   「C羅招牌動作」——同一套代碼，畫面保證一致
============================================================ */
/* ---------- 電影運鏡（動畫同款平滑追蹤攝影機＋視差層） ---------- */
const LIFT = 26; // 預告片 letterbox 佔下緣 54px，整體場景上移避免裁到腳
const cam = { x: 0, y: 0, z: 1, tx: 0, ty: LIFT, tz: 1 };
let shakeMag = 0, shX = 0, shY = 0, flashA = 0;
function camSnap() { cam.x = cam.tx; cam.y = cam.ty; cam.z = cam.tz; }
function camUpdate(dt) {
  const k = 1 - Math.pow(0.02, dt);
  cam.x += (cam.tx - cam.x) * k; cam.y += (cam.ty - cam.y) * k; cam.z += (cam.tz - cam.z) * k;
  shakeMag *= Math.pow(0.0006, dt);
  shX = (Math.random() * 2 - 1) * shakeMag; shY = (Math.random() * 2 - 1) * shakeMag;
  flashA = Math.max(0, flashA - dt * 2.6);
}
function applyCam(f) {
  ctx.save();
  ctx.translate(W / 2 + shX * f, H / 2 + shY * f);
  ctx.scale(cam.z, cam.z);
  ctx.translate(-W / 2 - cam.x * f, -H / 2 - cam.y);
}

/* ---------- 粒子（動畫同款：塵土/火花/彩帶） ---------- */
let excite = 0.25, exciteBoost = 0;
const parts = [];
function spawnDust(x, y, n, spd) {
  for (let i = 0; i < n; i++) {
    const a = Math.PI + Math.random() * Math.PI;
    const s = (spd || 70) * (0.4 + Math.random() * 0.8);
    parts.push({ x, y, vx: Math.cos(a) * s * 0.6, vy: Math.sin(a) * s * 0.35 - 20, g: 60, r: 2 + Math.random() * 3.5, col: 'rgba(160,150,120,0.5)', life: 0.5 + Math.random() * 0.4, max: 0.9, kind: 'dot' });
  }
}
function spawnSpark(x, y, n, spd) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = (spd || 260) * (0.3 + Math.random() * 0.8);
    parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, g: 160, r: 1.6 + Math.random() * 2.4, col: ['#fff6e0', '#ffd166', '#ffef9e'][i % 3], life: 0.3 + Math.random() * 0.35, max: 0.65, kind: 'dot' });
  }
}
const CONF = ['#e63946', '#ffd166', '#f7f3e8', '#4cc9f0', '#57cc99', '#ff70a6'];
function spawnConfetti(x, y, n, dir) {
  for (let i = 0; i < n; i++) {
    const a = -Math.PI / 2 + dir * (0.15 + Math.random() * 0.55);
    const s = 340 + Math.random() * 380;
    parts.push({ x, y, vx: Math.cos(a) * s * (0.5 + Math.random() * 0.6), vy: Math.sin(a) * s, g: 420, r: 3 + Math.random() * 3, col: CONF[i % CONF.length], life: 1.6 + Math.random() * 1.2, max: 2.8, kind: 'conf', spin: Math.random() * 7 });
  }
}
function updateParts(dt) {
  for (const p of parts) {
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += (p.g || 0) * dt;
    if (p.kind === 'conf') p.vx *= Math.pow(0.4, dt);
    p.life -= dt;
  }
  for (let i = parts.length - 1; i >= 0; i--) if (parts[i].life <= 0) parts.splice(i, 1);
}
function drawParts(g) {
  for (const p of parts) {
    const a = clamp01(p.life / (p.max * 0.5));
    g.globalAlpha = a;
    g.fillStyle = p.col;
    if (p.kind === 'conf') {
      g.save(); g.translate(p.x, p.y); g.rotate((p.spin || 0) * p.life);
      g.fillRect(-p.r, -p.r / 2, p.r * 2, p.r);
      g.restore();
    } else {
      g.beginPath(); g.arc(p.x, p.y, p.r, 0, 6.283); g.fill();
    }
  }
  g.globalAlpha = 1;
}

/* ---------- 球場（照明塔/雙層看臺/廣告板/草皮） ---------- */
let wall = 0;
const bulbs = [];
let G_sky = null, G_ad = null, G_grass = null, G_pool = null, G_band = null;
const G_cone = {};
function gradInit() {
  if (G_sky) return;
  G_sky = ctx.createLinearGradient(0, 0, 0, 240);
  G_sky.addColorStop(0, '#05070f'); G_sky.addColorStop(1, '#101a33');
  G_ad = ctx.createLinearGradient(0, 372, 0, 402);
  G_ad.addColorStop(0, '#0f2e1d'); G_ad.addColorStop(1, '#0a2013');
  G_grass = ctx.createLinearGradient(0, 430, 0, 540);
  G_grass.addColorStop(0, '#1e6338'); G_grass.addColorStop(1, '#123f26');
  G_pool = ctx.createRadialGradient(480, 470, 40, 480, 470, 460);
  G_pool.addColorStop(0, 'rgba(255,246,214,0.07)'); G_pool.addColorStop(1, 'rgba(255,246,214,0)');
  for (const lx of [-140, 320, 760, 1220]) {
    const cg = ctx.createLinearGradient(lx, 30, lx, 430);
    cg.addColorStop(0, 'rgba(255,243,196,0.10)'); cg.addColorStop(1, 'rgba(255,243,196,0)');
    G_cone[lx] = cg;
  }
}
function drawStadium(t) {
  gradInit();
  // 天空
  applyCam(0.05);
  ctx.fillStyle = G_sky; ctx.fillRect(-600, -200, 2200, 460);
  for (let i = 0; i < 40; i++) {
    const sx = -500 + rnd(i) * 1900, sy = -80 + rnd(i + 50) * 200;
    ctx.globalAlpha = 0.25 + 0.5 * Math.abs(Math.sin(wall * 1.5 + i));
    ctx.fillStyle = '#dfe8ff'; ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.globalAlpha = 1;
  ctx.restore();
  // 照明塔
  applyCam(0.12);
  for (const lx of [-140, 320, 760, 1220]) {
    ctx.strokeStyle = '#1d2740'; ctx.lineWidth = 7;
    ctx.beginPath(); ctx.moveTo(lx, 152); ctx.lineTo(lx, 36); ctx.stroke();
    ctx.fillStyle = '#2a3752'; ctx.fillRect(lx - 30, 18, 60, 22);
    ctx.fillStyle = 'rgba(255,243,196,0.35)';
    ctx.fillRect(lx - 30, 18, 60, 14);
    ctx.fillStyle = '#fff3c4';
    for (let i = 0; i < 4; i++) ctx.fillRect(lx - 26 + i * 14, 22, 9, 6);
    ctx.fillStyle = G_cone[lx];
    ctx.beginPath(); ctx.moveTo(lx - 28, 30); ctx.lineTo(lx + 28, 30);
    ctx.lineTo(lx + 130, 430); ctx.lineTo(lx - 130, 430); ctx.closePath(); ctx.fill();
  }
  // 上層看臺
  crowdBand(140, 253, 5, 11, ['#232c47', '#2c3550', '#1d2740', '#3a3050'], 0.12, t);
  ctx.restore();
  // 下層看臺
  applyCam(0.35);
  crowdBand(255, 370, 5, 77, ['#31406b', '#443454', '#553a45', '#2c3550'], 0.35, t);
  ctx.restore();
  // 廣告看板
  applyCam(0.6);
  ctx.fillStyle = G_ad; ctx.fillRect(-500, 372, 2000, 30);
  ctx.fillStyle = 'rgba(255,209,102,0.75)';
  ctx.font = 'bold 15px "Noto Sans TC",sans-serif'; ctx.textAlign = 'left';
  for (let x = -480; x < 1500; x += 250) ctx.fillText('SIUUU ・ 招牌動作圖鑑', x, 393);
  ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-500, 372); ctx.lineTo(1500, 372); ctx.stroke();
  ctx.restore();
  // 跑道
  applyCam(0.85);
  ctx.fillStyle = '#182236'; ctx.fillRect(-500, 402, 2000, 30);
  ctx.restore();
  // 草皮
  applyCam(1);
  ctx.fillStyle = G_grass; ctx.fillRect(-500, 430, 2000, 230);
  for (let x = -500; x < 1500; x += 96) {
    if (((x / 96) | 0) % 2 === 0) continue;
    ctx.fillStyle = 'rgba(255,255,255,0.035)'; ctx.fillRect(x, 430, 96, 220);
  }
  ctx.strokeStyle = 'rgba(244,244,244,0.55)'; ctx.lineWidth = 2.5;

    if (t < 25 && bi % 8 === 0) sfxBoom(0.55);
    if (t < 25 && bi % 4 === 2) sfxTick(0.12);
    return;
  }
  const fast = act === 2;
  if (bi % 4 === 0) sfxBoom(fast ? 0.5 : 0.44);
  if (bi % 8 === 4) sfxClap(0.3);
  if (bi % 2 === 1) sfxTick(fast ? 0.14 : 0.09);
  const mi = MELODY[bi % MELODY.length];
  const shift = fast ? 9 / 8 : 1;
  pluck(SCALE[mi] * shift, BEAT * 1.7, 0.12, 'square', 0.18);
  if (bi % 2 === 0) {
    const b = BASSP[(bi >> 1) % 8];
    pluck(SCALE[b] * shift / 2, BEAT * 1.6, 0.16, 'sawtooth', 0.06);
  }
}

    ctx.fillText('SIUUU!!!', 0, 0);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#e63946'; ctx.lineWidth = 2;
    ctx.strokeText('SIUUU!!!', 0, 0);
    ctx.restore();
  }
}

function draw(t, dt) {
  ctx.clearRect(0, 0, GAME_W, GAME_H);
  wall = t;
  camUpdate(dt);
  updateBulbs(dt);

  if (t < 6) drawAct1(t);
  else if (t < 14) drawAct2(t);
  else if (t < 22) drawAct3(t);
  else drawAct4(t);

  /* ---------- 疊在鏡頭之上的字卡層 ---------- */
  if (t < 6) {
    drawRevealText('SIUUU', GAME_W / 2, GAME_H * 0.32, 76, 0.5, t);
    if (t > 1.5) smallLine('C 羅 招 牌 動 作', clamp01((t - 1.5) / 0.6), GAME_H * 0.4);
    if (t > 2.4) smallLine('球迷筆記 · 五個招牌瞬間', clamp01((t - 2.4) / 0.7) * 0.8, GAME_H * 0.465);
    if (t > 3.8) subtitle('二十年，他把幾個瞬間，變成全世界的暗號。', clamp01((t - 3.8) / 0.6));
  } else if (t < 14) {
    if (t > 10.2 && t < 13.6) subtitle('起跳之後，時間為他慢了半秒。', clamp01((t - 10.2) / 0.6) * clamp01((13.6 - t) / 0.4));
  } else if (t < 22) {
    if (t > 18.6 && t < 21.6) subtitle('連對手的球迷，都起立鼓掌。', clamp01((t - 18.6) / 0.6) * clamp01((21.6 - t) / 0.4));
  } else {
    if (t > 22.4 && t < 25) subtitle('然後，是那個全世界都認得的瞬間——', clamp01((t - 22.4) / 0.6) * clamp01((25 - t) / 0.4));
    if (t >= 27.2) {
      const ca = clamp01((t - 27.2) / 0.7);
      ctx.save();
      ctx.globalAlpha = ca * 0.72;
      ctx.fillStyle = 'rgba(8,10,18,0.9)';
      ctx.beginPath(); ctx.roundRect(GAME_W / 2 - 230, GAME_H * 0.585, 460, 76, 12); ctx.fill();
      ctx.strokeStyle = 'rgba(255,209,102,0.4)'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.restore();
      smallLine('五個招牌動作 · 章節選單隨點隨看', ca, GAME_H * 0.645);
      smallLine('陳威辰、JOJO 出品 · 立即觀看', clamp01((t - 27.9) / 0.7) * 0.85, GAME_H * 0.7);
      cue('sting', () => { sfxSting(); flashA = 0.55; shakeMag = 6; });
    }
  }
  drawBadgeUI();

  /* ---------- 幕間轉場（黑場淡出＋riser） ---------- */
  let fadeA = 0;
  for (const b of BOUNDS) {
    const d = t - b;
    if (d >= -0.28 && d < 0) fadeA = Math.max(fadeA, (d + 0.28) / 0.28);
    if (d >= 0 && d < 0.3) fadeA = Math.max(fadeA, 1 - d / 0.3);
    if (d >= -0.02 && d < 0.2) cue('whoosh' + b, () => sfxWhoosh());
    if (d >= -1.3 && d < -1.1) cue('riser' + b, () => sfxRiser(1.25));
  }
  if (t < 0.7) fadeA = Math.max(fadeA, 1 - t / 0.7);
  if (fadeA > 0) { ctx.fillStyle = `rgba(2,4,9,${clamp01(fadeA)})`; ctx.fillRect(0, 0, GAME_W, GAME_H); }

  /* ---------- 閃白 ---------- */
  if (flashA > 0) { ctx.fillStyle = `rgba(255,248,230,${clamp01(flashA)})`; ctx.fillRect(0, 0, GAME_W, GAME_H); }

  /* ---------- 暗角＋letterbox ---------- */
  const vg = ctx.createRadialGradient(GAME_W / 2, GAME_H / 2, GAME_H * 0.4, GAME_W / 2, GAME_H / 2, GAME_W * 0.7);
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(1,2,6,0.5)');
  ctx.fillStyle = vg; ctx.fillRect(0, 0, GAME_W, GAME_H);
  const lb = 54 * easeOutT(clamp01(t / 1.1));
  ctx.fillStyle = '#020409';
  ctx.fillRect(0, 0, GAME_W, lb);
  ctx.fillRect(0, GAME_H - lb, GAME_W, lb);
  ctx.fillStyle = 'rgba(255,209,102,0.28)';
  ctx.fillRect(0, lb - 1, GAME_W, 1);
  ctx.fillRect(0, GAME_H - lb, GAME_W, 1);
  renderSubtitle();
}

function loop(now) {
  if (!playing) return;
  if (startTime === null) startTime = now;
  const t = (now - startTime) / 1000 * (window.SPEED || 1);
  const dt = clamp(t - lastT, 0, 0.1);
  lastT = t;
  const bi = Math.floor(t / BEAT);
  if (bi !== lastBeat && AC && soundOn && AC.state === 'running') { lastBeat = bi; grooveBeat(bi, t); }
  updateParts(dt);
  if (t >= DURATION) {
    draw(DURATION - 0.01, dt);
    playing = false;
    replayBtn.style.display = 'block';
    return;
  }
  draw(t, dt);
  requestAnimationFrame(loop);
}

function play() {
  startTime = null; lastT = 0; lastBeat = -1;
  firedCues = {};
  parts.length = 0; bulbs.length = 0; bicycleHist = [];
  collected = 0; badgeWall = -9; netHit = -9;
  shakeMag = 0; flashA = 0;
  cam.tx = 60; cam.ty = LIFT; cam.tz = 1.1; camSnap();
  playing = true;
  replayBtn.style.display = 'none';
  tryResume();
  requestAnimationFrame(loop);
}
replayBtn.addEventListener('click', play);
play();
</script>

<script>/* AI-CAMP-VIDEO-CONTROLS */
(function(){
  var ORAF=window.requestAnimationFrame.bind(window), OST=window.setTimeout.bind(window), OSI=window.setInterval.bind(window);
  var realNow=performance.now.bind(performance), D0=Date.now(), P0=realNow();
  var acc=0, lastReal=P0, paused=false, speed=1;
  function vnow(){ var r=realNow(); if(!paused){ acc+=(r-lastReal)*speed; } lastReal=r; return acc; }
  try{ performance.now=function(){ return vnow(); }; }catch(e){}
  try{ Date.now=function(){ return D0+Math.round(vnow()); }; }catch(e){}
  window.requestAnimationFrame=function(cb){ return ORAF(function tick(){ if(paused){ ORAF(tick); } else { cb(vnow()); } }); };
  window.setTimeout=function(fn,ms){ var a=[].slice.call(arguments,2);
    return OST(function f(){ if(paused){ OST(f,120); } else if(typeof fn==="function"){ fn.apply(null,a); } },ms); };
  window.setInterval=function(fn,ms){ var a=[].slice.call(arguments,2);
    return OSI(function(){ if(!paused&&typeof fn==="function"){ fn.apply(null,a); } },ms); };
  var ctxs=[];
  ["AudioContext","webkitAudioContext"].forEach(function(n){
    var C=window[n]; if(!C) return;
    var W=function(){ var c=new (Function.prototype.bind.apply(C,[null].concat([].slice.call(arguments))))(); ctxs.push(c); return c; };
    W.prototype=C.prototype; window[n]=W;
  });
  function setPaused(p){
    vnow(); paused=p;
    ctxs.forEach(function(c){ try{ p?c.suspend():c.resume(); }catch(e){} });
    [].forEach.call(document.querySelectorAll("audio,video"),function(m){ try{ p?m.pause():m.play(); }catch(e){} });
  }
  function fmt(ms){ var s=Math.floor(ms/1000); return Math.floor(s/60)+":"+("0"+(s%60)).slice(-2); }
  function init(){
    if(!document.body) return;
    var bar=document.createElement("div");
    bar.style.cssText="position:fixed;left:10px;bottom:10px;z-index:99998;display:flex;gap:6px;align-items:center;"+
      "font-family:sans-serif;background:rgba(15,18,32,.88);border-radius:999px;padding:6px 10px;box-shadow:0 2px 10px rgba(0,0,0,.4)";
    function mkbtn(txt,title){ var b=document.createElement("button"); b.type="button"; b.title=title;
      b.style.cssText="min-width:42px;min-height:36px;border:none;border-radius:999px;background:rgba(255,255,255,.12);"+
        "color:#fff;font-size:15px;cursor:pointer;touch-action:manipulation;padding:4px 10px"; b.textContent=txt; return b; }
    var bPlay=mkbtn("\u23F8","\u66AB\u505C/\u7E7C\u7E8C");
    var bRe=mkbtn("\u23EA","\u91CD\u64AD");
    var bSp=mkbtn("1x","\u64AD\u653E\u901F\u5EA6");
    var tEl=document.createElement("span"); tEl.style.cssText="color:#9fd8ff;font-size:13px;min-width:38px;text-align:center"; tEl.textContent="0:00";
    bPlay.addEventListener("click",function(){ setPaused(!paused); bPlay.textContent=paused?"\u25B6":"\u23F8"; });
    bRe.addEventListener("click",function(){ location.reload(); });
    var speeds=[1,2,0.5];
    bSp.addEventListener("click",function(){ vnow(); speed=speeds[(speeds.indexOf(speed)+1)%speeds.length]; bSp.textContent=(speed===0.5?"0.5":speed)+"x"; });
    bar.appendChild(bPlay); bar.appendChild(bRe); bar.appendChild(bSp); bar.appendChild(tEl);
    document.body.appendChild(bar);
    (function upd(){ tEl.textContent=fmt(vnow()); OST(upd,500); })();
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",init); else init();
})();
</script>
