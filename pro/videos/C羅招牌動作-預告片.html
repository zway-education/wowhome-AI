<!DOCTYPE html>
<!-- 專業AI升級 v6 -->
<!-- v6：電影運鏡（推鏡/震動）＋letterbox、SIUUU逐字浮現＋光暈掃過、金塵/彩帶粒子與探照燈、球員精繪（7號球衣）、預告片配樂（boom/riser/braam/結尾定音＋勝利和弦）預設開聲 -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="author" content="陳威辰、JOJO">
<title>SIUUU C羅招牌動作 預告片</title>
<style>
  :root{
    --red:#c1121f; --red2:#ef3b4a; --gold:#ffd166; --gold2:#e0b25e;
    --bg:#05070f; --card:#0f1424; --border:rgba(255,209,102,.18);
    --text:#f6f1e3; --muted:#9aa3bb;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ width:100%; height:100%; overflow:hidden; background:#000; }
  body{
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;
    display:flex; align-items:center; justify-content:center;
    touch-action:manipulation; -webkit-user-select:none; user-select:none;
  }
  #stage{
    position:relative; width:100%; height:100%; max-width:800px; aspect-ratio:9/16;
    background:
      radial-gradient(900px 600px at 50% -8%, rgba(255,209,102,.16), transparent 60%),
      radial-gradient(700px 500px at -10% 30%, rgba(193,18,31,.18), transparent 60%),
      radial-gradient(600px 500px at 110% 70%, rgba(255,209,102,.10), transparent 60%),
      linear-gradient(180deg, var(--bg), #0a0e1c 60%, #101a33);
    overflow:hidden; color:var(--text);
  }
  @media (min-aspect-ratio: 9/16){ #stage{ height:100%; width:auto; } }
  #cam{ position:absolute; inset:0; transform-origin:50% 50%; }
  #shk{ position:absolute; inset:0; }
  .layer{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; opacity:0; }

  /* 看台（兩層人群＋探照光束） */
  .crowd{ position:absolute; left:0; right:0; top:0; height:16%; display:flex; flex-wrap:wrap; overflow:hidden; opacity:.55;
    background:linear-gradient(180deg,#141d3c,#0c1226); }
  .crowd i{ flex:none; width:7px; height:9px; margin:2px; border-radius:2px; }
  .ray{
    position:absolute; top:-4%; width:26%; height:64%; pointer-events:none; opacity:.5;
    background:linear-gradient(180deg, rgba(255,244,200,.28), rgba(255,244,200,0));
    clip-path:polygon(42% 0, 58% 0, 100% 100%, 0 100%);
    animation:raySway 7s ease-in-out infinite alternate;
    transform-origin:top center;
  }
  #ray1{ left:4%; } #ray2{ right:4%; animation-delay:-3.5s; }
  @keyframes raySway{ from{ transform:rotate(-7deg);} to{ transform:rotate(7deg);} }

  .cap{
    position:absolute; left:50%; bottom:10.5%; transform:translateX(-50%);
    font-size:clamp(13px,4vw,18px); font-weight:700; letter-spacing:1.5px; text-align:center;
    color:var(--text); background:rgba(5,7,15,.6); border:1px solid var(--border);
    padding:9px 22px; border-radius:999px; white-space:nowrap; opacity:0;
    box-shadow:0 8px 24px rgba(0,0,0,.4);
  }

  /* ---- Scene 1 ---- */
  .siuuu{
    font:900 clamp(48px,15vw,84px) "Arial Narrow",sans-serif; letter-spacing:2px;
    color:var(--text); text-shadow:0 0 40px rgba(230,57,70,.7);
    display:flex;
  }
  .siuuu b{ opacity:0; transform:translateY(30px) scale(1.6); display:inline-block; font-weight:900;
    background:linear-gradient(180deg,#fff 20%, var(--gold) 60%, var(--gold2));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .siuuu b.in{ animation:charIn .5s cubic-bezier(.34,1.56,.64,1) forwards; }
  @keyframes charIn{ to{ opacity:1; transform:translateY(0) scale(1);} }
  .shine{
    position:absolute; inset:0; pointer-events:none; opacity:0; mix-blend-mode:screen;
    background:linear-gradient(115deg, transparent 42%, rgba(255,255,255,.9) 50%, transparent 58%);
    background-size:260% 100%; background-position:120% 0;
  }
  .shine.go{ animation:shineSweep 1s ease-out forwards; }
  @keyframes shineSweep{ from{ opacity:1; background-position:120% 0;} to{ opacity:0; background-position:-120% 0;} }
  .s1sub{
    margin-top:8px; font-size:clamp(17px,5vw,24px); font-weight:700; letter-spacing:6px;
    color:var(--gold); opacity:0; transform:translateY(14px);
  }
  .s1sub2{
    margin-top:6px; font-size:clamp(11px,3.2vw,13px); color:var(--muted); letter-spacing:2px;
    opacity:0; transform:translateY(10px);
  }

  /* ---- Scene 2: 球員動作 + 徽章 ---- */
  #s2 .field{
    position:absolute; left:0; right:0; bottom:0; height:34%;
    background:
      repeating-linear-gradient(180deg, rgba(255,255,255,.035) 0 12%, transparent 12% 24%),
      linear-gradient(180deg, #1e6338, #123f26);
    border-top:3px solid rgba(244,244,244,.5);
  }
  #s2 .field::after{ /* 禁區線 */
    content:""; position:absolute; left:50%; top:0; transform:translateX(-50%);
    width:56%; height:44%; border:2px solid rgba(244,244,244,.28); border-top:none;
  }
  #s2 .player{ position:absolute; left:50%; bottom:34%; width:70px; height:110px; transform:translateX(-50%); opacity:0;
    filter:drop-shadow(0 10px 8px rgba(0,0,0,.45)); }
  #s2 .player .body{
    position:absolute; left:22px; top:26px; width:26px; height:40px; border-radius:12px;
    background:linear-gradient(160deg, var(--red2) 30%, var(--red)); border:2px solid #141b26;
  }
  #s2 .player .body::before{ /* 7 號 */
    content:"7"; position:absolute; left:0; right:0; top:6px; text-align:center;
    font:800 15px "Arial Black",sans-serif; color:#fff; text-shadow:0 1px 0 rgba(0,0,0,.4);
  }
  #s2 .player .body::after{ /* 短褲 */
    content:""; position:absolute; left:-2px; right:-2px; bottom:-8px; height:12px; border-radius:4px;
    background:#fff; border:2px solid #141b26;
  }
  #s2 .player .head{
    position:absolute; left:24px; top:2px; width:22px; height:22px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #f4cf9f, #e8b98a 70%, #c9985f); border:2px solid #141b26;
  }
  #s2 .player .head::before{ /* 髮 */
    content:""; position:absolute; left:1px; top:-1px; width:18px; height:9px;
    border-radius:9px 9px 2px 2px; background:#2a1c12;
  }
  #s2 .player .legL, #s2 .player .legR{
    position:absolute; left:26px; top:60px; width:9px; height:38px; border-radius:6px;
    background:linear-gradient(180deg,#0b3d2e 60%, #e9e6da 60% 82%, #141b26 82%); border:2px solid #141b26; transform-origin:top center;
  }
  #s2 .player .legR{ left:36px; }
  #s2 .player .armL, #s2 .player .armR{
    position:absolute; left:16px; top:30px; width:8px; height:28px; border-radius:6px;
    background:linear-gradient(180deg, var(--red) 55%, #e8b98a 55%); border:2px solid #141b26; transform-origin:top center;
  }
  #s2 .player .armR{ left:46px; }
  .badges{
    position:absolute; top:9%; left:50%; transform:translateX(-50%); display:flex; gap:10px; flex-wrap:wrap;
    justify-content:center; max-width:320px;
  }
  .badge{
    display:flex; flex-direction:column; align-items:center; gap:5px; opacity:0; transform:translateY(-24px) scale(.7);
  }
  .badge .dot{
    width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(150deg, var(--gold), var(--gold2)); color:#241a05; font-size:18px; font-weight:800;
    box-shadow:0 8px 20px rgba(255,209,102,.35), inset 0 2px 3px rgba(255,255,255,.5); border:2px solid #141b26;
  }
  .badge .lb{ font-size:10px; color:#cdd5e8; letter-spacing:.5px; white-space:nowrap;
    background:rgba(5,7,15,.72); padding:2px 7px; border-radius:6px; }
  .s2head{ position:absolute; top:24.5%; left:50%; transform:translateX(-50%); text-align:center; opacity:0; }
  .s2head h2{ font-size:clamp(20px,5.6vw,26px); font-weight:800; letter-spacing:2px; color:var(--text);
    text-shadow:0 0 24px rgba(255,209,102,.35); }
  .s2head p{ margin-top:5px; font-size:clamp(11px,3.2vw,13px); color:var(--muted); letter-spacing:1px; }

  /* ---- Scene 3: 功能亮點 ---- */
  #s3{ gap:16px; }
  .pill{
    display:flex; align-items:center; gap:12px; padding:14px 22px; border-radius:999px;
    background:var(--card); border:1px solid var(--border); min-width:260px;
    opacity:0; transform:translateX(-60px);
    box-shadow:0 12px 30px rgba(0,0,0,.45);
  }
  .pill .ic{
    width:34px; height:34px; border-radius:50%; flex:none; display:flex; align-items:center; justify-content:center;
    color:#241a05; font-size:16px; font-weight:800;
  }
  .pill span.label{ font-size:14.5px; font-weight:700; letter-spacing:.5px; color:var(--text); }
  .pill:nth-child(1) .ic{ background:linear-gradient(135deg,var(--gold),var(--gold2)); }
  .pill:nth-child(2) .ic{ background:linear-gradient(135deg,var(--red2),var(--red)); }
  .pill:nth-child(3) .ic{ background:linear-gradient(135deg,#ffe94d,#c8b400); }

  /* ---- Scene 4: CTA ---- */
  #s4 .badge-ring{
    width:96px; height:96px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(150deg, var(--gold), var(--gold2));
    box-shadow:0 18px 50px rgba(255,209,102,.4), inset 0 3px 6px rgba(255,255,255,.55);
    transform:scale(.6); opacity:0; font-size:40px;
  }
  .cta-title{ margin-top:20px; font-size:clamp(22px,6.4vw,30px); font-weight:800; letter-spacing:1.5px; opacity:0; transform:translateY(14px);
    text-shadow:0 0 30px rgba(255,209,102,.4); }
  .cta-sub{ margin-top:8px; font-size:clamp(13px,3.6vw,15px); color:var(--gold); font-weight:700; letter-spacing:1px; opacity:0; transform:translateY(10px); }
  .cta-url{ margin-top:16px; padding:9px 20px; border-radius:999px; border:1px solid var(--border); background:var(--card); font-size:12px; color:var(--muted); opacity:0; }

  /* ---- 電影後製層 ---- */
  #fx{ position:absolute; inset:0; z-index:8; pointer-events:none; }
  #vign{ position:absolute; inset:0; z-index:9; pointer-events:none;
    background:radial-gradient(120% 90% at 50% 46%, transparent 55%, rgba(1,2,6,.6) 100%); }
  #flash{ position:absolute; inset:0; z-index:11; pointer-events:none; background:#fff8e6; opacity:0; }
  #flash.go{ animation:flashOut .32s ease-out forwards; }
  @keyframes flashOut{ from{ opacity:.75;} to{ opacity:0;} }
  .lb{ position:absolute; left:0; right:0; height:6.5%; z-index:10; background:#020409; pointer-events:none;
    transition:transform 1.1s cubic-bezier(.16,1,.3,1); }
  #lbTop{ top:0; transform:translateY(-100%); box-shadow:0 1px 0 rgba(255,209,102,.3); }
  #lbBot{ bottom:0; transform:translateY(100%); box-shadow:0 -1px 0 rgba(255,209,102,.3); }
  body.rolling #lbTop, body.rolling #lbBot{ transform:translateY(0); }

  #ui{ position:absolute; inset:0; z-index:20; pointer-events:none; }
  #muteBtn{
    position:absolute; top:16px; right:16px; width:48px; height:48px; border-radius:50%;
    background:rgba(5,7,15,.6); border:1px solid var(--border); color:var(--text);
    display:flex; align-items:center; justify-content:center; font-size:18px; cursor:pointer; pointer-events:auto;
  }
  #hint{
    position:absolute; top:16px; left:16px; padding:8px 14px; border-radius:999px;
    background:rgba(5,7,15,.6); border:1px solid var(--border); font-size:11.5px; color:var(--muted);
    letter-spacing:.5px; opacity:1; transition:opacity .4s;
  }
  #replayWrap{
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(4,5,10,.6); pointer-events:auto; z-index:25;
  }
  #replayWrap.show{ display:flex; }
  #replayBtn{
    min-width:150px; min-height:52px; padding:12px 30px; border-radius:999px; border:none; cursor:pointer;
    background:linear-gradient(92deg, var(--gold), var(--gold2)); color:#241a05;
    font-size:16px; font-weight:800; letter-spacing:2px;
    box-shadow:0 14px 36px rgba(255,209,102,.4);
    display:flex; align-items:center; gap:8px;
  }
</style>
</head>
<body>

<div id="stage">
  <div id="cam"><div id="shk">

    <!-- Scene 1 -->
    <div class="layer" id="s1">
      <div class="siuuu" id="s1txt">SIUUU</div>
      <div class="s1sub" id="s1sub">C 羅 招 牌 動 作</div>

    </div>

    <!-- Scene 2 -->
    <div class="layer" id="s2">
      <div class="s2head" id="s2head"><h2>五大招牌動作圖鑑</h2><p>看他如何再現每個經典瞬間</p></div>

      <div class="player" id="player">
        <div class="armL"></div><div class="armR"></div>

      <div class="pill"><div class="ic">★</div><span class="label">收集徽章，蓋章解鎖成就</span></div>

<script>
/* ===================== 看台裝飾（兩層人群點陣） ===================== */
(function(){
  const crowd = document.getElementById('crowd');
  const cols = ['#31406b','#443454','#553a45','#2c3550','#ffd166','#ef3b4a'];
  let html = '';
  for (let i = 0; i < 180; i++){
    const c = cols[(Math.random() * cols.length) | 0];
    html += '<i style="background:' + c + ';opacity:' + (0.35 + Math.random() * 0.55).toFixed(2) + '"></i>';
  }
  crowd.innerHTML = html;
})();

/* ===================== Web Audio 預告片音效引擎 =====================
   母線：master → DynamicsCompressor → destination；程序化殘響 send
   聲音預設開啟：載入即建立，被瀏覽器擋下時首次點擊/按鍵自動恢復 */
let actx = null, master = null, verbSend = null, muted = false;
function ac(){
  if (!actx){
    actx = new (window.AudioContext || window.webkitAudioContext)();
    const comp = actx.createDynamicsCompressor();
    comp.threshold.value = -16; comp.ratio.value = 6; comp.release.value = 0.24;
    comp.connect(actx.destination);
    master = actx.createGain(); master.gain.value = 0.9; master.connect(comp);
    const verb = actx.createConvolver();
    const sr = actx.sampleRate, n = Math.floor(sr * 1.8);
    const buf = actx.createBuffer(2, n, sr);
    for (let c = 0; c < 2; c++){ const d = buf.getChannelData(c);
      for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 2.5); }
    verb.buffer = buf;
    verbSend = actx.createGain(); verbSend.gain.value = 0.85;
    verbSend.connect(verb); verb.connect(master);
  }
  return actx;
}
function toBus(g, wet){
  g.connect(master);
  if (wet > 0){ const s = actx.createGain(); s.gain.value = wet; g.connect(s); s.connect(verbSend); }
}
function noiseBuf(dur, decay){
  const c = ac(), n = Math.floor(c.sampleRate * dur);
  const buf = c.createBuffer(1, n, c.sampleRate), d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, decay);
  return buf;
}
function chime(freq, dur, delay, type, vol){
  if (muted) return;
  const c = ac(); const t0 = c.currentTime + (delay || 0);
  const o = c.createOscillator(), g = c.createGain();
  o.type = type || 'sine'; o.frequency.setValueAtTime(freq * (0.997 + Math.random() * 0.006), t0);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol || .12, t0 + .02);
  g.gain.exponentialRampToValueAtTime(.0001, t0 + dur);
  o.connect(g); toBus(g, 0.3);
  o.start(t0); o.stop(t0 + dur + .05);
}
function whistle(delay){
  if (muted) return;
  const c = ac(); const t0 = c.currentTime + (delay || 0);
  const o = c.createOscillator(), g = c.createGain();
  o.type = 'square'; o.frequency.setValueAtTime(2350, t0);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(.05, t0 + .02);
  g.gain.exponentialRampToValueAtTime(.0001, t0 + .16);
  o.connect(g); toBus(g, 0.35);
  o.start(t0); o.stop(t0 + .2);
}
function roar(delay, dur, vol){
  if (muted) return;
  const c = ac(); const t0 = c.currentTime + (delay || 0);
  const src = c.createBufferSource(); src.buffer = noiseBuf(dur, 1);
  const bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.1;
  bp.frequency.setValueAtTime(220, t0);
  bp.frequency.exponentialRampToValueAtTime(650, t0 + dur);
  const g = c.createGain(); g.gain.value = vol || .12;
  src.connect(bp); bp.connect(g); toBus(g, 0.4);
  src.start(t0);
}
function boom(vol, delay){ // 預告片低音鼓點
  if (muted) return;
  const c = ac(); const t0 = c.currentTime + (delay || 0);
  const o = c.createOscillator(), g = c.createGain();
  o.frequency.setValueAtTime(120, t0);
  o.frequency.exponentialRampToValueAtTime(36, t0 + .45);
  g.gain.setValueAtTime(vol || .5, t0);
  g.gain.exponentialRampToValueAtTime(.001, t0 + .6);
  o.connect(g); toBus(g, 0.22);
  o.start(t0); o.stop(t0 + .65);
  const n = c.createBufferSource(); n.buffer = noiseBuf(.12, 3);
  const lp = c.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 220;
  const ng = c.createGain(); ng.gain.setValueAtTime((vol || .5) * .6, t0);
  ng.gain.exponentialRampToValueAtTime(.001, t0 + .12);
  n.connect(lp); lp.connect(ng); toBus(ng, 0.15); n.start(t0);
}
function braam(vol, dur){ // 衝擊銅管
  if (muted) return;
  const c = ac(); const t0 = c.currentTime;
  const lp = c.createBiquadFilter(); lp.type = 'lowpass'; lp.Q.value = 3;
  lp.frequency.setValueAtTime(180, t0);
  lp.frequency.linearRampToValueAtTime(1100, t0 + dur * .35);
  lp.frequency.linearRampToValueAtTime(240, t0 + dur);
  const g = c.createGain();
  g.gain.setValueAtTime(.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0 + .09);
  g.gain.setValueAtTime(vol, t0 + dur * .55);
  g.gain.exponentialRampToValueAtTime(.001, t0 + dur);
  lp.connect(g); toBus(g, 0.45);
  [1, 1.006, .994, 2.003].forEach(m => {
    const o = c.createOscillator(); o.type = 'sawtooth'; o.frequency.value = 58 * m;
    o.connect(lp); o.start(t0); o.stop(t0 + dur + .05);
  });
}
function riser(dur){ // 漸強接轉場
  if (muted) return;
  const c = ac(); const t0 = c.currentTime;
  const n = c.createBufferSource(); n.buffer = noiseBuf(dur + .1, 0.2);
  const bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.4;
  bp.frequency.setValueAtTime(260, t0);
  bp.frequency.exponentialRampToValueAtTime(4200, t0 + dur);
  const g = c.createGain();
  g.gain.setValueAtTime(.0001, t0);
  g.gain.exponentialRampToValueAtTime(.26, t0 + dur);
  g.gain.linearRampToValueAtTime(.0001, t0 + dur + .06);
  n.connect(bp); bp.connect(g); toBus(g, 0.35); n.start(t0);
}
function sting(){ boom(.85); braam(.5, 2.0); chime(1046, .8, .18, 'sine', .14); chime(1568, .9, .32, 'sine', .12); }

/* ---- 背景配樂：勝利進行曲和弦＋低音鼓心跳 ---- */
let musicNodes = [], musicTimer = null, beatTimer = null;
const CHORDS = [
  [261.63, 329.63, 392.00],
  [293.66, 349.23, 440.00],
  [220.00, 261.63, 329.63],
  [349.23, 440.00, 523.25],
];
const BASS = [130.81, 146.83, 110.00, 174.61];
function playChord(freqs, bassFreq, t0, dur){
  const c = ac();
  freqs.forEach(f => {
    const o = c.createOscillator(), g = c.createGain();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(f, t0);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(.02, t0 + .4);
    g.gain.linearRampToValueAtTime(.014, t0 + dur - .6);
    g.gain.linearRampToValueAtTime(0, t0 + dur);
    const lp = c.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 1400;
    o.connect(lp); lp.connect(g); toBus(g, 0.25);
    o.start(t0); o.stop(t0 + dur + .05);
    musicNodes.push(o);
  });
  const bo = c.createOscillator(), bg = c.createGain();
  bo.type = 'triangle'; bo.frequency.setValueAtTime(bassFreq, t0);
  bg.gain.setValueAtTime(0, t0);
  bg.gain.linearRampToValueAtTime(.05, t0 + .05);
  bg.gain.linearRampToValueAtTime(0, t0 + dur * .85);
  bo.connect(bg); toBus(bg, 0.1);
  bo.start(t0); bo.stop(t0 + dur + .05);
  musicNodes.push(bo);
}
function startMusic(){
  stopMusic();
  const c = ac();
  const barDur = 5;
  for (let i = 0; i < CHORDS.length; i++) playChord(CHORDS[i], BASS[i], c.currentTime + i * barDur, barDur);
  musicTimer = setTimeout(() => { if (!muted) startMusic(); }, CHORDS.length * barDur * 1000);
  // 低音鼓心跳（每 1.25 秒）
  let k = 0;
  beatTimer = setInterval(() => { if (!muted) boom(k++ % 2 ? .3 : .42); }, 1250);
}
function stopMusic(){
  if (musicTimer) { clearTimeout(musicTimer); musicTimer = null; }
  if (beatTimer) { clearInterval(beatTimer); beatTimer = null; }
  musicNodes.forEach(n => { try { n.stop(); } catch (e) {} });
  musicNodes = [];
}

/* 自動開聲：載入即建立音訊，被自動播放政策擋下時首次互動恢復 */

try{ ac(); }catch(e){}
tryResume();

/* ===================== 粒子層（金塵漂浮＋彩帶爆發） ===================== */
const fx = document.getElementById('fx'), fctx = fx.getContext('2d');
const stage = document.getElementById('stage');
let parts = [];
function fxResize(){
  const r = stage.getBoundingClientRect();
  const dpr = Math.min(devicePixelRatio || 1, 2);
  fx.width = r.width * dpr; fx.height = r.height * dpr;
  fctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
addEventListener('resize', fxResize); fxResize();
const glowDot = (() => {
  const c = document.createElement('canvas'); c.width = c.height = 64;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(32, 32, 0, 32, 32, 32);
  gr.addColorStop(0, 'rgba(255,224,140,1)'); gr.addColorStop(.4, 'rgba(255,209,102,.4)'); gr.addColorStop(1, 'rgba(255,209,102,0)');
  g.fillStyle = gr; g.fillRect(0, 0, 64, 64);
  return c;
})();
function burstConfetti(cx, cy){
  const w = fx.width / Math.min(devicePixelRatio || 1, 2), h = fx.height / Math.min(devicePixelRatio || 1, 2);
  for (let i = 0; i < 48; i++){
    const a = Math.random() * Math.PI * 2, sp = 90 + Math.random() * 280;
    parts.push({ x: w * cx, y: h * cy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 90, g: 340,
      r: 2.5 + Math.random() * 3.5, col: ['#ffd166', '#ef3b4a', '#fff', '#e0b25e'][i % 4],
      life: .7 + Math.random() * .9, max: 1.6, spin: Math.random() * 7 });
  }
}
let lastFx = 0;
(function fxLoop(now){
  requestAnimationFrame(fxLoop);
  const dt = Math.min((now - lastFx) / 1000 || 0.016, 0.08); lastFx = now;
  const w = fx.width / Math.min(devicePixelRatio || 1, 2), h = fx.height / Math.min(devicePixelRatio || 1, 2);
  fctx.clearRect(0, 0, w, h);
  if (parts.length < 46 && Math.random() < 0.3)
    parts.push({ x: Math.random() * w, y: h * (0.3 + Math.random() * 0.7), vx: (Math.random() - .5) * 14,
      vy: -8 - Math.random() * 16, g: 0, r: 2 + Math.random() * 5, dot: true, life: 2 + Math.random() * 3, max: 5 });
  for (let i = parts.length - 1; i >= 0; i--){
    const p = parts[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += (p.g || 0) * dt; p.life -= dt;
    if (p.life <= 0){ parts.splice(i, 1); continue; }
    const a = Math.min(1, p.life / p.max * 2.2);
    if (p.dot){
      fctx.globalAlpha = a * .5;
      fctx.drawImage(glowDot, p.x - p.r * 2, p.y - p.r * 2, p.r * 4, p.r * 4);
    } else {
      fctx.save();
      fctx.globalAlpha = a;
      fctx.translate(p.x, p.y); fctx.rotate((p.spin || 0) * p.life);
      fctx.fillStyle = p.col;
      fctx.fillRect(-p.r, -p.r / 2, p.r * 2, p.r);
      fctx.restore();
    }
  }
  fctx.globalAlpha = 1;
})(0);

const camEl = document.getElementById('cam'), shkEl = document.getElementById('shk');

function camMove(kf, dur, ez){

function shake(amp){
  const kf = [{ transform: 'translate(0,0)' }];
  for (let i = 0; i < 6; i++){
    const d = amp * (1 - i / 6);
    kf.push({ transform: `translate(${(Math.random() * 2 - 1) * d}px,${(Math.random() * 2 - 1) * d}px)` });
  }
  kf.push({ transform: 'translate(0,0)' });
  shkEl.animate(kf, { duration: 380, easing: 'linear' });
}
function flash(){ flashEl.classList.remove('go'); void flashEl.offsetWidth; flashEl.classList.add('go'); }
