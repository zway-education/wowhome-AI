<!doctype html>
<!-- 專業AI升級 v6 -->
<!-- v6 摘要：自動播放＋聲音預設開啟＋電影運鏡（每景推鏡/拉鏡與換景震動）＋letterbox＋閃白/入黑轉場＋逐字標題與光暈掃過＋烘焙暈影/膠片顆粒/燈光bloom＋Web Audio 預告片音效（換景whoosh/入住鼓點/泳池riser+braam/結尾定格重音＋壓縮殘響母線與配樂ducking） -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>飯店入住體驗 - 介紹版影片</title>
<meta name="author" content="AI未來創作營隊">
<style>
  :root{
    --cyan:#38e1ff; --blue:#4f7cff; --purple:#9a6bff; --pink:#ff6cc7;
    --bg:#070b14; --card:#101728; --card-b:#28324a; --text:#eaf1ff; --dim:#8ea0c2;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
    font-family:-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
    -webkit-user-select:none;user-select:none;overscroll-behavior:none;touch-action:none}
  #stage{position:relative;width:100%;height:100%}
  canvas#scene{display:block;width:100%;height:100%}

  #caption{position:absolute;left:50%;bottom:9%;transform:translateX(-50%);
    background:rgba(10,14,26,.72);border:1px solid var(--card-b);border-radius:999px;
    padding:10px 26px;font-size:clamp(14px,2.6vw,22px);font-weight:600;white-space:nowrap;
    opacity:0;transition:opacity .5s ease;pointer-events:none;letter-spacing:.02em;
    box-shadow:0 10px 26px rgba(0,0,0,.4)}
  #caption.show{opacity:1}

  #muteBtn{position:absolute;top:14px;right:14px;width:48px;height:48px;border-radius:50%;
    background:var(--card);border:1px solid var(--card-b);font-size:19px;cursor:pointer;z-index:30;padding:0;color:var(--text)}

  .ovl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 30%, rgba(30,40,70,.7) 0%, rgba(4,6,14,.92) 100%);z-index:40}
  .ovl .card{background:var(--card);border:1px solid var(--card-b);border-radius:16px;
    padding:30px 34px 26px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.5);max-width:min(440px,90vw)}
  .brand{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
  .card h1,.card h2{margin:0 0 6px;font-size:26px;
    background:linear-gradient(92deg,var(--cyan),var(--blue),var(--purple));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .rule{width:52px;height:2px;background:linear-gradient(92deg,var(--cyan),var(--purple));margin:10px auto 14px;border-radius:2px}
  .card p{color:var(--dim);font-size:13.5px;line-height:1.7;margin:0 0 16px}
  .bigbtn{display:block;width:100%;margin:8px 0 0;font:600 16px inherit;min-height:52px;
    background:linear-gradient(92deg,var(--cyan),var(--blue));color:#04101f;border:none;
    padding:13px 24px;border-radius:999px;cursor:pointer;box-shadow:0 8px 20px rgba(56,225,255,.25)}
  .bigbtn:active{transform:scale(.97)}
  #endOvl{display:none}
</style>
</head>
<body>
<div id="stage">
  <canvas id="scene"></canvas>
  <div id="caption"></div>
  <button id="muteBtn" aria-label="切換音效">🔇</button>

  <div class="ovl" id="startOvl">
    <div class="card">
      <div class="brand">AI未來創作營隊</div>
      <h1>飯店入住體驗</h1>
      <div class="rule"></div>
      <p>AMY 與 RUBY 的飯店入住小旅程 — 30 秒介紹動畫，點下方按鈕開啟音樂與播放。</p>
      <button class="bigbtn" id="startBtn">▶ 播放（含音樂）</button>
    </div>
  </div>

  <div class="ovl" id="endOvl">
    <div class="card">
      <div class="brand">AI未來創作營隊</div>
      <h2>飯店入住體驗</h2>
      <div class="rule"></div>
      <p>快來體驗 AMY 與 RUBY 的完整飯店冒險吧！</p>
      <button class="bigbtn" id="replayBtn">🔁 重新播放</button>
    </div>
  </div>
</div>

<script>
'use strict';
(function(){
const $ = id => document.getElementById(id);
const stage = $('stage'), canvas = $('scene'), ctx = canvas.getContext('2d');
const captionEl = $('caption'), muteBtn = $('muteBtn'), startOvl = $('startOvl'), endOvl = $('endOvl');
const clamp=(v,a,b)=> v<a?a:v>b?b:v;
const lerp=(a,b,t)=> a+(b-a)*t;
const easeInOut=t=> t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
const easeOutBack=t=>{const c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2);};

/* ---------- 邏輯畫布（16:9） ---------- */
const LW=960, LH=540;
let scale=1, offX=0, offY=0;
function resize(){
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  const w = stage.clientWidth, h = stage.clientHeight;
  canvas.width = Math.round(w*dpr); canvas.height = Math.round(h*dpr);
  canvas.style.width=w+'px'; canvas.style.height=h+'px';
  scale = Math.min(w/LW, h/LH);
  offX = (w - LW*scale)/2; offY = (h - LH*scale)/2;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize', resize);
resize();

/* ---------- 音效 / 音樂（Web Audio 合成） ---------- */
/* v6：母線 DynamicsCompressor＋程序化殘響＋配樂子匯流排（braam 時 ducking），聲音預設開啟 */
let AC=null, master=null, musicGain=null, VERB=null, NOISE_BUF=null, muted=false;
function initAudio(){
  if(AC) return;
  AC = new (window.AudioContext||window.webkitAudioContext)();
  const comp = AC.createDynamicsCompressor();
  comp.threshold.value=-16; comp.knee.value=18; comp.ratio.value=7;
  comp.attack.value=0.004; comp.release.value=0.2;
  comp.connect(AC.destination);
  master = AC.createGain(); master.gain.value = 0.5; master.connect(comp);
  musicGain = AC.createGain(); musicGain.gain.value = 1; musicGain.connect(master);
  VERB = AC.createConvolver();
  (function(){
    const rate=AC.sampleRate, len=(rate*1.8)|0, buf=AC.createBuffer(2,len,rate);
    for(let ch=0;ch<2;ch++){ const d=buf.getChannelData(ch);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.7)*0.55; }
    VERB.buffer=buf;
  })();
  const vg = AC.createGain(); vg.gain.value=0.85; VERB.connect(vg); vg.connect(master);
  NOISE_BUF = (function(){
    const rate=AC.sampleRate, len=(rate*1.5)|0, buf=AC.createBuffer(1,len,rate);
    const d=buf.getChannelData(0); for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
    return buf;
  })();
}
function tone(freq, t0, dur, type, vol, gainNode){
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  o.connect(g); g.connect(gainNode||musicGain);
  o.start(t0); o.stop(t0+dur+0.05);
}
function duckMusic(level, hold){
  if(!musicGain) return;
  const g=musicGain.gain, t=AC.currentTime;
  g.cancelScheduledValues(t); g.setValueAtTime(g.value,t);
  g.linearRampToValueAtTime(level, t+0.05);
  g.linearRampToValueAtTime(1, t+(hold||0.9));
}
/* v6 換景 whoosh */
function sfxWhoosh(){
  if(!AC||muted) return;
  const t0=AC.currentTime;
  const src=AC.createBufferSource(); src.buffer=NOISE_BUF; src.loop=true;
  const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=1.2;
  bp.frequency.setValueAtTime(2200,t0);
  bp.frequency.exponentialRampToValueAtTime(280,t0+0.38);
  const g=AC.createGain();
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(0.22,t0+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+0.38);
  src.connect(bp); bp.connect(g); g.connect(master); g.connect(VERB);
  src.start(t0); src.stop(t0+0.45);
}
/* v6 braam 衝擊（標題/跳水/片尾） */
function braam(vol){
  if(!AC||muted) return;
  const t0=AC.currentTime;
  duckMusic(0.3, 1.3);
  [55, 55.8, 27.5].forEach((f,i)=>{
    const o=AC.createOscillator(), g=AC.createGain(), lp=AC.createBiquadFilter();
    o.type='sawtooth'; o.frequency.value=f;
    lp.type='lowpass'; lp.Q.value=3;
    lp.frequency.setValueAtTime(90,t0);
    lp.frequency.exponentialRampToValueAtTime(520,t0+0.26);
    lp.frequency.exponentialRampToValueAtTime(110,t0+1.4);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(vol*(i===2?0.7:0.5),t0+0.06);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+1.5);
    o.connect(lp); lp.connect(g); g.connect(master); g.connect(VERB);
    o.start(t0); o.stop(t0+1.6);
  });
}
/* v6 riser（高潮前漸強） */
function riser(dur){
  if(!AC||muted) return;
  const t0=AC.currentTime;
  const src=AC.createBufferSource(); src.buffer=NOISE_BUF; src.loop=true;
  const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=1.3;
  bp.frequency.setValueAtTime(240,t0);
  bp.frequency.exponentialRampToValueAtTime(3000,t0+dur);
  const g=AC.createGain();
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(0.13,t0+dur);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur+0.08);
  src.connect(bp); bp.connect(g); g.connect(master); g.connect(VERB);
  src.start(t0); src.stop(t0+dur+0.15);
}
/* v6 片尾定格重音 */
function stinger(){
  if(!AC||muted) return;
  braam(0.42);
  const t0=AC.currentTime;
  [523.25,783.99,1046.5].forEach((f,i)=>{
    const o=AC.createOscillator(), g=AC.createGain();
    o.type='triangle'; o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,t0+0.12*i);
    g.gain.exponentialRampToValueAtTime(0.11,t0+0.12*i+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+0.12*i+1.1);
    o.connect(g); g.connect(master); g.connect(VERB);
    o.start(t0+0.12*i); o.stop(t0+0.12*i+1.2);
  });
}
function sfxChime(){
  if(!AC||muted) return;
  const t=AC.currentTime;
  [880,1108,1318].forEach((f,i)=> tone(f, t+i*0.06, 0.28, 'triangle', 0.18));
}
function sfxSplash(){
  if(!AC||muted) return;
  const t=AC.currentTime;
  const bufSize = AC.sampleRate*0.35;
  const buf = AC.createBuffer(1, bufSize, AC.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<bufSize;i++){ d[i] = (Math.random()*2-1) * (1 - i/bufSize); }
  const src = AC.createBufferSource(); src.buffer = buf;
  const g = AC.createGain(); g.gain.setValueAtTime(0.22, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t+0.35);
  const filt = AC.createBiquadFilter(); filt.type='bandpass'; filt.frequency.value=1800;
  src.connect(filt); filt.connect(g); g.connect(master);
  src.start(t);
}

/* 開心的背景音樂：C大調 ukulele 風格琶音 + 節奏鼓，30 秒無縫循環 */
const MEL = [523.25,659.25,783.99,659.25, 523.25,659.25,783.99,1046.5,
             880.00,783.99,659.25,783.99, 698.46,659.25,523.25,587.33];
let musicTimer=null, musicStep=0;
function scheduleMusic(){
  if(!AC||muted) return;
  const stepDur = 0.30;
  if(AC.state!=='running'){ musicTimer = setTimeout(scheduleMusic, stepDur*1000); return; }
  const t = AC.currentTime + 0.05;
  const note = MEL[musicStep % MEL.length];
  tone(note, t, stepDur*0.9, 'triangle', 0.09);
  tone(note/2, t, stepDur*0.9, 'sine', 0.05);
  if(musicStep % 4 === 0) tone(note*2, t+0.02, 0.12, 'square', 0.03);
  if(musicStep % 2 === 1){ // v6 hi-hat 輕鈸
    const src=AC.createBufferSource(); src.buffer=NOISE_BUF; src.loop=true;
    const hp=AC.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=6400;
    const hg=AC.createGain(); hg.gain.setValueAtTime(0.028,t);
    hg.gain.exponentialRampToValueAtTime(0.0005,t+0.05);
    src.connect(hp); hp.connect(hg); hg.connect(musicGain);
    src.start(t); src.stop(t+0.07);
  }
  if(musicStep % 8 === 0){ // kick-ish thump
    const g=AC.createGain(); g.gain.setValueAtTime(0.16,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.15);
    const o=AC.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(140,t); o.frequency.exponentialRampToValueAtTime(50,t+0.15);
    o.connect(g); g.connect(musicGain); o.start(t); o.stop(t+0.16);
  }
  musicStep++;
  musicTimer = setTimeout(scheduleMusic, stepDur*1000);
}
function startMusic(){ if(musicTimer) return; musicStep=0; scheduleMusic(); }
function stopMusic(){ if(musicTimer){ clearTimeout(musicTimer); musicTimer=null; } }

muteBtn.addEventListener('click', ()=>{
  muted = !muted;
  muteBtn.textContent = muted ? '🔇' : '🔊';
  if(!muted){ initAudio(); if(AC.state==='suspended') AC.resume(); startMusic(); }
  else stopMusic();
});

/* ---------- v6 烘焙資產與電影感工具 ---------- */
function bakeTex(w,h,fn){ const c=document.createElement('canvas'); c.width=w; c.height=h; fn(c.getContext('2d'),w,h); return c; }
const vigTex = bakeTex(480,270,(g,w,h)=>{
  const r = g.createRadialGradient(w/2,h/2,h*0.36,w/2,h/2,h*0.86);
  r.addColorStop(0,'rgba(0,0,0,0)'); r.addColorStop(0.7,'rgba(4,7,16,0.16)'); r.addColorStop(1,'rgba(4,7,16,0.46)');
  g.fillStyle=r; g.fillRect(0,0,w,h);
});
const glowTex = bakeTex(128,128,(g)=>{
  const r = g.createRadialGradient(64,64,0,64,64,64);
  r.addColorStop(0,'rgba(255,233,168,0.9)'); r.addColorStop(0.45,'rgba(255,210,120,0.28)'); r.addColorStop(1,'rgba(255,210,120,0)');
  g.fillStyle=r; g.fillRect(0,0,128,128);
});
const glowCool = bakeTex(128,128,(g)=>{
  const r = g.createRadialGradient(64,64,0,64,64,64);
  r.addColorStop(0,'rgba(140,220,255,0.9)'); r.addColorStop(0.45,'rgba(90,150,255,0.25)'); r.addColorStop(1,'rgba(90,150,255,0)');
  g.fillStyle=r; g.fillRect(0,0,128,128);
});
const sweepBand = bakeTex(240,60,(g,w,h)=>{
  const lg = g.createLinearGradient(0,0,w,0);
  lg.addColorStop(0,'rgba(255,255,255,0)'); lg.addColorStop(0.5,'rgba(255,255,255,0.85)'); lg.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle = lg; g.fillRect(0,0,w,h);
  const vgrad = g.createLinearGradient(0,0,0,h);
  vgrad.addColorStop(0,'rgba(0,0,0,0)'); vgrad.addColorStop(0.5,'rgba(0,0,0,1)'); vgrad.addColorStop(1,'rgba(0,0,0,0)');
  g.globalCompositeOperation='destination-in';
  g.fillStyle = vgrad; g.fillRect(0,0,w,h);
});
const grainTiles = [0,1,2].map(()=> bakeTex(160,160,(g,w,h)=>{
  const id = g.createImageData(w,h);
  for(let i=0;i<id.data.length;i+=4){
    const v=(Math.random()*255)|0;
    id.data[i]=id.data[i+1]=id.data[i+2]=v; id.data[i+3]=11;
  }
  g.putImageData(id,0,0);
}));
const grainPats = grainTiles.map(tx => ctx.createPattern(tx,'repeat'));
function bakeChars(text, px, colors, glowColor){
  const meas = bakeTex(8,8,()=>{}).getContext('2d');
  meas.font = '700 ' + px + 'px "PingFang TC","Microsoft JhengHei",sans-serif';
  return [...text].map((ch,i)=>{
    const w = Math.ceil(meas.measureText(ch).width) + 46;
    const h = px + 52;
    const c = bakeTex(w,h,(g)=>{
      g.font = '700 ' + px + 'px "PingFang TC","Microsoft JhengHei",sans-serif';
      g.textAlign='center'; g.textBaseline='middle';
      g.shadowColor = glowColor; g.shadowBlur = 22;
      g.fillStyle = colors[i % colors.length];
      g.fillText(ch, w/2, h/2);
      g.shadowBlur = 8;
      g.fillText(ch, w/2, h/2);
    });
    return {c,w,h};
  });
}
const TITLE_CHARS = bakeChars('飯店入住體驗', 54, ['#38e1ff','#5fb0ff','#4f7cff','#7a74ff','#9a6bff','#c579ff'], 'rgba(110,170,255,0.95)');
function drawTitleChars(chars, cx, cy, t, stagger, dur, sweepAt){
  let total=0; chars.forEach(s => total += s.w - 30);
  let x = cx - total/2;
  let minX=1e9, maxX=-1e9;
  chars.forEach((s,i)=>{
    const p = clamp((t - i*stagger)/dur, 0, 1);
    const w = s.w - 30;
    if(p>0){
      const e = easeOutBack(p);
      ctx.save();
      ctx.globalAlpha = clamp(p*1.6,0,1);
      ctx.translate(x+w/2, cy+(1-e)*32);
      ctx.scale(0.6+0.4*e, 0.6+0.4*e);
      ctx.drawImage(s.c, -s.w/2, -s.h/2);
      ctx.restore();
      minX=Math.min(minX,x); maxX=Math.max(maxX,x+w);
    }
    x += w;
  });
  if(sweepAt!==undefined && t>sweepAt && t<sweepAt+0.9 && maxX>minX){
    const p = (t-sweepAt)/0.9;
    const sx = lerp(minX-100, maxX+100, easeInOut(p));
    ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.85;
    ctx.drawImage(sweepBand, sx-60, cy-52, 120, 104);
    ctx.restore();
  }
}
let trans = {t:99, type:'none'};
function triggerTrans(type){ trans = {t:0, type}; }
let camShake = 0, prevT = 0;
const LB_H = 50;
function drawCinema(t, dt){
  trans.t += dt;
  if(trans.type==='flash' && trans.t<0.35){
    ctx.save(); ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha = (1-trans.t/0.35)*0.7;
    ctx.fillStyle='#eaf3ff'; ctx.fillRect(0,0,LW,LH);
    ctx.restore();
  } else if(trans.type==='fade' && trans.t<0.6){
    ctx.save(); ctx.globalAlpha = Math.sin(Math.PI*clamp(trans.t/0.6,0,1))*0.75;
    ctx.fillStyle='#070b14'; ctx.fillRect(0,0,LW,LH);
    ctx.restore();
  }
  ctx.drawImage(vigTex, 0, 0, LW, LH);
  ctx.save(); ctx.globalAlpha=0.5;
  ctx.fillStyle = grainPats[(t*14|0)%3];
  ctx.fillRect(0,0,LW,LH);
  ctx.restore();
  const lb = LB_H * (1 - Math.pow(1-clamp(t/1.4,0,1), 3));
  ctx.fillStyle='#04060d';
  ctx.fillRect(0,0,LW,lb);
  ctx.fillRect(0,LH-lb,LW,lb);
}
/* v6 每景運鏡設定（推鏡/拉鏡交替＋輕微平移） */
const CAM_PROFILES = {
  title:      {z0:1.10,z1:1.03,x0:0,x1:0,y0:-6,y1:0},
  garden:     {z0:1.03,z1:1.09,x0:-16,x1:10,y0:0,y1:4},
  lobby:      {z0:1.10,z1:1.04,x0:12,x1:-8,y0:2,y1:-2},
  elevator:   {z0:1.02,z1:1.12,x0:0,x1:0,y0:-4,y1:2},
  room:       {z0:1.09,z1:1.03,x0:-10,x1:8,y0:2,y1:-2},
  restaurant: {z0:1.03,z1:1.10,x0:10,x1:-8,y0:-2,y1:3},
  bath:       {z0:1.08,z1:1.03,x0:-8,x1:6,y0:2,y1:-2},
  wardrobe:   {z0:1.03,z1:1.09,x0:8,x1:-6,y0:-2,y1:2},
  pool:       {z0:1.04,z1:1.13,x0:-12,x1:8,y0:0,y1:4},
  end:        {z0:1.09,z1:1.02,x0:0,x1:0,y0:4,y1:0},
};
function camBegin(name, u){
  ctx.save();
  const c = CAM_PROFILES[name] || {z0:1.02,z1:1.02,x0:0,x1:0,y0:0,y1:0};
  const p = easeInOut(clamp(u,0,1));
  let z = lerp(c.z0, c.z1, p), ox = lerp(c.x0, c.x1, p), oy = lerp(c.y0, c.y1, p);
  if(camShake > 0.05){
    z += camShake*0.004;
    ox += (Math.random()-0.5)*camShake;
    oy += (Math.random()-0.5)*camShake*0.7;
    camShake *= 0.86;
  }
  const mx = LW/2*(1-1/z)-0.5, my = LH/2*(1-1/z)-0.5;
  ox = clamp(ox, -mx, mx); oy = clamp(oy, -my, my);
  ctx.translate(LW/2, LH/2); ctx.scale(z,z); ctx.translate(-LW/2-ox, -LH/2-oy);
}
function camEnd(){ ctx.restore(); }

/* ---------- 角色繪製：AMY 與 RUBY「直接移植自遊戲《飯店入住體驗-2》drawPlayer」，同一套代碼保證造型一致 ---------- */
function shadeColor(hex, percent){
  const num = parseInt(hex.slice(1),16);
  const r = clamp((num>>16) + Math.round(2.55*percent), 0, 255);
  const g = clamp(((num>>8)&0xff) + Math.round(2.55*percent), 0, 255);
  const b = clamp((num&0xff) + Math.round(2.55*percent), 0, 255);
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}
function roundRectPath(g,x,y,w,h,r){
  g.beginPath();
  g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r);
  g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath();
}
const GIRLS = [
  { idx:0, name:'AMY',  color:'#ff6cc7', dress:'#ff8fd3', hair:'#7a3a5a' },
  { idx:1, name:'RUBY', color:'#38e1ff', dress:'#7fe6ff', hair:'#2a3a6a' }
];
// opts: {moving, expr:'happy'|'normal', outfit:'normal'|'swim', holding:'suitcase'|'key'|null, dir, showName}
function drawGirl(x, y, sc, idx, walk, t, opts){
  opts = opts || {};
  const p = GIRLS[idx];
  const moving = opts.moving !== false;
  const dir = opts.dir || 1;
  ctx.save();
  ctx.translate(x,y);
  ctx.beginPath(); ctx.ellipse(0, 26*sc, 20*sc, 7*sc, 0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,.3)'; ctx.fill();
  ctx.scale(dir,1);
  const walkA = moving ? Math.sin(walk)*14 : 0;
  const bob = moving ? Math.abs(Math.sin(walk))* -2 : Math.sin(t*2+idx)*1;
  ctx.translate(0, bob*sc);
  // 腳
  const legCol = opts.outfit==='swim' ? '#f0c8a0' : '#2a3346';
  ctx.fillStyle = legCol;
  ctx.fillRect(-9*sc, (10+Math.max(0,walkA*.3))*sc, 7*sc, 16*sc);
  ctx.fillRect(2*sc, (10+Math.max(0,-walkA*.3))*sc, 7*sc, 16*sc);
  ctx.strokeStyle = shadeColor(legCol,-28); ctx.lineWidth=.8*sc;
  ctx.strokeRect(-9*sc, (10+Math.max(0,walkA*.3))*sc, 7*sc, 16*sc);
  ctx.strokeRect(2*sc, (10+Math.max(0,-walkA*.3))*sc, 7*sc, 16*sc);
  ctx.fillStyle='#e8b58c';
  ctx.fillRect(-9*sc, (22+Math.max(0,walkA*.3))*sc, 7*sc, 4*sc);
  ctx.fillRect(2*sc, (22+Math.max(0,-walkA*.3))*sc, 7*sc, 4*sc);
  // 身體（洋裝＝上衣＋裙襬／泳裝）
  const bodyH = (opts.outfit==='swim' ? 17 : 20) * sc;
  const bodyG = ctx.createLinearGradient(-13*sc,-10*sc,13*sc,bodyH);
  bodyG.addColorStop(0,shadeColor(p.dress,14));
  bodyG.addColorStop(.55,p.dress);
  bodyG.addColorStop(1,shadeColor(p.color,-16));
  ctx.fillStyle=bodyG;
  roundRectPath(ctx,-13*sc, -10*sc, 26*sc, bodyH, 8*sc); ctx.fill();
  ctx.strokeStyle=shadeColor(p.color,-32); ctx.lineWidth=1.2*sc; ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.22)';
  roundRectPath(ctx,-9*sc,-8*sc,5*sc,bodyH*.5,2.5*sc); ctx.fill();
  if(opts.outfit!=='swim'){
    ctx.beginPath();
    ctx.moveTo(-13*sc, 8*sc); ctx.lineTo(13*sc, 8*sc);
    ctx.lineTo(17*sc, 16*sc); ctx.lineTo(-17*sc, 16*sc); ctx.closePath();
    const skirtG = ctx.createLinearGradient(0,8*sc,0,16*sc);
    skirtG.addColorStop(0,p.color); skirtG.addColorStop(1,shadeColor(p.color,-22));
    ctx.fillStyle=skirtG; ctx.fill();
    ctx.strokeStyle=shadeColor(p.color,-38); ctx.lineWidth=1*sc; ctx.stroke();
  }
  // 手臂
  const armSwing = moving ? Math.sin(walk)*10 : 0;
  const armCol = opts.outfit==='swim' ? '#f0c8a0' : p.dress;
  ctx.fillStyle = armCol; ctx.strokeStyle = shadeColor(armCol,-26); ctx.lineWidth=.8*sc;
  ctx.save(); ctx.translate(-13*sc, -2*sc); ctx.rotate(armSwing*Math.PI/180);
  ctx.fillRect(-4*sc,0,8*sc,16*sc); ctx.strokeRect(-4*sc,0,8*sc,16*sc); ctx.restore();
  ctx.save(); ctx.translate(13*sc, -2*sc); ctx.rotate(-armSwing*Math.PI/180);
  ctx.fillRect(-4*sc,0,8*sc,16*sc); ctx.strokeRect(-4*sc,0,8*sc,16*sc); ctx.restore();
  // 提著的東西（遊戲同款行李箱／房卡）
  if(opts.holding==='suitcase'){
    ctx.save(); ctx.translate(15*sc, 12*sc); ctx.rotate(Math.sin(walk)*.06);
    ctx.fillStyle='#a5732e'; ctx.strokeStyle='#5a3c17'; ctx.lineWidth=1.5*sc;
    roundRectPath(ctx,-8*sc,-6*sc,16*sc,12*sc,3*sc); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#e8c98a'; ctx.fillRect(-2*sc,-8*sc,4*sc,3*sc);
    ctx.restore();
  } else if(opts.holding==='key'){
    ctx.save(); ctx.translate(15*sc, 10*sc); ctx.rotate(Math.sin(t*4)*.2);
    ctx.fillStyle='#ffcf5c'; ctx.strokeStyle='#c98d1f'; ctx.lineWidth=1*sc;
    roundRectPath(ctx,-6*sc,-8*sc,12*sc,16*sc,2*sc); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#c98d1f'; ctx.beginPath(); ctx.arc(0,-4*sc,2*sc,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  // 頭＋髮＋表情
  const headG = ctx.createRadialGradient(-4*sc,-24*sc,2*sc, 0,-20*sc,14*sc);
  headG.addColorStop(0,'#ffe0bd'); headG.addColorStop(.6,'#f0c8a0'); headG.addColorStop(1,'#d9a879');
  ctx.fillStyle=headG;
  ctx.beginPath(); ctx.arc(0, -20*sc, 12*sc, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(120,80,50,.35)'; ctx.lineWidth=1*sc; ctx.stroke();
  const hairG = ctx.createLinearGradient(0,-38*sc,0,-10*sc);
  hairG.addColorStop(0, shadeColor(p.hair,22)); hairG.addColorStop(1, shadeColor(p.hair,-20));
  ctx.fillStyle=hairG;
  ctx.beginPath(); ctx.arc(0, -24*sc, 13*sc, Math.PI, 0); ctx.fill();
  ctx.strokeStyle=shadeColor(p.hair,-38); ctx.lineWidth=1*sc; ctx.stroke();
  ctx.fillRect(-13*sc, -24*sc, 5*sc, idx===0?18*sc:12*sc);
  ctx.fillRect(8*sc, -24*sc, 5*sc, idx===0?18*sc:12*sc);
  if(idx===1){ // RUBY 雙馬尾
    ctx.beginPath(); ctx.arc(-14*sc,-14*sc,4*sc,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(14*sc,-14*sc,4*sc,0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle='rgba(255,255,255,.25)';
  ctx.beginPath(); ctx.ellipse(-5*sc,-30*sc,3.6*sc,2*sc,-.4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = idx===0 ? '#ffcf5c' : '#ff6cc7';
  ctx.beginPath(); ctx.arc(7*sc,-30*sc,2.6*sc,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.25)'; ctx.lineWidth=.7*sc; ctx.stroke();
  const cheer = opts.expr==='happy';
  const blink = !cheer && (Math.sin(t*1.7+idx*2) > 0.96);
  ctx.fillStyle='#20242e';
  if(blink){
    ctx.strokeStyle='#20242e'; ctx.lineWidth=1.2*sc;
    ctx.beginPath(); ctx.moveTo(-6*sc,-20*sc); ctx.lineTo(-2*sc,-20*sc); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(2*sc,-20*sc); ctx.lineTo(6*sc,-20*sc); ctx.stroke();
    ctx.strokeStyle='#a55a4a'; ctx.lineWidth=1.4*sc; ctx.beginPath();
    ctx.arc(0, -15*sc, 3*sc, .2, Math.PI-.2); ctx.stroke();
  }else if(cheer){
    ctx.strokeStyle='#20242e'; ctx.lineWidth=1.4*sc; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(-4*sc,-19*sc,2.2*sc,Math.PI,0); ctx.stroke();
    ctx.beginPath(); ctx.arc(4*sc,-19*sc,2.2*sc,Math.PI,0); ctx.stroke();
    ctx.fillStyle='#7a3a2a';
    roundRectPath(ctx,-3.4*sc,-15.5*sc,6.8*sc,4.2*sc,2*sc); ctx.fill();
    ctx.fillStyle='#ff8fa8';
    ctx.beginPath(); ctx.arc(0,-13*sc,1.6*sc,0,Math.PI); ctx.fill();
  }else{
    ctx.beginPath(); ctx.arc(-4*sc, -20*sc, 1.7*sc, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4*sc, -20*sc, 1.7*sc, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(-3.4*sc,-20.6*sc,.6*sc,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4.6*sc,-20.6*sc,.6*sc,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#a55a4a'; ctx.lineWidth=1.4*sc; ctx.beginPath();
    ctx.arc(0, -15*sc, 3*sc, .2, Math.PI-.2); ctx.stroke();
  }
  ctx.fillStyle='rgba(255,130,160,.5)';
  ctx.beginPath(); ctx.arc(-7.5*sc,-16*sc,1.8*sc,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7.5*sc,-16*sc,1.8*sc,0,Math.PI*2); ctx.fill();
  ctx.restore();
  if(opts.showName!==false){
    ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
    ctx.fillStyle='rgba(255,255,255,.85)';
    ctx.fillText(p.name, x, y-46*sc);
  }
}
// 舊介面轉接：藍色→RUBY、粉色→AMY、金色→櫃檯人員（遊戲同款制服店員）
function drawKid(x,y,scaleY,color,accent,phase,expr){
  const sc = scaleY*1.45;
  const yy = y + 46*scaleY - 26*sc;
  if(color==='#ffcf5c'){ drawClerk(x, yy, sc, phase); return; }
  const idx = color==='#ff6cc7' ? 0 : 1;
  drawGirl(x, yy, sc, idx, phase*2, phase, {moving:true, expr:expr||'normal'});
}

function panel(x,y,w,h,r,fill,stroke){
  ctx.beginPath(); ctx.roundRect(x,y,w,h,r);
  if(fill){ ctx.fillStyle=fill; ctx.fill(); }
  if(stroke){ ctx.strokeStyle=stroke; ctx.lineWidth=2; ctx.stroke(); }
}

function sky(topC,botC){
  const g = ctx.createLinearGradient(0,0,0,LH);
  g.addColorStop(0, topC); g.addColorStop(1, botC);
  ctx.fillStyle=g; ctx.fillRect(0,0,LW,LH);
}

function cloud(x,y,s,alpha){
  ctx.save(); ctx.globalAlpha = alpha!==undefined?alpha:1;
  ctx.fillStyle='#ffffff';
  [[0,0,26],[22,-8,20],[-22,-6,18],[10,6,22],[-14,6,18]].forEach(p=>{
    ctx.beginPath(); ctx.arc(x+p[0]*s,y+p[1]*s,p[2]*s,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

function star(x,y,r,fill){
  ctx.save(); ctx.translate(x,y); ctx.fillStyle=fill;
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const a1 = -Math.PI/2 + i*2*Math.PI/5;
    const a2 = a1 + Math.PI/5;
    ctx.lineTo(Math.cos(a1)*r, Math.sin(a1)*r);
    ctx.lineTo(Math.cos(a2)*r*0.42, Math.sin(a2)*r*0.42);
  }
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function confetti(list, t){
  list.forEach(p=>{
    const y = (p.y0 + t*p.speed) % (LH+40) - 20;
    ctx.save(); ctx.translate(p.x, y); ctx.rotate(t*p.spin);
    ctx.fillStyle = p.color; ctx.fillRect(-4,-4,8,8);
    ctx.restore();
  });
}

function sceneBath(u){
  drawGroundScene('#2a3550','#3d4d6c', '#4a5c7e');

    const bx=LW*0.5-160+((i*47+u*60)%330), by=LH-266+((i*29)%100);
    ctx.globalAlpha=0.7; ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(bx,by,5+((i*7)%6),0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // 遊戲同款泡澡姿勢（drawBather：圓身＋頭浮出水面）＋小鴨（Day 4 找回小鴨）
  function bather(bx,by,idx){
    const p = GIRLS[idx], sc = 2.3;
    const bodyG = ctx.createRadialGradient(bx-3*sc,by-3*sc,1*sc,bx,by,10*sc);
    bodyG.addColorStop(0,shadeColor(p.color,20)); bodyG.addColorStop(1,shadeColor(p.color,-16));
    ctx.fillStyle=bodyG; ctx.beginPath(); ctx.arc(bx,by,10*sc,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=shadeColor(p.color,-32); ctx.lineWidth=1*sc; ctx.stroke();
    ctx.fillStyle='#f0c8a0'; ctx.beginPath(); ctx.arc(bx,by-10*sc,7*sc,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(120,80,50,.3)'; ctx.lineWidth=.8*sc; ctx.stroke();
    ctx.fillStyle=p.hair; ctx.beginPath(); ctx.arc(bx,by-13*sc,7.5*sc,Math.PI,0); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.2)';
    ctx.beginPath(); ctx.ellipse(bx-2.5*sc,by-16*sc,2.4*sc,1.3*sc,-.4,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#20242e'; ctx.lineWidth=1*sc;
    ctx.beginPath(); ctx.moveTo(bx-4*sc,by-10*sc); ctx.lineTo(bx-1*sc,by-10*sc); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx+1*sc,by-10*sc); ctx.lineTo(bx+4*sc,by-10*sc); ctx.stroke();
    ctx.fillStyle='rgba(255,130,160,.4)';
    ctx.beginPath(); ctx.arc(bx-5*sc,by-8*sc,1.3*sc,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(bx+5*sc,by-8*sc,1.3*sc,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#a55a4a';
    ctx.beginPath(); ctx.arc(bx, by-6*sc, 2.2*sc, .2, Math.PI-.2); ctx.stroke();
  }
  bather(LW*0.5-70, LH-218+bob, 0);
  bather(LW*0.5+70, LH-218-bob, 1);
  // 黃色小鴨（遊戲 Day 4 同款）
  [[-130,0.0],[6,0.5],[128,1.1]].forEach(([dx,ph])=>{
    const dxx = LW*0.5+dx, dyy = LH-196 + Math.sin(u*6+ph)*4;
    ctx.save(); ctx.translate(dxx,dyy);
    ctx.fillStyle='#ffd94a'; ctx.beginPath(); ctx.ellipse(0,0,11,8,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7,-8,6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff9a3d'; ctx.beginPath(); ctx.moveTo(12,-8); ctx.lineTo(18,-6); ctx.lineTo(12,-4); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#20242e'; ctx.beginPath(); ctx.arc(8.5,-9,1.2,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
  for(let i=0;i<4;i++){
    const p=(u*0.6+i*0.25)%1;
    ctx.globalAlpha = 1-p;
    ctx.beginPath(); ctx.arc(LW*0.5-70+i*46, LH-290-p*80, 7+p*7, 0, Math.PI*2);
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=1.5; ctx.stroke();
  }
  ctx.globalAlpha=1;
}

  ctx.fillRect(cx-120+dw-6, cy-88, 6, 176);

  if(swapU>0.75){

/* ---------- 主迴圈 ---------- */
let startTime=null, running=false, ended=false;
let lastSceneName=null, poolRiserFired=false, endStingerFired=false;
function render(now){
  if(!running) return;
  if(startTime===null) startTime = now;
  const t = (now - startTime)/1000;
  const dt = Math.max(0, Math.min(0.1, t - prevT)); prevT = t;

  ctx.save();
  ctx.setTransform((canvas.width/canvas.clientWidth)||1,0,0,(canvas.height/canvas.clientHeight)||1,0,0);
  ctx.clearRect(0,0,canvas.clientWidth,canvas.clientHeight);
  ctx.translate(offX,offY); ctx.scale(scale,scale);
  ctx.save(); ctx.beginPath(); ctx.rect(0,0,LW,LH); ctx.clip();

  let cur = SCENES[SCENES.length-1];
  for(const s of SCENES){ if(t>=s.t0 && t<s.t1){ cur=s; break; } }
  const u = clamp((t-cur.t0)/(cur.t1-cur.t0), 0, 1);

  // v6 換景轉場：whoosh＋閃白/入黑＋輕微鏡頭震動
  if(cur.name !== lastSceneName){
    if(lastSceneName !== null){
      sfxWhoosh();
      triggerTrans(cur.name==='end' ? 'fade' : 'flash');
      camShake = 6;
      if(cur.name==='garden') braam(0.3);
      if(cur.name==='end' && !endStingerFired){ endStingerFired=true; stinger(); camShake = 9; }
    }
    lastSceneName = cur.name;
  }
  // 泳池高潮前 riser（換裝景尾聲）
  if(!poolRiserFired && cur.name==='wardrobe' && u>0.72){ poolRiserFired=true; riser(1.15); }

  camBegin(cur.name, u);
  switch(cur.name){
    case 'title': sceneTitle(u); break;
    case 'garden': sceneGarden(u); break;
    case 'lobby': sceneLobby(u); break;
    case 'elevator': sceneElevator(u); break;
    case 'room': sceneRoom(u); break;
    case 'restaurant': sceneRestaurant(u); break;
    case 'bath': sceneBath(u); break;
    case 'wardrobe': sceneWardrobe(u); break;
    case 'pool': scenePool(u); break;
    case 'end': sceneEnd(u); break;
  }
  camEnd();
  drawCinema(t, dt);
  ctx.restore(); ctx.restore();

  setCaption(cur.caption && u<0.95 ? cur.caption : '');

  if(t>=TOTAL){
    running=false; ended=true;
    setCaption('');
    stopMusic();
    endOvl.style.display='flex';
    return;
  }
  requestAnimationFrame(render);
}

function start(){
  startOvl.style.display='none';
  endOvl.style.display='none';
  scenePool._splashed=false;
  startTime=null; running=true; ended=false;
  lastSceneName=null; poolRiserFired=false; endStingerFired=false;
  prevT=0; camShake=0; trans={t:99,type:'none'};
  requestAnimationFrame(render);
}

$('startBtn').addEventListener('click', ()=>{
  initAudio();
  if(AC.state==='suspended') AC.resume();
  muted=false; muteBtn.textContent='🔊';
  sfxChime(); startMusic();
  start();
});
$('replayBtn').addEventListener('click', ()=>{
  if(!muted){ startMusic(); }
  start();
});

// v6 自動播放：載入即播、聲音預設開啟；瀏覽器若擋自動出聲，首次互動自動解鎖
muteBtn.textContent = '🔊';
try { initAudio(); if(AC.state==='suspended') AC.resume(); startMusic(); } catch(e) {}
(function(){
  const unlock = () => { if(AC && AC.state==='suspended' && !muted) AC.resume(); };
  addEventListener('pointerdown', unlock, {once:true});
  addEventListener('keydown', unlock, {once:true});
})();
start();

})();
</script>
