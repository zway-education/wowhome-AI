const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize(){
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width  = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width  = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  canvas._scale = scale;
}
addEventListener('resize', resize); resize();

const es=u=> u*u*(3-2*u);
const sst=(t,a,b)=> es(ss(t,a,b));

/* ===== 音效：Web Audio 合成＋DynamicsCompressor 主匯流排（v6 預設開聲＋殘響） ===== */
let AC = null, master = null, noiseBuf = null;
let muted = false;
function initAudio(){
  if(!AC){
    try{
      AC = new (window.AudioContext || window.webkitAudioContext)();
      const comp = AC.createDynamicsCompressor();
      comp.threshold.value = -18; comp.knee.value = 24; comp.ratio.value = 8;
      master = AC.createGain(); master.gain.value = 0.6;
      master.connect(comp); comp.connect(AC.destination);
      // v6 程序化殘響 send（輕微空間感）
      const verb = AC.createConvolver();
      const sr = AC.sampleRate, vn = Math.floor(sr*1.4);
      const vb = AC.createBuffer(2, vn, sr);
      for(let c=0;c<2;c++){ const d = vb.getChannelData(c);
        for(let i=0;i<vn;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/vn, 2.6); }
      verb.buffer = vb;
      const send = AC.createGain(); send.gain.value = 0.16;
      master.connect(send); send.connect(verb); verb.connect(comp);
    }catch(e){}
  }
  if(AC && AC.state === 'suspended'){ const p = AC.resume(); if(p && p.catch) p.catch(()=>{}); }
}
const rp = f => f * (0.94 + Math.random()*0.12);
function beep(freq, dur, type, vol, slide, delay){
  if(muted || !AC || !master) return;
  const t0 = AC.currentTime + (delay||0);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq+slide), t0+dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0+0.012);
  g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  o.connect(g).connect(master);
  o.start(t0); o.stop(t0+dur+0.06);
}
function noise(dur, vol, delay){
  if(muted || !AC || !master) return;
  if(!noiseBuf){
    const len = Math.floor(AC.sampleRate*0.5);
    noiseBuf = AC.createBuffer(1,len,AC.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for(let i=0;i<len;i++) d[i] = (Math.random()*2-1)*(1-i/len);
  }
  const t0 = AC.currentTime + (delay||0);
  const src = AC.createBufferSource(); src.buffer = noiseBuf;
  src.playbackRate.value = 0.5/dur * (0.9+Math.random()*0.2);
  const g = AC.createGain();
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  src.connect(g).connect(master); src.start(t0);
}

const MAX_PARTS = 240;

function updateParts(dt){

function makeGlow(color, r){
  const c = document.createElement('canvas'); c.width = c.height = r*2;

  const gr = g.createRadialGradient(r,r,1, r,r,r);
  gr.addColorStop(0,color); gr.addColorStop(1,'rgba(0,0,0,0)');

}

    g.globalAlpha=0.3; g.beginPath(); g.arc(760,180,52,0,TAU); g.fill(); g.globalAlpha=1; }

    g.fillStyle = T.top; g.beginPath(); g.arc(789,73,19,0,TAU); g.fill(); }
  g.fillStyle = T.hillFar;
  g.beginPath(); g.moveTo(0,300);

  g.lineTo(GAME_W,GAME_H); g.lineTo(0,GAME_H); g.closePath(); g.fill();
  g.fillStyle = T.hillNear;

  for(const [tx,tscale] of [[80,1.15],[240,0.9],[420,1.05],[600,0.92],[760,1.1],[910,0.88]]){
    const ty = 400;
    g.fillStyle = T.trunk;

    g.fillStyle = T.leaf;
    g.beginPath(); g.arc(tx, ty-74*tscale, 40*tscale, 0, TAU); g.fill();
    g.beginPath(); g.arc(tx-30*tscale, ty-56*tscale, 28*tscale, 0, TAU); g.fill();
    g.beginPath(); g.arc(tx+30*tscale, ty-56*tscale, 28*tscale, 0, TAU); g.fill();
    g.fillStyle = T.leaf2;
    g.beginPath(); g.arc(tx-12*tscale, ty-84*tscale, 20*tscale, 0, TAU); g.fill();
    g.beginPath(); g.arc(tx+18*tscale, ty-70*tscale, 16*tscale, 0, TAU); g.fill();
    g.fillStyle = themeName==='night' ? '#c8a03a' : '#e84a3a';
    for(let f=0;f<5;f++){
      const fa = f*1.3+tx;
      g.beginPath(); g.arc(tx + Math.cos(fa)*26*tscale, ty-70*tscale + Math.sin(fa)*18*tscale, 4*tscale, 0, TAU); g.fill();
    }
  }
  const gg = g.createLinearGradient(0,460,0,GAME_H);
  gg.addColorStop(0, T.ground); gg.addColorStop(1, '#1e3320');

}

function fruitTitle(text, cx, cy, size, t0, t, fadeOut){
  if(t < t0) return;
  const outA = fadeOut ? 1 - ss(t, fadeOut, fadeOut+0.5) : 1;
  if(outA <= 0) return;
  ctx.save();
  ctx.font = '900 '+size+'px '+FONT;
  ctx.textAlign = 'left';
  const chars = [...text];
  const ws = chars.map(c=>ctx.measureText(c).width);
  const totalW = ws.reduce((a,b)=>a+b,0);
  const grad = ctx.createLinearGradient(0, cy-size, 0, cy+6);
  grad.addColorStop(0,'#fff5d6'); grad.addColorStop(0.6,'#ffcf5c'); grad.addColorStop(1,'#ff9e3d');
  let x = cx - totalW/2;
  for(let i=0;i<chars.length;i++){
    const p = clamp((t - t0 - i*0.09)/0.42, 0, 1);
    if(p > 0){
      const e = easeOutBack(p);
      ctx.globalAlpha = clamp(p*1.5,0,1)*outA;
      ctx.save();
      ctx.translate(x + ws[i]/2, cy + (1-e)*size*0.6);
      ctx.scale(0.6+e*0.4, 0.6+e*0.4);
      ctx.lineWidth = size*0.16; ctx.strokeStyle = '#204631';
      ctx.strokeText(chars[i], -ws[i]/2, 0);
      ctx.fillStyle = grad;
      ctx.fillText(chars[i], -ws[i]/2, 0);
      ctx.restore();
    }
    x += ws[i];
  }
  const done = t0 + chars.length*0.09 + 0.46;
  const sw = (t - done)/0.9;
  if(sw > 0 && sw < 1){
    ctx.globalAlpha = outA;
    const bandX = cx - totalW/2 - 50 + (totalW+100)*sw;
    const bg2 = ctx.createLinearGradient(bandX-46,0,bandX+46,0);
    bg2.addColorStop(0,'rgba(255,255,255,0)');
    bg2.addColorStop(0.5,'rgba(255,255,255,0.9)');
    bg2.addColorStop(1,'rgba(255,255,255,0)');
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = bg2;
    ctx.fillText(text, cx-totalW/2, cy);
    ctx.globalCompositeOperation = 'source-over';
  }
  ctx.restore();
}

const BSPR_W = 148, BSPR_H = 84, BSPR_OY = 30;
function bakeBasketSprite(){
  const k = Math.min(devicePixelRatio||1, 2);
  const c = document.createElement('canvas');
  c.width = BSPR_W*k; c.height = BSPR_H*k;
  const g = c.getContext('2d');
  g.scale(k,k);
  g.translate(BSPR_W/2, BSPR_OY);
  const bw = basket.w, bh = basket.h*0.64;
  const bodyPath = () => {
    g.beginPath();
    g.moveTo(-bw/2, -bh/2); g.lineTo(bw/2, -bh/2);
    g.lineTo(bw*0.42, bh/2); g.lineTo(-bw*0.42, bh/2);
    g.closePath();
  };
  g.fillStyle = 'rgba(0,0,0,.25)';
  g.beginPath(); g.ellipse(0, basket.h*0.55, bw*0.52, 8, 0, 0, TAU); g.fill();
  const grad = g.createLinearGradient(-bw*0.32,-bh/2, bw*0.32,bh/2);
  grad.addColorStop(0,'#e2a765'); grad.addColorStop(0.5,'#c98a4f'); grad.addColorStop(1,'#7c4b2e');
  g.fillStyle = grad; bodyPath(); g.fill();
  g.strokeStyle = 'rgba(60,32,8,.55)'; g.lineWidth=3; g.stroke();
  g.strokeStyle = 'rgba(70,40,10,.35)'; g.lineWidth=1.6;
  for(let i=-2;i<=2;i++){ g.beginPath(); g.moveTo(i*bw*0.16, -bh/2+2); g.lineTo(i*bw*0.13, bh/2-2); g.stroke(); }
  g.beginPath(); g.moveTo(-bw*0.46, -bh*0.12); g.lineTo(bw*0.46, -bh*0.12); g.stroke();
  g.beginPath(); g.moveTo(-bw*0.44, bh*0.2); g.lineTo(bw*0.44, bh*0.2); g.stroke();
  g.save(); bodyPath(); g.clip();
  const hi = g.createRadialGradient(-bw*0.2,-bh*0.34,1, -bw*0.2,-bh*0.34, bw*0.36);
  hi.addColorStop(0,'rgba(255,244,214,.55)'); hi.addColorStop(1,'rgba(255,244,214,0)');
  g.fillStyle = hi; g.fillRect(-bw/2,-bh/2,bw,bh);
  const ao = g.createRadialGradient(bw*0.32,bh*0.32,1, bw*0.32,bh*0.32, bw*0.55);
  ao.addColorStop(0,'rgba(28,14,4,.32)'); ao.addColorStop(1,'rgba(28,14,4,0)');
  g.fillStyle = ao; g.fillRect(-bw/2,-bh/2,bw,bh);
  g.restore();
  g.fillStyle = '#e8b878';
  g.beginPath(); g.ellipse(0, -bh/2, bw/2, 9, 0, 0, TAU); g.fill();
  g.strokeStyle = 'rgba(70,40,10,.5)'; g.lineWidth=2.4; g.stroke();
  g.fillStyle = 'rgba(255,255,255,.4)';
  g.beginPath(); g.ellipse(-bw*0.14, -bh/2-1.6, bw*0.2, 2.6, 0, 0, TAU); g.fill();
  return c;
}

  for(const side of [-1,1]){
    ctx.save();
    ctx.translate(side*bw*0.5, -bh*0.1);
    ctx.rotate(side*(0.5 - arm*1.1) + Math.sin(worldT*7 + side*2.4)*0.06*moveAmt);
    ctx.strokeStyle = '#8c5a3c'; ctx.lineWidth = 5; ctx.lineCap='round';

  if(t < 0.8) return -100;
  if(t < 2.0) return lerp(-100, 480, es(ss(t,0.8,2.0)));
  if(t < 3.4) return 480;
  if(t < 8.4) return clamp(480 + Math.sin((t-3.4)*1.6)*260, 90, 870);
  if(t < 9.0) return 480;
  if(t < 9.35) return lerp(480, 700, es(ss(t,9.0,9.35)));
  if(t < 10.4) return 700;
  if(t < 11.0) return lerp(700, 480, es(ss(t,10.4,11.0)));
  if(t < 20.4) return 480;
  if(t < 25.4) return clamp(480 + Math.sin((t-20.4)*3)*300, 80, 880);
  return 480;
}

  { name:'黃金嘉年華', theme:'night'}
];
const MONT_START = 12.4, MONT_SLICE = 1.6, MONT_END = MONT_START + LV.length*MONT_SLICE;

/* 黃金果雨（climax） */
const FRENZY_START = MONT_END, FRENZY_END = FRENZY_START + 5.0;
let frenzyItems = [];
function initFrenzy(){
  frenzyItems = [];
  const keys = GOOD_CYCLE.concat(['star','star']);
  for(let i=0;i<26;i++){
    frenzyItems.push({
      x: rnd(40, GAME_W-40), delay: rnd(0,4.3), vy: rnd(240,380),
      key: keys[i%keys.length], rot: rnd(0,TAU), spin: rnd(-2,2), wob: rnd(0,TAU)
    });
  }
}
initFrenzy();
let starsPop = 0, clearPlayed = false;

const END_START = FRENZY_END, LOOP_END = END_START + 6.2;

/* 字幕系統：三角形淡入淡出包絡 */
function cap(t, start, dur, hold){ return Math.min(ss(t,start,start+dur), 1-ss(t,start+dur+hold,start+dur+hold+dur)); }
function drawCaption(t, start, dur, hold, text, y, size, color){
  const a = cap(t,start,dur,hold);
  if(a<=0) return;
  ctx.save();
  ctx.globalAlpha = clamp(a,0,1);
  ctx.textAlign='center'; ctx.font='900 '+size+'px '+FONT;
  ctx.lineWidth = Math.max(3,size*0.16); ctx.strokeStyle='rgba(0,0,0,.5)';
  ctx.strokeText(text, GAME_W/2, y);
  ctx.fillStyle = color;
  ctx.fillText(text, GAME_W/2, y);
  ctx.restore();
}

function reset(){
  tAnim = 0; parts.length = 0; floats.length = 0; scoreDisp = 0; scoreTarget = 0;
  bombDone = false; starDone = false; phewShown = false; starsPop = 0; clearPlayed = false;
  basket.blink = 1.4; basket.mouth = 0; basket.vx = 0;
  punch = 0; flashA = 0; v6c = {}; bgmLast = -1;
  for(const ev of catchSchedule) ev.done = false;
  initFrenzy();
  hintEl.classList.add('show'); hintT = 4.5;
}
const hintEl = document.getElementById('hint');

function update(dt){
  worldT += dt; tAnim += dt;
  if(hintT > 0){ hintT -= dt; if(hintT<=0) hintEl.classList.remove('show'); }
  const t = tAnim;

  /* v6：配樂節拍（跟著影片時間軸走） */
  const bb = Math.floor(t / BGM_BEAT);
  if(bb !== bgmLast){ bgmLast = bb; bgmStep(bb, t); }
  punch = Math.max(0, punch - dt*0.3);
  flashA = Math.max(0, flashA - dt*2.6);
  /* v6：導演 cues（重音／riser／zoom-punch） */
  if(!v6c.title && t >= 0.6){ v6c.title = true; boomHit(0.6); punch = 0.05; }
  if(!v6c.riser1 && t >= FRENZY_START-1.2){ v6c.riser1 = true; riserFx(1.15); }
  if(!v6c.frenzy && t >= FRENZY_START){ v6c.frenzy = true; braamHit(0.42,1.5); flashA = 0.5; punch = 0.06; shake = Math.max(shake,6); }
  if(!v6c.riser2 && t >= END_START-1.0){ v6c.riser2 = true; riserFx(0.95); }
  if(!v6c.end && t >= END_START){
    v6c.end = true; stingFx(); flashA = 0.55; punch = 0.07; shake = Math.max(shake,8);
    for(let k=0;k<4;k++) burst(rnd(GAME_W*0.2,GAME_W*0.8), rnd(80,200), ['#ffcf5c','#ff6b5a','#aee239','#fff5d6'][k], 14, 320);
  }

  /* 籃子位置與視覺反應 */
  const prevX = basket.x;
  basket.x = basketX(t);
  basket.vx = (basket.x - prevX)/dt;
  basket.wobble = clamp(basket.vx/460, -1.4, 1.4);
  basket.sx += (1-basket.sx)*10*dt; basket.sy += (1-basket.sy)*10*dt;
  basket.blink -= dt; if(basket.blink < -0.12) basket.blink = rnd(1.6,3.4);
  basket.mouth = Math.max(0, basket.mouth - dt*3);

  /* 第2幕：接水果排程 */
  for(const ev of catchSchedule){
    if(!ev.done && t >= ev.t){
      ev.done = true;
      const bx = basketX(ev.t), by = basket.y - basket.h*0.6;
      scoreTarget += 10;
      basket.mouth = 1; basket.sx = 1.25; basket.sy = 0.75;
      sfx.catchGood();
      burst(bx, by, '#aee239', 10, 200);
      floatText(bx, by-10, '+10', '#fff5d6');
    }
  }
  scoreDisp += (scoreTarget - scoreDisp) * Math.min(1, dt*6);

  /* 第3幕：炸彈驚險閃避 */
  if(!bombDone && t >= bombEvt.catchT){
    bombDone = true;
    sfx.whoosh(); boomHit(0.7);
    shake = Math.max(shake, 8); flashA = 0.45; punch = 0.06;
    burst(480, 300, '#d94f45', 14, 240);
    floatText(480, 250, '砰！差一點！', '#ff6b5a', 22);
  }
  if(bombDone && !phewShown && t >= bombEvt.catchT + 0.5){
    phewShown = true; sfx.phew();
    basket.sx = 1.2; basket.sy = 0.82;
    floatText(basket.x, basket.y-70, '好險！', '#aee239', 24);
  }

  /* 第4幕：幸運星大加分 */
  if(!starDone && t >= starEvt.catchT){
    starDone = true;
    const bx = basketX(starEvt.catchT), by = basket.y - basket.h*0.6;
    scoreTarget += 50;
    basket.sx = 1.35; basket.sy = 0.65; basket.mouth = 1;
    sfx.catchStar();
    burst(bx, by, '#ffcf5c', 22, 260); burst(bx, by, '#fff5d6', 10, 180);
    floatText(bx, by-10, '+50 幸運星！', '#ffcf5c', 26);
    shake = Math.max(shake, 5); punch = 0.05; flashA = 0.28;
  }

  /* 高潮：黃金果雨 */
  if(t >= FRENZY_START && t < FRENZY_END){
    const ft = t - FRENZY_START;
    for(const it of frenzyItems){
      if(it.spawned) continue;
      if(ft >= it.delay){
        it.spawned = true; it.y = -30;
      }
    }
    for(const it of frenzyItems){
      if(!it.spawned || it.landed) continue;
      it.y += it.vy*dt; it.rot += it.spin*dt; it.wob += dt*3;
      if(it.y > 500){
        it.landed = true;
        burst(it.x, 440, it.key==='star' ? '#ffcf5c' : '#aee239', 8, 160);
      }
    }
  }
  if(t >= FRENZY_END - 1.2 && !clearPlayed){
    clearPlayed = true; sfx.clear();
  }
  if(clearPlayed){
    const p = ss(t, FRENZY_END-1.2, FRENZY_END-0.2);
    starsPop = Math.floor(p*3.2);
  }

  updateParts(dt); updateFloats(dt);
  shake *= Math.pow(0.001, dt);

  /* 循環：整段跑完後淡出重來 */
  if(t >= LOOP_END) reset();
}

function draw(){
  const t = tAnim;
  ctx.save();
  ctx.translate((Math.random()*2-1)*shake, (Math.random()*2-1)*shake);
  /* v6 運鏡：各幕緩慢推鏡＋zoom-punch */
  const az = t < 3.4 ? 0.05*ss(t,0,3.4)
    : t < 12.4 ? 0.038*ss(t,3.4,12.4)
    : t < MONT_END ? 0.028 + 0.014*Math.sin((t-12.4)*0.8)
    : t < FRENZY_END ? 0.05*ss(t,MONT_END,FRENZY_END)
    : 0.05*ss(t,END_START,END_START+3);
  const zz = 1 + punch + az;
  ctx.translate(GAME_W/2, GAME_H/2); ctx.scale(zz,zz); ctx.translate(-GAME_W/2, -GAME_H/2);

  /* 背景選擇 */
  let bg = BG.day, moteA = 0;
  if(t < MONT_START){ bg = BG.day; }
  else if(t < MONT_END){
    const local = t - MONT_START;
    const idx = clamp(Math.floor(local/MONT_SLICE), 0, LV.length-1);
    bg = BG[LV[idx].theme];
  } else if(t < FRENZY_END){ bg = BG.night; moteA = 1; }
  else { bg = BG.night; moteA = 1; }
  ctx.drawImage(bg, 0, 0, GAME_W, GAME_H);

  /* montage 轉場疊化 */
  if(t >= MONT_START && t < MONT_END){
    const local = t - MONT_START;
    const idx = Math.floor(local/MONT_SLICE);
    const sliceEnd = (idx+1)*MONT_SLICE;
    if(idx < LV.length-1 && local > sliceEnd-0.35){
      ctx.globalAlpha = ss(t, MONT_START+sliceEnd-0.35, MONT_START+sliceEnd);
      ctx.drawImage(BG[LV[idx+1].theme], 0, 0, GAME_W, GAME_H);
      ctx.globalAlpha = 1;
    }
  }
  if(moteA>0) drawMotes(moteA);

  /* v6 飄雲＋陽光斜射（白天/黃昏場景） */
  if(t < MONT_START){
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.5 + 0.14*Math.sin(worldT*0.7);
    ctx.drawImage(rayCv, 0, 0);
    ctx.restore();
    drawClouds(worldT, 0.92);
  } else if(t < MONT_START + MONT_SLICE*3.2){
    drawClouds(worldT, 0.5);
  }

  /* 高潮金色氛圍疊層 */
  if(t >= FRENZY_START && t < FRENZY_END){
    ctx.globalAlpha = 0.08 + 0.05*Math.sin(worldT*8);
    ctx.fillStyle = '#ffcf5c'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.globalAlpha = 1;
  }

  /* 第2幕：飛落水果 */
  if(t >= 3.4 && t < 8.4+TRAVEL){
    for(const ev of catchSchedule){
      if(ev.done) continue;
      const age = t - (ev.t - TRAVEL);
      if(age < 0) continue;
      const y = -30 + CATCH_VY*age;
      if(y > 500) continue;
      const x = basketX(ev.t);
      drawItem(x, y, age*1.6, ev.key, 44, age*3);
    }
  }
  /* 第3幕：炸彈墜落 */
  if(t >= bombEvt.spawnT && t < bombEvt.catchT + 0.15){
    const age = t - bombEvt.spawnT;
    const y = -30 + CATCH_VY*age;
    drawItem(480, y, age*2.2, 'bomb', 46, age*3);
  }
  /* 第4幕：幸運星墜落 */
  if(t >= starEvt.spawnT && t < starEvt.catchT + 0.1){
    const age = t - starEvt.spawnT;
    const y = -30 + CATCH_VY*1.1*age;
    drawItem(basketX(starEvt.catchT), y, age*2.4, 'star', 44, age*3);
  }
  /* 高潮：黃金果雨群落 */
  if(t >= FRENZY_START && t < FRENZY_END){
    for(const it of frenzyItems){
      if(!it.spawned || it.landed) continue;
      drawItem(it.x, it.y, it.rot, it.key, it.key==='star'?40:40, it.wob);
    }
  }

  /* 籃子（結尾淡出後不畫） */
  if(t < END_START + 3.4){
    drawBasket(basket.x, basket.y, basket.sx, basket.sy);
  }

  drawParts();
  ctx.restore();
  drawFloats();

  /* ===== 字幕與 UI 疊層 ===== */
  fruitTitle('接水果大冒險', GAME_W/2, 152, 56, 0.6, t, 2.75);
  drawCaption(t, 1.3, 0.4, 1.9, 'AI未來創作營隊 出品', 198, 20, '#ffe9b0');
  drawCaption(t, 3.6, 0.3, 4.0, '左右移動籃子接住水果！', 74, 22, '#f4ffe8');
  drawCaption(t, 8.6, 0.3, 1.4, '小心！別接到炸彈', 74, 24, '#ff6b5a');
  drawCaption(t, 10.7, 0.3, 1.6, '接到幸運星大加分！', 74, 24, '#ffcf5c');

  /* 第2幕 HUD 小預覽（分數＋愛心）帶出真實遊戲介面感 */
  if(t >= 3.2 && t < 12.4){
    ctx.save();
    ctx.globalAlpha = ss(t,3.2,3.6)*(1-ss(t,12.0,12.4));
    ctx.textAlign='left'; ctx.font='900 20px '+FONT;
    ctx.lineWidth=4; ctx.strokeStyle='rgba(0,0,0,.45)';
    ctx.strokeText('分數 '+Math.round(scoreDisp), 24, 66);
    ctx.fillStyle='#fff5d6'; ctx.fillText('分數 '+Math.round(scoreDisp), 24, 66);
    for(let i=0;i<3;i++) drawHeart(GAME_W-140+i*28, 58, 2, '#ff5a6e');
    ctx.restore();
  }

  /* 第5幕 關卡選擇montage 標題卡 */
  if(t >= MONT_START && t < MONT_END){
    const local = t - MONT_START;
    const idx = clamp(Math.floor(local/MONT_SLICE), 0, LV.length-1);
    const lv = LV[idx];
    const sliceStart = idx*MONT_SLICE, sliceLocal = local - sliceStart;
    const slideIn = 1 - es(ss(sliceLocal,0,0.3));
    const slideOut = es(ss(sliceLocal, MONT_SLICE-0.3, MONT_SLICE));
    const offX = slideIn*260 - slideOut*260;
    ctx.save();
    ctx.globalAlpha = clamp(1-Math.abs(slideIn>0?slideIn:slideOut),0,1)+0.001;
    ctx.globalAlpha = clamp(ss(sliceLocal,0,0.25),0,1) * (1-clamp(ss(sliceLocal,MONT_SLICE-0.25,MONT_SLICE),0,1));
    ctx.textAlign='center';
    ctx.font='900 22px '+FONT; ctx.fillStyle='#ffe9b0';
    ctx.lineWidth=4; ctx.strokeStyle='rgba(0,0,0,.5)';
    const label = '第'+(idx+1)+'關';
    ctx.strokeText(label, GAME_W/2+offX, 80); ctx.fillText(label, GAME_W/2+offX, 80);
    ctx.font='900 40px '+FONT; ctx.fillStyle='#fff5d6';
    ctx.lineWidth=6;
    ctx.strokeText(lv.name, GAME_W/2+offX, 130); ctx.fillText(lv.name, GAME_W/2+offX, 130);
    ctx.restore();
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.textAlign='center'; ctx.font='700 16px '+FONT; ctx.fillStyle='#f4ffe8';
    ctx.fillText((idx+1)+' / '+LV.length+' 大果園關卡', GAME_W/2, GAME_H-52);
    ctx.restore();
  }

  /* 高潮字幕與結算星星 */
  drawCaption(t, FRENZY_START+0.2, 0.3, 2.0, '黃金果雨開始！', 120, 32, '#ffcf5c');
  drawCaption(t, FRENZY_START+2.6, 0.3, 1.8, '5大果園關卡 × 星星評分', 168, 22, '#f4ffe8');
  if(clearPlayed){
    for(let i=0;i<3;i++){
      const on = i < starsPop;
      const kk = on ? easeOutBack(clamp((t-(FRENZY_END-1.2)-i*0.18)*3,0,1)) : 1;
      drawStarShape(GAME_W/2+(i-1)*54, 220, on ? 22*kk : 20, on ? '#ffcf5c' : 'rgba(255,255,255,.18)', on ? Math.sin(worldT*2+i)*0.1 : 0);
    }
  }

  /* 結尾 CTA */
  if(t >= END_START){
    const et = t - END_START;
    ctx.save();
    ctx.globalAlpha = ss(et,0,0.6);
    ctx.fillStyle = 'rgba(6,14,8,.55)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.restore();
    const pop = easeOutBack(clamp(et*1.6,0,1));
    ctx.save();
    ctx.translate(GAME_W/2, 200); ctx.scale(pop,pop);
    ctx.textAlign='center'; ctx.font='900 46px '+FONT;
    ctx.lineWidth=8; ctx.strokeStyle='#204631';
    ctx.strokeText('現在就來挑戰！', 0, 0);
    const gg = ctx.createLinearGradient(0,-30,0,16);
    gg.addColorStop(0,'#ffe9b0'); gg.addColorStop(1,'#ffcf5c');
    ctx.fillStyle = gg; ctx.fillText('現在就來挑戰！', 0, 0);
    ctx.restore();
    drawCaption(t, END_START+0.8, 0.4, 4.0, '接水果大冒險 PRO版', 250, 24, '#f4ffe8');
    drawCaption(t, END_START+1.2, 0.4, 3.6, '5大果園關卡．星星評分．黃金果雨', 284, 18, '#ffe9b0');
    if(et > 1.6){
      drawButton({ x:GAME_W/2-90, y:340, w:180, h:60, label:'重新播放', gold:true, fs:22 }, Math.sin(worldT*4)>0);
    }
  }

  /* v6 後製：閃白＋烘焙暗角＋letterbox 黑邊 */
  if(flashA > 0){ ctx.fillStyle = 'rgba(255,252,240,'+clamp(flashA,0,1)+')'; ctx.fillRect(0,0,GAME_W,GAME_H); }
  ctx.drawImage(vigCv, 0, 0);
  const lb = 30 * es(ss(t, 0, 1.2));
  ctx.fillStyle = '#0c1408';
  ctx.fillRect(0,0,GAME_W,lb);
  ctx.fillRect(0,GAME_H-lb,GAME_W,lb);
  ctx.fillStyle = 'rgba(174,226,57,0.28)';
  ctx.fillRect(0,lb-1,GAME_W,1);
  ctx.fillRect(0,GAME_H-lb,GAME_W,1);
}

function replayClick(p){
  if(tAnim < END_START + 1.6) return false;
  const b = { x:GAME_W/2-90, y:340, w:180, h:60 };
  if(p.x>=b.x-8 && p.x<=b.x+b.w+8 && p.y>=b.y-8 && p.y<=b.y+b.h+8){ sfx.ui(); reset(); return true; }
  return false;
}
function toLogical(cx, cy){
  const r = canvas.getBoundingClientRect();
  return { x:(cx-r.left)/canvas._scale, y:(cy-r.top)/canvas._scale };
}
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  replayClick(toLogical(t.clientX, t.clientY));
}, {passive:false});
canvas.addEventListener('mousedown', e => {
  replayClick(toLogical(e.clientX, e.clientY));
});

/* ===== 主迴圈 ===== */
const STEP = 1/60;
let last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  acc += Math.min((now - last) / 1000, 0.1);
  last = now;
  while(acc >= STEP){ update(STEP); acc -= STEP; }
  draw();
}
reset();
requestAnimationFrame(frame);

/* ===== 測試掛鉤 ===== */
window.__test = {
  get t(){ return tAnim; },
  get score(){ return Math.round(scoreDisp); },
  get basketX(){ return basket.x; },
  get muted(){ return muted; },
  get starsPop(){ return starsPop; },
  toggleMute(){ muteBtn.click(); },
  skipTo(sec){ let n = Math.max(0, Math.round((sec - tAnim)*60)); for(let i=0;i<n;i++) update(STEP); },
  replay(){ reset(); }
};
