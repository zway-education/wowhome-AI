<!DOCTYPE html>
<!-- 專業AI升級 v6 -->
<!-- v6 摘要：聲音預設開啟＋電影運鏡（幕間推鏡/衝刺震動/終點zoom-punch）＋letterbox＋閃白轉場＋逐字火焰標題與光暈掃過＋烘焙火空/岩壁視差/熔岩/火星粒子/暈影/顆粒＋Web Audio 預告片配樂（鼓組貝斯循環、幕間riser+braam、通關火花、結尾定格重音＋壓縮殘響母線） -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="author" content="AI未來創作營隊">
<title>跑酷火人3D 宣傳影片</title>
<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #070307;
    font-family: "PingFang TC","Microsoft JhengHei",sans-serif;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  canvas { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
  #soundBtn {
    position: fixed; top: 12px; right: 12px; z-index: 20;
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(10,10,20,0.65); border: 1px solid rgba(56,225,255,0.5);
    color: #eaf6ff; font-size: 20px; cursor: pointer;
  }
  #soundHint {
    position: fixed; top: 18px; right: 68px; z-index: 20;
    color: #eaf6ff; font-size: 14px; text-shadow: 0 0 4px #000;
    animation: hintFade 3.2s ease forwards;
    pointer-events: none;
  }
  @keyframes hintFade { 0%{opacity:0} 15%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
  #replayBtn {
    position: fixed; left: 50%; bottom: 12%; transform: translateX(-50%);
    z-index: 20; display: none;
    padding: 14px 42px; font-size: 20px; min-height: 48px;
    background: linear-gradient(92deg,#38e1ff,#4f7cff);
    color: #071018; border: none; border-radius: 10px; cursor: pointer;
    font-family: inherit; font-weight: 800;
  }
</style>
</head>
<body>
<button id="soundBtn">🔊</button>
<div id="soundHint">音效已開啟，點鈕可靜音</div>
<button id="replayBtn">重新播放</button>
<canvas id="stage"></canvas>

<script>
'use strict';
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const soundBtn = document.getElementById('soundBtn');
const replayBtn = document.getElementById('replayBtn');

function resize() {
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', resize); resize();

/* ---------- 音樂（合成、零外部資源） ----------
   v6：預設開聲＋DynamicsCompressor 母線＋程序化殘響；
   輕快電子跑酷配樂（鼓點/琶音貝斯/五聲音階旋律）＋幕間 riser/braam/結尾定格重音 */
let audioCtx = null, soundOn = true, musicStarted = false;
let masterBus = null, musicBus = null, VERB = null, NOISE_BUF = null;
function ensureAudio(){
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const comp = audioCtx.createDynamicsCompressor();
  comp.threshold.value = -16; comp.knee.value = 18; comp.ratio.value = 7;
  comp.attack.value = 0.004; comp.release.value = 0.2;
  comp.connect(audioCtx.destination);
  masterBus = audioCtx.createGain(); masterBus.gain.value = 0.9; masterBus.connect(comp);
  musicBus = audioCtx.createGain(); musicBus.gain.value = 1; musicBus.connect(masterBus);
  VERB = audioCtx.createConvolver();
  (function(){
    const rate = audioCtx.sampleRate, len = (rate*1.8)|0, buf = audioCtx.createBuffer(2,len,rate);
    for(let ch=0;ch<2;ch++){ const d = buf.getChannelData(ch);
      for(let i=0;i<len;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/len,2.7)*0.55; }
    VERB.buffer = buf;
  })();
  const vg = audioCtx.createGain(); vg.gain.value = 0.75; VERB.connect(vg); vg.connect(masterBus);
  NOISE_BUF = (function(){
    const rate = audioCtx.sampleRate, len = (rate*1.5)|0, buf = audioCtx.createBuffer(1,len,rate);
    const d = buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i] = Math.random()*2-1;
    return buf;
  })();
}
soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? '🔊' : '🔇';
  if (soundOn) {
    try { ensureAudio(); } catch (e) {}
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    if (audioCtx && !musicStarted) { musicStarted = true; startMusic(); }
  } else if (audioCtx) {
    audioCtx.suspend();
  }
});

function kick(t, vol) {
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.frequency.setValueAtTime(140, t);
  osc.frequency.exponentialRampToValueAtTime(45, t + 0.12);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
  osc.connect(g).connect(musicBus);
  osc.start(t); osc.stop(t + 0.24);
}
function hat(t, vol) {
  const n = Math.floor(audioCtx.sampleRate * 0.05);
  const buf = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 2);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const f = audioCtx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 6000;
  const g = audioCtx.createGain(); g.gain.setValueAtTime(vol, t);
  src.connect(f).connect(g).connect(musicBus);
  src.start(t);
}
function note(t, freq, dur, vol, type) {
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(g).connect(musicBus);
  osc.start(t); osc.stop(t + dur + 0.02);
}
function chime() {
  if (!soundOn || !audioCtx) return;
  const t = audioCtx.currentTime;
  [880, 1108, 1318].forEach((fq, i) => note(t + i * 0.08, fq, 0.25, 0.14, 'triangle'));
}
function duckMusic(level, hold){
  if(!musicBus) return;
  const g = musicBus.gain, t = audioCtx.currentTime;
  g.cancelScheduledValues(t); g.setValueAtTime(g.value, t);
  g.linearRampToValueAtTime(level, t+0.05);
  g.linearRampToValueAtTime(1, t+(hold||0.9));
}
function braam(vol){
  if(!soundOn || !audioCtx) return;
  const t0 = audioCtx.currentTime;
  duckMusic(0.3, 1.4);
  [55, 55.8, 27.5].forEach((f,i)=>{
    const o = audioCtx.createOscillator(), g = audioCtx.createGain(), lp = audioCtx.createBiquadFilter();
    o.type = 'sawtooth'; o.frequency.value = f;
    lp.type = 'lowpass'; lp.Q.value = 3;
    lp.frequency.setValueAtTime(90, t0);
    lp.frequency.exponentialRampToValueAtTime(540, t0+0.26);
    lp.frequency.exponentialRampToValueAtTime(110, t0+1.45);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol*(i===2?0.7:0.5), t0+0.06);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+1.55);
    o.connect(lp).connect(g).connect(masterBus); g.connect(VERB);
    o.start(t0); o.stop(t0+1.65);
  });
}
function riser(dur){
  if(!soundOn || !audioCtx) return;
  const t0 = audioCtx.currentTime;
  const src = audioCtx.createBufferSource(); src.buffer = NOISE_BUF; src.loop = true;
  const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.3;
  bp.frequency.setValueAtTime(240, t0);
  bp.frequency.exponentialRampToValueAtTime(3200, t0+dur);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(0.15, t0+dur);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur+0.08);
  src.connect(bp).connect(g).connect(masterBus); g.connect(VERB);
  src.start(t0); src.stop(t0+dur+0.15);
}
function whoosh(){
  if(!soundOn || !audioCtx) return;
  const t0 = audioCtx.currentTime;
  const src = audioCtx.createBufferSource(); src.buffer = NOISE_BUF; src.loop = true;
  const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.2;
  bp.frequency.setValueAtTime(2400, t0);
  bp.frequency.exponentialRampToValueAtTime(260, t0+0.42);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(0.15, t0+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+0.42);
  src.connect(bp).connect(g).connect(masterBus); g.connect(VERB);
  src.start(t0); src.stop(t0+0.5);
}
function stinger(){
  if(!soundOn || !audioCtx) return;
  braam(0.5);
  const t = audioCtx.currentTime;
  [523, 784, 1046].forEach((fq, i) => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'triangle'; o.frequency.value = fq;
    g.gain.setValueAtTime(0.0001, t+0.12*i);
    g.gain.exponentialRampToValueAtTime(0.1, t+0.12*i+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t+0.12*i+1.1);
    o.connect(g).connect(masterBus); g.connect(VERB);
    o.start(t+0.12*i); o.stop(t+0.12*i+1.2);
  });
}

// 五聲音階主旋律（C大調），貝斯根音，鼓點：以 0.24 秒為一拍，循環到 30 秒結束
const SCALE = [261.6, 293.7, 329.6, 392.0, 440.0, 523.3, 587.3, 659.3]; // C D E G A C D E
const MELODY_PATTERN = [0,2,4,7,6,4,2,0, 3,4,6,7,4,6,4,3, 0,2,4,7,7,6,4,3, 5,6,4,3,2,0,2,4];
const BASS_PATTERN = [0,0,4,4,3,3,5,5];
let musicTimer = null;
function startMusic() {
  const beat = 0.24;
  let step = 0;
  let startAt = audioCtx.currentTime + 0.05;
  function schedule() {
    if (!soundOn) return;
    if (audioCtx.state !== 'running') { startAt = audioCtx.currentTime + 0.05; return; }
    const t = startAt + step * beat;
    if (t < audioCtx.currentTime - 0.1) { startAt = audioCtx.currentTime + 0.05; return; }
    const bar = step % 8;
    if (step % 2 === 0) kick(t, 0.5);
    if (step % 2 === 1) hat(t, 0.22);
    const mi = MELODY_PATTERN[step % MELODY_PATTERN.length];
    note(t, SCALE[mi], beat * 0.95, 0.16, 'square');
    const bi = BASS_PATTERN[bar];
    note(t, SCALE[bi] / 2, beat * 0.9, 0.2, 'sawtooth');
    step++;
  }
  musicTimer = setInterval(schedule, 240);
  schedule();
}

// ---------- 緩動 ----------
const easeOut = t => 1 - Math.pow(1 - t, 3);
const easeInOut = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
const easeOutBack = t => 1 + 2.7*Math.pow(t-1,3) + 1.7*Math.pow(t-1,2);
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp = (a,b,t) => a+(b-a)*t;

// ---------- v6 烘焙資產：火空/熔岩/平臺/岩壁視差/光暈/暈影/顆粒/光帶 ----------
function bakeTex(w,h,fn){ const c = document.createElement('canvas'); c.width=w; c.height=h; fn(c.getContext('2d'),w,h); return c; }
const skyTex = bakeTex(GAME_W, GAME_H, (g,w,h)=>{
  const rg = g.createRadialGradient(w/2, h*1.05, h*0.1, w/2, h*1.05, w*0.9);
  rg.addColorStop(0, '#ff7e3d'); rg.addColorStop(0.22, '#ff3d1c');
  rg.addColorStop(0.5, '#4a0f08'); rg.addColorStop(0.75, '#180608'); rg.addColorStop(1, '#070307');
  g.fillStyle = rg; g.fillRect(0, 0, w, h);
  g.globalAlpha = 0.22;
  g.fillStyle = 'rgba(255,170,80,0.6)';
  g.beginPath(); g.ellipse(w*0.2, h*0.15, w*0.3, h*0.15, 0, 0, Math.PI*2); g.fill();
  g.globalAlpha = 1;
  // 遠處火山剪影
  g.fillStyle = 'rgba(20,6,8,0.9)';
  g.beginPath(); g.moveTo(0, h*0.52);
  g.lineTo(w*0.12, h*0.36); g.lineTo(w*0.2, h*0.46); g.lineTo(w*0.33, h*0.3);
  g.lineTo(w*0.45, h*0.5); g.lineTo(w*0.6, h*0.34); g.lineTo(w*0.72, h*0.48);
  g.lineTo(w*0.86, h*0.32); g.lineTo(w, h*0.5);
  g.lineTo(w, h); g.lineTo(0, h); g.closePath(); g.fill();
  // 火山口微光
  [[0.33,0.3],[0.6,0.34],[0.86,0.32]].forEach(([px,py])=>{
    const rr = g.createRadialGradient(w*px, h*py, 0, w*px, h*py, 42);
    rr.addColorStop(0,'rgba(255,120,60,0.5)'); rr.addColorStop(1,'rgba(255,120,60,0)');
    g.fillStyle = rr; g.fillRect(w*px-42, h*py-42, 84, 84);
  });
});
// 岩壁視差層（近景，可平鋪捲動）
const rockTex = bakeTex(GAME_W*2, GAME_H, (g,w,h)=>{
  g.fillStyle = 'rgba(12,5,10,0.85)';
  let s = 7;
  const rnd = () => { s = (s * 16807) % 2147483647; return s / 2147483647; };
  g.beginPath(); g.moveTo(0, h*0.7);
  for(let x=0; x<=w; x+=w/24){
    g.lineTo(x, h*(0.55 + rnd()*0.2));
  }
  g.lineTo(w, h); g.lineTo(0, h); g.closePath(); g.fill();
  // 岩石裂縫熔光
  for(let i=0;i<26;i++){
    const x = rnd()*w, y = h*(0.68 + rnd()*0.25);
    g.globalAlpha = 0.2 + rnd()*0.3;
    g.fillStyle = '#ff5a26';
    g.fillRect(x, y, 2 + rnd()*8, 1.4);
  }
  g.globalAlpha = 1;
});
const lavaTex = bakeTex(GAME_W, 180, (g,w,h)=>{
  const lg = g.createLinearGradient(0, 0, 0, h*0.32);
  lg.addColorStop(0, '#ffd36b'); lg.addColorStop(0.4, '#ff7e3d'); lg.addColorStop(1, '#8a1a06');
  g.fillStyle = lg; g.fillRect(0, 0, w, h);
  // 熔岩亮斑
  for(let i=0;i<34;i++){
    const x = Math.random()*w, y = 12+Math.random()*(h-20);
    g.globalAlpha = 0.12 + Math.random()*0.2;
    g.fillStyle = '#ffd36b';
    g.beginPath(); g.ellipse(x, y, 8+Math.random()*22, 2.5+Math.random()*4, 0, 0, Math.PI*2); g.fill();
  }
  g.globalAlpha = 1;
});
const platTex = bakeTex(8, 18, (g,w,h)=>{
  const lg = g.createLinearGradient(0, 0, 0, h);
  lg.addColorStop(0, '#3a4a6a'); lg.addColorStop(1, '#1a2138');
  g.fillStyle = lg; g.fillRect(0, 0, w, h);
  g.fillStyle = 'rgba(56,225,255,0.5)'; g.fillRect(0, 0, w, 3);
});
const emberTex = bakeTex(32, 32, (g)=>{
  const r = g.createRadialGradient(16,16,0,16,16,16);
  r.addColorStop(0,'rgba(255,224,138,0.95)'); r.addColorStop(0.5,'rgba(255,150,60,0.35)'); r.addColorStop(1,'rgba(255,126,61,0)');
  g.fillStyle = r; g.fillRect(0,0,32,32);
});
const glowTex = bakeTex(128,128,(g)=>{
  const r = g.createRadialGradient(64,64,0,64,64,64);
  r.addColorStop(0,'rgba(255,200,110,0.9)'); r.addColorStop(0.45,'rgba(255,150,70,0.28)'); r.addColorStop(1,'rgba(255,150,70,0)');
  g.fillStyle = r; g.fillRect(0,0,128,128);
});
const vigTex = bakeTex(480,270,(g,w,h)=>{
  const r = g.createRadialGradient(w/2,h/2,h*0.33,w/2,h/2,h*0.85);
  r.addColorStop(0,'rgba(0,0,0,0)'); r.addColorStop(0.65,'rgba(6,2,4,0.2)'); r.addColorStop(1,'rgba(6,2,4,0.52)');
  g.fillStyle = r; g.fillRect(0,0,w,h);
});
const sweepBand = bakeTex(240,60,(g,w,h)=>{
  const lg = g.createLinearGradient(0,0,w,0);
  lg.addColorStop(0,'rgba(255,250,220,0)'); lg.addColorStop(0.5,'rgba(255,250,220,0.85)'); lg.addColorStop(1,'rgba(255,250,220,0)');
  g.fillStyle = lg; g.fillRect(0,0,w,h);
  const vgrad = g.createLinearGradient(0,0,0,h);
  vgrad.addColorStop(0,'rgba(0,0,0,0)'); vgrad.addColorStop(0.5,'rgba(0,0,0,1)'); vgrad.addColorStop(1,'rgba(0,0,0,0)');
  g.globalCompositeOperation='destination-in';
  g.fillStyle = vgrad; g.fillRect(0,0,w,h);
});
const grainTiles = [0,1,2].map(()=> bakeTex(160,160,(g,w,h)=>{
  const id = g.createImageData(w,h);
  for(let i=0;i<id.data.length;i+=4){
    const v = (Math.random()*255)|0;
    id.data[i]=id.data[i+1]=id.data[i+2]=v; id.data[i+3]=13;
  }
  g.putImageData(id,0,0);
}));
const grainPats = grainTiles.map(tx => ctx.createPattern(tx,'repeat'));
function bakeChars(text, px, colors, glowColor){
  const meas = bakeTex(8,8,()=>{}).getContext('2d');
  meas.font = '900 ' + px + "px 'PingFang TC','Microsoft JhengHei',sans-serif";
  return [...text].map((ch,i)=>{
    const w = Math.ceil(meas.measureText(ch).width) + 48;
    const h = px + 56;
    const c = bakeTex(w,h,(g)=>{
      g.font = '900 ' + px + "px 'PingFang TC','Microsoft JhengHei',sans-serif";
      g.textAlign='center'; g.textBaseline='middle';
      g.shadowColor = glowColor; g.shadowBlur = 26;
      g.fillStyle = colors[i % colors.length];
      g.fillText(ch, w/2, h/2);
      g.shadowBlur = 10;
      g.fillText(ch, w/2, h/2);
    });
    return {c,w,h};
  });
}
const TITLE_CHARS = bakeChars('跑酷火人3D', 60, ['#ffcf5c','#ffb845','#ffa72e','#ff8f36','#ff7e3d','#ff6a3d'], 'rgba(255,140,50,0.95)');
const WIN_CHARS = bakeChars('通關成功！', 48, ['#38e1ff','#5fb9ff','#7f9bff','#9a6bff','#c07fff'], 'rgba(110,160,255,0.95)');
function drawTitleChars(chars, cx, cy, t, stagger, dur, sweepAt){
  let total = 0; chars.forEach(s => total += s.w - 32);
  let x = cx - total/2;
  let minX = 1e9, maxX = -1e9;
  chars.forEach((s,i)=>{
    const p = clamp((t - i*stagger) / dur, 0, 1);
    const w = s.w - 32;
    if(p > 0){
      const e = easeOutBack(p);
      ctx.save();
      ctx.globalAlpha = clamp(p*1.6, 0, 1);
      ctx.translate(x + w/2, cy + (1-e)*36);
      ctx.scale(0.6 + 0.4*e, 0.6 + 0.4*e);
      ctx.drawImage(s.c, -s.w/2, -s.h/2);
      ctx.restore();
      minX = Math.min(minX, x); maxX = Math.max(maxX, x + w);
    }
    x += w;
  });
  if(sweepAt !== undefined && t > sweepAt && t < sweepAt + 0.9 && maxX > minX){
    const p = (t - sweepAt) / 0.9;
    const sx = lerp(minX - 100, maxX + 100, easeInOut(p));
    ctx.save(); ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = 0.85;
    ctx.drawImage(sweepBand, sx - 60, cy - 56, 120, 112);
    ctx.restore();
  }
}
// 轉場與 letterbox
let trans = {t:99, type:'none'}, camShake = 0, prevT = 0;
function triggerTrans(type){ trans = {t:0, type}; }
const LB_H = 54;
function drawCinema(t, dt){
  trans.t += dt;
  if(trans.type==='flash' && trans.t<0.4){
    ctx.save(); ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha = (1-trans.t/0.4)*0.8;
    ctx.fillStyle='#ffe9d0'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.restore();
  } else if(trans.type==='fade' && trans.t<0.7){
    ctx.save(); ctx.globalAlpha = Math.sin(Math.PI*clamp(trans.t/0.7,0,1))*0.8;
    ctx.fillStyle='#070307'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.restore();
  }
  ctx.drawImage(vigTex, 0, 0, GAME_W, GAME_H);
  ctx.save(); ctx.globalAlpha = 0.5;
  ctx.fillStyle = grainPats[(t*14|0) % 3];
  ctx.fillRect(0,0,GAME_W,GAME_H);
  ctx.restore();
  const lb = LB_H * easeOut(clamp(t/1.3, 0, 1));
  ctx.fillStyle = '#050205';
  ctx.fillRect(0, 0, GAME_W, lb);
  ctx.fillRect(0, GAME_H - lb, GAME_W, lb);
}

// ---------- 場景繪製 ----------
function drawSky(t) {
  ctx.drawImage(skyTex, 0, 0);
}
function drawRocks(t, speed){
  const off = (t * speed) % (GAME_W*2);
  ctx.drawImage(rockTex, -off, 0);
  ctx.drawImage(rockTex, GAME_W*2 - off, 0);
}
function drawEmbers(t, seedOffset) {
  let s = 11 + seedOffset;
  const rnd = () => { s = (s * 16807) % 2147483647; return s / 2147483647; };
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < 34; i++) {
    const seed = rnd();
    const x = seed * GAME_W + Math.sin(t*1.4 + seed*20)*14;
    const speed = 30 + seed * 40;
    const y = GAME_H - ((t * speed + seed * 400) % (GAME_H + 60));
    const size = 3 + seed * 6;
    const alpha = clamp(1 - Math.abs(y - GAME_H/2) / (GAME_H/2), 0.1, 0.85);
    ctx.globalAlpha = alpha;
    ctx.drawImage(emberTex, x-size, y-size, size*2, size*2);
  }
  ctx.restore();
}
function drawLava(y, t) {
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(0, y + Math.sin(t * 3) * 4);
  for (let x = 0; x <= GAME_W; x += 40) ctx.lineTo(x, y + Math.sin(t*3 + x*0.02) * 6);
  ctx.lineTo(GAME_W, GAME_H); ctx.lineTo(0, GAME_H); ctx.closePath();
  ctx.clip();
  ctx.drawImage(lavaTex, 0, y - 10, GAME_W, 180);
  ctx.restore();
  // 熔岩上方光暈（bloom）
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.25 + 0.06*Math.sin(t*2.4);
  ctx.drawImage(glowTex, GAME_W*0.15, y-70, GAME_W*0.7, 130);
  ctx.restore();
}
function drawPlatform(x, y, w, h) {
  ctx.drawImage(platTex, x, y, w, h);
}
function drawRunner(x, y, size, t, jumpP) {
  const bob = jumpP !== undefined ? -Math.sin(jumpP * Math.PI) * size * 0.6 : 0;
  const leg = Math.sin(t * 14) * size * 0.28;
  ctx.save();
  ctx.translate(x, y + bob);
  // 火焰光暈（烘焙 bloom）
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.75 + 0.15*Math.sin(t*9);
  ctx.drawImage(glowTex, -size*1.4, -size*1.7, size*2.8, size*2.8);
  ctx.restore();
  const grad = ctx.createLinearGradient(0, -size, 0, size*0.3);
  grad.addColorStop(0, '#ffcf5c'); grad.addColorStop(1, '#ff7e3d');
  ctx.strokeStyle = grad; ctx.fillStyle = grad;
  ctx.lineWidth = Math.max(3, size * 0.1);
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(0, -size * 0.8, size * 0.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(0, -size * 0.6); ctx.lineTo(0, 0); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0, -size * 0.4); ctx.lineTo(-size * 0.32, -size * 0.1 - leg * 0.3);
  ctx.moveTo(0, -size * 0.4); ctx.lineTo(size * 0.32, -size * 0.1 + leg * 0.3);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0, 0); ctx.lineTo(-size * 0.24, size * 0.45 + leg);
  ctx.moveTo(0, 0); ctx.lineTo(size * 0.24, size * 0.45 - leg);
  ctx.stroke();
  ctx.restore();
}
function drawFlag(x, y, size, t) {
  ctx.save();
  ctx.translate(x, y);
  ctx.strokeStyle = '#eaf6ff'; ctx.lineWidth = Math.max(2, size*0.06);
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -size); ctx.stroke();
  const wave = Math.sin(t * 5) * size * 0.12;
  const g = ctx.createLinearGradient(0, -size, size*0.6, -size*0.7);
  g.addColorStop(0, '#38e1ff'); g.addColorStop(1, '#9a6bff');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(0, -size); ctx.lineTo(size*0.55, -size*0.85 + wave); ctx.lineTo(0, -size*0.68);
  ctx.closePath(); ctx.fill();
  // 旗頂光暈
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.6 + 0.2*Math.sin(t*4);
  ctx.drawImage(glowTex, -30, -size-30, 60, 60);
  ctx.restore();
}
function progressPill(pct) {
  ctx.save();
  ctx.font = "bold 16px sans-serif"; ctx.textAlign = 'left';
  const txt = Math.floor(pct) + '%';
  ctx.fillStyle = 'rgba(7,11,20,0.62)';
  ctx.fillRect(14, 64, 74, 32);
  ctx.strokeStyle = 'rgba(56,225,255,0.5)'; ctx.strokeRect(14, 64, 74, 32);
  ctx.fillStyle = '#38e1ff';
  ctx.fillText(txt, 26, 86);
  ctx.restore();
}
function subtitle(text, alpha) {
  // v6：字幕置於下方 letterbox 黑邊內（電影字卡）
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';
  ctx.font = "bold 22px 'PingFang TC','Microsoft JhengHei',sans-serif";
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillText(text, GAME_W / 2 + 1, GAME_H - LB_H/2 + 9);
  ctx.fillStyle = '#ffe9c8';
  ctx.fillText(text, GAME_W / 2, GAME_H - LB_H/2 + 8);
  ctx.restore();
}
function titleLogo(alpha, t) {
  if(alpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.globalCompositeOperation = 'lighter';
  ctx.drawImage(glowTex, GAME_W/2-240, GAME_H*0.40-120, 480, 240);
  ctx.restore();
  ctx.save();
  ctx.globalAlpha = alpha;
  drawTitleChars(TITLE_CHARS, GAME_W/2, GAME_H*0.40, t, 0.11, 0.42, 1.5);
  ctx.restore();
}

// ---------- 時間軸（總長 30 秒，三幕結構）----------
const DURATION = 30;
let startTime = null, playing = false;
let firedCues = {};
function cue(id, fn) { if (!firedCues[id]) { firedCues[id] = true; fn(); } }

function draw(t) {
  const dt = Math.max(0, Math.min(0.1, t - prevT)); prevT = t;
  ctx.clearRect(0, 0, GAME_W, GAME_H);

  // v6 幕間音效與轉場觸發
  cue('amb', () => { whoosh(); });
  if (t > 4.9) cue('riser1', () => riser(1.05));
  if (t > 6) cue('act2', () => { braam(0.45); triggerTrans('flash'); camShake = 10; });
  if (t > 10.9) cue('riser2', () => riser(1.05));
  if (t > 12) cue('act2b', () => { braam(0.4); triggerTrans('flash'); camShake = 8; });
  if (t > 18.9) cue('riser3', () => riser(1.05));
  if (t > 20) cue('act3', () => { braam(0.45); triggerTrans('flash'); camShake = 10; });
  if (t > 23.4) cue('winHit', () => { stinger(); triggerTrans('flash'); camShake = 14; });
  if (t > 25) cue('ctaIn', () => { whoosh(); triggerTrans('fade'); });

  // v6 電影運鏡：逐幕推鏡＋衝刺震動＋終點 zoom-punch
  let zoom = 1.03, ox = 0, oy = 0;
  if (t < 6) { zoom = lerp(1.12, 1.04, easeOut(clamp(t/2.6,0,1))); }
  else if (t < 12) { const p = (t-6)/6; zoom = 1.04 + 0.05*p; ox = -14 + 30*p; }
  else if (t < 20) { const p = (t-12)/8; zoom = 1.09 + 0.03*Math.sin(p*Math.PI); oy = 6*Math.sin(t*1.1); }
  else if (t < 25) { const p = clamp((t-20)/3.4, 0, 1); zoom = lerp(1.06, 1.16, easeInOut(p)); ox = 20*p; }
  else { zoom = lerp(1.18, 1.05, easeOut(clamp((t-25)/1.2,0,1))); ox = 0; }
  if (camShake > 0.05) {
    zoom += camShake*0.003;
    ox += (Math.random()-0.5)*camShake;
    oy += (Math.random()-0.5)*camShake*0.7;
    camShake *= 0.86;
  }
  const mx = GAME_W/2*(1-1/zoom)-0.5, my = GAME_H/2*(1-1/zoom)-0.5;
  ox = clamp(ox, -mx, mx); oy = clamp(oy, -my, my);
  ctx.save();
  ctx.translate(GAME_W/2, GAME_H/2); ctx.scale(zoom, zoom); ctx.translate(-GAME_W/2-ox, -GAME_H/2-oy);

  drawSky(t);

  if (t < 6) {
    // ===== 第一幕：標題浮現 =====
    drawRocks(t, 6);
    drawLava(GAME_H * 0.86, t);
    drawEmbers(t, 0);
    if (t > 0.2) cue('act1chime', () => chime());
  } else if (t < 12) {
    // ===== 第二幕A：跑跳越過熔岩 =====
    const p = (t - 6) / 6;
    drawRocks(t, 26);
    drawLava(GAME_H * 0.82, t);
    drawPlatform(GAME_W*0.05, GAME_H*0.72, GAME_W*0.22, 18);
    drawPlatform(GAME_W*0.42, GAME_H*0.72, GAME_W*0.22, 18);
    drawPlatform(GAME_W*0.79, GAME_H*0.72, GAME_W*0.22, 18);
    const cyc = (p * 2.2) % 1;
    const runX = GAME_W * (0.12 + p * 0.76 > 0.95 ? 0.95 : 0.12 + p * 0.76);
    const jumpP = cyc < 0.5 ? cyc * 2 : 0;
    drawRunner(runX, GAME_H * 0.7, 46, t, jumpP);
    drawEmbers(t, 0);
    cue('jumpBeat', () => chime());
  } else if (t < 20) {
    // ===== 第二幕B：連續跳台加速 =====
    const p = (t - 12) / 8;
    drawRocks(t, 60);
    drawLava(GAME_H * 0.8, t);
    for (let i = 0; i < 4; i++) {
      const px = ((GAME_W * 0.15 * i + t * 90) % (GAME_W + 160)) - 80;
      drawPlatform(px, GAME_H * (0.66 + (i%2)*0.08), 100, 16);
    }
    const bobT = (p * 3) % 1;
    drawRunner(GAME_W * 0.5, GAME_H * 0.6, 52, t, bobT < 0.5 ? bobT*2 : 0);
    drawEmbers(t, 0);
    // v6 衝刺速度線
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for(let i=0;i<10;i++){
      const seed = i*41.3;
      const y = ((seed*67) % (GAME_H*0.6)) + GAME_H*0.15;
      const len = 90 + (seed*13)%120;
      const x = GAME_W - ((t*1300 + seed*177) % (GAME_W+len));
      ctx.globalAlpha = 0.13;
      ctx.fillStyle = '#ffd9a0';
      ctx.fillRect(x, y, len, 2);
    }
    ctx.restore();
    if (t > 14) cue('speedThump', () => chime());
  } else {
    // ===== 第三幕：抵達終點旗 + CTA =====
    const p = (t - 20) / 10;
    drawRocks(t, 30);
    drawLava(GAME_H * 0.84, t);
    drawFlag(GAME_W * 0.78, GAME_H * 0.72, 130, t);
    const runP = easeInOut(clamp(p * 1.6, 0, 1));
    drawRunner(GAME_W * (0.15 + runP * 0.6), GAME_H * 0.7, 48, t, (p*4)%1 < 0.5 ? ((p*4)%1)*2 : 0);
    drawEmbers(t, 0);
  }

  ctx.restore();

  // ===== 螢幕空間覆蓋層（標題/字幕/後製）=====
  if (t < 6) {
    titleLogo(t < 5.4 ? 1 : clamp((6-t)/0.6,0,1), t);
    if (t > 2) {
      const sp = clamp((t - 2) / 0.8, 0, 1) * (t < 5.4 ? 1 : clamp((6-t)/0.6,0,1));
      ctx.save();
      ctx.globalAlpha = sp;
      ctx.textAlign = 'center';
      ctx.font = "20px 'PingFang TC','Microsoft JhengHei',sans-serif";
      ctx.fillStyle = '#9fb3d9';
      ctx.fillText('AI未來創作營隊 出品 · 第一人稱 3D 跑酷冒險', GAME_W / 2, GAME_H * 0.56);
      ctx.restore();
    }
    if (t > 3.6) subtitle('越過熔岩，抵達終點旗！', clamp((t - 3.6) / 0.6, 0, 1));
  } else if (t < 12) {
    if (t < 9) subtitle('WASD / 虛擬搖桿移動，空白鍵起跳', clamp((t - 6.3) / 0.6, 0, 1));
    else subtitle('踩穩平臺，掉進熔岩會回到檢查點！', clamp((t - 9.2) / 0.6, 0, 1));
  } else if (t < 20) {
    progressPill(clamp((t-12)/8 * 100, 0, 100));
    if (t < 16.4) subtitle('連續平臺挑戰你的節奏感', clamp((t - 12.3) / 0.6, 0, 1));
    else subtitle('計時破紀錄，登上最佳成績！', clamp((t - 16.6) / 0.6, 0, 1));
  } else {
    if (t < 23.4) {
      subtitle('衝向終點旗，完成通關！', clamp((t - 20.3) / 0.6, 0, 1));
    } else if (t < 25) {
      drawTitleChars(WIN_CHARS, GAME_W/2, GAME_H*0.32, t-23.4, 0.07, 0.35, 0.75);
    } else {
      titleLogo(1, t-25);
      const cta = clamp((t - 25.6) / 0.8, 0, 1);
      ctx.save();
      ctx.globalAlpha = cta;
      ctx.textAlign = 'center';
      ctx.font = "bold 24px 'PingFang TC','Microsoft JhengHei',sans-serif";
      ctx.fillStyle = '#eaf6ff';
      ctx.fillText('鍵盤＋觸控雙支援 · 立即挑戰', GAME_W / 2, GAME_H * 0.56);
      ctx.font = "14px 'PingFang TC','Microsoft JhengHei',sans-serif";
      ctx.fillStyle = 'rgba(234,246,255,0.6)';
      ctx.fillText('AI未來創作營隊 出品', GAME_W / 2, GAME_H * 0.62);
      ctx.restore();
    }
  }

  drawCinema(t, dt);
}

function loop(now) {
  if (!playing) return;
  if (startTime === null) startTime = now;
  const t = (now - startTime) / 1000;
  if (t >= DURATION) {
    draw(DURATION - 0.01);
    playing = false;
    replayBtn.style.display = 'block';
    if (musicTimer) { clearInterval(musicTimer); musicTimer = null; musicStarted = false; }
    return;
  }
  draw(t);
  requestAnimationFrame(loop);
}

function play() {
  startTime = null;
  firedCues = {};
  playing = true;
  prevT = 0; camShake = 0;
  trans = {t:99, type:'none'};
  replayBtn.style.display = 'none';
  if (soundOn && audioCtx && !musicStarted) { musicStarted = true; startMusic(); }
  requestAnimationFrame(loop);
}
replayBtn.addEventListener('click', play);

// v6 聲音預設開啟：載入即嘗試播放，被瀏覽器擋下時首次互動自動解鎖
try {
  ensureAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (!musicStarted) { musicStarted = true; startMusic(); }
} catch (e) {}
(function(){
  const unlock = () => { if (audioCtx && audioCtx.state === 'suspended' && soundOn) audioCtx.resume(); };
  addEventListener('pointerdown', unlock, {once:true});
  addEventListener('keydown', unlock, {once:true});
})();
play();
</script>
