<!DOCTYPE html>
<!-- 專業AI升級 v6 -->
<!-- v6 摘要：聲音預設開啟＋電影運鏡（幕間推鏡/衝刺震動/終點zoom-punch）＋letterbox＋閃白轉場＋逐字火焰標題與光暈掃過＋烘焙火空/岩壁視差/熔岩/火星粒子/暈影/顆粒＋Web Audio 預告片配樂（鼓組貝斯循環、幕間riser+braam、通關火花、結尾定格重音＋壓縮殘響母線） -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="author" content="AI未來創作營隊">
<title>跑酷火人3D 宣傳影片</title>
<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #070307;
    font-family: "PingFang TC","Microsoft JhengHei",sans-serif;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  canvas { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
  #soundBtn {
    position: fixed; top: 12px; right: 12px; z-index: 20;
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(10,10,20,0.65); border: 1px solid rgba(56,225,255,0.5);
    color: #eaf6ff; font-size: 20px; cursor: pointer;
  }
  #soundHint {
    position: fixed; top: 18px; right: 68px; z-index: 20;
    color: #eaf6ff; font-size: 14px; text-shadow: 0 0 4px #000;
    animation: hintFade 3.2s ease forwards;
    pointer-events: none;
  }
  @keyframes hintFade { 0%{opacity:0} 15%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
  #replayBtn {
    position: fixed; left: 50%; bottom: 12%; transform: translateX(-50%);
    z-index: 20; display: none;
    padding: 14px 42px; font-size: 20px; min-height: 48px;
    background: linear-gradient(92deg,#38e1ff,#4f7cff);
    color: #071018; border: none; border-radius: 10px; cursor: pointer;
    font-family: inherit; font-weight: 800;
  }
</style>
</head>
<body>
<button id="soundBtn">🔊</button>
<div id="soundHint">音效已開啟，點鈕可靜音</div>
<button id="replayBtn">重新播放</button>
<canvas id="stage"></canvas>

<script>
'use strict';
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const soundBtn = document.getElementById('soundBtn');
const replayBtn = document.getElementById('replayBtn');

function resize() {
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', resize); resize();

/* ---------- 音樂（合成、零外部資源） ----------
   v6：預設開聲＋DynamicsCompressor 母線＋程序化殘響；
   輕快電子跑酷配樂（鼓點/琶音貝斯/五聲音階旋律）＋幕間 riser/braam/結尾定格重音 */
let audioCtx = null, soundOn = true, musicStarted = false;
let masterBus = null, musicBus = null, VERB = null, NOISE_BUF = null;
function ensureAudio(){
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const comp = audioCtx.createDynamicsCompressor();
  comp.threshold.value = -16; comp.knee.value = 18; comp.ratio.value = 7;
  comp.attack.value = 0.004; comp.release.value = 0.2;
  comp.connect(audioCtx.destination);
  masterBus = audioCtx.createGain(); masterBus.gain.value = 0.9; masterBus.connect(comp);
  musicBus = audioCtx.createGain(); musicBus.gain.value = 1; musicBus.connect(masterBus);
  VERB = audioCtx.createConvolver();
  (function(){
    const rate = audioCtx.sampleRate, len = (rate*1.8)|0, buf = audioCtx.createBuffer(2,len,rate);
    for(let ch=0;ch<2;ch++){ const d = buf.getChannelData(ch);
      for(let i=0;i<len;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/len,2.7)*0.55; }
    VERB.buffer = buf;
  })();
  const vg = audioCtx.createGain(); vg.gain.value = 0.75; VERB.connect(vg); vg.connect(masterBus);
  NOISE_BUF = (function(){
    const rate = audioCtx.sampleRate, len = (rate*1.5)|0, buf = audioCtx.createBuffer(1,len,rate);
    const d = buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i] = Math.random()*2-1;
    return buf;
  })();
}
soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? '🔊' : '🔇';
  if (soundOn) {
    try { ensureAudio(); } catch (e) {}
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    if (audioCtx && !musicStarted) { musicStarted = true; startMusic(); }
  } else if (audioCtx) {
    audioCtx.suspend();
  }
});

function kick(t, vol) {
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.frequency.setValueAtTime(140, t);
  osc.frequency.exponentialRampToValueAtTime(45, t + 0.12);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
  osc.connect(g).connect(musicBus);
  osc.start(t); osc.stop(t + 0.24);
}
function hat(t, vol) {
  const n = Math.floor(audioCtx.sampleRate * 0.05);
  const buf = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 2);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const f = audioCtx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 6000;
  const g = audioCtx.createGain(); g.gain.setValueAtTime(vol, t);
  src.connect(f).connect(g).connect(musicBus);
  src.start(t);
}
function note(t, freq, dur, vol, type) {
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(g).connect(musicBus);
  osc.start(t); osc.stop(t + dur + 0.02);
}
function chime() {
  if (!soundOn || !audioCtx) return;
  const t = audioCtx.currentTime;
  [880, 1108, 1318].forEach((fq, i) => note(t + i * 0.08, fq, 0.25, 0.14, 'triangle'));
}
function duckMusic(level, hold){
  if(!musicBus) return;
  const g = musicBus.gain, t = audioCtx.currentTime;
  g.cancelScheduledValues(t); g.setValueAtTime(g.value, t);
  g.linearRampToValueAtTime(level, t+0.05);
  g.linearRampToValueAtTime(1, t+(hold||0.9));
}
function braam(vol){
  if(!soundOn || !audioCtx) return;
  const t0 = audioCtx.currentTime;
  duckMusic(0.3, 1.4);
  [55, 55.8, 27.5].forEach((f,i)=>{
    const o = audioCtx.createOscillator(), g = audioCtx.createGain(), lp = audioCtx.createBiquadFilter();
    o.type = 'sawtooth'; o.frequency.value = f;
    lp.type = 'lowpass'; lp.Q.value = 3;
    lp.frequency.setValueAtTime(90, t0);
    lp.frequency.exponentialRampToValueAtTime(540, t0+0.26);
    lp.frequency.exponentialRampToValueAtTime(110, t0+1.45);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol*(i===2?0.7:0.5), t0+0.06);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+1.55);
    o.connect(lp).connect(g).connect(masterBus); g.connect(VERB);
    o.start(t0); o.stop(t0+1.65);
  });
}
function riser(dur){
  if(!soundOn || !audioCtx) return;
  const t0 = audioCtx.currentTime;
  const src = audioCtx.createBufferSource(); src.buffer = NOISE_BUF; src.loop = true;
  const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.3;
  bp.frequency.setValueAtTime(240, t0);
  bp.frequency.exponentialRampToValueAtTime(3200, t0+dur);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(0.15, t0+dur);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur+0.08);
  src.connect(bp).connect(g).connect(masterBus); g.connect(VERB);
  src.start(t0); src.stop(t0+dur+0.15);
}
function whoosh(){
  if(!soundOn || !audioCtx) return;
  const t0 = audioCtx.currentTime;
  const src = audioCtx.createBufferSource(); src.buffer = NOISE_BUF; src.loop = true;
  const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.2;
  bp.frequency.setValueAtTime(2400, t0);
  bp.frequency.exponentialRampToValueAtTime(260, t0+0.42);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(0.15, t0+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+0.42);
  src.connect(bp).connect(g).connect(masterBus); g.connect(VERB);
  src.start(t0); src.stop(t0+0.5);
}
function stinger(){
  if(!soundOn || !audioCtx) return;
  braam(0.5);
  const t = audioCtx.currentTime;
  [523, 784, 1046].forEach((fq, i) => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'triangle'; o.frequency.value = fq;
    g.gain.setValueAtTime(0.0001, t+0.12*i);
    g.gain.exponentialRampToValueAtTime(0.1, t+0.12*i+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t+0.12*i+1.1);
    o.connect(g).connect(masterBus); g.connect(VERB);
    o.start(t+0.12*i); o.stop(t+0.12*i+1.2);
  });
}

// 五聲音階主旋律（C大調），貝斯根音，鼓點：以 0.24 秒為一拍，循環到 30 秒結束
const SCALE = [261.6, 293.7, 329.6, 392.0, 440.0, 523.3, 587.3, 659.3]; // C D E G A C D E
const MELODY_PATTERN = [0,2,4,7,6,4,2,0, 3,4,6,7,4,6,4,3, 0,2,4,7,7,6,4,3, 5,6,4,3,2,0,2,4];
const BASS_PATTERN = [0,0,4,4,3,3,5,5];
let musicTimer = null;
function startMusic() {
  const beat = 0.24;
  let step = 0;
  let startAt = audioCtx.currentTime + 0.05;
  function schedule() {
    if (!soundOn) return;
    if (audioCtx.state !== 'running') { startAt = audioCtx.currentTime + 0.05; return; }
    const t = startAt + step * beat;
    if (t < audioCtx.currentTime - 0.1) { startAt = audioCtx.currentTime + 0.05; return; }
    const bar = step % 8;
    if (step % 2 === 0) kick(t, 0.5);
    if (step % 2 === 1) hat(t, 0.22);
    const mi = MELODY_PATTERN[step % MELODY_PATTERN.length];
    note(t, SCALE[mi], beat * 0.95, 0.16, 'square');
    const bi = BASS_PATTERN[bar];
    note(t, SCALE[bi] / 2, beat * 0.9, 0.2, 'sawtooth');
    step++;
  }
  musicTimer = setInterval(schedule, 240);
  schedule();
}

// ---------- 緩動 ----------
const easeOut = t => 1 - Math.pow(1 - t, 3);
const easeInOut = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
const easeOutBack = t => 1 + 2.7*Math.pow(t-1,3) + 1.7*Math.pow(t-1,2);
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp = (a,b,t) => a+(b-a)*t;

// ---------- v6 烘焙資產：火空/熔岩/平臺/岩壁視差/光暈/暈影/顆粒/光帶 ----------
function bakeTex(w,h,fn){ const c = document.createElement('canvas'); c.width=w; c.height=h; fn(c.getContext('2d'),w,h); return c; }
/* ===================== 以下 3D 場景「直接移植自遊戲《跑酷火人3D》」：同一套投影、烘焙與角色代碼，保證畫面一致 ===================== */
const VW = GAME_W, VH = GAME_H, CX = VW/2, CY = VH*0.42, FOV = VH*0.9;
const TILT = 0.30;
const cosA = Math.cos(TILT), sinA = Math.sin(TILT);
const cam = { x:0, y:170, z:-320 };
function project(x,y,z){
  const dx=x-cam.x, dy=y-cam.y, dz=z-cam.z;
  const ry = dy*cosA + dz*sinA;
  const rz = dz*cosA - dy*sinA;
  if(rz < 14) return null;
  const s = FOV/rz;
  return { x:CX+dx*s, y:CY-ry*s, s };
}
function camDepth(y,z){ return (z-cam.z)*cosA - (y-cam.y)*sinA; }
function quad(a,b,c,d,color){
  if(!a||!b||!c||!d) return false;
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.lineTo(d.x,d.y);
  ctx.closePath(); ctx.fill();
  return true;
}
function quadStroke(a,b,c,d,color,w){
  if(!a||!b||!c||!d) return;
  ctx.strokeStyle=color; ctx.lineWidth=w;
  ctx.beginPath();
  ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.lineTo(d.x,d.y);
  ctx.closePath(); ctx.stroke();
}
function texQuad(a,b,c,d,alpha){
  ctx.save();
  ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.lineTo(d.x,d.y); ctx.closePath(); ctx.clip();
  ctx.globalAlpha = ctx.globalAlpha*alpha;
  const W=rockTexCv.width, H=rockTexCv.height;
  ctx.transform((b.x-a.x)/W,(b.y-a.y)/W,(d.x-a.x)/H,(d.y-a.y)/H,a.x,a.y);
  ctx.drawImage(rockTexCv,0,0);
  ctx.restore();
}
function drawBox3D(x,y,z,hw,h,hd,pal,lavaGlow,outline,tex){
  const tFL=project(x-hw,y,z-hd), tFR=project(x+hw,y,z-hd),
        tBL=project(x-hw,y,z+hd), tBR=project(x+hw,y,z+hd),
        bFL=project(x-hw,y-h,z-hd), bFR=project(x+hw,y-h,z-hd),
        bBL=project(x-hw,y-h,z+hd), bBR=project(x+hw,y-h,z+hd);
  if(cam.x < x-hw){ quad(tFL,tBL,bBL,bFL,pal.sideDark); if(outline) quadStroke(tFL,tBL,bBL,bFL,outline,1); }
  else if(cam.x > x+hw){ quad(tFR,tBR,bBR,bFR,pal.side); if(outline) quadStroke(tFR,tBR,bBR,bFR,outline,1); }
  if(quad(tFL,tFR,bFR,bFL,pal.front)){
    if(bFL&&bFR&&tFL&&tFR){
      const mFL={x:tFL.x+(bFL.x-tFL.x)*0.55, y:tFL.y+(bFL.y-tFL.y)*0.55};
      const mFR={x:tFR.x+(bFR.x-tFR.x)*0.55, y:tFR.y+(bFR.y-tFR.y)*0.55};
      quad(mFL,mFR,bFR,bFL,'rgba(10,4,2,0.35)');
      if(lavaGlow>0){
        const gFL={x:tFL.x+(bFL.x-tFL.x)*0.78, y:tFL.y+(bFL.y-tFL.y)*0.78};
        const gFR={x:tFR.x+(bFR.x-tFR.x)*0.78, y:tFR.y+(bFR.y-tFR.y)*0.78};
        quad(gFL,gFR,bFR,bFL,'rgba(255,110,30,'+(0.32*lavaGlow).toFixed(2)+')');
      }
    }
    if(outline) quadStroke(tFL,tFR,bFR,bFL,outline,1);
  }
  quad(tFL,tFR,tBR,tBL,pal.top);
  if(tex && tFL&&tFR&&tBR&&tBL && Math.abs(tFR.x-tFL.x)>56) texQuad(tFL,tFR,tBR,tBL,0.85);
  quadStroke(tFL,tFR,tBR,tBL,pal.edge,1.5);
  if(outline) quadStroke(tFL,tFR,tBR,tBL,outline,1);
  return {tFL,tFR,tBL,tBR};
}
/* 岩石細節紋理（遊戲同款） */
const rockTexCv = bakeTex(128,128,(g)=>{
  for(let i=0;i<130;i++){
    g.fillStyle = 'rgba(0,0,0,'+(0.05+Math.random()*0.12).toFixed(2)+')';
    const r = 2+Math.random()*7;
    g.beginPath(); g.ellipse(Math.random()*128, Math.random()*128, r, r*0.7, Math.random()*3, 0, 6.29); g.fill();
  }
  for(let i=0;i<90;i++){
    g.fillStyle = 'rgba(255,235,205,'+(0.04+Math.random()*0.08).toFixed(2)+')';
    g.fillRect(Math.random()*128, Math.random()*128, 1+Math.random()*2, 1+Math.random()*2);
  }
  g.strokeStyle='rgba(0,0,0,0.22)'; g.lineWidth=1;
  for(let i=0;i<11;i++){
    let x=Math.random()*128, y=Math.random()*128;
    g.beginPath(); g.moveTo(x,y);
    for(let k=0;k<4;k++){ x+=(Math.random()*2-1)*18; y+=(Math.random()*2-1)*18; g.lineTo(x,y); }
    g.stroke();
  }
});
/* 熔岩結殼紋理（遊戲同款） */
const lavaTexCv = bakeTex(256,256,(g)=>{
  const W=256,H=256;
  for(let i=0;i<46;i++){
    const x=Math.random()*W, y=Math.random()*H, r=14+Math.random()*30;
    const ry=r*(0.5+Math.random()*0.3), rot=Math.random()*3;
    g.fillStyle='rgba(70,16,4,'+(0.5+Math.random()*0.35).toFixed(2)+')';
    for(let ox=-W;ox<=W;ox+=W) for(let oy=-H;oy<=H;oy+=H){
      g.beginPath(); g.ellipse(x+ox,y+oy,r,ry,rot,0,6.29); g.fill();
    }
  }
  for(let i=0;i<70;i++){
    const x=Math.random()*W, y=Math.random()*H, r=1+Math.random()*3;
    g.fillStyle='rgba(255,210,110,'+(0.15+Math.random()*0.3).toFixed(2)+')';
    for(let ox=-W;ox<=W;ox+=W) for(let oy=-H;oy<=H;oy+=H){
      g.beginPath(); g.arc(x+ox,y+oy,r,0,6.29); g.fill();
    }
  }
});
/* 天空／火山剪影／熔岩漸層／結殼合成（遊戲 bakeSky 同款，固定 960×540） */
const skyCv = bakeTex(VW, VH, (g)=>{
  const grad = g.createLinearGradient(0,0,0,VH);
  grad.addColorStop(0,'#0d0308'); grad.addColorStop(0.35,'#2a0a0c');
  grad.addColorStop(0.62,'#6b1a10'); grad.addColorStop(0.8,'#c8451a'); grad.addColorStop(1,'#ff7e3d');
  g.fillStyle = grad; g.fillRect(0,0,VW,VH);
  const hb = VH*0.142;
  for(let i=0;i<90;i++){
    const x=Math.random()*VW, y=Math.random()*hb*0.92;
    g.globalAlpha = 0.2+Math.random()*0.6;
    g.fillStyle='#ffd9c0'; g.fillRect(x,y,Math.random()<0.2?2:1,Math.random()<0.2?2:1);
  }
  g.globalAlpha=1;
  for(let i=0;i<7;i++){
    const cx=Math.random()*VW, cy=hb*(0.22+Math.random()*0.62), rw=90+Math.random()*170, rh=10+Math.random()*18;
    const cg=g.createRadialGradient(cx,cy+rh,2,cx,cy,rw);
    cg.addColorStop(0,'rgba(255,120,50,0.30)');
    cg.addColorStop(0.55,'rgba(130,32,20,0.20)');
    cg.addColorStop(1,'rgba(60,10,14,0)');
    g.fillStyle=cg;
    g.beginPath(); g.ellipse(cx,cy,rw,rh,0,0,Math.PI*2); g.fill();
  }
  const hg=g.createLinearGradient(0,hb-VH*0.09,0,hb+VH*0.02);
  hg.addColorStop(0,'rgba(255,120,40,0)'); hg.addColorStop(0.85,'rgba(255,150,60,0.4)'); hg.addColorStop(1,'rgba(255,190,90,0.55)');
  g.fillStyle=hg; g.fillRect(0,hb-VH*0.09,VW,VH*0.11);
});
function bakeMts(stripH, step, hMin, hVar, color, crater){
  const cv = document.createElement('canvas');
  cv.width=VW; cv.height=Math.ceil(stripH);
  const m=cv.getContext('2d');
  for(let x=-160;x<VW+240;x+=step){
    const h=hMin+(((x*13)%hVar)+hVar)%hVar;
    m.fillStyle=color;
    m.beginPath(); m.moveTo(x-step*0.62,cv.height); m.lineTo(x,cv.height-h); m.lineTo(x+step*0.62,cv.height); m.closePath(); m.fill();
    if(crater){
      m.fillStyle='rgba(255,170,80,0.28)';
      m.fillRect(x-16, cv.height-h-4, 32, 6);
      m.fillStyle='rgba(255,130,45,0.75)';
      m.fillRect(x-9, cv.height-h, 18, 3.5);
    }
  }
  return cv;
}

/* 沿關卡路徑推進（平臺上奔跑、縫隙間跳躍拋物線） */
function pathAt(z){
  for(let i=0;i<platforms.length;i++){
    const p=platforms[i];
    if(z >= p.z-p.d && z <= p.z+p.d){
      const nx = p.x;
      return { x:nx, y:p.y, grounded:true, idx:i };
    }
    const n = platforms[i+1];
    if(n && z > p.z+p.d && z < n.z-n.d){
      const u = (z-(p.z+p.d))/((n.z-n.d)-(p.z+p.d));
      return { x:lerp(p.x,n.x,u), y:lerp(p.y,n.y,u)+Math.sin(u*Math.PI)*72, grounded:false, idx:i };
    }
  }
  return { x:GOAL_PLAT.x, y:GOAL_PLAT.y, grounded:true, idx:platforms.length-1 };
}
function renderGameScene(t, z, running, face, camBackoff){
  const pos = pathAt(z);
  player3.x = pos.x; player3.y = pos.y; player3.z = z;
  player3.running = running; player3.grounded = pos.grounded; player3.face = face;
  if(face === 'happy'){ // 通關慶祝小跳
    const hop = Math.abs(Math.sin(t*5))*30;
    player3.y += hop; player3.grounded = hop < 2;
  }
  cam.x = player3.x*0.7;
  cam.y = player3.y+180;
  cam.z = player3.z-(camBackoff||340);
  drawLava3(t);
  const items=[];
  for(const p of platforms) items.push({d:camDepth(p.y,p.z), kind:'p', p});
  items.push({d:camDepth(player3.y,player3.z)-1, kind:'me'});
  items.sort((a,b)=>b.d-a.d);
  const checkpointIdx = pos.idx;
  for(const it of items){
    if(it.kind==='p') drawPlatform3(it.p,t,checkpointIdx);
    else drawPlayer3(t);
  }
}

    const sx = lerp(minX - 100, maxX + 100, easeInOut(p));
    ctx.save(); ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = 0.85;
    ctx.drawImage(sweepBand, sx - 60, cy - 56, 120, 112);
    ctx.restore();
  }
}
// 轉場與 letterbox
let trans = {t:99, type:'none'}, camShake = 0, prevT = 0;
function triggerTrans(type){ trans = {t:0, type}; }
const LB_H = 54;
function drawCinema(t, dt){
  trans.t += dt;
  if(trans.type==='flash' && trans.t<0.4){
    ctx.save(); ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha = (1-trans.t/0.4)*0.8;
    ctx.fillStyle='#ffe9d0'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.restore();
  } else if(trans.type==='fade' && trans.t<0.7){
    ctx.save(); ctx.globalAlpha = Math.sin(Math.PI*clamp(trans.t/0.7,0,1))*0.8;
    ctx.fillStyle='#070307'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.restore();
  }
  ctx.drawImage(vigTex, 0, 0, GAME_W, GAME_H);
  ctx.save(); ctx.globalAlpha = 0.5;
  ctx.fillStyle = grainPats[(t*14|0) % 3];
  ctx.fillRect(0,0,GAME_W,GAME_H);
  ctx.restore();
  const lb = LB_H * easeOut(clamp(t/1.3, 0, 1));
  ctx.fillStyle = '#050205';
  ctx.fillRect(0, 0, GAME_W, lb);
  ctx.fillRect(0, GAME_H - lb, GAME_W, lb);
}

// ---------- 場景繪製 ----------
function drawEmbers(t, seedOffset) {
  let s = 11 + seedOffset;
  const rnd = () => { s = (s * 16807) % 2147483647; return s / 2147483647; };
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < 34; i++) {
    const seed = rnd();
    const x = seed * GAME_W + Math.sin(t*1.4 + seed*20)*14;
    const speed = 30 + seed * 40;
    const y = GAME_H - ((t * speed + seed * 400) % (GAME_H + 60));
    const size = 3 + seed * 6;
    const alpha = clamp(1 - Math.abs(y - GAME_H/2) / (GAME_H/2), 0.1, 0.85);
    ctx.globalAlpha = alpha;
    ctx.drawImage(emberTex, x-size, y-size, size*2, size*2);
  }
  ctx.restore();
}
// 遊戲同款 HUD 膠囊（第◯關／進度％＋時間），置於 letterbox 安全區內
function roundPill(x, y, w, h){
  const r = h/2;
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function drawGameHUD(pct, timeS){
  ctx.save();
  ctx.font = "bold 15px 'PingFang TC','Microsoft JhengHei',sans-serif";
  // 左：關卡膠囊
  ctx.fillStyle = 'rgba(10,14,26,0.66)';
  roundPill(14, 62, 132, 32); ctx.fill();
  ctx.strokeStyle = 'rgba(56,225,255,0.4)'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = '#9adcff'; ctx.textAlign = 'left';
  ctx.fillText('第1關 火山入門', 26, 83);
  // 中：進度＋時間膠囊
  const label1 = '進度 ', v1 = Math.floor(pct)+'%', label2 = '　時間 ', v2 = timeS.toFixed(1)+'s';
  ctx.fillStyle = 'rgba(10,14,26,0.66)';
  roundPill(GAME_W/2-92, 62, 184, 32); ctx.fill();
  ctx.strokeStyle = 'rgba(56,225,255,0.4)'; ctx.stroke();
  ctx.textAlign = 'left';
  let tx = GAME_W/2-78;
  ctx.fillStyle = '#e8f2ff'; ctx.fillText(label1, tx, 83); tx += ctx.measureText(label1).width;
  ctx.fillStyle = '#38e1ff'; ctx.fillText(v1, tx, 83); tx += ctx.measureText(v1).width;
  ctx.fillStyle = '#e8f2ff'; ctx.fillText(label2, tx, 83); tx += ctx.measureText(label2).width;
  ctx.fillStyle = '#38e1ff'; ctx.fillText(v2, tx, 83);
  ctx.restore();
}
function subtitle(text, alpha) {
  // v6：字幕置於下方 letterbox 黑邊內（電影字卡）
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';
  ctx.font = "bold 22px 'PingFang TC','Microsoft JhengHei',sans-serif";
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillText(text, GAME_W / 2 + 1, GAME_H - LB_H/2 + 9);
  ctx.fillStyle = '#ffe9c8';
  ctx.fillText(text, GAME_W / 2, GAME_H - LB_H/2 + 8);
  ctx.restore();
}
function titleLogo(alpha, t) {
  if(alpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.globalCompositeOperation = 'lighter';
  ctx.drawImage(glowTex, GAME_W/2-240, GAME_H*0.40-120, 480, 240);
  ctx.restore();
  ctx.save();
  ctx.globalAlpha = alpha;
  drawTitleChars(TITLE_CHARS, GAME_W/2, GAME_H*0.40, t, 0.11, 0.42, 1.5);
  ctx.restore();
}

// ---------- 時間軸（總長 30 秒，三幕結構）----------
const DURATION = 30;
let startTime = null, playing = false;
let firedCues = {};
function cue(id, fn) { if (!firedCues[id]) { firedCues[id] = true; fn(); } }

function draw(t) {
  const dt = Math.max(0, Math.min(0.1, t - prevT)); prevT = t;
  ctx.clearRect(0, 0, GAME_W, GAME_H);

  // v6 幕間音效與轉場觸發
  cue('amb', () => { whoosh(); });
  if (t > 4.9) cue('riser1', () => riser(1.05));
  if (t > 6) cue('act2', () => { braam(0.45); triggerTrans('flash'); camShake = 10; });
  if (t > 10.9) cue('riser2', () => riser(1.05));
  if (t > 12) cue('act2b', () => { braam(0.4); triggerTrans('flash'); camShake = 8; });
  if (t > 18.9) cue('riser3', () => riser(1.05));
  if (t > 20) cue('act3', () => { braam(0.45); triggerTrans('flash'); camShake = 10; });
  if (t > 23.4) cue('winHit', () => { stinger(); triggerTrans('flash'); camShake = 14; });
  if (t > 25) cue('ctaIn', () => { whoosh(); triggerTrans('fade'); });

  // v6 電影運鏡：逐幕推鏡＋衝刺震動＋終點 zoom-punch
  let zoom = 1.03, ox = 0, oy = 0;
  if (t < 6) { zoom = lerp(1.12, 1.04, easeOut(clamp(t/2.6,0,1))); }
  else if (t < 12) { const p = (t-6)/6; zoom = 1.04 + 0.05*p; ox = -14 + 30*p; }
  else if (t < 20) { const p = (t-12)/8; zoom = 1.09 + 0.03*Math.sin(p*Math.PI); oy = 6*Math.sin(t*1.1); }
  else if (t < 25) { const p = clamp((t-20)/3.4, 0, 1); zoom = lerp(1.06, 1.16, easeInOut(p)); ox = 20*p; }
  else { zoom = lerp(1.18, 1.05, easeOut(clamp((t-25)/1.2,0,1))); ox = 0; }
  if (camShake > 0.05) {
    zoom += camShake*0.003;
    ox += (Math.random()-0.5)*camShake;
    oy += (Math.random()-0.5)*camShake*0.7;
    camShake *= 0.86;
  }
  const mx = GAME_W/2*(1-1/zoom)-0.5, my = GAME_H/2*(1-1/zoom)-0.5;
  ox = clamp(ox, -mx, mx); oy = clamp(oy, -my, my);
  ctx.save();
  ctx.translate(GAME_W/2, GAME_H/2); ctx.scale(zoom, zoom); ctx.translate(-GAME_W/2-ox, -GAME_H/2-oy);

  // ===== 遊戲同款 3D 場景：沿第1關路徑真實跑跳（幕一定場→幕二起跑→幕三衝線）=====
  const GOAL_Z = GOAL_PLAT.z;
  let z3 = 0, running3 = false, face3 = 'normal', backoff = 340;
  if (t < 6) {
    z3 = 0; running3 = false; backoff = lerp(430, 350, easeOut(clamp(t/3,0,1)));
    if (t > 0.2) cue('act1chime', () => chime());
  } else if (t < 12) {
    const p = (t - 6) / 6;
    z3 = lerp(0, 907, p); running3 = true;
    cue('jumpBeat', () => chime());
  } else if (t < 20) {
    const p = (t - 12) / 8;
    z3 = lerp(907, 2197, p); running3 = true;
    // v6 衝刺速度線（保留）
    if (t > 14) cue('speedThump', () => chime());
  } else if (t < 23.4) {
    const p = (t - 20) / 3.4;
    z3 = lerp(2197, GOAL_Z, easeInOut(p)); running3 = true; backoff = lerp(340, 300, p);
  } else {
    z3 = GOAL_Z; running3 = false; face3 = 'happy'; backoff = 320;
  }
  renderGameScene(t, z3, running3, face3, backoff);
  drawEmbers(t, 0);
  if (t >= 12 && t < 20) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for(let i=0;i<10;i++){
      const seed = i*41.3;
      const y = ((seed*67) % (GAME_H*0.6)) + GAME_H*0.15;
      const len = 90 + (seed*13)%120;
      const x = GAME_W - ((t*1300 + seed*177) % (GAME_W+len));
      ctx.globalAlpha = 0.13;
      ctx.fillStyle = '#ffd9a0';
      ctx.fillRect(x, y, len, 2);
    }
    ctx.restore();
  }

  ctx.restore();

  // ===== 螢幕空間覆蓋層（標題/字幕/後製）=====
  if (t < 6) {
    titleLogo(t < 5.4 ? 1 : clamp((6-t)/0.6,0,1), t);
    if (t > 2) {
      const sp = clamp((t - 2) / 0.8, 0, 1) * (t < 5.4 ? 1 : clamp((6-t)/0.6,0,1));
      ctx.save();
      ctx.globalAlpha = sp;
      ctx.textAlign = 'center';
      ctx.font = "20px 'PingFang TC','Microsoft JhengHei',sans-serif";
      ctx.fillStyle = '#9fb3d9';
      ctx.fillText('AI未來創作營隊 出品 · 5 大火山關卡 3D 跑酷', GAME_W / 2, GAME_H * 0.56);
      ctx.restore();
    }
    if (t > 3.6) subtitle('越過熔岩，抵達終點旗！', clamp((t - 3.6) / 0.6, 0, 1));
  } else if (t < 12) {
    if (t < 9) subtitle('WASD / 虛擬搖桿移動，空白鍵起跳', clamp((t - 6.3) / 0.6, 0, 1));
    else subtitle('踩穩平臺，掉進熔岩會回到檢查點！', clamp((t - 9.2) / 0.6, 0, 1));
  } else if (t < 20) {
    drawGameHUD(clamp(907/GOAL_PLAT.z*100 + (t-12)/8 * (2197-907)/GOAL_PLAT.z*100, 0, 100), t-6);
    if (t < 16.4) subtitle('連續平臺挑戰你的節奏感', clamp((t - 12.3) / 0.6, 0, 1));
    else subtitle('計時破紀錄，登上最佳成績！', clamp((t - 16.6) / 0.6, 0, 1));
  } else {
    if (t < 23.4) {
      subtitle('衝向終點旗，完成通關！', clamp((t - 20.3) / 0.6, 0, 1));
    } else if (t < 25) {
      drawTitleChars(WIN_CHARS, GAME_W/2, GAME_H*0.32, t-23.4, 0.07, 0.35, 0.75);
    } else {
      titleLogo(1, t-25);
      const cta = clamp((t - 25.6) / 0.8, 0, 1);
      ctx.save();
      ctx.globalAlpha = cta;
      ctx.textAlign = 'center';
      ctx.font = "bold 24px 'PingFang TC','Microsoft JhengHei',sans-serif";
      ctx.fillStyle = '#eaf6ff';
      ctx.fillText('鍵盤＋觸控雙支援 · 立即挑戰', GAME_W / 2, GAME_H * 0.56);
      ctx.font = "14px 'PingFang TC','Microsoft JhengHei',sans-serif";
      ctx.fillStyle = 'rgba(234,246,255,0.6)';
      ctx.fillText('AI未來創作營隊 出品', GAME_W / 2, GAME_H * 0.62);
      ctx.restore();
    }
  }

  drawCinema(t, dt);
}

function loop(now) {
  if (!playing) return;
  if (startTime === null) startTime = now;
  const t = (now - startTime) / 1000;
  if (t >= DURATION) {
    draw(DURATION - 0.01);
    playing = false;
    replayBtn.style.display = 'block';
    if (musicTimer) { clearInterval(musicTimer); musicTimer = null; musicStarted = false; }
    return;
  }
  draw(t);
  requestAnimationFrame(loop);
}

function play() {
  startTime = null;
  firedCues = {};
  playing = true;
  prevT = 0; camShake = 0;
  trans = {t:99, type:'none'};
  replayBtn.style.display = 'none';
  if (soundOn && audioCtx && !musicStarted) { musicStarted = true; startMusic(); }
  requestAnimationFrame(loop);
}
replayBtn.addEventListener('click', play);

// v6 聲音預設開啟：載入即嘗試播放，被瀏覽器擋下時首次互動自動解鎖
try {
  ensureAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (!musicStarted) { musicStarted = true; startMusic(); }
} catch (e) {}
(function(){
  const unlock = () => { if (audioCtx && audioCtx.state === 'suspended' && soundOn) audioCtx.resume(); };
  addEventListener('pointerdown', unlock, {once:true});
  addEventListener('keydown', unlock, {once:true});
})();
play();
</script>
