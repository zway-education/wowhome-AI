<script>
'use strict';
/* ============================================================
   動物森友會進化史 PRO（專業AI升級 v4）
   三幕：開場品牌卡 → 六世代進化（畫質/音樂逐代升級）→ 未來4K高潮＋煙火
   v4 加料：章節選單（六個年代直接跳轉）
   ============================================================ */
const W = 960, H = 540, SS = 1.5;
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const subEl = document.getElementById('subtitle');
const sndBtn = document.getElementById('sndBtn'), sndLbl = document.getElementById('sndLbl');
const replayBtn = document.getElementById('replayBtn');
const chapBtn = document.getElementById('chapBtn'), chapMenu = document.getElementById('chapMenu');

function resize(){
  const s = Math.min(innerWidth / W, innerHeight / H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  cv.width = Math.round(W * s * dpr); cv.height = Math.round(H * s * dpr);
  cv.style.width = W * s + 'px'; cv.style.height = H * s + 'px';
  ctx.setTransform(s * dpr, 0, 0, s * dpr, 0, 0);
  document.documentElement.style.setProperty('--cvB', Math.max(0, (innerHeight - H * s) / 2) + 'px');
  replayBtn.style.top = Math.round(innerHeight / 2 + H * s * 0.17) + 'px';
}
addEventListener('resize', resize); resize();

/* ---------- 緩動與工具 ---------- */
const E = {
  outQuad: t => 1 - (1 - t) * (1 - t),
  outCubic: t => 1 - Math.pow(1 - t, 3),
  inOutSine: t => -(Math.cos(Math.PI * t) - 1) / 2,
  outBack: t => 1 + 2.7 * Math.pow(t - 1, 3) + 1.7 * Math.pow(t - 1, 2),
  outElastic: t => t === 0 ? 0 : t === 1 ? 1 : Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * (Math.PI * 2 / 3)) + 1
};
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;
const ss01 = (t, a, b) => clamp((t - a) / (b - a), 0, 1);
const rnd = (a, b) => a + Math.random() * (b - a);
const TAU = Math.PI * 2;
function rr(g, x, y, w, h, r){
  g.beginPath(); g.moveTo(x + r, y);
  g.arcTo(x + w, y, x + w, y + h, r); g.arcTo(x + w, y + h, x, y + h, r);
  g.arcTo(x, y + h, x, y, r); g.arcTo(x, y, x + w, y, r); g.closePath();
}
/* 漸層快取：座標恆定的漸層只建一次 */
const GC = {};
function grd(key, make){ let g = GC[key]; if(!g){ g = make(); GC[key] = g; } return g; }

/* ---------- OpenMoji：SVG 序列化 → 離屏烘焙（零外部資源） ---------- */
function svgImg(id){
  const img = new Image();
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(new XMLSerializer().serializeToString(document.getElementById(id)));
  return img;
}
const IMG = { fly: svgImg('svg-fly'), blossom: svgImg('svg-blossom'), leaf: svgImg('svg-leaf') };
function drawIMG(g, img, x, y, w, ang, sx){
  if(!img.complete || !img.naturalWidth) return;
  if(!img._cv){
    const c = document.createElement('canvas'); c.width = c.height = 144;
    c.getContext('2d').drawImage(img, 0, 0, 144, 144); img._cv = c;
  }
  g.save(); g.translate(x, y); if(ang) g.rotate(ang); if(sx) g.scale(sx, 1);
  g.drawImage(img._cv, -w / 2, -w / 2, w, w); g.restore();
}

/* ---------- 烘焙光暈精靈（禁 shadowBlur） ---------- */
function makeGlow(r, g0, b0){
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(64, 64, 2, 64, 64, 64);
  gr.addColorStop(0, `rgba(${r},${g0},${b0},.9)`);
  gr.addColorStop(0.4, `rgba(${r},${g0},${b0},.32)`);
  gr.addColorStop(1, `rgba(${r},${g0},${b0},0)`);
  g.fillStyle = gr; g.fillRect(0, 0, 128, 128);
  return c;
}
const glowWarm = makeGlow(255, 222, 150), glowCyan = makeGlow(96, 226, 255), glowGold = makeGlow(255, 200, 92);
/* 烘焙暗角 */
const vinCv = (() => {
  const c = document.createElement('canvas'); c.width = W; c.height = H;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(W / 2, H / 2, H * 0.42, W / 2, H / 2, H * 0.85);
  gr.addColorStop(0, 'rgba(0,0,0,0)'); gr.addColorStop(1, 'rgba(0,0,0,.42)');
  g.fillStyle = gr; g.fillRect(0, 0, W, H);
  return c;
})();
/* 烘焙 CRT 掃描線 */
const scanPat = (() => {
  const c = document.createElement('canvas'); c.width = 4; c.height = 4;
  const g = c.getContext('2d');
  g.fillStyle = 'rgba(0,0,0,.16)'; g.fillRect(0, 2, 4, 1);
  return ctx.createPattern(c, 'repeat');
})();

/* ---------- 世代資料（風格化演出，非官方素材） ---------- */
const ERAS = [
  { year:'2001', name:'第一代：森林小村莊', console:'N64 / GameCube', pix:6,   det:0, palette:['#5c94fc','#7ec850','#3a7d33','#c8925a'], hill:'#4a7d3c' },

/* ---------- Web Audio（預設靜音・總線壓縮） ---------- */
let AC = null, master = null, audioOn = false;
function initAudio(){
  AC = new (window.AudioContext || window.webkitAudioContext)();
  master = AC.createGain(); master.gain.value = 0;
  const comp = AC.createDynamicsCompressor();
  comp.threshold.value = -14; comp.knee.value = 22; comp.ratio.value = 9;
  comp.attack.value = 0.003; comp.release.value = 0.24;
  master.connect(comp); comp.connect(AC.destination);
  /* 環境風聲（單一常駐迴圈，重播不疊加） */
  const len = AC.sampleRate * 2, buf = AC.createBuffer(1, len, AC.sampleRate), d = buf.getChannelData(0);
  for(let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
  const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 420;
  const wg = AC.createGain(); wg.gain.value = 0.022;
  src.connect(lp); lp.connect(wg); wg.connect(master); src.start();
}
function tone(freq, dur, type, vol, slide, delay){
  if(!audioOn || !AC || !freq) return;
  const t0 = AC.currentTime + (delay || 0);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(28, freq + slide), t0 + dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0 + 0.012);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(g); g.connect(master); o.start(t0); o.stop(t0 + dur + 0.05);
}
function noiseBurst(dur, freq, type, vol, delay){
  if(!audioOn || !AC) return;
  const t0 = AC.currentTime + (delay || 0);
  const len = Math.max(1, AC.sampleRate * dur) | 0, buf = AC.createBuffer(1, len, AC.sampleRate), d = buf.getChannelData(0);
  for(let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = AC.createBufferSource(); src.buffer = buf;
  const f = AC.createBiquadFilter(); f.type = type; f.frequency.value = freq;
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t0); g.gain.exponentialRampToValueAtTime(vol, t0 + 0.015);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  src.connect(f); f.connect(g); g.connect(master); src.start(t0); src.stop(t0 + dur + 0.05);
}
function sfxChime(){ tone(880, 0.1, 'sine', 0.1); tone(1318, 0.16, 'sine', 0.09, 0, 0.09); }
function sfxWhoosh(){ noiseBurst(0.32, 900, 'bandpass', 0.14); }
function sfxJump(){ tone(300, 0.16, 'square', 0.06, 260); }
function sfxLand(){ noiseBurst(0.09, 300, 'lowpass', 0.16); }
function sfxClick(){ tone(880, 0.06, 'triangle', 0.12); }
function sfxPop(){ noiseBurst(0.2, 1400, 'highpass', 0.1); tone(520, 0.3, 'sine', 0.08, -300); }

}
function setAudio(on){
  if(on && !AC) initAudio();
  if(AC && AC.state === 'suspended') AC.resume();
  audioOn = on;
  if(master) master.gain.setTargetAtTime(on ? 0.9 : 0, AC.currentTime, 0.06);
  sndLbl.textContent = on ? '聲音：開' : '聲音：關';

}

/* ---------- 配樂：同一段旋律，配器隨世代進化 ---------- */
const NOTE = 0.26;
const MELODY = [659,784,880,784,659,587,523,587, 659,880,1047,880,659,587,0,0];
const BASS   = [131,0,0,0, 165,0,0,0, 147,0,0,0, 131,0,0,0];
let lastBeat = -1;
function updateMusic(t){
  if(!audioOn) return;
  const beat = Math.floor(t / NOTE);
  if(beat === lastBeat) return;
  lastBeat = beat;
  const m = MELODY[beat % MELODY.length], b = BASS[beat % BASS.length];
  const idx = t < T_INTRO ? -1 : Math.min(5, Math.floor((t - T_INTRO) / SEG));
  if(idx < 0){ if(beat % 4 === 0) tone(m, NOTE * 2, 'sine', 0.03); return; }
  if(idx <= 1){                       /* 掌機 chiptune：方波 */
    tone(m, NOTE * 0.85, 'square', 0.038);
    tone(b, NOTE * 3.4, 'square', 0.03);
  } else if(idx <= 3){                /* 中期：三角波＋鼓點 */
    tone(m, NOTE * 0.9, 'triangle', 0.06);
    tone(b, NOTE * 3.6, 'sine', 0.05);
    if(beat % 2 === 0) noiseBurst(0.03, 6200, 'highpass', 0.025);
  } else {                            /* 現代：疊八度＋和聲墊＋鼓點 */
    tone(m, NOTE * 0.9, 'triangle', 0.06);
    if(m) tone(m / 2, NOTE * 1.8, 'sine', 0.03);
    tone(b, NOTE * 3.6, 'sine', 0.055);
    if(beat % 2 === 0) noiseBurst(0.03, 6200, 'highpass', 0.03);
    if(beat % 8 === 0 && m) tone(m * 1.5, NOTE * 4, 'sine', 0.018);
  }
}

  let jy = 0, syA = 1, sxA = 1;
  if(localT < 1.05){
    if(localT < 0.42){                       /* 預備：下蹲 */
      const k = E.inOutSine(ss01(localT, 0.22, 0.42));
      syA = 1 - 0.16 * k; sxA = 1 + 0.12 * k;
    } else if(localT < 0.78){                /* 跳起：拉長 */
      const ph = ss01(localT, 0.42, 0.78);

      syA = 1 + 0.15 * Math.sin(Math.PI * ph); sxA = 1 - 0.1 * Math.sin(Math.PI * ph);
    } else {                                 /* 落地：擠壓回彈（跟隨） */

  g.fillStyle = earC;
  g.beginPath(); g.ellipse(16 * s, -34 * s, 8 * s, 10 * s, 0.2, 0, TAU); g.fill();

    g.beginPath(); g.ellipse(-16 * s, -34 * s, 4 * s, 5.5 * s, -0.2, 0, TAU); g.fill();

  g.translate(20 * s, -2 * s);
  g.rotate(waving ? -1.9 + Math.sin(t * 11) * 0.42 : 0.5 + Math.sin(t * 3) * 0.06);
  g.fillStyle = bodyC;
  g.beginPath(); g.ellipse(0, 8 * s, 6 * s, 12 * s, 0, 0, TAU); g.fill();
  g.restore();
  g.save(); g.translate(-20 * s, -2 * s); g.rotate(-0.5 - Math.sin(t * 3) * 0.06);
  g.fillStyle = bodyC;
  g.beginPath(); g.ellipse(0, 8 * s, 6 * s, 12 * s, 0, 0, TAU); g.fill();
  g.restore();
  /* 眼睛（眨眼＋看向蝴蝶） */
  const blink = ((t * 1.35 + 0.7) % 3.1) < 0.09 ? 0.12 : 1;
  let lookX = 0, lookY = 0;
  if(flyPos){ lookX = clamp((flyPos.x - x) * 0.006, -1.6, 1.6) * s; lookY = clamp((flyPos.y - y) * 0.006, -1.2, 1.2) * s; }
  g.fillStyle = '#2a2a2a';
  for(const ex of [-8, 8]){
    g.save(); g.translate(ex * s + lookX, -6 * s + lookY); g.scale(1, blink);
    g.beginPath(); g.arc(0, 0, 3.4 * s, 0, TAU); g.fill(); g.restore();
    if(d >= 3 && blink === 1){ g.fillStyle = '#fff';
      g.beginPath(); g.arc(ex * s + lookX + 1.1 * s, -7 * s + lookY, 1 * s, 0, TAU); g.fill();
      g.fillStyle = '#2a2a2a'; }
  }
  /* 腮紅＋鼻＋嘴 */
  if(d >= 3){
    g.fillStyle = 'rgba(255,150,150,.35)';
    g.beginPath(); g.ellipse(-13 * s, 2 * s, 4 * s, 3 * s, 0, 0, TAU); g.fill();
    g.beginPath(); g.ellipse(13 * s, 2 * s, 4 * s, 3 * s, 0, 0, TAU); g.fill();
  }
  g.fillStyle = '#c76a3f';
  g.beginPath(); g.ellipse(0, 2 * s, 3 * s, 2.4 * s, 0, 0, TAU); g.fill();
  g.strokeStyle = '#7a4a2a'; g.lineWidth = 1.6 * s; g.lineCap = 'round';
  g.beginPath();
  if(waving || localT < 1.05) g.arc(0, 6 * s, 4.4 * s, 0.15 * Math.PI, 0.85 * Math.PI); /* 開心笑 */
  else { g.moveTo(-3 * s, 8 * s); g.quadraticCurveTo(0, 10 * s, 3 * s, 8 * s); }
  g.stroke();
  g.restore();
}
/* 小狗夥伴（高世代加入） */
function drawPup(g, x, y, s, era, t){
  if(era.det < 3) return;
  g.save(); g.translate(x, y);
  const hop = Math.abs(Math.sin(t * 4.2)) * -7 * s;
  g.globalAlpha = .22; g.fillStyle = '#000';
  g.beginPath(); g.ellipse(0, 14 * s, 13 * s, 4 * s, 0, 0, TAU); g.fill();
  g.globalAlpha = 1;
  g.translate(0, hop);
  const gr = g.createLinearGradient(0, -14 * s, 0, 12 * s);
  gr.addColorStop(0, '#cfe3f7'); gr.addColorStop(1, '#9fc2e8');
  g.fillStyle = gr;
  g.beginPath(); g.ellipse(0, 0, 13 * s, 12 * s, 0, 0, TAU); g.fill();
  g.beginPath(); g.ellipse(-10 * s, -11 * s, 4 * s, 6 * s, -0.5, 0, TAU); g.fill();
  g.beginPath(); g.ellipse(10 * s, -11 * s, 4 * s, 6 * s, 0.5, 0, TAU); g.fill();
  /* 尾巴搖 */
  g.save(); g.translate(12 * s, 4 * s); g.rotate(Math.sin(t * 10) * 0.5);
  g.beginPath(); g.ellipse(4 * s, 0, 5 * s, 2.4 * s, 0.3, 0, TAU); g.fill(); g.restore();
  g.fillStyle = '#233';
  g.beginPath(); g.arc(-4 * s, -3 * s, 1.7 * s, 0, TAU); g.fill();
  g.beginPath(); g.arc(4 * s, -3 * s, 1.7 * s, 0, TAU); g.fill();
  g.beginPath(); g.ellipse(0, 1.5 * s, 2.2 * s, 1.7 * s, 0, 0, TAU); g.fill();
  g.restore();
}
function drawSparkles(g, era, t){
  if(era.det < 5) return;
  for(let i = 0; i < 16; i++){
    const seed = i * 37.1;
    const sx = (Math.sin(seed) * 0.5 + 0.5) * W;
    const sy = (Math.sin(seed * 1.7) * 0.5 + 0.5) * (H * 0.58);
    const a = (Math.sin(t * 2 + seed) * 0.5 + 0.5) * 0.8;
    if(a < 0.1) continue;
    g.globalAlpha = a;
    g.drawImage(glowGold, sx - 10, sy - 10, 20, 20);
    g.fillStyle = '#fff';
    g.beginPath(); g.arc(sx, sy, 1.7, 0, TAU); g.fill();
  }
  g.globalAlpha = 1;
}
/* 蝴蝶（OpenMoji）路徑 */
function flyAt(era, localT){
  if(era.det < 2 || localT < 1.2 || localT > 4.4) return null;
  const k = (localT - 1.2) / 3.2;
  return { x: lerp(W + 60, -60, k), y: H * 0.42 + Math.sin(k * 9) * 46, k };
}
function renderScene(era, i, t, localT){
  const g = sc;
  g.setTransform(SS, 0, 0, SS, 0, 0);
  /* 推鏡：每世代開場 1.08 → 1.0 */
  const z = lerp(1.08, 1, E.outCubic(clamp(localT / 1.15, 0, 1)));
  g.translate(W / 2, H * 0.68); g.scale(z, z); g.translate(-W / 2, -H * 0.68);
  const cam = Math.sin(localT * 0.35) * 18;
  drawSky(g, era, i);
  drawClouds(g, era, t, cam);
  drawHills(g, era, cam);
  drawGround(g, era, i, cam);
  g.save(); g.translate(-cam * 0.7, 0);
  drawTree(g, 140, H * 0.62 - 4, 1.1, era, t, 1);
  drawTree(g, W - 120, H * 0.62 - 2, 1.3, era, t, 2.4);
  drawTree(g, W * 0.55, H * 0.6 + 10, 0.9, era, t, 4.1);
  drawHouse(g, W * 0.28, H * 0.86, 1, era, t);
  g.restore();
  g.save(); g.translate(-cam, 0);
  drawFlowers(g, W * 0.5, H * 0.9, t, 0.5, era);
  drawFlowers(g, W * 0.72, H * 0.82, t, 2.1, era);
  const fp = flyAt(era, localT);
  drawVillager(g, W * 0.62, H * 0.83, era.det >= 4 ? 1.15 : 1, era, t, localT, fp);
  drawPup(g, W * 0.46, H * 0.86, 1.1, era, t);
  if(fp) drawIMG(g, IMG.fly, fp.x, fp.y, 46, Math.sin(fp.k * 22) * 0.25);
  g.restore();
  /* 場景粒子（葉/花瓣） */
  for(const p of sparts){
    const img = p.kind === 'petal' ? IMG.blossom : IMG.leaf;
    g.globalAlpha = clamp(1 - p.life / p.ttl, 0, 1);
    drawIMG(g, img, p.x, p.y, p.w, p.rot);
  }
  g.globalAlpha = 1;
  drawSparkles(g, era, t);
  g.setTransform(1, 0, 0, 1, 0, 0);
}

/* ---------- 主畫布粒子（轉場爆點/塵土/煙火）swap-pop ---------- */
let parts = [];
function spawnBurst(x, y, n, cols){
  for(let i = 0; i < n; i++){
    const a = rnd(0, TAU), sp = rnd(60, 320);
    parts.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 40, life: 0, ttl: rnd(0.5, 1.1),
      size: rnd(2, 5), col: cols[i % cols.length], grav: 300, kind: 'spark' });
  }
}
function spawnRocket(){
  parts.push({ x: rnd(W * 0.15, W * 0.85), y: H + 10, vx: rnd(-20, 20), vy: rnd(-460, -380),
    life: 0, ttl: rnd(0.7, 0.95), size: 3, col: '#ffe9b0', grav: 60, kind: 'rocket' });
}
const FW_COLS = [['#ffcf5c','#ffa72e','#ff7e3d'], ['#38e1ff','#4f7cff','#9a6bff'], ['#ff6cc7','#ffd76b','#fff']];
function updParts(dt){
  for(let i = parts.length - 1; i >= 0; i--){
    const p = parts[i];
    p.life += dt; p.vy += p.grav * dt; p.x += p.vx * dt; p.y += p.vy * dt;
    if(p.kind === 'rocket' && (p.life > p.ttl || p.vy > -60)){
      const cols = FW_COLS[(Math.random() * FW_COLS.length) | 0];
      spawnBurst(p.x, p.y, 26, cols); sfxPop();
      parts[i] = parts[parts.length - 1]; parts.pop(); continue;
    }
    if(p.life > p.ttl){ parts[i] = parts[parts.length - 1]; parts.pop(); }
  }
}
function drawParts(){
  if(!parts.length) return;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for(const p of parts){
    const a = clamp(1 - p.life / p.ttl, 0, 1);
    ctx.globalAlpha = a * 0.55;
    ctx.drawImage(glowGold, p.x - p.size * 4, p.y - p.size * 4, p.size * 8, p.size * 8);
    ctx.globalAlpha = a;
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, TAU); ctx.fill();
  }
  ctx.restore();
}

let fx = { landed: false };

function eraAt(t){
  const rel = t - T_INTRO;
  const idx = clamp(Math.floor(rel / SEG), 0, ERAS.length - 1);
  return { idx, localT: Math.max(0, rel - idx * SEG) };
}
function markChapter(idx){
  const items = chapMenu.children;
  for(let i = 0; i < items.length; i++) items[i].classList.toggle('cur', i === idx);
}
function draw(t, dt){
  ctx.clearRect(0, 0, W, H);
  if(t < T_INTRO){
    drawBrandCard(t > T_INTRO - 0.5 ? clamp((T_INTRO - t) / 0.5, 0, 1) : 1, t);
  } else if(t < T_ERAS_END){
    const { idx, localT } = eraAt(t);
    const era = ERAS[idx];
    if(idx !== lastEraIdx){
      lastEraIdx = idx; sfxChime(); sfxWhoosh();
      shake = 0.22; flash = 0.55; fx.landed = false;
      sparts.length = 0;
      spawnBurst(W / 2, H / 2, 22, ['#fff', era.palette[0], era.palette[1]]);
      markChapter(idx);
    }
    /* 跳躍音效與落地塵土（對齊村民編舞） */
    if(localT >= 0.42 && localT < 0.42 + dt * 1.5) sfxJump();
    if(!fx.landed && localT >= 0.78){
      fx.landed = true; sfxLand();
      spawnBurst(W / 2 + 40, H * 0.74, 8, ['#e8d7b0', '#d0bd92']);
      shake = Math.max(shake, 0.12);
    }
    spawnScenePart(era);
    ctx.save();
    if(shake > 0){
      const s = shake * 9;
      ctx.translate(rnd(-s, s), rnd(-s, s));
    }
    drawDeviceFrame(idx, t);
    drawScoped(idx, era, t, localT);
    /* 世代交叉淡化 */
    if(idx < ERAS.length - 1 && localT > SEG - XF){
      const fk = E.inOutSine(ss01(localT, SEG - XF, SEG));
      ctx.globalAlpha = fk;
      drawDeviceFrame(idx + 1, t);
      drawScoped(idx + 1, ERAS[idx + 1], t, 0);
      ctx.globalAlpha = 1;
    }
    ctx.restore();
    let cardA = localT < 0.15 ? 0 : 1;
    if(localT > SEG - XF) cardA = clamp((SEG - localT) / XF, 0, 1);
    drawTitleCard(era, cardA, localT / 0.55, idx === 5);
    /* 進度點 */
    for(let i = 0; i < ERAS.length; i++){
      const dx = W / 2 - (ERAS.length - 1) * 11 + i * 22;
      ctx.fillStyle = i === idx ? '#38e1ff' : 'rgba(255,255,255,.35)';
      ctx.beginPath(); ctx.arc(dx, H - 14, i === idx ? 5 : 3.4, 0, TAU); ctx.fill();
    }
  } else {
    const et = t - T_ERAS_END;
    drawEndCard(clamp(et / 0.6, 0, 1), et);
    fwTimer -= dt;
    if(fwTimer <= 0 && et > 0.4){ spawnRocket(); if(Math.random() < 0.4) spawnRocket(); fwTimer = 0.62; }
    if(et > 1.0 && !replayBtn.classList.contains('show')){
      replayBtn.classList.add('show'); sfxFanfare();
    }
  }
  updParts(dt); updSceneParts(dt); drawParts();
  ctx.drawImage(vinCv, 0, 0, W, H);
  if(flash > 0){
    ctx.globalAlpha = flash * 0.7; ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H); ctx.globalAlpha = 1;
  }
  updateSub(t);
}
function frame(now){
  if(lastNow === null) lastNow = now;
  const dt = Math.min(0.05, (now - lastNow) / 1000) * SPEED;
  lastNow = now;
  if(!ended){
    T += dt;
    if(T >= T_END){ T = T_END; ended = true; }
  }
  shake = Math.max(0, shake - dt);
  flash = Math.max(0, flash - dt * 2.2);
  draw(T, dt);
  updateMusic(T);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ---------- 重新播放 ---------- */
function restart(toT){
  T = toT || 0; ended = false;
  lastEraIdx = -1; lastBeat = -1; fx.landed = false;
  parts.length = 0; sparts.length = 0; fwTimer = 0;
  curSub = null; subEl.classList.remove('show');
  replayBtn.classList.remove('show');
  markChapter(-1);
}
replayBtn.addEventListener('click', () => { sfxClick(); restart(0); });

/* ---------- v4 章節選單 ---------- */
const CHAP_LABELS = ['2001 初代', '2005 DS', '2008 Wii', '2012 3DS', '2020 Switch', '2026 未來'];
CHAP_LABELS.forEach((lab, i) => {
  const b = document.createElement('button');
  b.className = 'chapItem'; b.type = 'button'; b.textContent = lab;
  b.addEventListener('click', () => {
    sfxClick(); sfxWhoosh();
    restart(T_INTRO + i * SEG + 0.001);
    chapMenu.classList.remove('open');
  });
  chapMenu.appendChild(b);
});
chapBtn.addEventListener('click', () => {
  sfxClick();
  chapMenu.classList.toggle('open');
});

/* 測試/除錯掛鉤 */
window.__dbg = () => ({ T: T, ended: ended, era: lastEraIdx, parts: parts.length, sparts: sparts.length, audioOn: audioOn });
</script>
