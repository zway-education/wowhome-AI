<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>小狗追貓咪撞牆</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 70%, #90EE90 70%, #90EE90 100%);
    font-family: sans-serif;
    overflow: hidden;
  }

  .stage {
    position: relative;
    width: 900px;
    height: 400px;
    overflow: hidden;
    border: 4px solid #654321;
    background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 75%, #90EE90 75%, #7CCB6D 100%);
  }

  .wall {
    position: absolute;
    right: 0;
    top: 0;
    width: 40px;
    height: 100%;
    background: repeating-linear-gradient(
      0deg, #b5651d, #b5651d 20px, #a0522d 20px, #a0522d 22px
    );
    border-left: 4px solid #654321;
  }

  .cat {
    position: absolute;
    bottom: 60px;
    font-size: 60px;
    animation: catRun 3s linear forwards;
  }

  .dog {
    position: absolute;
    bottom: 55px;
    font-size: 70px;
    animation: dogRun 3s linear forwards;
    transform-origin: center;
  }

  .stars {
    position: absolute;
    font-size: 40px;
    opacity: 0;
    animation: showStars 1s ease-in 3s forwards;
  }

  .turtle {
    position: absolute;
    bottom: 58px;
    font-size: 45px;
    animation: turtleWalk 3s linear forwards;
  }

  @keyframes catRun {
    0%   { left: 100px; transform: scaleX(1) translateY(0); }
    15%  { transform: scaleX(1) translateY(-10px); }
    30%  { transform: scaleX(1) translateY(0); }
    45%  { transform: scaleX(1) translateY(-10px); }
    60%  { left: 780px; transform: scaleX(1) translateY(0); }
    62%  { left: 780px; transform: scaleX(-1) translateY(0); }
    100% { left: 100px; transform: scaleX(-1) translateY(0); }
  }

  @keyframes dogRun {
    0%   { left: 0px;  transform: scaleX(1) translateY(0) rotate(0deg); }
    15%  { transform: scaleX(1) translateY(-12px) rotate(0deg); }
    30%  { transform: scaleX(1) translateY(0) rotate(0deg); }
    45%  { transform: scaleX(1) translateY(-12px) rotate(0deg); }
    58%  { left: 800px; transform: scaleX(1) translateY(0) rotate(0deg); }
    64%  { left: 850px; transform: scaleX(1) translateY(0) rotate(0deg); }
    68%  { left: 835px; transform: scaleX(1) translateY(-5px) rotate(-15deg); }
    72%  { left: 800px; transform: scaleX(1) translateY(10px) rotate(20deg); }
    78%  { left: 815px; transform: scaleX(1) translateY(-8px) rotate(-10deg); }
    84%  { left: 795px; transform: scaleX(1) translateY(5px) rotate(15deg); }
    100% { left: 805px; transform: scaleX(1) translateY(0) rotate(0deg); }
  }

  @keyframes showStars {
    0%   { opacity: 0; transform: scale(0.5) rotate(0deg); }
    30%  { opacity: 1; transform: scale(1.3) rotate(20deg); }
    60%  { opacity: 1; transform: scale(1) rotate(-20deg); }
    100% { opacity: 0; transform: scale(1) rotate(0deg); }
  }

  @keyframes turtleWalk {
    0%   { left: 30px; }
    100% { left: 200px; }
  }

  .caption {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 22px;
    font-weight: bold;
    color: #444;
    background: rgba(255,255,255,0.7);
    padding: 6px 16px;
    border-radius: 12px;
  }

  .replay {
    display: block;
    margin: 20px auto 0;
    padding: 8px 20px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 8px;
    border: none;
    background: #ff8c42;
    color: white;
  }

  .replay:hover {
    background: #e6752d;
  }
</style>
</head>
<body>
<div>
  <div class="stage" id="stage">
    <div class="caption">🐶 追著 🐱 跑，結果撞牆了！💥</div>
    <div class="cat" id="cat">🐱</div>
    <div class="dog" id="dog">🐶</div>
    <div class="turtle" id="turtle">🐢</div>
    <div class="stars" id="stars" style="left: 800px; bottom: 120px;">💫💥⭐</div>
    <div class="wall"></div>
  </div>
  <button class="replay" onclick="replay()">再看一次 🔁</button>
</div>

<script>
function replay() {
  ['cat', 'dog', 'turtle', 'stars'].forEach(id => {
    const el = document.getElementById(id);
    el.style.animation = 'none';
    void el.offsetWidth; // reflow to restart animation
    el.style.animation = null;
  });
  document.getElementById('cat').style.animation = 'catRun 3s linear forwards';
  document.getElementById('dog').style.animation = 'dogRun 3s linear forwards';
  document.getElementById('turtle').style.animation = 'turtleWalk 3s linear forwards';
  document.getElementById('stars').style.animation = 'showStars 1s ease-in 3s forwards';
}
</script>
</body>
</html>
