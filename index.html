<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI未來創作營隊 · 作品館</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2338e1ff'/%3E%3Cstop offset='.55' stop-color='%234f7cff'/%3E%3Cstop offset='1' stop-color='%239a6bff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Cline x1='32' y1='7' x2='32' y2='12' stroke='white' stroke-width='3.5' stroke-linecap='round'/%3E%3Ccircle cx='32' cy='6' r='3' fill='white'/%3E%3Crect x='12' y='13' width='40' height='30' rx='9' fill='white'/%3E%3Ccircle cx='24' cy='28' r='4.5' fill='%232f4bd8'/%3E%3Ccircle cx='40' cy='28' r='4.5' fill='%232f4bd8'/%3E%3Crect x='23' y='36' width='18' height='3.6' rx='1.8' fill='%232f4bd8'/%3E%3Crect x='18' y='47' width='28' height='7' rx='3.5' fill='white' opacity='.8'/%3E%3C/svg%3E">
<style>
  :root {
    --bg: #070b14;
    --card: #111830;
    --card-border: rgba(255,255,255,.07);
    --text: #eaf0ff;
    --muted: #8b96b8;
    --cyan: #38e1ff;
    --blue: #4f7cff;
    --violet: #9a6bff;
    --pink: #ff6cc7;
    --chip: rgba(56,225,255,.12);
    --chip-text: #7ceaff;
    --chip2: rgba(255,108,199,.12);
    --chip2-text: #ff9dd9;
    --thumb-bg: #0b1120;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f2f5fc;
      --card: #ffffff;
      --card-border: rgba(20,40,90,.09);
      --text: #131b33;
      --muted: #5d6a8f;
      --chip: rgba(0,150,199,.1);
      --chip-text: #0077a3;
      --chip2: rgba(214,51,132,.1);
      --chip2-text: #b02a6c;
      --thumb-bg: #e6ebf7;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    /* 靜態漸層背景：不用即時模糊，滑動才會順 */
    background:
      radial-gradient(900px 500px at 85% -5%, rgba(79,124,255,.16), transparent 60%),
      radial-gradient(700px 450px at -10% 25%, rgba(154,107,255,.13), transparent 60%),
      radial-gradient(800px 500px at 50% 110%, rgba(56,225,255,.08), transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
    min-height: 100vh;
  }

  /* ===== 頂欄（緊湊） ===== */
  header { max-width: 1180px; margin: 0 auto; padding: 22px 24px 6px; }
  .toprow { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .logo { width: 46px; height: 46px; flex: none; border-radius: 14px;
    background: linear-gradient(145deg, var(--cyan), var(--blue) 55%, var(--violet));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 22px rgba(79,124,255,.35);
  }
  .logo svg { width: 28px; height: 28px; display: block; }
  .brand {
    font-size: clamp(21px, 3.6vw, 30px); font-weight: 800; letter-spacing: 3px;
    background: linear-gradient(92deg, var(--cyan) 0%, #9db8ff 45%, var(--violet) 80%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    white-space: nowrap;
  }
  .sub { color: var(--muted); font-size: 13px; letter-spacing: 3px; margin-top: 2px; }
  .toolrow { display: flex; align-items: center; gap: 12px; margin-top: 14px; flex-wrap: wrap; }
  .stat { background: var(--card); border: 1px solid var(--card-border); border-radius: 999px; padding: 7px 16px; font-size: 13px; color: var(--muted); white-space: nowrap; }
  .stat b { color: var(--text); font-size: 14px; margin-left: 4px; }
  .search {
    flex: 1; min-width: 200px; max-width: 380px;
    padding: 9px 18px; font-size: 14px; color: var(--text);
    background: var(--card); border: 1px solid var(--card-border); border-radius: 999px;
    outline: none; transition: border-color .2s, box-shadow .2s;
  }
  .search::placeholder { color: var(--muted); }
  .search:focus { border-color: var(--cyan); box-shadow: 0 0 0 4px rgba(56,225,255,.12); }
  .prolink {
    margin-left: auto; flex: none; text-decoration: none; font-size: 13.5px; font-weight: 700; letter-spacing: 1px;
    color: #241a05; background: linear-gradient(92deg, #ffcf5c, #ffa72e);
    border-radius: 999px; padding: 9px 20px; box-shadow: 0 6px 18px rgba(255,167,46,.3);
    transition: transform .15s ease, box-shadow .2s ease;
  }
  .prolink:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(255,167,46,.42); }
  @media (max-width: 560px) { .prolink { margin-left: 0; } }

  /* ===== 區塊 ===== */
  main { max-width: 1180px; margin: 0 auto; padding: 8px 24px 90px; }
  .sec { margin-top: 34px; }
  .sec-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 16px; }
  .sec-head h2 { font-size: 21px; font-weight: 700; letter-spacing: 2px; }
  .sec-head .line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--card-border), transparent); }
  .sec-head .count { font-size: 12.5px; color: var(--muted); background: var(--card); border: 1px solid var(--card-border); border-radius: 999px; padding: 4px 14px; white-space: nowrap; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 16px; }
  .card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 16px; overflow: hidden; cursor: pointer;
    transition: transform .18s ease, box-shadow .2s ease, border-color .18s ease;
  }
  .card:hover { transform: translateY(-4px); border-color: var(--cyan); box-shadow: 0 14px 34px rgba(0,0,0,.35); }
  .card.vid:hover { border-color: var(--pink); }
  .thumb {
    position: relative; aspect-ratio: 8 / 5; background: var(--thumb-bg); overflow: hidden;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .25s ease; position: relative; z-index: 1; }
  .card:hover .thumb img { transform: scale(1.05); }
  .thumb .fallback {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 44px; font-weight: 800; color: rgba(255,255,255,.85);
    background: linear-gradient(140deg, var(--blue), var(--violet));
  }
  .card.vid .thumb .fallback { background: linear-gradient(140deg, var(--pink), var(--violet)); }
  .thumb .playbtn {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(5,8,18,.35); opacity: 0; transition: opacity .18s ease; z-index: 2;
  }
  .card:hover .playbtn { opacity: 1; }
  .playbtn span {
    width: 52px; height: 52px; border-radius: 50%; background: rgba(255,255,255,.92); color: #0b1120;
    display: flex; align-items: center; justify-content: center; font-size: 19px; padding-left: 4px;
  }
  .meta { padding: 12px 14px 13px; display: flex; align-items: flex-start; gap: 10px; }
  .meta .info { flex: 1; min-width: 0; }
  .meta .name { font-size: 14.5px; font-weight: 500; line-height: 1.4; word-break: break-word; }
  .meta .byline { margin-top: 3px; font-size: 12px; color: var(--muted); }
  .nums .numit { display: inline-flex; align-items: center; gap: 4px; margin-right: 10px; }
  .nums .numit svg { width: 12px; height: 12px; }
  .nums .numit.love { color: #ff6cc7; }
  .nums .numit.like { color: #38e1ff; }
  .meta .nums { margin-top: 4px; font-size: 11.5px; color: var(--muted); letter-spacing: .5px; min-height: 1em; }
  .meta .tag { flex: none; font-size: 11px; letter-spacing: 1px; border-radius: 999px; padding: 3px 10px; background: var(--chip); color: var(--chip-text); }
  .card.vid .meta .tag { background: var(--chip2); color: var(--chip2-text); }
  .empty { color: var(--muted); padding: 28px; text-align: center; background: var(--card); border: 1px dashed var(--card-border); border-radius: 16px; font-size: 14.5px; grid-column: 1/-1; }

  footer { text-align: center; color: var(--muted); font-size: 12.5px; padding: 30px 16px 38px; letter-spacing: 1px; }

  /* ===== 播放器 ===== */
  #player { position: fixed; inset: 0; background: rgba(3,5,12,.95); display: none; flex-direction: column; z-index: 50; }
  #player.open { display: flex; }
  #player .bar { display: flex; align-items: center; gap: 12px; padding: 12px 18px; color: #fff; }
  #player .bar .title { flex: 1; font-size: 16px; font-weight: 600; letter-spacing: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #player .bar button, #player .bar a {
    background: rgba(255,255,255,.1); color: #fff; border: 1px solid rgba(255,255,255,.14);
    border-radius: 12px; padding: 8px 18px; font-size: 14px; cursor: pointer; text-decoration: none; transition: background .2s;
  }
  #player .bar button:hover, #player .bar a:hover { background: rgba(255,255,255,.2); }
  #player .bar button.vote { border-color: rgba(56,225,255,.4); }
  #player .bar button.vote.hot { border-color: rgba(255,108,199,.5); }
  #player .bar button.vote.voted { background: #2f9e63; border-color: transparent; cursor: default; }
  #player .bar button.vote:disabled { opacity: .55; cursor: default; }
  #player .stage { flex: 1; position: relative; overflow: hidden; margin: 0 10px 10px; border-radius: 16px; background: #fff; }
  #player iframe { border: 0; width: 100%; height: 100%; display: block; }

  @media (max-width: 560px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 11px; }
    .meta { padding: 10px 10px 11px; }
    .meta .name { font-size: 12.5px; }
    .meta .tag { display: none; }
    header { padding-top: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="toprow">
    <div class="logo">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="14" y1="2" x2="14" y2="5" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="14" cy="2.2" r="1.4" fill="#fff"/>
        <rect x="4" y="5.5" width="20" height="15" rx="4.5" fill="#fff" fill-opacity=".95"/>
        <circle cx="10" cy="12" r="2.1" fill="#2f4bd8"/>
        <circle cx="18" cy="12" r="2.1" fill="#2f4bd8"/>
        <rect x="9.5" y="16" width="9" height="1.8" rx=".9" fill="#2f4bd8"/>
        <rect x="8" y="22" width="12" height="3.4" rx="1.7" fill="#fff" fill-opacity=".75"/>
      </svg>
    </div>
    <div>
      <h1 class="brand">AI未來創作營隊</h1>
      <div class="sub">用 AI 打造的遊戲與動畫作品館</div>
    </div>
    <a class="prolink" href="pro.html">JOJO老師升級版</a>
  </div>
  <div class="toolrow">
    <span class="stat">遊戲<b id="gcount">–</b></span>
    <span class="stat">動畫影片<b id="vcount">–</b></span>
    <span class="stat" id="tplaysWrap" style="display:none">總遊玩<b id="tplays">–</b></span>
    <input class="search" id="search" type="search" placeholder="搜尋作品名稱…">
  </div>
</header>

<main>
  <section class="sec">
    <div class="sec-head"><h2>遊戲</h2><div class="line"></div><span class="count" id="gcount2">載入中…</span></div>
    <div class="grid" id="games"></div>
  </section>
  <section class="sec">
    <div class="sec-head"><h2>動畫影片</h2><div class="line"></div><span class="count" id="vcount2">載入中…</span></div>
    <div class="grid" id="videos"></div>
  </section>
</main>

<footer>AI未來創作營隊 · 每一個作品都是小創作者的心血</footer>

<div id="player">
  <div class="bar">
    <div class="title" id="ptitle"></div>
    <button class="vote hot" id="pvote2">非常好玩</button>
    <button class="vote" id="pvote1">好玩</button>
    <a id="popen" href="#" target="_blank" rel="noopener">另開視窗</a>
    <button onclick="closePlayer()">關閉 ✕</button>
  </div>
  <div class="stage" id="pstage">
    <iframe id="pframe" allow="autoplay; fullscreen" sandbox="allow-scripts allow-same-origin allow-pointer-lock"></iframe>
  </div>
</div>

<script>
let DATA = { games: [], videos: [] };

function render(filter) {
  const q = (filter || '').trim().toLowerCase();
  const conf = [
    { id: 'games',  dir: 'games',  cls: '',    tag: '遊戲' },
    { id: 'videos', dir: 'videos', cls: 'vid', tag: '動畫' },
  ];
  for (const c of conf) {
    const grid = document.getElementById(c.id);
    grid.innerHTML = '';
    const list = (DATA[c.id] || []).filter(it => {
      const t = it.title || it.file;
      return !q || t.toLowerCase().includes(q);
    });
    if (!list.length) {
      grid.innerHTML = '<div class="empty">' + (q ? '沒有符合的作品' : '還沒有作品，上傳後就會出現在這裡') + '</div>';
      continue;
    }
    for (const item of list) {
      const title = item.title || item.file.replace(/\.html?$/i, '');
      const thumbSrc = item.thumb
        ? 'thumbs/' + c.dir + '/' + item.thumb
        : 'thumbs/' + c.dir + '/' + item.file.replace(/\.html?$/i, '.png');
      const key = (item.thumb || (c.dir + '-' + title)).replace(/\.(png|jpe?g)$/i, '');
      const card = document.createElement('div');
      card.className = 'card ' + c.cls;
      card.innerHTML =
        '<div class="thumb">' +
          '<div class="fallback"></div>' +
          '<img loading="lazy" alt="">' +
          '<div class="playbtn"><span>▶</span></div>' +
        '</div>' +
        '<div class="meta"><div class="info">' +
          '<div class="name"></div>' +
          (item.author ? '<div class="byline"></div>' : '') +
          '<div class="nums" data-key="' + key + '"></div>' +
        '</div><span class="tag">' + c.tag + '</span></div>';
      card.querySelector('.name').textContent = title;
      card.querySelector('.fallback').textContent = title.charAt(0);
      if (item.author) card.querySelector('.byline').textContent = '作者：' + item.author;
      const img = card.querySelector('img');
      // 優先用內嵌封面（隨資料一起載入，不需下載圖片檔，不會被網路閘道器擋）
      let retries = 0;
      img.onerror = () => {
        if (retries < 2) {
          retries++;
          setTimeout(() => { img.src = encodeURI(thumbSrc) + '?r=' + retries; }, 700 * retries);
        } else {
          img.remove();
        }
      };
      img.src = item.preview || encodeURI(thumbSrc);
      img.alt = title;
      card.onclick = () => openPlayer(title, c.dir + '/' + item.file, key, c.id === 'games');
      grid.appendChild(card);
      countObserver.observe(card.querySelector('.nums'));
    }
  }
  const g = DATA.games || [], v = DATA.videos || [];
  document.getElementById('gcount').textContent = g.length;
  document.getElementById('vcount').textContent = v.length;
  document.getElementById('gcount2').textContent = g.length + ' 個作品';
  document.getElementById('vcount2').textContent = v.length + ' 個作品';
}

document.getElementById('search').addEventListener('input', e => render(e.target.value));

/* ===== 瀏覽 / 遊玩次數（雙計數服務備援；都連不上就安靜隱藏） ===== */
const COUNTER_NS = 'ai-future-camp';
const PAGE_KEY_PREFIX = '';
const countCache = {};
const PROVIDERS = [
  {
    // Abacus：實測讀寫皆可、CORS 全開（404 = 計數器還沒建立，視為 0）
    read: n => fetch('https://abacus.jasoncameron.dev/get/' + COUNTER_NS + '/' + n, { signal: AbortSignal.timeout(5000) }),
    bump: n => fetch('https://abacus.jasoncameron.dev/hit/' + COUNTER_NS + '/' + n),
  },
];

async function readCount(name) {
  if (name in countCache) return countCache[name];
  for (const p of PROVIDERS) {
    try {
      const r = await p.read(name);
      if (r.status === 404) { countCache[name] = 0; return 0; } // 尚未有人計數
      if (r.ok) {
        const j = await r.json();
        const n = j.value ?? j.count ?? 0;
        countCache[name] = n;
        return n;
      }
    } catch (e) {}
  }
  countCache[name] = null;
  return null;
}

async function bumpCount(name) {
  for (const p of PROVIDERS) {
    try { const r = await p.bump(name); if (r.ok) return; } catch (e) {}
  }
}

// 頁面頂部的總遊玩次數
readCount('site-total-plays').then(n => {
  if (n !== null) {
    document.getElementById('tplays').textContent = n;
    document.getElementById('tplaysWrap').style.display = '';
  }
});

const NUM_ICONS = {
  v: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 5c-5 0-9 4.5-10 7 1 2.5 5 7 10 7s9-4.5 10-7c-1-2.5-5-7-10-7zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/></svg>',
  p: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 7h12a4 4 0 0 1 4 4v3a3 3 0 0 1-5.6 1.5L15 14H9l-1.4 1.5A3 3 0 0 1 2 14v-3a4 4 0 0 1 4-4zm1 2v2H5v2h2v2h2v-2h2v-2H9V9H7zm9 .5a1.4 1.4 0 1 0 0 2.8 1.4 1.4 0 0 0 0-2.8zm3 3a1.4 1.4 0 1 0 0 2.8 1.4 1.4 0 0 0 0-2.8z"/></svg>',
  love: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-8-5.3-8-11a4.6 4.6 0 0 1 8-3 4.6 4.6 0 0 1 8 3c0 5.7-8 11-8 11z"/></svg>',
  like: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 10h4v11H2V10zm6 11h8.5a3 3 0 0 0 2.9-2.2l1.5-6A3 3 0 0 0 18 9h-4V5A2.5 2.5 0 0 0 11.5 2.5L8 10v11z"/></svg>',
};
function numSpan(type, label, n) {
  return '<span class="numit ' + type + '" title="' + label + '">' + NUM_ICONS[type] + Math.max(0, parseInt(n) || 0) + '</span>';
}

async function fillNums(el) {
  const key = el.dataset.key;
  if (!key || el.dataset.done) return;
  el.dataset.done = '1';
  const [views, plays, love, loveC, like, likeC] = await Promise.all([
    readCount(key + '-v'), readCount(key + '-p'),
    readCount(key + '-love'), readCount(key + '-love-c'),
    readCount(key + '-like'), readCount(key + '-like-c'),
  ]);
  if (views === null && plays === null) return;
  const netLove = Math.max(0, (love || 0) - (loveC || 0));
  const netLike = Math.max(0, (like || 0) - (likeC || 0));
  const parts = [];
  if (views !== null) parts.push(numSpan('v', '瀏覽', views));
  if (plays !== null && plays > 0) parts.push(numSpan('p', '遊玩', plays));
  if (netLove > 0) parts.push(numSpan('love', '非常好玩', netLove));
  if (netLike > 0) parts.push(numSpan('like', '好玩', netLike));
  el.innerHTML = parts.join('');
}

// 卡片捲進畫面才查詢次數，避免一次發幾十個請求
const countObserver = new IntersectionObserver(entries => {
  for (const en of entries) {
    if (en.isIntersecting) { fillNums(en.target); countObserver.unobserve(en.target); }
  }
}, { rootMargin: '120px' });

/* ===== 播放器（含自動縮放） ===== */
function resetFrame() { document.getElementById('pframe').style.cssText = ''; }

function fitFrame() {
  const wrap = document.getElementById('pstage');
  const f = document.getElementById('pframe');
  let doc;
  try { doc = f.contentDocument; } catch (e) { return; }
  if (!doc || !doc.documentElement) return;
  const de = doc.documentElement, b = doc.body || de;
  const w = Math.max(de.scrollWidth, b.scrollWidth);
  const h = Math.max(de.scrollHeight, b.scrollHeight);
  const cw = wrap.clientWidth, ch = wrap.clientHeight;
  if (!w || !h || !cw || !ch) return;
  if (w <= cw + 4 && h <= ch + 4) { resetFrame(); return; }
  const s = Math.min(cw / w, ch / h, 1);
  f.style.width = w + 'px';
  f.style.height = h + 'px';
  f.style.transform = 'scale(' + s + ')';
  f.style.transformOrigin = 'top left';
  f.style.position = 'absolute';
  f.style.left = Math.max(0, (cw - w * s) / 2) + 'px';
  f.style.top = Math.max(0, (ch - h * s) / 2) + 'px';
}

let fitTimers = [];
function scheduleFit() {
  fitTimers.forEach(clearTimeout);
  fitTimers = [200, 700, 1500].map(ms => setTimeout(fitFrame, ms));
}

/* ===== 好玩投票（可取消、可改投；每裝置每作品一票） ===== */
let voteKey = '';
function refreshVoteButtons() {
  const b2 = document.getElementById('pvote2');
  const b1 = document.getElementById('pvote1');
  const voted = voteKey && localStorage.getItem('voted-' + voteKey);
  for (const [btn, suffix, label] of [[b2, '-love', '非常好玩'], [b1, '-like', '好玩']]) {
    btn.disabled = !voteKey;
    btn.classList.toggle('voted', voted === suffix);
    btn.dataset.key = voteKey;
    if (!voteKey) { btn.textContent = label; continue; }
    const base = voted === suffix ? label + '（取消）' : label;
    btn.textContent = base;
    Promise.all([readCount(voteKey + suffix), readCount(voteKey + suffix + '-c')]).then(([n, c]) => {
      if (btn.dataset.key !== voteKey) return;
      const net = Math.max(0, (n || 0) - (c || 0));
      if (net > 0) btn.textContent = base + ' ' + net;
    });
  }
}
function setupVotes(key) { voteKey = key || ''; refreshVoteButtons(); }
function castVote(suffix) {
  if (!voteKey) return;
  const lsKey = 'voted-' + voteKey;
  const prev = localStorage.getItem(lsKey);
  if (prev === suffix) { // 再點一次同鈕＝取消
    bumpCount(voteKey + suffix + '-c');
    countCache[voteKey + suffix + '-c'] = (countCache[voteKey + suffix + '-c'] || 0) + 1;
    localStorage.removeItem(lsKey);
  } else if (prev) { // 點另一鈕＝改投
    bumpCount(voteKey + prev + '-c');
    bumpCount(voteKey + suffix);
    countCache[voteKey + prev + '-c'] = (countCache[voteKey + prev + '-c'] || 0) + 1;
    countCache[voteKey + suffix] = (countCache[voteKey + suffix] || 0) + 1;
    localStorage.setItem(lsKey, suffix);
  } else { // 第一次投票
    bumpCount(voteKey + suffix);
    countCache[voteKey + suffix] = (countCache[voteKey + suffix] || 0) + 1;
    localStorage.setItem(lsKey, suffix);
  }
  refreshVoteButtons();
}
document.getElementById('pvote2').addEventListener('click', () => castVote('-love'));
document.getElementById('pvote1').addEventListener('click', () => castVote('-like'));

function openPlayer(title, src, key, isGame) {
  document.getElementById('ptitle').textContent = title;
  setupVotes(key);
  resetFrame();
  const f = document.getElementById('pframe');
  f.onload = () => {
    scheduleFit();
    // 自動把鍵盤焦點交給遊戲，否則要先點一下畫面鍵盤才有反應
    try { f.contentWindow.focus(); } catch (e) {}
    // 遊玩次數：玩家在作品中第一次操作（點擊/按鍵）才計一次
    if (key && isGame) {
      try {
        const doc = f.contentDocument;
        const once = () => {
          bumpCount(key + '-p');
          doc.removeEventListener('pointerdown', once);
          doc.removeEventListener('keydown', once);
        };
        doc.addEventListener('pointerdown', once);
        doc.addEventListener('keydown', once);
      } catch (e) {}
    }
  };
  f.src = src;
  document.getElementById('popen').href = src;
  document.getElementById('player').classList.add('open');
  if (key) bumpCount(key + '-v'); // 瀏覽次數：打開作品就計一次
  bumpCount('site-total-plays');
}
function closePlayer() {
  document.getElementById('player').classList.remove('open');
  fitTimers.forEach(clearTimeout);
  resetFrame();
  document.getElementById('pframe').src = 'about:blank';
}
window.addEventListener('resize', () => {
  if (document.getElementById('player').classList.contains('open')) fitFrame();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePlayer(); });

/* ===== 資料載入 ===== */
async function loadManifest() {
  try {
    // 加時間戳參數，連 CDN 快取一起繞過
    const r = await fetch('manifest.json?ts=' + Date.now(), { cache: 'no-store' });
    if (r.ok) return await r.json();
  } catch (e) {}
  const out = { games: [], videos: [] };
  for (const cat of ['games', 'videos']) {
    try {
      const r = await fetch('https://api.github.com/repos/zway-education/wowhome-AI/contents/' + cat + '?ref=main');
      if (r.ok) {
        const files = await r.json();
        out[cat] = files
          .filter(f => /\.html?$/i.test(f.name))
          .map(f => ({ file: f.name, title: f.name.replace(/\.html?$/i, '') }));
      }
    } catch (e) {}
  }
  return out;
}


/* ===== 熱門排序：載入全部計數後，把熱門作品排到最上面 ===== */
function workKey(item, dirName) {
  return (PAGE_KEY_PREFIX || '') + (item.thumb || (dirName + '-' + (item.title || item.file))).replace(/\.(png|jpe?g)$/i, '');
}
async function hotSort() {
  const jobs = [];
  for (const [listName, dirName] of [['games', 'games'], ['videos', 'videos']]) {
    for (const item of (DATA[listName] || [])) {
      const k = workKey(item, dirName);
      jobs.push(Promise.all([
        readCount(k + '-v'), readCount(k + '-p'),
        readCount(k + '-love'), readCount(k + '-love-c'),
        readCount(k + '-like'), readCount(k + '-like-c'),
      ]).then(([v, p, l, lc, g, gc]) => {
        const nl = Math.max(0, (l || 0) - (lc || 0));
        const ng = Math.max(0, (g || 0) - (gc || 0));
        item._score = nl * 3 + ng * 2 + (p || 0) + (v || 0) * 0.5;
      }).catch(() => { item._score = 0; }));
    }
  }
  await Promise.all(jobs);
  let changed = false;
  for (const listName of ['games', 'videos']) {
    const before = (DATA[listName] || []).map(i => i.file).join('|');
    (DATA[listName] || []).sort((a, b) => (b._score || 0) - (a._score || 0));
    if ((DATA[listName] || []).map(i => i.file).join('|') !== before) changed = true;
  }
  if (changed) render(document.getElementById('search').value);
}

loadManifest().then(m => { DATA = m || { games: [], videos: [] }; render(''); hotSort(); });
</script>
