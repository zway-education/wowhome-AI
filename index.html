<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI未來創作營隊 · 作品館</title>
<style>
  :root {
    --bg: #070b14;
    --bg2: #0b1120;
    --card: rgba(255,255,255,.045);
    --card-border: rgba(255,255,255,.08);
    --text: #eaf0ff;
    --muted: #8b96b8;
    --cyan: #38e1ff;
    --blue: #4f7cff;
    --violet: #9a6bff;
    --pink: #ff6cc7;
    --chip: rgba(56,225,255,.12);
    --chip-text: #7ceaff;
    --chip2: rgba(255,108,199,.12);
    --chip2-text: #ff9dd9;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f2f5fc;
      --bg2: #e9edf9;
      --card: rgba(255,255,255,.75);
      --card-border: rgba(20,40,90,.08);
      --text: #131b33;
      --muted: #5d6a8f;
      --chip: rgba(0,150,199,.1);
      --chip-text: #0077a3;
      --chip2: rgba(214,51,132,.1);
      --chip2-text: #b02a6c;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* ===== 背景光暈 ===== */
  .orbs { position: fixed; inset: 0; z-index: -1; overflow: hidden; background: radial-gradient(1200px 700px at 70% -10%, var(--bg2), var(--bg)); }
  .orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: .35; }
  .orb.a { width: 480px; height: 480px; background: var(--blue);  top: -180px; left: -120px; animation: drift 16s ease-in-out infinite alternate; }
  .orb.b { width: 420px; height: 420px; background: var(--violet); top: 30%; right: -160px; animation: drift 20s ease-in-out infinite alternate-reverse; }
  .orb.c { width: 380px; height: 380px; background: var(--cyan); bottom: -160px; left: 30%; opacity: .22; animation: drift 24s ease-in-out infinite alternate; }
  @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(60px,40px) scale(1.15); } }
  @media (prefers-reduced-motion: reduce) { .orb, .bot { animation: none !important; } .card, .sec { animation: none !important; opacity: 1 !important; } }

  /* ===== Hero ===== */
  header { text-align: center; padding: 72px 20px 40px; position: relative; }
  .bot {
    width: 92px; height: 92px; margin: 0 auto 18px; border-radius: 28px;
    background: linear-gradient(145deg, var(--cyan), var(--blue) 55%, var(--violet));
    display: flex; align-items: center; justify-content: center;
    font-size: 52px;
    box-shadow: 0 18px 50px rgba(79,124,255,.35), inset 0 2px 6px rgba(255,255,255,.35);
    animation: bob 3.6s ease-in-out infinite;
  }
  @keyframes bob { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-8px) rotate(2deg); } }
  .brand {
    font-size: clamp(30px, 5.6vw, 52px); font-weight: 800; letter-spacing: 4px;
    background: linear-gradient(92deg, var(--cyan) 0%, #9db8ff 45%, var(--violet) 80%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .sub { margin-top: 10px; color: var(--muted); font-size: 16px; letter-spacing: 6px; }
  .sub b { color: var(--text); font-weight: 600; }
  .stats { display: flex; gap: 14px; justify-content: center; margin-top: 26px; flex-wrap: wrap; }
  .stat {
    backdrop-filter: blur(10px);
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 999px; padding: 9px 22px; font-size: 14px; color: var(--muted);
  }
  .stat b { color: var(--text); font-size: 16px; margin-left: 4px; }

  /* ===== 搜尋 ===== */
  .searchwrap { max-width: 460px; margin: 30px auto 0; padding: 0 20px; }
  .search {
    width: 100%; padding: 13px 22px; font-size: 15px; color: var(--text);
    background: var(--card); border: 1px solid var(--card-border); border-radius: 999px;
    outline: none; backdrop-filter: blur(10px); transition: border-color .2s, box-shadow .2s;
  }
  .search::placeholder { color: var(--muted); }
  .search:focus { border-color: var(--cyan); box-shadow: 0 0 0 4px rgba(56,225,255,.12); }

  /* ===== 區塊 ===== */
  main { max-width: 1180px; margin: 0 auto; padding: 20px 24px 90px; }
  .sec { margin-top: 46px; animation: rise .6s ease both; }
  .sec-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 20px; }
  .sec-head h2 { font-size: 24px; font-weight: 700; letter-spacing: 2px; }
  .sec-head .line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--card-border), transparent); }
  .sec-head .count { font-size: 13px; color: var(--muted); background: var(--card); border: 1px solid var(--card-border); border-radius: 999px; padding: 4px 14px; white-space: nowrap; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 16px; }
  .card {
    position: relative;
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 20px; padding: 24px 16px 18px; text-align: center; cursor: pointer;
    backdrop-filter: blur(12px);
    transition: transform .22s cubic-bezier(.2,.8,.3,1.2), border-color .2s, box-shadow .25s;
    animation: rise .55s ease both;
  }
  .card:hover {
    transform: translateY(-6px) scale(1.02);
    border-color: transparent;
    box-shadow: 0 18px 44px rgba(0,0,0,.35), 0 0 0 1.5px var(--cyan);
  }
  .card.vid:hover { box-shadow: 0 18px 44px rgba(0,0,0,.35), 0 0 0 1.5px var(--pink); }
  .card .icon {
    width: 66px; height: 66px; margin: 0 auto 14px; border-radius: 20px; font-size: 36px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(150deg, rgba(56,225,255,.16), rgba(79,124,255,.16));
    border: 1px solid rgba(56,225,255,.2);
    transition: transform .25s;
  }
  .card.vid .icon { background: linear-gradient(150deg, rgba(255,108,199,.14), rgba(154,107,255,.16)); border-color: rgba(255,108,199,.2); }
  .card:hover .icon { transform: scale(1.12) rotate(-4deg); }
  .card .name { font-size: 15px; line-height: 1.5; font-weight: 500; word-break: break-word; min-height: 2.8em; display: flex; align-items: center; justify-content: center; }
  .card .tag { display: inline-block; margin-top: 10px; font-size: 11.5px; letter-spacing: 1px; border-radius: 999px; padding: 3px 12px; background: var(--chip); color: var(--chip-text); }
  .card.vid .tag { background: var(--chip2); color: var(--chip2-text); }
  .card .play {
    position: absolute; top: 12px; right: 12px; width: 30px; height: 30px; border-radius: 50%;
    background: rgba(255,255,255,.08); display: flex; align-items: center; justify-content: center;
    font-size: 13px; opacity: 0; transform: scale(.6); transition: opacity .2s, transform .2s;
  }
  .card:hover .play { opacity: 1; transform: scale(1); }
  @keyframes rise { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  .empty { color: var(--muted); padding: 30px; text-align: center; background: var(--card); border: 1px dashed var(--card-border); border-radius: 20px; font-size: 15px; grid-column: 1/-1; }

  footer { text-align: center; color: var(--muted); font-size: 13px; padding: 34px 16px 40px; letter-spacing: 1px; }
  footer .heart { color: var(--pink); }

  /* ===== 播放器 ===== */
  #player { position: fixed; inset: 0; background: rgba(3,5,12,.94); backdrop-filter: blur(6px); display: none; flex-direction: column; z-index: 50; }
  #player.open { display: flex; }
  #player .bar { display: flex; align-items: center; gap: 12px; padding: 12px 18px; color: #fff; }
  #player .bar .title { flex: 1; font-size: 16px; font-weight: 600; letter-spacing: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #player .bar button, #player .bar a {
    background: rgba(255,255,255,.1); color: #fff; border: 1px solid rgba(255,255,255,.14);
    border-radius: 12px; padding: 8px 18px; font-size: 14px; cursor: pointer; text-decoration: none; transition: background .2s;
  }
  #player .bar button:hover, #player .bar a:hover { background: rgba(255,255,255,.2); }
  #player .stage { flex: 1; position: relative; overflow: hidden; margin: 0 10px 10px; border-radius: 18px; background: #fff; box-shadow: 0 0 60px rgba(79,124,255,.25); }
  #player iframe { border: 0; width: 100%; height: 100%; display: block; }

  @media (max-width: 560px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .card { padding: 18px 10px 14px; border-radius: 16px; }
    .card .icon { width: 54px; height: 54px; font-size: 30px; border-radius: 16px; }
    .card .name { font-size: 13.5px; }
    header { padding-top: 52px; }
  }
</style>
</head>
<body>
<div class="orbs"><div class="orb a"></div><div class="orb b"></div><div class="orb c"></div></div>

<header>
  <div class="bot">🤖</div>
  <h1 class="brand">AI未來創作營隊</h1>
  <p class="sub">用 AI 打造的 <b>遊戲</b> 與 <b>動畫</b> 作品館</p>
  <div class="stats">
    <span class="stat">🎮 遊戲<b id="gcount">–</b></span>
    <span class="stat">🎬 動畫影片<b id="vcount">–</b></span>
  </div>
  <div class="searchwrap"><input class="search" id="search" type="search" placeholder="🔍 搜尋作品名稱…"></div>
</header>

<main>
  <section class="sec">
    <div class="sec-head"><h2>🎮 遊戲</h2><div class="line"></div><span class="count" id="gcount2">載入中…</span></div>
    <div class="grid" id="games"></div>
  </section>
  <section class="sec" style="animation-delay:.12s">
    <div class="sec-head"><h2>🎬 動畫影片</h2><div class="line"></div><span class="count" id="vcount2">載入中…</span></div>
    <div class="grid" id="videos"></div>
  </section>
</main>

<footer>AI未來創作營隊 <span class="heart">♥</span> 每一個作品都是小創作者的心血</footer>

<div id="player">
  <div class="bar">
    <div class="title" id="ptitle"></div>
    <a id="popen" href="#" target="_blank" rel="noopener">另開視窗</a>
    <button onclick="closePlayer()">✕ 關閉</button>
  </div>
  <div class="stage" id="pstage">
    <iframe id="pframe" allow="autoplay; fullscreen" sandbox="allow-scripts allow-same-origin allow-pointer-lock"></iframe>
  </div>
</div>

<script>
const GAME_EMOJI = ['🎮','🕹️','👾','🎯','🐍','🧩','⚔️','🏹','💣','🏆','🚀','🥊'];
const VID_EMOJI  = ['🎬','📽️','🎞️','🌟','🐶','🐱','⚾','⚽','🐷','🐵','🚗','🎆'];
let DATA = { games: [], videos: [] };

function hashPick(str, arr) {
  let h = 0;
  for (const ch of str) h = (h * 31 + ch.codePointAt(0)) >>> 0;
  return arr[h % arr.length];
}

function render(filter) {
  const q = (filter || '').trim().toLowerCase();
  const conf = [
    { id: 'games',  dir: 'games',  pool: GAME_EMOJI, cls: '',    tag: '遊戲' },
    { id: 'videos', dir: 'videos', pool: VID_EMOJI,  cls: 'vid', tag: '動畫' },
  ];
  for (const c of conf) {
    const grid = document.getElementById(c.id);
    grid.innerHTML = '';
    const list = (DATA[c.id] || []).filter(it => {
      const t = it.title || it.file;
      return !q || t.toLowerCase().includes(q);
    });
    if (!list.length) {
      grid.innerHTML = '<div class="empty">' + (q ? '沒有符合「' + filter + '」的作品' : '還沒有作品，上傳後就會出現在這裡 ✨') + '</div>';
      continue;
    }
    list.forEach((item, i) => {
      const title = item.title || item.file.replace(/\.html?$/i, '');
      const card = document.createElement('div');
      card.className = 'card ' + c.cls;
      card.style.animationDelay = Math.min(i * 40, 400) + 'ms';
      card.innerHTML = '<span class="play">▶</span><div class="icon">' + hashPick(title, c.pool) + '</div><div class="name"></div><span class="tag">' + c.tag + '</span>';
      card.querySelector('.name').textContent = title;
      card.onclick = () => openPlayer(title, c.dir + '/' + item.file);
      grid.appendChild(card);
    });
  }
  const g = DATA.games || [], v = DATA.videos || [];
  document.getElementById('gcount').textContent = g.length;
  document.getElementById('vcount').textContent = v.length;
  document.getElementById('gcount2').textContent = g.length + ' 個作品';
  document.getElementById('vcount2').textContent = v.length + ' 個作品';
}

document.getElementById('search').addEventListener('input', e => render(e.target.value));

/* ===== 播放器（含自動縮放） ===== */
function resetFrame() { document.getElementById('pframe').style.cssText = ''; }

function fitFrame() {
  const wrap = document.getElementById('pstage');
  const f = document.getElementById('pframe');
  let doc;
  try { doc = f.contentDocument; } catch (e) { return; }
  if (!doc || !doc.documentElement) return;
  const de = doc.documentElement, b = doc.body || de;
  const w = Math.max(de.scrollWidth, b.scrollWidth);
  const h = Math.max(de.scrollHeight, b.scrollHeight);
  const cw = wrap.clientWidth, ch = wrap.clientHeight;
  if (!w || !h || !cw || !ch) return;
  if (w <= cw + 4 && h <= ch + 4) { resetFrame(); return; }
  const s = Math.min(cw / w, ch / h, 1);
  f.style.width = w + 'px';
  f.style.height = h + 'px';
  f.style.transform = 'scale(' + s + ')';
  f.style.transformOrigin = 'top left';
  f.style.position = 'absolute';
  f.style.left = Math.max(0, (cw - w * s) / 2) + 'px';
  f.style.top = Math.max(0, (ch - h * s) / 2) + 'px';
}

let fitTimers = [];
function scheduleFit() {
  fitTimers.forEach(clearTimeout);
  fitTimers = [200, 700, 1500].map(ms => setTimeout(fitFrame, ms));
}

function openPlayer(title, src) {
  document.getElementById('ptitle').textContent = title;
  resetFrame();
  const f = document.getElementById('pframe');
  f.onload = scheduleFit;
  f.src = src;
  document.getElementById('popen').href = src;
  document.getElementById('player').classList.add('open');
}
function closePlayer() {
  document.getElementById('player').classList.remove('open');
  fitTimers.forEach(clearTimeout);
  resetFrame();
  document.getElementById('pframe').src = 'about:blank';
}
window.addEventListener('resize', () => {
  if (document.getElementById('player').classList.contains('open')) fitFrame();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePlayer(); });

/* ===== 資料載入 ===== */
async function loadManifest() {
  try {
    const r = await fetch('manifest.json', { cache: 'no-store' });
    if (r.ok) return await r.json();
  } catch (e) {}
  const out = { games: [], videos: [] };
  for (const cat of ['games', 'videos']) {
    try {
      const r = await fetch('https://api.github.com/repos/zway-education/wowhome-AI/contents/' + cat + '?ref=main');
      if (r.ok) {
        const files = await r.json();
        out[cat] = files
          .filter(f => /\.html?$/i.test(f.name))
          .map(f => ({ file: f.name, title: f.name.replace(/\.html?$/i, '') }));
      }
    } catch (e) {}
  }
  return out;
}

loadManifest().then(m => { DATA = m || { games: [], videos: [] }; render(''); });
</script>
</body>
</html>
