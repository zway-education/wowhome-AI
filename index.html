<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貓咪咖啡廳 🐱☕</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>🐾 貓咪咖啡廳 🐾</h1>
      <div class="stats">
        <span>💰 金幣：<b id="coins">0</b></span>
        <span>⭐ 等級：<b id="level">1</b></span>
        <span>😻 好評：<b id="reputation">0</b></span>
      </div>
    </header>

    <main>
      <section id="customers-area">
        <h2>來店的貓咪客人</h2>
        <div id="customers"></div>
      </section>

      <section id="crafting-area">
        <h2>調製飲品 🍹</h2>
        <div id="order-hint">請先接待一位客人</div>
        <div id="ingredients"></div>
        <div id="current-drink">
          <div id="drink-slots"></div>
          <button id="serve-btn" disabled>端上桌 🍽️</button>
          <button id="reset-btn">重來</button>
        </div>
      </section>

      <section id="shop-area">
        <h2>商店升級 🛒</h2>
        <div id="shop"></div>
      </section>
    </main>

    <div id="toast"></div>
  </div>
  <script src="game.js"></script>
</body>
</html>
