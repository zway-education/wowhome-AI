<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WowHome AI 作品館</title>
<style>
  :root {
    --bg: #0f1220;
    --card: #1a1f35;
    --card-hover: #232a4a;
    --text: #eef1ff;
    --muted: #9aa3c7;
    --accent: #7c6cff;
    --accent2: #ff6ca8;
    --badge: #2a3158;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5fb;
      --card: #ffffff;
      --card-hover: #eef0ff;
      --text: #1c2140;
      --muted: #6b7396;
      --badge: #e6e9f8;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    min-height: 100vh;
  }
  header {
    text-align: center;
    padding: 48px 16px 24px;
    background: linear-gradient(135deg, rgba(124,108,255,.18), rgba(255,108,168,.12));
  }
  header h1 { font-size: clamp(28px, 5vw, 44px); letter-spacing: 2px; }
  header h1 .spark { background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  header p { color: var(--muted); margin-top: 10px; font-size: 15px; }
  .stats { display: flex; gap: 12px; justify-content: center; margin-top: 18px; flex-wrap: wrap; }
  .stat { background: var(--badge); border-radius: 999px; padding: 6px 16px; font-size: 14px; color: var(--muted); }
  .stat b { color: var(--text); }
  main { max-width: 1100px; margin: 0 auto; padding: 16px 20px 80px; }
  section { margin-top: 36px; }
  .sec-title { display: flex; align-items: center; gap: 10px; font-size: 22px; margin-bottom: 16px; }
  .sec-title .count { font-size: 13px; background: var(--badge); color: var(--muted); border-radius: 999px; padding: 3px 12px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 22px 14px 18px;
    text-align: center;
    cursor: pointer;
    border: 1px solid transparent;
    transition: transform .15s ease, background .15s ease, border-color .15s ease;
  }
  .card:hover { transform: translateY(-4px); background: var(--card-hover); border-color: var(--accent); }
  .card .emoji { font-size: 42px; display: block; margin-bottom: 12px; }
  .card .name { font-size: 15px; line-height: 1.45; word-break: break-word; }
  .empty { color: var(--muted); padding: 26px; text-align: center; background: var(--card); border-radius: 16px; font-size: 15px; }
  footer { text-align: center; color: var(--muted); font-size: 13px; padding: 30px 16px; }
  /* modal player */
  #player {
    position: fixed; inset: 0; background: rgba(5,7,16,.92);
    display: none; flex-direction: column; z-index: 50;
  }
  #player.open { display: flex; }
  #player .bar {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; color: #fff;
  }
  #player .bar .title { flex: 1; font-size: 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #player .bar button, #player .bar a {
    background: var(--badge); color: var(--text); border: 0; border-radius: 10px;
    padding: 8px 16px; font-size: 14px; cursor: pointer; text-decoration: none;
  }
  #player .stage { flex: 1; position: relative; overflow: hidden; margin: 0 8px; border-radius: 14px 14px 0 0; background: #fff; }
  #player iframe { border: 0; width: 100%; height: 100%; display: block; }
  @media (max-width: 520px) { .grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<header>
  <h1>🏠 WowHome <span class="spark">AI 作品館</span></h1>
  <p>用 AI 做出來的遊戲和動畫，全部收藏在這一頁</p>
  <div class="stats">
    <span class="stat">🎮 遊戲 <b id="gcount">–</b></span>
    <span class="stat">🎬 動畫影片 <b id="vcount">–</b></span>
  </div>
</header>
<main>
  <section>
    <div class="sec-title">🎮 遊戲 <span class="count" id="gcount2">載入中…</span></div>
    <div class="grid" id="games"></div>
  </section>
  <section>
    <div class="sec-title">🎬 動畫影片 <span class="count" id="vcount2">載入中…</span></div>
    <div class="grid" id="videos"></div>
  </section>
</main>
<footer>zway-education / wowhome-AI</footer>

<div id="player">
  <div class="bar">
    <div class="title" id="ptitle"></div>
    <a id="popen" href="#" target="_blank" rel="noopener">另開視窗</a>
    <button onclick="closePlayer()">✕ 關閉</button>
  </div>
  <div class="stage" id="pstage">
    <iframe id="pframe" allow="autoplay; fullscreen" sandbox="allow-scripts allow-same-origin allow-pointer-lock"></iframe>
  </div>
</div>

<script>
const GAME_EMOJI = ['🎮','🕹️','👾','🎯','🐍','🧩','⚔️','🏹','💣','🏆','🚀','🥊'];
const VID_EMOJI  = ['🎬','📽️','🎞️','🌟','🐶','🐱','⚾','⚽','🐷','🐵','🚗','🎆'];

function hashPick(str, arr) {
  let h = 0;
  for (const ch of str) h = (h * 31 + ch.codePointAt(0)) >>> 0;
  return arr[h % arr.length];
}

function render(id, list, dir, emojiPool) {
  const grid = document.getElementById(id);
  grid.innerHTML = '';
  if (!list.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">還沒有作品，上傳後就會出現在這裡 ✨</div>';
    return;
  }
  for (const item of list) {
    const title = item.title || item.file.replace(/\.html?$/i, '');
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = '<span class="emoji">' + hashPick(title, emojiPool) + '</span><span class="name"></span>';
    card.querySelector('.name').textContent = title;
    card.onclick = () => openPlayer(title, dir + '/' + item.file);
    grid.appendChild(card);
  }
}

function resetFrame() {
  const f = document.getElementById('pframe');
  f.style.cssText = '';
}

// 量測作品實際尺寸，太大就等比縮小到剛好塞進畫面
function fitFrame() {
  const wrap = document.getElementById('pstage');
  const f = document.getElementById('pframe');
  let doc;
  try { doc = f.contentDocument; } catch (e) { return; } // 跨網域時放棄（正常情況同網域）
  if (!doc || !doc.documentElement) return;
  const de = doc.documentElement, b = doc.body || de;
  const w = Math.max(de.scrollWidth, b.scrollWidth);
  const h = Math.max(de.scrollHeight, b.scrollHeight);
  const cw = wrap.clientWidth, ch = wrap.clientHeight;
  if (!w || !h || !cw || !ch) return;
  if (w <= cw + 4 && h <= ch + 4) { resetFrame(); return; } // 塞得下就不縮放
  const s = Math.min(cw / w, ch / h, 1);
  f.style.width = w + 'px';
  f.style.height = h + 'px';
  f.style.transform = 'scale(' + s + ')';
  f.style.transformOrigin = 'top left';
  f.style.position = 'absolute';
  f.style.left = Math.max(0, (cw - w * s) / 2) + 'px';
  f.style.top = Math.max(0, (ch - h * s) / 2) + 'px';
}

let fitTimers = [];
function scheduleFit() {
  fitTimers.forEach(clearTimeout);
  // 作品載入後版面可能還在變，多量幾次
  fitTimers = [200, 700, 1500].map(ms => setTimeout(fitFrame, ms));
}

function openPlayer(title, src) {
  document.getElementById('ptitle').textContent = title;
  resetFrame();
  const f = document.getElementById('pframe');
  f.onload = scheduleFit;
  f.src = src;
  document.getElementById('popen').href = src;
  document.getElementById('player').classList.add('open');
}
function closePlayer() {
  document.getElementById('player').classList.remove('open');
  fitTimers.forEach(clearTimeout);
  resetFrame();
  document.getElementById('pframe').src = 'about:blank';
}
window.addEventListener('resize', () => {
  if (document.getElementById('player').classList.contains('open')) fitFrame();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePlayer(); });

async function loadManifest() {
  try {
    const r = await fetch('manifest.json', { cache: 'no-store' });
    if (r.ok) return await r.json();
  } catch (e) {}
  // fallback: list the repo folders via the GitHub API
  const out = { games: [], videos: [] };
  for (const cat of ['games', 'videos']) {
    try {
      const r = await fetch('https://api.github.com/repos/zway-education/wowhome-AI/contents/' + cat + '?ref=main');
      if (r.ok) {
        const files = await r.json();
        out[cat] = files
          .filter(f => /\.html?$/i.test(f.name))
          .map(f => ({ file: f.name, title: f.name.replace(/\.html?$/i, '') }));
      }
    } catch (e) {}
  }
  return out;
}

loadManifest().then(m => {
  const g = m.games || [], v = m.videos || [];
  render('games', g, 'games', GAME_EMOJI);
  render('videos', v, 'videos', VID_EMOJI);
  document.getElementById('gcount').textContent = g.length;
  document.getElementById('vcount').textContent = v.length;
  document.getElementById('gcount2').textContent = g.length + ' 個作品';
  document.getElementById('vcount2').textContent = v.length + ' 個作品';
});
</script>
</body>
</html>
