<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>貪食蛇</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1e1e2f;
    color: #fff;
    font-family: "Microsoft JhengHei", sans-serif;
  }
  h1 { margin: 10px 0; }
  #score { margin-bottom: 10px; font-size: 20px; }
  canvas {
    background: #111;
    border: 4px solid #4caf50;
    border-radius: 6px;
  }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
  }
  #overlay button {
    margin-top: 16px;
    padding: 10px 24px;
    font-size: 18px;
    border: none;
    border-radius: 6px;
    background: #4caf50;
    color: #fff;
    cursor: pointer;
  }
  #hint { margin-top: 10px; opacity: 0.7; font-size: 14px; }
</style>
</head>
<body>
  <h1>🐍 貪食蛇</h1>
  <div id="score">分數: 0</div>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="hint">使用方向鍵或 W A S D 控制,按空白鍵暫停</div>

  <div id="overlay">
    <div id="overlayText">遊戲結束</div>
    <button id="restartBtn">重新開始</button>
  </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const grid = 20;
const tileCount = canvas.width / grid;

const BASE_SPEED = 150;
const MIN_SPEED = 70;
const SPEED_STEP = 2;

let snake, velocity, food, score, gameOver, paused, loopId, speed;

function init() {
  snake = [{ x: 10, y: 10 }];
  velocity = { x: 0, y: 0 };
  score = 0;
  gameOver = false;
  paused = false;
  speed = BASE_SPEED;
  placeFood();
  document.getElementById('score').textContent = '分數: 0';
  document.getElementById('overlay').style.display = 'none';
  restartLoop();
}

function restartLoop() {
  if (loopId) clearInterval(loopId);
  loopId = setInterval(tick, speed);
}

function placeFood() {
  food = {
    x: Math.floor(Math.random() * tileCount),
    y: Math.floor(Math.random() * tileCount)
  };
  if (snake.some(s => s.x === food.x && s.y === food.y)) placeFood();
}

function tick() {
  if (gameOver || paused) return;

  const head = { x: snake[0].x + velocity.x, y: snake[0].y + velocity.y };

  if (velocity.x === 0 && velocity.y === 0) {
    draw();
    return;
  }

  if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    document.getElementById('score').textContent = '分數: ' + score;
    placeFood();
    speed = Math.max(MIN_SPEED, BASE_SPEED - score * SPEED_STEP);
    restartLoop();
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#ff5252';
  ctx.fillRect(food.x * grid, food.y * grid, grid - 2, grid - 2);

  ctx.fillStyle = '#4caf50';
  snake.forEach((s, i) => {
    ctx.fillStyle = i === 0 ? '#8bc34a' : '#4caf50';
    ctx.fillRect(s.x * grid, s.y * grid, grid - 2, grid - 2);
  });
}

function endGame() {
  gameOver = true;
  document.getElementById('overlayText').textContent = `遊戲結束!最終分數: ${score}`;
  document.getElementById('overlay').style.display = 'flex';
}

document.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();
  if (key === ' ') {
    paused = !paused;
    return;
  }
  if ((key === 'arrowup' || key === 'w') && velocity.y !== 1) velocity = { x: 0, y: -1 };
  else if ((key === 'arrowdown' || key === 's') && velocity.y !== -1) velocity = { x: 0, y: 1 };
  else if ((key === 'arrowleft' || key === 'a') && velocity.x !== 1) velocity = { x: -1, y: 0 };
  else if ((key === 'arrowright' || key === 'd') && velocity.x !== -1) velocity = { x: 1, y: 0 };
});

document.getElementById('restartBtn').addEventListener('click', init);

init();
</script>
</body>
</html>
