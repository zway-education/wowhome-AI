<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>貪食蛇 Snake</title>
<style>
  body {
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #1e1e2e;
    font-family: sans-serif;
    color: #fff;
  }
  h1 { margin: 12px 0; }
  #score { margin-bottom: 8px; font-size: 18px; }
  canvas {
    background: #11111b;
    border: 4px solid #45475a;
    border-radius: 8px;
  }
  #overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.6);
    flex-direction: column;
  }
  #overlay button {
    margin-top: 16px;
    padding: 8px 20px;
    font-size: 16px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    background: #89b4fa;
  }
</style>
</head>
<body>
<h1>貪食蛇 Snake</h1>
<div id="score">分數：0</div>
<canvas id="game" width="400" height="400"></canvas>
<p>方向鍵 / WASD 控制，空白鍵暫停</p>

<div id="overlay">
  <div id="overlayText" style="font-size:28px;">遊戲結束</div>
  <button id="restartBtn">重新開始</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const overlay = document.getElementById('overlay');
const overlayText = document.getElementById('overlayText');
const restartBtn = document.getElementById('restartBtn');

const GRID = 20;
const CELLS = canvas.width / GRID;

let snake, dir, nextDir, food, score, running, paused, tickHandle;

function resetGame() {
  snake = [{x: 8, y: 10}, {x: 7, y: 10}, {x: 6, y: 10}];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score = 0;
  paused = false;
  running = true;
  placeFood();
  scoreEl.textContent = '分數：0';
  overlay.style.display = 'none';
  if (tickHandle) clearInterval(tickHandle);
  tickHandle = setInterval(tick, 110);
}

function placeFood() {
  while (true) {
    const f = { x: Math.floor(Math.random() * CELLS), y: Math.floor(Math.random() * CELLS) };
    if (!snake.some(s => s.x === f.x && s.y === f.y)) {
      food = f;
      return;
    }
  }
}

function tick() {
  if (!running || paused) return;
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if (head.x < 0 || head.y < 0 || head.x >= CELLS || head.y >= CELLS ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver();
    return;
  }

  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    scoreEl.textContent = '分數：' + score;
    placeFood();
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.fillStyle = '#11111b';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#f38ba8';
  ctx.fillRect(food.x * GRID, food.y * GRID, GRID - 2, GRID - 2);

  snake.forEach((s, i) => {
    ctx.fillStyle = i === 0 ? '#a6e3a1' : '#94e2d5';
    ctx.fillRect(s.x * GRID, s.y * GRID, GRID - 2, GRID - 2);
  });
}

function gameOver() {
  running = false;
  clearInterval(tickHandle);
  overlayText.textContent = '遊戲結束！分數：' + score;
  overlay.style.display = 'flex';
}

const keyMap = {
  ArrowUp: {x:0,y:-1}, ArrowDown: {x:0,y:1}, ArrowLeft: {x:-1,y:0}, ArrowRight: {x:1,y:0},
  w: {x:0,y:-1}, s: {x:0,y:1}, a: {x:-1,y:0}, d: {x:1,y:0},
};

window.addEventListener('keydown', e => {
  if (e.key === ' ') {
    if (running) paused = !paused;
    return;
  }
  const nd = keyMap[e.key];
  if (!nd) return;
  if (nd.x === -dir.x && nd.y === -dir.y) return;
  nextDir = nd;
});

restartBtn.addEventListener('click', resetGame);

resetGame();
</script>
</body>
</html>
