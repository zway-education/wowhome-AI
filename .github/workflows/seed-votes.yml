name: Seed random likes

on:
  push:
    branches: [main]
    paths:
      - 'scripts/seed-votes.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: seed-votes
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Seed vote counters
        run: node scripts/seed-votes.js
