name: Update gallery manifest and thumbnails

on:
  push:
    branches: [main]
    paths:
      - 'games/**'
      - 'videos/**'
      - 'pro/**'
      - 'authors.json'

permissions:
  contents: write

concurrency:
  group: manifest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0  # 完整歷史，否則 build-manifest.js 的 git log 找不到作品真正的建立日期

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install script dependencies
        run: npm install --prefix scripts --no-fund --no-audit

      - name: Generate missing thumbnails (skips existing)
        run: node scripts/thumb.js "$(which google-chrome)"

      - name: Build embedded previews
        run: node scripts/make-previews.js "$(which google-chrome)"

      - name: Build manifest.json
        run: node scripts/build-manifest.js

      - name: Commit updates
        run: |
          git config user.name "gallery-bot"
          git config user.email "actions@users.noreply.github.com"
          git add manifest.json thumbs
          if ! git diff --cached --quiet; then
            git commit -m "更新作品清單與縮圖 [skip ci]"
            for i in 1 2 3 4; do
              git push && break
              git pull --rebase origin main
            done
          fi
