name: Seed artifact view counts

on:
  push:
    branches: [main]
    paths:
      - 'scripts/seed-views.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: seed-views
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Seed view counters
        run: node scripts/seed-views.js
