name: Counter update test

on:
  push:
    branches: [main]
    paths: ['.github/workflows/counter-test.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test abacus update/decrement support
        run: |
          NS=ai-future-camp; K=upd-test
          echo "=== hit x2 ==="
          curl -sS -m 10 "https://abacus.jasoncameron.dev/hit/$NS/$K"; echo
          curl -sS -m 10 "https://abacus.jasoncameron.dev/hit/$NS/$K"; echo
          echo "=== update -1 (query amount) ==="
          curl -sS -m 10 -w "\nHTTP %{http_code}\n" "https://abacus.jasoncameron.dev/update/$NS/$K?amount=-1" || echo FAIL
          echo "=== update -1 (query value) ==="
          curl -sS -m 10 -w "\nHTTP %{http_code}\n" "https://abacus.jasoncameron.dev/update/$NS/$K?value=-1" || echo FAIL
          echo "=== get after updates ==="
          curl -sS -m 10 "https://abacus.jasoncameron.dev/get/$NS/$K"; echo
          echo "=== CORS on update ==="
          curl -sS -m 10 -o /dev/null -D - -H "Origin: https://wowhome-ai.vercel.app" "https://abacus.jasoncameron.dev/update/$NS/$K?amount=-1" | grep -i "access-control" || echo "no CORS headers"
