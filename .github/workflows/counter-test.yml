name: Counter service test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test counter services
        run: |
          echo "=== counterapi.dev v1 up ==="
          curl -sS -m 10 -w "\nHTTP %{http_code}\n" "https://api.counterapi.dev/v1/ai-future-camp/svc-test/up" || echo FAIL
          echo "=== counterapi.dev v1 get ==="
          curl -sS -m 10 -w "\nHTTP %{http_code}\n" "https://api.counterapi.dev/v1/ai-future-camp/svc-test" || echo FAIL
          echo "=== mileshilliard hit ==="
          curl -sS -m 10 -w "\nHTTP %{http_code}\n" "https://countapi.mileshilliard.com/api/v1/hit/ai-future-camp/svc-test" || echo FAIL
          echo "=== mileshilliard get ==="
          curl -sS -m 10 -w "\nHTTP %{http_code}\n" "https://countapi.mileshilliard.com/api/v1/get/ai-future-camp/svc-test" || echo FAIL
          echo "=== abacus hit ==="
          curl -sS -m 10 -w "\nHTTP %{http_code}\n" "https://abacus.jasoncameron.dev/hit/ai-future-camp/svc-test" || echo FAIL
          echo "=== abacus get ==="
          curl -sS -m 10 -w "\nHTTP %{http_code}\n" "https://abacus.jasoncameron.dev/get/ai-future-camp/svc-test" || echo FAIL
          echo "=== CORS check abacus ==="
          curl -sS -m 10 -o /dev/null -D - -H "Origin: https://wowhome-ai.vercel.app" "https://abacus.jasoncameron.dev/hit/ai-future-camp/svc-test" | grep -i "access-control" || echo "no CORS headers"
          echo "=== CORS check counterapi ==="
          curl -sS -m 10 -o /dev/null -D - -H "Origin: https://wowhome-ai.vercel.app" "https://api.counterapi.dev/v1/ai-future-camp/svc-test" | grep -i "access-control" || echo "no CORS headers"
