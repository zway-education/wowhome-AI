name: Balance stats (views/plays above likes)

on:
  push:
    branches: [main]
    paths:
      - 'scripts/seed-balance.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: seed-balance
  cancel-in-progress: false

jobs:
  balance:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Balance counters
        run: node scripts/seed-balance.js
