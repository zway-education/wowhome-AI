<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>四格動畫</title>
<style>
  body {
    margin: 0;
    background: #222;
    font-family: "Microsoft JhengHei", sans-serif;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 8px;
    height: 100vh;
    box-sizing: border-box;
    padding: 8px;
  }
  .scene {
    position: relative;
    overflow: hidden;
    border-radius: 12px;
    border: 3px solid #555;
  }
  .label {
    position: absolute;
    top: 6px;
    left: 10px;
    color: #fff;
    font-size: 14px;
    text-shadow: 1px 1px 2px #000;
    z-index: 10;
  }

  /* ---------- Scene 1: Lucario Running ---------- */
  #scene1 { background: linear-gradient(#87CEEB, #cdeffd 70%, #6b8e4e 70%); }
  .ground1 {
    position: absolute; bottom: 0; width: 100%; height: 30%;
    background: repeating-linear-gradient(90deg,#5a7a3a,#5a7a3a 40px,#6b8e4e 40px,#6b8e4e 80px);
    animation: scroll 0.6s linear infinite;
  }
  @keyframes scroll { from{background-position-x:0;} to{background-position-x:-80px;} }
  .lucario {
    position: absolute; bottom: 30%; left: 40%;
    width: 70px; height: 100px;
    animation: bob 0.3s ease-in-out infinite;
  }
  @keyframes bob { 0%,100%{transform: translateY(0);} 50%{transform: translateY(-8px);} }
  .luc-body { position:absolute; width:36px; height:50px; background:#3a5aa0; border-radius:40% 40% 30% 30%; top:30px; left:17px; }
  .luc-chest { position:absolute; width:20px; height:30px; background:#e8e2d0; border-radius:50%; top:40px; left:25px; }
  .luc-head { position:absolute; width:38px; height:36px; background:#3a5aa0; border-radius:50% 50% 45% 45%; top:0; left:16px; }
  .luc-muzzle { position:absolute; width:16px; height:14px; background:#1c1c1c; border-radius:0 0 10px 10px; top:18px; left:26px; }
  .luc-ear { position:absolute; width:10px; height:26px; background:#1c1c1c; top:-14px; border-radius:50% 50% 0 0; }
  .luc-ear.l { left:14px; transform: rotate(-15deg); }
  .luc-ear.r { left:36px; transform: rotate(15deg); }
  .luc-leg { position:absolute; width:14px; height:34px; background:#1c1c1c; border-radius:6px; top:74px; transform-origin: top center; }
  .luc-leg.front { left:14px; animation: legfwd 0.3s ease-in-out infinite; }
  .luc-leg.back { left:40px; animation: legback 0.3s ease-in-out infinite; }
  @keyframes legfwd { 0%,100%{transform:rotate(35deg);} 50%{transform:rotate(-35deg);} }
  @keyframes legback { 0%,100%{transform:rotate(-35deg);} 50%{transform:rotate(35deg);} }
  .luc-arm { position:absolute; width:10px; height:26px; background:#3a5aa0; border-radius:6px; top:36px; transform-origin: top center; }
  .luc-arm.front { left:8px; animation: armback 0.3s ease-in-out infinite; }
  .luc-arm.back { left:52px; animation: armfwd 0.3s ease-in-out infinite; }
  @keyframes armfwd { 0%,100%{transform:rotate(40deg);} 50%{transform:rotate(-40deg);} }
  @keyframes armback { 0%,100%{transform:rotate(-40deg);} 50%{transform:rotate(40deg);} }
  .luc-spike { position:absolute; width:0; height:0; border-left:6px solid transparent; border-right:6px solid transparent; border-top:16px solid #1c1c1c; top:-10px; left:29px; }
  .dust { position:absolute; bottom:28%; width:10px; height:10px; background:rgba(255,255,255,0.6); border-radius:50%; animation: puff 0.6s ease-out infinite; }
  @keyframes puff { 0%{opacity:0.8; transform:scale(0.5) translateX(0);} 100%{opacity:0; transform:scale(1.5) translateX(-40px);} }

  /* ---------- Scene 2: Laptop Dancing ---------- */
  #scene2 { background: radial-gradient(circle at 50% 40%, #3a1f5d, #14081f 80%); }
  .disco { position:absolute; top:10px; left:50%; width:26px; height:26px; margin-left:-13px; border-radius:50%;
    background: conic-gradient(#fff 0 10deg, #888 10deg 20deg, #fff 20deg 30deg, #888 30deg 40deg,
    #fff 40deg 50deg,#888 50deg 60deg,#fff 60deg 70deg,#888 70deg 80deg,#fff 80deg 90deg,#888 90deg 100deg,
    #fff 100deg 110deg,#888 110deg 120deg,#fff 120deg 130deg,#888 130deg 140deg,#fff 140deg 150deg,#888 150deg 160deg,
    #fff 160deg 170deg,#888 170deg 180deg,#fff 180deg 190deg,#888 190deg 200deg,#fff 200deg 210deg,#888 210deg 220deg,
    #fff 220deg 230deg,#888 230deg 240deg,#fff 240deg 250deg,#888 250deg 260deg,#fff 260deg 270deg,#888 270deg 280deg,
    #fff 280deg 290deg,#888 290deg 300deg,#fff 300deg 310deg,#888 310deg 320deg,#fff 320deg 330deg,#888 330deg 340deg,
    #fff 340deg 350deg,#888 350deg 360deg);
    animation: spin 2s linear infinite;
    box-shadow: 0 0 20px 6px rgba(255,255,255,0.4);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .beam { position:absolute; top:36px; left:50%; width:2px; height:70%; background: linear-gradient(rgba(255,255,255,0.5),transparent);
    transform-origin: top center; animation: sweep 3s ease-in-out infinite; }
  .beam:nth-child(2){ animation-delay: -1s; background: linear-gradient(rgba(255,100,255,0.4),transparent);}
  .beam:nth-child(3){ animation-delay: -2s; background: linear-gradient(rgba(100,255,255,0.4),transparent);}
  @keyframes sweep { 0%,100%{transform:rotate(-40deg);} 50%{transform:rotate(40deg);} }
  .floor2 { position:absolute; bottom:0; width:100%; height:20%; background:#0d0616;
    background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 20px 20px; }
  .laptop { position:absolute; bottom:20%; left:50%; width:90px; height:60px; margin-left:-45px;
    animation: dance 0.8s ease-in-out infinite; transform-origin: bottom center; }
  @keyframes dance {
    0%,100% { transform: rotate(-8deg) translateY(0); }
    25% { transform: rotate(6deg) translateY(-14px); }
    50% { transform: rotate(-10deg) translateY(0); }
    75% { transform: rotate(8deg) translateY(-18px); }
  }
  .lp-base { position:absolute; bottom:0; width:90px; height:8px; background:#c0c0c8; border-radius:2px; }
  .lp-screen { position:absolute; bottom:8px; left:6px; width:78px; height:52px; background:#d5d5dc; border-radius:4px 4px 0 0;
    border:3px solid #a8a8b0; transform-origin: bottom center; animation: flip 0.8s ease-in-out infinite; }
  @keyframes flip { 0%,100%{transform: rotateX(0deg);} 50%{transform: rotateX(25deg);} }
  .lp-face { position:absolute; top:10px; left:0; width:100%; text-align:center; font-size:22px; }
  .lp-arm { position:absolute; width:8px; height:26px; background:#c0c0c8; border-radius:4px; bottom:6px; transform-origin: bottom center; }
  .lp-arm.l { left:-4px; animation: armswing 0.4s ease-in-out infinite; }
  .lp-arm.r { right:-4px; animation: armswing2 0.4s ease-in-out infinite; }
  @keyframes armswing { 0%,100%{transform:rotate(-50deg);} 50%{transform:rotate(50deg);} }
  @keyframes armswing2 { 0%,100%{transform:rotate(50deg);} 50%{transform:rotate(-50deg);} }
  .note { position:absolute; color:#fff; font-size:18px; opacity:0; animation: floatnote 2s ease-in infinite; }
  .note:nth-child(1){ left:20%; top:60%; animation-delay:0s; }
  .note:nth-child(2){ right:20%; top:55%; animation-delay:0.7s; }
  .note:nth-child(3){ left:35%; top:70%; animation-delay:1.4s; }
  @keyframes floatnote { 0%{opacity:0; transform:translateY(0);} 30%{opacity:1;} 100%{opacity:0; transform:translateY(-60px);} }

  /* ---------- Scene 3: Steve in Overworld ---------- */
  #scene3 { background: linear-gradient(#7ec0ee 60%, #9adf6a 60%); }
  .sun3 { position:absolute; top:14px; right:20px; width:34px; height:34px; background:#fff9a0; border-radius:4px; box-shadow:0 0 20px #fff9a0;}
  .cloud3 { position:absolute; top:24px; width:60px; height:18px; background:#fff; border-radius:10px; opacity:0.9; animation: driftcloud 12s linear infinite; }
  .cloud3.b { top:50px; width:40px; height:14px; animation-duration: 18s; animation-delay:-4s;}
  @keyframes driftcloud { from{left:-80px;} to{left:110%;} }
  .block { position:absolute; width:32px; height:32px; }
  .grassblock { background:#7cb342; border:2px solid #5a8a2a; box-sizing:border-box; bottom:34%; }
  .dirtblock { background:#8a5a34; border:2px solid #6a4326; box-sizing:border-box; }
  .tree3 { position:absolute; bottom:34%; }
  .trunk3 { width:16px; height:32px; background:#7a5230; position:absolute; bottom:0; left:8px; }
  .leaves3 { width:40px; height:40px; background:#3f9b3f; position:absolute; bottom:26px; left:0; border:2px solid #2e7a2e; box-sizing:border-box; }
  .steve { position:absolute; bottom:34%; left:44%; width:32px; height:56px; animation: walk3 0.6s steps(2) infinite; }
  @keyframes walk3 { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-3px);} }
  .st-head { position:absolute; top:0; left:4px; width:24px; height:24px; background:#e0a877; }
  .st-face { position:absolute; top:8px; left:8px; width:16px; height:8px; background:#5a3a20; }
  .st-hair { position:absolute; top:0; left:2px; width:26px; height:8px; background:#4a3222; }
  .st-body { position:absolute; top:24px; left:6px; width:20px; height:22px; background:#4a90d9; }
  .st-arm { position:absolute; top:24px; width:7px; height:22px; background:#e0a877; }
  .st-arm.l { left:0; animation: swingL 0.6s ease-in-out infinite; transform-origin: top center; }
  .st-arm.r { left:25px; animation: swingR 0.6s ease-in-out infinite; transform-origin: top center; }
  @keyframes swingL { 0%,100%{transform:rotate(30deg);} 50%{transform:rotate(-30deg);} }
  @keyframes swingR { 0%,100%{transform:rotate(-30deg);} 50%{transform:rotate(30deg);} }
  .st-leg { position:absolute; top:46px; width:8px; height:14px; background:#2a2a6a; }
  .st-leg.l { left:6px; animation: swingR 0.6s ease-in-out infinite; transform-origin: top center; }
  .st-leg.r { left:18px; animation: swingL 0.6s ease-in-out infinite; transform-origin: top center; }
  .groundtxt { position:absolute; bottom:0; width:100%; height:34%; background:#8a5a34; }
  .grasstop { position:absolute; bottom:34%; width:100%; height:10px; background:#7cb342; }

  /* ---------- Scene 4: Xiao Qing jumping into drain ---------- */
  #scene4 { background: linear-gradient(#bcd9e8, #d8e8ec 55%, #999 55%); }
  .drain { position:absolute; bottom:0; left:40%; width:120px; height:70px; background:#333;
    border-radius: 50% 50% 0 0 / 30% 30% 0 0; }
  .drain::before { content:""; position:absolute; top:6px; left:8px; width:104px; height:10px; background:repeating-linear-gradient(90deg,#111 0 8px,#333 8px 16px); }
  .water { position:absolute; bottom:0; left:44%; width:104px; height:14px; background:#2a6fa0; border-radius:50%; opacity:0.8; }
  .ripple { position:absolute; bottom:8px; left:50%; width:20px; height:8px; border:2px solid rgba(255,255,255,0.7); border-radius:50%;
    animation: ripple4 1.2s ease-out infinite; }
  @keyframes ripple4 { 0%{transform: translateX(-50%) scale(0.3); opacity:1;} 100%{transform: translateX(-50%) scale(3); opacity:0;} }
  .xiaoqing { position:absolute; left:47%; width:40px; height:60px; animation: jumpin 1.6s ease-in infinite; }
  @keyframes jumpin {
    0% { top:-10%; transform: rotate(0deg) scale(1); opacity:1; }
    55% { top:55%; transform: rotate(180deg) scale(1); opacity:1; }
    70% { top:64%; transform: rotate(200deg) scale(0.7); opacity:1; }
    85% { top:70%; transform: scale(0.2); opacity:0.3; }
    86%,100% { top:-10%; transform: rotate(0deg) scale(1); opacity:0; }
  }
  .xq-head { position:absolute; top:0; left:8px; width:24px; height:22px; background:#8fd694; border-radius:50%; }
  .xq-hair { position:absolute; top:-6px; left:6px; width:28px; height:14px; background:#2a2a2a; border-radius:50% 50% 0 0; }
  .xq-body { position:absolute; top:20px; left:6px; width:28px; height:26px; background:#3fae5c; border-radius:40%; }
  .xq-belt { position:absolute; top:32px; left:6px; width:28px; height:6px; background:#c94040; }
  .splash { position:absolute; bottom:6px; left:50%; }
  .drop { position:absolute; width:6px; height:6px; background:#3a8fc0; border-radius:50%; animation: splashdrop 1.6s ease-out infinite; opacity:0; }
  .drop:nth-child(1){ animation-delay:1.0s; --dx:-30px; }
  .drop:nth-child(2){ animation-delay:1.0s; --dx:-10px; }
  .drop:nth-child(3){ animation-delay:1.0s; --dx:10px; }
  .drop:nth-child(4){ animation-delay:1.0s; --dx:30px; }
  @keyframes splashdrop { 0%{opacity:1; transform:translate(0,0);} 100%{opacity:0; transform:translate(var(--dx),-50px);} }
</style>
</head>
<body>

<div class="scene" id="scene1">
  <div class="label">路卡利歐奔跑</div>
  <div class="ground1"></div>
  <div class="dust" style="left:34%; animation-delay:0s;"></div>
  <div class="dust" style="left:36%; animation-delay:0.2s;"></div>
  <div class="dust" style="left:38%; animation-delay:0.4s;"></div>
  <div class="lucario">
    <div class="luc-arm back"></div>
    <div class="luc-leg back"></div>
    <div class="luc-body"></div>
    <div class="luc-chest"></div>
    <div class="luc-leg front"></div>
    <div class="luc-arm front"></div>
    <div class="luc-head">
      <div class="luc-ear l"></div>
      <div class="luc-ear r"></div>
      <div class="luc-spike"></div>
      <div class="luc-muzzle"></div>
    </div>
  </div>
</div>

<div class="scene" id="scene2">
  <div class="label">筆電熱舞</div>
  <div class="disco"></div>
  <div class="beam"></div>
  <div class="beam"></div>
  <div class="beam"></div>
  <div class="note">♪</div>
  <div class="note">♫</div>
  <div class="note">♪</div>
  <div class="floor2"></div>
  <div class="laptop">
    <div class="lp-arm l"></div>
    <div class="lp-arm r"></div>
    <div class="lp-screen"><div class="lp-face">^‿^</div></div>
    <div class="lp-base"></div>
  </div>
</div>

<div class="scene" id="scene3">
  <div class="label">麥塊史帝夫 - 主世界</div>
  <div class="sun3"></div>
  <div class="cloud3" style="left:10%;"></div>
  <div class="cloud3 b" style="left:60%;"></div>
  <div class="grasstop"></div>
  <div class="groundtxt"></div>
  <div class="tree3" style="left:10%;">
    <div class="trunk3"></div>
    <div class="leaves3"></div>
  </div>
  <div class="tree3" style="left:78%;">
    <div class="trunk3"></div>
    <div class="leaves3"></div>
  </div>
  <div class="steve">
    <div class="st-arm l"></div>
    <div class="st-arm r"></div>
    <div class="st-leg l"></div>
    <div class="st-leg r"></div>
    <div class="st-body"></div>
    <div class="st-head">
      <div class="st-hair"></div>
      <div class="st-face"></div>
    </div>
  </div>
</div>

<div class="scene" id="scene4">
  <div class="label">小青跳進水溝</div>
  <div class="water"></div>
  <div class="ripple"></div>
  <div class="drain"></div>
  <div class="xiaoqing">
    <div class="xq-body"></div>
    <div class="xq-belt"></div>
    <div class="xq-head">
      <div class="xq-hair"></div>
    </div>
  </div>
  <div class="splash">
    <div class="drop"></div>
    <div class="drop"></div>
    <div class="drop"></div>
    <div class="drop"></div>
  </div>
</div>

</body>
</html>
