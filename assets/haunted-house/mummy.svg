<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="200" height="260">
  <defs>
    <linearGradient id="wrapGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4ecd8"/>
      <stop offset="100%" stop-color="#d8c9a3"/>
    </linearGradient>
    <filter id="mummyShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#3a2f1f" flood-opacity="0.3"/>
    </filter>
  </defs>

  <ellipse cx="100" cy="248" rx="60" ry="10" fill="#2a2140" opacity="0.2"/>

  <g filter="url(#mummyShadow)">
    <!-- body silhouette -->
    <path d="M100 15
             C 60 15 45 45 48 80
             C 40 95 35 130 42 170
             C 30 190 32 220 45 235
             C 70 248 130 248 155 235
             C 168 220 170 190 158 170
             C 165 130 160 95 152 80
             C 155 45 140 15 100 15 Z"
          fill="#efe4c8"/>

    <!-- bandage wraps -->
    <g stroke="url(#wrapGrad)" stroke-width="14" fill="none" stroke-linecap="round">
      <path d="M45 60 L155 50"/>
      <path d="M42 82 L158 74"/>
      <path d="M40 105 L160 100"/>
      <path d="M40 130 L160 128"/>
      <path d="M42 155 L158 155"/>
      <path d="M42 180 L158 182"/>
      <path d="M45 205 L155 208"/>
      <path d="M48 228 L152 230"/>
    </g>

    <!-- diagonal wrap accents -->
    <g stroke="#c9b88a" stroke-width="4" fill="none" opacity="0.6">
      <path d="M55 40 L145 240"/>
      <path d="M145 40 L55 240"/>
    </g>

    <!-- eyes peeking through gap -->
    <rect x="55" y="88" width="90" height="26" rx="13" fill="#2a2140"/>
    <ellipse cx="80" cy="101" rx="7" ry="9" fill="#ffcf4d"/>
    <ellipse cx="120" cy="101" rx="7" ry="9" fill="#ffcf4d"/>
    <circle cx="80" cy="101" r="3" fill="#2a2140"/>
    <circle cx="120" cy="101" r="3" fill="#2a2140"/>

    <!-- arms -->
    <path d="M42 150 C 15 150 10 175 25 190" stroke="#efe4c8" stroke-width="24" fill="none" stroke-linecap="round"/>
    <path d="M158 150 C 185 150 190 175 175 190" stroke="#efe4c8" stroke-width="24" fill="none" stroke-linecap="round"/>
    <path d="M42 150 C 15 150 10 175 25 190" stroke="url(#wrapGrad)" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.8"/>
    <path d="M158 150 C 185 150 190 175 175 190" stroke="url(#wrapGrad)" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.8"/>
  </g>
</svg>
