<!doctype html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Haunted House</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0b0716;
    font-family: system-ui, sans-serif;
  }
  .stage {
    position: relative;
    width: 800px;
    max-width: 95vw;
    aspect-ratio: 800 / 500;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  svg { display: block; width: 100%; height: 100%; }

  #moon {
    animation: glow 4s ease-in-out infinite;
    transform-origin: 680px 90px;
  }
  @keyframes glow {
    0%, 100% { opacity: 0.85; }
    50% { opacity: 1; }
  }

  #ghost-anim {
    animation: float 3.5s ease-in-out infinite;
    transform-origin: 100px 110px;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-14px); }
  }

  #mummy-anim {
    animation: sway 2.6s ease-in-out infinite;
    transform-origin: 100px 240px;
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
  }

  .bat {
    animation: flap 0.6s ease-in-out infinite alternate;
  }
  @keyframes flap {
    from { transform: scaleY(1); }
    to { transform: scaleY(0.6); }
  }

  #window-lights rect {
    animation: flicker 2.2s steps(1) infinite;
  }
  #window-lights rect:nth-child(2) {
    animation-delay: 0.6s;
  }
  @keyframes flicker {
    0%, 40%, 100% { opacity: 0.85; }
    42%, 44% { opacity: 0.2; }
  }
</style>
</head>
<body>
<div class="stage">
<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#160f2b"/>
      <stop offset="60%" stop-color="#2b1f4a"/>
      <stop offset="100%" stop-color="#4a2f5c"/>
    </linearGradient>
    <radialGradient id="moonGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7d6"/>
      <stop offset="100%" stop-color="#f3e28a"/>
    </radialGradient>
  </defs>

  <rect width="800" height="500" fill="url(#sky)"/>
  <circle id="moon" cx="680" cy="90" r="55" fill="url(#moonGrad)"/>

  <g opacity="0.8" fill="#fff7d6">
    <circle cx="80" cy="60" r="2"/>
    <circle cx="150" cy="120" r="1.5"/>
    <circle cx="250" cy="50" r="2"/>
    <circle cx="400" cy="80" r="1.5"/>
    <circle cx="520" cy="40" r="2"/>
    <circle cx="600" cy="150" r="1.5"/>
  </g>

  <g fill="#0f0a1e">
    <path class="bat" d="M120 130 Q135 115 150 130 Q135 122 120 130 Z" style="transform-origin:135px 122px"/>
    <path class="bat" d="M300 90 Q315 75 330 90 Q315 82 300 90 Z" style="transform-origin:315px 82px; animation-delay:0.3s"/>
  </g>

  <rect x="0" y="430" width="800" height="70" fill="#1a1327"/>

  <g fill="#0f0a1e">
    <rect x="300" y="260" width="200" height="170"/>
    <polygon points="280,260 400,180 520,260"/>
    <rect x="380" y="150" width="40" height="60"/>
    <polygon points="375,150 400,120 425,150"/>
    <rect x="330" y="320" width="30" height="40" fill="#160f2b"/>
    <rect x="440" y="320" width="30" height="40" fill="#160f2b"/>
    <rect x="385" y="360" width="40" height="70" fill="#160f2b"/>
  </g>
  <g id="window-lights" fill="#f3e28a">
    <rect x="330" y="322" width="30" height="38"/>
    <rect x="440" y="322" width="30" height="38"/>
  </g>

  <g stroke="#0f0a1e" stroke-width="4">
    <line x1="20" y1="430" x2="20" y2="400"/>
    <line x1="60" y1="430" x2="60" y2="390"/>
    <line x1="100" y1="430" x2="100" y2="400"/>
    <line x1="700" y1="430" x2="700" y2="400"/>
    <line x1="740" y1="430" x2="740" y2="390"/>
    <line x1="780" y1="430" x2="780" y2="400"/>
    <line x1="10" y1="415" x2="110" y2="415"/>
    <line x1="690" y1="415" x2="790" y2="415"/>
  </g>

  <!-- ghost -->
  <g transform="translate(120,210) scale(0.85)">
    <g id="ghost-anim">
      <ellipse cx="100" cy="205" rx="55" ry="10" fill="#000" opacity="0.15"/>
      <path d="M100 20 C 45 20 20 62 20 110 L 20 165 C 20 175 30 175 33 167 L 45 148 C 48 141 57 141 60 148 L 71 170 C 74 177 84 177 87 170 L 98 148 C 101 141 110 141 113 148 L 124 170 C 127 177 137 177 140 170 L 151 148 C 154 141 163 141 166 148 L 178 167 C 181 175 191 175 191 165 L 180 110 C 180 62 155 20 100 20 Z" fill="#eef1f7"/>
      <ellipse cx="70" cy="100" rx="12" ry="16" fill="#2a2140"/>
      <ellipse cx="130" cy="100" rx="12" ry="16" fill="#2a2140"/>
      <path d="M78 135 Q100 155 122 135 Q100 145 78 135 Z" fill="#2a2140"/>
    </g>
  </g>

  <!-- mummy -->
  <g transform="translate(520,240) scale(0.75)">
    <g id="mummy-anim">
      <ellipse cx="100" cy="248" rx="60" ry="10" fill="#000" opacity="0.15"/>
      <path d="M100 15 C 60 15 45 45 48 80 C 40 95 35 130 42 170 C 30 190 32 220 45 235 C 70 248 130 248 155 235 C 168 220 170 190 158 170 C 165 130 160 95 152 80 C 155 45 140 15 100 15 Z" fill="#efe4c8"/>
      <g stroke="#d8c9a3" stroke-width="14" fill="none" stroke-linecap="round">
        <path d="M45 60 L155 50"/>
        <path d="M42 82 L158 74"/>
        <path d="M40 105 L160 100"/>
        <path d="M40 130 L160 128"/>
        <path d="M42 155 L158 155"/>
        <path d="M42 180 L158 182"/>
        <path d="M45 205 L155 208"/>
        <path d="M48 228 L152 230"/>
      </g>
      <rect x="55" y="88" width="90" height="26" rx="13" fill="#2a2140"/>
      <ellipse cx="80" cy="101" rx="7" ry="9" fill="#ffcf4d"/>
      <ellipse cx="120" cy="101" rx="7" ry="9" fill="#ffcf4d"/>
    </g>
  </g>
</svg>
</div>
</body>
</html>
