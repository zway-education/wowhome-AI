<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>詭異飯店 - 雙人闖關逃脫遊戲</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: radial-gradient(ellipse at center, #1a0505 0%, #050202 70%, #000 100%);
    color: #d8c9b8;
    font-family: "Noto Serif TC", "PMingLiU", serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #app { max-width: 720px; width: 100%; }
  .panel {
    background: linear-gradient(180deg, #120808 0%, #0a0404 100%);
    border: 1px solid #4a1f1f;
    box-shadow: 0 0 40px rgba(120,0,0,0.35), inset 0 0 60px rgba(0,0,0,0.6);
    border-radius: 6px;
    padding: 28px;
    position: relative;
    overflow: hidden;
  }
  .panel::before {
    content: "";
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, transparent 2px, transparent 4px);
    pointer-events: none;
  }
  h1 {
    text-align: center;
    color: #a11;
    letter-spacing: 6px;
    text-shadow: 0 0 12px #700, 0 0 2px #000;
    font-size: 1.6em;
    margin: 0 0 6px;
  }
  .sub { text-align: center; color: #7a6a5a; font-size: 0.85em; margin-bottom: 20px; letter-spacing: 2px;}
  .row { display: flex; gap: 10px; margin-bottom: 10px; }
  input[type=text] {
    flex: 1;
    background: #1a0e0e;
    border: 1px solid #5a2a2a;
    color: #e8dcc8;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 1em;
    border-radius: 3px;
  }
  button {
    background: #3a0e0e;
    border: 1px solid #7a1f1f;
    color: #e8c8b8;
    padding: 10px 16px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.95em;
    letter-spacing: 2px;
    border-radius: 3px;
    transition: background 0.2s, transform 0.1s;
  }
  button:hover:not(:disabled) { background: #5a1414; box-shadow: 0 0 10px rgba(200,0,0,0.5); }
  button:active:not(:disabled) { transform: scale(0.97); }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  .full { width: 100%; }
  .status-bar {
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    margin-bottom: 10px; padding: 10px; background: rgba(0,0,0,0.4);
    border: 1px solid #331414; border-radius: 4px; font-size: 0.85em;
  }
  .player-stat { flex: 1; min-width: 140px; }
  .player-stat b { color: #c86; }
  .bar-bg { background: #200; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 3px; border: 1px solid #400; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, #700, #c33); transition: width 0.4s; }
  .bar-fill.sanity { background: linear-gradient(90deg, #135, #37c); }

  .level-track {
    display: flex; justify-content: center; gap: 6px; margin-bottom: 16px;
  }
  .level-dot {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid #5a2a2a; display: flex; align-items: center; justify-content: center;
    font-size: 0.75em; color: #776; background: #150a0a;
  }
  .level-dot.done { background: #2a0e0e; color: #c86; border-color: #a33; }
  .level-dot.active { background: #7a1414; color: #fff; border-color: #f55; box-shadow: 0 0 10px #a00; }

  #log {
    background: #0a0505;
    border: 1px solid #2a1414;
    border-radius: 4px;
    padding: 16px;
    min-height: 130px;
    max-height: 230px;
    overflow-y: auto;
    line-height: 1.7;
    font-size: 0.95em;
    margin-bottom: 16px;
    white-space: pre-wrap;
  }
  #log .turn-tag { color: #c86; font-weight: bold; }
  #log .danger { color: #d33; }
  #log .clue { color: #6ac; }
  #log .win { color: #6c6; }
  #log .system { color: #776; font-style: italic; }
  .choices { display: flex; flex-direction: column; gap: 8px; }
  .choices button { text-align: left; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .hidden { display: none !important; }
  .center { text-align: center; }
  .small { font-size: 0.8em; color: #776; }
  .item-list span {
    display: inline-block; background: #201010; border: 1px solid #4a2222;
    padding: 3px 8px; border-radius: 3px; margin: 2px; font-size: 0.8em; color: #c8a;
  }
  #jumpscare {
    position: fixed; inset: 0; background: #000; z-index: 999;
    display: flex; align-items: center; justify-content: center;
    color: #f00; font-size: 3em; font-weight: bold; letter-spacing: 8px;
    text-shadow: 0 0 30px red; text-align: center; padding: 20px;
  }
  .symbol-box {
    display: flex; justify-content: center; gap: 14px; font-size: 2.4em;
    margin: 16px 0; min-height: 60px; align-items: center;
  }
  .symbol-box span { opacity: 0; transition: opacity 0.15s; }
  .symbol-box span.show { opacity: 1; }
  .timer-bar-bg { background: #200; height: 10px; border-radius: 4px; overflow: hidden; margin: 10px 0; border: 1px solid #400; }
  .timer-bar-fill { height: 100%; background: linear-gradient(90deg,#c33,#700); width: 100%; }
</style>
</head>
<body>
<div id="app">
  <div class="panel" id="panel">

    <div id="screen-intro">
      <h1>詭 異 飯 店</h1>
      <div class="sub">雙人闖關逃脫遊戲 · 共 5 關 · 進去容易，出來難</div>
      <p style="color:#a89;">你們兩人為了避雨走進了這間廢棄已久的飯店。櫃檯無人，大廳昏天暗地。
      當你們走到各自的房間時，卻在門縫下發現了滲出的血跡……
      現在，你們必須合力闖過飯店裡的五道關卡，找到出口逃出生天。</p>
      <div class="row">
        <input type="text" id="p1name" placeholder="玩家一 名字" maxlength="10">
      </div>
      <div class="row">
        <input type="text" id="p2name" placeholder="玩家二 名字" maxlength="10">
      </div>
      <button class="full" id="startBtn">推 門 而 入</button>
    </div>

    <div id="screen-game" class="hidden">
      <h1 id="gameTitle">詭 異 飯 店</h1>
      <div class="level-track" id="levelTrack"></div>
      <div class="status-bar">
        <div class="player-stat">
          <b id="p1label">玩家一</b> HP
          <div class="bar-bg"><div class="bar-fill" id="p1hp" style="width:100%"></div></div>
          理智
          <div class="bar-bg"><div class="bar-fill sanity" id="p1san" style="width:100%"></div></div>
        </div>
        <div class="player-stat">
          <b id="p2label">玩家二</b> HP
          <div class="bar-bg"><div class="bar-fill" id="p2hp" style="width:100%"></div></div>
          理智
          <div class="bar-bg"><div class="bar-fill sanity" id="p2san" style="width:100%"></div></div>
        </div>
      </div>
      <div id="log"></div>
      <div class="item-list" id="items"></div>
      <div id="puzzleArea"></div>
      <div class="choices" id="choices"></div>
    </div>

    <div id="screen-end" class="hidden center">
      <h1 id="endTitle">結局</h1>
      <p id="endText" style="color:#c8a;"></p>
      <button class="full" id="restartBtn">重 新 開 始</button>
    </div>

  </div>
</div>
<div id="jumpscare" class="hidden">它 就 在 你 身 後</div>

<script>
(function(){
  const LEVEL_NAMES = ['大廳謎影','血色走廊','203號房','儲藏室記憶','地下逃生門'];

  const S = {
    p1: {name:'玩家一', hp:100, san:100},
    p2: {name:'玩家二', hp:100, san:100},
    level: 0,
    inventory: [],
    activePlayer: 1
  };

  const $ = id => document.getElementById(id);
  const logEl = $('log');

  function log(html, cls) {
    const line = document.createElement('div');
    if (cls) line.className = cls;
    line.innerHTML = html;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function clamp(v){ return Math.max(0, Math.min(100, v)); }

  function renderLevelTrack() {
    const t = $('levelTrack');
    t.innerHTML = '';
    LEVEL_NAMES.forEach((name, i) => {
      const d = document.createElement('div');
      d.className = 'level-dot' + (i < S.level ? ' done' : i === S.level ? ' active' : '');
      d.textContent = i + 1;
      d.title = name;
      t.appendChild(d);
    });
  }

  function updateStatus() {
    $('p1label').textContent = S.p1.name;
    $('p2label').textContent = S.p2.name;
    $('p1hp').style.width = S.p1.hp + '%';
    $('p2hp').style.width = S.p2.hp + '%';
    $('p1san').style.width = S.p1.san + '%';
    $('p2san').style.width = S.p2.san + '%';
    $('items').innerHTML = S.inventory.map(i => `<span>${i}</span>`).join('');
    renderLevelTrack();
    checkGameOver();
  }

  function currentPlayer() { return S.activePlayer === 1 ? S.p1 : S.p2; }
  function switchPlayer() { S.activePlayer = S.activePlayer === 1 ? 2 : 1; }

  function damage(playerNum, hp, san) {
    const p = playerNum === 1 ? S.p1 : S.p2;
    if (hp) p.hp = clamp(p.hp - hp);
    if (san) p.san = clamp(p.san - san);
  }

  function jumpscare(cb) {
    const js = $('jumpscare');
    js.classList.remove('hidden');
    setTimeout(() => {
      js.classList.add('hidden');
      damage(1, 12, 15);
      damage(2, 12, 15);
      log('<span class="danger">燈光瞬間熄滅，身後傳來拖行的腳步聲……你們嚇得倒退幾步。</span>', 'danger');
      updateStatus();
      if (cb) cb();
    }, 1400);
  }

  let gameOver = false;
  function checkGameOver() {
    if (gameOver) return;
    if (S.p1.hp <= 0 || S.p2.hp <= 0) {
      gameOver = true;
      endGame(false, `${S.p1.hp<=0 ? S.p1.name : S.p2.name} 倒在了冰冷的地板上，再也沒有起來。飯店，又多了一位「房客」。`);
    } else if (S.p1.san <= 0 || S.p2.san <= 0) {
      gameOver = true;
      endGame(false, `${S.p1.san<=0 ? S.p1.name : S.p2.name} 的理智徹底崩潰，開始對著空氣尖叫、傻笑……最終消失在無盡的走廊深處。`);
    }
  }

  function setChoices(list) {
    const c = $('choices');
    c.innerHTML = '';
    list.forEach(opt => {
      const b = document.createElement('button');
      b.textContent = opt.label;
      b.disabled = !!opt.disabled;
      b.onclick = () => { c.innerHTML=''; $('puzzleArea').innerHTML=''; opt.action(); };
      c.appendChild(b);
    });
  }

  function roll(chance) { return Math.random() < chance; }

  function levelHeader(desc) {
    log(`<span class="turn-tag">— 第 ${S.level+1} 關：${LEVEL_NAMES[S.level]} · 由 ${currentPlayer().name} 挑戰 —</span>`);
    log(desc);
  }

  function clearPuzzle() { $('puzzleArea').innerHTML = ''; $('choices').innerHTML = ''; }

  function nextLevel() {
    S.level++;
    switchPlayer();
    updateStatus();
    if (S.level >= LEVEL_NAMES.length) {
      winGame();
    } else {
      clearPuzzle();
      levels[S.level]();
    }
  }

  function failLevel(msg, hp, san) {
    log(`<span class="danger">${msg}</span>`, 'danger');
    damage(S.activePlayer, hp, san);
    updateStatus();
  }

  // ---------- Levels ----------
  const levels = [];

  // Level 1: riddle input
  levels[0] = function() {
    levelHeader('大廳的老時鐘停在 3:33，牆上的褪色照片旁刻著一行字謎：「我沒有嘴巴，卻能發出聲音；沒有身體，卻能被風吹動。我是什麼？」輸入答案（提示：一個字）。');
    const box = document.createElement('div');
    box.innerHTML = `<input type="text" id="ans0" placeholder="輸入答案" style="width:100%;margin-bottom:10px;">`;
    $('puzzleArea').appendChild(box);
    setChoices([
      { label: '確認答案', action: () => {
          const v = $('ans0') ? $('ans0').value.trim() : '';
          if (['回音','回聲','echo','迴音'].includes(v)) {
            log('<span class="clue">牆面發出低鳴，照片後方彈出一張房卡，寫著「203」。</span>', 'clue');
            S.inventory.push('203號房卡');
            updateStatus();
            nextLevel();
          } else {
            failLevel('答案錯誤，照片中人的眼睛猛地轉向你，一陣寒意直竄背脊。', 0, 12);
            levels[0]();
          }
      }},
      { label: '直接放棄，硬闖走廊（扣血）', action: () => {
          failLevel('你們決定不猜謎，硬著頭皮往前走，但心裡的恐懼揮之不去。', 8, 8);
          nextLevel();
      }}
    ]);
    // re-run puzzle rendering after choice list set (since setChoices clears puzzleArea via clearPuzzle only on button click)
  };
  // fix: setChoices clears puzzleArea on click only; need puzzle box to persist across re-render. Redefine safely below.

  // Level 2: pick correct path (blood trail direction) with multiple choice + risk
  levels[1] = function() {
    levelHeader('走廊昏暗，地毯上有兩道血跡分岔，一道通往「儲藏室」，一道通往「203號房」。你們必須合力判斷正確方向。');
    const hint = S.inventory.includes('203號房卡');
    setChoices([
      { label: '跟隨血跡前往 203 號房' + (hint ? '（手中房卡似乎在發燙）' : ''), action: () => {
          log('<span class="clue">你們循著血跡走進了 203 號房，房卡在鎖孔中發出微光。</span>', 'clue');
          updateStatus();
          nextLevel();
      }},
      { label: '前往儲藏室查看', action: () => {
          if (roll(0.3)) {
            log('<span class="clue">儲藏室裡意外找到一把生鏽鑰匙，可惜方向錯了，只好折返。</span>', 'clue');
            S.inventory.push('生鏽鑰匙');
          } else {
            log('<span class="danger">儲藏室門一開，一股腐臭撲面而來，你們被嚇得倒退，撞翻了架子。</span>', 'danger');
            damage(S.activePlayer, 10, 12);
          }
          updateStatus();
          levels[1]();
      }}
    ]);
  };

  // Level 3: sequence memory game
  levels[2] = function() {
    levelHeader('203 號房的衣櫃上有一組會發光的符號鎖，你必須記住符號出現的順序，並依序點擊重現。');
    const symbols = ['👁','🕯','🩸','☠'];
    const seqLen = 4;
    const seq = Array.from({length: seqLen}, () => symbols[Math.floor(Math.random()*symbols.length)]);
    const box = document.createElement('div');
    box.className = 'symbol-box';
    box.id = 'symBox';
    $('puzzleArea').appendChild(box);
    const status = document.createElement('div');
    status.className = 'small center';
    status.id = 'symStatus';
    status.textContent = '請仔細觀察順序……';
    $('puzzleArea').appendChild(status);

    let i = 0;
    box.innerHTML = seq.map(s => `<span>${s}</span>`).join('');
    const spans = box.querySelectorAll('span');
    const showNext = () => {
      if (i > 0) spans[i-1].classList.remove('show');
      if (i < seq.length) { spans[i].classList.add('show'); i++; setTimeout(showNext, 700); }
      else { spans[i-1] && spans[i-1].classList.remove('show'); setTimeout(startInput, 500); }
    };
    setTimeout(showNext, 500);

    function startInput() {
      status.textContent = `${currentPlayer().name}，請依序點擊剛剛出現的符號！`;
      box.innerHTML = symbols.map(s => `<span class="show" style="cursor:pointer;">${s}</span>`).join('');
      let picked = [];
      box.querySelectorAll('span').forEach((el, idx) => {
        el.onclick = () => {
          picked.push(symbols[idx]);
          el.style.outline = '2px solid #a33';
          if (picked.length === seq.length) {
            if (JSON.stringify(picked) === JSON.stringify(seq)) {
              log('<span class="clue">符號鎖發出「喀」的一聲，衣櫃門緩緩打開，裡面藏著一張寫著密碼「719」的紙條。</span>', 'clue');
              S.inventory.push('密碼紙條(719)');
              updateStatus();
              nextLevel();
            } else {
              failLevel('順序錯誤！衣櫃猛地震動，一隻蒼白的手從縫隙中伸出想抓住你！', 15, 12);
              clearPuzzle();
              levels[2]();
            }
          }
        };
      });
    }
  };

  // Level 4: timed reaction challenge
  levels[3] = function() {
    levelHeader('你們躲進儲藏室，聽見腳步聲逐漸靠近……必須在時間耗盡前，快速點擊「屏住呼吸」按鈕 5 次，且不能被腳步聲打斷！');
    const status = document.createElement('div');
    status.className = 'center';
    status.id = 'reactStatus';
    status.textContent = '倒數開始！';
    $('puzzleArea').appendChild(status);
    const barBg = document.createElement('div');
    barBg.className = 'timer-bar-bg';
    const barFill = document.createElement('div');
    barFill.className = 'timer-bar-fill';
    barBg.appendChild(barFill);
    $('puzzleArea').appendChild(barBg);

    let clicks = 0, timeLeft = 100, finished = false;
    const timer = setInterval(() => {
      timeLeft -= 2.2;
      barFill.style.width = Math.max(0, timeLeft) + '%';
      if (timeLeft <= 0 && !finished) {
        finished = true;
        clearInterval(timer);
        clearPuzzle();
        failLevel('時間到！腳步聲停在門外，接著猛地撞開儲藏室的門！', 18, 15);
        jumpscare(() => levels[3]());
      }
    }, 150);

    setChoices([
      { label: `屏住呼吸 (${clicks}/5)`, action: () => {} }
    ]);
    // Override the button click handler manually since setChoices rebinds
    const btn = $('choices').querySelector('button');
    btn.onclick = () => {
      if (finished) return;
      clicks++;
      btn.textContent = `屏住呼吸 (${clicks}/5)`;
      if (clicks >= 5) {
        finished = true;
        clearInterval(timer);
        log('<span class="clue">腳步聲漸漸遠去，你們成功屏息躲過了一劫，並在角落發現一把逃生通道鑰匙。</span>', 'clue');
        S.inventory.push('逃生通道鑰匙');
        updateStatus();
        nextLevel();
      }
    };
  };

  // Level 5: final code combining clues
  levels[4] = function() {
    levelHeader('地下室盡頭是一扇鐵門，門上有密碼鎖與鑰匙孔。結合你們找到的線索，輸入正確的三位數密碼開門逃生！');
    const box = document.createElement('div');
    box.innerHTML = `<input type="text" id="ans4" placeholder="輸入三位數密碼" style="width:100%;margin-bottom:10px;">`;
    $('puzzleArea').appendChild(box);
    const opts = [
      { label: '確認密碼', action: () => {
          const v = $('ans4') ? $('ans4').value.trim() : '';
          if (v === '719') {
            log('<span class="win">鎖發出清脆的「喀」聲，鐵門緩緩開啟，微弱的月光灑落進來！</span>', 'win');
            updateStatus();
            setChoices([{ label: '衝出鐵門，逃離飯店', action: () => winGame() }]);
          } else {
            failLevel('密碼錯誤，警報大作，遠處傳來狂奔的腳步聲！', 12, 15);
            clearPuzzle();
            levels[4]();
          }
      }}
    ];
    if (S.inventory.includes('逃生通道鑰匙')) {
      opts.push({ label: '直接用逃生通道鑰匙開門', action: () => {
          log('<span class="win">鑰匙插入鎖孔，輕輕一轉，鐵門應聲而開！</span>', 'win');
          updateStatus();
          setChoices([{ label: '衝出鐵門，逃離飯店', action: () => winGame() }]);
      }});
    }
    setChoices(opts);
  };

  function winGame() { endGame(true); }

  function endGame(win, customText) {
    $('screen-game').classList.add('hidden');
    $('screen-end').classList.remove('hidden');
    if (win) {
      $('endTitle').textContent = '全 部 通 關 · 生 還';
      $('endText').textContent = `${S.p1.name} 與 ${S.p2.name} 闖過了飯店裡的五道關卡，跌跌撞撞地衝出大門。回頭望去，那棟建築彷彿從未存在過一般靜靜矗立在雨夜中。你們活著逃了出來——但飯店裡的「它」，似乎已經記住了你們的臉。`;
    } else {
      $('endTitle').textContent = '闖 關 失 敗';
      $('endText').textContent = customText || '你們沒能活著離開這間飯店。';
    }
  }

  // ---------- Init ----------
  $('startBtn').onclick = () => {
    const n1 = $('p1name').value.trim();
    const n2 = $('p2name').value.trim();
    if (n1) S.p1.name = n1;
    if (n2) S.p2.name = n2;
    $('screen-intro').classList.add('hidden');
    $('screen-game').classList.remove('hidden');
    updateStatus();
    log(`<span class="system">${S.p1.name} 與 ${S.p2.name} 推開了飯店厚重的大門，五道生死關卡就此展開……</span>`, 'system');
    levels[0]();
  };

  $('restartBtn').onclick = () => location.reload();

})();
</script>
</body>
</html>
