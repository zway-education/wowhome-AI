<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="author" content="Claude">
<title>恐怖校園追逐 遊戲介紹</title>
<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #050403;
    font-family: 'Courier New', monospace;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  canvas { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
  #soundBtn {
    position: fixed; top: 12px; right: 12px; z-index: 20;
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(40,20,20,0.7); border: 1px solid rgba(180,60,60,0.7);
    color: #d7ffb0; font-size: 20px; cursor: pointer;
  }
  #soundHint {
    position: fixed; top: 18px; right: 68px; z-index: 20;
    color: #cdeab9; font-size: 14px; text-shadow: 0 0 4px #000;
    animation: hintFade 3.2s ease forwards;
    pointer-events: none;
  }
  @keyframes hintFade { 0%{opacity:0} 15%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
  #replayBtn {
    position: fixed; left: 50%; bottom: 12%; transform: translateX(-50%);
    z-index: 20; display: none;
    padding: 14px 42px; font-size: 20px; min-height: 48px;
    background: #4a0000; color: #ffb0b0;
    border: 1px solid #a00000; border-radius: 6px; cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>
<button id="soundBtn">🔇</button>
<div id="soundHint">點聲音鈕開啟音效 🎧 建議戴耳機</div>
<button id="replayBtn">重新播放</button>
<canvas id="stage"></canvas>

<script>
'use strict';
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const soundBtn = document.getElementById('soundBtn');
const replayBtn = document.getElementById('replayBtn');

function resize() {
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', resize); resize();

// ---------- 音效（預設靜音,合成、零外部資源）----------
let audioCtx = null, soundOn = false;
let ambientNodes = null, nextScareAt = 0;
soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? '🔊' : '🔇';
  if (soundOn && !audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  if (soundOn) startAmbient(); else stopAmbient();
});

// 恐怖環境音：失諧雙低音墊＋陰森音樂盒旋律（與遊戲同款配樂）
function startAmbient() {
  if (!audioCtx || ambientNodes) return;
  const t = audioCtx.currentTime;
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0.001, t);
  master.gain.exponentialRampToValueAtTime(0.9, t + 2);
  master.connect(audioCtx.destination);
  const drone = audioCtx.createOscillator();
  drone.type = 'sawtooth';
  drone.frequency.setValueAtTime(48, t);
  const drone2 = audioCtx.createOscillator();
  drone2.type = 'sawtooth';
  drone2.frequency.setValueAtTime(48.7, t); // 微失諧產生拍頻
  const droneFilter = audioCtx.createBiquadFilter();
  droneFilter.type = 'lowpass';
  droneFilter.frequency.setValueAtTime(130, t);
  const droneGain = audioCtx.createGain();
  droneGain.gain.setValueAtTime(0.045, t);
  const lfo = audioCtx.createOscillator();
  lfo.frequency.setValueAtTime(0.17, t);
  const lfoGain = audioCtx.createGain();
  lfoGain.gain.setValueAtTime(7, t);
  lfo.connect(lfoGain).connect(drone.frequency);
  drone.connect(droneFilter);
  drone2.connect(droneFilter);
  droneFilter.connect(droneGain).connect(master);
  drone.start(t); drone2.start(t); lfo.start(t);

  // 音樂盒：A 小調緩慢旋律,失諧泛音＋回音
  const MELODY = [
    [220.0, 1.6], [261.63, 1.6], [246.94, 2.4], [0, 1.2],
    [220.0, 1.6], [174.61, 1.6], [164.81, 3.2], [0, 2.4],
    [261.63, 1.6], [246.94, 1.6], [220.0, 2.4], [0, 1.2],
    [146.83, 1.6], [164.81, 1.6], [220.0, 4.0], [0, 3.2],
  ];
  const echo = audioCtx.createDelay(1.2);
  echo.delayTime.setValueAtTime(0.55, t);
  const echoFb = audioCtx.createGain();
  echoFb.gain.setValueAtTime(0.42, t);
  const echoOut = audioCtx.createGain();
  echoOut.gain.setValueAtTime(0.5, t);
  echo.connect(echoFb).connect(echo);
  echo.connect(echoOut).connect(master);
  let noteIdx = 0;
  function pluck(freq, when) {
    for (const [mult, vol] of [[1, 0.055], [2.01, 0.022], [3.02, 0.009]]) {
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq * mult, when);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.0001, when);
      g.gain.exponentialRampToValueAtTime(vol, when + 0.015);
      g.gain.exponentialRampToValueAtTime(0.0001, when + 2.2);
      osc.connect(g);
      g.connect(master);
      g.connect(echo);
      osc.start(when);
      osc.stop(when + 2.3);
    }
  }
  function scheduleNext() {
    if (!ambientNodes) return;
    const [freq, dur] = MELODY[noteIdx % MELODY.length];
    noteIdx++;
    if (freq > 0) pluck(freq, audioCtx.currentTime + 0.05);
    ambientNodes.melodyTimer = setTimeout(scheduleNext, dur * 1000);
  }
  ambientNodes = { drone, drone2, lfo, master, melodyTimer: null };
  setTimeout(scheduleNext, 800);
  nextScareAt = 0;
}
function stopAmbient() {
  if (!ambientNodes) return;
  const t = audioCtx.currentTime;
  clearTimeout(ambientNodes.melodyTimer);
  ambientNodes.master.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
  ambientNodes.drone.stop(t + 0.5);
  ambientNodes.drone2.stop(t + 0.5);
  ambientNodes.lfo.stop(t + 0.5);
  ambientNodes = null;
}
// ---- 3D 環繞（holophonic）音效工具：HRTF 定位,戴耳機聲音會繞著頭移動 ----
function makePanner(x, z) {
  const p = audioCtx.createPanner();
  p.panningModel = 'HRTF';
  p.distanceModel = 'inverse';
  p.refDistance = 0.5;
  p.positionX.value = x; p.positionY.value = 0; p.positionZ.value = z;
  return p;
}
function panPos(relAngle, dist) {
  return { x: Math.sin(relAngle) * dist, z: -Math.cos(relAngle) * dist };
}
// 隨機 3D 驚嚇聲：耳語繞頭一圈 / 腳步從背後走過 / 耳邊呼吸
function randomScare() {
  if (!soundOn || !audioCtx) return;
  const t = audioCtx.currentTime;
  const pick = Math.random();
  if (pick < 0.34) {
    const dur = 4, n = Math.floor(audioCtx.sampleRate * dur);
    const buf = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    let env = 0;
    for (let i = 0; i < n; i++) {
      if (i % 2000 === 0) env = Math.random() < 0.6 ? 0.4 + Math.random() * 0.6 : 0.05;
      d[i] = (Math.random() * 2 - 1) * env;
    }
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const f = audioCtx.createBiquadFilter();
    f.type = 'bandpass'; f.Q.value = 2.5;
    f.frequency.setValueAtTime(2400, t);
    const p = makePanner(1.2, 0.4);
    const startA = Math.random() * Math.PI * 2;
    for (let k = 0; k <= 16; k++) {
      const a = startA + (k / 16) * Math.PI * 2;
      const pos = panPos(a, 1.1);
      p.positionX.linearRampToValueAtTime(pos.x, t + (k / 16) * dur);
      p.positionZ.linearRampToValueAtTime(pos.z, t + (k / 16) * dur);
    }
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.001, t);
    g.gain.exponentialRampToValueAtTime(0.12, t + 0.5);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    src.connect(f).connect(g).connect(p).connect(audioCtx.destination);
    src.start(t);
  } else if (pick < 0.67) {
    const steps = 5 + Math.floor(Math.random() * 3);
    const side = Math.random() < 0.5 ? 1 : -1;
    for (let i = 0; i < steps; i++) {
      const when = t + i * (0.42 + Math.random() * 0.08);
      const prog = i / (steps - 1);
      const a = Math.PI + side * (0.7 - prog * 1.4);
      const pos = panPos(a, 1.6);
      const n2 = Math.floor(audioCtx.sampleRate * 0.09);
      const buf = audioCtx.createBuffer(1, n2, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let j = 0; j < n2; j++) d[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / n2, 4);
      const src = audioCtx.createBufferSource(); src.buffer = buf;
      const f = audioCtx.createBiquadFilter();
      f.type = 'lowpass'; f.frequency.setValueAtTime(420, when);
      const p = makePanner(pos.x, pos.z);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.4, when);
      src.connect(f).connect(g).connect(p).connect(audioCtx.destination);
      src.start(when);
    }
  } else {
    const side = Math.random() < 0.5 ? 1 : -1;
    for (let b = 0; b < 3; b++) {
      const when = t + b * 1.4;
      const dur = 1.1, n2 = Math.floor(audioCtx.sampleRate * dur);
      const buf = audioCtx.createBuffer(1, n2, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let j = 0; j < n2; j++) {
        const ph = j / n2;
        const env = Math.sin(ph * Math.PI) * (ph < 0.5 ? 1 : 0.7);
        d[j] = (Math.random() * 2 - 1) * env;
      }
      const src = audioCtx.createBufferSource(); src.buffer = buf;
      const f = audioCtx.createBiquadFilter();
      f.type = 'bandpass'; f.Q.value = 1.2;
      f.frequency.setValueAtTime(700, when);
      const p = makePanner(side * (0.7 - b * 0.18), 0.15);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.001, when);
      g.gain.exponentialRampToValueAtTime(0.09 + b * 0.045, when + dur * 0.4);
      g.gain.exponentialRampToValueAtTime(0.001, when + dur);
      src.connect(f).connect(g).connect(p).connect(audioCtx.destination);
      src.start(when);
    }
  }
}
function thump(vol) {
  if (!soundOn || !audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.frequency.setValueAtTime(90, t);
  osc.frequency.exponentialRampToValueAtTime(36, t + 0.18);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.24);
  osc.connect(g).connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.26);
}
function sting() {
  if (!soundOn || !audioCtx) return;
  const t = audioCtx.currentTime, dur = 0.5;
  const n = Math.floor(audioCtx.sampleRate * dur);
  const buf = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 2);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const f = audioCtx.createBiquadFilter();
  f.type = 'bandpass';
  f.frequency.setValueAtTime(1800, t);
  f.frequency.exponentialRampToValueAtTime(400, t + dur);
  const g = audioCtx.createGain(); g.gain.setValueAtTime(0.4, t);
  src.connect(f).connect(g).connect(audioCtx.destination);
  src.start(t);
}
function chime() {
  if (!soundOn || !audioCtx) return;
  const t = audioCtx.currentTime;
  [660, 880, 1100].forEach((fq, i) => {
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(fq, t + i * 0.07);
    g.gain.setValueAtTime(0.001, t + i * 0.07);
    g.gain.exponentialRampToValueAtTime(0.2, t + i * 0.07 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.07 + 0.2);
    osc.connect(g).connect(audioCtx.destination);
    osc.start(t + i * 0.07); osc.stop(t + i * 0.07 + 0.22);
  });
}

// ---------- 緩動 ----------
const easeOut = t => 1 - Math.pow(1 - t, 3);
const easeInOut = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

// ---------- 場景繪製工具 ----------
// 假 3D 校園走廊：以消失點畫牆面梯形,左牆教室門/佈告欄、右牆夜窗/置物櫃
function drawCorridor(camZ, flicker, brightness) {
  const cx = GAME_W / 2, cy = GAME_H / 2;
  ctx.fillStyle = '#131007';
  ctx.fillRect(0, 0, GAME_W, cy);
  ctx.fillStyle = '#2c2411';
  ctx.fillRect(0, cy, GAME_W, cy);

  // 沿牆面在垂直參數 v(0=天花板,1=地板) 與深度插值出座標
  const wallPt = (sideSign, hw, hh, v) => ({ x: cx + sideSign * hw, y: cy - hh + v * hh * 2 });
  const quad = (p1, p2, p3, p4) => {
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
    ctx.lineTo(p3.x, p3.y); ctx.lineTo(p4.x, p4.y);
    ctx.closePath(); ctx.fill();
  };

  const SEGS = 9;
  for (let i = SEGS; i >= 1; i--) {
    const z0 = i + (camZ % 1), z1 = z0 - 1;
    const s0 = 1 / z0, s1 = 1 / Math.max(z1, 0.12);
    const hw0 = GAME_W * 0.62 * s0, hh0 = GAME_H * 0.62 * s0;
    const hw1 = GAME_W * 0.62 * s1, hh1 = GAME_H * 0.62 * s1;
    const cellId = Math.floor(camZ) + i;
    const seed = (cellId * 73) % 17 / 17;
    const shade = clamp(1 - z0 / 10, 0.1, 1) * brightness * (0.8 + flicker * 0.2);
    const r = Math.floor((105 + seed * 45) * shade);
    const g = Math.floor((85 + seed * 35) * shade);
    const b = Math.floor((48 + seed * 20) * shade);
    // 左牆（石膏牆面）
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    quad(wallPt(-1, hw0, hh0, 0), wallPt(-1, hw1, hh1, 0), wallPt(-1, hw1, hh1, 1), wallPt(-1, hw0, hh0, 1));
    // 右牆
    ctx.fillStyle = `rgb(${Math.floor(r*0.85)},${Math.floor(g*0.85)},${Math.floor(b*0.85)})`;
    quad(wallPt(1, hw0, hh0, 0), wallPt(1, hw1, hh1, 0), wallPt(1, hw1, hh1, 1), wallPt(1, hw0, hh0, 1));

    // === 校園裝飾：依 cellId 輪替 ===
    const deco = cellId % 4;
    // 沿深度方向內縮的中段位置（避免貼到梯形邊緣）
    const midHw = (hw0 + hw1) / 2, midHh = (hh0 + hh1) / 2;
    const lerpHw = k => hw0 + (hw1 - hw0) * k, lerpHh = k => hh0 + (hh1 - hh0) * k;
    if (deco === 0) {
      // 左牆教室門（深木色門板＋小窗）
      ctx.fillStyle = `rgba(${Math.floor(60*shade)},${Math.floor(38*shade)},${Math.floor(18*shade)},1)`;
      quad(wallPt(-1, lerpHw(0.25), lerpHh(0.25), 0.25), wallPt(-1, lerpHw(0.75), lerpHh(0.75), 0.25),
           wallPt(-1, lerpHw(0.75), lerpHh(0.75), 1), wallPt(-1, lerpHw(0.25), lerpHh(0.25), 1));
      ctx.fillStyle = `rgba(${Math.floor(20*shade)},${Math.floor(24*shade)},${Math.floor(30*shade)},1)`;
      quad(wallPt(-1, lerpHw(0.4), lerpHh(0.4), 0.33), wallPt(-1, lerpHw(0.6), lerpHh(0.6), 0.33),
           wallPt(-1, lerpHw(0.6), lerpHh(0.6), 0.5), wallPt(-1, lerpHw(0.4), lerpHh(0.4), 0.5));
    } else if (deco === 1) {
      // 右牆夜窗（黑玻璃、微藍,格線）
      ctx.fillStyle = `rgba(${Math.floor(10*shade)},${Math.floor(14*shade)},${Math.floor(26*shade)},1)`;
      quad(wallPt(1, lerpHw(0.2), lerpHh(0.2), 0.2), wallPt(1, lerpHw(0.8), lerpHh(0.8), 0.2),
           wallPt(1, lerpHw(0.8), lerpHh(0.8), 0.62), wallPt(1, lerpHw(0.2), lerpHh(0.2), 0.62));
      ctx.strokeStyle = `rgba(${Math.floor(70*shade)},${Math.floor(60*shade)},${Math.floor(40*shade)},1)`;
      ctx.lineWidth = Math.max(1, midHh * 0.02);
      const wTop = wallPt(1, lerpHw(0.5), lerpHh(0.5), 0.2), wBot = wallPt(1, lerpHw(0.5), lerpHh(0.5), 0.62);
      ctx.beginPath(); ctx.moveTo(wTop.x, wTop.y); ctx.lineTo(wBot.x, wBot.y); ctx.stroke();
    } else if (deco === 2) {
      // 左牆佈告欄（軟木色＋幾張歪斜紙片）
      ctx.fillStyle = `rgba(${Math.floor(96*shade)},${Math.floor(66*shade)},${Math.floor(30*shade)},1)`;
      quad(wallPt(-1, lerpHw(0.25), lerpHh(0.25), 0.28), wallPt(-1, lerpHw(0.75), lerpHh(0.75), 0.28),
           wallPt(-1, lerpHw(0.75), lerpHh(0.75), 0.6), wallPt(-1, lerpHw(0.25), lerpHh(0.25), 0.6));
      ctx.fillStyle = `rgba(${Math.floor(170*shade)},${Math.floor(165*shade)},${Math.floor(140*shade)},1)`;
      quad(wallPt(-1, lerpHw(0.35), lerpHh(0.35), 0.34), wallPt(-1, lerpHw(0.48), lerpHh(0.48), 0.36),
           wallPt(-1, lerpHw(0.48), lerpHh(0.48), 0.5), wallPt(-1, lerpHw(0.35), lerpHh(0.35), 0.48));
      quad(wallPt(-1, lerpHw(0.55), lerpHh(0.55), 0.35), wallPt(-1, lerpHw(0.66), lerpHh(0.66), 0.33),
           wallPt(-1, lerpHw(0.66), lerpHh(0.66), 0.47), wallPt(-1, lerpHw(0.55), lerpHh(0.55), 0.49));
    } else {
      // 右牆成排置物櫃（金屬灰綠,直條分格）
      ctx.fillStyle = `rgba(${Math.floor(52*shade)},${Math.floor(58*shade)},${Math.floor(46*shade)},1)`;
      quad(wallPt(1, lerpHw(0.1), lerpHh(0.1), 0.22), wallPt(1, lerpHw(0.9), lerpHh(0.9), 0.22),
           wallPt(1, lerpHw(0.9), lerpHh(0.9), 1), wallPt(1, lerpHw(0.1), lerpHh(0.1), 1));
      ctx.strokeStyle = `rgba(${Math.floor(20*shade)},${Math.floor(22*shade)},${Math.floor(18*shade)},1)`;
      ctx.lineWidth = Math.max(1, midHh * 0.015);
      for (const k of [0.3, 0.5, 0.7]) {
        const lTop = wallPt(1, lerpHw(k), lerpHh(k), 0.22), lBot = wallPt(1, lerpHw(k), lerpHh(k), 1);
        ctx.beginPath(); ctx.moveTo(lTop.x, lTop.y); ctx.lineTo(lBot.x, lBot.y); ctx.stroke();
      }
    }

    // 地板段
    ctx.fillStyle = `rgba(${Math.floor(70*shade)},${Math.floor(58*shade)},${Math.floor(26*shade)},1)`;
    quad(wallPt(-1, hw0, hh0, 1), wallPt(-1, hw1, hh1, 1), wallPt(1, hw1, hh1, 1), wallPt(1, hw0, hh0, 1));
    // 天花板段＋日光燈
    ctx.fillStyle = `rgba(${Math.floor(38*shade)},${Math.floor(33*shade)},${Math.floor(17*shade)},1)`;
    quad(wallPt(-1, hw0, hh0, 0), wallPt(-1, hw1, hh1, 0), wallPt(1, hw1, hh1, 0), wallPt(1, hw0, hh0, 0));
    if (i % 2 === 0) {
      ctx.fillStyle = `rgba(240,230,160,${0.12 * flicker * brightness})`;
      ctx.fillRect(cx - hw1 * 0.3, cy - (hh0 + hh1) / 2, hw1 * 0.6, 3);
    }
  }
}

// 恐怖阿嬤（駝背歪頭、長髮遮臉、黑洞嘴、瘦長爪手、劇烈抽搐）
function drawGranny(x, y, size, t, alpha) {
  // 不規則抽搐：偶爾猛烈跳動
  const jerk = Math.sin(t * 23) > 0.92 ? (Math.random() - 0.5) * size * 0.08 : 0;
  const tw = Math.sin(t * 14) * size * 0.012 + jerk;
  const headTilt = 0.32 + Math.sin(t * 0.9) * 0.1; // 詭異歪頭
  ctx.save();
  ctx.translate(x + tw, y + Math.abs(jerk) * 0.5);
  ctx.globalAlpha = alpha;
  // 身軀（駝背斗篷）
  ctx.fillStyle = '#170303';
  ctx.beginPath();
  ctx.moveTo(-size * 0.2, size * 0.05);
  ctx.quadraticCurveTo(-size * 0.3, -size * 0.28, -size * 0.06, -size * 0.4);
  ctx.quadraticCurveTo(size * 0.02, -size * 0.46, size * 0.1, -size * 0.38);
  ctx.quadraticCurveTo(size * 0.3, -size * 0.3, size * 0.24, size * 0.05);
  ctx.lineTo(size * 0.3, size * 0.5);
  ctx.lineTo(-size * 0.28, size * 0.5);
  ctx.closePath(); ctx.fill();
  // 兩隻瘦長爪手,五指張開向前抓
  ctx.strokeStyle = '#241010';
  ctx.lineWidth = Math.max(1.2, size * 0.022);
  ctx.lineCap = 'round';
  for (const dir of [1, -1]) {
    const hx = dir * size * 0.34, hy = -size * 0.05 + tw * 3 * dir;
    ctx.beginPath();
    ctx.moveTo(dir * size * 0.16, -size * 0.12);
    ctx.lineTo(hx, hy);
    ctx.stroke();
    for (let f = 0; f < 5; f++) {
      const fa = (f - 2) * 0.3 + dir * 0.5 + Math.sin(t * 10 + f) * 0.06;
      ctx.beginPath();
      ctx.moveTo(hx, hy);
      ctx.lineTo(hx + Math.cos(fa) * size * 0.13 * dir, hy + Math.sin(fa) * size * 0.13);
      ctx.stroke();
    }
  }
  // 歪斜的頭
  ctx.save();
  ctx.translate(-size * 0.02, -size * 0.5);
  ctx.rotate(headTilt);
  ctx.beginPath();
  ctx.ellipse(0, 0, size * 0.095, size * 0.115, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#8f8266'; ctx.fill();
  // 黑洞嘴（無聲尖叫,緩慢開合）
  const mouth = 0.5 + 0.5 * Math.sin(t * 1.7);
  ctx.beginPath();
  ctx.ellipse(0, size * 0.05, size * 0.032, size * (0.02 + mouth * 0.05), 0, 0, Math.PI * 2);
  ctx.fillStyle = '#000'; ctx.fill();
  // 紅眼（一亮一暗,更不對稱詭異）
  const glow = 0.5 + 0.5 * Math.sin(t * 9);
  ctx.fillStyle = `rgb(255,${Math.floor(15 + glow * 30)},0)`;
  ctx.beginPath();
  ctx.arc(-size * 0.035, -size * 0.02, size * 0.018, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = `rgb(255,${Math.floor(15 + (1 - glow) * 30)},0)`;
  ctx.beginPath();
  ctx.arc(size * 0.03, -size * 0.025, size * 0.014, 0, Math.PI * 2);
  ctx.fill();
  // 長髮垂落遮半臉
  ctx.strokeStyle = '#0a0a0a';
  ctx.lineWidth = Math.max(1, size * 0.012);
  for (let h = 0; h < 7; h++) {
    const hx0 = -size * 0.09 + h * size * 0.028;
    ctx.beginPath();
    ctx.moveTo(hx0, -size * 0.1);
    ctx.quadraticCurveTo(hx0 + Math.sin(t * 2 + h) * size * 0.02, size * 0.12, hx0 + Math.sin(t * 1.3 + h * 2) * size * 0.035, size * 0.3);
    ctx.stroke();
  }
  ctx.restore();
  ctx.restore();
}

// 逃跑中的學生（多部件：頭髮/臉/制服/書包/有體積的四肢,朝左奔跑）
function drawRunner(x, y, size, t) {
  const run = Math.sin(t * 12);           // 跑步循環
  const bob = Math.abs(Math.sin(t * 12)) * size * 0.05; // 上下起伏
  ctx.save();
  ctx.translate(x, y - bob);
  ctx.scale(-1, 1); // 面朝左（逃向櫃子）
  ctx.lineCap = 'round';

  // 後腿（深色長褲,遠側較暗）
  ctx.strokeStyle = '#1e2430';
  ctx.lineWidth = size * 0.11;
  ctx.beginPath();
  ctx.moveTo(-size * 0.02, -size * 0.05);
  ctx.quadraticCurveTo(-size * 0.1 - run * size * 0.12, size * 0.18, -size * 0.14 - run * size * 0.22, size * 0.38 + run * size * 0.05);
  ctx.stroke();
  // 後腳鞋
  ctx.fillStyle = '#11141c';
  ctx.beginPath();
  ctx.ellipse(-size * 0.14 - run * size * 0.22, size * 0.4 + run * size * 0.05, size * 0.09, size * 0.045, -0.2, 0, Math.PI * 2);
  ctx.fill();
  // 後手臂（遠側,制服袖）
  ctx.strokeStyle = '#3a4f6e';
  ctx.lineWidth = size * 0.085;
  ctx.beginPath();
  ctx.moveTo(size * 0.02, -size * 0.42);
  ctx.quadraticCurveTo(-size * 0.12 + run * size * 0.14, -size * 0.3, -size * 0.16 + run * size * 0.24, -size * 0.16);
  ctx.stroke();

  // 書包（暗紅色,貼背）
  ctx.fillStyle = '#5e2020';
  ctx.beginPath();
  ctx.roundRect(-size * 0.3, -size * 0.5, size * 0.2, size * 0.32, size * 0.05);
  ctx.fill();
  ctx.strokeStyle = '#3a1414';
  ctx.lineWidth = size * 0.02;
  ctx.strokeRect(-size * 0.28, -size * 0.44, size * 0.16, size * 0.1);

  // 軀幹（制服上衣,前傾奔跑姿勢,漸層）
  const shirt = ctx.createLinearGradient(-size * 0.15, -size * 0.55, size * 0.2, -size * 0.05);
  shirt.addColorStop(0, '#54749e');
  shirt.addColorStop(1, '#3a5578');
  ctx.fillStyle = shirt;
  ctx.beginPath();
  ctx.moveTo(-size * 0.12, -size * 0.55);
  ctx.quadraticCurveTo(size * 0.16, -size * 0.5, size * 0.14, -size * 0.22);
  ctx.quadraticCurveTo(size * 0.1, -size * 0.02, -size * 0.04, -size * 0.05);
  ctx.quadraticCurveTo(-size * 0.16, -size * 0.2, -size * 0.12, -size * 0.55);
  ctx.closePath(); ctx.fill();
  // 領口
  ctx.fillStyle = '#e8e4d8';
  ctx.beginPath();
  ctx.moveTo(size * 0.02, -size * 0.56);
  ctx.lineTo(size * 0.12, -size * 0.5);
  ctx.lineTo(size * 0.04, -size * 0.44);
  ctx.closePath(); ctx.fill();

  // 前腿（近側較亮）
  ctx.strokeStyle = '#2c3547';
  ctx.lineWidth = size * 0.115;
  ctx.beginPath();
  ctx.moveTo(size * 0.02, -size * 0.05);
  ctx.quadraticCurveTo(size * 0.08 + run * size * 0.12, size * 0.18, size * 0.1 + run * size * 0.24, size * 0.38 - run * size * 0.05);
  ctx.stroke();
  ctx.fillStyle = '#1a1f2b';
  ctx.beginPath();
  ctx.ellipse(size * 0.12 + run * size * 0.24, size * 0.4 - run * size * 0.05, size * 0.095, size * 0.05, 0.15, 0, Math.PI * 2);
  ctx.fill();

  // 頭（膚色、瀏海、驚恐側臉）
  ctx.beginPath();
  ctx.arc(size * 0.1, -size * 0.68, size * 0.14, 0, Math.PI * 2);
  ctx.fillStyle = '#e8c49a'; ctx.fill();
  // 頭髮（覆蓋後腦與瀏海,隨跑動飄）
  ctx.fillStyle = '#2b2119';
  ctx.beginPath();
  ctx.arc(size * 0.08, -size * 0.72, size * 0.145, Math.PI * 0.75, Math.PI * 2.05);
  ctx.quadraticCurveTo(-size * 0.12 - run * size * 0.03, -size * 0.62, -size * 0.06, -size * 0.55);
  ctx.quadraticCurveTo(size * 0.0, -size * 0.6, size * 0.02, -size * 0.62);
  ctx.closePath(); ctx.fill();
  // 驚恐的眼與張開的嘴
  ctx.fillStyle = '#1a1208';
  ctx.beginPath();
  ctx.arc(size * 0.16, -size * 0.7, size * 0.018, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(size * 0.19, -size * 0.6, size * 0.02, size * 0.03, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#40140f'; ctx.fill();

  // 前手臂（近側,擺向前）
  ctx.strokeStyle = '#54749e';
  ctx.lineWidth = size * 0.09;
  ctx.beginPath();
  ctx.moveTo(size * 0.04, -size * 0.42);
  ctx.quadraticCurveTo(size * 0.16 - run * size * 0.14, -size * 0.32, size * 0.22 - run * size * 0.24, -size * 0.2);
  ctx.stroke();
  // 手
  ctx.fillStyle = '#e8c49a';
  ctx.beginPath();
  ctx.arc(size * 0.22 - run * size * 0.24, -size * 0.19, size * 0.045, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// 球棒（漸細棒身、木紋漸層、握把纏帶、圓突底）
function drawBat(x, y, size, angle) {
  const L = size * 1.6;
  ctx.save();
  ctx.translate(x, y); ctx.rotate(angle);
  const wood = ctx.createLinearGradient(-L * 0.06, 0, L * 0.06, 0);
  wood.addColorStop(0, '#8a6534');
  wood.addColorStop(0.5, '#d8b276');
  wood.addColorStop(1, '#7d5a2c');
  ctx.fillStyle = wood;
  ctx.beginPath();
  ctx.moveTo(-L * 0.016, 0);
  ctx.lineTo(-L * 0.02, -L * 0.38);
  ctx.quadraticCurveTo(-L * 0.05, -L * 0.62, -L * 0.052, -L * 0.8);
  ctx.quadraticCurveTo(-L * 0.05, -L * 0.97, 0, -L * 0.985);
  ctx.quadraticCurveTo(L * 0.05, -L * 0.97, L * 0.052, -L * 0.8);
  ctx.quadraticCurveTo(L * 0.05, -L * 0.62, L * 0.02, -L * 0.38);
  ctx.lineTo(L * 0.016, 0);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(90,58,26,0.5)';
  ctx.lineWidth = Math.max(1, L * 0.004);
  for (const k of [-0.5, 0.1, 0.55]) {
    ctx.beginPath();
    ctx.moveTo(L * 0.012 * k, -L * 0.1);
    ctx.quadraticCurveTo(L * 0.045 * k, -L * 0.55, L * 0.03 * k, -L * 0.95);
    ctx.stroke();
  }
  ctx.fillStyle = 'rgba(255,240,200,0.2)';
  ctx.beginPath();
  ctx.ellipse(-L * 0.02, -L * 0.82, L * 0.012, L * 0.13, 0.05, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#2e2018';
  ctx.fillRect(-L * 0.022, -L * 0.36, L * 0.044, L * 0.34);
  ctx.strokeStyle = 'rgba(0,0,0,0.45)';
  ctx.lineWidth = Math.max(1, L * 0.006);
  for (let i = 0; i < 6; i++) {
    const yy = -L * 0.34 + i * L * 0.05;
    ctx.beginPath();
    ctx.moveTo(-L * 0.022, yy); ctx.lineTo(L * 0.022, yy + L * 0.02);
    ctx.stroke();
  }
  ctx.fillStyle = '#6e4a24';
  ctx.beginPath();
  ctx.ellipse(0, L * 0.004, L * 0.034, L * 0.016, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// 櫃子
function drawCabinet(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = '#3c2814';
  ctx.fillRect(-size * 0.32, -size, size * 0.64, size);
  ctx.strokeStyle = '#140e06';
  ctx.lineWidth = Math.max(1.5, size * 0.02);
  ctx.strokeRect(-size * 0.32, -size, size * 0.64, size);
  ctx.beginPath(); ctx.moveTo(0, -size); ctx.lineTo(0, 0); ctx.stroke();
  for (let i = 1; i <= 4; i++) {
    ctx.fillStyle = 'rgba(10,7,3,0.7)';
    ctx.fillRect(-size * 0.26, -size + i * size * 0.18, size * 0.2, size * 0.05);
    ctx.fillRect(size * 0.06, -size + i * size * 0.18, size * 0.2, size * 0.05);
  }
  ctx.restore();
}

// 血手印＋流血（程序繪製,固定種子；bleedT 為浮現後經過秒數,血會持續往下流）
function drawBloodPrint(x, y, size, alpha, bleedT) {
  bleedT = bleedT || 0;
  let s = 7;
  const rnd = () => { s = (s * 16807) % 2147483647; return s / 2147483647; };
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(0.28);
  ctx.globalAlpha = alpha;

  const fingers = [
    [-0.34, -0.32, 0.085, 0.34, -0.5],
    [-0.16, -0.48, 0.09, 0.4, -0.18],
    [0.03, -0.52, 0.095, 0.42, 0],
    [0.22, -0.46, 0.085, 0.38, 0.2],
    [0.44, -0.05, 0.08, 0.3, 0.9],
  ];
  // 兩層疊印：外層深乾涸血、內層鮮血,邊緣斑駁
  const layers = [
    { c: '#5e0808', k: 1.12 },
    { c: '#9e1010', k: 1.0 },
  ];
  for (const { c, k } of layers) {
    ctx.fillStyle = c;
    // 掌心（不規則邊緣：多個橢圓堆疊）
    for (let i = 0; i < 7; i++) {
      const ox = (rnd() - 0.5) * size * 0.1, oy = (rnd() - 0.5) * size * 0.12;
      ctx.beginPath();
      ctx.ellipse(ox, size * 0.12 + oy, size * 0.3 * k * (0.8 + rnd() * 0.3), size * 0.34 * k * (0.85 + rnd() * 0.25), rnd() * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
    for (const [fx, fy, fw, fh, rot] of fingers) {
      ctx.save();
      ctx.translate(fx * size, fy * size);
      ctx.rotate(rot);
      // 指節分兩段,末端略窄,更像真手指壓印
      ctx.beginPath();
      ctx.ellipse(0, fh * size * 0.28, fw * size * k, fh * size * 0.62 * k, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(0, -fh * size * 0.5, fw * size * 0.82 * k, fh * size * 0.42 * k, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }
  // 掌心留白掌紋（壓印中間常缺墨）
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  for (let i = 0; i < 4; i++) {
    ctx.save();
    ctx.translate((rnd() - 0.5) * size * 0.3, size * 0.1 + (rnd() - 0.5) * size * 0.3);
    ctx.rotate(rnd() * Math.PI);
    ctx.beginPath();
    ctx.ellipse(0, 0, size * (0.04 + rnd() * 0.08), size * 0.015, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  // 噴濺點
  ctx.fillStyle = '#8f0e0e';
  for (let i = 0; i < 26; i++) {
    const a = rnd() * Math.PI * 2, d = size * (0.45 + rnd() * 0.75);
    ctx.beginPath();
    ctx.arc(Math.cos(a) * d, Math.sin(a) * d, size * (0.012 + rnd() * 0.04), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // 流血：不隨手印旋轉,垂直往下流,長度隨時間增加、末端有血珠
  ctx.save();
  ctx.translate(x, y);
  ctx.globalAlpha = alpha;
  for (let i = 0; i < 5; i++) {
    const dx = (rnd() - 0.5) * size * 0.72;
    const startY = size * (0.05 + rnd() * 0.3);
    const speed = 0.25 + rnd() * 0.45;                 // 每條流速不同
    const len = size * Math.min(0.15 + bleedT * speed, 1.5 + rnd() * 0.6);
    const w = size * (0.022 + rnd() * 0.02);
    const grad = ctx.createLinearGradient(0, startY, 0, startY + len);
    grad.addColorStop(0, '#9e1010');
    grad.addColorStop(0.7, '#7a0b0b');
    grad.addColorStop(1, '#b31414');
    ctx.fillStyle = grad;
    // 蜿蜒血痕
    ctx.beginPath();
    ctx.moveTo(dx - w / 2, startY);
    ctx.quadraticCurveTo(dx - w / 2 + Math.sin(i * 3) * size * 0.03, startY + len * 0.5, dx - w / 2, startY + len);
    ctx.lineTo(dx + w / 2, startY + len);
    ctx.quadraticCurveTo(dx + w / 2 + Math.sin(i * 3) * size * 0.03, startY + len * 0.5, dx + w / 2, startY);
    ctx.closePath();
    ctx.fill();
    // 末端血珠（將滴未滴,微微膨縮）
    const bead = 1 + Math.sin(bleedT * 5 + i * 2) * 0.15;
    ctx.beginPath();
    ctx.ellipse(dx, startY + len, w * 1.1 * bead, w * 1.5 * bead, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// 字幕
function subtitle(text, alpha, big) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';
  ctx.font = (big ? 'bold 30px' : 'bold 24px') + " 'Courier New', monospace";
  const y = GAME_H - 56;
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  const w = ctx.measureText(text).width + 44;
  ctx.fillRect(GAME_W / 2 - w / 2, y - 30, w, 46);
  ctx.fillStyle = '#cdeab9';
  ctx.shadowColor = '#000'; ctx.shadowBlur = 6;
  ctx.fillText(text, GAME_W / 2, y);
  ctx.restore();
}

function redVignette(strength, t) {
  const p = 0.5 + 0.5 * Math.sin(t * 3);
  const v = ctx.createRadialGradient(GAME_W/2, GAME_H/2, GAME_H*0.3, GAME_W/2, GAME_H/2, GAME_W*0.72);
  v.addColorStop(0, 'rgba(120,0,0,0)');
  v.addColorStop(1, `rgba(150,0,0,${strength * (0.4 + p * 0.6)})`);
  ctx.fillStyle = v;
  ctx.fillRect(0, 0, GAME_W, GAME_H);
}

// ---------- 時間軸（總長約 34 秒,三幕結構）----------
// 第一幕 0-7s 開場標題；第二幕 7-26s 玩法介紹（追逐/球棒/櫃子）；第三幕 26-34s 高潮+CTA
// 內部時間軸以 34 秒編排,播放時壓縮為 30 秒實際片長
const TIMELINE = 34, DURATION = 30, TIME_SCALE = TIMELINE / DURATION;
let startTime = null, playing = false;
let firedCues = {};
function cue(id, fn) { if (!firedCues[id]) { firedCues[id] = true; fn(); } }

function draw(t) {
  const flicker = 0.85 + Math.random() * 0.15;
  ctx.clearRect(0, 0, GAME_W, GAME_H);

  if (t < 7) {
    // ===== 第一幕：黑暗走廊 + 標題浮現 =====
    const p = t / 7;
    drawCorridor(t * 0.6, flicker, 0.5 + p * 0.3);
    redVignette(0.25, t);
    const tp = clamp((t - 1) / 1.6, 0, 1);
    // 標題後方的血手印,比標題稍晚重擊浮現
    const bp = clamp((t - 1.8) / 0.5, 0, 1);
    if (bp > 0) drawBloodPrint(GAME_W * 0.66, GAME_H * 0.36, 130 * (1.6 - easeOut(bp) * 0.6), easeOut(bp) * 0.85, Math.max(0, t - 2.3));
    if (t > 1.8) cue('bloodSlam', () => thump(0.5));
    ctx.save();
    ctx.globalAlpha = easeOut(tp);
    ctx.textAlign = 'center';
    ctx.font = `bold ${58 + (1 - easeOut(tp)) * 30}px 'Courier New', monospace`;
    ctx.fillStyle = '#ff3b3b';
    ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 24;
    ctx.fillText('恐怖校園追逐', GAME_W / 2, GAME_H * 0.42);
    ctx.shadowBlur = 0;
    if (t > 3.2) {
      ctx.globalAlpha = clamp((t - 3.2) / 0.8, 0, 1);
      ctx.font = "22px 'Courier New', monospace";
      ctx.fillStyle = '#7fdb6b';
      ctx.fillText('第一人稱 3D 校園迷宮逃脫', GAME_W / 2, GAME_H * 0.52);
    }
    ctx.restore();
    if (t > 1) cue('act1', () => thump(0.3));
    if (t > 4.6) subtitle('深夜的校園,妳不是一個人……', clamp((t - 4.6) / 0.6, 0, 1) * clamp((7 - t) / 0.5, 0, 1));
    if (t > 4.6) cue('thump2', () => thump(0.35));
  } else if (t < 14) {
    // ===== 第二幕A：走廊追逐 =====
    const p = (t - 7) / 7;
    drawCorridor(4 + t * 1.4, flicker, 0.85);
    // 阿嬤從深處逼近
    const gz = 1 - easeInOut(clamp(p * 1.25, 0, 1));
    const gs = 90 + (1 - gz) * 330;
    drawGranny(GAME_W / 2, GAME_H / 2 + gs * 0.32, gs, t, clamp(p * 3, 0, 1));
    redVignette(0.15 + (1 - gz) * 0.3, t);
    if (t < 10.5) subtitle('恐怖阿嬤會沿著迷宮追殺妳', clamp((t - 7.4) / 0.6, 0, 1), false);
    else subtitle('她愈來愈快……', clamp((t - 10.6) / 0.5, 0, 1) * clamp((14 - t) / 0.5, 0, 1), false);
    cue('chaseThump', () => thump(0.4));
    if (t > 10.5) cue('chaseSting', () => sting());
    // 突臉 jump scare：13.1~13.8 秒她瞬間貼到鏡頭前
    if (t > 13.1 && t < 13.8) {
      const jp = (t - 13.1) / 0.7;
      const js = 430 + easeOut(clamp(jp * 2.5, 0, 1)) * 230;
      // 抖動鏡頭
      ctx.save();
      ctx.translate((Math.random() - 0.5) * 18, (Math.random() - 0.5) * 18);
      drawGranny(GAME_W / 2, GAME_H * 0.78, js, t * 3, 1);
      ctx.restore();
      ctx.fillStyle = `rgba(120,0,0,${0.25 + Math.random() * 0.15})`;
      ctx.fillRect(0, 0, GAME_W, GAME_H);
      if (jp < 0.12) {
        ctx.fillStyle = `rgba(255,255,255,${(1 - jp / 0.12) * 0.85})`;
        ctx.fillRect(0, 0, GAME_W, GAME_H);
      }
      cue('jumpScare', () => { sting(); thump(0.6); });
    }
  } else if (t < 20) {
    // ===== 第二幕B：球棒反擊 =====
    drawCorridor(24, flicker, 0.9);
    const p = (t - 14) / 6;
    // 阿嬤在中景
    drawGranny(GAME_W * 0.62, GAME_H * 0.62, 240, t, 1);
    // 球棒揮擊
    const swing = t > 16.4 && t < 17.0 ? easeOut((t - 16.4) / 0.6) : 0;
    const idleAngle = Math.PI / 5 + Math.sin(t * 2) * 0.05;
    drawBat(GAME_W * 0.33, GAME_H * 0.72, 130, idleAngle + swing * Math.PI * 0.9);
    if (swing > 0 && swing < 1) {
      ctx.strokeStyle = `rgba(255,255,255,${(1 - swing) * 0.8})`;
      ctx.lineWidth = 7;
      ctx.beginPath();
      ctx.arc(GAME_W * 0.36, GAME_H * 0.7, 150, -Math.PI * 0.7, -Math.PI * 0.7 + swing * Math.PI, false);
      ctx.stroke();
    }
    if (t > 16.9) {
      const dz = clamp((t - 16.9) / 0.4, 0, 1);
      ctx.save();
      ctx.globalAlpha = clamp(1 - (t - 17.6), 0, 1);
      ctx.fillStyle = '#fff';
      ctx.font = "bold 40px 'Courier New', monospace";
      ctx.textAlign = 'center';
      ctx.fillText('暈 2.5 秒！', GAME_W * 0.62, GAME_H * 0.28 - dz * 20);
      ctx.restore();
    }
    if (t < 16.4) subtitle('握緊手中的球棒反擊——', clamp((t - 14.4) / 0.6, 0, 1), false);
    else subtitle('揮擊可將她擊暈 2.5 秒！', 1, false);
    if (t > 16.4) cue('batHit', () => { thump(0.5); chime(); });
    redVignette(0.12, t);
  } else if (t < 26) {
    // ===== 第二幕C：躲櫃子 =====
    drawCorridor(30, flicker, 0.8);
    const p = (t - 20) / 6;
    drawCabinet(GAME_W * 0.38, GAME_H * 0.78, 300);
    // 玩家跑進櫃子
    const runP = easeInOut(clamp(p * 2, 0, 1));
    if (runP < 1) drawRunner(GAME_W * (0.78 - runP * 0.4), GAME_H * 0.72, 130, t);
    // 阿嬤走過翻找
    if (t > 22.3) {
      const gp = easeInOut(clamp((t - 22.3) / 2.4, 0, 1));
      drawGranny(GAME_W * (1.05 - gp * 0.5), GAME_H * 0.66, 260, t, 1);
    }
    // 百葉窗視角暗示
    if (t > 22) {
      ctx.save();
      ctx.globalAlpha = clamp((t - 22) / 0.8, 0, 1) * 0.55;
      for (let y = 0; y < GAME_H; y += 26) {
        ctx.fillStyle = 'rgba(8,6,3,0.85)';
        ctx.fillRect(0, y, GAME_W, 12);
      }
      ctx.restore();
    }
    if (t < 22.6) subtitle('危急時,躲進校園裡上百個櫃子', clamp((t - 20.4) / 0.6, 0, 1), false);
    else subtitle('小心——她有時會翻找櫃子……', 1, false);
    if (t > 22.6) cue('searchSting', () => sting());
    redVignette(0.2 + (t > 22.6 ? 0.15 : 0), t);
  } else {
    // ===== 第三幕：逃生門高潮 + CTA =====
    const p = (t - 26) / 8;
    drawCorridor(36 + p * 5, flicker, 0.75);
    // 逃生門發光
    const glow = 0.6 + 0.4 * Math.sin(t * 3);
    const ds = 60 + easeOut(clamp(p * 1.4, 0, 1)) * 240;
    ctx.save();
    ctx.translate(GAME_W / 2, GAME_H / 2);
    ctx.fillStyle = `rgba(30,60,30,1)`;
    ctx.fillRect(-ds * 0.28, -ds * 0.9, ds * 0.56, ds * 0.9);
    ctx.strokeStyle = `rgba(120,255,140,${glow})`;
    ctx.lineWidth = Math.max(2, ds * 0.03);
    ctx.strokeRect(-ds * 0.28, -ds * 0.9, ds * 0.56, ds * 0.9);
    ctx.fillStyle = `rgba(120,255,140,${0.25 * glow})`;
    ctx.fillRect(-ds * 0.28, -ds * 0.9, ds * 0.56, ds * 0.9);
    ctx.fillStyle = '#c8ffd2';
    ctx.font = `bold ${Math.max(14, ds * 0.11)}px 'Courier New', monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('逃生門', 0, -ds);
    ctx.restore();
    cue('finalChime', () => chime());
    if (t < 29.5) {
      subtitle('找到逃生門,活著離開恐怖校園！', clamp((t - 26.3) / 0.6, 0, 1), false);
    } else {
      const cta = clamp((t - 29.5) / 0.8, 0, 1);
      drawBloodPrint(GAME_W * 0.64, GAME_H * 0.3, 100, easeOut(cta) * 0.8, Math.max(0, t - 30));
      ctx.save();
      ctx.globalAlpha = easeOut(cta);
      ctx.textAlign = 'center';
      ctx.font = "bold 44px 'Courier New', monospace";
      ctx.fillStyle = '#ff3b3b';
      ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 20;
      ctx.fillText('恐怖校園追逐', GAME_W / 2, GAME_H * 0.36);
      ctx.shadowBlur = 0;
      ctx.font = "24px 'Courier New', monospace";
      ctx.fillStyle = '#7fdb6b';
      ctx.fillText('鍵盤＋觸控雙支援 · 立即遊玩', GAME_W / 2, GAME_H * 0.46);
      ctx.restore();
      cue('ctaThump', () => thump(0.4));
    }
    redVignette(0.18, t);
  }

  // 全程輕微暗角
  const edge = ctx.createRadialGradient(GAME_W/2, GAME_H/2, GAME_H*0.35, GAME_W/2, GAME_H/2, GAME_W*0.75);
  edge.addColorStop(0, 'rgba(0,0,0,0)');
  edge.addColorStop(1, 'rgba(0,0,0,0.45)');
  ctx.fillStyle = edge;
  ctx.fillRect(0, 0, GAME_W, GAME_H);
}

function loop(now) {
  if (!playing) return;
  if (startTime === null) startTime = now;
  const t = (now - startTime) / 1000 * TIME_SCALE;
  // 不定時恐怖環境驚嚇聲（4～9 秒一次）
  if (soundOn && t > nextScareAt) {
    if (nextScareAt > 0) randomScare();
    nextScareAt = t + 4 + Math.random() * 5;
  }
  if (t >= TIMELINE) {
    draw(TIMELINE - 0.01);
    playing = false;
    replayBtn.style.display = 'block';
    return;
  }
  draw(t);
  requestAnimationFrame(loop);
}

function play() {
  startTime = null;
  firedCues = {};
  playing = true;
  replayBtn.style.display = 'none';
  requestAnimationFrame(loop);
}
replayBtn.addEventListener('click', play);
play();
</script>
