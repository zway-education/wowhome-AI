<title>太平洋航線：棒球空襲事件</title>
<style>
  @font-face {
    font-family: 'DispFace';
    src: local('Arial Black');
  }
  :root{
    --sky-top:#1a3a63;
    --sky-mid:#3d6ea5;
    --sky-bottom:#a9d4e8;
    --ocean-deep:#0a2a45;
    --ocean-mid:#154268;
    --land:#e8dcc0;
    --land-line:#8a7a52;
    --ink:#0e1b2b;
    --paper:#f4efe2;
    --accent:#e0553a;
    --accent-2:#f0b429;
    --plane:#f4efe2;
    --ball-red:#c0392b;
  }
  @media (prefers-color-scheme: dark){
    :root{ --paper:#12151c; --ink:#eae4d4; }
  }
  :root[data-theme="dark"]{ --paper:#12151c; --ink:#eae4d4; }
  :root[data-theme="light"]{ --paper:#f4efe2; --ink:#0e1b2b; }

  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:18px;
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    padding:32px 16px;
  }
  .masthead{
    text-align:center;
    max-width:640px;
  }
  h1{
    font-family:'DispFace',Arial,sans-serif;
    font-weight:900;
    font-size:clamp(24px,4vw,38px);
    letter-spacing:-0.01em;
    margin:0 0 6px;
    text-wrap:balance;
    color:var(--ink);
  }
  .sub{
    font-size:14px;
    letter-spacing:0.04em;
    opacity:0.65;
    margin:0;
  }
  .stage-wrap{
    width:min(1000px,94vw);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 20px 50px -20px rgba(0,0,0,0.5);
    border:1px solid rgba(128,128,128,0.25);
    position:relative;
    background:var(--sky-bottom);
  }
  canvas{
    display:block;
    width:100%;
    height:auto;
  }
  .controls{
    display:flex;
    align-items:center;
    gap:14px;
    width:min(1000px,94vw);
    justify-content:space-between;
  }
  .caption{
    font-size:13px;
    opacity:0.7;
    font-variant-numeric:tabular-nums;
  }
  button{
    font:inherit;
    font-size:13px;
    font-weight:600;
    letter-spacing:0.02em;
    padding:9px 18px;
    border-radius:999px;
    border:1px solid var(--accent);
    background:transparent;
    color:var(--accent);
    cursor:pointer;
    transition:background 0.15s,color 0.15s;
  }
  button:hover{ background:var(--accent); color:#fff; }
  button:focus-visible{ outline:2px solid var(--accent-2); outline-offset:2px; }

  @media (prefers-reduced-motion: reduce){
    .hint{ display:none; }
  }
</style>

<div class="masthead">
  <h1>台灣 → 美國：太平洋上空的意外訪客</h1>
  <p class="sub">一段關於飛機、棒球，與運氣的旅程</p>
</div>

<div class="stage-wrap">
  <canvas id="stage" width="1000" height="520"></canvas>
</div>

<div class="controls">
  <span class="caption" id="caption">準備起飛…</span>
  <button id="replay">重播 ↻</button>
</div>

<script>
(function(){
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const captionEl = document.getElementById('caption');
  const replayBtn = document.getElementById('replay');

  const DURATION = 9000; // ms total
  const BALL_START = 0.42; // fraction of duration when ball appears
  const BALL_END = 0.66;

  let startTime = null;
  let running = true;
  let reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function easeInOutSine(t){ return -(Math.cos(Math.PI*t)-1)/2; }
  function easeInQuad(t){ return t*t; }

  // Cloud field (static positions, drift slowly)
  const clouds = Array.from({length:14},(_,i)=>({
    x: (i*97+30)%W,
    y: 40 + (i*53)%160,
    s: 0.6 + (i%5)*0.25,
    speed: 0.15 + (i%3)*0.08
  }));

  const waves = Array.from({length:40},(_,i)=>({
    x: (i*47)%W,
    y: 330 + (i*13)%150,
    w: 30+(i%4)*14,
    speed: 0.3+(i%4)*0.15
  }));

  function drawSky(){
    const g = ctx.createLinearGradient(0,0,0,340);
    g.addColorStop(0,'#152c4d');
    g.addColorStop(0.55,'#3d6ea5');
    g.addColorStop(1,'#bfe3f5');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,340);
  }

  function drawOcean(t){
    const g = ctx.createLinearGradient(0,320,0,H);
    g.addColorStop(0,'#1c567f');
    g.addColorStop(1,'#0a2a45');
    ctx.fillStyle = g;
    ctx.fillRect(0,320,W,H-320);

    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 2;
    waves.forEach(w=>{
      const x = ((w.x + t*0.03*w.speed*60) % (W+80)) - 40;
      ctx.beginPath();
      ctx.moveTo(x, w.y);
      ctx.quadraticCurveTo(x+w.w/2, w.y-6, x+w.w, w.y);
      ctx.stroke();
    });
  }

  function drawClouds(t){
    ctx.save();
    clouds.forEach(c=>{
      const x = ((c.x + t*0.02*c.speed*60) % (W+120)) - 60;
      ctx.globalAlpha = 0.75;
      ctx.fillStyle = '#f6f9fb';
      ctx.beginPath();
      ctx.ellipse(x, c.y, 26*c.s, 12*c.s, 0, 0, Math.PI*2);
      ctx.ellipse(x+20*c.s, c.y+4, 18*c.s, 10*c.s, 0, 0, Math.PI*2);
      ctx.ellipse(x-20*c.s, c.y+5, 16*c.s, 9*c.s, 0, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.restore();
  }

  function landPatch(x, w){
    ctx.fillStyle = '#e8dcc0';
    ctx.strokeStyle = '#8a7a52';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x-w/2, 340);
    ctx.bezierCurveTo(x-w/2-10,320, x-w/4,300, x, 306);
    ctx.bezierCurveTo(x+w/4,300, x+w/2+10,322, x+w/2, 340);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }

  function drawTaiwan(){
    ctx.save();
    landPatch(70, 90);
    ctx.fillStyle = '#3d3222';
    ctx.font = '600 15px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('台灣', 70, 300);
    ctx.restore();
  }

  function drawUSA(){
    ctx.save();
    ctx.fillStyle = '#e8dcc0';
    ctx.strokeStyle = '#8a7a52';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(W-40, 340);
    ctx.bezierCurveTo(W-140,335, W-260,310, W-380,318);
    ctx.lineTo(W-380,360);
    ctx.lineTo(W+40,360);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#3d3222';
    ctx.font = '600 15px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('美國', W-210, 300);
    ctx.restore();
  }

  function drawPlane(x, y, wobble){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(wobble);
    ctx.fillStyle = '#f4efe2';
    ctx.strokeStyle = '#0e1b2b';
    ctx.lineWidth = 1.5;

    ctx.beginPath();
    ctx.moveTo(-34,0);
    ctx.quadraticCurveTo(0,-9, 34,0);
    ctx.quadraticCurveTo(0,9,-34,0);
    ctx.fill(); ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(-4,-2);
    ctx.lineTo(-24,-24);
    ctx.lineTo(-10,-3);
    ctx.closePath();
    ctx.fillStyle = '#d8d0b8';
    ctx.fill(); ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(-4,2);
    ctx.lineTo(-24,24);
    ctx.lineTo(-10,3);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(-30,0);
    ctx.lineTo(-42,-8);
    ctx.lineTo(-38,0);
    ctx.lineTo(-42,8);
    ctx.closePath();
    ctx.fillStyle = '#f4efe2';
    ctx.fill(); ctx.stroke();

    ctx.fillStyle = '#e0553a';
    ctx.beginPath();
    ctx.ellipse(24,0,6,3,0,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
  }

  function drawBaseball(x,y,rot){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(rot);
    ctx.fillStyle = '#f4efe2';
    ctx.strokeStyle = '#0e1b2b';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0,0,9,0,Math.PI*2);
    ctx.fill(); ctx.stroke();

    ctx.strokeStyle = '#c0392b';
    ctx.lineWidth = 1.3;
    ctx.beginPath();
    ctx.arc(0,0,9,0.4,1.6);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(0,0,9,Math.PI+0.4,Math.PI+1.6);
    ctx.stroke();
    ctx.restore();
  }

  function drawSplash(x,y,p){
    ctx.save();
    ctx.globalAlpha = 1-p;
    ctx.strokeStyle = '#eaf6ff';
    ctx.lineWidth = 2;
    for(let i=0;i<5;i++){
      const ang = -Math.PI/2 + (i-2)*0.35;
      const len = 14*p+4;
      ctx.beginPath();
      ctx.moveTo(x,y);
      ctx.lineTo(x+Math.cos(ang)*len, y+Math.sin(ang)*len - 10*p);
      ctx.stroke();
    }
    ctx.restore();
  }

  function frame(now){
    if(!startTime) startTime = now;
    let elapsed = now - startTime;
    let loopT = (elapsed % DURATION) / DURATION;

    ctx.clearRect(0,0,W,H);
    drawSky();
    drawClouds(elapsed/1000);
    drawOcean(elapsed/1000);
    drawTaiwan();
    drawUSA();

    // Plane path: gentle arc from left to right
    const planeX = 90 + loopT*(W-180);
    const planeY = 150 - Math.sin(loopT*Math.PI)*40;
    const wobble = Math.sin(elapsed/380)*0.02;
    drawPlane(planeX, planeY, wobble);

    // Baseball event around midpoint
    if(loopT >= BALL_START && loopT <= BALL_END+0.12){
      const bt = Math.min(1, (loopT-BALL_START)/(BALL_END-BALL_START));
      const ballX = W/2 + (bt-0.5)*40;
      const fall = easeInQuad(Math.min(1,bt));
      const ballY = 40 + fall*300;
      const rot = bt*14;

      if(ballY < H-60){
        drawBaseball(ballX, ballY, rot);
      } else if(bt<1.05){
        const sp = Math.min(1,(bt-1)*8+0.001);
      }

      if(bt>=1 && bt<1.3){
        drawSplash(ballX, H-70, Math.min(1,(bt-1)*3));
      }

      if(bt > 0.05 && bt < 0.95){
        captionEl.textContent = '⚠️ 一顆棒球從高空墜落太平洋中央…（第 '+ (Math.round(bt*100)) +'%）';
      }
    } else if (loopT < BALL_START){
      captionEl.textContent = '✈️ 從台灣起飛，飛越太平洋前往美國';
    } else {
      captionEl.textContent = '🛬 平安繼續飛往美國';
    }

    if(running){
      requestAnimationFrame(frame);
    }
  }

  replayBtn.addEventListener('click', ()=>{
    startTime = null;
  });

  requestAnimationFrame(frame);
})();
</script>
