<title>晨山對決 · 平地築屋</title>
<meta name="description" content="孫悟空與哪吒在山頭以金箍棒對決，黑樂在空地上蓋房子——一幅晨光下的雙景插畫" />

<style>
  @font-face {
    font-family: "Noto Serif TC";
    src: local("Noto Serif TC"), local("PMingLiU"), local("Songti TC");
  }

  :root{
    --sky-top:#2b2f63;
    --sky-mid:#a1477a;
    --sky-low:#ff9a5a;
    --sky-glow:#ffd9a0;
    --ink:#241a2e;
    --paper:#fff6e9;
    --gold:#e8b13a;
    --gold-bright:#ffd464;
    --pine:#3a7a5c;
    --pine-dark:#20503a;
    --mountain-far:#5a4a7a;
    --mountain-near:#3c2f55;
    --stone:#7c7391;
    --wukong:#b5432e;
    --nezha:#d94f6a;
    --heiye:#2f6f4e;
    --label:#f4e6c8;
    --rule: rgba(244,230,200,0.28);
  }

  :root[data-theme="light"]{
    --paper:#fdf3e2;
    --label:#241a2e;
    --rule: rgba(36,26,46,0.18);
  }
  @media (prefers-color-scheme: light){
    :root{
      --paper:#fdf3e2;
      --label:#241a2e;
      --rule: rgba(36,26,46,0.18);
    }
  }
  :root[data-theme="dark"]{
    --paper:#1c1626;
    --label:#f4e6c8;
    --rule: rgba(244,230,200,0.28);
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--paper);
    color: var(--label);
    font-family: "Noto Serif TC", "Songti TC", "PMingLiU", serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: clamp(20px, 4vw, 48px) clamp(16px, 4vw, 48px) 56px;
    min-height:100vh;
  }

  header{
    width:100%;
    max-width: 1180px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap: 24px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  h1{
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 700;
    letter-spacing: 0.04em;
    margin: 0;
    text-wrap: balance;
    line-height: 1.25;
  }
  h1 small{
    display:block;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    opacity: 0.55;
    margin-bottom: 8px;
  }
  .meta{
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 13px;
    letter-spacing: 0.06em;
    opacity: 0.65;
    text-align: right;
    line-height: 1.9;
    white-space: nowrap;
  }

  .frame{
    width:100%;
    max-width: 1180px;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 30px 70px -30px rgba(20,10,30,0.55);
    border: 1px solid var(--rule);
  }
  svg{ display:block; width:100%; height:auto; background: var(--sky-top); }

  .caption-row{
    width:100%;
    max-width: 1180px;
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 22px;
  }
  .caption{
    padding: 16px 20px;
    border-top: 1px solid var(--rule);
    font-family: "Helvetica Neue", Arial, sans-serif;
  }
  .caption .who{
    font-family: "Noto Serif TC", serif;
    font-size: 19px;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin-bottom: 6px;
  }
  .caption p{
    margin: 0;
    font-size: 14px;
    line-height: 1.7;
    opacity: 0.72;
    max-width: 46ch;
  }

  @media (max-width: 640px){
    .caption-row{ grid-template-columns: 1fr; }
    header{ flex-direction: column; align-items:flex-start; }
    .meta{ text-align:left; }
  }

  @media (prefers-reduced-motion: no-preference){
    .cloud{ animation: drift 46s linear infinite; }
    .cloud.c2{ animation-duration: 62s; animation-direction: reverse; }
    .cloud.c3{ animation-duration: 38s; }
    .staff{ transform-origin: 480px 300px; animation: swing 2.6s ease-in-out infinite; }
    .spear{ transform-origin: 660px 320px; animation: thrust 2.6s ease-in-out infinite; }
    .sun-glow{ animation: pulse 5s ease-in-out infinite; }
    .hammer-arm{ transform-origin: 940px 360px; animation: hammer 1.4s ease-in-out infinite; }
  }
  @keyframes drift{ from{ transform: translateX(-40px);} to{ transform: translateX(40px);} }
  @keyframes swing{ 0%,100%{ transform: rotate(-8deg);} 50%{ transform: rotate(14deg);} }
  @keyframes thrust{ 0%,100%{ transform: rotate(6deg) translateX(0);} 50%{ transform: rotate(-4deg) translateX(-10px);} }
  @keyframes pulse{ 0%,100%{ opacity: 0.55;} 50%{ opacity: 0.85;} }
  @keyframes hammer{ 0%,100%{ transform: rotate(-18deg);} 50%{ transform: rotate(10deg);} }
</style>

<header>
  <h1><small>清晨・兩景</small>山頭對決 · 空地築屋</h1>
  <div class="meta">
    孫悟空 vs 哪吒　·　金箍棒對戰三尖槍<br/>
    黑樂　·　晨光下起厝
  </div>
</header>

<div class="frame">
<svg viewBox="0 0 1180 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc">
  <title id="ttl">孫悟空與哪吒在山頭打鬥，黑樂在空地蓋房子</title>
  <desc id="desc">左側山頭上，孫悟空持金箍棒與持槍的哪吒對打；右側平地上，黑樂正在晨光中蓋房子。</desc>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b2f63"/>
      <stop offset="42%" stop-color="#a1477a"/>
      <stop offset="75%" stop-color="#ff9a5a"/>
      <stop offset="100%" stop-color="#ffd9a0"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff3d0"/>
      <stop offset="55%" stop-color="#ffd464"/>
      <stop offset="100%" stop-color="#ffd464" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mtnFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a5a8c"/>
      <stop offset="100%" stop-color="#4a3d68"/>
    </linearGradient>
    <linearGradient id="mtnNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a3a63"/>
      <stop offset="100%" stop-color="#2a2038"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a06a"/>
      <stop offset="100%" stop-color="#8a6a44"/>
    </linearGradient>
    <linearGradient id="staffGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8a5a1e"/>
      <stop offset="50%" stop-color="#ffd464"/>
      <stop offset="100%" stop-color="#8a5a1e"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1180" height="640" fill="url(#sky)"/>
  <circle class="sun-glow" cx="600" cy="330" r="220" fill="url(#sun)"/>
  <circle cx="600" cy="330" r="46" fill="#fff3d0"/>

  <!-- clouds -->
  <g opacity="0.5" fill="#ffe9c7">
    <ellipse class="cloud" cx="180" cy="150" rx="90" ry="16"/>
    <ellipse class="cloud" cx="230" cy="140" rx="60" ry="12"/>
    <ellipse class="cloud c2" cx="880" cy="120" rx="110" ry="18"/>
    <ellipse class="cloud c2" cx="950" cy="110" rx="70" ry="14"/>
    <ellipse class="cloud c3" cx="1050" cy="200" rx="70" ry="12"/>
  </g>

  <!-- far mountains spanning both scenes -->
  <path d="M0,420 L120,300 L230,390 L340,250 L470,400 L600,300 L730,410 L860,260 L980,400 L1100,320 L1180,400 L1180,640 L0,640 Z" fill="url(#mtnFar)" opacity="0.7"/>

  <!-- divider mist -->
  <rect x="555" y="0" width="70" height="640" fill="#ffd9a0" opacity="0.06"/>

  <!-- ============ LEFT SCENE: mountain duel ============ -->
  <g id="left-scene">
    <path d="M-20,460 L150,180 L260,300 L390,140 L520,420 L610,470 L610,640 L-20,640 Z" fill="url(#mtnNear)"/>
    <path d="M-20,460 L150,180 L200,220 L260,300 L235,330 Z" fill="#5c4a7a" opacity="0.5"/>
    <!-- pine trees -->
    <g fill="var(--pine-dark)">
      <path d="M70,460 L95,410 L120,460 Z"/>
      <path d="M78,478 L95,438 L112,478 Z"/>
      <path d="M470,460 L495,415 L520,460 Z"/>
    </g>
    <!-- fighting platform rock -->
    <ellipse cx="480" cy="470" rx="180" ry="26" fill="#2a2038" opacity="0.6"/>

    <!-- Nezha (right fighter in left scene) -->
    <g transform="translate(600,300)">
      <!-- fire wheels -->
      <circle cx="-8" cy="118" r="20" fill="none" stroke="#ff8a3d" stroke-width="4" opacity="0.85"/>
      <circle cx="34" cy="118" r="20" fill="none" stroke="#ff8a3d" stroke-width="4" opacity="0.85"/>
      <!-- legs -->
      <path d="M2,60 L-8,110 M22,60 L34,110" stroke="var(--nezha)" stroke-width="10" stroke-linecap="round"/>
      <!-- ribbons -->
      <path d="M-10,20 Q-40,10 -55,35 Q-30,30 -20,45" fill="none" stroke="#ff6b6b" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
      <path d="M34,25 Q64,18 76,42 Q50,34 42,50" fill="none" stroke="#ff6b6b" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
      <!-- torso -->
      <path d="M-6,10 Q12,-2 30,10 L26,62 Q12,72 0,62 Z" fill="var(--nezha)"/>
      <!-- head -->
      <circle cx="12" cy="-6" r="16" fill="#f6c9a0"/>
      <path d="M-2,-16 Q12,-30 26,-16 Q20,-20 12,-20 Q4,-20 -2,-16Z" fill="#241a2e"/>
      <circle cx="12" cy="-24" r="5" fill="#ff6b6b"/>
      <!-- arm + spear -->
      <g class="spear">
        <path d="M20,10 L60,-8" stroke="var(--nezha)" stroke-width="9" stroke-linecap="round"/>
        <line x1="55" y1="-10" x2="140" y2="-46" stroke="#d9cdb0" stroke-width="5"/>
        <path d="M132,-56 L150,-40 L134,-30 L120,-46 Z" fill="#c7ccd4"/>
      </g>
      <path d="M-8,14 L-40,32" stroke="var(--nezha)" stroke-width="9" stroke-linecap="round"/>
    </g>

    <!-- Sun Wukong (left fighter) -->
    <g transform="translate(430,315)">
      <!-- legs -->
      <path d="M0,58 L-10,112 M20,58 L30,110" stroke="#a8331f" stroke-width="10" stroke-linecap="round"/>
      <!-- tiger-skin skirt -->
      <path d="M-14,44 L34,44 L28,64 L-8,64 Z" fill="#e8b13a"/>
      <!-- torso -->
      <path d="M-10,4 Q10,-8 28,4 L24,50 Q10,60 -4,50 Z" fill="var(--wukong)"/>
      <!-- tail -->
      <path d="M-10,40 Q-34,44 -30,20" fill="none" stroke="#7a5230" stroke-width="6" stroke-linecap="round"/>
      <!-- head -->
      <circle cx="8" cy="-14" r="16" fill="#c98a56"/>
      <path d="M-6,-14 Q0,-24 -14,-18" stroke="#c98a56" stroke-width="5" stroke-linecap="round" fill="none"/>
      <path d="M22,-14 Q28,-24 34,-18" stroke="#c98a56" stroke-width="5" stroke-linecap="round" fill="none"/>
      <!-- headband -->
      <path d="M-6,-22 Q8,-30 22,-22" stroke="#c62b2b" stroke-width="4" fill="none"/>
      <circle cx="8" cy="-26" r="3" fill="#ffd464"/>
      <!-- staff arms -->
      <g class="staff">
        <path d="M14,6 L60,-30" stroke="var(--wukong)" stroke-width="9" stroke-linecap="round"/>
        <line x1="-30" y1="70" x2="150" y2="-90" stroke="url(#staffGrad)" stroke-width="10" stroke-linecap="round"/>
        <circle cx="-30" cy="70" r="8" fill="#ffd464"/>
        <circle cx="150" cy="-90" r="8" fill="#ffd464"/>
      </g>
      <path d="M-4,10 L-30,26" stroke="var(--wukong)" stroke-width="9" stroke-linecap="round"/>
    </g>

    <!-- impact burst -->
    <g transform="translate(520,270)" opacity="0.9">
      <path d="M0,-26 L8,-6 L28,-10 L12,6 L20,26 L0,12 L-20,26 L-12,6 L-28,-10 L-8,-6 Z" fill="#ffe9a8"/>
    </g>
  </g>

  <!-- ============ RIGHT SCENE: house building ============ -->
  <g id="right-scene">
    <rect x="610" y="470" width="570" height="170" fill="url(#ground)"/>
    <path d="M610,470 Q900,450 1180,472 L1180,640 L610,640 Z" fill="#7a5c38" opacity="0.5"/>

    <!-- foundation / low walls -->
    <rect x="820" y="470" width="220" height="70" fill="#c9b48a" stroke="#7a6a44" stroke-width="3"/>
    <rect x="820" y="470" width="220" height="12" fill="#e8d9b0"/>
    <!-- door gap -->
    <rect x="900" y="500" width="40" height="40" fill="#3c2f55" opacity="0.55"/>

    <!-- roof frame being built -->
    <path d="M810,470 L930,400 L1050,470" fill="none" stroke="#7a5230" stroke-width="8" stroke-linecap="round"/>
    <line x1="850" y1="452" x2="850" y2="470" stroke="#7a5230" stroke-width="6"/>
    <line x1="1010" y1="452" x2="1010" y2="470" stroke="#7a5230" stroke-width="6"/>
    <line x1="930" y1="400" x2="930" y2="470" stroke="#7a5230" stroke-width="6"/>

    <!-- material stack -->
    <g fill="#a9884f">
      <rect x="700" y="520" width="70" height="14" rx="3"/>
      <rect x="700" y="536" width="70" height="14" rx="3"/>
      <rect x="700" y="552" width="70" height="14" rx="3"/>
    </g>
    <rect x="1060" y="530" width="60" height="60" fill="#8a6a44" opacity="0.85"/>
    <line x1="1060" y1="545" x2="1120" y2="545" stroke="#5c4527" stroke-width="3"/>
    <line x1="1060" y1="560" x2="1120" y2="560" stroke="#5c4527" stroke-width="3"/>
    <line x1="1060" y1="575" x2="1120" y2="575" stroke="#5c4527" stroke-width="3"/>

    <!-- ladder -->
    <g stroke="#7a5230" stroke-width="5" stroke-linecap="round">
      <line x1="950" y1="470" x2="925" y2="400"/>
      <line x1="975" y1="470" x2="950" y2="400"/>
      <line x1="944" y1="450" x2="964" y2="443"/>
      <line x1="936" y1="425" x2="956" y2="418"/>
    </g>

    <!-- 黑樂 figure on the roof frame, mid-hammer -->
    <g transform="translate(930,415)">
      <path d="M-4,10 L-10,38 M8,10 L14,38" stroke="#1e1e1e" stroke-width="9" stroke-linecap="round"/>
      <path d="M-8,-14 Q6,-24 20,-14 L16,14 Q4,22 -6,14 Z" fill="var(--heiye)"/>
      <circle cx="4" cy="-24" r="13" fill="#e0b088"/>
      <rect x="-8" y="-38" width="24" height="9" rx="2" fill="#c96a2e"/>
      <g class="hammer-arm">
        <path d="M12,-10 L34,-24" stroke="var(--heiye)" stroke-width="8" stroke-linecap="round"/>
        <rect x="30" y="-32" width="16" height="10" rx="2" fill="#7c7391"/>
        <line x1="34" y1="-24" x2="42" y2="-4" stroke="#7a5230" stroke-width="5"/>
      </g>
      <path d="M-4,-6 L-22,10" stroke="var(--heiye)" stroke-width="8" stroke-linecap="round"/>
    </g>

    <!-- little sparks from hammering -->
    <g stroke="#ffd464" stroke-width="3" stroke-linecap="round" opacity="0.8">
      <line x1="960" y1="392" x2="968" y2="386"/>
      <line x1="958" y1="398" x2="970" y2="398"/>
    </g>

    <!-- birds for calm morning -->
    <g stroke="var(--label)" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round">
      <path d="M700,120 q10,-10 20,0 q10,-10 20,0"/>
      <path d="M760,150 q8,-8 16,0 q8,-8 16,0"/>
    </g>
  </g>

  <!-- ground line -->
  <line x1="0" y1="470" x2="1180" y2="470" stroke="var(--rule)" stroke-width="1"/>
</svg>
</div>

<div class="caption-row">
  <div class="caption">
    <div class="who">孫悟空 × 哪吒　·　山頭對決</div>
    <p>金箍棒橫掃，三尖兩刃槍疾刺——晨曦未散，兩人已在峰頭交手數回合，雲氣被打得四散。</p>
  </div>
  <div class="caption">
    <div class="who">黑樂　·　空地築屋</div>
    <p>另一頭的平地上，黑樂踩著梯子，一早就爬上屋梁釘樑，磚木材料整齊堆在一旁，準備趕在日出前把屋架立起來。</p>
  </div>
</div>
