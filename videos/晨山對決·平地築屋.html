<style>

    --label:#241a2e;

      --paper:#fdf3e2;

      --rule: rgba(36,26,46,0.18);
    }
  }
  :root[data-theme="dark"]{
    --paper:#1c1626;
    --label:#f4e6c8;
    --rule: rgba(244,230,200,0.28);
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--paper);
    color: var(--label);
    font-family: "Noto Serif TC", "Songti TC", "PMingLiU", serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: clamp(20px, 4vw, 48px) clamp(16px, 4vw, 48px) 56px;
    min-height:100vh;
  }

  header{
    width:100%;
    max-width: 1180px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap: 24px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  h1{
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 700;
    letter-spacing: 0.04em;
    margin: 0;
    text-wrap: balance;
    line-height: 1.25;
  }
  h1 small{
    display:block;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    opacity: 0.55;
    margin-bottom: 8px;
  }
  .meta{
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 13px;
    letter-spacing: 0.06em;
    opacity: 0.65;
    text-align: right;
    line-height: 1.9;
    white-space: nowrap;
  }

  .frame{
    width:100%;
    max-width: 1180px;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 30px 70px -30px rgba(20,10,30,0.55);
    border: 1px solid var(--rule);
  }
  svg{ display:block; width:100%; height:auto; background: var(--sky-top); }

  .caption-row{
    width:100%;
    max-width: 1180px;
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 22px;
  }
  .caption{
    padding: 16px 20px;
    border-top: 1px solid var(--rule);
    font-family: "Helvetica Neue", Arial, sans-serif;
  }
  .caption .who{
    font-family: "Noto Serif TC", serif;
    font-size: 19px;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin-bottom: 6px;
  }
  .caption p{
    margin: 0;
    font-size: 14px;
    line-height: 1.7;
    opacity: 0.72;
    max-width: 46ch;
  }

  @media (max-width: 640px){
    .caption-row{ grid-template-columns: 1fr; }
    header{ flex-direction: column; align-items:flex-start; }
    .meta{ text-align:left; }
  }

  @media (prefers-reduced-motion: no-preference){
    .cloud{ animation: drift 46s linear infinite; }
    .cloud.c2{ animation-duration: 62s; animation-direction: reverse; }
    .cloud.c3{ animation-duration: 38s; }
    .staff{ transform-origin: 480px 300px; animation: swing 2.6s ease-in-out infinite; }
    .spear{ transform-origin: 660px 320px; animation: thrust 2.6s ease-in-out infinite; }
    .sun-glow{ animation: pulse 5s ease-in-out infinite; }
    .hammer-arm{ transform-origin: 940px 360px; animation: hammer 1.4s ease-in-out infinite; }

  @keyframes swing{ 0%,100%{ transform: rotate(-8deg);} 50%{ transform: rotate(14deg);} }
  @keyframes thrust{ 0%,100%{ transform: rotate(6deg) translateX(0);} 50%{ transform: rotate(-4deg) translateX(-10px);} }
  @keyframes pulse{ 0%,100%{ opacity: 0.55;} 50%{ opacity: 0.85;} }
  @keyframes hammer{ 0%,100%{ transform: rotate(-18deg);} 50%{ transform: rotate(10deg);} }
</style>

  ping(K+"-p"); ping("site-total-plays");
  /* 投票鈕：非常好玩/好玩——與作品館同一計數器，任何網頁打開都同步 */
  function initVotes(){
    if(!document.body) return;
    var wrap=document.createElement("div");
    wrap.style.cssText="position:fixed;right:10px;bottom:10px;z-index:99999;display:flex;gap:6px;font-family:sans-serif;opacity:.92";
    var LS="voted-"+K;
    var defs=[["-love","\u2764\uFE0F","\u975e\u5e38\u597d\u73a9","#ff6cc7"],["-like","\ud83d\udc4d","\u597d\u73a9","#38e1ff"]];
    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;
          b.querySelector("i").textContent=Math.max(0,(n||0)-(c||0));
        }); });
      });
    }
    defs.forEach(function(d){
      var b=document.createElement("button");
      b.type="button"; b.title=d[2];
      b.style.cssText="min-height:42px;padding:8px 14px;border:none;border-radius:999px;background:rgba(15,18,32,.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation";
      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";
      b.addEventListener("click",function(){
        var prev=null; try{ prev=localStorage.getItem(LS); }catch(e){}
        if(prev===d[0]){ ping(K+d[0]+"-c"); try{ localStorage.removeItem(LS); }catch(e){} }
        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);
      });
      btns[d[0]]=b; wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    refresh();
    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* 每10秒同步別人投的票 */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
</script>
