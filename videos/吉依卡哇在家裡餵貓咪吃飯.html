<html lang="zh-Hant">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吉依卡哇在家裡餵貓咪吃飯</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #ffe9d6 0%, #ffd6c9 40%, #f4c9a8 100%);
    font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
    overflow: hidden;
  }

  .room {
    position: relative;
    width: 720px;
    max-width: 95vw;
    height: 480px;
    background:
      linear-gradient(180deg, #fbe3c9 0%, #fbe3c9 65%, #e8b98a 65%, #e8b98a 100%);
    border-radius: 24px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    overflow: hidden;
  }

  .title {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 20px;
    font-weight: bold;
    color: #7a4b2b;
    letter-spacing: 2px;
    text-shadow: 0 1px 0 rgba(255,255,255,0.6);
    z-index: 5;
  }

  /* window */
  .window {
    position: absolute;
    top: 40px;
    right: 60px;
    width: 120px;
    height: 100px;
    background: linear-gradient(180deg,#bfe6ff,#e9f8ff);
    border: 8px solid #d99e6b;
    border-radius: 10px;
  }
  .window::before, .window::after {
    content: "";
    position: absolute;
    background: #d99e6b;
  }
  .window::before { top: 50%; left: 0; width: 100%; height: 6px; transform: translateY(-50%); }
  .window::after { left: 50%; top: 0; height: 100%; width: 6px; transform: translateX(-50%); }
  .cloud { position: absolute; background: #fff; border-radius: 50px; opacity: .9; }
  .cloud1 { width: 30px; height: 12px; top: 20px; left: 15px; }
  .cloud2 { width: 20px; height: 10px; top: 45px; left: 55px; }

  /* rug */
  .rug {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 260px;
    height: 90px;
    background: #f6a66b;
    border-radius: 50%;
    box-shadow: inset 0 0 0 8px #fff4e0, inset 0 0 0 16px #f6a66b;
  }

  /* character 吉依卡哇 */
  .character {
    position: absolute;
    bottom: 78px;
    left: 29%;
    width: 130px;
    height: 170px;
    animation: sway 2.6s ease-in-out infinite;
    transform-origin: bottom center;
  }
  @keyframes sway {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(1.5deg); }
  }
  .char-hair-back {
    position: absolute;
    top: 18px; left: 15px;
    width: 100px; height: 110px;
    background: #4a3325;
    border-radius: 50% 50% 45% 45%;
  }
  .char-head {
    position: absolute;
    top: 22px; left: 25px;
    width: 80px; height: 78px;
    background: #ffe0c2;
    border-radius: 50%;
  }
  .char-hair-front {
    position: absolute;
    top: 14px; left: 20px;
    width: 90px; height: 46px;
    background: #4a3325;
    border-radius: 50% 50% 60% 60% / 60% 60% 40% 40%;
  }
  .char-hair-front::before, .char-hair-front::after {
    content: "";
    position: absolute;
    top: 30px;
    width: 14px; height: 34px;
    background: #4a3325;
    border-radius: 0 0 10px 10px;
  }
  .char-hair-front::before { left: 6px; }
  .char-hair-front::after { right: 6px; }
  .char-eye { position: absolute; top: 54px; width: 7px; height: 10px; background: #3a2a1e; border-radius: 50%; animation: blink 4s infinite; }
  .char-eye.left { left: 42px; }
  .char-eye.right { left: 68px; }
  @keyframes blink { 0%, 92%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
  .char-cheek { position: absolute; top: 66px; width: 10px; height: 6px; background: #ffb1a3; border-radius: 50%; opacity: .8; }
  .char-cheek.left { left: 34px; }
  .char-cheek.right { left: 74px; }
  .char-smile { position: absolute; top: 72px; left: 55px; width: 14px; height: 7px; border-bottom: 3px solid #a85c3e; border-radius: 50%; }

  .char-body {
    position: absolute;
    top: 92px; left: 15px;
    width: 100px; height: 80px;
    background: #ff9a8b;
    border-radius: 45% 45% 30% 30%;
  }
  .char-body::before {
    content: "";
    position: absolute;
    top: 6px; left: 30px;
    width: 40px; height: 20px;
    background: #ffd166;
    border-radius: 40%;
  }

  .char-arm {
    position: absolute;
    top: 110px; left: 60px;
    width: 55px; height: 16px;
    background: #ff9a8b;
    border-radius: 10px;
    transform-origin: left center;
    animation: pour 2.2s ease-in-out infinite;
  }
  @keyframes pour {
    0%, 40% { transform: rotate(0deg); }
    55% { transform: rotate(-28deg); }
    75% { transform: rotate(-28deg); }
    100% { transform: rotate(0deg); }
  }
  .char-hand {
    position: absolute;
    top: -6px; left: 42px;
    width: 18px; height: 18px;
    background: #ffe0c2;
    border-radius: 50%;
  }

  /* food bag held in hand */
  .food-bag {
    position: absolute;
    top: -26px; left: 34px;
    width: 26px; height: 34px;
    background: #ffd166;
    border-radius: 4px 4px 10px 10px;
    box-shadow: inset 0 0 0 2px #e0a83a;
  }
  .food-bag::before {
    content: "🐟";
    position: absolute;
    top: 6px; left: 4px;
    font-size: 12px;
  }

  /* falling kibble */
  .kibble {
    position: absolute;
    width: 5px; height: 5px;
    background: #c98a4b;
    border-radius: 50%;
    left: 96px;
    top: 128px;
    opacity: 0;
    animation: fall 2.2s ease-in infinite;
  }
  .kibble:nth-child(2) { animation-delay: .1s; left: 100px; }
  .kibble:nth-child(3) { animation-delay: .2s; left: 92px; }
  @keyframes fall {
    0%, 45% { opacity: 0; transform: translate(0,0); }
    55% { opacity: 1; transform: translate(6px, 40px); }
    70% { opacity: 1; transform: translate(10px, 70px); }
    75%, 100% { opacity: 0; transform: translate(10px, 74px); }
  }

  /* bowl */
  .bowl {
    position: absolute;
    bottom: 66px;
    left: 49%;
    width: 70px;
    height: 26px;
    background: linear-gradient(180deg,#8fd3ff,#5bb3e8);
    border-radius: 0 0 35px 35px;
    box-shadow: 0 4px 0 #3d8bc4;
  }
  .bowl::before {
    content: "";
    position: absolute;
    top: -6px; left: -4px;
    width: 78px; height: 12px;
    background: #a9def0;
    border-radius: 50%;
  }
  .kibble-pile {
    position: absolute;
    bottom: 78px;
    left: 49.5%;
    width: 60px;
    height: 10px;
    background: #c98a4b;
    border-radius: 50%;
    box-shadow: 4px -3px 0 -1px #b87a3d, -4px -2px 0 -1px #b87a3d, 8px 1px 0 -2px #a86c34;
  }

  /* cat */
  .cat {
    position: absolute;
    bottom: 72px;
    left: 55%;
    width: 90px;
    height: 60px;
    animation: eat 1.4s ease-in-out infinite;
    transform-origin: bottom center;
  }
  @keyframes eat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(3px) rotate(-3deg); }
  }
  .cat-body {
    position: absolute;
    bottom: 0; left: 10px;
    width: 60px; height: 38px;
    background: #f2a13a;
    border-radius: 50% 50% 40% 40%;
  }
  .cat-head {
    position: absolute;
    bottom: 22px; left: -6px;
    width: 42px; height: 38px;
    background: #f2a13a;
    border-radius: 50%;
  }
  .cat-ear { position: absolute; bottom: 50px; width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 14px solid #f2a13a; }
  .cat-ear.left { left: -4px; transform: rotate(-15deg); }
  .cat-ear.right { left: 20px; transform: rotate(15deg); }
  .cat-stripe { position: absolute; background: #d6822a; border-radius: 2px; }
  .cat-stripe.s1 { width: 14px; height: 4px; bottom: 44px; left: 4px; transform: rotate(-20deg); }
  .cat-stripe.s2 { width: 14px; height: 4px; bottom: 12px; left: 20px; }
  .cat-tail {
    position: absolute;
    bottom: 10px; left: 62px;
    width: 34px; height: 8px;
    background: #f2a13a;
    border-radius: 10px;
    transform-origin: left center;
    animation: wag 1s ease-in-out infinite;
  }
  @keyframes wag {
    0%, 100% { transform: rotate(10deg); }
    50% { transform: rotate(-15deg); }
  }
  .cat-face { position: absolute; bottom: 34px; left: 4px; width: 30px; height: 16px; }
  .cat-eye { position: absolute; top: 2px; width: 3px; height: 4px; background: #3a2a1e; border-radius: 50%; }
  .cat-eye.left { left: 4px; }
  .cat-eye.right { left: 20px; }
  .cat-nose { position: absolute; top: 8px; left: 12px; width: 4px; height: 3px; background: #c9612e; border-radius: 50%; }

  /* big-ear dog dancing */
  .dog {
    position: absolute;
    bottom: 78px;
    left: 73%;
    width: 90px;
    height: 130px;
    animation: dance 1s ease-in-out infinite;
    transform-origin: bottom center;
  }
  @keyframes dance {
    0%, 100% { transform: rotate(-10deg) translateY(0); }
    25% { transform: rotate(6deg) translateY(-4px); }
    50% { transform: rotate(-10deg) translateY(-10px); }
    75% { transform: rotate(6deg) translateY(-4px); }
  }
  .dog-ear {
    position: absolute;
    top: -18px;
    width: 26px;
    height: 60px;
    background: #ffffff;
    border: 2px solid #dfeaf5;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    transform-origin: top center;
  }
  .dog-ear.left { left: 6px; transform: rotate(-18deg); animation: earFlop 1s ease-in-out infinite; }
  .dog-ear.right { right: 6px; transform: rotate(18deg); animation: earFlop 1s ease-in-out infinite reverse; }
  @keyframes earFlop {
    0%, 100% { transform: rotate(-18deg); }
    50% { transform: rotate(20deg); }
  }
  .dog-head {
    position: absolute;
    top: 10px; left: 15px;
    width: 60px; height: 56px;
    background: #ffffff;
    border: 2px solid #dfeaf5;
    border-radius: 50%;
  }
  .dog-eye { position: absolute; top: 24px; width: 5px; height: 6px; background: #3a2a1e; border-radius: 50%; }
  .dog-eye.left { left: 22px; }
  .dog-eye.right { left: 42px; }
  .dog-cheek { position: absolute; top: 34px; width: 8px; height: 6px; background: #ffd7e0; border-radius: 50%; }
  .dog-cheek.left { left: 14px; }
  .dog-cheek.right { left: 48px; }
  .dog-nose { position: absolute; top: 32px; left: 33px; width: 6px; height: 5px; background: #7fb8e0; border-radius: 50%; }
  .dog-body {
    position: absolute;
    top: 58px; left: 20px;
    width: 50px; height: 50px;
    background: #ffffff;
    border: 2px solid #dfeaf5;
    border-radius: 45%;
  }
  .dog-arm {
    position: absolute;
    top: 62px;
    width: 12px; height: 34px;
    background: #ffffff;
    border: 2px solid #dfeaf5;
    border-radius: 10px;
    transform-origin: top center;
  }
  .dog-arm.left { left: 6px; animation: armSwing 1s ease-in-out infinite; }
  .dog-arm.right { right: 6px; animation: armSwing 1s ease-in-out infinite reverse; }
  @keyframes armSwing {
    0%, 100% { transform: rotate(-30deg); }
    50% { transform: rotate(40deg); }
  }
  .dog-leg {
    position: absolute;
    top: 104px;
    width: 14px; height: 22px;
    background: #ffffff;
    border: 2px solid #dfeaf5;
    border-radius: 8px;
  }
  .dog-leg.left { left: 20px; }
  .dog-leg.right { left: 44px; }
  .dog-note { position: absolute; font-size: 14px; opacity: 0; animation: floatHeart 1.8s ease-out infinite; }
  .n1 { left: 72%; bottom: 200px; animation-delay: .2s; }
  .n2 { left: 80%; bottom: 190px; animation-delay: .9s; }

  .hearts { position: absolute; font-size: 14px; opacity: 0; animation: floatHeart 2.2s ease-out infinite; }
  .h1 { left: 59%; bottom: 140px; animation-delay: .3s; }
  .h2 { left: 63%; bottom: 150px; animation-delay: 1.1s; }
  @keyframes floatHeart {
    0% { opacity: 0; transform: translateY(0) scale(.6); }
    20% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-40px) scale(1.1); }
  }

  .caption {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    color: #8a5a36;
    opacity: .8;
  }
</style>
</head>

<script>/* AI-CAMP-STATS-BEACON */
(function(){
  try{ if(window.top!==window.self) return; }catch(e){ return; } /* 在作品館內由作品館計數與投票 */
  var NS="ai-future-camp", K="t-07fd10d6";
  var ABS="//abacus.jasoncameron.dev/"; /* 直連備援 */
  var REL="/abacus/"; /* 同源代理（Vercel 轉發）：學校閘道擋外部網域時仍然通 */
  function ping(n){
    try{
      fetch(REL+"hit/"+NS+"/"+n).then(function(r){
        if(!r||!r.ok){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); }
      }).catch(function(){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); });
    }catch(e){}
  }
  function read(n,cb){
    function via(base,next){ try{ fetch(base+"get/"+NS+"/"+n).then(function(r){ if(r.status===404&&base===ABS) return {value:0}; if(!r.ok) throw 0; return r.json(); }).then(function(j){ cb(j.value||j.count||0); }).catch(next); }catch(e){ next(); } }
    via(REL, function(){ via(ABS, function(){ cb(null); }); });
  }
  ping(K+"-v");
  ping(K+"-p"); ping("site-total-plays");
  /* 投票鈕：非常好玩/好玩——與作品館同一計數器，任何網頁打開都同步 */
  function initVotes(){
    if(!document.body) return;
    var wrap=document.createElement("div");
    wrap.style.cssText="position:fixed;right:10px;bottom:10px;z-index:99999;display:flex;gap:6px;font-family:sans-serif;opacity:.92";
    var LS="voted-"+K;
    var defs=[["-love","\u2764\uFE0F","\u975e\u5e38\u597d\u73a9","#ff6cc7"],["-like","\ud83d\udc4d","\u597d\u73a9","#38e1ff"]];
    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;
          b.querySelector("i").textContent=Math.max(0,(n||0)-(c||0));
        }); });
      });
    }
    defs.forEach(function(d){
      var b=document.createElement("button");
      b.type="button"; b.title=d[2];
      b.style.cssText="min-height:42px;padding:8px 14px;border:none;border-radius:999px;background:rgba(15,18,32,.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation";
      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";
      b.addEventListener("click",function(){
        var prev=null; try{ prev=localStorage.getItem(LS); }catch(e){}
        if(prev===d[0]){ ping(K+d[0]+"-c"); try{ localStorage.removeItem(LS); }catch(e){} }
        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);
      });
      btns[d[0]]=b; wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    refresh();
    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* 每10秒同步別人投的票 */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
</script>
<script>/* AI-CAMP-VIDEO-CONTROLS */
(function(){
  var ORAF=window.requestAnimationFrame.bind(window), OST=window.setTimeout.bind(window), OSI=window.setInterval.bind(window);
  var realNow=performance.now.bind(performance), D0=Date.now(), P0=realNow();
  var acc=0, lastReal=P0, paused=false, speed=1;
  function vnow(){ var r=realNow(); if(!paused){ acc+=(r-lastReal)*speed; } lastReal=r; return acc; }
  try{ performance.now=function(){ return vnow(); }; }catch(e){}
  try{ Date.now=function(){ return D0+Math.round(vnow()); }; }catch(e){}

  window.setTimeout=function(fn,ms){ var a=[].slice.call(arguments,2);
    return OST(function f(){ if(paused){ OST(f,120); } else if(typeof fn==="function"){ fn.apply(null,a); } },ms); };
  window.setInterval=function(fn,ms){ var a=[].slice.call(arguments,2);
    return OSI(function(){ if(!paused&&typeof fn==="function"){ fn.apply(null,a); } },ms); };
  var ctxs=[];
  ["AudioContext","webkitAudioContext"].forEach(function(n){
    var C=window[n]; if(!C) return;
    var W=function(){ var c=new (Function.prototype.bind.apply(C,[null].concat([].slice.call(arguments))))(); ctxs.push(c); return c; };
    W.prototype=C.prototype; window[n]=W;
  });
  function setPaused(p){
    vnow(); paused=p;

    [].forEach.call(document.querySelectorAll("audio,video"),function(m){ try{ p?m.pause():m.play(); }catch(e){} });

    var bPlay=mkbtn("\u23F8","\u66AB\u505C/\u7E7C\u7E8C");

    bPlay.addEventListener("click",function(){ setPaused(!paused); bPlay.textContent=paused?"\u25B6":"\u23F8"; });
    bRe.addEventListener("click",function(){ location.reload(); });
    var speeds=[1,2,0.5];
    bSp.addEventListener("click",function(){ vnow(); speed=speeds[(speeds.indexOf(speed)+1)%speeds.length]; bSp.textContent=(speed===0.5?"0.5":speed)+"x"; });
    bar.appendChild(bPlay); bar.appendChild(bRe); bar.appendChild(bSp); bar.appendChild(tEl);
    document.body.appendChild(bar);
    (function upd(){ tEl.textContent=fmt(vnow()); OST(upd,500); })();
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",init); else init();
})();
</script>
