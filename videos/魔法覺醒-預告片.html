<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="author" content="AI未來創作營隊">
<title>魔法覺醒 遊戲介紹</title>
<style>
  :root{ --cyan:#38e1ff; --blue:#4f7cff; --purple:#9a6bff; --pink:#ff6cc7; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #070b14;
    font-family: "PingFang TC","Microsoft JhengHei",sans-serif;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  #wrap{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; background:#070b14; }

  /* ---- 完全比照遊戲本體的畫面元件（同款 class/樣式）---- */
  .ui-layer{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; z-index:5; opacity:0; transition:opacity .35s; }
  .ui-layer.show{ opacity:1; }
  .panel{
    background:rgba(10,14,26,0.86);
    border:1px solid rgba(56,225,255,0.35);
    border-radius:20px;
    padding:28px 30px;
    max-width:min(92vw,480px);
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  .title-grad{
    font-size:clamp(28px,7vw,42px);
    font-weight:900;
    background:linear-gradient(92deg,var(--cyan),var(--blue),var(--purple));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    margin:0 0 6px; letter-spacing:2px;
  }
  .subtitle{ color:#9db3d8; font-size:14px; margin:0 0 18px; line-height:1.6; }
  .row{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin:14px 0; }
  .choice-btn{
    width:96px; min-height:96px; border-radius:16px;
    border:2px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.04);
    color:#fff; font-size:12px; font-weight:700;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    transition:transform .15s, border-color .15s, background .15s;
  }
  .choice-btn.sel{ transform:translateY(-4px) scale(1.06); border-color:var(--cyan); background:rgba(56,225,255,0.14); }
  .choice-btn canvas{ width:40px; height:40px; }
  .choice-btn .cname{ font-size:12px; font-weight:900; }
  .choice-btn .cmagic{ font-size:10px; font-weight:700; opacity:0.85; }
  .btn{
    display:inline-block; margin-top:14px; padding:14px 30px; border-radius:14px; border:none;
    background:linear-gradient(92deg,var(--cyan),var(--blue));
    color:#04121c; font-weight:900; font-size:17px;
    box-shadow:0 8px 24px rgba(56,225,255,0.35);
  }
  .hint{ font-size:12px; color:#7488a8; margin-top:14px; line-height:1.7; }
  .pet-btn{
    width:66px; min-height:76px; border-radius:12px;
    border:2px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.04);
    color:#fff; font-size:10px; font-weight:700;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    transition:transform .15s, border-color .15s, background .15s, opacity .2s;
    opacity:0.4;
  }
  .pet-btn.sel{ opacity:1; transform:translateY(-3px) scale(1.06); border-color:#ffcf5c; background:rgba(255,207,92,0.16); box-shadow:0 0 12px rgba(255,207,92,0.45); }
  .pet-btn .picon{ font-size:24px; }
  .pet-desc{ color:#dfe9ff; font-size:15px; font-weight:800; margin-top:10px; min-height:20px; }

  #hud{
    position:absolute; top:0; left:0; right:0; padding:10px 14px;
    display:flex; justify-content:space-between; align-items:flex-start;
    z-index:4; font-weight:800; color:#fff; font-size:14px; opacity:0; transition:opacity .35s;
  }
  #hud.show{ opacity:1; }
  #hpbar{ width:130px; height:14px; border-radius:8px; background:rgba(255,255,255,0.15); overflow:hidden; border:1px solid rgba(255,255,255,0.25); }
  #hpfill{ height:100%; width:100%; background:linear-gradient(90deg,#ff6cc7,#ff3b6b); }
  #hudLeft{ display:flex; flex-direction:column; gap:6px; }
  #hudRight{ text-align:right; display:flex; flex-direction:column; gap:4px; margin-top:56px; margin-right:2px; }

  #skillBar{
    position:absolute; left:50%; bottom:14px; transform:translateX(-50%);
    z-index:4; display:flex; flex-direction:row; align-items:flex-end; gap:10px;
    opacity:0; transition:opacity .35s;
  }
  #skillBar.show{ opacity:1; }
  .skillSlot{ display:flex; flex-direction:column; align-items:center; gap:3px; }
  .skillIconWrap{
    width:54px; height:54px; border-radius:14px;
    background:rgba(10,14,26,0.75); border:2px solid rgba(255,255,255,0.25);
    position:relative; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    font-size:24px; box-shadow:0 6px 18px rgba(0,0,0,0.4);
  }
  .skillIconWrap.ready{ border-color:#ffcf5c; box-shadow:0 0 16px rgba(255,207,92,0.6); }
  .skillLabel{ font-size:10px; color:#dfe9ff; font-weight:700; text-align:center; max-width:64px; }

  #soundBtn {
    position: fixed; top: 12px; right: 12px; z-index: 20;
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(15,20,35,0.7); border: 1px solid rgba(56,225,255,0.5);
    color: #dfe9ff; font-size: 20px; cursor: pointer;
  }
  #soundHint {
    position: fixed; top: 18px; right: 68px; z-index: 20;
    color: #dfe9ff; font-size: 14px; text-shadow: 0 0 4px #000;
    animation: hintFade 3.2s ease forwards;
    pointer-events: none;
  }
  @keyframes hintFade { 0%{opacity:0} 15%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
  #replayBtn {
    position: fixed; left: 50%; bottom: 12%; transform: translateX(-50%);
    z-index: 20; display: none;
    padding: 14px 42px; font-size: 20px; min-height: 48px;
    background: linear-gradient(92deg,#38e1ff,#4f7cff);
    color: #04121c; font-weight: 900;
    border: none; border-radius: 10px; cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>
<button id="soundBtn">🔇</button>
<div id="soundHint">點聲音鈕開啟音效 🎧 建議戴耳機</div>
<button id="replayBtn">重新播放</button>

<div id="wrap">
  <canvas id="stage"></canvas>

  <div id="hud">
    <div id="hudLeft">
      <div id="hpbar"><div id="hpfill"></div></div>
      <div id="magicLabel" style="font-size:12px;"></div>
    </div>
    <div id="hudRight">
      <div id="scoreLabel">分數 0</div>
      <div id="waveLabel">第 1 波</div>
    </div>
  </div>

  <div id="skillBar"></div>

  <div class="ui-layer" id="screenStory">
    <div class="panel" style="max-width:min(92vw,560px);">
      <div class="title-grad" style="font-size:20px; letter-spacing:4px;">很久很久以前……</div>
      <p class="subtitle" id="storyText" style="font-size:17px; line-height:2; min-height:88px;"></p>
    </div>
  </div>

  <div class="ui-layer" id="screenTitle">
    <div class="panel" style="max-width:min(94vw,620px);">
      <div class="title-grad">魔法覺醒</div>
      <p class="subtitle">選擇一位角色，每位角色都有專屬魔法技能！</p>
      <div class="row" id="charRow"></div>
      <div class="hint">電腦：WASD／方向鍵移動,魔法自動鎖定最近敵人施放<br>平板：拖曳畫面移動,魔法自動鎖定最近敵人施放</div>
    </div>
  </div>

  <div class="ui-layer" id="screenPets">
    <div class="panel" style="max-width:min(94vw,640px);">
      <div class="title-grad" style="font-size:22px;">選擇寵物（最多 2 隻）</div>
      <p class="subtitle" style="margin-bottom:6px;">十二隻夥伴寵物，各有攻擊／治癒／守護專長</p>
      <div class="row" id="petRow"></div>
      <div class="pet-desc" id="petTypeDesc"></div>
    </div>
  </div>

  <div class="ui-layer" id="screenStage" style="align-items:flex-start; padding-top:8%;">
    <div class="panel" style="max-width:min(94vw,460px); padding:16px 24px; background:rgba(10,14,26,0.72); border-color:rgba(255,255,255,0.2);">
      <div class="title-grad" id="stageName" style="font-size:30px;"></div>
      <p class="subtitle" id="stageBoss" style="margin:0;"></p>
    </div>
  </div>

  <div class="ui-layer" id="screenCTA">
    <div class="panel">
      <div class="title-grad" style="font-size:30px;">魔法覺醒</div>
      <p class="subtitle">六大元素魔法 · 十二隻夥伴寵物 · 四大關卡<br>鍵盤／觸控雙支援 · 立即遊玩</p>
      <button class="btn">開始冒險</button>
    </div>
  </div>
</div>

<script>
'use strict';
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const soundBtn = document.getElementById('soundBtn');
const replayBtn = document.getElementById('replayBtn');
const screenStory = document.getElementById('screenStory');
const storyText = document.getElementById('storyText');
const screenTitle = document.getElementById('screenTitle');
const screenCTA = document.getElementById('screenCTA');
const screenPets = document.getElementById('screenPets');
const screenStage = document.getElementById('screenStage');
const hud = document.getElementById('hud');
const skillBar = document.getElementById('skillBar');
const hpfill = document.getElementById('hpfill');
const magicLabel = document.getElementById('magicLabel');
const scoreLabel = document.getElementById('scoreLabel');
const waveLabel = document.getElementById('waveLabel');
const charRow = document.getElementById('charRow');
const petRow = document.getElementById('petRow');
const petTypeDesc = document.getElementById('petTypeDesc');
const stageName = document.getElementById('stageName');
const stageBoss = document.getElementById('stageBoss');

function resize() {
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
  document.getElementById('wrap').style.width = GAME_W * scale + 'px';
  document.getElementById('wrap').style.height = GAME_H * scale + 'px';
}
addEventListener('resize', resize); resize();

/* ================= 與遊戲本體完全一致的資料表（照抄 games/魔法覺醒.html）================= */
const MAGICS = [
  {key:'fire', name:'烈焰魔法', icon:'🔥', color:'#ff7e3d'},
  {key:'ice', name:'寒冰魔法', icon:'❄️', color:'#38e1ff'},
  {key:'thunder', name:'雷霆魔法', icon:'⚡', color:'#ffe066'},
  {key:'wind', name:'疾風魔法', icon:'🌪️', color:'#7fffb0'},
  {key:'light', name:'聖光魔法', icon:'✨', color:'#ffd9f6'},
  {key:'dark', name:'暗影魔法', icon:'🌑', color:'#9a6bff'},
];
function magicByKey(k){ return MAGICS.find(m=>m.key===k); }
const CHARACTERS = [
  {id:'yan',  name:'小炎', gender:'girl', magicKey:'fire',    outfit:'#ff7e3d', hair:'#8a2b1a'},
  {id:'lan',  name:'小凍', gender:'boy',  magicKey:'ice',     outfit:'#38e1ff', hair:'#1c3a52'},
  {id:'lei',  name:'小雷', gender:'girl', magicKey:'thunder', outfit:'#ffe066', hair:'#7a5c00'},
  {id:'feng', name:'小風', gender:'boy',  magicKey:'wind',    outfit:'#7fffb0', hair:'#245c3a'},
  {id:'guang',name:'小光', gender:'girl', magicKey:'light',   outfit:'#ffd9f6', hair:'#c9a8e0'},
  {id:'ying', name:'小影', gender:'boy',  magicKey:'dark',    outfit:'#9a6bff', hair:'#181022'},
];
const PET_POOL = [
  {id:'p1', icon:'🐉', name:'幼龍',   type:'attack', color:'#ff7e3d'},
  {id:'p2', icon:'🦉', name:'夜梟',   type:'heal',   color:'#7fffb0'},
  {id:'p3', icon:'🦊', name:'靈狐',   type:'guard',  color:'#38e1ff'},
  {id:'p4', icon:'🐺', name:'冰狼',   type:'attack', color:'#8fe3ff'},
  {id:'p5', icon:'🐇', name:'月兔',   type:'heal',   color:'#ffd9f6'},
  {id:'p6', icon:'🐢', name:'龜靈',   type:'guard',  color:'#9db3d8'},
  {id:'p7', icon:'🦄', name:'獨角獸', type:'heal',   color:'#c58bff'},
  {id:'p8', icon:'🐬', name:'海豚',   type:'attack', color:'#38e1ff'},
  {id:'p9', icon:'🐲', name:'雷龍',   type:'attack', color:'#ffe066'},
  {id:'p10',icon:'🐱', name:'黑貓',   type:'guard',  color:'#9a6bff'},
  {id:'p11',icon:'🦋', name:'魂蝶',   type:'heal',   color:'#ff6cc7'},
  {id:'p12',icon:'🦅', name:'蒼鷹',   type:'attack', color:'#ffcf5c'},
];
const PET_TYPE_LABEL = { attack:'攻擊系：追加額外傷害', heal:'治癒系：持續恢復生命', guard:'守護系：抵擋敵人攻擊' };
const STAGES = [
  {name:'新手森林', top:'#1b3a2a', bottom:'#0a1810', bossName:'森林領主', bossColor:'#5d8a4a', bossIcon:'🌳'},
  {name:'熔岩地窟', top:'#3a1410', bottom:'#160705', bossName:'熔岩魔像', bossColor:'#ff5b3d', bossIcon:'🌋'},
  {name:'極寒冰原', top:'#0d2438', bottom:'#04101c', bossName:'冰霜巨人', bossColor:'#8fe3ff', bossIcon:'❄️'},
  {name:'虛空深淵', top:'#1c1030', bottom:'#08040f', bossName:'虛空領主', bossColor:'#c58bff', bossIcon:'🌌'},
];

/* ================= 音效（Web Audio 合成,預設靜音）================= */
let audioCtx = null, soundOn = false;
soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? '🔊' : '🔇';
  if (soundOn && !audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  if (!soundOn && 'speechSynthesis' in window) speechSynthesis.cancel();
});
function beep(freq, dur, type, vol, sweep) {
  if (!soundOn || !audioCtx) return;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, t0);
  if (sweep) osc.frequency.exponentialRampToValueAtTime(sweep, t0 + dur);
  gain.gain.setValueAtTime(vol || 0.2, t0);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t0); osc.stop(t0 + dur + 0.02);
}
function chime() {
  if (!soundOn || !audioCtx) return;
  const t = audioCtx.currentTime;
  [660, 880, 1100, 1320].forEach((fq, i) => {
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(fq, t + i * 0.08);
    g.gain.setValueAtTime(0.0001, t + i * 0.08);
    g.gain.exponentialRampToValueAtTime(0.18, t + i * 0.08 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.08 + 0.3);
    osc.connect(g).connect(audioCtx.destination);
    osc.start(t + i * 0.08); osc.stop(t + i * 0.08 + 0.32);
  });
}

/* ================= 女聲旁白（Web Speech API,系統內建語音合成,零外部資源）================= */
let femaleVoice = null, voicesReady = false;
function pickFemaleVoice() {
  if (!('speechSynthesis' in window)) return;
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return;
  voicesReady = true;
  const zhVoices = voices.filter(v => /zh|cmn|yue/i.test(v.lang));
  const pool = zhVoices.length ? zhVoices : voices;
  femaleVoice =
    pool.find(v => /child|kid|junior|小孩|童/i.test(v.name)) ||
    pool.find(v => /female|女|yating|mei|ting|xiaoxiao|huihui|meijia|shanshan/i.test(v.name)) ||
    pool.find(v => !/male|男/i.test(v.name)) ||
    pool[0] || null;
}
if ('speechSynthesis' in window) {
  pickFemaleVoice();
  speechSynthesis.onvoiceschanged = pickFemaleVoice;
}
function speak(text) {
  if (!soundOn || !('speechSynthesis' in window)) return;
  if (!voicesReady) pickFemaleVoice();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = (femaleVoice && femaleVoice.lang) || 'zh-TW';
  if (femaleVoice) u.voice = femaleVoice;
  u.pitch = 2.0; u.rate = 1.18; u.volume = 1;
  speechSynthesis.speak(u);
}

const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const easeOut = t => 1 - Math.pow(1 - t, 3);

/* ================= 角色繪製：與遊戲本體 drawPlayer() 完全相同的畫法 ================= */
function drawCharacter(c, cx, cy, r, gender, outfitColor, hairColor, walkPhase, facingRight, magicColor, aimAngle) {
  c.save();
  c.translate(cx, cy);
  const bob = Math.sin(walkPhase * 6) * 2;
  const swing = Math.sin(walkPhase * 6) * 0.5;

  c.fillStyle = 'rgba(0,0,0,0.3)';
  c.beginPath(); c.ellipse(0, r * 0.9, r * 0.8, r * 0.28, 0, 0, 7); c.fill();

  c.save();
  c.translate(0, bob * 0.4);

  c.fillStyle = outfitColor + 'aa';
  c.beginPath();
  c.moveTo(-r * 0.5, -r * 0.2);
  c.quadraticCurveTo(-r * 1.3, r * 0.6 + swing * 4, -r * 0.3, r * 1.1);
  c.quadraticCurveTo(0, r * 0.7, 0, -r * 0.2);
  c.closePath(); c.fill();

  c.strokeStyle = gender === 'girl' ? '#4a2f8c' : '#1d2740';
  c.lineWidth = r * 0.34; c.lineCap = 'round';
  c.beginPath();
  c.moveTo(-r * 0.25, r * 0.55); c.lineTo(-r * 0.25 + swing * 5, r * 1.15);
  c.moveTo(r * 0.25, r * 0.55); c.lineTo(r * 0.25 - swing * 5, r * 1.15);
  c.stroke();

  c.fillStyle = outfitColor;
  c.beginPath();
  c.moveTo(-r * 0.55, r * 0.15);
  c.quadraticCurveTo(0, r * 0.55, r * 0.55, r * 0.15);
  c.lineTo(r * 0.45, -r * 0.35);
  c.quadraticCurveTo(0, -r * 0.55, -r * 0.45, -r * 0.35);
  c.closePath(); c.fill();
  c.fillStyle = 'rgba(255,255,255,0.18)';
  c.beginPath(); c.ellipse(-r * 0.12, -r * 0.05, r * 0.22, r * 0.32, 0.3, 0, 7); c.fill();

  c.strokeStyle = outfitColor;
  c.lineWidth = r * 0.26; c.lineCap = 'round';
  c.beginPath();
  c.moveTo(-r * 0.5, -r * 0.15); c.lineTo(-r * 0.85 - swing * 3, r * 0.15);
  c.moveTo(r * 0.5, -r * 0.15); c.lineTo(r * 0.85 + swing * 3, r * 0.15);
  c.stroke();
  c.fillStyle = '#ffd9b3';
  c.beginPath(); c.arc(-r * 0.85 - swing * 3, r * 0.15, r * 0.14, 0, 7); c.arc(r * 0.85 + swing * 3, r * 0.15, r * 0.14, 0, 7); c.fill();

  c.fillStyle = '#ffd9b3';
  c.beginPath(); c.arc(0, -r * 0.85, r * 0.62, 0, 7); c.fill();

  if (gender === 'girl') {
    c.fillStyle = hairColor;
    c.beginPath();
    c.moveTo(-r * 0.55, -r * 1.0);
    c.quadraticCurveTo(-r * 0.9, -r * 0.3, -r * 0.6 + swing * 3, r * 0.05);
    c.lineTo(-r * 0.3, -r * 0.15);
    c.quadraticCurveTo(-r * 0.5, -r * 0.7, -r * 0.25, -r * 1.15);
    c.closePath(); c.fill();
    c.beginPath();
    c.moveTo(r * 0.55, -r * 1.0);
    c.quadraticCurveTo(r * 0.9, -r * 0.3, r * 0.6 - swing * 3, r * 0.05);
    c.lineTo(r * 0.3, -r * 0.15);
    c.quadraticCurveTo(r * 0.5, -r * 0.7, r * 0.25, -r * 1.15);
    c.closePath(); c.fill();
  }

  c.fillStyle = hairColor;
  c.beginPath();
  c.arc(0, -r * 1.02, r * 0.64, Math.PI, 0);
  c.quadraticCurveTo(r * 0.5, -r * 1.5, 0, -r * 1.55);
  c.quadraticCurveTo(-r * 0.5, -r * 1.5, -r * 0.62, -r * 1.02);
  c.closePath(); c.fill();
  if (gender === 'boy') {
    c.fillStyle = hairColor;
    c.beginPath(); c.moveTo(-r * 0.5, -r * 0.95); c.lineTo(r * 0.5, -r * 0.95); c.lineTo(r * 0.4, -r * 1.15); c.lineTo(-r * 0.4, -r * 1.15); c.closePath(); c.fill();
  }

  const eyeDx = facingRight ? r * 0.12 : -r * 0.12;
  c.fillStyle = '#2b2b3a';
  c.beginPath();
  c.arc(-r * 0.2 + eyeDx * 0.3, -r * 0.85, r * 0.08, 0, 7);
  c.arc(r * 0.2 + eyeDx * 0.3, -r * 0.85, r * 0.08, 0, 7);
  c.fill();
  c.strokeStyle = '#c96b52'; c.lineWidth = r * 0.05; c.lineCap = 'round';
  c.beginPath(); c.arc(0, -r * 0.68, r * 0.14, 0.15 * Math.PI, 0.85 * Math.PI); c.stroke();
  c.fillStyle = '#ff9db3'; c.globalAlpha *= 0.6;
  c.beginPath(); c.arc(-r * 0.34, -r * 0.72, r * 0.09, 0, 7); c.arc(r * 0.34, -r * 0.72, r * 0.09, 0, 7); c.fill();
  c.globalAlpha = 1;

  c.restore();

  if (magicColor !== undefined) {
    c.strokeStyle = magicColor; c.lineWidth = 3;
    c.globalAlpha = 0.85;
    c.beginPath();
    c.moveTo(Math.cos(aimAngle) * (r + 2), Math.sin(aimAngle) * (r + 2));
    c.lineTo(Math.cos(aimAngle) * (r + 16), Math.sin(aimAngle) * (r + 16));
    c.stroke();
    c.globalAlpha = 1;
  }
  c.restore();
}

/* ================= 敵人／子彈／粒子：與遊戲本體相同畫法 ================= */
function drawEnemy(x, y, r, type, hitT, icon, hp, maxHp, bossColor) {
  bossColor = bossColor || '#5d8a4a';
  ctx.save();
  ctx.translate(x, y);
  if (type === 'boss') {
    const bodyColor = hitT > 0 ? '#ffffff' : bossColor;
    ctx.shadowColor = bossColor; ctx.shadowBlur = 22;
    ctx.fillStyle = bodyColor;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, 7); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.arc(r * 0.28, r * 0.28, r * 0.7, 0, 7); ctx.fill();
    ctx.font = (r * 1.4) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(icon || '👹', 0, 1);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0, 0, r + 5, 0, 7); ctx.stroke();
  } else {
    const bodyColor = hitT > 0 ? '#ffffff' : (type === 'tank' ? '#9a6bff' : '#ff3b6b');
    ctx.fillStyle = bodyColor;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, 7); ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.arc(r * 0.3, r * 0.3, r * 0.6, 0, 7); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-r * 0.3, -r * 0.1, 2.4, 0, 7); ctx.arc(r * 0.3, -r * 0.1, 2.4, 0, 7); ctx.fill();
  }
  ctx.restore();
  const w = r * 2;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(x - w / 2, y - r - 12, w, 5);
  ctx.fillStyle = type === 'boss' ? '#ffcf5c' : '#38e1ff';
  ctx.fillRect(x - w / 2, y - r - 12, w * Math.max(0, hp / maxHp), 5);
}
function drawBullet(x, y, r, color) {
  ctx.fillStyle = color;
  ctx.shadowColor = color; ctx.shadowBlur = 12;
  ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
  ctx.shadowBlur = 0;
}
function drawParticle(x, y, r, color, alpha) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
  ctx.globalAlpha = 1;
}
function drawGrid() {
  ctx.fillStyle = 'rgba(255,255,255,0.035)';
  const gap = 40;
  for (let x = 0; x < GAME_W; x += gap) for (let y = 0; y < GAME_H; y += gap) ctx.fillRect(x, y, 2, 2);
}
function drawStageBg(stage) {
  const grad = ctx.createLinearGradient(0, 0, 0, GAME_H);
  grad.addColorStop(0, stage.top); grad.addColorStop(1, stage.bottom);
  ctx.fillStyle = grad; ctx.fillRect(0, 0, GAME_W, GAME_H);
  const vign = ctx.createRadialGradient(GAME_W / 2, GAME_H / 2, 0, GAME_W / 2, GAME_H / 2, Math.max(GAME_W, GAME_H) * 0.7);
  vign.addColorStop(0, 'rgba(0,0,0,0)'); vign.addColorStop(1, 'rgba(0,0,0,0.45)');
  ctx.fillStyle = vign; ctx.fillRect(0, 0, GAME_W, GAME_H);
  drawGrid();
}
function subtitle(text, alpha, yOffset) {
  ctx.save();
  ctx.globalAlpha = alpha === undefined ? 1 : alpha;
  ctx.textAlign = 'center';
  ctx.font = "900 22px 'PingFang TC','Microsoft JhengHei',sans-serif";
  const y = GAME_H - (yOffset === undefined ? 140 : yOffset);
  ctx.fillStyle = 'rgba(5,8,16,0.6)';
  const w = ctx.measureText(text).width + 40;
  ctx.beginPath(); ctx.roundRect(GAME_W / 2 - w / 2, y - 30, w, 44, 12); ctx.fill();
  ctx.fillStyle = '#dfe9ff';

}
/* 天神降臨橫幅：與遊戲本體 showBanner() 同款樣式（大字白色標題＋灰藍副標） */
function bannerBig(text, sub, alpha) {

/* 神聖庇護光環：與遊戲本體 divineBuffT 光暈同款畫法 */
function divineAura(x, y, r, t, strength) {
  ctx.save();
  const pulse = 0.7 + Math.sin(t * 8) * 0.3;
  ctx.globalAlpha = 0.35 * strength;
  const auraR = r * 2.6 + pulse * 6;
  const aura = ctx.createRadialGradient(x, y, r * 0.5, x, y, auraR);
  aura.addColorStop(0, 'rgba(255,230,160,0.6)'); aura.addColorStop(1, 'rgba(255,230,160,0)');
  ctx.fillStyle = aura;
  ctx.beginPath(); ctx.arc(x, y, auraR, 0, 7); ctx.fill();
  ctx.restore();
}
/* 天神降臨全螢幕金光閃現：與遊戲本體 divineFlashT 同款畫法 */
function divineFlash(strength) {
  ctx.save();
  ctx.globalAlpha = Math.max(0, strength) * 0.65;
  const flash = ctx.createRadialGradient(GAME_W / 2, GAME_H / 2, 0, GAME_W / 2, GAME_H / 2, Math.max(GAME_W, GAME_H) * 0.75);
  flash.addColorStop(0, 'rgba(255,244,214,0.9)'); flash.addColorStop(1, 'rgba(255,244,214,0)');
  ctx.fillStyle = flash;
  ctx.fillRect(0, 0, GAME_W, GAME_H);
  ctx.restore();
}

/* ================= 場景腳本化模擬（假資料驅動,畫面元素與遊戲本體 100% 同款畫法）================= */
const CHAR = CHARACTERS[0]; // 小炎
const MAGIC = magicByKey(CHAR.magicKey);
const STAGE = STAGES[0];

let enemies = [];
let bullets = [];
let particles = [];
let score = 0, wave = 1, hp = 100;
let rngSeed = 7;
function rnd() { rngSeed = (rngSeed * 16807) % 2147483647; return rngSeed / 2147483647; }

function spawnEnemyAt(x, y, isBoss) {
  enemies.push({
    x, y, r: isBoss ? 62 : 20, type: isBoss ? 'boss' : 'normal',
    hp: isBoss ? 240 : 24, maxHp: isBoss ? 240 : 24, hitT: 0, icon: STAGE.bossIcon,
  });
}
function spawnBulletTowards(px, py, tx, ty, color) {
  const a = Math.atan2(ty - py, tx - px);
  bullets.push({ x: px, y: py, vx: Math.cos(a) * 9, vy: Math.sin(a) * 9, r: 9, color, life: 60 });
}
function burst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = rnd() * Math.PI * 2, sp = 1 + rnd() * 3;
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, r: 2 + rnd() * 2, color, life: 26 });
  }
}
function stepSim() {
  for (const b of bullets) { b.x += b.vx; b.y += b.vy; b.life--; }
  bullets = bullets.filter(b => b.life > 0);
  for (const p of particles) { p.x += p.vx; p.y += p.vy; p.vx *= 0.94; p.vy *= 0.94; p.life--; }
  particles = particles.filter(p => p.life > 0);
  for (const en of enemies) { if (en.hitT > 0) en.hitT--; }
}

/* ================= 時間軸（總長 36 秒,場景切換依真實遊戲畫面呈現）================= */
/* TIMELINE 由下方各幕實際旁白長度動態計算,定義見 drawGameplay 之後 */
let startTime = null, playing = false;
let firedCues = {};
function cue(id, fn) { if (!firedCues[id]) { firedCues[id] = true; fn(); } }
function setLayer(el, on) { el.classList.toggle('show', on); if (!on) el.style.opacity = ''; }

/* ================= 第零幕：故事開場（六元素沉睡＋覺醒的呼喚）================= */
const STORY_STARS = Array.from({ length: 70 }, (_, i) => ({
  x: (i * 137) % GAME_W, y: (i * 251) % GAME_H, r: 0.6 + (i % 3) * 0.5, ph: i * 0.7,
}));
const STORY_LINES = [
  '六種元素之力，沉睡在世界的各個角落……',
  '直到有一天，呼喚聲響起——',
  '魔法覺醒的時刻，到了！',
];
// 每句時長依旁白實際長度估算,確保字幕跟得上語音進度
const storyDurs = cumulativeStarts(STORY_LINES.map(line => Math.max(1.6, estDur(line))));
const STORY_STARTS = storyDurs.starts;
const STORY_DUR = storyDurs.total + 0.4;
function drawStoryBg(t) {
  const g = ctx.createRadialGradient(GAME_W / 2, GAME_H * 0.4, 20, GAME_W / 2, GAME_H * 0.5, GAME_W * 0.8);
  g.addColorStop(0, '#141c38'); g.addColorStop(1, '#05070f');
  ctx.fillStyle = g; ctx.fillRect(0, 0, GAME_W, GAME_H);
  for (const s of STORY_STARS) {
    const tw = 0.4 + 0.6 * Math.abs(Math.sin(t * 1.1 + s.ph));
    ctx.fillStyle = `rgba(220,235,255,${tw * 0.8})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 7); ctx.fill();
  }
  // 中央甦醒的魔法水晶：六色光芒緩緩旋轉脈動
  const cx = GAME_W / 2, cy = GAME_H * 0.34;
  const pulse = 0.75 + Math.sin(t * 2.2) * 0.25;
  const crystalColors = MAGICS.map(m => m.color);
  ctx.save();
  ctx.translate(cx, cy); ctx.rotate(t * 0.3);
  crystalColors.forEach((c, i) => {
    const a = (i / crystalColors.length) * Math.PI * 2;
    const rr = 70 * pulse;
    const ray = ctx.createRadialGradient(0, 0, 2, Math.cos(a) * rr, Math.sin(a) * rr, rr);
    ray.addColorStop(0, c); ray.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = ray;
    ctx.beginPath(); ctx.arc(Math.cos(a) * rr * 0.5, Math.sin(a) * rr * 0.5, rr * 0.6, 0, 7); ctx.fill();
  });
  ctx.restore();
  ctx.save();
  ctx.globalAlpha = 1;
  const core = ctx.createRadialGradient(cx, cy, 1, cx, cy, 34 * pulse);
  core.addColorStop(0, '#ffffff'); core.addColorStop(0.5, '#9adfff'); core.addColorStop(1, 'rgba(150,220,255,0)');
  ctx.fillStyle = core;
  ctx.beginPath(); ctx.arc(cx, cy, 34 * pulse, 0, 7); ctx.fill();
  ctx.restore();
}
function storyAct(t) {
  hideAll(); setLayer(screenStory, true);
  hud.classList.remove('show'); skillBar.classList.remove('show');
  drawStoryBg(t);
  if (t > 0.2) cue('storyChime', () => chime());
  const phase = phaseIndex(STORY_STARTS, t);
  storyText.textContent = STORY_LINES[phase];
  cue('storyLine' + phase, () => speak(STORY_LINES[phase]));
}

function hideAll() {

  setLayer(screenTitle, false); setLayer(screenCTA, false);

/* ================= 依旁白實際長度估算每段時長,確保字幕/畫面跟得上語音 ================= */
function estDur(text) {
  const len = text.replace(/[，。！？·、\s]/g, '').length;
  return Math.max(1.3, len / 6.2 + 0.4);
}
function phaseIndex(starts, elapsed) {
  let idx = 0;
  for (let i = 0; i < starts.length; i++) if (elapsed >= starts[i]) idx = i;
  return idx;
}
function cumulativeStarts(durs) {
  const starts = []; let acc = 0;
  durs.forEach(d => { starts.push(acc); acc += d; });
  return { starts, total: acc };
}

const TITLE_DUR = Math.max(4, estDur('魔法覺醒！選一位角色，展開專屬的魔法冒險。') + 1);
const COMBAT_DUR = 12;
const PETS_START = TITLE_DUR + COMBAT_DUR;

const PET_TYPE_SEQUENCE = ['attack', 'heal', 'guard'];
const PET_PHASE_LINES = {
  attack: '冒險路上還能帶著寵物夥伴一起戰鬥！攻擊系寵物能追加額外傷害！',
  heal: '治癒系寵物會持續恢復你的生命值！',
  guard: '守護系寵物能幫忙抵擋敵人攻擊！',
};
const petDurs = cumulativeStarts(PET_TYPE_SEQUENCE.map(ty => Math.max(2.4, estDur(PET_PHASE_LINES[ty]))));
const PET_PHASE_STARTS = petDurs.starts;
const PETS_DUR = petDurs.total + 0.5;

const STAGES_START = PETS_START + PETS_DUR;
const STAGE_LINES = STAGES.map((st, i) => (i === 0 ? '四大關卡等你來挑戰！' : '') + '第 ' + (i + 1) + ' 關：' + st.name + '，首領是' + st.bossName + '！');
const stageDurs = cumulativeStarts(STAGE_LINES.map(line => Math.max(1.8, estDur(line))));
const STAGE_STARTS = stageDurs.starts;
const STAGES_DUR = stageDurs.total + 0.5;

const CTA_START = STAGES_START + STAGES_DUR;
const CTA_LINE = '六大元素魔法，十二隻夥伴寵物，四大關卡，快來體驗魔法覺醒吧！';
const CTA_DUR = Math.max(4.5, estDur(CTA_LINE) + 1.6);
const GAMEPLAY_DUR = CTA_START + CTA_DUR;
const TIMELINE = STORY_DUR + GAMEPLAY_DUR;

function drawGameplay(t) {
  if (t < TITLE_DUR) {
    /* ---- 第一幕：選角畫面（與遊戲標題畫面同款 DOM/CSS） ---- */
    drawStageBg(STAGE);
    hideAll(); setLayer(screenTitle, true);
    hud.classList.remove('show'); skillBar.classList.remove('show');
    if (t > 0.2) cue('titleChime', () => chime());
    if (t > 0.3) cue('narrateTitle', () => speak('魔法覺醒！選一位角色，展開專屬的魔法冒險。'));
    const sel = clamp(Math.floor((t / TITLE_DUR) * CHARACTERS.length), 0, CHARACTERS.length - 1);
    [...charRow.children].forEach((el, i) => el.classList.toggle('sel', i === sel));
  } else if (t < PETS_START) {
    /* ---- 第二幕：真實戰鬥畫面重現（森林關卡,小炎主角）---- */
    hideAll();
    hud.classList.add('show'); skillBar.classList.add('show');
    if (t < TITLE_DUR + 0.3) cue('buildSkill', () => { buildSkillBar(MAGIC); magicLabel.textContent = MAGIC.icon + ' ' + MAGIC.name; });
    if (t > TITLE_DUR + 0.4) cue('narrateCombat', () => speak('小炎選擇了烈焰魔法，火球自動鎖定最近的敵人，一擊灼燒！'));
    drawStageBg(STAGE);

    const segT = t - TITLE_DUR;
    // 敵人波次腳本（壓縮至 12 秒內：小怪 → 小怪 → BOSS）
    if (segT > 0.6 && enemies.length === 0) cue('wave1', () => {
      for (let i = 0; i < 4; i++) spawnEnemyAt(680 + (i % 2) * 90, 140 + i * 90, false);
      wave = 1; waveLabel.textContent = '第 ' + wave + ' 波';
    });
    if (segT > 5.4 && enemies.filter(e => e.type !== 'boss').length === 0 && wave === 1) cue('wave2', () => {
      for (let i = 0; i < 3; i++) spawnEnemyAt(700 + (i % 2) * 100, 160 + i * 100, false);
      wave = 2; waveLabel.textContent = '第 ' + wave + ' 波';
    });
    if (segT > 9 && wave < 3) cue('bossWave', () => {
      enemies = [];
      spawnEnemyAt(760, GAME_H / 2, true);
      wave = 3; waveLabel.textContent = '第 3 波（BOSS）';
    });
    if (segT > 5.6 && segT < 9) cue('narrateWave', () => speak('打倒整波敵人，就能晉級下一關！'));

    const px = 220, py = GAME_H / 2;
    const nearest = enemies[0];
    const aimAngle = nearest ? Math.atan2(nearest.y - py, nearest.x - px) : 0;

    // 主角自動攻擊：每 0.42 秒對最近敵人射擊
    if (nearest && Math.floor(segT / 0.42) !== Math.floor((segT - 1 / 60) / 0.42)) {
      spawnBulletTowards(px + Math.cos(aimAngle) * 30, py + Math.sin(aimAngle) * 30, nearest.x, nearest.y, MAGIC.color);
      beep(520, 0.08, 'sine', 0.15, 300);
    }
    // 子彈命中判定
    bullets.forEach(b => {
      enemies.forEach(en => {
        if (en.hp > 0 && Math.hypot(b.x - en.x, b.y - en.y) < en.r + b.r) {
          en.hp -= MAGIC.dmg || 18; en.hitT = 6; b.life = 0;
          burst(en.x, en.y, MAGIC.color, 10);
          score += 10; scoreLabel.textContent = '分數 ' + score;
          if (en.hp <= 0) { burst(en.x, en.y, '#fff', 16); if (soundOn) beep(880, 0.12, 'triangle', 0.2, 440); }
        }
      });
    });
    enemies = enemies.filter(en => en.hp > 0);

    drawGrid();
    for (const p of particles) drawParticle(p.x, p.y, p.r, p.color, Math.max(0, p.life / 26));
    for (const b of bullets) drawBullet(b.x, b.y, b.r, b.color);
    for (const en of enemies) drawEnemy(en.x, en.y, en.r, en.type, en.hitT, en.icon, en.hp, en.maxHp, STAGE.bossColor);

    drawCharacterMain(px, py, 34, CHAR.gender, CHAR.outfit, CHAR.hair, t * 1.4, true, MAGIC.color, aimAngle);

    // 隨行寵物環繞
    PET_POOL.slice(0, 3).forEach((pet, i) => {
      const a = t * 1.2 + i * (Math.PI * 2 / 3);
      const ppx = px + Math.cos(a) * 56, ppy = py + Math.sin(a) * 56 * 0.5 - 30;
      ctx.save();
      ctx.font = '20px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.shadowColor = pet.color; ctx.shadowBlur = 8;
      ctx.fillText(pet.icon, ppx, ppy);
      ctx.restore();
    });

    // 血量腳本：戰鬥中緩降,BOSS 登場時剛好掉到半血觸發「天神降臨」
    const DIVINE_AT = 9;
    const hpPct = segT < DIVINE_AT
      ? clamp(100 - segT * 5.6, 50, 100)
      : Math.min(72, 50 + (segT - DIVINE_AT) * 7);
    hpfill.style.width = hpPct + '%';

    if (segT >= DIVINE_AT) {
      const dt = segT - DIVINE_AT;
      cue('divineDescent', () => {
        beep(200, 0.5, 'sine', 0.3, 900);
        chime();
        speak('血量掉到一半，天神降臨！攻擊力大幅提升！');
      });
      divineFlash(clamp(1 - dt / 0.9, 0, 1));
      divineAura(px, py, 34, t, clamp(dt / 0.6, 0, 1));
      bannerBig('天神降臨！', '獲得神聖庇護，攻擊力大幅提升！', clamp(dt / 0.4, 0, 1) * clamp((3 - dt) / 0.6, 0, 1));
    }

    if (segT < 5.2) subtitle('WASD／拖曳移動，魔法自動鎖定最近敵人');
    else if (segT < 9) subtitle('打倒整波敵人，晉級下一波！');
    else if (segT < 9.3) subtitle('BOSS 波：' + STAGE.bossName + ' 登場！');
    else if (segT < 12) subtitle('血量過半時會有「天神降臨」神聖庇護！');

    if (segT > 9 && segT < 9.3) cue('bossRoar', () => beep(90, 0.4, 'sawtooth', 0.3, 40));
  } else if (t < STAGES_START) {
    /* ---- 第三幕：寵物圖鑑（同款寵物選單 DOM/CSS）,每段時長依旁白長度自動抓 ---- */
    hideAll(); setLayer(screenPets, true);
    hud.classList.remove('show'); skillBar.classList.remove('show');
    drawStageBg(STAGE); drawGrid();
    const segT = t - PETS_START;
    const phase = phaseIndex(PET_PHASE_STARTS, segT);
    const curType = PET_TYPE_SEQUENCE[phase];
    [...petRow.children].forEach(el => el.classList.toggle('sel', el.dataset.type === curType));
    petTypeDesc.textContent = PET_TYPE_LABEL[curType];
    cue('petPhase' + phase, () => { chime(); speak(PET_PHASE_LINES[curType]); });
  } else if (t < CTA_START) {
    /* ---- 第四幕：四大關卡巡覽,每關時長依旁白長度自動抓 ---- */
    hideAll(); setLayer(screenStage, true);
    hud.classList.remove('show'); skillBar.classList.remove('show');
    const segT = t - STAGES_START;
    const idx = phaseIndex(STAGE_STARTS, segT);
    const st = STAGES[idx];
    drawStageBg(st); drawGrid();
    const bob = Math.sin(t * 2.4) * 6;
    drawEnemy(GAME_W / 2, GAME_H * 0.74 + bob, 86, 'boss', 0, st.bossIcon, 1, 1, st.bossColor);
    stageName.textContent = st.name;
    stageBoss.textContent = '關卡首領：' + st.bossName;
    cue('stageChime' + idx, () => { chime(); speak(STAGE_LINES[idx]); });
    subtitle('第 ' + (idx + 1) + ' / ' + STAGES.length + ' 關卡：' + st.name, 1, 36);
  } else {
    /* ---- 第五幕：結算 CTA（同款結束畫面樣式）---- */
    hideAll(); setLayer(screenCTA, true);
    hud.classList.remove('show'); skillBar.classList.remove('show');
    drawStageBg(STAGE);
    drawGrid();
    for (const en of enemies) drawEnemy(en.x, en.y, en.r, en.type, 0, en.icon, en.hp, en.maxHp, STAGE.bossColor);
    const p = clamp((t - CTA_START) / 1.2, 0, 1);
    if (p > 0.05) cue('ctaChime', () => chime());
    if (p > 0.1) cue('narrateCTA', () => speak(CTA_LINE));
    screenCTA.style.opacity = String(easeOut(p));
  }

  const edge = ctx.createRadialGradient(GAME_W / 2, GAME_H / 2, GAME_H * 0.35, GAME_W / 2, GAME_H / 2, GAME_W * 0.75);
  edge.addColorStop(0, 'rgba(0,0,0,0)');
  edge.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = edge;
  ctx.fillRect(0, 0, GAME_W, GAME_H);
}

function draw(t) {
  ctx.clearRect(0, 0, GAME_W, GAME_H);
  stepSim();
  if (t < STORY_DUR) storyAct(t);
  else drawGameplay(t - STORY_DUR);
}

function loop(now) {
  if (!playing) return;
  if (startTime === null) startTime = now;
  const t = (now - startTime) / 1000;
  if (t >= TIMELINE) {
    draw(TIMELINE - 0.01);
    playing = false;
    replayBtn.style.display = 'block';
    return;
  }
  draw(t);
  requestAnimationFrame(loop);
}
function play() {
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  startTime = null;
  firedCues = {};
  enemies = []; bullets = []; particles = [];
  score = 0; wave = 1;
  scoreLabel.textContent = '分數 0'; waveLabel.textContent = '第 1 波';
  hpfill.style.width = '100%';
  playing = true;
  replayBtn.style.display = 'none';
  requestAnimationFrame(loop);
}
buildCharRow();
buildPetRow();
replayBtn.addEventListener('click', play);
play();
</script>

<script>/* AI-CAMP-VIDEO-CONTROLS */
(function(){
  var ORAF=window.requestAnimationFrame.bind(window), OST=window.setTimeout.bind(window), OSI=window.setInterval.bind(window);
  var realNow=performance.now.bind(performance), D0=Date.now(), P0=realNow();
  var acc=0, lastReal=P0, paused=false, speed=1;
  function vnow(){ var r=realNow(); if(!paused){ acc+=(r-lastReal)*speed; } lastReal=r; return acc; }
  try{ performance.now=function(){ return vnow(); }; }catch(e){}
  try{ Date.now=function(){ return D0+Math.round(vnow()); }; }catch(e){}
  window.requestAnimationFrame=function(cb){ return ORAF(function tick(){ if(paused){ ORAF(tick); } else { cb(vnow()); } }); };
  window.setTimeout=function(fn,ms){ var a=[].slice.call(arguments,2);
    return OST(function f(){ if(paused){ OST(f,120); } else if(typeof fn==="function"){ fn.apply(null,a); } },ms); };
  window.setInterval=function(fn,ms){ var a=[].slice.call(arguments,2);
    return OSI(function(){ if(!paused&&typeof fn==="function"){ fn.apply(null,a); } },ms); };
  var ctxs=[];
  ["AudioContext","webkitAudioContext"].forEach(function(n){
    var C=window[n]; if(!C) return;
    var W=function(){ var c=new (Function.prototype.bind.apply(C,[null].concat([].slice.call(arguments))))(); ctxs.push(c); return c; };
    W.prototype=C.prototype; window[n]=W;
  });
  function setPaused(p){
    vnow(); paused=p;
    ctxs.forEach(function(c){ try{ p?c.suspend():c.resume(); }catch(e){} });
    [].forEach.call(document.querySelectorAll("audio,video"),function(m){ try{ p?m.pause():m.play(); }catch(e){} });
  }
  function fmt(ms){ var s=Math.floor(ms/1000); return Math.floor(s/60)+":"+("0"+(s%60)).slice(-2); }
  function init(){
    if(!document.body) return;
    var bar=document.createElement("div");
    bar.style.cssText="position:fixed;left:10px;bottom:10px;z-index:99998;display:flex;gap:6px;align-items:center;"+
      "font-family:sans-serif;background:rgba(15,18,32,.88);border-radius:999px;padding:6px 10px;box-shadow:0 2px 10px rgba(0,0,0,.4)";
    function mkbtn(txt,title){ var b=document.createElement("button"); b.type="button"; b.title=title;
      b.style.cssText="min-width:42px;min-height:36px;border:none;border-radius:999px;background:rgba(255,255,255,.12);"+
        "color:#fff;font-size:15px;cursor:pointer;touch-action:manipulation;padding:4px 10px"; b.textContent=txt; return b; }
    var bPlay=mkbtn("\u23F8","\u66AB\u505C/\u7E7C\u7E8C");
    var bRe=mkbtn("\u23EA","\u91CD\u64AD");
    var bSp=mkbtn("1x","\u64AD\u653E\u901F\u5EA6");
    var tEl=document.createElement("span"); tEl.style.cssText="color:#9fd8ff;font-size:13px;min-width:38px;text-align:center"; tEl.textContent="0:00";
    bPlay.addEventListener("click",function(){ setPaused(!paused); bPlay.textContent=paused?"\u25B6":"\u23F8"; });
    bRe.addEventListener("click",function(){ location.reload(); });
    var speeds=[1,2,0.5];
    bSp.addEventListener("click",function(){ vnow(); speed=speeds[(speeds.indexOf(speed)+1)%speeds.length]; bSp.textContent=(speed===0.5?"0.5":speed)+"x"; });
    bar.appendChild(bPlay); bar.appendChild(bRe); bar.appendChild(bSp); bar.appendChild(tEl);
    document.body.appendChild(bar);
    (function upd(){ tEl.textContent=fmt(vnow()); OST(upd,500); })();
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",init); else init();
})();
</script>
