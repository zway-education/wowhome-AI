<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="author" content="Claude">
<title>暗途 遊戲介紹</title>
<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #000;
    font-family: 'Courier New', monospace;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  canvas { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
  #soundBtn {
    position: fixed; top: 12px; right: 12px; z-index: 20;
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(20,20,20,0.7); border: 1px solid rgba(160,160,160,0.5);
    color: #ddd; font-size: 20px; cursor: pointer;
  }
  #soundHint {
    position: fixed; top: 18px; right: 68px; z-index: 20;
    color: #bbb; font-size: 14px; text-shadow: 0 0 4px #000;
    animation: hintFade 3.2s ease forwards;
    pointer-events: none;
  }
  @keyframes hintFade { 0%{opacity:0} 15%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
  #replayBtn {
    position: fixed; left: 50%; bottom: 12%; transform: translateX(-50%);
    z-index: 20; display: none;
    padding: 14px 42px; font-size: 20px; min-height: 48px;
    background: #300; color: #e8b0b0;
    border: 1px solid #700; border-radius: 6px; cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>
<button id="soundBtn">🔇</button>
<div id="soundHint">點聲音鈕開啟音效 🎧 建議戴耳機</div>
<button id="replayBtn">重新播放</button>
<canvas id="stage"></canvas>

<script>
'use strict';
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const soundBtn = document.getElementById('soundBtn');
const replayBtn = document.getElementById('replayBtn');

function resize() {
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', resize); resize();

// ---------- 音效（預設靜音,合成、零外部資源）----------
let audioCtx = null, soundOn = false;
let ambientNodes = null;
soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? '🔊' : '🔇';
  if (soundOn && !audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  if (soundOn) startAmbient(); else stopAmbient();
});

// 恐怖環境音：失諧雙低音墊＋陰森音樂盒旋律
function startAmbient() {
  if (!audioCtx || ambientNodes) return;
  const t = audioCtx.currentTime;
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0.001, t);
  master.gain.exponentialRampToValueAtTime(0.9, t + 2);
  master.connect(audioCtx.destination);

  const drone = audioCtx.createOscillator();
  drone.type = 'sawtooth'; drone.frequency.setValueAtTime(48, t);
  const drone2 = audioCtx.createOscillator();
  drone2.type = 'sawtooth'; drone2.frequency.setValueAtTime(48.7, t);
  const droneFilter = audioCtx.createBiquadFilter();
  droneFilter.type = 'lowpass'; droneFilter.frequency.setValueAtTime(130, t);
  const droneGain = audioCtx.createGain();
  droneGain.gain.setValueAtTime(0.045, t);
  const lfo = audioCtx.createOscillator();
  lfo.frequency.setValueAtTime(0.17, t);
  const lfoGain = audioCtx.createGain();
  lfoGain.gain.setValueAtTime(7, t);
  lfo.connect(lfoGain).connect(drone.frequency);
  drone.connect(droneFilter); drone2.connect(droneFilter);
  droneFilter.connect(droneGain).connect(master);
  drone.start(t); drone2.start(t); lfo.start(t);

  // 音樂盒旋律：A 小調，緩慢、失諧泛音＋回音
  const MELODY = [
    [220.0, 1.6], [261.63, 1.6], [246.94, 2.4], [0, 1.2],
    [220.0, 1.6], [174.61, 1.6], [164.81, 3.2], [0, 2.4],
    [261.63, 1.6], [246.94, 1.6], [220.0, 2.4], [0, 1.2],
    [146.83, 1.6], [164.81, 1.6], [220.0, 4.0], [0, 3.2],
  ];
  const echo = audioCtx.createDelay(1.2);
  echo.delayTime.setValueAtTime(0.55, t);
  const echoFb = audioCtx.createGain();
  echoFb.gain.setValueAtTime(0.42, t);
  const echoOut = audioCtx.createGain();
  echoOut.gain.setValueAtTime(0.5, t);
  echo.connect(echoFb).connect(echo);
  echo.connect(echoOut).connect(master);
  let noteIdx = 0;
  function pluck(freq, when) {
    for (const [mult, vol] of [[1, 0.055], [2.01, 0.022], [3.02, 0.009]]) {
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq * mult, when);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.0001, when);
      g.gain.exponentialRampToValueAtTime(vol, when + 0.015);
      g.gain.exponentialRampToValueAtTime(0.0001, when + 2.2);
      osc.connect(g);
      g.connect(master);
      g.connect(echo);
      osc.start(when);
      osc.stop(when + 2.3);
    }
  }
  function scheduleNext() {
    if (!ambientNodes) return;
    const [freq, dur] = MELODY[noteIdx % MELODY.length];
    noteIdx++;
    if (freq > 0) pluck(freq, audioCtx.currentTime + 0.05);
    ambientNodes.melodyTimer = setTimeout(scheduleNext, dur * 1000);
  }
  ambientNodes = { drone, drone2, lfo, master, melodyTimer: null };
  setTimeout(scheduleNext, 800);
}
function stopAmbient() {
  if (!ambientNodes) return;
  const t = audioCtx.currentTime;
  clearTimeout(ambientNodes.melodyTimer);
  ambientNodes.master.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
  ambientNodes.drone.stop(t + 0.5);
  ambientNodes.drone2.stop(t + 0.5);
  ambientNodes.lfo.stop(t + 0.5);
  ambientNodes = null;
}
function thump(vol) {
  if (!audioCtx || !soundOn) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine'; o.frequency.setValueAtTime(90, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.35);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.4);
}
function stinger() {
  if (!audioCtx || !soundOn) return;
  const now = audioCtx.currentTime;
  [220, 233, 246].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sawtooth'; o.frequency.value = f;
    g.gain.setValueAtTime(0.001, now);
    g.gain.exponentialRampToValueAtTime(0.22, now + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(now); o.stop(now + 0.6);
  });
}
function chime() {
  if (!audioCtx || !soundOn) return;
  const now = audioCtx.currentTime;
  [660, 880, 990].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'triangle'; o.frequency.value = f;
    g.gain.setValueAtTime(0.0001, now + i * 0.09);
    g.gain.exponentialRampToValueAtTime(0.14, now + i * 0.09 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.09 + 0.5);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(now + i * 0.09); o.stop(now + i * 0.09 + 0.5);
  });
}
function keyPickup() {
  if (!audioCtx || !soundOn) return;
  const now = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'square'; o.frequency.setValueAtTime(520, now);
  o.frequency.exponentialRampToValueAtTime(1040, now + 0.15);
  g.gain.setValueAtTime(0.001, now);
  g.gain.exponentialRampToValueAtTime(0.12, now + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(now); o.stop(now + 0.2);
}

// ---------- 繪圖工具 ----------
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const easeOut = t => 1 - Math.pow(1 - t, 3);
const easeInOut = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

function drawCorridorBase() {
  ctx.fillStyle = '#050505';
  ctx.fillRect(0, 0, GAME_W, GAME_H);
  // 走廊透視牆面
  ctx.strokeStyle = 'rgba(60,55,50,0.5)';
  ctx.lineWidth = 2;
  const vx = GAME_W / 2, vy = GAME_H * 0.42;
  for (let i = 0; i < 6; i++) {
    const t = i / 5;
    const w = GAME_W * (0.15 + t * 0.85);
    const h = GAME_H * (0.15 + t * 0.85);
    ctx.strokeRect(vx - w / 2, vy - h / 2, w, h);
  }
  [[-1, -1], [1, -1], [-1, 1], [1, 1]].forEach(([sx, sy]) => {
    ctx.beginPath();
    ctx.moveTo(vx, vy);
    ctx.lineTo(vx + sx * GAME_W, vy + sy * GAME_H);
    ctx.stroke();
  });
}

function drawFlashlightCone(cx, cy, angle, spread, dist, flicker) {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const grad = ctx.createRadialGradient(cx, cy, 4, cx, cy, dist);
  grad.addColorStop(0, `rgba(255,244,210,${0.55 * flicker})`);
  grad.addColorStop(0.5, `rgba(255,230,180,${0.22 * flicker})`);
  grad.addColorStop(1, 'rgba(255,220,160,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, dist, angle - spread, angle + spread);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawDarknessMask(cx, cy, dist) {
  ctx.save();
  const grad = ctx.createRadialGradient(cx, cy, dist * 0.15, cx, cy, GAME_W * 0.75);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.97)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);
  ctx.restore();
}

function drawPlayerBack(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.ellipse(0, size * 0.9, size * 0.55, size * 0.9, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, -size * 0.15, size * 0.38, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawKey(x, y, size, glow) {
  ctx.save();
  ctx.translate(x, y);
  ctx.shadowColor = `rgba(255,220,120,${glow})`;
  ctx.shadowBlur = 18 * glow;
  ctx.strokeStyle = `rgba(255,220,120,${0.85 * glow + 0.15})`;
  ctx.lineWidth = size * 0.12;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(0, 0, size * 0.32, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(size * 0.3, 0);
  ctx.lineTo(size * 0.85, 0);
  ctx.moveTo(size * 0.65, 0);
  ctx.lineTo(size * 0.65, size * 0.22);
  ctx.moveTo(size * 0.8, 0);
  ctx.lineTo(size * 0.8, size * 0.22);
  ctx.stroke();
  ctx.restore();
}

function drawStalker(x, y, size, alpha) {
  if (alpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  ctx.fillStyle = '#0c0c0c';
  ctx.beginPath();
  ctx.moveTo(0, size);
  ctx.quadraticCurveTo(-size * 0.6, size * 0.2, -size * 0.3, -size * 0.7);
  ctx.quadraticCurveTo(0, -size * 1.1, size * 0.3, -size * 0.7);
  ctx.quadraticCurveTo(size * 0.6, size * 0.2, 0, size);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = `rgba(200,10,10,${0.85 * alpha})`;
  ctx.beginPath(); ctx.arc(-size * 0.14, -size * 0.55, size * 0.06, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(size * 0.14, -size * 0.55, size * 0.06, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawExitDoor(x, y, w, h, glow) {
  ctx.save();
  ctx.translate(x, y);
  ctx.shadowColor = `rgba(90,255,140,${glow})`;
  ctx.shadowBlur = 26 * glow;
  ctx.strokeStyle = `rgba(90,255,140,${0.4 + 0.5 * glow})`;
  ctx.lineWidth = 4;
  ctx.strokeRect(-w / 2, -h, w, h);
  ctx.fillStyle = `rgba(90,255,140,${0.06 + 0.1 * glow})`;
  ctx.fillRect(-w / 2, -h, w, h);
  ctx.restore();
}

function subtitle(text, alpha, big) {
  if (alpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';
  ctx.font = (big ? 'bold 40px' : '22px') + " 'Microsoft JhengHei', 'PingFang TC', sans-serif";
  ctx.fillStyle = '#000';
  ctx.lineWidth = big ? 8 : 5;
  ctx.strokeStyle = 'rgba(0,0,0,0.85)';
  ctx.strokeText(text, GAME_W / 2, GAME_H - (big ? 90 : 56));
  ctx.fillStyle = big ? '#d9c9a0' : '#e8e0cc';
  ctx.fillText(text, GAME_W / 2, GAME_H - (big ? 90 : 56));
  ctx.restore();
}

function titleCard(alpha, shake) {
  ctx.save();
  ctx.globalAlpha = alpha;
  const sx = (Math.random() - 0.5) * shake;
  const sy = (Math.random() - 0.5) * shake;
  ctx.textAlign = 'center';
  ctx.font = "bold 88px 'Microsoft JhengHei', 'PingFang TC', sans-serif";
  ctx.shadowColor = 'rgba(150,10,10,0.9)';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#c8b98a';
  ctx.fillText('暗　途', GAME_W / 2 + sx, GAME_H / 2 + sy);
  ctx.restore();
}

function redVignette(strength) {
  if (strength <= 0) return;
  ctx.save();
  const grad = ctx.createRadialGradient(GAME_W / 2, GAME_H / 2, GAME_H * 0.25, GAME_W / 2, GAME_H / 2, GAME_H * 0.75);
  grad.addColorStop(0, 'rgba(120,0,0,0)');
  grad.addColorStop(1, `rgba(120,0,0,${strength})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);
  ctx.restore();
}

// ---------- 時間軸 ----------
const TIMELINE = 35;
const firedCues = {};
function cue(id, fn) { if (!firedCues[id]) { firedCues[id] = true; fn(); } }

function draw(t) {
  const flicker = 0.85 + Math.random() * 0.15;

  if (t < 5) {
    // Scene 1: 黑暗中甦醒，手電筒開啟，標題浮現
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    const camAlpha = clamp(t / 1.5, 0, 1);
    drawCorridorBase();
    drawDarknessMask(GAME_W / 2, GAME_H * 0.55, 40 + Math.sin(t * 3) * 6);
    if (t > 0.6) drawFlashlightCone(GAME_W / 2, GAME_H * 0.55, -Math.PI / 2, 0.55, 260, flicker);
    if (t > 1.4) titleCard(clamp((t - 1.4) / 1, 0, 1), t < 3 ? 1.5 : 0);
    if (t > 3.2) subtitle('你在一棟廢棄的療養院中醒來', clamp((t - 3.2) / 0.6, 0, 1), false);
    cue('c1', () => thump(0.5));

  } else if (t < 11) {
    // Scene 2: 手電筒是唯一光源，也是唯一暴露你的東西
    drawCorridorBase();
    const walkX = GAME_W / 2 + Math.sin((t - 5) * 1.2) * 40;
    const angle = -Math.PI / 2 + Math.sin((t - 5) * 0.8) * 0.5;
    drawDarknessMask(walkX, GAME_H * 0.55, 46);
    drawFlashlightCone(walkX, GAME_H * 0.55, angle, 0.5, 240, flicker);
    drawPlayerBack(GAME_W / 2, GAME_H * 0.86, 34);
    if (t > 5.4 && t < 8.2) subtitle('手電筒是你唯一的光源', clamp((t - 5.4) / 0.6, 0, 1), false);
    if (t > 8.2) subtitle('也是唯一暴露你的東西——它會被看見', clamp((t - 8.4) / 0.6, 0, 1), false);

  } else if (t < 17) {
    // Scene 3: 黑暗中的怪物，光照到才看得見
    drawCorridorBase();
    drawDarknessMask(GAME_W / 2, GAME_H * 0.55, 50);
    const swing = Math.sin((t - 11) * 1.5);
    const angle = -Math.PI / 2 + swing * 0.7;
    drawFlashlightCone(GAME_W / 2, GAME_H * 0.55, angle, 0.5, 260, flicker);
    const stalkerX = GAME_W * 0.7, stalkerY = GAME_H * 0.5;
    const beamHits = angle > -Math.PI / 2 - 0.15 && angle < -Math.PI / 2 + 0.9 && t > 13.5;
    drawStalker(stalkerX, stalkerY, 46, beamHits ? clamp((t - 13.5) / 0.4, 0, 1) : 0);
    drawPlayerBack(GAME_W / 2, GAME_H * 0.86, 34);
    if (t > 11.4 && t < 14) subtitle('黑暗中似乎有什麼東西在盯著你', clamp((t - 11.4) / 0.6, 0, 1), false);
    if (t > 14.2) subtitle('只有光照到它們時，你才能看見', clamp((t - 14.2) / 0.6, 0, 1), false);
    if (beamHits) cue('c3', () => stinger());

  } else if (t < 22) {
    // Scene 4: 遊玩實況——被發現後拔腿逃跑
    const runT = t - 17;
    const shake = clamp(runT / 0.5, 0, 1) * 6;
    ctx.save();
    ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    drawCorridorBase();
    const bobX = GAME_W / 2 + Math.sin(runT * 9) * 22;
    const bobY = GAME_H * 0.55 + Math.abs(Math.sin(runT * 9)) * 5;
    drawDarknessMask(bobX, bobY, 42 + Math.sin(runT * 9) * 5);
    const jitter = Math.sin(runT * 14) * 0.35;
    drawFlashlightCone(bobX, bobY, -Math.PI / 2 + jitter, 0.6, 250, flicker);
    const chaseProg = clamp(runT / 4.6, 0, 1);
    const stalkerX = GAME_W * (0.78 - chaseProg * 0.22);
    const stalkerY = GAME_H * (0.48 + chaseProg * 0.1);
    drawStalker(stalkerX, stalkerY, 40 + chaseProg * 18, 0.55 + Math.sin(runT * 10) * 0.15);
    drawPlayerBack(GAME_W / 2 - Math.sin(runT * 9) * 6, GAME_H * 0.86, 34 + Math.sin(runT * 9) * 2);
    ctx.restore();
    if (t > 17.2 && t < 19.2) subtitle('它發現你了——快跑！', clamp((t - 17.2) / 0.5, 0, 1), false);
    if (t > 19.6) subtitle('腳步聲、心跳聲，離你越來越近', clamp((t - 19.6) / 0.5, 0, 1), false);
    cue('c4', () => stinger());

  } else if (t < 27) {
    // Scene 5: 收集鑰匙
    drawCorridorBase();
    drawDarknessMask(GAME_W / 2, GAME_H * 0.55, 60);
    drawFlashlightCone(GAME_W / 2, GAME_H * 0.4, -Math.PI / 2, 0.55, 260, flicker);
    const keys = 3;
    for (let i = 0; i < keys; i++) {
      const kt = clamp((t - 22.4 - i * 1.3) / 0.5, 0, 1);
      if (kt <= 0) continue;
      const kx = GAME_W * (0.32 + i * 0.18);
      const ky = GAME_H * 0.42 - Math.sin(t * 2 + i) * 4;
      drawKey(kx, ky, 30, kt);
      if (kt >= 1) cue('key' + i, () => keyPickup());
    }
    if (t > 22.6) subtitle('甩開它，找到 3 把鑰匙', clamp((t - 22.6) / 0.6, 0, 1), false);
    drawPlayerBack(GAME_W / 2, GAME_H * 0.86, 34);

  } else if (t < 31) {
    // Scene 6: 逃出去
    drawCorridorBase();
    drawDarknessMask(GAME_W / 2, GAME_H * 0.55, 55);
    drawFlashlightCone(GAME_W / 2, GAME_H * 0.55, -Math.PI / 2, 0.55, 260, flicker);
    const glow = 0.6 + Math.sin(t * 3) * 0.4;
    drawExitDoor(GAME_W * 0.5, GAME_H * 0.72, 90, 150, clamp((t - 27) / 0.6, 0, 1) * glow);
    drawPlayerBack(GAME_W / 2, GAME_H * 0.86, 34);
    if (t > 27.4) subtitle('抵達綠色出口，逃離這裡', clamp((t - 27.4) / 0.6, 0, 1), false);
    if (t > 29.4) redVignette(clamp((t - 29.4) / 1, 0, 0.35));

  } else {
    // Scene 7: 收尾與行動呼籲
    ctx.fillStyle = '#050403';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    const a = clamp((t - 31) / 1, 0, 1);
    titleCard(a, 0);
    subtitle('你的選擇，將決定你的命運', clamp((t - 32) / 0.8, 0, 1), false);
    if (t > 33.5) subtitle('現在就挑戰《暗途》', clamp((t - 33.5) / 0.8, 0, 1), true);
    cue('cEnd', () => chime());
  }
}

// ---------- 播放控制 ----------
let startTime = null;
let playing = false;

function loop(now) {
  if (!playing) return;
  if (startTime === null) startTime = now;
  const t = (now - startTime) / 1000;
  if (t >= TIMELINE) {
    draw(TIMELINE - 0.01);
    playing = false;
    replayBtn.style.display = 'block';
    return;
  }
  draw(t);
  requestAnimationFrame(loop);
}

function play() {
  startTime = null;
  playing = true;
  replayBtn.style.display = 'none';
  Object.keys(firedCues).forEach(k => delete firedCues[k]);
  requestAnimationFrame(loop);
}

replayBtn.addEventListener('click', play);
play();
</script>
