<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#0d1117;}
  #stageWrap{width:3840px;height:2160px;overflow:hidden;}
  #stage{width:960px;height:540px;position:relative;background:linear-gradient(#1a2233,#0d1117);overflow:hidden;font-family:sans-serif;
    transform:scale(4);transform-origin:top left;}

  /* Room */
  .floor{position:absolute;bottom:0;left:0;width:100%;height:120px;background:#2b2f38;border-top:4px solid #444;}

  /* Timer / HUD */
  #hud{position:absolute;top:20px;left:20px;color:#ff4d4d;font-size:42px;font-weight:bold;text-shadow:0 0 10px #ff0000;letter-spacing:2px;}
  #label{position:absolute;top:20px;right:20px;color:#eee;font-size:22px;opacity:.85;}

  /* Bomb */
  #bomb{position:absolute;left:520px;bottom:120px;width:160px;height:160px;}
  #bombBody{position:absolute;left:20px;top:40px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#3a3a3a,#111 70%);box-shadow:0 0 30px rgba(0,0,0,.6);}
  #fuse{position:absolute;left:70px;top:-10px;width:8px;height:50px;background:#8a6d3b;border-radius:4px;transform-origin:bottom center;}
  #spark{position:absolute;left:60px;top:-22px;width:20px;height:20px;border-radius:50%;background:radial-gradient(circle,#fff,#ffcc00 40%,#ff5500 70%,transparent 100%);box-shadow:0 0 20px 8px rgba(255,140,0,.8);}
  .wire{position:absolute;height:6px;border-radius:3px;top:95px;}
  .wire.red{left:35px;width:90px;background:#e33;box-shadow:0 0 6px #e33;}
  .wire.blue{left:35px;width:90px;background:#39f;box-shadow:0 0 6px #39f;top:112px;}
  #panel{position:absolute;left:45px;top:60px;width:100px;height:40px;background:#222;border:2px solid #555;border-radius:4px;}
  #ledRow{position:absolute;left:50px;top:66px;display:flex;gap:6px;}
  .led{width:8px;height:8px;border-radius:50%;background:#500;}
  .led.on{background:#ff2222;box-shadow:0 0 8px #ff2222;}

  /* Conan */
  #conan{position:absolute;left:250px;bottom:120px;width:180px;height:260px;transform-origin:50% 100%;}
  #body{position:absolute;bottom:0;left:40px;width:100px;height:140px;background:#2255cc;border-radius:20px 20px 10px 10px;}
  #bowtie{position:absolute;left:78px;top:0px;width:24px;height:14px;background:#e33;clip-path:polygon(0 0,50% 50%,0 100%,100% 100%,50% 50%,100% 0);}
  #head{position:absolute;left:50px;bottom:130px;width:80px;height:80px;background:#ffe0bd;border-radius:50%;}
  #hair{position:absolute;left:50px;bottom:170px;width:80px;height:40px;background:#111;border-radius:50% 50% 0 0;}
  #glassesL,#glassesR{position:absolute;top:38px;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.15);border:3px solid #111;}
  #glassesL{left:56px;}
  #glassesR{left:80px;}
  #bridge{position:absolute;top:47px;left:76px;width:8px;height:3px;background:#111;}

  #armR{position:absolute;left:118px;bottom:170px;width:70px;height:16px;background:#2255cc;border-radius:8px;transform-origin:left center;transform:rotate(-25deg);}
  #handR{position:absolute;left:180px;bottom:225px;width:20px;height:20px;border-radius:50%;background:#ffe0bd;}
  #tool{position:absolute;left:196px;bottom:230px;width:36px;height:6px;background:#ccc;border-radius:2px;transform-origin:left center;}

  #sweat{position:absolute;left:120px;bottom:210px;width:10px;height:14px;border-radius:50% 50% 50% 0;background:#7fd1ff;transform:rotate(45deg);opacity:0;}

  #status{position:absolute;bottom:20px;left:0;width:100%;text-align:center;color:#eee;font-size:26px;font-weight:bold;text-shadow:0 2px 4px #000;}

  #flash{position:absolute;inset:0;background:#fff;opacity:0;}

  /* Explosion */
  #explosion{position:absolute;left:520px;bottom:120px;width:160px;height:160px;pointer-events:none;}
  #fireball{position:absolute;left:20px;top:40px;width:120px;height:120px;border-radius:50%;
    background:radial-gradient(circle,#fff 0%,#ffe066 20%,#ff8c00 45%,#ff2d00 70%,transparent 100%);
    opacity:0;transform:scale(0.2);}
  .debris{position:absolute;width:6px;height:6px;border-radius:1px;opacity:0;}
  #smokeWrap{position:absolute;inset:0;pointer-events:none;}
  .smoke{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(90,90,90,.85),rgba(60,60,60,0) 70%);opacity:0;}

  #blackout{position:absolute;inset:0;background:#000;opacity:0;}
  #failText{position:absolute;left:0;top:44%;width:100%;text-align:center;color:#ff3b3b;font-family:sans-serif;
    font-size:224px;font-weight:900;letter-spacing:24px;text-shadow:0 0 80px rgba(255,40,40,.8);opacity:0;}
  #failSub{position:absolute;left:0;top:58%;width:100%;text-align:center;color:#eee;font-family:sans-serif;font-size:80px;opacity:0;}
</style>
</head>
<body>
<div id="stageWrap">
<div id="stageShake">
<div id="stage">
  <div class="floor"></div>
  <div id="hud">00:10</div>
  <div id="label">名偵探柯南：拆彈行動（失敗版）</div>

  <div id="bomb">
    <div id="fuse"></div>
    <div id="spark"></div>
    <div id="bombBody"></div>
    <div class="wire red"></div>
    <div class="wire blue"></div>
    <div id="panel"></div>
    <div id="ledRow">
      <div class="led"></div><div class="led"></div><div class="led"></div>
    </div>
  </div>

  <div id="conan">
    <div id="hair"></div>
    <div id="head"></div>
    <div id="glassesL"></div><div id="glassesR"></div><div id="bridge"></div>
    <div id="sweat"></div>
    <div id="body"></div>
    <div id="bowtie"></div>
    <div id="armR"></div>
    <div id="handR"></div>
    <div id="tool"></div>
  </div>

  <div id="explosion">
    <div id="fireball"></div>
  </div>
  <div id="debrisWrap"></div>
  <div id="smokeWrap"></div>

  <div id="status">偵測電路中...</div>
  <div id="flash"></div>
</div>
</div>
</div>
<div id="blackout"></div>
<div id="failText">任務失敗</div>
<div id="failSub">真相……這次沒能趕上。</div>

<script>
  const hud = document.getElementById('hud');
  const status_el = document.getElementById('status');
  const leds = document.querySelectorAll('.led');
  const tool = document.getElementById('tool');
  const armR = document.getElementById('armR');
  const sweat = document.getElementById('sweat');
  const wireRed = document.querySelector('.wire.red');
  const wireBlue = document.querySelector('.wire.blue');
  const spark = document.getElementById('spark');
  const fuse = document.getElementById('fuse');
  const flash = document.getElementById('flash');
  const conan = document.getElementById('conan');
  const fireball = document.getElementById('fireball');
  const stageShake = document.getElementById('stageShake');
  const debrisWrap = document.getElementById('debrisWrap');
  const smokeWrap = document.getElementById('smokeWrap');
  const blackout = document.getElementById('blackout');
  const failText = document.getElementById('failText');
  const failSub = document.getElementById('failSub');

  const DURATION = 12; // seconds
  const CUT_TIME = 9;  // when the (wrong) wire is cut

  // Debris particles
  const debrisColors = ['#ff5252','#ffa726','#8d6e63','#bdbdbd','#37474f'];
  const NUM_DEBRIS = 45;
  function buildDebris(){
    for(let i=0;i<NUM_DEBRIS;i++){
      const d = document.createElement('div');
      d.className='debris';
      d.style.left='560px'; d.style.top='260px';
      d.style.background = debrisColors[i%debrisColors.length];
      const angle = Math.random()*Math.PI*2;
      const speed = 80+Math.random()*220;
      d.dataset.vx = (Math.cos(angle)*speed).toFixed(1);
      d.dataset.vy = (Math.sin(angle)*speed - 60).toFixed(1);
      d.dataset.spin = (Math.random()*720-360).toFixed(0);
      debrisWrap.appendChild(d);
    }
  }
  buildDebris();
  const debrisEls = document.querySelectorAll('.debris');

  // Smoke puffs
  const NUM_SMOKE = 10;
  function buildSmoke(){
    for(let i=0;i<NUM_SMOKE;i++){
      const s = document.createElement('div');
      s.className='smoke';
      const size = 60+Math.random()*80;
      s.style.width = size+'px';
      s.style.height = size+'px';
      s.style.left = (500+Math.random()*120)+'px';
      s.style.top = (200+Math.random()*60)+'px';
      s.dataset.delay = (Math.random()*0.6).toFixed(2);
      s.dataset.rise = (60+Math.random()*80).toFixed(0);
      s.dataset.drift = ((Math.random()-0.5)*60).toFixed(0);
      smokeWrap.appendChild(s);
    }
  }
  buildSmoke();
  const smokeEls = document.querySelectorAll('.smoke');

  function render(t){
    const remainSec = Math.max(0, Math.ceil(CUT_TIME - t));
    const mm = Math.floor(remainSec/60), ss = remainSec%60;
    hud.textContent = String(mm).padStart(2,'0') + ':' + String(ss).padStart(2,'0');
    hud.style.color = '#ff4d4d';
    hud.style.textShadow = '0 0 10px #ff0000';

    const blink = Math.floor(t*4)%2===0;
    leds.forEach((l,i)=>{
      if (t < CUT_TIME) l.classList.toggle('on', blink && (Math.floor(t*4+i)%3===0));
      else l.classList.remove('on');
    });

    const flick = 0.85 + 0.15*Math.sin(t*20);
    spark.style.transform = `scale(${flick})`;
    spark.style.opacity = t < CUT_TIME ? 1 : 0;
    fuse.style.opacity = t < CUT_TIME ? 1 : 0;

    const PHASE1_END = 2;
    const PHASE2_END = 5;

    if (t < PHASE1_END) {
      status_el.textContent = '偵測電路中...';
      const wobble = Math.sin(t*1.5)*4;
      armR.style.transform = `rotate(${-25+wobble}deg)`;
      tool.style.transform = 'rotate(0deg)';
      sweat.style.opacity = 0;
    } else if (t < PHASE2_END) {
      status_el.textContent = '時間快到了...到底是哪一條線？！';
      const wig = Math.sin((t-PHASE1_END)*6)*6;
      armR.style.transform = `rotate(${-25+wig}deg)`;
      sweat.style.opacity = Math.min(1,(t-PHASE1_END)/1.5);
    } else if (t < CUT_TIME) {
      status_el.textContent = '好...就剪這條紅線！';
      const p = (t-PHASE2_END)/(CUT_TIME-PHASE2_END);
      armR.style.transform = `rotate(${-25 - p*15 + Math.sin(t*3)*2}deg)`;
      tool.style.transform = `rotate(${p*35}deg)`;
      sweat.style.opacity = 1;
    } else {
      // WRONG wire cut at CUT_TIME -> explosion sequence
      const et = t - CUT_TIME;
      wireRed.style.opacity = 0;
      armR.style.transform = 'rotate(10deg)';
      tool.style.transform = 'rotate(0deg)';

      if (et < 0.15) {
        status_el.textContent = '咦...？這條不對...！';
      } else {
        status_el.textContent = '轟——！';
      }

      // Flash + fireball burst
      if (et < 0.5) {
        flash.style.opacity = Math.max(0, 1 - et*6);
        const bp = Math.min(1, et/0.35);
        fireball.style.opacity = bp < 1 ? 1 : Math.max(0, 1-(et-0.35)*3);
        fireball.style.transform = `scale(${0.2 + bp*1.6})`;
      } else {
        flash.style.opacity = 0;
        fireball.style.opacity = Math.max(0, 0.6 - et*0.8);
        fireball.style.transform = `scale(${1.8 + et*0.4})`;
      }

      // Screen shake for first ~1s
      if (et < 1.0) {
        const decay = 1 - et;
        const sx = (Math.random()-0.5)*24*decay;
        const sy = (Math.random()-0.5)*24*decay;
        stageShake.style.transform = `translate(${sx}px, ${sy}px)`;
      } else {
        stageShake.style.transform = 'translate(0,0)';
      }

      // Debris flying outward + falling (simple ballistic)
      debrisEls.forEach(d=>{
        const vx = parseFloat(d.dataset.vx), vy = parseFloat(d.dataset.vy);
        const spin = parseFloat(d.dataset.spin);
        if (et <= 0) { d.style.opacity = 0; return; }
        const dt = Math.min(et, 2.5);
        const x = vx*dt;
        const y = vy*dt + 0.5*260*dt*dt;
        d.style.opacity = et < 2.2 ? 1 : Math.max(0, 1-(et-2.2)*3);
        d.style.transform = `translate(${x}px, ${y}px) rotate(${spin*dt}deg)`;
      });

      // Rising smoke
      smokeEls.forEach(s=>{
        const delay = parseFloat(s.dataset.delay);
        const rise = parseFloat(s.dataset.rise);
        const drift = parseFloat(s.dataset.drift);
        const lt = et - delay;
        if (lt <= 0) { s.style.opacity = 0; return; }
        const life = Math.min(lt, 6);
        s.style.opacity = Math.min(0.75, lt*2) * Math.max(0, 1-life/6);
        s.style.transform = `translate(${drift*life*0.3}px, ${-rise*life*0.3}px) scale(${1+life*0.15})`;
      });

      // Conan gets knocked back and falls
      if (et < 0.6) {
        const kp = Math.min(1, et/0.6);
        conan.style.transform = `translate(${-kp*40}px, 0) rotate(${-kp*15}deg)`;
      } else {
        const fp = Math.min(1, (et-0.6)/0.5);
        conan.style.transform = `translate(${-40 - fp*10}px, ${fp*20}px) rotate(${-15 - fp*75}deg)`;
      }

      // Fade to black + "Mission Failed" title in the last stretch
      if (et > 2.2) {
        const bp = Math.min(1, (et-2.2)/1.2);
        blackout.style.opacity = bp*0.92;
        failText.style.opacity = Math.max(0, (bp-0.3)/0.7);
        failSub.style.opacity = Math.max(0, (bp-0.55)/0.45);
      } else {
        blackout.style.opacity = 0;
        failText.style.opacity = 0;
        failSub.style.opacity = 0;
      }
    }
  }

  window.__render = render;
  window.__DURATION = DURATION;

  // Autoplay driver: runs the deterministic render(t) off real elapsed time,
  // looping with a short pause on the final frame. Falls back to a static
  // final frame when the viewer prefers reduced motion.
  (function autoplay(){
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      render(DURATION);
      return;
    }
    const PAUSE_AFTER_END = 2.5;
    let startTs = null;
    function loop(ts){
      if (startTs === null) startTs = ts;
      let t = (ts - startTs) / 1000;
      if (t > DURATION + PAUSE_AFTER_END) { startTs = ts; t = 0; }
      render(Math.min(t, DURATION));
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
</script>
</body>
</html>
