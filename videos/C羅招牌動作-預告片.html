<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="author" content="陳威辰、JOJO">
<title>SIUUU C羅招牌動作 預告片</title>
<style>
  :root{
    --red:#c1121f; --red2:#ef3b4a; --gold:#ffd166; --gold2:#e0b25e;
    --bg:#05070f; --card:#0f1424; --border:rgba(255,209,102,.18);
    --text:#f6f1e3; --muted:#9aa3bb;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ width:100%; height:100%; overflow:hidden; background:#000; }
  body{
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;
    display:flex; align-items:center; justify-content:center;
  }
  #stage{
    position:relative; width:100%; height:100%; max-width:800px; aspect-ratio:9/16;
    background:
      radial-gradient(900px 600px at 50% -8%, rgba(255,209,102,.14), transparent 60%),
      radial-gradient(700px 500px at -10% 30%, rgba(193,18,31,.16), transparent 60%),
      radial-gradient(600px 500px at 110% 70%, rgba(255,209,102,.10), transparent 60%),
      linear-gradient(180deg, var(--bg), #0a0e1c 60%, #101a33);
    overflow:hidden; color:var(--text);
  }
  @media (min-aspect-ratio: 9/16){ #stage{ height:100%; width:auto; } }
  #cam{ position:absolute; inset:0; transform-origin:50% 50%; }
  .layer{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; opacity:0; }

  /* 看台裝飾（靜態，僅視覺氛圍） */
  .crowd{ position:absolute; left:0; right:0; top:0; height:16%; display:flex; overflow:hidden; opacity:.55; }
  .crowd i{ flex:none; width:7px; height:9px; margin:2px; border-radius:2px; }

  .cap{
    position:absolute; left:50%; bottom:9%; transform:translateX(-50%);
    font-size:clamp(13px,4vw,18px); font-weight:700; letter-spacing:1.5px; text-align:center;
    color:var(--text); background:rgba(5,7,15,.6); border:1px solid var(--border);
    padding:9px 22px; border-radius:999px; white-space:nowrap; opacity:0;
    box-shadow:0 8px 24px rgba(0,0,0,.4);
  }

  /* ---- Scene 1 ---- */
  .siuuu{
    font:900 clamp(48px,15vw,84px) "Arial Narrow",sans-serif; letter-spacing:2px;
    color:var(--text); text-shadow:0 0 40px rgba(230,57,70,.7);
    opacity:0; transform:scale(1.7);
  }
  .s1sub{
    margin-top:8px; font-size:clamp(17px,5vw,24px); font-weight:700; letter-spacing:6px;
    color:var(--gold); opacity:0; transform:translateY(14px);
  }
  .s1sub2{
    margin-top:6px; font-size:clamp(11px,3.2vw,13px); color:var(--muted); letter-spacing:2px;
    opacity:0; transform:translateY(10px);
  }

  /* ---- Scene 2: 球員剪影動作 + 徽章 ---- */
  #s2 .field{
    position:absolute; left:0; right:0; bottom:0; height:34%;
    background:linear-gradient(180deg, #1e6338, #123f26);
    border-top:3px solid rgba(244,244,244,.5);
  }
  #s2 .player{ position:absolute; left:50%; bottom:34%; width:70px; height:110px; transform:translateX(-50%); opacity:0; }
  #s2 .player .body{
    position:absolute; left:22px; top:26px; width:26px; height:40px; border-radius:12px;
    background:linear-gradient(160deg, var(--red2), var(--red)); border:2px solid #141b26;
  }
  #s2 .player .head{
    position:absolute; left:24px; top:2px; width:22px; height:22px; border-radius:50%;
    background:#e8b98a; border:2px solid #141b26;
  }
  #s2 .player .legL, #s2 .player .legR{
    position:absolute; left:26px; top:60px; width:9px; height:38px; border-radius:6px;
    background:#0b3d2e; border:2px solid #141b26; transform-origin:top center;
  }
  #s2 .player .legR{ left:36px; }
  #s2 .player .armL, #s2 .player .armR{
    position:absolute; left:16px; top:30px; width:8px; height:28px; border-radius:6px;
    background:var(--red); border:2px solid #141b26; transform-origin:top center;
  }
  #s2 .player .armR{ left:46px; }
  .badges{
    position:absolute; top:9%; left:50%; transform:translateX(-50%); display:flex; gap:10px; flex-wrap:wrap;
    justify-content:center; max-width:320px;
  }
  .badge{
    display:flex; flex-direction:column; align-items:center; gap:5px; opacity:0; transform:translateY(-24px) scale(.7);
  }
  .badge .dot{
    width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(150deg, var(--gold), var(--gold2)); color:#241a05; font-size:18px; font-weight:800;
    box-shadow:0 8px 20px rgba(255,209,102,.35); border:2px solid #141b26;
  }
  .badge .lb{ font-size:10px; color:var(--muted); letter-spacing:.5px; white-space:nowrap; }
  .s2head{ position:absolute; top:24.5%; left:50%; transform:translateX(-50%); text-align:center; opacity:0; }
  .s2head h2{ font-size:clamp(20px,5.6vw,26px); font-weight:800; letter-spacing:2px; color:var(--text); }
  .s2head p{ margin-top:5px; font-size:clamp(11px,3.2vw,13px); color:var(--muted); letter-spacing:1px; }

  /* ---- Scene 3: 功能亮點 ---- */
  #s3{ gap:16px; }
  .pill{
    display:flex; align-items:center; gap:12px; padding:14px 22px; border-radius:999px;
    background:var(--card); border:1px solid var(--border); min-width:260px;
    opacity:0; transform:translateX(-60px);
    box-shadow:0 12px 30px rgba(0,0,0,.45);
  }
  .pill .ic{
    width:34px; height:34px; border-radius:50%; flex:none; display:flex; align-items:center; justify-content:center;
    color:#241a05; font-size:16px; font-weight:800;
  }
  .pill span.label{ font-size:14.5px; font-weight:700; letter-spacing:.5px; color:var(--text); }
  .pill:nth-child(1) .ic{ background:linear-gradient(135deg,var(--gold),var(--gold2)); }
  .pill:nth-child(2) .ic{ background:linear-gradient(135deg,var(--red2),var(--red)); }
  .pill:nth-child(3) .ic{ background:linear-gradient(135deg,#ffe94d,#c8b400); }

  /* ---- Scene 4: CTA ---- */
  #s4 .badge-ring{
    width:96px; height:96px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(150deg, var(--gold), var(--gold2));
    box-shadow:0 18px 50px rgba(255,209,102,.4);
    transform:scale(.6); opacity:0; font-size:40px;
  }
  .cta-title{ margin-top:20px; font-size:clamp(22px,6.4vw,30px); font-weight:800; letter-spacing:1.5px; opacity:0; transform:translateY(14px); }
  .cta-sub{ margin-top:8px; font-size:clamp(13px,3.6vw,15px); color:var(--gold); font-weight:700; letter-spacing:1px; opacity:0; transform:translateY(10px); }
  .cta-url{ margin-top:16px; padding:9px 20px; border-radius:999px; border:1px solid var(--border); background:var(--card); font-size:12px; color:var(--muted); opacity:0; }

  #ui{ position:absolute; inset:0; z-index:20; pointer-events:none; }
  #muteBtn{
    position:absolute; top:16px; right:16px; width:44px; height:44px; border-radius:50%;
    background:rgba(5,7,15,.6); border:1px solid var(--border); color:var(--text);
    display:flex; align-items:center; justify-content:center; font-size:18px; cursor:pointer; pointer-events:auto;
  }
  #hint{
    position:absolute; top:16px; left:16px; padding:8px 14px; border-radius:999px;
    background:rgba(5,7,15,.6); border:1px solid var(--border); font-size:11.5px; color:var(--muted);
    letter-spacing:.5px; opacity:1; transition:opacity .4s;
  }
  #replayWrap{
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(4,5,10,.6); pointer-events:auto; z-index:25;
  }
  #replayWrap.show{ display:flex; }
  #replayBtn{
    min-width:150px; min-height:52px; padding:12px 30px; border-radius:999px; border:none; cursor:pointer;
    background:linear-gradient(92deg, var(--gold), var(--gold2)); color:#241a05;
    font-size:16px; font-weight:800; letter-spacing:2px;
    box-shadow:0 14px 36px rgba(255,209,102,.4);
    display:flex; align-items:center; gap:8px;
  }
</style>
</head>
<body>

<div id="stage">
  <div id="cam">
    <div class="crowd" id="crowd"></div>

    <!-- Scene 1 -->
    <div class="layer" id="s1">
      <div class="siuuu" id="s1txt">SIUUU</div>
      <div class="s1sub" id="s1sub">C 羅 招 牌 動 作</div>
      <div class="s1sub2" id="s1sub2">球迷筆記 · 五個招牌瞬間電影化重現</div>
    </div>

    <!-- Scene 2 -->
    <div class="layer" id="s2">
      <div class="s2head" id="s2head"><h2>五大招牌動作圖鑑</h2><p>看他如何再現每個經典瞬間</p></div>
      <div class="badges" id="badges"></div>
      <div class="player" id="player">
        <div class="head"></div><div class="body"></div>
        <div class="armL"></div><div class="armR"></div>
        <div class="legL"></div><div class="legR"></div>
      </div>
      <div class="field"></div>
    </div>

    <!-- Scene 3 -->
    <div class="layer" id="s3">
      <div class="pill"><div class="ic">▶</div><span class="label">章節選單，跳播任一招式</span></div>
      <div class="pill"><div class="ic">★</div><span class="label">收集徽章，蓋章解鎖成就</span></div>
      <div class="pill"><div class="ic">♪</div><span class="label">臨場音效，球場氣氛全開</span></div>
    </div>

    <!-- Scene 4 -->
    <div class="layer" id="s4">
      <div class="badge-ring" id="s4ring">⚽</div>
      <div class="cta-title">SIUUU！現在就去體驗</div>
      <div class="cta-sub">C羅招牌動作 · 圖鑑收集</div>
      <div class="cta-url">wowhome-ai.vercel.app/pro.html</div>
    </div>

    <div class="cap" id="caption"></div>
  </div>
</div>

<div id="ui">
  <div id="hint">🔇 點聲音鈕開啟音效</div>
  <button id="muteBtn" aria-label="切換聲音">🔇</button>
  <div id="replayWrap"><button id="replayBtn">↻ 重新播放</button></div>
</div>

<script>
/* ===================== 看台裝飾（靜態粒子） ===================== */
(function(){
  const crowd = document.getElementById('crowd');
  const cols = ['#31406b','#443454','#553a45','#2c3550','#ffd166'];
  let html = '';
  for (let i = 0; i < 90; i++){
    const c = cols[(Math.random() * cols.length) | 0];
    html += '<i style="background:' + c + ';opacity:' + (0.4 + Math.random() * 0.5).toFixed(2) + '"></i>';
  }
  crowd.innerHTML = html;
})();

/* ===================== Web Audio 合成音效與音樂 ===================== */
let actx = null, muted = true;
function ac(){ if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); return actx; }
function chime(freq, dur, delay, type, vol){
  if (muted) return;
  const c = ac(); const t0 = c.currentTime + (delay || 0);
  const o = c.createOscillator(), g = c.createGain();
  o.type = type || 'sine'; o.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol || .12, t0 + .02);
  g.gain.exponentialRampToValueAtTime(.0001, t0 + dur);
  o.connect(g); g.connect(c.destination);
  o.start(t0); o.stop(t0 + dur + .05);
}
function whistle(delay){
  if (muted) return;
  const c = ac(); const t0 = c.currentTime + (delay || 0);
  const o = c.createOscillator(), g = c.createGain();
  o.type = 'square'; o.frequency.setValueAtTime(2350, t0);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(.05, t0 + .02);
  g.gain.exponentialRampToValueAtTime(.0001, t0 + .16);
  o.connect(g); g.connect(c.destination);
  o.start(t0); o.stop(t0 + .2);
}
function roar(delay, dur, vol){
  if (muted) return;
  const c = ac(); const t0 = c.currentTime + (delay || 0);
  const len = Math.floor(c.sampleRate * dur);
  const buf = c.createBuffer(1, len, c.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = c.createBufferSource(); src.buffer = buf;
  const bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.1;
  bp.frequency.setValueAtTime(220, t0);
  bp.frequency.exponentialRampToValueAtTime(650, t0 + dur);
  const g = c.createGain(); g.gain.value = vol || .12;
  src.connect(bp); bp.connect(g); g.connect(c.destination);
  src.start(t0);
}

/* ---- 背景音樂：勝利進行曲式和弦，20 秒循環 ---- */
let musicNodes = [], musicTimer = null;
const CHORDS = [
  [261.63, 329.63, 392.00],   // C
  [293.66, 349.23, 440.00],   // Dm/F color
  [220.00, 261.63, 329.63],   // Am
  [349.23, 440.00, 523.25],   // F
];
const BASS = [130.81, 146.83, 110.00, 174.61];
function playChord(freqs, bassFreq, t0, dur){
  const c = ac();
  freqs.forEach(f => {
    const o = c.createOscillator(), g = c.createGain();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(f, t0);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(.022, t0 + .4);
    g.gain.linearRampToValueAtTime(.015, t0 + dur - .6);
    g.gain.linearRampToValueAtTime(0, t0 + dur);
    const lp = c.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 1400;
    o.connect(lp); lp.connect(g); g.connect(c.destination);
    o.start(t0); o.stop(t0 + dur + .05);
    musicNodes.push(o);
  });
  const bo = c.createOscillator(), bg = c.createGain();
  bo.type = 'triangle'; bo.frequency.setValueAtTime(bassFreq, t0);
  bg.gain.setValueAtTime(0, t0);
  bg.gain.linearRampToValueAtTime(.05, t0 + .05);
  bg.gain.linearRampToValueAtTime(0, t0 + dur * .85);
  bo.connect(bg); bg.connect(c.destination);
  bo.start(t0); bo.stop(t0 + dur + .05);
  musicNodes.push(bo);
}
function startMusic(){
  stopMusic();
  const c = ac();
  const barDur = 5;
  for (let i = 0; i < CHORDS.length; i++) playChord(CHORDS[i], BASS[i], c.currentTime + i * barDur, barDur);
  musicTimer = setTimeout(() => { if (!muted) startMusic(); }, CHORDS.length * barDur * 1000);
}
function stopMusic(){
  if (musicTimer) { clearTimeout(musicTimer); musicTimer = null; }
  musicNodes.forEach(n => { try { n.stop(); } catch (e) {} });
  musicNodes = [];
}

const muteBtn = document.getElementById('muteBtn');
const hint = document.getElementById('hint');
muteBtn.addEventListener('click', () => {
  muted = !muted;
  if (!muted){ ac(); if (ac().state === 'suspended') ac().resume(); startMusic(); }
  else stopMusic();
  muteBtn.textContent = muted ? '🔇' : '🔊';
  hint.style.opacity = muted ? '1' : '0';
});

/* ===================== 徽章資料 ===================== */
const BADGES = [
  { ic: '⚡', lb: '電梯球' },
  { ic: '🦅', lb: '滯空頭槌' },
  { ic: '🔄', lb: '倒掛金鈎' },
  { ic: '↔', lb: 'Chop 變向' },
  { ic: '★', lb: 'SIUUU' },
];
const badgesEl = document.getElementById('badges');
BADGES.forEach(b => {
  const el = document.createElement('div');
  el.className = 'badge';
  el.innerHTML = '<div class="dot">' + b.ic + '</div><div class="lb">' + b.lb + '</div>';
  badgesEl.appendChild(el);
});

/* ===================== 動畫時間軸（20 秒） ===================== */
const easeOutBack = 'cubic-bezier(.34,1.56,.64,1)';
const easeOut = 'cubic-bezier(.16,1,.3,1)';
function anim(el, kf, opts){ return el.animate(kf, Object.assign({ fill: 'forwards', easing: easeOut }, opts)); }

const caption = document.getElementById('caption');
function showCaption(text, delay, dur){
  setTimeout(() => {
    caption.textContent = text;
    anim(caption, [{ opacity: 0, transform: 'translate(-50%,10px)' }, { opacity: 1, transform: 'translate(-50%,0)' }], { duration: 380 });
    setTimeout(() => anim(caption, [{ opacity: 1 }, { opacity: 0 }], { duration: 300 }), dur);
  }, delay);
}

let timers = [];
function T(fn, ms){ timers.push(setTimeout(fn, ms)); }
function clearTimers(){ timers.forEach(clearTimeout); timers = []; }

function playerPose(el, pose, dur, delay, ez){
  anim(el, pose, { duration: dur, delay: delay || 0, easing: ez || easeOut });
}

function playTimeline(){
  clearTimers();
  document.getElementById('replayWrap').classList.remove('show');
  if (!muted) startMusic();
  [1,2,3,4].forEach(n => { document.getElementById('s' + n).style.opacity = 0; });

  /* ---- Scene 1 : 0 - 5s : SIUUU 標題 ---- */
  const s1 = document.getElementById('s1');
  s1.style.opacity = 1;
  whistle(0.05);
  anim(document.getElementById('s1txt'), [
    { opacity: 0, transform: 'scale(1.7)' },
    { opacity: 1, transform: 'scale(0.95)', offset: .7 },
    { opacity: 1, transform: 'scale(1)' }
  ], { duration: 700, easing: easeOutBack });
  chime(660, .4, .2, 'sawtooth', .1);
  anim(document.getElementById('s1sub'), [
    { opacity: 0, transform: 'translateY(14px)' }, { opacity: 1, transform: 'translateY(0)' }
  ], { duration: 500, delay: 500 });
  anim(document.getElementById('s1sub2'), [
    { opacity: 0, transform: 'translateY(10px)' }, { opacity: 1, transform: 'translateY(0)' }
  ], { duration: 450, delay: 850 });
  T(() => roar(0, .8, .1), 1000);
  T(() => anim(s1, [{ opacity: 1 }, { opacity: 0 }], { duration: 450 }), 4600);

  /* ---- Scene 2 : 5s - 12.5s : 招牌動作 + 徽章 ---- */
  T(() => {
    const s2 = document.getElementById('s2');
    s2.style.opacity = 1;
    anim(document.getElementById('s2head'), [
      { opacity: 0, transform: 'translate(-50%,-14px)' }, { opacity: 1, transform: 'translate(-50%,0)' }
    ], { duration: 450 });
    document.querySelectorAll('.badge').forEach((b, i) => {
      anim(b, [
        { opacity: 0, transform: 'translateY(-24px) scale(.7)' },
        { opacity: 1, transform: 'translateY(3px) scale(1.08)', offset: .75 },
        { opacity: 1, transform: 'translateY(0) scale(1)' }
      ], { duration: 500, delay: 250 + i * 220, easing: easeOutBack });
      T(() => chime(620 + i * 140, .2, 0, 'triangle', .1), 250 + i * 220);
    });

    const player = document.getElementById('player');
    player.style.opacity = 1;
    /* 助跑蹲下 -> 起跳騰空 -> 落地慶祝 SIUUU 姿勢 */
    anim(player, [
      { transform: 'translateX(-50%) translateY(0) rotate(0deg)', offset: 0 },
      { transform: 'translateX(-50%) translateY(6px) scaleY(.9) rotate(0deg)', offset: .28 },
      { transform: 'translateX(-50%) translateY(-46px) rotate(-8deg)', offset: .55 },
      { transform: 'translateX(-50%) translateY(-58px) rotate(0deg)', offset: .68 },
      { transform: 'translateX(-50%) translateY(0) rotate(0deg)', offset: 1 }
    ], { duration: 2200, delay: 1600, easing: 'ease-in-out' });
    const armL = player.querySelector('.armL'), armR = player.querySelector('.armR');
    const legL = player.querySelector('.legL'), legR = player.querySelector('.legR');
    anim(armL, [
      { transform: 'rotate(10deg)', offset: 0 },
      { transform: 'rotate(-30deg)', offset: .55 },
      { transform: 'rotate(-70deg)', offset: .72 },
      { transform: 'rotate(-70deg)', offset: 1 }
    ], { duration: 2200, delay: 1600, easing: 'ease-in-out' });
    anim(armR, [
      { transform: 'rotate(-10deg)', offset: 0 },
      { transform: 'rotate(30deg)', offset: .55 },
      { transform: 'rotate(70deg)', offset: .72 },
      { transform: 'rotate(70deg)', offset: 1 }
    ], { duration: 2200, delay: 1600, easing: 'ease-in-out' });
    anim(legL, [
      { transform: 'rotate(0deg)', offset: 0 },
      { transform: 'rotate(-16deg)', offset: .55 },
      { transform: 'rotate(10deg)', offset: .72 },
      { transform: 'rotate(0deg)', offset: 1 }
    ], { duration: 2200, delay: 1600, easing: 'ease-in-out' });
    anim(legR, [
      { transform: 'rotate(0deg)', offset: 0 },
      { transform: 'rotate(16deg)', offset: .55 },
      { transform: 'rotate(-10deg)', offset: .72 },
      { transform: 'rotate(0deg)', offset: 1 }
    ], { duration: 2200, delay: 1600, easing: 'ease-in-out' });
    T(() => chime(880, .35, 0, 'square', .1), 1600 + 2200 * .55);
    T(() => roar(0, .7, .16), 1600 + 2200 * .6);

    showCaption('五個瞬間，電影化重現', 900, 3200);
  }, 5050);

  T(() => anim(document.getElementById('s2'), [{ opacity: 1 }, { opacity: 0 }], { duration: 450 }), 12500);

  /* ---- Scene 3 : 12.5s - 16.5s : 功能亮點 ---- */
  T(() => {
    const s3 = document.getElementById('s3');
    s3.style.opacity = 1;
    document.querySelectorAll('#s3 .pill').forEach((p, i) => {
      anim(p, [
        { opacity: 0, transform: 'translateX(-60px)' },
        { opacity: 1, transform: 'translateX(0)' }
      ], { duration: 480, delay: i * 320, easing: easeOutBack });
      T(() => chime(500 + i * 220, .22, 0, 'sine', .1), i * 320);
    });
    showCaption('章節選單 · 直接重看任一招', 1200, 2400);
  }, 12950);

  T(() => anim(document.getElementById('s3'), [{ opacity: 1 }, { opacity: 0 }], { duration: 450 }), 16900);
