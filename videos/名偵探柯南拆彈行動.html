<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#0d1117;}
  #stageWrap{width:3840px;height:2160px;overflow:hidden;}
  #stage{width:960px;height:540px;position:relative;background:linear-gradient(#1a2233,#0d1117);overflow:hidden;font-family:sans-serif;
    transform:scale(4);transform-origin:top left;}

  /* Room */
  .floor{position:absolute;bottom:0;left:0;width:100%;height:120px;background:#2b2f38;border-top:4px solid #444;}

  /* Timer / HUD */
  #hud{position:absolute;top:20px;left:20px;color:#ff4d4d;font-size:42px;font-weight:bold;text-shadow:0 0 10px #ff0000;letter-spacing:2px;}
  #label{position:absolute;top:20px;right:20px;color:#eee;font-size:22px;opacity:.85;}

  /* Bomb */
  #bomb{position:absolute;left:520px;bottom:120px;width:160px;height:160px;}
  #bombBody{position:absolute;left:20px;top:40px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#3a3a3a,#111 70%);box-shadow:0 0 30px rgba(0,0,0,.6);}
  #fuse{position:absolute;left:70px;top:-10px;width:8px;height:50px;background:#8a6d3b;border-radius:4px;transform-origin:bottom center;}
  #spark{position:absolute;left:60px;top:-22px;width:20px;height:20px;border-radius:50%;background:radial-gradient(circle,#fff,#ffcc00 40%,#ff5500 70%,transparent 100%);box-shadow:0 0 20px 8px rgba(255,140,0,.8);}
  .wire{position:absolute;height:6px;border-radius:3px;top:95px;}
  .wire.red{left:35px;width:90px;background:#e33;box-shadow:0 0 6px #e33;}
  .wire.blue{left:35px;width:90px;background:#39f;box-shadow:0 0 6px #39f;top:112px;}
  #panel{position:absolute;left:45px;top:60px;width:100px;height:40px;background:#222;border:2px solid #555;border-radius:4px;}
  #ledRow{position:absolute;left:50px;top:66px;display:flex;gap:6px;}
  .led{width:8px;height:8px;border-radius:50%;background:#500;}
  .led.on{background:#ff2222;box-shadow:0 0 8px #ff2222;}

  /* Conan */
  #conan{position:absolute;left:250px;bottom:120px;width:180px;height:260px;}
  #body{position:absolute;bottom:0;left:40px;width:100px;height:140px;background:#2255cc;border-radius:20px 20px 10px 10px;}
  #bowtie{position:absolute;left:78px;top:0px;width:24px;height:14px;background:#e33;clip-path:polygon(0 0,50% 50%,0 100%,100% 100%,50% 50%,100% 0);}
  #head{position:absolute;left:50px;bottom:130px;width:80px;height:80px;background:#ffe0bd;border-radius:50%;}
  #hair{position:absolute;left:50px;bottom:170px;width:80px;height:40px;background:#111;border-radius:50% 50% 0 0;}
  #glassesL,#glassesR{position:absolute;top:38px;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.15);border:3px solid #111;}
  #glassesL{left:56px;}
  #glassesR{left:80px;}
  #bridge{position:absolute;top:47px;left:76px;width:8px;height:3px;background:#111;}

  #armR{position:absolute;left:118px;bottom:170px;width:70px;height:16px;background:#2255cc;border-radius:8px;transform-origin:left center;transform:rotate(-25deg);}
  #handR{position:absolute;left:180px;bottom:225px;width:20px;height:20px;border-radius:50%;background:#ffe0bd;}
  #tool{position:absolute;left:196px;bottom:230px;width:36px;height:6px;background:#ccc;border-radius:2px;transform-origin:left center;}

  #sweat{position:absolute;left:120px;bottom:210px;width:10px;height:14px;border-radius:50% 50% 50% 0;background:#7fd1ff;transform:rotate(45deg);opacity:0;}

  #status{position:absolute;bottom:20px;left:0;width:100%;text-align:center;color:#eee;font-size:26px;font-weight:bold;text-shadow:0 2px 4px #000;}

  #flash{position:absolute;inset:0;background:#fff;opacity:0;}
  #confetti{position:absolute;inset:0;pointer-events:none;}
  .confetti-piece{position:absolute;width:8px;height:8px;opacity:0;}

  /* Generic cheering crowd (procedurally varied, not any specific character) - they fly in */
  #crowd{position:absolute;inset:0;overflow:visible;}
  .villager{position:absolute;width:34px;height:50px;}
  .villager .body{position:absolute;bottom:0;left:5px;width:24px;height:30px;border-radius:10px 10px 4px 4px;}
  .villager .head{position:absolute;bottom:26px;left:2px;width:30px;height:26px;border-radius:50%;}
  .villager .earL,.villager .earR{position:absolute;bottom:44px;width:10px;height:14px;border-radius:50%;}
  .villager .earL{left:0px;} .villager .earR{left:20px;}
  .villager .cheekL,.villager .cheekR{position:absolute;bottom:32px;width:5px;height:5px;border-radius:50%;background:rgba(255,150,150,.6);}
  .villager .cheekL{left:4px;} .villager .cheekR{left:22px;}
  .villager .wingL,.villager .wingR{position:absolute;bottom:20px;width:16px;height:22px;border-radius:60% 40% 60% 40%;opacity:.85;}
  .villager .wingL{left:-12px;transform-origin:right center;}
  .villager .wingR{left:30px;transform-origin:left center;}
</style>
</head>
<body>
<div id="stageWrap">
<div id="stage">
  <div class="floor"></div>
  <div id="hud">00:10</div>
  <div id="label">名偵探柯南：拆彈行動</div>

  <div id="bomb">
    <div id="fuse"></div>
    <div id="spark"></div>
    <div id="bombBody"></div>
    <div class="wire red"></div>
    <div class="wire blue"></div>
    <div id="panel"></div>
    <div id="ledRow">
      <div class="led"></div><div class="led"></div><div class="led"></div>
    </div>
  </div>

  <div id="conan">
    <div id="hair"></div>
    <div id="head"></div>
    <div id="glassesL"></div><div id="glassesR"></div><div id="bridge"></div>
    <div id="sweat"></div>
    <div id="body"></div>
    <div id="bowtie"></div>
    <div id="armR"></div>
    <div id="handR"></div>
    <div id="tool"></div>
  </div>

  <div id="crowd"></div>
  <div id="status">偵測電路中...</div>
  <div id="flash"></div>
  <div id="confetti"></div>
</div>
</div>

<script>
  // Deterministic animation driven by an explicit time cursor (t in seconds),
  // so the renderer can step frame-by-frame instead of relying on real wall-clock time.
  const hud = document.getElementById('hud');
  const status = document.getElementById('status');
  const leds = document.querySelectorAll('.led');
  const tool = document.getElementById('tool');
  const armR = document.getElementById('armR');
  const sweat = document.getElementById('sweat');
  const wireRed = document.querySelector('.wire.red');
  const wireBlue = document.querySelector('.wire.blue');
  const spark = document.getElementById('spark');
  const fuse = document.getElementById('fuse');
  const flash = document.getElementById('flash');
  const status_el = status;
  const confettiWrap = document.getElementById('confetti');

  const DURATION = 12; // seconds
  const CUT_TIME = 9; // when wire is cut
  let confettiBuilt = false;

  function buildConfetti(){
    const colors = ['#ff5252','#ffb300','#4fc3f7','#69f0ae','#e040fb'];
    for(let i=0;i<40;i++){
      const p = document.createElement('div');
      p.className='confetti-piece';
      p.style.left = (Math.random()*100)+'%';
      p.style.top = '-10px';
      p.style.background = colors[i%colors.length];
      p.dataset.delay = (Math.random()*2).toFixed(2);
      p.dataset.speed = (150+Math.random()*150).toFixed(0);
      p.dataset.drift = ((Math.random()-0.5)*80).toFixed(0);
      confettiWrap.appendChild(p);
    }
    confettiBuilt = true;
  }
  buildConfetti();
  const pieces = document.querySelectorAll('.confetti-piece');

  // Build a large generic "villager crowd" (procedurally varied fur colors / ear shapes)
  const crowdWrap = document.getElementById('crowd');
  const furColors = ['#f4c542','#e8846b','#7bc9a3','#8fb4e3','#c98fdc','#e3d38f','#a3a3a3','#f2a5c4','#9fd68f','#d68f5a'];
  const NUM_VILLAGERS = 60;
  function buildCrowd(){
    for(let i=0;i<NUM_VILLAGERS;i++){
      const v = document.createElement('div');
      v.className='villager';
      const fur = furColors[i%furColors.length];
      const roundEars = i%2===0;
      v.innerHTML = `
        <div class="wingL" style="background:${fur};filter:brightness(0.9);"></div>
        <div class="wingR" style="background:${fur};filter:brightness(0.9);"></div>
        <div class="earL" style="background:${fur};${roundEars?'':'border-radius:40% 40% 50% 50%;transform:rotate(-15deg);'}"></div>
        <div class="earR" style="background:${fur};${roundEars?'':'border-radius:40% 40% 50% 50%;transform:rotate(15deg);'}"></div>
        <div class="head" style="background:${fur};"></div>
        <div class="cheekL"></div><div class="cheekR"></div>
        <div class="body" style="background:${fur};filter:brightness(0.85);"></div>
      `;
      // Each villager flies in from a random off-screen edge to a random landing spot in the sky.
      const fromEdge = ['left','right','top'][i%3];
      const startX = fromEdge==='left' ? -80 : fromEdge==='right' ? 1040 : Math.random()*960;
      const startY = fromEdge==='top' ? -80 : 60 + Math.random()*260;
      const endX = 40 + Math.random()*880;
      const endY = 30 + Math.random()*280;
      v.dataset.sx = startX.toFixed(0);
      v.dataset.sy = startY.toFixed(0);
      v.dataset.ex = endX.toFixed(0);
      v.dataset.ey = endY.toFixed(0);
      v.dataset.delay = (Math.random()*1.2).toFixed(2);
      v.dataset.flap = (6+Math.random()*6).toFixed(2);
      v.style.transform = `translate(${startX}px, ${startY}px)`;
      v.style.opacity = 0;
      crowdWrap.appendChild(v);
    }
  }
  buildCrowd();
  const villagers = document.querySelectorAll('.villager');
  function easeOutCubic(x){ return 1 - Math.pow(1-x, 3); }

  function render(t){
    // countdown text: CUT_TIME -> 0 seconds, then held at 00:00 (defused)
    const remainSec = Math.max(0, Math.ceil(CUT_TIME - t));
    const mm = Math.floor(remainSec/60), ss = remainSec%60;
    hud.textContent = String(mm).padStart(2,'0') + ':' + String(ss).padStart(2,'0');
    hud.style.color = t < CUT_TIME ? '#ff4d4d' : '#33ff88';
    hud.style.textShadow = t < CUT_TIME ? '0 0 10px #ff0000' : '0 0 12px #33ff88';

    // blinking leds
    const blink = Math.floor(t*4)%2===0;
    leds.forEach((l,i)=>{
      if (t < CUT_TIME) l.classList.toggle('on', blink && (Math.floor(t*4+i)%3===0));
      else l.classList.remove('on');
    });

    // fuse spark flicker
    const flick = 0.85 + 0.15*Math.sin(t*20);
    spark.style.transform = `scale(${flick})`;
    spark.style.opacity = t < CUT_TIME ? 1 : 0;
    fuse.style.opacity = t < CUT_TIME ? 1 : 0;

    // phases (scaled to a 270s tension build-up)
    const PHASE1_END = 2;
    const PHASE2_END = 5;
    if (t < PHASE1_END) {
      status_el.textContent = '偵測電路中...';
      const wobble = Math.sin(t*1.5)*4;
      armR.style.transform = `rotate(${-25+wobble}deg)`;
      tool.style.transform = 'rotate(0deg)';
      sweat.style.opacity = 0;
    } else if (t < PHASE2_END) {
      status_el.textContent = '這條紅線是陷阱...真正的線路在藍線之下！';
      const wig = Math.sin((t-PHASE1_END)*6)*6;
      armR.style.transform = `rotate(${-25+wig}deg)`;
      sweat.style.opacity = Math.min(1,(t-PHASE1_END)/1.5);
    } else if (t < CUT_TIME) {
      status_el.textContent = '剪斷藍線...！';
      const p = (t-PHASE2_END)/(CUT_TIME-PHASE2_END);
      armR.style.transform = `rotate(${-25 - p*15 + Math.sin(t*3)*2}deg)`;
      tool.style.transform = `rotate(${p*35}deg)`;
      sweat.style.opacity = 1;
    } else if (t < CUT_TIME + 0.4) {
      // snip moment
      status_el.textContent = '成功拆除！';
      wireBlue.style.opacity = 0;
      flash.style.opacity = Math.max(0, 0.6 - (t-CUT_TIME)*1.5);
      sweat.style.opacity = 0;
    } else {
      status_el.textContent = '成功拆除！真相只有一個。全體居民衝出來慶祝！';
      wireBlue.style.opacity = 0;
      flash.style.opacity = 0;
      armR.style.transform = 'rotate(10deg)';
      tool.style.transform = 'rotate(0deg)';

      const ct = t - (CUT_TIME+0.4);

      const FLY_IN_DUR = 1.1;
      villagers.forEach((v)=>{
        const delay = parseFloat(v.dataset.delay);
        const lt = ct - delay;
        const sx = parseFloat(v.dataset.sx), sy = parseFloat(v.dataset.sy);
        const ex = parseFloat(v.dataset.ex), ey = parseFloat(v.dataset.ey);
        const flap = parseFloat(v.dataset.flap);

        if (lt <= 0) { v.style.opacity = 0; return; }

        const p = Math.min(1, lt/FLY_IN_DUR);
        const ep = easeOutCubic(p);
        const x = sx + (ex-sx)*ep;
        const y = sy + (ey-sy)*ep;
        const hover = p>=1 ? Math.sin(lt*3)*6 : 0;
        v.style.opacity = Math.min(1, lt*3);
        v.style.transform = `translate(${x}px, ${y+hover}px)`;

        const wingAngle = 25 + Math.sin(lt*flap)*35;
        const wingL = v.querySelector('.wingL');
        const wingR = v.querySelector('.wingR');
        if (wingL) wingL.style.transform = `rotate(${wingAngle}deg)`;
        if (wingR) wingR.style.transform = `rotate(${-wingAngle}deg)`;
      });
      pieces.forEach(p=>{
        const delay = parseFloat(p.dataset.delay);
        const speed = parseFloat(p.dataset.speed);
        const drift = parseFloat(p.dataset.drift);
        const lt = ct - delay;
        if (lt <= 0) { p.style.opacity = 0; return; }
        p.style.opacity = 1;
        p.style.transform = `translate(${drift*lt}px, ${speed*lt}px) rotate(${lt*360}deg)`;
      });
    }
  }

  window.__render = render;
  window.__DURATION = DURATION;

  // Autoplay driver: runs the deterministic render(t) off real elapsed time,
  // looping with a short pause on the final frame. Falls back to a static
  // final frame when the viewer prefers reduced motion.
  (function autoplay(){
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      render(DURATION);
      return;
    }
    const PAUSE_AFTER_END = 1.5;
    let startTs = null;
    function loop(ts){
      if (startTs === null) startTs = ts;
      let t = (ts - startTs) / 1000;
      if (t > DURATION + PAUSE_AFTER_END) { startTs = ts; t = 0; }
      render(Math.min(t, DURATION));
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
</script>

  try{ if(window.top!==window.self) return; }catch(e){ return; } /* 在作品館內由作品館計數 */
  var NS="ai-future-camp", K="t-d205aaf8";
  function ping(n){ try{ var p=fetch("//abacus.jasoncameron.dev/hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(p&&p.catch) p.catch(function(){}); }catch(e){} }
  ping(K+"-v");

</script>
</body>
</html>
