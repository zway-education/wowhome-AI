<script>
'use strict';
/* ============================================================
   皮卡丘與噴火龍的漢堡風波（專業AI升級 v1）
   三幕：草原漢堡＋皮卡丘登場 → 噴火龍空降搶奪「這是我的！」 → 放屁得逞飛走
   角色為原創風格化繪製，非官方寶可夢美術素材
   ============================================================ */
const W = 960, H = 540;
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const subEl = document.getElementById('subtitle');
const sndLbl = document.getElementById('sndLbl');
const replayBtn = document.getElementById('replayBtn');

function resize(){
  const s = Math.min(innerWidth / W, innerHeight / H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  cv.width = Math.round(W * s * dpr); cv.height = Math.round(H * s * dpr);
  cv.style.width = W * s + 'px'; cv.style.height = H * s + 'px';
  ctx.setTransform(s * dpr, 0, 0, s * dpr, 0, 0);
  document.documentElement.style.setProperty('--cvB', Math.max(0, (innerHeight - H * s) / 2) + 'px');
  replayBtn.style.top = Math.round(innerHeight / 2 + H * s * 0.22) + 'px';
}
addEventListener('resize', resize); resize();

const E = {
  outQuad: t => 1 - (1 - t) * (1 - t),
  inQuad: t => t * t,
  outCubic: t => 1 - Math.pow(1 - t, 3),
  inOutSine: t => -(Math.cos(Math.PI * t) - 1) / 2,
  outBack: t => 1 + 2.7 * Math.pow(t - 1, 3) + 1.7 * Math.pow(t - 1, 2)
};
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;
const ss01 = (t, a, b) => clamp((t - a) / (b - a), 0, 1);
const rnd = (a, b) => a + Math.random() * (b - a);
const TAU = Math.PI * 2;
function rr(g, x, y, w, h, r){
  g.beginPath(); g.moveTo(x + r, y);
  g.arcTo(x + w, y, x + w, y + h, r); g.arcTo(x + w, y + h, x, y + h, r);
  g.arcTo(x, y + h, x, y, r); g.arcTo(x, y, x + w, y, r); g.closePath();
}
const GC = {};
function grd(key, make){ let g = GC[key]; if(!g){ g = make(); GC[key] = g; } return g; }

/* ---------- OpenMoji 烘焙 ---------- */
function svgImg(id){
  const img = new Image();
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(new XMLSerializer().serializeToString(document.getElementById(id)));
  return img;
}
const IMG = { star: svgImg('svg-star'), boom: svgImg('svg-boom') };
function drawIMG(g, img, x, y, w, ang){
  if(!img.complete || !img.naturalWidth) return;
  if(!img._cv){
    const c = document.createElement('canvas'); c.width = c.height = 144;
    c.getContext('2d').drawImage(img, 0, 0, 144, 144); img._cv = c;
  }
  g.save(); g.translate(x, y); if(ang) g.rotate(ang);
  g.drawImage(img._cv, -w / 2, -w / 2, w, w); g.restore();
}
function makeGlow(r, g0, b0){
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(64, 64, 2, 64, 64, 64);
  gr.addColorStop(0, `rgba(${r},${g0},${b0},.9)`);
  gr.addColorStop(0.4, `rgba(${r},${g0},${b0},.3)`);
  gr.addColorStop(1, `rgba(${r},${g0},${b0},0)`);
  g.fillStyle = gr; g.fillRect(0, 0, 128, 128);
  return c;
}
const glowSun = makeGlow(255, 244, 180), glowGold = makeGlow(255, 206, 92), glowFire = makeGlow(255, 130, 60), glowGreen = makeGlow(160, 220, 90);
const vinCv = (() => {
  const c = document.createElement('canvas'); c.width = W; c.height = H;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(W / 2, H / 2, H * 0.44, W / 2, H / 2, H * 0.86);
  gr.addColorStop(0, 'rgba(0,0,0,0)'); gr.addColorStop(1, 'rgba(0,0,0,.38)');
  g.fillStyle = gr; g.fillRect(0, 0, W, H);
  return c;
})();

/* ---------- Web Audio（預設靜音・總線壓縮） ---------- */
let AC = null, master = null, audioOn = false;
function initAudio(){
  AC = new (window.AudioContext || window.webkitAudioContext)();
  master = AC.createGain(); master.gain.value = 0;
  const comp = AC.createDynamicsCompressor();
  comp.threshold.value = -14; comp.knee.value = 22; comp.ratio.value = 9;
  comp.attack.value = 0.003; comp.release.value = 0.24;
  master.connect(comp); comp.connect(AC.destination);
  const len = AC.sampleRate * 2, buf = AC.createBuffer(1, len, AC.sampleRate), d = buf.getChannelData(0);
  for(let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
  const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 380;
  const wg = AC.createGain(); wg.gain.value = 0.015;
  src.connect(lp); lp.connect(wg); wg.connect(master); src.start();
}
function playTone(freq, dur, type, vol, delay, slide){
  if(!audioOn || !AC || !freq) return;
  const t0 = AC.currentTime + (delay || 0);
  const o = AC.createOscillator(), g = AC.createGain(), f = AC.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = 2600; f.Q.value = 0.4;
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(20, freq + slide), t0 + dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(Math.max(vol * 0.35, 0.0005), t0 + dur * 0.55);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur * 0.95);
  o.connect(f); f.connect(g); g.connect(master);
  o.start(t0); o.stop(t0 + dur + 0.03);
}
function noiseBurst(dur, freq, type, vol, delay){
  if(!audioOn || !AC) return;
  const t0 = AC.currentTime + (delay || 0);
  const len = Math.max(1, AC.sampleRate * dur) | 0, buf = AC.createBuffer(1, len, AC.sampleRate), d = buf.getChannelData(0);
  for(let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = AC.createBufferSource(); src.buffer = buf;
  const f = AC.createBiquadFilter(); f.type = type; f.frequency.value = freq;
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t0); g.gain.exponentialRampToValueAtTime(vol, t0 + 0.012);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  src.connect(f); f.connect(g); g.connect(master); src.start(t0); src.stop(t0 + dur + 0.05);
}
const sfxThud = () => { playTone(70, 0.2, 'sine', 0.2); noiseBurst(0.1, 240, 'lowpass', 0.18); };
const sfxPop = () => { noiseBurst(0.12, 1500, 'highpass', 0.12); playTone(660, 0.18, 'sine', 0.1, 0, 220); };
const sfxSpark = () => { playTone(1500, 0.1, 'square', 0.08, 0, -700); playTone(2200, 0.08, 'square', 0.06, 0.03, -900); };
const sfxRoar = () => { playTone(120, 0.5, 'sawtooth', 0.15, 0, -50); noiseBurst(0.4, 500, 'bandpass', 0.1); };
const sfxWhoosh = () => noiseBurst(0.5, 1000, 'bandpass', 0.14);
const sfxGrab = () => { playTone(300, 0.12, 'square', 0.14); playTone(200, 0.14, 'square', 0.1, 0.05); };
const sfxFart = () => { playTone(140, 0.5, 'sawtooth', 0.14, 0, -110); playTone(90, 0.4, 'square', 0.1, 0.08, -60); noiseBurst(0.3, 300, 'lowpass', 0.1, 0.05); };
const sfxWin = () => [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => playTone(f, 0.16, 'sine', 0.2, i * 0.09));
const sfxSad = () => { playTone(392, 0.22, 'sine', 0.14); playTone(329.63, 0.3, 'sine', 0.12, 0.22); };
function setAudio(on){
  if(on && !AC) initAudio();
  if(AC && AC.state === 'suspended') AC.resume();
  audioOn = on;
  if(master) master.gain.setTargetAtTime(on ? 0.9 : 0, AC.currentTime, 0.06);
  sndLbl.textContent = on ? '聲音：開' : '聲音：關';
  document.getElementById('sndX').style.display = on ? 'none' : '';
  document.getElementById('sndWave').style.display = on ? '' : 'none';
}
document.getElementById('sndBtn').addEventListener('click', () => { setAudio(!audioOn); playTone(880, 0.06, 'triangle', 0.12); });
try { setAudio(true); } catch(e) {}
(function(){ const unlockAudio = () => { if (AC && AC.state === 'suspended') AC.resume(); };
  addEventListener('pointerdown', unlockAudio, {once:true}); addEventListener('keydown', unlockAudio, {once:true}); })();

/* ---------- 原創 8bit 田園配樂 ---------- */
const NOTE = {C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392.00,A4:440.00,B4:493.88,
  C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880.00,B5:987.77,C6:1046.5,R:0};
const TEMPO = 0.18;
const melodySrc = [['C5',1],['E5',1],['G5',1],['E5',1],['F5',1],['A5',1],['G5',2],
  ['E5',1],['D5',1],['C5',1],['D5',1],['E5',2],['R',1],
  ['G5',1],['A5',1],['G5',1],['F5',1],['E5',1],['D5',1],['C5',2]];
const bassSrc = [['C4',2],['G4',2],['A4',2],['F4',2],['C4',2],['G4',2],['C4',2]];
function flatten(src, mult){
  const ev = []; let t = 0;
  for(const [n, b] of src){ ev.push([NOTE[n] * mult, t, b * TEMPO]); t += b * TEMPO; }
  return { ev, total: t };
}
const MEL = flatten(melodySrc, 1), BAS = flatten(bassSrc, 0.5);
let melIdx = 0, melBase = 0.3, basIdx = 0, basBase = 0.3;
function updateMusic(t){
  if(!audioOn) return;
  if(t > 9.4) return;
  let guard = 0;
  while(guard++ < 40 && melBase + MEL.ev[melIdx][1] <= t){
    const [f, , d] = MEL.ev[melIdx];
    if(f) playTone(f, d, 'triangle', 0.16);
    if(++melIdx >= MEL.ev.length){ melIdx = 0; melBase += MEL.total; }
  }
  guard = 0;
  while(guard++ < 40 && basBase + BAS.ev[basIdx][1] <= t){
    const [f, , d] = BAS.ev[basIdx];
    if(f) playTone(f, d, 'sine', 0.13);
    if(++basIdx >= BAS.ev.length){ basIdx = 0; basBase += BAS.total; }
  }
}

/* ---------- 字幕 ---------- */
const CAPS = [
  { a: 0.4,  b: 3.2,  text: '草原上，皮卡丘發現了一個漢堡…' },
  { a: 3.4,  b: 5.6,  text: '牠開心地跑了過去！' },
  { a: 5.9,  b: 8.0,  text: '咦？天上有東西飛來了！' },
  { a: 8.2,  b: 10.6, text: '噴火龍：「這是我的！」' },
  { a: 10.9, b: 12.6, text: '噗～ 牠放了個屁…' },
  { a: 12.8, b: 15.3, text: '叼著漢堡得意地飛走了！' },
  { a: 15.6, b: 20,   text: '皮卡丘只能眼睜睜看著… ★ 全劇終 ★' },
];
let curSub = null;
function updateSub(t){
  let hit = null;
  for(const s of CAPS){ if(t >= s.a && t < s.b){ hit = s; break; } }
  if(hit !== curSub){
    curSub = hit;
    if(hit){ subEl.textContent = hit.text; subEl.classList.add('show'); }
    else subEl.classList.remove('show');
  }
}

/* ---------- 時間軸 ---------- */
var SPEED = 1;
const TOTAL = 20;
let T = 0, lastNow = null, ended = false;
let freeze = 0, shake = 0, flashW = 0;
let eggN = 0, eggAt = -9;
let flags = {};
function trig(name, time){
  if(T >= time && !flags[name]){ flags[name] = 1; return true; }
  return false;
}

/* ---------- 攝影機（關鍵格＋緩動） ---------- */
const CAMK = [
  { t: 0,    x: 480, y: 270, z: 1 },
  { t: 3.2,  x: 480, y: 270, z: 1 },
  { t: 4.0,  x: 500, y: 275, z: 1.14 },
  { t: 5.6,  x: 500, y: 275, z: 1.14 },
  { t: 6.0,  x: 480, y: 220, z: 1 },
  { t: 7.6,  x: 640, y: 230, z: 1.1 },
  { t: 8.6,  x: 560, y: 260, z: 1.28 },
  { t: 10.6, x: 560, y: 260, z: 1.28 },
  { t: 11.0, x: 560, y: 250, z: 1.32 },
  { t: 12.8, x: 560, y: 250, z: 1.32 },
  { t: 13.2, x: 480, y: 240, z: 1.05 },
  { t: 15.5, x: 260, y: 230, z: 1.02 },
  { t: 20,   x: 300, y: 260, z: 1 },
];
function camAt(t){
  let a = CAMK[0], b = CAMK[CAMK.length - 1];
  for(let i = 0; i < CAMK.length - 1; i++){
    if(t >= CAMK[i].t && t <= CAMK[i + 1].t){ a = CAMK[i]; b = CAMK[i + 1]; break; }
  }
  const k = b.t === a.t ? 0 : E.inOutSine(ss01(t, a.t, b.t));
  return { x: lerp(a.x, b.x, k), y: lerp(a.y, b.y, k), z: lerp(a.z, b.z, k) };
}

/* ---------- 粒子 ---------- */
let parts = [];
function pSpawn(o){ parts.push(o); }
function pBurst(x, y, n, cols, spd){
  for(let i = 0; i < n; i++){
    const a = rnd(0, TAU), sp = rnd(spd * 0.4, spd);
    pSpawn({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 30, life: 0, ttl: rnd(0.4, 0.9),
      size: rnd(2.5, 5.5), col: cols[i % cols.length], grav: 320, kind: 'dot' });
  }
}
function pDust(x, y, n){
  for(let i = 0; i < n; i++){
    pSpawn({ x: x + rnd(-14, 14), y: y + rnd(-4, 2), vx: rnd(-70, 70), vy: rnd(-60, -10), life: 0,
      ttl: rnd(0.3, 0.6), size: rnd(3, 7), col: 'rgba(230,220,190,.8)', grav: 60, kind: 'dot' });
  }
}
function pStar(x, y, n, spd){
  for(let i = 0; i < n; i++){
    const a = rnd(-2.4, -0.7);
    pSpawn({ x, y, vx: Math.cos(a) * rnd(60, spd), vy: Math.sin(a) * rnd(60, spd), life: 0,
      ttl: rnd(0.6, 1.2), size: rnd(14, 26), rot: rnd(0, TAU), vr: rnd(-4, 4), grav: 260, kind: 'star' });
  }
}
function pSpeedline(x, y){
  pSpawn({ x, y: y + rnd(-70, 30), vx: -rnd(600, 900), vy: 0, life: 0, ttl: 0.25,
    size: rnd(20, 46), col: 'rgba(255,255,255,.7)', grav: 0, kind: 'line' });
}
function pFeather(){
  pSpawn({ x: rnd(0, W), y: -14, vx: rnd(-30, 30), vy: rnd(40, 100), life: 0, ttl: rnd(1.8, 2.8),
    size: rnd(5, 9), col: ['#ffcf5c','#ff8a5c','#7ecf68','#fff'][(Math.random() * 4) | 0],
    rot: rnd(0, TAU), vr: rnd(-4, 4), grav: 20, kind: 'rect' });
}
function pFartPuff(x, y, n){
  for(let i = 0; i < n; i++){
    pSpawn({ x: x + rnd(-8, 8), y: y + rnd(-6, 6), vx: rnd(-40, -10), vy: rnd(-30, 10), life: 0,
      ttl: rnd(0.7, 1.2), size: rnd(8, 18), col: 'rgba(160,220,90,.55)', grav: -18, kind: 'dot' });
  }
}
function updParts(dt){
  for(let i = parts.length - 1; i >= 0; i--){
    const p = parts[i];
    p.life += dt; p.vy += (p.grav || 0) * dt; p.x += p.vx * dt; p.y += p.vy * dt;
    if(p.vr) p.rot += p.vr * dt;
    if(p.life > p.ttl){ parts[i] = parts[parts.length - 1]; parts.pop(); }
  }
}
function drawParts(g){
  for(const p of parts){
    const a = clamp(1 - p.life / p.ttl, 0, 1);
    g.globalAlpha = a;
    if(p.kind === 'star'){ drawIMG(g, IMG.star, p.x, p.y, p.size, p.rot || 0); }
    else if(p.kind === 'line'){
      g.strokeStyle = p.col; g.lineWidth = 3;
      g.beginPath(); g.moveTo(p.x, p.y); g.lineTo(p.x + p.size * 2.4, p.y); g.stroke();
    } else if(p.kind === 'rect'){
      g.save(); g.translate(p.x, p.y); g.rotate(p.rot || 0);
      g.fillStyle = p.col; g.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2); g.restore();
    } else {
      g.fillStyle = p.col;
      g.beginPath(); g.arc(p.x, p.y, p.size, 0, TAU); g.fill();
    }
  }
  g.globalAlpha = 1;
}

/* ---------- 背景（草原・視差） ---------- */
function drawBG(g, t, cam){
  g.fillStyle = grd('sky', () => {
    const gr = g.createLinearGradient(0, -100, 0, H);
    gr.addColorStop(0, '#6fc8ff'); gr.addColorStop(0.55, '#b7e6ff'); gr.addColorStop(1, '#e6f7d8');
    return gr;
  });
  g.fillRect(-360, -220, W + 720, H + 440);
  const par = f => (cam.x - 480) * (1 - f);
  g.save(); g.translate(par(0.2), 0);
  g.drawImage(glowSun, W * 0.14 - 95, H * 0.14 - 95, 190, 190);
  g.fillStyle = '#fff6c9';
  g.beginPath(); g.arc(W * 0.14, H * 0.14, 36, 0, TAU); g.fill();
  g.restore();
  g.save(); g.translate(par(0.3), 0);
  g.fillStyle = '#fff';
  for(let i = 0; i < 4; i++){
    const cx = ((i * 260 + t * 10) % (W + 400)) - 200;
    const cy = H * (0.1 + i * 0.06), s = 1 + i * 0.15;
    g.globalAlpha = 0.85 - i * 0.08;
    g.beginPath();
    g.ellipse(cx, cy, 26 * s, 14 * s, 0, 0, TAU);
    g.ellipse(cx + 22 * s, cy - 8 * s, 18 * s, 12 * s, 0, 0, TAU);
    g.ellipse(cx - 24 * s, cy - 4 * s, 16 * s, 11 * s, 0, 0, TAU);
    g.fill();
  }
  g.globalAlpha = 1; g.restore();
  g.save(); g.translate(par(0.5), 0);
  g.fillStyle = '#a9dd8e';
  g.beginPath(); g.moveTo(-360, H * 0.56);
  for(let x = -360; x <= W + 360; x += 60) g.lineTo(x, H * 0.56 - 30 - Math.sin(x * 0.008) * 26);
  g.lineTo(W + 360, H * 0.7); g.lineTo(-360, H * 0.7); g.closePath(); g.fill();
  g.restore();
  g.save(); g.translate(par(0.7), 0);
  g.fillStyle = '#8fd06e';
  g.beginPath(); g.moveTo(-360, H * 0.64);
  for(let x = -360; x <= W + 360; x += 48) g.lineTo(x, H * 0.64 - 20 - Math.sin(x * 0.014 + 2) * 18);
  g.lineTo(W + 360, H * 0.84); g.lineTo(-360, H * 0.84); g.closePath(); g.fill();
  g.restore();
  const fy = H * 0.82;
  g.fillStyle = grd('floor', () => {
    const gr = g.createLinearGradient(0, fy, 0, H + 200);
    gr.addColorStop(0, '#6fc44a'); gr.addColorStop(1, '#458a2f');
    return gr;
  });
  g.fillRect(-360, fy, W + 720, H - fy + 260);
  g.strokeStyle = '#376f22'; g.lineWidth = 3;
  for(let x = -80; x < W + 80; x += 16){
    const wob = Math.sin(t * 2 + x * 0.3) * 2;
    g.beginPath(); g.moveTo(x, fy + 2); g.lineTo(x + wob, fy - 9); g.stroke();
  }
  for(let i = 0; i < 20; i++){
    const fx = (i * 137) % (W + 100) - 50;
    const fyy = fy + 14 + (i * 53) % (H - fy - 14);
    g.fillStyle = i % 3 === 0 ? '#ffe38a' : '#fff';
    g.beginPath(); g.arc(fx, fyy, 2.6, 0, TAU); g.fill();
  }
}

/* ---------- 皮卡丘（原創風格化角色，非官方素材） ---------- */
function drawPikachu(g, x, y, scale, facing, phase, pose){
  g.save(); g.translate(x, y); g.scale(facing * scale, scale);
  let sqX = 1, sqY = 1, bob = 0, tilt = 0;
  const bounce = Math.sin(phase * 6) * 3;
  if(pose === 'walk') bob = Math.abs(Math.sin(phase * 9)) * 6;
  if(pose === 'idle') bob = bounce;
  if(pose === 'happy'){ bob = Math.abs(Math.sin(phase * 10)) * 10; }
  if(pose === 'surprised'){ sqX = 0.9; sqY = 1.12; tilt = -0.05; }
  if(pose === 'sad'){ sqY = 0.9; tilt = 0.05; bob = -4; }
  g.translate(0, bob); g.rotate(tilt); g.scale(sqX, sqY);
  g.globalAlpha = 0.3; g.fillStyle = '#000';
  g.beginPath(); g.ellipse(0, 58 - bob, 32, 8, 0, 0, TAU); g.fill();
  g.globalAlpha = 1;
  /* 尾巴（閃電形） */
  g.save(); g.translate(-32, 0); g.rotate(Math.sin(phase * 4) * 0.2 - 0.15);
  g.fillStyle = '#f5c518'; g.strokeStyle = '#8a6d1a'; g.lineWidth = 3;
  g.beginPath();
  g.moveTo(0, 0); g.lineTo(-16, -14); g.lineTo(-8, -14); g.lineTo(-26, -34); g.lineTo(-16, -30); g.lineTo(4, -10);
  g.closePath(); g.fill(); g.stroke();
  g.restore();
  /* 耳朵 */
  for(const sgn of [-1, 1]){
    g.save(); g.translate(sgn * 15, -34); g.rotate(sgn * 0.14);
    g.fillStyle = '#f5c518'; g.strokeStyle = '#3a3a3a'; g.lineWidth = 3;
    g.beginPath(); g.moveTo(0, 0); g.lineTo(sgn * 16, -42); g.lineTo(sgn * -6, -12); g.closePath(); g.fill(); g.stroke();
    g.fillStyle = '#2a2a2a';
    g.beginPath(); g.moveTo(sgn * 6, -22); g.lineTo(sgn * 16, -42); g.lineTo(sgn * -1, -18); g.closePath(); g.fill();
    g.restore();
  }
  /* 身體 */
  g.beginPath(); g.arc(0, 8, 30, 0, TAU);
  g.fillStyle = grd('pikaBody', () => {
    const gr = g.createRadialGradient(-10, -6, 3, 2, 12, 40);
    gr.addColorStop(0, '#fff3b0'); gr.addColorStop(0.55, '#f5c518'); gr.addColorStop(1, '#d9a30f');
    return gr;
  });
  g.fill(); g.strokeStyle = '#3a3a3a'; g.lineWidth = 3; g.stroke();
  /* 耳前腳 */
  const arm = pose === 'surprised' ? -0.9 : Math.sin(phase * 6) * 0.16;
  g.save(); g.translate(22, 4); g.rotate(arm);
  g.fillStyle = '#f5c518'; g.strokeStyle = '#3a3a3a'; g.lineWidth = 2.5;
  g.beginPath(); g.ellipse(8, 6, 9, 7, 0, 0, TAU); g.fill(); g.stroke();
  g.restore();
  g.save(); g.translate(-22, 4); g.rotate(-arm * 0.4);
  g.fillStyle = '#f5c518'; g.strokeStyle = '#3a3a3a'; g.lineWidth = 2.5;
  g.beginPath(); g.ellipse(-8, 6, 9, 7, 0, 0, TAU); g.fill(); g.stroke();
  g.restore();
  /* 頭部大圓（跟身體同一圓, 已含臉部特徵） */
  const blink = (Math.sin(phase * 2.2) > 0.965) ? 0.15 : 1;
  /* 臉頰 */
  g.fillStyle = '#e8433a';
  g.beginPath(); g.arc(-19, 10, 7, 0, TAU); g.fill();
  g.beginPath(); g.arc(19, 10, 7, 0, TAU); g.fill();
  /* 眼睛 */
  g.fillStyle = '#1c1c1c';
  for(const exx of [-9, 9]){
    g.save(); g.translate(exx, -3); g.scale(1, pose === 'surprised' ? 1.4 : blink);
    g.beginPath(); g.arc(0, 0, pose === 'surprised' ? 6.5 : 5.2, 0, TAU); g.fill(); g.restore();
  }
  g.fillStyle = '#fff';
  g.beginPath(); g.arc(-11, -6, 1.6, 0, TAU); g.fill();
  g.beginPath(); g.arc(17, -6, 1.6, 0, TAU); g.fill();
  /* 鼻嘴 */
  g.fillStyle = '#3a2a20';
  g.beginPath(); g.arc(0, 4, 1.4, 0, TAU); g.fill();
  g.strokeStyle = '#3a2a20'; g.lineWidth = 1.6;
  if(pose === 'surprised' || pose === 'happy'){
    g.beginPath(); g.ellipse(0, 12, 6, 8, 0, 0, TAU); g.stroke();
  } else if(pose === 'sad'){
    g.beginPath(); g.moveTo(-6, 12); g.quadraticCurveTo(0, 8, 6, 12); g.stroke();
  } else {
    g.beginPath(); g.moveTo(0, 4); g.quadraticCurveTo(-4, 9, -8, 6); g.stroke();
    g.beginPath(); g.moveTo(0, 4); g.quadraticCurveTo(4, 9, 8, 6); g.stroke();
  }
  /* 鬍鬚 */
  g.strokeStyle = 'rgba(60,40,20,.55)'; g.lineWidth = 1;
  [-1, 0, 1].forEach(i => {
    g.beginPath(); g.moveTo(-16, 6 + i * 3); g.lineTo(-30, 4 + i * 4); g.stroke();
    g.beginPath(); g.moveTo(16, 6 + i * 3); g.lineTo(30, 4 + i * 4); g.stroke();
  });
  /* 腳 */
  g.fillStyle = '#f5c518'; g.strokeStyle = '#3a3a3a'; g.lineWidth = 2.5;
  g.beginPath(); g.ellipse(-13, 40, 12, 8, 0, 0, TAU); g.fill(); g.stroke();
  g.beginPath(); g.ellipse(13, 40, 12, 8, 0, 0, TAU); g.fill(); g.stroke();
  g.restore();
}

/* ---------- 噴火龍（原創風格化角色，非官方素材） ---------- */
function drawCharizard(g, x, y, scale, facing, phase, pose, appearK){
  g.save(); g.translate(x, y);
  const pop = appearK === undefined ? 1 : E.outBack(clamp(appearK, 0, 1));
  g.scale(facing * scale * pop, scale * pop);
  let tilt = 0, bob = Math.sin(phase * 3.4) * 4;
  if(pose === 'fly') tilt = -0.12;
  if(pose === 'grab') tilt = -0.02;
  if(pose === 'perch') bob = Math.sin(phase * 3.4) * 3;
  g.translate(0, bob); g.rotate(tilt);
  /* 陰影 */
  g.globalAlpha = 0.25; g.fillStyle = '#000';
  g.beginPath(); g.ellipse(0, 68 - bob, 34, 8, 0, 0, TAU); g.fill();
  g.globalAlpha = 1;
  const flap = Math.sin(phase * (pose === 'fly' ? 9 : 5)) * (pose === 'fly' ? 0.7 : 0.25);
  /* 後翅 */
  g.save(); g.translate(6, -6); g.rotate(0.3 + flap * 0.4);
  g.fillStyle = '#4a8fd9'; g.strokeStyle = '#2c5a8a'; g.lineWidth = 3;
  g.beginPath(); g.moveTo(0, 0); g.lineTo(58, -26); g.lineTo(46, 6); g.lineTo(64, 10); g.lineTo(28, 34); g.closePath();
  g.fill(); g.stroke();
  g.restore();
  /* 尾巴 + 火焰 */
  g.save(); g.translate(-30, 20); g.rotate(Math.sin(phase * 3) * 0.16 + 0.5);
  g.strokeStyle = '#ff8a3d'; g.lineWidth = 11; g.lineCap = 'round';
  g.beginPath(); g.moveTo(0, 0); g.quadraticCurveTo(-24, 14, -16, 40); g.stroke();
  g.save(); g.translate(-16, 40);
  const flick = Math.sin(phase * 10) * 0.3;
  g.fillStyle = grd('tailFlame', () => {
    const gr = g.createLinearGradient(0, -18, 0, 16);
    gr.addColorStop(0, '#fff3b0'); gr.addColorStop(0.5, '#ffcf3f'); gr.addColorStop(1, '#ff7a1a');
    return gr;
  });
  g.rotate(flick);
  g.beginPath(); g.moveTo(-8, 0); g.quadraticCurveTo(-12, -14, 0, -22); g.quadraticCurveTo(12, -14, 8, 0); g.quadraticCurveTo(4, 8, 0, 14); g.quadraticCurveTo(-4, 8, -8, 0); g.closePath(); g.fill();
  g.restore();
  g.restore();
  /* 身體 */
  g.beginPath(); g.ellipse(0, 12, 34, 40, 0, 0, TAU);
  g.fillStyle = grd('charBody', () => {
    const gr = g.createRadialGradient(-12, -8, 4, 2, 12, 54);
    gr.addColorStop(0, '#ffb066'); gr.addColorStop(0.55, '#ff8a3d'); gr.addColorStop(1, '#d9611a');
    return gr;
  });
  g.fill(); g.strokeStyle = '#a94b0f'; g.lineWidth = 3; g.stroke();
  /* 前翅 */
  g.save(); g.translate(4, -2); g.rotate(-0.15 - flap * 0.55);
  g.fillStyle = '#5aa0e0'; g.strokeStyle = '#2c5a8a'; g.lineWidth = 3;
  g.beginPath(); g.moveTo(0, 0); g.lineTo(72, -34); g.lineTo(56, 4); g.lineTo(78, 10); g.lineTo(34, 40); g.closePath();
  g.fill(); g.stroke();
  g.restore();
  /* 肚子 */
  g.beginPath(); g.ellipse(0, 22, 18, 24, 0, 0, TAU);
  g.fillStyle = '#ffe0b0'; g.fill();
  /* 爪（抓漢堡用） */
  const clawGrab = pose === 'grab';
  g.save(); g.translate(20, clawGrab ? 44 : 40); g.rotate(clawGrab ? -0.1 : 0.12);
  g.fillStyle = '#e0691f';
  g.beginPath(); g.ellipse(0, 0, 11, 9, 0, 0, TAU); g.fill();
  g.restore();
  g.save(); g.translate(-20, 40); g.rotate(-0.12);
  g.fillStyle = '#e0691f';
  g.beginPath(); g.ellipse(0, 0, 11, 9, 0, 0, TAU); g.fill();
  g.restore();
  /* 頭 */
  g.save(); g.translate(28, -22);
  g.beginPath(); g.arc(0, 0, 24, 0, TAU);
  g.fillStyle = grd('charHead', () => {
    const gr = g.createRadialGradient(-8, -8, 2, 2, 4, 30);
    gr.addColorStop(0, '#ffb066'); gr.addColorStop(0.55, '#ff8a3d'); gr.addColorStop(1, '#d9611a');
    return gr;
  });
  g.fill(); g.strokeStyle = '#a94b0f'; g.lineWidth = 3; g.stroke();
  /* 角 */
  g.fillStyle = '#4a8fd9'; g.strokeStyle = '#2c5a8a'; g.lineWidth = 2.4;
  g.beginPath(); g.moveTo(-10, -18); g.lineTo(-18, -40); g.lineTo(-2, -22); g.closePath(); g.fill(); g.stroke();
  g.beginPath(); g.moveTo(10, -18); g.lineTo(20, -38); g.lineTo(4, -20); g.closePath(); g.fill(); g.stroke();
  /* 眼睛 */
  const blink = (Math.sin(phase * 1.8 + 1) > 0.97) ? 0.15 : 1;
  g.fillStyle = '#1c1c1c';
  g.save(); g.translate(10, -2); g.scale(1, blink);
  g.beginPath(); g.ellipse(0, 0, 6, 7, 0, 0, TAU); g.fill(); g.restore();
  g.fillStyle = '#fff'; g.beginPath(); g.arc(13, -5, 1.8, 0, TAU); g.fill();
  if(pose === 'grab' || pose === 'fly'){
    g.strokeStyle = '#1c1c1c'; g.lineWidth = 2.4;
    g.beginPath(); g.moveTo(0, -12); g.lineTo(10, -9); g.stroke();
  }
  /* 口鼻 */
  g.fillStyle = '#ffe0b0'; g.strokeStyle = '#a94b0f'; g.lineWidth = 2;
  g.beginPath(); g.ellipse(22, 6, 12, 8, -0.15, 0, TAU); g.fill(); g.stroke();
  g.strokeStyle = '#1c1c1c'; g.lineWidth = 1.8;
  g.beginPath(); g.moveTo(12, 4); g.quadraticCurveTo(22, 12, 30, 6); g.stroke();
  g.restore();
  /* 後腳 */
  g.fillStyle = '#e0691f';
  g.beginPath(); g.ellipse(-6, 56, 12, 9, 0, 0, TAU); g.fill();
  g.beginPath(); g.ellipse(18, 56, 12, 9, 0, 0, TAU); g.fill();
  g.restore();
}

/* ---------- 漢堡（原創繪製） ---------- */
function drawBurger(g, x, y, scale, phase, held){
  g.save(); g.translate(x, y); g.scale(scale, scale);
  if(!held){
    g.translate(0, Math.sin(phase * 4.2) * 4);
    g.globalAlpha = 0.25; g.fillStyle = '#000';
    g.beginPath(); g.ellipse(0, 30, 26, 6, 0, 0, TAU); g.fill(); g.globalAlpha = 1;
  }
  /* 底麵包 */
  g.fillStyle = '#e0a85c';
  g.beginPath(); g.ellipse(0, 16, 24, 9, 0, 0, Math.PI); g.fill();
  /* 生菜 */
  g.fillStyle = '#7ec24a';
  g.beginPath();
  for(let i = -22; i <= 22; i += 6){ g.lineTo(i, 10 + Math.sin(i * 0.9) * 3); }
  g.lineTo(22, 14); g.lineTo(-22, 14); g.closePath(); g.fill();
  /* 肉排 */
  g.fillStyle = '#7a4a2a';
  g.beginPath(); g.ellipse(0, 6, 22, 7, 0, 0, TAU); g.fill();
  /* 起司 */
  g.fillStyle = '#ffcf3f';
  g.beginPath(); g.moveTo(-20, 2); g.lineTo(20, 2); g.lineTo(14, 8); g.lineTo(-14, 8); g.closePath(); g.fill();
  /* 番茄 */
  g.fillStyle = '#e8433a';
  g.beginPath(); g.ellipse(0, -1, 21, 5, 0, 0, TAU); g.fill();
  /* 頂麵包 */
  g.fillStyle = grd('bunTop', () => {
    const gr = g.createRadialGradient(-6, -14, 2, 0, -8, 26);
    gr.addColorStop(0, '#f5c46a'); gr.addColorStop(1, '#d99a3f');
    return gr;
  });
  g.beginPath(); g.moveTo(-23, -6); g.quadraticCurveTo(-23, -26, 0, -26); g.quadraticCurveTo(23, -26, 23, -6); g.closePath(); g.fill();
  /* 芝麻 */
  g.fillStyle = '#fff8e0';
  [[-10,-16],[-2,-20],[6,-17],[13,-11],[-14,-9],[2,-11]].forEach(p => {
    g.beginPath(); g.ellipse(p[0], p[1], 1.6, 1, 0.3, 0, TAU); g.fill();
  });
  g.restore();
}

/* ---------- 對話框 ---------- */
function drawSpeech(g, x, y, text, k){
  const w = 168, h = 46;
  g.save(); g.globalAlpha = k;
  g.translate(x, y - h * k * 0.15);
  g.fillStyle = '#fff'; g.strokeStyle = '#3a2a10'; g.lineWidth = 2.4;
  rr(g, -w / 2, -h, w, h, 16); g.fill(); g.stroke();
  g.beginPath(); g.moveTo(-10, 0); g.lineTo(10, 0); g.lineTo(-2, 16); g.closePath();
  g.fillStyle = '#fff'; g.fill();
  g.strokeStyle = '#3a2a10'; g.lineWidth = 2.4;
  g.beginPath(); g.moveTo(-10, 0); g.lineTo(-2, 16); g.moveTo(10, 0); g.lineTo(-2, 16); g.stroke();
  g.fillStyle = '#2a1c10'; g.font = 'bold 19px "Noto Sans TC",sans-serif'; g.textAlign = 'center'; g.textBaseline = 'middle';
  g.fillText(text, 0, -h / 2 + 2);
  g.restore();
}

/* ---------- 角色運動軌跡 ---------- */
const GY = H * 0.82 - 20;
const PIKA_X0 = -80, PIKA_X1 = 260, BURGER_X = 420;
function pikaXAt(t){
  if(t < 3.2) return lerp(PIKA_X0, PIKA_X1, E.outCubic(ss01(t, 0, 3.2)));
  if(t < 12.6) return PIKA_X1;
  return lerp(PIKA_X1, PIKA_X1 - 40, E.outCubic(ss01(t, 12.6, 14)));
}
function pikaPoseAt(t){
  if(t < 3.2) return 'walk';
  if(t >= 3.2 && t < 5.6) return 'happy';
  if(t >= 5.9 && t < 11.2) return 'surprised';
  if(t >= 11.2 && t < 12.8) return 'surprised';
  if(t >= 12.8) return 'sad';
  return 'idle';
}
function charXAt(t){
  if(t < 6.0) return W + 260;
  if(t < 8.4) return lerp(W + 260, BURGER_X + 60, E.outCubic(ss01(t, 6.0, 8.4)));
  if(t < 12.6) return BURGER_X + 60;
  if(t < 15.6) return lerp(BURGER_X + 60, -260, E.inQuad(ss01(t, 12.6, 15.6)));
  return -260;
}
function charYAt(t){
  if(t < 6.0) return -80;
  if(t < 8.4) return lerp(-80, GY - 30, E.outCubic(ss01(t, 6.0, 8.4)));
  if(t < 12.6) return GY - 30;
  if(t < 15.6) return lerp(GY - 30, -140, E.inOutSine(ss01(t, 12.6, 15.6)));
  return -140;
}
function charPoseAt(t){
  if(t >= 6.0 && t < 8.4) return 'fly';
  if(t >= 8.4 && t < 12.6) return 'grab';
  if(t >= 12.6) return 'fly';
  return 'perch';
}

/* ---------- 主繪製 ---------- */
function draw(t, dt){
  ctx.clearRect(0, 0, W, H);
  const cam = camAt(t);
  ctx.save();
  if(shake > 0) ctx.translate(rnd(-1, 1) * shake * 14, rnd(-1, 1) * shake * 14);
  ctx.translate(W / 2, H / 2);
  ctx.scale(cam.z, cam.z);
  ctx.translate(-cam.x, -cam.y);

  drawBG(ctx, t, cam);

  /* 漢堡（被抓走前留在地上；抓走後跟著噴火龍） */
  const grabbed = t >= 9.0;
  if(!grabbed){
    drawBurger(ctx, BURGER_X, GY - 6, 1.05, t, false);
  }

  /* 皮卡丘 */
  const px = pikaXAt(t);
  drawPikachu(ctx, px, GY, 1.55, 1, t, pikaPoseAt(t));
  if(t >= 5.9 && t < 6.6){
    const ek = ss01(t, 5.9, 6.3);
    ctx.globalAlpha = 1 - ss01(t, 6.3, 6.6);
    drawIMG(ctx, IMG.star, px + 20, GY - 110 - ek * 14, 30 + ek * 10, 0);
    ctx.globalAlpha = 1;
  }

  /* 噴火龍 */
  const cx = charXAt(t), cy = charYAt(t);
  if(t >= 5.7){
    const appearK = ss01(t, 5.7, 6.3);
    const flyingIn = t >= 6.0 && t < 8.4;
    if(flyingIn){
      for(let i = 1; i <= 3; i++){
        ctx.globalAlpha = 0.14 / i;
        drawCharizard(ctx, cx + i * 26, cy + i * 4, 1.6, -1, t, 'fly', 1);
      }
      ctx.globalAlpha = 1;
    }
    drawCharizard(ctx, cx, cy, 1.6, -1, t, charPoseAt(t), appearK);
  }

  /* 抓著的漢堡跟隨噴火龍爪子 */
  if(grabbed){
    const holdX = cx - 26, holdY = cy + 56;
    drawBurger(ctx, holdX, holdY, 0.85, t, true);
  }

  /* 對話框「這是我的！」 */
  if(t >= 8.2 && t < 10.8){
    const k = t < 8.7 ? E.outBack(ss01(t, 8.2, 8.7)) : (t < 10.4 ? 1 : 1 - ss01(t, 10.4, 10.8));
    drawSpeech(ctx, cx + 30, cy - 66, '這是我的！', k);
  }

  /* 放屁特效（噴火龍身後綠色雲霧＋波浪線） */
  if(t >= 10.9 && t < 12.6){
    const fk = ss01(t, 10.9, 12.6);
    ctx.save(); ctx.globalAlpha = 1 - fk;
    ctx.drawImage(glowGreen, cx - 70 - fk * 20, cy + 30, 70 + fk * 30, 70 + fk * 30);
    ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(120,190,80,.9)';
    ctx.save(); ctx.translate(cx - 46, cy + 50); ctx.rotate(Math.sin(t * 14) * 0.3);
    ctx.fillText('💨', 0, 0);
    ctx.restore();
    ctx.restore();
  }

  /* 咻速度線（起飛/離場） */
  if((t >= 6.0 && t < 6.6) || t >= 12.6){
    if(Math.random() < 0.7) pSpeedline(cx + 60, cy + rnd(-30, 40));
  }

  drawParts(ctx);
  ctx.restore();

  /* ------ 螢幕空間 UI ------ */
  if(t >= 15.4){
    const ek = E.outCubic(ss01(t, 15.4, 16.2));
    ctx.save();
    ctx.globalAlpha = ek * 0.7;
    ctx.fillStyle = '#070b14'; ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = ek;
    ctx.textAlign = 'center';
    ctx.save();
    ctx.translate(W / 2, H * 0.32); ctx.scale(lerp(0.8, 1, E.outBack(ek)), lerp(0.8, 1, E.outBack(ek)));
    ctx.font = 'bold 46px "Noto Sans TC",sans-serif';
    ctx.fillStyle = grd('endTtl', () => {
      const gr = ctx.createLinearGradient(-180, 0, 180, 0);
      gr.addColorStop(0, '#ffcf5c'); gr.addColorStop(0.5, '#ffa72e'); gr.addColorStop(1, '#ff7e3d');
      return gr;
    });
    ctx.fillText('漢 堡 被 搶 走 了 ！', 0, 0);
    ctx.restore();
    ctx.fillStyle = '#dfe8ff'; ctx.font = 'bold 18px "Noto Sans TC",sans-serif';
    ctx.fillText('★ 全劇終 ★', W / 2, H * 0.32 + 40);
    ctx.font = '14px "Noto Sans TC",sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,.6)';
    ctx.fillText(eggN > 0 ? ('彩蛋達成：皮卡丘電擊 ×' + eggN + '！') : '隱藏彩蛋：重播時點點畫面，皮卡丘會生氣放電…', W / 2, H * 0.32 + 74);
    ctx.font = '12px "Noto Sans TC",sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,.4)';
    ctx.fillText('AI未來創作營隊', W / 2, H - 20);
    ctx.restore();
  }
  ctx.drawImage(vinCv, 0, 0, W, H);
  if(flashW > 0){ ctx.globalAlpha = flashW * 0.7; ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H); ctx.globalAlpha = 1; }
  updateSub(t);
}

/* ---------- 事件與更新 ---------- */
function update(dt){
  if(T > 0.3 && T < 3.2 && Math.random() < 0.5) pDust(pikaXAt(T) - 16, GY + 44, 1);
  if(trig('arrive', 3.25)){ pDust(pikaXAt(T), GY + 44, 6); pStar(pikaXAt(T) + 10, GY - 40, 3, 200); sfxPop(); }
  if(trig('appear', 5.72)){ sfxWhoosh(); shake = Math.max(shake, 0.1); }
  if(trig('gasp', 5.95)){ sfxSpark(); }
  if(T >= 6.0 && T < 8.4 && Math.random() < 0.5) pSpeedline(charXAt(T) + 80, charYAt(T) - 10);
  if(trig('roar', 6.3)) sfxRoar();
  if(trig('land', 8.42)){ freeze = 0.1; shake = 0.28; sfxThud(); pDust(charXAt(T), GY + 30, 10); }
  if(trig('shout', 8.24)){ flashW = 0.2; }
  if(trig('grab', 9.0)){ sfxGrab(); pBurst(BURGER_X, GY - 10, 12, ['#ffcf3f', '#e8433a', '#7ec24a'], 220); }
  if(trig('fart', 10.95)){ sfxFart(); shake = Math.max(shake, 0.14); pFartPuff(charXAt(T) - 60, charYAt(T) + 40, 10); }
  if(T >= 12.6 && Math.random() < 0.5) pSpeedline(charXAt(T) + 80, charYAt(T) - 10);
  if(trig('takeoff', 12.65)) sfxWhoosh();
  if(trig('sad', 13.4)) sfxSad();
  if(trig('gone', 15.6)){ /* 遠去 */ }
  if(T >= 15.6 && T < 20 && Math.random() < 0.4) pFeather();
  if(trig('showReplay', 17.4)){ replayBtn.classList.add('show'); }
}

function frame(now){
  if(lastNow === null) lastNow = now;
  const raw = Math.min(0.05, (now - lastNow) / 1000);
  lastNow = now;
  let dt = raw * SPEED;
  if(freeze > 0){ freeze -= raw; dt = 0; }
  if(!ended && dt > 0){
    T += dt;
    if(T >= TOTAL){ T = TOTAL; ended = true; }
  }
  shake = Math.max(0, shake - raw * 1.6);
  flashW = Math.max(0, flashW - raw * 2.4);
  update(dt);
  updParts(Math.max(dt, raw * 0.5));
  draw(T, dt);
  updateMusic(T);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ---------- 重新播放 ---------- */
function restart(){
  T = 0; ended = false; freeze = 0; shake = 0; flashW = 0;
  flags = {}; parts.length = 0;
  melIdx = 0; basIdx = 0; melBase = 0.3; basBase = 0.3;
  curSub = null; subEl.classList.remove('show');
  replayBtn.classList.remove('show');
  eggAt = -9;
}
replayBtn.addEventListener('click', () => { playTone(880, 0.06, 'triangle', 0.12); restart(); });

/* ---------- 隱藏彩蛋：點畫面 → 皮卡丘生氣放電 ---------- */
cv.addEventListener('pointerdown', () => {
  if(ended || T >= 15) return;
  if(T - eggAt < 0.5) return;
  eggAt = T; eggN++;
  sfxSpark();
  const px = pikaXAt(T);
  pStar(px + 10, GY - 60, 3, 220);
  pBurst(px + 10, GY - 50, 10, ['#ffe45c', '#fff'], 220);
});

window.__dbg = () => ({ T: T, ended: ended, audioOn: audioOn, egg: eggN, parts: parts.length });
</script>
