<title>皮卡丘與噴火龍的漢堡風波</title>
<style>
:root{color-scheme: light dark;}
body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(to bottom,#8ed1fc 0%,#8ed1fc 60%,#7ec850 60%,#5fa93e 100%);
  overflow:hidden;
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
}
.scene{
  position:relative;
  width:900px;
  max-width:100vw;
  height:500px;
  overflow:hidden;
}
.cloud{
  position:absolute;
  font-size:48px;
  opacity:.85;
  animation: drift 30s linear infinite;
}
.cloud.c1{top:30px;left:-80px;animation-duration:26s;}
.cloud.c2{top:80px;left:-200px;animation-duration:34s;animation-delay:-10s;font-size:36px;}
.cloud.c3{top:15px;left:-350px;animation-duration:40s;animation-delay:-20s;font-size:30px;}
@keyframes drift{
  from{transform:translateX(0);}
  to{transform:translateX(1100px);}
}

.sun{position:absolute;top:20px;right:40px;font-size:56px;filter:drop-shadow(0 0 15px gold);}

.ground-deco{position:absolute;bottom:0;left:0;width:100%;height:40%;}
.grass-tuft{position:absolute;bottom:6px;font-size:22px;}

/* burger */
.burger{
  position:absolute;
  bottom:150px;
  left:380px;
  font-size:54px;
  animation: burgerBob 1.4s ease-in-out infinite;
  z-index:5;
}
@keyframes burgerBob{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}
.burger.taken{
  animation: burgerFlyAway 2.5s ease-in forwards;
}
@keyframes burgerFlyAway{
  0%{transform:translate(0,0) rotate(0deg);}
  100%{transform:translate(420px,-260px) rotate(30deg);}
}

/* Pikachu */
.pikachu{
  position:absolute;
  bottom:120px;
  left:60px;
  width:110px;
  height:110px;
  transform-origin:bottom center;
  animation: pikaWalk 3s ease-out forwards;
  z-index:4;
}
.pikachu svg{width:100%;height:100%;display:block;overflow:visible;}
@keyframes pikaWalk{
  0%{left:60px; transform:scaleX(1) translateY(0);}
  8%{transform:scaleX(1) translateY(-6px);}
  16%{transform:scaleX(1) translateY(0);}
  24%{transform:scaleX(1) translateY(-6px);}
  32%{transform:scaleX(1) translateY(0);}
  40%{left:300px; transform:scaleX(1) translateY(-6px);}
  48%{left:300px; transform:scaleX(1) translateY(0);}
  100%{left:300px; transform:scaleX(1) translateY(0);}
}
.pikachu.surprised{
  animation: pikaSurprise 1s ease-in-out 3.4s 2;
}
@keyframes pikaSurprise{
  0%,100%{transform:translateY(0) rotate(0deg);}
  25%{transform:translateY(-18px) rotate(-6deg);}
  50%{transform:translateY(0) rotate(0deg);}
  75%{transform:translateY(-10px) rotate(6deg);}
}
.exclaim{
  position:absolute;
  left:325px;
  bottom:230px;
  font-size:40px;
  opacity:0;
  z-index:6;
  animation: popExclaim 1s ease-out 5.4s forwards;
}
@keyframes popExclaim{
  0%{opacity:0; transform:translateY(10px) scale(.5);}
  30%{opacity:1; transform:translateY(-10px) scale(1.2);}
  60%{opacity:1; transform:translateY(-5px) scale(1);}
  100%{opacity:0; transform:translateY(-30px) scale(1);}
}

/* Charizard */
.charizard{
  position:absolute;
  bottom:400px;
  left:900px;
  width:170px;
  height:150px;
  transform:scaleX(-1);
  z-index:6;
  animation: dragonFlyIn 2.2s cubic-bezier(.3,.6,.4,1) 6.4s forwards;
}
.charizard svg{width:100%;height:100%;display:block;overflow:visible;}
@keyframes dragonFlyIn{
  0%{left:900px; bottom:400px; transform:scaleX(-1) rotate(0deg);}
  70%{left:340px; bottom:180px; transform:scaleX(-1) rotate(-5deg);}
  100%{left:330px; bottom:160px; transform:scaleX(-1) rotate(0deg);}
}
.charizard.grab{
  animation: dragonGrabBob .6s ease-in-out 8.6s 2;
}
@keyframes dragonGrabBob{
  0%,100%{transform:scaleX(-1) translateY(0);}
  50%{transform:scaleX(-1) translateY(-10px);}
}
.charizard.leave{
  animation: dragonFlyOut 2.5s ease-in 10.6s forwards;
}
@keyframes dragonFlyOut{
  0%{left:330px; bottom:160px; transform:scaleX(-1) rotate(0deg);}
  100%{left:-150px; bottom:480px; transform:scaleX(-1) rotate(15deg);}
}

/* speech bubble "這是我的!" */
.speech{
  position:absolute;
  left:230px;
  bottom:330px;
  background:#fff;
  color:#333;
  padding:10px 16px;
  border-radius:16px;
  font-size:20px;
  font-weight:bold;
  opacity:0;
  z-index:7;
  box-shadow:0 3px 8px rgba(0,0,0,.25);
  animation: bubbleShow .8s ease-out 8.6s forwards;
}
.speech:after{
  content:"";
  position:absolute;
  bottom:-14px;
  left:40px;
  border-width:14px 10px 0 0;
  border-style:solid;
  border-color:#fff transparent transparent transparent;
}
@keyframes bubbleShow{
  0%{opacity:0; transform:translateY(10px) scale(.7);}
  100%{opacity:1; transform:translateY(0) scale(1);}
}
.speech.hide{
  animation: bubbleHide .5s ease-in 10.4s forwards;
}
@keyframes bubbleHide{
  to{opacity:0; transform:translateY(-10px) scale(.8);}
}

/* fart cloud */
.fart{
  position:absolute;
  left:250px;
  bottom:170px;
  font-size:36px;
  opacity:0;
  z-index:5;
  animation: fartPuff 1.6s ease-out 9.4s forwards;
}
@keyframes fartPuff{
  0%{opacity:0; transform:translate(0,0) scale(.3) rotate(0deg);}
  20%{opacity:1; transform:translate(-10px,-5px) scale(1) rotate(10deg);}
  100%{opacity:0; transform:translate(-60px,40px) scale(2.2) rotate(-20deg);}
}
.fart-lines{
  position:absolute;
  left:270px;
  bottom:190px;
  font-size:20px;
  opacity:0;
  z-index:5;
  animation: fartWiggle 1.4s ease-in-out 9.4s forwards;
}
@keyframes fartWiggle{
  0%{opacity:0;}
  15%{opacity:1;}
  85%{opacity:1; transform:translateX(-30px) rotate(-10deg);}
  100%{opacity:0; transform:translateX(-50px) rotate(10deg);}
}

.caption{
  position:absolute;
  bottom:10px;
  left:0;
  width:100%;
  text-align:center;
  color:#fff;
  text-shadow:0 2px 4px rgba(0,0,0,.5);
  font-size:18px;
  font-weight:bold;
  z-index:10;
  opacity:0;
}
.caption.c0{animation: cap 3s ease 0.2s forwards;}
.caption.c1{animation: cap 2.6s ease 3.4s forwards;}
.caption.c2{animation: cap 2.4s ease 6.4s forwards;}
.caption.c3{animation: cap 2.4s ease 8.6s forwards;}
.caption.c4{animation: cap 3s ease 10.6s forwards;}
@keyframes cap{
  0%{opacity:0;}
  15%{opacity:1;}
  85%{opacity:1;}
  100%{opacity:0;}
}
</style>

<div class="scene" id="scene">
  <div class="sun">☀️</div>
  <div class="cloud c1">☁️</div>
  <div class="cloud c2">☁️</div>
  <div class="cloud c3">☁️</div>

  <div class="burger taken" id="burger">🍔</div>
  <div class="exclaim">❗</div>

  <div class="pikachu surprised" id="pikachu">
    <svg viewBox="0 0 200 200">
      <!-- tail -->
      <path d="M155 120 L190 70 L170 100 L200 90 L165 145 Z" fill="#f5c518" stroke="#8a6d1a" stroke-width="4" stroke-linejoin="round"/>
      <!-- ears -->
      <path d="M65 55 L45 5 L80 45 Z" fill="#f5c518" stroke="#3a3a3a" stroke-width="4" stroke-linejoin="round"/>
      <path d="M60 22 L50 8 L68 30 Z" fill="#3a3a3a"/>
      <path d="M135 55 L155 5 L120 45 Z" fill="#f5c518" stroke="#3a3a3a" stroke-width="4" stroke-linejoin="round"/>
      <path d="M140 22 L150 8 L132 30 Z" fill="#3a3a3a"/>
      <!-- body/head -->
      <ellipse cx="100" cy="115" rx="62" ry="55" fill="#f5c518" stroke="#3a3a3a" stroke-width="4"/>
      <!-- cheeks -->
      <circle cx="55" cy="125" r="14" fill="#e8433a"/>
      <circle cx="145" cy="125" r="14" fill="#e8433a"/>
      <!-- eyes -->
      <ellipse cx="78" cy="105" rx="9" ry="12" fill="#222"/>
      <ellipse cx="122" cy="105" rx="9" ry="12" fill="#222"/>
      <circle cx="81" cy="100" r="3" fill="#fff"/>
      <circle cx="125" cy="100" r="3" fill="#fff"/>
      <!-- nose+mouth -->
      <path d="M92 128 Q100 134 108 128" fill="none" stroke="#222" stroke-width="3" stroke-linecap="round"/>
      <!-- feet -->
      <ellipse cx="75" cy="168" rx="18" ry="10" fill="#f5c518" stroke="#3a3a3a" stroke-width="4"/>
      <ellipse cx="130" cy="168" rx="18" ry="10" fill="#f5c518" stroke="#3a3a3a" stroke-width="4"/>
    </svg>
  </div>

  <div class="charizard grab leave" id="charizard">
    <svg viewBox="0 0 220 200">
      <!-- wing -->
      <path d="M110 90 L200 30 L185 80 L210 75 L150 130 Z" fill="#4a90d9" stroke="#2c5a8a" stroke-width="4" stroke-linejoin="round"/>
      <!-- tail -->
      <path d="M55 150 Q20 165 10 190 Q30 175 45 185 Q30 160 55 150 Z" fill="#ff7a1a" stroke="#c94f00" stroke-width="3"/>
      <ellipse cx="18" cy="182" rx="9" ry="6" fill="#ffcf3f"/>
      <!-- body -->
      <ellipse cx="110" cy="120" rx="55" ry="48" fill="#ff8a3d" stroke="#c94f00" stroke-width="4"/>
      <!-- belly -->
      <ellipse cx="105" cy="135" rx="32" ry="26" fill="#ffe0b0"/>
      <!-- head -->
      <circle cx="150" cy="80" r="34" fill="#ff8a3d" stroke="#c94f00" stroke-width="4"/>
      <!-- horns -->
      <path d="M138 55 L130 25 L148 50 Z" fill="#3aa0d9" stroke="#2c5a8a" stroke-width="3"/>
      <path d="M160 52 L172 22 L168 55 Z" fill="#3aa0d9" stroke="#2c5a8a" stroke-width="3"/>
      <!-- eye -->
      <ellipse cx="160" cy="78" rx="7" ry="9" fill="#222"/>
      <circle cx="163" cy="74" r="2.5" fill="#fff"/>
      <!-- snout+mouth -->
      <path d="M172 90 Q184 92 180 100 Q170 102 165 96" fill="#ffe0b0" stroke="#c94f00" stroke-width="2.5"/>
      <!-- legs -->
      <ellipse cx="90" cy="165" rx="16" ry="20" fill="#ff8a3d" stroke="#c94f00" stroke-width="4"/>
      <ellipse cx="135" cy="165" rx="16" ry="20" fill="#ff8a3d" stroke="#c94f00" stroke-width="4"/>
    </svg>
  </div>

  <div class="speech hide" id="speech">這是我的！</div>
  <div class="fart" id="fart">💨</div>
  <div class="fart-lines">🫧🫧</div>

  <div class="caption c0">草原上，皮卡丘發現了一個漢堡…</div>
  <div class="caption c1">牠開心地跑了過去！</div>
  <div class="caption c2">咦？天上有東西飛來了！</div>
  <div class="caption c3">噴火龍：「這是我的！」</div>
  <div class="caption c4">噗～ 牠放了個屁，叼著漢堡飛走了！</div>
</div>
