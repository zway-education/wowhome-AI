<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="author" content="Claude">
<title>三角洲行動 S10 賽季預告</title>
<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #0b0d08;
    font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  canvas { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
  #soundBtn {
    position: fixed; top: 12px; right: 12px; z-index: 20;
    width: 48px; height: 48px; border-radius: 8px;
    background: rgba(18,22,12,0.75); border: 1px solid rgba(143,174,82,0.6);
    color: #e7e2d2; font-size: 20px; cursor: pointer;
  }
  #soundHint {
    position: fixed; top: 20px; right: 70px; z-index: 20;
    color: #d8e6bd; font-size: 14px; text-shadow: 0 0 6px #000;
    animation: hintFade 3.4s ease forwards; pointer-events: none;
  }
  @keyframes hintFade { 0%{opacity:0} 15%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
  #replayBtn {
    position: fixed; left: 50%; bottom: 11%; transform: translateX(-50%);
    z-index: 20; display: none;
    padding: 14px 44px; font-size: 20px; min-height: 48px; letter-spacing: 2px;
    background: linear-gradient(92deg,#2a2410,#3a3013);
    color: #ffd98e; border: 1px solid #ff7a1a; border-radius: 8px; cursor: pointer;
    font-family: inherit; box-shadow: 0 0 18px rgba(255,122,26,0.35);
  }
</style>
</head>
<body>
<button id="soundBtn">🔇</button>
<div id="soundHint">點聲音鈕開啟音效</div>
<button id="replayBtn">重新播放</button>
<canvas id="stage"></canvas>

<script>
'use strict';
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const soundBtn = document.getElementById('soundBtn');
const replayBtn = document.getElementById('replayBtn');

function resize() {
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H) || 1;
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', resize); resize();

const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp = (a, b, t) => a + (b - a) * t;
const easeOut = t => 1 - Math.pow(1 - t, 3);
const easeOutBack = t => 1 + 2.7 * Math.pow(t - 1, 3) + 1.7 * Math.pow(t - 1, 2);
const easeInOut = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

/* =====================================================================
   音效引擎（合成、預設靜音、零外部資源）
   ===================================================================== */
let audioCtx = null, soundOn = false;
soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? '🔊' : '🔇';
  if (soundOn && !audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  if (soundOn) startMusic(); else stopMusic();
});
function boom(vol) {
  if (!soundOn || !audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(150, t);
  osc.frequency.exponentialRampToValueAtTime(38, t + 0.4);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
  osc.connect(g).connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.6);
}
function frostHit(vol) {
  if (!soundOn || !audioCtx) return;
  const t = audioCtx.currentTime, dur = 0.5;
  const n = Math.floor(audioCtx.sampleRate * dur);
  const buf = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 1.6);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const f = audioCtx.createBiquadFilter();
  f.type = 'highpass'; f.frequency.value = 2600;
  const g = audioCtx.createGain(); g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(f).connect(g).connect(audioCtx.destination);
  src.start(t);
}
function metalSwipe() {
  if (!soundOn || !audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(500, t);
  osc.frequency.exponentialRampToValueAtTime(3200, t + 0.22);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.16, t + 0.05);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
  const f = audioCtx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 2200; f.Q.value = 3;
  osc.connect(f).connect(g).connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.32);
}
function powerChime() {
  if (!soundOn || !audioCtx) return;
  const t = audioCtx.currentTime;
  [523, 659, 784, 1047].forEach((fq, i) => {
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(fq, t + i * 0.08);
    g.gain.setValueAtTime(0.0001, t + i * 0.08);
    g.gain.exponentialRampToValueAtTime(0.16, t + i * 0.08 + 0.03);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.35);
    osc.connect(g).connect(audioCtx.destination);
    osc.start(t + i * 0.08); osc.stop(t + i * 0.08 + 0.4);
  });
}
function blip(fq) {
  if (!soundOn || !audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.value = fq || 880;
  g.gain.setValueAtTime(0.09, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  osc.connect(g).connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.14);
}
function typeTick() {
  if (!soundOn || !audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.type = 'square'; osc.frequency.value = 1400 + Math.random() * 400;
  g.gain.setValueAtTime(0.03, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
  osc.connect(g).connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.03);
}
function entranceFanfare() {
  if (!soundOn || !audioCtx) return;
  const t = audioCtx.currentTime;
  const pad = audioCtx.createOscillator(), padG = audioCtx.createGain();
  pad.type = 'sawtooth'; pad.frequency.setValueAtTime(55, t);
  const padF = audioCtx.createBiquadFilter(); padF.type = 'lowpass'; padF.frequency.setValueAtTime(200, t);
  padF.frequency.linearRampToValueAtTime(900, t + 1.1);
  padG.gain.setValueAtTime(0.0001, t);
  padG.gain.linearRampToValueAtTime(0.16, t + 0.5);
  padG.gain.linearRampToValueAtTime(0.001, t + 1.6);
  pad.connect(padF).connect(padG).connect(audioCtx.destination);
  pad.start(t); pad.stop(t + 1.7);
  [220, 277.18, 329.63].forEach((fq, i) => {
    const start = t + i * 0.12;
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(fq * 0.5, start);
    osc.frequency.exponentialRampToValueAtTime(fq, start + 0.3);
    const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.setValueAtTime(400, start);
    f.frequency.linearRampToValueAtTime(3200, start + 0.35);
    g.gain.setValueAtTime(0.0001, start);
    g.gain.linearRampToValueAtTime(0.14, start + 0.28);
    g.gain.exponentialRampToValueAtTime(0.001, start + 1.3);
    osc.connect(f).connect(g).connect(audioCtx.destination);
    osc.start(start); osc.stop(start + 1.35);
  });
}

/* ---- 背景配樂：戰術風格（低音脈衝＋鼓點＋琶音）＋槍戰連發層 ---- */
let musicGain = null, musicTimer = null, musicNextNoteTime = 0, musicBeat = 0, musicIntensity = 0;
const MUSIC_BPM = 132, MUSIC_STEP = 60 / MUSIC_BPM / 2;
const MUSIC_BASS = [55, 55, 61.74, 55, 58.27, 55, 61.74, 49];
const MUSIC_ARP = [220, 261.63, 329.63, 261.63, 246.94, 293.66, 349.23, 293.66];
function scheduleKick(time, vol) {
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(120, time);
  osc.frequency.exponentialRampToValueAtTime(42, time + 0.12);
  g.gain.setValueAtTime(vol, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + 0.16);
  osc.connect(g).connect(musicGain);
  osc.start(time); osc.stop(time + 0.18);
}
function scheduleHat(time, vol, open) {
  const dur = open ? 0.16 : 0.045;
  const n = Math.floor(audioCtx.sampleRate * dur);
  const buf = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 2);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const f = audioCtx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 6500;
  const g = audioCtx.createGain(); g.gain.setValueAtTime(vol, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + dur);
  src.connect(f).connect(g).connect(musicGain);
  src.start(time);
}
function scheduleBass(time, freq, vol) {
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(freq, time);
  const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 340; f.Q.value = 1.2;
  g.gain.setValueAtTime(0.0001, time);
  g.gain.linearRampToValueAtTime(vol, time + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, time + MUSIC_STEP * 1.8);
  osc.connect(f).connect(g).connect(musicGain);
  osc.start(time); osc.stop(time + MUSIC_STEP * 2);
}
function scheduleArp(time, freq, vol) {
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(freq, time);
  g.gain.setValueAtTime(0.0001, time);
  g.gain.linearRampToValueAtTime(vol, time + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, time + MUSIC_STEP * 0.9);
  osc.connect(g).connect(musicGain);
  osc.start(time); osc.stop(time + MUSIC_STEP);
}
function scheduleGunshot(time, vol) {
  const dur = 0.055;
  const n = Math.floor(audioCtx.sampleRate * dur);
  const buf = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 0.5);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const f = audioCtx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 1700; f.Q.value = 0.7;
  const g = audioCtx.createGain(); g.gain.setValueAtTime(vol, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + dur);
  src.connect(f).connect(g).connect(musicGain);
  src.start(time);
  const osc = audioCtx.createOscillator(), g2 = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(95, time);
  osc.frequency.exponentialRampToValueAtTime(48, time + 0.06);
  g2.gain.setValueAtTime(vol * 0.75, time);
  g2.gain.exponentialRampToValueAtTime(0.001, time + 0.08);
  osc.connect(g2).connect(musicGain);
  osc.start(time); osc.stop(time + 0.09);
}
const GUNFIRE_PATTERN = [0, 0.3, 0.45, 0.72];
function musicScheduler() {
  if (!audioCtx) return;
  while (musicNextNoteTime < audioCtx.currentTime + 0.12) {
    const step = musicBeat % 8;
    scheduleKick(musicNextNoteTime, step % 4 === 0 ? 0.24 : (step % 2 === 0 ? 0.1 : 0));
    scheduleHat(musicNextNoteTime, step % 2 === 1 ? 0.05 : 0.025, step === 6);
    if (step % 2 === 0) scheduleBass(musicNextNoteTime, MUSIC_BASS[(musicBeat / 2 | 0) % MUSIC_BASS.length], 0.1);
    scheduleArp(musicNextNoteTime, MUSIC_ARP[musicBeat % MUSIC_ARP.length], 0.045);
    if (musicIntensity > 0.3 && (step === 1 || step === 4 || step === 6)) {
      for (const off of GUNFIRE_PATTERN) {
        if (off > 0 && Math.random() > 0.6) continue;
        scheduleGunshot(musicNextNoteTime + off * MUSIC_STEP, 0.1 * musicIntensity);
      }
    }
    musicNextNoteTime += MUSIC_STEP;
    musicBeat++;
  }
  musicTimer = setTimeout(musicScheduler, 40);
}
function startMusic() {
  if (!audioCtx || !soundOn || musicTimer) return;
  if (!musicGain) {
    musicGain = audioCtx.createGain();
    musicGain.gain.value = 0.5;
    musicGain.connect(audioCtx.destination);
  }
  musicGain.gain.cancelScheduledValues(audioCtx.currentTime);
  musicGain.gain.setValueAtTime(0.5, audioCtx.currentTime);
  musicNextNoteTime = audioCtx.currentTime + 0.05;
  musicBeat = 0;
  musicScheduler();
}
function stopMusic() {
  if (musicTimer) { clearTimeout(musicTimer); musicTimer = null; }
  if (musicGain && audioCtx) {
    musicGain.gain.cancelScheduledValues(audioCtx.currentTime);
    musicGain.gain.setTargetAtTime(0.0001, audioCtx.currentTime, 0.15);
  }
}

/* =====================================================================
   效能安全的視覺工具：所有「發光」效果一律用預先渲染的離屏貼圖 + drawImage，
   絕不在逐幀路徑上使用 ctx.shadowBlur（該 API 在中低階裝置上非常昂貴，
   是先前版本卡頓的主因）。靜態背景（建築、暗角、掃描線）同樣離屏快取一次。
   ===================================================================== */
const glowCache = {};
function getGlow(radius, rgb) {
  const key = radius + '_' + rgb;
  if (glowCache[key]) return glowCache[key];
  const c = document.createElement('canvas');
  c.width = c.height = radius * 2;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(radius, radius, 0, radius, radius, radius);
  grad.addColorStop(0, `rgba(${rgb},0.95)`);
  grad.addColorStop(0.35, `rgba(${rgb},0.4)`);
  grad.addColorStop(1, `rgba(${rgb},0)`);
  g.fillStyle = grad;
  g.beginPath(); g.arc(radius, radius, radius, 0, Math.PI * 2); g.fill();
  glowCache[key] = c;
  return c;
}
function drawHalo(x, y, radius, rgb, alpha) {
  if (alpha <= 0) return;
  const spr = getGlow(radius, rgb);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.globalCompositeOperation = 'lighter';
  ctx.drawImage(spr, x - radius, y - radius);
  ctx.restore();
}
function crispText(text, x, y, size, color, alpha, weight) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';
  ctx.font = `${weight || 'bold'} ${size}px "PingFang TC","Microsoft JhengHei",sans-serif`;
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
  ctx.restore();
}
function glowText(text, x, y, size, color, rgb, alpha, weight) {
  drawHalo(x, y - size * 0.3, size * 1.4, rgb, alpha * 0.8);
  crispText(text, x, y, size, color, alpha, weight);
}

let vignetteSprite = null;
function getVignette() {
  if (vignetteSprite) return vignetteSprite;
  const c = document.createElement('canvas');
  c.width = GAME_W; c.height = GAME_H;
  const g = c.getContext('2d');
  const v = g.createRadialGradient(GAME_W/2, GAME_H/2, GAME_H*0.3, GAME_W/2, GAME_H/2, GAME_W*0.75);
  v.addColorStop(0, 'rgba(0,0,0,0)');
  v.addColorStop(1, 'rgba(2,3,1,1)');
  g.fillStyle = v; g.fillRect(0, 0, GAME_W, GAME_H);
  vignetteSprite = c;
  return c;
}
function vignette(strength) {
  ctx.save();
  ctx.globalAlpha = strength;
  ctx.drawImage(getVignette(), 0, 0);
  ctx.restore();
}

let scanPattern = null;
function getScanPattern() {
  if (scanPattern) return scanPattern;
  const c = document.createElement('canvas');
  c.width = 4; c.height = 4;
  const g = c.getContext('2d');
  g.fillStyle = 'rgba(143,174,82,0.07)';
  g.fillRect(0, 0, 4, 1);
  scanPattern = ctx.createPattern(c, 'repeat');
  return scanPattern;
}

/* =====================================================================
   HUD 戰術終端框：軍綠角括號＋橘色標籤＋掃描線覆層
   ===================================================================== */
function hudFrame(alpha, label) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = '#8fae52';
  ctx.lineWidth = 2;
  const m = 26, L = 34;
  const corners = [[m, m, 1, 1], [GAME_W - m, m, -1, 1], [m, GAME_H - m, 1, -1], [GAME_W - m, GAME_H - m, -1, -1]];
  for (const [x, y, sx, sy] of corners) {
    ctx.beginPath();
    ctx.moveTo(x, y + sy * L); ctx.lineTo(x, y); ctx.lineTo(x + sx * L, y);
    ctx.stroke();
  }
  ctx.fillStyle = '#ff7a1a';
  ctx.font = 'bold 13px "Consolas", monospace';
  ctx.textAlign = 'left';
  ctx.fillText('◢ DELTA FORCE // SEASON 10', m + 6, m + 20);
  if (label) {
    ctx.textAlign = 'right';
    ctx.fillText(label, GAME_W - m - 6, m + 20);
  }
  ctx.globalAlpha = alpha * 0.5;
  ctx.fillStyle = getScanPattern();
  ctx.fillRect(0, 40, GAME_W, GAME_H - 70);
  ctx.restore();
}

function subtitle(text, alpha) {
  if (alpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';
  ctx.font = 'bold 24px "PingFang TC","Microsoft JhengHei",sans-serif';
  const y = GAME_H - 52;
  const w = ctx.measureText(text).width + 52;
  ctx.fillStyle = 'rgba(14,17,10,0.75)';
  ctx.fillRect(GAME_W/2 - w/2, y - 28, w, 42);
  ctx.fillStyle = '#8fae52'; ctx.globalAlpha = alpha * 0.9;
  ctx.fillRect(GAME_W/2 - w/2, y + 13, w, 2);
  ctx.fillStyle = '#e7e2d2'; ctx.globalAlpha = alpha;
  ctx.fillText(text, GAME_W / 2, y);
  ctx.restore();
}

/* =====================================================================
   粒子：雪／冰晶（數量克制,避免逐幀配置過多物件)
   ===================================================================== */
let shake = 0;
const snow = [];
for (let i = 0; i < 90; i++) {
  snow.push({ x: Math.random() * GAME_W, y: Math.random() * GAME_H,
    r: 0.6 + Math.random() * 2, vy: 14 + Math.random() * 36,
    vx: -6 - Math.random() * 16, sway: Math.random() * Math.PI * 2 });
}
const frost = [];
function burstFrost(x, y, n, spd) {
  n = Math.min(n, 26);
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = spd * (0.3 + Math.random() * 0.7);
    frost.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 40,
      life: 0.6 + Math.random() * 0.4, max: 1.0,
      size: 2 + Math.random() * 3.5, spin: Math.random() * Math.PI });
  }
}
function updateParticles(dt) {
  for (const f of snow) {
    f.sway += dt * 2;
    f.x += (f.vx + Math.sin(f.sway) * 12) * dt;
    f.y += f.vy * dt;
    if (f.y > GAME_H + 4) { f.y = -4; f.x = Math.random() * GAME_W; }
    if (f.x < -4) f.x = GAME_W + 4;
  }
  for (let i = frost.length - 1; i >= 0; i--) {
    const p = frost[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 220 * dt; p.spin += dt * 6;
    p.life -= dt;
    if (p.life <= 0) frost.splice(i, 1);
  }
  shake *= Math.pow(0.0015, dt);
}
function drawSnow(intensity) {
  ctx.save();
  ctx.fillStyle = '#dff6ff';
  for (const f of snow) {
    ctx.globalAlpha = intensity * (0.25 + f.r / 3);
    ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}
function drawFrostParts() {
  ctx.save();
  for (const p of frost) {
    ctx.save();
    ctx.globalAlpha = clamp(p.life / p.max, 0, 1);
    ctx.translate(p.x, p.y); ctx.rotate(p.spin);
    ctx.fillStyle = '#bff3ff';
    ctx.beginPath();
    ctx.moveTo(0, -p.size); ctx.lineTo(p.size * 0.8, p.size * 0.6);
    ctx.lineTo(-p.size * 0.8, p.size * 0.6); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

function searchlight(x, y, angle, len, spread, color, alpha) {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.translate(x, y); ctx.rotate(angle);
  const g = ctx.createLinearGradient(0, 0, 0, len);

let bldgCacheCanvas = null;

    if (t > 6.2) {
      const tp = clamp((t - 6.2) / 0.7, 0, 1);
      crispText('全新賽季 · 極地行動', GAME_W / 2, GAME_H * 0.74, 24, '#ff7a1a', easeOut(tp) * clamp((9 - t) / 0.6, 0, 1), 'bold');
    }
    if (t > 7.4) subtitle('液態氮風暴，席捲戰場', clamp((t - 7.4) / 0.6, 0, 1) * clamp((9 - t) / 0.6, 0, 1));
    hudFrame(0.9, 'STANDBY');
    vignette(0.5);

  } else if (t < 17) {
    const p = (t - 9) / 8;
    cue('mapIn', () => { blip(660); shake = 8; });
    drawMap(t, clamp(p * 3, 0, 1), (t - 9) * 22);
    const cardP = clamp((t - 9.3) / 0.6, 0, 1) * clamp((17 - t) / 0.5, 0, 1);
    if (cardP > 0) {
      ctx.save();
      ctx.globalAlpha = cardP;
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ff7a1a';
      ctx.font = 'bold 15px "Consolas",monospace';
      ctx.fillText('◤ NEW BATTLEGROUND ◥', GAME_W * 0.5, GAME_H * 0.28);
      ctx.restore();
      glowText('極寒要塞', GAME_W * 0.5, GAME_H * 0.36, 56, '#e7e2d2', '255,122,26', cardP, '800');
      ctx.save();
      ctx.globalAlpha = cardP * 0.9;
      ctx.textAlign = 'center';
      ctx.font = '18px "PingFang TC",sans-serif';
      ctx.fillStyle = '#d8e6bd';
      ctx.fillText('冰封工業區 · 長距離對狙 × 室內近戰', GAME_W * 0.5, GAME_H * 0.44);
      ctx.restore();
    }
    if (t < 12.4) subtitle('全新戰場「極寒要塞」開放', clamp((t - 9.6) / 0.6, 0, 1));
    else subtitle('冰原、地堡、雷達站，多線交火', clamp((t - 12.6) / 0.5, 0, 1) * clamp((17 - t) / 0.5, 0, 1));
    hudFrame(0.9, 'MAP: FROST FORTRESS');
    vignette(0.42);

  } else if (t < 25) {
    const p = (t - 17) / 8;
    const bg = ctx.createRadialGradient(GAME_W * 0.5, GAME_H * 0.4, 60, GAME_W * 0.5, GAME_H * 0.5, GAME_W * 0.7);
    bg.addColorStop(0, '#0c2233');
    bg.addColorStop(1, '#080b06');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, GAME_W, GAME_H);
    drawSnow(0.6);

    cue('opIn', () => { powerChime(); shake = 10; burstFrost(GAME_W * 0.62, GAME_H * 0.5, 24, 260); frostHit(0.35); });
    const entP = clamp(p * 2.4, 0, 1);
    const opY = GAME_H * 0.58 + (1 - easeOutBack(entP)) * 260;
    const opAlpha = clamp(p * 3, 0, 1);
    drawCryoOperator(GAME_W * 0.6, opY, 150, t, opAlpha);
    knifeMist(GAME_W * 0.6, GAME_H * 0.5, 200, t, opAlpha * 0.7);

    const panP = clamp((t - 18) / 0.6, 0, 1) * clamp((25 - t) / 0.5, 0, 1);
    if (panP > 0) {
      const px = GAME_W * 0.08, py = GAME_H * 0.3;
      ctx.save();
      ctx.globalAlpha = panP;
      ctx.textAlign = 'left';
      ctx.fillStyle = '#ff7a1a';
      ctx.font = 'bold 15px "Consolas",monospace';
      ctx.fillText('◤ NEW OPERATOR // AE3', px, py - 34);
      ctx.restore();
      glowText('液　氮', px + 90, py + 34, 68, '#e7e2d2', '56,225,255', panP, '900');
      ctx.save();
      ctx.globalAlpha = panP;
      ctx.textAlign = 'left';
      ctx.fillStyle = '#d8e6bd';
      ctx.font = 'bold 19px "PingFang TC",sans-serif';
      ctx.fillText('代號　AE3 · 極地突擊幹員', px, py + 74);
      ctx.font = '16px "PingFang TC",sans-serif';
      const skills = ['■ 戰術技能：液氮噴射 — 凍結敵人與陷阱',
                      '■ 被動：耐寒體質 — 冰面移動不減速',
                      '■ 終極：絕對零度 — 範圍冰封護盾'];
      for (let i = 0; i < skills.length; i++) {
        ctx.globalAlpha = panP * clamp((t - 19.2 - i * 0.5) / 0.4, 0, 1);
        ctx.fillStyle = '#e7e2d2';
        ctx.fillText(skills[i], px, py + 108 + i * 30);
      }
      ctx.restore();
    }
    if (t < 20.5) subtitle('全新 AE3 幹員「液氮」加入戰局', clamp((t - 17.6) / 0.6, 0, 1));
    else subtitle('凍結敵人，掌控整片冰封戰場', clamp((t - 20.6) / 0.5, 0, 1) * clamp((25 - t) / 0.5, 0, 1));
    hudFrame(0.9, 'OPERATOR: LN2');
    vignette(0.4);

  } else if (t < 31.5) {
    const p = (t - 25) / 6.5;
    const bg = ctx.createRadialGradient(GAME_W * 0.5, GAME_H * 0.5, 40, GAME_W * 0.5, GAME_H * 0.5, GAME_W * 0.7);
    bg.addColorStop(0, '#0a2130');
    bg.addColorStop(1, '#060906');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, GAME_W, GAME_H);
    drawSnow(0.5);

    cue('knifeIn', () => { metalSwipe(); shake = 9; });
    const spin = p < 0.35 ? easeOut(p / 0.35) * Math.PI * 5 : Math.PI * 5 + Math.sin(t * 1.2) * 0.12;
    const bob = Math.sin(t * 1.5) * 12;
    const kx = GAME_W * 0.5, ky = GAME_H * 0.48 + bob;
    const frostAmt = clamp((p - 0.2) / 0.4, 0, 1);
    knifeMist(kx, ky, 220, t, 0.8);
    drawKnife(kx, ky, 300, spin, Math.max(0.4, frostAmt), t);
    if (t > 27.4) cue('frostBurst', () => { frostHit(0.4); burstFrost(kx, ky, 20, 220); shake = 6; });

    const cardP = clamp((t - 25.6) / 0.6, 0, 1) * clamp((31.5 - t) / 0.5, 0, 1);
    if (cardP > 0) {
      ctx.save();
      ctx.globalAlpha = cardP;
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ff7a1a';
      ctx.font = 'bold 15px "Consolas",monospace';
      ctx.fillText('◤ LEGENDARY KNIFE SKIN ◥', GAME_W * 0.5, GAME_H * 0.2);
      ctx.restore();
      glowText('液氮之刃', GAME_W * 0.5, GAME_H * 0.28, 52, '#e7e2d2', '56,225,255', cardP, '800');
      ctx.save();
      ctx.globalAlpha = cardP;
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ffd98e';
      ctx.font = '22px sans-serif';
      ctx.fillText('★ ★ ★ ★ ★  傳說級', GAME_W * 0.5, GAME_H * 0.82);
      ctx.restore();
    }
    if (t < 28) subtitle('全新刀皮「液氮之刃」限時登場', clamp((t - 25.8) / 0.6, 0, 1));
    else subtitle('命中結霜，擊殺特效冰封綻放', clamp((t - 28.1) / 0.5, 0, 1) * clamp((31.5 - t) / 0.5, 0, 1));
    hudFrame(0.9, 'SKIN: LN2 BLADE');
    vignette(0.42);

  } else {
    const p = (t - 31.5) / 8.5;
    const bg = ctx.createLinearGradient(0, 0, 0, GAME_H);
    bg.addColorStop(0, '#0a0d06');
    bg.addColorStop(1, '#141a10');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, GAME_W, GAME_H);
    ctx.save();
    ctx.globalAlpha = 0.3;
    drawCryoOperator(GAME_W * 0.2, GAME_H * 0.7, 90, t, 1);
    drawKnife(GAME_W * 0.82, GAME_H * 0.45, 150, Math.sin(t) * 0.3 + 0.4, 1, t);
    ctx.restore();
    drawSnow(0.55);
    knifeMist(GAME_W * 0.5, GAME_H * 0.4, 260, t, 0.4);

    cue('finaleIn', () => { boom(0.5); powerChime(); shake = 12; burstFrost(GAME_W / 2, GAME_H * 0.4, 26, 260); });

    const logoP = clamp(p * 2, 0, 1);
    ctx.save();
    ctx.globalAlpha = easeOut(logoP);
    ctx.translate(GAME_W / 2, GAME_H * 0.34);
    const sc = easeOutBack(clamp(p * 1.6, 0, 1));
    ctx.scale(sc, sc);
    drawHalo(0, 20, 100, '255,122,26', 0.55);
    ctx.strokeStyle = '#ff7a1a'; ctx.lineWidth = 4;
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = i * Math.PI / 3 - Math.PI / 2;
      const px = Math.cos(a) * 70, py = Math.sin(a) * 70;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.stroke();
    crispText('S10', 0, 20, 56, '#ffd98e', 1, '900');
    ctx.restore();

    glowText('三角洲行動', GAME_W / 2, GAME_H * 0.58, 52, '#e7e2d2', '143,174,82', easeOut(logoP), '800');
    if (t > 32.9) {
      const cta = clamp((t - 32.9) / 0.7, 0, 1);
      crispText('S10 賽季 · 現已上線', GAME_W / 2, GAME_H * 0.68, 30, '#ff7a1a', easeOut(cta), 'bold');
      ctx.save();
      ctx.globalAlpha = easeOut(cta);
      ctx.textAlign = 'center';
      ctx.fillStyle = '#d8e6bd';
      ctx.font = '18px "PingFang TC",sans-serif';
      ctx.fillText('新地圖 · 新幹員液氮 · 新刀皮，一次登場', GAME_W / 2, GAME_H * 0.76);
      ctx.restore();
      cue('ctaSound', () => blip(1047));
    }
    if (t > 33.9) {
      ctx.save();
      ctx.globalAlpha = clamp((t - 33.9) / 0.8, 0, 1);
      ctx.textAlign = 'center';
      ctx.font = 'bold 16px "PingFang TC",sans-serif';
      const bw = ctx.createLinearGradient(GAME_W/2 - 90, 0, GAME_W/2 + 90, 0);
      bw.addColorStop(0, '#38e1ff'); bw.addColorStop(0.5, '#4f7cff'); bw.addColorStop(1, '#9a6bff');
      ctx.fillStyle = bw;
      ctx.fillText('AI未來創作營隊 出品', GAME_W / 2, GAME_H * 0.9);
      ctx.restore();
    }
    hudFrame(0.9, 'SEASON 10 // LIVE');
    vignette(0.45);
  }

  drawFrostParts();
  ctx.restore();
}

function loop(now) {
  if (!playing) return;
  if (startTime === null) { startTime = now; lastNow = now; }
  const dt = Math.min((now - lastNow) / 1000, 0.05);
  lastNow = now;
  const t = (now - startTime) / 1000;
  updateParticles(dt);
  if (t >= TIMELINE) {
    draw(TIMELINE - 0.01);
    playing = false;
    replayBtn.style.display = 'block';
    stopMusic();
    return;
  }
  draw(t);
  requestAnimationFrame(loop);
}

function play() {
  startTime = null;
  firedCues = {};
  frost.length = 0;
  shake = 0;
  playing = true;
  replayBtn.style.display = 'none';
  if (soundOn) { stopMusic(); startMusic(); }
  requestAnimationFrame(loop);
}
replayBtn.addEventListener('click', play);
play();
</script>
