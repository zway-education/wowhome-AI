<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Roblox障礙賽</title>
<meta name="author" content="AI未來創作營隊">
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#7ec8ff;}
  #stageWrap{width:3840px;height:2160px;overflow:hidden;}
  #stage{width:960px;height:540px;position:relative;overflow:hidden;font-family:'Arial Black',sans-serif;
    transform:scale(4);transform-origin:top left;
    background:linear-gradient(#8fd3ff 0%,#bfe9ff 55%,#cdeeff 100%);}

  #cloud{position:absolute;width:120px;height:40px;background:#fff;border-radius:40px;opacity:.85;filter:blur(1px);}

  #track{position:absolute;left:0;top:0;width:6000px;height:540px;}
  .seg{position:absolute;bottom:0;height:60px;background:#3aa845;border-top:10px solid #57cc63;}
  .plat{position:absolute;height:34px;background:#c9975a;border-top:8px solid #e2b26f;border-radius:4px;}
  .lava{position:absolute;bottom:0;height:60px;background:linear-gradient(#ff7a2e,#c62b0a);}
  .lava::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,rgba(255,220,150,.5) 0 10px,transparent 10px 20px);animation:none;}
  .blade{position:absolute;width:70px;height:70px;border-radius:50%;background:radial-gradient(circle,#ddd 0 30%,#999 32% 40%,#ddd 42% 48%,#999 50% 58%,#ddd 60% 66%,#999 68% 100%);box-shadow:0 0 10px rgba(0,0,0,.4);}
  .ring{position:absolute;width:26px;height:26px;border-radius:50%;background:radial-gradient(circle,#fff7c2,#ffd23f 60%,#e0a300);box-shadow:0 0 12px #ffd23f;}
  .flag{position:absolute;bottom:60px;width:14px;height:180px;background:#555;}
  .flag .cloth{position:absolute;top:0;left:14px;width:70px;height:50px;background:#ff3b3b;clip-path:polygon(0 0,100% 25%,0 50%);}
  .goal-star{position:absolute;bottom:250px;width:60px;height:60px;background:radial-gradient(circle,#fff7c2,#ffd23f 55%,#e0a300);clip-path:polygon(50% 0,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);}

  #cam{position:absolute;left:0;top:0;width:6000px;height:540px;}

  #hud{position:absolute;top:16px;left:16px;color:#fff;font-size:26px;text-shadow:2px 2px 0 #0006;letter-spacing:1px;}
  #timer{position:absolute;top:16px;right:16px;color:#fff;font-size:26px;text-shadow:2px 2px 0 #0006;}
  #banner{position:absolute;top:0;left:0;width:100%;text-align:center;padding-top:60px;color:#fff;font-size:44px;text-shadow:3px 3px 0 #0007;letter-spacing:2px;opacity:0;pointer-events:none;}

  #avatar{position:absolute;width:52px;height:100px;}
  .a-head{position:absolute;top:0;left:6px;width:40px;height:36px;background:#ffce7a;border-radius:6px;}
  .a-face .eye{position:absolute;top:14px;width:6px;height:6px;background:#222;border-radius:50%;}
  .a-eyeL{left:16px;} .a-eyeR{left:30px;}
  .a-torso{position:absolute;top:34px;left:2px;width:48px;height:38px;background:#3ba3ff;border-radius:6px;}
  .a-armL,.a-armR{position:absolute;top:36px;width:14px;height:36px;background:#3ba3ff;border-radius:6px;transform-origin:top center;}
  .a-armL{left:-10px;} .a-armR{left:48px;}
  .a-handL,.a-handR{position:absolute;top:34px;width:14px;height:14px;background:#ffce7a;border-radius:4px;}
  .a-legL,.a-legR{position:absolute;top:70px;width:16px;height:34px;background:#555;border-radius:4px;transform-origin:top center;}
  .a-legL{left:6px;} .a-legR{left:30px;}
  .a-shadow{position:absolute;bottom:-6px;left:6px;width:40px;height:10px;background:rgba(0,0,0,.25);border-radius:50%;}

  #dust{position:absolute;inset:0;pointer-events:none;}
  .dust-p{position:absolute;width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.7);opacity:0;}
  #confetti{position:absolute;inset:0;pointer-events:none;}
  .conf-p{position:absolute;width:8px;height:8px;opacity:0;}
</style>
</head>
<body>
<div id="stageWrap">
<div id="stage">
  <div id="hud">機器磚塊障礙賽</div>
  <div id="timer">00:15</div>
  <div id="banner">過關！</div>

  <div id="cam">
    <div id="track"></div>
  </div>

  <div id="avatar">
    <div class="a-shadow"></div>
    <div class="a-legL"></div><div class="a-legR"></div>
    <div class="a-torso"></div>
    <div class="a-armL"></div><div class="a-armR"></div>
    <div class="a-handL"></div><div class="a-handR"></div>
    <div class="a-head">
      <div class="a-face"><div class="eye a-eyeL"></div><div class="eye a-eyeR"></div></div>
    </div>
  </div>

  <div id="dust"></div>
  <div id="confetti"></div>
</div>
</div>

<script>
  const DURATION = 15;
  const cam = document.getElementById('cam');
  const track = document.getElementById('track');
  const avatar = document.getElementById('avatar');
  const timer = document.getElementById('timer');
  const banner = document.getElementById('banner');
  const dustWrap = document.getElementById('dust');
  const confettiWrap = document.getElementById('confetti');

  // ---- world layout (world x in px, ground segments + floating platforms + hazards) ----
  const GROUND_Y = 0; // bottom of stage
  const groundSegs = [
    {x:0,   w:520},           // start plaza
    {x:640, w:180},           // after first gap
    {x:1000,w:160},
    {x:1340,w:1400},          // long run w/ blades & rings
    {x:2900,w:260},
  ];
  groundSegs.forEach(s=>{
    const el = document.createElement('div');
    el.className='seg';
    el.style.left = s.x+'px'; el.style.width = s.w+'px';
    track.appendChild(el);
  });

  const lavaPits = [
    {x:520, w:120},
    {x:1160, w:180},
    {x:2740, w:160},
  ];
  lavaPits.forEach(p=>{
    const el = document.createElement('div');
    el.className='lava';
    el.style.left=p.x+'px'; el.style.width=p.w+'px';
    track.appendChild(el);
  });

  // moving platforms: {x0 base, y, amp, speed, w}
  const movingPlats = [
    {x:1750, y:110, amp:70, speed:1.4, w:110, phase:0},
    {x:2050, y:170, amp:50, speed:1.8, w:100, phase:1.2},
    {x:2340, y:100, amp:60, speed:1.3, w:110, phase:2.4},
  ];
  const platEls = movingPlats.map(p=>{
    const el=document.createElement('div');
    el.className='plat'; el.style.width=p.w+'px';
    track.appendChild(el);
    return el;
  });

  // spinning blades: {x,y,r rotation speed}
  const blades = [
    {x:1500, y:60},
    {x:2620, y:60},
  ];
  const bladeEls = blades.map(b=>{
    const el=document.createElement('div');
    el.className='blade';
    el.style.left=(b.x-35)+'px'; el.style.bottom=b.y+'px';
    track.appendChild(el);
    return el;
  });

  // collectible rings along the run (purely decorative sparkle, non-blocking)
  const rings = [700, 1420, 1900, 2450, 3050];
  rings.forEach(x=>{
    const el=document.createElement('div');
    el.className='ring';
    el.style.left=(x-13)+'px'; el.style.bottom='90px';
    track.appendChild(el);
  });

  // goal flag
  const flag = document.createElement('div');
  flag.className='flag';
  flag.style.left='3020px';
  flag.innerHTML = '<div class="cloth"></div>';
  track.appendChild(flag);
  const star = document.createElement('div');
  star.className='goal-star';
  star.style.left='3140px';
  track.appendChild(star);

  // clouds (parallax, decorative)
  const cloudEls = [];
  for(let i=0;i<10;i++){
    const c = document.createElement('div');
    c.id='';
    c.className='';
    c.style.position='absolute';
    c.style.width=(90+Math.random()*80)+'px';
    c.style.height='36px';
    c.style.background='#fff';
    c.style.opacity='.8';
    c.style.borderRadius='40px';
    c.style.left=(Math.random()*3600)+'px';
    c.style.top=(20+Math.random()*140)+'px';
    document.getElementById('stage').insertBefore(c, cam);
    cloudEls.push({el:c, x:parseFloat(c.style.left), speedFactor:0.3+Math.random()*0.2});
  }

  // dust particles pool
  const DUST_N = 24;
  for(let i=0;i<DUST_N;i++){
    const p=document.createElement('div');
    p.className='dust-p';
    dustWrap.appendChild(p);
  }
  const dustEls = document.querySelectorAll('.dust-p');
  let dustCursor = 0;
  const dustSpawns = []; // {t, x, y}

  // confetti pool
  const CONF_N = 50;
  const confColors=['#ff5252','#ffb300','#4fc3f7','#69f0ae','#e040fb','#ffee58'];
  for(let i=0;i<CONF_N;i++){
    const p=document.createElement('div');
    p.className='conf-p';
    p.style.background=confColors[i%confColors.length];
    p.dataset.delay=(Math.random()*0.8).toFixed(2);
    p.dataset.speed=(120+Math.random()*140).toFixed(0);
    p.dataset.drift=((Math.random()-0.5)*70).toFixed(0);
    p.dataset.sx=(Math.random()*200-100).toFixed(0);
    confettiWrap.appendChild(p);
  }
  const confEls = document.querySelectorAll('.conf-p');

  // ---- path definition: world-x of the runner over time, plus jump events ----
  // Timeline (seconds):
  // 0.0-1.0   idle/run start on plaza
  // 1.0-1.6   jump over lava pit #1 (520-640)
  // 1.6-3.2   run + small hop over gap (1000-1160... adjust) reaching long run
  // 3.2-3.6   jump lava pit #2 (1160-1340)
  // 3.6-6.6   traverse moving platforms (weave up/down) 1650-2450
  // 6.6-7.2   duck/slide under blade #1 area handled via jump timing instead (blade1 x1500 is before platforms; reorder)
  // We'll instead define keyframes of {t, worldX, groundY, action}

  const KF = [
    {t:0.0,  x:60,   y:0,  a:'run'},
    {t:1.0,  x:520,  y:0,  a:'run'},
    {t:1.55, x:680,  y:110,a:'jump'},   // over lava pit1 (520-640)
    {t:1.85, x:700,  y:0,  a:'land'},
    {t:2.6,  x:1050, y:0,  a:'run'},
    {t:2.95, x:1180, y:130,a:'jump'},   // dodge blade at x=1500? blade1 x1500 handled below with duck
    {t:3.25, x:1250, y:0,  a:'land'},
    {t:3.55, x:1340, y:0,  a:'run'},
    {t:4.2,  x:1500, y:0,  a:'duck'},   // slide under blade #1 (x1500)
    {t:4.55, x:1620, y:0,  a:'run'},
    {t:4.95, x:1750, y:180,a:'jumpTo'}, // land on moving platform 1
    {t:5.55, x:2050, y:240,a:'jumpTo'}, // moving platform 2
    {t:6.15, x:2340, y:170,a:'jumpTo'}, // moving platform 3
    {t:6.75, x:2500, y:0,  a:'jumpDown'},
    {t:7.1,  x:2620, y:0,  a:'duck'},   // slide under blade #2 (x2620)
    {t:7.45, x:2740, y:0,  a:'run'},
    {t:7.85, x:2900, y:110,a:'jump'},   // over lava pit3 (2740-2900)
    {t:8.15, x:2960, y:0,  a:'land'},
    {t:9.2,  x:3170, y:0,  a:'runFast'},
    {t:9.7,  x:3170, y:40, a:'victoryJump'},
    {t:15.0, x:3170, y:0,  a:'idleCelebrate'},
  ];

  function lerp(a,b,p){ return a+(b-a)*p; }
  function easeInOutQuad(p){ return p<0.5 ? 2*p*p : 1-Math.pow(-2*p+2,2)/2; }
  function easeOutQuad(p){ return 1-(1-p)*(1-p); }

  function sampleKF(t){
    if (t <= KF[0].t) return {x:KF[0].x, y:KF[0].y, a:KF[0].a, seg:null, p:0};
    for(let i=0;i<KF.length-1;i++){
      const A=KF[i], B=KF[i+1];
      if (t>=A.t && t<=B.t){
        const p = (B.t-A.t)>0 ? (t-A.t)/(B.t-A.t) : 1;
        let ep = p;
        if (B.a==='jump'||B.a==='jumpTo'||B.a==='jumpDown'||B.a==='victoryJump') ep = easeOutQuad(p);
        else ep = easeInOutQuad(p);
        const x = lerp(A.x,B.x,ep);
        let y;
        if (B.a==='jump'||B.a==='jumpTo'||B.a==='victoryJump'){
          // arc: rise then land at B.y using a parabola over the segment
          const arc = Math.sin(Math.PI*p) * 90;
          y = lerp(A.y,B.y,p) + arc;
        } else if (B.a==='jumpDown'){
          const arc = Math.sin(Math.PI*p) * 40;
          y = lerp(A.y,B.y,p) + arc;
        } else {
          y = lerp(A.y,B.y,ep);
        }
        return {x, y, a:B.a, seg:i, p};
      }
    }
    const last = KF[KF.length-1];
    return {x:last.x, y:last.y, a:last.a, seg:KF.length-2, p:1};
  }

  const stageW = 960, stageH = 540;
  const avatarHalfW = 26;
  const groundScreenY = 60; // matches .seg height

  function render(t){
    const s = sampleKF(t);

    // camera follows avatar, clamped to track bounds, keep avatar around 30% from left
    let camX = s.x - stageW*0.32;
    camX = Math.max(0, Math.min(camX, 6000-stageW));
    cam.style.transform = `translateX(${-camX}px)`;

    // parallax clouds move slower relative to cam
    cloudEls.forEach(c=>{
      c.el.style.transform = `translateX(${-camX*c.speedFactor}px)`;
    });

    // avatar screen position
    const screenX = s.x - camX - avatarHalfW;
    const screenY = groundScreenY + s.y;
    avatar.style.left = screenX+'px';
    avatar.style.bottom = screenY+'px';

    // running cycle animation
    const runCycle = t*10;
    const legSwing = Math.sin(runCycle)*35;
    const armSwing = Math.sin(runCycle+Math.PI)*30;
    const legL = avatar.querySelector('.a-legL');
    const legR = avatar.querySelector('.a-legR');
    const armL = avatar.querySelector('.a-armL');
    const armR = avatar.querySelector('.a-armR');
    const torso = avatar.querySelector('.a-torso');
    const head = avatar.querySelector('.a-head');

    let bob = 0, tilt = 0, squashY = 1, squashX = 1, legLAngle=legSwing, legRAngle=-legSwing, armLAngle=armSwing, armRAngle=-armSwing;

    if (s.a==='duck'){
      squashY = 0.55; squashX = 1.25; bob = -14;
      legLAngle = 0; legRAngle = 0; armLAngle = -70; armRAngle = 70;
    } else if (s.a==='jump'||s.a==='jumpTo'||s.a==='jumpDown'||s.a==='victoryJump'){
      legLAngle = -20; legRAngle = 25; armLAngle = -110; armRAngle = 110;
      tilt = -8;
    } else if (s.a==='land'){
      squashY = 0.8; squashX = 1.1;
    } else if (s.a==='idleCelebrate'){
      const cel = Math.sin((t-9.7)*4);
      legLAngle = 0; legRAngle = 0;
      armLAngle = -140 + cel*15; armRAngle = 140 - cel*15;
      bob = Math.abs(Math.sin((t-9.7)*4))*10;
    } else {
      bob = Math.abs(Math.sin(runCycle))*6;
      tilt = 4;
    }

    avatar.style.transform = `translateY(${-bob}px) rotate(${tilt}deg) scale(${squashX},${squashY})`;
    legL.style.transform = `rotate(${legLAngle}deg)`;
    legR.style.transform = `rotate(${legRAngle}deg)`;
    armL.style.transform = `rotate(${armLAngle}deg)`;
    armR.style.transform = `rotate(${armRAngle}deg)`;

    // moving platforms bob up/down + track under jumpTo segments align via KF y already approximating
    movingPlats.forEach((p,i)=>{
      const yy = p.y + Math.sin(t*p.speed + p.phase)*p.amp*0.15 + Math.sin(t*p.speed*0.5+p.phase)*p.amp;
      platEls[i].style.left = (p.x - p.w/2)+'px';
      platEls[i].style.bottom = yy+'px';
    });

    // spinning blades
    bladeEls.forEach((el,i)=>{
      el.style.transform = `rotate(${t*380 + i*90}deg)`;
    });

    // rings gentle float+spin (decorative)
    document.querySelectorAll('.ring').forEach((el,i)=>{
      el.style.transform = `translateY(${Math.sin(t*3+i)*6}px) scaleX(${Math.cos(t*4+i)})`;
    });

    // dust puffs on landing moments (spawn once per land keyframe crossing)
    [1.85, 3.25, 8.15].forEach((lt,i)=>{
      if (t>=lt && t<lt+0.5){
        const life = t-lt;
        const d = dustEls[(i*3)%DUST_N];
        d.style.opacity = Math.max(0,1-life*2);
        const dx = 0, dy = -life*40;
        d.style.left = (screenX+10)+'px';
        d.style.bottom = (screenY-4+dy)+'px';
      }
    });

    // timer
    const remain = Math.max(0, Math.ceil(DURATION - t));
    timer.textContent = '00:'+String(remain).padStart(2,'0');

    // banner + confetti near the end
    if (t>=9.4){
      banner.style.opacity = Math.min(1,(t-9.4)*3);
      const ct = t-9.4;
      confEls.forEach(p=>{
        const delay=parseFloat(p.dataset.delay), speed=parseFloat(p.dataset.speed), drift=parseFloat(p.dataset.drift), sx=parseFloat(p.dataset.sx);
        const lt = ct-delay;
        if (lt<=0){ p.style.opacity=0; return; }
        p.style.opacity = Math.max(0,1-lt*0.15);
        p.style.left = (480+sx)+'px';
        p.style.top = (0)+'px';
        p.style.transform = `translate(${drift*lt}px, ${speed*lt}px) rotate(${lt*400}deg)`;
      });
    } else {
      banner.style.opacity = 0;
      confEls.forEach(p=>p.style.opacity=0);
    }
  }

  window.__render = render;
  window.__DURATION = DURATION;

  (function autoplay(){
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      render(DURATION);
      return;
    }
    const PAUSE_AFTER_END = 1.5;
    let startTs = null;
    function loop(ts){
      if (startTs === null) startTs = ts;
      let t = (ts - startTs) / 1000;
      if (t > DURATION + PAUSE_AFTER_END) { startTs = ts; t = 0; }
      render(Math.min(t, DURATION));
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
</script>

</script>
</body>
