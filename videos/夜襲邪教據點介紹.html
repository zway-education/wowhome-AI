<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="author" content="Claude">
<title>夜襲：邪教據點 遊戲介紹</title>
<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #060b08;
    font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  canvas { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
  #soundBtn {
    position: fixed; top: 12px; right: 12px; z-index: 20;
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(20,30,20,0.7); border: 1px solid rgba(201,161,90,0.7);
    color: #e7e2d2; font-size: 20px; cursor: pointer;
  }
  #soundHint {
    position: fixed; top: 18px; right: 68px; z-index: 20;
    color: #dcd6c2; font-size: 14px; text-shadow: 0 0 4px #000;
    animation: hintFade 3.2s ease forwards;
    pointer-events: none;
  }
  @keyframes hintFade { 0%{opacity:0} 15%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
  #replayBtn {
    position: fixed; left: 50%; bottom: 12%; transform: translateX(-50%);
    z-index: 20; display: none;
    padding: 14px 42px; font-size: 20px; min-height: 48px;
    background: #16281a; color: #e7e2d2;
    border: 1px solid #c9a15a; border-radius: 6px; cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>
<button id="soundBtn">🔇</button>
<div id="soundHint">點聲音鈕開啟音效 🎧 建議戴耳機</div>
<button id="replayBtn">重新播放</button>
<canvas id="stage"></canvas>

<script>
'use strict';
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const soundBtn = document.getElementById('soundBtn');
const replayBtn = document.getElementById('replayBtn');

function resize() {
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', resize); resize();

const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const rnd = (a, b) => a + Math.random() * (b - a);
const lerp = (a, b, t) => a + (b - a) * t;
const easeInOut = t => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

// ---------- 音效（沿用遊戲手感）----------
let AC = null, master = null, muted = true;
function audio() {
  if (!AC) {
    try {
      AC = new (window.AudioContext || window.webkitAudioContext)();
      master = AC.createGain(); master.gain.value = muted ? 0 : 0.85;
      const comp = AC.createDynamicsCompressor();
      comp.threshold.value = -12; comp.knee.value = 24; comp.ratio.value = 8;
      comp.attack.value = 0.003; comp.release.value = 0.2;
      master.connect(comp); comp.connect(AC.destination);
    } catch (err) { AC = null; }
  }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function setMuted(m) { muted = m; if (master) master.gain.value = muted ? 0 : 0.85; }
function beep(freq, dur, type, vol, slide) {
  const ac = audio(); if (!ac || muted) return;
  freq *= 1 + (Math.random() * 2 - 1) * 0.04;
  type = type || 'square'; vol = vol || 0.13; slide = slide || 0;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, ac.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), ac.currentTime + dur);
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g).connect(master);
  o.start(); o.stop(ac.currentTime + dur);
}
function noise(dur, vol) {
  const ac = audio(); if (!ac || muted) return;
  const len = Math.max(1, Math.floor(ac.sampleRate * dur));
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ac.createBufferSource(), g = ac.createGain();
  src.buffer = buf;
  g.gain.setValueAtTime(vol || 0.09, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  src.connect(g).connect(master);
  src.start();
}
const sfx = {
  swing() { noise(0.08, 0.07); beep(300, 0.07, 'triangle', 0.05, -120); },
  hit() { beep(210, 0.09, 'square', 0.13, -70); noise(0.05, 0.09); },
  takedown() { beep(140, 0.16, 'sawtooth', 0.14, -60); noise(0.12, 0.11); },
  alert() { beep(660, 0.09, 'square', 0.12, 200); setTimeout(() => beep(880, 0.12, 'square', 0.11), 90); },
  loot() { [784, 988, 1319].forEach((f, i) => setTimeout(() => beep(f, 0.12, 'square', 0.1), i * 80)); },
  night() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.14, 'square', 0.1), i * 90)); },
  step() { noise(0.03, 0.03); },
  gong() { beep(110, 0.6, 'sine', 0.16, -20); noise(0.3, 0.05); },
};

// ---------- 調色盤（沿用遊戲配色）----------
const PAL = {
  bg: '#060b08', ground: '#16281a', clearing: '#243d29',
  fire: '#ef8a3d', fireHot: '#ffd27a', amber: '#c9a15a',
  blood: '#8f2f2f', bone: '#d9d3c1', ink: '#e7e2d2', dim: '#9fae9c',
  player: '#2f4d3a', playerTrim: '#c9a15a',
  cult: '#3b2f24', cultTrim: '#8f2f2f', bad: '#e2493f', good: '#8fd07a'
};

let bgTime = 0;
const CAMP = { x: 480, y: 280 };
const FIRE = { x: 480, y: 290 };
const TOTEM = { x: 575, y: 215 };
const TENTS = [{ x: 355, y: 210, r: 0.4 }, { x: 610, y: 350, r: -0.5 }];
const FENCE_R = 185;

// ---------- 地面預繪 ----------
const groundCv = document.createElement('canvas');
groundCv.width = GAME_W; groundCv.height = GAME_H;
(function paintGround() {
  const g = groundCv.getContext('2d');
  const rad = g.createRadialGradient(CAMP.x, CAMP.y, 40, CAMP.x, CAMP.y, 560);
  rad.addColorStop(0, '#375c3c'); rad.addColorStop(0.4, PAL.clearing);
  rad.addColorStop(0.75, PAL.ground); rad.addColorStop(1, '#0c1912');
  g.fillStyle = rad;
  g.fillRect(0, 0, GAME_W, GAME_H);
  g.fillStyle = 'rgba(120,92,58,0.28)';
  g.beginPath(); g.ellipse(CAMP.x, CAMP.y + 10, 190, 120, 0, 0, 6.29); g.fill();
  let seed = 42;
  function prng() { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return (seed % 1000) / 1000; }
  for (let i = 0; i < 2600; i++) {
    const x = prng() * GAME_W, y = prng() * GAME_H, s = prng();
    g.fillStyle = s > 0.5 ? 'rgba(120,158,100,0.32)' : 'rgba(10,20,10,0.35)';
    g.fillRect(x, y, 2, 2);
  }
  g.strokeStyle = 'rgba(120,92,58,0.35)'; g.lineWidth = 26; g.lineCap = 'round';
  g.beginPath(); g.moveTo(90, 500); g.quadraticCurveTo(260, 420, CAMP.x - 60, CAMP.y + 60); g.stroke();
})();

const trees = [];
for (let i = 0; i < 15; i++) {
  const a = (i / 15) * 6.2832 + 0.2;
  trees.push({ x: CAMP.x + Math.cos(a) * rnd(245, 290), y: CAMP.y + Math.sin(a) * rnd(200, 240), s: rnd(0.8, 1.25), ph: rnd(0, 6) });
}
for (let i = 0; i < 10; i++) trees.push({ x: rnd(0, GAME_W), y: Math.random() < 0.5 ? rnd(-10, 40) : rnd(GAME_H - 40, GAME_H + 10), s: rnd(0.9, 1.4), ph: rnd(0, 6) });
const flies = [];
for (let i = 0; i < 9; i++) flies.push({ x: rnd(0, GAME_W), y: rnd(0, GAME_H), ph: rnd(0, 9), sp: rnd(0.5, 1.2) });

function drawTree(t) {
  const sway = Math.sin(bgTime * 0.7 + t.ph) * 3;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(t.x + 8, t.y + 10, 34 * t.s, 14 * t.s, 0, 0, 6.29); ctx.fill();
  for (const [ox, oy, r, col] of [[0, 0, 30, '#122015'], [-14, -8, 20, '#16281a'], [12 + sway, -10, 18, '#1b301f']]) {
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(t.x + ox * t.s, t.y + oy * t.s, r * t.s, 0, 6.29); ctx.fill();
  }
  ctx.fillStyle = 'rgba(170,195,150,0.16)';
  ctx.beginPath(); ctx.arc(t.x + (14 + sway) * t.s, t.y - 14 * t.s, 12 * t.s, 0, 6.29); ctx.fill();
}
function drawTent(tn) {
  ctx.save();
  ctx.translate(tn.x, tn.y); ctx.rotate(tn.r);
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.ellipse(6, 10, 56, 30, 0, 0, 6.29); ctx.fill();
  ctx.fillStyle = '#1c140d';
  ctx.beginPath(); ctx.moveTo(-52, 26); ctx.lineTo(0, -34); ctx.lineTo(52, 26); ctx.closePath(); ctx.fill();
  const fg = ctx.createLinearGradient(-40, 0, 30, 26);
  fg.addColorStop(0, '#5a4530'); fg.addColorStop(1, '#372716');
  ctx.fillStyle = fg;
  ctx.beginPath(); ctx.moveTo(-52, 26); ctx.lineTo(0, -34); ctx.lineTo(14, 26); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-52, 26); ctx.lineTo(0, -34); ctx.lineTo(52, 26); ctx.closePath(); ctx.stroke();
  ctx.strokeStyle = PAL.blood; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, -34); ctx.lineTo(0, 26); ctx.stroke();
  ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1.5;
  for (let i = 1; i < 4; i++) { ctx.beginPath(); ctx.moveTo(-52 + i * 13, 26); ctx.lineTo(-2, -30 + i * 2); ctx.stroke(); }
  ctx.restore();
}
function drawFence() {
  for (let i = 0; i < 26; i++) {
    const a = (i / 26) * 6.2832;
    if (a > 3.5 && a < 4.4) continue;
    const fx = CAMP.x + Math.cos(a) * FENCE_R, fy = CAMP.y + Math.sin(a) * FENCE_R * 0.82;
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.ellipse(fx + 2, fy + 12, 7, 3, 0, 0, 6.29); ctx.fill();
    const wg = ctx.createLinearGradient(fx - 4, 0, fx + 4, 0);
    wg.addColorStop(0, '#1c130c'); wg.addColorStop(0.5, '#3a2a18'); wg.addColorStop(1, '#160f0a');
    ctx.fillStyle = wg;
    ctx.fillRect(fx - 4, fy - 20, 8, 32);
    ctx.fillStyle = '#3a2a18';
    ctx.beginPath(); ctx.moveTo(fx - 5, fy - 20); ctx.lineTo(fx, fy - 27); ctx.lineTo(fx + 5, fy - 20); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(70,55,30,0.8)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(fx - 5, fy - 6); ctx.lineTo(fx + 5, fy - 4); ctx.stroke();
  }
}
function makeRadialSprite(size, rgb, a0) {
  const cv = document.createElement('canvas');
  cv.width = size; cv.height = size;
  const c = cv.getContext('2d');
  const g = c.createRadialGradient(size / 2, size / 2, size * 0.04, size / 2, size / 2, size / 2);
  g.addColorStop(0, 'rgba(' + rgb + ',' + a0 + ')'); g.addColorStop(1, 'rgba(' + rgb + ',0)');
  c.fillStyle = g;
  c.fillRect(0, 0, size, size);
  return cv;
}
const fireGlowCv = makeRadialSprite(256, '255,180,90', 1);
function drawFire() {
  const t = bgTime;
  const flick = Math.sin(t * 14) * 3 + Math.sin(t * 7) * 2;
  const ga = 0.34 + Math.sin(t * 9) * 0.05;
  const gr = 170 + flick * 4;
  ctx.globalAlpha = ga;
  ctx.drawImage(fireGlowCv, FIRE.x - gr, FIRE.y - gr, gr * 2, gr * 2);
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#1a0f08';
  ctx.beginPath();
  ctx.ellipse(FIRE.x - 12, FIRE.y + 8, 20, 5, 0.3, 0, 6.29);
  ctx.ellipse(FIRE.x + 12, FIRE.y + 9, 20, 5, -0.3, 0, 6.29);
  ctx.fill();
  ctx.fillStyle = '#c9502f';
  ctx.beginPath(); ctx.ellipse(FIRE.x, FIRE.y + 9, 20, 4, 0, 0, 6.29); ctx.fill();
  const fl = (c, wF, hF, dy) => {
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.moveTo(FIRE.x - wF, FIRE.y + 8);
    ctx.quadraticCurveTo(FIRE.x - wF * 0.6 + flick * 0.3, FIRE.y - hF * 0.5, FIRE.x, FIRE.y - hF + flick + dy);
    ctx.quadraticCurveTo(FIRE.x + wF * 0.6 - flick * 0.3, FIRE.y - hF * 0.5, FIRE.x + wF, FIRE.y + 8);
    ctx.closePath(); ctx.fill();
  };
  fl(PAL.fire, 17, 46, 0);
  fl(PAL.fireHot, 11, 30, 2);
  fl('#fff3c4', 5.5, 17, 2);
  for (let i = 0; i < 6; i++) {
    const life = (t * 0.7 + i * 0.37) % 1;
    const sx = FIRE.x + Math.sin(i * 2.1 + t * 1.3) * 16 * (0.4 + life);
    ctx.globalAlpha = 1 - life;
    ctx.fillStyle = '#ffcf8a';
    ctx.fillRect(sx, FIRE.y - 6 - life * 60, 2.5, 2.5);
  }
  ctx.globalAlpha = 1;
}
const totemPoleGrad = ctx.createLinearGradient(TOTEM.x - 7, 0, TOTEM.x + 7, 0);
totemPoleGrad.addColorStop(0, '#0e0a06'); totemPoleGrad.addColorStop(0.5, '#2e2214'); totemPoleGrad.addColorStop(1, '#0e0a06');
const skullGrad = ctx.createRadialGradient(TOTEM.x - 3, TOTEM.y - 45, 1, TOTEM.x, TOTEM.y - 42, 11);
skullGrad.addColorStop(0, '#f2ede0'); skullGrad.addColorStop(1, '#a8a08a');
function drawTotem() {
  const t = bgTime;
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.ellipse(TOTEM.x + 3, TOTEM.y + 26, 22, 8, 0, 0, 6.29); ctx.fill();
  ctx.fillStyle = '#2a2a26';
  for (const [ox, oy, r] of [[-16, 20, 8], [16, 21, 7], [0, 24, 9]]) {
    ctx.beginPath(); ctx.arc(TOTEM.x + ox, TOTEM.y + oy, r, 0, 6.29); ctx.fill();
  }
  ctx.fillStyle = totemPoleGrad;
  ctx.fillRect(TOTEM.x - 7, TOTEM.y - 38, 14, 62);
  ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 2;
  for (let i = 0; i < 4; i++) { ctx.beginPath(); ctx.moveTo(TOTEM.x - 7, TOTEM.y - 26 + i * 13); ctx.lineTo(TOTEM.x + 7, TOTEM.y - 26 + i * 13); ctx.stroke(); }
  const gl = 0.5 + 0.5 * Math.sin(t * 3);
  ctx.fillStyle = 'rgba(201,80,47,' + (0.25 + 0.25 * gl) + ')';
  ctx.beginPath(); ctx.arc(TOTEM.x, TOTEM.y - 42, 16 + gl * 3, 0, 6.29); ctx.fill();
  ctx.fillStyle = skullGrad;
  ctx.beginPath(); ctx.arc(TOTEM.x, TOTEM.y - 42, 10, 0, 6.29); ctx.fill();
  ctx.fillStyle = '#241c14';
  ctx.beginPath();
  ctx.arc(TOTEM.x - 4, TOTEM.y - 44, 2.4, 0, 6.29);
  ctx.arc(TOTEM.x + 4, TOTEM.y - 44, 2.4, 0, 6.29);
  ctx.fill();
  ctx.fillRect(TOTEM.x - 3, TOTEM.y - 37, 6, 2);
}

// ---------- 角色繪製（沿用遊戲斗篷人）----------
const capeGrads = new Map(), hoodGrads = new Map();
function capeGrad(color) {
  let g = capeGrads.get(color);
  if (!g) {
    g = ctx.createLinearGradient(-10, 0, 12, 0);
    g.addColorStop(0, 'rgba(0,0,0,0.55)'); g.addColorStop(0.45, color); g.addColorStop(1, 'rgba(255,255,255,0.14)');
    capeGrads.set(color, g);
  }
  return g;
}
function hoodGrad(trim) {
  let g = hoodGrads.get(trim);
  if (!g) {
    g = ctx.createRadialGradient(-2, -9, 1, 0, -7, 9);
    g.addColorStop(0, '#efe9d6'); g.addColorStop(0.45, trim); g.addColorStop(1, 'rgba(0,0,0,0.7)');
    hoodGrads.set(trim, g);
  }
  return g;
}
const bladeGrad = ctx.createLinearGradient(7, 6, 18, 12);
bladeGrad.addColorStop(0, '#9a9488'); bladeGrad.addColorStop(0.5, '#eae4d2'); bladeGrad.addColorStop(1, '#c7c0ab');
function drawFigure(x, y, face, opts) {
  const o = opts || {};
  const bob = o.walk ? Math.sin(o.walkT * 10) * 1.6 : Math.sin(bgTime * 2 + (o.ph || 0)) * 0.7;
  ctx.save();
  ctx.translate(x, y);
  if (o.scale) ctx.scale(o.scale, o.scale);
  if (o.fade !== undefined) ctx.globalAlpha = o.fade;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.ellipse(0, 10, 14, 5.5, 0, 0, 6.29); ctx.fill();
  if (o.dead) {
    ctx.rotate(face);
    ctx.fillStyle = o.color;
    ctx.beginPath(); ctx.ellipse(2, 4, 16, 8, 0, 0, 6.29); ctx.fill();
    ctx.fillStyle = o.trim;
    ctx.beginPath(); ctx.arc(14, 4, 6, 0, 6.29); ctx.fill();
    ctx.restore();
    ctx.globalAlpha = 1;
    return;
  }
  ctx.translate(0, -6 + bob * 0.4);
  if (o.flash > 0 && Math.floor(bgTime * 18) % 2) ctx.globalAlpha = 0.5;
  ctx.save();
  ctx.rotate(face + Math.PI / 2);
  const cg = capeGrad(o.color);
  ctx.fillStyle = o.color;
  ctx.beginPath();
  ctx.moveTo(0, -13);
  ctx.quadraticCurveTo(12 + bob * 0.5, -2, 8, 14);
  ctx.quadraticCurveTo(0, 18 + bob, -8, 14);
  ctx.quadraticCurveTo(-12 - bob * 0.5, -2, 0, -13);
  ctx.fill();
  ctx.fillStyle = cg;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 1.6; ctx.stroke();
  ctx.strokeStyle = o.trim; ctx.lineWidth = 2.4;
  ctx.beginPath(); ctx.moveTo(-8, 4); ctx.quadraticCurveTo(0, 7, 8, 4); ctx.stroke();
  ctx.save();
  ctx.translate(9, -4);
  ctx.rotate(o.swing ? -1.7 * Math.sin(o.swing * Math.PI) : 0.25);
  ctx.strokeStyle = o.skin || '#c8a080'; ctx.lineWidth = 3.4; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(7, 6); ctx.stroke();
  ctx.strokeStyle = bladeGrad; ctx.lineWidth = 2.6;
  ctx.beginPath(); ctx.moveTo(7, 6); ctx.lineTo(17, 12); ctx.stroke();
  ctx.restore();
  ctx.fillStyle = hoodGrad(o.trim);
  ctx.beginPath(); ctx.arc(0, -7, 7.5, 0, 6.29); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 1.4; ctx.stroke();
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.beginPath(); ctx.ellipse(0, -5.5, 4.5, 3, 0, 0, 6.29); ctx.fill();
  if (o.eyes) {
    ctx.fillStyle = '#ff6a50';
    ctx.fillRect(-3, -7, 2, 2); ctx.fillRect(1.4, -7, 2, 2);
  }
  ctx.restore();
  if (o.swing && o.swing > 0.25) {
    const p = o.swing;
    ctx.save();
    ctx.rotate(face);
    ctx.globalAlpha = 0.7 * (1 - p);
    ctx.strokeStyle = '#fff3d8'; ctx.lineCap = 'round';
    ctx.lineWidth = 6 * (1 - p * 0.5);
    ctx.beginPath(); ctx.arc(0, 0, 26 + p * 16, -0.9, 0.9); ctx.stroke();
    ctx.restore();
    ctx.globalAlpha = 1;
  }
  if (o.alert > 0) {
    ctx.fillStyle = PAL.bad;
    ctx.font = 'bold 22px Georgia, serif'; ctx.textAlign = 'center';
    ctx.strokeStyle = 'rgba(0,0,0,0.7)'; ctx.lineWidth = 3;
    const ay = -34 - clamp(o.alert * 4, 0, 1) * 4;
    ctx.strokeText('!', 0, ay);
    ctx.fillText('!', 0, ay);
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}

// ---------- 場景繪製 ----------
let shake = 0;
const parts = [];
function burst(x, y, color, n, speed, up) {
  n = n || 10; speed = speed || 180;
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = speed * (0.3 + Math.random() * 0.7);
    parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - (up || 0), life: rnd(0.3, 0.6), color, size: rnd(2.5, 5), grav: 240 });
  }
}
function updateParts(dt) {
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += p.grav * dt; p.life -= dt;
    if (p.life <= 0) { parts[i] = parts[parts.length - 1]; parts.pop(); }
  }
}
function drawParts() {
  for (const p of parts) {
    ctx.globalAlpha = clamp(p.life * 2.2, 0, 1);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawWorld(camX, camY, camZoom, vignette) {
  ctx.save();
  ctx.translate(GAME_W / 2, GAME_H / 2);
  ctx.scale(camZoom, camZoom);
  ctx.translate(-camX, -camY);
  ctx.drawImage(groundCv, 0, 0);
  const bgTrees = trees.filter(t => t.y < CAMP.y - 40 || t.x < CAMP.x - 260 || t.x > CAMP.x + 260);
  for (const t of bgTrees) drawTree(t);
  drawFence();
  for (const tn of TENTS) drawTent(tn);
  drawTotem();
  drawFire();
  for (const f of flies) {
    const fx = f.x + Math.sin(bgTime * f.sp + f.ph) * 24;
    const fy = f.y + Math.cos(bgTime * f.sp * 0.7 + f.ph) * 16;
    ctx.globalAlpha = 0.4 + 0.4 * Math.sin(bgTime * 3 + f.ph);
    ctx.fillStyle = '#e8ffb0';
    ctx.fillRect(fx, fy, 2, 2);
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ---------- 場次腳本（電影運鏡） ----------
let elapsed = 0;
let ended = false;
const cultActors = [
  { x: CAMP.x - 60, y: CAMP.y + 40, face: 2.6, ph: 0.4 },
  { x: CAMP.x + 90, y: CAMP.y - 30, face: -1.1, ph: 2.1 },
  { x: CAMP.x + 10, y: CAMP.y + 90, face: 1.9, ph: 4.0 },
];
let player = { x: 90, y: 470, face: -1.1, swing: 0 };
let targetKilled = false, flashWhite = 0, titleT = 0;

function textOutline(text, x, y, size, color) {
  ctx.font = 'bold ' + size + 'px "PingFang TC","Microsoft JhengHei",sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.lineWidth = size * 0.14; ctx.strokeStyle = 'rgba(0,0,0,0.85)';
  ctx.strokeText(text, x, y);
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
}

// 時間軸（秒）：
// 0.0-2.5  遠景空拍：森林營地全景，緩緩推進 + 標題淡入
// 2.5-5.0  跟拍玩家從林邊潛行接近柵欄
// 5.0-8.0  視角切近：玩家繞到信徒背後
// 8.0-9.2  偷襲一擊，信徒倒地，衝擊定格
// 9.2-11.0 鏡頭轉向祭壇金光，警示鐘聲
//11.0-13.0 標題卡 + 玩法重點文字
//13.0-15.5 CTA 淡入收尾
const TOTAL = 15.5;

function scene(t) {
  bgTime = t;
  let camX = CAMP.x, camY = CAMP.y, camZoom = 1;
  let vignette = 0.35;

  if (t < 2.5) {
    const p = easeInOut(clamp(t / 2.5, 0, 1));
    camZoom = lerp(0.72, 0.92, p);
    camY = lerp(CAMP.y - 20, CAMP.y, p);
  } else if (t < 5.0) {
    const p = easeInOut(clamp((t - 2.5) / 2.5, 0, 1));
    player.x = lerp(90, CAMP.x - 190, p);
    player.y = lerp(470, CAMP.y + 150, p);
    player.face = Math.atan2(CAMP.y - player.y, CAMP.x - player.x);
    camX = lerp(CAMP.x - 60, CAMP.x - 20, p);
    camY = lerp(CAMP.y + 60, CAMP.y + 20, p);
    camZoom = lerp(0.95, 1.15, p);
  } else if (t < 8.0) {
    const p = easeInOut(clamp((t - 5.0) / 3.0, 0, 1));
    const target = cultActors[0];
    const approachAng = target.face + Math.PI; // 從背後靠近
    player.x = lerp(CAMP.x - 190, target.x + Math.cos(approachAng) * 40, p);
    player.y = lerp(CAMP.y + 150, target.y + Math.sin(approachAng) * 40, p);
    player.face = Math.atan2(target.y - player.y, target.x - player.x);
    camX = lerp(CAMP.x - 20, target.x - 10, p);
    camY = lerp(CAMP.y + 20, target.y - 10, p);
    camZoom = lerp(1.15, 1.7, p);
    if (p > 0.97 && !window._stepSfx) { window._stepSfx = true; sfx.step(); }
  } else if (t < 9.2) {
    const p = clamp((t - 8.0) / 1.2, 0, 1);
    const target = cultActors[0];
    camX = target.x - 10; camY = target.y - 10; camZoom = 1.7;
    player.swing = p < 0.6 ? p / 0.6 : 0;
    if (p > 0.15 && !targetKilled) {
      targetKilled = true;
      target.dead = true;
      burst(target.x, target.y - 8, '#d8cfb8', 14, 190, 60);
      flashWhite = 0.35;
      shake = 8;
      sfx.swing();
      setTimeout(() => sfx.takedown(), 90);
    }
  } else if (t < 11.0) {
    const p = easeInOut(clamp((t - 9.2) / 1.8, 0, 1));
    camX = lerp(cultActors[0].x, TOTEM.x, p);
    camY = lerp(cultActors[0].y, TOTEM.y, p);
    camZoom = lerp(1.7, 1.3, p);
    if (p > 0.05 && !window._gongSfx) { window._gongSfx = true; sfx.gong(); }
  } else if (t < 13.0) {
    const p = clamp((t - 11.0) / 2.0, 0, 1);
    camX = TOTEM.x; camY = TOTEM.y - 10; camZoom = lerp(1.3, 1.05, p);
    titleT = p;
  } else {
    camX = TOTEM.x; camY = TOTEM.y - 10; camZoom = 1.05;
    titleT = 1;
  }

  if (shake > 0) {
    camX += rnd(-shake, shake) * 0.3; camY += rnd(-shake, shake) * 0.3;
    shake = Math.max(0, shake - 0.5);
  }

  drawWorld(camX, camY, camZoom, vignette);

  // 前景角色（跟世界同一變換，手動再畫一次以疊在地景上層）
  ctx.save();
  ctx.translate(GAME_W / 2, GAME_H / 2);
  ctx.scale(camZoom, camZoom);
  ctx.translate(-camX, -camY);
  for (const c of cultActors) {
    if (c.dead) {
      drawFigure(c.x, c.y, c.face, { color: PAL.cult, trim: PAL.cultTrim, dead: true });
    } else {
      drawFigure(c.x, c.y, c.face, { color: PAL.cult, trim: PAL.cultTrim, eyes: true, ph: c.ph });
    }
  }
  if (t < 9.2 || t >= 9.2) {
    drawFigure(player.x, player.y, player.face, { color: PAL.player, trim: PAL.playerTrim, walk: t < 8.0, walkT: t, swing: player.swing });
  }
  updateParts(0.016); drawParts();
  ctx.restore();

  // 暗角
  const vg = ctx.createRadialGradient(GAME_W / 2, GAME_H / 2, GAME_H * 0.25, GAME_W / 2, GAME_H / 2, GAME_H * 0.75);
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = vg; ctx.fillRect(0, 0, GAME_W, GAME_H);

  if (flashWhite > 0) {
    ctx.globalAlpha = flashWhite;
    ctx.fillStyle = '#fff3d8';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    ctx.globalAlpha = 1;
    flashWhite = Math.max(0, flashWhite - 0.03);
  }

  // 標題淡入（0-2.5s）
  if (t < 3.2) {
    const a = t < 2.5 ? clamp(t / 1.4, 0, 1) : clamp(1 - (t - 2.5) / 0.7, 0, 1);
    ctx.globalAlpha = a;
    textOutline('夜襲：邪教據點', GAME_W / 2, GAME_H * 0.28, 46, PAL.ink);
    ctx.font = '18px sans-serif'; ctx.fillStyle = PAL.dim; ctx.textAlign = 'center';
    ctx.fillText('月夜潛行 · 繞背偷襲 · 搶奪祭壇戰利品', GAME_W / 2, GAME_H * 0.28 + 34);
    ctx.globalAlpha = 1;
  }

  // 結尾標題卡（11-15.5s）
  if (titleT > 0) {
    ctx.globalAlpha = clamp(titleT, 0, 1);
    ctx.fillStyle = 'rgba(6,11,8,0.55)';
    ctx.fillRect(0, GAME_H * 0.62, GAME_W, GAME_H * 0.38);
    textOutline('夜襲：邪教據點', GAME_W / 2, GAME_H * 0.72, 40, PAL.fireHot);
    ctx.font = 'bold 17px sans-serif'; ctx.fillStyle = PAL.ink; ctx.textAlign = 'center';
    ctx.fillText('避開視線錐 · 繞背一擊必殺 · 撐過三個夜晚', GAME_W / 2, GAME_H * 0.72 + 32);
    if (t >= 13.0) {
      const p2 = clamp((t - 13.0) / 1.5, 0, 1);
      ctx.globalAlpha = p2 * clamp(titleT, 0, 1);
      ctx.fillStyle = PAL.amber;
      ctx.font = 'bold 22px sans-serif';
      ctx.fillText('▶ 立即遊玩', GAME_W / 2, GAME_H * 0.72 + 68);
    }
    ctx.globalAlpha = 1;
  }
}

let startTime = null;
function frame(now) {
  if (startTime === null) startTime = now;
  const t = (now - startTime) / 1000;
  if (t >= TOTAL) {
    scene(TOTAL - 0.001);
    ended = true;
    replayBtn.style.display = 'block';
    return;
  }
  scene(t);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

replayBtn.addEventListener('click', () => {
  audio();
  startTime = null; ended = false;
  targetKilled = false; flashWhite = 0; titleT = 0; shake = 0;
  cultActors[0].dead = false;
  parts.length = 0;
  window._stepSfx = false; window._gongSfx = false;
  player = { x: 90, y: 470, face: -1.1, swing: 0 };
  replayBtn.style.display = 'none';
  requestAnimationFrame(frame);
});

soundBtn.addEventListener('click', () => {
  audio();
  setMuted(!muted);
  soundBtn.textContent = muted ? '🔇' : '🔊';
});
</script>
