<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="author" content="Claude">
<title>JOJO老師升級版 介紹影片</title>
<style>
  :root{
    --gold:#ffcf5c; --gold2:#ffa72e; --amber:#ff7e3d;
    --bg:#0a0805; --card:#171208; --border:rgba(255,205,100,.16);
    --text:#f7f0e0; --muted:#a89877;
    --cyan:#38e1ff; --blue:#4f7cff; --purple:#9a6bff; --pink:#ff6cc7;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ width:100%; height:100%; overflow:hidden; background:#000; }
  body{
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;
    display:flex; align-items:center; justify-content:center;
  }
  #stage{
    position:relative; width:100%; height:100%; max-width:800px; aspect-ratio:9/16;
    background:
      radial-gradient(900px 600px at 85% -10%, rgba(255,167,46,.16), transparent 60%),
      radial-gradient(700px 500px at -10% 20%, rgba(255,207,92,.10), transparent 60%),
      radial-gradient(600px 500px at 50% 120%, rgba(255,126,61,.12), transparent 60%),
      var(--bg);
    overflow:hidden; color:var(--text);
    will-change:transform;
  }
  @media (min-aspect-ratio: 9/16){ #stage{ height:100%; width:auto; } }

  #cam{ position:absolute; inset:0; transform-origin:50% 50%; }

  /* ---------- shared ---------- */
  .layer{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; opacity:0; }
  .hidden{ display:none !important; }
  .cap{
    position:absolute; left:50%; bottom:9%; transform:translateX(-50%);
    font-size:clamp(14px,4.2vw,20px); font-weight:700; letter-spacing:2px; text-align:center;
    color:var(--text); background:rgba(10,8,5,.55); border:1px solid var(--border);
    padding:9px 22px; border-radius:999px; white-space:nowrap; opacity:0;
    box-shadow:0 8px 24px rgba(0,0,0,.35);
  }

  /* ---------- scene 1: logo reveal ---------- */
  .logo{
    width:112px; height:112px; border-radius:30px;
    background:linear-gradient(145deg, var(--gold), var(--gold2) 55%, var(--amber));
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 18px 50px rgba(255,167,46,.4);
    transform:scale(.4) rotate(-18deg); opacity:0;
  }
  .logo svg{ width:60px; height:60px; }
  .brand{
    margin-top:26px; font-size:clamp(30px,9vw,46px); font-weight:800; letter-spacing:6px;
    background:linear-gradient(92deg, var(--gold) 0%, #ffe9b0 45%, var(--amber) 85%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    opacity:0; transform:translateY(18px);
  }
  .brand2{
    margin-top:10px; font-size:clamp(13px,3.6vw,17px); letter-spacing:5px; color:var(--muted);
    opacity:0; transform:translateY(10px);
  }

  /* ---------- scene 2: feature cards ---------- */
  #s2{ padding:8% 7%; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:16px; width:100%; max-width:460px; }
  .mcard{
    background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:hidden;
    opacity:0; transform:translateY(40px) scale(.92);
    box-shadow:0 16px 40px rgba(0,0,0,.45);
  }
  .mthumb{ position:relative; aspect-ratio:8/5; overflow:hidden; }
  .mthumb .g{ position:absolute; inset:0; }
  .mthumb .probadge{
    position:absolute; top:8px; left:8px; font-size:9.5px; font-weight:700; letter-spacing:1.2px;
    background:linear-gradient(92deg, var(--gold), var(--gold2)); color:#241a05;
    border-radius:999px; padding:3px 9px;
  }
  .mmeta{ padding:9px 11px 11px; }
  .mname{ font-size:12.5px; font-weight:600; }
  .mnums{ margin-top:5px; font-size:10px; color:var(--muted); display:flex; gap:8px; }
  .s2head{
    position:absolute; top:9%; left:50%; transform:translateX(-50%); text-align:center; opacity:0;
  }
  .s2head h2{ font-size:clamp(22px,6vw,30px); font-weight:800; letter-spacing:2px;
    background:linear-gradient(92deg, var(--gold), #ffe9b0, var(--amber));
    -webkit-background-clip:text; background-clip:text; color:transparent; }
  .s2head p{ margin-top:6px; font-size:clamp(12px,3.4vw,14px); color:var(--muted); letter-spacing:1px; }

  /* ---------- scene 3: feature pills ---------- */
  #s3{ gap:16px; }
  .pill{
    display:flex; align-items:center; gap:12px; padding:14px 22px; border-radius:999px;
    background:var(--card); border:1px solid var(--border); min-width:250px;
    opacity:0; transform:translateX(-60px);
    box-shadow:0 12px 30px rgba(0,0,0,.4);
  }
  .pill .ic{
    width:34px; height:34px; border-radius:50%; flex:none; display:flex; align-items:center; justify-content:center;
    color:#241a05; font-size:16px; font-weight:800;
  }
  .pill span.label{ font-size:15px; font-weight:700; letter-spacing:1px; }
  .pill:nth-child(1) .ic{ background:linear-gradient(135deg,var(--gold),var(--gold2)); }
  .pill:nth-child(2) .ic{ background:linear-gradient(135deg,var(--pink),var(--purple)); }
  .pill:nth-child(3) .ic{ background:linear-gradient(135deg,var(--cyan),var(--blue)); }

  /* ---------- scene 4: CTA ---------- */
  #s4 .cta-logo{
    width:88px; height:88px; border-radius:24px;
    background:linear-gradient(145deg, var(--gold), var(--gold2) 55%, var(--amber));
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 18px 50px rgba(255,167,46,.4);
    transform:scale(.7); opacity:0;
  }
  #s4 .cta-logo svg{ width:48px; height:48px; }
  .cta-title{
    margin-top:20px; font-size:clamp(24px,7vw,34px); font-weight:800; letter-spacing:2px;
    color:var(--text); opacity:0; transform:translateY(14px);
  }
  .cta-sub{
    margin-top:10px; font-size:clamp(13px,3.6vw,16px); color:var(--gold); letter-spacing:1px;
    opacity:0; transform:translateY(10px); font-weight:700;
  }
  .cta-url{
    margin-top:18px; padding:9px 20px; border-radius:999px; border:1px solid var(--border);
    background:var(--card); font-size:12.5px; color:var(--muted); letter-spacing:.5px; opacity:0;
  }

  /* ---------- particles ---------- */
  .spark{ position:absolute; border-radius:50%; pointer-events:none; opacity:0; }

  /* ---------- controls ---------- */
  #ui{ position:absolute; inset:0; z-index:20; pointer-events:none; }
  #muteBtn{
    position:absolute; top:16px; right:16px; width:44px; height:44px; border-radius:50%;
    background:rgba(10,8,5,.55); border:1px solid var(--border); color:var(--text);
    display:flex; align-items:center; justify-content:center; font-size:18px; cursor:pointer;
    pointer-events:auto;
  }
  #hint{
    position:absolute; top:16px; left:16px; padding:8px 14px; border-radius:999px;
    background:rgba(10,8,5,.55); border:1px solid var(--border); font-size:11.5px; color:var(--muted);
    letter-spacing:.5px; opacity:1; transition:opacity .4s;
  }
  #replayWrap{
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(6,4,0,.55); pointer-events:auto; z-index:25;
  }
  #replayWrap.show{ display:flex; }
  #replayBtn{
    min-width:150px; min-height:52px; padding:12px 30px; border-radius:999px; border:none; cursor:pointer;
    background:linear-gradient(92deg, var(--gold), var(--gold2)); color:#241a05;
    font-size:16px; font-weight:800; letter-spacing:2px;
    box-shadow:0 14px 36px rgba(255,167,46,.4);
    display:flex; align-items:center; gap:8px;
  }

  @keyframes floatY{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-8px); } }
</style>
</head>
<body>

<div id="stage">
  <div id="cam">

    <!-- Scene 1 -->
    <div class="layer" id="s1">
      <div class="logo" id="s1logo">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 5.8L20 9l-4.4 4 1.2 6-4.8-3.2L7.2 19l1.2-6L4 9l5.6-1.2L12 2z" fill="#241a05"/></svg>
      </div>
      <div class="brand" id="s1brand">JOJO老師升級版</div>
      <div class="brand2" id="s1sub">AI未來創作營隊 · 專業重製版</div>
    </div>

    <!-- Scene 2 -->
    <div class="layer" id="s2">
      <div class="s2head" id="s2head">
        <h2>作品全面升級</h2>
        <p>遊戲與動畫，逐一專業重製</p>
      </div>
      <div class="grid2" id="grid2"></div>
    </div>

    <!-- Scene 3 -->
    <div class="layer" id="s3">
      <div class="pill">
        <div class="ic">✓</div>
        <span class="label">複製程式碼再進化</span>
      </div>
      <div class="pill">
        <div class="ic">♥</div>
        <span class="label">投票好玩程度</span>
      </div>
      <div class="pill">
        <div class="ic">▶</div>
        <span class="label">即時瀏覽 / 遊玩次數</span>
      </div>
    </div>

    <!-- Scene 4 -->
    <div class="layer" id="s4">
      <div class="cta-logo" id="s4logo">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 5.8L20 9l-4.4 4 1.2 6-4.8-3.2L7.2 19l1.2-6L4 9l5.6-1.2L12 2z" fill="#241a05"/></svg>
      </div>
      <div class="cta-title">JOJO老師升級版</div>
      <div class="cta-sub">現在就去體驗</div>
      <div class="cta-url">wowhome-ai.vercel.app/pro.html</div>
    </div>

    <div class="cap" id="caption"></div>
  </div>
</div>

<div id="ui">
  <div id="hint">🔇 點聲音鈕開啟音效</div>
  <button id="muteBtn" aria-label="切換聲音">🔇</button>
  <div id="replayWrap">
    <button id="replayBtn">↻ 重新播放</button>
  </div>
</div>

<script>
/* ===================== Web Audio 合成音效 ===================== */
let actx = null, muted = true;
function ac() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); return actx; }
function chime(freq, dur, delay, type, vol) {
  if (muted) return;
  const c = ac(); const t0 = c.currentTime + (delay || 0);
  const o = c.createOscillator(), g = c.createGain();
  o.type = type || 'sine'; o.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol || 0.12, t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(c.destination);
  o.start(t0); o.stop(t0 + dur + 0.05);
}
function sweep(f0, f1, dur, delay, vol) {
  if (muted) return;
  const c = ac(); const t0 = c.currentTime + (delay || 0);
  const o = c.createOscillator(), g = c.createGain();
  o.type = 'triangle';
  o.frequency.setValueAtTime(f0, t0);
  o.frequency.exponentialRampToValueAtTime(f1, t0 + dur);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol || 0.1, t0 + 0.03);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(c.destination);
  o.start(t0); o.stop(t0 + dur + 0.05);
}

/* ---- 背景音樂：合成和弦進行 + 貝斯，20 秒無縫循環 ---- */
let musicNodes = [];
let musicTimer = null;
const CHORDS = [
  [261.63, 329.63, 392.00],   // C
  [220.00, 261.63, 329.63],   // Am
  [174.61, 220.00, 261.63],   // F
  [196.00, 246.94, 293.66],   // G
];
const BASS = [130.81, 110.00, 87.31, 98.00];
function playChord(freqs, bassFreq, t0, dur) {
  const c = ac();
  freqs.forEach(f => {
    const o = c.createOscillator(), g = c.createGain();
    o.type = 'triangle'; o.frequency.setValueAtTime(f, t0);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.028, t0 + 0.4);
    g.gain.linearRampToValueAtTime(0.02, t0 + dur - 0.6);
    g.gain.linearRampToValueAtTime(0, t0 + dur);
    o.connect(g); g.connect(c.destination);
    o.start(t0); o.stop(t0 + dur + 0.05);
    musicNodes.push(o);
  });
  const bo = c.createOscillator(), bg = c.createGain();
  bo.type = 'sine'; bo.frequency.setValueAtTime(bassFreq, t0);
  bg.gain.setValueAtTime(0, t0);
  bg.gain.linearRampToValueAtTime(0.05, t0 + 0.05);
  bg.gain.linearRampToValueAtTime(0, t0 + dur * 0.85);
  bo.connect(bg); bg.connect(c.destination);
  bo.start(t0); bo.stop(t0 + dur + 0.05);
  musicNodes.push(bo);
}
function startMusic() {
  stopMusic();
  const c = ac();
  const barDur = 5; // 4 小節 * 5 秒 = 20 秒剛好對齊整支影片
  for (let i = 0; i < CHORDS.length; i++) {
    playChord(CHORDS[i], BASS[i], c.currentTime + i * barDur, barDur);
  }
  musicTimer = setTimeout(() => { if (!muted) startMusic(); }, CHORDS.length * barDur * 1000);
}
function stopMusic() {
  if (musicTimer) { clearTimeout(musicTimer); musicTimer = null; }
  musicNodes.forEach(n => { try { n.stop(); } catch (e) {} });
  musicNodes = [];
}

const muteBtn = document.getElementById('muteBtn');
const hint = document.getElementById('hint');
muteBtn.addEventListener('click', () => {
  muted = !muted;
  if (!muted) {
    ac(); if (ac().state === 'suspended') ac().resume();
    startMusic();
  } else {
    stopMusic();
  }
  muteBtn.textContent = muted ? '🔇' : '🔊';
  hint.style.opacity = muted ? '1' : '0';
});

/* ===================== 卡片假資料（示意畫面） ===================== */
const CARD_DATA = [
  { name: '貪食蛇 PRO', g: 'linear-gradient(135deg,#38e1ff,#4f7cff)' },
  { name: '打磚塊 PRO', g: 'linear-gradient(135deg,#ff6cc7,#9a6bff)' },
  { name: '星空冒險', g: 'linear-gradient(135deg,#ffcf5c,#ff7e3d)' },
  { name: '跳躍大冒險', g: 'linear-gradient(135deg,#9a6bff,#4f7cff)' },
];
const grid2 = document.getElementById('grid2');
CARD_DATA.forEach(d => {
  const el = document.createElement('div');
  el.className = 'mcard';
  el.innerHTML =
    '<div class="mthumb"><div class="g" style="background:' + d.g + '"></div><span class="probadge">PRO</span></div>' +
    '<div class="mmeta"><div class="mname">' + d.name + '</div>' +
    '<div class="mnums"><span>👁 128</span><span>♥ 42</span></div></div>';
  grid2.appendChild(el);
});

/* ===================== 動畫時間軸（20 秒） ===================== */
const easeOutBack = 'cubic-bezier(.34,1.56,.64,1)';
const easeOut = 'cubic-bezier(.16,1,.3,1)';

function anim(el, keyframes, opts) {
  return el.animate(keyframes, Object.assign({ fill: 'forwards', easing: easeOut }, opts));
}

const cam = document.getElementById('cam');
const caption = document.getElementById('caption');
function showCaption(text, delay, dur) {
  setTimeout(() => {
    caption.textContent = text;
    anim(caption, [{ opacity: 0, transform: 'translate(-50%,10px)' }, { opacity: 1, transform: 'translate(-50%,0)' }], { duration: 380 });
    setTimeout(() => anim(caption, [{ opacity: 1 }, { opacity: 0 }], { duration: 300 }), dur);
  }, delay);
}

let timers = [];
function T(fn, ms) { timers.push(setTimeout(fn, ms)); }
function clearTimers() { timers.forEach(clearTimeout); timers = []; }

function playTimeline() {
  clearTimers();
  document.getElementById('replayWrap').classList.remove('show');
  if (!muted) startMusic();
  [1,2,3,4].forEach(n => {
    const l = document.getElementById('s' + n);
    l.style.opacity = 0;
  });

  /* ---- Scene 1 : 0s - 5.5s ---- */
  const s1 = document.getElementById('s1');
  s1.style.opacity = 1;
  anim(document.getElementById('s1logo'), [
    { transform: 'scale(.4) rotate(-18deg)', opacity: 0 },
    { transform: 'scale(1.12) rotate(4deg)', opacity: 1, offset: .7 },
    { transform: 'scale(1) rotate(0deg)', opacity: 1 }
  ], { duration: 700, easing: easeOutBack });
  chime(880, .5, 0, 'sine', .14);
  anim(document.getElementById('s1brand'), [
    { opacity: 0, transform: 'translateY(18px)' }, { opacity: 1, transform: 'translateY(0)' }
  ], { duration: 600, delay: 350 });
  chime(1320, .35, .45, 'sine', .1);
  anim(document.getElementById('s1sub'), [
    { opacity: 0, transform: 'translateY(10px)' }, { opacity: 1, transform: 'translateY(0)' }
  ], { duration: 500, delay: 750 });
  anim(cam, [{ transform: 'scale(1)' }, { transform: 'scale(1.05)' }], { duration: 5200, delay: 300, easing: 'ease-in-out' });

  T(() => {
    anim(s1, [{ opacity: 1 }, { opacity: 0 }], { duration: 450 });
  }, 5000);

  /* ---- Scene 2 : 5.5s - 12s : 卡片牆 ---- */
  T(() => {
    const s2 = document.getElementById('s2');
    s2.style.opacity = 1;
    anim(document.getElementById('s2head'), [
      { opacity: 0, transform: 'translate(-50%,-14px)' }, { opacity: 1, transform: 'translate(-50%,0)' }
    ], { duration: 500 });
    sweep(400, 900, .3, 0, .08);
    document.querySelectorAll('.mcard').forEach((c, i) => {
      anim(c, [
        { opacity: 0, transform: 'translateY(40px) scale(.92)' },
        { opacity: 1, transform: 'translateY(-4px) scale(1.02)', offset: .75 },
        { opacity: 1, transform: 'translateY(0) scale(1)' }
      ], { duration: 550, delay: 200 + i * 160, easing: easeOutBack });
      T(() => chime(700 + i * 90, .18, 0, 'triangle', .09), 200 + i * 160);
    });
    showCaption('遊戲 × 動畫，全面升級', 900, 3200);
  }, 5450);

  T(() => {
    anim(document.getElementById('s2'), [{ opacity: 1 }, { opacity: 0 }], { duration: 450 });
  }, 12000);

  /* ---- Scene 3 : 12s - 16s : 功能亮點 ---- */
  T(() => {
    const s3 = document.getElementById('s3');
    s3.style.opacity = 1;
    document.querySelectorAll('#s3 .pill').forEach((p, i) => {
      anim(p, [
        { opacity: 0, transform: 'translateX(-60px)' },
        { opacity: 1, transform: 'translateX(0)' }
      ], { duration: 480, delay: i * 320, easing: easeOutBack });
      T(() => chime(500 + i * 220, .22, 0, 'sine', .1), i * 320);
    });
    showCaption('點卡片就能直接體驗', 1200, 2400);
  }, 12450);

  T(() => {
    anim(document.getElementById('s3'), [{ opacity: 1 }, { opacity: 0 }], { duration: 450 });
  }, 16400);

  /* ---- Scene 4 : 16.4s - 20s : CTA ---- */
  T(() => {
    const s4 = document.getElementById('s4');
    s4.style.opacity = 1;
    anim(document.getElementById('s4logo'), [
      { opacity: 0, transform: 'scale(.7)' },
      { opacity: 1, transform: 'scale(1.1)', offset: .7 },
      { opacity: 1, transform: 'scale(1)' }
    ], { duration: 550, easing: easeOutBack });
    sweep(300, 1200, .5, 0, .12);
    anim(s4.querySelector('.cta-title'), [
      { opacity: 0, transform: 'translateY(14px)' }, { opacity: 1, transform: 'translateY(0)' }
    ], { duration: 450, delay: 250 });
    anim(s4.querySelector('.cta-sub'), [
      { opacity: 0, transform: 'translateY(10px)' }, { opacity: 1, transform: 'translateY(0)' }
    ], { duration: 450, delay: 500 });
    anim(s4.querySelector('.cta-url'), [
      { opacity: 0 }, { opacity: 1 }
    ], { duration: 450, delay: 750 });
    T(() => chime(1046, .5, 0, 'sine', .13), 250);
    T(() => chime(1568, .6, 0, 'sine', .12), 550);
  }, 16850);

  T(() => {
    document.getElementById('replayWrap').classList.add('show');
  }, 20000);
}

document.getElementById('replayBtn').addEventListener('click', playTimeline);

playTimeline();
</script>
</body>
</html>
