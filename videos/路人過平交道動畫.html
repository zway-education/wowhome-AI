<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>路人過平交道動畫</title>
<style>
  body {
    margin: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    gap: 16px;
    background: linear-gradient(#87CEEB, #cfeffd);
    overflow: hidden;
    font-family: sans-serif;
  }

  #soundBtn {
    padding: 10px 20px;
    font-size: 15px;
    border: none;
    border-radius: 8px;
    background: #2b6cb0;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  }
  #soundBtn:disabled {
    background: #718096;
    cursor: default;
  }

  .scene {
    position: relative;
    width: 700px;
    height: 500px;
    background: #7ec850;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
  }

  /* 鐵軌區域（水平方向，火車左右行駛） */
  .railway {
    position: absolute;
    top: 210px;
    left: 0;
    width: 100%;
    height: 60px;
    background: #8a6d3b;
  }
  .rail {
    position: absolute;
    width: 100%;
    height: 6px;
    background: #444;
  }
  .rail.top { top: 12px; }
  .rail.bottom { top: 42px; }
  .tie {
    position: absolute;
    top: 0;
    width: 10px;
    height: 60px;
    background: #5c4326;
  }

  /* 行人步道（垂直方向，由上往下） */
  .sidewalk {
    position: absolute;
    left: 330px;
    top: 0;
    width: 40px;
    height: 100%;
    background: #c9c2b6;
    z-index: 0;
  }
  .sidewalk .stripe {
    position: absolute;
    left: 8px;
    width: 24px;
    height: 14px;
    background: #fff;
  }

  /* 平交道柵欄：從步道旁的柱子伸出，橫向擋住步道 */
  .barrier {
    position: absolute;
    left: 330px;
    width: 60px;
    height: 8px;
    transform-origin: 0% 50%;
    z-index: 5;
  }
  .barrier-pole {
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
      to right,
      #ff3b3b 0 15px,
      #fff 15px 30px
    );
    transform-origin: 0% 50%;
    transform: rotate(-90deg);
    animation: barrierMove 6s infinite ease-in-out;
  }
  .barrier.top { top: 164px; }
  .barrier.bottom { top: 276px; }

  @keyframes barrierMove {
    0%, 15% { transform: rotate(-90deg); }  /* 收起，貼齊柱子豎放，可通行 */
    25%, 75% { transform: rotate(0deg); }   /* 放下，橫擋步道，禁止通行 */
    85%, 100% { transform: rotate(-90deg); } /* 收起 */
  }

  /* 警示燈 */
  .light-pole {
    position: absolute;
    width: 6px;
    height: 40px;
    background: #333;
  }
  .light-pole.top { top: 168px; left: 300px; }
  .light-pole.bottom { top: 292px; left: 300px; }
  .light {
    position: absolute;
    top: -14px;
    left: -7px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #550000;
    animation: blink 0.5s infinite alternate;
  }
  @keyframes blink {
    0% { background: #550000; box-shadow: none; }
    100% { background: #ff2222; box-shadow: 0 0 15px #ff2222; }
  }

  /* 火車（水平方向行駛） */
  .train {
    position: absolute;
    top: 218px;
    left: -300px;
    width: 260px;
    height: 44px;
    display: flex;
    animation: trainMove 6s infinite linear;
  }
  .train-car {
    width: 80px;
    height: 44px;
    background: #2b6cb0;
    border: 2px solid #1a365d;
    border-radius: 6px;
    margin-right: 4px;
    position: relative;
  }
  .train-car::before {
    content: "";
    position: absolute;
    top: 8px;
    left: 8px;
    width: 20px;
    height: 14px;
    background: #cfeffd;
    border-radius: 3px;
  }
  .train-car::after {
    content: "";
    position: absolute;
    top: 8px;
    left: 40px;
    width: 20px;
    height: 14px;
    background: #cfeffd;
    border-radius: 3px;
  }

  @keyframes trainMove {
    0%, 30% { left: -300px; }
    55% { left: 800px; }
    100% { left: 800px; }
  }

  /* 路人（從上往下走） */
  .pedestrian {
    position: absolute;
    left: 341px;
    width: 18px;
    height: 40px;
    animation: walk 6s infinite linear;
    z-index: 6;
  }

  @keyframes walk {
    0% { top: -40px; }
    15% { top: 150px; }   /* 走到柵欄前停下等待 */
    22% { top: 150px; }
    /* 柵欄放下、火車經過，路人在此等待 */
    86% { top: 150px; }
    /* 柵欄升起，路人穿越鐵道 */
    97% { top: 400px; }
    100% { top: 500px; }
  }

  .head {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #ffcc99;
    margin: 0 auto;
  }
  .body {
    width: 10px;
    height: 16px;
    background: #3182ce;
    margin: 0 auto;
    border-radius: 3px;
  }
  .legs {
    width: 12px;
    height: 10px;
    margin: 0 auto;
    position: relative;
  }
  .leg {
    position: absolute;
    width: 4px;
    height: 10px;
    background: #2c3e50;
    top: 0;
    animation: legSwing 0.3s infinite alternate;
  }
  .leg.left { left: 0; }
  .leg.right { left: 8px; animation-delay: 0.15s; }

  @keyframes legSwing {
    0% { transform: rotate(-20deg); }
    100% { transform: rotate(20deg); }
  }
</style>
</head>
<body>

<div class="scene">
  <div class="sidewalk">
    <div class="stripe" style="top:10px"></div>
    <div class="stripe" style="top:40px"></div>
    <div class="stripe" style="top:70px"></div>
    <div class="stripe" style="top:100px"></div>
    <div class="stripe" style="top:130px"></div>
    <div class="stripe" style="top:290px"></div>
    <div class="stripe" style="top:320px"></div>
    <div class="stripe" style="top:350px"></div>
    <div class="stripe" style="top:380px"></div>
    <div class="stripe" style="top:410px"></div>
    <div class="stripe" style="top:440px"></div>
    <div class="stripe" style="top:470px"></div>
  </div>

  <div class="railway">
    <div class="rail top"></div>
    <div class="rail bottom"></div>
    <div class="tie" style="left:10px"></div>
    <div class="tie" style="left:40px"></div>
    <div class="tie" style="left:70px"></div>
    <div class="tie" style="left:100px"></div>
    <div class="tie" style="left:130px"></div>
    <div class="tie" style="left:160px"></div>
    <div class="tie" style="left:190px"></div>
    <div class="tie" style="left:220px"></div>
    <div class="tie" style="left:250px"></div>
    <div class="tie" style="left:280px"></div>
    <div class="tie" style="left:310px"></div>
    <div class="tie" style="left:340px"></div>
    <div class="tie" style="left:370px"></div>
    <div class="tie" style="left:400px"></div>
    <div class="tie" style="left:430px"></div>
    <div class="tie" style="left:460px"></div>
    <div class="tie" style="left:490px"></div>
    <div class="tie" style="left:520px"></div>
    <div class="tie" style="left:550px"></div>
    <div class="tie" style="left:580px"></div>
    <div class="tie" style="left:610px"></div>
    <div class="tie" style="left:640px"></div>
    <div class="tie" style="left:670px"></div>
  </div>

  <div class="train">
    <div class="train-car"></div>
    <div class="train-car"></div>
    <div class="train-car"></div>
  </div>

  <div class="light-pole top"><div class="light"></div></div>
  <div class="light-pole bottom"><div class="light"></div></div>

  <div class="barrier top"><div class="barrier-pole"></div></div>
  <div class="barrier bottom"><div class="barrier-pole"></div></div>

  <div class="pedestrian">
    <div class="head"></div>
    <div class="body"></div>
    <div class="legs">
      <div class="leg left"></div>
      <div class="leg right"></div>
    </div>
  </div>
</div>

<button id="soundBtn">🔊 開啟音效</button>

<script>
  const CYCLE_MS = 6000;
  const soundBtn = document.getElementById('soundBtn');
  let audioCtx = null;
  let started = false;
  let bellInterval = null;
  let cycleTimer = null;

  function playBell(time) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(1600, time);
    gain.gain.setValueAtTime(0.0001, time);
    gain.gain.exponentialRampToValueAtTime(0.25, time + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.18);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(time);
    osc.stop(time + 0.2);
  }

  function playTrainRumble(startTime, duration) {
    const bufferSize = audioCtx.sampleRate * duration;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * 0.6;
    }
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;

    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(220, startTime);

    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.0001, startTime);
    gain.gain.exponentialRampToValueAtTime(0.5, startTime + duration * 0.15);
    gain.gain.setValueAtTime(0.5, startTime + duration * 0.8);
    gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

    noise.connect(filter).connect(gain).connect(audioCtx.destination);
    noise.start(startTime);
    noise.stop(startTime + duration);
  }

  function playHorn(startTime) {
    [440, 554].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(freq, startTime);
      gain.gain.setValueAtTime(0.0001, startTime);
      gain.gain.exponentialRampToValueAtTime(0.15, startTime + 0.05);
      gain.gain.setValueAtTime(0.15, startTime + 0.5);
      gain.gain.exponentialRampToValueAtTime(0.0001, startTime + 0.7);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(startTime);
      osc.stop(startTime + 0.7);
    });
  }

  function scheduleCycle() {
    const now = audioCtx.currentTime + 0.05;
    // 警示鈴聲：柵欄放下期間 (15% ~ 85% of 6s)
    const bellStart = now + CYCLE_MS * 0.15 / 1000;
    const bellEnd = now + CYCLE_MS * 0.85 / 1000;
    for (let t = bellStart; t < bellEnd; t += 0.4) {
      playBell(t);
    }
    // 火車鳴笛與行進聲：30% ~ 55%
    playHorn(now + CYCLE_MS * 0.28 / 1000);
    playTrainRumble(now + CYCLE_MS * 0.30 / 1000, CYCLE_MS * 0.25 / 1000);
  }

  soundBtn.addEventListener('click', () => {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    if (!started) {
      started = true;
      soundBtn.textContent = '🔊 音效已開啟';
      soundBtn.disabled = true;
      scheduleCycle();
      cycleTimer = setInterval(scheduleCycle, CYCLE_MS);
    }
  });
  /* 自動開聲：載入即嘗試開啟；若被瀏覽器政策擋住，第一次互動自動補開 */
  try { soundBtn.click(); } catch(e) {}
  const unlockAudio = () => { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); };
  addEventListener('pointerdown', unlockAudio, {once:true}); addEventListener('keydown', unlockAudio, {once:true});
</script>

</body>
</html>
