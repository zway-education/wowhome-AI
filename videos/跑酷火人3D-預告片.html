<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="author" content="AI未來創作營隊">
<title>跑酷火人3D 宣傳影片</title>
<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #070307;
    font-family: "PingFang TC","Microsoft JhengHei",sans-serif;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  canvas { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
  #soundBtn {
    position: fixed; top: 12px; right: 12px; z-index: 20;
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(10,10,20,0.65); border: 1px solid rgba(56,225,255,0.5);
    color: #eaf6ff; font-size: 20px; cursor: pointer;
  }
  #soundHint {
    position: fixed; top: 18px; right: 68px; z-index: 20;
    color: #eaf6ff; font-size: 14px; text-shadow: 0 0 4px #000;
    animation: hintFade 3.2s ease forwards;
    pointer-events: none;
  }
  @keyframes hintFade { 0%{opacity:0} 15%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
  #replayBtn {
    position: fixed; left: 50%; bottom: 12%; transform: translateX(-50%);
    z-index: 20; display: none;
    padding: 14px 42px; font-size: 20px; min-height: 48px;
    background: linear-gradient(92deg,#38e1ff,#4f7cff);
    color: #071018; border: none; border-radius: 10px; cursor: pointer;
    font-family: inherit; font-weight: 800;
  }
</style>
</head>
<body>
<button id="soundBtn">🔇</button>
<div id="soundHint">點聲音鈕開啟音樂</div>
<button id="replayBtn">重新播放</button>
<canvas id="stage"></canvas>

<script>
'use strict';
const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const soundBtn = document.getElementById('soundBtn');
const replayBtn = document.getElementById('replayBtn');

function resize() {
  const scale = Math.min(innerWidth / GAME_W, innerHeight / GAME_H);
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = GAME_W * scale * dpr;
  canvas.height = GAME_H * scale * dpr;
  canvas.style.width = GAME_W * scale + 'px';
  canvas.style.height = GAME_H * scale + 'px';
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
}
addEventListener('resize', resize); resize();

/* ---------- 音樂（合成、零外部資源） ----------
   輕快的電子跑酷風配樂：低音鼓點 + 琶音貝斯 + 五聲音階主旋律，全程 30 秒循環播放 */
let audioCtx = null, soundOn = false, musicStarted = false;
soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? '🔊' : '🔇';
  if (soundOn) {
    if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    if (audioCtx && !musicStarted) { musicStarted = true; startMusic(); }
  } else if (audioCtx) {
    audioCtx.suspend();
  }
});

function kick(t, vol) {
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.frequency.setValueAtTime(140, t);
  osc.frequency.exponentialRampToValueAtTime(45, t + 0.12);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
  osc.connect(g).connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.24);
}
function hat(t, vol) {
  const n = Math.floor(audioCtx.sampleRate * 0.05);
  const buf = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 2);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const f = audioCtx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 6000;
  const g = audioCtx.createGain(); g.gain.setValueAtTime(vol, t);
  src.connect(f).connect(g).connect(audioCtx.destination);
  src.start(t);
}
function note(t, freq, dur, vol, type) {
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(g).connect(audioCtx.destination);
  osc.start(t); osc.stop(t + dur + 0.02);
}
function chime() {
  if (!soundOn || !audioCtx) return;
  const t = audioCtx.currentTime;
  [880, 1108, 1318].forEach((fq, i) => note(t + i * 0.08, fq, 0.25, 0.14, 'triangle'));
}

// 五聲音階主旋律（C大調），貝斯根音，鼓點：以 0.25 秒為一拍，每 8 拍一小節，循環到 30 秒結束
const SCALE = [261.6, 293.7, 329.6, 392.0, 440.0, 523.3, 587.3, 659.3]; // C D E G A C D E
const MELODY_PATTERN = [0,2,4,7,6,4,2,0, 3,4,6,7,4,6,4,3, 0,2,4,7,7,6,4,3, 5,6,4,3,2,0,2,4];
const BASS_PATTERN = [0,0,4,4,3,3,5,5];
let musicTimer = null;
function startMusic() {
  const beat = 0.24;
  let step = 0;
  const startAt = audioCtx.currentTime + 0.05;
  function schedule() {
    if (!soundOn) return;
    const t = startAt + step * beat;
    const bar = step % 8;
    if (step % 2 === 0) kick(t, 0.5);
    if (step % 2 === 1) hat(t, 0.22);
    const mi = MELODY_PATTERN[step % MELODY_PATTERN.length];
    note(t, SCALE[mi], beat * 0.95, 0.16, 'square');
    const bi = BASS_PATTERN[bar];
    note(t, SCALE[bi] / 2, beat * 0.9, 0.2, 'sawtooth');
    step++;
  }
  musicTimer = setInterval(schedule, beat * 1000);
  schedule();
}

// ---------- 緩動 ----------
const easeOut = t => 1 - Math.pow(1 - t, 3);
const easeInOut = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

// ---------- 場景繪製 ----------
function drawSky(t) {
  const g = ctx.createRadialGradient(GAME_W/2, GAME_H*1.05, GAME_H*0.1, GAME_W/2, GAME_H*1.05, GAME_W*0.9);
  g.addColorStop(0, '#ff7e3d'); g.addColorStop(0.22, '#ff3d1c');
  g.addColorStop(0.5, '#4a0f08'); g.addColorStop(0.75, '#180608'); g.addColorStop(1, '#070307');
  ctx.fillStyle = g; ctx.fillRect(0, 0, GAME_W, GAME_H);
  ctx.save();
  ctx.globalAlpha = 0.22;
  ctx.fillStyle = 'rgba(255,170,80,0.6)';
  ctx.beginPath(); ctx.ellipse(GAME_W*0.2, GAME_H*0.15, GAME_W*0.3, GAME_H*0.15, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}
function drawEmbers(t, seedOffset) {
  let s = 11 + seedOffset;
  const rnd = () => { s = (s * 16807) % 2147483647; return s / 2147483647; };
  for (let i = 0; i < 34; i++) {
    const seed = rnd();
    const x = seed * GAME_W;
    const speed = 30 + seed * 40;
    const y = GAME_H - ((t * speed + seed * 400) % (GAME_H + 60));
    const size = 2 + seed * 4;
    const alpha = clamp(1 - Math.abs(y - GAME_H/2) / (GAME_H/2), 0.1, 0.85);
    const grd = ctx.createRadialGradient(x, y, 0, x, y, size);
    grd.addColorStop(0, `rgba(255,224,138,${alpha})`);
    grd.addColorStop(1, 'rgba(255,126,61,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI*2); ctx.fill();
  }
}
function drawLava(y, t) {
  ctx.save();
  const wob = Math.sin(t * 3) * 4;
  const g = ctx.createLinearGradient(0, y - 10, 0, y + 40);
  g.addColorStop(0, '#ffd36b'); g.addColorStop(0.4, '#ff7e3d'); g.addColorStop(1, '#8a1a06');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(0, y + wob);
  for (let x = 0; x <= GAME_W; x += 40) ctx.lineTo(x, y + Math.sin(t*3 + x*0.02) * 6);
  ctx.lineTo(GAME_W, GAME_H); ctx.lineTo(0, GAME_H); ctx.closePath(); ctx.fill();
  ctx.restore();
}
function drawPlatform(x, y, w, h) {
  ctx.save();
  const g = ctx.createLinearGradient(0, y, 0, y + h);
  g.addColorStop(0, '#3a4a6a'); g.addColorStop(1, '#1a2138');
  ctx.fillStyle = g; ctx.fillRect(x, y, w, h);
  ctx.fillStyle = 'rgba(56,225,255,0.5)'; ctx.fillRect(x, y, w, 3);
  ctx.restore();
}
function drawRunner(x, y, size, t, jumpP) {
  const bob = jumpP !== undefined ? -Math.sin(jumpP * Math.PI) * size * 0.6 : 0;
  const leg = Math.sin(t * 14) * size * 0.28;
  ctx.save();
  ctx.translate(x, y + bob);
  const grad = ctx.createLinearGradient(0, -size, 0, size*0.3);
  grad.addColorStop(0, '#ffcf5c'); grad.addColorStop(1, '#ff7e3d');
  ctx.strokeStyle = grad; ctx.fillStyle = grad;
  ctx.lineWidth = Math.max(3, size * 0.1);
  ctx.lineCap = 'round';
  // 火焰光暈
  const glow = ctx.createRadialGradient(0,-size*0.3,0,0,-size*0.3,size*1.4);
  glow.addColorStop(0, 'rgba(255,190,90,0.5)'); glow.addColorStop(1, 'rgba(255,120,40,0)');
  ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(0, -size*0.3, size*1.4, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = grad; ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(0, -size * 0.8, size * 0.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(0, -size * 0.6); ctx.lineTo(0, 0); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0, -size * 0.4); ctx.lineTo(-size * 0.32, -size * 0.1 - leg * 0.3);
  ctx.moveTo(0, -size * 0.4); ctx.lineTo(size * 0.32, -size * 0.1 + leg * 0.3);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0, 0); ctx.lineTo(-size * 0.24, size * 0.45 + leg);
  ctx.moveTo(0, 0); ctx.lineTo(size * 0.24, size * 0.45 - leg);
  ctx.stroke();
  ctx.restore();
}
function drawFlag(x, y, size, t) {
  ctx.save();
  ctx.translate(x, y);
  ctx.strokeStyle = '#eaf6ff'; ctx.lineWidth = Math.max(2, size*0.06);
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -size); ctx.stroke();
  const wave = Math.sin(t * 5) * size * 0.12;
  const g = ctx.createLinearGradient(0, -size, size*0.6, -size*0.7);
  g.addColorStop(0, '#38e1ff'); g.addColorStop(1, '#9a6bff');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(0, -size); ctx.lineTo(size*0.55, -size*0.85 + wave); ctx.lineTo(0, -size*0.68);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}
function progressPill(pct) {
  ctx.save();
  ctx.font = "bold 16px sans-serif"; ctx.textAlign = 'left';
  const txt = Math.floor(pct) + '%';
  ctx.fillStyle = 'rgba(7,11,20,0.62)';
  ctx.fillRect(14, 14, 74, 32);
  ctx.strokeStyle = 'rgba(56,225,255,0.5)'; ctx.strokeRect(14, 14, 74, 32);
  ctx.fillStyle = '#38e1ff';
  ctx.fillText(txt, 26, 36);
  ctx.restore();
}
function subtitle(text, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';
  ctx.font = "bold 24px 'PingFang TC','Microsoft JhengHei',sans-serif";
  const y = GAME_H - 56;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  const w = ctx.measureText(text).width + 44;
  ctx.fillRect(GAME_W / 2 - w / 2, y - 30, w, 46);
  ctx.fillStyle = '#eaf6ff';
  ctx.shadowColor = '#000'; ctx.shadowBlur = 6;
  ctx.fillText(text, GAME_W / 2, y);
  ctx.restore();
}
function titleLogo(alpha, scale) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';
  ctx.font = `900 ${Math.floor(56 * scale)}px 'PingFang TC','Microsoft JhengHei',sans-serif`;
  const grad = ctx.createLinearGradient(GAME_W*0.25, 0, GAME_W*0.75, 0);
  grad.addColorStop(0, '#ffcf5c'); grad.addColorStop(0.5, '#ffa72e'); grad.addColorStop(1, '#ff7e3d');
  ctx.fillStyle = grad;
  ctx.shadowColor = 'rgba(255,140,50,0.6)'; ctx.shadowBlur = 26;
  ctx.fillText('跑酷火人3D', GAME_W / 2, GAME_H * 0.42);
  ctx.shadowBlur = 0;
  ctx.restore();
}

// ---------- 時間軸（總長 30 秒，三幕結構）----------
const DURATION = 30;
let startTime = null, playing = false;
let firedCues = {};
function cue(id, fn) { if (!firedCues[id]) { firedCues[id] = true; fn(); } }

function draw(t) {
  ctx.clearRect(0, 0, GAME_W, GAME_H);
  drawSky(t);
  drawEmbers(t, 0);

  if (t < 6) {
    // ===== 第一幕：標題浮現 =====
    drawLava(GAME_H * 0.86, t);
    const p = clamp(t / 1.4, 0, 1);
    titleLogo(easeOut(p), 0.7 + easeOut(p) * 0.3);
    if (t > 2) {
      const sp = clamp((t - 2) / 0.8, 0, 1);
      ctx.save();
      ctx.globalAlpha = sp;
      ctx.textAlign = 'center';
      ctx.font = "22px 'PingFang TC','Microsoft JhengHei',sans-serif";
      ctx.fillStyle = '#9fb3d9';
      ctx.fillText('AI未來創作營隊 出品 · 第一人稱 3D 跑酷冒險', GAME_W / 2, GAME_H * 0.52);
      ctx.restore();
    }
    if (t > 3.6) subtitle('越過熔岩，抵達終點旗！', clamp((t - 3.6) / 0.6, 0, 1));
    if (t > 0.2) cue('act1chime', () => chime());
  } else if (t < 12) {
    // ===== 第二幕A：跑跳越過熔岩 =====
    const p = (t - 6) / 6;
    drawLava(GAME_H * 0.82, t);
    drawPlatform(GAME_W*0.05, GAME_H*0.72, GAME_W*0.22, 18);
    drawPlatform(GAME_W*0.42, GAME_H*0.72, GAME_W*0.22, 18);
    drawPlatform(GAME_W*0.79, GAME_H*0.72, GAME_W*0.22, 18);
    const cyc = (p * 2.2) % 1;
    const runX = GAME_W * (0.12 + p * 0.76 > 0.95 ? 0.95 : 0.12 + p * 0.76);
    const jumpP = cyc < 0.5 ? cyc * 2 : 0;
    drawRunner(runX, GAME_H * 0.7, 46, t, jumpP);
    if (t < 9) subtitle('WASD / 虛擬搖桿移動，空白鍵起跳', clamp((t - 6.3) / 0.6, 0, 1));
    else subtitle('踩穩平臺，掉進熔岩會回到檢查點！', clamp((t - 9.2) / 0.6, 0, 1));
    cue('jumpBeat', () => chime());
  } else if (t < 20) {
    // ===== 第二幕B：連續跳台加速 =====
    const p = (t - 12) / 8;
    drawLava(GAME_H * 0.8, t);
    for (let i = 0; i < 4; i++) {
      const px = ((GAME_W * 0.15 * i + t * 90) % (GAME_W + 160)) - 80;
      drawPlatform(px, GAME_H * (0.66 + (i%2)*0.08), 100, 16);
    }
    const bobT = (p * 3) % 1;
    drawRunner(GAME_W * 0.5, GAME_H * 0.6, 52, t, bobT < 0.5 ? bobT*2 : 0);
    progressPill(clamp(p * 100, 0, 100));
    if (t < 16.4) subtitle('連續平臺挑戰你的節奏感', clamp((t - 12.3) / 0.6, 0, 1));
    else subtitle('計時破紀錄，登上最佳成績！', clamp((t - 16.6) / 0.6, 0, 1));
    if (t > 14) cue('speedThump', () => chime());
  } else {
    // ===== 第三幕：抵達終點旗 + CTA =====
    const p = (t - 20) / 10;
    drawLava(GAME_H * 0.84, t);
    drawFlag(GAME_W * 0.78, GAME_H * 0.72, 130, t);
    const runP = easeInOut(clamp(p * 1.6, 0, 1));
    drawRunner(GAME_W * (0.15 + runP * 0.6), GAME_H * 0.7, 48, t, (p*4)%1 < 0.5 ? ((p*4)%1)*2 : 0);
    if (t < 23.4) {
      subtitle('衝向終點旗，完成通關！', clamp((t - 20.3) / 0.6, 0, 1));
      if (t > 20.4) cue('runCue', () => {});
    } else if (t < 25) {
      const wp = clamp((t - 23.4) / 0.6, 0, 1);
      ctx.save();
      ctx.globalAlpha = wp;
      ctx.textAlign = 'center';
      ctx.font = "900 46px 'PingFang TC','Microsoft JhengHei',sans-serif";
      const grad = ctx.createLinearGradient(GAME_W*0.3,0,GAME_W*0.7,0);
      grad.addColorStop(0, '#38e1ff'); grad.addColorStop(1, '#9a6bff');
      ctx.fillStyle = grad;
      ctx.fillText('通關成功！', GAME_W / 2, GAME_H * 0.32);
      ctx.restore();
      cue('winChime', () => chime());
    } else {
      const cta = clamp((t - 25) / 1, 0, 1);
      titleLogo(easeOut(cta), 0.9 + easeOut(cta) * 0.1);
      ctx.save();
      ctx.globalAlpha = easeOut(cta);
      ctx.textAlign = 'center';
      ctx.font = "bold 24px 'PingFang TC','Microsoft JhengHei',sans-serif";
      ctx.fillStyle = '#eaf6ff';
      ctx.fillText('鍵盤＋觸控雙支援 · 立即挑戰', GAME_W / 2, GAME_H * 0.52);
      ctx.restore();
      cue('ctaChime', () => chime());
    }
  }

  // 全程輕微暗角
  const edge = ctx.createRadialGradient(GAME_W/2, GAME_H/2, GAME_H*0.35, GAME_W/2, GAME_H/2, GAME_W*0.75);
  edge.addColorStop(0, 'rgba(0,0,0,0)');
  edge.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = edge;
  ctx.fillRect(0, 0, GAME_W, GAME_H);
}

function loop(now) {
  if (!playing) return;
  if (startTime === null) startTime = now;
  const t = (now - startTime) / 1000;
  if (t >= DURATION) {
    draw(DURATION - 0.01);
    playing = false;
    replayBtn.style.display = 'block';
    if (musicTimer) { clearInterval(musicTimer); musicTimer = null; musicStarted = false; }
    return;
  }
  draw(t);
  requestAnimationFrame(loop);
}

function play() {
  startTime = null;
  firedCues = {};
  playing = true;
  replayBtn.style.display = 'none';
  if (soundOn && audioCtx && !musicStarted) { musicStarted = true; startMusic(); }
  requestAnimationFrame(loop);
}
replayBtn.addEventListener('click', play);
play();
</script>

(function(){

  var NS="ai-future-camp", K="3D-80501bae";

  var REL="/abacus/"; /* 同源代理（Vercel 轉發）：學校閘道擋外部網域時仍然通 */
  function ping(n){
    try{
      fetch(REL+"hit/"+NS+"/"+n).then(function(r){
        if(!r||!r.ok){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); }
      }).catch(function(){ var q=fetch(ABS+"hit/"+NS+"/"+n,{mode:"no-cors",keepalive:true}); if(q&&q.catch) q.catch(function(){}); });
    }catch(e){}
  }
  function read(n,cb){
    function via(base,next){ try{ fetch(base+"get/"+NS+"/"+n).then(function(r){ if(r.status===404&&base===ABS) return {value:0}; if(!r.ok) throw 0; return r.json(); }).then(function(j){ cb(j.value||j.count||0); }).catch(next); }catch(e){ next(); } }
    via(REL, function(){ via(ABS, function(){ cb(null); }); });
  }
  ping(K+"-v");
  ping(K+"-p"); ping("site-total-plays");
  /* 投票鈕：非常好玩/好玩——與作品館同一計數器，任何網頁打開都同步 */
  function initVotes(){
    if(!document.body) return;
    var wrap=document.createElement("div");
    wrap.style.cssText="position:fixed;right:10px;bottom:10px;z-index:99999;display:flex;gap:6px;font-family:sans-serif;opacity:.92";
    var LS="voted-"+K;
    var defs=[["-love","\u2764\uFE0F","\u975e\u5e38\u597d\u73a9","#ff6cc7"],["-like","\ud83d\udc4d","\u597d\u73a9","#38e1ff"]];
    var btns={};
    function refresh(){
      var voted=null; try{ voted=localStorage.getItem(LS); }catch(e){}
      defs.forEach(function(d){
        var b=btns[d[0]];
        b.style.boxShadow=(voted===d[0])?"0 0 0 2px "+d[3]:"0 2px 8px rgba(0,0,0,.35)";
        read(K+d[0],function(n){ read(K+d[0]+"-c",function(c){
          if(n===null) return;
          b.querySelector("i").textContent=Math.max(0,(n||0)-(c||0));
        }); });
      });
    }
    defs.forEach(function(d){
      var b=document.createElement("button");
      b.type="button"; b.title=d[2];
      b.style.cssText="min-height:42px;padding:8px 14px;border:none;border-radius:999px;background:rgba(15,18,32,.88);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;touch-action:manipulation";
      b.innerHTML=d[1]+" "+d[2]+" <i style=\"font-style:normal;color:"+d[3]+"\">0</i>";
      b.addEventListener("click",function(){
        var prev=null; try{ prev=localStorage.getItem(LS); }catch(e){}
        if(prev===d[0]){ ping(K+d[0]+"-c"); try{ localStorage.removeItem(LS); }catch(e){} }
        else{ if(prev){ ping(K+prev+"-c"); } ping(K+d[0]); try{ localStorage.setItem(LS,d[0]); }catch(e){} }
        setTimeout(refresh,600);
      });
      btns[d[0]]=b; wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    refresh();
    setInterval(function(){ if(!document.hidden) refresh(); },10000); /* 每10秒同步別人投的票 */
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",initVotes); else initVotes();
})();
</script>
<script>/* AI-CAMP-VIDEO-CONTROLS */
(function(){
  var ORAF=window.requestAnimationFrame.bind(window), OST=window.setTimeout.bind(window), OSI=window.setInterval.bind(window);
  var realNow=performance.now.bind(performance), D0=Date.now(), P0=realNow();
  var acc=0, lastReal=P0, paused=false, speed=1;
  function vnow(){ var r=realNow(); if(!paused){ acc+=(r-lastReal)*speed; } lastReal=r; return acc; }
  try{ performance.now=function(){ return vnow(); }; }catch(e){}
  try{ Date.now=function(){ return D0+Math.round(vnow()); }; }catch(e){}
  window.requestAnimationFrame=function(cb){ return ORAF(function tick(){ if(paused){ ORAF(tick); } else { cb(vnow()); } }); };
  window.setTimeout=function(fn,ms){ var a=[].slice.call(arguments,2);
    return OST(function f(){ if(paused){ OST(f,120); } else if(typeof fn==="function"){ fn.apply(null,a); } },ms); };
  window.setInterval=function(fn,ms){ var a=[].slice.call(arguments,2);
    return OSI(function(){ if(!paused&&typeof fn==="function"){ fn.apply(null,a); } },ms); };
  var ctxs=[];
  ["AudioContext","webkitAudioContext"].forEach(function(n){
    var C=window[n]; if(!C) return;
    var W=function(){ var c=new (Function.prototype.bind.apply(C,[null].concat([].slice.call(arguments))))(); ctxs.push(c); return c; };
    W.prototype=C.prototype; window[n]=W;
  });
  function setPaused(p){
    vnow(); paused=p;
    ctxs.forEach(function(c){ try{ p?c.suspend():c.resume(); }catch(e){} });
    [].forEach.call(document.querySelectorAll("audio,video"),function(m){ try{ p?m.pause():m.play(); }catch(e){} });
  }
  function fmt(ms){ var s=Math.floor(ms/1000); return Math.floor(s/60)+":"+("0"+(s%60)).slice(-2); }
  function init(){
    if(!document.body) return;
    var bar=document.createElement("div");
    bar.style.cssText="position:fixed;left:10px;bottom:10px;z-index:99998;display:flex;gap:6px;align-items:center;"+
      "font-family:sans-serif;background:rgba(15,18,32,.88);border-radius:999px;padding:6px 10px;box-shadow:0 2px 10px rgba(0,0,0,.4)";
    function mkbtn(txt,title){ var b=document.createElement("button"); b.type="button"; b.title=title;
      b.style.cssText="min-width:42px;min-height:36px;border:none;border-radius:999px;background:rgba(255,255,255,.12);"+
        "color:#fff;font-size:15px;cursor:pointer;touch-action:manipulation;padding:4px 10px"; b.textContent=txt; return b; }
    var bPlay=mkbtn("\u23F8","\u66AB\u505C/\u7E7C\u7E8C");
    var bRe=mkbtn("\u23EA","\u91CD\u64AD");
    var bSp=mkbtn("1x","\u64AD\u653E\u901F\u5EA6");
    var tEl=document.createElement("span"); tEl.style.cssText="color:#9fd8ff;font-size:13px;min-width:38px;text-align:center"; tEl.textContent="0:00";
    bPlay.addEventListener("click",function(){ setPaused(!paused); bPlay.textContent=paused?"\u25B6":"\u23F8"; });
    bRe.addEventListener("click",function(){ location.reload(); });
    var speeds=[1,2,0.5];
    bSp.addEventListener("click",function(){ vnow(); speed=speeds[(speeds.indexOf(speed)+1)%speeds.length]; bSp.textContent=(speed===0.5?"0.5":speed)+"x"; });
    bar.appendChild(bPlay); bar.appendChild(bRe); bar.appendChild(bSp); bar.appendChild(tEl);
    document.body.appendChild(bar);
    (function upd(){ tEl.textContent=fmt(vnow()); OST(upd,500); })();
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",init); else init();
})();
</script>
