<!DOCTYPE html>
<!-- 專業AI升級 v5：攻擊輸入緩衝(消弭冷卻中吞鍵)、警覺漸進提示(？→！)、頭目登場特效＋頂部大血條、五關場景色調與裝飾密度差異化、偷襲擊倒加強震動與金色閃光回饋 -->

<html lang="zh-Hant">
<head>

<title>夜襲邪教據點：突襲行動</title>
<style>
  html,body{margin:0;height:100%;background:#060b08;overflow:hidden;touch-action:none;
    -webkit-user-select:none;user-select:none;overscroll-behavior:none;
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif}
  canvas{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);touch-action:none}
  #muteBtn{position:fixed;top:10px;right:10px;width:48px;height:48px;border-radius:50%;z-index:9;

<body>

<canvas id="game"></canvas>

<svg id="icoOff" viewBox="0 0 24 24" style="display:none"><path d="M3 9v6h4l5 5V4L7 9H3z"/><path d="M16.6 8.2l-1.4 1.4 2.4 2.4-2.4 2.4 1.4 1.4 2.4-2.4 2.4 2.4 1.4-1.4-2.4-2.4 2.4-2.4-1.4-1.4-2.4 2.4-2.4-2.4z"/></svg>
</button>
<script>
'use strict';
/* ============================================================
   夜襲邪教據點：突襲行動 — 專業AI升級 v5
   橫向捲軸潛入動作版：與俯視潛行版完全不同的全新演繹。
   清除信徒 → 搶奪祭壇寶箱 → 往右撤離。
   5 大據點關卡＋星星評分＋金幣升級商店（原作 -2 的招牌系統）
   v5 診斷式升級（保留 v4 既有手感，只補弱點）：
   1. 攻擊輸入緩衝：冷卻中按鍵不再被靜默吞掉，即時回饋更紮實
   2. 警覺漸進提示：0→1 之間先跳「？」再跳「！」，被發現不再猝不及防
   3. 頭目登場特效＋頂部大血條＋光暈剪影，最終關頭目戰更有儀式感
   4. 五大據點加入專屬環境色調與裝飾密度漸層，越深入越壓迫
   5. 偷襲擊倒加大震動／停頓並加金色閃光，凸顯核心賣點的爽感差異
   ============================================================ */
/* ---------- 大螢幕提醒浮層：只在手機跳出，一個 session 只跳一次，不攔截遊戲初始化 ---------- */
(function(){
  try{
    const isPhone = Math.min(screen.width,screen.height)<600 || innerWidth<768;
    if(!isPhone || sessionStorage.getItem('bigscreen-hint')) return;
    const el=document.getElementById('bigScreenHint');
    if(!el) return;
    el.hidden=false;
    const dismiss=()=>{
      try{ sessionStorage.setItem('bigscreen-hint','1'); }catch(e){}
      el.classList.add('bsh-out');
      setTimeout(()=>{ el.remove(); },320);
    };
    document.getElementById('bshBtn').addEventListener('click',dismiss,{once:true});
  }catch(e){}
})();

const GAME_W = 960, GAME_H = 540;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize(){
  const scale = Math.min(innerWidth/GAME_W, innerHeight/GAME_H);
  const dpr = Math.min(devicePixelRatio||1, 2);
  canvas.width = GAME_W*scale*dpr; canvas.height = GAME_H*scale*dpr;
  canvas.style.width = GAME_W*scale+'px'; canvas.style.height = GAME_H*scale+'px';
  ctx.setTransform(scale*dpr,0,0,scale*dpr,0,0);
  canvas._scale = scale;
}
addEventListener('resize', resize); resize();
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const rnd=(a,b)=>a+Math.random()*(b-a);
const PAL={ ink:'#e7e2d2', dim:'#9fae9c', amber:'#c9a15a', fire:'#ef8a3d', fireHot:'#ffd27a',
  blood:'#8f2f2f', bad:'#e2493f', good:'#8fd07a', gold:'#ffd27a' };

/* ---------- 音效（壓縮器母線＋隨機音高） ---------- */
let AC=null, master=null, muted=false;
function audio(){
  if(!AC){
    AC=new (window.AudioContext||window.webkitAudioContext)();
    const comp=AC.createDynamicsCompressor();
    comp.threshold.value=-14; comp.knee.value=24; comp.ratio.value=8;
    master=AC.createGain(); master.gain.value=0.9;
    master.connect(comp).connect(AC.destination);
  }
  if(AC.state==='suspended') AC.resume();
  return AC;
}
addEventListener('pointerdown',audio,{once:true});
addEventListener('keydown',audio,{once:true});
function beep(freq,dur,type,vol,slide){
  if(muted||!AC) return;
  const ac=audio(); freq*=0.95+Math.random()*0.1;
  const o=ac.createOscillator(),g=ac.createGain();
  o.type=type||'square'; o.frequency.setValueAtTime(freq,ac.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30,freq+slide),ac.currentTime+dur);
  g.gain.setValueAtTime(vol||0.13,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
  o.connect(g).connect(master); o.start(); o.stop(ac.currentTime+dur);
}
function noise(dur,vol){
  if(muted||!AC) return;
  const ac=audio(),n=Math.floor(ac.sampleRate*dur);
  const buf=ac.createBuffer(1,n,ac.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
  const s=ac.createBufferSource(); s.buffer=buf;
  const g=ac.createGain(); g.gain.value=vol||0.1;
  s.connect(g).connect(master); s.start();
}
const sfx={
  ui:()=>beep(520,0.06,'triangle',0.09),
  swing:()=>{ noise(0.07,0.07); beep(300,0.07,'triangle',0.06,-120); },
  hit:()=>{ beep(210,0.09,'square',0.14,-70); noise(0.05,0.1); },
  takedown:()=>{ beep(140,0.18,'sawtooth',0.16,-60); noise(0.14,0.12); },
  alert:()=>{ beep(660,0.09,'square',0.12,200); setTimeout(()=>beep(880,0.12,'square',0.11),90); },
  hurt:()=>{ beep(230,0.24,'sawtooth',0.16,-140); noise(0.15,0.1); },
  coin:()=>{ beep(880,0.07,'square',0.1); setTimeout(()=>beep(1175,0.1,'square',0.1),60); },
  loot:()=>{ [784,988,1319].forEach((f,i)=>setTimeout(()=>beep(f,0.12,'square',0.11),i*80)); },
  win:()=>{ [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>beep(f,0.16,'square',0.13),i*100)); },
  lose:()=>{ [392,330,262,196].forEach((f,i)=>setTimeout(()=>beep(f,0.2,'triangle',0.13),i*140)); },
  buy:()=>{ beep(660,0.08,'square',0.12); setTimeout(()=>beep(990,0.14,'square',0.12),70); },
  deny:()=>beep(150,0.14,'sawtooth',0.12,-60),
  star:()=>{ beep(1320,0.12,'triangle',0.14); setTimeout(()=>beep(1760,0.2,'triangle',0.14),90); },
};
document.getElementById('muteBtn').addEventListener('click',()=>{
  muted=!muted;
  document.getElementById('icoOn').style.display=muted?'none':'block';
  document.getElementById('icoOff').style.display=muted?'block':'none';
});

/* ---------- 存檔 ---------- */
const SAVE_KEY='夜襲2Pro4';
let save={ stars:[0,0,0,0,0], gold:0, upg:{hp:0,power:0,speed:0,stam:0} };
try{ const s=JSON.parse(localStorage.getItem(SAVE_KEY)); if(s&&s.stars) save=Object.assign(save,s); }catch(e){}
function persist(){ try{ localStorage.setItem(SAVE_KEY,JSON.stringify(save)); }catch(e){} }
function unlockedCount(){ let n=1; for(let i=0;i<4;i++) if(save.stars[i]>0) n=i+2; return n; }
const UPG={
  hp:{ label:'生命上限', desc:'+1 顆心', max:2, base:90, step:70 },
  power:{ label:'攻擊力', desc:'+1 傷害', max:2, base:70, step:55 },
  speed:{ label:'移動速度', desc:'+12% 速度', max:3, base:60, step:45 },
  stam:{ label:'體力上限', desc:'+20 體力', max:3, base:60, step:45 },
};
const upgCost=k=>UPG[k].base+save.upg[k]*UPG[k].step;
const maxHp=()=>3+save.upg.hp;
const maxStam=()=>100+save.upg.stam*20;
const atkDmg=()=>1+save.upg.power;
const moveSpd=()=>190*(1+save.upg.speed*0.12);

/* ---------- 粒子 / 飄字（swap-pop） ---------- */
let shake=0, freeze=0, redFlash=0, goldFlash=0;
const parts=[];
function burst(x,y,color,n,speed,up){
  for(let i=0;i<(n||10);i++){
    if(parts.length>300) break;
    const a=Math.random()*Math.PI*2,s=(speed||180)*(0.3+Math.random()*0.7);
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-(up||0),life:rnd(0.3,0.6),max:0.6,color,sz:rnd(2.5,5)});
  }
}
function updateParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=260*dt; p.life-=dt;
    if(p.life<=0){ parts[i]=parts[parts.length-1]; parts.pop(); }
  }
}
function drawParts(){
  for(const p of parts){
    ctx.globalAlpha=clamp(p.life*2.2,0,1);
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
  }
  ctx.globalAlpha=1;
}
const floaters=[];
function addFloat(x,y,text,color,big){ floaters.push({x,y,text,color,life:1,big:!!big}); }
function updateFloaters(dt){
  for(let i=floaters.length-1;i>=0;i--){
    const f=floaters[i]; f.y-=42*dt; f.life-=dt;
    if(f.life<=0){ floaters[i]=floaters[floaters.length-1]; floaters.pop(); }
  }
}
function drawFloaters(){
  ctx.textAlign='center';
  for(const f of floaters){
    ctx.globalAlpha=clamp(f.life*1.5,0,1);
    ctx.font=(f.big?'bold 26px':'bold 17px')+' sans-serif';
    ctx.strokeStyle='rgba(0,0,0,.8)'; ctx.lineWidth=3;
    ctx.strokeText(f.text,f.x,f.y);
    ctx.fillStyle=f.color; ctx.fillText(f.text,f.x,f.y);
  }
  ctx.globalAlpha=1;
}

/* ---------- 預烘焙：天空月色 / 地面 / 光暈 sprite ---------- */
const skyCv=document.createElement('canvas'); skyCv.width=GAME_W; skyCv.height=GAME_H;
(function(){
  const c=skyCv.getContext('2d');
  const g=c.createLinearGradient(0,0,0,GAME_H);
  g.addColorStop(0,'#050a12'); g.addColorStop(0.55,'#0a1410'); g.addColorStop(1,'#122117');
  c.fillStyle=g; c.fillRect(0,0,GAME_W,GAME_H);
  for(let i=0;i<70;i++){
    c.globalAlpha=.2+(i%5)*.13; c.fillStyle='#cfe0d0';
    c.fillRect((i*179.3)%GAME_W,(i*83.7)%260,1+(i%2),1+(i%2));
  }
  c.globalAlpha=1;
  const mg=c.createRadialGradient(760,86,8,760,86,150);
  mg.addColorStop(0,'rgba(220,235,210,.5)'); mg.addColorStop(1,'rgba(220,235,210,0)');
  c.fillStyle=mg; c.fillRect(610,-64,300,300);
  c.fillStyle='#e8f0dc'; c.beginPath(); c.arc(760,86,30,0,6.29); c.fill();
  c.fillStyle='rgba(150,170,140,.4)';
  c.beginPath(); c.arc(750,78,7,0,6.29); c.arc(770,94,5,0,6.29); c.fill();
})();
const groundCv=document.createElement('canvas'); groundCv.width=480; groundCv.height=GAME_H;
(function(){
  const c=groundCv.getContext('2d');
  const g=c.createLinearGradient(0,368,0,GAME_H);
  g.addColorStop(0,'#1c3020'); g.addColorStop(0.35,'#243d29'); g.addColorStop(1,'#101d13');
  c.fillStyle=g; c.fillRect(0,368,480,GAME_H-368);
  let seed=7;
  const prng=()=>{ seed=(seed*1103515245+12345)&0x7fffffff; return (seed%1000)/1000; };
  for(let i=0;i<800;i++){
    const x=prng()*480, y=368+prng()*(GAME_H-368);
    c.fillStyle=prng()>0.5?'rgba(130,168,110,.25)':'rgba(8,16,8,.4)';
    c.fillRect(x,y,2.5,2.5);
  }
  c.fillStyle='rgba(120,92,58,.3)';
  c.beginPath(); c.ellipse(240,470,260,42,0,0,6.29); c.fill();
})();
function makeGlow(size,rgb){
  const cv=document.createElement('canvas'); cv.width=size; cv.height=size;
  const c=cv.getContext('2d');
  const g=c.createRadialGradient(size/2,size/2,size*0.05,size/2,size/2,size/2);
  g.addColorStop(0,'rgba('+rgb+',0.9)'); g.addColorStop(1,'rgba('+rgb+',0)');
  c.fillStyle=g; c.fillRect(0,0,size,size);
  return cv;
}
const fireGlow=makeGlow(256,'255,170,80');
const goldGlow=makeGlow(128,'255,215,120');

/* ---------- 輸入 ---------- */
const keys={};
let atkPressed=false, atkBuffer=0;    // atkBuffer：攻擊輸入緩衝(0.12s)，冷卻中按鍵不再被靜默吞掉
addEventListener('keydown',e=>{
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyJ'].includes(e.code)) e.preventDefault();
  if(e.code==='Escape' && state===playState){ setState(selectState); return; }
  if((e.code==='Space'||e.code==='KeyJ') && !keys[e.code]){ atkPressed=true; atkBuffer=0.12; }
  keys[e.code]=true;
  if(state && state.key) state.key(e.code);
});
addEventListener('keyup',e=>{ keys[e.code]=false; });
// 觸控：浮動搖桿（左）＋攻擊鈕/右半點擊（右）
const touch={ used:('ontouchstart' in window), joyId:null, ox:0, oy:0, jx:0, jy:0, atkId:null };
function tpos(t){
  const r=canvas.getBoundingClientRect();
  return { x:(t.clientX-r.left)/canvas._scale, y:(t.clientY-r.top)/canvas._scale };
}
const ATK_BTN={ x:GAME_W-96, y:GAME_H-96, r:64 };  // r=64：即使窄長直向手機縮放後視覺目標仍 ≥48px
canvas.addEventListener('touchstart',e=>{
  e.preventDefault(); touch.used=true;
  for(const t of e.changedTouches){
    const p=tpos(t);
    if(p.x<GAME_W*0.45 && touch.joyId===null){
      touch.joyId=t.identifier; touch.ox=p.x; touch.oy=p.y; touch.jx=0; touch.jy=0;
    } else if(touch.atkId===null){
      touch.atkId=t.identifier; atkPressed=true; atkBuffer=0.12;
    }
  }
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier!==touch.joyId) continue;
    const p=tpos(t);
    let dx=p.x-touch.ox, dy=p.y-touch.oy;
    const d=Math.hypot(dx,dy), max=52;
    if(d>max){ dx*=max/d; dy*=max/d; }
    touch.jx=Math.abs(dx)<7?0:dx/max; touch.jy=Math.abs(dy)<7?0:dy/max;
  }
},{passive:false});
function tEnd(e){
  for(const t of e.changedTouches){
    if(t.identifier===touch.joyId){ touch.joyId=null; touch.jx=0; touch.jy=0; }
    if(t.identifier===touch.atkId) touch.atkId=null;
  }
}
canvas.addEventListener('touchend',tEnd,{passive:false});
canvas.addEventListener('touchcancel',tEnd,{passive:false});
canvas.addEventListener('pointerdown',e=>{
  const r=canvas.getBoundingClientRect();
  const p={ x:(e.clientX-r.left)/canvas._scale, y:(e.clientY-r.top)/canvas._scale };
  if(state && state.click) state.click(p);
});

/* ---------- 關卡資料 ---------- */
const LV_DEFS=[
  { name:'林間哨站', len:1500, foes:[[520,'idle'],[820,'patrol'],[1150,'idle']], vision:120, spd:66 },
  { name:'外圍營地', len:1900, foes:[[480,'patrol'],[760,'idle'],[1020,'patrol'],[1320,'idle'],[1580,'patrol']], vision:135, spd:74 },
  { name:'帳篷谷地', len:2200, foes:[[460,'idle'],[700,'patrol'],[960,'idle'],[1180,'patrol'],[1480,'idle'],[1760,'patrol']], vision:145, spd:80 },
  { name:'圖騰祭場', len:2500, foes:[[440,'patrol'],[660,'idle'],[900,'patrol'],[1120,'idle'],[1360,'patrol'],[1600,'idle'],[1860,'patrol'],[2080,'idle']], vision:155, spd:88 },
  { name:'頭目大殿', len:2300, foes:[[500,'patrol'],[780,'idle'],[1060,'patrol'],[1340,'idle'],[1620,'patrol'],[1880,'boss']], vision:165, spd:92 },
];
const Y_MIN=396, Y_MAX=524;
let curLevel=0, LV=null, cam={x:0};
let phase='fight';       // fight → loot → escape
let hitsTaken=0, takedowns=0, combo=0, comboT=0, goldEarned=0, elapsed=0, hintT=0, bossIntroShown=false;
const player={ x:0,y:0,face:1,hp:3,stam:100,walkT:0,walking:false,atkT:0,atkCd:0,hurtT:0,inv:0,loot:false,sx:1,sy:1 };
let cultists=[], chest=null, props=[];
// 每關專屬氛圍色調：越深入敵營、越接近頭目，色調越燥熱壓迫（越後面越紅）
const LEVEL_TINT=['rgba(70,130,95,.05)','rgba(120,120,60,.06)','rgba(160,95,50,.08)','rgba(190,70,45,.10)','rgba(210,35,35,.15)'];

function buildLevel(i){
  const def=LV_DEFS[i];
  cultists=[];
  for(const [fx,st] of def.foes){
    const boss=st==='boss';
    cultists.push({
      x:fx, y:rnd(Y_MIN+20,Y_MAX-20), face:Math.random()<0.5?1:-1,
      st:boss?'idle':st, baseX:fx, wpT:rnd(0,3), ph:rnd(0,6), walkT:0, walking:false, swing:0,
      hp:boss?6:2, maxHp:boss?6:2, boss, noticed:false,
      alert:0, windup:0, atkCd:0, flash:0, dead:false, deadT:0,
      vision:def.vision*(boss?1.25:1), speed:def.spd*(boss?0.85:1), scale:boss?1.55:1,
    });
  }
  // 裝飾密度隨關卡漸增：越深入敵營、火把越密集、帳篷／圖騰越多，視覺上明顯「更深入」
  props=[];
  const torchLo=Math.max(200,320-i*24), torchHi=Math.max(270,460-i*24);
  for(let x=260;x<def.len-200;x+=rnd(torchLo,torchHi))
    props.push({type:'torch',x,y:rnd(Y_MIN-6,Y_MIN+30),ph:rnd(0,6)});
  const tentN=2+Math.floor(i/2);                          // 2,2,3,3,4
  for(let t=0;t<tentN;t++)
    props.push({type:'tent',x:def.len*(0.22+0.56*t/Math.max(1,tentN-1)),y:t%2?Y_MAX-6:Y_MIN+8});
  props.push({type:'fire',x:def.len*0.52,y:Y_MIN+50,ph:0});
  const totemN=1+Math.floor(i/2);                          // 1,1,2,2,3
  for(let tt=0;tt<totemN;tt++)
    props.push({type:'totem',x:def.len-260-tt*230,y:Y_MIN+26});
  chest={ x:def.len-240, y:Y_MIN+80, spawned:false, taken:false };
  Object.assign(player,{ x:110, y:(Y_MIN+Y_MAX)/2, face:1, hp:maxHp(), stam:maxStam(),
    atkT:0, atkCd:0, hurtT:0, inv:1, loot:false, sx:1, sy:1 });
  phase='fight'; hitsTaken=0; takedowns=0; combo=0; goldEarned=0; elapsed=0; hintT=0; bossIntroShown=false;
  cam.x=0; parts.length=0; floaters.length=0; shake=0; freeze=0; redFlash=0; goldFlash=0;
  return def;
}

/* ---------- 角色繪製：斗篷人（側視、多部件、揮刀弧光） ---------- */
function drawMood(mood,bob){                     // 眉毛＋嘴巴：calm平常／alert警覺／hurt受擊／happy開心
  const mx=3.6, my=-37+bob;
  ctx.lineCap='round'; ctx.strokeStyle='rgba(18,12,8,.85)';
  if(mood==='alert'){
    ctx.lineWidth=1.3;
    ctx.beginPath(); ctx.moveTo(0.4,-43.4+bob); ctx.lineTo(2.6,-42.1+bob); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(6.6,-43.4+bob); ctx.lineTo(4.4,-42.1+bob); ctx.stroke();
    ctx.fillStyle='rgba(18,10,8,.92)';
    ctx.beginPath(); ctx.ellipse(mx,my+1,1.7,2.1,0,0,6.29); ctx.fill();
  } else if(mood==='hurt'){
    ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(0.4,-42.6+bob); ctx.lineTo(2.6,-43.7+bob); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(6.6,-42.6+bob); ctx.lineTo(4.4,-43.7+bob); ctx.stroke();
    ctx.fillStyle='rgba(18,10,8,.88)';
    ctx.beginPath(); ctx.ellipse(mx,my,1.3,1.6,0,0,6.29); ctx.fill();
  } else if(mood==='happy'){
    ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(1,-42.7+bob); ctx.lineTo(6,-42.7+bob); ctx.stroke();
    ctx.beginPath(); ctx.arc(mx,my-1.6,2.2,0.15*Math.PI,0.85*Math.PI); ctx.stroke();
  } else {
    ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(1,-42.7+bob); ctx.lineTo(6,-42.7+bob); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(mx-1.6,my); ctx.lineTo(mx+1.6,my); ctx.stroke();
  }
}
function drawFigure(x,y,face,o){
  o=o||{};
  const s=o.scale||1;
  const bob=o.walking?Math.sin(o.walkT*11)*2:Math.sin((o.ph||0)+bgT*2)*0.8;
  ctx.save();
  ctx.translate(x,y);
  if(o.boss && !o.dead){                                         // 頭目光暈：一眼就能認出這是頭目
    const gr=44+Math.sin(bgT*4)*5;
    ctx.globalAlpha=0.55;
    ctx.drawImage(fireGlow,-gr,-34-gr,gr*2,gr*2);
    ctx.globalAlpha=1;
  }
  ctx.scale(s*(o.sx||1),s*(o.sy||1));
  ctx.fillStyle='rgba(0,0,0,.5)';
  ctx.beginPath(); ctx.ellipse(0,4,15,5,0,0,6.29); ctx.fill();
  if(o.dead){
    ctx.globalAlpha=clamp(o.fade??1,0,1);
    ctx.rotate(face>0?1.45:-1.45);
    ctx.fillStyle=o.color;
    ctx.beginPath(); ctx.ellipse(0,-8,10,16,0,0,6.29); ctx.fill();
    ctx.fillStyle=o.trim; ctx.beginPath(); ctx.arc(0,-26,7,0,6.29); ctx.fill();
    ctx.restore(); ctx.globalAlpha=1; return;
  }
  ctx.scale(face,1);
  if(o.flash>0 && Math.floor(bgT*18)%2) ctx.globalAlpha=0.45;
  const legSwing=o.walking?Math.sin(o.walkT*11)*5:0;             // 腿
  ctx.strokeStyle='#171410'; ctx.lineWidth=4.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-3,-12); ctx.lineTo(-4+legSwing,2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(3,-12); ctx.lineTo(4-legSwing,2); ctx.stroke();
  const cg=ctx.createLinearGradient(-12,-30,10,-6);              // 披風
  cg.addColorStop(0,o.color); cg.addColorStop(1,'rgba(0,0,0,.72)');
  ctx.fillStyle=cg;
  ctx.beginPath();
  ctx.moveTo(0,-34+bob);
  ctx.quadraticCurveTo(12,-26+bob,9,-4);
  ctx.quadraticCurveTo(0,1,-10,-4);
  ctx.quadraticCurveTo(-14-legSwing*0.4,-24+bob,0,-34+bob);
  ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.6)'; ctx.lineWidth=1.6; ctx.stroke();
  ctx.globalAlpha=0.24;                                          // 高光：披風背側受光柔光，增加立體感
  ctx.fillStyle='#fff6df';
  ctx.beginPath(); ctx.ellipse(-7,-25+bob,3,9,0.15,0,6.29); ctx.fill();
  ctx.globalAlpha=1;
  ctx.strokeStyle=o.trim; ctx.lineWidth=2.4;                     // 腰帶
  ctx.beginPath(); ctx.moveTo(-9,-13); ctx.quadraticCurveTo(0,-10,9,-13); ctx.stroke();
  const armSw=o.walking?Math.sin(o.walkT*11+Math.PI)*4:0;        // 後手：與步伐反向擺動的空手，補足多部件走路循環
  ctx.strokeStyle='#171410'; ctx.lineWidth=3.2; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-6,-25+bob); ctx.lineTo(-9+armSw*0.6,-7+armSw*0.5); ctx.stroke();
  ctx.fillStyle=o.skin||'#c8a080';
  ctx.beginPath(); ctx.arc(-9+armSw*0.6,-7+armSw*0.5,2,0,6.29); ctx.fill();
  ctx.save();                                                    // 武器手
  ctx.translate(7,-20+bob);
  ctx.rotate(o.swing?(-2.1+o.swing*3.3):0.5);
  ctx.strokeStyle=o.skin||'#c8a080'; ctx.lineWidth=3.4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(8,3); ctx.stroke();
  const bg2=ctx.createLinearGradient(8,0,20,6);
  bg2.addColorStop(0,'#9a9488'); bg2.addColorStop(0.5,'#eae4d2'); bg2.addColorStop(1,'#c7c0ab');
  ctx.strokeStyle=bg2; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(8,3); ctx.lineTo(21,7); ctx.stroke();
  ctx.restore();
  const hg=ctx.createRadialGradient(-2,-42+bob,1,0,-40+bob,9);   // 兜帽
  hg.addColorStop(0,'#efe9d6'); hg.addColorStop(0.45,o.trim); hg.addColorStop(1,'rgba(0,0,0,.72)');
  ctx.fillStyle=hg;
  ctx.beginPath(); ctx.arc(0,-40+bob,8,0,6.29); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.5)'; ctx.lineWidth=1.4; ctx.stroke();
  if(o.boss && !o.dead){                                         // 頭目角飾：不改色調、只加剪影細節辨識身分
    ctx.strokeStyle=o.trim; ctx.lineWidth=1.8; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-3,-47+bob); ctx.lineTo(-5.5,-54+bob); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(4,-47+bob); ctx.lineTo(6.5,-54+bob); ctx.stroke();
  }
  ctx.fillStyle='rgba(0,0,0,.6)';
  ctx.beginPath(); ctx.ellipse(2.4,-39+bob,4.6,3.4,0,0,6.29); ctx.fill();
  if(o.eyes){ ctx.fillStyle='#ff6a50'; ctx.fillRect(1,-41+bob,2,2.2); ctx.fillRect(4.6,-41+bob,2,2.2); }
  else { ctx.fillStyle='#ffe9c4'; ctx.fillRect(2,-40.6+bob,2,1.8); ctx.fillRect(5.2,-40.6+bob,2,1.8); }
  drawMood(o.mood,bob);                                           // 表情：眉毛＋嘴巴，平常／警覺／受擊／開心至少兩態
  ctx.restore();
  if(o.swing && o.swing>0.15){                                   // 刀光弧
    ctx.save(); ctx.translate(x,y-22*s);
    ctx.globalAlpha=0.75*(1-o.swing);
    ctx.strokeStyle='#fff3d8'; ctx.lineCap='round'; ctx.lineWidth=6*(1-o.swing*0.5)*s;
    ctx.beginPath(); ctx.arc(0,0,30*s+o.swing*16,face>0?-1:2.14,face>0?1:5.28); ctx.stroke();
    ctx.restore();
  }
  if(o.alert>0 && !o.dead){                                      // 警覺：漸進提示，先「？」再「！」
    const full=o.alert>=1;
    ctx.globalAlpha=full?1:clamp(o.alert,0.25,1);
    ctx.fillStyle=full?PAL.bad:'#ffd75e';
    ctx.font='bold '+Math.round((full?22:19)*s)+'px Georgia,serif'; ctx.textAlign='center';
    ctx.strokeStyle='rgba(0,0,0,.7)'; ctx.lineWidth=3;
    const ch=full?'!':'?';
    ctx.strokeText(ch,x,y-62*s); ctx.fillText(ch,x,y-62*s);
    ctx.globalAlpha=1;
  }
  if(o.hpBar){
    ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(x-26,y-70*s,52,7);
    ctx.fillStyle=PAL.bad; ctx.fillRect(x-25,y-69*s,50*o.hpBar,5);
  }
  ctx.globalAlpha=1;
}

/* ---------- 場景物件 ---------- */
let bgT=0;
function drawTorch(p){
  const fl=Math.sin(bgT*11+p.ph)*2;
  const gr=64+fl*3;
  ctx.globalAlpha=0.5+Math.sin(bgT*9+p.ph)*0.08;
  ctx.drawImage(fireGlow,p.x-gr,p.y-44-gr,gr*2,gr*2);
  ctx.globalAlpha=1;
  ctx.strokeStyle='#3a2a18'; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x,p.y-40); ctx.stroke();
  ctx.fillStyle=PAL.fire;
  ctx.beginPath();
  ctx.moveTo(p.x-6,p.y-40);
  ctx.quadraticCurveTo(p.x-2+fl,p.y-56,p.x,p.y-58+fl);
  ctx.quadraticCurveTo(p.x+2+fl,p.y-52,p.x+6,p.y-40);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle=PAL.fireHot;
  ctx.beginPath(); ctx.ellipse(p.x,p.y-44,3.4,6,0,0,6.29); ctx.fill();
}
function drawTent(p){
  ctx.fillStyle='rgba(0,0,0,.45)';
  ctx.beginPath(); ctx.ellipse(p.x+5,p.y+8,54,16,0,0,6.29); ctx.fill();
  ctx.fillStyle='#1c140d';
  ctx.beginPath(); ctx.moveTo(p.x-52,p.y+6); ctx.lineTo(p.x,p.y-52); ctx.lineTo(p.x+52,p.y+6); ctx.closePath(); ctx.fill();
  const fg=ctx.createLinearGradient(p.x-40,p.y-20,p.x+20,p.y+6);
  fg.addColorStop(0,'#5a4530'); fg.addColorStop(1,'#372716');
  ctx.fillStyle=fg;
  ctx.beginPath(); ctx.moveTo(p.x-52,p.y+6); ctx.lineTo(p.x,p.y-52); ctx.lineTo(p.x+12,p.y+6); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.4)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(p.x-52,p.y+6); ctx.lineTo(p.x,p.y-52); ctx.lineTo(p.x+52,p.y+6); ctx.closePath(); ctx.stroke();
  ctx.strokeStyle=PAL.blood; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(p.x,p.y-52); ctx.lineTo(p.x,p.y+6); ctx.stroke();
}
function drawFireCamp(p){
  const fl=Math.sin(bgT*13)*3;
  const gr=130+fl*4;
  ctx.globalAlpha=0.4+Math.sin(bgT*9)*0.06;
  ctx.drawImage(fireGlow,p.x-gr,p.y-20-gr,gr*2,gr*2);
  ctx.globalAlpha=1;
  ctx.fillStyle='#1a0f08';
  ctx.beginPath();
  ctx.ellipse(p.x-10,p.y+4,17,4,0.3,0,6.29); ctx.ellipse(p.x+10,p.y+5,17,4,-0.3,0,6.29);
  ctx.fill();
  const fl2=(c,w,h,dy)=>{
    ctx.fillStyle=c; ctx.beginPath();
    ctx.moveTo(p.x-w,p.y+4);
    ctx.quadraticCurveTo(p.x-w*0.6,p.y-h*0.5,p.x,p.y-h+fl+dy);
    ctx.quadraticCurveTo(p.x+w*0.6,p.y-h*0.5,p.x+w,p.y+4);
    ctx.closePath(); ctx.fill();
  };
  fl2(PAL.fire,15,40,0); fl2(PAL.fireHot,9,26,2); fl2('#fff3c4',4.5,14,2);
}
function drawTotem(p){
  ctx.fillStyle='rgba(0,0,0,.45)';
  ctx.beginPath(); ctx.ellipse(p.x+3,p.y+6,20,7,0,0,6.29); ctx.fill();
  const tg=ctx.createLinearGradient(p.x-7,0,p.x+7,0);
  tg.addColorStop(0,'#0e0a06'); tg.addColorStop(0.5,'#2e2214'); tg.addColorStop(1,'#0e0a06');
  ctx.fillStyle=tg; ctx.fillRect(p.x-7,p.y-58,14,62);
  ctx.strokeStyle='rgba(0,0,0,.5)'; ctx.lineWidth=2;
  for(let i=0;i<4;i++){ ctx.beginPath(); ctx.moveTo(p.x-7,p.y-46+i*13); ctx.lineTo(p.x+7,p.y-46+i*13); ctx.stroke(); }
  const gl=0.5+0.5*Math.sin(bgT*3);
  ctx.fillStyle='rgba(201,80,47,'+(0.25+0.25*gl)+')';
  ctx.beginPath(); ctx.arc(p.x,p.y-62,15+gl*3,0,6.29); ctx.fill();
  ctx.fillStyle='#e8e2d0';
  ctx.beginPath(); ctx.arc(p.x,p.y-62,9,0,6.29); ctx.fill();
  ctx.fillStyle='#241c14';
  ctx.beginPath(); ctx.arc(p.x-3.5,p.y-64,2.2,0,6.29); ctx.arc(p.x+3.5,p.y-64,2.2,0,6.29); ctx.fill();
  ctx.fillRect(p.x-3,p.y-58,6,2);
}
function drawChest(c2){
  if(c2.taken) return;
  if(c2.spawned){
    const gr=54+Math.sin(bgT*5)*6;
    ctx.globalAlpha=0.6; ctx.drawImage(goldGlow,c2.x-gr,c2.y-14-gr,gr*2,gr*2); ctx.globalAlpha=1;
  }
  ctx.fillStyle='rgba(0,0,0,.4)';
  ctx.beginPath(); ctx.ellipse(c2.x,c2.y+6,18,6,0,0,6.29); ctx.fill();
  ctx.fillStyle=c2.spawned?'#6a4a26':'#42301c';
  ctx.beginPath(); ctx.roundRect(c2.x-16,c2.y-16,32,22,4); ctx.fill();
  ctx.fillStyle=c2.spawned?'#8a6236':'#54402a';
  ctx.beginPath(); ctx.roundRect(c2.x-16,c2.y-16,32,9,4); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.55)'; ctx.lineWidth=2;
  ctx.strokeRect(c2.x-16,c2.y-16,32,22);
  ctx.fillStyle=c2.spawned?PAL.gold:'#7a6a4a';
  ctx.fillRect(c2.x-3,c2.y-10,6,7);
  if(c2.spawned){
    ctx.fillStyle=PAL.gold; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
    ctx.fillText('戰利品！',c2.x,c2.y-26);
  }
}
function drawTreeSil(x,y,s,col){
  ctx.fillStyle=col;
  ctx.beginPath(); ctx.arc(x,y,26*s,0,6.29); ctx.arc(x-16*s,y+10*s,18*s,0,6.29); ctx.arc(x+16*s,y+8*s,20*s,0,6.29); ctx.fill();
  ctx.fillRect(x-4*s,y+10*s,8*s,26*s);
}

/* ---------- 狀態機 ---------- */
let state=null;
function setState(s){ state=s; if(s.enter) s.enter(); }
function stateName(){ return state===menuState?'menu':state===selectState?'select':state===playState?'play':state===resultState?'result':state===deadState?'dead':'?'; }

const menuState={
  t:0,
  enter(){ this.t=0; },
  update(dt){ this.t+=dt; if(atkPressed){ atkPressed=false; sfx.ui(); setState(selectState); } },
  click(){ sfx.ui(); setState(selectState); },
  draw(){
    ctx.drawImage(skyCv,0,0);
    for(let i=0;i<7;i++) drawTreeSil(80+i*140,330,rnd?1+((i*37)%3)*0.2:1,'rgba(10,20,12,.9)');
    ctx.drawImage(groundCv,0,0); ctx.drawImage(groundCv,480,0);
    drawFireCamp({x:GAME_W/2,y:470});
    drawFigure(GAME_W/2-130,480,1,{color:'#2f4d3a',trim:'#c9a15a',walking:true,walkT:this.t*6,mood:'happy'});
    drawFigure(GAME_W/2+140,485,-1,{color:'#3b2f24',trim:'#8f2f2f',eyes:true,ph:2,mood:'alert'});
    ctx.textAlign='center';
    const g=ctx.createLinearGradient(GAME_W/2-230,0,GAME_W/2+230,0);
    g.addColorStop(0,'#ffd27a'); g.addColorStop(0.5,'#ef8a3d'); g.addColorStop(1,'#8f2f2f');
    ctx.font='bold 52px serif'; ctx.fillStyle=g;
    ctx.fillText('夜襲邪教據點',GAME_W/2,120);
    ctx.font='bold 24px sans-serif'; ctx.fillStyle=PAL.ink;
    ctx.fillText('— 突襲行動 —',GAME_W/2,158);
    ctx.font='bold 19px sans-serif'; ctx.fillStyle=PAL.gold;
    ctx.fillText('★ 5 大據點關卡 × 星星評分 × 金幣升級商店 ★',GAME_W/2,200);
    ctx.font='17px sans-serif'; ctx.fillStyle=PAL.ink;
    ctx.fillText('💻 WASD/方向鍵 移動，J / 空白鍵 揮刀',GAME_W/2,246);
    ctx.fillText('📱 左半搖桿移動，右半點擊揮刀',GAME_W/2,274);
    ctx.font='15px sans-serif'; ctx.fillStyle=PAL.dim;
    ctx.fillText('趁信徒未警覺時揮刀＝一擊偷襲擊倒！清空據點、搶奪戰利品、向右撤離',GAME_W/2,306);
    const bob=Math.sin(this.t*3)*5;
    ctx.font='bold 26px sans-serif'; ctx.fillStyle=PAL.fireHot;
    ctx.fillText('▶ 點擊 / 空白鍵 開始 ◀',GAME_W/2,360+bob);
    ctx.font='14px sans-serif'; ctx.fillStyle='rgba(231,226,210,.5)';
    ctx.fillText('AI未來創作營隊',GAME_W/2,GAME_H-12);
  }
};

const selectState={
  t:0, sel:0, cards:[], shopBtns:[],
  enter(){ this.t=0; this.sel=Math.min(this.sel,unlockedCount()-1); },
  key(code){
    if(code==='ArrowLeft'||code==='KeyA'){ this.sel=Math.max(0,this.sel-1); sfx.ui(); }
    if(code==='ArrowRight'||code==='KeyD'){ this.sel=Math.min(4,this.sel+1); sfx.ui(); }
    const num={Digit1:'hp',Digit2:'power',Digit3:'speed',Digit4:'stam'}[code];
    if(num) this.buy(num);
  },
  buy(k){
    if(save.upg[k]>=UPG[k].max){ sfx.deny(); return; }
    const cost=upgCost(k);
    if(save.gold<cost){ sfx.deny(); addFloat(GAME_W/2,GAME_H-150,'金幣不足！',PAL.bad); return; }
    save.gold-=cost; save.upg[k]++; persist(); sfx.buy();
    addFloat(GAME_W/2,GAME_H-150,UPG[k].label+' 升級！',PAL.good,true);
  },
  update(dt){
    this.t+=dt;
    if(atkPressed){
      atkPressed=false;
      if(this.sel<unlockedCount()) startLevel(this.sel); else sfx.deny();
    }
    updateFloaters(dt);
  },
  click(p){
    for(const c of this.cards){
      if(p.x>=c.x&&p.x<=c.x+c.w&&p.y>=c.y&&p.y<=c.y+c.h){
        this.sel=c.i;
        if(c.i<unlockedCount()) startLevel(c.i); else sfx.deny();
        return;
      }
    }
    for(const b of this.shopBtns){
      if(p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h){ this.buy(b.k); return; }
    }
  },
  draw(){
    ctx.drawImage(skyCv,0,0);
    ctx.drawImage(groundCv,0,0); ctx.drawImage(groundCv,480,0);
    ctx.textAlign='center';
    ctx.font='bold 34px sans-serif'; ctx.fillStyle=PAL.ink;
    ctx.fillText('選擇突襲目標',GAME_W/2,54);
    ctx.font='bold 18px sans-serif'; ctx.fillStyle=PAL.gold;
    ctx.fillText('金幣 '+save.gold+'　★ '+save.stars.reduce((a,b)=>a+b,0)+'/15',GAME_W/2,86);
    this.cards=[];
    const cw=168,ch=140,gap=18,x0=(GAME_W-(cw*5+gap*4))/2;
    for(let i=0;i<5;i++){
      const un=i<unlockedCount(), x=x0+i*(cw+gap), y=112;
      this.cards.push({x,y,w:cw,h:ch,i});
      ctx.fillStyle=un?'rgba(36,61,41,.92)':'rgba(20,26,22,.9)';
      ctx.beginPath(); ctx.roundRect(x,y,cw,ch,12); ctx.fill();
      ctx.strokeStyle=i===this.sel?PAL.fireHot:'rgba(201,161,90,.4)';
      ctx.lineWidth=i===this.sel?3.5:2;
      ctx.beginPath(); ctx.roundRect(x,y,cw,ch,12); ctx.stroke();
      ctx.fillStyle=un?PAL.ink:'rgba(231,226,210,.4)';
      ctx.font='bold 19px sans-serif';
      ctx.fillText('第 '+(i+1)+' 關',x+cw/2,y+30);
      ctx.font='bold 16px sans-serif';
      ctx.fillText(LV_DEFS[i].name,x+cw/2,y+56);
      if(un){
        for(let s2=0;s2<3;s2++) drawStar(x+cw/2+(s2-1)*30,y+88,11,s2<save.stars[i]?PAL.gold:'rgba(255,255,255,.16)');
        ctx.font='13px sans-serif'; ctx.fillStyle=PAL.dim;
        ctx.fillText(LV_DEFS[i].foes.length+' 名信徒'+(i===4?'＋頭目':''),x+cw/2,y+122);
      } else {
        ctx.font='26px sans-serif'; ctx.fillText('🔒',x+cw/2,y+96);
        ctx.font='12px sans-serif'; ctx.fillStyle=PAL.dim;
        ctx.fillText('通過前一關解鎖',x+cw/2,y+122);
      }
    }
    // 升級商店
    ctx.font='bold 20px sans-serif'; ctx.fillStyle=PAL.fireHot;
    ctx.fillText('⚒ 升級商店（擊倒信徒賺金幣）',GAME_W/2,296);
    this.shopBtns=[];
    const bw=218,bh=88,gap2=14,x1=(GAME_W-(bw*4+gap2*3))/2;
    const keysArr=['hp','power','speed','stam'];
    keysArr.forEach((k,i)=>{
      const x=x1+i*(bw+gap2), y=316;
      this.shopBtns.push({x,y,w:bw,h:bh,k});
      const maxed=save.upg[k]>=UPG[k].max, afford=save.gold>=upgCost(k);
      ctx.fillStyle='rgba(28,20,13,.92)';
      ctx.beginPath(); ctx.roundRect(x,y,bw,bh,10); ctx.fill();
      ctx.strokeStyle=maxed?'rgba(143,208,122,.7)':afford?PAL.amber:'rgba(120,110,90,.4)';
      ctx.lineWidth=2; ctx.beginPath(); ctx.roundRect(x,y,bw,bh,10); ctx.stroke();
      ctx.fillStyle=PAL.ink; ctx.font='bold 16px sans-serif';
      ctx.fillText((i+1)+'. '+UPG[k].label+'　Lv'+save.upg[k]+'/'+UPG[k].max,x+bw/2,y+24);
      ctx.font='13px sans-serif'; ctx.fillStyle=PAL.dim;
      ctx.fillText(UPG[k].desc,x+bw/2,y+46);
      ctx.font='bold 15px sans-serif';
      ctx.fillStyle=maxed?PAL.good:afford?PAL.gold:'rgba(200,180,140,.5)';
      ctx.fillText(maxed?'已滿級':upgCost(k)+' 金幣',x+bw/2,y+70);
    });
    ctx.font='15px sans-serif'; ctx.fillStyle=PAL.dim;
    ctx.fillText('💻 ←→ 選關＋空白鍵出擊，數字鍵 1-4 購買升級　📱 直接點擊',GAME_W/2,440);
    const bob=Math.sin(this.t*3)*4;
    ctx.font='bold 17px sans-serif'; ctx.fillStyle=PAL.fireHot;
    ctx.fillText('拿星：通關 ★｜受擊 ≤ 2 次 ★｜偷襲擊倒過半 ★',GAME_W/2,478+bob);
    drawFloaters();
  }
};
function drawStar(cx,cy,r,color){
  ctx.fillStyle=color; ctx.beginPath();
  for(let i=0;i<10;i++){
    const a=-Math.PI/2+i*Math.PI/5, rr=i%2===0?r:r*0.45;
    ctx.lineTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr);
  }
  ctx.closePath(); ctx.fill();
}

function startLevel(i){
  curLevel=i; LV=buildLevel(i);
  sfx.ui();
  setState(playState);
}

const playState={
  update(dt){
    bgT+=dt; elapsed+=dt; hintT+=dt;
    const p=player;
    p.inv=Math.max(0,p.inv-dt); p.hurtT=Math.max(0,p.hurtT-dt);
    p.atkCd=Math.max(0,p.atkCd-dt);
    p.stam=Math.min(maxStam(),p.stam+26*dt);
    comboT=Math.max(0,comboT-dt); if(comboT<=0) combo=0;
    p.sx+=(1-p.sx)*10*dt; p.sy+=(1-p.sy)*10*dt;
    // 移動
    let mx=0,my=0;
    if(keys.KeyA||keys.ArrowLeft) mx-=1;
    if(keys.KeyD||keys.ArrowRight) mx+=1;
    if(keys.KeyW||keys.ArrowUp) my-=1;
    if(keys.KeyS||keys.ArrowDown) my+=1;
    mx+=touch.jx; my+=touch.jy;
    const ml=Math.hypot(mx,my);
    if(ml>0.05){
      mx/=Math.max(ml,1); my/=Math.max(ml,1);
      p.x+=mx*moveSpd()*dt; p.y+=my*moveSpd()*0.7*dt;
      if(Math.abs(mx)>0.15) p.face=mx>0?1:-1;
      p.walking=true; p.walkT+=dt*1.4;
    } else p.walking=false;
    p.x=clamp(p.x,30,LV.len-20);
    p.y=clamp(p.y,Y_MIN,Y_MAX);
    // 攻擊（atkBuffer＝輸入緩衝：冷卻中按下也會在冷卻結束瞬間補發，不再被靜默吞掉）
    if(p.atkT>0){ p.atkT+=dt*3.2; if(p.atkT>=1) p.atkT=0; }
    if(atkBuffer>0 && p.atkCd<=0){
      if(p.stam>=20){
        atkBuffer=0; atkPressed=false;
        p.atkT=0.01; p.atkCd=0.42; p.stam-=20; p.sx=1.25; p.sy=0.85;
        sfx.swing();
        let hitAny=false;
        for(const c of cultists){
          if(c.dead) continue;
          const dx=c.x-p.x, dy=c.y-p.y;
          if(Math.abs(dy)<46 && dx*p.face>-14 && Math.abs(dx)<62*(c.boss?1.3:1)){
            hitAny=true;
            const sneak=c.alert<0.5 && !c.boss;
            const dmg=sneak?99:atkDmg();
            c.hp-=dmg; c.flash=0.2;
            burst(c.x,c.y-24,'#e8d9b8',10,200,80);
            if(c.hp<=0){
              c.dead=true; c.deadT=0;
              const g=(sneak?35:20)+(c.boss?100:0)+Math.floor(rnd(0,8));
              save.gold+=g; goldEarned+=g;
              if(sneak){                                    // 偷襲＝本作核心賣點，加倍震動＋停頓＋金色閃光
                freeze=0.14; shake=Math.max(shake,13); goldFlash=0.3;
                takedowns++; addFloat(c.x,c.y-56,'偷襲擊倒！+'+g,PAL.fireHot,true); sfx.takedown();
                burst(c.x,c.y-24,PAL.gold,14,220,180);
              } else {
                freeze=0.09; shake=Math.max(shake,8);
                addFloat(c.x,c.y-56,'擊倒！+'+g,PAL.gold); sfx.takedown();
              }
              combo++; comboT=2;
              if(combo>1) addFloat(p.x,p.y-76,combo+' 連擊！',PAL.good);
              burst(c.x,c.y-24,PAL.blood,14,220,120);
              burst(c.x,c.y-24,PAL.gold,8,160,160);
            } else {
              freeze=0.04; shake=Math.max(shake,4);
              c.alert=1.5; sfx.hit();
              for(const o of cultists) if(!o.dead && Math.hypot(o.x-c.x,o.y-c.y)<150) o.alert=Math.max(o.alert,1);
            }
          }
        }
        if(!hitAny){/* 揮空 */}
      } else {
        atkBuffer=0; atkPressed=false;
        addFloat(p.x,p.y-70,'體力不足！',PAL.dim); sfx.deny();
      }
    }
    // 信徒 AI
    let aliveN=0;
    for(const c of cultists){
      if(c.dead){ c.deadT+=dt; continue; }
      aliveN++;
      c.flash=Math.max(0,c.flash-dt);
      c.atkCd=Math.max(0,c.atkCd-dt);
      const dx=p.x-c.x, dy=p.y-c.y, d=Math.hypot(dx,dy);
      const inFront=dx*c.face>0;
      const seen = d<c.vision && (inFront||d<48);
      if(seen && c.alert<1){
        if(c.alert<=0 && !c.noticed){ c.noticed=true; beep(760,0.035,'sine',0.045); } // 剛開始注意到玩家：輕聲提示
        c.alert=Math.min(1.5,c.alert+dt*3); if(c.alert>=1) sfx.alert();
      } else if(!seen){ c.alert=Math.max(0,c.alert-dt*0.5); if(c.alert<=0) c.noticed=false; }
      if(c.alert>=1){
        // 追擊
        if(c.windup>0){
          c.windup+=dt;
          if(c.windup>0.45){
            c.windup=0; c.atkCd=1.2; c.swing=0.01;
            if(Math.hypot(p.x-c.x,p.y-c.y)<58*c.scale && p.inv<=0){
              p.hp--; p.inv=1; p.hurtT=0.3; hitsTaken++;
              shake=Math.max(shake,12); freeze=0.08; redFlash=0.4;
              const kb=Math.sign(p.x-c.x)||1;
              p.x+=kb*36; sfx.hurt();
              addFloat(p.x,p.y-70,'-1 ❤',PAL.bad,true);
              if(p.hp<=0){ setState(deadState); return; }
            }
          }
        } else if(d>44*c.scale){
          c.x+=dx/d*c.speed*1.5*dt; c.y+=dy/d*c.speed*1.5*dt*0.7;
          c.face=dx>0?1:-1; c.walking=true; c.walkT+=dt*1.5;
        } else if(c.atkCd<=0){ c.windup=0.01; }
      } else {
        c.windup=0;
        if(c.st==='patrol'){
          c.wpT-=dt;
          if(c.wpT<=0){ c.face*=-1; c.wpT=rnd(2,4); }
          c.x+=c.face*c.speed*0.45*dt;
          if(Math.abs(c.x-c.baseX)>90) c.face=Math.sign(c.baseX-c.x);
          c.walking=true; c.walkT+=dt*0.9;
        } else { c.walking=false; c.wpT-=dt; if(c.wpT<=0){ c.face*=-1; c.wpT=rnd(2.5,5); } }
      }
      if(c.swing){ c.swing+=dt*3; if(c.swing>=1) c.swing=0; }
      c.y=clamp(c.y,Y_MIN,Y_MAX);
      c.x=clamp(c.x,40,LV.len-40);
    }
    // 頭目登場：最終關頭目進入視野時觸發一次性儀式感特效＋頂部大血條（見 drawHud）
    if(!bossIntroShown){
      const boss=cultists.find(c=>c.boss);
      if(boss && !boss.dead && p.x>boss.x-340){
        bossIntroShown=true; boss.alert=1;
        shake=Math.max(shake,14); freeze=0.12; redFlash=0.3;
        addFloat(boss.x,boss.y-92,'頭目降臨！',PAL.bad,true);
        sfx.alert(); noise(0.22,0.14);
      }
    }
    // 階段推進
    if(phase==='fight' && aliveN===0){
      phase='loot'; chest.spawned=true;
      addFloat(GAME_W/2+cam.x,220,'據點清空！去祭壇搶戰利品！',PAL.fireHot,true);
      sfx.loot();
    }
    if(phase==='loot' && chest.spawned && !chest.taken){
      if(Math.hypot(p.x-chest.x,p.y-chest.y)<42){
        chest.taken=true; p.loot=true; phase='escape';
        const g=40+curLevel*15;
        save.gold+=g; goldEarned+=g;
        addFloat(chest.x,chest.y-40,'+'+g+' 金幣！往右撤離！',PAL.gold,true);
        burst(chest.x,chest.y-10,PAL.gold,24,220,200);
        sfx.loot();
      }
    }
    if(phase==='escape' && p.x>=LV.len-40){ winLevel(); return; }
    // 相機
    const target=clamp(p.x-GAME_W*0.42,0,LV.len-GAME_W);
    cam.x+=(target-cam.x)*(1-Math.pow(0.01,dt));
    shake*=Math.pow(0.001,dt);
    redFlash=Math.max(0,redFlash-dt);
    goldFlash=Math.max(0,goldFlash-dt*2.4);
    updateParts(dt); updateFloaters(dt);
  },
  draw(){
    ctx.drawImage(skyCv,0,0);
    ctx.save();
    ctx.translate((Math.random()*2-1)*shake,(Math.random()*2-1)*shake);
    // 遠景樹（視差 0.25）
    ctx.save(); ctx.translate(-cam.x*0.25,0);
    for(let i=0;i<Math.ceil(LV.len/130)+8;i++) drawTreeSil(i*130,322+(i%3)*10,1+((i*37)%3)*0.18,'rgba(9,18,11,.95)');
    ctx.restore();
    // 中景樹（視差 0.55）
    ctx.save(); ctx.translate(-cam.x*0.55,0);
    for(let i=0;i<Math.ceil(LV.len/210)+6;i++) drawTreeSil(60+i*210,352+(i%2)*14,1.25,'rgba(14,26,16,.95)');
    ctx.restore();
    // 地面（烘焙紋理重複）
    const gOff=-(cam.x%480);
    for(let i=-1;i<4;i++) ctx.drawImage(groundCv,gOff+i*480,0);
    ctx.translate(-cam.x,0);
    // 物件與角色按 y 排序（縱深）
    const ents=[];
    for(const pr of props) ents.push({y:pr.y,draw:()=>{ if(pr.type==='torch')drawTorch(pr); else if(pr.type==='tent')drawTent(pr); else if(pr.type==='fire')drawFireCamp(pr); else drawTotem(pr); }});
    ents.push({y:chest.y,draw:()=>drawChest(chest)});
    for(const c of cultists)
      ents.push({y:c.y,draw:()=>drawFigure(c.x,c.y,c.face,{
        color:'#3b2f24',trim:c.boss?'#c9a15a':'#8f2f2f',eyes:true,dead:c.dead,fade:1-c.deadT*0.4,
        walking:c.walking,walkT:c.walkT,alert:c.alert,flash:c.flash,ph:c.ph,scale:c.scale*1.22,
        swing:c.swing||(c.windup>0?0.1:0),
        hpBar:c.boss&&!c.dead?c.hp/c.maxHp:0, boss:c.boss,
        mood:(c.windup>0||c.alert>=1)?'alert':(c.flash>0?'hurt':'calm'),
      })});
    ents.push({y:player.y,draw:()=>{
      if(player.inv>0 && player.hurtT<=0 && Math.floor(bgT*14)%2) return;
      drawFigure(player.x,player.y,player.face,{
        color:'#2f4d3a',trim:'#c9a15a',walking:player.walking,walkT:player.walkT,scale:1.22,
        swing:player.atkT>0?player.atkT:0,loot:player.loot,sx:player.sx,sy:player.sy,
        mood:player.hurtT>0?'hurt':(player.loot?'happy':(player.atkT>0?'alert':'calm')),
      });
      if(player.loot){
        ctx.drawImage(goldGlow,player.x-20,player.y-88,40,40);
        ctx.fillStyle=PAL.amber; ctx.beginPath(); ctx.arc(player.x,player.y-68,7,0,6.29); ctx.fill();
        ctx.strokeStyle='#5a4020'; ctx.lineWidth=1.5; ctx.stroke();
      }
    }});
    ents.sort((a,b)=>a.y-b.y);
    for(const e of ents) e.draw();
    // 撤離指示
    if(phase==='escape'){
      const ax=Math.min(player.x+180,LV.len-60);
      const bob2=Math.sin(bgT*5)*8;
      ctx.fillStyle=PAL.good; ctx.font='bold 30px sans-serif'; ctx.textAlign='center';
      ctx.fillText('→',ax+bob2,300);
      ctx.font='bold 16px sans-serif';
      ctx.fillText('撤離點',LV.len-70,280);
      ctx.strokeStyle='rgba(143,208,122,.6)'; ctx.lineWidth=3;
      ctx.setLineDash([10,8]);
      ctx.beginPath(); ctx.moveTo(LV.len-40,Y_MIN-40); ctx.lineTo(LV.len-40,Y_MAX+12); ctx.stroke();
      ctx.setLineDash([]);
    }
    drawParts(); drawFloaters();
    ctx.restore();
    const tint=LEVEL_TINT[curLevel];                          // 每關專屬氛圍色調：越深入越壓迫
    if(tint){ ctx.fillStyle=tint; ctx.fillRect(0,0,GAME_W,GAME_H); }
    if(redFlash>0){ ctx.fillStyle='rgba(226,73,63,'+(redFlash*0.4)+')'; ctx.fillRect(0,0,GAME_W,GAME_H); }
    if(goldFlash>0){ ctx.fillStyle='rgba(255,210,122,'+(goldFlash*0.35)+')'; ctx.fillRect(0,0,GAME_W,GAME_H); }
    drawHud();
    if(hintT<3.4) drawHint();
    drawTouchUI();
  }
};
function drawHud(){
  ctx.fillStyle='rgba(6,11,8,.62)';
  ctx.beginPath(); ctx.roundRect(10,10,296,74,12); ctx.fill();
  for(let i=0;i<maxHp();i++){                       // 心
    const x=28+i*26, y=28;
    ctx.fillStyle=i<player.hp?PAL.bad:'rgba(255,255,255,.15)';
    ctx.beginPath();
    ctx.moveTo(x,y+7);
    ctx.bezierCurveTo(x-10,y-4,x-3,y-10,x,y-3);
    ctx.bezierCurveTo(x+3,y-10,x+10,y-4,x,y+7);
    ctx.fill();
  }
  ctx.fillStyle='rgba(255,255,255,.18)';            // 體力
  ctx.beginPath(); ctx.roundRect(20,46,150,9,5); ctx.fill();
  ctx.fillStyle=player.stam>=20?PAL.good:PAL.bad;
  ctx.beginPath(); ctx.roundRect(20,46,150*player.stam/maxStam(),9,5); ctx.fill();
  ctx.textAlign='left'; ctx.font='bold 14px sans-serif'; ctx.fillStyle=PAL.gold;
  ctx.fillText('金幣 '+save.gold,20,74);
  ctx.fillStyle=PAL.dim;
  ctx.fillText('偷襲 '+takedowns,120,74);
  const alive=cultists.filter(c=>!c.dead).length;
  ctx.fillText(LV_DEFS[curLevel].name,200,74);
  // 目標
  ctx.textAlign='center'; ctx.font='bold 16px sans-serif'; ctx.fillStyle=PAL.fireHot;
  const obj = phase==='fight' ? '清除信徒：剩 '+alive+' 名' : phase==='loot' ? '搶奪祭壇戰利品！' : '往右撤離！';
  ctx.fillText(obj,GAME_W/2,30);
  // 進度條
  const pw=200,px2=GAME_W/2-pw/2;
  ctx.fillStyle='rgba(255,255,255,.15)'; ctx.beginPath(); ctx.roundRect(px2,40,pw,7,4); ctx.fill();
  ctx.fillStyle=PAL.amber; ctx.beginPath(); ctx.roundRect(px2,40,pw*clamp(player.x/LV.len,0,1),7,4); ctx.fill();
  // 頭目大血條：只在頭目已登場且存活時顯示，讓頭目戰有明確的儀式感
  if(bossIntroShown){
    const boss=cultists.find(c=>c.boss);
    if(boss && !boss.dead){
      const bw=340,bx=GAME_W/2-bw/2,by=64;
      ctx.textAlign='center'; ctx.font='bold 13px sans-serif'; ctx.fillStyle=PAL.bad;
      ctx.fillText('⚔ 邪教祭司頭目 ⚔',GAME_W/2,by-4);
      ctx.fillStyle='rgba(6,11,8,.72)'; ctx.beginPath(); ctx.roundRect(bx,by,bw,16,8); ctx.fill();
      ctx.fillStyle=PAL.bad;
      ctx.beginPath(); ctx.roundRect(bx+3,by+3,(bw-6)*clamp(boss.hp/boss.maxHp,0,1),10,5); ctx.fill();
      ctx.strokeStyle=PAL.gold; ctx.lineWidth=2;
      ctx.beginPath(); ctx.roundRect(bx,by,bw,16,8); ctx.stroke();
    }
  }
}
function drawHint(){
  const a=hintT<2.8?1:(3.4-hintT)/0.6;
  ctx.globalAlpha=a*0.92;
  ctx.fillStyle='rgba(0,0,0,.62)';
  ctx.beginPath(); ctx.roundRect(GAME_W/2-270,96,540,62,14); ctx.fill();
  ctx.textAlign='center'; ctx.fillStyle='#fff'; ctx.font='bold 18px sans-serif';
  ctx.fillText(touch.used?'左半搖桿移動｜右半點擊揮刀':'WASD 移動｜J / 空白鍵 揮刀',GAME_W/2,122);
  ctx.font='15px sans-serif'; ctx.fillStyle=PAL.fireHot;
  ctx.fillText('從背後接近未警覺的信徒，一刀偷襲擊倒！',GAME_W/2,146);
  ctx.globalAlpha=1;
}
function drawTouchUI(){
  if(!touch.used) return;
  ctx.globalAlpha=0.42;
  ctx.fillStyle='#0a0a12'; ctx.beginPath(); ctx.arc(ATK_BTN.x,ATK_BTN.y,ATK_BTN.r,0,6.29); ctx.fill();
  ctx.strokeStyle=player.atkT>0?PAL.fireHot:'rgba(255,255,255,.75)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(ATK_BTN.x,ATK_BTN.y,ATK_BTN.r,0,6.29); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='bold 22px sans-serif'; ctx.textAlign='center';
  ctx.fillText('揮刀',ATK_BTN.x,ATK_BTN.y+8);
  if(touch.joyId!==null){
    ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(touch.ox,touch.oy,52,0,6.29); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.55)';
    ctx.beginPath(); ctx.arc(touch.ox+touch.jx*52,touch.oy+touch.jy*52,24,0,6.29); ctx.fill();
  } else {
    ctx.strokeStyle='rgba(255,255,255,.3)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(86,GAME_H-92,48,0,6.29); ctx.stroke();
  }
  ctx.globalAlpha=1;
}

function winLevel(){
  const total=cultists.length;
  const stars=1+(hitsTaken<=2?1:0)+(takedowns>=Math.ceil(total/2)?1:0);
  resultState.stars=stars;
  resultState.newBest=stars>save.stars[curLevel];
  if(resultState.newBest) save.stars[curLevel]=stars;
  persist();
  sfx.win();
  setState(resultState);
}

const resultState={
  t:0, stars:1, shown:0, btns:[],
  enter(){ this.t=0; this.shown=0; },
  update(dt){
    this.t+=dt;
    const target=Math.min(this.stars,Math.floor((this.t-0.4)/0.45)+1);
    if(target>this.shown&&target>=1){ this.shown=target; sfx.star(); burst(GAME_W/2+(this.shown-2)*70,206,PAL.gold,14,180,120); }
    if(this.t>0.4&&atkPressed){
      atkPressed=false;
      if(curLevel<4) startLevel(curLevel+1); else setState(selectState);
    }
    updateParts(dt); updateFloaters(dt);
  },
  key(code){ if(code==='KeyR'&&this.t>0.4) startLevel(curLevel); },
  click(p){
    if(this.t<0.35) return;
    for(const b of this.btns)
      if(p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h){ sfx.ui(); b.fn(); return; }
  },
  draw(){
    ctx.drawImage(skyCv,0,0);
    ctx.drawImage(groundCv,0,0); ctx.drawImage(groundCv,480,0);
    drawParts();
    ctx.textAlign='center';
    const all=save.stars.every(s=>s>0);
    ctx.font='bold 44px serif'; ctx.fillStyle=PAL.gold;
    ctx.fillText(curLevel===4&&all?'全據點制霸！':'突襲成功！',GAME_W/2,110);
    ctx.font='bold 20px sans-serif'; ctx.fillStyle=PAL.ink;
    ctx.fillText('第 '+(curLevel+1)+' 關：'+LV_DEFS[curLevel].name,GAME_W/2,148);
    for(let s2=0;s2<3;s2++){
      const lit=s2<this.shown;
      const pop=lit&&this.t-(0.4+s2*0.45)<0.25?1.5-(this.t-(0.4+s2*0.45))*2:1;
      drawStar(GAME_W/2+(s2-1)*70,206,26*Math.max(1,pop),lit?PAL.gold:'rgba(255,255,255,.14)');
    }
    ctx.font='17px sans-serif'; ctx.fillStyle=PAL.ink;
    ctx.fillText('受擊 '+hitsTaken+' 次　偷襲擊倒 '+takedowns+'/'+cultists.length+'　獲得金幣 +'+goldEarned,GAME_W/2,268);
    ctx.fillText('用時 '+elapsed.toFixed(1)+' 秒　目前金幣 '+save.gold,GAME_W/2,296);
    if(this.newBest&&this.t>1.2){ ctx.fillStyle=PAL.fireHot; ctx.font='bold 19px sans-serif'; ctx.fillText('★ 新紀錄！ ★',GAME_W/2,326); }
    this.btns=[];
    const defs=[];
    if(curLevel<4) defs.push(['下一關 ▶',()=>startLevel(curLevel+1),PAL.fireHot]);
    defs.push(['再玩一次',()=>startLevel(curLevel),PAL.gold]);
    defs.push(['選關／商店',()=>setState(selectState),'rgba(231,226,210,.85)']);
    const bw=196,bh=56,gap=22,x0=(GAME_W-(bw*defs.length+gap*(defs.length-1)))/2;
    defs.forEach((d,i)=>{
      const x=x0+i*(bw+gap),y=366;
      this.btns.push({x,y,w:bw,h:bh,fn:d[1]});
      ctx.fillStyle='rgba(10,16,10,.8)';
      ctx.beginPath(); ctx.roundRect(x,y,bw,bh,12); ctx.fill();
      ctx.strokeStyle=d[2]; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.roundRect(x,y,bw,bh,12); ctx.stroke();
      ctx.fillStyle=d[2]; ctx.font='bold 21px sans-serif';
      ctx.fillText(d[0],x+bw/2,y+36);
    });
    ctx.font='15px sans-serif'; ctx.fillStyle=PAL.dim;
    ctx.fillText('💻 空白鍵＝'+(curLevel<4?'下一關':'選關')+'　R＝再玩一次',GAME_W/2,456);
    ctx.fillText('📱 點擊上方按鈕',GAME_W/2,478);
    drawFloaters();
  }
};

const deadState={
  t:0, btns:[],
  enter(){ this.t=0; sfx.lose(); redFlash=0; },
  update(dt){
    this.t+=dt;
    if(this.t>0.4&&atkPressed){ atkPressed=false; startLevel(curLevel); }
    updateParts(dt);
  },
  click(p){
    if(this.t<0.35) return;
    for(const b of this.btns)
      if(p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h){ sfx.ui(); b.fn(); return; }
  },
  draw(){
    playState.draw();
    ctx.fillStyle='rgba(6,4,4,.72)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.textAlign='center';
    ctx.font='bold 46px serif'; ctx.fillStyle=PAL.bad;
    ctx.fillText('被信徒逮住了！',GAME_W/2,200);
    ctx.font='17px sans-serif'; ctx.fillStyle=PAL.ink;
    ctx.fillText('賺到的 '+goldEarned+' 金幣已入袋，升級後再來吧！',GAME_W/2,246);
    this.btns=[];
    const defs=[['再突襲一次',()=>startLevel(curLevel),PAL.fireHot],['選關／商店',()=>setState(selectState),'rgba(231,226,210,.85)']];
    const bw=210,bh=56,gap=24,x0=(GAME_W-(bw*2+gap))/2;
    defs.forEach((d,i)=>{
      const x=x0+i*(bw+gap),y=300;
      this.btns.push({x,y,w:bw,h:bh,fn:d[1]});
      ctx.fillStyle='rgba(10,16,10,.85)';
      ctx.beginPath(); ctx.roundRect(x,y,bw,bh,12); ctx.fill();
      ctx.strokeStyle=d[2]; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.roundRect(x,y,bw,bh,12); ctx.stroke();
      ctx.fillStyle=d[2]; ctx.font='bold 21px sans-serif';
      ctx.fillText(d[0],x+bw/2,y+36);
    });
    ctx.font='15px sans-serif'; ctx.fillStyle=PAL.dim;
    ctx.fillText('💻 空白鍵＝馬上再來',GAME_W/2,400);
    ctx.fillText('📱 點擊上方按鈕',GAME_W/2,422);
  }
};

/* ---------- 主迴圈 ---------- */
const STEP=1/60;
let last=performance.now(), acc=0;
function frame(now){
  requestAnimationFrame(frame);
  acc+=Math.min((now-last)/1000,0.1);
  last=now;
  while(acc>=STEP){
    if(freeze>0){ freeze-=STEP; acc-=STEP; continue; }
    atkBuffer=Math.max(0,atkBuffer-STEP);
    state.update(STEP);
    if(state===menuState||state===selectState||state===resultState) bgT+=STEP;
    acc-=STEP;
  }
  state.draw();
  atkPressed=false;
}
setState(menuState);
requestAnimationFrame(frame);

/* ---------- 測試掛鉤（QA 自動化） ---------- */
window.__test=()=>({ state:stateName(), level:curLevel, phase, px:player.x, py:player.y,
  hp:player.hp, gold:save.gold, alive:cultists.filter(c=>!c.dead).length,
  takedowns, hitsTaken, stars:save.stars.slice(), unlocked:unlockedCount(),
  upg:Object.assign({},save.upg), chest:chest?{spawned:chest.spawned,taken:chest.taken}:null });
window.__killAll=()=>{ for(const c of cultists) if(!c.dead){ c.dead=true; c.deadT=0; takedowns++; } };
window.__foes=()=>cultists.filter(c=>!c.dead).map(c=>({x:c.x,y:c.y,hp:c.hp,alert:c.alert}));
window.__place=(x,y)=>{ if(state===playState){ player.x=x; player.y=clamp(y,Y_MIN,Y_MAX); cam.x=clamp(x-GAME_W*0.42,0,LV.len-GAME_W); } };
window.__warp=x=>{ if(state===playState){ player.x=x; cam.x=clamp(x-GAME_W*0.42,0,LV.len-GAME_W); } };
window.__addGold=n=>{ save.gold+=n; };
</script>
