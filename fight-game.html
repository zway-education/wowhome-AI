<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>海牛 VS 尼克星 - 自由搏擊</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: linear-gradient(#0f2027, #203a43, #2c5364);
    font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #fff;
    overflow: hidden;
  }
  h1 {
    margin: 10px 0 4px;
    text-shadow: 2px 2px 4px #000;
    letter-spacing: 2px;
  }
  #arena {
    position: relative;
    width: 900px;
    max-width: 95vw;
    height: 420px;
    background: repeating-linear-gradient(90deg, #3a3a3a, #3a3a3a 40px, #333 40px, #333 80px);
    border: 4px solid #ffcc00;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(255,204,0,0.4);
  }
  #floor {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 40px;
    background: #1a1a1a;
    border-top: 3px solid #555;
  }
  .fighter {
    position: absolute;
    bottom: 40px;
    width: 70px;
    height: 130px;
    transition: transform 0.1s;
  }
  .body {
    position: relative;
    width: 100%;
    height: 100%;
  }
  .head {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 40px; height: 40px;
    border-radius: 50%;
  }
  .torso {
    position: absolute;
    top: 36px; left: 50%;
    transform: translateX(-50%);
    width: 44px; height: 55px;
    border-radius: 10px;
  }
  .leg {
    position: absolute;
    top: 88px; left: 50%;
    transform: translateX(-50%);
    width: 40px; height: 42px;
    border-radius: 6px;
  }
  .arm {
    position: absolute;
    top: 42px;
    width: 14px; height: 40px;
    border-radius: 6px;
    background: inherit;
    transform-origin: top center;
  }
  #haiNiu .head, #haiNiu .torso, #haiNiu .leg { background: #2e8bc0; }
  #haiNiu .arm { background: #1e6b98; }
  #haiNiu .armL { left: 6px; }
  #haiNiu .armR { right: 6px; }
  #niKe .head, #niKe .torso, #niKe .leg { background: #d62828; }
  #niKe .arm { background: #a11d1d; }
  #niKe .armL { left: 6px; }
  #niKe .armR { right: 6px; }

  .facing-left { transform: scaleX(-1); }

  .nameTag {
    position: absolute;
    top: -22px; left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    white-space: nowrap;
    text-shadow: 1px 1px 2px #000;
  }

  .attacking .armR {
    animation: punch 0.2s ease-out;
  }
  @keyframes punch {
    0% { transform: rotate(0deg) translateX(0); }
    50% { transform: rotate(-70deg) translateX(20px); }
    100% { transform: rotate(0deg) translateX(0); }
  }

  .hurt { filter: brightness(2) saturate(0); }

  #hud {
    width: 900px;
    max-width: 95vw;
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
  }
  .healthWrap { width: 45%; }
  .healthWrap .label { font-weight: bold; margin-bottom: 3px; }
  .healthBarBg {
    width: 100%;
    height: 22px;
    background: #333;
    border: 2px solid #fff;
    border-radius: 4px;
    overflow: hidden;
  }
  .healthBarFill {
    height: 100%;
    transition: width 0.2s;
  }
  #hp1Fill { background: linear-gradient(90deg,#2e8bc0,#8ecae6); width: 100%; }
  #hp2Fill { background: linear-gradient(90deg,#d62828,#f77f00); width: 100%; margin-left: auto; }

  #status {
    margin-top: 10px;
    font-size: 22px;
    height: 30px;
    text-shadow: 2px 2px 3px #000;
  }
  #controls {
    margin-top: 8px;
    font-size: 13px;
    opacity: 0.8;
    text-align: center;
    line-height: 1.6;
  }
  #restartBtn {
    margin-top: 10px;
    padding: 8px 20px;
    font-size: 16px;
    background: #ffcc00;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    display: none;
  }
  #restartBtn:hover { background: #ffd93d; }

  .hitEffect {
    position: absolute;
    font-size: 24px;
    font-weight: bold;
    color: #fff700;
    text-shadow: 2px 2px 2px #000;
    pointer-events: none;
    animation: floatUp 0.6s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-40px); }
  }
</style>
</head>
<body>

<h1>🥊 海牛 VS 尼克星：直播主自由搏擊大賽 🥊</h1>

<div id="hud">
  <div class="healthWrap">
    <div class="label">海牛</div>
    <div class="healthBarBg"><div class="healthBarFill" id="hp1Fill"></div></div>
  </div>
  <div class="healthWrap">
    <div class="label" style="text-align:right;">尼克星</div>
    <div class="healthBarBg"><div class="healthBarFill" id="hp2Fill"></div></div>
  </div>
</div>

<div id="arena">
  <div id="floor"></div>

  <div class="fighter" id="haiNiu">
    <span class="nameTag">海牛</span>
    <div class="body">
      <div class="head"></div>
      <div class="torso"></div>
      <div class="leg"></div>
      <div class="arm armL"></div>
      <div class="arm armR"></div>
    </div>
  </div>

  <div class="fighter" id="niKe">
    <span class="nameTag">尼克星</span>
    <div class="body">
      <div class="head"></div>
      <div class="torso"></div>
      <div class="leg"></div>
      <div class="arm armL"></div>
      <div class="arm armR"></div>
    </div>
  </div>
</div>

<div id="status">準備開戰！</div>
<button id="restartBtn">再戰一局</button>
<div id="controls">
  玩家一（海牛）：A / D 移動　W 跳躍　空白鍵 攻擊<br>
  玩家二（尼克星）：← / → 移動　↑ 跳躍　Enter 攻擊
</div>

<script>
const arena = document.getElementById('arena');
const ARENA_WIDTH = 900;
const FLOOR_Y = 0;
const GRAVITY = 1;
const JUMP_FORCE = -16;
const MOVE_SPEED = 5;
const ATTACK_RANGE = 85;
const ATTACK_DAMAGE = 8;
const MAX_HP = 100;

function makeFighter(el, x, facing) {
  return {
    el, x, y: FLOOR_Y, vy: 0, hp: MAX_HP, facing,
    attacking: false, attackCooldown: 0, hurtCooldown: 0, jumping: false
  };
}

let p1 = makeFighter(document.getElementById('haiNiu'), 100, 1);
let p2 = makeFighter(document.getElementById('niKe'), 700, -1);

const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

let gameOver = false;

function update() {
  if (!gameOver) {
    handleInput(p1, {left:'KeyA', right:'KeyD', jump:'KeyW', attack:'Space'});
    handleInput(p2, {left:'ArrowLeft', right:'ArrowRight', jump:'ArrowUp', attack:'Enter'});

    [p1, p2].forEach(f => {
      f.y += f.vy;
      if (f.y < FLOOR_Y) {
        f.vy += GRAVITY;
      } else {
        f.y = FLOOR_Y;
        f.vy = 0;
        f.jumping = false;
      }
      if (f.attackCooldown > 0) f.attackCooldown--;
      if (f.hurtCooldown > 0) f.hurtCooldown--;
    });

    p1.facing = p1.x <= p2.x ? 1 : -1;
    p2.facing = p2.x <= p1.x ? 1 : -1;

    p1.x = Math.max(0, Math.min(ARENA_WIDTH - 70, p1.x));
    p2.x = Math.max(0, Math.min(ARENA_WIDTH - 70, p2.x));

    checkAttack(p1, p2);
    checkAttack(p2, p1);

    checkGameOver();
  }

  render(p1);
  render(p2);
  updateHUD();

  requestAnimationFrame(update);
}

function handleInput(f, map) {
  if (keys[map.left]) f.x -= MOVE_SPEED;
  if (keys[map.right]) f.x += MOVE_SPEED;
  if (keys[map.jump] && !f.jumping) {
    f.vy = JUMP_FORCE;
    f.jumping = true;
  }
  if (keys[map.attack] && f.attackCooldown === 0) {
    f.attacking = true;
    f.attackCooldown = 30;
    setTimeout(() => { f.attacking = false; }, 200);
  }
}

function checkAttack(attacker, defender) {
  if (attacker.attacking && attacker.attackCooldown === 28 && defender.hurtCooldown === 0) {
    const dist = Math.abs(attacker.x - defender.x);
    if (dist < ATTACK_RANGE) {
      defender.hp = Math.max(0, defender.hp - ATTACK_DAMAGE);
      defender.hurtCooldown = 20;
      showHitEffect(defender);
      defender.el.classList.add('hurt');
      setTimeout(() => defender.el.classList.remove('hurt'), 150);
      defender.x += (defender.x > attacker.x ? 1 : -1) * 15;
    }
  }
}

function showHitEffect(f) {
  const eff = document.createElement('div');
  eff.className = 'hitEffect';
  eff.textContent = ['💥','痛！','擊中！'][Math.floor(Math.random()*3)];
  eff.style.left = f.x + 15 + 'px';
  eff.style.bottom = (150 - f.y) + 'px';
  arena.appendChild(eff);
  setTimeout(() => eff.remove(), 600);
}

function render(f) {
  f.el.style.left = f.x + 'px';
  f.el.style.bottom = (40 - f.y) + 'px';
  f.el.classList.toggle('facing-left', f.facing === -1);
  f.el.classList.toggle('attacking', f.attacking);
}

function updateHUD() {
  document.getElementById('hp1Fill').style.width = (p1.hp / MAX_HP * 100) + '%';
  document.getElementById('hp2Fill').style.width = (p2.hp / MAX_HP * 100) + '%';
}

function checkGameOver() {
  const status = document.getElementById('status');
  const restartBtn = document.getElementById('restartBtn');
  if (p1.hp <= 0) {
    status.textContent = '🏆 尼克星 獲勝！';
    gameOver = true;
    restartBtn.style.display = 'inline-block';
  } else if (p2.hp <= 0) {
    status.textContent = '🏆 海牛 獲勝！';
    gameOver = true;
    restartBtn.style.display = 'inline-block';
  }
}

document.getElementById('restartBtn').addEventListener('click', () => {
  p1 = makeFighter(document.getElementById('haiNiu'), 100, 1);
  p2 = makeFighter(document.getElementById('niKe'), 700, -1);
  gameOver = false;
  document.getElementById('status').textContent = '準備開戰！';
  document.getElementById('restartBtn').style.display = 'none';
});

update();
</script>

</body>
</html>
