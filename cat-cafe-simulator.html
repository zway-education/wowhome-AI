<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貓咪咖啡廳經營模擬</title>
<style>
  :root{
    --bg1:#fff7ef;
    --bg2:#ffe9d6;
    --wood:#c8946b;
    --wood-dark:#a86f45;
    --accent:#ff8fab;
    --accent-dark:#e56a8a;
    --ink:#4a3428;
    --panel:#fffaf3;
    --shadow: rgba(74,52,40,0.15);
    --gold:#e0a72d;
    --green:#7cb87c;
    --red:#e06060;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Microsoft JhengHei","PingFang TC","Helvetica Neue",Arial,sans-serif;
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
    color:var(--ink);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:16px;
  }
  h1{
    margin:6px 0 12px;
    font-size:1.6rem;
    color:var(--wood-dark);
    text-shadow:1px 1px 0 #fff;
  }
  .wrap{
    width:100%;
    max-width:1100px;
  }
  .topbar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin-bottom:12px;
  }
  .stat{
    background:var(--panel);
    border:2px solid var(--wood);
    border-radius:14px;
    padding:8px 14px;
    min-width:92px;
    text-align:center;
    box-shadow:0 3px 0 var(--shadow);
    font-size:0.85rem;
  }
  .stat b{
    display:block;
    font-size:1.15rem;
    color:var(--wood-dark);
  }
  .layout{
    display:grid;
    grid-template-columns: 2fr 1fr;
    gap:14px;
  }
  @media (max-width:820px){
    .layout{grid-template-columns:1fr;}
  }
  .panel{
    background:var(--panel);
    border-radius:18px;
    border:2px solid var(--wood);
    box-shadow:0 4px 0 var(--shadow);
    padding:14px;
    margin-bottom:14px;
  }
  .panel h2{
    margin:0 0 10px;
    font-size:1.05rem;
    color:var(--wood-dark);
    border-bottom:2px dashed var(--wood);
    padding-bottom:6px;
  }
  #cafeArea{
    position:relative;
    background:
      repeating-linear-gradient(90deg, #e6c6a0 0 40px, #dab88f 40px 80px);
    border-radius:14px;
    height:420px;
    overflow:hidden;
    border:3px solid var(--wood-dark);
  }
  .tile{
    position:absolute;
    width:96px;
    text-align:center;
    cursor:pointer;
    user-select:none;
    transition:transform .15s;
  }
  .tile:hover{transform:scale(1.06);}
  .table{
    width:70px;height:70px;
    background:#b98a5e;
    border-radius:10px;
    border:3px solid #8c6440;
    margin:0 auto;
    display:flex;align-items:center;justify-content:center;
    font-size:26px;
    box-shadow:0 3px 0 rgba(0,0,0,0.15);
    position:relative;
  }
  .table.empty{opacity:0.55;}
  .table .badge{
    position:absolute;
    top:-10px;right:-10px;
    background:var(--red);
    color:#fff;
    border-radius:50%;
    width:20px;height:20px;
    font-size:11px;
    display:flex;align-items:center;justify-content:center;
    border:2px solid #fff;
  }
  .patience-bar{
    position:absolute;
    bottom:-6px;left:6px;right:6px;
    height:5px;
    background:#e8d3ba;
    border-radius:3px;
    overflow:hidden;
  }
  .patience-fill{
    height:100%;
    background:var(--green);
    width:100%;
    transition:width .3s linear, background .3s;
  }
  .label{font-size:0.72rem;margin-top:2px;color:var(--wood-dark);}
  .cat{
    position:absolute;
    font-size:30px;
    cursor:pointer;
    transition: left 1.2s ease, top 1.2s ease, transform .2s;
    filter:drop-shadow(0 2px 1px rgba(0,0,0,0.2));
  }
  .cat:hover{transform:scale(1.15);}
  .floatText{
    position:absolute;
    font-weight:bold;
    color:var(--gold);
    font-size:14px;
    pointer-events:none;
    animation:floatUp 1.1s ease-out forwards;
  }
  @keyframes floatUp{
    from{opacity:1; transform:translateY(0);}
    to{opacity:0; transform:translateY(-40px);}
  }
  .shopGrid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .shopItem{
    background:#fff;
    border:2px solid var(--wood);
    border-radius:12px;
    padding:8px;
    text-align:center;
    font-size:0.8rem;
  }
  .shopItem img,.shopItem .icon{
    font-size:28px;
    display:block;
    margin-bottom:4px;
  }
  button{
    font-family:inherit;
    border:none;
    border-radius:10px;
    background:var(--accent);
    color:#fff;
    padding:6px 10px;
    font-size:0.78rem;
    cursor:pointer;
    box-shadow:0 3px 0 var(--accent-dark);
    margin-top:6px;
  }
  button:active{
    transform:translateY(2px);
    box-shadow:0 1px 0 var(--accent-dark);
  }
  button:disabled{
    background:#ccc;
    box-shadow:0 3px 0 #999;
    cursor:not-allowed;
  }
  .catList{
    max-height:230px;
    overflow-y:auto;
  }
  .catCard{
    display:flex;
    align-items:center;
    gap:8px;
    background:#fff;
    border:2px solid var(--wood);
    border-radius:12px;
    padding:6px 8px;
    margin-bottom:6px;
    font-size:0.78rem;
  }
  .catCard .icon{font-size:26px;}
  .catCard .bar{
    background:#e8d3ba;
    border-radius:4px;
    height:6px;
    overflow:hidden;
    margin-top:3px;
  }
  .catCard .fill{height:100%;background:var(--accent);}
  .logBox{
    max-height:150px;
    overflow-y:auto;
    font-size:0.78rem;
    line-height:1.5;
  }
  .logBox div{border-bottom:1px dashed #e8d3ba;padding:2px 0;}
  .tabbtn{
    background:var(--wood);
    box-shadow:0 3px 0 var(--wood-dark);
  }
  .tabbtn.active{
    background:var(--accent);
    box-shadow:0 3px 0 var(--accent-dark);
  }
  .modal-bg{
    position:fixed;inset:0;
    background:rgba(0,0,0,0.4);
    display:flex;align-items:center;justify-content:center;
    z-index:50;
  }
  .modal{
    background:var(--panel);
    border-radius:16px;
    padding:20px;
    max-width:340px;
    text-align:center;
    border:3px solid var(--wood);
  }
  .hidden{display:none !important;}
  .small{font-size:0.72rem;color:#8a6f5a;}
</style>
</head>
<body>

<h1>🐾 貓咪咖啡廳經營模擬 🐾</h1>

<div class="wrap">
  <div class="topbar">
    <div class="stat">💰 金錢<b id="statMoney">0</b></div>
    <div class="stat">⭐ 聲望<b id="statRep">0</b></div>
    <div class="stat">📅 第<b id="statDay">1</b>天</div>
    <div class="stat">⏰ <b id="statTime">08:00</b></div>
    <div class="stat">😻 貓咪數<b id="statCats">0</b></div>
    <div class="stat">🧑 顧客<b id="statCustomers">0</b></div>
  </div>

  <div class="layout">
    <div>
      <div class="panel">
        <h2>咖啡廳大廳（點桌子上餐、點貓咪互動）</h2>
        <div id="cafeArea"></div>
        <div class="small" style="margin-top:6px;">提示：顧客坐下後會顯示耐心條，記得儘快點擊桌子上餐！貓咪心情越高，顧客小費越多。</div>
      </div>
      <div class="panel">
        <h2>📜 經營日誌</h2>
        <div class="logBox" id="logBox"></div>
      </div>
    </div>

    <div>
      <div class="panel">
        <h2>🐱 貓咪招募</h2>
        <div class="shopGrid" id="catShop"></div>
      </div>

      <div class="panel">
        <h2>🏠 我的貓咪 (<span id="catCount">0</span>)</h2>
        <div class="catList" id="catList"></div>
      </div>

      <div class="panel">
        <h2>🛠 升級與裝潢</h2>
        <div class="shopGrid" id="upgradeShop"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-bg hidden" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">第一天結束！</h2>
    <p id="modalBody"></p>
    <button onclick="nextDay()">開始新的一天 ☀️</button>
  </div>
</div>

<script>
(function(){
  // ---------- 遊戲資料 ----------
  const CAT_TYPES = [
    {key:'tabby', name:'虎斑貓', icon:'🐈', cost:80, income:2, cuteness:3},
    {key:'black', name:'黑貓', icon:'🐈‍⬛', cost:120, income:3, cuteness:4},
    {key:'white', name:'白貓', icon:'🐱', cost:150, income:4, cuteness:5},
    {key:'orange', name:'橘貓', icon:'🐯', cost:200, income:5, cuteness:6},
    {key:'siamese', name:'暹羅貓', icon:'😼', cost:280, income:7, cuteness:7},
    {key:'lion', name:'獅子貓(稀有)', icon:'🦁', cost:500, income:12, cuteness:10},
  ];

  const UPGRADES = [
    {key:'table', name:'新增桌子', icon:'🪑', costBase:100, level:0, max:8, desc:'增加座位數'},
    {key:'menu', name:'菜單升級', icon:'📖', costBase:150, level:0, max:5, desc:'提高每筆訂單收入'},
    {key:'deco', name:'裝潢升級', icon:'🎨', costBase:200, level:0, max:5, desc:'提高聲望與貓咪心情回復'},
    {key:'toy', name:'貓咪玩具', icon:'🧶', costBase:80, level:0, max:5, desc:'貓咪心情上限與恢復速度提升'},
  ];

  let state = {
    money: 150,
    rep: 0,
    day: 1,
    hour: 8,
    minute: 0,
    cats: [], // {id, key, name, mood, x,y, targetX,targetY}
    tables: [], // {id,x,y, occupied:false, customer:null}
    customers: [],
    upgrades: {table:1, menu:0, deco:0, toy:0}, // table level 1 = 3 seats base
    catIdSeq: 1,
    logs: [],
    running: true,
  };

  const cafeArea = document.getElementById('cafeArea');
  const logBox = document.getElementById('logBox');

  function log(msg){
    state.logs.unshift(`[Day${state.day} ${pad(state.hour)}:${pad(state.minute)}] ${msg}`);
    if(state.logs.length>60) state.logs.pop();
    logBox.innerHTML = state.logs.map(l=>`<div>${l}</div>`).join('');
  }
  function pad(n){return n.toString().padStart(2,'0');}

  function initTables(){
    state.tables = [];
    const count = 3 + (state.upgrades.table-1)*2; // level1=3,level2=5...
    const cols = 4;
    for(let i=0;i<count;i++){
      const col = i%cols, row = Math.floor(i/cols);
      state.tables.push({
        id:i,
        x: 40 + col*130,
        y: 40 + row*150,
        occupied:false,
        customer:null,
      });
    }
    renderTables();
  }

  function renderTables(){
    // remove old table elements
    cafeArea.querySelectorAll('.tableTile').forEach(e=>e.remove());
    state.tables.forEach(t=>{
      const div = document.createElement('div');
      div.className='tile tableTile';
      div.style.left=t.x+'px';
      div.style.top=t.y+'px';
      div.dataset.tid = t.id;
      div.innerHTML = `
        <div class="table ${t.occupied?'':'empty'}">
          ${t.occupied ? '🧑‍🦱' : '🪑'}
          ${t.occupied ? `<div class="badge">${t.customer.orderIcon}</div>` : ''}
          ${t.occupied ? `<div class="patience-bar"><div class="patience-fill" id="pf${t.id}"></div></div>` : ''}
        </div>
        <div class="label">桌${t.id+1}</div>
      `;
      div.onclick = ()=>serveTable(t.id);
      cafeArea.appendChild(div);
    });
  }

  function updatePatienceBars(){
    state.tables.forEach(t=>{
      if(t.occupied){
        const fill = document.getElementById('pf'+t.id);
        if(fill){
          const pct = Math.max(0, t.customer.patience/t.customer.maxPatience*100);
          fill.style.width = pct+'%';
          fill.style.background = pct>50?'#7cb87c':pct>25?'#e0a72d':'#e06060';
        }
      }
    });
  }

  // ---------- 貓咪 ----------
  function renderCatShop(){
    const shop = document.getElementById('catShop');
    shop.innerHTML='';
    CAT_TYPES.forEach(ct=>{
      const div = document.createElement('div');
      div.className='shopItem';
      div.innerHTML = `
        <div class="icon">${ct.icon}</div>
        <div><b>${ct.name}</b></div>
        <div class="small">收益+${ct.income}/單 萌度${ct.cuteness}</div>
        <button data-key="${ct.key}">💰${ct.cost}</button>
      `;
      div.querySelector('button').onclick = ()=>buyCat(ct);
      shop.appendChild(div);
    });
  }

  function buyCat(ct){
    if(state.money < ct.cost){ log(`💸 金錢不足，無法招募 ${ct.name}`); return; }
    if(state.cats.length >= state.tables.length + 3){ log(`🏠 咖啡廳空間不足，請先升級裝潢`); return; }
    state.money -= ct.cost;
    const cat = {
      id: state.catIdSeq++,
      key: ct.key,
      name: ct.name,
      icon: ct.icon,
      income: ct.income,
      cuteness: ct.cuteness,
      mood: 80,
      x: 20+Math.random()*(cafeArea.clientWidth-80),
      y: 260+Math.random()*120,
    };
    state.cats.push(cat);
    log(`🎉 招募了新貓咪：${ct.icon} ${ct.name}！`);
    renderCatList();
    renderCatsOnFloor();
    updateStats();
  }

  function renderCatList(){
    document.getElementById('catCount').textContent = state.cats.length;
    const list = document.getElementById('catList');
    list.innerHTML='';
    state.cats.forEach(c=>{
      const div = document.createElement('div');
      div.className='catCard';
      div.innerHTML = `
        <div class="icon">${c.icon}</div>
        <div style="flex:1;">
          <div><b>${c.name}</b> #${c.id}</div>
          <div class="bar"><div class="fill" style="width:${c.mood}%;"></div></div>
          <div class="small">心情 ${Math.round(c.mood)}% ・ 收益加成 +${c.income}</div>
        </div>
      `;
      list.appendChild(div);
    });
  }

  function renderCatsOnFloor(){
    cafeArea.querySelectorAll('.catTile').forEach(e=>e.remove());
    state.cats.forEach(c=>{
      const div = document.createElement('div');
      div.className='cat catTile';
      div.style.left = c.x+'px';
      div.style.top = c.y+'px';
      div.textContent = c.icon;
      div.title = `${c.name} 心情:${Math.round(c.mood)}%`;
      div.onclick = (e)=>petCat(c, e);
      cafeArea.appendChild(div);
    });
  }

  function petCat(cat, ev){
    cat.mood = Math.min(100 + state.upgrades.toy*5, cat.mood + 15 + state.upgrades.toy*3);
    floatText('+😊', ev.clientX, ev.clientY, '#ff8fab');
    renderCatList();
  }

  function moveCatsRandomly(){
    state.cats.forEach(c=>{
      if(Math.random()<0.35){
        c.x = Math.max(10, Math.min(cafeArea.clientWidth-40, c.x + (Math.random()-0.5)*160));
        c.y = Math.max(230, Math.min(cafeArea.clientHeight-40, c.y + (Math.random()-0.5)*100));
      }
    });
    renderCatsOnFloor();
  }

  // ---------- 顧客 ----------
  const ORDER_TYPES = [
    {icon:'☕', name:'咖啡', base:15},
    {icon:'🍰', name:'蛋糕', base:25},
    {icon:'🥤', name:'飲料', base:12},
    {icon:'🍪', name:'餅乾', base:10},
  ];

  function trySpawnCustomer(){
    const freeTables = state.tables.filter(t=>!t.occupied);
    if(freeTables.length===0) return;
    if(Math.random() > spawnChance()) return;
    const table = freeTables[Math.floor(Math.random()*freeTables.length)];
    const order = ORDER_TYPES[Math.floor(Math.random()*ORDER_TYPES.length)];
    const avgCuteness = state.cats.length ? state.cats.reduce((a,c)=>a+c.cuteness,0)/state.cats.length : 1;
    const patienceMax = 18 + state.upgrades.deco*2;
    table.occupied = true;
    table.customer = {
      orderIcon: order.icon,
      orderName: order.name,
      base: order.base,
      patience: patienceMax,
      maxPatience: patienceMax,
      cutenessBonus: avgCuteness,
    };
    renderTables();
    updateStats();
  }

  function spawnChance(){
    // more reputation => higher spawn chance, capped
    return Math.min(0.08 + state.rep*0.002 + state.upgrades.deco*0.01, 0.5);
  }

  function serveTable(id){
    const t = state.tables.find(x=>x.id===id);
    if(!t || !t.occupied) return;
    const c = t.customer;
    const menuBonus = 1 + state.upgrades.menu*0.15;
    const catMoodAvg = state.cats.length ? state.cats.reduce((a,ct)=>a+ct.mood,0)/state.cats.length/100 : 0.5;
    const tipMultiplier = 1 + (c.cutenessBonus*0.05) + (catMoodAvg*0.4);
    const revenue = Math.round(c.base * menuBonus * tipMultiplier);
    state.money += revenue;
    state.rep += 1;
    log(`✅ 桌${id+1} 點了 ${c.orderIcon}${c.orderName}，收入 💰${revenue}`);
    const tileEl = cafeArea.querySelector(`.tableTile[data-tid="${id}"] .table`);
    if(tileEl){
      const rect = tileEl.getBoundingClientRect();
      floatText('+💰'+revenue, rect.left+30, rect.top, '#e0a72d');
    }
    t.occupied = false;
    t.customer = null;
    renderTables();
    updateStats();
  }

  function tickCustomerPatience(){
    let leftCount = 0;
    state.tables.forEach(t=>{
      if(t.occupied){
        t.customer.patience -= 1;
        if(t.customer.patience<=0){
          t.occupied=false;
          t.customer=null;
          state.rep = Math.max(0, state.rep-2);
          leftCount++;
        }
      }
    });
    if(leftCount>0){
      log(`😠 有 ${leftCount} 位顧客等太久離開了，聲望-2`);
      renderTables();
      updateStats();
    } else {
      updatePatienceBars();
    }
  }

  function floatText(text,pageX,pageY,color){
    const rect = cafeArea.getBoundingClientRect();
    const div = document.createElement('div');
    div.className='floatText';
    div.style.color = color||'#e0a72d';
    div.style.left = (pageX-rect.left)+'px';
    div.style.top = (pageY-rect.top)+'px';
    div.textContent = text;
    cafeArea.appendChild(div);
    setTimeout(()=>div.remove(),1100);
  }

  // ---------- 升級 ----------
  function upgradeCost(u){
    return Math.round(u.costBase * Math.pow(1.6, u.level));
  }

  function renderUpgradeShop(){
    const shop = document.getElementById('upgradeShop');
    shop.innerHTML='';
    UPGRADES.forEach(u=>{
      const level = state.upgrades[u.key];
      const cost = Math.round(u.costBase * Math.pow(1.6, level));
      const maxed = level >= u.max;
      const div = document.createElement('div');
      div.className='shopItem';
      div.innerHTML = `
        <div class="icon">${u.icon}</div>
        <div><b>${u.name}</b></div>
        <div class="small">${u.desc}</div>
        <div class="small">等級 ${level}/${u.max}</div>
        <button ${maxed?'disabled':''}>${maxed?'已滿級':'💰'+cost}</button>
      `;
      div.querySelector('button').onclick = ()=>buyUpgrade(u);
      shop.appendChild(div);
    });
  }

  function buyUpgrade(u){
    const level = state.upgrades[u.key];
    if(level >= u.max) return;
    const cost = Math.round(u.costBase * Math.pow(1.6, level));
    if(state.money < cost){ log(`💸 金錢不足，無法升級 ${u.name}`); return; }
    state.money -= cost;
    state.upgrades[u.key] += 1;
    log(`🔧 升級了「${u.name}」到等級 ${state.upgrades[u.key]}`);
    if(u.key==='table') initTables();
    renderUpgradeShop();
    updateStats();
  }

  // ---------- 時間 / 主循環 ----------
  function updateStats(){
    document.getElementById('statMoney').textContent = state.money;
    document.getElementById('statRep').textContent = state.rep;
    document.getElementById('statDay').textContent = state.day;
    document.getElementById('statTime').textContent = `${pad(state.hour)}:${pad(state.minute)}`;
    document.getElementById('statCats').textContent = state.cats.length;
    document.getElementById('statCustomers').textContent = state.tables.filter(t=>t.occupied).length;
    renderCatList();
  }

  function gameTick(){
    if(!state.running) return;
    state.minute += 10;
    if(state.minute>=60){ state.minute=0; state.hour++; }
    // cat mood natural decay slower with toy upgrade
    state.cats.forEach(c=>{
      c.mood = Math.max(0, c.mood - (0.6 - state.upgrades.toy*0.05));
    });
    tickCustomerPatience();
    trySpawnCustomer();
    moveCatsRandomly();
    updateStats();

    if(state.hour >= 22){
      endDay();
      return;
    }
  }

  function endDay(){
    state.running = false;
    const bonus = 20 + state.rep;
    state.money += bonus;
    document.getElementById('modalTitle').textContent = `第 ${state.day} 天結束！`;
    document.getElementById('modalBody').innerHTML = `今天辛苦了！<br>營業獎金 💰${bonus}<br>目前總金錢：💰${state.money}<br>目前聲望：⭐${state.rep}`;
    document.getElementById('modalBg').classList.remove('hidden');
  }

  window.nextDay = function(){
    document.getElementById('modalBg').classList.add('hidden');
    state.day += 1;
    state.hour = 8;
    state.minute = 0;
    state.tables.forEach(t=>{t.occupied=false; t.customer=null;});
    state.running = true;
    renderTables();
    updateStats();
    log(`☀️ 第 ${state.day} 天開始營業！`);
  };

  // ---------- 初始化 ----------
  function init(){
    initTables();
    renderCatShop();
    renderUpgradeShop();
    renderCatList();
    updateStats();
    log('🏪 咖啡廳開張了！招募貓咪並開始經營吧～');
    setInterval(gameTick, 1500);
  }

  init();
})();
</script>
</body>
</html>
